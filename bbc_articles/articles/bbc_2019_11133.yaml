title: MPs demand Parliament be recalled after Scottish prorogation court ruling -
  BBC News
date: '2019-09-11'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-49660689
content: |-
  Opposition parties say it should return as soon as possible so scrutiny of the government can resume.

  This video can not be played To play this video you need to enable JavaScript in your browser. Opposition MPs say their "resolve remains firm" to bring back Parliament

  Opposition MPs are demanding Parliament be recalled after a court ruling deemed its five-week closure unlawful.

  Parliament was suspended on Tuesday, something Boris Johnson said was normal practice for a new government.

  But critics claimed his intention was to avoid scrutiny in the run-up to the Brexit deadline on 31 October.

  No 10 said it was "disappointed" but Parliament would remain prorogued pending its appeal to the Supreme Court, which will be heard on Tuesday.

  Downing Street said it had been "consistent throughout" on why the current parliamentary session should be ended, a decision formally taken by the Queen earlier this month on the advice of Mr Johnson.

  Labour, the SNP and the Lib Dems are all demanding that MPs be recalled as early as Wednesday afternoon and some have returned to Parliament to protest.

  They are not due to sit again until 14 October when the government had planned to hold a Queen's Speech, setting out its policy agenda.

  In a summary of their findings, the judges, at the Court of Session in Edinburgh, said they were unanimous in their belief that Mr Johnson was motivated in his decision to prorogue by the "improper purpose of stymieing Parliament".

  They added: "The court will accordingly make an order declaring that the prime minister's advice to HM the Queen and the prorogation which followed thereon was unlawful and is thus null and of no effect."

  The decision contrasts with a ruling by England's High Court last week, in a case brought by anti-Brexit campaigner Gina Miller, which determined the government's actions were lawful.

  Outlining the reasons for that decision on Wednesday, it said the decision to suspend, or prorogue, Parliament rested with the executive and was outside the purview of the courts, adding "the refusal of the courts to review political questions is well-established".

  The Supreme Court's nine justices will now consider the government's appeal of the Scottish ruling at the same time as Mrs Miller's appeal.

  In a BBC interview, business minister Kwasi Kwarteng would not guarantee Parliament would be recalled if the government lost the appeal.

  He told the Andrew Neil show that the "Supreme Court will have a verdict and they will also have an opinion and it is only when we hear the opinion that we will decide what to do".

  "If the judgement is upheld, I have no idea where we will be. We will be in a constitutional deadlock because the prorogation has already happened."

