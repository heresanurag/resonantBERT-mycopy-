  Former Tory MP Dominic Grieve - who had the Conservative whip removed after voting to block a no-deal Brexit - called for Parliament's immediate recall and said if it was the case the government had misled the Queen, Mr Johnson should resign.

  The judges made it "quite clear" the explanation for suspending Parliament was "simply inaccurate and untrue", he added.

  "These are interesting times when courts rule in favour of democracy and against a prime minister who wants to shut down democracy," he said.

  Mr Johnson - who would have been quizzed by MPs at Prime Minister's Questions and the Commons Liaison Committee on Wednesday if Parliament had been sitting - instead answered questions submitted by members of the public via Facebook for 15 minutes.

  He said if the UK and EU could not agree a new Brexit deal "then be in no doubt we will leave on October 31st".

  He also said there was "good progress" in negotiations and "the mood is changing".

  There were a number of protests around the country after the government confirmed it was suspending Parliament

  The SNP's leader in Westminster Ian Blackford, who has written to the prime minister to insist Parliament is recalled, said: "Every day Parliament remains suspended, Boris Johnson and the UK government are shutting down democracy."

  During the suspension, parties are due to hold their annual conferences but no debates, votes or official committee scrutiny sessions will take place.

  But following Wednesday's ruling, some MPs returned to the empty Commons chamber and others held an impromptu news conference outside Parliament insisting they were "ready to work and represent their constituents".

  Labour's Stephen Doughty said, pending Tuesday's ruling, MPs would find "other ways" to hold the government to account - potentially in "alternative locations".

  And Lib Dem leader Jo Swinson said the opposition parties would continue to co-operate to "make sure we do our job".

  Government sources said those trying to recall Parliament were seeking to pre-empt the appeal.

  No 10 also denied reports that sources had been critical of the Scottish judges.

  Justice Secretary Robert Buckland later tweeted he had "total confidence" in the court's independence.

