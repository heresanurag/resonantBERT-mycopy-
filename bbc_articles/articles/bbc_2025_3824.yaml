title: Could Keir Starmer be in for a benefits rebellion as tribes clash in his own
  party? - Laura Kuenssberg - BBC News
date: '2025-03-15'
section: BBC InDepth
url: http://www.bbc.co.uk/news/articles/c99n798ye1zo
content: |-
  Labour may have ditched its factional in-fighting - but deep welfare cuts could reignite tensions.

  The prime minister has just had another moment at the lectern, urging Europe to stand up for Ukraine. He's an increasingly confident leader, but in the coming days No 10 faces what could be a defining fight at home.

  "There is a collision coming," a Labour insider tells me. Sir Keir Starmer has long been up for fights with his party. But with controversy around every corner, who are the tribes in the party in 2025, and might they fight back?

  The party's history is crammed with bitter bust-ups, years when MPs seemed most comfortable to be fighting each other, rather than political rivals.

  With a squeeze on benefits coming, there is unease on the back, and the front benches, including in cabinet. The decision on winter fuel payments still causes resentment, and new plans for immigration coming in a white paper later in the spring are likely to be controversial too.

  A long-time party observer says: "Put three Labour people in a room and you'll have a faction."

  Sir Keir's allies seem pretty confident Labour's ditched that habit of constant scrapping. But No 10 is worried enough to be inviting MPs into Downing Street to make their pitch for the changes to welfare, knowing there'll be upset from the usual suspects and hoping there won't be too much of a backlash on the soft left.

  It's also grappling with the massive group of MPs elected last year, with some eager backbenchers actively trying to make Sir Keir's case, unkindly branded by one source as "toadies" trying to suck up to the leadership.

  So how will the "usual suspects", the "softies", the "newbies" and the "toadies" shake down?
