content: |-
  Spain defender Laia Codina says the squad has become stronger because of their battles both on and off the pitch over the last few years.

  Spain stronger after battles on & off pitch - Codina

  This video can not be played To play this video you need to enable JavaScript in your browser. As a group we are all so much stronger - Codina

  Spain defender Laia Codina says the world champions have become stronger because of their battles both on and off the pitch over the past few years. The most notable of those was the furore and subsequent repercussions caused by former national football federation boss Luis Rubiales kissing Spain player Jenni Hermoso without her consent. Rubiales was found guilty of sexual assault last week in a case in which Codina testified in support of Hermoso. "As a group, for sure, I can feel it - we are all so much stronger. We, all of us, have suffered a lot off the pitch," Codina told BBC Sport. "A good example is against Belgium [last week when they came from 2-0 down to win 3-2]. Two years ago, I think we would have lost that game." The assault occurred as Spain's players received their medals after defeating England to win the 2023 Women's World Cup, with Rubiales grabbing Hermoso by the head and kissing her on the lips. A group of 81 players boycotted the team afterwards and Codina, 25, appeared at the trial in Madrid in February to give testimony in support of Hermoso's account of feeling overwhelmed. She returned to London the same day and was an unused substitute in Arsenal's Women's League Cup semi-final defeat by Manchester City on 6 February. "The week that I had to go to Madrid as a witness was a difficult week. It was tough for me obviously personally," added Codina. "A lot of my team-mates at Arsenal could see that there were a lot of emotions. I was up and down. There was a feeling of everything again. "But that week is done and I feel good. I feel I did what I had to do in that moment and I'm always supporting Jenni [Hermoso] and my team-mates and the women. "It is something that made me proud, so I'm happy. I don't feel like it affects us right now in the team because we don't speak about it. It is not something we can control, so why should we speak about it."

  Laia Codina (left) testified in support of Jenni Hermoso at the National Court of San Fernando de Henares in Madrid

  Codina says she hopes now the case is over, people will talk about Spanish players' achievements in football. After becoming world champions in 2023, Spain went on to win the Women's Nations League the next year, and they are currently preparing for Euro 2025. "I just hope that everything now goes well and we speak about football finally," she said. "We speak about this team that has been World Cup winners, Nations League winners. We want to speak about football because it is why we are here. "It is our job and that is something that is going to be better for us and everyone in women's football. I hope that - for Spain in general and for society. "They have to see us as football players - as women's football players - and they have to feel that they are proud of us. Just this." Spain - who face England at Wembley on Wednesday (20:00 GMT) - came from 2-0 down to beat Belgium 3-2 in their Women's Nations League opener on Friday. Wednesday's opponents England have voiced their support for the Spanish players throughout the Rubiales trial. Last Thursday, England defender Lucy Bronze described them as "incredibly brave" for speaking out. "I saw some words from Lucy Bronze and [England manager] Sarina Wiegman. I've heard them and it's really nice to be honest. I really want to thank them," said Codina, who is one of the first Spanish players to speak publicly after the verdict, following captain Irene Paredes, who discussed it last week. "Feeling that super [kindness] from them, from a big national team like them... England in general, how they work for women's football, is something that we have to look for. "It's nice that we receive those words. I'm really grateful for that."

  Codina (right) was part of the Spain squad who won the 2023 Women's World Cup
