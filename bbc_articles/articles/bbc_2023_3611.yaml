title: 'Bath: Car wedged against historic hotel lifted away - BBC News'
date: '2023-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-somerset-65033865
content: |-
  The vehicle is manoeuvred out of the gap between the pavement and the hotel.

  A car which became wedged against the basement windows of a historic hotel has been lifted away.

  Avon Fire and Rescue Service was called to the Francis Hotel in Queen Square, Bath, at about 04:45 GMT on Sunday after a Kia Picanto fell down into a gap between the pavement and building.

  A rescue crew freed one of the occupants, while the second managed to get out on their own.
