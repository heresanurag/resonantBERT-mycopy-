title: 'Sam Mendes: Gender-neutral Oscars ''inevitable'' - BBC News'
date: '2023-01-08'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-64199673
content: |-
  The film director tells Sunday with Laura Kuenssberg he has "total sympathy" with the idea.

  Last year, The Crown star Emma Corrin called for gender-neutral categories at major film awards.

  Director Sam Mendes has told the BBC's Laura Kuenssberg he has "total sympathy" with the idea.
