id: bbc_2020_1010
title: Russian fishermen pull cars from icy sea - BBC News
date: '2020-01-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-51012340
content: |-
  The parked cars were stuck two metres deep after the ice beneath them cracked.

  A group of Russian fishermen attempted to pull their cars from the sea after the ice they were parked on melted.

  The cars plunged up to two metres below the surface off Russky Island, near Vladivostok in the far east.
