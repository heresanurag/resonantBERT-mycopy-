title: Rangers fan dies in Istanbul accident ahead of match - BBC News
date: '2025-03-06'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cj92ww7d871o
content: |-
  Reports in the Turkish press suggest that the man was crossing the road in the early hours when he was hit by a car.

  A Rangers fan has died in a road accident in Istanbul ahead of the club's match in the Turkish city. The club said it was "devastated" to have learned of the death, which happened overnight. Reports in the Turkish press suggest that the man was crossing the road in the early hours of the morning when he was hit by a car before being run over by a second vehicle.

  A statement on the Rangers website said: "The immediate thoughts of everyone at the club are with their family and friends at this incredibly difficult time. "We are remaining in constant contact with both the Turkish and British authorities over this tragic incident." A Foreign Office spokesman said: "We are aware of the death of a British man in Turkey and are in touch with the local authorities." Fenerbahce stated it extended "heartfelt sympathies" to the man's family and Rangers.
