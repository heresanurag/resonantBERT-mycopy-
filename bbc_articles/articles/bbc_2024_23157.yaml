  Earlier that day, a Secret Service agent had spotted his rifle poking through a fence at Trump International Golf Club in West Palm Beach. The agent opened fire as the three-time Republican presidential nominee was playing a round of golf. Routh fled without firing a shot, leaving his weapon and other items at the scene as agents escorted Trump to safety. He was arrested shortly afterwards, after a witness spotted him on the highway. On Monday, new court records unveiled evidence to suggest Routh had been plotting his attack on Trump for months. In a pre-written letter addressed to "The World" and sent to an unnamed witness months earlier, Routh appears to pre-empt a failed assassination attempt on the former president. "I tried my best and gave it all the gumption I could muster," the letter reads, with the offer of a cash reward to anyone "who can complete the job". In addition to the attempted assassination charge, an eight-page indictment unsealed on Tuesday, external also charges Routh with:
  • None possessing a firearm in furtherance of a crime of violence; According to the indictment, Routh "did forcibly assault, oppose, impede, intimidate, and interfere" with a Secret Service special agent. He returns to court for an arraignment hearing on Monday 30 September, where he is expected to enter a plea. Separately on Tuesday, his son, Oran Routh, was arrested on federal charges of receipt and possession of child pornography. Authorities discovered "hundreds" of pornographic files while searching the younger Routh's residence in North Carolina over the weekend in connection with the investigation into his father. Routh's alleged plot was the second attempt on Trump's life after Thomas Matthew Crooks, a 20-year-old armed with an AR-style rifle, opened fire on the former president during a campaign rally in Butler, Pennsylvania in July.

