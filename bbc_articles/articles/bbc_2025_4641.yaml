  Other acts have been brazen. One of the men who helped steal Blenheim's £4.8m fully functioning toilet actually spent a penny in it the day before the robbery, while visiting the exhibition it featured in, the trial heard. In another shameless act last year in Essex, an intruder was caught on camera opening a bottle of prosecco and drinking it while enjoying a slice of cake after he broke in to a pub.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV showed a man ripping a till from behind the bar and opening a bottle of prosecco.

  But no matter how quirky, none of these crimes are victimless. "Even seemingly trivial offences... often have far-reaching implications for the victims," Morton's Solicitors said. Cricket, whose real name is James Mulgrew, said he was "gutted" when his wellies were nabbed due to their "sentimental value". A farmer caught up in one of the cheese thefts said the process of making that particular product could take years. "The amount of work that's gone into nurturing the cows, emphasising best farming practice and transforming the milk one batch at a time to produce the best possible cheese is beyond estimation," he explained. And like any other offence, "even unconventional crimes carry serious consequences", Morton's Solicitor's added. "Whether it's a diamond necklace or a humble sausage roll, taking what isn't yours can lead to criminal charges."

