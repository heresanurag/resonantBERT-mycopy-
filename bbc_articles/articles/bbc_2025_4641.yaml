title: 'Loos to concrete wellies: England''s unusual and surprising crimes - BBC News'
date: '2025-03-22'
section: England
url: http://www.bbc.co.uk/news/articles/cqjdy5yrxpeo
content: |-
  As three men are convicted for stealing a gold toilet, the BBC unearths other unusual crimes.

  A Paddington statue, loos, cheese and comedian Jimmy Cricket's wellies have all been targets for thieves

  From loos to cheese, a Paddington statue to comedian Jimmy Cricket's wellies, it seems almost anything can attract the attention of would-be thieves. As a gang is convicted of stealing an 18-carat gold toilet from Blenheim Palace, the BBC looks at other unusual crimes in England.

  The loo theft from the Oxfordshire stately home in September 2019, which saw thieves smash their way in and rip out the art installation hours after a glamorous launch party, is not the only time lavatories have been targeted in the county. Earlier this year, 13 portable loos were taken from a depot in Banbury, while in 2014, several were removed from locations across Spalding, Lincolnshire, and a whopping £35,000 worth were taken from a firm in Colwell, Herefordshire, in 2023. It highlights how even seemingly mundane items can become targets for criminals.

  The solid gold toilet disappeared from Blenheim Palace in 2019

  At the top of Morton's Solicitors' "10 Craziest Convictions", published earlier this year,, external is an unexpected case involving cheese – it lists a dairy farm that became an unlikely target in 2013. Cheese-related crimes are more common than you might think, especially after more than £300,000 worth of cheddar truckles were stolen from a London cheese specialist last year.

  Meanwhile, in Harrogate, North Yorkshire, a restaurant owner turned detective took matters into his own hands after a spate of burglaries by secretly placing a tracker in a wheel of Brie. The stolen dairy product was eventually traced to Knaresborough on Christmas Eve.

  Hundreds of truckles of cheddar, worth more than £300,000, were stolen from Neal's Yard Dairy in London last year

  But what would a thief want with a pair of concrete wellies? "A hernia", comedian Jimmy Cricket joked in 2013, when his beloved 50th birthday present from fellow funny man Ken Dodd went missing from his garden in Rochdale, Greater Manchester. They were not “the lightest in the world", said Cricket, who wears Wellington boots marked with the letters R and L, but on the wrong feet, in his act. Speaking recently, he said: "The story seemed to catch the public's imagination and I suppose it's a testament to the affection and esteem that people around the country had for Ken." Perhaps that is what made the wellies attractive in the first place.

  This distinctive Gruffalo statue was among nine taken from a park in Salford

  Given the popularity of Julia Donaldson's The Gruffalo, which has sold more than 18 million copies worldwide since it was created in 1999 and been made into a BBC animation, it is no wonder thieves targeted nine statues at a park in Salford recently. But what exactly do you do with a giant wooden Gruffalo or half of a Paddington Bear for that matter? Twenty-three sculptures of the Peruvian bear were unveiled last year across the UK as part of a trail but the one in his creator Michael Bond's home town was damaged earlier this month. Marmalade sandwich tributes were even laid at the site in Newbury but businesses have vowed to replace the family favourite, who was first brought to life in 1958. "Opportunistic criminals will also be on the lookout for high value items to steal, regardless of how 'novel' they are, for the lack of a better word," said a spokesman for the National Police Chiefs' Council.

  Paddington statues were unveiled at 23 sites as part of a trail last year

  The front of the one in Newbury was cut from the bench it was mounted on

  Some thefts have been downright farcical though, including the gang that tunnelled into a secure vault at a Lloyd's Bank branch on London's Baker Street in 1971. They believed their heist was a success as they made off with the contents of hundreds of deposit boxes. However, unbeknownst to them, an amateur radio operator attempting to tune in to Radio Luxembourg had overheard their every move. Then there were the infamous Hatton Garden raiders, humorously dubbed "Dad's Army" due to their advanced ages. Experts said their £14m heist in 2015 was "doomed to fail", as they were simply too outdated for technological advances to pull off the plan, with ANPR cameras tracking their every move.

