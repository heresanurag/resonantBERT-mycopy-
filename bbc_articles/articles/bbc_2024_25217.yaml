title: 'Paul Lowe: Son charged with stabbing photographer to death - BBC News'
date: '2024-10-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cgj4e9p1nw3o
content: |-
  British photojournalist Paul Lowe was found fatally stabbed on a hiking trail in California.

  Paul Lowe at an exhibition of his work last year

  The teenage son of British photojournalist Paul Lowe has been charged with his murder. Mr Lowe, 61, an award-winning photographer who covered conflicts including the siege of Sarajevo during the Bosnian war (1992-95), was found stabbed to death at a hiking trail in California, on Saturday. Los Angeles County District Attorney's Office confirmed that his son Emir, 19, had been charged with his murder. Records at the County of Los Angeles Medical Examiner revealed Mr Lowe had been stabbed in the neck, PA reports.

  The Los Angeles County Sheriff's Department told PA: "The District Attorney's office filed one count of murder on suspect Emir Lowe for the murder of his father Christian Paul Lowe. "There is no additional information at this time." Emir Lowe is to make his first court appearance on Wednesday at the West Covina Courthouse, the department added. According to police, the incident happened at around 15:28 at Mount Baldy Road, near Stoddard Canyon Falls. A statement from the sheriff's department said officers had responded to reports of an assault with a deadly weapon and found a "white male adult suffering trauma to his upper torso". Mr Lowe was pronounced dead at the scene by emergency services. The sheriff's department added: "A white male adult was seen driving away from the scene and was subsequently involved in a solo traffic collision a few miles away. The male was detained pending further investigation." King's College London, where Mr Lowe was a visiting professor in war studies, said the acclaimed photojournalist would be "deeply missed". "It is with deep sadness that we received the news of Professor Paul Lowe's passing," a statement posted on X , externalread. "Paul was a Visiting Professor in the Department of War Studies, a Professor of Photojournalism at the University of the Arts London, and an award-winning photojournalist with VII Academy. A friend, colleague and collaborator whose work had a huge impact in shining a spotlight on the Siege of Sarajevo and addressing its legacy, we were privileged to work with him on several projects related to art and reconciliation. "His boundless energy, warmth, creativity, initiative and enthusiasm were contagious and uniquely inspiring. He will be deeply missed. "We send our deepest condolences to his family at this difficult time."
