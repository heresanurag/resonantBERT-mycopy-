title: 'Winter Olympics: Kamila Valieva failed drug test confirmed - BBC Sport'
date: '2022-02-11'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60329120
content: |-
  The International Testing Agency confirms teenage Russian Olympic Committee figure skater Kamila Valieva failed a drugs test in December.

  Valieva has continued to practise ahead of her individual event

  Kamila Valieva, the 15-year-old Russian figure skating star who helped her team win Winter Olympic gold in Beijing, failed a drugs test in December. Valieva, who was the first female skater to land a quadruple jump at an Olympics as her team won last Monday, had a sample collected on 25 December at the Russian Figure Skating Championships in St Petersburg. But the positive result was only reported on Tuesday - the day after she helped to win team gold, but before the medal ceremony had taken place.

  Valieva tested positive for trimetazidine, which is used in the prevention of angina attacks, but is on the banned list because it is classed as a cardiac metabolic modulator and has been proven to improve physical efficiency. A series of appeals means this case will now be taken to the Court of Arbitration for Sport (Cas) to make a final ruling - with International Olympic Committee spokesman Mark Adams saying he wanted a resolution "as quickly as possible". The medals for the team event - in which the United States finished second, Japan third and Canada fourth - will not be awarded until the outcome of the Cas hearing. A spokesman for the Russian Olympic Committee (ROC) said it will "take comprehensive measures in order to protect the rights and interests of the members of the ROC team and to preserve the honestly won Olympic gold medal". Rusada - the Russian anti-doping agency - said on Friday that it is investigating Valieva's support team to "identify all the circumstances of a possible anti-doping rule violation". Cas will now hear the case before Valieva's scheduled appearance in the individual women's figure skating event, which starts next Tuesday, 15 February.

  The International Testing Agency (ITA) said Valieva had a sample collected on 25 December at the Russian Figure Skating Championships in St Petersburg. The sample was sent to the World Anti-Doping Agency (Wada)-accredited laboratory in Stockholm, Sweden. Valieva competed in the European Figure Skating Championships in Tallinn, Estonia, in January - which was between the positive test and the Winter Olympics - and won the women's singles, with Russian claiming a clean sweep of the gold medals. The ROC pointed out that Valieva's samples taken at the Europeans and before the Beijing Winter Olympics were both negative, adding: "Taking into account that the positive doping sample of the athlete was not collected during the Olympic Games, the results of the athlete and the results of the team event during the Olympic Games are not automatically subject to review." The adverse finding was reported on 7 February and Valieva was notified of the positive result on 8 February. Valieva was provisionally suspended but she challenged the decision and the Russian Anti-Doping Agency (Rusada) agreed to lift it on 9 February - enabling her to continue at the Beijing Games. Because of her age, Valieva was not confirmed as the athlete at the centre of "legal issues" delaying the medal ceremony, until it was widely reported in the media on 10 February. The ITA confirmed those reports, external on 11 February because of "heightened public interest". The International Olympic Committee, Wada and the International Skating Union (ISU) have all now appealed against Rusada's lifting of the provisional ban, with the ISU calling on the Court of Arbitration for Sport (Cas) to reinstate it. The ITA said the "reasoned decision, including the grounds for which the provisional suspension was lifted, will be issued shortly to all concerned parties".

  Russian Olympic Committee president Stanislav Pozdnyakov told the Tass News Agency that the long gap between the 25 December test and the 8 February result looked suspicious and that he had "serious questions about the process". Rusada, the Russian anti-doping agency, claimed that the delay in processing Valieva's sample was due to Covid-19 cases at the Swedish laboratory that was analysing them.

