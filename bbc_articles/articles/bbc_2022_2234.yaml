  Valieva, who is favourite for the women's singles, has been seen training at the Capital Indoor Stadium in Beijing. Eric Myles, chief sport officer of the Canadian Olympic Committee, said: "We have the same questions as everyone else about the team figure skating case. "It's important that a fair process unfolds and the integrity of sport is protected. Our hope is that this is resolved quickly and the medallists get the medal moment they've earned here in Beijing." Russian athletes are competing under the name of the Russian Olympic Committee because Russia received a two-year ban from Wada in 2019 for its state-sponsored doping programme. Between 17 December 2020 and 17 December 2022, no athlete can represent Russia at the Olympics, Paralympics or World Championships. The ban was originally for four years but was reduced to two by Cas. Germany's Katarina Witt, a two-time Olympic figure skating champion, said: "What they knowingly did to her, if true, cannot be surpassed in inhumanity and makes my athlete's heart cry infinitely. "Kamila Valieva is a young girl and child prodigy, whose highly difficult performances and grace enchanted the whole world at only 15, a minor, depending on adults and she is not to blame here." United States Anti-Doping Agency head Travis Tygart said: "It is a catastrophic failure of the system to allow the star of the Games to have her sample not reported back close to five weeks, and then it gets reported the day after they won the team event."

  After days of intense media speculation, the ITA have confirmed that the 15-year-old prodigy Kamila Valieva from Russia tested positive for a banned substance. Valieva is the favourite for gold in the women's singles figure skating event which begins on Tuesday (15 February) which means this whole process needs to be expedited. At the heart of this is a 15-year-old athlete. There are concerns over her welfare and the potential involvement of others in this. But viewers would be forgiven for feeling a sense of depressing deja vu that once again we are at an Olympics, there is a doping controversy and it involves Russia. Russia is still serving sanctions, but for many people they are Russia in all but name. Many people will be questioning whether they should have been allowed to compete at all, given the country's past with doping issues.

