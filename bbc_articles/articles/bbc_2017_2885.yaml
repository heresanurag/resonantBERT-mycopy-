title: CCTV of Russell Square knife attacker released - BBC News
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/uk-38888590
content: |-
  CCTV showing police chasing Zakaria Bulhan moments after stabbing six people in London is released.

  CCTV showing police chasing Zakaria Bulhan moments after he stabbed six people in London has been released.

  The 19-year-old has admitted killing a US tourist and wounding five others in Russell Square on 3 August last year, pleading guilty to manslaughter on the grounds of diminished responsibility.
