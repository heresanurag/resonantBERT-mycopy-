title: CCTV shows Powys death crash as Matthew Parrott jailed - BBC News
date: '2025-05-23'
section: General
url: http://www.bbc.co.uk/news/videos/cyvmny7gn32o
content: |-
  Margaret Lee, 87, was killed in a head-on crash after Matthew Parrott overtook a bus.

  CCTV captured the moment a driver tried to overtake a bus before crashing into an oncoming car and killing an 87-year-old woman.

  Margaret Lee had gone out to buy a newspaper when she was hit on the A458 at Middletown, between Welshpool and Shrewsbury, on 27 November 2023.

  She suffered "catastrophic" injuries and died the same day in hospital in Stoke on Trent.

  Matthew Parrott, 42, from Newtown, Powys, admitted causing death by dangerous driving and was jailed for three years.

  Judge Timothy Petts said: "It's clear Margaret Lee had absolutely no chance to avoid what happened.

  "There was no need to overtake and [it was] clearly an unsafe place to overtake."
