  • None Why did Harry and Meghan leave the Royal Family? In the podcast, Meghan also talked about her experience of juggling work and childcare, and how Lilibet often joins her during online meetings when she's working from home. "I don't leave the house to go to an office, my office is here," she said. "Lili still naps, she gets picked up early and she naps. She only has a half day in preschool. "If she wakes up and she wants to find me, she knows where to find me, even if my door is closed to the office. "She'll be sitting there on my lap during one of these meetings with a grid of all the executives." But Meghan insisted she "wouldn't have it any other way". "I don't want to miss those moments. I don't want to miss pick-up if I don't have to. I don't want to miss drop-off." Meghan's new podcast, with Lemonada Media, follows an earlier series called Archetypes on Spotify, which faced some tough criticism. It's the latest in a flurry of business ventures from the duchess, who has also recently starred in a new Netflix lifestyle series - titled With Love, Meghan - and launched a new brand, As Ever. She has said the new series will feature "candid conversations with amazing women" and also include "girl talk". In the first episode, she added that having young children, while building a business, helped to bring "perspective". "Because you're building something while your child's going through potty training... and both are just as important," she said. "In your own world, that's super high value. And in [Lili's] world, that's super high value."
  • None Pre-eclampsia is a condition that affects some women, usually during the second half of pregnancy or soon after their baby is delivered
  • None Early signs include having high blood pressure and protein in urine
  • None In some cases, further symptoms can develop, including severe headaches, vision problems, and pain below the ribs
  • None Many cases are mild, but the condition can lead to serious complications for both mother and baby if it's not monitored and treated More information is available on the NHS, external.
