title: Meghan reveals she had 'rare and scary' pre-eclampsia after giving birth -
  BBC News
date: '2025-04-08'
section: Culture
url: http://www.bbc.co.uk/news/articles/cn5x2g11734o
content: |-
  The Duchess of Sussex said she was diagnosed with post-partum pre-eclampsia following childbirth.

  Meghan had 'rare and scary' condition after giving birth

  The Duchess of Sussex has revealed she suffered a "rare and scary" medical condition after giving birth to one of her children. In the first episode of her new podcast, Confessions of a Female Founder, Meghan said she was diagnosed with post-partum pre-eclampsia following childbirth. She described it as a "huge medical scare", and said she had to manage without the world knowing what she was going through. Meghan, who shares two children with the Duke of Sussex, did not reveal whether she faced the medical complication after the birth of Archie, five, or Lilibet, three.

  According to the NHS website, external, pre-eclampsia affects some women during pregnancy or soon after their baby is delivered, with early signs including having high blood pressure. "It's so rare. And it's so scary," Meghan said of the condition.

  The Duke and Duchess of Sussex share two children, Archie and Lilibet

  "You're still trying to juggle all these things and the world doesn't know what is happening, quietly, and in the quiet you are still trying to show up for people," she added. "In the quiet you're still trying to show up mostly for your children. But those things are huge medical scares." The first guest on Meghan's podcast was Whitney Wolfe Herd, founder of dating app Bumble, who also suffered from the condition. Herd described it as "life or death, truly", adding: "It's really scary." She said she would "never forget" the image of Meghan, after giving birth to Archie, "and the whole world was waiting for his debut".
