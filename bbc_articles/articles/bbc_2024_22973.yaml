  There was room for an awkward moment when, during a section of the speech on the Middle East, Sir Keir called for the return of sausages rather than hostages. He also said there should be de-escalation between Lebanon and Israel, an immediate ceasefire in Gaza and a two-state solution. A pro-Palestine heckler briefly interrupted the speech. In response, Sir Keir said: “This guy's obviously got a pass to the 2019 conference” a reference to the last time Jeremy Corbyn was leader. “While he’s been protesting, we’ve been changing the party," Sir Keir added. He did not address criticisms he has faced in recent weeks about donations and tensions within his government.

  But he told the crowd criticism - including "the politics of noisy performance, the weak and cowardly fantasy of populism" - was "water off a duck's back" to him. And he sought to make a virtue of his lack of showmanship, saying the country needed “stability, moderation and common sense”. Most of Labour's trade union backers praised Sir Keir's speech, with Unison chair Christina McAnea saying the government had "the commitment, vision and ability to repair and revitalise every part of society". But Unite General Secretary Sharon Graham said she thought the prime minister "could have done better" and reiterated her criticism of cuts to the winter fuel payment. Liberal Democrat deputy leader Daisy Cooper said millions of pensioners would be "left disappointed" that the prime minister had not U-turned on the cuts.
