  Faye Wheeler, founder of Blue Spot Campaign, said said she receives regular reports of misdiagnosis of the birthmarks, which she said can appear after the a child is born. She said: "There is a lot of devastation from families and this leads to mistrust with working with health professionals. "There seems to be a lot of suspicion around blue spot. I feel there is a lack of education, there is a lack of training." Hampshire Hospitals NHS Foundation Trust said it could not comment on individual cases, but said staff "will have followed guidelines". "Safeguarding babies and children will always take priority," it said. "Differentiating between suspected bruising and Mongolian blue spot is complex, and protocols have to be followed."

  The 29-year-old mum was detained at Basingstoke police station

  Det Ch Insp Gemma Anacora, from Hampshire Constabulary, said police automatically become involved when a case was referred as a child safeguarding issue. She said: "I do sympathise, it must be a very difficult situation, however we do follow procedures, so her arrest was necessary for us to obtain evidence by questioning and to safeguard the child through bail conditions." Independent child protection researcher Dr Bernard Gallagher, from the University of Huddersfield, said it was an "appropriate expectation" for agencies to intervene when child abuse was suspected. "Sometimes they make mistakes and maybe they are acting too drastically or too quickly, but it’s a very difficult balance to strike," he said. Ms Thapa said she had received a verbal apology from a doctor at the hospital. She is supported by the local advocacy group Basingstoke Unites Against Racism, which has established working partnerships with the police and hospital to address such issues. In a statement it said: "We are committed to addressing all concerns within the BAME community. This includes collaborating with external organisations, as we did in this case, to ensure comprehensive support." Ms Thapa said: "I am going through this situation that was unacceptable and I don't want others to," she said. "I don't want anyone to be separated from their baby like I was."
