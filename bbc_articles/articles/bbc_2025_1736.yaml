  In the US, the prime minister is expected to maintain his support for Zelensky and Ukraine while seeking to gain Trump's ear over talks with Russia. He will visit the White House after French President Emmanuel Macron, who is seeking to co-ordinate a European response. China, a vital partner for Russia, has offered its support for the US-Russia talks, with Foreign Minister Wang Yi saying "a window for peace is opening". But Foreign Secretary David Lammy appeared sceptical of whether Moscow was serious about peace, after listening to his Russian counterpart Sergei Lavrov's speech at a G20 summit in South Africa. He said the UK was "ready to listen" to Russia if it was serious about peace and rejected "Tsarist imperialism".

  During Thursday's programme, Ukrainian refugees in the audience spoke about the trauma of seeing their country torn apart by war. One woman began crying as she said she wanted to return home to her parents, adding: "I wish I would see my family all together." Millions of Ukrainians have fled their homeland since Russia's full-scale invasion began nearly three years ago. Accurate casualty counts are hard to come by, but it is estimated that hundreds of thousands of people, most of them soldiers, have been killed or injured in the conflict which continues to rage while talks begin. At least six people were killed in Russian strikes on three separate regions on Thursday, according to local authorities. Meanwhile, on the frontlines, Russia has been gaining ground faster than at any time since the start of the war.

