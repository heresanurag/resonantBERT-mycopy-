title: 'North Carolina: Moment police officer rescues driver from burning truck -
  BBC News'
date: '2023-09-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66739850
content: |-
  The police officer came across the burning vehicle after attending a separate incident.

  Police in Salisbury in North Carolina have just released bodycam footage of an officer saving a driver from a burning truck.

  Lt. Corey Brooks had been called to another incident on 8 August when he saw the truck hit a wall and catch fire.

  With the assistance of a member of the public, Lt. Brooks was able to drag the unresponsive driver to safety before emergency services arrived at the scene.
