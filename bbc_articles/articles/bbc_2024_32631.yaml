title: Elizabeth line railway worker who died after attack is named - BBC News
date: '2024-12-08'
section: London
url: http://www.bbc.co.uk/news/articles/cy7kkpmr4p0o
content: |-
  Jorge Ortega, 61, died following an attack and a man has been arrested by British Transport Police.

  Mr Ortega died from his injuries two days after the attack

  An Elizabeth line worker who died after being attacked at an east London station was "the most loving person", his family has said. Jorge Ortega, 61, was taken to hospital with serious head injuries after British Transport Police (BTP) officers were called to Ilford station at about 20:50 GMT on Wednesday to reports of a serious assault. He died on Friday. In a post on X, prime minister Sir Keir Starmer called Mr Ortega's death "absolutely tragic news" and added "nobody should have to face any violence at work - and certainly not something as shocking as this". Ayodele Jamgbadi, 28, of Kingston Road, Ilford, was charged with grievous bodily harm in connection with the incident.

  In a family tribute, Mr Ortega was described as "the kindest soul you could have the pleasure of meeting". It added: "Everyone who has met our Dad or who has ever worked with him over the years will tell you this. "He was an amazing family man and would always put other people first. He loved his grandchildren, and in turn, they adored our Dad. "He was totally devoted to our Mum and loved her beyond what words can describe. "Having been together for over 38 years, he is an example of what a great man should be like and a role model that we highly look up to. "We can only hope to be like him. Dad is and will always be in our hearts."

  Mr Ortega was attacked at Ilford station on Wednesday

  BTP has said it will apply to amend the indictment to reflect Mr Ortega's death. The RMT union said Mr Ortega, who was one of their members, worked as a customer experience assistant for MTREL, which runs the Elizabeth line. General secretary Mick Lynch said: "We are deeply saddened by the passing of our member, who died following an attack while at work. "The whole union sends its condolences to their family, friends and colleagues at this awful time and everyone's thoughts at RMT are with them. "We will keep a close eye on legal proceedings and will comment further in due course when it is appropriate."

  MTREL said Mr Ortega had been a "dedicated member of the railway community for 24 years". Mike Bagshaw, managing director of the transport operator said: "This is an unimaginable loss, and my heart goes out to his family, friends, and colleagues during this profoundly difficult time. "He was a valued member of our team, serving the railway community with dedication and kindness for more than two decades. "We are devastated that such a senseless act of violence has taken the life of one of our colleagues. "He has lost his life simply for carrying out his job, everyone has the right to feel safe and protected at work and this tragic event serves as a stark reminder of the unacceptable abuse faced by rail colleagues."

  Andy Lord, London transport commissioner said: "This was an appalling attack while our colleague was doing their job helping customers travel around London. "Everyone should be able to go about their day without fear or intimidation and it is unthinkable that someone could lose their life due to unprovoked violence while doing their job. "The safety and wellbeing of our colleagues is paramount, and we are fully supporting the British Transport Police with their investigation."

  DCI Paul Attwell said specialist family liaison officers were supporting the victim's family. He said: "This was a horrific and tragic incident which has resulted in a man losing his life. "I would like to reassure the public that this is an isolated incident."

  Mr Jamgbadi appeared at Highbury Corner Magistrates' Court on Friday and was remanded in custody. He has also been charged with affray and possession of a prohibited offensive weapon in a private place. He is due to appear at Inner London Crown Court on 7 January.
