  Sheeran's record was produced by Dessner, best known as the frontman of alternative rock band The National, after the two were introduced by mutual friend Taylor Swift.

  Dessner previously collaborated with Swift on her Grammy Award-winning lockdown album Folklore.

  "This is last February's diary entry and my way of making sense of it," Sheeran concluded. "This is Subtract."

