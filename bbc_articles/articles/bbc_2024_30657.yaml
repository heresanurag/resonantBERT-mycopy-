title: Songs and celebrations at Damascus rally - BBC News
date: '2024-12-13'
section: General
url: http://www.bbc.co.uk/news/videos/cg52q55zq86o
content: |-
  The BBC's Lina Sinjab says there is a joyous mood in the Syrian capital, as people mark the end of the Assad regime.

  Mass rallies are taking place across Syria to celebrate the end of five decades of authoritarian rule by the Assad regime.

  The BBC's Lina Sinjab is in Damascus and says people are singing revolutionary songs, with men, women and children gathered alongside rebel fighters.

  Former President Bashar al-Assad fled to Russia, where he and his family have been given asylum, after rebels captured the capital at the weekend.
