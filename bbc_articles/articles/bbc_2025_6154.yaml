  Boy, 16, in court charged with murder after stabbing

  Louis Howard, 35, was pronounced dead at the scene

  A 16-year-old boy has appeared in court charged with murder after a man was fatally stabbed in Leicester. Police said Louis Howard, 35, died at the scene after officers were called to a house in Oakdale Close, Braunstone Frith, shortly after 22:40 BST on Wednesday. The boy, who cannot be named due to his age, spoke only to confirm his name and address during a short hearing at Leicester Magistrates' Court on Saturday.

  He was remanded in youth detention accommodation and is due to appear at Leicester Crown Court on Monday. Leicestershire Police said a 32-year-old woman, arrested on suspicion of murder, and a 33-year-old woman, held on suspicion of assisting an offender, had been released on police bail. Following previous contact with police, a mandatory referral has been made to the Independent Office for Police Conduct (IOPC).

