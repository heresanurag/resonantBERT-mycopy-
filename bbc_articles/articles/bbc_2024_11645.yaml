  Tributes are paid to Kate Rackham who helped set up the Fighting to be Heard charity after her diagnosis.

  'Do not cry for me', says cancer campaigner in final post

  Kate Rackham shared updates about her treatment on social media

  Tributes have been paid after the death of a teacher who raised awareness of incurable secondary breast cancer. Kate Rackham was diagnosed with oestrogen-receptive breast cancer at the age of 39. The Manchester-based teacher, who shared updates on her life with her 17,000 followers on the X platform, helped set up the Fighting to be Heard charity to raise awareness of the condition and provide support for those with the condition. A post on the 46-year-old's account on Thursday read: “If you’re reading this, it means I have died. But do not cry for me. I have lived my life on my own terms, the way I have wanted to.”

  In her post, she said she had joined the social media platform “because I needed an outlet” but “what I got was so much more”. “You made me feel validated in my feelings and much less alone. Thank you.” Former BBC newsreader Beccy Barr, who attended the same school and has been diagnosed with abdominal cancer, posted a tribute, saying: “In recent months we reconnected and she was incredibly empathic and supportive of my terminal diagnosis as she handled her own. What a wonderful woman.” Nicola Nuttall, whose daughter Laura, 23, died of brain cancer while achieving a bucket list of ambitions, posted that she was "heartbroken that we’ve lost this truly incredible woman". Speaking about climbing Pendle Hill with Ms Rackham, in memory of Laura, Nicola added: "Kate really knew how to live, she wanted to come up Pendle but wouldn’t wait for better weather because she knew better than anyone the value of a single day. "We nearly got blown off but it was brilliant, so glad we met."

