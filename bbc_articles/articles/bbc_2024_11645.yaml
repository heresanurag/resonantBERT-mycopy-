  Clare Baron, head teacher at St Joseph's RC Primary in Reddish, where Ms Rackham taught said: "We are deeply saddened by yesterday’s news and our thoughts and prayers are with Kate's family, friends, colleagues and all the pupils she taught. "Kate cared about teaching and educating our young people. She made a difference to the lives of so many people, both in her years in education and her inspirational awareness raising and charity work following her own cancer diagnosis. "She will very much be missed in our school community and beyond. We are all blessed to have had Kate Rackham as part of our lives." Ms Rackham previously told BBC Radio 5 Live about her “heartbreaking” struggles with hair loss. “It's really hard losing your hair. It's not just losing your hair, it's losing your eyelashes and eyebrows as well. “That's the difference between looking like you are rocking a bald head and looking like you are on chemotherapy,” she said. She said her diagnosis "came as a massive shock", and that prior to it, she had lumps that she had got checked out, but with no family history she was told not to worry. When she noticed another lump, she said she did not get it checked straight away. In her role as trustee of Fighting To Be Heard, Ms Rackham said her aim was "to raise awareness in a bid that no one else goes through what we are all going through".

  Also known as advanced or metastatic breast cancer, secondary breast cancer occurs when a cancer that began in the breast spreads to another part of the body. It is estimated that in England in 2020-2021, more than 57,000 patients were living with metastatic breast cancer. It is the leading cause of death for females aged 35 to 49 in England and Wales. On Thursday, Lord Jim Knight, who sits in the House of Lords, paid tribute to Ms Rackham, saying: "This made me stop today and turn off the noise. Such dignity." Educational technology businesswoman Emma Stokes also posted: "Thank you for sharing your journey with grace and dignity. I hope wherever you are, you are no longer in pain."
