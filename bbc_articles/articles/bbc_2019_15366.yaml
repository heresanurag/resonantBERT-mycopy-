  • None 97.7% were born in the UK compared to 87.3% average (2011 census)
  • None 42%are aged 50+, compared with 37% of the UK population
  • None 5% of live birthsin 2018 were to non-UK mothers. England's average is 29.1%

  That does not mean voters are not concerned about immigration into the UK more widely.

  But in a region with skill shortages, some employers will be keen to retain access to workers from overseas – and the PM will have to balance those two competing demands.
