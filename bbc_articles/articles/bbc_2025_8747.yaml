title: Keir Starmer promises migration drop as he unveils plans for 'tighter' visa
  rules - BBC News
date: '2025-05-12'
section: Politics
url: http://www.bbc.co.uk/news/articles/c9wgrv7pwrzo
content: |-
  Plans to ban the recruitment of care workers from overseas are among efforts to curb near record net migration.

  PM promises migration drop as he unveils plans for 'tightened' visa rules

  Sir Keir Starmer has promised the government's new immigration measures will mean net migration falls "significantly" over the next four years. The prime minister unveiled plans to ban recruitment of care workers from overseas, tighten access to skilled worker visas and raise the costs to employers in an effort to curb near record net migration. He did not set a precise target, but the Home Office estimated the policies could lead to a 100,000 drop in immigration per year by 2029 - based on analysis of just eight of the core policies where "a quantitative assessment" could be made. Conservative Leader Kemi Badenoch said: "This is nowhere near the scale of the change we need to see."

  Successive governments have tried unsuccessfully to reduce net migration, which is the number of people coming to the UK minus the number leaving. Net migration climbed to a record 906,000 in June 2023, and last year it stood at 728,000. Sir Keir argued the proposals bring the immigration system "back into control", denying it was a response to the electoral success of Reform UK. The PM said the new plans, which tackle legal migration to the UK, would ensure a "selective" and "fair" system, where "we decide who comes to this country". "Every area of the immigration system, including work, family and study, will be tightened up so we have more control," he said. "Enforcement will be tougher than ever and migration numbers will fall." The government will scrap a visa scheme, set up by Boris Johnson's government, that allows firms to hire health and social care workers from overseas. Instead, firms will be required to hire British nationals or extend the visas of overseas workers already in the country. Home Office figures estimate this change will cut the number of workers coming to the UK by between 7,000 and 8,000 a year. However, care companies warned some services will struggle to survive without international recruits. Employers will also be asked to pay more to hire foreign staff. The Immigration Skills Charge will increase by 32%, leading smaller firms to pay up to £2,400 to sponsor workers to come to the UK, while large firms will pay up to £6,600. Universities could also be hit by higher charges. The government plans to look into a new tax on every international student enrolled in a UK university, with the proceeds redirected into skills training. At the same time, colleges must meet stricter thresholds, with at least 95% of international students expected to start their course and 90% expected to finish.

  The qualification requirements to apply for a skilled worker visa will go back up, reversing changes made under Johnson's government. It will mean new applicants will generally need a degree-level qualification, rather than the equivalent of A-level, which ministers say will make around 180 job roles ineligible for the visa route. Lower qualification requirements will remain for sectors facing long-term shortages, or those considered key to the government's industrial strategy. However it is not yet clear what that means in practice, and the government's migration advisory body has been asked to recommend roles for inclusion. The government also said:
  • None English language requirements for all work visas would increase
  • None The amount of time migrants need to live in the UK before applying for settled status would double from five years to 10, while setting up a fast-track system for "high-skilled, high-contributing" people
  • None A "limited pool" of refugees and displaced people recognised by the United Nations' agency responsible will be eligible to apply for jobs through existing skilled-worker routes. The government will also explore changing the law on how the right to a family life contained in Article 8 in the European Convention on Human Rights (ECHR) is applied in immigration cases. The government has previously said Article 8 should be interpreted "much more narrowly", opposing its use in cases including that of a Palestinian family, who were granted the right to live in the UK on appeal after originally applying through a scheme designed for Ukrainians. Government sources indicated a parliamentary vote on the plans was likely, to clarify Parliament's view to the courts.

  Speaking before the publication of the Immigration White Paper, Sir Keir accused industries of being "almost addicted to importing cheap labour" instead of "investing in the skills of people here". Asked if net migration would fall every year due to the plans, Sir Keir said: "I'm promising it will fall significantly. "And I do want to get it down by the end of this Parliament, significantly." He also said there could be further restrictions saying, "if we do need to do more to release pressure on housing and public services, then mark my words we will".

  The Conservatives have announced they plan to support policies such as tightening visas, which Badenoch argued were "watered down" versions of Tory policies. The Conservatives want a binding migration cap, set by Parliament. The Liberal Democrats said it was right for the government to tackle immigration, but the party's Home Affairs spokesperson Lisa Smart called for a "clear plan to make it easier to recruit British workers to fill vacancies instead". Reform UK leader Nigel Farage said Labour had introduced the changes because it was "obviously very panicked" about the rise of his party at the local elections. The White Paper was "tinkering around the edges", he argued, and "even if the numbers do reduce, they'll still be at massive historic highs". The Green Party has denounced the proposals as a "panicked and misguided" attempt to "create headlines and try to win back Reform voters".

  Sir Keir dismissed claims the plans were reacting to the threat from Reform, telling broadcasters: "I'm doing this because it is right, because it is fair and because it is what I believe in." He repeatedly attacked the previous Conservative government's immigration approach as an "open borders experiment", which was now over. The UK risks "becoming an island of strangers" without strong rules on immigration and integration, he added. Some on the left have accused Sir Keir of going too far on immigration. One Labour MP, Nadia Whittome, accused the prime minister of mimicking "the scaremongering of the far-right". In a social media post she said: "The step-up in anti-migrant rhetoric from the government is shameful and dangerous."

