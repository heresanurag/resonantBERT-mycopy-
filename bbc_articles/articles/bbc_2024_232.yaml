content: |-
  It’s freezing in Iowa - and that could affect turnout for the state's caucuses.

  It’s freezing here in Iowa. And it’s caucus day, which means it’s the first major state-wide vote to decide who will be the Republican US presidential candidate for the 2024 election. But could the weather affect the turnout, and what does that mean for the candidates?
