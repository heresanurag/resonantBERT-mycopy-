title: 'Sepsis: Student set to lose hands and legs following diagnosis - BBC News'
date: '2024-11-14'
section: England
url: http://www.bbc.co.uk/news/articles/cq8vddkkvqdo
content: |-
  Hamish Wilson, 18, from Crowborough, was rushed to hospital after becoming unwell at university.

  Hamish Wilson, 18, from Crowborough, has just started university in Southampton and is studying Philosophy

  A teenager is set to have both legs, a hand, and the fingers of his remaining hand amputated after he contracted sepsis. Hamish Wilson, 18, from Crowborough, had just begun university in Southampton, where he is studying philosophy, before he fell ill in October. The student was rushed to hospital last month where his condition deteriorated rapidly and he suffered major organ failure - but despite being critically ill, he pulled through. An online fundraiser has raised almost £50,000 to help convert the family home to make it more accessible for Hamish, as well as contributing towards vital physiotherapy and psychotherapy, and a part-time carer.

  Hamish's mother, Jacqueline, said she knew he had sepsis after a friend described his rash over the phone

  Hamish's mother, Jacqueline Wilson, told BBC South East: "It is really difficult to put into words what has happened. "It was terrifying being told that your boy might not make it. I felt utterly helpless, and his life kept flashing before my eyes." She added: "He called me day the before he was diagnosed to say his limbs were aching and he was struggling to breathe - so he went to A&E. "He called me later to say he was still really sick, so I said I would drive down the next day." Hamish had been intubated by the time Jacqueline arrived at the hospital in Southampton.

  Rory Wilson said his brother was an active, healthy young man before he contracted sepsis

  After spending some time at Southampton General Hospital, Hamish was transferred to Royal Papworth Hospital, in Cambridge, and is now being treated at St Thomas' Hospital in London. He will be given prosthetic limbs once the amputations have been completed. Hamish's brother, Rory, described his brother as an "active, healthy young man" prior to contracting sepsis. "I was running on adrenaline when I was travelling down to see him hospital," he told the BBC. "By the time I got there, he was unconscious and there were multiple life-support machines. "I thought he was going to die there and then. "It is cruel he is going through this now."

  Lord Mackinlay of Richborough became the first quadruple amputee to sit in the House of Lords

  Former Conservative MP, Lord Mackinlay of Richborough, also had his limbs amputated following a sepsis diagnosis. He went on to become the first quadruple amputee to be introduced to the House of Lords, after he was given a peerage in Rishi Sunak's dissolution honours list. He described coping with the consequences of sepsis as "a mental battle". "You could lose to this - but you mustn't - because you can get through this and get a really good life ahead of you. "This is what I will be impressing upon Hamish."
  • None Sepsis is known as the "hidden killer" because it can be so hard to detect.
  • None It is caused by the immune system going into overdrive. Instead of just fighting an infection, it starts attacking other parts of the body too.
  • None Ultimately it causes organ failure. Even survivors can be left with long-term damage and disability.
  • None Bacteria and viruses that cause diarrhoeal infections or lung diseases are the leading triggers of sepsis.
  • None The symptoms, external include loss of consciousness, severe breathlessness, a high temperature, slurred speech, nausea and vomiting, diarrhoea and severe muscle pain.
