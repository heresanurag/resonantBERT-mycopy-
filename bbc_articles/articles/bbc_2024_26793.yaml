content: |-
  Gardaí say a man in his 40s has died after an incident in Cloverhill Prison on Saturday morning.

  Man arrested on suspicion of murder after prison death

  Gardaí say they are investigating all circumstances surrounding the death

  A man in his 30s has been arrested on suspicion of murder after another man died following an incident at Cloverhill Prison in Dublin. Emergency services were alerted to the incident at about 05:30 local time on Saturday, gardaí (Irish police) said. It is understood there was a row in a cell involving three prisoners, according to Irish broadcaster RTÉ. The victim, who was in his 40s, received treatment at the scene but was pronounced dead a short time later.

  It is understood he was from Ballyfermot in west Dublin and was known to gardaí for involvement in serious and organised crime. A second inmate received treatment for injuries which have been described as non-life threatening, RTÉ reported. Gardaí said they are continuing to investigate all circumstances surrounding the death. The scene has been preserved for full forensic and technical examination. The coroner has been notified and the services of the state pathologist have been requested. The prison service expressed its condolences and said that the death will be investigated by the office of the inspector of prisons.
