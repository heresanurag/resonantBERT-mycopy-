id: bbc_2019_2039
title: Pablo Escobar's former home demolished in Colombia. - BBC News
date: '2019-02-23'
section: General
url: http://www.bbc.co.uk/news/47343318
content: |-
  The building will be replaced with a memorial to the victims of the drug lord's reign of terror.

  A crowd of 1,600 people including the families of some of Pablo Escobar's victims, watched as his former home in Medellin, Colombia, crumbled to the ground.

  It is to be replaced by a memorial to the victims of the notorious drug lord's reign of terror.
