title: 'Kilkeel: Bobbie McKee''s son in court accused of his murder - BBC News'
date: '2024-03-25'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68654146
content: |-
  Colin William James McKee of Canal Street in Newry is accused of killing his 69-year-old father, Bobbie.

  Bobbie McKee was found dead in a house in Kilkeel on Thursday

  A 25-year-old man has appeared in court charged with the murder of his father, County Down man Robert 'Bobbie' McKee.

  Colin William James McKee, whose address was given as Canal Street in Newry, appeared at Newry Magistrates' Court on Monday.

  He was also charged with the attempted murder of Robert's wife, Yvonne McKee.

  Robert McKee, 69, was found dead in a house in Newcastle Road in Kilkeel in County Down on Thursday.

  Mrs McKee, who was also in the house, suffered serious head injuries.

  A police officer confirmed to the court that they could connect Colin McKee to the charges.

  No bail application was made and he was remanded into custody to appear again on 17 April.
