  'I do things my way' - 'special' Fernandes hits back at critics

  Bruno Fernandes scored Manchester United's late third in their win at Leicester

  Captain Bruno Fernandes insists he will be his own man - and on current form Manchester United would not have it any other way. His fifth goal in a week capped United's 3-0 Premier League win at Leicester, with the Portugal international taking another starring role. Two assists and a goal followed the hat-trick in Thursday's 4-1 Europa League win over Real Sociedad to set up a quarter-final tie with Lyon, and a strike in last weekend's 1-1 draw against Arsenal. As Ruben Amorim's side rose to 13th with victory at the King Power Stadium, Fernandes' display came after former United skipper Roy Keane criticised him last month, saying 'talent is not enough'. But Fernandes, who has 16 goals and 15 assists for United this season, brushed off the criticism. "I do things in my own way," said the 30-year-old.

  "Obviously it's not nice to hear those things about you, but at the same time it motivates you and obviously people think there's a lot of things you need to improve. "You have to take it in a positive understanding that whatever people are saying, if it's a margin to improve or not. I have a huge respect for Roy Keane. "Obviously not everything I do everyone will like or think in the same way and I respect everyone's opinion and I have huge respect for Roy Keane and I accept there's a lot of margin for improvement in my game, in my leadership and everything I do in my life." Fernandes has been involved in 31 goals across all competitions this season, with only Mohamed Salah (54) and Erling Haaland (33) having more goal involvements among Premier League players. Since his United debut in February 2020, only Manchester City's Kevin de Bruyne (90) has recorded more assists across all competitions for a side in Europe's big five leagues than Fernandes (80). After a routine win at second-bottom Leicester, he told Sky Sports: "We knew it would be difficult and we had to be at our very best level. First half, we committed mistakes in the transition, but second half we were better at getting control of the game and getting the goals. "Against Arsenal we were a little bit more deep on the pitch, we felt they didn't have much up front in terms of pace. "I think you can see some progress, but that has to go on and on. We have important games. "I want to score many goals as I can as it's a big part of my game and I need to assist my team-mates. I need to get on to the edge of the box and get goals as it is one of my qualities." Amorim also reserved praise for Fernandes, who set up goals for Rasmus Hojlund and Alejandro Garnacho, before slotting home a late strike. The United boss said: "He's a special guy in that aspect, he is always ready, he can recover quite well. I don't know the future but I'm reading what the performance department tell me, the numbers, and then what I see in the game. "I always see a Bruno that is dangerous and one Bruno that can recover in every situation. So he is going to stay there. "I already knew Bruno. What surprised me the most is the way he works every day, that was a surprise. "We in Portugal see Bruno with that frustration and I was really surprised, he is a very good professional. You can understand that frustration, a surprise for me."
