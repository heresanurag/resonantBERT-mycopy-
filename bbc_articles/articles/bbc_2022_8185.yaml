title: 'Stereophonics: Cwmbach choir''s gig after store meeting - BBC News'
date: '2022-06-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61850992
content: |-
  A valleys choir sings for 60,000 after Stereophonics' Kelly Jones ran into an old teacher.

  This video can not be played To play this video you need to enable JavaScript in your browser. "Once we did the sound check I was 10 feet tall"

  A choir performed on their biggest stage for Stereophonics fans after frontman Kelly Jones bumped into an old teacher in a supermarket.

  Cwmbach Male Choir director Mike Thomas used to teach at Jones's school, the former Blaengwawr Comprehensive in Aberaman, Rhondda Cynon Taf.

  The pair met while shopping and Jones agreed they could work together after hearing the choir was celebrating its centenary in 2021.

  "It's been a dream," said Mr Thomas.

  He explained how the band's management got in touch to ask them to perform last year but that had to be postponed due to the Covid pandemic.

