title: LNER train drivers to stage weekend strikes across three months - BBC News
date: '2024-08-16'
section: Business
url: http://www.bbc.co.uk/news/articles/cj9le7vdw91o
content: |-
  Aslef said the action, separate to the recent pay dispute, was due to a breakdown in industrial relations.

  Train drivers at London North Eastern Railway (LNER) are set to strike every weekend in September, October and two in November, union bosses have announced. Aslef, which represents train drivers, said the walkouts at LNER were due to a breakdown in industrial relations and agreements. The fresh strikes are separate to an ongoing pay dispute with all train companies, which edged closer to being resolved in England this week after a new pay offer. Separately, Border Force officers at Heathrow Airport have announced more industrial action in a row over changes to terms and conditions.

  The Public and Commercial Services union said 650 Border Force officers will strike from 31 August to 3 September, before they begin a period of working-to-rule and refusing to work overtime until 22 September. The union said officers were being told to "choose between caring responsibilities and their job" due to what it called "inflexible rosters".

  Aslef said its member drivers at LNER would walk out every Saturday between 31 August and 9 November and on every Sunday from 1 September to 10 November. LNER, which operates services on the East Coast Mainline between London and Edinburgh and is run by the government, said it was "surprised and disappointed" by the announcement following recent talks. Its trains run to and from London King's Cross station and pass through major cities including Newcastle, York and Durham. Various railway strikes have led to cancelled services and disruption for passengers for more than two years. The fresh walkouts, which total 22 days, are separate to the long-running row over train driver wages at 16 train companies, which looks set to be resolved in England following a new pay offer made this week. Mick Whelan, general secretary of Aslef, claimed the union had been "forced" into taking strike action at LNER. He accused the train operator of "repeatedly" breaking agreements, acting in "bad faith", and of "boorish behaviour and bullying tactics". LNER said it would continue to work with the union to "find a way to end this long running dispute which only damages the rail industry". "Our priority focus will be on minimising disruption to customers during the forthcoming Aslef strikes, which sadly will continue to cause disruption and delays," a statement added. A spokesperson said the company took "any accusations of bullying very seriously, and this is not something tolerated anywhere in the business". The Department for Transport said the strikes were "extremely disappointing for passengers", adding that transport secretary Louise Haigh had called on both Aslef and LNER to "round the table and work in good faith to resolve this dispute and as quickly as possible". But Conservative shadow transport minister Kieran Mullan said following the new pay deal offered, "it should shock nobody that more strikes are on the cards". "All Labour are doing is encouraging the unions into more of this anti-passenger action, putting our rail network at the beck and call of unions, whilst passengers pay the price," he added.
  • None We want same pay deal as drivers, says RMT boss

  Nigel Roebuck, who has led Aslef's negotiations with LNER, said members had complained about being consistently "badgered for favours" by managers "outside of rostering agreements and being contacted remotely". "The bottom line is that LNER does not employ enough drivers to deliver the services it has promised passengers, and the government, it will run," he suggested. The Aslef union says it has more than 21,000 members and represents 96% of all the train drivers in England, Scotland, and Wales, where it is organised. Its leadership team has recommended members accept the newly-tabled offer for train drivers in England, which includes a backdated 5% pay increase for 2019 to 2022, 4.75% for 2022 to 2024, and 4.5% for 2024 to 2025. Shadow transport minister Kieran Mullan said: "After a no-strings-attached offer to throw cash at a Labour-backing union, it should shock nobody that more strikes are on the cards. "It's a taste of what is to come, a nationalised train service seeing Labour-backing unions staging walkouts despite a bumper pay deal." In another separate dispute, those working for publicly-run Scotrail are currently being balloted for strike action over pay. On Friday, it emerged that the RMT union, which had resolved its pay offer with the previous Conservative government, would expect the same terms as those offered to train drivers to be put forward to rail workers, such as guards and signalling staff. Mick Lynch told the Times that he expected a "parallel, synchronised offer", adding there could be “problems” if this is not the case. The RMT has confirmed it will enter pay talks next week with the Department for Transport, which will negotiate on behalf of the train operating companies and Network Rail.

