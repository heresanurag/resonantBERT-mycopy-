title: The trauma centres helping veteran amputees - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/health-38613566
content: |-
  A network of trauma centres has opened across the UK to allow the NHS to treat veterans.

  A network of 10 trauma centres across the UK has been set up to provide care for veterans. They bring NHS doctors who have military experience together with veterans to try and offer care specific to ex-Army personnel.

  Matt Weston was a sapper with 33 Engineer Regiment. He was a bomb disposal expert clearing a road in southern Afghanistan when he was severely injured in an explosion. This centre has, as he explains to Sima Kotecha from the Today programme, changed his life.
