  Monday's four scheduled matches in the top flight of Italian football are postponed following the death of Pope Francis.

  Monday's four scheduled matches in the top flight of Italian football have been postponed following the death of Pope Francis. The Vatican announced on Monday morning that Pope Francis had died at the age of 88, having recently been discharged from hospital following five weeks of treatment for an infection. Four Serie A matches - Torino v Udinese, Cagliari v Fiorentina, Genoa v Lazio and Parma v Juventus - had been scheduled to be played on Easter Monday, which is a national holiday in Italy. The matches will instead be played on Wednesday, 23 April and kick off at 17:30 BST.

  Pope Francis was elected to lead the Catholic Church in 2013, replacing Pope Benedict XVI. The 88-year-old was a known football fan and had supported Argentine side San Lorenzo since he was a child. A tribute from the club read: "Our hearts ache. Pope Francis has left this world, but he will never leave our hearts. "An honorary member of our club, his passion for San Lorenzo always moved us especially, and unites us in a constant prayer for his soul. "He celebrated every achievement with us with enormous generosity, receiving the delegations that visited him in the Vatican during his papacy." A number of Serie A clubs also posted tributes to the Pope following his passing. "A loss that deeply saddens our city and the entire world," a Roma statement read. "His faith, his humility, his courage and his dedication have touched the hearts of millions of people, making him a moral reference of our time."
