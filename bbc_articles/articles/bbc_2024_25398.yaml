title: Tom Hunter pays for plane to bring Alex Salmond's body home - BBC News
date: '2024-10-18'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cx2mzd91np9o
content: |-
  The businessman has been revealed as the private donor funding the former first minister's repatriation.

  Sir Tom Hunter says the former first minister and his family deserve "dignity and privacy"

  Businessman and philanthropist Sir Tom Hunter has paid for the plane flying Alex Salmond's body home from North Macedonia. The former first minister died of a heart attack on Saturday while attending a conference in North Macedonia. Sir Tom has chartered a plane for the repatriation, with the flight scheduled to arrive at Aberdeen Airport shortly before 14:00 on Friday. Members of the family and acting Alba Party leader Kenny MacAskill will greet the coffin on its arrival before the cortege departs to the family home in Strichen, Aberdeenshire.

  A private family funeral is to be held, followed by a public memorial event at a later date. In a statement, Sir Tom said: “Whilst he and I disagreed on some of his ambitions, Alex Salmond devoted his life to Scotland and the Scottish people and as such he, and importantly his family, deserved the dignity and privacy of a private return to the home of his birth. “Our deepest sympathy and thoughts are with his family at this time.” He added: "To be clear I remain resolutely apolitical."

  Mr Salmond's body is scheduled to leave from Ohrid St. Paul The Apostle Airport in North Macedonia

  Sir Tom, from New Cumnock in East Ayrshire, started in business selling trainers from the back of a van but eventually built a property and equity business once valued at more than £1bn. He continues to invest in companies, as well as running his charity, the Hunter Foundation. It is understood Sir Tom paid for the flight with his own funds, not through his foundation. He has previously donated funds to Labour, and backed them at this year's general election. Tributes have been paid to former SNP leader Salmond, who died aged 69, from across the political spectrum in recent days. First Minister John Swinney has lodged a motion of condolence at Holyrood, while books of condolence have been opened in the parliament for MSPs and members of the public to leave messages.

  Members of the public have paid tribute to Alex Salmond in the Scottish Parliament

  The Alba Party, which Mr Salmond formed in 2021 and which he led until his death, said the family was "incredibly grateful" for the support it had.

  Acting leader MacAskill, a former SNP cabinet colleague of Salmond, said: "It brings a great deal of comfort to Moira and other members of the family to know that he will soon be home with them. "The family have asked that their privacy be respected at this time and will be making an announcement in due course about the funeral arrangements and a memorial service to honour the life of Alex Salmond." MacAskill also expressed the Salmond family's appreciation to the North Macedonian, Scottish and UK governments. A Scottish government spokesperson said: "Over the last few days, the Scottish government and UK government have been engaging with Alex Salmond's family and working closely together in accordance with their wishes, to ensure the swift and dignified repatriation of the former first minister to Scotland." They added: "The Scottish government continues to engage with Mr Salmond's family, and we stand ready to offer further advice and support, should it be required."
