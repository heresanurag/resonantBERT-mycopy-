  Award winners and nominees headed for a night of partying across Los Angeles after the Oscars ceremony concluded.

  With the Academy Award ceremony over, Oscar winners and nominees headed out into Los Angeles for a night of partying and celebration.

  The BBC's Colin Paterson caught up with some of the night's stars, to hear about their glamorous evening.
