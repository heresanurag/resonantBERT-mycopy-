  Melissa McFarlane, head of operations for TikTok UK, Ireland & Nordics, says the awards celebrate everything from "science experts shining a light on STEM subjects, to literature lovers sharing their favourite book recommendations". "When you take a step back and think about the impact TikTok communities are having on reading, on the way we cook, even on the way we learn, it really is significant and deserves to be recognised; especially when most creators are just creative individuals with a passion," she adds. "Their contribution goes well beyond just 'influence.'"

  The UK awards are one of 20 happening globally this year and each award celebrates people in various categories including food, music, entertainment, beauty and fitness. While there are the nominees who create the usual get ready with me content or day in the life pieces, there are also those that have carved out a particular niche that shows how they're "changing the industry", according to Meghani. Some of the nominees with perhaps the most niche content include:
  • None yorkshire.fossils, external - a page with 72m likes that says what it does on the tin and shows videos of fossils
  • None thep00lguy , external- with 15m followers, the creator makes satisfying ASMR videos of him cleaning swimming pools
  • None Dr Amy Boyington, external - the historian runs a page dedicated to offering insights into historical events
