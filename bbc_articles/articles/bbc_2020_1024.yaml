title: 'Harvey Weinstein trial: ''Why I broke my silence'' - BBC News'
date: '2020-01-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50986015
content: |-
  Jasmine Lobe, who claims she was sexually assaulted by the Hollywood mogul, talks ahead of his criminal trial.

  Jasmine Lobe is a "silence breaker", one of the dozens of women who have come forward to accuse Harvey Weinstein of sexual assault after allegations about his behaviour became public in 2017.

  Ahead of the Hollywood producer's trial on criminal charges, she spoke to the BBC's Nick Bryant about what a guilty verdict would mean for alleged survivors.

  Mr Weinstein is accused of raping one woman in a hotel room in 2013 and sexually assaulting another in his apartment in 2006. He has pleaded not guilty and denied all allegations of non-consensual sex.
