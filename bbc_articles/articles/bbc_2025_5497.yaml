title: 'World Book Day: Hospital libraries are helping to support children - BBC News'
date: '2025-03-06'
section: General
url: http://www.bbc.co.uk/news/videos/c4ged1z2702o
content: |-
  Author Michael Rosen has been reading to children as a new library is unveiled at Evelina London.

  Being in hospital can be a very difficult time, especially if it is a child who is unwell.

  To help the young patients and their parents through those tough times, special libraries are being opened in children's hospitals by the charity Spread a Smile.

  One of those is at the Evelina London, and award-winning author and broadcaster Michael Rosen went along to read to young patients as part of its launch.

