title: 'Royal wedding 2018: How Windsor celebrated - BBC News'
date: '2018-05-19'
section: General
url: http://www.bbc.co.uk/news/uk-44181394
content: |-
  We speak to people in Windsor celebrating Harry and Meghan's big day in a big way.

  Thousands of well-wishers are in Windsor, while hundreds more camped out overnight to secure the best viewing spot.

  We spoke to people getting into the party spirit on the streets of Windsor.
