  Daniel Halliday's family has released a statement saying his disappearance is their "worst fear".

  Brother 'tried to save' missing boy, 14, from water

  Daniel Halliday went missing while at Crosby Beach with friends

  The family of a 14-year-old boy who went missing after swimming in water with friends said his brother "tried to save him" but the current was "too strong". Emergency services received calls shortly after 19:00 BST on Sunday to say Daniel Halliday had been in the water with friends, near the radar tower on Crosby Beach. A search involving the coastguard, police, fire and rescue units, helicopters and the ambulance service was stood down on Monday. In a statement, Daniel's family said: "Our worst fear is that this tragic accident has taken our lovely boy from us."

  A search of Crosby Beach was stood down on Monday

  They added: "Daniel was jumping waves with his big brother who tried to save him but the current was too strong." Merseyside Police said the rest of the group had come out of the water but realised they had become separated from the teenager and he had not been seen since. Daniel's family said he was "a loving son, brother, cousin, nephew and grandson" and that they were devastated by the incident. His family are being supported by specially trained Merseyside Police officers and in a statement asked for privacy.
