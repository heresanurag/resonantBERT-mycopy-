title: Grooming gangs report findings set to be announced - BBC News
date: '2025-06-15'
section: Politics
url: http://www.bbc.co.uk/news/articles/c70601550rro
content: |-
  Baroness Casey carried out a national audit into the sexual exploitation of children by grooming gangs.

  The findings of a national audit into the sexual exploitation and abuse of children by grooming gangs in England and Wales will be announced later. Baroness Casey has looked into the scale and nature of grooming and considered data on the gangs and their victims, including ethnicity. Ahead of its publication the prime minister announced at the weekend that, having read the report, there would now be a national statutory inquiry into the issue. Downing Street said the inquiry would look "specifically at how young girls were failed so badly by different agencies on a local level".

  Sarah Champion, Labour MP for Rotherham told the BBC there was an "intense frustration that there were still victims and survivors who haven't seen justice." She said there were people who, "if not held to a criminal standard, should be held to a professional standard for their negligence in protecting these children". Emma, a grooming survivor, urged other victims to "speak up". "It's not OK to be groomed," she said. "Speak out if you feel that something's not right. Don't be scared." Speaking on BBC Breakfast, shadow home secretary Chris Philp claimed there had been a "deliberate cover-up" by police, local authorities and the Crown Prosecution Service and he wanted the national inquiry to result in misconduct in public office prosecutions. Home Secretary Yvette Cooper will address the Commons later as the Casey review is published. In January, Cooper announced the three-month audit into ethnicity data and the demographics of grooming gangs and their victims, as well as the cultural and societal drivers for this offending.

