title: Emma Raducanu to start trial with coach Vladimir Platenik at Indian Wells -
  BBC Sport
date: '2025-03-06'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/clydjgdzrd2o
content: |-
  Emma Raducanu has won just one match since her third-round Australian Open exit in January

  Emma Raducanu will begin a trial period with Slovakian coach Vladimir Platenik when she plays her first-round match at Indian Wells on Thursday. The 49-year-old was coaching Lulu Sun when the New Zealand qualifier beat Raducanu in the fourth round of Wimbledon last July. Platenik worked with compatriot Dominika Cibulkova when she reached the semi-finals of the French Open in 2009, and has also coached Russians Daria Kasatkina and Veronika Kudermetova. Loughborough Academy coach Tom Welsh agreed to join Raducanu for Indian Wells, but that was billed as a one-off arrangement. Raducanu, who has been without a permanent coach since Nick Cavaday stood down for health reasons after January's Australian Open, plays Japan's Moyuka Uchijima in her opening Indian Wells match. "I don't want to rush into anything, but I'm looking, I'm finding options and setting trials up," Raducanu, 22, told BBC Sport before the tournament. "I think once I have a structure in place, I will feel very set - whereas in the Middle East it was very difficult for me because I didn't really have any direction or [advice on] which tournaments to play, and it was very difficult doing it all on my own. "I'm that kind of person who needs a plan and needs preparation. That's what I'm building and that's making me feel more comfortable." Raducanu has won just one match since Cavaday's departure but also had to deal with a man who followed her to four tournaments before being issued with a restraining order by Dubai Police.

  The 2021 US Open champion had previously worked with a wide range of coaches including Nigel Sears, Andrew Richardson (who was in charge during her run to the title in New York), Torben Beltz, Dmitry Tursunov and Sebastian Sachs. This job has not been formally advertised, but Raducanu gave an outline of what she is looking for when asked about the ideal qualities of a coach. "I would say work ethic, and a genuine passion and enthusiasm for what they do," she said. "I'm the kind of person who does have very long training days but it does not feel like work to me. "I'd say someone who doesn't necessarily view what they do as work, someone who genuinely has that drive and hunger to achieve the best and win big titles. "I think that's something that a lot of people say they have, but don't necessarily have. You can feel it, and I think with me I am a very feelings-based person."
