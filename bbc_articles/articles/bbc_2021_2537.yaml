content: |-
  The former president's lawyers said he could not be guilty of incitement because the riots were planned.

  Did Trump know Pence was in serious danger?

  Republican Senators Mitt Romney and Susan Collins just posed one of the more interesting queries – to both sides – so far during the trial’s four-hour question time. When Donald Trump sent a disparaging tweet about Mike Pence, they asked, did he know that the vice-president had been removed from the Senate chamber by Secret Service for his safety? Answering for the impeachment managers, Congressman Joaquin Castro said that the president must have known that Pence was being threatened by the mob. The violence was being broadcast on national television, the White House has the extensive communications facilities and the president himself had just been informed by Alabama Senator Tommy Tuberville that Pence had been evacuated during a phone conversation the two had at roughly the same time. Responding for Trump’s defence, lawyer Michael van der Bleen said Trump did not know. He added that the House Democrats had done no investigation into the matter during their “rushed” impeachment proceedings and, besides, Trump’s actions during the Capitol riot were not included in the impeachment article, which dealt with inciting an insurrection. The question - from two Republicans who are likely to vote to convict - gets to the heart of the case against the former president. Did Trump’s actions during the riot - including his condemnation of Pence - indicate that he knew that violence was likely and that he welcomed and encouraged them? The House impeachment managers insist the answer is yes.
