title: James Van Der Beek shares message about miscarriage 'heartbreak' - BBC News
date: '2018-09-11'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-45487825
content: |-
  The former Dawson's Creek actor shares an emotional message about his wife's three miscarriages.

  James Van Der Beek (right) pictured with his wife Kimberly

  Dawson's Creek star James Van Der Beek has shared a heartfelt message on Instagram about the pain of dealing with his wife's three miscarriages.

  "It will tear you open like nothing else," he wrote.

  "It's painful and it's heartbreaking on levels deeper than you may have ever experienced.

  "So don't judge your grief, or try to rationalise your way around it. Let it flow in the waves in which it comes, and allow it its rightful space."

  The actor added a hopeful note, saying that the changes that come from recovery "can be gifts" and addressed other couples who may be going through the same thing.

  "Many couples become closer than ever before," he wrote. "Many parents realise a deeper desire for a child than ever before.

  "And many, many, many couples go on to have happy, healthy, beautiful babies afterwards (and often very quickly afterwards - you've been warned.)"

  The actor posted a photo of himself and his wife with their baby daughter - their fifth - who was born in June.

  You might also be interested in:

  Van Der Beek also said he thinks society should come up with a different word instead of miscarriage. He wrote: "'Mis-carriage', in an insidious way, suggests fault for the mother - as if she dropped something, or failed to 'carry.'

  "From what I've learned, in all but the most obvious, extreme cases, it has nothing to do with anything the mother did or didn't do."

  The post just comes days after his wife Kimberly Van Der Beek revealed the miscarriages she had suffered.

  She also shared her journey on Instagram, writing: "Some of you know, I've had almost eight and a half years of pregnancy.

  "I've had five babies and three miscarriages in that time. I've nursed each child for over a year. Sometimes it's exhausting. Sometimes it's heaven."

