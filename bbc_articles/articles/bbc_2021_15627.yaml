title: 'As it happened: Covid passes become law in England despite Tory rebellion
  - BBC News'
date: '2021-12-14'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-59651187
content: |-
  People will now need to show proof of vaccination - or a negative lateral flow test - to enter some venues.

  The House of Commons official photographer has been in the chamber capturing some of the key moments of the debate today.

  Here are some of the best shots, as MPs consider the government's proposals to introduce its Plan B Covid restrictions.

  Health Secretary Sajid Javid faced many interventions from his fellow Tory MPs over the votes, with many expressing their intention to vote against the government Image caption: Health Secretary Sajid Javid faced many interventions from his fellow Tory MPs over the votes, with many expressing their intention to vote against the government

  Javid set out the reasons the government intended to move to Plan B as debate opened Image caption: Javid set out the reasons the government intended to move to Plan B as debate opened

  The health secretary's tough reception was not just from his own side of the House, the opposition benches also had some words for him Image caption: The health secretary's tough reception was not just from his own side of the House, the opposition benches also had some words for him

  Shadow health secretary Wes Streeting outlined the Labour Party's support for the government, which is expected to allow the votes to proceed despite a significant Tory rebellion Image caption: Shadow health secretary Wes Streeting outlined the Labour Party's support for the government, which is expected to allow the votes to proceed despite a significant Tory rebellion
