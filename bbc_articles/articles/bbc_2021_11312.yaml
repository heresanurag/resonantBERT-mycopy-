title: Another 37,622 coronavirus cases recorded in UK - BBC News
date: '2021-09-10'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58511816
content: |-
  A further 147 deaths were also reported in the latest government statistics.

  Only fully vaccinated people will be allowed into nightclubs, major sporting events and many concerts and festivals in Scotland from October.

  If you've had two doses you can already download or get a paper copy of a certificate with a QR code to prove your vaccination status. It is expected that this code will soon be available on a new NHS Scotland Status app.

  In a new development in Wales, First Minister Mark Drakeford says ministers will decide next week if vaccine passports should be used to gain entry to some events.

  Wales already has an NHS Covid Pass to show your vaccination status

  In England, Vaccines Minister Nadhim Zahawi says people will need to prove their Covid status to get into nightclubs and some other venues from the end of September.

  The plans were first announced in July and have been opposed by some Tory MPs and the Liberal Democrats. Nightclubs have described them as "chaotic and surreal".

  In England, as long as you are registered with a GP, you can prove your Covid status using the NHS Covid Pass , via the NHS App.

  Northern Ireland has not yet proposed Covid passport rules for venues and events, but residents can apply for a Covid status certificate online .

  Read more about the plans for vaccine passports across the UK here.
