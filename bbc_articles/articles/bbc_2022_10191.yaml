title: 'Owami Davies: Fifth arrest over missing student nurse - BBC News'
date: '2022-08-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-62450061
content: |-
  A man is being held on suspicion of kidnap following the disappearance of Owami Davies.

  Owami Davies has not been seen for a month

  Detectives have arrested a fifth man in the case of a missing student nurse.

  Owami Davies, 24, who was studying at King's College London, was recorded on CCTV in the company of a man on 7 July - the day she was last seen.

  Four men previously arrested in connection with the disappearance have been bailed until September.

  The fifth suspect is aged 27 and being held on suspicion of kidnap. Two of the earlier four were arrested on suspicion of murder.

  The CCTV footage showed Ms Davies on Derby Road, west Croydon, in the early hours of 7 July.

  The Metropolitan Police said on Sunday a "second, unconfirmed sighting" of Ms Davies on 7 July had been reported. She was said to have been seen on nearby Clarendon Road at about 07:00 BST - later than the CCTV footage, which was shot shortly after midnight.

  Det Ch Insp Nigel Penney from the Met described the ongoing investigation as complex and said it involved a significant number of officers.

  He added: "We are working tirelessly to follow every line of inquiry, including extensive CCTV trawls, as we continue to search for Owami.

  "We are now a month on from the last confirmed sighting of her. I cannot imagine what that time has been like for her family.

  "We continue to provide them with whatever support we can."

  Police say Ms Davies was seen in a shop in West Croydon shortly before she went missing

  Ms Davies was originally reported as missing by Essex Police - on 11 July.

  The force said she had left the family home in Chafford Hundred, Grays, on 4 July.

  CCTV then showed Ms Davies in west Croydon in the early hours of 7 July walking along Derby Road. It is the last confirmed sighting.

  She was wearing a black jumper, grey jogging bottoms and a grey cap.

  Police searched a property on Derby Road, west Croydon, as men were arrested

  A spokesperson for King's College London said Ms Davies is a valued member of the university's community.

  She said: "We are deeply concerned about her disappearance, and we continue to hope for her swift and safe return.

  "We are keeping Owami, her family, and her friends in our thoughts during this difficult time.

  "Our immediate priority is cooperating with the Metropolitan Police in their investigation."

  CCTV footage shows Owami Davies in a shop in west Croydon before her disappearance

  The Met said two men, aged 27 and 23, who were detained on suspicion of murder, had been bailed until September.

  A 32-year-old man and a 22-year-old man who were arrested on suspicion of kidnap have also been released on bail until next month.

  Police released CCTV of Ms Davies' last known movements on Wednesday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Police said Owami Davies was with a man as she crossed Derby Road on the last night she was seen

  Officers are keen to speak to the driver of a white van that was parked on Derby Road.

  Police said Ms Davies, and the man she was with, crossed the street "just as the van pulled out".

