title: Murder charge over London drill rapper stab death - BBC News
date: '2018-08-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-45107009
content: |-
  Drill rapper Sidique Kamara, also known as Incognito, died after being found stabbed in London.

  Sidique Kamara was known by his rap name Incognito

  A man has been charged with murdering a rapper in London's drill music scene.

  Sidique Kamara, also known as Incognito and SK, died after being found stabbed in Warham Street, Camberwell, at 19:20 BST on 1 August.

  Mr Kamara, 23, who had been cleared of murdering Abdirahman Mohamed in January, was found with two others who had also been stabbed.

  Kenneth Umezie, 31, of Camberwell, was charged and will appear at Camberwell Green Magistrates' Court on Wednesday.

  A 16-year-old boy and two men, aged 18 and 19, who were arrested as part of the inquiry have been released under investigation.

