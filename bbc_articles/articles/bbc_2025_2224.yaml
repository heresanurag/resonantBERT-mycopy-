  Local media reported an avalanche fell while the men scaled a frozen waterfall on Friday.

  British man dies and one injured while climbing in Norway

  Two British men were hit by the avalanche on Norway's Gaustatoppen mountain

  A British man has died and another was left injured while climbing in Norway. Norwegian media reported an avalanche fell while the men scaled a frozen waterfall at Gaustatoppen mountain on Friday. Rescuers reportedly failed to recover the man who died for several days due to poor weather conditions. The Foreign Office said: "We are supporting the family of a British man who has died in Norway, and a British man who has been injured, and are in contact with the local authorities."

  An avalanche fell on the mountain in Norway's southern Telemark county early on Friday afternoon, Norwegian media reported. Rescuers were said to have airlifted one of the climbers to hospital with non-fatal injuries on Saturday. Efforts to recover the second man were postponed several times due to bad weather, Norway's NRK reported. "Prevailing weather conditions, avalanche danger and accessibility made it a very complicated and demanding task to get in and down to the climbers," local emergency manager Tor Einar Bakken told the broadcaster. Fire and police officers reportedly recovered his body on Tuesday morning using ropes and by abseiling, as poor conditions meant it was not possible to use a helicopter.
