id: bbc_2024_24274
title: Scuffles as thousands attend rival demonstrations in Glasgow - BBC News
date: '2024-09-08'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c20r7wzke97o
content: |-
  Anti-racism demonstrators outnumber a smaller anti-immigration protest in the city's George Square.

  Two arrests were made during the demonstrations

  Angry exchanges have taken place as thousands of anti-racism protesters and a smaller number of anti-immigration demonstrators gathered in Glasgow. Police briefly drew their batons and shouted at protesters to get back as tensions flared. Two people were arrested during the protests. A BBC reporter at the scene estimated that two to three thousand people joined the anti-racism rally in George Square, with about 350 at the rival demonstration. A group of masked men, believed to be from the Green Brigade "ultra" group of Celtic fans, were contained by police in a corner of the square.

  Police kept the rival demonstrations apart

  Police had erected barriers to separate the two groups of demonstrators. But at one point a man brandishing what appeared to be two sticks rushed towards the square before being grabbed by police and bundled into the back of a police van. Another man was chased after winding his way through the anti-immigration side of the demonstration and making remarks to those protesting. A separate man was then tackled to the ground by officers. The masked group of men, believed to be from the Green Brigade, had earlier tried to join the anti-racism side of the demonstration but were guided away by police.

  Far-right activists rushed to confront them, singing "Rule Britannia" and spooking some police horses. The masked group were contained by police vans and mounted officers, before eventually being allowed to leave one-by-one and directed away from the square. A spokesperson for Police Scotland said: "Officers contained a small group of people within George Square to engage with them, maintain public safety and minimise disruption. "Containment is an approved tactic used by highly trained officers where a breach of the peace is taking place or is reasonably thought to be imminent." One man, aged 20, was arrested for possession of an offensive weapon while the second, 40, was arrested for an alleged hate crime.

  The demonstrations came after a wave of disorder in England following false online reports than an asylum seeker carried out the stabbing of children in Southport in July which led to the deaths of three young girls. Speakers at the rally, organised by Stand Up To Racism Scotland, included trade unionists, politicians and campaigners.

  Glasgow City Council leader Susan Aitken told BBC News neither Scotland nor Glasgow were "immune to the far right". She added: "The turnout of people who are here to resist them and more importantly come with a really positive message about diversity and unity in a city like Glasgow - which is Scotland's most diverse city - is a far bigger number."
