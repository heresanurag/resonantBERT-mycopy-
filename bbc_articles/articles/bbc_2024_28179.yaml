title: Newtownards arson attack possibly linked to loyalist feud - BBC News
date: '2024-11-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cnvj6nr8mmgo
content: |-
  The attack happened on Sunday morning at a property in Weaver's Grange in Newtownards.

  The attack took place at a house in Weaver's Grange in Newtownards

  An arson attack that caused extensive damage to a house in County Down could be linked to an ongoing loyalist feud, police have said. The attack happened shortly before 00:40 GMT on Sunday at a vacant property in Weaver's Grange, Newtownards. An accelerant had been poured over the door and through the letterbox. The fire caused significant damage to the front door and smoke damage throughout the house.

  Det Insp Ryan said it was a “completely reckless” attack which could have had serious consequences for those in the neighbouring property. "Thankfully, our fire service colleagues were able to extinguish the blaze before it spread to them," the officer said. The Police Service of Northern Ireland (PSNI) said it was following a number of lines of enquiry and has appealed for information. It is understood the same house was targeted in an arson attack last November. Police have been investigating a series of incidents they believe are linked to feud between rival drugs gangs previously associated with the Ulster Defence Association (UDA). There were attacks in Bangor, Newtownards, Donaghadee and Ballywalter last year.

  Alliance councillor Vicky Moore said the perpetrators had "nothing to offer" the community. “There have been a number of arson attacks and other incidents," she said. "It's very disrupting for the families and the other people that live here." In addition to the arson attacks, Ms Moore said there had also been incidents of "sectarian graffiti" in the area.
