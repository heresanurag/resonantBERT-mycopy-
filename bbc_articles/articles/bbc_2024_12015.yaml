  Christian Eriksen's goal was not enough to give Denmark victory as Slovenia fought back in their Euro 2024 Group C game.

  Christian Eriksen's brilliant first-half goal was not enough to secure Denmark victory as Slovenia impressed in the second half to secure a draw in the opening Group C match at the Stuttgart Arena.

