title: Blue Ghost spacecraft captures marvelous views of the moon - BBC News
date: '2025-03-06'
section: General
url: http://www.bbc.co.uk/news/videos/cge11x14py4o
content: |-
  Firefly Aerospace's Blue Ghost shuttle will attempt to make a descent on the lunar surface on 2 March.

  Firefly Aerospace, a Texas-based private aerospace company, has released video from its Blue Ghost spacecraft orbiting the Moon.

  Since entering the Moon's orbit on 13 February, the lunar lander has been preparing for its landing.

  It will attempt to descent to the lunar surface on 2 March. If it succeeds, Blue Ghost would become the second private spacecraft to successfully soft-land on the Moon.
