title: 'Ella Toone: Lioness''s family celebrate win at star''s local pub - BBC News'
date: '2023-08-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-66522927
content: |-
  Ella Toone's family joined raucous celebrations of her stunning goal at The Union Arms in Tyldesley.

  The family of England's Ella Toone and other regulars at a pub which bears a mural of her have gone wild for the star's goal in the Lionesses' semi-final victory at the World Cup.

  The Manchester United midfielder's Euro 2022 heroics saw her image painted on the side of The Union Arms in her home town of Tyldesley in Wigan.

  Her family and other fans crowded into the pub for the semi-final against Australia and were not disappointed, as Toone's stunning opener put England on the road to victory.

  Landlady Sharon Mattin said those assembled knew "Ella would do it".

  "We knew it was going to be her game," she added.

