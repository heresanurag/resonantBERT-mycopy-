content: |-
  No changes needed to McLaren car - Norris

  Norris described his win in Melbourne last weekend as "stressful but rewarding"

  Lando Norris says McLaren will not have to modify their car following the introduction of stricter tests on flexible wings for this weekend's Chinese Grand Prix. The 25-year-old Briton said McLaren's car already complied with the new tests when it raced at last weekend's Australian Grand Prix, which Norris won. Norris said: "We don't have to change anything. Ours was fine. In fact, ours was too good and we are not pushing the limits enough. "Already if this new (ruling) was in place last weekend, we'd also be fine. So it's not directed at us. It's directed at other teams, which probably means we need to push it even more." McLaren have been at the centre of discussions about wing flexing since last year, when Red Bull made a series of accusations against them. Red Bull have continued to believe that McLaren are exploiting flexi-wings this season.

