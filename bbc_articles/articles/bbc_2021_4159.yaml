title: 'Prince Philip funeral: William and Harry seen chatting after ceremony - BBC
  News'
date: '2021-04-17'
section: UK
url: http://www.bbc.co.uk/news/uk-56788998
content: |-
  The funeral of their grandfather marked the princes’ first public appearance together in more than a year.

  The Duke and Duchess of Cambridge were seen chatting with the Duke of Sussex after the service

  The Duke of Cambridge and the Duke of Sussex were seen talking together as they left the funeral of their grandfather, the Duke of Edinburgh.

  The brothers spoke as they left St George's Chapel in Windsor, alongside the Duchess of Cambridge.

  It is the first public meeting of the pair since Prince Harry stood down from royal duties more than a year ago.

  Last month, Prince Harry hinted at ongoing difficulties between him and Prince William.

  In an interview with Oprah, he said the two were on "different paths", and that "the relationship is 'space' at the moment".

  On Saturday, the princes walked with their cousin Peter Phillips in between them, as they walked behind their grandfather's coffin on its short journey to the chapel.

  It was nearly 24 years since the two brothers made a similar walk together at the funeral of their mother Diana, Princess of Wales.

  Prince William and Prince Harry walked either side of their cousin Peter Phillips, who trailed slightly behind them

  At the funeral service, the 30 members of the congregation wore face masks and socially distanced in line with Covid restrictions, with the Queen seated alone.

  Also alone, Prince Harry sat on the opposite side of the aisle to his brother and sister-in-law Catherine.

  Prince Harry's wife, Meghan, who is pregnant with their second child, did not attend the funeral on the advice of her doctor and instead stayed at their home in California.

  The service, conducted by the Dean of Windsor, paid tribute to Prince Philip's "kindness, humour and humanity" and the "many ways in which his long life has been a blessing to us".

  The body language didn't look encouraging on the walk down to the chapel, though it was hardly the occasion for fraternal chit-chat.

  The cameras did catch William and Harry as they left the chapel after the duke's funeral. Harry was talking to Catherine - William seemed a little reluctant to engage.

  There is a rift. It is a distraction nobody would have wanted on a solemn occasion such as this and certainly not their grieving grandmother.

  William feels let down and Harry appears to feel resentful. He is also very caught up in the lifestyle and attitudes of California.

  So what impact, one wonders, will this brief but intense re-immersion in his old life have had on Harry?

  He's been surrounded by his family on a day of heightened emotion. He's been surrounded too by the military and ceremonial: two things which he professes to admire.

  Everything today must have said "duty" to him, the thing many say he's walked away from.

  Will it have given Harry any second thoughts about the path he's taken? Will it have softened William's disappointment with his younger brother?

  And most important, did they find time for a proper heart to heart, in deference to the memory of their grandfather who would undoubtedly urge them to move on and sort this out?

  The duke's association with the Royal Navy and love of the sea also featured heavily, including through the 1860 hymn Eternal Father, Strong to Save, by William Whiting.

  After the ceremony, Prince Harry joined Prince William and Catherine as they left the chapel. The three chatted together as they made their way up the hill to the main grounds of the castle.

  Like the other royal spouses, the Duchess of Cambridge was not part of the pre-funeral procession and was instead taken to the chapel by car

  Meghan and Prince Harry sent a floral wreath which included the national flower of Greece, to represent Prince Philip's heritage, and sea holly, to represent the Royal Marines.

  The card on the wreath was handwritten by Meghan, who is skilled in calligraphy and used to write wedding invitations.
