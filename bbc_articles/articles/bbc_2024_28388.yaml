title: Lucy Letby 'likely murdered more children', doctor tells inquiry - BBC News
date: '2024-11-19'
section: England
url: http://www.bbc.co.uk/news/articles/c4gp8p0493go
content: |-
  Lead consultant Stephen Brearey said he believed Lucy Letby had murdered children prior to June 2015.

  Dr Stephen Brearey said he began to associate Letby with unexplained deaths in 2015

  A senior doctor who raised the alarm about Lucy Letby has told a public inquiry it was “likely” the nurse murdered or assaulted more children before June 2015. Stephen Brearey was lead neonatal consultant at the Countess of Chester Hospital where nurse Letby murdered seven babies and tried to murder seven others between June 2015 and June 2016. He led a group of seven consultants who spent months raising concerns Letby was deliberately harming babies. Dr Brearey said "on reflection" it was likely she had attacked and killed babies previously.

  The public inquiry, chaired by High Court judge Lady Justice Thirlwall, is examining the circumstances surrounding Letby's crimes. Dr Breary said: “On reflection I think it’s likely that Letby didn’t start becoming a killer in June 2015, or didn’t start harming babies in June 2015. “I think it’s likely that her actions prior to then over a period of time changed what we perceived to be abnormal.” But he said nobody in the hospital had suspected Letby was harming children prior to that date. Dr Brearey added that the reporting culture on the unit was good but “in retrospect” he believed some of the incidents between June 2015 and June 2016, and “probably before”, were deteriorations of babies that could have trigged further investigation. The inquiry also heard the nurse had been redeployed from the hospital's neonatal unit to a clerical role in July 2016 after a series of babies had either died unexpectedly or come close to death during the previous year. Consultants insisted Letby should be removed from nursing duties, the hearing heard. After an internal grievance procedure lodged by Letby was upheld in her favour, though, the way was paved for her to return to nursing. And, in January 2017, hospital bosses called the consultants to a meeting where chief executive Tony Chambers told them to apologise to Letby and her family. At that meeting, head of nursing in the urgent care division Karen Rees then read out a statement from Letby. Giving evidence at the public inquiry in Liverpool, Dr Brearey said: “The whole meeting felt choreographed and Karen Rees was quite dramatic in her reading of it. "We were all quite stunned - as a synopsis of executive behaviour I can’t imagine an example of anything more incompetent in the history of the NHS. "How you can start a meeting saying you follow ‘Speak Out Safely’ practices and then tell all seven consultants that have significant concerns that they have to apologise to the person? And that she would be going back to work or else there would be consequences? "It was quite striking and surprising and upsetting for most people there."

  Lucy Letby killed four more babies after Dr Stephen Brearey first became suspicious of the neonatal nurse in 2015

  At the time suspicions about Letby were being raised, trust had broken down between members of the unit's staff, said Dr Brearey. He said it sometimes felt like he was working in "North Korea or East Germany", unable to "have an open conversation" with colleagues. This, said Dr Brearey, was "really sad". The inquiry heard that Dr Brearey had previously suggested that a number of former bosses were freemasons. Richard Baker KC, representing some of the babies’ families asked the consultant: “You had a sense that there might be some deals going on behind the scenes, some element perhaps of corrupt behaviour?” Dr Brearey answered, “Yes, people had that impression and there were certainly rumours of that kind”. Earlier, the lead consultant began his evidence by apologising to the parents of babies attacked by Letby. "I’m sorry for my part in not being able to protect your babies," he said. "I can just say that I tried my best, and I acknowledge that at times my best was not enough. "I hope you all get the truth and justice that you deserve." Letby, 34, from Hereford, is serving 15 whole-life orders after she was convicted at Manchester Crown Court of murdering seven infants and attempting to murder seven others, with two attempts on one of her victims. The public inquiry, sitting at Liverpool Town Hall, is expected to sit until early in the new year. Its findings will likely be published in the late autumn of 2025.
