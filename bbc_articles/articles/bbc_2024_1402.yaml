title: Eni Aluko 'genuinely scared' after online abuse - BBC Sport
date: '2024-01-17'
section: General
url: http://www.bbc.co.uk/sport/football/68001449
content: |-
  Former England footballer Eni Aluko says she has "taken advice from lawyers" after receiving online abuse.

  Last updated on .From the section Football

  Former England forward Eni Aluko says she has "genuinely been scared" after receiving online abuse.

  Ex-Manchester City midfielder Joey Barton this month compared Aluko and co-commentator Lucy Ward to serial killers Fred and Rose West.

  ITV criticised the "vindictive remarks", while sports minister Stuart Andrew said the "dangerous comments open the floodgates for abuse".

  "I felt under threat this week," Aluko said on Instagram.

  The 36-year-old posted two emotional videos on the social media platform on Tuesday evening.

  "I'm human, and I'm more than happy to admit I've been scared this week," she said.

  "I've genuinely been scared. I didn't leave my house until Friday, and I'm now abroad, because it's really important to say that online abuse has a direct impact on your safety and how you feel, and how safe you feel in real life.

  "I felt like something was going to happen to me. And I don't say that for anyone to feel sorry for me, I say that for people to understand the reality and the impact that hate speech has; the impact that racism has; the impact that sexism and misogyny has on all of us females in the game."

  Aluko said her experience was "not an isolated incident" and that such abuse is "showing up as a culture in the game, from certain fanbases and certain people".

  "They're creating a culture where people don't want to go to work, people don't want to leave their house, people feel under threat. Obviously there's a big impact on mental health as well," she said.

  Barton responded on Wednesday, suggesting he had little sympathy for Aluko and reiterating his stance on female pundits in the men's game.

  Since last month Barton, who was sacked as Bristol Rovers manager in October, has repeatedly used social media to criticise women working in men's football. While his comments have been widely condemned, they have fuelled further abuse.

  In response to a now-deleted video clip of Aluko's pre-match punditry posted by ITV Football on X, he compared her and Ward to "the Fred and Rose West of football commentary".

  ITV said: "For Joey Barton, an ex-professional player with a significant social media presence, to target two of our pundits, Eni Aluko and Lucy Ward, with such vindictive remarks based on gender and to invoke the names of serial killers in doing so is clearly contemptible and shameful on his part."

  Former Chelsea and Juventus forward Aluko scored 33 goals in 102 games for England before retiring in 2020.

  She won four Women's FA Cups and three Women's Super League titles.

  "Over the past week I have taken advice from lawyers and a course of action has now been decided on," she said.
