title: 'Ballygowan: Man charged after Brae Grove shotgun attack - BBC News'
date: '2024-06-24'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c3gggn6n4vno
content: |-
  The 44-year-old is charged with attempted murder, possession of a firearm and criminal damage.

  A 44-year-old man has been charged with attempted murder after shots were fired through the window of a house in County Down on Saturday.

  Police said a woman in her 60s was struck on her head and back with shotgun pellets after they were fired through the window in Brae Grove, Ballygowan, just after 23:00 BST.

  The man has also been charged with possession of a firearm with intent to endanger life and criminal damage.

  He is due to appear before Newtownards Magistrates' Court on Tuesday.
