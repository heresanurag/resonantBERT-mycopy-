title: Video shows moment earthquake hits California and leaves damage - BBC News
date: '2024-12-05'
section: General
url: http://www.bbc.co.uk/news/videos/c5y8xqx5eqlo
content: |-
  A tsunami warning was cancelled after the 7.0 magnitude quake shook parts of the West coast.

  California residents filmed the moment a 7.0 magnitude earthquake hit the state, prompting light fixtures to move and water to overflow from residential pools.

  A tsunami warning was issued but has since been cancelled for the coasts of both northern California and southern Oregon.
