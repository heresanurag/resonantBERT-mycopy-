content: |-
  West Ham are interested in Newcastle defender Kieran Trippier, Manchester United might offer Sander Berge a £100,000-a-week contract, plus more.

  West Ham target Kieran Trippier, Manchester United might offer lucrative contract to lure Sander Berge to Old Trafford, Chelsea agree a deal to sign Samu Omorodion. West Ham United are interested in England right-back Kieran Trippier, with the 33-year-old's future at Newcastle yet to be decided. (Telegraph - subscription required), external Manchester United might tempt Burnley and Norway midfielder Sander Berge, 26, to Old Trafford by offering him a £100,000-a-week contract. (Sun), external Former Tottenham and Chelsea boss Mauricio Pochettino is emerging as a leading candidate to become the next England manager and the 52-year-old Argentine is open to succeeding Gareth Southgate. (The I - subscription required), external Crystal Palace want to re-sign winger Wilfried Zaha for a third time after Galatasaray told the 31-year-old Ivory Coast forward he is free to speak to other clubs. (Telegraph - subscription required), external Chelsea have agreed a £35m deal with Atletico Madrid for Spanish forward Samu Omorodion and the 20-year-old is set to have a medical. (Fabrizio Romano), external Real Sociedad expect Spain midfielder Martin Zubimendi to accept a move to Liverpool, although the clubs still need to agree a deal for the 25-year-old. (Athletic - subscription required), external Chelsea and Albania striker Armando Broja will hold talks with manager Enzo Maresca to work out his future. Everton and Wolves are among those interested in the 22-year-old. (Mail), external West Ham are interested in Chelsea's English defender Trevoh Chalobah, 26, and 35-year-old Germany centre-back Mats Hummels, who is a free agent after leaving Borussia Dortmund. (Sky Sports), external Crystal Palace are also eyeing Chelsea defender Chalobah as well as Wolfsburg's French defender Maxence Lacroix, 24, as centre-back options. (Telegraph - subscription required), external Chelsea have been contacted by Rangers over a loan for 19-year-old academy midfielder Leo Castledine. Aberdeen are also interested in the Englishman. (FootballScotland), external
