title: Angela Rayner says questions over her tax affairs are a 'smear' - BBC News
date: '2024-03-22'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68632621
content: |-
  Labour's deputy leader tells BBC Newsnight she has been assured by tax experts she owes no money.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Rayner says she is the victim of a 'smear' over her 2015 house sale

  Angela Rayner has told the BBC she is the victim of a "smear" and has received professional advice that she owes no tax on the sale of her home.

  Labour's deputy leader was speaking in her first broadcast interview since claims emerged that she may have owed capital gains tax on the 2015 sale of a property in Stockport.

  Ms Rayner told Newsnight there had been "no wrongdoing" and "no unlawfulness".

  She continued: "It is a non-story manufactured to try and smear me."

  Claims about Ms Rayner's tax affairs first emerged in a biography by former Conservative Party treasurer Lord Ashcroft.

  It raised questions about whether a house she previously owned was her principal residence at the time, a distinction which could have had an impact on how much tax she owed when it was sold.

  Ms Rayner bought the former council house in Vicarage Road, Stockport for £79,000 in January 2007.

  In September 2010 she married Mark Rayner, who owned a separate house nearby in Lowndes Lane.

  She has described her Vicarage Road home as her "principal house" but said she did spend time at her husband's home.

  In March 2015, two months before she became an MP, Ms Rayner sold the Vicarage Road property for £127,500, a gain of £48,500. The couple separated in 2020.

  Earlier his month, Greater Manchester Police said there was no evidence that any offence had been committed after Conservative MP James Daly asked them to investigate if she had given false information.

  Ms Rayner told the BBC: "I've been very clear there's no rules broken. They [the Conservatives] tried to manufacture a police investigation.

  "They [the police] said there's no issues there. I got tax advice which says there was no capital gains tax. It's a non-story manufactured to try and smear me."

  Ms Rayner acknowledged that she commissioned professional tax advice recently after the claims about the house sale emerged.

  She said: "I was a home care worker, you know, I didn't have an accountant. I had, as most people would: you put your house on the market, you get a legal conveyancing solicitor and you get an estate agent.

  "But since those allegations were put to me, I got expert tax advice to make sure that I hadn't done anything wrong."

  The tax expert Dan Neidle has estimated that Ms Rayner could be liable for a Capital Gains Tax bill of £1,500. In a Sunday Times article he suggested Ms Rayner could have avoided a tax bill if she met one of two conditions:

  The Labour deputy leader acknowledged that at the time of the sale of her house in 2015 she was not aware of the HMRC rules cited by Mr Neidle, which state married couples or civil partners can only count one property as their main residence.

  Ms Rayner told Newsnight: "No, I wasn't aware of the HMRC rules... when I sold that property.

  "As I say, I sold it as most people would put it on the market, got the solicitor and the estate agents, etc. since those allegations were put to me, the tax laws on capital gains tax and principal private residency, etc. is very complex, including marriage.

  "I got that advice that is categoric that I do not owe any capital gains tax on that."

  Asked whether she had met one of the two conditions outlined by Mr Neidle, Ms Rayner declined to answer those points in detail. She insisted she owed no tax.

  She continued: "I think what Dan was saying and he acknowledged that, look, she could owe nothing, actually, because the rules are complex and these are various different ways to which it's calculated.

  "But I got back that expert advice because if I did owe any capital gains tax, I would have said and I would have paid it.

  "But I don't owe any capital gains tax because of the circumstances. And I've gone through that with a tax expert, and they've given me that advice."
