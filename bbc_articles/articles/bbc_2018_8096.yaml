  • None England have lost three of their past five matches - their previous three losses came over a period of 28 matches.
  • None The Three Lions lost back-to-back matches for the first time since June 2014, when they were beaten by Italy and Uruguay at the 2014 World Cup.
  • None This was England's 100th match at a major tournament - 69 at the World Cup, 31 at the European Championship. They have won 39, drawn 32 and lost 29 of those.
  • None England lost three matches at a major tournament for only the second time, also losing three times at Euro 1988.
  • None Since 1966, no player has been involved in more World Cup goals for Belgium than Hazard (seven - three goals and four assists), level with Jan Ceulemans (also four goals and three assists).
  • None Meunier was the 10th player to score for Belgium at this Russia 2018, the joint most by a team at a World Cup - also 10 for France in 1982 and Italy in 2006.
  • None Kane ended the 2018 World Cup with six goals from six shots on target - however, he had just one shot on target in his final four games (his penalty against Colombia in the last 16).
  • None England had as many shots on target in this match as they managed in their previous three knockout games combined (six).
