title: Starmer condemns 'far-right thuggery' as unrest continues - BBC News
date: '2024-08-05'
section: General
url: http://www.bbc.co.uk/news/videos/cjerrqzqx39o
content: |-
  The PM told those involved in the unrest: "You will regret taking part in this".

  UK Prime Minister Sir Keir Starmer has condemned the ongoing riots around the UK, classifying them as "far-right thuggery".

  Starmer promised that those involved in the unrest would "face the full force of the law."

  He said people in the UK "have a right to be safe" and yet we've seen "Muslim communities targeted... Nazi salutes in the street".

  "I won't shy away from calling it what it is - far-right thuggery," he added.
