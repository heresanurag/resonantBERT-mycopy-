  The downside for Fury is he will inevitably attract criticism over the fact only 8,249 of the 20,000 seats at the arena were filled.

  Concerts featuring the likes of Calvin Harris and Drake on the strip may have played a role, but Fury will probably care little as this was in many ways a bucket-list event for him on Mexican Independence Day weekend.

  Mexico's Saul 'Canelo' Alvarez has taken this Las Vegas fight night in the past two years, while the likes of Oscar de la Hoya and Floyd Mayweather have filled the coveted fixture in the past.

  And Fury entered the ring in a style befitting an occasion, sporting a poncho featuring the Mexican flag and a sombrero, and then boarding a parade float for his journey to ringside.

  Those here could have been forgiven for thinking such an entrance may have fallen flat with a routine win, and early on it felt like Fury was toying with his opponent - before he found his range with a three-shot combination in the second round.

  It looked like he was slipping into gear, only for Wallin to turn what could have been a boxing exhibition into an up-close, blood-filled tussle.

  Some may ask what Fury gets out of beating the likes of Wallin. The answer is money, further profile in the US and, crucially, the type of in-ring activity he simply did not have when, just six-months into his comeback, he faced Wilder last year.

  When the cuts heal, this will have further developed his engine and ring craft - and ultimately done him no harm at all.

  What now for Fury?

  Before Fury left the ring, his white shorts now a light shade of red, he had already mentioned American Wilder as his next opponent.

  Both have repeatedly spoken of a rematch, which, if you listen to the Briton, is slated for 22 February.

  That date looks a tall order given Wilder should have a fixture with Luis Ortiz in November and, as is the way in boxing, the rumour mill says he may have plans that do not include Fury.

  Fury has said he would explore legal options if the 33-year-old goes elsewhere and he has even spoken of fighting in December to keep sharpening his skills in readiness.

  Promoter Bob Arum this week barked that "he's not fighting in December" because he wants to take any risk of a slip-up out of the equation. After Saturday's cuts, fighting again this year is now an impossibility.

  Wilder may feel Fury's scare in Las Vegas shows he can get at his rival if they meet again. Team Fury will undoubtedly think their man is in far better shape now than he was in their Los Angeles thriller.

  This hard-earned win was a case of job done. As those in attendance spilled out of the arena and back on to the famous Vegas strip in search of good times, fans around the world will now hope all roads lead to an adventure with Wilder.

  Tyson's father, John Fury, said he was "proud" of his son for "how he mauled his way through", but also claimed changes needed to be made to the fighter's preparation and team.

  "It's the worst I've seen from Tyson," he told BT Sport Box Office. "He has to be honest and say things are not right. For a man to be in that condition after eight weeks camp, it looked like he had nothing after round two.

  "His strength and power went tonight. He was as weak as a kitten from the first round. At 18st 1lb, I've warned him and warned him. He is a 19st fighter.

  "If I had my way, the lot [Tyson's team] would be gone. If they keep that team that will be his career [gone]."

  On the two cuts around the right eye, John Fury said: "An injury like that could finish a career."

  Fury's trainer Ben Davison defended himself and said he was "happy" with his fighter at the end of a test few saw coming.
