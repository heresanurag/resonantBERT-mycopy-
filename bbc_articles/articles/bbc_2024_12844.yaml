content: |-
  A 73-year-old author who uses a wheelchair says she was left behind as her flight to Scotland took off.

  Wheelchair user 'distraught' after flight leaves her behind on tarmac

  Author Liz Weir has spoken of her shock at the incident

  A Northern Ireland author has said she was left distraught after she was left stranded "on the tarmac" in a wheelchair at a Belfast airport as her flight departed without her. Liz Weir said airlines need to re-think how they treat passengers with additional needs. She was due to board an easyJet flight from Belfast International to Edinburgh, where she had been due to host an event on Friday. The County Antrim woman uses a wheelchair due to a heart condition, which meant she had to wait along with another wheelchair user for the rest of the plane's passengers to board. She told BBC News NI that when she arrived at the steps to take her turn to board the 13.00 BST flight, the pilot gave a signal to suggest that she could not do so. They then watched from the tarmac as the plane left without them. The airline said two other passengers were also affected.

