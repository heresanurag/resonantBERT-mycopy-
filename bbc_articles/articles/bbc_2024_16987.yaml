  Welshpool’s costume is adorned with prominent Welsh flags across the chest and shoulders. At one point during the film, the camera pauses to highlight the character in an obvious nod to Reynolds’ newfound Welsh connection. “Clearly I was the only Welcome to Wrexham fan in my theatre, because there were some LOOKS when I exclaimed ‘WREXPOOL!’ and ‘Super Paul Mullin!’,” said one fan on X, external.

  Hugh Jackman and Ryan Reynolds star in the new Deadpool and Wolverine film

  Reynolds and fellow Hollywood actor Rob McElhenney bought Wrexham AFC in 2020 and have seen the team promoted to League One. The takeover and the club's subsequent promotions have been documented in the TV series Welcome to Wrexham. The football club has since updated its player profile for Mullin to feature him in his Welshpool costume, external. Mullin was not the only Wrexham footballer to appear in Deadpool & Wolverine. Fellow striker Ollie Palmer also made a cameo as a bartender in the background of one scene. Deadpool & Wolverine, starring Reynolds and Hugh Jackman as Wolverine, was released in the UK on 25 July.
