content: |-
  Wrexham striker Paul Mullin has made a surprising cameo in Ryan Reynolds' new film, Deadpool and Wolverine.

  Wrexham AFC striker Paul Mullin has played a surprise role in Deadpool & Wolverine, the new Marvel comic book film. His masked cameo sees Mullin star as Welshpool – a Welsh version of Ryan Reynolds’ character Deadpool. “You may have noticed one member of the Deadpool Corps was far deadlier than the rest. WELSHPOOL,” said Reynolds on X, external, formerly known as Twitter. Welshpool appears during a sequence which sees hoards of Deadpool variants together on screen.

