  Mounted police galloped after a man who fled on foot when officers approached him in Jacksonville, Florida.

  Bodycam video released by Jacksonville Sheriff's Office in Florida has captured a dramatic police chase.

  Officers on horses galloped after a suspected drug dealer who tried to escape on foot.

  The chase led them across traffic, a fast food drive-through and a car park, before the man eventually surrendered.
