title: Donald Trump labels alleged Turnberry vandals 'terrorists' - BBC News
date: '2025-04-01'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c0r5wkee8z5o
content: |-
  The US president said he hoped those who caused damage to his resort would be 'treated harshly'.

  The Trump Turnberry resort was targeted earlier this month

  Donald Trump has labelled people accused of vandalising the Trump Turnberry golf resort as "terrorists". Grafitti was sprayed on the clubhouse in red paint and the course was dug up and daubed with the words "Gaza is not for sale" The US president said those who caused damage at the Ayrshire resort should be "treated harshly" by authorities. Kieran Robson, 33, appeared at Ayr Sheriff Court on Monday on a single charge of malicious mischief in connection with the incident. He made no plea and was released on bail.

  The case was committed for further examination, with Mr Robson, of Galashiels, set to appear again at a later date. Another man, aged 75, and a 66-year-old woman were previously arrested and released pending further inquiries.

  In an earlier post on his Truth Social platform, after a conversation with Sir Keir Starmer, Trump incorrectly claimed that "three people were in prison" over the incident. He wrote: "I was just informed by Prime Minister Starmer of the United Kingdom, that they caught the terrorists who attacked the beautiful Turnberry, in Scotland. "They did serious damage, and will hopefully be treated harshly. "You cannot let things like this attack happen, and I greatly appreciate the work of Prime Minister Starmer, and UK law enforcement."

  Police were called to the resort, on Maidens Road in the South Ayrshire village, at about 04:40 on 8 March. The incident came after Trump sparked international concern by suggesting he wanted to turn Gaza into a resort, displacing Palestinians in the process. He suggested the US could "take over" Gaza following talks with the Israeli prime minister Benjamin Netanyahu. Police Scotland said inquiries into the vandalism were ongoing.
