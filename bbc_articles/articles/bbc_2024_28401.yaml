title: Man jailed for role in Max Dixon and Mason Rist murders - BBC News
date: '2024-11-19'
section: Bristol
url: http://www.bbc.co.uk/news/articles/c5yg7lwe66yo
content: |-
  "Weak and cowardly" Antony Snook was part of the group that killed Mason Rist and Max Dixon, a court hears.

  Antony Snook will serve a minimum of 38 years in prison

  A man who drove four teenagers on a revenge mission that led to two best friends being murdered has been jailed for life. Mason Rist, 15, and Max Dixon, 16, died after being stabbed by the teenagers in a case of mistaken identity outside Mason's home in Knowle West, Bristol, on 27 January. Antony Snook, 45, from Hartcliffe, tried to claim he had been oblivious to their plan but a jury rejected this defence and found him guilty of the murders. He will now serve a minimum of 38 years in jail. Riley Tolliver, 18, and three boys, aged 17, 16 and 15, were also found guilty of murder and will be sentenced on 16 December.

  Max Dixon, 16, (left) and Mason Rist, 15, (right) had been friends since nursery

  Sentencing Snook at Bristol Crown Court, the honourable Mrs Justice May told him there had been multiple opportunities to "stop this madness, to lock the car doors... or to have refused to leave Hartcliffe with them in the first place". She said: "You were the only adult. "You were so weak and cowardly to lend yourself to the revenge scheme of others." She added that it was "impossible to fathom" why he had agreed to drive the four boys in his car to the area. "You would have experienced the atmosphere in that car, felt the blood lust. Mason and Max, tragically in the wrong place at the wrong time," she said. Members of Max and Mason’s families wept and embraced after the sentence was passed while Snook remained emotionless.

  Boxes of tissues were passed along the jury bench and handed out to the families as their impact statements were read. Mason’s sister, Chloe took to the witness box as she talked about the close bond she and her brother shared. At one point she turned her whole body to address Snook. He held her gaze through the glass, dipping his head slightly. She said: "Although I haven’t seen any remorse or regret, it must weigh heavy on you that you got the wrong boy, a mistake that has cost us all so dearly. "Mason wasn’t your enemy. He could have been your friend, but now he’s your victim." It was a really hard listen. Det Supt Gary Haskins, who has led this double murder investigation, listened with his head in his hands. Just before leaving the witness box, Chloe turned to the jury with tears streaming down her face, thanking them for bringing justice to her brother. Max’s mum Leanne hung her head and sobbed as she listened to Snook being sentenced to 38 years. He’s currently 45 and it didn’t take him or anyone very long to realise he will be 83 when he’s freed, so the real possibility is he’ll die in prison.

