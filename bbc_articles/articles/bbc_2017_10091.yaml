title: 'Kurz and charisma: What propels young leaders to power? - BBC News'
date: '2017-10-17'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-41640326
content: |-
  Austria's Sebastian Kurz is just 31 - but he is not the first "Wunderkind" in modern politics.

  "Black is Cool": Sebastian Kurz (sitting, centre) in a campaign photo in 2011

  In Austria they call him "Wunderwuzzi" - meaning "whizzkid" or "hotshot".

  At just 31, the conservative Sebastian Kurz is poised to become Europe's youngest leader, after giving the Austrian People's Party a dramatic makeover.

  No detail is too small for the ambitious young politician eyeing the summit of political power.

  In 2011 Mr Kurz posed on a jeep for a "Black is Cool" party campaign - when black was the party colour. But for this election, in which he emerged the clear winner, he made the party turquoise, in a big rebranding exercise.

