  The new colour obviously worked. But what else has propelled charismatic young politicians into power in recent years?

  Mr Kurz is the latest youngster to take his country's political establishment by storm and shake it up.

  France elected President Emmanuel Macron, just 39, who revolutionised politics by launching a new liberal party, La République En Marche! (LREM). Just weeks after his presidential election triumph came LREM's clear victory in parliamentary elections.

  He is France's youngest head of state since Napoleon.

  In 2014 Italy got its youngest ever prime minister - Matteo Renzi, then aged 39 too. Like Mr Macron, he had never served in parliament, and was a novice in national politics.

  But little Estonia upstaged even those "Wunderkind" examples. The vaulting political ambition of Taavi Roivas made him prime minister in 2014-2016, and he is still only 38.

  Their success proves that voters are looking for much more than experience when they elect politicians. Youth and charisma clearly count for a lot, along with persuasive campaign rhetoric.

  Some fear that in this digital age, dominated by powerful images and social media, style may often triumph over substance in politics.

  "They look slick, but do they have the same amount of substance?" asks Kadri Liik, an Estonian political expert at the European Council on Foreign Relations think-tank.

  "I sometimes fear what I call a 'davidcameronisation' of Estonian politics: politicians who look good, speak well, mean well, but lack true seriousness," she told the BBC.

  She deplored a "tendency to believe that life is all about PR [public relations], performance, speeches and party politics".

  David Cameron's defeat in the UK's 2016 Brexit referendum was a PR disaster - for a man who had been a PR professional before rising to the top of British politics.

  Wunderwuzzi's smart casual image showed he had a shrewd sense that young Austrians were yearning for political change.

  A penchant for open collars and swept-back hair conveyed a boyish image - not like the decades-old stereotype of Austrian coalition wheeling and dealing by men in grey suits.

  Smart casual was also the look of Matteo Renzi. His pose in a white T-shirt and leather jacket led The Guardian to ask if Mr Renzi was modelling himself on "The Fonz", star of the US hit sitcom Happy Days.

  Sophie Gaston, deputy director of the British think-tank Demos, says this new breed of political leaders "share an understanding of the modern forces at play in campaigning - particularly their grasp of digital and social media - and how to harness these to connect directly with voters".

  "This sets them apart from 'traditional' political elites in mainstream parties."

  Mr Kurz, Mr Macron and Mr Renzi all rose through established party structures, but managed to convince voters that they were a breath of fresh air, intent on serious reform.

  In that respect, Ms Gaston told the BBC, they have connected with many voters' rejection of the political establishment, especially since the 2008 financial crash.

  "They are either seen as untainted by affiliation to this political hegemony or, as in the case of Macron, willing to take risks and challenge political orthodoxy."

  Barack Obama projected a sporty image early on - even before becoming president

  Their communication skills enabled them to outmanoeuvre far-right and far-left populist parties which, Ms Gaston said, were quick to exploit social media.

  Indeed, the far-right Freedom Party in Austria accuses Mr Kurz of stealing its thunder on immigration controls.

  Projecting a fit and healthy image is a feature of these leaders' success.

  On the presidential campaign trail in 2008 Barack Obama played basketball in a photo opportunity in Indiana.

  And as president he was often seen on the golf course - now something of a cliché for US presidents.

  Many leaders today have been photographed jogging, including Canadian Prime Minister Justin Trudeau, a youthful 45.

  But Robyn Urback of Canadian national broadcaster CBC complained "we keep falling for Trudeau's PR".

  It was no accident, she wrote, that his personal photographer snapped him jogging past "a group of kids taking pictures on the boardwalk". It made for a nice "feel good" picture.

  Mr Macron also has a keen eye for image management. Just before his official photo shoot in the Elysee Palace he was filmed obsessively leafing through a book to find just the right page, so that it could be shown open and impressive on his desk.

