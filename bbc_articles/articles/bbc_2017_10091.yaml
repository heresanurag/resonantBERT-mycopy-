  We are living in a time of "general dissatisfaction with the status quo of politics", says Prof Catherine de Vries, a European politics expert at Essex University.

  For decades, she told the BBC, ambitious politicians had to work their way up the party ranks - but that is no longer the case.

  They do, however, need "extreme drive - it's not a nine-to-five job". Youth is an asset, she said, along with vision and a will to change the system.

  Matteo Renzi was known as Il Rottamatore ("The Scrapper") because he fought the centre-left Democratic Party establishment. "I didn't want to submit to their rules," he said.

  Mr Macron abandoned the Socialists when he realised he could woo a vast number of discontented voters outside the party.

  But his popularity has slumped in recent months.

  So the acid test of the new leaders is whether they can walk the walk, as well as talk the talk.
