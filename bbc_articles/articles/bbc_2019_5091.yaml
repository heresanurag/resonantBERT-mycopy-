id: bbc_2019_5091
title: Monmouth MP David Davies called a liar amid rise in threats - BBC News
date: '2019-05-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-politics-48360602
content: |-
  David Davies, who wears a body camera, is called a liar and a traitor while giving an interview.

  David Davies says he uses a body camera because of the abuse he gets.

  The pro-Brexit MP for Monmouth has voted for Theresa May's deal.

  During an interview on the subject, a member of the public called him a liar and a traitor.
