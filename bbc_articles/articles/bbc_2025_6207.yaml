title: Rail minister admits using phone while driving vintage bus in London - BBC
  News
date: '2025-04-12'
section: Politics
url: http://www.bbc.co.uk/news/articles/c24qv74nzq2o
content: |-
  Lord Hendy has apologised in full for the "error of judgement" and will reportedly accept the sanctions.

  The rail minister has admitted using his mobile phone while driving a vintage double-decker bus through London at rush hour. Lord Peter Hendy was behind the wheel of the old Routemaster for a charity event when he was spotted texting a friend, as first reported by the Sunday Times, external. A spokesperson for Lord Hendy said: "Last month Peter Hendy used his phone while driving. He has apologised in full for this error of judgement and has contacted the police." A source close to Lord Hendy said he would accept the sanction, which is likely to be six points on his licence and a fine.

  The incident took place on 28 March during the evening rush hour. Lord Hendy was texting a friend about a prostate cancer test. But he was reported to police just days later by one of the passengers. In a statement, the organisers of the Railway Family Fundraiser said: "None of us would advocate or condone unsafe practices. However, we reiterate that we are not aware of the whole situation, and affirm our hope that any investigation is able to be conducted fairly. "The organisers regret that a positive and enjoyable event ended in this way and would once again like to express our thanks to Lord Hendy for his support for our event and fundraising." It is not the first time a government minister has been caught using his phone while driving. The then security minister and Conservative MP Tom Tugendhat was banned from driving for six months in 2022 after he was caught using his device while behind the wheel. He received six points on his licence for the offence, added to the six he already had for two previous driving offences. He was also ordered to pay a £1,000 fine, a surcharge of £100 and costs of £110. The BBC has contacted the Metropolitan Police for comment.
