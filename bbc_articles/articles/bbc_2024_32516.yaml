  There was also an amber warning for wind covering Wales until 21:00 and a yellow rain warning until noon. A yellow wind warning for all of Wales that came into force at 15:00 on Friday remains in effect until 06:00 on Sunday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Storm Darragh caused widespread damage and travel disruption across the country

  The last red warning in Wales was during 2022's Storm Eunice, which left tens of thousands of people without power. Natural Resources Wales said before the storm the amount of rain expected would be less than that which fell during Storm Bert, which wrought havoc across Wales last month.
