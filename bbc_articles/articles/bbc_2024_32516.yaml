title: Wales sees thousands lose power after Storm Darragh winds - BBC News
date: '2024-12-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cwy3342wdwxo
content: |-
  There have been power cuts across the nation and roofs have been blown off buildings.

  Storm rips roof off chapel and cuts power to 95,000
  • None The whole roof of Pentre Baptist Church in Mochdre, Powys was blown off
  • None The River Wye at Builth Wells burst its banks
  • None The roof of Cylch Meithrin Cei Newydd nursery in New Quay was torn off by Storm Darragh
  • None Huge waves crashed into the coastal wall at high tide in Porthcawl, Bridgend county, on Saturday morning
  • None A snapped telegraph pole and fallen tree block a lane between Dingestow and Monmouth in Monmouthshire
  • None This seafront block of flats in Porthcawl had part of its roof torn off by strong winds
  • None High winds saw trees come down across Wales, including one on this residential street in Cardiff
  • None Surfer braved the wind and waves in Broad Haven, Pembrokeshire
  • None People were waking up to tree damage in Cardiff, including the unfortunate owner of this Porsche
  • None While the north-east of Wales escaped the strong winds of Storm Darragh, Mold in Flintshire suffered flooding on Saturday Slide 1 of 10 , A stone church chapel, with it roof completely blown off. A pile of wood boards and beams covers the graveyard around the building , The whole roof of Pentre Baptist Church in Mochdre, Powys was blown off

  Extreme winds from Storm Darragh have ripped the roof off a chapel while causing power cuts to about 95,000 properties across the country. A red Met Office weather warning, external - the highest level - was in effect between 03:00 GMT and 11:00 GMT in 13 counties with dangerous and perhaps life-threatening conditions predicted, but no serious injuries have yet been reported. It caused widespread damage and travel disruption, including the closure of the runway at Cardiff Airport on Saturday morning. Strong gusts hammered the coasts and hills with the Met Office recording winds of 94mph (150 km/h) at Capel Curig in Conwy county at 08:00.

  A major incident was declared by Dyfed-Powys Police across Carmarthenshire, Ceredigion, Pembrokeshire, and Powys. Supt Chris Neve said there were "robust plans" to deal with the situation. South Wales Police said it was called at about 12:45 on Saturday after a tree fell on a car in Morriston, Swansea. The two occupants of the vehicle were uninjured. Passerby Danny Mac said: "Everybody was okay, thank God, but the road had to be closed. "It was really scary, although the police and fire brigade were on the scene pretty quickly."

  Danny Mac said a "big massive gust of wind" snapped a tree which landed on a car

  The farming village of Mochdre, near Newtown, Powys, was "completely devastated" to find the roof of Pentre Baptist Church gone. Farmer and meat seller Jonathan Rees, 47, said, "the roof is scattered in piles from one end of the graveyard to the other". He said people in the village tried to save the organ and pulpit, but the scene was "too dangerous and the wind was still really strong".

