title: 'Watch: Heavy barrage of missiles intercepted by Israel’s Iron Dome - BBC News'
date: '2024-03-06'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68476386
content: |-
  Dramatic footage shows multiple missiles exploding in the border area between Israel and Lebanon.

  Dramatic footage shows multiple missiles being fired toward Israel and exploding in the sky over its border area with Lebanon.

  The Israeli air force on X says it responded by launching air strikes on parts of Lebanon where it says the missiles were fired from. The BBC has not been able to verify this.

  Israel has been exchanging fire with the Lebanese Islamic group Hezbollah since the start of the war in Gaza.
