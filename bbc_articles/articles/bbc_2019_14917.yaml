title: 'Myanmar Rohingya: How a ''genocide'' was investigated - BBC News'
date: '2019-12-11'
section: World
url: http://www.bbc.co.uk/news/world-45341112
content: |-
  Investigators say a genocide may have been committed in Myanmar. This is how they came to that conclusion.

  About 725,000 Rohingya Muslims have fled Myanmar over the past 12 months, many for Bangladesh

  Indiscriminate killing; villages burned to the ground; children assaulted; women gang-raped - these are the findings of United Nations investigators who allege that "the gravest crimes under international law" were committed in Myanmar last August.

  Such was their severity, the report said, the army must be investigated for genocide against the Rohingya Muslims in the western Rakhine state.

  The investigators' conclusions came despite them not being granted access to Myanmar by the government there, which has since rejected the report.

  This is how the investigators came to their conclusions.

  On 24 March 2017, the UN Human Rights Council agreed to form an independent fact-finding mission on Myanmar to look into "alleged recent human rights violations by military and security forces".

  Five months after the mission was formed, Myanmar's army launched a major assault on Rakhine state, following deadly attacks by Rohingya militants on police posts.

  The military's campaign became the main focus of the investigation, which also looked into rights abuses in Kachin and Shan states.

  The mission wrote to Myanmar's government three times asking for access to the country. It received no response.

  "The first rule was 'do no harm'," says Christopher Sidoti, one of the three people who headed the investigation.

  "Those people we spoke to had been heavily traumatised, and if our staff considered that an interview would be re-traumatising, it wouldn't have been conducted.

  "No evidence is so important that it warrants re-traumatising someone who has gone through all these experiences."

  At least 725,000 people have fled Rakhine state over the past 12 months, many to neighbouring Bangladesh. As a result, despite not getting access to Myanmar, investigators were able to gather a vast amount of testimony from people who had experienced violence at first-hand before fleeing.

  Many made the treacherous journey from Rakhine to Bangladesh by sea

  They spoke to 875 people in Bangladesh, Malaysia, Thailand, Indonesia and the UK, and made a decision early on that the most valuable testimony would come from people who had not shared their stories before.

  "We didn't want to interview people who had been interviewed by other organisations," Mr Sidoti, an Australian human rights law expert, says. "We didn't want a situation where people's evidence could have been tainted.

  "We tried to get people from a wide variety of areas and when we became more and more focused later on, we would deliberately, through a community network, seek out others from that area to get a better picture of what went on."

  "We would never use just one account as proof," Mr Sidoti says. "We always sought corroboration from primary and secondary sources."

  Those sources included videos, photographs, documents and satellite images, which showed the destruction of Rohingya villages over several months in 2017.

  In one case, investigators had received several reports from refugees in Cox's Bazar, Bangladesh, that a village had been destroyed in particular circumstances at a particular time.

  Investigators were then able to source satellite images that corroborated what witnesses had said.

