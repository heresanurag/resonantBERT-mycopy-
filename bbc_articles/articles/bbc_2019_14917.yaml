  Getting hold of photographic evidence from the ground proved to be more of a challenge.

  "When people were leaving Rakhine state, they were being stopped, searched and deprived of their money, gold and mobile phones," Mr Sidoti says. "It seemed pretty clear this was an attempt to get video or photographic evidence they had recorded.

  "There wasn't much left but we made use of it."

  The report names six senior military figures it believes should go on trial, including Commander-in-Chief Min Aung Hlaing and his deputy.

  How were investigators able to point the finger directly at these men?

  The case here is not based on a paper trail, or a recording, but instead on research.

  Investigators relied heavily on others' detailed understanding of how Myanmar's government works. Among them was a military adviser who had co-operated with war crimes tribunals in the past.

  "We have been able to access extraordinary international advice on various aspects of Myanmar's military," Mr Sidoti says. "The conclusion we have come up with is that the army is so tightly controlled that nothing happens involving the army in Myanmar without the commander-in-chief and his deputies knowing."

  While the people believed to have given the orders have been named, work is ongoing to identify the members of the military who may have committed atrocities.

  "We do have a list of alleged perpetrators on the ground and they will remain confidential for now," Mr Sidoti says. "Their names have come up frequently enough for them to be put on lists to face more investigation."

  Identifying what appears to be genocide and proving that what happened fits the legal definition of genocide are two different things.

  "Evidence of crimes against humanity was very quickly obtained and was quite overwhelming," Mr Sidoti says. "Genocide is a much more legally complex issue."

  Christopher Sidoti: "None of us thought the evidence for genocide would be as strong as it was"

  As the report states, genocide is when "a person commits a prohibited act with the intent to destroy, in whole or in part, a national, ethnical, racial or religious group".

  The key word is "intent". Investigators believe the evidence of that intent by the Myanmar army is clear.

  They cite statements by commanders and suspected perpetrators, and the degree of planning required to carry out such an operation. But still, identifying a genocide from a legal perspective took a significant amount of legal work.

  "We arrived at a position we had not expected to be in when we were beginning," Mr Sidoti says. "None of the three of us thought the evidence for genocide would be as strong as it was. That came as a surprise."

  The report says that the six military officials should face trial. It also condemns Myanmar's de facto leader, Nobel Peace Prize laureate Aung San Suu Kyi, for failing to intervene to stop attacks, and the UN's outgoing rights chief this week said she should have resigned as a result.

  The report also makes a series of recommendations, including the referral of the investigation to the International Criminal Court or to a new tribunal, and the imposition of an arms embargo.

  However, China has so far resisted strong action against its neighbour and ally Myanmar on the UN Security Council, where it holds a veto.

  Mr Sidoti acknowledges that officials in Myanmar are unlikely to investigate the allegations themselves. Last year, an internal investigation by the army exonerated itself of blame in the Rohingya crisis, and Myanmar's Permanent Representative to the UN last week told BBC Burmese the report was full of "one-sided accusations against us".

  "We have made recommendations and it is up to others to act on them," Mr Sidoti says. "I have a high expectation that the Security Council will act on its responsibilities. But I'm not naive."
