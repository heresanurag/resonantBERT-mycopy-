title: CCTV of acid attack in London club - BBC News
date: '2017-11-13'
section: General
url: http://www.bbc.co.uk/news/uk-41973617
content: |-
  CCTV shows Arthur Collins throwing liquid at revellers in Mangle E8 in Dalston on 17 April.

  A man has been found guilty of carrying out an acid attack in a packed London club which left 22 people injured.

  Arthur Collins, the ex-boyfriend of reality TV star Ferne McCann, threw the corrosive substance at revellers in Mangle E8 in Dalston on 17 April.

  Footage released by police shows the moment Collins aimed the bottle of liquid at the crowd.
