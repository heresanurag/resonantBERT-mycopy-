content: |-
  Cardinals joined the newly appointed pope in the Sistine Chapel, in a service that began with a prayer.

  Newly elected Pope Leo XIV has lead his first Mass as pontiff, in the Vatican's Sistine Chapel.

  The Pope was joined by cardinals for prayers and hymns, the morning after his identity was revealed to the world on the Vatican balcony overlooking St Peter's Square. Pope

  Leo spoke in Latin, English and Italian, calling on the Church to do more work where there is "lack of faith" and asked cardinals to "announce the good news, to announce the Gospel".

