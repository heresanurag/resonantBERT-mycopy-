  'If we lose it is almost over - every game is a final'

  Manchester City boss Pep Guardiola, speaking to BBC Sport: "I am proud of them, but not just today. We lost two games in four days but you can't forget what they have done for 16 months. We knew that it was a final today, if we lose it is almost over.

  "All credit to these incredible players. That is how we have to play in the Champions League. Both teams tried to search for each other, we were not scared, we had no fear and we had a lot of pressure.

  "They are leaders - it is four points but we have reduced the gap. We knew that if we won we would be in contention to fight for the Premier league, if we lose it is over.

  "I don't remember a league so tough, there are so many huge contenders fighting for the title. Every game is a final."

  Liverpool boss Jurgen Klopp, speaking to Sky Sports: "It was a big pressure. Very intense game. We were unlucky in our finishing moments. Unluckier than City I would say.

  "They had periods where they dominated the game and everybody felt the intensity. But we came back and had big chances. It is always like this. You have to score in those moments. When Aguero scores there is no angle. In similar situations we didn't score.

  "It was not our or City's best game because we both made it difficult for the other team. I have already said to the boys this is OK. We lost it but it will happen. Tonight it is not nice but it is not the biggest problem."

  The stats - Aguero loves facing the 'big six'
  • None Manchester City ended Liverpool's unbeaten start to the Premier League season in the 21st match - only Arsenal in 2003-04 (38 games), Manchester United in 2010-11 (24) and Man City in 2017-18 (22) have had longer unbeaten starts.
  • None This was only City's second win in their past 12 matches against Liverpool. They have lost seven of those but won at the Etihad in the league for the past two seasons.
  • None Since the start of the 2011-12 season, Aguero has scored 37 league goals for City in matches against the other 'big six' clubs (Arsenal, Chelsea, Liverpool, Manchester United and Tottenham) - 16 more than any other player.
  • None Liverpool have lost 10 of their 25 games under Klopp in January (winning eight), which makes up 29% of his 35 defeats as Reds boss.
  • None Since the start of last season, Sane has been involved in 26 goals in 25 home league appearances for Manchester City (nine goals, 17 assists).
  • None Firmino scored his 10th goal of the season for Liverpool, registering double figures for the fourth consecutive season (11 in 2015-16, 12 in 2016-17, 27 in 2017-18).
  • None The Reds conceded more than once in a Premier League game for the first time since drawing 2-2 at West Brom in April.
  • None Manchester City won a league match against a team starting the day top of the table for the first time since winning 2-1 against Liverpool in December 2013.

  Both teams are in FA Cup action, with Manchester City hosting Championship side Rotherham United on Sunday (14:00 GMT) and Liverpool visiting Premier League rivals Wolves on Monday (19:45).
