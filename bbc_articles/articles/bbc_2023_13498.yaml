title: 'Libya floods: Floods devastate city of Derna - BBC News'
date: '2023-09-13'
section: General
url: http://www.bbc.co.uk/news/world-africa-66787997
content: |-
  Eyewitness footage shows a torrent of water flowing through Derna, causing massive destruction.

  Much of Libya's eastern port of Derna, which has about 100,000 residents, is underwater after two dams and four bridges collapsed.

  Eyewitness footage shows a torrent of water flowing past a mosque in the city, causing massive destruction.
