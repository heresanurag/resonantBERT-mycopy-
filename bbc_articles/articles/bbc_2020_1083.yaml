  • None Liverpool have collected 104 points across their last 38 Premier League matches (W33 D5 L0) - a record total by any team across a 38-match spell in the competition's history, overtaking 102-point stretches by Man City (ending in 2018) and Chelsea (2005).
  • None Tottenham Hotspur have conceded 20 goals in 13 matches in all competitions under Jose Mourinho; it took Mourinho's Chelsea side 44 games before letting in their 20th goal during his first spell in England as a manager in the 2004-05 season.
  • None This is Liverpool's joint-best scoring run from the start of a season in English top-flight history, with the Reds also scoring in their opening 21 games in 1933-34.
  • None Liverpool have now gone 38 Premier League games without defeat; since their last league loss at Man City in January 2019, Tottenham have lost 16 Premier League matches by comparison, including three to the Reds.
  • None Tottenham have lost back-to-back Premier League matches for the first time this season, having last done so in May 2019, while this is the first time their manager Jose Mourinho has lost consecutive games in the competition since August 2018 as Manchester United boss.
  • None Liverpool have kept six consecutive clean sheets in the Premier League for the first time since December 2006 (seven).
  • None Roberto Firmino has scored five goals in his last six games for Liverpool in all competitions, as many as he had in his previous 30 appearances for the Reds before this run.

  Tottenham host Middlesbrough in their FA Cup third-round replay on Tuesday, 14 January (20:05 GMT). They then travel to Watford in the Premier League on Saturday, 18 January (12:30 GMT).

  Liverpool welcome Manchester United to Anfield in their next Premier League fixture on Sunday, 19 January (16:30 GMT).
