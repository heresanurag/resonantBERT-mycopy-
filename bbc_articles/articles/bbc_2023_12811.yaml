content: |-
  Video from China’s Sichuan province shows the animal looking relaxed, but unimpressed.

  Video from China’s Sichuan Province shows a giant panda suffering a bout of the hiccups.

  The animal was filmed at Wolong Shenshuping panda base, in Sichuan province, a world-leading centre in Panda conservation efforts.
