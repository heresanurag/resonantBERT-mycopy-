title: Taylor Swift summons withdrawn from Justin Baldoni-Blake Lively case - BBC
  News
date: '2025-05-23'
section: Culture
url: http://www.bbc.co.uk/news/articles/cm2k0dmvvkgo
content: |-
  The pop star's team complained that the legal order was an "unwarranted fishing expedition".

  Taylor Swift has been described in legal documents as one of Blake Lively's "dragons"

  Taylor Swift will not be drawn into the legal battle between Blake Lively and Justin Baldoni after a court summons for the pop star was withdrawn. Baldoni and Lively co-starred in 2024 film It Ends With Us, but are now embroiled in a bitter legal dispute after she sued the actor and director, accusing him of sexual harassment and a smear campaign. Baldoni's lawyers had sent subpoenas to Swift and her legal team in an attempt to obtain messages between lawyers representing Lively and the singer, who are friends, Variety reported, external. But the subpoena was dropped after Swift's legal team objected that the legal order amounted to an "unwarranted fishing expedition", Variety said.

  Lively and Baldoni starred together in It Ends With Us, which was released last summer

  Lively's spokesperson said they were "pleased" the subpoena had been withdrawn. "We supported the efforts of Taylor's team to quash these inappropriate subpoenas directed to her counsel and we will continue to stand up for any third party who is unjustly harassed or threatened in the process," they said. Earlier this month, Swift's representatives told the BBC she was being brought into a legal row to create "tabloid clickbait". It was originally reported that Swift had been subpoenaed to give information after it was alleged she tried to pressure Baldoni to accept script rewrites by Lively for the film. Baldoni had said he was invited to Lively's New York home in 2023 to discuss script changes, where Lively's husband, Ryan Reynolds, and Swift were there to serve as her "dragons". In response, Swift's representatives said "she was not involved in any casting or creative decision" and "never saw an edit or made any notes on the film". Variety has now reported that Baldoni's lawyers were using the subpoena to try to get messages relating to an allegation that Lively's representatives had threatened to release old text messages if Swift didn't issue a statement supporting her. Lively's lawyers denied those allegations as "unequivocally and demonstrably false". Lively's spokesperson added: "The Baldoni and Wayfarer team have tried to put Taylor Swift, a woman who has been an inspiration for tens of millions across the globe, at the center of this case since day one. "Faced with having to justify themselves in federal court, they folded. At some point they will run out of distractions from the actual claims of sexual harassment and retaliation they are facing." Baldoni is counter-suing Lively and Reynolds on claims of civil extortion, defamation and invasion of privacy.
