title: Irish PM Leo Varadkar anti-discrimination message for US - BBC News
date: '2019-03-15'
section: General
url: http://www.bbc.co.uk/news/world-47575449
content: |-
  The openly gay Irish PM called out various forms of discrimination in front of Vice President Mike Pence.

  Taoiseach (Irish Prime Minister) Leo Varadkar has delivered a strong message of anti-discrimination on his visit to the US.

  Mr Varadkar highlighted various forms of intolerance, in a speech hosted by Vice President Mike Pence.

  His words carried particular significance as Mr Pence has a history of anti-LGBT policies during his time in office.
