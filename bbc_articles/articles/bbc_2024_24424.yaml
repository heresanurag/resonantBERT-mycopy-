  Martha Gaskell's daughter Marion Turner killed herself in 2013, months after being discharged.

  'I want accountability for my daughter's death'

  Martha Gaskell with her daughter Marion Turner (right), who died aged 40 in 2013

  A Staffordshire mother whose "lovely, caring" daughter killed herself within months of being discharged from a mental health facility said she prayed a public inquiry would bring change. On Monday, Baroness Lampard will begin to investigate the deaths of people receiving mental health inpatient care in Essex between 2000 and 2023. The inquiry will examine the deaths of almost 2,000 patients, including mother-of-four Marion Turner who was found dead in January 2013. Mum Martha Gaskell, from Stoke-on-Trent, said: "I'd like to see... accountability for what the failings were".

  Ms Turner was discharged from The Lakes mental health facility in Colchester, Essex, months before her death

  An inquest into Ms Turner's death concluded she had taken her own life at home while suffering from a diagnosed mental illness. The 40-year-old had been discharged from The Lakes mental health facility in Colchester in October 2012. Following Ms Turner's death, the then senior coroner for Essex Caroline Beasley-Murray said she was concerned there was a risk of future deaths if action was not taken. Ms Gaskell, 68, said she had been "begging" for her daughter to be taken into hospital before she died.

  The Lampard Inquiry will investigate the deaths of people who were receiving mental health inpatient care in Essex between 2000 and 2023

  Speaking ahead of the inquiry, Ms Gaskell said she hoped it would mean "anybody else that has to go through the mental health system will not be let down". The mother, who now works as a counsellor, said she planned to give evidence, which she described as "nerve-wracking". She explained her daughter had always struggled with her mental health. "She was a very lovely, caring person," she said. "A very good mother, she loved her children to death." "I just hope and pray that we get the answers we need and they change, because it's so needed." Paul Scott, Chief Executive of Essex Partnership University NHS Foundation Trust (EPUT), said: "We know how painful this time will be for those who have lost loved ones and our thoughts are with them. "We will continue to do all we can to support Baroness Lampard and her team to provide the answers that patients, families and carers are seeking." The inquiry is to be held in Chelmsford.

