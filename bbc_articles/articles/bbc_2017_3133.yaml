title: Rare 'lava firehose' from Hawaii's Kilauea volcano - BBC News
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/science-environment-38825330
content: |-
  Dramatic footage shows the unusual phenomenon as lava flows through a crack in a sea cliff.

  The Kilauea volcano in Hawaii has been active since 1983, but scientists have filmed an unusual phenomenon.

  Dramatic footage shows lava as it flows through a crack in a sea cliff, and into the Pacific Ocean.
