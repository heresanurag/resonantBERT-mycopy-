content: |-
  Home Secretary Amber Rudd's high heel gets stuck between the paving slabs at Downing Street.

  Home Secretary Amber Rudd's heel got stuck between the paving slabs as she walked along to 10 Downing Street for the first cabinet meeting of 2017.

  An assistant had to come to help free her foot, as Ms Rudd held onto the railings.
