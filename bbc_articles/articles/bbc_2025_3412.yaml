  The former footballer has been speaking about his future after stage two diagnosis.

  Windass: 'Dementia scares me, we need more help'

  Former footballer Dean Windass is calling for more support for ex-players and their families affected by dementia

  Former footballer Dean Windass says he is scared for the future following his stage two dementia diagnosis and wants more support for other players and their families in the same position. The 55-year-old, who played for 12 clubs during a professional career spanning 19 years, was diagnosed last year and the news was announced in January. Windass told BBC Newsnight he was trying not to let the illness affect him, but "has a cry every now and then". "It scares me," he admitted. "I don't know what the outcome's going to be. Interview me in 10 years' time and I might tell you a different story."

  Stage two dementia is an early phase of the syndrome in which people exhibit very mild cognitive decline, possibly including some memory lapses. Windass said it was "emotional" for him when he underwent tests and although he doesn't know what the future holds, said he was trying to live as normal a life as possible. He added: "There's nothing I can do. You can't roll back the years, so you've just got to deal with it as much as you can. "Hopefully, in the next five or 10 years it doesn't develop. It might do, but it might not. So, you get up in the morning and you live. You try to live your life as normal." Windass was part of the Bradford City side promoted to the Premier League in 1999 and wrote his name into Hull City folklore with the only goal in the Championship play-off final at Wembley in 2008. He also had stints at Aberdeen, Oxford, Middlesbrough and Sheffield United during a career that saw him amass more than 700 appearances and score more than 230 goals. "If they'd said [when playing] that in 10 years' time you might have a shade of dementia. I'd go 'well I'm not heading that ball then'," Windass added. "I wouldn't have done that as much in training... [I'd] probably think twice."

