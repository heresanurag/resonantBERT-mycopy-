title: Crimes unreported as public lose faith in police - BBC News
date: '2020-02-07'
section: UK
url: http://www.bbc.co.uk/news/uk-51408921
content: |-
  A new report reveals that a suspect is charged in under 8% of recorded crimes in England and Wales.

  The public are losing faith in the criminal justice system as police workloads affect outcomes, a report finds

  Victims are no longer reporting some crimes to police because so many offenders are never brought to justice.

  A new report said the public are losing faith in the criminal justice system and have "rumbled" that police do not have the capacity to investigate.

  The constabulary inspector said a suspect was charged in just 7.8% of crimes in England and Wales in the year to March 2019.

  The Home Office said action should be taken if forces are not performing.

  It came as a report by the spending watchdog warned the government could run out of prison places in two years because of tougher sentencing measures, combined with a drive to recruit 20,000 police officers.

  The National Audit Office (NAO) said ministers have failed to deliver a promised 10,000 new prisoner places.

  But the Ministry of Justice said it would "always have enough prison places".

  Differences in the way police forces carry out investigations, rising demand and falling resources in some areas means people face a postcode lottery getting justice, Her Majesty's inspector of constabulary said.
