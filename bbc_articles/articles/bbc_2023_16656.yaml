title: 'North Wales: Police confirm bodies found in submerged car - BBC News'
date: '2023-11-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67488997
content: |-
  Police say they located an overturned and partially submerged car and four bodies were recovered.

  Four bodies were found in an overturned and partially submerged car following a search for four teenagers who had gone missing.

  "The families of the missing men have been informed," North Wales Police Supt Owain Llewellyn said at a press conference on Tuesday afternoon.

  He said the force had received reports of four missing young males from the Shrewsbury area on Monday afternoon.

  "Our thoughts are with them at this desperate time," he said.
