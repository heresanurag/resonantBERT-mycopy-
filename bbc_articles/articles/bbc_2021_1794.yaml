content: |-
  Security cameras show just how close the mob got to senators and reveal Mitt Romney's narrow escape.

  The very real threat to Speaker Pelosi and her staff

  Stacey Plaskett shows the chamber new footage that details how rioters searched high and low for House Speaker Nancy Pelosi and "terrorised" her staff. "You can hear the terror in their voices as they describe what's happening as they are barricaded inside," she says, over audio of staff members whispering frantically to each other. "You can hear the pounding in the background," she notes, interspersing the sounds with new security footage of insurrectionists trying to break into the office where staff members are hiding. The rioters can be heard chanting "Where are you Nancy?" as they spread out across the office complex. "The mob pillaged and vandalised the speaker's office, documenting their crimes on social media," says Plaskett. She then calls attention to one man in particular - Richard Barnett - the man pictured with his feet up on Pelosi's desk and who is accused of stealing documents from her office. She points out he was carrying a stun gun tucked into his waistband. It is a weapon, Plaskett says, that "could have incapacitated anyone he used it on".
