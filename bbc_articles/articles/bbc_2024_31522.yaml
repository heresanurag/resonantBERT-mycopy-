title: 'Collyhurst redevelopment: Resident fears losing home of 32 years - BBC News'
date: '2024-12-21'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c24nvd9qev3o
content: |-
  One Collyhurst resident says "they'll have to drag me out of here before I give this home up".

  'I fear losing the home I've been in for 32 years'

  Gaynor Hutton fears her adapted bungalow in Collyhurst could be demolished

  "They'll have to drag me out of here before I give this home up." Gaynor Hutton has been told her home of 32 years may have to be bulldozed during the redevelopment of her housing estate. The 53-year-old, who has had both legs amputated, said she would do anything to stay in her specially adapted bungalow in Collyhurst. Manchester City Council said: "If a property does need to be demolished, the residents will be offered a new home in Collyhurst to suit their needs."

  New homes in Collyhurst have long been planned

  The first phase of redevelopment work has already begun in Collyhurst, which lies less than two miles north-east of Manchester city centre. Plans for the second phase are expected to be confirmed in the new year. Some residents fear it could mean the "unnecessary" demolition of their homes. Gaynor said she was worried "we'll never get a house like this again". She explained that she had bought her three-bedroomed bungalow through the government's right-to-buy scheme, external 20 years ago. "We've invested so much in this home and brought three kids up here," she said. "It's got a 'wet room' and we got a new kitchen last year. "The new houses won't accommodate my needs."

  Acres of land in Collyhurst have lain derelict for years

  Original plans for a hundreds of new homes in Collyhurst - funded through a £252m Private Finance Initiative (PFI) scheme - were scrapped in 2010. Several blocks of maisonettes were demolished though, leaving behind land which has lain derelict for more than a decade. In October 2022, Manchester City Council (MCC) entered into a partnership with the developer Far East Consortium Limited. Work is under way to build 244 homes in Collyhurst Village as well as 30 council homes for social rent in South Collyhurst.

  The 62-year-old said: "Collyhurst has always been a strong community but that's why people are struggling with the change. "It upsets some people, but what they're doing here is fantastic. I think it's going to be a really buzzing, vibrant place."

  MCC is now finalising plans for a second phase of work. The local authority hopes it will bring up to 2,500 new homes as well as see the creation of new public spaces and the construction of a tram stop. MCC's executive member for housing and development, Gavin White, said: "We want to be clear that no-one will be asked to move out of their area and we will work with residents on these plans." The regeneration of Collyhurst is part of the £4 billion Victoria North project, which its hoped will deliver up to 15,000 new homes over the next 15 years.

  Cllr Gavin White is the executive member of housing and development at Manchester City Council
