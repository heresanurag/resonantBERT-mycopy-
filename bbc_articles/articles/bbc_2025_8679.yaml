title: Thousands come together for Rob Burrow Leeds Marathon - BBC News
date: '2025-05-11'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/clyglmn8evzo
content: |-
  The annual event is the first one to take place since the Leeds Rhinos star's death last year.

  Thousands of runners turn out in Rob Burrow's memory

  To a backdrop of cheers, runners set off from the Headingley Stadium earlier

  Thousands of runners have taken part in the Rob Burrow Leeds Marathon - the first to be held since the rugby league star's death. Leeds Rhinos legend Burrow died last June aged 41 after being diagnosed with motor neurone disease (MND) in 2019. His wife Lindsey and best friend Kevin Sinfield were among those taking part to help raise money for MND. Sinfield told the crowds that Burrow would be "looking down on us, proud as punch of what we have created here."

  Speaking before the run, the former Rhinos captain said: "Today is about looking after each other. Today is about making sure we get to the finish line. Today is about running for our little mate Rob Burrow." Sinfield, along with Lindsey, joined more than 10,000 people for the event, which is now in its third year.

  Lindsey Burrow was cheered on by her children Maya, Jackson and Macy

  It was the second marathon in the space of two weeks for Mrs Burrow, who completed the London Marathon last month. Speaking to BBC Radio Leeds after finishing the race, she said: "The city of Leeds have shown their support for Rob right from his diagnosis and to finish at Headingley Stadium is just so special." The race got under way at the stadium - the home of Leeds Rhinos - at 09:00 BST with the route passing through Woodhouse Moor, Adel, Bramhope, Pool in Wharfedale and Otley. Runners were followed an hour later by those taking part in the half marathon. Paul Green, from Doncaster, was one of thousands of people inspired by the Burrow family's story. The 71-year-old said he was running his first half marathon in memory of his wife who died from MND in 2017.

  Paul Green has dyed his beard bright orange to symbolise his fundraising for the MND Association

  "It has been eight years, but it is still hard," he said. "I am running in memory of Joy. Hopefully she is approving of my lunacy doing it at this age." As well as fundraising for the MND Association, Mr Green volunteers as a "befriender", helping to support people with the disease. Mr Green, whose grandsons were running alongside him, said: "Hopefully together, we will get there and we will do this." Also taking part, Rob Tiffney, said he "knew nothing" about MND before hearing Mr Burrow's story.

  Rob Tiffney planned to raise £5,000, but has already made seven times his initial goal

  The 49-year-old is on day 406 of a 500-day challenge to run 5,000 miles. Mr Tiffney said he was hoping to raise £35,000 for the MND Association. "Everyday for 500 days, whatever the weather, I get out and raise as much money and awareness as I can. "Rob definitely influenced others – look at all the people here today.

  Kevin Sinfield said Burrow would be "immensely proud" of Leeds

  Jack Cummings, the fastest male half marathon runner, said: "The support around the course was like nothing I've ever experienced before. It was insane." Katie Brown, who clocked up the fastest female time in the half marathon, described being "in shock" as she crossed the line. "Coming through and seeing the tape and seeing the stadium was unbelievable." Meanwhile Sinfield, who famously carried Burrow over the finish line of the 2023 Leeds Marathon, ended the race hand in hand with rugby league player Jamie Jones-Buchanan and friend Dave Spencer. He said: "I hope people are really proud of their runs. Rob would be immensely proud of what Leeds have done today. Tom Charles claimed victory in the main marathon with a time of 02:28:14, followed by Mohamed Abshir with 02:29:29 and Joe Sagar in 02:30:39. In the women's race, Melissah Gibson was with 02:42:17, Kate Corcoran finished second with 02:57:44 and Ruth Sinclair was third with 03:04:20.

