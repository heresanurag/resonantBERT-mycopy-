content: |-
  BBC Sport gathers predictions from the world of boxing for Chris Eubank Jr v Conor Benn.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Chris Eubank Jr and Conor Benn finally collide in the ring on Saturday with many in the world of boxing predicting an upset. The bitter rivals fight two and a half years after their first bout was cancelled at the last minute because Benn failed two drugs tests, and 32 years since their fathers last fought. Benn, 28, is the underdog - stepping up two weights to fight at middleweight and having spent over two years successfully battling a doping ban. Who will come out on top from the bitter rivalry? Will Eubank, 35, continue his family's unbeaten streak or will Benn deliver the quick knockout he has promised? BBC Sport has asked the world of boxing for their predictions.

  Lightweight world champion Caroline Dubois: ''I've been on the fence and I am going to stay on the fence. It's going to be exciting, the first six rounds will be explosive.'' Retired world champion Tony Bellew: ''I think Conor Benn will get to Eubank. If he does get through those first five or six rounds, he's took what Conor's got and he starts unloading himself. It's a fight of two halves. Neither's defence is that good and both of them want to get at to each other, bad.'' Retired world champion Barry Jones: "I think Eubank wins on points. Benn might be able to tough it out as he is a tough kid, but I don't know if he has the ability. Eubank can't make middleweight no more, it drains him and he beat an old Liam Smith in their rematch. But he's a massive guy, so if he's able to rehydrate correctly, he is just too fast and too big." Heavyweight Fabio Wardley: "My initial feeling is Eubank will get the win. The weight factor will play quite a big part, asking Benn to come up two weights is a lot against someone who is naturally comfortable fighting at that weight. Benn can carry some strong power at his weight, but there is a large difference when those punches which you hit in your previous weight would take them out, but a bigger guy is more used to taking bigger shots and they don't have the same effect." Scotland's first female world champion Hannah Rankin: "I think it will be a later-round stoppage from Eubank. Experience and size is in his favour. I will be very surprised if Benn gets the win. Eubank is stronger. He's been in there with solid opponents that have tested his chin. I'm surprised how many people see this as a 50-50." Unbeaten light-welterweight Adam Azim: "Benn to knock him out. He's the younger fighter, very powerful. Eubank's last performance wasn't the greatest."

