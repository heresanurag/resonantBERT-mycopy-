  Middleweight Hamzah Sheeraz: "I think Benn is going to win. I want Eubank to win for selfish reasons and wanting to fight him in the future, but I feel like Benn will do the job." Heavyweight Delicious Orie: "I see Eubank doing the job. It will be a great fight but Eubank edges it. He has the experience and weight advantage. I think he's probably got into Benn's head a little bit as well in the press conferences. It's more than just about the physicality of it, it's about the mental side too." Scotland's former undisputed light-welterweight world champion Josh Taylor: "Eubank is the naturally bigger and more experienced opponent but Benn is a young, hungry lion. He has the advantage of not having to cut weight and to be able to get bigger and stronger. He also has youth on his side. But my head is going with Eubank." Benn's promoter Eddie Hearn: "Benn has to start fast in this fight, he has to land and he has to hurt him early and get his respect and, quite frankly, get him out of there. I think we need him out in six rounds. He lands early, clean and cold, and I believe Eubank is stopped." Light-heavyweight Lyndon Arthur: "I think Benn's going to come out and he might shock Eubank. He could get caught coming in though." Cruiserweight Cheavon Clarke: "I'm on the fence. Maybe a draw." Former light-middleweight world champion Liam Smith: "I find it hard to pick a winner, I won't be surprised with either result. I do edge towards Benn winning on points." Eubank's promoter Ben Shalom: "I think Eubank wins by knockout. It will be a frantic first two or three rounds and then it will calm down and Eubank will take over. A knockout in round six."

