  British heavyweight Derek Chisora: "The smart money is on Eubank. He had fights when Benn was on holiday. But I'm friends with Benn, he comes to my house so my money is on him. I'm 50-50 but I'll go with Benn because I want him to win because of his family and legacy." Former cruiserweight world champion Johnny Nelson: "I'm saying Eubank because he had more consistency in his career. Benn's style is so ferocious and attacking, that should suit Eubank in the first six rounds." Light-heavyweight Anthony Yarde: "If Benn wins it is because he goes in with controlled aggression and detonates when he needs to. If Benn hurts Eubank then he is good at finishing. If Eubank wins then it's being himself but an aggressive version of himself. He needs to be switched on - the version we saw in his second fight against Liam Smith. Eubank is a world-class operator and he has shown that." Eubank Sr's former promoter Barry Hearn: "I think this is a 50-50 fight - of course I'm on Conor's side, but I'm not going to ignore that the other man is a much bigger man with more experience. It is going to be something awesome. I think Nigel will have Conor ready for war but in a more controlled way." Super-bantamweight Francesca Hennessy: "They're both great fighters. I've been going back and forth. Eubank is bigger at the weight but Benn is strong and will come forward. I keep changing my mind."

