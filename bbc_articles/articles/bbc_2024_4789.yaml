content: |-
  The Museum of London is packing up its huge collection as it moves to its new home in Smithfield.

  Since it closed to the public in December 2022, the Museum of London at London Wall has been preparing to pack its huge collection for the move to its new home down the road in West Smithfield.

  Its items all need to be given a barcode and packed individually.

  Objects range from mammoth tusks, Roman coins and photographs to much larger exhibits like vehicles and a lift from Selfridges.
