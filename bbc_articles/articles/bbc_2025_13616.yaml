title: Bruce Springsteen and Paul McCartney in surprise Liverpool duet - BBC News
date: '2025-06-08'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cgkd4x4pnpgo
content: |-
  The former Beatle returns to his hometown of Liverpool to join Springsteen on stage at Anfield.

  Bruce Springsteen surprised his fans by bringing out Sir Paul McCartney during an encore

  Bruce Springsteen fans got a special surprise when Sir Paul McCartney joined him for a duet at Liverpool's Anfield stadium. The former Beatle was brought out on stage on Saturday during the 75-year-old singer's second gig in the city with his E Street Band as part of his Land of Hope and Dreams tour. Springsteen, a life-long Beatles fan, introduced Sir Paul to roaring crowds during his encore. Sebastian Ayling, who was in the crowd, said it was a "privilege" to see the duo perform.

  "Last night was biblical," he said. "Bruce and the band were on fire and seeing Sir Paul was such a privilege." The performance was Sir Paul's first in his hometown since his 2018 Freshen Up Show and also his first appearance on the Anfield stage since the city's celebration of the European Capital of Culture in 2008.

  Fans said it was "an amazing night" at Anfield

  The pair shared a hug on stage as they sang a duet of the Beatles song, Can't Buy Me Love. Footage shared on social media showed Sir Paul, 82, addressing the crowd after the performance, reportedly saying: "Thank you, Scousers." Another fan, Ross, said the whole show was "unbelievable".

  Springsteen performed with McCartney at Glastonbury in 2022 but never together in Liverpool

  Ahead of the gig, speculation mounted as to whether Springsteen, referred to as The Boss by fans, was going to bring Sir Paul on stage after they both appeared in the city a day earlier. The pair made a surprise visit on Friday to the Liverpool Institute for Performing Arts (LIPA), which McCartney co-founded.

  The musical legends shared an embrace after they performed to thousands of fans

  LIPA said it had been a "truly incredible day", with the artists taking time out to talk to students and share their experiences. "Thanks to Bruce Springsteen for sharing such rich insights with our students," a spokesperson said. "And thanks, as ever, to Paul McCartney for his generosity and passion as he introduced Bruce to LIPA."

  Paul McCartney and Bruce Springsteen visited Liverpool Institute for Performing Arts on Friday

  McCartney brought the Born in the USA singer on stage when he headlined the Pyramid Stage at Glastonbury in 2022. The pair played Glory Days and I Wanna Be Your Man together. In 2012, Sir Paul joined Springsteen on stage at the end of the singer's headline slot at Hard Rock Calling in Hyde Park, London, but both stars found their microphones cut off before they could address the crowds after exceeding the curfew. Beginning his career in the 1960s, Springsteen has gone on to have 12 UK top 10 albums and four UK top 10 singles and is best known for songs such as Born In The USA, Dancing In The Dark and Born To Run.

  Fans from across the world have descended on Liverpool for the shows. The second on 7 June is the final UK date on the Land of Hope and Dreams Tour as it moves on to Berlin's Olympiastadion in Germany on 11 June. Prague, Frankfurt, San Sebastian and Gelsenkirchen are among the other cities left to play on the tour before it comes to an end in Milan on 3 July.

