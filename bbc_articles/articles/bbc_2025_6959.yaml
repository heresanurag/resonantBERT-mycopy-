title: Yuki Tsunoda asked to 'get as close as possible' to Max Verstappen by Red Bull
  - BBC Sport
date: '2025-04-02'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c62x5dnvlzdo
content: |-
  Red Bull team principal Christian Horner tasks Yuki Tsunoda with "getting as close as possible" to Max Verstappen.

  Tsunoda told to be 'as close to Verstappen as possible'

  This video can not be played To play this video you need to enable JavaScript in your browser. Horner won't necessarily ask me to swap if leading Verstappen - Tsunoda

  Coverage: Live radio commentary of practice and qualifying on BBC 5 Sports Extra, race live on BBC Radio 5 Live. Live text updates on the BBC Sport website and app

  Red Bull team principal Christian Horner has set Yuki Tsunoda one simple target - get as "close as possible" to Max Verstappen. The 24-year-old was announced as Liam Lawson's replacement last week, after the New Zealander was dropped just two races into the season. Tsunoda partners four-time world champion Verstappen for the first time this weekend, when the Japanese driver races in front of a home crowd at Suzuka. With Red Bull third in the constructors' championship after two races, Tsunoda says Horner has tasked him with finishing as close as possible to Dutchman Verstappen to aid the team's cause. Verstappen is second in the drivers' championship, eight points behind leader Lando Norris of McLaren. "In the end Red Bull Racing are focused on Max scoring a drivers' championship," Tsunoda told BBC Radio 5 Live. "He has proven himself to have good potential to be a world champion - even though Red Bull seems to be struggling a little now. "Performance-wise [Horner] wants me to be as close to Max as possible. "In some races I can help with the strategy but he also promised me in some situations that if I'm able to be in front of Max that he wouldn't necessarily ask me to swap positions and make Max win."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Lawson was promoted from Red Bull's second team for the 2025 season but has been sent back to Racing Bulls after struggling in the Australian and Chinese Grands Prix. Lawson qualified 18th at the season-opening event in Melbourne and crashed out of the race. In China, he qualified last for both the sprint and the main grand prix, finishing 14th and 12th. Verstappen appeared to disagree with Lawson's demotion by 'liking' an Instagram post, external from former F1 driver Giedo van der Garde that described it as a "panic move". Tsunoda, who had previously been with Red Bull's second team since making his F1 debut in 2021, said he was yet to speak to Verstappen since replacing Lawson. "I mentioned in the past quite a while ago but he's a bit different from how he behaves in the car and outside of the car," said Tsunoda. "I'm not really worrying about the relationship we're going to have in both sides. I know what I want to do and probably how he drives and how he thinks." Looking ahead to his home grand prix on Sunday, Tsunoda said he will be satisfied if he can finish in the top 10. "Obviously I want to say points or a podium or whatever," said Tsunoda. "But at the same time, realistically, you think about jumping into the new car straight away with limited sessions, that's pretty tough. "I think what I can say for now is if I can score points - top 10 - I'll be happy." The full Tsunoda interview will air on 5 Live Formula 1 on Thursday at 20:00 BST

