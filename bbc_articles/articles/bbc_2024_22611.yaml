title: Scientists collect lava from Kilauea volcano eruption - BBC News
date: '2024-09-20'
section: General
url: http://www.bbc.co.uk/news/videos/czxdvxkl65eo
content: |-
  The volcano, one of the world's most active, has erupted in a remote area of Hawaii Volcanoes National Park.

  One of the world's most active volcanoes has erupted again at Hawaii Volcanoes National Park. The eruption occurred in a remote wilderness area, which is 6 miles (10km) from the nearest road.

  At the moment, there is no immediate threat to life, or infrastructure.

  Scientists from the United States Geological Survey have collected lava from the eruption for lab analysis.
