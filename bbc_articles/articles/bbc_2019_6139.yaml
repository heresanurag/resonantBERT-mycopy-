title: 'InterCity 125: Hundreds bid farewell to high speed train - BBC News'
date: '2019-05-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-48327745
content: |-
  After more than 40 years of service, the old InterCity 125 trains have made their last journey.

  Railway fans visited Paddington Station to mark the last high speed train journey from London to Exeter.

  The InterCity 125 trains have been replaced by newer models after more than 40 years of service.

  The trip sold out days ahead of its run.
