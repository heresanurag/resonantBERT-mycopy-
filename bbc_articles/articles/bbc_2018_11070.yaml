title: Kavanaugh testifies after accuser gives evidence - BBC News
date: '2018-09-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45663690
content: |-
  Christine Blasey Ford said Brett Kavanaugh sexually assaulted her in 1982, which he denies.

  This live broadcast has now ended.

  Christine Blasey Ford, the woman who has accused US Supreme Court nominee Brett Kavanaugh of sexually assaulting her in 1982, has testified before the Senate Judiciary Committee.

  Judge Kavanaugh, who denies the allegations made by Prof Ford and by two other women who have come forward, testified later on Thursday.

  He was nominated for the Supreme Court by Donald Trump in July and confirmation by the Republican-controlled Senate seemed assured until Ford's allegations became public.
