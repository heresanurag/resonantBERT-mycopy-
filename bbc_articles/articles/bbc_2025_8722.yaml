  Counter-terror police are investigating after two properties linked to Sir Keir Starmer were damaged in suspected arson attacks.

  Police investigate suspected arson at two homes linked to Starmer

  Counter-terrorism police are investigating after two homes linked to Sir Keir Starmer were damaged in suspected arson attacks. Emergency services were called to a fire at the prime minister's private home in Kentish Town, north London, in the early hours of Monday. There was damage to the property's entrance but nobody was hurt, the Metropolitan Police said. Just after 03:00 BST on Sunday emergency services were called to a small fire at the front door of a house converted into flats in nearby Islington, a property that is also linked to Sir Keir.

  One person was assisted to safety via an internal staircase by crews wearing breathing apparatus, London Fire Brigade said. Police are also looking into a car fire as part of the investigation.

  All three fires are being treated as suspicious and inquiries are ongoing. The prime minister - who lives at his official residence in Downing Street - is understood to still own the Kentish Town property. He lived there before the 2024 general election and it has been rented out since then. Sir Keir has thanked the emergency services, his official spokesman said. He did not provide any further details on who was in the property when the fire started. Police said counter-terrorism officers were leading the probe "as a precaution and due to the property having previous connections with a high-profile public figure". London Fire Brigade said it had sent 10 firefighters and two fire engines to a "small fire" in Kentish Town at 01:11 on Monday, and that was under control about 20 minutes later.

  London Fire Brigade said it was called to the fire at 01:11 BST

  A Metropolitan Police statement said: "Officers attended the scene. Damage was caused to the property's entrance, nobody was hurt. "The fire is being investigated and cordons remain in place while enquiries continue." It later emerged that just before 03:00 on Thursday, firefighters were called to a small car fire on the same street. The fire was brought under control by 03:30. At just after 03:00 on Sunday, firefighters were called to the Islington fire. The Kentish Town house has previously been targeted by protesters. Last year, three people were found guilty of public order offences after staging a pro-Palestinian demonstration outside it. On Monday afternoon, investigators could still be seen outside the property with local residents being allowed through the tape as they returned home from work.
