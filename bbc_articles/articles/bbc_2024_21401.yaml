title: 'Newspaper headlines: ''Supersonic Saturday'' and actress'' Savile allegations
  - BBC News'
date: '2024-09-01'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c8xl717xx9yo
content: |-
  The ongoing drama around Oasis ticket sales dominates Sunday's papers.

  The Sunday Times leads on a warning from the education secretary, external that parents are significantly denting their children's future earning potential by letting them skip school. Bridget Phillipson is quoted as saying she will "act decisively" to tackle what she called an "absence epidemic". The paper highlights government analysis that suggests every day missed from the classroom costs children hundreds of pounds in wages over their lifetime. The Sunday Telegraph says teachers' unions have told Ms Phillipson to scrap exams on times tables, external, as part of her review of the curriculum in England. It reports that ministers are also being asked to strip back tests on grammar to "curb pupil anxiety". A union source questions whether primary school children really need to know "about modal verbs and fronted adverbials". But former Conservative education minister Nick Gibb says the changes would be a "retrograde step". A government spokesperson says its review aims to "strengthen core skills in reading, writing, and maths". The Observer's front page, external focuses on a study indicating that most people "expect to go private" for routine health treatments, because they believe they will not be able to get them quickly enough on the NHS. The findings are based on "extensive focus group analysis" conducted by Loughborough University, on behalf of the Joseph Rowntree Foundation, which funds research into social policy. "Harry asks former aides to help plot his 'return from exile'" is the Mail on Sunday's headline, external. It says the Duke of Sussex is consulting people "from his old life" on how to "mastermind a return" from the US. The article says representatives for Prince Harry did not respond to its request for comment.

  The Sunday Mirror says a new Netflix documentary about Lucy Letby, external, the serial killer nurse, will feature experts who have questioned her conviction. The paper says it will mean "fresh agony" for the families of the 14 babies she murdered or tried to kill. The article says Netflix and the production company ITN have not commented. "Pubs warn of smoking ban violence" is the headline on the front of the Sunday Express, external. It says landlords fear the government's proposed ban on outdoor smoking could turn beer gardens and terraces into "flashpoints". Former Tory party chairman Richard Holden tells the paper the plan would put "bar staff in the firing line" of customers. Sir Keir Starmer says he is making the decision to reduce the burden on the NHS. Several papers pick up on the online scramble to buy tickets for the Oasis comeback tour. The Daily Star Sunday says, external millions of fans were "left crying their hearts out" in what it called a "shambles supernova".

