content: |-
  The comedian announced on his podcast that he had married Cath Mason after 24 years together.

  Frank Skinner gets married after four rejections from his now-wife

  Frank Skinner and Cath Mason: He had asked her four times previously if she would marry him

  Frank Skinner has revealed he has married his girlfriend Cath Mason after 24 years together. The comedian and presenter shared the news on his podcast, Frank Off The Radio on an episode broadcast on Friday morning, alongside co-hosts Emily Dean and Pierre Novellie. "You'll never guess what I did on Monday, I got married", the 68-year-old said, adding: "Don't be offended, we didn't invite anyone". He confirmed that their only witness was their son Buzz, who was born in 2012, and that the marriage took place at Camden Town Hall.

  Frank Skinner, 68, revealed he had proposed to his now-wife Cath Mason four times previously

  Skinner previously said during an interview with The Sun, external in 2024 that he had asked Mason to marry him four times, but she had always declined. "Maybe it's some terrible personal reason that I don't know about," he said, "that she doesn't actually like me as much as I think she does. "Her parents got divorced, so she got a bit cynical about it and thinks if we get married it would be like a slight curse on the thing," he went on to add. Skinner, who met Mason when she was working for his management company, says their wedding was not a traditional one at her request. "I don't want a load of guests, I'm not going in a church. I don't want a ring," he says she told him. He added: "The thing that no one ever says about getting married is it's quite embarrassing. How can I put it? It's a bit basic getting married." Instead of a white dress, Skinner says "she wore a flowery dress" and they walked down the aisle to Lie Dream Of a Casino Soul by The Fall as the Manchester post-punk group "meant so much to me and Cath when we were in our early days". He says Mason also kept her own name and does not wear a ring now that they are married.
  • None Frank Skinner: ‘I’m all for a bit of moral menace’

  When he was asked why they had decided now was the right time, he said: "I don't know why. I just thought, "Maybe I've got too much money, I'll give her half in about five years time!" and denied that it was "a tax thing", adding "I'm not planning on dying anytime soon". Skinner, whose real name is Christopher Graham Collins, is probably best-known for writing the lyrics and singing on football song Three Lions, with David Baddiel and The Lightning Seeds, and for his TV and radio work. He hosted The Frank Skinner Show on Absolute Radio from 2009 to 2024, before moving the format over to the podcast. He also hosted The Frank Skinner show for 10 years on ITV from 1995 to 2005 and Room 101 on the BBC between 2012 and 2018.
