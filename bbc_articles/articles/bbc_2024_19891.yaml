  Several stories dominate Sunday's headlines including details of Sir Keir Starmer's forthcoming speech and a new picture of Hannah Lynch

  PM speech to warn that 'things will only get worse'

  The prime minister's speech next week is the lead for both the Sunday Telegraph and the Observer. Sir Keir Starmer is expected to say "things will get worse" before they get better, warning of unpopular decisions ahead. According to the Observer, the PM is set to strike a "defiant note" - despite mounting pressure, including from within his own party, to help people struggling with rising fuel prices. The Sun on Sunday says Sir Keir's admission will show "admirable honesty". The Telegraph, meanwhile, says the speech will be an attempt to "lay the groundwork" for "sweeping tax rises" and spending cuts. The Sunday Times reports that a top Labour donor has been given a pass to Downing Street - granting him what it describes as "unrestricted access" to Number 10. The paper says Lord Alli - who led the party's fundraising for the general election and is Sir Keir's biggest personal donor - has hosted a reception in the Downing Street garden. Passes are usually restricted to official political advisers and civil servants, and the immediate family of the prime minister and chancellor. No 10 declined to comment to the newspaper. The Sunday Express leads on a warning from probation officers that pushing ahead with plans to release some prisoners early to ease overcrowding could put the public "at risk". The National Association of Probation Officers say the plans are being "rushed" through, without sufficient time to prepare. The Ministry of Justice says the current government inherited a prison system in crisis. According to the Sunday Telegraph, EE, the mobile phone network, has become the first major telecoms firm to advise parents not to give smartphones to children aged under 11. The company has drawn up new guidance, which says primary-age children should only be given "brick" phones, without internet access, while staff are being trained on giving advice to parents about safety controls for teenagers. The television presenter, Kirstie Allsopp, has told the Mail on Sunday that she was contacted by social services after revealing that her 15-year-old son had been interrailing across Europe. According to the paper, she was informed by Kensington and Chelsea Council that child protection concerns had been raised - and was asked what safeguards she'd put in place for her son's trip. In an interview, she describes the intervention as "Orwellian". The council say they take all referrals "very seriously". And the Sunday Times claims that "industry insiders" are adamant that Oasis will reunite for a string of concerts in Manchester and London next summer, 15 years on from Liam and Noel Gallagher's last gig together.

