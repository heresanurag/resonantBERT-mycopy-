content: |-
  Karolina Zurawska, 41, of Swansea, is charged with murdering six-year-old Alexander Zurawski.

  Mother in court accused of murdering her son, 6

  A mother has appeared in court accused of murdering her six-year-old son. Karolina Zurawska, 41, is accused of killing Alexander Zurawski, and the attempted murder of a 67-year-old man. Ms Zurawska was arrested on Thursday after officers were called to Cwm Du Close in Gendros, Swansea. Police said she and Alexander lived in the same home. She appeared at Swansea Magistrates' Court on Monday where during a short hearing she did not enter a plea, and spoke only to confirm her name, address and date of birth.

