  Ms Zurawska was remanded in custody and is due to appear at Swansea Crown Court on Tuesday. South Wales Police said it was not looking for anyone else in connection with the incident. Ch Supt Chris Truscott, divisional commander for Swansea and Neath Port Talbot, said it was "a distressing incident" which had been "a tremendous shock to the local community". Paying tribute to Alexander, his family said he was a "very kind child" who was always well behaved and "never naughty". They added he was "very clever and mature for his age", with a "great understanding of facts" and spoke both English and Polish.
