title: Entertainer Ken Dodd reacts to receiving a New Year Honour - BBC News
date: '2017-01-01'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38472743
content: |-
  Comedian Ken Dodd has been made a knight in the Queen's New Year Honours.

  Comedian Ken Dodd has been made a knight in the Queen's New Year Honours for services to entertainment and charity.

  The Liverpool star, 89, was made an OBE in 1982 spoke of his pride after being named in the honours list and said he would "wear it in bed".
