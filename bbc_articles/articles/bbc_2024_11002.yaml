title: 'Cardiff: Rapist carrying woman home captured on CCTV - BBC News'
date: '2024-05-08'
section: General
url: http://www.bbc.co.uk/news/uk-wales-65933713
content: |-
  Preet Vikal, 20, carried the woman to his university halls where he sexually assaulted her.

  CCTV footage shows a rapist carrying an "intoxicated" woman in his arms and across his shoulders through the streets of Cardiff.

  Preet Vikal, 20, admitted rape and was sentenced to six years and nine months in a young offenders' institution.

  Vikal met the woman while she was on a night out with friends in the city centre and then carried her to his university halls where he sexually assaulted her.

  The woman said she was left unable to sleep following the attack last June.

