title: 'Secondary breast cancer: ''I was 32 with a 10-month-old’ - BBC News'
date: '2021-10-07'
section: General
url: http://www.bbc.co.uk/news/uk-58810627
content: |-
  The number of people with secondary breast cancer, where the cancer has spread, will be audited.

  For the first time, patients with secondary breast cancer in England and Wales are going to be counted in a special audit funded by the NHS.

  Secondary breast cancer is when the cancer has already spread to other parts of the body. The condition reached the headlines in September after the death of the singer Sarah Harding.

  Campaigners have fought for a decade for this information, which they say will improve patient treatment and support. 11,000 people die each year from breast cancer.

  The BBC met Alina who was diagnosed with secondary breast cancer two years ago.

  If you've been affected by cancer, help and support is available at BBC Action Line.
