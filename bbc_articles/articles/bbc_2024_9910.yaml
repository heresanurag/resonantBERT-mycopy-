  Now the 34-year-old Ms Forbes is said to be considering running again. If she does, she might be able to reprise her line about the problems of continuity in relation to Mr Swinney, who has backed both higher taxes on higher earners and the socially liberal policies which she believes have landed the party in so much trouble. An SNP source said that she would also need to find a way to frame her social values that did not alienate younger and more liberal voters. The question for her, said the source, was: "Can Kate find a way to convince others that her views are not going to get in the way?" So far she has few declared backers. Sibling MSPs Annabelle and Fergus Ewing, whose late mother Winnie Ewing won a fabled by-election victory for the party in 1967, are among them. "It has to be the new generation & Kate Forbes," Ms Ewing wrote on social media. "Kate Forbes, without a shadow of doubt, is head and shoulders above all the other candidates," Mr Ewing told the World at One on BBC Radio 4, arguing that she was respected by Conservatives, Labour and the Liberal Democrats and could govern by securing backing from them on an issue-by-issue basis. "They will trust her," he said, adding: "Alex Salmond ran a minority government with 47 MSPs. We've got 63 so you only really need to win a budget debate and a motion of no confidence. The other debates, frankly, don't matter so much."

  Kate Forbes ran Yousaf close in a leadership contest a little over a year ago

  However, the Greens, who have seven MSPs at Holyrood, do not like the economic or social agenda of Kate Forbes. Co-leader Lorna Slater said she would not intervene in another party's leadership race but she has been clear that the policies of Ms Forbes would not be acceptable to her party. The question for the SNP, she said, was whether they wanted to "continue to be a progressive party", committed to "make income tax fairer" and tackle climate change, or to "take a different direction." Whoever wins the leadership, says James Mitchell, professor of public policy at Edinburgh University, they must refocus on competence. "There's too much high level visionary stuff, spin and all the rest of it," he said, adding: "very little thought goes beyond that. "There's very little thought going into delivery." Or, as deputy first minister Shona Robison put it, bluntly, on Monday night's Reporting Scotland: "We need to get our act together, clearly, and as quickly as possible." As Humza Yousaf has discovered, governing is hard but governing without a majority is much harder, whether by accident or design.
