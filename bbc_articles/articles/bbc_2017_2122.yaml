id: bbc_2017_2122
title: Trudeau 'won't lecture Trump on refugees' - BBC News
date: '2017-02-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38961633
content: |-
  US President Donald Trump and Canadian Prime Minister Justin Trudeau are quizzed on their opposing views on immigration.

  The Canadian prime minister has said he will not "lecture" the US president over his controversial immigration ban.

  Journalists quizzed the two leaders over their opposing stances on refugees, after bilateral talks at the White House.

  Asked if he believed President Trump's ban had merit on national security grounds, Justin Trudeau replied: "The last thing Canadians expect is for me to come down and lecture another country on how they choose to govern themselves."
