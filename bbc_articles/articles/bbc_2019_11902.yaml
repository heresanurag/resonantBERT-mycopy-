title: 'Norway ambulance hijack: Oslo rampage leaves three hurt - BBC News'
date: '2019-10-22'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-50142821
content: |-
  Three people - including baby twins - were injured after the emergency vehicle careered into them.

  This video can not be played To play this video you need to enable JavaScript in your browser. The ambulance crashed after a rampage through Oslo

  A man has been charged with attempted murder after a stolen ambulance crashed into a family in the Norwegian capital Oslo, injuring three people - including twin babies.

  Public broadcaster NRK showed images of the ambulance driving through the city as gunshots were apparently fired from inside the vehicle.

  A woman has been charged with illegal possession of a firearm.

  A motive for the attack has yet to be established although police are investigating possible links with far-right extremists.

  Police say a man stole the ambulance on Tuesday afternoon and drove it at pedestrians in the capital.

  "We have taken control of an ambulance that was stolen by an armed man," Oslo police said on Twitter.

  "Shots were fired to arrest the suspect, he is not seriously injured," they added.

  "A woman with a pram and an elderly couple were run over or had to throw themselves out of the way" of the stolen vehicle, police said in another Twitter post.

  An Oslo University hospital spokesman told the Reuters news agency that seven-month-old twins were injured.

  The spokesman said the stolen ambulance belonged to the hospital, and that a second ambulance had been used to stop the hijacked vehicle by crashing into it.

  An Oslo police spokeswoman told the BBC that the man was aged 32 and the woman was 25.

  The woman was arrested at a nearby shopping centre, she said.
