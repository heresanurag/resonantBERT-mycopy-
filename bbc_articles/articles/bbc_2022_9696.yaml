  "We started this process at the end of 2021 and went through a period of independent consultation... this ensured that, along with the latest research, we heard from our community, key groups and individuals about their views and experiences. "We are easily and reliably able to observe the advantages - in terms of both performance outcomes and physiology/biology - those athletes who are the male sex at birth have over athletes who are the female sex at birth. We are also a sport made up of three distinct disciplines, each of which have a long history with clear differentials between the performances achieved between males and females. "We'll now take time to develop guidance for event organisers, clubs, officials and coaches, to share this autumn, before the policy comes into effect from 1 January 2023. "British Triathlon wants to make clear that it does not tolerate transphobic behaviour, harassment, bullying or hate speech of any kind. Anyone commenting on our policy, should do so with empathy and consideration for all of those who have been involved and who may still have questions and concerns about how the policy impacts them." Chris Mosier, a triathlete who became the first transgender athlete to represent the United States in international competition, wrote on Twitter, external: "British Triathlon's move to ban trans women doesn't address any real issue; it's discrimination plain and simple. Last month, rugby league's governing body also banned transgender women from women's internationals while it does further research on its inclusion policy to "balance the individual's right to participate... against perceived risk to other participants".

