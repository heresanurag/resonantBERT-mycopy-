title: British Triathlon becomes first UK sport to create 'open' category for transgender
  athletes - BBC Sport
date: '2022-07-06'
section: Triathlon
url: http://www.bbc.co.uk/sport/triathlon/62063359
content: |-
  Transgender athletes will be barred from the female category at all events where there are prizes, times or rankings at stake, including at grassroots level.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Triathlon has become the first British sport to establish a new 'open' category in which transgender athletes will compete. The British Triathlon Federation confirmed that for athletes over the age of 12, competitive women's events will be reserved "for those who are female sex at birth". The policy, which will begin from January, will see an 'open' category "for all individuals including male, [male and female] transgender and those non-binary who were male sex at birth." It will apply to all events where there are prizes, times or rankings at stake, including at the grassroots level of the sport. Triathlon is an increasingly popular multi-disciplinary participation sport in the UK comprising running, swimming and cycling. "Where this is competitive activity, fairness is paramount," said Andy Salmon, chief executive of British Triathlon. "Our sport is gender-affected. "We believe this is the right policy for triathlon in Great Britain, and the right time to publish it. We have taken legal advice and are confident it's legally robust." British Triathlon said the new approach followed a survey of more than 3,000 members that found 80% were in support of the two categories. The new policy replaces the existing guidelines set in 2018, which allow trans women to compete against female athletes if they have suppressed their testosterone. Salmon said he was "not aware" of any elite-level transgender triathletes in Britain - but he added: "We didn't want to be a governing body that waited for that to be a problem before we tried to fix it. "We don't know what's going to happen tomorrow or the next day, and we wanted to be ready for that day."

  Last week Culture Secretary Nadine Dorries - following similar sentiment from UK Prime Minister Boris Johnson - told the heads of UK sporting bodies that "elite and competitive women's sport must be reserved for people born of the female sex". However Salmon said its new policy was "free from political pressure" and pre-dated Dorries' comments. A number of British sports bodies are reviewing their transgender eligibility policies. British Triathlon's new approach also comes just weeks after Fina, swimming's world governing body, voted to stop transgender athletes from competing in women's elite races if they have gone through any part of the process of male puberty. It is also aiming to establish an 'open' category at competitions, for swimmers whose gender identity is different than their birth sex. Former Great Britain swimmer Sharron Davies, who has argued against transgender participation in women's elite swimming, welcomed Fina's decision. However, Britain's Olympic diving champion Tom Daley said he was "furious" about the new policy. World Athletics president Lord Coe has hinted his sport will adopt a similar approach later this year. And the UCI, cycling's governing body, has updated its transgender guidelines to double the period of time before a rider transitioning from male to female can compete in women's races. Neither British Swimming nor British Cycling have announced any subsequent changes to their policies in line with their international governing bodies. British Triathlon said in a statement: "Our policy outlines that triathlon is a sport for everyone and that transphobic behaviour will not be tolerated.

