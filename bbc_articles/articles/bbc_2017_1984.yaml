content: |-
  Steve Hewlett marries in hospital after being told his treatment for oesophageal cancer must end.

  Radio 4's Steve Hewlett has married his partner in hospital after being told his cancer treatment could not continue.

  The Media Show presenter has been documenting his progress on air since being diagnosed last year.

  Speaking to PM's Eddie Mair on Monday, he said his consultant had helped arrange the quickie wedding after telling him he had "weeks, possibly months" to live.

