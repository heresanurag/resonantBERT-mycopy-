title: St Ives driver punctures tyres at guided bus lane car trap - BBC News
date: '2025-06-12'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-68580164
content: |-
  The council installed extra no-entry signs in October to stop drivers from using the lane.

  Dashcam footage has captured the moment a motorist punctured their tyres after driving into a so-called car trap.

  It happened on the Harrison Way guided busway in St Ives, Cambridgeshire, on 8 March.

  The traps were installed more than 12 years ago and Cambridgeshire County Council said it was aware of at least 60 occasions when drivers had "turned into the busway" in that time.

  Extra no-entry signs were installed in October in a bid to deter motorists from using the lane.
