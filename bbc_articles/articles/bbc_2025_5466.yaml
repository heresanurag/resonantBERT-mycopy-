title: 'Newspaper headlines: ''Trump turns off Ukraine missiles'' and ''serial spiking
  rapist'' - BBC News'
date: '2025-03-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c4g0z30kknlo
content: |-
  The US decision to stop sharing intelligence with Ukraine, and a serial rapist's conviction, make Thursday's papers.

  M142 HIMARS launches a rocket on Russian position in December 2023 in Ukraine.

  Many of Thursday's papers focus on the fallout of US President Donald Trump's decision to halt intelligence-sharing with Ukraine. The Guardian calls the measure a "serious blow for Kyiv" that will hinder "its ability to deploy long-range drone strikes effectively". "US turns screw" is the headline in the Sun. It says America has hinted it will reverse the measure if Ukraine signs a mineral deal to pay back billions in military aid. A Ukrainian MP tells the Times she cannot "imagine how many people will pay the ultimate price for the decision". The Financial Times says the withdrawal of intelligence "shackles Kyiv's hand in hitting back at Russians". "New two-tier justice fiasco" is the headline on the front of the Daily Mail. The paper has spoken to the shadow justice secretary, Robert Jenrick, about new guidelines in England and Wales on the treatment of defendants from minority backgrounds. He has accused ministers of "trying to play dumb" by distancing themselves from the measures - which were drawn up by an independent body. He says government officials attended meetings when the changes were decided. The front of the Daily Express carries a picture which appears to show a French navy dinghy escorting a boat full of migrants into British waters. The paper says pressure is intensifying on the French government to stick to its word to intercept small boats crossing the channel. "Fulfil la promesse!" is the headline. In its editorial, the Express argues that "if the traffic was in the opposite direction, there would be outrage in Paris". A UK government source says the home secretary is putting in "the work and graft" to tackle smugglers, and is "working closely" with her counterpart in France.

  The Prince of Wales with staff members during a visit to a hospital in Reading

  The I paper says it has seen documents that reveal the chancellor has cut up to £1.4bn earmarked for modernising schools and hospitals to fund a pay deal agreed with trade unions. The paper has spoken to the shadow education minister, Neil O'Brien, who accuses the government of hoping "no one would notice". NHS Providers, which represents hospital trusts, is quoted as saying "we need modern, safe places where staff can give patients first class care". The department for health says the government's "plan for change will get the NHS back on its feet". An education spokesperson says some projects will be delayed, but denies that new school building has been affected. Several papers carry pictures of the Prince of Wales during a visit to a hospital in Reading. The Daily Mirror says he honoured the sacrifice made by NHS staff during the pandemic. The Daily Telegraph says he has suggested that health workers should be given "enforced breaks" in their career to help prevent burnout. The paper says a "lighter" moment came when the Prince was invited to join a yoga class. The article says he told the instructor he could not bend and that he would "sit in a corner and talk while you're contorting".

