title: Baby Panda Yuan Meng makes debut in France - BBC News
date: '2018-01-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-42677048
content: |-
  The first panda ever born in France has gone on display to the public.

  Five-month-old cub Yuan Meng seemed keen to explore his surrounding but was never far away from his attentive mother.
