content: |-
  Lizzie Deignan will become the first female British cyclist to compete at four Olympics after being named in the Team GB squad for Paris 2024.

  Lizzie Deignan will become the first female British cyclist to compete at four Olympic Games after being selected by Team GB for Paris 2024. Deignan, who won road race silver at London 2012 and competed in Rio and Tokyo, has been named in a four-strong women's road squad alongside national road race champion Pfeiffer Georgi, time-trial champion Anna Henderson and Anna Morris. Defending BMX champions Beth Shriever and Charlotte Worthington have also been picked. Elinor Barker, who won Olympic gold in 2016 and silver in 2020 in the team pursuit on the track, will race at her third Games. She has been named in the women's endurance squad alongside fellow Tokyo Olympians Neah Evans and Josie Knight, while Morris and Jess Roberts will make their Games debuts. The announcement of the women's endurance squad was delayed after Katie Archibald, who had been expected to contest the team pursuit, omnium and madison, suffered extensive leg injuries after tripping over a step in her garden last month. Team GB will send their biggest cycling delegation of 30 riders to the 2024 Olympics. The first part of the squad was announced in June.

  Double world champion Shriever, who broke her collarbone in May, won GB's first Olympic BMX gold with victory in the racing event in Tokyo. Worthington was crowned the first female freestyle Olympic champion at the Japan Games, where she became the first woman to land a 360 backflip, but was left "in limbo" after failing to book her place in Paris at the recent Olympic qualifier series. Men’s freestyle park world champion Kieran Reilly is also in the squad, while Kye Whyte, who won silver three years ago, will again compete in the BMX racing.
