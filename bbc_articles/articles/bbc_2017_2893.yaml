id: bbc_2017_2893
title: Romanian protesters light up huge rally with phone torches - BBC News
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-38882575
content: |-
  Hundreds of thousands of protesters shone torches on their phones at an anti-corruption rally in the capital Bucharest, lighting up Victory Square.

  It's thought between 250,000 and 300,000 people were at the demonstration, which came despite the government revoking a controversial decree which would have shielded many politicians from prosecution for corruption.
