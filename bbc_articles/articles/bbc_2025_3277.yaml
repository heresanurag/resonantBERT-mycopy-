  Talk of Trump and independence has overshadowed other key issues for voters, says newspaper editor Masaana Egede. "It's an election where we should be talking about healthcare, care of the elderly and social problems. Almost everything is about independence." According to recent polls, almost 80% of Greenlanders back moves towards future statehood. About 44,000 people are eligible to vote, and given the low numbers and few polls, results are difficult to forecast. Even though a majority of Greenlanders favour independence, a survey has shown, external that half would be less enthusiastic about independence if that meant lower living standards. One poll found that 85% of Greenlanders do not wish to become a part of the United States, and nearly half see Trump's interest as a threat.

  Tensions between Greenland and Denmark have been heightened over past mistreatment of Inuit people by the Danes

  One fear among some Greenlanders, says Masaana Egede, is how long the Arctic island could remain independent and whether it would break off from Denmark only to have another country "standing on our coasts and start taking over". Experts say it is this worry that could steer votes towards keeping the status quo. Although Greenland's right to self-determination is enshrined into law by the 2009 Self-Rule Act, there are several steps to take before the territory could break away from Denmark, including holding a referendum. This means getting full independence could take "about 10 to 15 years," says Kaj Kleist, a veteran Greenlandic politician and civil servant who prepared the Self-Rule Act. "There is lot of preparation and negotiations with the Danish government before you can make that a reality," he adds. Whatever the election's outcome, experts do not believe Greenland could become independent before Trump's second term is over in 2028. The results are expected in the early hours of Wednesday.
