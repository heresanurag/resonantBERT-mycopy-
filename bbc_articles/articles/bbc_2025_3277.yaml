title: Greenland goes to polls in vote dominated by Trump and independence - BBC News
date: '2025-03-10'
section: World
url: http://www.bbc.co.uk/news/articles/cr4236e2wz2o
content: |-
  Donald Trump's vow to take over Greenland has shone a global spotlight on the island's elections.

  Greenland goes to polls in vote dominated by Trump and independence

  Greenland has 72 polling stations and voting ends at 22:00G on Tuesday

  Residents of Greenland are going to the polls in a vote that in previous years has drawn little outside attention - but which may prove pivotal for the Arctic territory's future. US President Donald Trump's repeated interest in acquiring Greenland has put it firmly in the spotlight and fuelled the longstanding debate on the island's future ties with Copenhagen. "There's never been a spotlight like this on Greenland before," says Nauja Bianco, a Danish-Greenlandic policy expert on the Arctic. Greenland has been controlled by Denmark – nearly 3,000km (1,860 miles) away – for about 300 years. It governs its own domestic affairs, but decisions on foreign and defence policy are made in Copenhagen. Now, five out of six parties on the ballot favour Greenland's independence from Denmark, differing only on how quickly that should come about. Voting takes place over 11 hours at 72 polling stations, and ends at 20:00 local time on Tuesday (22:00G). The debate over independence has been "put on steroids by Trump", says Masaana Egede, editor of Greenlandic newspaper Sermitsiaq. The island's strategic location and untapped mineral resources have caught the US president's eye. He first floated the idea of buying Greenland during his first term in 2019. Since taking office again in January, he has reiterated his intention to acquire the territory. Greenland and Denmark's leaders have repeatedly rebuffed his demands. Addressing the US Congress last week, however, Trump again doubled down. "We need Greenland for national security. One way or the other we're gonna get it," he said, prompting applause and laughter from a number of politicians, including Vice-President JD Vance.

  US president Donald Trump says he wants the US to take over Greenland. Many people think it will never happen. But could it? If so, how?

  Donald Trump again said he wanted the US to get Greenland "one way or another" in his Congress address last week

  In Nuuk, his words struck a nerve with politicians who were quick to condemn them. "We deserve to be treated with respect and I don't think the American president has done that lately since he took office," Prime Minister Mute Egede said. Still, the US interest has stoked calls for Greenland to break away from Denmark, with much of the debate focused on when – not if – the process of independence should begin. Greenland's independence goal is not new, Nauja Bianco points out, and has been decades in the making. A string of revelations about past mistreatment of Inuit people by the Danes have hurt Greenlandic public opinion about Denmark. Earlier this year, PM Egede said the territory should free itself from "the shackles of colonialism". But it is the first time the subject has taken centre stage in an election.

  Prime Minister Mute Egede, right, is pushing for a more gradual transition towards autonomy for Greenland

  Inuit Ataqatigiit (IA), the party of Prime Minister Mute Egede, favours gradual steps towards autonomy. "Citizens must feel secure," he told local media. Arctic expert Martin Breum says Egede's handling of the challenge from Trump and strong words against Denmark over past colonial wrongdoings "will give him a lot of votes". Smaller rivals could also gain ground and potentially shake up alliances. Opposition party Naleraq wants to immediately kick-off divorce proceedings from Copenhagen and have closer defence dealings with Washington. Pointing to Greenland's EU departure and Brexit, party leader Pele Broberg has said that Greenland could be "out of the Danish kingdom in three years". Naleraq is fielding the largest number of candidates and has gained momentum by riding the wave of discontent with Denmark. "Naleraq will also be a larger factor too in parliament," predicts Mr Breum, who says party candidates have performed well on TV and on social media. However, the centre-right Demokraatit party believes it is too soon to push for independence. "The economy will have to be much stronger than it is today," party candidate Justus Hansen told Reuters. Greenland's economy is driven by fishing, and government spending relies on annual subsidies from Denmark.

