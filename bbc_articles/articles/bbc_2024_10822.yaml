  Speaking on Sunday, former Home Secretary Suella Braverman said Mr Sunak's plan was "not working". "There is no disguising the fact these have been terrible election results for the Conservatives," Mrs Braverman told the BBC. Mr Sunak must "change course" towards more right-wing policies in order to win back Tory voters who are "on strike", she added. Although a frequent critic of the prime minister, Mrs Braverman did not call for Mr Sunak's replacement, arguing it would be "impossible" to change leaders so close to a general election. Mrs Braverman is among several conservative voices who have come out to advocate for a rightward policy shift in light of the bleak local election results. Miriam Cates, co-chair of the New Conservatives group mostly made up of "red wall" MPs, from the party's 2019 intake, said her party must offer "patriotism and national security" to avoid falling into the "abyss". Writing in the Telegraph, external, Ms Cates called on Mr Sunak to ignore policies that "serve an international elite" and instead focus on drastically reducing immigration and reforming planning laws to boost house-building. Former lead Brexit negotiator Lord David Frost said he believed it was "too late" to save the Conservative Party from "electoral defeat at the next general election". To save the party Mr Sunak must produce "more tax cuts, more spending cuts" and a "serious assault on the burden of net zero", Lord Frost argued. However, Damian Green, chairman of the centrist One Nation Group of Conservative MPs, said "suggesting that what we need to do is to move to the right is irrational in the face of the electorate". Speaking on BBC Radio 4's Westminster Hour, the former first secretary said: "I would just observe the seats that we have lost in the past few days - we lost to parties to the left of us." Conservative Party chairman Richard Holden told the same programme that voters wanted the party to put forward a "clear vision for the country". "I think it is self-indulgent for us to be talking to ourselves and talking about ourselves at the moment," he said.
