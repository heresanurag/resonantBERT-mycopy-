content: |-
  Monday's front pages include a stories on the economy and a possible Mandelson-Farage link up.

  Mandelson seeks Farage 'help' with Trump and 'not over' for Fury

  The Daily Mail says a "recession made in Downing Street", external is on the way, as it leads on the warning from business leaders at the CBI that the government's budget measures may hit jobs, investment and growth at the start of 2025. The Daily Express highlights a Conservative quote that the government is creating a "hostile climate", external for the economy, and carries the stark headline "Labour set to drive UK headlong into recession". The Times, external leads with Labour reaction to the CBI report, with various admissions that the "stalling economy" is "disappointing" and "frustrating". The paper goes on to say there is "little festive cheer" with expectations of economic growth at their lowest since Liz Truss was in Number 10. The Times also reports that there have been discussions among Labour figures over whether Sir Keir Starmer will lead the party into the next election. There is more bad news for the prime minister in the i. It suggests Sir Keir will face his biggest rebellion yet, external by his own MPs on the government's refusal to compensate "Waspi" women, who say they were not properly informed about changes to their pension age. The paper says Labour rebels believe dozens of MPs will vote against the government in the New Year, and that Labour insiders are surprised at the extent of the criticism from what it calls "newbie" MPs. The Daily Telegraph highlights an unexpected collaboration. It says that Lord Mandelson - the UK's new ambassador to the US - is set to work with Reform UK leader Nigel Farage, external to help him win over the incoming Trump administration. The paper says it will be part of efforts to persuade Trump not to "go to war with Britain on tariffs". The article also says that the move is opposed by some senior Labour figures, who think it might "elevate" the right wing cause. The Reform UK party treasurer, Nick Candy is making headlines in the Financial Times, external. He tells the paper his party will cause "political disruption like we have never seen before". The property developer, who was recently photographed with Elon Musk, claims to have several other billionaire backers. Candy also tells the FT he would raise more money than any other political party and that Reform UK would have more members than the Conservatives within three months. Analysis by the Guardian has found that more than £100m was spent last year by local authorities and the government in England on failed efforts to block support for children and young people with special educational needs., external The paper says the "enormous" costs in legal fees and staff resources did not prevent them losing the vast majority of cases taken to tribunals. Experts tell the paper it is a sign that special education provision was "becoming a battle between cash-strapped councils and desperate families". And the state of personal hygiene is the top story for the Daily Star. It reports on a study that has found that millions of people go without a shower and do not change their pants so often between Christmas and New Year. Its festive headline is "Jingle Smells"., external

