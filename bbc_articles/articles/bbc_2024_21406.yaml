  "We are strong, we are powerful," said Rebecca, adding that it is a view of women that is still met with some resistance. "But now it's getting so much more popular and women are starting to realise we don't have to follow society's stereotype of what a woman should be," she said. She remembered early strong woman events being "held in a car park" and winning out-out-date protein powder as a first place prize. Now she is competing for "six figure" purses. It is not enough to pay all her bills - Rebecca also works as a quality assurance analyst - but she said she hopes one day it could be a full time career. "My long term goal is to be regarded as the strongest woman to have ever lived," she said, aiming to win the world's strongest woman competition a record five times. If you have been affected by any of the issues raised in this story you can visit BBC Action Line.
