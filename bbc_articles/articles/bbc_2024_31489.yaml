content: |-
  After watching Gabriel Jesus score a hat-trick against Crystal Palace in midweek, Arsenal boss Mikel Arteta says the striker has rediscovered his best form.

  Is Jesus the answer to Arsenal's striker dilemma?

  This video can not be played To play this video you need to enable JavaScript in your browser. MOTD: How 'wonderful' Jesus keeps on scoring for Arsenal

  After watching Gabriel Jesus score a Carabao Cup hat-trick against Crystal Palace in midweek, Arsenal boss Mikel Arteta said the striker had rediscovered his best form. Unfortunately for Palace, they hadn't seen the last of the Brazilian frontman this week. At Selhurst Park on Saturday, Jesus picked up where he left off at Emirates Stadium on Wednesday, scoring two first-half goals – his first in the Premier League this season – in a thumping 5-1 victory over Oliver Glasner's team. He opened the scoring after just six minutes, firing past goalkeeper Dean Henderson after Bukayo Saka's cross was deflected into his path. Ismaila Sarr levelled for Palace but Jesus restored the Gunners' advantage with a perfectly placed effort into the top corner. The striker had opportunities to complete his second hat-trick in the space of four days but five goals in two games is a more than satisfactory return for a player who had only managed five in his previous 45 outings for Arteta's team. "It is great to be back in the team, playing more," Jesus said after Saturday's victory. "Arsenal is a massive club and I know the pressure as a number nine here. When I play with a smile on my face, everything is different." Former England striker Alan Shearer said on BBC Match of the Day: "He's been having such a tough time in front of goal. Mikel Arteta deserves a lot of credit. He got the goals in midweek and you can see the belief he would have had in training. "He had to start him today. It was a wonderful performance. It's no surprise he's back in the goals. He's got a spring back in his step." After recent questions about whether Arsenal need to sign a more natural goalscorer, could Jesus be the focal point the Gunners are looking for?

  Jesus' five goals against Palace this week have come from only 10 attempts – an impressive return by any standards. He could easily have had another treble at Selhurst Park, heading against the post moments before Kai Havertz made it 3-1 and shooting straight at Henderson in the build-up to Gabriel Martinelli's fourth for Arsenal. He registered more attempts - and attempts on target - than any of his team-mates in south London, while his six touches inside the Palace box were surpassed only by Martinelli. "He has changed his game – he is getting in the box more," former Arsenal midfielder Paul Merson told Sky Sports. "He was in the box so much today. "He has realised that assists aren't enough to get him into this Arsenal team." Jesus registered as many assists as goals last season – eight in all competitions – but speaking after Arsenal's latest triumph, the Brazilian hinted at a renewed hunger to get into more threatening areas of the pitch. "I'm happy to get more chances but it is down to me to put myself in a good position to score," the 27-year-old said. "I know I can score. I just have to put myself in a good position to finish the action, like today. I understand I have to be more in the box to finish the action."

  Only Gabriel Martinelli managed more touches inside the Palace box than Gabriel Jesus, but the latter was involved in all areas of the pitch

  That desire to take up position in more dangerous areas does not appear to be detracting from Jesus' all-round game - certainly not against Palace. A cursory glance at the striker's touch map shows he played his part in all areas of the pitch, with 12 of his 40 touches coming inside his own half. Among Arsenal players, only Martinelli was involved in more duels than Jesus' 13 at Selhurst Park, but the latter won more - six - than any of his colleagues. As well as covering just under 10 miles, Jesus also racked up more intensive runs - 345 - than any other Gunners player. As Arteta's side enter one of the busiest periods of the season, Jesus appears to have found the ideal middle ground between fox in the box and tireless forward, willing to cover every blade of grass to help his team's cause. If he can keep that up, Palace are unlikely to be the only club to suffer at his hands in the coming weeks and months. "I always work hard," said Jesus. "When a player is playing constantly it is different, [in terms of] confidence and physicality. "I'm happy to get more chances. I'm trying to keep my mind strong and help the team. "I am happy to be back scoring. I want to keep scoring."
