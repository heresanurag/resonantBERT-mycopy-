title: 'Charles Hurst: NI''s largest car dealership to cut about 100 jobs - BBC News'
date: '2023-12-13'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67701930
content: |-
  Charles Hurst has eight sites across Northern Ireland and employs almost 900 staff

  Charles Hurst has eight sites across Northern Ireland and employs close to 900 staff.

  Some sales staff and business managers may be affected by the cuts which were announced internally on Tuesday.

  It comes after Charles Hurst's parent company Lookers was taken private by its new owner Global Auto Holdings.

  Notice periods are still being confirmed and will be dependent on the length of service and role of each colleague at risk.

  News of the job losses was first reported in the Belfast Telegraph on Tuesday.

  Last week, Lookers confirmed that a certain number of corporate and support roles relating to its status as a listed company may be affected.

  A spokesperson for Lookers said: "We have now completed a detailed review of our business and operations in order to keep the business efficient and ensure we have a manageable cost base.

  "Unfortunately, a number of roles have been identified across our operations that are now at risk of redundancy."
