id: bbc_2021_5864
title: Video captures man walking past Christchurch wall collapse - BBC News
date: '2021-05-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-dorset-57253965
content: |-
  The gable end of a house in Christchurch, Dorset, collapses as a man walks along the street.

  A man was captured on a doorbell camera walking past a house as its gable collapsed on to a street.

  The man, who appeared to be uninjured, continued on his journey along the street in Christchurch after the incident, in which a car was badly damaged.

  Dorset and Wiltshire Fire and Rescue service tweeted that the road was closed due to the "unsafe structure" after the incident on 21 May.

