  Thursday night’s speech at the Democratic convention is the most consequential moment in Kamala Harris’s political career. While the Republican convention served as a coronation for Trump, who was nominated as his party’s candidate for the third consecutive time, Ms Harris’s sudden rise means her speech will be seen as a pivotal moment to define who she really is. While she’s stood on the stage before, a senior aide said the speech will have a heavier focus on her personal story than previous nominees. “This is the why part of the conversation. Why is she running for president? What is her vision for the country?” said Mr Simmons, her former communications director. “That will help tie together all of the strands of her policy and political life that will make sense for people.” But over the course of four days, Ms Harris will need to sharpen her messaging around crime, inflation, the economy and immigration – issues the Trump campaign will relentlessly target between now and election day. Whit Ayres, a longtime Republican strategist, said Ms Harris will also at some point have to clarify the left-leaning positions she took in 2019 during her failed presidential bid. "Her greatest vulnerability is that there is plenty of evidence that she's a San Francisco liberal with a whole set of far left wing policy positions that are outside the mainstream of American thinking, and she hasn't had to answer for those yet," he said.

  She will also be confronted with protests over Israel’s actions in Gaza, a polarising issue that has politically cleaved the party. Ms Harris has been more forceful in her calls for a ceasefire and condemnation of civilian deaths than President Biden, but she has not wavered from the administration’s steadfast support for Israel - a stance that risks alienating the party’s progressive wing. “How she positions [herself on Gaza] is going to be her hardest trick,” said Mr Brinkley, the presidential historian. Still, allies and advisers who have been preparing her over the last week contend she’s built the foundations for a presidential run over the last four – sometimes bumpy – years, even if few expected she would actually find herself in this position at this moment. “Opportunity is preparation meeting a little bit of luck and I wouldn’t characterise this as luck, because nobody wanted it to be this way, but certainly she was prepared to meet the moment of opportunity,” a senior political adviser said. Susie Tompkins Buell, a Democratic donor and co-founder of Esprit and The North Face who has known Ms Harris since the 1990s, said she wasn’t surprised by how Ms Harris had performed in the last few weeks. In the days after Mr Biden’s halting debate performance, she attended an event with the vice-president and said she could tell change was afoot. After telling Ms Harris to fasten her seatbelt, Ms Buell said the soon-to-be Democratic nominee quipped, “I was born with a seatbelt.” “I liked her response,” said Ms Tompkins Buell, who helped Ms Harris raise $12m at a San Francisco fundraiser earlier this month. “It was sudden and it was right on. She’s ready.”
