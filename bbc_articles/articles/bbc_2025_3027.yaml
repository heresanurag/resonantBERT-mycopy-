title: Neil Gaiman's ex-wife Amanda Palmer denies negligence allegations - BBC News
date: '2025-02-08'
section: Culture
url: http://www.bbc.co.uk/news/articles/c87d283ld9do
content: |-
  The former couple faces a lawsuit from a woman who worked for the couple in New Zealand.

  Amanda Palmer, the ex-wife of British author Neil Gaiman, has denied allegations of negligence and human trafficking made by a woman who worked for the former couple. Earlier this week, the woman filed civil lawsuits in the US alleging the former couple violated laws on federal human trafficking, with complaints of assault, battery and inflicting emotional distress against Gaiman and negligence against Palmer. In a short post on Instagram, Palmer, who lives in the US, said she would not respond to specific allegations against her, but broadly denied them. Gaiman has denied allegations of sexual misconduct made by eight women.

  The lawsuits claim the woman was befriended by Palmer when she was 22 years old and homeless. She claims she had started working for the couple in New Zealand when the assaults began. According to the lawsuits, she alleges that Gaiman sexually assaulted her and Palmer told her there had been previous complaints from more than a dozen different women. On Instagram, Palmer, who is a member of band The Dresden Dolls, wrote: "I thank you all deeply for continuing to respect my recent request for privacy as I navigate this extremely difficult moment. I must protect my young child and his right to privacy. "With that as my priority, I will not respond to the specific allegations being made against me except to say that I deny the allegations and will respond in due course. My heart goes out to all survivors." On 13 January, Gaiman was reportedly accused of sexual misconduct by eight women, including four who previously spoke out in a New York Magazine article. It led to publisher Dark Horse Comics cancelling upcoming work by Gaiman, external and a UK stage adaptation of his book Coraline has been pulled. Gaiman, 64, has denied allegations of sexual misconduct made by eight women saying he has "never engaged in non-consensual sexual activity with anyone. Ever". Palmer tied the knot with Gaiman in 2011 and they announced the birth of their son in 2015. In a shared statement with Gaiman they revealed they were getting divorced in 2022. "After many years of marriage, we have made the difficult decision to divorce," they said. "While we will no longer be partners in marriage, we will remain in one another's lives as co-parents committed to raising our wonderful son in a loving and compassionate environment. "We deeply appreciate everyone respecting our family's privacy so we can focus on our son as we enter this new chapter in our lives."
