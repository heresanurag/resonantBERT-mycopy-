title: Breast cancer survivors model lingerie at New York Fashion Week - BBC News
date: '2017-02-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38966641
content: |-
  Women who survived breast cancer proudly bare their scars in alternative lingerie.

  Women who survived breast cancer hit the catwalk at New York Fashion Week in alternative lingerie, to raise money for the charity Cancerland.

  The AnaOno Intimates show was the brainchild of US designer, and breast cancer survivor, Dana Donofree.

  Model Paige Moore, 24, said: "I felt sexy, I felt beautiful, and I was proud."
