  Maldwyn "Gwern" Evans was "a loving son and a caring brother", his family say.

  Maldwyn "Gwern" Evans was "a loving son and a caring brother, who touched the hearts of so many," say his family

  A four-year-old boy died while trying to push a vintage garden roller, an inquest has heard. Maldwyn "Gwern" Evans, who was described by his family as a "keen little farmer" with a "captivating personality", died in the incident at his home in Tynreithin, near Tregaron, in Ceredigion, on 20 June. The inquest in Aberystwyth heard the roller "went over part of his body". A post-mortem examination has not yet been completed.

  The inquest was opened and adjourned, with a full inquest expected to be held in October. Dyfed-Powys Police said it was not treating the death as suspicious.

  Joyce George, head of Ysgol Pontrhydfendigaid, where the boy was a pupil, said: “We are extremely saddened to hear this tragic news. "We would like to express our deepest condolences to the family at this very sad time. "We will be providing help and support to both our pupils and staff during this difficult time." Ceredigion Council added that their "thoughts are with the family and we are support them in every way we can". In a tribute released on Tuesday, the family said they were "incredibly distraught by our tragic loss" of a "loving son and a caring brother who touched the hearts of so many".
