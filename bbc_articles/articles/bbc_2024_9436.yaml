title: 'Tel Aviv protests: Thousands demand Netanyahu resign - BBC News'
date: '2024-04-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-68752292
content: |-
  Anti-government demonstrators take to the streets of Tel Aviv calling for early elections.

  Thousands of people rallied in the streets of Tel Aviv as Israel enters its sixth month of war in Gaza.

  The protesters were demanding the resignation of Prime Minister Benjamin Netanyahu and a deal with Hamas to release Israelis still held hostage in Gaza after the 7 October attack.
