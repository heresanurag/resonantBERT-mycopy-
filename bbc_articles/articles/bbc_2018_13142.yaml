  "Omgggg so I voted for the first time ever today!!! I'm feeling so empowered!!! Some of my peers teased me for being "too involved" in politics but it was all worth it!! I voted for myself as well as yours. I have hope for humanity," wrote 18-year-old activist Kenidra Woods on Twitter.

  March for Our Lives, the gun control movement set up by survivors of the mass shooting in Parkland, Florida, shared pictures of 15-year-old students calling up voters.

