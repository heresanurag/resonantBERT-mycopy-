  While some of these engaged voters were always going to turn out, young people feel they have a reason to go to the polls.

  The mid-terms come at a time when Gen Z's (people aged 15 to 21) high stress levels are contributing to the worst mental health crisis of any generation, according to a recent report by the American Psychological Association.

  Gun violence, political turmoil and migrant family separation are among issues causing concern, with 75% of Gen Z describing mass shootings as a significant source of stress.

  In Texas, more than 500 college students marched to the polls to protest against allegations of voter suppression, according to the Houston Chronicle.

  "Big events in American politics cause young people to think about politics differently," the author of a Harvard poll, which suggested Gen Z turnout could be historically high, told the Atlantic in October.

  Issues popular with millennials also did well on the night, particularly in state-wide ballots, suggesting that their vote may have had an impact.

  Michigan voters approved the legalisation of cannabis, a move supported by 74% of the age group nationally, according to Pew Research Centre.

  In Washington, initiative I-1639 passed, making firearm laws the strictest in the country, according to the Seattle Times.

  It was a landmark night for LBGT candidates too, with America's first openly gay governor, Jared Polis, elected in Colorado.

  However, in tight races in Texas, Florida and Georgia, where young voters were projected to be fired up by media, including USA Today, Republican candidates did well, deflating Democrat hopes.

  The under-35s are usually considered liberal, so the success of conservative candidates suggests that the youth vote didn't make as many waves as predicted.

  But with commentators like CNN's Van Jones talking about a "rainbow wave" of young, female, LGBT, and black and brown candidates sweeping the country, the way both parties look and express themselves to voters is changing.
