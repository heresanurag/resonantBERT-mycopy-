  Others said they were trying to check in for flights and the "systems are down" or that technical problems had prevented them from booking flights. Sources within the airline suggest the situation is being brought under control, but there are concerns that delays this evening could have a knock-on effect on Tuesday's flights. Some travellers commenting on social media said they had been told that pilots were unable to generate loading data for their aircraft and have been struggling to get through to colleagues by phone.

