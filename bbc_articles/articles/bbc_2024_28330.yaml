  A spokesperson for Heathrow Airport said it was aware of the technical problems at BA, but that its own systems were operating normally. It is not the first time BA has faced severe disruption due to an IT failure. In May last year, flights were grounded. A similar thing happened in spring 2017, disrupting Bank Holiday plans, and in February 2020.

