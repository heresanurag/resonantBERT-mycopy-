content: |-
  Details and reaction to today's televised briefing by Health Minister Vaughan Gething.

  Tesco were “simply wrong” to tell a woman she could not buy period products during lockdown, Wales' health minister has said.

  The supermarket has since apologised and admitted it had incorrectly applied rules that say they can only sell essential items until November 9.

  It later said an area of its store in St Mellons, Cardiff had been cordoned off due to a break-in.

  The issue has prompted protests and calls for the Senedd to be recalled.

  Speaking at a Welsh Government briefing, Health Minister Vaughan Gething said meetings would be held with the supermarkets this afternoon to make clear they could use “some discretion” to sell non-essentials to those in “genuine need”.

  He said he was “very sorry” a woman was wrongly told sanitary products could not be sold.

  “It’s an incorrect reading of both the regulations and the guidance. And I’m very sorry this woman was given this information.”

  During the lockdown supermarkets are unable to sell items other high-street stores can’t provide as they have been told to close.

