  Ukraine's president gets a standing ovation from US lawmakers on his first foreign trip since Russia's invasion.

  A brief history of the war in Ukraine

  Let's step away from the White House briefly, for a wider look at ten months of conflict. Russia sent up to 200,000 soldiers into Ukraine on 24 February - the biggest invasion in Europe since World War Two. It made unfounded claims of Nazis and genocide in the neighbouring country. It also opposed Ukraine joining the Western Nato military alliance. Its hope was to capture the capital Kyiv and depose the government in a matter of days. Its forces quickly captured big stretches of territory, but crucially they failed to take Kyiv. In the subsequent months, Moscow's troops were forced into a series of retreats, first in the north and then in the south. To date, they've lost more than half the territory seized at the start of the invasion. Putin, on the backfoot, announced a "partial mobilisation" of some 300,000 troops in September and declared four "annexed" Ukrainian regions as being Russian territory. Russian soldiers have been accused of numerous abuses during the fighting - which Ukraine has suggested amount to genocide. Moscow denies such allegations.
