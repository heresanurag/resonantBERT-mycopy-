title: Syria rebels burn tomb of Bashar al-Assad's father - BBC News
date: '2024-12-12'
section: General
url: http://www.bbc.co.uk/news/videos/c938n09pqn3o
content: |-
  Video shows Syrian rebel fighters gather around the burning tomb of the late president Hafez al-Assad.

  Video shows Syrian rebel fighters destroying tomb of the late president Hafez al-Assad, the father of the ousted Syrian president Bashar al-Assad.

  The tomb also houses the graves of Hafez al-Assad's wife and eldest son.

  Rebels led by Islamist group Hayat Tahrir al-Sham (HTS) gathered in mausoleum in the family's home town of Qardaha, in the north-west of the coastal Latakia region.
