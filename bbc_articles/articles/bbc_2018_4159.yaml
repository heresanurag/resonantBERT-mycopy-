title: Why I live in a plastic bottle castle - BBC News
date: '2018-04-22'
section: General
url: http://www.bbc.co.uk/news/business-43825834
content: |-
  The man building a four-storey castle out of recycled plastic bottles.

  'Plastic King' Robert Bezeau has built the world's first plastic bottle castle. The Canadian's four-storey fortress on Panama's Bocas del Toro island shows how plastic waste can be made into low-cost sustainable housing. He's also building an eco-village using the same method.

  Robert was the first foreigner to win the Environmental Excellence Award in Panama for his project, which educates children and creates incentives for them to pick up plastic waste.
