title: Diver swims through 'horrifying plastic cloud' - BBC News
date: '2018-03-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-43303523
content: |-
  Rich Horner filmed himself swimming through rubbish off the island of Nusa Penida near Bali.

  The Indonesian island of Bali is popular with tourists and known for its beautiful beaches.

  British diver Rich Horner lives on a nearby island, and filmed himself swimming through rubbish in the sea.
