title: 'Mexico: Surfers pay tribute to tourists found dead - BBC News'
date: '2024-05-06'
section: General
url: http://www.bbc.co.uk/news/world-68964757
content: |-
  Authorities believe three tourists were attacked trying to fend off an attempted theft.

  Dozens of surfers performed a “paddle-out” ceremony as a tribute to the three tourists found dead in Mexico.

  Local authorities confirmed that two Australian surfers and one American were shot in the head and their bodies dumped in a well.

  Brothers Jake and Callum Robinson, 30 and 33, and their friend Jack Carter Rhoad, 30, disappeared on 27 April while on a surfing trip in Ensenada.

  Officials believe the men were attacked trying to stop the theft of their pickup truck.
