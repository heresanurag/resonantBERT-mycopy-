content: |-
  Assistant coach Rob Howley says Warren Gatland is the best coach in the world and believes he will not leave his Wales role despite a record run of defeats.

  Howley calls Gatland 'best coach in the world'

  Rob Howley and Warren Gatland have worked together at Wasps, Wales and the British and Irish Lions

  Coverage: Live on S4C, BBC Radio Wales, Radio Cymru and Radio 5 Sports Extra, live text and commentary on the BBC Sport website and app

  Assistant coach Rob Howley says Warren Gatland is "the best coach in the world" and believes he will not leave his Wales role. Head coach Gatland has overseen a record run of 11 successive Test match defeats, with world champions South Africa next up to face Wales on Saturday. A Springboks victory would mean Wales going the calendar year without winning a Test, which has not happened since 1937. Gatland says he has the desire to continue in his role and Howley is backing his boss. "We've got the best coach in the world who has had a legacy of more than 13 years," said Howley. "He's won Grand Slams and there is no better coach to have in your camp than Warren. "He gives players the confidence and self-belief they need to go out and play."

  This video can not be played To play this video you need to enable JavaScript in your browser. Warren Gatland: Head coach hopes for time to turn Wales' fortunes around

  During Gatland's first 12-year stint in charge, Wales were twice World Cup semi-finalists, won three Grand Slams and celebrated a 14-match unbeaten run that briefly took them to number one in the world rankings. Since he returned in December 2022, Wales have won six and lost 17 times in 23 matches, a run which has seen them drop to a lowest position of 11th in the rankings. Wales host the Springboks on the back of a comprehensive defeat against Australia and a first home loss to Fiji. Gatland's side have not won a Test since the 2023 World Cup and there has been a lot of speculation about his future. Howley was asked if he would take an interim head coach job if Gatland departed, but responded defiantly by saying, "Warren Gatland won't leave". Howley insists Gatland's experiences can help turn Wales around. "Warren is a hugely respected coach and has coached over a number of years," said Howley. "His legacy with different teams is a winning legacy. At the moment we are in this spell where we are losing. "We at some point know we will win and I hope it will be the next game on Saturday. "I think at the moment we've got the best coach who has got years of experience. "We've been in changing rooms where we've won and lost, Lions changing rooms going into series at 1-1 with everything on the line. "He understands rugby and I believe Wales have got the best coach in the world to get us out of this."

  Wales head coach Warren Gatland (right) selected Dewi Lake as a co-captain for the 2023 World Cup in France

  Wales captain Dewi Lake also believes Gatland can galvanise the squad. "His presence alone is huge," said the hooker. "We are a young group and were probably massive fans growing up watching his first stint with the Grand Slams and undefeated runs. "His knowledge and passion for the game as well kind of resonates with you as a player. "Maybe you are feeling a little bit sorry for yourself or have had a tough day, and his ability to pick you back up and get you back ready to go again is second to none." Lake says he has a good relationship with the under-fire Wales head coach. "It has been an easy working relationship between us in terms of small chats or things we feel are going well or we need to change," said Lake. "He knows what's going on, he has been around for long enough, he has coached plenty of top-level teams and knows how to make us tick."
