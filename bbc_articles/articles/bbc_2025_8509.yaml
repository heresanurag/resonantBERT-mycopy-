  Kaliyah Coa's body was recovered at Maritime Quay on the Isle of Dogs on 13 April.

  Body found in Thames confirmed as that of girl, 11

  Kaliyah Coa went missing last month on a school inset day

  A body found in the River Thames is that of 11-year-old Kaliyah Coa who went missing in east London last month, the Metropolitan Police has confirmed. In a statement issued through the force, her family said Kaliyah had been attending a birthday party but "never returned home". Her body was recovered at Maritime Quay on the Isle of Dogs, east London, on 13 April. Kaliyah was reported missing on 31 March after playing near Barge House Causeway in Woolwich during a school inset day. In their statement, Kaliyah's family said: "Our hearts are broken and our lives will never be the same. We were blessed to have Kaliyah, even if it was for such a short time. She will be missed so much."

  An inquest into Kaliyah's death is due to open on Friday. Det Supt Scott Ware, who led the Met's investigation, said: "This tragic accident took away a little girl who was loved by many." The family thanked all those who took part in the search for Kaliyah and requested their privacy be respected.
