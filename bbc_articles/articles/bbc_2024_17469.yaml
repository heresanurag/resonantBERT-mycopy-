content: |-
  The brothers' are still awaiting trial for and their new freedom of movement is subject to appeal

  Andrew Tate free to leave Romania but not the EU

  The Tate brothers arrive at a court hearing in Bucharest

  Controversial influencer Andrew Tate and his brother Tristan are free to leave Romania but not the EU, a Bucharest court has ruled. They had previously been banned from leaving the country where they are awaiting trial, indicted on charges of human trafficking, rape and forming a criminal gang to sexually exploit women. They deny all allegations against them. The decision to allow freedom of movement in the EU is not final and can be appealed. The brothers said the move represented a "significant victory and major step forward" in their ongoing case.

  The brothers' lawyer, Eugene Vidineac, called the ruling a "reflection of the exemplary behaviour and assistance of my clients. "Andrew and Tristan are still determined to clear their name and reputation; however, they are grateful to the courts for placing this trust in them." Posting on X, a platform from which he was previously banned, Andrew Tate said: "The sham case is falling apart." The Tate brothers, former kickboxers who are dual UK-US nationals, are accused of exploiting women via an adult content business, which prosecutors allege operated as a criminal group. Two female Romanian associates were also named alongside the brothers in an indictment published in June last year, and seven alleged victims were identified. Andrew Tate is a self-described misogynist and was previously banned from social media platforms for expressing misogynistic views. He has repeatedly claimed Romanian prosecutors have no evidence against him and there is a conspiracy to silence him. The internet personalities are also wanted in the UK over sexual offences allegedly committed there. The brothers have had restrictions on their movement for the past two years. They were held in police custody during the criminal investigation from late December 2022 until April 2023, before being placed under house arrest until August, when courts put them under judicial control.
