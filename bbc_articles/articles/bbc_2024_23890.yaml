content: |-
  Corey Li has been jailed for three years and nine months after admitting a charge of robbery.

  A 23-year-old man pointed an imitation handgun in the face of a garage cashier before making off with more than £1,000 in stolen goods.

  Corey Li carried out a robbery at the fuel station in Rhostyllen on 9 June, just 350 yards (320 metres) from his own home, and fired the weapon off to the side before fleeing.

  He made off with £85 in cash from the till and loaded a bag with over £1,000 worth of tobacco and e-cigarettes.

  The second person involved in the robbery remains unidentified, North Wales Police said.

  Li, of Tudor Avenue, Rhostyllen, was jailed for three years and nine months at Mold Crown Court on Thursday after pleading guilty to robbery.
