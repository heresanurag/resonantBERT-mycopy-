title: Starmer thanks Jeremy Hunt's children for Downing Street notes - BBC News
date: '2024-07-12'
section: Politics
url: http://www.bbc.co.uk/news/articles/c2507npnxqeo
content: |-
  The PM says his children "were very pleased" to get welcome notes from the ex-chancellor's children.

  The prime minister has thanked the former chancellor Jeremy Hunt’s children for the “sweet and thoughtful” notes they left for his children when they first arrived in Downing Street. Sir Keir Starmer has now been prime minister for a week and has been telling reporters about the adjustments he and his family have been making. He told us he went from “checking into a hotel that was more like a bed and breakfast in Carmarthen” in the last few days of campaigning to heading to the NATO summit in Washington DC. His wife Victoria accompanied him on his first overseas trip in the role and was pictured with him on the balcony of the White House after a dinner with other NATO leaders and their spouses.

  “Look, it’s a big transition for Vic and even more for the kids," he said. "But Vic’s very pleased to be doing it. It’s great to have her by my side,” the prime minister said. The family is yet to move into Downing Street, where they are expected to live in the bigger flat above No11, rather than the one above No10. He said: “We will take a bit more time with the kids. "We haven’t moved in yet because I didn’t want them left on their own while the two of us were away this week, so we’ll just take a bit more time on that.” The Starmers have a son and a daughter, both teenagers. Neither have been named publicly in the hope they can maintain some normality in their lives. But they did receive a welcome surprise from one of the families moving out of Downing Street. “Jeremy Hunt's children left notes for our children coming into the Number 11 flat,” the prime minister said. “It was very nice. I think that was really sweet and thoughtful of them to do that because for children this is very impactful. "They have been through it. They are slightly different ages but for them to be thoughtful enough to leave a note is very special. "Our children were very pleased to get those notes."

  Jeremy Hunt lived with his wife and three children in the flat in 11 Downing Street

  Jeremy Hunt left Downing Street in front of the cameras with his wife and three children and the family dog , externalwithin hours of the Conservatives losing the general election. It is understood that the notes left by Mr Hunt’s children contained advice on living at 11 Downing Street. When parliament gathered for the first time since the election on Tuesday, the new prime minister had a chance for a brief conversation with his predecessor. "I did have a warm chat with Rishi Sunak,” Sir Keir said. "There has never been any personal animosity. We are political opponents. "That gets quite heated during a general election campaign. But I have never had any personal animosity.”
