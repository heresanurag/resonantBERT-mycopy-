title: 'Evie Richards: Briton makes history with victory at cross-country short track
  World Cup in Brazil - BBC Sport'
date: '2025-04-12'
section: Cycling
url: http://www.bbc.co.uk/sport/cycling/articles/cp34q8459xno
content: |-
  Great Britain's Evie Richards becomes the most successful female short track cross-country rider ever with victory in Brazil.

  Evie Richards came fifth in the mountain bike women's cross-country at the 2024 Olympics

  Great Britain's Evie Richards has become the most successful female short track cross-country rider ever with victory in Brazil. The 28-year-old won the second round of the UCI Cross-country Short Track (XCC) World Cup in Araxa, a week after she finished first in the opening round. The victory was the reigning world champion's seventh in the format, overtaking Olympic champion Pauline Ferrand-Prevot as the most successful elite woman in XCC history. Richards was pushed until the end by Switzerland's Nicole Koller and Sweden's Jenny Rissveds, but kept them at bay during a sprint for the line. "I think when you're world champion and you're leading the series, there's a lot of pressure, so I was really nervous before," she said.

  "We had a bit of a rough plan, but nothing changes too much. You've just got to [think] on your feet and depending on how the race goes, you can't really have a plan." American Christopher Blevins took the men's elite race, having also won the first round a week ago. Nove Mesto na Morave in the Czech Republic will host the next round from 23-25 May.
