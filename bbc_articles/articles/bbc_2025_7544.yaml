content: |-
  Thousands have gathered in Rome to pay their respects to the late pontiff.

  US President Donald Trump and his wife Melania took a moment to pause and reflect by the coffin of Pope Francis ahead of his funeral.

  Thousands of mourners, among them royalty and politicians, have gathered for the event.
