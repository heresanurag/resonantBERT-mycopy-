title: Northumbrian Water sewer robot mission to detect blockages - BBC News
date: '2025-06-15'
section: England
url: http://www.bbc.co.uk/news/articles/czj4jmj1ww1o
content: |-
  Pipebot Patrol is a £1.8m project led by Northumbrian Water and funded by the Ofwat.

  The sewer robot will inspect pipes during a 30-day mission

  A sewer robot that monitors pipework and raises blockage alerts before flooding occurs is set for its first mission. Pipebot Patrol is a £1.8m project led by Northumbrian Water and funded by the Ofwat Water Breakthrough Challenge. The robot can inspect miles of pipes over a 30-day period and automatically report back issues from underground. A spokesman for the water company said the robot would be a "game-changer" and would help cut down the number of emergency repairs.

  Northumbria Water said 10 organisations had played a part in the robot's development, including councils in Sunderland, Gateshead and Newcastle. It said the robot was capable of identifying blockages in their early stages to prevent overflows and service disruptions. The spokesman said: "Pipebot Patrol is a game-changer in the field of sewer management. "Shifting from reactive problem-solving to predictive management reduces the frequency of emergency repairs and service disruptions. "It will also improve safety by minimizing human exposure to hazardous environments by deploying robots for inspection and monitoring."

