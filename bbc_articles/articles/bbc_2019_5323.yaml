  Former fabrication engineer Gwyn Evans has retrained as an offshore wind technician thanks to a course run by a local engineering firm.

  Accustomed to the peaks and troughs of seasonal work, he had been out of work for six months and saw the writing on the wall.

  The opportunity to train for free with Great Yarmouth-based 3Sun was "manna from heaven", he says.

  The company offers the training as a way to recruit new talent into its growing offshore wind work.

  "Things are standing a lot better in my favour than they were," says Mr Evans, 38.

  "Now I have the [qualification] tickets the world is my oyster. I can earn a decent wage and improve my lifestyle.

  "Everybody wants a job that's going to last. If you are lucky enough to be in an industry that you are passionate about and love, that's even better."

  The opening of a new £557m government subsidy round is likely to attract more private-sector investment.

  But infrastructure projects on such a scale inevitably attract opposition.

  The huge cables needed to transfer the power from the wind farm to the grid require vast swathes of the countryside to be dug up.

  For example, Vattenfall's proposed wind farms require 37 miles (60km) of cabling to be laid underground to a substation at Necton in Norfolk, which residents say will blot the landscape and cause huge disruption.

  The company insists it is working with residents to find the best solution and the project will bring significant environmental and economic benefits.

  Communities affected by construction want better planning as more projects arise

  Mid Norfolk MP George Freeman has raised the wider issue in Parliament, warning that community voices are not being heard in a planning "free-for-all".

  Critics also ask why infrastructure cannot be better planned and shared - a concern the government has pledged to investigate in its sector deal.

  That launch has focused attention on the future. At 5,000-student East Coast College, where a new £11m energy training centre is being built, they can feel the change in the air.

  The sector deal "felt like firing a starting gun" says chief executive Stuart Rimmer. He believes the prospect of well-paid, long-term jobs on their doorstep is creating real excitement among students.

  "Aspiration follows opportunity," he says. "We have to explain they are not just getting a qualification, they are getting a future."
