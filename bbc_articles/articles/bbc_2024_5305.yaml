title: 'Holyhead: Watch moment 450ft chimney is demolished - BBC News'
date: '2024-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68620174
content: |-
  It dominated the local skyline for 50 years but was gone in the blink of an eye

  Watch the moment a 450ft (137m) chimney stack comes crashing down as it's demolished.

  The structure stood on Holyhead's old Anglesey Aluminium site and has dominated the skyline for 50 years.

  The land is currently owned by Stena Line and is being cleared to make way for new developments as part of the proposed Anglesey Freeport.

  The demolition was carried out by Nottinghamshire-based Total Reclaim Demolition.
