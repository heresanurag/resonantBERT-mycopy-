title: Girl killed as car crashes into teenagers in Croydon - BBC News
date: '2017-07-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-40473177
content: |-
  Police say the driver, who fled on foot, had been driving at speed when he lost control of the car.

  The red Audi A3 was travelling at speed when it hit the group on Pixton Way in Croydon

  A 16-year-old girl was killed and six other teenagers were injured when a car crashed into pedestrians in south London.

  The red Audi A3 was being driven at speed when the driver lost control at a corner and hit the group on Pixton Way, Croydon, just before 01:30 BST.

  The driver fled the scene on foot after the crash. A man in his 30s has since been arrested.

  The Met do not believe the car was deliberately driven into the group.

  The six teenagers who were hurt were taken to south London hospitals for treatment. Their injuries are not said to be life-threatening.

  The 16-year-old girl's next of kin have been informed.

  Police said the man attended a south London police station and was arrested on suspicion of causing death by dangerous driving.

