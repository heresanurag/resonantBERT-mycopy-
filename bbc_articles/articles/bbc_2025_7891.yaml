title: 'Aintree 2025: Jonbon wins Melling Chase for Nico de Boinville and Nicky Henderson
  - BBC Sport'
date: '2025-04-04'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/articles/c62x7g0ej6no
content: |-
  Odds-on favourite Jonbon wins the Melling Chase on day two of the Grand National meeting at Aintree, after his disappointment at the Cheltenham Festival.

  Jonbon has won 18 of his 22 races

  Odds-on favourite Jonbon won the Melling Chase on day two of the Grand National meeting at Aintree. The nine-year-old, who was 4-6 favourite, was part of a front three initially before jockey Nico de Boinville settled him in behind. He took over on the second circuit and went clear before being pushed out by De Boinville to win by three and a quarter lengths from Protektorat. It is some compensation for Jonbon, who finished second after a shuddering mistake when odds-on favourite for the Champion Chase at Cheltenham Festival last month. "There was really [an awful lot riding on that]," De Boinville told ITV. "Jonbon gets us out of trouble again. "You would have said it's been a tough week but all the credit to the staff and particularly the governor [trainer Nicky Henderson], [owner] JP McManus and his team. "They've kept the faith in us - we had to pick ourselves up after yesterday [with Constitution Hill] and thankfully I've got really nice horses to ride like Jonbon here. He is an absolute superstar. "He was a very different horse to the one I rode at Cheltenham - he really enjoyed it out there today. You can see when he's right and on song he loves his jumping. "Racing and all sport is a tough place to be in. You've just got to roll with the punches - and when you're on the floor, you've just got to pick yourself up again. It's like that famous Rocky saying 'you've got to get up and keep moving forward' and that's what we try and do." It is Jonbon's second win in the Melling Chase, which is a step up in trip to 2m 3f 200y, and his 10th top-level Grade One win, continuing his 100% success rate in races away from Cheltenham. Henderson, who has won the Melling Chase five times, told ITV: "That Champion Chase doesn't seem to work for him. It is a pity because that just went all wrong for him. He proved today that he just loves doing that - they went some gallop but that is what he loves best. "He was brilliant and he jumped so well. Nico and him know each other so well - they just trust each other. "Yesterday [with Constitution Hill] wasn't an easy day for any of us. We all feel that, and I know Nico does as well. We have issues we have to sort out and to come back and give a horse a ride like that, that is a great man." Matata finished third, while the Willie Mullins-trained El Fabiolo fell on the second circuit.

  Gentleman De Mee won the Maghull Novices' Chase at the 2021 Grand National meeting

  Mullins soon had something to celebrate, though, when Gentleman De Mee won the Topham Chase over the Grand National fences. The nine-year-old had a slow start and was at the back of the 30-runner field but weaved his way through to be in the top five approaching the final fence. Jockey Mark Walsh had worked the 14-1 shot into second as he reached the elbow and home straight, before he found more in the final 150 yards to overtake 22-1 shot Lisnamult Lad and win by three-quarters of a length. "He's a good horse on his day," Walsh told ITV. "I'm delighted he's won another big one at Aintree." Mullins added: "He is a really good jumper and we thought this race would suit - and when you drop back to a handicap, you're thinking you might have a little advantage." Mullins had earlier claimed his fifth Grade One win of the meeting when Paul Townend steered 7-2 shot Salvator Mundi to victory in the TrustATrader Top Novices' Hurdle. Townend told ITV that they had an "incredible team" after he secured his fourth Grade One win across the opening two days of the meeting.

  Another smart front-running ride from Harry Cobden saw Caldwell Potter back up his Cheltenham Festival win in the Grade One Huyton Asphalt Franny Blennerhassett Memorial Mildmay Novices' Chase. Cobden sent the Paul Nicholls-trained 11-4 favourite to the front from the off and led all the way through the 3m 210y race. Victory in the race was worth £71,504 and means the seven-year-old recoups more of his record-breaking 740,000 euros fee. There was a first Grade One success for trainer Jamie Snowden as Julius Des Pictons won the Sefton Novices' Hurdle at 14-1. Day two ended with She's A Saint winning a handicap hurdle at 25-1 for jockey Tristan Durrell and trainer Dan Skelton. The three-day meeting concludes on Saturday, with the 177th running of the Grand National - the feature race starting at 16:00 BST.
