  She is then seen opening a letter, remarking, "I hope these are not written in Welsh", before the pair appear explaining the organisation is not real, and it was them who sent the gift. McElhenney told Parton: "You see when we found out your family might be from Wales, we thought who better to help promote our docuseries about north Wales and their beloved football club?" A series of clips from the documentary are then shown, to which Parton replied: "Well, that is just so nice - it kind of makes me feel homesick." The second series of the docudrama showed the Welsh football team being promoted from the National League to League Two under the US owners, with the new third series set to show the club's attempt to achieve promotion to League One, the third tier of English football.
