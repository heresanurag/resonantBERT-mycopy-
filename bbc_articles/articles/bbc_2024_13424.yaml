title: 'Dolly Parton: Singer celebrates Welsh roots with Wrexham gift - BBC News'
date: '2024-06-27'
section: Wales
url: http://www.bbc.co.uk/news/articles/c2v073egz0do
content: |-
  The 9-5 singer recently traced her ancestry to the Welsh valleys, saying she was "tickled pink".

  Dolly Parton was sent the Wrexham FC scarf by co-owners Ryan Reynolds and Rob McElhenney

  Country music star Dolly Parton has celebrated her Welsh ancestry with a gift from Wrexham FC co-owners Ryan Reynolds and Rob McElhenney. The 9-5 singer recently traced her ancestry to the Welsh valleys for a TV programme, saying she was "tickled pink" about the revelation. Parton, who was born in Tennessee, has sold more than 100 million records worldwide. In a video posted to X, formerly Twitter, by Reynolds, Parton can be seen with a Wrexham football scarf sent to her by the actors, describing it as "beautiful".

  It is an advert for series three of Welcome to Wrexham, a documentary about Reynolds and McElhenney’s ownership of the football club. Parton said: "You may have seen my recent announcement about possibly having Welsh ancestry, well I was tickled to learn that, and I was even more tickled when I received a lovely gift from the Welsh Board of Tourism and Docudramas. "They sent me this beautiful scarf and asked if I'd say a few words about Wales."

