  Thousands of people lined the streets of Edinburgh ahead of Barry Martin's funeral at St Giles’ Cathedral.

  Firefighters have formed a guard of honour along Edinburgh’s Royal Mile in tribute to their colleague Barry Martin, who died while tackling a blaze at the former Jenners department store.

  Members of the public and firefighters stood in silence near St Giles' Cathedral as the coffin arrived on a fire engine.

