content: |-
  A pair of Barry Humphries' Dame Edna Everage glasses sold for more than 25 times their estimated value.

  Barry Humphries' Dame Edna Everage became a hit in the UK in the 1970s and was known for her signature glasses

  A pair of Barry Humphries' Dame Edna Everage glasses have sold at auction for more than 25 times their estimated value. The glasses - which were expected to go for between £1,000 and £1,500 - sold for £37,800, according to Christie's auction house. Humphries died in 2023 of complications from hip surgery, aged 89. A state memorial was held at the Sydney Opera House in his honour. Dame Edna, his most famous creation, became a hit in the UK in the 1970s and was known for her signature sunglasses.

  Other items auctioned included a gown worn by Humphries as Dame Edna at the Royal Variety Show in 2013, which was sold for £21,420. Along with Dame Edna's glasses and outfits, Humphries' personal collection sale included artwork. The most expensive item sold was Charles Conder's painting Sand dunes, Ambleteuse which sold for £239,400. His collection included books and manuscripts, including a first edition copy of Oscar Wilde's The Importance of Being Earnest, inscribed by the author to his publisher, which fetched £138,600. The sale, which realised a total of £4,627,224, including buyer's premium, took place over nine hours. "These fantastic results are a testament to Barry's unique vision and lifelong passion for collecting," said Benedict Winter of Christie's London. It's not the first pair of famous spectacles to fetch a high price at auction this year. Singer Robbie Williams revealed he cried "happy, childlike tears" after making the winning bid for comedy legend Eric Morecambe's glasses and pipe at auction last month.
