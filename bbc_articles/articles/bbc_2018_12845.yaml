title: The men hunting down stolen motorbikes - BBC News
date: '2018-10-16'
section: General
url: http://www.bbc.co.uk/news/stories-45867978
content: |-
  Thieves film their exploits and post them online. But motorbike enthusiasts are fighting back.

  Motorbike thieves in Bristol show off their stolen goods online. But a volunteer group of bikers is taking direct action, using social media to track down motorcycles and reunite them with their owners.

