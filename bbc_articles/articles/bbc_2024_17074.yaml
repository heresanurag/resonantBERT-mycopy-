title: Benidorm holidaymaker Harvey Dominy, 21, found dead in room - BBC News
date: '2024-07-29'
section: Wales
url: http://www.bbc.co.uk/news/articles/cj50687lzqeo
content: |-
  Tributes have been paid to the 21-year-old at a nightclub and locally in Merthyr Tydfil.

  Harvey Dominy was found without a pulse in his hotel room on 16 July

  A 21-year-old holidaymaker was found dead in his hotel room in Spain, an inquest opening has heard. Harvey Dominy, from Merthyr Tydfil, was discovered on the floor of his room on the evening of 16 July in the popular holiday destination of Benidorm. It was detailed at the Pontypridd hearing how emergency services were called, and Mr Dominy pronounced dead. The inquest was adjourned and an investigation into the cause of death continues.

  It is believed Mr Dominy died between 21:00 and 22:30. A post-mortem examination has been carried out but did not provide a provisional cause of death. Assistant coroner Kerrie Burge adjourned the inquest, pending further information from the Spanish authorities. Mckenzy Dominy, his brother, has paid tribute to "Merthyr's golden boy, known and cherished by all". In a statement he said: “My brother Harvey's radiant smile was his trademark, a beacon of joy that never dimmed despite life's challenges. "From his first night, when doctors doubted he'd survive his first 24 hours, to his very last day, Harvey faced each hurdle with unwavering courage and a grin that could light up all of Merthyr. "His passing leaves a void deeper than words can express. We've lost more than a brother, son, nephew, or grandson - we've lost our guiding light, our heart. "Harvey lived every moment to its fullest, and in his memory, we'll continue to fight and embrace life, just as he did.”

  Harvey's friends got together to release balloons near his house in his memory

  In tribute to Mr Dominy, friends gathered over the weekend for a balloon release near his home. Liam Greenaway, a close friend, expressed his grief on social media, saying: "I honestly don’t know what to say, I’ve honestly lost a part of me, my right arm you was my bro. “You were so special to everyone but most important to me, honestly the best boy ever you were, brother." The Kooler nightclub in Merthyr Tydfil also honoured Harvey, encouraging revellers to raise a toast in his memory while playing "Forever Young" last weekend. The venue shared a post, which read: "We at Kooler Nightclub are deeply saddened to hear of the passing of Harvey Dominy. "His vibrant energy and unwavering support brought joy to everyone who had the pleasure of knowing him. Our thoughts and prayers are with his family and friends during this difficult time." The investigation into the cause of Mr Dominy's death continues.
