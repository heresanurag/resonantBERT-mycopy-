title: Four amateur rowers break world record in Atlantic race - BBC News
date: '2018-01-13'
section: General
url: http://www.bbc.co.uk/news/uk-42675304
content: |-
  Four British friends break a world record after rowing across the Atlantic in less than 30 days.

  A team of British friends, who only took up rowing 18 months ago, have broken a world record after crossing the Atlantic Ocean in less than 30 days.

  Raising money for charity, the team won the Talisker Whisky Atlantic Challenge race, travelling from the Canary Islands to Antigua in the Caribbean.
