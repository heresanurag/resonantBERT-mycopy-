title: 'FGM: ''The cruellest thing'' - BBC News'
date: '2019-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-47123241
content: |-
  A victim of Female Genital Mutilation speaks out about her experience after the UK’s first successful conviction.

  A victim of Female Genital Mutilation speaks out about her experience, which comes after the first UK conviction for FGM.

  An investigation by Victoria Derbyshire has also found that victims of FGM are getting younger - we’ve been told one reported victim was just one month old.

  Watch the Victoria Derbyshire programme on BBC Two and BBC News Channel, 10:00 to 11:00 GMT - and see more of our stories here.
