title: Melania wears 'I really don't care do u?' jacket on migrant visit - BBC News
date: '2018-06-21'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-44570688
content: |-
  The first lady's spokeswoman says "there was no hidden message" in her sartorial choice.

  This video can not be played To play this video you need to enable JavaScript in your browser. Lauren Wright, politics and public affairs expert, on the significance of Melania Trump's "I don't care" jacket

  First Lady Melania Trump has been criticised for her choice of jacket worn on a trip to a migrant child detention centre in Texas.

  Mrs Trump was spotted in the coat, which featured graffiti writing on the back with the words "I really don't care do u?", as she boarded a plane.

  Her spokeswoman said "there was no hidden message" in the former fashion model's sartorial choice.

  The $39 (£29) jacket from Zara caused an uproar on social media.

  US President Donald Trump later tweeted his wife's coat "refers to the Fake News Media".

