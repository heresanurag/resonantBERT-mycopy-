title: Sergio Perez holds talks over Formula 1 return in 2026 - BBC Sport
date: '2025-04-02'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c2308krygm2o
content: |-
  Sergio Perez, who left Red Bull in December, says he has spoken to "a few" teams about a return to the grid next season.

  Sergio Perez began his Formula 1 career with Sauber in 2011

  Sergio Perez says he has spoken to "a few" teams about a return to the grid next season. The 35-year-old Mexican left Red Bull shortly after the season-ending Abu Dhabi Grand Prix in December, six months after signing a new two-year contract. He failed to win a race in 2024 and had only four podium finishes, his worst season since joining Red Bull in 2021. "I've been approached by a few teams since Abu Dhabi. The season has started, so a few things will open up in the coming months," Perez told the Formula 1 website., external

  "Once I know all my options, I will make a decision. "What is very clear to me is that I'm only coming back if the project makes sense and it's something I can enjoy." Perez finished second in the drivers' championship in 2023 behind team-mate Max Verstappen, but he described last season as "terrible" after failing to win a race for the first time since 2019. Perez, who has also driven for Sauber and McLaren, said his struggles were partly because of issues with Red Bull's RB20 car., external His replacement, Liam Lawson, was dropped after two races this season and replaced by Yuki Tsunoda after failing to get to grips with its successor, the RB21. Perez said: "Especially last year, I didn't get to show what I'm able to do as a driver. "Now, all of a sudden, people realise how difficult the car is to drive."

