  • None Six big immigration changes under Trump Announcing his plan last week that the facility be expanded, Trump said: "Some of them (the migrants) are so bad we don't even trust the countries to hold them, because we don't want them coming back. "So we're going to send them to Guantanamo... it's a tough place to get out." US military personnel travelled to Guantanamo Bay at the weekend to assemble tents to house migrants sent to the base, the New York Times, external and CNN, external reported. Last year, the International Refugee Assistance Project (IRAP) accused the US government of secretly holding migrants at the base in "inhumane" conditions indefinitely. The administration of Joe Biden, who was then president, responded that the location was "not a detention facility and none of the migrants there are detained". The GMOC is separate to the military prison on Guantanamo which has, for years, held detainees taken into US custody after the 9/11 attacks. The Cuban government quickly condemned news of the immigration facility's expansion last week, with President Miguel Díaz-Canel calling it "an act of brutality". It has long considered Guantanamo Bay to be "occupied" and has denounced the existence of a US naval base on the island ever since Fidel Castro swept to power in 1959.
