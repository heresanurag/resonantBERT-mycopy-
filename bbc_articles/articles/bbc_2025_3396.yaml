  Is this a critical season for George Russell, especially given the possibility that Max Verstappen might leave Red Bull in the future? - David

  Every season is critical in F1 - people are always looking for signs of weakness. But the stakes are quite high for Russell this year, and that's almost independent of Max Verstappen. Russell is out of contract at the end of the year, and his new team-mate is an 18-year-old rookie, Andrea Kimi Antonelli. From the point of view of his reputation within the sport, Russell has to come out on top. If he doesn't, though, that does not necessarily mean his Mercedes career is over. But it would mean Antonelli had marked himself out as a potential future great. If Verstappen is not available, Toto Wolff will stick with his current driver line-up into 2026 - Russell has come out of three seasons with Lewis Hamilton and just about won bragging rights. He has earned his status as one of F1's very top drivers. The pressure is also on Antonelli, even though his raw talent is believed to be immense. If he is comfortably beaten by Russell, he won't be around long. Such is the way of things in F1. It's a tough world, and only the strongest survive.

  Comparing the apparently friendly relationship between Max Verstappen and Lando Norris with the ongoing fallout of the Verstappen-Russell spat, does that show that Verstappen doesn't really fear Norris, but he does fear Russell? – Joe

  If you asked that question to Max Verstappen himself, I know exactly what he would say. He fears no one. Verstappen is absolutely confident that if he is given a car in which it is possible to win the title, he will win it. Doesn't matter who the opponent is. How he gets on with someone out of the car has no bearing whatsoever on his behaviour in it - you only have to look at last year's Mexico City Grand Prix and his two penalised incidents with Norris to see that. He is as ruthless as they come, and anyone who gets in his way will get the same treatment. How they respond to him off the track is a different question. But Verstappen doesn't care about that either. Friendly, or not. Makes no difference to him. He'll race them just has hard.

