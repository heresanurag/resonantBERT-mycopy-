  Do you think the conflict between F1 and the FIA might escalate? Where will it lead? - Sam

  There has been for some time widespread concern within Formula 1 about the actions of Mohammed Ben Sulayem, the president of governing body the FIA, and nothing over the winter has changed that. Ben Sulayem has been embroiled in a series of controversies since he took office in December 2021, and his recent actions in changing the FIA's internal rules to reduce accountability, and codifying a method by which drivers can be banned for swearing have just added to a long list of actions perceived to be problematic by many within the sport. At the moment, though, there is no open conflict between F1 and the FIA, nor between the teams and the FIA. However, everyone in the sport is very aware of the growing disquiet within the FIA itself - the latest facet of which was revealed by BBC Sport last week in its report on a number of world motorsport council members being barred from its latest meeting, a dispute that could yet see further legal action. With an FIA presidential election looming at the end of the year, the sport's bosses are keeping a close eye on events. But unless Ben Sulayem does something that directly affects F1 business, it is unlikely F1 itself will take any action. But with the drivers unhappy, and the FIA facing a lawsuit from Susie Wolff, and who knows what else coming down the line, this story is not going anywhere any time soon.

  After a first-lap red flag, Charles Leclerc managed his tyres to win his home race for the first time in 2024

  As the FIA has now introduced an extra mandatory pit stop for Monaco, do you think that introducing this across all the grand prix would improve the racing as there would be less tyre saving? – Andrew

  The idea of introducing an extra pit stop into the Monaco Grand Prix has been given a guardedly warm response so far. The hope is that this will add extra excitement to the race and reduce its tendency to become a procession. Lewis Hamilton said he believed it was his idea originally, and added: "Monaco has to be at least a two-stop. The one-stop was never really great. "That (two stops) won't fix it all. We'll still see some of the issues of not overtaking and stuff, but I think it will make it more exciting." Some, though, have wondered whether this was a reaction to a particularly bad event last year, which was itself caused by a specific set of circumstances. Last year, there was a first-lap crash that led to a red flag. So all the front-runners fitted a set of tyres to get them to the end of the race, and planned not to stop again. That led to Charles Leclerc leading the race at a pedestrian pace and nothing happening. But it's not like that every year. Regardless of the difficulty in overtaking, Monaco has seen a series of interesting races in recent years, some influenced by weather, and others by problems experienced by one driver or another. The mandatory two-stop has been arrived at as a necessary evil - introducing an element of artificiality to ameliorate a specific problem. In general, introducing that level of gimmickry is not something on which the powers that be in F1 are keen.

