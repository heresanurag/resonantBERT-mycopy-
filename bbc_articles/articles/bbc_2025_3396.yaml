  F1 correspondent Andrew Benson answers your questions before the season-opening Australian Grand Prix.

  Does Verstappen fear Russell but not Norris? F1 Q&A

  Coverage: Live radio commentary of practice and qualifying on BBC 5 Sports Extra, race live on BBC Radio 5 Live. Live text updates on the BBC Sport website and app

  After a three-month break, the 2025 Formula 1 season is almost upon us. The Australian Grand Prix this weekend is the first of 24 races between now and Abu Dhabi in December. There are plenty of talking points with Lewis Hamilton preparing for his Ferrari debut, Max Verstappen chasing a fifth consecutive drivers' title and McLaren hoping to maintain the pace that brought them the constructors' championship in 2024. BBC Sport F1 correspondent Andrew Benson answers your questions before the season gets under way in Melbourne.

  What is the pragmatic expectation at Ferrari this year? Fernando Alonso, Sebastian Vettel and Charles Leclerc have all failed to win them a championship so far. Is too much expected from Lewis Hamilton? – Kenneth

  Hamilton has been clear - he is going to Ferrari to win an eighth world title. When a driver of that level goes to such a storied team, it's obvious what the target is. So, questions about whether too much is expected of him miss the point - he and Ferrari expect that of themselves. The impact of such an achievement would be massive. Hamilton's move to Ferrari has already dramatically increased interest in F1 in the run-up to this season. Imagine what the reaction would be to the sport's most celebrated driver breaking the only remaining all-time record while driving for its most iconic team. Will he do it? That depends on two things. Whether the Ferrari car is up to it, and whether Hamilton can beat his team-mate, Charles Leclerc. As for comparisons with Alonso and Vettel, neither managed to win the title they and Ferrari so craved. Alonso was plain unlucky - he should have won in 2010 and 2012. He was outstanding in both years, especially in 2012. Had it not been for a catastrophic strategy decision in Abu Dhabi in 2010, and two separate assaults from two different Lotus drivers at the start of two different grands prix in 2012, he would have been champion. Vettel's situation was more complex - arguably he and Ferrari threw away chances in both 2017 and 2018 through a combination of driver errors and team fallibility. Many people believe Alonso would have won at least one of those titles had he stayed at Ferrari. But that was then. The belief is that this is about as good a time as Hamilton could go to Ferrari. In Frederic Vasseur, they have a team boss who has given the team a more international outlook, and is very matter-of-fact and focused on practicality. He seems to be having a good effect and moving them in the right direction. No one knows what will happen. But it is sure is going to be entertaining finding out, however it ends.

