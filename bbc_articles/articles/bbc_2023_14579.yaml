title: Spain players reiterate strike stance after national team call up - BBC Sport
date: '2023-09-19'
section: General
url: http://www.bbc.co.uk/sport/football/66847013
content: |-
  Spain players have reiterated that they are boycotting the national team despite being called up to the women's national team.

  Last updated on .From the section Women's Football

  Spain players have reiterated that they are boycotting the women's national side despite being called up to the latest squad.

  Fifteen members of the team that won the World Cup last month have been included in a squad for upcoming Nations League fixtures.

  A group of 81 players boycotted the national team after then Spanish FA boss Luis Rubiales kissed forward Jenni Hermoso following last month's final.

  The fall out led to Rubiales resigning.

  On Friday, 39 players - including 21 of the 23 World Cup-winners - said their strike would continue until further changes were made and that they did not yet "feel in a safe place".

  Two-time Ballon d'Or winner Alexia Putellas was among the 15 players called up who were part of the triumphant squad in Australia and New Zealand. However, Hermoso was left out.

  The players later published a statement, issued by Futpro, stressing the boycott remains in place and expressing their regret that they were again "put in a position in which we never wanted to be in".

  They added that they intended to explore the potential legal implications of being called up against their wishes, saying: "We will study the possible legal consequences to which the RFEF (Spanish football federation) exposes us by putting us on a list from which we had asked not to be called for reasons already explained publicly and in more detail to the RFEF, and with this make the best decision for our future and for our health."
