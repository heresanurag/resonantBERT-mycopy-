title: 'Jubilation and stunned silence: France reacts to exit polls - BBC News'
date: '2024-07-08'
section: General
url: http://www.bbc.co.uk/news/videos/c3g3zr5nj7mo
content: |-
  Polls projected a surprise victory for France's left-wing coalition, denying the far-right of its expected win.

  A left-wing coalition called New Popular Front is on course for a surprise victory in France's snap parliamentary election.

  France's far-right National Rally (RN) was widely expected to win the election, but exit polls suggest they have been beaten into third place, behind President Emmanuel Macron's centrist alliance.

  New Popular Front's supporters celebrated the projected victory in Place Stalingrad in Paris, while people at RN headquarters greeted the polls with stunned silence.
