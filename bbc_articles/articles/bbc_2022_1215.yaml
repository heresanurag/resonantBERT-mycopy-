title: Scotland's covid passport scheme could be extended - BBC News
date: '2022-01-12'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-59940847
content: |-
  First Minister Nicola Sturgeon tells parliament that as protective measures are lifted she will consider extending the scheme.

  Would the Six Nations rugby have gone south?

  This is clearly the news that major sporting bodies and fans were hoping for. There were genuine fears, from within football at least, that the first minister would push the date back once again. It now appears that the increase in Covid passport checks outside stadia has allowed her to throw the doors back open, but with a sense of continued caution. The Scottish government say the decision is based purely on the science but there’s no doubt that the move is timely, from a political perspective. With the Six Nations fast approaching, could the first minister really have watched on if Scotland’s home games had been moved south for the sake of attendance? It was certainly being discussed. As talk now turns to how we learn to live with Covid, this latest sporting sigh of relief will be accompanied by the hope that fans are be back for good.
