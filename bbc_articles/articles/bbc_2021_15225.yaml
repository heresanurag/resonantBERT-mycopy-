  Tottenham name former Chelsea boss Antonio Conte as their new manager on a contract until summer 2023.

  Antonio Conte: Tottenham appoint former Chelsea boss as new manager Last updated on .From the section Tottenham

  Conte has previously led Chelsea to the Premier League title Tottenham have appointed former Chelsea and Inter Milan boss Antonio Conte as their new manager until summer 2023. The Premier League club sacked Nuno Espirito Santo on Monday after just 17 games, with Spurs eighth in the table. Tottenham says there is "an option to extend" 52-year-old Conte's deal with them. "I am extremely happy to return to coaching, and to do so at a Premier League club that has the ambition to be a protagonist again," said Conte.
  • None Why would Conte join Spurs now?
  • None Go straight to all the best Spurs content The Italian returns to London after winning the Premier League in his first season at Chelsea (2016-17) and the FA Cup in his second before being sacked in 2018. He then led Inter Milan to their first Serie A title in 11 years before leaving the club in May. Conte had been in charge for two years and Inter said it was a mutual decision to end his contract with one year remaining. The former Juventus and Italy coach was then in talks with Tottenham in the summer about becoming Jose Mourinho's successor. But negotiations were halted before Spurs appointed ex-Wolves boss Nuno at the end of June, with the Portuguese boss, 47, lasting just four months. "I can't wait to start working to convey to the team and the fans the passion, mentality and determination that have always distinguished me, as a player and as a coach," said Conte. "Last summer our union did not happen because the end of my relationship with Inter was still too recent and emotionally too involved with the end of the season, so I felt that it wasn't yet the right time to return to coaching. "But the contagious enthusiasm and determination of [Tottenham chairman] Daniel Levy in wanting to entrust me with this task had already hit the mark. "Now that the opportunity has returned, I have chosen to take it with great conviction." Conte's first game will be at home against Dutch side Vitesse Arnhem in the Europa Conference League on Thursday before Spurs play at Everton in the league on Sunday. "His track record speaks for itself, with vast experience and trophies in both Italy and England," said Tottenham managing director of football Fabio Paratici. "I know first hand the qualities Antonio can bring to us, having worked with him at Juventus, and look forward to seeing his work with our talented group of players." Antonio Conte will become one of the Premier League's highest-paid managers and adds to the list of high-profile coaches now working in the English top flight. His duels with Pep Guardiola, Jurgen Klopp and Thomas Tuchel in particular will be fascinating. The speed with which this deal was done underlines the commitment managing director of football Fabio Paratici has to this working out and, while the option of an extension to Conte's 18-month contract was expected, it does suggest an element of long-term planning. Tottenham accept Conte's demanding style but Paratici in particular feels his fellow Italian is exactly what the club needs to drive them forward. The pair worked together at Juventus and Paratici is understood to have driven the process to bring Conte to Tottenham after talks in the summer failed to reach a positive conclusion.
