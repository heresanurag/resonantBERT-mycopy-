title: Family call teenage killers of Bhim Kohli, 80, 'utterly disgusting' - BBC News
date: '2025-04-08'
section: Leicestershire
url: http://www.bbc.co.uk/news/articles/cqly4z1dezvo
content: |-
  Bhim Kohli's family say they feel "anger and disgust" at a 15-year-old boy and 13-year-old girl.

  Bhim Kohli died the day after he was attacked at a park in Leicestershire

  The daughter of an 80-year-old man who died after being punched and kicked by a boy while a second teenager filmed the attack has branded their behaviour "utterly disgusting". Bhim Kohli died the day after the "intense attack" on 1 September, in which he was racially abused by the 15-year-old boy who slapped him in the face with a slider shoe while he was on his knees. Meanwhile, a 13-year-old girl encouraged the assault and laughed as she filmed it on her phone. Both were convicted of manslaughter on Tuesday. Speaking outside Leicester Crown Court after the verdicts were returned, Susan Kohli said the family felt "anger towards the teenagers who took dad away from us".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Mrs Kohli recalled the moment she found her dad, who had been walking his dog Rocky, at the park "screaming out" in pain after the attack at Franklin Park, in Braunstone Town, Leicestershire - just yards from his home. Mr Kohli, the court heard, had told his daughter he had been punched in the face, kicked, and racially abused. He died from his injuries in hospital. His cause of death was given as a neck injury causing spinal cord damage, and he had a number of other injuries including fractured ribs. "It was horrendous, we have never seen him like that before. We all thought he would go to hospital to be treated and he would then be fine. We never imagined he wouldn't return home. My dad passed away before our eyes, surrounded by his family," she said.
  • None 'He revelled in his hard man reputation': What led to a teen killing an elderly dog walker

  "We feel anger and disgust towards the teenagers who took dad away from us. They humiliated an 80-year-old man, assaulted him, filmed it and laughed at him. "The boy... used violence so severe that he broke three of dad's ribs and neck which caused trauma to his spinal column. "Dad did not deserve this, and we wouldn't wish this pain on anyone else." Mrs Kohli told of watching the video of her father being hit by the slider shoe. "A loud horrible slapping sound is heard when the boy struck dad," she said. "Hearing the girl laugh at this assault on dad is utterly disgusting. This sound plays over and over in our heads. Also captured on video is dad's attempt to call for help as he shouted out for his grandson."

  Mr Kohli was assaulted in Franklin Park, yards from his home in Braunstone Town

  The boy was charged with murder and manslaughter, but was acquitted of the more serious charge. Neither defendant can be named because of their ages. The boy was remanded in custody, while the girl was released on conditional bail. They will be sentenced on 19 and 20 May. When the verdicts were read out, the boy leaned forward in the dock while the girl cried, and hugged her mother when she was released. Addressing the girl, Mr Justice Turner said: "I want to make it absolutely crystal clear that the fact that bail is being granted should not be taken as any indication as to the sentence when the time comes." The judge, who will consider a media application to lift reporting restrictions on 19 May, thanked the jury - which deliberated for more than six hours - for its "obvious hard work".

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV shows the moments before the fatal park attack

  Both defendants were among a group of children who encountered Mr Kohli in the park on the day he was fatally injured, the trial - which lasted more than five weeks - heard. Opening the prosecution case, Harpreet Sandhu KC said: "[Bhim Kohli] left his home on Bramble Way. Having left his home, he walked a few yards to the entrance of Franklin Park, where he was going to take his dog for a walk. "However, Mr Kohli would not get the opportunity to walk his dog for long and never would he return home. That is because in Franklin Park, Mr Kohli had the misfortune to encounter these two defendants." Mr Sandhu told the court the boy and girl had spent the afternoon together at Braunstone Park before going to the boy's home, where he changed his clothes and wore black sliders - a loose-fitting type of shoe similar in appearance to flip-flops - which the barrister said were used in the attack. He said CCTV footage showed Mr Kohli walked with his dog to the park at about 18:18 BST, followed by the two defendants and three other children a few minutes later. The footage of the fatal assault was shown to the jury. Jurors heard Mr Kohli was discovered by two of his children "on the ground and in obvious pain", before he was taken to hospital where he died the next day.

  Mr Kohli was "an amazing man who loved life", his daughter said

  The boy told a friend he would go "on the run" to Hinckley, in Leicestershire, the day after the attack but was arrested by police minutes later while hiding in a bush, the court heard. In a letter written by the boy, after he had been charged, to a professional who was working with him, he said: "I am so nervous, well scared and worried. I accept I did it and I'm doing time, I'm just scared about how long I have to do." He also said in the letter that his girlfriend had broken up with him and he had been "struggling with that", so he "needed anger etc releasing". When the professional told the boy that the contents of his letter would need to be disclosed, the boy said "that's my manslaughter plea gone", Mr Sandhu told the jury. Speaking alongside Mr Kohli's family outside the court, Det Ch Insp Mark Sinski, of Leicestershire Police, called the case "truly tragic and heartbreaking". "Both the case and the subsequent trial have been complex and extremely sensitive due to the young ages of both defendants," he said. "Today's verdict will now mean that they will have to face the enormity of their actions that evening and the consequences that will now follow."

  Mr Kohli was walking his dog Rocky on the day of the fatal attack

  Paying tribute to her father, Mrs Kohli said he was a "devoted life partner to my mum for 55 years", as well as a retired businessman, a close friend to many and a "very active" man who had three allotment plots where he grew fruit and vegetables. "He was an amazing man who loved life. He never took himself seriously. He was good fun to be around and very chatty," she said. "He was the person who knitted our family together and we miss him every second of every day. "The area we have loved for so many years and called home feels so different now and we will never feel safe. "Having happened only a minute's walk of where we live is something we cannot get away from and it is a constant reminder. "Every time my mum opens the front door she thinks about what happened to her husband."

  Mr Kohli was well known for tending his plots at a nearby allotment

