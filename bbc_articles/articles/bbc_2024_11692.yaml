title: Sunak and Starmer face rough ride from TV audience in Grimsby - BBC News
date: '2024-06-13'
section: Politics
url: http://www.bbc.co.uk/news/articles/c0xx5le1qwxo
content: |-
  Voters in Grimsby challenge party leaders on tax, immigration, private schools, D-Day and NHS waiting lists.

  Rishi Sunak and Keir Starmer have faced tough questions from an audience in Grimsby Town Hall, as part of a TV election programme on Sky News. Keir Starmer defended backing Jeremy Corbyn in the 2019 general election by saying he knew Labour was going to lose. And when pressed on his plan to remove VAT tax breaks from private schools, the Labour leader said he wanted to tackle a lack of resources in state schools. Prime Minister Rishi Sunak said he appreciated people's frustrations with the government as he acknowledged that levels of tax and immigration were "too high". He also apologised again for leaving the D-Day commemorations early and for Covid rule-breaking in government. Responding to a disgruntled former Conservative activist who said she felt "ashamed" of the government, Mr Sunak said he was trying to rebuild trust through his actions and by "making progress on the things that matter to people" such as economic stability. Asked for a fact about himself that might make people "like him more", he said he had an "appalling diet" which included Haribo sweets and Twixes.

