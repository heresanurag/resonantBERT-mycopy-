  Another 100 people have died in the UK within 28 days of a positive coronavirus test.

  Hundreds who went to Bloodstock festival test positive for Covid

  Hundreds of people who attended a heavy metal music festival in Derbyshire have tested positive for Covid-19, health officials say. Bloodstock took place on 11 to 15 August near the village of Walton-on-Trent, in Derbyshire. Local public health officials confirmed about 500 people from across the country had "attended the festival prior to testing positive". Iain Little, Derbyshire County Council's deputy director of public health, says there did not appear to be any rises in infections locally as most people had stayed on the festival site. He adds: "Our public health team was involved in planning for the event with South Derbyshire District Council, and were happy that the festival organisers were following best practice and national guidance." This year's festival attracted 20,000 people - its largest attendance ever - after having to move online last year because of the pandemic. Rachael Greenfield, Bloodstock festival director, says organisers had done "everything in their power" to lessen the risks and went "above and beyond" government Covid guidance. She says while there was "no guarantee" all the cases derived from the event, it was "impossible" to completely remove the risk of infection.
