  Treasury Secretary Scott Bessent warned other countries not to hit back. "My advice to every country right now is, do not retaliate," Bessent told Fox News. "Sit back, take it in, let's see how it goes. Because if you retaliate, there will be escalation," he said. "If you don't retaliate, this is the high watermark." Later however, China's commerce ministry said it "firmly" opposed the US's new tariffs and will take "resolute countermeasures to safeguard its rights and interests". European Commission head Ursula von der Leyen also said she was preparing to take further steps against the US in the event that negotiations failed. The new duties will affect trillions of dollars in trade, likely setting the stage for higher prices in the US on clothing, European wine, bicycles, toys and thousands of other items. Olu Sonola, head of US economic research at the Fitch Ratings agency, said the measures would bring the US tariff rate to what was in place in 1910. "Many countries will likely end up in a recession," he said.

  The US stock market was closed for trading by the time that Trump made his announcement, which he billed as "Liberation Day". But shares in the Asia-Pacific region opened lower on Thursday morning. Japan's benchmark stock index, the Nikkei 225, was down by 4% in early trading. Australia's ASX 200 was around 2% lower. Wedbush Securities analyst Dan Ives described the tariffs as "worse than the worst case" that investors had anticipated. But he said he believed there would be negotiations and exemptions.

  The tariffs will affect trillions of dollars in trade

  Trump has described his measures as "reciprocal" - intending them as a retaliation for other countries' policies that he says fuel high trade imbalances. These include high tariffs, as well as Value Added Tax (VAT) or regulations that bar foods with traces of certain chemicals. Trump also reinstated plans to end tax-free treatment for small packages from China as of May, a move that would hurt Amazon rivals such as Shein and Temu. He confirmed that a 25% tax on imports of all foreign-made cars, which he announced last week, would begin from midnight.
