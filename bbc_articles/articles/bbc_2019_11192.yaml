title: 'Mexico Jalisco: Forensics piece together 44 bodies - BBC News'
date: '2019-09-15'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-49704720
content: |-
  The corpses were found among 119 black bags containing human remains.

  Heavy machinery was used to uncover the bodies earlier in September

  Forensic scientists in Mexico have managed to piece together 44 bodies buried in a well in Jalisco state.

  Discovered just outside the city of Guadalajara, the human remains were hidden in 119 black bags.

  The remains were discovered earlier in September when local residents began complaining about the smell.

  Jalisco is the heartland of one of Mexico's most violent drug gangs and this is the second major find of bodies in the state this year.

  The vast majority of the bodies were cut up. A local organisation which searches for missing people has appealed to the government to send more specialists to assist with identification.

  They say the local forensic department is overwhelmed and does not have the necessary skills to complete the operation.

