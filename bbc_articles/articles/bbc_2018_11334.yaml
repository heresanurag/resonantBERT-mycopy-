  • None Since Mark Hughes' win in Belarus back in September 1999, each of the past five Wales managers have lost their first competitive match away from home.
  • None Wales have lost away from home in a competitive fixture for the first time since a 2-0 defeat by Bosnia-Herzegovina in October 2015.
  • None Giggs' side have failed to score in three of their past four games in all competitions, as many instances as in their previous 13 matches.
  • None Denmark are now unbeaten in 11 home matches in all competitions, winning five, since a 1-0 loss to Montenegro in October 2016.
  • None Age Hareide's men have kept seven clean sheets in their past nine home matches, conceding just two goals in that time.

  Wales face Spain in a friendly on Thursday, 11 October (19:45 BST), before returning to Nations League action against the Republic of Ireland on Tuesday, 16 October (19:45 BST).
