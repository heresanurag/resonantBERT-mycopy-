  Asher-Smith spoke of her personal and physical pain after winning bronze in Oregon. The medal came after her Olympic campaign in 2021 was wrecked by a hamstring injury, followed by the death of her grandmother - who she was especially close to - earlier this year. "I was so excited to race in front of a home crowd and all the British fans," Asher-Smith added. "It is going to be such an amazing competition and I know that Team England will do you all proud." Asher-Smith will be hopeful of competing in the European Championships, which begin on 15 August.

