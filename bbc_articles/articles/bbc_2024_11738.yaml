  Shakib came into the match in poor form, having made single-figure scores in Bangladesh's first two matches of the tournament. The 37-year-old came to the crease in the fourth over at the Arnos Vale Stadium after a spectacular diving catch from Engelbrecht dismissed Das and reduced Bangladesh to 23-2. He pushed through a quiet middle over period before accelerating alongside Mahmudullah and then Jaker Ali, with whom he struck 29 from the final 15 balls of the innings. The late flourish provided some late excitement for a crowd who were enjoying the first international match in St Vincent in almost a decade. Taking to the field, the veteran all-rounder conceded consecutive sixes to Singh in his second over, but returned tidy figures of 0-29 from his four overs. However it was 21-year-old spinner Rishad who was the star of the Bangladesh bowling display, removing Englebrecht and De Leede to snuff out Dutch hopes of victory, before dismissing Logan van Beek with a smart caught and bowled.
