title: 'Travis Kelce: Kansas City Chiefs star considering NFL retirement after Super
  Bowl loss - BBC Sport'
date: '2025-02-14'
section: American Football
url: http://www.bbc.co.uk/sport/american-football/articles/cm213rrjzm1o
content: |-
  Kansas City Chiefs tight end Travis Kelce says he is considering retirement from the NFL, but is yet to decide on his future. The 35-year-old struggled as the Chiefs were resoundingly beaten 40-22 by the Philadelphia Eagles in the Super Bowl at the weekend. Kelce, who is dating pop star Taylor Swift, is contracted to the Chiefs for the 2025 season but the American says he will delay any decision until he is certain he knows what he wants to do. "I know everybody wants to know whether I'm playing next year and, right now, I'm just kicking everything down the road," Kelce told the New Heights podcast, which he co-hosts with his brother Jason. "I'm kicking every can I can down the road. I'm not making any crazy decisions. "I've been fortunate over the past five, six years I've played more football than anybody. "The fact that we keep going to these AFC championships and these Super Bowls, that means I'm playing an extra three games more than everybody else in the entire league. That's a lot of wear and tear on your body."

  The Eagles denied Kelce's team the chance to clinch a 'three-peat', with the Chiefs having won the previous two Super Bowls. Kelce, a third-round draft pick in 2013, has been with the Chiefs since 2013. He has won the Super Bowl three times and has the most postseason receptions of any player in NFL history. "I think I owe it to my team-mates that if I do come back, it's going to be a whole-hearted decision. Not half-assing it," said Kelce. "I'm fully here for them and I think I could play. It's just whether or not I'm motivated or it's the best decision for me as a man, as a human and as a person to take on all of that responsibility."
