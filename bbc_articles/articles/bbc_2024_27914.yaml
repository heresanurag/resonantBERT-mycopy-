title: Children sing Happy Birthday to the King - BBC News
date: '2024-11-14'
section: General
url: http://www.bbc.co.uk/news/videos/c2075nlgpkjo
content: |-
  The monarch smiled as the group of youngsters sang to him with their teachers during a visit for a food poverty project.

  Children from Rye Oak Primary School in Peckham sang Happy Birthday to King Charles as he marked his 76th year.

  The King smiled as the youngsters sang to him with their teachers during a visit to Deptford, where he also opened a new hub as part of a food poverty project.

  He also sat with the children, who will benefit from the new hub, listened to them talk about the foods they enjoy, asking about their school lunches.
