  Shortly before midday on Saturday, the fire was said to have been brought under control with "no visible flames". Oxfordshire County Council, which runs the county's fire service, said there were still "small pockets of smoke and heat" and crews remained on site "dampening down".

  Ms Wheeler, speaking on the Today programme on Saturday, said the Fire Fighter's Charity was "heartbroken by what has happened". "Firefighters go to work every day knowing that there are risks but when something like this happens it brings that reality really crashing home," she said.

  A golden plaque has been placed underneath the Bicester Motion sign at the entrance to the site. The tribute reads: "Oxfordshire Fire and Rescue Service. Bicester Motion. Our thoughts and prayers go out to all of those affected by the sad loss of two firefighters and the member of the public. Love from the Bicester community." Pam Stiddig, who lives nearby and saw the fire, visited Garth Park to lay flowers. She said: "I've come because they are our local heroes. It's very, very sad."

  A golden plaque, flowers and handwritten cards have been laid at the Bicester Motion site following the three deaths

  Oxford City Council has lowered the city's flag at the Town Hall to half-mast. St Laurence's Church in Banbury Road, Caversfield, close to the site, said it was open "for anyone looking for a space for private prayer or for stillness and reflection". A book of condolence has also been opened at the church.

  The fire broke out at Bicester Motion on Thursday and was burning into Friday afternoon

  Oxfordshire County Council said it recognised "people may wish to pay their respects" but urged anyone wishing to lay flowers to take them to Garth Park "to avoid obstruction to the highways". The park, in Launton Road, is set to open from 07:30 to 21:00 BST daily. People can also sign the book of condolence between Monday and Thursday 09:00 to17:00 and Friday 09:00 to 16:00.

