title: 'Bicester fire: Tributes for firefighters and father killed - BBC News'
date: '2025-05-18'
section: Oxfordshire
url: http://www.bbc.co.uk/news/articles/cgmj1jlgnxdo
content: |-
  Martyn Sadler, Jennie Logan and David Chester died in the fire at the Bicester Motion business park.

  Tributes to firefighters and father killed in blaze

  Tributes have been paid to Martyn Sadler, Jennie Logan and David Chester

  Tributes have been pouring in after the deaths of two firefighters and a 57-year-old man in a fire at an Oxfordshire business park. Firefighters Jennie Logan, 30, and Martyn Sadler, 38, died at Bicester Motion on Thursday. Father-of-two David Chester, who worked at the site, was also killed. Sherine Wheeler, of the Fire Fighter's Charity, told BBC Radio 4's Today programme it was "a powerful reminder of the courage and sacrifices shown by firefighters every day". Two other firefighters who sustained serious injuries are conscious and in a stable condition in hospital, police say.

  Both Ms Logan and Mr Sadler were involved with the women's team at Bicester Rugby Union Football Club, which said "their presence at the club will be massively missed". "Our hearts and deepest condolences go out to their families, friends and our members at this terrible time," the club added.

  The Fire Brigades Union (FBU) has offered its condolences. General secretary Steve Wright said: "Jennie and Martyn died in the line of duty protecting their community. "They were both well-loved and widely respected. We are proud that they were members of our union." He said the FBU would be conducting a full investigation into the incident, adding: "For now, we are grieving for our fallen colleagues and friends."

  Firefighters at Bicester fire station formed a guard of honour to welcome back two engines

  Both firefighters worked at Oxfordshire Fire and Rescue Service and Mr Sadler was also part of the London Fire Brigade. London Fire Commissioner Andy Roe said Mr Sadler "exemplified courage and selflessness" and had been serving on retained duty at Bicester Fire Station. He was a leading firefighter in Ealing, west London, and an instructor in breathing apparatus and fire behaviour at the Fire Service College. A guard of honour was formed by 14 firefighters at Bicester Fire Station, to welcome back two of the fire engines sent to the scene. Firefighters removed their helmets and stood in two lines as the fire engines drove through the entrance. Flowers have also been left at the fire station.

  Bicester Motion, home to more than 50 specialist businesses, focused on classic car restoration and engineering. It was formerly RAF Bomber Command in World War Two and became redundant in 2004.

  Paying tribute to "the three lives that have been lost", Bicester Motion's chairman Daniel Geoghegan said the firefighters showcased "the epitome of selfless service" and had "gone above and beyond under unprecedented circumstances". Mr Geoghegan said father-of-two Mr Chester, who ran family business Chesters & Sons, had "a long history with the estate". He said Mr Chester was "part of the fabric of our estate and a friend to us all". "He joined us 12 years ago when we first bought the site and, with his wife and two sons, has been a pillar of our whole business community," he said. "Our whole community used to say that 'Dave always had our back'. Yesterday, he was doing just that - the epitome of his selfless spirit." The Chesters & Sons website says its work at the former RAF base "included carefully unearthing four buried wartime air raid shelters so as not to damage the structures to allow them to be renovated by another contractor".

  Flowers are being left around the edge of the pond in front of Garth House at Garth Park, Bicester

  People are now being asked to lay their flowers in the town's Garth Park, with a book of condolence set to open at Garth House from Monday. Among the tributes left at the scene was a navy blue T-shirt with the words "A21 Paddington London Fire Brigade". One card, addressed from Ms Logan's dogs, read: "Jennie, you always were and will be our 'mum' and we will miss you more than anyone can know. "We will see you one day across the rainbow bridge. All our love, Cooper and Barney."

  The fire, reported at about 18:30 BST, rapidly spread through a former aircraft hangar. At its height, 10 fire crews tackled the blaze. Fire investigators and Thames Valley Police say they are working to establish the cause of the blaze. Assistant Chief Constable Tim Metcalfe, said: "Our inquiries are ongoing but this is a complex investigation which may take some time."

