  At the scene on Friday, Oxfordshire's Chief Fire Officer Rob MacDougall was visibly emotional and spoke with "a heavy heart" when he confirmed the deaths. Assistant Chief Constable Tim Metcalfe, of Thames Valley Police, described the deaths as "an absolute tragedy" and said the thoughts of everyone at the force were with the families, friends and colleagues of those who had died. Officers are expected remain at the scene for a number of days to ensure the public remain safe, the force said.

