  A 32-year-old man has been arrested on suspicion of attempted murder, the Met says.

  Man arrested after girl, 8, and father shot in car

  A 32-year-old man has been arrested on suspicion of attempted murder and possession of a firearm with intent to endanger life

  A man has been arrested on suspicion of attempted murder after an eight-year-old girl and her father were seriously injured in a shooting in west London. The pair were taken to hospital after they were shot at in a car on Southern Row, in Ladbroke Grove, on Sunday at about 17:30 GMT. The Met Police said a 32-year-old man had been arrested on suspicion of the attempted murder of two people and possession of a firearm with intent to endanger life. He remains in custody, the force added.

  The two victims are still in hospital where they are receiving treatment. Police said the 34-year-old man had suffered potentially life-changing injuries, while the girl’s injuries were not life-threatening. Her two-year-old sibling and their mother, 32, were also in the car at the time of the shooting but were unharmed, the Met added. A 22-year-old man was arrested on Monday on suspicion of attempted murder. He has been bailed to a date in early February pending further inquiries. The Met said there would be an increased police presence around the area of Southern Row over the coming days and its investigation is still ongoing.
