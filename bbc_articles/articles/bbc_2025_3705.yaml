title: 'Watch: LA sees first sign of partial lunar eclipse - BBC News'
date: '2025-03-14'
section: General
url: http://www.bbc.co.uk/news/videos/c5y2v1y958eo
content: |-
  The Griffith Observatory in Los Angeles is live streaming its view of the celestial treat.

  Early-rising UK stargazers are in for a celestial treat on Friday as a lunar eclipse takes place just before dawn.

  But for those who have not managed to catch a glimpse yet, here is the view from LA as part of a livestream put out by Griffith Observatory.

  For most of the UK the eclipse will be partial as the Earth's shadow will not cover all of the Moon. For some far western regions, and across the Americas, the eclipse will be total, weather permitting.

  As the Moon moves into the Earth's shadow, it will gradually darken before turning a dusky red, resulting in a stunning "blood moon".
