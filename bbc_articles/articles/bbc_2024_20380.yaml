title: 'Paris 2024: GB to face holders the Netherlands in women''s hockey quarter-finals
  - BBC Sport'
date: '2024-08-03'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cp4w4g45741o
content: |-
  Great Britain will face reigning Olympic champions the Netherlands in the women's hockey quarter-finals after losing their final pool game at Paris 2024.

  GB, who have won medals at the past three Games and clinched bronze at Tokyo 2020, lost 3-0 to Tokyo silver medallists Argentina.

  GB were already assured of a quarter-final place and the 2016 champions have finished the pool in fourth place, with two wins and three defeats from their five games.

  In the next round they will take on the Netherlands, who beat GB 5-1 in the Tokyo semi-finals before seeing off Argentina to win gold.

  GB's Tess Howard was shown a yellow card early in the third quarter on Saturday and during her absence Valentina Raposo and Agustina Albertario scored for Argentina.

  Zoe Diaz then struck in the final quarter to seal victory and put Argentina top of Pool B, before Australia face Spain.
