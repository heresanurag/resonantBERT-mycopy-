title: Labour MP Jas Athwal sacks letting agent after mould scandal - BBC News
date: '2024-09-02'
section: Politics
url: http://www.bbc.co.uk/news/articles/crkm15z1r82o
content: |-
  MP sacks agency managing his rental flats, after the BBC found black mould and ant infestations.

  Labour MP Jas Athwal has sacked the agency which manages his rental flats, after the BBC found black mould and ant infestations in the properties. Mr Athwal said he was "shocked and sickened" by the state of the flats, which were being managed by an agency he said had been "selected for their quick response times and excellent customer service." The MP for Ilford South owns 15 properties, making him the biggest landlord in the House of Commons. When approached by the BBC, the letting agent said: "I have no statement at this time."

  The BBC found flats owned by Mr Athwal contained dirty communal areas, lights that did not work and fire alarms hanging loose from the ceiling. In one block of seven flats owned by Mr Athwal nearly half the tenants said they had to regularly clean their bathroom ceilings to remove mould. An ant infestation was pointed out by one resident, who had insects climbing up a door frame and said the ants were on their child’s body and clothes. When Mr Athwal was first approached by the BBC on Friday, he said he had not previously been aware of these issues and defended the letting agent, referred to by tenants as "Raymond". Later the same day, he issued another statement saying he was "profoundly sorry" that his tenants had been let down and would ensure repairs were completed "swiftly". The MP also admitted his flats did not have the correct property licences required under a scheme he introduced as Redbridge Council leader, having earlier claimed to the BBC that he had complied with the rules. Now, in a third statement, Mr Athwal says he will replace the management agency within 48 hours, adding he "will be issuing each tenant with a personal apology and meeting with them urgently". He said: "I am shocked and sickened by the series of problems that have come to light and I am unreservedly sorry to all my tenants for the bad experience they have endured. "I will be reimbursing every tenant that is out of pocket for repairs or renewals they have had to undertake. "I will be issuing each tenant with a personal apology and meeting with them urgently." Responding to calls for Mr Athwal to quit as a councillor, House of Commons leader Lucy Powell said she understood he was "furious" as he "he didn’t know this is happening in his housing stock". Speaking to Sky's Sunday Morning with Trevor Phillips, she said: "I take at face value what he said in the last few days and he's got to put that right. "He's absolutely got to put those things right and that's why he's sacked the managing agent, but I'm not here to defend his actions." Ms Powell added Labour was bringing forward a "much strengthened" Renters Reform Bill when parliament returns next week to "tackle the scourge of bad landlords". In 2018, Mr Athwal - who led Redbridge Council from 2014 until he became an MP last month - shared an article about a local landlord being fined by the council, writing, external: "Rogue landlords, we are coming for you." He is still a councillor but stood down from his role as council leader following the general election, where he stood on Labour’s 2024 manifesto included a commitment to "prevent private renters being exploited and discriminated against".

