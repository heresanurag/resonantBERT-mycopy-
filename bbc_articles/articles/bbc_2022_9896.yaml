  Take a look around Annabelle and Patrick's home after a fire destroyed their garden and outbuilding.

  This is what's left of a garden and outbuilding - where a landlord's mother lived.

  The UK's heatwave and scorching 40C temperatures sparked wildfires across the country. Norfolk was one of those places.

  Norfolk Fire Service declared a major incident and dealt with more than 100 incidents on Tuesday.

  Housemates Annabelle and Patrick class themselves as "lucky" their entire house wasn't caught by the flames but described the aftermath as "Armageddon".

  Take a look at the scene left behind after the hottest day of the year wreaked havoc.
