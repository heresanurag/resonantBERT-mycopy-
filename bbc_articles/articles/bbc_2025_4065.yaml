content: |-
  Nasa commentators joked the aquatic mammals are an "honorary part of the recovery team" attending to the capsule.

  Nasa astronauts Suni Williams and Butch Wilmore have splashed down near Tallahassee, Florida after nine months at the International Space Station.

  They splashed down with Nasa astronaut Nick Hague and Russian cosmonaut Aleksandr Gorbunov.

  Minutes after their splashdown, a pod of dolphins could be seen swimming near the capsule. Nasa commentators joked they're an "honorary part of the recovery team".
