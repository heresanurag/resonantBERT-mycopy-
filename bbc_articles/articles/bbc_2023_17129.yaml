title: 'Storm Debi: Strong winds and heavy rain hit UK - BBC News'
date: '2023-11-14'
section: UK
url: http://www.bbc.co.uk/news/uk-67396689
content: |-
  The fourth named storm of the winter so far has brought strong winds and heavy rain to many areas.

  Waves crash over the promenade in Folkestone, Kent.

  Storm Debi has brought heavy rain and strong winds to several regions after wild weather hit large parts of the UK.

  A yellow warning for thunderstorms was in place for south-east England, parts of the south coast and London until 15:00 GMT on Tuesday.

  It follows stormy conditions across northern England and Scotland, with gusts of more than 70mph (112.7km/h) recorded in Wales and Northern Ireland.

  Debi is the fourth named storm of this winter so far.

  The rain and wind first hit Northern Ireland and the Republic of Ireland, then Wales, before moving eastwards and into the North Sea on Monday evening.

  In Northern Ireland, the storm caused road closures and some disruption to the public transport network. NIE Networks said about 3,000 customers were without power, mainly around Craigavon, Newry and Downpatrick.

  On Tuesday afternoon, the Environment Agency had 15 flood warnings in place - meaning flooding is expected - and 102 lesser flood alerts.

  Gusts of up to 77mph battered parts of the Welsh coast after a yellow weather warning across north, mid and west Wales, while winds of 74mph were recorded at Killowen, Northern Ireland, and 68mph on the Isle of Man.

  A Met Office amber wind warning - meaning a potential risk to life and property - was in place for parts of south-west Northern Ireland in the morning and remained in place until Monday afternoon in parts of north-west England, including Cumbria, Lancashire and Merseyside.

  Yellow weather warnings for wind were also in place for much of northern England and Wales until 18:00. This was extended until 21:00 for much of the north of England, including Lincoln, Sheffield and Manchester up to Carlisle and Newcastle.

  Storm Debi developed in the Republic of Ireland, where red weather warnings were in place earlier. About 100,000 homes and businesses had lost power as of Monday morning.

  A woman was taken to hospital after being hit by flying debris in Limerick and some schools were forced to close.

  Elsewhere, a plane flying into Dublin Airport had to abort its landing due to Storm Debi.

  A car on a flooded road in County Tyrone. Storm Debi caused power cuts in Northern Ireland and the Republic of Ireland

  BBC Weather's Simon King said Storm Debi could lead to some localised flooding, especially in Northern Ireland and eastern Scotland.

  He said the stormy conditions will be especially felt around Irish Sea coasts and there may be branches or trees down and potentially damage to buildings.

  The Met Office said severe weather could lead to the flooding of homes and businesses - with possible fast-flowing or deep floodwater causing a danger to life.

  Spray and flooding could also lead to difficult travel conditions, with some road and bridge closures, and disruption to rail, air and ferry services.

  The Met Office said mobile phone coverage could also be affected and injuries and danger to life could occur from large waves and beach material being thrown onto sea fronts, coastal and road properties.

  British Airways said it had to "make a small number of cancellations" due to the bad weather, which has reduced the number of flights air traffic controllers will allow to land per hour.

  Met Office meteorologist Marco Petagna said Storm Debi would bring "heavy and potentially thundery showers" moving eastwards across the south of England on Tuesday.

  He urged people to "take extra care and be prepared to see thundery showers".

  The latest storm comes after Storm Ciarán caused flooding and disruption across the Channel Islands and southern England, while another recent storm, Babet, flooded nearly 600 properties in Lincolnshire.

  Experts say a warming atmosphere increases the chance of intense rainfall and storms.

  However, many factors contribute to extreme weather and it takes time for scientists to calculate how much impact climate change has had on particular events - if any.

  The world has already warmed by about 1.1C since the industrial era began and temperatures will keep rising unless governments around the world make steep cuts to emissions.

