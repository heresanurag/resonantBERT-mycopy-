  The PM had his vaccine at St Thomas' Hospital, where he spent time in intensive care with Covid last year.

  No relaxing of rules in Switzerland for at least four weeks

  The Swiss government says there will be no relaxation of Covid-19 restrictions for at least another four weeks. There had been tentative plans to allow bars and restaurants to open their outdoor terraces next week, and to allow small cultural events - but today the government has said the situation remains too risky. Cases have been rising again over the past two weeks, and at least 80% of all new cases are the more infectious B117 (UK) variant. The government says the limit on private gatherings will be raised from five to 10, but is warning families to follow strict distancing and hygiene rules, and to enjoy Easter outside if possible. It also advises people to take advantage of the new mass testing system, which is free to all, before meeting friends and relatives. The government believes the criteria for relaxation of restrictions must include not just falling cases, hospitalisations, and R value, but that all risk groups are vaccinated. Switzerland has so far vaccinated about 12% of its population of 8.6 million.
