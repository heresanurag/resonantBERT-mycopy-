id: bbc_2018_3383
title: Huge crack opens in Kenya's Rift Valley - BBC News
date: '2018-03-23'
section: General
url: http://www.bbc.co.uk/news/world-africa-43501954
content: |-
  A crack stretching several kilometres has opened in south-western Kenya.

  Part of a highway has collapsed after a crack opened up in Kenya’s Rift Valley.

  Several families have been evacuated from the Suswa area in the south-western part of the country.
