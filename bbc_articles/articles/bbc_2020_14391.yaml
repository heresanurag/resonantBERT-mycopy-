id: bbc_2020_14391
title: 'Indonesia: Thousands flee after volcano erupts - BBC News'
date: '2020-12-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-55127590
content: |-
  Authorities have warned people of "poisonous gas" after Indonesia's Ile Lewotolok volcano erupted.

  Thousands of people have fled after Indonesia's Ile Lewotolok volcano erupted, spewing ash high into the air.

  Authorities have warned people of "lava streams and poisonous gas".

  Indonesia has the world's most active volcanoes.
