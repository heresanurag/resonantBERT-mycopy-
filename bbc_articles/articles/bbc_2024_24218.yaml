title: Post-war Derbyshire nuclear bunker to go under the hammer - BBC News
date: '2024-09-07'
section: Derby
url: http://www.bbc.co.uk/news/articles/cvgr792p32po
content: |-
  Auctioneers expect the sale of "a piece of history" to exceed the guide price of £15,000 to £20,000.

  Post-war nuclear bunker to go under the hammer

  The bunker was built in the 1950s amid fears of global nuclear war

  A post-war nuclear bunker buried under a hillside in Derbyshire is set to go under the hammer. The 1950s bunker, described as a "piece of history", is located 14ft (4m) under a field near Buxton. The facility was one of about 1,500 listening posts built by the Royal Observer Corps nationwide in case of a nuclear attack. It is set to be auctioned off on 26 September for a guide price of between £15,000 and £20,000.

  A ladder leads you 14ft below the surface

  SDL Auctions said three people would have occupied the space with enough food and water for a fortnight, to report on the fallout from any attack. While thankfully the site - off Waterswallows Road - was never used in anger, the sale does include some original items in situ. This includes a red communications hotline phone, vintage binoculars and an asbestos fire blanket case attached to the bunker's walls. There are also newer additions including velvet curtains, a log burner and a chemical toilet.

  The bunker's footprint is about the size of an average home's garage

  There are some original features left inside the bunker

  SDL Auctions said the sale was a "fantastic opportunity" as most similar sites had been decommissioned and bought up by telecoms companies in the 1990s to convert into mobile phone mast locations. Auctioneer Jim Demitriou added: "Some people like the idea of buying a bit of post-war Britain, it's a piece of history."

  The sale is an opportunity to own a piece of post-war British history, said auctioneers

  Three listeners reeling from the outbreak of global nuclear warfare would have been housed in the facility

  Mr Demitriou said the sale was expected to exceed the guide price. "It used to be very unusual until we started selling them about 18 months ago and this is my third one now, so people are seeking me out to sell their nuclear bunkers," he said. "My first one went for £31,000, the one two months ago went for £48,000."

