title: 'Chile wildfires: 51 people killed as homes destroyed - BBC News'
date: '2024-02-03'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-68194716
content: |-
  More than two hundred residents have been reported missing in the coastal tourist city of Viña del Mar.

  At least 51 people have been killed by forest fires in Chile, the country's president has said.

  The mayor of Viña del Mar, a coastal tourist city, also said that more than two hundred residents have been reported missing.

  Throughout the country more than 43,000 hectares have been affected by the fires, according to the interior ministry.

  The fires have been driven higher-than-usual temperatures and strong winds.
