title: Simone Biles' 'heart aches' over brother's murder charge - BBC News
date: '2019-09-03'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-49561018
content: |-
  The US gymnast says she's having a "hard time processing" what's happened.

  US Olympic gold medallist Simone Biles says her "heart aches for everyone involved" after her brother was charged with murder.

  On Twitter, she said she's "having a hard time processing what's happened".

  Tevin Biles-Thomas was arrested over a shooting on New Year's Eve that left three men dead and two injured.

  The 24-year-old, who serves in the US Army, is being held in prison in Georgia, where he was arrested last week.

  He was charged with murder, voluntary manslaughter, felonious assault and perjury.

  Simone posted: "My heart aches for everyone involved, especially for the victims and their families.

  "There is nothing that I can say that will heal anyone's pain, but I do want to express my sincere condolences to everyone affected by this terrible tragedy.

  "I ask everyone to please respect my family's privacy as we deal with our pain."

