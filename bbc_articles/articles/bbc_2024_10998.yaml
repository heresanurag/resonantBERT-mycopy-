title: 'Watch: Natalie Elphicke takes seat on Labour benches - BBC News'
date: '2024-05-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68978076
content: |-
  The now-former Conservative MP sits behind the Labour leader in the Commons.

  Natalie Elphicke, the MP for Dover and Deal, has defected from the Conservatives to Labour as Prime Minister's Questions began in the Commons.

  Video shows Ms Elphicke walking across the Commons and then sitting behind the Labour leader, Sir Keir Starmer.

  "Under Rishi Sunak, the Conservatives have become a byword for incompetence and division," she said in a statement released at midday.
