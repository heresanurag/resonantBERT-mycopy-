  The 71-year-old was last seen at the River Don, near Monymusk, in November 2022 while out with her dog.

  A body found in an 18-month search for a woman swept away in flooding in Aberdeenshire has been confirmed as Hazel Nairn. The 71-year-old grandmother was last seen at the River Don, near Monymusk, in November 2022 while out with her dog. Police Scotland said her remains, which were recovered from the river near Kemnay on 7 May, have now been formally identified. A spokesperson said her death was not suspicious and a report would be sent to the procurator fiscal.

  A specialist underwater team assisted in the search effort, but high water levels posed challenges in areas identified as a priority. The river also continues for 31 miles from Mrs Nairn's last known location until it meets the sea. The body of Hazel's dog was found in the days after she went missing. On the first anniversary of her disappearance, Mrs Nairn's daughter Anneka said it had been an "awful tragedy". She told BBC Scotland News: "I don't want people to think of us or our heartache but to think of my mum Hazel and how she is not home yet or at peace but out there, somewhere, all alone." She said the family would never really know what had happened.
