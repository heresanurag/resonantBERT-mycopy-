title: 'As it happened: Miami building collapse: ''Still possible someone could be
  alive'', Biden says - BBC News'
date: '2021-07-01'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-57685674
content: |-
  The US president spoke to the families of those killed in the Miami building collapse.

  The streets here in Surfside are not any quieter today, a week after the Champlain Towers South collapse. But they are more tense as search and rescue efforts are halted because of safety concerns regarding part of the structure that’s still standing.

  That’s the last thing families still waiting for news of their loved ones want to hear, especially when every second counts.

  Just this morning, Miami-Dade County Fire Chief Alan Cominsky reported that rescue teams had heard the voice of a woman trapped in the rubble. Crews heard her voice for several hours but could not get to her - and then she could no longer be heard.

  Pablo Rodriguez, whose mother and grandmother were both in the building when it collapsed, no longer believes they will be found alive. But he wants their remains to be found for closure.

  “We're hoping that at least we can have a proper burial and go through the whole grieving process.”

  It is not yet clear when the search operations will continue.
