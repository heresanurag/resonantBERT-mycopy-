title: Eurovision star Sam Ryder appeared in Cardiff on Saturday - BBC News
date: '2022-12-04'
section: General
url: http://www.bbc.co.uk/news/uk-wales-63848878
content: |-
  The Eurovision star played live for people in Cardiff Bay on Saturday.

  Sam Ryder appeared in Cardiff on Saturday afternoon playing live songs to fans and passers-by.

  He said he was visiting different parts of the UK to promote his new album, and announced the performance at very short notice.

  Despite the low temperatures, he said the crowd's "hearts were warm and in good spirits".
