title: 'Walworth: Man killed and two injured in stabbing - BBC News'
date: '2024-11-10'
section: London
url: http://www.bbc.co.uk/news/articles/cd6v3edv3p9o
content: |-
  A man believed to be in his 60s has been arrested and taken into police custody, the Met says.

  Man killed and two injured in stabbing

  Cordons have gone up around the East Street Market in Walworth

  A man has been killed and two others were injured in a stabbing in south London, the Metropolitan Police has said. Officers were called to reports of a number of people stabbed in East Street in Walworth at about 10:40 GMT on Sunday. Three injured people were found with one man dying at the scene. The two other people - a man and a woman - were taken to hospital for treatment and their condition is unknown. A man, believed to be in his 60s, was arrested at the scene.

  Cdr Peter Stevens said: “Tragically, a man lost his life this morning, and officers are working hard to establish exactly what happened and to provide support to his family. My thoughts and sincere sympathies are with them, and with the other people injured. "One man was rapidly arrested by officers responding to the incident. At present, although enquiries are ongoing, nobody else is sought."

  A man, believed to be in his 60s, was arrested at the scene

  Detectives are not treating the incident as terrorism. Police are working to confirm the identity of the man who was killed and inform his family. Siraj, 46, who lives locally and did not wish to give his surname, was walking through East Street Market when he saw police cars and ambulances going past. He followed them and found two injured people lying on the ground in the market. "It was terrifying," he said, adding that the area had "always been safe", but now he feels "unsafe to send my kids to school". Cdr Stevens urged anyone who witnessed the incident to contact the police.
