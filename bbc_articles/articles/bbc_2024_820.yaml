title: 'Lake Michigan: Freezing weather causes striking ice formations - BBC News'
date: '2024-01-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68047456
content: |-
  The cold weather in the US has caused natural ice sculptures to form in Grand Haven, Michigan.

  A video captured by a drone shows striking ice formations on a pier in the town of Grand Haven in Michigan.

  Located on the eastern shore of Lake Michigan, the structure is almost completely frozen over.

  Major winter storms have brought plummeting temperatures to parts of the US over the last week, with some US media reporting that at least 89 people have died in weather-related fatalities.
