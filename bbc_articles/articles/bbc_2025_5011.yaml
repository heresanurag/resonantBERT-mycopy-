title: Iga Swiatek abused by 'aggressive and taunting' fan at Miami Open - BBC Sport
date: '2025-03-26'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/ckg1dlje2ndo
content: |-
  Five-time major champion Iga Swiatek is being protected by increased security after being verbally abused during a practice session.

  Iga Swiatek has gone on to reach the Miami Open quarter-finals following the incident

  Five-time major champion Iga Swiatek is being protected by increased security after an "aggressive and taunting" fan verbally abused her at the Miami Open. Swiatek, 23, was targeted by the man in a practice session on Saturday. It is believed the man shouted personal insults about Swiatek's family. The world number two's representatives told BBC Sport the man had previously sent abusive online messages to her through social media. "The Miami incident appears to be a direct transition from verbal aggression online to harassment in the real world," the Polish player's team said. "He was aggressive and taunting." Swiatek's representatives added the incident was immediately reported to tournament organisers. Her experience comes a month after Britain's Emma Raducanu was targeted by a stalker at the Dubai Tennis Championships.
  • None 'Every woman has fear' - why risks facing female athletes remain

  Swiatek recently spoke out about the emotional toll she has faced in recent months, having served a one-month ban for a doping offence and not wanting to "step on the court". Since the incident at the weekend, the second seed has gone on to reach the Miami Open quarter-finals, where she faces Filipino teenager Alexandra Eala on Wednesday. "Security is a top priority. We monitor the network to catch these types of issues," her spokesperson said. "Constructive criticism is one thing, and threats, hate speech or even disturbance during training is another - this cannot be condoned." Tournament organisers and the WTA are said to have reacted quickly, putting extra security measures in place around the former long-time world number one. Miami Open organisers told BBC Sport the safety and security of everyone at the tournament is treated "extremely seriously". "We constantly evaluate any potential threats and take every measure to respond appropriately," they said in a statement. Those comments were echoed by the WTA, who said "comprehensive" security protocols are in place to ensure any incidents are dealt with "promptly and effectively". "The details of these are not something we discuss publicly, but we are steadfast in our commitment to maintaining a safe environment for players and everyone attending one of our events," said the WTA. Swiatek's experience is the latest incident involving a WTA player, providing a stark reminder of the dangers faced by female athletes on a regular basis. Raducanu, 22, recoiled in horror when she saw a man - who she had already reported for what was described as "exhibiting fixated behaviour" - in the stands of her match in Dubai last month. Stephanie Hilborne, the chief executive of the Women in Sport charity, told BBC Sport that "every single woman has a level of fear".
