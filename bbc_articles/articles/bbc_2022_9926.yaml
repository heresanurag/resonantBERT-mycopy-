title: 'As it happened: Pride in London: Revellers fill capital for biggest parade
  ever - BBC News'
date: '2022-07-02'
section: UK
url: http://www.bbc.co.uk/news/live/uk-62020418
content: |-
  More than a million people packed the capital for Pride's 50th anniversary, the London Mayor's office says.

  Fifty years ago about 2,000 people took part in London's first official Lesbian and Gay Pride event, as part of a protest against how the police treated that community.

  The marches have continued to this day, but now the hundreds of thousands of people who take to the streets are joined by celebrities, corporate sponsors and politicians.

  The first Lesbian and Gay Pride marches through central London Image caption: The first Lesbian and Gay Pride marches through central London

  Police officers weren't allowed to march in uniform at Pride until 2003 Image caption: Police officers weren't allowed to march in uniform at Pride until 2003

  Prime Minister Boris Johnson, then London mayor, at the 2008 Pride march Image caption: Prime Minister Boris Johnson, then London mayor, at the 2008 Pride march

  Pride in London 2016 was a poignant affair as people remembered those who died in the Pulse nightclub shooting in Florida a few days before Image caption: Pride in London 2016 was a poignant affair as people remembered those who died in the Pulse nightclub shooting in Florida a few days before

  Pride in London has evolved over the years, with some questioning its priorities.

  However, the message of fairness, equality and inclusivity has been a constant.
