title: Gaza ceasefire deal hits critical moment - BBC News
date: '2025-03-02'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c74kzjvypgeo
content: |-
  Talks on phase two of the agreement to release all hostages and the withdrawal of Israeli troops have barely begun.

  Palestinians in Gaza are trying to put their lives back together in the current, fragile peace

  Where next? The first six-week phase of the Gaza ceasefire ends on Saturday. The 42 days since 19 January have seen their fair share of uncertainty, hope, grief and anger, but everything that should have happened in that time has. Israeli hostages - the living and the dead - have been released. Palestinian prisoners set free. But negotiations on phase two, including the release of all remaining living hostages and the withdrawal of Israeli troops from Gaza, have barely begun.

  Talks opened in Cairo on Friday but Israel's delegation returned home in the evening. Reports suggested that negotiations would continue "at a distance" and that Israel's Prime Minister Benjamin Netanyahu was due to hold late-night consultations with the delegation, senior ministers and intelligence chiefs. For such a meeting to take place late on the sabbath was highly unusual. No statements emerged from the consultations, with reports suggesting they would continue on Saturday night. Israel appears to be looking to extend the current phase for another six weeks, to get more hostages back and release more Palestinian prisoners but without withdrawing its troops. The government here is adamant that Hamas, the group responsible for the massacres of 7 October 2023 and the taking of 251 hostages, has to lay down its arms and relinquish any form of authority in the Gaza Strip. Israel also says it is not yet ready to leave the Philadelphi corridor along the Egypt-Gaza border - a process that should have begun on Saturday. "We will not allow the Hamas murderers to again roam our borders with pickup trucks and guns, and we will not allow them to rearm through smuggling," an unnamed Israeli official said in a statement sent to reporters on Friday. Such anonymous quotes are often believed to come directly from the prime minister's office.

  Last summer, efforts to secure a ceasefire in Gaza faltered when Netanyahu insisted on keeping Israeli troops stationed along the Philadelphi corridor. On Friday night, Hamas said it would not agree to any extension of phase one without guarantees from American, Qatari and Egyptian mediators that phase two would eventually take place. Hamas seems determined to remain a force in Gaza, even if it might be willing to hand over day-to-day governance to other Palestinian actors, including the West Bank-based Palestinian Authority. Egypt has been working on a reconstruction plan for Gaza, as an alternative to Donald Trump's proposal to take the area over and evacuate its entire civilian population. But Western diplomats are not optimistic that the plan, due to be unveiled at an Arab League summit in Cairo next Tuesday, has the sort of robust security and governance arrangements that will be needed to meet Israeli demands.

  Mourners paid their respects to the Bibas family at Hostages Square in Tel Aviv - some holding up signs urging the Israeli government to ensure the return of all remaining hostages

  For all the emotional turmoil of the last few weeks, Israelis have come to expect the gradual release of hostages. There are believed to be 24 alive, still waiting to be freed, with another 39 presumed to be dead. Israelis desperately want them all back, without the sort of propaganda displays that have disgusted and infuriated the entire country. If the whole process now grinds to a halt, public anger – at Hamas and their own government - will mount. Further street protests are planned, including one on Saturday night in the place in Tel Aviv that all Israelis now know as Hostages Square. "We demand the return of all 59 remaining hostages by day 50 of the agreement," reads the invitation from the Hostages and Missing Families Forum HQ. "Now is our only window of opportunity – we won't get another." UN Secretary General António Guterres has weighed in, urging the parties "to spare no effort to avoid a breakdown of this deal". On Saturday evening, Israelis were once again horrified by the sight of hostages being paraded in front of the cameras, in a video released by Hamas. In the latest in a long line of cruel, harrowing videos released over the past 16 months, five Israeli hostages are seen, two of them with their faces blurred. Two of the hostages, Iair Horn and Sagui Dekel Chen, were released two weeks ago. In the video, Iair is seen embracing and saying goodbye to his younger brother, Eitan, suggesting the scene was filmed shortly before Iair and Sagui were released. The emotions are raw and the scene deeply distressing, with both brothers in tears and Eitan pleading to Benjamin Netanyahu to stick with the ceasefire deal and release all remaining hostages. The video is clearly designed, once again, to play on the frayed emotions of the Israeli public and heap pressure on the Israeli prime minister. In a statement released by his office, Netanyahu accused Hamas of producing "another cruel propaganda video in which our hostages are forced to engage in psychological warfare." Israel, the statement said, would not be deterred by Hamas propaganda. "We will continue to act relentlessly for the return of all of our hostages and until all objectives of the war are met." There's a widespread belief that, sooner or later, the war will begin again. It's a bleak prospect, for the hostages and for two million Palestinians in Gaza who are trying to put their lives back together in the current, fragile peace. In a place where families are still digging bodies from the rubble, sometimes with their bare hands, the thought of a resumption of a conflict which has already claimed tens of thousands of lives is chilling. Areas in the middle of the Gaza Strip that have so far escaped the worst of the conflict would likely suffer badly from any return to war, making it even harder to sustain life in this ravaged strip of land.
