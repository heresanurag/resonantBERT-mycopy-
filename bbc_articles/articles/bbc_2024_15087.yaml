  England have gone from 'living where their feet are', to putting their feet in Australia for the Ashes, says Stephan Shemilt

  'England fire first Ashes shot, now must make sure it does not backfire'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  James Anderson is now a former England fast bowler. No wonder he was enjoying the Guinness. Firstly while being interviewed by Nasser Hussain, then downing a pint on the dressing-room balcony, an appearance like the King at Buckingham Palace. This was cricketing royalty taking his final bow. Even if Anderson's Test farewell didn't quite have the drama achieved by his old mates Alastair Cook and Stuart Broad, the Friday Lord's atmosphere was filled with love as spectators flooded the outfield, taking selfies, throwing catches and caressing the manicured turf. What a contrast to the last Test played on this ground, in the Ashes last summer. If home fans had been allowed on the outfield in the wake of the Jonny Bairstow stumping, anyone in a baggy green cap would have been in mortal danger. One wonders what effect that episode and the outcome of the series had on England skipper Ben Stokes and coach Brendon McCullum. England's own mistakes contributing to them going 2-0 down, a titanic effort to get back to 2-2 either side of a Manchester washout that denied the chance to regain the urn. For the first two years of the Stokes-McCullum era, everyone from the England set-up would tell anyone who would listen that they "live where their feet are". Now, England have put their feet 10,000 miles and 16 months away on the next tour of Australia.
