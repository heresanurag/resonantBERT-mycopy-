  England want the Ashes back and have been unashamedly honest that the planning has begun. For Stokes and McCullum, it seems likely their story ends down under and both will crave a piece of the Aussies. The captain has only ever won one Ashes series, on home soil in 2015. In terms of trips to Australia, he was part of an England team that fell apart in 2013-14, did not go because of the Bristol incident in 2017-18 and was only just coming back from a break from cricket for the Covid-hit tour of 2021-22. Next time, he wants a team that will give success on his last shot. There will be no love lost from proud New Zealander McCullum, either. Captain of the Black Caps team that lost the 2015 World Cup final to Australia in Melbourne, McCullum only ever won one Test against the Aussies. Playing Australia in the final Test of his own career, McCullum clattered the fastest Test hundred of all time, off 54 balls. Baz was Bazballing before Bazball was a thing. Rightly or wrongly, eras of England Test teams are judged on the Ashes. It can be argued that the best way to beat Australia is to simply focus on becoming the best team possible, beating the opposition in front of you on any given day. But it is not impossible to be planning for the future while at the same time doing what is right for now, and the first Test of England's refresh could not have gone much better, mainly because it was the new faces that starred in the innings demolition of West Indies. Anderson never managed to take 12 wickets in a Test in 188 attempts. Gus Atkinson did it first go, his 12-106 the best figures by an England debutant since Queen Victoria was on the throne. The Surrey man is quick, uncomplicated and unassuming. He is a very different bowler to Anderson, but it was hard not to think a torch was being passed when the two men were operating in tandem on the third and final morning. When Atkinson took the winning wicket, thus denying Anderson the glorious send-off, Anderson was the first man on the scene with congratulations. Atkinson apologised, but Anderson playfully told him, in less polite terms, to not worry about it because the win was more important. Atkinson is far from the finished article and Lord's might turn out to be the best it ever gets for him, but he has shown it is right for England to have him in their plans as they rebuild a pace attack following the exits of Broad and Anderson in back-to-back home Tests.

