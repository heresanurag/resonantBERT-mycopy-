id: bbc_2022_1075
title: 'Ashling Murphy: Further arrest in murder investigation - BBC News'
date: '2022-01-19'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-60054554
content: |-
  Irish police are questioning a man about withholding information about the killing.

  A man in his 30s has been arrested by gardaí (Irish police) investigating the murder of Ashling Murphy.

  The 23-year-old primary school teacher was attacked while out exercising beside a canal in Tullamore, County Offaly, last Wednesday.

  The man is being questioned in relation to the potential withholding of information.

  Another man in his 30s, who was arrested on Tuesday, continues to be questioned on suspicion of murder.

  A 40-year-old man was arrested last week, but was later released and eliminated from police enquiries.

  The man in his 30s being questioned on suspicion of murder was arrested after he was deemed medically fit to be discharged from St James's Hospital in Dublin on Tuesday, RTÉ reports.

  He had presented himself to the hospital last Thursday night with serious and suspicious injuries, says the Irish broadcaster.

  Gardaí were alerted, having contacted hospitals after Ashling's killing, asking medical officials to contact them if they had suspicions in relation to a wounded patient.

  Evidence has been gathered from the post-mortem examination, the forensic examination of the scene, information from public appeals and interviews with witnesses, RTÉ reports.

  Mourners lined the streets on Tuesday for Ms Murphy's funeral with Irish President Michael D Higgins and Taoiseach (PM) Micheál Martin among those who attended.

  Pupils from Durrow National School where she taught, along with musicians she had played with as well as friends from her local GAA club turned out to pay their respects.

  Mourners came out in force to pay their respects to the young woman

  A priest at the funeral said her family had been robbed of their "most precious gift" .

  The Bishop of Meath Tom Deenihan said the killing had also shone a light on the issue of violence against women within Irish society.

  Ms Murphy's 23-year-old boyfriend, Ryan Casey, spoke of the loss he had endured and said she "was so much more to me than a girlfriend".

  "She was my soul mate. She is my soul mate. She will always be my soul mate," he said in his emotional tribute.

  "She is the greatest love of my life. I will cherish the last five years we spent together for my entire life and hope that some day, God willing, we can be reunited once more."

  The Murphy family and Ashling's boyfriend, Ryan, walked behind the hearse as it left St Brigid's Church

  Tens of thousands of people have attended vigils across the island of Ireland and further afield following Ms Murphy's killing.

  In the wake of her death, there have been calls for more to be done to tackle violence against women in Ireland.

  The Republic's justice minister has said she intends to publish a new national strategy on domestic, sexual and gender-based violence in March.
