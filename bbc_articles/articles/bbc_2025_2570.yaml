  She insisted it was in Mexico's interest to combat the trafficking of fentanyl, a synthetic drug 50 times stronger than heroin that is linked to tens of thousands of overdoses in the US. Sheinbaum pointed out the deployment of 10,000 members of the National Guard to the US border would "help Mexico" increase its security. Border security and stemming the flow of undocumented migrants was one of the key issues in President Trump's campaign and since coming to office he has argued voters "gave him a mandate to seal the border".
