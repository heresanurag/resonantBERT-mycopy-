title: 'Sinkhole Merthyr Tydfil: Homes evacuated on Pant estate - BBC News'
date: '2024-12-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/cj90ll47g4yo
content: |-
  About 30 homes are believed to have been evacuated and people were told to avoid the area.

  Merthyr Tydfil council said it had been working with other agencies at the site since Sunday morning

  Homes have been evacuated after a sinkhole opened up on a housing estate. Local councillor David Hughes said it was believed a culvert had collapsed, creating a big hole at Nant Morlais, in Pant, Merthyr Tydfil. South Wales Police, South Wales Fire and Rescue Service and Merthyr Tydfil council confirmed they were alerted on Sunday morning. Mr Hughes said residents of Nant Morlais - about 30 homes - have been evacuated. The cul-de-sac has been closed and people are being advised to avoid the area. One residents said he heard "rumbling and collapsing" and feared he could lose his home.

  The sink hole opened up following heavy rain during Storm Bert and again in recent days

  More rain fell overnight, just days after Storm Bert caused flooding across Wales, along with a coal tip landslide and sinkhole, external at Cwmtillery, Blaenau Gwent. Stephen Regan, 55, moved into his house, which is right next to the sinkhole, a year ago and said he feared he could lose his home. "It was very scary, you could hear it rumbling and collapsing when it was happening," he said. "I just want to get back in the house but we don’t know what the situation is at the moment. "My fear is my house could go... I’ve never seen anything like this in my life."

  Mr Regan estimated the hole was between 50ft and 60ft (15 to 18 metres) deep, adding: "The culvert has collapsed and water has just washed it all away. "It’s an older generation on this street so they are scared."

  About 30 homes have been evacuated while repair work takes place, the council says

  Merthyr Tydfil council leader Brent Carter said staff were working with agencies at Pant and "no further help or support is needed at this time". "Thank you to everyone who has offered it," he said. Mr Carter added safety was the main priority and advised people to stay away from the area.

  The council leader has urged people to avoid the area, saying safety is the top priority

  While any large hole that opens up in the ground tends to be described as a sinkhole, this catch-all term is technically inaccurate. The British Geological Survey (BGS) describes a sinkhole as "a natural surface depression caused by dissolution of soluble rocks at depth". Sinkholes can be formed by gradual dissolution happening underground but they can also be caused by heavy rain or surface flooding, construction work, leaking drainage pipes, burst water mains and groundwater abstraction, the BGS said.
