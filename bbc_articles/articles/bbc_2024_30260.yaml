  • None Killing of insurance CEO reveals simmering anger at US health system
  • None Who was Brian Thompson, healthcare CEO gunned down in New York? Earlier in the day, New York Police Commissioner Jessica Tisch said the weapon and suppressor seized by investigators from the suspect were "both consistent with the weapon used in the murder". If charges in New York are filed, Mr Mangione will be presented with the option of waiving his extradition to the state or contesting it. If he waives it, he will immediately be made available to New York authorities. If he contests it, the process could take between 30 and 45 days.

  Luigi Mangione was detained on Monday in Pennsylvania

  A three-page handwritten document found on Mr Mangione's possession suggested he harboured "ill will towards corporate America", said New York Chief of Detectives Joseph Kenny. Mr Kenny said that Mr Mangione was born and raised in Maryland and has ties to San Francisco, California. His last known address was in Honolulu, Hawaii. TrueCar, a website for car buyers, confirmed that he had been employed there but left in 2023. As a teenager, Mr Mangione attended a private all-boys school in Maryland, where he was class valedictorian, a title usually awarded to students with the best grades. A LinkedIn account that appears to belong to him says he worked as a data engineer in California, and graduated from the University of Pennsylvania, where he was a teaching assistant and founded a video game development club. Several posts to an account on X, formerly Twitter, that appeared to belong to him suggested that friends had been trying to reach him, with one person posting in October that "nobody has heard from you in months".
