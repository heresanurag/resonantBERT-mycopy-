title: 'Luigi Mangione: Suspect in healthcare CEO''s killing arrested - BBC News'
date: '2024-12-10'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c99xy2j23gvo
content: |-
  A prosecutor says Luigi Mangione, 26, who was denied bail at an initial court appearance, is likely to be charged with homicide.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Police name Luigi Mangione as suspect in NY shooting

  A 26-year-old man has been arrested in connection with last week's fatal shooting in New York City of UnitedHealthcare CEO Brian Thompson. Luigi Mangione was taken into custody at a McDonald's in the town of Altoona, Pennsylvania, about 280 miles (450km) west of New York City on Monday after a customer at the fast-food outlet recognised him. He was found in possession of a handwritten document that indicated "motivation and mindset", according to police. Mr Mangione appeared later in a Pennsylvania court to be arraigned on five initial counts and was denied bail. A prosecutor said he expected a homicide charge to be filed soon.

  Mr Mangione was formally charged on Monday evening with forgery, carrying firearms without a licence, tampering with records or identification, possessing instruments of crime and providing a false identification to police. Pete Weeks, a district attorney in Pennsylvania's Blair County, said that homicide charges from New York would be filed "tonight or tomorrow" or in the "near future". Mr Mangione stopped co-operating after he was detained, officials said. Handcuffed at the wrists and ankles, he appeared in court on Monday wearing jeans and a dark blue jersey. He appeared calm during the hearing, occasionally looking around at those present, including the media. Mr Thompson, 50, was fatally shot in the back last Wednesday morning outside the Hilton hotel in Midtown Manhattan where UnitedHealthcare, the medical insurance giant he led, was holding an investors' meeting. Police say he was targeted in a pre-planned killing. The words "deny", "defend" and "depose" were written on shell casings found at the scene. Investigators believe they could be a reference to what critics call the "three Ds of insurance" - tactics used by insurance companies to reject payment claims by patients in America's complicated and mostly privately run healthcare system.

  Investigators believe UnitedHealthcare CEO Brian Thompson was killed in a pre-planned attack

  New York City investigators used one of the world's largest digital surveillance systems, police dogs, drones and divers in a Central Park lake in the search for clues before the manhunt spread to neighbouring states. But it was ultimately a McDonald's customer that recognised the suspect from media coverage and alerted an employee, who tipped off the police. When police arrived, Mr Mangione showed them a fake New Jersey driver's licence with the name Mark Rosario, said court papers. He "became quiet and started to shake" when an officer asked if he had been to New York recently, the criminal complaint adds. When he was told he would be arrested if he lied about his name, he gave his real name, according to the court papers. Asked why he lied, he told officers that "I clearly shouldn't have". A search of his backpack uncovered a 3D-printed pistol, a 3D-printed silencer and a loaded magazine with six rounds of 9mm ammunition. Prosecutors said he was also carrying a US passport and $10,000 cash, $2,000 of it in foreign currency, though Mr Mangione disputed the amount in court. Investigators revealed that finding him was a complete surprise, as they did not have his name on a list of suspects before Monday.
