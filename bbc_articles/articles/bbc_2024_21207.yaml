title: 'Jane Austen: Winchester Cathedral anniversary sculpture approved - BBC News'
date: '2024-08-09'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cvg3d0vwm2xo
content: |-
  The statue outside Winchester Cathedral will feature the literary giant standing by her writing table.

  Jane Austen was living near Winchester Cathedral when she died

  Plans for a life-sized sculpture of novelist Jane Austen outside Winchester Cathedral have been approved. Commemorating the 250th anniversary of her birth, the statue will feature the literary giant standing by her writing table. The Pride and Prejudice author died in the city in 1817, and was buried at the cathedral. Made from clay by sculptor Martin Jennings, the figure is expected to be installed by September 2025.

  The statue will be erected on an area of lawn near the cathedral

  Born in Steventon, Hampshire, Austen was known for penning novels such as Sense and Sensibility and Emma. She died in a house in College Street, near Winchester Cathedral, aged 41. Proposals for the sculpture were approved on 2 August, Winchester City Council confirmed. The cathedral said the idea had faced "some opposition" but had also generated "widespread support".

  The full-scale clay model will be made from clay at a studio in Stroud, Gloucestershire

  Plans for a statue of Austen by the same artist were scrapped in 2019, with Winchester Cathedral stating "other priorities" needed to be the focus of its attention. It was not revealed how much money was raised overall for the £250,000 project, although a Just Giving page set up by the cathedral received only £71.65. Canon Roland Riem, vice-dean of Winchester Cathedral, thanked sculptor Mr Jennings for his "perseverance and patience" over the eight years since the project was first commissioned. “I look forward to producing a memorial to Jane Austen which will draw people from far and wide to celebrate her legacy and that of the great city and cathedral in which she rests," he added.

  Artist Martin Jennings was originally asked to design the sculpture eight years ago
