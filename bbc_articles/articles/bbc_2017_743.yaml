content: |-
  A couple with a toddler "risked their lives" by climbing over a locked level crossing gate near Scarborough, Network Rail have warned.

  A couple with a toddler "risked their lives" by climbing over a locked level crossing gate near Scarborough, Network Rail has warned.

  The company has just released CCTV footage of the incident, which happened on New Year's Eve.

  It shows two adults climbing over a 6ft-high locked gate at Seamer station and then running across the tracks in front of a train.
