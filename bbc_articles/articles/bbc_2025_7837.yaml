content: |-
  A plunging FTSE 100 dominates the headlines while Russell Brand's rape trail looms next month

  Former comedian Russell Brand is due in court next month

  "Economic carnage", is how the Times, external describes the fallout on global stock markets in response to US President Donald Trump's tariffs. The paper says even gold - "usually considered a safe haven investment" - slumped in value. The Guardian reports the FTSE 100 in London had its worst week's , externaltrading since late February 2020 "when anxiety about the Covid-19 pandemic was gripping the markets". The i paper Weekend says only JD Sports stock avoided a fall, external. The Daily Telegraph's Matt cartoon, external nods to another row involving Trump. The caption alongside two people in Greenland reads: "If US stock markets keep falling, we might be able to buy America soon." Photographs of the former comedian and actor, Russell Brand, make almost all of the front pages after he was charged with rape and sexual assault. The Daily Mirror reports, external that the alleged attacks on four women date back to 1999. Mr Brand is due in court in London next month, and according to the Sun his lawyers are understood to have promised he will fly back from Florida to face the allegations. The Daily Star is among the papers to quote his denial, external on social media. "What I never was, was a rapist," he says.

  The Daily Express reports the former Reform UK MP, Rupert Lowe, has had his personal gun collection seized by the police, external. The weapons were taken from his farm in the Cotswolds last month. Mr Lowe has vowed to clear his name and says he is co-operating with Gloucestershire Police. "New royal bombshell", declares the Daily Mail, as it leads on "the Chinese spy scandal engulfing Prince Andrew". In what the Mail describes as an "extraordinary twist", external, court papers show the Duke of York and a former aide were twice smuggled into Windsor Castle for talks with the King about the investment fund linked to an alleged Chinese spy. Sources quoted in the paper insist that at no stage did the King or his advisers give approval to the business opportunities that were being discussed.

