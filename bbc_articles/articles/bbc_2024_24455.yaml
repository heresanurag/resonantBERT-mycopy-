title: The Last Dinner Party 'appalled' by security checks on male fans - BBC News
date: '2024-10-01'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cly7rp29g00o
content: |-
  Men going to see the band on their own say they faced "thorough" searches and "condescending" questions.

  Last Dinner Party 'appalled' by security checks on male fans

  The Last Dinner Party cancelled their Lincoln gig at the last-minute, after their support acts had already performed

  The Last Dinner Party say they're "appalled and disappointed" after a venue enforced a security policy which audience members say discriminated against men, especially those who were alone. Some fans claim they were taken aside by door staff at The Engine Shed in Lincoln on Saturday and asked what they were doing at the show and whether they were real fans. The venue has apologised, saying the policy was in response to information they'd received about "incidents" at a previous gig, but they acknowledged it resulted in "the unacceptable treatment of some guests". The Last Dinner Party pulled out of the gig at the last minute, because one of the band was unwell.

  Kam Zaki, 46, was at the show on Saturday and says he was pulled aside by security and told that if he didn't consent to being searched, he'd have to leave. Speaking to BBC Newsbeat, he describes the search as "thorough". "They took everything out of my pockets, they went through my wallet including the coin pouch, they searched my shoes," he says. He says he was also asked questions including: "How long have you liked the band? What's your favourite song? How many times have you seen them before?"

