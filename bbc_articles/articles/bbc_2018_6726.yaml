id: bbc_2018_6726
title: Terminally ill woman makes memory boxes for her children - BBC News
date: '2018-06-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-44578680
content: |-
  Angela Rose, who has terminal cancer says the boxes will be "part of me to give to them when I die".

  Angela Rose is terminally ill with breast, bone and brain cancer.

  She is creating a memory box for each of her three children to have to remember her when she dies.

  Angela, from Milton Keynes, was given the idea by her MacMillan nurse.
