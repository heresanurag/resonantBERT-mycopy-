  As for New Year's resolutions, Ellis-Bextor believes in making fun ones and managed to keep her 2024 pledge to "wear more kaftans". For 2025 she has challenged herself to buy more disco balls: "I've only got one in my house and I think this is a great look," she says, gesturing towards the stage and the UK's supposed biggest disco ball. I express my hope that the glitter ball is safely attached, because if it fell when she was under it, then the title of the song that changed her 2024 would become rather apt. "When I die, they are going to make that joke no matter what," she laughs, before concluding, "The good news is I still love singing it. Imagine if I didn't." Sophie Ellis-Bextor's New Year's Eve Disco, is on BBC1 from 23:30, except in Scotland, where the Hogmany coverage will feature musical guests Marti Pellow and the folk band Skipinnish.
