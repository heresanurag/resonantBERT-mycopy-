title: 'Haiti earthquake: Tropical Storm Grace hampers rescue - BBC News'
date: '2021-08-17'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-58222888
content: |-
  Tropical Storm Grace has dumped heavy rain on Haiti just days after a tremor left at least 1,419 dead.

  Rescue workers in Les Cayes raced to find survivors before Tropical Storm Grace hit

  Rescue work following the deadly earthquake which struck Haiti on Saturday has been hampered by heavy rains brought by Tropical Storm Grace.

  Tens of thousands of people left homeless by the quake had to decide whether to brave the storm under flimsy tarpaulins or risk returning into buildings damaged by the tremor.

  At least 1,419 people are known to have died in the 7.2-magnitude quake.

  More than 6,900 were injured, and an unknown number are still missing.

