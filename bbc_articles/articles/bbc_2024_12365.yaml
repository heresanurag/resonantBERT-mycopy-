content: |-
  A doorbell camera captures the moment a house is destroyed in an explosion in Middlesbrough.

  Footage from a doorbell camera captures the moment a house is destroyed in an explosion in Middlesbrough.

  A severely burned 57-year-old man was flown to hospital after being pulled from the rubble of his home in Kirkland Walk, Middlesbrough, at about 12:40 BST.

  He was flown to hospital and remains in a critical condition.

  Residents in the square and surrounding streets were evacuated from their homes following the explosion.

  Cleveland Police said a cordon remained in place due to the structural danger the damaged building poses.

