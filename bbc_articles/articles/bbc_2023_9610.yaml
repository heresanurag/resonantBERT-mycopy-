  The BBC's Ros Atkins looks at Yevgeny Prigozhin's unusual rise through the military ranks.

  The BBC’s Analysis Editor Ros Atkins looks at how Yevgeny Prigozhin rose from hot dog salesman to become the boss of Russia’s Wagner mercenary group.

  Parts of this video were originally recorded on 25 May but it has been reversioned for publication on 24 June.
