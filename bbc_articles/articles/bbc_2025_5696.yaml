title: Is Trump reining in Elon Musk after a cabinet showdown with secretaries? -
  BBC News
date: '2025-03-08'
section: Technology
url: http://www.bbc.co.uk/news/articles/cpwd1722yr2o
content: |-
  The president intervenes in a cost-cutting row after a reported clash at the White House.

  Is Trump reining in Musk after a cabinet showdown with secretaries?

  This video can not be played To play this video you need to enable JavaScript in your browser. Trump says cabinet will cut staff with Musk 'watching'

  US President Donald Trump called a meeting of his cabinet secretaries on Thursday to discuss Elon Musk and his efforts to slash government spending and personnel numbers. It turned heated, according to media reports. Musk accused Secretary of State Marco Rubio of failing to cut enough staff at the state department, reports the New York Times. The tech mogul told Rubio he was "good on TV", according to the newspaper, pointedly skipping any praise of his work as America's top diplomat. The billionaire also clashed with Transportation Secretary Sean Duffy over whether Musk's Department of Government Efficiency (Doge) task force had tried to lay off air traffic controllers who were already in short supply in the Federal Aviation Administration, according to the New York Times. Duffy's department has been under scrutiny after two US airline crashes since Trump took office in January.

  After listening to the back-and-forth, the Republican president reportedly intervened to make clear he still supported Doge, but from now on cabinet secretaries would be in charge and the Musk team would only advise. A state department spokeswoman told the newspaper Rubio felt the cabinet meeting was an "open and productive discussion". The White House has not responded to BBC requests for further comment. Speaking in the Oval Office after the meeting, Trump said cabinet members should decide who to cut, but if they didn't, Musk would do the job. "I had a meeting, and I said I want the cabinet members to go first", Trump said. "And if they can cut it's better, if they don't cut, then Elon will do the cutting." The hastily planned gathering could provide evidence that the president has decided to curtail the sweeping power the SpaceX and Tesla boss and his Doge cost-cutting initiative have commanded in the early weeks of his administration. Trump first commented on the substance of Thursday's meeting, which was disclosed only in after-the-fact media reports, through a post that evening on his social media site, Truth Social. He said that he had instructed his secretaries to work with Doge on "cost-cutting measures". "As the secretaries learn about, and understand, the people working for the various departments, they can be very precise as to who will remain, and who will go," he wrote, adding that they should use a "scalpel" not a "hatchet".

