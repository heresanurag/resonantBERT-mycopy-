title: Three arrests in Leicester jeweller murder inquiry - BBC News
date: '2018-01-27'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-42844272
content: |-
  Ramniklal Jogiya was found dead in a Leicestershire country lane after going missing.

  Ramniklal Jogiya's body was found in Stoughton, Leicestershire, on Thursday morning

  Three men have been arrested on suspicion of kidnap and murder after the death of a Leicester jeweller.

  Ramniklal Jogiya was discovered in Gaulby Lane, Stoughton, at about 10:00 GMT on Thursday.

  Three men, aged 19, 20 and 23, and all from Leicester, have been arrested and remain in custody.

  Leicestershire Police said they believed Mr Jogiya was "taken against his will" after a break-in at his shop on Belgrave Road on Wednesday.

  A person was seen on CCTV in the jewellers with a shopping trolley after Mr Jogiya locked up

  Police have also released a CCTV image of a person seen pulling a shopping trolley and wearing a burkha in the shop just minutes after Mr Jogiya locked up on Wednesday evening.

  Det Ch Insp David Swift-Rollinson said: "Whoever that is seen on CCTV entering the jewellers a short while after Mr Jogiya had locked up and left, is clearly someone I need to identify quickly.

  "To protect my investigation, I'm not willing to say how I believe that person got into the jewellers - but I do want to hear from anyone who was in Belgrave Road between 7.30pm and 8pm last Wednesday evening and who may have seen this individual, seen Mr Jogiya or any vehicles that were being driven suspiciously."

  He said Mr Jogiya, who was reported missing after failing to return home from work on Wednesday, had suffered severe injuries in a "savage and heartbreaking" attack.

  A post-mortem examination has been carried out but further tests were being conducted to "absolutely establish the cause of death", police said.

  Police have released CCTV footage of Mr Jogiya leaving his shop

  Supt Shane O'Neil said "high-profile" police patrols were being carried out in the Belgrave Road area over the weekend.

  "The business community and local residents are understandably shocked and worried about this awful crime," he said.

  A special meeting was also planned for Monday to discuss safety concerns from the community after Mr Jogiya's death, he added.
