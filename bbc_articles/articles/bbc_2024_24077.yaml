title: Jeremy Kyle denies humiliating guest who died as inquest views unseen TV footage
  - BBC News
date: '2024-09-06'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cz075r18ekvo
content: |-
  Steve Dymond took his own life after being told he had failed a lie detector test on The Jeremy Kyle Show.

  Jeremy Kyle said he had tried to "de-escalate" a conflict between show guest Steve Dymond and his partner

  TV presenter Jeremy Kyle has denied humiliating a guest on his former talk show who later took a fatal overdose. An inquest has heard Steve Dymond was found dead from the combined effect of the overdose and a heart condition at his home in Portsmouth in May 2019. The 63-year-old, who had a history of suicide attempts, had taken part in the show a week earlier in an attempt to prove he had not cheated on his partner, the inquest in Winchester previously heard. In the footage shown at the inquest Mr Kyle told the guest to "grow a pair" and "I wouldn't trust you with a chocolate button".

  This video can not be played To play this video you need to enable JavaScript in your browser. Clips from The Jeremy Kyle Show showing a visibly upset Mr Dymond were played at the inquest

  Giving evidence, the TV presenter said he had tried to "de-escalate" a conflict with Mr Dymond's partner Jane Callaghan, who feared that he was cheating on her. In a key clip, the programme audience exclaimed in shock when the results of a lie detector test were revealed. Mr Kyle told Mr Dymond: "Just so you're aware you failed every single question." The guest responded: "Oh my God", and stood up. Ms Callaghan cried hysterically and left the main studio.

  The clip, shown to the inquest, showed the recording continuing backstage. "I am being so straight, I have never been more straight." Mr Kyle told the inquest: "From the moment Steve Dymond came out, I called him 'mate', I called him 'pal'. "I de-escalated, I calmed it down, I pushed it backstage. "And that was what the show was all about - conflict resolution." The presenter was asked by inquest counsel Rachel Spearing whether he felt Dymond was "humiliated" on the show. Jeremy Kyle replied: "No. I've read that I called him a traitor. No I didn't. It was the show as I understood the show. "Sad as it might sound, it was a typical part." He added that the show insisted on a doctor agreeing to let Mr Dymond come on, and provided aftercare services.

  It was Mr Dymond's idea to go on the show and take a lie detector test to prove "he hadn't cheated", his former partner said

  Previously, the court heard Mr Dymond was distressed after being "booed" and "heckled" by the programme's audience. He was found dead at his home in Grafton Street on 9 May 2019. His GP, Dr Amjad Rehman, told the hearing Mr Dymond had taken overdoses four times in previous years, had been sectioned under the Mental Health Act for his safety and had been diagnosed with both a depression and a personality disorder. However, the doctor wrote a letter at Mr Dymond's request which allowed him to appear on the show, the hearing was previously told. The open letter said Mr Dymond had a "history of low mood and depression but his mood has improved since he got back together with his partner".

  On Tuesday, Mr Dymond's son Carl Woolley told the inquest his father had been "very down" after the recording. He told the hearing: "Jeremy Kyle had got the crowd to egg on, to boo at him and stuff, he was cast as the liar before he had even spoken." He said his father insisted he had not been unfaithful to his partner Jane Callaghan.

