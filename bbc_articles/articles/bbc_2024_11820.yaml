content: |-
  BBC Midlands Today presenter is recognised for services to broadcasting and charity.

  BBC Midlands Today presenter Nick Owen has been awarded an MBE in the King’s Birthday Honours List for his services to charity and broadcasting.

  He described opening the letter confirming the accolade as a "real wow moment".

  Last year, Mr Owen underwent treatment for prostate cancer and talking publicly about his treatment saw a surge in people being tested for the disease.

  After a broadcasting career spanning more than 50 years, he was last year named best on-screen personality at the Royal Television Society Midlands awards.

