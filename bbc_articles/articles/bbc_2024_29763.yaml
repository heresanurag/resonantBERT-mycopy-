title: 'Sara Sharif: Father says girl''s stepmother was ‘true villain’, court hears
  - BBC News'
date: '2024-11-06'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c39nx21n4n8o
content: |-
  A father accused of killing Sara Sharif attempted CPR on his daughter, the Old Bailey has heard.

  Sara Sharif's body was found at her home in Woking on 10 August last year

  A father accused of killing Sara Sharif has said the 10-year-old’s stepmother was “the true villain”, a court has heard. Sara’s body was found with dozens of injuries at the family’s home in Woking, Surrey, last year, the Old Bailey was told. Her father Urfan Sharif, 42, stepmother Beinash Batool, 30, and uncle, Faisal Malik, 29, have denied murder. Naeem Mian KC, for Mr Sharif, told jurors his defendant tried to save Sara and begged for an ambulance, only to be told to “leave it, she’s dead” by Ms Batool.

  In a speech outlining Mr Sharif’s case, Mr Mian KC said he had been wrongly cast as “the villain” based on previous evidence, adding that Mr Sharif will say his wife, Ms Batool, was “the true villain of the piece”. Mr Mian KC told jurors that Mr Sharif arrived home to find Sara “limp” on 8 August 2023. He attempted CPR on Sara and begged for an ambulance to be called, Mr Mian KC told the court. “He was told in Urdu or Punjabi, ‘leave it, she’s dead’,” by Ms Batool, Mr Mian KC added. He also told jurors that disciplining his children with physical punishment was a “last resort” for Mr Sharif. “Not with a cricket bat as has been suggested, not with a white pole as has been suggested, but with a slap,” Mr Mian KC added.

  Sara's father, Urfan Sharif, told jurors he had never bitten, burnt or beaten his daughter

  Giving evidence, Mr Sharif said he had never bitten, burnt or beaten Sara. He also told the court he had previously completed voluntary courses titled Parenting Puzzle and Dad Discipline, as well as paediatrician and nutrition courses. He said he did a five-day St John Ambulance first aid course, in which he was taught CPR. Mr Sharif said Sara was a “beautiful angel, lovely, bubbly”, and wanted to be a ballet dancer when she was older. He told the court he had slapped Sara on a few occasions. “I have lots of flaws in my life, but I never beat her. Never,” he added. He also denied “controlling” his wife Ms Batool, stating that they had a traditional relationship – he worked and she was the “boss” at home. Mr Sharif claimed that in 2016, Ms Batool had hit him on the head with a wooden lemon squeezer when he first wanted to leave and on another occasion attacked him with a broom.

  Urfan Sharif (left), Beinash Batool (centre) and Faisal Malik (right) are each facing charges relating to the death of Sara Sharif

  The court previously heard that Sara was hooded, burned and beaten during more than two years of abuse. A post-mortem examination found Sara had suffered dozens of injuries including "probable human bite marks", an iron burn and scalding from hot water before she died on 8 August 2023. Prosecutor Bill Emlyn Jones KC previously said a bloodstained cricket bat, a rolling pin with Sara’s DNA on it, a metal pole, a belt and rope were found near the family’s outhouse. The court also previously heard Mr Sharif, Ms Batool and Mr Malik travelled to Islamabad, Pakistan, with other family members on 9 August 2023, the day before Sara's body was found. Prosecutors said Mr Sharif called police from Pakistan and admitted he killed Sara about an hour after his family’s flight had landed in Islamabad. Jurors were told Mr Sharif's case was that Ms Batool was responsible for Sara's death, and he made a false confession on the phone call and also in a note to protect his wife. The three defendants, who lived with Sara in Woking before her death, are also charged with causing or allowing the death of a child, which they deny.

