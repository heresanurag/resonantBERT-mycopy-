title: Snow and ice shut schools as Storm Bert looms - BBC News
date: '2024-11-21'
section: UK
url: http://www.bbc.co.uk/news/articles/cvglm32ydnzo
content: |-
  Storm Bert is set to bring snow, rain and strong winds to parts of the UK over the weekend.

  Several parts of the UK have seen heavy snowfall on Thursday as forecasters warn of Storm Bert's arrival at the weekend. More than 100 schools across the Scottish Highlands and 30 in north Wales have closed, while almost 200 schools in Devon and Cornwall shut or were partially closed due to the snow. Yellow weather warnings have been issued for snow and ice in parts of the UK until Friday, with further warnings for rain and snow due to come into effect this weekend. This comes as the second named storm of the season is set to bring snow, rain and strong winds to parts of the UK on Saturday.

  Storm Bert, named by Ireland's Met Éireann, is forecast to bring further disruption with gusts of 40-60mph (65-96km/h). Around Irish Sea coasts, gusts are expected to reach 70mph. The Met Office warned of possible travel disruption and flooding, and said parts of Wales and south-west England could see more than 100mm of rainfall. It also issued yellow weather warnings for rain and snow for Saturday and Sunday, and an amber warning of snow and ice in parts of the Highlands, Perth and Kinross and Angus. There is a yellow weather warning currently in place for much of Scotland , northern England and some of western and eastern England and Wales until 10:00 GMT on Friday. A yellow warning for snow and ice is also in place across Northern Ireland from 15:00 on Thursday until 10:00 on Saturday.

  On Thursday, the AA warned motorists to check forecasts before setting out on the road and to drive with "extreme caution". Devon and Cornwall Police said it had received numerous calls, external about collisions due to the conditions, and urged drivers to check the weather before travelling. A number of train services were also cancelled in the area following the heavy snow. The AA said it predicted a "major increase" in its workload. In Inverness, bus services were suspended for the safety of drivers and passengers, travel company Stagecoach said.

  This furry friend was enjoying the snow in Carmavy

  Rain turned to steady snowfall over Dartmoor and Exmoor early on Thursday morning but as this turned heavier during the morning, heavy snow fell even at lower elevations. Snow also fell for some around the New Forest and South Downs on Thursday morning. While this area of snow, sleet and rain clears from southern England, heavy snow will continue in northern Scotland through into Friday morning. Wintry showers will also move into north Wales and parts of north-west England later on Thursday and through the night. Temperatures fell to -10C in Tyndrum, Scotland, on Wednesday night, but with a low of -8.7C in Topcliffe, North Yorkshire, it was England’s coldest night of the autumn so far. It was also the coldest night of autumn in Northern Ireland with -3.9C at Katesbridge. Temperatures will fall sharply again on Thursday night with a widespread frost and ice on untreated surfaces.

  Heavy snow covered much of Cornwall, as seen here at the Halvana Plantation in Bodmin Moor

  Meanwhile, the first amber cold weather alert of the season is in place for much of England until 18:00 on Saturday. The alert means there is an increased health risk to vulnerable people. As the weather turns colder, some may be eligible for cold weather payments - a government benefit to help with fuel bills during times of exceptionally cold weather. Those who qualify must already be receiving certain benefits and meet additional criteria outlined on the government's website, external. The average temperature in the area must be 0C or less for seven days in a row or be forecast to be below freezing for seven consecutive days. People in England and Wales can check whether they are eligible via the government website, external. In Scotland, Winter Heating Payments are available to some people who meet the eligibility criteria, external. People in Northern Ireland can check their eligibility on this checker, external.

