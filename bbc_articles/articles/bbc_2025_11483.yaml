title: UK will end use of asylum hotels by 2029, Reeves says - BBC News
date: '2025-06-12'
section: Politics
url: http://www.bbc.co.uk/news/articles/c8xgzprn1vjo
content: |-
  The Chancellor pledged £200m to "cut the asylum backlog" and speed up deportations.

  UK will end use of asylum hotels by 2029, Reeves says

  The government has set out plans to end the use of hotels to hold asylum seekers by 2029, a move Rachel Reeves says will save £1bn a year. Unveiling her Spending Review on Wednesday, the chancellor pledged £200m to "cut the asylum backlog, hear more appeal cases and return people who have no right to be here". Ministers say hotels will be phased out by cutting small boat crossings and building new government-owned accommodation for asylum seekers. The announcement comes after the National Audit Office (NAO) predicted asylum housing costs will hit £15.3bn over the next decade - triple the amount budgeted by the Home Office.

  Conservative shadow home secretary Chris Philp claimed the plans are "built on an assumption that the hotels magically empty themselves". "They still have no plan for where these people will go," he added. On Tuesday, Home Office minister Dame Angela Eagle told a committee of MPs, external the government were looking to buy tower blocks and former student accommodation to house migrants as an alternative to asylum hotels. Dame Angela Eagle said the government was exploring new ways to house asylum seekers ahead of break clauses in major accommodation contracts coming up next year.

  Responding to the announcement, home affairs committee chairwoman Dame Karen Bradley said the cost of asylum hotels has risen to a "staggering extent". Dame Karen, the Conservative MP for Staffordshire Moorlands, said: "If hotels disappear there will still need to be stock of short-term accommodation to deal with unpredictable levels of irregular migration. "Targets on their own are not enough, they need to be delivered - and for that we need to have workable solutions". Dame Karen warned that without savings, broader goals to improve policing, cut immigration and strengthen counter-terrorism will be impacted. In her spending review, the chancellor also announced up tp £280m per year extra for the Border Security Command, which leads on the UK's strategy to crack down on people smuggling and small boat crossings. This follows an initial £150m to establish the unit last year.

