id: bbc_2024_8207
title: BBC Persian sent footage of Isfahan explosions - BBC News
date: '2024-04-19'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68854124
content: |-
  Video sent to the BBC shows flashes in the sky, while a large explosion can also be heard.

  An Israeli missile has struck Iran, two US officials have told the BBC's US partner CBS News.

  Iran's state broadcaster IRIB downplayed reports of an attack, saying Isfahan was "safe and sound".

  Residents from the area sent BBC Persian this footage, which shows flashes in the sky. A large explosion can also be heard..
