title: 'London Underground: New fan-made map shows trains in real time - BBC News'
date: '2025-05-12'
section: General
url: http://www.bbc.co.uk/news/videos/cd6jlvev478o
content: |-
  Ben James recreated nine of the 11 Tube lines in his interactive map, with coding assisted by AI.

  A London-based developer has created a live 3D map of the London Underground.

  The interactive map uses real-time TfL data to show trains moving across nine of the 11 Tube lines.

  Ben James said he thought people "enjoyed it much more" than he thought, and said "it's been really fun to see".

