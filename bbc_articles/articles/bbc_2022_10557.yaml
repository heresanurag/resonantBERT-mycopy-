  Cyclist Evans has been phenomenally consistent throughout the Games, finishing with a personal haul of three medals and a fourth place over the track and road. She took track silver in the points race and bronze in the individual pursuit in the velodrome last week, and narrowly missed a medal in the scratch race too. The 31-year-old former vet was less fancied on the road, but worked with team-mate Anna Shackley to finish second in a frantic bunch sprint behind Georgia Baker of Australia. It capped a fantastic fortnight for Evans, who has been one of the stars of Scotland's Games. "It's going to take a while to sink in, especially because it was in two disciplines," she said. "I'd not road raced in three years, so I had no expectation of winning a medal. When it got to the sprint... I don't even know how far out you're supposed to go from, so I didn't realise until I was crossing the line, then I was like 'oh, right'." In the men's race, former Tour de France winner Geraint Thomas attacked off the front with two kilometres to go, but Crockett was part of a group of riders who came past and sprinted for the line, eventually finishing third. "For a nation like Scotland to get a medal in the road race, with the talent that is here... I honestly can't believe it," Crockett said. "To get a medal is honestly unreal."

