title: 'Commonwealth Games: Birmingham 2022 is Scotland''s best Games outside Glasgow
  - BBC Sport'
date: '2022-08-08'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/62456090
content: |-
