title: 'Ukraine war: Russian air strike leaves 100,000 with no power - BBC News'
date: '2024-07-06'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0dmwjnmp4mo
content: |-
  Russia continues to pummel energy sites across Ukraine, plunging the country into extended blackouts.

  Ukrainian air defences shot down 24 out of 27 Russian drones involved in attacks overnight on 5 - 6 July (File photo)

  A Russian attack on a power facility in Ukraine has left 100,000 people without power in the north-eastern region of Sumy. Work is under way to restore power, National grid operator Ukrenergo said, following the strikes, which caused emergency shut-offs for consumers in the city and region of Sumy, which borders Russia. There were no reports of casualties or damage apart from the energy facility, Reuters reports. Russia continues to pummel energy facilities across Ukraine, often plunging the country into extended blackouts with people enduring sweltering summer conditions without running water, air conditioning, or life-saving medical equipment.

  Ukrainian mum Maryna Tkalich kisses her two-month-old baby during a blackout in June.

  Over the past three months alone, Ukraine has lost nine gigawatts of generating capacity, the national energy company Ukrenergo says, losing all of its thermal power plants to enemy action and seeing all hydroelectric sites damaged by drones or missile strikes. This is enough to power the whole of the Netherlands during peak hours of consumption, and more than a third of the capacity Ukraine had before Russia’s full-scale invasion began in February 2022, according to the national grid operator. Poland has been diverting surplus electricity to Ukraine to help it cope with the Russian strikes, but Ukrenego has scheduled cut-offs of electricity throughout the day across the country as domestic generation and electricity imports could not cover the deficit. Maria Tsaturian from Ukrenergo told the BBC she is aware that a lot of anger is directed at her company for cutting electricity so often, for so long and for so many customers. But, she says, there's no other option. "We are at war. The energy sector is one of the goals for the Russian terrorists. And it is obvious why: all our life, all our civilisation, is built on electricity,” she says. “This is the price we pay for freedom." Meanwhile, Ukrainian air defences shot down 24 out of 27 Shahed kamikaze drones Russia launched on the night of 5-6 July, the Air Force Command has reported on Telegram. The drones were intercepted over areas including the Sumy region, using electronic jamming and anti-air defences, it said.
