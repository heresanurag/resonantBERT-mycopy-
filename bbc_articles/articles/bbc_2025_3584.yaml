  Mercedes F1 boss Toto Wolff says a pitch to sign Max Verstappen for 2026 is "not on any radar".

  Verstappen to Mercedes 'not on any radar' – Wolff

  Max Verstappen is aiming to become only the second man to win five consecutive drivers' championships in 2025

  Venue: Albert Park, Melbourne Dates: 14 March-16 March Race start: 04:00 GMT on Sunday, 16 March with first practice at 01:30 on Friday Coverage: Live radio commentary of practice and qualifying on BBC 5 Sports Extra, race live on BBC Radio 5 Live. Live text updates on the BBC Sport website and app

  Mercedes Formula 1 boss Toto Wolff says a pitch to sign Max Verstappen for 2026 is "not on any radar". George Russell's Mercedes contract runs out at the end of this season and Wolff had talks with Verstappen last year before opting for Italian 18-year-old rookie Andrea Kimi Antonelli as a replacement for Lewis Hamilton, who has moved to Ferrari. Wolff said in there run-up to this weekend's season-opening Australian Grand Prix: "We need to concentrate on our driver line-up. I don't flirt outside if I'm in a good relationship. "So at the moment that (a move for Verstappen) is not on any radar. I don't plan to shift my concentration away from these guys and (will) make sure that George has some visibility very soon, or has a contract very soon." Wolff said he and Russell would wait before discussing a new deal but that that they would "find some time I guess before the summer, but we do that in a timely manner without disrupting the season".

