content: |-
  Oleksandr Usyk and Tyson Fury's heavyweight rematch in Saudi Arabia will be broadcast live on BBC Radio 5 Live on Saturday.

  Oleksandr Usyk and Tyson Fury's heavyweight rematch for the WBC, WBA (Super) and WBO titles in Saudi Arabia will be broadcast live on BBC Radio 5 Live and BBC Sounds on Saturday.

  Six months ago in Riyadh, Usyk beat Fury via split decision to become the modern era's first four-belt undisputed heavyweight champion.

  There will be a live text of the fight on the BBC Sport website from 20:00 GMT and video highlights will be available to watch on the BBC Sport website and app on Sunday.

  Radio coverage of the undercard will also be available on fight night.

  Ukraine's Usyk, 37, has won all the belts at heavyweight and cruiserweight and as well as Fury has beaten Britons Anthony Joshua, Daniel Dubois and Tony Bellew.

  Meanwhile, the defeat by Usyk was 36-year-old Fury's first in 16 years as a professional, making his career record 34 wins, one defeat and one draw.

  Mark Chapman will present live coverage of the fight, while the commentary will be led by Ronald McIntosh with retired world champion George Groves and former WBA lightweight champion Anthony Crolla.

  Steve Bunce is giving fans every aspect of fight week from news conferences and weigh-ins to the post-fight reaction on the 5 Live Boxing podcast with daily episodes on BBC Sounds.

  BBC Radio 5 Live and 5 Sports Extra controller Heidi Dawson said: "This rematch is one of the most anticipated of boxing history.

  "Listeners won't miss a thing in the build-up and beyond. From in-depth podcasts to live commentary, we have all the drama and excitement of this heavyweight clash."
