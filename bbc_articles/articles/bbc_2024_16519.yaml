title: 'Red squirrels: Island fights back invasion by their grey cousins - BBC News'
date: '2024-07-25'
section: General
url: http://www.bbc.co.uk/news/videos/cnl4nrl5qlro
content: |-
  A conservationist is on a mission to keep a Welsh island a sanctuary for native red squirrels.

  For a decade only native red squirrels lived on Wales' Anglesey island, following a massive cull of their invasive grey cousins. But now the greys are somehow getting back across the Menai Strait.

  Dr Craig Shuttleworth is on a mission to stop them.
