  As the first European leader to visit Trump since his inauguration, Macron navigated potentially testing talks.

  Macron walks tightrope with Trump as he makes Europe's case on Ukraine

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Relations between Europe and the US are unquestionably in crisis, so merely keeping things together as French President Emmanuel Macron did at the White House on Monday stands as an achievement. He did that by praising, flattering and gently cajoling the US president as they took questions in the Oval Office and held a joint news conference. This is a playbook that many leaders around the world now see as more productive than outright plain speaking or criticism of Trump. Macron managed to navigate what could have been a tricky day in Washington without conceding or revealing too much. He spoke of both countries wanting peace, and while he gently corrected one of Trump's claims on Europe's support for Ukraine, he also agreed that Europe needed to take more responsibility for its own security. But Macron did make one important concession – that Trump was right to re-establish some kind of relationship with Russia's Vladimir Putin. That is in sharp contrast to the view up until now in London, Paris and Berlin, which have all pursued a policy of isolating Putin and slapping sanctions on Russian industries and individuals. "There is good reason for President Trump to re-engage with President Putin," Macron said, adding that the new administration represented "a big change".
  • None Peace must not mean surrendering Ukraine, Macron says
