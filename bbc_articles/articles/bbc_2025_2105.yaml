  It is clear however, that the ambitions for re-establishing the kind of close relationship that Europe and the US have had since the end of World War Two are not on anyone's roadmap. That is why Macron himself has been working on the idea of a more strategically autonomous Europe for some time, toying with ideas of combined European defence forces. His sense that Europe needs to adapt given the dramatic shift in the US position is shared by Friedrich Merz, who will be Germany's next chancellor. Merz has already said that he believes the US under Donald Trump is indifferent to Europe's fate, and that the continent needs to be independent of the US in terms of security. "My absolute priority will be to strengthen Europe as quickly as possible so that, step by step, we can really achieve independence from the USA," Merz said. But France, the UK and Germany have also got to be cognisant of the fact that not all European powers are so hostile to the US view on Ukraine. The rise of far-right nationalist parties in Europe, most notably in places like Germany where the AfD came second in Sunday's elections, suggests some European citizens are also sceptical about the continent's continued support for Kyiv. Later this week, UK Prime Minister Sir Keir Starmer, who has been closely co-ordinating with his French counterpart, will come to Washington to reinforce their case on Ukraine. He, like Macron, believes his country has a special relationship with the US which can open doors and get a fair hearing. The problem is that Washington in the shape of Donald Trump is on transmit mode at the moment – pushing an agenda that leaves little room for the opinion of others. And while America has always had the ability to flex its muscles and get its way, Europe for the most part has not been on the receiving end. The fact that has changed is a sign of just how serious this rupture in established alliances has become.

