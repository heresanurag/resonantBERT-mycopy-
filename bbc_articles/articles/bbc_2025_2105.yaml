  • None Three years on, Ukraine's extinction nightmare has returned Macron held out the prospect of European countries such as France and the UK being willing to play a leading role in ensuring the security of a post-truce Ukraine, possibly in the form of air power and troops stationed away from the frontline. But at the same time, he stressed the importance of having an American backstop. Macron, however, did not get a commitment of US back-up from his meeting in the Oval Office. And if he was looking for a scintilla of criticism of the Russian president from Trump, then he did not get that either. What he did get was, at least to some extent, Europe's voice back at the table and he, along with other European leaders, will take some heart from that.

