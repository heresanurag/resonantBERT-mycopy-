content: |-
  Former Liverpool manager Jurgen Klopp appointed global head of soccer at Red Bull.

  Jurgen Klopp spent seven years in charge of Borussia Dortmund before he became Liverpool manager in 2015

  Former Liverpool manager Jurgen Klopp has been appointed global head of soccer at Red Bull. The 57-year-old German will begin the role on 1 January 2025. "A few months ago I said I don't see myself on the sidelines any more and that is still the case," Klopp said on Instagram. "But I still love football, I still love working and Red Bull gives me the perfect platform for that." Energy drinks brand Red Bull owns RB Leipzig in Germany's Bundesliga, Austrian side Red Bull Salzburg and Major League Soccer side New York Red Bulls, as well as Brazilian side Red Bull Bragantino. It also took a minority stake in Championship side Leeds and became the club's front-of-shirt sponsor earlier this year. Red Bull says Klopp will not be involved in day-to-day operations but will advise teams on playing philosophy, transfer strategy and coaching development. "I want to share the experiences I have collected over the years," said Klopp. "We all know there are more successful managers out there but in my career I have fought for promotion, fought for titles and I have fought for trophies. "Sometimes we failed, sometimes we succeeded and dealing with that is not easy, but it is possible. "Then I want to learn again. Because when you are in the job and you have to play every three days you barely have the time. "I want to see, feel and figure out what is useful for football, developing football a little bit as well." Oliver Mintzlaff, the company's CEO of corporate projects and investments, said: "Jurgen Klopp is one of the greatest and most influential figures in world soccer, with extraordinary skills and charisma. "In his role as head of soccer, he will be a game-changer for our involvement in international soccer and its continued development."

  Klopp won eight trophies in nine years at Liverpool, including the Premier League and Champions League, before stepping down at the end of last season. He began his managerial career at Mainz in 2001 before joining Borussia Dortmund in 2008, where he won two Bundesliga titles and reached the 2013 Champions League final. He resigned in May 2015 to take a sabbatical but cut it short to succeed Brendan Rodgers at Anfield in October that year. Red Bull has invested in ice hockey, extreme sports, motorsports and two teams in Formula 1, with Red Bull Racing currently holding both the drivers' and constructors' titles in the sport. A news conference formally announcing Klopp's appointment will take place in mid-January.
