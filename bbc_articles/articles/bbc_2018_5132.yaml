id: bbc_2018_5132
title: Two dead and one arrested after 'wrong-way' M62 crash - BBC News
date: '2018-04-02'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-43617013
content: |-
  One driver is arrested on suspicion of causing death by dangerous driving and failing a breath test.

  A Vauxhall was travelling in the wrong direction on the westbound carriageway of the M62, police said

  Two men have been killed and a motorist arrested after a crash involving a car driving the wrong way on the M62 near Bradford.

  Police received reports of a black Vauxhall Insignia travelling east on the westbound carriageway near junction 26 at 02:35 BST.

  Minutes later, the ambulance service was called to an accident involving the same vehicle and a white Skoda Octavia.

  The men, aged 34 and 37, in the Skoda died at the scene.

  The driver of the Vauxhall - a 22-year-old man - was arrested on suspicion of causing death by dangerous driving and failing a roadside breath test.

  The M62 was closed westbound between junction 27 (Gildersome) and junction 26 (Chain Bar) for recovery and police investigation work.

  It reopened at about 09:50.
