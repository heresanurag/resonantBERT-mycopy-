title: Lady Leshurr charged with assault over Leyton fight - BBC News
date: '2022-10-24'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-63367235
content: |-
  Two women were taken to hospital after reports of a fight in east London, the Met says.

  The Birmingham-born artist took part in ITV's Dancing on Ice and Channel 4's The Celebrity Circle last year

  Rapper Lady Leshurr has been charged with two counts of assault occasioning actual bodily harm.

  The Metropolitan Police said officers were called to reports of a fight on Knotts Green Road in Leyton, east London, at about 05:10 BST on Saturday.

  Two women, both aged 27, were taken to hospital and have since been discharged, the force said.

  The Birmingham-born artist, real name Melesha O'Garro, aged 34, is due at Thames Magistrates' Court on Monday.

  Another woman was also charged with one count of assault occasioning actual bodily harm and was due at the same court on Monday.

  Lady Leshurr has hosted a weekly show on Saturdays on BBC Radio 1Xtra since December 2020.

  She has also has performed at Glastonbury and the Proms and has branched out into other areas including reaching the semi-finals of Dancing On Ice and winning Channel 4's The Celebrity Circle last year.

