title: 'Norway landslide: Buildings swept away in Alta disaster - BBC News'
date: '2020-06-05'
section: General
url: http://www.bbc.co.uk/news/world-europe-52920766
content: |-
  Watch as land continues to collapse during the rescue effort.

  Eight homes were swept into the sea following a powerful landslide in June in the Norwegian town of Alta.

  As drones flew overhead to capture the damage - land continued to collapse.
