  Rawal Rehman is charged with causing death by dangerous driving after Louisa Palmisano was killed.

  Charge after girl, 3, killed in van and tram crash

  Louisa "Lulu" Palmisano, three, died when a van struck a tram, causing it to mount the pavement

  A man has been charged after a three-year-old girl was hit and killed by a van which struck a tram and then mounted a pavement in Manchester city centre. Louisa Palmisano, known as Lulu, from Burnley, died after she was hit by the vehicle after it was forced off the road at about 10:00 GMT on Saturday. Rawal Rehman, 35, of Manchester, has been charged with causing death by dangerous driving, Greater Manchester Police said. He is set to appear before Manchester Magistrates' Court later.

  Lulu's parents said they had been "simply enjoying a happy family day out when this unimaginable tragedy struck".

  The crash happened on Mosley Street in the city centre on Saturday morning

  "Her absence has left a devastating void in our family," they said. "She was our only child, our whole world." First responders including an air ambulance crew tried to save Lulu at the scene outside Manchester Art Gallery but she died later in hospital. Her parents added: "In an instant, our lives were shattered beyond repair. "The pain of losing her is unbearable, and we miss her more than words can ever express."

