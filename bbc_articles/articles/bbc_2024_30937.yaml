title: 'Georgia: Twelve die from carbon monoxide poisoning at Gudauri ski resort -
  BBC News'
date: '2024-12-16'
section: Europe
url: http://www.bbc.co.uk/news/articles/cg7r5eky7d1o
content: |-
  The bodies of 11 foreigners and one Georgian were found in a sleeping area above a restaurant in Gudauri.

  Gudauri is the largest ski resort in Georgia

  Twelve people have died from carbon monoxide poisoning at a ski resort in Georgia, police have said. The bodies of 11 foreigners and one Georgian national were found in a sleeping area above a restaurant in Gudauri, the largest and highest ski resort in the former Soviet state, according to officials. Police said "preliminary tests do not indicate any trace of violence on the bodies" and it appeared to be an accident, the AFP news agency reported. An oil-powered generator had been turned on after the building lost electricity on Friday, officers added.

  The bodies were discovered on Saturday on the second floor of a building housing an Indian restaurant. Authorities have opened an investigation into the incident and the identities of the victims have not yet been released. Gudauri is a popular tourist destination for skiing and snowboarding enthusiasts, with a range of winter sports activities for visitors of all levels. Its history dates back to the 19th Century when it was known as a trading post on the ancient Georgian Military Road connecting Russia with Georgia. Gudauri is located in the Caucasus mountains in the Mtskheta-Mtianeti region at around 2,200m (7,200ft) above sea level and is about 120km (75 miles) north of Georgia's capital Tbilisi.
