  Who are the Premier League youngsters to watch this season? BBC Sport's football writers make their pick.

  Academy stars & signings - who are the youngsters to watch?

  Which youngsters could be set for a big Premier League season?

  The Premier League season is almost upon us. We all know the established stars who will be making plenty of headlines in the new campaign - but who are the young players we should be keeping an eye on? BBC Sport's football writers pick out some of the youngsters they expect to make a name for themselves.

  BBC Sport's Nizaar Kinsella: The 17-year-old midfielder has caught the eye of new manager Arne Slot during pre-season. He excelled in a friendly against Real Betis, which saw him singled out for praise by a manager who is usually reluctant to do so. He also scored in the Reds’ friendly win against Sevilla on Saturday. Nyoni joined Liverpool from Leicester last summer.

  BBC Sport's Nizaar Kinsella: The 18-year-old defender made his Chelsea debut last season against Tottenham and was one of just two youngsters on tour in the United States from the academy. He is an outstanding athlete who can play centre-back or right-back.

  BBC Sport's Nizaar Kinsella: The 17-year-old forward has been scoring goals under Ange Postecoglou in pre-season. The immensely gifted youngster excelled in the under-21s team that won PL2 last season. He is too young to go out on loan so will probably stay and get a mixed first team and youth role.

  BBC Sport's Alex Howell: There's been a lot of expectation around the development of Nwaneri since he became the youngest player in Premier League history when he made his debut for Arsenal at just 15 years and 181 days old in the 2022-23 season. The 17-year-old made just one appearance last season in the Premier League against West Ham but hopes remain high for the midfielder. Nwaneri started the Gunners' pre-season friendly against Manchester United in the USA and provided an assist for Gabriel Jesus as Arsenal went on to win the match. Manager Mikel Arteta has said that Nwaneri and the rest of the young players' futures are in their own hands and they should "show what you can do" in pre-season. If Nwaneri carries on how he has done so far, there's a chance he will be getting more minutes this season.

