content: |-
  Sarah Pochin overturns a huge 14,696 majority to win Reform UK’s first by-election.

  Reform takes Runcorn from Labour by just six votes

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Reform UK has won the Runcorn and Helsby by-election by just six votes, beating Labour after a dramatic recount. In Sir Keir Starmer's first major electoral test as prime minister, former Conservative councillor Sarah Pochin overturned a 14,696 majority to take the Cheshire seat for Reform. As well as winning its first ever parliamentary by-election, Reform also took its first mayoralty in Greater Lincolnshire, and control of its first councils in Staffordshire, Lincolnshire and Durham. Labour held on in three other mayoral races and the prime minister responded to the losses by saying "I get it" and pledging to go "further and faster" on making changes.

  Sarah Pochin has been elected as Reform's fifth MP on a massive 17.4% swing from Labour in what was one of the party's safest seats. Campaigners claiming the result was "on a knife-edge" were proven correct when the first count put Nigel Farage's party ahead by just four votes and Labour requested a recount just before 0400 BST. The final result, from a46.2% turnout, beats the previous post-war record for the closest by-election, which the Liberals won by 57 votes in Berwick-upon-Tweed in 1973. Farage, who appeared at the count shortly before the result was declared, said his party takes on the responsibility that comes with winning elections "with glee". "We can see that support for the Labour Party has collapsed within 10 months of them winning the general election," the Reform leader said. "I think we've supplanted the Conservative Party now as the main opposition party in government." He added: "The message that we're getting in places where we didn't win, was that if you vote Conservative you actually get Labour." In her victory speech, Pochin - Reform's first female MP - said: "The people of Runcorn and Helsby have spoken - enough is enough.

