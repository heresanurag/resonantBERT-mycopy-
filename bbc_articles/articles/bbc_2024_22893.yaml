title: Protester dragged out after interrupting Reeves speech - BBC News
date: '2024-09-23'
section: General
url: http://www.bbc.co.uk/news/videos/c99vnllgy3lo
content: |-
  The protester accused the government of continuing to sell arms to Israel, briefly halting the chancellor's speech.

  As Chancellor Rachel Reeves was giving her speech to Labour conference she was interrupted by a protestor in the crowd.

  He said the government was continuing to sell arms to Israel, while the war with Hamas in Gaza continues.

  He was swiftly dragged out of the hall and Reeves said Labour was a changed party - not one of protest.
