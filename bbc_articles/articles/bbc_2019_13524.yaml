title: Chris Brown's clothes sale leaves fans angry - BBC News
date: '2019-11-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50324899
content: |-
  Hundreds were left waiting for designer discounts at the singer's LA house.

  Hundreds queued for designer discounts at Chris Brown's house. The US singer announced that he would be selling clothes and accessories at a fraction of the normal price via social media.

  Brown previously received five years probation and a community service order for the assault of Rihanna, his girlfriend at the time.
