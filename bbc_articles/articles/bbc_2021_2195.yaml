title: 'Covid: Welsh Government briefing Monday 15 February - BBC News'
date: '2021-02-15'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-56070245
content: |-
  A round-up and reaction from Monday's Welsh Government coronavirus press conference.

  This week should see the start of a more even split between first and second doses of the vaccine.

  The total of second doses now stands at 5,402 - with Sunday seeing the most given out in a single day so far.

  We can already see more second doses being given out in Wales since the start of the month - just under 2,000 in the previous week but 1,178 on Sunday alone.

  That is set to rise as the Welsh vaccination programme aims to make more in-roads into priority groups given a first dose two months ago.

  Using Saturday's figures for the whole of the UK we can already see Wales is now on a similar daily rate to Scotland and above England in terms of second doses.

  This week will see a stock of 46,000 Pfizer doses being used.

  Another 56,000 Oxford-AstraZeneca will also be available, as the programme of first doses also continues.

  But the next two weeks will see a planned reduction in supply, as manufacturers prepare their processes for a significant ramp up of production from March onwards.

  That is likely to be noticeable with some of the figures we are likely to see in a few days time.
