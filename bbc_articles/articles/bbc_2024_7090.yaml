title: Baby gorilla 'Jameela' on a journey to find a surrogate mum - BBC News
date: '2024-04-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68680047
content: |-
  'Jameela' travelled from a zoo in Texas to one in Ohio after her birth mum rejected her.

  Baby gorilla 'Jameela' was born prematurely via C-section at the Fort Worth Zoo. Despite efforts to reunite the newborn primate with her birth mother, Jameela faced multiple rejections.

  She has now embarked on a hopeful journey to the Cleveland Zoo, where new opportunities for maternal care await among gorillas who, in the past, have shown interest in infants not their own.
