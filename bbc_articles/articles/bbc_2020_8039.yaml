title: 'Liverpool: Nine arrests as fans gather at Anfield - BBC News'
date: '2020-07-23'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-53511046
content: |-
  Thousands of fans gathered as Sir Kenny Dalglish presented the Premier League trophy.

  This video can not be played To play this video you need to enable JavaScript in your browser. Thousands of supporters descended on the ground outside the stadium

  Nine people were arrested as Liverpool fans ignored police advice and crowded the streets following the club's trophy-lifting final home game.

  Thousands of supporters gathered on Wednesday night as Sir Kenny Dalglish presented the trophy in an empty stadium after the team beat Chelsea.

  Police had issued a dispersal order to clear about 3,000 fans from Anfield.

  Nine arrests were made on suspicion of being drunk and disorderly, drink and drug driving, affray and assault.

  The club said in a statement it was "disappointed" with the scenes outside Anfield overnight and with supporters who "did not heed the celebrate at home advice".

  It thanked supporters who stayed at home "protecting their loved ones and our city" from the "threat of this pandemic" as well as those who helped clean up Anfield after large crowds gathered around the stadium.

  The Mayor of Liverpool Joe Anderson has also tweeted his thanks to those involved in the clean-up operation.

