content: |-
  Rangers deliver an intense performance in the Scottish League Cup final, but ultimately fall short against Celtic again. Is this time different though?

  'Switch flicked' but Rangers still left with regrets

  Philippe Clement is yet to beat Celtic as Rangers manager

  When the Rangers players emerged from the tunnel at Hampden Park, they were greeted by a banner among their support that read 'Eyes on the prize'. For 120 minutes - plus penalties - against Celtic, their focus on winning the League Cup trophy was certainly intense. Only a matter of weeks ago, finding a sizable section of fans with confidence that Phillipe Clement's side would retain their silverware would have been a struggle. But, as former Ibrox striker Billy Dodds said on BBC Sportsound "a switch has been flicked" in recent times. "Three weeks ago, something changed. Rangers were ready for this," he added. "Now they have to prove that the bar has been set and it's the long-term vision."

  A myriad reasons contributed to the lack of belief among Rangers' most ardent admirers as autumn turned to winter. The lead, which now stands at 11 points, Celtic hold in the league was one. The inconsistency of Rangers was another. And the routine manner in which Brendan Rodgers' side brushed aside their rivals in September strengthened the sentiment. This was nothing like that 3-0 defeat, though. Even when Rangers went 2-1 down having taken the lead at the national stadium, they didn't look out. Their heads didn't drop and they didn't retreat into their familiar cocoon to allow Celtic to dominate. Even Celtic defender Liam Scales credited Rangers for "the battle" they brought and the "carnage" that ensued. According to Dodds, they showed "the right mental strength" to take into a game against the league champions, while another former Ibrox player, Neil McCann, said they "were miles ahead of where they were" in September. Seldom do the losing team in a cup final come out with so much praise, but Rangers' impressive, passionate and energetic performance led former Scotland defender Willie Miller to describe it as "a good cup final" for them. "If being defeated in a cup final can be a good thing, that is," Miller added. "I think Phillipe Clement can rightly say that they played well and he can put forward a case to the fans that his players are beginning to respond to what he wants them to do."

