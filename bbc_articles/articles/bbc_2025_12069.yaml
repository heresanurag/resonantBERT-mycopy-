title: Harry Dunn police 'could and should have arrested' diplomat - BBC News
date: '2025-06-18'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cj0m8erl3rdo
content: |-
  An independent report criticises police handling of the investigation into the death of Harry Dunn.

  Northamptonshire Police said it had failed Harry Dunn's family "on a number of fronts"

  An American diplomat who was driving on the wrong side of the road when she caused a fatal car crash "could and should have been arrested", a review has concluded. Motorcyclist Harry Dunn, 19, died in 2019 after being hit by a car driven by Anne Sacoolas, who, 19 days later, left the UK under diplomatic immunity laws. An independent report has criticised Northamptonshire Police's handling of the investigation, with Mr Dunn's family saying they had been "failed by the very people we should have been able to trust". Northamptonshire Police has apologised, saying it failed "to do the very best for the victim".

  Responding to the report, Harry's mother Charlotte Charles said: "Having had 48 hours now to reflect, my anger is as high as it probably was in the beginning. "To learn that they [police] prioritised Anne Sacoolas's welfare over my boy, that was dying in that ditch, I'm just bewildered. "I'm absolutely bewildered that the most fundamental of policing was not carried out. I'm struggling to get my head around that."

  Harry Dunn's mother Charlotte Charles said Northamptonshire Police "mishandled vital evidence, including Harry's clothing, which we now know was left in storage for years with his remains still on it"

  Mr Dunn died as a result of injuries suffered when his Kawasaki motorcycle was hit by Sacoolas's car outside RAF Croughton in Northamptonshire on 27 August 2019. The 118-page report, commissioned by Chief Constable Ivan Balhatchet and written by Karl Whiffen, a former senior officer from the East Midlands Special Operations Unit, examined the force's handling of the case and made 38 separate recommendations. The review found that Sacoolas was not arrested at the scene because she was deemed to be in a state of shock and that it was not deemed necessary at the time. "A prompt and effective investigation was not considered or articulated," the report said. "The view is that in these circumstances the suspect could and should have been arrested to assist the evidence gathering process." After leaving the country she pleaded guilty to causing death by careless driving via video link at the Old Bailey in December 2022, and was handed an eight-month prison sentence, suspended for 12 months. Mr Dunn was not under the influence of any substance at the time of the collision, but the report found that he was subjected to drug testing, while Sacoolas was not.

  A witness overheard Sacoolas say "it's all my fault, I was on the wrong side of the road", according to the report. None of the officers at the scene managed to gather footage from their body worn video - one tried but failed after their camera indicated either low battery or no memory available. The report is also heavily critical of Northamptonshire Police's former chief constable, Nick Adderley. He made "erroneous statements" about Sacoolas's immunity status in media interviews and his criticism of the Dunn family spokesman, Radd Seiger, during a news conference was also singled out for criticism. Mr Adderley was subsequently sacked for gross misconduct in 2024 for lying about his career in the Royal Navy. The BBC has attempted to contact him but has so far not received a response.

  Disgraced former Northamptonshire Chief Constable Nick Adderley was singled out for criticism in the report

  There was also a delay in telling the family the US State Department employee had fled the country under diplomatic cover. This was at the request of the Foreign, Commonwealth & Development Office (FCDO), the report said. The FCDO, which the report author said did not co-operate with the inquiry, subsequently appeared to seek to distance itself from the impact of that decision, it added. The FCDO said: "The Foreign Secretary has met with members of Harry Dunn's family. "He has the deepest respect for the resolve they have shown since Harry's tragic death and remains personally committed to ensuring lessons are learned from the handling of the case under the previous Government."

  The report added that Mr Dunn's clothing had been bundled together in a single bag along with other crash debris. "These are failures no family should ever have to endure," Ms Charles told the BBC. "I remain so angry at Adderley to this day. We knew from the outset that there was a problem with him and we will never forgive him for launching his personal attacks on our neighbour and spokesperson, Radd Seiger." But she singled out the officer in charge of the case, who has not been named, for showing "genuine care and commitment when others above her fell short". She added that she appreciated the "candid and transparent approach to this report" and said she would make sure the 38 recommendations were "absolutely carried out and seen through, so that nobody gets treated the way my boy and our family did".

