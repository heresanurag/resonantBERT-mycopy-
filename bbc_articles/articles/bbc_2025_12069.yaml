  Family spokesperson Mr Seiger said it was "astonishing" how police got a "relatively straightforward road traffic collision... wrong, right from the start". "We don't really blame the junior officers, but the report is very critical of the leadership," he said. "They should have arrested her; had they arrested her, the course of justice might have been different. We'll never know now. "The police are such a fundamental public body in our society, and we trust them. Six years ago, things could not have been handled any worse."

  Assistant Chief Constable Emma James said: "First and foremost, on behalf of Northamptonshire Police, I want to apologise to Harry's family for what is now clear was a failure on our part to do the very best for the victim in this case. "It was vitally important that Northamptonshire Police conducted this review into the most high profile case in the force's history, a case where clear and significant shortcomings have now been properly and independently unearthed. "The picture which emerges is one of a force which has failed the family on a number of fronts, and we hope the findings, which are troubling in several respects, will provide some answers to questions which the family will have wanted to know in the years that have passed." She said she had met with Mr Dunn's mother and his father, Tim Dunn, in private on Monday to present the report's findings. The BBC has tried to contact Sacoolas.

