title: 'Cheltenham Festival 2024: Cross Country Chase abandoned - BBC Sport'
date: '2024-03-13'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/68550049
content: |-
  Wednesday's Cross Country Chase at the Cheltenham Festival is called off and will not be rescheduled after parts of the track were waterlogged.

  The Cross Country Chase is run on a different track to other races at Cheltenham

  Wednesday's Cross Country Chase at the Cheltenham Festival has been called off and will not be rescheduled after parts of the track were waterlogged. Officials said 11mm of rain fell at the course on Tuesday. Six races will still take place on the Old Course with the start of racing put back by 15 minutes to 13:45 GMT. Willie Mullins runs favourite El Fabiolo in the Queen Mother Champion Chase (now 16:00 GMT) as he nears a historic 100 Cheltenham Festival wins. A Tuesday treble led by Champion Hurdle victor State Man put the Irishman on 97 victories. Last year's Arkle Chase winner El Fabiolo had been due to renew rivalry with runner-up Jonbon but trainer Nicky Henderson has withdrawn his contender. Henderson, whose stable star Constitution Hill was ruled out of the Champion Hurdle after a poor workout, has also pulled First Street and Kingston Pride from other races on Wednesday. He has also taken Shishkin out of Friday's Gold Cup and Champ from the Stayers' Hurdle on Thursday. "I'm afraid we have had to make some very tough decisions following the very disappointing performances of all bar one of our horses yesterday," he said.

  The Cross Country Chase is run on a different track to other races at Cheltenham and does not drain as well. Going conditions on the Old Course were officially described as soft, heavy in places. A Cheltenham spokesperson said: "Following 11mm of rainfall throughout yesterday, there has been no improvement in the conditions on the Cross Country Course and with areas of the track unraceable, the Cross Country Chase has sadly been abandoned. "The forecast for the remainder of the week continues to look unsettled, with further showers likely on both Thursday and Friday. "There will therefore be insufficient improvement to the Cross Country Course by Friday, and the decision has been taken not to reschedule the race."

  Willie Mullins (right) is three away from 100 winners at Cheltenham

  Mullins has a host of chances on Wednesday including odds-on favourites Ballyburn in the Gallagher Novices' Hurdle and Fact To File in the Brown Advisory Novices' Chase. The day, once marketed as Ladies' Day, is now branded 'Style Wednesday'. A crowd of of 60,181 attended the first of Cheltenham's four days, although two horses died on Tuesday - Highland Hunter, trained by Fergal O'Brien, and Ose Partir of Martin Brassil's yard. A Cheltenham spokesperson said: "Highland Hunter was immediately attended by expert veterinary professionals in the concluding stages of our third race but sadly passed away. "In the sixth race, Ose Partir sustained an injury and was humanely put to sleep. Our heartfelt condolences are with the connections of both horses."

