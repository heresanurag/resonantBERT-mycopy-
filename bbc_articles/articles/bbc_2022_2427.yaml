title: 'Cancer: Fundraising Ebbw Vale teen Rhys Langford dies - BBC News'
date: '2022-02-09'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-60317164
content: |-
  Rhys Langford started raising money for Jacob, six, after learning his own cancer was terminal.

  Rhys Langford's mother, Catherine Langford, described her son as a warrior and a hero

  A teenager who helped raise more than £60,000 for a six-year-old boy with cancer after discovering his own condition was terminal has died.

  Rhys Langford, 19, from Ebbw Vale, was diagnosed with osteosarcoma in October 2020.

  In a Facebook post, his mother said he died peacefully at home with his family around him on Tuesday evening.

  He donated £1,000 and raised more than £60,000 for Jacob, who also lives in the Blaenau Gwent town.

  His mother, Catherine Langford, wrote: "My warrior, my hero, my son, my baby, has given up his fight.

  "He lay down his sword and died peacefully at home with all his family around him.

  "We are heartbroken. My life will never be the same again."

  When Rhys read about Jacob, he told his parents: "If there's nothing that can be done for me, I want to try and help save this little boy."

  Rhys's family were with him at the end, his mother said in a Facebook message

  Jacob was diagnosed with neuroblastoma in 2017 and, after treatment, was found to be cancer free in 2019.

  But his parents were told in December it was "highly likely" a new tumour on his liver was cancer.

  The money raised by Rhys will go towards future treatment for Jacob, who may have to travel to America for experimental treatment not available on the NHS.

  Jacob's Fight Facebook page posted a message saying thoughts were with Rhys' family "at this sad time".

  "Fly high Rhys and we are all so proud and thankful for what you did for our Jacob," it said.

  Money raised by Rhys will be used to help pay for future treatment for Jacob
