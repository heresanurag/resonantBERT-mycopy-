  Electronic devices used for car thefts set to be banned

  Sophisticated electronic devices used by criminals to steal cars are set to be banned under new laws in England and Wales. More than 700,000 vehicles were broken into last year - often with the help of high-tech electronic devices, including so-called signal jammers, which are thought to play a part in four out of 10 vehicle thefts nationwide. Until now, police could only bring a prosecution if they could prove a device had been used to commit a specific offence, but under new laws in the Crime and Policing Bill the onus will be on someone in possession of a device to show they had it for a legitimate purpose. Making or selling a signal jammer could lead to up to five years in prison or an unlimited fine.

  Keyless repeaters and signal amplifiers scramble the signal from remote key fobs inside people's homes, enabling criminals to unlock cars. They are the most common way theft from a vehicle – or the theft of the vehicle itself – occurs. Policing minister Dame Diana Johnson said: "These thefts have a devastating effect on victims, who need their vehicles to go about their everyday lives." According to the 2022-23 Crime Survey for England and Wales, an offender manipulated a signal from a remote locking device in 40% of thefts of vehicles nationwide. In London, that figure rose to approximately 60%. A significant proportion of vehicle theft is also driven by organised crime groups, which are constantly trying find ways to overcome security measures on vehicles by exploiting vulnerabilities in vehicles and new technologies. Motoring groups say car manufacturers must also step up efforts to make vehicles more secure. AA president, Edmund King, said: "This is a positive step, and these tougher sentences should make would-be thieves think again before stealing cars. Relay theft and signal jamming is all too frequent and these measures will give police forces more opportunities to tackle car crime." Lead for vehicle crime, Assistant Chief Constable Jenny Simms said the possession, manufacture, sale and supply of signal jammers had provided an "easily accessible tool for criminals... for far too long". "These devices have no legitimate purpose, apart from assisting in criminal activity, and reducing their availability will support policing and industry in preventing vehicle theft which is damaging to both individuals and businesses." She added. The government's flagship Crime and Policing Bill will be introduced to Parliament on Tuesday.

  Have you had your car stolen because of the use of a signal jammer device? Tell us your story.
