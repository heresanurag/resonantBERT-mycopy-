  Three months after Mr Nijjar was killed, Mr Trudeau, standing in the House of Commons, said Canada was looking at "credible allegations potentially linking" the Indian state to the killing. The allegation had been strongly denied by Indian officials, who accused Canada of providing shelter to "Khalistani terrorists and extremists". The row between the two countries led Delhi to ask Ottawa to reduce the number of envoys it had in India. Mr Trudeau has also faced pressure to provide evidence for his allegation of Delhi's involvement.
