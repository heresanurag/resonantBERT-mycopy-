  Jude Bellingham praises Gareth Southgate as "easily one of the best coaches in the history of the national team" as tributes to the outgoing England manager pour in.

  'Easily one of the best' - Bellingham leads Southgate tributes

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jude Bellingham praised Gareth Southgate as "easily one of the best coaches in the history of the national team" in a heartfelt tribute to the outgoing England manager. Southgate resigned on Tuesday after nearly eight years in the role, with England's 2-1 loss to Spain in Sunday's Euro 2024 final his last match in charge. In a post on Instagram, Real Madrid midfielder Bellingham described Southgate as "an unbelievable human being". "I'd like to thank Gareth and his staff for the great memories during his tenure," Bellingham wrote. "From the point of view of a fan who has become a member of the squad, it's been a rollercoaster of amazing emotions that has instilled hope and joy back into our country. "It was a privilege being lead by someone who is so dedicated and passionate, not only is Gareth easily one of the best coaches in the history of the national team but also an unbelievable human being. "Thank you for everything and all the best in the next chapter, Gaffer." BBC Sport pundit and former England striker Alan Shearer was also among those to pay tribute to Southgate, who took charge of 102 games and led his country to back-to-back Euros finals. "It was a huge job for him [Southgate] to take on," Shearer told the BBC. "He did that and turned everything around, we went from rock bottom to playing in semi-finals and finals. That is now the expectation with England and he played a huge part in that." He added that the 53-year-old will be remembered for "creating this incredible spirit and for players again wanting to represent their country".

  Gary Lineker expressed his thanks to Southgate on X. The BBC presenter and ex-England striker wrote: "Wishing Gareth Southgate all the very best in the future. He brought pride, respect and a togetherness to England that we hadn't seen for a long time. "He was close, very close to footballing immortality and he always did the job with humility, decency and dignity. Thank you, Gareth." A number of current England stars also paid tribute to Southgate on social media. Among them was captain Harry Kane, who was appointed as skipper by Southgate ahead of the 2018 World Cup. "Boss. Thank you for everything you have done for me and our country!" the Bayern Munich striker wrote on X. "You have been one of England's greatest ever managers and it has been a pleasure to have served as your captain throughout. "You helped our nation connect and believe in our team again. There have been so many highlights and we've made memories together that will last forever!" Arsenal midfielder Declan Rice wrote on Instagram: "Thank you gaffer. It's been a privilege to play for England under your guidance. "Memories that will stay with me forever. All the best in your next adventure." Everton goalkeeper Jordan Pickford, also on Instagram, added: "I also want to say a special thank you to the boss for always believing in me during his time with us and I would like to wish him all the best in his next steps. Thank you Gareth." Harry Maguire missed out on selection for Euro 2024 because of a calf injury, but the centre-back played a key role in previous tournaments under Southgate. "You made us all believe again - memories that will last forever. Thank you boss," the Manchester United defender wrote on Instagram.

  Sarina Wiegman, who has been Southgate's counterpart with the England women's team for the past three years, said she was sad to see him go. "He is such a nice person and a great coach," she told ITV. "We wouldn't see each other all the time but when we would see each other it was very nice. "What he has done for England football is really incredible. He can be very proud of himself. England is very proud of him and I'm Dutch, I am very proud of him too." Former England international Ashley Young won 39 caps for his country and was the first choice left-back for the Three Lions during their run to the semi-final of the 2018 World Cup. Young told BBC Sport: "If you talk to many players who played in previous eras, what Gareth did and the way he brought the players and staff together, the players started to enjoy going away on national team duty. "You only need to look at what he has done for the country. For me, he has done a great job for English football and disappointing to see he has resigned. "Of course, he would have wanted to achieve and win something and the teams definitely deserved to do that. He can walk away with his held high, he brought the nation back together. Players and staff, the way he gelled everyone together was incredible." Speaking on BBC Radio 5 Live, former Club England managing director Adrian Bevington said: "This is a man who is a great leader of people, he's an inspirational person. "He's is a very hard act to follow. It's a very tough task for the Football Association. Finding the right replacement is the very hard part here, they've got to decide first of all on the profile of the individual coach they want. "It's really important this person can also handle off-field responsibilities, too. "You are in effect adopting a stance of being like a prime ministerial type figure because of all the issues you have to contend with. The likes of which Gareth has done better than any other England manager who has gone before him."
