id: bbc_2019_10425
title: 'Brexit: Prime Minister Boris Johnson reacts to losing the key Brexit vote
  - BBC News'
date: '2019-09-03'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49574290
content: |-
  Boris Johnson announces that he will table a motion for an early election after losing a key vote.

  The prime minister said the result of the vote means parliament is on the brink of "wrecking any deal" with Brussels.

  The Commons voted 328 to 301 to take control of the agenda, meaning they can bring forward a bill seeking to delay the UK's exit date beyond 31 October.
