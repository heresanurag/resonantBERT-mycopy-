title: 'Newspaper headlines: ''Death of Hamas mastermind'' and One Direction tribute
  to ''brother'' Liam - BBC News'
date: '2024-10-18'
section: The Papers
url: http://www.bbc.co.uk/news/articles/ckgnvmdd1dxo
content: |-
  Dominating the headlines today is the death of Yahya Sinwar and One Direction singer Liam Payne

  'Death of Hamas mastermind' and One Direction tribute to 'brother' Liam

  Images of Yahya Sinwar appear on many of the front pages. The Guardian calls him the "mastermind" of last year's October attacks, and says his death is a major boost to Benjamin Netanyahu's military campaign. "Hamas leader is killed by a chance shelling" is the headline of The Times which features a photo of Sinwar with a child who is holding an automatic rifle. The paper describes him as having been killed by "trainee troops", unaware they'd found Israel's most wanted man. An Israeli official has told The Telegraph that the ceasefire negotiation team have held "emergency discussions" in the wake of Sinwar's death. The Financial Times calls his killing "pivotal", and carries a quote from a 28-year-old Gaza resident. "I thought I would feel happy if Sinwar was killed," he says, adding: "If his death is not leading to the end of the war then there's nothing to be happy for."

  The I reports deep disquiet from within the cabinet at the scake of cuts to public services being mooted by the government ahead of the budget. A Whitehall insider has told the paper that it's not a case of what will be cut, but which services will be terminated entirely - saying the prime minister has failed to "consider the politics" of the situation. An unnamed minister said: "It's really bad. There's going to have to be significant consideration of what we're going to have to cut as a department. It's pretty bleak." The Guardian reports a row between the Chancellor, Rachel Reeves, and the Deputy Prime Minister, Angela Rayner, over social housing. It says Reeves has refused a request for billions of pounds to begin construction of the homes which Rayner believes are essential for Labour to meet its target of constructing one and a half million homes in this parliament. A Treasury spokesperson says no final decisions have been made. The Daily Express claims there's been a rise in tax-free withdrawals from pension pots in the run-up to the budget. The paper blames what it has called "panic", and says the chancellor has "undermined the economy" by creating "uncertainty", in the run-up to her Budget speech.

  The Telegraph reports tensions between Labour and the Republican Party in the US, because almost a hundred current and former Labour staffers have been sent to campaign in swing states in the Presidential election. Some Republicans are said to regard it as an "outrage", claiming that this represents interference in American politics. Liam Payne features on the front page of the Sun. The paper says Argentinian police have spoken to five witnesses about the fall from the third floor of a Buenos Aires hotel which killed the One Direction singer. The Daily Mail claims he had been told he was being dropped by his record label, and is one of a number of tabloids to run a photo - which it claims was taken inside his hotel room - showing burnt aluminium and a white powder . "Record label dumped Liam before fatal drugs binge" is the headline. There's alarming news for the growing number of office workers who choose to stand at their desks, rather than sit, in the Times. An eight year study of more than eighty thousand people has found the practice does not improve cardiovascular health over the long term, and increases the risk of circulatory issues.

