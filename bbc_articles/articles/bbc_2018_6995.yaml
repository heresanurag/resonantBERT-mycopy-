  Harley-Davidson's move is one of the most visible consequences of the trade disputes triggered by President Trump's decision to levy tariffs on steel and aluminium imports.

  Mr Trump says the duties are necessary to protect the US steel and aluminium industries, which he says are vital to national security.

  They have drawn retaliation from the EU, Canada, Mexico, India and others while driving up the cost of metals for US manufacturers.

  US companies ranging from boat-builders to nail manufacturers have warned about the consequences of escalating trade tensions.

  In Wisconsin people are caught in the middle of a battle between two of the biggest American brands - Harley Davidson and Trump.

  Not that everyone wants to choose.

  Leaving work at the state's best-known business one woman said very simply: "I love my company and I love my President."

  Wisconsin turned Republican red in the last presidential election having been wooed by Donald Trump and his message of putting America First.

  If jobs end up being a casualty in a trade war their loyalty will be tested. But for the moment most of those who voted for Trump seem to be keeping their faith in him.

  Many believe the furious words that led to these tit-for-tat tariffs are just part of negotiation tactics.

  The problem for Harley Davidson is that at the moment nobody is backing down and to export to the European Union they are already having to pay the price of this trade skirmish.

  At Harley Davidson's sprawling Menomonee Falls factory there were employees prepared to admit that inside people were talking about tariffs and the danger of job losses.

  But for the moment they have no greater insight into the company's plans than that raw statement which said it would have to move some more of its production overseas

