title: Fraudster jailed for selling fake 'Scottish-grown tea' - BBC News
date: '2025-06-25'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c1dngyk69d0o
content: |-
  Thomas Robinson tricked luxury stores into buying "Scottish-grown tea" that was actually grown abroad.

  Thomas Robinson supplied high-end establishments such as Edinburgh's Balmoral Hotel and the Dorchester in London

  A fraudster who tricked luxury hotels and stores into buying "Scottish-grown tea" that was actually from abroad has been jailed for three and a half years. Thomas Robinson also conned aspiring tea growers by selling them plants he claimed had been "specially engineered" to grow in Scotland's climate - but in reality they had simply been bought in from Italy. The 55-year-old, who was known to his many customers as Tam O'Braan, spun an elaborate backstory claiming among other things that he was a former bomb disposal expert, had lived in the Amazon and had invented the "bag for life". Last month he was found guilty of the £550,000 scam that spanned five years from 2014.

  He had supplied high-end customers such as Edinburgh's Balmoral Hotel and the Dorchester in London with varieties of tea with names like Highland Green, Silver Needles and Scottish Antlers Tea. Sentencing was deferred from this morning after Robinson's solicitor withdrew. He represented himself in mitigation and apologised for his crimes saying "hubris and arrogance" led him to "believe he knew best". While sentencing Robinson at Stirling Sheriff Court, Sheriff Keith O'Mahony said his crimes were not victimless and involved "significant and persistent planning".

  Thomas Robinson raked in hundreds of thousands of pounds in his elaborate scam

  Trading as The Wee Tea Plantation, Robinson claimed his brews had been grown on farmland in Perthshire and Dumfries and Galloway, but really the tea had been bought from a wholesaler in Oxford and resold at hugely-inflated prices. Concerns were raised with the authorities when genuine tea growers caught wind that Robinson had populated the Balmoral Hotel's Palm Court luxury tea menu with Scottish brands. Richard Ross bought 500 plants from Robinson in 2015 but as the crop failed he followed stories of Robinson in the media.

