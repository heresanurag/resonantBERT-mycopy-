title: 'In pictures: Easter celebrated around the world - BBC News'
date: '2019-04-21'
section: World
url: http://www.bbc.co.uk/news/world-48001380
content: |-
  Christians gather to celebrate Easter when they believe Jesus Christ returned from the dead.

  Striking ceremonies have been taking place around the world as most Christian Churches mark Easter.

  Jesus was resurrected on Easter Sunday, the Bible says, after dying on the cross on Good Friday, and it is traditional for many to attend services on Saturday evening.

  Members of the Legio Maria held a vigil at their church in Nairobi, Kenya. Legio Maria is an African religious movement predominantly made up of Kenya's Luo people, who believe Jesus was reincarnated as a black man.

  Pope Francis led the Easter Vigil Mass at Saint Peter's Basilica in Vatican City

  People lit candles and kept vigil at the graves of loved ones during a service in Herasti, Romania.

  Palestinian Christians took part in a ceremony at Der Al-Latin Church in Gaza City.
