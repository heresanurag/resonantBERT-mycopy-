content: |-
  The Kansas City Chiefs star and Taylor Swift's boyfriend will front the show for Amazon Prime Video.

  The Kansas City Chiefs star hit the headlines in recent months for his relationship with singer Taylor Swift

  NFL player Travis Kelce is to host a new game show for Amazon Prime Video.

  Are You Smarter Than a Celebrity? will see contestants answer primary school-level trivia questions with the help of famous guests.

  It is a spin-off from the popular Fox series Are You Smarter Than a 5th Grader?, which launched in 2007.

  Kelce, 34, who's also known for being Taylor Swift's boyfriend, said he "grew up loving game shows" and the series "will definitely be entertaining".

  He won the Super Bowl in February with the Kansas City Chiefs - Kelce's third time winning the contest.

  "I grew up loving game shows, and I'm excited to be following in the footsteps of so many TV icons by hosting my very first one," Kelce said in a statement.

  "The original show is a great success, so to be bringing a new format with everyone's favourite celebrities to the screen, will definitely be entertaining."

  He added: "I'm just happy to be on the hosting side of the equation here and excited to see how these famous faces keep up."

  Amazon said the new series would see adult contestants rely on a "classroom" full of celebrities to help them answer 11 questions from an elementary school curriculum.

  The winner of the show can win a cash prize of $100,000 (£80,300). "They are not competing against the stars, they're enlisting their help and, in some cases, can even 'cheat' off of them," the streamer said.

  Twenty episodes of the series have been ordered by Amazon.

  Kelce also currently hosts a sports podcast called New Heights.
