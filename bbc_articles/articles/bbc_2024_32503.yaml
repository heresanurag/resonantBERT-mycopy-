title: Storm Darragh hammers Wales as extreme weather batters the nation - BBC News
date: '2024-12-07'
section: General
url: http://www.bbc.co.uk/news/videos/cqjzz22wl5yo
content: |-
  The extreme weather left damage and destruction in its path when it struck.

  Wales was battered as Storm Darragh brought extreme weather to the country once more.

  There was widespread damage and travel disruption, including the closure of the runway at Cardiff Airport all morning.

  Strong gusts hammered the coasts and hills while the Met Office recorded winds of 94mph (150 km/h) at Capel Curig, in Conwy county, at 08:00 BST.

  A major incident was declared by Dyfed-Powys Police across Carmarthenshire, Ceredigion, Pembrokeshire, and Powys.
