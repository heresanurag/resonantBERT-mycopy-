id: bbc_2019_5368
title: '''No Outsiders'' teacher leads Birmingham Pride parade - BBC News'
date: '2019-05-25'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-48407866
content: "Andrew Moffat started the \"No Outsiders\" lessons at Parkfield Community\
  \ School in Birmingham.\n\nAndrew Moffat led the parade with Saima Razzaq and Khakan\
  \ Qureshi\n\nA teacher whose lesson programme covering LGBT relationships has been\
  \ at the centre of protests is leading the Birmingham Pride parade.\n\nAndrew Moffat\
  \ started the \"No Outsiders\" lessons at Parkfield Community School in the city,\
  \ which has led to protests by some Muslim parents.\n\nPride organisers said there\
  \ was \"no-one better\" to lead the parade, which started at midday.\n\nThousands\
  \ have been expected to attend the annual event, now in its 22nd year.\n\nThis year's\
  \ theme is Love Out Loud which organisers said was a \"celebration of our right\
  \ to love, no matter our gender, sexuality, personal identity, colour, religion\
  \ or race\"\n\nSpeaking to BBC News about the invitation to join the Pride parade,\
  \ Mr Moffat said it was \"absolutely wonderful\".\n\nHe was joined at the front\
  \ of the procession by Khakan Qureshi, founder of Birmingham South Asians LGBT and\
  \ Saima Razzaq, from Supporting Education of Equality and Diversity in Schools (SEEDS).\n\
  \nFestivalgoers chose colourful costumes and attire for the parade\n\n\"It's so\
  \ important, isn't it, at this time that we are showing that's what Birmingham is\
  \ like,\" Mr Moffat said.\n\n\"It's not about protests outside schools, that's not\
  \ Birmingham. This is Birmingham.\n\n\"They're talking about 80,000 people turning\
  \ up to support Pride.\n\nBirmingham Pride is now in its 22nd year\n\nThousands\
  \ of people are expected to attend the annual event over the weekend\n\nIn 2015,\
  \ Birmingham Pride awarded a grant of £5,000 to the \"No Outsiders\" programme,\
  \ which organisers said was an \"incredible initiative\".\n\nThe \"No Outsiders\"\
  \ scheme had been running at Parkfield school since 2014.\n\nIt was formed to educate\
  \ children about the Equality Act, British values, and diversity, using storybooks\
  \ to teach children about LGBT relationships, race, religion, adoption and disability.\n\
  \nHowever, some parents with children at the school in Alum Rock raised a petition\
  \ in January, claiming some of the teaching contradicted Islam.\n\nThe protests\
  \ have since spread to Anderton Park Primary in Balsall Heath with a protest held\
  \ on Friday afternoon outside the school thought to be the biggest so far.\n\nA\
  \ protest outside the school on Friday is thought to have been the biggest so far\n\
  \nThose against the inclusion of LGBT issues in classes have said the content contradicts\
  \ their Islamic beliefs, and have accused the school of not listening to parents'\
  \ concerns.\n\nBut head teacher Sarah Hewitt-Clarkson said she would \"never stop\"\
  \ teaching pupils about equality.\n\nPeople gathered in Victoria Square ahead of\
  \ the parade beginning at midday\n\nThere are events are taking place in and around\
  \ the city's gay village on 25 and 26 May\n\nFestival director Lawrence Barton said\
  \ Mr Moffat had been asked to lead the parade in light of the \"division which the\
  \ controversy over 'No Outsiders' lessons has created\".\n\nEveryone seemed to be\
  \ in good spirits for the festival\n\nBirmingham Pride events are taking place in\
  \ and around the city's gay village on 25 and 26 May.\n\nThe best way to get news\
  \ on the go \n\nThe BBC is not responsible for the content of external sites."
