title: Bristol Parkway celebrates 50th anniversary - BBC News
date: '2022-05-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-wiltshire-61275648
content: |-
  When Bristol Parkway was built 50 years ago it was described as a car park with a railway station.

  Designed as a car park with a railway station, Bristol Parkway was built 50 years ago.

  To entice the public to use it customers were offered a lift to the station in a car at a standard charge of 40p if they lived in the catchment area.

  The out-of-town format was replicated elsewhere in the country and the name parkway was adopted by each subsequent model.

