title: Gender campaigners celebrate 'historic day for equality' - BBC News
date: '2022-12-22'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-64064250
content: |-
  Bill makes it easier for people to change their legally recognised gender but has been hugely divisive.

  The bill voted on by the Scottish Parliament will make it easier for people to change gender - but what happens now?

  Once the bill has passed at Holyrood, attention will turn to how the UK government reacts and the passage of the bill does not necessarily mean it has a straight route on to the statute book.

  Scottish Secretary Alister Jack can legally challenge the law if he believes it impacts on the UK, while private groups are also able to take legal action should they wish.

  UK equalities minister Kemi Badenoch has previously voiced her concerns about legal divergence between Scotland the rest of the UK.

  But her meeting with Scotland's social justice secretary Shona Robison on Monday was described as constructive, with both sides agreeing to continue to work together.

  However, any dispute between the two governments could end up in court.

  Opponents of the bill could also lodge a challenge under Article Eight of the European Convention on Human Rights (ECHR), which codifies a right to respect for privacy.

  Conversely, supporters of the bill could also mount a human rights challenge if there was a blanket refusal to recognise Scottish-issued gender recognition certificates elsewhere in the UK.

  In the absence of any challenge, the bill would receive royal assent, and become law.
