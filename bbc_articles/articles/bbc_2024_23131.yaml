title: Anthony Joshua blames training regime for Lewes speeding offence - BBC News
date: '2024-09-25'
section: England
url: http://www.bbc.co.uk/news/articles/cp39134lg6xo
content: |-
  The boxer was fined £769, plus costs, for breaking a 30mph limit in Lewes on 29 May.

  Boxer Anthony Joshua has offered his "sincerest apologies" after being fined for speeding. Mr Joshua was caught driving at 44mph in a 30mph zone on the A26 in Lewes, East Sussex, on 29 May. He was fined £769, ordered to pay £90 costs and a £308 victim surcharge, and given four points on his licence. In a letter to the court he said his training regime may have led to a lapse in concentration.

  The offence was dealt with by Hastings Magistrates' Court under the single justice procedure system, where cases are dealt with on paper rather than in person. In his letter to the court, Mr Joshua said: "I am a professional athlete, currently in the middle of a very intense training camp. "My schedule has been extremely demanding, and I was travelling to or from a training session at the time and date of the offence. "The physical and mental fatigue from my training may have clouded my judgement, leading to this lapse in concentration. "I recognise that such circumstances do not justify speeding, and I deeply regret allowing myself to make this error."

  Anthony Joshua lost to Daniel Dubois at Wembley on Saturday

  He asked the court to consider the impact any driving ban could have on his career, due to his need to travel to and from training sessions. He said: "I would like to respectfully ask the court to consider the potential impact of extra penalty points, which could lead to a driving ban, on my career. "As an athlete, I rely heavily on my ability to drive to and from training sessions, which are often at locations that are difficult to reach." He already had three points on his licence at the time of the offence, but was not given a ban. Mr Joshua, who is a two-time former heavyweight champion, lost to fellow Brit and International Boxing Federation champion Daniel Dubois at Wembley on Saturday, in a fifth round knockout.
