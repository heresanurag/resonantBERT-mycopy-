title: Woman's body found in Swansea garden rubbish pile - inquest - BBC News
date: '2024-09-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckgvlp980p9o
content: |-
  Kelly Randall's death was not suspicious, an inquest hears, but her body was dumped in a garden.

  Kelly Randall's body was found in the garden behind a property in the Waunarlwydd area of Swansea

  The body of a disabled mum-of-three was found in a garden rubbish pile after police searched a property where her wheelchair had been spotted, an inquest has heard. Kelly Louise Randall's death in Waunarlwydd, Swansea, was not suspicious, police told an inquest at the Guildhall in the city on Tuesday. The 45-year-old heroin user, who had one of her legs amputated, was found 11 days after being reported missing by her partner on 5 May 2022. Coroner Aled Gruffydd recorded an open conclusion after a pathologist said Ms Randall had no physical injuries and her death could not be "proven" to be from drugs.

  PC Lisa Minto of South Wales Police told the inquest officers were called to a property on Clas y Deri after reports of Ms Randall's wheelchair being spotted outside. It was found in a bedroom along with blood stains on a jumper, a mattress, a bed sheet and a bedframe. What appeared to be a human arm was then spotted in mound of rubbish in the back garden. Alfred Millman, who lived at the property, was originally arrested on suspicion of murder but no charges were placed against him, South Wales Police said. Mr Millman, who died in April 2023, told police Ms Randall would occasionally clean for him. He told police he found her body in a bedroom and "panicked". In a police interview, he said: "I put her outside where the rubbish was. "God knows how long she had been [in the house] because I am hardly in the bedroom." He said he used a belt and a washing line rope to help move the body outside, but told police he had "nothing to with her death". Mr Millman said he had not looked in the bedroom for about two or three weeks and did not know how Ms Randall got into his house, but said she had a key. DC Minto told the inquest there was "no evidence found to suggest that Kelly's death was suspicious".

  Ms Randall's body was found in a bedroom inside this house, then dragged to the rear garden, an inquest was told

  The hearing was also told how Ms Randall had a history of drug addiction and was on medication at the time of her death. She had also been known to self-harm and had been suffering with depression. A statement, written by Ms Randall's partner of 25 years, said the couple would use heroin and Valium and, on the day she was last seen, Ms Randall was taken to Morriston Hospital by paramedics after falling from her wheelchair. The inquest heard she had been talking about suicide on that day, including "throwing herself from her wheelchair in front of cars". Forensic pathologist Dr John Williams told the inquest a post-mortem examination found no skull fractures or bleeding around the brain and there was no evidence of a stroke, heart attack or trauma to the head. As well as alcohol, a toxicology report found cannabis, amphetamine, morphine, diazepam and pregabalin - an epilepsy and anxiety medicine, external - in her system. Dr Williams said he "could not exclude the possibility" that these substances together could have played a part in Ms Randall's death. He added there were "no pathological findings that Kelly's death is necessarily due to forced injury by another person" and gave the cause of death as unascertained. Ms Randall's family, some of whom were at the inquest, previously paid tribute to her, describing her as a "brilliant mother" who had been a talented hairdresser.
