title: Fourteen children arrested over Gateshead boy's fire death - BBC News
date: '2025-05-04'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c5ygn4q9x3vo
content: |-
  Eleven boys and three girls, aged between 11 and 14 years old, are held on suspicion of manslaughter.

  A body believed to be that of Layton Carr, 14, who had been reported missing, was located inside the building

  Fourteen children have been arrested over the death of a 14-year-old boy following a fire at an industrial unit. The blaze broke out at Fairfield industrial park in the Bill Quay area of Gateshead on Friday evening. It was extinguished but a body believed to be that of Layton Carr, who had been reported missing, was located inside the building, Northumbria Police said. Eleven boys and three girls, aged between 11 and 14, were arrested on suspicion of manslaughter and remain in police custody.

  The blaze broke out at Fairfield industrial park in the Bill Quay area of Gateshead

  Police said they received reports of the fire shortly after 20:00 BST at the 15-acre site on the southern banks River Tyne. It has fallen into disrepair in recent years, with a gatehouse leading to the site smashed down and a number of buildings left abandoned. People living nearby said trespassing on the site was a "regular occurrence". They also said fires were common but that what happened on Friday was "out of the ordinary". One neighbour told the BBC it was the "biggest fire" they had ever seen.

  Floral tributes to the teenager have been left at the scene

  Officers said the inquiry into the blaze was at an early stage and asked members of the public not to speculate about what happened. Det Ch Insp Louise Jenkins said it was an "extremely tragic incident where a boy has sadly lost his life". "Our thoughts are with Layton's family as they begin to attempt to process the loss of their loved one. "Our specialist officers will continue to support them in whatever way they can." Hebburn Comprehensive School posted a tribute to Layton on Facebook saying: "Our school community is heartbroken. "Layton was a valued and much-loved member of Year 9 and he will be greatly missed by everyone." It invited anyone who wished to pay their respects to lay flowers at the school. Meanwhile, more than £7,500 has been raised so far via a GoFundMe set up for Layton's mother.

  A cordon would remain in place, along with a police presence, to carry out investigations and "offer reassurance to the public", Det Ch Insp Jenkins said. Police have appealed for anyone with information to get in touch.

  Northumbria PCC Susan Dungworth said the community of Bill Quay was shocked by the death

  Northumbria Police and Crime Commissioner Susan Dungworth said her "heartfelt condolences" were with the family and friends of the teenager at this "devastating time". She said she was being kept updated by the chief constable and would like to thank emergency services involved in the response and investigation. "I know this will have come as a shock to the Bill Quay community and I echo officer requests for anyone with information to please get in touch with Northumbria Police," she added.

