title: King and Queen enjoy Braemar Highland Games - BBC News
date: '2024-09-08'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c4gz5wlel60o
content: |-
  Charles and Camilla were keen spectators at the games on their summer break to Aberdeenshire.

  The King and Queen watched the Games take place on Saturday

  The King and Queen appeared in jovial mood as they attended the Braemar Gathering Highland Games in Aberdeenshire. The annual event, held a short distance from their summer residence at Balmoral, has been running in its present form since 1832, and has been attended by the reigning monarch since 1848. Competitors took part in traditional games including tug-of-war and the caber toss, and enjoyed performances by bagpipers, drummers and dancers. The King, who was a regular spectator at the games while Duke of Rothesay, will mark two years since his accession to the throne on Sunday.

  Competitors took part in a range of traditional sports

  King Charles was dressed in a tweed jacket and a navy, red and green kilt, and Camilla wore a navy dress with a feather pattern with a feathered hat. The couple were seen smiling as they chatted at Saturday's event. The 2024 gathering falls one day before Charles's second accession anniversary, having become head of state immediately upon the death of his mother, the nation's longest-reigning monarch, who died peacefully at Balmoral Castle in September 2022 at the age of 96. Charles is expected to attend church, spending time in private prayers and reflection, on the anniversary, which falls during his summer break.

  Highland dancing was among the events

  The games have been running in their current form since 1832

  Gun salutes are usually fired on Accession Day, but because this year the anniversary falls on a Sunday when salutes traditionally do not take place, the military tribute by The King's Troop Royal Horse Artillery at Hyde Park and The Honourable Artillery Company at the Tower of London have been moved to Monday. Both regiments taking part were responsible for firing the gun salutes to mark the death of Queen Elizabeth II two years ago. Almost all of the soldiers and horses participating had a role in the late Queen's state funeral and the proclamation of the King.

  The King presented awards to some of those competing

  Queen Victoria first attended the Braemar Gathering in 1848 during her summer holiday at nearby Balmoral. Since then members of the royal family have regularly made an appearance.
