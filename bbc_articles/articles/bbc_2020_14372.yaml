title: 'Debenhams boss: ''Our stores aren''t on a cliff edge'' - BBC News'
date: '2020-12-01'
section: General
url: http://www.bbc.co.uk/news/business-54027895
content: |-
  Debenhams boss Mark Gifford says the business will keep going well beyond the end of September.

  There were fears that Debenhams would have to close its stores if it didn't strike a rescue deal by the end of September. The department store chain is in administration and is looking for a buyer.

  But chairman Mark Gifford told the BBC's Emma Simpson the group has enough cash to keep going long after the end of this month while a sale is negotiated.
