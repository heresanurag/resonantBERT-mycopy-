title: Bramley broadband customers still affected after fuel leak - BBC News
date: '2024-09-13'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c4gxg1xdvx3o
content: |-
  Openreach says fuel vapours underground mean engineers cannot access broadband cables.

  Asda petrol station has reopened after it was closed In May due to a fuel leak

  Hundreds of broadband customers are still facing disruption months after a fuel leak at a Surrey petrol station, a councillor says. Thames Water says it has replaced water supply pipes after more than 600 homes in Bramley were issued with "do not drink" notices on 30 May over fears of contamination after the leak. Jane Austin, a Conservative councillor on Waverley Borough Council, said: "Over recent months, what is now hundreds of homes don't have internet or a phone line." Openreach, which provides the broadband infrastructure, said some customers were still facing "intermittent disruption" as vapours made the underground cable network unsafe to access.

  Mehran Shafaie says his internet, wifi and landline are not working

  Mehran Shafaie from Bramley Barbers said: "The road is back to normal but unfortunately business is very, very bad. "My internet, wifi and landline telephone are not working. We need them to start working because businesses in the village need them."

  Ms Austin said: "We've now got a deteriorating situation with our telecommunications. "Over recent months, what is now hundreds of homes which don't have internet or a phone line," she said. "Openreach... have given no end date for when they'll be able to fix it. "There have been no alternatives like satellite communications put in place yet."

  This video can not be played To play this video you need to enable JavaScript in your browser. The tap water may be restored but the knock-on effects from a petrol leak continue.

  In a statement, Openreach said: “We understand the ongoing impact this situation is having on residents and businesses in Bramley. We’re working closely with all the relevant authorities and organisations involved to resolve it as quickly and as safely as possible. "Whilst parts of our underground network aren't yet safe for our engineers to access, we've reduced the risk to residents and passers-by using a vapour extraction unit." A spokesperson said a temporary mobile mast was providing alternative connectivity for emergency services across all mobile networks.

  Thames Water said: "We have completed our works to replace supply pipes in the village. There are no properties on a restriction of use in Bramley."

  Ms Austin said: "Businesses are on the edge - we've already lost our greengrocer, but now we could be seeing more businesses fail." She said: "Asda has provided a compensation mechanism. "No payouts as yet have been made, so we don't know if that scheme is going to be successful."

  A spokesperson for Asda said: "The next treatment phase will begin shortly where vapours remaining in the soil will be extracted. "We remain in discussion with local community groups about further remediation and support for local community schemes."

