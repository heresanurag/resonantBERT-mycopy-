id: bbc_2024_7264
title: Skydivers witness total solar eclipse mid-air - BBC News
date: '2024-04-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68786361
content: |-
  Dramatic video shows a woman and her father jumping from 14,000ft (4,267m) as the sky begins to darken.

  Dramatic video shows the moment a woman and her father jumped from a plane in Texas during Monday’s solar eclipse.

  Footage shows the two freefalling from 14,000ft (4267m) then floating with a parachute as the sky begins to darken.

  Across North America, tens of millions watched as the Moon moved between the Earth and the Sun, turning day to night. The continent will not see another total solar eclipse until 2044.
