  The joint statement was signed by America's President Trump - who then left the summit in Canada early.

  G7 leaders urge 'de-escalation' but stop short of calling for Israel-Iran ceasefire

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: A trade deal, a family photo and conflict in the Middle East - Trump’s short G7

  The leaders of G7 nations have urged a "de-escalation of hostilities in the Middle East, including a ceasefire in Gaza" - but stopped short of calling for a ceasefire between Israel and Iran, during their summit in Canada. The joint statement was signed by US President Donald Trump - who then left the meeting early, his intentions unclear. His press secretary said this was because of events in the Middle East. The president himself merely said he was returning to Washington for "big stuff", but denied this was related to a ceasefire. He earlier urged Iranians to "immediately evacuate Tehran". This triggered speculation that US forces might join Israel's attacks - something denied by American officials.

  The gathering of world leaders at Kananaskis, in the Canadian Rockies, has been overshadowed by the Middle East conflict. The leaders' statement, published as Trump left Canada, said Israel had a right to defend itself, and that Iran was a source of terror that should not have a nuclear weapon. Its call for a resolution of the crisis that led to a broader de-escalation of hostilities in the Middle East amounted to a diplomatic compromise that preserved G7 unity but watered down the statement's impact. As he left, Trump told reporters: "I have to be back early for obvious reasons." He later wrote again on Truth Social, lambasting another G7 attendee, President Emmanuel Macron of France. Trump said his "publicity seeking" counterpart mistakenly suggested he was working on a ceasefire. "Wrong! He has no idea why I am now on my way to Washington, but it certainly has nothing to do with a Cease Fire," Trump wrote. "Much bigger than that. Whether purposely or not, Emmanuel always gets it wrong. Stay Tuned!" G7 leaders had said they understood Trump's need to leave early. "If the United States can achieve a ceasefire, that's a very good thing," said Macron.
  • None Follow all the latest on Israel-Iran conflict
  • None 'Nowhere feels safe': Iranians on life under Israeli attacks Reports circulated that Trump had instructed the White House National Security Council to meet upon his return. US Defence Secretary Pete Hegseth has announced the "deployment of additional capabilities" to the Middle East to enhance the Pentagon's "defensive posture", despite US officials' denial that they were about to join the Israeli offensive. Trump's press secretary, Karoline Leavitt, was at pains to emphasise that Trump had "a great day" at the summit, saying much was accomplished, including a trade deal between the US and UK. She did not elaborate on his departure other than to say it was because of "what's going on in the Middle East". Trump's exit means he will miss in-person meetings with Ukrainian President Volodymyr Zelensky and Mexican President Claudia Sheinbaum that were scheduled for Tuesday, the final day of the summit.

  Trump's encouragement to Iranians to evacuate their capital, Tehran, has been pinned to the top of this Truth Social account. It gives no further information. In the same social media post, Trump suggested that Iran should have signed a deal that he put forward during the most recent talks over Iran's nuclear programme. "Simply stated, IRAN CAN NOT HAVE A NUCLEAR WEAPON," he wrote. "I said it over and over again!"
  • None Israel's endgame may be regime change in Iran - but it's a gamble
  • None Israel-Iran strikes: What are the worst-case scenarios? Shortly after the post, in the early hours of Tuesday, Iranian media reported explosions and heavy air defence fire in Tehran. In Israel, air raid sirens wailed in Tel Aviv and an explosion was heard as Iranian missiles targeted the country again.

