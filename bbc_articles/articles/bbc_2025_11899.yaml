  Monday also saw a bilateral between Canadian Prime Minister Mark Carney and Trump, after which Carney said a trade deal might be struck between the two countries within 30 days to resolve tit-for-tat import taxes. This marks the second time that Trump had left the G7 summit early. In 2018, at a summit in Quebec, he exited the gathering to meet North Korea's leader Kim Jong Un. Israel has claimed control of Iranian airspace since launching its air war last Thursday with a surprise attack that it says has killed many top military commanders and atomic scientists. However, Israel does not appear to have achieved its goal of destroying Iran's nuclear development programme. Military analysts say only the US has the bombers and bunker-busting bombs that can penetrate the deepest of Iranian nuclear facilities, especially that of Fordow. Israeli strikes have killed at least 224 people in Iran, according to the Iranian health ministry. In Israel, the government said at least 24 people had died.
