title: 'Newspaper headlines: Prison release scheme and the pound surges - BBC News'
date: '2024-07-12'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c978jrzmz6do
content: |-
  Plans to free prisoners early to ease chronic overcrowding in jails is the focus for several front pages.

  The Times is among those leading on the government's plans, external to release thousands of prisoners early. It describes the move as a way to "ease the crisis in the justice system" after a warning from police chiefs that inaction could lead to a breakdown of law and order "within weeks". It says the measure is only expected to apply to prisoners serving sentences of less than four years. The Daily Mail says Conservatives have "blasted" Labour's warnings, external about full prisons as "shameless scaremongering". The Tory MP Neil O'Brien tells the paper "the idea we would be safer if lots of criminals were let out of jail is absolute nonsense". The Daily Telegraph reports that the Energy Secretary Ed Miliband has ordered, external an immediate ban on drilling in new North Sea oilfields. It calls it an "unusual intervention" into what is usually an apolitical process. It adds that the move could trigger a wave of legal action from the oil industry which has spent millions on preparing bids for licences. The paper says the government has also withdrawn support for the first new coal mine in 30 years in Cumbria - describing the move as "a potentially lethal blow".

