title: Convicted rapist Steven van de Velde loudly booed during defeat - BBC Sport
date: '2024-08-03'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/c51y123k0w3o
content: |-
  Convicted child rapist Steven van de Velde is loudly booed when playing for the Netherlands in their beach volleyball defeat by Norway at the Olympics.

  Steven van de Velde was booed when he came on and served in a defeat by Norway

  Convicted child rapist Steven van de Velde was loudly booed when playing for the Netherlands in their Olympic beach volleyball defeat by Norway on Friday. Van de Velde was sentenced to four years in prison in 2016 after admitting three counts of rape against a 12-year-old British girl. The 29-year-old came on to a low-key welcome when entering the arena in Paris with volleyball partner Matthew Immers before their third match. However, there were vociferous boos when Van de Velde was later introduced individually to the crowd and walked on to the court at Eiffel Tower Stadium. There were also jeers and whistling throughout when Van de Velde served during a 2-0 defeat by current Olympic champions Anders Mol and Christian Sorum. Despite the result, Van de Velde and Immers have reached the last 16, having won one and lost two matches. The last-16 matches will be played on Sunday and Monday.

  Van de Velde's inclusion in the Dutch team has been criticised by women's and safeguarding groups. He is not staying in the Olympic village and will not do any post-match media. There was extra security around him when he arrived in Paris with the rest of the team. In previous interviews with Dutch media, Van de Velde said: "I can't reverse it, so I will have to bear the consequences. It has been the biggest mistake of my life."
