  Once hooker Jamie George has been presented with a ceremonial cap denoting his 100th England appearance before kick-off, England will be concerned about racking up a big number of their own. Italy were compliant last time out, fading fast in the second half as France ran in 11 tries in a 73-24 win in Rome. They might not be this week. Last year, they outscored England three tries to two, running them closer than ever in the Six Nations before succumbing 27-24. Second row Federico Ruzza said that he and his team-mates have "looked each other in the face" after the France loss. Italy's injured wing Louis Lynagh has warned the defeat was "an outlier". "It would be dangerous for England to think otherwise," he told Planet Rugby., external

  With runners like Ange Capuozzo, Monty Ioane and Tomasso Menoncello, they have flair, if they can reignite their physicality. But for their title hopes and their fans' belief in their progress and promises, England need to finish the fight standing among Roman wreckage. Are you not entertained? England will hope to have done so in a different way when Sunday's verdict is delivered.
