content: |-
  England need to find the tries to stave off another cliff-hanger conclusion against Italy in the Six Nations on Sunday.

  England aim to thrill on their own terms against Italy

  This video can not be played To play this video you need to enable JavaScript in your browser. ‘England can hurt Italy if they’re more ambitious in attack’

  Coverage: Listen to full match commentary on BBC Sport website and app; follow live text commentary online; watch on ITV1

  Some would say they have already accomplished it several times over. So far in the Six Nations, when on the turf, rather than in front of a microphone, their promises of moving the ball have turned out to mean in one direction: upwards, via the boot. In three games, England have kicked 120 times in open play. No other team comes close to that total. Italy, the next most kick-happy, have done so 100 times. Scotland are down at just 71. While there is a logic and pedigree to the tactic,, external the Allianz Stadium crowd are not enamoured. Several times against Scotland and France, they grumbled as Alex Mitchell or Fin Smith lined up a skywards hoof. Yet, when both games came to the boil, the atmosphere was bubbling. A pair of one-point, cliff-hanger victories kept 80-odd thousand in their seats and off their feet and England in the title hunt. It has become England's way. Incredibly their last 15 matches against Six Nations or Rugby Championship opposition have all been decided by a single-digit margin. The average winning margin across those games is a skinny 3.5 points. Against Italy, they could do without the drama. A few more spectators making an early cut for the train station may, on this occasion, be welcome.

  England's focus on territorial and contestable kicks mirrors the gameplan that propelled Leicester to the Premiership title under Steve Borthwick

  Victory in comfort and a bonus point in some style should be the aim. Against an opponent they have beaten in all 31 of their previous meetings, England are strong enough to take the possibility of an upset out of the visitors' hands. An awkward bounce, a refereeing call, a moment of Azzurri genius - the hosts should have amassed enough points to insulate themselves against all such eventualities by the business end of the match. The outcome certain, the bonus point secure; boring, but in a better way. England have benched their most exciting player in pursuit of this goal. Marcus Smith's name registers the highest decibels when England's team is announced before kick-off. If you ask any young fan who they are looking forward to seeing, invariably it is the Harlequins playmaker. His nose for a gap, jagging step and instinctive unpredictability were England's surest sources of tries throughout the autumn. His faked drop-goal and blind-side dart produced the first against South Africa. His poked kick in behind Australia's defence set up the opening score against the Wallabies. His interception and canter upfield put them ahead in the second half against New Zealand. Each time though, they were pyrotechnics in losing efforts. In search of more sustainable scoring, England have brought in some pre-heated cohesion, installing Fin Smith at fly-half and, after a year out the side, Fraser Dingwall at inside centre. They are two of five Northampton players in the backline. Had George Furbank been fit, Saints would surely be only one slot away from a full house. "I watched the relationship between 9,10 and 12 in training this week and have an understanding with each other that doesn't take any communication," said head coach Steve Borthwick this week. "They seem to know what each other is going to do."

  Italy suffered a 49-point defeat at home against France last time out

  Marcus Smith, who was told last week that he could be world class in his new full-back role, has been replaced at 15 by 32-year-old Elliot Daly. It is just the latest shuffle that Borthwick, who has enviously highlighted the settled systems and experience of Ireland, France and Scotland, has made over the campaign. A rookie 10 has come in, the Henry Slade-Ollie Lawrence centre partnership into which he has sunk considerable game time has come out, and three different full-backs have started across four matches. The latest mix needs to work, not just for the nerves of the Twickenham regulars, but for the standings spreadsheet. Whatever the result between Ireland and France in Dublin on Saturday, England will head into the final day as distinct outsiders for the title. But, given their current negative points difference, a failure to take five points from their meeting with Italy, would stretch their odds even longer.

