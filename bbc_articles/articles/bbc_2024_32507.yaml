title: Dominican Republic records largest ever cocaine seizure - BBC News
date: '2024-12-07'
section: Latin America
url: http://www.bbc.co.uk/news/articles/cn9gg220xzjo
content: |-
  Authorities say the shipment, hidden in bananas, was destined for Europe.

  Authorities in the Dominican Republican say cocaine discovered in the country's largest-ever seizure was headed to Europe. Hidden in a banana shipment, officials found 9,500kg of the drug at a port in the capital, Santo Domingo. The cocaine was hidden in 320 bags with an estimated street value of $250 million (£196 million). At least 10 people linked to the port are under investigation with early investigations showing the bananas had arrived from Guatemala, according to the National Drug Control Directorate.

  Communications chief Carlos Denvers said: "Many unknown individuals tried to transfer the drugs to another container that would be shipped on a vessel to Belgium." The haul far exceeds the 2,580kg seizure made by Dominican authorities at the same port in 2006. Monitoring agencies have reported that the Caribbean is resurfacing as a major drug trafficking route from Colombia to Europe. A report last year found the use of cocaine is increasing in several western European countries including the UK, Belgium, France and Spain. Europe accounted for 21% of the world's cocaine users in 2020, according to a United Nations report, external. Evidence suggests use of the drug is bringing dire health consequences, with recent data showing drug-poisoning deaths in England and Wales hit the highest level in 30 years, fuelled by a 30% rise in fatalities involving cocaine.
