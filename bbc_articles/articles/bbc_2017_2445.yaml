id: bbc_2017_2445
title: 'Trump travel ban: Iraqi family boards flight to JFK - BBC News'
date: '2017-02-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38872172
content: |-
  An Iraqi family board a flight to the US after President Donald Trump's travel ban is blocked.

  An Iraqi family have successfully boarded a flight to the US from Turkey, following the suspension of President Donald Trump's travel ban on people from seven mainly Muslim nations.

  Fuad Sharef and his wife and three children, who have US immigration visas, were previously prevented from boarding a flight to JFK airport from Egypt.

  The US justice department has filed a court motion against the suspension which was issued by a federal judge on Friday.
