content: |-
  A tearful Dame Sally Davies tells the public inquiry "it wasn't just the deaths, it was the way they died".

  CMO has total independence of thought, says Prof Davies

  Keith asks Davies if her role as chief medical officer (CMO) was equivalent to the role of departmental chief scientific adviser or if it had a greater degree of independence. She says the CMO has total independence of thought and ability to advise. The chief scientific adviser is there to advise their department. She says in that role she tried to help policy teams know what the latest stance was, she says. Keith then asks about The Scientific Advisory Group for Emergencies (SAGE) and the role of the CMO when it comes to SAGE and dealing with a major health emergency. She says when she stared in 2010, the pandemic of flu of 2009-10 was declared over but she reviewed how things had went in that pandemic and said it wasn't a very good way of knitting together all the bits of advice to make it as affective as it should be. They came to an agreement over the following few years that in a medical emergency the CMO would co-chair in SAGE.
