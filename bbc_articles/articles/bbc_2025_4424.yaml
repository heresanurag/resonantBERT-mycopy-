title: Moment drink falls on man's lap leading to $50m settlement - BBC News
date: '2025-03-20'
section: General
url: http://www.bbc.co.uk/news/videos/c2kg29p1g15o
content: |-
  A jury found Starbucks responsible for the incident, which caused a Postmates driver third-degree burns to his genital area.

  A Los Angeles County jury has awarded $50m (£38.47m) in damages to Michael Garcia after a scalding hot tea from Starbucks caused severe burns.

  Garcia, a Postmates driver, suffered third-degree burns to his genital area when a loose cup fell into his lap at a drive-thru in February 2020.

  Starbucks was found 100% responsible for failing to secure the cup properly, which led to permanent disfigurement.

  The company plans to appeal the verdict, stating the damages are excessive.
