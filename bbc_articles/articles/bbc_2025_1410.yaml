  The Biden White House had argued that standing up to Russia in Ukraine was essential to US national security, but that is a far cry from how Trump and his closest advisers see the world – not in ideological clashes, but in transactions and relations that either benefit or harm American interests. His Truth Social post, for instance, lamented that the US "will get nothing back" for the support it has given to Ukraine. His focus on the nation's rare minerals tracks with his Middle East peace plan that involves the US redeveloping Gaza's waterfront real estate into a resort, or his interest in maintaining control of - and profiting from - Syrian oil fields in his first presidential term. Trump's "America First" priorities do not involve committing US resources to spread democracy or getting involved in far-away conflicts across a "big, big beautiful ocean", as he wrote on Wednesday. The Ukraine war, he said, is "far more important to Europe than it is to us". This is a sharp change from the interventionist conservatism of George W Bush, the most recent Republican president before Trump. But with Trump as the face of the Republican Party since 2016, the changes over the past few weeks have been sudden – but they have also been a long time coming.
