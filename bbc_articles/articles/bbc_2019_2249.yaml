  "If I lose," she laughs, "I'll still have that record."

  The actress's first nomination was in 1982, when she received a best supporting actress nod for The World According to Garp.

  "I remember when hearing about [the nomination], it was in the basement of the home where we were filming The Big Chill," she recalls.

  "And somebody told me I was nominated for an Oscar, and I remember my absolute astonishment, it was so far out of my expectation."

  When receiving her Golden Globe Award last month, Close said on stage: "I'm so honoured to be with my category sisters. And we've gotten to know each other a little bit so far and I can't wait to spend more time with you."

  But they haven't seen quite as much of each other as they would've liked, Close explains.

  "Unfortunately we never get to sit together at any of these events! So I guess the person I've gotten to know the most so far is Melissa McCarthy."

  Indeed, McCarthy was tasked with presenting Close with an honour at the Oscar Wilde Awards, despite the pair being in competition for the real Oscar.

  But, McCarthy says: "I never think of it that way. I never think that any of us are up against anybody else.

  "I think it's such a kick to just be a part of this in any way, that I'm just glad I'm here," adds the actress, who was excited to be paying tribute to Close on stage later in the evening.

  "[Close] said, 'Don't be too nice to me' and I said, 'I won't be!' So we'll see what I can get away with, I'm really going to try to take Close down tonight!"
