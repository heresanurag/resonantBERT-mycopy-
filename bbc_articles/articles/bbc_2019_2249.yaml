  One of this year's Oscar nominees who is considered a dead cert to win is Glenn Close, who is nominated for best actress for her role in The Wife.

  Lady Gaga and Olivia Colman were the favourites in that category at the beginning of awards season, but momentum turned in Close's favour after a win at the Golden Globes in January.

  "You know the only pressure I feel is I've gotten so much incredible love from people, and I feel like a lot of people are rooting for me," Close tells BBC News.

  "And the pressure I feel is that I don't want to let them down. But personally, I'm OK."

  Close currently is the actress with the most Oscar nominations to her name without a win.

