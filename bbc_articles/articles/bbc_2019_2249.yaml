title: 'Oscars 2019: How Richard E Grant took over role from Chris O''Dowd - BBC News'
date: '2019-02-24'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47328014
content: |-
  Chris O'Dowd very nearly played a role made famous by Richard E Grant.

  Richard E Grant may be one of Britain's big hopes at this year's Oscars - but his role almost went to someone else.

  Irish actor Chris O'Dowd was originally cast in Can You Ever Forgive Me? - one of the most prominent films in this year's awards season.

  But the role eventually went to Grant, whose performance scored him both critical acclaim and an Oscar nomination for best supporting actor.

  "What a heartbreak," O'Dowd tells BBC News at the Oscar Wilde Awards.

  "We were ready to go, it was myself and Julianne Moore, and we had moved to New York, and maybe two days before we started filming, there was some creative differences that I wasn't really involved in."

  Richard E Grant and Melissa McCarthy are both nominated for Can You Ever Forgive Me?

  Those creative differences also saw the project lose its original director, before Marielle Heller took over. Meanwhile, Melissa McCarthy replaced Moore, and is also in the running for an Oscar.

  "I was surprised, that the film wasn't going ahead at the last minute," says O'Dowd. "But Richard's performance in it is so wonderful, that it feels like it was kind of meant to be."

  Which is a diplomatic way to look at it, but surely it's gutting when you see someone else having such success with a job that was originally yours?

  "Totally!" laughs O'Dowd. "I know Richard a bit, we've worked together, and watching him go on this journey through the Oscars has been so intoxicating.

  "But definitely I would've preferred if it was me!"

