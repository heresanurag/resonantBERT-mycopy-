  O'Dowd, who now lives in Los Angeles, has starred in films such as Bridesmaids, The Sapphires and Juliet, Naked - the new adaptation of the Nick Hornby novel of the same name.

  He was honoured at Thursday night's Oscar Wilde Awards - dubbed the Irish Oscars - one of the many ceremonies taking place in the days running up to Sunday's Academy Awards.

  The Oscar Wildes are intended to champion relations between the US and Ireland, and the ceremony is hosted by JJ Abrams at his Bad Robot studios in Santa Monica.

  Abrams appeared at the party less than a week after completing filming for Star Wars: Episode IX, which is released this December, four years on from his last movie in the series.

  "It's a far bigger movie [than The Force Awakens] in every way, so it was a much bigger challenge," the director says of the film, which coincidentally also stars Richard E Grant.

  "Richard was someone who I met when I was in my 20s, I've been a fan of his for a long time, I'm so thrilled we finally got the chance to work together, and he was incredible.

  "I can't wait for you to see him in this. Obviously he's got a nomination on Sunday, a very deserving nomination, I love the man."

