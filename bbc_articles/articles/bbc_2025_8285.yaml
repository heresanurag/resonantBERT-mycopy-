content: |-
  Turkish national Hakan Barac posted videos celebrating terrorists such as Osama bin Laden.

  Hakan Barac arrived in the UK in April 2023

  An Islamic extremist who arrived in the UK seeking asylum has been jailed for supporting terror group Islamic State. Turkish national Hakan Barac, 28, of Commercial Road, Newport, posted videos on social media sites glorifying terrorists Osama bin Laden and Abu Bakr al-Baghdadi. He admitted five counts relating to the online distribution of terrorist publications, and one of expressing support for a proscribed organisation. Barac was sentenced to three years and nine months at Bristol Crown Court and will referred to authorities to consider deportation.

  Barac, who reached the country two years ago, was arrested by counter-terrorism police last year. He posted videos on social media sites, including Instagram and Telegram, that showed jihadists preparing for martyrdom as well as featuring Saudi-born Canadian recruiter Mohammed Khalifa, the court heard. Ben Lloyd, prosecuting, said other material was "extreme" and depicted graphic violence. "It was apparent that a substantial number of followers to his accounts were interested in extreme Islamic subject matters," he said. Tim Forte KC, defending, said Barac had pleaded guilty on the basis there was "no intention to assist or encourage" and the posts had only been seen by a small number of people.

  But in handing down a 45-month sentence, Judge Martin Picton said Barac had shared material glorifying "violent terrorism". "The dissemination of material of this kind has the clear potential to be supportive of such activity," he said. "It is apparent from your own use of social media that you have a mindset that is aligned with that ideology. "The pattern of terrorist activity in modern times demonstrates the potential for individuals to be encouraged by material they see posted on social media so as to carry out acts of violence." He added: "You are here seeking asylum but at the same time choose to disseminate material that strikes at the very heart of our democratic society. "For you to behave in that way when seeking refuge in this country is very difficult to understand and must seem utterly unacceptable to all right thinking people." Det Ch Insp Leanne Williams, from Counter Terrorism Policing Wales, said: "Without any doubt, Hakan Barac is a dangerous individual. "Barac clearly expressed his support for the Islamic State, and it was our absolute priority to ensure the public were protected from him and the abhorrent rhetoric he espoused."
