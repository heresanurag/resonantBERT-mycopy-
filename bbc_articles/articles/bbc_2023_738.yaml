content: |-
  Kaylea, 16, was found dead at home, weighing almost 23 stone and on soiled sheets, a court hears.

  Kaylea Titford was found to be morbidly obese, jurors were told

  A 16-year-old girl who died after becoming morbidly obese in lockdown and lived in conditions "unfit for any animal" was seriously neglected by her parents, a court has heard.

  Kaylea Louise Titford's body was found on soiled sheets and police noted an "unbearable" rotting smell.

  Her father Alun Titford, from Newtown, Powys, denies manslaughter by gross negligence at Mold Crown Court.

  Caroline Rees KC told the jury Kaylea had spina bifida which left her with little feeling from the waist down, limiting her mobility, and had used a wheelchair from a young age.

  When she was found dead at her home she was morbidly obese, weighing nearly 23 stone (146 kg), the court heard.

  Ms Rees said: "Kaylea Titford was living in conditions unfit for any animal, let alone a vulnerable 16-year-old girl who depended entirely on others for her care."

  Kaylea's hair was dirty and matted and she was unwashed with ulcerated skin, the court was told.

  On the morning of October 10 2020, the court heard a 999 call was made by Mr Titford's mother before paramedics were sent to her house and Kaylea's body was found.

  As well as lying on soiled bedclothes, she had numerous sores and areas of infection.

  Alun Titford is accused of failing in his duty of care to Kaylea

  Ms Rees added: "The prosecution say that the scene - as witnessed by those that attended - together with the state in which Kaylea's body was found demonstrate clearly that this vulnerable girl, who relied heavily on others for her welfare needs, was seriously neglected by not just one but both of her parents, who owed her a duty of care."

  A pathologist's report said her physical state suggested she had not been properly washed in many weeks, jurors heard.

  The prosecution said Kaylea died because her parents failed in their duty of care and that gave rise to an obvious and serious risk of death.

  Ms Rees said: "Their serious failures were hidden from the scrutiny of the outside world from March 2020 by reason of the national lockdown during the global Covid pandemic.

  "We further say that the parents' negligence was so gross as to be properly characterised as criminal."

  When Mr Titford was interviewed by police, he told them he was "not a very good dad" and his wife looked after Kaylea and did the housework, the court heard.

  He said his daughter had outgrown her wheelchair and he did not think he had seen her out of bed since before lockdown.

  He told police the family would have takeaways five nights a week.

  Asked when he last asked Kaylea how she was, he said: "I didn't ask her. Like I say, I'm not the best of people. Nobody ever thinks their child is going to end up like that."

  The prosecution said Mr Titford's case was that although he lived at the same address, Kaylea's mother was primary carer and he was not aware of the state of his daughter's living conditions or the deterioration in her physical state.
