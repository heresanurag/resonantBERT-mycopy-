content: |-
  Kwasi Kwarteng sets out some of the most significant tax cuts in decades, but the financial markets react badly.

  The government has a big persuasion job on its hands

  The chancellor didn't wave his red box around on the doorstep of 11 Downing Street. But, inside the blue booklet tucked under his arm as he left for the Commons, were the biggest tax cuts in 50 years. What we have heard today amounts to a wholesale shredding of previous economic policy; both the ones adopted by Conservative governments over the last 12 years, and those of Labour before that. Economic growth, and plenty of it, is the prize sought - but it is a gamble. Ministers can't be certain it will work, nor that the methods used will be popular. They think that doing nothing, the status quo, would be worse - a sluggish economy combined with spiralling prices condemning them to the doom of election defeat. But combine colossal extra borrowing, an acknowledgement the rich will get richer and an economy the Bank of England reckons might already be in recession: together they mean the government has a big persuasion job on its hands, convincing people they know what they're doing, and that we'll all be collectively better off as a result. The government hopes this set of measures will give the economy a giant injection of oomph. It will certainly give politics that: the dividing lines between the Conservatives, Labour and others are bold and stark. And the water is very clear and very blue.
