id: bbc_2024_2667
title: 'Dan Wootton: Metropolitan Police taking no further action against broadcaster
  - BBC News'
date: '2024-02-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-68360867
content: |-
  The New Zealand-born broadcaster says in a statement that he has been "completely cleared".

  Police have said they will take no further action against GB News presenter Dan Wootton.

  The New Zealand-born broadcaster said in a statement on Wednesday that he had been "completely cleared".

  The Metropolitan Police had examined allegations that he used fake online identities and offered money to others for explicit material of themselves.

  Last July, he told viewers he had made "errors of judgement" but strongly denied any criminality.

  GB News has not commented, but Wootton currently remains suspended because of a different matter.

  In a statement issued by his lawyer, Wootton said the allegations were "completely spurious - lies designed to destroy my career where complainants were actuated by malice".

  He continued: "While I knew this would always be the outcome, the process is now the punishment, with social media acting as the executioner.

  "Margaret Thatcher once said that if you ever get trial by media, or guilt by accusation, that day freedom dies.

  "She was right. It is high time that all of our ancient rights were once again upheld, chief among them the right to be presumed innocent until found guilty in a court of law.

  "If it falls to me to be the champion of those rights, then so be it. It is a fight I am more than willing to take up, not just for me but for all of us."

  A Met Police spokesman told BBC News: "In June 2023, the Metropolitan Police was contacted with regards to allegations of sexual offences committed by a man aged in his 40s.

  "Officers assessed all information available to establish whether any criminal offence has taken place.

  "An investigation was commenced into these allegations. All parties involved have now been advised that no further action will be taken. There were no arrests during the investigation."

  Meanwhile, Police Scotland have informed the BBC they have concluded an investigation.

  A spokesperson said: "Our enquiries are now complete and no report will be submitted to the Procurator Fiscal at this time.

  "We reserve the right to review this decision in the future and should any new information become available or reported, this will be fully investigated."

  Former tabloid journalist Wootton is known for his work at the News of the World and the Sun newspapers, and appeared on ITV's Lorraine as showbiz correspondent before joining GB News.

  He was named showbiz reporter of the year at the British Press Awards on three occasions, and broke the story of the withdrawal of the Duke and Duchess of Sussex from royal duties.

  After leaving his job as executive editor at The Sun in January 2021, he became a regular columnist for the MailOnline and then launched his own hour-long evening programme on GB News.

  He was suspended from his role as a presenter on the network after a row over comments made on his show by actor-turned-politician Laurence Fox about a female journalist.

  Wootton also had his contract as a columnist with the Daily Mail terminated at the same time.
