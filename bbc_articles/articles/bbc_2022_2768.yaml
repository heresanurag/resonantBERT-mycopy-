  An Aldi spokesperson said: "Cuthbert is free and looking forward to seeing all his fans again very soon."

  Fans of the party food favourite celebrated the end of the dispute on social media too.

  Colin the Caterpillar was launched by M&S more than 30 years ago, and has had substantially the same appearance since about 2004, apart from Halloween and Christmas versions.

  M&S also has related products such as Connie the Caterpillar.

  Colin has been used in charity work, and is central to M&S's partnership with cancer campaign group Macmillan.

  The M&S caterpillar is made of sponge cake with milk chocolate and buttercream, decorated with chocolate sweets and a white chocolate face.

  M&S was the first retailer to sell a caterpillar cake, but many supermarkets have since come up with similar products.

  Aldi launched the Cuthbert cake in 2019 and has sold limited editions to fundraise for Macmillan, as well as Teenage Cancer Trust.

  Aldi's Cuthbert has performed a skydive to raise money for charity

  Other cakes include Waitrose's Cecil, Sainsbury's Wiggles, Tesco's Curly and Asda's Clyde the Caterpillar.

  M&S and Aldi are also involved in a separate dispute over allegations the discounter copied an M&S "light-up" gin liqueur product.

  The M&S spokesman added: "Like many other UK businesses, large and small, we know the true value and cost of innovation and the enormous time, passion, creativity, energy and attention to detail that goes into designing, developing and bringing a product to market, and building its brand over many years.

  "So it is understandable that we want to defend our intellectual property and protect our suppliers, many of them small businesses that have worked with us for decades."
