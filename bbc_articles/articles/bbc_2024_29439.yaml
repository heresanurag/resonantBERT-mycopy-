content: |-
  President Maia Sandu is in a race seen as a choice between Europe and a return to Russian influence.

  Moldova's pro-EU leader in tight run-off as Russia accused of meddling

  As she voted Maia Sandu warned Moldovans that "thieves" were trying to buy their vote and their country

  Moldovans have voted in the second round run-off of a presidential election seen as a choice between a European future or a return to Russian influence. Pro-European President Maia Sandu faces Alexandr Stoianoglo, a man she fired as chief prosecutor, who has promised to balance foreign policy between the West and Russia and has the backing of the pro-Russian Party of Socialists. Sandu and Moldova's authorities have warned that a fugitive oligarch now based in Russia is trying to buy the election for Moscow. The Kremlin has denied interfering in the vote, much as it did during last weekend's disputed elections in Georgia, whose president described the vote as a "Russian special operation".

  "We resolutely reject any accusations that we are somehow interfering in this. We are not doing this," said Kremlin spokesman Dmitry Peskov. However, Maia Sandu's national security adviser, Stanislav Secrieru, said on Sunday that "massive interference by Russia" was taking place in Moldova's electoral process, which he said had "high potential to distort the outcome". Sandu won the first round of the vote two weeks ago with 42.4%, well ahead of Alexandr Stoianoglo on 26%, but short of the 50% she needed to win outright. His vote is likely to increase because of the votes of candidates who failed to reach the run-off. After voting, Sandu warned Moldovans that "thieves" wanted to buy their vote and their country and she called on them to preserve their country's independence. Stoianoglo, who promises to be an "apolitical president" for everyone, told reporters he had voted for "a Moldova that should develop in harmony with both the West and the East". But commentators and politicians have warned that a Stoianoglu victory could radically change the political landscape in the Danube and Black Sea region, not because he is some kind of "Trojan horse", but rather because Russia has thrown its weight behind him. By the time polls closed in Moldova at 21:00 (19:00 GMT) 54% of Moldovans had voted, with big queues reported in Moscow and Belarus as well as at polling stations in Romania, France and Italy. Moldova's election commission said it was aware of reports of organised and illegal transports of voters by air and land in Russia, Belarus, Azerbaijan and Turkey, and appealed to the public to report further violations. Stanislav Secrieru said Russia had organised buses and large charter flights to bring voters to polling stations.

  Alexandr Stoianoglo promises Moldovans to save their country from four more years of "abuse and ruin"

  Former Moldovan Defence Minister Anatol Salaru said the election would decide whether Moldova would "continue the process of European integration or return to the Russia fold". A former Soviet republic flanked by Ukraine and Romania and one of Europe's poorest countries, Moldova has a population of 2.5 million. It also has a large expat population of 1.2 million, whose votes could prove key to Maia Sandu in the run-off. Moldova has opened talks on joining the European Union, and on the same day of the first round Moldovans voted by a whisker to back a change to the constitution embracing the commitment to join the EU. The tiny margin in favour came as a surprise, although Maia Sandu said there was clear evidence of attempts to buy 300,000 votes. The BBC spoke to one voter who said she and others had sold their votes for up to 1,000 roubles (£8).

