  Among the 1,988 polling stations open in Moldova until 21:00 (19:00G) on Sunday, 30 were opened for voters from the mainly Russian-speaking breakaway region of Transnistria, which borders Ukraine and is home to a Russian military base with 1,500 troops and a huge arms depot. Voters had to cross the River Dniester into Moldovan-controlled territory and local media showed images of cars streaming over a bridge to vote in the eastern town of Rezina. Whatever Russia's role behind the scenes, police said fugitive oligarch Ilan Shor had moved $39m (£30m) over two months from Moscow into Moldovan bank accounts in September and October, benefiting at least 138,000 voters.

  Shor denies wrongdoing but did promise cash handouts to people prepared to back his call for a "firm No" to the EU. He faces a lengthy jail sentence in Moldova for money laundering and embezzlement. Stoianoglo denies links to Ilan Shor but he does have the backing of the opposition pro-Russian Party of Socialists, led by ex-president Igor Dodon. A populist ex-mayor who came third has refused to back either him or Maia Sandu, criticising both in equal measure. "Do what you see fit. You must decide on your own," Renato Usatii told his supporters, blowing the race wide open.
