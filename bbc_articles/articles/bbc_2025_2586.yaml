content: |-
  The former solider collected information and passed it to Tehran, before escaping from HMP Wandsworth.

  Daniel Khalife has been sentenced to 14 years and three months in prison after being found guilty of spying for Iran and escaping from HMP Wandsworth.

  The former solider collected information and passed it to Tehran, received payments and travelled to Turkey to meet foreign intelligence agents.

  At Woolwich Crown Court on Monday, Justice Cheema-Grubb said Khalife's offending was motivated by a "selfish desire to show off", and described him as "a dangerous fool".
