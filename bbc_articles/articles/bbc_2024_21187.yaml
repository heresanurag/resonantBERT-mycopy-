content: |-
  The trustee of the Belfast Multi-Cultural Association says the "majority" of the community feels unsafe.

  'My kids haven't left the house in a week'

  Mr Atif says "the majority" of his community feels unsafe

  A trustee of the Belfast Multi-Cultural Association (BMCA) has said "the majority of the community" feel unsafe and haven't left their homes "for weeks". "My own family haven’t left the house for a week now, this is what the situation is," Muhammad Atif told BBC News NI. "My wife hasn't even left the house to go and get a bottle of milk, that has to change." There have been a series of racially-motivated attacks and violent disorder since Saturday, following an anti-immigration protest in Belfast. In a statement, the Police Service of Northern Ireland (PSNI) said the chief constable had met Mr Atif about his concerns.

  There have been violent scenes across Belfast in recent days

  Mr Atif's comments came ahead of a major security operation in Belfast, following five nights of unrest. When asked if he believed that the Police Service of Northern Ireland (PSNI) would “stand in the way of harm to protect you”, Mr Atif replied: “No, definitely not”. Mr Atif said distrust in the PSNI was not something "new" for those from ethnic minority communities. “What police [have] missed once again is to prevent many things happening,” he said. “I feel like they allowed people to go and do the damages that were done on Saturday night and even after.”

  Several businesses were set alight during last weekend's disorder, however this "could have easily been prevented", according to Mr Atif. "I'm not sure what it'll take for them to take us seriously," he added. Arson attacks against the BCMA - treated by police as hate crimes - badly damaged its centre in Donegall Pass in January 2021 and April 2022. Last year, the association listed the building for sale "with a heavy heart". "I feel like we’re talking [about] exactly the same situation," Mr Atif said.

  The BMCA's former building was attacked multiple times before its closure last year

  In response, Ass Ch Cons Melanie Jones said: “We have been directly engaging with all communities, especially those minority communities who have been more acutely impacted by the recent disorder. “We reaffirm our commitment to all communities to provide reassurance and support during these frightening times." She said the chief constable and other senior colleagues in the Police Service of Northern Ireland had personally met Mr Atif to listen to his concerns and that engagement would continue. On Wednesday, in a direct message to Muslim communities in Northern Ireland, Chief Constable Jon Boutcher pledged that officers would be "standing beside you".
