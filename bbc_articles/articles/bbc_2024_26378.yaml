title: M40 driver attacked near Beaconsfield in fake police car robbery - BBC News
date: '2024-10-26'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c8xpe0y2l41o
content: |-
  The victim, in his 30s, suffered a broken jaw and eye socket in the attack, police say.

  The victim was driving along the M40 when the fake police car directed him to pull off at junction two following a minor collision with another vehicle

  A motorist suffered a broken jaw and eye socket during a robbery in which his vehicle was pulled over by a fake police car after a motorway collision. The victim was attacked by a group of men after he was directed to pull over into a layby by a car with blue lights following a collision with another car on the M40 southbound between High Wycombe and Beaconsfield in Buckinghamshire. After pulling off at junction two and parking in a layby on the A355 near the Pyebush roundabout, the man, in his 30s, was grabbed from his car and robbed of his phone, wallet and keys. "Impersonating a police officer is an offence that we will not tolerate," said PC Mollie Dugmore of Thames Valley Police.

  "We are appealing for information following this incident." The victim sustained grievous bodily harm in the assault, and was taken to hospital but has since been discharged. Police have just released details of the attack, which happened at about 21:15 BST last Sunday. A force spokesman said following the motorway collision, which resulted in "minor damage", the man had believed he was being pulled over by a police vehicle, but the car was not thought to have had any other markings. The attackers were believed to have travelled in a red Nissan and dark-coloured Volvo. Police are urging anyone with footage from the M40 or surrounding areas from about 21:10 to contact them.

