id: bbc_2017_11372
title: Moment Iran-Iraq quake hits Darbandikhan Dam control room - BBC News
date: '2017-11-13'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-41973049
content: |-
  There a fears the Darbandikhan Dam could burst following a 7.3-magnitude earthquake which hit the northern border region between Iran and Iraq.

  CCTV captured the moment the earthquake in the Iran-Iraq border region shook the control room of the Darbandikhan Dam. A huge boulder could be seen crashing onto the road outside.

  Authorities initially feared the dam might burst, but now say it has withstood the 7.3-magnitude earthquake without major cracks, AFP reports.
