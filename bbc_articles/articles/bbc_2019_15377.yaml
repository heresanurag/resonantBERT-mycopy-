title: 'London stabbings: Two dead and two injured - BBC News'
date: '2019-12-20'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-50861843
content: |-
  Two men are dead and two others are in hospital after separate stabbings in London.

  Police were called to Bromley Road at about 19:15 GMT on Thursday

  Two men have been stabbed to death and two others injured in separate attacks across London.

  A man in his 20s was pronounced dead at the scene in Bromley Road, Walthamstow, at about 19:15 GMT on Thursday.

  In an unrelated incident, a man in his 30s died after being attacked and was found dead in a car near Scratchwood Park in Barnet at around 20:30.

  Another man in his 20s suffered stab wounds in the same incident and was taken to hospital.

  An arrest has been made in connection with the Walthamstow stabbing, police said.

  The Met added that a man in his 20s who was also found injured in Bromley Road, was taken to hospital with non life-threatening injuries.

  It is the third killing in London in as many days after Albert Amofa, 33, died in hospital on Tuesday afternoon.

