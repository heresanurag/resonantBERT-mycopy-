  He added, "I've lived with years of news reports about me being accused of fabricated, heinous acts, with few telling the story of the accuser getting arrested, and my innocence".

  Brittney Lewis made her claims in The Wrap, which also spoke to her best friend, husband, ex-husband and grandmother.

  Lewis said she reported the incident to the FBI in 2007.

  Copperfield's statement about false accusations refers to an incident in 2007, when pageant winner Lacey Carroll accused him of inviting her to his home in the Bahamas and then sexually assaulting her.

  The Las Vegas performer, who earned $61.5m (£43.1m) last year, wrote: "Always listen, and consider everything carefully".

  "But please, for everyone's sake, don't rush to judgement."

  The case was investigated by the FBI, but was dropped in 2010 after Carroll was arrested for allegedly falsely claiming she was assaulted by another person.

