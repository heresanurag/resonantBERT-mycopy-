title: David Copperfield responds to sexual assault allegation - BBC News
date: '2018-01-25'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-42816365
content: |-
  The world's highest paid magician responded to a claim he assaulted and drugged a woman in the 1980s.

  David Copperfield has responded to an allegation that he drugged and assaulted a model in 1988.

  Brittney Lewis suggested the incident took place when she was 17 years old during a modelling competition.

  The world's highest paid magician released a statement on Instagram saying he supported the #MeToo movement.

  Copperfield, 61, said he had been the victim of false allegations in 2007 and was having to "weather another storm".

