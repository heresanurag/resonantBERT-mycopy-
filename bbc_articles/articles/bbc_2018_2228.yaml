title: Heart transplant patient Hannah Jones reunited with surgeon - BBC News
date: '2018-02-19'
section: General
url: http://www.bbc.co.uk/news/uk-43110989
content: |-
  Heart transplant patient Hannah Jones is reunited with her surgeon live on BBC Victoria Derbyshire.

  A woman who refused to have a heart transplant at the age of 13, but later changed her mind, has been reunited with her surgeon live on TV.

  Hannah Jones, now 22, expressed surprise as her surgeon, Dr Victor Tsang, arrived to meet her on the BBC's Victoria Derbyshire programme - almost 10 years on from her surgery.
