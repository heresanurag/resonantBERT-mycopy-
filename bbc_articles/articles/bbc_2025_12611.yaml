  Boss Pets in Bootle was told by Hugo Boss it had to stop using the name or face legal action.

  Hugo Boss wants Liverpool pet store to change name

  Ben McDonald was told by Hugo Boss he could not call his company Boss Pets

  An online pet health supplies shop has received a legal letter from Hugo Boss over its name. Ben McDonald, from Bootle on Merseyside, set up Boss Pets in February, but this month received the letter from the designer brand demanding he stop using the word, which is widely used in the area to suggest something is great. Mr McDonald said his "whole world collapsed" after being told he faced the potential legal battle over concerns people might think the companies were linked. A spokeswoman for Hugo Boss said: "We are aware that the English word 'boss' is one that is commonly used."

  She added that "nevertheless, it's our responsibility to monitor and protect our brand rights globally and address unclear cases where needed". "When we became aware of the registration, we have approached the business owner as the intended registration represents an overlap with our trademarks. "As an international fashion company, we need to – like any other corporation – take measures to protect our existing trademark rights. These measures apply to both of our brands, BOSS and HUGO." She said the firm "only approaches third parties where an overlap with our existing trademark rights occurs, and as a matter of principle we always seek for a dialogue in favour of an amicable solution for both sides".

