  Mr McDonald's own lawyers have argued that the firm, a pet health supplies business, was operating in an entirely different sector, using a commonly used term, and that there was no likelihood of confusion. Mr McDonald, who described himself as "just a lad from Bootle", said he had been given 10 days to take down his website or face legal action. He said he had spent "every spare penny" on his new website for his pet-related products. His lawyer Francis McEntegart said Mr McDonald did not have a case to answer and was accusing the clothes retailer of bullying his client. "My client is a small local business that is just starting out selling pet wellness products, it's not going to interfere with the profits of Hugo Boss in any way."

