content: |-
  Cole Palmer is named the England men's player of the year for 2023-24.

  Cole Palmer has scored twice in nine England appearances

  Cole Palmer has been named the England men's player of the year for 2023-24. Voted for by the public, the Chelsea forward was picked ahead of Jude Bellingham and Bukayo Saka, who finished second and third respectively. Palmer only made his debut for the Three Lions in November last year - in a 2-0 win against Malta at Wembley. He has represented his country nine times, starting a game twice, with five of those appearances coming at Euro 2024, where he scored in the final against Spain as Gareth Southgate's side lost 2-1. The recognition comes after he was named PFA young player of the year for 2023–2024 in August, following his superb debut season at Chelsea. Palmer, who joined the Blues from Manchester City last summer, scored 25 goals in all competitions. He has scored twice for England and is expected to be involved in the upcoming Nations League fixtures against Greece on Thursday and Finland on Sunday. The 2023-24 England women’s player of the year is set to be announced later this month.

  Palmer is the first Chelsea player to receive the recognition since Ashley Cole in 2010. Frank Lampard also won the award while at the Blues. Arsenal's Saka was named men's player of the year in the past two seasons, while Harry Kane, Wayne Rooney and David Beckham are also past winners.
