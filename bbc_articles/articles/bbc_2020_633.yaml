title: 'Australia fires: ''Ghostly feel'' in Kangaroo Valley - BBC News'
date: '2020-01-05'
section: General
url: http://www.bbc.co.uk/news/world-australia-50998326
content: |-
  The BBC's Phil Mercer reports from Kangaroo Valley, New South Wales, where fires are smouldering.

  Cooler temperatures in south-eastern Australia have provided some reprieve but are not enough to put out the ongoing bushfires.

  The BBC's Phil Mercer reports from Kangaroo Valley in New South Wales.
