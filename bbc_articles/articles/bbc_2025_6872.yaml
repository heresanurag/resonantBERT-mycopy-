content: |-
  England's depth is unmatched across the Women's Six Nations, with internal competition driving John Mitchell's side to a seventh championship in a row.

  Former captain Marlie Packer (centre) has travelled with England to Cardiff and Cork, despite not being in the matchday 23

  Coverage: Watch live on BBC Two, BBC iPlayer and online, listen on BBC Radio 5 Sports Extra and BBC Sounds, live text and video highlights on the BBC Sport website and app

  Lock Abbie Ward laughed when it was suggested England have not been put under enough pressure. Three comfortable bonus-point wins, 34 players used, and a winning run that now spans 23 games. You can see why suggestions have been made that the Red Roses are in need of a proper test before a home Rugby World Cup starts in August. Having not lost against Scotland since 1999, Saturday's game in Leicester looks like another routine five points to set up a Women's Six Nations Grand Slam-decider against France at Allianz Stadium on 26 April. With the gap still wide between England and the other home nations, lock Ward, 32, revealed pressure comes in plentiful supply on the training field. England's depth is unmatched across the Six Nations, with head coach John Mitchell clear in the lead up to the championship that he needed to develop "two teams" to compete this year.

  This video can not be played To play this video you need to enable JavaScript in your browser. England beat Scotland with a 14-woman squad in the Women's Six Nations 2024

  Mitchell opted to only make three changes from his side's hammering of Wales in Cardiff to the comfortable win in Ireland last Saturday, with a large majority of his frontline stars, who were involved in last year's Grand Slam win over France in Bordeaux and WXV1 title triumph, starting. Nine changes for the game against Scotland offers a perfect opportunity for some big names to play their way into a potential title showdown. Holly Aitchison - Mitchell's preferred fly-half option last year - starts her first game at 10 this Six Nations and will want to show off the running game that originally gave her the edge on in-form Zoe Harrison. Aitchison's half-back partner Lucy Packer continues to look lively off the bench and is rewarded with a start as she looks to add to her four try assists - the joint-highest in the tournament - to prove worthy of a spot over Natasha Hunt. Former England captain Marlie Packer returns at open-side flanker to start her first game since the opening-round win over Italy. The 35-year-old has lifted the Six Nations trophy over the past two years but was replaced by Zoe Aldcroft in January as skipper. Packer's involvement for Saracens in the Premiership Women's Rugby final, which was played a week before the opening Six Nations game, was factored into her management. But back-to-back strong performances from Loughborough Lightning's Sadia Kabeya has put pressure on the 2014 World Cup winner. Maddie Feaunati's switch to number eight has been a huge success this campaign and with World Cup winner Alex Matthews now back up to speed, even a back row bench spot is hugely competitive. "There are going to be some really difficult decisions to be made, but it is in their hands to play their hearts out," former Wales captain Philippa Tuttiett told BBC's Rugby Union Weekly. "You want some older senior players in your squad, whether England have younger senior heads that can do that, I am not too sure." Powerful Gloucester-Hartpury centre Jade Shekells was a surprise inclusion for her first Red Roses start on Saturday. Having only re-joined XVs from sevens at the start of the season, her punch in the carry caught the interest of Mitchell who then capped the 28-year-old against Italy, to add another player to a list of talented centres. One of those centre options is 117-cap Emily Scarratt, and like Packer she returns to the matchday squad for her first appearance since the opening round. "We are completely blessed at the minute to have so much strength and depth with so many good youngsters," 2014 World Cup-winner Scarratt told BBC Sport. "Competition within the team is awesome and really making everyone step up and push on." The fact a Grand Slam-decider could occur without a fit Packer or Scarratt shows Mitchell's mission to grow "two teams" is reaching its required destination.

  Centre Emma Orr has been a standout performer for Scotland with two tries this Six Nations

  England are chasing a seventh Six Nations title in a row and a fourth successive Grand Slam. Despite 23 Six Nations wins in a row against Scotland, with the past five encounters being settled by an aggregate score of 266-22, Ward said the Red Roses need to keep an eye on her dangerous Bristol Bears team-mates. Hooker Lana Skeldon, number eight Evie Gallagher and centre Emma Orr play in the Premiership Women's Rugby competition with the Bears and start in Leicester. "Scotland have got some incredible players, I know that from being at Bristol. I play alongside some of the best Scotland players there are," Bristol's Ward told BBC's Rugby Union Weekly. "They will absolutely turn up for England, it is a huge game for them. We are expecting them to turn up with fire in their bellies. "It is about putting together that full 80-minute performance."
