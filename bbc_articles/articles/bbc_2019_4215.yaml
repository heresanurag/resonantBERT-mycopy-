  • None Son Heung-min has scored as many goals in 40 games in all competitions this season for Spurs as he managed in 53 appearances in the whole of 2017-18 (18 goals).
  • None Tottenham have won 13 of their past 16 home matches in all competitions (D1 L2).
  • None Manchester City's Sergio Aguero has missed more Champions League penalties than any other player since his debut season in the competition in 2008-09 (four).
  • None Spurs goalkeeper Hugo Lloris has saved all three of the penalties he has faced in all competitions in 2019, saving efforts against Leicester City, Arsenal and now Manchester City.
  • None City have been eliminated from all three of their previous Champions League knockout matches when they have lost the first leg.
  • None There were eight Englishmen in the starting XI for this match - Rose, Trippier, Winks, Alli and Kane for Spurs, Delph, Walker and Sterling for City - the most in a Champions League match since the 2008 final between Chelsea and Manchester United (10).

  Tottenham host Huddersfield Town in the Premier League at lunchtime on Saturday, 13 April (12:30 BST), while Manchester City travel to Crystal Palace on Sunday (14:05).
