title: Cambridgeshire Muslims begin Ramadan, holy month of fasting - BBC News
date: '2025-03-01'
section: England
url: http://www.bbc.co.uk/news/articles/c0kgxnd83nmo
content: |-
  Ramadan starts with sighting the crescent moon and most mosques observing the first day on Saturday.

  The holy month of Ramadan will conclude with Eid-al-Fitr celebrations

  The holy month of Ramadan has begun with thousands of Muslims across Cambridgeshire and Peterborough taking part. It is the most important time in the Islamic calendar where Muslims fast and refrain from eating or drinking between dawn and sunset. Muslims also believe it is a time for self-reflection and renewing their faith to Allah, with giving charity also know as zakat and reciting special evening prayers known as Taraweeh, being an important aspect of the month. The month begins after the sighting of the crescent moon, with most mosques in Cambridgeshire starting their first fast on Saturday, while some are expected to start on Sunday.

  During the fast, two meals are eaten - one before the fast begins at dawn known as suhoor and another at sunset known as iftar where families sit together and break their fasts with dates and water. All adults who are well and fit are obligated to fast during Ramadan, with young children, pregnant woman, elderly and sick people exempted. During the holy month, mosques open their doors for iftars most days.

  Cambridge Central Mosque and Khadijah Mosque in Peterborough are among many others opening their doors to Muslim worshippers for iftar. Community iftar or open iftar events are gaining popularity as well around the country where people of diverse communities and all faiths join Muslims in breaking their fasts and share a meal. The Ramadan Tent Project, a charity bringing communities together in Ramadan is hosting an open iftar at King's College in Cambridge on Friday, 7 March, while similar events called as unity iftars are expected to be held in Peterborough by the UK Islamic Mission. The month of fasting usually last about 30 days and concludes with the festival of Eid-al-Fitr, which is a time of family celebrations following congregational prayers.

