  As well as music, ticketholders can enjoy poetry, comedy, circus acts, and even pottery throwing. Health guru Joe Wicks launched The Park Stage at 10.00 on Friday with a morning workout; while BBC Radio 3 presenter Georgia Mann eased festivalgoers into the day with a classical DJ set in the Crow’s Nest. Speaking beforehand, she said: “We want to take classical music out of its box. And we want to show everybody that this music doesn't need to be kept in a very solemn concert hall. "It can absolutely stand on its own alongside reggae and rock and pop.”

  Shortly after lunchtime, Seventeen will become the first K-pop band to play the Pyramid Stage, joining a bill that also includes Paul Heaton and LCD Soundsystem. “We’ll keep coming back to that feeling and do our best to prepare, so that we can blow everybody away... Not just our fans, but every other member of the audience.”

  This video can not be played To play this video you need to enable JavaScript in your browser. Fans who arrived on Wednesday were treated to a spectacular drone show

  Performance artist Marina Abramovic will also hold a seven-minute silence for peace on the Pyramid Stage, shortly before PJ Harvey’s set at 18:00. “We’ve been working on this for a while,” said organiser Emily Eavis, without giving away too many details. “She’s going to speak from the Pyramid and then she’s got a plan... which I’ll leave to her to describe,” she told BBC 6 Music. This year marks the first time in Glastonbury’s history that the festival will have two female performers at the top of the bill. Eavis said achieving gender balance across the line-up was a “huge passion project” – adding that she was particularly proud of giving Dua Lipa her first UK headline slot. “We’re creating a moment for her. And that's really as exciting as anything.”

  Lipa last played at Glastonbury in 2017, in an afternoon slot at the Woodsies tent. Four weeks later, she released the video for her breakout hit New Rules, and her career took off. Since then, she’s become a seven-time Brit Award winner, largely thanks to her pandemic-era, kitchen disco soundtracking Future Nostalgia album. She was offered the headline slot last November, as she began the roll-out for her third album, Radical Optimism. “When something like that comes along, you just don't say no to it,” she told the BBC. Headlining the festival had been on her bucket list since she recorded her first album in 2018, she added. “It's the greatest place on Earth. Just the sense of community and togetherness and having fun and taking care of one another. It's just beautiful.”
