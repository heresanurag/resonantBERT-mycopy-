title: 'Glastonbury: Dua Lipa to ''throw a party'' on the Pyramid Stage - BBC News'
date: '2024-06-28'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4ngd04v850o
content: |-
  The pop star headlines on Friday, after performances by LCD Soundsystem, Sugababes and PJ Harvey.

  Dua Lipa last played Glastonbury in 2017, before the release of her breakout single New Rules

  After two days of build-up, Glastonbury Festival kicked into gear on Friday, the first full day of music on the main stages. Veteran band Squeeze kicked off proceedings on the Pyramid Stage at midday, racing through hits like Hourglass, Up The Junction and Pulling Mussels. "This is what Glastonbury's all about - smiling faces," declared frontman Glenn Tillbrook. Pop star Dua Lipa is the opening night headliner, and is expected to play disco-pop anthems like New Rules, Don’t Start Now, One Kiss, Levitating and Houdini. “I’ve got to figure out a way to make 150,000 people feel like they’re in a small little nightclub,” she told the BBC earlier this year. “That’s the goal, and if there’s one place to do it, it’s got to be Glasto.”

  Fans gathered to watch Squeeze kick off the action on the Pyramid Stage

  The star has been rehearsing her set in Birmingham all week, following warm-up shows earlier this month in Croatia, Germany and France. The rehearsals were briefly interrupted by a TikTok influencer who broke in and tried to film the star, according to The Sun, external. However, they were intercepted before they made it into the studio. Genuine behind-the-scenes footage was posted last month by Lipa's friend and fashion designer Guiliano Calza, who shared a snippet of her athletic dance breakdown during Houdini on Instagram, external. The show will also include “incredible surprises and some unexpected moments”, said Lipa’s record label boss, Max Lousada. “She’s just going to bring the party to Friday night,” he told Variety magazine., external For the first time ever, the star's Glastonbury performance will be broadcast outside the UK, via a livestream on BBC.com.

  DJ Annie Mac worked the crowd on the Other Stage

  The main stages opened for business on Friday morning, with Peru's Sofia Kourtesis up first in the West Holts arena. Pirouetting around the stage in a flowing white dress, she warmed up the crowd with a sun-shiny blast of tropical house at 11.00 BST. "This is such a big dream for somebody from South America," she told the audience. "I am very lucky to have all of you supporting me." Shortly afterwards, Brazilian environmentalist Chief Raoni opened the Other Stage - the festival's second-biggest arena - with an impassioned speech about the Amazon rainforest. "Politicians are constantly attacking our land," he said, speaking through a translator. "They want to destroy everything. We have to stop them. I need your help." He was followed by DJ Annie Mac with a set of uplifting dance anthems, including That's How The Good Lord Works, Everybody's Free and a bass-heavy remix of Hall & Oates I Can't Go For That (No Can Do). "Time to wake up the campsites!" she laughed.

  Indonesian all-female Muslim metal band Voice of Baceprot were the first act in the Woodsies tent

  Other headliners across the weekend include Coldplay, SZA and country star Shania Twain, who says she wants to “ride a horse to the stage” when she plays on Sunday. However, festival organiser Emily Eavis said she’d previously turned down that exact request. “It's unfair on the horse because it’s so busy,” she said, without confirming who had demanded an equine entrance.

  Shania Twain follows in the footsteps of Kylie, Dolly Parton and Lionel Richie by playing Glastonbury's legend slot

  Glastonbury is the UK’s biggest festival, with more than 100 stages catering to 200,000 fans over the course of the weekend. Early birds were treated to a spectacular drone display on Wednesday night, while Thursday saw music begin on the outer stages - with DJ sets by The Orb, MJ Cole, Kurupt FM and Skream. The festival's co-founder, Sir Michael Eavis, also made an appearance on The Park Stage, singing covers of Frank Sinatra's My Way and Elvis Presley’s Suspicious Minds. The 88-year-old, who performed from a wheelchair, received a warm reception from the crowd, who chanted "we love you Michael" between songs. "Thank you very much," he responded. "That's fantastic, thank you."

