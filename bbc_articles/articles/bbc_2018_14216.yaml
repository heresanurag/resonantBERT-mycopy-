content: |-
  American Simone Biles becomes the first gymnast to win 13 world gold medals.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Biles breaks another record with this vault

  American Simone Biles has become the first gymnast to win 13 world titles. The 21-year-old won vault gold at the World Championships in Qatar. It was her third world title in this year's Championships and she has now broken the all-time record set by Belarusian male gymnast Vitaly Scherbo in 1996. On Thursday, Biles made history by becoming the first woman to pick up four all-around world titles after winning the team and all-around events. The favourite for vault gold received a mark of 15.366 - ahead of Canada's Shallon Olsen and Mexico's Alexa Moreno. She also picked up silver in the uneven bars - her first international medal on that apparatus.

  Biles told BBC Sport: "I am very excited. I have worked especially hard on the uneven bars. I am proud of the outcome so far. "The uneven bars medal is my favourite because I have worked so hard in that event." The gymnast had not competed internationally since the 2016 Olympics, then on the eve of the Championships she was admitted to hospital with a kidney stone. In January she revealed she had been sexually abused by a former Team USA sports doctor. This was Biles 17th World Championship medal overall and she is three shy of the all-time record of 20, held by Russia's Svetlana Khorkina.

  Simone Biles has won three gold medals at this year's World Championships in Doha
