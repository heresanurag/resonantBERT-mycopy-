  Having stabilised the virus just a few weeks ago, Spain is again struggling to keep it under control.

  Gyms and leisure centres 'will be in financial hole for years'

  As we know, some indoor gyms and leisure centres have been reopening in England on Saturday after coronavirus restrictions were eased. But the leisure sector has warned that it will struggle due to the financial impact of being closed for months during the government lockdown. Mark Sesnan, chief executive of GLL, the UK's largest operator of public leisure facilities, says gyms and leisure centres will be unable to dig themselves out of a "financial hole" caused by the closures for around "two to three years". He said: "The reality is, you've got a business that has no income, and still has half the costs. Even though the furlough scheme, which has been very helpful, pays the staff costs - or most of them - the other half of our costs we've had to cover ourselves. "We've used our reserves to pay for that, but they're running out and running out fast. So getting open is important, but actually running at half capacity, as you can guess, is still not going to solve the problem." The District Councils' Network (DCN) is also warning of the "uncertain future" faced by gyms and leisure centres, pointing out that the sector is expected to lose about £305m this year
