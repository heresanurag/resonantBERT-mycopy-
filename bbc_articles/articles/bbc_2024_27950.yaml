  Mike Tyson slaps opponent Jake Paul during chaotic weigh-in scenes in Dallas, Texas.

  Mike Tyson slaps opponent Jake Paul during a chaotic weigh-in before their controversial heavyweight fight, with the YouTuber claiming he "didn't feel it".

  Undisputed light-welterweight champion Katie Taylor and Amanda Serrano also weighed in for their re-match on the same card in Dallas, Texas on Friday.

  You can follow live text commentary of Mike Tyson v Jake Paul from 03:00 GMT on Saturday, 16 November on BBC Sport website & app.
