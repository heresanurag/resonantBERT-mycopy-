title: 'Notting Hill Carnival: How I met my husband - BBC News'
date: '2024-08-24'
section: London
url: http://www.bbc.co.uk/news/articles/clyw4gpj0vro
content: |-
  Sheyi and Simon went to carnival to party - but ended up falling in love.

  Sheyi has reflected on the "amazing memories" she has had at Notting Hill Carnival over the years, including meeting her husband

  Just a girl standing in front of a boy... surrounded by steel pans and dancers in sparkly, feathered costumes. It might sound like a scene from a well-known romcom, but the setting for this love story was London's vibrant Notting Hill Carnival. Sheyi had been to the famous event every year since she was 10 years old. Then at 24, the seasoned party-goer ended up meeting the love of her life in a "twist of fate".

  The couple's daughter Isabella has a special love for the carnival because her parents met there

  As carnival fever kicks in again this summer, Sheyi has been reflecting on the "amazing memories" she has had at the event over the years. And one of them was meeting her husband, Simon. "My husband grew up on a farm in Winchester and happened to be in London because he was about to start his first teaching job in Tottenham," said Sheyi, who now runs a tutoring business with her husband and lives in Acton, west London. "That is why he was in London in the summer of 2012 and his friends said he had to come to the carnival and then he happened to end up at the party I was at."

  Now aged 36, with two young children - Isabella, five, and Noah, who is nearly five months old - she said Notting Hill Carnival sometimes "gets bad press" but there was much more good than bad. Welcoming people from all walks of life, it has seemed particularly needed after a month that saw racist rioting across the UK. "I have amazing memories there and in general I think it's a really great way to celebrate black culture," she said. "I remember the first time I was taken to the carnival by my aunt actually, when I was about 10. "I was really fascinated by and loved the dancing, atmosphere, food and music," she said. "I always use it as a place to take my friends who are not British and we've always had an amazing time."

  It has become a family tradition since Isabella's first carnival in 2022. As well as enjoying eating patties and watching the floats, Sheyi said her daughter was really "excited" to hear how special Notting Hill Carnival has been for her parents. "Each time she's gone since she's had such a good time," she said. "I have always had core childhood memories from it as well and then I obviously met my husband there and then got to take my daughter there."

  Sheyi, who has previous childhood memories of the carnival, now shares the experience with her family

  Sheyi has only ever missed carnival when it went online due to Covid and when she was heavily pregnant. She said the police and the councils for Westminster and Kensington and Chelsea ensured safety was a priority. "I've always found the policing pretty good, especially in the past five to six years" she said. "I think the councils in charge take really good care of the area and really help to make the carnival an enjoyable experience.
