title: Moment inmates stage prison break in Indonesia - BBC News
date: '2025-03-12'
section: General
url: http://www.bbc.co.uk/news/videos/c4g04v1e0evo
content: |-
  At least 53 inmates escaped a prison in Aceh, Indonesia, with officials acknowledging overcapacity issues at the facility.

  At least 53 inmates escaped from Kutacane Penitentiary in Aceh, Indonesia, after breaking the main facility doors on 10 March.

  Footage shows inmates running across the roof and jumping over vendors in the area as they flee. Twenty-one of them have surrendered or been arrested, while 32 remain at large as of Wednesday.

  The escape happened during breakfast, when all inmates must queue to receive food.

  The incident is being linked to issues of overcrowding. Officials say the prison can accommodate 100 people, however, it is currently housing around 368, according to local media.
