  The Republican president's orders on immigration, transgender issues and government spending have also become bogged down in dozens of lawsuits in the lower courts. Those cases may ultimately wind up at the Supreme Court, too. Trump's efforts to reduce and reshape the 2.3 million-strong civilian federal workforce continued over the weekend. Workers in various health agencies who are still within their probation periods received letters on Saturday evening informing them they would be terminated, sources told CBS News, the BBC's US partner. "Unfortunately, the agency finds that you are not fit for continued employment because your ability, knowledge and skills do not fit the agency's current needs, and your performance has not been adequate to justify further employment at the agency," read the letters. At least 9,500 workers at the departments of Health and Human Services, Energy, Veterans Affairs, Interior and Agriculture have been fired by Trump, according to a tally from Reuters news agency. Another 75,000 workers have taken a buyout offered to get them to leave voluntarily, according to the White House. The cost-cutting initiative has been led by department of government efficiency, or Doge, a task force led by Elon Musk. Democrats have decried Musk, the world's richest man, as unelected and his actions as too sweeping - a "hostile takeover" in the words of the party's Senate leader Chuck Schumer.
