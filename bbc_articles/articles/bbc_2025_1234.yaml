  The leader of an independent whistleblowing agency sued after he was fired by email this month.

  Trump appeals to Supreme Court over firing of US agency boss

  Hampton Dellinger was fired in a one-sentence email this month

  President Donald Trump has asked the US Supreme Court to allow him to fire the head of an independent ethics agency that protects whistleblower federal employees. He has filed an emergency appeal to the country's highest court to rule on whether he can fire Hampton Dellinger, head of the US Office of Special Counsel. It is thought to be the first case related to Trump's blizzard of executive actions to reach the highest court. Trump has also cut more than a dozen inspectors general at various federal agencies and fired thousands of employees across the US government.

  Mr Dellinger, who was nominated by President Joe Biden, sued the Trump administration after he was fired by email this month. He argued that his removal broke a law that says he can only be dismissed for poor job performance and that was not given as a reason in the email dismissing him. The agency lists among its primary objectives the protection of federal employees from unlawful actions in reprisal to whistleblowing, according to its mission statement, external. A federal judge in Washington DC issued a temporary order on Wednesday allowing Mr Dellinger to hold on to his position while the case is being considered. District Judge Amy Berman Jackson said the firing broke US law which tried to ensure the independence of the agency and protect it from political interference. On Saturday, a divided US Court of Appeals in the nation's capital rejected the Trump administration's request to overrule the lower court.
