title: Robot teaches itself to ice-skate - BBC News
date: '2019-02-07'
section: General
url: http://www.bbc.co.uk/news/technology-46988569
content: |-
  The 3D-printed robot showed off its skating skills at the recent World Economic Forum in Davos.

  A robot made from 3D-printed modular parts has taught itself how to ice-skate.

  "The only thing we tell it is how one ice skate behaves on ice," says Prof Stelian Coros of the Computational Robotics Lab, ETH Zurich, explaining that after this stage the robot figures out how to move across the ice by itself.

