title: Israelis flee outdoor rave as Hamas militants attack - BBC News
date: '2023-10-08'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67044504
content: |-
  Distressing footage emerged of people fleeing an outdoor party near a kibbutz after Hamas launched a major offensive.

  On Saturday after Hamas launched a major offensive, distressing videos emerged of Israeli civilians running for their lives from a party near a kibbutz.

  Thousands who had been out for an overnight rave in fields close to Gaza rapidly found themselves under fire.
