title: Waterspout spotted off Philippines coast - BBC News
date: '2024-07-19'
section: General
url: http://www.bbc.co.uk/news/videos/c1we414lj89o
content: |-
  Footage shows the column of air and water near Misamis Oriental province on Thursday.

  Social media users capture footage of a waterspout moving off the Philippine coast on Thursday.

  The spout was spotted in the city of Opol, Misamis Oriental. Waterspouts are similar to tornadoes, but they form over a body of water.

  Local authorities said some homes in nearby villages lost their roofs, but no other significant damage was reported.
