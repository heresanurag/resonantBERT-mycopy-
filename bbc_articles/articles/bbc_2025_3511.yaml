title: UK revokes accreditation for two Russian diplomatic officials - BBC News
date: '2025-03-12'
section: Europe
url: http://www.bbc.co.uk/news/articles/cyve577j8mqo
content: |-
  It comes after two British officials were accused of spying and ordered to leave Russia on Monday.

  The UK has revoked accreditation for a Russian diplomat and a diplomatic spouse who will need to leave the country, after two British officials were expelled from Russia on Monday. In the latest in a series of tit-for-tats, the UK Foreign Office said it was taking "immediate reciprocal action" after Moscow accused a British diplomat and the spouse of another diplomat of spying The Foreign Office in a statement accused Russia of fabricating the accusations "to justify their increasing harassment of UK diplomats" and "actively seeking to drive the British Embassy in Moscow towards closure". Russia's embassy in London did not immediately respond to a request for comment.

  Russia's ambassador to the UK Andrei Kelin was summoned by a senior Foreign Office official on Wednesday, the statement read. The official "made clear that the UK will not stand for intimidation of British embassy staff and their families," and that the accreditation of the Russian diplomat and diplomatic spouse was being revoked as a result. An accreditation is a recognition by a government of a diplomat's status. The Foreign Office accused Moscow of pursuing "an increasingly aggressive and coordinated campaign of harassment against British diplomats" and "pumping out malicious and completely baseless accusations about their work" for 12 months. The statement alleged Russia was seeking to drive the UK embassy in Moscow to close and Russia had "no regard for the dangerous escalatory impact of this". The UK government believes in "maintaining diplomatic channels of communication" with Russia, "despite the extremely difficult bilateral relations caused by Russia's illegal invasion of Ukraine and long-running campaign of hostile action against the UK", the statement continued. The UK's move follows Russia ordering two British officials to leave within two weeks, after the country's domestic security service accused the men of "intelligence and subversive work". The Federal Security Service (FSB) claimed they had declared false information about themselves when receiving permission to enter Russia. Multiple expulsions of diplomats have taken place amid worsening Russia-UK relations since Moscow's invasion of Ukraine in 2022. In the past year alone, there have been seven British diplomats expelled from Russia, with Moscow accusing them of espionage - allegations denied by the UK. In February, a Russian diplomat was expelled from the UK after Moscow ordered a British official to leave in November 2024. In September 2024, Russia announced that the accreditation of six British diplomats in Moscow had been revoked, requiring them to leave the country. In May 2024, British diplomat Capt Adrian Coghill was given a week to leave Russia. It came days after the Russian defence attaché was expelled from London for alleged espionage as an "undeclared military intelligence officer". A number of British politicians and journalists have also been barred from entering Russia since the war began. Prime Minister Sir Keir Starmer was added to Russia's "stop list" in 2022, barring his entry to the country.
