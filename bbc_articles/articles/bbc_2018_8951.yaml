  Dancers initially carried on with the performance before they were stopped by management.

  They received a standing ovation from an audience lit by the glow of mobile phones, the Adelaide Advertiser newspaper reported.

  The theatre's programming director Liz Hawkins told the Australian Broadcasting Corp the incident was unprecedented but patrons had responded with good grace.

  The ballet won't be rescheduled, but the audience will be given either a refund or some other form of compensation.

  The rat, it is presumed, did not make it.
