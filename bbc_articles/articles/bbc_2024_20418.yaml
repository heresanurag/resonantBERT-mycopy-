title: Venezuelan opposition leader addresses rally amid arrest threat - BBC News
date: '2024-08-03'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c0krrgypq70o
content: |-
  María Corina Machado appears at a protest in Caracas, defying threats of arrest from President Maduro.

  Venezuelan opposition leader María Corina Machado has addressed a mass rally in the capital Caracas, defying government calls for her arrest. Ms Machado went into hiding earlier this week after accusing President Nicolás Maduro of defrauding the opposition candidate, Edmundo González, of a clear victory in the presidential election. The president in turn has promised "maximum punishment" for anti-government demonstrators who say his re-election was rigged. The electoral commission - controlled by allies of Mr Maduro - has insisted he won with 52% of last Sunday's vote, but independent observers have said it lacked transparency.

  The commission has not published the full breakdown of results. The opposition has said its own vote tally shows it won the election by a wide margin. Opinion polls ahead of the election had suggested a clear victory for the challenger. On Saturday Ms Machado addressed thousands of her supporters in Caracas from a truck bearing a banner reading "Venezuela has won". "We have never been so strong as today," she told the crowd, adding that "the regime has never been weaker... It has lost all legitimacy". The opposition leader, who was blocked from running in the election, has spent days in hiding. Earlier this week, Ms Machado wrote in The Wall Street Journal that she had been left "fearing for my life", along with other opposition leaders. She was greeted by cheers of "freedom, freedom" and was accompanied by several other opposition leaders - but not Mr González. In a separate a video message he urged supporters to "respond to the regime's attacks with hope, harmony, and peace". Security forces in Venezuela have spent the past several days trying to contain mass protests. At least 11 people have died in clashes with police. Speaking to supporters in Caracas on Saturday, Mr Maduro said around "2,000 prisoners" had been detained since the election a week ago. He promised "maximum punishment" for them, adding: "This time there will be no forgiveness." The government is coming under increasing international pressure. US Secretary of State Antony Blinken said on Friday that there was "overwhelming evidence" that Mr González had won the election. His intervention comes as the presidents of Brazil, Mexico and Colombia all called on Venezuela to release detailed election results. Other regional governments, including Argentina, Costa Rica, Panama and Uruguay have all raised concern over the vote. But Mr Maduro has been backed by his allies in Russia, China and Cuba. He has asked Venezuela's top court to audit the voting tallies with a view to confirming the results, which handed him another six-year term in power. The opposition says the court is in the hands of government loyalists who will delay the publication of the tallies. Mr González boycotted court proceedings on Friday.
