title: Derby man left waiting more than a year for a wheelchair - BBC News
date: '2025-02-10'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/cpqlplpd4dxo
content: |-
  Rob Taylor says the long wait for a custom wheelchair is damaging his mental health.

  'I've been waiting over a year for a wheelchair'

  Rob Taylor says the delay is affecting his mental health

  "I've been waiting so long, it is affecting my mental health - it feels as if I'm just stuck and relying on everybody else." Rob Taylor has a spinal condition that means he is unable to walk unaided. The 56-year-old, from South Normanton, Derbyshire, was left with mobility issues after complications during spinal surgery in 2019. He was referred for a wheelchair in February 2024 but is still waiting to receive the custom piece of equipment.

  Rob can no longer work or drive and uses crutches to move small distances

  Rob has Cauda equina syndrome, which occurs when spinal nerves are put under pressure or squashed. He was referred to AJM Healthcare Wheelchair Service in Derbyshire by his physio at the spinal injuries unit at Sheffield's Northern General Hospital. "It took me about two months just to get an appointment to be measured," he told the BBC. "It would have been at the end of May [2024] that I went and they measured me up and showed me a couple of options, I decided to go for a lightweight sports one so I could easily get it in and out of the boot of the car." After the initial appointment Rob said he spent months "chasing" the whereabouts of his chair. "I have to do the chasing, they never ring me, I've explained my situation, I'm really struggling and I just get fobbed off," he said.

  Rob bought a wheelchair but found it was not the right size for him

  A spokesperson for AJM Healthcare said: "We are actively supporting the people affected to reduce any further unnecessary delay and/or miscommunication. "We know that a timely resolution is of the utmost priority for everyone experiencing an issue, and we are committed to strengthening our processes and ensuring that our communication channels are clear and effective." Rob currently uses two crutches to move around the house and to walk small distances. "There is too much fatigue and pain," he said. "I could hardly get to the car at the bottom of the drive with crutches, I've been needing a wheelchair for a while now. "We bought our own wheelchair but it's not suitable, it just doesn't fit right, it's far too small, my knees are under my chin so I never used it properly." Rob said losing his mobility had turned his life "upside down" as he was unable to work and was "nigh-on housebound". "I can't get out and about, I can't go anywhere with my wife and son," he said.

  Gary Dawson, support network manager at the Spinal Injuries Association, said Rob's situation was not uncommon. "Wheelchair services are massively burdened by being so underfunded and understaffed that it's become incredibly common for people to be waiting not only six months but potentially years for a custom piece of equipment that can be absolutely life-changing to them," he said. "When you can't access a piece of mobility equipment that's going to enable you to be independent, it means that you are stuck. "So that means all this rehabilitation that you've already gone through, the future that you've been set up for, all of a sudden has been taken away from you and completely put on hold while you're waiting for your own wheelchair." After the BBC contacted AJM Healthcare, the company provided Rob with a temporary wheelchair on Saturday, until a permanent one arrives at a later date.

