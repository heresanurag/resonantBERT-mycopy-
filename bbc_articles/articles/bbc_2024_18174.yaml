title: Brazil plane crash site 'a horror scene' says witness - BBC News
date: '2024-08-10'
section: General
url: http://www.bbc.co.uk/news/videos/ckg10mmne4mo
content: |-
  All 61 people on board were killed when a Voepass plane came down in São Paulo state.

  A plane has crashed in the Brazilian state of São Paulo, killing all 62 people on board.

  The aircraft was flying from Cascavel in the southern state of Paraná to Guarulhos airport in São Paulo city when it came down in the town of Vinhedo, Voepass airline said.

  Aerial footage shows the wreckage of the plane, described by a witness as "a horror scene".
