title: Essex police bodycam shows arrest at Southend cannabis farm - BBC News
date: '2025-03-21'
section: General
url: http://www.bbc.co.uk/news/videos/c05myqp0d74o
content: |-
  Officers forced entry to the property in Southend where they found plants being grown.

  Three men have been arrested after officers uncovered more than 150 cannabis plants at a property in Essex.

  The Southend Community Policing Team executed a warrant at an address in Redstock Road, after reports of suspicious activity.

  One man was detained as he tried to escape out of a window.

  The men, aged in their 20s and 30s, remain in custody for questioning on suspicion of production of cannabis.
