title: Russian ballet maestro Yuri Grigorovich dies age 98 - BBC News
date: '2025-05-20'
section: Europe
url: http://www.bbc.co.uk/news/articles/c4geede2g38o
content: |-
  Acclaimed Russian ballet choreographer, Yuri Grigorovich, received top Soviet and Russian honours.

  Yuri Grigorovich's productions of Ivan the Terrible and Romeo and Juliet redefined Soviet ballet

  Described as one of the greatest choreographers of the 20th century, he was artistic director of the Bolshoi Ballet from 1964 to 1995, which he is said to have led with an iron fist. Grigorovich's productions of the Stone Flower, Ivan the Terrible and Romeo and Juliet redefined Soviet ballet. Praised for revitalising male dance, he created parts for men demanding exceptional strength and artistry. Born in 1927, a decade after the Bolshevik Revolution, his work was steeped in the traditions of classical ballet.

  His uncle, Georgy Rozai, had studied under the legendary Vaslav Nijinsky and the young Grigorovich went on to dance as a soloist with the Kirov Ballet in Leningrad before turning to choreography. His departure from the Bolshoi in 1995, amid disputes over performers' contracts, led to the first ever dancers' strike at the theatre in its 200-year history. During a scheduled performance, a dancer emerged to inform the audience the show was cancelled, leaving a stunned silence.

  The Bolshoi Ballet was led by Grigorovich from 1964 to 1995.

  Following the Soviet Union's collapse, the Bolshoi faced instability. Grigorovich moved to Krasnodar to found a new ballet company. He returned to the Bolshoi in 2008 as a choreographer and ballet master. Grigorovich received top Soviet and Russian honours, including the titles People's Artist of the USSR and Hero of Socialist Labour. His wife, renowned ballerina Natalia Bessmertnova, died in 2008. His death came on the same day as that of one of his most celebrated collaborators, dancer Yuri Vladimirov, aged 83. Valery Gergiev, the controversial head of the Bolshoi and Mariinsky theatres, told Izvestia newspaper that Grigorovich was "a legendary figure who will continue to command respect and admiration for decades to come". Gergiev, a long-time backer of Russian President Vladimir Putin, has seen his global stature collapse since Russia's full-scale invasion of Ukraine, with major institutions across Europe severing ties due to his refusal to condemn the war. Known for endorsing Russia's seizure of Crimea and receiving top state honours, Gergiev remains a central cultural figure within Russia. In January, Putin wished Grigorovich happy birthday, calling him "the pride of the Russian ballet" who "embodies an entire era in the history of Russian".
