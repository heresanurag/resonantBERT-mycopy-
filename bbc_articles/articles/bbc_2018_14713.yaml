  Police said two HGVs, a box van and a recovery vehicle were involved in the crash.

  A woman is being treated in hospital after she had to be cut free from her vehicle, however police said her injuries were not thought to be life-threatening.

  North West Motorway Police, part of Cheshire Constabulary, thanked drivers for their "patience and support".
