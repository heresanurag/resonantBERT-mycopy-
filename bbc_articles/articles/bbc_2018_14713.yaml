id: bbc_2018_14713
title: M6 motorway in Cheshire reopens after multi-vehicle crash - BBC News
date: '2018-12-18'
section: England
url: http://www.bbc.co.uk/news/uk-england-46601585
content: |-
  The motorway was shut northbound between junctions 17 and 18 and traffic was diverted.

  The collision led to drivers being diverted off the motorway

  One woman was injured in a multi-vehicle crash which forced the closure of the M6 motorway in Cheshire.

  The collision led to a diesel fuel spillage across the motorway, which was shut northbound between junctions 17 and 18, Highways England said.

  North West Motorway Police officers were at the scene after the crash, at about 22:30 GMT.

  Drivers who were stuck in the closure were released when the road reopened at about 06:00 GMT.

