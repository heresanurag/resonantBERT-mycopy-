title: Scottish temperatures top 25C on warmest September day - BBC News
date: '2024-09-18'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cn031jjygjko
content: |-
  Parts of Scotland were as warm as Spain despite a wet summer for most across the country.

  Sunshine at the Riverside Museum in Glasgow on Wednesday

  September temperatures have hit 25C in parts of Scotland, in the highest figures recorded so late into a year since 2019. Kinlochewe in Wester Ross was the hottest part of the UK on Wednesday at 25.5C, about as warm as the Spanish city of Valencia. It has never recorded a temperature this high, this late in the year, since records began in the area in 1953. Aviemore also saw highs of 25.5C, Altnaharra in Sutherland hit 25.1C and Glasgow reached 23.8C.

  A scene near Aboyne on Tuesday when the temperature reached 24.6C

  On Tuesday, at Kirkwall in Orkney it was 21.4C, the highest it had been in the islands this late in the year since 1998. Wick in Caithness also experienced a temperature of 22.3C on Tuesday - a seasonal high for the time of year according to records going back to 1930. It comes after arctic air brought September snow to some of Scotland's highest mountains last week. Met Office data suggested last month in Scotland was cooler than average, and it was wet with western Scotland provisionally experiencing its third wettest August on record.
