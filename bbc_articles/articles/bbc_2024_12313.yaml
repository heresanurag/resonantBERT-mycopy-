content: |-
  Archaeologists excavated bottles from the plantation's basement. What they found inside blew them away.

  Archaeologists have excavated bottles from the basement of the first US president's Virginia estate.

  What they found inside blew them away.

  The glass contained perfectly preserved fruit, including cherries and possible gooseberries or currants.

  The fruits are believed to date back to Washington's time.
