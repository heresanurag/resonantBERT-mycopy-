  Celtic miss an opportunity to end their seven-year wait for an away win the in the Champions League, but are "gaining confidence" at this level, says Brendan Rodgers.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Celtic missed an opportunity to end their seven-year wait for an away win in the Champions League after being held by a weakened Dinamo Zagreb, but are "gaining confidence" at this level, says manager Brendan Rodgers. The Scottish Premiership leaders enjoyed almost 70% possession but struggled to cleave out clear chances against a Croatian side hampered by injuries. Paulo Bernardo and Luke McCowan both threatened from distance, and Adam Idah was denied by a last-ditch tackle, but the breakthrough did not come. It means Celtic have still not won away from home in this competition since beating Anderlecht seven years ago in Rodgers' first spell. "Yes, we needed to do more," said Rodgers. "It was an opportunity for us but you have to show a little bit more in those moments.

  "The positive is we've come away defensively strong and didn't concede. We had great energy, good commitment, but I thought we lacked quality in the final third. "In the Champions League, if you get a clean sheet and take a point away from home and you're not very happy, that shows how the team has progressed." Celtic now have nine points, with a home tie against Young Boys to follow in January, followed by a trip to Aston Villa. Another win should be enough to see them into knockout round, while less than that might still see them into February's next stage. "This group and team is gaining confidence at this level," said Rodgers, who confirmed the hip problem that curtailed right-back Alistair Johnston's game did not look overly serious. "We needed to do more, but we know that. That's cool. We know it was an opportunity for us, but you have to show that little bit more."

