title: Harshita Brella police investigated over contact with victim - BBC News
date: '2025-03-22'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/c93n4lx590do
content: |-
  Police believe the 24-year-old's husband killed her and has fled the country.

  Harshita Brella and her husband moved to the UK in April 2024

  Four police officers are being investigated over their interaction with a woman who police believe was murdered by her husband. The police watchdog said the officers had been served disciplinary notices over their alleged handling of a domestic abuse report by Harshita Brella. Detectives believe the 24-year-old was strangled by Pankaj Lamba, 23, in Corby, Northamptonshire, on the evening of 10 November. Her body was found in the boot of a silver Vauxhall Corsa about 100 miles away (160km) in Ilford, east London, four days later.

  Prosecutors have authorised Mr Lamba to be charged with murder, two counts of rape, sexual assault and controlling or coercive behaviour. However, he is believed to have fled the UK.

  Pankaj Lamba had already been arrested after a report of domestic abuse made by Ms Brella

  The Independent Office for Police Conduct (IOPC) said it was gathering and reviewing evidence regarding the contact the force had had with the victim. IOPC director Derrick Campbell said two were served disciplinary notices "at the level of gross misconduct" and two for "potential misconduct". "The gross misconduct notices on two detective constables cover alleged failings to progress inquiries and communicate with Ms Brella after her report of domestic abuse at the end of August 2024," he explained. "The misconduct notices on two more senior officers relate to their supervision of the case and relevant risk assessments." The notices meant the officers were under investigation but would not necessarily mean disciplinary proceedings would follow. Mr Campbell continued: "Our thoughts remain with Ms Brella's family and all those affected by her death. "We have met Ms Brella's family to update them on our investigation."

  The IOPC previously said Mr Lamba was arrested on 3 September, but was released on conditional bail and a domestic violence protection order was put in place. He was told to pay police £480 in costs and the order expired on 1 October. The charges being brought against Mr Lamba - who lived at Sturton Walk in Corby - were laid out at Northampton Magistrates' Court on Wednesday.

  The couple entered an arranged marriage in August 2023 and moved to the UK in April 2024. Ms Brella's mother, Sudesh Kumari, previously told the BBC from her home in Delhi that she wanted justice for her daughter. On Tuesday, police in India arrested Mr Lamba's parents on charges of causing Ms Brella's death by subjecting her to cruelty, following a complaint from her family. Indian police said they held the parents under what was locally called the "dowry death" law.
