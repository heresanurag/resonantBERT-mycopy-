  Tottenham boss Ange Postecoglou says their inconsistent start is down to him rather than his players after a fifth Premier League defeat.

  Tottenham inconsistency down to me - Postecoglou

  This video can not be played To play this video you need to enable JavaScript in your browser. 'It's down to me' - Postecoglou takes responsibility for 'hugely disappointing' defeat

  Tottenham head coach Ange Postecoglou says their inconsistent start to the season is down to him rather than his players. Spurs were beaten 2-1 by Ipswich on Sunday to lose for the fifth time in 11 Premier League games this season, leaving them 10th and 12 points off leaders Liverpool. They have progressed to the Carabao Cup quarter-finals but lost to Galatasaray in the Europa League on Thursday, having won their opening three matches in the competition. Tottenham's longest winning run in the league this season is two matches, and five across all competitions. When asked about the reasons for their inconsistency, Postecoglou told BBC Sport: "It's just down to me. I’m not getting consistent performances from the players. "It's something I need to address. I'm the person in charge so that's usually the way it goes. "I take responsibility when their performances don't meet the levels that they should." Asked by Sky Sports if it was a new feeling, he said: "No, I think it's been our season so far. It's been really inconsistent."

  Tottenham once again fell behind and trailed 2-0 at the break after goals for Sam Szmodics and Liam Delap. Rodrigo Bentancur's header gave Spurs hope but they were unable to force an equaliser. It was the 13th time Spurs have fallen 1-0 behind in 15 home Premier League matches in 2024. Only Spurs themselves in 1994 (14), Ipswich in 1994 (14) and Crystal Palace in 2017 (14) have fallen behind more at home in a single calendar year. "There are different reasons [to why it has happened]," Postecoglou told BBC Radio 5 Live. "Today was a bit different to other times. We were way too passive. "If you give the opposition that much of a head start it takes a lot to claw it back." After Tottenham's defeat by Arsenal in the north London derby in September, Postecoglou said "I always win things in my second season" at a club and added he "absolutely" thought Spurs could challenge for silverware this season.
