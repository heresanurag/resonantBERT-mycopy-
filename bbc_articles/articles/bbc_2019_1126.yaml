title: 'Brexit: MPs vote ''no'' to Theresa May''s deal - BBC News'
date: '2019-01-16'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46885617
content: |-
  The biggest ever government defeat in history sees Theresa May lose the vote by 432 to 202.

  Prime Minister Theresa May's Brexit deal has been rejected by 230 votes.

  It's the biggest ever government defeat in history.

  The so-called "meaningful vote" comes at the end of five days of debate over the plan.

  MPs voted by 432 votes to 202 to reject the deal, which sets out the terms of Britain's exit from the EU on 29 March.
