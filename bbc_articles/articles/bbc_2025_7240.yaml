title: Dad and son who drowned near Australia's Great Barrier Reef named - BBC News
date: '2025-04-23'
section: Wales
url: http://www.bbc.co.uk/news/articles/c8rg1g74zzro
content: |-
  Queensland Coroners Court names Robin and Owen Reed as the two Brits who drowned in Australia.

  Dad and son who drowned at Great Barrier Reef named

  Robin Reed and his son Owen were swept out to sea while swimming at a beach without lifeguards

  The two British tourists who drowned off the coast of a popular tourist town at the southern tip of the Great Barrier Reef have been named. Robin Reed, 46, and his son Owen, 17, who were from Caerphilly county in south Wales, were swept out to sea on 13 April while swimming at a beach without lifeguards in Seventeen Seventy, Queensland. The pair were declared dead at the scene after being pulled from the water by a police rescue helicopter. Treowen Stars FC, which is based near Newbridge in Caerphilly, posted a tribute to the pair on Facebook and said: "Robin was a good friend to many at Treowen and will be missed".

  The statement said: "Awful, awful news about Robin Reed and his son Owen. "Our thoughts and deepest condolences with Robin and Owen's family and friends. "Rest in peace both." Ryan Jones, from Pengam Boys and Girls Club, where Robin often helped out, said it was "hard to put into words" what had happened. "He'd been looking forward to this holiday. That's all we heard about for the past couple of months." Mr Jones said Robin played an important role at the club, as a "taxi driver" and helped out wherever he was needed, describing him as "Mr Bacon Rolls", because he always bought food for the players out of his own pocket.

  Local councillor, Carl Thomas said the "whole community is in shock". "I am fortunate enough to know a number of the family members that I'm sure are devastated at this sad time", he added. "On behalf of myself and the whole community I offer our condolences to the family and respect their privacy at this time". Ruth Jones, Member of Parliament for Newport West and Islwyn, also sent her condolences to the family, and said her office would contact the family to ensure the Foreign Office does everything it can to help them.

  Seventeen Seventy was named after the year Capt James Cook arrived in Australia. The Coroners Court of Queensland said: "The deaths Mr Robin Reed and his son, Owen have been reported to the Coroners Court of Queensland. "As the coronial investigations into the deaths are in initial stages, no further information can be released at this time."
