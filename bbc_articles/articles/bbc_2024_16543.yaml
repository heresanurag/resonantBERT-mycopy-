content: |-
  A man is held after a suspected murder attempt on a soldier in uniform near a Gillingham barracks.

  Knives seized after attack on Army officer in Kent

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A British Army officer who was stabbed near barracks in Kent is in hospital in a serious but stable condition, said police. The uniformed soldier, in his 40s, was attacked near his home on Tuesday in Gillingham. A 24-year-old man was arrested on suspicion of attempted murder shortly afterwards. The stabbing is not being treated as terror-related, the Home Office has indicated. Police have now said that a number of knives had been seized at the scene and that it was exploring the possibility that the incident may have been "mental health-related."

  Officers have been given a custody extension for the suspect, which Kent Police said will give them more time to conduct their enquiries. The soldier was attacked just before 18:00 BST in Sally Port Gardens, Gillingham. Acting Ch Supt Richard Woolley of Kent Police said: "The motivation for the attack is currently unknown and forms part of our ongoing enquiries, although we are exploring the possibility that it may be mental health-related. "We are also investigating any possible links between the location and the suspect." Prime Minister Sir Keir Starmer said on X that he was "shocked and appalled." Later he told the Commons: "Our thoughts are with [the soldier], his family and our armed forces, who serve to keep us safe. "We wish him a swift recovery."

  A forensic officer and sniffer dog look around where a moped was stopped

  The stabbing happened near Brompton Barracks, the headquarters of the British Army's 1 Royal School of Military Engineering Regiment. One woman living near the scene said she was sitting down to dinner with her family when they heard a "huge scream". As they got to the window, she said they saw the attacker inflicting a final stab wound on a person who was on the ground, before fleeing on a moped. "It's very, very scary," she said. Another witness, who lives close to the scene, said she heard the officer's wife call out: "My husband has been stabbed - is there a first aider?" The head of the Army, Gen Sir Roly Walker, said he was saddened by the horrific and unprovoked attack.

  Families reported hearing screams as they sat down for dinner

  The Army said it was "very sorry to confirm that a soldier has sustained serious injuries in an attack". "Our thoughts are with the soldier and their family and we request that their privacy is respected at this difficult time," a spokesperson said.
