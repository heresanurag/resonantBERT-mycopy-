  Los Angeles Angels pitcher Ben Joyce throws the fastest strikeout recorded in Major League Baseball history, striking out Tommy Edman with a 105.5mph fastball.

  Los Angeles Angels pitcher Ben Joyce throws the fastest strikeout recorded in Major League Baseball history, striking out Los Angeles Dodgers' Tommy Edman with a 105.5mph fastball.

  Only current Pittsburgh Pirates left-hander Aroldis Chapman has thrown two swifter pitches, reaching 105.8mph in 2010 and 105.7mph in 2016, but Joyce’s was the fastest pitch thrown for a strikeout.

