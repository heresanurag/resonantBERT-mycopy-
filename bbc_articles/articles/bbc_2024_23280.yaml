title: Fatman Scoop died of heart disease, medics confirm - BBC News
date: '2024-09-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5y9xp7d9xvo
content: |-
  The 56-year-old hip hop star died aged 56 after collapsing on stage in August this year.

  The rapper and hip hop star Fatman Scoop died of heart disease, US authorities have confirmed. He collapsed on stage at a show in Connecticut in August and died later in hospital at the age of 56. A spokesperson for the office of the chief medical examiner in Connecticut told the PA agency he suffered from hypertensive and atherosclerotic cardiovascular disease. Real name Isaac Freeman III, he was best known for his hit song Be Faithful, which went to UK number one in 2003 and for starring in Celebrity Big Brother in 2015. During his career he also collaborated with a number of high profile artists, including Timbaland and David Guetta.
  • None US rapper Fatman Scoop dies after collapsing on stage

  In a statement released at the time of his death, his family described him as "not just a world class performer" but a "father, brother, uncle and friend". "He was the laughter in our lives, a constant source of support, unwavering strength, and courage," it also said. Scoop has been credited as one of New York's most influential hip hop stars of the 1990s, with his agency, MN2S, saying at the time of his death that his "legacy will live on through his timeless music". The spokesperson added: "Scoop was a beloved figure in the music world, whose work was loved by countless fans across the globe. "His iconic voice, infectious energy, and great personality made an indelible mark on the industry."
