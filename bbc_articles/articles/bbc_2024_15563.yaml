title: Joe Wicks 'proud' as he receives honorary degree - BBC News
date: '2024-07-17'
section: Leicester
url: http://www.bbc.co.uk/news/articles/cy9400eeqg5o
content: |-
  Loughborough University said the award was given for his work "championing health and wellbeing".

  Fitness coach Joe Wicks has been awarded an honorary degree by Loughborough University. The TV presenter was presented with the honour at a graduation ceremony on Tuesday. It was in recognition of Mr Wicks's work "championing health and wellbeing for all", which included his "PE with Joe" series during the Covid pandemic. Mr Wicks described receiving the degree as "an absolute honour and a privilege".

  Mr Wicks received his honorary degree at a ceremony on Tuesday

  He said: "The university has a great reputation in sport, health, and wellbeing so to receive an honorary degree makes me feel incredibly proud.” The university said that despite his success with his Body Coach brand, which includes social media accounts with millions of followers, Mr Wicks has "always been committed to improving everyone’s health and wellbeing, giving much of his advice for free so it can be shared as widely as possible". Pro vice-chancellor for sport at the university, Prof Jo Maher, added: “It is a great honour for us to recognise someone who has had such a positive impact on public health and wellbeing – a cause that is the central focus of all we do here at Loughborough University. “Joe gets the whole family moving, turns our living rooms into gyms, and makes exercise fun, using his influence to campaign for better access to healthy spaces, healthy foods, and healthy living advice.” Follow BBC Leicester on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
