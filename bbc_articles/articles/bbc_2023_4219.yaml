title: Watch moment Australian police swoop on secret drugs flight - BBC News
date: '2023-03-23'
section: General
url: http://www.bbc.co.uk/news/world-australia-65047848
content: |-
  The plane carried 52kg of meth from PNG to Australia with flight monitoring switched off in an effort to avoid detection.

  Video shows the moment authorities pounced on a light plane attempting to smuggle 52kg of meth into Australia. The plane flew from Papua New Guinea at low altitude, with its flight monitoring systems off in a bid to avoid detection.
