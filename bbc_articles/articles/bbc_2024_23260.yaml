title: Holly Bramley's family lead domestic abuse campaign in her honour - BBC News
date: '2024-09-26'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/c1wndv05qr8o
content: |-
  The family of Holly Bramley, who was killed by her husband, want to help others avoid their pain.

  'She didn't want to believe he was an evil monster'

  Holly Bramley has been described as a "loving young woman" by her family

  Holly Bramley was murdered by her husband, Nicholas Metson, at their Lincoln home in March 2023. Holly's family have been speaking to the BBC's Jo Makel about the abusive relationship that ended with her death and how they are supporting a campaign against domestic violence in her honour. Holly's mum, Annette, could see the warning signs of her daughter's abusive relationship. But the sweet, kind, animal-loving 26-year-old was "smitten" with a man who was deeply manipulative and dangerous, she says. "When I think about what Holly went through. She couldn't see what we could see. There’ll be many, many more girls just like that. "She didn’t want to believe that the man she loved was this evil monster that we all knew he was. "To her, I guess, he was the love of her life." Metson murdered Holly in an act that police have described as "barbaric" - stabbing her multiple times before he dismembered her body into more than 200 pieces and disposed of them in the River Witham.

  The violence of her death is disturbing. But so too is the behaviour that led up to it. Talking about what happened takes courage. As we sit in the garden of a hotel near Spalding, in Lincolnshire, Annette and Holly’s older sister, Sarah-Jayne, clutch hands, drawing strength from each other. "We couldn’t save Holly, but we hope her story will help others," says Annette. Holly and Metson met in 2016 and married five years later. But the family had early doubts. Holly is one of triplets and one of her brothers discovered Metson had a conviction for sharing explicit photos of a previous partner. Annette says: "He convinced Holly he’d pleaded guilty to someone else's offence. He brainwashed her." "It was terrifying," adds Sarah-Jayne. She recalls how Metson "swept Holly off her feet" and quickly took her away from home. "He managed to convince her that anything outside of just the two of them was not important." Annette adds: "He had convinced Holly that she shouldn't have any contact with family. He stopped her from contacting any of us via social media. We were all blocked."

  Holly, who was one of triplets, with her brothers Stephen, left, and Dale

  At one point, the family thought Holly would see the red flags. She reported Metson to the police for killing her pet hamsters and puppy. "We said to her, 'if he can do that to animals, think of what might happen to you'. But again, he brainwashed her," says Annette. The family say he convinced Holly to say she had killed the animals. Their fears for her safety grew. "We had those awful thoughts that what if he did something to her? But you could never, ever imagine that would become reality," says Sarah-Jayne. However, in March 2023, it did.

  Now, in joining a campaign with Lincolnshire Police and the Lincolnshire Domestic Abuse Specialist Service (LDASS), the family say they have a purpose. Det Ch Insp Rachael Cox, who is the police lead for domestic abuse, said: "We are indebted to Annette. Despite her grief, she is determined to work with us to help us reach those experiencing domestic abuse. "She is an inspiration and a reminder of why we do this job." From Thursday, social media posts tagged #ForHolly will highlight her experience and signpost help for victims of domestic abuse. As part of the campaign, the next six weeks will focus on a number of topics:
  • None Clare’s Law - How it can help your or someone you are worried about
  • None The LDASS - How the service is supporting victims and survivors
  • None Safe Spaces - How the rooms available in many pharmacies allow people to seek support without fear of an abuser looking over their shoulder
  • None A poem for Holly from her mum

  The #ForHolly campaign is designed to help other victims of domestic abuse

  The campaign posts do not mention Metson by name. I ask if this is deliberate to ensure the campaign focuses on Holly and not him. My assumption is right. They hope to give Holly a positive legacy and help people remember her not just as a victim but as the loving young woman she was. "She was a person before she was a victim," says Annette. "I’d like people to remember that bright, bubbly smiley, affectionate girl that just craved love and who deeply wanted to be a mum. "I want to be able to help somebody to know that there is help out there. If it can save just one mother, one wife, one girlfriend from the same kind of fate that Holly suffered." Sarah-Jayne says she also feels it may help someone to recognise abuse in others. "If somebody has some niggling concerns and it triggers them to ask somebody, 'Are you OK?' then that would be an amazing outcome." If you have been affected by any of the issues raised in this article, help is available from the BBC Action Line. Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
