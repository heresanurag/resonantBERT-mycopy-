  Ten newborns died in an alleged scam in which babies were allegedly moved between hospitals for profit.

  Dozens of medics tried in Turkey over baby deaths

  Forty-seven people have gone on trial in Turkey in connection with an alleged scam in which newborns were transferred between hospitals for profit. Prosecutors say doctors, nurses and ambulance drivers are responsible for the deaths of at least 10 children. The defendants are accused of making false diagnoses to transfer babies to 19 private hospitals, where they were allegedly kept in intensive care in neonatal units for lengthy, sometimes unnecessary treatments. According to the 1,400-page indictment, those involved shared the social security payments earned for each day a baby stayed in the unit. The defendants deny wrongdoing.

  They say they made the decisions in good faith and gave the babies the best possible care. One of the accused, Dr Firat Sari, told prosecutors that everything had been done "in accordance with procedures", the Associated Press new agency reports. As the trial opened, dozens of people took part in a protest outside the courthouse near Istanbul, chanting "baby killers will be held accountable” and "private hospitals should be shut down", AP adds. Police launched an inquiry following an anonymous tip-off in March 2023. Ten hospitals have had their licences revoked as a result of the investigation. If found guilty the defendants face lengthy prison sentences for "homicide through negligence", fraud and forgery.
