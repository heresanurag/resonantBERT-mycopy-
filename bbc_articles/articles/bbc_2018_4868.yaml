content: |-
  Charity Maundy Relief in Accrington is helping people who have nowhere else to go for support.

  For the last four years, Newsnight has been following the progress of a small charity in Accrington, north-west England, that provides hot lunches for people in need, food parcels, welfare advice, counselling and outreach.

  Many of those who use its services are in desperate need.

  Filmmaker Nick Blakemore has been back to the town to catch up with Maundy Relief.
