title: 'King''s Birthday Honours: Mark Cavendish given knighthood - BBC Sport'
date: '2024-06-15'
section: General
url: http://www.bbc.co.uk/sport/articles/c255wjrlp5no
content: |-
  Record-breaking Tour de France cyclist Mark Cavendish has been given a knighthood in the King's Birthday Honour's list.

  Mark Cavendish has won the points jersey at all three Grand Tours

  Cyclist Mark Cavendish has been given a knighthood in the King's Birthday Honours. Cavendish won the men's road race at the 2011 World Championships and has sprinted to a record-equalling 34 Tour de France stage wins, matching Eddy Merckx's haul. The 39-year-old from the Isle of Man will try to take the stage record outright at next month's Tour. "I'm truly humbled to be honoured by His Majesty the King," said Cavendish, whose honour is for services to cycling and charity work. "It's always been the biggest privilege to represent my country, and seeing cycling as the sport, pastime and mode of transport I've given my life to, grow in Great Britain during the span of my career has given me joy and pride beyond words. "I'm truly thankful to everybody that has lived this journey with me." Cavendish, who was named BBC Sports Personality of the Year in 2011, announced his retirement in 2023 but reversed the decision to have a final attempt at the Tour de France stage wins record. He has also had success as a track cyclist with Great Britain, winning three world titles in the madison event as well as an Olympic silver medal at the 2016 Games in the omnium. Elsewhere, former Scotland and Liverpool footballer Graeme Souness and ex-England cricketer Katherine Sciver-Brunt are among other sporting figures to be honoured. Three-time European Cup winner, television pundit and former manager Souness receives a CBE for services to football and charity. Souness, 71, is a vice-president of charity DEBRA UK and swam the English Channel in a relay team in June last year, helping to raise £4.5m for children affected by the rare and painful skin disorder epidermolysis bullosa (EB). "I am delighted and humbled to receive this honour," Souness said. "It is wonderful that the King has honoured me with a CBE and it is important to acknowledge the whole [DEBRA] team which works tirelessly to find solutions to the intolerable pain, itch and inflammation of this horrendous condition. This is for my friend Isla and everyone else living with EB." Sciver-Brunt, who retired last year with a record 335 wickets for England women, gets an OBE for services to women's cricket and to the Yorkshire community. "Representing my country for 19 years filled me with passion and pride," Sciver-Brunt said. "It's the same feeling I get now when I think of receiving this award. It's such a great honour that I can one day share with my children." Former Lioness Karen Carney, who won 144 caps for England and recently led a major review of the women's domestic game in England, is made an OBE for services to football. Ex-Scotland striker Ally McCoist is awarded an OBE for services to football and broadcasting. McCoist won 10 Scottish league titles with Rangers as a player, is a popular football pundit and was a team captain on BBC One's A Question Of Sport for 11 years. His fellow Scot Sandy Lyle, who in 1988 became the first British golfer to win the Masters, is given an OBE for his services to golf. "To have received an MBE in 1987 was beyond my expectations but to be honoured with an OBE is something of which I'm incredibly proud," Lyle said. Ex-referee Wayne Barnes receives an OBE for his services to rugby union. Barnes retired in November 2023, having officiated in 111 Test matches, including the 2023 Rugby World Cup final.

  Katherine Sciver-Brunt and Graeme Souness are among a number of sports personalities named in the King's Birthday Honours

  Others receiving honours included former BBC director of sport Barbara Slater, who is made a CBE for services to sports broadcasting. The ex-Olympic gymnast had been in her role at the BBC for 15 years before she retired in March. Former cyclist Chris Boardman, a gold medallist at the 1992 Olympics, is awarded a CBE for services to active travel. An OBE goes to David McNulty, British Swimming's national lead coach who has guided Team GB to success in the pool at recent Olympics. World Wheelchair Rugby president Richard Allcroft is awarded an OBE, as is Kevin Miles, chief executive of the Football Supporters' Association. Martin Slumbers, CEO of the R&A which organises The Open, receives an OBE for services to golf. Among those receiving an MBE is ultra runner Jasmin Paris who in March became the first woman to successfully complete the gruelling Barkley Marathons. The Football Association's women's technical director Kay Cossington also becomes an MBE, as does former Wales footballer - now a referee - Cheryl Foster. Scottish golfer Stephen Gallacher is made an MBE for services to his sport. Former sprinter Anita Neil, who in 1968 became the first black woman to compete for Great Britain at an Olympic Games, receives an MBE for services to athletics. Chris Powell, the ex-England and Charlton defender and current Sheffield Wednesday assistant boss, is made an MBE for services to football. "I always thought that representing my country and the FA would be the pinnacle of my career, as both a player and a coach, but this honour is beyond my expectations," Powell said.

