title: Bradford police car crash causes damage to row of buildings - BBC News
date: '2023-02-27'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-64783793
content: |-
  Keighley Road in Bradford remains closed following a crash involving two police cars.

  Footage seen by the BBC showed police cars apparently involved in a pursuit

  Two police cars have been involved in a crash that damaged a row of buildings in Bradford.

  Keighley Road at Frizinghall remains closed after the collision, which happened on Monday morning, West Yorkshire Police said.

  Pictures show extensive damage to the ground and first floors of a building in a parade of shops.

  Police said the road had been shut in both directions while the buildings were made safe.

  When asked if anybody had been injured, a police spokesperson described the incident as a "damage-only collision".

  Two police cars were involved in the crash on Keighley Road

  The road will remain closed while the damaged building is made safe

  Neighbours told the BBC they had been awoken in the early hours by the sound of a "loud bang".

  Abrar Asif, who runs the nearby Creative Cutz barber shop, was told he could not enter his business following the crash, saying: "I don't have any idea when [I will be able to] go back to work."

  Barber Abrar Asif said it had been an "unusual" start to the day

  Local businessman Hasnain Abbas said he was "shocked" by the incident, but pleased that no-one was seriously hurt.

  Others said there was a problem with drivers speeding in the area.

  Footage seen by the BBC showed police cars apparently involved in a pursuit.

  West Yorkshire Police is yet to provide further information regarding the circumstances of the crash, or give an estimate as to when the road might reopen.

