title: Injured Household Cavalry horses to join King's Birthday Parade - BBC News
date: '2024-06-05'
section: London
url: http://www.bbc.co.uk/news/articles/clww1lvlxqno
content: |-
  Three horses hurt when they bolted through London have made good enough progress to return to work.

  This video can not be played To play this video you need to enable JavaScript in your browser. The runaway horses were filmed by a BBC cameraman covering the Post Office Inquiry

  Three of the Household Cavalry horses that were injured after they bolted through central London are likely to take part in the King's Birthday Parade later this month. The Ministry of Defence (MoD) said all five military horses injured on 24 April were continuing to make "remarkable progress". "Three of the horses injured in the incident are now back on duty and, against all expectations, are looking likely to take part in the King's Birthday Parade on 15 June," an Army spokesperson said. "The remaining two are recuperating in the country but look set to return to work in due course."

  Trojan (pictured) is likely to take part in the parade along with Tennyson and Vanquish after recovering well from their injuries

  Quaker and Vida are enjoying a "summer holiday" with the Horse Trust, the Army said

  The MoD said three of the five soldiers who were injured in the incident were back on duty. One is recovering at home and the other at the Defence Medical Rehabilitation Centre, Stanford Hall. Lt Col Mathew Woodward, commanding officer of the Household Cavalry Mounted Regiment, said: "All five of the horses injured during the incident on 24 April are recovering with remarkable speed and it is very likely that Trojan, Tennyson and Vanquish will participate in the King's Birthday Parade later this month. "The remaining two, Vida and Quaker, are enjoying a summer holiday in the Chilterns thanks to the Horse Trust. "They are expected to make a full recovery and we look forward to seeing them back on duty in due course."

  Quaker will remain with the Horse Trust for the time being

  The MoD thanked the trust for its "amazing specialist support", adding that the charity's work and "excellent" care from the Army's veterinary surgeons were the reason for the horses' "remarkable recovery". Jeanette Allen, CEO at the Horse Trust, said it "has been a privilege to provide these wonderful horses with the space and time needed to fully recover". She added: "All five horses are much younger than our regular service residents and seeing them running, rolling and generally having fun after such a challenging experience is a real joy."

  Tennyson has also recovered well, the Army said

  The Life Guards of the Household Cavalry Mounted Regiment were on their daily morning exercise ride in Belgravia when their horses were spooked by construction rubble being dropped through a plastic tunnel from height. Footage of Trojan and Vida running loose through the streets of London covered in blood was broadcast worldwide.
