title: 'Nantyglo dog attack: XL bully believed to have injured girl, 12 - BBC News'
date: '2024-10-08'
section: Wales
url: http://www.bbc.co.uk/news/articles/cevy72p4klvo
content: |-
  An investigation is under way after a girl suffers life-changing injuries in a dog attack.

  Dog that attacked girl, 12, thought to be XL bully

  This is the dog suspected of attacking the girl in Blaenau Gwent

  A dog that attacked a 12-year-old girl, leaving her with life-changing injuries, is believed to be an XL bully, a nearby resident has told the BBC. The attack happened at a house in Nantyglo, Blaenau Gwent, on Monday evening. On Tuesday, Gwent Police forensics officers were examining the scene, with police tape sealing off an area surrounding the house. A 42-year-old woman and a 37-year-old man, both from Nantyglo, have been arrested on suspicion of owning or possessing a dog bred for fighting and owning or possessing a dog dangerously out of control. The dog has been put down by a vet.

  The girl was taken to hospital after the attack, which occurred on The Crescent at about 17:50 BST. The resident, who did not want to be named, said they believed the dog, named Rocco, was an XL bully and the injured girl does not live at the same house as the dog.

  There has been a police presence in the area after the attack

  The resident said they had seen Rocco numerous times on the street and it was about 12-15 stone (76-95kg). He said he had called the housing association a number of times due to the dog barking. Gwent Police said no other animals were involved in the attack and there was no further risk to the public.
