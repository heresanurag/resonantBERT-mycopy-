  And that could turn out to be the key issue facing new head coach Ruben Amorim when he checks in at Carrington this week to start his new job. Amorim’s preferred formation is three at the back, two wing backs, two midfield players, two inside forwards and a striker. It is flexible in the sense the wing backs can be more adventurous, or less, as was the case against Manchester City last week when Maximiliano Araujo and Geovany Quenda effectively became part of a back five. Having won two titles in four years with his chosen formation and got the United job because of it, it seems unlikely Amorim will alter it. So where does Fernandes fit in? Fernandes’ position will be debated because in Amorim’s system, the number 10 role he has operated in for United doesn’t exist and the midfielder’s style of play is not that of an inside forward. So, does Amorim tweak his formation, use Fernandes as a false nine or an orthodox midfield player or does he play him as an inside forward with licence to roam.

