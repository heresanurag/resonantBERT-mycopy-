title: Bruno Fernandes back in form as Man Utd head coach Ruben Amorim set to arrive
  - BBC Sport
date: '2024-11-11'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/cg57erz0qqyo
content: |-
  Manchester United captain Bruno Fernandes is finding form again just in time for the start of a new era under head coach Ruben Amorim.

  Fernandes 'is back' as main man with Amorim era beginning

  Bruno Fernandes created more chances (seven) than any other Manchester United player in their 3-0 win over Leicester at Old Trafford – no-one else managed more than one

  A lot has changed around Manchester United captain Bruno Fernandes since he took it upon himself to apologise directly to Erik ten Hag in the wake of his sacking and accept his share of the blame. He has scored four goals, created two more and had a claim on another that was given as an own goal in Sunday's 3-0 win over Leicester at Old Trafford. It is an excellent return for four games and in marked contrast to the zero goals and four assists – two of which came against League One Barnsley – in the 12 games Ten Hag was in charge for this campaign. When Fernandes spoke of his regret at Ten Hag’s exit, he added that "people will say we wanted him to be sacked". Fernandes said such an assertion would be untrue. However, such is the transient nature of football, Fernandes’ return to form will now benefit someone else. “He is back,” United interim manager Ruud van Nistelrooy told BBC Sport. “He is producing goals and assists. That is the Bruno that is helping the team the most.” On the day co-owner Sir Jim Ratcliffe presented Fernandes with a framed photograph before the game to mark his 250th United appearance, the 30-year-old’s latest efforts mean he has now scored 83 goals and has 72 assists for the club in all competitions. Since Fernandes made his United debut in February 2020, only Liverpool’s Mo Salah – on 198 – has been involved in more goals. Fernandes has been directly involved in 100 Premier League goals in 170 United appearances in the competition. That is only one more than Cristiano Ronaldo managed following his arrival at Old Trafford. He is not without his critics but a week ago, on the BBC's Match of the Day 2, Fernandes’ former team-mate Phil Jones called the Portuguese "a leader’". On the same programme, former Liverpool and England midfielder Danny Murphy called Fernandes "United’s best creative spark".

