  The nuclear option would be to leave him out, possibly sending a clear message to the dressing room that no-one is safe. But it would be exceptionally brave, or foolhardy, judging on the statistics alone. Against Leicester they were:
  • None Most passes in the final third (33), the next highest was 17
  • None He created more chances than any other Manchester United player – seven, with no-one else managing more than one
  • None More crosses than any other player
  • None Only Martinez had more touches of the ball And in typical Fernandes style, his post-match interview wasn't wasted either, with a direct message for his team-mate and his critics: "Garnacho didn't celebrate because he thinks he has lost the faith of some fans. I told him people will always moan but lots of people like you. I told him to celebrate." Fernandes might frustrate sometimes with his indiscipline in terms of maintaining a position, but if Amorim did not pick him, where would United’s goals and chances come from? Finding an answer this conundrum is something Amorim needs to resolve as a priority.

