  A combination of the number of players leaving for international duty this week, and some of those not called up being given time off, means that it will be largely those who are injured that Amorim first gets to see when he reports for duty at United’s Carrington training complex. It means the fact United need a couple of days to secure his work visa is not too much of an inconvenience. It also allows the club to tie up all the loose ends around Amorim’s coaching team, with interim boss Ruud van Nistelrooy stating after the Leicester game he expects to hear either on Sunday or Monday whether he and the remainder of Ten Hag’s team who stayed on following the Dutchman’s dismissal last month are to stay. When he gets round to assessing this latest performance, aside from Fernandes’ efforts, Amorim will see a largely solid defensive display, which secured a first Premier League clean sheet for over a month, a decent first-half from Amad Diallo, and a goalscoring second-half from Alejandro Garnacho, even if the Argentine was too fed up at being criticised for his recent displays to celebrate. Manuel Ugarte and Casemiro were decent in central midfield without being spectacular against a Leicester side their manager Steve Cooper admitted had not been good enough in both boxes. And United won. Depending on how you choose to assess the Premier League table, Amorim arrives with United either 13th, way below expectations, or only four points off a Champions League place, for which fifth might be good enough. BBC Sport asked Van Nistelrooy after the match whether the current United squad could excel in Amorim's new style. His answer didn’t entirely fill anyone with confidence. “That is a very good question,” he said. “When I started at the beginning of this four game period I decided to continue by 85% playing what the players are used and just put in little tweaks by changing players or resting players to try get the confidence back. We were looking for results and we got four. “But the wing backs and inside forwards, it is a lot to analyse. I can’t comment on that.” Presumably if Van Nistelrooy were entirely confident about the flexibility of players he has been working with since the start of the season, a straightforward ‘yes’ would have come into his head. And the secondary – but very important – point is the chance for Amorim to do any meaningful work on the training ground will be virtually non-existent. If United progress in the EFL Cup, he might have one spare midweek in his first three months in charge. Amorim is acutely aware of this which is why he is playing down the expectations that rose so dramatically in the wake of Sporting’s defeat of Manchester City last week. Amorim will need to find a trio of defenders that fit his back three brief, knowing his quickest option, Leny Yoro, is among those coming back from injury. Presumably Diogo Dalot and Noussair Mazraoui will fill the wing back slots, with Ugarte, Casemiro and Christian Eriksen the midfield berths, at least until Kobbie Mainoo is available again. But Fernandes is the crucial element. Portugal’s second Nations League game doesn’t take place until Monday, 18 November, even further limiting the new head coach's time with the Fernandes before the Premier League trip to Ipswich on 24 November. Van Nistelrooy has stabilised the situation at Old Trafford. But if United are to move on under Amorim, he needs to find the best way of getting the most out of Fernandes as the captain moves back into form.
