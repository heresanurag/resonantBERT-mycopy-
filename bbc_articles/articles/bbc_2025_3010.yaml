id: bbc_2025_3010
title: Gino D'Acampo's ITV shows removed from schedule - BBC News
date: '2025-02-08'
section: Culture
url: http://www.bbc.co.uk/news/articles/c17e2yzq1xgo
content: |-
  Family Fortunes and Secrets of the South are pulled as the chef faces inappropriate behaviour claims.

  Gino D'Acampo's upcoming shows have been removed from ITV's schedule, after the celebrity chef was accused of inappropriate and intimidating behaviour on set. Friday night's ITV2 episode of Family Fortunes has been replaced by Wheel of Fortune, an ITV spokesperson told BBC News, adding that Sunday's two episodes of Secrets of the South, are no longer in the ITVBe schedule. On Thursday, ITV News published an investigation which said it had spoken to "dozens" of people who accused him of "unacceptable", "distressing" and "horrendous" comments. In a statement to ITV News via his legal team, D'Acampo "firmly denied" the "deeply upsetting" allegations.

  D'Acampo, 48, has been a regular on UK television since the early 2000s. He has primarily worked for ITV, including on a number of cooking and travel shows, as well as making appearances on other entertainment programmes. The Italian-born chef and broadcaster has also made appearances on BBC programmes. It is understood that there are now no repeats featuring D'Acampo in ITV's linear schedule. However, some of his programmes are still available on ITVX, the broadcaster's streaming service. A new series of Family Fortunes, filmed in October 2023, hasn't been broadcast yet, and it's understood there are currently no plans to air it.

  ITV News published a number of allegations from anonymous accusers who said they had worked with D'Acampo on TV productions. BBC News has not spoken to his accusers nor has it verified their claims. They accused him of aggressive behaviour, using abusive language during outbursts on set and using sexualised language. His behaviour allegedly left some production staff fearful and uncomfortable, ITV News reported. It added that most people it spoke to were freelancers and had been too scared to complain at the time for fear of risking future employment. Responding to the investigation, D'Acampo's representatives told ITV News that he "firmly denied" the claims. He said he had "never been made aware of these matters previously". A statement continued: "I am a father, husband and have worked with well over 1,500 people on around 80 productions in my career, which I have been so proud of. "I take such matters extremely seriously," he said, adding that the suggestion that he acted in an improper way was "deeply upsetting". In a statement, ITV said production companies "have the primary responsibility for the duty of care of everyone they work with". The broadcaster said it had "strengthened" policies about what standards they expect from production companies it works with in the last five years. A statement continued: "All of the concerns and complaints raised by those who have spoken to ITN [the producer of ITV News] describe behaviour which is inappropriate and unacceptable. "Most of them were not reported to ITV at the time. Where issues have been raised with ITV action has been taken."
