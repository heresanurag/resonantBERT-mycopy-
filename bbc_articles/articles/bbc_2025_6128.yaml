title: Judge allows Columbia graduate Mahmoud Khalil's deportation - BBC News
date: '2025-04-11'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cwy0ngd11yzo
content: |-
  Mahmoud Khalil was arrested in March for his role in pro-Palestinian protests at Columbia University.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Moment Mahmoud Khalil is arrested by US immigration officers in New York

  A US judge has ruled the Trump administration can deport Mahmoud Khalil, a Columbia University graduate detained last month over his role in pro-Palestinian protests. Mr Khalil, a permanent legal US resident, has not been charged with a crime. In a letter written from the facility, he has said his "arrest was a direct consequence" of speaking out for Palestinian rights. The government has cited a Cold War-era immigration law, declaring that his presence in the US was adverse to American foreign policy interests. The immigration court's ruling does not mean Mr Khalil would be immediately removed from the country. The judge gave his lawyers until 23 April to appeal against the order.

  The activist has been held at a Louisiana detention centre since 8 March, when immigration officers told him he was being deported for taking part in protests against the war in Gaza.
  • None Who is Mahmoud Khalil, Palestinian student activist facing US deportation? The 30-year-old was a prominent voice at Columbia University's protests against the war in Gaza last year. The Trump administration has cited a 1952 law that empowers the government to order someone deported if their presence in the country could pose unfavourable consequences for American foreign policy. The judge said the Trump administration was allowed to move forward with its effort to deport Mr Khalil because the argument that he poses "adverse foreign policy consequences" for the US is "facially reasonable". Mr Khalil, who was otherwise silent, addressed the court after the ruling. "I would like to quote what you said last time that there's nothing that's more important to this court than due process rights and fundamental fairness," Mr Khalil said in court. "Clearly what we witnessed today, neither of these principles were present today or in this whole process," he said. "This is exactly why the Trump administration has sent me to this court, 1,000 miles away from my family." The American Civil Liberties Union (ACLU) described the decision as "pre-written". The rights group said the ruling came less than 48 hours after the US government "handed over the 'evidence' they have on Mr. Khalil - which included nothing more than a letter from Secretary of State Marco Rubio that made clear Mr Khalil had not committed a crime and was being targeted solely based on his speech". The government, particularly Rubio, has said its efforts to deport Mr Khalil were also to "protect Jewish students from harassment and violence in the United States" even if his activities were "otherwise lawful". Department of Homeland Security Secretary Kristi Noem praised the judge's ruling on Friday. "It is a privilege to be granted a visa or green card to live and study in the United States of America," she wrote on social media. "When you advocate for violence, glorify and support terrorists that relish the killing of Americans, and harass Jews, that privilege should be revoked, and you should not be in this country. Good riddance."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Khalil case ‘far from over’ after deportation ruling, say attorneys

  Mr Khalil's legal team has repeatedly said evidence of antisemitism has not been presented. His lawyer, Marc Van Der Hout, condemned the decision and said his team was going to fight for Mr Khalil's "right to speak out against what's happening in the US". The legal team also said they expected further hearings in the case. "I actually had a long conversation with him after the hearing," Johnny Sinodis, another member of Mr Khalil's legal team, told the BBC later on Friday. "He's feeling confident. He's feeling supported." "Mahmoud is not against the United States, he is not antisemitic," he said. "He has done nothing wrong." Mr Khalil has also filed a federal court lawsuit in New Jersey challenging his arrest as unconstitutional. His lawyers have said the outcome of that case could block his deportation if they win. The Trump administration has separately alleged that the student committed immigration fraud by failing to disclose certain information on his green card application. This includes working for the British embassy in Beirut and the United Nations agency for Palestinian migrants and refugees. But the government has not submitted any new evidence related to this. In a statement, White House Assistant Press Secretary Taylor Rogers said the Trump administration is "committed to the enforcement of our immigration laws and will take swift action to remove aliens who pose serious adverse foreign policy consequences for the United States".

