content: |-
  It started with a text message phone alert warning of what was to come.

  Storm Darragh has ripped through Wales, leaving cars crushed, trees uprooted and thousands of people without power.

  It started with mobile phones of people in affected areas beeping with warnings on Friday night which heralded the start of a red weather warning.

  As the storm blew through, it left a trail of destruction in its wake.

  Here is a snapshot of the scene around Wales on Saturday.
