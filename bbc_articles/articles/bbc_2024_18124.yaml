title: 'Swansea: Discarded toy rings can kill seals, rescuers say - BBC News'
date: '2024-08-10'
section: Wales
url: http://www.bbc.co.uk/news/articles/cgrj0epjqryo
content: |-
  Young seals injured and face death with beach toy rings stuck around their necks, prompting campaign

  Seal with a ring stuck over its head

  Wildlife rescue volunteers are urging people to stop buying toy flying rings as they are finding young seals with them stuck around their necks and say some have died as a result. "They cut into the neck of the seals which leads to infection and, unfortunately, many do die," said Gareth Richards, founder of Gower Seal Group. It started a campaign to discourage their use due to the number of discarded flying rings ending up on beaches in Swansea and the Gower Peninsula. Welfare charity RSPCA said it was a widespread problem, and could cost up to £15,000 to treat an injured seal.

  Swansea council is due to discuss what action it can take to help support the campaign at a meeting next month. Mr Richards said the "flying rings are sold so cheaply, often for a £1 or £2, that they often get lost or discarded on beaches and, inevitably, they end up in the sea". "You then get seals, younger seals specifically, that see these as a toy and those few moments of curiosity will turn into a lifetime of misery when these things go over their heads and they get stuck on their neck and they can't come off," he added.

  Rings can cause deep wounds around the necks of seals

  Mr Richards wants people to stop buying the plastic rings and to use the "solid traditional disk frisbee instead". The RSPCA said it is a serious issue around the coast. Rehabilitating a seal requires a costly and "long, long period of wound management" with antibiotics and painkillers, according to senior wildlife officer Geoff Edmond.

  A large number of rings have been found discarded on Rhossili beach alone

  "Eventually there's hope that that wound will heal and the animal can be returned to the wild," he said. Gower Seal Group volunteer Elin Carter, who is studying environmental science at university, says she decided to help after realising how harmful plastic items can be to marine life. "Since starting volunteering I've seen lots of seals being washed up on beaches, either dead or with really bad injuries, stopping them from being able to swim and live life how they should be all because of plastic rings," she said.

  Gower Seal Group volunteer Elin Carter says she's seen lots of seals with rings stuck around their necks

  Swansea council leader Rob Stewart said the authority intends to discuss action at next month's full council meeting. "The aim will be to raise awareness of the danger and to encourage local residents and visitors to our beaches to stop using flying ring frisbees - and to use solid disc frisbees instead - and, of course, to always take them home so they don't end up in our oceans," he said.
