title: US veteran gets world's first eye transplant - BBC News
date: '2023-11-10'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-67375145
content: |-
  The surgery did not restore vision in the grafted eye, but experts do not rule out the possibility.

