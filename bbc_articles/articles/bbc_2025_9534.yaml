  Mark Carney's ascent as Canada's new prime minister offers a chance for a reset in the US-Canada relationship.

  Trump disliked Trudeau - why Carney may fare better

  Canada's Prime Minister Mark Carney is set to meet soon with US President Donald Trump

  The victory-party din for Mark Carney and his Liberal Party had only just faded when Donald Trump chimed in with a less than ringing endorsement of the winners. "It was the one that hated Trump, I think, the least that won," the US president said on Wednesday of Carney, whose party had just retained power by winning a near outright majority of the seats in Canada's general election. The Canadian prime minister may accept being the lesser of two evils in Trump's mind, however. The US president also said that he thinks the former Bank of England governor "couldn't have been nicer" in the first post-election phone conversation. The two men are expected to meet at the White House sometime within the next week.

  For Trump, politics is often personal. The president's affinity for Vladimir Putin colours US relations with Russia, for instance. His respect for Xi Jinping has kept US-China relations on a relatively even keel even as the two nations are engaging in an extended trade war. Canada, on the other hand, has spent an extended time on the other end of this equation. Trump's distaste for former Prime Minister Justin Trudeau was palpable practically from the US president's first day in office in 2017.

  The two leaders did not see eye to eye in Trump's first term - then things got worse

  Their lengthy, aggressive handshake during their first in-person visit just a few weeks after Trump's inauguration foreshadowed what would be a long and trying relationship. It was punctuated by passive-aggressive jabs, snide comments and, upon Trump's return to the White House, the president's derisive reference to "Governor Trudeau" and repeated talk of turning Canada into America's "cherished 51st state". Trump's annexation talk continued even after Trudeau was replaced by Carney, but the temperature has seemed to drop somewhat, as the smooth international banker with a Harvard and Oxford pedigree replaced the younger, boyishly good looking Trudeau. Trump, while he likes to rail against global elites, is drawn to Ivy League backgrounds and accumulated wealth, which Carney has in spades. And Carney has another attribute Trump tends to value - he's now a winner. Even if he owes some of his victory to Trump's (negative) influence, the Liberal leader did engineer a remarkable reversal of fortune for his party when the outlook appeared gloomy just a few months before. Carney and Trump are still a study in contrasts, something that presents risk for the former as their first meeting looms. The Canadian is measured, controlled and organised. Trump is impulsive and unpredictable. Both can be impatient at times, with little tolerance for the trivialities of modern politics. There were reports that Trump brought up annexation during his first conversation with Carney after he became prime minister, but the Canadian leader kept that to himself and word only leaked weeks later - a characteristically cool response that may offer a hint of how he will handle Trump's bluster. Paul Samson, president of the Centre for International Governance Innovation who has held various senior positions in Canadian government over 30 years, has seen Carney in action first-hand. He tells the BBC that the new Canadian prime minister will likely use a mix of "economic knowledge, strategy and personal diplomacy" to get on Trump's good side. "Carney likes to get things done," Mr Samson said. He is also calm, easy going and could connect with Trump on a personal level. "But he certainly does not want to come across as subservient."

