title: 'Boston death: Third teenager arrested on suspicion of murder - BBC News'
date: '2020-12-14'
section: Lincolnshire
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-55299952
content: |-
  Roberts Buncis, 12, was found dead in Lincolnshire on Saturday, two days before his birthday.

  Roberts Buncis, pictured with his father, died two days before his 13th birthday

  A third teenager has been arrested in connection with the death of a 12-year-old boy, police have confirmed.

  Roberts Buncis was found dead on a patch of land in the Fishtoft area of Boston, Lincolnshire, on Saturday.

  A 13-year-old boy has been arrested on suspicion of murder, Lincolnshire Police said.

  Earlier, a 14-year-old boy, who cannot be named due to his age, appeared at Lincoln Crown Court charged with murder and was remanded in custody.

  A plea and trial preparation hearing is due to take place on 11 January, with a provisional trial date set for 21 June.

  A 19-year-old man arrested earlier on suspicion of murder has been released with no further action, Lincolnshire Police said.

  The body of Roberts Buncis was found in Fishtoft on Saturday

  Roberts's body was discovered at about 10:20 GMT on Saturday on a patch of land between Alcorn Green and Woodthorpe Avenue, just two days before his birthday.

  A police cordon remains in place around the area and a bouquet of flowers has been left at the scene.

  A JustGiving campaign set up to help Roberts's family has raised more than £12,000 since it was launched.

