  A former Bristol MP and shadow minister takes her seat in the House of Lords.

  Former Bristol MP takes seat in House of Lords

  Baroness Debbonaire of De Beauvoir Town in the London Borough of Hackney is the second Bristol politician to enter the Lords in recent weeks

  A former Bristol MP and shadow minister has taken her seat in the House of Lords after being awarded a life peerage. Thangam Debbonaire had served as the Labour MP for Bristol West since 2015 but lost to the Green Party's co-leader Carla Denyer in the new seat of Bristol Central in the 2024 general election. She will now be Baroness Debbonaire of De Beauvoir Town in the London Borough of Hackney. During her time as an opposition MP, she held a number of shadow cabinet positions over a period of four years - most recently as shadow culture secretary.

  Baroness Debbonaire wore the traditional scarlet robes for the introductory ceremony. Her election defeat marked a rare loss for Labour as they cruised to a resounding majority win in July. She later said she expected to lose her seat over the Labour Party's "lack of a strong narrative" over the war in Gaza. Baroness Debonaire is the second Bristol politician to enter the Lords in recent weeks after former city mayor Marvin Rees took his seat on 24 February, becoming Lord Rees of Easton in the process.
