  Flowers and tributes are left near to where a body was recovered in the search for Victoria Taylor.

  'Our hearts are broken' - tributes paid to missing mum

  Tributes have been left for Victoria Taylor near to where a body was recovered

  The family and friends of Victoria Taylor have said their "hearts are broken" after police searching for the missing mother said they had recovered a body. Flowers and tributes have been left at the side of the River Derwent in Malton, near to where a number of Ms Taylor's possession were found. The 34-year-old mother of one had been missing since 1 October before officers said a body had been recovered from the river on Tuesday. North Yorkshire Police said that while formal identification had not yet taken place, Ms Taylor's family had been informed of the discovery.

  One message left at the scene from a relative said: “Miss our chats beautiful, I hope you are at peace now. “Fly high with the other angels. Will love you forever, your sister.” Another family tribute read: “From the little girl to the beautiful woman, we will always love and miss you. “Rest in peace Vixx, now in the arms and care of your dad.”

  Family and friends have left flowers and candles by the riverside

  Another message left with a said simply: “Fly high + shine bright Vixx.” The Salvation Army Malton and the wider church community added they were “sending love and prayers to Victoria’s family and friends".

  Police said the body had been recovered by underwater search teams at the River Derwent

  North Yorkshire councillor Keane Duncan praised the community who “came together for this immense effort to find Victoria”. “Everyone has been affected and united in the grief we now face in the community, so it really is devastating and tragic news,” he said. A Go Fund Me page set up after Ms Taylor went missing has now been changed to raise money to support her partner and family. Speaking at a press conference on Tuesday, Assistant Chief Constable Wayne Fox said Ms Taylor's family were "understandably distressed" by the news and were being supported by specialist officers.
