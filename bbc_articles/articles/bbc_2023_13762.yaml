  Oscar winner Kate Winslet turned heads in a Paul Smith suit. She stars in the long-awaited biopic about the model-turned-war photographer Lee Miller

  Actor Gemma Chan is one of the biggest British East Asian heritage stars in Hollywood

  Princess Beatrice wore a cape dress by Richard Quinn and attended the event alongside her sister Princess Eugenie of York, who turned heads in Fendi

  Actor Maisie Williams is best known for her role as Arya Stark in Game of Thrones

  Actress-model Jodie Turner-Smith, dressed in Viktor & Rolf, made her film debut in 2016's Neon Demon

  TV presenter AJ Odudu is known for Big Brother's Bit on the Side and Strictly Come Dancing

  US drummer Shannon Leto of Thirty Seconds to Mars and actor-singer Jared Leto

  Irish actress Nicola Coughlan has a fashion moment in Harris Reed. She is well known for her role in Netflix's Bridgerton as well as playing Clare Devlin in Derry Girls
