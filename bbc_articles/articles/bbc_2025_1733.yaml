content: |-
  Joe Root speaks to BBC Sport about England's form, his 50-over future and past World Cup failure before England's Champions Trophy opener.

  'I never retired' - Root eyes more ODI success with England

  England's Champions Trophy campaign begins on Saturday against Australia at 09:00 GMT

  Amid troubled times we look to familiar comforts - that old blanket, your favourite food, Joe Root. England begin their Champions Trophy campaign against Australia on Saturday in a sticky spot, having lost four 50-over series in a row. They can at least take something from the fact their most successful batter is with them. "I never retired," says Root, who returned for his first one-day internationals since the 2023 World Cup in India earlier this month. "I have never said I don't want to play the format."

  Root, sitting in England's team hotel in Lahore, laughs when asked whether there was a crucial chat with captain Jos Buttler or coach Brendon McCullum to set his return in stone. "I don't think there needs to be either really," Root says. "I don't think any player has a divine right for selection." The Champions Trophy is one piece of silverware missing from England's trophy cabinet. It also marks the start of the journey to the 2027 World Cup in South Africa, Zimbabwe and Namibia. Root has said previously he would like to be involved in that tournament, which is expected to conclude a month before his 37th birthday. There, should they qualify, England will attempt to win back the trophy they won in 2019 but gave up disappointingly in 2023. "Obviously you've got perform, you've got to consistently go and do your job and offer something to the team and make sure you're making it a better team, not holding it back," Root says. "I've never been one to look too far ahead and try and say 'I want to play until here or to then'. You've got to earn the right and you've got to keep putting into the pot."

