title: Horse and carriage organisers fined over 2012 Angharad Rees death - BBC News
date: '2024-06-15'
section: Wales
url: http://www.bbc.co.uk/news/articles/crggpj9vw0po
content: |-
  Failings in organisation and safety led to the 18-year-old dying in an accident, the court hears.

  Angharad was described as "an experienced rider and was confident with her horse"

  The organisers of a horse and carriage fun day have been fined and ordered to pay costs totalling £230,000 after a teenager was killed taking part in an event 12 years ago. Angharad Rees, 18, suffered fatal head injuries after she was thrown from the carriage she was driving during an event in May 2012. Swansea Crown Court heard the event had been organised by the British Driving Society and was at Afan Argoed Country Park in Port Talbot. The teenager, who was an experienced carriage driver, was taking part in her first competitive off-road event.

  Adam Farrer, prosecuting, told the court Miss Rees was using her own horse, Magic, and a carriage belonging to her groom. "The prosecution case is that the series of failings in the organisation and safety management of the event led to the accident," Mr Farrer said. "This was Angharad's first entry into such an event. Angharad's life revolved around horses and she was an experienced rider and was confident with her horse, Magic." The court heard the accident happened as her horse and trap took a right turn and descended down a steep and narrow track.

  Angharad Rees was riding in a two-wheeled trap that was pulled by a horse

  "During the drive, and within 47m (154ft) after turning right on to the track, Angharad lost control of the trap, resulting in it tipping," Mr Farrer said. "Very sadly Angharad's head struck a tree, causing her severe head injuries from which sadly she died later that day." Mr Farrer said the equipment used in the event was not inspected by organisers before the competition and those taking part were not required to wear safety equipment. "Participants were allowed to choose whether to wear such equipment. On the day of the event it was a warm, hot day and Angharad chose not to wear a helmet." Experts instructed by the prosecution said the route was not suitable for carriage driving and was unsafe because it was too narrow and too steep, the court heard. "The prosecution case is that the evidence demonstrates significant failings by the British Driving Society and the use of the track made the event route dangerous, especially given as the event was described as a fun day with inexperienced participants," he said.

  If competitors had been required to wear a safety helmet it is likely Angharad's death would have been avoided, the court heard

  The court heard the event was organised by a local riding club affiliated to the British Driving Society, which no longer exists. At a previous hearing the British Driving Society pleaded guilty to four offences under the Health and Safety at Work Act. Mark Harris, defending, said three directors of the organisation were in court out of "respect" to the legal proceedings. "The BDS as an organisation had no real opportunity to change or amend the arrangements in place or impose its own normal standards, those which allowed it to be a fault-free organisation for all of its existence apart from this one occasion," he said. Judge Geraint Walters imposed a fine of £90,000 and ordered the British Driving Society to pay costs of £140,000. He said the investigation into the incident uncovered a "casual approach to formality".
