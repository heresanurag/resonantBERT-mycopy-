content: |-
  The BBC's Sarah Rainsford reports from a metro station where people have been sheltering from attacks.

  The BBC's Sarah Rainsford reports from a metro station in Kharkiv, where some residents have been sheltering from attacks for more than a week.

  She says families have been making life as "normal" as possible for children, bringing toys underground to the shelter.
