title: Firefighters rescue horse from Florida swimming pool - BBC News
date: '2023-06-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65985119
content: |-
  The horse fell into the pool in Paso County after being spooked by another horse.

  Firefighters came to the rescue after a horse fell into a swimming pool in Florida.

  The team from Pasco County used a harness to lift the animal out of the water.

  Pasco County Fire Rescue said the horse was in a "good condition" after being saved.
