title: 'Euro 2024: England cannot blame tiredness for losing final says Kieran Trippier
  - BBC Sport'
date: '2024-07-15'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/crg707n19rdo
content: |-
  Kieran Trippier says England cannot use tiredness as an excuse for failing to win the Euro 2024 final.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'We have to hold our hands up' - Southgate says Spain were deserved winners

  Kieran Trippier says England cannot use tiredness as an excuse for failing to win Euro 2024. The Three Lions lost 2-1 to Spain in the final in Berlin, which means the men's 58-year wait for a major tournament win goes on. After Sunday's defeat, England boss Gareth Southgate said some of his players were "a little bit short of their physical peak" during the month-long tournament. But Newcastle defender Trippier, who started six of England's seven games, said that was not an excuse. "The team that we’ve got is fit," added Trippier. "If you see the running stats, I think we’re probably the highest in the whole tournament. So that’s not an excuse. “They [Spain] get the second goal and it’s always difficult when you’re chasing the game against a team like Spain. "Football is all about fine margins. It’s one of those where the lads gave everything."

  England reached a second successive European Championship final despite failing to win two of their three group games. They were booed off the pitch by the their fans after draws against Denmark and Slovenia. They were moments away from going out at the last-16 stage to Slovakia before Jude Bellingham's acrobatic equaliser, while England needed penalties to overcome Switzerland in the quarter-finals. Trippier, who was appearing at his fourth major tournament for his country, said he was optimistic about England's future. Midfielder Kobbie Mainoo, 19, only made his England debut in March but played a key role in the run to the final, while defender Marc Guehi, 24, was also appearing at his first major tournament and impressed in Harry Maguire's absence. In addition, Cole Palmer, 22, scored in the final after coming off the substitutes' bench. “They will have learned a great deal from his tournament,” added Trippier about the inexperienced players in Southgate's ranks. “The young players stepped up in big moments for us. They can learn a lot from this. It will make them grow."
