id: bbc_2018_1313
title: Praise for 'quick-thinking' woman who tripped suspect - BBC News
date: '2018-01-02'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-42540585
content: |-
  A woman tripped up a police suspect with her foot as officers chased him in Hertford town centre.

  A "quick-thinking" woman helped to stop a suspect police were chasing through Hertford town centre.

  She tripped up the man who then fell to the ground, enabling police to catch him, on Christmas Eve.

  Hertfordshire Police has asked the woman, who they described as "quick-thinking", to make contact so she can be thanked.
