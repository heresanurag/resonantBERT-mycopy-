  'We met on VE Day - it was love at first sight'

  Rita Harvey first locked eyes with Ken as she travelled home on the train on 8 May 1945

  A 97-year-old woman who met her husband on a train on VE Day exactly 80 years ago has said it was "love at first sight". Rita Harvey had gone to London with a friend to celebrate the end of the war and was travelling home on 8 May 1945 when Ken, who was serving in the Army, offered her his seat on the busy train. They exchanged addresses to write to each other and married in East Molesey, Surrey, in 1951, living happily together until Ken's death in 1993. Rita, who now lives at the Royal Star & Garter care home in Surbiton, shared her story as the nation celebrates the 80th anniversary of Victory in Europe Day.

  The couple had a very happy marriage

  "I wanted to go up to London to join in the VE Day celebrations, but I wanted some company so I asked a very good friend if she wanted to join me," said Rita. "I wanted to see what was happening in London. "We were drinking champagne and dancing in central London, and we had a wonderful day. Later we went to back to Waterloo to get the train home, and the carriages were packed," she said. "Then, this lovely young man offered me his seat. That lovely young man was Ken, and it was love at first sight. "We hit it off and he asked if we could exchange addresses and stay in touch. It was the start of a wonderful relationship and we were devoted to each other." Rita, who is living with dementia, will be joining in with the celebrations at the Royal Star & Garter, which provides care to veterans and their partners.
