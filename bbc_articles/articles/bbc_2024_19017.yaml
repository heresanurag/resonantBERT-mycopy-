title: 'Somerset House fire: Artwork safe as blaze contained - BBC News'
date: '2024-08-18'
section: London
url: http://www.bbc.co.uk/news/articles/cqjl70ny0lqo
content: |-
  More than 120 firefighters are tackling the blaze at the landmark central London building.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A fire at Somerset House in central London has been contained after around 125 firefighters were called to tackle the blaze. In a joint press conference with the arts venue, the London Fire Brigade (LFB) said firefighters are now working to "extinguish the final pockets of fire" located in the roof space. The fire broke out in the west wing just before midday on Saturday, and the historic landmark will remain closed "until further notice". There were no artworks in that part of the building, a spokesman said. There are no reported injuries and the cause of the fire is currently under investigation.

  Firefighters can be seen tackling the blaze, which has been burning for hours

  Thick grey smoke could be seen billowing into the air from the landmark building, over the River Thames and nearby Waterloo Bridge. Speaking to reporters, the LFB's assistant commissioner Keeley Foster said firefighters carried out a "complex and technical response". They will remain at the scene into tomorrow, she added. She was joined by Somerset House's director Jonathan Reekie, who said: "It's too early to comment on the building's condition." He added the venue will remain closed until further notice, but the Courtauld Gallery will reopen to the public tomorrow. In an earlier social media post, Somerset House said the venue was closed due to the fire, and all events on Saturday would not take place. Following evacuation from the venue, staff and visitors were seen standing outside. "Everybody is safe, there are no valuable artefacts or artworks in that part of the building," Mr Reekie told the BBC earlier. "For now we just want to let the London Fire Brigade get on and do their brilliant work." Due to heavy smoke, the London Ambulance Service asked people to avoid the area and told local businesses to keep windows and doors shut.

  Firefighters were called at 11:59 BST on Saturday morning, LFB said

  Crews will be at Somerset House throughout Saturday night.

  Arts minister Sir Chris Bryant said he hopes the venue can reopen as soon as possible, and that his department is in touch with them. "I am sorry to hear about the fire at Somerset House, this historic building is home to some of London's great galleries and creative spaces." Somerset House is on the Strand in central London and is currently used as an arts venue. The Georgian era buildings and square were built on the site of a palace dating back to the Tudors. The venue is also home to the Courtauld Gallery, an art museum which houses the collection of the Samuel Courtauld Trust, including masterpieces ranging from the Middle Ages to the 20th century. Vincent Van Gogh's Self-Portrait with Bandaged Ear is part of the Courtauld collection, which also includes works by Impressionists Edouard Manet, Claude Monet and Paul Cezanne. Somerset House regularly hosts exhibitions, experiences and ice skating within its famous courtyard.

  Fifteen fire engines and over 125 firefighters have been deployed to a fire at Somerset House

  LFB said its crews were tackling flames which are "located in part of the building's roof". Twenty fire engines including crews from Soho, Islington and surrounding fire stations are at the scene, the Brigade added. Four aerial ladders were employed by the LFB, including one 64m long, to help tackle the blaze, the Brigade's assistant commissioner said. The Met Police said officers were called at 12:25 and attended along with LFB firefighters. Road closures were in place, the force said adding nobody is thought to be inside Somerset House.
