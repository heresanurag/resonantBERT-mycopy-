title: British woman and fiance found dead in Vietnam villa - BBC News
date: '2025-01-03'
section: Asia
url: http://www.bbc.co.uk/news/articles/c62wek6w1deo
content: |-
  Greta Marie Otteson, 33, was discovered dead in a room at a tourist villa in Hoi An, police said.

  Greta Otteson and Arno Quinton were found dead at a villa on Boxing Day

  A British woman and her South African fiance have been found dead in a holiday villa in Vietnam, local police have said. Greta Marie Otteson, 33, was discovered by staff dead on a bed in a first-floor room in Hoi An, a coastal city in the central region of the south-east Asian nation, at around 11:18 local time (04:18 GMT) on 26 December, police said in a statement on Monday. Her fiance Els Arno Quinton, 36, was found dead on a bed in another room in the villa that had reportedly been locked from the inside. The UK Foreign Office confirmed it was in contact with local authorities and supporting the family of a British woman who had died in Vietnam.

  Police said the rooms showed no sign of burglary

  Ms Otteson was a social media manager, and Mr Quinton was a musician and livestreamer. A video announcing their engagement was posted on Instagram by videography company Red Eye Studios on 11 December. Both had registered for long-term temporary residence at the Hoa Chuong villa, in the Cam Thanh commune, since last summer. Police said a preliminary inspection of the bodies had found no signs of external force and that the rooms showed no sign of burglary. Local media reports that several empty bottles of wine were found at the scene. An investigation into the cause of the pair's deaths is ongoing. A spokesperson for the UK Foreign Office said in a statement: "We are supporting the family of a British woman who has died in Vietnam and are in contact with the local authorities."
