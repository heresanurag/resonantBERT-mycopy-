id: bbc_2020_6828
title: How Venezuela's fuel crisis is hitting coronavirus victims - BBC News
date: '2020-06-01'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-52870279
content: |-
  Venezuela's fuel crisis is so acute that even funeral homes are struggling to transport bodies to the cemetery.

  Venezuela has the biggest oil reserves in the world. But it has been suffering an unprecedented fuel crisis due to widespread shortages at petrol stations.

  The government blames international sanctions. But it is just the latest episode of the country’s economic collapse that has caused millions to leave and led to international bodies, such as the UN, calling it one of the world’s worst humanitarian crisis for a country not in conflict.

  The fuel crisis has been so acute that even funeral homes are struggling to transport bodies to the cemetery.
