id: bbc_2019_893
title: French revellers start 2019 stuck on fair ride - BBC News
date: '2019-01-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-46731001
content: |-
  A helicopter was called in to help in Rennes after eight people got stuck more than 50 metres up.

  A helicopter had to be called in to help rescue eight people from a fairground ride after a new part caused a breakage.

  Firefighters on the ground were unable to reach the passengers on the ride at a fair in the French town of Rennes.
