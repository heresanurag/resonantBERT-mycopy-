title: YouTubers Jacksepticeye and Wiishu confirm 'emotional' split - BBC News
date: '2018-10-10'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-45807559
content: |-
  Irish social media star Jacksepticeye, who has 20m subscribers, posted it was "not an easy decision".

  One of the world's most followed YouTubers, Jacksepticeye, has split up with his vlogger girlfriend Wiishu.

  The Irish internet star, whose real name is Sean McLoughlin, regularly posts gaming commentary and comedy sketches to his 20m subscribers.

  He posted it was "not an easy decision" to break up with the Danish social media influencer - real name Signe Hansen.

  They had been together for around three years and lived in Brighton.

