content: |-
  A number of Wednesday's papers report on thousands of officers being on standby amid fears of fresh unrest.

  'Judgment day is here' and 'lawyers fear for safety'

  US Vice President and Democratic presidential candidate Kamala Harris and her newly chosen vice presidential running mate Minnesota Governor Tim Walz react as they hold a campaign rally in Philadelphia

  Violent disorder affecting towns and cities in England and Northern Ireland is once again on most of the front pages. The Times, external quotes senior police sources as saying the "outlook is bad" for the next 24 hours, but that officers are ready to respond. According to the Guardian, external, immigration lawyers have been warned to take extra security measures or stay away from work. The paper says law groups have blamed the former Conservative government for contributing to the far-right threat, by demonising "lefty lawyers". The Daily Mail, external focuses on the age of some of those involved - including some as young as 11 years old - next to the headline "shame of the child rioters". On the front of the Daily Telegraph, external are comments by the Director of Public Prosecutions Stephen Parkinson who told the BBC some rioters could be charged with terror offences.

  The Daily Mirror, external looks at the potential prison sentences, with the headline "10 years hard labour". Reform UK leader Nigel Farage is on the front of the Daily Express, external saying the UK faces a "perilous" moment. The paper quotes a video he posted on social media, in which Mr Farage claims the prime minister does not understand what he called a general feeling of dissatisfaction about immigration. Finally, many papers react to Kamala Harris picking the Minnesota Governor, Tim Walz, as her Democratic running mate in the US presidential election. The Financial Times, external says there are hopes Mr Walz, who is a former teacher, American football coach and national guardsman, can appeal to working class voters in key swing states.

