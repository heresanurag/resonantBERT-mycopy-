  In her interview, Harris also discussed owning a firearm, revealing that her pistol is made by Austrian company Glock. "I've had it for quite some time," she said, noting that her "background is in law enforcement". Harris, a former district attorney in California, laughed when asked if she had ever fired it, saying, "of course I have, at a shooting range." Also speaking on the same programme, Harris's running mate Minnesota Governor Tim Walz, criticised Trump for his comments on his opponents and migrants. "They're dehumanising, they go beyond weird because, I said this, it becomes almost dangerous. Let's try to debate policy in a real way and let's try to find objective truth again." He also defended his record of making false statements about his military service and travels in Asia in the 1980s. Walz described himself as a guy "telling a story, getting a date wrong", rather than a "pathological liar" like Trump. "I will own up to being a knucklehead at times, but the folks closest to me know that I keep my word."

  This video can not be played To play this video you need to enable JavaScript in your browser. Harris: ‘Ukraine must have a say on the future of Ukraine’

  Trump also was invited to 60 Minutes. He accepted, but later changed his mind and declined, according to CBS. Trump's campaign disputed that he ever agreed to be interviewed. His spokesman, Steven Cheung called it "fake news". During his 2020 presidential campaign, Trump walked out of his interview with CBS presenter Leslie Stahl after growing frustrated with questions about Covid-19. Earlier on Monday, Harris commemorated those killed or taken hostage on 7 October by planting a pomegranate tree at the vice-president’s residence in Washington. “A symbol of hope and righteousness... to remind future vice-presidents of the United States not only of the horror of October 7th but the strength and endurance of the Jewish people,” Harris said. Former President Donald Trump donned a black yarmulke as he visited Ohel Chabad Lubavitch, the final resting place of Rabbi Schneerson in Queens, New York on Monday. The site is considered the holiest Jewish site in North America, according to some Orthodox Jews.

