title: Harris talks on 60 Minutes about immigration and the economy - BBC News
date: '2024-10-08'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c8j7x8lv7jgo
content: |-
  Harris defended Biden-Harris policies as she answered questions on CBS primetime programme 60 Minutes.

  Harris pushed on Ukraine, debt and if 'mistakes' were made at border

  US Vice-President Kamala Harris was pressed on issues including the Middle East, Ukraine, gun ownership and immigration during a one-on-one interview with CBS News' 60 Minutes. The recorded interview comes as Harris ramps up media appearances on a series of podcasts and TV networks amid criticism that she has made very few. Donald Trump also was invited to 60 Minutes, but declined. There is less than a month to go before Election Day in the race for the White House between the Democrat and her Republican opponent.

  The interview on CBS News, the BBC's US partner, aired Monday night after both Harris and Trump appeared at events to commemorate one year since the 7 October attack on Israel. Harris declined to agree when asked by reporter Bill Whitaker whether Israeli Prime Minister Benjamin Netanyahu is a "strong ally" of the United States, after recent public disagreements between the White House and Jerusalem. "The work that we do diplomatically with the leadership of Israel is an ongoing pursuit around making clear our principles," Harris said. "I think, with all due respect, the better question is, do we have an important alliance between the American people and the Israeli people," she continued. "And the answer to that question is yes."

