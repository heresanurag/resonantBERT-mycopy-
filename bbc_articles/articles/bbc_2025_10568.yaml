title: Ed Sheeran thrills fans with 'surprise' Ipswich gig - BBC News
date: '2025-05-04'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/cm2e4rr9420o
content: |-
  The singer can drown his Ipswich Town sorrows after taking over a pub for a fortnight.

  To play this video you need to enable JavaScript in your browser. This video can not be played His intimate gig in a pub was watched by fans who got tickets by responding to a WhatsApp message

  Fans of Ed Sheeran have been treated to a "surprise" gig at a pub in his home county that he is taking over for a fortnight. The Thomas Wolsey in Ipswich town centre has been re-branded as The Old Phone - named after one of Sheeran's latest songs. The pub will be known by that name for two weeks, before it reverts to its actual name again. Music-lovers have been speaking of their delight at seeing the global star perform on their doorstep.

  Rachel Clements described herself as a "big fan" of Sheeran

  Rachel Clements, 28, from Stowmarket, said she was "very excited that he's doing something this small, in our home town". Ms Clements said she was hoping to hear his latest track and new material from his Play album, which includes a song called Old Phone. "We had one of his songs as our wedding song last year, so in a way I'm hoping he'll do that," she added. Ms Clements was among the many fans who responded to an Ed Sheeran WhatsApp message to get tickets. People were also waiting to see if they might be let in if there was space. It is the latest instalment of Sheeran's pop-up pub concept. He has previously opened versions of The Old Phone in Ipswich, Massachusetts, US,, external for one night, and another one at the Coachella festival in California, external.

  Ed Sheeran carried out a soundcheck and was expected to perform for at least an hour at Sunday lunchtime

  Sheeran fan Alyssa Ali happened to be visiting Ipswich when she heard about the "pop-up" gig

  Alyssa Ali, 20, from Florida in the US, had been in London where she has been studying for a month. She fortuitously decided to come to Ipswich this weekend, as part of her travels around the UK. Sheeran grew up in Framlingham, about 15 miles north of Ipswich, but he is known for being an avid Ipswich Town fan and has sponsored their shirts, and he played gigs at other pubs in the town before he became famous. "I love Ed and have been a fan for a decade," said Ms Ali. "So I had to come to his hometown and go around Ipswich, and I was here yesterday, and then he decided to pop-up here in this pub, and my hotel's eight minutes walk from there, so we ran over here as soon as I found out, hoping to get in. "I'm so nervous because I don't know if I'll be able to get in. I'm just so excited to be in his presence again." She said she was very much looking forward to hearing his new songs.

  Michael Marron hoped to be allowed into the pub to see Sheeran

  Michael Marron, 38, from Ipswich, was also hoping to see Sheeran perform. "Delighted, we saw him do this show in America and we were wondering if he would do something like this in Ipswich. "It's great that he's come back to Ipswich and he's entertaining the people of Suffolk." Sheeran is known for playing impromptu gigs in Suffolk's county town, including one on the Town Hall steps in 2022. "It's a buzz, and he always goes the extra mile for the people of Suffolk," said Mr Marron. "I remember he was here not so long ago and he gifted a guitar to a primary school child. It's great to see celebrities do that."

  Hopeful fans queuing for tickets on St Peter's Street to see Sheeran play

  It is understood music bloggers, influencers and selected fans were invited or picked at random to attend the gig, external. Last week, the musician announced a a run of three gigs at Ipswich Town's Portman Road in July. He is also a minority stakeholder in the club, which has just been relegated from the Premier League. The Thomas Wolsey is named after one of Ipswich's most famous sons - Henry VIII's right hand man Cardinal Wolsey, whose statue is just along the road from the pub.

  The pub used to be called Bar IV .. and before that The Blackadder

