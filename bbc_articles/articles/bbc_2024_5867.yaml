title: Daylight reveals extent of damage to Baltimore bridge - BBC News
date: '2024-03-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68664704
content: |-
  Footage shows the collapsed Francis Scott Key Bridge, after a container ship collided with it.

  Aerial footage filmed in the daylight shows the extent of damage to the collapsed Francis Scott Key Bridge in the Patapsco River after a container ship ran into it.

  The fire department say a large vessel hit a column of the Francis Scott Key Bridge at around 01:30 ET (05:30 GMT).
