title: Funfair ride 'malfunction' at Lambeth Country Show leaves four hurt - BBC News
date: '2024-06-08'
section: London
url: http://www.bbc.co.uk/news/articles/cgee1401lj1o
content: |-
  An investigation is launched after an child, 11, and three adults are hurt at the Lambeth Country Show.

  Investigation as four hurt in funfair 'malfunction'

  On Sunday tarpaulin was seen around one of the rides, although it is not clear which ride suffered the malfunction

  An investigation has begun after four people, including an 11-year-old girl, were taken to hospital when a funfair ride malfunctioned at a country show in south London. The incident happened during Lambeth Country Show in Brockwell Park at about 18:20 BST on Saturday, according to Lambeth Council. It said the investigation would "determine the cause of the malfunction". Funfair rides at the show will be closed on Sunday, the council added.

  The Health and Safety Executive has been informed of the incident

  One of the fairground rides could be seen covered in tarpaulin on Sunday morning, although it was not clear which ride had malfunctioned. The council said emergency services had arrived at the scene shortly after the incident and the funfair had been closed. Writing on X, formerly Twitter, the Metropolitan Police in Lambeth said the other injured people were a man and a woman in their 40s and a man in his 50s. The Met added none of those hurt were in a life-threatening condition. Cordons had been put in place and the Health and Safety Executive would be informed, the police said. Additional safety checks were being carried out on all rides and attractions at the show, Lambeth Council said.

  Funfair rides at the show were closed on Sunday

  It said on Sunday that the four injured people were being cared for in hospital, adding: "Our thoughts are with them. “We thank the emergency services for their swift response and for the support they are providing to the affected families. "To allow a full investigation, funfair rides at the show will be impacted by closures for the second day of the country show. "The safety and well-being of our attendees remains our top priority, and we are committed to providing a secure and enjoyable experience for all visitors.” The show continued from 13:00 BST on Sunday but with all fairground rides shut and cordoned off. A ride topped with a giant frog was among those seen behind tall black fencing. Signs that said "apologies for any inconvenience, this ride will not open today" were pinned to wire fencing circling the fairground area. Disappointed visitors of all ages were seen reading the signs and talking to a fairground worker, who told them all the rides are shut, before heading off to enjoy other attractions at the event. The incident fell on the 50th anniversary of the Lambeth Country Show, which is one of the "biggest free family festivals in the UK", according to its website. A spokesperson for London Ambulance Service said four crews were deployed along with members of its hazardous area response team and an air ambulance. All four people injured were taken to "major trauma centres", they added.
