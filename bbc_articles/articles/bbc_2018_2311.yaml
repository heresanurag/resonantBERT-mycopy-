id: bbc_2018_2311
title: MP Ben Bradley apologises for Corbyn tweet - BBC News
date: '2018-02-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-43183344
content: "Ben Bradley says the tweet was \"wholly untrue\" and will make a donation\
  \ to charity.\n\nA Tory MP has apologised for posting a tweet in which he said Jeremy\
  \ Corbyn had passed British secrets to a spy from communist Czechoslovakia.\n\n\
  Ben Bradley said the now deleted tweet was \"wholly untrue and false\".\n\nHe will\
  \ also donate an undisclosed sum to a charity supported by the Labour leader and\
  \ has agreed not to repeat the allegation.\n\nLabour had said a Sun story about\
  \ Mr Corbyn having contact with a Czech spy in the 1980s was \"absurd\".\n\nA spokesman\
  \ denied that Mr Corbyn ever acted as a collaborator or agent of the Communist regime\
  \ in Czechoslovakia.\n\nLabour said Mr Bradley agreed to tweet an apology that says:\
  \ \"On 19 February 2018 I made a seriously defamatory statement on my Twitter account,\
  \ 'Ben Bradley MP (@bbradleymp)', about Jeremy Corbyn, alleging he sold British\
  \ secrets to communist spies.\n\n\"I have since deleted the defamatory tweet. I\
  \ have agreed to pay an undisclosed substantial sum of money to a charity of his\
  \ choice, and I will also pay his legal costs.\n\n\"I fully accept that my statement\
  \ was wholly untrue and false. I accept that I caused distress and upset to Jeremy\
  \ Corbyn by my untrue and false allegations, suggesting he had betrayed his country\
  \ by collaborating with foreign spies.\n\n\"I am very sorry for publishing this\
  \ untrue and false statement and I have no hesitation in offering my unreserved\
  \ and unconditional apology to Jeremy Corbyn for the distress I have caused him.\"\
  \n\nHe had been threatened with legal action over his tweet.\n\nMr Bradley will\
  \ make a donation to a foodbank and a homeless charity in his Mansfield constituency.\n\
  \nA spokesperson for Mr Corbyn said: \"We are pleased Ben Bradley has admitted what\
  \ he said was entirely untrue and apologised, and that charities in Mansfield will\
  \ benefit.\n\n\"Following the botched smear campaign against Jeremy, this case shows\
  \ we are not going to let dangerous lies go unchallenged.\"\x9D"
