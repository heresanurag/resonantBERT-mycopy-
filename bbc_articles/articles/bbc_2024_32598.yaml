  I think it's been a big Test for the Aussies. They showed a lot of fight to get through that first night, only losing one wicket, and I think answered a few questions. There were plenty of questions after that Perth Test match where they didn't really show any fight, but you saw here from the first ball what it meant to them. Marnus Labuschagne, the way he has played with pressure on him... he looked more confident and more at ease. Steve Smith got strangled down the leg side so there is still probably a question mark over him. Pat Cummins looked short of a gallop in Perth and looked so much better here. The majority of the questions have been answered. If Steve Smith can come out in the next Test and get a hundred I think Australia will be in a pretty good spot.
