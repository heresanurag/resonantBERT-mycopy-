content: |-
  CCTV catches moment pick-up truck turns into a busy street in New Orleans killing several people.

  CCTV footage shows the moment before the New Orleans attack suspect drove down Bourbon Street ramming into crowds.

  The driver who sped into people celebrating New Year in the city's French Quarter has been identified as Shamsud-Din Jabbar, a US Army veteran from Texas, who was killed in a shootout with police.
