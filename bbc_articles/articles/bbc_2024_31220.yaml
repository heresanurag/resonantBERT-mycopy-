  Oleksandr Usyk talks to BBC Sport before his heavyweight world title rematch with Tyson Fury in Saudi Arabia on Saturday.

  Oleksandr Usyk talks to BBC Sport before his heavyweight rematch with Tyson Fury for the WBC, WBA (Super) and WBO titles in Saudi Arabia on Saturday.

  Follow live text and radio commentary of Usyk v Fury 2 from 20:00 GMT on Saturday, 21 December on BBC Sounds, BBC Sport website & app.
