title: Coldstream Guards return to Berwick to mark 375th anniversary - BBC News
date: '2025-06-11'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cly3jd2jgl9o
content: |-
  The regiment travels to its birthplace of Berwick to mark the anniversary.

  The regiment travelled to Berwick from London

  To mark the 375th anniversary of the regiment's formation, the Coldstream Guards boarded a train in London and travelled back to their birthplace in Berwick-upon-Tweed, where crowds lined the streets to welcome the guardsmen home. In full ceremonial dress, the oldest continuously serving regiment in the British Army paraded through the border town with the Band of the Coldstream Guards.

  The guardsmen boarded the train in ceremonial uniform at Kings Cross

  Music was played as the guardsmen lined up to board

  It takes under four hours to get from London to Berwick by train

  The regiment was formed in Berwick in 1650, but in 1660 marched down to London to help restore the monarchy, dissolve Parliament and bring back Charles II to the throne. Back then, the journey took five weeks. Tuesday's trip, by contrast, took just a few hours - with the guards back in London by evening.

  The trip was a far cry from the five week-long journey to London in 1660

  The mood was high before the train departed Kings Cross to Berwick-upon-Tweed

  Following the parade, the guardsmen attended a Service of Thanksgiving at Berwick Parish Church. The soldiers were joined by the Colonel of the Regiment, Lieutenant General Sir James Bucknall, and the Mayor of Berwick at the Guildhall for an inspection and civic reception. Formed in 1650 during the English Civil War, the regiment has served in every major conflict since and earned 113 battle honours and 13 Victoria Crosses. After returning to London, the regiment will be presented with new Colours at Windsor Castle before taking centre stage at Trooping the Colour on 14 June, where they will troop the new flags for the King's official birthday.

  The Coldstream Guards paraded through Berwick on their arrival

  The soldiers were accompanied by the Band of Coldstream Guards

  Crowds lined the streets to welcome the guardsmen home

  The parade was followed by a church service at Berwick Parish Church

