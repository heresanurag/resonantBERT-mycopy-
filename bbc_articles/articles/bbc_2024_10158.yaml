title: 'Real Housewives: Star felt pressure of South Asian representation - BBC News'
date: '2024-05-15'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-69004896
content: |-
  Jessel Taank tells BBC Asian Network about her experiences of being the first South Asian cast member.

  Jessel joined The Real Housewives of New York City in season 14

  Between fights, friendships and fame, the life of a Real Housewife can be hectic. And with The Real Housewives of New York City currently filming season 15, viewers can expect to get a peek into the lives of the Big Apple's rich and famous. Current star Jessel Taank spoke to BBC Asian Network about her experiences of being the first South Asian cast member on the reality TV show. "I did feel an immense amount of pressure. It's kind of like all eyes on you," she says. "I just want to focus on being myself and representing what being Indian means to me." Jessel says it didn't help that she felt misunderstood by her cast mates. Her grandparents were born in India, later emigrating to Kenya and then going to London - something she says "was really confusing" for others on the show. "A lot of the cast mates didn't understand that," she says. "They were confused as to why I was from Africa or assume that because I'm Indian, I grew up wealthy."

  Jessel says recording the show can be stressful, thanks to the pressure to create drama for viewers. "We are on a TV show and I think watching women be super-nice to each other isn't really entertaining, right? So you do have to turn the heat up. "On my show we all have very strong personalities and there can be a massive clash, so there can be tension. "But obviously we have to elevate and heighten that emotion for television," she says.

  The glamorous lives of the Real Housewives will be on show for season 15

  With Bravo's Real Housewives franchise being known for cliques and cat fights, Jessel says social media can be a scary place for the cast. "People forget the show is just a snapshot of our lives," she says. "For example, on the show I spoke about not coming from a wealthy background. And someone created a fake website that stated I went to one of the most elite girls' schools in London - which was an absolute lie." Jessel points out that she's worked as a fashion publicist and brand consultant and now runs her own business - something which sets her apart from some previous cast members. "I think the women that have been featured in some of the other Real Housewife shows do come from generational wealth or married into it, so they can be out of touch with reality. "But for my show, one of the biggest things that producers wanted was women who are self-made with an exciting career path and an interesting background," she says.

  Despite feeling a sense of pressure as the only South Asian cast member, Jessel thinks it's an important step in the entertainment industry. "I think the viewers really like the dynamic I have with my husband. Some people assume Indians are very reserved, but we're really open about our relationship." Jessel says she and her family have received comments about some of the issues she's spoken about in the show. "How I speak on reproduction and pregnancy struggles and those types of taboo topics that are not really shared publicly and within our community. "I think a lot of Indian women are particularly afraid to talk about taboo topics openly. "So the fact that I was doing it and doing it quite openly was hopefully refreshing and helped a lot of people," she says.

