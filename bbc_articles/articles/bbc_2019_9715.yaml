title: Hong Kong demonstrators use laser pointers in anti-government protest - BBC
  News
date: '2019-08-08'
section: General
url: http://www.bbc.co.uk/news/world-asia-49280030
content: |-
  The demonstration followed the arrest of a student leader for possessing several laser pointers.

  Hundreds of people gathered outside Hong Kong's Space Museum on Wednesday night to carry out a protest using laser pointers.

  It followed the arrest of a student for possessing what police called an "offensive weapon" after he was found with several of the devices.
