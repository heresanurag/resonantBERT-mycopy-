title: Adrien Brody becomes Olivier Award nominee days after Oscar win - BBC News
date: '2025-03-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy9dx2g9pplo
content: |-
  Other theatre acting nominees include Lesley Manville, Ben Whishaw, John Lithgow and Imelda Staunton.

  Adrien Brody was named best actor at Sunday's Oscars for his role in The Brutalist

  US star Adrien Brody has been nominated for the UK's most prestigious theatre awards, the Oliviers, just days after being named best actor at the Oscars. Brody appeared on the London stage in The Fear of 13 last year, just before the start of the film awards season, which saw him win a Bafta, Golden Globe and Academy Award for his role in The Brutalist. Other Olivier nominees this year include John Lithgow, who is also nominated for best actor, for playing Roald Dahl in the play Giant. Lesley Manville, Ben Whishaw, Imelda Staunton, Meera Syal, Billy Crudup, Mark Strong and Paapa Essiedu are among the other acting nominees.

  In The Fear of 13, Brody portrayed Nick Yarris, a man who was wrongfully convicted for murder and spent 22 years on Death Row. Other plays in the running this year include Kyoto, Shifters, Giant and The Years, which have five nominations each. Romola Garai has two nominations - going up against herself in the best supporting actress category for her roles in Giant and The Years. Fiddler On The Roof scored the most nominations overall with 13 nods, including best musical revival. That ties the record for the most Olivier nominations, after musical Hamilton also received 13 nods in 2018. The Oliviers will be hosted by singer-songwriter Beverley Knight and actor and singer Billy Porter on Sunday 6 April at the Royal Albert Hall.

