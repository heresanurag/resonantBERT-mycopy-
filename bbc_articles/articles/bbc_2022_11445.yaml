title: Queen 'helped to change attitudes' in Northern Ireland - BBC News
date: '2022-09-13'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-62894026
content: |-
  Stormont Speaker Alex Maskey pays tribute to the Queen's contribution to peace in Northern Ireland.

  Queen Elizabeth II made a "huge difference in changing attitudes and building relationships" in Northern Ireland, Stormont Speaker Alex Maskey has said.

  The Sinn Féin politician paid tribute to her as he offered a message of condolence to Charles III on the new monarch's first visit to Northern Ireland as King.

