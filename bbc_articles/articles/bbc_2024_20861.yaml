title: 'Newspaper headlines: PM''s Musk spat and Queen Keely''s Paris gold - BBC News'
date: '2024-08-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c4gee2pknp3o
content: |-
  A number of Tuesday's papers feature stories of an army of standby police ready to prevent disorder spreading across the UK.

  Police officers have been injured in Plymouth overnight, in what the Devon and Cornwall force has called 'sustained violence'

  Most of the front pages feature pictures of the Team GB athlete Keely Hodgkinson beaming with delight after winning Olympic gold in the 800m in Paris. In the images she's holding a Union Flag in one hand and a crown in the other - the Daily Telegraph, external describes her as "Queen Keely" The Daily Express, external writes it is simply "sensational". Elsewhere, "too scared to leave our homes" is the Daily Mirror's, external lead as the tabloid reflects on speaking to people targeted by rioters in Middlesbrough over the weekend. In an opinion column, the i newspaper, external describes Elon Musk's views as "irksome". But it is more disturbed by the what it calls a "malignant sump of online hate" as it refers to a far-right group on the messaging app Telegram which it says was seeking to provoke attacks on specific "immigration-linked law firms and advice centres".

  Under the headline "policy vacuum", the Times, external argues that as well as rebuking the far-right hooligans, Sir Keir Starmer's government must undermine their cause by tackling the UK's flawed immigration system. The Financial Times, external has a big red graph on its front page, illustrating what it calls the "tumble" in global stocks. One senior analyst is quoted saying the market "moved from a warm summer's day, straight into autumn". The Guardian, external reports the Italian designer label, Dolce & Gabbana, has provoked the anger of the RSPCA with its latest product: a perfume for dogs. "Fefe" takes its name from the four-legged friend of the label's co-founder, Domenico Dolce. But the RSPCA advises that, for dogs, strong-scented products such as perfumes or sprays should be avoided. Finally, the Daily Star, external says signer Sir Rod Stewart has angered Donald Trump supporters by mocking the orange man-baby for his Tango complexion.

