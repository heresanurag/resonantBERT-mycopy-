  Another good start for Denmark - the stats
  • None Denmark have won four of their five opening games at World Cup tournaments, losing only to the Netherlands in 2010.
  • None Peru are winless in their last seven World Cup games (won none, drew two, lost five).
  • None Denmark have won three of their four World Cup matches against South American opponents, with the only exception being a 3-2 defeat against Brazil in the 1998 quarter-final.
  • None This was just Denmark's second clean sheet across their last 12 World Cup matches (also 2-0 vs France in 2002).
  • None Peru's missed penalty in the first half means there have already been more unsuccessful penalty attempts in this World Cup (2/5) than there were in the whole 2014 tournament (1/13, excluding shootouts).
  • None Denmark goalkeeper Kasper Schmeichel has kept a clean sheet in his last five appearances for Denmark. He has gone 534 minutes without conceding at international level, with his last goal shipped coming from the Republic of Ireland's Shane Duffy in November.
  • None Schmeichel has already kept as many World Cup clean sheets as his father Peter did in five appearances in the competition (one).
  • None Christian Eriksen has been involved in 17 goals (scored 12 and assisted five) in his last 14 appearances for Denmark.

  'There was a great atmosphere' - what they said

  Denmark coach Age Hareide: "They (Peru) did a lot to try and get an equaliser. It is now a fifth game without conceding a goal and it is very tough to play against World Cup opponents and do that."

  On goalkeeper Kasper Schmeichel's performance, Hareide added: "He is acrobatic, a very quick goalkeeper and his goalline play is probably the best in the world when he is on form.

  "He had a fantastic performance and it was needed. You have to acknowledge the performance of Kasper but also the defence and the whole team."

  Peru coach Ricardo Gareca: "We were playing against Denmark who are truly a great side.

  "There was a great atmosphere in the stadium and that means we want to perform.

  "We knew we would have great support, but we didn't think there would be so many people having to travel so far."
