title: 'Jas Athwal: London Renters'' Union calls for landlord MP to resign - BBC News'
date: '2024-09-02'
section: London
url: http://www.bbc.co.uk/news/articles/czjy2g4m49mo
content: |-
  Jas Athwal says he is "sickened" by the state of his rental flats and pledged to resolve the issues.

  Landlord MP should stand down, renters' union says

  Labour's Jas Athwal was elected as the Ilford South MP in July

  The London Renters' Union (LRU) has called on Labour MP Jas Athwal to stand down after a BBC investigation found black mould and ant infestations in his rental properties. The union, which has 7,000 members across the capital, has also written to Redbridge Council urging it to investigate its former leader over what it called "housing law violations". The MP for Ilford South owns 15 properties, making him the biggest landlord in the House of Commons. He previously said he was he was "shocked and sickened" by the state of the flats and that he had stopped using the services of the agency that managed the properties.

