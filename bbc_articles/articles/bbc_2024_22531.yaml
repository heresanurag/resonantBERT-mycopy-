  When asked about the case earlier on Monday, Prime Minister Sir Keir Starmer said: “It’s not good enough. It’s unacceptable for any landlord, and I’ll be really clear about that. It doesn’t matter whether it’s a Labour MP or anybody else, it’s unacceptable." A tenant reported an ant infestation affecting their child, while another said they were warned of eviction if they claimed benefits. Mr Athwal also admitted his flats lacked the required licences under a scheme he introduced as Redbridge Council leader, despite earlier claiming compliance. Hester Sullivan, a spokesperson for the LRU, said: “Athwal left his tenants facing toxic mould and dangerous disrepair and has broken laws on licensing, which is a key part of the tenant safety system. "Athwal has also admitted to refusing to let out properties to renters who receive housing benefit, a practice that prevents many low-income people from accessing adequate housing."

  She added that renters would not have trust in Parliament's ability to resolve the national housing crisis were Mr Athwal to remain an MP. In response to the allegation about not accepting tenants receiving benefits, Mr Athwal told BBC London he currently rents to people who are in receipt of housing benefit. "In my previous comments I was referring to tenants being placed directly by Redbridge Council specifically; it’s this conflict of interest I was preventing while renting properties while serving as the leader of the council," he said. The Ilford South MP has also said he will reimburse any tenants who are out of pocket for repairs to the properties and that he will be surveying his renters to address any issues. On Saturday, Redbridge Council's Conservative leader Paul Canal called on Mr Athwal to step down as a councillor - a role he has kept since becoming an MP - and urged the council's officers to investigate. A spokesperson said the council was committed to a "fair and consistent process for every landlord applying to the selective licensing scheme", adding that it would "continue to work with landlords to ensure that they are compliant and their properties are in a condition suitable for tenants."
