content: |-
  In the Queen's Speech debate the PM tells MPs it will be set up within this parliamentary session.

  As we reported first thing this morning, La Scala opera house in Milan, Italy, reopened on Monday evening after being closed for six months.

  Only 500 spectators were allowed in for the performance - a fraction of the theatre's normal capacity of 2,000.

  Bad news too for half-time Spritz fans, there was also no intermission last night and the bars were closed. But the show went on...

  To respect social distancing, the musicians took over the ground-floor seating area... Image caption: To respect social distancing, the musicians took over the ground-floor seating area...

  ...while the audience took their seats on the balconies Image caption: ...while the audience took their seats on the balconies

  Only 500 ticket-holders will be admitted for each performance for the time being Image caption: Only 500 ticket-holders will be admitted for each performance for the time being

  The performance came a day before the 75th anniversary of a historic concert in 1946 that celebrated the post-war re-opening of the opera house - which had been bombed three years earlier and rebuilt.

  "We have all listened to recorded concerts from our armchairs, but this has nothing to do with the emotion of live music, the quality and beauty of natural sound," Dominique Meyer, La Scala's director since 2020, told the AFP news agency.
