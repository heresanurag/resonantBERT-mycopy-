title: 'Ruud van Nistelrooy: Dutchman exits Man Utd as new manager Ruben Amorim decides
  not to keep him in backroom staff - BBC Sport'
date: '2024-11-11'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/ce31kjykk8vo
content: |-
  Ruud van Nistelrooy leaves Manchester United after not being given a role in new manager Ruben Amorim's backroom staff.

  Between 2001 and 2006 Ruud van Nistelrooy scored 150 goals in 219 games for Manchester United

  Ruud van Nistelrooy has left Manchester United after not being given a role in new manager Ruben Amorim's backroom staff. The 48-year-old Dutchman took over at Old Trafford on an interim basis after compatriot Erik ten Hag was sacked. Van Nistelrooy, who joined United as an assistant coach in July on a two-year deal, managed three victories and a draw in his four games during his time as caretaker boss. However, Amorim has decided against retaining the services of former Netherlands striker Van Nistelrooy, who spent five seasons at United as a player. "Ruud is, and always will be, a Manchester United legend," the club said in a statement which confirmed Van Nistelrooy's exit. "We are grateful for his contribution and the way in which he has approached his role throughout his time with the club. He will always be very welcome at Old Trafford." United confirmed that fellow coaches Rene Hake, Jelle ten Rouwelaar and Pieter Morel have also left the club. However, former United midfielder Darren Fletcher will remain in his coaching role and continue his link between the first team and the academy. United said they will "confirm the full men's first-team coaching composition" under the new Portuguese boss "in due course".

  New Manchester United boss Ruben Amorim and chief executive Omar Barrada embrace at Manchester United's training ground

  Amorim was appointed on a two-and-a-half-year deal earlier this month and flew into the UK from Lisbon on Monday afternoon having completing his stint as Sporting boss. He was met at United's Carrington training ground by United chief executive Omar Barrada and given a tour of the facilities. The 39-year-old has 13 days during the international break to prepare for his first match in charge of United, away against Ipswich in the Premier League on 24 November.

  This is not the most surprising news but some fans will greet it with disappointment. Ruud van Nistelrooy made it clear he had a contract to remain as assistant manager until June 2026 and wanted to see it through. However, Ruben Amorim has his own long-established coaching team and there is no space in it for someone who has vast experience of Manchester United and managerial ambitions of his own. It could be argued United might have given Van Nistelrooy time to make a claim on the job himself but chief executive Omar Berrada knew who he wanted to replace Erik ten Hag so the decision was moot. However, Van Nistelrooy has impressed inside and out of the club over the last four games, so who knows what might happen in the future. Interestingly though, former United midfielder Darren Fletcher will remain in his role and continue his link between the first team and the academy.

