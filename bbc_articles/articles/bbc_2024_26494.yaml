title: 'Watch: Rare footage of a cartel gun battle near US-Mexico border - BBC News'
date: '2024-10-27'
section: General
url: http://www.bbc.co.uk/news/videos/c0lpwk7yj0yo
content: |-
  Texas law enforcement said the shootout was between factions of the Gulf Cartel.

  Rare footage of an intense cartel gun battle was captured by a Texas Department of Public Safety aircraft (DPS) on Wednesday.

  The shootout was between fighting factions of the Gulf Cartel, less than one mile from the US-Mexico border, according to Texas DPS.

  Lieutenant Christopher Olivarez said residents on both sides of the border were used to the exchange of gunfire, but it was rare to record such an event on camera.
