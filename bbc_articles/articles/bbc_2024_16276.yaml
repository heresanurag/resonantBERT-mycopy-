  BBC Sport goes into the archives to look at the tennis career of Andy Murray, who has announced he will retire after the 2024 Paris Olympics.

  BBC Sport goes into the archives to look at the career of three-time Grand Slam champion Andy Murray, who has retired from tennis after his exit from the men's doubles - with Dan Evans - at the Paris 2024 Olympics.

