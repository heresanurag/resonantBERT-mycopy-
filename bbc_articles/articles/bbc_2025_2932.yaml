title: 'Six Nations 2025: England pick fly-half Fin Smith to face France - BBC Sport'
date: '2025-02-07'
section: England
url: http://www.bbc.co.uk/sport/rugby-union/articles/c7vd9e36689o
content: |-
  England confirm a positional switch with fly-half Fin Smith making his first Test start while Marcus Smith moves to full-back.

  'I want to get the attack flowing' - Fin Smith

  Fin Smith has a total of 122 minutes international experience so far in his England career

  Coverage: Listen on BBC Radio 5 Live and BBC Sounds and follow live text commentary and highlights on the BBC Sport website and app.

  Fly-half Fin Smith says he is focusing on making the rest of the England backline look good on his first Test start on Saturday. The 22-year-old has been picked at 10 ahead of the more experienced Marcus Smith, who switches to full-back, for the Six Nations second-round game against France at Allianz Stadium. Fin Smith's international experience has been limited to seven appearances off the bench so far. "If I can get the attack flowing, get some of the some of the awesome backs we've got into the game, then I'll feel like I've put in a decent performance," he told Rugby Union Weekly. "The main thing I want to do is is give those guys a platform and and real clarity about what I want from them and hopefully allow them to excel themselves." His Northampton team-mate Ollie Sleightholme comes in for the injured Cadan Murley on the wing and brings the Saints contingent in the backline up to four with Tommy Freeman and Alex Mitchell also starting.

