  He added that he was inspired at the starting line by words of encouragement from the race starter, Paula Radcliffe. "She looked at me in slight amazement and said, 'good luck, man with crutches'," Mr Terrill said. "That was not only the highlight of my marathon, but pretty much the highlight of my entire sporting career, to be egged on by the great Paula Radcliffe." Mr Terrill has made a full recovery and no longer needs the crutches. He uses his marathons to fundraise for the Royal Navy and Royal Marines Charity, and his next event will be the Brighton Half Marathon on 2 March.
