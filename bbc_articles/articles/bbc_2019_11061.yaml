title: Historic house's river journey to new home - BBC News
date: '2019-09-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49847324
content: |-
  The Georgian-style mansion was shipped down a river to its new home in Queensland, Maryland.

  The new owner shipped the Georgian-style mansion down the Tred Avon River on a 50-mile journey. The ageing property will be restored once at its new home in Queenstown, Maryland.
