content: |-
  It first appeared on the weekend and has since expanded to a width of around 80m.

  A sinkhole in the Mexican state of Puebla is growing by the day - and threatening to swallow a home.

  It first appeared on Saturday and has since expanded to a width of around 80m (262ft).
