title: Diamond fetches $33.7m at Christie's auction in Geneva - BBC News
date: '2017-11-14'
section: Business
url: http://www.bbc.co.uk/news/business-41933880
content: |-
  A necklace featuring a huge 163-carat flawless diamond goes under the hammer in Geneva.

  This video can not be played To play this video you need to enable JavaScript in your browser. The 163 carat diamond was the largest of its kind to go under the hammer

  A diamond necklace featuring a flawless 163-carat diamond - the largest of its kind to be auctioned - has fetched $33.7m (£25.6m) at a Christie's event in Geneva.

  The colourless diamond was taken from a 404-carat stone found in Angola.

  The finished piece is made from white gold, diamond and emeralds.

  The necklace was designed by Swiss jewellery maker de Grisogono and took more than 1,700 hours to make, Christie's said.

  It went under the hammer at Geneva's Four Seasons Hotel following a series of public viewings in Hong Kong, London, Dubai and New York.

  The necklace, named The Art of de Grisogono, sold for $33.5m - $29.5m plus $4m premium - exceeding pre-sale predictions of $30m.

  The buyer's identity has not been revealed.
