  The start of Sale's Champions Cup tie against Toulouse was delayed by 40 minutes after a parachutist had to be rescued from the roof of the stadium. Captain Yannick Trouillet was supposed to be delivering the match ball but went off course and was left dangling from the roof of the Stadium de Toulouse after his parachute got snagged in the awning. Supporters in the packed stand some 30 metres below were moved as a precaution, as officials worked out how to free the captain. Stadium staff and Toulouse's lion mascot gathered post protectors to place underneath Trouillet as a potential safety mat, and a large children's inflatable rugby pitch was brought in from outside the stadium to provide further cushioning.

  Toulouse staff and club mascot Ovalion run across the pitch with post protectors

  After a nervy delay of about 25 minutes, firefighters in a cherrypicker finally freed the parachutist - who wasn't hurt - to big cheers from the crowd. The players, who had returned to the dressing room while the rescue took place, were called back out and the last-16 match finally kicked off. Holders Toulouse went on to secure their place in the quarter-finals with a 38-15 victory. Dominic McKay, chairman of tournament organisers European Professional Club Rugby (EPCR), thanked everyone involved in Trouillet's rescue. "We would like to extend our sincere thanks to all involved at the stadium, both clubs and the emergency services for safely returning the parachutist to the ground," he said. "The safety of the individual and of spectators in the stadium is of the utmost priority. "We will pick up with Stade Toulousain and the stadium in due course."

