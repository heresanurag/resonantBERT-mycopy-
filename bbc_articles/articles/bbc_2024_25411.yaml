  Shooting to fame at just 16 years old, and dying at 31, many of his fans were a similar generation and grew up with him. A 21-year-old Brit, Ivor Radway, who lives around the corner from the hotel told the BBC he had seen One Direction at Wembley and the news had “really shocked” him – leaving him wondering if Payne had received enough support. Indeed, many fans remember him as a smiley singer of feel-good tunes – a far cry from the horrifically dark image painted of his final moments. But it wasn’t a secret he’d faced demons. He’d spoken openly about struggling with alcohol, mental health problems and the struggles of fame and of parenting a young son at times. The BBC had also seen a cease-and-desist letter against the singer earlier this week from his former fiancée, the model Maya Henry. She’d accused him of repeated unwanted contact, but he’d not responded to the allegations. His music, and openness about his own mental health, were what drew some fans to him. One tribute left outside the hotel reads: “Thank you for saving my life. I’m sorry I couldn’t do the same for yours.”
