  A play-by-play of the Republican leader's so-far unsuccessful efforts to become Speaker of the House.

  The Republican leader had hoped to secure enough votes to be named Speaker of the House. But that's not what happened.

  Watch the play-by-play of how the day unfolded for America's most senior conservative politician.
