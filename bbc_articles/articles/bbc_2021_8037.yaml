  Boris Johnson takes PMQs remotely from Chequers, after being pinged by the NHS Covid app.

  Did the PM say Covid was only killing over 80s? Starmer asks

  Labour leader Sir Keir Starmer says on 26 May, he asked the prime minister if he had ever used words to the effect that "Covid was only killing over 80 year olds". He says that on that day, the PM never outright denied using the words. He says with the revelation from former aide Dominic Cummings, citing messages between him and the PM, we can now see that the PM did say that. He asks if the prime minister will apologise for using those words. Boris Johnson says nothing he can say or do "can make up for the loss and the suffering that people have endured during this pandemic". He says when decisions were being made "in those incredibly tough and dark times" that the government had to try and balance the damage done by lockdown versus letting the virus spread.
