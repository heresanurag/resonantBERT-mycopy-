title: Christchurch mosques shooting survivor one year on - BBC News
date: '2020-03-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-51858937
content: |-
  Wasseim and his daughter are among the survivors of New Zealand's Christchurch mosques shooting.

  Fifty-one people were killed when a gunman opened fire during Friday prayers at the Al Noor and Linwood mosques in Christchurch, New Zealand.

  Wasseim and his daughter were at the Al Noor mosque at the time.

  Ahead of the one-year anniversary this coming Sunday, Wasseim spoke of the challenges of their recovery.
