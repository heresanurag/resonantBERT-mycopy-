title: 'Polegate: Man arrested after crashed vehicle found abandoned - BBC News'
date: '2024-06-09'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c3ggjp03n8go
content: |-
  A badly damaged vehicle was found in dense bushes and undergrowth in Polegate on Friday night.

  Police searching for the driver of a vehicle found crashed and abandoned have arrested a man. Emergency services discovered the badly damaged vehicle in Hailsham Road, Polegate, just before 21:00 BST on Friday. It was found in dense bushes and undergrowth near the Cophall Wood Recycling Centre, police said. After several hours of enquiries, a 53-year-old man was located and taken to hospital to be checked over but was not injured, said Sussex Police.

  He was arrested on suspicion of driving a vehicle whilst under the influence of alcohol and possession with intent to supply class B drugs, the force said. The man has been released on bail pending further enquiries. Sussex Police said the damaged vehicle had been recovered and the road reopened. The A22 had been closed in both directions from the Cophall roundabout to the Arlington Eagles roundabout while investigations were carried out on Saturday.
