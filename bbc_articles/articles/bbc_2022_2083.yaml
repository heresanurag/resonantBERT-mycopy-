title: 'As-it-happened: PM reshuffles cabinet as NHS backlog plan unveiled - BBC News'
date: '2022-02-08'
section: UK
url: http://www.bbc.co.uk/news/live/uk-60303879
content: |-
  No 10 replaces the chief whip while the health secretary outlines plans to tackle hospital waiting lists.

  Cabinet reshuffles are not uncommon for any government and usually happen about once a year.

  Sometimes prime ministers move ministers around to signal shifts in policy; other shake-ups are about party management.

  On this occasion, Boris Johnson promised changes to his top team following weeks of political turbulence and threats to his leadership from within his own party.

  He made the announcement in parliament after the publication of a highly critical interim report into parties held in Downing Street during Covid restrictions.

  “I get it and I will fix it,” Johnson told MPs, some of whom had called for him to resign.

  Downing Street says the reshuffle would improve links between No 10 and Parliament.

  It said changes to the whips office would "improve engagement" with MPs and the new Brexit role for Jacob Rees-Mogg would make the changes needed now the UK has left the EU.
