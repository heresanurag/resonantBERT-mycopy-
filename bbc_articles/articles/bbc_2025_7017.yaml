  The most important date in the Christian calendar is being marked around the world.

  Celebrations are taking place all around the world to celebrate Easter, the most important date in the Christian calendar.

  The appearance of Pope Francis on Easter Sunday had been highly anticipated.

  Last month, he was discharged from hospital after five weeks of treatment for an infection that led to double pneumonia.
