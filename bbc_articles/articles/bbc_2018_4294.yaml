title: Russian tensions with West 'worse than Cold War' - BBC News
date: '2018-04-04'
section: General
url: http://www.bbc.co.uk/news/world-43629065
content: |-
  A former senior Russian general tells Today that the West is "cornering Russia".

  A former senior Russian general has warned that relations with the West could get "worse than the Cold War" - and even lead to war - following the diplomatic row over the Salisbury nerve agent attack.

  Evgeny Buzhinsky, who served as a member of the Russian general staff, told the Today programme the more external pressure that was put on the country, the more its people consolidated around President Putin.
