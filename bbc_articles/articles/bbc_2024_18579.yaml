  England Test captain Ben Stokes will miss the rest of the summer after tearing his left hamstring while playing in The Hundred.

  Stokes to miss rest of summer with hamstring injury

  Ben Stokes took over the England Test captaincy in April 2022

  England Test captain Ben Stokes has been ruled out of the rest of the summer after tearing his left hamstring while playing in The Hundred. The all-rounder will miss England's three-Test series against Sri Lanka, which starts on 21 August, with vice-captain Ollie Pope to lead the side in Stokes' absence. Stokes, 33, was left on crutches following the injury while batting for Northern Superchargers against Manchester Originals at Old Trafford on Sunday. He is aiming to be fit in time for England's three-Test tour of Pakistan, which begins on 7 October. Stokes, who was playing in The Hundred for the first time in three years this season, pulled up after running a single and had to be carried off the field. He had appeared to have returned to full fitness this summer after recovering from surgery on a left knee injury that had limited his ability to bowl. Stokes opted out of the Indian Premier League and T20 World Cup to assist with his recovery, then led England to a 3-0 series victory over the West Indies, taking five wickets at an average of 34.20 in three Tests. He played three times for Northern Superchargers during The Hundred, scoring just four runs and taking no wickets. England host Sri Lanka in the first Test at Emirates Old Trafford from 21-25 August, followed by matches at Lord's and the Kia Oval.

