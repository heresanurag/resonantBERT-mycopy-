  After Pakistan, Brendon McCullum's side face New Zealand in three Tests across November and December, before a landmark 2025 that includes five Tests at home against India and an Ashes series in Australia. "It's a big blow for Ben and England as he's captained the Test team remarkably well," former England captain Michael Vaughan told BBC Two. "Let's hope he can get fit for Pakistan, then New Zealand, then everyone will be thinking about next year - fingers crossed Ben can get this injury right and have a fully fit 2025." Vaughan added it is "certainly not The Hundred's fault" that Stokes got injured playing in the competition. He said: "He could've torn his hamstring any time, it could've happened on the first day against Sri Lanka and affected the outcome of that match." BBC cricket correspondent Jonathan Agnew said Stokes' injury is especially disappointing because the captain has been "transformed" by being able to bowl again this summer. "He's been a completely different character, really enjoying himself," Agnew told BBC Radio 5 Live Drive. "This is really bad news, not just for him but the whole momentum England were gaining."

  The England and Wales Cricket Board (ECB) said it will not be adding anyone to the squad for the Sri Lanka series. Opener Zak Crawley has already been ruled out of the series because of a broken finger, with Dan Lawrence set to partner Ben Duckett at the top of the order. Uncapped fast bowler Dillon Pennington, who was an unused part of the squad for the West Indies series, will miss the Sri Lanka Tests after also sustaining a hamstring injury playing for Northern Superchargers in The Hundred. Essex batter Jordan Cox was called up to the Test squad for the first time, while Nottinghamshire fast bowler Olly Stone has been recalled. England now face a decision over how to replace Stokes, who usually bats at number six, in the team. Wicketkeeper Jamie Smith could move up a position, with Chris Woakes playing as an all-rounder and batting at seven, followed by three other pace bowlers and off-spinner Shoaib Bashir. Alternatively, Cox could make his debut batting at six, with part-time spinners Lawrence and Root supporting four frontline bowlers. Meanwhile, Stokes has been replaced by Australian Ben Dwarshuis for the rest of the Superchargers' campaign. Pope was rested for what would have been final game for Spirit on Tuesday because of "England workload management", with Tom Prest replacing him.
