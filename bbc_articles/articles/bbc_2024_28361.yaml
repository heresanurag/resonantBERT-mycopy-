title: 'West End: Artistic show La Clique returns to London stage - BBC News'
date: '2024-11-18'
section: General
url: http://www.bbc.co.uk/news/videos/c5yx2x928ydo
content: |-
  The show of cabaret and circus has returned to the London stage for the festive period.

  The Olivier award-winning show La Clique has returned to London's West End for Christmas run of shows.

  La Clique, a blend of cabaret, circus, comedy and burlesque, started out at the Edinburgh Fringe 20 years ago and has since toured the world.

  To mark its 20th anniversary, it's taking over the Spiegeltent at Leicester Square for the festive season.

