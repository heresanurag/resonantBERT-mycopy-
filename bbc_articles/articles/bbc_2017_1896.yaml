id: bbc_2017_1896
title: Leaked sex tapes provoked woman's suicide - BBC News
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/world-europe-38934109
content: |-
  Tiziana Cantone killed herself after private sex videos of her were leaked online.

  In April 2015, the 31-year-old from Mugnano, on the outskirts of Naples, sent a series of sex videos to five people via WhatsApp.

  The recipients included her boyfriend Sergio Di Palo, with whom she had an unstable relationship.

  The videos showed her performing sex acts with a number of unidentified men.
