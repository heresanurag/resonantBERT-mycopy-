  Around one-in-18 deaths in the week to 13 August mentioned Covid-19 on the death certificate.

  Experienced staff will leave the NHS sooner than they might have if the government does not come up with a plan for the health service's recovery from the pandemic and its future, a senior health leader has warned.

  The president of the Royal College of Emergency Medicine said she is "genuinely not confident" the government has a plan for the NHS, which is facing rising waiting lists and continued pressure from coronavirus cases.

  Dr Katherine Henderson said there must be a plan in the short term to manage public expectations and give staff a vision on "somewhere that we're going" and a longer term outline of how to resource the health service to provide the care people expect.

  If this does not happen soon, the most experienced people who are approaching retirement but are "holding a lot of stuff together" will "bail out", she said.

  She told the All-Party Parliamentary Group on Coronavirus: "We can't limp from investigation to investigation, to criticism, to yet another scandal where workforce comes down to being the primary problem.

  "We don't have enough people able to deliver the standard of care that we believe the NHS ought to be able to do."

  She said while younger people will always come into the NHS, there will be employees with years of experience "who will leave sooner than they should".
