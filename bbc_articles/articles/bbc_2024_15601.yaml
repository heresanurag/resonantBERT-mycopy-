title: 'Lisbon weather: Waterspout looms over Vasco da Gama bridge - BBC News'
date: '2024-07-18'
section: General
url: http://www.bbc.co.uk/news/world-europe-68695562
content: |-
  Video shows the waterspout on the Tagus Estuary on Thursday, in southern Lisbon.

  A large waterspout - a rotating column of mist and spray - has been spotted over the Vasco da Gama bridge in the Portuguese capital, Lisbon.

  Video shows the waterspout rising above the waters of the Tagus Estuary on Thursday.

  Waterspouts are similar to tornadoes, but they form over a body of water.
