  A look at the Premier League players selected to represent their countries at Euro 2024 in Germany this summer.

  Which Premier League players are going to Euro 2024?

  Liverpool's Cody Gakpo, Bournemouth's Milok Kerkez and Arsenal's Jakub Kiwior are all heading to Euro 2024

  Euro 2024 is less than a week away and managers from the 24 nations have now named their squads. Defending champions Italy missed out on the 2022 World Cup but will be defending their title in Germany. Bayern Munich's Harry Kane and Real Madrid's Jude Bellingham will attempt to lead England to their first European crown. With Norway failing to qualify, there will be no Erling Haaland or Martin Odegaard but there are plenty of other Premier League players on show in the coming month.

  Declan Rice completed a £105 million move from West Ham to Arsenal in July 2023

  Ollie Watkins has scored 19 goals in the Premier League this season

  Cole Palmer moved to Chelsea from Manchester City for a fee of £42.5 million last summer

  Michael Olise missed out on a place in the France squad

  Kobbie Mainoo won his first England cap in March 2024

  Anthony Gordon has 11 goals and 10 assists in the Premier League this season

  Jarrod Bowen scored the winner for West Ham in the 2023 Europa Conference League final
