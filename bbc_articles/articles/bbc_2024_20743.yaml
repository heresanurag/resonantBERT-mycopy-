title: Shropshire farmer calls out customers stealing strawberries - BBC News
date: '2024-08-05'
section: Shropshire
url: http://www.bbc.co.uk/news/articles/cx2eelgxvyro
content: |-
  Joe Hamer from Arscott Farm says customers are eating more than double what they pay for.

  Joe Hamer, who runs Arscott Farm, said people were eating far too many strawberries and not paying for them

  A farmer has said he feels disrespected by customers stealing fruit from his pick your own strawberry events. Arscott Farm in Shrewsbury offers the fruit picking sessions, as well as seasonal events like pumpkin picking and the chance to choose your own Christmas tree. Joe Hamer, who runs the farm, said he had seen people eating twice as many berries than they paid for. "It's the lack of respect, it's the few that spoil it for the majority," he said.

  "I see families sit there eating strawberries, they've picked three giant punnets, I presume that they’ve paid," he told BBC Radio Shropshire. "Then they come in to pay at the end, and they’ve only got half of one punnet. "Everyone knows what pick your own strawberries means."

  This video can not be played To play this video you need to enable JavaScript in your browser. Joe Hamer, at Arscott Farm near Shrewsbury, said some people "take the Michael"

  The farm has been running the sessions for two years, and has four polytunnels of strawberries. Mr Hamer said he accepted that people would try some on their way around. "It's the ones that really take the Michael that are spoiling it for the other people," he added.

  Arscott Farm has been running pick your own strawberry events for two years

  "You can’t have somebody walking up and down the rows policing it," said employee Ashley Witts. "I suppose the only other way of doing it is to put cameras up, but it’s nice to put a little bit of trust into people at least." Mr Hamer said he wanted people to be respectful of his livelihood. "It’s no different to going into Sainsbury's and doing it," he said. "If you’re coming to buy strawberries and you sample a few, I haven’t got a problem, it’s those that come and literally fill their guts on the way round and then buy a tiny little amount. "I couldn’t tell you how much we’re out of pocket, it’s bound to have an impact."
