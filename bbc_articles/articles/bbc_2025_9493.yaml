title: Eurovision winner JJ gets huge welcome home at Vienna airport - BBC News
date: '2025-05-19'
section: General
url: http://www.bbc.co.uk/news/videos/crljdxk625xo
content: |-
  The 24-year-old took the title at the Eurovision competition with the song Wasted Love.

  Austria's new Eurovision Song Contest winner JJ returned home on Sunday 18 May to a warm welcome at Vienna's Schwechat Airport after his victory in Basel.

  Fans, family, and media gathered and cheered as JJ smiled and posed for selfies.

  The 24-year-old, who is a counter tenor, took the title at the competition with the song Wasted Love, a tempestuous electro-ballad about unrequited love.
