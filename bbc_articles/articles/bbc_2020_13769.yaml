  A "tradecraft manual" for the Special Demonstration Squad (SDS) is among a cache of documents released to the inquiry. It reads: "By tradition the aspiring SDS officer's first major task was to spend hours and hours at St Catherine's House leafing through death registers in search of a name he could call his own."

  And it goes on: "The SDS officer would assume squatters' rights over the unfortunate's identity for the next four years."

  In some cases officers are believed to have visited the graves of children whose names they were using. They also researched their families, described in the manual as establishing their respiratory status and "if they were still breathing, where they were living".

  The officers who used the identities of Kevin, Rod, Neil and Michael infiltrated groups including the Animal Liberation Front, Class War and the Revolutionary Communist Party. Their true identities, like most of their colleagues', remain secret, as do even the cover names of more than 50 other police. More than 40 officers are said to have taken the names of dead children.

  The officer who used Kevin's identity did not appear to have been authorised to do this, according to a statement from the inquiry in 2018.

  He had been given permission to use his second undercover name, James Straven, but not the identity of a dead child.

  The inquiry has heard that he was known as James Straven when he had relationships with two female activists. This is another practice used by a number of officers which is under scrutiny by the public inquiry, which had its initial hearings last month and will resume next year.

  Liisa says she is grateful for the difficult work done by the police generally, but her family is now in torment as a result of the undercover tactics.

  "Kevin's memory belongs to us. He was laid to rest. Why was his identity stolen?"

