  Next for Wales is Tuesday's trip to North Macedonia, who started their campaign with a 3-0 win over Group J's bottom seeds Liechtenstein. That was North Macedonia's sixth successive victory and, while Wales may start as slight favourites in Skopje, they will need a vast improvement on their performances against Kazakhstan to make it six points from six. Belgium, who are yet to play, are Group J's top seeds, with Wales second and North Macedonia third seeds, while lowly Kazakhstan and Liechtenstein complete the group. Only the group winners will qualify automatically for the World Cup, with the runners-up entering the play-offs. Wales have already all but guaranteed themselves a play-off place by winning their Nations League group, and could give their hopes of automatic qualification a significant early boost by beating North Macedonia. "They're a good team," said Bellamy. "We have to be at our best. Do I have sleepless nights over it? No. There's more important things. "I like the challenge of being able to prepare a team to go to somewhere like North Macedonia. I would like the opportunity to prepare a team to go to Brazil. I want to improve and I want the players to improve. "I don't look at everything like living with a knife between my teeth. It's the challenge you have to embrace and be excited about. North Macedonia leaves a lot to be excited about."
