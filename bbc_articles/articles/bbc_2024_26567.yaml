  The NCA's regional head of investigations in Scotland and Northern Ireland, Gerry McLean, said Stevenson was operating at the top table of organised crime north of the border. He was on an "upward trajectory" and re-establishing himself after his 2007 jail term. "What I think this conviction demonstrates is that he truly had a global international reputation," said Mr McLean. "He would not have been able to bring these amounts of drugs into the UK if he didn't have that network of contacts right around the world." He said the pill factory in Kent had been manufacturing "industrial quantities" of Etizolam. "The venture that Jamie Stevenson was involved in was of a scale that I don't think we've seen before, certainly in Scotland and really within the United Kingdom."

  Deputy procurator fiscal Sineidin Corrins said the case against Stevenson was "watertight"

  Deputy procurator fiscal Sineidin Corrins leads the organised crime unit at the Crown Office, Scotland's prosecution service. "These convictions are monumental. Jamie Stevenson and his criminal gang were involved in drug trafficking on an industrial and a global scale," she said. "It's also a marker from law enforcement and the criminal justice in Scotland. "Collaboratively, all the preparation and effort brought this serious organised crime gang into the dock at the high court. The evidence was presented in a way that was absolutely watertight." Det Ch Supt Ferry said Stevenson would have made tens of millions of pounds during his long criminal career. The next step will be for the Crown to pursue Stevenson's assets under proceeds of crime legislation. Its success will depend on what can be found and what can be proved in court.
