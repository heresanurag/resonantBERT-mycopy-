title: 'Helen Bailey murder: Fiance Ian Stewart found guilty - BBC News'
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/uk-39051642
content: |-
  The fiance of the suffocated children's author Helen Bailey has been found guilty of murder.

  The fiance of a children's author who drugged and suffocated her before throwing her body in a hidden cesspit has been found guilty of murder.

  Ian Stewart, 56, had denied murdering Helen Bailey but was convicted at St Albans Crown Court.
