  Wenger, with his own giant image paraded on a floating flag behind him, spoke quietly with genuine emotion, ending with the message: "I will miss you."

  A lap of honour saw Wenger being applauded with huge affection, the fractiousness of the last few months forgotten, especially by one youngster who got his wish after spending most of the afternoon holding up a placard reading: "Arsene - please can I have your tie?"

  Wenger will cut the ties that have bound him to Arsenal at Huddersfield Town next week before this giant club starts to navigate a path away from the Wenger era.

  With giant letters spelling out the day's main message "Merci Arsene" behind him, he waved one final goodbye as he disappeared down the tunnel. Now a new chapter will begin for Arsenal and Arsene Wenger.

  606 and out for Wenger in north London - the stats
  • None This was Arsenal Wenger's 606th and final home game in charge of Arsenal (W415 D120 L71), with this the 27th time that his team have won by five or more goals on home soil.
  • None Indeed, no manager has taken charge of more Premier League home games than Arsene Wenger (414), winning 286 of those. Only Sir Alex Ferguson has won more in the competition's history (305).
  • None Arsenal will finish the season having scored 54 league goals at the Emirates, their joint-highest tally of home goals in a Premier League campaign, along with 2004-05 (54).
  • None Sean Dyche suffered his 50th defeat as a manager in the Premier League, however only 11 of those have come this season, compared with 19 in 2014/15 and 20 in 2016-17.
  • None This was Burnley's joint-heaviest defeat in the Premier League and the third time they've lost by a five-goal margin (also 0-5 v Spurs and 1-6 v Man City in 2009-10).
  • None The Clarets have conceded more goals at the Emirates than any other away venue in the Premier League (13 in four games).
  • None Pierre-Emerick Aubameyang has now scored 20+ league goals in each of his last three seasons in the top five European leagues (25 in 2015-16 and 31 in 2016/17, both for Borussia Dortmund).
  • None Aubameyang has scored seven league goals at the Emirates this term, the most of any Arsenal player in their first seven home appearances in the Premier League.
  • None Alexandre Lacazette has been directly involved in nine goals in his last nine games in all competitions (eight goals and one assist), while also scoring and assisting in the same game for the first time for Arsenal.
  • None Among players to have scored 10+ goals in the Premier League this season, the Frenchman has scored the highest percentage of his goals in home games (79% - 11 of 14).

  'It is impossible to feel nothing' - what they said

  Arsenal manager Arsene Wenger, speaking to BBC Match of the Day: "It is impossible to feel nothing unless you are completely robotic.

  "It is 22 years of total commitment and togetherness. Overall I would like to thank everybody. I had the luxury of doing this job for 22 years at the same club and I am grateful for that.

  "It is difficult to analyse this season for what this team has done. At home it has been championship stuff, but away from home it has not been enough. We also went to the League Cup final and Europa League semi-final.

  "The fans may be lost at the start next season, but they will have a new manager and they can continue the work as the basics are here."

  Burnley manager Sean Dyche, speaking to MOTD: "I think Arsenal raised their performance considerably. After the results yesterday we suddenly had nothing to play for and that affects players, they need something on the game.

  "Today Arsenal really turned up. It will be a different feel at home next weekend - our fans were great today and they know how good a season it has been.

  "Arsene Wenger means a lot to the game, the only thing he'll be asking is if they could have done that more often. It's still quite fresh but in 10 years they'll probably be looking back and thinking 'what an era'."

  Arsenal travel to Leicester for their penultimate game of the season on Wednesday (19:45 BST), while Burnley host Bournemouth on Sunday (15:00 BST).
