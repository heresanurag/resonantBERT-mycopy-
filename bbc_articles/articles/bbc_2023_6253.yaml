content: |-
  Musk talks about the "pain" of owning Twitter and the BBC's objection to being labelled "government funded".

  Elon Musk has spoken to the BBC in a hastily arranged, unexpected interview.

  Speaking with James Clayton, Mr Musk talked about things from the pain of owning Twitter to not tweeting after 3am.
