content: |-
  Jockey Patrick Mullins wins the Grand National on Nick Rockett at Aintree as his trainer father Willie Mullins sweeps the first three places.

  Jockey Patrick Mullins and trainer Willie Mullins combined for a family victory as Nick Rockett secured Grand National glory

  Jockey Patrick Mullins won the Grand National on Nick Rockett as his trainer father Willie Mullins took the first three places in the race at Aintree. The 33-1 chance denied last year's winner I Am Maximus, who finished second, with Grangeclare West in third. Favourite Iroko was fourth, ahead of Meetingofthewaters. It was an emotional victory for winning owner Stewart Andrew, whose late wife Sadie died from cancer in December 2022, five days after watching Nick Rockett in his first race. Broadway Boy had led for much of the race but suffered a crashing fall on the second circuit. The Jockey Club said both Broadway Boy and Celebre D'Allen - who was pulled up - were walked on to horse ambulances after being assessed on course by vets and taken to the racecourse stables for further assessment. Broadway Boy's jockey Tom Bellamy was taken to Aintree University Hospital for assessment. All other riders returned to the weighing room. The start of the following race was delayed by about 15 minutes while the horses and jockey were attended to. Celebre D'Allen's rider Micheal Nolan was given a 10-day suspension after Aintree stewards ruled he had continued when his mount had no more to give and was losing ground. Nick Rockett galloped away from top weight I Am Maximus after the final fence to win by two and a half lengths. There was a further half-length back to Grangeclare West in third. "It's everything I've dreamed of since I was a kid," said the winning rider, who is an amateur jockey. "I know it's a cliche but when I was five or six years old, I was reading books about the National and watching black and white videos of Red Rum. To put my name there is very special." To cap a dominant day for the father and son duo, they celebrated victory with 10-3 favourite Green Splendour in the final race of the meeting.

  Champion Irish trainer Mullins was not only registering back-to-back victories but his third success, 20 years after his first with Hedgehunter. As well as the first three, he also saddled the fifth-placed horse Meetingofthewaters and Minella Cocooner in seventh. Senior Chief finished sixth for Henry de Bromhead. Patrick Mullins is the latest in the family to have won the race, with his cousins David and Emmet having triumphed - David as a jockey with Rule The World and Emmet as a trainer with Noble Yeats. "That was some result. It's lovely to be able to give your son a ride in the National, but to win it, it's unbelievable," said an emotional Willie Mullins. Winning owner Andrew said: "From a personal point of view, I can't tell you... Sadie would have loved today - she was up there, she'll have had a tenner each-way, I guarantee you. "What a ride from Patrick, what a ride. I knew if we got to the front jumping the last, this horse is tough. If you look at this form, when he's jumped the last, he keeps finding [more]. I can't believe it." Willie Mullins is now odds-on favourite to win the British trainers' championship for a second year running.
