title: 'WW2 bomb explosion: Most of Newtownards residents return home - BBC News'
date: '2024-08-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c07epddxnkno
content: |-
  One resident, Sharon Murrell, says she spent the last three days in her camper van at Millisle.

  Sharon Murrell said she had spent the last three days in her camper van at Millisle with Poppy her dog

  The majority of residents at the Rivenwood development in Newtownards in County Down, have returned to their homes after a controlled explosion was carried out on a World War Two bomb. The 500kg (1,100lb) air-dropped SC-500 German bomb was found by construction workers last Thursday. Construction workers are removing the remaining sand from in front of the development which had been used by Army bomb experts to dampen the explosion. One resident, Sharon Murrell, said she had spent the last three days in her camper van at Millisle with Poppy her dog.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  She said she was delighted to be back home and that there had been no damage to her property. Ms Murrell praised the construction worker who identified the bomb and said everyone was indebted to him. Four hundred nearby homes were evacuated on Saturday with residents told they could be out of their homes for five days. Military experts had worked to reduce any damage from dealing with the bomb by constructing a sand-filled structure around it.

  The aftermath of the explosion in Newtownards

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Many residents are assessing what, if any, damage has been caused from the explosion. So far, a number of those properties closest to the site of the explosion appear to have broken roof tiles, some broken windows and with the houses being fairly new, settling in cracks that have been exacerbated by the blast. Locals now have questions about who they actually speak to about the damage and who is responsible for fixing it.

  Connor Davidson stayed with his parents in Millisle

  Connor Davidson said he had stayed with his parents in Millisle after the evacuation at the weekend. He said he was “glad to be back” in his home. He said a “few rooftiles had been displaced” from his property, "a few settlement cracks on the inside, but nothing major hopefully”. “I don’t really want to claim through my insurance if I’m honest with you, my house insurance went up nearly £160 this year, up on last year,” he said. “You put in a claim, dear knows what it will rise to next year.”

  Martin Caskey and his family stayed with his wife's relative

  Martin Caskey said it had been “a bit of a whirlwind” for him and his wife, having to move with their two-year-old daughter. He said they had stayed with his wife’s cousin. “We luckily had somewhere to go,” he said. He described how his property in Newtownards had been affected and hoped repairs could be carried out as soon as possible. Mr Caskey said neighbours had rallied round, but that clarity was needed on the protocol for how repairs would happen. “We have a few settlement cracks as normal houses would have, but they have all progressed on a bit,” he added. “You will see a lot of damage throughout the front of the house which was closest to the bomb. “Two of our windows have blasted open and can’t be closed, so that wasn’t ideal last night with a bit of a storm going on and the wind and the rain. “Slates on the roof have come off as well,” he added.

  Pictures show the ground after the controlled explosion took place

  Joan McCabe, has lived in Rivenwood for six years, and is in the process of buying another property in the development. “Fortunately, I wasn’t one of the people evacuated, I was outside the zone,” she told BBC Radio Ulster’s Good Morning Ulster on Wednesday. “We still hope to go ahead with the purchase of the house, it may be a little bit delayed, but there doesn’t appear to be that much damage. “Obviously there would need to be assessments on it before we know.” Ms McCabe said the house, which she has not yet signed a contract for, was about 50m from the controlled explosion. “I was watching it with one eye open, hoping that when the dust settles that the house is still standing which thankfully it was,” she said. “There has been some damage to the solar panels at the back and some roof tiles, but we haven’t been able to get inside and we don’t know about whether there has been any structural damage – we will leave that to the professionals to assess that.” She added that Rivenwood was a "great community" which had pulled together.

  UUP councillor for Ards and North Down Peter Wray told Good Morning Ulster everyone was "delighted this whole situation that started on Thursday has come to an end". "It was a big explosion that circulated on social media, and was apparently heard as far away as Ballywalter," he added.

  A plume of smoke could be seen over Newtownards on Tuesday afternoon

  Ards and North Down Borough Council has issued information for residents, external returning to their homes. "It is the homeowner's responsibility to check the condition of their property," the document states. The controlled explosion took place at about 15:38 BST on Tuesday, police said. “The munition found, which I can now confirm was identified as being an air-dropped SC-500 German bomb from World War Two, was understood to have been in and around 83-years-old, but still posed a significant risk to public safety, even after all this time," Supt Johnston McDowell said. Belfast and its surroundings were heavily bombed by Germany in 1941. World War Two munitions are found across Northern Ireland from time to time, but they rarely cause this level of disruption to people living nearby. Supt McDowell added this was a "highly complex operation" with a disposal team comprised of members of the Army's 321 EOD and search squadron.
