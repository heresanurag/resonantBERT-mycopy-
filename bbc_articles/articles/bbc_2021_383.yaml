title: Teen detained over 180mph stolen motorbike pursuit - BBC News
date: '2021-01-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-55669004
content: |-
  The 19-year-old mounted pavements and jumped red lights through London and three counties.

  A teenage motorcyclist who led police on a 30-minute pursuit at speeds of up to 180mph (290km/h) through London and three counties has been sentenced.

  Officers in Haringey, London, spotted a speeding rider at about 21:20 BST on 20 May and were joined by a police helicopter as they followed it along the M1, through Hertfordshire, Bedfordshire and Buckinghamshire.

  The biker mounted pavements, drove through multiple red lights and the wrong way down the motorway hard shoulder before he was arrested at a service station.

  Marian Vasilica Dragoi, 19, of Teynton Terrace, Haringey, pleaded guilty to dangerous driving, failing to stop for police, driving without a licence and being uninsured and was sentenced at Wood Green Crown Court to 46 weeks' detention.
