title: I'll back Ukraine in talks with Trump, Starmer tells Zelensky - BBC News
date: '2025-02-23'
section: Europe
url: http://www.bbc.co.uk/news/articles/c8rklvrnl7ro
content: |-
  The prime minister called Ukraine's Volodymyr Zelensky for the second time in four days.

  I'll back Ukraine in talks with Trump, Starmer says

  Sir Keir Starmer will discuss the importance of Ukraine's sovereignty in talks with Donald Trump next week, he said in a call with the country's president. The UK prime minister reiterated the UK's "ironclad support" for Kyiv when he spoke to Volodymyr Zelensky on Saturday. The two leaders held their second telephone conversation in four days following US President Trump's decision to re-open relations with Russia and seek an end to the war in Ukraine. Monday marks three years since Vladimir Putin's invasion, which UK Foreign Secretary David Lammy said he will mark with further sanctions on Russia.

  On Saturday, 2,000 people marched to the Russian embassy in west London , i n support of Ukraine ahead of the anniversary of the invasion. According to a Downing Street spokesperson the prime minister also said "Ukraine must be at the heart of any negotiations to end the war" and it could be sure of "the UK's commitment to securing a just and enduring peace to bring an end to Russia's illegal war". Giving details about the phone call, Downing Street said Sir Keir and Zelensky "agreed that this was a significant moment for the future of Ukraine and European security at large". Sir Keir also told Zelensky "that safeguarding Ukraine's sovereignty was essential to deter future aggression from Russia". The prime minister added "he would be progressing these important discussions in the coming days and weeks, including with Trump whilst visiting Washington DC next week". Zelensky said he had a productive talk with Sir Keir, with the pair coordinating "our military cooperation, joint steps, and engagements for the coming week, which will be very active". In a post on X, he wrote: "The UK and its people are among Ukraine's biggest supporters, and we deeply appreciate this." Writing in the Sun, external Sir Keir said Trump was right that European nations must take greater responsibility for their security and increase defence spending. "We have talked about this for long enough. Now it is time for action. "President Trump is also right to grasp the nettle and see if a good peace deal is on the table. "Every time I have spoken with him, I am struck by his commitment to peace," he wrote. Sir Keir also said Ukraine must have a voice in negotiations and needed strong security guarantees, adding: "I believe America must be part of that guarantee."

  In a separate call on Saturday Sir Keir spoke with European Commission president Ursula von der Leyen and they agreed Europe "must step up for the good of collective European security", Downing Street said. The UK foreign secretary said upcoming additional UK sanctions on Russia would erode President Putin's "military machine". "I plan to announce the largest package of sanctions against Russia since the early days of the war," Lammy said, ahead of Monday's anniversary. The UK will continue to work with the US and Europe to achieve "sustainable, just peace," he added. Sir Keir's meeting with Trump on Thursday in Washington DC comes after a week which saw a flurry of summits and phone calls as European leaders scrambled to work out how to approach the US president's sudden thawing of relations with Russia. Ahead of visits to the White House by Sir Keir and French President Emmanuel Macron, Trump said the pair "haven't done anything" to end the war in Ukraine. He also said Zelensky had "no cards" in peace negotiations and that he did not think "he's very important to be in meetings". But UK Defence Secretary John Healey wrote in The Sunday Times newspaper, external: "Any negotiations about Ukraine cannot happen without Ukraine. We all want the fighting to end, but an insecure peace risks more war." He added: "I'm proud of UK leadership and UK unity on Ukraine." Last Monday, European leaders held a hastily-arranged summit in Paris - a day before US-Russia talks in Saudi Arabia, and amid fears that Ukraine and Europe could be excluded from peace negotiations. On Tuesday, Trump called Zelensky a "dictator" and said he should "never have started" the war, despite Russia invading Ukraine. Zelensky responded by saying the US president was "living in a disinformation space" created by Russia.

  Protesters marched from outside the Ukrainian embassy to the Russian embassy in west London

  The protest marks the three years since Russia's full-scale invasion of Ukraine

  On Saturday, people took to the streets of London in response to the US position on Ukraine, marching from outside the Ukrainian embassy to the Russian embassy. Margaret Owen, 93, accused Trump of "appeasement", saying she remembered the Munich Agreement in which western powers signed a deal with Hitler in the years before World War Two. "It's outrageous. We can't let the world be dictated to by these two impossible people," she said of Trump and Putin. The chair of the Commons foreign affairs select committee, Emily Thornberry, was among the marchers and argued for a less aggressive approach. The Labour MP said: "We want to influence the US president and we agree there must be peace. Why shout at him? "You'd get a short-term buzz from shouting at Trump but if you want to influence him, let's try and influence him." "Ukraine needs to be at the table, you can't decide the future of Ukraine without Ukraine there and you can't just capitulate to Putin. "They have to be invited into this process by the Americans and Russians." Ukrainian Oleksandra Udovenko, who is from Kyiv and studying in the UK, said: "I'm here to protect my country's interests, my country's independence, and my country's choice and my country's right to be independent of any empire in this world."
