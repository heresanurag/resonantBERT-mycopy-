content: |-
  The BBC speaks to social media moderators, whose job it is to find and remove distressing and illegal content.

  'I was moderating hundreds of horrific and traumatising videos'

  Social media moderators check for distressing or illegal photos and videos which they then remove

  Over the past few months the BBC has been exploring a dark, hidden world – a world where the very worst, most horrifying, distressing, and in many cases, illegal online content ends up. Beheadings, mass killings, child abuse, hate speech – all of it ends up in the inboxes of a global army of content moderators. You don’t often see or hear from them – but these are the people whose job it is to review and then, when necessary, delete content that either gets reported by other users, or is automatically flagged by tech tools. The issue of online safety has become increasingly prominent, with tech firms under more pressure to swiftly remove harmful material. And despite a lot of research and investment pouring into tech solutions to help, ultimately for now, it’s still largely human moderators who have the final say. Moderators are often employed by third-party companies, but they work on content posted directly on to the big social networks including Instagram, TikTok and Facebook.

  They are based around the world. The people I spoke to while making our series The Moderators for Radio 4 and BBC Sounds, were largely living in East Africa, and all had since left the industry. Their stories were harrowing. Some of what we recorded was too brutal to broadcast. Sometimes my producer Tom Woolfenden and I would finish a recording and just sit in silence. “If you take your phone and then go to TikTok, you will see a lot of activities, dancing, you know, happy things,” says Mojez, a former Nairobi-based moderator who worked on TikTok content. “But in the background, I personally was moderating, in the hundreds, horrific and traumatising videos. “I took it upon myself. Let my mental health take the punch so that general users can continue going about their activities on the platform.” There are currently multiple ongoing legal claims that the work has destroyed the mental health of such moderators. Some of the former workers in East Africa have come together to form a union. “Really, the only thing that’s between me logging onto a social media platform and watching a beheading, is somebody sitting in an office somewhere, and watching that content for me, and reviewing it so I don’t have to,” says Martha Dark who runs Foxglove, a campaign group supporting the legal action.

  Mojez, who used to remove harmful content on TikTok, says his mental health was affected

  In 2020, Meta then known as Facebook, agreed to pay a settlement of $52m (£40m) to moderators who had developed mental health issues because of their jobs. The legal action was initiated by a former moderator in the US called Selena Scola. She described moderators as the “keepers of souls”, because of the amount of footage they see containing the final moments of people’s lives. The ex-moderators I spoke to all used the word “trauma” in describing the impact the work had on them. Some had difficulty sleeping and eating. One described how hearing a baby cry had made a colleague panic. Another said he found it difficult to interact with his wife and children because of the child abuse he had witnessed.
