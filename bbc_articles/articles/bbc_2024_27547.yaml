  I was expecting them to say that this work was so emotionally and mentally gruelling, that no human should have to do it – I thought they would fully support the entire industry becoming automated, with AI tools evolving to scale up to the job. What came across, very powerfully, was the immense pride the moderators had in the roles they had played in protecting the world from online harm. They saw themselves as a vital emergency service. One says he wanted a uniform and a badge, comparing himself to a paramedic or firefighter. “Not even one second was wasted,” says someone who we called David. He asked to remain anonymous, but he had worked on material that was used to train the viral AI chatbot ChatGPT, so that it was programmed not to regurgitate horrific material. “I am proud of the individuals who trained this model to be what it is today.”

  But the very tool David had helped to train, might one day compete with him. Dave Willner is former head of trust and safety at OpenAI, the creator of ChatGPT. He says his team built a rudimentary moderation tool, based on the chatbot’s tech, which managed to identify harmful content with an accuracy rate of around 90%. “When I sort of fully realised, ‘oh, this is gonna work’, I honestly choked up a little bit,” he says. “[AI tools] don't get bored. And they don't get tired and they don't get shocked.... they are indefatigable.” Not everyone, however, is confident that AI is a silver bullet for the troubled moderation sector. “I think it’s problematic,” says Dr Paul Reilly, senior lecturer in media and democracy at the University of Glasgow. “Clearly AI can be a quite blunt, binary way of moderating content. “It can lead to over-blocking freedom of speech issues, and of course it may miss nuance human moderators would be able to identify. Human moderation is essential to platforms,” he adds. “The problem is there’s not enough of them, and the job is incredibly harmful to those who do it.”

  We also approached the tech companies mentioned in the series. A TikTok spokesperson says the firm knows content moderation is not an easy task, and it strives to promote a caring working environment for employees. This includes offering clinical support, and creating programs that support moderators' wellbeing. They add that videos are initially reviewed by automated tech, which they say removes a large volume of harmful content. Meanwhile, Open AI - the company behind Chat GPT - says it's grateful for the important and sometimes challenging work that human workers do to train the AI to spot such photos and videos. A spokesperson adds that, with its partners, Open AI enforces policies to protect the wellbeing of these teams. And Meta - which owns Instagram and Facebook - says it requires all companies it works with to provide 24-hour on-site support with trained professionals. It adds that moderators are able to customise their reviewing tools to blur graphic content. The Moderators is on BBC Radio 4 at 13:45 GMT, Monday 11, November to Friday 15, November, and on BBC Sounds.
