content: |-
  A dog walker found the exotic animal, which is native to swamps and rivers in parts of the US, in a lake.

  A small alligator snapping turtle pulled from a lake in Cumbia has been nicknamed Fluffy.

  A dog walker found the exotic creature, which is native to swamps and rivers in southern parts of the US, in Urswick Tarn, near Ulverston, on Monday.

  Veterinarian Dominic Moule spoke to the BBC about the discovery.
