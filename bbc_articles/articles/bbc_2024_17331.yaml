content: |-
  A striking image of Brazilian surfer Gabriel Medina at Paris 2024 has captured imaginations across the globe.

  Is this the photo of the Paris 2024 Olympics?

  French photographer Jerome Brouillet knew he had the chance of capturing something special when Brazilian surfer Gabriel Medina caught one of the day's biggest waves. "The conditions were perfect, the waves were taller than we expected," said Brouillet. But what Brouillet found when he checked his camera was beyond his wildest dreams. Waiting on a boat by the side of the wave in Tahiti, Brouillet was primed for the moment Medina 'kicked out' - when a surfer exits the wave at the end of their run. Medina emerged from the wave, pointing a finger in the air to celebrate his 9.9 score. At the perfect moment, Brouillet captured the Brazilian suspended in mid-air, as if stood on solid ground, as his board mimicked his stance. "He is at the back of the wave and I can't see him and then he pops up and I took four pictures and one of them was this one," said Brouillet. "It was not hard to take the picture. It was more about anticipating the moment and where Gabriel will kick off the wave. "I think that when he was in the tube he knew that he was in one of the biggest waves of the day. He is jumping out of the water like 'man, I think this is a 10'."

