  The picture, which immediately went through to Brouillet's editors, quickly resonated with people online. Brouillet, though, was unaware of just how popular the photo was proving to be until he checked his social media accounts. "I was just checking my phone on the six-minute break after the shoot and I had lots of notifications on social media and I thought something is happening with this shot," he said. "It's very cool, it's a nice shot and lots of people love it. It's not really a surf photograph so it captures the attention of more people." Medina posted the image on his own Instagram account and the photo has already attracted more than 3.8m likes.

