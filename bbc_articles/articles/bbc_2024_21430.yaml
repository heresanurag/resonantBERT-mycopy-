title: Afghan embassy in London to close after Taliban sacks staff - BBC News
date: '2024-09-10'
section: Asia
url: http://www.bbc.co.uk/news/articles/c70jp1yy7wjo
content: |-
  The UK government said the embassy would shut following the dismissal of its staff by the Taliban.

  Afghan embassy in London to shut after Taliban sacks staff

  The mission in Kensington, west London, will close on 27 September, the embassy said

  The Afghan embassy in London is set to close following the dismissal of its staff by the Taliban government. The mission said it would shut by the end of September "at the official request" of the UK government. It follows an announcement by the Taliban in July that it was cutting ties with several embassies set up the previous regime. Until now, the west London mission was staffed by officials appointed during the pre-Taliban Islamic Republic of Afghanistan government.

  Afghan ambassador to the UK Zalmai Rassoul thanked his colleagues and others "who have sincerely co-operated with the Afghan embassy in London during this period". The mission, first established in London in 1922, will close on 27 September, he added in a post on X, formerly Twitter. A spokesman for the UK Foreign, Commonwealth and Development Office said: "The embassy is being closed following the dismissal of its staff by the Taliban." Citing sources, the private Etilaat-e Roz website reports that the UK government had asked Afghan diplomats to close the embassy because they were not willing to hand it over to the Taliban. Afghan diplomats at the embassy in Princes Gate, Kensington, have reportedly been advised to either leave the UK or apply for political asylum. It follows an announcement from the Taliban's foreign ministry in July that it would not recognise documents issued by Afghan embassies in the UK and some other European countries due to a lack of "coordination". UK troops left Afghanistan at the end of August 2021, bringing an end to a 20-year military involvement in the country. Their departure came as Taliban troops rapidly advanced through the country overthrowing the Afghan government. The British embassy in Kabul also withdrew all its staff from Afghanistan, moving them temporarily to Qatar, from where they continue to operate. Some Afghan embassies in Europe have continued operating since the fall of Kabul. Others, including the embassy in Washington DC, have been forced to close due to lack of support from the Taliban government. The UK government does not recognise the Taliban as the legitimate government of Afghanistan.
