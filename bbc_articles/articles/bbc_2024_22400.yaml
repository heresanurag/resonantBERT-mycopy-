title: Deadly wildfires burn in Portugal - BBC News
date: '2024-09-19'
section: General
url: http://www.bbc.co.uk/news/videos/cd6q0g43380o
content: |-
  At least seven people die after wildfires in the Aveiro and Viseu areas of Portugal.

  At least seven people have died after wildfires in the Aveiro and Viseu areas of Portugal, although cooler weather has helped tackle the flames.

  Dozens of homes have been destroyed and tens of thousands of hectares of forest and scrubland have been lost to the flames.

  Reinforcements have arrived from Spain and Morocco to help fight the fires.
