title: NI civil rights leader Austin Currie dies - BBC News
date: '2021-11-11'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-59228546
content: |-
  One of the founding members of the SDLP, he was elected to parliament on both sides of the Irish border.

