content: |-
  The Covid inquiry heard one scientist called for face mask rules to come in sooner, while an expert said shutting schools would mean "loss of life expectancy" for children.

  Scientists surprised by Drakeford's 'no value' in testing claim

  After yesterday's hearing we received some written evidence from the inquiry that wasn't heard live, including how one of Wales' top scientists was surprised by Mark Drakeford's claim that there was "no value" in testing all care home residents for Covid. The first minister's comments came in a TV news report about testing on 29 April 2020 - at which stage all care home residents in England were being offered tests, but in Wales they were only available for those with symptoms. Drakeford said: “The clinical evidence tells us that there is no value in doing so [testing everyone] and because of that we don’t do it.” The following morning, the Welsh government's head of science Dr Robert Hoyle emailed other senior officials to say that Wales’ chief scientific adviser Peter Halligan was “keen to understand the rationale, evidence and advice behind the first minister's comments last night on the telly that there is no value to testing for Covid-19 in care homes”. “Please can you enlighten us. Thanks.” Testing for care home residents and staff in Wales, regardless of whether they had symptoms or there was an outbreak in their care home, was not announced until several weeks later on 16 May 2020.
