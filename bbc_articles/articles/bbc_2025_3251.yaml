title: Dancing on Ice winner announced after delivering 'brilliant' performance -
  BBC News
date: '2025-03-10'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx2edpdwk7qo
content: |-
  The performance of Dancing on Ice 2025's winner has been described as "brilliant" by former Olympic figure skater Jayne Torvill.

  Actor Sam Aston and his ice-skating partner Molly Lanaghan performed in the finale on Sunday

  The latest series of Dancing on Ice has drawn to a close after its winners were announced following a public vote. Coronation Street actor Sam Aston and his skating partner Molly Lanaghan were crowned winners of the ice-skating competition on Sunday. BBC Springwatch presenter Michaela Strachan was the runner-up alongside her ice skating partner Mark Hanretty after former English footballer Anton Ferdinand and his skating partner Annette Dytrt lost the public vote. Former Olympic figure skater Christopher Dean, who was involved in choreographing the showcase routines of all three finalists, told Aston that "tonight, everything came together".

  Before the winners were revealed, the Coronation Street star said his time on the competition had been "such a journey, it's a mad one". The 31-year-old was seen covering his face with his hands after he was announced as the winner. Aston and Lanaghan performed to The Pink Panther Theme, after which Dean told Aston he was "really proud of you". Dean, alongside fellow former Olympic figure skater Jayne Torvill, choreographed the showcase performances of all three finalists. After Ferdinand lost the public vote, Aston and Strachan performed the pair's Olympic gold medal winning Bolero routine, after which Torvill described Aston's performance as "brilliant". "I mean tonight, everything came together," Dean said. "Your skating skills are always on show, but you had to have timing and acting," Ferdinand and Dytrt were the first finalists to perform in the final episode and impressed the judges with their showcase routine to Let's Go Crazy by Prince And The Revolution. The pair received a perfect score of 40 and the former English footballer told Dytrt that he had "thorough enjoyed this journey with you" on the show. Speaking about his experience on the show, Ferdinand said: "When you retire from football - I retired six years ago, and I lost a part of me - but... the team behind [the show] have made me start to feell like myself again." Strachan performed with her skating partner to the song Don't Rain On My Parade, which judge Oti Mabuse said "really touched me", adding that she thought "the entire thing was absolutely beautiful".
