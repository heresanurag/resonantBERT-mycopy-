title: 'Nicola Bulley: Mother a high-risk missing person, police say - BBC News'
date: '2023-02-15'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-64646582
content: |-
  Detectives say the mother's disappearance was graded as high risk due to "specific vulnerabilities".

  Mother-of-two Nicola Bulley has not been seen since 27 January

  Nicola Bulley was considered a high-risk missing person from the start of the investigation into her disappearance, police have said.

  The 45-year-old went missing on 27 January during a riverside dog walk in St Michael's on Wyre in Lancashire.

  Det Supt Rebecca Smith said she was listed as high risk because of a "number of specific vulnerabilities".

  But she added this was "normal in a missing person investigation with the information we were in possession of".

  According to the College of Policing, the category is applied when the risk of a person coming to serious harm is assessed as very likely.

  Det Supt Rebecca Smith said there had been "persistent myths" about the case

  Ms Bulley disappeared while walking her springer spaniel, Willow, after dropping off her two daughters - aged six and nine - at school.

  Lancashire Police first told the public of their "main working hypothesis" on 3 February, that the mortgage adviser had gone into the river during a "10-minute window" between 09:10 GMT and 09:20 that day.

  Detectives have extended the search to the sea, saying finding her there "becomes more of a possibility".

  Ms Bulley's family and friends have tied yellow ribbons to a bridge near to where she vanished

  Heart-shaped paper notes with messages of hope have also been fastened to the bridge

  In a press conference earlier, Det Supt Smith, who is the lead investigator in the case, confirmed there was still no evidence of a criminal aspect or third-party involvement.

  Ms Bulley's partner, Paul Ansell, has previously said he was "100% convinced" she did not fall into the water.

  But Det Supt Smith said their main theory was still that Ms Bulley had "unfortunately gone in the river".

  However, she said she could not be "100% certain of that at the minute" as it was a "live investigation" and there was "always information coming in".

  She said other hypotheses remained in place and were "reviewed regularly" by detectives.

  The search for Ms Bulley continues in St Michael's on Wyre

  "We are in the 20th day, we have had a thorough, dedicated, meticulous investigation and there is not one single piece of information that's come to note that would suggest that Nicola has left those fields," she said.

  She added Ms Bulley was graded as high risk "following the information that was provided to the police by her partner Paul and based on a number of specific vulnerabilities that we were made aware of".

  She declined to give further details, pointing to the family's "pain and distress", and called for "respect".

  Nearly 40 detectives have since sifted through hundreds of hours of CCTV, dashcam footage and tip-offs from the public.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Assistant Chief Constable Peter Lawson says there is no evidence of third party involvement

  Det Supt Smith said the force had also been "inundated with false information, accusations and rumours which is distracting".

  She said in her 29 years of police service she had not seen "anything like it" and described "persistent myths" about the case.

  "The derelict house which is across the other side of the river has been searched three times, with the permission of the owner, and Nicola is not in there," she said.

  She added reports of a red van in the area on the morning of Ms Bulley's disappearance were not being treated as suspicious.

  The detective also confirmed that a glove found near to where Ms Bulley disappeared does not belong to her.

  Ms Bulley's phone was found on a bench by the River Wyre

  Assistant Chief Constable Peter Lawson defended his force's investigation into the case of the missing mother-of-two.

  He said the force had decided to share more details in the press conference "than would normally be the case" to counter some of "the ill-informed speculation and conjecture".

  "It has been a distraction that is potentially damaging to the investigation, the community of St Michael's and most importantly Nicola's family," he said.

  On Tuesday the Lancashire force said it had arrested two people after malicious messages were sent to a number of parish councillors about the case.

