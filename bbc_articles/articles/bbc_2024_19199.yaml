  Floral tributes have been left near to the scene of the attack on Hart Street

  Elsie's headteacher Jennifer Sephton, from Farnborough Road Infant School, described her as "such a caring and charismatic young lady who loved to please". In a tribute, she said Elsie had been a "loving and bright member of our wonderful community" since she was "first brought here on her father’s shoulders". The school was "heartbroken and devastated" by her death, she added. "We will miss you dearly Elsie. You were one of a kind," she added.
