title: 'Colwyn Bay fire: Lucky escape as passer-by spots attic flames - BBC News'
date: '2024-02-20'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68347101
content: |-
  Firefighters spent the night tackling a large fire at a house, with the occupier escaping unharmed.

  Firefighters have spent the night tackling a large fire at a house in Colwyn Bay.

  Crews were called to the Woodland Park West area of the town just before 21:00 GMT on Monday.

  Five fire engines, an aerial ladder and an incident command unit were used to tackle the blaze.

  A North Wales Fire and Rescue spokeswoman said the person who lived there was alerted to the fire by a passer-by who saw flames in the attic space.
