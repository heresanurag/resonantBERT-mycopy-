  Last week, Henseleit was beaten by Lauren Coughlin, the American who will be making her first Solheim appearance as the standout player of the summer. This has been the 31-year-old's breakthrough season, winning the Scottish Open for her second LPGA Tour victory in three tournaments. Coughlin only cracked the top 50 for the first time when she finished fourth at the Evian Championship in July. She is one of the favourites this week but the same can be said of a resurgent Vu, who missed much of the season with injury. The US star will relish her title defence, although the Old Course will present a significantly different test to Walton Heath 12 months ago. World number one Nelly Korda won six events in seven outings earlier this season, including the Chevron - the first major of the year. But her form has cooled significantly since then. This would surely be the perfect way for Olympic gold medal winner Lydia Ko - a New Zealander so unburdened by Solheim concerns - to follow up her extraordinary Paris victory. Others to watch include: Amy Yang, Hannah Green, Yin Ruoning and Ayaka Furue - who are among several leading players reflecting the growing strength in depth of LPGA golf. The Old Course will be a fascinating test. At 6,784 yards it will play 112 yards longer than in 2013 when the current US Solheim captain Stacy Lewis claimed a thrilling victory. This historic layout will be set up 529 yards shorter than when Cameron Smith won the Open in 2022, but the women will hit from the same tees as the men on the first, ninth, 12th and 18th holes. Given female hitting distances, we may see the unique strategic tests of the course in their best light. It will take excellent ball striking, supreme lag putting on the vast double greens and tactical nous to get the job done. It seems destined to be a glorious way to end golf's major season.
