  Man arrested on suspicion of murdering woman in Derry

  The body of Montserrat Martorell Elias was discovered in a flat in Harvey Street at about 04:15 BST on Saturday

  Detectives are continuing to question a man on suspicion of the murder of Spanish woman, Montserrat Martorell Elias, in Londonderry. The body of 65-year-old Ms Elias, who the police had previously been unable to identify, was discovered in a flat following a fire in Harvey Street at about 04:15 BST on Saturday. The 28-year-old man, who was arrested on Monday, was taken to Musgrave police station's serious crime suite for questioning. Police said Ms Elias, who had been living in Derry, had sustained multiple injuries from an unspecified type of weapon during a "horrific attack" before a ground floor flat was set on fire.

  Her body was found when firefighters attended the scene. There was an increased police presence in Derry at the weekend following the incident. In a statement earlier on Monday, the police said they were aware of "online speculation", which they said was "extremely unhelpful and deeply distressing to Ms Elias’ family". Detectives had also earlier appealed to speak to a white man, aged in his 30s, who was seen in the area.

  Det Ch Insp Kelly said detectives were working at full pace to establish exactly what happened to her “My thoughts at this time are first and foremost with Ms Elias’ family and friends in Spain, who are left trying to come to terms with their loss," Det Ch Insp Kelly said.
