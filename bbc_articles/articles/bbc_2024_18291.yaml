title: Boy, 15, admits role in Sunderland riot - BBC News
date: '2024-08-11'
section: England
url: http://www.bbc.co.uk/news/articles/c75nwkr536ro
content: |-
  The teen, who cannot be named for legal reasons, pleads guilty to violent disorder and burglary.

  A police car was set on fire during the disorder in Sunderland

  A 15-year-old boy has become the first child to be convicted for his part in violent disorder in Sunderland earlier this month, police say. The boy, who cannot be named because of his age, was arrested on Friday as part of early morning raids across the city. He appeared at South Tyneside Youth Court on Saturday where he admitted one charge of violent disorder and the burglary of a vape shop. Another Sunderland man, Philip Cawthorne, 38, pleaded guilty at South Tyneside Magistrates' Court on Saturday to violent disorder after being arrested by Northumbria Police.

  Three other men - a 24-year-old from Newcastle, a 26-year-old from Sunderland and a 35-year-old from Murton, Durham - have also been charged with violent disorder relating to the unrest on 2 August. The 35-year-old faces additional charges of possessing articles with intent to cause criminal damage and possession of a Class B drug, in relation to items discovered during protest activity in Newcastle on Saturday. Northumbria Police said the total number of people charged in relation to disorder in Sunderland was now 17.

  Three officers were injured when hundreds of people rioted. A police building was ransacked and a Citizens Advice office next door set alight. Beer cans and bricks were thrown at police outside a mosque and cars were also set on fire. It was one of several episodes of unrest to break out in towns and cities across England following the killing of three young girls in Southport at the end of July. Det Ch Insp Graeme Barr said the disorder in Sunderland had led to "appalling scenes". He warned any troublemakers identified would be "met with the full strength of the law".

  Cawthorne, of Southend Road, has been remanded in custody ahead of sentencing at Newcastle Crown Court on 20 August. The 15-year-old will next appear at South Tyneside Youth Court on Thursday. The 24-year-old, the 26-year-old and the 35-year-old will all appear at South Tyneside Magistrates' Court on Monday.
