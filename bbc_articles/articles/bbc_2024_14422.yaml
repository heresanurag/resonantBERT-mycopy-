title: Kesh car crash leaves teenager in a critical condition - BBC News
date: '2024-06-08'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cnllkjdgv79o
content: |-
  An 18-year old man and a woman in her 20s were involved in collisions in County Fermanagh and County Londonderry.

  Two people are in a critical condition after separate crashes.

  A teenager has been taken to hospital after a crash in Kesh, County Fermanagh, while a woman in her 20s is in a critical condition after a crash in Aghadowey, County Londonderry.

  The collision in Kesh, involving two cars, happened on the Letterboy Road at 18:00 BST on Friday.

  An 18-year-old man was taken from the scene with life-threatening injuries.

  A 44-year-old man was also brought to hospital with non life-threatening injuries.

  Officers from the Police Service of Northern Ireland, NI Fire and Rescue Service, NI Ambulance and Air Ambulance Services attended the scene.

  The crash in Aghadowey happened on Saturday at about 03:20 BST in the Glenkeen Road, where a car collided with a lorry.
