title: Harry's hurried visit to London... in 60 seconds - BBC News
date: '2023-05-09'
section: General
url: http://www.bbc.co.uk/news/uk-65518728
content: |-
  The BBC's Duncan Kennedy breaks down the brief trip the Duke of Sussex made to the UK for the Coronation.

  King Charles' Coronation is the first time the Duke of Sussex has been seen publicly with his family since his controversial memoir Spare came out.

  Prince Harry could be seen sitting two rows behind his brother, the Prince of Wales, at Westminster Abbey.

  The BBC's Duncan's Kennedy breaks down the prince's brief stint in London and what he did.
