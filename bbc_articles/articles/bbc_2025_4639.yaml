title: 'George Foreman: Heavyweight boxing legend dies aged 76 - BBC News'
date: '2025-03-22'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/ckg8ez8201yo
content: |-
  Foreman won his first world heavyweight championship in 1973 and lost it a year later to Muhammad Ali in the famous Rumble in the Jungle fight.

  Known as Big George in the ring, the American built one of the most remarkable and enduring careers in the sport, winning Olympic gold in 1968 and claiming the world heavyweight title twice, 21 years apart - the second making him the oldest champion in history aged 45. He lost his first title to Muhammad Ali in their famous Rumble in the Jungle fight in 1974. But overall, he boasted an astonishing total of 76 wins including 68 knockouts, almost double that of Ali. Foreman retired in 1997 but not before he agreed to put his name to a best-selling grill - a decision that went on to bring him fortunes that dwarfed his boxing earnings.

  His family said in a post on Instagram on Friday night: "Our hearts are broken. A devout preacher, a devoted husband, a loving father, and a proud grand and great grandfather, he lived a life marked by unwavering faith, humility, and purpose." The statement added: "A humanitarian, an Olympian, and two time heavyweight champion of the world, He was deeply respected - a force for good, a man of discipline, conviction, and a protector of his legacy, fighting tirelessly to preserve his good name - for his family." Tributes poured in from others across the sport, with former world heavyweight champion Mike Tyson saying Foreman's "contribution to boxing and beyond will never be forgotten". The Ring magazine, often dubbed the Bible of Boxing, described him as "one of the greatest heavyweights of all time". "[He] will be remembered as an icon of the sport forever." Foreman was born in Marshall, Texas, on 10 January 1949, and raised along with six siblings by a single mother in the segregated American South. He dropped out of school and turned to street robberies before eventually finding his outlet in the ring.

