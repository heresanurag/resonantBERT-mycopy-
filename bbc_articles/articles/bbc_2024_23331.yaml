title: Supernatural museum and seance plan for Carmarthen chapel - BBC News
date: '2024-09-26'
section: Wales
url: http://www.bbc.co.uk/news/articles/cvgl76mv7zpo
content: |-
  The new owners of a chapel say they plan to open a supernatural museum and hold seances there.

  This video can not be played To play this video you need to enable JavaScript in your browser. Carmarthen chapel set to be turned into supernatural museum

  The new owners of an 18th Century chapel say they plan to open a supernatural museum and hold seances on site. Laura and Erik Rowton, who have more than 540,000 YouTube followers, said they hoped to create a "museum of the paranormal and spirituality" at Penuel Chapel in Carmarthen. The couple bought the grade-II listed chapel in August, partly because of its paranormal history. Penuel Church, which used to hold services in the chapel, said the plans were "not in keeping with the church's ethos, values and beliefs" and it was in "no way associated with the museum".

  Laura and Erik Rowton plan to hold seances in a building adjacent to the chapel

  "At the end of the 19th Century it was known for faith healing, particularly under Rev WS Jones," said Ms Rowton. "The congregation observed what is recorded as supernatural manifestations and he would experience divine power coming through him and heal people."

  There are plans to create a "museum of the paranormal and spirituality" at Penuel Chapel in Carmarthen

  The couple have collected a number of "supernatural" artefacts that they plan to display in their museum, including a "cursed" Ouija board. Ms Rowton said she and her husband made it clear to the estate agent they would be turning it into a "museum of spirituality."

  The church, which has since moved to another venue in the town, published a statement claiming it was told the building was to be used as a "historical museum" but had since become "sadly aware of some other intentions".

  The couple plan to display "supernatural" artefefacts in their museum

  Ms Rowton said it was "disappointing" the church never came to them personally to raise these issues. "I think a lot of their concerns would be alleviated," she said. "We want it to be a safe space for people to come and explore their beliefs. "There is a lot of focus on the darker side of the paranormal but wherever there is darkness, there is light," she added. She said the chapel itself would host exhibits about angels and saints relics, while seances would be held in an adjoining building that was once a school house. "A lot of people take a lot of comfort from reaching out to the other side to try and contact loved ones," Ms Rowton said. "Anything that can be considered more controversial like a Victorian seance or spirit boards will be held in a different part of the building."

  The Rowtons want the chapel to be a "safe space" for people to come and explore their beliefs

  Carmarthen's mayor Emlyn Schiavone said there would be mixed feelings in the town about the plans. "Sadly, it's a sign of the times," he said. "Where chapels and churches were really vibrant places, increasingly membership has fallen." The Rowtons hope to open their Museum of the Paranormal and Spirituality by Halloween.
