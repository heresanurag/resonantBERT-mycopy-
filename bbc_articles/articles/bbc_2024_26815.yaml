  Gordon suffered another nightmare return to Goodison Park, jeered loudly when his name was read out before kick-off and the theme continued during the game. Having left Everton for Newcastle for £45m last January, the 23-year-old came back to the venue for the first time in December but had 'Gordon, what's the score?' ringing in his ears following a heavy 3-0 defeat. Though they took a point back to Tyneside this time, Gordon will rue the penalty miss, as well as another gilt-edged chance to win it in the second half. Gordon was one of the shining lights in a disappointing seventh placed finish last season and is understood to be close to agreeing a new deal at St James' Park, following flirtations with Everton's Merseyside rivals Liverpool during the summer. And manager Eddie Howe has backed his player to overcome the miss. "I think he will be fine," Howe told BBC Radio 5 Live. "It's all part of his growth as a footballer. It was emotionally charged and I think it will always be for him to come here. I thought he handled himself well. "I thought there was real composure in his play. Anyone can miss a penalty. It happens to everybody."

