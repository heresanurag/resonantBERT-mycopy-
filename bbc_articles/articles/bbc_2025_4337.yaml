title: Keir Starmer dismisses SNP call to axe Donald Trump state visit - BBC News
date: '2025-03-02'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cp3yqwd1kkko
content: |-
  The SNP say Donald Trump needs to be a steadfast ally of Ukraine after a fiery exchange with Zelensky on Friday.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'I won't be diverted by SNP rhetoric on Trump visit' - Starmer

  The prime minister has dismissed calls from the SNP to scrap an unprecedented second state visit for Donald Trump following a showdown with Ukraine's President Zelensky. Trump accused Zelensky of "gambling with World War Three" at the White House on Friday, in a fiery exchange described as "deeply troubling" by Scotland's first minister. John Swinney told the BBC he did not see how a state visit for the US president - offered by the King on Thursday - could go ahead unless he was "absolutely full-square with us" in protecting Ukraine. However Starmer, who hosted a summit of European leaders including Zelensky earlier, accused the SNP of using rhetoric and said he would not be distracted.

  The prime minister used his visit to the White House to present Donald Trump with an offer of a second state visit

  It followed a number of SNP MPs criticising the prime minister's relationship with Trump on social media, including the party's Westminster leader Stephen Flynn who said Starmer "better get back up off his knees and revoke that offer of a state visit". Prior to Zelensky's warm welcome at Downing Street on Saturday, the SNP's foreign affairs spokesperson Stephen Gethins accused the prime minister of being silent on the matter which he said was "disappointing". After the White House exchange, Starmer called both Trump and Zelensky and later reiterated the UK's support for Ukraine, saying "we stand with Ukraine for as long as it may take". Speaking to on the Sunday with Laura Kuenssberg programme, Starmer said: "I've seen people ramping up the rhetoric and taking to Twitter and saying what they would do – good for them, I'm not that interested in that. "I'm interested in what are the practical steps, what are the bridge building that I can do, what are the relationships that I can mend and take forward to take us to lasting peace in Europe. "I'm not going to be diverted by the SNP or others trying to ramp up the rhetoric without really appreciating what is the single most important thing at stake here – we're talking about peace in Europe."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch in full: The remarkable exchange between Zelensky, Vance and Trump

  Starmer used his US visit to present Trump with a letter from the King, offering an initial meeting in Scotland - where Trump owns two golf courses - to discuss the logistics of a second state visit. Second-term US presidents are traditionally not offered state visits and have instead been invited for tea or lunch with the monarch, usually at Windsor Castle. Taking a different tone from SNP MPs, John Swinney said he welcomed the role the prime minister was taking and that he supported him trying to find a way through a difficult situation.

  This video can not be played To play this video you need to enable JavaScript in your browser. Trump visit cannot come without assurances on Ukraine - Swinney

  Speaking to the BBC's Sunday Show, he said: "I think the prime minister is absolutely right to try and find a way forward with the United States because the position that unfolded on Friday evening was... deeply troubling to watch. "To see a courageous leader of a courageous country being berated in the fashion that President Zelensky was is completely unacceptable." But he added that he could not see how a state visit could go ahead if Trump was "not a steadfast ally of ours in protecting the future of Ukraine". He said: "That seems to me an absolutely fundamental requirement of any offer of a state visit to the president of the United States – that he is absolutely full-square with us in protecting Ukraine and insuring its independence. "If we don't do that then I think we are undermining the future of western democracy." John Swinney has previously said he would use Trump's affinity for Scotland in a bid to avoid tariffs being applied on imports to the US, particularly on Scotch whisky. He had publicly backed Harris, the Democratic nominee, in the run up to the 2024 presidential election.

  Zelensky had hoped for positive talks with Trump during his visit, including the signing of a minerals deal which would give the US a real stake in his country's future, if not an outright security guarantee. Instead he faced an extraordinary dressing down in front of the world's media, with Trump and his Vice-President JD Vance demanding that he show more gratitude for years of US support. The Ukrainian president pushed back at suggestions from his more powerful partners that he should work harder to agree a ceasefire with Vladimir Putin. They responded that he was being "disrespectful". After his departure, Zelensky said Ukraine is "ready to sign the minerals agreement" but continued his call for US security guarantees. The exchange prompted a series of responses from European leaders with French President Emmanuel Macron and German Chancellor Olaf Scholz among those reiterating their support for Ukraine. Following the summit with European leaders in London, Starmer unveiled a four-step plan to guarantee peace in Ukraine, which will be discussed with the US. Four points were agreed - to keep military aid flowing into Ukraine, to have Kyiv at the table for any peace talks, for European leaders to aim to deter any future Russian invasion of Ukraine and a "coalition of the willing" will be formed to defend Ukraine and guarantee peace. Additionally, the UK will be giving Ukraine access to £1.6bn ($2.01bn) to buy new missiles.

  Sir Keir Starmer and John Swinney differ on the question of a state visit for Donald Trump. But that's about the only point of contention between them on this global issue. It was striking that the first minister went out of his way to repeatedly welcome the approach of Sir Keir to the war in Ukraine, and to say he was "absolutely right" to keep seeking a deal with the US. If Sir Keir and Mr Trump are very different characters, then the prime minister has far more in common with Mr Swinney. They are both serious men, more interested at this point in outcomes than optics. Mr Swinney stopped short of slapping down Stephen Flynn's sharply-worded social media post, but he was explicit in his backing for Sir Keir's efforts to build bridges between Western allies. While the SNP leader is always keen to capitalise on any domestic differences with his electoral rivals in Labour, he has made it clear that they are on the same team on the international stage.
