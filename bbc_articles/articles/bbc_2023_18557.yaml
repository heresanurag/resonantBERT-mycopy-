content: |-
  Aircraft take several attempts to land at Birmingham Airport as Storm Pia brings strong winds.

  Storm Pia left aircraft struggling to land at Birmingham Airport on Thursday.

  Strong winds meant some planes had to make several attempts to land, before finally touching down.

  Observers watched as aircraft approached the runway almost side-on.

  Dozens of flights were cancelled or delayed across the country, including at Heathrow, Leeds Bradford Airport and Glasgow Airport.
