title: Bridge collapses as floods hit China's south - BBC News
date: '2024-04-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-68872299
content: |-
  The country’s south has been battered by heavy rainfall, with tens of thousands of people evacuated.

  Tens of thousands have been evacuated in the country’s south, which has been battered by heavy rainfall since Thursday.

  It has caused flooding and landslides in Guangdong province, as well as neighbouring Jiangxi and Fujian.

  CCTV footage captured the moment a bridge collapsed into a river on Saturday, amid torrential rain and strong winds.

