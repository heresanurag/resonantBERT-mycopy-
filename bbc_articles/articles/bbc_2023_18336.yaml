title: 'Gaza: UK MP says family trapped in church area amid sniper fire - BBC News'
date: '2023-12-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67742052
content: |-
  Layla Moran tells the BBC her relatives are trapped in a church complex as Israeli forces operate nearby.

  UK MP Layla Moran says she has several relatives who are trapped in a church in Gaza as Israeli forces operate nearby.

  She says no food is getting into the Holy Family church complex in Gaza city, where hundreds of civilians - including dozens of disabled people are sheltering.

  "No one can go in and out. They are absolutely terrified," Moran told the BBC.

  Her relatives and the Latin Patriarchate of Jerusalem say a mother and daughter were killed inside the Holy Family Church complex on Saturday by what appeared to be sniper fire.
