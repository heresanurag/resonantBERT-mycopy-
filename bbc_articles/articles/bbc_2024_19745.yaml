  Son wants to become Tottenham Hotspur legend

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Captain Son Heung-min says he wants to be remembered as a Tottenham Hotspur legend, but does not believe he can be considered that yet. The 32-year-old is approaching his 10th year at the Premier League club and has made more than 500 appearances for them. He has scored at least 14 goals in each of the past eight seasons and struck up a fine partnership with Harry Kane before the England captain moved to Bayern Munich last summer. Asked what legacy he would one day like to leave at the club, South Korea forward Son told BBC Sport: "Legendary. "Being at one team in 10 years is a good effort I think. You have to be consistent with this and you also have to give something back to the club. "I still don’t think I am a legend of this club. I have said I want to win something with Spurs, then I want to be very happy to be called legend. "I joined Spurs to win a trophy and I hope we can make a special season.” Tottenham have not won a major trophy since the League Cup in 2008, but while Son is hoping to help them to silverware this term, he is not setting any personal targets. Last season he scored 17 Premier League goals as Spurs finished fifth. "I am not setting a goal of where I should be," he said. "Imagine if I say 10 goals or something and you score 10 goals in six games, your goal is done. I want to push as much as I can, never feeling it is enough. “I want to go as high as possible in every aspect – team, individual, everything. Then we will see where we are at."

  Son is popular with Tottenham fans and supporters in his native South Korea

  Son was named Tottenham captain in August last year, replacing Hugo Lloris. Sometimes the additional pressure that comes with it can be a burden, but Son has enjoyed the responsibility. “It has been good. I've learned a lot of things in the last year," he said. "Being a captain in a Premier League team takes a lot of responsibility. I am still learning. It is not easy but it is a good thing to do. “It is very important. I am not the loudest guy in the team but if I have to be loud I am happy to do it. I just want to be a good example with good behaviours. We have such a young group of players and if the captain does the right thing then the players will do the same things. “Off the pitch as well, I always try to be at a good level of what I am doing but the players are listening well so I am very grateful."
