title: Tice on Reform’s ‘best ever’ by-election results - BBC News
date: '2024-02-16'
section: General
url: http://www.bbc.co.uk/news/uk-68313998
content: |-
  The Reform UK leader says the Conservative party had "broken Britain".

  Reform UK leader Richard Tice has welcomed his party's performance in the Wellingborough and Kingswood by-elections.

  Labour won both, with a big swing from the Conservatives, but Mr Tice said Reform was solidifying itself as the UK's third biggest party, remarking: "It takes time to build a brand".
