title: Moment President Trump meets the Queen - BBC News
date: '2018-07-14'
section: General
url: http://www.bbc.co.uk/news/uk-44826198
content: |-
  The meeting took place at Windsor Castle.

  The US President and first lady Melania Trump travelled to Windsor to meet the Queen, before they fly to Scotland to spend the weekend at Mr Trump's Turnberry golf resort.

  The trio stood as the Coldstream Guards band played the Star-Spangled Banner, before Mr Trump joined the Queen for an inspection of the troops.
