  "VAR Decision – Tuna Disallowed," joked one commenter on a video posted on Instagram, external showing the technology flagging an item that had failed to scan properly, which has had more than 3.5 million views. "Clearly off side," added another. But on Bluesky, a user voiced fears, external that the technology could open the door to more surveillance measures. "What's next? Drones to follow... you about the store?" On Facebook, another user said, external he would "not use self-checkouts" after the technology was introduced.

  The move marks the latest attempt by retailers to try to stem the rise in shoplifting. Tesco has also introduced giant trolley scales at its Gateshead store, which prompted a similarly mixed response from shoppers earlier this year. "Am I at border control or Tesco?" asked one Reddit user. Last week Greggs announced that it will move its self-serve food and drinks behind the counter at sites where there are high levels of theft. And in 2023, photos circulating on social media showed supermarkets had fitted products including steaks and cheese with security tags, while coffee was replaced with dummy jars.
