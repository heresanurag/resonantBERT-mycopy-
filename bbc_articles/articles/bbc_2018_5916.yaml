title: '50 Cent: Spotify ''wrong'' to remove R Kelly from playlists - BBC News'
date: '2018-05-11'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-44081973
content: |-
  The rapper says R Kelly hasn't been convicted of a crime and the decision is "wrong".

  50 Cent has defended R Kelly after Spotify announced it was removing the singer from its playlists.

  "Spotify is wrong for what it is doing to artists like R Kelly and XXXtentacion," the rapper wrote on Twitter.

  R Kelly was removed as part of the streaming service's new "Hate Content & Hateful Conduct" policy, having been accused of sexual assault on multiple occasions.

