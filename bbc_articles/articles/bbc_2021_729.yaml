content: |-
  Boris Johnson tells a briefing that nearly a quarter of people over 80 have received a Covid-19 jab.

  Whitty: Priority to vaccinate those who would die from virus

  Andy Woodcock from the Independent asks about testing for people arriving into the UK from abroad and why it wasn't done sooner. The prime minister says the government will be bringing in measures to "ensure that we test people coming into this country and preventing the virus from being readmitted". Responding to a second question on schools and whether teachers and pupils should be vaccinated, Prof Chris Whitty says there is no evidence of hospitals filling up with children and it appears, that even with the new variant, "children are relatively much less affected than other groups". He says from a clinical point of view the real priority is to vaccinate the people that we know "are by far the most likely to die and by far most likely to end up in hospital". He adds there will have to be decisions made once the most vulnerable groups are vaccinated but we are not yet at that stage. The chief medical officer adds that neither vaccine currently in use in the UK has been licensed for children yet.
