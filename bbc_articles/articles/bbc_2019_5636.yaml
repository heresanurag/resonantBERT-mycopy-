title: 'Sheffield ''incident'': Man and woman charged with murder - BBC News'
date: '2019-05-26'
section: England
url: http://www.bbc.co.uk/news/uk-england-48412937
content: |-
  Two boys, aged 13 and 14, died, and four children were "rescued" from the property in Shiregreen.

  Floral tributes and balloons have been left at the scene in Shiregreen, Sheffield

  A man and a woman have been charged with murder after two children died following an "incident" at a house in Sheffield.

  Two boys, aged 13 and 14, died, and four children were "rescued" from the property in Shiregreen at 07:30 BST on Friday.

  The woman has also been charged with three counts of attempted murder.

  They are due to appear before Sheffield Magistrates' Court on Monday.

  The four surviving children, aged eight months, three, 11 and 12, received treatment at hospital and were discharged on Saturday.

  The children cannot be identified for legal reasons.

  Floral tributes and balloons have been left at the scene.

  The children cannot be identified for legal reasons

  Post-mortem tests on the boys who died had been due to take place on Friday.

  Gill Furniss, Labour MP for Sheffield Brightside and Hillsborough, said she was "deeply saddened by the tragic incident".

