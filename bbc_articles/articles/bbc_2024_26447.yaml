  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Dean Henderson (Crystal Palace): I know Tottenham were not great, but Crystal Palace were one of the few teams who got a clean sheet this weekend. It was a massive game for Crystal Palace and they had to break that curse of actually winning.

  Marc Guehi (Crystal Palace): He was excellent again. A very good captain's performance, very calm and very measured. He didn't really allow Tottenham too much. He had a great performance considering how much pressure was on them to win a game. Ruben Dias (Manchester City): Southampton at home was not a game where he had to work too hard, but he was controlled and measured. Especially with Arsenal versus Liverpool coming up there was no point where they were getting too far ahead of themselves or being lacklustre and taking their eye off the ball; he didn't allow for that. Issa Diop (Fulham): He was excellent and it was a great game by Fulham. They probably should have killed the game off, but fair play to Everton, they dug in and carried on. Diop had a tough time last year when people were questioning him, but I thought he was a powerhouse at the back at the weekend.

  Thomas Partey (Arsenal): I'm having Thomas Partey at right-wing back. He is the guy who is probably one of the Arsenal players they are looking to move on from in the summer, but he steps in and every time they ask him to play right-back he does a good job, doesn't let the team down. He is the type of person you'd be really grateful for in your team. Ryan Yates (Nottingham Forest) and Edson Alvarez (West Ham): Both midfielders were excellent. They were combative and did everything simple and well. In times when their games got a little bit ropey they stepped up, whether it be with a big tackle or calming the play down and winning fouls. They were excellent and two players who epitomised their teams in their necessity to find a win. West Ham needed that win against Manchester United and it was a good result for them. Rayan Ait-Nouri (Wolverhampton Wanderers): I am playing him at left-wing back. Obviously he got a goal at Brighton but I think he has been playing really well this season, although obviously Wolves have not had a great season themselves. I thought give him a little bit of credit for his attacking prowess and defending well throughout the course of the season.

  Cole Palmer (Chelsea): He scored a goal and although he didn't get the assist for the team's first it was an unreal pass for, as they say in America, an assist for the assist. It was a great ball and set them on their way. It just showed a level of class and when they take him off it looks like Chelsea at every single opportunity are going to lose the game. It gets so wide open, no control and he is probably getting frustrated at being brought off, but it was one of those games where he was excellent again. Chris Wood (Nottingham Forest): He has been scoring goals all season and coming up big when he needs to. Two massive goals on a huge night against rivals Leicester. Big Chris still delivers. Look at the age bracket. Apparently now you only have to be 23 and all you can do is sprint and run, but this guy is showing it is good to have a little bit of experience and it is back-to-back times he has been the striker in our team. Bryan Mbeumo (Brentford): Every single time I watch Brentford I expect him to score now. It is a wonderful thing to have. A cool, calm penalty and also that cross that ended up going in, the decisiveness in the play and the decision to get on the ball and take on a couple of Ipswich players before delivering into the box. Yes, a little bit lucky it went in at the far post but he made it all by himself and I think that is his first time in our team of the week.

  Mikel Arteta (Arsenal): I give this to Mikel Arteta for the simple fact of so much pressure, so much expectation and no players really to pick from – dealing with more injuries again with Gabriel going off - I thought to come out of that game with Liverpool with a point was excellent.

