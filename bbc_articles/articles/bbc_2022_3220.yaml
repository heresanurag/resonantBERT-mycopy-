content: |-
  Maher Maaroufe is charged with murdering Sabita Thanwani, who died at her student accommodation.

  Sabita Thanwani, 19, was studying psychology at City, University of London

  A man has appeared in court charged with the murder of 19-year-old Sabita Thanwani at her central London student accommodation.

  Maher Maaroufe, 22, who is also accused of attacking a police officer, appeared at Highbury Corner Magistrates' Court.

  Mr Maaroufe spoke only to confirm his name, age and that he had no fixed address.

  Magistrate Greville Waterman remanded him into custody until 24 March, when he is due at the Old Bailey.

  Mr Maaroufe, who is a Tunisian national, was asked by the magistrate if he understood proceedings. Mr Maaroufe shook his head.

  Mohammed Zeb, defending, told the court he would explain it to his client after they left the courtroom and that at future hearings "there should be an interpreter for the Tunisian Arabic dialect".

  Police and medics were called to Arbour House in Sebastian Street, Clerkenwell, at about 05:10 GMT on Saturday where Ms Thanwani was found seriously injured.

  She died at the scene and a post-mortem examination gave cause of death as sharp force trauma to the neck.

  Ms Thanwani was studying psychology at City, University of London, which is near to the student accommodation where she died.

