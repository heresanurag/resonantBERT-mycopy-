  Music lovers have spent the day lugging air mattresses, rucksacks, refreshments and more across the Glastonbury Festival site in the baking sunshine. Thousands of festival-goers have been arriving at Worthy Farm in Somerset after the gates opened at 08:00 BST. With temperatures of up to 27C forecast for the weekend, some people arriving at the site enjoyed being sprayed down with water.

