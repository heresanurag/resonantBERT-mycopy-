  Though he eventually received 74 million votes - more than any other sitting US president - he lost the race to Mr Biden by more than seven million votes. From November 2020 to January 2021, he amplified claims of stolen votes and widespread electoral fraud - claims that were knocked down in more than 60 court cases. Refusing to accept the results, Trump rallied supporters in Washington on 6 January, urging them to converge on the Capitol as Mr Biden's victory was to be formally certified by Congress. That rally devolved into a riot that placed lawmakers and his own vice-president in danger and led to a historic second impeachment. Trump was again acquitted by the Senate, albeit more narrowly. His actions on the day are now the focus of two criminal cases.

  This video can not be played To play this video you need to enable JavaScript in your browser. How Trump spent his last day as president

  Trump's political career appeared as good as dead after the storming of the Capitol. Donors and supporters vowed never to support him again, and even his closest allies publicly disavowed him. He skipped his successor's inauguration and moved his family to Florida but, with a loyal army of fans still behind him, retained massive influence over the Republican Party. Perhaps the most enduring legacy of his presidency came after it ended - when the three right-wing justices he had nominated to the Supreme Court cemented a conservative majority that helped end nearly 50 years of national abortion rights. Despite being blamed for poor Republican returns in the 2022 midterm elections, Trump announced another run for president and soon became his party's clear frontrunner. More than a dozen opponents, including his former vice-president, challenged him but fell short as Trump avoided the debate stage and trained his fire on Mr Biden.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: We asked MAGA: is there anything good about Biden?

  Trump began the general election facing 91 felony charges across four criminal cases but his strategy of delaying legal cases has largely succeeded. Three cases will now no longer take place before the election, and his sentencing in New York - on arguably the weakest set of charges - has been delayed until late November. On 13 July, a 20-year-old gunman attempted to assassinate Trump during a campaign rally in Butler, Pennsylvania. Thomas Matthew Crooks fired eight rounds from an AR-style rifle from atop a nearby roof, wounding Trump in his right ear before the gunman was killed by counter-snippers. Days later, at the Republican National Convention, the party lavished him with praise on him and officially coronated him the Republican presidential candidate for a third consecutive time, setting up an apparent rematch with Mr Biden. A historically unpopular president, the Democrat's tenure has been marked by post-pandemic economic and infrastructure gains, but also high inflation, surges in illegal immigration and foreign policy chaos. Since Mr Biden stepped aside and endorsed his deputy, Kamala Harris, Trump has sought to tie her to the administration's failures - with middling success. National polls indicate that, while Ms Harris has galvanised liberal voters and raised millions of dollars, the race is deadlocked. He has told his supporters that 5 November 2024 - the date of the US election - will be "the most important date in the history of our country".
