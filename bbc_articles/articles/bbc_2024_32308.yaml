title: Chappell Roan to headline Reading and Leeds festival - BBC News
date: '2024-12-05'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c30npzj640do
content: |-
  Reading and Leeds announces its first acts for 2025 including Chappell Roan and Travis Scott.

  Singer Chappell Roan and rapper Travis Scott will headline Reading and Leeds festival next year. Metal band Bring Me The Horizon and singer-songwriter Hozier will also top the bill at both events over the August bank holiday weekend. Pink Pony Club singer Chappell Roan has exploded in popularity this year off the back of singles Hot to Go! and Pink Pony Club, a sell-out UK tour and her debut album The Rise and Fall of a Midwest Princess Melvin Benn, boss of organiser Festival Republic, said she was "an inspiring new pop star poised to define a generation".

  This year's festival line-up, announced on BBC Radio 1's New Music Show with Jack Saunders, also includes AJ Tracey, Becky Hill and rapper Trippie Redd. Other artists confirmed for the line-up include Sammy Virji, Enter Shikari, The Kooks, Bloc Party, Conan Gray, Amyl and The Sniffers and Wunderhorse. Rudim3ntal, Suki Waterhouse, The Dare, Lambrini Girls and Lola Young are also set to perform, with more acts yet to be announced.

  It's been a whirlwind year for Chappell Roan, who won best new artist at September's VMAs after cancelling two European shows to play the awards. She also pulled out of All Things Go festival in Washington DC and New York City, saying she felt overwhelmed by the pressures of her newfound fame. Travis Scott, who last performed at Reading and Leeds in 2018, has just finished his Utopia - Circus Maximus Tour off the back of his first UK number one album, Utopia. In 2021, he performed at the Astroworld music festival in Texas, where 10 people died after fans surged towards the stage. Last year, he had to cancel a show in front of Egypt's pyramids, blaming "complex production issues". Mr Benn said the rapper's headline slot in 2025 would be an "exclusive appearance" in Europe.

  The festivals are said to be Travis Scott's only European performances in 2025

  Lana Del Rey and Blink-182 headlined 2023's summer's festivals, and two stages at the Leeds site were closed when Storm Lilian hit. Mr Benn claimed the 2025 line-up was one of the "youngest" in years and reflected "an exciting wave of inspiring voices breaking through in pop culture". The events will take place at Reading's Richfield Avenue and Bramham Park in Leeds between 21-24 August, with tickets due to go on general sale on Monday.

