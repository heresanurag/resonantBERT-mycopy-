content: |-
  Some rail services are disrupted and patients may have issues getting prescriptions.

  GPs turn patients away as global IT issues hit Wales

  One GP surgery has advised patients to only phone in an emergency

  Doctors' surgeries, supermarkets and train services in Wales have been running at limited capacity without computer systems following a global IT outage. Some GPs were forced to turn away all but the most seriously ill patients on Friday, while stores such as Morrisons and Waitrose operated on a cash only basis and rail journeys were delayed or cancelled. Meanwhile, across the globe, planes were grounded, many industries disrupted and TV channels forced off air. Cyber security firm Crowdstrike said the global IT problems were caused by a defect in a content update and were not due to a security incident or cyberattack.

  "The issue has been identified, isolated and a fix has been deployed," said George Kurtz, CEO of Crowdstrike. Cabinet Office Minister Pat McFadden said the global outage was not a security attack or a hostile act. He said: "The cause appears to be a software error in an update - a fix is being put in place." However, its effect on the NHS's EMIS system - which is used to manage everything from appointment bookings to sending prescriptions to pharmacies - meant the impact was felt at grassroots level. GP surgeries like Llan Healthcare in Llanrumney, Cardiff, had to revert to handwritten notes because it was unable to access their clinical systems. "We are running on a limited capacity until we know more," it posted on Facebook. "Please only phone if it is an emergency you can utilise 111 and attend local pharmacies."

  Digital Health and Care Wales (DHCW), which is responsible for NHS Wales' digital systems, reported "critical services" were "operating as normal." "We are aware of some impact to local digital services across Wales and for some users of the NHS Wales app," it said in a statement. "DHCW, health boards and our supplier digital teams are working hard to resolve these as a priority."

  "We had to scramble to book another hotel and extend our car parking and find someone to look after the dog for longer," says Hywel Roberts

  Hywel Roberts, 35, from Pontarddulais, Swansea, was due to fly back from Malaga to Bristol but had his plans scuppered. "We were expecting to fly home this evening but weren't able to find any other flights as all of the websites were down," he said. "We had to scramble to book another hotel and extend our car parking and find someone to look after the dog for longer - it's stressful." The IT issues had "minimum impact" on operations at Cardiff Airport, though. "Passengers who are due to fly from Cardiff Wales Airport today are advised to check our website for live flight information," said a spokesperson. Sky Sports apologised after its coverage of the Queensland Reds against Wales rugby match was "affected" by the issues. "We apologise to those wishing to watch the game from the start for any inconvenience caused," a spokesperson said. A Transport for Wales spokesperson said "some" IT systems had been impacted but services were "running as planned". "Customers are advised to check for the latest information before travelling. We apologise for any inconvenience caused.” No council in Wales reported any major issues or disruption to their IT systems.
