title: King Charles and Catherine return to Commonwealth Day service - BBC News
date: '2025-03-10'
section: UK
url: http://www.bbc.co.uk/news/articles/c778zpmxk56o
content: |-
  The royals had not appeared together at the event for two years due to their treatments for cancer.

  Monday's annual Commonwealth service was the first in two years to have both King Charles III and Catherine, Princess of Wales, in attendance

  King Charles III and Catherine, Princess of Wales have attended the annual Commonwealth Day service, a year after both were forced to cancel because they were receiving cancer treatment. The event at Westminster Abbey on Monday celebrated the Commonwealth's "powerful influence for good in the world". Queen Camilla, the Prince of Wales and the Princess Royal also attended, along with Prime Minister Sir Keir Starmer. The King's appearance at the service was his first in two years, while Catherine was absent last year as she was undergoing chemotherapy, which she has since completed.

  Ahead of commemorations marking the 80th anniversary of the end of World War Two, the King paid tribute to the "sacrifice and selflessness" of Commonwealth forces. He also said restoring the "disrupted harmony of our entire planet" is the most "important" task facing humanity. In an address included in a booklet given to the congregation, the King wrote: "More than one and-a-half million men and women who served during the war came from across the Commonwealth to support the United Kingdom and its allies.

  "On this special anniversary, we remember with particular pride and everlasting gratitude the untold sacrifice and selflessness of so many from around our family of nations who gave their lives in that dreadful conflict." The theme of this year's Commonwealth Day is Together We Thrive, which celebrates the "enduring spirit of the Commonwealth family". During his bidding, the Dean of Westminster said: "As different peoples we rejoice in this opportunity to reflect, in mutual respect, on our shared dignity and commitment to the service of others. "We celebrate the love and affection that binds us in unity and gives us resilience and strength." Among the performers at the service were Shree Muktajeevan Swamibapa, a Hindu Scottish pipe band, and musicians, acrobats and singers from the Masai Cultural Arts team. Violinist Braimah Kanneh-Mason and his sister Jeneba on piano also played during the service. Protesters from the anti-monarchy group Republic held up placards reading "not my King" and "down with the Crown" as they gathered outside the abbey ahead of the service.

  People from across the Commonwealth attended the annual celebration.
