  Mr Wells said he was frustrated by the short notice the government had given for the rule change, adding: "I completely understand the decision, but I think 30 hours' notice and announcing it at 11 o'clock in the evening French time... was pretty unrealistic.

  "I don't really understand why they can't be a little bit more clear with the public about what the tipping point is, when we might perhaps be approaching the need to quarantine. Why not 48 or even 72 [hours] just to allow those who need to or want to get home, get home without rushing dangerously."

  This video can not be played To play this video you need to enable JavaScript in your browser. BBC journalist made a video diary as her family had to cut short their holiday

  Kate Mooney and her family arrived back at their home in Cornwall at about 01:00 BST after ending their holiday to France a week early.

  "Our immediate response was 'let's just stay and finish our holiday', and then we started to really consider what quarantine meant," she told BBC Breakfast.

  "There would be no way we could leave the house... that's when we decided we would come back."

  Kate Mooney and her family cut their holiday short by a week

  Tom Duffell, who runs a small business and ended his family holiday in Nice four days early, told the BBC that social distancing had "gone out of the window" in the scramble for transport, with "huge queues" at the airport.

  Eurotunnel, which increased its capacity, said 12,000 people had tried to book tickets for its Channel Tunnel trains in the hour after the new rules were announced - at about 22:00 BST on Thursday - compared with just hundreds normally.

  It carried more than 30,000 passengers in the run-up to the deadline. Additional staff were sent to the terminals to allow 11,600 vehicles to quickly load its shuttles throughout Friday.

  P&O Ferries and DFDS Ferries also added an extra four departures.

  Musicians from Dunedin Consort hired a fishing boat to return to the UK

  Meanwhile, a group of musicians from Scotland found a creative way to beat the deadline with just 10 minutes to spare - by chartering a fishing boat to get them back to the UK.

  After a five-hour Channel crossing, eight members of the Scotland-based Dunedin Consort arrived at Hayling Island in Hampshire at 03:50.

  They made the last-minute dash after a performance in Lessay Abbey, Normandy, on Friday night.

  Some were unable to get back home in time. One passenger arriving at Gatwick soon after the deadline had passed told BBC Radio 4: "It's ridiculous. They're leaving us high and dry. We tried to change our flights... impossible.

  "Me and the kids have been to Cornwall and the Lake District this summer and I don't think that felt any more at risk than where we've been - in a fairly rural part of France."

  Another said: "It's a shame to have missed it by such a narrow margin but that's life really, so we've just got to get on with it."

  One woman is wondering whether her unusual journey from France to Britain later today will fall foul of the travel rules.

  Australian Chloe McCardel, 35, is aiming to complete her 35th endurance swim across the Channel. If she's successful, she will beat the current men's record for the most Channel crossings, held by British athlete Kevin Murphy.

  She is due to leave Dover at 20:00 BST and aims to make the 21-mile crossing to Calais in about 10 hours, before heading back to her support boat for the return journey.

  Since she will only stand on French soil for a matter of minutes, McCardel hopes it won't be necessary to spend 14 days in self-isolation on her return.

  "We don't go anywhere near the border officials or passport control, so I'm hoping technically the quarantine thing won't apply," she said.

  "I've got a little celebration planned in England with the support crew, the team, the volunteers who have been so supportive throughout this. So I am hoping the government allow us to do that without having to quarantine."

  Gloria Guevara, president of the World Travel and Tourism Council, said the UK was lagging behind other countries that had "shunned quarantines" in favour of "comprehensive" testing programmes for everyone departing and arriving back into their respective countries.

  Shadow home secretary Nick Thomas-Symonds said that while Labour supported "evidence-based measures" at the border, it was "vital" that No 10 had a "joined-up strategy" and "urgently" put in place a specific deal to support the heavily impacted travel sector.

  He added: "That the government has still not put in place an effective track, trace and isolate system has made matters far worse and made it more likely that we are reliant on the blunt tool of 14-day quarantine."

