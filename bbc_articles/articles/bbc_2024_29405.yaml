title: Isle of Wight missing raccoons captured but two still at large - BBC News
date: '2024-11-03'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/ckgz2wdv5wvo
content: |-
  Four 18-month-old female raccoons escaped from their enclosure at Amazon World, near Sandown.

  Two missing raccoons found but two still at large

  The first raccoon was found on zoo property

  A second of four raccoons that went missing from a zoo on the Isle of Wight has been captured. Four 18-month-old female raccoons escaped from their enclosure at Amazon World, near Sandown, prompting a search. The first was captured within the zoo's grounds shortly before midnight on Friday. Her sister was found by staff at the top of the zoo's parrot perches on Saturday evening.

  The second racoon was found in one of the zoo's parrot perches

  In a post on it's Facebook page, the zoo said it was "ecstatic" that the second of the four escaped raccoons had been caught. It also confirmed that both captured animals would be put in an enclosure away from the public, alongside their sibling that did not escape. The two other missing raccoons remain at large - with the search set to continue "throughout the night". The search had been scaled down during daylight hours - when the raccoons are expected to go to sleep.

  Three raccoons are still missing

  Head keeper Rachel Patrick had earlier urged locals to keep an eye out "in sheds and up trees" while speaking to BBC Radio Solent. "The more eyes the better," she said. "They'll be hiding in any nook and cranny to go to sleep during the day." The captured raccoons are two of five siblings that arrived at Amazon World three weeks ago. Four of them escaped.

