title: Thousands take part in Glasgow and Edinburgh Pride marches - BBC News
date: '2022-06-25'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-61936795
content: |-
  Pride Edinburgh celebrates its 25th anniversary while the Pride Glasgow event is held for the first time in three years.

  Thousands of people have been taking part in Pride events in Glasgow and Edinburgh.

  Pride Edinburgh was celebrating its 25th anniversary, marching from the Scottish Parliament to Edinburgh University.

  Meanwhile, Pride Glasgow returned for the first time in three years, although a separate pride event, Mardi Gla, was held last year.

  Canoeists and paddle boarders also joined a Pride on the Clyde event.
