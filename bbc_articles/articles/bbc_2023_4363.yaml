title: 'Ukraine war: Urgent UN warning after power interrupted to Ukraine nuclear
  plant - BBC News'
date: '2023-03-09'
section: Europe
url: http://www.bbc.co.uk/news/live/uk-64899277
content: |-
  "How can we allow this?" an official asks after the Zaporizhzhia facility again lost off-site power following Russian strikes.

  That's all for our live coverage for now

  We leave you with the headline that the power is back on at Ukraine's largest power plant - after an interruption following the biggest Russian missile barrage for weeks. The team had a hectic morning as reports of the fresh strikes came in. Kyiv said more than 80 missiles were fired - 34 of which were shot down. Moscow said its hypersonic missiles were involved. The most extraordinary line of the day came from Rafael Grossi, the man who heads up the UN's nuclear watchdog. In a chastening address to colleagues about Zaporizhzhia, he said: "What are we doing? How can we sit here in this room this morning and allow this to happen? This cannot go on." Several deaths have been reported across Ukraine, with President Volodymyr Zelensky saying 10 regions were struck. Crews in Ukraine have been working to restore power after damage to infrastructure. Thanks for tuning in today. The page has been put together by Nathan Williams, Anna Boyd, Jasmine Andersson, Tarik Habte, Gem O'Reilly, Alex Fouché, Andre Rhoden-Paul, Alys Davies, Tom Spender, James FitzGerald and me.
