content: |-
  Monkstown is one of Antrim's most deprived areas, but a boxing club is helping youths fight back.

  Monkstown is one of the most deprived areas in County Antrim.

  The number of people with a degree or higher qualification is 8.4% lower than the Northern Ireland average.

  But a local boxing club is helping young people fight back against the statistics.

  Monkstown Boxing Club received almost £600,000 from the National Lottery Community Fund for their #INYOURCORNER project.

  The five-year project is designed to improve the health, well-being and increase the employability of young people in the area.

