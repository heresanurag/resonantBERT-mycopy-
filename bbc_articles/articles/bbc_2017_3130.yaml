content: |-
  A British woman tells the Victoria Derbyshire programme that police in Dubai are refusing to hand over her passport so she can fly back to the UK for urgent cancer treatment.

  A British woman has told the Victoria Derbyshire programme that the police in Dubai are refusing to hand over her passport so she can fly back to the UK for urgent cancer treatment.

  Luisa Williams said she was diagnosed with advanced kidney cancer two weeks ago.

  She said authorities in the United Arab Emirates want to deport her for carrying out charity work which was against the law.

  But they won't let her leave unless she goes to a detention centre first, where she is concerned her condition may worsen.

  The Victoria Derbyshire programme is broadcast on weekdays between 09:00 and 11:00 on BBC Two and the BBC News channel.
