title: Why ballroom dancing thrives in Asian communities - BBC News
date: '2023-02-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64377362
content: |-
  After a shooting at a dance studio in California, we visit a ballroom to meet the people still dancing.

  A week after the shooting at a dance studio in Monterey Park near Los Angeles, which left 11 people dead, the BBC visited a studio in the San Francisco Bay Area to learn about the popularity and resilience of the ballroom dance community throughout the Asian American diaspora.
