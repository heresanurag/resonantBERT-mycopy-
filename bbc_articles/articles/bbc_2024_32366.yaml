title: South Korean president under pressure as impeachment vote looms - BBC News
date: '2024-12-05'
section: Asia
url: http://www.bbc.co.uk/news/articles/c74x8xpz3j2o
content: |-
  Yoon Suk Yeol is facing protests and a police investigation into his shock martial law decree.

  This video can not be played To play this video you need to enable JavaScript in your browser. Protesters in South Korea call for the president to go

  South Korean President Yoon Suk Yeol is facing mounting pressure to resign over his failed attempt to impose martial law, as parliament moves closer to a vote on his impeachment. The capital, Seoul, has seen a second day of street protests demanding Yoon's resignation, while police said he was being investigated for "insurrection". The opposition is pushing for a vote on the motion to impeach Yoon on Saturday, even as the president's party has said it opposes the move. It needs at least eight members of Yoon's party to vote for his impeachment for the motion to pass with a two-thirds majority in the 300-seat parliament.

  South Korea was plunged into political turmoil late on Tuesday night when Yoon made the shock martial law declaration. He cited threats from "anti-state forces" and North Korea. However, it soon became clear that his move had been spurred not by external threats but by his own domestic political troubles. Yoon rolled back the declaration six hours later after MPs voted it down. Some lawmakers jumped over barricades and fences to get past security forces in order to convene in parliament and void Yoon's decree.

  Protesters gathered on Thursday evening in Seoul to call for Yoon's resignation

  His attempt to rule by martial law has caused public outrage and street protests. He has not spoken publicly since revoking his decision early on Wednesday. Before his attempt to place the country under military rule, Yoon had been beset by low popularity ratings, corruption allegations and an opposition-led legislature that reduced him to a lame-duck leader. Further rallies calling for Yoon's resignation took place on Thursday, including one by candlelight in the evening. There have also been some rallies in support of him, but they have been much smaller. Some lawmakers are also staying near the National Assembly to make sure that they are ready to void another martial law decree, should Yoon attempt it again.

  Yoon has not spoken publicly since revoking martial law early on Wednesday

  Authorities have started investigating Yoon for alleged insurrection following a complaint by the opposition, said Woo Jong-soo, head of the National Investigation Headquarters of the National Police Agency. Insurrection is punishable by death and transcends presidential immunity. The National Assembly also started investigating the martial law declaration on Thursday. "The Yoon Suk Yeol regime's declaration of emergency martial law caused great confusion and fear among our people," opposition Democratic Party lawmaker Kim Seung-won said. Yoon's defence minister, Kim Yong-hyun, resigned on Thursday and took full responsibility for the martial law declaration. It was Kim who suggested martial law to Yoon, Interior Minister Lee Sang-min told the parliament hearing. South Korean media have carried similar reports. It became clear during the hearing that few knew about Yoon's plan. The defence vice-minister, Kim Seon-ho, said he learnt about it on the news.

  Army chief Park An-su said he had been handed the text of the martial law notice only on Tuesday night. "There were four of us who were reviewing the draft... While we are military experts, we are not experts on martial law. Time was passing and we were all saying, ‘What are we to do, what are we to do?' he told MPs. Meanwhile, outside the National Assembly, scuffles broke out between lawmakers and soldiers who were sent to block them from entering the National Assembly. Footage of Ahn Gwi-ryeong, a spokesperson for the opposition Democratic Party, grabbing the weapon of a soldier during the commotion was shared widely online. "When I saw the armed soldiers... I felt like I was witnessing the regression of history," she told the BBC Korean Service. "I didn't think... I just knew we had to stop this," she said. A motion to impeach Yoon was tabled in parliament late on Wednesday. South Korean law requires that it be put to a vote within 72 hours. The main opposition Democratic Party is pushing for a vote on Saturday evening. If the impeachment is approved, the president will be immediately suspended from office, while the prime minister becomes acting president. A trial will then be held before the Constitutional Court, a nine-member council that oversees South Korea's branches of government. The process could take up to 180 days. If six of the court's members vote to sustain the impeachment, the president will be removed from office.
