title: London to Brighton rail line closed by 'severe disruption' - BBC News
date: '2025-06-20'
section: England
url: http://www.bbc.co.uk/news/articles/c0k7j6jlkmlo
content: |-
  Several problems with signals mean several lines, including the Gatwick Express, have been suspended.

  Rail services between London and Brighton in East Sussex are being severely disrupted, with the Gatwick Express suspended. Operator Govia Thameslink said no services will be running between Brighton, Preston Park, Haywards Heath and Three Bridges for the rest of Thursday. No trains can run to or from Southampton, while some services in Surrey are also being disrupted. The operator said this was due to "a number of incidents".

  Anyone travelling to Brighton will have to use services via Lewes or Horsham, adding at least an hour to their journey. Services between Brighton and Cambridge have also been suspended. A fault with signalling at Wivelsfield means drivers are having to be talked through the signals. A faulty signal at Salfords in Surrey means delays to services between Redhill and East Croydon, while another signal fault is affecting trains running between Purley and Gatwick Airport.
