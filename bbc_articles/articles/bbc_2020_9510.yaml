title: 'Covid-19 in Scotland: ''Don''t go on holiday'' message to Aberdeen - BBC News'
date: '2020-08-06'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-53614467
content: |-
  First Minister Nicola Sturgeon advised that people in the city should not be going on holiday to other parts of Scotland or to other parts of the UK.

  That's all from us on today's coverage of the latest on coronavirus in Scotland.

  Aberdeen had its first full day of local lockdown, as the number of coronavirus cases linked to the outbreak has increased to 79 - with more expected in the coming days.

  An Aberdeen footballer is among those to have tested positive.
  • First Minister Nicola Sturgeon has said any "genuine individual injustices" over exam results will be "rectified" through the appeals process.
  • The Cairngorms National Park Authority (CNPA) has appealed to visitors to stay away from "extremely busy" areas of the park this weekend.
  • The Governor of the Bank of England has backed the UK government's decision to end its furlough scheme in October.
  • Tayside's "sickest survivor" of Covid-19 has been allowed home after spending 128 days in hospital.

  We'll be back tomorrow. Stay safe and have a good evening.
