id: bbc_2018_2083
title: 'Operation Sanctuary: Critical grooming report reaction - BBC News'
date: '2018-02-23'
section: Tyne & Wear
url: http://www.bbc.co.uk/news/live/uk-england-tyne-43156242
content: |-
  A report criticises agencies for failing to spot signs of exploitation after 18 people were convicted of abusing girls in Newcastle.

  One victim of sexual abuse spoke at length about how the court case badly affected her:

  Quote Message: I waited a long time for a trial date. There were video interviews, statements, identity parades. I gave full evidence at the trial and was cross examined. I waited a long time for a trial date. There were video interviews, statements, identity parades. I gave full evidence at the trial and was cross examined.

  Quote Message: Court was awful, the worst experience ever – spoken down to – felt I was on trial – the defence. The judge intervened a lot to stop it but it still went on. Court was awful, the worst experience ever – spoken down to – felt I was on trial – the defence. The judge intervened a lot to stop it but it still went on.

  Quote Message: I was commended for my strength by the police and prosecution. Shortly afterwards, thinking it was over, I was told there was a legal problem with a part of the case, not to do with me or my and evidence. The trial was stopped. I was commended for my strength by the police and prosecution. Shortly afterwards, thinking it was over, I was told there was a legal problem with a part of the case, not to do with me or my and evidence. The trial was stopped.

  Quote Message: A year later I was asked to give evidence again. I couldn’t face reliving it. To stand up in front of all those people - and then told I had to do it again – I had already made statements. If I only had to tell it once that would be brilliant. A year later I was asked to give evidence again. I couldn’t face reliving it. To stand up in front of all those people - and then told I had to do it again – I had already made statements. If I only had to tell it once that would be brilliant.

  Quote Message: The police understood and asked the CPS to consider using evidence from the original trial because of the impact on my mental health. The CPS requested a mental health assessment, which resulted in a brief meeting. I was asked first off to take Diazepam to go through with the trial. The police understood and asked the CPS to consider using evidence from the original trial because of the impact on my mental health. The CPS requested a mental health assessment, which resulted in a brief meeting. I was asked first off to take Diazepam to go through with the trial.

  Quote Message: The allegations referred to drugs being used for the purposes of rape and I was now being asked to take a drug to help relive it and put up with another full trial. I couldn’t do it and refused. The allegations referred to drugs being used for the purposes of rape and I was now being asked to take a drug to help relive it and put up with another full trial. I couldn’t do it and refused.

  Quote Message: Two days later I was sectioned under the mental health act for risks to my own life, whilst the men despite all the evidence were set free. Two days later I was sectioned under the mental health act for risks to my own life, whilst the men despite all the evidence were set free.

  Quote Message: Why couldn’t that jury have seen my evidence like they saw my original video evidence? They record everything anyway. If this had been allowed I might’ve got justice for what happened to me. They walked free. Why couldn’t that jury have seen my evidence like they saw my original video evidence? They record everything anyway. If this had been allowed I might’ve got justice for what happened to me. They walked free.

  Quote Message: The impact of the crimes and failed court process to the victim and close family is intolerable.” The impact of the crimes and failed court process to the victim and close family is intolerable.”
