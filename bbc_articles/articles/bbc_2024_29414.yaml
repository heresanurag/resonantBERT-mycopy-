title: 'Antrim: Two arrested on suspicion of attempted murder - BBC News'
date: '2024-11-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cly28vm8y5po
content: |-
  A pensioner is in hospital in a critical condition being treated for serious head injuries, police say.

  Two arrested on suspicion of attempted murder

  It was reported after 19:30 GMT on Saturday

  A man and a woman have been arrested on suspicion of attempted murder after a 74-year-old man was seriously injured in County Antrim, police have said. The pensioner was approached by the pair on Station Road in Antrim town shortly after 19:30 GMT on Saturday. The pensioner was punched in the head by the man which knocked him unconscious. He was taken to hospital to be treated for serious head injuries and he remains in critical condition.

  The pensioner was approached by the pair on Station Road in Antrim town

  A 21-year-old man and a 25-year-old woman were arrested on suspicion of attempted murder and remain in custody. The Police Service of Northern Ireland (PSNI) is appealing to anyone with information or dash-cam footage to come forward.

  SDLP Antrim councillor Roisin Lynch says the attack has "rightly shocked people". "This is a terrible thing to happen to anyone, but to attack a man of 74 years of age in the street and leave him in critical condition in hospital is particularly abhorrent," she said. "My best wishes go out to the man impacted and I hope he makes a quick and full recovery, though this will no doubt have been a traumatising experience. "People need to feel safe when walking our streets and there is much concern in the local community following this incident."
