  Mulhern, who also hosts spin-off show Britain's Got More Talent, said: "The National Lottery is an iconic institution and I'm hugely excited to be part of its return to primetime Saturday night TV.

  "I feel privileged to be bringing those lucky numbers to the nation but also being able to show players how the money they've helped raise has made a difference to communities across the UK."

  Camelot said they wanted to make the National Lottery "more relevant and visible". The show will have "different formats throughout the course of the year", a spokeswoman said.

  The results will still be read out on BBC One four nights a week. The live results show had been on BBC One from the first draw in 1994 until last year.

  Stephen Mulhern, right, also appears on Ant and Dec's Saturday Night Takeaway

  Mulhern also appears on Ant and Dec's Saturday Night Takeaway and has just returned from the show's finale in Florida.

  Declan Donnelly hosted the episode alone, following Ant McPartlin's drink-driving charge.

  Mulhern, speaking on ITV's Lorraine on Friday morning, said: "I think Dec did incredible on his own.

  "It was just feel-good. Everyone had a great time - perfect end to a great series."

