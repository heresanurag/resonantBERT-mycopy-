title: National Lottery results move to ITV, fronted by Stephen Mulhern - BBC News
date: '2018-04-13'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-43750448
content: |-
  Stephen Mulhern will present the first new show in the ad break of Britain's Got Talent on Saturday.

  The National Lottery results are to be broadcast on ITV for the first time after more than two decades on the BBC.

  The new-look results will be aired as a 90-second segment fronted by TV host Stephen Mulhern during the ad break of Britain's Got Talent on Saturday.

  It's a return to primetime TV for the Lottery results, which switched from BBC One to the BBC iPlayer in 2017.

  Lottery operator Camelot said a range of "well-known ITV personalities" would join Mulhern in future editions.

  The draw itself won't be broadcast on ITV, but will be available on the National Lottery's YouTube channel.

  This week, members of the public will be seen reading out the Lotto results in the first ad break of Britain's Got Talent at 20:15 BST.

