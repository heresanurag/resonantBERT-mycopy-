title: Biden 'surprised' about classified files discovery at former office - BBC News
date: '2023-01-10'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-64218179
content: |-
  The papers, discovered at a think tank office he used, reportedly contain briefings on foreign countries.

