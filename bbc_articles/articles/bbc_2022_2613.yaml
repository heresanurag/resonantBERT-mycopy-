  Nick Beake reports from Kyiv after President Putin announces a 'military operation' in Ukraine's eastern Donbas region.

  The BBC's Nick Beake reports on the ground from the Ukrainian Kyiv capital after Russian President Putin announced a "military operation" in Ukraine's eastern Donbas region.
