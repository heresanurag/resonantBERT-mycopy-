title: 'Ralf Rangnick: Manchester United set to appoint German on six-month contract
  - BBC Sport'
date: '2021-11-25'
section: General
url: http://www.bbc.co.uk/sport/football/59421961
content: |-
  Last updated on .From the section Man Utd

  Rangnick led Schalke to the semi-finals of the Champions League Manchester United are close to appointing Ralf Rangnick as interim manager on a six-month contract. The 63-year-old German is poised to join United but will not be in charge this weekend against Chelsea while he waits for his work permit. United have agreed terms with Rangnick, but not with Lokomotiv Moscow, where he is the head of sports and development. It comes after United sacked Ole Gunnar Solskjaer on Sunday following a trophyless three-year spell as boss. Rangnick won the German Cup with Schalke in 2011 and took RB Leipzig to the final in 2019. During the 2010-11 season he guided Schalke to the semi-finals of the Champions League, where they lost 6-1 on aggregate to United, who were then beaten by Barcelona in the final. United are eighth in the Premier League and Solskjaer, who scored the winning goal in the 1999 Champions League final for the club, was dismissed following an embarrassing 4-1 loss at Watford on Saturday. Michael Carrick, Solskjaer's assistant, was placed in temporary charge, with United saying he would be in place while they looked to appoint an interim manager to the end of the season. Carrick took charge of United on Tuesday for the 2-0 win at Villarreal, a result that ensured they would finish top of their Champions League group. Rangnick has built an impressive coaching reputation during his time in Germany, chiefly through spells at Stuttgart, Hannover, Hoffenheim, Schalke and RB Leipzig. He was subsequently in charge of the Red Bull group of clubs and his current club Lokomotiv have a Europa League game against Lazio on Thursday evening and United are mindful of not disturbing their preparation. Rangnick impressed during an initial conversation with United officials earlier this week. However, he has held further discussions about his role beyond the end of the season. Senior United figures believe Rangnick's expertise will be invaluable from a technical and structural perspective. The move backs up the Old Trafford outfit's view that bringing in an interim manager to the end of the season will provide them with space to assess the managerial situation properly. Mauricio Pochettino is known to be interested in the United job but the Premier League club are wary of getting into protracted discussions with PSG that could drag on for longer than they want. It is understood Carrick will remain in charge for Sunday's game against Chelsea at Stamford Bridge. Former German keeper Lutz Pfannenstiel briefly worked with Rangnick at Hoffenheim and believes his arrival at Old Trafford will be beneficial for United. "Ralf Rangnick is a big expert, really one of the best coaches or managers Germany produced in the last 15-20 years, I would say," said Pfannenstiel, who is the sporting director at St. Louis City SC. "Everything he did so far was successful and he always was very clear that if he gets the opportunity to work for a big club in England, he wants to do that. "So looking at this interim head coach, I think he is the one who really can get everything stabilised to really get Manchester United back on track. I think he probably was the best man on the market. "We like to call him in Germany, the football professor, everything he does is very well thought-out, the way he puts structures in place at every club is something amazing."
