title: 'London shooting: Three teenagers injured in Orpington - BBC News'
date: '2024-08-08'
section: London
url: http://www.bbc.co.uk/news/articles/cgm7g0784keo
content: |-
  An 18-year-old and two 14-year-old boys are taken to hospital with non life-threatening injuries.

  Officers were called to reports that a man had been shot in Otlinge Road, Orpington

  Three teenagers have been shot in south-east London, police have confirmed. Officers were called at about 22:00 BST on Wednesday to reports that a man had been shot in Otlinge Road, Orpington. They attended along with the London Ambulance Service who treated an 18-year-old man before taking him to hospital. Two further victims, both boys aged 14, were then found with gunshot wounds as police conducted a search of the area. The Met said the three teenagers' injuries are non-life changing and non-life threatening, and no arrests had been made.

  Police said they had established the shooting had taken place nearby, in Yalding Grove. A crime scene remained in place in the area on Thursday morning with inquiries ongoing. Det Insp Raymond Sekalongo, from the specialist crime Trident investigation team, said: "Tackling violent crime in London remains our absolute focus and reducing shootings is key to that. "We understand that this incident will cause concern within the community. "We want to reassure you that we are carrying out fast-time inquiries to ensure that any suspect is apprehended. "I know that this may cause fear within the community, which is why I will ensure that officers are present within the area to listen to any of your concerns. "Please do approach them if you need to, they are there to support you."
