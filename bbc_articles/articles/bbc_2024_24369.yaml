  Kaky, who now lives in Swansea in Wales, was found guilty of two charges - forced marriage and conspiracy to commit FGM. The CPS said his plans were uncovered by a witness who arranged for the victim to travel back to the UK, and reported Kaky to the police. Prosecutors presented evidence that showed Kaky had booked and paid for the trip to Iraq while living in Nottingham. The CPS said messages retrieved from his phone showed Kaky intended for the victim to be subjected to FGM and forced into marriage.

  FGM has been a criminal offence in England and Wales since 1985. The CPS said this was the third FGM conviction in England and Wales, but the first time a person had been convicted of conspiracy to commit FGM. Jaswant Narwal, CPS national lead for "honour"-based abuse, female genital mutilation and forced marriage, said FGM was "a form of violence against women and girls". "There are many complexities involved in prosecuting this type of offending, which can be committed in close-knit communities, historically, and abroad, but this is no barrier to the CPS prosecuting wherever our legal test is met," she said. "We are clear there is no place for this unacceptable practice in society. "We will continue to work tirelessly with our partners to safeguard and support victims of FGM and bring perpetrators to justice."

