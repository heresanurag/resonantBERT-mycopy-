title: 'Emad Kaky: Man convicted in ''landmark'' FGM conspiracy case - BBC News'
date: '2024-09-09'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/cn8ldjgdle3o
content: |-
  Emad Kaky is guilty of conspiring to commit female genital mutilation (FGM) - a first in England and Wales.

  Emad Kaky is due to be sentenced on 3 October

  A former PhD student has been found guilty of conspiring to commit female genital mutilation (FGM) in what has been described as a "landmark case". Emad Kaky arranged for a young girl to travel from the UK to Iraq, where she would have been subjected to FGM and also forced into marriage. The Crown Prosecution Service (CPS) said the FGM conviction was the first of its kind in England and Wales. Kaky, who lived in Nottingham at the time of the offences, was found guilty at Nottingham Crown Court on Monday.

  Kaky was convicted of two offences at Nottingham Crown Court

  The 47-year-old will be sentenced at the same court on 3 October. Janine McKinney, chief crown prosecutor for CPS East Midlands, said: "Female genital mutilation is a horrific crime to subject anyone to – let alone a child. "There was clear evidence that Emad Kaky had intended for this young girl to suffer incredible harm and to be forced into an illegal marriage she would have had no ability to resist at such a young age. "This landmark case sends a strong message to offenders of this sickening crime. Just because an offence has been committed somewhere else in the world, does not stop you facing prosecution. "We will explore every avenue in our pursuit to get justice for victims, wherever our legal test is met."

