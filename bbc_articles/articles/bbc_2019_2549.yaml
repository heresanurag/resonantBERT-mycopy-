title: Car plunges into canal in Leicester during police chase - BBC News
date: '2019-03-03'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-47426997
content: |-
  Officers tried to stop the vehicle in Leicester on Friday night when it hit a fence and entered the water.

  The car was carrying four people when it entered the water

  A car carrying four people plunged into a canal following a police chase.

  Officers tried to stop a BMW in Vaughan Way, Leicester, on Friday evening but it later smashed through a fence and entered the Grand Union Canal.

  Four people were taken to hospital, where one currently remains. Her injuries are not thought to be serious.

  Three men, aged 28, 24 and 23, and a 23-year-old woman have been arrested on suspicion of failing to stop and theft of a motor vehicle.

  Leicestershire Police said initial enquiries suggest the car had been stolen from the Metropolitan Police force area.

  Four people have been arrested on suspicion of failing to stop and theft of a motor vehicle

  The car was recovered late on Friday

