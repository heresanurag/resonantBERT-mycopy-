title: At least 38 killed by Israeli strikes in Gaza in half-hour period, medics say
  - BBC News
date: '2025-05-20'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cwy67y8834yo
content: |-
  Fighter jets hit sites including a school in Gaza City, the Hamas-run civil defence agency says.

  At least 38 killed by Israeli strikes in Gaza in half-hour period, medics say

  Israel has intensified its offensive on Gaza in recent days

  At least 38 Palestinians were killed in a series of Israeli air strikes across the Gaza Strip during a half-hour period overnight, according to Palestinian medics. Israeli warplanes struck several locations, including a school in eastern Gaza City, and an abandoned fuel station sheltering displaced families in central Gaza's Nuseirat refugee camp, according to the Hamas-run civil defence agency. It added that rescue teams were facing major difficulties reaching the wounded due to a lack of equipment and the intensity of the bombardment. The attack comes after Israel issued a sweeping evacuation order for civilians in Gaza in preparation for what it said was an "unprecedented attack".

  Ten people were killed when an Israeli air strike hit classrooms at the Musa bin Nusayr School, where hundreds of displaced people were sheltering, according to local activists in Gaza City. In central Gaza, 15 people were reported killed in a strike targeting tents at an abandoned fuel station in Nuseirat. Meanwhile, local journalists said 13 Palestinians were killed in an air strike on the Abu Samra family's three-story home in central Deir al-Balah. Separately, Israeli jets launched 10 air strikes on the Shujaiya neighbourhood in eastern Gaza City. Local reports described the blasts as causing tremors similar to an earthquake. The strikes are believed to have targeted Hamas's network of underground tunnels. The attack comes as the leaders of the UK, France and Canada issued a joint statement threatening action if Israel Prime Minister Benjamin Netanyahu persisted with his goal to "take control" of all of Gaza.
  • None Jeremy Bowen: Goodwill running out as UK, France and Canada demand Israel end Gaza offensive

  Netanyahu described the statement as a "huge prize" for Hamas. Earlier, Israel said it would allow a "basic amount" of food into Gaza, ending an 11-week blockade of the territory. But United Nations aid chief Tom Fletcher said the amount of aid was a "drop in the ocean of what is urgently needed". The war was triggered by the Hamas-led attacks on southern Israel on 7 October 2023, which saw about 1,200 people killed and 251 taken hostage. Some 58 hostages remain in Gaza, up to 23 of whom are believed to be alive. At least 53,486 Palestinians have been killed during Israel's military campaign in Gaza, according the Hamas-run health ministry.
