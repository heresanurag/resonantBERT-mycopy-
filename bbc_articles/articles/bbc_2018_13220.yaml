title: 'Man vs Fat: The football league fighting obesity - BBC News'
date: '2018-11-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-46319067
content: |-
  The team is only open to players who want to lose weight and get fitter.

  Football players are fighting obesity in a new league: Man vs Fat.

  The league is decided not just on points won, but also pounds lost - so the biggest loser is the winner.
