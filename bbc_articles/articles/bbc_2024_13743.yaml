  Mbappe verbally agreed to join Real in February and announced in May he would leave the French champions at the end of the season. He leaves the French capital as PSG's record goalscorer, with 256 goals since he joined from Monaco on an initial loan in 2017. The forward scored 44 goals in 48 matches last term and has been the leading scorer in the French top flight for the past six years. At club level, he has won seven Ligue 1 titles - the first of those with Monaco, the remaining six with PSG - and has collected four winners medals in the French Cup. The Frenchman won the Golden Boot at the 2022 World Cup in Qatar, where France lost to Argentina on penalties in a dramatic final. However, he is yet to triumph in the Champions League, having been a beaten finalist in 2019-20 - something he will hope to rectify with a club that has made a habit of winning Europe's elite club competition.
