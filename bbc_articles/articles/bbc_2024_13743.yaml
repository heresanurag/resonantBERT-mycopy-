content: |-
  France forward Kylian Mbappe says it is a "dream come true" as his long-awaited move to Real Madrid is confirmed on Monday evening.

  France forward Kylian Mbappe says it is a "dream come true" as his long-awaited move to Real Madrid was confirmed, external on Monday evening. Mbappe, 25, will move to the Bernabeu Stadium on a five-year deal when his Paris St-Germain contract expires on 30 June. He will earn 15m euros (£12.8m) a season, plus a 150m euro (£128m) signing-on bonus to be paid over five years, and he will keep a percentage of his image rights. "Nobody can understand how excited I am right now!" Mbappe posted on Instagram. "A dream come true. So happy and proud to join the club of my dreams." He will join a Madrid side fresh from winning La Liga as they captured a record-extending 15th European crown with victory over Borussia Dortmund in the Champions League final. Mbappe's arrival in the Spanish capital is likely to prompt suggestions of a new Galacticos era at the club given the exciting prospect of him lining up alongside Brazil forwards Vinicius Jr, Rodrygo and fellow new signing Endrick, and England midfielder Jude Bellingham.

