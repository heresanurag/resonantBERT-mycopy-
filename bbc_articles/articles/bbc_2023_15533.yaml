id: bbc_2023_15533
title: 'Watch: Backpackers flee fireball in Sydney hostel - BBC News'
date: '2023-10-04'
section: General
url: http://www.bbc.co.uk/news/world-australia-67003966
content: |-
  CCTV footage shows the moment an e-bike battery explodes, sparking a fire in the suburb of Darlington.

  Two backpackers had a narrow escape when a Lithium-ion battery exploded at a Sydney hostel.

  The fire is thought to have been caused by a faulty e-bike battery which was charging, the New South Wales fire department said.

  It deployed six fire engines and 22 firefighters to the scene.

  One of the backpackers required treatment for minor burns to his leg.
