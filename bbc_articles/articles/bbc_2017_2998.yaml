id: bbc_2017_2998
title: Argentine player chases and fights steward after cup defeat - BBC Sport
date: '2017-02-16'
section: General
url: http://www.bbc.co.uk/sport/football/38993684
content: |-
  A steward appears to spit at a player before being chased and then tackled by his team-mates after an Argentina Cup match between Central Norte and Talleres de Perico.
