  -6 Homa (US), Scheffler (US), DeChambeau (US); -4 Hojgaard (Den); -3 Davis (Aus), Morikawa (US); -2 Aberg (Swe)

  Tiger Woods insisted he can still tie Jack Nicklaus' record of six Masters wins after making a record 24th consecutive cut at Augusta National. The 15-time major champion is seven shots off the lead at the halfway stage after a level-par 72 left him one over. The 48-year-old's fellow Americans Scottie Scheffler, Max Homa and Bryson DeChambeau lead on six under par. "It means I have a chance to win the golf tournament. Anyone who makes the weekend has a chance," said Woods. Woods came from six shots back at the halfway stage to win his fourth Green Jacket in 2005 but that was before he suffered a catalogue of injures that mean his body "aches every day" - although the then 43-year-old shocked many by winning a fifth title in 2019. He has undergone more operations since then, chiefly to repair leg and ankle injuries suffered in a 2021 car crash that left Woods questioning whether he would play professional golf again.

  And that aching body was evident on Friday when he had to play 23 holes - five to complete his first round after storms shortened Thursday's opening day, then 18 in the second round. But he battled blustery conditions to keep himself in the hunt for a 16th major and was afforded a standing ovation by the spectators gathered around the 18th green when he finished. He then smiled as he said he would be contacting Fred Couples to "give him a bit of needle" about moving clear of the 1992 Masters winner and three-time champion Gary Player, who both made 23 consecutive Masters cuts. Woods is joint 22nd and will know history is against him, with just one one of the past 28 Masters champions being outside the top 10 at this stage - South Africa's Charl Schwartzel, who was also six back when he went on to win in 2011. At the start of the week, Woods said he was capable of winning "if everything comes together" and so far he has put together two solid rounds of golf. He now needs something spectacular if he is it match Nicklaus. Rory McIlroy and defending champion Jon Rahm are also in need of spectacular weekends but they are also refusing to admit defeat - despite falling 10 and 11 shots respectively off the lead - and talked up their chances of pulling off highly unlikely comeback wins. World number two McIlroy, who carded a five-over 77 to slump to four over, pointed out: "I won from 10 back in Dubai at the start of the year. But obviously the Dubai Desert Classic and the Masters are two very different golf tournaments. "We'll see. Hopefully the conditions are a little better. I still think I can go out and shoot a low one, get back into red numbers, and have half a chance going into Sunday."

