  Meanwhile, Spaniard Rahm needed birdies on the 15th and 16th holes to help him extend his run of making 18 consecutive cuts in majors - the longest by an active player. His 76 left him on five over, one shot inside the cut mark. He accepted he would need "a very, very low weekend" to stand any chance. However, he added: "I have made the cut and have two rounds to make up 12 shots. I feel it has been done before - if the conditions aren't too easy [on Saturday], maybe I can make a push for the win. "[I have to] get as close to par as possible and see how the leaders react. It all depends on them. But it is going to take a lot from me." Those leaders are world number one and 2022 Masters champion Scheffler and major winner DeChambeau plus the contrasting figure of Homa. Homa is in relatively unfamiliar territory whereas DeChambeau claimed the 2020 US Open and Scheffler came into this week as the hottest favourite since Woods in 2013. Scheffler looked sublime on Thursday, carding a bogey-free 66 to sit one behind overnight leader DeChambeau. Both players showed champion qualities on Friday as the wind gusted up to 45mph at points. After his level-par 72, Scheffler said: "I like where I am on the leaderboard. I feel like my game is in a good spot. "I think the wind is going to be up [on Saturday] but not nearly as much [as Friday]. I'm sure we'll see a few more birdies but I'll just stay in my own little world and try and execute."
