title: Baby and man in hospital after car flips and crashes in Edinburgh - BBC News
date: '2023-09-23'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-66900521
content: |-
  Police and firefighters were called to the crash which happened in Edinburgh on Friday afternoon.

  A man and baby have been taken to hospital after a car crashed and flipped onto its side in Edinburgh.

  Police said the man was walking with a pram when the crash happened on West Maitland Street near the junction with Coates Place at about 17:00 on Friday.

  The 35-year-old was taken to the Royal Infirmary while the baby was taken to the Royal Hospital for Children and Young People to be checked over.

  The BBC understands they were not seriously injured.

  The driver of the car was taken to hospital as a precaution.

  Roads in the area were closed and re-opened at about 18:20.

  The Scottish Fire and Rescue Service were also called to the scene to make the vehicle safe.

  Trams and buses were disrupted while police made inquiries and full tram service resumed at about 18:45.
