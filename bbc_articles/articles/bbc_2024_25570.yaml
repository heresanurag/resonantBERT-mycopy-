title: Cumbria, Devon and Cornwall warnings as Storm Ashley hits - BBC News
date: '2024-10-19'
section: England
url: http://www.bbc.co.uk/news/articles/c20m3vp654eo
content: |-
  Warnings in Cumbria, Devon and Cornwall are issued for winds gusting up to 60mph (97km/h) and rain.

  Strong winds, combined with high tides, could lead to dangerous conditions in Cumbria

  Power cuts, large waves and travel disruption are expected on Sunday as parts of north-west and south-west England are hit by Storm Ashley. The Met Office has issued a yellow weather warning for Sunday, external for high winds gusting up to 70mph (113km/h) on coasts and hills in Cumbria, which began at 03:00 BST and will last until about midnight. A yellow rain warning was also in place across Devon and Cornwall until midday, with strong winds and heavy rain and Dartmoor among the worst affected areas. Meteorologists said Storm Ashley, the first named storm of the season, would see a rapid drop of pressure as it moves in from the Atlantic - a phenomenon called a "weather bomb".

  High tides, strong winds and large waves are expected to cause flooding on the Cumbrian coastline in the afternoon, the Environment Agency has warned, external. Flood gates have been closed Flimby and Maryport, with areas most at risk including Allonby, Maryport, Flimby, Workington, Parton and Whitehaven.

  The strong winds, combined with high tides, could lead to dangerous conditions, including possible delays or cancellations to travel, the Met Office said. It warned of possible power cuts, minor damage to buildings and large coastal waves in Cumbria, bringing debris onto coastal roads and properties. The warning is for wind gusts of 50-60mph (80-97km/h) inland and 60-70mph (97-113km/h) on coasts and hills.

  In the south west, the Met Office said bus and train services would likely be impacted, while disruption on the roads could increase journey times. Interruption to power supplies and other services was also likely. People have been advised people to check road conditions and amend travel plans if necessary, while also preparing for power cuts, with torches and batteries on standby.

  Electricity North West said it would "monitor the network and ensure supplies and teams are available to respond if the storm causes damage to overhead lines". Richard Moulton, incident manager for Electricity North West, said: "The forecast is for extremely strong winds across Cumbria and surrounding areas." "Our local teams are on standby and ready to respond quickly to support our customers," he added. Meanwhile, rail operator Northern urged customers to check their journey before travelling, external in the North West on Sunday. It said crew shortages and Storm Ashley would affect travel.
