title: Double rainbow appears during clap for carers tribute - BBC News
date: '2020-05-01'
section: England
url: http://www.bbc.co.uk/news/uk-england-52500154
content: |-
  As people stepped out to show their thanks for key workers, rainbows appeared in the sky across England.

  The rainbow has become a symbol of thanks to the NHS during the coronavirus pandemic

  A double rainbow appeared across the sky as people applauded NHS and key workers on their doorsteps.

  BBC Weather Watchers across England captured the phenomenon which appeared in several parts of the country on Thursday evening.

  It happened as residents took part in "Clap for Carers" - a weekly tribute to those working on the front line during the coronavirus pandemic.

  The rainbow has become a symbol of thanks to key workers, with many displaying homemade pictures of them in their windows.

  Some areas of the country were treated to the double arches, while others spotted vivid streaks of colour. Here is a selection.

  This double rainbow could be seen in Thetford, Norfolk

  These beautiful arches appeared over the sea in Teignmouth, Devon

  The double rainbow appeared after a rainy end to the month, which had been sunny for the majority of lockdown

  The rainbow was spotted by lots of people in London where it seemed to end on the Shard

  BBC Weather Watcher Happy Snapper captured this rainbow appearing from a storm cloud over Whittlesey, in Cambridgeshire moments before the weekly clap for carers

  The colours were particularly vibrant in Holmrook, Cumbria

  This rainbow appeared above a building in Wickford, in Essex, where the word "hope" can be seen in the window
