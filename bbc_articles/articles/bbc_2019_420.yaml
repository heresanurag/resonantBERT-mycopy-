id: bbc_2019_420
title: French Alps skiers rescued in dramatic helicopter manoeuvre - BBC News
date: '2019-01-10'
section: General
url: http://www.bbc.co.uk/news/world-europe-46817131
content: |-
  The pilot lowered the tilted helicopter until its nose was almost touching the snow.

  Footage has emerged of the heart-stopping helicopter rescue of a group of skiers from the Pass of Anterne in the French Alps.

  One of the skiers was struggling with a knee injury, and was able to call for help using a mobile phone.

  The pilot said the rescuers chose to perform the manoeuvre, known as "pressing on the skids", because of the weather conditions during the incident, which took place on 2 January.
