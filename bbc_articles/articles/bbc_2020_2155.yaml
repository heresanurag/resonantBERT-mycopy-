  BBC Ireland Correspondent Chris Page assesses the prospects for Saturday's election.

  BBC News Ireland correspondent Chris Page looks at the runners and riders in the Republic of Ireland election 2020.

  People will vote on Saturday 8 February - the first time the country has held a general election at a weekend.

