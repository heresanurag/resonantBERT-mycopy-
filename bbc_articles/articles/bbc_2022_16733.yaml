content: |-
  As nurses take part in the largest strike in NHS history, use our tool to see if your area is affected.

  Nurses are striking in around a quarter of NHS services across England.

  Staff will continue to provide "life-preserving" and some urgent care but routine surgery and other planned treatment is likely to be disrupted.

