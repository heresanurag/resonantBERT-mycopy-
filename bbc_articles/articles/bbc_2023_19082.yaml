id: bbc_2023_19082
title: Treforest and Coedely social media plea after crash and fire - BBC News
date: '2023-12-15'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67719479
content: |-
  Some images posted from scenes of a car crash and fire were described as "horrendous" by an MP.

  A major incident was declared as emergency services tackled the blaze at Treforest Industrial Estate

  An MP is calling for sharing of distressing incidents on social media to be banned following a "difficult week" in her area.

  A body has been found after an explosion and fire at Treforest Industrial Estate, Rhondda Cynon Taf.

  It comes after three teenagers died in a car and bus crash in Coedely.

  Alex Davies-Jones, MP for Pontypridd, said not all "horrendous" content had been promptly removed by social media platforms.

  She described social media posts "with really, really graphic footage" of scenes and victims being shared.

  Ms Davies-Jones added: "Everyone is already grieving and distressed, and this is inflaming tensions in the community."

  She said she had raised her concerns with the police.

  Speaking in the House of Commons on Thursday, she urged UK ministers "to close the gaps" in online safety.

  The UK government said social media companies must take their responsibilities seriously.

  Pontypridd MP Alex Davies-Jones says it's been a "difficult week" for her constituency

  A major incident was declared for several hours on Wednesday as firefighters worked to tackle the two-storey building blaze in Treforest.

  One crew remains at the scene on Friday as the fire service works on three hotspots.

  Police have appealed for anyone with CCTV, doorbell or dashcam footage to contact them.

  Meanwhile, tributes have poured in throughout the week for crash victims Callum Griffiths, 19, and Jesse Owen and Morgan Smith, both 18, and two others are in hospital with life-threatening injuries.

  Ms Davies-Jones said: "This awful news has hit our close-knit community very hard and all our thoughts are with [their] loved ones at this very difficult time, as well as all those still recovering."

  She added: "Sadly, in the wake of these accidents, distressing footage from both scenes and malicious, cruel posts about the victims have been uploaded to social media."

  The MP requested a meeting with UK ministers to discuss a "way forward" to "close the gaps" in online safety.

  Commons Leader Penny Mordaunt MP replied: "I am sure that I speak for all of us when I say how sorry we are and how much our thoughts are with all those who have been affected by these appalling tragedies in the honourable lady's constituency.

  "It is terrible when one terrible thing happens, and I know it rocks a whole community, but to have two such terrible events take place together is truly shocking."

  Tributes have been paid to Morgan Smith, Jesse Owen, and Callum Griffiths

  Ms Mordaunt said she would be "very happy to meet... to discuss what more can be done".

  "I take a personal interest in ensuring that social media companies take their responsibilities very seriously," she said.

  A Snapchat spokesperson said: "These incidents are tragic and our hearts go out to the families and friends of those impacted by these events.

  "There is no place for harmful content on Snapchat. If we find this content we remove it straight away and we encourage anyone who sees it to report it to us immediately using our in-app tools so we can take action."

  Facebook has also been approached for comment.
