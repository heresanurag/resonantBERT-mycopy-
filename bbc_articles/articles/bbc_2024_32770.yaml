title: Man jailed for life for 'ferocious' Peterhead knife murder - BBC News
date: '2024-12-09'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/c4gml297gxjo
content: |-
  Andrew Ross was stabbed multiple times after being pursued by two brothers in Peterhead last year.

  A man who stabbed another man to death in a "ferocious" attack in an Aberdeenshire town has been jailed for a minimum of 17 years. Luke Allan, 29, and his brother Ethan Carlyle, 23, had denied pursuing and repeatedly striking Andrew Ross, 52, after he tried to carry out a robbery in Peterhead's Ives Road in February last year. After a seven-day trial, a jury found Allan guilty of murder and convicted Carlyle of a reduced charge of assault. Allan was jailed for life at the High Court in Aberdeen and was told he would have to serve at least 17 years before he can apply for parole. Carlyle was sentenced to 300 hours of community service and one year's supervision.

  Judge Buchanan said it had been a "ferocious and sustained" attack. Relatives of Mr Ross described him as a loving father and said his murder had "devastated" the family.

  The court heard that Allan had a significant criminal record, while co-accused Carlyle was a first offender. Allan's defence counsel Brian McConnachie KC said the incident had begun when Mr Ross went to Allan and Carlyle's home with the intention of carrying out a robbery. The two brothers chased Mr Ross from the house before carrying out the fatal attack. Mr McConnachie said Allan had found it difficult to come to terms with the fact he was responsible for taking another person's life and had been convicted of murder. He said his client - who has a son - would try to reset his life while in custody. The court heard Carlyle was "distraught" at what had happened. Neil Beardmore, defending, said that his client's error had been getting involved in a fight to try to help his brother.

  Judge Buchanan said he was satisfied there was an alternative to custody for Carlyle, who had been convicted of striking Mr Ross once on the leg with a knife as he tried to escape. The judge told Allan that CCTV showed he pursued the deceased and subjected him to a "savage" attack with a knife. Judge Buchanan said it had been a "grossly disproportionate" response. The two men had gone on trial in October. Advocate depute Lindsey Dalziel, prosecuting, told the court that police had found Mr Ross lying on the road, unresponsive and "bleeding heavily", after the attack. Det Con Kim Duncan, of Police Scotland, said CCTV footage appeared to show Mr Ross being struck several times by men who both looked to have objects in their right hands. She said Allan could be seen using a "punching or stabbing motion".

  The attack happened in Peterhead last year

  Det Con Duncan said Carlyle also began to strike towards where Mr Ross was lying. The court heard CPR was attempted, but that it was unsuccessful. The jury's deliberations lasted more than five hours over two days. The victim's mother, Cathy, said in a statement: "Andrew’s murder has devastated the whole family and everyone who knew him, especially his daughters who have lost a loving father. "He always had a smile for everybody and was soft-hearted. We’ll never come to terms with what happened but are glad justice has been done and those responsible will face the consequences." Det Insp James Callander, of Police Scotland, previously said: "Throughout the investigation and court process Allan and Carlyle have shown little remorse for their crimes. "I hope these convictions give Mr Ross’ family some form of comfort as they continue to grieve their loss."
