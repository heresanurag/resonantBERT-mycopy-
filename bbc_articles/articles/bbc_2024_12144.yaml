title: Crossmaglen murder victim named as Michael McConville - BBC News
date: '2024-06-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cw00l9dn2dko
content: |-
  The 74-year-old was found with serious head injuries in the bathroom of a house on Saturday.

  A man whose death is being treated as murder in County Armagh at the weekend has been named as Michael McConville. Police said the 74-year-old was found with serious head injuries in the bathroom of a house in Annaghmare Road, Crossmaglen, on Saturday evening. Detectives have been granted a 36-hour extension for the detention of a 67-year-old man arrested on suspicion of murder. Det Ch Insp Anthony Kelly said officers reported to the house shortly after 19:00 BST.

  Forensic officers were at the house in Crossmaglen

  “Sadly, the man, whom we can now name as Michael McConville, was pronounced dead at the scene," he continued. “He was located in a bathroom with serious head injuries – believed to have been caused by a weapon.”
