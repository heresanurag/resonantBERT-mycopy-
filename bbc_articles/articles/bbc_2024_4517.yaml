title: 'Europa League quarter-finals draw: Liverpool meet Atalanta and West Ham face
  Bayer Leverkusen - BBC Sport'
date: '2024-03-15'
section: General
url: http://www.bbc.co.uk/sport/football/68573345
content: |-
  Liverpool will play Italian club Atalanta in the quarter-finals of the Europa League with West Ham taking on German side Bayer Leverkusen.

  Last updated on .From the section European Football

  The Football News Show: Are Liverpool winners from tough Arsenal & Man City European ties? Liverpool will play Atalanta in the quarter-finals of the Europa League with West Ham set to face Bayer Leverkusen. Italian rivals AC Milan and Roma meet for a place in the semi-finals, while Portuguese club Benfica take on Ligue 1 side Marseille. Meanwhile, Aston Villa have been drawn against Lille in the quarter-finals of the Conference League. The first legs take place on 11 April, with the second legs on 18 April. If Liverpool come through their tie, they will face either Benfica or Marseille in the semi-finals, with West Ham meeting AC Milan or Roma if they find a way past Bundesliga leaders Leverkusen. The semi-finals are scheduled for 2 May and 9 May. Dublin Arena in the Republic of Ireland hosts this season's final on Wednesday, 22 May. Liverpool still have the potential to pick up four trophies in Jurgen Klopp's final season in charge after they beat Czech club Sparta Prague 11-2 on aggregate in the last 16, winning 6-1 in the second leg at Anfield on Thursday. Atalanta and Liverpool have met on two previous occasions, with the Reds winning 5-0 in Italy and losing 2-0 at home during the group stage of the Champions League in 2020-21. The Italian club are sixth in Serie A and are yet to lose in the Europa League this season, winning five and drawing three. Klopp described the draw as "tricky". "We played there [in 2020] - not that I watched them since then 500 times, but it's still the same manager, pretty sure a similar structure, so it means uncomfortable to play against, very well organised," added Klopp. "It is a quarter-final - I didn't expect any easy opponent. I have a lot of respect for what Atalanta is doing in the last years, very consistent." West Ham, who won the Europa Conference League last season, go up against Bayer Leverkusen for the first time. The Hammers saw off German opposition in the last 16, beating Freiburg 5-1 on aggregate, coming back from a 1-0 loss in the first leg with a 5-0 win at London Stadium. They have a record of six wins, six defeats and one draw when facing German teams in Europe. Leverkusen are 10 points clear of second-placed Bayern Munich in the Bundesliga, and have not lost a match in all competitions this season, winning 32 and drawing five. Aston Villa reached the last eight of a major European competition for the first time since 1998 with a 4-0 aggregate win against Dutch giants Ajax in the Conference League. Villa have never previously met Lille but have picked up two wins, two losses and two draws when facing French opposition in European competition. Club Bruges meet PAOK, Olympiacos face Fenerbahce and Viktoria Plzen have been drawn against Fiorentina. If Villa come through their quarter-final tie they take on either Olympiacos or Fenerbahce in the semi-finals. The 2023-24 Europa Conference League final will be staged at the AEK Arena in Athens, Greece, on Wednesday, 29 May. Victories for West Ham and Aston Villa in the Europa League and Conference respectively on Thursday have boosted England's hopes of securing five places in next season's revamped Champions League. The group stage of 2024-25 Champions League will be re-structured to feature 36 clubs rather than 32, opening up two extra places for Europe's best-performing leagues in Uefa competitions. Prior to Thursday's games, Italy and Germany were first and second in Uefa's coefficient table with England third. West Ham beat German club Freiburg to reach the quarter-finals while Villa came through their tie with Ajax. England remain behind Germany but have five clubs remaining across the three European competitions - Champions League, Europa League and Conference League - with three German teams still involved.
