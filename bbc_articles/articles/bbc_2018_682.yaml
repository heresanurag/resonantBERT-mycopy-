title: British man preparing to fight Turkish forces - BBC News
date: '2018-01-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-42841500
content: |-
  A British man tells BBC he’s going to fight against Turkish forces in Syria, despite government warnings.

  A British man from London has told the BBC he’s going to fight against Turkish forces in Syria.

  Jamie Janson had joined up with the Kurds as a volunteer to help defeat so-called Islamic State.

  He’s tells the BBC's Emma Vardy why he believes he should fight, despite UK government warnings. His family say they support him.
