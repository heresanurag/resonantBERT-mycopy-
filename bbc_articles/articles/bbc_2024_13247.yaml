title: Footage shows moment deadly South Korea factory fire breaks out - BBC News
date: '2024-06-26'
section: General
url: http://www.bbc.co.uk/news/videos/cgllkjexkrgo
content: |-
  Twenty-three people died in a lithium battery explosion and fire in a South Korea factory.

  Video footage has been released of the moment lithium batteries exploded in a South Korea factory, leading to a fire which killed 23 people.

  The blaze broke out on Monday morning at the Aricell plant in Hwaseong city, about 45km (28 miles) south of the capital Seoul.
