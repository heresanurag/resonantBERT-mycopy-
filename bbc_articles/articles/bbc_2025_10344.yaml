  The King and Queen were welcomed by leaders of First Nations, Métis and Inuit communities, who have a long relationship with the Crown

  Carney extended an invitation to the King earlier this year and announced the visit shortly after his Liberal party won Canada's general election in April. The visit comes amid a trade war with the country's neighbour and close economic ally, the United States. US President Donald Trump has also repeatedly said the country would be better off as a 51st US state. At the airport, the Queen was given a bouquet of flowers and she and the King were greeted by school groups from the provinces of Ontario and Quebec. Some of the children who attended the arrival are enrolled in the Duke of Edinburgh programme, a global youth development programme launched by the late Prince Phillip - the King's father - in 1956.

  Crowds gathered well before the arrival of the King and Queen at Ottawa's Lansdowne Park

  After the airport greeting, the King and Queen travelled to Lansdowne Park in central Ottawa, where they met well-wishers, local community groups, farmers, and vendors. The King took part in a ceremonial street hockey puck drop.

  It was too warm for ice hockey, but the King helped kick off a street hockey game

  The King and Queen were invited to sample local wares, including maple syrup treats

  The King and Queen later partook in a tree planting ceremony at Rideau Hall, the official residence of Canada's governor general. Commemorative tree planting at Rideau Hall is a tradition that began in 1906, and is meant to symbolise friendship and cooperation between nations. Monday's ceremony marks the fifth tree planted by the King in Canada, and the second with Queen Camilla by his side. They planted a Blue Beech, a small deciduous tree native to eastern North America and known for its bright autumn leaves. Afterwards, the King held privates audiences with Gov Gen Simon and Prime Minister Carney.

  The King celebrated after the ceremonial planting of a a blue beech tree at Rideau Hall.

  The King held a private audience with Gov Gen Simon. She serves as the monarch's representative in Canada, an is the first indigenous person to hold the role

  The King met Prime Minister Carney for their second private audience this year - Carney also met the King in Buckingham Palace in March

  The King and Queen later retired for the day, with no other public events on their agenda. On Tuesday, they will head early in the morning to the Senate of Canada, where the King will deliver the Speech from the Throne.
