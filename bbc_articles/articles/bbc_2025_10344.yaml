title: 'In pictures: King Charles and Queen Camilla welcomed in Ottawa - BBC News'
date: '2025-05-27'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cm23dg2eye0o
content: |-
  Monday was the first of a packed two-day visit meant to highlight Canada's sovereignty and its ties to the Crown.

  King Charles and Queen Camilla welcomed in Ottawa amid US tensions

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: The King plants trees and meets locals on first day of Canada visit

  King Charles III and Queen Camilla have arrived in Canada for a visit meant to underscore Canada's sovereignty in the face of tensions with the US. The two-day visit began on Monday with a whirlwind of pomp and pageantry that included a welcome ceremony for the King and Queen at the airport, a street hockey puck drop and a ceremonial tree planting. It comes ahead of a big day on Tuesday, when the King will deliver the Speech of the Throne - which will lay out the government's priorities and goals - to parliament. A monarch has not delivered the throne speech in Canada since 1977, making this royal visit a rare occasion. "The Royal Visit is a reminder of the bond between Canada and the Crown – one forged over generations, shaped by shared histories, and grounded in common values," said Prime Minister Mark Carney in a statement on Monday. Here is a look at King Charles III and Queen Camilla's time in Ottawa so far.

  An arrival guard from the Royal Canadian Dragoons, a senior armoured regiment of the Canadian Armed Forces, participated in the ceremony

  The King and Queen touched down in Ottawa at around 13:15 local time (18:15 BST). They were welcomed by members of the Royal Canadian Mounted Police and the Canadian Armed Forces. Waiting for them on the runway were Prime Minister Carney, his wife Diana Fox Carney, Canada's Governor General Mary Simon and other dignitaries. They were also met by national indigenous leaders. The King wore a dark red, patterned tie, while the Queen donned a light pink ensemble from a British designer. She wore a diamond maple leaf brooch that was given by King George VI to Queen Elizabeth, the Queen Mother, in 1939 ahead of their first royal tour to Canada. That same brooch was passed down to Queen Elizabeth II, and has been loaned to other royals including Catherine, Princess of Wales.
