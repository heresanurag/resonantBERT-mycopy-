title: 'Euro 2025: Wales fans angry they can''t personalise women''s shirt - BBC News'
date: '2025-06-12'
section: Wales
url: http://www.bbc.co.uk/news/articles/c87jz81n9w3o
content: |-
  Supporters are unable to personalise the mint green jersey, made by longstanding supplier Adidas.

  The FAW says it wants fans to have the opportunity to personalise their shirt

  Football fans have voiced their anger at being unable to have their names and numbers on the new Wales women away shirt. Haley Evans, from Cardiff, said it "screams of the bias that often crops up in the women's game" that fans could not personalise the mint green Adidas shirt, which was released specifically for Euro 2025 in Switzerland. The Football Association of Wales (FAW) unveiled the shirt after the team qualified for the first major tournament in their history. JD Sports said it was waiting for a delivery of the new print colour and would be able to offer the service to customers soon.

  Fans can personalise the home shirt - which is shared by the men's team - but, while the men's away kit can have any name and number on it, this option is not available on the women's version, which is priced at £75. Former Wales striker Helen Ward described the move as a "kick in the teeth" that had an impact on not just fans but also members of the Wales squad. "It does feel like it's something that wouldn't happen ahead of a men's World Cup or a men's Euros, that's for sure," she told BBC Radio Wales Drive. "It's one of these sorts of things that some people might write off as a small oversight, but actually it has quite a big impact... going into a stadium or to a ground and seeing somebody with your name on the back of their shirt, it gives you such a big lift." "There's probably fans that are paying a lot of money out of their own pockets to go and support the team that they've backed all the way to the Euros," Ward added. "It's a moment in history and you want to have your favourite player or even your own name on the back of your shirt. It's really sad that they haven't got that opportunity."

  Ms Evans, 44, said: "I understand it's only to do with away shirts, but it's our first ever major tournament and it shouldn't be an issue and should be doable. "I was at the first game in 2019 where the women played against Italy in their shirts [with their names on their back] for the first time. The players had been fighting for that for a long time. "To come from there to now here, where we have qualified for the Euros and fans can't get their names on their shirt. It's a bit of a joke. We wouldn't be going through this for a men's shirt."

  Haley says it seems to be the same thing popping up for the women's game

  A member of the Wales squad, who wished to remain anonymous, told Telegraph Sport, external: "It's extremely disappointing that, as we prepare for the Euros, as we make history, we still can't get access to names on the back of our shirts." Ian Johnson from Barry, Vale of Glamorgan, said the oversight was "the sort of sloppy mistake that major companies shouldn't still be making". The 46-year-old added: "Walking down any high street, you can see footballers' names on the back of the shirts being worn, so why would they not be set up in advance to do this for the Wales national team? "Hopefully Wales qualifying and playing at the Euros will inspire a new generation of footballers to follow players like Jess Fishlock and Angharad James - and their fans can wear their shirts proudly."

  Ian says it was not so long ago that the team did not have their name on their shirts, so, while he hoped this was just an oversight, it did still sting

  Emma Walters, from Swansea, said it was "sexist", as it would not happen with the men's team. "I tell my daughter she is no different, so why can't we have the same opportunities? What is the reason? What is the reason behind it?" She added that her daughter Freya, who is a goalkeeper for her local team, was also unable to buy a goalie kit for either the men's or women's team, which she felt was "unfair".

  Phillip Buffery, from Caldicot, Monmouthshire, said it was "a kick in the teeth" that fans could not get the shirt personalised. He added his nine-year-old daughter Amelia was also "devastated" that she could not get a goalkeeper kit. "She idolises Laura O'Sullivan and says she wants to be the next goalkeeper for Wales, and captain. To not be able to get the kit for her is really heart-breaking."

  Phillip says personalisation on the Wales away kit "should have been available"

  The FAW said it was "in regular dialogue with Adidas and JD to find a resolution" ahead of the Euros, which kick off on 2 July. Rhian Wilkinson's side start their campaign on 5 July against the Netherlands before facing France four days later and England on 13 July. Kit maker Adidas added: "We are always exploring ways to expand our options and better meet the needs of fans who want to show support for their teams."

  It is not the first time a national women's team have been dragged into a kit row around a major tournament. Mary Earps, the former England goalkeeper criticised Nike for not making replica versions of her goalkeeper shirt. Nike later said "limited quantities" would go on sale, which promptly sold out in a matter of minutes.
