id: bbc_2019_8974
title: The moment a US Coast Guard raided a submarine - BBC News
date: '2019-07-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48965005
content: |-
  A submarine suspected to be carrying drugs is seized by US Coast Guards in the Eastern Pacific Ocean.

  A US Coast Guard crew dramatically boarded a self-propelled semi-submersible vessel suspected to be smuggling drugs.

  The raid was part of a series of drug seizure operations in the Eastern Pacific Ocean which has captured 39,000lb (18,000kg) of cocaine in total.
