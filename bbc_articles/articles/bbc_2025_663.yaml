title: 'Sabrina Carpenter: Espresso singer to perform at Brit Awards - BBC News'
date: '2025-02-11'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c74mg2gwypno
content: |-
  The Please Please Please artist will also receive the global success award to recognise her worldwide sales.

  Sabrina Carpenter will be the first international act to receive the Brits global success prize

  Sabrina Carpenter will perform at this year's Brit Awards, organisers have announced. The Espresso singer has also been named winner of the ceremony's Global Success award recognising "phenomenal" worldwide music sales. It is the first time an international artist has been given the honour after Brits bosses changed the rules to make overseas artists eligible. Previous winners have included One Direction, Ed Sheeran, Adele and Sam Smith. Sabrina is also nominated in the international artist of the year and international song of the year categories.

  Organisers said 2024 had been a "a truly incredible year" for Sabrina "in which she dominated global charts". The singer held the number one position in the UK singles chart for a total of 21 weeks and became the first female artist to hold the three top slots at the same time. In the USA, the three singles - Taste, Please Please Please and Espresso - equalled a record set by The Beatles 60 years ago, according to the Brit Awards' organisers. Other acts set to perform at the ceremony on 1 March include JADE, Myles Smith, Shaboozey and Teddy Swims.

  Sabrina fans reacted with excitement to the news, but some argued that British acts Charli XCX and Dua Lipa would have been more fitting winners. The Brat singer is in the running for five awards on the night including album and artist of the year. Dua is up for four prizes including best pop act, which she won last year. Last year's rising star winners The Last Dinner Party have four nominations and are due to perform on the night after cutting short their tour last year. You can see a full list of nominations here.

