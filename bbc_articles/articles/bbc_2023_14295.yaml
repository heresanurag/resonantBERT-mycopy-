title: 'Morocco: Inside village with 90 people dead after quake - BBC News'
date: '2023-09-11'
section: General
url: http://www.bbc.co.uk/news/world-africa-66769720
content: |-
  The BBC's Nick Beake is on the ground in Tafeghaghte after a powerful earthquake hit Morocco's High Atlas Mountains.

  BBC correspondent Nick Beake is on the ground in the Moroccan village of Tafeghaghte, where's he been told 90 people are confirmed to have died after a huge earthquake struck in the High Atlas Mountains on Friday.

  Search dogs have been sniffing through the rubble and rescuers are listening closely for any signs of life, but hope of finding more survivors is fading.
