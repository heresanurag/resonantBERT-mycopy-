content: |-
  Boris Johnson has been fined for attending a birthday party, thrown for him during a Covid lockdown.

  Boris Johnson has been fined by police for attending a birthday party thrown for him during a Covid lockdown, and has offered a full apology.

  The BBC's Ros Atkins looks at the events leading up to the UK Prime Minister saying he "fell short when it came to observing the rules" laid out by his government.
