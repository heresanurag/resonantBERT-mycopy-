  A federal judge had earlier directed the Trump administration to return control of California's National Guard troops back to the state.

  Appeals court temporarily allows Trump to keep National Guard in LA

  An appeals court has temporarily blocked a federal judge's order that directed the Trump administration to return control of California's National Guard troops back to the state. The appeals court's decision came hours after a federal judge said Trump's deployment of the troops to Los Angeles to quell immigration raids was illegal. Trump said he was sending the troops - who are typically under the governor's authority - to stop LA from "burning down" in protests against his immigration crackdown. California Governor Gavin Newsom and other local officials rejected the move, however, and said it was an unnecessary provocation. The appeals court said it would hold a hearing on Tuesday.

  At an earlier federal court hearing, Judge Charles Breyer said the question presented by California's request was whether Trump followed the law set by Congress on the deployment of a state's National Guard. "He did not," the judge wrote in his decision. "His actions were illegal... He must therefore return control of the California National Guard to the Governor of the State of California forthwith." But the judge stayed the order until Friday afternoon to give the Trump administration time to appeal against it. The administration did so almost immediately after the order was issued.

