content: |-
  England defender John Stones resumes training after spending Wednesday isolated in his hotel room with a sickness bug.

  England defender John Stones has returned to training after recovering from illness.

  He spent Wednesday isolated in his hotel room in an attempt to prevent the sickness bug spreading to his team-mates.

  England start their Euro 2024 campaign against Serbia in Gelsenkirchen, Germany, on Sunday.

  Stones has completed 90 minutes only once in the past two months, although he played 45 minutes of England's final warm-up defeat by Iceland on Friday.

  He has been a key player for England at the past three major tournaments.

  Harry Maguire, Stones' regular central defensive partner, will miss the tournament with a calf injury.

  England face Denmark on 20 June and Slovenia on 25 June in their other Group C games.
