title: Taunton woman is world's longest-serving KFC worker - BBC News
date: '2025-02-02'
section: General
url: http://www.bbc.co.uk/news/videos/c07kv44d4pro
content: |-
  Pauline Richards, 74, known as "Mrs Chicken" has worked at the East Street branch for 47 years.

  A woman from Taunton is the world's longest-serving KFC worker.

  Pauline Richards, 74, began working for the fast-food chain in the East Street branch in 1978.

  Over the past 47 years she has done most of the jobs, starting as a cleaner and working up to manager.

  "I love working here, I like meeting people and it's my favourite food, is chicken," said Ms Richards.

