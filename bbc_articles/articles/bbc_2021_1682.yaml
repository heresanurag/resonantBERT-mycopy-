title: 'Covid-19: Vallance says expect ''baseline'' measures next winter - BBC News'
date: '2021-02-22'
section: General
url: http://www.bbc.co.uk/news/uk-56159549
content: |-
  Working from home could also be expected to continue until next winter, says Sir Patrick Vallance.

  Mask-wearing, hand hygiene and working from home could be expected to continue until next winter, the government's chief scientific adviser has said.

  Sir Patrick Vallance said to expect "baseline" measures, though not the same ones we have now.
