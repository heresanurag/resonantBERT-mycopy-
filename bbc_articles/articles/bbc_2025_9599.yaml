title: Footage released of near misses on South Yorkshire tram lines - BBC News
date: '2025-05-02'
section: General
url: http://www.bbc.co.uk/news/videos/c20x9dzpy19o
content: |-
  The tram CCTV clips of drivers, cyclists and pedestrians were all filmed in South Yorkshire.

  Footage showing drivers, cyclists and pedestrians acting dangerously near oncoming trams has been released.

  South Yorkshire Supertram shared the CCTV video to mark World Day for Safety and Health at Work.

  In a post on social media, the transport body said: "Every clip shows just how quickly things can go wrong when people don't stop, look both ways, or stay aware near crossings and platforms."

