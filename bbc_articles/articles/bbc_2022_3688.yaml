title: 'Ukraine war: Column of Russian tanks ambushed by Ukrainian forces - BBC News'
date: '2022-03-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-60699332
content: |-
  Drone footage appears to show Russian tanks under attack on the outskirts of Kyiv.

  A video has emerged which appears to show a column of Russian tanks being ambushed on the outskirts of Kyiv.

  The drone footage shows a large convoy of tanks under attack by Ukrainian forces in Brovary.
