title: Explaining the farming tax change row - BBC News
date: '2024-11-20'
section: General
url: http://www.bbc.co.uk/news/videos/c05z2g3326go
content: |-
  BBC Verify examines the different claims about how many farms will be affected by the inheritance tax changes for agricultural assets.

  Thousands of farmers have gathered in Westminster in protest against changes to inheritance tax rules announced in the latest budget.

  From April 2026, inherited agricultural assets worth more than £1m, which were previously exempt, will be liable to the tax at 20% - half the usual rate.

  BBC Verify's Ben Chu takes a look at the claims and numbers.
