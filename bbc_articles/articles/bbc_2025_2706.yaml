  Marcus Rashford, pictured with Aston Villa director of football operations Damian Vidagany (l) and president of football operations Monchi

  Unai Emery has continued his outstanding work at Aston Villa by automatically taking them into the Champions League last 16. European competition has left the occasional hangover for Premier League form, but they are still right in contention for the top four. Emery's fierce ambition was clear in his demands for reinforcements, especially after the £65m departure of maverick striker Jhon Duran to Al-Nassr in the Saudi Pro League. Arsenal's advances for England striker Watkins were rebuffed, leaving Villa to back Emery's ambition with key signings as the transfer window closed. Emery's track record of revitalising players will have Villa hoping he can get Marcus Rashford's career back on track following his loan move from Manchester United, while Marco Asensio, a three-time Champions League winner with Real Madrid, will add experience and street wisdom. Axel Disasi, another loan signing from Chelsea, would fulfil the need to strengthen in central defence while Donyell Malan's arrival from Borussia Dortmund will add width and attacking quality. Meanwhile, Tottenham pulled off a late coup in the transfer window with the loan deal for Bayern Munich's talented teenage forward Mathys Tel, with an option for a £50m deal and a six-year contract should the move be made permanent. The 19-year-old will add verve to the Spurs attack, while the deal which saw Lens' 26-year-old defender Kevin Danso stolen away from Wolverhampton Wanderers will bolster a defence which has suffered badly because of long-term injuries to Micky van de Ven and Cristian Romero. But, after missing out on Crystal Palace defender Marc Guehi and seeing Axel Disasi opt for Aston Villa, has manager Ange Postecoglou been backed enough?
