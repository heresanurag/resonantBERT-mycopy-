title: Inkberrow front garden's 50ft Christmas tree set to light up - BBC News
date: '2024-12-07'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/cx2pd2kq5zno
content: |-
  The giant Christmas tree has become a popular festive landmark since being planted in 1978.

  The huge tree was planted by Chris and Avril Rowlands, who bought it from a local garden centre in 1978

  A couple whose huge Christmas tree has become a popular crowdpleaser have praised the public for continued support of charities at an annual lighting ceremony. Avril and Chris Rowlands planted the now 50ft tree in the front garden of their home in Inkberrow, near Worcester, after purchasing it from their local garden centre in 1978. About 200 people are expected to attend a lights switch-on from 18:30 GMT in which the tree will glow with 1,000 lights. Mrs Rowlands said the annual event had raised more than £25,000 for several different charities since its inception.

  Money raised from the event this year would be donated to the Midlands Air Ambulance, Ms Rowlands said. "Last year we raised £800 on the night in cash," she added. "It's all quite a major operation and in January, it's all got to be done in reverse." The tree, which towers well above houses on the street, is decorated each year with help from a cherry-picker device to reach the higher branches.

  The bulbs will be lit up throughout the Christmas period until 6 January, when the decorations will be taken back down and put into storage boxes for next year. "It just takes your breath away," Mr Rowlands said of the tree. She said the switch-on fun would also feature fireworks and refreshments. For some in the village, "It's the start of their Christmas," she added. "People are coming now that say they remember seeing the lights as a child and now they are bringing their child. "It's festive. People really appreciate it."

