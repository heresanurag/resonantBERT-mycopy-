title: 'Cave rescue: Thai boy shown carried on stretcher in latest video - BBC News'
date: '2018-07-11'
section: General
url: http://www.bbc.co.uk/news/world-asia-44797606
content: |-
  The latest footage of the Thai cave rescue shows how the boys were carried out on stretchers.

  Footage has emerged of the operation to rescue 12 Thai boys and their coach trapped in a partially flooded cave.

  The complex, three-day rescue saw four boys emerge on Sunday, four on Monday, and the final four boys plus their coach on Tuesday.
