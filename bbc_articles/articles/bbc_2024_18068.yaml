content: |-
  More than 140 of the animals live in the air-conditioned shed - dubbed "the Ritz".

  Videos of guinea pigs enjoying life in a custom-built luxury shed have become a viral sensation on TikTok - with one video racking up more than 140 million views.

  More than 140 of the animals are housed in the shed - dubbed "the Ritz" - which has air conditioning throughout and room service.

  The videos are the brainchild of Sophie and Mark Mason, from Lincoln, aka Masons' Cavies, and feature the rodents enjoying huge vegetable platters and relaxing in purpose-built beds.

  The couple told BBC Radio Lincolnshire the animals all have unique personalities and names.

