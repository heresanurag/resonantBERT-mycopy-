title: 'Your pictures of Scotland: 3 November - 10 November - BBC News'
date: '2023-11-10'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-67308706
content: |-
  A selection of your pictures of Scotland sent in between 3 November and 10 November.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Pot of gold-en plovers: Nick Card captured this lovely birds and rainbow image at Brodgar, Orkney.

  A time for reflection: "Beautiful sunrise at the Eden estuary at Guardbridge, Fife," says Kim Bennett.

  Rise and shine: "Autumn early morning fog on walk to work," says Torquil Macleod in Tain.

  Early riser: "I was out walking my dog just after sunrise and saw two deer running in a field next to the road where we were," says Marc Charron of his fantastic image of one of them, outside Coylton.

  A high standard: "Falls of Acharn next to Loch Tay," says Sam Hayles of this drone shot. "Amazing display of autumnal colours."

  Mist opportunity: "The mighty Forth Bridge disappearing," says Erin Harper.

  Passing glance: "Going through Bealach na Bàd pass on the way to Applecross, pulled over when I saw a group of deer," says Matt O'Sullivan of this majestic shot.

  The king and eye: "A brief moment of contact with a River Don kingfisher before it flew off in search of a more private perch," says Steven Neish.

  Perch perfect: "This kestrel stayed for five minutes, allowing me to get some great shots," says George Kelsey in Edinburgh. "I couldn’t believe my luck."

  Study leaves: The University of Glasgow was looking very autumnal, as seen by Stewart Kerr.

  Castles in the sky: "Beautiful Edinburgh Castle in the autumn," says Alison Stewart, taken during a lunchtime walk in the sunshine.

  Treemendous colours: "This is the view which greets you as you drive into Aden Country Park," says Stewart Paul. "It is a glorious sight and you know that you are going to enjoy your visit and see lots of colourful scenes as you walk around."

  Heads or tails: Henri having fun in the autumn leaves, photographed by Shona Wilson.

  If you go down to the woods today: "This is taken at the Formakin Estate in Bishopton showing the autumn colours," says Scott Redford.

  Some red, red roses: "On a walk in the Birks of Aberfeldy I passed by this chap looking at the trees, and holding some roses," says Brian Colston of this Rabbie Burns shot. "I'm only guessing but he might have been in search of some poetic inspiration."

  Scone but not forgotten: "Taken when out on the lunchtime dog walk through Den of Scone," says Barry McAulay. "Just thought I'd send in this picture in the hope you put it on your website as I often look at the Scotland photos, but first time I've submitted one."

  Island hopping: "Taken on Inchconnachan, we kayaked over and went looking for wallabies," says Yvonne Carroll. "We got lucky enough to see one of these elusive, beautiful creatures. Photo taken by my husband Paul."

  One for the road: Pop goes the weasel, as spotted by Tom Kelly in Edinburgh. "A rare sight in the city, as this weasel popped up in front of me, just yards from the morning rush hour traffic," he said. "Thankfully it made a dash for safety, across a quieter road."

  Leap year: "Late in the season an Atlantic salmon battles the Falls of Shin heading up river to the place of its birth," says Rob Ware.

  Pap-arazzi shot: "A brief window in the rain to climb the Pap of Glencoe, giving stunning views west over Loch Leven to the hills of Ardgour," says Kathleen Humphris.

  Profile picture: Robin at Firkin Point on Loch Lomond, as seen by Graham Christie.

  Border patrol: "Cuilean, my six-year-old Border Collie, sitting majestically on top of Slioch with Scotland's great wilderness behind," says Matt McCabe.

  Swell time: Taken at Macduff harbour, the sea was dramatically washing up around the armouring on the west slipway, says Ray McGinlay.

  Yacht of gold: "I was fortunate to be at Stonehaven Harbour when this beautiful rainbow appeared for about five minutes, before a few spots of rain, then it disappeared just as quickly," says Jim Smith.

  University clearing: "An angular snap taken of the crew cleaning the Learning and Teaching building at the University of Strathclyde," says Micky Anderson, describing it as a "glass act".

  Coo for the price of one: This Highland pair were spotted at Pollok Park in Glasgow by Clare Bridgestock.

  Bright Spark: Stephen Morgan sent this image of the Vital Spark berthed at Inverary on a "tranquil" Loch Fyne

  Sun lounger: "I wanted to share with you a picture of this fox I found at the mouth of the River Almond," says Marcus Tyler.

  Go with the flow: "The Black Linn waterfall at The Hermitage near Dunkeld," says Mark Stolarek. "The autumnal colours are magnificent at this time of year."

  Wax work: "It's been a bumper year for waxwings, with hundreds making the trip from Scandinavia to north east Scotland in the last couple of weeks," says Nick Collins. "This pair were part of a large flock in Aberdeen."

  Leaf encounter: "A soggy Pickle," says Maggie Power in a "very wet and windy" St Cyrus.

  Skeleton service: "Saw this on the way to Irvine," says Susan Miller. "It’s obviously a very busy, reliable bus service!"

  Autumn son: The colours at the Birks of Aberfeldy were admired by Eilidh Adams and her young boy.

  Reach for the Skye: "Took this photo after walking home from school with my daughter Skye," says Stephen Porteous in Milngavie. "She was keen to try and reach the end of the rainbow to see if there was a pot of gold."

  "Glass Women's Institute in Aberdeenshire decorated the local War Memorial with a cape of knitted poppies," says .John Sellar.

  Night Skye: "Looking down Glen Sligachan," says Gavin Major. "I was lucky enough that the light was beautiful and the clouds compliant."

  Picture Callander worthy: "I took this photo with my drone over Callander Golf Club," says Iain Carrie. "The colours in the trees were amazing and the sunset over Ben Gullipen really emphasised the reds and browns. Ben Ledi can be seen in the background (right)."

  Light entertainment: "The aurora taken from my garden, I thought it would be a nice touch with the firework too," says Lorraine Sharkey in Collieston.

  Pretty in pink: "The colourful firework display from North Lanarkshire's Strathclyde Country Park in Motherwell," says Christopher Tollan.

  Fairy nights: "This is an image of the best decorated boat that took part in the Flotilla of Light on the Union Canal in Edinburgh," says Kieran Dunning. "People gathered on the bridges and paths to watch the boats go by."

  Purple patch: "I was in Glasgow and spotted this beautiful sunset, reflecting on the river, outside the Glasgow Science Centre," says Nathan Young.

  The light sky: "My attempt to capture the aurora with star trails from our back garden," says Loreena Price in Mintlaw.

  Green screen: "The Northern Lights at Bow Fiddle Rock in Portknockie", says Simon Bliaul.

  Peek-a-coo: "Through from Glasgow visiting my mum in Newport-on-Tay I went for a wee wander before dinner and found these fellas," says Lynn Honeyman. "I never tire of the views of the Silvery Tay with the backdrop of the Dundee lights. It was the first anniversary of losing my dad. This photo would have made him smile."

  Please ensure that the photograph you send is your own and if you are submitting photographs of children, we must have written permission from a parent or guardian of every child featured (a grandparent, auntie or friend will not suffice).

