title: Oscar-winning director Paul Haggis arrested over alleged sexual assault - BBC
  News
date: '2022-06-20'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-61863695
content: |-
  The Crash filmmaker is arrested in Italy and denies the allegations according to local agencies.

  Oscar-winning director Paul Haggis has been arrested in southern Italy on suspicion of aggravated sexual assault, Italian news agencies have reported.

  Brindisi prosecutors said he was also accused of "aggravated personal injury and crimes committed to the prejudice of a young foreign woman".

  The Canadian film-maker's' lawyer Priya Chaudhry issued a statement saying he was "totally innocent".

  "Under Italian Law, I cannot discuss the evidence," she said.

  "That said, I am confident that all allegations will be dismissed against Mr Haggis. He is totally innocent and willing to fully co-operate with the authorities so the truth comes out quickly."

  The ANSA and AGI agencies also report Mr Haggis has denied the allegations via another lawyer, Michele Laforgia.

  "Make enquiries as soon as possible, I am totally innocent," he said, according to the agencies, who quoted Laforgia.

  Mr Haggis, 69, who wrote and produced the Oscar-winning 2005 film Crash, was expected to headline the Allora Fest film festival, which kicks off on Tuesday in the city of Ostuni in the province of Brindisi.

  Prosecutors said the alleged victim had been staying with Mr Haggis ahead of the festival.

  "The suspect allegedly forced the young woman, whom he met some time ago, to undergo sexual intercourse," they wrote.

  Following one encounter, the woman was "forced to seek medical care", they added.

  According to Italy's La Repubblica newspaper, Mr Haggis is under house arrest at a hotel in Ostuni.

  The Allora Fest said they "learned with dismay and shock the news that Paul Haggis is in custody for alleged violence."

  It added that the festival's directors "immediately proceeded to remove any participation of the director from the event."

  Mr Haggis is also known for writing and producing the film Million Dollar Baby, which also won a best picture Oscar, the year before Crash.

  His other credits include writing the scripts for Bond films Casino Royale and Quantum of Solace.
