title: Moment victim's family attacks murder suspect in court - BBC News
date: '2025-02-06'
section: General
url: http://www.bbc.co.uk/news/videos/cj480d9n8v2o
content: |-
  Courtroom surveillance video shows two family members jumping over the gallery divider and charging at the defendant.

  A chaotic scene unfolded in an Albuquerque, New Mexico courtroom during a homicide case hearing, when two male relatives of the victim attacked the defendant suspected of murder.

  The fight began when the two relatives jumped over the gallery divider and charged at the defendant, and then an inmate and the father of the accused got involved. A Metropolitan Detention Center guard intervened but was also attacked.

  The two men, Carlos Lucero and Pete Ysasi, were arrested and charged with battery on a peace officer and assault on a jail. A female suspect remains at large, with an arrest warrant issued.
