title: Liverpool's Trent Alexander-Arnold out of Carabao Cup final against Newcastle
  United - BBC Sport
date: '2025-03-14'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/c778ex3278zo
content: |-
  Liverpool right-back Trent Alexander-Arnold will miss Sunday's Carabao Cup final against Newcastle at Wembley with an ankle injury.

  Liverpool right-back Trent Alexander-Arnold will miss Sunday's Carabao Cup final against Newcastle with an ankle injury.

  The 26-year-old picked up the knock in the second half of Tuesday's Champions League defeat by Paris St-Germain, a tie the French side won on penalties.

  Alexander-Arnold's injury means Liverpool do not have a recognised right-back for the Wembley final because Conor Bradley and Joe Gomez are still recovering from injuries.

  Jarell Quansah is likely to fill in.

  "Trent is not available. He will not be there at the final," said head coach Arne Slot.

  "But he is still to be assessed for how long it will take but we do expect him back before the end of the season."

  Alexander-Arnold is out of contract at the end of the season and BBC Sources said in January that Real Madrid are keen to sign the full-back but there has been no official comment made about his immediate future.

  Mohamed Salah and Virgil van Dijk are also out of contract this summer, with Van Dijk saying this week he had "no idea" whether he will stay at Anfield beyond the current season.
