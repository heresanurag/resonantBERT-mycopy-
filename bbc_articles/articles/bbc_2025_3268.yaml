  Temperatures topped 19.7C this weekend in Crosby near Liverpool but cold weather is back in the forecast.

  UK hotter than Costa del Sol on warmest weekend of the year

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The UK's warmest days of the year arrived this weekend, with temperatures reaching almost 20C in parts of the country. Temperatures topped 19.7C in Crosby near Liverpool and 18.7C in Harwarden in north Wales, while Killowen in Northern Ireland saw 17.2C and Threave in western Scotland recorded 17.3C. The warm weather has seen some spots in the UK hotter than popular European holiday destinations, including Spain's Balearic islands and the Costa del Sol. But BBC Weather forecasts that temperatures will drop next week, with cold air expected to come from the north.

  On Saturday, temperatures topped 19.1C in Bridgefoot, England. Scotland recorded a high of 18.3C in Threave, while Northern Ireland hit 17C in Castlederg. Wales matched Thursday's recording of 18.2C with Saturday's temperature in Porthmadog. Holiday hotspots such as Marbella in Spain or Italy's Amalfi Coast - known for their sunny climates - recorded lower temperatures than in the warmest parts of the UK. According to the Met Office, Marbella on Spain's south coast had a high of 15C on Saturday, Ibiza had a high of 17C, and Sorrento on the Amalfi Coast reached 14C. Temperatures this weekend are around five to eight degrees above average - more typical of May than March, when temperatures are normally around 8C to 11C across the UK. The warmer-than-average weather is a result of a south-easterly wind bringing air from continental Europe. But the nicer weather is not expected to last, nor has the UK turned a corner toward summer. Spring can often bring big swings in temperature and can sometimes even bring 'all four seasons in a day'.

  People enjoy the warm weather at Clevedon Marine Lake in Clevedon on Saturday

  From Monday, the weather will switch to a northerly wind bringing a return of colder arctic air. Initially temperatures will drop in Scotland, with highs of only 4C to 8C. Then from Tuesday and the rest of the week, the colder air oozes south to all parts, bringing temperatures around two or three degrees below average. There is also the possibility of a bit of snow over higher ground and wintry showers elsewhere.

  Thursday was previously the warmest day of the year so far in England, Wales and Scotland with 19C recorded in Santon Downham in Suffolk and 18.2C in Aberystwyth, Ceredigion. The Botanical Gardens in Edinburgh reached 16.8C which is the highest on record for it this early in the year. In the meantime, make the most of the warmth this weekend and check the forecast for your local area on the BBC Weather website and app.

