  The Environment Agency has urged people to keep well away from coastal paths, piers and proms due to expected high waves. There are also flood warnings in place, external for parts of Wiltshire and Somerset, and alerts for Bristol and Gloucestershire. Gloucestershire County Council has warned there may be travel delays with the "risk of road closures due to fallen trees". Bristol Waste has said it will not be doing any collections on Saturday and is asking residents to secure their bins and bring them inside if possible. On the trains, Great Western Railway said speed restrictions would be in place across its network and fallen trees may also impact services. On Sunday, the advice is to travel only if absolutely necessary.

  The Environment Agency has urged people to stay away from coastal paths and piers

  The Met Office said a period of extremely strong winds will develop during the early hours of Saturday morning. "Gusts of 90mph or more are possible over coasts and hills of west and south Wales, as well as funnelling through the Bristol Channel with some very large waves on exposed beaches," it said.

