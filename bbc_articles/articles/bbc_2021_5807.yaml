title: Marriage certificate to include mothers' names in England and Wales - BBC News
date: '2021-05-04'
section: UK
url: http://www.bbc.co.uk/news/uk-56975357
content: |-
  Both parents, not just the father, will now be named on marriage certificates in England and Wales.

  Mothers of brides and grooms in England and Wales will now be added to marriage certificates for the first time.

  Until now, the document only included the names of the fathers of the couple, but a change to the Marriage Act means both parents will be included.

  The Home Office said the move would "correct a historic anomaly".

  Marriages will also be recorded electronically, rather than written in a registry book, as part of the biggest changes to the system since 1837.

  The government said the creation of a single electronic register, which goes live on Tuesday, would speed up the process and remove the need for any details to be extracted from hard copies.

  Marriages were previously recorded by the couple signing a register book - there are around 84,000 held at register offices, in churches and chapels, and at registered religious premises.

  The changes to the Marriage Act were made in consultation with the Church of England.

  The Reverend Dr Malcolm Brown, director of mission and public affairs for the Church of England, said he believed the new regulations would become second nature very quickly.

  "Changing practices that go back many years is never straightforward, but we believe the new system changes as little as possible in terms of the couple's experience of their church wedding," he added.

  MPs from all parties have spent several years attempting to bring about a change in the law to allow both parents to have their names and occupations recorded.

  The move brings England and Wales into line with the rest of the UK.

  In Scotland and Northern Ireland, couples are already asked to give the names of both parents on marriage documentation. The same applies for those entering a civil partnership.
