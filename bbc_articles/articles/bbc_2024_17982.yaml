  It is the first time Team GB have won the quadruple sculls in the Olympics and is the latest emotional instalment in the lives of some of the quartet. After Helen Glover and Heather Stanning claimed gold in the women's pair at London 2012, a young Anderson wrote on a piece of paper: "My name is Lola Anderson and I think it would be my biggest dream in life to go to the Olympics in rowing and if possible win a gold for GB." She then threw it away, but without her knowledge her father Don - a former rower - retrieved it. He kept it for seven years and, when he was diagnosed with terminal cancer, wanted to remind her of her dreams. "I know that he would be so proud of me," a tearful Anderson said after receiving her medal. "I am thinking about him a lot right now. "It's quite overwhelming to be experiencing this but I am so grateful. "I threw it away because I didn't believe. I was 13 at the time, so why would you believe that?" Anderson, 26, added the diary entry was as valuable to her as an Olympic gold medal. "I always get a bit nervous taking it anywhere with me," she said. "What happens if a suitcase gets lost, or something like that? "It's a piece of paper but it's the most valuable thing I have, maybe joint with this [gold medal] now. It's safe in a tin with all my dad's old medals." Scott, from Coleraine, was also inspired by London 2012 success while Brayshaw overcame the odds of a traumatic horse-riding accident when she was 15 to reach the pinnacle of her sport. She was told her injuries would be "life-changing" by doctors, only to recover through extensive rehabilitation and physiotherapy. "I believed in all of the girls. I still can't believe it. We've worked on this for three years. It has left me quite speechless," Brayshaw told BBC One. Scott added: "We've all had personal journeys to how we've got here. It's not been easy and there's been a lot of setbacks in each individual's story. "It just shows that you've got to persevere, learn from those experiences and use them as positives." Meanwhile, gold-medal favourites Emily Craig and Imogen Grant progressed to Friday's final of the lightweight women's double sculls. Ollie Wynne-Griffith and Tom George claimed second place in their pairs semi-final to reach the final on Friday, while Ireland's Ross Corrigan and Nathan Timoney also made it through with a third-place finish. Two-time Olympic champion Helen Glover and the women's four are among the British boats going for gold on Wednesday.
