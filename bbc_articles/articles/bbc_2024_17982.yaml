content: |-
  Team GB's rowers win gold in the women's quadruple sculls after the men finish fourth.

  This video can not be played To play this video you need to enable JavaScript in your browser. Team GB come back to win gold in the women's quad sculls

  Great Britain's rowers won a dramatic Olympic gold in the women's quadruple sculls after a photo finish with the Netherlands. The Dutch led from the front and were half a boat length clear with 200m to go before an astonishing push from GB pipped them at the line. England's Lauren Henry, Lola Anderson and Georgina Brayshaw and Northern Ireland's Hannah Scott won in six minutes 16.31 seconds, with the Netherlands 0.15 seconds behind them. After an anxious wait for the winner to be announced, the four collapsed into each other's arms in scenes of jubilation and pure exhaustion as they added Olympic gold to their 2023 world title success. "I still can't quite believe it," Scott told BBC One. "We kept it so cool to the end. We had the confidence, we know we've done so many hard miles in training. The immensity of it hasn't caught up with me yet." Henry, at 22 the youngest member of the crew, had urged her team-mates to mount one last big effort, telling them: "We are going now, we need to go now." "I'd felt we'd won it because I sensed I was ahead of the Dutch bow girl," she said. "But it wasn't until I looked at the big screen and saw 'GBR 1' that I believed it. That moment was just ecstatic." After a disappointing campaign in Tokyo without any golds, the triumph signifies what Team GB's rowers hope will be the start of a return to form. GB's men finished fourth in the same event with the Netherlands successfully defending their title from Tokyo. Tom Barras was the only remaining rower from the GB team that won silver in 2021, with Callum Dixon, Matthew Haywood and Graeme Thomas completing the quartet that finished almost two seconds behind Poland in third, with Italy claiming silver.

