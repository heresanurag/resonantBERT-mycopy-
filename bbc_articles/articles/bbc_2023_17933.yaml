title: 'Your pictures of Scotland: 17-24 November - BBC News'
date: '2023-11-24'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-67509422
content: |-
  David May said: "Tea for two? Two wee coal tits having a chat in the Cairngorms."

  A selection of your pictures of Scotland sent in between 17 and 24 November.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Craig Milloy took this photo of the Grangemouth Refinery and Forth from Culross.

  Fiona Duff from Dunmore near Beauly said: "I have set up a hide and got this lovely red squirrel peeking out from behind the tree."

  Ryan Carroll said: "I took this image from the Squinty Bridge of a night time Finnieston Quay skyline."

  Hazel Thomson from Elgin sent us this shot of a sparrowhawk.

  Deirdre MacKinnon took this dramatic image on North West Skye.

  Sherellyn Borral's dog Ulis got in on the action in this picture at Glenfinnan Viaduct.

  Fraser Cormack took this photo at Randolph's Leap, Forres, Moray.

  George Current from Edinburgh took this picture at the Scott Monument, adding: "What would Sir Walter Scott have thought of this?"

  Joan Smith said: "I saw this beautiful waxwing, one of a group of 40 or 50 outside Tesco in Dunblane."

  Alice Fechlie from Dundee took this photo of South Shore, Lochearnhead, overlooking St Fillans. She said: "Beautiful reflections in the water, truly magical."

  Stuart Taylor said: "I took this picture up Croy Hill in Cumbernauld during some rain. The bad weather really created a gloomy atmosphere."

  Steve Buckland from Cupar sent us this picture of a sparrowhawk, confused by an ornamental frog at Kedlock Feus, Fife.

  Guy Barthorpe sent us this stunning picture of the Old Man of Storr.

  Kirsty McNab took this picture at Silver Sands of Morar. She said: "A heart-shaped hole we dug in the sand then put our camera in facing upwards."

  Keith Almond said: "I took this photo from the Caledonian Canal at Corpach looking over to Ben Nevis."

  Graham Christie took this photo of the River Etive with Buachaille Etive Mor in the background.

  Lauren McKendrick took this picture of a curious fox outside Glasgow Airport.

  Natalie Gallan captured this image of waves crashing at Aberdeen Beach.

  Hugh Maxwell said: "I took this image from the shore at Barassie in South Ayrshire as a weather front was moving in. I was lucky to catch the shafts of sunlight breaking through the dark clouds."

  Mo Griffiths sent in this photo of RRS Discovery in Dundee "given an eerie look by the red lighting."

  Neil Robson said: "It was nice to have some company whilst waiting on the bus to work on a dry but chilly morning looking toward Lochgoilhead."

  Mark Reynolds took this shot of a colourful sunrise over Aonach Mor and Ben Nevis.

  Peter Semple from Perth said: "Beautiful calm day for a wander up Birnam Hill, was rewarded with this very autumnal view."

  Pat Christie sent us this photo at Milsey Bay in North Berwick.

  Please ensure that the photograph you send is your own and if you are submitting photographs of children, we must have written permission from a parent or guardian of every child featured (a grandparent, auntie or friend will not suffice).

