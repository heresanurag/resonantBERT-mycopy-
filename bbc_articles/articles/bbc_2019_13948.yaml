  The first day of official campaigning sees two high-profile resignations, and pledges from all parties.

  What restrictions are there on candidates standing for election?

  Confused? Got a question for us? Send it to BBC News via the form on this page and we'll do our best to give you the answers. We've answered this one from Pete Jinks in Runcorn: Q - What restrictions are there on candidates standing for election? A - According to the Electoral Commission, all candidates must be at least 18 years old on the day they are nominated, and must be a British, Irish or eligible Commonwealth citizen. A wide range of people are not allowed to stand because their job or role is seen as being incompatible with being an MP. These include members of the House of Lords, civil servants, military personnel and judges. Members of the European Parliament cannot stand for the Westminster Parliament and no-one can stand in more than one constituency. Prisoners serving a custodial sentence after conviction and some people who are subject to bankruptcy orders or proceedings cannot vote in any elections, although bankruptcy in itself is not a disqualification. You can read answers to more of your questions here.
