content: |-
  The Wikileaks co-founder is not attending the High Court hearing because he is too unwell.

  Two key interventions as court adjourns for lunch

  Home and legal correspondent, reporting from the High Court

  Court has just adjourned for lunch - but two important interventions at the end of this session. Mark Summers KC, another of Julian Assange’s top lawyers, has argued all the evidence at the original extradition hearing showed that in the US national security leaks are so routine there is a whole cadre of journalists whose careers are dedicated to the practice. He said nobody had ever been prosecuted for publishing those leaks - begging the question as to why his client was being pursued. Justice Johnson, one of the two judges, then asked a question. He wanted to know whether anyone had ever been prosecuted for the type of leak the US has accused Assange of publishing - revealing the true identities of human sources. This is a core part of the US’s case - that Assange endangered the lives of confidential informants in Iraq and Afghanistan who had helped its forces combat insurgents and terrors groups.
