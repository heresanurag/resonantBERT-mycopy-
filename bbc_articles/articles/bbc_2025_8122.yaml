title: US Navy parachutist crash lands into San Francisco crowd - BBC News
date: '2025-04-07'
section: General
url: http://www.bbc.co.uk/news/videos/c93p454vv1po
content: |-
  A woman and child were taken to hospital with minor injuries after the demonstration in San Francisco.

  Video has captured the moment a US Navy parachutist crash landed into a woman and child during an air show in San Francisco.

  The pair were taken to hospital with minor injuries after the demonstration in Marina Green, according to the San Francisco Fire Department.

  The US Navy Leap Frogs parachutist was uninjured, the Navy said, and added that the incident will be reviewed.
