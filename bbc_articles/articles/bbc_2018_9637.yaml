id: bbc_2018_9637
title: Three charged in speedboat human trafficking probe - BBC News
date: '2018-08-04'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-45068950
content: |-
  Police and Border Force officers intercepted the speedboat as it landed on a beach early on Friday.

  Three men have been charged in a human trafficking investigation after a speedboat was intercepted on a beach.

  Nine people were held on Friday after the boat was stopped in Walmer, Kent.

  Nazmi Velia, 31, of Park Street Lane, St Albans, Egert Kajici, 34, of Turner Drive, Oxford, and Thomas Mason, 35, of High Street, Eyeworth, have been charged with conspiracy to facilitate a breach of Immigration Law.

  Two other men have been released under investigation.

  Four others who were arrested have now been taken to an immigration detention centre pending further inquiries.

  The arrests were part of a joint operation between the Eastern Region Special Operations Unit and Border Force.

