content: |-
  Spanning four levels, the museum is now home to more than 250,000 objects.

  The V&A East Storehouse has opened its doors to the public for the first time.

  Spanning four levels, the museum - formerly the London 2012 Olympics Media Centre in Stratford, east London - is now home to more than 250,000 objects and 350,000 library books.

  One of its standout features is its groundbreaking Order an Object experience where visitors can book in to see any item from the collection up close with the museum's handling staff.

