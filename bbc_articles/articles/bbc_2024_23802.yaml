content: |-
  The ruins of the Greek village of Kallio have reappeared, after a reservoir partially dried up.

  The ruins of a Greek village that lay submerged for decades have re-appeared after record temperatures caused a major reservoir to partially dry up.

  Residents of the village of Kallio - which was made up of 80-or-so houses, a church and a school - were forced to evacuate their homes more than 40 years ago to make way for a reservoir that supplies water to the capital, Athens.

  But drought conditions in recent months have caused the water level here to drop dramatically, and drone footage shows the ruins of buildings poking out the top of the water.

