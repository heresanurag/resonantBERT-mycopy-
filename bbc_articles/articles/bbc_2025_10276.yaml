title: 'Lilo and Stitch beat Tom Cruise''s Mission: Impossible – The Final Reckoning
  at box office - BBC News'
date: '2025-05-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4g2w8pqeyvo
content: |-
  Disney's Lilo and Stitch remake and the latest Mission: Impossible become two of the year's biggest films.

  Disney's live-action Lilo and Stitch remake and Tom Cruise's supposedly final Mission: Impossible outing have opened as two of the biggest films of the year in a record-breaking weekend at the box office. Lilo and Stitch, which revisits the 2002 animated family favourite, exceeded expectations with takings of $341m (£252m) around the world. That made it the second highest opening of 2025 so far after A Minecraft Movie, Variety reported, external, and broke the record for the Memorial Day weekend in the US. Mission: Impossible - The Final Reckoning, the eighth film in the franchise, also proved a hit with $190m (£140m) in ticket sales.

  Tom Cruise has said the latest film is "not called 'final' for nothing"

  Cruise has been playing agent Ethan Hunt since 1996, and seemingly confirmed The Final Reckoning would be the last instalment by telling the Hollywood Reporter, external: "It's the final! It's not called 'final' for nothing." But some have doubts about whether it will really turn out to be the end. The blockbuster has had some rave reviews, with the Guardian calling it, external a "wildly entertaining adventure" in a five-star review, and Vanity Fair describing it, external as "a worthy send-off". However, not everyone was blown away, with the Hollywood Reporter saying, external it's "a disappointing farewell", and Mashable saying, external the series risked going out with the "fizzled whimper of a message self-destructing in a tape deck".

  Meanwhile, Lilo and Stitch is the latest in a long line of live-action remakes of beloved Disney animations, and achieved the third-best box office opening behind 2019's The Lion King and 2017's Beauty and the Beast, Variety said. The new version stars Courtney B Vance and Zach Galifianakis alongside eight-year-old Maia Kealoha and a computer-generated cuddly runaway alien. It has also had mixed reviews, being described as "jovial, zany, and sweet" by the Daily Beast, external, but a "mind-numbing abomination" by the Times, external.
