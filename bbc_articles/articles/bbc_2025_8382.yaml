title: Stanley victim shot through own window, Durham Police confirm - BBC News
date: '2025-04-09'
section: England
url: http://www.bbc.co.uk/news/articles/c3r8n0n9wqeo
content: |-
  Durham Police has given an update after Barry Dawson was killed in Stanley on Saturday.

  Durham Police held a press conference to give an update on the investigation

  Detectives investigating the death of a man who was shot through his window are working "around the clock", police say. Barry Dawson, 60, was shot in his Elm Street home in Stanley, County Durham, on Saturday and died at the scene. A 37-year-old man and a 35-year-old woman arrested on suspicion of conspiracy to murder remained in custody three days after Mr Dawson's death, Durham Police said. During a press conference, Supt Peter Carr said: "This was a frightening incident for those involved and those living nearby."

  He added a 35-strong team of detectives from the major crime unit were working alongside armed response officers, crime scene investigators, specialist search teams and neighbourhood officers. Speaking outside Stanley police station, Supt Carr said police were called at 17:20 BST to reports of a disturbance at Mr Dawson's home. "During the incident, Barry Dawson was shot through the window of his home address. "Sadly, despite the best efforts of paramedics, Mr Dawson died at the scene. "A 37-year-old man and a 35-year-old woman who were arrested on suspicion of conspiracy to murder remain in police custody."

