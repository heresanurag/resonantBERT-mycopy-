title: Woman hit by van on Little Aston golf course dies - BBC News
date: '2025-04-17'
section: England
url: http://www.bbc.co.uk/news/articles/c793v7zvz10o
content: |-
  She had been left in a critical condition after being struck by a van involved in a police chase.

  Woman hit by van on golf course dies

  The woman was hit by the van at Aston Wood Golf Club

  A woman who was struck by a van on a golf course near Sutton Coldfield has died. The van, which had been involved in a police pursuit, hit her at Aston Wood Golf Club, in Little Aston, on Friday morning. The West Midlands force, which had followed the van from some miles away, said she died from her injuries on Tuesday night. The occupants of the grey Nissan van ran off and remained at large, the force said.

  Officers' pursuit of the vehicle followed reports of suspicious activity, the Independent Office for Police Conduct (IOPC) said. It added that officers in two patrol cars began following the van in Kingstanding, Birmingham, at about 10:15 BST on Friday. The officers stopped following the vehicle when it came off the road and went up an embankment on the golf course, the IOPC said. "Officers followed a short time later, on foot, and gave first aid to the woman, who was then taken to hospital for treatment for life-changing injuries," a spokesperson added. An IOPC investigation has been opened into police involvement prior to the incident.

  Staffordshire Police, which is investigating the events at the Little Aston location, said the woman's family was being supported by specialist officers and urged anyone with information to contact the force.

  Darren Priddey, who lives near the golf course, said his neighbour had heard "a lot of screaming coming from this general direction". He added he had then seen a lot of police activity, including officers with dogs, searching for something or someone in a nearby garden after the incident.
