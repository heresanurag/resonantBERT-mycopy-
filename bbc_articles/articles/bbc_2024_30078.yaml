  The US government alleges Iran's Revolutionary Guard tasked an Afghan national to devise a plan to kill Trump.

  US charges man over alleged Iranian plot to kill Trump

  The US government has brought charges against an Afghan national in connection with an alleged Iranian plot to assassinate Donald Trump before he was elected as the next president. The Department of Justice on Friday unsealed an indictment against Farhad Shakeri, 51, alleging he was tasked with “providing a plan” to kill Trump. The US government said Mr Shakeri has not been arrested and is believed to be in Iran - which described the claims as "completely baseless". In a criminal complaint filed in Manhattan court, prosecutors allege that an official in Iran’s Revolutionary Guard directed Mr Shakeri in September to devise a plan to surveil and kill Trump.

  “The Justice Department has charged an asset of the Iranian regime who was tasked by the regime to direct a network of criminal associates to further Iran’s assassination plots against its targets, including President-elect Donald Trump,” US Attorney General Merrick Garland said in a statement. The justice department also charged two others allegedly recruited to kill an American journalist who was an outspoken critic of Iran. The other individuals were identified by the justice department as Carlisle Rivera, also known as "Pop", 49, from Brooklyn, and Jonathon Loadholt, 36, from Staten Island. The two appeared in court in the Southern District of New York on Thursday and are being detained pending a trial. Iran's foreign ministry spokesperson Esmaeil Baghaei said similar accusations of attempts to assassinate US presidents had been made in the past, which Iran denied and went on to be false. In a statement, Mr Baghaei added that repeating such claims risked "further complicating the issues between the US and Iran". Trump has faced two separate alleged assassination attempts this year. In July, a gunman grazed the former president's ear after shooting at him during a Pennsylvania rally. Then, in September, a man was arrested for pointing a rifle at Trump who was golfing on his course in West Palm Beach. Mr Shakeri was asked to come up with a plan to kill Trump in seven days, the indictment alleges. According to prosecutors, Mr Shakeri told law enforcement that he did not intend to propose a scheme to kill Trump within that seven-day timeframe, so the Iranian Revolutionary Guard officials put the plan on pause. Mr Shakeri said the Iranian government told him it would be easier to try to assassinate Trump after the election, because they believed he would lose, prosecutors said. Prosecutors described Mr Shakeri as an Afghan national who came to the US when he was a child. He was eventually deported around 2008 after spending 14 years in prison for a robbery conviction. Prosecutors say the 51-year-old used “a network of criminal associates”, from prison, including Mr Rivera and Mr Loadholt, to conduct surveillance on the Iranian government’s targets. Mr Shakeri promised Mr Rivera and Mr Loadholt $100,000 to murder the American journalist, who had reported on the Iranian regime’s human rights abuses and corruption, prosecutors alleged. The journalist, who was not named, had been targeted in the past, prosecutors said. In a post on social media Friday, Brooklyn-based journalist Masih Alinejad said the FBI had arrested two men for attempting to kill her. She said the alleged killers came to the front of her house in Brooklyn. "I came to America to practice my First Amendment right to freedom of speech—I don’t want to die," Ms Alinejad wrote. "I want to fight against tyranny, and I deserve to be safe." In addition to the American journalist and Trump, the indictment alleges the Iranian government sought to kill two Jewish American businesspeople living in New York City, who were supportive of Israel on social media. Mr Shakeri also told prosecutors that his Iranian contacts asked him to plan a mass shooting to target Israeli tourists in Sri Lanka in October 2024, a year after the Hamas attacks on Israel. Mr Shakeri, Mr Rivera and Mr Loadholt were all charged with murder-for-hire, which carries a maximum sentence of 10 years in prison. They also face counts of money laundering conspiracy - which could lead to 20 years in prison - and conspiracy to commit murder-for-hire.
