  Lighthouse was the subject of BBC programme A Very British Cult presented by Catrin Nye

  Three men charged with harassment of BBC presenter

  From left to right: Kristofer Alexander Deichler, Jatinder Singh Kamra, and Sukhraj Bir Singh

  Three members of a group which was the subject of a BBC investigation have been charged with harassing the show's presenter Catrin Nye. Kristofer Alexander Deichler, 46, Jatinder Singh Kamra, 45 and Sukhraj Bir Singh, 38, were charged with harassment without violence between 28 August and 6 September 2024. They are members of Lighthouse - a group which was the subject of the 2023 podcast and TV documentary A Very British Cult. All three were arrested in London last September and have been on bail since.

  No date has yet been set for a court hearing. The BBC podcast and TV documentary told the story of Lighthouse International Group – which has since rebranded itself as Lighthouse Global. The group began as a life coaching organisation led by a man called Paul Waugh.
