title: 'Clodagh Rodgers: UK Eurovision singer dies aged 78 - BBC News'
date: '2025-04-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cj3x8mpznlgo
content: |-
  Clodagh Rodgers, who is from Warrenpoint, County Down, is known for songs such as Jack In The Box and Come Back and Shake Me.

  Clodagh Rodgers, who represented the United Kingdom in the Eurovision Song Contest in 1971, has died at the age of 78. Rodgers, from Warrenpoint, County Down, came fourth with the song Jack In The Box. She was chosen to represent the UK at the contest being held in Dublin, during the Troubles. Her son, Sam Sorbie, shared her death on social media, external "after battling an illness for the last three years".

  "Mum has lived an incredible life, full of love and happiness," Mr Sorbie said. "Her fantastic career performing, travelling the world, devoting her life to her two sons and being the rock of this family." He added that his mother would "be at peace" with his father and grandparents.

  Speaking on the BBC's Desert Island Discs in 1971, she said she started singing aged 12 after becoming interested in music because her father was a concert promoter. Her "one big regret" was not taking music lessons. Speaking about her first performance at 12, she said: "I thought I was terrific standing up there with my new socks on and the crowd cheering for me." She left school at 15 and her father got her an audition for a record company, where she was given a contract. Her family then moved to England. She said she made eight or nine "dud" records before she had any success. But after releasing Come Back and Shake Me, "things completely changed over night".

  Paying tribute on X, external, former BBC Radio DJ Mike Read said: "So sad the news about Clodagh Rodgers, a star in many spheres: Film, TV, stage and hit songs and of course Eurovision. "She worked with so many greats in different genres. "Commiserations to Frank, Louis and Lavinia and bless you for asking, and trusting, me to write her obituary."
