content: |-
  Wes Burns has withdrawn from Wales' squad for the forthcoming European Championship play-offs because of a hamstring injury.

  Last updated on .From the section Wales

  Coverage: Live on BBC Radio 5 Live, BBC Radio Wales, BBC Radio Cymru, BBC Sounds, BBC Sport website and app, plus live text Highlights: Match of the Day Wales, BBC One Wales from 22:40 GMT and

  Wes Burns has been ruled out of Wales' European Championship qualification play-off because of a hamstring injury.

  Winger Burns, 29, limped out of Ipswich Town's 6-0 Championship win over Sheffield Wednesday on Saturday.

  Wales face Finland in Cardiff on Thursday, 21 March, with a potential final five days later.

  "It was a hamstring and it doesn't look great. It certainly doesn't look like a very minor one," Ipswich boss Kieran McKenna said at the time.

  "That's the big disappointment, for his season here [and] for his internationals."

  Wales had already called up Morgan Fox to replace the injured Ben Cabango.

  Cabango, 23, was not a part of Swansea's squad for their south Wales derby win after sustaining a calf problem in training.

  Queens Park Rangers full-back Fox, 30, is yet to win a cap.

  "Ben pulled up in training with his calf - it went ping," said Swansea head coach Luke Williams.

  "We don't know exactly the extent of it but we know it's bad enough that he can't apply any force through it."

  On Sunday night, the Football Association of Wales also confirmed that defender Joe Low had withdrawn from the squad because of injury.

  If Wales can beat Finland, they will face Poland or Estonia for a place in this summer's European Championship.
