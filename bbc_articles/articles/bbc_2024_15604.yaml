title: 'North East Lincolnshire: The toughest place in UK to be a girl - report -
  BBC News'
date: '2024-07-18'
section: England
url: http://www.bbc.co.uk/news/articles/clwyd308lweo
content: "Women in Cleethorpes give their verdict on the findings of an unfavourable\
  \ \nreport.\n\nRevealed: The toughest place in the UK to be a girl\n\nFrancesca\
  \ Young believes there \"could always be more opportunities for women\"\n\nNorth\
  \ East Lincolnshire has been ranked the toughest place in the UK to be a girl, according\
  \ to new research. Children's charity Plan International UK explored factors affecting\
  \ girls' lives, such as education, poverty, health, violence and voice. The State\
  \ of Girls' Rights in the UK 2024 report found North East Lincolnshire (NEL) ranked\
  \ as the toughest community, with a score of 69.07 out of 100. In comparison, East\
  \ Dunbartonshire in Scotland was ranked as the top performing area, with a score\
  \ of 79.74.\n\nLauren from Cleethorpes (left) and Shereen from Nottingham\n\nAs\
  \ part of data collection, the charity surveyed 2,963 girls and young women aged\
  \ 12 to 21 across the UK, through schools and online panels. In the report, external,\
  \ the charity said NEL performed in the worst 5% of local authorities in factors\
  \ such as participation in education, employment and training and the gender pay\
  \ gap. Francesca Young, who owns her own business in Cleethorpes, told the BBC:\
  \ \"I love living here. I do think, locally, we have some really good things going\
  \ on in the creative sector. \"I don't think it's the worst place to live but I\
  \ think there could always be more opportunities for women.\" In terms of women's\
  \ safety, Ms Young said the topic is \"just not highlighted enough in the UK\".\n\
  \nCleethorpes in North East Lincolnshire is ranked as one of the toughest places\
  \ to live as a girl\n\n\"We don't have great public transport and I don't feel safe\
  \ at night to walk around, I wouldn't,\" she added. Lauren, from Cleethorpes, who\
  \ did not want to share her surname, said: \"I think there are areas you feel safe\
  \ and other areas where you would choose not to go at a certain time.\" Shereen,\
  \ visiting from Nottingham, also did not want to share her surname, added: \"Grimsby\
  \ and Cleethorpes are a bit stuck in their ways and there's not much of an industry\
  \ anymore. \"The thought of moving back to be with my family does put me off because\
  \ I don't know if there would be enough opportunities.\"\n\nA North East Lincolnshire\
  \ Council spokesperson said: \"Like many young people across the country, those\
  \ growing up in our area do face challenges but there are also both tremendous opportunities\
  \ and exciting plans for the future in North East Lincolnshire. \"We are working\
  \ hard with our community and our partners to support our young people as they grow,\
  \ giving them greater opportunities to thrive and succeed.\" NELC said there would\
  \ be a focus on improving the attainment level of school leavers and a National\
  \ Citizen Service-funded project supporting local teenagers with social and employability\
  \ skills. Secretary of State for Education and Minister for Women and Equalities\
  \ Bridget Phillipson MP said: “I am determined to make sure every young woman, no\
  \ matter her income, class or background, has the best start in life and opportunity\
  \ to succeed. “We have a mission to halve violence against women and girls, treating\
  \ it as a national emergency, and will work tirelessly to grow the economy and break\
  \ down the barriers to opportunity for women and girls across the country.”"
