title: French prosecutors confirm how Andrew and Dawn Searle died - BBC News
date: '2025-02-12'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/ce3lq3lkkn5o
content: |-
  Andrew and Dawn Searle, who moved to France from Scotland about 10 years ago, were found by a neighbour last week.

  Andrew and Dawn Searle had lived in lived in the Aveyron region for five years

  French prosecutors have confirmed how a British couple died, five days after they were found in their rural home in south-west France. The bodies of Andrew and Dawn Searle were discovered by a neighbour in the hamlet of Les Pesquiès, Villefranche-de-Rouergue, on Thursday. Post-mortem examinations have now confirmed Mr Searle, 62, died from hanging and Mrs Searle, 56, suffered "multiple blows to the head with a blunt and sharp-edged object". Prosecutors in Rodez issued an update on the case but the circumstances surrounding the deaths of the couple, who moved to France from Scotland, remain unclear.

  The statement added: "The investigation is ongoing, particularly to determine whether the tragedy resulted from a domestic crime followed by suicide or involved a third party."

  Ms Searle, who was partially undressed, was discovered with a "severe head wound" in front of the couple's home at about 12:27 on 6 February. A box containing jewellery was found nearby but "no object or weapon capable of causing the injuries was found". Firefighters who responded to the alert then discovered Mr Searle - who had "no visible defensive wounds" - at the back of the house and notified police. The statement said the the property "appeared to have been searched superficially" and cash was found in the couple's bedroom. Further toxicological tests are under way as part of the investigation, which is being led by Toulouse Police.

  Former Hollyoaks actor Callum Kerr walked his mother Dawn Searle down the aisle in 2023

  Mrs Searle grew up in Eyemouth in the Scottish Borders, and Mr Searle was originally from England. They lived in Musselburgh, near Edinburgh, and married in France in 2023. Prosecutors said they had lived in the Aveyron region for five years. According to his LinkedIn page, Mr Searle previously worked in financial crime prevention at companies including Standard Life and Barclays Bank.

  The bodies were discovered at the property early on Thursday afternoon

  On Saturday Mrs Searle's son, ex-Hollyoaks actor Callum Kerr, issued a statement on Instagram on behalf of the couple's four shared children. It read: "At this time, Callum Kerr and Amanda Kerr are grieving the loss of their mother, Dawn Searle (née Smith, Kerr) while Tom Searle and Ella Searle are mourning the loss of their father, Andrew Searle." Mr Kerr, who played PC George Kiss in Hollyoaks and has appeared in Netflix's Virgin River, requested that the family's privacy was respected during this "difficult period", adding that they would provide updates as appropriate. The 30-year-old, who walked his mother down the aisle, has also released a number of country songs.

  Mr and Mrs Searle were found at their home in Les Pesquiès. The discovery was made by a neighbour, who went to check on them when they failed to turn up for a planned dog walk. The area around their detached house was sealed off while investigations took place, and local police called in expert help from Toulouse, which is about 70km (43 miles) away. As well as intensive forensics activity, a helicopter and a drone were also sent to the site. A spokesperson for the UK's Foreign Office said: "We are supporting the family of a British couple who died in France and are liaising with the local authorities."
