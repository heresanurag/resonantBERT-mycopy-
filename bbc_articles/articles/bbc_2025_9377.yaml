title: Crystal Palace fans in ecstasy after FA Cup win over Manchester City - BBC
  News
date: '2025-05-18'
section: London
url: http://www.bbc.co.uk/news/articles/cy90d732pnwo
content: |-
  Victory over Man City marks the Eagles first ever major trophy in their 120-year professional history.

  Fans celebrated the "unbelievable" win against Manchester City on Saturday

  Crystal Palace fans celebrated late into the night following the club's historic FA Cup win over Manchester City on Saturday. The south London side won 1-0, marking the club's first major trophy in its history. Eberechi Eze's 16th minute goal secured the victory, with scenes of ecstasy breaking out among fans across the capital and beyond when the full-time whistle was blown. "It's an amazing day," one fan who was at Wembley told BBC London. "I've supported Palace for 46 years and I don't know if I ever thought I'd see this. "Genuinely the best day of my sporting life."

  "Unbelievable," another added. "I was here 35 years ago for the cup final [defeat by Manchester United]. After winning it now - unbelievable - a really emotional day."

  The FA Cup win marks the first major trophy won by the club

  "The best day of my sporting life," one Palace fan told BBC London

  Families in the stands celebrated an FA Cup win they had been waiting years for

  There was jubilation among Palace supporters who watched the match in south London pubs

  While City dominated possession, Oliver Glasner's side kept the seven-time winners out, with keeper Dean Henderson saving from Erling Haaland, Josko Gvardiol and Jeremy Doku in the first half, then denying Claudio Echeverri after the break. As the club lifted their first major trophy in their 120-year professional history, there were tears of joy in the stands. "I absolutely can't believe it. It's incredible, once in a lifetime," a fan in the crowd said. "When we got our chance to attack, we made it," added another. "I can't believe that we just won that - absolutely incredible."

  The Eagles had lost to Manchester United in both the previous FA Cup finals they had reached

  Another fan told BBC London he couldn't even speak after watching the club win

