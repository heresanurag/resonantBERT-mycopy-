  Outside of the stadium, fans following the match on TV and radio went wild as victory was confirmed. At Croydon's Boxpark, supporters who were watching the game on the big screen launched their drinks into the air when the referee blew the final whistle. "That was epic. I love this team, I love this town," one supporter, who was from Croydon, said. "We cried. But hey, I'm 65. If I cry, I cry." Another added: "Tears that I didn't know I had came out." "If we never win another match again, I don't care now. I'm so happy," a third said. "We don't do this, we don't win trophies. This is surreal. Up the Palace," another said.

  Many supporters dressed up for the occasion

  Tears of joy were seen in the stands as the cup became Crystal Palace's

  Following the match a video of Palace fan Stuart Shave hugging his son in the stands at Wembley at the end of the game went viral on social media. "That's what football's all about," he told the BBC. "That's what it should be sharing those moments with your loved ones and your children. "That will live in me forever. I've experienced three cup finals with Palace, both of them were losses until yesterday. "Maybe that might be the only time I get to share that with my son. I might be gone the next time it happens, and he might be there on his own. It was just a magical moment."

