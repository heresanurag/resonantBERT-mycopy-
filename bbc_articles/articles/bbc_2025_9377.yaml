  Former Eagles midfielder Paul Mortimer told BBC Radio London the win was "huge" for south London. "The strange thing, the last time a south London goalkeeper saved a penalty, the trophy came south," he said. "It's a huge shot in the arm for Crystal Palace and for south London. It just shows there's some quality at Crystal Palace. "There's players there who now know they can win, because they've done it."

  Jamie Willard said he had witnessed the last two failed FA Cup win attempts

  Eagles fans were out in force in Crystal Palace's pubs on Saturday night

  Celebrations went on late into the night

  A day on from the match and a jubilant atmosphere remains around the Crystal Palace triangle. Walking the streets in his red-and-blue Palace scarf was lifelong fan Jamie Willard who said he felt lucky to have attended the match. "It was really really emotional. I've been fortunate that I've been at some of those failed FA Cup attempts beforehand, so you're kind of conditioned - we're really pessimistic, we're not used to winning," he explained. "Everyone around us was just screaming, hugging each other, lots of families in tears, it was just brilliant." And that joy is set to continue with the Eagles announcing that their official winners party is set to take place on 26 May.

  Many fans went into the match believing they were going to win

  The victory was the club's first FA Cup win, having last made it to the final in 2016

  What Crystal Palace, their manager and their players need to be congratulated on is how seriously they've taken the FA Cup right from the get-go, right from playing the likes of Stockport County early doors. Oliver Glasner's played a strong team all the way through and he's been nothing shy of declaring he wants to go far, he wants to win it if he possibly can. That belief that's come from the manager has been extended out on to the pitch. I think there was a growing belief ahead of yesterday that they could win against Manchester City. It's brilliant for football that someone different wins the FA cup. It's brilliant for south London and I think it's given the FA Cup a real boost.

  Mass celebration broke out in the stands as the referee blew the full-time whistle
