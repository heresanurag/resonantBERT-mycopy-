  Residents of Tehran and other Iranian cities told BBC Persian that on Monday night they witnessed one of the "heaviest" rounds of strikes since the conflict started. Israel's prime minister said its forces hit "regime targets" and killed "hundreds" of members of Iranian security forces and the paramilitary Basij Resistance Force. Iranian Health Minister Mohammad Reza Zafarqandi said on Tuesday afternoon that Israeli attacks had killed 107 people and injured 1,300 over the past 24 hours. Gilan's deputy governor general, Ali Bagheri, said nine people were killed and 33 injured in what he described as a "terrorist attack" on a residential building in Astaneh-ye Ashrafiyeh, according to Iranian media. Sixteen women and children were among the casualties, he added, without identifying anyone. Iranian government restrictions mean BBC journalists have not been able to report from inside Iran, so it is difficult to verify the reports. However, night-time videos posted on social media showed a crowd of people walking over a rubble-strewn street towards a large fire. And in a daytime photo received by BBC Persian several damaged buildings and streets covered in debris were visible.

  State TV later confirmed that Mohammad Reza Seddiqi Saber, 50, was among those killed. It said he had been staying at his parents' house after his 17-year-old son was reportedly killed in an Israeli air strike on their home in Tehran several days ago. Last month, the US imposed sanctions on Seddiqi Saber, saying he worked for Iran's Organisation of Defensive Innovation and Research (SPND) and headed a group that worked on explosives-related projects. The US alleged that he was "linked to projects including research and testing applicable to the development of nuclear explosive devices". At least nine other senior Iranian nuclear scientists have been assassinated by Israel since the start of the air campaign, according to the Israeli military. The military claimed on 14 June that the men had "played a central part of the progress towards nuclear weapons" in Iran, without providing evidence. Iran insists that its nuclear programme is entirely peaceful and that it has never sought to develop a nuclear weapon.

  Security on the streets of Tehran during the early hours of the ceasefire

  In another development, Iran's judiciary confirmed that an Israeli air strike on Tehran's Evin prison on Monday had caused casualties. Spokesman Asghar Jahangir did not say how many were killed or injured when part of the administrative building was destroyed. But he did say administrative and judicial staff, visiting civilians, family members of inmates and inmates themselves were among them. Nobel Peace Prize-winning human rights defender Narges Mohammadi - who was temporarily released from Evin on health grounds last year - said on Monday night that the prison infirmary was also "destroyed", and that injured prisoners had no place to be treated. Evin's thousands of prisoners include prominent political dissidents, human rights defenders, journalists, and dual and foreign nationals. Iran's prison authority said it was carrying out transfers "to safeguard the rights of the prisoners and to provide space for emergency response teams". Israel said it bombed Evin as part of a wave of strikes against "regime targets and agencies of government repression" in Tehran. But the UN human rights office said Evin was not a military objective and that targeting it constituted "a grave breach of international humanitarian law". Meanwhile in Israel, four people were killed when an Iranian missile struck an apartment building in the southern city of Beersheba on Tuesday, before the ceasefire took effect. Israeli President Isaac Herzog said the attack was "outrageous and extremely painful".
