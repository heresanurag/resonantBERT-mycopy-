title: Iran nuclear scientist killed in Israeli strike before ceasefire, state TV
  says - BBC News
date: '2025-06-24'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c0m81jg8k4no
content: |-
  The attack in Gilan, hours before the ceasefire, killed nine people, officials and Iranian media say.

  BBC Persian received a photo said to show damaged buildings in Astaneh-ye Ashrafiyeh

  A senior nuclear scientist was among nine people killed in an overnight Israeli strike in northern Iran, Iranian officials and state TV have said, hours before a ceasefire ending 11 days of conflict took effect. State TV cited sources who said the scientist, Mohammad Reza Seddiqi Saber, was killed at his parents' home in Astaneh-ye Ashrafiyeh, in Gilan province. Gilan's deputy governor said four apartments were destroyed by an explosion in a residential building. The Israeli government meanwhile said its military had "eliminated an additional senior nuclear scientist" in recent days, without identifying them.

  That claim came in a statement that said Prime Minister Benjamin Netanyahu's security cabinet had agreed to US President Donald Trump's proposal for a ceasefire with Iran. Iranian President Masoud Pezeshkian said his country would respect the ceasefire if Israel did.

  Trump announced the ceasefire on Monday night and said at 05:00 GMT on Tuesday that it had taken effect, warning both sides not to violate it. He later criticised both countries after Israel's military said it had shot down several incoming Iranian missiles and would carry out a new round of air strikes on Tehran in response. Many Iranians who got in contact with BBC Persian said they doubted the ceasefire would last. "[Iran and Israel] have, in a way, been forced into it at this point," one man said. "If they had the capacity to continue, without a doubt, this wouldn't have happened anytime soon." Another man said: "I believe the whole war was orchestrated. Israel and the US came in and destroyed military and nuclear sites, Iran launched a few missiles... and both sides are satisfied. But ordinary people suffered the most." A woman meanwhile said she feared that a "wounded, humiliated" Islamic Republic would now "turn its anger inward - towards the Iranian people". On 13 June, Israel launched an air campaign against Iran, saying it aimed to remove what it called the "existential threats" of the country's nuclear and ballistic missile programmes. Iran's health ministry has said that Israeli strikes have killed 610 people so far, although one human rights group has put the death toll at 974. Iran has launched missiles at Israel in response, killing 28 people, Israeli authorities have said.

