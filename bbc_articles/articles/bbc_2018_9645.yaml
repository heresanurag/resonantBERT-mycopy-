title: Thailand mural celebrates cave heroes - BBC News
date: '2018-08-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-45029013
content: |-
  The artwork features the rescued schoolboys and those who helped to get them out of the cave.

  The artwork, by national artist Chalermchai Kositpipat, features the people that rescued the schoolboys and coach who were trapped for more than two weeks inside a cave.
