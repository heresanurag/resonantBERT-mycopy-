title: Thousands brave showers for Great North Run - BBC News
date: '2024-09-08'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cx2nr4egxlro
content: |-
  About 60,000 runners signed up for the 43rd event, with began under a flurry of rain showers.

  The 2024 race was off to a foggy and rainy start

  Thousands of people battled through showery conditions in the 43rd Great North Run. About 60,000 runners signed up to the famous half marathon, external which starts in Newcastle, heads through Gateshead and South Tyneside before finishing up in South Shields. The poor weather failed to deter hoards of spectators as they lined the route with umbrellas to cheer on friends and loved ones. Rain and wind were forecast for most of Sunday, with temperatures expected to remain cool.

  Olympic silver medallist Kieran Reilly was the honorary starter for the 43rd event. Some runners donned fancy dress and one group carried a mini model of the Tyne Bridge along the route.

  The elite wheelchair race started off the 43rd Great North Run

  North East mayor Kim McGuinness, Sara Davies from Dragon's Den and Adele Roberts were also taking part.

  North East mayor Kim McGuinness said it was a "privilege" to be on the start line, external. She described it as the "best of our great North East".

  North East Mayor Kim McGuinness was also taking part in the race

  Sara Davies from Dragon's Den said the race was "so much more" than just a run. Ms Davies, who was raising funds for the County Durham and Darlington NHS Foundation Trust, said: "The North East, we get behind our own like nobody's business. You just feel it. "I know people say every run is fantastic, but running along here, everyone chanting at you, singing the songs, it's just what keeps you going."

  Sara Davies was one of the celebrities taking part in the race

  A group carrying a miniature model of the Tyne Bridge was among participants who stood out. The 12-feet-long model weighed 28kg (62lbs), needed runners by its sides to protect competitors from colliding with the structure.

  A model of the Tyne Bridge got a lot of attention

  Derrick Jackson, from Durham, said it was the third time the group had taken part. "The only red arrow you'll see today is on our bridge. It seems to be attracting plenty of attention," Mr Jackson said, referring to the iconic aircraft which was missing from the opening flypast of the race. Sarah Temple and Craig McMurough travelled from Cambridge and dressed as ovaries to raise funds for cancer charity Ovacome.

  Sarah Temple and Craig McMurough came for the race from Cambridge

  It was the 15th time Mr McMurough, who lost his sister to ovarian cancer eight years ago, had taken part in the run. "It's just the best race in the world. That's why I keep coming back," he said.

  Vaughan Armstrong, from Dorset, took part in the run for the 21st time. He was raising funds after his wife was diagnosed with cancer for a third time.

  Vaughan Armstrong said the support during the race was fantastic

  "Wow, what a place, what a run. The atmosphere is amazing," he said. "The people all the way down the sides of the streets are absolutely fantastic."

  The elite wheelchair race started at 10:25 BST, followed by the elite women and visually impaired, with the main race kicking off just before 11:00 BST.

  The men's race was won by Abel Kipchumba in 59:52, with Mary Ngugi-Cooper crossing the line first in the women's competition with a time of 1:07:40. Jade Hall won the women's wheelchair race in 58:26 and Johnboy Smith won the men's contest in 48:59.

  Over on South Shields beach, artist Claire Eason and the Soul 2 Sand team had etched and raked a good luck message in sand to the runners ahead of the race. "Just keep gannin', howay the lads and lasses!", it read. Entrepreneur Lines Behind, who collaborated on the project, offered a "gentle and Geordie reminder to enjoy every minute".

  Artists Claire Eason and the Soul 2 Sand team etched and raked a good luck message in sand to the runners

  Drivers were warned to plan ahead for their journeys with a series of road closures in place, including a key section of the M62 in Greater Manchester.

  Roads including the A167(M), Newcastle Central Motorway A167(M), the A167 and the A194 were also closed. You can find the full list of road closures here, external.

