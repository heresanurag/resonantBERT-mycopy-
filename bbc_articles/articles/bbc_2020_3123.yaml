title: 'Budget 2020: Chancellor to unveil plans amid coronavirus pressures - BBC News'
date: '2020-03-11'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-51827647
content: |-
  Chancellor Rishi Sunak will present plans to deal with the outbreak in his first Budget.

  Chancellor Rishi Sunak is preparing to unveil his first Budget amid continued pressure from the coronavirus outbreak.

  Mr Sunak will present his economic plans to MPs in the Commons at 12:30 GMT, less than a month after taking over at the Treasury.

  But the economic challenge posed by the virus is still expected to dominate.

  The Bank of England has announced an emergency cut in interest rates from 0.75% to 0.25% in a bid to support the economy during the virus outbreak.

  Speaking at the cabinet meeting ahead of the Budget, Mr Sunak said his plan would make the UK "one of the best placed economies in the world to manage the potential impact of the virus".

  The number of coronavirus cases in the UK reached 382 on Tuesday, a rise of 63 since the previous day, with a sixth person confirmed to have died after contracting the virus.

  Mr Sunak has previously said the NHS will get "whatever resources it needs" during the crisis and that he is looking at extra financial help for individuals and businesses who are left out of pocket.

  The Budget also comes in a week in which shares around the world - already hit by fears about coronavirus - suffered some of their biggest falls since the 2008 financial crisis.

  Dubbed "Black Monday", indexes tumbled as a row between Russia and Saudi Arabia saw oil prices plunge, with declines in London wiping some £125bn off the value of major UK firms.

  Figures released by the Office for National Statistics found that the UK economy did not grow at all in January.

