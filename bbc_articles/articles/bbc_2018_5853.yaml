title: 'World Cup 2018: Being black in Russia - BBC News'
date: '2018-05-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-44253936
content: |-
  Less than 1% of Russia's 144 million people are black. What is life like for them?

  Russia has a population of 144 million people but only 70,000 of them are black.

  Over the years, human rights organisations have reported numerous racist attacks.

  What is life like for those who are black and Russian, especially ahead of next month's World Cup and influx of foreign visitors?
