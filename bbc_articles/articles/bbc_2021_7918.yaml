title: 'Euro 2020: Scotland fans return home from England game - BBC News'
date: '2021-06-20'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-57541883
content: |-
  The Tartan Army is returning home with some even helping to clean up London's Leicester Square.

  Scotland drew 0-0 with England in the game at Wembley, meaning they can still qualify for the next round of the tournament.

  Many fans spoke of the welcoming atmosphere and some even helped to clean up London's Leicester Square.
