  "Trump is active. He's energetic. But will he do anything?" wonders Irina. "We dream that these negotiations will bring peace. It's a first step. And maybe this will help our economy. Food and other goods keep going up in price here. That's partly because of the special military operation [the war in Ukraine] and the general international situation." Putin and Trump have spoken on the phone; their two teams have met in Saudi Arabia; a presidential summit is expected soon. But a few days ago the newspaper Moskovsky Komsomolets tried to imagine what the two leaders had said to each other during last week's phone call. They came up with this rendition: 'Vladimir! You've got a cool country and I've got a cool country. Shall we go and divide up the world?' 'What have I been saying all along? Let's do it!...."

