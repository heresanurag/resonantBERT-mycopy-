  He said his daughter was open-minded, smiling all the time and someone with "big opinions".

  "I want to be with her [for] more time but someone decided I could not be," he said.

  Ms Maasarwe's sister, worried about Aiia, is reported to have called Australian police around the same time the body was found on Wednesday morning outside a shopping centre.

  In their previous call, she had "heard the sound of the phone falling to the ground and heard some voices", Insp Stamper said.

  Ms Maasarwe was a student of Chinese and English at a university in Shanghai, her uncle, Abed Katane, told Israeli media. She was on an exchange programme at La Trobe, he said.

  "She was an excellent student, full of life. She wasn't in a very dangerous country at all, and yet we are still receiving such a painful message," Mr Katane told the Haaretz newspaper.

  The Israeli embassy said it would assist with returning Ms Maasarwe's body to Israel.

  A black cap emblazoned with "1986" and a grey t-shirt were found near the crime scene, and were being forensically tested. Police also scoured CCTV footage for clues.

  Flowers have been left at the scene where the body of the Israeli student was found

  Last June the killing of 22-year-old comedian Eurydice Dixon also generated much public anger. Ms Dixon was raped and killed while walking home after a performance in Melbourne.

  That followed a similar case in 2012, when Irish woman Jill Meagher was raped and murdered in Melbourne's inner north while walking home - prompting mass rallies to remember her and raise the issue of women's safety.

