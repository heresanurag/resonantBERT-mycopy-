id: bbc_2019_542
title: 'Aiia Maasarwe: Arrest over killing of Israeli student in Melbourne - BBC News'
date: '2019-01-18'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-46914422
content: |-
  Israeli student Aiia Maasarwe was attacked while on the phone to her sister, police say.

  Police released these images of Aiia Maasarwe, taken on the night she was killed

  A man has been arrested over the killing of a 21-year-old Israeli student in Melbourne, Australian police say.

  The body of Aiia Maasarwe, 21, was found near La Trobe University in the city's north. She had taken a tram home late on Tuesday after a comedy show.

  She was attacked while speaking on the phone to her sister, authorities said.

  A 20-year-old man was arrested in a nearby suburb on Friday.

  Victoria Police did not immediately provide further details but thanked the public for their help.

  Earlier, detectives said they were not ruling out the possibility that Ms Maasarwe had been sexually assaulted before her killing.

  "Our presumption at this stage is that this was a random attack and opportunistic," Inspector Andrew Stamper told reporters on Thursday.

  The killing has caused widespread outrage in Australia, sparking renewed anger and debate about violence against women.

  On Friday evening, thousands of people took part in a vigil on the steps of the state parliament in central Melbourne. Earlier, hundreds gathered at La Trobe University to remember Aiia.

  Ms Maasarwe was on an exchange programme at La Trobe University

  Her father Saeed Maasarwe, who travelled to Australia from Israel, attended both vigils. He expressed gratitude for the support his family had received from the community and police.

  "I am sad because this is the last place my daughter was," he said.

  "I wish, I hope, I pray she is now is in a more nice place than this place and in the paradise."

