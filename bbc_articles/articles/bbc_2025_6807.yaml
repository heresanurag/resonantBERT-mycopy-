content: |-
  Hull Kingston Rovers withstand a stirring fightback by 12-man Hull FC to win the derby and extend their lead at the top of Super League.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Hull KR took advantage of Cade Cust being shown the first red card of the Super League season to beat Hull FC in a pulsating derby. The Australian stand-off was sent off for a shoulder barge to the face of Arthur Mourgue after 16 minutes, with league leaders KR in front through an Oliver Gildart try in the meeting of the top two. The Robins took advantage as Peta Hiku and Arthur Mourgue seemed to put them firmly in control, with Jack Ashworth providing the Black and Whites' only response. Hull FC defied the odds in the second half to storm back through brilliant scores from Tom Briscoe and Jordan Rapana to go within two points, but as they tired KR fired up the engines again to ease away through tries from James Batchelor and Jared Waerea-Hargreaves.

  Last year there had been seven dismissals by this stage of the season, so the fact referees had been able to keep their red cards in their pockets was a huge boost to the sport and its safety record. Official Luke Moore had no option however, as Cust, clearly fired up by the occasion in front of Hull FC's biggest attendance for 15 years, shoulder-barged Mourgue's head as the France full-back fielded a kick behind the posts. At that point the Robins were already in front as Mikey lewis, back from injury, showed his magical qualities with a sharp break and slick pass that sent Gildart running clear. With more than three-quarters of the game left Cust's rush of blood gave KR a huge advantage and they used it as Joe Burgess sent Hiku over after an overload down their left. Ashworth gave the home fans in the sell-out crowd something to cheer as he sprinted to grab Aidan Sezer's grubber kick before two defenders, but Mourgue, back from a head injury assessment following Cust's challenge, scampered over to give his side a 12-point half-time lead. The Black and Whites were clearly fired up in the second half and threatened to produce one of the great comebacks as they threw the ball around with brilliant abandon, with Rapana setting up Briscoe for an excellent take and finish. Hull FC even had two successful Captain's Challenges as the video ref spotted KR players ripping the ball out, and from the second the pumped-up home side went within two points, as Rapana finished another fast passing move to swerve inside and score. KR looked rattled and the home crowd was bouncing, but Hull FC's efforts soon began to tell and Rovers pounced as their opponents tired. They responded with some champagne rugby of their own, keeping the ball alive, with James Batchelor, back from injury, carving inside to dash over and extend the lead. Waerea-Hargreaves, due to retire at the end of the season, capped off the win by grabbing the ball and providing an aerial finish after Hiku had knocked back Lewis' high kick.

  Peta Hiku (second right) celebrates his try for Hull KR on their way to victory in the Hull derby

  "It is a different set of circumstances when you're playing 13 on 12. You've pretty much got to try and hang on and keep the scoreboard close. To be in with the chance to win the game in the second half, [it was a] magnificent effort. "There were a couple of things that really went against us... after the Cade Cust incident I think there were some punches thrown, and players were really vocal with the referee. "Johnny [Asiata] tackled the kicker, nurses him to the ground, they get a penalty 60 metres down field. Liam Knight got taken off the ball when he was tending to pick it up. Both those incidents really hurt us." [On the red card] "I do have a problem in general with the red card, if it's not intentional or its not a swinging arm, knee or elbow, I think Cade was going very hard for the ball and didn't have much time to pull out of it. "If there is any doubt at all I wish they would just refer it, even sin-bin."

  "Credit FC, they were outstanding, they pushed us to the end and dead set it could have gone either way. "What pleased me was the ability of our players to go to another level in the last 20 minutes because we needed to. "People say you get a lot of learnings from losing, you get a lot of learnings from games like that as well. "We didn't have a lot of flow in the game. We like to have flow, and set for set there were a lot of stoppages. There was a lot of attrition in the game, it was stop-start, and whoever won those shorter blocks, that's who came out on top."
