  The third film hits cinemas this November - with Olivia Colman joining the cast.

  First trailer for third Paddington film revealed

  The first trailer for Paddington in Peru has been revealed. The third film in the franchise follows Paddington's return to Peru to find Aunt Lucy, who has escaped from the Home for Retired Bears. The first two were based in London, after he had fled Peru because of his home being destroyed by an earthquake. Ben Whishaw will again star as the voice of the marmalade-loving bear, with Aunt Lucy still voiced by Imelda Staunton. But Sally Hawkins has handed the role of Mrs Brown to Emily Mortimer. Announcing her departure, Hawkins said she "loved" her time making the first two films but it was "the right time to hand the reins over to another", adding: "One can't get much better than the truly wonderful Emily Mortimer - she is extraordinarily special."

