  Another addition to the cast, Olivia Colman, stars as a guitar-playing nun who works at the Home for Retired Bears. She tells Paddington and co that Aunt Lucy is "on some sort of quest". He then embarks on a mission to find her, with the help of a boat captain, voiced by another newcomer, Antonio Banderas. Dame Julie Walters returns as Mrs Bird, in her first film role in three years. In 2020, Walters told BBC News she had been diagnosed with stage-three bowel cancer. Last year, she had to pull out of filming forthcoming Channel 4 drama Truelove because of severe back pain, to be replaced by Lindsay Duncan. Paddington in Peru hits UK and Irish cinemas on 8 November.
