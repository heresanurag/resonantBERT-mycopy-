title: Former Birmingham shoplifter on how drug addiction fuelled thefts - BBC News
date: '2025-06-04'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c70nd977kdko
content: |-
  Keeley Knowles shoplifted to fuel a heroin addiction but says a police project helped save her life.

  Keeley Knowles works alongside the Offending to Recovery programme and does outreach work with drug users

  For nearly three decades Keeley Knowles' life consisted of shoplifting thousands of pounds worth of goods to fuel her heroin addiction. Previously known as "Birmingham's most prolific shoplifter", Ms Knowles had been to jail 28 times but is now 18 months clean and on a mission to give addicts hope. "I have no doubt in my mind that I would have died," she said. "I thought I was unfixable." Her saving grace, she explained, was West Midlands Police's Offending to Recovery programme, which is being expanded into Coventry, Dudley, Walsall and Wolverhampton.

  Ms Knowles now works alongside the programme, doing outreach work with drug users and gives talks on the opioid treatment drug Buvidal.

  Keeley Knowles (centre), pictured with two police officers she works with, started using heroin at the age of 13

  "Every day would roll into one, I would get up with a shop in mind and target it," said Ms Knowles, now 42. "Once I'd spent the day doing that I'd sell what I stole, score and spend all night doing drugs until the next morning and do it all over again."

  The Offending 2 Recovery, external programme started work in 2018 in Erdington, Birmingham, in response to research that revealed addiction to drugs drove as much as 50% of all acquisitive crime in the area. The findings also estimated 70% of shop theft was committed by people struggling with addiction to heroin and crack cocaine.

  Former addict Keeley Knowles (left and right) credits the Offending 2 Recovery programme for helping her transform her life

  The programme offers a free, tailored support service focused on treating addiction to break the link between crime. It is funded by local authorities, businesses and the West Midlands police and crime commissioner. Det Ch Insp Katy Chapman, from West Midlands Police, said the programme has already received a positive reception in Coventry. "We're six months in and seeing the great impact with businesses being able to refer people directly to the scheme," she said. "It builds confidence with our communities ...we want to look for other solutions in order to deter people from doing these crimes and turning them around so they don't continue to offend." Back in Birmingham, Ms Knowles continues to tell her story to show others it is not too late. "I was seen as unfixable, too far gone but they don't look at you like that. "I recently won the National Business crime solutions award and I've reconnected with my family, I'm now able to be an aunty. "I thought no-one could help me but they did, so don't write yourself off," she said.

  If you, or someone you know, have been affected by any of the issues in this story you can find help and support via BBC Action Line.

