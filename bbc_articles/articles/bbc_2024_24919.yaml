title: Entire conference 'in shock' at Alex Salmond's death - organiser - BBC News
date: '2024-10-13'
section: General
url: http://www.bbc.co.uk/news/videos/cwyl0qp0qg8o
content: |-
  Mark Donfried said "time stood still" when the former SNP leader collapsed at a conference in the Balkans.

  A youth conference organiser who witnessed Alex Salmond collapse at a leadership event in North Macedonia said "time stood still".

  Mark Donfried of the Academy for Cultural Diplomacy said the former first minister was caught by a fellow delegate as he collapsed at a lunch event.

  Speaking from the city of Ohrid in the Balkan country, Mr Donfried said the event was cancelled as paramedics tried in vain to resuscitate Salmond.

  "We are all still in a state of shock and that is not something we can easily move forward from."
