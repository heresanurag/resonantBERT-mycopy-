  During a Commons debate on the ruling on Monday, Education Secretary Bridget Phillipson welcomed the "added clarity" of the ruling and said the government would work to "protect single-sex spaces based on biological sex". But Badenoch attacked Labour ministers' previous record, accusing them of being "so desperate to jump on a bandwagon that they abandoned common sense". "I know what a woman is and I always have," she said. "The people of this country know what a woman is. "We didn't need the Supreme Court to tell us that - but this government did." Badenoch added: "The idea that they have supported this all along is for the birds... They have never said this before, this is a U-turn, but we welcome it." Earlier, Phillipson was pressed over whether a trans woman should use a women's toilet or a men's toilet. "That should be on the basis of biological sex - that would apply right across the board to all single-sex provision," she told BBC Radio 4's Today programme. "But the EHRC [Equality and Human Rights Commission] will be setting out additional guidance and a statutory code of practice because we need to make sure that everyone has the ability to access services that are safe and appropriate and respect their privacy and dignity." Phillipson added that "many businesses have moved towards unisex provision or separate cubicles that can be used by anyone". Asked whether there was unity in the Labour Party about this issue, she replied: "I speak for the government on this matter and I can be crystal clear with you that we welcome the ruling."

  Many Labour MPs will be uneasy about the comments from Sir Keir and Phillipson, although frustration did not seem to extend to being willing to criticise the government, but instead expressing concern about anxieties within the trans, non-binary and intersex community. In the debate following Phillipson's statement, Labour's Emily Thornberry said LGBT helpline calls had "skyrocketed in recent days" and highlighted that "the overwhelming threat to women and to all of the trans community is the violence that we suffer from cis men". Nadia Whittome pointed out that a ban on trans women using women's toilets, or trans men using men's toilets, would leave them using facilities they "would not feel comfortable or safe in". Liberal Democrat women and equalities spokeswoman Christine Jardine warned the ruling threatened the human rights and security "of another vulnerable group in society" and questioned where trans people should now seek refuge. Women and Equalities select committee chair, Labour's Sarah Owen, said the judges made their decision "without a single contribution from trans people" and won a commitment from Phillipson that trans "stakeholders" would be involved in the creation of upcoming guidance. Some MPs who have campaigned in support of trans rights pointed to commitments in Labour's general election manifesto to introduce a "trans-inclusive ban on conversion practices" as well as to "modernise, simplify, and reform" gender recognition law. Those are still Labour Party policies, as far as we are aware, but any sign of backsliding on that and this debate may again become a tense one within Labour's ranks. Correction: This article originally said that the ruling means that transgender women with a gender recognition certificate (GRC) can be excluded from single-sex spaces if "proportionate". However this is inaccurate and so this line has been removed from the story.

