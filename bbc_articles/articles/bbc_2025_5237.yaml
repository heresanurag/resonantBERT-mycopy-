  Ex-Fifa head Sepp Blatter and French football great Michel Platini were cleared in 2022, but prosecutors appealed.

  Blatter and Platini back in court in Swiss Fifa fraud case

  Sepp Blatter and Michel Platini are facing Swiss justice for the second time in less than three years

  Former Fifa president Sepp Blatter and French football legend Michel Platini are back in court in Switzerland to face accusations of fraud. In 2022, the pair were acquitted in a trial over a payment of 2m Swiss francs (£1.6m) made to Platini and authorised by Blatter in 2011. Both men denied wrongdoing and said the transfer was belated payment for Fifa advisory work by Platini, who formerly led European football's governing body Uefa. But the Swiss federal prosecutor appealed against the decision. The new trial is expected to last until Thursday, with a verdict due on 25 March.

  The pair appeared before an appeals court in Muttenz, near Basel, on Monday. Blatter, 88, reaffirmed that he was innocent. "When you talk about falsehoods, lies and deception, that's not me. That didn't exist in my whole life," he told the court. A lawyer for Platini, 69, said the lower court that acquitted the pair in 2022 had been "right to find that the disputed payment of 2m francs was lawful". Platini had an illustrious playing career and is a three-time winner of the Ballon d'Or - Europe's highest individual football award. He captained France to victory at the 1984 European Championship and won the 1985 European Cup with Juventus. He went on to coach the French national team and became Uefa president in 2007. In 2015, prosecutors accused the pair of deceiving Fifa about payments made to Platini. In his testimony at the first trial, Blatter said that he had asked Platini to work as his adviser in 1998. He added that at the time, Fifa could not afford the 1m Swiss francs annual fee requested by Platini. They instead settled on partial payment, with the outstanding balance to be paid at a later date. Platini said during the trial: "I trusted the president, and knew he would pay me one day." He stopped working for Fifa in 2002 but initially did not pursue the payment as he told the court he had not needed the money at the time, and - according to Blatter - Fifa was "broke". In January 2011, however, Platini felt he was in a position to send an invoice and the money was paid after approval by Blatter. Following an investigation launched in 2015, Swiss prosecutors accused Blatter and Platini of forgery and fraud. Also in 2015, Fifa suspended both men from football for ethics breaches - originally for eight years, although their exclusions were later reduced. In 2022, Switzerland's federal criminal court in Bellinzona cleared the two after accepting their account of a "gentlemen's agreement" for the payment. Swiss businessman and sports administrator Blatter joined Fifa in 1975, became general secretary in 1981 and then president of world football's governing body in 1998. He remained in the role for 17 years until resigning amid corruption investigations. Platini later withdrew his own candidacy for president.
