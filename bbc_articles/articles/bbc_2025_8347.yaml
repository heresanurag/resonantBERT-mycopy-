title: Nemanja Matic says Andre Onana is 'one of Manchester United's worst goalkeepers'
  - BBC Sport
date: '2025-04-09'
section: Europa League
url: http://www.bbc.co.uk/sport/football/articles/c5y666nwyp9o
content: |-
  Nemanja Matic responds to Andre Onana's claim Manchester United are "way better" than Lyon, labelling him as one of the club's worst ever goalkeepers.

  Andre Onana (left) joined Manchester United in 2023, a year after Lyon midfielder Nemanja Matic (right) left Old Trafford.

  Former Manchester United midfielder Nemanja Matic has labelled Andre Onana as "one of the worst goalkeepers in the club's history". Serbian Matic, 36, was asked about Onana's comments from earlier this week that United were "way better" than French club Lyon as the two sides prepare to meet in the Europa League quarter-finals. Speaking at Wednesday's news conference, Lyon's Matic, who played for United from 2017-2022, said: "You know, I respect everyone but to say that then you need to give the answer. "If you are one of the worst goalkeepers in Man United's history, you need to take care what you're talking about. "If it was [Edwin] Van der Sar, [Peter] Schmeichel or [David] De Gea saying that, then I would question myself. But you need to have cover to say something like that." In reply to Matic, Onana then posted on social media to deny he was being disrespectful. "I would never be disrespectful to another club. We know that tomorrow will be a difficult game against a strong opponent," Onana said on X. "We focus on preparing a performance to make our fans proud. "At least I've lifted trophies with the greatest club in the world. Some can't say the same." Matic made 128 appearances for the Red Devils and joined Ligue 1 side Lyon in 2024 after spells at Rennes and Roma. He won the Premier League twice, plus the FA Cup and EFL Cup in a four-year spell at Chelsea. Onana signed for £47.2m from Inter Milan in 2023 and has won the FA Cup at Old Trafford, keeping 23 clean sheets in 93 appearances. The Europa League is the final opportunity for Ruben Amorim's side - currently 13th in the Premier League - to save a disappointing season.

