title: 'Hong Kong: Roads collapse and streets flood - BBC News'
date: '2023-09-08'
section: General
url: http://www.bbc.co.uk/news/world-asia-66749451
content: |-
  Hong Kong and southern China have been hit with some of the heaviest rainfall on record for the region.

  Streets and buildings in Hong Kong and southern Chinese cities have been hit with intense flooding after some of the heaviest rainfall on record.

  Vehicles have been abandoned and submerged in floodwaters and landslides have swept across roads.

  The latest flooding comes less than a week after two typhoons hit southern China.
