title: Subway commuters scrub anti-Semitic graffiti - BBC News
date: '2017-02-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38888769
content: |-
  A group of commuters raided their bags and pockets to clean racist graffiti from a New York subway car.

  Gregory Locke was one of them, and spoke to BBC World Have Your Say.
