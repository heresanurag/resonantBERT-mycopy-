title: Checkmate for Russia as global chess ban upheld - BBC News
date: '2024-09-22'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0kjgxj40y1o
content: |-
  Russia's chess team is to remain banned from international competitions, officials have ruled. In a dramatic move, an International Chess Federation (Fide) general assembly meeting in Budapest voted to maintain sanctions against Russia and its ally, Belarus. Both countries were kicked out of the federation after Russia invaded Ukraine in February 2022. Those supporting the move say chess in Russia is controlled by Vladimir Putin, with people including the Kremlin spokesman, Dmitry Peskov, sitting on the board which runs the game domestically.

  A majority of delegates in Budapest voted in favour of a motion to conduct consultations with the International Olympic Committee (IOC) regarding the possibility of lifting some restrictions against children and vulnerable groups. However, bans against the Russian national team, officials, flag and anthem in international competitions will remain. The final decision now rests with the federation's strategic body, the Fide Council, which is unlikely to overturn the results of the ballot. Malcolm Pein, head of the English Chess Federation, told the BBC the result was a “crushing defeat” for Russia. “There is no doubt that many delegates feared consequences for the governing body’s relationship with the IOC if policy diverged,” he said.

  Sixty-six countries supported the motion, with 41 opting for a third option - that all restrictions should remain in place. Just 21 countries voted to lift sanctions. As well as Russia and Belarus, they included several former Soviet republics and other Russian allies in Africa and Asia. The highly anticipated vote was seen as a test of Western resolve to maintain pressure on Russia in culture, sport and diplomacy. Before voting began, Ukraine called on delegates to reject the proposal to lift sanctions. "It’s a victory for Ukraine," the Ukrainian Chess Federation's Viktor Kapustin told the BBC. "This vote means that Russia does not have enough support that they assumed they had," he added. "Russia is an aggressor and invader, and the aggressor must be punished in all spheres of their life, including sport. It's important to keep the sanctions, or even strengthen them. For them to recognise their crimes." Russia said politics should be left out of chess and urged other representatives to vote to lift all sanctions. Kyiv was supported by England, Scotland, Wales, the US, France and many other western nations. The IOC, with which Fide is affiliated, had also recommended that the organisation comply with an earlier decision by the Olympic body that sanctions against Russia in sport remain in place. Following Moscow’s full-scale invasion in 2022, Fide voted to ban the Russian national team and officials from competitions. In a separate move, a Fide commission applied sanctions to the Russian Chess Federation (CFR) last June, excluding it for two years for “bringing chess into disrepute" and violating the international organisation's principles. It found that the Russian federation had organised tournaments in areas of Ukraine illegally occupied by Russian forces and reprimanded Fide's Russian president for his membership of the CFR board. Earlier this month, the ban was commuted to a €45,000 (£37,700) fine and the reprimand cancelled, a move which was criticised by Ukraine and its allies. Ex-defence minister Sergei Shoigu and Kremlin spokesman Dmitry Peskov, who are both under international sanctions, are also CFR board members.
