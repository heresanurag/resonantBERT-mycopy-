  GB's mixed Nacra 17 silver was more straightforward, with Italy staying well placed behind Gimson and Burnet to ensure the British pair, the 2020 world champions, did not do enough to wipe out their advantage. Germany stayed third overall to take the bronze. Gimson is competing in his first Olympics at 38, after seeing his then class dropped following Beijing 2008 (Tornado) and London 2012 (Star). "It's been a tough 20 years," he said. "The second time [after 2012] I'd sold my house just to be able to compete. At that point I was questioning my life decisions, but it was all worth it." Burnet added: "It's a huge relief. I think there's no-one in sport who deserves an Olympic medal more than John and I'm so happy I could help him achieve it." Earlier on Tuesday, Mills and McIntyre ended their opening series with a third and a ninth to give them a 14-point lead in the women's 470 and guarantee a medal. Racing with Saskia Clark, 33-year-old Mills won gold at Rio 2016 and silver at London 2012. Another two top-10 finishes saw Luke Patience and Chris Grube maintain hope of a medal in the men's 470. They sit in fifth place, nine points off third, heading into the medal race on Wednesday (06:33 BST), with the women's race to follow (07:33).

