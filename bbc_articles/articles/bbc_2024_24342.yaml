title: Asos shoppers hit out at new £3.95 returns charge - BBC News
date: '2024-09-09'
section: Business
url: http://www.bbc.co.uk/news/articles/ce9zlrmp2y7o
content: |-
  The company said it was introducing a charge for customers with a "frequently high return rate".

  Asos shoppers hit out at new £3.95 returns charge

  Asos emailed customers over the weekend about the change

  Asos customers have reacted with anger over a new rule charging them for returns if they do not keep a certain amount of their order. Some customers received an email over the weekend saying they had been identified as having a "frequently high return rate". Such customers will now have £3.95 deducted from their refund if they keep less than £40 worth of items. Asos has not said what constitutes a high return rate, but claimed "nothing's changed" for the majority of its customers.

  "We’re making this change so that we can continue offering free returns to all our customers," the company told the BBC. "For a small group of UK customers with a frequently high return rate whose shopping habits make offering them unconditional free returns unsustainable, they can still get free returns when they keep £40 or more of their order." The retailer said customers signed up to Asos Premier will get free returns if they keep at least £15 of their order. The threshold for free returns was launched for Asos customers in France, Germany and the US earlier this year.
  • None Asos going out of fashion as losses widen

  Sowda, from London, is a regular customer of Asos but said the change would "definitely" make her less inclined to buy there. "The point of online shopping is that it is a risk but you can claim all your money back if you’re not satisfied," the 22-year-old said. "Although £3.95 is not a hefty sum, that could add up over the year and it’s a waste of money." She added that Asos was "notorious" for its inconsistent sizing. "Just recently I got the same jeans three times to finally get the right fit," she added. "I would never have been that committed to the jeans if there was a £3.95 fee every time I sent them back."

  One customer named Charlotte wrote on X, formerly Twitter: "The problem for large returns is the fact half of your stock is ill fitting and poor quality. "I’ll take my custom somewhere else."

