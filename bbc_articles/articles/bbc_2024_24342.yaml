  Kayley Cornelius, a media analyst, said the popularity of Asos among influencers and online content creators could be a factor in the company's decision to charge some customers for returns. "It’s common to see influencers doing huge 'hauls' where they spend hundreds of pounds and then decide on camera what they’re keeping or returning," she said. "Regular shoppers probably followed suit, leading to an influx of returns after the initial purchase, which might have forced Asos to tighten their return policy to make people think more carefully before buying."

  Online-only clothes shops like Asos have faced challenges with the rate of returns normalising, rising competition from ultra-fast fashion brands like Shein, and customer budgets being squeezed due to the higher cost of living. Earlier this year, PrettyLittleThing (PLT) was criticised by customers who had their accounts deactivated because of the number of times they returned items. It came shortly after PLT introduced a £1.99 fee for returns, including for those members of its "royalty" service. Last year, fashion giant H&M backtracked on a similar policy after criticism. Asos said in a trading update last week that it had made improvements to sizing and how clothing and accessories are displayed on product pages. Last week, Asos announced it was selling the majority of its stake in the Topshop and Topman brands for £135m.
