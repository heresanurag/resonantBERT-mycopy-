title: Liam Payne's family criticises media for 'indescribable damage' - BBC News
date: '2025-03-02'
section: Culture
url: http://www.bbc.co.uk/news/articles/czrnv5g6lkjo
content: |-
  The star's family says speculation over his death last year caused 'indescribable, lasting damage'.

  Liam Payne died last October at the age of 31

  The family of pop star Liam Payne have criticised the media for causing "indescribable, lasting damage" through its coverage of his death. In a statement released on Sunday morning, the family said that persistent "attention and speculation" in the press had exacerbated their suffering, and that of Payne's young son, Bear, in particular. "The family has always wished for privacy to grieve and asks that they be given the space and time to do so," they added. Payne died last October after falling from a balcony at the CasaSur Palermo Hotel in Buenos Aires, the capital of Argentina. He was 31 years old.

  The family's statement came after Argentinian authorities dropped manslaughter charges against one of Payne's friends, Rogelio "Roger" Nores, and two members of staff at the hotel. Two other men still face charges of supplying drugs to Payne on the night he died.

  On Saturday, the Brit Awards paid tribute to the star, with an emotional segment led by Jack Whitehall, who was one of Payne's friends. "He achieved so much in the short time that he was on this earth, and was not only a supremely gifted musician but an incredibly kind soul who touched the lives of everyone he came into contact with," said the comedian. "We have so many amazing memories of Liam here at the Brits, so tonight we celebrate his legacy and look back and remember the remarkable Liam Payne." The screens then cut to a moving montage of the singer, comprising sound-bites, portraits and performances - set to the One Direction song Little Things. In their statement, the star's family said they had "joined in" with the celebration of his life.

  "Liam's death was an unspeakable tragedy. This is a time of tremendous grief and pain for those who knew and loved him. Liam ought to have had a long life ahead of him. Instead, Bear has lost his father, Geoff and Karen have lost their son, Ruth and Nicola have lost their brother and all of Liam's friends and fans have lost someone they held very dear. "We understand that the investigation into Liam's death was absolutely necessary, and the family recognises the work done by the Argentinian authorities. However, the family accepts the Court of Appeal's decision to drop all charges. "The constant media attention and speculation which has accompanied the process has exacted indescribable, lasting damage on the family, particularly on Liam's son who is trying to process emotions which no seven-year-old should have to experience. "The family has always wished for privacy to grieve and asks that they be given the space and time to do so. "This weekend, at the Brit Awards, Liam was remembered for his phenomenal contribution to British music and for his wider, positive impact on millions of adoring fans the world over. We joined in that celebration of his life and will forever remember the joy that his music brought to the world. "Liam, you are so loved and missed."
