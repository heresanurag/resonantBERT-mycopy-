title: 'Ed Miliband: Trump presidency ''not normal times'' - BBC News'
date: '2017-01-27'
section: General
url: http://www.bbc.co.uk/news/uk-politics-38766036
content: |-
  The former Labour leader Ed Miliband says Donald Trump's first week as president has been "dizzying".

  Donald Trump's first week as president has been "dizzying" and "not normal times", according to Ed Miliband.

  Speaking to BBC Newsnight's Kirsty Wark, the former Labour leader criticised Prime Minister Theresa May for aligning herself too closely with Mr Trump's policies.
