title: Flintshire mum can't register new baby with GP over boundary change - BBC News
date: '2024-08-13'
section: Wales
url: http://www.bbc.co.uk/news/articles/c39k1ywxpmko
content: |-
  Jordan Wynne hasn't been able to get her new baby registered at any GPs in Wales.

  Mum can't register baby at GP after boundary change

  Jordan Wynne has been unable to find any GP surgeries in Wales for her daughter

  A new mum has been unable to register her baby daughter at her local GP surgery after changes to its catchment boundary. Jordan Wynne, 31, from Saltney Ferry, Flintshire, received all her maternity care and midwife referral from Saltney surgery, where her older daughter is also registered. But when she tried to register baby Stormi, she was told her home a mile away was outside the surgery's catchment and it was not accepting new patients. The surgery has been approached for comment.

  As she is not in the catchment for any other surgery in Deeside, she has been unable to register her daughter at any GP in Wales. Councillor Jason Shallcross helped Stormi get a place at Lache surgery over the English border in Chester, but Ms Wynne said while the surgery was "sympathetic" it had told her the arrangement was temporary as she did not live in its catchment. Stormi has had to be readmitted to hospital twice since her birth four weeks ago with an eye infection and reflux. "It has been so stressful," said Ms Wynne. "I feel like all I've done the past four weeks is try to find a doctor for my baby when I should be enjoying being with her. They have all turned me down."

  A surgery over the Welsh border in Chester has taken Stormi as a temporary patient

  Other residents on Ewart Street and nearby North Street have also been affected by the boundary issue. Mr Shalcross and another Saltney councillor, Richard Lloyd, said they were pleased the situation had been resolved for now, but there needed to be a solution for residents. "We don’t want any of our residents to go through what Jordan and her family have experienced trying to register their new born baby at the local medical practice," they said. The Saltney surgery, which is part of the Stables Medical Practice in Hawarden, has been asked to respond. Betsi Cadwaladr health board director of primary care contracting and commissioning Lynne Joannou said: "We understand that residents in Saltney Ferry have had issues with gaining access to local GP services and we are sorry that this is the case. "We are working with partners to review the situation to ensure there is access for local residents." The Welsh government said: "No patient in Wales should be without access to a GP." The NHS has been approached for comment.
