title: 'Kirk Douglas: Tributes paid to ''unforgettable'' Hollywood ''icon'' - BBC
  News'
date: '2020-02-06'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-51398105
content: |-
  Stars join Michael Douglas and Catherine Zeta-Jones in paying their respects to the movie legend.

  Michael Douglas and father Kirk Douglas after the Oscars in 2009

  Kirk Douglas has been remembered as an "unforgettable" actor and a film "icon" following his death at the age of 103.

  His daughter-in-law Catherine Zeta-Jones led the tributes, writing: "To my darling Kirk, I shall love you for the rest of my life. I miss you already."

