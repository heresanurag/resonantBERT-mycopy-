content: |-
  Tributes are paid after renowned snooker commentator Clive Everton dies at the age of 87.

  Clive Everton was made an MBE in 2019 for his services to snooker

  Renowned snooker commentator Clive Everton has died at the age of 87. Everton worked for BBC TV for more than 30 years from the 1970s onwards and was a respected broadcaster and journalist. He was founder of the Snooker Scene magazine and edited the publication for 51 years. A statement from the World Snooker Tour (WST) said he was "one of snooker's greatest ever commentators and voice of the sport". It added: "Everton devoted his life to snooker and covered some of the sport's most historic moments as a broadcaster and journalist." Players at the British Open in Cheltenham this week are competing for the Clive Everton Trophy, which was named in his honour two years ago, and a minute's silence was held before Friday afternoon's session. "The Voice of Snooker is silent now but will forever be remembered by the sport he loved," said commentator and friend Dave Hendon in a post on social media. "A giant of broadcasting and journalism. A much valued colleague and friend. We all owe him so much."

