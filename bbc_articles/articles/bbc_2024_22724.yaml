title: 'Alistair Wilson: Murdered banker''s family have lost confidence in Police
  Scotland - BBC News'
date: '2024-09-21'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/articles/crkdelm1530o
content: |-
  Alistair Wilson was shot on his doorstep almost 20 years ago and his killer has never been caught.

  Alistair Wilson, pictured here with his son Andrew, was a father of two

  The family of murdered banker Alistair Wilson say they have "lost confidence" in Police Scotland, labelling the force "incompetent". Mr Wilson, 30, was shot on the doorstep of his home in Nairn in the Highlands in 2004 . His killer has never been caught. His widow Veronica and son Andrew, who is now 24, told the Press and Journal, external newspaper that their relationship with police had "steadily deteriorated" in the past 18 months due to unresolved issues not being properly addressed. Police Scotland said they remained committed to finding the killer and getting justice for the Wilson family.

  Earlier this week, Scotland's top law officer, Lord Advocate Dorothy Bain KC, instructed a "complete reinvestigation" of the case, which the Wilson family said was "upsetting and a huge disappointment as the announcement felt far from the ‘good news story’ that Police Scotland wanted it to be". The reinvestigation of the case will see new teams of prosecutors from the Crown Office and Procurator Fiscal Service (COPFS) and officers from Police Scotland work on a full cold case investigation.

  On the night of his murder, the father-of-two had been helping get his sons ready for bed when the killer came to the door. A stocky man aged 20 to 40 years old and wearing a baseball cap spoke to Mrs Wilson, asking for her husband by name. When he came downstairs, the man handed him a blue envelope with the word "Paul" on it. Mr Wilson went inside briefly and when he returned the man opened fire with a handgun. The gun involved was found weeks later in a nearby drain by council workers carrying out gully cleaning. Forensic analysis identified it as the murder weapon, but the shooter has never been identified. The case was covered by the BBC Scotland podcast The Doorstep Murder in 2018.

  In a statement, the Wilson family said for nearly 20 years, they had "fully supported every aspect of the police’s investigation". At the force's request, they had previously agreed to stay out of the spotlight and had declined numerous interview requests other than official police appeals. With the 20th anniversary of Mr Wilson's unsolved murder approaching in November, the family said they felt "distressed and disappointed at having no other option than to speak out publicly", after exhausting every other avenue for resolution. In December last year, Mr Wilson's family complained to the Police Investigation and Review Commissioner about the handling of the force's investigation. Police Scotland and COPFS said at the time they had met the family to discuss the matters raised by them.

  Mr Wilson was shot dead on the doorstep of his family home in Nairn almost 20 years ago

  The family have now also made complaints over the conduct of head of major crime, Det Ch Supt Paul Livingstone. The family said: "As a family, we have welcomed some of the conclusions by Police Scotland’s Professional Standards Department (PSD) and the Police Investigations and Review Commissioner, with the former upholding one complaint against DCS Livingstone. "Despite awaiting the outcome of upcoming disciplinary proceedings, DCS Livingstone remains in his job and is not even suspended. "That he continues to have oversight of every murder inquiry in Scotland, including Alistair’s, is a completely unacceptable situation - particularly given his integrity has been questioned." The family statement added: "The poor judgement and lack of accountability at the highest levels of Police Scotland has regrettably eroded any trust we have in their ability to secure justice for Alistair. "Our loyalty to, and co-operation with, Police Scotland has long been taken for granted during a sometimes turbulent relationship that the actions of senior leadership has damaged beyond repair." The family also said that their request to meet with Chief Constable Jo Farrell had been refused.

  Mrs Wilson said two decades on, the family are still fighting for justice

  Police Scotland said in a statement to BBC Scotland News that a new strategic senior investigating officer had been appointed to oversee the investigation into Mr Wilson's murder in place of Det Ch Supt Livingstone. It added that it was in the process of identifying the team for the reinvestigation of Mr Wilson's murder which would be overseen by a senior officer who would conduct a thorough re-investigation. Assistant Chief Constable Steve Johnson said: “Unresolved murder cases are never closed in Scotland and there is no time bar to providing the police with information. “We would appeal to anyone who may have information not yet shared with the police to come forward and report, external.”

  Mr Wilson's oldest son, Andrew, who was four years old when his father was murdered, said: “I cannot understand why Paul Livingstone hasn’t been sacked and if Jo Farrell won’t rethink our request for a meeting, then it brings into question her position too. “What we have suffered is nothing short of incompetent police leadership and, if it continues, it risks getting in the way of catching my dad’s killer and getting the justice we as a family deserve.” Mrs Wilson added: “It pains me that my sons have been robbed of having a father, but for them and my husband to be denied justice two decades on from that tragedy is even more traumatic for the family. "We have lost confidence in Police Scotland.”
