title: Spectacular meteor streaks across night sky in Turkey - BBC News
date: '2023-09-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-66698292
content: |-
  Green shafts of light from a meteor were caught on camera as it passed over the city of Erzurum.

  A meteor has been filmed streaking across the night sky in Turkey.

  The green shafts of light were caught on camera as it passed over the city of Erzurum and Gumushane Province in the east of the country.
