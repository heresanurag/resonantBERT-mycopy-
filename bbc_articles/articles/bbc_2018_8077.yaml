title: 'Thailand cave rescue: Children found ‘by smell’ - BBC News'
date: '2018-07-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-44819101
content: |-
  John Volanthen said the team of divers located the boys due to the smell in the flooded cave in Thailand.

  John Volanthen, from Bristol, was one of a number of foreign expert divers drafted in for the rescue of 12 boys and their football coach who had been trapped in a Thai cave for nine days.

  He tells BBC Points West about the moment he and his fellow divers first discovered the children alive.

  Mr Volanthen, a member of the South and Mid Wales Cave Rescue Team, said they knew they had found them due to the smell in the cave.
