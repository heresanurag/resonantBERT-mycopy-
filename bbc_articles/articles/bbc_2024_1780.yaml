title: Lee Anderson's comments 'Islamophobic, anti-Muslim and racist', says Khan -
  BBC News
date: '2024-02-24'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68393317
content: |-
  The Labour Mayor of London, Sadiq Khan, accuses the Cabinet of "condoning" what he says are Islamophobic comments made by a Tory MP.

  The Labour Mayor of London, Sadiq Khan, accused the Cabinet of staying silent and "condoning" what he said were Islamophobic comments made by a Tory MP.

  The former deputy chairman of the Conservative party, Lee Anderson, said on GB News on Friday that Islamists had gained "control" of Mr Khan and that he had given the city away "to his mates".

  After facing calls to act, on Saturday afternoon the chief whip of the Tory party announced Mr Anderson would be suspended after "refusing to apologise" for his comments.
