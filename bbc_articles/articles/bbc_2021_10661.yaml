title: 'Bridgend: Attempted murder arrest as boy, 2, critically ill in hospital -
  BBC News'
date: '2021-08-12'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58187028
content: |-
  Police have arrested a 31-year-old woman and say the boy is in a critical condition in hospital.

  Officers were called to an address in Bridgend on Wednesday evening

  Police have launched an investigation after a two-year-old boy was taken to hospital in critical condition.

  A 31-year-old woman has been arrested on suspicion of attempted murder and is in custody, police said.

  Officers attended an address in the Broadlands area of Bridgend shortly before 20:00 BST on Wednesday.

  The boy was taken the University Hospital of Wales in Cardiff where he remains in a critical condition.

  There was still a police presence in the area on Thursday afternoon

  South Wales Police detectives have been conducting house-to-house enquiries here in Broadlands this [Thursday] afternoon.

  Shortly afterwards four officers in forensic suits arrived and entered a property.

  The significant police presence is all the more conspicuous as the residential area is extremely quiet.

  I spoke with one local resident who said there was an ambulance present last night as well as several police cars. She said the entire community was in shock.
