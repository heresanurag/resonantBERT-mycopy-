  While the Coalition turns to licking its wounds and choosing its next leader, it will again have to reckon with its direction. Last election, analysts and some of the party's own MPs cautioned against a move towards the right. They questioned whether Dutton – a polarising figure considered by many to be a conservative hard man – was the right person to rebuild support, particularly in the moderate areas where they lost a lot of it. After a campaign which in its dying days ventured into culture war territory and what some say are "Trumpian" politics, the Coalition is going to have to ask those questions again – and if they want to be competitive, perhaps find different answers. "We have to stop drinking the Kool-Aid from the fire hose and we need to have a serious review... we delude ourselves that we are just a few tactical devices away from winning an election," former Liberal strategist Tony Barry told the ABC. But meanwhile Labor has to decide what it wants to achieve with the large mandate Australia has handed them. Albanese's "incumbency curse" turned out to be a gift, with international uncertainty appearing to have swayed voters in countries like Canada away from change. Likewise, Australia voted for stability. Labor struck a "middle-of-the-road path" with its a policy platform, but can now afford to be braver, says Amy Remeikis, chief politicial analyst at the Australia Institute think tank. "That was the path that they took to the election, and that is what they are seeing has paid dividends for them. But the question now is: 'Will Labor actually do something with power?'"
