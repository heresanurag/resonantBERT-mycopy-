title: 'Newspaper headlines: ''Yacht horror'' and ''Queen said Trump was very rude''
  - BBC News'
date: '2024-08-20'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cwy3e550839o
content: |-
  The front pages are dominated by the news that a tycoon and his daughter are missing after a yacht sank in Sicily.

  'Yacht horror' and 'Queen said Trump was very rude'

  Most of the front pages reflect the the search for survivors after the sinking of a yacht in Sicily that happened to be carrying some of the best known names in Btritish financial circles. "Hero mum saves baby in sea hell" is the Daily Mirror's headline,, external accompanied by a photo of Charlotte Golunski - named as one of the survivors. The image on the front of the Guardian, external shows rescue workers bringing a body ashore. The paper says the UK Foreign Office is providing consular support to "a number of families". Lin Ronald whose daughter was onboard and survived, tells the Daily Telegraph, external that the purpose of the trip was to celebrate the end of Mike Lynch's recent legal battle in the US. The Times , externalreports that the government is sending four marine safety inspectors to Palermo to carry out an initial assessment into the sinking of the yacht. A former member of staff to Mike Lynch, tells the paper that the multi-millionaire businessman "clearly had a lot of pride" in the yacht and had decorated the walls of his west London home with photos of it. According to a report in the i, external paper, at least 136 people on remand were held in police stations yesterday as part of emergency measures to reduce overcrowding in jails. It says the figures come from the Ministry of Justice. A defence solicitor, who isn't named, is quoted as saying "I've never seen anything like it in 28 years". "Queen said Trump was "very rude" is the headline in the Daily Mail, external. The claims are made in a new biography of the late monarch by the writer and satirist Craig Brown. In his account, serialised in the Mail, the Queen is said to have "particularly disliked" the way the former president looked over her shoulder "as if in search of others more interesting". Her remarks are said to have been made to a guest at a lunch, weeks after Mr Trump visited Britain. The Queen also reportedly mused that Mr Trump "must have some sort of arrangement" with his wife Melania. A few papers feature a recommendation by scientists that primary school pupils should have ice lollies to help them learn about how temperature works. According to the Guardian, external, it's one of a number of proposals that could become part of an updated curriculum. The Times carries a quote from Aylin Ozkan,, external a policy specialist from the Royal Society of Chemistry, who says "What better prop is there than an ice lolly?"

