title: Russian TV airs 'Skripal phone call' - BBC News
date: '2018-04-05'
section: General
url: http://www.bbc.co.uk/news/world-europe-43663007
content: |-
  The recording is allegedly of a conversation between Yulia Skripal and her cousin Viktoria.

  Russian TV has broadcast a recording of an alleged phone call between Yulia Skripal and her cousin Viktoria.

  Ms Skripal and her father Sergei - a former spy - were poisoned by a nerve agent in Salisbury in March.

  Doubts have been cast on how authentic the recording is.
