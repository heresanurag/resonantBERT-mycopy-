title: 'Jamie Carragher spitting incident: Sky suspends pundit until end of season
  - BBC Sport'
date: '2018-03-14'
section: General
url: http://www.bbc.co.uk/sport/football/43401015
content: |-
  Ex-Liverpool and England defender Jamie Carragher is suspended by Sky until the end of the football season.

  Last updated on .From the section Football

  Former Liverpool and England defender Jamie Carragher has been suspended by Sky until the end of the football season after he spat towards a girl and her father on Saturday.

  Carragher was filmed spitting from his car towards another vehicle after the Manchester United v Liverpool match.

  He has apologised for the incident.

  Carragher will face no charges over the incident but police say the driver who filmed him will attend a driving improvement course.

  Sky says 40-year-old Carragher, a Sky Sports pundit, will "get the help he needs to guarantee something like this never happens again".

  The broadcaster says the decision was made following an internal review, adding: "Before the start of the next season we will sit down with Jamie to discuss whether he is ready to return to his role."

  Following his suspension, Carragher posted on social media to apologise again for a "moment of madness".

  Police have already spoken to the owner of the footage and it is understood both Carragher's actions and the filming of the incident while driving could be punishable.
