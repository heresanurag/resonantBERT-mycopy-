  All the news and updates on the coronavirus pandemic in Wales.

  Plenty of sunshine but no crowds at Amroth Beach in Pembrokeshire Image caption: Plenty of sunshine but no crowds at Amroth Beach in Pembrokeshire

  Pictures from around Wales show empty beaches and other beauty spots as people appear to be following the lockdown restrictions.

  In cities like Newport there are people out and about enjoying the sunshine, apparently closer to home.

  Capel Curig in Snowdonia would normally be busy with walkers on a bank holiday Image caption: Capel Curig in Snowdonia would normally be busy with walkers on a bank holiday

  Barry Island is also usually busy when the sun comes out. This photo was taken at lunch time Image caption: Barry Island is also usually busy when the sun comes out. This photo was taken at lunch time

  This is the empty scene near Plas y Brenin National Outdoor Centre in Conwy county, which is used by walkers, climbers and watersports enthusiasts Image caption: This is the empty scene near Plas y Brenin National Outdoor Centre in Conwy county, which is used by walkers, climbers and watersports enthusiasts

  There are people out and about in Newport, walking along the River Usk on Monday Image caption: There are people out and about in Newport, walking along the River Usk on Monday
