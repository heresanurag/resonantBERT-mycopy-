title: Timelapse shows Northern Lights glowing above Wisconsin - BBC News
date: '2024-08-14'
section: General
url: http://www.bbc.co.uk/news/videos/c39k1gr09pzo
content: |-
  The footage reveals the light show that concurred with the Perseid meteor shower earlier this week.

  Residents in Erin Prairie, Wisconsin witnessed the Northern Lights dancing above their town at the same time as the Perseid meteor shower.

  This timelapse video shows the geomagnetic storm in its full splendour.

  The meteor shower occurs every year and is one of the most plentiful of any seen from earth according to Nasa.
