title: 'Euston Street stabbing: Man dies in hotel reception - BBC News'
date: '2019-02-19'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-47289245
content: |-
  The victim collapsed in the reception area of the London hotel but died shortly afterwards.

  The victim had been stabbed multiple times before he entered the hotel in Euston Street

  Eleven people have been arrested after a man was stabbed several times in the street in London and collapsed and died in a hotel reception.

  The victim, aged in his 20s, entered the Wesley Hotel, near London's Euston Station, at about 22:45 GMT on Monday.

  The man was helped by hotel staff, but he died shortly after 23:30.

  Seven women and four men, aged between 19 and 28, were all arrested on suspicion of murder and remain in custody, the Met has said.

  Staff at the luxury hotel were left "shocked by the experience", according to the hotel's chairman Rev Stuart Burgess.

  He said: "It was a complete shock to the staff late last night.

  "They realised that the person was beyond their help and they immediately called 999."

  The victim had been stabbed multiple times before he entered the hotel in Euston Street

  Four or five staff working near the lobby at the time were "trying to come to terms with it", he added.

  Ayesha Begum, 38, who lives close to where the man was found, said she came out of her home after hearing a commotion.

  "Police were following a trail of blood," she said.

  Residents were evacuated from the hotel following the stabbing

  The Wesley Hotel is just a stone's throw away from Euston Station.

  The man managed to stumble a few yards into the building where he collapsed and was later pronounced dead.

  Many guests were evacuated from the hotel last night. They've started to return this morning.

  Police are yet to identify who the man is but an ambulance arrived earlier to remove his body.

  Scotland Yard said it was making urgent inquiries to identify the man and contact his family.

  Cordons have been set up in the street.

