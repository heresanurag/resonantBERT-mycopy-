content: |-
  Most the papers lead on the fallout from Trump's announcement of a raft of tariffs that has wiped trillions from global markets.

  The fall in global stock markets after Trump's tariffs was the lead story on many of Friday's papers

  The other story dominating the front pages is the latest fallout from the row engulfing the charity, Sentebale, which was co-founded by Prince Harry. The Daily Mirror, external, Daily Express, external, and Metro, external all lead with the increasingly bitter row between the Duke of Sussex and Sentebale's chairwoman, Sophie Chandauka. The Guardian says there's anger from relatives of those killed in the Hillsborough disaster, external, over the findings of an investigation by the police watchdog, the Independent Office for Police Conduct. It concluded that no senior South Yorkshire Police officers were guilty of misconduct for blaming the behaviour of Liverpool supporters. The investigation did though find four senior officers culpable of gross misconduct for other failures. The Times reports on research that suggests the diet of the Chagga people, external, who live in northern Tanzania, has been found to have "strikingly positive" health benefits. The cuisine - which is rich in vegetables, grains and fermented foods - could reportedly help prevent conditions including Alzheimer's and arthritis.

