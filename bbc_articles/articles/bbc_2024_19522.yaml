title: King expresses 'sympathy and empathy' on Southport visit - BBC News
date: '2024-08-21'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cn876qxq263o
content: |-
  King Charles travelled to the Merseyside town following the stabbings that killed three girls.

  King Charles made his first official visit to the town since the 29 July attack

  King Charles expressed his "sympathy and empathy" for the people of Southport when he travelled to meet survivors of the knife attack that claimed the lives of three young girls. Crowds cheered as he arrived in the Merseyside town shortly after 13:30 BST, where hundreds of tributes have been left to the victims. During a private meeting the King heard about the experiences of some of the young children who were attacked, and also signed a book of condolence. The monarch also met regional leaders and heard from frontline staff representing Merseyside's police, fire and rescue and ambulance services at Southport Community Fire Station who responded to the attack.

  Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, died when a knifeman attacked at a Taylor Swift-themed dance class on Hart Street, on 29 July. Ten others were seriously injured including yoga teacher, Leanne Lucas, 35, who has recently been readmitted to hospital.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King died after the attack on 29 July

  Patrick Hurley, MP for Southport, met the King at the fire station, and said afterwards: "The town's emotions were raging and they still are very raw and he was very empathetic. "He was very keen to express his sympathy and empathy. Very keen to make sure the people of Southport know that from the symbolism perspective, the country's heart goes out to the people here." People began to gather outside the town hall from about 11:30 BST to catch a glimpse of the King. The King stopped to look at the flowers and cuddly toys and greet some of those gathered before going inside the town hall building to meet some of the children who survived the attack, their families and the police liaison team working with them.

