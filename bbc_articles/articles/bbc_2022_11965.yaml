title: 'Queen Elizabeth II: Flags lowered as Queen''s death announced - BBC News'
date: '2022-09-08'
section: General
url: http://www.bbc.co.uk/news/uk-62839831
content: |-
  The union jack was lowered to half-mast at Buckingham Palace, Holyroodhouse and No 10 Downing Street.

  Crowds witnessed the union jack lowered at Buckingham Palace, while the Royal Banner of Scotland at Holyroodhouse was also lowered to half-mast.

  The flag on the roof of No 10 Downing Street, too, flew at half-mast as a mark of respect to the monarch.
