title: Never tattoo late, says body art fan Glenys, 77 - BBC News
date: '2018-10-08'
section: General
url: http://www.bbc.co.uk/news/uk-england-derbyshire-45759190
content: |-
  Tattoo fan Glenys "The Menace" Coope, 77, says she'd cover herself in tattoos if she had the chance.

  A 77-year-old tattoo addict is attempting to cover herself in ink.

  Glenys "The Menace" Coope, from Derby, rediscovered her love for body art after her husband Walter - who was not a fan - died.

  She had tattoos on her face, neck and hands in her 20s but he paid for them to be removed.

  Since Walter died from lung cancer in 2014, Glenys has gone under the needle several times and her artwork even includes a tribute to her late husband on her chest.
