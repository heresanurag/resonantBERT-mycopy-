content: |-
  James Guy and Duncan Scott tie for first in a dramatic men's 200m freestyle at the Aquatics GB Swimming Championships, with Matt Richards third.

  Scott (left) and Guy were part of Great Britain's Olympic 200m freestyle relay winning team along with Matt Richards and Tom Dean

  James Guy and Duncan Scott were tied for first in a dramatic men's 200m freestyle at the Aquatics GB Swimming Championships in London. There was plenty of anticipation for the last race of the meet, which also included Olympic 200m freestyle silver medallist Matt Richards. Despite storming into the lead, Richards ended in third place with a time of one minute and 45.35 seconds, as he was pegged back by Guy and Scott who finished in 1:45.08. The 22-year-old Richards was already guaranteed a spot in the event at the World Championships this summer as those who won medals at the 2024 Olympics in Paris had already earned their places. But, with Guy and Scott in equal first, it leaves a question mark over who will be joining him in Singapore. "I was really happy to be in there," said Scott, 27. "I didn't quite know where I would be at this meet and have surprised myself quite a lot. Buzzing with that."

  Richards, the 2023 world 200m freestyle champion, won the British title last year. "That was always the plan, to try to win a bit different," he said about his strategy in going off so quickly. "With that pre-selection, it meant that I could try to swim in a way I that I've not done before. I can probably confirm I won't be doing that again in the summer." Ben Proud added to his men's 50m freestyle victory by winning the 50m butterfly final in 23.21. Angharad Evans, 21, broke her own British record to claim the women's 100m breaststroke title in 1:05.37, while 24-year-old Freya Anderson won the women's 100m freestyle in 54.09.
