title: Danger Mouse writer Brian Trueman dies aged 92 - BBC News
date: '2024-09-03'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cy54265n257o
content: |-
  The writer and broadcaster was also the brains behind Count Duckula and Jamie and the Magic Torch.

  Brian Trueman was best known for his work with Cosgrove Hall, particularly Danger Mouse

  Brian Trueman, the writer behind the cartoon series Danger Mouse, has died at the age of 92, his son has said. Posting on Facebook, Jonathan Trueman said his Manchester-born father had died in hospital on Sunday evening after a short illness. Trueman had an illustrious career in television and radio, presenting the BBC children's quiz show Screen Test as well as working at Granada TV. But he was best known for his work with animation company Cosgrove Hall Films - particularly Danger Mouse, which started in 1981 and was voiced by Sir David Jason, as well as Count Duckula and Chorlton and the Wheelies.

  Trueman attended Stretford Grammar School before spending a year at the University of Manchester. His other son, Ben, posted on X, external: "Some sad news. My father Brian Trueman, has died. 92 years of happy life."

  Danger Mouse was rebooted in 2015 with Brian Trueman returning to help create four of the new episodes

  He described him as "clever, funny, resilient, an absolute gentleman, loving and loved". "We will all miss him so much," he added. Cosgrove Hall Films Archive said it was "very sad" to hear of Trueman's death. An Instagram post read: "Brian’s writing and humour had the unique ability to appeal to both adults and children, which contributed to the success of Cosgrove Hall series such as Danger Mouse, The Wind in the Willows [and] Jamie and the Magic Torch."

  Manchester-born Brian Trueman was best known for Danger Mouse

  They said he was "always happy to share stories of his career, even in later life" and was a speaker at its recent Puppet Masters conference. "Our thoughts are with his family this week as we remember what a legend he was," the post added. Hundreds of people have paid tribute to the writer and broadcaster. Writer Bob Fischer posted his condolences on X and said he was "a great presenter and a terrific writer whose work absolutely lit up my childhood".

  A post box label close to the former site of Cosgrove Hall celebrates Danger Mouse's secret home

  Animator and comic artist TopperHay also posted on X: "RIP Brian Trueman. A very funny, down-to-earth man who I was lucky enough to meet in person back in 2019 at an animation festival. "He shared a lot of insight into his work at Cosgrove Hall and of course showcased his vocal talents." Ben Trueman said the family were "absolutely blown away and deeply moved" by the messages they had received. He posted: "It's really wonderful to know that he and his work are remembered fondly."
