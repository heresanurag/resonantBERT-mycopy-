title: Sailor stranded on ship at Great Yarmouth for 15 months - BBC News
date: '2018-06-01'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-norfolk-44320638
content: "The Indian-owned Malaviya Twenty has been detained in Great Yarmouth docks\
  \ since June 2016.\n\nCaptain Nikesh Rastogi said if he were to leave the ship,\
  \ it would be deemed a derelict\n\nA sailor has been stranded aboard a ship moored\
  \ in Norfolk for more than 15 months amid a legal dispute.\n\nThe Indian-owned Malaviya\
  \ Twenty has been detained in Great Yarmouth docks since it arrived in June 2016.\n\
  \nCapt Nikesh Rastogi was part of a 13-strong replacement crew for the ship contracted\
  \ in February 2017.\n\nThe International Transport Workers' Federation (ITF) said\
  \ 33 crew members had been on and off the vessel since October 2015 and had not\
  \ been paid.\n\nCapt Rastogi, 43, from Mumbai, said if he were to leave the ship,\
  \ it would be deemed a derelict.\n\nHe said anybody would then be able to take it\
  \ over.\n\nCapt Rastogi said he and his crew mates had not been paid since last\
  \ year\n\nCapt Rastogi said the ship's owners fell into liquidation and his employers\
  \ withdrew from operating the ship in January.\n\nAll of his original crew have\
  \ returned to India, and he remains aboard with three crew members who joined him\
  \ in September.\n\nHe said the four of them had not been paid since last year.\n\
  \nThe Malaviya Twenty ship arrived at Great Yarmouth in June 2016\n\nThe ITF arrested\
  \ the ship at Great Yarmouth in November 2016 and secured 688,000 US dollars (£517,045)\
  \ for the asset's release to manning agents acting for the Indian Bank ICICI.\n\n\
  The money covered unpaid crew wages, with the last payment made in February 2017,\
  \ the ITF said.\n\nITF inspector Paul Keenan said arresting the ship and selling\
  \ it would raise enough money to pay everyone involved in the wrangle and repatriate\
  \ the remaining four crew to India.\n\nThe International Transport Workers' Federation\
  \ wants to repatriate the remaining four crew to India\n\nBut he said Great Yarmouth\
  \ port, which is owed unpaid dues, is \"using legislation from the 19th Century\"\
  \ to demand three times the amount of rates.\n\nA spokesman for Peel Ports, which\
  \ manages the port, said it was an \"ongoing legal matter\" and he was unable to\
  \ comment.\n\nThe crew aboard the ship's sister vessel, the Malaviya Seven, which\
  \ was detained in Aberdeen, went home in November.\n\nThe best way to get news on\
  \ the go \n\nThe BBC is not responsible for the content of external sites."
