title: Cargo ship in North Sea collision not laden with toxic chemicals - BBC News
date: '2025-03-11'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/c4gm52dlg35o
content: |-
  Fears over toxic chemicals are allayed, and the government says there is no evidence of foul play.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The owner of a cargo ship involved in a collision with a fuel tanker in the North Sea has said it was not laden with highly toxic chemicals. The Portuguese-flagged Solong collided with the US-registered tanker Stena Immaculate, off the East Yorkshire coast, at about 10:00 GMT on Monday. Ernst Russ, the German owner of Solong, said it was supporting the family of a crew member still missing. It also confirmed there were no containers on board carrying sodium cyanide, as had been initially feared. Meanwhile, HM Coastguard confirmed Solong was still alight, while the fire onboard Stena Immaculate had "greatly diminished". It said 36 people had been taken safely to shore.

  Stena Immaculate was carrying jet fuel for the US military

  Transport Secretary Heidi Alexander said she had met with the Maritime and Coastguard Agency and been informed that early indications suggest both vessels are now expected to stay afloat. Alexander added Solong can be "towed away from the shore, and salvage operations can get underway". Earlier, transport minister Mike Kane said there was no evidence to suggest foul play in the collision and added there was "no sign of pollution" from the vessels. In a statement, Ernst Russ said: "We extend our deepest sympathy to the family of the missing crew member, mindful that the search has been called off. "Our first thoughts must be with them at this uncertain and distressing time. All necessary support is being provided to the family." The company said its focus "remains the wellbeing of our 13 crew members that were evacuated from the container ship" and added: "We also recognise the dangers that others are faced with as they work to stabilise and secure the vessels and cargos involved." Addressing concerns the ship was carrying highly toxic chemicals, the company said: "We are able to confirm that there are no containers on board laden with sodium cyanide... There are four empty containers that have previously contained the hazardous chemical and these containers will continue to be monitored." In its statement, HM Coastguard said: "The Solong is still alight and the fire on board the Stena Immaculate has greatly diminished. Safety vessels and other vessels with firefighting capabilities are still on scene with more arriving today. "At 11.20pm last night the Solong separated from the Stena Immaculate and began to drift southwards. This is being monitored by HM Coastguard. An exclusion zone of 1km radius has been put in place around both vessels." The coastguard added that Defra was monitoring the situation, and air quality at ground level was currently within normal levels for the weather conditions. The UK Health Security Agency said any public health risk on shore was deemed to be very low. Graham Stuart, MP for Beverley and Holderness, said officials had told him there was no evidence so far of any of the heavy engine oil leaking from either ship. He said the jet fuel appears to have "burned off", adding "because of its purity, it is expected to leave no residue in the water". Stuart clarified the sodium cyanide containers "were empty" and there was no evidence of pollution in the water or in the air to date. Earlier, Martijn Schuttevaer, a spokesperson for Boskalis, appointed to salvage the tanker, said the two vessels had separated overnight, which would make the salvage operation "less complicated". He added: "We are hoping, later today, we get close enough to the vessel to take temperature readings to determine if the fire is out."
