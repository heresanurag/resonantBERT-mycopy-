  The disorder in Ely began when friends Kyrees Sullivan and Harvey Evans died in an e-bike crash.

  Eight teenagers sentenced for rioting in Ely

  A car set on fire during the Ely riots of May 2023

  Eight young people have been sentenced for rioting following the deaths of two boys. Kyrees Sullivan, 16, and his best friend Harvey Evans, 15, died in an e-bike crash in Ely, Cardiff, on 22 May 2023. The disorder which followed continued until the early hours, leaving 31 police officers injured, property damaged and cars torched and, to date, more than 40 people have been charged in connection with the incident. The group of teenagers were sentenced in Cardiff on Tuesday, each receiving a 12-month referral order, external, which is a type of community sentence used in youth courts.

  Footage shown in the youth court hearing showed missiles including rocks, bricks, fireworks and petrol bombs being thrown at the police, and several cars set alight. The youngest of the defendants was 14 at the time of the riots and is now 16. Four of the group are now 18, while three are now aged 17, and they all pleaded guilty at earlier hearings between October and January. The court heard that many of the young people knew the boys who died very well, and the violent behaviour was was condoned by adults and older relatives involved in the riots. District Judge Stephen Harmes said this had been one of the most serious riots in the history of south Wales, but he understood that the defendants had been "swept up by the mob" and became carried away by their emotions, becoming embroiled in violence instead of processing their grief. He added that emotions had been "elevated by trauma spread on social media with the police made scapegoats". Addressing the group, the judge said: "You were very young, your friends had just died. Very few young people will experience such a loss, It was a very distressing context." He added they should "try and make the most of this opportunity to do the best you can" adding that was the best way to honour the memory of Kyrees Sullivan and Harvey Evans. "You have been given that chance... if you come back to court, you won't be given a second chance."
