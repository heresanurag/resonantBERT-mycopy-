title: 'Royal Family tree: King Charles III''s closest family and line of succession
  - BBC News'
date: '2019-05-08'
section: UK
url: http://www.bbc.co.uk/news/uk-23272491
content: |-
  The King, his siblings, children, grandchildren and great-grandchildren.

  King Charles III and Queen Camilla have been crowned in Westminster Abbey.

  Find out more about the Royal Family and the line of succession below.

  Charles became King the moment his mother Queen Elizabeth II died.

  The now former Prince of Wales married Lady Diana Spencer, who became the Princess of Wales, on 29 July 1981. The couple had two sons, William and Harry. They later separated and their marriage was dissolved in 1996. On 31 August 1997, the princess was killed in a car crash in Paris.

  He married Camilla Parker Bowles on 9 April 2005. When Charles became King, she became Queen Consort, as per the wishes of Queen Elizabeth II. Following the coronation she is now known as Queen Camilla.

  Prince William is the elder son of King Charles III and Diana, Princess of Wales, and is now first in line to the throne.

  He was 15 when his mother died. He went on to study at St Andrews University, where he met his future wife, Kate Middleton. The couple were married in 2011.

  On his 21st birthday he was appointed a Counsellor of State - standing in for the Queen on official occasions. He and his wife had their first child, George, in July 2013, their second, Charlotte, in 2015 and third, Louis, in 2018.

  The prince trained with the Army, Royal Navy and RAF before spending three years as an RAF search-and-rescue pilot with RAF Valley on Anglesey, north Wales. He also worked part-time for two years as a co-pilot with the East Anglian Air Ambulance alongside his royal duties. He left the role in July 2017 to take on more royal duties on behalf of the Queen and Duke of Edinburgh.

  William has inherited his father's Duchy of Cornwall and is now the Prince of Wales. Catherine is now the Princess of Wales.

  As heir to the throne, his main duties are to support the King in his royal commitments.

  Prince George of Wales was born on 22 July 2013 at St Mary's Hospital in London. His father was present for the birth of his son, who weighed 8lb 6oz (3.8kg).

  Prince George is second in line to the throne, after his father.

  Catherine, Princess of Wales gave birth to her second child, Charlotte Elizabeth Diana, on 2 May 2015, again at St Mary's Hospital. William was present for the birth of the 8lb 3oz (3.7kg) baby.

  She is third in line to the throne, after her father and older brother, and is known as Her Royal Highness Princess Charlotte of Wales.

  The new Princess of Wales gave birth to her third child, a boy weighing 8lbs 7oz, on 23 April 2018, at St Mary's Hospital in London.

  William was present for the birth of Louis Arthur Charles, who is fourth in line to the throne.

  Prince Harry trained at the Royal Military Academy Sandhurst and went on to become a lieutenant in the Army, serving as a helicopter pilot.

  During his 10 years in the armed forces, Capt Wales, as he became known, saw active service in Afghanistan twice, in 2012 to 2013 as an Apache helicopter co-pilot and gunner. He left the Army in 2015 and now focuses on charitable work, including conservation in Africa and organising the Invictus Games for injured members of the armed forces.

  He has been a Counsellor of State since his 21st birthday and stood in for the Queen on official duties.

  He married US actress Meghan Markle on 19 May, 2018, at Windsor Castle. In January 2020, the royal couple said they would step back as "senior" royals and divide their time between the UK and North America. They said they intended to "work to become financially independent".

  Just over a year later, Buckingham Palace confirmed the couple would not be returning to royal duties, and would give up their honorary military appointments and royal patronages.

  The Sussexes' first child, Archie Harrison Mountbatten-Windsor, was born on 6 May 2019, weighing 7lbs 3oz, with the duke present for his birth.

  Archie was not automatically a prince when he was born because he was not a grandson of the monarch. But he gained the right to that title when King Charles acceded to the throne. Harry and Meghan are understood to want their children to decide for themselves whether or not to use their titles when they are older.

  The Duchess of Sussex gave birth to her second child in Santa Barbara, California, on 4 June 2021. Lilibet Diana Mountbatten-Windsor - to be known as Lili - is named after the Royal Family's nickname for the Queen and is her 11th great-grandchild.

  She was given the middle name Diana in honour of Prince Harry's mother, who died in a car crash in 1997 when he was 12 years old. Like her brother, she gained the right to use the royal title when her grandfather became king.

  Prince Andrew, eighth in line to the throne, was the third child of the Queen and Duke of Edinburgh - but the first to be born to a reigning monarch for 103 years.

  He was created the Duke of York on his marriage to Sarah Ferguson, who became Duchess of York, in 1986. They had two daughters - Beatrice, in 1988, and Eugenie, in 1990. In March 1992 it was announced the duke and duchess were to separate. They divorced in 1996.

  The duke served for 22 years in the Royal Navy and saw active service in the Falklands War in 1982. In addition to royal engagements, he served as a special trade representative for the government until 2011.

  Prince Andrew stepped away from royal duties in 2019 after an interview with the BBC about his relationship with US financier Jeffrey Epstein, who killed himself while awaiting trial on sex-trafficking and conspiracy charges.

  In February, he agreed to pay an undisclosed sum to settle a civil sexual assault case brought against him in the US by one of Epstein's victims, although he made no admission of liability and had repeatedly denied the allegations.

  Princess Beatrice is the elder daughter of Prince Andrew and Sarah, Duchess of York. Her full title is Her Royal Highness Princess Beatrice.

  She married property tycoon Edoardo Mapelli Mozzi at The Royal Chapel of All Saints at Royal Lodge, Windsor, in July 2020. The couple had been due to marry in May, but coronavirus delayed the plans.

  Princess Beatrice had a baby girl, Sienna Elizabeth, in September 2021, who is 10th in line to the throne and is the Queen's 12th great-grandchild. Princess Beatrice is also stepmother to Mr Mapelli Mozzi's son Christopher Woolf, known as Wolfie, from his previous relationship with Dara Huang.

  Princess Eugenie is the younger daughter of Prince Andrew and Sarah, Duchess of York. Her full title is Her Royal Highness Princess Eugenie and she is 11th in line to the throne.

  Like her sister Princess Beatrice, she has no official surname, but uses York. She married her long-term boyfriend Jack Brooksbank at Windsor Castle on 12 October 2018.

  Princess Eugenie and Jack Brooksbank's son, August, born on 9 February 2021, was Queen Elizabeth's ninth great-grandchild.

  Ernest Brooksbank was born on 30 May and weighed 7lb 1oz

  Princess Eugenie and Jack Brooksbank's second son was born on 30 May 2023. It is the first royal birth since the coronation of King Charles, Eugenie's uncle.

  Ernest is 13th in line to the throne, moving the Duke of Edinburgh down to 14th place.

  Eugenie said the baby's names were inspired by "his great-great-great grandfather George, his grandpa George and my grandpa Ronald".

  Major Ronald Ferguson, who died in 2003 was the Duchess of York's father.

  Prince Edward was given the title Duke of Edinburgh on his 59th birthday, almost two years after the death of his father Prince Philip, who previously held the title. It was understood that Philip had wanted Edward to take on the title, but the decision was left to King Charles.

  Prince Edward's wife Sophie becomes the Duchess of Edinburgh and the prince's former title, the Earl of Wessex, has now been given to his son James, Viscount Severn. The couple also have a daughter, Lady Louise, born in 2003.

  After a brief period with the Royal Marines, the prince formed his own TV production company. He subsequently supported the Queen in her official duties and carried out public engagements for charities. He is 14th in line to the throne.

  James, Earl of Wessex is the younger child of the Duke and Duchess of Edinburgh. He was given the title after his father Prince Edward became the Duke of Edinburgh in March 2023. When James was born, he was given the title Viscount Severn - a "courtesy" title as son of an earl, rather than using prince. It is thought his parents made this decision to avoid some of the burdens of royal titles.

  Born in 2003, Lady Louise Windsor is the elder child of the Duke and Duchess of Edinburgh. However, she is lower in the line of succession than her younger brother because she was born before a law came into force scrapping the system that meant a younger son could displace an older daughter.

  Anne, Princess Royal is the Queen's second child and only daughter. When she was born she was third in line to the throne, but is now 17th. She was given the title Princess Royal in June 1987.

  Princess Anne has married twice; her first husband Captain Mark Phillips is the father of her two children, Peter and Zara, while her second is Vice-Admiral Sir Timothy Laurence.

  The princess was the first royal to use the surname Mountbatten-Windsor in an official document, in the marriage register after her wedding to Capt Phillips. She competed in equestrian events for Great Britain in the 1976 Montreal Olympics and is involved with a number of charities, including Save the Children, of which she has been president since 1970.

  Peter Phillips is the eldest of the Queen's grandchildren. He married Canadian Autumn Kelly in 2008 and together they have two daughters, Savannah, born in 2010, and Isla, born in 2012.

  The children of the Princess Royal do not have royal titles, as they are descended from the female line. Mark Phillips refused the offer of an earldom when he married so their children do not have courtesy titles.

  Peter Phillips and his wife announced they were getting divorced in February 2020.

  Savannah, born in 2010, is the elder daughter of Peter and Autumn Phillips and was the Queen's first great-grandchild.

  Isla, born in 2012, is the second daughter of Peter and Autumn Phillips.

  Zara Tindall followed her mother and father with a highly successful riding career - including winning a silver medal at the London 2012 Olympics. She married former England rugby player Mike Tindall in 2011 and the couple had their first child, Mia Grace, in 2014.

  The children of the Princess Royal do not hold a royal title, as they are descended from the female line, but she remains 21st in line to the throne. Their father, Mark Phillips, turned down an earldom when he married Princess Anne, so they do not have courtesy titles.

  The Queen's granddaughter Zara Tindall gave birth to her first child, Mia Grace, in January 2014.

  The couple's second child was born on 18 June 2018 at Stroud Maternity Unit, Gloucestershire, weighing 9lb 3oz.

  Lena Elizabeth was named in honour of her great-grandmother.

  Like her sister, Lena does not have a royal title and so will also be known as Miss Tindall.

  Zara and Mike Tindall's son Lucas Philip, their third child - the Queen's 10th great-grandchild - was born on 21 March 2021 weighing 8lbs 4oz.

