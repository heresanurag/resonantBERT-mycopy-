title: 'Watch: Stricken pregnant sheep flipped by hikers in Peak District - BBC News'
date: '2024-03-15'
section: General
url: http://www.bbc.co.uk/news/uk-england-derbyshire-68548572
content: |-
  The pair stumbled upon a ewe on its back while walking in the Peak District.

  A couple of hikers stumbled upon a struggling sheep on their walk through the Peak District.

  Charlotte Emery and Katy Maughan were walking near Buxton, Derbyshire, when they spotted the pregnant ewe on its back and decided to help.

  Thankfully, Charlotte had came across a post on Facebook a couple of weeks prior, describing how such sheep were not able to get back on to their feet without assistance.

  The pair, who live in Rotherham, posted footage of their rescue to a Facebook group and were showered with praise from farmers and fellow hikers.

