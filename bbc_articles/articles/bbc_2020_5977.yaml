id: bbc_2020_5977
title: Coronavirus in Scotland - Another 44 deaths in hospitals - BBC News
date: '2020-05-02'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52400988
content: |-
  Latest figures show that a further 44 coronavirus deaths have been reported in Scottish hospitals.

  Absenses due to a range of reasons related to Covid-19 currently stand at 7,208 NHS staff in Scotland, around 4.3% of the workforce.

  Based on returns received from 862 (79%) of Scottish adult care homes, as at 28 April, 4,163 staff were reported as absent because of Covid-19, accounting for 9.2% of their workforce.

  Comparisons between NHS and care home staff are difficult because of the different ways of calculating absence figures.
