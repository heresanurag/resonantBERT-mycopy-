title: 'Belgium-France: World Cup clash tests border loyalties - BBC News'
date: '2018-07-10'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-44764887
content: |-
  For two neighbours challenging for a place in the final, Tuesday's match does more than cross borders.

  Spirits are high ahead of Tuesday's semi-final but sometimes friendly rivalry can get out of hand

  For the two neighbours challenging for a place in the final of the World Cup, Tuesday's momentous match does more than cross borders.

  Sometimes the frontier between France to the south and Belgium to the north divides the towns themselves in half.

  Take the two sister towns of Comines, split in two by accident of history and by a river.

  Whether they support Les Bleus or the Red Devils, the residents will apparently have to cheer their teams without the giant screen they have enjoyed during the rest of the competition, for security reasons.

  But the mood is still one of friendship, with flags of both nations appearing in the windows of cafes and houses.

