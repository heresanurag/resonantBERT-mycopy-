title: 'Belfast disorder: ''I''m not sure if my children are safe at school'' - BBC
  News'
date: '2024-08-28'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cg4yezz3v1po
content: |-
  A Muslim mother in Northern Ireland said recent racist disorder has made parents concerned for children's safety.

  The recent disorder in Belfast saw many ethnic minority owned businesses attacked

  A mother-of-three has said she is "hesitant and worried" for her children's safety after recent protests and racist disorder in Northern Ireland. Faiza Ahmed, who lives in Bangor, is part of a group of 400 Muslim women across Northern Ireland that wrote a letter to Education Minister Paul Givan with concerns. "As mothers we were worried, we have young children and soon they will be going to school and we are worried about their safety, they are worried about their safety," she told BBC News NI. Mr Givan said risk assessments are being carried out at schools near to recent protests and racist disorder in Belfast.

  It follows recent racist disorder in Belfast which saw many ethnic minority owned businesses attacked. The Muslim Mothers Collective wrote to Mr Givan to say they were "deeply concerned" following the incidents. A number of people, including under 18s, have since been charged in connection to the disorder.

  Faiza Ahmed has daughters in primary and post primary schools in Northern Ireland

  Ms Ahmed told BBC News NI that "psychologically" her children have been affected by the recent racist disorder. Having enjoyed their school in Northern Ireland so far, Ms Ahmed said that "it won't be the same, now they go back to school thinking, wondering and worrying". Speaking earlier on BBC Radio Ulster’s Good Morning Ulster, Ms Ahmed said some parents were hesitant to send their children to school. “We are not sure whether they will be safe or not," she said. “The children themselves are looking forward to going back to school, because we are not sure whether they will be safe or not.” Ms Ahmed said the summer months were “terrible” due to the disorder. “We could not go out because we were worried and this is the time when we thought we were going to spend with our children,” she added. “I have only been in Bangor for a year, so this was my opportunity to make memories, but after the events we couldn’t do that.” She said her youngest child was starting school on Wednesday. “I’m a little bit anxious, as she was leaving this morning she said to me: ’Mum is it safe?’. “I said it should be safe and she says ‘you know what the first thing I will do when I get to school is to hug my friends’. “It is very difficult, our children should be safe, they should be children, it’s not their duty to look into their security, it’s not their responsibility.”

  In a letter, Paul Givan acknowledged the difficulty children from an ethnic minority background might face in returning to school

  In a letter to Democratic Unionist Party politician Mr Givan, the Muslim Mothers Collective said they had been shocked by the intensity of recent events. They requested "strong assurances" their children will be safe when they return to school, and that schools take "proactive measures to prevent racist and Islamophobic bullying". In response, the minister set out plans including risk assessments. He said his department was working with principals to identify schools that "may be vulnerable dependent on location, school cohort (i.e high numbers of newcomers) and nature of building". Mr Givan acknowledged "recent events may make it more difficult for children from ethnic minority communities" to be happy, learning and succeeding at school.

  In response, Mr Givan of the Democratic Unionist Party said his department was involved with the Education Authority carrying out risk assessments "on a number of schools located close to recent unrest and protests". He added they were working with principals to identify schools that "may be vulnerable dependent on location, school cohort (i.e high numbers of newcomers) and nature of building". "Where necessary, maintenance work will be prioritised as well as guidance provided on managing emergency incidents," he said. The minister also said officials were working with Translink to "reinforce transport guidance and the need for reasonable adjustments for potentially vulnerable pupils". Mr Givan said he hoped his response would assure the Muslim Mothers Collective that the department would ensure schools were "safe for all children within our community, irrespective of race or religion" and added he would be happy to meet with them to discuss their concerns. Ms Ahmed said she thought it was a “good response” from Mr Givan, but that it was important it delivered. “It gives us some reassurance that at least someone is looking into the matter, but again the real test is in the results, is it going to work..is it going to address the issues on the ground?”

  The secretary of the National Association of Head Teachers in Northern Ireland (NAHT) said that the prospect of risk assessments in schools is "unthinkable" and "absolutely abhorrent". Speaking on BBC Radio Ulster's Evening Extra programme, Graham Gault said that "every single school leader in every single school across Northern Ireland would stand wholly behind the minister’s position on this issue". "All of our children must be free to enjoy their educational experiences in all of our schools in total uncompromised safety fully free from any threats." Mr Gault told BBC News NI that school leaders will "do whatever they can to work with whoever they can to protect our children" and make all of their experiences "safe and joyful".
