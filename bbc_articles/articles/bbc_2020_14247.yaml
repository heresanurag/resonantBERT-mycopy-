id: bbc_2020_14247
title: Albanian protesters burn Christmas trees over police killing - BBC News
date: '2020-12-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-55258789
content: |-
  Protesters are angry after a man was allegedly killed by police for breaking a coronavirus curfew.

  Hundreds of protesters took to the streets in the Albanian capital, Tirana, on Wednesday after the police allegedly killed a man for breaking a coronavirus curfew.

  The demonstrators chanted at riot police and tore down Christmas trees and other decorations around the city.

  The officer accused of killing the 25-year-old man has been arrested and an investigation has been launched.
