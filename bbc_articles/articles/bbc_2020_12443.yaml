title: 'Covid-19: MPs with cancer ''excluded'' from cancer debate - BBC News'
date: '2020-11-13'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-54925320
content: |-
  Ex-minister Tracey Crouch calls for greater virtual participation to be allowed in Parliament.

  This video can not be played To play this video you need to enable JavaScript in your browser. MP Tracey Crouch says she is “disappointingly unable to participate” in a Commons debate on breast cancer.

  MPs have called for wider virtual participation to be allowed in Parliament, arguing that those with cancer were "excluded" from taking part in a debate on the illness.

  Ex-minister Tracey Crouch, who has cancer, expressed disappointment she could not speak in the debate.

  Labour's Chris Bryant said this was due to Jacob Rees-Mogg's reluctance to allow greater use of video links.

  But the Commons leader said it was down to a lack of broadcasting equipment.

  Mr Rees-Mogg has previously argued that virtual working was not an effective way to hold the government to account and was no substitute for the "cut and thrust" of live debate.

  Currently, MPs who cannot be in Westminster due to coronavirus are only able to take part in some events.

  They can put questions to ministers by video link, but are not able to contribute to general debates on legislation or events in Westminster Hall - a separate chamber from the House of Commons.

  Westminster Hall debates were suspended from 20 March during the first wave of coronavirus. They only resumed from 5 October, around a month after business returned in the main chamber following the summer recess.

  Those trying to avoid travel during the pandemic are also able to register for proxy votes.

  On Thursday, a debate on breast cancer services took place in Westminster Hall, and Conservative MP Ms Crouch said because of Mr Rees-Mogg's ruling, those "with real and current life experience of the disease are disappointingly unable to participate".

  She added: "While I respect his commitment to traditional parliamentary procedures, I'm sure if he was on the backbenches and not the fine specimen of health and fitness he clearly is, he would be arguing forcefully for members to be able to contribute more often in proceedings by modern technology."

  The MP asked him to "please stop thinking those of us at home are shirking our duties" and urged him to allow virtual participation in Westminster Hall.

  Leader of the House Mr Rees-Mogg said when events in Westminster Hall restarted, "the broadcasting facilities were already being fully utilised".

  "So it wasn't an issue then of whether we wanted to do it or not, it simply wasn't an option," he said.

  However, he also added there needed to be a balance between the needs of MPs with the needs of the House of Commons "to proceed with its business".

  Mr Bryant said it was "appalling that Tracey Crouch is excluded from a debate on breast cancer because she's recuperating from cancer by Jacob Rees-Mogg rules".

  His party colleague Barbara Keeley agreed and said she was also "excluded" having just been through breast cancer treatment.

  In an interview with BBC Radio 4's The Westminster Hour - recorded before Thursday's debate - Ms Crouch said she would not have been able to participate in debates at all before the pandemic as the video technology was not set up.

  "So actually, in a way, and I don't mean this to sound insensitive, this is a good time to have gone through this," she added.

  However, she told the programme that wider use of video technology, beyond the debates where it is currently used, would make for a "better" system and called for MPs to be allowed to carry on contributing virtually "while coronavirus exists".

  Ms Crouch added that she would also like to see the proxy voting scheme extended to cover MPs suffering from other health conditions or on bereavement leave.
