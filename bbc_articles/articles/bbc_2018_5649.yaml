id: bbc_2018_5649
title: YouTube stars 'might encourage kids to eat more calories' - BBC News
date: '2018-05-26'
section: Health
url: http://www.bbc.co.uk/news/health-44258509
content: "Social media stars Zoella and Alfie Deyes feature in a study into the protection\
  \ of children online.\n\nJunk food is often promoted to kids on social media\n\n\
  Social media stars might be encouraging children to eat more unhealthy snacks, a\
  \ new study suggests.\n\nIt found children who saw popular vloggers consuming sugary\
  \ and fatty snacks went on to eat 26% more calories than those who did not.\n\n\
  The study, presented at the European Congress on Obesity, examined the responses\
  \ of children to images from social media.\n\nThe findings come amid calls for tougher\
  \ rules on junk food advertising.\n\nThe social media stars used in the study were\
  \ Zoella, who has 10.9 million followers on Instagram, and Alfie Deyes, who has\
  \ 4.6 million.\n\nThis Twitter post cannot be displayed in your browser. Please\
  \ enable Javascript or try a different browser. View original content on Twitter\
  \ The BBC is not responsible for the content of external sites. Skip twitter post\
  \ by Zoella This article contains content provided by Twitter. We ask for your permission\
  \ before anything is loaded, as they may be using cookies and other technologies.\
  \ You may want to read Twitter’s cookie policy, external and privacy policy, external\
  \ before accepting. To view this content choose ‘accept and continue’. The BBC is\
  \ not responsible for the content of external sites.\n\nThe 176 children were split\
  \ into three groups and shown either pictures of the personalities promoting unhealthy\
  \ snacks, healthy foods or non-food products.\n\nThe children were then offered\
  \ a range of healthy and unhealthy snacks to choose from, including grapes, carrot\
  \ sticks, chocolate buttons or jelly sweets.\n\nThe children who had seen the unhealthy\
  \ images consumed an average of 448 calories, while the others ate just 357.\n\n\
  Alfie Deyes was one of the social media stars used in the study\n\nDr Emma Boyland,\
  \ one of the researchers from the University of Liverpool, said that children consider\
  \ vloggers to be \"everyday people\" just like their peers.\n\n\"They've earned\
  \ a position of trust among young people and there has to be some responsibility\
  \ along the line,\" she said.\n\nThe researchers called for more protection for\
  \ children online, particularly on social media channels where it is unclear whether\
  \ they understand the difference between an advert and genuine content.\n\nDr Boyland\
  \ said: \"On TV there are more cues as to when it's advertising - there's an advert\
  \ break, there's a jingle - whereas digitally it's a lot more embedded in the rest\
  \ of the content.\"\n\nAnna Coates, the lead researcher on the study, said: \"We\
  \ know that if you show children a traditional drink advert, then their preference\
  \ for that drink rises. We wanted to test their reactions to this new type of celebrity,\
  \ the social media star.\n\n\"Now that we've shown that children are influenced\
  \ by online stars, our next study will look at whether they understand that, in\
  \ many cases, celebrities are being paid to promote products.\"\n\nProf Russell\
  \ Viner, president of the Royal College of Paediatrics and Child Health, called\
  \ on the government to consider more regulation to protect children in its forthcoming\
  \ childhood obesity strategy.\n\n\"It's vital that children are protected from the\
  \ marketing of junk food, not only on TV but also online where they are increasingly\
  \ spending time.\n\n\"Companies are able to target their adverts on social media,\
  \ which does provide the opportunity for regulators to put restrictions in place.\"\
