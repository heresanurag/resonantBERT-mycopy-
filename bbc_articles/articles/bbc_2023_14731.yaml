  The defence secretary tells Victoria Derbyshire that external factors, such as inflation and the war in Ukraine, affect domestic plans.

  Do the Lib Dems want to rejoin the EU?

  Onto UK-EU relations, Davey is asked whether the Lib Dems still have as strong an anti-Brexit stance as they did in 2019. Davey says the party remains "very pro-European", but is realistic about what needs to be done for the UK to be able to work with Europe after the Conservative government has "soured" relations between the two nations. When pushed on whether he'd fight for the UK to rejoin the EU, Davey deflects by saying that is "no longer on the table". It's going to take time to rebuild the relationship with the EU, he says.
