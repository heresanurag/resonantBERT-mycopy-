content: |-
  BBC Sport's chief football writer Phil McNulty looks back on the life of Salvatore 'Toto' Schillaci and the moments that made him an unlikely superstar.

  'Schillaci's story will burn forever in memory of all who experienced it'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Salvatore 'Toto' Schillaci, who has died aged 59, provided the defining images of Italia '90 as his wild-eyed, arms-outstretched goal celebration transformed a virtual unknown into a national hero and global superstar. Schillaci's elevated status may have flickered only briefly in the playing context but the humble striker, born into poverty in Palermo, became a towering personality when the World Cup was staged in his homeland. If Paul Gascoigne's tears after being booked in the semi-final against West Germany in Turin remain the enduring symbol of England's Italian campaign, it is Schillaci's back story and famous celebration that grabbed the attention of the wider world. For a few short weeks, Schillaci joined the ranks of the world's most famous sporting figures as he provided some of the most memorable moments in a disappointing tournament that history has remembered more kindly than it should. He only made his Italy debut in March 1990 - a late developer at 25 - and was widely expected to be a peripheral figure in coach Azeglio Vicini's squad, even though he had helped Juventus win the Uefa Cup with a two-leg victory over Fiorentina weeks before. Schillaci was Vicini's final pick, the player himself only expecting to watch from the stands. Instead, he went on to win the World Cup's Golden Boot with six goals, capturing the hearts of Italy and beyond with his all-action style and that trademark goal celebration. Schillaci also won the Golden Ball as the tournament's best player and subsequently finished second in the Ballon d’Or behind West Germany captain Lothar Matthaus later that year.

