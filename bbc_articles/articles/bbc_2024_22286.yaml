  Schillaci's World Cup story lived on but the playing glory did not. The goals dried up for club and country, with him scoring only one more goal for Italy, ending with seven in 16 appearances - six in those glorious Italia '90 weeks that will remain forever with everyone who shared the experience. West Germany won the World Cup in a miserable final against Argentina but mention Italia '90 - outside England at least - and the first name and image that springs to mind for many will be Schillaci, his memorable glorious release and the facial expression of an joyous goalscorer. He told BBC Sport in 2014 that he knew exactly what people would say as soon as they recognised him: "The eyes. The eyes. Every time I meet people they want me to do the 'wild eyes'. It was an instinctive gesture that has stuck in people's minds. I have done it many, many times." Schillaci left Juventus for Inter Milan in 1992 but it was a move undermined by injuries and a loss of form. He ended his career in more prolific fashion at Jubilo Iwata in Japan, the first Italian to play in the fledgling J League. He returned to Palermo after his career ended, continuing his 'man of the people' lifestyle and image that so many could relate to - not just in Italy but around the world - as this familiar, famous figure moving around the city on his scooter. Schillaci's footballing story can effectively be encapsulated by that fleeting golden period in Italy's summer of 1990 - but it is a story that will burn forever in the memory of all who experienced it.

