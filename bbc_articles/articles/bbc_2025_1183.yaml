content: |-
  No Premier League team has picked up more points than Everton since David Moyes returned to Goodison Park in January.

  'What a week' - in-form Everton's revival under Moyes keeps rolling

  David Moyes has led Everton to four wins in six league games since returning to the club

  One point clear of the Premier League relegation zone and with just three wins in 19 matches, Everton were in a perilous position when David Moyes was reappointed as manager on 11 January. A little over a month later, however, the Merseyside club are suddenly the in-form team in the top flight. Saturday's victory at Crystal Palace means Moyes has picked up 13 points since returning to Goodison Park - with no team having secured more in that time (Arsenal are also on 13). The Scot's tally of four wins in six league matches is also more than his predecessor Sean Dyche managed in the 19 games before his dismissal. That stunning resurgence has lifted Everton 13 points above the bottom three, and only seven points below the top half, with 13 games of the 2024-25 season left to play. It would take an extraordinary set of results for the Toffees to slip back into the relegation picture, and fans can surely start to look forward to watching top-flight football at their new stadium on Bramley Moore Dock next season. "It was a great win because for large parts we weren't at our best," Moyes told BBC Match of the Day after the 2-1 victory at Selhurst Park. "I thought Crystal Palace were on top, but thankfully we got the three points. "Everton have had a difficult period, but I certainly think there's light at the end of the tunnel now."

