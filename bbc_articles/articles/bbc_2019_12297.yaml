id: bbc_2019_12297
title: Californians cope with mass power cuts - BBC News
date: '2019-10-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49982012
content: |-
  Around two million people are in the second day of no electricity following organised power cuts.

  Pacific Gas and Electric (PG&E) estimates around two million people are without electricity after the utility company cut the power.

  This is the largest power outage in California's history and is meant to prevent the spread of wildfires.

  PG&E says they're starting to restore power in areas where the weather is improving.
