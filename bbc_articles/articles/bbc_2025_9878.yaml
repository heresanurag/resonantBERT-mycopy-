title: Violent criminals could be let out early for good behaviour under new proposals
  - BBC News
date: '2025-05-22'
section: UK
url: http://www.bbc.co.uk/news/articles/cql22xwg62vo
content: |-
  The landmark sentencing review calls for fewer custodial sentences and earlier prison releases.

  Violent criminals could be released early and chemical castration pilot expanded after review

  The Independent Sentencing Review warns that "we cannot build our way out of" prison overcrowding

  Violent prisoners, including those convicted of sex offences and domestic abuse, could be released after serving just a third of their sentence in a bid to ease prison overcrowding, under new recommendations made in a landmark review. The Independent Sentencing Review also recommends that more offenders are managed in the community instead of serving custodial sentences. The government will expand a small pilot scheme offering voluntary chemical castration to some sex offenders to 20 more prisons after the report said that trial should continue. Former Lord Chancellor David Gauke, who chaired the review, told Radio 4's Today programme that reducing sentences was "the right thing to be doing".

  Earlier, Gauke said major reforms were needed to "end the dangerous cycle of emergency releases". "The scale of the crisis we are in cannot be understated," he said. "Overcrowded prisons are leading to dangerous conditions for staff and contributing to high levels of reoffending." Last year, thousands of inmates were released early in an emergency measure to deal with prison overcrowding. Eligible prisoners serving more than five years were automatically released after serving only 40% of their fixed-term sentence, rather than the usual 50%. The government then commissioned the Independent Sentencing Review to look into the causes of the crisis, and to consider alternative punishments to custodial sentences. The government previously confirmed it wanted to start work on three new prisons before the end of 2025, and that £4.7bn would be allocated for prison-building between 2026 and 2031 at the government spending review, due next month. But in the report released on Thursday, Gauke warns "we cannot build our way out of" the overcrowding crisis. The government is expected to accept some of the key measures in principle, with further detail to follow in a future sentencing bill. Justice Secretary Shabana Mahmood is expected to respond to the review on behalf of the government in the House of Commons later on Thursday. The review also calls for:
  • None Offenders to be given short custodial sentences of less than 12 months in only exceptional circumstances, such as if they don't comply with court orders or to provide respite for victims of domestic abuse
  • None The continuation of a pilot scheme providing voluntary chemical castration for sex offenders in the south-west of England
  • None Suspended sentences to be allowed for up to three years, and for them to be used more for low-risk offenders with high needs, such as people with substance abuse issues or pregnant women
  • None Courts to have greater flexibility to impose fines or travel, driving and football bans
  • None More funding for the Probation Service - which supervises offenders serving community sentences or those released into the community from prison - and greater availability of electronic monitoring equipment like tags It also proposes an "earned progression model" for offenders, inspired by reforms in the US state of Texas. The BBC visited a high-security, supermax prison in Texas with Ms Mahmood in February. Under an earned progression model, offenders would progress through three stages: custody, where prisoners are incentivised to behave; post-custody, where offenders are strictly supervised and subjected to licence conditions; and the at-risk stage, where offenders aren't supervised but can be recalled if they offend again. Prisoners on standard determinate sentences - a fixed-length prison term - could move to the post-custody stage after serving one-third of their sentence providing they behave well. If not, they stay until halfway. This could include sex offenders and perpetrators of domestic abuse. As first reported by The Sun, Justice Secretary Shabana Mahmood is seeking to expand the chemical castration pilot for sex offenders to two more regions - a measure she hopes will be a staging post to a full, nationwide rollout. She is also considering whether to make the measure mandatory, rather than voluntary, though no timeline for making this decision has been set. The review recommends that specialist domestic abuse courts should also be expanded to better support victims, and more perpetrators of violence against women and girls should be tagged. Perpetrators of domestic abuse should be more clearly identified at sentencing so that the right interventions are put in place for them to be managed inside and outside prison, it adds. The Domestic Abuse Commissioner for England and Wales, Dame Nicole Jacobs, said the measures, if adopted, would send "a clear message to domestic abusers that they can now offend with little consequence". Campbell Robb, chief executive of prison support charity Nacro, said a move away from short jail terms towards community sentences "could be a genuine game-changer, interrupting the vicious cycle that traps people in prison". However, Justice for Victims said said the report had not taken the views of those impacted by violent crime into account. The campaign group said: "We welcome the extra investment and plans for new prison places from the Government. But there isn't any excuse for letting the worst offenders get out of prison even earlier." Meanwhile, shadow justice secretary Robert Jenrick said "scrapping short prison sentences" amounts to "effectively decriminalising crimes like burglary, theft and assault".

  BBC News understands that tens of thousands more offenders could be tagged under the proposals, putting further pressure on an already stretched probation system. Although the review recommends more resources for probation, staff say they are worried about being put under even more pressure. One probation officer told BBC News: "We can't cope now, God knows how we'll cope if these recommendations are accepted. I'm already looking for another job. It's just not possible to do all this work." National Association of Probation Officers general secretary Ian Lawrence told BBC Breakfast he welcomed the report but warned the early release scheme "won't hang together" without "desperately needed resources into the probation service". William Morey, who was convicted of murder in 1988 and served a decades-long prison sentence, told BBC News that prisons "are not running properly, because they haven't got the staff to run properly". Morey said he feels deep regret for his crime. "I was really shocked at the levels of self-harm, the levels of violence, the lack of staff, the continual bang up," he said. "I think the thing we need to take into account is, what kind of sentences are these people going to be given, and what kind of help is there in the community for these people?" He also told BBC News that he was worried about the strain it would be put on the "already overwhelmed" probation service.

  England and Wales has one of the highest prison population rates in western Europe. An interim report from the Review, published in February, found the prison overcrowding problem was driven by successive governments trying to look "tough on crime". Despite overall crime rates declining since the mid-1990s, the prison population in England and Wales almost doubled between 1993 and 2012, while reoffending has remained high, it said. Governments over the past 25 years jailed more criminals, despite evidence that it does not prevent re-offending, the report added. Gauke also previously warned that without radical change, prisons in England and Wales could run out of space again by next Spring. Thursday's recommendations, Gauke says, are "focused not only on bringing the prison population under control but ultimately reducing reoffending and ensuring victims are protected". "Taken as a package, these measures should ensure the government is never again in a position where it is forced to rely on the emergency release of prisoners," he adds. "I urge the Lord Chancellor and Prime Minister to act with bravery in their response." Andrea Coomber KC, chief executive of Howard League - a national charity working for less crime, safer communities and fewer people in prison - supported moves to increase the number of community punishments. She told BBC News that it would be "much better [for offenders to] spend more of their sentence in the community with access to courses, access to support, to housing, education, relationships with families - those things that are proven to stop reoffending".

