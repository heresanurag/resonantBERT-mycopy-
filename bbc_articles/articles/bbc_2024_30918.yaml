id: bbc_2024_30918
title: 'Newspaper headlines: Prince Andrew urged to avoid royal Christmas - BBC News'
date: '2024-12-16'
section: The Papers
url: http://www.bbc.co.uk/news/articles/czxdeevk5ljo
content: |-
  Sources have told several papers that pressure is mounting on the prince to avoid Buckingham Palace.

  Several of the papers lead on the alleged Chinese spy linked to the Duke of York. The Daily Telegraph says the anonymous businessman helped an elite British private school expand to China,, external while the Daily Mail reports that, alongside royals and prime ministers, he also mixed with "captains of industry", external. It demands he "must be named". The Guardian says the court order protecting his identity may be lifted,, external while the Independent says ministers are facing calls to "take a tough stance" against any interference from Beijing.

  According to The Times, Prince Andrew is also under pressure., external It quotes Buckingham Palace "insiders" who say he should "do the decent thing" and step back from public appearances over Christmas. Sources tell the Sun, external that after "a hell of a year", the last thing the Royal Family wants is the scandal "dragging on" over the festive period. The paper's headline is: "Banned old Duke of York".

  The i has seen leaked negotiating documents, external which it says show the EU is "prepared to drive a hard bargain" when it comes to new deals with the UK on trade and security. EU nations are said to be "happy with the status quo" and are "becoming exasperated by the UK making demands without offering concessions". The paper says the bloc wants a new fishing agreement and easier migration for people under 30, as preconditions to the start of any talks.

  "IHT raid will cost more than it makes" is the headline on the front page of the Telegraph, referring to the Chancellor's Budget changes to inheritance tax. It highlights a report from economists, which says that cutting tax relief for family businesses and farms will lead to a drop in investment, which will outweigh the extra income the government expects to gain. The paper says the inheritance tax raid could "backfire", costing £1bn overall. But the Treasury has defended the move.

  A survey of economists for The Financial Times suggests that the US Federal Reserve will take a "more cautious approach", external to interest rate cuts as Donald Trump returns to the White House. They believe the president-elect's proposed tariffs and levies on China will stoke higher inflation. But one expert suggests there could be a "confrontation" between Mr Trump and the reserve's chair, if rates don't fall.

  Health Secretary Wes Streeting backs the Daily Mirror's campaign to end what it calls "cosmetic cowboys", external. He tells the paper he is worried about the "Wild West in cosmetic surgery", and promises to consider calls to crack down on unregulated high-street salons and clinics.

  And in what it calls a "coup for the BBC", the Mail - among others - reports that Sky Sports presenter Kelly Cates will take over from Gary Lineker, external on Match of the Day. She is said to be a part of what The Times calls a "hat trick of hosts" rotating alongside Gabby Logan and Mark Chapman. Sources tell The Daily Express that "no deal has been signed as yet". But the Telegraph says that as the daughter of Kenny Dalglish, Cates grew up steeped in the game and has the skill and authority to front football's flagship show.
