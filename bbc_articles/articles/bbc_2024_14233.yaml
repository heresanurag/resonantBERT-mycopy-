title: 'Newspaper headlines: ''Remember them'' and presenter ''missing in Greece''
  - BBC News'
date: '2024-06-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c3gg7xr2rr1o
content: |-
  A mix of stories feature on the front pages of Friday's newspapers.

  'Remember them' and presenter 'missing in Greece'

  Almost all of the front pages carry images of the D-Day commemorations in Normandy. The Daily Express pictures the King wiping away a tear, external. Royal Marines are shown wading ashore as they retraced the steps of their 1944 predecessors, in a wraparound cover of the Sun, external. The Daily Telegraph highlights a tribute to the 23,000 Allied troops who parachuted behind enemy lines 80 years ago, external; the hundreds of paras who re-enacted the jump yesterday, the paper says, faced nothing more hostile than French border officials, standing by to inspect their travel documents. But the Daily Mirror's headline is "PM ditches D-Day", external - as it claims Rishi Sunak skipped a major ceremony with world leaders in Normandy, to record a TV interview. The paper says the prime minister has been "blasted" by "furious military figures" - including the former Army Colonel Richard Kemp who says the prime minister "should have been there" to show gratitude to those who fell. The Mirror says No 10 and Conservative bosses declined to comment. The Guardian reports that the Conservatives are under growing pressure to return donations from the businessman Frank Hester,, external after some employees made fresh claims that he had made inappropriate comments about race at work. One tells the paper he used a mock Chinese accent in front of colleagues with a Chinese background. The Guardian says it has put the allegations to Frank Hester and he has not responded. A Conservative spokesperson says the party considers the matter resolved, because Mr Hester has previously apologised for comments about Diane Abbott.

  The Times says it has uncovered examples of Green Party election candidates sharing antisemitic conspiracy theories online, external. One is said to have posted that Israel may have "engineered" the attacks by Hamas on 7 October. The paper's handed a dossier to the Greens; a spokesman is quoted as saying the party is taking the allegations seriously. The Mirror and the Guardian report that Labour's election manifesto will include a commitment on Palestinian statehood, external. Labour sources explain there will be a pledge to recognise a Palestinian state before the end of any peace process, and to prevent such a move from being vetoed by a neighbouring country. The Guardian says Labour is hoping the wording will help recover some ground among Muslim and progressive voters who have become disillusioned with the party's foreign policy in recent months. A Labour Party spokesman says it did not comment on leaks. "How Could He Have Vanished Into Thin Air?", external asks the Daily Mail as it leads on the search on a Greek island, for the broadcaster Michael Mosley, who is a columnist for the paper. Local officials are quoted describing the temperature on the island of Symi as "unbearable", on the day he went missing. The Mail says a "huge operation" is under way to find Mr Mosley, with a special police dog unit arriving on Friday. The Telegraph picks up on a study by Oxford University researchers, which suggests the Viagra pill could in future help prevent dementia, external. The drug treats erectile dysfunction by improving blood flow and the scientists found evidence this also occurs in blood vessels in the brain - though they say larger trials are needed.

