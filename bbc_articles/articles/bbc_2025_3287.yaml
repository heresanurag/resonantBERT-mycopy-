content: |-
  Queensland's iconic Surfers Paradise beach looks strikingly different after the storm eroded the sand.

  Ex-tropical cyclone Alfred caused huge swells and flooding as it hit Australia's east coast over the weekend.

  Footage shows beach erosion at the Gold Coast's Surfers Paradise, a car windscreen impaled by a tree and damage to property caused by the storm.

  Residents are being warned that heavy rain is set to continue in the region over the coming days.
