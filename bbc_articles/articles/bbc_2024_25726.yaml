  A murder investigation is continuing after Kieran Shepherd, 30, dies following an assault in a Chelmsford street.

  Two more men charged with murder of Kieran Shepherd

  Kieran Shepherd, 30, died following an incident in Great Baddow

  Two more men have been charged with the murder of a 30-year-old in a residential street, police have said. Kieran Shepherd died at the scene of a serious assault in Meadgate Avenue in Great Baddow, near Chelmsford, Essex, on Tuesday at about 12:30 BST. Essex Police confirmed that Joseph Dawe, 20, of Greenland Gardens, Great Baddow, and Zack O’Keeffe, 19, of Stafford Green, Langdon Hills, Basildon, have been charged with murder and will appear at Chelmsford Magistrates’ Court on Monday. On Saturday, the force said Harrison Carpenter,19, of Ben Wilson Link, Springfield, Chelmsford, had appeared before magistrates. He has also been charged with murder.

  Police said the investigation is continuing. Mr Shepherd's family have described him as a "kind and loving son, brother and father". A statement read: "Our lives will never be the same without him; he will be forever in our hearts. "His loss has left a massive hole in the lives of his family and friends."

