  The BBC hears from women who have seen their rights crushed since the Taliban took control of Afghanistan.

  The BBC has heard from women who have seen their rights crushed since the Taliban took control of Afghanistan.

  The BBC's South Asia and Afghanistan correspondent Yogita Limaye met women who said they had been "treated like animals" while she was beaten and detained after attending a protest.
