title: Train cars catch fire while moving through Ontario - BBC News
date: '2024-04-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68878299
content: |-
  Local officials reported no injuries after five train cars were spotted ablaze heading towards a downtown area.

  Five train cars moving through London, Ontario were spotted ablaze as they headed towards the city's downtown area.

  The London Fire Department reported no injuries were caused by the fire and said that they were treating the incident as potential arson.
