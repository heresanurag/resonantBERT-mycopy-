title: Oxford University murder suspect arrested in US - BBC News
date: '2017-08-05'
section: UK
url: http://www.bbc.co.uk/news/uk-40835894
content: |-
  Andrew Warren was one of two men being sought by police investigating a killing in Chicago.

  Wyndham Lathem (left) and Andrew Warren were arrested more than 2,000 miles from the crime scene

  An Oxford University employee and a US professor suspected of killing a man in Chicago have handed themselves in.

  Somerville College senior treasury assistant Andrew Warren, 56, handed himself in nearly 2,000 miles away in San Francisco while Prof Wyndham Lathem, 42, gave himself up in Oakland.

  The pair have been accused of fatally stabbing Trenton Cornell-Duranleau, 26, in Mr Lathem's Chicago flat on 27 July.

  The killing triggered a US-wide manhunt for the suspects.

  Mr Warren and Mr Lathem are due in separate courts in California in the coming days where authorities will seek to have them transferred to Chicago.

  Chicago Police Department (CPD) spokesman Anthony Guglielmi tweeted that both suspects were now in police custody in Oakland.

  In a statement, Chicago police said: "Both individuals will be held accountable for their actions and we hope today's arrest brings some comfort for the victim's family."

