title: '''The buck stops with Mark'' - whistleblower blasts Facebook''s aversion -
  BBC News'
date: '2021-10-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-58810711
content: |-
  Frances Haugen said Facebook researched youth addiction, yet did not act, in order to save profits.

  In a US Senate hearing on Facebook's algorithm targeting young users, former Facebook product manager Frances Haugen testified on the company's knowledge and analyses on its younger users.

  "The buck stops with Mark [Zuckerberg]," she said. "We need to protect kids."
