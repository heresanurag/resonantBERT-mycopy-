title: William and Kate join children on island nature trail in Mull - BBC News
date: '2025-05-01'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cwy74ngk6yyo
content: |-
  The Duke and Duchess of Rothesay are on the second day of their official visit to the Isle of Mull.

  The Princess of Wales met local children and their families during a walk in Ardura Community Forest in Mull

  The Prince and Princess of Wales are spending their second and final day on the Isle of Mull with children taking part in an outdoor learning session with forest rangers. William and Catherine celebrated their 14th wedding anniversary on Tuesday as they began an official visit to the island off the west coast of Scotland. Their final day of the mini-tour will focus on the natural world, which Catherine has previously described as her family's "sanctuary". The couple, who are officially known as the Duke and Duchess of Rothesay when in Scotland, have visited the Ardura Community Forest - which plays a vital role in protecting the biodiversity of the island.

  The royal couple are on the second day of their visit to Mull

  The visit included a nature trail in the forest

  Their Royal Foundation is funding the ranger service here – an injection of cash that will ensure its survival. Under the canopy of trees alongside a stream, the royal couple met local families who bring their children to the forest for outdoor learning. The princess proved a big draw for the nursery age children. Four-year-old Rosie-Mae gripped the princess's hand tightly during the visit, guiding her through what forest schooling offers. She told the princess that she had a dream about her last night.

