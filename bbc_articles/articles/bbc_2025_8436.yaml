  Rosie's Mum, Sally Maccoll, knew her daughter was keen to be involved. "She's obsessed with Princess Kate so as soon as Kate came walking down I felt her grab my arm and she was like - she's here, there's a real-life princess," she said. "She dragged Kate around, down to the river and they threw some sticks in. I kept my distance and let her do her thing. She is a very confident young lady. It was really special, she'll remember it for a long time."

  The royal couple were guided through the forest

  The Royal Foundation's Community Impact Programme is providing funding for nature projects in Mull and Iona.

  For the royal couple, but the princess in particular, this part of the visit has been especially meaningful. Since her cancer treatment, she has spoken repeatedly about how being outdoors and engaging with nature helped her through a difficult year. And wherever Prince William goes,it seems football makes an appearance. One of the dads here wore an Aston Villa shirt – a surefire way to get the attention of William who is a committed Villa fan.

  The visit aims to highlight the importance of protecting and championing the natural environment. Afterwards, William and Catherine took the public ferry from Mull to Iona to spend some private time together. But as they hopped off the ferry, there was time for a quick photograph with comedian, broadcaster and mental health campaigner Ruby Wax, who now spends much of her time on Iona.

  Catherine and William stopped to pose for a picture with Ruby Wax

  William and Catherine released a romantic image on their social media accounts on Tuesday evening to mark their 14th anniversary.

  The royal couple shared this photo taken on the Isle of Mull on Tuesday to mark their wedding anniversary.

  They were married at Westminster Abbey on 29 April 2011, when tens of thousands of people lining the streets for their wedding procession to Buckingham Palace. The couple met while studying at the University of St Andrews.

