  England had almost 74% possession but little to show for it apart from an occasional goalmouth scramble, when a John Stones header was cleared, with a couple of comfortable shots easily fielded by Slovenia keeper Jan Oblak. The statistics are significant, with England ranked 17th for shots and 19th for expected goals among the 24 teams at Euro 2024. And as Euro 2024 groups go, Group C ranks down with the worst ever. It was the first Euros group with five matches ending in draws and the first Euros group with no teams scoring more than one goal in a game. If you wanted thrills, you needed to go elsewhere and certainly England have not provided any. So where does Southgate go now, particularly as he was in the very small minority who felt there were good signs here? If he sticks with his tried and trusted formation, then it is likely Rice and Mainoo will be paired in midfield. Foden had his moments and worked tirelessly, while Chelsea’s Cole Palmer provided a lively 19-minute cameo as a right-flank replacement for Saka. Palmer was direct, confident and suggested he could offer fresh impetus to an England side badly in need. He has put himself in the frame for a starting place, giving Southgate one of the more pleasant problems to ponder. Anthony Gordon's appearance for the closing moments was presumably a result of Foden’s tiredness rather a desperate bid for a late winner. England captain Harry Kane, once again on the margins, talked up the feat of finishing top of the group, offering some optimism when he said: "If you look at previous tournaments, we have played our best football in the knockout rounds, like the last Euros against Germany, Ukraine and Denmark, so for sure there is more to come." If England are to make their mark on a tournament that held such high hopes, Southgate must hope that Kane is right because it looks a long shot at present.
