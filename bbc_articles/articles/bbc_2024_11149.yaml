title: Mountain tragedy father and son Tom and Richie Parry 'never forgotten' - BBC
  News
date: '2024-06-01'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/articles/c900yd3v207o
content: |-
  Tom Parry and his son Richie, from Cheshire, fell while on a hillwalking trip in the Highlands.

  Richie and Tom Parry fell while walking on a mountain in Glen Coe

  The family of a father and son who died in a hillwalking accident in Glen Coe have said they will never be forgotten. Police said Tom Parry, 49, and his 12-year-old son Richie, were killed in a fall on the mountain Stob Coire Nan Lochan. The pair from Alsager in Cheshire were reported missing after failing to return home. Their bodies were found on Wednesday night. Wife and mother Gemma Parry said her husband was a loving father, and their son Richie an energetic, loving boy.

  Mrs Parry said: “Tom was a caring and loving father to his children and a loving husband to me, his wife Gemma. Richie was an energetic, loving boy who loved his quizzes, maths, and sports. He always cared for others as well no matter what. “We would like to take this chance to thank the Scottish and Cheshire police as well as the mountain rescue service along with all the other emergency services involved in finding Richie and Tom. “We would also like to thank the community of Alsager and all of our family friends who have helped us and supported us throughout this time. “Tom and Richie will be sadly missed and never forgotten." Glencoe Mountain Rescue Team described the pair as experienced hillwalkers. Insp Katy Duncan of Police Scotland said: “Our thoughts remain with the Parry family at what is a very difficult time for them. “We would like to thank everyone who responded to our appeal, to all emergency services and mountain rescue volunteers.”

  Glencoe Mountain Rescue Team volunteers were involved in an extensive search operation

  Mr Parry was an incident manager/controller working night-time shifts at security and risk company The Senate Group. On Thursday, chief executive Paul Keeling said staff were in shock, and many had offered to go to Scotland to help in the search. Mr Keeling said their "hearts went out" to Mr Parry's wife Gemma and their other son, Joe. He said: "Tom was a key member of our team. He was more than just a colleague - I really want to emphasise the loss to us is just immense. "Tom was dedicated to Richie and Joe. His heart was his children." Mr Keeling said Mr Parry's interest in hillwalking was well known at the company, adding that he would meticulously plan his walks.

  Mr Parry's boss Paul Keeling said the hearts of staff went out to the family

  About 45 mountain rescue volunteers were involved in the search for Mr Parry and his son. This included 15 members of the Glencoe team, along with members of the neighbouring Lochaber team and mountain rescuers from Keswick, Langdale Ambleside and Cockermouth who were training in the area. A coastguard helicopter from Prestwick, Ayrshire, was also involved. Glencoe Mountain Rescue Team said the bodies were found by teams on foot.
