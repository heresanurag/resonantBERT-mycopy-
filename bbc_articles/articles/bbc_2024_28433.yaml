title: Fenland town's wonky Christmas tree wish comes true - BBC News
date: '2024-11-19'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/cgmve2lz2rmo
content: |-
  March has got another leaning tree after last year's resulted in global media attention.

  March Town Council requested another wonky Christmas tree after last year's leaning tree "put March on the map"

  A Cambridgeshire market town which became the centre of a global news story about its wonky Christmas tree last year has had this year's delivered – and it is a wonky one again. March Town Council said it had been inundated with requests to try to replicate the "banana" shaped tree this year, and so it had asked its suppliers for one. Sarah Lemmon, the clerk of the council, said the supplier told her it could not make any promises. But Christmas came early for fans of wonky trees when this year's leaning one was unveiled on the recently pedestrianised Broad Street.

  Last year's tree was such a global sensation that it is being chopped up so people can buy a slice of history

  "I loved it last year. It was very 'March', so quirky," said 29-year-old Emily Parkes. "I hope it is now a tradition. I want to try to get a slice of the old one. It's a piece of history now."

  Emily Parkes said she had been hoping for another wonky tree for March

  Paul Hicks said his relatives in Australia knew all about last year's tree through media reports Down Under

  Fenland District Council member Paul Hicks said he thought it was "absolutely brilliant" to have another wonky tree. "It put March on the map last year. We had tourists, [and] shops made T-shirts and greetings cards celebrating the leaning tree," he said. "It boosted the local economy and I'm chuffed to see we have another one."

  Daniel Fortuna said he was initially "very embarrassed" about how last year's tree looked before it became "world famous"

  Daniel Fortuna is a tree specialist from March who has been responsible for putting up the town's Christmas trees for the last two years. "It was unusual for me to have around 20 people watching the operation today. Last year, there were only two," he said. "The council requested a wonky tree, and it definitely has got a lean."

