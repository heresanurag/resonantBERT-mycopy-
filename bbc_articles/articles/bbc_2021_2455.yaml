content: |-
  Just under 500,000 first coronavirus vaccine jabs were administered on Friday alone.

  The grand finale of this season's NFL - the Super Bowl - takes place on Sunday evening, but coronavirus restrictions mean events are a little different this year.

  Super Bowl week normally begins with airport photo opportunities as the teams arrive in the host city, followed by Opening Night - a media extravaganza where reporters from around the globe speak to players and coaches in a packed arena.

  But this year the interviews have been conducted via video conferences, with both teams preparing at home.

  There would usually be concerts and week-long parties for fans, but official festivities have been limited to the Super Bowl Experience - an interactive football theme park which was fully booked before Super Bowl week.

  This year's half-time show will look very different to last year's when Shakira crowd-surfed Image caption: This year's half-time show will look very different to last year's when Shakira crowd-surfed

  All NFL stadiums have been empty or operating at reduced capacity this season and on Sunday there will be 25,000 fans - including 7,500 vaccinated healthcare workers who have received free tickets - along with 30,000 cut-outs.

  The NFL is providing all spectators with PPE kits on arrival at the stadium, and mask-wearing will be mandatory for fans, players and team staff.

  Bars and restaurants are open in Tampa but Florida state guidelines advise citizens to wear face coverings in public and maintain a six-foot distance, while fans have been asked to keep gatherings small.

  And what about the coveted half-time show?

  This year it will be performed by Canadian singer The Weeknd, who will perform on a stage constructed in the stands rather than on the field.
