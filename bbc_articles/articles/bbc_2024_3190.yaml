id: bbc_2024_3190
title: Gaza soldier videos could breach international law, experts say - BBC News
date: '2024-02-10'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68255881
content: |-
  BBC Verify has found videos posted by Israeli soldiers showing Gaza detainees bound and blindfolded, which experts say could breach international law.

  Images of Palestinian detainees, some stripped to their underwear, bound and blindfolded that were filmed and uploaded online by Israeli soldiers could breach international law, legal experts say.

  International law says detainees must not be exposed to unnecessary humiliation or public curiosity.

  BBC Verify looked at hundreds of videos openly shared by Israeli soldiers in Gaza since November 2023. We verified eight showing detainees.

  The Israeli Defense Forces (IDF) say they have terminated the service of one of the reservists we identified, who uploaded this video on 24 December 2023.

  The IDF says videos like these do not represent its values. It did not respond to any further request for comment.
