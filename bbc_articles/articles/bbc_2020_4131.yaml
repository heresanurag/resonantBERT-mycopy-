id: bbc_2020_4131
title: Pope Francis marks Holy Week in near-empty basilica - BBC News
date: '2020-04-05'
section: General
url: http://www.bbc.co.uk/news/world-europe-52172239
content: |-
  A small number of worshippers attended the mass, while observing social distancing.

  The beginning of Holy Week is typically marked by a service in the Vatican attended by thousands.

  This year only a small amount of people attended because of coronavirus.
