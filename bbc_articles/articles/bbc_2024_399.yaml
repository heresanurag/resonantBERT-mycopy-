  Humphries has now won 18 games in a row as he charges to the top of the world rankings. The 28-year-old has reached three quarter-finals at the World Championship, but he had never averaged more than 100 at this tournament until his quarter-final. He averaged 108.74 against Williams, 33, which is in the top 10 in the history of the tournament, and took out scores of 100-plus on six occasions. "It feels amazing. I would never have imagined myself to be the world number one, that is a special, special feeling," Humphries told Sky Sports. "To do it in style too, I was really pleased with that performance. Like I've said in many interviews, world number one can last a couple of months, world champion is forever." On Littler, Humphries said: "I've seen the way he's played many, many times but when you come on this stage it can be a lot tougher but he's just proved that he's got a lot of bottle. "Nothing is going to faze him. I'm probably going to have to play the game of my life. "I've got an uphill task and hopefully we can give the people one of the best world finals ever seen."

