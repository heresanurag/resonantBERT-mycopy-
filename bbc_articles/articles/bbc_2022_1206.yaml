title: 'Covid: No tests for fully vaccinated travellers to England from 11 February
  - BBC News'
date: '2022-01-24'
section: UK
url: http://www.bbc.co.uk/news/live/uk-60108374
content: |-
  Travel industry bosses have welcomed the change, saying they hope demand for holidays will soar.

  The transport secretary has indicated he is committed to simplifying the UK's passenger locator form filled out by travellers ahead of their journey.

  In a question to Grant Shapps, Labour MP Ben Bradshaw says the form is a "massive irritant", being longer than the EU equivalent and "very complicated".

  Speaking in the Commons after announcing changes to the testing rules, Shapps said: "I entirely agree with him about the complexity of the passenger locator form."

  From 11 February, fully-vaccinated arrivals to England will need to verify their status via a passenger locator form but will not have to be tested.

  People who do not qualify as fully vaccinated will still need to fill out a passenger locator form to demonstrate proof of a negative Covid test taken two days before they travel and they must still take a post-arrival PCR test.
