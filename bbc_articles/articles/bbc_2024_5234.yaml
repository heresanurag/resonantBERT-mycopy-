title: Lewis Hamilton says F1 hard to trust with no accountability in the sport -
  BBC Sport
date: '2024-03-21'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/68623596
content: |-
  Lewis Hamilton will move to Ferrari next season

  Lewis Hamilton says there is "no transparency and no accountability" in Formula 1 as the sport continues to be rocked by off-track wrangles. The seven-time champion appeared to conflate controversies involving governing body the FIA and the behaviour of Red Bull team principal Christian Horner. Speaking before this weekend's Australian Grand Prix, Hamilton said: "With the FIA, things happening behind closed doors, there is no accountability and the fans need that." He added: "How can you trust the sport and what is happening here if you don't have that?" Hamilton praised F1 Academy director Susie Wolff for taking legal action against the FIA following its controversial conflict of interest inquiry into her last year. Wolff announced her legal case, which is believed to be one of defamation against a number of senior figures within the FIA, on the same day as the organisation's ethics committee cleared its president of claims he interfered with races in Saudi Arabia and Las Vegas last year. Asked whether Mohammed Ben Sulayem still had Hamilton's confidence as FIA president, Hamilton said: "(He) never has." The Mercedes driver added: "I am incredibly proud of Susie. She is so brave and she stands for such great values and she is such a leader. "In a world where often people are silenced, for her to be standing up sends such a great message, and I love that she has taken it out of this world and is fighting it from the outside. "So hopefully, this stand she is taking now will create change and have a positive impact. And especially for women." In continuing his remarks, he appeared to reference the controversy surrounding Horner, who was accused of inappropriate behaviour by a female colleague. Horner, 50, has always denied the claims. Red Bull dismissed the complaint after an internal investigation and have since suspended the employee who made them. She has appealed against Red Bull's decision to dismiss her complaint. BBC Sport has previously reported that the reason given by Red Bull to the employee for her suspension was that she had been dishonest. Hamilton added: "It is still a male-dominated sport. And we are living in a time where the message is: 'If you file a complaint, you will be fired.' And that is a terrible narrative to be projecting to the world, especially when we're talking about inclusivity. "We need to make sure we are staying true to the core values." Ben Sulayem was accused by a whistleblower of demanding the overturning of a penalty to Aston Martin's Fernando Alonso in Saudi Arabia last year, and of asking his officials not to pass the Las Vegas track fit for racing. A report by the FIA's compliance officer contained claims by an eyewitness who was a senior FIA official that both things had happened. But on Wednesday, the FIA announced that after interviewing 11 witnesses, its ethics committee had cleared Ben Sulayem "of any wrongdoing". Hamilton's team-mate George Russell, a director of the Grand Prix Drivers' Association, said: "You trust that the leaders in the sport have its best interest at heart rather than their own best interests, and that goes back to the transparency thing. "If things are transparent and we see the outcome of these cases, we all have a chance to judge for ourselves with all the facts and figures. "But when we don't have the facts and figures and there is no transparency, you always think there is something being hidden. That's why I think it is so important for the sport to send the right message."

  Max Verstappen has won the first two races of this season

  The Horner controversy has revealed a major internal power struggle at Red Bull, involving the team principal, the motorsport adviser Helmut Marko, the two main shareholders and Jos Verstappen, the father of three-time world champion Max Verstappen. The Dutch driver said on Thursday: "I don't want to be too involved with these kinds of things. I am the driver and I am here to look at the performance side of things and that's what I'm hired for. "But from what I know everything was handled in the right way. I am not going into any further details because I don't know more than that and I also don't want to know because that is not my job or task within the team." Verstappen has repeatedly given equivocal answers when asked whether Horner had his full support and faith as team principal. In Melbourne, he said: "It is very important that we try to keep the key players in the team for a longer period of time because that's where the performance is." But he refused to name who he deemed the key people to be. The 26-year-old reiterated, amid speculation he could leave Red Bull in the wake of the controversy, that it was his "intention for sure to be here until the end" of his contract, which lasts until 2028. And asked whether he felt as comfortable in the team as he did six months ago, Verstappen said: "I always felt comfortable because for me it is like a second family. "In a family there might sometimes be... how would you say? Not disagreements, but as you know, you can't choose family. You can choose friends. "Honestly, for me it has been the same and we just focus on the performance, I would like the chat to be a little bit more about the great car we have but hopefully that will come slowly."

  Ferrari's Carlos Sainz will drive in Friday practice two weeks after having an operation for appendicitis that forced him to miss the previous race in Saudi Arabia. The Spaniard said he was "confident" he could "jump in the car and do well". He added: "I feel like it will be possible given how I am feeling right now. Will I be at 100%? For sure not. But will I be fit to race, and the feeling right now is yes. "I am fit to jump in the car and try but if I don't feel good, I will be the first one to raise my hand and say I need another two weeks."

