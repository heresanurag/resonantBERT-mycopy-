title: Barriers fitted at last level crossing of its kind in Scotland - BBC News
date: '2023-04-06'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-65189076
content: "The crossing in Aviemore is on a line used by Strathspey Railway's steam\
  \ locomotives.\n\nThe crossing forms part of the Strathspey Railway\n\nSafety barriers\
  \ have been installed at the last automatic open railway level crossing in Scotland.\n\
  \nDalfaber Level Crossing in Aviemore was built in the early 1980s and is on a private\
  \ line used by Strathspey Railway's steam locomotives.\n\nIt was an open crossing\
  \ with warning signs and lights but no barriers before the new improvements were\
  \ made.\n\nNew footways have also been constructed as part of the £1.1m upgrade\
  \ to improve safety at the site.\n\nThe crossing has been the scene of collisions\
  \ and near misses involving cars and trains - including an incident in March last\
  \ year.\n\nP\uFEFFolice Scotland previously warned of motorists failing to stop\
  \ as trains approached the crossing.\n\nThe work is a condition of Scotia Homes'\
  \ planning approval to build 75 new homes on a nearby site.\n\nAccess to the new\
  \ development involves using the crossing.\n\nScotia Homes worked with Strathspey\
  \ Railway and Highland Council on the upgrade.\n\nS\uFEFFtrathspey Railway has been\
  \ operating steam locomotives for 40 years.\n\nIts takes railway enthusiasts and\
  \ other visitors on trips between Aviemore, Boat of Garten and Broomhill."
