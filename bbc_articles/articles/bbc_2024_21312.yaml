title: Welcome to Wrexham star Arthur Massey dies aged 100 - BBC News
date: '2024-08-09'
section: Wales
url: http://www.bbc.co.uk/news/articles/c9qglpegrexo
content: |-
  Wrexham AFC paid tribute to its oldest fan after his death was announced online.

  Arthur Massey met the King in 2022 when he visited Wrexham to celebrate its new city status

  Wrexham AFC has paid tribute to its oldest fan after he died aged 100. Arthur Massey starred in series three of Disney+ hit Welcome to Wrexham in which he called the club his "idol" and revealed the first game he attended was when he was aged seven in 1931. "There were no stands, nothing, only The Turf pub," he told the show. Describing himself as a "Wrexham boy through and through" he was seen planning his hundredth birthday with his family.

  His death was announced on X, formerly known as Twitter, by daughter Julie Birrell who posted a picture of her father along with the caption: "14/3/24 - 8/8/24. RIP Dad." Reposting her message the club said: "Everybody at Wrexham AFC is extremely saddened to learn of the passing of life-long supporter Arthur Massey, aged 100."

  "All our thoughts are with Arthur's family and friends at this time. It's Always Sunny in Philadelphia star Rob McElhenney, who owns the Red Dragons with Deadpool star Ryan Reynolds, said: "What a beautiful man. Thank you for sharing him with the world.

  Rob McElhenney, right, pictured with Wrexham co-owner Ryan Reynolds, paid tribute to Arthur

  And Welcome to Wrexham producer, Bryan Swarberg, said: "Incredibly sorry for your loss. "His was a life well lived. He was a great man. "Love to you and the family." In 2022, Arthur met King Charles when he visited the ground with Queen Camilla as part of a visit to celebrate Wrexham's new city status. The news of his death comes as Wrexham get ready for their first game in League One on Saturday. They were promoted in April.
