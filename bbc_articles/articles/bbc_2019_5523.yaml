title: Brexit debate heats up on Question Time - BBC News
date: '2019-05-10'
section: General
url: http://www.bbc.co.uk/news/uk-politics-48222583
content: |-
  Programme host Fiona Bruce intervenes as politicians on the panel clash over Brexit.

  BBC Question Time panellists on Thursday included Amber Rudd MP (Conservative) Jonathan Reynolds MP (Labour) Anna Soubry MP (Change UK) and leader of the Brexit Party, Nigel Farage MEP.

  Viewers in the UK can watch the full programme on BBC iPlayer.
