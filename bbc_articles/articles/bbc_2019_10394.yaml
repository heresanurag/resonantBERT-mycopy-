title: Meteor lights up parts of Australian sky - BBC News
date: '2019-09-21'
section: General
url: http://www.bbc.co.uk/news/world-australia-49783230
content: |-
  Video shows the moment the sky above Tasmania and Victoria was lit up by a meteor.

  Video shows the moment the sky above the states of Tasmania and Victoria, Australia, was lit up by a meteor.

  Experts can't confirm the size of the meteor, which was seen at around 20:30 local time (10:30 GMT) on Friday.
