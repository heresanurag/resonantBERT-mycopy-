title: 'Mason Rist and Max Dixon: Five guilty of murdering Bristol teens - BBC News'
date: '2024-11-16'
section: England
url: http://www.bbc.co.uk/news/articles/c5ym7g5dx50o
content: |-
  Mason Rist and Max Dixon were stabbed to death just yards from Mason's front door in Bristol.

  Mason Rist, 15, (left) and Max Dixon, 16, (right) had been friends since nursery

  Four teenagers and a man have been convicted of murdering two best friends in a case of mistaken identity. Mason Rist, 15, and Max Dixon, 16, were stabbed to death with machetes yards from Mason's front door in Knowle West, Bristol, on 27 January. They were chased by the four armed teenagers who had been looking for revenge following an attack on a house in Hartcliffe, which Max and Mason had nothing to do with. Antony Snook, 45, will be sentenced on 19 November, while Riley Tolliver, 18, and three boys, 17, 16 and 15, will be sentenced on 16 December.

  Mason's mum Nikki Knight (left) and Max's mum Leanne Ekland (right) gave statements outside the court

  Snook, from Hartcliffe, Bristol, Tolliver and the 17 and 16-year-old had denied both murders. The 15-year-old boy admitted murdering Mason but denied killing Max. However a jury of nine men and three women at Bristol Crown Court took 18 hours 45 minutes to find the group guilty of both murders. As the jury foreman returned the verdicts none of the defendants showed any reaction from the dock. Members of Mason and Max’s families, who were sitting in the public gallery, cried as the guilty verdicts were given. Other relatives cheered and punched the air.

  This video can not be played To play this video you need to enable JavaScript in your browser. The mothers of Max and Mason say they are having to learn to live without their sons

  Speaking outside court Leanne Ekland, Max's mum, said: "Today’s outcome doesn’t change the fact that two families go home without their boys. “But we can now hopefully begin to process and remember them both and the happy memories both families have of Max and Mason." Speaking to the BBC, the boys' mums said that their sons were taken from them in a way that changed their lives forever.

  Antony Snook, 45, and Riley Tolliver, 18, were found guilty of murdering the boys

  Mason's uncle, David Knight, said that his nephew was "so loving and caring". He described how with his death, their family will never be complete. “He will always be in our hearts. "These animals took away a son, a brother, a nephew, an uncle, and a grandchild," he said.

  During the trial, the court heard Max and Mason each received fatal stab wounds from two machetes. One of the weapons used had a blade length of 42cm (16.5in), while a second was 41cm (16in). The jury was told how Max and Mason had been wrongly identified as being responsible for throwing bricks at a house in the neighbouring Hartcliffe area earlier that evening. The five accused had set off from Hartcliffe heading to Knowle West “hell-bent on revenge”, Ray Tully KC told the court. Snook drove down Ilminster Avenue and when the group saw Mason and Max in the street they wrongly believed they had spotted those responsible for the attack. Mr Tully added: “They were entirely wrong about that. Max and Mason had absolutely nothing to do with any earlier incident and no connection whatsoever with those events.”

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV captured the moments before the "horrific" stabbing

  Snook claimed he "didn't know" the teenagers were going to kill the boys when he drove them to the area in his Audi Q2. Mr Tully said the four younger defendants were all armed and argued all five people were responsible for their deaths, which the jury accepted. During the trial, the jury was shown CCTV captured from Mason’s home. It showed the Audi slow down as it passed Max arriving at Mason’s home in Ilminster Avenue shortly after 23:00 BST on the Saturday night. The car then drives out of frame, and Max and Mason leave the house together. Seconds later, the same camera captures the Audi reappearing and four people jump out, chasing the boys down the road, before inflicting the fatal injuries in an attack lasting 33 seconds.

  Members of the community rushed to Max and Mason who collapsed in the street to try and save them before paramedics arrived. The friends died in hospital within 15 minutes of each other in the early hours of Sunday morning. Det Supt Gary Haskins, head of Avon and Somerset Police's major crime investigation team, said: “These were two boys going about their business just out being friends. "They were cut down in the prime of their lives. They must have been absolutely petrified. "They were attacked for no reason whatsoever by individuals they didn’t know. "Unfortunately in the course of running away from their attackers they sustained injuries... so severe sadly they succumbed to those injuries. They were unsurvivable injuries."

  This video can not be played To play this video you need to enable JavaScript in your browser. WATCH: The moment Antony Snook is arrested for murder

  Det Supt Haskins said that within 59 minutes of the attack on Max and Mason, Snook was in custody. "He [Snook] was the adult who could have changed the course of this incident. "He’s the one that could have stopped this from happening.” He added: "These individuals, as a collective, went after those two boys. “They armed themselves together, they travelled together, they travelled back from the attack together, and they were intent on causing harm to whoever they came across.” Hours after the attack, one of the teenagers was caught on CCTV returning to a property in Hartcliffe carrying a McDonald’s meal. “Chillingly for me, what we do know is they even stopped off at McDonald's after attacking those two boys,” Det Supt Haskins said. “I think it speaks volumes really. Two beautiful boys lost their lives, and they went to McDonald's for an early morning breakfast.”
