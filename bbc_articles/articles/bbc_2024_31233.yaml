content: |-
  Police say the body of a man was found in a car in Helston Business Park.

  Women arrested for murder after body found in car

  The body of a man was found in a car at Helston Business Park

  A woman in her 80s has been arrested on suspicion of murder after a body was found in a vehicle on a business park in Cornwall. Devon and Cornwall Police said the body of man in his 60s from the Avon and Somerset area was found in a car at Helston Business Park on Wednesday. They said two women aged in their 50s and 80s, also from Avon and Somerset, had been arrested on suspicion of murder, concealing a death, and preventing a lawful burial. Det Insp Neil Blanchard from the Major Crime Investigation Team said he believed the people involved were known to each other and there was no wider risk to the public.

  The man's body was found by officers while they were making inquiries in the Helston area in the early hours of Wednesday following concerns for welfare, the force said. The women remained in police custody, they added. Det Insp Blanchard said there would be an increased police presence around the business park as the investigation was carried out. He asked anyone with related information to come forward.
