id: bbc_2017_2262
title: Ex-Sheffield City Council boss Roger Dodds jailed for sex abuse - BBC News
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-38859830
content: |-
  A BBC News investigation has revealed how Sheffield City Council failed to stop an employee, a predatory sex offender, from abusing his victims in council offices over two decades.

  Roger Dodds has been sentenced to 16 years in prison.

  The council was first told about the allegations against Dodds back in 1981 - but didn't inform the police.

  Years later, following further allegations, they allowed him to take early retirement with an enhanced pension.
