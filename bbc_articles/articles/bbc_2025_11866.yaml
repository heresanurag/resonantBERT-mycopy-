id: bbc_2025_11866
title: Trump orders Ice to expand deportation of migrants - BBC News
date: '2025-06-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/crk2kpk817vo
content: |-
  The president called on federal agencies to enforce the "largest mass deportation programme in history".

  Trump's latest order comes amid a new wave of protests against his immigration policies

  US President Donald Trump has ordered an expansion of the detention and deportation of migrants across the country as protests against his policies continue. In a post on Truth Social, Trump called on federal agencies to "do all in their power" to deliver "the single largest mass deportation programme in history", naming Los Angeles, Chicago and New York as specific targets. These cities are among the many where large-scale protests have broken out against raids on undocumented migrants since 6 June. Trump has faced legal challenges and criticism for his response to the protests - particularly his deployment of the military to quell the demonstrations.

  Trump said he had directed the "entire administration to put every resource possible behind this effort". He also promised to prevent "anyone who undermines the domestic tranquility of the United States" from entering the country. Addressing various federal offices including the Drug Enforcement Administration (DEA) and Immigration and Customs Enforcement (Ice), he wrote "you have my unwavering support. Now go, get the job done!" The post came a day after a new wave of protests against Trump's policies across the country. On 14 June, the "No Kings" movement demonstrated in cities stretching from Los Angeles to New York. Those demonstrations also coincided with a military parade in Washington DC to mark 250 years of the US army, which was held on the president's 79th birthday. One person died in a shooting at a No Kings march in Salt Lake City, Utah. Trump also ordered immigration authorities to focus their efforts on sanctuary cities - those that limit their assistance to federal immigration authorities - which during the protests have become a source of tension between federal and state lawmakers. Officials in these places have defended their legal rights to protect undocumented migrants. The command to expand deportations signals a follow-through on Trump's campaign promise to provide the "largest deportation programme of criminals in the history of America". Opinion polls suggested this policy had widespread support in the build-up to the 2024 US election. Since the deportation programme has grown, however, protests have only increased. This new order came just a day after the Trump administration directed immigration officials to largely pause raids on farms, hotels, restaurants and meatpacking plants, according to the Reuters news agency.
