  Ulvaeus posted a number of photos from the day, one of which showed the host of BBC show QI, Toksvig, dressed in red robes standing next to Ulvaeus, who donned a suit, and his wife Sas, who wore a green wrap dress. The broadcaster Gyles Brandreth said in a post to Instagram, external that he had "loved meeting Abba's Björn Ulvaeus" and Sas for his Rosebud podcast. He added that Toksvig had officiated the ceremony and Ulvaeus said she made the day "extra special". TV presenter Toksvig has been friends with Björn since the pair collaborated on Mamma Mia: The Party! in 2018.

  Abba celebrated 50 years since winning the 1974 Eurovision Song Contest this year.

  Ulvaeus is known for being one quarter of Swedish pop group Abba, who this year celebrated 50 years since their winning performance at the Eurovision Song Contest with their song Waterloo. The group was comprised two couples - Ulvaeus and Agnetha Faltskog, and Benny Andersson and Anni-Frid Lyngstad. The Swedish musician married Abba bandmate Fältskog in 1971. The pair had two children, Linda, 49, and Peter, 44, before divorcing in 1980. Andersson and Lyngstad also divorced in 1981, a year before the band split. The quartet did not reform to perform at Eurovision 2024 despite the event being held in Malmo, Sweden. Ulvaeus was also previously married to Lena Kallersjo, from 1981-2022.
