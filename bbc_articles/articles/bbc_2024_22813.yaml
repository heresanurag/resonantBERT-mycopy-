title: Abba's Björn Ulvaeus married by Sandi Toksvig to Christina Sas - BBC News
date: '2024-09-22'
section: Europe
url: http://www.bbc.co.uk/news/articles/clylrrdjg78o
content: |-
  Björn Ulvaeus has married his partner Christina Sas in a ceremony in Copenhagen

  Abba's Björn Ulvaeus has married his partner Christina Sas in a ceremony hosted by the comedian and broadcaster Sandi Toksvig. The 79-year-old Swedish singer, who has been married twice before, met Sas in Nuremberg, Germany, in 2021 in connection with the release of Abba's last album Voyage. A post to his Instagram, external page said: "Today on the 21st of September 2024, Björn Ulvaeus married Christina Sas from Herning, Denmark. They met in Nurnberg in 2021 in connection with the release of Abba's last album Voyage and started dating in the spring of 2022." The wedding took place in Copenhagen in the presence of close friends and family.

