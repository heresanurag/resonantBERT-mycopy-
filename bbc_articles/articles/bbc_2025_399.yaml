title: Pitsea hit-and-run crash kills two children - BBC News
date: '2025-02-01'
section: Essex
url: http://www.bbc.co.uk/news/articles/cpdxyj4j5p6o
content: |-
  Police urged anyone who saw what happened or has dashcam or doorbell footage to get in touch.

  Essex Police said the vehicle involved failed to stop at the scene

  Two people have been arrested after a 16-year-old boy and a nine-year-old girl were killed in a hit-and-run crash in Essex. The BBC understands the children were siblings. Police said a car failed to stop at the scene of the collision in Ashlyns, Pitsea, near Basildon, at about 18:25 GMT on Saturday. A man and a woman, both in their 20s, have since been arrested on suspicion of causing death by dangerous driving and failing to stop at the scene of an accident and were taken into custody.

  The force said emergency services were sent to the scene, but they could not save the children. Police appealed for information, particularly CCTV, dashcam or doorbell footage. Det Sgt Sam Nason, leading the investigation, urged people not to speculate and thanked the members of the public who tried to save the children's lives. "Specialist officers are supporting the loved ones of the two children who sadly died yesterday. "My team is working tirelessly to give them the answers they need about what happened. "At this stage we are not providing any more information about the boy and girl who have died and I would ask that their privacy, and that of their loved ones, is respected."

  Bunches of flowers and messages have been left at the scene

  About 20 members of the local community, including children, gathered together on Sunday and left floral tributes at the junction between Ashlyns and Walthams. One card left by a member of staff at a local school read: "I'm so sorry that you have both been taken away, far too young. "My thoughts and prayers are with everyone that had the joy to know you both, especially your family." Another read: "You were both taken too soon. "You will never be forgotten."

  Police remained in the area on Sunday

  Temporary Assistant Chief Constable Stuart Hooper said: "My thoughts are with the friends and family of the girl and boy who have died this evening. "Specialist officers are supporting them at this truly unimaginably difficult time. "Our officers will be carrying out inquiries in the area this evening to establish the circumstances which led up to the collision so if you saw anything or have any information please get in contact."

