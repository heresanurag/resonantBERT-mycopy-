  The police said the Slievenaman Road, Newcastle, has been closed as has Ott car park, and members of the public are asked not to travel to the area. NI Water said Silent Valley Mountain Park would be closed until further notice. Ciaran Diamond of NI Water said: "We know how much our visitors love Silent Valley and, earlier this week, we had partially reopened the park in the aftermath of Storm Éowyn. "However, NI Water must ensure public safety so the park will be closed from today Sunday 6th April 2025 until further notice. "We would like to reiterate our appeal to the public to be vigilant. Wildfires not only pose a risk to human life, wildlife and the environment but also our drinking water catchment areas." The Silent Valley Reservoir had just reopened its gates to the public recently after being closed for more than nine weeks because of damage caused by Storm Éowyn.

  A plume of smoke rises from a huge blaze in the Mournes on Saturday - the picture was taken from the Hen and Cock peaks

  The Northern Ireland Fire and Rescue Service (NIFRS) said the blaze on the Sandbank Road on Saturday night stretched for approximately two miles, and included a large area of forestry and it was close to property. More than 100 firefighters with 15 appliances worked throughout the night to bring it under control. The fire service told BBC News NI that a small number of residents near the site of the fire had been moved out of their homes on Saturday night. Chief fire officer Aidan Jennings said the conditions had been very difficult, with high winds complicating efforts to dampen the blaze. "The cause of this fire is believed to have been deliberate," he said. "I would like to acknowledge the dedication and commitment of our firefighters, control room operators and support staff who have worked tirelessly in recent days to ensure the safety of our community across Northern Ireland."

