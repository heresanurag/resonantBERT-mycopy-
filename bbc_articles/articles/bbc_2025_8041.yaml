  A 25-year-old man who was arrested by police investigating the fire has been released on bail. Supt Norman Haslett said: "We would reiterate our earlier appeal not to travel to the Slievenaman Road area of Newcastle due to an ongoing gorse fire -our colleagues at the Northern Ireland Fire and Rescue Service need space to operate." The blazes come after the National Hazards Partnership issued an amber wildfire warning this weekend, highlighting the likelihood of fires that could be difficult to control.

  The fire service said that from midnight on 3 April to midnight on 5 April it received 741 calls into its regional control centre, adding that a "significant amount" related to wildfires. They have urged the public to remain vigilant, but moved to reassure people that "normal service delivery is being maintained".

  Multiple wildfires have been reported in the Mourne Mountains in recent weeks. Some of them are thought to have been started deliberately. The minister for Agriculture, Environment and Rural Affairs, Andrew Muir, described the blazes as having a devastating impact on the environment and wildlife.
