title: 'Mourne Mountains: Fresh fires in Mournes after weekend arson - BBC News'
date: '2025-04-06'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c9dj5g2zq89o
content: |-
  A blaze in County Down stretched for approximately two miles, including a large area of forestry.

  Multiple wildfires have been reported in the area around the Mourne Mountains in recent weeks

  Firefighters are tackling a wildfire at Bloody Bridge in Newcastle, hours after another large gorse fire in County Down. A major incident was declared after the large wildfire broke out on Sandbank Road in County Down at about 17:00 BST on Saturday. A number of homes were evacuated. The blaze is being treated as arson. Separately, on Sunday morning, there were also wildfires in the Silent Valley and Ben Crom areas of Newcastle, as well as a wildfire involving forestry in Dervock, County Antrim.

