title: Huge cruise ship crashes into Venice harbour - BBC News
date: '2019-06-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-48489523
content: |-
  The MSC Opera, its horns blaring, crashes into a boat moored at a wharf in San Basilio-Zattere.

  A cruise ship has crashed into a dock in Venice, hitting a smaller vessel.

  The MSC Opera, its horns blaring, ploughed into a wharf in San Basilio-Zattere.

  No major injuries have been reported.
