title: Ukraine says it hit Crimea bridge with underwater explosives - BBC News
date: '2025-06-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/cz708lpzgxro
content: |-
  Kyiv's security service says it used more than 1,000kg of TNT to mine the supports of Russia's Kerch Bridge.

  Ukraine says it hit Crimea bridge with underwater explosives

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Ukraine's Security Service (SBU) said it targeted the Crimea bridge with underwater explosives on Tuesday following an operation lasting "several months". The SBU said it had "mined the supports" of the bridge with explosives equivalent to 1,100kg of TNT, which "severely damaged" the bottom level of the supports. The "first explosive device" was detonated "without any civilian casualties", the SBU added. The information shared by the SBU could not be immediately verified. Russian media initially said the bridge was briefly closed to traffic but that it had reopened by 10:00 local time (08:00 GMT). However, later in the day, local authorities warned the bridge was temporarily closed again.

  Unconfirmed reports on social media said more explosions had occurred around the structure. The official Telegram channel sharing operational updates about the bridge said: "We ask those on the bridge and in the inspection zone to remain calm and follow the instructions of the transport security officers." Russia has not yet commented on Tuesday morning's attack but Russian military bloggers speculated that an underwater drone, rather than explosive, had hit a protective barrier. The SBU said its director, Lieutenant General Vasyl Malyuk, personally supervised the operation and coordinated its planning. In a Telegram post, it quoted Malyuk as saying Ukraine had hit the Crimea bridge in 2022 and 2023 and was therefore "continuing this tradition under water." "No illegal Russian facilities have a place on the territory of our state," Malyuk said. "Therefore, the Crimean Bridge is an absolutely legitimate target, especially considering that the enemy used it as a logistical artery to supply its troops." The bridge - also known as Kerch Bridge - was built by Russia after it invaded and annexed the Crimean Peninsula in 2014. It was inaugurated by Russian President Vladimir Putin to great fanfare in 2018. In Ukraine, the bridge is a hated symbol of Russian occupation. Moscow guards it carefully - which makes any attack on it, whether with underwater drones or explosives, a remarkable achievement. Tuesday's strike on the bridge comes barely 48 hours after Ukraine hit several targets across Russia as part of an operation dubbed 'Spider Web'. Kyiv said it smuggled more than 100 drones into Russia and managed to get them delivered near air bases by unsuspecting lorry drivers. The drones then flew out of the lorries and attacked Russia's prized strategic bombers in locations across the country.
