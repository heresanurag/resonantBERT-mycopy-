content: |-
  Her directorial debut will be shown at the festival, as will the Wes Anderson movie she stars in.

  Scarlett Johansson hitting Cannes both on-screen and behind the camera

  Scarlett Johansson is making her directorial debut at the Cannes Film Festival

  Oscar-nominated actress and Avengers star Scarlett Johansson is featuring twice at this year's Cannes Film Festival, both in front of and behind the camera. She will appear in Wes Anderson's new project, The Phoenician Scheme, alongside Benicio Del Toro and Tom Hanks and off-screen in her first directorial project. Her new film, Eleanor the Great, has also been revealed as part of the line-up and follows an elderly woman as she copes with the death of her best friend. Johansson's starring role comes as organisers of the film festival have said that they are committed to showcasing more work from female filmmakers.

  Wes Anderson's new film, The Phoenician Scheme, is up for the top prize at Cannes

  Speaking at a press conference, Cannes president Iris Knobloch said she was "honoured to amplify" the voices of women. Johansson, 40, who is best known for starring as Black Widow in the Avengers films, has entered her film into the second prize category. Competing for the main Palme d'Or prize this year are 20 films, of which six come from female directors. This includes Kelly Reichardt, whose drama The Mastermind, starring Josh O'Connor and John Magaro, will be showing at the festival. Those looking to replace Oscar-winning Sean Baker, who won the top prize at Cannes for Anora last year, also include Iranian director Jafar Panahi and his film A Simple Accident, plus horror newcomer Ari Aster with Eddington, which stars Joaquin Phoenix and Emma Stone. Robert De Niro will also make an appearance at the festival to receive an honorary Palme d'Or, while Tom Cruise's final instalment of Mission: Impossible will also be shown.

  It's also been a busy few weeks for Harris Dickinson, who was recently announced as one of the new stars of Sir Sam Mendes' Beatles quadrilogy. Dickinson, who will play John Lennon in the films, will also be making a directing debut at Cannes. The 28-year-old will show his film Urchin, about a homeless man in London, at the French festival.
