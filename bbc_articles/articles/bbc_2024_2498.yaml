title: Sara Cox 'devastated' by news of Steve Wright's death - BBC News
date: '2024-02-13'
section: General
url: http://www.bbc.co.uk/news/uk-68289600
content: |-
  She was speaking on Radio 2 after hearing the legendary DJ has died aged 69.

  Sara Cox has told Radio 2 listeners she is devastated, after hearing that legendary DJ Steve Wright has died aged 69.

  Wright presented programmes for BBC Radio 1 and Radio 2 for more than four decades.

  He joined the BBC in the 1970s and went on to host the afternoon shows on Radio 1 and Radio 2.

  He also fronted television programmes for the BBC, including Top of the Pops.

  Wright was last on air on Sunday, hosting a pre-recorded special Valentine's Day edition of his Love Songs programme.
