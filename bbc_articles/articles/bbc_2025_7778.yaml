  Temperatures could reach 23C (73F) in parts of the UK on Friday, as mostly clear skies bring a bright, sunny start to April. Parts of southern England have highs in the low 20s forecast for Friday afternoon. The Algarve, in Portugal, is set to see highs of 18C, accompanied by some showers. Temperatures are expected to remain in the mid to high teens for England, Wales and parts of Scotland over the weekend and into Monday. Skies will be mostly clear, with some cloud expected for eastern Scotland and England on Saturday. Meanwhile, the Met Office has issued an amber wildfires warning for parts of England, southern Scotland and Northern Ireland until Monday, as conditions are dry with strong winds.

  Last month was the sunniest March in England since records began in 1910, according to the Met Office. It was also very dry, with the UK's rainfall total just 43% of the usual amount. There is a good chance that the highest temperature recorded so far this year - 21.3C in Chertsey, Surrey and Northolt, London on 20 March - will be beaten. London, Reading, Oxford and Cambridge are among places expected to experience the 22C warmth on Friday afternoon, while Cardiff and Carmarthen in Wales could see 21C around the same time. Scotland and Northern Ireland are set to be relatively cooler, with highs of 11C for Edinburgh and 16C for Belfast. While it is expected to be slightly cooler at the weekend - topping out at 19C in southern England - the public is being urged to avoid lighting fires outdoors, over concerns they could spread. Scottish Fire and Rescue Service (SFRS) said on Wednesday that there was a "very high to extreme risk" of fires spreading. This is because the warm, dry conditions are ideal for wildfires to start and spread. In England there were 185.8 hours of sunshine in March, the Met Office says, the country recorded its sixth driest March and Wales its fourth driest since records began in 1836. This means vegetation will be dryer than usual, making it easier to become fuel for a developing fire. Comparatively wet conditions in 2024 allowed more vegetation to grow. At the same time, winds are anticipated to remain strong over the coming days, which are capable of spreading fires faster. Wind gusts are expected to reach up to 34mph in England and southern Scotland on Friday and Saturday, and will be in the 20s across the UK into Sunday. The National Fire Chiefs Council (NFCC) advises against using disposable barbecues in the countryside and parks, and discarding things like cigarettes and glass bottles that can cause a fire to start. Parts of south-west England and Wales could see some rain on Friday morning, but this is expected to dissipate by mid-morning. Saturday and Sunday are set to be mostly dry, before some rain reaches northern Scotland on Monday afternoon. Some parts of eastern England and Scotland could also see some low cloud and mist. Into next week, high pressure will shift on top of the UK again, bringing lighter winds and more dry, sunny weather that will see temperatures warm up above the seasonal norm again.
