title: Actor Craig Russell welcomes new brain tumour findings - BBC News
date: '2024-10-04'
section: England
url: http://www.bbc.co.uk/news/articles/c4gdw43vy1po
content: |-
  Craig Russell, from drama Queen Cleopatra, had a seven-hour surgery on his own tumour in 2023.

  Craig Russell hopes new treatments could save others needing to undergo lengthy surgery

  A Netflix star who had surgery to remove a tumour from his brain has welcomed the findings of a new study which could lead to less-invasive treatments in future. Craig Russell, 47, had a seven-hour operation in 2023 to remove a low-grade meningioma, a tumour that grows from the membranes surrounding the brain and spinal cord. Scientists at the University of Plymouth have successfully stopped tumour tissues growing in the lab by targeting proteins on the surface of tumours with drugs. The actor, who played Mark Anthony in the streamer's drama Queen Cleopatra, said the news was "incredibly positive and very exciting".

  Craig Russell had to have his skull "rebuilt" after his surgery

  Mr Russell, from Falmouth in Cornwall, received his diagnosis after suffering from migraine attacks and brain fog for months. He said he had to have his "skull rebuilt" and was still recovering 18 months later despite the tumour being "a thing of the past". "It’s a safer and speedier recovery process which of course therefore means less pressure on all concerned," he said. The actor added: "This development is huge. "To think that hopefully in the not too distant future people with low-grade tumours can be treated in this way means that sufferers and their families won’t have to go through what we did."

  Researchers at the university's Brain Tumour Research Centre of Excellence tested a drug treatment which stopped tumour cells growing in a lab by targeting a key protein. The protein, called Mertk, encourages tumours to grow and is connected to several types of cancer. Researchers are now working on how to move to clinical trials. Dr Sylwia Ammoun, one of the research leaders, said there were "many drugs being developed to target Mertk" and the team hoped "a new treatment may be on the horizon".
