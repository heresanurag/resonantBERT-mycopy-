  There has been no let up to the worst violence in years despite widespread calls for a ceasefire.

  'Everyone was running' after warning

  Video caption: Watch: How the tower block collapsed after strike Watch: How the tower block collapsed after strike A reporter with the Al-Jazeera news outlet has been describing what it was like to flee the tower block in Gaza where her organisation's offices were based, moments before it collapsed after being hit in an Israeli air strike on Saturday. Youmna Al-Sayed said they had been given a one-hour warning by Israel on to evacuate the 12-storey building, prompting a scramble to make it out. "We know that when we get an evacuation call, we need to act quickly because they might target the building at any time," she told the BBC's Newshour programme. "Everyone was running around, on the stairs in the elevators, grabbing their kit, grabbing our cameras, whatever we could get with us, and running quickly, which was really traumatising for us." "I’ve seen lots of buildings being targeted and brought down - but when it’s your house or your building... it’s really devastating.”
