title: Suffolk MP Patrick Spencer pleads not guilty to sexual assault - BBC News
date: '2025-06-16'
section: England
url: http://www.bbc.co.uk/news/articles/c4g7g1858rpo
content: |-
  He is accused of two attacks on two separate women in August 2023.

  An MP has pleaded not guilty to two counts of sexual assault alleged to have taken place at London's Groucho Club. Central Suffolk and North Ipswich MP Patrick Spencer is accused of two assaults on two women on the same day in August 2023 - before he was elected. The 37-year-old, who was elected as a Conservative MP at the 2024 general election, appeared at Westminster Magistrates' Court. He is due to appear next at Southwark Crown Court on 14 July for a plea and trial preparation hearing.

  Mr Spencer stood in the dock to confirm his name as Michael Patrick Spencer and his date of birth. District Judge Paul Goldspring told the MP, whose address was given in court as Suffolk, he was on unconditional bail. The charges were first brought against Mr Spencer in May. The Conservative Party removed the whip from him last month and he now sits as an independent MP.

  Mr Spencer spoke to confirm his name and date of birth

  Prosecutor Polly Dyer told the court that the alleged offences happened on 12 August 2023 at the Groucho Club. The barrister said the MP, "who seemed intoxicated", insisted on buying one of the females a drink and made her feel uncomfortable by asking her about her marriage. Ms Dyer said Mr Spencer then allegedly tried to force her to have a drink before the woman walked away, as she felt it was inappropriate. The court heard that Mr Spencer was alleged to have then approached the complainant. The prosecutor said she turned her back to him, and Mr Spencer was said to have put his arms under her arms and cupped her breasts over her clothing. Ms Dyer said a similar account had been given by the second complainant. The MP was then alleged to have moved behind her and cupped her breasts with his hands over her clothing. The prosecutor said it was alleged that the woman took his hands off and was shocked and embarrassed. The court heard that a complaint was made to the Groucho club, and the matter was reported to the police. Mr Spencer was interviewed by the police earlier this year.

  Mr Spencer is next due to appear at Southwark Crown Court on 14 July

  Frank Ferguson, head of the special crime and counter terrorism division at the Crown Prosecution Service (CPS), previously said: "Following a review of the evidence provided by the Metropolitan Police Service, we have authorised two counts of sexual assault against Patrick Spencer MP. "The charges follow two alleged incidents involving two separate women at the Groucho Club in central London in August 2023." The Groucho is a private members' club in Soho's Dean Street. It opened in 1985 and became a well-known haunt of celebrities and media figures.
