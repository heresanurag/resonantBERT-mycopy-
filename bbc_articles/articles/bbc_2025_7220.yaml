title: Women deny stalking Madeleine McCann's family - BBC News
date: '2025-04-22'
section: Leicestershire
url: http://www.bbc.co.uk/news/articles/cy48gzlmj8po
content: |-
  Karen Spragg and Julia Wandel are told they will go on trial in October.

  Karen Spragg (left) and Julia Wandel entered pleas at Leicester Crown Court on Tuesday

  Two women have denied stalking the family of Madeleine McCann, who went missing in 2007. Julia Wandel, from Lubin in south-west Poland and Karen Spragg, of Caerau, Cardiff, entered not guilty pleas at Leicester Crown Court on Tuesday and were told they would both go on trial on 2 October. Ms Wandel, 23, is accused of sending letters and messages to Madeleine's parents Kate and Gerry, and siblings Sean and Amelie McCann between 3 January 2024 and 15 February this year as well as going to the family's home in Rothley, Leicestershire. Mrs Spragg, 60, faces one charge of stalking involving serious alarm or distress between 3 May 2024 and 21 February this year.

  Madeleine's disappearance at the age of three during a family holiday in Portugal is one of the most widely reported missing child cases and remains unsolved.

  Last week, ministers approved a further £108,000 of funding for the ongoing investigation into Madeleine's disappearance

  Ms Wandel is alleged to have gone to the McCann's family home on 2 May and 7 December 2024. She is also accused of sending a letter, calls, voicemails and WhatsApp messages to Kate and Gerry McCann, and sending Amelie and Sean McCann Instagram messages. At the hearing she was remanded back into custody while Mrs Spragg, who is also alleged to have made calls, sent letters and visited the family home, was granted conditional bail. A hearing to decide if Ms Wandel will be granted bail has been scheduled for August.

