title: Crawley teacher praises former pupil Gareth Southgate - BBC News
date: '2018-07-11'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-44788736
content: |-
  David Palmer says the England manager was an excellent sportsman with a great sense of humour.

  Gareth Southgate's early PE teacher has described the schoolboy's first taste of international football as a far cry from his current World Cup fame.

  While playing for Hazelwick School in Crawley, the team were taken to France for a tournament.
