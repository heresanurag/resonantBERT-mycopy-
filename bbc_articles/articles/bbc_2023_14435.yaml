title: Officer charged over Galgorm wedding incident - BBC News
date: '2023-09-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66903485
content: |-
  The 30-year-old is accused of assault and drink-driving after an incident at a hotel near Ballymena.

  The wedding was held at the Galgorm hotel near Ballymena

  An off-duty police officer has been charged over an incident at a wedding at a hotel in County Antrim.

  It happened at the Galgorm Spa and Golf Resort, near Ballymena, on Thursday.

  The officer, a man aged 30, was charged with drink-driving, disorderly behaviour and four counts of common assault.

  He is expected to appear before Ballymena Magistrates' Court on 19 October.

  An off-duty officer was arrested outside the venue over what police described as an unrelated matter and later released without charge.

  It is understood a misconduct investigation is ongoing by the PSNI's professional standards department.

  Correction 24 September 2023: In an earlier version of this story we stated that another off-duty police officer had been arrested and charged with drink-driving. That was not the case. She was released unconditionally without charge.
