title: MPs call for streaming levy to help fund UK TV production industry - BBC News
date: '2025-04-10'
section: Culture
url: http://www.bbc.co.uk/news/articles/ckg22d99v7qo
content: |-
  A CMS committee report warns of the need to safeguard "culturally distinct British productions".

  MPs call for streaming levy to help UK TV industry

  A share of the revenue streaming services make from subscription fees should be paid into a fund to support British high-end TV production, an influential group of MPs has said. In a new report, the Culture, Media and Sport (CMS) committee urged the government to improve support measures for producers while safeguarding the creation of distinctly British content. It follows an inquiry into the UK TV and film industry which examined the effects of the rise of streaming platforms like Netflix, Amazon and Apple TV. The report noted how "vital" dramas such as Adolescence are to the country's "identity, national conversations and talent pipeline", which they say is now "under threat".

  It is "time for streamers to put their money where their mouth is", the report read, suggesting that streaming companies should pay "5% of their UK subscriber revenue into a cultural fund to help finance drama with a specific interest to British audiences". Chair of the CMS committee, MP Dame Caroline Dinenage, noted how recent "big box-office blockbusters made in Britain have showcased the UK's world-class film and high-end television industry like never before". "But the boom in inward investment of recent years now risks crowding out our many talented independent British producers," she said. She added: "While streamers like Netflix and Amazon have proved a valuable addition for the industry and economy, unless the government urgently intervenes to rebalance the playing field, for every Adolescence adding to the national conversation, there will be countless distinctly British stories that never make it to our screens." Adolescence, created by Jack Thorne and Stephen Graham, tells the story of a 13-year-old boy who is charged with killing a female classmate. This week, it became fourth most popular English-language series in Netflix's history with 114 million views. A Netflix spokeswoman said: "The UK is Netflix's biggest production hub outside of North America - and we want it to stay that way. "But in an increasingly competitive global market, it's key to create a business environment that incentivises rather than penalises investment, risk taking and success. Levies diminish competitiveness and penalise audiences who ultimately bear the increased costs."

  Without the right kind of investment, MPs are worried the next potential hit UK shows like Adolescence won’t get made

  The Association for Commercial Broadcasters and On-Demand Services (COBA) said a levy risks damaging streamers' investment in the UK. Coba executive director Adam Minns said: "Especially in this economic climate, a levy risks impacting existing content budgets for UK shows, jobs, and growth, along with raising costs for businesses. "Ironically, it could actually damage public service broadcaster dramas by reducing co-production budgets at streamers." He added pressure on domestic production stemmed from the real terms decline in the TV licence fee. A BBC spokesman said the corporation "continues to invest" in British content but faced "significant financial challenges due to pressure on the licence fee and rising industry costs". "It is therefore integral that the BBC and the wider UK creative industries have the support in place to drive growth in the creative economy and support homegrown content and storytelling." The report released on Thursday noted how last year there was a 27% decrease in the number of domestic high-end TV productions made in the UK and a 25% fall in spend. The calls for greater help come after Wolf Hall director Peter Kosminsky told BBC News last month that the industry was in crisis, and that public service broadcasters including the BBC and ITV could no longer afford to make high-end British drama.

  The arrival of the streamers into the UK market "drove up the price of everything", Kosminsky told BBC Radio 4's Today programme on Thursday, to the point where the public service broadcasters "couldn't afford to make their programs anymore, so we need a new pot of money." He underlined how 17 other countries in Europe have imposed a similar levy "so that public service broadcasters can stay in the game." Speaking on the same programme, former BBC One controller Peter Fincham replied saying he did not agree. "I think this sounds to me a little bit like a tariff - to use a more fashionable word - and indeed a form of protectionism." A spokeswoman for the Department of Culture Media and Sport (DCMS) said: "We acknowledge the challenges facing our brilliant film and TV industry and are working with it through our industrial strategy to consider what more needs to be done to unlock growth and develop the skills pipeline. "We thank the committee for its report which we will respond to in due course."

  The report also noted while the introduction of tax breaks for independent British films, and for film and TV studios in England may have helped, it was not a "silver bullet" for solving many of the issues facing British producers. As well as providing greater support and resources for UK TV production workforces, it also suggested that lawmakers should consider cutting VAT on cinema tickets as well as doing more to meet the challenges posed by AI. Commenting on the report, Paul W Fleming, general secretary of Equity, which represents British performers, said the government should "heed the call" for the licensing of creative works in all cases where they are used to train artificial intelligence models. "AI is being built illegally by stealing Equity members' life's works," he said. Big tech firms "must be held to account", he added, "brought to the table and made to pay creators what they owe."

  The cross-party committee recommended the government and British Film Institute (BFI) should launch a national awareness campaign, highlighting the employment opportunities offered by film and high-end TV, and "the range of skills the industry requires". It stressed how the industry "benefits hugely from the flexibility afforded by a predominantly freelance workforce" and therefore more should be done to "support freelancers when they are out of work"; such as the introduction of a minimum hourly wage or guaranteed basic income. Head of industry union Bectu, Philippa Childs, said: "We welcome this timely and incisive report from the committee which identifies many of the urgent challenges currently facing the industry and its workforce." She added: "It's essential that the industry does not become too skewed towards large streamers, which risks the homogenisation of content and the loss of much of the UK's unique and distinctive output."
