title: Prince William's Welsh should be better, says language professor - BBC News
date: '2025-03-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy0dkjpe3k7o
content: |-
  A pre-recorded was published on social media video to mark St David's Day in Wales.

  A Cardiff University language professor says he expected Prince William to do more than "read for a few seconds from an autocue" during his St David's Day Speech. Dr Dylan Foster Evans, head of the School of Welsh, described Prince William's Welsh as "halting", meaning slow and hesitant, during an appearance on the BBC Radio 4 Today programme. He had pre-recorded a social media video to mark the day Wales's patron saint is honoured and to "celebrate Wales – its history, culture and incredible people". It is understood the prince has been using the language-learning app Duolingo to learn the language, but is not currently having formal lessons.

  This video can not be played To play this video you need to enable JavaScript in your browser. It is understood the prince has been learning some conversational Welsh

  Prince William's speech followed a trip to Wales with his wife, Catherine, the Princess of Wales. The pair baked Welsh cakes and spoke to people in Pontypridd about how they were coping following the recent flooding. In his message, translated to English, he said: "Hello. Today, on St David's Day, we come together to celebrate Wales – its history, its culture, and its incredible people. "From its breath-taking landscapes to its language, Wales continues to inspire. "Today, we will celebrate everything that is magical about Wales. "To the people of Wales and everybody around the world, Happy St David's Day." Dr Evans said many people would have been "pleased and impressed" to hear William speaking Welsh, but added that the prince has had enough time to prepare for the role. "It's been known [for a long time] that he will be the Prince of Wales. Welsh does have an official status in Wales since 2011 so maybe we should expect a bit more," he said. The prince has previously revealed that he was using the Duolingo app to lean some conversational Welsh. This is in contrast to his father, King Charles, who had formal lessons in the Welsh language whilst studying at Aberystwyth University. The lessons took place ahead of his investiture as the Prince of Wales in July that year at Caernarfon Castle. William has not had an investiture since his father announced he had created his eldest son and heir as Prince of Wales during his first televised address as monarch, the day after the death of Queen Elizabeth II in 2022.
