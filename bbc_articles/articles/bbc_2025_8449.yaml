title: Mike Peters' wife says her heart is 'broken' in tribute to The Alarm star -
  BBC News
date: '2025-05-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckg1djdd5n2o
content: |-
  The wife of the late Mike Peters says he "swept her off her feet" at 19 and she never looked back.

  My heart is forever broken, says Mike Peters' wife

  Mike Peters and his wife Jules were married for 39 years

  The wife of Welsh rock star Mike Peters has said her heart is "forever broken" after the loss of her "true love". In a tribute, Jules Peters thanked everyone for "loving him so much" after the musician's death aged 66, and said her husband's dying wishes were "for us to be happy". The front man of Welsh rockers The Alarm, Peters lived with blood cancer for 30 years and was awarded an MBE in 2019 for his services as a long-standing cancer campaigner and fundraiser. Mrs Peters said the singer swept her off her feet aged 19 and "she never looked back", adding: "I will forever be his kisser and will do my best to fulfil all of his desires, heading into the next life."

  Jules Peters described her husband as her "true love"

  "We always joked that I was the kisser and he was the kissed," Mrs Peters said in the statement. "He always had his eye on the next tune, the next adventure and kept me wanting more." Peters, from Prestatyn, Denbighshire, lived in Dyserth with Mrs Peters - who has fought her own cancer battle - and their sons Dylan, 20 and Evan, 18. The pair were married for 39 years. Influenced by the Sex Pistols, Peters started the band The Toilets, who later changed their name to The Alarm, in Rhyl in 1977. After the introduction of guitarist Dave Sharp and various changes of line-up, they played their first gig in Prestatyn in 1981. They went on to be the first Welsh musicians since Tom Jones and Bonnie Tyler to crack America.

  The couple had two sons together, Dylan, 20 and Evan, 18

  Peters was first diagnosed with lymphoma in 1995, and later diagnosed with chronic lymphocytic leukaemia which returned in 2015. He compared his relationship with cancer over the years to like "fighting a war". The singer became ill again in 2025, when his Richter syndrome - an aggressive form of lymphoma - returned. He and his wife had hoped a highly specialised therapy would "re-programme" his immune cells and lead to a cancer-free life. Her husband returned home before his death, Mrs Peters said, adding: "He told me the other day that he would always be in the other room. "We brought him home. He passed with us all by his side." "Most importantly Michael Peters' dying wishes were for us to be happy, to live our lives, to keep on moving forwards," she added. "So tonight be happy. Be happy that we were all able to love MLP."
