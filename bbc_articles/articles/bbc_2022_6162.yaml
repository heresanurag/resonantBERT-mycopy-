title: 'Local elections 2022: Party leaders woo voters on last day of campaigning
  - BBC News'
date: '2022-05-04'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-61317997
content: |-
  The rising cost of living dominates the final day of campaigning as parties pitch to voters.

  Local elections will be held across the UK on 5 May

  Party leaders are making their pitch to voters on the last day of campaigning ahead of local elections across the UK.

  The leaders are visiting key electoral battlegrounds before voters go to the polls on Thursday.

  Voters will elect councils which run services in England, Wales and Scotland, and the government in Northern Ireland.

  The elections will test support for parties locally and may indicate the mood on national issues.

  The elections will give party leaders their first opportunity to woo voters since the war in Ukraine began, and the row over parties held in Downing Street during lockdown, and increases to the cost of living.

  The rising cost of living has been a prominent topic of debate, with inflation at a 30-year high of 7%, driven upwards by surging food and energy prices.

  Speaking on a visit to Southampton Airport, Prime Minister Boris Johnson said his government wants to "help people in any way we can through the aftershocks of Covid".

  He said his ministers were helping people "in the immediate term", citing the £9.1bn energy rebate package, as well as cold weather payments.

  Mr Johnson dismissed the idea of a windfall tax on energy companies arguing that they should instead invest their profits in producing "more green energy to keep costs down".

  He said that would be better than "clobbering" the companies with an extra tax.

