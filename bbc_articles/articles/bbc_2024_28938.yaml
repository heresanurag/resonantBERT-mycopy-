title: UN climate talks overrun as poor nations seethe over funding - BBC News
date: '2024-11-23'
section: General
url: http://www.bbc.co.uk/news/articles/c2l9y89v9jno
content: |-
  Developing nations said a new cash offer from rich nations showed "contempt for our vulnerable people".

  UN climate talks have overrun into the weekend as a deep gulf formed between richer and poorer countries over cash to help those most vulnerable in a warming world. On Friday, wealthier nations offered to more than double to $250bn a year the cash they give developing countries annually to fight climate change. But poorer countries angrily rejected this as too low, with the group of small island nations saying they were "deeply disappointed" with an offer that showed "contempt for our vulnerable people". Efforts to limit emissions of planet warming gases were also up in the air, as the meeting went past the official closing time on Friday, with no indication of when agreement might be reached.

  After two weeks of talking, delegates here in Baku finally reached the crunch issues that were always going to face this meeting – dealing with climate finance, and improving efforts to cut carbon. The question of money has long been a running sore in global climate negotiations. Previous efforts to deliver funding of $100bn to developing countries ran late and often came in the form of loans. Here in Baku negotiators have attempted to improve the scale and sources of the funding. Developing countries said they needed $1.3tn by 2035 to cope with the growing impacts of a warmer world, and to take bigger steps in cutting their carbon. For most of the allotted time here in Baku, the richer nations refused to put a figure on how much support they would give. With just hours left to run, the Azerbaijani presidency produced a document with two figures – A $1.3tn overall goal by 2035 from all sources, but with $250bn from richer countries, who will take lead in providing the cash. That $250bn by 2035 would come from public and private sources. There would be no obligation on major emerging economies like China, who would be “invited” to make additional contributions. This means that whatever money China contributes voluntarily would be counted towards delivering the overall figure. Getting the extra cash to developing nations will be a challenge for richer countries, many of which are dealing with cost-of-living crises, and a hard sell to their taxpayers. "It has been a significant lift over the past decade to meet the prior, smaller goal,” a US official said in a statement. “$250 billion will require even more ambition and extraordinary reach.” But developing countries were quick to shoot the idea down. The Marshall Islands' climate envoy Tina Stege said the texts were shameful. “It is incomprehensible that year after year we bring our stories of climate impacts to these meetings and receive only sympathy and no real action from wealthy nations,” she said in a statement. “We are not here to tell stories. We are here to save our communities.”

  Low lying states like the Marshall Islands are particularly vulnerable to climate change

  This view was echoed by the Alliance of Small Island States (AOSIS). “We cannot be expected to agree to a text which shows such contempt for our vulnerable people.” For many developed countries, including the UK, the draft text published today failed to go far enough on increasing efforts to cut carbon. Last year’s gathering in Dubai saw countries agree to “transition away from fossil fuels in energy systems." Here in Baku, the texts “reaffirmed” the call on nations to give up coal, oil and gas, but doesn’t use the word “transition.” “The current text doesn’t make the headway we are looking for,” said a UK government source. “But it gives us a platform to negotiate from. There is a hard but achievable path ahead in the final hours - and that is what we are focusing on.” Negotiations will continue through the night.
