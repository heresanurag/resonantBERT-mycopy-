  Repair work on Blackweir Bridge is due to finish next Friday, says Cardiff University Image caption: Repair work on Blackweir Bridge is due to finish next Friday, says Cardiff University

  A bridge in Cardiff closed last year for Covid safety reasons is set to finally reopen as repair work is due to finish next Friday.

  Blackweir Bridge, over the River Taff in Bute Park, is a key route for walkers, runners and cyclists, but has been shut for almost a year.

  Cardiff Council closed the bridge last April due to people not socially distancing.

  However it then emerged that the bridge had serious structural and fire damage which needed attention.

  Cardiff University, which owns the bridge, says repair work is due to finish next Friday, 5 March.

  The council has said the bridge will reopen once all the repairs are done, adding that the "scientific understanding" of Covid-19 which prompted the closure had changed.

  When the bridge reopens, people using it will be asked to help prevent the spread of coronavirus by keeping to the left, crossing in single file, and not stopping.
