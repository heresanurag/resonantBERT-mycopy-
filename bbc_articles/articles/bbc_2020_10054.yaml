title: 'Covid in Wales: Updates from Tuesday 22 September - BBC News'
date: '2020-09-22'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-54247754
content: |-
  A round up of reaction to Wales' new coronavirus rules announced by the first minister.

  People should be allowed to make their own choices over the Covid risk posed to themselves and their families, the Brexit Party says.

  The party said it opposed the new restrictions being brought in by the Welsh Government.

  Party leader in the Senedd, Mark Reckless, said: "We think it would be much better to trust to people's individual judgments, as to their risk and the risk of those they live with, and make their own decisions depending on the evolution of the virus."
