title: Caernarfon's Carlton bakery closes after 100 years - BBC News
date: '2024-11-10'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy5l0lxe99ro
content: |-
  A family-run bakery closes its doors for last time, ending an era stretching back a century.

  A family-run bakery is closing its doors for the last time, ending an era stretching back more than a century. Carlton Bakery ceases trading on Saturday with the Roberts family selling up after four generations in Caernarfon, Gwynedd. It was founded by Dewi Roberts' great-grandparents in 1922 and the current owner is his father Alun, 83, known as cwstad (custard) by locals. Dewi, 40, who has worked in the shop since he was a boy but has done other work, told BBC Cymru Fyw he was taught to bake by his mother.

  He said running a bakery had been hard, getting up at three in the morning and working six days a week. He added that a recent loss of staff had increased the burden. Last weekend, the shop announced on social media that it would be closing on 9 November, prompting messages of support. "People have been really nice – it's been pretty overwhelming to be honest," said Dewi.

  Karen Morgan, who worked at the bakery for more than 20 years, said her first memories of the shop was visiting as a child. "I remember coming here with my mum to buy trifle and she used to buy chocolate cakes here for me and my brother on our birthdays." She said its closure was "terribly sad". Brenda Jones, who has worked at the shop for 15 years, added: "I don't know where people are going to get their bread now - I don't know where I'll go either to be honest. "I'm especially going to miss the bread rolls from Carlton."

  Then and now: Alun Roberts, the current owner of the bakery, is known locally as cwstad, which is custard in Welsh
