title: Virginia police officer rescues dog from house fire - BBC News
date: '2018-04-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43622284
content: |-
  Zoey the dog was rescued by a police officer who braved a house fire to save the pet.

  Bodycam footage shows a police officer in Buena Vista, Virginia, saving a dog from a house fire. The officer went back inside for Zoey the dog after her owners evacuated the smoke-filled property.
