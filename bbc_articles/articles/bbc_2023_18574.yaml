title: Rare video shows killer whale teaching its baby to hunt - BBC News
date: '2023-12-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67808509
content: |-
  An orca is seen singling out and subduing a dolphin so its calf can practice hunting techniques.

  Video filmed by a whale watching company off the Coast of San Diego shows a mature orca teaching its younger calf how to hunt.

  The group of killer whales was first spotted further north, near Long Beach, California. Whale watcher Domenic Biagini filmed the orcas returning south to the Mexican coasts and captured their hunt of the dolphin.
