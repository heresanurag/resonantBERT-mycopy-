content: |-
  Mike Coles picked up his result from City of Portsmouth College, more than 20 years after failing it the first time.

  Mr Coles was "overwhelmed" after opening his results

  A 42-year-old data analyst has said he is "over the moon" after finally getting his maths GCSE. Mike Coles picked up his exam result from City of Portsmouth College, more than 20 years after failing it the first time. He joined hundreds of thousands of teenagers getting GCSE, BTec Tech Awards and other Level 2 results across England, Wales and NI. When asked how he became a data analyst without a maths GCSE, he said it was down to "modern technology".

  "A lot of the systems I use do it for me," he told the BBC.

