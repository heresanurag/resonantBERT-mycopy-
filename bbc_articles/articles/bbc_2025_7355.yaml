title: Fake Norwich paramedic jailed for Tinder date rapes - BBC News
date: '2025-04-24'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/creq0xd4y51o
content: |-
  One of his victims says she is a "shadow of who I once was" and had tried to take her own life.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A man who pretended to be a paramedic has been jailed for raping and sexually assaulting women he met on Tinder. Jamie Kadolski, of Ladysmith Road, Norwich, was found guilty of committing nine sexual offences against three women in the space of 13 months. One of his victims said she was a "shadow of who I once was" and had tried to take her own life. Judge Anthony Bate said 25-year-old Kadolski still had "no insight into the gravity" of his offending. At Norwich Crown Court, he was sentenced to 12 years in prison, with a further three years on extended licence, and was also made the subject of a Sexual Harm Prevention Order.

  Jamie Kadolski previously worked as an East of England Ambulance Service call-handler, but pretended to be a paramedic

  The court previously heard how the former East of England Ambulance Service call-handler had told the women he was a paramedic. Prosecutors told the jury he used stickers on his work ID card to hide his more junior role. Kadolski was found guilty of three counts of rape and three sexual offences against one woman, and a total of three sexual offences against two others. The offending was said to have happened between August 2022 and September 2023. He was found not guilty of charges related to a fourth woman.

  Kadolski met his victims on the online dating app, Tinder

  One of Kadolski's victims said they felt they could not tell their family about what had happened. In a victim impact statement, they said they still had "vivid flashbacks" and experienced nightmares "almost every night" that he was going to break into their house and rape them. A second woman said she had tried to take her own life, describing herself as a "shadow of who I once was". Another victim said they blamed themselves for what had happened and "still do to this day". The judge said the defendant "projected a misleading impression of your healthcare professional status through your misuse of uniforms, health service identity cards and related papers". "Each of them [victims] expected to be safe in your company and able to enjoy a healthy and fulfilling future relationship based on mutual respect," he said. He described Kadolski as a "dangerous offender" who continued to pose a "high threat to women".

  Kadolski worked in the medical sector but never as a paramedic

  The jury previously heard that when questioned by police, Kadolski said he would not be able to pin someone down as he had been "sexually abused as a child". He told officers when interviewed: "I'm not the best with empathy or sympathy." Michael Cohen, for the defendant, said "others are representing Mr Kadolski in an application for permission to appeal" against the convictions. The East of England Ambulance Service said Kadolski was "immediately" suspended when it was alerted of his arrest. A spokesperson said: "We are appalled at the crimes that Jamie Kadolski has been sentenced for today. "Our thoughts are with the victims and all those affected by these horrific crimes. We recognise the courage it takes to come forward and speak out." Det Con Claire Floyd, from Norfolk Police, said the victims had "suffered truly traumatic ordeals at Jamie Kadolksi's hands". "Although no sentence can ever make up for what happened to these women, I hope that today's result can give some sense of comfort that this dangerous and manipulative sexual predator will be in prison for a significant amount of time." A Tinder spokesperson told the BBC it could not comment on specific cases. However, it said it took users' safety "seriously". "If a user contacts us to report any bad online or offline behaviour, our team carefully reviews the report and takes necessary action to remove any inappropriate profile from our platform," they said. "If a crime has been committed, we encourage users to report it to local law enforcement and our dedicated team will cooperate with law enforcement if they are contacted directly."

