title: 'Brexit: ''Business is key issue Tories must address'' - BBC News'
date: '2018-10-01'
section: General
url: http://www.bbc.co.uk/news/uk-politics-45702305
content: |-
  Tory donor Michael Spencer says the PM has "let herself down" by failing to champion business.

  Conservative donor Michael Spencer has told the BBC that business is one of the key issues the Tories must address.

  He said the Tories have "lost their way" and the prime minister has "let herself down" by failing to champion business.
