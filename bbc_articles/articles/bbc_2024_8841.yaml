title: 'Watch: Runaway horses filmed racing through central London - BBC News'
date: '2024-04-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68888407
content: |-
  Video on social media shows two horses, one covered in blood, running through central London.

  Runaway cavalry horses have been filmed racing through central London.

  Some of them appeared to be covered in blood.

  The Army said "a number of personnel and horses" were injured after several horses bolted during routine exercise.

  It appears they were spooked by noise from nearby building works

  The ambulance service said at least four people were hurt.

  All five horses were later recovered and returned to a military base, to be assessed by a vet.

