  Radio communications between the Boeing plane and airport staff are obtained after the aircraft's loses part of its fuselage.

  A passenger plane lost a section of its fuselage in mid-air, forcing it to make an emergency landing in the US state of Oregon on Friday.

  This is the moment staff on board Alaska Airlines Flight 1282 spoke to air traffic control as the incident unfolded.

  The airline said it would "temporarily" ground all 65 of its 737 Max 9 aircraft to conduct inspections.

