title: 'Watch: Man pursued after being seen running on Heathrow taxiway - BBC News'
date: '2025-06-10'
section: General
url: http://www.bbc.co.uk/news/videos/c62691yz6x8o
content: |-
  A man managed to get access to the Heathrow taxiway before being caught by staff and police.

  A man has been seen running across the Heathrow taxiway, chased by airport staff.

  In footage recorded by Big Jet TV, he is first spotted close to an Air Baltic plane.

  A van then follows after him and he is caught by staff in hi-vis jackets. Moments later a police van arrives to take him away.

  A Heathrow Airport spokesperson has said there were no delays to flights and the incident was quickly resolved.

  "Working with partners, we quickly resolved an incident at the airport involving an individual who accessed the airfield taxiway," the spokesperson said.

  "The individual has been removed from the airport. The airport continued to operate as normal and passengers travelled as planned."

  The Metropolitan Police said they "played a small role in helping to detain the man before normal operations resumed".

