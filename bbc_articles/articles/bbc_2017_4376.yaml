title: "Monkman. Goldman. Paxman: The University Challenge Final was something special\n\
  \ - BBC Three"
date: '2017-04-15'
section: General
url: http://www.bbc.co.uk/bbcthree/item/44c98162-4d3f-4ed1-a43f-affb085e061c?jujuhy&intc_type=promo&intc_location=news&intc_campaign=monkmania&intc_linkname=bbcthree_ent_article1
content: "Check out this content on BBC Three.\n\nSo there it is. Another year of\
  \ plummy accents, eccentric knitwear and quick-fire trivia, over.\n\nThe final gong\
  \ has sounded, the teams have clapped magnanimously at each other and the sheet\
  \ of corrugated metal with twiddly lines on it has been handed over. But for many\
  \ of us, this run of University Challenge did not end as we'd expected.\n\nPaxman\
  \ began with a slightly extended intro, outlining some of the numbers behind the\
  \ show: hundreds of entrants, dozens of teams, thousands of questions. What his\
  \ eyes normally communicate silently, his voice this time confirmed: It's been a\
  \ long series.\n\nAfter a couple of body-blows to Balliol, in which Paxman reminded\
  \ them they'd already lost once to Wolfson in the quarters, it was on to the intros.\n\
  \nYang. Chaudhri. The camera panned right and there he was, Eric Monkman, from Oakville,\
  \ Canada - the wingtips of his baby blue collar poking out from beneath a striped\
  \ blue/black crewneck. And like that, he was gone, turning to his left to introduce\
  \ the wry, kind-eyed Paul Cosgrove, who you can tell enjoys his fleeting role in\
  \ the major historical event that is #Monkmania.\n\nOn to Balliol. Potts. Lloyd.\
  \ \"And this is their captain...\" Goldman. For many, tonight's pantomime villain.\
  \ It's a thankless task, squaring off against Monkman. If you lose, you're the poor\
  \ sap who ran up against Monkman in the 2016/17 final (\"What was his name again?\
  \ Nice young man, wore glasses?\"). If you win, you dash the hopes of a nation.\n\
  \nLooks like this post is no longer available from its original source. It might've\
  \ been taken down or had its privacy settings changed.\n\nThen the quiz began. And\
  \ for the first half or so it was a tussle for dominance. Balliol were first out\
  \ of the blocks, answering the starter and all three bonuses for a perfect 25. But\
  \ Monkman knows his operatic characters...\n\n#UniversityChallenge \n\nQuestion:\
  \ What is it about #Monkman that makes him so irresistibly charming?\n\nAnswer:\
  \ pic.twitter.com/YxB9GVFlyH — JOE (@JOE_co_uk) April 10, 2017\n\nSo Wolfson were\
  \ soon back on track.\n\nIt carried on like this in a blistering display for much\
  \ of the first half. James Joyce, chloroform, historical accords from map boundaries,\
  \ famous duels. The teams tore through the Qs, with the two captains picking up\
  \ most of the points - often before Paxman had finished reading from his card.\n\
  \nAround 10 minutes in, Wolfson were 20 ahead. But then something strange happened.\
  \ Paxman got a few words into a question on the Iron Crown of Lombardy, and Monkman\
  \ buzzed. But when the crash zoom had finished and his name had been called, you\
  \ could tell he'd buzzed expecting the question to focus on something else, and\
  \ he had to put his hands in the air and offer \"It's housed... in Italy somewhere?\"\
  \n\nPaxman was not impressed. \"Yes, I'm afraid that is a completely useless answer,\"\
  \ he scolded, and offered it up to Balliol, docking Wolfson five points.\n\nLooks\
  \ like this post is no longer available from its original source. It might've been\
  \ taken down or had its privacy settings changed.\n\nA little later, a fiendish\
  \ question left the entire studio silent. What is the total atomic number of the\
  \ four elements that spell the word SNOB?\n\nAnd then Monkman could be seen forbidding\
  \ his players from buzzing.\n\nEventually Yang had a guess, and Monkman didn't look\
  \ impressed.\n\nFrom then, the contest felt somehow out of reach for Wolfson. They\
  \ rallied a couple of times, edging ahead here and there, but in the latter third\
  \ Balliol powered ahead, often answering correctly after Wolfson had buzzed in early\
  \ and been wrong.\n\nWhen the final final gong sounded, Balliol were a good 50 points\
  \ ahead. Monkman's Wolfson team had lost.\n\nBut there was a twist in the tale,\
  \ and a lovely coda to the series, when Paxman's disembodied voice explained that\
  \ the final we'd just been watching had been filmed some time earlier. After establishing\
  \ shots of Gonville and Caius College, Cambridge, we were suddenly in an oak-panelled\
  \ interior, port glasses on the sideboard and the eight finalists mingling around\
  \ none other than Professor Stephen Hawking.\n\nAfter Professor Hawking congratulated\
  \ the teams, and made a quip about bacteria, we were treated to perhaps the most\
  \ touching moment of this series - our man Eric Monkman's broad, beaming smile as\
  \ he took in the fact that he was in the presence of such a great mind.\n\nWe will\
  \ miss you, Eric Monkman.\n\nAnd finally, one more thank you: Thanks to these guys!\
  \ What a great experience we shared. pic.twitter.com/RFucsRTSKV — Eric Monkman (@e_monkman)\
  \ April 10, 2017"
