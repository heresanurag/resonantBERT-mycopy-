title: 'Mary Earps: Manchester United''s England goalkeeper set to join Paris St-Germain
  - BBC Sport'
date: '2024-06-25'
section: England Women
url: http://www.bbc.co.uk/sport/football/articles/c9xx85j2n05o
content: |-
  England goalkeeper Mary Earps is set to leave Manchester United and sign for French club Paris St-Germain on a free transfer.

  The 31-year-old had been negotiating a potential extension with United but is understood to have decided to join PSG when her contract ends this month.

  Earps signed for United from Wolfsburg in 2019, and in February 2021 signed an extension until June 2023 with the option for an extra year.

  United will not be in the Champions League next season after finishing fifth in the Women's Super League, 20 points behind champions Chelsea.

  Earps will be the second United star to leave the club on a free transfer in successive summers. Last July her England team-mate Alessia Russo joined Arsenal at the end of her contract.

  United forward Lucia Garcia is set to join Mexican champions Monterrey this summer, again on a free transfer, when her contract ends.

  Last season United boss Marc Skinner was under pressure from some fans but he signed a new one-year contract in May.

  Katarzyna Kiedrzynek and Constance Picaud shared goalkeeping duties for PSG last season, with the former making a key mistake in their title-deciding defeat by Lyon in May.

  Earps kept a clean sheet in the 4-0 win over Tottenham in the Women's FA Cup final last month.

  United's WSL rivals Arsenal made an unsuccessful world record bid for Earps last September.

  Earps was named BBC Sports Personality of the Year 2023 in December after her starring role in England's run to their first World Cup final.

  She played every minute of England's seven World Cup matches, conceding only four goals and keeping three clean sheets as well as saving a penalty in the final, which England lost 1-0 to Spain.

  The Nottingham-born keeper was previously part of England's Euro 2022 triumph, helping the Lionesses win their first major trophy.
