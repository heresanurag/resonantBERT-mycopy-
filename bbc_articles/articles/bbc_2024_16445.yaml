title: Celine Dion singing at Olympics would be great, says Macron - BBC News
date: '2024-07-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/cw5yw210x1ko
content: |-
  The singer is in Paris as speculation swirls the "queen of ballads" will perform at the opening ceremony.

  Celine Dion at Olympics would be great, Macron says

  This video can not be played To play this video you need to enable JavaScript in your browser. Celine Dion greets fans in Paris amid rumours of an Olympic performance

  "It would be fantastic news" if Celine Dion were to perform at the Paris 2024 Olympics opening ceremony, French President Emmanuel Macron has said amid speculation that she will make an appearance. The Canadian singer was pictured in the French capital ahead of the opening ceremony on Friday. But Mr Macron stopped short of confirming if the My Heart Will Go On singer was taking part. Dion, who records music in English and French, is among a host of stars, including Lady Gaga, rumoured to be taking part.

  "Apparently she has arrived in Paris, it's great!" Mr Macron said speaking to French broadcaster France 2. "I would be immensely happy if she could be at this opening ceremony, like all our compatriots." "I will not reveal anything, what [opening ceremony director] Thomas Jolly and all his teams have prepared. There is also a surprise," he added, before continuing with a smile: "I am not responsible for his schedule." An appearance by Dion would mark a comeback after she was diagnosed with Stiff Person Syndrome in December 2022, forcing her to cancel several live shows. The syndrome is a neurological condition that causes muscles to spasm. It would also be the second time that Dion, known as the "queen of power ballads", had participated in an opening ceremony of the Olympic Games, after performing in Atlanta in 1996. She was seen outside her hotel on Tuesday surrounded by fans. Fan Oceane Moulin, 24, said: "For me, she’s the best singer and a diva and it’s incredible to be able to see her here in France, especially after everything that’s happened, it’s nice to see her here in good shape.” They added it "would be incredible" if she was to perform. Last month, Sports and Olympics Minister Amélie Oudéa told France 2 Dion's participation in the opening ceremony "is within the realm of possibility”.

  Speculation has also been that Lady Gaga could perform at the opening ceremony. She was pictured arriving in Paris on Monday. The pop icon sang Edith Piaf's La Vie En Rose in the 2018 film A Star Is Born. French R&B singer Aya Nakamura is also rumoured to be performing. For the first time in the history of the summer Olympic Games, the opening ceremony will not take place in a stadium. Instead, it will be held along the River Seine with a huge security operation in place. Athletes will parade in boats through the centre of Paris, before it comes to an end at the foot of the Eiffel Tower. The show has been designed by theatre director Thomas Jolly. In an interview with the AP news agency, remaining tight-lipped, he said: “All I can tell you is that it will be very meaningful for the artists that will perform.”
