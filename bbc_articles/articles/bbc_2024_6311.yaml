content: |-
  DCI Katherine Goodwin recalls finding out the man suspected of abducting Sarah Everard was a serving Met Police officer.

  A new documentary, Sarah Everard: The Search for Justice, examines how police tracked down the man that was later convicted of her murder.

  In this clip, investigating officer DCI Katherine Goodwin recalls the moment she was told that their suspect, Wayne Couzens, was a serving police officer.

  Viewers in the UK can watch the documentary from 06:00 GMT on Tuesday 5 March on BBC iPlayer and at 21:00 GMT on BBC One.
