title: 'Leeds disorder: Harehills man charged over torching of bus - BBC News'
date: '2024-07-20'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cd1dgdz485yo
content: |-
  A bus was set on fire and a police car flipped over during violent disorder on Thursday.

  A First bus was destroyed during the trouble on Thursday night

  A man has been charged in connection with disorder in a Leeds suburb earlier this week. A police car was flipped over and a bus was set alight in Harehills during the disturbance, which broke out at about 17:00 BST on Thursday and continued into the early hours. Iustin Dobre, 37, of Clifton Mount, Harehills, has been charged with violent disorder and arson reckless as to endanger life, relating to the torching of the bus, police said. He has been remanded into custody and will appear at Leeds Magistrates' Court on Monday.

  The disorder continued into the early hours of Friday

  Meanwhile, officers have arrested a further five people on suspicion of violent disorder. They remain in police custody. Four people who were initially arrested in connection with Thursday's disturbance have been bailed pending further investigation, the force said. West Yorkshire Police said the disorder broke out in Harehills, in the east of the city, as officers responded to reports of social workers experiencing hostility while dealing with a child protection issue. Officers were attacked and helped social care staff to safety before people began damaging vehicles and setting fires, according to Assistant Chief Constable Pat Twiggs. On Friday evening, a vigil was held in Harehills which "passed off peacefully", police said. A woman was arrested on suspicion of a public order offence during the event but was later released after being dealt with through an "out-of-court disposal" (OOCD), police said. OOCDs are designed to give police an effective way of dealing with low-risk offending, with options including cautions, fines and community resolutions. Officers said there would be an "increased police presence" in the area over the coming days. Anyone with information about the disorder, including CCTV footage, is asked to contact West Yorkshire Police, external.
