title: 'Watch: Bangladesh protesters storm prime minister''s palace - BBC News'
date: '2024-08-05'
section: General
url: http://www.bbc.co.uk/news/videos/ckg22md49pzo
content: |-
  Bengali TV aired live footage of protesters storming Prime Minister Sheikh Hasina's official residence.

  Protesters in Bangladesh have stormed the prime minister's official residence, as a wave of anti-government demonstrations continue. Bangladesh's Prime Minister Sheikh Hasina has resigned and fled the country, the BBC understands.

  The resignation comes as thousands of protesters have taken to the streets in the capital Dhaka, a day after clashes between police and protesters left at least 90 people dead.

  Reuters news agency shared the footage which was being broadcast live by Bangladeshi-Bengali TV station Channel 24.
