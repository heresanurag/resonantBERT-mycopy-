  Just two weeks after completing his challenge to run the entire length of Africa, Russ Cook, also known as the 'Hardest Geezer', will join a group of young people from The Running Charity. The Samaritans is the London Marathon charity of the year and its team captain Dave Lock will complete the event for the 25th consecutive year. He will do so dressed in a large green telephone costume and for the first time is joined by his daughter Isabella as they run in memory of his younger brother Steven.

  A record 578,374 people entered the ballot for a place in the 2024 London Marathon. There was a record total of more than 48,600 finishers last year and there are 65,725 people registered to run on Sunday, representing 158 nations. The oldest participant this year is 91-year-old David Picksley, while the youngest is 18-year-old William Hamilton - and 270 runners will celebrate their birthday on marathon day.

  The runners have now done all they can to prepare themselves for Sunday's run. But will the weather be kind to them? The forecast looks encouraging, with no rain forecast for much of the day and a light breeze, with expected temperatures of 10-12 Celsius.

  Join us from 08:30-14:30 for live text commentary. You can tell us your reason for running or send a message of support for a friend or family member. Get involved by using #bbcmarathon on X, WhatsApp on 03301231826 or text 81111 (UK only, standard message rates apply).

