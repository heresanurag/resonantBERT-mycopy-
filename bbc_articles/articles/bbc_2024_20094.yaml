title: WWE icon Sid 'Vicious' Eudy dies aged 63 - BBC News
date: '2024-08-27'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cdxle0vxkyxo
content: |-
  Sid Eudy's son called him a "man of strength, kindness, and love” who will be “greatly missed”.

  Sid Eudy, a six-time wrestling champion and World Wrestling Entertainment (WWE) icon, passed away on Monday aged 63 following a lengthy battle with cancer, his family announced. Eudy - known among fans as Sid Justice, Sid Vicious and Sycho Sid - rose to fame in the 1990s as one of the industry’s “most imposing and terrifying competitors of his generation”, according to the WWE. His son, Gunnar Eudy remembered him as “a man of strength, kindness, and love” who will be “greatly missed”. Thanking people for their support on Facebook, Gunnar said the family “appreciate your thoughts and prayers as we grieve this loss”, adding details for a memorial service would be announced soon.

  Born on 16 December, 1960 in the US state of Arkansas, the six-foot-nine figure entered the world of wrestling when he joined the World Championship Wrestling (WCW) circuit in 1989, facing off against greats such as The Four Horsemen and The Steiner Brothers. In a statement, the WWE said: “Sid’s reputation as one of the toughest and most thrilling superstars cemented his legacy in WWE, and his influence can still be seen in wrestling rings around the world. “WWE extends its condolences to Eudy’s family, friends and fans.” Eudy debuted in WWE as Sid Justice, the organisation said, where he served as the special guest referee at the SummerSlam 1991, which included WWE legend Hulk Hogan. His wrestling career saw the two-time WWE champion (then called WWF) headline WrestleMania twice, and take home two wins of the WCW’s World Heavyweight Championship. WWE said the wrestler's accolades would have continued had he not suffered "a catastrophic in-ring leg injury" in 2001. Condolences poured on from fans and other professionals following his death. Two-time WWE hall of famer Booker T Huffman said Eudy’s impact on wrestling was “undeniable”, adding that he “paved the way for so many of us”. “Without Sid Vicious, I don’t think my brother and I would have made it to WCW...My deepest condolences to his family during this difficult time,” he wrote on X. Eudy is survived by his wife Sabrina Paige and his two children.
