content: |-
  Sara Sharif, 10, was found dead at her home in Woking, Surrey, in August.

  Sara Sharif was found dead at her home on 10 August

  The father, stepmother and uncle of a 10-year-old girl whose body was found at her Surrey home have pleaded not guilty to her murder.

  Urfan Sharif, 42, Beinash Batool, 29, and Urfan's brother, Faisal Malik, 28, are accused of killing Sara Sharif, who was found dead in Woking on 10 August.

  All three have also denied causing or allowing the death of a child.

  The defendants, who lived with Sara before she died, appeared by video link at the Old Bailey to enter their pleas.

  Mr Sharif, Ms Batool and Mr Malik travelled to Islamabad, Pakistan, with Sara's five brothers and sisters on 9 August, the day before her body was found.

  A previous court hearing was told police found Sara's body after receiving a call from Pakistan, which lasted eight minutes and 34 seconds, at 02:47 on August 10.

  The three adults were arrested on their return to the UK on 13 September and were charged two days later.

  A post-mortem examination found Sara had sustained "multiple and extensive injuries" before her death.

  However, an inquest heard the actual cause of death had not yet been established.

  Urfan Sharif, Beinash Batool and Faisal Malik are each facing two charges relating to the death of Sara Sharif in August

  Mr Sharif and Mr Malik appeared by video link from Belmarsh Prison, while Ms Batool appeared by video link from Bronzefield Prison.

  A trial date has been set for September in front of a High Court judge.

  Surrey Police said: "We would like to thank the local community for their support during this very difficult investigation."

  Anyone with information is urged to contact the force.

