title: 'Newspaper headlines: ''King''s strength'' and ''agonising A&E waits'' - BBC
  News'
date: '2024-04-01'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68705406
content: |-
  The monarch's Windsor walkabout and new figures on NHS waiting times are the focus for Monday's front pages.

  Many of the front pages feature images of a smiling King Charles greeting well-wishers at an Easter church service on Sunday. "Return of the King" is the headline in the Sun, which says the monarch "gave the nation an Easter boost" during his most significant public appearance since revealing his cancer diagnosis.

  The Daily Mirror hails "his first tentative steps back into public life, after a difficult time for the royals", while the Daily Telegraph says "it was almost as if he had never been away".

  A source tells the Daily Express that the King was able to attend the event because he "has responded to treatment very encouragingly over past weeks", and that it "was a very positive step in the right direction for him returning to full duty".

  According to the Daily Mail, his "ungloved handshakes" are the clearest sign yet that he is getting better.

  The Times leads with figures which estimate that more than 250 NHS patients in England are dying every week because of long waits for A&E treatment. It says more than a million people waited at least 12 hours for a hospital bed last year. The paper claims the data - compiled by the Royal College of Emergency Medicine - "adds to concerns about the state" of the health service.

  The Mail also puts the figures on its front page and says they "lay bare" what it calls an "NHS crisis".

  Meanwhile, the Guardian reports on claims by Labour that the government's plans to scrap the non-dom tax status "are riddled with loopholes" - allowing the UK's wealthiest people to save millions of pounds. The Treasury tells the paper the new system will be "modern, simpler and fairer".

  Elsewhere in the Guardian, it reports that Israel has put forward proposals to the UN to disband the main aid agency operating in Gaza. United Nations sources tell the paper that, under the plans, UNRWA staff would be transferred to a replacement agency tasked with delivering aid.

  The UN is investigating Israeli claims that a number of the agency's workers were involved in Hamas's 7 October attacks on Israel.

  The Scottish Daily Mail makes its views clear on the introduction of new hate crime legislation in Scotland, with its headline: "D-day for Humza's April fool hate law". The paper cites critics as saying that - despite the new rules coming into force on 1 April - they are "no joke for the people of Scotland". In the Scotsman, a senior police chief warns that they could "damage trust and confidence" in officers.

  But the i says Police Scotland has reassured people that the law "will be applied proportionately, upholding freedom of expression".

  And the Times says Edinburgh Castle's one o'clock gun salute - which has never been fired in anger - "has defeated its first actual enemy: health and safety killjoys". Army insiders say the cannon was due to have fired its last blank on Saturday because of concerns about the hearing of spectators.

  The Daily Telegraph says the daily firing will continue, but will be quieter. It says that following an intervention from Defence Secretary Grant Shapps, different ammunition will be introduced from June.

