content: |-
  England forward Anthony Gordon says he will do a cycling celebration if he scores at Euro 2024 after an electric bike accident.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England forward Anthony Gordon says he will do a cycling-themed celebration if he scores at Euro 2024 after an electric bike accident in camp. Gordon suffered a number of grazes to his body after he accidentally brought the bike to a sudden stop and went “10 feet in the air, chin first” while trying to record a video message for his family. It happened on a recovery ride the morning after his late substitute appearance in the goalless draw against Slovenia on Tuesday. “I could have [been hurt] with the speed I was going down a hill,” he said. “I could have ended up anywhere. It was on the golf course and I’ve managed to land on the only bit of gravel there was.” He added: “I think the moral of the story is that we spend too much time on our phones these days. The moral of the story is to just enjoy the moment without a phone.” Gordon said he has “got a few grazes, a few cuts but it’s not anything painful” and he is available for England’s last-16 game against Slovakia in Gelsenkirchen on Sunday (17:00 BST). Asked if he would mark the incident with an appropriate celebration if he scores, Gordon added: “I’ll put stabilisers next to the pitch maybe and you lot [the media] will get credit for the celebration. I will do it. You’ve got my word.”

  Meanwhile, Gordon says England "need to perform and give people what they want to see" if they would like criticism over their performances to stop. England have been questioned for the way they played during the group stage of Euro 2024 and were booed by supporters following the 0-0 draw with Slovenia, with empty cups thrown at manager Gareth Southgate. The Newcastle forward is one of the players supporters are calling to come into the team for the match against Slovakia in an attempt to get England’s attack firing. The Three Lions scored just two goals as they topped Group C but Southgate said that "things are starting to come together". Talking about criticism, Gordon said: “I don't really care about stuff like that, I actually think of it in a positive way. “If people are being negative it's only because they expect a lot from you, which is a positive thing. If we want that to stop, we just need to perform and give people what they want to see.” The 23-year-old made his debut for England in March and has had an excellent campaign for Newcastle, with 12 goals with 11 assists in 48 games. However, a lot of England’s key players occupy the forward positions and Gordon only played his first minutes of the competition as an 89th-minute substitute in England's final group game against Slovenia. His cameo caught the eye of many and was praised by former England captain Wayne Rooney, who said Gordon should be brought into the starting XI. But Gordon has said he is "not that guy" to ask manager Southgate for more minutes. “I just like to try my best and control the controllables,” Gordon said. “I think if I train to the very best of my ability, do the best I can every day, that’s my way of giving him a headache in terms of selection, and the rest I can't control. “Try my best and make selection as hard for him as I possibly can. When or if I’m needed, I’ll be more than ready.”

  England came into the tournament with a number of fitness issues around key players. Manchester United defender Luke Shaw has not played for his club side since February and is the only recognised left-back in the squad. Kieran Trippier has played there for England in the first three matches but is right-footed, and it has been debated whether putting a left-footed player in the position would be better for the team. After the draw with Slovenia, former England international Ian Wright said Southgate should put Arsenal winger Bukayo Saka there to give balance to the team. “He says so many great things about me, but I don't think putting me out of position was the solution. "At the end of the day we can talk about this but it's in Gareth's hands and we all just have to trust whatever Gareth selects on the day.”
