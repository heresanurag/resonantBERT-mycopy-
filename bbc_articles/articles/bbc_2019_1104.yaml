content: |-
  Egyptian actress Rania Youssef is set to appear in court after being accused of "inciting debauchery".

  Rania Youssef is set to appear in court after being accused of "inciting debauchery".

  The Egyptian actress appeared at the Cairo Film Festival in a lacy, black, see-through outfit that exposed most of her legs.

  A complaint against her was filed by two lawyers, Amr Abdelsalam and Samir Sabry, known for taking celebrities to court.
