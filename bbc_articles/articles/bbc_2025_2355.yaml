content: |-
  Dodik's trial had been widely seen as a test for the Balkan nation's weak central government.

  Bosnian-Serb leader Milorad Dodik has been found guilty of defying the top envoy overseeing the peace process

  A one-year prison sentence and a six-year ban on holding public office might seem like a heavy penalty for a politician. But the Bosnian-Serb leader Milorad Dodik made light of the verdict at the Court of Bosnia and Herzegovina. The president of the country's majority-Serb Republika Srpska region told supporters at a rally in the regional capital Banja Luka there was "no reason to worry". His conviction on charges of ignoring the rulings of the international High Representative was "nonsense", he said. Dodik said he had "learned to deal with more difficult things" and called on the crowd in Republika Srpska's de facto capital to "be cheerful". The verdict was the culmination of a long-running conflict between Dodik and the international High Representative for Bosnia and Herzegovina, Christian Schmidt. Schmidt is still the supreme authority in Bosnia, 30 years on from the Dayton Agreement which ended the Bosnian War of the 1990s. The high representative has the power to impose or annul laws – and sack officials ranging from judges to political leaders. One former holder of the post, Paddy Ashdown, the former leader of the UK's Liberal Democrats, sacked almost 60 Bosnian-Serb officials in a single day in 2004, in a crackdown on their protection of war criminals. But the high representative's powers have been used much more sparingly in subsequent years, as Bosnia's international supporters stepped back in the hope that local leaders would work together to create a viable and prosperous country. The strategy has not been a success. Ethno-nationalist leaders remain entrenched in a country which is divided into two "entities" – the majority-Serb Republika Srpska and the Federation, where the population are mostly Bosniaks and Croats. The central government is weak – and there is little incentive for parties to cooperate. Instead, their guiding philosophy is simple and self-interested: divide, rule and profit. As a result, the country is struggling with low wages, a sluggish economy and a constant flow of emigration by talented people seeking a better future elsewhere. "Bosnians of all ethnicities are united by their disdain for their own leaders," says Toby Vogel, co-founder of the Democratisation Policy Council think tank. "They would love not to vote for these guys, but it's structurally almost impossible for cross-community politicians and parties to emerge."

  Supporters of Dodik hearing him speak on Wednesday following his conviction

  Instead, leaders like Dodik get elected, time after time. The leader of the SNSD party has previously served as the Serb representative of the three-person national presidency and first became prime minister of Republika Srpska in 1998. A constant theme of his leadership has been the threat to trigger the secession of the majority-Serb region. Dodik and his government have consistently worked to undermine Bosnia's national institutions, introducing a series of laws to withdraw Republika Srpska from the armed forces, judiciary and tax system. Such efforts eventually pushed the high representative to take action and annul the secessionist legislation. Christian Schmidt warned that a renewal of conflict was possible, but insisted that he would "not sit still while others seek to dismantle [decades] of peace, stability and progress". Dodik apparently viewed that as a challenge. He approved a law declaring that Republika Srpska would no longer recognise Schmidt's rulings. The high representative had already annulled the legislation – and made it a criminal offence to contradict his decisions. That led to the prosecution of the Bosnian-Serb leader – with prosecutors calling for a maximum five-year prison sentence and 10-year ban from holding elected office. Dodik warned he would take "radical measures" if found guilty. His conviction has not brought any fireworks so far. At this point, Dodik is insisting that he will not appeal. Instead, Republika Srpska's government is once again proposing legislation to withdraw from national institutions – including the court which passed the guilty verdict. But Dodik is facing problems beyond Bosnia's borders. The US and UK have imposed sanctions on him and his family for corruption - threatening the unity of Bosnia and Herzegovina - and connections with Russia. Toby Vogel believes that is more likely to threaten the Bosnian-Serb leader than the court conviction. "The conflict with the high representative will intensify," he says. "But Dodik might well be running out of road." "He is running out of cash to pay his bloated administration... and he can no longer raise money on international markets. So, he is in very deep trouble indeed." None of this will be much comfort to the long-suffering people of Bosnia and Herzegovina. They are still enduring the interminable wait for the prosperity promised by ethno-nationalists like Dodik. This latest court battle shows how distant that prospect remains.
