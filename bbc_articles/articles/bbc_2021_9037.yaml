  A selection of your pictures of Scotland sent in between 2 and 9 July.

  Cathy Cochrane's "laughing seal" at Machrihanish. Cathy said: "I spent quite a while just sitting watching this beautiful seal. I am sure he was laughing his head off at the mad woman out so early with a camera taking pictures, but he obliged with a few wonderful poses."
