title: Gavin & Stacey's Nessa reads Shipping Forecast for centenary - BBC News
date: '2025-01-01'
section: General
url: http://www.bbc.co.uk/news/videos/c0ewj85nj8wo
content: |-
  Actress Ruth Jones reprised her role on a special day for the Shipping Forecast on BBC Radio 4 to celebrate 100 years of the weather report.

  Gavin & Stacey actress Ruth Jones has become the latest famous voice to read BBC Radio 4's Shipping Forecast.

  Jones - who read the forecast in character as Nessa - was one of the famous voices who recreated old versions of the forecast on BBC Radio 4 to celebrate 100 years of the weather report.

  Actors Adrian Dunbar and Sir Stephen Fry are also among a number of famous people to have read out the shipping forecast over the years. Both actors reflect on what the programme means to them.

  The Shipping Forecast is produced by the Met Office on behalf of the Maritime and Coastguard Agency. It was first broadcast on 1 January 1924 as a weather bulletin called Weather Shipping before moving to the BBC a year later.
