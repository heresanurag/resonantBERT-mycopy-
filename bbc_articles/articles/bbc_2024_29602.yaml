title: 'Melbourne Cup: Knight’s Choice wins for jockey Robbie Dolan, former The Voice
  singer - BBC Sport'
date: '2024-11-05'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/articles/c5yp69g83vgo
content: |-
  The Australian-bred horse triumphed over a field which included a record four female jockeys.

  Winning jockey Robbie Dolan was on the team of singer Rita Ora when he made it to the quarter-finals of The Voice Australia two years ago.

  Outsider Knight's Choice has won Australia's famous Melbourne Cup, in a dramatically close race which went to a photo finish. It was winning Irish jockey Robbie Dolan's first ride in the event, but a second victory for New Zealand trainer Sheila Laxon. Runner-up in the two-mile contest was Warp Speed and third was Okita Soushi, ridden by Jamie Kah - one of a record four female jockeys in the field. Buckaroo had been the favourite to win but finished ninth, with Knight's Choice - a 90-1 shot - storming home to win by a nose in the final strides. Dolan was previously best known as a contestant on The Voice Australia, but he has now stamped his name in Flemington Racecourse history.

  Dolan first met trainer Laxon when he was singing on a Melbourne Cup boat cruise

  "Pinch me, I'm dreaming... I can't believe it," he told the local Nine Network. "I think I'll be singing for the rest of my life after that. What the hell." The 28-year-old comes from a horse racing family, with his father Bobby Dolan part of Irish horse training legend Dermot Weld's team when they produced two Cup winners in 1993 and 2002. Bobby surprised his son by travelling to Australia for his Melbourne Cup debut, and was in the crowd to watch his victory. It was also a family affair for Laxon, who trained Knight's Choice with her husband John Symons and lifted the trophy 23 years after her first victory, when she became the first female trainer to win with Ethereal. Absurde was fifth for Irish trainer Willie Mullins, with his stablemate Vauban 11th. British challengers Onesmoothoperator and Sea King finished 12th and 14th. Crowds thousands-strong were trackside at Flemington for the event, decked out in bright outfits and enjoying the sunny spring weather. The Melbourne Cup is worth more than A$8m (£4.1m, $5.3m) and is often called "the race that stops a nation" although has attracted demonstrations in recent years over animal welfare.
