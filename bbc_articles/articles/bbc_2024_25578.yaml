title: 'Newspaper headlines: Reeves to ''tax businesses'' and Sir Chris Hoyle''s terminal
  cancer diagnosis - BBC News'
date: '2024-10-19'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cyvyd760y76o
content: |-
  Reeves' Budget plans are in the spotlight for many Sunday papers, while Liam Payne's death continues to draw the attention of several others.

  The Sunday Times carries a photo on its front page of Sir Chris Hoy, external, who has revealed he's been diagnosed with terminal cancer.

  In an interview with the paper he says that he has known his prognosis for a year, has learnt to live in the moment, and has days of "genuine joy and happiness.” Sir Chris also reveals that his wife Sarra, with whom he has two young children, has an incurable form of multiple sclerosis. He has written a memoir about the last year and tells the paper his greatest hope is that his story might "change the perception of stage four cancer" which he says could be "a really powerful thing”.

  The Sunday Telegraph's front page gives more detail about the suggestion that the NHS will give people electronic devices, external - like smart watches - to track blood pressure, heart rates and even tremors in patients with Parkinson's. The paper says some cancer patients are already given smart rings, which monitor their vital signs, and that these may also be rolled out more widely. It says it's all part of a move to prevent more ill-health, and to treat more people at home.

  On its front page the Observer reports that the chancellor is set to use the forthcoming Budget, external to call on businesses to pay more tax to help restore the NHS. It says that Rachel Reeves is understood to believe that people will accept a multibillion pound "hike" in business taxes if it's linked to repairing the health service's finances.

  The Mail on Sunday, external also leads with the Budget, but says what it describes as "the Chancellor's tax grab" is turning people away from supporting Labour's policies. It quotes a poll which, it says, suggests that most voters now think the Tories would be better than Labour for their finances - and says it's the first time the Conservatives have been ahead in this area since Boris Johnson was Prime Minister.

  The Telegraph reports that the state will be granted powers to take money directly from bank accounts, external and wages in an attempt to crack down on benefit fraud. It quotes the Work and Pensions Secretary, Liz Kendall, as saying that it is "absurd" that her department's powers have become "so outdated" that inspectors are struggling to "keep pace" with fraudsters.

  The Sun on Sunday and the Sunday Mirror both lead with a tribute, external from the sister of Liam Payne. "I'm sorry I couldn't save you" is the headline on both front pages, a quote from an Instagram post written by Ruth Gibbins. The Sun says she gave a rare insight into their "beautiful" relationship, external.

  Finally the Mail carries a couple of photos of the celebrity chef - Nigella Lawson - clutching a bag from the high street bakery chain Greggs, external. In what the paper describes as a "mega deal" it reveals that the Domestic Goddess will receive a six figure sum to star in the bakery's Christmas advert.
