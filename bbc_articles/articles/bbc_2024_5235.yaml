title: Shania Twain to headline Stirling Summer Sessions - BBC News
date: '2024-03-21'
section: Tayside and Central Scotland
url: http://www.bbc.co.uk/news/uk-scotland-tayside-central-68250523
content: |-
  Music star Shania Twain has been announced as the final headliner for the first Stirling Summer Sessions.

  The Canadian singer joins fellow headliners Busted and Tom Jones, and will be supported by Rag 'n' Bone Man.

  The five-time Grammy award winner will perform on 2 July at Stirling City Park.

  It is the first time Summer Sessions has been held in Stirling, after previous events in Glasgow and Edinburgh.

  Tickets for Twain's show go on sale on Friday, with a pre-sale on Thursday for those signed up to the Summer Sessions website.
