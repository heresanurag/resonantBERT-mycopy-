id: bbc_2020_5835
title: Man denies racial abuse of BBC reporter Sima Kotecha - BBC News
date: '2020-05-12'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-52629255
content: |-
  Sima Kotecha faced "racist and abusive behaviour" while preparing for interviews in Leicester.

  BBC reporter Sima Kotecha was preparing for a live broadcast in Leicester

  A man has denied racially abusing a BBC reporter as she prepared a broadcast.

  Sima Kotecha said she and her team faced "racist and abusive behaviour" as they set up for live interviews in Leicester city centre on Sunday.

  Appearing at Leicester Magistrates' Court by videolink, Russell Rawlingson pleaded not guilty to causing racially aggravated alarm or distress.

  The 50-year-old, of Glenfield Road in Leicester was bailed to appear at Leicester Crown Court on 15 June.

  Ms Kotecha was due to interview people on Sunday evening following the prime minister's statement about the coronavirus lockdown restrictions.

