title: Men who attacked police and set van on fire in riot after Southport stabbings
  jailed - BBC News
date: '2024-08-07'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cwy39gxekv5o
content: |-
  Three men from Liverpool are sentenced after days of disorder following the Southport knife attack.

  Men who attacked police and set van on fire in riots jailed

  Derek Drummond (L), Declan Geiran (C) and Liam Riley (R) were all jailed

  Three men who admitted taking part in riots in Southport and Liverpool in the days after three girls were killed in a knife attack have been jailed. Widespread unrest has swept across towns and cities in England since the killings of Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, on 29 July. Derek Drummond, 58, was given a three-year sentence for punching a police officer during violence in Southport. Declan Geiran, 29, was jailed for two years and five months for violent disorder and setting fire to a police vehicle, while Liam James Riley, 40, was jailed for one-and-a-half years for violent disorder and racially aggravated abusive behaviour.

  The violent disorder which spread across the country began in Southport

  Jonathan Egan, of the Crown Prosecution Service, said the trio's actions "would have caused panic, revulsion and chaos in their local communities". “Riley, Drummond and Geiran mistakenly thought they would escape justice," he said. "They now face an extended period of time behind bars, and their criminal convictions will stay with them forever." Drummond, of Pool Street, Liverpool, admitted the offences which occurred on 30 July as he walked towards a mosque in Southport with a large crowd of people. Liverpool Crown Court was shown clips of Drummond kicking and attacking officers as they tried to form defensive lines with shields. Riley, of Walton Road, Kirkdale, Liverpool, and Geiran, of Kelso Road, Liverpool, were sentenced for their parts in the unrest in Liverpool city centre, with Geiran also admitting arson of a police vehicle.
