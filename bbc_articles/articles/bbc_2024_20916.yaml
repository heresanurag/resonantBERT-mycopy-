  • None A day in court after the Rotherham riot Geiran had "casually looked on" after setting the seatbelt of a police van on fire on Saturday in Liverpool, the court heard. Footage on TikTok showed him starting the blaze, prosecutor Chris Taylor said, with the £32,000 police vehicle being written off. During his police interview, Geiran denied having any thoughts on immigration or political issues. Officers said Riley was "clearly drunk" as he called an officer a "traitor and a Muslim-lover" during the unrest in Liverpool. He made negative comments about immigrants and Muslims and said both were to blame for the tragedy in Southport after he was arrested, the court heard. The unrest, seen in towns and cities across the UK, came after misinformation had been circulated online wrongly stating the Southport knife attack suspect was an asylum seeker.

  More than fifty police officers were injured in Southport the day after the knife attack

  The three men were the first to be sentenced for violent disorder charges in connection with the unrest. The first man to be jailed was 19-year-old James Nelson who had been convicted of causing criminal damage. Speaking outside the court, chief crown prosecutor Sarah Hammond said the jail sentences were "the tip of the iceberg", and "just the start of what will be a very painful process for many who foolishly chose to involve themselves in violent unrest". Further suspects have been in court in connection with the disorder across the north-west of England. Four men, aged 27, 28, 41 and 42, appeared at Manchester Magistrates' Court accused of taking part in violent disorder in Manchester Piccadilly Gardens on Saturday. The 28-year-old from West Yorkshire cried as he pleaded guilty to violent disorder and assault. Three others, from Stalybridge, Stockport and Stretford, did not enter pleas. Aaron Johnson, 32, also appeared in the same court and admitted using racist language on a live stream he broadcast to "millions of people" from outside a hotel in Stockport which was thought to contain asylum seekers. The prosecution said Johnson "became aggressive to members of staff" and told them "he would smash their face in". A woman from Cheshire, 53, also appeared at Warrington Magistrates' Court charged with publishing written material to stir up racial hatred. She is accused of sending a a threatening message suggesting to "blow up a mosque with adults inside", a court official said. She did not enter a plea and has been remanded in custody until a hearing at Chester Crown Court on 14 August.
