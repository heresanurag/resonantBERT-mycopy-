content: |-
  The Green Party of England and Wales co-leader Carla Denyer claims people are not inspired by Labour.

  The Green Party of England and Wales co-leader Carla Denyer said its key priorities for the election were the NHS, housing, and sorting out the sewage in rivers and tackling the cost of living crisis.

  She claimed people were not inspired by the Labour Party and were "distraught" by the direction of the Conservatives.

