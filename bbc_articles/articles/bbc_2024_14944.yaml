title: 'Llanelli: Richard Jones in court accused of Sophie Evans murder - BBC News'
date: '2024-07-12'
section: Wales
url: http://www.bbc.co.uk/news/articles/cl4yvlxk51go
content: |-
  Police say Richard Jones, 49, from Burry Port, was known to 30-year-old Sophie Evans.

  Sophie Evans was found dead in a house in Llanelli last Friday

  A man has appeared in court charged with murdering a 30-year-old mother-of-two. Richard Jones, 49, from Y Rhodfa, Burry Port, Carmarthenshire, appeared at Llanelli Magistrates Court and spoke only to confirm his name and address. The body of Sophie Evans was found in a house in Bigyn Road in Llanelli, Carmarthenshire, on 5 July. Dyfed-Powys Police has said Mr Jones was known to Ms Evans and he was arrested on the day her body was found.

  Police in Bigyn Road, Llanelli, after the discovery of Sophie Evans's body

  In a tribute issued earlier, her family said they were "heartbroken" by her loss and she would "be greatly missed by us all”. They added: "Our beautiful and amazing sister and daughter Sophie was tragically taken from us and our lives will never be the same.” Mr Jones was remanded in custody and is due to appear at Swansea Crown Court on Monday.
