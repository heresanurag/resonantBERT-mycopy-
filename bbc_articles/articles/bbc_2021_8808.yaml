content: |-
  Great Britain's Georgia Taylor-Brown fights back from a bike puncture to earn an Olympic silver medal in the women's triathlon.

  This video can not be played To play this video you need to enable JavaScript in your browser. GB's Taylor-Brown fights back from puncture to win silver as Duffy makes history

  Great Britain's Georgia Taylor-Brown produced a superb run to earn an Olympic silver medal in the women's triathlon, then revealed she almost missed the Tokyo Games after a leg injury left her on crutches just 12 weeks ago. Taylor-Brown, who had to prove she was fit enough to compete a week before flying out to Japan, responded by winning a medal after fighting back from a bike puncture which left her well adrift of the leaders. The 27-year-old was 22 seconds behind a four-woman pack - which included British team-mate Jessica Learmonth - going into the final leg. But the 2020 world champion moved past Learmonth, who ended up finishing ninth, Germany's Laura Lindemann and American Katie Zaferes to earn a place on the podium. Taylor-Brown, who had not raced since September, said proving her fitness was "probably more stressful" than Tuesday's race. "It could have been taken away from me, but I proved that I was fit, I was ready to go, I did more than they asked me to do," she said. Bermuda's Flora Duffy claimed a historic first gold medal for her nation after taking control of the race - which started in wet and wild conditions - with a dominant run. The 33-year-old, who rejected the chance to represent Britain as a teenager, finished one minute and 15 seconds ahead of Taylor-Brown. "It is an incredible, special moment. I crossed the line today but I did it for everyone in Bermuda," said Duffy. Zaferes, 32, won bronze as she finished more than a minute ahead of the rest of the field. Vicky Holland, Britain's third hopeful in the event, finished 13th after recovering from a crash on her bike.

  Taylor-Brown's gutsy recovery means Britain have their second triathlon medal of the Games, following Alex Yee's silver in a punishing men's triathlon on Monday. Taylor-Brown was congratulated by her British team-mates in the post-race interview, with both Learmonth and Holland telling her how proud they were of her achievement. Taylor-Brown's hopes looked to be dashed when she suffered a flat back tyre less than a kilometre away from the end of the 40km bike ride. Afterwards, she said she "panicked" when the incident happened. "I didn't know what to do, so I just rode out on the flat. It was panic mode but it paid off," she told BBC Sport.

  All three medallists warmly congratulated each other beyond the finishing line, with each athlete appreciating the travails the others had faced on their respective journeys to the Olympic podium. As Duffy crossed the line, she blew kisses to those watching on, falling on her back beyond the tape and covering her eyes with her hands as she contemplated what she had achieved. After winning the 2016 and 2017 world titles, followed by Commonwealth gold in 2018, Duffy spent more than a year battling a foot injury until the summer of 2019. And last winter her training was disrupted by a knee problem. This victory was also significant for Bermuda, which became the least populous nation ever to win an Olympic gold.

