  "It was definitely a lot of emotion to deal with, it is slowly hitting me. This has been my dream since eight years old - I always wanted to be an Olympic champion," Duffy told BBC Sport. "There have been many tears, many heartbreaks, many times I wondered if I would ever be healthy again to compete at the top." While Taylor-Brown's chances of winning gold were dashed by the puncture, she said she would have been happy with a top-five after a troubled build-up. She withdrew from the final pre-Tokyo World Series round in Leeds because of the injury, although she did not disclose the problem at the time. "I got a stress response in my femur 12 weeks ago. So that was a bit of a shock," said Taylor-Brown. "My training had gone so well before then, though, so I knew I had all that in the bag. I wanted to keep it private.

  Taylor-Brown, Zaferes and Duffy celebrated together at the finishing line

  "You don't want to show your competitors your weaknesses, and so I did just say I was ill, but I've had six weeks of building my running back again. "It's not perfect, it's not what I wanted. It's not what anyone would want, but I think I got myself into a really good position and I was as fit as I could have been on that start-line today with the circumstances that I faced." Learmonth added: "I can't believe how amazing this [Taylor-Brown] girl is. If you knew what she had been through... I can't put it into words." Zaferes was the 2019 world champion but has struggled for form this year following the sudden death of her father Bill in April, who introduced her to the sport as a child. Britain's former world champion Non Stanford, who is a training partner of Zaferes and part of the BBC's commentary team, said she had "goosebumps" at what the American had achieved. "Katie lost her father earlier this year and to get through that and win a medal at the Olympics is inspirational."

