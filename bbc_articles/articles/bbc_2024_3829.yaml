content: |-
  A drone photographer's footage shows thousands of birds flying in formation above a seaside town

  A drone photographer has captured video of a starling murmuration swooping over a seaside town.

  The footage filmed by Oliver Bolton shows thousands of birds flying in formation above Great Yarmouth in Norfolk.

  Posting the video on social media, he said: "Sometimes photos just don't do this stunning starling murmuration justice."

  The phenomena happens when birds form huge groups to help them keep them safe from predators.

