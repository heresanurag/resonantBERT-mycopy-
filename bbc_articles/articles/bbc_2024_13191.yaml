content: |-
  The Wikileaks founder has left the UK after spending five years in prison, and seven holed-up in the Ecuadorean embassy.

  Julian Assange has left the UK after spending more than a decade in isolation.

  The Wikileaks founder spent five years in prison, and seven before that holed-up in the Ecuadorean embassy.

  Mr Assange signed a plea day with the US to allow for his release, after being charged with conspiracy to obtain and disclose national defence information - after the Wikileaks site published secret US military records.
