id: bbc_2023_16173
title: Loud explosion heard in Gaza halts BBC journalist's on air report - BBC News
date: '2023-10-09'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67050445
content: |-
  Rushdi Abu Alouf was speaking to the BBC News Channel when a loud explosion was heard.

  BBC Journalist Rushdi Abu Alouf's live broadcast on the BBC from Gaza was interrupted when a loud explosion was heard.

  He had been speaking to presenter Maryam Moshiri live on air, telling her the explosion sounded "quite close."

  Israel's military has been carrying out retaliatory air strikes on Gaza after the Palestinian militant group Hamas launched a wave of attacks on the country.
