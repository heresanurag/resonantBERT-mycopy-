  The presidents of Russia and Egypt joined worshippers at Orthodox Christmas Mass.

  The presidents of Russia and Egypt joined worshippers during celebrations of Christmas in the Orthodox Church.

  In Rome, Pope Francis marked the feast of Epiphany, the traditional end to Christmas festivities.
