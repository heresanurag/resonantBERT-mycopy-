title: 'As it happened: Covid-19: UK ''on course'' to vaccinate over-50s by 15 April
  deadline - Hancock - BBC News'
date: '2021-03-17'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56426446
content: |-
  Matt Hancock reiterates his pledge as the NHS warns of a "significant reduction" of vaccine supplies.

  Are dates for easing lockdown set in stone?

  The final question comes from Emily Ashton from Bloomberg. She asks if the dates for easing lockdown are absolutely set in stone, or if they can be brought sooner if the vaccine roll-out continues to be ahead of schedule. She asks what he wants to say to people who are going out and playing sport after their vaccines. Hancock says playing football in the park with your family "is absolutely fine" and most people are being "unbelievably supportive of the rules and doing their bit". Professor Jonathan Van-Tam adds that "it takes quite a while for antibodies to become measurable in the blood stream after vaccination". He says that looking at data, vaccine effectiveness continues to improve after 21 days but protection is not immediate after a vaccine dose. He asks for people to "hold the line" so the UK only has to have one successful rollout of vaccines, rather than further lockdowns. Dr Mary Ramsay says people must continue to follow the rules and keep their distance. Mr Hancock finishes by saying the government is following the dates in the UK's roadmap out of lockdown.
