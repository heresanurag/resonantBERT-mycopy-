title: Stargazers around the world catch supermoon - BBC News
date: '2024-10-18'
section: General
url: http://www.bbc.co.uk/news/videos/cz04z0155kko
content: |-
  The brightness of the moon would allow ancient communities to increase hunting at this time of year - hence the name.

  Hunter's Moon has appeared in the sky for stargazers all around the world.

  The supermoon appears bigger than normal, but remains as close, or as far, from Earth as ever.

  The Hunter's Moon is the third of four supermoons to occur in 2024 — and is the brightest.

  It follows August's Blue Moon and September's Harvest Moon.
