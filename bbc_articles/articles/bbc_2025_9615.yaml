content: |-
  Everton midfielder Abdoulaye Doucoure announces he will leave the club when his deal expires at the end of the season.

  Abdoulaye Doucoure waved to fans when he was replaced in the 65th minute of Sunday's Premier League win over Southampton

  Everton midfielder Abdoulaye Doucoure has announced he will leave the club when his contract expires at the end of the season. The 32-year-old Mali player has made 165 appearances for the Toffees since joining from Watford for £20m in September 2020. Doucoure has scored 21 goals for Everton, including a memorable winner in their 1-0 victory over Bournemouth when the club avoided relegation on the final day of the 2022-23 season. He joins veteran midfielder Ashley Young and goalkeepers Asmir Begovic and Joao Virginia in leaving, while forward Dominic Calvert-Lewin, midfielder Idrissa Gueye and defenders Michael Keane and Seamus Coleman are also out of contract this summer.

  In a video posted on social media, Doucoure said: "Hi Evertonians - just wanted to share this message with you that I'm going to leave the football club at the end of the season. "After five wonderful years, my time at Everton came to an end. "Everton means a lot for me. Obviously the past five years it's been hard but I will always remember my time as a dream for me, to play for Everton Football Club. "Obviously I'm sad to leave the club but I think the time has come for a new chapter for me and the club as well and I will always be grateful for what the club did for me. "My best memory, I will say it will be the goal I scored against Bournemouth to keep the club in the Premier League. I think this is something I will always be proud [of]. It was a wonderful moment for me and my family and for the club as well. "I will miss the fans. I will miss the football club. I just wanted to let them know that I gave everything every single time in training, in games. "I was always proud to wear the shirts, always proud to play at Goodison Park." The midfielder looked emotional as he was substituted in the second half of Sunday's 2-0 victory over Southampton - Everton's final game at their Goodison Park home. The Toffees will travel to Newcastle for their last match of the campaign this Sunday (16:00 BST) before relocating to their new Hill Dickinson Stadium at Bramley-Moore Dock. Doucoure added: "I gave everything to win the most games I could and I will just miss the place, and I wish them all the best in the new stadium. "Everton will always be part of my life now. I will be forever a Blue. I will always support Everton and I hope they're going to have a bright future."
