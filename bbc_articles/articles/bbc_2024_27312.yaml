t live in it. According to some projections, the candidate who wins Pennsylvania has upwards of a 90% chance of winning the White House. It's that important. Pennsylvania, in a way, is a microcosm of the United States. It has big cities dominated by Democrats and Republican-friendly rural areas. Its demographic makeup is similar to the country overall. It has new technology companies and old industries; energy extraction and agriculture. A candidate can't be a one-trick pony and win in Pennsylvania. It is the place that both campaigns have been investing the most time and resource. And polls almost universally show the state sitting on a knife's edge.

  The states in the southern US are often referred to as the Sun Belt for the obvious reason that they have a hotter climate than those in the north. There are four swing states in the south at this election: Arizona, Georgia, Nevada and North Carolina. Between them they could deliver 49 electoral college votes to a candidate who won all four. As with the Rust Belt, Harris would likely become president if she won all four. If Trump swept all the swing states in the Sun Belt, he would still need to pick up one more state. However, though the margin of victory would be more comfortable than sweeping the Rust Belt, it feels an unlikely path to victory for Harris as the Democrats haven’t won all four of these states since Harry Truman was elected in 1948. Unlike the Democrats, Republicans do have a history of sweeping these states. Since the Civil Rights Act upended the political map in the 1960s: Presidents Nixon, Reagan, Bush and Bush Jr each won all four of these states at one or more elections. There are two key groups that could help decide the results in the Sun Belt: black and Latino voters. In both Georgia and North Carolina a large percentage of eligible voters are black. Harris will hope she can match Joe Biden’s performance with those voters; he won 92% of all black votes across the US in 2020, but some recent polls have suggested Harris is struggling to hit similar numbers. Arizona and Nevada have fast-growing Latino populations and for a long time, Democrats assumed an increase in Latino voters in any state would automatically increase their chances of winning. But Donald Trump surprised many by making in-roads with Latino voters at the last two elections, with his perceived strength on the economy being particularly attractive. However, Republicans are concerned that widely-reported comments about Puerto Ricans and other Latinos by speakers at Trump's recent Madison Square Garden rally, which leant heavily on racist stereotypes, could undo some of those gains. Donald Trump held North Carolina in the last two elections and it wasn’t considered a swing state until Kamala Harris took over the Democratic ticket. If Trump failed to hold North Carolina, his route to the White House becomes much harder as he would need to win at least two of the Rust Belt states and two more in the Sun Belt. The state has only voted for the Democratic candidate once since 1980 – for President Obama in 2008. But there is a chance Harris could take it if she can inspire black voters to turn out, as they did for Obama, and she picks up votes from the recent influx of college-educated voters. Campaign aides for Harris believe that around 10% of voters in all seven battleground states are still persuadable, and they haven't given up on changing hearts and minds in an election where the slightest shift in a swing state could have major electoral implications. In North Carolina, a state Democrats still believe they can flip despite an uphill battle, Harris has focused on Republican college-educated, suburban women who are turned off by the former president's rhetoric. Meanwhile, the Trump campaign has grown more confident about Georgia and North Carolina, and the former president has also set his sights on becoming the first Republican presidential nominee to win Nevada since George W Bush won it in 2004.

