  An in-depth look at how both candidates could win the election - and the clues that polling trends and history might offer.

  Path to 270: The states Harris and Trump need to win

  A map showing the 50 states in the US and the political party that each of them votes for, image There are 50 states in the US and most of them vote for the same party – Democratic or Republican - at every election. A map showing the seven states considered to be battlegrounds in this election, image A map showing the seven states considered to be battlegrounds in this election, image That leaves just a handful of states where either candidate could win. At this election there are seven. A visualisation showing the number of electoral college votes each candidate is expected to get from the states that usually vote the same way, image A visualisation showing the number of electoral college votes each candidate is expected to get from the states that usually vote the same way, image They are known as the swing states and can be divided into two groups: the Sun Belt and the Rust Belt. A visualisation showing the number of electoral college votes each candidate is expected to get from the states that usually vote the same way, image A visualisation showing the number of electoral college votes each candidate is expected to get from the states that usually vote the same way, image In US elections, states with more people are worth more points. These points are called electoral college votes and for the swing states they range from six to 19. A visualisation showing the number of electoral college votes each candidate is expected to get from the states that usually vote the same way, image A map showing the 50 states in the US and the political party that each of them votes for, image There are 50 states in the US and most of them vote for the same party – Democratic or Republican - at every election. A map showing the seven states considered to be battlegrounds in this election, image A map showing the seven states considered to be battlegrounds in this election, image That leaves just a handful of states where either candidate could win. At this election there are se