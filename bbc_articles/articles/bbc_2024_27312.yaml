  There are combinations of states that could leave the final result with Harris and Trump tied on 269 votes each. The most frequently discussed of these is Kamala Harris failing to pick up the single vote she is expected to win in Nebraska. Nebraska is one of only two states which assign some of their electoral college votes to the winners in individual districts, rather than giving all of them to the candidate with the most votes in the state as a whole. Without that single vote from Nebraska’s second district, the Democrats most likely path to victory - winning all three Rust Belt states - would result in a tie instead. The president is then decided by a vote in Congress with each state getting a single vote - unlike the electoral college where states with more citizens get more votes. This would almost certainly result in Donald Trump being elected president, as the Republicans tend to win more states at each election, despite the Democrats receiving more votes in total across the country at seven of the last eight presidential elections. There are scenarios that would result in a draw without the Republicans winning Nebraska’s second district. For instance, if Trump swept the Rust Belt and Harris took all the Sun Belt except Nevada they would finish with 269 votes each. But it seems unlikely to happen, because if Harris was winning like that in the south, you would expect her to also sweep up Nevada. Similarly, Trump winning only the three states of Michigan, Pennsylvania and North Carolina would result in a tie. However, if his political message proved that popular in Michigan and Pennsylvania, wouldn’t he also take Wisconsin? Then again, this election is so close in the polls that maybe the swing states could follow a pattern no-one expected.

