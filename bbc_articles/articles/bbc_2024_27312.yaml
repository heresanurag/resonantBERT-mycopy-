  At the last two elections the winning candidate - Donald Trump in 2016 and Joe Biden in 2020 - won six of the seven 2024 swing states. Trump missed out on Nevada by only 27,000 votes, and Biden lost in North Carolina by around 75,000 - having improved on Hilary Clinton’s total there in 2016 by over 100,000 votes. A small difference in turnout could have seen Trump or Biden sweep all these states, and at this election it's possible either candidate could do the same. Neither of them has a decisive lead in the polls in any of the seven swing states at the moment but the margin of error in each poll means one of them could be further ahead than it appears. If polls have underestimated support for Trump like they did in 2016 and 2020 then he could well end up winning all seven swing states and even picking up another state or two elsewhere in the country. But equally, if pollsters' assumptions about turnout are wrong and enthusiasm within the Democratic Party helps bring record numbers of Kamala Harris supporters out to vote in key states, then she could end up with a winning map that looks like Biden's in 2020. The polls suggest this could be one of the closest US elections in history - but should we be surprised if it isn't? Not really. In fact, we should expect the polls to be slightly out because they’re designed to broadly explain how the public feels about a candidate, not predict the result in a swing state by less than a percentage point. The average gap between Harris and Trump across all seven swing states at the moment is just over one percentage point. The average state-level polling error in the last six presidential elections was just over four points. Keep that in mind when you're thinking about possible outcomes in this election.

