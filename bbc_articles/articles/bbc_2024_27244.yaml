title: 'Ballymagorry: Man in court accused of Kyle McDermott manslaughter - BBC News'
date: '2024-10-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c9qvdgz23w8o
content: |-
  Daniel Patrick Hanna appeared in court in Dungannon on Wednesday morning charged with manslaughter

  Kyle McDermott died after an incident in Ballymagorry shortly after 23:30 BST on Sunday

  A 24-year-old man has appeared in court charged with manslaughter following the death of Kyle McDermott in Ballymagorry, County Tyrone, on Sunday. Daniel Patrick Hanna, with an address at Victoria Road in Strabane, appeared at Dungannon Magistrates' Court and spoke only to confirm he understood the charge. Police told the court they could connect him to the charge, and Mr Hanna’s lawyer made no application for bail. The case is due to be heard again on 31 October in Strabane.

  Kyle McDermott, 24, died after being taken to hospital following an incident in Ballymagorry shortly after 23:30 BST on Sunday. On Tuesday, the police also made a direct witness appeal in relation to the police investigation. They said they wanted to speak with the occupants of a blue car that was parked on Victoria Road on Sunday evening. Police believe that a passenger may have captured mobile footage. Previously, the Northern Ireland Ambulance Service (NIAS) said they received two 999 calls about an incident in the Victoria Road area of Ballymagorry, one at 00:05 BST and a second at 00:39 BST.
