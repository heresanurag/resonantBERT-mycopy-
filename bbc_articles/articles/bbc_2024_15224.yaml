title: Biker, 52, dies following three-vehicle crash near Taynuilt - BBC News
date: '2024-07-15'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cd172wgp3n9o
content: |-
  The road was closed for several hours following the crash which involved a motorcycle, Volvo and Land Rover.

  A 52-year-old motorcyclist has died following a three-vehicle crash on the A85 in Argyll and Bute.

  Police said the accident happened near Taynuilt at about 12:40 on Sunday.

  The biker, who has not been named, was pronounced dead at the scene.

  Officers said the drivers of the Volvo and Land Rover were treated by paramedics.

  Sgt Robert Mackie said: "Our thoughts are with the family and friends of the man who died at this very difficult time.

  "Inquiries are ongoing to establish the full circumstances and we are appealing to anyone who has not already spoken to officers to get in touch, external if you can assist."

  The road was closed for several hours to allow investigations to be carried out and re-opened shortly after 21:00.
