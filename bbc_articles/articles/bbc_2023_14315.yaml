title: 'Libya floods: Bodies being found in sea one week after disaster - BBC News'
date: '2023-09-15'
section: Africa
url: http://www.bbc.co.uk/news/live/world-africa-66815068
content: |-
  Aid organisations fear many dead still remain in the debris of the devastated city and not enough clean water is available for survivors.

  'Everything that would suggest human life has been washed away'

  It is astonishing when you stand in Derna and see how the centre of the city has been simply carved away; there is nothing left. Where the river ran down to the sea, there are just banks of earth and mud. People are talking about this torrent of water having the force of an atomic bomb. Yesterday I was looking at cars that had been picked up and thrown inside buildings. Trees have been uprooted, and everything here suggests that human life has been washed away. And you must consider that this is happening in a country which has been wracked by conflict for more than a decade, so the normal civil contingencies are not in place. Things like tents, medical care and clean water need to be brought into the country. This is very difficult when you have these two parallel administrations controlling Libya. And then even when you manage to get that aid into Benghazi, it is a 6-7 hour drive to Derna. I’ve seen local Libyans with pickup trucks doing what they could. But the normal large-scale, well-rehearsed humanitarian operation from the international community that you would normally see a week after a disaster like this is not in place.
