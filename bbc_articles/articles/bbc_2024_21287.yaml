  Daniel Wiffen says his open water swimming marathon debut at the Paris Olympics was "probably one of the worst things I've done, but also one of the best".

  Wiffen proud after 'first and last' open-water marathon

  Daniel Wiffen took to the River Seine after winning a gold and bronze in the pool

  Daniel Wiffen said making his open-water swimming marathon debut at the Paris Olympics was "probably one of the worst things I've done, but also one of the best". After winning 800m freestyle gold and 1500m bronze in the pool, Team Ireland swimmer Wiffen finished first 10km open-water race in a commendable 18th position, in under two hours. The race took place in the River Seine, with the backdrop of the Eiffel Tower and Grand Palais. Wiffen joked it would be his "first and last" marathon swim, but he was "really proud" for finishing the event, which consisted of six laps around a 1.6km course. The 23-year-old had no additional training for the open water as he concentrated on his commitments in the pool, in which he became the first Olympic champion from Northern Ireland for 36 years when he won 800m gold. After falling away from the leading group, Wiffen admitted he considered dropping out, but making it to the end "showed a lot of willpower". "In the pool it is easy when there are eight people in a final, and there are about 30 people in it here," he said. "I was about two minutes down from the front of the pack. I was like 'do I really want to finish?', but I needed to finish it and I'm glad to say I'm an Olympic open-water swimmer."

  When swimming with the current in the early stages of the race, Wiffen threatened to crack the top 10 but dropped away when fighting his way back up the Seine, when he was met with 0.3 metres of current per second. "A lot of people would say it's the worst race they've ever done, in terms of the currents," he added. "So for my first one to be the hardest and I came 18th, I'm very happy." The marathon caps a remarkable Games for Wiffen, who added Olympic gold and bronze to his two World Championship golds from February in Doha. He joked his immediate thoughts were about getting a massage after a gruelling swim, and his achievements would sink in when he returned home. Wiffen added he wanted to carry the flag at the closing ceremony, something he feels would be a "class" experience. "I'm Olympic champion, Olympic bronze medallist and placed 18th in the open water," he said. "I couldn't have asked for anything more. "I'm the only double medallist [for Team Ireland], so it's kind of cool. I'll maybe put it out there that I'm hopefully carrying the flag. "We don't know yet but that's what I want."
