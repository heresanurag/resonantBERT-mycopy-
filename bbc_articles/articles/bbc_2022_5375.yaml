content: |-
  President of Ukraine Volodymyr Zelensky has thanked the people of Ireland for supporting his country.

  In a live address, broadcast remotely from his war-torn country, Ukrainian President Volodymyr Zelensky said that although Ireland is a neutral country, it had "not remained neutral to the disaster and to the mishaps that Russia has brought to Ukraine".

  He praised the Republic of Ireland for its humanitarian and financial support but pleaded for more "leadership" to help strengthen international sanctions against Russia.

  This video contains an extract of his speech, which ended in a standing ovation from Irish politicians in the Dáil (Irish Parliament).
