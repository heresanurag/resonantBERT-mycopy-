title: 'Watch: Gaza protest in Hollywood stops Oscars traffic - BBC News'
date: '2024-03-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68531659
content: |-
  Demonstrators blocked major thoroughfares, and some attendees of the awards had to walk to the venue.

  Hundreds of demonstrators, demanding a ceasefire in Gaza, blocked major thoroughfares in Hollywood on Sunday, bringing traffic to a standstill.

  Oscars attendees in formalwear were seen walking to the Dolby Theatre and pushing past protesters.

  Actor Mark Ruffalo said the protest “shut down the Oscars” as he rushed down the red carpet.

  The Academy Awards show started a few minutes late as a result of the disruption.
