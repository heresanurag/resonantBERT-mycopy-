title: Malala Yousafzai visits Pakistan after deadly floods - BBC News
date: '2022-10-13'
section: General
url: http://www.bbc.co.uk/news/world-63241257
content: |-
  The activist travelled to the country for the second time, since she was shot by the Taliban in 2012.

  Malala Yousafzai returned to her native Pakistan and met with families affected by mass flooding.

  The Nobel Peace Prize winner visited communities that had been devastated.

  An estimated 33 million people were affected by the floods.

  Malala called on other countries to donate more aid to help those who've been displaced.
