content: |-
  Craig Revel Horwood is asked how he learnt to dance after Strictly's professionals were accused of abusive behaviour.

  Strictly Come Dancing judge Craig Revel Horwood has revealed his dancing instructor was a Russian ballet trainer who used a cane to "whack" her students.

  The BBC One dance show has been plagued by allegations of abusive behaviour.

  Several celebrities have complained about how their dance partners treated them in rehearsals.

  Revel Horwood has previously spoken about his shock at the allegations but was asked on BBC Breakfast about his experience training to become a professional dancer decades ago.

  He said everybody is trained differently in the profession and "what they learn, they carry on into the training room".
