title: Moment King Charles is heckled by Australian politician - BBC News
date: '2024-10-22'
section: General
url: http://www.bbc.co.uk/news/videos/cg565876rj1o
content: |-
  The woman shouted "you are not our King" and "this is not your land" before being escorted out.

  A protester has interrupted King Charles's visit to Parliament House in Canberra. The protester - who is an independent Senator who sits in the Parliament - shouted “you are not our King” as the King sat down after his speech.

  Senator Lidia Thorpe also shouted “this is not your land” before being escorted out of the event.
