content: |-
  Novak Djokovic accuses some Wimbledon fans of disrespect as his hot-and-cold relationship with Centre Court takes another turn.

  'An excuse to boo' - Djokovic irked by Wimbledon crowd

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Novak Djokovic accused some of the Centre Court crowd of using a Holger Rune chant as "an excuse to boo" as his hot-and-cold relationship with Wimbledon took another turn. Hundreds of fans greeted Rune winners, and Djokovic errors, with elongated cries of 'Ruuuuuuune' during the pair's fourth-round match on Monday. Djokovic - a convincing 6-3 6-4 6-2 winner - felt the crowd were disrespecting him. When on-court interviewer Rishi Persad put it to the Serb that they were supporting his opponent, Djokovic said there was more to it. "I know they were cheering for Rune but that's an excuse to also boo," he said. "I have been on the tour for more than 20 years. I know all the tricks." Djokovic is attempting to win a joint record eighth Wimbledon men's title, and is a nine-time finalist at SW19. But his relationship with the crowd has not always been serene. After Djokovic beat Roger Federer in the 2019 final, his former coach Boris Becker said he deserved more respect from a partisan crowd who had mostly sided with his opponent. And two years ago, Djokovic was booed after he blew a kiss to fans following his semi-final win over Briton Cameron Norrie.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  On Monday, Djokovic looked unfazed for much of the match, though after taking the second set he did stare at a pocket of Rune supporters. He also looked towards chanting fans when standing by the microphone as he waited for his on-court interview. "I played in much more hostile environments, trust me - you guys can't touch me," he said. "To all the fans that have had respect and stayed here tonight, I thank you from the bottom of my heart and I appreciate it." Rune, for his part, thought it was clear what the fans were doing. "If you don't know what was happening, probably it sounded like 'boo'. But if we all know what happened, it was my name," said the 21-year-old. "If he didn't remember, it could probably sound different for him. I don't think it played a massive part in the match." Djokovic, who faces Australian ninth seed Alex de Minaur in the quarter-finals, appeared to have seen the funny side of things by the end of his interview. He signed off by saying: "To all those people that have chosen to disrespect the player - in this case me - have a goooooooood night." But in a later interview with BBC Sport he stood by what he had said. "When I feel a crowd is stepping over the line, I react," he said. "I don’t regret my words or actions on the court."

