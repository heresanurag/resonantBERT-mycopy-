  Lyra McKee died after being shot while observing rioting in the Creggan area of Londonderry in April 2019.

  Lyra McKee died after being shot while she observed rioting in the Creggan area of Derry in April 2019

  More MTV footage has been shown in the Lyra McKee murder trial. The production company was filming on the day the journalist was shot dead during disturbances in Londonderry The 29-year-old was watching a riot in the Creggan estate in April 2019 when she was killed. The New IRA admitted responsibility for the murder.

  Three men from Derry are on trial at Belfast Crown Court accused of her murder - Jordan Devine, 23, of Bishop Street, Paul McIntyre, 56, of Kells Walk and Peter Cavanagh, 35, of Mary Street. Key parts of the unedited MTV material were previously shown to the court during the opening of the prosecution’s case. At the non-jury trial on Thursday, extended footage was shown, featuring lengthy conversations between MTV presenter Reggie Yates and a number of the defendants.

  The MTV crew had been filming in Derry for a documentary on republicanism, focussing on the youth wing of Saoradh – a group the Police Service of Northern Ireland (PSNI) has described as the political wing of the New IRA. The filming took place in the run-up to commemorations in the city to mark the 1916 Easter Rising. In the footage, filmed in the Saoradh office, defendants Patrick Gallagher, Jude McCrory and Joseph Barr discussed their political views with presenter Reggie Yates. They also discussed their criminal records, political prisoners and what they perceived to be “interference and control from the British government”. The defendants also discussed plans for an unauthorised parade which was due to take place days later on Easter Monday. Seven other men, all from Derry, are also on trial, charged with offences including rioting and throwing petrol bombs. They are Joseph Barr, 36, of Sandringham Drive; Jude McCrory, 26, of Gartan Square; William Elliott, 57, of Ballymagowan Gardens; Joseph Campbell, 23, of Gosheden Cottages; Patrick Gallagher, 32, of John Field Place; Christopher Gillen, 43, of Balbane Pass, and Kieran McCool, 55, of Ballymagowan Gardens. All 10 defendants deny the charges against them.
