content: |-
  What Health Minister Vaughan Gething said at today's government briefing on the new restrictions.

  Keeping out of lockdown "depends on the choices that each one of us is prepared to make", Health Minister Vaughan Gething said.

  He told Monday's Welsh Government press conference that while cases were kept low during the summer, the autumn poses a challenge.

  "The challenge comes back to how we've chosen to behave through the summer and going into the autumn," he said.

  "We suppressed coronavirus pretty significantly through the summer, we were in a position with low levels of transmission to have further easements.

  "The challenge is that we've seen some people relaxing too much perhaps and small instances where people know that they're breaking the rules, and in particular larger social gatherings in people's homes, and a couple of businesses that have not enforced the rules in terms of where their customers behave.

  "Now that's a challenge for us and we see as I said in Caerphilly the infection rate has moved so more people over 40 and over 50 are testing positive.

  "Their risks of harm are much greater than fit and healthy people in their teens and twenties so the risks are there.

  "And of course it's about what our health and social care system prepares for what might come through the autumn, and the winter, and that's entirely the right thing to do our ability to keep out of lockdown depends on the choices that each one of us is prepared to make to help keep us safe."
