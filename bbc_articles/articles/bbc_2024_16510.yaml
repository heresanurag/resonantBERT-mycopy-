  Wood 'closer and closer' to 100mph, says Stokes

  Ben Stokes and Mark Wood are county team-mates at Durham

  England captain Ben Stokes says fast bowler Mark Wood is getting “closer and closer” to breaking the 100mph barrier. Wood, 34, was shown to have reached 97.1mph in an electrifying spell on the second morning of the second Test against West Indies at Trent Bridge last week. The Durham man’s top recorded speed is 97.73mph, while only three bowlers are thought to have been clocked at 100mph or more in an international match. "He's got it in the tank," said Stokes. "He's been close a couple of times. Maybe one day." Wood has been named in an unchanged England team for the third Test against the Windies, which begins on Friday. Asked if he was surprised Wood is able to register 97mph, Stokes said: “It’s not surprising. It’s great to watch. I’d much rather have him in my team than having to have my helmet and pads on facing him as an opposition.” Wood averaged 94.47mph in the second over of his first spell last Friday morning at Trent Bridge, the fastest recorded over by an England bowler in a home Test. His fastest delivery of 97.73mph was bowled to David Warner in the Boxing Day Ashes Test of 2021. Measuring accurate bowling speeds is difficult. The three bowlers to have topped 100mph, all in limited-overs cricket, are Shoaib Akhtar of Pakistan and Australian duo Brett Lee and Shaun Tait. However, data analysts Cricviz dispute these speeds.

