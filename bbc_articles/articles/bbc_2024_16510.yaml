  The fastest recorded delivery to take a wicket in Test cricket was 99.3mph by Australia’s Mitchell Johnson to dismiss New Zealand’s Jeetan Patel, now an assistant coach with England, in 2010. Stokes said Wood is "always looking up at the big screen" to check his speeds and the skipper "wouldn't hear the end of it" if the 100mph mark is broken. "He seems to be getting closer and closer to that," added Stokes. "One day everything might click or the speed gun might be wrong. Who knows? "But I'm happy with what he's doing right now. Being able to sustain that pace is quite phenomenal. "His average speed every time he plays a Test match is always above 90mph. That says a lot about his fitness. "It's all fine and well trying to bowl one spell above 90 but every spell he bowls for England he's clocking over 90mph and that's a great thing to have as a captain."
