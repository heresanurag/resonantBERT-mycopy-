  Watch: Don't call civil servants 'pen-pushers', says Sue Gray

  Sue Gray urges caution over language used to describe the civil service and any reform of the workforce.

  Making her maiden speech in the House of Lords, Baroness Gray said that the UK needs "public servants to succeed".
