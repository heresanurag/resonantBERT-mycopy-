title: Faringdon girl, 6, in leukaemia remission surprises friend - BBC News
date: '2024-02-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-67227627
content: |-
  Six-year-old Sarah surprised her friend who works in a local supermarket with news she is in remission.

  A girl has surprised a woman she befriended in her local supermarket with news that she is in remission from leukaemia.

  Six-year-old Sarah was diagnosed with acute lymphoblastic leukaemia and wanted to surprise her friend Caroline, who works at a Tesco store in Faringdon, Oxfordshire, with the great news.

  Sarah looks out for Caroline every time she goes to the supermarket.

  BBC Radio Oxford's Adam Ball arranged the special thank you.

