title: Rugby goal-light technology trial at Principality Stadium - BBC News
date: '2019-04-27'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-48068672
content: |-
  The posts lit up to show whether a kick went over at Saturday's Judgement Day double-header.

  The technology was trialled in the Pro 14 Welsh derby showpiece in Cardiff

  New technology to light up rugby posts in different colours to show whether a kick is successful was trialled at Cardiff's Principality Stadium.

  Goal-light technology was used for the first time in the UK at the Welsh Rugby Union's annual Judgement Day event on Saturday.

  The Welsh company behind the technology hopes it could also revolutionise other sports such as American football.

  However some fans have branded it a "waste of time".

  Similar to how wickets light up in 20/20 cricket, some 500 LED lights on each rugby post are activated by remote control.

  This video can not be played To play this video you need to enable JavaScript in your browser. How does the new technology work?

  The lights show green if the penalty, conversion or drop goal is successful - or red if not.

  It was successfully trialled earlier this month by World Rugby at the Hong Kong Sevens.

  Inventor Michael Press, 33, said he believes the technology adds to the match-day experience of fans as well as aiding visually impaired spectators.

  "Stadiums keep getting bigger and spectators are further away from the action so this technology is about giving everyone the same experience," he said.

  "Stadiums are also changing, with giant screens, better seating, banners and entertainment, but no-one has changed things on the pitch."

