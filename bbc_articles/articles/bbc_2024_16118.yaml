title: Amanda Serrano beats Stevie Morgan as Jake Paul stops Mike Perry - BBC Sport
date: '2024-07-21'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/cek9488np7zo
content: |-
  Featherwight world champion Amanda Serrano outclasses Stevie Morgan before YouTuber-turned-boxer Jake Paul beats former UFC fighter Mike Perry.

  Amanda Serrano (left) has lost only two of her 50 bouts since turning professional in 2009

  Featherweight world champion Amanda Serrano stopped Stevie Morgan 38 seconds into round two in their light-welterweight contest in Florida. Puerto Rican Serrano was due to fight Ireland's undisputed world lightweight champion Katie Taylor to headline an event featuring a bout between YouTuber-turned-boxer Jake Paul and 58-year-old former heavyweight champion Mike Tyson. Tyson withdrew on medical grounds in May and both fights were postponed until 15 November. Instead, Serrano outclassed fellow 35-year-old Morgan, from the US, at the Amalie Arena in Tampa. The referee stepped in after Serrano landed a flurry of punches in the second of the eight two-minute rounds, claiming her first stoppage victory in three years.

  Jake Paul (left) has won 10 of his 11 bouts since turning professional in 2020, his only defeat coming against Britain's Tommy Fury

  In the co-main event, 27-year-old Paul stopped fellow American Mike Perry in the sixth round. Perry, 32, left the UFC in 2021 and has become one of the most recognisable faces in the emerging bare-knuckle fighting scene in the US. Paul floored Perry with an overhand right inside the first minute of the fight and again with a powerful right early in the second. The bout was stopped midway through the sixth of the eight rounds as Perry - his face bloodied and swollen - stumbled after climbing off the canvas once more. "He's tough as nails but I just hit too hard and he took a lot of damage," said Paul. "Mike Tyson, you're next. It's anyone, any time, any place." According to statistics from Compubox, Paul landed 96 punches to Perry's 33 and had 52 of his 142 jabs connect, earning praise from the loser. "You did a great job, you were way too fast for me and I couldn't adjust," admitted Perry.
