title: 'Nicola Sturgeon resigns: SNP to announce new leader on 27 March as Swinney
  rules himself out - BBC News'
date: '2023-02-15'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-64648879
content: |-
  Candidates have until 24 February to put themselves forward, before party members have the opportunity to choose their new leader.

  We've been speaking to an active bunch of older voters at the John Wright sports centre in East Kilbride near Glasgow to get their views on what the next first minister's priorities should be.

  Isobel Walters, who had a liver transplant five years after a diabetes diagnosis, says the focus must be the NHS.

  Quote Message: They need to train more people - nurses, doctors, surgeons. Give them a decent wage because the work they do is amazing. The care I’ve had is exceptional. But I have a lot friends who have had to go privately for scans and things. It’s not fair that they’ve had to pay for it." They need to train more people - nurses, doctors, surgeons. Give them a decent wage because the work they do is amazing. The care I’ve had is exceptional. But I have a lot friends who have had to go privately for scans and things. It’s not fair that they’ve had to pay for it."

  Linda Dempsey agrees the NHS is a top priority and reckons Scottish independence "should be put on the back burner".

  Quote Message: Money needs to be spent on a lot more than independence - children’s schooling is a disgrace." Money needs to be spent on a lot more than independence - children’s schooling is a disgrace."

  But Philip Patterson disagrees and believes the need for independence is greater than ever.

  Quote Message: Until that happens we’re not going to be able to do anything with the NHS or education as the purse strings are still with Westminster. Until that happens we’re not going to be able to do anything with the NHS or education as the purse strings are still with Westminster.

  The struggles of the NHS is a recurring theme - with Larry Dempsey calling for the next first minister to approve urgent investment.

  Quote Message: Get the economy on track and sort out the NHS and social care. It’s really deteriorated over the last few years and needs money to get it back on its feet." Get the economy on track and sort out the NHS and social care. It’s really deteriorated over the last few years and needs money to get it back on its feet."
