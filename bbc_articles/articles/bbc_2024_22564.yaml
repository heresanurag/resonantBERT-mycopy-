title: Gaza children given polio vaccine as pause in fighting holds - BBC News
date: '2024-09-02'
section: General
url: http://www.bbc.co.uk/news/videos/c6234ekye5do
content: |-
  The aim is to vaccinate 640,000 children, weeks after the first polio case was detected in Gaza in 25 years.

  The UN's World Health Organization says it aims to vaccinate 640,000 children in Gaza, weeks after the first polio case was detected in the region in 25 years.

  The rollout relies on a series of localised pauses in fighting between Israeli forces and Hamas fighters.

  To be effective, the World Health Organization (WHO) says at least 90% of children under 10 must be immunised in a short time frame.
