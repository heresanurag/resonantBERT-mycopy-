content: |-
  Police and firefighters say two adults and five children survived the fire.

  Girl, 13, killed in blaze as seven others escape

  The fire broke out late in the evening on Wednesday

  A 13-year-old girl has been killed in a house fire which broke out late on Wednesday, police have said. Merseyside Police and Merseyside Fire and Rescue Service said the fire at a property in Kingsway, Prescot, was finally put out at 00:30 BST. A man, woman and five children were able to escape from the property unharmed. Police and firefighters are carrying out a joint investigation into the cause of the blaze.

  Firefighters received a 999 call at about 23:40 on Wednesday and found the rear bedroom of a mid-terraced house was alight. Four firefighters wearing breathing apparatus put the fire out and then searched for people inside. They found the teenage girl who was pronounced dead at the scene. Det Insp Steven O'Neill said: "Our thoughts are with the family of the young girl at this very sad time. A joint investigation into the cause of the fire is ongoing and the girl's family is being supported by specially trained officers." Neighbouring homes were checked for fire and smoke spread.

  Firefighters were alerted not long before midnight on Wednesday

