title: Escaped prisoner who fled from prison van on M55 in Preston found - BBC News
date: '2025-03-22'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cvg5dw4de5zo
content: |-
  Jamie Cooper, who escaped from a prison van on Wednesday has been arrested.

  Jamie Cooper, 33, fled from the van on the M55 near Preston

  A prisoner who escaped from a prison van on his way to court has been found, police have said. Jamie Cooper was found by police in a car in Blackburn, Lancashire on Saturday afternoon. Lancashire Police said he was a passenger in the vehicle, which had travelled from Bolton. They have arrested the 33-year-old, originally from Blackpool, on suspicion of escaping from lawful custody. He was being taken to Lancaster Magistrates' Court in a GEOAmey van just before 09:00 GMT on Wednesday when he went on the run on the M55 motorway at junction 2 near Preston.

  Police said Mr Cooper, who was facing charges for assaulting a police officer and criminal damage, remains in police custody. His escape sparked a large search by police, who issued CCTV footage of him running away from the van and walking near the University of Central Lancashire in Preston. He was also reported to have been seen in Blackpool and Bolton in Greater Manchester before his arrest. Lancashire Police thanked members of the public for their help.

