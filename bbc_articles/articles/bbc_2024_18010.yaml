title: 'Leanne Lucas: Yoga teacher stabbed in Southport protecting children, cousin
  says - BBC News'
date: '2024-08-01'
section: General
url: http://www.bbc.co.uk/news/articles/c9e9z1pm59eo
content: |-
  Leanne Lucas's cousin told the BBC she was injured while shielding two girls from the attacker.

  Yoga teacher stabbed as she protected girls in Southport attack

  A yoga teacher who was stabbed while trying to protect two little girls during the Southport knife attack is a hero, her cousin has told the BBC. Leanne Lucas, 35, is believed to have been one of the organisers of the Taylor Swift-themed dance class where the attack, which left three children dead, happened. Chris Rimmer said his cousin, who remains in hospital, is awake and has spoken for the first time. He said Ms Lucas, who was initially in a critical condition, is now recovering but is “not out of the woods yet”.

  Mr Rimmer said Ms Lucas had ushered children into a storage room and “shielded two little girls” from the attacker, which is when she is thought to have been injured. “She’s just a star. She always gives, and never expects anything from anybody," he said. "She’s one of the most outgoing people I’ve ever met in my life. She’s absolutely amazing." Mr Rimmer, 41, said the family had been “torn apart” by the incident but that they had gathered at home to comfort each other while her mum, dad and sister stayed by Leanne's bedside at the hospital. He also said that, while the family did not want to share too much information regarding her recovery, she was “doing OK” and that the family wanted to keep Leanne and the other victims of the attack at the forefront of people’s minds. Bebe King, six, Elsie Dot Stancombe, seven, and Alice Dasilva Aguiar, nine, died in the attack, which took place at the Hart Space, a local community hub. Eight children, Ms Lucas, and one other adult - Jonathan Hayes - were also injured, with several in critical condition. Speaking to the BBC from his hospital bed, Mr Hayes said he was "saddened" he could not have done more to protect the children from the attack. Mr Rimmer, a local landscape gardener, said: “So many families have been absolutely destroyed because of what has happened.” A 17-year-old boy was arrested on Monday on suspicion of murder and attempted murder and remains in custody. The suspect, who cannot named because of his age, was born in Cardiff and later moved to nearby village Banks, just outside Southport. The attack is not being treated as terror-related.

  Elsie Dot Stancombe, seven, Alice Dasilva Aguiar, nine, and Bebe King, six, died in the attack

  A peaceful vigil took place on Tuesday evening in Southport but unrest broke out shortly afterwards, leading to the arrest of four men over the disorder. Police said 53 officers had been injured and a mosque was damaged. Merseyside Police said the disturbance was believed to have involved English Defence League supporters. When asked about his response to this violence, he said: “Southport has just been torn apart, but we can’t think of [that] at the moment. “Everyone is just concentrating on getting Leanne home so we can see her.” Since the attack, fans of Taylor Swift have so far raised over £310,000 for the victims and their families. The group, who are working with Alder Hey Children’s Hospital, had originally aimed to raise £13,000.
