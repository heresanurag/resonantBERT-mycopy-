content: |-
  Jury selection is under way for the trial of a US ex-police officer accused of killing a black man.

  How is US jury selection different from the UK?

  Jury trials in the UK are less common, and jurors - picked at random - don't know which trial they will serve on until they've been sworn in. Jurors can only be dismissed by a judge in very specific circumstances. In the US a pool of eligible citizens is called to appear and be questioned by both sides. The prosecution and defence can both ask a judge dismiss a potential juror "for cause" if they perceive bias. Once they're selected, the chosen jurors will be partially sequestered, or isolated, during the trial and fully sequestered once deliberation starts. They will also remain anonymous until the judge allows their identities to be made public. It's not uncommon for US jurors to speak out about their deliberations afterwards, and in some infamous examples, like the OJ Simpson trial, some have even gone on to write books about their experiences. Read more about the jury selection process here.
