content: |-
  North Moreton, in Oxfordshire, is hoping to take in up to 60 people who have fled the war.

  North Moreton, in Oxfordshire, is hoping to take in up to 60 Ukrainian refugees.

  The village is home to just 350 residents, with those who can't take people in offering their support in the form of cooking, teaching or transport.
