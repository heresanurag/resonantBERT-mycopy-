  Many Republicans have agreed with this sentiment, even if it means ceding congressional power over government spending to the president. Congressional conservatives have been trying to downsize the federal government for decades with limited effectiveness – and now Musk and Trump are delivering, albeit through a sweeping expansion of executive power. North Carolina Senator Thom Tillis told CBS News he believed Doge's approach was necessary because Republicans had failed to get legitimate answers from bureaucrats about how to make government more efficient. "And the way to force people to justify investments on exceptions is to shut everything down," Tillis said. "I know it's disruptive, but I think they need to have the capacity to bring things back online that make sense." That may change, however, if Trump's poll numbers – which have dipped slightly recently – continue to decline and if Republican legislators are challenged by constituents at town hall meetings or have their offices flooded with angry calls. Members of Congress across the US have begun stepping forward to defend federal programmes – including funding for academic research, agriculture, veterans services and national parks – that have been affected by Musk's "Department of Government Efficiency" actions. Senator Katie Britt of Alabama called for a "smart, targeted approach" to cuts that could target health research conducted in her home state. Alaska Senator Lisa Murkowski, a moderate Republican, complained on social media that many of the proposed layoffs "will do more harm than good". "I share the administration's goal of reducing the size of the federal government," she wrote on X, "but this approach is bringing confusion, anxiety and now trauma to our civil servants." The Trump administration has already walked back some of its announced layoffs in key sectors – including Department of Energy employees who handle nuclear weapons security, Department of Agriculture teams tasked with containing the recent outbreak of bird flu, and workers in a programme that monitors the health of first responders and survivors of the 11 September World Trade Center attack. "I think many of these firings are indiscriminate," said Susan Collins of Maine, another centrist Republican senator. "The fact that workers were let go who are working on avian flu, and the fact that workers have also been fired who are responsible for nuclear safety, shows that we need a far more careful approach." At his appearance last week at the White House, Musk acknowledged that his team might make mistakes in its eagerness to slash government spending – "but we will act quickly to correct any mistakes", he promised. That may be cold comfort for Americans adversely affected by the Doge chainsaw, however. And it could come at a political price. History has shown that even when mistakes are fixed, voters often remember these kind of missteps the next time they head to the polls.

