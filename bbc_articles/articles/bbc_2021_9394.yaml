title: 'Scarva: Teenager dies after entering lake in County Down village - BBC News'
date: '2021-07-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-57896019
content: |-
  The incident happened in the village of Scarva at about 15:30 on Monday afternoon.

  Police are not treating the death as suspicious

  A 13-year-old boy has died after entering a lake in a County Down village, police have said.

  It is understood that the incident happened in the Canal Court area of Scarva at about 15:30 on Monday.

  Emergency services, including the Police Service of Northern Ireland (PSNI), Air Ambulance and Northern Ireland Fire and Rescue Service (NIFRS), attended the scene.

  The teenager was taken to hospital where he later died.

  Police are not treating the death as suspicious.

  Gary Magwood, of the NIFRS, told BBC News NI that crews attended a "traumatic" scene.

  "Crews assisted and gave medical aid," said Mr Magwood. He added the teenager was then taken to Craigavon Area Hospital where he later died.

  "This is very traumatic for the crews and for those in the local area.

  "Our condolences go out to the family."

  Democratic Unionist Party (DUP) MP Carla Lockhart said the news was "devastating".

  "Please remember the family in your prayers as they come to terms with this harrowing tragedy," she added.
