title: Schoolgirl who died in River Leven is named by police - BBC News
date: '2020-08-10'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-53727303
content: |-
  Rescuers were involved in a three-hour search for 12-year-old Ava Gray from West Dunbartonshire.

  A 12-year-old girl who died after getting into difficulty in a river near Loch Lomond has been named by police.

  She was Ava Gray from Alexandria in West Dunbartonshire.

  Police were called to the area around Balloch Bridge on the River Leven on Sunday evening following reports that three young people were in the water.

  Two of them - a boy and girl - managed to get out of the water and emergency services launched a search for the missing girl.

  The three-hour operation involved two rescue helicopters, a police underwater unit and the fire service.

  Ava Gray was recovered from the water at 21:45 and pronounced dead at the scene.

  A Police Scotland spokeswoman said there were no suspicious circumstances surrounding the death and a report would be submitted to the procurator fiscal.

  The schoolgirl fell into the River Leven near Balloch Bridge
