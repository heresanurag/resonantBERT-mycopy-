  After the race, Michael Dunlop said that "everyone's inspiration was to be a Joey Dunlop around the Isle of Man". "I'm no better than Joey, never was," he added. "Joey's record stood for 24 years and it's an honour. Joey was a special talent. "My record will be beaten one day but I don't care." Michael revealed he had to overcome some setbacks to secure his historic win. "We had an issue in first practice and were struggling a wee bit but the boys worked hard on it and the bike was mint. We had to push on as I knew we would." Jamie Coward, Mike Browne and Davey Todd rounded out the top six in the Twins race.
