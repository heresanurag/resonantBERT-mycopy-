content: |-
  The painting sold to a private buyer at auction in London the day after it was confirmed Vettriano had died aged 73.

  Banksy take on Vettriano work sells for £4.3m

  The Banksy work was sold at Sotheby's in London for more than £4m

  A Banksy reimagining of a work by the late Scottish painter Jack Vettriano has sold at auction for £4.3m ($5.4m). Crude Oil (Vettriano) was put up for sale by Blink 182 bassist Mark Hoppus, who acquired the painting in 2011. It depicts the Fife-born artist's best known work, The Singing Butler, which features a couple dancing on a storm-swept beach accompanied by their butler and maid, but with two figures in yellow hazmat suits disposing of an oil drum in the background. The sale to a private collector at Sotheby's in London on Tuesday evening came just days after Vettriano was found dead aged 73 at his apartment in France.

  The work was initially projected to fetch between £3m and £5m in the sale. The entirely hand-painted work, created using oil and spray paints, was first exhibited in 2005. It was initially placed in a disused shop window in Notting Hill in full view of passers-by.

  Vettriano's original version sold at Sotheby's in 2004 for £744,800 – the highest price for any Scottish artwork sold at auction at the time. Hoppus bought the painting following a visit to the Museum of Contemporary Art (Moca) in Los Angeles. He described it as "unmistakeable," adding that he and wife Skye "fell in love" with the work from the moment they saw it. A portion of the funds raised will go towards supporting the charities Children's Hospital Los Angeles, Cedars Sinai Haematology Oncology Research. The couple will also donate some of the proceeds to the California Fire Foundation following the devastating wildfires which destroyed parts of the city earlier this year.

  Hoppus and his wife Skye bought the painting in Los Angeles in 2011

  Hoppus said: "We loved this painting since the moment we saw it. Unmistakably Banksy, but different. We bought it because we loved it. It's borne witness to our family over these past dozen years. "It hung over the table in London where we ate breakfast and our son did his homework. It hung in our living room in Los Angeles. It's seen laughter and tears and parties and arguments. Our son has grown up in front of it. "This painting has meant so much to us and been such an amazing part of our lives, and now I'm excited for it to be out there in the world, seen by as many as possible." Vettriano was found dead at his apartment in Nice on Saturday. His publicist confirmed his death on Monday. There were no suspicious circumstances around his death, police in Southern France said. The artist was self-taught after being gifted watercolour paints for his 21st birthday. His breakthrough came in 1989 when he submitted two paintings to the Royal Scottish Academy's annual show and both sold on the first day, inspiring him to become a full-time artist. His works later garnered international acclaim, leading to exhibitions in cities including London, Hong Kong, Johannesburg and New York.
