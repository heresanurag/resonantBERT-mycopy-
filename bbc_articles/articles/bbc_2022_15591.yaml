id: bbc_2022_15591
title: 'Rugby World Cup: England fans react after losing a thrilling final - BBC News'
date: '2022-11-12'
section: General
url: http://www.bbc.co.uk/news/uk-63607626
content: |-
  The tense thriller left fans on the edge of their seats as "it really came down to the wire."

  "Proud" Red Roses fans have been speaking about a "frustrating" loss for England in the women's Rugby World Cup final, which New Zealand won 34 - 31.

  England missed out in a tight contest after being reduced to 14 players in the 18th minute when England wing Lydia Thompson was sent off for a high tackle. The loss is England's first since 2019.

  The match was played at a sold-out Eden Park in New Zealand's city Auckland, in front of a crowd of 42,579 - a record for woman's rugby game.
