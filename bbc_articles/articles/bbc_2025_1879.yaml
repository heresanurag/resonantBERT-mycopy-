  "We are negotiating to end the conflict. It is 'appeasement' only if you think the Ukrainians have a credible pathway to victory. They don't, so it's not," he said in a post on X. Meanwhile, Kyiv and Washington appeared to be inching closer to signing a deal that would give the US rights to Ukraine's deposits of rare earth minerals. Trump has styled this as a way for Ukraine to repay the US for its past military support. He told reporters on Friday that the US and Ukraine were "pretty close" to signing the deal, adding that the US would "get our money back". In a video address late on Friday, Zelensky said Ukrainian and US teams were working on a draft agreement, which "can add value to our relations". But he stressed that "what matters most is getting the details right". The Ukrainian president had rejected the initial US proposal made several days ago, saying he "cannot sell our state". White House Security Advisor Mike Waltz said on Friday that Zelensky was "going to sign that deal".
