  After criticising Zelensky over the past week - using talking points that analysts say sound more like they originate in Moscow than Washington - Trump offered that "of course" he would take a phone call from Ukraine's president. He insisted several times that Zelensky was to blame for failing to prevent the war, saying that Russia could have been "talked out" of invading Ukraine.
  • None Can Europe and UK persuade Trump they're relevant to Ukraine's future?
  • None Who was at the table at US-Russia talks in Saudi Arabia? Asked about Ukraine's absence from peace talks in Saudi Arabia this week, Trump said that Russia "found it impossible to make a deal with Zelensky". He said he believed that Russia sincerely wanted a deal to end the war, but that President Vladimir Putin "doesn't have to make a deal". US Vice-President JD Vance later hit back at critics who said that Trump's stance on Russia amounted to "appeasement".

