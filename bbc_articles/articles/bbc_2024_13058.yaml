content: |-
  Unidentified gunmen in Dagestan kill 19 police officers and civilians in coordinated attacks.

  Twenty dead in attacks on churches and synagogue in southern Russia

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Gunmen shoot at cars and buildings on fire in Russia attacks

  Attacks on police posts, churches and a synagogue in Russia's North Caucasus republic of Dagestan have left 20 people dead, most of them police officers. Five gunmen were also killed. At least 46 people were taken to hospital with injuries after the Sunday evening attack. Three days of mourning have been declared in Dagestan, a predominantly Muslim republic in southern Russia which neighbours Chechnya. The apparently coordinated attacks targeted the cities of Derbent and Makhachkala on the Orthodox festival of Pentecost, with an Orthodox priest among those killed. He was later identified as Father Nikolai Kotelnikov, who had served in Derbent for more than 40 years. Russian media reported that around 18:00 (15:00 GMT) local time on Sunday, gunmen opened fire with automatic weapons on an Orthodox church and a synagogue in Derbent, which is home to an ancient Jewish community. Two gunmen were said to have then retreated into a nearby building, where police later said they were killed. The Kele-Numaz synagogue was severely damaged by fire. At around the same time, in the city of Makhachkala, two gunmen ran into an Orthodox church, tried to set fire to its main icon and then opened fire, Izvestia newspaper said. Videos on social media showed heavy shooting also taking place outside the church when gunmen dressed in black took aim at passing police cars with automatic weapons. A police post near the Makhachkala synagogue was also attacked. All exits from the city were closed for some time as the interior ministry stated that it was possible the militants' accomplices were preparing to escape the city. In the nearby village of Sergokala, a police officer was injured a few hours later when a police car was attacked. Later, the head of the republic of Dagestan, Sergei Melikov, said at least 15 police officers were killed in total. Dagestan has in the past been the scene of Islamist attacks. Although the assailants have not been officially identified, Russian media widely reported that among the gunmen were two sons of the head of the Sergokala district, Magomed Omarov, who was detained by police. However, in a video posted on Telegram, Mr Melikov implied Ukraine had been involved in the attack and that Dagestan was now directly involved in Russia's war in Ukraine.

  "The war is coming to our homes," Mr Melikov said. "We understand who is behind the organisation of the terrorist attacks and what goal they pursued," he said. On Monday, Mr Melikov said authorities were continuing to hunt for members of "sleeper cells" who had prepared the attacks, including with assistance from abroad. The head of the Russian State Duma's international affairs committee, Leonid Slutsky, put forward similar claims, saying that the Dagestan attacks and a missile strike which killed four in Russia-occupied Sevastopol on Sunday "could not be a coincidence". "These tragic events, I am sure, were orchestrated from abroad and are aimed at sowing panic and dividing the Russian people," Mr Slutsky said. But a leading Russian nationalist in occupied Ukraine, Dmitry Rogozin, warned that if every attack was blamed on "the machinations of Ukraine and Nato, this pink mist will lead us to big problems". An attack on the Crocus City Hall venue near Moscow in March which left 147 dead was blamed by Russian authorities on Ukraine and the West, even though the Islamic State group claimed it. Kremlin spokesman Dmitry Peskov said Russia's President Vladimir Putin offered his condolences to those who lost loved ones in the attacks on Crimea and Dagestan. Russian news agencies reported on Monday morning that the counter-terrorism operation launched after the attacks had now come to an end. Between 2007 and 2017, a jihadist organisation called the Caucasus Emirate, and later the Islamic Emirate of the Caucasus, staged attacks in Dagestan and the neighbouring Russian republics of Chechnya, Ingushetia and Kabardino-Balkaria. Following the Crocus City Hall attack in Moscow, President Vladimir Putin had insisted that "Russia cannot be the target of terrorist attacks by Islamic fundamentalists” because it “demonstrates a unique example of interfaith harmony and inter-religious and inter-ethnic unity”. However, three months ago Russia’s domestic security service, the FSB, reported that it had thwarted an IS plot to attack a Moscow synagogue.
