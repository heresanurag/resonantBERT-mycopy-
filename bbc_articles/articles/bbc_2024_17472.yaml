  Ms Morgan said Plumb had initially outlined his plan to a man known only as Marc in 2021. A message sent by the defendant to Marc read: "I'm going to be living out my ultimate fantasy." He added: "I'm now at the point that fantasy isn't enough anymore. I want the real thing."

  Nicola Rice, specialist prosecutor at the Crown Prosecution Service (CPS), said Plumb's plan was "chilling". "Gavin Plumb is a dangerous man who plotted unspeakable violence against one of the nation's most familiar faces," she said. "Despite his attempts to pass himself off as a harmless fantasist, the prosecution persuaded the jury that Plumb posed a very real threat." The trial heard Plumb purchased 400 "heavy duty" metal cable ties, as well as bottles purported to contain chloroform to knock Ms Willoughby and her husband out after breaking in to their house.

  Gavin Plumb admitted messages he sent from his flat were "dark"

  Plumb told Marc in March 2023 in a voice note: "We're then gonna force her [Ms Willoughby] to make a video saying she come with us under her own free will... and she's fully consenting to everything we do to her – so that covers us." The jury was told he checked out an abandoned stud farm with cells to "keep" Ms Willoughby. Giving evidence at his trial, Plumb admitted messages he sent online about the presenter were "dark" but there was "no plan" to carry them out. He said that, with hindsight, his words were "massively regrettable" and acting upon his fantasies was "something I knew that was never going to happen". The defendant claimed he had bought chloroform to clean a stain on his floor.

  This video can not be played To play this video you need to enable JavaScript in your browser. Det Ch Insp Greg Wood thanks the US for warning the UK about Gavin Plumb

  Essex Police was notified about Plumb's plot by the FBI, who had been informed by undercover police officer David Nelson, who is based in the US. Mr Nelson, not his real name, spoke with Plumb having covertly operated in an online group entitled "Abduct Lovers". When giving evidence, Plumb was challenged on his two previous convictions for attempted kidnap in 2006 and another two offences of false imprisonment committed in 2008. Plumb said he had a "stewardess fantasy" when he tried to force two separate air hostesses to get off a train during the space of three days in August 2006.

  Police officers were seen raiding Plumb's flat in Potters Field, Harlow, in October 2023

  In 2008, he "terrified" two 16-year-old girls when he tied their wrists up and forced them into the store room of a shop. He was handed a sentence of 12 months, suspended for two years, for his first offences, before he was jailed for 32 months for the false imprisonments.

  Following the verdict, Ms Willoughby issued a statement, saying: "As women we should not be made to feel unsafe going about our daily lives and in our own homes." She thanked the CPS and members of the jury "for ensuring that justice was done and that the defendant will not be able to harm any more women". "I would also like to commend the bravery of his previous victims for speaking up at the time. Without their bravery this conviction may not have been possible," the statement added.
