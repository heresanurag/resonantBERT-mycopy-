title: 'Holly Willoughby: Gavin Plumb guilty in kidnap and murder plot - BBC News'
date: '2024-07-05'
section: Essex
url: http://www.bbc.co.uk/news/articles/c4ngp983q4xo
content: |-
  Gavin Plumb created a tool kit for sexual violence against the TV star to fulfil an "ultimate fantasy".

  Security guard Gavin Plumb wanted to raid TV star Holly Willoughby's home and take her prisoner

  A security guard has been found guilty of plotting to kidnap, rape and murder television presenter Holly Willoughby. Gavin Plumb assembled a tool kit for highly sexualised violence against the former This Morning presenter to fulfil his "ultimate fantasy". The 37-year-old from Harlow, Essex, was arrested and charged after he unwittingly disclosed his plans online to an undercover police officer in the US. Plumb denied soliciting murder and inciting kidnap and rape between 2021 and 2023, but was found guilty following an eight-day trial at Chelmsford Crown Court.

  In a statement, Ms Willoughby said: "I will forever be grateful to the undercover police officer who understood the imminent threat, and to the Metropolitan and Essex police forces for their swift response." The defendant, who had previous convictions for attempted kidnap, wept in the dock as he was told he would be sentenced on 12 July. Det Ch Insp Greg Wood, of Essex Police, told the BBC that Plumb was an "obsessive loner" who had assembled "all the items he needed to cause Holly Willoughby some serious harm". "If the American officer hadn't have contacted us... I've got no doubt that Gavin Plumb could've gone on to commit some really horrific crimes," he added.

  Gavin Plumb had a "real intention" to kidnap the broadcaster from her home, the trial heard

  Ms Willoughby ended her 14-year stint on This Morning after the offences came to light in October 2023. Plumb had developed an "obsession" with Ms Willoughby spanning more than 10 years, prosecutor Alison Morgan KC said. He had a "real intention" to kidnap the broadcaster from her home, "take her to a location where she would be raped repeatedly" and then murder her, Ms Morgan continued. Jurors were told that Plumb was arrested after he revealed his plot to an undercover police officer in the US, who he had been talking to online.

