title: 'Watch: Unseen video shows moments after JFK assassination - BBC News'
date: '2024-09-05'
section: General
url: http://www.bbc.co.uk/news/videos/c4gl323r1y6o
content: |-
  In the video, the presidential limousine can be seen driving at high-speed to a hospital.

  Previously unseen video showing the moments after President John F Kennedy was assassinated is going to auction.

  The 8mm film was recorded 60 years ago in Dallas, Texas on 22 November 1963.

  Video and photographs from that fateful day have captivated people across the world ever since, with one footage recorded by Abraham Zapruder being the most prominent.

  The video going to auction was filmed by a truck driver called Dale Carpenter, who had hoped to catch the president on camera.

  Mr Carpenter missed his chance to see the president, so found another location to see him.

  During that time, JFK was assassinated and Mr Carpenter happened to capture the moment the limousine sped to the hospital as a Secret Service agent Clint Hill clung onto the vehicle.

  RR Auction, based in New Hampshire, has listed the item for bidding.
