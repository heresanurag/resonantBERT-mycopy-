  The Associated Press (AP) news agency's refusal to use the Gulf of America name led to a months-long conflict with the White House, which restricted AP's access to certain events. A federal judge ordered the White House in April to stop sidelining the outlet. Trump hinted on Wednesday that he may recommend changing the way the US refers to another body of water. During an upcoming visit to Saudi Arabia, he plans to announce that the US will henceforth refer to the Persian Gulf as the Arabian Gulf or the Gulf of Arabia, AP reported. Iranian Foreign Minister Abbas Araqchi has responded by saying he hopes the "absurd rumours" are "no more than a disinformation campaign" and that such a move would "bring the wrath of all Iranians".
