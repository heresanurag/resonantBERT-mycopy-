content: |-
  Ten teenagers swap their smartphones for brick phones as part of a week-long digital detox.

  Students at Media City’s University Technical College describe their experiences of swapping their smartphones for basic Nokia handsets.

  The only forms of communication are calls and text messages.

  The detox is all part of a project run by BBC Radio 5 Live and BBC Bitesize looking at young people’s habits with their smartphones.

  Listen to Radio 5 Live and Bitesize's Teen24 summit on Wednesday 12 June on BBC Sounds. For more details on the Teen24 summit.
