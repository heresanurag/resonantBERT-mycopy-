  For a long time, Mr Whelan was relentlessly upbeat about his fate. He was convinced the US government would get him out, even as relations between Russia and the West slid from awful to much worse. Conditions in his prison camp, IK 17, were tough, locked up with "child rapists and murderers" as he once put it. The rest of his time was spent sewing clothes in a prison workshop and the nights were interrupted, regularly, by the guards. They would shine a torch in his face to check he had not escaped. Despite all that, Mr Whelan told me he made a habit of singing his four national anthems out loud each morning - to annoy those guards and to keep his spirits up. He called himself a political hostage and told me repeatedly the FSB agents who took him - even the judge who convicted him - had all assured him he would be swapped. It is why he didn’t bother appealing his sentence.

  Mr Whelan was guarded in the defendants' cage by a balaclava-clad FSB officer during a court appearance

  But as time passed, so did two other prisoner exchanges between Russia and the US, and both times Mr Whelan missed out. So when we spoke late last year, he admitted he felt abandoned by his government. Officially designated "wrongfully detained", he had been assured he was a priority, Mr Whelan told me. Then he had been “left in the dust". That day on the phone he was despondent and frustrated like I had never heard before. Aware talks to free Evan Gershkovich - the US journalist accused of espionage - were under way, he worried he had been left behind again. Mr Whelan’s parents were ageing, his beloved dog Flora had died, he reminded me. He felt his life was ebbing away.

  Earlier this week, as rumours of a prisoner swap began flying, I called Mr Whelan’s old lawyer, Olga Karlova. She had seen the reports and told me she had written to IK 17 asking whether Mr Whelan was there. It was a key sign an exchange was happening, likely a major one, although nothing was confirmed until it was all safely under way and could not be derailed. Two days on, I’ve been watching pictures of Mr Whelan boarding a plane - no handcuffs, no prison uniform. He looks a little dazed, presumably exhausted. But five years after he landed in Moscow for a wedding party, he is at last heading home.
