title: Paul Whelan heads home, after 2,043 days in a Russian prison - BBC News
date: '2024-08-02'
section: World
url: http://www.bbc.co.uk/news/articles/c4ngn52zpnno
content: |-
  The BBC’s Sarah Rainsford recalls phone conversations with the ex-US marine while he was imprisoned in Russia.

  Paul Whelan was escorted by a Russian FSB officer as he was taken off a plane during the prisoner exchange in Turkey

  Paul Whelan must have doubted this moment was ever going to come. It has been 2,043 days since Federal Security Service (FSB) agents in balaclavas burst into his Moscow hotel room, pinned him to the ground and announced he was being arrested for espionage. I followed Mr Whelan’s case closely in Moscow from the very start and remember the day he first arrived in court looking more like a dazed librarian than a dastardly intelligence agent. His hands were cuffed and he was cradling a cardboard box containing his prison lunch. He was too nervous to say much, at first, and I found out later he was being interrogated and threatened.

  As time passed Mr Whelan found his voice and began to denounce his jailing, loudly. Russia thinks it has caught James Bond, is how he put it one day, but in fact it got Mr Bean on holiday. After he was sentenced to 16 years, we spoke at length by phone from prison - Mr Whelan always insisted on his innocence. Born in Canada to British parents with Irish roots, he is a citizen of four countries – which made his arrest a big deal diplomatically. Long before any trial, Russia’s foreign minister claimed Mr Whelan had been caught "red handed" committing espionage. The court later heard he had been trying to get secret information from a friend - actually an FSB intelligence agent. But no evidence was ever made public.

  Paul Whelan was released alongside journalists Evan Gershkovich and Alsu Kurmasheva who were also detained in Russia

  Mr Whelan, a former US Marine, was a fan of Russia and had visited several times. When he was arrested, he was in Moscow for the wedding of an American friend to a Russian woman and had spent the morning leading the guests around the Kremlin, including the locals. After his detention, I scoured his social media accounts for any contacts or clues. Some people were too nervous to talk, given the serious charge. But, all those who agreed to speak laughed at the idea that their friend could be involved in espionage. “If he’s a spy,” one of them wrote to me, with multiple exclamation marks, “then I’m Michael Jackson”.

