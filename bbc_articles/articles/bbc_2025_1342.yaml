  Crews lift the American Airlines’ plane wreckage from last week’s fatal crash out of the Potomac River.

  Recovery crews could be seen pulling the American Airlines' plane wreckage out of Washington DC's Potomac River on Monday. Sixty passengers and four crew members were on the American Airlines flight and three soldiers on the Black Hawk helicopter. Authorities said 55 victims had been found by Saturday, and searches for the remaining 12 continue.
