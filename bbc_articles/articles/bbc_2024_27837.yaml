  He opened a second hub, in Knowsley, Merseyside, virtually, saying: "Please give my kindest wishes to everybody there. "I hope it makes an enormous difference to all their remarkable work that they do." He then unveiled plaques for both hubs. Three more hubs are due open in the next year, with £15m raised to create a network of up to 10 across the UK.

