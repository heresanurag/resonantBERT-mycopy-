  There was some glamour for the King ahead of his birthday, as he attended the premiere of British director Sir Ridley Scott's new film Gladiator II, on Wednesday. Queen Camilla missed the screening as she is recovering from a chest infection. “I think I’m on the mend - but these things always take a bit of time," the Queen said at a reception for Booker Prize-shortlisted authors on Tuesday. The King is continuing to be treated for cancer but wants to keep focusing on his work, royal aides have said. Although he has been on the throne for only two years, he is now the sixth longest-living British monarch.

  The King's Troop Royal Horse Artillery fired a 41-gun salute at Green Park for the King's birthday
