content: |-
  The King is spending his 76th birthday opening new hubs to redistribute food which would otherwise be thrown away.

  King Charles III was greeted by staff at the Coronation Food Project hub on the first engagement of his birthday

  King Charles has marked his 76th birthday by opening a new hub in south-east London as part of his project to distribute surplus produce to people in food poverty. The King is treating his birthday as a working day and travelled to Deptford on the first anniversary of the Coronation Food Project which aims to make better use of food that would otherwise be thrown away. He was greeted by volunteers who waved flags and cheered. Later, a group of schoolchildren sang Happy Birthday and presented him with a homemade card. Ceremonial gun salutes were fired to mark the monarch's birthday at Green Park near Buckingham Palace and at the Tower of London.

  The King sat with a group of schoolchildren, talking about school lunches

  So far, the Coronation Food Project has rescued 940 tonnes of surplus food, estimated as enough to make 2.24 million meals. A further 1,900 tonnes has been donated by partners of the project, equivalent to 4.5 million meals. Charities, including the Felix Project and FareShare, can collect food from the new hub in Deptford and take it to help individuals and community groups. The food comes from places such as supermarkets or the catering industry - and rather than wasting good quality unsold products, it is used to help those facing food poverty. The King attended a "surplus food festival", with meals created from food that would otherwise have gone to waste. He sat with a group of children from Peckham's Rye Oak Primary School, who will benefit from the new hub, and listened to them talk about the foods they enjoy, asking about their school lunches. Asked if he would be putting his feet up for his birthday, he said: "Not quite." At the end of the conversation, he said: "I hope you have a very happy Christmas."

