title: Foreign Office faces inquiry over its handling of Harry Dunn case - BBC News
date: '2025-06-26'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cy8g7yqwzg7o
content: |-
  The woman driving the car that hit the 19-year-old's bike left the UK under diplomatic immunity laws.

  Harry Dunn, 19, died outside RAF Croughton in Northamptonshire in 2019

  The family of Harry Dunn, the motorcyclist killed in a crash outside a US military base in the UK, said an inquiry into how the Foreign Office (FO) handled the case would start within weeks. The 19-year-old's bike was hit by a car being driven on the wrong side of the road by Anne Sacoolas at RAF Croughton in Northamptonshire in 2019. She left the country after the incident, with the US claiming she had diplomatic immunity from prosecution. Mr Dunn's mother Charlotte Charles has described the review as a "welcome step".

  The family has repeatedly criticised the way the case was dealt with by both the US and UK governments. Ms Charles said: "We hope this inquiry will be a genuine, independent search for truth, not just for our sake, but to ensure that no other family ever has to endure what we did. "No bereaved family should ever be treated the way we were."

  Charlotte Charles and family spokesperson Radd Seiger visited the FO on Wednesday

  Sacoolas pleaded guilty to causing death by careless driving in 2022 and was handed an eight-month suspended jail term. The UK government allowed her to leave the country after the incident and, in the family's view, gave inappropriate advice on the issue of immunity. Ms Charles said the UK government at the time was rude, "brutal" and failed to engage with them. Members of the family said they met officials at the FO on Wednesday and were told an inquiry would be chaired by former chief inspector of prisons Dame Anne Owers. It is understood the review will not consider the involvement of the US government or any issues covered in previous court hearings.

  Former chief inspector of prisons Dame Anne Owers will lead the review

  The announcement of the review comes just over a week after an independent report criticised Northamptonshire Police for their handling of the investigation. It said that, while Sacoolas was in a state of shock, she "could and should have been arrested" after the crash. Northamptonshire Police has apologised, saying it failed "to do the very best for the victim". The Foreign Office has so far declined to comment.

