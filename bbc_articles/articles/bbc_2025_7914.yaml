title: Ed Sheeran launches 'playful' new era with Persian-influenced song, Azizam
  - BBC News
date: '2025-04-04'
section: Culture
url: http://www.bbc.co.uk/news/articles/cgen9n0ywgqo
content: |-
  The star incorporates Persian instruments on Azizam, the first single from his eighth studio album.

  Ed Sheeran premiered his single on BBC Radio 1 and Radio 2 while riding around London on a pink open-top bus

  After a pair of low-key, introspective albums, Ed Sheeran has returned to his roots with a shimmering new pop single, Azizam. The track sees the star incorporate Middle Eastern influences, inspired by producer Illya Salmanzadeh's Persian heritage. The title means "my dear" or "my darling" in Farsi, and the track incorporates instruments like the ghatam, a clay pot commonly used as percussion in Southern India, and the santur, a hammered dulcimer of Iranian origin. "Now the song's finished, and it's out, I'm discovering more and more every single day that Persians are really, really proud of their culture, and it's great to celebrate it," Sheeran told BBC Radio 1.

  Azizam is released in a crowded week for new music, with comeback songs by Miley Cyrus, Wet Leg and Elton John all vying for streams. Sheeran's track doesn't stray too far from his usual pop template, but the Persian influences will undoubtedly bolster his figures in the Middle East - the world's fastest-growing music market. It's a trick the star has pulled before. A voracious music fan with an instinct for new commercial opportunities, he's collaborated with Afrobeats stars like Burna Boy and Fireboy DML, learned Spanish for a record with Colombian singer J Balvin, tipped his hat to Irish folk music on Galway Girl, and even sang in Punjabi during a recent concert in Mumbai.

