content: |-
  The BBC Good Morning Ulster presenter took a plunge into an ice bath used by top sport stars.

  Northern Ireland has been experiencing low temperatures recently, but that wasn't enough for BBC Good Morning Ulster presenter Chris Buckler.

  He took the plunge into an ice bath produced by Belfast company CET CryoSpas.

  The baths are used by top athletes from across the world, including footballers in the blistering heat of the World Cup in Qatar.

  It was a bracing experience, to say the least.

  Immerse yourself fully in the story on BBC Sounds.
