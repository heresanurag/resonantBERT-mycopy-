content: |-
  BBC Sport looks at some of the reaction from Coventry City's decision to sack boss Mark Robins, the English Football League longest-serving manager.

  'Glorious light' goes out - shock at Robins' Coventry exit

  Mark Robins took charge of 420 games for Coventry, over two spells - the second-most in club history

  Even the English Football League's most durable manager has succumbed. Thursday's sacking of Mark Robins by Coventry City is another stark reminder that the ruthlessness of football - and its insatiable demand for winning - comes for every boss in the end. And so, after seven years, eight months and one day, Robins' second reign at the club is over. Ended after defeat by Derby County - their seventh in 14 Championship games. Only Manchester City's Pep Guardiola has stayed at one club longer, across the top four divisions, than the 54-year-old former Manchester United striker managed with the Sky Blues in his second stint. But, despite four Wembley trips, two promotions, a trophy win, and an FA Cup semi-final few will ever forget, Coventry owner Doug King has opted to go in a new direction. BBC Sport looks at the reaction to the decision to get rid of a man the club described as "one of the club's greatest ever managers".

  Legendary former Coventry City goalkeeper Steve Ogrizovic played more than 500 times for the club and was part of their 1987 FA Cup winning team. Ogrizovic, who now works as a pundit for BBC CWR, said: "Very few things in football shock me but this is a poor decision. "It's not a knee-jerk decision because I think this is planned and Doug King has got a plan in the back of his mind, although what that is I don't know." Despite a slow start to the season for the third campaign in a row, wins against Luton Town and, impressively, at Middlesbrough, seemed to give Robins a bit of breathing space. But Wednesday's 2-1 defeat by the Rams was one too far for King. "Mark Robins had more to give, look at the club since the day he came in and it's been year-on-year success and progression," added 67-year-old Ogrizovic. "The sun has been shining on Coventry and they got back into the Championship and along the way there were some great memories for people. "The stadium is full now and it wasn't when Mark Robins first came to the club."

  Steve Ogrizovic started his career with Chesterfield and had spells with Liverpool and Shrewsbury before becoming a Coventry City legend after 16 years and more than 500 appearances for the club.

  Another former Sky Blues player David Prutton has paid tribute to what Robins achieved against the backdrop of financial constraints and the prospect of dragging the club back up from the bottom tier of the EFL. "When I played for Coventry they were dark days so what Mark Robins gave back to that football club was just glorious light and illumination," Prutton, who had a brief loan spell at the club in 2014, told BBC CWR. "He's got the same demeanour win, lose or draw which enables a team to climb the mountains they did. "The fact he outperformed budget and expectations year on year is another feather in his cap." Key to that was getting the very best out of the squad and Prutton cites the work Robins did with striker Viktor Gyokeres - now one of the hottest properties in Europe thanks to his Champions League hat-trick against Manchester City. "He bought him for about £1m and sold him for £24m, so he's ticked so many boxes, on the pitch for the fans to watch, enjoy and love, and off the pitch for the bean counters who want to make the football club a viable financial asset," Prutton added. "We can all get into metrics and statistics but if anyone classes Mark Robins' tenure as a failure I would say that suggests a fundamental misunderstanding of what football means to people who love the game and are passionate about their club."

