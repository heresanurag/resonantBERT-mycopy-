  Lifelong Coventry supporter and BBC CWR sports editor Rob Gurney has pretty much seen it all in his time covering and following the club. He says Robins leaving has once again illustrated the contrasting emotions being a fan and a journalist often present. "Am I gutted? Of course. Am I surprised? Not in the least," he said. "Football doesn't respect a manager's history or reputation, but you could argue Mark Robins was a special case. "Yes, he left once, under a cloud. But, since his return in March 2017, he's pulled the club back from the brink. "Winning the EFL Trophy within weeks of his return, instantly endeared him to Sky Blues fans again. "An immediate return from League Two, after another memorable Wembley trip, cemented that relationship still further. "Then we saw the League One title secured during Covid, were a missed penalty kick away from the Premier League, and most gut-wrenchingly of all, a toe-nail killed the greatest FA Cup comeback ever. "Championship form tailed off, completely understandably, after the physical and mental exertions of that semi-final." Gurney added that the timing of that hangover was unfortunate, given the club's pronounced public relations strategy coming into this season. "Then a very aggressive summer marketing campaign 'Think Big, Aim High' fuelled expectations of a promotion push, but a slow start, for the third season running, sealed Robins' fate. "My perception is the back-to-back wins over Luton and Middlesbrough came as a huge inconvenience to owner/chairman Doug King, particularly the supporters' response to Robins personally, in the face of going 2-0 down in the first of those. "His, and his players, in-game management, has been scrutinised in recent weeks, although he'd appeared to have bought himself a little more time. "Now King has made the decision to dispense with the man many fans regard as the modern-day Jimmy Hill, his next one could define the City's destiny for years to come."

  Mark Robins leaves Coventry for a second time having returned as manager in March 2017

  As with any manager departure, the decision has triggered a frenzy of reaction from the club's supporters. Dave called sacking Robins "madness" and wondered "who is out there that can realistically do a better job". Another fan, Chris described his mood as "absolutely devastated" adding "what a man he has been for the football club. It just doesn’t make sense". "Mark thank you for everything you have done, us fans hold you in higher regard than our apparent owner. Gutted" The club's mini recovery pre-Derby left Jesmondos thinking Robins had earned more time: "Wow, really? That man worked wonders. Coventry fans would know best but surely he deserved a bit more time and trust?" Another supporter Jamie said he thought the club's search for a replacement "head coach" was a potential sign why Robins' time is over. "Sounds like there was a touch of some internal politics in this move, with the club statement saying their next appointment will be a 'head coach' rather than a 'manager'," he said. "Coventry haven’t started this season well, but not sure it was bad enough to justify sacking their greatest manager of the 21st century." The last thought goes to G-Man - who perhaps perfectly sums up the fickleness of football: "The saviour that nearly knocks Utd out of the cup one minute, to no longer viewed as up to the job.
