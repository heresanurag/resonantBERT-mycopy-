title: Cars and shop torched in violent UK protests - BBC News
date: '2024-08-05'
section: General
url: http://www.bbc.co.uk/news/videos/c728897wz85o
content: |-
  Anti-immigration protests break out in several cities across the UK following the killing of three young girls in Southport on Monday.

  Protests have taken place in several cities around the UK.

  There were many clashes with police and counter-protesters, cars were set alight and buildings were damaged, although not all demonstrations turned violent.

  In Hull, protesters chanted "stop the boats" outside a hotel which houses asylum seekers.

  The unrest began earlier in the week following misinformation surrounding the fatal stabbing of three young girls in Southport on Monday.
