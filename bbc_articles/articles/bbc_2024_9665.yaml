title: 'Gaza: Palestinians return to Khan Younis to find homes destroyed - BBC News'
date: '2024-04-08'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68759232
content: |-
  Palestinians started returning to the city after Israel said it was reducing the amount of soldiers in southern Gaza.

  Displaced Palestinians have started to return to Khan Younis after Israel said it was reducing the numbers of soldiers in southern Gaza.

  Many people came home to find that their houses were in ruins, with others saying they couldn't actually locate their homes.

  Khan Younis has been bombarded by Israel for months.

  The large-scale destruction was described as "enormous" by one resident, with footage showing overturned cars, collapsed buildings and stairwells crumbled.
