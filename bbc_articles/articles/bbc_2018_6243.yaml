id: bbc_2018_6243
title: 'Rural v urban: Ireland''s abortion divide? - BBC News'
date: '2018-05-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-44160510
content: |-
  With Ireland set to vote on legalising abortion, do people living in its cities and its countryside see the issue differently?

  In one week's time people in the Republic of Ireland will vote on whether they want to make changes to the country's strict abortion laws.

  It's holding a referendum asking whether the Eighth Amendment should be repealed from its constitution. The amendment gives equal right to life for the mother and the unborn child.

  But do people living in Ireland's cities see the issue differently from those living in its countryside?
