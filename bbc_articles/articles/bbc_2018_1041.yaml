id: bbc_2018_1041
title: Car hits pedestrians near Rio's Copacabana beach - BBC News
date: '2018-01-19'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-42742877
content: |-
  A baby dies and 15 people are hurt when a car hits crowds on a promenade near Copacabana beach.

  The car hit people and crashed through tables and chairs of a cafe, eyewitnesses say

  A car has ploughed into crowds on a promenade near Rio de Janeiro's famous Copacabana beach in Brazil, killing a baby and injuring at least 15 people.

  Live television pictures showed victims lying on the sand and pavement, receiving emergency medical treatment.

  The badly damaged car came to a stop on the beach.

  The driver, who was detained, had an epileptic fit at the wheel, and drugs to treat the condition were found by police in the vehicle, reports say.

  Eyewitnesses were quoted by Globo News network as saying the car went over a bicycle path and across the promenade, hitting people and crashing through the tables and chairs of a cafe.

  A police official was quoted by the AFP news agency as confirming the accident was not a terrorist attack.

  The promenade of Copacabana's crescent-shaped beach is popular with Rio residents and tourists.
