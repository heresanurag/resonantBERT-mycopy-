title: Large crack appears in Beachy Head cliff near Eastbourne - BBC News
date: '2025-03-24'
section: Sussex
url: http://www.bbc.co.uk/news/articles/czedz4dee00o
content: |-
  The coastguard is warning people to stay away from cliff edges.

  A large crack has appeared in a cliff in East Sussex

  A warning has been issued to stay away from cliff edges after a large crack appeared in a cliff in East Sussex. The crack stretches a couple of metres along a section of cliffs close to the Belle Tout lighthouse at Beachy Head near Eastbourne. There have been several cliff falls in the area, including one in a nearby spot in 2021. Birling Gap Coastguard warned people to "keep safe and stay away from cliff edges and bases".

  The crack is in a section of cliff near the Belle Tout lighthouse, which is now holiday accommodation

  In the 2021 fall, tonnes of chalk fell on to the beach below the cliffs, cutting off an access path to the former lighthouse. The lighthouse, which was decommissioned in 1902, and is now holiday accommodation, has already been moved due to coastal erosion.
