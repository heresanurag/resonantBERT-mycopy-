title: 'Manchester attack: Journalist broke news of son''s death - BBC News'
date: '2018-03-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-43557790
content: |-
  Figen Murray's son Martyn Hett was one of 22 people killed in the Manchester Arena attack.

  The mother of one of the Manchester Arena attack victims said the actions of one journalist in the wake of the attack were "unforgiveable".

  Figen Murray, whose son Martyn Hett was one of 22 people killed in the May 2017 explosion, spoke about a reporter who broke the news of his death to her 16-year-old daughter.

  This happened hours before the family were officially informed about his death.
