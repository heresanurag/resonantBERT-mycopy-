id: bbc_2020_10694
title: Man in box of ice breaks world record - BBC News
date: '2020-09-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-54049219
content: |-
  Austrian Josef Koeberl lasted over two hours in a box of ice, wearing only swimming trunks.

  An Austrian man has broken a world record, by standing in a box filled with ice for over two-and-a-half hours.

  Josef Koeberl beat the previous record for full-body contact, which he set himself last year, by over 25 minutes.
