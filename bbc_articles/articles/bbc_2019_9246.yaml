content: |-
  England bowler Stuart Broad remains hopeful of an England win against Australia at Lord's, despite five sessions being lost to rain.

  Last updated on .From the section Cricket

  Men's Ashes: Second Specsavers Test, Lord's (day three of five)

  Stuart Broad believes England can still win the second Ashes Test, despite five sessions having been lost to rain.

  The hosts reduced Australia to 80-4, 178 behind, before the Lord's weather wiped out the final two sessions of the third day, following on from the complete abandonment on day one.

  "It's set up for two brilliant days," Broad told Test Match Special.

  "We probably have to knock Australia over by lunch tomorrow [Saturday] and that will be our aim."
