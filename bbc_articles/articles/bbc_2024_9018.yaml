title: 'Newspaper headlines: Tory MP defects and Labour ''would keep triple lock''
  - BBC News'
date: '2024-04-27'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68914447
content: |-
  Suffolk MP Dan Poulter's switch to Labour and a pledge from Keir Starmer on pensions lead the papers.

  The Daily Mail's front page features an image of an etched boulder in Hyde Park's Holocaust Memorial Garden that has been covered up with blue tarpaulin, a step the paper says was taken to "protect it from pro-Palestine protesters". The headline reads: "Police are so cowed by the antisemitic mob, they even cover up the Holocaust". Responding to the page, the Metropolitan Police said in a statement that the decision to cover the memorial was taken by park authorities, not the police, and that it was a precaution that has been taken for various events in the past.
