title: 'London Euston pub fire: Crews tackle blaze near station - BBC News'
date: '2018-06-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-44584622
content: |-
  There were 72 firefighters tackling the blaze, which started near three major train stations.

  The building on fire is the Somers Town Coffee House

  A large fire has broken out at a pub near three major railway stations in central London.

  The London Fire Brigade said it was called to a blaze in Chalton Street, a few hundred metres from Euston, King's Cross and St Pancras, at 20:06 BST.

  Witnesses reported seeing flames and plumes of smoke coming from the pub called the Somers Town Coffee House.

  There were at least 72 firefighters tackling the blaze at one stage, the brigade said.

