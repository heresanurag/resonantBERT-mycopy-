title: Ed Sheeran's surprise concert for high school students - BBC News
date: '2023-05-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65714612
content: |-
  The British superstar gives these Florida high school band students the surprise of a lifetime.

  In addition to giving them the surprise of a lifetime, Ed Sheeran supplied the music department with free guitars and gave each member of the band a ticket to his sold out concert in Tampa, Florida.
