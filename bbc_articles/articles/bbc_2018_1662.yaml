title: Freezer body murder 'not an honour killing' - BBC News
date: '2018-02-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-43063935
content: |-
  Statements from the victims' families were read out after Mujahid Arshid was jailed.

  A south London builder has been jailed for a minimum of 40 years for raping and murdering his 20-year-old niece.

  Mujahid Arshid, 33, was found guilty at the Old Bailey of murdering Celine Dookhran and the attempted murder of a second woman.

  After Arshid was sentenced, Det Ch Insp Sam Price read out statements on behalf of the surviving victim's family.
