  • None Real have scored 27 headed goals in La Liga, the most for a team in a single top-flight season since at 2003-04
  • None Zinedine Zidane is the sixth former Real Madrid player to win La Liga as manager, after Bernd Schuster, Vicente del Bosque, Jorge Valdano, Luis Molowny and Miguel Munoz
