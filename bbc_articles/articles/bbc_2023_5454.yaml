  A journey through the once-vibrant capital city of Khartoum after fighting broke out in the country ten days ago.

  A drive through the once-vibrant capital of Sudan reveals the extent of destruction after days of fighting.

  Fighting broke out in the country ten days ago, and hundreds have been killed.

  The BBC has verified the location of this social media video, but not the date it was filmed.
