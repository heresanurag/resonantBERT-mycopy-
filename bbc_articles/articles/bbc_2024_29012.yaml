title: Heavy flooding caused by Storm Bert - BBC News
date: '2024-11-24'
section: General
url: http://www.bbc.co.uk/news/videos/c36pdz1e9p9o
content: |-
  The fire service was called to the scene in Llanarmon Dyffryn Ceiriog, in Denbighshire, on Saturday.

  These were scenes of flooding after firefighters were called to rescue people from a house following a landslide.

  A property was hit by flood water and debris and suffered "substantial" damage, North Wales Fire Service said.

  The brigade was called to the scene in Llanarmon Dyffryn Ceiriog, in Wrexham county, at about 14:00 GMT on Saturday and warned there was still "significant" flooding in the area.

  "We are advising people to ensure they adhere to local road closures and keep up-to-date on flood warnings," a spokesman said.
