id: bbc_2023_12260
title: RAF jets intercept Russian military aircraft during Baltic mission - BBC News
date: '2023-08-04'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-66405686
content: |-
  Pilots from RAF Lossiemouth intercepted 50 Russian aircraft during a four-month mission in the Baltic.

  The RAF has released footage and photographs of fighter jets from RAF Lossiemouth intercepting Russian aircraft.

  Air force crews were deployed to Estonia to help patrol Nato airspace over the course of four months, during which they intercepted 50 Russian aircraft.

  The RAF personnel used "zombie" as their codeword for a Russian plane acting suspiciously.

  The mission, called Operation Azotie, came amid heightened tensions between Nato-member countries and Russia following the invasion of Ukraine.
