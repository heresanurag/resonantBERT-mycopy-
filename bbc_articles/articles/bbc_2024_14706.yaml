content: |-
  Officers are searching for Kyle Clifford after the murders of Carol Hunt and two of her daughters.

  Detectives are searching for Kyle Clifford, 26, and are appealing for anyone who knows where he is to contact them

  Three women killed in a Hertfordshire home were the wife and two daughters of BBC racing commentator John Hunt, it has been confirmed. Carol Hunt, 61, Hannah Hunt, 28, and Louise Hunt, 25, were found seriously injured at a house in Ashlyn Close, Bushey, just before 19:00 BST on Tuesday, and all died at the scene. A search is under way to find Kyle Clifford, 26, from the Enfield area, who is wanted in connection with the deaths. He is believed to be in Hertfordshire or north London and in possession of a crossbow.

  John Hunt's wife Carol, 61, and daughters Louise (top right) and Hannah were killed.

  A senior police officer had said earlier that the deaths were being treated as murders. Ch Supt Jon Simpson had said "other weapons may also have been used". Mr Clifford left the British army after a short period of service in 2022, the BBC understands.

  Ch Supt Simpson had said the police's "overarching objective" was to protect public safety and to locate Mr Clifford. He said the three women were believed to have been murdered in a "targeted incident" Ch Supt Simpson had appealed to Mr Clifford and asked him to " please make contact with the police via 999". He described was had happened as an "horrific incident" and said armed police and specialist search teams had involved in the manhunt.

