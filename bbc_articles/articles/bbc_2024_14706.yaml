  This video can not be played To play this video you need to enable JavaScript in your browser. Police closed off Ashlyn Close on Tuesday evening as the inquiry got under way

  Local councillor Louise Nicolas wrote in a post on Facebook, external that she was "deeply saddened to learn this morning of the tragic news that three women have lost their lives in a violent incident". "Should anyone wish to speak with us or require any support please do not hesitate to get in touch," said Ms Nicolas, a Liberal Democrat who represents the North Bushey ward on Hertsmere Borough Council. "It goes without saying that this is a live investigation, so speculation as to the circumstances should not be entered into [on public forums]."

