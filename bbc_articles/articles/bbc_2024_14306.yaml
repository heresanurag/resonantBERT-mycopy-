title: 'Steve Bannon: Ex-Trump aide ordered to prison - BBC News'
date: '2024-06-07'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cxee7gyrmnzo
content: |-
  A US court has ordered ex-Trump campaign strategist Steve Bannon to turn himself in by 1 July.

  Steve Bannon was convicted in 2022 for contempt of Congress

  A US federal judge has ordered Donald Trump's former strategist Steve Bannon to report to prison by 1 July to serve a four-month sentence. The order on Thursday comes after years of legal wrangling, with an appeals court last month upholding Bannon's 2022 criminal conviction for contempt of Congress. The right-wing podcaster was found to have illegally refused to testify before the committee investigating the 6 January 2021 Capitol riot. Bannon, 70, has denied any criminal wrongdoing and his lawyer called the ruling a "horrible decision".

  After Thursday's decision, Bannon said he and his lawyers would "go all the way to the Supreme Court if we have to". "There's not a prison built or a jail built that will ever shut me up," he defiantly told reporters outside the courthouse in Washington DC. He called the legal challenges against him a plan for "shutting down the Maga movement" - a reference to former President Trump's "Make America Great Again" campaign slogan. Bannon has said he was following legal advice in refusing to testify before the House committee investigating 6 January, when rioters ransacked the US Capitol with the goal of stopping the certification of Joe Biden's election win. Bannon's lawyer David Schoen, who has called the case against his client politically motivated, also vowed to appeal to a higher court. Mr Schoen said his client would have been violating Trump's invocation of executive privilege - a legal concept that allows presidents to keep some communications private - had he testified before Congress. But a three-member panel from the DC Circuit Court of Appeals unanimously rejected that argument when it upheld his conviction in May, saying his claim "runs headlong into settled law". "This exact 'advice of counsel' defense is no defense at all," Justice Bradley Garcia wrote in that decision. A full appeals court could delay Thursday's sentencing order if it took up the case and issued its own ruling stopping its enforcement. Bannon was a key player in Trump's 2016 rise to the Oval Office and later became chief strategist at the White House. He left the administration after a violent far-right rally in Charlottesville, Virginia, in August 2017, but remains a top ally of the former president. Another senior Trump aide, Peter Navarro, reported to prison in March after his own contempt of Congress conviction.
