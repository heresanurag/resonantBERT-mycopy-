title: The Trump arrest saga in 70 seconds - BBC News
date: '2023-03-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65018198
content: |-
  How will it play out now that the former president has been indicted? Our correspondent explains.

  Donald Trump will be charged with a crime over an alleged hush money payment to former porn star Stormy Daniels. The former US President posted about his arrest and kicked off a political and legal firestorm.

  The BBC's New York Correspondent Nada Tawfik explains what may happen now that the unprecedented has happened - a former president being arrested in a criminal case.
