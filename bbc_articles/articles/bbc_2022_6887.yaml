  However, he is facing continued questions, after one insider who attended lockdown events told the BBC's Panorama they felt like they had the prime minister's permission to socialise even it meant breaking the rules because "he was there".

  A long-anticipated report from senior civil servant Sue Gray into rule-breaking events in government buildings during the coronavirus lockdown is expected to be published soon.

  A government source has also told the BBC there will be a statement to Parliament and a press conference by the prime minister, once the report is published.

  Mr Johnson is also expected to address a meeting of his backbenchers at the 1922 Committee.
