title: Large rise in people living alone - Scotland census 2022 - BBC News
date: '2024-08-01'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c897zwwz29yo
content: |-
  There were 100,000 more single-person households than in the previous census a decade ago.

  Large rise in people living alone in Scotland - census

  The number of people living alone in Scotland has increased by more than 100,000 since 2011, according to new figures from the census, external. The latest release of data from the 2022 census shows there were 2,509,300 households in Scotland, up 5.8% on a decade earlier. The increase was mostly due to a 106,700 increase in single-person households - up 13.0%. Officials said the driving factor was the rise in the overall number of older people, who were more likely to live alone.

  The 2021 census in England and Wales showed a smaller percentage increase in single person households - up 5.9%. In Northern Ireland the rise was 19.5%.

  There's no surprise in finding that more people live alone but there is a growing challenge to society and government about the implications. The 13% rise in single-person households in Scotland is more than twice the English rate. It is higher in some rural areas, such as the Western Isles and Argyll and Bute, which have older populations - and it spreads to more urban areas with falling population, such as Inverclyde. Why? The census doesn't tell us. But one reason is probably the cost of housing. Where it is higher, in London and south-east England, there's more incentive to share. Some cultures have households with extended families, where older people live with other generations. But for those of all age groups, living alone can mean more likelihood of social isolation and mental health difficulties. Bills for heating and food are higher per person. The trend puts pressure on social care provision. It is also a spur to ensure more spaces for lone people to meet and socialise. There is little in the planning system to help with that. New homes tend to be for families, with an 'affordable' share for those on lower income. Housebuilders in the private, owner-occupier sector are doing less to meet this demographic demand, across age groups, for living alone with the social structures and infrastructure to be part of a community.

  Scotland's 2022 census showed that the population had grown by 144,400 since 2011, due to an increase in people born outside the country. Between 2011 and 2022 the number of people living in Scotland who had been born in the country went down by 90,400. This was offset by increases in the number who were born in the rest of the UK (up 49,200) and those born overseas (up 185,600).

  The census showed that just over half a million (554,900) people living in Scotland were born outside of the UK. The most common country of birth of people born outside the UK was Poland (75,400 people) followed by India (37,700) and then Pakistan (28,900). The countries in the top 10 that saw the biggest increase in people since 2011 were Poland (up 20,100), India (up 14,200) and Nigeria (up 11,800). The number of people in Scotland born in Italy more than doubled from 6,000 in 2011 to 14,500 in 2022.

  Other data in the census showed:
  • None About one in three people born overseas arrived in the UK aged between 20 and 29. This is likely due to people moving to Scotland to study or work.
  • None Almost half of people who were born overseas had been living in the UK for 10 or more years.
  • None There were 261,400 households containing lone parent families, down 6.8% since 2011
  • None There has been a gradual shift from marriage towards cohabiting.

  This is the fourth of seven reports on different topics from the census to be released. Future topics include housing, education and health and will be published in August and September.
