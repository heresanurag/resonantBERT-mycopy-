  A selection of your pictures of Scotland sent in between 4 and 11 December.

  Jen Scott's view from Beinn Mhor in Argyll. She said: "It was such a magical morning - everything was sparkling with frost, and as we climbed we saw the mist creep into the valley below where a herd of highland cows were grazing."
