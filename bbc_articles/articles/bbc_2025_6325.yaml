title: 'Jean Marsh: Upstairs Downstairs and Doctor Who actress dies at 90 - BBC News'
date: '2025-04-13'
section: Culture
url: http://www.bbc.co.uk/news/articles/c045dk29xqqo
content: |-
  The British star won an Emmy for her role in the Edwardian period TV drama she co-created in the 1970s.

  Upstairs Downstairs co-creator and actress Jean Marsh has died aged 90, her agent has confirmed. The British screen and stage star won an Emmy for her portrayal of hard-bitten but ultimately kind-hearted maid Rose Buck in the 1970s TV drama about the class system in Edwardian England. Marsh also had roles in Hollywood films including Cleopatra, Willow and Alfred Hitchcock's Frenzy and on TV in Doctor Who. In a statement, Marsh's friend the film director Sir Michael Lindsay-Hogg paid tribute to her as "wise and funny... very pretty and kind, and talented both as an actress and writer", adding she died "peacefully in bed looked after by one of her very loving carers".

  Marsh reprised her role of Rose Buck in the BBC's reimagined version of Upstairs Downstairs in 2010

  In his statement, Sir Michael described almost daily phone conversations with Marsh over the past 40 years. She was, he said, an "instinctively empathetic person who was loved by everyone who met her". Marsh came up with the idea of a period drama involving the servants of a wealthy family while house sitting in France with her friend, the actress Dame Eileen Atkins, she later told the New York Times. The pair went on to create the series, which told the story of the Bellamy family and their servant staff who lived underneath them, alongside John Hawkesworth and John Whitney. The ITV show was a critical and popular success and also found a fond audience in the United States, where it aired on PBS. Upstairs Downstairs is said to have partly inspired the Downton Abbey series and was later revived and reimagined by the BBC in 2010. Marsh became the only original cast member to return, portraying the same role in five episodes. Asked by the Daily Telegraph in 2010 why viewers appeared to be so interested in master-and-servant dramas, Marsh said: "We still seem to want it because if you rose out of your class, you knew you had done well. And we like it because the past is not as worrying as the news." She teamed up again with Dame Eileen Atkins in 1991 to co-create the BBC costume drama The House of Eliott. Her other notable TV credits included roles in The Twilight Zone and Grantchester. Her stage credits include plays by Shakespeare and George Bernard Shaw. But she was forced to scale back her acting commitments following a stroke in 2011. London-born Marsh was married for five years to actor Jon Pertwee, who later starred as Dr Who. In 2012, she was made an Officer of the British Empire (OBE) for services to drama.
