title: 'Kyle Walker: England and Manchester City defender says tough love of father
  made him elite football player - BBC Sport'
date: '2024-08-22'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c33n6ljy63zo
content: |-
  England and Manchester City defender Kyle Walker says the tough love of his father made him an elite player.

  England and Manchester City defender Kyle Walker says the tough love of his father helped him become an elite player. Walker has enjoyed a glittering career at City, winning the Premier League six times as well as two FA Cups, four EFL Cups and the Champions League. He has been capped 90 times by England and is widely regarded as one of the best right-backs in the world. Speaking on the You'll Never Beat Kyle Walker podcast the 34-year-old opened up on the influence his dad Michael has had on his career. Walker said his father "made me be the person and player that I am" and at the start of his career it was about "proving my dad wrong" after he criticised his performances as a youngster. "I used to hate going to football with him," said Walker, who has also played for Sheffield United and Tottenham - and had loan spells at QPR, Aston Villa and Northampton. "No matter if I played good or I played bad, I'd get in the car and I'd be reduced to tears. He'd say I wouldn't have done this right, I wouldn't have done that right. "He didn't do it because he wanted to hurt me. He did it because he cared."

