  One of the town's two elementary schools was totally destroyed by the Camp Fire.

  School officials have said children will be taught elsewhere in the county

  The town's Skyway road was the main route out for people urgently trying to escape the town as the fire closed in.

  Terrified evacuees have spoken of bumper-to-bumper traffic along its path

  After the fire, hundreds of vehicles were photographed abandoned

  Some of the vehicles were burned out completely
