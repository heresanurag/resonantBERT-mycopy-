id: bbc_2019_4473
title: 'Sri Lanka attacks: The street fighting back with peace - BBC News'
date: '2019-04-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-48061815
content: |-
  A small lane where families have been devastated by the Easter Sunday bombings is determined to keep the peace.

  Families in the multicultural neighbourhood of Katuwapitiya have suffered tremendous loss in the Easter Sunday bombings in Sri Lanka.

  Those living in one lane are determined to not let the tragedy pull apart their community.
