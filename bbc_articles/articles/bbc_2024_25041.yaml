title: British man dies after falling from Spanish bridge - BBC News
date: '2024-10-14'
section: Europe
url: http://www.bbc.co.uk/news/articles/c5yw4lwxdeqo
content: |-
  The unidentified 26-year-old man fell to his death while creating social media content, according to local authorities.

  A 26-year-old British man has died after falling from a bridge in Spain while creating social media content, according to local authorities. The man was scaling one of Spain's highest bridges on Sunday in the city of Talavera de la Reina, situated some 70 miles south-west of Madrid. He was accompanied by a 24-year-old man at the time he fell to his death. Neither man has been identified by the local authorities. The pair had "come to Talavera to climb the bridge and create content for social networks," according to city councillor Macarena Muñoz.

  Ms Muñoz said the case was "unfortunate and sad". She added it was "totally prohibited" to climb the bridge, describing it as something "which we have reiterated on many occasions cannot be done under any circumstances”. Spanning the River Tagus, the 192m (630ft) tall cable-stay bridge has long-drawn climbers and social media creators who scale it despite the ban, according to local media reports. A spokesperson for the Foreign Office said: “We are supporting the family of a British man who has died in Spain, and are in contact with the local authorities.”
