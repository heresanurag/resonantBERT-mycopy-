content: |-
  The BBC’s Gordon Corera investigates exactly how the Palestinian militant group was able to launch its surprise attack on Israel.

  Israel is still reeling from Saturday’s attack, when members of Palestinian militant group, Hamas - designated as a terrorist group by countries including the UK - infiltrated the country from Gaza.

  But how did they manage to carry out such a brazen operation? The BBC's security correspondent Gordon Corera looks at Hamas' own videos, to find out what it tells us about the shock attack.
