title: 'East London double acid attack: John Tomlin appears in court - BBC News'
date: '2017-07-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-40564772
content: |-
  Cousins Resham Khan and Jameel Muhktar suffered "life-changing" injuries in the attack in Beckton.

  Resham Khan has been left with damage to her left eye

  A man accused of throwing acid at a student and her cousin through their car window has appeared in court.

  Resham Khan and Jameel Muhktar, 37, had been celebrating Ms Khan's 21st birthday before the attack.

  Acid was thrown on them through their car window on 21 June while they were waiting at traffic lights in Beckton.

  John Tomlin, 25, appeared at Thames Magistrates' Court earlier charged with two counts of grievous bodily harm with intent.

  Jameel Muhktar was temporarily placed in an induced coma to treat his injuries

  He was remanded in custody and ordered to appear at Snaresbrook Crown Court on 8 August.

  Mr Tomlin, of Colman Road, Canning Town, was arrested on Sunday after handing himself in to police.

  Ms Khan, a student at Manchester Metropolitan University, and Mr Muhktar suffered severe burns to the face and body in the attack at 09:13 BST on Tollgate Road.

  The attacker then threw more of the acid at Mr Muhktar before fleeing the scene, police said.

