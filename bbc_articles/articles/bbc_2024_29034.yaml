title: Snowy Saturday as Storm Bert sweeps the UK - BBC News
date: '2024-11-24'
section: General
url: http://www.bbc.co.uk/news/videos/clyveml558zo
content: |-
  Parts of the UK are blanketed in snow, as the storm causes travel disruption and power cuts.

  Storm Bert is continuing to hit the UK with snow, heavy rain and strong winds, causing disruption on roads and railways, as well as power cuts.

  More than 100 flood warnings and alerts are in place across England, Scotland and Wales.
