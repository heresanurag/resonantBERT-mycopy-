content: |-
  First Minister Nicola Sturgeon confirms that non-essential shops, gyms and hospitality will be opened from 26 April.

  Easing 'could have gone further' if not for vaccine lag - Lib Dems

  Alex Cole-Hamilton from the Scottish Liberal Democrats says there are definitely "grounds for optimism" in Nicola Sturgeon's easing of some restrictions. It is "very welcome news" for places like Glasgow, which he points out went into a circuit-breaker lockdown in October, from which it has never emerged. Mr Cole-Hamilton believes the government could have gone further "if the vaccination programme had been up to scratch". Scotland is still lagging behind other parts of the UK because of the government's "mis-management", he maintains. Wales is already vaccinating people well into their 30s, he adds. He says: "I am 43 and I am still waiting for my blue envelope."
