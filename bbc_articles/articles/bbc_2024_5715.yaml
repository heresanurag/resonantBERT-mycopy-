  Foulds says Littler has "two different personas". "You've got the off-screen, off-stage one - he's quite shy and humble, just wants to talk with his mates, play a game, spends a lot of time on his phone like most teenagers," Foulds said. "But when he gets on the stage it's like something switches - he's in his element. He loves the arenas, the more fans the better. He seems to thrive with bigger crowds." "The phrase people are using is 'generational talent' and I think that's quite appropriate," added PDC chief Porter. "He's clearly done more than the majority of youth talents have done - not just in darts but in any sport. "He's opened up some doors to a new audience for us - darts was on an upward curve anyway but he's accelerated that growth." You can follow the PDC Premier League action every Thursday with BBC Sport's live text commentary.

