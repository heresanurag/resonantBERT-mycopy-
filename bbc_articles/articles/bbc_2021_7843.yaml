title: 'Hayes stabbing: Boy, 15, charged with Jalan Woods-Bell''s murder - BBC News'
date: '2021-06-12'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-57454285
content: |-
  Jalan Woods-Bell was stabbed multiple times outside a west London school on Friday.

  Jalan Woods-Bell was stabbed near to Global Academy in Hayes

  A 15-year-old boy has been charged with the murder of a teenager who was stabbed to death outside a west London school.

  Jalan Woods-Bell, 15, was knifed multiple times near Global Academy on Blyth Road, Hayes, at about 08:30 BST on Friday.

  He was treated by paramedics but died at the scene.

  The charged teenager appeared in custody at Willesden Magistrates' Court earlier, the Met said.

  A post-mortem examination is due to take place on Sunday, the force added.

  Officers had been called to Blyth Road, near to the academy which is a college for students aged 14-19, over reports of a fight.

  One teacher said the stabbing had been "traumatising"

  Tia Rek-Williams, 21, a teacher who lives nearby, said she did not see the initial stabbing but saw the boy lying on the ground being treated.

  "They were saying 'come on, you've just got 30 seconds, hold on, keep fighting' and as they were saying that I saw his hand drop and his eyes close. It was so traumatising," she said.

  She said about six people had tried to help the boy while neighbours came out of their houses and gathered in the road.

  Ch Supt Peter Gardner said the boy's family had been left "devastated".

  "As a parent of a teenage boy myself, I cannot imagine the pain the family is going through and I offer our full condolences and support," he added.

  Labour MP for Hayes and Harlington John McDonnell tweeted: "If anyone can assist the police with any information on this tragic incident, I urge them to come forward."

