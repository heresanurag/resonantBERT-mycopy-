  It comes as the reproduction number, or R value, of coronavirus transmission across the UK rises above 1.

  Former Tory minister criticises lack of debate on virus laws

  As we've reported, a number of Conservative backbenchers have been criticising the government's new coronavirus restrictions. Former minister Sir Christopher Chope is the latest to voice his concerns, telling the Commons earlier that MPs should have been able to debate the introduction of the "draconian" new measures. A new so-called "rule of six" is being introduced on Monday, limiting the number of people who can socialise together indoors or outdoors in England to six people. However, the statutory instrument needed to enact the rule change has yet to be laid before Parliament. Sir Christopher said he was "very concerned about the lack of opportunity for people, the public first of all, to see the text of these new regulations, and I'm also concerned about the continuing reluctance of the government to give any opportunities to members to debate this". He added: "What we are talking about is the most draconian introduction of new restrictions on our liberty, with criminal sanctions, and we need to be made aware of what's happening and given the opportunity of debating it." Responding, Commons Speaker Sir Lindsay Hoyle said "the country should also know what's going on".
