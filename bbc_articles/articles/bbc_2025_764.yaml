title: Private parking rules to change after 'five-minute fines', sector confirms
  - BBC News
date: '2025-02-12'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/cx2p57zdzw9o
content: |-
  It comes after Excel Parking dropped its £1,906 claim against a woman who took more than five minutes to pay.

  Rosey Hudson was taken to court after a private operator sent her 10 parking charge notices (PCNs) in a matter of days

  Private parking rules are set to change to ensure motorists are not unfairly penalised if they do not pay within five minutes. The sector's code of practice was reviewed after the BBC reported on the case of Rosey Hudson, who was taken to court by Excel Parking over a £1,906 claim after taking longer than five minutes to pay at a car park in Derby due to poor signal on her phone. Her case was eventually dropped, with other motorists raising similar concerns and seeing their claims discontinued. Now the updated rules, to be brought in from Monday by the Private Parking Scrutiny and Advice Panel (PPSAP), will ensure "motorists who face genuine difficulties in paying in a short timeframe are treated fairly".

  The British Parking Association (BPA) and the International Parking Community (IPC) previously announced it had set up the panel to review the code of practice, following coverage of Miss Hudson's case last year. The new code of practice will mean that drivers using private car parks, monitored by camera technology such as CCTV and automatic number plate recognition (ANPR), will have a "safeguard" in place if they experience delays making payments. Under the change, if motorists pay before they leave ANPR-managed pay on entry car parks, regardless of whether they pay within five minutes, they should not receive a penalty notice. However, it "remains essential" for drivers to read signage carefully and follow the rules of the specific car park. And the updated rules only apply to sites where technology supports this change, and does not apply to council car parks and private sites without camera monitoring.

  Will Hurley, from the International Parking Community, said the changes were the right thing to do

  IPC chief executive officer Will Hurley said: "We've put in place a panel that's reviewed this over the last month and we're making the change today because it is the right thing to do. "There's a safeguard now in those particular car parks where you go in and as long as you pay for parking, you won't receive a parking charge." Mr Hurley said people should not be charged for parking if a driver entered a car park, failed to find a space and then left. "It is crucial that there is a mechanism to identify and resolve issues quickly. I am pleased that the panel has acted swiftly to introduce safeguards for motorists," he added. Andrew Pester, chief executive of the BPA, added: "It is a real testament to the [panel] that this change has been implemented so efficiently. The parking sector is always striving to ensure it operates in the interest of compliant motorists and to ensure that parking is fairly managed for all."

  Simon Williams, head of policy at the RAC, said more change was needed

  But Simon Williams, head of policy at the RAC, said the changes were "smoke and mirrors" and did not go far enough. In 2019, an act of Parliament was passed to create a private parking code of practice but due to "resistance from the private parking industry", the code was withdrawn in 2022, he said. In it, Mr Williams said the code would have included a scrutiny board to have the power to cap PCNs at £50 - rather than the current £100 - and ban the use of debt recovery fees. "These letters land on your doorstep and put the fear of God into you," he said. "This is just not acceptable and totally disproportionate. "We're still desperately trying to get [the code] into action to clamp down on rogue operators to create a truly single appeals process. Both of the two accredited parking associations have one each with varying results. "It's a step in the right direction but we want them to get behind the government code and not a self-authored code, which is worded in their own interests as opposed to drivers' interests." A group of MPs previously called on the government to introduce its own statutory code of practice that private car park operators must follow, adding that the private industry cannot be trusted to regulate itself.

