  Miss Hudson is one of several people Excel Parking took to court over its five-minute payment rule. At the time, she said she was unable to pay while in the car park due to poor signal on her phone. She walked to where she could get connected and paid the full tariff every time she parked there, but was still repeatedly sent parking charge notices (PCNs). In December, Excel Parking dropped its case against her without explanation and did the same for Garry Kay, who parked at the same car park and was preparing to fight costs of £255. Meanwhile, last month a judge ordered the operator to pay a Peter Barton £19.50 in expenses after he took 19 minutes to pay because he could not find a suitable parking space. Miss Hudson, 31, told the BBC she was cautiously optimistic about the changes.

  Miss Hudson said she hoped the industry would make meaningful changes

  "I am pleased because my hope, in speaking out about my case, was that something would change," she said. "I wasn't doing it just for me. There are lots of people in the same situation as me who don't push back and pay these fines just to get the companies off their backs. "They are being treated very unfairly by private parking firms, paying fines that are not reasonable. "I hope the changes proposed are meaningful, and I do think it should be in all private car parks, not just some." The government said it would make an announcement on plans for a statutory parking code of practice "in due course". A Ministry of Housing, Communities and Local Government spokesperson said: "Motorists must be protected when using private car parks and we are determined to drive up standards in the industry. "We know how much of an issue this is for drivers, which is why we will set out further details on the private parking code of practice as soon as possible."

  A lot has happened in the two and a half months since the BBC spoke to Rosey Hudson. She originally contacted the BBC because she wanted to warn others about what was happening to her. She told us she was under a huge amount of stress as a result of legal proceedings by Excel Parking, and she didn't want others to go through the same. Hundreds of them contacted the BBC with their own stories of being issued with PCNs. The two trade associations for private car park operators also announced their intention to end the so-called five-minute payment rule, and set up a panel to oversee changes to the sector's own code of practice. This sounded promising but parking campaigners and some MPs remain sceptical. They believe the sector cannot regulate itself, adding the government needs to introduce a statutory code of practice. A government spokesperson told the BBC it will set out details on this "as soon as possible". Meanwhile, drivers are still being threatened with legal action as a result of Excel Parking's five-minute rule. Some are challenging the PCNs and winning when the cases are heard in court, but others are paying up due to fear, or to avoid the stress and hassle of legal proceedings. Excel Parking also remains insistent that Miss Hudson was in the wrong - despite its claim against her being discontinued.

