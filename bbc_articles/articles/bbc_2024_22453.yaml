  Raya has faced 57 penalties in his career, including shootouts, and only saved seven of them. But four of those saves were in the past eight kicks he has faced. He had conceded 19 in a row before that. In last season's Champions League last-16 win over Porto, he saved two spot-kicks in the shootout. "The first save is outstanding, low to his right," said Leon Osman on BBC Radio 5 Live commentary. "Once it has been saved the ball bounces to his left and David Raya gets up scrambling across. Retegui thinks he has a tap-in. "That moment will be what this game is remembered for, the double save from David Raya."

  Tuesday was the year anniversary of Raya, then on loan from Brentford, playing his first game for Arsenal. Aaron Ramsdale had been the undoubted number one the previous season and at the start of 2023-24 kept his place. But once Raya got the gloves on, Arsenal never looked back - and Ramsdale left for Southampton this summer. "He is so level headed that he has not changed one bit [throughout the situation]," said midfielder Declan Rice. "When Rammers came out of the team and David was starting he didn't change his mannerisms or the way he was." Raya has conceded 32 goals in 46 games for Arsenal - compared to the 99 Ramsdale let in in 89 games. Ramsdale did not save any of the 11 penalties he faced for the Gunners. Talking about Raya, Rice continued: "It is massive pressure. He was our number one last season, he is now fully our number one, there is no doubt or questions around that anymore. "That is three games this season where he has made crucial saves - he is doing everything right and is living away from the game the right way and that is showing on the pitch."
