content: |-
  Fulham announce the club record signing of Arsenal midfielder Emile Smith Rowe for an initial £27m fee.

  Emile Smith Rowe has made three appearances for England, scoring against San Marino in 2021

  Fulham have announced the club record signing of Arsenal midfielder Emile Smith Rowe for an initial £27m. While the Cottagers have not disclosed the total fee for the 24-year-old, it is understood the deal could rise to £34m with add-ons. Smith Rowe, who joined Arsenal as a 10-year-old, made his senior debut for the Gunners at the age of 18 and made 80 Premier League appearances for the club, scoring 12 times. He has three England caps, although his last came in March 2022. "I'm finally here, so I'm really happy for me and my family - it's a good moment," said Smith Rowe. "I'm really excited, I just wanted to get here as quickly as possible so I could get going with my team-mates. "Listening to the project, speaking to the manager [Marco Silva], and seeing what players we have here already, I think it's an exciting project for me, and definitely the perfect step for my career going forward."

  Fulham have also signed Ryan Sessegnon on a two-year deal after his contract expired at Tottenham and Cottagers vice-chairman Tony Khan said he was "thrilled" with the arrival of Smith Rowe. "We're very excited to sign such a talented young player, and we look forward to Emile joining the squad in Portugal as we continue to prepare for the new season ahead," said Khan. Fulham are also trying to sign Manchester United midfielder Scott McTominay, having made a second bid, believed to be worth £20m, for the 27-year-old Scotland international.

  Overall, Smith Rowe made 115 senior outings for Arsenal in all competitions, scoring 18 goals and assisting 13 times. He made his first-team bow for the Gunners in September 2018 when he became the first player born in the 2000s to debut for the club. "Emile's commitment, attitude and energy every day was first class, always stepping up when the team needed him," said Arsenal boss Mikel Arteta. "He came into the first team and was instrumental during a difficult moment for us. He created an important impression, with his strong performances making our supporters proud. "I'm sad that Emile is leaving us, but excited for him to take this new opportunity at this stage of his career, when he needs to be starting matches and playing regularly. "Emile is loved by everyone at the club and leaves us with our gratitude, absolute respect and best wishes. We all wish Emile and his family well at Fulham."
