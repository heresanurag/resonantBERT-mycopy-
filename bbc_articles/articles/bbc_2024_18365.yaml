title: Pyrenees search for retired doctor from St Albans called off - BBC News
date: '2024-08-12'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cjdkenpl0pgo
content: |-
  Rescuers in France have not been able to find retired St Albans doctor Tom Doherty.

  Search for hiker missing in the Pyrenees called off

  Tom Doherty, pictured with his wife Anne, has spent most of his time in France since retiring almost a decade ago

  The search for a retired doctor who fell while hiking in the Pyrenees has been called off. Tom Doherty, 67, from St Albans, Hertfordshire, was travelling and camping solo in the Lot-et-Garonne region of southern France. The prosecutor's office in Foix told Agence France Presse: "Search operations have been suspended. After five days, we haven't managed to find him." A spokesperson for the prosecutor's office added that an investigation into Mr Doherty's disappearance would continue.

  Tom Doherty (centre) was walking in the French Pyrenees when he fell on Tuesday, his family believes

  Mr Doherty sent his family a WhatsApp message at 19:07 BST last Tuesday telling them he had fallen and asking for help. It is not known how seriously Mr Doherty was injured. Sniffer dogs and helicopters were used in the search. His car was found near the Col d'Escots hiking trail in the Ariege region near Cirque de Gerac. Members of his family had flown out to join the search and rescue effort.

  This was one of the last photos Tom Doherty sent to his family from his hike through the Pyrenees

  Journalist Chris Bockman, who is in France, told BBC Three Counties Radio the manpower being used in the search had been reduced since Sunday. "There are several people missing in the Pyrenees right now this weekend," he said. "The mountains are very popular this time of year – a lot of tourists – so they've had to deal with several different cases at the same time." Mr Bockman said authorities believed Mr Doherty's "chances of survival are pretty remote now" due to his age, how long he has been missing and the high temperature.

