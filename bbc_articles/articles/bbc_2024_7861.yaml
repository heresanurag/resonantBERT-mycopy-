title: 'Merthyr Tydfil crash: Police manhunt after woman, 25, dies - BBC News'
date: '2024-04-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68825007
content: |-
  Police appealed for witnesses after a woman died following a single car crash on 5 April.

  Police are searching for a man after a 25-year-old woman, described as a "kind, gentle soul", died in a car crash.

  Demi Mabbitt from Aberfan was in a single car crash on Swansea Road, Merthyr Tydfil, at about 23:45 BST on 5 April.

  A manhunt for Cameron Jones, 29, from Merthyr Tydfil, is under way.

  A 30-year-old man and a 29-year-old woman were arrested on suspicion of helping Mr Jones evade the police.

  South Wales Police have also appealed for witnesses who saw the white Audi S3 travelling from Trago Mills towards the A465.

  Det Sgt Debbie Hobrough of South Wales Police said the force had been trying to locate Mr Jones since the crash.

  Cameron Jones has been described by police as a "dangerous individual"

  She said Mr Jones was "a dangerous individual" and advised the public to avoid him and contact the police.

  Ms Mabbitt's family said she was "a wonderful daughter, granddaughter, sister, auntie and cousin".

  "She was the most kind, gentle soul who would do anything to help anyone," they added.

  "She was the glue that held our family together and a fighter until the end, our beautiful girl was taken far too soon.

  "Our family are devastated, there are no words to describe the heartache and pain we are feeling."
