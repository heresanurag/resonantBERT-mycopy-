title: Car collision outside Ant McPartlin sentencing - BBC News
date: '2018-04-16'
section: General
url: http://www.bbc.co.uk/news/uk-43790415
content: |-
  Vehicles collide during a live BBC broadcast outside Ant McPartlin's drink driving sentencing.

  A collision has been caught on camera during a live BBC broadcast outside Ant McPartlin's drink driving sentencing.

  The TV presenter has been fined £86,000 and given a 20-month driving ban after pleading guilty to drink driving.
