content: |-
  Cian Healy is set to equal Brian O'Driscoll's Ireland cap record after being named on the bench for Friday's autumn international against Argentina.

  Five-time Six Nations winner Healy will move alongside Brian O'Driscoll on 133 Ireland caps if he is used off the bench on Friday

  Coverage: Commentary on BBC Radio 5 Sports Extra, BBC Sounds and BBC Radio Foyle; live text commentary on the BBC Sport website & app

  Cian Healy is set to equal Brian O'Driscoll's Ireland cap record after being named on the bench for Friday's autumn international against Argentina, while Sam Prendergast and Thomas Clarkson are set to make their debuts. The 37-year-old prop will draw level with the former Ireland captain on 133 appearances if he is introduced against the Pumas. Head coach Andy Farrell has opted against making wholesale changes following last week's defeat by New Zealand, with Robbie Henshaw's inclusion at inside centre ahead of Bundee Aki - who does not make the squad - the only alteration to the starting line-up. Prop Clarkson and fly-half Prendergast are primed to earn their first caps after being named among the replacements. Argentina named their team earlier on Wednesday with head coach Felipe Contepomi making three changes from last weekend's resounding win over Italy.

  Friday's 23-13 loss to the All Blacks was Ireland's third in the past five matches, but Farrell has given his players the chance to atone for a sub-par performance which included 21 handling errors and 13 penalties conceded. Fly-half Jack Crowley, who was withdrawn after 58 minutes, is retained alongside Jamison Gibson-Park in the half-backs ahead of the all-Leinster centre partnership of Henshaw and Garry Ringrose. While Crowley keeps the 10 jersey, Leinster's Prendergast, 21, will get a chance to impress at out-half after impressing in the recent Emerging Ireland series in South Africa. Ciaran Frawley, who replaced Crowley against the All Blacks, drops out. “For Tom and Sam, their promotion to the match day squad for the first time is testament to their form, talent and application over the last number of weeks and we congratulate them on their selection," said Farrell. Hugo Keenan, James Lowe and Mack Hansen form an unchanged back three. With Tadhg Furlong still injured, Finlay Bealham is again selected at tighthead prop alongside Andrew Porter and Ronan Kelleher, but Tom O'Toole's concussion has opened the door for 24-year-old Leinster forward Clarkson. Farrell has kept faith in his second and back rows, although Ryan Baird is preferred to Iain Henderson on the bench. Craig Casey replaces Munster team-mate Conor Murray as the scrum-half cover in another change to the replacements. Ireland have won their past three matches against Argentina with the Pumas' last victory the 2015 World Cup quarter-final in Cardiff.
