  Manchester City manager Pep Guardiola predicts fewer points will be required to win the Premier League this season - but do the stats back that up?

  'It's the reality' - will it take fewer points to win Premier League?

  Manchester City manager Pep Guardiola has predicted fewer points will be required to win the Premier League this season. But do the stats back that up? With Bournemouth ending the champions' 32-game unbeaten league run and last season's runners-up Arsenal losing at Newcastle, four of the competition's current top six failed to win over the weekend. Guardiola has won six league titles in eight years since taking charge at City and his teams have set an unprecedented standard for their rivals to match. But the Spaniard believes the physical demands on players caused by an increased number of games will mean those levels cannot be maintained. "It's the reality we are living now," said Guardiola, whose side will also contest an expanded 32-team Club World Cup following the conclusion of the European season next summer. "In the previous seasons we played a lot of games, but if we go to the World Cup and arrive in the last stages of that competition, we’re going to play almost 70 games. "It’s like NBA, but they have four months holiday and we have three weeks. "You have injuries for a long time which didn’t happen before. It’s normal, it’s going to happen. We have to handle it."

