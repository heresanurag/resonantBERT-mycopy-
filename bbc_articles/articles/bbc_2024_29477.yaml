  Global players' union Fifpro and a group representing 39 European leagues filed a legal complaint against Fifa over "abuse of dominance" relating to the number of games players are expected to participate in during a season. Manchester City midfielder Rodri, who has since suffered a season-ending knee injury, even claimed players are close to going on strike in protest. City were without key players such as John Stones, Ruben Dias and Kevin De Bruyne at the weekend, while defenders Manuel Akanji and Nathan Ake played despite not being fully fit. "We won a lot and people expect we’re going to win all the time," said Guardiola, whose side had not lost in the Premier League since 6 December 2023. "It’s the first game we’ve lost in the Premier League in 2024. We’re in November. It’s unbelievable."
