title: Brexit Secretary Stephen Barclay on Brexit no deal 'challenges' - BBC News
date: '2019-01-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46855919
content: |-
  Brexit Secretary Stephen Barclay was questioned by Andrew Marr on whether the government is prepared, if Theresa May's withdrawal plan isn't backed by MPs.

  The House of Commons is due to vote on PM Theresa May's Brexit withdrawal deal this week, a vote that the PM is widely expected to lose.

  The Brexit secretary, Stephen Barclay, was questioned by the BBC's Andrew Marr on whether or not there is any plan B and whether the government was prepared for no deal.
