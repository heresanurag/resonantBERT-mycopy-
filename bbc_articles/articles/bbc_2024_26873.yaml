  The term “October surprise” has been a fixture in American political lexicon for nearly 50 years. Campaigns dread the unexpected headline or crisis that pushes their candidates off message and changes the trajectory of a race. Even the smallest ripple in public opinion might deliver the White House in a year when the electoral margins in the swing states could be measured in only tens of thousands of votes. November’s balloting, says Mr Greenberg, is shaping up to be a nail-biter. “I don’t have any fingernails left,” he says. “I could totally imagine this election going either way with extremely significant consequences riding on that vote no matter where your loyalty is.”

