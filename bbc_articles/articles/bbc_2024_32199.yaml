title: Georgians risk serious injury and jail in fresh pro-EU protests - BBC News
date: '2024-12-04'
section: Europe
url: http://www.bbc.co.uk/news/articles/c33dv70kjkeo
content: |-
  More than 300 people have been arrested and police are accused of using unnecessary force on the streets.

  Georgians risk serious injury and jail in fresh pro-EU protests

  Avandtil Kuchava is one of a number of Georgian protesters to have suffered severe injuries

  More than 300 people have been arrested since mass protests erupted in Georgia six nights ago, and an increasing number of accounts have emerged alleging violent attacks by police. One man has told the BBC how he was repeatedly kicked in the head, even after he had been knocked unconscious. "When I opened my eyes a third time I couldn't feel my legs or hands - I couldn't even move my head," said Avandtil Kuchava, a 28-year-old businessman. Demonstrations have continued every night since last Thursday, after ruling party Georgian Dream said it was halting the country's bid to start talks on joining the EU. Prime Minister Irakli Kobakhidze has accused opposition politicians of orchestrating the violence, blaming them for the injuries.

  However, the force exercised by police has been described as torture and brutality by Georgia's human rights ombudsman, and it has drawn condemnation from United Nations rights chief Volker Türk, who said the use of "unnecessary or disproportionate force... is extremely worrying".

