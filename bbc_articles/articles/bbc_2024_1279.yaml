title: Man wakeboards through Berkshire flood water - BBC News
date: '2024-01-08'
section: General
url: http://www.bbc.co.uk/news/uk-67908513
content: |-
  River levels are still high in some parts of the country after recent heavy rainfall.

  A man in Cookham, Berkshire has been filmed wakeboarding through flood water after recent heavy rainfall caused river levels to rise.

  There have been 24 flood warnings and 30 flood alerts issued across the county.

  The Environment Agency says more than 1,800 properties across England have been flooded and that more rain is likely over the coming days.

  This video has no sound
