content: |-
  The biggest names in British TV walk up the red carpet for the ceremony in London.

  Cat Deeley and Ben Shephard took over as hosts of This Morning earlier this year after the departures of Phillip Schofield and Holly Willoughby. The show was up for the daytime award but lost out to The Chase.
