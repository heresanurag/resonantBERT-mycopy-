title: PSNI chief warns of dissident republican disorder during Easter - BBC News
date: '2023-04-07'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-65200990
content: |-
  Northern Ireland is marking 25 years since the Good Friday Agreement which ended decades of conflict.

  Chief Constable Simon Byrne made the comments during a meeting of the Policing Board in Belfast

  The police have warned of the potential of public disorder linked to dissident republicans over the Easter period.

  Chief Constable Simon Byrne has told a meeting of the Policing Board that the trouble could be an attempt to draw officers into gun or bomb attacks.

  MI5 recently raised Northern Ireland's terrorism threat level to severe, meaning an attack is highly likely.

  Events are being held to mark the 25th anniversary of the signing of the Good Friday Agreement in 1998.

  The deal ended 30 years of violent conflict in Northern Ireland, known as the Troubles, which cost the lives of more than 3,500 people.

  Mr Byrne said the PSNI had made temporary changes to shifts to put more officers onto frontline duties.

  In February senior detective John Caldwell suffered life-changing injuries when he was shot multiple times at a sports complex in Omagh, County Tyrone.

  Det Ch Insp John Caldwell was off duty when he was shot several times by two gunmen on 22 February

  Police believe the dissident republican group the New IRA was behind the attack on the off-duty officer.

  Speaking after the Policing Board meeting, Assistant Chief Constable Bobby Singleton said the PSNI had "very strong community intelligence" that attacks were being planned in Londonderry.

  He said officers had to "be prepared for that and we will be prepared for all eventualities on Monday".

  On Friday, the Democratic Unionist Party (DUP) leader Sir Jeffrey Donaldson denied any suggestion that the threat of dissident violence has increased because of the current political vacuum at Stormont.

  The DUP is refusing to return to power-sharing government in protest over post-Brexit trade rules.

  "The idea that evil men and women who go out to commit murder react to political circumstances alone simply doesn't stack up. Some of the chief constable's police officers have been murdered by these dissident republicans while Stormont has been sitting," Sir Jeffrey told BBC Radio Four's Today programme.

  "Of course we want to see Stormont fully functioning, but the idea that when we get Stormont back up and running, that dissident republicans will put their guns away, I didn't hear the chief constable suggest that," the DUP leader added.

  Sinn Féin's policing spokesperson Gerry Kelly told the programme dissident republican paramilitaries are "a small number of people intent on reversing the peace process, the political process and all of that for no good reason".

  Mr Kelly said the "vast majority of people across the north and across Ireland and elsewhere are absolutely against them, so they do not have any support base".

  The partner of journalist Lyra McKee, who was shot dead in Derry in April 2019, says threats of violence are sadly all too familiar

  The partner of Lyra McKee, Sara Canning, has said her "heart sinks" but she is not surprised when she hears of potential violence linked to dissident republicans over the Easter period.

  Ms McKee, who was 29, was shot dead while observing rioting in the Creggan estate in Derry on 18 April 2019.

  The New IRA has previously said its members were responsible.

  "I can't say I am surprised because it is what we are kind of used to - which is a sad state of affairs 25 years on from the Good Friday Agreement," Ms Canning said.

  "These people need to realise that their time is gone, the support for them is not there anymore.

  "The vast majority of people here are not interested in violence, we are not interested in going back to the past, we want to move forward and we want our kids to have a better life than we did."

  Ms Canning said many areas where these paramilitary groups thrive are where "people are at breaking point".

  She said a lack of community workers and a lack of funding for youth schemes in these areas is how these groups are finding "an ideal void in which to express their influence".

  Tanaiste (Irish deputy PM) Micheál Martin condemned the threat against police officers in Northern Ireland

  Speaking in Belfast later on Thursday, the Tanaiste (Irish deputy PM) Micheál Martin said the possibility of an attack on police represented "criminality in its worst form".

  "I think it's very evil people who are contemplating this," he said.

  Earlier Mr Byrne also said resources would be further challenged by the visit of US President Joe Biden next week in relation to the Good Friday Agreement anniversary, which actually falls on Monday.

  About 300 officers will be drafted in from other UK forces to help out.

  The cost of the security operation around the presidential visit, anniversary events and Easter has been put at £7m.

