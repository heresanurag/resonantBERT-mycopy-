  Eurovision runner-up Sam Ryder, from Maldon in Essex, also performed during the Queen section. He sang Somebody To Love - 30 years after George Michael sang it at the old Wembley for the 1992 Freddie Mercury tribute concert.

  Ryder praised the audience for their participation - writing "when the crowd understands the assignment" on an Instagram post.

  "What a beautiful and moving celebration of such a wonderful human. Thank you for everything, Taylor," he wrote, ahead of announcing the release date for his debut album.

