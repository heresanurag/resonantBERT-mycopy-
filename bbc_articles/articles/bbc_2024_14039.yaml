title: Lib Dem leader Sir Ed Davey fined for speeding - BBC News
date: '2024-06-05'
section: Politics
url: http://www.bbc.co.uk/news/articles/c4nn23kz2meo
content: |-
  Sir Ed Davey paid a fine after being caught doing 73mph in a 60mph zone on the M1 motorway.

  Liberal Democrat leader Sir Ed Davey has been fined for speeding after being caught doing 73mph in a 60mph zone on the M1 motorway. Sir Ed was caught by a speed camera near Caddington, in Bedfordshire. He admitted being behind the wheel when contacted by police in March but forgot to give details of his driving licence when he attempted to pay the Fixed Penalty Notice. This resulted in a further fine, as well as three points on his licence. Speaking on a visit to Romsey, Hampshire, he said he was sorry adding: "It was on the M1... there was a temporary speed limit... I missed it and I apologised and I paid the fine."

  In a letter to the court, he said failing to provide his licence details had been a "genuine oversight". "The only mitigation for failing to provide my licence details was just being super-busy and failing to read the form fully, having already accepted liability and made arrangements for the payment. "Again, I apologise for that. I would like to add that I am the primary driver in a family of four, with two people who have serious mobility issues. "My son has a lifelong undiagnosed disability which means he cannot walk - we use a Motability vehicle for him. "My wife has MS, and walks very slowly with a stick, though she can drive as necessary. Thank you for any mitigation you feel able to show in my case." He was handed a £72 fine at Luton Magistrates' Court, with a £28 victim surcharge, and had three points added to his licence, court staff confirmed. He was not asked to pay prosecution costs. He did not have to appear in court. A Lib Dem spokesman said: "Ed inadvertently broke the speed limit on the M1, which he is sorry for. "He has paid the fine and accepted the points on his licence." The Lib Dem leader has since swapped the Ford B-Max he was caught speeding in for his party's yellow general election battle bus, as he tours the country meeting voters and staging stunts for the cameras.
