title: Footballer in court charged with murdering player at York Station - BBC News
date: '2024-12-21'
section: England
url: http://www.bbc.co.uk/news/articles/crl323xkl0no
content: |-
  Mckenzie Dicicco, 22, is charged with murder and affray following the death of James Hitchcock.

  James Hitchcock was on a night out when he was assaulted at York Station

  A footballer has appeared in court accused of murdering another non-League player in an altercation at York Station. James Hitchcock, from Cottingham in East Yorkshire, played for Barton Town FC and was seriously injured on 15 December, after he had been on a night out in York. He died in hospital on Wednesday. Mckenzie Dicicco, 22, of Belgravia Gardens, Middlesbrough, who has played at Thornaby, Northallerton and Pickering football clubs, appeared at Leeds Crown Court earlier charged with murder and affray. He was further remanded in custody until his next hearing on 5 February, and a provisional trial date was set for July.

  Police were called to reports of an assault at the station on Sunday evening

  Barton Town FC has paid tribute to Mr Hitchcock, saying he was a "popular but quiet" member of the first team. The goalkeeper had previously played for Bridlington Town and Scarborough Athletic and leaves a wife and young son. All Barton Town FC games have been cancelled this weekend as a mark of respect, the club added. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
