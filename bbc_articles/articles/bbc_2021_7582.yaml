title: 'Belarus: A climate of fear for opposition activists - BBC News'
date: '2021-06-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-57309939
content: |-
  The BBC speaks to some of those whose lives have been changed forever by the protests in Belarus.

  When the Belarusian president, Alexander Lukashenko, ordered a Ryanair flight to divert to Minsk and arrested a wanted dissident who was on board, opposition activists inside the country were shocked and scared.

  The mass street protests that began last summer have been crushed, with fear driving people off the streets.

  But the authorities are still rounding up anyone linked to the opposition movement and hundreds of people are now behind bars.

  Sarah Rainsford and Matthew Goddard have just returned from Minsk where they’ve been speaking to some of those whose lives have been changed for good by the protests.
