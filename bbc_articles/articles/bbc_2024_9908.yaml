  Footage from a doorbell camera is released, showing police officers Tasering and detaining a man in Hainault, London.

  Footage from a doorbell camera has been released, showing police officers tasering and detaining a man suspecting of stabbing people with a sword in Hainault, east London.

  A 14-year-old boy died after being stabbed following an attack on members of the public and two police officers.
