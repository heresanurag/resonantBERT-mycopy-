title: US brings Kilmar Ábrego García, mistakenly deported to El Salvador, back to
  face charges - BBC News
date: '2025-06-06'
section: World
url: http://www.bbc.co.uk/news/articles/c7v7ynv98r8o
content: |-
  Salvadoran Kilmar Ábrego García, whose case became a political flashpoint, has been charged with human trafficking by US officials.

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: Kilmar Abrego Garcia back in US, says attorney general

  Kilmar Ábrego García, a 29-year-old from El Salvador mistakenly deported in March, has been returned to the US to face prosecution on two federal criminal charges. He has been accused of participating in a trafficking conspiracy over several years to move undocumented migrants from Texas to other parts of the country. El Salvador agreed to release Mr Ábrego García after the US presented it with an arrest warrant, US Attorney General Pam Bondi said on Friday. His lawyer called the charges "preposterous". The White House had been resisting a US Supreme Court order from April to "facilitate" his return after he was sent to a jail in El Salvador alongside more than 250 other deportees.

  In a two-count grand jury indictment, filed in a Tennessee court last month and unsealed on Friday, Mr Ábrego García was charged with one count of conspiracy to transport aliens and a second count of unlawful transportation of undocumented aliens. Bondi said the grand jury had found that Mr Ábrego García had played a "significant role" in an alien smuggling ring, bringing in thousands of illegal immigrants to the US.

  To play this video you need to enable JavaScript in your browser. This video can not be played "He’s getting paid to haul these people" - 2022 traffic stop of Kilmar Ábrego García

  The charges, which date back to 2016, allege he transported undocumented individuals between Texas and Maryland and other states more than 100 times. The indictment also alleges he transported members of MS-13, designated a foreign terrorist organisation by the US. The Trump administration had previously alleged Mr Ábrego García was a member of the transnational Salvadorian gang, which he has denied. Bondi also accused Mr Ábrego García of trafficking weapons and narcotics into the US for the gang, though he was not charged with any related offences. He appeared in court for an initial hearing on Friday in Nashville, Tennessee. An arraignment hearing is scheduled 13 June, where US Magistrate Judge Barbara Holmes will determine if there are grounds to keep him detained ahead of his trial. For now, Mr Ábrego García remains in federal custody. Mr Ábrego García's lawyers have previously argued that he had never been convicted of any criminal offence, including gang membership, in the US or in El Salvador.

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: Abrego Garcia’s family trying to contact with him, lawyer tells BBC

  Simon Sandoval Moshenberg, one of his attorneys, called the events an "abuse of power" at a news conference on Friday. "The government disappeared Kilmar to a foreign prison in violation of a court order," Mr Moshenberg said. "Now, after months of delay and secrecy, they're bringing him back, not to correct their error but to prosecute him." He added: "This is an abuse of power, not justice. The government should give him a full and fair trial in front of the same immigration judge who heard the case in 2019." US President Donald Trump called Mr Ábrego García a "bad guy" while speaking to reporters on Friday, and said the US Department of Justice had made the right decision to return him to face trial. Mr Ábrego García entered the US illegally as a teenager from El Salvador. In 2019, he was arrested with three other men in Maryland and detained by federal immigration authorities. But an immigration judge granted him protection from deportation on the grounds that he might be at risk of persecution from local gangs in his home country.
