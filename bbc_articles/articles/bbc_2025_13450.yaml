  • None What we know about Kilmar Abrego Garcia and MS-13 allegations On 15 March, he was deported amid an immigration crackdown by the Trump administration, after it invoked the Alien Enemies Act, a wartime law that allows presidents to detain or deport the natives and citizens of an enemy country. Mr Ábrego García was taken to the Cecot mega-prison in El Salvador, known for its brutal conditions. While government lawyers initially said he was taken there as a result of "administrative error", the Trump administration refused to order his return. Whether or not the government had to "facilitate" his return to his home in the US state of Maryland became the subject of a weeks-long legal and political battle. After Maryland Senator Chris Van Hollen demanded to see Mr Ábrego García in El Salvador, he was released to a different prison in that country. Van Hollen reiterated on Friday that "this is not about the man, it's about his constitutional rights - and the rights of all". "The administration will now have to make its case in the court of law, as it should have all along." El Salvadoran President Nayib Bukele, a close ally of Trump, wrote on social media on Friday that if the administration "request the return of a gang member to face charges, of course we wouldn't refuse". At Mr Ábrego García's court appearance in Tennessee next Friday, the US will request he be held in pretrial custody "because he poses a danger to the community and a serious risk of flight", according to the detention motion.
