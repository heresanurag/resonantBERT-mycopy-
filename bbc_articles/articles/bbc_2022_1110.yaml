id: bbc_2022_1110
title: Biden accuses Trump of creating a web of lies - BBC News
date: '2022-01-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-59898183
content: |-
  The US president says Donald Trump has a bruised ego and cannot accept that he lost the election.

  The US President Joe Biden has said that Donald Trump has a bruised ego and cannot accept that he lost the election.

  He was speaking a year after rioters stormed the US Capitol building.
