  Rebel fighters and members of the public have gathered in Damascus to celebrate the end of President Assad's regime.

  Rebel fighters and members of the public have gathered in the Syrian capital Damascus to celebrate the end of President Bashar Al-Assad's regime.

  The BBC's Lina Sinjab was drowned out by the sounds of celebratory gunfire as she reported from the scene.
