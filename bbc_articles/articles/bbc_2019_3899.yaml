title: Avengers directors issue 'no spoilers' plea after footage leaks - BBC News
date: '2019-04-17'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47913531
content: |-
  Anthony and Joe Russo beg fans not to reveal plot details after footage from Avengers: Endgame leaks.

  The directors of the latest Avengers film have pleaded with fans not to reveal plot details after some footage and images reportedly leaked online.

  "Please don't spoil it for others, the same way you wouldn't want it spoiled for you," wrote siblings Anthony and Joe Russo in an open letter.

  The leaked footage appeared on social media this week before being removed.

  Avengers: Endgame, a follow-up to last year's Avengers: Infinity War, opens in the UK on 25 April.

