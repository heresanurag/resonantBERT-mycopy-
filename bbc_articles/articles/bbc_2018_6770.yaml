title: 'In pictures: Not-so-pretty pooches vie for ugly dog crown - BBC News'
date: '2018-06-25'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-44595995
content: |-
  Fourteen odd-looking canines put their best face forward in a bid to win the World's Ugliest Dog title.

  Zsa Zsa has an underbite and a tongue that almost touches the floor - but these are qualities that won over judges at The World's Ugliest Dog Competition in Petaluma, California on 23 June. The nine-year-old English bulldog walked away with the 2018 title.
