title: Man sees crash that kills wife and step-children in Devon - BBC News
date: '2017-08-01'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-40778903
content: |-
  The carriageway was closed in both directions to allow the air ambulance to land

  A woman and her two young children have died in a crash witnessed by her husband.

  The woman's car collided with an oncoming lorry on the A361 near Barnstaple in Devon at 08:25 BST.

  The woman's husband was travelling in a separate vehicle and saw the crash unfolding behind him.

  The family is believed to have been on holiday in Devon from the Milton Keynes area. The road has now reopened.

  Insp Richard McLellan said: "It would seem that a car travelling towards Barnstaple, for unknown reasons at the moment, has crossed the centre white line and hit an oncoming truck.

  "Unfortunately the family were travelling in two separate cars but travelling together along this road so dad was there at the scene as well."

  A woman and her two children died in the crash

  Three ambulances, five rapid response vehicles and the air ambulance attended the scene near Barnstaple.

  Devon and Cornwall Police said two children and a woman, believed to be their mother, had died as a result of the crash.

  The children's stepfather was travelling in a vehicle in front and saw the crash happen.

  An investigation is under way and police have asked for witnesses to come forward.

  A woman and two children are in hospital after a crash on the same stretch of the North Devon Link Road on Sunday.

