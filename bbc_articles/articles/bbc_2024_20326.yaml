content: |-
  England defender Kieran Trippier announces his retirement from international football.

  Kieran Trippier featured out of position as a left-back during Euro 2024

  England defender Kieran Trippier has announced his retirement from international football. The 33-year-old was capped 54 times with his only goal coming against Croatia in the 2018 World Cup semi-final defeat in Moscow. The Newcastle right-back, who made his debut in 2017 under former manager Gareth Southgate, captained England three times. "I never thought as a young lad from Bury that I would play for my country let alone achieve 54 caps," Trippier posted on social media. "It's been one of the biggest honours of my life to represent my country at four major tournaments. "I want to say a big thank you to Gareth and all the staff that have worked with the England squad for the trust they have placed in me throughout the years."
  • None White not expected to be in Carsley's England squad

  Trippier was a mainstay under Southgate and started England's first six matches at Euro 2024 but was dropped for the final in favour of Luke Shaw. He also started the Euro 2020 final defeat by Italy, and featured as a regular starter at the 2018 World Cup in Russia. England interim coach Lee Carsley names his first squad at 14:00 BST for Nations League matches against the Republic of Ireland and Finland in September. "Thank you to all my team-mates - we have had some very special moments reaching two Euro finals, and a World Cup semi final and I am sure in the future this group of players will win a major tournament," he added. "I want to wish Lee, the coaching staff and the team all the best for the future. "And finally a big thank you to all the England fans for your incredible support travelling all over the world to support us and keeping us going in the difficult moments."
