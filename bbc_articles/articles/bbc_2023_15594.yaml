content: |-
  Israel's prime minister says the decision on when to launch an invasion will be taken by the country's war cabinet.

  No clues as to timing of ground invasion in Israeli PM's speech

  Israel’s prime minister has said that preparations for a ground invasion of Gaza continue and that questions about what went wrong on 7 October will be answered by everyone, including himself, but only when the war is over. In a prime time television address this evening, Netanyahu offered no clues as to the timing of a ground invasion. But amid reports of divisions between the government and the military over how to proceed, he said the timing of a ground invasion had been agreed unanimously by the government and the chief of staff of the military. Once again, Netanyahu urged Palestinians in the Gaza Strip to move south. He said his government had two objectives: to destroy Hamas, politically and militarily, and to secure the return of hostages. At a time when he is being heavily criticised for an apparent lack of decisiveness, and for not meeting survivors of the 7 October, or attending any funerals, Netanyahu said the state would look after those who had lost their homes. The kibbutzim, he said, would rise from the ashes. What had been billed as a major prime time address did not deliver anything substantially new.
