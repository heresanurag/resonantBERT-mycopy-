title: 'Newport Pagnell: Nine-hour search as boy vanishes from M1 services - BBC News'
date: '2020-01-19'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-51159317
content: |-
  The six-year-old, who was on a school trip, was found in roadworks just off the M1 in the early hours.

  More than 1,000 people joined police to search through the night for a six-year-old boy who vanished from an M1 service station while on a school trip.

  Aadil Umair Rahim was found near roadworks just off the northbound carriageway at about 04:15 - nine hours after he went missing at Newport Pagnell services.

  His father said he was "thankful to everyone" who searched "tirelessly".

  He said he was still "kind of in shock and panic", adding: "he's safe now".

  The school coach had stopped at the services near Milton Keynes for a break as the pupils travelled back to Nottingham after a trip to London.

  He was initially believed to be hiding but was not found for nine hours

  A police helicopter was deployed to find the boy on Friday night, aided by officers on the ground, fire service staff and members of the public.

  Search teams initially thought he could be hiding in the service station but grew concerned as the hours went by and the weather got colder.

  Temperatures fell to 1°C before he was found close to a footbridge near Newbolt Close in an area which police said "houses the matrix system".

  He was found about half a mile from the service station where he went missing

  His father Umair Rahim said he was "in shock" but relieved he was safe.

  He added on Facebook: "My son has arrived and he is safe now. Thanks for the prayers. Shukar to Allah.

  "Thank you to Thames Valley Police helicopter services fire department, and safe and rescue department who worked tirelessly for 9 hours and found him safe.

  "There was more than a 1,000 people looking for him I'm thankful to everyone."

  Supt Amy Clements, said: "This was a very difficult operation involving a very young boy and we are relieved to say that Aadil has been found safe and well.

  "I'd like to take this opportunity to thank the local community, who immediately offered help in trying to find Aadil."

  The six-year-old went missing from Newport Pagnell services, near Milton Keynes

