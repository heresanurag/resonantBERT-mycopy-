  The reality TV star tells the BBC why she plans to donate any eggs she doesn't use.

  Reality TV star Vicky Pattison had some of her eggs frozen last year.

  She told BBC correspondent Anna Collinson that she plans to donate any she doesn’t use, to help couples who are struggling to conceive naturally.

  UK viewers can watch Egg Freezing and Me on BBC iPlayer now.
