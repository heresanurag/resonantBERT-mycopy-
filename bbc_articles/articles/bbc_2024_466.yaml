title: 'Bafta 2024: Nominations for best film announced - BBC News'
date: '2024-01-19'
section: General
url: http://www.bbc.co.uk/news/uk-68023167
content: |-
  Barbie was the top grossing film of 2023 and received great reviews, but missed out on a best film nomination.

  The nominations for best film at the Bafta 2024 awards have been announced, ahead of the ceremony on 18 February.

  Oppenheimer is one of the nominations for best film, as well as being nominated for 12 other awards.

  Barbie failed to receive a nomination for best film, despite going head-to-head at the box office and becoming the top grossing film of 2023.
