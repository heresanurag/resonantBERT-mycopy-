id: bbc_2020_2102
title: Patient plays violin during her brain surgery - BBC News
date: '2020-02-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-51557044
content: |-
  Professional musician Dagmar Turner was diagnosed with a large brain tumour in 2013.

  A patient at King's College Hospital in London played the violin while surgeons operated on her brain to remove a tumour.

  Dagmar Turner, 53, played the violin so surgeons could ensure parts of the brain which control hand movements and coordination were not damaged during the millimetre-precise procedure.

  Ms Turner, from the Isle of Wight, was diagnosed with a brain tumour after suffering a seizure in 2013.

  She was concerned over losing the ability to play the violin.

  Her tumour was located in the right frontal lobe of her brain, close to an area that controls the fine movement of her left hand.
