title: 'Costco oil attack: Arrest after ten injured with homemade spray - BBC News'
date: '2025-02-18'
section: England
url: http://www.bbc.co.uk/news/articles/cd0j0p991mlo
content: |-
  A boy is arrested on suspicion of attempting to cause grievous bodily harm and remains in custody.

  A teenage boy has been arrested after members of the public were sprayed with a chilli oil mixture at a Costco. Emergency services were called to the superstore in Avonmouth, Bristol, shortly after 18:30 GMT on Monday. The store was evacuated while the incident was investigated. Avon and Somerset Police said 10 people - including the boy - were complaining of stinging or itchy eyes and skin, but "responded well to treatment" at the scene. The boy was arrested on suspicion of attempting to cause grievous bodily harm and administering a noxious substance and remains in police custody.

  Avon Fire and Rescue Service attended the scene and tested the substance, which they say was "found to be unharmful". The liquid is believed to be a type of home-made chilli spray with no strong acid or alkaline ingredients, police added. Police left the scene at about 21:00. The force has appealed for anyone who witnessed the incident to contact them on 101.
