title: 'Evian Championship: Stephanie Kyriacou takes one-shot lead into final round
  - BBC Sport'
date: '2024-07-13'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/cw0y1zw2djgo
content: |-
  Australia's Stephanie Kyriacou heads into the final round of the Evian Championship with a one-shot lead.

  Kyriacou, chasing her first major title, hit seven birdies in the third round, including on the 18th, in a four-under-par 67 to lead on 14 under.

  Japan's Akaya Furue began the day with a two-shot lead but now sits in a two-way tie for second with American Lauren Coughlin.

  Scotland's Gemma Dryburgh, who shared the lead after round one, remains at seven under after a second consecutive level par round. She is one ahead of England's Georgia Hall, who battled back from dropping three shots in her opening five holes to also shoot a 71.

  Friday's play at Evian Resort Golf Club was suspended because of dangerous weather conditions and Kyriacou had to complete the final two holes of her second round on Saturday morning before starting round three.

  "Coming down the stretch here, I know it's Saturday, but you still get nervous," she said.

  "So my caddie kind of just keeps my head screwed on and just said I'm still playing golf. It's the same as playing a practice round, the same as yesterday. So just trying to keep that perspective."
