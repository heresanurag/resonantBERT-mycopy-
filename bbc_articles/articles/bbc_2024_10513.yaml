title: Timelapse videos capture Baltimore bridge wreckage removal - BBC News
date: '2024-05-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69041447
content: |-
  Footage recorded over weeks depicts the massive clearing effort and the moment cargo ship Dali was moved.

  Timelapse footage taken over a month by the US Army Corps of Engineers depicts how bridge debris was cleared.

  On Monday, the cargo ship Dali was moved from the site of the crash, nearly two months after it hit the Francis Scott Key Bridge on 26 March.
