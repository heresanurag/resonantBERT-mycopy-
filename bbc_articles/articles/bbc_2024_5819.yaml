content: |-
  BBC Verify examines video taken by those caught up in the attack on the Crocus City Hall theatre outside Moscow.

  An attack by gunmen in a packed concert venue on the outskirts of Moscow has left dozens dead and more than a hundred wounded.

  BBC Verify’s Merlyn Thomas has been examining dramatic videos taken by those in and around the hall.

  Read more: Gunmen kill 115 at Crocus City Hall in Moscow attack
