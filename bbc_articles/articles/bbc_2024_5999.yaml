id: bbc_2024_5999
title: Audio captures Baltimore dispatchers' response to bridge collapse - BBC News
date: '2024-03-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68678214
content: |-
  A recording of emergency communications reveals the tense moments before the Baltimore bridge collapsed.

  The Francis Scott Key Bridge in the US city of Baltimore collapsed early on Tuesday morning after it was hit by a container ship.

  Audio recording of a call between officers from the Maryland Transport Authority Police Dispatch and Response captures the tense moments just before -and right after - the tragic collapse.
