title: Maryland Sen Van Hollen meets Kilmar Ábrego García in El Salvador - BBC News
date: '2025-04-18'
section: World
url: http://www.bbc.co.uk/news/articles/cd6j7jjpgy6o
content: |-
  But Salvadoran President Bukele says Kilmar Ábrego García - who is at the centre of a US court battle - will stay in custody.

  Van Hollen (right) posted a photo of his meeting with Kilmar Ábrego García

  A US senator has met a man who Trump administration officials have acknowledged was deported in error from Maryland to a mega-prison in El Salvador. Maryland Senator Chris Van Hollen posted photos with Kilmar Ábrego García, as the administration continues to resist his return to the US despite yet another court ruling against the government on Thursday. After the meeting, which appeared to take place in a hotel, El Salvador's President Nayib Bukele said the detainee would remain in the country's custody. The White House has accused Mr Ábrego García of being a member of the transnational Salvadoran gang MS-13, a designated foreign terrorist organisation, which his lawyer denies.

  In a post on his social media site Truth Social the morning after the meeting, Trump said Van Hollen "looked like a fool yesterday standing in El Salvador begging for attention from the Fake News Media, or anyone". The visit came amid an escalating showdown between the US president and the courts over the case. A federal court on Thursday ruled against the Trump administration in a case that could force officials to testify under oath about the deportation. In a scathing judgement, the 4th Circuit Court of Appeals called the administration's handling of the situation "shocking". "The government is asserting a right to stash away residents of this country in foreign prisons without the semblance of due process that is the foundation of our constitutional order," wrote conservative Judge Harvie Wilkinson III, one of three judges on the panel. The government "claims in essence that because it has rid itself of custody that there is nothing that can be done", Judge Wilkinson wrote. "This should be shocking not only to judges, but to the intuitive sense of liberty that Americans far removed from courthouses still hold dear." Why, the judge wrote, should the government "not make what was wrong, right?" Mr Ábrego García's lawyers are suing the US government for sending him to a mega-prison in El Salvador in March, in what the Trump administration has admitted was an error.
  • None What next in legal fight over El Salvador deportations? The Supreme Court has ordered the US government to "facilitate" his return. Photos shared by Van Hollen and Mr Bukele are the first sight of the Maryland resident since his deportation. "I said my main goal of this trip was to meet with Kilmar. Tonight I had that chance," the Democratic senator posted on social media. "I have called his wife, Jennifer, to pass along his message of love. I look forward to providing a full update upon my return."

