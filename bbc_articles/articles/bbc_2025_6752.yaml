  Trump administration officials have conceded the deportation was an "administrative error" although the White House insists there was no mistake. The Republican president's allies have argued the deportation is making good on his campaign promise to keep Americans safe. They have cited a restraining order filed by Mr Ábrego García's wife on 5 May 2021, in which she alleged four instances of domestic violence against her by him. Ms Vasquez Sura told Newsweek on Wednesday that she and her husband had worked through their difficulties, including by counselling. White House Press Secretary Karoline Leavitt told reporters at a briefing on Wednesday: "He [Mr Ábrego García] will never live in the United States of America." She was joined by the mother of a Maryland woman, Rachel Morin, who was murdered in August 2023 by an alleged fugitive from El Salvador, in a separate case.

