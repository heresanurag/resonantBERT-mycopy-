title: Ben Stokes considered as England white-ball captain, says Rob Key - BBC Sport
date: '2025-03-06'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cjw267p2v0xo
content: |-
  Brendon McCullum and Ben Stokes took over England's Test side in 2022

  England would be "stupid" not to consider Ben Stokes as a white-ball captain, says director of men's cricket Rob Key. England are looking for new leaders of the one-day and T20 sides after Jos Buttler resigned following their early exit at the Champions Trophy. Stokes, 33, has been Test captain since 2022 but has not played white-ball cricket for England since the 2023 50-over World Cup. "Nothing is off the table," said Key. "You look at every single option and think, 'What is the best thing to do?' "Ben Stokes is one of the best captains I've ever seen. It would be stupid not to look at him. It's just the knock-on effect of what that means." All-rounder Stokes is currently recovering from a hamstring operation and has been training with a group of England Lions players in Abu Dhabi. Key said Stokes is "flying" and "on track to start the summer in a full role, bowling and batting". On Saturday, in the aftermath of England's defeat against South Africa in their final match at the Champions Trophy, head coach Brendon McCullum did not rule out having different captains in each of the three formats.

  On Thursday at Lord's, Key said England will not rush the decision and have "plenty of options", but he sees a greater alignment between Test and 50-over cricket, when compared to the T20 format. It could be a possibility that Stokes combines the 50-over leadership with the Test side, working alongside a different T20 captain. "I believe that Test cricket and 50-over cricket are probably closer than T20s, which is the outlier now," said Key. Key also mentioned current white-ball vice-captain Harry Brook and limited-overs specialists Phil Salt and Liam Livingstone, who have both led England in the past year. If Stokes or Brook take a white-ball leadership role, their workload would come into consideration, particularly in a year when England face marquee Test series at home to India and away to Australia. A home white-ball series against West Indies begins only four days after a one-off Test against Zimbabwe in May, while the summer ends with limited-overs matches against South Africa and Ireland. England play a white-ball series in New Zealand prior to the Ashes, which is then followed by a T20 World Cup in India and Sri Lanka early next year. Stokes was man of the match when England won the 50-over World Cup in 2019 and played a major role when they were crowned T20 world champions in 2022. He retired from 50-over cricket in the summer of 2022 and reversed the decision to play in the 2023 World Cup. "We've got to get the most out of our best players," said Key. "We want them playing for England. "That's important and that's going to take some work because you're also throwing franchise cricket into that. "But I believe our players are committed to playing for England as much as they can."

  Key said he expects pace bowler Brydon Carse to be fit for the start of the summer after a foot injury cut short his Champions Trophy and ruled him out of the Indian Premier League. Mark Wood will see a specialist this week about a knee injury picked up at the Champions Trophy. England's performance in Pakistan was their third successive disappointing global white-ball event. They suffered narrowed defeats by Australia and Afghanistan, then were hammered by South Africa. Key admitted England were "very poor" and said they could have chosen a different bowling attack after coming under fire for being too reliant on high pace. But the former Kent and England player pointed towards the performance of the batting, which he said has "fallen off a cliff". He rejected allegations England do not train enough, though did concede some of their statements in the media "do not help" the public perception of the team. "There's no doubt that we've got to get better," said Key. "When we're doing interviews, when players are doing their post-match press conferences, whatever it is, we speak a lot of rubbish a lot of the time. "They're trying so hard not to upset players in the dressing room, not try and give away something that they don't think they should. "Then they end up creating headlines for that, but I don't kill people for really the things they say."
