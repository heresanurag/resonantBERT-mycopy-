title: 'Pokémon leak: Hack confirmed by developer Game Freak - BBC News'
date: '2024-10-14'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c8702z0931do
content: |-
  The makers of the hit video game series confirm their servers were accessed by hackers over summer.

  Pokémon maker confirms it was victim of hack

  Pokémon is one of the world's best-known entertainment brands

  Pokémon maker Game Freak has confirmed it was the victim of a data leak after information appeared online over the weekend. The company, which has developed the Nintendo-exclusive video game series since 1996, said its servers were hacked in August this year. A statement said 2,606 items containing the names and email addresses of current, former and contract employees were accessed. The company did not comment on other information shared online claiming to show details of unreleased and upcoming projects.

  Game Freak said it would individually contact those affected where possible, and strengthen security measures to prevent similar hacks in future. "We sincerely apologize for the inconvenience and concern caused to all involved," it said.

  Game Freak works closely alongside Nintendo and the Pokémon Company on the franchise, said to be one of the most valuable media properties in the world. It is currently developing the upcoming Pokémon Legends: Z-A, which is due for release next year. Last month, Nintendo and The Pokémon Company lodged legal action in Japan against the makers of Palword. The game, from developer Pocketpair, quickly earned the nickname "Pokémon with guns" due to the resemblance of its characters to Nintendo's creatures. They've accused the company of patent infringement - although the exact details of the claim have not been revealed.

