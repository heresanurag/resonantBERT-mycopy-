content: |-
  The clip depicts the man being lifted in the air by fellow concert-goers during Green Day's set.

  A video captured the moment a man in a wheelchair was crowd-surfed at Download festival.

  The clip depicts the man being lifted in the air by fellow concert-goers during Green Day's set on Friday.

  The three-day event, near Donington in Leicestershire, will conclude on Sunday.

  Festival organisers said they expected to host about 75,000 rock and metal fans.

