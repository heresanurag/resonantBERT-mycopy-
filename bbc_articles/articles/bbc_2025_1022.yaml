title: Loved-up royals share Valentine's Day photos - BBC News
date: '2025-02-15'
section: UK
url: http://www.bbc.co.uk/news/articles/cwypqq9lj88o
content: |-
  Meghan says she is "beyond proud" of Harry in an Instagram post, while William and Kate shared a poignant image.

  "My love, I will eat burgers & fries and fish & chips with you forever. Thank you for you," wrote Meghan, the Duchess of Sussex, in a Valentine's Day message to Prince Harry. Apart from being an insight into what everyone really wants, even among Californian health fadsters, it was a chance to send a message to her husband, who is attending the Invictus Games in Canada. "Back home taking care of our babies, and missing my Valentine," Meghan wrote on social media, saying she was "beyond proud" of his sports event for disabled and wounded veterans. The Prince and Princess of Wales also put out their own social media message, with a single heart emoji and a picture of the couple holding hands and kissing.

  The picture of Prince William and Catherine was particularly poignant, as a still from the video that she had issued last September alongside an announcement that she had completed her cancer treatment. It's a slightly retro-image, with autumn colours and Enid Blyton shorts, taken in woodland in Norfolk and showing Prince William kissing Catherine. Prince Harry and Meghan are also kissing in their picture on social media, in a black and white photo of the couple behind what could be the two dishes linking the US and the UK, with a burger and fries and fish and chips a culinary marker of their own transatlantic "special relationship". Meghan added the tag #lovewins to her Valentine's message and signed off "As ever, M." There's also another important part of the romantic mood, with what looks like a big glass of red wine. Although as far as can be seen, neither of the couples had bought a bunch of garage flowers on the way home and laboured over a witty message. Why say it with flowers when you can say it on social media, with 4.6 million followers to offer their hearts?

