content: |-
  Police are offering a £20,000 reward for information leading to the arrest of Abdul Shokoor Ezedi.

  Police are offering a £20,000 reward for information leading to the arrest of Abdul Shokoor Ezedi, the suspect in a chemical attack on a mother and her daughters in Clapham on Wednesday.

  Officers believe people who know where he is have yet to come forward.

  This CCTV footage, released by the Metropolitan Police, shows the suspect visiting a Tesco store in Islington, north London, following the attack.
