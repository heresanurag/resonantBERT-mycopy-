title: Devon carer who murdered woman had violent crime history - BBC News
date: '2022-11-24'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-63741057
content: |-
  Devon and Cornwall Police did not disclose information about domestic abuse callouts in a DBS check.

  The man had no previous experience of working in care when he was employed to look after the woman

  A carer who murdered the elderly woman he was employed to look after had a history of violent crime including actual bodily harm, a report found.

  A safeguarding adults review over the death of a 77-year-old Devon woman in 2021 criticised working practices among organisations involved in her care.

  Devon and Cornwall Police did not disclose information about domestic abuse callouts involving the killer in a DBS check by the care provider.

  He was jailed for life in July 2022.

  The woman, who is not identified in the Torbay and South Devon Adults Partnership report, had seen her killer as "a grandson" figure, it said.

  The killer, only referred to as "Mr M" in the review, attacked his victim, referred to as "Ella", after she discovered he had stolen several thousand pounds from her.

  The 35-year-old had no previous employment experience of care before being taken on as her sole carer by Complete Quality Care Ltd, an independent care provider.

  The report said he was convicted of a number of criminal offences between 2003 and 2007, including Actual Bodily Harm (ABH), and was involved with police over disorder and drug possession between 2014 and 2018.

  He was also reported for domestic assault on several occasions during those years, but no formal action was taken.

  The report said the police did not disclose the domestic abuse callouts because there had not been "significant violence", it was not committed against a vulnerable person and the activity relating to the DBS check was not in the individual's own home.

  The review found information withheld by the police "would have allowed the provider to make a more comprehensive assessment of the risk Mr M may have posed as a care worker".

  His victim, who had previously suffered domestic abuse herself, was considered "a vulnerable victim" by police after she reported the theft.

  The review made several recommendations to some of the seven health and social care agencies and charities who were involved in her care.

  This included that Torbay and Devon Safeguarding Adults Partnership use the findings of the review to remind adult social care providers about safe recruitment practices.

  "Good practice" was noted as all agencies moved quickly to inform the police when Mr M was suspected of financial abuse and Complete Quality Care immediately suspended him from duty.

  Paul Northcott, the independent chair of the Torbay and Devon Safeguarding Adults Partnership, said the report "highlighted a number of areas of learning that we as a partnership will need to implement to prevent such tragic circumstances from happening again".

  "Those lessons that are contained in the report are wide ranging and not confined to one agency, but point to a number of improvements that can be made nationally and locally," he said.

  He said the partnership would ensure that the recommendations were "acted upon in a timely manner".

  Kelly Cameron, registered manager at Complete Quality Care, said the service accepted the findings of the review.

  "We fully accept the findings and have worked with all partnership agencies to put into practice the recommendations as the safety of our service users is paramount."

  Ms Cameron said the service "acted immediately" to share information with authorities.

  She added: "The act of one individual has caused deep sadness and distress for all involved but our sincere condolences are with the family of Ella at this difficult time."

  The BBC has contacted Devon and Cornwall Police for comment.

