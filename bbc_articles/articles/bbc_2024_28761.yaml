title: King Charles's Coronation cost taxpayers £72m - BBC News
date: '2024-11-21'
section: UK
url: http://www.bbc.co.uk/news/articles/c04lyddv2p5o
content: |-
  Government figures show that more than £20 million was spent by the Home Office policing the event.

  The Coronation of the King cost taxpayers £72m, government figures have revealed. Just over £50m was spent by the Department for Culture, Media and Sport (DCMS), which coordinated the event, while policing costs came to almost £22m, which were paid for by the Home Office. The DCMS described the Coronation as a “once-in-a-generation” moment and the figures came broadly within unofficial estimates, which suggested it would be between £50 and £100m. The Coronation in May 2023 had been described as a “slimmed down affair”, with the Westminster Abbey guest list only a quarter of the size of Queen Elizabeth II’s Coronation at the same venue in 1953.

  The Coronation, as a state event, was funded by the UK government. A small amount of the bill was also paid using the Sovereign Grant - the annual taxpayers’ funding for the monarchy. There had been criticism aimed at the public funding of the Coronation, which came during a cost-of-living crisis in the UK. A poll carried out by YouGov the month before the Coronation revealed that 52% of Londoners did not believe the Coronation should be paid for by taxpayers. There had been much speculation about the cost to the public purse, which the DCMS said could not be revealed until after the event. The DCMS annual accounts report released on Thursday said the Coronation reached an estimated global audience of two billion people in 125 countries, saying it “offered a unique opportunity to celebrate and strengthen our national identity and showcase the UK to the world". Campaign group Republic called the Coronation a "pointless, archaic parade" and said the money spent could have paid for free school meals. Chief executive Graham Smith said: "At a time when so many people are struggling with the cost of living crisis, it is shameful that Charles insisted on this pointless extravaganza."

  The King and Queen processed up The Mall to Buckingham Palace

  King Charles was crowned at Westminster Abbey on 6 May 2023 in a ceremony attended by dignitaries from around the world. The King’s youngest son, Prince Harry, flew in from California for the ceremony, but his wife Meghan and their two children did not join him. Celebrity guests inside the Abbey included British acting royalty Emma Thompson, Judi Dench and Stephen Fry, as well as international stars such as US singers Lionel Richie and Katy Perry. The Foreign Office said in total, 90 heads of state were in attendance, as well as the first ladies of the United States and Ukraine, representing the presidents of their respective countries. Thousands of people packed the Mall in the rain to watch as the procession paraded through London. A star-studded concert, featuring Perry, Richie and Take That, among others, took place at Windsor Castle the following night.

