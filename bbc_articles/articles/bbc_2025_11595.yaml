title: Mark Drakeford loses temper with Plaid Cymru leader over funding - BBC News
date: '2025-06-13'
section: General
url: http://www.bbc.co.uk/news/videos/clyg0xnxl7vo
content: |-
  Drakeford accuses Rhun ap Iorwerth of being "very bad at listening" as he is heckled.

  "Would you like to listen to me?"

  This is the moment Finance Secretary Mark Drakeford lost his temper with Plaid Cymru leader Rhun ap Iorwerth in the Senedd on Wednesday.

  Members were discussing chancellor Rachel Reeves' spending review and its impact on Wales.

  As Drakeford explained the breakdown of £455m funding announced for rail schemes in Wales, he was heckled by ap Iorwerth, prompting him to snap back that the Plaid leader was "very bad at listening".
