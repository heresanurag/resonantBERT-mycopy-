title: 'Rishi Sunak: Trespassing suspects arrested at PM''s home - BBC News'
date: '2024-06-26'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/cgrrlep3l0ro
content: |-
  Four men are arrested on suspicion of trespassing at Rishi Sunak's Richmond home.

  The suspects were held within a minute of entering the grounds of the prime minister's home, police said

  Four men have been arrested on suspicion of trespassing in the grounds of Prime Minister Rishi Sunak's constituency home. North Yorkshire Police said it had arrested the men "within one minute of them entering the grounds" of his home near Northallerton. The four were detained at around 12.40 BST, before being escorted off the property, officers said. It comes as a video was released by protest group Youth Demand, which appeared to show a young man entering the prime minister's property and defecating in a lake.

  The group said the action was a "parting gift" for the prime minister and the Conservative government. Youth Demand describes itself as a campaign calling for an arms embargo on Israel, as well as for the government to revoke new oil and gas licences granted since 2021. A Downing Street spokesperson said: "The prime minister thanks the police for their swift response to keep him and his family safe. "As this is a live police investigation, further queries should be direct to the relevant police force." The four men, aged 52 from London, 43 from Bolton, 21 from Manchester, and 20 from Chichester, remained in police custody for questioning and inquiries were ongoing, North Yorkshire Police added. Follow BBC Yorkshire on Facebook, external, X (formerly known as Twitter), external and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external
