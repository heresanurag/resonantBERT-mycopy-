title: 'Llanfair school: Four children hit by bus in stable condition - BBC News'
date: '2022-05-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61557775
content: |-
  The bus mounted a kerb, hit a group of primary school pupils, and crashed into metal fencing.

  The crash happened at the end of the school day, close to the town's primary and secondary schools

  Four children are in stable condition in hospital after being hit by a school bus.

  The bus crashed into a group of primary school children at about 15:25 BST on Monday in Llanfair Caereinion, Powys.

  Three children were airlifted to hospital with another child and the male bus driver both taken by ambulance.

  A fifth child was discharged at the scene. The bus had no passengers.

  The bus mounted the kerb and crashed into metal fencing on School Lane, just off Neuadd Lane.

  It has since been removed for forensic examination and the road has reopened.

  A service will be held at Capel Moreia in Llanfair Caereinion later on Tuesday for "quiet reflection and prayers".

  The bus has now been removed from the scene of the crash

  Ysgol Uwchradd Caereinion High School and Llanfair Caereinion Primary School are on either side of Neuadd Lane.

  Dyfed Powys Police have confirmed that school community police officers will be attending the pupils' school on Tuesday to provide support.

  Powys council said its school service officers were in the town "providing support to both the high school and primary school".

  No passengers were on the bus at the time of the crash
