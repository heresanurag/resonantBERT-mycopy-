content: |-
  Khayri Mclean, 15, was stabbed outside a school in Huddersfield and died later in hospital.

  Khayri Mclean, 15, died after he was stabbed near the entrance to North Huddersfield Trust School on Wednesday

  Two teenage boys have appeared in court charged with the murder of Khayri Mclean, who was stabbed outside his school in Huddersfield.

  Khayri, 15, was attacked near the entrance to North Huddersfield Trust School at about 14:55 BST on 21 September. He died later in hospital.

  The boys, aged 15 and 16 and who cannot be named for legal reasons, appeared at Leeds Magistrates' Court on Monday.

  They were remanded in custody to appear at Leeds Crown Court on Wednesday.

  Both boys are also charged with possession of a bladed article.

  They spoke only to confirm their names, dates of birth, and addresses, and were remanded to youth defendant accommodation.

