  Bringing you the latest news from across England about the coronavirus pandemic.

  A series of drive-in concerts have been announced to take place across the UK this summer.

  Gary Numan is among the acts announced by Live Nation, presumably so he can belt out his hit 'Cars' to a crowd full of them.

  What will the experience be like for those driving up to watch acts like Beverly Knight, Sigala, and Jack Savoretti?

  Drive-in concerts have already been tried out in Denmark, Germany and the US.
