title: Escaped emu caught on doorbell camera - BBC News
date: '2023-11-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-67404894
content: |-
  Police were alerted and joined in the capture of the flightless bird in Loose, Kent.

  An escaped emu has been caught on camera on the front doorstep of a house in a suburban street.

  The flightless bird was captured on doorbell footage at a property in Loose, Kent, on Saturday.

  Officers from Kent Police were alerted and joined in the capture of the emu which a spokesman said had escaped from a residential property.
