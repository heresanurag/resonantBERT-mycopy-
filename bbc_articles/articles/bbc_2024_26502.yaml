content: |-
  England hold off a physical Samoa side to claim a hard-fought victory in Wigan in the opening match of their two-Test series.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the best of the action as England beat Samoa

  England held off a physical Samoa side to claim a hard-fought victory in the opening match of their two-Test series. The result provided the hosts with a small measure of revenge for their World Cup semi-final defeat by the Pacific Islanders in 2022. First-half tries from Herbie Farnworth, Matty Ashton and George Williams set Shaun Wane's side on their way in Wigan, although Deine Mariner's interception try brought Ben Gardiner's team back into the contest before the interval. A break from England captain Williams and some superb handling from Farnworth allowed Victor Radley to go over as England reasserted their authority. But Samoa responded almost immediately, with Mariner, one of their eight debutants, collecting the ball from Jarome Luai to score in the left corner. However, any hopes of a comeback were extinguished by Ashton's second try of the afternoon, while Super League's Man of Steel, Mikey Lewis, also crossed. Gordon Chan Kum Tong scored a late consolation try for the tourists in an entertaining contest. As the clock ticked down, tempers flared between England second row John Bateman and Samoa's John Asiata, prompting a melee that involved nearly all 26 players. It suggested sparks may fly when the teams meet again in six days' time at Headingley in Leeds.

  Herbie Farnworth was making his first appearance for England since the World Cup semi-final loss to Samoa in 2022

  While Wane seemed to enjoy the late fracas, he will have taken greater joy at seeing his side look so accomplished at times with ball in hand. More importantly, though, he will now demand his squad improve and wrap up the series next weekend against one of the sport's top-tier nations. Samoa, who only arrived in the UK just over a week ago, appeared to struggle in the opening stages of this encounter and were already 16-0 behind before they began to find their feet. Aside from two interception tries, the first from a loose pass from Daryl Clark and the second a mistake from Kai Pearce-Paul, England were both ruthless and opportunistic in their execution and always had Harry Smith's dependable left boot to rely upon for field position. One booming first half-kick caught out former New Zealand dual-code international Roger Tuivasa-Sheck. However, stand-off Williams stole the show with his evasive running setting the tone for England's attacks. Farnworth, on his first appearance for his country since their dramatic golden-point loss to Samoa two years ago, also excelled with his pass to Radley, arriving at a key time during proceedings.
