title: 'Newspaper headlines: ''Two years of lunacy'' and possible ''new Brexit deal''
  - BBC News'
date: '2024-02-23'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68377236
content: |-
  A variety of stories make the front pages today, including the two-year anniversary of Russia's invasion of Ukraine.

  The former Home Secretary, Suella Braverman, has written in the Daily Telegraph claiming that "Islamists are now in control of Britain" after the Commons Speaker said he had ignored protocol during a debate on Gaza because of security threats to MPs. She says Islamists have "bullied our country into submission" and the UK is "sleepwalking into a ghettoised society" threatening free expression and British values.

  In an editorial the Times declares that fear is now a factor in British democracy because concern for the safety of MPs clearly played a major role in what the paper describes as the Speaker's "ill-advised decision to rip up the Commons rule book". It declares that the threat of terrorist retribution should never govern the deliberations of parliament, and the country should not be ruled by fear.

  According to the Daily Mail, setting aside parliamentary procedures in response to intimidation by Islamist extremists and their far-left fellow travellers is not just intolerable, it's is staggeringly self-defeating. It sends the message that political violence works, warns the paper.

  The Sun says Parliament has surrendered to a "violent Hamas- backing mob". In an editorial the paper says this is a shaming, chilling, highly dangerous moment. It says the only reason why the Commons debated a ceasefire in Gaza was for left-wing MPs to assure voters that they backed the Palestinians.

  The Daily Mail and the Daily Express are asking why police didn't stop pro-Palestinian protesters from beaming a contentious slogan on to Big Ben, during the debate in Parliament. Both papers describe the phrase as genocidal. Scotland Yard said it was not a criminal offence.

  A study which suggested that seeing the same doctor at every visit to a GP practice improves patients' health and reduces doctors' workloads is highlighted by the Guardian. Researchers from the University of Cambridge and Insead Business School analysed data from 10 million consultations in England over more than a decade. They found that people seeing the same doctor have 18% longer intervals between visits compared with those who saw different doctors. That suggests that continuity of care could free up millions of appointments, says the Guardian.

  The Times says the Fundraising Regulator has begun an investigation after the paper uncovered that people going door to door for a children's charity had been taught pressure-selling techniques. According to the article those signing up households for donations to the Great Ormond Street Hospital Charity were trained at a third-party marketing company to use psychological motivators and pre-empt objections. The charity said it was "deeply concerned" by the findings. The marketing company says it has a policy of "reasonable persuasion" only.

  And the i says the EU could offer the UK a closer trade relationship if Labour wins the general election. The paper says the deal would help businesses import and export goods, including food and cars, but Britain would not be re-joining the EU's single market or customs union. The deal could be agreed in 2026 when the current one comes up for review.

