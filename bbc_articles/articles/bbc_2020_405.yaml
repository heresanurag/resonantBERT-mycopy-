title: Justin Trudeau says evidence plan hit by Iranian missile - BBC News
date: '2020-01-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51056094
content: |-
  The Canadian PM says evidence shows the plane was hit by a surface-to-air missile - possibly unintentionally.

  The Canadian PM says evidence from multiple sources shows the plane taking off in Tehran was hit by an Iranian surface-to-air missile, possibly unintentionally.
