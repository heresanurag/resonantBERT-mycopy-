title: 'Plymouth shooting: Defence Secretary rules out terrorism - BBC News'
date: '2021-08-13'
section: General
url: http://www.bbc.co.uk/news/uk-58198079
content: |-
  Defence Secretary Ben Wallace said the shooting in Plymouth was ''a very sad and tragic event''.

  Six people, including a suspected gunman, have died in a shooting in Plymouth.

  Devon and Cornwall Police said three females, two males and the suspect had died in the Keyham area of the city on Thursday evening. One of the dead was a child under 10.

  Defence Secretary Ben Wallace said the shooting was not terror-related.
