title: Boy admits manslaughter of man he tripped up in Hanwell - BBC News
date: '2023-11-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67298418
content: |-
  The 16-year-old caused Jerald Netto to fall to the ground, where he suffered a heart attack.

  The boy will be sentenced at the Old Bailey in January

  A teenager who tripped up a 62-year-old man, causing him to suffer a heart attack, has admitted manslaughter.

  The boy, 16, ran up to Jerald Netto, put his foot between his legs and swept him off his feet in Hanwell, west London, early on 19 March.

  Mr Netto fell forward and suffered a heart attack from the trauma of hitting the pavement, the Old Bailey heard.

  The teenager, who was originally charged with murder, will be sentenced for manslaughter on 12 January.

  Judge Rebecca Trowler KC ordered a pre-sentence report but warned the defendant and his family that they should prepare for a custodial sentence. She remanded him back into local authority accommodation with "stringent conditions".

  The boy, who cannot be named for legal reasons, was arrested shortly after the attack, which happened on Boston Road at about 00:50 GMT. Mr Netto, from Southall, died later the same day.

  Prosecutor Louise Oakley said the victim's relatives in court wanted time to reflect on the teenager's plea and to prepare a statement on the impact of Mr Netto's death on them and their wider family.

  On the boy's responsibility for what happened, Ms Oakley submitted that Mr Netto died "as a result of an unlawful act which involved an intention to cause harm or recklessness as to whether harm was caused".

  Judge Trowler said: "I am aware that the defendant has admitted responsibility for the physical act from the outset and so the only factor that has changed today in legal terms is causation has been accepted on his behalf and therefore plea has been entered."

