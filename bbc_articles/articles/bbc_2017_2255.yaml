id: bbc_2017_2255
title: 'Trump travel ban: ''President must honour ruling'' - BBC News'
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38866749
content: |-
  The Washington State Attorney General says he is "certain" the president will not like the ruling.

  President Donald Trump must honour the temporary nationwide block on his travel ban, the Washington state Attorney General Bob Ferguson has said.

  Earlier, Federal Judge James Robart ruled against government lawyers' claims that US states did not have the standing to challenge Mr Trump's executive order.
