title: Elon Musk sparks crisis at Royal Society but remains a member - BBC News
date: '2025-03-04'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3e44ge0xnwo
content: |-
  The world's most prestigious science institution has been considering whether to remove Musk as a fellow.

  Elon Musk has become a source of fierce debate among Royal Society fellows

  Members of the UK's Royal Society have urged the elite scientific academy to "step up its efforts to advocate for science and scientists" amid a row over one of its fellows - Elon Musk. Over the last nine months, many scientists have raised concerns about the controversial billionaire's behaviour, which has been called a "threat to science". A meeting on Monday evening did not result in Mr Musk's expulsion, but it has drawn the world's oldest scientific academy into a divisive, political row.

  It was Musk's technological achievements with Tesla and SpaceX that earned him a fellowship

  The campaign to revoke Mr Musk's membership centres on suggestions, from a growing number of fellows, that the billionaire's actions are "incompatible" with the society's own code of conduct. Mr Musk has overseen unprecedented funding cuts to scientific research in the US, in his senior role in President Trump's Department of Government Efficiency (or Doge). Mr Musk has also been accused of sharing misinformation on his social media platform, X. In a statement after the meeting, the Royal Society addressed those issues, saying that members who attended were particularly concerned about the fate of scientists in the US, "amid threats of radical cutbacks in research funding". The society agreed to "look at potential further actions" to "counter the misinformation and ideologically motivated attacks on both science and scientists". The BBC understands that a letter will be sent to Mr Musk from the Royal Society.

  It is 250 years since a member of the Royal Society was ejected: German scientist and writer Rudolf Erich Raspe, who was accused of theft and fraud. So the rift among the membership, caused by Mr Musk and his public pronouncements, could be a historic turning point for this most elite of scientific academies. Two eminent scientists have resigned their fellowships in protest - Dr Dorothy Bishop of Oxford University and Prof Andrew Millar from University of Edinburgh. More than than 3,300 scientists also put their names to a letter, written by Prof Stephen Curry, emeritus professor of structural biology at Imperial College London, who is not a fellow, that expressed "deep concern" about the billionaire's fellowship and the society's "continued silence and apparent inaction" with regard to the controversy.

  Prof Curry told the BBC he was glad that the society had gathered fellows to discuss these concerns. But, he added that he was "disappointed that they have so far given only a very short statement summarising the meeting". "It makes no mention of the one [member] whose actions contrary to their code of conduct have prompted it". Dr Dorothy Bishop, emeritus professor of development neuropsychology at Oxford University and the first fellow to resign over the issue, told BBC News she had complained to the Royal Society twice last year. "On both occasions they consulted lawyers, and it may well be the case that the lawyers are concerned about the prospect of legal action," she said.

  There are more than 1,700 fellows of the Royal Society and more than 60 of them have signed Prof Curry's letter. Many more have expressed their concern about Mr Musk's behaviour. But there are many academics, researchers and Royal Society fellows who do not wish to see the divisive billionaire have his membership revoked. Nobel prize-winner Prof Sir Andre Geim from Manchester University said: "Musk is certainly an eccentric, but his achievements beat those of any of his critics in the Royal Society. Very few can say that they achieved similar in their lives." Other scientists who spoke to the BBC pointed out that an attempt to remove Mr Musk's fellowship could be seen as political interference and a curtailment of freedom of expression. But Prof George Efstathiou, from the University of Cambridge, dismissed that argument. Members, he said, "should at least have respect for the truth". "If somebody has a disregard for the truth and says things that are blatantly false, then that speaks to their ethical standards," he added. "That's not political."

  The Royal Society was founded in 1660 making it the oldest and one of the most prestigious scientific academies in the world

  Fiona Fox is chief executive of the Science Media Centre, which works with journalists and scientists to promote "accurate, evidence-based information" in science coverage. She was elected as a Royal Society fellow in 2023. Ms Fox told BBC News she was concerned at what was happening to the science community in the US, but questioned whether ejecting Mr Musk would achieve the Royal Society's overall aims of educating and advancing scientific research. "There are terrifying things being done in the US - removing data sets, taking web pages down of data. This is knowledge. This is universally owned. "There's a climate of fear in which people are self censoring. I mean, it's absolutely terrifying," she said. Mr Musk has not responded to requests for comment that BBC News sent via his companies, Tesla and Space X.
