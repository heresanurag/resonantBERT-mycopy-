title: Champion boxer Andrew Tham dies after motorbike crash - BBC News
date: '2024-06-04'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c0wwr0krqkko
content: |-
  Andrew Tham, the reigning Scottish featherweight champion, died three days after a crash in Cumbernauld.

  Andy Tham became the Scottish featherweight champion after defeating Jack Turner at the Braehead Arena, near Glasgow, last September

  A champion boxer has died three days after he was critically injured in a motorbike crash. Andrew Tham, 28, was involved in a collision with a Hyundai Tucson car at about 18.50 on Thursday on the B8039, near Lenziemill Road, Cumbernauld. Tham, who was riding a Kawasaki, was taken to the Queen Elizabeth University Hospital in Glasgow where he died on Sunday. Tributes have been paid to the Cumbernauld boxer, who became Scottish featherweight champion last September.

  Andy Tham fought on the undercard of the Battle of the Legends fight between Ricky Burns and Willie Limond last year

  Tham, who had his first professional fight in March 2019, trained at Kilsyth Golden Gloves gym in the North Lanarkshire town. He was managed by St Andrew's Sporting Club. In a statement on X, external it said: "Andy was a champion in the ring, and a character out of the ring. "It has been an honour to have him in our stable for the entirety of his professional boxing career and he will be greatly missed by us all. "Our thoughts and prayers are with his family and friends."

  Tham celebrates his second professional win in Glasgow in June 2019

  Last month he lost a bout against George Stewart but his Scottish title was not on the line. Stewart said he was "absolutely devastated". He said: "It was an absolute honour and a pleasure to share the ring with him two weeks ago - a true warrior. "I have no words to describe this devastating news other than heart breaking." Professional boxer Joe Ham also paid tribute to Tham on X, writing he was "one of the nicest but toughest boys in the world".

  Tham was the reigning Scottish featherweight champion at the time of his death

  Tham won his featherweight title on the undercard of the “Battle of the Legends” fight between Scottish boxing greats Ricky Burns and Willie Limond at the Braehead Arena. The venue, near Glasgow, said staff were "shocked and saddened". A post on X said: "The team have many fond memories of his fight here in 2023. "Our thoughts go out to his family and friends at this sad time." Tham's death is the second blow to hit the sport in Scotland in recent weeks. Sgt Gemma Blackadder urged anyone with information about the crash to get in touch, external. She added: "Our thoughts are very much with Andrew’s family and friends at what is a very difficult time for them."
