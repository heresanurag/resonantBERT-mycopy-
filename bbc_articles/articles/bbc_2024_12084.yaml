title: 'Lewisham: Moving in to London''s self-build community - BBC News'
date: '2024-06-16'
section: General
url: http://www.bbc.co.uk/news/videos/cjrr09q1dgno
content: |-
  Residents of 36 self-build homes hope to provide a solution to London's housing crisis.

  The project in Ladywell, in Lewisham, south-east London, is on the site of ex-council land and took 15 years to build from conception to completion.

  A team of self-build managers, an architect and a carpenter offered training to the residents.

  All 36 homes are price-capped, and the project was funded using donations, loans and grants from the public and private sector.

