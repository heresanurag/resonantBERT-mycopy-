title: 'Coronavirus: GAA suspends all activity after government measures - BBC Sport'
date: '2020-03-12'
section: Northern Ireland
url: http://www.bbc.co.uk/sport/northern-ireland/51853142
content: |-
  The GAA imposes a blanket ban on all activity at every age level in response to government advice aimed at combating coronavirus.

  The final two rounds of fixtures in the GAA inter-county league are likely to be heavily affected

  The GAA has imposed a blanket ban on all activity at every age level in response to government advice aimed at combating coronavirus. Taoiseach Leo Varadkar said that outdoor gatherings of over 500 people, and indoor gatherings of over 100, should be cancelled until 29 March. The GAA's ban includes all training and team gatherings. The restrictions will take effect from 18:00 GMT on Thursday. "We will continue to liaise with Government officials and review the situation between now and the end of the month, assessing the impact of these measures on our competitions," read a GAA statement.

  Among the events to be put on hold by the ban are the final two rounds of the inter-county league campaign and the MacRory Cup. The Football Association of Ireland confirmed that they will meet with government officials on Thursday afternoon before making an announcement on plans for all footballing activities. League of Ireland side Derry City also responded to the announcement by postponing Friday's game against Sligo Rovers.
