  Tributes to Dr Mosley have continued to pour in from both his former colleagues and members of the public. Friend and fellow broadcaster Dr Hannah Fry told the BBC's One Show about an instance in which Dr Mosley had saved a woman's life. "Somebody collapsed in the BBC offices in the corridors, and he saw them collapse," said Dr Fry. "He went over, he performed CPR on them for almost half an hour until the emergency services arrived. "[He] saved her life, she's gone on to have two children." One member of the public said that Dr Mosley "had the ability to reach out to all walks of life", while another said that she often uses his advice about breathing slowly to calm anxiety.
