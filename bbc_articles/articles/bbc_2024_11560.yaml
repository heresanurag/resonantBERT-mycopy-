  This was Hodgkinson's second major outdoor title following success in Munich two years ago and comes before she targets a first global title at Paris 2024. With both a personal best and season's best time more than three seconds faster than anyone else in the final, she could hardly have lined up as a stronger favourite to defend her European crown. While she did not win by the margin perhaps expected - having run a world-leading time of 1:55.78 to beat world champion Mary Moraa in Eugene this year - Hodgkinson always appeared in control as she collected the eighth major medal of an already stunning senior career, which only started in 2021. The supremely talented Briton has been pushing the world's best since contesting her first major championships at the Tokyo Olympics. Following that stunning breakthrough silver at those Games three years ago and successive world silvers since, Hodgkinson's eyes are now fixed on gold in Paris, where she is once again expected to battle Moraa and American Olympic champion Athing Mu for global supremacy. "I’m super excited for Paris. The next seven weeks are going to be incredible," Hodgkinson said. "I do believe in the power of manifestation, so it’s obviously something I think about. The Olympic Games are so special, it's a huge opportunity to change your life and I’m just ready to go for it." Slovakia's Gabriela Gajanova took silver in 1:58.79 and France's Anais Bourgoin was third in 1:59.30.

