  Olympic 100m champion Jacobs helped the host nation secure the final gold medal on the track as Italy's men's 4x100m relay quartet took gold in 37.82, ahead of the Netherlands and Germany. Bol sealed women's 4x400m relay gold for the Netherlands in 3:22.39 to add to her individual 400m hurdles victory, as Ireland clinched silver in a national record 3:22.71 ahead of Belgium. The British men's 4x400m quartet featuring Toby Harries, Michael Ohioze, Lewis Davey and Alex Haydock-Wilson finished seventh in a time of 3:01.89, as Belgium took gold. Britain's Patrick Dever led for much of the men's 10,000m final but faded on the final lap to finish sixth in 28:04.43, as Switzerland's Dominic Lobalu won in 28:00.32. Zakariya Mahamed was 17th in 28:25.31, and fellow Briton Rory Leonard placed 19th in 28:33.66.

