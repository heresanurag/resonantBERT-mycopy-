  Duplantis hoped to produce a grand finale in Rome as all eyes were fixed on his world record attempts after the 24-year-old had already safely secured a third successive European title. As the only athlete to clear 5.92m, Duplantis registered a first-time clearance at 5.97m, and again at 6.10m to win the 'Golden Crown' - awarded to those who produced standout performances in the Italian capital, along with 50,000 euros (£42,000). With the prize money secure, the bar was lifted to 6.25m as Duplantis took his latest three attempts at breaking the world record for a ninth time, but it was not to be on this occasion. Ingebrigtsen completed a third successive European golden double as he added the 1500m title to the 5,000m crown he successfully defended on Saturday. The 23-year-old is the reigning Olympic champion over 1500m and is preparing for an expected gold-medal showdown with Britain's world champion Josh Kerr in Paris in eight weeks' time. He was allowed to control the pace before bursting clear to win his 11th European track title both indoors and outdoors in a championship record 3:31.95. Britain's European silver medallist Neil Gourley followed Ingebrigtsen closely until the closing stages but faded to finish ninth in 3:34.11, while team-mate Adam Fogg was 12th in 3:34.44.

