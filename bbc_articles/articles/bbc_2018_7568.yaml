  The European Parliament set out details of what it means by an "association agreement" - something the EU normally signs with aspiring member countries such as Ukraine - in a draft resolution in March.

  It would open the door to continued cooperation with some EU institutions, although Mr Verhofstadt said the UK would still have to be kicked out schemes such as the European Arrest Warrant and the Galileo satellite navigation system when it became a "third country" outside the EU.

  UK Brexit Secretary David Davis said last month he had no "intrinsic objection" to an "association agreement" but it "depends what's in it", adding that he would not accept the continued jurisdiction of the European Court of Justice.

  Mr Verhofstadt said Brexit had increased the "popularity" of the EU in other member states and that it had reignited debate about reform of its institutions.

  He said he was looking forward to the UK government's Brexit White Paper, which he hoped would give more details about how to resolve sticking points such as the Irish border and ECJ membership.

  "I think that is it still possible to have for October/November an agreement on the political declaration. For that we need to speed up, certainly the negotiations in the coming months."

  Mr Verhofstadt was also quizzed by the Commons home affairs committee.

  He repeated his warning of the "nightmare" of multiple agreements - on security, nuclear materials and many other issues - that he said could could take decades to ratify.

  This could be avoided with a single "association agreement", he told the MPs, but he cautioned against the idea of copying Ukraine's association agreement, which he said was "specific" to its ambition to join the EU.

  Committee chairman Yvette Cooper asked whether the Ukraine model, which allows partial access to the single market but not free movement, could point the way to a deal that might work for the UK.

  "We did it with Ukraine so it's possible," said Mr Verhofstadt, but he said if the UK wanted deeper access to the single market than that enjoyed by Ukraine it would have to accept free movement.

  Similarly, he added, the EU would accept continued membership of the customs union, but only if the UK accepted it could not strike its own trade deals.
