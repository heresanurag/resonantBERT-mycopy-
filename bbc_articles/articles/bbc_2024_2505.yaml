content: |-
  Listeners share with the BBC their memories and tributes after DJ Steve Wright dies at the age of 69.

  Your memories of listening to Wrighty are continuing tonight - get in touch with your tribute at haveyoursay@bbc.co.uk.

  From a Covid companion, to meeting him in real life... laughter and joy shine through:

  Quote Message: I first listened to him on Radio 1 in Bolton, his afternoon show was always on in our shop and, I timed closing up, to his closing jingle. Then, throughout all these years, his voice has been a constant companion. My kids who are now 14 and 16 grew up listening to him every evening as I made them dinner, listening through iPlayer to his Big Show. They were delighted that he was still on a Sunday. We will miss him so, so much. from Rebecca in Trondheim I first listened to him on Radio 1 in Bolton, his afternoon show was always on in our shop and, I timed closing up, to his closing jingle. Then, throughout all these years, his voice has been a constant companion. My kids who are now 14 and 16 grew up listening to him every evening as I made them dinner, listening through iPlayer to his Big Show. They were delighted that he was still on a Sunday. We will miss him so, so much.

  Quote Message: His afternoon show with The Posse and his fabulously funny characters like Mr Angry, Elvis is in the Building, Mick and Keef, plus many others were unashamedly funny but never offensive and were just fantastic radio. We never met you but always felt like we knew you were speaking to us. Irreplaceable! from Doug His afternoon show with The Posse and his fabulously funny characters like Mr Angry, Elvis is in the Building, Mick and Keef, plus many others were unashamedly funny but never offensive and were just fantastic radio. We never met you but always felt like we knew you were speaking to us. Irreplaceable!

  Quote Message: Growing up in Northern Ireland in the Troubles I used to hide a little radio and some headphones in my school bag. As soon as I came out the school gates it was straight onto Radio 1 to listen to Steve Wright. I’d go a ridiculously long way home so I could listen to the end. It was him who sparked my ambition to work in radio. from James, Cotswolds Growing up in Northern Ireland in the Troubles I used to hide a little radio and some headphones in my school bag. As soon as I came out the school gates it was straight onto Radio 1 to listen to Steve Wright. I’d go a ridiculously long way home so I could listen to the end. It was him who sparked my ambition to work in radio.

  Quote Message: I was lucky enough to bump into him on Great Portland street a few years ago, and he was as warm and friendly as he came across on the radio. Even if you'd never met him you'd consider him a friend, a special special man and DJ. He was seminal to the soundtrack of my life, there for every moment in the background bringing laughter and joy... We will all miss him from Terence, Chelmsford I was lucky enough to bump into him on Great Portland street a few years ago, and he was as warm and friendly as he came across on the radio. Even if you'd never met him you'd consider him a friend, a special special man and DJ. He was seminal to the soundtrack of my life, there for every moment in the background bringing laughter and joy... We will all miss him

  Quote Message: The day before non-essential shops were shut by Covid, I went out and bought a radio to keep me company when working from home and I'm so glad I did. Radio 2 provided me and so many others with such vital company during those strange times and Steve Wright was one of those familiar, friendly, funny voices that we needed "now more than ever". I hope he knew how much he meant to his listeners. from Charles, Bristol The day before non-essential shops were shut by Covid, I went out and bought a radio to keep me company when working from home and I'm so glad I did. Radio 2 provided me and so many others with such vital company during those strange times and Steve Wright was one of those familiar, friendly, funny voices that we needed "now more than ever". I hope he knew how much he meant to his listeners.
