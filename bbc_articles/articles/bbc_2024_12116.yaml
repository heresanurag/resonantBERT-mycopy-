title: 'Keaton Slater: Community ''gutted'' after boy''s hit-and-run death - BBC News'
date: '2024-06-17'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/c288yj7dkp7o
content: |-
  Keaton's school and Coventry City Football Club are among those paying tribute to the 12 year-old.

  Coventry City said the thoughts and condolences of everyone at the club were with Keaton Slater's family

  Tributes have been paid to a 12-year-old boy who was killed in a hit-and-run crash. Keaton Slater was fatally injured on Radford Road, in Coventry at about 16:30 BST on Friday. Emma O'Connor, head of Cardinal Newman Catholic School where he was a pupil, said they were "all shocked and saddened by the sudden and tragic death of Keaton Slater" and added he was "a beautiful, fun-loving, popular student". Coventry City Football Club have sent their condolences to the family of Keaton who they described as a huge supporter of the team.

  Dozens of floral tributes have been left at the scene of the crash and one resident told the BBC it was "gutting" for the family and the local community. Ms O'Connor said in the school statement their thoughts and condolences were with Keaton's family and friends. He joined the senior school from St Augustine’s Primary School in September. "We will all miss him, his incredible smile and his wonderful sense of humour," she added. The school said its pupils and community would be supported over the coming days by additional counsellors, lay chaplains and staff.

  This video can not be played To play this video you need to enable JavaScript in your browser. Listen on BBC Sounds for more: Dozens of floral tributes were left at the scene of the crash

  Coventry City said in their statement they were "deeply saddened" after hearing about Keaton's death. "Keaton was a huge Coventry City supporter and the thoughts and condolences of everyone at Coventry City Football Club and the entire Sky Blue community are with Keaton’s family and friends at this awful time for them," they said. In a tribute released by the force, Keaton's family said he was "so beautiful inside and out" and "our fun-loving little comedian" who "just wanted to make everyone laugh and smile". Jessica Thewlis, whose children go to school near where the crash happened, said: "It's so sad, it's not anything I'd expect to happen so close to my children's school "It's terrible and absolutely gutting for everyone around here that knew him and loved him."

  Flowers, candles, photos and Coventry City football memorabilia have been left in Keaton's memory

  Claire Millard's property was where tributes for Keaton were being laid and she said she had put a chair outside her home for the family to use and added she would do anything to put them "at ease". "I've noticed a community that I thought was almost gone has really come together for this family," she said. "Even people who don't know each other have been hugging each other talking to each other. People from Birmingham and all over Coventry have come to lay flowers for this little boy that they didn't even know." Another passerby, Rob Morris, said: "It's horrific, I've got a child myself. I was walking back home from work an hour before it happened. It's heartbreaking." A fundraising page set up to help Keaton's family has raised nearly £40,000.

  A Coventry City flag was among the tributes left on Rashford Road

  On Sunday police named a man wanted on suspicion of killing Keaton in the crash. They appealed for information on the whereabouts of 21-year-old Dolars Aleksanders, suspected of causing death by dangerous driving. A black BMW found abandoned in New Arley on Friday evening was seized by the force.
