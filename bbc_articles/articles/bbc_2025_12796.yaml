content: |-
  BBC Analysis Editor Ros Atkins and the BBC Verify team build up a picture of what happened and how it was done.

  Ukraine dubbed its operation inside Russia on 1 June "Spider's Web". New information continues to emerge about the daring series of drone attacks at multiple locations inside Russia.

  BBC Analysis Editor Ros Atkins and the BBC Verify team have been assessing a range of material - from satellite images to drone footage - to build up a picture of what happened and how it was done.
