title: 'Sturgeon: SNP MPs would back new Brexit vote - BBC News'
date: '2018-10-07'
section: General
url: http://www.bbc.co.uk/news/uk-politics-45775792
content: |-
  First Minister of Scotland Nicola Sturgeon says her party's MPs would vote for another EU referendum.

  SNP MPs would back another Brexit referendum if a House of Commons vote were to take place, First Minister of Scotland Nicola Sturgeon tells The Andrew Marr Show.
