title: 'Beaumaris crash: Driver died from chest injuries, inquest hears - BBC News'
date: '2024-09-04'
section: Wales
url: http://www.bbc.co.uk/news/articles/cevjl8l7yrjo
content: |-
  Humphrey Pickering, 81, was driving the car that crashed into and killed two pedestrians.

  The crash involving an Audi happened at Alma Street near Beaumaris Pier

  The driver of a car involved in a crash that killed three people in a popular seaside town died from chest injuries, an inquest has heard. Humphrey Pickering, 81, from Colwyn Bay, Conwy County, has been confirmed as the driver of the car that crashed into and killed two pedestrians. They have been named as Stephen and Katherine Burch, both 65, from Alcester, Warwickshire. The crash involving an Audi happened at Alma Street near Beaumaris Pier on Anglesey at 14:45 BST on 28 August.

  An inquest in Caernarfon, Gwynedd, heard that Mr Pickering was pronounced dead at the scene by air ambulance staff at 15:20, with a provisional cause of death listed as chest injuries. Mr Pickering was a retired librarian born in Shropshire but living in the Colwyn Bay area.

  Stephen and Katherine Burch died in the collision in Beaumaris, Anglesey

  Mr and Mrs Burch were pronounced dead by paramedics at 15:21, with their provisional cause of death listed as multiple injuries. Kate Robertson, North West Wales coroner, passed on her condolences to the family and friends of the deceased, and also noted the significant efforts of both members of the public and emergency services at the scene. She added that the inquest would be adjourned to allow for further enquiries.
