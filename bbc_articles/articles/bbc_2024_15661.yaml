content: |-
  Cameron Jones was the focus of a police manhunt until he turned himself in three weeks after the crash.

  This is the moment Cameron Jones was caught on CCTV fleeing a crash which killed his girlfriend.

  The 30-year-old disqualified driver, from Merthyr Tydfil, was behind the wheel of a white Audi S3 when it smashed into a garden wall in the town's Swansea Road on 5 April.

  He then abandoned Demi Mabbitt, 25, who was lying seriously injured at the scene.

  On Wednesday Jones was sentenced at Merthyr Tydfil Crown Court to 10 years in jail and branded "inhuman and self centred" by a judge.
