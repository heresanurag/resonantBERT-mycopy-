content: |-
  Experts poring over censuses and newspaper archives have built up a rich picture of their lives.

  Uncovering the men who hid a note in a Scottish lighthouse 132 years ago

  Ross Russell found a bottle containing a 132-year-old letter deep inside the walls of Corsewall Lighthouse

  A rich picture has emerged of the three men who left a message hidden inside the walls of a Scottish lighthouse 132 years ago, thanks to the work of genealogists. Earlier this month BBC Scotland News revealed a bottle containing the note had been found inside the Corsewall Lighthouse Written with quill and ink and dated 4 September 1892, it revealed the names of the three workers who installed a new type of light in the 100ft (30m) tower. Now experts from genealogy firm Findmypast have pored over censuses and newspaper archives to uncover the story of the workers who left the intriguing time capsule. Queen Victoria was on the throne and Gladstone was leading a Liberal government but the genealogists' research reveals details of the ordinary working men who travelled from Edinburgh to leave their mark on the remote lighthouse.

  John Westwood was a 28-year-old millwright - a tradesman who works with machinery - from Edinburgh. He had travelled from the capital to the lighthouse at the most northerly point of the Rhins of Galloway to carry out the project for James Milne & Son. As a millwright, he was following in the footsteps of his father, David Westwood. He ran his own millwright business, with John's eldest two brothers, David, a millwright, and Alexander, a mechanical draughtsman. Born in St Andrews, Fife, in 1864, John was the youngest of eight siblings.

  Corsewall Lighthouse overlooks the North Channel of the Irish Sea.

  His two eldest sisters, Mary and Margaret, worked as domestic servants when John and his other three siblings were still at school. When John reached 16 he too became a millwright. By 1891, John had moved to Edinburgh and was living as a lodger with a widowed pianoforte maker, Richard Honeyman, 70, and his daughter, Helen, 45. A year later he was sent on the Corsewall Lighthouse project. He married Margaret Gow, the 26-year-old daughter of a contractor from Blairgowrie, in 1896. They went on to have three children - John, Jane and Neil. And John Sr lived a long life. He died aged 93 in March 1958 at Edinburgh City Hospital.

  Ross (R) found the bottle with his colleagues Morgan Dennison and Neil Armstrong before giving it to Corsewall Lighthouse keeper, Barry Miller, to open

  James Brodie was 48 when the trio of workers concealed the bottle. He was a James Milne & Sons engineer who had also travelled from Edinburgh. Born in Renfrewshire in 1844, he was the eldest of James and Margaret's five children. Census records show that he was an apprentice engineer when he was 17, and he lived with his parents on George Street in Greenock. His father was a shawl weaver and his mother was a cotton winder. In 1868 he married Annie F Scott in Paisley. By the time he wrote the secret note they had seven children under the age of 14 and were living on Tannahill Place, Paisley.

  The corner of Fox Street in Edinburgh where David Scott once lived

  David Scott was 32 when he left the note in the lighthouse and worked as a labourer for James Milne & Sons. He was born in 1860, the son of Jane and William Scott, a grain loftman in Edinburgh. When he wrote the lighthouse note he was still living with his housekeeper mother, his sister Jane Mackay, a millworker, and her two sons David and William at 40 Fox Street in Edinburgh. Ten years later, 41-year-old David was still single and boarding with the Munro family (James, Jane and their infant son John) at 41 Leith Walk, Edinburgh. He had become more specialised in his trade and was now working as a lead and metal worker.

