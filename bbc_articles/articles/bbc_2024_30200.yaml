  All three men worked for James Milne & Son, a business that was founded "prior to 1750" as brassfounders. In 1821 they fitted the author Sir Walter Scott's Melrose home, Abbotsford, with an oil-gas plant and by 1837 they were making gas meters. Around 1885, they moved from their premises in Edinburgh's High Street to the larger Milton House Works, in Abbeyhill. Their Glasgow branch opened two years later, where they displayed gasoliers, pumps, light-fittings and the Wenham Patent Gas Lamp. By the late 1890s, they were making "lamps for lighthouses" and specialised in aluminium.

  Queen Victoria had been on the throne for 55 years by the time the letter was written

  The bottle containing the note was found by Ross Russell, a Northern Lighthouse Board mechanical engineer, during an inspection. He spotted it after removing panels in a cupboard but it was well out of arm's reach. The team retrieved it using a contraption made from a rope and a broom handle. He said he was blown away to find out about the men who had written the note. "I've touched the note and the bottle but never in my wildest dreams would I have thought we would find out all this about their lives," he said.

  John Wilson (second from the left) is mentioned in the letter. He is pictured with Robert Murray (right), George Craig and an unknown keeper who is believed to have been visiting.

  Jen Baldwin, a research specialist at Findmypast, said: "These rare mementoes offer such a wonderful window into the past. "From just a name, date and location, we've been able to trace some of their stories back in time and build up a rich picture of their lives and the world around them. "This one lighthouse project might appear at first glance simple and remote, but these workers were part of a revolution in technology and engineering during the late 1800s and were enabling ships to safely navigate through a busy sea passage - part of a wider network of trade and travel routes across a global empire." Historian Eric Melvin said: "The Carsewell Lighthouse story of the hidden message in a bottle is absolutely fascinating. "To discover an original contemporary source is always exciting but to find one deliberately hidden away is intriguing. "Did the three engineers plan this together? What motivated them? Did they tell anyone about the hidden bottle and did they leave any clues? "Great credit is due to those who have researched their family stories."
