id: bbc_2025_1405
title: British conductor Edward Gardner sorry for calling Italian opera singers Mafia
  - BBC News
date: '2025-02-18'
section: Culture
url: http://www.bbc.co.uk/news/articles/cde9e57ww72o
content: |-
  Edward Gardner had been threatened with a defamation action by singers at an opera house in Naples.

  A British conductor has apologised for likening singers at one of Italy's leading opera houses to warring Mafia families. Edward Gardner, who is principal conductor of the London Philharmonic Orchestra, was threatened with a defamation action for his comments about chorus members at the Teatro San Carlo in Naples. Speaking to the Times last month about a recent appearance at the venue, Gardner said: "The chorus is made up of two rival Mafia families - who after one performance put each other in A&E." In a statement issued by the opera house, he said he wanted to "sincerely apologise to the members of the chorus of the San Carlo Opera House".

  Gardner explained: "Shortly before my arrival in Naples I was informed that two members of the chorus had a public fight just outside the theatre resulting in one person being hospitalised. I was very surprised by this. "However I did not intend to suggest that the choir were members of the Mafia, and I am more than happy to retract that allegation." Gardner said he had "deep respect and appreciation for the choir and its members", and his appearance in Naples last summer was "a meaningful experience that highlighted the talent, dedication, and hard work of this group". "I regret that anything I said may have suggested otherwise because I have experienced firsthand the professionalism and excellence of this choir and I want to make it clear how much I value and respect everyone involved," he continued. His original comments angered the mayor of Naples, who said they were "very serious allegations that are completely unfounded". Teatro San Carlo's general director Stéphane Lissner said those at the opera house had been "deeply affected by the comments made earlier", and thanked Gardner for his apology. "We welcome with respect and gratitude the desire to clarify and correct what has been said, in recognition of the value and work of our ensemble," Lissner said.
