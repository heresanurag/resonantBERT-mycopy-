title: 'Newspaper headlines: ''Starmer''s uni U-turn'' and ''Polls show dead heat''
  - BBC News'
date: '2024-11-05'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cdd02mgge5ro
content: |-
  A rise in tuition fees at English universities and election day in America make Tuesday's front pages.

  Nativity dolls of Kamal Harris and Donald Trump in Naples, Italy

  The Guardian, external says the US is facing its "moment of reckoning" as voters choose either Kamala Harris or Donald Trump as their new president. The paper calls it an election like none before with a choice between a "black woman and a former president branded a fascist by his own former officials". The headline for the i, external is "America decides - the world holds its breath". It suggests that global leaders from Moscow and Kyiv to Beijing and Tehran are waiting to discover the future of the US. Its editor, Oliver Duff, suggests that Kamala Harris has fought an "unimpressive campaign" but he points out that the alternative is "returning a convicted criminal to the White House".

  The Mirror, external's opinion column states simply "Let's hope it's Kamala". It concludes that Trump is "no friend of Britain". But the Sun seizes on a comment by Trump that the election is "ours to lose", external. It says the former president insists he is on the verge of a historic comeback. The Financial Times, external has front-page pictures of Harris and Trump side by side. It says that although the polls are "razor thin", the Democrats have been cheered by what they believe is a decided shift towards their candidate. Comments by Nigel Farage, external, a Trump ally, make the lead for the Daily Telegraph. It reports that Farage, who is attending Trump's election day party at his home in Florida, has advised his friend to accept the result of the election, if he loses decisively. He is quoted saying if that happens, Trump should "go and play golf at Turnberry".

  The Daily Mail is unimpressed by the government's decision to allow universities in England to raise tuition fees, external for the first time in eight years. The headline is "Now that's what you call a U-turn!" But the Times, external is in favour of the move. Under the headline "degree of confidence", its opinion column argues that the cap on fees has left many universities teetering on the edge of bankruptcy. It thinks raising them amounts to a "confrontation with reality". Finally, the Sun leads on what it calls "Oasis bust-up fears". It suggests the organisers of the band's forthcoming re-union tour are so worried about the possibility of a fresh feud between Liam and Noel Gallagher, they are not going to pay the brothers their joint £6m fee for each gig until they turn up. The headline is "Be here now or you don't get paid".

