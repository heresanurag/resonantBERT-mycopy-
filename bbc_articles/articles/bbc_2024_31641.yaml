title: Digga D supplied cannabis to entourage, Lincoln Crown Court hears - BBC News
date: '2024-12-23'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/cz0rnvj7vm2o
content: |-
  A judge is deciding if the UK drill star was involved in supplying cannabis on "a commercial scale".

  Drill artist Digga D made a small profit of up to £400 on each deal, a court is told

  A leading UK drill star supplied up to 60kg (132lbs) of cannabis on a "commercial" level including socially to his entourage in the music industry, a court has heard. Digga D - real name Rhys Herbert - was arrested near Lincoln in the early hours of 21 February while broadcasting on Instagram Live. He pleaded guilty in May to a charge of smuggling cannabis relating to 11 July 2023. He also admitted supplying cannabis between 26 October 2022 and 21 February 2024. However, a judge at Lincoln Crown Court is deciding if the rapper played a leading role in supplying quantities of the Class B drug on "a commercial scale" after the prosecution did not accept he had imported 3kg (6.6lbs).

  During a trial of the issue, known as a Newton Hearing, Herbert's defence barrister, James Scobie KC, said the artist admitted being a heavy user of cannabis and would also supply cannabis socially to his entourage in the music industry. This included four people who were living with him at his address in Bracebridge Heath, near Lincoln, during the period of the raid. Mr Scobie told the court Herbert, of Lonsdale Road, Notting Hill, London, accepted importing 3kg (6.6lbs) of cannabis and selling about 5kg (11lbs) of the Class B drug on a "sporadic" commercial basis - making a small profit of £300-£400 on each deal. However, prosecutors said the musician played a leading role in supplying cannabis with a quantity of up to 60kg (132lbs).

  Digga D followed the hearing via video link from HMP Wormwood Scrubs where he is remanded in custody

  A prosecution drugs expert who examined messages recovered from Herbert concluded they were consistent with the wholesale kilo supply of Skunk cannabis which had been imported from America, the court heard. Mobile phone footage of the rapper handling a bag of cannabis and allegedly complaining about the poor quality was also played in court. A number of photographs showed Herbert handling large amounts of cash, the prosecution claimed. The court heard two sets of weighing scales and a cannabis grinder were recovered from Herbert's London home in Lonsdale Road. Mr Scobie told the court his client was an internationally recognised musician with a legitimate income and made videos which demonstrated large amounts of cash. At the time of this activity Herbert had earnings in excess of £3m, Mr Scobie said. Herbert is currently remanded in custody at HMP Wormwood Scrubs and is following the hearing via a video link from the prison. Digga D is one of the UK's leading drill performers, with his tracks getting millions of views online. Drill started in Chicago in the early 2010s but, in recent years, UK artists have adopted the genre.

