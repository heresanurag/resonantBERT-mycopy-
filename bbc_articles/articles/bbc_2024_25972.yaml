title: Australia woman rescued after getting stuck between boulders - BBC News
date: '2024-10-22'
section: Australia
url: http://www.bbc.co.uk/news/articles/cgeyezggpezo
content: |-
  The woman spent seven hours upside down between the boulders, with only her feet visible to rescuers.

  Woman reaching for phone gets stuck upside down in boulders

  A young woman spent hours trapped upside down after slipping between two boulders as she tried to retrieve her mobile phone during a hike in Australia. The woman - named in reports as Matilda Campbell, external - was walking in New South Wales' Hunter Valley region earlier this month when she fell into the three-metre crevice. It was the start of a seven-hour ordeal which would see emergency services undertake a "challenging" rescue - including moving several boulders. And even after managing to winch a 500kg (1,100lb) rock out the way, they still had to work out how to get the woman out of the "S" bend she had found herself in.

  “In my 10 years as a rescue paramedic I had never encountered a job quite like this, it was challenging but incredibly rewarding,” Peter Watts, a paramedic with New South Wales Ambulance service, said, according to a release on the service's social media pages. She had already been upside down for more than an hour before rescuers arrived, her friends' initial attempts to free her having been unsuccessful. Photos shared by the ambulance service show her hanging between the boulders by her feet, as well as the complicated efforts to keep the area stable as emergency services tried to create a gap big enough to free her.

  A winch had to be used to lever the largest boulders out the way

  Emergency workers had to pull together to get the woman out

  Mr Watts later described the young woman as a "trooper" in an interview with Australia's ABC, external. "We were all like, how did you get down there - and how are we going to get her out?" Unbelievably, the rescued woman was left with just minor scratches and bruises, NSW Ambulance said. She did not, however, manage to retrieve her phone. "Thank you to the team who saved me you guys are literally life savers," she wrote in a message online. "Too bad about the phone tho."
