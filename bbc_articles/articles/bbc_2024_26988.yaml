  The 31-year-old has "escaped lawful custody while being escorted by prison staff", police say.

  Prisoner on the run after escaping from hospital

  Police are calling for information on the whereabouts of Jonathan Windsor

  A prisoner is on the run after escaping from a Greater Manchester hospital. Jonathan Windsor, 31, has "escaped lawful custody while being escorted by prison staff", Greater Manchester Police said. Windsor is a prisoner at the Sodexo-managed HMP Forest Bank in Salford, with a Sodexo spokesperson saying he was "under escort at a local hospital" at the time of his escape. Police have urged the public not to approach Windsor, but to report any sightings to them.

  Windsor is known to have links across the North West, including south Manchester, police say. HMP Forest Bank is a Category B Local prison for adult males who have either been sentenced or are on remand, and young prisoners between the ages of 18 and 21.
