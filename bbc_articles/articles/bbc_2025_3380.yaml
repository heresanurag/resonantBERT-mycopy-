  Hannah's boyfriend, Alex Klein, also told the court Clifford was a "coward" who would suffer a "miserable fate" for eternity. The judge said the statements had been "difficult to listen to". Although sentences are usually passed at the end of a judge's remarks, Mr Justice Bennathan opened his speech by saying he would impose the whole life orders to spare family and friends "any delay or suspense". The judge addressed Clifford directly, despite the fact that the killer was not in court to hear the verdict. "You first killed [Louise and Hannah's] mother, Carol, who even on that day showed you nothing but kindness in the moments before you attacked her," he said. "You raped and killed Louise, who had been as gentle as she could in ending her relationship with you after your arrogance and anger proved too much for her to stand. "Then you murdered Hannah Hunt, who had done nothing to harm you other than protect her sister."

  Kyle Clifford was told he would never be released from prison

  Mr Justice Bennathan described Clifford as a man "soaked in self-pity" who held women "in utter contempt". Of his victims, the judge added: "They showed a gentle heroism of which you, Kyle Clifford, could only dream." He then went into fuller details of his sentencing considerations. Clifford was also handed further sentences to be served concurrently:
  • None eight years for falsely imprisoning her
  • None a year for possession of an offensive weapon, namely a crossbow
  • None a year for possession of an offensive weapon, namely a knife After concluding his remarks the judge thanked police and the Hunt family, paying tribute to "the astonishing dignity and courage" of the murdered women's family and friends. Mr Hunt and his daughter hugged as the sentencing was passed.

  After the murders in July, a manhunt ended when Clifford was found in a cemetery in Enfield, north London, where he had shot and paralysed himself with a crossbow. Outside the court Det Ch Insp Nick Gardner, senior investigating officer in the case, welcomed the whole-life orders but added "it will never make up for the loss of Louise, Hannah and Carol – three vibrant women in the prime of their lives". "Clifford has again shown himself to be a coward. Clifford armed himself with a crossbow and knife in order to attack three innocent women," he said. "They resisted him bravely, with Hannah raising the alarm, which ultimately helped police catch Clifford. "Then despite overwhelming evidence, Clifford denied raping Louise which meant the Hunt family had to sit through days of distressing evidence."

  John Hunt, father and husband of the murdered women, read statements in court about the impact of the attack

  Lisa Kiff, a senior prosecutor at the Crown Prosecution Service (CPS), said Clifford was a murderer and rapist "who, at every turn, has attempted to escape the gravity of his actions". She explained CPS took the decision to proceed with the rape charge to ensure "full justice was secured for Louise, and to ensure that Clifford could be sentenced for the full extent of his offending". "That decision has been vindicated by his conviction for the rape and by the sentence passed today, as Clifford will never be released from prison," she added.

