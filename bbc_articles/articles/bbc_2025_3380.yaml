title: Crossbow killer Kyle Clifford jailed for triple murders - BBC News
date: '2025-03-11'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cg70vjmv08ro
content: |-
  A judge tells Kyle Clifford he is "soaked in self-pity" and will never be released from prison.

  Kyle Clifford stabbed Carol Hunt (left) before murdering Louise (centre) and Hannah (right) with crossbow bolts

  A man who killed his ex-girlfriend, her sister and her mother in a crossbow attack motivated by "self pity" has been jailed for life and told he would never be released from prison. Kyle Clifford raped his former partner Louise Hunt, 25, then used a crossbow to shoot both her and her sister Hannah, 28, having already fatally stabbed their mother, 61-year-old Carol, at the family home in Bushey, Hertfordshire, in July last year. At Cambridge Crown Court, the judge Mr Justice Bennathan handed the 26-year-old three life sentences with three whole life orders. The women were the wife and daughters of BBC horse racing commentator John Hunt who, in his victim impact statement, described Clifford as a "psychopath" who was able to disguise himself as "an ordinary human being".

  A tearful Mr Hunt read out his full statement in court taking brief moments to regain his composure. He concluded by saying: "The screams of Hell, Kyle, I can hear them faintly now. The red carpet will come out for you." In her victim statement, his other daughter Amy told the court Clifford was a "monster" and what he did "to my baby sister is nothing short of demonic".

