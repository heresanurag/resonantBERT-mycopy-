title: 'Christchurch shootings: The Briton who survived mosque attack - BBC News'
date: '2019-03-20'
section: General
url: http://www.bbc.co.uk/news/world-asia-47644703
content: |-
  Nathan Smith says he doesn't know how he survived the Al Noor mosque attack in Christchurch.

  British-born Nathan Smith is a survivor of the Christchurch mosque attacks on 15 March.

  Mr Smith, who is originally from Dorset, told BBC video journalist Danny Vincent that he doesn't know how he survived the Al Noor mosque attack.

  He also spoke about his memories of fellow worshippers who died in the attack on the mosque where he regularly worships.
