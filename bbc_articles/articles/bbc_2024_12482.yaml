  Adam Spencer, 40, pleads guilty to two counts of burglary and three counts of theft.

  Prolific thief stole 17 tubes of Pringles in one go

  Adam Spencer, 40, was chased down by police in Sutton-in-Ashfield

  A prolific thief who stole 17 tubes of Pringles in a series of burglaries and shop thefts told police “once you pop, you can’t stop”. Adam Spencer, 40, was arrested by officers in Sutton-in-Ashfield, Nottinghamshire, after they recognised him as a suspect on Tuesday. He admitted a series of offences to officers and was charged with two counts of burglary and three counts of theft. Spencer, of Northfield Close, Sutton-in-Ashfield, was given a six-month prison sentence, suspended for a year, at Nottingham Magistrates' Court on Wednesday.

  Police said the series of thefts started on 11 April at Tesco, in Alfreton Road, before Asda in Priestsic Road on 17 April. On 2 May, Spencer broke through the back door of Iceland, also in Priestsic Road, before stealing meat products. He then returned two hours later and stole more than £300 worth of stock. He returned to the store for another theft on 19 May. It was during one of those offences Spencer helped himself to 17 tubs of Pringles, police said, and he later made the comment when questioned “once you pop, you can’t stop” - a nod to the snack's famous advertising slogan. Spencer pleaded guilty to all counts at court on Wednesday. On top of his suspended sentence, he was also ordered to pay £200 in compensation and complete a six-month drug rehabilitation requirement programme. Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
