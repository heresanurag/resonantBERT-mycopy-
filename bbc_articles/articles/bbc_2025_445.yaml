content: |-
  Dean Naujoks filmed the moment he came across American Airlines-branded sugar packets and a document with landing gear procedures.

  Dean Naujoks was in the Potomac River when he came across multiple pieces of debris from Wednesday's midair plane collision. He filmed the moment he came across American Airlines-branded sugar packets and a document with landing gear procedures.

  All 67 people aboard the plane and Army Black Hawk helicopter involved in the crash near Ronald Reagan National Airport lost their lives as a result of the incident.

  The search for victims' bodies is still underway.
