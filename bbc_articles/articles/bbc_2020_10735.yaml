  Italy's president to UK PM: 'We Italians love freedom too'

  The president of Italy has rebuked UK Prime Minister Boris Johnson for suggesting that Britons were more "freedom-loving" than his compatriots. It was in parliament this week that Johnson was asked by a Labour MP whether Italy and Germany had lower Covid-19 infection rates than the UK because of more efficient testing and tracing. "No" the prime minister replied. "There is an important difference between our country and many others around the world - ours is a freedom-loving country," he added. Now, Italian President Sergio Mattarella has responded, telling reporters: "We Italians also love freedom – but seriousness is dear to us as well." Italy, the first country in Europe to be overwhelmed by the coronavirus and impose a national lockdown, appears to have brought the pandemic under control. Mask-wearing is scrupulous, testing is widespread and restrictions have remained in place for a long time. But in a country that fought for independence and liberation from Nazi occupation, its president has reminded Johnson that the love of freedom isn't exclusively a British value.
