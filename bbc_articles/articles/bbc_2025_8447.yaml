title: Surrey woman, 115, becomes world’s oldest person - BBC News
date: '2025-05-01'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cwy0zxzpdd4o
content: |-
  Ethel Caterham, who lives in Lightwater in Surrey, is 115 and 252 days.

  Ethel Caterham celebrated her 115th birthday in Lightwater in Surrey in August

  A woman from the UK has become the oldest person in the world, at the age of 115 and 252 days. Ethel Caterham, who lives at a care home in Lightwater, Surrey, reached the milestone following the death of Brazilian nun Sister Inah Canabarro Lucas, aged 116 on Wednesday. Ms Caterham was born on 21 August 1909 and is the last surviving subject of Edward VII. Celebrating her 115th birthday in August 2024, she said she "didn't know why there was all the fuss".

  She said the secret to her longevity was "never arguing with anyone, I listen and I do what I like". The new record has been confirmed by Guinness World Records and LongeviQuest, a database of the world's oldest people.

  On her 115th birthday, Ms Caterham received a letter from the King congratulating her on a "truly remarkable milestone". The King conveyed his "warmest good wishes" and "hoped that Ethel enjoys her incredibly special day". The letter stated that His Majesty was "heartened to learn about Ethel's fascinating personal history". Ms Caterham was born in Shipton Bellinger, in Hampshire, and was raised in nearby Tidworth in Wiltshire. She was the second youngest of eight children.

  Ms Caterham received a card from the King on her115th birthday

  At the age of 18, she was employed as an au pair to a military family in India. She returned to the UK in 1931 and met her future husband, Norman Caterham. They married at Salisbury Cathedral in 1933. Mr Caterham became a lieutenant colonel in the army, and the couple were stationed in Hong Kong and Gibraltar. She has lived through the sinking of the Titanic, World War One, the Russian Revolution, the Great Depression and World War Two. She has spent the last 50 years living in Surrey and continued driving until she was 97. One of her sisters, Gladys, lived to be 104. She has three granddaughters and five great grandchildren.

  A spokesperson for Hallmark Lakeview Luxury Care Home, where Ms Caterham is a resident, said: "What an incredible milestone and a true testament to a life well-lived. "Your strength, spirit and wisdom are an inspiration to us all. Here's to celebrating your remarkable journey." Ms Caterham is also one of the oldest people to survive Covid-19, after contracting it in 2020 at the age of 110, according to Guinness World Records. Mark McKinley, director of records at Guinness World Records, told the BBC: "Ethel never set out to be a record breaker. "But we're hoping to meet her some time soon and present her with her certificate."

