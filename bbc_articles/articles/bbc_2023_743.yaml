  Speaking on the BBC's Sunday With Laura Kuenssberg programme on Sunday, Prime Minister Rishi Sunak was asked if the institution of the monarchy has been damaged by Prince Harry's book.

  He said he "wouldn't get into talking about the Royal Family but it's something that I'm most proud of when I think about what it is to be British".

  He added he believed the public have "enormous regard for the Royal Family", and the King's coronation "will be another fantastic occasion for the country to come together".

  King Charles was seen on Sunday for the first time since revelations from the book were released.

  Attending morning service at Castle Rising Church in Norfolk, near to his Sandringham estate, he smiled and spoke to those gathered on his arrival.

  King Charles greeted members of the public in Norfolk on Sunday morning
