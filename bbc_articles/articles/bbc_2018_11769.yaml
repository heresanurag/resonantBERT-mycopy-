title: Crowds packed for Boris Johnson Brexit speech - BBC News
date: '2018-10-03'
section: General
url: http://www.bbc.co.uk/news/uk-politics-45726741
content: |-
  People were queuing for hours to hear Mr Johnson attack Theresa May's Brexit plan.

  People were queuing for hours to hear Mr Johnson's latest attack on Theresa May's Brexit plan.

  The former foreign secretary described the prime minister's plans as a "cheat" that could lead to a boost for the far-right.
