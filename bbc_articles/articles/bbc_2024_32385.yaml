  Ilona Maher has brought "so much energy" to Bristol Bears since arriving at the club, fly-half Holly Aitchison says.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ilona Maher: Rugby allows you to express yourself in the fullest way possible

  New signing Ilona Maher has brought "so much energy" to a "giddy" Bristol Bears dressing room after arriving at the club, fly-half Holly Aitchison has said. American Olympic bronze medallist Maher announced on Monday she would join the Premiership Women's Rugby (PWR) team for the rest of the season from January - causing a "massive buzz" in the dressing room for Aitchison and her team-mates. "It's been really lovely to get her here, settle her in a bit and for everyone to get to know her," reflected Aitchison. "She's a gorgeous girl in her own right - she's been fab, she brings so much energy. "So far, she's just loving being around the girls. Everyone's giddy, and rightly so. "She's an icon and bigger than the sport right now. We need those people in our game, so everyone's been a little bit silly."

  Ilona Maher's USA will play hosts England in the opening fixture of the 2025 Women's Rugby World Cup

  Maher is returning to XVs after three years playing sevens, including helping her country win their first Olympic medal in the discipline with a dramatic late victory over Australia in Paris in July. The 28-year-old, whose 4.5 million Instagram followers and 3.2 million TikTok fans make her the most followed rugby union player in the world on social media, has already impressed Ward and the squad in training. "I thought she would be a bit more jetlagged, if I'm honest," said Aitchison. "I didn't realise she was going to do so much. "It was great - with the sevens, her core skills are so good, so it's really easy for her to step in and understand what we're doing. "It'll be a bit different when we come to the team sessions and she has to understand all the structures. That'll be fun when she gets to that stuff and it'll be more complicated. "People are surprised, maybe, by how normal she is. She just takes everything in her stride - it doesn't feel like you've got a massive celebrity in the room like she is. From what I gauge, she's super-cool and super-chill."

  Aitchison is part of a squad who are fourth after winning five of their first seven league games

  Maher, who has just finished as runner-up in US primetime show Dancing with the Stars, will meet fans at Ashton Gate when Bristol host league leaders Exeter Chiefs on Saturday. The three-time Olympian wants to play XVs international rugby at next year's World Cup in England and has encountered Aitchison during her sevens career with the USA Eagles. "I played against her for a few years," said Aitchison. "She is a physical presence - that's definitely her USP within the sevens circuit - but I was saying to the girls that you don't realise how quick she is. "That's maybe the thing people miss: the blend she has of power and speed. It's really exciting to see where that will fit in XVs. "She's got so many amazing attributes that she can have a look at a few positions. "She's spoken about wing, centre and potentially having a dabble in the forwards. It's about what she wants and where [head coach] Dave [Ward] sees her fitting in. "You always look to bolster your squad in any way you can and she's going to be a massive asset for us."

  Maher's performances and profile have made her a role model and the venue for her potential debut, against reigning English champions Gloucester-Hartpury on 5 January, has already been moved to Ashton Gate "due to unprecedented demand". Ward has emphasised that Maher will only feature in the game if she is ready, while her wider influence is a source of admiration for Aitchison. "It's been amazing to have her here," said the 2020 Olympian. "She's done so much for women's sport and particularly rugby. "It's good to get more eyes on the game and a massive boost for the league. I love everything she stands for. "I love how she's empowering young girls and everyone in rugby. She knows exactly who she is and that's something we can share views on. "It's been pretty cool and I'm looking forward to getting to know her better."
