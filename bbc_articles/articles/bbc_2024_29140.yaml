content: |-
  A local resident filmed the moment Tenbury Wells flooded after the rising Kyre Brook caused a wall to collapse.

  A local resident captured the moment Tenbury Wells town centre flooded, after the nearby Kyre Brook rose and caused a wall to collapse.

  Rescue workers in the Worcestershire town can be heard telling people to "get back" as the waters quickly spread.

  There have been no reports of injuries in the town.

  Storm Bert has brought strong winds and rain to parts of the country, with yellow weather warnings in place for western parts of Scotland, Wales, south east England and Northern Ireland.
