  "All I see is a man that has let me and many victims down," says the woman who adds that the Church failed to explain to her how Tudor had returned to the priesthood. The woman talked of this being a particularly difficult Christmas for her because it was her first without her grandmother who died earlier this year. "When she found out what David Tudor had done to me she never set foot in a church again. She knew what was right and wrong, she felt compassion for me and immediately knew what to do," she says. "It is in complete contrast to the actions of the Church." Tudor was arrested in April 2019 on suspicion of indecent assault but the case was dropped in August 2022. He was sacked as a priest this October after admitting sexual misconduct to a Church of England tribunal. Surrey Police said last month they would review allegations of "non-recent indecent assault offences" against a man in the light of the tribunal's findings. Tudor has not responded to any of the BBC's requests for comment.
