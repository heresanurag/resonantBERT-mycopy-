title: Body found in search for missing teenager - BBC News
date: '2017-09-22'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-41353321
content: |-
  Libbi Toledo, 17, was last seen more than a week ago in Kirkcaldy, Fife.

  Police have released a new image of Libbi

  Police searching for a missing teenager have found a body on an area of land cordoned off in Kirkcaldy, Fife.

  The body of a female was discovered at a disused scrapyard at the junction of the town's Denburn Road and Smeaton Road at about 14:00.

  Officers had been looking for Libbi Toledo, 17, who was last seen in Veronica Crescent at about 13:00 on Monday 11 September.

  Formal identification of the body is yet to take place.

  A police cordon remains in place at the scene

  Following the discovery, police said the death of the woman was being treated as unexplained pending further inquiries.

  A report will be submitted to the procurator fiscal.

  A news conference where Libbi Toledo's mother was to make an appeal was cancelled earlier after police said there had been a significant development.

  Police had been investigating a number of sightings of the teenager in the town in recent days.

