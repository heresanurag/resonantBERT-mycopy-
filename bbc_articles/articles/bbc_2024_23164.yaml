title: 'Anna Sebastian Perayil: Death of Indian employee sparks debate on ''toxic
  work culture'' - BBC News'
date: '2024-09-25'
section: Asia
url: http://www.bbc.co.uk/news/articles/c0kjgp4jr5yo
content: |-
  Anna Perayil's parents allege she died four months after starting a job because of "overwhelming work stress".

  Employees in India say they are often overworked and underpaid

  The tragic death of a 26-year-old Indian employee at a leading accounting firm has ignited a serious debate about workplace culture and employee welfare in corporate environments. Anna Sebastian Perayil, a chartered accountant at Ernst & Young (EY), died in July, four months after joining the firm. Her parents have alleged that the "overwhelming work pressure" at her new job took a toll on her health and led to her death. EY has refuted the allegation, saying that Perayil was allotted work like any other employee and that it didn't believe that work pressure could have claimed her life. Her death has resonated deeply, sparking a discussion on the "hustle culture" promoted by many corporates and start-ups - a work ethic that prioritises productivity, often at the expense of employee well-being. Some argue that this culture drives innovation and growth, with many choosing extra hours out of passion or ambition. Others say that employees are often pressured by management, leading to burnout and a diminished quality of life. Perayil's death came under the spotlight after a letter written by her mother Anita Augustine to EY went viral on social media last week. In the letter, she detailed the alleged pressures her daughter had experienced at work, including working late into the night and on weekends, and appealed to EY to "reflect on its work culture" and take steps to prioritise its employees' health. "Anna's experience sheds light on a work culture that seems to glorify overwork while neglecting the very human beings behind the roles," she wrote. "The relentless demands and the pressure to meet unrealistic expectations are not sustainable, and they cost us the life of a young woman with so much potential." Many people condemned EY for its "toxic work culture", sharing their experiences on Twitter and LinkedIn. One user alleged that he had been made to work for 20 hours, external a day at a top consultancy firm without being paid overtime. "Work culture in India is horrid. Pay is dismal, exploitation is max [maximum]. There are zero repercussions and no remorse on the part of employers who routinely harass workers," another user wrote, external, adding that managers are often praised for overworking and underpaying their employees. A former EY employee criticised the work culture, external at the firm and alleged that employees were often "mocked" for leaving on time and "shamed" for enjoying weekends. "Interns [are] given crazy workload, unrealistic timelines and [are] humiliated during reviews as it builds character for their future," he wrote.

  Narayan Murthy's comments on a 70-hour work week was criticised by many

  EY's India chief, Rajiv Memani, has since said that the firm attaches the "highest importance" to the wellbeing of its employees. "I would like to affirm that the wellbeing of our people is my top-most priority and I will personally champion this objective," he wrote in a post, external on LinkedIn. Perayil's death isn't the first incident that has brought India's work culture under scrutiny. In October last year, Infosys co-founder Narayana Murthy faced criticism for suggesting that young Indians should work 70-hour weeks to boost the country's economic growth. His views were backed by Ola's India chief Bhavesh Aggarwal, who said that he didn't believe in the concept of work-life balance because, external "if you are enjoying your work, you will find happiness in life also and work also, and both of them will be in harmony". In 2022, Shantanu Deshpande, founder of the Bombay Shaving Company, asked youngsters to stop "cribbing" about working hours and suggested that new recruits at any job should be prepared to work 18 hours a day for the first four to five years of their career. But mental health experts and labour rights activists say that such demands are unfair and put employees under immense stress. In her letter, Perayil's mother alleged that her daughter had experienced "anxiety and sleeplessness" soon after joining EY.

  Experts say firms have institutionalised hustle culture, and employees have accepted it

  India is known to have one of the most overworked workforces globally. A recent report, external by the International Labour Organisation said half of India's workforce worked for over 49 hours each week, making India the second country after Bhutan to have the longest working hours. Labour economist Shyam Sunder said India's work culture had shifted post-1990s with the rise of the service sector, leading firms to bypass labour laws to meet round-the-clock demands. He added that the culture has now been "institutionalised" by firms but it has also been accepted by employees. "Even in business schools, students are tacitly told that working long hours to earn a high salary is normal and even desirable," he said. According to him, for there to be any real change in corporate culture, a "mindset shift" is necessary - one where both firms and employees approach work with a more mature outlook, viewing it as important, but not the only part and purpose of life. "Till then, all the other steps by corporates, like offering period leave or partnering with mental health firms will remain supplementary at best and symbolic at worst," he said. Chandrasekhar Sripada, a professor at the Indian School of Business, agrees with this view. He said that toxic work culture was a "complex, multi-stake holder problem" and that everyone, from industry leaders to managers to employees and even society, would have to change the way they viewed productivity in order for there to be any real change. "We're still confusing hard work with productive work," Mr Sripada said. "The point of technology is to reduce human work so why are working hours getting longer?" "We need to start focussing on sustainable growth, not just from an environmental standpoint, but also from a labour rights perspective," he added. "Scandinavian countries have already created much gentler working environments, so there are models for India to follow. All it needs is willpower."
