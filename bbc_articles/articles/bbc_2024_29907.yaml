content: |-
  As well as winning over Hispanic voters, Trump improved his position in some surprising corners.

  'It's simple, really' - why Latinos flocked to Trump's working-class coalition

  Donald Trump has soared to a decisive election victory over Kamala Harris, lifted up by some of the very voters that Democrats once relied on. The Republican president-elect showed strength with the white working-class voters who first propelled him to the White House in 2016, while racking up huge support from Latino voters and putting in a better-than-expected performance among younger Americans, especially men. Among Latinos, a key part of the Democratic voter base for decades, Trump benefited from a mammoth 14 percentage-point bump compared to the 2020 election, according to exit polls.

  Nowhere is Trump's reshaping of the electorate more apparent than in the states of Pennsylvania, Michigan and Wisconsin, the highly coveted "blue wall" that helped propel Joe Biden to victory in 2020. This time, Trump won all three states, crushing Democrats' hopes that Harris could find a path to victory despite early election night losses in the southern states of North Carolina and Georgia. In his victory speech in Florida, Trump - who is set to win the popular vote too - credited the result to "the biggest, the broadest, the most unified coalition" in American history. "They came from all quarters. Union, non-union, African American, Hispanic American," he told a roaring crowd. "We had everybody, and it was beautiful." In Pennsylvania, the prized battleground state, Trump benefited from a huge swell of support from the state's growing Latino population.

  There were about 600,000 eligible Latino voters in Pennsylvania, including a significant Puerto Rican population

  Exit polls suggested Latinos in Pennsylvania amounted to about 5% of the total vote. Trump garnered 42% of that vote, compared to 27% when he ran against Joe Biden in 2020. The polls will continue to change as votes are counted, but are broadly representative of electoral trends. In the state's "Latino belt" - an eastern industrial corridor that has shifted to the right in the last two elections - some voters said they were not surprised by the result. "It's simple, really. We liked the way things were four years ago," said Samuel Negron, a Pennsylvania state constable and member of the large Puerto Rican community in the city of Allentown. Mr Negron, and other Trump supporters in the now majority-Latino city, listed other reasons that their community was drifting towards Trump, including social issues and a perception that their family values now align more with the Republican Party.

  The most common factor, however, was the economy - specifically, inflation. "Out here, you pay $5 for a dozen eggs. It used to be $1, or even 99 cents," Mr Negron added. "A lot of us have woken up, in my opinion, from Democratic lies that things have been better. We realised things were better then."

  Media members and Republican supporters at a watch party in Wisconsin

  Ahead of the election, polls also suggested that many Latinos - across the US and in Pennsylvania specifically - were drawn to Trump's proposals to block migrants at the US-Mexico border and enact much stricter immigration laws. Daniel Campo, a Venezuelan-American, said that Trump's claims of creeping "socialism" reminded him of the situation he left in his home country. "I understand what [migrants] are leaving. But you have to do it the right way. I came the right way," he said. "Things have to be done legally. Many of us were worried that the borders were just open" under the Biden-Harris administration, he said. Collectively, the Latino shift towards Trump, his hold on white working-class voters and his increased support among non-college educated voters in general created an insurmountable obstacle for the Harris campaign. But Trump also improved his position in some surprising corners. In 2020 Joe Biden had a 24-point advantage with voters under 30. This time, that lead shrank to just 11 points. While nationally black voters still overwhelmingly supported Harris (85%), in Wisconsin Trump's support among that demographic more than doubled, from 8% in 2020 to 22% this election.

