  At about 20:14, Mr Floyd "stiffened up, fell to the ground, and told the officers he was claustrophobic", according to the report.

  Mr Chauvin arrived at the scene. He and other officers were involved in a further attempt to put Mr Floyd in the police car.

  During this attempt, at 20:19, Mr Chauvin pulled Mr Floyd away from the passenger side, causing him to fall to the ground, the report said.

  He lay there, face down, still in handcuffs.

  That's when witnesses started to film Mr Floyd, who appeared to be in a distressed state. These moments, captured on multiple mobile phones and shared widely on social media, would prove to be Mr Floyd's last.

  Mr Floyd was restrained by officers, while Mr Chauvin placed his left knee between his head and neck.

  For more than nine minutes, Mr Chauvin kept his knee on Mr Floyd's neck, the prosecutors say. The duration was initially given as eight minutes and 46 seconds but Minnesota prosecutors have since revised the time.

  The transcripts of bodycam footage from officers Lane and J Alexander Kueng show Mr Floyd said more than 20 times he could not breathe as he was restrained. He was also pleading for his mother and begging "please, please, please".

  At one point, Mr Floyd gasps: "You're going to kill me, man."

  Derek Chauvin is charged with second degree murder

  Officer Chauvin replies: "Then stop talking, stop yelling. It takes heck of a lot of oxygen to talk."

  Mr Floyd says: "Can't believe this, man. Mom, love you. Love you. Tell my kids I love them. I'm dead."

  A female bystander told the police: "His nose is bleeding, come on now."

  About six minutes into that period, Mr Floyd became non-responsive. In videos of the incident, this was when Mr Floyd fell silent, as bystanders urged the officers to check his pulse.

  Officer Kueng did just that, checking Mr Floyd's right wrist, but "couldn't find one". Yet the other officers did not move.

  At 20:27, Mr Chauvin removed his knee from Mr Floyd's neck. Motionless, Mr Floyd was rolled on to a gurney and taken to the Hennepin County Medical Center in an ambulance.

  He was pronounced dead about an hour later.

  This video can not be played To play this video you need to enable JavaScript in your browser. In June Panorama spoke to local people to piece together the moments leading up to George Floyd's death

  On the night before his death, Mr Floyd had spoken to one of his closest friends, Christopher Harris. He had advised Mr Floyd to contact a temporary jobs agency.

  Forgery, he said, was out of character for Mr Floyd.

  "The way he died was senseless," Harris said. "He begged for his life. He pleaded for his life. When you try so hard to put faith in this system, a system that you know isn't designed for you, when you constantly seek justice by lawful means and you can't get it, you begin to take the law into your own hands."

  George Floyd dies after being arrested by police outside a shop in Minneapolis, Minnesota. Footage shows a white officer, Derek Chauvin, kneeling on Mr Floyd’s neck for several minutes while he is pinned to the floor. Mr Floyd is heard repeatedly saying "I can’t breathe". He is pronounced dead later in hospital. Four officers involved in the arrest of George Floyd are fired. Protests begin as the video of the arrest is shared widely on social media. Hundreds of demonstrators take to the streets of Minneapolis and vandalise police cars and the police station with graffiti. Protesters lie on the streets in Portland, Oregon Protests spread to other cities including Memphis and Los Angeles. In some places, like Portland, Oregon, protesters lie in the road, chanting "I can’t breathe". Demonstrators again gather around the police station in Minneapolis where the officers involved in George Floyd’s arrest were based and set fire to it. The building is evacuated and police retreat. President Trump blames the violence on a lack of leadership in Minneapolis and threatens to send in the National Guard in a tweet. He follows it up in a second tweet with a warning "when the looting starts, the shooting starts". The second tweet is hidden by Twitter for "glorifying violence". Members of a CNN crew are arrested at a protest A CNN reporter, Omar Jimenez, is arrested while covering the Minneapolis protest. Mr Jimenez was reporting live when police officers handcuffed him. A few minutes later several of his colleagues are also arrested. They are all later released once they are confirmed to be members of the media. Former Minneapolis police officer Derek Chauvin after being charged over the death of George Floyd Former Minneapolis police officer Derek Chauvin, 44, is charged with murder and manslaughter. The charges carry a combined maximum 35-year sentence. Demonstrators set fire to rubbish in New York Violence spreads across the US on the sixth night of protests. A total of at least five people are reported killed in protests from Indianapolis to Chicago. More than 75 cities have seen protests. At least 4,400 people have been arrested. Curfews are imposed across the US to try to stem the unrest. President Trump threatens to send in the military to quell growing civil unrest. He says if cities and states fail to control the protests and "defend their residents" he will deploy the army and "quickly solve the problem for them". Mr Trump poses in front of a damaged church shortly after police used tear gas to disperse peaceful protesters nearby. Tens of thousands of protesters again take to the streets. One of the biggest protests is in George Floyd’s hometown of Houston, Texas. Many defy curfews in several cities, but the demonstrations are largely peaceful. A memorial service for George Floyd is held in Minneapolis. Those gathered in tribute stand in silence for eight minutes, 46 seconds, the amount of time Mr Floyd is alleged to have been on the ground under arrest. Hundreds attended the service, which heard a eulogy from civil rights activist Rev Al Sharpton. As the US saw another weekend of protests, with tens of thousands marching in Washington DC, anti-racism demonstrations were held around the world. In Australia, there were major protests in Sydney, Melbourne and Brisbane that focused on the treatment of indigenous Australians. There were also demonstrations in France, Germany, Spain and the UK. In Bristol, protesters tore down the statue of a 17th century slave trader and threw it into the harbour. Pallbearers bring the coffin into the church A funeral service for George Floyd is held in Houston, Mr Floyd’s home town. Just over two weeks after his death in Minneapolis and worldwide anti-racism protests, about 500 guests invited by the Floyd family are in attendance at the Fountain of Praise Church. Many more gather outside to show their support.
