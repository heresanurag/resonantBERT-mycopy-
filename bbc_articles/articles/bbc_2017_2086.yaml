title: Tom Hardy on CBeebies is mums' Valentine's Day delight - BBC News
date: '2017-02-14'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38965921
content: |-
  News that Tom Hardy will read the Bedtime Story on CBeebies on Valentine's Day has been met with delight on social media.

  The trailer had more than four million views after it was posted on Facebook.

  The star, whose films include The Dark Knight Rises and Mad Max: Fury Road, will read The Cloudspotter by Tom McLaughlin at 1850 GMT.
