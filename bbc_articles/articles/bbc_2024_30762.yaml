  Glasgow Warriors' late fightback is not quite enough to overhaul Toulon in a gripping Champions Cup encounter.

  Glasgow edged out by Toulon in Champions Cup thriller

  Josh McKay scored the pick of Glasgow's four tries

  Glasgow Warriors' late fightback was not quite enough to overhaul Toulon in a gripping Champions Cup encounter. Franco Smith's side return to Glasgow with two bonus points, but will perhaps look back on the game with a tinge of regret. They went into half-time trailing by a solitary point despite playing 10 of the opening 40 minutes against 13 men, a penalty try and Josh McKay's team score answering Leicester Fainga'anuku's try and two Marius Domon penalties. However, when Glasgow prop Sam Talakai was sin-binned, Toulon ruthlessly took advantage. Fainga'anuku went through a hole in midfield for his second try, before former Glasgow lock Brian Alainu'uese crashed over to stretch the lead further after Duncan Weir had kicked a penalty for Glasgow. This Warriors team rarely go down without a fight though and, with the bench emptied, they gave themselves a chance. Jare Oguntibeju went over for his first try in Glasgow colours and, although Johnny Matthews scored his customary try in the final minute, it was not enough. Toulon's superior goal-kicking proved decisive in a match decided by the finest of margins.

  A much-changed Warriors side struggled to get going in the early stages. The home side played the majority of the game in Glasgow territory, and it soon translated into points. Fainga'anuku drove over from close range after Danny Priso and Charles Ollivon had combined nicely. Scrum-half Serin converted. The next 15 minutes or so were tightly contested, but the momentum swung Glasgow's way in a remarkable minute of play. Serin was sin-binned for cynically slowing a Warriors attack down and, from the resulting penalty, Glasgow were awarded a penalty try when an ominous rolling maul was hauled to ground. Lewis Ludlum was also shown yellow, and suddenly Glasgow were level and with a two-man numerical advantage. However, they were unable to profit. Toulon managed the game cleverly and two Domon penalties both managed the scoreboard and ate up precious seconds for the hosts. Glasgow hit back through McKay's magnificent try - the New Zealander racing away after lovely hands from Sione Tuipulotu, Stafford McDowall and Henco Venter who had released him. It looked to be a game-changing moment, but the half-time break came just when Toulon needed it and Talakai's yellow card hamstrung the visitors. They were unable to cope with their lack of numbers as Toulon had and, although their spirited late surge led to them taking two points from the south of France, it could and perhaps should have been five. Even that is credit to the work done by Smith in recent seasons. Given the amount of changes to the starting XV, Glasgow went into the game as definite underdogs.
