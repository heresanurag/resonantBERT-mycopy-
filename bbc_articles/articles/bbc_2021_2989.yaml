  At his first press conference, the president called overcrowded conditions “unacceptable” but defended his immigration policies.

  Factcheck: Do more people migrate in the winter months?

  Earlier, Biden said: “There is a significant increase in the number of people coming in the border in the winter months of January, February, March. It happens every year”. He said people are coming across because of the situations they face in their home countries and because it is easier to travel in the cooler winter months, compared to the hot summer. The US Customs and Border Protection agency releases monthly figures of the number of “encounters” at the southwest land border. In January and February 2021, 78,442 and 100,441 people were apprehended - this is a significant increase of the same months for the previous years, at just over 36,000 for those two months. The highest number in the last few years was in May 2019 - over 140,000 people were apprehended by the authorities. So, looking at the figures, the numbers of people apprehended at the border fluctuates greatly - but it doesn’t always appear to go up during the winter months.
