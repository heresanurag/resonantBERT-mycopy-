content: |-
  The BBC will lose one of its highest-profile presenters when he stops hosting Match of the Day.

  How Gary Lineker went from football sensation to BBC star

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: 'Any good?' Lineker kicks off 25 years as MOTD host

  Gary Lineker, who will leave Match of the Day at the end of this season, BBC News understands, has been the steady hand who guided millions of fans through football's agonies and ecstasies. As host of the flagship show for 25 years, he is also one of the corporation's highest-profile presenters, earning £1.3 million last year. His one-line pay-offs at the end of each show, summing up both the fans' mood and the match, may have looked seamless. But they were the result of years of honing his craft and presenting skills.

  Gary Lineker celebrated qualifying for Euro 92 after the match between Poland and England in 1991

  As a former footballer of considerable pedigree - including England captain and striker, with 48 goals in 80 appearances - he famously never received a red or yellow card during his career. His ability to keep his cool on the pitch stood him in good stead for a career in live broadcasting when he retired as a player in 1994.

  Even while he was still at school, he had his sights set on sports journalism, deciding it would be his fall-back if football didn't work out.
  • None Gary Lineker to leave BBC's Match of the Day Known for his ability to find gaps in the opposition's defence, and his "poacher's instinct" , Lineker was the 1986 World Cup Golden Boot winner, and the top goal-scorer in England three times, each with a different club: Leicester City, Everton and Tottenham Hotspur. But while his sports career was at its peak at the 1986 and 1990 World Cup finals, Lineker spent time with journalists staying in the same hotel as the England team. "As early as my mid-20s, I knew which direction I wanted to go in when I retired from playing," he told the BBC in 2014. "I would watch the newspaper guys write their opening paragraphs and sit with the radio journalists and talk to them about how they did their job." His ultimate aim was to end up as the presenter rather than a pundit. But he admitted his transition into radio and TV "took a lot of work".

  Lineker won the Golden Boot, for leading goal scorer, at Mexico's 1986 World Cup

  His early broadcasting attempts were "fairly appalling", he told the BBC's Media Show's Ros Atkins in 2021. Starting out on Radio 5 Live "was all part of the learning process", he said. "I managed to stumble my way through it, and I learned from really good people alongside me who were incredibly helpful in the early days." Lineker built on that experience, writing all his own scripts, external and carving out a role for himself. Having watched ex-sports stars David Gower presenting the cricket and Sue Barker presenting the tennis, he questioned why it wasn't the same in football. “I just thought, as a player who’s played right at the top, if I could crack presenting it would give me a niche," he told BBC Radio 4 podcast Don't Tell Me the Score in 2019. "It would give me an advantage over all the others." Meanwhile, his popularity as a footballer endured. In 1991, Arthur Smith and Chris England wrote a stage play called An Evening With Gary Lineker, about a couple trying to rekindle their marriage during the 1990 World Cup semi-final. Starring Caroline Quentin, Clive Owen, Paul Merton and Martin Clunes, it was filmed for TV in 1994 - with Lineker making a cameo appearance.

  David Gower, Nick Hancock, Rory McGrath and Gary Lineker on They Think It's All Over in 2002

  He also began building his wider TV career, appearing as a team captain on BBC One's comedy panel show, They Think It's All Over, from 1995 to 2003. As a presenter, he got himself noticed when he stood in for Des Lynam on the Saturday afternoon sports show Grandstand, in 1997. By the mid-90s, Lineker was also appearing on Match of the Day as a pundit. This gave him a prime learning spot - right next to its experienced and slick host Lynam. "Des was very helpful - I used to ask a lot of questions about the little things that he did, and picked up some of his nuances," the former footballer said. "He told me to be brave occasionally with closing lines, and not to be afraid to try to be amusing. "Again, the little pay-offs I sometimes make at the end of the show are something that came from him."

  Lineker said Des Lynam was "the doyen of sports presenters and a tough act to follow"

  By 1999, Lineker was hosting the show, and reaching audiences the BBC sometimes struggled to attract and retain. People would also tune in to see his chemistry with the show's pundits - including other former footballers such as Alan Shearer, Ian Wright, Micah Richards and Alan Hansen. Lineker's questions kept the analysis flowing, while he was always willing to share a joke and opinion of his own. He also memorably introduced the show in his pants in 2016, having pledged to "do the first MOTD of next season in just my undies" if his former club Leicester won the Premier League, which they did. Their friendships often shone through. In June this year, Lineker and Shearer sent an emotional message of support to Hansen, after hearing the news that he was seriously ill in hospital.

  Climbing to the top: Lineker tries out a climbing wall

  But despite his rapport with his colleagues, off-screen matters were not as straightforward. As one of the BBC's highest-paid presenters, regularly topping the list of the staff whose salaries are declared, he faced constant scrutiny. Lineker did not shy away from speaking out about his own views, particularly on social media, while simultaneously working for a broadcaster committed to impartiality. In March last year, he posted on X about the government's asylum policy - resulting in the BBC briefly suspending him. Shearer, Wright and other BBC sport presenters refused to appear on air, in protest at his absence. Match of the Day was reduced to a 20-minute edition minus its host, pundits and commentary - and the story made headline news for several days, with politicians and media commentators all weighing in on the issue. BBC director general Tim Davie subsequently apologised to licence fee payers for the disruption, calling it a "difficult day" for the corporation. Lineker was reinstated nine days later. The presenter later said the response to his tweet was "silly - it shouldn't have been". "I love the BBC. I've been there for nearly 30 years but people make mistakes, they recognise that and they addressed it and in the end, thankfully, we're all back to work," he said.

  Gary Lineker and Alan Shearer have fronted many major football tourments

  The headlines and dramas generated by his online views reinforced not only his high celebrity status - but also how keen the BBC was to hang on to him. The incident prompted a review of BBC social media guidelines. Last September, new rules were published for BBC flagship presenters, saying they should be allowed to express views on issues and policies, but stop short of political campaigning. Lineker said the recommendations were "all very sensible". By February this year, he said he was using X less often, saying the platform had become "increasingly toxic" under its new owner, Elon Musk. Despite this, he and the BBC are still parting company, and its flagship football show no longer has a host. Lineker has plenty of outside business interests, including the successful podcast production company he co-founded, called Goalhanger. It produces shows including The Rest Is History, The Rest Is Entertainment and The Rest Is Politics, which won the Champion prize at this year's Podcast Awards. But for the BBC, Lineker's departure comes hot on the heels of several scandals. Former Match of the Day and The One Show host Jermaine Jenas was sacked in August following complaints about workplace conduct. In September, the BBC apologised to Amanda Abbington and upheld some of her complaints against her 2023 Strictly dance partner Giovanni Pernice, while clearing him of the most serious allegations. In the same month, Mr Davie said he could not see disgraced ex-news presenter Huw Edwards working at the corporation again. Edwards was given a six-month prison sentence, suspended for two years, after he admitted charges of making indecent images of children. So the BBC is in need of some good headlines - and Lineker's departure means it now has to find an exceptional host to fill his shoes, which will not be an easy task.
