title: Detroit-bound plane returns to Heathrow due to windscreen crack - BBC News
date: '2025-06-07'
section: London
url: http://www.bbc.co.uk/news/articles/c14ky1gpmmro
content: |-
  The aircraft was flying to the US when the pilot reported an issue with the windscreen.

  An Airbus A330-200 had taken off from London Heathrow a short time before the windscreen issue was reported

  A passenger plane from Heathrow to Detroit had to return to the London airport due to a cracked windscreen. Delta Air Lines flight 017 was carrying 188 passengers and 12 crew on board when the pilot reported the fault shortly after taking off at 11:44 BST on Saturday morning. The crew followed procedure by returning to London Heathrow, where the plane landed safely a short time later, the airline said. Some customers were re-booked onto flights later today and those who could not be offered flights until tomorrow were offered meals and hotel rooms, Delta Air Lines said.

  The aircraft, an Airbus A330-200, is being assessed and maintenance is being carried out, according to the airline. No other flights were disrupted as a result of the incident, Heathrow Airport said.
