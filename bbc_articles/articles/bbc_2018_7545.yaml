title: Cristiano Ronaldo 'to accept fine and suspended jail term' in tax case - BBC
  News
date: '2018-06-16'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-44499138
content: |-
  Cristiano Ronaldo reportedly agrees to accept a fine and suspended jail term to settle tax evasion charges.

  The news came hours before Ronaldo scored a hat-trick against Spain

  Footballer Cristiano Ronaldo has reportedly agreed to accept a €18.8m (£16.4m) fine and a suspended jail term to settle tax evasion charges.

  The Real Madrid and Portugal footballer, 33, was accused last year of defrauding tax authorities of €14.8m, charges he denies.

  Ronaldo offered to pay €14m in June 2017 but the government rejected the offer, the El Mundo newspaper reported.

  The news came before he scored a hat-trick against Spain in the World Cup.

  Spanish courts have recently cracked down on tax evasion among footballers.

  Ronaldo is unlikely to serve any time in prison under the deal - reportedly a verbal one at this stage. Under Spanish law, a two-year sentence for a first offence can be served on probation, with no requirement for custody.

  Any deal would have to be agreed to by Spain's tax agency. It has accused the footballer of trying to hide money linked to image rights made between 2011 and 2014.

  He denied the claims and his agency has yet to comment on the latest reports.

  The timing of the news has raised questions, however. It came just hours before Ronaldo was due to play for Portugal in the match against Spain at the Fisht Olympic Stadium in Sochi, Russia.

  But it did not appear to affect his performance as he scored all three Portuguese goals including a late equaliser that meant the game ended 3-3.

  Back in 2010, as the financial crisis deepened, Spain lifted a tax exemption that had become known as the "Beckham law", which had allowed footballers to curb their taxes.

  Barcelona's Lionel Messi was given a 21-month prison sentence in 2017 on similar charges to Ronaldo but under Spanish law was able to pay a fine instead.
