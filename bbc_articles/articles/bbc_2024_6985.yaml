title: 'Anthony Joshua vs Francis Ngannou: Briton rediscovers swagger as rival Tyson
  Fury watches on - BBC Sport'
date: '2024-03-09'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/68517685
content: |-
  Anthony Joshua rediscovers his swagger with a destructive win over Francis Ngannou as British rival Tyson Fury watches on.

  Anthony Joshua extends his record to 28 wins and three defeats

  Sometimes, a fighter just has that look in his eye. Anthony Joshua was blissfully unaware of the drowsy steward slumped next to the railings in the Kingdom Arena, or the panic-stricken British reporter worrying if he would make his flight in less than five hours. It was 03:30 local time when the Briton strutted to the ring with the look of a man already certain of the outcome. Francis Ngannou bounced up and down on his toes. He saluted his fans who excitedly blew their vuvuzela horns. But in a blink of some weary eyes, the fight was over. Joshua scored a brutal second-round stoppage win over the former UFC champion. The rejuvenated steward was back on his feet and the journalist would make his flight with time to spare. "I've got the will to win and that's what's most important," Joshua said to the media an hour later. "Half of these people thought he was going to beat me. I can see you lot. You lot thought he was going to beat me. "I just do what I do. Do my best. Get the job done. I don't do it to prove anything. I just do it for myself." It was a statement victory made all the sweeter with Joshua's arch-nemesis, compatriot Tyson Fury, watching on. Just 133 days ago, in the same arena and against the same opponent, Fury fought tooth and nail with Ngannou in a split decision points win that could have gone either way. "Francis Ngannou beat the WBC heavyweight champion of the world. I should be the WBC heavyweight champion of the world right now. You know what I mean? I think he beat [Fury]," Joshua said.

  Boxing debutant Ngannou dropped Fury in the third round of their October bout but was still very much an unknown quantity coming into his second bout. "Did I expect to win? I do my best," Joshua added. "I don't like to predict anything. Heavyweight boxing is a league of its own, different division. Anything can happen. "I just work hard, extremely hard. I think I can work harder, be a bit more dedicated." Fury will contest the undisputed heavyweight crown against WBA, WBO and IBF champion Oleksandr Usyk in May. A rematch is already in place but Saudi organisers and promoter Eddie Hearn would like the winner to face Joshua. But rather than call out the champions or hype up his victory, Joshua - as he has done throughout fight week - kept it low key. Instead he used his time on the mic in the post-fight news conference to pay credit to trainer Ben Davison. Davison - who previously trained Fury - linked up with Joshua late last year and has now guided him to two commanding stoppage wins. "I've always had a tool bag for the tools, Ben's just shown me which ones to use for the right job," Joshua said. "That's all it is. We work well together. He's just showing me which tools to use for the job."

  Joshua and Ngannou - who showed each other plenty of respect in the build-up - embraced at the end of the fight

  Joshua - competing in Saudi for the fourth time - is now on a four-fight winning streak as he bids to become a three-time world champion. "I try not to get too down when things aren't going my way. I'm just chilling," Joshua added. "I'm not getting too ahead with myself. Rolling into the next one." The hustle and bustle of Riyadh - with traffic jams on every corner - may not seem serene at first, but Joshua has seemingly enjoyed the lack of attention in fight week. He was stopped by some fans for photos and fist bumps during fight week, but a 6ft 6in fighter being followed by a camera crew is bound to attract some attention. Joshua has not, however, been mobbed like he would be out and about near his north London home. Or anywhere in the UK for that matter. He is not being harassed with questions on fighting Fury or being heckled by students. Joshua does pay a price for fame but he has been reimbursed rather handsomely for his troubles. Forbes reports he could earn in excess of $50m (£39m) for the win over Ngannou - not taking pay-per-view or sponsorship earnings into account. He may feel at home in Saudi and time will tell if we see Joshua - one of only a few fighters who can sell out a stadium - fight in the UK again any time soon. But what we do know is the 2012 Olympic champion has rediscovered his swagger in the ring.
