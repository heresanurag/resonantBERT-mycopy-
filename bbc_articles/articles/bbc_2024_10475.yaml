title: Moment ship moved from Baltimore bridge crash site - BBC News
date: '2024-05-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69039617
content: |-
  Crews used tugboats to clear the cargo ship Dali nearly two months after it hit the Francis Scott Key Bridge.

  The ship crashed on 26 March, causing the bridge to collapse and killing six construction workers.

  Last week a controlled demolition was used to clear the remaining parts of the bridge from the 948ft (289m) ship so that it could be moved.
