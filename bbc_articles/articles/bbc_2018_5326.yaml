title: Ex-MP Tessa Jowell gets standing ovation after cancer speech - BBC News
date: '2018-05-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42825111
content: |-
  Ex-MP Tessa Jowell makes an emotional speech in the House of Lords.

  Ex-MP Tessa Jowell has received a standing ovation after an emotional speech on cancer in the House of Lords.

  She was diagnosed with a brain tumour in 2017.
