title: Week-old baby western lowland gorilla in Congo - BBC News
date: '2018-03-11'
section: General
url: http://www.bbc.co.uk/news/science-environment-43357161
content: |-
  Rare footage of a baby, critically endangered western lowland gorilla was taken in Nouabalé-Ndoki National Park, Congo.

  Rare footage of a baby western lowland gorilla was taken in Nouabalé-Ndoki National Park, Congo.

  The baby, born to mother Mekome, is thought to be a week old.

  Western lowland gorillas are critically endangered with only an estimated 100,000 left.
