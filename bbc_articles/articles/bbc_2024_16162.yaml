title: Giovanni Pernice insists 'I’ll be back,' after Strictly accusation - BBC News
date: '2024-07-22'
section: Culture
url: http://www.bbc.co.uk/news/articles/cd1jmzne18ko
content: |-
  The dancer has been accused of “cruel and mean” behaviour by former dancer partner Amanda Abbington.

  Giovanni Pernice's ex-dance partner on Strictly Come Dancing, Amanda Abbington, has criticised his behaviour on the show

  Former Strictly Come Dancing professional dancer Giovanni Pernice has insisted “I’ll be back” after facing allegations about his behaviour on the show. His former dance partner Amanda Abbington had claimed his behaviour on Strictly was “unnecessary, abusive, cruel and mean”, in an interview with the Sun on Sunday, external. It had been widely reported that Sherlock star Abbington experienced difficulties working with her dance partner Pernice on the show in 2023. Strictly has confirmed the dancer will not be returning for the show's series this year, and his spokesperson has previously said he refuted the allegations and denied any accusations of abusive or threatening behaviour.

  On stage during his tour in Salford on Sunday, Pernice said: “Let’s see what this mad woman has got to say next." He did not name anyone. The 33-year-old Italian dancer has been on the BBC One celebrity dancing contest since 2015, winning it in 2021 with actress Rose Ayling-Ellis. Abbington, who withdrew from last year's series in October, has told the Sunday newspaper she feared a backlash if she complained and claimed the BBC had known about his behaviour for years. In the interview, Abbington said: "I found Giovanni's behaviour unnecessary, abusive, cruel and mean. I couldn't sit back and let him do that to other people."

  Pernice was on stage on Sunday with Strictly judge Anton Du Beke for the final stop on the Anton and Giovanni Together Live Tour. Initially, the pair did not acknowledge the media storm that has surrounded Strictly in recent weeks. It felt almost like a parallel universe. Away from the newspaper headlines, here we had jokes, background dancers and a dizzying number of costume changes. At one point, Pernice and Du Beke were sparring over whether spaghetti bolognese is better than fish and chips. The next minute, Pernice was working the crowd, urging them all to shout "yee-haw" back at him. But around halfway through the show, Pernice addressed the elephant in the room. “Oh, I will be back, don’t you worry,” Pernice said to loud cheers during a performance at the Lowry theatre in Salford, before making his remarks about a "mad woman".

  June, left, and her daughter Amanda, travelled to Manchester for the show

  In the bathroom during the interval, women were discussing the comments and saying they assumed he was referring to Abbington. And after the show, fans - perhaps unsurprisingly - were expressing support for Pernice. "He will be back," said June, referring back to Pernice's comments. Her daughter Amanda added that she's been a Strictly fan from the start, and the allegations haven't changed that. But she said it was "a shame" that Strictly was going into its 20-anniversary year with a cloud hanging over it. In a statement provided to BBC News earlier, Pernice's spokesperson said: “The BBC has shared allegations from the inquiry with Giovanni, who has cooperated fully. None of the allegations carried in the Sun on Sunday are included in any shape or form. “Giovanni refutes these allegations and denies any accusations of abusive or threatening behaviour. "He has provided substantive evidence to the investigation, and he remains fully confident of clearing his name." The BBC has previously said it has robust duty of care procedures and that it does not comment on specific matters related to individuals. The broadcaster said: "Anyone involved in a complaint has a right to confidentiality and fair process. If a complaint is made to the BBC, we assess and take any necessary steps to establish the facts, whether there is a case to answer, and, if appropriate, what action should be taken. "This is all within the context of the BBC having duties of care to everyone linked to a complaint - that applies to those that have raised the complaint and to those that have been complained about.”
