title: Gunshots heard as protesters rush Kenya parliament compound - BBC News
date: '2024-06-25'
section: General
url: http://www.bbc.co.uk/news/videos/c800e77k89xo
content: |-
  Gunshots can be heard as protesters opposing new tax laws breach the parliament compound.

  Gunshotshave been heard in Nairobi, as protesters breached the complex where the Kenyan parliament sits.

  The protesters are opposing controversial new tax laws, which had just been passed by MPs.
