  Sarah Lynn Milgrim and Yaron Lischinsky were a couple, who both worked for the Israeli embassy.

  Two Israeli embassy staff shot dead outside Jewish museum in Washington DC

  Israeli Embassy to the US Sarah Lynn Milgrim and Yaron Lischinsky were a couple, who both worked for the Israeli embassy

  Two staff members from the Israeli embassy were shot dead outside a Jewish museum in Washington DC on Wednesday night by a gunman who shouted "free Palestine" during his arrest. Yaron Lischinsky and Sarah Lynn Milgrim were a couple, who the embassy said were in the "prime of their lives". Mr Lischinsky was reportedly about to propose to Miss Milgrim. The suspect, Elias Rodriguez, 30, is now in custody and the FBI is investigating whether the attack was linked to terrorism or a hate crime. Israel's foreign minister said the shooting was a direct result of "toxic antisemetic incitement" since the 7 October 2023 attack that prompted Israel's military campaign in Gaza.

  The couple were leaving a networking event at the Capital Jewish Museum, organised by the American Jewish Committee, at about 21:08 (local time) when a man opened fire with a handgun at a group of four people. The suspect then went inside the museum. Witnesses said that they initially thought the man was distressed and gave him water. "We heard gunshots and then a guy came in... we thought he needed help," eyewitness Katie Kalisher told the BBC, referring to the suspect before they realised he was the alleged shooter. Footage then captures the suspect shouting "free, free Palestine" while being detained by police. Metropolitan Police Department chief Pamela Smith said officers "have not had any prior interactions" with the suspect, who is from Chicago, and did not see anything in his background "that would have placed him on our radar". Analysis by BBC Verify suggests Elias Rodriguez has been working at the American Osteopathic Information Association since 2024. The Israeli Ambassador to the US, Yechiel Leiter, told reporters that Mr Lischinsky had just bought an engagement ring and was planning to propose to Miss Milgrim next week in Jerusalem.

  The shooting happened in a downtown area of Washington DC that has numerous tourist sites, museums and government buildings

  Both US President Donald Trump and Israeli Prime Minister Benjamin Netanyahu have condemned the attack. Writing on Truth Social, Trump said: "These horrible D.C. killings, based obviously on antisemitism, must end, NOW! Hatred and Radicalism have no place in the USA." Netanyahu has spoken with the parents of both victims, according to a statement from his office. He has promised increased security at Israeli embassies around the world following the attack. "My heart aches for the families of the beloved young man and woman, whose lives were cut short by a heinous antisemitic murderer," he said. "We are witnessing the terrible price of antisemitism and wild incitement against the state of Israel." The sentiment was echoed by his Foreign Minister Gideon Sa'ar who accused European countries of "incitement". "This incitement is also done by leaders and officials of many countries and international organisations, especially from Europe." His comments follow pressure this week from the UK, EU and France over Israel's military action and control over humanitarian aid in Gaza, where experts have warned of a looming famine.

  US Attorney General Pam Bondi and Israeli Ambassador to the US Yechiel Leiter visited the site of the shooting

  The shooting, which happened in a downtown area of the city that has numerous tourist sites, museums and government buildings, triggered a major police response and shut down several main streets. American Jewish Committee CEO Ted Deutch said in a statement that the organization was "devastated" by the attack. The event was billed as a networking opportunity to bring Jewish young professionals and the diplomatic community together. Its description said humanitarian aid organisers responding to humanitarian crises in the Middle East, including Gaza, were invited. The Capital Jewish Museum, like many other Jewish institutions in the US, has struggled with security issues amid rising antisemitism. "Jewish institutions all around town, all around the country, are concerned about security due to some very scary incidents that some institutions have faced and because of a climate of antisemitism," executive director Beatrice Gurwitz told NBC News, external in a separate news report before the attack on Wednesday. The museum recently received a grant to upgrade its security in part, she said, because of a new exhibit on LGBT pride.
