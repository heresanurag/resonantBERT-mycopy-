content: |-
  Shadow health secretary Wes Streeting and former Governor of California Arnold Schwarzenegger are also on the programme.

  If cabinet ministers don’t like one thing, it’s having to talk about a colleague who is in trouble when they are not sure exactly what’s gone on.

  Environment Secretary Therese Coffey was the minister finding herself in that position this morning. The question, what was her colleague Suella Braverman up to when she asked staff to arrange a one to one speeding awareness course after she was caught breaking the limit?

  The suspicion is that she was trying to avoid the press or the public finding out. But the environment secretary was resolutely sticking to her line.

  Her line was not to try really to defend the action, but just to say she had no information she could share.

  Her colleague Jake Berry, the former chair of the Conservative Party suggested that Braverman did have ‘questions to answer’, and was expecting that the home secretary will have to tell her story in Parliament before too long.

  It’s not likely that will satisfy opposition demands for an immediate investigation by the PM’s ethics adviser. The prime minister apparently didn’t know anything about what happened until the story broke in the Sunday Times last night.

  The kind of headline - while he is wrangling world leaders far away from home - a headache at home that he certainly doesn’t need.

  Having promised on day one in his job that he’d run a government with the highest levels of transparency and integrity, any slight suggestion that his team’s behaviour is less than perfect creates political pain for him.
