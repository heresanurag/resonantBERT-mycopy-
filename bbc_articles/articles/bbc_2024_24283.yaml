  Boy, 15, dies after getting into difficulty in lake

  The boy died near the lake's activity centre and sailing club

  A 15-year-old boy has died after getting into difficulty in a lake in Greater Manchester. He was pulled from water at Scotmans Flash in Wigan by staff from a nearby watersports activity centre at about 15:00 GMT on Saturday. Greater Manchester Police said he died "despite the best efforts of emergency services". The force added there were not believed to be any suspicious circumstances and said his family were being supported.

  In a post on Facebook, Scotmans Flash activity centre said: "We are deeply saddened by the tragic death of a young man. "Our staff noticed the young man in the water and attempted to save him but were sadly unable to. "We'd like to thank them for their courage and determination. "Our thoughts are with the young man's family and friends at this incredibly difficult time."

  Scotsmans Flash is used by sailors, kayakers and paddle boarders
