title: 'Burnham-on-Crouch death: Two arrests on suspicion of murder - BBC News'
date: '2019-06-09'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-48572165
content: |-
  Murder inquiry detectives arrest two men after a woman dies from serious injuries.

  Police said a woman in her 50s was found seriously injured at an address off Eastern Road in Burnham-on-Crouch

  Two men have been arrested on suspicion of murder after the death of a woman in Essex.

  Police said a woman in her 50s was found seriously injured at an address off Eastern Road in Burnham-on-Crouch.

  Officers were called by the ambulance service at about 00:30 BST on Sunday. The victim was pronounced dead at the scene.

  The men, who are aged 27 and 32 and from Burnham-on-Crouch, remain in custody, police said.

  Det Ch Insp Rob Kirby said Essex Police wanted to speak to anyone who may have information about the death.

  He said: "We understand the impact that something like this can have on the local community and we have no concerns around a further risk to members of the public."

