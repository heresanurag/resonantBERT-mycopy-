title: Police use drone to find missing toddler in Wisconsin cornfield - BBC News
date: '2024-10-25'
section: General
url: http://www.bbc.co.uk/news/videos/cwy4r1xn7l2o
content: |-
  Law enforcement officials in Wisconsin quickly located the toddler using drones with thermal capabilities.

  Drone video shows the moment a missing three-year-old was found in a massive cornfield in Alto, Wisconsin.

  Law enforcement was able to quickly locate the toddler using drones with thermal capabilities. The toddler was half a mile from home and was found uninjured.
