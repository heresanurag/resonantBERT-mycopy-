title: Ireland's youngest parish priest, Fr Conor McGrath - BBC News
date: '2019-08-25'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-49452355
content: |-
  Fr Conor McGrath, 32, tells BBC News NI what drew him to the priesthood and what his job involves.

  At 32 years of age, Fr Conor McGrath has become the youngest parish priest in Ireland.

  He was ordained as a priest in 2012, but felt his calling to the priesthood many years earlier.

  Fr McGrath told BBC News NI about his new role.
