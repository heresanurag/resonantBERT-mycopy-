title: 'Coronavirus: Grieving together with a yellow heart - BBC News'
date: '2020-05-16'
section: General
url: http://www.bbc.co.uk/news/uk-52589050
content: |-
  The placing of the symbol in windows is allowing families to celebrate those who have died with Covid-19.

  A family who lost their grandma, Sheila, has come up with a new and poignant way of remembering those who’ve died with Covid-19 - and it’s being replicated across the UK.
