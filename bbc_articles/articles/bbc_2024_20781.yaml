title: Police officer injured after second hotel targeted in Tamworth - BBC News
date: '2024-08-05'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/cjjww791xnlo
content: |-
  Missiles are thrown, windows smashed and fires lit at the Holiday Inn in Tamworth, police say.

  Police officer injured after second hotel targeted in Tamworth

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Three petrol bombs were thrown at a Holiday Inn Express hotel in Tamworth on Sunday night, Staffordshire Police said. One officer suffered a suspected broken arm in what the force described as "targeted violence", with projectiles and fireworks thrown from a "hostile" crowd. Extra officers were drafted in from neighbouring forces in order to deal with the incident - which ended after the crowd was "successfully dispersed", police said. Assistant Chief Constable Stuart Ellison referred to the violence as "despicable thuggery" and said officers in Tamworth had shown "tremendous courage".

  Mr Ellison added: "The local community do not deserve to be subject to this behaviour, and neither do the brave officers putting themselves in harm’s way to keep everyone safe. "We will be using footage from CCTV, air support and our officers’ body-worn video devices to identify those responsible and seek the toughest possible punishment for these acts of senseless violence." No one inside the Holiday Inn Express was injured, police said, but added that windows were smashed and petrol bombs were used to start a series of fires. In July, Tamworth's MP Sarah Edwards told the House of Commons, external the Holiday Inn in the town had been "used for asylum purposes for years". A spokesperson for IHG, which owns the Holiday Inn Express brand, said: "The safety and security of our guests and colleagues is always our priority." A similar incident took place in Rotherham on Sunday when anti-immigration rioters smashed the windows of a Holiday Inn Express before starting fires.

  Long-running protests in Stoke-on-Trent on Saturday were accompanied by countless claims and misinformation on social media

  Meanwhile, violence in Stoke-on-Trent on Saturday went against everything the city represents, according to the leader of the city council. Ten people were arrested and three police officers injured after hundreds of protesters gathered in Hanley in the wake of the Southport attacks, in which three girls were killed. "We unequivocally condemn these protests and the violent behaviour associated with them," said councillor Jane Ashworth. "Their message of division goes against everything we stand for in Stoke-on-Trent."

  Two men were also treated in hospital after being struck by blunt objects that were thrown although their injuries were not believed to be serious. "I'm furious, I'm horrified, I'm disappointed, we do not want this kind of thing going on in our city," said Ms Ashworth. She said it was fortunate there had been little physical damage in the city centre, which was partly down to "an extremely good job" by the police, but many businesses had seen their trade affected after closing early due to the "horrendous physical violence." The council leader said she was expecting to see prison sentences "and some heavy ones" for those found to be responsible.

  Police in riot gear were deployed on the streets of Hanley on Saturday

  At least seven of those arrested are from the city or neighbouring Newcastle-under-Lyme. They include 15 and 16-year-old boys accused of violent disorder or possessing offensive weapons as well as men arrested on suspicion of attacking emergency workers or racially or religiously aggravated harassment. Islamophobic chants could be heard on footage posted online during the day but there have also been accusations of double standards from police. Footage shared online appeared to show an officer with a loud hailer addressing a group outside a mosque in Stoke-on-Trent. "If there's any weapons, get rid of them, we are not going to arrest anybody," he appears to say. In response, a spokesperson for Staffordshire Police said it recognised "some edited footage" shared on social media had "gained traction" and had an effect on public confidence. "We’re committed to fully investigating all of the material available, addressing any lessons to be learnt with proportionate action and continuing to reassure people in Stoke-on-Trent," they added. Videos shared on social media, along with police drone footage, were also being reviewed to identify those involved in the disorder, they added.

  As well as the violence on the streets, police have also had to contend with misinformation spread on social media platforms. The force said rumours of two men being stabbed on Saturday - perpetuated by videos shared online - were false. It said no such stabbings were reported.

  Crowds gathered at 11:30 BST and the protests continued into the evening

  A special prayer vigil was held on Saturday for "peace and all people of goodwill to do what they can to encourage mutual respect," said Lloyd Cooke from Christian charity Saltbox. Mr Cooke, who spoke on behalf of Stoke-on-Trent's Faith Leaders Forum following the protests in Stoke-on-Trent, said all faiths in the city were united in calling for peace and understanding. "Ultimately, hate and violence will solve nothing," he said.

