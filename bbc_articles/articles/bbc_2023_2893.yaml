title: Turkey earthquake demolishes buildings in Malatya - video - BBC News
date: '2023-02-06'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-64534050
content: |-
  A 7.8 magnitude earthquake struck south-eastern Turkey, demolishing buildings in Malatya and trapping people.

  Turkish officials report more than 50 people killed, and the toll is rising as a wide area was hit.

  The quake also rocked neighbouring Syria, Lebanon and Cyprus.
