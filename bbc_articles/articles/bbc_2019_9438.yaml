  Video captured in central Sydney shows the moment bystanders intervened to apprehend stabbing suspect.

  An armed man has been arrested in Sydney after at least one woman was stabbed.

  Video captured in central Sydney shows the dramatic moment bystanders intervened to apprehend the suspect.
