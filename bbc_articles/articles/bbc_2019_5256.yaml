title: Labour is 'remain and reform' party - Tom Watson - BBC News
date: '2019-05-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-48253087
content: |-
  The deputy leader urges voters to reject "nationalism" and "populism" in the EU elections.

  The deputy leader of the Labour Party has urged voters to reject "nationalism" and "populism" in the EU elections.

  Tom Watson told the Today programme that Labour is a "remain and reform" party.
