content: |-
  The submarine sank earlier this year, in a major setback for the Chinese military, say US defence officials.

  China nuclear sub sank in its dock, US officials say

  Satellite images taken in June show what appear to be floating salvage cranes

  A Chinese nuclear-powered attack submarine sank in its dock earlier this year while under construction, in a major setback for the Chinese military, according to US defence officials. Speaking on condition of anonymity to the BBC's US partner, CBS, the officials said the loss of the submarine probably happened between May and June. Satellite images taken in June show what appear to be floating salvage cranes at the berth in Wuhan where, a month previously, the vessel had been seen. Beijing has not confirmed the reports. The US officials said it was "not surprising" the Chinese military would have covered up the loss of one of its newest assets.

  It is unclear whether the submarine was carrying nuclear fuel at the time. The BBC has reviewed commercial satellite images collected from the Wuhan shipyard. Images taken on 15 June appear to show a number of crane barges operating in and around the waters beside a berth. Previous images from 7 March and 29 May reveal a sole vessel docked at the same berth. The comparatively poor quality of these images means it is difficult to conclude if the two previous events are connected in any way and - crucially - if they actually show a specific submarine at berth.

  Earlier images appear to show a submarine at the berth, but are too poor quality to be conclusive

  The BBC showed these images to Mike Plunkett, a naval expert from Janes, who agreed they offered limited insight. He explained that imagery seen on 29 May “might show a submarine with a X-shaped rudder arrangement”. However, this alone was not enough to confirm that it was a Type 041, as it could also be a modified Type 039. He added “it would not be unusual to see a submarine alongside this pontoon” as China has one of its main production facilities for conventional submarines at Wuhan. A Chinese Foreign Ministry spokesperson said on Friday he was not familiar with the topic and did not provide any information when asked about it at a Beijing news conference. The incident raises questions about China's defence industry, which is allegedly riddled with corruption. China has the biggest navy in the world, with more than 370 ships, and is currently producing a new generation of nuclear-armed submarines, the Zhou-class, of which this was the first. Taiwan has said it carried out its own investigations into the fate of the submarine and had "a grasp of the situation through multiple intelligence and surveillance methods", but gave no further details.

  Thomas Shugart, a former US Navy submariner and an analyst at the Center for a New American Security, first noticed the incident involving the submarine in July. He told the BBC the sinking was a "setback" that would cause "pretty significant embarrassment" for the People's Liberation Army (PLA) navy, but the safety risk was probably "pretty low". However, he added: "If this ship eventually does get repaired, and I'm sure it will, it'll be a far more capable submarine than what they were building before at that shipyard. "I do not see it significantly altering the really impressive upward trajectory of the PLA navy’s capability."

  The sinking comes at a time when Beijing has been increasingly assertive in laying claim to virtually the whole South China Sea, which is crucial to international trade. It has long-standing maritime disputes with other nations in the region, including Brunei, Malaysia, the Philippines, Taiwan and Vietnam.
