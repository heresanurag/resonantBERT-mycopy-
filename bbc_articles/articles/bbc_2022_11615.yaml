title: 'Ukraine conflict: Russia''s ''outrageous acts'' violate UN charter, says Biden
  - BBC News'
date: '2022-09-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-62988010
content: |-
  The US president says Russia's invasion of Ukraine breached "the core tenets" of the charter.

  US President Joe Biden has said Russia's invasion of Ukraine breached "the core tenets of the United Nations charter".

  No one other than Russia sought conflict, he told the UN General Assembly in New York.
