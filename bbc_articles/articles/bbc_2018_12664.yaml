title: Couple reunited after Indonesia earthquake - BBC News
date: '2018-10-06'
section: General
url: http://www.bbc.co.uk/news/world-asia-45766236
content: |-
  Azwan survived the Indonesian earthquake, but feared the tsunami it triggered had killed his wife.

  After an earthquake struck Palu in Indonesia, Azwan searched through body bags as he feared his wife may have died.

  Dewi and Azwan were reunited two days later. They talk about their ordeal to AFP.
