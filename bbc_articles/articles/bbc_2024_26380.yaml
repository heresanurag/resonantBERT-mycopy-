content: |-
  This year, 29,578 migrants have crossed the Channel in small boats compared to 29,437 in 2023.

  The number of migrants who have crossed the Channel so far in 2024 has hit 29,578

  The number of migrants who have crossed the Channel in small boats in 2024 has already surpassed 2023's total for the year, figures show. On Friday, 424 migrants crossed the channel to bring 2024's total up to 29,578 - compared to 29,437 arrivals in 2023. The total in 2023 was down 36% on the record 45,774 arrivals in 2022. The Home Office said it would "stop at nothing" to dismantle people-smuggling gangs and bring them to justice.

  A Home Office spokesperson added: "Our new border security command will strengthen our global partnerships and enhance our efforts to investigate, arrest, and prosecute these evil criminals." So far in 2024, 556 small boats are known to have made the journey across the Channel. October has also seen more arrivals of migrants and small boats than any other month in 2024, with 4,334 people and 77 boats. On Thursday, the French coastguard said it rescued 76 migrants in three boats after they called for help when they got into difficulty while attempting the journey.

  The day before, three people died after an overloaded migrant boat sank off the coast of Calais. The French coastguard has reported 48 migrant deaths so far this year. According to the charity Refugee Council, 2024 has already become the deadliest for migrant crossings in the English Channel. Charity CEO Enver Solomon said: "We must not forget that those making the perilous journeys across the Channel are desperate men, women and children fleeing persecution and war, in countries such as Afghanistan and Sudan, simply seeking safety and a future free from fear." He added that it was "vital" the government did "everything possible" to ensure refugees no longer had to put their lives in danger.
