content: |-
  Pubs, restaurants, hairdressers and other businesses are open for the first time in months.

  Street pastors: No hugs, but we are happy to listen

  As venues like pubs and bars reopen, it's not just police who will be patrolling the streets. In Cheltenham, street pastor Maria Perry will also be on hand to help pub-goers get home safely. She said: "You don't know how people will react, whether they will be over-keen to get back and celebrate because the pubs are open or if other people wouldn't think it was the right time. "As a street pastor, myself and the rest of the team will be only too happy to meet anyone who would want to talk to us - we are happy to listen. "We are non-judgemental, because who am I to judge people? We would love to see people to come up and greet us." She added that normally people would often come up for a hug on their night out, but due to social distancing this was one thing they would be unable to do. Ms Perry and her team will be in the town centre for two hours, from 20:00 BST.
