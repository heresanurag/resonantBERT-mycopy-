title: Met commissioner Sir Mark Rowley building new vetting process - BBC News
date: '2023-04-06'
section: General
url: http://www.bbc.co.uk/news/uk-65199895
content: |-
  The Met Police has diverted officers from tackling serious crime and terrorism to investigate wrongdoing in the force.

  The Met commissioner told the Today programme that four out of five investigations into officers accused of domestic abuse and sexual violence need to be reassessed.

  Sir Mark Rowley said officers investigating terrorism and other serious crimes have been re-assigned to help with efforts to root out unsuitable staff in the force.
