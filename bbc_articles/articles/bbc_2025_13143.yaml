content: |-
  Eight people were injured after a man "started setting people on fire" at a mall in Boulder, Colorado, police say.

  Eight people are being treated for injuries after a man "started setting people on fire" at a mall in Boulder, Colorado, on Sunday, police say.

  A peaceful event in support of the Israeli hostages was taking place when the attack occurred. Authorities say the suspect was seen throwing Molotov cocktails, and using other devices to hurt people.

  The victims, aged between 52 and 88, are being treated for a range of minor and serious injuries - with at least one in critical condition.

  The FBI says they are investigating the incident as a "suspected act of terrorism".
