title: 'Bolton death: Two men in 70s arrested after woman found dead - BBC News'
date: '2020-03-07'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-51783530
content: |-
  The men are being held on suspicion of murder after the woman in her 40s was found dead at her home.

  The woman was found injured in Alexandra Road in Bolton

  Two men, aged 72 and 73, have been arrested on suspicion of murdering a woman who was found dead at her home.

  Police were called to reports the woman in her 40s had been seriously injured at the property in Alexandra Road, Bolton, at about 22:00 GMT on Friday.

  She was pronounced dead at the scene by paramedics. On arrival, police arrested the men who remain in custody for questioning.

  A post-mortem examination is due to take place later.

  Greater Manchester Police has appealed for anyone with information to contact the force.

  "Whilst we have made two arrests, it is important to stress that we are keeping an open mind about the circumstances of the woman's death and will work tirelessly to keep her family updated of any developments," Det Supt Howard Millington said.

  "A scene remains in place as our team continue with investigation work and local residents can expect to see a higher police presence."

