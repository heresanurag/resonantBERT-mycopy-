content: |-
  Time is running out for Nimisha Priya, who was convicted for the murder of a Yemeni man in 2017.

  Last hope for Indian nurse on death row in Yemen: pardon from victim's family

  Nimisha Priya is currently lodged in the central jail of Yemen's capital Sanaa

  Family members of an Indian nurse who is on death row in war-torn Yemen say they are pinning their hopes on a last-ditch effort to save her. Nimisha Priya, 34, was sentenced to death for the murder of a local man - her former business partner Talal Abdo Mahdi - whose chopped-up body was discovered in a water tank in 2017. Lodged in the central jail of capital Sanaa, she is set to be executed soon, with Mahdi al-Mashat, president of the rebel Houthis' Supreme Political Council, approving her punishment this week. Under the Islamic judicial system, known as Sharia, the only way to stop the execution now is securing a pardon from the victim's family. For months, Nimisha's relatives and supporters have been trying to do this by raising diyah, or blood money, to be paid to Mahdi's family, and negotiations have been going on. But with time running out, supporters say their hopes rest entirely on the family's decision. With the presidential sanction coming in, the public prosecutor's office will once again seek consent from Mahdi's family and ask if they have any objections to the execution, said Samuel Jerome, a Yemen-based social worker who holds a power of attorney on behalf of Nimisha's mother. "If they say they do not want to or can pardon her, the sentence would be immediately stopped," he said. "Forgiveness is the first step. Whether the family accepts the blood money comes only after that." Under Yemen's laws, Nimisha's family cannot directly contact the family of the victim and must hire negotiators. Subhash Chandran, a lawyer who has represented Nimisha's family in India in the past, told the BBC that the family had already crowdfunded $40,000 (£32,268) for the victim's family. The money has been given in two tranches to the lawyers hired by the Indian government to negotiate the case (a delay in sending the second tranche affected the negotiations, Mr Jerome says). "We now need to explore the scope for discussions with the [victim's] family, which is possible only with the Indian government's support," Mr Chandran said. India's foreign ministry has said they are aware of Nimisha's situation and are extending all possible help to the family. Her family is anxious but also hopeful. "Nimisha has no knowledge of what is happening beyond the gates of prison," said her husband Tony Thomas, who spoke to her hours before the approval of the death sentence. "The only thing she wants to know is if our daughter is fine." Nimisha's mother is currently in Sanaa, having travelled there last year after a court in India allowed, external her to go to the region controlled by Houthi rebels. She has met her daughter twice in prison since then. The first reunion was very emotional. "Nimisha saw me... she said I had become weak and asked me to keep courage, and that God would save her. She asked me not to be sad,'' her mother Prema Kumari told the BBC. The second time, Ms Kumari was accompanied by two nuns who held prayers for her daughter in prison.

  Mr Thomas hopes they can arrive at a settlement and save Nimisha's life

  Nimisha was barely 19 when she went to Yemen. The daughter of a poorly-paid domestic worker, she wanted to change her family's financial situation, and worked as a nurse in a government-run hospital in Sanaa for some years. In 2011, she returned home - Kochi city in southern India - and married Mr Thomas, a tuk-tuk driver. The couple moved to Yemen together shortly afterwards. But financial struggles forced Mr Thomas to return to India with their baby daughter. Tired of low-paying hospital jobs, Nimisha decided to open her own clinic in Yemen. As the law there mandated that she have a local partner, she opened the clinic jointly with Mahdi, a store owner. The two were initially on good terms - when Nimisha briefly visited India for her daughter's baptism, Mahdi accompanied her. "He seemed like a nice man when he came to our house, " Mr Thomas told the BBC. But Mahdi's attitude, Mr Thomas alleged, "suddenly changed" when the civil war broke out in Yemen in 2014. At that time, Nimisha was trying to finalise paperwork so her husband and daughter could join her again. But after the war broke out, the Indian government banned all travel to Yemen, making it impossible for them to be with her. Over the coming days, thousands of Indians were evacuated from the country, but Nimisha chose to stay, as she had taken out huge loans to open her clinic.

  Nimisha's family challenged the death sentence in Yemen's top court but the plea was rejected

  It was around then that Nimisha started to complain about Mahdi's behaviour, including allegations of physical torture, Mr Thomas said. A petition in court, filed by a group called Save Nimisha Priya International Action Council, alleged that Mahdi snatched all her money, seized her passport and even threatened her with a gun. After Mahdi's body was discovered in 2017, the police charged Nimisha with killing him by giving him an "overdose of sedatives", and allegedly chopping up his body. Nimisha denied the allegations. In court, her lawyer argued that she had tried to anaesthetise Mahdi just to retrieve her passport from him, but that the dose was accidentally increased. In 2020, a local court sentenced Nimisha to death. Three years later, in 2023, her family challenged the decision in Yemen's Supreme Court, but their appeal was rejected. Even with so many twists and turns, the family is not willing to give up hope. "My heart says that we can arrive at a settlement and save Nimisha's life,'' Mr Thomas said. More than anything, he said he was worried about their daughter, now 13, who had "never experienced a mother's love". "They speak on the phone every week and my daughter gets upset if she misses the call," Mr Thomas said. "She needs her mother. What will she do without her?"
