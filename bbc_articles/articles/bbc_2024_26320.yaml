content: |-
  The work includes a new 10-mile (16km) dual carriageway aimed at improving journey times.

  Aerial pictures showed the construction of a major road aimed at improving journey times between two counties.

  The footage, released by National Highways, shows work to upgrade the A428, external between Black Cat roundabout in Bedfordshire and Caxton Gibbet in Cambridgeshire.

  Improvements include a new 10-mile (16km) dual carriageway, bridges and junctions connecting to the existing road.

  It is expected to open to traffic in 2027.

