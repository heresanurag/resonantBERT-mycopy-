title: Bristol woman jailed for involvement in 'terrifying' mob - BBC News
date: '2024-08-16'
section: Bristol
url: http://www.bbc.co.uk/news/articles/c70j588k5nqo
content: |-
  Lisa Bishop threw a can and shouted verbal abuse during unrest in Bristol city centre.

  Lisa Bishop, from Lawrence Weston, was sentenced to 26 months in prison

  A mother-of-five who was part of a "terrifying" mob outside a hotel housing asylum seekers has been jailed for 26 months. Lisa Bishop, of Lawrence Weston, Bristol, pleaded guilty to violent disorder after her involvement in an anti-immigration protest in the city on 3 August. The 38-year-old was in a "prominent" position during the ordeal, during which she threw a can and shouted verbal abuse. During the sentencing at Bristol Crown Court on Friday, Judge Martin Picton said the group she was part of caused "considerable fear" to those being housed at the Mercure hotel.

  "Those residing in the hotel who were the target of this anger must have been terrified," he said. On the night of the disorder, only a small cycle police team equipped with police vests and cycle helmets had been deployed to the hotel, the court was told. They did not have riot gear and were at risk of being overwhelmed by "general mayhem" due to the number of protesters and counter-protestors.

  Judge Picton told Bishop: "You were at the forefront, gesturing and shouting at the police as you drank more alcohol." He added that the group became "increasingly agitated and aggressive", and her actions contributed to the situation. "There was genuine fear among those police officers," he said. The officers in front of the group called for assistance when they became outnumbered, with just two or three officers standing between the two groups. The court heard the cost to the city of the protest was "£385,000 and growing". The court also heard Bishop has said she is "disgusted and ashamed at her behaviour".

  Jamie Easterbrook was jailed for 20 months for violent disorder, while the sentencing of Elly-Jayne Cox has been adjourned

  Jamie Easterbrook, 43, from Bristol, was also jailed for 20 months for violent disorder. The court heard he had been “an active participant” in the disorder, goading and behaving aggressively towards police officers and the behaviour of the group, of which he was a part, had had a substantial impact on the public. Zak Baker, 29, of no fixed address, was sentenced to two years and four months after also pleading guilty to violent disorder. Judge Picton said Baker was “very obviously encouraging and enticing the crowd”. Footage showed him throwing a full drinks can towards police officers, kicking out at police dogs and throwing punches and kicks towards officers. The sentencing of Joseph Bradford, 20, of Bishopsworth, Bristol, who pleaded guilty to violent disorder, was adjourned to 20 September for a pre-sentence report to be prepared. The case of Elly-Jayne Cox, 33, from Bristol, was also adjourned until 1 October. She has also pleaded guilty to violent disorder.
