title: 'Newspaper headlines: Chinese spy suspect named and ''stark choice'' for Starmer
  - BBC News'
date: '2024-12-17'
section: The Papers
url: http://www.bbc.co.uk/news/articles/clyk2ykdje7o
content: |-
  Several front pages lead on the identity of Yang Tengbo, who has been linked to Prince Andrew.

  Yang Tengbo said he had "done nothing wrong or unlawful"

  The naming of the alleged Chinese spy with links to Prince Andrew features on most of the front pages. "Exposed" says the Sun. , external "Revealed" says the Financial Times, external, while the headline in the Daily Mirror, external is "unmasked". The Times, external says Yang Tengbo was at "the heart" of the Duke of York's charity in China. It says the businessman had been appointed a founder of the Chinese arm of the duke's entrepreneurial scheme, Pitch@Palace. The duke says he "ceased all contact" with Mr Yang when the government first raised concerns about him. The paper goes on to say that Sir Keir Starmer is facing pressure from M-I-5 to designate China a threat to national security, as there are concerns failing to do so would "empower" its spying operations in the UK. On its front page, the Telegraph, external carries some of the statement issued by Yang Tengbo yesterday, saying he had asked his legal team to disclose his identity "due to the high level of speculation" in the media. He has also denied claims he was a spy and insisted he loves the UK as his "second home". Prince Andrew's absence from the Royal Family's Christmas gathering at Sandringham is also prominent on the front pages. The Sun says he's been "forced" to pull out so as not to "embarrass" the King. The i, external says he's been banished, while the Daily Mail says many in Royal circles believe it is the right thing to do, given the circumstances - but the paper says it has led insiders to question whether Prince Andrew "will ever appear with the family again in public" other than for funerals and weddings.

  The Guardian, external carries photographs of the devastation in the French Indian Ocean territory of Mayotte, after the powerful cyclone at the weekend. The images show destroyed buildings, scattered belongings and piles of debris. The paper says many relatives searching for news of their loved ones have turned to social media, with one Facebook group gaining 13,000 members by Monday evening. A study which says taxi and ambulance drivers are less likely to die of Alzheimer's disease than other workers is highlighted by the Times, external. One of the researchers says it raises the possibility that navigational skills lead to better brain health. However, the paper says cabbies tended to die earlier than the average worker, suggesting a "life largely spent sitting in a car may be unhealthy in other ways". The Telegraph, external has picked up British tennis star Emma Raducanu saying she has "learnt to say no" after the wave of sponsorship deals that followed her US Open success in 2021. The 22-year-old told reporters that she was not prepared for everything off the court, but she has since decided to "put herself first a little bit more". And, the Times , externalsays a collection of almost 2,000 English coins, which has been left in a cabinet for more than a century, is tipped to sell for £250,000. The paper says the coins date from the Norman conquest of 1066 to the reign of Queen Victoria - and are expected to fetch a "pretty penny" at auction.

