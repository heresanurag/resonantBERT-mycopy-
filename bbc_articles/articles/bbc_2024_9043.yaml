title: West Yorkshire Police operation sees 24 'sexual predators' jailed - BBC News
date: '2024-04-27'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-68911740
content: |-
  The abuse suffered by eight girls in West Yorkshire has been described as "abhorrent in the extreme".

  The 24 men have been jailed after prosecutions arising out of a police investigation called Operation Tourway

  More than 20 "sexual predators" have been given jail sentences of up to 30 years for sexually exploiting girls in West Yorkshire.

  The abuse, which included rape and trafficking offences, was described by police as "abhorrent in the extreme".

  The prosecutions took place after officers investigated the sexual abuse of eight girls in the north Kirklees area between 1999 and 2012.

  Police said the operation was centred around Batley and Dewsbury.

  Reporting restrictions covering a series of trials held over two years were lifted on Friday, following the latest sentencing of seven men at Leeds Crown Court.

  Four of the men convicted in the series of trials received sentences of more than 20 years in prison.

  West Yorkshire Police said juries had heard details of "absolutely shocking offending", with victims treated as "defenceless commodities to be abused and traded at whim".

  Arrests were conducted from late 2018 across West Yorkshire, with suspects charged in December 2020.

  Det Ch Insp Oliver Coates, of West Yorkshire Police, said: "Men such Asif Ali, who alone was found guilty of 14 rape offences, committed appalling sexual abuse on a scale which can barely be believed.

  "Far from being powerless however, those young women have instead fought back as adults and forced them to account for their crimes."

  He continued: "Their bravery in coming forward and identifying their abusers has allowed us to take action against men whose offending and behaviour can only be described as abhorrent in the extreme."

  "Now that reporting restrictions have been lifted we can, for the first time, disclose full details of all those sentenced."

  He concluded: "I hope they can find some closure in knowing they have enabled police and partners to mount a huge and highly difficult investigation which has taken sexual predators off our streets."

