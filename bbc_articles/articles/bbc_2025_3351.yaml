content: |-
  Manchester City sack head coach Gareth Taylor just five days before the Women's League Cup final.

  Manchester City have sacked head coach Gareth Taylor just five days before the Women's League Cup final. The 52-year-old succeeded Nick Cushing in May 2020 and led City to two major honours - but Cushing has now returned as interim boss. City missed out on last season's Women's Super League title on goal difference and are currently fourth, 12 points adrift of defending champions Chelsea. Taylor won his final game in charge on Sunday, as City beat Aston Villa 2-0 to reach the Women's FA Cup semi-finals. "Manchester City prides itself on competing at the top of the WSL and on its outstanding record of qualifying for European competition," said managing director Charlotte O'Neill. "Unfortunately, results this season have so far not reached this high standard." City have lost four of their 16 league games and are one point outside the qualification places for the Women's Champions League, with Arsenal having a game in hand. Cushing will be in charge for the remainder of the season, with City facing Chelsea in the League Cup final on Saturday (12:15 GMT kick-off). City lifted the FA Cup in Taylor's first year in charge, before winning the League Cup in 2022. In four full seasons under Taylor they did not finish outside the top four, but a late fightback by Arsenal in the penultimate game of last season cost City their first WSL title since 2016. O'Neill added: "With six games of the WSL campaign remaining, we believe that a change of management will breathe fresh life into our bid to ensure qualification for the 2025-26 Women's Champions League. "We would like to place on record our thanks to Gareth for all of his efforts during his many years at City. "Our FA Cup and League Cup triumphs will remain special moments in the history of this football club. We wish him all the best for the future." Cushing previously helped City win the WSL and the FA Cup, plus the League Cup twice, before leaving in January 2020 to join New York City. He was initially assistant coach and then spent two years as head coach before being sacked by the MLS side in November.

  Gareth Taylor has been a controversial figure with several players speaking out publicly about their experiences at the club during his time in charge. England goalkeeper Ellie Roebuck described her relationship with Taylor as "fractured", while the dramatic circumstances surrounding forward Chloe Kelly's exit in January raised eyebrows further. That led to divisions within the fanbase over Taylor but it is City's underwhelming performances this season that ultimately proved to be his downfall. Despite strong runs in the domestic cups, their WSL form has fallen way below expectation and they have not made a mark in European competition during Taylor's tenure. Injuries to key players have not helped Taylor in recent seasons but the club have largely backed him in the transfer market and given him enough resources off the pitch. It is a bold move to make just days before their League Cup final showdown with Chelsea but, in Nick Cushing, City have an interim manager who knows a number of the players, understands the club organisation and is familiar with WSL opposition.
