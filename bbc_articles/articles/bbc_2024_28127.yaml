  Weather Watchers capture the last supermoon of 2024.

  Last supermoon of 2024 captured in stunning photos across the UK

  The Beaver Moon - the final supermoon of the year has made a dazzling appearance across parts of the UK on Friday night. It's not quite as bright as last month's Hunter's supermoon but should still provide an impressible spectacle for sky gazers, although clouds may obscure the view in some places. However with the next supermoon not until October 2025, it's worth capturing a glimpse of this one if you can. Here are some of the best images sent in to BBC Weather Watchers, along with some agency pictures.

  Full Moons throughout the year are given names that reflect what is happening in nature. November's full Moon is called the Beaver Moon, probably because beavers are particularly active at this time of year as they prepare for the winter months ahead. Another interpretation is that Native American tribes would set beaver traps before the swamps froze, ensuring a supply of warm winter furs.

  There are about three or four supermoons each year. This year has already brought three - the Blue moon in August, September's Harvest moon and the Hunter's moon in October. Astronomers say Friday's Beaver moon will look around 14% larger and 30% brighter than usual.

