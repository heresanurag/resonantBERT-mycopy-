title: 'Newspaper headlines: Major gender care review, and ''Mr Bates vs thugs in
  suits'' - BBC News'
date: '2024-04-10'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68775970
content: |-
  Wednesday's papers report on an NHS paediatric gender care review and drama at the Post Office inquiry.

  "At last", declares The Daily Mail, "a voice of sanity on children and trans dogma", as the paper leads on what it calls a "landmark report on gender care". The Mail says campaigners have hailed the Cass Review as a return to common-sense decision making. The Daily Telegraph says the NHS will now re-examine all the transgender treatment it provides in the wake of the report, According to the extensive coverage in The Times, the use of puberty blockers "spread around the world at pace" based on a single Dutch study that began in 1998. The Guardian quotes Dr Aidan Kelly, a clinical psychologist specialising in gender, who disputes many of the Cass findings, saying a German review had found puberty blockers were safe and effective.

  Alan Bates arrives at the Post Office inquiry in London

  "Mr Bates's day" is The Financial Times headline, as it features a picture of former subpostmaster Alan Bates heading into the Horizon IT inquiry to give evidence. The Daily Mirror says the 69-year-old "electrified" the evidence session as he described his war with "thugs in suits" running the Post Office. The Daily Telegraph describes his answers as "short, precise and often funny", while The Guardian calls him a "star witness" who had the simple qualities that bullies fear the most - he's honest and stubborn.

  According to The i, insiders have described the meeting between Foreign Secretary Lord Cameron and Donald Trump as "productive and warm". The talks were requested by Lord Cameron as he views the former US president as a key player in unblocking 60 billion dollars in US aid for Ukraine. The Times reports that the Republican speaker of the US House of Representatives, Mike Johnson, could not find the time for a meeting with the foreign secretary. The message from The Sun to the US is clear: "Make 'em pay", it says, as "the future of Ukraine remains on a knife edge".

  The Financial Times reports that Rwanda's state-owned airline turned down a proposal from the UK to transport asylum seekers to Kigali because it feared damaging its brand. A Home Office insider has spoken of the "irony" of RwandAir saying no, because the Rwandan government had said it was "proud" to be involved in the asylum scheme with the UK. RwandAir did not respond to requests for comment.

  Trigger has offspring working all over the UK

  In what's dubbed a "royal exclusive", The Sun reports that Princess Anne's son Peter Phillips has suffered fresh heartache after splitting from his girlfriend. The late Queen's favourite grandson began dating Lindsay Wallace in 2021. A source told the paper the pair have "gone their separate ways" after the relationship ran its course.

  And finally, many papers feature Trigger the golden retriever, who is retiring after fathering more than 300 puppies. Described by The Daily Express as having the "golden touch", the paper reports that Trigger's pups are trained as assistance dogs for blind and partially sighted people. The i says Trigger will see out his retirement in Banbury in Oxfordshire, as the paper points out "nothing lasts fur-ever".

