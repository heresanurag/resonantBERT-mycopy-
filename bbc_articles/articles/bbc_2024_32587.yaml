title: Kevin Sinfield completes 230-mile run for MND - BBC News
date: '2024-12-08'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c623jy3p9rmo
content: |-
  The rugby star ran from Old Trafford to his Saddleworth home on the final leg of his challenge.

  Sinfield said he wanted to "rest his body now" after reaching his Saddleworth home

  Rugby star Kevin Sinfield said it would have taken losing a leg to stop him completing a 230-mile run in aid of people with Motor Neurone Disease (MND). Despite picking up a muscle injury in November, he started the week-long endeavour in Liverpool last Sunday in memory of his late teammate Rob Burrow, who died with the illness in June. Crossing the finish line in Saddleworth having raised more than £1m, Sinfield said: "Since Rob got diagnosed it's taught me that it's important to take some risk - be uncomfortable and be vulnerable and, yeah, that's what we've had to do this week. "I understood that at some point it could go wrong and I could end up having to stop, but as I said... you'd have had to chop my leg off for that."

  Sinfield added: "The families we've met, the stories we've heard – the fight, the inspiration, the willingness to stand together to fight MND – has been wonderful wherever we've been." He said he was "delighted" to be home, and that he wanted to "rest his body". Ahead of the last leg, Sir Keir Starmer said in a video message that Sinfield's efforts were "almost unbelievable in terms of the endurance, the commitment, the dedication" to "such an important cause". Starmer added: "By what you're doing, that vital research can be done so that other people can benefit hugely from what you're doing." The incurable condition affects the brain and nerves and is more common among people in their 60s and 70s.

  Sinfield and Burrow became friends while playing for Leeds Rhinos and Great Britain

  Rob Burrow was accompanied by his family and Sinfield at the Leeds Marathon this May

  Dubbed Running Home for Christmas, the Oldham-born star spent the final day running about 31 miles (50 km) from Manchester to his Saddleworth home amid stormy winds and rain. His physiotherapist Dave O'Sullivan revealed how the 44-year-old had developed a muscle tear about 10 days before the endeavour but shrugged off medical opinion to complete the run. "The grade of muscle tear he got, you shouldn't be running yet, so to do seven ultra marathons in seven days is pretty incredible. This is the first year we've had to say there's a high chance you might not get through this."

  Sinfield and his support runners wore bibs with the number 7, which Burrow wore during his playing career

  Members of the MND community also joined in special events across the week

  Sporting legends including Olympic cycling couple Sir Jason and Dame Laura Kenny, plus Greater Manchester mayor Andy Burnham and members of the MND community accompanied Sinfield during sections of the gruelling run. It was his fifth annual fundraiser for MND charities, prompted by Burrow's diagnosis in 2019. They became friends after playing at Leeds Rhinos and Sinfield has raised more than £11m since he started the epic runs in 2020. Following Burrow's death at the age of 41, his father urged Sinfield to continue the fundraising efforts to tackle the impact of MND. Sinfield described the challenges as "just going for a run with some mates for a mate".

  Sinfield ran past the stadiums of Manchester City (above) and United before reaching his Oldham home

  Burrow, who was married with three children, was diagnosed with MND in 2019, after a successful rugby career which included eight Super League Grand Final victories. He also won 15 England and five Great Britain caps. In October, Sinfield agreed to remain as assistant coach for the England rugby union squad.
