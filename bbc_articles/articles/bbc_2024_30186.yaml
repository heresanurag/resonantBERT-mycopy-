content: |-
  Police warn somebody could be killed if the incidents continue.

  Plea after van hit by concrete dropped from bridge

  A driver had the bonnet of his van "completely destroyed" when a large lump of concrete was dropped from a bridge on the A5076 Talavera Way (pictured) in Northampton

  A van driver narrowly missed being hit by a large lump of concrete thrown from a bridge during a string of incidents over four days, police have said. The vehicle's bonnet was destroyed and police said the consequences of the attack in Talavera Way, Northampton, on Thursday could have been "catastrophic". It was the third report police had received of youngsters launching items from bridges on to the busy A5076 over the last few days, leading them to plead with parents to talk to their children about the dangers. "This behaviour might seem like a prank or dare to young people, but it could easily kill someone," said PC Polly Scott, from Northampton's neighbourhood policing team.

  "The most recent incident involved a large block, which completely destroyed the front of the van it struck. "If it had hit that vehicle, even just a few inches further back, the consequences could have been catastrophic. "Behaviour like this is genuinely putting lives at risk, so we’re asking everyone to talk to the young people they know to help them understand the risks to others and the consequences they would face." The driver was said to be uninjured and at least five motorists have now been affected by the incidents, according to police. Items have been thrown on to Talavera Way from bridges in the Southfields and Round Spinney areas after dark, with the offenders running off before the police arrived. Officers will now step up their patrols in the area. Police warned the incidents were being treated as the more serious offence of causing danger to road users rather than being classed as criminal damage. A van driver in Nottinghamshire suffered serious head injuries on Friday when a boulder dropped from a bridge was smashed through his windscreen.

