title: Enfield murder investigation launched after woman stabbed - BBC News
date: '2025-04-21'
section: London
url: http://www.bbc.co.uk/news/articles/c77n30jpx27o
content: |-
  The victim, 45, was declared dead at the scene, despite efforts of emergency services, police say.

  The woman was pronounced dead at an address in Ayley Croft, Enfield

  A murder investigation has been launched after a 45-year-old woman was found with fatal stab wounds in north London. Officers from the Met Police were called to an address in Ayley Croft, Enfield, at about 19:00 BST on Saturday, following reports of the attack. Crews from London Ambulance Service and London's Air Ambulance also attended, but the woman was pronounced dead at the scene. No arrests have been made and police have appealed for witnesses or anyone with information to come forward.

  The woman's next of kin has been informed and is being supported, the force said. Det Ch Insp Neil John, who is leading the investigation, said: "Our thoughts are with the victim's family at this difficult time. "As our investigation continues there will be an increased police presence in the area, and a crime scene remains in place. "We understand this will be very distressing to the local community and anyone who has concerns can speak to local officers." He added police were particularly interested in hearing from anyone who was driving through Ayley Croft, between 18:30 and 19:30, who might have dashcam footage.
