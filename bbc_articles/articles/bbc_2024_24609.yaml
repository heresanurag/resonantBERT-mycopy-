title: Dog survives hurricane that killed owners in Florida - BBC News
date: '2024-10-10'
section: General
url: http://www.bbc.co.uk/news/videos/cq8xw102y28o
content: |-
  Tornadoes tore through communities in St Lucie County, killing at least four people and destroying homes.

  A TV reporter has rushed to care for a dog rescued from debris after a tornado ripped through a community in Florida.

  The CBS News reporter was preparing to go on air when the dog, named Benji, was picked up near a destroyed house.

  The dog's owners died when the tornado tore through Fort Pierce, on the east coast of Florida, CBS reported.

  At least five people died as a result of tornadoes across the state as Hurricane Milton moved in.

  Officials from St Lucie County, said the deaths were the result of at least two tornadoes that hit the area before Milton itself arrived late on Wednesday.
