title: 'Starship: Musk''s big rocket launch stopped during countdown - BBC News'
date: '2023-04-17'
section: General
url: http://www.bbc.co.uk/news/science-environment-65298623
content: |-
  The launch of Space X's Starship is postponed at the last minute.

  Elon Musk's company SpaceX has halted the debut launch of Starship just minutes ahead of the scheduled launch time, because of a pressurisation issue.

  SpaceX decided to carry on with the countdown - a wet dress rehearsal - providing a chance to run through what would happen if the rocket was to fly.
