  Great Britain's Yasmin Harper misses out on a medal as China win their 10th straight women's 3m springboard gold at Paris 2024.

  Great Britain's Yasmin Harper missed out on an Olympic medal as China won their 10th straight gold in the women's 3m springboard event.

  Harper, 24, finished fifth in the final with a combined score of 305.10 from her five dives.

  Harper and Scarlett Mew Jensen won Team GB's first medal of the Paris Games with a bronze in the synchronised 3m springboard.

  China's Chen Yiwen was a clear winner with a total of 376.00 to claim her second gold in Paris having also won the synchronised title with Chang Yani.

  Chang's 318.75 meant she had to settle for individual bronze as Australia's Maddison Keeney took silver with 343.10.

  GB's Grace Reid, 28, finished her third Games in 10th place with 275.85.
