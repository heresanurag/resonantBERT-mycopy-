content: |-
  Pictures from the life of The Monty Python star Terry Jones, who has died at the age of 77.

  Jones took to directing, notably on the Python films, such as Life of Brian and The Meaning of Life. As well as being behind the camera he also appeared, here in one of his most memorable roles as Mr Creosote, served by John Cleese.
