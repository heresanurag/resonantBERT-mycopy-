  Independent MSP Andy Wightman - a member of the inquiry committee - said it was "not for the government to determine what is key legal advice", saying the motion of no confidence should be kept on the table.

  The Scottish Conservatives then tweeted that "we will not remove the no confidence motion until we know John Swinney will fully publish the legal advice".

  The inquiry committee is to take evidence from Lord Advocate James Wolffe - the government's top legal advisor - on Tuesday.

  Nicola Sturgeon will then follow on Wednesday, with the first minister saying she is looking forward to putting her side across.
