  Dr Philippa Kaye answers questions and offers tips on how to deal with menopause.

  Menopause affects all women at some point in their life, but how it presents itself is different for every woman.

  As part of World Menopause Day, London doctor Philippa Kaye has answered questions from Londoners on the topic, including advice around hormone replacement therapy (HRT).

  Dr Kaye is an expert on women's health and has written books on the subject, including The Science of Menopause and The M Word.

