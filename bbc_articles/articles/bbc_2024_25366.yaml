title: 'India vs New Zealand: Hosts bowled out for 46 in Bengaluru - BBC Sport'
date: '2024-10-17'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cwy9zkewr60o
content: |-
  India are bowled out for 46 by New Zealand on day two of the first Test in Bengaluru - the third-lowest score in their Test history.

  India all out for 46 against NZ in first Test

  New Zealand had never dismissed a side for as little as 46 in a Test

  India were bowled out for 46 by New Zealand on day two of the first Test in Bengaluru. After the entire first day was washed out by rain, India chose to bat on a lively, seaming pitch and were dismissed for the third-lowest total in their Test history. Virat Kohli, Sarfaraz Khan, KL Rahul, Ravindra Jadeja and Ravichandran Ashwin were all out for ducks, with seamers Matt Henry and Will O'Rourke taking 5-15 and 4-22 respectively. Rishabh Pant with 20 and Yashasvi Jaiswal, who made 13, were the only batters to make double figures for India, who are top of the World Test Championship standings. It was India's lowest total in a home Test, only beaten by their 36 all out against Australia in Adelaide in 2020 and 42 against England at Lord's in 1974. New Zealand reached 180-3 by the close, giving them complete control of the Test with a lead of 134. Tom Latham and Devon Conway went beyond the hosts' score with an opening partnership of 67 and Conway continued to make a 105-ball 91. "You see the pitch and try and make a judgement. Sometimes you make the right call and sometimes, you don't," India captain Rohit Sharma said. "I'm hurting a little bit because I made that call... the challenges that were thrown at us, we didn't respond to well and found ourselves in a situation where we got bowled out for 46. "As a captain, it definitely hurts to see that number."

  Jaiswal and Sharma had edged to 9-0 in the seventh over when Rohit was bowled by Tim Southee as he advanced to attempt a wild drive. Kohli did not score in his nine balls before gloving 23-year-old O'Rourke, playing his fifth Test, to leg slip. Sarfaraz was caught one-handed by Conway diving at mid-off attempting a counter-attack and, after a short rain delay and a 10-over partnership returning just 21 runs with Pant, Jaiswal cut O'Rourke to point. Rahul was caught down the leg side in O'Rourke's next over and an over later, Jadeja skied a catch off a leading edge and Ashwin edged to gully in consecutive balls off Henry. Henry's next over returned the wicket of Pant, who poked an edge to second slip, and it was Henry who produced a fine sprawling catch soon after to pouch Jasprit Bumrah's top-edge at fine leg. Henry then claimed his fourth Test five-wicket haul by having Kuldeep Yadav caught in the gully. India's total was the joint 18th-lowest by any team in Tests. "We were going to bat first too so it was a good toss to lose," Henry said. "It was nice when the clouds rolled in when the toss was done. "We were expecting it to be a flatter wicket but there was plenty of assistance this morning."
