title: Woman jailed for murdering mother-in-law in fire for inheritance - BBC News
date: '2024-05-20'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-69029162
content: |-
  A judge orders Karen Vamplew to serve a minimum of 32 years for the "wicked and terrible" killing.

  Elizabeth Vamplew's family said she was "greatly missed"

  A woman who murdered her disabled mother-in-law for inheritance money by setting fire to her bed as she slept has been jailed for life. Elizabeth Vamplew, 77, died from burns and smoke inhalation after a blaze at her bungalow in Newark, Nottinghamshire, on 15 December 2021. Karen Vamplew was jailed for a minimum of 32 years on Monday. The 44-year-old had denied murder but was convicted after a trial at Leicester Crown Court. Passing sentence, Judge Timothy Spencer told Vamplew she had done a "wicked and terrible" thing when she entered the home of Mrs Vamplew, who was sleeping, and lit the corner of her bed. He said Mrs Vamplew, known as and referred to in court as Anne, was deaf and had poor mobility. "She must have woken to find her bed on fire," the judge said. "Flames, smoke, an inferno and she, unable to hear, confused, terrified.

  Vamplew had "financial troubles", the court heard

  Mr Spencer said Vamplew was Anne's carer and had access to her bank account. He said the defendant, a mother of four from King Street, Newark, had drained the account, reducing it from £27,000 to just £105 in the months before the fire. He said Anne's bank had put a stop on the account the day before the fire and said Vamplew then planned Anne's death. "By the time you implemented this plan, you regarded Anne Vamplew as a burden to you," he added. The judge said "financial matters are inextricably linked with this case" and that Vamplew's husband Mark was "in the dark" over her debts. Addressing Vamplew, he said: "You knew he would inherit half of the estate. "In your muddled thinking, you somehow thought that this fire would mean your financial exploitation would not come to light and that Mark inheriting would smooth over all the financial troubles, enabling debts to be paid."

  The fire took place at a property in Eton Court, Newark, in December 2021

  The trial heard Vamplew had been seen on CCTV leaving her home at about 00:35 GMT on the day of the fire. She parked nearby, but not outside her mother-in-law's home in Eton Court, wearing a hoodie. Vamplew was then seen on CCTV running to her car at 01:13 before heading home, the jury heard. Four minutes later, she got into her car again and drove back to the area before reporting the fire at 01:25. Vamplew told police she had become anxious when Anne did not call her that night as she normally did. She said she had gone to check on Anne but had forgotten the keys to the bungalow and returned to her own home to get them. She claimed she had arrived back at the bungalow to find it ablaze and heard Anne screaming inside. She said she broke in to try to help her but was forced back by heavy smoke.

  During the sentencing, the judge said: "Part of your plan was to present yourself as the heroine who came from her bed on to the scene trying to save her mother-in-law but thwarted by the intensity of the fire. "There was a significant degree of planning, albeit your plan was half-baked and was doomed to end in disaster for everyone - yourself included." Mr Spencer said Anne's death had devastated her family. "She was a sister, a mother, an aunt, a neighbour, and a friend to many," he said. "Until her mobility reduced, she was well-known in Newark as a cheery, bright presence."

