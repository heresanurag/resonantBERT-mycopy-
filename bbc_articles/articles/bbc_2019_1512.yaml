id: bbc_2019_1512
title: Water thrown at homeless man at Sutton station - BBC News
date: '2019-02-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-47360552
content: |-
  Three employees have been suspended after the incident at Sutton station in London.

  Three station staff members are being investigated after they were caught on camera soaking a homeless man with dirty water.

  The footage, which was taken outside Sutton station on Sunday, shows a member of staff pouring a bucket of water onto the man as he lay on the ground.

  The staff can be heard telling him to "get up and go".

  Southern Railway said the two members of staff in the video, and a third colleague identified on CCTV, have since been suspended. British Transport Police said they are investigating the incident as common assault.

  Angie Doll, passenger services director for the rail company, said Southern Railway "would like to apologise" to the man and hopes to get in contact with him "to offer help and support".
