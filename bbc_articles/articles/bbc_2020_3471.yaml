id: bbc_2020_3471
title: Coronavirus clears Venice of crowds - BBC News
date: '2020-03-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-51902703
content: |-
  A Venice resident shows us how the city has been completely transformed by the coronavirus shutdown.

  Eighteen months ago Venice resident Marianna showed us how her city was "suffocating" under the pressure of tourism.

  Now, she shows us how Venice has been completely transformed by the coronavirus shutdown.
