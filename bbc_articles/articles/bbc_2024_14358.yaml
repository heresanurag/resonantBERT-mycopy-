  Penny Mordaunt and Angela Rayner repeatedly clashed in a fiery seven party BBC election debate.

  Heated clash on tax and defence in BBC election debate

  Tory Minister Penny Mordaunt and Labour's deputy leader Angela Rayner repeatedly clashed on defence and tax in a fiery seven party BBC election debate. Ms Mordaunt repeated the controversial claim that Labour wanted to increase tax by £2,000 per household, which Ms Rayner described as "a lie". The UK statistics watchdog criticised the Conservatives' use of the £2,000 figure, claiming it risked "misleading" people. Immigration was another flashpoint in the 90-minute debate, with Reform UK’s Nigel Farage coming under fire from the SNP, Lib Dems, Greens and Plaid Cymru. The debate gave the smaller parties a chance to grab the spotlight following Monday’s head-to-head clash between Rishi Sunak and Keir Starmer, which was also dominated by tax claims.

  It came after what is being seen as the biggest blunder of the election campaign so far, as Rishi Sunak was forced to apologise for leaving D-Day 80th anniversary events early. Penny Mordaunt came under immediate attack over the PM’s decision, which she said was "completely wrong". Ms Mordaunt, a Navy reservist, said it was right that Mr Sunak apologised to veterans and the public but warned it should not become "a political football". Unlike other Conservatives, Ms Mordaunt did not use the opportunity to praise Mr Sunak's record on veterans and defence. Lib Dem Deputy leader Daisy Cooper said Mr Sunak's actions were "politically shameful", while Mr Farage called his early departure a "complete and utter disgrace" from an "unpatriotic prime minster".

