id: bbc_2018_721
title: Saudi billionaire Prince Alwaleed bin Talal released - BBC News
date: '2018-01-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-42846541
content: |-
  Several Saudi billionaires and princes have been freed after months being held at this hotel.

  Prince Alwaleed bin Talal has been released after months at Riyadh's Ritz-Carlton hotel, his family say.

  He, and several other billionaires and princes, were originally detained as part of the kingdom's crackdown on corruption.

  Just hours before he was freed, Prince Alwaleed gave reporters a tour of his "jail", to dispel reports that he had been tortured.
