  Counties began issuing evacuation orders on Monday, with tolls suspended on roads in western and central Florida. School closures in several counties began on Tuesday. Airports in Tampa and Orlando announced they would be suspending flight operations until the storm passes. Parts of Pinellas County, where at least a dozen people were killed by Helene, were placed under evacuation orders on Monday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Huge tailbacks as people try to flee Hurricane Milton

  The National Hurricane Center (NHC) expects Milton to make landfall as an "extremely dangerous hurricane" in the US state of Florida on Wednesday night, local time. It could strike near the city of Tampa, whose wider metropolitan area has a population of more than three million people. Forecasters are warning of torrential rain, flash flooding, high winds and possible storm surges - which occur when water moves inland from the coast. It comes as the US government warns that clean-up efforts could take years after Hurricane Helene. Over 12,000 cubic yards of debris have been removed in Helene-affected areas of Florida in less than two days, officials said. Hundreds of roads remain closed, hampering efforts to send aid to hard-hit communities. As well as in Florida, deaths were recorded in Georgia, South Carolina, Tennessee and Virginia - and the worst-hit state, North Carolina. Biden has so far approved nearly $140m (£107m) in federal assistance.

