  England have to “kick on” from their strong end to the third day of the second Test against West Indies, says Chris Woakes.

  England have to 'kick on', says Woakes

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England have to “kick on” from their strong end to the third day in order to take control of the second Test against West Indies, according to Chris Woakes. Joe Root and Harry Brook shared an unbroken partnership of 108 in testing conditions late on Saturday to leave the hosts 248-3, 207 ahead. “I never like to say we’re in front in a Test, because half an hour can go against us and we’re behind the game again,” said all-rounder Woakes. “The fourth morning will be huge. If that partnership is extended to 150 or 200 then we’re taking the game away. If West Indies take quick wickets they will feel ahead again.”

  England are favourites to win the match and the series after a fluctuating third day, with West Indies continuing their impressive response from a heavy defeat in the first Test at Lord’s. The tourists were bowled out for 457, their highest total in England for 29 years, to take a first-innings lead of 41. Though Ben Duckett and Ollie Pope swiftly put England ahead, they fell in successive Alzarri Joseph overs before Brook’s 71 not out and Root’s unbeaten 37 put England back in the ascendancy. The pitch remains true, the outfield fast and boundaries short. In the last men’s Test played on this ground, two years ago, England pulled off a stunning chase of 299 in only 50 overs to defeat New Zealand, the birth of their ‘Bazball’ style. “We have to kick on again on Sunday to take the game away from West Indies,” said Woakes, playing in his 50th Test. “Naturally, we want as many runs as possible and there’s still two days to play. “We want to be bowling at them as much as possible on day five, when the pitch could wear a little. Sunday is a big day for us, to build the lead up to 250 and 300, then hopefully we can make it really big.”

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the best shots from Harry Brook's half-century

  England enjoyed the better of the early stages on Saturday after West Indies resumed on 351-5, still 65 behind on first innings. Woakes claimed three wickets in a 10-over spell and England took 4-31 overall to leave West Indies 386-9, 30 adrift. From there, England employed curious tactics. Ben Stokes’ side dropped the field to Joshua da Silva, who had 44, in the hope of exposing number 11 Shamar Joseph. With Da Silva hammering three sixes and Joseph two of his own, the last-wicket pair added 71 until Joseph was eventually out for 33, leaving Da Silva stranded on 82. Former England captain Michael Vaughan said the England plan was “questionable” and gave West Indies “a huge chance”. But Woakes, who ended with figures of 4-84, said: “It’s a period that can cause problems. You just have to commit to the plan you’re going with. It’s not always going to be perfect. “When the field goes out, as a bowler it’s easy to think you’re not trying to get the set batter out and just think of the number 11. At the same time, you don’t want to give away easy boundaries. “You don’t always expect the number 11 to hit a couple into the stands. Fair play to them, they played it pretty well. We committed to it for long enough and eventually got the reward.”

