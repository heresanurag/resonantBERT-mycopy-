title: 'Russia elections: Hundreds vote to nominate Navalny - BBC News'
date: '2017-12-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-42473667
content: |-
  Supporters of Russian opposition leader Alexei Navalny gather to nominate him for presidential elections.

  Supporters of Russian opposition leader Alexei Navalny have gathered in Moscow to nominate him for presidential elections.

  But the authorities say that because of a criminal conviction, which he says is politically motivated, he will not be allowed to stand.
