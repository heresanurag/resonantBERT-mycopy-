title: Piers Morgan presses Nadhim Zahawi to apologise for UK market turmoil - BBC
  News
date: '2022-10-06'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63165088
content: |-
  Broadcaster Piers Morgan presses the MP on Question Time to make a "simple apology" to Britons.

  Nadhim Zahawi, the Chancellor of the Duchy of Lancaster, has said he was ''sorry'' - after being challenged about the turmoil in the financial markets following the government's mini-budget.

  He was speaking on the BBC's Question Time programme and responding to prompting from a fellow panellist, broadcaster Piers Morgan.

  Mr Zahawi began by commending the prime minister for her conference speech and action she had taken. But he was pressed again by Piers Morgan for a ''simple apology'' and then replied ''Of course, I'm sorry''.
