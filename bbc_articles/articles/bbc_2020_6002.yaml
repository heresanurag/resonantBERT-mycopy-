title: 'Shirley death: Man and partner charged over death of boy, 6 - BBC News'
date: '2020-06-21'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-53126374
content: |-
  Arthur Labinjo-Hughes died from a head injury hours after being found unresponsive at his home.

  Arthur Labinjo-Hughes died from a head injury in the early hours of Wednesday

  A man has been charged with causing or allowing the death of a child after his six-year-old son died from head injuries.

  Arthur Labinjo-Hughes was found unresponsive at a house on Cranmore Road, Shirley, in Solihull, on Tuesday and later died in hospital.

  Thomas Hughes, 27, and his partner Emma Tustin, 31, who both lived at the address, face the same charge.

  Emergency services were called to Cranmore Road in Shirley at about 15:00 BST on Tuesday

  They are due to appear before Birmingham Magistrates' Court on Monday.

  "Arthur's death is deeply distressing," Det Insp Laura Harrison, from West Midlands Police, said.

  "We have specialist officers with his family as they grieve his loss."

