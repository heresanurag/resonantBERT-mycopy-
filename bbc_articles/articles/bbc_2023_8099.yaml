title: Rudy Giuliani accused of sexual harassment by ex-employee - BBC News
date: '2023-05-16'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-65606131
content: |-
  Donald Trump's former lawyer is accused of coercing an ex-employee into sex in a $10m civil case.

  Donald Trump's former lawyer Rudy Giuliani is being sued for sexual harassment by a former employee.

  Noelle Dunphy alleges in the $10m (£8m) civil case that he coerced her into sex acts and launched into "alcohol-drenched" and racist rants at work.

  The lawsuit claims he exposed himself, took Viagra "constantly" and told Ms Dunphy satisfying his sexual demands was a job requirement.

  Ms Dunphy, who says she was hired by Mr Giuliani's firm in 2019 when he was working as Mr Trump's personal lawyer, filed the legal case in New York state on Monday.

  The lawsuit, which sets out her allegations in graphic detail, says Mr Giuliani began to abuse her almost immediately after she was hired.

  It says the former New York City mayor coerced Ms Dunphy into giving him oral sex "against her will" in his flat.

  It also claims Mr Giuliani "often demanded that she work naked, in a bikini, or in short shorts with an American flag on them that he bought for her" and would visibly touch himself while on video conference calls.

  According to the lawsuit, Ms Dunphy made recordings of conversations with Mr Giuliani which included sexual comments and demands for sex as well as racist, sexist and antisemitic remarks.

  Ms Dunphy is also suing for wage theft, claiming Mr Giuliani refused to pay her a promised $1m salary for the role as it would need to be deferred while his divorce was completed.

  A spokesperson for Mr Giuliani said he "vehemently and completely denies the allegations", describing the claims as "pure harassment and an attempt at extortion".

  "Mayor Giuliani's lifetime of public service speaks for itself, and he will pursue all available remedies and counterclaims," said Mr Giuliani's communications adviser, Ted Goodman, as quoted by the Associated Press.

