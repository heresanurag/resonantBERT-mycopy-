  Dr Shah added: "I'm probably sending a couple of patients to A&E a week because of results I suspect to be faulty. Since Synnovis took over pathology services for south-east London, it's pretty much been a catalogue of disasters. "We're almost second-guessing the pathology system and it's something that never used to happen. "You go to a shoe shop, you expect to buy a pair of shoes; you have a pathology service, you expect accuracy and reliability. That's not happening."

  "Our GPs have lost faith in Synnovis," says Dr Michelle Drage of Londonwide LMCs - a body that represents and supports GPs

  Dr Shah's account is not a lone one. A range of claims has been made by the 14 GPs we have heard from – who all wanted to remain anonymous for professional reasons. One GP told the BBC that the increased workload resulting from having to assess and then escalate unreliable results was leading to "increased burnout and people wanting to leave the profession". Several GPs told of recent instances where they were unable to do timely diabetes tests for patients because of Synnovis delays. Londonwide LMCs (local medical committees), the body that represents and supports GPs across the capital, said the problems with blood-test delays and inaccuracies experienced by GPs in south-east London were not consistent with the pathology service across other parts of the city. "We have never had so many emails and questions, apart from the beginning of Covid, about one particular thing, from one area in London, said Michelle Drage, CEO of Londonwide LMCs. "This is happening on a daily basis, on a clinic-by-clinic basis," she added. Acknowledging the impact the problems have had on the morale and workload of GPs, Dr Drage said: "We do not believe we can rely on Synnovis for accuracy. Our GPs have lost faith and trust in that service – that's a horrible situation to be in." In October, Londonwide LMCs escalated its concerns to the Southeast London Integrated Care Board – the body charged with holding to account the NHS hospital trusts partnered with Synnovis. Dr Drage said the written response it received was "unsatisfactory".

  This email shows Synnovis apologising for a backlog of 70,000 test results in spring 2024 - before the cyber-attack

  As well as hearing the testimony of doctors, the BBC has seen dozens of Synnovis emails, sent to GPs from 2021 to the present day, apologising and attempting to account for various pathology problems, for instance regarding tests for malaria and diabetes. One email showed Synnovis apologising for a backlog of 70,000 test results in spring 2024 - before the cyber-attack. Synnovis has said this backlog was a result of processing issues between legacy third-party providers and that it had been cleared "in days". Dr Jayne - not her real name - explained that it took Synnovis a month to discover the backlog and begin to address it. "It's really difficult to quantify that problem... 70,000 worries," the GP of nearly 20 years told the BBC. "It's really stressful. We try to protect our patients. I feel like I'm constantly apologising for the system. It's not my fault. We really want to be getting on with our work properly and not managing Synnovis's errors."

  Southeast London Integrated Care Board said in a statement that tests requested by south-east London GPs alone amounted to about 10,000 a day, "with a number of logistical steps involved, from blood taking through to results reporting". It said there had been "a number of incidents" since Synnovis took on pathology services for south-east London that had been driven by a "number of factors, including incidents that have impacted on the Synnovis service but which were outside of their control". The statement continued: "You will also be aware that one of these incidents was a criminal cyberattack, the response to which was an extraordinary effort from multiple partners, including Synnovis, to maintain a viable service for our GP colleagues, while Synnovis undertook the significant task of rebuilding their systems from the ground up." According to a statement released by NHS England in October, 10,152 acute outpatient appointments and 1,710 elective procedures were postponed as a result of the cyberattack. The statement said: "The final stages of recovery following the cyber attack on pathology services provider Synnovis in June are almost complete, which means nearly all services are now up and running."

  In its statement, Synnovis said it offered more than 6,000 different types of test, serving almost two million patients, six hospitals and 191 GP practices across 249 sites. "While we understand that any error at all can cause patient and practitioner distress, erroneous Synnovis tests account for significantly less than 0.001% of the 150,000 tests we process per day." However, these figures appear to include all Synnovis testing, including urine tests. Synnovis added in its statement: "The provision of Synnovis's pathology services for GPs is enabled through a range of test-request and results systems and software, a significant portion of which predates the Synnovis contract and are provided by legacy third-party suppliers. "We are very aware that this has been an extremely challenging and sometimes distressing period for patients and front-line NHS colleagues and are incredibly sorry for the inconvenience and upset caused to those affected."

  For college student Kemi, her recent experiences have made her lose confidence in the health service. She said: "I feel like as a young person, not being able to have access to reliable results sets the precedent that I can't have an independent health journey as a 17-year-old. It's hard to know where I can go from here. "It might seem like it's just a blood test but it's serious. It can be a matter of life and death."

