id: bbc_2024_22599
title: Moment explosions go off across Lebanon - BBC News
date: '2024-09-20'
section: General
url: http://www.bbc.co.uk/news/videos/cdenk2721p8o
content: |-
  Blasts were seen across Lebanon as thousands of walkie-talkies exploded in the country.

  Livestream footage of the Beirut skyline over a two-hour period showed the moment devices exploded across the city on Wednesday, after thousands of walkie-talkies exploded in Lebanon.

  Explosions were also seen in other locations in the country - including during a funeral - in footage shared on social media.

  Just a day earlier, thousands of pagers used by members of the armed group Hezbollah exploded in the country.

  The walkie-talkie blasts killed 20 and injured at least 450; the pager explosions killed 12 and injured more than 2,000.

  Not all footage has been independently verified by the BBC.
