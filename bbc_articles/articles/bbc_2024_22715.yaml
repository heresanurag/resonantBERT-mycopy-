  Three men charged over cruelty at SEND school

  The Life school in Wirral was shut down in the summer after a BBC investigation

  Three men have been charged after a BBC Panorama investigation revealed child cruelty at a special educational needs school. An undercover reporter spent about seven weeks at the independent Life Wirral in Merseyside, and witnessed some staff manhandling pupils and mocking their neurodiversity or learning disabilities. The school was permanently closed after the allegations and an independent review is due to take place. Three men, aged between 21 and 26, have been charged with offences including assault and abusive behaviour.

  The Panorama episode, which was broadcasted in June, showed some staff at the school using sexist and homophobic terms towards pupils. Undercover footage showed pupils being put into a headlock, and in some cases, staff drawing on a child's face or pushing a student to the ground. Det Insp Peter Rexwinkel said: “We know this investigation has raised concern in the community, and - working alongside partners in the local authority and health bodies - support has been and will continue to be provided to the pupils and families affected.”
  • None Elliot Miller, 21, of Liscard, has been charged with common assault of an adult, a public order offence, two counts of assault by beating and common assault
  • None Daniel McNulty-Doyle, 21, of Little Neston, has been charged with using threatening, abusive words or behaviour likely to cause harassment, alarm or distress
  • None Oliver Nugent, 26, of Irby, has been charged with assault by beating The charges related to offences which allegedly took place between March and May, the force added.
