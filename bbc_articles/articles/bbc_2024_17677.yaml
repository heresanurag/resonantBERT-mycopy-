  Ashleigh Barty, Australian former world number one and 2021 Wimbledon champion, on BBC TV I think this is a beautiful foundation for Emma to build from. Her career has been back to front in a way. She flipped the script and went right to the top, won a Grand Slam. This is her chance to use her experience but it's also a restart. You have to be accountable for your own actions and understand there are consequences and she's comfortable with that. I think she has a better life balance now and she's enjoying her tennis. She's fit and healthy and building some continuity.
