title: Two dead as Hurricane Fiona devastates Puerto Rico - BBC News
date: '2022-09-19'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-62947900
content: |-
  Most of the US island's power will take days to restore after flooding and landslides hit.

