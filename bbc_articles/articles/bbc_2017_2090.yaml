title: Meet Austria's Vegetable Orchestra - BBC News
date: '2017-02-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-38963633
content: |-
  The musicians out to prove it's okay to play with your food.

  Austria's Vegetable Orchestra travels the world making music with carrots, cabbages and red peppers.

  Bethany Bell caught up with the musicians at their Vienna workshop to see how they make their musical vegetables.
