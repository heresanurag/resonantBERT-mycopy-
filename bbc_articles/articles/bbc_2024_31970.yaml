content: |-
  Thomas Conley was sitting next to Isaiah Rodriguez at lunch when he noticed something was wrong.

  A US primary schoolboy has been hailed as a hero after he saved his classmate from choking on a grape.

  Thomas Conley, eight, was sitting next to Isaiah Rodriguez in the cafeteria of Porter Elementary School when he noticed the medical emergency.

  Video footage from the hall in Mesa, Arizona, shows Thomas performing the life-saving Heimlich manoeuvre on his friend, before any adults had even realised Isaiah was in danger.
