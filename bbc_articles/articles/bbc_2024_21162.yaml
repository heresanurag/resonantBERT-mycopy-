title: Six in court accused of smuggling cocaine in bananas - BBC News
date: '2024-08-08'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cm2n9m8vxx4o
content: |-
  A delivery to "Glasgow Fruit Market" containing drugs was intercepted at the Port of Dover in 2020.

  Six in court accused of smuggling cocaine in bananas

  The trial at High Court in Glasgow is expected to last until October

  Six men have gone on trial accused of an international drug smuggling plot that involved hiding cocaine in bananas and sending them to Glasgow. Court documents state that the UK Border force intercepted boxes of fruit in Dover in September 2020 and found 952kg of cocaine hidden inside. It was bound for Glasgow Fruit Market at an address in Glasgow's Townhead. The National Crime Agency and Police Scotland said it was found to be cocaine with 73% purity. The men deny the charges against them.

  The UK Border Force searched the boxes and found packages of blocks of white powder. Prosecutors allege the class A drug was sent from Ecuador. There were 119 foil packages, each containing eight 1kg blocks - making 952 blocks in total. Two more packages addressed to Glasgow Fruit Market Ltd were intercepted later. James Stevenson, 59, is alleged to have directed a drugs trafficking operation that spanned the UK, Spain, Ecuador and Abu Dhabi. He is accused of ordering Lloyd Cross, David Bilsland and others to import the cocaine. He has submitted a special defence of incrimination against Mr Cross and an another man - who were both in prison at the time.

  Mr Stevenson is also accused of working with another man to collect, store and transmit more than £1m of criminal funds with "encrypted communication devices". Another charge states that Mr Stevenson, Mr Bilsland and 43-year-old Garry McIntyre were involved in serious organised crime and the supply of cocaine. Mr Stevenson and Gerard Carbin, 45, are also accused of directing Paul Bowes, 53, Ryan McPhee, 34, and another person in the production and supply of street Valium and the tranquilliser Alprazolam. A further charge claims Mr Stevenson was involved in serious organised crime with a person now in prison. The indictment also states that "concealed hides" in cars were used for moving drugs. The final charge claims that Mr Stevenson conspired with others to set fire to several properties and cars - including a beauty salon in Hamilton, Lanarkshire. The trial at the High Court in Glasgow was adjourned until August 26 and is expected to last until October.
