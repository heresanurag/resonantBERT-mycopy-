title: 'Coronavirus: Speak to those breaking rule of six first before calling police
  - PM - BBC News'
date: '2020-09-17'
section: UK
url: http://www.bbc.co.uk/news/uk-54186098
content: |-
  Boris Johnson says he is not a fan of "sneak culture" over his new rule banning gatherings larger than six.

  Police, pictured here in Edinburgh in June, now can break up groups larger than six

  People should speak to those who are breaking the rule of six limits on social gatherings before reporting them to police, the prime minister has said.

  In an interview with the Sun, Boris Johnson said he had "never much been in favour of sneak culture, myself".

  It comes after policing minister Kit Malthouse, called on people to report neighbours breaking the coronavirus rules.

  The new measures came into force in England, Scotland and Wales this week.

  Speaking to the Sun, Mr Johnson said: "What people should do in the first instance is obviously if they are concerned is raise it with their friends and neighbours.

  "But I think what is reasonable for anyone to do is if they think there is a serious threat to public health as a result of their neighbour's activities - if there is some huge kind of Animal House party taking place, as I am sure, hot tubs and so forth - and there is a serious threat to public health then it's reasonable for the authorities to know."

  The prime minister was referring to the 1978 film National Lampoon's Animal House which featured a large toga party.

  The new measures ban social gatherings of more than six people but vary in the different nations - for example in England and Scotland the law applies both indoors and outdoors, but indoors in Wales.

  It applies to all ages in England, but not to those aged 12 and under in Scotland and those under 11 in Wales in those households.

  Police have the power to break up groups larger than six and people who ignore officers could be fined £100 - doubling with each offence to a maximum of £3,200.

  Mr Johnson's comments differ to what his Conservative colleagues have previously said.

  Earlier this week, Home Secretary Priti Patel was asked whether she would alert the police about her neighbours if they broke the rules, replying: "I don't spend my time looking into people's gardens."

  But pressed further on the topic in the BBC Radio 4 Today interview, she said: "I think anybody would want to take responsibility and ensure we're not spreading this awful disease and therefore if I saw gatherings of more than six people clearly I would report that."

  She also said families stopping for a chat in the street was considered "mingling" and would also be breaking the rules.

