title: North East refugee charities close their doors over safety fears - BBC News
date: '2024-08-07'
section: England
url: http://www.bbc.co.uk/news/articles/cgrjjn4101vo
content: |-
  Businesses and charities associated with refugees have closed their doors to keep staff safe.

  A refugee charity has said police officers who worked during riots in Sunderland on Friday still attended community meetings the next day

  Refugee charities are offering support to migrants while at the same time taking action to keep themselves safe during ongoing unrest. Some organisations and firms with the words "immigration" or "asylum" in their names said they were worried by rumours they may be targeted. A Newcastle lawyer said he had shut his office, while a north-east England charity temporarily closed its doors and cancelled planned events for asylum seekers. "We don't want to put anyone at extra risk," a worker at the organisation said.

  The charity, which asked not to be named, said volunteers had faced racial abuse on public transport. They had been to a Newcastle hotel housing asylum seekers to hand out leaflets with advice about how to stay safe. "People are scared," the worker said. "But we also saw some police presence – which is reassuring."

  A number of people have been convicted of violent disorder following the riots in Sunderland on Friday

  Another refugee charity operating in Sunderland said people using its service were "terrified" following the unrest. The organisation had attempted to go ahead with an event for children but concerned families had stayed away. Of the 20 children registered for the event, only one turned up.

  However, another Northumberland refugee charity said migrants were being reassured by the support given to them by police. The secretary of the charity, who the BBC is not naming for safety reasons, said officers who worked during Friday's riot in Sunderland returned to speak to the community on Saturday. He said the level of support from police was something asylum seekers may not have received in their home countries. "People have come from situations where the police don't operate like that," he said. "To have the police very firmly on your side is a good experience."

  Residents in Sunderland took to the streets on Saturday to clear up the city

  The unrest and abuse "brings back the experience people have had in other countries and on their way to England," he added. However, the charity said most people knew the riots had been carried out by a minority and not the "ordinary decent people they come across in their daily lives". A spokesperson for the Home Office said all asylum seeker accommodation sites had security staff and it was continually reviewing their security with providers.

  Northumbria Police Assistant Chief Constable Andrew Hill said: "We know there will be members of the community who are feeling frightened and marginalised at this time. "We are here for you and we are committed to keeping you safe." ACC Hill said a number of people had been arrested following disorder in Sunderland last week and those convicted would "likely receive considerable sentences". "This should act as a warning to anyone with the intention of causing any further disorder – you will face the full force of the law."

