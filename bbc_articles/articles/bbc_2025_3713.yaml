title: Trio locked up for Israeli record producer kidnap ambush - BBC News
date: '2025-03-14'
section: Wales
url: http://www.bbc.co.uk/news/articles/c2ljglvv842o
content: |-
  Itay Kashti's kidnappers were motivated by "political and religious reasons," a court hears.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the moment three kidnappers were found hiding in a field and arrested after trying to abduct a record producer

  Three men lured a record producer to an isolated cottage in a botched kidnap attempt due to his Israeli heritage, a court heard. The kidnappers were motivated by political and religious reasons, as well as money, when they posed as representatives of Polydor Records to target Itay Kashti, Swansea Crown Court heard. Mr Kashti said the attack on him, as an Israeli, felt like his "own personal October 7th", a reference to the large-scale attack launched by Hamas on Israel in 2023. Mohammad Comrie, 23, from Leeds, Faiz Shah, 23, from Bradford, and Elijah Ogunnubi-Sime, 20, from Wallington, London, pleaded guilty to kidnap and each received a custodial sentence of eight years and one month.

  Shah and Comrie will both be jailed while Ogunnubi-Sime was sent to a young offender institution. The trio created a "shopping list" of items for the kidnap plot, including face masks, gloves, a gag, rental cars and a suitable rental location for the kidnap to take place. Judge Catherine Richards called the list "chilling" and "clearly intended to create fear of violence". "Mr Kashti was targeted due to his Jewish heritage," with the kidnappers "motivated by events taking place elsewhere in the world," the judge added. "He was an entirely innocent, hard-working music producer that you had identified as a victim based on your understanding of his wealth and his Jewish heritage," she said.

  Elijah Ogunnubi-Sime (left), Mohammad Comrie (centre) and Faiz Shah (right) admitted kidnap charges after targeting Itay Kashti

  On 14 August 2024, Mr Kashti was emailed by a man calling himself Lucas Winslow and claiming to work for Polydor, inviting him to a "music recording camp" in rural Wales. Prosecutor Craig Jones told the court it was the start of "careful and elaborate" plan which was discussed in "minute detail" by Comrie, Shah and Ogunnubi-Sime over the Telegram messaging app. Mr Jones said the ultimate aim was "the kidnap of the complainant". Handcuffs and cable ties were taken to the cottage in Brynteg, Ceredigion, by the three men, who also tried to source ketamine to drug their victim.

  The three men hoped to extort money from Mr Kashti "who they perceived to be a wealthy individual", but Mr Jones said there was "clear political and religious motivation" because of his nationality. In one conversation it was said: "All three of us have complete 100% faith in Allah so we can't fail." Cryptocurrency arrangements were also discussed in order to launder the funds obtained during the kidnap and potential escape routes were considered.

  Police recovered this air pistol from the rural cottage where the gang held their victim

  The original property chosen was booked, so the defendants decided to rent the Gatehouse for a week with an online booking made in the name of a stolen identity. The three had also fraudulently obtained stolen bank details. A taxi was booked on 26 August to collect Mr Kashti from his London home using a mobile phone registered to an unknown third party that was found in the Gatehouse. Both the taxi operator and driver Mohammad Amowar were "innocent parties and as much duped as the complainant".

  Police recovered rubber masks which the kidnappers bought as part of a kidnap "shopping list"

  On arrival at the property, Mr Kashti and Mr Amowar realised they had walked into a "well laid trap." and were attacked immediately. Mr Kashti was attacked by the three wearing "anonymous-style" face masks while Mr Amowar was hit in the face but managed to escape through the front door. Mr Kashti was punched and kicked, suffering injuries to his face and head, and handcuffed to a radiator before being told he "would be killed" if he tried to escape.

  Itay Kashti was attacked and tied to a radiator in this cottage, but managed to escape

  But the record producer managed to free himself by lifting his hands "up and off the pipe" and ran out of the property, still wearing the handcuffs. He hid in nearby bushes and phoned his wife, who called the police, as did Mr Amowar. Mr Kashti suffered swollen and bruised eyelids, a swollen nose and bruising to his back, knees and leg and a cut to the scalp. The kidnappers fled but were found by police that evening hiding in a nearby field, while a search of the house uncovered an air pistol and bleach. While hiding, Ogunnubi-Sime was in contact with an unknown individual who he tried to "direct" so he could be "transported away". In a victim impact statement, Mr Kashti said he felt "shock and fear" and was thinking of his Jewish ancestors who had experienced the Holocaust. He said he suffered from anxiety and now "felt uncomfortable and unsafe". Balbir Singh, representing Shah, admitted the plot was "not very well planned and went wrong immediately" but his client felt "regret and remorse". Roderick Jones representing Comrie admitted the plot had been "highly amateurish in its execution" and he felt "genuine remorse". Waheed Barber said Ogunnubi-Sime was a "good, generous individual" and he was a "redeemable character".

  Mr Kashti was handcuffed to a radiator pipe, but escaped and managed to call his wife, who contacted the police

  Michael Cray of the Crown Prosecution Service said: "This must have been truly terrifying for the two victims, who had no idea they were walking into a trap. "We would like to thank them for supporting this prosecution and hope the fact these offenders have been brought to justice will help them move forward with their lives."
