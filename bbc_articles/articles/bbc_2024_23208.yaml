title: 'Pakistan v England: Ben Stokes ''on track'' to participate in three-Test series
  - BBC Sport'
date: '2024-09-25'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cqxrej8jr8jo
content: |-
  Ben Stokes has not played for England since the 3-0 series defeat of West Indies

  England say captain Ben Stokes is "on track" to participate in the series against Pakistan, which begins in 12 days. The all-rounder has been out of action since he suffered a hamstring injury playing in The Hundred for Northern Superchargers at the beginning of August. Stokes, 33, underwent a planned scan on the injury on Wednesday. An England statement said: "The results of the scans were positive and confirmed that his recovery, since sustaining the injury six-and-a-half weeks ago, remains on track to participate in the upcoming Test series against Pakistan." England travel to Pakistan on Tuesday. The three-Test series starts in Multan on Monday, 7 October. Stokes missed England's 2-1 defeat of Sri Lanka, with Ollie Pope stepping up to captain. Even if he is on track to lead England in Pakistan, there is significant doubt over whether he will be able to bowl in the early part of the tour.

  Speaking to Sky Sports on Tuesday, Stokes was asked if he was likely to be able to bowl in the first Test and said: "I think that's you getting ahead of yourself. Obviously I've been six-and-a-half weeks now of just walking and doing stuff in the gym. "There's a lot more than just my hamstring that I need to get back firing and working up again in terms of bowling, because you use everything, so I need to get that all right to make sure I don't do any damage to other parts of my body." On his recovery, Stokes added: "I'm all good. I have my six-and-a-half week scan tomorrow and we'll know more from that, but I am feeling good," Stokes said. "It was a hamstring tear which sneaked into my tendon. That's why it takes a week or two longer than a normal hammy. Rehab has gone really well so hopefully everything tomorrow gets the the all clear and start pushing it a bit more." In Stokes' absence from the Sri Lanka series, England opted to cover for the all-rounder by moving wicketkeeper Jamie Smith to number six and playing an extra bowler. The scenario of Stokes only being able to bat would potentially leave England with a selection decision. If they were to continue with the balance they favoured against Sri Lanka, England would have to bat Stokes in the top five, therefore squeezing out one of their regular top order. To avoid that scenario, England could revert to four frontline bowlers, supplemented by Joe Root's off-spin, a tactic they favoured when Stokes was unable to bowl because of a knee injury in India earlier this year. England won 3-0 on their last visit to Pakistan in 2022, the first time a visiting team had recorded a three-Test clean sweep in the country.
