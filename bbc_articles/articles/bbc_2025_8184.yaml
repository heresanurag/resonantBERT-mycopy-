  Batter Harry Brook is named England's white-ball captain in both 50-over and T20 cricket.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The 26-year-old replaces Jos Buttler, who stepped down after England were knocked out of the Champions Trophy in February. Brook will take charge in both one-day internationals and T20s - ending speculation England could split the captaincy for the two formats. The Yorkshireman, Butter's vice-captain over the past 12 months, was seen as the leading candidate for the job along with Test skipper Ben Stokes. "He's been part of our succession planning for some time, albeit this opportunity has come slightly earlier than expected," Rob Key, the managing director of England men's cricket said. "Harry is not only an outstanding cricketer, but also has an excellent cricketing brain and a clear vision for both teams that will help drive us towards winning more series, World Cups and major global tournaments."

  Brook has played 26 T20s and 44 one-day internationals for England

  This is Brook's first full-time captaincy role with England, though he led the ODI side in a five-match series against Australia in September when Buttler was injured. He is a former England Under-19 captain and led Northern Superchargers in The Hundred last year. In appointing Brook, Key has overlooked concerns about the batter's workload. Brook was due to play in this year's Indian Premier League but pulled out to manage his workload. He has not played since a disappointing run in England's dismal Champions Trophy campaign. As a key player across Tests, 50-overs and T20 he will have a packed schedule if, as England plan, he is to play all matches. England's priorities this year are two huge Test series - against India at home this summer and the Ashes in Australia this winter. Key said he would consider "every option" last month and in selecting Brook he has allowed Stokes, who has struggled with injuries in recent years and is currently out with a hamstring issue, to concentrate on the Test side. Brook's first series as skipper will be three ODIs and three T20s against West Indies, which begin on 29 May - four days after a Test against Zimbabwe. The series ends on 10 June which is 10 days before the start of the India series. After that, England do not play again in white-ball cricket until series against South Africa and Ireland in September. There is also a white-ball tour to New Zealand in early November before the Ashes begins on 21 November. Brook's first International Cricket Council event will be the T20 World Cup in India and Sri Lanka, which follows the Ashes in February and March next year. England's white-ball sides have largely struggled since winning the 2022 T20 World Cup to become the first men's team to hold both global limited-overs titles. Disappointing defences of their titles at the 2023 World Cup in India and 2024 T20 edition in the Caribbean led to Matthew Mott being sacked as coach and heaped pressure on Buttler, who stood down after an underwhelming Champions Trophy. "It's a real honour to be named England's white-ball captain," Brook said. "Ever since I was a kid playing cricket at Burley in Wharfedale, I dreamed of representing Yorkshire, playing for England, and maybe one day leading the team. To now be given that chance means a great deal to me. "There's so much talent in this country, and I'm looking forward to getting started, moving us forward, and working towards winning series, World Cups and major events."
