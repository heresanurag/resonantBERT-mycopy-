title: 'Munster Square stabbing: Boy, 16, killed in Camden - BBC News'
date: '2019-08-13'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49327140
content: |-
  A murder probe is under way after the 16-year-old victim was found dead in Camden on Monday.

  Police officers were called to Munster Square in Camden on Monday evening

  A 16-year-old boy has been stabbed to death in north London.

  Police officers and the London Ambulance Service were called to Munster Square in Camden at about 23:10 BST on Monday.

  Scotland Yard said the victim had been "chased around the square by a number of suspects" before being stabbed repeatedly.

  A murder investigation has been launched and a crime scene remains in place. No arrests have been made.

  Det Ch Insp Paul Healy said the attackers had fled in a vehicle "which was discovered burnt out nearby".

  "Another vehicle believed to be involved in the incident was also found burnt out some distance away," he said.

  A large police cordon stretching across a number of roads was in place on Tuesday morning.

  The teenager's next of kin have been informed.

