  Elsie Dot Stancombe's parents ask the community to give their daughter "the best possible celebration".

  Help us to celebrate 'Elsie's special day' - family

  Elsie Dot Stancombe's family will walk alongside her funeral cortege on what they have called her "special day"

  The family of an "extraordinary" seven-year-old girl who was killed in the Southport stabbing attacks have asked their community for help giving her "the best possible celebration". Elsie Dot Stancombe died alongside Bebe King, six, and Alice da Silva Aguiar, nine, after an attacker walked into a Taylor Swift-themed holiday club on 29 July. Elsie's family have shared a statement ahead of her "special day", describing her as an "amazing little girl" and encouraging mourners to wear bright colours. F.J Gibb Funeral Directors said the service would take place at St John's Church, Birkdale, from 10:00 BST.

  Elsie's family have shared a family photo of their "amazing little girl" with mum Jenni, dad David and younger sister Rosie, aged three

  In a statement released by Elsie's family ahead of her "special day", they said they would be celebrating her life "with positivity, hope and love". "‘We are the four best friends in the whole wide world’ – and that mantra will remain with us for the rest of our lives, sound in the knowledge that Elsie is here with us and forever will be in our hearts," they said. Elsie's family said she "spent every day just simply enjoying life with determination, persistence, love and kindness". They added that Elsie, a "devoted Swiftie", brought "light, love and joy to so many lives". Elsie's family said they would "always be grateful for the love and support we have had over these past weeks", and they were proud to live in Southport. They said they would ensure Elsie’s impact and legacy "endures with positivity and hope and with Elsie by our side forever and always".

  Reverend Jennie Hardy, who will preside over the church service, told BBC Radio Merseyside that Elsie's parents described her as an "extraordinary little girl". Ms Hardy said they had told her she was "very kind-natured" and "would look after other people". She added: "She loved chatting, she loved having fun. She loved a party and a celebration. "She was unusual in some ways that she could really connect and converse with adults along with children. "She was wise beyond her years; emotionally intelligent and just an absolute joy to be around."

  Ms Hardy said Elsie's love of celebrations would be reflected in the service, when the funeral cortege will be greeted with a "pink carpet". She said: "We are hoping there can be some joy amid the sadness." Lighthouse Choir from Liverpool will perform throughout, while a singer and pianist will perform some of Elsie's favourite songs -including by Taylor Swift. Elsie's family will walk behind the cortege from her home to the church, along Dunbar Road, Sandon Road, Cardigan Road and St John's Road. Members of the public who want to pay their respects are asked to gather from Dunbar Road or near the church.

  The service will be live-screened at St John's Church Hall and Liverpool Road Methodist Church in Birkdale. The family will go on to a private service in Burscough. A vigil is planned at The Atkinson arts centre in Lord Street in Southport later. Royal Mail staff will pay tribute when the cortege passes as Elsie's father, David Stancombe, is a postal worker. Eight other children and two adults were seriously injured during the knife attack. On Wednesday, King Charles held a private meeting with the families of Elsie, Alice and Bebe in London, after having travelled to Southport on Tuesday. He met survivors and emergency service workers in the town and also signed a book of condolence.

  Elsie Dot Stancombe's family have shared the following statement, on her "special day". Elsie embraced life and it is with positivity, hope and love that we celebrate her life today, 23rd August, on ‘Elsie’s Special Day’. Elsie spent every day just simply enjoying life with determination, persistence, love and kindness. Elsie was an amazing little girl. She had the ability to light up any room that she entered, she was truly unforgettable. She loved to dance, and it goes without saying she was a devoted ‘Swiftie’, she was always up for anything and gave every activity a go, we went to them all. She found her real passion in cheerleading, her weekly classes couldn’t come around quick enough. Her persistence was admirable, from completing a 3k run and 10k charity walk for her local hospice, as well as moving up books bands in school, everything she did she gave 100% and would never give up. Our family affirmation is 'as long as you try your best, enjoy yourself and have fun, nothing else matters'. 'We are the four best friends in the whole wide world' – and that mantra will remain with us for the rest of our lives, sound in the knowledge that Elsie is here with us and forever will be in our hearts. Elsie has brought light, love and joy to so many lives and it has been clear to us in the overwhelming response from everybody that knew her and everybody within the community. We will be always be grateful for the love and support we have had over these past weeks and we are and will continue to be proud to live in Southport. To that end, Elsie’s legacy will continue and as a family we will ensure that her impact and legacy endures with positivity and hope and with Elsie by our side forever and always.
