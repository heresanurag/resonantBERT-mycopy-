title: New CCTV shows missing Victoria Taylor at Malton Bus Station - BBC News
date: '2024-10-08'
section: England
url: http://www.bbc.co.uk/news/articles/cvgljgynmepo
content: |-
  Police say there is no suggestion of any "third-party" involvement in Ms Taylor's disappearance.

  Ms Taylor was seen on CCTV at Malton Bus Station at 11:53 BST on Monday 30 September

  Police have released a new CCTV image of a nurse who went missing a week ago. Victoria Taylor, 34, was last seen at her home in Malton at about 09:00 BST on Monday 30 September and some of her possessions were later found by the River Derwent. North Yorkshire Police said it had a new confirmed sighting of Ms Taylor, who is originally from Huddersfield, at Malton Bus Station at 11:53 BST on the day she went missing. The force has said there is no suggestion of any "third-party" involvement in Ms Taylor's disappearance.

  A blurry CCTV image from the bus station showed her wearing a camouflage green coloured cap, as well as a rucksack, light blue jeans and white trainers. Her previously last known movement had been at 11:35 BST, when CCTV cameras captured her at a BP garage on Welham Road in the Norton area of the town.

  Ms Taylor's family have said they are "distraught" by her disappearance

  The force said it remained "open-minded" about the cause of her disappearance but said there was currently "no information to suggest any form of third-party involvement following the disappearance of Victoria". A spokesperson said extensive searches by officers and drones have been carried out, including the use of divers and specialist sonar equipment to try and locate Ms Taylor.

  Police said the focus of the search remains the area around the River Derwent

  Insp Martin Dennison said: “This is an extremely difficult time for Victoria’s family, and we are continuing to do all we can to try and find her. “The focus of our search remains the area around the River Derwent and Victoria’s family members are aware of this and the wider strategy that is in place. “The family and the police understand the local community wanting to show their support with the searches for Victoria, but we urge people to exercise caution when searching particularly near to the river.” Last week, Ms Taylor's sisters Emma and Heidi said in a statement: "We currently feel sick, distraught and lost following the disappearance of Vixx, but we are trying to focus on the children in the family to maintain a sense of routine at this difficult time." They also thanked the community and emergency services involved in the search for Ms Taylor. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
