content: |-
  Thousands of demonstrators have taken over President Gotabaya Rajapaksa's residence in Colombo.

  Sri Lankan President Gotabaya Rajapaksa's residence has been invaded by thousands of protesters in the capital Colombo.

  There have been months of protests in Sri Lanka over the country's economic crisis.

  The president has reportedly been moved to a safer location.
