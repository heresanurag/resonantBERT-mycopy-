title: London chess child prodigy becomes UK's youngest grandmaster - BBC News
date: '2024-08-06'
section: London
url: http://www.bbc.co.uk/news/articles/crkmm0jr5gno
content: |-
  Woolwich youth from India gains prestigious title at British Chess Championships

  Shreyas is one of the UK's most talented young chess players

  The father of a 15-year-old chess prodigy from south-east London who has become Britain’s youngest grandmaster says it is a “great moment” for his son. Shreyas Royal, from Woolwich, achieved the prestigious title at the British Chess Championships on Sunday. His father Jitendra told BBC London: “He is working really hard. He has a real ambition.” To earn the title of grandmaster – only bestowed on players of the highest level of skill – a player must win a series of games, usually at three separate tournaments.

  The UK’s previous youngest grandmaster achieved the title in 2007 at the age of 16. Shreyas was born in India and the family moved to south London when he was three years old, after his father was offered a job as an IT project manager. His talent was spotted early and he has been rated as one of the country’s best chess prospects for several years. Jitendra said: “When we moved to the UK for my work assignment, he was doing a lot of mathematical things. “When he was three-and-half his mum decided to put him in some mental activity. She took him to the chess club when he was five years old. From there his interest started and his journey started.” He added: “There is no one in my family who plays chess - I just know the basic moves.”

  Shreyas’ exceptional talent was a factor in allowing him and his family to remain in the UK when his father’s work visa expired in 2018. Labour politicians Matthew Pennycook, the Greenwich and Woolwich MP, and Rachel Reeves MP, the current chancellor of the exchequer and a former junior chess champion, both made representations on their behalf. Jitendra said: “At that time he was one of the best players in England and the English federation fought for him and Matthew Pennycook wrote to (then home secretary) Sajid Javid. Mr Javid said he had taken a personal decision to allow Shreyas and his family to stay in the UK. He said: "The UK is a country that fosters world class talent and Shreyas is one of the most gifted chess players in his generation.” The family are now British citizens.
