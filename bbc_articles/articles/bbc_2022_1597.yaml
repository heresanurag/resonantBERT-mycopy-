  After losing two of their first three matches, Muirhead's side were under pressure - and backed up their 10-5 win against the United States. They immediately hit the front by taking two in the first end with the hammer, but Denmark kept pace all the way to the ninth end in a cagey encounter. After Britain emerged from a closely fought eighth end with one and a 4-2 lead, Denmark skip Madeleine Dupont was left with a difficult draw to stop Muirhead's side scoring three, but her attempt was heavy. They now have a record of three wins and two defeats. "We had a really strong start out there, we were going well going a couple up early on but we always felt in control," said third Vicky Wright. "It was good to get two wins back-to-back but tomorrow is another day and we start fresh again."
