content: |-
  Both of Great Britain's curling teams boost their semi-final hopes at the Winter Olympics with wins over Denmark and China.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Both of Great Britain's curling teams boosted their semi-final hopes at the Winter Olympics with wins over Denmark and China. Bruce Mouat, Grant Hardie, Bobby Lammie, and Hammy McMillan saw off China 7-6 and the Danes 8-2. They sit second in the standings after five games. Eve Muirhead, Vicky Wright, Jen Dodds and Hailey Duff beat Denmark 7-2 to move joint third in the women's section.

  The teams each play nine matches in the round-robin stage, with the top four advancing to the semi-finals. Mouat's rink return to the ice first on Monday to face fellow contenders Switzerland at 06:05 GMT, while Muirhead's side have the chance to effectively eliminate medal hopefuls Canada (12:05). Sitting on two wins and one loss after Saturday's games, the men's team had the chance to build some momentum against the perceived weaker sides, but were still put to the test. They managed to score in just two ends against the Chinese, but a four in the second and a three in the eighth was enough for victory. Denmark were winless from their previous four matches and Mouat's rink - world silver medallists and European champions - were ruthless in punishing early mistakes for a 4-1 lead at the halfway point. Mikkel Krause's rink stayed within three scores until the eighth end, but conceded after losing three. The British side now have four wins and one defeat from five games.

