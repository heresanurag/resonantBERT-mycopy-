title: Disruption on Channel ferries due to Calais strike - BBC News
date: '2024-06-07'
section: Kent
url: http://www.bbc.co.uk/news/articles/c0wwg1x2qeyo
content: |-
  Passengers attempting to travel to Dover from Calais are being told to go to Dunkirk.

  People trying to cross the Channel from France are facing disruption

  Ferry services from Calais to Dover have been disrupted due to strike action at the French port. Operators P&O Ferries, Irish Ferries and DFDS have cancelled, delayed or rerouted sailings because of a dispute over pension reforms. P&O Ferries and Irish Ferries confirmed before lunchtime that their check-in services had reopened, however they said continuing strikes could still cause disruption. DFDS have also confirmed that its check-in at the Port of Calais had reopened but it warned of waiting times of more than an hour.

  The Port of Dover said some services could be delayed by the strikes. It said it understood the industrial action would last until midnight on Saturday. Tourist John Nurden, who had been on a sight-seeing trip to Versailles, was on a coach stuck in the queues at the Port of Calais. "There are 46 on our coach and four coaches ahead of us," he said. The strike comes after veterans of World War Two made the journey to northern France for the 80-year anniversary of the D-Day landings on Thursday. "We're annoyed but not surprised French workers have chosen today to blockade the port," Mr Nurden added.

  Mr Nurden said his coach operator has arranged alternative travel on the Eurotunnel. "Full marks to the coach company and drivers who have responded so quickly to this action - although passport control is taking an age," he said. "Each coach is being thoroughly checked." Irish Ferries cancelled at least four sailings, while DFDS rerouted all its Calais-Dover crossings to Dunkirk, which is around 30 miles (48km) to the east of Calais. Irish Ferries said at about 07:00: “Due to port strike action at Calais on Friday, there is expected to be delays and disruption to all sailings on the Dover-Calais route. “We will work to ensure you are put on the next available sailing. We thank you for your patience.” DFDS said: “Passengers affected should proceed to Dunkirk port, where they will be rebooked and accommodated onto the next available sailing. We apologise for any inconvenience caused.”

  Have you been affected by the strike action at Calais?
