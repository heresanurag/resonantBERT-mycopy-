  Boris Johnson and Keir Starmer clashed over conviction rates for rape and sexual assault.

  Starmer: Sentencing bill 'did more to protect statues than women'

  Keir Starmer says Labour declined to support the government's sentencing bill because it did "more to protect statues than women". He asks what section of the bill "will do anything" to increase the number of reported rapes that result in a charge being brought. He says this is currently not the case in 98.4% of reported rapes. The prime minister points to a section of the bill to get rid of the early release people who have already been convicted of rape at the halfway point in their sentence. He says the government is also investing to ensure there are advisers so that rape victims and survivors "have people in whom they can confide and trust".
