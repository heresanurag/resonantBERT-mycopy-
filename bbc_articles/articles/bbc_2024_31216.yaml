title: 'Andew Tate: Court sends human trafficking case back to Romania prosecutors
  - BBC News'
date: '2024-12-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn8g32l4xyvo
content: |-
  A court upholds the influencer's challenge of the human trafficking case against him and his brother.

  Andrew and Tristan Tate are accused of human trafficking and sexually exploiting women

  A human trafficking case brought against controversial influencers Andrew and Tristan Tate cannot proceed to trial in its current form, a court in Romania has ruled. On Thursday, the Court of Appeals in Bucharest upheld a challenge from the brothers, sending the case back to prosecutors for further review. It is the second time the court has returned the case to prosecutors. The Tate brothers, aged 38 and 36, are accused of human trafficking and forming an organised group to sexually exploit women. They have strongly denied the charges.

  In November, the same court found "irregularities" in the indictment against them, requiring prosecutors to amend their brief. At the time, the court also removed several pieces of evidence, deeming some statements from alleged victims inadmissible. The brothers' successful appeal on Thursday marks another setback for prosecutors. They have accused the dual UK-US nationals of exploiting women via an adult content business which allegedly operated as a criminal enterprise. Two female Romanian associates were also named in the indictment published in June last year, which identified seven alleged victims. Andrew Tate is a self-described misogynist and was previously banned from social media platforms for expressing such views. The former kickboxer has gained millions of followers online, where he has often mixed political messages with showcasing a flashy lifestyle. He has been living in Romania for a number of years after previously being based in the UK. Following the ruling in his favour on Thursday he released a statement saying: "They've had years to build their case - years to tear apart my life, target everyone I know, and even subpoena the mother of my child. And yet, they have nothing." He added: "This is all a lie, and I will fight to the very end to expose it and prove my innocence." His brother Tristan said: "If there isn't enough evidence to go to trial after all of these years, that means there never was enough evidence." Romania's public prosecutor's office, known as DIICOT, was yet to comment on the ruling. In August, it said it had begun a second criminal investigation against the Tate brothers over new allegations of trafficking of minors, sexual intercourse with a minor and money laundering. The same month, Andrew Tate was placed under house arrest by a Romanian judge, while his brother was placed under special judicial control. UK police are also seeking the extradition of the Tate brothers in relation to allegations of rape and human trafficking. The Tate brothers deny those allegations. They have also been accused of tax evasion in the UK. On Wednesday, a British court ruled that police could seize more than £2m from the Tate brothers for failing to pay tax on £21m in revenue from their online businesses.
