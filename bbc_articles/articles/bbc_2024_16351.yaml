title: 'Hainault sword killing: Man in court over death of boy, 14 - BBC News'
date: '2024-07-23'
section: London
url: http://www.bbc.co.uk/news/articles/ceqdev4xzp0o
content: |-
  Marcus Monzo is accused of attacking Daniel Anjorin as he walked to school in north-east London.

  Marcus Monzo spoke only to confirm his name (image from previous appearance)

  A man has appeared in court charged with murdering 14-year-old Daniel Anjorin, who was attacked with a sword in Hainault in April. Marcus Monzo, 36, is said to have slashed Daniel's neck and chest after running up behind him as he walked to school. Mr Monzo from east London, who was remanded in custody, was not asked to enter any pleas at the Old Bailey hearing earlier. Four other people - including two police officers - were seriously injured in separate attacks, all within 20 minutes.

  Daniel Anjorin was killed as he walked to school in April

  Mr Monzo faces 10 charges relating to 30 April - one count of murder, four counts of attempted murder, two of having an offensive weapon, one of having an article with a blade or point, one count of aggravated burglary and one count of wounding with intent. The weapons in the charges include a “Katana sword”, a “tanto Katana sword” and a kitchen knife. Mr Monzo, from West Beckton, appeared via a video link from Belmarsh Prison. A trial date was set for 3 February next year.
