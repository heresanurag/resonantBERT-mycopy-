  During PMQs, Tory leader Kemi Badenoch pressed Sir Keir to "listen to his own party and change course".

  PM defends winter fuel cuts in face of calls for U-turn

  Sir Keir Starmer has defended the decision to axe winter fuel payments for millions of pensioners, as calls for a reversal of the policy continue. A group of around 45 Labour MPs representing seats in northern England and the Midlands have joined those urging the government to rethink the move. During Prime Minister's Questions, Conservative leader Kemi Badenoch pressed Sir Keir to "listen to his own party and change course". The policy has partly been blamed for Labour's poor performance in last week's local elections in England, which saw the party lose two-thirds of the council seats it was defending.

  Reform UK also defeated Labour in the Runcorn and Helsby by-election, overturning a majority of nearly 15,000 to take the seat by just six votes. The results have led to growing calls to rethink winter fuel cuts from senior Labour figures, including Welsh First Minister Eluned Morgan. But on Tuesday the government insisted it would not be changing the policy, which was introduced last year.

  In the House of Commons, Badenoch asked the PM if he would now admit "he was wrong to remove the winter fuel payment from millions of pensioners". Defending the move, Sir Keir said: "The number one job of this government was to put our finances back in order after the last government lost control. "That is to deal with the £22bn black hole that they left. Because of our action, we've stabilised the economy." He also stressed the government was committed to the triple lock, under which pensions go up each year by the highest of inflation, average earnings or 2.5%. Hitting back, Badenoch said: "The only black hole is the one the prime minister is digging. "This issue affects some of the poorest and most vulnerable pensioners. His mayor in Doncaster says it's wrong. His first minister in Wales says it's wrong. Even his own MPs are saying it's wrong. He's refused to listen to me on this, will he at least listen to his own party and change course?" In response, Sir Keir said: "No other party is saying how they would invest in our NHS and public services." Liberal Democrat leader Sir Ed Davey also urged the PM to reverse the cuts, saying this was "among the messages voters sent ministers last week".

