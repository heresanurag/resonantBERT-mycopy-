  The winter fuel payment is a lump sum worth between £200 and £300, designed to help with higher energy costs during the colder weather. It was previously paid to all pensioners but last year the government restricted this to only the poorest, who qualify for pension credit and other income-related benefits, in a bid save £1.4bn. The move, which did not feature in Labour's general election manifesto, means around nine million pensioners no longer qualify for the payment. Labour MPs who oppose the cuts believe a reversal of the policy would be a clear sign from the prime minister that he is listening to voters. However, others closer to government thinking question whether there would be any political benefit to changing course at this stage, believing the damage has already been done. Criticism of changes to disability benefits, which would make it harder for people to claim Personal Independence Payment (Pip), could become a more pressing issue, with a vote in the House of Commons likely next month. Given Labour's large majority there is no prospect of the government losing the vote but it could become a focus of broader disaffection.

