title: 'Cardiff 26-21 Munster: Hosts keep play-off hopes alive with thrilling comeback
  - BBC Sport'
date: '2025-04-25'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cy4vwze2dwno
content: |-
  Cardiff move up to fifth with a bonus-point win over Munster in the United Rugby Championship.

  Cardiff kept their United Rugby Championship play-off hopes alive with a thrilling comeback win over Munster. The Welsh side had only once beaten Irish opposition since 2022 but claimed a bonus-point win at the Arms Park. Munster were twice ahead including a 21-12 lead early in the second half with tries by Calvin Nash, Mike Haley and Tom Farrell. But indiscipline and the outstanding Taulupe Faletau allowed Cardiff to come back both times on a rousing night in front of more than 11,250.

  Gabriel Hamer-Webb, Harri Millard and Johan Mulder all added to a penalty try to send Cardiff up to fifth with two games remaining. A fourth defeat in five means Munster remain seventh but could slip out of the play-off places this weekend.

  Munster edged the first half 14-12 after Craig Casey and Nash - among seven changes from the loss at Bulls - combined for the opening score. But lock Fineen Wyvherley's yellow card opened the door for two tries in four minutes as Hamer-Webb and Faletau excelled on what could be their last home appearance at the Arms Park. Hamer-Webb finished a clever angle by Liam Belcher and quick hands from Ben Thomas for his fourth try in two games. The wing then turned provider seconds later, latching on to Thomas' cross-field kick before sending Faletau galloping for Millard to grab his eighth league try of the season.

  Munster - who won their past 10 games against Welsh opposition - responded with two tries of their own either side of half-time. Haley barged over to regain the lead that was extended to 21-12 by Farrell's smart burst and Crowley's third conversion. But within minutes indiscipline undid their hard work once again when flanker Jack O'Donoghue was sin-binned for conceding a penalty try. The tactical kicking of Callum Sheedy and Thomas also helped turn the tide as they kept Munster pinned back time and again. And it was after a smart Thomas boot that scrum-half Mulder snuck over what would prove the winning try. Sheedy missed a late drop goal and penalty.in a tense climax but Cardiff, who have now lost just one of their last six at home, held out for the win.

  Cardiff head coach Matt Sherratt said: "It's a brilliant night and probably more than we could have hoped for to get a bonus-point win. "Discipline was always going to be important in the second half. But we controlled the field really well with our kicking and winning the aerial battle and the crowd gave the boys that extra five or 10 per cent. "We will enjoy this win but it's not the end of the season. We still have to get points in South Africa." Munster interim head coach Ian Costello said: "I'm really disappointed because we let the game get away from us in the second half. "We put ourselves in a good position at half-time without playing that well but discipline was a big factor. We conceded three of the four tries with 14 men. "I'd be surprised if we're still in the top eight on Monday but at least qualification is still in our own hands in the final two games."
