  As COP26 continues, we're answering readers' queries about meat, deforestation and other climate-linked issues.

  Why can't we ban deforestation by the end of 2022?

  One of the questions we've had is: why can't we ban deforestation sooner? Forests have long been seen as a critical part of the climate solution, but rates of deforestation around the world are still rising, despite international efforts. In 2014, the UN announced a deal to halve deforestation by 2020 and end it in 2030, but the agreement failed. One of the first deals struck in Glasgow was a new pact on deforestation, signed by more than 100 world leaders, who pledged to end and reverse deforestation by 2030. The move was given a cautious welcome by experts, but some said the target of 2030 was disappointing. Part of the problem is that many of the world’s remaining forests are in countries in the global south where jobs and livelihoods depend on exports such as palm oil, beef and soya. And some people living in the Amazon depend on the forest for their livelihoods and need support in finding new incomes. There are a complex set of problems that need to be solved if the world is to do better at preventing deforestation.
