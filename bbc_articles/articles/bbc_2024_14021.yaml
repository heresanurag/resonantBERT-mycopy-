content: |-
  Detectives investigating a shooting which left a nine-year-old in a critical condition appeal for information.

  Turkish gangs may be behind Dalston shooting - Met

  The girl was having dinner with her family when a motorcyclist fired shots, the Met Police said

  "Turkish organised criminal networks" could be behind the drive-by shooting in east London which left a nine-year-old girl in a critical condition, the Met Police has said. The girl is "fighting for her life" after she was injured when a motorcyclist fired a number of shots towards a restaurant on Kingsland High Street, Dalston, at about 21:20 BST on 29 May. Three men, aged 26, 37 and 42, who were sitting outside the restaurant were also injured. They have all been discharged from hospital. A week on from the attack, the Met Police is appealing to the Turkish and Kurdish communities for information.

  The Met Police believe the motorbike was a Ducati Monster with a white body, red chassis and red wheels

  The force said the suspects fled on a Ducati Monster motorbike before dumping it nearby on Colvestone Crescent. In 2021, the bike - described as having a white body, red chassis, red wheels and a registration plate of DP21 OXY - was stolen from a property in Wembley, north London, the Met said. Det Ch Supt James Conway, the local policing lead for Hackney and Tower Hamlets, said: “We will always be directed by the evidence and a critical line of enquiry has been the potential link to Turkish-originating organised criminal networks. “Sadly, a nine-year-old girl who was simply having dinner with her family is now in a hospital bed fighting for her life. "It is therefore important we find out the details of the individual who carried out this horrific attack and those involved in the planning."

  The bike was stolen from a property in Wembley, the Met said

  “You might be a friend, partner or a family member of someone that you suspect may be involved. "I urge you to search your heart to understand if your loyalty to friends or associates extends to covering up for an innocent child being shot." The detective added: “The incident has left the residents of Hackney, and the wider Turkish and Kurdish communities shocked and appalled. "In addition to my direct appeal to those involved in the wider issues, I would also ask that anyone from these communities who may have information about the shooting or the events leading up to it, to please come forward and speak to police." The Met’s Turkish Police Association has been patrolling the local area.

