  The UK's biggest festival kicks off this week. Here's who's playing, and a guide to the secret sets.

  Glastonbury 2025: Full line-up and stage times for the weekend

  Olivia Rodrigo will close the festival on Sunday 29 June

  This year's Glastonbury festival is in full swing, as stars spanning a spectrum of genres and eras play the UK's biggest weekend of music. The 1975, Neil Young and Olivia Rodrigo are headlining the Pyramid Stage, with other highlights including Charli XCX, Doechii, Rod Stewart, Loyle Carner, The Prodigy and Wolf Alice. Here are the schedules for the main stages:

  Watch the action from Glastonbury on the BBC
  • None Our Man In The Field: 11:30 - 12:00
  • None Not Completely Unknown: A Celebration Of The Songs Of Bob Dylan: 15:00 - 16:00
  • None Panel: Feminism In The Age Of The Manosphere: 13:30 – 14:30
  • None Panel: What Next For The Left: Politics, Organising And Power: 12:00 – 13:00
  • None Panel: Saving The Planet But Not Leaving The Workers Behind: 13:30 – 14:30
  • None Panel: Confronting The Rise Of The Far Right: 12:00 – 13:00
  • None Panel: How To Fix The Crisis Care: 12:00 – 13:00
