title: 'Minnesota: Hot air balloon collides with powerlines - BBC News'
date: '2024-03-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68630987
content: |-
  Firefighters responded to the incident after it crashed into power lines and a fire broke out.

  US firefighters responded to a hot air balloon that crashed into power lines in Rochester, Minnesota.

  The passengers were attempting to land the balloon in a field after passing through strong winds.

  But after hitting the power lines, a fire broke out in the area of the crash and the basket became detached.

  Three people were on board, two of them receiving minor injuries.
