title: 'Winsford shooting: Neighbour of PM''s father Stanley Johnson dies - BBC News'
date: '2020-02-27'
section: Somerset
url: http://www.bbc.co.uk/news/uk-england-somerset-51663641
content: |-
  John Zurick, 67, and wife Deborah, 56, were found with shotgun injuries at their Somerset cottage.

  Police were called to a cottage in Winsford, Somerset, at 14:30 GMT on Saturday

  A neighbour of Prime Minister Boris Johnson's father involved in a double shooting has died.

  John Zurick, 67, was found with shotgun injuries - thought to have been self-inflicted - after police were called to a cottage in Winsford, Somerset, on Saturday.

  Avon and Somerset Police said he died in hospital in Devon on Thursday.

  The force has said the death of his wife Deborah, 56, found shot at the scene, was being treated as murder.

  Det Ch Insp Neil Rice said the force was not looking for anyone else in connection with the deaths, and it would provide a file of evidence to the Somerset coroner.

  Mr and Mrs Zurick were neighbours of Stanley Johnson - father of the prime minister.

  On Tuesday Stanley Johnson said his family was "shocked, stunned and saddened" by the death of Mrs Zurick.

  Earlier this month police seized licensed weapons from the home of Mr and Mrs Zurick as part of a separate investigation.

  They said there were "satisfied" no firearms licensed to any of the occupants remained at the premises.

  Avon and Somerset Police has referred itself to the police watchdog due to previous contact with those involved.

