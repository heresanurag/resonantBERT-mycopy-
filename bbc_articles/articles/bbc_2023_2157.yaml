  One magistrate, and former Justice of the Peace, stepped down last August after being left unable to check vulnerable people were being protected when a warrant for a prepayment meter was sought.

  Robin Cantrill-Fenwick told BBC Newsnight changes to the court system meant magistrates "were doing nothing more than rubber stamping" warrants.

  He said the lack of scrutiny is putting vulnerable households at risk.

  Government officials have suggested current advice is a matter for the judiciary. A judicial source said "it just explains what the current law and processes that magistrates are bound to apply".

  Scotland's court service has said it will review the process for utility warrants following outcry over forced installation of pay-as-you-go meters.

  The Magistrates' Leadership Executive has been approached for comment.
