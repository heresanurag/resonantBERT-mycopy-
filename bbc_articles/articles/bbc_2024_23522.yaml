content: |-
  Dame Maggie Smith spoke to Graham Norton about how her role as Professor McGonagall brought her to the attention of a younger generation.

  To a younger generation of people, Dame Maggie Smith was best known for her role as Professor McGonagall in the Harry Potter saga.

  "A lot of very small people used to say hello to me", she said during an interview on The Graham Norton Show in 2015.
