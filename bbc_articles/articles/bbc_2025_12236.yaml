  The Western alliance needs to prepare for a possible attack by 2029, Germany's top military officer tells the BBC.

  Russia may attack Nato in next four years, German defence chief warns

  To play this video you need to enable JavaScript in your browser. This video can not be played Russia posing ''very serious threat'' to West, says German defence chief

  Members of the Western alliance Nato need to prepare for a possible attack from Russia within the next four years, according to Germany's chief of defence. General Carsten Breuer told the BBC that Russia was producing hundreds of tanks a year, many of which could be used for an attack on Nato Baltic state members by 2029 or even earlier. He also insisted Nato, the North Atlantic Treaty Organization, remains unified over the war in Ukraine, despite differences of opinion expressed recently by both Hungary and Slovakia. Gen Breuer was speaking on the sidelines of the Shangri-la Dialogue, a defence summit in Singapore organised by the think tank the International Institute for Strategic Studies.

  His comments come weeks ahead of a summit of Nato nations at The Hague where they are expected to discuss defence budgets, among other topics. Gen Breuer said that Nato was facing "a very serious threat" from Russia, one that he has never seen before in his 40 years in service. At the moment, he said, Russia was building up its forces to an "enormous extent", producing approximately 1,500 main battle tanks every year. "Not every single tank is going to [the war in] Ukraine, but it's also going in stocks and into new military structures always facing the West," he said. Russia also produced four million rounds of 152mm artillery munition in 2024, and not all of it was going to Ukraine either, added Gen Breuer. The figures come from German and allied nations' analysts. "There's an intent and there's a build up of the stocks" for a possible future attack on Nato's Baltic state members, he said. "This is what the analysts are assessing - in 2029. So we have to be ready by 2029... If you ask me now, is this a guarantee that's not earlier than 2029? I would say no, it's not. So we must be able to fight tonight," he said. Many have long feared an attack on a Nato state as it could trigger a larger war between Russia and the US, which is a key member of Nato. Under Article 5 of the Nato agreement, any attack on a member state would mean other members must come to its defence. Gen Breuer singled out the so-called Suwalki Gap, an area that borders Lithuania, Poland, Russia and Belarus, as one of the most vulnerable. "The Baltic States are really exposed to the Russians, right? And once you are there, you really feel this... in the talks we are having over there," he said. The Estonians, he said, had given the analogy of being close to a wildfire where they "feel the heat, see the flames and smell the smoke", while in Germany "you probably see a little bit of smoke over the horizon and not more". Gen Breuer said this showed the differing perspectives among European states of the threat of a possible Russian attack. Russia's view of the Ukraine war was different from the West's, he said, where Moscow sees the war as more of a "continuum" in a larger conflict with Nato and is therefore "trying to find ways into our defence lines and it's testing it". He cited recent attacks on undersea cables in the Baltic Sea, cyber attacks on European public transport, and unidentified drones spotted over German power stations and other infrastructure. Nato members should therefore build up their militaries again, Gen Breuer argued. "What we have to do now is really to lean in and to tell everybody, hey, ramp up... get more into it because we need it. We need it to be able to defend ourselves and therefore also to build up deterrence." Asked by the BBC about Nato cohesion, given Hungary and Slovakia's closer relations with Moscow, Gen Breuer insisted the alliance was still healthy. He pointed to Finland and Sweden's decisions to join Nato shortly after the Ukraine war began. "I've never seen such a unity like it is now" among nations and military leaders, he said. "All of them understand the threat that is at the moment approaching Nato, all understand that we have to develop a direction of deterrence, into the direction of collective defence. This is clear to everyone. The urgency is seen." Gen Breuer's remarks are yet another sign of a significant change in attitudes in Germany towards defence and Russia. Like many Western nations, including the UK, it has scaled down its investments in its military over many years. But there has been a growing recognition of the need to reverse this, with even the Green Party coming onboard a recent vote to lift restrictions on Germany's defence spending. But as Western military and political leaders say they are ready for the fight, questions remain on whether this is a case of ambition outpacing reality. It will take years for Europe's military industrial base to crank up to speed to match anywhere near the scale of weaponry that Russia is churning out. The US has also been drawing down, not building up, its defence commitments to Europe to focus on the Indo-Pacific.
