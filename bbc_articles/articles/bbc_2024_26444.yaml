content: |-
  Rachel Reeves promising to keep Labour's promises and King Charles's health, lead the papers.

  'Budget to match Labour best' and 'King back to full duties'

  The King's doctors have said he will be able to return to "normal" duties next year

  The family of Sir David Amess have given their first interview since the Conservative MP was murdered in 2021 - telling the Sunday Times, external they have been "catastrophically failed" after his killer was dropped from the government's de-radicalisation programme because of an "admin error". Sir David's daughter, Katie Amess, claims it is "pretty obvious" that the Prevent scheme "isn't fit for purpose". The paper argues the family deserves "full transparency" - insisting a report on the killer's contact with Prevent "should surely be released" as part of efforts to prevent a repeat of the tragedy. The Mail on Sunday , externalsays Sir Keir Starmer has rejected Conservative claims he has told a "double lie" by insisting this week's budget will not be a "war on Middle Britain" that breaks Labour's manifesto tax promises. Writing in the paper, the former Tory chancellor, Kwasi Kwarteng, acknowledges that his mini-budget in 2022 "wasn't perfect" - but warns that Wednesday will see the government declare "naked class war". "The stupidity of trying to distinguish between workers and investors in property and other assets", he says, "is pure socialism". The Sun on Sunday, external responds to the Chancellor's description of her plans as a "budget for the strivers" by applauding her focus on low-wage workers. But it warns that creating growth to kickstart the economy "is more difficult" - and suggests a "Rwanda-style deterrent" is needed to prevent migrants who cross the Channel in small boats from blowing a financial hole in the government's plans. The education secretary, Bridget Phillipson, has told the Sunday Mirror, external that the tough decisions taken by the chancellor "will be worth it".

  The two candidates vying to be the next Conservative leader have launched what the Sunday Telegraph, external calls their "fiercest attacks of the campaign so far" in interviews with the paper. It says Kemi Badenoch appeared to question Robert Jenrick's record by pointing out she has "never been sacked" amid a "whiff of impropriety" - in an apparent reference to her rival's involvement in a planning dispute when he was housing secretary. Mr Jenrick is described as taking a swipe at the lack of policies set out by Mrs Badenoch - after he said Tory party members want "a plan today, rather than the promise of one tomorrow". Images of the King feature on several front pages - after Buckingham Palace said he would return to a "normal" schedule of overseas trips next year. According to the Sunday Telegraph, external, the King's successful tour of Samoa and Australia has given royal officials renewed confidence that if he can visit somewhere so logistically challenging during cancer treatment, then he can go anywhere. The Sunday Express, external says it's "excited" by the development - arguing that "appreciation, respect and love for Charles has deepened, as he has confronted cancer with dignity and bravery".

