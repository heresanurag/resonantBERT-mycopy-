  With the entire quartet who claimed world gold for Great Britain in 2017 missing through injury or other priorities, Reuben Arthur, Zharnel Hughes, Richard Kilty and Aikines-Aryeetey were expected to come under severe pressure in the men's race. Former 100m world champion Yohan Blake anchored home Jamaica, while Simbine and Henricho Bruintjies - who led a South African one-two in the individual event on Monday - also featured in the race. But England's polished changeovers and a strong second leg from Hughes, running after losing gold to a disqualification in the individual 200m, proved enough. "I ran like a rabbit," said Aikines-Aryeetey of his anchor leg. "I knew I had the second-fastest man of all time behind me and the 100m Commonwealth champion behind me." Just as in the 100m final, Simbine edged out Blake again as South Africa took silver ahead of Jamaica.

  Bolt then also tweeted: "Watching the relay just now made me ask myself a few questions. Anyhow #TeamJamaica all day everyday."

  "I'm going to hide from him and hide from my phone," said Blake when asked about former team-mate Usain Bolt's claim he would not be let back into Jamaica without 100m gold. "We're in a transition period. I don't think we are far away. I stumbled in the 100m and that cost me." Twenty-year-old Lake, a former double world champion at junior level, earned her first global medal at senior level by clearing 1.93m. Weightman, who came sixth in last year's world final and won 2014 Commonwealth silver over 1500m, was 17 seconds off her personal best in humid conditions over the longer distance. Scotland's Eilish McColgan was down in sixth in a race won by world champion Hellen Obiri of Kenya. "I fancied a challenge and wanted to test myself, so I decided to come to the Games and run the 5000m. I wanted to do something different," said Weightman. "After today, I'm going back to competing on the 1500m." England's relay successes take their tally to five athletics gold medals. Hosts Australia, while enjoying an advantage of being at the peak of the southern-hemisphere season, have managed 10.

  As a direct historical comparison, without the Para events that have been added at recent Games, it is the worst Commonwealth Games performance of any England team in track and field. You have to take note of that. There were some promising performances, but others were let down by small things - Zharnel Hughes getting disqualified for obstructing Jereem Richards in the 200m, for instance. But equally, considering the different strengths of the various event fields, the medal count sometimes hides things. Katarina Johnson-Thompson won heptathlon gold, but you could argue it was quite a subdued performance. Scotland have done pretty well. There were some disappointments - Lynsey Sharp would have expected to at least make the women's 800m final. The Welsh contingent are delighted, they had some unexpected moments of delight such as Melissa Courtney taking 1500m bronze, just as Northern Ireland did with Leon Reid's third in the 200m. It was always going to difficult for all the home nations coming to the other side of the world in the early part of the northern hemisphere. Then, you add to that they have come up against a pretty inspired Australia team. I don't think it is something to get too stressed about.
