content: |-
  England claim gold in the men's and women's 4x100m relays at the Commonwealth Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England won gold in both the men's and women's 4x100m relays on the final day of athletics at the Commonwealth Games. Lorraine Ugen then resisted Jamaica's double Olympic champion Elaine Thompson to take gold for the women's team. Morgan Lake won high jump silver, Laura Weightman took 5,000m bronze and Scotland's Jake Wightman got 1500m bronze.

  Wightman ran a strong final 150 metres to finish ahead of England's Charlie Grice as he chased home Kenya's Elijah Manangoi and Timothy Cheruiyot. Emily Diamond produced a brave run on the final leg for England's 4x400m team, but was overhauled in the final 50m by Botswana's 400m champion Amantle Montsho in a duel for third. In the final race of the day, England's men's team saw their title taken by Botswana after an injury to Matthew Hudson-Smith cost them qualification from the heats. However, the success of England's 4x100 teams continues a trend set by Great Britain at the Rio 2016 Olympics and London 2017 World Championships. Despite running a personal best 11.37 in March, anchor-leg runner Ugen - who finished fourth in Thursday's long jump final - was a surprise inclusion in the team with world silver winners Desiree Henry and Daryll Neita absent. A powerful start from Asha Philip, a storming back straight from Dina Asher-Smith and expert bend from Bianca Williams, ensured Ugen enough of a cushion to withstand Thompson's challenge and set a new English record of 42.46 seconds. "I was told that I had to run so I was like, 'OK, I can't disgrace myself,' said Ugen. "Bianca gave me the baton and it was, 'OK, go, go, go.'"

