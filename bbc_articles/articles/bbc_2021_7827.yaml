content: |-
  BBC Sport pundits Alex Scott, Cesc Fabregas, Gary Lineker and Micah Richards wish Denmark midfielder Christian Eriksen a speedy recovery after he collapsed during their 1-0 defeat to Finland in the Uefa Euro 2020 Championship.
