title: Ukrainian military make further gains in counter-attack - BBC News
date: '2022-09-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-62866456
content: |-
  Officials say the Ukrainian military has entered Kupiansk, a vital eastern supply hub for Russian forces.

  The Ukrainian military is making further gains in its counter-offensive against Russia.

  As a result Russian forces have withdrawn from key eastern towns.

  Ukrainian officials said troops entered Kupiansk, a vital eastern supply hub for Russian forces, on Saturday.
