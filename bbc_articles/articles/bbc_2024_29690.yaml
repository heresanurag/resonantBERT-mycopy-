content: |-
  Police arrest three men on suspicion of manslaughter and the production of a Class B drug.

  Arrests after boy, 7, and man died in house blast

  The explosion happened in the early hours of 16 October in Benwell, Newcastle

  Three men have been arrested in connection with a house explosion, which killed two people including a seven-year-old boy. Archie York and 35-year-old Jason Laws died in the blast in Violet Close in Benwell, Newcastle, on 16 October. A man in his 50s and two men in their 30s have been arrested on suspicion of two counts of manslaughter and the production of cannabis, Northumbria Police said.

  Det Ch Insp Katie Smith, of Northumbria Police, said: "This has been a truly tragic incident which resulted in the loss of two lives. "Our investigation will remain ongoing as we seek to provide answers to what happened." Police also asked the community to avoid speculation.

  Seven-year-old Archie York was killed in the blast

  Abbie York, Archie's aunt, told the BBC he was a "loving boy, with a cheeky little grin on his face all of the time". The family had moved to the Benwell property just after Archie was born, and the primary school pupil had been learning how to swim and enjoyed playing the violin, she said. His parents and two-month-old brother had been treated in hospital following the explosion, but were released soon after. Three other adults were taken to hospital, where one remains with serious injuries.

  Archie York was described as a "loving boy" with a "cheeky grin"

  More than 120 people were forced out of their homes because of the blast. A firefighter who was on the scene 35 minutes after the explosion said it was the "most challenging" incident faced by Tyne and Wear Fire and Rescue Service (TWFRS) in years.
