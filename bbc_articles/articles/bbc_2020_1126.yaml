title: Dog walker in Sutton Coldfield faces missing pets prosecution - BBC News
date: '2020-01-16'
section: England
url: http://www.bbc.co.uk/news/uk-england-51121690
content: |-
  Louise Lawford is accused of losing at least five dogs in her care last June in woods in Staffordshire.

  Louise Lawford has not revealed what happened to the pets, it is alleged

  A dog walker accused of losing several pets in her care is to be prosecuted for animal welfare offences.

  Louise Lawford is alleged to have been looking after at least five dogs when they went missing during a walk in woods in Staffordshire, in June.

  Owners said Mrs Lawford, who operated Pawford Paws in Sutton Coldfield, had not revealed what happened to the pets.

  The case, brought by Birmingham City Council, is due to be heard at the city magistrates' court on 23 January.

  Mrs Lawford, 49, from Erdington, is accused of nine animal welfare offences, including five counts of undertaking group walks without ensuring each dog had been vaccinated, allowing dogs off the lead without written consent and failing to contact the owners or dog warden immediately when dogs were lost.

  She is also accused of three counts of breaching conditions of the licence to operate a business providing home boarding for dogs and one further charge of failing to provide veterinary treatment for a skin infection for a dog.

  The council said Mrs Lawford's dog boarding licence was revoked on 28 June.

  It is claimed the dogs vanished in Hopwas Woods near Tamworth, on 23 June.

  April Lock, who owned pugs Charlie and Ralph, said she was on holiday when Mrs Lawford contacted her about their disappearance.

  "I thought originally maybe that they'd got stolen. She let us search for about two weeks," said Ms Lock.

  Ms Lock and two other pet owners whose dogs disappeared on the same day have been crowdfunding to take civil action against Mrs Lawson.

  West Midlands Police said it had investigated allegations of theft relating to the missing dogs but there was insufficient evidence to consider charges.
