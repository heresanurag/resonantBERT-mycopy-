content: |-
  The inquest is shown footage of Khalid Masood buying knives and collecting the car used in the 2017 attack.

  CCTV footage showing Westminster attacker Khalid Masood's final preparations has been shown at the inquest into his victims' deaths.

  The clips show the 52-year-old buying knives and collecting the rented car he used in the March 2017 attack, which killed five people.

  Read more: Westminster attacker 'told children he would die'
