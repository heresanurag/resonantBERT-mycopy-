  Daniel Dubois has "all the tools" to take over the heavyweight division says his promoter Frank Warren as he calls for a rematch with Oleksandr Usyk.

  Warren wants IBF champion Dubois to fight Usyk next

  This video can not be played To play this video you need to enable JavaScript in your browser.

  IBF heavyweight champion Daniel Dubois has "all the tools" to take over the division, says his promoter Frank Warren. Following his stunning five-round world title demolition of fellow Briton Anthony Joshua on Saturday, Warren wants Dubois to face WBO, WBA and WBC champion Oleksandr Usyk in a rematch next. Dubois fought Usyk in August 2023, with the Ukrainian winning via a ninth-round stoppage. Dubois, 27, was elevated to IBF champion after Usyk vacated the belt in June, just weeks after beating Tyson Fury to become the first undisputed heavyweight boxing champion in 25 years. "The fight I would like to see him in now is Usyk again," Warren told BBC 5 Live. "He is a different Daniel Dubois, he is more mature physically and mentally. "He will go from strength to strength. He will be here for a while, he is a young man and has all the tools to take this division over. "There is a clause [for a rematch with Joshua] in his contract but not in ours. But that's not to say we wouldn't do it. It's something we'll sit down and discuss." Usyk was ringside at Wembley, taking a brief break from his training camp as he prepares for a rematch with Fury on 21 December. There was controversy in the fifth round when Dubois and Usyk met in 2023. The Brit sent Usyk to the canvas, but it was ruled a low blow by the referee, with Usyk given almost four minutes to recover. "Dubois lost his composure [after the incident]," said Warren. "I think that was down to the fact he was a bit younger and he probably did not have the ring savviness to deal with it. "But now he is a different guy altogether, as you saw on Saturday night."

  Joshua has reiterated that he has no plans to retire despite the devastating nature of the defeat. "We came up short but we have to look at the positives, that has to be the mindset," Joshua, 34, said in a video posted on social media, external. "Look at what we have achieved over 11 years. It has been phenomenal. "What a rollercoaster journey - but it is far from over. "I've got a lot more to bring to the game and long may it continue."
