content: |-
  A marine crew battled for hours to free a whale from fishing gear. Then they got some help from the creature itself.

  After receiving multiple calls about a humpback whale entangled in 300ft (91m) of fishing gear and a buoy, Canadian officials dispatched a marine rescue team.

  They tracked down the beleaguered whale off Texada Island, British Columbia, and after nearly five hours the ocean giant helped out the crew by pulling this dramatic manoeuvre.
