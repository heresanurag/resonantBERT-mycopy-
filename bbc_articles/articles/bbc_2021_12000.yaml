  Another 45 deaths within 28 days of a positive coronavirus test have been reported in the UK.

  Matt Western says there should be more air ventilation filters on campuses Image caption: Matt Western says there should be more air ventilation filters on campuses

  Shadow education minister Matt Western warns of the return of "campus chaos" as he asks about funding for air ventilation filters to cope with coronavirus.

  He says: "Here we are in September with a certain sense of 'Groundhog Day' with campus chaos set to return caused by the actions or inaction of this government.

  "In November last year Sage published a report showing Covid outbreaks could be reduced on campus through the provision of air ventilation filters. Whilst the Welsh Labour government has committed funding for these machines, the UK Government has not."

  He asks: "So why hasn't the UK Government provided funding to make our campuses safe?"

  Education secretary Gavin Williamson replies: "(Western) seems to have missed quite a significant point and a difference between this year and last year and of course we've had one of the most successful vaccine programmes rolled out anywhere in Europe where we were one of the first countries to be able to offer people not just one vaccine, but two and making sure that the adult population have it available.

  "That is the big difference from this year to last year."
