content: |-
  The Lewisham-born triathlete won two medals at the Tokyo Olympics and wants to build on his success.

  With the Paris Olympics approaching fast, attention is turning to the athletes who will light up the Games with their sporting prowess.

  Among the London stars going for gold in Paris is 26-year-old Alex Yee from Lewisham.

  At Tokyo 2020 he won two medals in triathlon and is being tipped for further success this time around.

