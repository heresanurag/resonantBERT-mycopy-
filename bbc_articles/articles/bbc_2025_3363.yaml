  The actor may not have known his wife was dead inside the home he was living in because of the disease.

  'Living in a reel': How Alzheimer's left Gene Hackman alone in his final days

  Reporters gathered outside the gated community where Hackman and his wife died

  The two-time Academy Award winner didn't make any calls and missed meals. Medical experts say it's possible the 95-year-old, who was in declining health and suffering from advanced stages of Alzheimer's disease, did not even realise his wife of more than 30 years was dead in the home where he was living. If he did, experts told the BBC, he likely went through various stages of confusion and grief, trying to wake her up before the disease caused him to become distracted or too overwhelmed to act - a process that likely repeated for days before he, too, died. Officials in New Mexico say Betsy Arakawa, 65, died of a rare virus about seven days before Hackman perished on 18 February of natural causes. The pair - and one of their dogs - were found dead in their Santa Fe home after neighbourhood security conducted a welfare check and saw their bodies on the ground through a window. Authorities, at first, said the grim discovery was "suspicious enough" to launch an investigation. Their remains were discovered in advanced stages of decomposition. Arakawa was found in a bathroom with scattered pills nearby. Hackman was found near the kitchen with a cane and sunglasses. One of their three dogs was found dead in a crate. Instead, the case has shed light on the grim realities of Alzheimer's disease, which damages and destroys cells in one's brain over time - taking away memory and other important mental functions. "It's like he was living in a reel," Catherine V Piersol, PhD, an occupational therapist with decades of experience in dementia care, told the BBC of how Hackman may have experienced the repeated loss of his wife.

