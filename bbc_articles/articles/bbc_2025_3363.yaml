  She noted patients with advanced Alzheimer's disease like the actor live in the present and are unable to both look back at moments in the past or look forward and act. "I imagine he would be trying to wake her up and not being successful. But then [he] could have been distracted in another room because of one of the dogs or something," she described. Then later, he'd again notice his wife on the ground and would "live through it again", she said. Though no one knows how Hackman spent his last days alive, the grim nature of the possibilities were discussed by authorities and the area's medical examiner. At a press conference last week, Dr Heather Jarrell, New Mexico's chief medical examiner, said Arakawa died of hantavirus pulmonary syndrome (HPS), a respiratory illness caused by exposure to infected rodents. Hackman's death was the result of significant heart disease, with Alzheimer's disease as a contributing factor. Given Hackman's advanced stages of Alzheimer's disease, it is "quite possible that he was not aware that she [his wife] was deceased", Dr Jarrell said. His autopsy indicated he had not eaten recently, though he showed no signs of dehydration. Officials found no evidence that he had communicated with anyone after his wife's death and could not determine whether he was able to care for himself. Ms Piersol said patients with advanced Alzheimer's aren't able to pick up on environmental cues like light and darkness, making it harder to determine when he should eat, sleep or bathe. "Those [cues] are oftentimes just, no longer available to people at this stage of dementia," she said.

