title: CCTV shows looting inside Liverpool shop during weekend unrest - BBC News
date: '2024-08-08'
section: General
url: http://www.bbc.co.uk/news/videos/cx2n5g9gqg6o
content: |-
  The store was left with £25,000 of losses and damage, according to its owner.

  A Liverpool shopkeeper has shared CCTV footage that shows people looting his store during Saturday's disorder in the city.

  The shopkeeper told the BBC's Jayne McCubbin that he watched the CCTV footage live from his home as the scenes unfolded.

  He said his store was left with £25,000 worth of losses and damage.
