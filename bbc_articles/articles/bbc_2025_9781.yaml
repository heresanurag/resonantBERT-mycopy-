title: '''Lives at stake'' in Balfron Tower with broken lifts - BBC News'
date: '2025-05-21'
section: London
url: http://www.bbc.co.uk/news/articles/c7711gz0775o
content: |-
  Residents of the 26-storey tower in Poplar say they have been stranded after both lifts went down.

  'Lives at stake' in tower block with broken lifts

  The Balfron Tower was designed by Hungarian-born architect Ernő Goldfinger

  Residents in a noted brutalist tower block in east London have been stranded in their homes after the 26-storey building's two lifts stopped working. The Grade II listed Balfron Tower in Poplar has 146 flats and maisonettes, and is managed by property management company Way of Life, which has said it is investigating the situation. Some disabled people had "no option" but to leave their homes, neighbours said, because there was no safe way to get in and out. One resident, Peter, who posted on social media about the problem, said Way for Life had told him to remove his comment or the company would stop helping him get supplies into the building.

  Vasundhata Gupte said she was told Way of Life "did not have an answer" about what to do in case of emergency

  Peter, 58, who did not want to give his surname, cannot use the stairs because of a spinal injury. He said he knew other tenants who were avoiding using the lifts - when they worked - because they were fearful of them breaking down. He said he was concerned about safety and that "lives were at stake here". "What if there is an emergency? What if I have a heart attack? Anyone who can't use the stairs will be in great danger," he said. Another resident, 22-year-old Vasundhata Gupte, has been forced to climb 15 flights of stairs with a hamstring injury when she returns from medical appointments. Ms Gupte said she had asked Way for Life about what to do during an emergency and was told they "did not have an answer".

  Sophie Ruston said she worried for her disabled neighbours

  Sophie Ruston can use the stairs - but has to carry her elderly dog up and down to her 21st floor flat. One lift has been out of order for a week and the other is "temperamental", residents said. When the second lift broke down, Ms Ruston said "chaos ensued". She added the situation meant she would finish a 10-hour night shift, during which she was on her feet, and was faced with climbing another 21 flights when she got home.

  The Grade-II listed building has often been featured in films and TV

  Way of Life provided a service while both lifts were broken where essential supplies were taken to stranded residents. A spokesperson said the company had apologised to Peter, and added that "the behaviour outlined to us is very disappointing and absolutely does not reflect the values and conduct to which we aspire as a business". A number of staff based in the tower had been temporarily removed while the allegations were being investigated, Way of Life said.

  Balfron Tower is a noted example of brutalist architecture

  The Balfron Tower was designed by Hungarian-born architect Ernő Goldfinger in 1963 and was built between 1965 and 1967 as part of the Brownfield Estate, an area of social housing. Way of Life runs a number of residential blocks in London and elsewhere. It currently has eight apartments available for long-term rental at Balfron Tower, ranging from £2,050 per month for a one-bed flat to £3,850 for a three-bedroom home.
