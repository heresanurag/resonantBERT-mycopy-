title: UK economy to 'bounce back' in 2024, says Sunak - BBC News
date: '2024-03-20'
section: Business
url: http://www.bbc.co.uk/news/business-68617291
content: |-
  The prime minister tells the BBC the economy has "turned a corner" as he is challenged on rising bills.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  This year will "prove to be the year that the economy bounces back", Rishi Sunak has told the BBC after figures showed inflation fell to its lowest level in almost two and half years.

  "We have turned a corner after the shocks of the past few years," he said.

  Figures earlier showed inflation dropped to 3.4% last month as price rises for food and eating out slowed.

  But despite price rises slowing overall, housing and fuel prices continued to rise rapidly.

  In the interview with the BBC, the prime minister said things had started to look up.

  "I do believe that at the start of this year we have turned a corner after the shocks of the past few years and we are in a new economic moment," he added.

  Asked if he saw green shoots of recovery for the country, Mr Sunak said businesses and people were "seeing that things have turned."

  During the prime minister's premiership to date, households have continued to feel the pain of rising prices and higher borrowing costs, especially for mortgages, as the Bank of England has hiked interest rates to try to slow down rapid price rises.

  Inflation remains higher than the Bank's 2% target and at the end of last year, the UK slipped into economic recession. One of Mr Sunak's main pledges was to grow the economy.

  Mr Sunak acknowledged things still felt tough for people, but insisted fortunes for the UK economy were changing after being damaged in recent years by the Covid pandemic and energy and food price surges from the war in Ukraine.

  Pushed on rising mobile, broadband, and car insurance costs, Mr Sunak acknowledged there were still "challenges", but argued the UK was "in a far better place than we were when I became prime minister because of our plan".

  "My job is to make sure that we're helping, and that's what our tax cuts do," he said.

  Separately, the prime minister said he was "not interested in Westminster gossip" over plots to oust him.

  "What's important is the future of our country and people's financial security and the peace of mind that they rightly deserve and my job and what I am working every day to deliver is that peace of mind that there is a brighter future ahead," he added.

  The health of the UK economy is at the top of the political agenda, with the general election set to be called in the coming months and both major parties pledging to boost growth.

  Labour's shadow chancellor Rachel Reeves has vowed Labour will seek to bring about a "new chapter in Britain's economic history", telling the BBC on Tuesday that economic growth was "essential to do everything else that a Labour government would want to do".

  Earlier this month, Chancellor Jeremy Hunt set out the government's tax and spending plans in his Budget, including a cut to National Insurance and an expansion of child benefit.
