content: |-
  Three days before election day, under-30s questioned politicians about Brexit, housing and climate change.

  It's that time of night when we can share a few of tomorrow's front pages with you. One story in particular is dominating the newspapers...

  The Metro calls the situation a "war of words" which led to a backlash for Boris Johnson Image caption: The Metro calls the situation a "war of words" which led to a backlash for Boris Johnson

  The Guardian claims Mr Johnson’s team tried to turn the story on to Labour by wrongly briefing that a Tory aide was punched outside the hospital by a left-wing activist Image caption: The Guardian claims Mr Johnson’s team tried to turn the story on to Labour by wrongly briefing that a Tory aide was punched outside the hospital by a left-wing activist

  The Financial Times describes the situation as the "first significant stumble" the PM has made - and it's come in the "final straight" of campaigning Image caption: The Financial Times describes the situation as the "first significant stumble" the PM has made - and it's come in the "final straight" of campaigning

  The Telegraph looks instead at a memo which says the chances of Labour forming a coalition government have been seriously underestimated Image caption: The Telegraph looks instead at a memo which says the chances of Labour forming a coalition government have been seriously underestimated
