  More than 20 rescuers worked for nine hours to save three stranded hillwalkers on Thursday night.

  Three hillwalkers were rescued from the Cairngorms in Scotland after a nine-hour rescue operation on Thursday night.

  More than 20 people from Braemar and Aberdeen Mountain Rescue teams worked through the night to save the stranded walkers.

  The trio had made a call for help at about 21:45 GMT near Lairig Ghru after struggling in the wind and snow. All three are reported to be safe and well.

  It comes as a cold snap has brought fresh ice and snow warnings to Scotland after temperatures plummeted to -6C on Thursday night.
