title: Second man charged over fires at homes linked to Keir Starmer - BBC News
date: '2025-05-20'
section: London
url: http://www.bbc.co.uk/news/articles/c3088p85pero
content: |-
  Stanislav Carpiuc, 26, has been charged with conspiracy to commit arson with intent to endanger life, police say.

  Second man charged over fires at homes linked to PM

  Stanislav Carpiuc was remanded in custody until 6 June

  A second man has been remanded in custody after appearing in court charged in relation to suspected arson at two properties and to a car linked to Prime Minister Sir Keir Starmer, the Metropolitan Police has said. Romanian national Stanislav Carpiuc, 26, from Romford, was charged with conspiracy to commit arson with intent to endanger life following the fires in north London. He was arrested on 17 May and appeared at Westminster Magistrates' Court on Tuesday morning. The charges relate to three incidents - a vehicle fire in Kentish Town, north London, a fire at the prime minister's private home on the same street and a fire at an address that he previously lived in Islington, north London.

  The prosecution said the motive for the alleged offending was as yet "unexplained." Mr Carpiuc is accused of conspiring with Ukrainian national Roman Lavrynovych, 21, and others to "damage by fire property belonging to another, intending to damage the property, intending to endanger the life of another or being reckless as to whether the life of another would thereby be endangered", the Met said. Mr Lavrynovych, of Sydenham, appeared in court on Friday charged with three counts of arson with intent to endanger life. He denied the charges in a police interview. The chief magistrate, District Judge Paul Goldspring, remanded Mr Carpiuc in custody until 6 June when he will appear alongside Mr Lavrynovych at the Old Bailey.

