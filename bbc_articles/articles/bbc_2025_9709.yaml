  Mr Carpiuc, who was born in Ukraine but has Romanian nationality, used a Russian language interpreter in court. He works in construction, is an aspiring actor and model, and has recently finished a business degree at Christchurch University, Canterbury. He lives in Chadwell Heath, Romford and has been in the UK for nine years. Mr Lavrynovych is also a builder and an aspiring model. A third man, aged 34, was arrested on Monday in the Chelsea area on suspicion of conspiracy to commit arson with intent to endanger life. He has not been named by police.

  On Thursday 8 May, a car that Sir Keir sold to a neighbour last year caught fire. The fire took place on the Kentish Town street where the prime minister lived before moving to Downing Street. In the early hours of Sunday 11 May, firefighters dealt with a small fire at the front door of a house converted into flats in nearby Islington - a property the prime minister lived at during the 1990s. One person had to be rescued by firefighters who were using breathing apparatus. The following day, in the early hours of Monday 12 May, police were alerted by the London Fire Brigade to reports of a fire at Sir Keir's private home. Damage was caused to the property's entrance but nobody was hurt. The BBC understands the property is rented to the prime minister's sister-in-law.
