title: 'US election 2020: President Trump casts his vote - BBC News'
date: '2020-10-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54676987
content: |-
  President Donald Trump votes early in the US election, while on a campaign visit in Florida.

  President Donald Trump has voted early in the US election, while on a campaign visit in Florida. It marks the first time an incumbent president has voted, in-person, in the state.

  There has been record early voting in the US election with 53 million people already having cast their ballots, largely because of fears over Covid-19.

  The official election day is 3 November.
