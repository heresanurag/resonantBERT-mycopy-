content: |-
  Nicholas Bostic saved five people from the home, and was hailed as a hero by the police chief.

  Nicholas Bostic saved five people from the home in Lafayette, Indiana, and was hailed as a hero by the police chief.

  The pizza delivery man jumped out of a second-floor window with one of the children.
