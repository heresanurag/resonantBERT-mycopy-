title: 'Eid al-Fitr: UAE astronaut sends Eid greeting from space - BBC News'
date: '2023-04-22'
section: General
url: http://www.bbc.co.uk/news/65356486
content: |-
  Emirati astronaut Sultan Al Neyadi sends a special message from the International Space Station.

  After a month of fasting and reflection, Muslims are coming together to celebrate Eid - the festival that marks the end of Ramadan.

  Emirati astronaut Sultan Al Neyadi has sent an out of this world message to Muslims from the International Space Station, while joined by Suhail - the mascot of the Mohammed Bin Rashid Space Centre.
