title: Essex senior police officer sacked for sexual misconduct - BBC News
date: '2025-04-18'
section: Essex
url: http://www.bbc.co.uk/news/articles/cly1lwdg6edo
content: |-
  Tom Simons engaged in sexual behaviour without consent, a misconduct hearing finds.

  Tom Simons, a former chief superintendent with Essex Police, was dismissed without notice and barred from joining any other force

  A senior police officer who engaged in sexual behaviour without consent has been sacked. Tom Simons, a former chief superintendent, was dismissed by Essex Police after a disciplinary hearing found he abused his position for a sexual purpose with a colleague. He also engaged in sexualised behaviour at work with two colleagues and failed to disclose his relationship with a colleague when he knew he should do so, the Independent Office for Police Conduct (IOPC) said. Essex Chief Constable Ben-Julian Harrington said: "There is simply no place in policing for people who think, wrongly, that they can get away with sexual misconduct."

  Mr Simons was named after the hearing concluded

  The hearing took place after the force referred the case to the IOPC in March 2022, when Mr Simons was also suspended. The panel also found he had breached a number of professional standards. The IOPC said despite being reminded about his behaviour, Mr Simons continued to "behave inappropriately". Essex Police said the IOPC conducted a full criminal investigation and that Mr Simons was referred to the Crown Prosecution Service (CPS). But in June it was decided no criminal action would be taken. Mr Simons denied all allegations but the hearing, chaired by Bedfordshire Police's Assistant Chief Constable John Murphy, found the case for gross misconduct was proven and he was dismissed without notice

  His name has also been placed on the College of Policing barred list, meaning he will never be able to join any UK police force. Mr Harrington said: "I pay tribute to the witnesses in this case and to those who supported them in coming forward. "If you try to get away with sexual misconduct or the kind of abhorrent behaviour we have seen in this case, we'll catch you. "This case is particularly disappointing given the seniority of the former officer." IOPC director Emily Barry, said: "Officers who abuse their position for a sexual purpose have absolutely no place in policing. "Despite being reminded about his behaviour and maintaining professional boundaries, Ch Supt Simons continued to behave inappropriately. "He has deservedly lost his job and it's behaviour like this that damages the public's trust and confidence in police officers."

