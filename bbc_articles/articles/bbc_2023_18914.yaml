title: Watch as escaped reindeer cross A11 in Suffolk - BBC News
date: '2023-12-05'
section: General
url: http://www.bbc.co.uk/news/uk-england-suffolk-67619801
content: |-
  They escaped from a Christmas event over the weekend and were finally tracked down the next day.

  Video showed the moment two reindeer wandered across a busy A-road after escaping from a Christmas event.

  The Elveden Estate in Suffolk said Blue and Blitzen had "got spooked and jumped the fence" on Sunday afternoon.

  Oliver Connolly filmed them on the A11 near Mildenhall on Sunday afternoon before the dual carriageway was later closed by police as a precaution. He said: "It was like a scene from a movie."

  The animals were finally found on Monday afternoon on the Elveden estate, one of the biggest farms in the UK, owned by Lord Iveagh of the Guinness family.
