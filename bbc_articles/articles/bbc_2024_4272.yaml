title: How Concord jet plane became Concorde - BBC News
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-41387360
content: |-
  Designers on either side of the English Channel wanted a name that had the same meaning in French and English.

  Did you know Concorde could have been called Alliance or Europa?

  The 1960s project was a collaboration between the French and the British, and designers wanted a name that had the same meaning in both languages.

  Find out more about the life of Concorde told by the people whose lives it touched on BBC One West, Friday, at 19:30.
