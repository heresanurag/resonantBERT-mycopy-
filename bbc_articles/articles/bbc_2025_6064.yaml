title: Escaped XL Bully found and put down after Sheffield shooting - BBC News
date: '2025-04-11'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cwy7vr456ppo
content: |-
  The dog is believed to be the same one which fled when marksmen shot at it last week, police say.

  Escaped XL Bully found and put down after shooting

  The XL Bully went missing last week after officers were called to reports of a shooting

  An XL Bully believed to be the same dog which escaped when marksmen opened fire on it last week has been found and put down, police have said. Armed police in Sheffield had attempted to shoot the dog on 3 April after it became "aggressive" while officers were investigating reports of a gun being fired at a property in Daniel Hill Street in Hillfoot, but it then fled the scene. Police said that a dog found on Bank House Road at about 13:20 BST on Friday was thought to be the same animal and, on the advice of a vet, due to the nature of its injuries, it was decided it should be put down. A force spokesperson said: "We have informed the dog's owner and the dog has been disclaimed by her."

  The injured dog was put down on Friday after being taken to a vet, police said

  The dog's escape last week led to a city-wide hunt, with officers urging people not to approach it, but to call 999 immediately as it had "the ability to show aggression and cause harm". On Tuesday, South Yorkshire Police said forensic testing of blood at the scene where officers had attempted to shoot the dog had confirmed that it had been injured in the incident. Ch Supt Jamie Henderson said: "I would like to thank the public for remaining vigilant when this animal was loose." Five people had been arrested in connection with the initial firearms incident, and two men had since been charged with firearms offences, according to South Yorkshire Police. Ch Supt Henderson said: "We are continuing to investigate the circumstances surrounding the reported firearms discharge on 3 April." Anyone who saw what happened, or who had information which could help the investigation, was asked to contact police.

