id: bbc_2018_5628
title: Hemsby home dragged back from crumbling cliff - BBC News
date: '2018-05-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-44010329
content: |-
  Lance Martin's property was three feet away from falling to the beach below.

  The final house to be demolished on the crumbling cliff at Hemsby in Norfolk has been dragged back from danger.

  Lance Martin saved his property from being knocked down by using a tractor with a winch to pull it back by 10 metres.
