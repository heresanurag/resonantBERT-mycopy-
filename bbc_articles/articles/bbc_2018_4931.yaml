title: Police tackling rise in 'pop-up brothels' - BBC News
date: '2018-04-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-43873248
content: |-
  An inquiry is under way into the increasing number of "pop-up brothels" across the UK.

  As police forces across the UK work to tackle a rise in "pop-up brothels", a charity in Sheffield has urged people to be vigilant about what is happening on their street.
