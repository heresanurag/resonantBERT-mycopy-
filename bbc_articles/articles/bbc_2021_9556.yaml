title: Drug dealers jailed after getting car stuck in trolley bay - BBC News
date: '2021-08-03'
section: Oxford
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-58077099
content: |-
  Police found the men with crack cocaine and heroin after they crashed at a Morrisons supermarket.

  The men were caught after crashing at Morrisons in Swan Close Road, Banbury

  Two drug dealers who were caught after their car got stuck in a supermarket trolley bay have been jailed.

  Asim Akram and Ibrar Hussain were trying to evade police as they crashed at Morrisons in Banbury on 18 May.

  Officers subsequently found the pair with crack cocaine and heroin with a street value of £4,000.

  Akram, 37, was jailed for five years and six months at Oxford Crown Court. Hussain, 41, was jailed for three years and four months.

  Ibrar Hussain and Asim Akram were jailed at Oxford Crown Court

  The men, who are both from Birmingham, had previously pleaded guilty to possession with intent to supply heroin and crack cocaine.

  In a statement, Thames Valley Police said: "While attempting to make his escape, Akram, who was driving a red Honda, rammed a marked police car before colliding with a trolley bay, and getting his car stuck, allowing our officers to arrest both."

