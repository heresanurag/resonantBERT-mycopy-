id: bbc_2021_6219
title: 'Noel Clarke: Report made to police after allegations against actor - BBC News'
date: '2021-05-01'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-56956429
content: |-
  The actor denies any sexual misconduct or criminal wrongdoing and no police investigation has begun.

  Clarke is known for shows including Doctor Who, Bulletproof and Viewpoint

  Police have confirmed they have received a third party report relating to allegations of sexual offences by a man, following recent claims against actor Noel Clarke.

  The Met Police said they had received a report on 21 April and officers were assessing the information but there was currently no investigation.

  It comes after 20 women accused Clarke of sexual harassment and bullying.

  He has "vehemently" denied any sexual misconduct or criminal wrongdoing.

  The Met Police said in a statement: "On Wednesday, 21 April, police received a third party report relating to allegations of sexual offences allegedly committed by a male over a period of time."

  A third party report is anonymous so the allegation cannot be investigated by the police. However, it can be used as intelligence, for example to see if it matches with other reports against the same person.

  The BBC does not know who made the report to the police.

  Meanwhile, the Guardian, which first reported allegations against Clarke on Thursday, said six more people had now come forward with claims of misconduct, including former students at the London School of Dramatic Art (LSDA).

  In a statement, Jake Taylor, principal and founder of the school, said Clarke, ran an "unsanctioned" practical acting workshop where he "set up improvisation exercises in which the students were told they had to get undressed and get ready for bed".

  In response the school stopped Clarke taking unsupervised sessions "with immediate effect", he said.

  Mr Taylor said Clarke had not been active at LSDA since 2015 and their professional relationship had ended.

  On Friday, Mr Taylor said the school had been provided with further details about what happened at the session, as well as another session "previously unknown to us".

  "Had we known about these details at the time we would have ended the professional relationship between Noel and our school with immediate effect," he added.

  In response to the allegations, Clarke's lawyers denied that the LSDA had ever asked him to stop giving his classes, and said the workshop, called Facing Your Fears, was intended to help students with anxieties over their acting roles, helping to "normalise" the removal of outer clothing in a safe environment.

  His lawyers told the Guardian Clarke categorically denied he encouraged or forced anyone to be naked as part of the workshop, which they said was open to and attended by both male and female adult students.

  Clarke made it clear it was not obligatory to participate, they added.

  Clarke's police drama Viewpoint did not air on Friday night as a result of the allegations against him

  On Thursday the Guardian reported allegations of harassment and bullying from women who knew Clarke in a professional capacity.

  The following day, before the LSDA allegations were published, Clarke said he was "deeply sorry" for some of his actions and would seek professional help.

  However, he "vehemently" denied any sexual misconduct or criminal wrongdoing.

  "Recent reports however have made it clear to me that some of my actions have affected people in ways I did not intend or realise," he said in a statement.

  "To those individuals, I am deeply sorry. I will be seeking professional help to educate myself and change for the better."

  ITV decided not to broadcast Friday's final episode of police drama Viewpoint, in which he stars, as a result of the allegations.

  Sky has also "halted" its work with Clarke, including on the fourth series of crime drama Bulletproof.

  And he has been suspended by Bafta, almost three weeks after the British film and television academy gave him an award for his outstanding contribution.

  Clarke won his first Bafta for Rising Star in 2009

  Bafta has been criticised by some for honouring Clarke on 10 April. It had received reports of allegations against the actor in the 12 days between announcing him as the award recipient and the ceremony itself.

  According to the Guardian, Bafta's chairman Krishnendu Majumdar said he had heard that as many as 12 women could be making allegations.

  In a letter to members in which it defended its response, Bafta said the emails it received "were either anonymous or second or third-hand accounts via intermediaries".

  "No names, times, dates, productions or other details were ever provided," it said.

  "Had the victims gone on record as they have with the Guardian, the award would have been suspended immediately."

  Clarke, 45, is known for playing Mickey Smith in Doctor Who from 2005-10, and for his film trilogy Kidulthood, Adulthood and Brotherhood. He is also a writer, director and producer.
