  As Scotland's lockdown eases with dentists and places of worship opening a new rule on face coverings comes into force.

  St Cuthbert's church in Edinburgh is reopening for small numbers of worshippers to pray Image caption: St Cuthbert's church in Edinburgh is reopening for small numbers of worshippers to pray

  A memorial chapel at a church in Edinburgh is to open for private prayers as lockdown restrictions have been further eased.

  St Cuthbert's Church will allow three people to be praying at once with standalone chairs set up two metres apart to assist social distancing amid the coronavirus outbreak.

  The Church of Scotland building is to open on certain days for two hours as the country has progressed to phase two of the lockdown exit strategy.

  Quote Message: St Cuthbert's has been a house of prayer for 1,400 years and the memorial chapel has always been a place of private prayer and reflection which we use at this time of year for visitors. The congregation is really pleased that other people will be able to drop in and experience the peacefulness of the beautiful chapel imminently. from Rev Peter Sutton St Cuthbert's minister St Cuthbert's has been a house of prayer for 1,400 years and the memorial chapel has always been a place of private prayer and reflection which we use at this time of year for visitors. The congregation is really pleased that other people will be able to drop in and experience the peacefulness of the beautiful chapel imminently.
