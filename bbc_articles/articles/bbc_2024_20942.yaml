content: |-
  With police on strike, students direct traffic and wonder what comes next after PM quit and fled.

  Inside Bangladesh: BBC finds country in shock but dreaming of change

  Julkernayeem Rahat and other students have taken over from police on Dhaka's streets, for now

  In Dhaka, students are on the streets directing traffic and keeping things running as police stage a strike following the popular uprising that toppled prime minister Sheikh Hasina. The police, normally highly visible, are nowhere to be seen on the usually loud and congested streets of the Bangladeshi capital. It seems that only students and some paramilitary forces are trying to maintain law and order, after weeks of unrest in which hundreds have been killed. An interim government is promised, but has yet to take office. Police now fear for their safety after the deadly crackdown that caused so much anger. It failed to quell anti-government protests that had begun over civil service job quotas last month.

  Noorjahan Mily wants freedom of expression and an end to corruption

  Things are calmer two days after Ms Hasina escaped to India, but there are continuing reports of sporadic looting and violence during the power vacuum. Many Bangladeshis, particularly the young, hope the country is at a turning point. “I want freedom of expression. I want a corruption-free country. I want people to have the right to protest,” Noorjahan Mily, 21, an Open University student, told the BBC. “I am uncertain about where the country is heading, because the government has changed. But whether the discrimination will remain or not, I will only be happy when their demands are met.” The country is now trying to come to terms with the shock of what has just happened, now that power has been prised from the hands of the country's long-time ruler. More than 400 people were killed in the recent unrest, most of them civilians shot by security forces, but also a number of police. It’s the bloodiest episode since the war that brought the country independence in 1971.

  Soldiers clear up after cheering crowds overran the prime minister's residence on Monday

  At the airport, a worker handed me my bags, telling me the situation is very bad and the government used too much force. “Many kids – as young as six, seven and eight – were killed,” he said. Outside the airport, students wearing orange hi-vis vests were directing traffic. “There’s no police here, only students,” the driver said. “There is no government, students are doing 100% security.” He agreed with the students, saying they had done a good thing. As we drove on, a group of students were putting out plastic cones to control the flow of vehicles. “I’m here to protect my brothers and help with the traffic. From the very beginning, I participated in the quota movement that turned into a massive movement,” Julkernayeem Rahat, a business administration student at University of Asia Pacific, told the BBC.

