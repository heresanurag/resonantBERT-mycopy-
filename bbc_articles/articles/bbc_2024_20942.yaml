  “We are happy we’ve removed the autocratic government. We have gained our freedom and our sovereignty.” He was confident that the man named as interim leader, Nobel Laureate Muhammed Yunus, will be able to form a government after a few months "with the help of students, lawyers, general people”. “Bangladesh’s future is in the hands of the student leaders. God willing, things will be good,” said the 22-year-old. Mahamudul Hassan, 21, is studying on the same course. “I want democracy so that people of all walks of life can enjoy equal opportunities, equal rights.” He’s hoping for “a leader who can make those things happen”. Mr Yunus was appointed to the post late on Tuesday by Bangladesh's president, meeting a key demand of student protesters, who said they would not accept an army-led government. He is now heading back from having surgery in France and could be sworn in on Thursday. "I'm looking forward to going back home and see what's happening and how we can organise ourselves to get out of the trouble we're in," he told reporters on Wednesday at Paris Charles de Gaulle airport, where he was due to fly to Dhaka. Following reports of looting and revenge attacks on supporters of Sheikh Hasina, he has urged people to refrain from all kinds of violence, warning that if they did not, they risked everything being destroyed. In an address to the nation on Wednesday, the army chief said he was certain Mr Yunus "will be able to take us through a beautiful democratic process and that we will benefit from this".

  How things turn out is still to be determined – but as far as traffic management goes, the students seem to be doing a good job. The BBC found it flowing much better than when we visited in January for controversial elections, boycotted by the main opposition, that handed Sheikh Hasina’s Awami League a fourth term in power. It almost seemed like business as usual when we saw a group of men pulling large metal rods for a construction project. “The traffic system is better now. The students are managing well. It’s better than when the police were here,” said Mohammed Shwapan, who has been a Dhaka driver for 24 years. “Today is busier than yesterday.” He supports the choice of interim leader. “As Mr Yunus is well known internationally, he can mitigate any potential economic collapse. “I am worried about the international debt, how will Bangladesh be able to manage payments. That's why I think he can do a good job.”

