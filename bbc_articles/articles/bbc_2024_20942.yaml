  The challenges ahead are enormous, and not just economic. There are many wounds to heal after Sheikh Hasina’s 15 years in power ended on Monday. Her government is credited with economic reforms that have improved the standard of living for many in Bangladesh. But she was also accused of serious human rights abuses, including numerous extra-judicial killings and forced disappearances. Many people have stories to tell of what their families went through. On the plane to Dhaka, I managed to close my eyes for a few minutes. When I opened them, I found a handwritten note on an airsick bag in the back pocket of the seat in front. On it, someone had written that his father was killed by Sheikh Hasina and his brother abducted. He had been in self-imposed exile for the last eight years for the safety of his wife and children. Now he is coming back to what he calls “a free country”, to visit his father’s grave, the note said.
