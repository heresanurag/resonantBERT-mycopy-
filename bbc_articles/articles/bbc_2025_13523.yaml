title: Youngest councillor Alexander Walker, 25, elected as Rhyl mayor - BBC News
date: '2025-06-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cvg9l31gyn9o
content: |-
  Alexander Walker, 25, who has autism, hopes to reduce the stigma around mental health issues.

  Rhyl's youngest town councillor, 25-year-old Alexander Walker, has been elected as mayor

  A local authority's youngest town councillor has been elected as mayor at just 25. Alexander Walker, who is autistic, has been a town councillor in Rhyl, Denbighshire, since 2022 and described it as "surreal" to be elected, as it is something which he never thought he would end up doing. Mr Walker took on the role of deputy mayor last year, but says he first got connected with the council around the age of 13, after receiving a Radio 1 Team Hero Award for dedicating his life to care for his disabled mum, Michaela. He now hopes to raise awareness of the mental health charities which helped his mum and be an advocate for the younger generation in the community.

  "It's not just the realm of the older person," Mr Walker said. "Growing up I didn't feel there were many opportunities to learn about the town council. "I've got the role of being a voice for younger people, getting younger people involved in their communities." Both Mr Walker and his mum have Ehlers-Danlos syndrome, external (EDS), a condition which causes joint hypermobility, frequent dislocations, and muscle weakness. Despite living with EDS, Mr Walker has spent his life caring for both his mum and his grandparents, all while volunteering within the community. Speaking to BBC Radio Wales Breakfast, Mr Walker said he had relationships with members of the council but first got involved in the council during the Covid-19 lockdown, by joining their virtual meetings. Now, he believes individuals can have the most impact in local government, addressing the issues which matter the most to people. Mr Walker said he is looking to bring awareness to issues close to his heart too, adding "growing up I've had my own challenges with my mental health, my mum has had challenges with her mental health". Looking at the year ahead, he aims to remove the stigma surrounding mental health problems and raise funds to help organisations such as the charity Mind provide the support people need.
