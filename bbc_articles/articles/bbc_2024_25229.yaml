title: 'Wales weather: Heavy rain brings widespread travel disruption - BBC News'
date: '2024-10-16'
section: Wales
url: http://www.bbc.co.uk/news/articles/cdrj7ynrn14o
content: |-
  River levels are rising and properties are expected to flood in several parts of Wales.

  Train tracks near Shrewsbury were flooded, leading to many lines from Shrewsbury being closed for the day

  Train services across Wales have seen major disruption amid heavy rain, with roads and low-lying land also flooded. Transport for Wales (TfW) reported flooding across its network, with cancellations near Wrexham, Shrewsbury and Cardiff. South Wales Police (SWP) said it had received reports of surface water on several roads, including the M4, while North Wales Police said roads in the eastern part of the area have also been affected. There are 17 flood warnings, and 30 alerts issued by Natural Resources Wales, external across Wales for Wednesday.

  SWP also said a car had been caught in flood waters between Capel Gwilym Road and Thornhill Road, north Cardiff, urging motorists to avoid the area and use alternative routes where possible. Meanwhile, three schools in Powys closed for the afternoon on Wednesday because of the weather. National Rail warned passengers of disruption across the TfW network on Wednesday. It said: "Your journey will take significantly longer than normal. "Please check your entire journey is still possible before setting off today."

  Heavy rain is causing disruption on roads across Wales, including in Cathays, Cardiff

  TfW, external also said multiple lines were flooded, including "major disruption" in mid and north east Wales, as well as delays in south Wales near Cardiff. It added that flooding has led to the lines between Shrewsbury and Chester being blocked, with "a very limited" replacement bus service running. Lines between Wrexham Central and Bidston, Merseyside, are also cancelled due to flooding, with disruption expected until 23:00 on Wednesday, while there are also cancellations between Hereford and Shrewsbury, TfW said. North Wales Fire and Rescue Service said it received numerous reports of flooding in the Flintshire and Wrexham areas and warned people to keep away from fast flowing watercourses.

  A map showing the number of flood warnings (red) and alerts (orange) across Wales at 20:30 BST on Wednesday evening

  Powys council said it had to close the B4393 Llanfechain to Llanfyllin road due to flooding. "As far as we are aware, the main roads are currently passable but there is a lot of standing water so drivers should proceed with caution of they are to drive in the current conditions," it said. There were eight flood alerts and 13 serious flood warnings across rivers in Powys, it added. "The worst of the flooding is thus far in the north of the county but all areas are at an elevated state of risk. "With even more rain forecast tonight, conditions could still get a lot worse, so please be cautious," it said.

  Abi Devenport, who works and lives at Hawarden Happy Hounds in Deeside, Flintshire, said the road was “like a stream in the middle of the lane”

  Abi Devenport, who works and lives at Hawarden Happy Hounds in Deeside, Flintshire, said the road was "like a stream in the middle of the lane". She said she and staff had been wading through waist-high water in some areas to return dogs to their customers. The area also flooded two weeks ago, which she said was an "ongoing issue", adding that they were worried every time it rains. "Because there are so many animals, we can't necessarily leave or escape," she said.
