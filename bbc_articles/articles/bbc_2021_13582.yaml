title: 'Escaping the Taliban: Afghan policeman''s struggle to enter Turkey - BBC News'
date: '2021-10-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-58876359
content: |-
  Former soldiers and police are among Afghans trying to evade a crackdown at the Turkey-Iran border.

  With growing concerns about a humanitarian crisis in Afghanistan, the authorities in Turkey have stepped up security on their border and warned they won't accept an influx of Afghan migrants and refugees.

  Turkey already has the world's largest refugee population of around 4 million people - 3.6 million of whom are Syrians - but there is growing anti-migrant sentiment.

  Many Afghans cross Iran to get to Turkey, hoping to travel onwards to Europe.

  Officials in eastern Turkey say so far this year about 90,000 people have been prevented from illegally crossing the border, most of them Afghans.

  BBC international correspondent Orla Guerin reports from the Turkish border province of Van.
