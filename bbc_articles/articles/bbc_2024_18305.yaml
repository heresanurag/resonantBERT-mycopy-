title: Tory peer criticises Welsh leader's abolish Senedd poll - BBC News
date: '2024-08-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckgjz9e9yl6o
content: |-
  Andrew RT Davies warned against going down "blind alley" in trying to debate whether to scrap Senedd.

  The Welsh Conservatives' Senedd leader has been warned against going down a "blind alley" of trying to debate the abolition of the Welsh Parliament. Andrew RT Davies took to X, formerly Twitter, to say that he raised the issue at the Vale of Glamorgan agricultural show as he was "keen to find out people's views". But Tory peer Nick Bourne, a former leader of the party in Wales and a member of the then Welsh Assembly, said there were "very many good things about devolved politics". While the abolition of the Senedd is not a policy of the Conservatives, Mr Davies said he was keen to find out people's views.

  "Once the vote was taken over 25 years ago, we determined that the correct approach was to make the assembly work, now the Senedd, for the good of the people of Wales," said Lord Bourne on BBC Radio Wales' Sunday Supplement programme. "That remains very much the position. I don't understand why we're going down this blind alley. "It doesn't seem to make a lot of sense to me." Earlier in the week, Mr Davies shared a photo, external on X from the Vale of Glamorgan Show, showing how people were being asked to drop a ball into one of two buckets to highlight whether they wanted to abolish the Senedd or not, which he admitted was an "unscientific poll".

