  Responding to criticism on X, Mr Davies said: "We're just keen to find out people's views. It's important to find out what people think." Lord Bourne also questioned why Mr Davies had raised an issue of the availability of non halal food in Welsh schools, prompting the Welsh Tory leader to be accused of engaging in "Islamophobic race-baiting" by the Muslim Council of Wales. Lord Bourne said: "We do have to make clear that we're a one nation party." In response, Mr Davies said: "Welsh Conservatives stand against all forms of racism, including anti-Muslim hatred. "Representations from across Wales have been made to me about the availability of non-halal meat in schools. "These are legitimate queries and I make no apologies for taking them forward. "It is important to have these discussions in a measured way and we will continue to do so."

  Lord Bourne called for Conservative Members of the Senedd (MSs) to have a group meeting to discuss its "one nation" stance despite Welsh Parliament being in recess. He went on to say that his party's "focus should be how are we going to make things better for the people of Wales" after the Conservative general election wipe-out in Wales and with the Reform party setting their sights on the Senedd elections in 2026. "I think there's a great danger of talking Reform up," he added. "We've had UKIP before, and they were represented in the Senedd previously, and then it fizzled out. "The exposure that Reform is going to get now that they've got elected politicians in Westminster may well show what a busted flush they are. "We're a party of the moderate right, and that should be reflected in the way we approach politics in Wales."
