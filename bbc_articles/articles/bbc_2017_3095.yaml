title: Trump unapologetic on 'tough phone calls' - BBC News
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38835806
content: |-
  President Trump brushes off reports of his "tough phone calls" with Mexican and Australian leaders.

  Speaking at a National Prayer Breakfast in Washington DC, President Donald Trump has brushed off reports of "tough phone calls" he had recently with the Mexican and Australian leaders.

  "Believe me, when you hear about the tough phone calls, don’t worry about, just don’t worry about it, they’re tough, we have to be tough,” he said.
