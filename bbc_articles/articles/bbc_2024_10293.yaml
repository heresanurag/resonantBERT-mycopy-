id: bbc_2024_10293
title: Boy, 5, dies in fall from upper floor of east London block of flats - BBC News
date: '2024-05-17'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-69019844
content: |-
  A neighbour says the boy's parents are "inconsolable" after his death in east London.

  Police and paramedics were called to Jacobs House on Thursday

  A five-year-old boy has died after falling from a tower block of flats in east London. The child fell from the upper floors of Jacobs House in New City Road, Plaistow, at about 06:00 BST. He died at the scene. A neighbour who called the emergency services said the boy's parents were "inconsolable". The death is not being treated as suspicious and a file will be prepared for the coroner, the Met Police says. "Our thoughts are with the child's family at this time," a Met spokesperson said, adding they were supporting relatives with specialist officers.

  Neighbours have been leaving flowers and cards near the little boy's home

  A resident of Jacob's House, who gave his name as JJ, said the boy had lived on the 15th floor. He said he witnessed a man go to the boy and cry out: "No, my son." Another resident, Ansert Davis, said he saw the boy's father "rolling on the floor" and also "saying 'my son'". Mr Davis, who had previously seen the family playing on the swings, said the boy's mother was "distraught".

  Emergency crews went to the building in Plaistow

  He saw another neighbour run out to try and help: "She came running around, took one look at the child and turned back shaking. "I keep seeing the image in my head. It's so sad, I've got a grandkid about this age. Oh my God, it's like seeing your own kids." Another resident, who did not give their name, said the boy was an Arsenal supporter and described him as "a really nice boy."

  People are starting to leave flowers near the spot where the five-year-old boy died. Some people here are still hearing about the news, reacting with a mix of shock and empathy.

  Carol said her husband had heard the little boy's family scream early that morning

  Carol, who lives near the block, said her husband "woke up this morning and heard the screams" and said something terrible must have happened. "He drove by and saw the ambulance and the police and this is what we woke up to, which is very sad."

  A Met spokesperson said "officers, London Fire Brigade, London Ambulance Service and London's Air Ambulance" attended the incident. "A five-year-old boy had fallen from an upper floor of an apartment block. Despite the efforts of emergency services, he sadly died at the scene," they said.

  Flowers have been left near the scene

  A spokesperson from Newham Council said: "We are deeply sorry to hear about this devastating incident. "We extend our sincere condolences to all those affected. "We have staff at the location to provide reassurance to residents at this difficult time while we work with partners to establish the full facts." The boy was previously reported to have been six years old. This has since been corrected by the Metropolitan Police Service to five years old.

