title: 'US flights: Technical glitch resolved and departures resume - BBC News'
date: '2023-01-11'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-64238718
content: |-
  Air traffic in the US resumes after all domestic flights were grounded for several hours.

  We'll be wrapping up our live coverage soon but before then, here's a recap of the day's events.

  Ground control: A number of US domestic flights were grounded earlier for several hours due to a technical glitch with one of the Federal Aviation Administration (FAA)'s systems.

  NOTAM: The system, called Notice to Air Missions but often referred to as NOTAM, alerts pilots to potential hazards on their route.

  Word from the White House: US President Joe Biden spoke to reporters, saying the issue was being investigated and his administration would provide an update when it had one.

  Delays, delays, delays: Major US airports, including JFK Airport in New York and LAX Airport in Los Angeles, warned passengers to check the status of their flights before heading to the airport. More than 6,100 flights were delayed within, into or out of the US, according to flight tracking website FlightAware .

  Order lifted: Following an update in which the FAA said services were slowly resuming, officials lifted the ground stop. A ground stop is an air traffic control measure that slows or grounds aircraft at a given airport. Delayed flights across the US began taking off as a result.

  Review ordered: A US Senate committee will now examine what caused the FAA's system glitch. A statement released by the White House said there was no evidence of a cyber-attack.
