title: 'Suez Canal: Bulk carrier refloated after running aground - BBC News'
date: '2023-05-25'
section: Business
url: http://www.bbc.co.uk/news/business-65705317
content: |-
  In March 2021, one of the largest container ships in the world blocked the canal for six days.

  Stock image of a container ship passing through the Suez Canal

  A ship that was grounded in the Suez Canal, has been been refloated, shipping agent Leth Agencies says.

  Tugboats had been working to refloat the bulk carrier, named Xin Hai Tong 23, the company said earlier.

  The Suez Canal Authority did not immediately respond to a BBC request for comment.

  Two years ago, the Suez Canal, one of the busiest waterways in the world, was impassable for almost a week after a giant container ship became stuck.

  "The Suez Canal Authority has successfully refloated M/V XIN HAI TONG 23 at 0740hrs," Leth said in a tweet.

  The ship, which sails under the Hong Kong flag, had been "not under command" near the southern end of the canal, positioned at an angle next to the canal's eastern side, according to the Marine Traffic ship tracker.

  The tracker also showed that there were three Egyptian tugboats surrounding the ship.

