title: Trump, his in-laws and chain migration - BBC News
date: '2018-08-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45150848
content: |-
  The first lady's parents became US citizens through a process the president has vowed to end.

  First Lady Melania Trump's Slovenian-born parents became US citizens through a process the president dismisses as 'chain migration'.
