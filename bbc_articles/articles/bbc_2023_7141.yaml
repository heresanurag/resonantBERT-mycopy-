content: |-
  The Asiana Airlines plane landed safely in South Korea after a passenger forced open an emergency door.

  A man has been arrested after the emergency door of an Asiana Airlines plane was opened as it was coming in to land in South Korea.

  The flight landed safely, but some passengers fainted and others were hospitalised with breathing problems, local media reported.

