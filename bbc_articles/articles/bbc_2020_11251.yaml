id: bbc_2020_11251
title: Royal British Legion launches Poppy Appeal from veterans' homes - BBC News
date: '2020-10-22'
section: General
url: http://www.bbc.co.uk/news/uk-54639404
content: |-
  The Royal British Legion's annual Poppy Appeal is launching differently due to the Covid pandemic.

  The coronavirus pandemic means selling poppies and collecting donations for the Royal British Legion's annual Poppy Appeal will have to happen a little differently this year.

  The charity has released a series of portraits of veterans, poppy collectors and serving members of the armed forces to coincide with the launch of this year's appeal.

  The photographs, taken in the homes, doorways and streets of the subjects, provide a snapshot into the lives lived in lockdown and the impact of Covid-19 on the Poppy Appeal.
