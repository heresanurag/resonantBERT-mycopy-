  The following day, with a kitchen knife in his backpack, he left his school in Gateshead early and got the bus to Hexham, where he waited for Holly to head into town. Dressed all in black with a black face mask and baseball cap concealing his identity, MacPhail followed Holly and her friends as they visited a leisure centre and shops for about 45 minutes.

  MacPhail (in the red box) was seen on CCTV following Holly (in the yellow frame) through Hexham

  He waited until she was alone at a bus stop before confronting her, then lured her into a nearby alley where he launched a ferocious minute-long attack. Holly had 36 knife injuries, the blade snapping in the melee, and another boy who tried to pull MacPhail away was stabbed. The attack ended when several passers-by intervened, with MacPhail telling them Holly had been "horrible" to him.

  Mr Justice Hilliard, who previously lifted restrictions to allow the identity of MacPhail to be reported, said the "vicious and brutal" attack was motivated by "resentment and jealousy". He said MacPhail took the knife with him so if Holly refused his demands to resume their relationship, he could "frighten" and "pressure" her by pulling the blade out and saying he would cut himself if she did not relent. Once MacPhail realised Holly would not change her mind, he decided to lure her into the alley with the express purpose of killing her in an area where people were less likely to see and intervene, the judge said.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  He said Holly was "screaming" throughout the attack and "must have realised she was fighting for her life". She had 12 stab injuries, five defensive wounds on her hands and 19 other knife wounds, the judge said. "Stabbing her head was a terrible thing to do,” the judge told MacPhail, adding Ms Trussler was stopped from seeing her daughter due to the "horrifying condition" Holly was in. He dismissed defence claims about MacPhail's low IQ and learning disabilities, adding the teenager intended to kill Holly and "knew how final death was".

  This video can not be played To play this video you need to enable JavaScript in your browser. Mr Justice Hilliard said: "This should not happen to any child or parent"

  Mr Justice Hilliard said Holly was a "beautiful child" who grew into a "happy and funny teenager who would do anything for anyone". He said the value of her life was "beyond measure".
