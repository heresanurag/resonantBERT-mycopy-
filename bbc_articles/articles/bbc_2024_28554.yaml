title: 'Holly Newton murder: ''Jealous'' ex-boyfriend detained for life - BBC News'
date: '2024-11-02'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cj6k7y8wre7o
content: |-
  Logan MacPhail was "filled with resentment" when he stalked and stabbed the 15-year-old, a judge says.

  Holly Newton was a funny and energetic girl, her family said

  A "jealous" teenager who stabbed his 15-year-old ex-girlfriend to death has been detained for at least 17 years. Logan MacPhail stalked Holly Newton for almost an hour before he launched a ferocious attack on her in Hexham, Northumberland, in January 2023. MacPhail, then aged 16 and now 17, had admitted manslaughter but was found guilty of murdering Holly and intentionally wounding another youth who tried to stop the attack. Handing down a life sentence with a minimum term at Newcastle Crown Court, Judge Mr Justice Hilliard said MacPhail was "filled with resentment" and intended to kill Holly in the "vicious and brutal" attack.

  The young couple had been together for 18 months after meeting at army cadets. Holly's mother Micala Trussler previously told the court it had been a "typical teenage relationship" with "mild-mannered" MacPhail being her "funny and energetic" daughter's "first and only boyfriend".
  • None Watch on BBC iPlayer - The Big Cases: Stabbed After School
  • None Recap our live updates of the sentencing She also said "red flags" about his controlling behaviour were not recognised until it was too late and she had not realised the "emotional turmoil" Holly was being put through when trying to break up with MacPhail. Ms Trussler said Holly was a "caring and thoughtful young lady" and the family had been robbed of the chance to see her grow into a "beautiful woman".

  Micala Trussler said her daughter Holly was caring and thoughtful

  In the days before the killing, Holly had ended their relationship, with MacPhail later admitting in court he was "angry" and "jealous". MacPhail turned up uninvited outside her house in Haltwhistle on the night of 26 January and had to be taken back to his home in Birtley by police.

