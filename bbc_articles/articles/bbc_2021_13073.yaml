id: bbc_2021_13073
title: Deported Haitian migrants face uncertain future - BBC News
date: '2021-10-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-58793346
content: |-
  Deported Haitian migrants must now rebuild their lives in a crisis-hit nation they fled a decade ago.

  Thousands of Haitian migrants have returned to the island after being deported by the US. Many of the migrants had been living in South America and have not set foot in Haiti for years.

  The BBC’s Will Grant spoke to migrants about the "inhumane" treatment they say they received at the US border - and about how they'll try to rebuild their lives now.
