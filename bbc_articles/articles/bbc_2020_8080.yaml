  Ms Sturgeon also said a cross-border cluster of cases spread between Dumfries and Galloway and the northwest of England was a "sharp reminder" that the virus is still a threat.

  The "small but complex" cluster is thought to include fewer than ten cases, and efforts are under way to trace the contacts of those who have tested positive.

  A cross-border incident management team has also been established to ensure appropriate measures are being put in place.

  Ms Sturgeon said she hoped the current containment measures would be sufficient, but that "other interventions might become necessary" - drawing a comparison to the local lockdown measures recently imposed in Leicester.

  The first minister has previously said Scotland was "not far away" from eliminating coronavirus.

  But she has warned people not to let their guard down and become complacent as the country begins to open up again, and has said "unpopular decision" could still need to be taken to prevent a resurgence.
