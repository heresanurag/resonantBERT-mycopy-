title: Bodycam footage shows West Bridgford house fire rescue - BBC News
date: '2025-02-21'
section: General
url: http://www.bbc.co.uk/news/videos/cy05grrlggxo
content: |-
  A PC found a woman in an upstairs bedroom and stayed with her until fire crews arrived.

  Police were the first emergency responders at the scene of the blaze in Lingmell Close in West Bridgford, Nottinghamshire, on 19 July 2024.

  PC James Cantrill entered the smoke-filled house and found a woman in an upstairs bedroom and stayed with her until firefighters arrived.

  A police investigation revealed a man who lived at the address had set fire to his own home after lighting a blaze in a wheelie bin.

  Clive Hawker, 54, pleaded guilty to arson with intent to endanger life and arson with recklessness as to whether life was endangered and is due to be sentenced on 3 April at Nottingham Crown Court.

