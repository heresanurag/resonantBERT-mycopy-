content: |-
  The huge dust storm - also known as a haboob - limited visibility and left many residents in the dark.

  A large dust storm - also known as a haboob - struck central California disrupting traffic and downing trees.

  Dozens were stranded on Highway 99 as high winds reduced visibility and knocked down fences.

  The National Weather Service issued warnings for dangerous travel in affected counties.
