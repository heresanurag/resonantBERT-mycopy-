title: 'Raygun: Olympic judge praises breaker''s ''originality'' - BBC News'
date: '2024-08-12'
section: Australia
url: http://www.bbc.co.uk/news/articles/cnvy348n260o
content: |-
  The Australian dancer has faced intense online ridicule, after her unique routine divided viewers.

  B-Girl Raygun of Team Australia divided audiences with her unorthodox moves

  The top judge of the Olympic breaking competition has thrown his support behind Rachael Gunn of Team Australia, after her unorthodox routine in Paris divided the internet. Gunn, who competes under the name Raygun, was eliminated from the B-Girls competition after scoring zero, prompting both ridicule and praise for her unique style. "Breaking is all about originality and bringing something new to the table... and this is exactly what Raygun was doing," Martin Gilian said in defence of the athlete, who has also been commended by Australia's Prime Minister for "having a go". Breaking, which debuted at the Paris Games, is not on the programme for the 2028 Olympics in Los Angeles.

