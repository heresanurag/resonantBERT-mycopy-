  The four children of Prince Philip reflect on the life of their father.

  In a programme filmed for the BBC, Princess Anne and Princes Charles, Andrew and Edward spoke about how they will remember the duke, who has died aged 99.

  The Prince of Wales said that his father would "probably want to be remembered as an individual in his own right".
