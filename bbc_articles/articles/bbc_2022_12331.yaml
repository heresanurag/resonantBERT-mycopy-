title: 'WATCH: King Charles III greets mourners at Buckingham Palace - BBC News'
date: '2022-09-09'
section: General
url: http://www.bbc.co.uk/news/uk-62853708
content: |-
  Huge crowds awaited the new King as he arrived with the Queen Consort.

  King Charles III has arrived at Buckingham Palace with the Queen Consort and was met by huge crowds wishing to pay their respects.

  The King shook hands with mourners and looked at floral tributes before entering Buckingham Palace for the first time as King.

  Also, on the walkabout a well-wisher was so moved she leant forward and kissed the King on his cheek.
