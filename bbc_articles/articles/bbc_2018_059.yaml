  In a 2012 Spectator column, Mr Young hit out at the "inclusivity" agenda in schools, suggesting it meant "wheelchair ramps, the complete works of Alice Walker in the school library (though no Mark Twain) and a Special Educational Needs Department that can cope with everything from Dyslexia to Munchausen Syndrome by Proxy."

  He told the BBC that the article had been misunderstood and he had since made clear that he was not disparaging inclusion in the "narrow sense of providing equal access to mainstream schools for people with disabilities" but criticising the notion of "a dumbed down, one-size-fits-all curriculum".

  Given the volume of tweets he had sent over the years, he said it was "not altogether surprising" that anyone trawling through them had found some "sophomoric" remarks.

  "I regret these, obviously. I hope people will judge me on my actions, not on silly things I've tweeted or written in my 30-year career as a journalist," he said.

  Defending his qualifications, he said he had been "a passionate advocate" of widening participation and increasing social mobility since the mid-1980s when, as a state school boy at Oxford, he first started visiting sixth forms in deprived parts of the country to try to persuade students to apply to elite universities.

  Business minister Margot James said that while she still believed Mr Young was a worthy candidate for the job she questioned how he had responded to criticism of his conduct on social media.

