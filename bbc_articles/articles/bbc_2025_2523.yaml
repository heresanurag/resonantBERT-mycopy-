content: |-
  Thames Water is hoping to secure an emergency cash injection or face runing out of money in weeks.

  Thames Water looks for an emergency cash injection through courts

  Thames Water will seek approval for an emergency cash lifeline in court on Monday as it faces running out of money in four weeks' time. Lenders to the debt-saddled company are offering up to £3bn in additional short-term loans to buy time to complete a major restructuring of the UK's biggest water and waste company. Failure to secure approval will see Thames edge closer to a temporary nationalisation, which could cost the government some £2bn a year. The company is still considering whether to appeal against a decision by the water industry regulator Ofwat to increase bills by 35% above inflation over the next five years – short of the 53% increase it applied for.

  Thames Water has been struggling for some time and has been heavily criticised over its performance following a series of sewage discharges and leaks. The dire state of the company's finances emerged about 18 months ago when it began a search for funding to avoid collapse. The Thames fiasco is a combination of poor historical regulation, greedy shareholders, climate change and management failure. Its debt pile is currently about £17bn. But regardless of what happens to the company in the future, water supplies to households will continue as normal. In the latest bid to survive, lenders have offered Thames a further loan of up to £3bn in two instalments. The first payment is to get it through to the autumn, and a second is to be used if the company decides to appeal against Ofwat's 35% bill rise to the Competition and Markets Authority (CMA) - a process that could take up to a year. The company has until 18 February to launch an appeal to the CMA.
