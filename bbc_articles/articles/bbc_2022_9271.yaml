title: Boy in sequined prom dress ‘living his best life’ - BBC News
date: '2022-07-05'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-norfolk-62041127
content: |-
  Korben "living his best life", photographed by his proud mum, has gained praise around the world.

  This video can not be played To play this video you need to enable JavaScript in your browser. Korben was greeted with loud cheers from fellow pupils and school staff when he arrived at the prom

  A 16-year-old boy who wore a red dress to his school prom has said it was "surreal" it had been seen more than seven million times on social media.

  Korben stepped out in a sequined tuxedo and ballgown skirt to loud cheers from pupils and staff at Archbishop Sancroft High School in Harleston, Norfolk.

  His mum, Nina Green, tweeted a photo and said she was incredibly proud he was being true to himself.

  Korben said: "It sends a message - you can be who you want to be."

