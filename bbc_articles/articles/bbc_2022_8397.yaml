  • None Promoted Bournemouth host Aston Villa on the opening weekend. The Cherries' first-ever Premier League game in August 2015 was a 1-0 home defeat to Villa.
  • None Everton are unbeaten in their opening Premier League match in the past 10 seasons (W4 D6).
  • None Despite relegation in 2020-21, Fulham were unbeaten across both Premier League games against Liverpool that season, drawing 1-1 at home and winning 1-0 at Anfield.
  • None Among current Premier League sides, Southampton are on the longest winless run in their opening Premier League matches of the season (P8 D4 L4).
  • None Manchester United will be opening a top-flight season against Brighton and Hove Albion for the first time in their history.
