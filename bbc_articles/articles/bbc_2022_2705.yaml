content: |-
  The GB women's curling captain reacts to getting a gold medal at her fourth Winter Olympic Games.

  The GB women's curling captain, Eve Muirhead, has said it "really hasn't sunk in" that she's finally won a gold medal at her fourth Olympics.

  She praised the rest of her team - all of them making their Olympic debut.

  Muirhead, who became the youngest ever Olympic skip at 19 in Vancouver 2010, wasn't sure if she would even compete this year due to health problems and hip surgery.
