  Indian Prime Minister Narendra Modi and his party have won the most seats in this year's election.

  What worked for India's Modi - and what didn’t?

  This video can not be played To play this video you need to enable JavaScript in your browser. What worked for India's Modi and what didn’t?

  Indian Prime Minister Narendra Modi’s BJP looks to have won the most seats in this year's election. But - for the first time - he has fallen short of getting an outright majority, and will need to rely on his allies to get him over the final hurdle. So, what happened? The BBC’s Yogita Limaye explains.
