  Addressing Thibou, Judge Katz said: "When violence broke out, you were quick to move to join in. "You were so fired up that you didn't hesitate to use your knife. "You were so brazen that it was carried out in front of police officers." Thibou, who wore a medical face mask and blue beanie hat in the dock, looked straight ahead throughout.

  Ms Maximen, who was born in Bristol, was described by her family as a "bubbly, vivacious and creative" mother. In a victim impact statement read to the court, Cher's grandmother Vyleen Maximen said: "Cher was my first born grandchild, my friend. "I held you in my arms when you were born. Thirty-two years of loving, laughing, playing, crying and holidaying with you. I will no longer have that pleasure ever again. I won't see you get married or having more children. "The hole in my heart will never be filled. "I will never hear your key in my front door shouting 'hello nanny'. "Life will never be the same ever."

