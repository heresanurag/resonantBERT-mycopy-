  His brother Sheldon Thibou, 25, was found guilty of violent disorder and assaulting PC Oliver Mort, who tried to intervene. A third brother, Shaeim Thibou, 22, was cleared of violent disorder but convicted of assaulting PC Mort. Shaeim was sentenced to six months in jail, suspended for 18 months; Sheldon will be sentenced at a later date.
