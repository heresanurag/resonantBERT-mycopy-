title: 'Notting Hill Carnival: Man jailed for murder of Cher Maximen - BBC News'
date: '2025-05-16'
section: London
url: http://www.bbc.co.uk/news/articles/cre98lpd7n3o
content: |-
  Shakeil Thibou, 20, attacked Cher Maximen in front of her child with a zombie knife.

  Killer jailed for life for stabbing mum at Carnival

  The man who murdered Cher Maximen in front of her three-year-old daughter at Notting Hill Carnival has been jailed for life. Shakeil Thibou, 20, from Kensington in west London, was sentenced at the Old Bailey where he was ordered to serve a minimum term of 29 years. Ms Maximen, 32, was stabbed with a zombie knife when a fight between a group of men broke out next to her. She died six days later in hospital. Speaking outside court, Ms Maximen's family said "justice had been served" but that "no sentence is long enough" for her killer.
  • None 'I think my mummy's dead and I couldn't save her'

