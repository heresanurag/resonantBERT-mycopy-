  During sentencing, Judge Philip Katz said: "It is not possible to overstate the impact of Cher's brutal and shocking murder on those who knew her." The trial heard that Thibou had lunged at a man, Adjei Isaac, with a "huge" knife during the fight on 25 August - family day at the carnival. As Mr Isaac tried to avoid being stabbed, they fell on to a group of people who included Ms Maximen. As Thibou tried to get to his feet, he swung the knife at Ms Maximen and stabbed her in her groin as she tugged at his coat and kicked out at him to protect her daughter. Thibou was found guilty of murder, attempting to cause grievous bodily harm to 20-year-old Mr Isaac with intent, and having an offensive weapon.

  Shakeil Thibou has been jailed for 29 years

  TJ Jacobs, the godmother to Ms Meximen's daughter, said: "We hope that it acts as a deterrent to people that choose to come along to any occasion or any event and act so recklessly and without thought in situations that can lead to just such catastrophic events." Asked about Ms Maximen's daughter, her grandmother Vyleen Maximen, said she was "growing up lovely". "We don't forget about her mummy. We speak about her mum all the time."

  TJ Jacobs, left, hopes the sentence will deter others

  Judge Katz said Thibou's "brazen" attack had been carried out in broad daylight in front of families and the police. He said instead of just enjoying a fun day together, Cher's daughter "witnessed her mother being murdered in front of her". He added: "One of the dreadful ironies of this case is, that as the afternoon wore on and the atmosphere at the Carnival became tense and less friendly, Cher voiced her concerns to one of the few police officers in the immediate area where she, her friends and their children were located. She made it clear that she would not tolerate any threat to her daughter's safety." Judge Katz said it was a case of "young men, intoxicated by drink and drugs, determined to involve themselves in violence". He added: "The police were totally outnumbered as the violence spun out of control." He said watching the police body-worn footage was "terrifying".

