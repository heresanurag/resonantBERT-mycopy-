content: |-
  Take a peak behind the doors of the football manager's sumptuous former home, now for sale at £4.25m.

  The mock Georgian mansion is on the market for £4.25m

  Former Liverpool manager Jurgen Klopp has topped one final league table from his time on Merseyside - the sumptuous mansion he made his home has become the most-viewed listing on a leading property website. Complete with swimming pool complex, bar area and state-of-the-art gymnasium, the sprawling pile in Freshfield, Sefton, has gone on the market for £4.25m. Klopp, 57, left the football club in May after winning eight trophies in nine years, including the Champions League and the Reds' first Premier League title. Property firm Rightmove said the mansion topped its league for the most online visits over the past year.

  Charismatic Klopp, who became an adopted Scouser during his time in the UK, left to take a job with Red Bull and went on to buy a villa on the island of Majorca, recently telling a German news podcast how he and his wife wanted to turn it into an "eco-friendly family home".

  Klopp described himself as an adopted Scouser after years living on Merseyside

  No millionaire's home is complete without a swimming pool

  The mock Georgian home on the prestigious Victoria Road also features a separate building for entertaining guests and a host of other features, described on the website as "the ultimate relaxation oasis". The decor and architecture ranges from luxury hotel chic to the sort of style more common in an upmarket conference centre. Property agent William Goulden said: “This is an exceptional home in a beautiful part of the country. "Many will be aware of the property's recent history, and we look forward to playing a part in its future."

  Other properties on Rightmove attracting the most attention include a former abbey in Oxfordshire on the market for £15m and a refurbished 19th century Grade II-listed Georgian house in Knightsbridge, London, on Britain’s most expensive street, where the average asking price is a cool £9.6m. Rightmove property expert Tim Bannister said: "From a luxurious former football manager’s residence to a historic Grade I listed abbey, the most viewed homes of the year reflect the wide-ranging dreams of home-hunters this year across Britain. "Whether it’s a property fit for royalty opposite Buckingham Palace, or a stunning family home, these remarkable listings showcase the unique charm and diversity of the UK housing market."

  A bar area complete with dartboard for guests to enjoy

  The property has its own state-of-the-art gymnasium
