  Responding to the ruling, Ms Dugdale said she was "delighted and hugely relieved" to have won the case, and described it as an "important judgement for the right to free speech and a healthy press."

  The Labour MSP added: "This ruling clearly demonstrates that every citizen is entitled to make comments as long as they are fair and reflect honestly held views".

  Speaking to BBC Scotland, Mr Campbell said: "It is completely perplexing that the sheriff could find that Kezia Dugdale's remarks were defamatory yet that she was not guilty of defamation."

  He called on Ms Dugdale to apologise to him, and said he was taking legal advice on whether or not to appeal against the ruling.

  In a written statement, he added: "I sought to defend my reputation against a false accusation of homophobia, to establish that I'm not a homophobe, and to prevent anyone from being able to make such claims in future.

  "All of those aims have been upheld, in explicit terms, by this judgement."
