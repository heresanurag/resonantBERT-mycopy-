title: Child dies after being hit by car on sports pitch in Kendal - BBC News
date: '2025-03-06'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/c8d4ep9pld9o
content: |-
  A second child is being treated after being struck by a car at Kendal Rugby Union Football Club.

  Child dies after being hit by car on sports pitch

  The car hit two children on a pitch at Kendal Rugby Union Football Club

  One child has died and another has been injured after they were hit by a car on a sports pitch. A man in his 40s has been arrested on suspicion of causing death by dangerous driving, Cumbria Police said, after the crash at Kendal Rugby Union Football Club. It is being treated as an isolated incident and there is no suggestion it is terror-related. A black BMW i40 car was involved in the collision at the club in Shap Road at around 17:00 GMT, police said.

  The driver, a man in his 40s, has been arrested on suspicion of dangerous driving

  Chairman of the club Dr Stephen Green said: "Our thoughts are with their family and friends and we kindly ask for privacy for all involved at this difficult time." He added that the club was cooperating with the investigation and that all facilities would be closed while this was carried out. Posting on X, Tim Farron, MP for Westmorland and Lonsdale, said it was "devastating, utterly heartbreaking news". "I'm praying for the children and for their families and friends," he said. "Our community in Kendal is stunned and in mourning."

