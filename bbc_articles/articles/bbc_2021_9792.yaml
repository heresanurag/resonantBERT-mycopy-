title: Five hurt in high-speed crash at Lincoln car meet - BBC News
date: '2021-08-22'
section: Lincolnshire
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-58297401
content: |-
  Police say the five people were seriously injured when two cars went into spectators.

  The crash happened in Whisby Road in Lincoln

  Five people were left seriously injured when two cars hit spectators at a car meet.

  Police said the cars were being driven at high speed in front of a large crowd when they crashed in Whisby Road, Lincoln, at about 22:00 BST on Saturday.

  One of those injured was described as being in a critical condition.

  Det Supt Peter Grayson, of Lincolnshire Police, urged anyone with dashcam or mobile phone footage to contact them.

  He said: "This is a very serious collision with profound physical consequences for those injured.

  "The event had a large crowd, and we would like to speak to anyone who has not yet been spoken to as part of our investigations."

