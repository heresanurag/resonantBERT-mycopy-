title: 'La Fleche Wallonne: Stephen Williams wins spring classic - BBC Sport'
date: '2024-04-17'
section: Cycling
url: http://www.bbc.co.uk/sport/cycling/68836440
content: |-
  Welshman Stephen Williams pulls off the biggest win of his career on the Mur de Huy as fellow Briton Tom Pidcock fails to finish.

  Stephen Williams celebrated after winning on the imposing Mur de Huy climb

  Welshman Stephen Williams pulled off the biggest victory of his career by winning La Fleche Wallonne in Belgium. The Israel-Premier Tech rider, 27, is the first British male winner of the 88-year-old spring classic. But fellow Briton Tom Pidcock was among several riders to abandon the race amid torrential conditions in Ardennes. "I'm so happy. I've watched this race so many times on television and dreamed of coming with good legs to try to win it. I'm on cloud nine," Williams said. "I saw the '300m to go' line and I thought if I could put five seconds into the group and get near the line, then I could hold on." Williams came into the race on the back of victory in the Tour Down Under and a series of strong displays at the Volta a Catalunya but few predicted this surprise win. He thrived in the rain-soaked conditions which saw several leading contenders abandon, such as Pidcock, Mattias Skjelmose and Tiesj Benoot, and only 44 riders finish.

  Danish rider Soren Krach Andersen opened up an initial two-minute gap on the vastly reduced peloton. The 124-mile (199km) course from Charleroi to Huy finished with a fourth ascent of the Mur de Huy climb, on which Williams held off Frenchman Kevin Vauquelin and Belgian Maxim van Gils. Williams added: "I do enjoy racing this kind of weather and to come away with a victory - I'm just over the moon. "The boys backed me all day and gave me the best chance to get a result. To come away with the win here is really special."

  Polish rider Katarzyna Niewiadoma claimed the 19th win of her career but the first of the season by powering to victory in the women's race. Niewiadoma, second in the Tour of Flanders, followed a late attack by Elisa Longo Borghini on Mur de Huy to break clear of Demi Vollering who mounted a late response to finish second.

