title: Ant and Dec embrace on full TV return - BBC News
date: '2019-04-05'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47825103
content: |-
  It's McPartlin's first full show since stepping down from work last year after a drink-driving conviction.

  Ant McPartlin has made an emotional return to TV in the new series of Britain's Got Talent.

  Saturday's episode was his first full show since stepping down from on-screen commitments last year following a drink-driving conviction.

  In the ITV variety show, a teary McPartlin was hugged by his co-presenter Declan Donnelly during a musical performance by schoolchildren.

  The episode was watched live by an estimated 8.07 million viewers.

  That means it is the most-watched show of 2019 so far, according to overnight figures, overtaking the opening episode of the BBC's Line of Duty, which was seen by 7.8 million viewers last week.

  Saturday's Britain's Got Talent was McPartlin's first time back on presenting duties, around eight months after taking time out from showbiz to seek help for addiction.

  The pair did actually appear together again on our screens earlier this year during the National Television Awards, where they gave a winners speech via video, during live BGT auditions at a packed London Palladium.

  Paying tribute to his friend and co-presenter, McPartlin said at the time: "I really don't feel like I can accept this award this year - the one reason we've won the award this year is because of this guy.

  "His hard work, dedication, wit, funniness and being the best mate there is out there, I love you man - thank you."

