id: bbc_2022_4578
title: Ukrainians injured or killed by unexploded ammunition - BBC News
date: '2022-04-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-61181978
content: |-
  Across Ukraine’s Kyiv region, efforts have begun to clear the countless pieces of unexploded ammunition left behind after fierce fighting. The main hospital there says it’s receiving increasing numbers of patients who’ve touched or stepped on mines and shells. The State Emergency Service, police and army all have expert teams working on the ground to make the area safe.
