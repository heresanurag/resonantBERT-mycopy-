content: |-
  Meet Logan Hannah, the 16-year-old girl who has made F4 motor racing history.

  Meet Logan Hannah, the 16-year-old girl from East Kilbride who has made F4 motor racing history.

  Logan is the first female to ever compete at the F4UAE championship.

  She aims to make it to F1 or IndyCar and be a role model for girls....and pass her driving test.

  If you want to find out how to get into motorsport, go to the BBC Get Inspired guide
