title: 'Gareth Southgate: Prince William pays tribute to England manager - BBC News'
date: '2024-07-16'
section: UK
url: http://www.bbc.co.uk/news/articles/cx0249wk4plo
content: |-
  The Prince of Wales said he was thanking the former England manager "not as the president of the FA, but as an England fan".

  Prince William has paid tribute to "all-round class act" Gareth Southgate after he resigned as England manager. The Prince of Wales said he was thanking Southgate "not as the president of the FA, but as an England fan". In a statement on X, Prince William said Southgate had shown "humility, compassion and true leadership under the most intense pressure and scrutiny" during his time leading the England men's football team. Prime Minister Sir Keir Starmer said the outgoing England boss had "shouldered the dreams of the country with dignity and honour".

  "He and his teams have given us so much. No-one will forget the run to the World Cup semi-final in 2018 or making our first two finals of the Euros," Sir Keir said. "The wins over Germany and Denmark at Wembley in 2021 were utterly joyous, coming just as crowds were allowed back in after the dark days of Covid." Southgate announced his resignation after England lost against Spain in the Euro 2024 final on Sunday. The Prince of Wales attended the Euro 2024 final in Berlin on Sunday, where he was joined by Prime Minister Keir Starmer. On Sunday night, the Prince wrote on X: “This time it just wasn’t meant to be. We’re all still so proud of you.”

  Prince William shook hands with England captain Harry Kane after the Euro 2024 final on Sunday

  In a letter in the wake of Sunday night's defeat, the King told Southgate and his team to "hold your heads high". The Three Lions lost 2-1 to Spain in Berlin. It was their second consecutive Euros final defeat, after the team was beaten by Italy on penalties at Wembley three years ago. Southgate has spent eight years as England manager. His contract was set to expire later this year. The 53 year old said: "As a proud Englishman, it has been the honour of my life to play for England and to manage England." The process to appoint Southgate's successor has begun, according to Football Association chief executive Mark Bullingham.
