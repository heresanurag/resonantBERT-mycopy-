title: 'Euro 2024: John McGinn''s schuhplattler lights up Scotland arrival - BBC Sport'
date: '2024-06-10'
section: European Championship
url: http://www.bbc.co.uk/sport/football/articles/crggkxly03zo
content: |-
  Midfielder John McGinn endears himself to the locals by joining in with some traditional Bavarian dancing as Scotland arrive in Germany.

  Scotland have well and truly arrived with a spring in their step at their training base at Garmisch-Partenkirchen ahead of the Euro 2024 finals.

  Steve Clarke's squad having been handed a civic reception, midfielder John McGinn endeared himself to the locals by joining in with some traditional Bavarian dancing.
