title: 'World Cup 2018: Kylian Mbappe emerges on world stage as Lionel Messi departs
  - BBC Sport'
date: '2018-07-01'
section: General
url: http://www.bbc.co.uk/sport/football/44669325
content: |-
  As Lionel Messi departs the World Cup - possibly for the last time - Kylian Mbappe announces himself on the world's biggest stage.

  A seven-goal classic, the rise of Mbappe, more woe for Messi and the end of an era for Argentina? The 2018 World Cup quarter-final tie between France and Argentina had just about everything and you can watch all the action again on the BBC Sport website, Red Button and BBC iPlayer on Saturday from 15:30 GMT.

  This story was first published after the game on 30 June 2018.

  When Lionel Messi and Kylian Mbappe embraced at the end of a breathless World Cup classic, it was a striking moment that seemed to confirm the passing of greatness from one player to the next.

  Everyone present at the electrified Kazan Arena on Saturday left the stadium knowing they had witnessed a special match, a knockout game for the ages.

  And one player in particular set the spine tingling.

  Mbappe, despite being only 19 years old at this World Cup, scored two goals and ran with blistering pace from his own half to win a penalty for the opener in France's 4-3 victory over Argentina, a win that moves Didier Deschamps' talented side into the quarter-finals.
