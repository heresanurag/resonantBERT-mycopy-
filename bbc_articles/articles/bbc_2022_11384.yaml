content: |-
  Her coffin travels from Buckingham Palace to Westminster Hall, where the public can pay their respects.

  The Queen's coffin will travel from Buckingham Palace to Westminster Hall on Wednesday to lie in state for four days, so the public can pay their final respects.

  This video shows the route it will take.

  On Monday, the coffin will be moved to nearby Westminster Abbey for the state funeral.
