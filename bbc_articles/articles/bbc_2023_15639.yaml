title: 'Lewiston Maine shooting: ''Armed and dangerous'' suspect still at large as
  18 killed in shooting - BBC News'
date: '2023-10-26'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-67225016
content: |-
  The shootings in Lewiston, a small city in the north-east US, happened in a restaurant and bowling alley.

  Eight of the 18 killed during Wednesday night's mass shooting have been identified, but their names have not been released.

  Among them are Bob Violette, a 76-year-old retiree and avid bowler, and bar manager Joseph Walker.

  Family members have begun speaking out, sharing details of their tragic loss.

  Violette was identified by his daughter-in-law Cassandra. She told the Lewiston Sun Journal that he died protecting a group of children that he was with at the bowling alley.

  He leaves behind three sons and six grandchildren, she said. His wife, Lucy, was injured in the attack.

  Cassandra described Violette as a life-long Lewiston resident who had deep ties to the community, and who made people around him feel cared for.

  "He wouldn't let you walk out the door without giving him a hug, and a kiss on the cheek. He was just there for everything," she said.

  Walker's death was confirmed by his father, Leroy Walker, who is a city councillor in Auburn.

  Walker worked at Schemengees Bar and Grill, one of the locations where the gunman opened fire. He was killed after attempting to go after the gunman, Leroy told ABC News.

  In a separate interview with NBC News, Leroy said he received notification of his son's death 14 hours after the shooting.

  "None of us slept, we were up all night," he said. "We didn't know where to go, who to run to."

