title: 'Newspaper headlines: Water bosses a ''disgrace'' and Easter honours ''row''
  - BBC News'
date: '2024-03-28'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68690923
content: |-
  Thames Water's financial woes, a surprises set of honours and hunger in Gaza are on Friday's front pages.

  Thames Water customers could see their bills rise by 40% by 2030, the company's bosses have warned, because of its high levels of debt. The i reports the firm's financial woes have raised the prospect of the government taking it into public ownership at a cost to the taxpayer in the billions.

  Thames Water investors have refused to put in an extra £500m to fund investment, leaving it in desperate need of extra cash, the Times reports. The company is Britain's largest water provider and services 15 million homes. Its executives have been criticised by figures from across the political spectrum.

  The front page of the Daily Express quotes Communities Secretary Michael Gove, who branded Thames Water's leadership a "disgrace". He also said the company's leaders must "carry the can" for the dire financial straits it is in rather than seeking a public bailout.

  The Daily Telegraph's front page reports on Rishi Sunak's unusual decision to issue an Easter honours list, which includes major Conservative Party donor Mohamed Mansour, four Tory MPs and film director Christopher Nolan. The paper says the unexpected move has added to speculation Downing Street could be considering a summer general election.

  Angela Rayner is "on the ropes", according to Daily Mail, which dedicates its front page to questions around the Labour Party deputy leader's tax affairs. Police are set to reassess the claims, having previously decided no investigation was necessary. Ms Rayner denies underpaying tax on a property she sold before becoming an MP.

  A government report is set to recommend "tough new rules" to improve security at entertainment venues, according to the Daily Mirror. It says the regulations have been inspired by the mother of Manchester Arena bombing victim Martyn Hett.

  The Sun's front page is dominated by the death of Gogglebox star George Gilbey, who has died after falling from a height at work. The 40-year-old electrician died at the scene. Essex Police said it had arrested a man in his 40s on suspicion of gross negligence manslaughter.

  Famine in Gaza is "setting in", the Guardian reports. It quotes from a new United Nations report which warns levels of hunger and starvation are rising in the Strip. It adds to international pressure on Israel to ensure enough aid is able to reach people in Gaza.

  Big business takeovers are back with a bang, according to the Financial Times. It reports on new London Stock Exchange data showing 11 deals worth a collective £170bn were completed in the first quarter of 2024, following a period in which there was an "exceptionally low level" of high profile mergers and acquisitions.

  And finally, bad news for anyone who was still holding out hope for good weather this Bank Holiday weekend. A weather system dubbed Storm Nelson by Spanish forecasters is set to bring some distinctly wintry weather to the UK, the Daily Star reports.

  The Daily Telegraph says Rishi Sunak's decision to announce honours outside the usual New Year's or King's Birthday lists will fuel speculation about a possible summer election.

  The paper says the move will be seen as an attempt to shore up support, before a possible vote in June or July - though it points out that Downing Street sources insist going to the ballot box in the autumn remains the aim.

  Cyber-security experts tell the Times they have serious concerns about a multi-million pound deal for a Chinese company to supply a supercomputer to a government research agency. The Science and Technologies Facilities Council will, the paper says, install a £30m machine at its site in Hartree in Cheshire.

  The paper notes that just days ago the Deputy Prime Minister Oliver Dowden said Beijing had been behind a malicious attack on the Electoral Commission. A government spokesman tells the paper that the super-computer was procured following a robust process.

  An unexpected honours list has triggered some general election speculation, the Telegraph reports

  The Guardian leads on the order made by the International Court of Justice, for Israel to allow unimpeded delivery of food aid into Gaza. The paper describes the ruling as a "significant" legal rebuke to Israel's claim that it is not blocking aid - but it notes that Israel has said it needs to inspect every shipment to make none of the contents can benefit Hamas.

  "Rayner on the Ropes" is the Daily Mail's headline. The paper says Labour is under pressure to "set out the truth" about what tax advice Angela Rayner received about the sale of her council house a decade ago. She denies underpaying tax on a property she sold before becoming an MP.

  Also focusing on Ms Rayner, the Times says she is under "renewed pressure" after Stockport Council said it would review suggestions she had committed electoral or tax fraud. The Times explains that a Conservative Party deputy chair James Daly wrote to Stockport Council asking it to investigate whether Ms Rayner had been misleading about her living arrangements. The council has told the paper it's "reviewing the questions put to us". Ms Rayner has insisted she has done nothing wrong.

  The Daily Mirror says a government report will call for venues to be made safer against possible terror attacks following a campaign by the mother of one of the victims of the Manchester Arena bombing. The Home Office document is expected to propose that venue staff have counter-terror training, and that bosses carry out stringent risk analysis. Figen Murray - whose son Martyn Hett died in the attack in 2017 - tells the Mirror the move is a victory for her son's legacy.

