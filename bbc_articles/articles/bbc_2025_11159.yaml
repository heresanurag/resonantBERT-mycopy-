content: |-
  French President Emmanuel Macron condemned the violence and says those responsible will be punished.

  Two dead and hundreds arrested in France after PSG Champions League win

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Two people have died and hundreds have been arrested across France after Paris Saint-Germain (PSG) fans celebrated the club's victory in the Champions League final, according to the French interior ministry. In the south-west town of Dax, a 17-year-old boy died after being stabbed in the chest late on Saturday evening, local media reported. A 23-year-old man who was riding a scooter in central Paris was also killed after being hit by a vehicle, the prosecutor's office said. Flares and fireworks were set off, bus shelters smashed and cars torched amid wild celebrations as PSG won the biggest prize in European club football for the first time in their history.

  PSG condemned the violence in a statement, adding that these "isolated acts are contrary to the club's values and in no way represent the vast majority of our supporters". French President Emmanuel Macron said the clashes were "unacceptable" and unjustifiable, and that those involved will be found and punished. The club's victory parade in central Paris went ahead on Sunday afternoon despite the clashes, but with an increased police and military presence on the ground. Police set a cap of 100,000 fans for the event, which saw PSG make their way down the Champs-Élysées to the Arc de Triomphe on an open-top bus. A second commemoration is currently taking place at the club's home stadium, Parc des Princes, with thousands of fans invited to celebrate their win.

  Thousands of fans joined the club's victory parade on Sunday, which saw a much calmer atmosphere

  France's interior ministry said 192 people were injured in the clashes in the early hours of Sunday and 559 people arrested, including 491 in Paris. Twenty-two police officers and seven firefighters were injured, the ministry said, adding that 264 vehicles were set on fire. One of the officers was injured by a firework amidst the chaos and had to be put in an induced coma - with Macron later saying the officer had travelled to a different city to help with policing efforts. Paris police prefect Laurent Nuñez said: "The toll is lower than what we have seen in the past, but we will never get used to this kind of abuse, with people who only came to commit acts of vandalism and who did not even watch the match, and we will always have a very firm response." Nuñez said police expect there to be further clashes on Sunday, but added that supporters "shouldn't be mixed up with gangs of looters and vandals". Separately, the Paris Prosecutor's Office told the BBC "several shops were looted" in the Place des Ternes area. About 30 people were arrested and taken into custody near a Foot Locker on the Champs-Élysées that was robbed, the office said. Elsewhere across France, Dax mayor Julien Dubois, reacting to the fatal stabbing, said his "thoughts are with the young victim, his family and friends". "We are floored by all the drama tonight," he wrote on social media. "It is advisable to quickly shed light on these facts in order to severely punish the perpetrator."

  Cars were burned amid the disorder after PSG won the largest-ever victory in a Champions League final

  While clashes broke out near the city's Champs-Élysées avenue and PSG's Parc des Princes stadium, the majority of fans celebrated PSG's 5-0 win over Inter Milan peacefully, with many singing and dancing in the streets or blaring their car horns. The Eiffel Tower was illuminated with PSG's blue and red colours. Macron, a keen supporter of rivals Olympique de Marseille, posted on X: "A glorious day for PSG! Bravo, we are all proud. Paris, the capital of Europe this evening." The president hosted a ceremony for PSG at the Élysée Palace after Sunday's parade and congratulated coach Luis Enrique and his team on their victory.

  Approximately 5,400 police were deployed across Paris in anticipation of the raucous celebrations. At least 300 people detained were suspected of possessing fireworks and causing disorder, Paris police said. "Troublemakers on the Champs-Elysees were looking to create incidents and repeatedly came into contact with police by throwing large fireworks and other objects," police said in a statement.

  Riot police reportedly used a water cannon to stop a crowd reaching the Arc de Triomphe, and fired tear gas into the crowds. Other clashes between police and crowds occurred on the Paris ring road. At least two cars were torched near the Parc des Princes. French Interior Minister Bruno Retailleau took a hard line against the disorder, writing on social media: "True PSG supporters are enjoying their team's magnificent match. "Meanwhile, barbarians have taken to the streets of Paris to commit crimes and provoke the police. "It's unbearable that it's unthinkable to party without fearing the savagery of a minority of thugs who respect nothing."

  Meanwhile, outside Paris, police said a car ploughed into PSG fans in Grenoble in south-east France, leaving four people injured. All those hurt were from the same family, police said. Two were seriously injured. The driver handed himself into the police and was placed under arrest. A source close to the investigation told the AFP news agency it was believed the driver had not acted intentionally.
