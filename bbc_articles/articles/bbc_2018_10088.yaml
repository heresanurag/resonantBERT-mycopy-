title: 'Sid James'' final interview: Carry On star''s recording found after 42 years
  - BBC News'
date: '2018-08-09'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-45060752
content: |-
  The recording - made days before James died on stage - had been in the loft of a BBC radio presenter.

  An interview with Carry On legend Sid James has been recovered after 42 years sitting in a loft. Recorded days before the performer died on stage during a UK theatre tour, it is the last-known recording of the comedy star.
