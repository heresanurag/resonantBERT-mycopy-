  • None 'I'm alive thanks to US foreign aid' Some federal employees have described their shock at the buy-out proposal, which was delivered in the form of a late-night email with the subject line "Fork in the Road". Some thought the email was spam. "The tone of the initial email was like 'you may be cut anyway,'" Monet Hepp, a medical support specialist at the US Department of Veterans Affairs, previously told BBC. "People were blindsided by it." Democrats have questioned the legality of the resignation package and warned it would lead to a "brain drain" that would be "felt by every American". "Without the expertise and institutional knowledge that so many federal employees bring to their work, our government will be incapable of responding effectively to national emergencies, serving the American public, or even carrying out routine operations," Democrats on the House Oversight Committee wrote in a letter to President Trump. On Tuesday, the Central Intelligence Agency became the first national security department to extend the offer to its staff. Former US intelligence officials and several lawmakers have raised concerns that this offer could undermine US national security. There are also reports of impending cuts to the National Oceanic and Atmospheric Administration (NOAA), the weather-forecasting agency, and the Department of Health and Human Services.
