  Gormley, who led Trillick to the 2023 Tyrone title, suffered a stroke in July while training in the gym with his son James during a family holiday in Florida. While he says it felt like he made a swift and full recovery, he was back in hospital in September and was diagnosed with stage four liver cancer. Earlier this week, Gormley had a gathering in a Belfast pub where he said he was touched by the love and respect he felt from his family and friends. He also said he feels "fortunate" to have the opportunity to say goodbye to those closest to him. "I think it's important, for me anyway, to show that even if you're facing the ultimate challenge that you can be resilient," added Gormley. "It's important for my family to show strength of character and the people around me. It's an opportunity for me to show that yeah just because you have a terminal illness doesn't mean your life is over. I intend to go out with a bang, I'm not going to lie down in the corner. "People need different role models and I suppose in my role in my life as a teacher and a coach, I've had that role. This an opportunity to show that you can keep on going and if somebody finds something of use in it it's worthwhile."

  Gormley shared his story with The GAA Social's Oisin McConville and Thomas Niblock

  Gormley had a long and successful inter-county career and was a steady presence in the Tyrone midfield during their run to the 1995 All-Ireland final, which they lost to Dublin. In that decider, Gormley was the only Tyrone player other than Peter Canavan to score. He has also had playing or coaching spells with Down, London, Antrim and Bredagh and believes that a life-long dedication to sport has given him the strength and resilience he's needed recently. "It's probably tougher on the family than me," he said. "I'd say I'm fairly hard-nosed about stuff. When you're involved in sport, I think you do develop that resilience over years of training and the different setbacks you meet in sport."

  Gormley added that he would like to be remembered as a "decent person who helped people out as much as I could". "[Who] tried to find areas to help people improve, to improve their life and give them a wee nudge in the right direction," he continued. If you've been affected by any of the issues in this story, BBC Action Line has links to organisations that can offer help and advice.
