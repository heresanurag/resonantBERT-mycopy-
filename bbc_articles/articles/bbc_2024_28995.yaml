title: Wales weather warnings as Storm Bert brings rain and strong winds - BBC News
date: '2024-11-24'
section: Wales
url: http://www.bbc.co.uk/news/articles/c3wqy0pd5lvo
content: |-
  Ten people were rescued after a landslide near Llangollen, Denbighshire, on Saturday afternoon.

  A fallen tree on the way into Bala, Gwynedd

  Storm Bert has caused disruption across Wales, with weather warnings for high winds and heavy rain on Saturday and Sunday. The Met Office said wind gusts of 82mph (130km/hr) were recorded at Capel Curig in Conwy county, with gusts of up to 60mph (96km/hr) expected inland and up to 70mph (113km/hr) in coastal areas. In Llanarmon Dyffryn Ceiriog, in Wrexham, five adults and five children were rescued from a house after a landslide at about 14:00 GMT. The National Grid, external said thousands of properties were left without power in south and west Wales.

  People across the country have been advised to prepare for potential flooding, compounded by melting snow, with up to 150mm (6in) of rain possible.

  Natural Resources Wales has issued a number of flood warnings, external and flood alerts. Near the site of the landslide Jonathan Greatorex, the landlord of The Hand at Llanarmon pub, said the emergency services had left. "The community has been amazing and rallied round to support the family at what must be a deeply difficult time," he said. Met Office chief meteorologist Jason Kelly said: "Storm Bert is what we call a multi-hazard event, bringing snow, rain and wind to the UK for the majority of the weekend.

