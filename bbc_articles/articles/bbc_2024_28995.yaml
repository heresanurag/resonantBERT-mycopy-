  "It's expected to develop during Saturday morning across the southwest, becoming particularly heavy and persistent overnight and into Sunday." He said 50-75mm (2-2.9in) of "particularly heavy and persistent rain is expected to fall fairly widely and the rapid melting of lying snow over the weekend may bring flooding for some".

  The swollen river at Beddgelert in Gwynedd on Saturday

  A yellow weather warning for rain, external is in force across Wales until 06:00 on Sunday. There is also a yellow weather warning for strong winds, external in place until 21:00 on Sunday for Anglesey, Bridgend, Cardiff, Carmarthenshire, Ceredigion, Conwy, Gwynedd, Neath Port Talbot, Pembrokeshire, Powys, Rhondda Cynon Taf, Swansea and Vale of Glamorgan.

  Some rail services have already been disrupted. The Conwy Valley and Heart of Wales lines - which run from Llandudno to Blaenau Ffestiniog and Swansea to Shropshire, via Carmarthenshire and Powys, respectively - will be closed on Saturday and Sunday because of the storm's expected impact. Replacement road transport will be in place for the duration. On the roads, the M48 Severn Bridge was closed in both directions due to strong winds. National Highways advised motorists to use the M4 Prince of Wales Bridge. And speed restrictions were introduced on the A55 Britannia Bridge between Anglesey and the mainland. Irish Ferries' Saturday crossings between Pembroke Dock and Rosslare, and Stena Line's services between Fishguard and Rosslare, were cancelled.
