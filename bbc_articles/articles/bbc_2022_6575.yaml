  Following the phone call between Mr Niinistö and Mr Putin on Saturday, the Kremlin said the Russian leader had stressed the "end of the traditional policy of military neutrality would be a mistake since there is no threat to Finland's security".

  It added: "Such a change in the country's political orientation can have a negative impact on Russian-Finnish relations developed over years in a spirit of good neighbourliness and co-operation between partners."

  Mr Niinistö said he had told Mr Putin how recent moves by Russia, along with the invasion of Ukraine, "have altered the security environment of Finland".

  "The conversation was direct and straight-forward and it was conducted without aggravations. Avoiding tensions was considered important," he said.

  A possible stumbling block to Swedish and Finnish membership of Nato is Turkey, after President Recep Tayyip Erdogan accused both countries of harbouring "terrorist organisations" and said he did not support their applications.

  It was seen as a reference to the Kurdistan Workers' Party (PKK), which Turkey regards as a terrorist organisation. For decades the PKK has fought with Turkey for a Kurdish homeland.

  Turkey also objects to a Syrian Kurdish militia called the People's Protection Units (YPG) ,which they say is an extension of the PKK - even though they have been allied with the US in the fight against so-called Islamic State.

  Both Sweden and Finland have Kurdish communities, and in Sweden's case some parliamentarians have Kurdish origins. President Erdogan did not provide any proof that these communities had links with the PKK.

  Foreign ministers from Sweden, Turkey and Finland are meeting to try to iron out their differences.

  Ahead of the talks, Turkish Foreign Minister Mevlut Cavusoglu echoed the comments of his president but signalled a willingness to talk.

  "A big majority of the Turkish people are against the membership of those countries who are supporting PKK terrorist organization ... but these are the issues that we need to talk of course with our NATO allies as well as these countries," AFP quoted him as saying.

  Nato, a Western military alliance, was founded in part to ward off threat from the Soviet Union in 1949.

  President Putin has mentioned Ukraine's intention to join the alliance as one of the reasons for the invasion of its neighbour.
