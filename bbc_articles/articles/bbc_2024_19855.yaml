  Who was 'unbelievable again'? Troy Deeney's team of the week

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  This video can not be played To play this video you need to enable JavaScript in your browser. Troy Deeney chooses his team of the week on MOTD2

  David Raya (Arsenal): He made some unbelievable saves. The rebound save from Ollie Watkins, after Aston Villa hit the bar, changed the game in Arsenal's favour.

  Cristian Romero (Tottenham): Romero got the goal from the corner but he was also a force. He dealt with Everton's aerial threat every time. Max Kilman (West Ham): He was a monster for West Ham. They were under a lot of pressure. He was like a young Rio [Ferdinand] the way he stepped out and played the ball that sent Jarrod Bowen away to score. Micky van de Ven (Tottenham): He got an assist. Great play and dealt with everything Everton threw at Tottenham, and then that surging run [for Son Heung-min's second goal] showed his quality.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Noni Madueke (Chelsea): Everything he did was positive moving forward, and obviously the hat-trick always helps, but he could have had five or six on another day. Kevin de Bruyne (Manchester City): There are not enough words. He is just the best player. He is the best midfielder in his position and he was unbelievable again, he got Manchester City going against Ipswich. It looks like he is enjoying himself as well, with a lot of talk of him moving. Emile Smith Rowe (Fulham): I really enjoyed the way he played. It looks like he played with a freedom and it looks like he is growing into the game as Fulham's main man, which he obviously wanted to be at Arsenal. He scored a really good goal but created problems all day. Son Heung-min (Tottenham): Best player on the pitch by a mile. He started through the middle and moved out to the left, got a couple of goals. He was a constant threat and looks to be enjoying the challenge of being that main man and replacing all the goals from Harry Kane.

  Cole Palmer (Chelsea): What more do you need to say about him? Probably the best number 10 at the moment. He is so calm, so cool. In all the madness going on at Chelsea, they all just look at him and give him the ball. He just demands their respect. Erling Haaland (Manchester City): He plays again and scores three again. I think it is something like every nine-and-a-half games he gets a hat-trick. Just a monster of a man. He enjoys finishing and enjoys scoring goals. Joao Pedro (Brighton): Former Watford guy, he scored a lot of goals there and I thought he played well. His goal capped a really good game, but he linked the play well, doing a lot of things behind the ball that a lot of people would not see.

  Fabian Hurzeler (Brighton): Youngest manager in the Premier League and beating Manchester United on your home debut, it doesn't get much better than that.

