title: 'Cost of living: Family leaves London to avoid April increases - BBC News'
date: '2025-04-01'
section: General
url: http://www.bbc.co.uk/news/videos/cly5wylz7k4o
content: |-
  Tolu and Isaac Frimpong are leaving London to avoid an extra £1,000 in monthly expenses.

  Tolu and Isaac Frimpong are relocating their family from London to Kent to avoid an extra £1,000 in monthly expenses set to hit in April.

  Their council tax, water bills and mortgage were due to rise on top of an already "squeezed budget".

  The Frimpongs, who were both born and grew up in London, have raised their four sons in the city but made the bittersweet decision to move from Croydon.

