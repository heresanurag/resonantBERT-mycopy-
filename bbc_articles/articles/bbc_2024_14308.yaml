title: Trump fans lien up in blazing Arizona heat to attend event - BBC News
date: '2024-06-07'
section: General
url: http://www.bbc.co.uk/news/videos/clkk4x3m3z0o
content: |-
  Multiple people were taken to hospital for heat-related illness, as Phoenix saw its hottest day in 2024.

  Hundreds of attendees braved temperatures as high as 114F (45.5C) to see Donald Trump at a town hall on Thursday. The event in Phoenix, Arizona is the ex-president's first campaign appearance since his conviction in the hush-money trial in New York.

  Local media report that multiple people at the event were taken to hospital for heat-related illness.

  Thursday was the hottest day in Phoenix, so far this year.
