title: Asylum seeker at targeted Holiday Inn 'thought he would die' - BBC News
date: '2024-08-06'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/c9844p32r36o
content: |-
  He says asylum seekers "ran upstairs," as violent disorder took place outside the Holiday Inn Express.

  Asylum seeker at hotel 'thought he would die'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  An asylum seeker at a hotel, which was targeted during violent disorder in which petrol bombs and fireworks were thrown at officers, says he thought he was going to die. The rioting broke out on Sunday night, after a crowd gathered at a Holiday Inn Express in Tamworth, Staffordshire, with police describing the attacks as "senseless violence". The Kurdish 17-year-old said "asylum seekers all ran upstairs; it was good that police were here with us". He stated there were more than 100 asylum seekers in the hotel who were taken to alternative accommodation in three buses in the early hours.

  The teenager had been separated from his family by smugglers and arrived in the UK a month ago. He spoke to the BBC on the phone, in a call arranged through a volunteer at a local charity. Drone footage has emerged that was filmed by a local resident and given exclusively to the BBC. The scenes followed other clashes in UK towns and cities in the wake of the fatal stabbing of three children in Southport a week ago. Riots have been fuelled in part by false claims the suspect was Muslim and a refugee. Tamworth's Holiday Inn Express had been used "for years" to accommodate asylum seekers, the local MP said in July. IHG, the owner of the Holiday Inn brand, said its priority was "the safety and security of our guests and colleagues".

  Police said footage from CCTV, air support and body-worn video devices would be used

  The teenager said: "I was terrified. I escaped death myself from my home country and found refuge. And now here, I thought I was going to die last night." Asked what he would say to people concerned about public money being spent on asylum seekers, the 17-year-old said: "I was forced to escape, I want to have a peaceful life. "I am not after money; I just want to live, just live." Talking about police, he stated: "Until the day I die I won’t forget their help. The police helped us a lot."

  The Monday morning aftermath of the petrol bomb attacks

  Staffordshire Police said six of their officers were assaulted during violence in Tamworth and Stoke-on-Trent at the weekend. Ten people had been arrested, and two charged, said the force, and "more will come". Police have set up a portal for people with pictures, video and other evidence to get in touch. Assistant Chief Constable Stuart Ellison said: “Police forces across the country all have the same message for the individuals involved in these incidents: you are being pursued and we are working around the clock to find you."
