id: bbc_2021_10497
title: 'Ben Wallace: ''Every hour counts'' of Kabul evacuation - BBC News'
date: '2021-08-19'
section: General
url: http://www.bbc.co.uk/news/uk-politics-58267754
content: |-
  The UK defence secretary spoke to BBC Breakfast about the evacuation of people from Kabul airport.

  The UK defence secretary rejected reports that some flights from Kabul contained only a few people. He also said that the UK would continue to stay in Afghanistan as long as the US ran Kabul airport.
