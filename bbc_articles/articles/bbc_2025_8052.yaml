  Unite members have been on all-out strike since 11 March. The dispute centres on the council's decision to remove Waste Recycling and Collection Officer (WRCO) roles - a job that Unite said had brought safety and expertise to an "often dirty and dangerous job". The union said 170 affected workers faced an average pay cut of £8,000, and that it was also concerned the council was preparing to downgrade the pay of other non-management roles in the service. Birmingham City Council disputes Unite's figures and say reopening the waste roles would leave the local authority open to an equal pay liability.

