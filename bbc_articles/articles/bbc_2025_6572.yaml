title: Trump threatens Harvard's tax-exempt status after freezing $2bn funding - BBC
  News
date: '2025-04-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cz01y9gkdm3o
content: |-
  Universities, as well as many charities and religious groups, are exempted from paying federal income taxes.

  Protesters had called for the university to reject demands from the White House

  President Donald Trump has called for Harvard University to lose a valuable tax break, hours after his administration announced it is freezing more than $2bn (£1.5bn) in federal funds for the elite institution. The White House has demanded the oldest university in the US make changes to hiring, admissions and teaching practices which it says will help fight antisemitism on campus. Since returning to office, Trump has pushed to reshape top universities by threatening to withhold federal funds that are mostly designated for research. Harvard became the first major US university to reject his administration's demands on Monday, accusing the White House of trying to "control" its community.

  In a Tuesday morning post on social media, Trump threatened to go beyond withholding the federal funds and targeted Harvard tax-exempt status. Universities, as well as many charities and religious groups, are exempt from paying federal income taxes. This valuable tax break, though, can be removed if the groups become involved in political activities or move away from their stated purposes. "Perhaps Harvard should lose its Tax Exempt Status and be Taxed as a Political Entity if it keeps pushing political, ideological, and terrorist inspired/supporting "Sickness?" he wrote on Truth Social. "Remember, Tax Exempt Status is totally contingent on acting in the PUBLIC INTEREST!"

