  Losing the exemption could cost Harvard millions of dollars each year. The Ivy League institution also has a fund of assets, or endowment, valued at $53bn. Later on Tuesday, White House Press Secretary Karoline Leavitt said Trump wanted the university to apologise for what his administration says is continuing tolerance of antisemitism. "[Trump] wants to see Harvard apologise, and Harvard should apologise," Leavitt said.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: White House says Harvard should apologise to Jewish students

  The sweeping changes demanded by the White House would have transformed Harvard's operations and ceded a large amount of control to the government. Its letter to Harvard on Friday, obtained by the New York Times,, external said the university had failed to live up to the "intellectual and civil rights conditions" that justify federal investment. The letter included 10 categories for proposed changes, including:
  • None reporting students to the federal government who are "hostile" to American values
  • None hiring an external government-approved party to audit programmes and departments "that most fuel antisemitic harassment"

  President Trump has accused leading universities of failing to protect Jewish students when college campuses around the country saw protests against the war in Gaza and US support for Israel last year. The letter orders the university to take disciplinary action for "violations" during protests. In explaining its rejection of these demands, Harvard president Alan Garber said the university would not surrender its independence or relinquish its constitutional rights under the First Amendment protecting free speech. "Although some of the demands outlined by the government are aimed at combating antisemitism, the majority represent direct governmental regulation of the 'intellectual conditions' at Harvard," he said.
  • None Why has Trump revoked hundreds of international student visas? Shortly after his letter of resistance was sent, the education department said it was freezing $2.2bn in grants and $60m in contracts to Harvard immediately. "Harvard's statement today reinforces the troubling entitlement mindset that is endemic in our nation's most prestigious universities and colleges," the Department of Education said in a statement. The disruption of learning plaguing campuses is unacceptable and the harassment of Jewish students intolerable, the statement said.

  A professor of history at Harvard, David Armitage, told the BBC that the school could afford to resist as the richest university in the US and no price was too high to pay for freedom. "It's a not unexpected act of entirely groundless and vengeful activity by the Trump administration which wants nothing more than to silence freedom of speech," he said. In March, the Trump administration said it was reviewing roughly $256m in federal contracts and grants at Harvard, and an additional $8.7bn in multi-year grant commitments. Congresswoman Elise Stefanik, a Republican from New York, said on X: "It is time to totally cut off US taxpayer funding to this institution." Harvard professors filed a lawsuit in response, alleging the government was unlawfully attacking freedom of speech and academic freedom. Harvard is one of a number of elite universities in the crosshairs of the new presidency. Columbia University in New York City agreed to a number of demands last month after the White House pulled $400m in federal funding. But on Monday Columbia struck a less compliant tone, releasing its own letter that said it was continuing "good faith talks" with the government as it seeks to win back its funding, but also said it would "reject any agreement that would require us to relinquish our independence". Polling by Gallup last summer suggested, external that confidence in higher education has been falling over time among Americans of all political backgrounds, partly driven by a growing belief that universities push a political agenda. The decline was particularly steep among Republicans.

