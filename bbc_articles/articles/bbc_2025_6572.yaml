  Earlier on Monday, a lawyer for an organiser of pro-Palestinian protests at Columbia University said her client had been arrested by immigration officials as he attended an interview as part of his application for US citizenship. Mohsen Mahdawi, a green card holder who is due to graduate next month, was detained on Monday in Colchester, Vermont. Others who took part in campus protests against the war, including Columbia University's Mahmoud Khalil and Tufts University's Rumeysa Ozturk, have been detained in recent weeks.
