content: |-
  The defendants started appearing in groups before Cardiff Crown Court on Monday, charged with riot.

  Two admit to rioting as Ely accused appear in court

  The disorder in Ely took place on the evening of 22 May 2023 after Kyrees Sullivan, 16, and Harvey Evans, 15, died in a bike crash

  The first adults charged with rioting in relation to mass disorder in Cardiff in 2023 have entered a mixture of guilty and not guilty pleas. Two have pleaded guilty to riot – with one of these also pleading guilty to drugs offences. Sixteen have pleaded not guilty to rioting. The disorder in Ely began on the evening of 22 May 2023 when Kyrees Sullivan, 16, and Harvey Evans, 15, died in a bike crash. Twenty-seven people have been charged with riot in total, while four others have been charged with causing or threatening to cause criminal damage.

  The defendants started appearing in groups before Cardiff Crown Court on Monday. Kyle Telemaque, 19, from Ely, who was in the first group of five to appear, admitted the rioting charge as well as two separate charges related to supplying cannabis. Jumana Fouad, 18, from Ely - who was 16 at the time of the incident - also pleaded guilty. The court heard she was charged with the offence shortly after her 18th birthday. Callum O'Sullivan, 23, from Ely, appeared before the court but was not arraigned. McKenzie Danks, 21, from Caerau, denied rioting but pleaded guilty to the assault by beating of two police officers.

  In total 37 people have been charged with riot

  No trial date has been set, with another hearing taking place on 1 November. Fifteen police officers were injured in the disorder, which saw property damaged and cars torched. Crowds of about 100 to 150 people gathered at the scene of the boys' deaths shortly afterwards.
