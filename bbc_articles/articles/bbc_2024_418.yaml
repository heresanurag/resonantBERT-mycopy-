id: bbc_2024_418
title: Moment crowds disperse after bomb blast near Iran general's tomb - BBC News
date: '2024-01-03'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67876472
content: |-
  Two blasts have killed more than 100 people, near the tomb Iranian general Qasem Soleimani.

  This is the moment a huge crowd of people disperse from the site of deadly bomb blasts near the tomb of Iranian general Qasem Soleimani.

  Video shows smoke billowing in the background, as the crowd starts to panic and move away in the opposite direction.

  According to Iran's state media, at least 103 people have been killed by the two bomb explosions in the southern city of Kerman, on the fourth anniversary of his assassination by the US.
