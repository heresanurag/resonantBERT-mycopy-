title: John Lewis bonus lowest since 1950s as profits plunge - BBC News
date: '2019-03-07'
section: Business
url: http://www.bbc.co.uk/news/business-47480250
content: |-
  The retail partnership - which includes Waitrose supermarkets - says staff will receive a 3% bonus.

