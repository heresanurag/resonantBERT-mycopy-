title: 'UUP conference: Nesbitt confirmed as new party leader - BBC News'
date: '2024-09-28'
section: Northern Ireland Politics
url: http://www.bbc.co.uk/news/articles/cj4d57lyydlo
content: |-
  Mike Nesbitt is the first person to have held the leadership of the UUP twice.

  Mike Nesbitt has become the first person to have twice held the top job in the UUP

  Mike Nesbitt has been ratified as the new leader of the Ulster Unionist Party (UUP) during the party's annual conference on Saturday. He addressed members by livestream as he is recovering from Covid-19. It is Nesbitt's second time as leader - he served between 2012 and 2017, when he quit after disappointing assembly election results. He is now the first person to have twice held the top job in the UUP. This time he replaced Doug Beattie, who stood down as leader last month, citing "irreconcilable differences" with party officers. Nesbitt is also the party's health minister in the executive at Stormont, a job he will continue to do.

  The new Ulster Unionist leader Mike Nesbitt addressing the party conference at the Crowne Plaza in Belfast remotely due to having Covid

  On Saturday, party delegates met to ratify Nesbitt as leader, before he made his first major address on Saturday afternoon. When Beattie unexpectedly resigned as leader in August, Nesbitt was the only candidate to declare an interest when nominations for the leadership opened. He has previously said he wants to see the UUP continuing with "progressive and inclusive outreach".

