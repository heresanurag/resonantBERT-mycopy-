title: Bullish Trump jokes about hiding his bald spot - BBC News
date: '2018-02-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43163714
content: |-
  The hair joke was one of several off-script moments as the president relished addressing supporters.

  President Trump relished talking to supporters at the Conservative Political Action Conference, going off-script on several occasions, and even making a joke about his own hair.
