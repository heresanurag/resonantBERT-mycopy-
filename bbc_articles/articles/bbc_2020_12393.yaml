title: Taylor Swift master tapes sold by Scooter Braun to investment fund - BBC News
date: '2020-11-17'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-54969396
content: |-
  The singer confirms reports the rights to six of her albums have been sold to an investment firm.

  Swift (left) has been trying to get her master recording rights back from Braun (right) since he bought them last year

  US singer Taylor Swift has confirmed a report that music mogul Scooter Braun has sold the rights to her first six albums.

  US entertainment magazine Variety first reported on Monday that Braun had sold the recordings - known as masters - to an investment fund.

  It said the deal is thought to be worth more than $300m (£227m).

  Writing on Twitter, Swift said it was "the second time my music had been sold without my knowledge".

  It is the latest development in the dispute between Swift and Braun - Swift has previously accused Braun of trying to "dismantle" her musical legacy.

  There has been no initial response from Braun to the Variety report or Swift's remarks. The BBC has sent an email to Braun for comment.

  Swift signed a deal with record label Big Machine in 2004 granting it ownership of the master recordings to her first six albums in exchange for a cash advance to kick-start her career.

  In the music industry, ownership of masters means you control what can be done with the original recording of a song or album, from re-releases and box sets to making it available for use in an advert or on a streaming platform. Owners of popular songs can earn a huge amount of money.

  Braun bought Big Machine in June 2019, and with it the rights to most of Swift's work. Since then the pair have been locked in a major battle over control of the music.

  Swift, as the writer or co-writer of her music, still owns the publishing rights, which means she has power to veto some of Braun's attempts to exploit her recordings.

  Speaking to Billboard magazine last year, she said she had turned down "dozens of requests" for the use of Shake It Off every week since Braun had bought her back catalogue.

  In her latest statement, Swift said she had been "actively trying to regain ownership of my master recordings" in 2020 and had tried to enter talks with Braun.

  She said Braun's legal team wanted her to sign a non-disclosure agreement stating "I would never say another word about Scooter Braun unless it was positive".

