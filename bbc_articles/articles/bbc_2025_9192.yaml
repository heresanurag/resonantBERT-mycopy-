title: 'Goodison Park: How Everton fans are saying goodbye to the Grand Old Lady after
  133 years'
date: '2025-05-16'
section: General
url: http://www.bbc.co.uk/sport/extra/z9dcarbihm/goodbye-goodison
content: |-
  BBC Sport explores how generations of Everton fans are planning to bid farewell to Goodison Park after 133 years of history, emotion, and unforgettable memories.

  Everton fan Frank Keegan's connection with Goodison Park - home of the Toffees for 133 years - stretches back more than a century.

  His grandfather first started watching Everton play there after coming over from Ireland in the late 1800s. His father became a regular in the early 20th Century, and now Frank sits with his son Chris and five grandsons. Five generations of one family connected by a stadium built in the Victorian era.

  But now, with the men's team moving to their new ground on the city's waterfront at Bramley-Moore Dock, that connection will be severed for many. Although the stadium will remain, and from next season become the home of the club's women's team, new chapters in a story created over generations will be written two miles to the west.

  Nicknamed the 'Grand Old Lady', Goodison is steeped in history. It was the first purpose-built football stadium in England and has staged more top-flight games than any other. It has also hosted FA Cup finals and internationals, including a World Cup semi-final. In 1924 it even hosted an exhibition baseball match between the Chicago White Sox and the New York Giants.

  Its story is intertwined with Liverpool's growth as an industrial powerhouse during the Victorian Industrial Revolution, driven by the sprawling docks along the waterfront that at one stage saw 40% of the world's trade pass through it.

  But as the 20th Century wore on and Liverpool's status as an industrial force declined, so too did Goodison.

  "Goodison is now looking a bit worn and shabby, whereas I remember it being majestic," Frank told BBC Sport. "I'll be really sad, but I am excited about the new ground. I think the way football is, we've got to move on."
