  Mandatory jail for Nazi salutes under new Australia laws

  The new laws were passed after a series of high-profile antisemitic attacks in Australia

  Hate symbols and terror offences will be punishable with mandatory jail terms ranging from one to six years in Australia, after parliament passed a series of amendments to hate crime laws on Thursday. The new laws were passed following a wave of high-profile antisemitic attacks which have become a major topic of debate in the country. The amendments have been described by the government as the "toughest laws Australia has ever had against hate crimes". But critics say that the governing Labor Party is caving to opposition demands and going against its own policy of opposing mandatory jail sentences.

  Under the amendments, displaying hate symbols or performing a Nazi salute is now punishable with at least one year in prison. Other penalties include a minimum of three years for financing terrorism and six years for committing or planning terrorist acts. There have been several attacks on Jewish targets in Australia in recent months. Last week authorities in Sydney found a caravan containing explosives and an antisemitic note. The discovery came just a week after a childcare centre near a Jewish school and synagogue in Sydney was set on fire and antisemitic graffiti was seen on one of its walls. In December, a synagogue in Melbourne was set alight with worshippers inside. No-one was seriously hurt in the incident, which sent shockwaves through the country. Former Labor senator Kim Carr criticised the party for what he said was a "clear breach of the Labor party national platform". Labor opposes mandatory sentences on the grounds that such penalties do not reduce crime, undermine the courts' independence and are often discriminatory in practice. But opposition parties did not rush to welcome the new amendments either, accusing Labor of dragging its feet. "The parliament is not acting today because of the decisiveness of the Labor Party," Liberal senator James Paterson told reporters in Canberra. "The prime minister has been dragged kicking and screaming to finally introduce tough legislation that will ensure there are real penalties for this behaviour." Performing the Nazi salute and displaying Nazi symbols such as the swastika, have been banned since January 2024 and carry up to one year in jail. The amendments on Thursday make the jail term mandatory. "This is not about politics," Home Affairs minister Tony Burke said on Wednesday night as the amendments were introduced to parliament. "This is about whether the Australian Parliament believes it's acceptable to advocate, threaten or commit violence against another person because of who they are, who they pray to or who they love."
