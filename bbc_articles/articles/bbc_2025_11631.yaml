  Othniel Adoma, 11, was one of two children who died after a minibus overturned near Reading.

  Vigil for boy who died after M4 minibus crash

  Othniel Adoma, from Bracknell, died more than three weeks after the crash

  A vigil has taken place for an 11-year-old boy who was one of two children to die after a minibus overturned on a motorway slip road. Othniel Adoma, from Bracknell, Berkshire, died more than three weeks after the single vehicle crash. A white Ford Transit minibus overturned on the link road at junction 10 of the M4 to the A329(M) near Reading on 11 May. A six-year-old boy was also killed in the crash. The vigil took place at Birch Hill Recreation Ground in Bracknell on Friday evening, with candles lit and balloons released in Othniel's memory.

  The vigil took place at Birch Hill Recreation Ground in Bracknell

  Organisers described it as a "time to reflect, to cry, to laugh and to find comfort in one another - and in his family - as we remember the light Othniel brought to all of our lives".

  Mitch Noble, who helped organise the vigil and a fundraiser for the family which has raised more than £8,000, called Othniel a "super-friendly and nice lad". Mr Noble, who is also the coach of Crowthorne FC where Othniel was a player, described him as "quite a shy, timid lad, until he's got a football at his feet".

  Friends, family and members of the public signed a book of condolence

  Mr Noble added: "He would just spring to life... he was dazzling... he scored 42 goals out of 17 games this season and he was playing a year up. "He was a bit of a joker with his teammates and with his friends. Everyone loved him... he was so charismatic." One of Othniel's teammates said at the vigil: "There's a hole in the team. He brought us together and it was just a community, a family."

  Othniel was a "dazzling" footballer, his coach said

  Five other children injured in the crash have since been discharged from hospital. Thames Valley Police said its serious collision investigation unit was investigating the crash and confirmed no arrests had been made.

  Othniel's father was surrounded by family and friends

