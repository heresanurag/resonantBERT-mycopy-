title: Tesla sales plunge after Elon Musk backlash - BBC News
date: '2025-04-03'
section: Business
url: http://www.bbc.co.uk/news/articles/c4g4zp3z1p3o
content: |-
  The car maker's sales slide has been attributed to competition and controversy around its boss.

  Tesla sales have plummeted to their lowest level in three years after a backlash against its boss Elon Musk. The electric car maker delivered almost 337,000 electric vehicles in the first three months of 2025, a 13% drop from a year ago. Tesla shares tumbled in early trading on Wednesday after the release of the low sales numbers. The cars face increasing competition from Chinese firm BYD, but experts believe Musk's controversial role in the Trump administration has had an effect too.

  The firm has blamed the sales drop on the transition to a new version of its most popular car. However some analysts have pointed the finger at Musk himself. "These numbers suck," early Tesla investor Ross Gerber of Gerber Kawasaki Wealth and Investment Management wrote on X. "The brand is broken and may not be fixable", added Mr Gerber, who was once a Musk supporter but has recently called for the board to remove the billionaire as CEO.

