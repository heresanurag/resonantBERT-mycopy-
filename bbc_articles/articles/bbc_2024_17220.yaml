title: 'Paris 2024: Daniel Wiffen wins historic gold in 800m freestyle - BBC Sport'
date: '2024-07-30'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/c0dm3ywed91o
content: |-
  Daniel Wiffen has become the first athlete from Northern Ireland to win an Olympic gold medal in 36 years in the 800m freestyle in Paris.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Daniel Wiffen became the first athlete from Northern Ireland to win an Olympic gold medal in 36 years as he triumphed in a thrilling 800m freestyle final in Paris. The Team Ireland swimmer edged out American Bobby Finke to take gold by 0.56 seconds after a stunning burst of pace over the final 50 metres. The 23-year-old also set an Olympic record with his blistering finish, recording a time of seven minutes 38.19 seconds. The pockets of support for Wiffen erupted around the La Defense Arena as he secured a first gold medal of the Games for Ireland. "I was writing 'I'm going into the history books', and that's exactly what I've done," he told BBC Sport. "It was definitely the way I wanted to execute it. It wasn't the time that I wanted, but Olympic finals aren't about getting times, it's about getting your hand on the wall first." There were tears in Wiffen's eyes as he received his gold medal at the end of the arena where his family and coaches watched with pride. After stepping off the podium, he ran over and jumped into the arms of his family - including his twin, Nathan. He becomes the first athlete from Northern Ireland to triumph since Stephen Martin and Jimmy Kirkwood with GB's hockey team in 1988 - and the first individual gold medallist since Lady Mary Peters won the pentathlon at the 1972 Games. He also becomes the first Olympian from Northern Ireland to win Olympic gold for Ireland and the first Olympian from Team Ireland to win a gold medal in swimming since 1996. Wiffen has now added Olympic gold to his 800m and 1500m triumphs at the World Championships in Doha this year.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  On a day when the temperature in Paris hit 36C, Wiffen kept his cool in the biggest race of his life. After setting the fastest time in the heats on Monday, when he said he had one eye on an Olympic record, he duly delivered in spectacular fashion. The atmosphere was electric as the swimmers got ready to enter the pool, largely due to the support for France's David Aubrey, but Wiffen received the next loudest cheer. However, the whole crowd were on their feet after a stunning climax when it looked as though Wiffen had missed out on the chance to make history. Wiffen made a solid start and slotted into third place, before taking the lead at the midpoint of the race. However, he soon came under attack from Finke and Italy's Gregorio Paltrinieri which set up a thrilling climax to the race that had everyone in the arena gripped. Wiffen slipped to second with 50 metres remaining but dug deep and his finish was worthy of any Olympic medal as he passed Finke in the closing stages to touch the timing beam first. After stating he would not return home from Paris without a medal, Wiffen was in disbelief at the result and he put his hands on his head as he glanced up to the screen. The Irish support were scattered around the arena but were on their feet after the grandstand finish. Wiffen will attempt to win a historic double when he competes in the men’s 1500m heats on Saturday, with a potential final to come on Sunday.
