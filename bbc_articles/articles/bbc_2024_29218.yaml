title: 'Irish Election: Family live in mobile home after mortgage rejected - BBC News'
date: '2024-11-26'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0mz3zj1kevo
content: |-
  A father says his family's mortgage offer was withdrawn when his partner became pregnant.

  'We couldn’t get a mortgage so live in a mobile home'

  Eoin McGovern and his son outside their mobile home

  A man living in a mobile home with his young family says owning their own home in the Republic of Ireland “feels impossible”. Eoin McGovern from County Cavan had a mortgage application rejected when his wife became pregnant, so they moved into a mobile home on the grounds of his mother’s house. “I would just love for my kids to have their own bedroom. Being confined to a small space is very disheartening," he said. Housing is one of the most hotly contested issues in this week's Irish election.

  Eoin McGovern's mobile home is on the grounds of his mother's house

  The Ballyhaise native lives with his partner and two young children. He said: “We had an initial mortgage acceptance offer from our bank, but then when my partner received her first maternity payment into our account, everything changed and the mortgage was denied.” Mr McGovern added: “It was a very tough time, because we fell between the cracks. We couldn’t afford to rent and we’re above the threshold to qualify for social housing. “The idea for the mobile home was a temporary solution until we both could start working again when the kids were old enough for creche and we would be in a position to re-apply for a mortgage, but it hasn’t worked out that way.” The 31-year-old hotel worker was contacted by Cavan County Council and informed that without planning permission the mobile home was against regulations.

  Eoin, his partner and their two children in their mobile home

  “I don’t blame the council, I honestly didn’t realise you needed planning permission because it’s on wheels on my mother’s property," he said. “The council could come tomorrow and take it away, I pray to God that doesn’t happen and I just hope we’re able to get a temporary planning exemption, just to give us some sort of chance.” BBC News NI contacted Cavan Council but a spokesperson said it did not comment on individual cases.

  Although the circumstances will vary, Mr McGovern and his family aren’t alone. The average price of a property in the Republic of Ireland as of September this year was €346,000 (£289,000). In Northern Ireland the average price is £190,000. James Spring is an estate agent in County Cavan. He believes that with properties at this value, it’s not surprising it’s proving difficult for young couples to buy their first house.

  James Spring is an estate agent in County Cavan

  He said: “The number one story I hear is about mortgages expiring after six months, then you have to re-submit everything again and if your circumstances have changed, your mortgage offer can be in doubt. “It’s why housing is such a big issue in this election because young people are struggling, they’re getting out-competed in the market and lending rules with banks seem to have really tightened up.” Mr Spring said it is a "supply and demand" issue with not enough houses being built in the Republic.

  Waiting lists and social housing are also an issue. There are around 58,000 people are on the social housing waiting list in the Republic. Martin Loughran is chief commercial and development officer with Tuath Housing. The company has just finished an 11-storey apartment building in Drogheda, County Louth. All the homes will be occupied by individuals and families on the social housing waiting list. Mr Loughran believes a substantial increase in projects like this will be needed throughout Ireland to chip away at the waiting list.

  Martin Loughran is Chief Commercial and Development Officer with Tuath Housing

  In Northern Ireland recently, news headlines have been dominated by the fact that a lack of access to water and sewerage systems is preventing people from being able to move into homes – including social housing developments. Mr Loughran said there is a similar problem in the Republic. He added: “There has been talk of setting up a Department for Infrastructure in the Republic of Ireland to support the Department of Housing in government, we would be supportive of that and I think it’s needed.”

  Housing has been a key issue in the Irish election campaign

  Many commentators will say the Republic’s ongoing housing issues can be traced back to the financial crisis in the late 2000. This saw a reduction in public investment and it’s argued by some, that successive governments have struggled to hit housing targets ever since. Whatever the cause, for people like Eoin McGovern and his family, they’ve been left feeling like the system is working against them. He said: “If I had a time machine I would try and get a house before I had kids because when you’re trying to get a decent mortgage with dependents in this country, it’s nearly impossible. “This election will come and go, but things are going to stay very tough out there for families like us for a while yet.”
