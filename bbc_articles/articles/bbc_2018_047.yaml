title: Parasites invade Houses of Parliament - BBC News
date: '2018-01-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-42556079
content: |-
  Managers at Westminster say action was successfully taken to tackle the parasites.

  A bed bug expert says an infestation of the insects in people's homes has been traced back to the Houses of Parliament.

  Managers at Westminster say action was successfully taken to tackle the parasites, which live in upholstery as well as bedding.

  Bed bugs are not dangerous, but can cause itchy red bite marks.
