title: 'As it happened: PM announces new tax to fund social care reforms - BBC News'
date: '2021-09-07'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58473078
content: |-
  Boris Johnson says he accepts the UK-wide "health and social care levy" breaks a manifesto commitment.

  While today's announcement have been being made, we've been speaking to people about what they think should change.

  Jeanie Chalmers’s grandmother has been living in a care home since February, after she fell ill with Covid.

  Her grandmother’s savings meant she did not qualify for support in paying for social care and the monthly fees are about £5,000. They have sold her home to pay the costs so far.

  Jeanie, 44, says the system urgently needs addressing as the costs are unsustainable.

  She supports the idea that the amount someone pays for care over their lifetime should be capped - but suggests the cap should be about £35,000 as suggested in a review 10 years ago.

  The government has announced today that there will be a cap of £86,000.

  Jeanie says: "If she was aware of how much [her social care] cost her, she would be horrified.

  "The costs are around £5,000 a month. How is this sustainable? She could live another 10 years.

  "We are happy to pay the food and accommodation costs of course, but it’s the care side that needs paying by the government.

  "I’m hopeful that something positive comes out of the announcement today.

  "For us, it’s so much on our mind at the moment. Everything seems to be stacked against us which is why I’m so glad they’re reviewing things to do.”
