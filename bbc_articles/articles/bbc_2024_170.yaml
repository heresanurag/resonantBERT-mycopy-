title: Starmer focuses on a 'decade of national renewal' - BBC News
date: '2024-01-04'
section: General
url: http://www.bbc.co.uk/news/uk-politics-67886448
content: |-
  Keir Starmer spoke to the BBC's Political Editor, Chris Mason, after giving a speech in Bristol.

  The Labour leader said he and the country were "ready for a general election" to "usher in the hope and change that a Labour government can bring".

  Sir Keir added that a "decade of national renewal" would be the "central, defining purpose" of a future Labour government.
