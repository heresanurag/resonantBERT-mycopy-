title: 'Powerlist 2020: WorldRemit founder Ismail Ahmed tops list - BBC News'
date: '2019-10-25'
section: General
url: http://www.bbc.co.uk/news/uk-50177680
content: |-
  From Somaliland to picking strawberries and becoming a fintech leader, Ismail Ahmed has topped the Powerlist 2020.

  Ismail Ahmed, the founder and chairman of WorldRemit - a global digital money transfer service operating in six continents - has been named the most influential black Briton.

  The Powerlist 2020 covers the most powerful people of African and African Caribbean heritage in the UK, and includes grime artist Stormzy and the Duchess of Sussex.

  Adina Campbell went to meet him to hear about his journey from Somaliland to picking strawberries, to becoming a fintech leader.
