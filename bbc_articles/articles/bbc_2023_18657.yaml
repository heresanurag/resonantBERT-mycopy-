content: |-
  The man, in his 20s, fell from about 10m (33ft) above the circus ring during the act.

  A circus performer has been taken to hospital after falling from a height during a show watched by a family-filled audience.

  The acrobat, in his 20s, fell while riding the "wheel of death" apparatus at the Hippodrome Circus in Great Yarmouth, Norfolk, on Wednesday evening.

  Norfolk Police said he "sustained serious, potentially life-changing injuries" but was stable.

  Jack Jay, manager and circus ringmaster, said: "He was fully conscious after the fall and two members of the audience, believed to be an off-duty police officer and a paramedic, came forward to help."

  An eyewitness said screens were put around the performer and the show was cancelled following the fall.

