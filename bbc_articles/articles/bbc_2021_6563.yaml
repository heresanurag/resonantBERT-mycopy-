content: |-
  The first day of the ceasefire saw clashes at a Jerusalem mosque, but no more attacks by air.

  We need to rebuild lives in Gaza, says UN

  The UN agency for Palestinian refugees - known as UNRWA - has announced a list of priorities as it switches from an emergency response to recovery in Gaza. According to AFP news agency, UNRWA's chief in Gaza, Matthias Schmale, told reporters about is three priorities in the wake of the conflict: finding and supporting those who are homeless; assessing the damage; and helping to rebuild the lives of a "terrified, traumatised population". Mr Schmale also expressed concern about the Covid pandemic in Gaza. The second wave there had begun to calm before the fighting erupted. "Many of us are very worried that... we may have in fact seen the beginning of the third wave because of course precautionary measures and so on were not adhered to," he said. But while he said he felt an "enormous sense of relief" at the ceasefire, he added that the truce felt "fragile". "I am convinced after being here three and a half years that we will be back in a war if the underlying causes are not addressed," he said.
