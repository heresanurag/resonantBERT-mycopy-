  Prime Minister Boris Johnson pays tribute to Prince Philip outside 10 Downing Street.

  Prime Minister Boris Johnson has paid tribute to Prince Philip outside 10 Downing Street.

  He said: "We remember the duke... above all for his steadfast support for Her Majesty the Queen."
