title: 'Wakefield: Woman, 27, who died falling from van named - BBC News'
date: '2024-01-21'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-68041417
content: |-
  Leah Senior was seen falling from the van in Wakefield on Wednesday night, police said.

  Leah Senior died at the scene, police said

  A woman who died after falling from a moving van in Wakefield has been named by police as 27-year-old Leah Senior.

  Ms Senior, from Huddersfield, who died at the scene, was seen falling from the white Ford Transit on Denby Dale Road in Calder Grove on Wednesday night.

  A 25-year-old Kirklees man was arrested on suspicion of causing death by dangerous driving and drug driving offences and was released on bail.

  Anyone with information is asked to contact West Yorkshire Police.

  Police were at the scene throughout the night and into the morning

  The incident took place sometime between 20:30 and 20:45 GMT, the force said.

  Police would like to speak to anyone in the area around that time who saw or has footage of the incident, or anyone who saw the van beforehand.

