id: bbc_2020_1931
title: Time-lapse as snowstorm hits Turkish coast - BBC News
date: '2020-02-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-51456290
content: |-
  Footage shows the storm sweeping in from the Black Sea and hitting the town of Hopa.

  Time-lapse footage shows a snowstorm sweeping in from the Black Sea and hitting the town of Hopa in Turkey on Sunday.

  The video was shot by a resident, Sefa Yasar, who said: "It was a bit scary but at the same time it was a natural wonder."
