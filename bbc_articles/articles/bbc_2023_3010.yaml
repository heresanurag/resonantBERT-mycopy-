title: BBC chairman's position 'increasingly untenable' - Nandy - BBC News
date: '2023-02-12'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-64603122
content: |-
  Shadow levelling-up secretary Lisa Nandy says the integrity of the BBC is far more important than the position of one individual.

  The BBC is conducting its own internal review over any potential conflicts Image caption: The BBC is conducting its own internal review over any potential conflicts

  The verdict from the committee of MPs on the BBC chairman is clear. He messed up, and they feel he didn’t tell them the full story.

  The report, carefully worded, does not say in black and white that he should quit. But it says he should "consider the impact" of what has happened, which is a diplomatic way of raising that point.

  A member of the committee though, John Nicholson from the SNP went a bit further this morning, spelling out that Richard Sharp’s position is "extremely difficult". The government, which is responsible for appointing the chair of the BBC, doesn’t seem to want to touch this with a barge pole.

  The cabinet minister, Andrew Mitchell, claimed that it was up to the BBC to decide what to do next, and it was important to wait for another report into what went on. However embarrassing this all is for the BBC, which Richard Sharp has admitted and apologised for, it is not in the BBC’s power to do much about it, whatever Mitchell said this morning.

  Choosing and removing a chairman of the BBC is up to the government, not the organisation itself. That means while the BBC soaks up the embarrassment, it can’t change the situation for now.

  Richard Sharp, for his part, insists that he was acting in good faith, and clearly, for now, wants to stay in his position. But political angst around the nation’s biggest broadcaster is set to continue to swirl.

  Sharp’s uber connections with the Conservatives, including the prime minister himself, when he got the job, were no secret. But the continued pressure over how he got his post, is awkward for him, the government, and the BBC itself.
