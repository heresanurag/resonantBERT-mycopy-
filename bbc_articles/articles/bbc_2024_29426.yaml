title: 'Drumahoe: Police investigate sexually motivated attack - BBC News'
date: '2024-11-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cn4vjvd771qo
content: |-
  An investigation has been launched into a serious sexually motivated attack in Drumahoe in County Londonderry.

  The woman was walking in Drumahoe Park on Friday evening when a man approached her from behind

  A woman assaulted at knifepoint in a sexually motivated attack managed to fight off her attacker with a torch, police have said. Police have begun an investigation into the attack in Drumahoe in County Londonderry. Around 22:00 GMT on Friday a woman in her 20s was walking in Drumahoe Park when a man approached her from behind. The man punched the woman to the side of her head, pulled her into nearby trees and pushed her to the ground at knifepoint, the Police Service of Northern Ireland (PSNI) said.

  After a struggle the woman managed to strike the attacker in the face with her torch a number of times before breaking free and running for help. The PSNI immediately responded to search for the attacker but he had fled the scene. Det Insp Ross Olphert said: “Understandably the victim has been left traumatised and extremely distressed by this ordeal. "Our specialist officers are continuing to support her today and a full investigation is underway. "Attacks like this are an attack on all of us. Women should be free to go about their lives free from any threat."

  DUP MLA Gary Middleton says people are "rightly disgusted" that a young female was targeted in this way

  Democratic Unionist Party (DUP) Foyle MLA Gary Middleton says his reaction is “one of anger and outrage”. “People are rightly disgusted at the fact that a young female was targeted in this way, a sexually motivated attack,” he said. "This is the latest case of a young female targeted in this way and it is completely unacceptable. “So, as a society it is clear that there needs to be further conversations and there needs to be further change to ensure that those who perpetrate these acts are dealt with in a significant way and in a way that this type of behaviour isn’t repeated."

  SDLP Foyle MLA Sinéad McLaughlin said residents in Derry are concerned after a number of recent sexually motivated attacks. "This is the third report of a serious sexual attack in our city in a week," she said. "We have a number of victims who have been through the worst experience imaginable and police have had to increase their patrols to reassure people. "Violence like this is all too common place in our society and we have a long way to go before women and girls can feel safe just living their lives." The PSNI is appealing to anyone who was in the park on Friday evening to contact them.
