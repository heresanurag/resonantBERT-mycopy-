  "Did she call for me? Did someone hold her hands?" she demanded. Committee chairman Richard Blumenthal kicked off the tense hearing by thanking family members "for having the strength and courage to be with us". He also demanded to know what Boeing was doing "to end this broken safety culture". "I assure you that I listened to the whistleblowers," Mr Calhoun responded. He added that he had not spoken to whistleblowers and acknowledged company retaliation against several. “I know it happens,” he said, adding that he does not know how many employees were fired or disciplined for speaking out about safety issues. During the hearing, Mr Calhoun rose and turned to say sorry to the families for their losses. "They're gut-wrenching," he said, his voice seeming to break with emotion, "and I apologise for the grief that we have caused."

