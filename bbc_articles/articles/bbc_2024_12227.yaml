  Boeing chief engineer Howard McKenzie testified that there "absolutely" was a culture of safety first within Boeing's engineering team. After the hearing ended, Senator Blumenthal told BBC News that he was not satisfied with the CEO's answers, and that his probe would continue. "I have a lot more questions that need to be answered and we're going to be pursuing our investigation," he said. In May, the US justice department informed Boeing that it launched a criminal investigation into its practices. Several family members on Tuesday said they hoped criminal charges would be filed against the company.

