id: bbc_2018_10999
title: Children's party machine gun noise prompts police response - BBC News
date: '2018-09-08'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-45440666
content: |-
  A concerned neighbour mistook the eighth birthday party for something more sinister.

  Police responded to reports of machine gun fire only to find a children's eighth birthday party.

  The sounds at the party, which took place in Yaxham in Norfolk, turned out to be bangers.
