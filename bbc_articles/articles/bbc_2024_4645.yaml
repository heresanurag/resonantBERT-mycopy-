content: |-
  Scottie Scheffler overcomes a neck injury and record five-shot deficit in the final round to become the first man to defend the Players Championship.

  Scheffler did not drop a shot in his final 31 holes

  -20 S Scheffler (US); -19 B Harman (US), X Schauffele (US), W Clark (US)

  Scottie Scheffler overcame a neck injury and record five-shot deficit in the final round to become the first man to defend the Players Championship. The world number one, who had treatment on his neck during round two, hit an eight-under 64 to win the 50th staging of the PGA Tour's flagship tournament. He won by one shot on 20 under from fellow Americans Brian Harman, Wyndham Clark and Xander Schauffele. All three missed putts to force a play-off in a phenomenal finish in Florida. Harman was first to the 18th but he pushed a 17-foot birdie putt wide as he closed with a 68 at Sawgrass.

  Schauffele, who led overnight and for much of the final round, failed with his 60-footer as he posted a 70, while US Open champion Clark's 17-footer horseshoed around the hole and left him signing for a 69. Asked what it was like to become the first player to win successive Players titles, Scheffler said: "It's pretty special. "It's something you don't get the opportunity to do very often. It's tough enough to win one." He is the youngest player, at the age of 27, to win two titles - only Jack Nicklaus has won the event three times.

