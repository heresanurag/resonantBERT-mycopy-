  His eighth PGA Tour victory - which followed last week's win at the Arnold Palmer Invitational - is all the more remarkable considering the pain he was in during Friday's second round when he tweaked his neck while playing a shot. He called for a physio who worked on the injury between holes and he was still in obvious discomfort during Saturday's third round. "I didn't want to give up in the tournament," said Scheffler, who collected $4.5m (£3.5m) from the $25m prize fund. "I did what I could to hang around until my neck got better and [on Sunday] it felt really good." And as much as Harman, Schauffele and Clark squandered their opportunities, Scheffler earned his historic victory with a stunning bogey-free final round as he matched the record comeback wins of Justin Leonard in 1998 and Henrik Stenson in 2009. He had eradicated Schauffele's lead by the ninth hole. A chip-in eagle two on the par-four fourth sparked the comeback and Scheffler followed that with three birdies in five holes to join Schauffele on 17 under. But moments later Schauffele knocked in a birdie on seven to move one ahead. That set the scene for a nerve-shredding back nine, with Scheffler, Schauffele and Clark taking or sharing the lead at various points. While Scheffler posted birdies on the 11th, 12th and 16th holes, Schauffele and Clark were dropping shots. Clark, who led by four strokes at the halfway stage of the tournament following two rounds of 67, bogeyed the 10th and 14th to drop to 17 under, while Schauffele bogeyed the 14th and 15th as he slipped to 18 under. Meanwhile, Open champion Harman was quietly creeping up the leaderboard, with four birdies in five holes around the turn taking him to 18 under. He rolled in another on the 15th but was unable to pick up another shot on the famously tough closing three holes. Schauffele and Clark birdied the par-five 16th to move to 19 and 18 under respectively and played sensational tee shots to inside eight feet on the notoriously difficult par-three 17th 'island hole'. Schauffele missed his birdie putt. Clark holed. Both needed to birdie the last to match Scheffler. Both failed. "When I went to bed last night, it's not exactly how I envisioned walking off the 18th green," said Schauffele, whose last victory was the 2022 Scottish Open. "This sucks but I'll lick my wounds and right back to it next week."

  England are still waiting for their first winner of the Players after Matt Fitzpatrick's charge for the title stalled at the fourth hole, for the third successive round. The 2022 US Open winner, who carded double-bogey sixes in rounds two and three, had joked after the third round about his approach on Sunday: "If I can play better on the fourth hole, that will probably be a good start." However, it once again proved his undoing. He was two off the lead after opening with successive birdies, but a dropped shot at the fourth halted his momentum and further bogeys on the sixth and ninth meant he dropped out of contention. But he closed with four successive birdies to finish on a high and in fifth on 16 under. For Rory McIlroy, winner of this title in 2019, it was another rollercoaster week. He holed 26 birdies but finished 11 shots off the lead. However, after his closing round of 72, which featured five birdies and five bogeys, he said he is "headed in the right direction". "After the first round, my expectations sort of went sky high because I was like, 'oh, I think I've figured it out'," said the Northern Irishman, who was joint leader on seven under on Thursday. "Then the last three days were a little bit more of a struggle. I made enough birdies - it's just a matter of getting rid of the bad stuff."
