  Responding to Natochenny, who took over Ash's vocal duties from Veronica Taylor at the end of series eight, fans have been paying their tributes online.

  "I've been a fan of this anime since it came to the US when I was in fifth grade," posted one.

  "As a lifelong fan, I am truly grateful for your dedication to a character that defines many of our childhoods. Thank you for being such an excellent role model."

  "Thanks for all the adventures you and Veronica Taylor have given us through seven regions," wrote another.

  "For the countless Pokemon you've voiced alongside Ash, and for giving a voice to a character that is as iconic as Goku is to DBZ. Ash has realised his dream of becoming a Pokémon master and champ."

  The Pokemon franchise has grown to include Pokemon Go, a landmark mobile game using online maps and augmented reality to place the characters in real world locations.

  The latest Pokemon video games for the Nintendo Switch have already sold more than 10 million copies since their release at the end of last month.
