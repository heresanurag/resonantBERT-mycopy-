title: Pokemon to go on without Ash Ketchum and Pikachu - BBC News
date: '2022-12-16'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/uk-england-london-64006161
content: |-
  The long-time lead characters of the anime series will bow out in January, as the show continues.

  Ash and Pikachu in the first Pokemon movie in 1998

  Pokemon main man Ash Ketchum and his loyal Pikachu are set to leave the anime series after 25 years.

  Producers said on Friday that a new adventure featuring fresh faces will begin in April 2023.

  Actress Sarah Natochenny, who has provided the English voice for Ash and other characters since 2006, said it had been "an extraordinary privilege".

  "No matter what lies beyond his final chapter, he'll live forever in the hearts of many generations to come."

