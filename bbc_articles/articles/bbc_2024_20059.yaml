title: Liam and Noel Gallagher tease return of Oasis - BBC News
date: '2024-08-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/ce80nm88kjpo
content: |-
  A mystery announcement touted for Tuesday morning comes as Liam Gallagher teases 2025 tour dates.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Liam and Noel Gallagher have ramped up speculation that an Oasis reunion could finally be on the cards as the brothers teased that a band announcement could be made in the coming hours. A short clip in the same font and style of the band’s famous logo appeared on the brothers' social media accounts on Sunday, as well as the official Oasis page, external. It shows the date "27.08.24" before flickering and then reading "8am". Fans of the Manchester rock band have pleaded with the brothers to regroup since they broke up in 2009, after a backstage brawl at the Rock en Seine festival in Paris.

  Formed in 1991, the group rose to fame with hits including Wonderwall, Don't Look Back In Anger and Stop Crying Your Heart Out. A Sunday Times report, citing unnamed industry insiders, claimed the brothers were set to perform a string of gigs next year, including shows at London's Wembley Stadium and Manchester's Heaton Park. The article mentioned reports that Wembley may be booked for 10 dates – which, if true, would smash the eight-gig record set by Taylor Swift this year. There is also speculation that a Glastonbury headline slot could be in the works. Liam Gallagher spent much of Sunday responding to rumours on X, formerly known as Twitter: “I never did like that word FORMER,” he said, before sharing news articles about the reunion rumours. At his headline Reading Festival set on Sunday evening, he dedicated the Oasis track Half The World Away to his brother, saying, external: "I wanna dedicate this song to Noel Gallagher." He later dedicated Cigarettes & Alcohol to people who he said hate the band. At the end of the gig, the same teaser clip showing Tuesday's date appeared on the stage's main screens.

  Definitely, maybe? An Oasis reunion tour could be a huge money spinner for the band.

  It has been 30 years since chart-topping Definitely Maybe album by Oasis turned the Gallagher brothers into stars in 1994 – helping to kick off the Britpop era and launching the hellraising pair, and their band, into mega-stardom. In 1996, an incredible 2.5 million people applied for tickets to their two dates at Knebworth – which could hint at the demand any new gigs might see. Speaking on BBC Radio 5Live, music journalist John Robb said Oasis defined the generation who grew up in the 1990s, adding that the atmosphere at any reunion events would be "amazing". The hype has sent fans into a frenzy, with many people sharing their excitement – and criticism – online. One fan said Heaton Park is a "terrible venue for concerts", with Liam responding: "See you down the front..." When another asked when the reunion dates will be announced, he replied: "Next Friday..." Fans outside Sifters record shop in Burnage, Manchester – which is mentioned in the Oasis song Shakermaker – gave their reaction. "They're a big part of my life growing up," said one woman, who has an Oasis tattoo on her back. "I'm not going to sleep tonight, I am so excited." "We've grown up around the corner from Noel and Liam," said another. "You can't put a price on a band such as Oasis, can you?" she added. "Burnage people will pay [to see them], and so will everyone else."

  The boys are back? Oasis haven't been seen on stage since 2009

  A third fan said: "You've dreamt about it in your dreams but never in person, thinking of them getting together... I think this is the one." The brothers always had a combative relationship, and a string of tours have fallen apart over the years, ending in the backstage fight in 2009 that resulted in Noel leaving the band. This has led some to question what the real motivation for any potential reunion might be. Helen Brown, a music critic at The Independent, told BBC News: "After the decades of going at each other with cricket bats and fire extinguishers, it's extraordinary that [the Gallagher brothers] seem to be getting along better – and maybe money is an incentive here." She added: "Maybe they can put aside their differences to fill their coffers." The pair have since gone on to have successful careers separately, with Noel fronting the group Noel Gallagher's High Flying Birds. Of the other original band members, Paul "Bonehead" Arthurs has recently toured with Liam, but drummer Tony McCarroll and bassist Paul McGuigan have not played with either Gallagher since Definitely Maybe and 1997's Be Here Now respectively.
