title: Seaside towns 'battered' by tidal surge - BBC News
date: '2017-01-13'
section: General
url: http://www.bbc.co.uk/news/uk-38616790
content: |-
  People along England's east coast have been bracing themselves for a storm surge.

  People along England's east coast have been bracing themselves for a storm surge and the possibility of severe flooding.

  The Environment Agency has issued 17 warnings of danger to life.
