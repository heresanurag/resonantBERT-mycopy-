content: |-
  The teenagers were found fatally injured in Brentwood, Essex, on Sunday morning.

  The two teenagers were found fatally injured in Brentwood, Essex, in the early hours of Sunday

  A man charged with murder after the death of two teenage boys has appeared at court.

  The two teenagers were found fatally injured in Regency Court, Brentwood, Essex, at about 01:30 BST on Sunday.

  Frankie Watson, 19, of Baker Street, Orsett, was charged with two counts of murder, attempted murder and possession of an offensive weapon.

  Southend magistrates remanded him in custody to appear at Basildon Crown Court on Thursday.

  Essex Police said two men, aged 20 and 21, had been released on bail and a 40-year-old man had been released under investigation.

  Southend Magistrates' Court ordered that the two victims could not be named, and neither could a third person involved who is the subject of the attempted murder charge.

