content: |-
  Brazilian football legend Pelé's coffin has been taken to the stadium of his former club Santos.

  The body of Brazilian football legend Pelé has been moved from the hospital where he died to the stadium of his former club Santos.

  Pelé's wake will be held at Santos Football club later today and his coffin will be placed in the centre of the pitch for the public to pay respects.

  He died at the age of 82 in São Paulo on Thursday.
