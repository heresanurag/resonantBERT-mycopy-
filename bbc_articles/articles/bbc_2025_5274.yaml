title: Sophie Evans murderer Richard Jones jailed for life - BBC News
date: '2025-03-04'
section: Wales
url: http://www.bbc.co.uk/news/articles/c4gmr628l50o
content: |-
  A 50-year-old man is sentenced to life imprisonment and will spend at least 20 years in jail.

  This video can not be played To play this video you need to enable JavaScript in your browser. A 999 caller described how her former partner admitted he had murdered Sophie Evans

  A man has been jailed for life for the murder of his son's partner after falsely believing she had scammed him. Sophie Evans' body was found lying face down and naked on the kitchen floor of a house in Llanelli, Carmarthenshire, on 5 July 2024, after she was attacked and strangled. Richard Jones, 50, from Burry Port, Carmarthenshire, was found guilty of murder at Swansea Crown Court in January. Jones was sentenced to life in prison and must serve a minimum of 20 years.

  Jones believed Ms Evans was "scamming" him out of the deeds for his mother's house. He visited her home shortly after she returned from taking her children to school, killed her and left the house. At his trial, Jones admitted manslaughter with diminished responsibility but denied murder, saying he believed he was being financially taken advantage of by the victim and his son. "Having heard all the evidence, including evidence from two psychiatrists, the jury rejected that claim [and] convicted him of murder," senior crown prosecutor Abul Hussain said in a statement following the sentencing. "The evidence presented to the jury demonstrated that Richard Jones bore full responsibility for his callous actions."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At the trial, the jury saw an exchange between Jones and his former partner, Tracey Thompson, in which he called his son, Jamie Davies, and Ms Evans "scamming thieves" and said he had "taken care of the problem". Consultant psychiatrist Dr Dilum Jayawickrama, who interviewed the defendant, said Jones was "100% certain in his beliefs" he had been scammed. The court heard Jones told officers he had been taken to a solicitor's office by Ms Evans to sign forms, leading him to believe he had signed over the deeds to his mother's house. David Elias, defending Jones, said his client's thoughts about being scammed were "falsely held beliefs" caused by a delusional disorder. Mike Jones, prosecuting, said Jones "was not experiencing significant emotional distress" at the time of the murder and showed "callous indifference" to what he did to his victim. Mr Jones also told the jury the defendant had "by his own admission, a historic short fuse", and on the day of the incident "had lost his temper, attacked Sophie and strangled her, causing her death".

  During Monday's hearing, Kerry Quinlan, Ms Evans' sister, read a victim statement on behalf of the family and said her death had "changed our family forever". "She was the rock of our family and the best mum," she said, describing her murder as a "cruel, senseless act". She added Ms Evans' two daughters "cry to sleep every night asking for their mum, but they will never be able to see her again". A personal statement from Jamie Davies, Ms Evans' partner, was also read to the court where he described her as "the most beautiful person I could ask for". "What Richard did is truly unforgivable," he said. Judge Geraint Walters previously said the only sentence the courts could pass was life imprisonment, describing it as a "frenzied attack on a woman in a towel in her own home". "The duration of the attack was short but it was frenzied and the force you used meant Sophie must have realised her life was in danger," he said. "You left the property not making any calls to see if her life could have been saved. "But instead you left the property calmly and went about your daily business of ordering a new bank card and buying pastries at a bakery. You didn't for a moment think about her. She laid dead for hours."
