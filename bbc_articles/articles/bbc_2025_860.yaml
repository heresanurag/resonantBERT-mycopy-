title: British woman shot dead on holiday in Texas - BBC News
date: '2025-02-13'
section: England
url: http://www.bbc.co.uk/news/articles/crke3p2nn2vo
content: |-
  Police in Texas have conducted a "thorough investigation" into the death of Lucy Harrison.

  Lucy Harrison was shot at her father's property in Prosper, Texas

  A young British woman was shot dead while on holiday in America, a coroner's court heard. Lucy Harrison, from Great Sankey in Warrington, Cheshire, died after being wounded at her father's property in the town of Prosper, Texas on 10 January. The 23-year-old's family said in a statement that Ms Harrison had a "huge capacity to love and be loved". An inquest into her death was opened and adjourned at Cheshire Coroner's Court in Warrington which stated she had been "fatally shot with a firearm".

  No details were shared in court as to how Ms Harrison was shot, or whether any criminal investigation is underway. An official from the Town of Prosper said a "thorough investigation" into the "tragic incident" had been carried out by the Prosper Police Department and a file had been passed to the Collin County District Attorney (DA) for review. The spokesperson said it was "normal practice" not to comment further once a case has been referred to the DA. After the inquest hearing Cheshire Police shared a statement from Ms Harrison's family saying she lived "fiercely and fearlessly". "She was the embodiment of wonderful contradictions; she adored travel and being away, experiencing new places and cultures, yet at the same time, she loved nothing more than snuggling up in her pyjamas with her candles on at home", they said. They added she "was truly thriving in life and although this gives us great comfort, we are utterly heartbroken at the loss of our beautiful, gorgeous Luce". The inquest was adjourned until 28 March.

