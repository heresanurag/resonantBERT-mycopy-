  Wales' victory over Croatia had put their destiny back in their own hands – beat Armenia and Turkey in November and they would qualify automatically for Euro 2024. However, they squandered that opportunity with two draws, putting Page back under pressure. Thanks to the Nations League, Wales still had another chance of qualifying via the play-offs – but they wasted that reprieve as well as they lost their final on penalties to Poland in March. Just a day later, FAW president Steve Williams publicly declared that Page would keep his job. The timing of the statement was as surprising as its contents for others at the association. Usually, the FAW takes its time over the internal reviews that follow each international window, consulting the association's international game board and figures such as chief football officer Dave Adams before reaching a conclusion. That is why it took more than a week before Page eventually departed. After Williams' swift declaration of support, Page's next assignment was a training camp in Portugal followed by friendly matches against Gibraltar and Slovakia. He selected a young and experimental team to face Gibraltar on the Algarve, expecting to make light work of a team ranked 207th in the world and comprised largely of part-time players. But the embarrassing goalless draw in Faro prompted boos from the travelling Wales fans in Faro, some of whom chanted "We want Page out" as he made his way down the tunnel. Wales' supporters had not turned on a manager for decades, and the fury only intensified when a more experienced Wales side were thrashed 4-0 in Slovakia three days later. After sarcastic chants of "in transition" – referencing Page's repeated calls for patience – and more calls for the manager's sacking, fans jeered him again in Trnava, this time louder and angrier. Page is usually bullish after defeats, insisting his side are building for the future and that he will not be deterred by criticism. But on this occasion, he was crestfallen. He admitted fans "want me out" and that he understood why, adding he felt "low" and that any decision about his future was out of his hands. The way Page spoke in Trnava, he seemed to think his time was up. The FAW reverted to its customary, more patient approach, with senior figures making no official comment and instead saying they would carry out the reviews as usual. Days passed with no news, leading some to wonder if Page might get another reprieve. And while it is true he still had his backers at the FAW, the majority believed it was time for a change. Twelve days after the trouncing in Slovakia seemed to signal the end for Page. The FAW's decision-makers eventually concluded their talks on Friday morning and agreed on a course of action. Official confirmation followed and, just like that, attention turned to identifying a successor. As Page, the man who took Wales to a first World Cup for half a century, can attest, football moves on quickly.
