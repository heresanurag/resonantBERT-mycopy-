  Walt Disney interviewed by Derek Hart on the Tonight Programme.

  "You have to appeal to the adult... the children don't have any money!"

  Walt Disney tells Derek Hart about how Mickey Mouse got his voice and just why Donald Duck is so angry.

  This clip is from Tonight.
