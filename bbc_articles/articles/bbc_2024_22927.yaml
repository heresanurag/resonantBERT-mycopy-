title: 'Watch: A421 submerged by flood water in Bedfordshire - BBC News'
date: '2024-09-23'
section: General
url: http://www.bbc.co.uk/news/videos/c5ywxnl89exo
content: |-
  The road is closed in both directions and a diversion is in place.

  A major road remains closed after a large stretch was submerged by flood water.

  National Highways said the A421 was closed in both directions between the A6 junction south-west of Bedford and the M1 (junction 13) south-east of Milton Keynes.

  Footage from Marston Moretaine showed the dual carriageway was completely flooded underneath a bridge across the road bypassing the village to the north.

  Drivers have been advised to expect delays, details of diversion routes were published on its website, external.

  Bedfordshire Police and teams from National Highways Service Providers were working at the scene.

