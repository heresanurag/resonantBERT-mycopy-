title: Train superfan, 5, becomes Avanti rookie driver - BBC News
date: '2024-08-21'
section: England
url: http://www.bbc.co.uk/news/articles/c0qe8vj2yy8o
content: |-
  Daniel from Wigan is invited to Avanti West Coast's training centre to test drive his favourite trains.

  Daniel got the chance to practice driving trains at the driver centre

  A five-year-old boy described as a train "superfan" has become a rookie driver in what his mother said was an experience he would "never forget". Daniel Rogerson from Standish, in Wigan spent a day at Avanti West Coast's training centre to test drive his favourite Pendolino-type trains. He was invited after the rail firm spotted a picture on social media of the Pendolino-shaped bed his family had specially made for him. Daniel's mother Elaine Rogerson said the opportunity for him to train as a rookie driver was "amazing".

  The five-year-old's custom-made train bed caught the eye of the rail operator

  Daniel's family said he became an avid fan of trains from an early age, with the five-year-old particularly keen on Pendolino-type vehicles operated by Avanti West Coast. His enthusiasm prompted his mum to order a bespoke train-shaped bed from a local furniture store, which led to his invitation to attend the rail firm's driving centre. The five-year-old test drove trains in a simulator and got the chance to sit in the driver's cab of a training vehicle. He was also given a behind-the-scenes tour of Crewe station and was taught how to dispatch trains from an announcer's offices.

  Daniel's family says he likes to spend hours trainspotting with his grandad

  "It’s an experience we’ll never forget," Ms Rogerson said. "After his time at Avanti West Coast’s driving school, I couldn’t be more certain he’s destined to be a train driver." Natalie Whitehouse from the rail firm said Daniel "seemed right at home and impressed us with his knowledge, as well as eagerness to learn".
