title: Stonehenge celebration takes place after paint protest - BBC News
date: '2024-06-21'
section: General
url: http://www.bbc.co.uk/news/videos/crggyde8vvno
content: |-
  English Heritage say they removed the paint ahead of thousands of people celebrating the summer solstice.

  Thousands of people from all over the world came to Stonehenge to see the sunrise on summer solstice which celebrates the longest day of the year.

  The celebrations went ahead at the site of the 5,000-year-old landmark after environmental activists covered the monument in orange paint on Wednesday.

  Two Just Stop Oil campaigners sprayed the powder paint on the historic site near Salisbury, Wiltshire, but an English Heritage spokesperson said they were able to remove the powder ahead of the celebration.
