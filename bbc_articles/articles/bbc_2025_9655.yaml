title: Lorraine's ITV show cut to 30 minutes as job cuts loom - BBC News
date: '2025-05-20'
section: Culture
url: http://www.bbc.co.uk/news/articles/cjwqqvqxzxlo
content: |-
  The daytime show will be cut by half an hour as

  Lorraine Kelly's morning show on ITV will be cut from an hour to 30 minutes as more than 220 jobs across the station's daytime output are expected to be cut, the broadcaster has announced. From January 2026, Good Morning Britain (GMB) will be extended by half an hour to fill the gap, running from 06:00 to 09.30 daily. Lorraine, which currently runs for almost the entire year, will now only air for 30 weeks out of 52, with GMB extended by 30 minutes during the weeks Lorraine is not on air, until 10:00. The 220 job cuts are expected to be made across daytime shows GMB, Lorraine, This Morning, and Loose Women.

  Entertainment outlet Deadline reports ITV's daytime staff currently amounts to about 450 employees in total. Loose Women will remain in its current slot - 12:30 to 13:30 daily - but again, will now be cut to 30 weeks of the year. This Morning, hosted by Cat Deeley and Ben Shephard, is to remain in its 10:00 - 12:30 slot on weekdays across the year.

  Kevin Lygo, managing director of ITV's media and entertainment division, said: "Daytime is a really important part of what we do, and these scheduling and production changes will enable us to continue to deliver a schedule providing viewers with the news, debate and discussion they love from the presenters they know and trust, as well as generating savings which will allow us to reinvest across the programme budget in other genres. "These changes also allow us to consolidate our news operations and expand our national, international and regional news output and to build upon our proud history of trusted journalism at a time when our viewers need accurate, unbiased news coverage more than ever." ITV Studios, which produces the channel's daytime shows, is consulting with its daytime teams about a proposal that would see its three editorially distinct shows - Lorraine, This Morning and Loose Women - produced by one team sharing resources and operations from 2026. GMB will move across from ITV Studios to ITV News at ITN, bringing all its national news gathering into one hub. Scottish presenter Kelly has fronted Lorraine since 2010. Ranvir Singh and Christine Lampard present the show when Kelly is off. In February, ITV announced that soaps Coronation Street and Emmerdale would see their content cut by an hour a week between them from next year. In the past few years, there has been a downturn in advertising revenue, part of a funding squeeze throughout the TV industry.
