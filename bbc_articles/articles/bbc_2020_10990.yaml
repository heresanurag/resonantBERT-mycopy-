title: 'Covid: Barnsley shoppers react to South Yorkshire tier 3 move - BBC News'
date: '2020-10-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-54632619
content: |-
  Shoppers in Barnsley react to the news South Yorkshire will move into tier 3 on Saturday.

  With tier three restrictions set to be introduced for South Yorkshire from Saturday, people in Barnsley spoke about what they think of the new rules.

  People had mixed reactions with some saying they were "worried" and others saying stricter measures were "good" because people were breaking the rules.

  The new restrictions will apply to all four local authority areas in South Yorkshire - Barnsley, Doncaster, Rotherham and Sheffield.

  Labour Mayor Dan Jarvis said the move to tier three followed "extensive discussions" with ministers.
