title: Dolphin stampede wows whale watchers - BBC News
date: '2020-08-13'
section: General
url: http://www.bbc.co.uk/news/world-53760503
content: |-
  A safari group sailing near Dana Point in southern California came across a travelling pod of dolphins.

  Around 300 dolphins were caught on camera as they travelled at rapid speeds near Dana Point in southern California.

  Also known as porpoising, the dolphins leap so fast they spend more time in the air than in the water.
