  Manchester United complete the signing of midfielder Manuel Ugarte from Paris St-Germain in a deal that could reach £50.8m.

  Manchester United have signed midfielder Manuel Ugarte from Paris St-Germain for a fee that could reach £50.5m. The 23-year-old Uruguay international has agreed a five-year contract with the option to extend it for a further 12 months. He joins for an initial fee of £42.1m, with the potential for £8.4m in additional payments. Ugarte becomes the club's fifth signing of the summer transfer window and takes their overall spending to just over £190m. He made 37 appearances for PSG in all competitions last season after joining them from Sporting Lisbon for a reported £50.5m, helping the Parisians to their 12th Ligue 1 title. It is understood PSG have negotiated a 10% sell-on clause for Ugarte, with both clubs privately claiming they are happy with the deal.
