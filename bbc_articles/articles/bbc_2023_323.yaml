content: |-
  But the PM insists he is showing principle by waiting for an investigation on the Tory chairman's tax affairs to report back.

  Sunak's own taxes could be scrutinised soon - if he publishes returns

  A hint of the next issue coming down the road for Rishi Sunak? Rishi Sunak decided to address his comments last week - that Nadhim Zahawi had addressed questions about his tax affairs in full - head on in PMQs today. He said more information (the fact Zahawi paid a penalty to HMRC) had come to light since he spoke last week and that’s why he has asked the government’s ethics adviser to investigate. While he got cheers from his MPs for saying he believes it’s fair to allow due process, it was uncomfortable to be answering questions about the ethics of his own MPs again. Perhaps more uncomfortable, personally, though were the hints at a potential next challenge for Rishi Sunak. The Labour leader Sir Keir Starmer asked speculatively why the prime minister may not want to talk about tax avoidance and family connections. The SNP Westminster leader Stephen Flynn asked whether people seeking to avoid tax should simply “apply for non-dom tax status.” Both are alluding to revelations last year that Sunak’s wife had claimed non-dom tax status to avoid UK tax on overseas income. Sunak has promised to publish his tax returns at some point, and No 10 have hinted this will be soon. He’s said he wants to be transparent about this, but the publication of them may, at least temporarily, turn eyes away from one very wealthy Tory MP’s taxes to the prime minister's own.
