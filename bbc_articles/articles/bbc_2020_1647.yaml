id: bbc_2020_1647
title: Caption mix-ups 'show lack of respect' for black MPs - BBC News
date: '2020-02-04'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-51374401
content: |-
  Labour MP Bell Ribeiro-Addy says captioning errors by the BBC and Evening Standard are part of a pattern.

  The media keeps mistaking black women MPs for each other because it does not respect them as much as their white counterparts, a Labour MP has said.

  The Evening Standard used a picture of Bell Ribeiro-Addy in a story about fellow Labour MP Marsha de Cordova.

  The story was about BBC Parliament captioning Ms de Cordova as Labour deputy leadership hopeful Dawn Butler.

  Ms Ribeiro-Addy told BBC News: "We are not given the same respect as our white counterparts and that's not right."

  The MP, who has represented Streatham, in south London, since last year's general election, said she accepted that "everybody makes mistakes," but added: "It happens all the time with us.

  "It is hard enough for us to get elected here but when we do get here we are not treated as individuals."

  She said she used to get mistaken for Dawn Butler when she worked as the chief of staff to shadow home secretary Diane Abbott, "because I must be the other one".

