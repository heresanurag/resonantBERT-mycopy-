title: Wildfires rage in Algeria as heatwave hits North Africa - BBC News
date: '2021-08-12'
section: General
url: http://www.bbc.co.uk/news/world-africa-58184912
content: |-
  The blazes in the mountainous Kabylie region are some of the worst in the country's history.

  Dozens of fires have burnt through areas of northern Algeria, amid a heatwave sweeping across North Africa.

  The flames have been fanned by strong winds and tinder-dry conditions.
