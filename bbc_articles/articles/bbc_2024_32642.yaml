content: |-
  Notre Dame has officially reopened more than five years after it was badly damaged in a fire.

  "The bells of Notre-Dame are ringing again," French President Emmanuel Macron declared during the reopening ceremony of the world-famous cathedral in Paris.

  The medieval cathedral had been closed since a major fire tore through it in 2019, spreading through its roof and toppling its spire.
