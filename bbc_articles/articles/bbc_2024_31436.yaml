  Sir Paul and Sir Ringo, who are the last surviving members of The Beatles, have played together a number of times since the band broke up in 1970. That includes at Sir Ringo's 2015 Rock and Roll Hall of Fame induction and on Sir Paul's last tour, Freshen Up, in 2019. Sir Paul is known for treating his fans to jumbo performances packed with hits from his lengthy musical career, which also includes the band Wings and several solo albums. Thursday night was no different, with him playing nearly 40 songs on various instruments. Other highlights from Thursday's gig included a performance of In Spite of All the Danger. This was the first song recorded by The Quarrymen, the first band Sir Paul was a member of, along with the late John Lennon and George Harrison. He was also joined by a children's choir to sing his festive favourite Wonderful Christmastime.

