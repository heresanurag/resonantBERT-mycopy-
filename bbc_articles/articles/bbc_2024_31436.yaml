content: |-
  Fans are treated to an appearance by The Beatles drummer during the last night of the Got Back tour.

  Paul and Ringo get back together at London gig

  Sir Paul is known for treating his fans to jumbo performances packed with hits from his lengthy musical career

  Sir Paul McCartney has reunited with his former Beatles bandmate Sir Ringo Starr during a gig at London's O2 Arena. The drummer was brought on stage to thunderous applause before the pair launched into classics Helter Skelter and Sgt Pepper's Lonely Hearts Club Band. "I've had a great night and I love you all," Sir Ringo said later as he walked offstage. Thursday's performance was the last in Sir Paul's Got Back tour, which saw the 82-year-old play in France, Spain and Brazil.

  Sir Ringo was not the only musical guest appearance on Thursday night. Rolling Stones guitarist Ronnie Wood joined Sir Paul for a rendition of Get Back, during which the latter played his original Hofner 500/1 bass guitar for the first time in more than 50 years. The instrument was stolen in 1972 but Sir Paul was reunited with it earlier this year.

