title: How a garden centre blossomed over 70 years - BBC News
date: '2025-05-04'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cx2wrerzlrgo
content: |-
  The family business is celebrating seven decades, but it has not always been rosy.

  Roger and Hazel started running a nursery before founding a garden centre for the public in St Albans

  One of the UK's early garden centres is celebrating 70 years as a family business, which saw the owner fall in love with and marry his first employee. "Roger used to pick me up and take me to market every day; we gradually got fond of each other," recalled Hazel Aylett, now 84. Horticulture student Roger Aylett founded Aylett Nurseries in St Albans, Hertfordshire, in April 1955, when "there was nothing here except a green field". "There wasn't a garden centre, they weren't invented then. We used to sell our bunches of dahlias and people said 'why can't you sell us anything else?' And that's how it all started," said Ms Aylett.

  The couple started off growing flowers for trade and later for people to put into hanging baskets

  Mr Aylett died in 2010 but his daughter and son-in-law Julie and Adam Wigglesworth continue to manage the business. They now employ 150 staff, but Ms Aylett said the early days were very different. "I was Roger's first student when I was 18 years old, and he paid me £1 a week," she said. "Roger couldn't afford any staff – why was I sent here (from college) if it wasn't in the stars that I was going to fall in love with this man? "We used to grow sweet peas and delphiniums for the cut flower trade, but we spent the first 15 years losing money. The bank manager begged my mother in law to get rid of the nursery as it was such a drain."

  Hazel Aylett said "it was the customers that drove us to start the garden centre"

  Ms Wigglesworth said a turning point came in the late 1960s when another horticulturalist "came up with the idea of putting plants into pots". "Before, you could only do it as bare root stock - it was very seasonal. "Once this idea of containerisation took off, plants could be purchased and it really took off," she explained. Mr Aylett, who Mr Wigglesworth described as "an absolute character", also drove the company forward with his passion and personality. "He loved growing a good plant, and a good crop. He built the business on customer service, Roger was always on the shop floor," he said.

  Roger Aylett's family said he was a "guiding light" who "loved growing a good plant"

  Mr Wigglesworth said the centre, which has recently added hundreds of solar panels to power 30% of its operations, had often forged ahead with new technologies. "We were the first garden centre in the country to have bar codes," he said. "In the 70s we had an environmental system to manage the greenhouse - now you get that on your phone, but Roger did it decades ago."

  The nursery has won many RHS awards for its dahlias

  Nursery manager Tony Day recently celebrated 50 years at Aylett, after starting his first job there aged 16. "I came here as a nursery worker on a team of about 15 people, learning anything and everything," he said. "My philosophy is to make sure I grow something well and make sure it's better next season. "I don't think I would have been here if I didn't appreciate the Ayletts as a family as well. It helps to be appreciated in your job."

  Tony Day celebrated his half century at Aylett with current managers Adam and Julie Wigglesworth

  Mr Day has seen gardening trends come and go. "When I first started, there were a lot of the 'old boy gardeners', who loved dahlias, chrysanthemums, the old fashioned plants," he said. "The gardens were bigger then. Now you get more patios and small gardens. "The trends have changed from large lawns with decorative borders to smaller patio gardens. People love containers, smaller flowering plants round by their barbeques."

  The changing face of garden centre cafes: from 2025 back to the 1970s

  "We've got climate change, plant health, issues of peat and as the world gets smaller - who know what diseases," she said. Mr Wigglesworth said on the positive side, "people are as interested in nature as they've ever been". "Garden centres have a rosy future. We've got an absolute wealth of experience," he added. Ms Aylett, who lives on the site, said the memory of her husband still continued. "We miss Roger every single day, he was the guiding light behind it all," she said. "As a family business it's important to carry on, but what the future holds I don't know."

  The garden centre now occupies a large site between Hatfield and St Albans

