  In a statement on Facebook, Afghanistan's General Directorate of Physical Education and Sports paid tribute to Mr Anwari.

  "May he rest in heaven and pray to God for his family, friends and sports colleagues," the sports body said.

  Others have also been sharing their respects on social media.

  "His departure is a great sorrow," wrote one user on Instagram. "Your memory is always dear to me".

  Around 4,500 US troops are in temporary control of Karzai International Airport in Kabul, Afghanistan's capital.

  The Taliban are blocking Afghans from entering the airport without travel documents - but even those with valid authorisation have struggled.

  Amid chaotic scenes at the airport, US President Joe Biden has defended his handling of the US withdrawal from Afghanistan.

  "The idea that somehow there's a way to have gotten out without chaos ensuing, I don't know how that happens," he told ABC News on Wednesday.

  Mr Biden said that US troops may have to stay in Afghanistan beyond the planned 31 August deadline agreed with the Taliban, in order to help with evacuations,
