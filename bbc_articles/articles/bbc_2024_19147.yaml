  It is believed the Abernethy Pearl, affectionately known as Little Willie, could have been growing in its mussel for more than 80 years before Mr Abernethy found it, meaning it was created during the reign of Queen Victoria. Weighing 43.6 grains, it is the largest freshwater pearl found in Scotland in modern history, although it is smaller than the Kellie Pearl which was discovered in the 1540s and is set in the Scottish Crown. Mr Abernethy, who died in 2021 aged 96, never disclosed the exact location of the rare find. It is thought only one in every 5,000 mussels found in Scottish rivers contains a pearl, and generally they are smaller than their saltwater counterparts.

  During the 1970s, award-winning wildlife cameraman Doug Allan worked with Mr Abernethy as a pearl diver. In an obituary, Mr Allan noted his friend was able to discern from the size and shape of the mussel if it contained a pearl. This enabled him to pick carefully and leave other mussels undisturbed. He said: “Mr Abernethy was a unique man and it was a privilege to have known him. “I recall watching Mr Abernethy fishing with his glass and stick and then he gave me a go. It didn’t take long to appreciate just how much hard graft it was. It is believed he wrapped the pearl in a dock leaf to keep it from scratching before he took it to Cairncross of Perth jewellers, where it remained.

  The pearl will be auctioned at Lyon and Turnbull’s Edinburgh auction house as part of the Cairncross Collection of pieces from the Perth jewellers, with bids also accepted online. Ruth Davis, Lyon and Turnbull head of jewellery, said: “The Cairncross Collection offers a final opportunity to obtain a piece of Perthshire history. “The Abernethy Pearl is, of course, the star of the sale and we’re excited to see the interest the auction will undoubtedly generate.”
