  Abernethy Pearl expected to fetch up to £60,000 at auction

  The Abernethy Pearl was discovered in the River Tay in 1967

  The largest Scottish freshwater pearl found in living memory is being auctioned, nearly six decades after its discovery. The Abernethy Pearl is expected to fetch between £40,000 and £60,000 when it goes under the hammer on 21 August. The pearl was discovered in the River Tay by William (Bill) Abernethy, who was credited as Scotland’s last dedicated pearl fisherman. He found it in 1967, before the pearl fishing ban was introduced in Scotland in 1998.

