id: bbc_2018_10271
title: 'Seattle plane: Rogue pilot ''had security clearance'' - BBC News'
date: '2018-08-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45159118
content: |-
  The US airline worker who stole and crashed a plane had security clearance and was on his shift.

  The airline employee who stole an empty passenger plane from a Seattle airport and crashed it on a nearby island had security clearance and was on his shift, airline officials say.

  Alaska Airlines Chief Executive Brad Tilden told a news conference that the man had worked as a ground-service agent for sister carrier Horizon Air for three-and-a-half years.
