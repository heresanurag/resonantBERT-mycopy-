title: Russian village complex where England team may stay - BBC News
date: '2017-11-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-42101267
content: |-
  Russia hosts the 2018 Football World Cup; we've had exclusive access to England's preferred training base.

  It's seven months until Russia hosts the Football World Cup, and one of the England team’s favoured locations for their base is the small village of Repino near St Petersburg.

  We've been granted exclusive access to the training ground complex that is being built and the nearby four-star hotel. Sarah Rainsford reports.
