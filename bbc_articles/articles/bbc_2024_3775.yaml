title: 'Peak District: Injured climber rescued after fall from crag - BBC News'
date: '2024-03-10'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-68522459
content: |-
  The man was taken to hospital by air ambulance after slipping and falling 10 metres.

  The climber was tended to by rescue teams before being taken to hospital

  A climber was airlifted to hospital after slipping and falling from a crag in the Peak District.

  The Edale Mountain Rescue Team said it was called after the man was hurt in a 10m (33ft) fall at Millstone Edge, near Hathersage, at 16:46 GMT on Friday.

  The climber was suspected to have suffered pelvic injuries and was given pain relief at the scene.

  The mountain rescue team said the man was stretchered to the top of the crag and collected by the air ambulance.

  He was then flown to the trauma unit at the Northern General Hospital, in Sheffield, for further assessment and treatment, a spokesperson for the team said.

  The man was flown to hospital for further treatment

