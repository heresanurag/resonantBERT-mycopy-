title: 'Tottenham appoint Thomas Frank: ''Opposite of Postecoglou'' - what can Spurs
  expect from Danish ''chef''? - BBC Sport'
date: '2025-06-10'
section: Tottenham
url: http://www.bbc.co.uk/sport/football/articles/cr581d55rmqo
content: |-
  Will Thomas Frank, who has likened managing in the Premier League to being head chef in a high-end restaurant, serve up success at Tottenham?

  "I probably won't be at Brentford forever," Thomas Frank told BBC Sport in January when asked about his ambitions. "I will maybe walk into another club."

  That club is Tottenham Hotspur, who finished 17th in the Premier League - seven places below Brentford - but will play in the Champions League next season after winning the Europa League.

  Spurs closed the door on the Ange Postecoglou era and have replaced him with the Dane who established Brentford in the Premier League after winning promotion from the Championship in 2021.

  Frank, 51, was the second-longest-serving current manager in English football's top flight behind Manchester City's Pep Guardiola before agreeing to move across London.

  Frank did not play football professionally, external but has overseen 152 Premier League games - winning 54, losing 60 and taking 200 points from a possible 456.

  Of the 54 managers to take charge of 150-plus games in the Premier League era, Frank ranks 29th for points per game (1.32).

  During his Brentford reign, Frank spent £254m on players and received £183m in sales - a net spend of £71m. Tottenham have spent £961m on transfers since 2016-17, according to FootballTransfer.com data., external

  Frank, who has been described as the opposite of Postecoglou for his adaptability, becomes Tottenham's fourth permanent manager since 30 June 2021.

  Nuno Espirito Santo lasted just four months, Antonio Conte 16 months and Postecoglou, despite ending the club's 17-year wait for a major trophy, has been sent packing after two years.

  Frank has been given a three-year contract.

  "There's much more pressure at Tottenham than there is at Brentford, because of the expectation - and the manager has to handle that expectation," Chris Sutton, a Premier League winner with Blackburn Rovers in 1994-95, told BBC Sport.
