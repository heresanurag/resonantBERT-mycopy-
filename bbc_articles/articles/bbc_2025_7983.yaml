  He officially starts as university chancellor in May, a position he has been determined to take up despite his recent experiences. "I emphasised I wanted to make a difference to Sheffield and to communities here," he says. "I carried on working with community sports teams while in hospital, directing them from my bed." He studied for an MBA at the university during his refereeing career and received an honorary doctorate in 2023 for his work with sport and local communities.
  • None Sam Allison: Why has it taken 15 years for another black Premier League ref? "I'm aiming to be the best I can physically," he says. "No one has told me I won't walk again, but even if someone did say that I want to be able to say I did everything I could to try."

  Rennie, who moved from Jamaica to the UK as a young child and grew up in the Wybourn area of the city, says being the first black referee was about "creating a legacy to enable other people to stand on your shoulders". Discussing his latest challenge, he says the spinal cord compression has given him a new outlook on life. "Lots of people are in wheelchairs, but it doesn't define them," he says. "It has made me resilient and forceful and I will never give up - I'm not on my own, there is a village helping me." He concludes: "I recognise how brittle things are in life now. "I don't know if I am going to walk fully, but I know what I need to do to try and you must never give up hope."

