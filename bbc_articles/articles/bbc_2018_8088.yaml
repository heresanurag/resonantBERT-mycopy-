title: Massive iceberg threatens Greenland village - BBC News
date: '2018-07-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-44834774
content: |-
  A huge iceberg has drifted close to a village in western Greenland, prompting a partial evacuation.

  A huge iceberg has drifted close to a village in western Greenland, prompting a partial evacuation in case it splits and the resulting wave swamps homes.
