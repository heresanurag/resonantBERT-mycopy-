id: bbc_2020_10482
title: Priti Patel challenged on coronavirus testing delays - BBC News
date: '2020-09-15'
section: General
url: http://www.bbc.co.uk/news/uk-politics-54160366
content: |-
  Home Secretary Priti Patel has said delays in testing for the public are "unacceptable".

  BBC Breakfast's Dan Walker read a list of examples where people had long waits for results or weren't able to get tests. The Home Secretary said the government were working to "surge capacity" to where it is needed.
