  BBC reporter Cameron Angus-Mackay tries new Olympic sport Breaking.

  Breaking has made its debut appearance at the Olympics in Paris.

  Team GB didn't make qualification this time, but dancers at Glasgow's Studio 22 are training and working on their moves to keep fit and have some fun.

  Breaking teacher and B-girl, Emma Ready said she hopes the inclusion of the dance at the Olympics brings new eyes and more money to the scene.

  However, it will not be included at the 2028 Olympics in Los Angeles.

  "How hard can it be to breakdance?" Our reporter Cameron Angus-Mackay finds out.
