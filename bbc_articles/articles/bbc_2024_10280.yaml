title: Shattered windows in high-rise buildings after deadly Texas storm - BBC News
date: '2024-05-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69029511
content: |-
  Shattered windows in high-rise buildings and fallen trees were visible around Houston after severe weather.

  Severe thunderstorms have killed four people and knocked out power to nearly a million homes and businesses in south-east Texas.

  The storms shattered windows in high-rise buildings in the city of Houston and downed large trees throughout the area.
