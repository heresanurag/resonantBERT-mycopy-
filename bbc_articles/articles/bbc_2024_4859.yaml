title: 'Banksy: Artist confirms new London tree mural is his own work - BBC News'
date: '2024-03-18'
section: UK
url: http://www.bbc.co.uk/news/uk-68596824
content: |-
  The street artist uploaded before and after pictures of the artwork to Instagram on Monday.

