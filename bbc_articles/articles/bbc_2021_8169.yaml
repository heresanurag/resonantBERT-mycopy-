title: Scotland Covid rules to be eased from 19 July - BBC News
date: '2021-07-13'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-57804935
content: |-
  Nicola Sturgeon confirms a lifting of restrictions, but face masks will be required "for some time to come".

  The GMB union has issued a warning over the possibility of changes to self-isolation rules, saying "don't go there".

  Senior Organiser for Public Services Drew Duffy says unions were told on Tuesday morning that exemptions were being considered because of understaffing crises in the NHS and social care sector.

  But he says those problems were "well understood" by ministers and employers pre-Covid and they "didn’t act".

  He adds that the move would only anger and concern staff who were "already absolutely exhausted and undercut", while confirming their safety was not a priority for the government.

  Quote Message: This should act as a final warning about the need for urgent and transformative investment in health and social care, so we can attract and retain the people and skills we so obviously need. That means delivering proper value for workers in their pay and conditions. from Drew Duffy GMB union This should act as a final warning about the need for urgent and transformative investment in health and social care, so we can attract and retain the people and skills we so obviously need. That means delivering proper value for workers in their pay and conditions.
