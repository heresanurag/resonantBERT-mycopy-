title: Purnell's £750 vouchers useless after restaurant closure - BBC News
date: '2024-11-10'
section: England
url: http://www.bbc.co.uk/news/articles/cn8gzmrzynzo
content: |-
  Customers are told their vouchers are non-transferrable and to contact their banks.

  'My £750 vouchers are useless after restaurant closure'

  Therese Roberts (right) had bought one of the vouchers for her daughter Lindsay

  A woman who spent £750 on vouchers for a Michelin-starred restaurant before it closed fears she may have lost her money. Purnell's in Birmingham, which became famous for contemporary seasonal food, shut in October. But more than a dozen people contacted the BBC to say they had been told vouchers, sometimes worth hundreds of pounds, would not be refunded or redeemed. Glynn Purnell, who ran the restaurant, said he was "heartbroken" by the closure and apologised for what he called a "difficult situation".

  Therese Roberts, a retired marketing worker from Coventry, said she bought £500 worth of vouchers for her children last Christmas, before also spending money on a £250 voucher for a friend. She said she didn't find out the restaurant had even closed until she read the BBC's report on it.

  Glyn Purnell, who ran Purnell's, has been criticised over vouchers that now appear to be useless

  After contacting liquidators, Ms Roberts was told the vouchers were irredeemable and it was not possible for refunds to be issued. Her request to use them at another of Mr Purnell's restaurants was also rejected. "I'm really disappointed," the 58-year-old said. "He classes himself as the 'Yummy Brummie'. He blames greedy chains taking his business but he didn't want to communicate or come to a compromise with me. "I thought he was a better man than that. It's left a rotten taste in my mouth."

  Ms Roberts previously ate at Purnell's and wanted others to experience it

  Ms Roberts previously visited Purnell's with her husband, describing it as a "great experience". She said she really enjoyed dining at the premium establishment and wanted her loved ones to be able to try it too. "He's come across as a down to earth boy from Chelmsley Wood," the mother added of Mr Purnell. "I thought he would understand what it was like to be an ordinary person in the street."

  Ms Roberts was among multiple customers who were told to contact their banks to try and secure a refund, but many received them as gifts and in some cases up to a year ago. Sean Devlin, 72, from Malvern, Worcestershire, said he held a £110 five course lunch for two ticket, which he can no longer use. The retired head teacher received the voucher as a Christmas gift last year, but was told Purnell's was closed when he tried to book a table. "I have had no information at all from them," he said. "It makes me cross really. "They have had a difficult time, but so have many other people. I'm sure they have made good money over the years."

  Angela Blacker has also been left stuck with vouchers she can't use

  Angela Blacker, from Broseley in Shropshire, received the same voucher as Mr Devlin, as a present for her 60th birthday. The retiree was surprised when she discovered the gift would not be honoured. "I'm shocked at the level of customer service," she said. "We have had absolutely nothing at all. "It's not our fault he's closed the restaurant. I was really looking forward to going somewhere posh, but it's not going to happen now."

  Speaking after the restaurant closed, Mr Purnell said the eatery had been going through "a really tough time" and seen bookings fall by more than 20%. "Things have moved on and times have changed," he said. "In this current climate, no-one is bulletproof." But he hinted there could be more to come, adding: "I’m excited for the future and the next steps in my journey. This isn’t the last you’ve heard of the 'Yummy Brummie'."

  On Saturday, Mr Purnell issued a statement saying the closure was in the hands of liquidators and questions regarding vouchers must legally be addressed to them. "I have been very grateful for the support in the unfortunate and unforeseen closure of the restaurant after 17 years," he said. "We have been advised that refunds can also be requested via customers own banks and credit card companies. I can only apologise for this difficult situation." The BBC has also contacted liquidator Butcher Woods for comment.

