title: Lammy attends EU ministers meeting in Europe 'reset' - BBC News
date: '2024-10-14'
section: Europe
url: http://www.bbc.co.uk/news/articles/cdjekv9jjpno
content: |-
  David Lammy becomes the first foreign secretary since Brexit to take part in a regular meeting of EU ministers.

  David Lammy has become the first foreign secretary since Brexit to attend a regular meeting of EU foreign ministers, as part of Labour's "reset" with Europe. Lammy travelled to the meeting as a special guest of EU High Representative for Foreign Affairs Josep Borrell, to discuss the wars in Ukraine and the Middle East, and Labour's agenda. Since Brexit, British ministers meet EU counterparts only rarely - Liz Truss, the then foreign secretary, attended an emergency meeting in March 2022 in response to Russia’s full-scale invasion of Ukraine. Arriving at the meeting in Luxembourg, Lammy hailed the meeting as a "historic moment that marks our EU reset".

  He described EU and UK security as "indivisible". "At this time, whether it is the aggression of Russia in Ukraine, the tremendous issues and conflicts in the Middle East, or global affairs and geopolitical affairs more generally, it is hugely important the UK and Europe remain steadfast," he said. The Foreign Office said UK attendance at the meeting would be part of more regular engagement, with plans for closer working on international affairs. Lammy previously said the meeting would be the start of a new “habit” of UK-EU cooperation. The test will be whether all this moves beyond diplomatic courtesy to meaningful substance. Borrell said the meeting would address "how we can grow together in security issues". "We are convinced that in these dark moments with so many challenges around the world, a strong continent, because we are part of the same continent, require a strong partnership," he said. The trip follows last week's meeting between the prime minister and European Commission President Ursula von der Leyen for talks in Brussels. Sir Keir Starmer promised to offer "pragmatic, sensible leadership" as he pushed for a reset in the UK-EU relationship after the turbulence of the Conservative years. Von der Leyen said the various post-Brexit arrangements like the Trade and Co-operation Agreement (TCA), signed in December 2020, needed to be fully implemented to move forward.
