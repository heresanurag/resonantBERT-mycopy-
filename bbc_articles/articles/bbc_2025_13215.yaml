title: Men 'livestreamed' Russia-linked arson plot, court hears - BBC News
date: '2025-06-04'
section: London
url: http://www.bbc.co.uk/news/articles/cdd2p745zqno
content: |-
  Around £1m of damage was caused by the blaze at the warehouse, the Old Bailey hears.

  Damage caused by a fire at an industrial unit in Leyton

  Arsonists were "livestreamed" as they set fire to a business supplying Starlink satellite internet equipment to Ukraine after being recruited by agents for the Russian mercenary group Wagner, a court has heard. Around £1m of damage was caused by the blaze at a warehouse in Leyton, east London, on 20 March last year, the Old Bailey was told. The attack was orchestrated by Dylan Earl, 20, and Jake Reeves, 23, who have admitted aggravated arson on behalf of the Wagner Group and an offence under the National Security Act, jurors heard. Jakeem Rose, 23, Ugnius Asmena, 20, Nii Mensah, 23, and Paul English, 61, were allegedly recruited to set fire to the warehouse.

  Opening the trial on Wednesday, Duncan Penny KC, for the prosecution, said the evidence against them was "overwhelming". He said that CCTV, traffic cameras and phone evidence tracked their journey in Mr English's Kia Picanto through south London to the scene of the fire. More footage captured Mr Rose and Mr Mensah getting out of the vehicle, climbing over a wall and approaching the warehouses, jurors heard. Having filled a jerry can en route at a petrol station, Rose poured the contents onto warehouse unit doors and set them alight, it was alleged. Meanwhile, Mr Mensah filmed the arson attack on his mobile phone and "livestreamed it on FaceTime", jurors were told.

  Jurors were told that a lorry driver parked nearby was bedding down for the night at the time. He bravely but unsuccessfully tried to put out the fire, putting himself in significant danger, Mr Penny said. Eight fire crews tackled the "significant" fire on the Cromwell Industrial Estate after it broke out shortly before midnight. It caused "extensive damage" to the property and risked the lives of those nearby, he said. Mr Penny told jurors: "This was deliberate and calculated criminality - at the behest of foreign influence. "In the case of these defendants at the time of the fire they may have been ignorant of that influence and the motive may have been financial - good old-fashioned greed. "For others, however, it appears to have been both political and ideological."

  Mr Penny said the warehouse was targeted for its connection to Ukraine and the fact that the business there was involved in logistics. The firm frequently delivered goods to Ukraine, including Starlink satellite equipment and was involved in organising humanitarian aid, the court was told. Earl was said to be the "architect" of the warehouse attack. Once Reeves discovered the motivation behind it, he was prepared to agree to accept money from a foreign intelligence service to target an individual and businesses in the capital, the jury was told. Earl, of Elmesthorpe, Leicestershire, and Reeves, of Croydon, have admitted plots to set fire to the Hide Restaurant and Hedonism Wines in Mayfair, west London, and kidnapping their owner on behalf of the Wagner Group, the court heard. Mr Penny said: "You might think that it is self-evident that these actions were designed to influence the government and to intimidate at least a section of the public and furthermore were made for the purpose of advancing a political and ideological cause. "It is also relevant that at least one method of attack on the Mayfair premises discussed between Earl and Evans was by way of explosion." Mr Rose, of Croydon, Mr Asmena, of no fixed address, Mr Mensah, of Thornton Heath and Mr English, of Roehampton, have denied aggravated arson. Two other defendants, Ashton Evans, 20, from Newport, Gwent, and Dmirjus Paulauskas, 23, from Croydon, are each charged with two counts of failing to disclose information about terrorist acts, which they deny.

