  Events are taking place across the Commonwealth to mark the proclamation of King Charles III.

  Proclamation ceremonies have taken place across the UK and events across the Commonwealth to mark the new King.

  King Charles III accession to the throne was formally confirmed on Saturday at St James's Palace.
