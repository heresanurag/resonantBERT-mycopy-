title: Martial arts coach dies in Snowdonia mountain fall - inquest - BBC News
date: '2024-09-27'
section: Wales
url: http://www.bbc.co.uk/news/articles/cjd5252gjyno
content: |-
  Phil Zhu was visiting Snowdonia with his two younger brothers when he slipped on rocks.

  Phil Zhu died "almost instantly" after an accident on the mountain, the inquest heard

  A 19-year-old died "almost instantly” when he slipped on loose rock while coming down from a mountain in north Wales. Jia Jun Philip Zhu, known as Phil, from Seaforth, Merseyside, was walking on Tryfan in May with his two younger brothers when he fell down the mountain into a gulley, an inquest at Ruthin Coroner's Court in Denbighshire heard. Coroner John Gittins concluded that Mr Zhu's death was an accident. Speaking after the inquest, his family described him as a super young man who would be terribly missed by everyone who knew him.

  The hearing was told that Mr Zhu was a student and martial arts coach from the Seaforth area, who had left school at 18 and was hoping to join the RAF. He and his two brothers were in Eryri, also known as Snowdonia, on Bank Holiday Monday at the end of May. They had walked to the top of Tryfan and were descending in poor weather with low cloud. One of Mr Zhu’s brothers told police how they were trying to take a short cut, and he had ended up climbing on loose rock, but lost his balance and fell. Pathologist Dr Chloe Durrell, who did a post mortem examination, gave evidence read at the inquest that Mr Zhu had suffered unsurvivable head and spinal injuries in the fall.

  Recording a conclusion of accidental death, coroner Mr Gittins said: “He will be sorely missed by everyone. “May I send particular condolences to his two brothers who had the additional tragedy of being there, and coping with that trauma.” Speaking after the hearing Phil Zhu’s uncle, Philip Cheng, thanked the community for the support the family had received after his death. “Phil gave up a lot of time to help train young people in Mixed Martial Arts, and everyone at the gym where he was based has been amazing," he said. “They’ve raised money which we hope can help support talented young people from deprived areas to train and compete in mixed martial arts. “It will create a legacy for his work as coach. “We’re very proud of Phil. He was a special young man and a massive loss to his family and his community.”
