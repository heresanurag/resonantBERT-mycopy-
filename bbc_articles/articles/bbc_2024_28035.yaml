content: |-
  TV choirmaster Gareth Malone conducted a special choir performance to mark the occasion.

  London's tallest building has got into the festive spirit with its annual Christmas lights switch on.

  This year, The Shard worked with broadcaster and choirmaster Gareth Malone to make it extra festive, with a display inspired by the nation’s favourite carols.

  As part of the switch on, he conducted a choir performance of the top carol, We Wish You a Merry Christmas.

