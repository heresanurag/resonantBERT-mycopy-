content: |-
  A range of stories on Sunday's front pages including a fatal shooting outside a village pub in Kent.

  A police cordon at the Three Horseshoes pub in Knockholt, Kent, after police were called on Friday amid reports a woman had suffered serious injuries

  A number of Sunday's front pages touch on the latest from the Munich Security Conference. According to The Sunday Times, external, Sir Keir Starmer is preparing to overrule Chancellor Rachel Reeves, and boost defence spending as the paper notes senior military figures have been calling on the PM to raise it their budget to 2.65% of national output - which is above Labour's target. The Sunday Telegraph, external focuses on a warning to Reeves from the foreign secretary at the security conference. During a speech David Lammy hinted at Cold War levels of defence spending, which would be closer to 7% of GDP, if Russia was victorious in Ukraine. Quotes from a former head of the British army - speaking on BBC Radio 4 - makes the Mail on Sunday's, external lead with its headline "PM heading for dustbin of history". The paper says Lord Dannatt believes the armed forces have been neglected, which he describes as "embarrassing".

  The Observer, external leads on President Emmanuel Macron's plan to organise an emergency meeting of European leaders. The paper says concerns are growing about Donald Trump "side-lining allies" during Ukraine peace negotiations. "Britain's living in fear for economy" reads the Sunday Express's, external headline as the paper leads on the results of a poll by IPSOS, which suggests that only 15% of people think the Chancellor is doing a good job, and two thirds believe she was wrong to cut winter fuel payments. The Sunday People, external splashes on Kent Police investigating the fatal shooting of a woman who was shot outside a village pub near Sevenoaks on Valentine's Day. Finally, the Sunday Mirror, external leads with a report that Sarah Ferguson's former aide Jane Andrews - who killed her wealthy boyfriend Tom Cressman in 2000 by beating him in bed with a cricket bat and stabbing him in the heart with a kitchen knife - is now working to help sick animals.

