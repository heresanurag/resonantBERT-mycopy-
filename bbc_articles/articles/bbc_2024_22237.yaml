title: Ukraine drone firm Tekever's growth plan after 30 Ceredigion jobs - BBC News
date: '2024-09-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/cr4xl7xx394o
content: |-
  The company hopes to generate 200 jobs in the UK over the next three years across its two sites.

  The AR3 drone being tested at West Wales Airport in Aberporth

  A tech company that has built drones for surveillance and intelligence gathering in Ukraine plans to expand further after creating 30 jobs in mid Wales. Tekever said it hoped to generate 200 jobs in the UK over the next three years, across its two sites in Aberporth, Ceredigion, and Southampton. The company's AR3 drone, which can fly for up to 16 hours, is built and tested at Parc Aberporth near Cardigan. Earlier this year, the company's AR3 drone was featured in a Ministry of Defence announcement that £60m was being spent on new surveillance drones for the Ukrainian army.

  The drone can operate over land and sea and fly at speeds of about 45mph. It can be launched from the ground by a catapult or by it can be fitted with rotors so it can launch vertically. It lands by using a parachute and protective airbag.

