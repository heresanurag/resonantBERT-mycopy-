title: West Mercia Police officers banned after speeding ticket lie - BBC News
date: '2025-04-11'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/cyvqm62n2vlo
content: |-
  Two officers were banned from the force after breaching honesty and integrity standards.

  The officers were based in a response team at Kidderminster Police Station

  Two police officers have been banned from serving after breaching honesty and integrity standards over a speeding ticket. Sgt Harjit Singh, 48, and former PC Samuel Mitchell, 28, from West Mercia Police, were found guilty of gross misconduct and barred following a police conduct hearing on Thursday. Mitchell had activated a speed camera while driving a marked police vehicle in July 2022. When he was issued with a speeding ticket, he submitted an exemption request form claiming he had been trying to stop a vehicle involved in an incident. It was found this was not the case, he had no lawful exemption from speeding and Sgt Singh had signed the form knowing it contained false information.

  The Road Traffic Act exempts emergency vehicles from observing speed limits to lawfully undertake their duties. Deputy chief constable Rachel Jones said: "We expect our police officers to act honestly and with integrity. These officers, collectively, behaved in a way that was dishonest and abused their position. "Behaviour like this undermines public confidence in policing, and we make no apology for rooting out individuals who did not meet the standards the public rightly expect." Both Mitchell and Singh had been based in a response unit at Kidderminster Police Station. Mitchell resigned from his role in January 2024 but was told at the hearing he would have been dismissed had he not stepped down. Sgt Singh was dismissed with immediate effect, and both officers were added to the College of Policing Barred List. The Barred List prevents those added to it from ever working for a UK police service.

