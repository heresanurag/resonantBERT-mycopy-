  • None Everton have won only one of their past nine away league matches, losing five.
  • None Since Guardiola became City manager, Everton have scored more Premier League goals against them - eight - than any other team.
  • None Sane set up both of Jesus' goals on Saturday, his first two assists in the league for the Brazilian.
  • None City forward Sterling scored only his second headed goal in the Premier League, and his first since one against Sunderland in December 2015.
  • None Since the start of last season, no Everton player has scored more goals than Calvert-Lewin (13, level with Sigurdsson).

  City continue their defence of the Carabao Cup at Leicester on Tuesday (19:45) and return to the Etihad next Saturday to host Crystal Palace in their final league game before Christmas (15:00).

  Everton host Tottenham in their next Premier League game on Sunday, 23 December (16:00).
