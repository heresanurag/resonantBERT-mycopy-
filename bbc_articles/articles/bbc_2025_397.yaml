id: bbc_2025_397
title: Talbot Green disturbance puts two South Wales Police in hospital - BBC News
date: '2025-02-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy8xjmyexrxo
content: |-
  One person is arrested and people are asked to avoid the area after two police officers are hurt.

  Police investigations continue at the scene on Saturday

  A man has been arrested on suspicion of assault, arson, and criminal damage after police vehicles were damaged outside a station. Two police officers, who have since been discharged, were injured and taken to hospital after a violent struggle outside Talbot Green Police Station just before 19:00 GMT on 31 January. A third officer was injured but did not go to hospital. South Wales Police said the 27-year-old, from Llantrisant, is currently in police custody. Chief Superintendent Stephen Jones thanked the community for its support and said despite feeling "shaken", there is "nothing to suggest" a threat to the public.

  A staff member at a restaurant close to the police station said they had been told to stay inside, and that there was a "huge police presence" outside. A staff member at La Luna restaurant, who asked not to be named, said the area was taped off and that there were about 20 police cars outside. "We are all absolutely fine but it's quite distressing that something serious has happened," they said. A video shared online showed a number of police cars lined up along the street nearby.

  Videos shared online showed a number of police cars lined up along the street near the police station

  Dawn Latcham, who was in Talbot Green with her granddaughter around the time of the incident, said they saw a number of police cars with their sirens going past. "The police were keeping everyone at bay, but the whole of Talbot Green was lit up with blue lights," she told BBC News. Mohamad Osama, who works at a local takeaway, The Filling Station, said police had closed the road. Police began arriving at about 18:45 GMT, he said, adding that he did not see the man arrested. "There are three vans outside now and there are a couple of police stood talking together," Mr Osama said. "The road is closed and they are not allowing anyone through." Local MP Alex Davies-Jones, who is a minister in the Ministry of Justice, and whose Pontypridd constituency includes Talbot Green, said her thoughts were with the injured officers and their families. "I am reassured that the police are doing everything they can and continue to work tirelessly every day to keep our communities safe," she added, urging people to avoid the area. Local councillor Sarah Jane Davies said she understood the situation was "causing concern and anxiety" among the community, and she was seeking updates. She urged people to "remain calm and vigilant". The police station is close to the centre of Talbot Green, and also near the large Talbot Green Shopping Park, which is visited by thousands of people every day. Talbot Road is closed in both directions, while coach company Stagecoach Wales said it was unable to serve Talbot Green due to an ongoing police incident. Chief Superintendent Stephen Jones said: "Our officers showed great bravery and quick thinking during the altercation. I am very glad to report that none of the officers involved sustained any major injuries." "We are at the early stages of our investigations and currently the motive for this attack is unclear." He added that South Wales Police are working to "understand the full circumstances" but it is believed to be a targeted attack focusing on the police.
