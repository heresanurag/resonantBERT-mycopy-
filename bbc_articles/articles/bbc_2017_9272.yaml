content: |-
  Jason Marshall was filmed torturing 58-year-old Peter Fasoli in the victim's London home.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sadistic killer Jason Marshall, who was filmed murdering a man during a bondage sex session, has been jailed for 39 years.

  Marshall, 28, posed as an MI5 agent before torturing Peter Fasoli, 58, in his home in Northolt, west London.

  Following the January 2013 attack, he set fire to the bungalow.

  Mr Fasoli's death was thought to be due to the fire until a seven-hour recording of the night was found on his computer.

  Marshall was sentenced to life with a minimum of 39 years at the Old Bailey.

  He tortured his vulnerable victim for "sexual gratification" Judge Nicholas Hilliard QC said in sentencing.

  Jason Marshall told the jury he had no memory of what happened

  The judge described it as a "sadistic" killing.

  "You tortured him for so long because you enjoyed it so much," he said.

  "I'm sure that you can have felt no remorse whatsoever for what you have done."

  After the murder, Marshall fled to Rome using money and credit cards stolen from Mr Fasoli.

  In a further attempt to cover his tracks, Marshall continued sending messages over dating app Badoo - on which the pair had met - accusing Mr Fasoli of ignoring him and apologising for not turning up, police said.

  He was extradited after being found guilty of strangling a man to death and attacking another man in Italy.

  Less than three weeks after Mr Fasoli died, Marshall killed Vincenzo Iale, 67, using an electrical flex in his flat in Rome.

  Peter Fasoli's death was filmed on a computer in his north London bungalow

  Jurors were shown video recorded on Mr Fasoli's hard drive of Marshall tying him up, gagging him and smothering him with cling film.

  After killing Mr Fasoli, Marshall is seen "calmly smoked a cigarette".

  He then gathers his belongings, splashes a liquid round the bungalow and sets it alight, police said.

  The harrowing footage was found by the victim's nephew Christopher Murgatroyd, who examined his uncle's fire-damaged computer in November 2014 as part of research into his family tree.

  It was originally believed Mr Fasoli died in a fire in his bungalow

  The murder trial heard how former male escort Marshall stalked victims on Badoo.

  He arranged to meet Mr Fasoli on the pretext of a bondage sex session but planned to rob him.

  Marshall arrived dressed as a law enforcement agent, complete with handcuffs, holster and latex gloves.

  He "arrested" Mr Fasoli "for being a spy" and during his fake interrogation he threatened to cut his tongue with a large hunting knife to extract his PIN numbers.

  Marshall, from East Ham, east London, who is already serving 16 years for the attacks in Italy, claimed to be suffering from amnesia.

  Mitigating, Tomas Quinn said his client had a "bizarre history" of impersonating police officers, ticket inspectors and special constables.

  But he was not sophisticated, deliberate, long-term targeted or focused in his crimes, he said.

