content: |-
  Images from Joe Biden's swearing-in and first day as the 46th US President.

  Mr Biden took his oath on a Bible that has been in his family since 1893 and was also used each time he was sworn in as Delaware senator. The book itself is five inches (12.5cm) thick with a Celtic cross on the cover
