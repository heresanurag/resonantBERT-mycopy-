content: |-
  The Premier League season is almost here and with clubs having strengthened their squads for the coming campaign, BBC Sport looks at some of the new players hoping to make their mark.

  Ten new players to watch in the Premier League

  Riccardo Calafiori, Joshua Zirkzee, Savinho and Niclas Fullkrug (left to right) are Premier League rookies

  The new Premier League season is almost upon us and while that will mean the return of some familiar faces, there will also be players looking to make their mark in the competition for the first time. Some clubs have been busier than others in building for the 2024-25 season. In no particular order, BBC Sport has picked out 10 players who will be looking to catch the eye in England's top flight.

  Riccardo Calafiori played 33 matches across all competitions for Bologna last season

  Arsenal will again attempt to beat Manchester City to the Premier League title this season, and they strengthened their defensive options with the signing of Italy defender Riccardo Calafiori. The 22-year-old completed his £42m move from Bologna at the end of July. The versatile left-footer only joined the Serie A side for £3.3m last summer but swiftly became a key player, drawing interest from clubs across Europe after being one of the standout figures in a disappointing Euro 2024 campaign for Italy.

  Joshua Zirkzee struggled for first-team minutes at Bayern Munich before moving to Italy

  Another new arrival to the Premier League via Bologna, Netherlands striker Joshua Zirkzee joined Manchester United this summer in a deal worth £36.54m. The former Bayern Munich player scored 12 goals in 37 appearances in Italy last season and has been handed the number 11 shirt with the Red Devils for the coming campaign.
