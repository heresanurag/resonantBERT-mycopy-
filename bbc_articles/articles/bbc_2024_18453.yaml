  Savinho has spent time at two of City's sister clubs

  Manchester City paid £30m to sign Brazil winger Savinho from Troyes in July. The 20-year-old starred while on loan at Spanish side Girona last season as they finished third in La Liga. He made his Brazil debut against England in March and has since picked up a further six international caps. City director of football Txiki Begiristain said: "He has a big role to play for Manchester City this season and beyond. We are totally confident in his ability."

  Niclas Fullkrug is a throwback striker who West Ham hope will prove prolific

  New West Ham boss Julen Lopetegui has made several signings as he looks to reshape the side for the coming season, but the pick of the bunch could be Niclas Fullkrug. The 31-year-old Germany striker joined the Hammers from Borussia Dortmund for £27m. He scored 15 goals in 46 games in 2023-24 and finished as a Champions League runner-up. He also netted twice during hosts Germany's run to the Euro 2024 quarter-finals, despite not starting a match.

  Daichi Kamada has caught the eye in Germany and Italy

  Crystal Palace boss Oliver Glasner moved to bring in a player he was familiar with this summer with the signing of Japan midfielder Daichi Kamada. The 27-year-old joined from Italian club Lazio on a free transfer after a year in Serie A and previously played under Glasner at Eintracht Frankfurt, where the pair won the Europa League together in 2022. Kamada has been capped 33 times by his country. He scored 40 goals and recorded 33 assists in 179 appearances for Frankfurt before moving to Lazio.

  Teenager Lucas Bergvall is already a full international for Sweden

  Tottenham have invested in youth with the signings of 18-year-olds Lucas Bergvall and Archie Gray, and the former in particular has made a strong case to be a starter for the new season with a hugely impressive pre-season. The Swede has caught the eye with his creativity and ball control, producing a particularly impressive performance as a half-time substitute against Bayern Munich in a 2-1 friendly loss.

  A year in Ligue 1 has given Jake O'Brien valuable experience

  Jake O'Brien returns to the Premier League after the former Crystal Palace defender joined Everton from Ligue 1 side Lyon this summer. The Republic of Ireland international did not make a league appearance for Palace but comes back to England with top-flight experience under his belt after playing 27 games in France last season. The 23-year-old will be hoping to follow in fellow Toffee Jarrad Branthwaite's footsteps after the defender enjoyed an impressive Premier League campaign last season following a spell abroad.

  Nikola Milenkovic ended a long association with Fiorentina to try his luck in England

  Nottingham Forest are hoping to kick on this season after fighting towards the bottom of the table last term, and they have strengthened their defence with the signing of Serbia international Nikola Milenkovic. The 26-year-old joined from Italian side Fiorentina, where he made 264 appearances, scoring 17 goals. Milenkovic has 56 caps for Serbia and played in all of their Group C games at Euro 2024, including the 1-0 defeat by England.

  Liam Delap will hope for regular Premier League action at last

  Ipswich are embarking on their first season back in the Premier League after back-to-back promotions, and they will be looking to their new signings to deliver if they are to stay up. Striker Liam Delap has been brought in from Manchester City in a deal which could be worth up to £20m. The 21-year-old did make two Premier League appearances during his time at City but, after spells on loan in the Championship, he will be determined to make his mark in the top flight this term.

  Dean Huijsen caught the eye during a stint at Roma last season

  Bournemouth have invested in an exciting youngster after they signed 19-year-old defender Dean Huijsen from Italian giants Juventus. Joining for an initial £12.8m, Huijsen became the Cherries' fourth summer signing when he arrived on the south coast on 30 July. He made 13 appearances on loan for Roma in the second half of last season.
