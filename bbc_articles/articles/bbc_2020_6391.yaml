title: White House likens Trump to Churchill in WW2 - BBC News
date: '2020-06-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-52915972
content: |-
  The press secretary compares the president to the British wartime leader inspecting bomb damage.

  The White House press secretary has likened President Donald Trump's "resilience and determination" during the #GeorgeFloyd protests to Winston Churchill inspecting bomb damage during World War Two.
