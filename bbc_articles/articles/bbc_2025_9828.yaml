  Inquest opens into death of couple in cable car crash

  Graeme and Elaine Winn were said to be on their "dream holiday" in Italy when they died in a cable car crash

  An inquest has opened into the death of a British couple killed in a cable car crash near Naples. Elaine and Graeme Winn, who lived in Market Harborough, Leicestershire, died alongside two others after the cable car they were travelling in fell to the ground at Monte Faito on 17 April. Area coroner Ivan Cartwright opened an inquest into their deaths in Leicester on Wednesday. The inquest was put on hold while authorities in Torre Annunziata continue to investigate.

  The cable car crashed in thick woodland in Monte Faito, southern Italy

  Local officials previously said they believe the mountain cable car cabin plunged to the ground after one of the cables supporting it snapped. Investigators are also believed to be looking into whether strong winds could have been among the causes of the crash. Mr and Mrs Winn were keen motorcyclists and were said to have been looking forward to their "dream holiday" in Italy by fellow members of a Market Harborough bikers group, which they helped set up. Mr Winn, 64, had recently retired, while Mrs Winn, 58, worked as a business manager at Welland Park Academy in Market Harborough. A school spokesperson described her as "a much-loved and highly respected member of our school community" after her death. The couple's bodies were repatriated in the days following their deaths and a post-mortem examination was carried out in Leicestershire. But the exact cause of their deaths has been designated as "provisional pending further detail" until the investigation in Italy is completed. Mr Cartwright did not set a timeframe for the inquest to resume as the date of the next hearing will also depend on the findings of the Italian investigation. The two other victims who died in the crash were the driver of the cable car, named by authorities as 59-year-old Carmine Parlato, and an Israeli woman identified as Janan Suliman.

