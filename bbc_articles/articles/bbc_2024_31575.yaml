content: |-
  Police say Gemma Devonish, 42, was found dead at an address in Carshalton on Thursday night.

  Gemma Devonish was stabbed in Carshalton on Thursday morning

  A man has been charged with murdering a teacher who was found dead in south London on Thursday morning. Gemma Devonish, who worked as head of year at Rosebery School in Epsom, Surrey, died at the scene in Nutfield Close, Carshalton, the Metropolitan Police said. James Madden, 38, of Railton Road, Lambeth, has been remanded into custody and will appear at Croydon Magistrates' Court on Monday. The Met said detectives were not looking for anyone else in connection with Ms Devonish's death and were waiting for the results of a post-mortem examination.

  Rosebery School previously said staff and pupils were "devastated by the sudden and unexpected death". In a statement, the school said: "Our thoughts are with Gemma's mother and sister, extended family and friends, at this deeply distressing time."
