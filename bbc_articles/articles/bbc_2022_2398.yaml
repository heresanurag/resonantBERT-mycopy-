  One in 10 people testing positive during the Omicron wave were likely to have had Alpha or Delta.

  Mark and Louise Roberts said Johnson's lockdown breaches were "all there in the report" Image caption: Mark and Louise Roberts said Johnson's lockdown breaches were "all there in the report"

  At the 2019 general election, the Conservatives won Birmingham Northfield from Labour for the first time since 1992. Its MP, Gary Sambrook, is the secretary of the backbench 1922 committee.

  Two weeks ago, he said the prime minister must consider resigning if he broke the law. Last night, after the publication of Sue Gray's report , he tweeted his support for Boris Johnson.

  Shoppers in the high street of his Northfield constituency today seem split about whether this was a resignation matter.

  Labour supporter, Olivia Barnes says the PM has to go: “He’s just been completely selfish and not thought about anyone else”.

  True blue Ruby Keats (pictured with her granddaughter Cheryl) didn’t think the is was a resigning matter. “He’s done a brilliant job with the corona and all that,” she says.

  Mark and Louise Roberts think he should resign because of the lockdown breaches: “This woman’s written the report and it’s all there in the first few pages.”

  But others agree with Ruby: Simone, a lifelong Labour voter, thinks the prime minister is doing a good job, and David - who says he never voted Conservative - thinks there is no good enough alternative to take Johnson’s place.
