  In an Instagram Story shared with her 423 million followers, the most-followed woman on the app also revealed a video showing her ring to loved ones on the phone. "Yes to this," she can be heard saying, evoking screams on the other end of the video call.

  Gomez and record producer Blanco had collaborated on songs I Can't Get Enough in 2019 and Single Soon in 2023, before announcing their relationship. Blanco, who has also worked with the likes of Rihanna, Calvin Harris and Justin Bieber, was effusive about his love on the Drew Barrymore Show back in May. "She's just like the best, most genuine person," he said on the chat show. "Everything is completely real. Everyday when I wake up, I, like, walk by the mirror as I'm, like, walking to her and I ask myself, 'How did I get here'... "She's one of the sweetest, one of the most charming, one of the most humble people I've ever met." Come & Get It singer Gomez was previously in a high profile on-and-off relationship with fellow singer Justin Bieber. She also dated singer The Weeknd in 2017. The Texas-born star rose to fame as a child actress on Barney and Disney Channel, before forging a career as a singer and in acting. This year she joined the billionaire celebrity rich list, according to Bloomberg, amassing a $1.3bn (£1bn) fortune - mainly deriving from her Rare Beauty make-up company.

  On Monday, she received two Golden Globe nominations - one in the best supporting actress category for her role in operatic musical Emilia Pérez and the other for best actress in a TV series, musical or comedy, for her recurring role in Only Murders in the Building.
