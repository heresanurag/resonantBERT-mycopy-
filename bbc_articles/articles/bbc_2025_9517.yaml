  The Liverpool-based reality tv star will co-host the Early Breakfast show with Nat O'Leary in May.

  Minah Shannon will co-host BBC Radio 1's Friday Early Breakfast with Nat O'Leary in May

  The Traitors star Minah Shannon is joining BBC Radio 1 as a presenter. The Liverpool-based reality TV personality will co-host Friday Early Breakfast with Nat O'Leary throughout May. Minah said she hoped to "brighten up listeners' mornings" on the show, which is broadcast between 05:00 and 07:00. The duo will present a special show live from Liverpool on 23 May to help kick off the Radio 1 Big Weekend 2025 celebrations in the city.

  Thirty-year-old Minah became a fan favourite and was the longest-standing Traitor of the 2025 series. During her time on the show, fans watched as she tricked the 'faithful' contestants by banishing fellow traitors Armani and Linda. Her performance took her all the way to the final episodes, only voted out two days before the final. Her move of recruiting Charlotte to be a fellow traitor was ultimately her downfall, as at Minah's final round table, it was Charlotte's vote which sealed her fate and saw her banished from the castle. Minah currently works as a call centre manager in Liverpool, where she lives with her husband Liam and daughter Luna.

  Minah Shannon was the longest-standing traitor on this year's series

  "I am so excited to be presenting every Friday in May on Radio 1's Early Breakfast," Minah said. "Getting to present alongside Nat O'Leary is going to be so much fun. "We discovered we both attended the same university and used to hang out in all the same places, so it feels like it was meant to be. "If we can give the lovely listeners a laugh, then mission accomplished!" O'Leary said she was "excited" to be joining Minah on the show. "Minah's energy is electric, so I know we're gonna cause some chaos and bring some fun to your Friday early mornings," she said. "Can't wait to wake up with you babes!"

  In June, the same slot will be presented by Lauren Redfern. Lauren joined the Radio 1 Anthems extension in November 2024, having impressed through her work with the Student Radio Association network. Her first show will be on 6 June. Aled Haydn Jones, Head of Radio 1, said: "The Friday Early Breakfast slot has become a key platform for emerging presenters to find their voice and connect with the Radio 1 listeners. "I'm really excited about this next wave of presenters – Minah and Nat will be a great team in May, and I'm looking forward to welcoming Lauren to the slot in June."

