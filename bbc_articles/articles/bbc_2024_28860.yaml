content: |-
  As part of the release of movie Wicked, actor Jeff Goldblum performed Christmas songs for commuters.

  Celebrating the upcoming release of movie Wicked, in which he plays the Wizard, Goldblum performed Christmas songs on the piano.

  But it is not the first time Goldblum has performed for commuters at St Pancras, in September 2018 he tinkled the ivories while describing London as one of his "favourite places on earth."

