title: 'Watch: Rescuer swims through rough seas to save stranded dog - BBC News'
date: '2023-06-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65929634
content: |-
  The dog's owner says she is doing well after she fell off a cliff and was rescued by the coastguard.

  Footage released by US Coast Guard shows a crew member swimming through rough seas to rescue a dog trapped on a beach

  The German Shepherd was injured after falling about 300ft (90m) down a cliff, and ended up trapped on an inaccessible beach in Oregon’s Ecola State Park.

  The dog was airlifted from the beach and returned to her owner, who after a visit to the emergency vet told the Coast Guard that she is “doing just fine."
