  Scott McTominay scored the only goal of the match as Steve Clarke's side claimed a vital first leg win in the tie. Greece visit Hampden on Sunday for the return leg. Paige Mackintosh, who was also at Athens Airport, said from her point of view half the Tartan Army were still in bed when the Heathrow news broke. "Everyone is in quite good spirits," she said. "I think because it's not like a baggage strike. "It was a really good game, a really good build up that we had."

  A fire at an electrical substation in West London has forced a total shutdown at Heathrow Airport

  More than 1,300 flights will be disrupted after a transformer within the North Hyde electrical substation caught fire in west London. It caused a power outage at the airport, with flights grounded as a result for safety reasons. The backlog is expected to last several days. About 120 flights to the airport were in the air when the closure was announced. They were diverted to various locations across the UK and Europe, including a flight from JFK, which landed at Glasgow Airport. A spokesperson for Heathrow said they did not know when electrical supplies would be restored. Travel writer Simon Calder told Good Morning Scotland the scale of the shutdown was the largest since the Icelandic volcano eruption in 2010.

  BA flights between Scotland and London's Heathrow airport have been cancelled due to a fire

  A spokesperson for Edinburgh Airport said 10 outbound and 12 inbound services had been affected by the fire. They added that BA flights were the only services to be grounded and all others were operating normally. About 2,800 passengers are understood to be affected. Glasgow Airport has activated its "plan 39" protocol, meaning spare slots at the airport are allocated based on need. Glasgow has taken five flights in this morning, two from Virgin Atlantic and three BA transatlantic services. A spokesperson for AGS Airports, which operates Aberdeen and Glasgow Airports, said: "Our airports are operating as normal apart from all flights to and from London Heathrow which have been cancelled for the remainder of the day. "Any passenger scheduled to fly to Heathrow should contact their airline directly before travelling to the airport"

  Scotland fans travelling back from the Nations League play off in Greece are among the passengers affected

  Meanwhile, Highlands and Islands Airports Limited (HIAL), which runs Inverness Airport, confirmed the 10:00 arrival from Heathrow and the 11:05 departure to the airport were cancelled. HIAL also said planned arrivals and departures from Dundee Airport to Heathrow on LoganAir had been cancelled. All airports will be liaising with the National Air Traffic Service (NATS) about accepting flight diversions throughout the day.

  Rory Boland, editor of Which? travel said passengers may not be entitled to compensation if their flight was cancelled. However they may be able to claim a refund for the flight and parking fees through their insurance provider. He said: "Passengers will have the choice of being rerouted or accepting a refund, and if you opt for the former, your airline is obliged to get you on a new flight as soon as possible, including with rival carriers from alternative airports. "If you instead accept a refund, be aware that your airline will have no further duty of care to you and you'll need to make your own arrangements. "It's also worth checking the terms of your travel insurance to see if you are able to recoup any other expenses you may have incurred as a result of this incident, such as car hire or airport parking fees."
