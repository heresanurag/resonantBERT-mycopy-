title: 'Heathrow fire: Scotland fans stuck in Greece ''staying for a party'' - BBC
  News'
date: '2025-03-21'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cly6e24q8glo
content: |-
  Flights from Edinburgh, Glasgow and Inverness to and from Heathrow have been grounded because of a substation fire.

  Gavin Keith and Edith Stewart said they were not confident they would get home by tomorrow.

  Scotland fans have been stuck in Athens following the side's 1-0 win over Greece after a fire near London's Heathrow grounded all flights. Supporters returning to Scotland from the Greek capital have had to find alternative routes home via Dublin, Milan and Istanbul due to disruption caused by an electrical substation blaze. British Airways services from Edinburgh, Glasgow and Inverness to Heathrow - which is Europe's busiest airport - have also been affected. But the Tartan Army remain in good spirits as a result of the side's victory - with some saying they'll stay in Greece for a celebration.

  Passengers are advised to check whether their flights have been affected and contact the airline for further details.

  Gavin Keith and Edith Stewart, from Aberdeen, only found out about the disruption when they woke up in Athens on Friday morning. They were part of a group booking back to Aberdeen via Heathrow on a BA service. They have since been told they will be on a 17:00 flight to Heathrow, but are not confident that will go ahead. However they remain in good spirits. "If we can't get out of here tonight, we'll stay for a party," Edith said. "It's the chance you take when you are travelling. I would prefer to get home tonight or tomorrow because I have commitments at home. "We know Heathrow is shut all day, the airlines are giving us the next available flight, but it's just a case of waiting."

  BBC journalist Thomas Mackintosh had been due to fly into Heathrow after watching the victory at the Georgios Karaiskakis Stadium. He told BBC Radio's Good Morning Scotland fellow fans had been looking for alternative ways to get home. He said: "We've heard some pretty wacky routes so far from friends of ours. Some are going via Dublin, some are going via Rome, Milan, Istanbul I've heard as well. "It's inconvenient for sure, but it can't be helped at the minute and the Greek authorities have been really helpful. "Fortunately we have been able to book on another flight, but that has come at a bit of an expense, about €500 (£418)."

  Graeme Shinny from Aberdeen has paid £500 for a flight from Athens to Dublin at 21:30. He'll arrive in Ireland at around midnight before an overnight stay in the airport. He told BBC Radio Scotland's Drivetime programme: "I've made the most of my extra day in Athens, I have done a bit of sightseeing and bumped into lots of people in the same boat as me. "Some aren't in a particular rush to get back. For me, I had to get back." He hopes to be back in Aberdeen at 09:30 on Saturday in time for the Scotland v Greece second leg on Sunday and his son's birthday on Monday.

