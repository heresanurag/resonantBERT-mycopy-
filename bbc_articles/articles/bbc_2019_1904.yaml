title: Trump and Kim meet for Vietnam summit - BBC News
date: '2019-02-27'
section: General
url: http://www.bbc.co.uk/news/world-47389460
content: |-
  The US president and North Korean leader shook hands at the start of their summit in Vietnam.

  US President Donald Trump and North Korea's leader Kim Jong-un have met at the start of their high-profile summit in Vietnam's capital, Hanoi.
