title: 'Killamarsh deaths: Police continue murder investigation - BBC News'
date: '2021-09-21'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-58636001
content: |-
  Terri Harris and her children Lacey and John Paul were found dead with Lacey's friend Connie Gent.

  Tributes have been flooding in from the community and beyond

  Police are continuing to question a man over the deaths of three children and a mother at a house in Derbyshire.

  The community of Killamarsh has rallied round after the bodies were found in Chandos Crescent on Sunday morning.

  Fresh flowers have been placed near the house and a fundraiser for the families has raised more than £16,000.

  A 31-year-old man, who was known to the family, was arrested on suspicion of murder and remains in custody, said Derbyshire Police.

  The force also revealed the man was taken to hospital with self-inflicted minor injuries after being arrested at the property.

  Officers were called to the house at 07:26 BST on Sunday after concerns were raised about the safety of a man.

  Terri Harris, 35, and her two children Lacey, 11, and John Paul, 13, were found dead alongside Connie Gent, also 11.

  It is believed Connie, from Sheffield, was Lacey's friend and was visiting for a sleepover.

  John Paul and Lacey's father Jason Bennett said "life will never be the same again"

  The grandmother of John Paul and Lacey has thanked everyone who has paid tribute to them and laid flowers.

  Diane Bennett who visited the scene again on Tuesday said: "There are so many people bringing flowers, teddy bears.

  "At the moment it's my son I'm worried about. I know we've lost somebody but he's lost even more.

  "I just wish we could have done more. It's horrible."

  Outwood Academy City, where the three children studied, said their memories would "live on forever".

  In a statement, the Sheffield school said: "The children had bright futures ahead of them but sadly none of us will get to see this.

  "Lacey and Connie had just embarked on their secondary school journey with us and already made a positive impression on everyone they came into contact with.

  "John Paul was a popular and polite young man, well-liked by staff and with a close-knit group of friends."

  The school said specialist support was available for those who need it.

  Lacey and John Paul's mother Terri Harris was also found dead at the house

  Speaking to Sky News at the scene on Monday, Jason Bennett, father of Lacey and John Paul, said: "I'm broken, I just want to kiss my babies.

  "I just want to kiss them and hold them. TikTok Queen and my beautiful boy, they were beautiful."

  About 300 people from the Killamarsh community gathered at Baker Park near Chandos Crescent on Monday night for a vigil.

  They left candles, flowers and teddies around a post in the centre of the children's playground.

  Mourners also left flowers and teddies alongside the candles

  Residents have also continued to lay similar tributes under the street sign at Chandos Crescent, which remains closed while police investigations continue.

  A fundraiser for the families has raised more than £16,000 in less than a day, with more than 1,200 people donating.

  Organiser Cassie Perry, from Northampton, said she saw the news on Facebook and was "devastated" by what she read, so decided to set up the fund to help with costs.

  "The last thing anyone wants to worry about at a time like this is finances," the 22-year-old said. "No amount can take away the pain but we can at least try to help in any way we can."

  The pile of flowers and tributes continues to grow

  Derbyshire Police has set up an online portal for people to report information or send video footage which could help their investigation.

  Det Ch Insp Sally Blaiklock, who is leading the investigation, said: "Myself and the team of the detectives are particularly keen to hear from anyone who was in Chandos Crescent between 18:00 on Saturday and 07:00 on Sunday, as well as anyone who may have video footage of the street.

  "That can include dashcam, mobile phone, CCTV or video doorbell footage."

  She said the road would remain closed and residents would see an increased number of officers in the area in the coming days.

