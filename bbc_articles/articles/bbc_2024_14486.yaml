title: Father of Israeli hostage died one day before son's rescue - BBC News
date: '2024-06-09'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c3ggz960040o
content: |-
  Yossi Jan's health deteriorated over the eight months his son was held hostage in Gaza, relatives say

  Father of Israeli hostage died day before son's rescue, relative says

  Almog Meir Jan embraces a family member after his rescue from Gaza

  The father of an Israeli hostage rescued during a military operation in Gaza died a day before he could be reunited with his son, a relative has said. Almog Meir Jan, 22, was held in Gaza for eight months after being kidnapped from the Nova music festival on 7 October. He was one of four hostages who were rescued from central Gaza on Saturday, in an air and ground raid that also killed scores of Palestinians. In the months before Almog's release, the health of his father Yossi deteriorated and he was "glued to the television", his sister Dina told Israeli broadcaster Kan. "He was worried that he (Almog) was in the hands of murderers and about what was happening to him and what he was going through," Ms Jan said. Yossi Jan is believed to have died of a heart attack. “My brother died of grief and didn’t get to see his son return," Dina Jan said. The rescue of Almog Jan and three other hostages was met with jubilation and relief in Israel, as Prime Minister Benjamin Netyanhu praised special forces for operating "creatively and bravely". But the humanitarian toll of the operation, which included a barrage of Israeli airstrikes, has sparked condemnation.

