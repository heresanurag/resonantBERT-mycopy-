  Gaza's Hamas-run health ministry said 274 people were killed in the operation. If confirmed, it would make it one of the deadliest days in Gaza since the beginning of the conflict. A Israel Defense Forces (IDF) spokesperson said the death toll was fewer than 100. Qatar's Prime Minister called for an intensification of global pressure on Israel to stop its "barbaric aggression" in Gaza, during a summit in Doha on Sunday. The European Union's top diplomat, Josep Borrell, condemned the killings as "another massacre of civilians". An Israeli minister said that instead of condemning Hamas for hiding behind civilians, the EU had condemned Israel for saving its citizens. Israeli forces, backed by air strikes, fought intense gun battles with Hamas in the Nuseirat area, in what the Israel Defense Forces called a "high-risk, complex mission" based on "precise" intelligence.

  Anti-government protesters were on the streets of Tel Aviv again on Saturday night

  In addition to Almog Meir Jan, hostages Noa Argamani, 26, Andrei Kozlov, 27, and Shlomi Ziv, 41, were rescued during the operation. Some 116 people kidnapped in October remain in captivity. More than a third of them have already been confirmed dead, but that number is thought likely to be higher. Benjamin Netanyahu visited the four returned hostages in hospital, telling one "we didn't give up on you for one moment". “We expect Hamas to release them all. But if they don’t, we will do whatever it takes to get them all back home," Mr Netanyahu said outside hospital. On Sunday, Gaza's Hamas-run health ministry said 37,084 people had been killed since the beginning of the conflict.
