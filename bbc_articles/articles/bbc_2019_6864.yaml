title: Man falls out of window and lands on woman in Edinburgh street - BBC News
date: '2019-06-10'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-48581327
content: |-
  They were both taken to Edinburgh Royal Infirmary where the man is being treated for serious injuries.

  A man has fallen from a window in Edinburgh, landing on a woman in the street below.

  The incident happened at about 17:00 on Sunday in Duke Street.

  They are both in Edinburgh Royal Infirmary where the 55-year-old man is seriously injured. The condition of the woman, in her 60s, is unknown.

