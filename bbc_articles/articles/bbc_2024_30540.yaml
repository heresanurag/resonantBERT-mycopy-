title: Salford woman died after 'barbaric' butt lift surgery - coroner - BBC News
date: '2024-12-12'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cjwl2jnvn1wo
content: |-
  Demi Agoglia, 26, travelled to Turkey after seeing social media adverts for the butt lift procedure.

  A mum of three who died after a Brazilian butt lift (BBL) procedure had undergone a "frankly barbaric medical practice" in which she gave no informed consent, a coroner has concluded. Demi Agoglia, from Salford, had travelled to Turkey for the procedure in January after seeing social media adverts for Comfort Zone, based in Istanbul. The 26-year-old died in a hospital in Istanbul on 8 January three days after the operation and a catalogue of poor care, an inquest heard. Bolton coroner John Pollard found she died from a microscopic fat embolism, caused when injected fat enters the bloodstream, and ruled she died as a result of "misadventure contributed to by neglect".

  Her mother, Christine Tydd, said she had told her daughter she was a "good looking girl" and did not need the operation shortly before she travelled to Turkey on 4 January with her partner, Bradley Jones. "She was conscious about the way she looked. There was no changing her mind," she told the hearing. Landscaper Mr Jones said he also did not want Ms Agoglia to have the surgery, but she had booked the trip months earlier after "she had seen some celebrity" advertising the procedure. The BBL procedure sees fat taken from elsewhere on the body and injected into the hips and buttocks. Mr Pollard said: "I find there was no proper informed consent in this matter, there was no proper pre-operative care and advice, and no proper post-operative care. "All of this meant the care in total fell well below the standard expected of this type of treatment and the lack of care contributed significantly to Demi's death."

  Demi Agoglia collapsed at the villa she was staying at in Instabul the day after having the procedure

  The day after the surgery, Ms Agoglia told her mum: "I've got the bum I always wanted". The next day her mum got a text from her partner saying: "She's gone." Mr Jones told the inquest that following the operation Ms Agoglia was "shaking" and appeared "very, very cold". Staff from Comfort Zone, who the coroner said it later emerged were not qualified nurses, were called to the villa Ms Agoglia was staying in after she complained of a tight chest. They checked her blood pressure but did not inspect the area of the operation or check her heart rate and pulse, the inquest heard. Ms Agoglia collapsed at the villa the following day and was taken back to hospital where she died.

  Her sister, Chloe, said in a statement read by a family friend, Ellie Foulkes, outside court, that the family were going through "the worst possible heartbreak". "Our Demi was a beautiful, outgoing, very confident girl and she didn't need the surgery at all. "She went for the sake of her feeling like she wasn't good enough in herself," she said. "Our Demi hasn't just left her family behind she has left the most beautiful little boys. "Forever and always in our heart Demi." She urged people to do "more research" if they were thinking of going to Turkey for surgery. But a spokesman for Comfort Zone said Ms Agoglia was "thoroughly informed of the risks involved with cosmetic surgery" and said claims staff were unqualified were "categorically untrue" and that "all staff members are fully qualified nurses, trained to manage post-operative care". The coroner told Ms Agoglia's family he would write to Health Secretary Wes Streeting. "I do feel something further needs to be done to stop this frankly barbaric medical practice being conducted to such low standards that would certainly not be tolerated in the UK," he added. A Department of Health and Social Care spokesman said: "Our thoughts are with Demi's family and friends at this difficult time. "It is unacceptable that people's lives are being put at risk by inadequately trained operators in the cosmetic sector. The government is urgently exploring options for further regulations in this area. "The safety of patients is paramount, and we would urge anyone considering cosmetic procedures to consider the possible health impacts and find a reputable, insured and qualified practitioner."
