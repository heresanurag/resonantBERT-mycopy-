title: Carlos Alcaraz 'does not support' PTPA lawsuit against tennis governing bodies
  - BBC Sport
date: '2025-03-20'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/c8d427386zjo
content: |-
  World number three Carlos Alcaraz says he does not support the legal action being taken against tennis' governing bodies by the players' union co-founded by Novak Djokovic.

  Alcaraz says he was unaware of the lawsuit before seeing the statements on social media

  World number three Carlos Alcaraz said he does not support the legal action being taken against tennis' governing bodies by the players' union co-founded by Novak Djokovic. The Professional Tennis Players' Association (PTPA) filed papers on Tuesday criticising the schedule, ranking systems and control over image rights. The lawsuit seeks an end to what it describes as "monopolistic control" of the tennis tour, as well as financial compensation from the ATP, the WTA, the International Tennis Federation (ITF) and the International Tennis Integrity Agency (ITIA). "It was surprising for me, because no one had told me about it," Alcaraz, 21, told reporters at the Miami Open. "There are things I agree with and there are other things I don't agree with. The main thing is I don't support what was done." The ATP Tour, the men's professional body, has been critical of the advocacy group, saying it was guilty of "division and distraction" while the WTA, which oversees the women's tour, called the lawsuit "regrettable and misguided".

  The complaint is being brought by the PTPA and 12 players - including Djokovic's co-founder Vasek Pospisil and Nick Kyrgios. They say the action is acting "on behalf of the entire player population". The lawsuit has accused governing bodies of disregarding player welfare and included a quote from four-time Grand Slam champion Alcaraz, who criticised the hectic calendar last September. "Yesterday I saw on social media that they put something I said in a press conference in the documents and I wasn't aware of it. I honestly don't support that letter, because I wasn't aware of it," Alcaraz said. Formed in 2020, the PTPA wants to increase the amount of control players to run the game and reduce the role of the governing bodies. It says the governing bodies act as a "cartel" by forming agreements with tournaments that cap prize money. It has also described the ranking points system as "draconian".
