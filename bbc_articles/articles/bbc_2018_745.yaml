id: bbc_2018_745
title: 'Californian mudslides: ''Like a World War I battlefield’ - BBC News'
date: '2018-01-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42630378
content: |-
  A distraught mudslide survivor tells how he pulled a baby from under four feet of debris.

  "Waist-deep" mudslides in southern California have killed at least 13 people and thousands have fled the area.

  Officials say heavy rains that triggered flooding my have caused the deluge.
