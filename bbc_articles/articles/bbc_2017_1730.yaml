  Angelina Jolie and her family try some of Cambodia's delicacies.

  Angelina Jolie is in Cambodia to promote her new film First They Killed My Father, which is based on the country's genocide.

  Yalda Hakim met up with the actress and her children to try some of Cambodia's unusual delicacies.
