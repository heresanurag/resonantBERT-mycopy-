id: bbc_2020_10439
title: Scammers selling fake driving licences online - BBC News
date: '2020-09-11'
section: General
url: http://www.bbc.co.uk/news/uk-54112631
content: |-
  A scammer explains to Kafui Okpattah how the fake licence scheme works.

  Scammers on social media who claim to work for the Driver and Vehicle Licensing Agency are selling "full driving licences" for £600, a BBC News investigation has found.

  Kafui Okpattah got one suspected scammer to explain to him how he could obtain a licence without having to attend the test.

  The Driver and Vehicle Standards Agency - which has responsibility for driving tests - has said the scheme is not possible.
