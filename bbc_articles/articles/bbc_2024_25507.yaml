  One distinct memory is when her parents surprised her with tickets to The X Factor live tour, she said it was "crazy seeing them in the flesh". She added that the day after the concert at school people brought in their signed merchandise and showed their pictures. "Definitely in primary school it [the fandom] was like how the Swifties are." She went on to see the band multiple times, dropped to the floor when Zayn Malik left the band and was equally upset when the group split. Despite not seeing Payne in concert as a solo artist, the now 21-year-old still felt connected to him because he felt like part of her childhood. "He's always been a constant part of my life. It's quite nostalgic listening to those songs and takes me back to when you are younger. Because of that I feel a big piece of myself has sort of gone."

  Izzy Hawksworth says she remembers voting for the band every week on The X Factor

  One Direction superfan Faith May, 21, from Surrey, said she cried when heard about Payne's death, with the news coming as an "awful shock". She remembers watching the video diaries of Payne and the group on The X Factor and learning about their different personalities. "A lot of people will be like it's just a celebrity, but it's not true... it's like going through the stages of grief for someone you love - it's exactly the same." As a girl, Faith admitted to being "obsessed" with the boyband. She said: "One Direction wallpaper, I had a One Direction hairdryer, anything you can think of. "They had a 1D Day - a whole day for One Direction - and I remember staying up all night, it was such a big thing. "The hold they had over young girls, young people, and even mums and dad - it was a worldwide sensation." She also remembers begging her dance teacher to dance to Payne's first solo single Strip That Down, and admits she had been living in hope there would be a One Direction reunion at some point. "How can this happen to someone so young and so successful, with so much more to give? We are united in heartbreak."

  Faith May, top right, says she saw the group four times in concert

  Eleanor, from Middlesbrough, said she was a One Direction "fan girl" in primary school. "We would go around on the playground and talk about our crushes from the band," she said. For the then nine-year-old, Payne was her celebrity crush. "I had a One Direction backpack I think, probably the odd t-shirt, but sure I can remember the blow-up sofa which had all the members' faces on it," she said. The college student said after the band split listening to Payne's solo music while playing video games helped her to relax. The 18-year-old also described how she was looking forward to a reunion and said she found Payne inspiring for being quite open about his battle with addiction. "Even though he might be seen as a controversial person, it is a tragedy, and I do feel sorry for everyone who looked up to his band, his family and friends."

  Payne granted Beth Lewis's wish to sing to One Direction

  Beth Lewis, from Darlington, was six years old in 2014 when Payne made her wish come true - to sing to him and One Direction. Beth has a heart condition and Payne had been an ambassador of the children's charity Rays of Sunshine, which aims to brighten the lives of seriously ill children by granting them wishes. Now 16, remembering the day she said: "I also got tickets to a concert afterwards to go with my mam and dad. "It was thrilling. The thought of me being there singing with them was an utter pleasure. "Me and Liam also share the same birthday (29 August) so I will 100% be celebrating his birthday next year in memory of him." Speaking of the event for sick children, her mother Nicola said: "They invited her down on the little stage and, yeah, she sang a song with them – one of their songs – and she was the lead singer and they were like the backing singers and it was lovely. “It’s really sad to hear Liam has lost his life for whatever reason.” Jane Sharpe, trustee at Rays of Sunshine, said Payne "through his unwavering kindness" brought so much joy to the lives of the seriously ill children whose wishes he helped the charity grant. "His legacy will live on in the cherished memories he helped create," she added.

  Jo Shatford met Liam on her honeymoon and the moment ended up being captured in the One Thing music video

  Angharad Binns, from Stevenage, met Payne and the group in their early days. "On my 30th birthday I saw them coming out of Yo! Sushi with their manager," the One Direction fan said. "I was like: 'Oh my gosh! This is amazing'." But despite their manager saying she could not take a picture, it was Payne and Harry Styles who convinced him otherwise as it was her birthday. "Liam was really lovely. He stood out as very down to earth and appreciative. "They hadn’t released any music yet so we got to chat a while." Jo Shatford, from Bristol, also had a chance encounter with Payne whilst on her honeymoon in London. At the time the group were filming the One Thing music video. "I saw a gaggle of girls around and realised they were filming the music video," she said. "I managed to get a picture with Liam. He was very nice. He gave me a lovely photo and told me it was nice to meet." Jo then featured in the music video. Despite not being a superfan, she says meeting Liam and being in the video is her fun fact till this day. "Whenever the song comes on in public, my son tells people that mum is in the music video!"
