  Fans pay tribute to the One Direction singer, with many saying he played a prominent role in their childhood.

  'He was a big piece of my life': Your tributes to Liam Payne

  For many of those paying tribute to Liam Payne, the One Direction star reminded them of their childhood. The boyband played a large part in their lives as children and teenagers, and because of this Payne's death at the age of 31 has come as a shock to them. Fans of the singer have been speaking to BBC News with their thoughts.

  Izzy Hawksworth, from Sheffield, said she is in shock over the death of Payne who was a "big piece" of her life. As an eight-year-old she came to love the boyband, watching and voting for them every week on The X Factor in 2010. She also remembers downloading their weekly performances to her Nokia "brick" phone.

