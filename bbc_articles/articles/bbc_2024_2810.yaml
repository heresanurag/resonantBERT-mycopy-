id: bbc_2024_2810
title: Killers Scarlett Jenkinson and Eddie Ratcliffe jailed for murder of Brianna
  Ghey - BBC News
date: '2024-02-02'
section: UK
url: http://www.bbc.co.uk/news/live/uk-68135818
content: |-
  Scarlett Jenkinson and Eddie Ratcliffe, both 16, stabbed the teenager to death with a hunting knife in a park near Warrington.

  Parole board will decide if pair can ever be released, judge says

  Mrs Justice Yip tells Scarlett Jenkinson, "a huge amount of work will need to be done with you first" if she is ever to be released. She says the hope remains that this "can happen" and says Jenkinson should work hard on her rehabilitation. Now addressing Eddie Ratcliffe, she says that her analysis of his offences differ from what was included in Ratcliffe's pre-trial report. The judge says she is confident Ratcliffe's autism does not provide any real defence for the murder. This, his severe anxiety and selective mutism, however, has made his experience of custody "more difficult". She says he has managed to pass his GCSE while in custody, and began studying for his A-levels. Ratcliffe showed no remorse at the trial, she says, but the pre-sentence report did show some insight into Brianna's family's feelings. The judge adds that Ratcliffe is "capable of thinking about the consequences" of his actions. The judge goes on to say that she thinks there is a chance that Ratcliffe could be rehabilitated and his behaviour in custody was been good. Justice Yip says the aggravating and mitigating features mean that the pair will receive different length sentences. The parole board will have to decide if and when they can be released, she says, "if they no longer pose a danger".
