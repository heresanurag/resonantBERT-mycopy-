title: 'E-bikes: eBay to ban private sales over fire safety concerns - BBC News'
date: '2024-10-08'
section: Technology
url: http://www.bbc.co.uk/news/articles/c5ywq8xgkkyo
content: |-
  The platform will clamp down on the sale of e-bikes and e-bike batteries in the UK from 31 October.

  EBay will clamp down on the sale of e-bikes and e-bike batteries in the UK from 31 October, the BBC has learned. The firm says that only "eligible business sellers" will be allowed to list them after this date. It did not explain what the necessary criteria would be. E-bikes, which have electrically-assisted pedals and are battery-powered, have soared in popularity, but incidents involving battery fires have also risen.

  The London Fire Brigade recently said it recorded 155 e-bike fires in 2023, up by 78% from the previous year. The brigade warned e-bike users to check their batteries after battery packs were officially classed as "dangerous" products by the UK's regulatory body. In June, a coroner also called for government action after the death of a man whose home caught fire when an e-bike battery pack he was charging overheated and ignited. "Consumer safety is a top priority for eBay," an eBay spokesperson said on Tuesday. Earlier this year, it said it would also audit sellers to make sure they had the CE mark for safety documentation for listed e-bike products. A quick look at the eBay platform reveals nearly 3,000 used e-bikes currently for sale in the UK. The charity Electrical Safety First said it welcomed the firm’s change in policy. But it suggested that new laws were also needed because of the fire safety risks posed by the vehicles. "Whilst this voluntary move is welcome, we continue to call for online marketplaces to be legally obligated to take reasonable steps to ensure products sold via their sites are safe," said a spokesperson. The Product Regulation and Metrology Bill, which is currently making its way through Parliament, could potentially enforce this in future.
