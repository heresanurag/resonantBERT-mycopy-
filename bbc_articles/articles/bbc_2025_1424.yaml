title: 'Knockholt: Suspect rang friend after Lisa Smith shooting - BBC News'
date: '2025-02-19'
section: Kent
url: http://www.bbc.co.uk/news/articles/cedl10yveeqo
content: |-
  The man thought to have shot Lisa Smith on Valentine's Day is Edvard Stockings, the BBC understands.

  This video can not be played To play this video you need to enable JavaScript in your browser. Gunshots heard on CCTV at time of Kent shooting

  The man suspected of fatally shooting his wife, Lisa Smith, outside a pub in Kent called friends after it happened and revealed what he had done, the BBC has been told. Edvard Stockings, also known by the surname Smith, called Leslie Thompson less than two hours after the shooting outside the Three Horseshoes pub in Knockholt and told him: "She's dead, I love you. I'll see you on the other side." Mr Thompson said the call had convinced him Mr Stockings shot his wife after having a breakdown. Police said officers believed Mr Stockings then drove to the Queen Elizabeth II Bridge, near Dartford, and entered the River Thames.

  His body has not been found after more than three days of searches along the river.

  Ms Smith, 43, was shot dead at the Three Horseshoes pub in Knockholt

  Ms Smith, 43, was shot dead in the car park of the pub shortly after 19:00 GMT on Valentine's Day. A CCTV camera nearby captured the sound of three gunshots, followed by shouting and screaming. Mr Thompson told the BBC that his phone rang at around 20:50, and Mr Stockings told him: "I can't live, we've all gone together" and that "armed police will probably shoot me." Police said call handlers had received reports of a man "on the wrong side of the barrier" on the bridge at 22:15 on Friday. In a statement on Monday the force said he had "fallen" into the river. The search operation has involved the Coastguard, RNLI, London Fire Brigade drones and a Metropolitan Police boat team. A car and gun, linked to the suspect, were found "next to the Dartford crossing", police said. They added that the car was found on the bridge.

  A large number of police officers have been at the scene since the shooting

  Those close to the couple said they were "bewildered" by their deaths, another friend said on Monday. Ms Smith, who also used the surname Stockings, leaves behind two children - one of them in his 20s, the other younger. A family social media post paying tribute to the couple has received hundreds of comments, with friends and relatives saying they are "heartbroken".

  Tributes to Lisa Smith, 43, have been left outside the pub in Knockholt

  Mr Thompson said he had known Mr Stockings for more than 30 years and the shooting did not make sense, adding: "They were both the life and soul of the party. We really don't know why he has done it. I'm baffled." He added that Mr Stockings was "unbelievably close" to his father and had been deeply affected by his death two years ago. "He's had a breakdown," Mr Thompson concluded, adding he was "one million percent sure... [Mr Stockings is] in the river."
