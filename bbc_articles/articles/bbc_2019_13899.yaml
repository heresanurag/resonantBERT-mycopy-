  • None City have been shown more red cards in their 18 games in all competitions this season (3) than they were in 61 games last term (2)
  • None This was Guardiola's 600th game in charge of a top-flight club in all competitions (W440, D95, L65)
  • None Six of Sterling's 19 Champions League goals have been against Italian sides, more than he's scored against opponents from any other country in the competition.
  • None Bravo became the first substitute goalkeeper to be sent off in Champions League history
  • None Gabriel Jesus has missed three of his seven penalties taken in all competitions for Manchester City, with this his first failure in the Champions League

  Manchester City travel to Anfield for a crucial Premier League fixture against leaders Liverpool on Sunday (16:30 GMT), hoping to close their six-point gap at the top. City are back in European action on Tuesday, 26 November when they host Shakhtar Donetsk at Etihad Stadium.
