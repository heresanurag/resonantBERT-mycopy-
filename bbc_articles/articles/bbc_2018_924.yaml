id: bbc_2018_924
title: 'John Worboys: Government to review victim communications - BBC News'
date: '2018-01-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-42623651
content: |-
  Improvements to how victims are told about attackers being freed will be looked at.

  John Worboys is believed to have carried out more than 100 rapes and sexual assaults on women in London

  A government review will be launched into how victims find out about their attackers being released from jail, in response to John Worboys being freed.

  The black-cab driver, 60, was jailed in 2009 for a string of sex attacks on women in his taxi.

  Justice Secretary David Gauke said procedures were followed to ensure victims who opted-in to being contacted were warned that Worboys will be freed.

  However, he said those procedures could be improved.

  Worboys is believed to have carried out more than 100 rapes and sexual assaults on women in London between 2002 and 2008.

  He gave his victims drug-laced champagne before attacking them in the back of his cab.

  The Parole Board decided Worboys will be released after he completed his minimum term of eight years in jail.

  Speaking in the House of Commons, Mr Gauke said: "The fact that some victims learned of the decision from the media suggests that there is a need to review these procedures."

  Mr Gauke added that although it appeared "correct procedures were followed", one victim did not receive an email about Worboys when they should have done.

