  Shadow Justice Secretary Richard Burgon said the Worboys case "underlined once and for all" the need for more transparency.

  "It's all too clear that victims of the vile crimes committed by John Worboys feel that this process has failed to do so," he said.

  "Such failings risk undermining public trust in our wider justice system."

  Conservative MP Zac Goldsmith added: "Unless, and until the board explains publicly the rationale behind the decision it took, people can't possibly have confidence in our criminal justice system."

  Richard Scorer, a specialist abuse lawyer from Slater and Gordon, which represented 11 of Worboys' victims, said his clients were becoming "more concerned by the day" about Worboys' imminent release.

  "The terrifying fact is that their attacker knows where they live after he dropped them home and wrote some of their addresses down in a notebook," he said.

  "They are living in fear that he will come after them once he gets out.

  "Our clients want to be told what restrictions are being put on his movement as part of his licence and how the authorities are aiming to ensure this serial rapist does not attack again."

  Justice Secretary David Gauke spoke to the Commons about John Worboys' release

  The debate in the Commons prompted a former top police officer to warn that rape and sexual offence investigations are "in a mess".

  Ex-Metropolitan Police commissioner Lord Ian Blair said: "We have seen in these last few months really difficult cases about rape failing in the courts.

  "It seems to me that the Worboys case is a perfect example from which we could take learning in a wider sense about how can we both support victims and provide the accused with proper defence."

  Tory peer and Victims Commissioner Baroness Newlove argued the system for keeping victims informed needed to be "radically reformed".

  The review will be "prioritised" so that it is finished before Easter, Mr Gauke said.
