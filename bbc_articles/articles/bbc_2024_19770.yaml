title: Manchester City's Erling Haaland fresh and doing 'ridiculous' numbers - Pep
  Guardiola - BBC Sport
date: '2024-08-24'
section: Man City
url: http://www.bbc.co.uk/sport/football/articles/c6249vdpy8no
content: |-
  Manchester City boss Pep Guardiola believes Erling Haaland is feeling better than in previous seasons after having a proper summer break, following his hat-trick against Ipswich.

  Erling Haaland has scored 67 goals in 68 Premier League appearances for Manchester City

  While many of his club team-mates were playing international football during the summer, Erling Haaland spent it helping his dad chop wood. The Manchester City striker would no doubt have preferred to have been at the Euros with Norway but they failed to qualify so it was a summer of chores and relaxation instead. And it seems to have done him the world of good. Two games in and he has scored four goals, adding another hat-trick to his collection in Saturday's 4-1 win against Ipswich. It means he already has double the tally of any other player - albeit very early into the new season - but his manager Pep Guardiola is excited by how hungry a refreshed Haaland looks. "I said a few weeks ago he feels better than previous seasons," said Guardiola following the victory at Etihad Stadium. "I remember he said before he was still tired, but this season with no Euros he arrived really well. "Of course he cannot play all the games until the end of the season but you know how important he is, scoring so many goals." Haaland has finished as the Premier League's top scorer in each of his two seasons so far in England. He hit an incredible 36 goals in the 2022-23 campaign and 27 last term. The latter was still five more than anyone else, despite missing several games through injury. Haaland is now just six goals away from the landmark of 100 for Manchester City, a tally even more incredible considering he has played just 101 games. "The numbers are ridiculous," said Guardiola. "He can compete in terms of goals with Ronaldo and Messi. "It is an incredible strength for us and we are very happy to have him, hopefully he can be here for many, many years."

  Manchester City fans gave Ilkay Gundogan a standing ovation when he came on against Ipswich

  While Haaland deservedly grabbed the headlines, Saturday's game was also about the return of a Manchester City legend. Former captain Ilkay Gundogan re-joined the club on Friday after a season at Barcelona and was afforded a hero's welcome, receiving a standing ovation when he came on in the second-half. The 33-year-old is synonymous with success at City. He first joined the club in 2016 and helped them win the Premier League five times during his first spell. Given his age, Gundogan is unlikely to feature as much as he did previously, but Guardiola welcomed his experience as City chase what would be an incredible fifth Premier League title in a row. "We know each other for many years and he knows exactly what he needs to do," said Guardiola. "I am very pleased he is back."

  Ilkay Gundogan completed his return to Manchester City from Barcelona on Friday

  Whether it was stepping off the team coach, taking part in the warm up, or coming onto the pitch as the home fans chanted "Gundo's coming home", Gundogan was never without a smile on his face, showing just how much the return to City means to him. "When I arrived a couple of days ago I was joking already with the players, that was before I signed the contract," Gundogan said. "It feels like I have never been away. It feels like home. I have so much happiness to play again for this amazing club. "I am very proud to be back."
