content: |-
  Sarah proposes to her boyfriend Daniel as part of a leap year tradition.

  A couple from east London got engaged on top of London's O2 arena, taking part in a leap day custom where a woman proposes to her partner.

  Sarah and Daniel from Leytonstone were enjoying the Up at The O2 attraction, which allows people to walk on the roof of the arena, when Sarah surprised him with a ring and popped the question.
