  Hello! magazine's royal editor Emily Nash said the banana bread was "rustled up last night in the kitchen at Admiralty House" in Sydney.

  The Daily Mail Australia reported that the "royal recipe contained chocolate chips and a bit of ginger".

  Emily Carroll, a member of the Woodley family, said she spoke to the duchess about her pregnancy.

  "Meghan told me that she's feeling pretty good so far, which is great, and that she's running on adrenaline."

  The duke and duchess discussed the drought, which has been affecting the region, with the Woodleys.

  "They understood how we have been forced to sell so much stock, all of our breeding ewes, and how prices for grain have gone through the roof," Scott Woodley said.

  However, the heavens opened during the royal visit, pelting the crowds with heavy rain and hail.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ironically, the royal couple had gone to the region to discuss drought

  Prince Harry battled the elements to thank the hundreds of residents for "welcoming me and my wife so warmly, and wet today".

  Meghan tried to protect him from the worst of the rain with an umbrella, to no avail.

  He said being in Dubbo "brings back memories of 2003, when I spent time jackarooing [working] on a small 16,000 hectare property" in Queensland.

  On Wednesday the duchess wore a less formal ensemble of Outlander jeans, J Crew boots, and a shirt by Maison Kitsune.

  She also wore a checked blazer from her friend Serena Williams's fashion label. The tennis star was quick to reference the duchess' outfit on Instagram.

  Harry also wore a less formal ensemble of tan-coloured shoes, black jeans, and a grey shirt.

