title: 'Royal tour: Prince Harry gets his beard rubbed - BBC News'
date: '2018-10-17'
section: UK
url: http://www.bbc.co.uk/news/uk-45885197
content: |-
  A young boy is mesmerised by the duke's facial hair, while his wife shows off her baking skills.

  This video can not be played To play this video you need to enable JavaScript in your browser. Prince Harry was meeting children with his wife, the Duchess of Sussex

  Protocol was well and truly flouted on the latest leg of the royal tour when a five-year-old boy touched Prince Harry's beard.

  The Duke and Duchess of Sussex are touring Australia and New Zealand after announcing they're expecting a baby.

  Five-year-old Luke Vincent was apparently mesmerised by the duke's facial hair because his "favourite person in the world is Santa Claus".

  Luke's teacher said he "didn't give [Harry] any choice" in the matter.

  The royal couple were touring Dubbo, in New South Wales, where they met volunteers from the Royal Flying Doctor Service and unveiled a new plane to mark 90 years of the organisation.

  During a tour of the city they also visited Buninyong Public School where they met Luke.

  School principal Anne Van Darrel said: "He got a hug from Meghan and then Harry bent down to speak to him and Luke didn't give him any choice.

  "Luke's favourite person in the world is Santa Claus, who has a beard. So he rubbed Harry's beard."

  The Duchess of Sussex showed off her culinary skills and generosity by baking some banana bread for tea on the Woodley family farm outside Dubbo.

