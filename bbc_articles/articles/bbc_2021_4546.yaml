title: 'Line of Duty: Penultimate episode achieves record ratings - BBC News'
date: '2021-04-26'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-56889021
content: |-
  An average audience of 11m viewers tune into the sixth instalment in the BBC drama's sixth series.

  The penultimate episode of Line of Duty was the show's most-watched instalment to date, with an average of 11 million viewers tuning in on Sunday night.

  The record ratings came as BBC One unveiled a trailer for next weekend's series finale, that suggested it may be the police drama's last ever episode.

  "Every investigation has led to this," the promo declared.

  A lingering H in the caption hinted that the mysterious criminal mastermind known as 'H' would be unveiled at last.

