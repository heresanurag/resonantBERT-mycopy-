title: LIV Golf to be broadcast on ITV in UK in 2025 - BBC Sport
date: '2025-02-08'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/c14n2mk7ly6o
content: |-
  LIV Golf agree a deal with ITV to show live coverage of the 2025 season in the UK.

  LIV Golf has agreed a deal with ITV to show live coverage of the 2025 season in the UK.

  Coverage will begin with the second round of the season-opening event in Riyadh, Saudi Arabia, with 41 rounds of live golf shown across 14 tournaments on ITVX.

  Selected rounds will be shown on ITV1 and ITV4, along with a weekly highlights show on ITV4, making it the only free-to-air golf in the UK.

  Since the Saudi-backed event was launched in 2022 it has only been available to watch online.

  Niall Sloane, director of ITV Sport, said: "This is an exciting time for LIV Golf as we look ahead to the innovative 2025 season.

  "This partnership delivers free-to-air coverage for fans in the UK and we are delighted to welcome LIV Golf to ITV Sport."

  Ron Wechsler, LIV Golf senior vice president of broadcast partnerships and programming strategy, said the partnership was a "major milestone as we strive to bring LIV Golf to every corner of the world".

  On Wednesday it was announced that the US Open will be the first major to offer exemptions to LIV players based on their ranking.

  The United States Golf Association (USGA) said the top LIV player, who is not otherwise exempt, will directly earn a place in the field for the US Open, which will be held at the Oakmont Country Club in Pennsylvania from 12-15 June.

  The PGA Tour has been in protracted negotiations with LIV's backers, the Saudi Public Investment Fund (PIF), in an attempt to heal the split in world golf.

  On Thursday, the PGA said it was "closer to a deal" with LIV after calling on American President Donald Trump to get involved.
