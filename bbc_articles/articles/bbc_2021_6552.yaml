title: 'As it happened: Second AZ jab raises efficacy to about 90%, study finds -
  BBC News'
date: '2021-05-20'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57183056
content: |-
  After a second dose, cases are about 90% lower than among unvaccinated people, Public Health England data finds.

  Like many workplaces, the House of Lords introduced virtual participation in response to the pandemic.

  And - like many workplaces - the House of Lords is now debating whether to go back to its pre-pandemic style of requiring its members to physically attend.

  Here's a flavour of what's being said.

  Conservative Lord Forsyth of Drumlean says the Lords face "extinction" if they don't return to their old ways, saying the upper chamber has faced "a degree of mockery" since introducing virtual proceedings.

  In agreement, Tory deputy leader in the Lords Earl Howe says once social distancing rules allow, remote participation and virtual voting should "cease".

  But, speaking on the Labour front bench, Baroness McIntosh of Hudnall says: "Whilst the idea of reverting wholesale to the old normal is attractive I am not sure it is desirable or even possible.

  "The House has invested a lot of time and money in creating some genuinely innovative systems... and we have adapted our procedures imaginatively. It would be perverse to set all that experience aside."

  Conservative Lord Strathclyde says he lives in south-west Scotland and it has been "extremely convenient" to vote remotely.

  But he adds: "Parliament should not exist for my convenience or for anybody else's." (Though he said there may be special cases for virtual voting.)

  And, backing a return to physical proceedings, Conservative peer Lord Farmer says voting had become "ridiculously easy", noting: "I am aware of one peer who has voted from the seat of his lawnmower."
