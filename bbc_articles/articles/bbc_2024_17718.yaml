title: Llanelli murder arrest of man, 49, after woman's body found - BBC News
date: '2024-07-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cljy4l7jyjlo
content: |-
  The body of the woman was discovered in a house before the arrest of a man on suspicion of murder.

  A 49-year-old man has been arrested on suspicion of murdering a woman whose body was found in a house in Carmarthenshire.

  Dyfed-Powys Police said the woman's body was discovered in Bigyn Road, Llanelli, on Friday.

  The force said it was not looking for anyone else in connection with the death.

  It said there would be a higher police presence than usual in the area in the days ahead as inquiries continue, and asked anyone with information to get in touch.
