title: 'Oliver Steeper: Coroner raises concerns over baby''s choking death - BBC News'
date: '2024-06-03'
section: Kent
url: http://www.bbc.co.uk/news/articles/czkky121dn1o
content: |-
  A coroner has called for action to prevent deaths in early years settings after a baby's inquest.

  Oliver Steeper was nine-months-old when he died after choking at nursery

  A coroner has written to the Department for Education calling for changes to early years framework following the death of a nine-month-old baby who choked at nursery in Kent. Oliver Steeper died six days after he choked on pasta bolognese at Jelly Beans Day Nursery, in Ashford, on 23 September 2021. Area Coroner Katrina Hepburn has submitted a Prevention of Future Deaths report (PFD) outlining her concerns about paediatric first aid training and staff education over weaning. An expert in resuscitation at the inquest said the first aid delivered at the nursery was "poor" and that guidelines were not properly followed.

  In her report, Ms Hepburn said evidence at the inquest highlighted an "apparent lack of knowledge" over staff learning a child's weaning information from their parents and sharing it with other colleagues. She said staff need to learn the importance of finding out and recording each child's stage of weaning and understanding the risk of choking.

  Zoe and Lewis Steeper welcome the report following their son Oliver's death

  Ms Hepburn also raised concerns over the fact that current early years statutory framework means only one member of staff must have a valid paediatric first aid certificate. "If that one staff member is unavailable or indisposed when an emergency situation arises, or simply is unable to render the required first aid by nature of the traumatic events unfolding, this may in turn have a serious and detrimental effect on the child requiring assistance," she said.

  The coroner has called for more regular refresher training in paediatric first aid, stating the current three-year term is too long of a time frame for staff to remember the correct procedures in detail. Oliver died from a brain injury caused by a cardiac arrest due to choking. A jury at his inquest last month found he died as a result of misadventure. His parents, Zoe and Lewis Steeper, have welcomed the PFD report and hope change will come from it. In a statement they said: "Since losing Oliver after the choking incident, our mission has been to use his memory to make childcare settings safer places for children at such an important and vulnerable stage in their life, specifically around the preparation of food." They said they are looking forward to a response from the government. The Department for Education has confirmed it's received the coroner's report and will respond in due course.
