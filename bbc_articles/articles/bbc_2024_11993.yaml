title: 'Newspaper headlines: ''Kate to have you back'' and ''princess back on parade''
  - BBC News'
date: '2024-06-16'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c2qq2gvl299o
content: |-
  Kate's return to public duties at the annual Trooping the Colour parade leads Sunday's newspapers.

  'Kate to have you back' as princess returns

  And now for our first look at the Sunday papers. Pictures of a beaming Princess of Wales dominate nearly all of the front pages. "Our Fair Lady lifts the nation's spirits," says the Sunday Telegraph, after Catherine's return to royal duties, external for the King's official birthday. "On a cold, grey day, the princess proves a tonic at Trooping the Colour," says the paper. Its columnist, Allison Pearson, thanks her for attending, saying "lesser mortals" with her illness "would have stayed home, tucked up in their jim-jams". For the Sun on Sunday, the princess is a "Super Trooper"., external It says she made a "triumphant" first public appearance since revealing she has cancer, as she stood on the balcony at Buckingham Palace alongside His Majesty, who is also being treated for the disease. The Mail on Sunday calls it the "day that lifted the nation's hearts". Trooping the Colour is a "dazzling, dashing reminder of the skill, discipline and loyalty of our Armed Forces", external, says the paper's columnist, Sarah Vine. But she adds that: "not even Seamus the Irish wolf hound, nor Apollo and Juno, the two magnificent drum horses, could compete with the most dazzling trouper of them all: the Princess of Wales." "Kate to have you back," says the Sunday Mirror. It says a "radiant" Princess of Wales brought sunshine to a rainy parade, adding that thousands "braved wet weather to cheer the mum of three" at her first public appearance since her diagnosis., external The Sunday Express is similar in its praise for what it calls her "spectacular" return. The paper goes on to say that the King, who also has cancer, and his daughter-in-law stood side-by-side on the balcony, external "as a striking symbol of unity and defiance against the disease".

