  The Observer leads with what it calls a "bleak" verdict by the health think tank, the Nuffield Trust, external, of the Labour and Conservative manifesto commitments on NHS funding. The paper says the analysis - that both the parties would leave the health service worse off than in the "austerity" years - will add to a growing sense that neither is "coming clean with voters about the true implications of their tax and spending policies". The Sunday Times carries what it describes as a "highly personal interview" with Rishi Sunak. He reveals how he draws strength from his Hindu faith to cope with the pressures, external of the "bruising general election campaign". The paper says he rejects accusations that Liz Truss is to blame for the Conservative party’s performance in opinion polls. Mr Sunak tells the Sunday Times: "I’m ultimately responsible for what I’m doing and no one else is. It rests on my shoulders.” And finally, the papers look ahead to England's Euro 2024 campaign, which kicks off tonight against Serbia. The Sunday Express says Gareth Southgate has vowed to "go one better this time", external, after what it calls the "heartbreak" of their Euro 2020 final loss on penalties to Italy. The Daily Star Sunday says the Three Lions' boss is on "a mission to mend the nation's broken hearts", by returning home from Germany as European champions. "Come on England," is the clarion call from the Sunday Mirror.
