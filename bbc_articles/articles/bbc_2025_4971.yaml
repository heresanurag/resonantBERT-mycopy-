id: bbc_2025_4971
title: Hundreds join largest anti-Hamas protest since Gaza war began - BBC News
date: '2025-03-26'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c4g71lk09npo
content: |-
  Masked Hamas militants dispersed protesters who gathered in northern Gaza to rally against the group.

  Hundreds of people took to the streets of Beit Lahia, with many chanting anti-Hamas slogans

  Hundreds of people have taken part in the largest anti-Hamas protest in Gaza since the war with Israel began, taking to the streets to demand the group step down from power. Masked Hamas militants, some armed with guns and others carrying batons, intervened and forcibly dispersed the protesters, assaulting several of them. Videos shared widely on social media by activists typically critical of Hamas showed young men marching in the streets of Beit Lahia, northern Gaza on Tuesday, chanting "out, out, out, Hamas out". Hamas said it condemned those who it accused of pushing "suspicious political agendas" and shifting the blame from Israel.

  Pro-Hamas supporters downplayed the significance of the protests and accused the participants of being traitors. The protests in northern Gaza came a day after Islamic Jihad gunmen launched rockets at Israel, prompting an Israeli decision to evacuate large parts of Beit Lahia, which sparked public anger in the area. Israel has resumed its military campaign in Gaza following nearly two months of ceasefire, blaming Hamas for rejecting a new US proposal to extend the truce. Hamas, in turn, has accused Israel of abandoning the original deal agreed in January. Hundreds of Palestinians have been killed and thousands displaced since Israeli military operations resumed with air strikes on 18 March. One of the protesters, Beit Lahia resident Mohammed Diab, had his home destroyed in the war and lost his brother in an Israeli airstrike a year ago. "We refuse to die for anyone, for any party's agenda or the interests of foreign states," he said. "Hamas must step down and listen to the voice of the grieving, the voice that rises from beneath the rubble - it is the most truthful voice." Footage from the town also showed protesters shouting "down with Hamas rule, down with the Muslim Brotherhood rule". Hamas has been the sole ruler in Gaza since 2007, after winning Palestinian elections a year prior and then violently ousting rivals. Open criticism of Hamas has grown in Gaza since war began, both on the streets and online, though there are still those that are fiercely loyal and it is hard to accurately gauge how far support for the group has shifted.

  Tuesday's protest was the largest anti-Hamas demonstration since war began following the 7 October attacks

  There was opposition to Hamas long before the war, though much of it remained hidden for fear of reprisals. Mohammed Al-Najjar, from Gaza, posted on his Facebook: "Excuse me, but what exactly is Hamas betting on? They're betting on our blood, blood that the whole world sees as just numbers. "Even Hamas counts us as numbers. Step down and let us tend to our wounds." Hamas official Dr Basem Naim told the BBC people have the right "to cry out in pain", but he accused protesters of having "suspicious agendas" and asked why demonstrations were not happening in the West Bank. He said it was unacceptable to exploit the humanitarian conditions in Gaza to "shift the blame away" from Israel. The war in Gaza was triggered by Hamas's attack on Israel on 7 October 2023, during which around 1,200 people, mainly civilians, were killed and 251 others taken hostage. Israel responded to the attack with a military offensive in Gaza to destroy Hamas, which has killed more than 50,000 Palestinians, the Hamas-run health ministry said. Most of Gaza's 2.1 million population has also been displaced, many of them several times. An estimated 70% of buildings have been damaged or destroyed in Gaza, healthcare, water and sanitation systems have collapsed and there are shortages of food, fuel, medicine and shelter.
