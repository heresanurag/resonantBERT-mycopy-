title: Greta Thunberg attends Congressional hearing - BBC News
date: '2019-09-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49748345
content: |-
  Activist Greta Thunberg spars with US lawmaker on climate change at a Congressional hearing.

  Speaking at a congressional hearing, climate activist Greta Thunberg pushed a Republican lawmaker on the issue of climate change.

  The teenager attended the hearing alongside other young activists.
