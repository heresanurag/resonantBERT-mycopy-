  The Johnson's first two children - Wilfred and Romy - were born while the couple were in Downing Street during the Covid pandemic. Frank was born in July 2023, their first after Boris Johnson left office. Mrs Johnson, a former communications director for the Conservative Party, hinted that their fourth child would be their last, describing Poppy as a "final gang member". She said her other children were "utterly delighted" with the addition to the family, noting Romy was "desperate for a little sister". The former Tory leader has four grown-up children with his second wife, Marina Wheeler, and another daughter from an affair. He was prime minister from July 2019 until his resignation in September 2022.
