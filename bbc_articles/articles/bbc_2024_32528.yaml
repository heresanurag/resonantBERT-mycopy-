title: Netflix Senna drama's Norfolk 'Alps' mocked on social media - BBC News
date: '2024-12-07'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/cy7kd7g2lxyo
content: |-
  Viewers do a double take as the famously flat county sprouts a mountain range in a Netflix series.

  A snow-capped mountain range looms behind racing drivers in the the drama Senna

  A Netflix series which depicts the lesser-known snow-capped mountains of Norfolk has whipped up a flurry of fun on social media. The famously flat county features in a new six-part drama about the life of Formula 1 driver Ayrton Senna, who honed his craft in Norfolk in the early 1980s. Viewers did a double-take when they spotted a range of rugged peaks beyond Snetterton, with the race circuit poking fun at the "unusually mountainous" scene. In a Facebook post that has attracted hundreds of comments, it said: "We think it's pretty accurate. The monumental, Himalaya-rivalling peaks of Old Buckenham are frequently visible on a clear day."

  The post has been shared more than 3,000 times. "I live about a mile away and regularly suffer from altitude sickness," said one. "Worked at Snetterton circuit and lived just over that mountain," added another. "Little wonder that dualling the A11 took so long," joked one man. Others simply saw an opportunity. "That's my next skiing holiday sorted then. "Norfolk Alps it is - no airport queues and less than two hours drive."

  Senna focuses on the Brazilian racing driver's early career right up to his death at the 1994 San Marino Grand Prix, aged 34. In the early 1980s, Senna lived in a bungalow in Eaton on the edge of Norwich while driving for Ralph Firman's Van Diemen company, based at Snetterton, before moving on to Team Lotus. It is not known where the Snetterton scenes were filmed, but a track in Buenos Aires, Argentina, was used for some racing shots. Similarly, the Norfolk track doubled for some of the most historic tracks in the world in Ron Howard's 2013 film Rush. Snetterton confirmed it had no involvement in the filming of Senna. Netflix has been approached for comment.

