title: Gloucestershire chief constable suspended over misconduct claim - BBC News
date: '2024-10-07'
section: Gloucestershire
url: http://www.bbc.co.uk/news/articles/c8dj5p66lpdo
content: |-
  Rod Hansen, of Gloucestershire Police, is being investigated over possible gross misconduct.

  Rod Hansen has been suspended, the force has confirmed

  The head of a police force has been suspended over an allegation of gross misconduct. The Independent Office for Police Conduct (IOPC) said it is investigating allegations against Rod Hansen, Chief Constable of Gloucestershire Constabulary. The IOPC said the claims relate to his handling of an allegation against a member of the force in August. Gloucestershire's Police and Crime Commissioner said the force is now looking for a temporary chief constable.

  A statement from the IOPC said: “We can confirm we are investigating conduct allegations against the Chief Constable of Gloucestershire Constabulary, Rod Hansen. "The investigation follows a referral in August from the Office of the Police and Crime Commissioner for Gloucestershire. "The investigation concerns his handling of an allegation against a member of staff, and whether relevant policies and procedures were subsequently followed. “We have today (Monday) served a gross misconduct notice on the chief constable to advise him his conduct is subject to investigation. Such a notice does not necessarily mean any disciplinary proceedings will follow.

  Mr Hansen joined the constabulary as deputy chief constable in May 2013 and took the top job in May 2017, becoming the 16th person to head up the force in its history. Gloucestershire PCC Chris Nelson said he has suspended Mr Hansen pending the outcome of the IOPC investigation. "I will emphasise that the decision to suspend is a neutral act. It has no bearing on any indication of guilt and should not be seen as such," Mr Nelson said. “I have spoken to His Majesty’s Chief Inspector of Constabulary, Andy Cooke, after taking this decision. The executive board will provide continuity for the organisation. "My team and I are now working with other colleagues in policing to nationally identify a temporary chief constable who can lead Gloucestershire Constabulary during this period. Mr Nelson said he knows the news will come as a shock to many. “It will be up to the IOPC to lead on any communication about the investigation that it considers necessary," he continued. “In the meantime, I would like to assure residents and criminals alike that the constabulary will be operating as normal, keeping our residents safe, and preventing and detecting crime.”
