title: Princess of Wales joins school visit to National Portrait Gallery - BBC News
date: '2025-02-04'
section: UK
url: http://www.bbc.co.uk/news/articles/c20pjwxnzd1o
content: |-
  Catherine travelled with the group of five-year-olds on their trip to the National Portrait Gallery.

  Catherine arriving in the school bus to see the gallery's exhibition

  The Princess of Wales travelled by school minibus along with an enthusiastic group of five-year-olds, as she joined them on a visit to an exhibition in central London. Rather than a formal entrance in a royal car, the princess stepped off the minibus holding hands with a little girl as the school trip arrived at the National Portrait Gallery. The head teacher said the royal helper had been "really chatty" with the children on the bus, playing I-spy with them and helping with their jumpers. The children were visiting a trail around the gallery encouraging them to think about their emotions, linked to Catherine's early years education project, Shaping Us.

  The princess joined the children from All Souls primary school as part of her Shaping Us initiative

  Catherine and the class took part in an interactive storytelling trail during their visit

  "My name is Catherine and I'm coming on your trip today," the princess said to the children as she got on the minibus. "You've all got your seat belts on?" she checked. "It was an experience we probably won't ever have again," said head teacher Alix Ascough of All Souls primary school in Westminster. "She was wonderful, so relaxed with the children, really chatty. Children were so engaged with her, playing I-spy with her at one point and helping with jumpers," said the head teacher. Catherine, who held hands with a girl called Grace during the visit by the reception class, helped children as they drew their own portraits in a gallery filled with pictures of famous faces. The gallery, which has Catherine as its royal patron, has opened an interactive, storytelling trail for young children, with activities encouraging them to think about their emotions as they create their own self-portrait. Catherine's Shaping Us initiative emphasises the importance of the first five years of children's lives - and the latest stage of the project calls for a greater emphasis on teaching social skills and improving mental health. The free exhibition for children at the National Portrait Gallery picks up on the themes about understanding emotions.

  Catherine takes part in a game with the class at the gallery

  Liz Smith, the gallery's director of learning, said children could be the "harshest critics" but they had responded well to the project. The gallery visit is another part of Catherine's gradual return to work after completing her cancer treatment. She marked World Cancer Day by releasing a photo taken of her by her six-year-old son Prince Louis. The princess, who revealed last month that she is in remission from cancer, has been calling for a "rebalance" in society to encourage people to show more compassion and empathy. King Charles is continuing his cancer treatment and the Royal Family's social media channel had a message "sending love to all those navigating a cancer diagnosis – as well as the incredible doctors, nurses, charities and families who work tirelessly to support them".

