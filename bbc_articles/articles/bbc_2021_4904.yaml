title: Boy stabbed to death in Newham, east London - BBC News
date: '2021-04-23'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-56853980
content: |-
  It is believed the 14-year-old was stabbed outside Zzetta Pizza on Barking Road

  A 14-year-old boy has been stabbed to death in east London.

  Met Police officers, who are treating the case as murder, were called to Barking Road in Canning Town, Newham, at about 16:00 BST on Friday.

  The teenager was confirmed dead at the scene and officers are trying to find and tell his family.

  A crime scene cordon is in place and there will be an increased police presence in the area, the Met said. No arrests have yet been made.

  Despite the efforts of paramedics from the London Ambulance Service and London Air Ambulance, the victim was pronounced dead shortly after 16:30.

  Despite the efforts of the London Air Ambulance, the victim was pronounced dead

  Mayor of London Sadiq Khan said he was "deeply saddened" by the killing, adding: "I am in touch with the Deputy Met Commissioner and my thoughts are with the victim's family and friends."

  He urged witnesses to come forward, saying: "This appalling incident happened on a busy street in broad daylight, so if you saw or know anything then please don't stay silent."

  Anyone with information is urged to contact the force on 101.

