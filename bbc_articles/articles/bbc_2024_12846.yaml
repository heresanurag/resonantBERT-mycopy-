content: |-
  When Belgium needed him most captain Kevin de Bruyne delivers yet another masterclass, writes Phil McNulty.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Kevin de Bruyne's status as one of Belgium's "Golden Generation" and the enduring quality he delivers at elite level were underlined once more on a thrilling, colourful night in Cologne. Belgium carry scars from previous major tournaments when they fell short of expectations raised by the world-class talent at their disposal - most notably when they failed to make it to the knockout phase of the 2022 World Cup in Qatar. And the old accusations were being dusted off once more after they slipped to defeat in their opening group game of Euro 2024 against Slovakia, ranked 45th in the world. This tournament's format has removed some of the jeopardy from the group stage, giving Belgium room for manoeuvre after that shock loss, and they knew a victory against Romania was essential. It was against this backdrop, and with the pressure on, that De Bruyne delivered a masterclass deservedly crowned with the goal that wrapped up a 2-0 win and gave Belgium's campaign lift-off. The responsibility carried by De Bruyne was emphasised when the massed ranks of red-clad Belgium supporters rose to the Manchester City midfielder when he came out to warm up. It was a night when he was being counted on. If Youri Tielemans settled early nerves by driving low past Romania keeper Florin Nita after 73 seconds, it was 32-year-old De Bruyne who ensured Belgium were dominant throughout. The stadium was awash with colour and rocking to deafening noise well before kick-off - and a game befitting the magnificent atmosphere unfolded.

