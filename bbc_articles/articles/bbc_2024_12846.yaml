  Cologne was decorated in red and yellow all day, a message on the big screens from the great "Maradona of the Carpathians" Gheorghe Hagi shown on the big screens before kick-off taking the massed ranks of Romania fans to boiling point. The match was wild, open, fiercely contested and with De Bruyne rising above all others. The space afforded by the nature of the game gave Belgium's playmaker room to operate. It was an opportunity he was not going to pass up. De Bruyne set the tone with one slaloming first-half run that left Romanian players trailing in his wake and Dodi Lukebakio just unable to take advantage. If the action was frantic, De Bruyne had the quality and composure to make it look like he had more time on the ball than anyone else - particularly in a devastating second half. He brought a fine save from Nita, flashed a cross into the six-yard area, then delivered a sumptuous pass of imagination and vision, cutting the Romania defence apart for Romelu Lukaku to apply a composed finish. Inevitably, given Lukaku's luck so far at Euro 2024, the Video Assistant Referee adjudged a hair's-breadth offside and the tireless striker's hunt for his first goal of the tournament goes on. He was not to be denied and got the goal his performance deserved when he shrugged off the attentions of the Romania defence to poke a finish past Nita with 11 minutes left.

  Belgium's win was fully merited. They played with intensity, verve and threat once Tielemans had struck, illustrating why they are ranked third in the world and remain touted as one of this tournament's winners. The blow of losing to Slovakia had been overcome to leave Group E on a knife edge, with all four teams on three points going into the final round of games for the first time in the history of the European Championship. Belgium's performance signalled their official arrival at Euro 2024 but it was the display of De Bruyne that was most eye-catching, the sheer quality of his contributions giving the lie to some whispered suggestions he might be on the wane, with talk of a move to Saudi Arabia. As an indicator of De Bruyne's influence, apart from his goal he had the most shots (five), the most shots on target (three), was top rated with nine passes played into the penalty area (nine), won most duels (12) and made the most successful dribbles with three. De Bruyne played in a manner designed to elevate Belgium's self-belief before their final group game against Ukraine - and they must back up this win rather than return to old ways. It was another tough night for Lukaku, who was never short of endeavour but was lacking in good fortune when it mattered. The manner in which he finished his disallowed goal at least hinted at better things to come, while the reaction of this team-mates showed how desperate they are for him to break his duck. No such worries for De Bruyne. He is the class act who showed why he carries Belgium's hopes of going deep into Euro 2024.
