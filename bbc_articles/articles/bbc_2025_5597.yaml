  Hackman had "significant heart disease, and ultimately that's what resulted in his death", Dr Jarrell said, adding that he had had chronic high blood pressure. He had not eaten anything recently, but had shown no indications of dehydration, she added. At the news conference, New Mexico Public Health Veterinarian Erin Phipps emphasised that hantavirus infections were extremely rare. HPS is transmitted through contact with rodent droppings, urine or saliva, often when contaminated dust is inhaled. She noted that 136 cases had been reported in the state over the past 50 years, with 42% resulting in fatalities. Dr Phipps said evidence of rodent activity had been found in some buildings on the property, though the risk inside the main house was considered "low". Investigators are trying to determine how Ms Arakawa contracted the illness. Hackman tested negative for hantavirus. The couple were found in their home after neighbourhood security conducted a welfare check and saw their bodies on the ground through the window.

