  The remains were discovered in advanced stages of decomposition. Hackman's body was in a sideroom next to the kitchen, with a walking cane and a pair of sunglasses nearby, according to a search warrant affidavit. Ms Arakawa's body was in the bathroom, with scattered pills close to her. Sheriff's deputies found medication for thyroid and blood pressure treatment, along with pain reliever Tylenol, according to a court-filed inventory. Citing privacy laws, authorities did not disclose who had been prescribed the drugs. One of the couple's three dogs was also found dead inside a crate near Ms Arakawa, while the other two dogs were alive. The cause of death for the dog is yet to be determined, officials say. Dr Phipps told reporters that dogs did not become ill from hantavirus. Initial investigations found no signs of forced entry or foul play at the couple's $3.8m (£3m) home. Tests for carbon monoxide poisoning were negative, and no significant gas leaks were detected. Hackman is survived by three adult children from his previous marriage.

