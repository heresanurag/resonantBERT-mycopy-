title: Actor Gene Hackman and wife Betsy Arakawa died of natural causes about a week
  apart - BBC News
date: '2025-03-07'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c89ydyjewjlo
content: |-
  The 95-year-old actor's Alzheimer's means it is "quite possible" he was unaware of his wife's death, say officials.

  Actor Gene Hackman and wife Betsy Arakawa died of natural causes one week apart

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Officials reveal causes of death for Gene Hackman and Betsy Arakawa

  Oscar-winning actor Gene Hackman died of natural causes about a week after his wife Betsy Arakawa, who died after contracting a rare virus, a New Mexico medical investigator has said. Hackman, 95, died at his Santa Fe home from coronary artery disease, with advanced Alzheimer's disease a contributing factor. Ms Arakawa, 65, died in the same house from hantavirus pulmonary syndrome (HPS), a respiratory illness caused by exposure to infected rodents. Her cause of death was listed as natural. Authorities believe she passed away about seven days before her husband, to whom she had been married for more than 30 years. During his career, Hackman won two Academy Awards for The French Connection and Unforgiven.

  It is likely that Ms Arakawa died first on 11 February, Dr Heather Jarrell of the New Mexico Medical Investigator's Office told a news conference on Friday. She said it was "reasonable to conclude" that Hackman had died on 18 February. Ms Arakawa's last known movements and correspondence were on 11 February, when she was seen going to a grocery store, a CVS pharmacy and a pet store, before returning home in the early evening. Given that Hackman was in the advanced stages of Alzheimer's disease it is "quite possible that he was not aware that she [his wife] was deceased", said Dr Jarrell. She told reporters she was "not aware of his normal daily functioning capability".
  • None Gene Hackman loved acting but 'hated everything that went with it'

