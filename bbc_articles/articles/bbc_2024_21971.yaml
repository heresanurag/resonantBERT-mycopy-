content: |-
  Flash flooding brought by storm damaged thousands of homes and buildings across parts of Europe.

  Storm Boris has brought flash flooding to parts of Central and Eastern Europe, with four people dying in Romania.

  Evacuations have taken place in the hard-hit Galati county, where thousands of homes were damaged.

  In the Czech Republic, fire crews are building up defences around rivers, in preparation for further flooding in several cities.

  “We have to be ready for the worst case scenarios” Czech Prime Minister Petr Fiala announced after meeting with emergency services earlier this week.
