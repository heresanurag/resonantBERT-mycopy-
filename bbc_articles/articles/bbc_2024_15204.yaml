content: |-
  Sunday's papers look ahead to the Euro 2024 final between England and Spain.

  'One last push' for England's 'date with destiny'

  Many of the front pages focus on the build up to England's clash with Spain in the final of the Euros

  The first editions of Sunday's newspapers were published before the assassination attempt on Donald Trump in Pennsylvania - and so most focus on England's Euro 2024 final against Spain. "We Kane do it" says The Sunday Express. Its front page features a picture of the captain, Harry Kane -- and asks whether England can bring football home after 58 years of hurt. The Sunday Telegraph quotes Prince William telling the Three Lions to "show the world what you are made of". Tne Mail on Sunday also leads with a quote from the Prince of Wales: "One last push to finish the job". The Daily Star says "the day of destiny is here" alongside a picture of a roaring lion. The Sun on Sunday is more confident with its headline which reads "we will win". An updated edition of the Sunday Telegraph's front page does show a striking picture of Donald Trump, showing the former US president with blood on his face and his fist raised in front of an American flag, as he is rushed off stage to safety by Secret Service officers. Elsewhere The Sunday Times focuses on the first King's Speech of the new Labour government. Its headline reads: "Truant register to save Covid lost generation". The paper says the government will create a national register of children in England who aren't going to school after record levels of absenteeism. The register would form part of Labour's education bill, which the paper says would also include a legal requirement for every primary school to have a breakfast club and a limit on the number of branded items a school uniform can have, to three. The Observer also leads on Labour but focuses on plans to bring solar power to millions more homes in a move dubbed a "rooftop revolution". The paper says that the government will unveil its proposals aimed at bringing down domestic energy bills. Writing in the Sunday Telegraph, former prime Minister Liz Truss blames the scale of the Conservatives' election loss on Rishi Sunak's government "trashing her record". She says she's among the many Tory MPs who have "paid the electoral price" due to Mr Sunak's errors. In her piece, Ms Truss said she avoided speaking out during the campaign to "prevent further damage" but said she couldn't stay silent any longer. The Mail on Sunday reports that the Church of England will tell its schools that "biological sex" is an outdated term. Guidance on gender identity is due to be issued to the 4,600 Church of England schools, which around one million children attend. The paper says that Archbishop of Canterbury Justin Welby has backed the proposed guidance, but critics have described it as "extremely concerning". Many papers carry the story of Graziano Di Prima's exit from Strictly Come Dancing. The Sun on Sunday's front page says the BBC programme is "in crisis". "Graziano's regret" says The Sunday Express report. A statement from the Italian dancer said he "deeply regrets" his actions and understood it would be best to step away.

