  President Zelensky asks US President Biden and leaders of other industrialised countries for further support to stop Russian attacks.

  No sign Russia is currently considering using nuclear weapons - UK spy chief

  More now from the BBC's interview with the UK's spy chief Sir Jeremy Fleming on Russia's military strategy in Ukraine. Fleming, the head of GCHQ, told the Today programme there were no current signs that Russia was considering the use of nuclear weapons in the Ukraine war but warned that any talk of nuclear weapons was "very dangerous". GCHQ would hope to see "indicators" if Russia planned to use them, he said. "Any talk of nuclear weapons is very dangerous and we need to be very careful of how we are talking about that," he said this morning. In an address to the nation last month, Putin said his country had "various weapons of destruction" and would "use all the means available to us", adding: "I'm not bluffing." "It's clear to me that whilst we might not like and in many ways abhor the ways the Russian military machine and President Putin are conducting this war, they are staying within the doctrine that we understand for their use, including for nuclear weapons," Fleming said.
