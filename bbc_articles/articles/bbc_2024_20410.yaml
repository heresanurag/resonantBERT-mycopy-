title: Butcher used golf club to save children trapped in burning car - BBC News
date: '2024-08-03'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/crg4gw09e1qo
content: |-
  John Mackie went to the aid of Alix Ferrie and her two children in Glenboig, North Lanarkshire.

  Butcher used golf club to save children trapped in burning car

  Butcher John Mackie is a member of Crow Wood Golf Club in Moodiesburn

  A butcher used a golf club to smash a Land Rover window and rescue two trapped children - minutes before the vehicle was engulfed in flames. John Mackie was driving with his wife Yvonne when he was flagged down in Glenboig, North Lanarkshire. Mother-of-five Alix Ferrie's Land Rover Discovery Sport had suddenly lost power and smoke started billowing from the bonnet. Ms Ferrie, 34, left the vehicle to free her daughter Kodi, four, and 11-month-old son Brian. But when she closed the driver's door the central locking activated and she was unable to open any doors.

  Alix's SUV was completely destroyed in the fire

  Mr Mackie, 48, stopped to help but he was also unable to open the doors Fortunately, the 7.7 handicap golfer, who is a member of Crow Wood Golf Club in Moodiesburn, had his six iron in his car. Mr Mackie gave the driver's window a double tap before shattering the glass with a single blow. As sparks shot out of the bonnet he helped Kodi - who had climbed out of her car seat into the front - while Ms Ferrie freed Brian from his car seat.

  Brian and sister Kodi were trapped in the vehicle after it suddenly lost power

  Less than 15 minutes after calling 999 the Land Rover was ablaze. Mr Mackie said: "If the kids were still in the car they would not be there. "I'm just glad we got them out." The butcher has been praised for his actions, but added: "I don't feel like a hero. "I'd like to think that anyone would do the same under the circumstances."

  Land Rover said it was aware of the case, which was first reported in the Daily Record, external. Ms Ferrie had bought the second-hand vehicle from a dealership in March. She had no issues until the incident on 20 July, when she was driving home to Carntyne, Glasgow. At first the battery symbol flashed up on her dashboard. Ms Ferrie told BBC Scotland News: "The car cut out and I saw smoke coming from the bonnet." "I flagged John down and said: 'Help me get my kids out of the car'. "Kodi was screaming and Brian was crying as his sister was panicking."

  The burnt out back seats of the car

  After the children were freed they waited in Mr Mackie's car for firefighters to arrive. Ms Ferrie said she heard three "explosions" as she watched her vehicle burn. She said: "I owe John everything. He saved my kids."

  But Ms Ferrie said she is still traumatised by the incident and said Kodi was "really struggling". Ms Ferrie added: "She could see the panic in my face and saw me trying to break the windows with the keys." She added: "I just keep breaking down. I'm not going to get over it for a long time." A Land Rover spokesperson said: "We are aware of the matter relating to a 2016 Model Year Discovery Sport vehicle. "At this time, there is no further information available."
