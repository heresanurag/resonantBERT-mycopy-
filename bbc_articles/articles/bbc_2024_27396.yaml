content: |-
  Strictly star recalls anxious wait after checks following her cancer treatment showed abnormalities.

  Strictly Come Dancing's Amy Dowden faced an anxious wait after a routine check-up following her cancer treatment revealed abnormalities.

  "You are forever living in the fear of the cancer returning," she told Lucy Owen on BBC Radio Wales.

  Amy, 34, who was twice diagnosed with cancer last year, needed nine biopsies.

  "It was a real scary time but I was so lucky that they came back as benign," she recalls.

  Her latest health worry has been captured by BBC cameras filming Strictly Amy: Cancer and Me which documents her journey from initial diagnosis to her Strictly return this autumn.
