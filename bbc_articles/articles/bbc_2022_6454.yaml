title: Beto O'Rourke heckles Texas Governor Greg Abbott over gun laws - BBC News
date: '2022-05-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-61584720
content: |-
  The confrontation laid bare the deep divisions over how to stop school shootings in America.

  A confrontation during Texas governor Greg Abbott's news conference on Wednesday laid bare the deep political divide on gun legislation.

  Beto O'Rourke, the Democratic candidate running for governor against Abbott, walked to the front of the room in the middle of the conference. The governor had just suggested the gunman's poor mental health - not his firearm - was the reason the shooting happened.

  Abbott's deputy was heard telling O'Rourke he was "out of line" as he was being escorted out.
