  The health secretary says UK vaccine rollout is on track but urges everyone to play their part by following Covid rules.

  Hancock: We are willing to tighten the rules

  The health secretary stresses the importance of the public following the restrictions of the current lockdown. Asked by Emily Morgan of ITV whether it was time to make the rules stricter amid reports of people not sticking to them at the weekend, Matt Hancock says: "We keep these things under review and we have demonstrated that we're willing to tighten the rules if they need to be tightened. "But the thing that really matters right here, right now is that everybody follows the rules as they are today. "And everybody can play their part in doing that." He adds he applauds the action supermarket Morrisons has taken in enforcing the wearing of masks by its customers unless they have a medical reason. "I want to see all parts of society playing their part in this," he says.
