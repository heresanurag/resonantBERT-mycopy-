  A selection of striking images from around the world, taken over the past seven days.

  Classic racing cars take to the track at the 81st Members' Meeting at the Goodwood Motor Circuit in West Sussex. The circuit is celebrating its 10th anniversary since the event was restarted in 2014. The season opener recreates the atmosphere of the original race meetings held at Goodwood between 1948 and 1966.
