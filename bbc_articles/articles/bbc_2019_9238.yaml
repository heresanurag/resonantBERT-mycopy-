id: bbc_2019_9238
title: Man found dead in underpass after Istanbul floods - BBC News
date: '2019-08-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-49384157
content: |-
  A homeless man was found in the Unkapani district, apparently drowned, after heavy rain caused extensive damage

  Several neighbourhoods including Fatih, home to the historic Grand Bazaar, were affected.

  Authorities said a homeless man was found in the Unkapani district, apparently drowned.

  They warned the public to take care in the severe weather conditions.
