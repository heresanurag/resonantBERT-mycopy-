title: Crews tackle flames overnight as wildfire takes hold in Coalville - BBC News
date: '2025-04-05'
section: General
url: http://www.bbc.co.uk/news/videos/cp91n1prz3zo
content: |-
  Crews stayed at the scene overnight after the fire took hold for a second time.

  Firefighters have worked overnight to tackle the flames of a wildfire that spread across 2,691 sq ft (250 sq m).

  Leicestershire Fire and Rescue Service was first called to the blaze at Bardon Hill in Coalville on Wednesday night, which was extinguished by 23:00 BST.

  But flames took hold again in a wooded area close by on Thursday as firefighters continued to monitor for hotspots, with crews at the scene overnight.

  A spokesperson for the fire service said three appliances and a water carrier remained at Bardon Hill on Friday morning to "catch hotspots as they come up".

  A potential cause for the fire has not been established, a spokesperson added.

