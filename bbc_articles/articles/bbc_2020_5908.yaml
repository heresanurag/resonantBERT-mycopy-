title: 'Blackburn shooting: Aya Hachem''s father pays tribute - BBC News'
date: '2020-05-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-lancashire-52747388
content: |-
  Aspiring solicitor Aya Hachem, 19, was fatally injured in Blackburn when she was mistakenly targeted.

  The father of a young law student who was shot dead in Lancashire says his dreams have been destroyed.

  Aya Hachem, 19, was shot from a passing car in a case of mistaken identity, in King Street in Blackburn, close to Lidl, on Sunday.

  Her father Ismail recalled the moment he discovered his daughter had died.

  "She had big dreams, she help many people," he told Rahila Bano from BBC Asian Network.
