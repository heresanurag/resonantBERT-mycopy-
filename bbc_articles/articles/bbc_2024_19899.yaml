content: |-
  A selection of the photographs we received from around the world.

  Shim Sumin: "I developed a fear of water after falling into it during my childhood. Nevertheless, I was determined to confront this fear and learn to swim, so I dedicated myself to practise for a year. In the summer of 2022, I ultimately visited the ocean, which represented a significant personal transformation for me during that season."
