title: Donald Trump UK visit opposed by Commons speaker - BBC News
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/uk-politics-38885773
content: |-
  MPs applaud the speaker of the House of Commons for declaring he would not choose to invite President Trump to Parliament.

  MPs applauded the speaker of the House of Commons for declaring he would not choose to invite President Trump to Parliament.

  John Bercow said he valued the relationship with the US, but would oppose inviting the president to address MPs and Lords in Westminster.
