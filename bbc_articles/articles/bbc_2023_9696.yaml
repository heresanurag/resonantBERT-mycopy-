title: 'Watch: Otter plays basketball to help ease arthritis - BBC News'
date: '2023-06-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65921265
content: |-
  Zoo staff trained Juno how to slam dunk several years ago so she can exercise her elbow joints.

  Zoo staff in the US have trained a rescued 9-year-old otter, Juno, how to play basketball several years ago in order to exercise her elbow joints and ease her arthritis.

  "Juno loves to play basketball," said Nicole Nicassio-Hiskey, Oregon Zoo's senior marine life keeper. "She gets so excited whenever we bring the ball out for her training sessions. And she's good too!"

  Juno was rescued as a pup after she was orphaned off the coast of California. She was brought to the Monterey Bay Aquarium's rescue and care program for rehabilitation. Unable to be paired with a surrogate mum, she was deemed non-releasable by the U.S. Fish and Wildlife Service.
