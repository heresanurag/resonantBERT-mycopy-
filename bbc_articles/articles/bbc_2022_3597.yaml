id: bbc_2022_3597
title: 'Ukraine: Apartment block just outside Kyiv shelled - BBC News'
date: '2022-03-05'
section: General
url: http://www.bbc.co.uk/news/world-europe-60626065
content: |-
  Video footage from Irpin, just outside the capital, shows multiple projectiles hitting an apartment block.

  A residential block in the city of Irpin, just outside the capital Kyiv, has been shelled, video footage shows.

  Multiple projectiles appear to hit the building, followed by dust clouds.
