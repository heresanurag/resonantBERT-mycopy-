content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  Following the announced changes to the coronavirus shielding programme, a charity boss has called on the government to ensure people are not forced to choose between protecting their health and making ends meet.

  Lynda Thomas, Chief Executive at Macmillan Cancer Support said the easing was "welcome news" for some, but others may be left "incredibly anxious about what's to come".

  "It’s positive that the government have clarified how people can continue to access essential food, medicines, healthcare and financial support, however people need to be reassured that these systems will work," Ms Thomas said.

  She called on the government to make sure there were "no gaps in the support available" for the vulnerable group, and officials should also ensure employers "met their legal obligations" to support former shielding employees had a safe return to work.

  Ms Thomas continued: "Those who are unable to work safely should be able to continue to access support from the Government’s Job Retention Scheme, whether they have been furloughed before or not."
