id: bbc_2019_14920
title: 'General election 2019: The campaign trail in pictures - BBC News'
date: '2019-12-11'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-50742163
content: |-
  The six-week election campaign has seen politicians working hard to win your votes.

  Party leaders and politicians are drawing their election campaigns to a close before polling day on Thursday.

  Here are a few of some of the most striking campaign images from around the UK.

  Labour leader Jeremy Corbyn visited Wales shortly after he was called "a Marmite figure" by Welsh Labour leader Mark Drakeford. Mr Corbyn's response? "A lot of people like Marmite, it's good for them."

  Phillip Schofield and Holly Willoughby joined Boris Johnson for a selfie following his interview on ITV's This Morning.

  Jo Swinson looked less than impressed with this puppet of Boris Johnson during a rally in Edinburgh.

  SNP leader Nicola Sturgeon took questions from a journalist dressed as an elf during a visit to Crieff in Perth and Kinross.

  British boxer Dereck Chisora posed with Brexit party leader Nigel Farage. Jo Swinson and Boris Johnson also donned boxing gloves during the campaign.

  Boris Johnson opted for goalie gloves during a warm up before a football match in Cheadle Hulme, Greater Manchester.

  Jeremy Corbyn took part in an arts and crafts session at Sandylands Community Primary School in Morecambe.

  Scottish Liberal Democrat leader Willie Ronnie (right) and party general election campaign chairman Alex Cole-Hamilton bounced down a street in Edinburgh in the first week of campaigning.

  Nicola Sturgeon did her best Wild Rose impression as she picked up a guitar while campaigning in Kemnay, Aberdeenshire.

  Nigel Farage was pictured looking out from a window on a crabbing boat in Grimsby.

  Jo Swinson spoke to Extinction Rebellion protesters dressed as bees after they glued themselves to the party's battle bus during a visit to Knights Youth Centre in London.

  It was on this farm shop's balcony in Topsham, Devon, that Conservative leader Boris Johnson was asked several times whether he would take part in a BBC interview with presenter Andrew Neil.

  Jeremy Corbyn visited a canal boat cafe serving bacon butties - a sandwich his predecessor Ed Miliband was famously pictured eating in 2014.

  Nicola Sturgeon was not shy when it came to joining in at playtime during a number of visits to nurseries around Scotland during the campaign.

  The main parties focused on the key messages in the final days of campaigning as their tours around the country intensified.

  Liberal Democrat leader Jo Swinson hit the courts at Shinfield Tennis Club in Reading.

  Jeremy Corbyn campaigned next to a statue of Robin Hood in Nottingham.
