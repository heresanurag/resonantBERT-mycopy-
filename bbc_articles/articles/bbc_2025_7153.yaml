title: Moment woman and children narrowly escape manhole explosion - BBC News
date: '2025-04-22'
section: General
url: http://www.bbc.co.uk/news/videos/cx28pe09mv4o
content: |-
  Officials said there were no injuries reported but that high levels of carbon monoxide were discovered in nearby buildings.

  CCTV footage captured the moment a manhole exploded in Poughkeepsie, New York moments after a woman pushing a stroller and walking with a child passed by. The Poughkeepsie Fire Department said there were no injuries reported in the incident but that high levels of carbon monoxide were discovered in multiple buildings on the block. Occupants were evacuated until the gas levels could be brought down.
