title: 'Your pictures of Scotland: 13 - 20 August - BBC News'
date: '2021-08-20'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58222696
content: |-
  A selection of your pictures of Scotland sent in between 13 and 20 August.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Staggering view: "A stag standing above a cloud inversion as seen from the summit of the munro Càrn Dearg, near Dalwhinnie", says Jamie Vince at sunrise.

  Early birds: This sunrise off Aberdeen was captured by Erskine Logan.

  Two's a crowd: "Dolphin photobombed by a gull on the way back from the Shiant Isles in the Hebrides", says Michael Cuthbert.

  Net gain: An early morning shot paid off for Euan Gibson who liked the "coppers and greys of first light" outside St Abbs harbour.

  Creature comforts: "Our kids Rory, five, and Anna, two, have loved watching all the animals around the bird feeder including badgers, birds, squirrels and mice". Lindsay Dixon captured this holiday shot near Aviemore.

  It's not an iceberg: "During my first visit to North Berwick I was very impressed with seeing Bass Rock - it glowed in the sunshine and looked like a giant iceberg", says Ronnie Dukes. "It is a haven for sea birds".

  Why so sheepish? This "wee lamb" beside some thistles on Tiree caught the eye of David Hughes.

  The high-lands "The Great Polish map of Scotland at Eddleston in the Borders", says Jim Mclean. "Amazing detail from my drone".

  Putt of gold? "As a newbie golfer, and totally distracted by the wonderful rainbow over the castle, I can surely be excused hitting the ball into one of these bunkers at the 10th hole of Stirling Golf Club", says Shirley Proctor.

  Just swanning about: "This was Stirling Rambling Club setting off on a Linlithgow walk", says Denis Taylor. "From nowhere, this swan appeared as if it had been in the café".

  Haar-bour scene: "When the haar starts drifting up to my street I grab the camera and go out", says Malena Astrom at the small boat harbour at Wardie Bay, Edinburgh.

  No small feat: "I took this picture on St Kilda of my pals who recently got married", says Willie MacGillivray. "It shows Kyle MacLeod on top of the Lovers Stone on Hirta with his wife Jenna in the foreground".

  ... two can play at that game: "This is a photo taken by my husband Ewan of our daughter Iona on the Isle of Iona", says Sara Armitage. "We are on the top of Dun I, she is holding her younger sister Katie in the palm of her hand!"

  That castle fits the bill: "Kilchurn Castle at Loch Awe - with some ducks included", from Jamie Gordon.

  P-p-pic of a penguin: "A little patience paid off to get this shot at Edinburgh Zoo", says Jaimee Reynolds.

  Field manoeuvres: "A roe deer in Crathes, just before the barley is harvested", says Fraser Elliott.

  May the Forth be with you: "This photo was taken during a cruise", says Kenneth Gilmour.

  Tracking shot: LNER service to Aberdeen passing through Broughty Ferry, courtesy of Cat Gordon.

  Prickly situation: "My daughter Kayla, eight, peeking through the thistles when we were enjoying an evening walk in the sunshine at Gott Bay on the Isle of Tiree", says Lainey McBeth.

  Still life: "While on holiday in Kincraig I biked around Inshriach Forest in the Cairngorms, overlooking the Uath Lochans", says Michael Kellie. "I thought they looked like giant mirrors amongst the forest".

  Eyes bigger than its stomach: "From the angle it was taken it looks like the carved eagle is about to scoop up the poor unsuspecting cow and have it for its tea", says Claire Buchanan at Blairlogie near Stirling.

  Blooming lovely: "Kailzie Hill and Hundleshope Heights above Peebles were a riot of colour after huge swathes of heather burst into full bloom", says David Gray.

  Ripple effect: "A photograph taken by my son Lewis who captured his reflection in a rock pool during a walk at Yellowcraig, East Lothian", says Steven Gillies.

  All shipshape: An evening shot at Macduff Harbour, from Maurice Bennett.

  On reflection: "A beautiful swan at Keptie Pond, Arbroath", says Linda Bolt.

  Peek-a-coo: "Nosey neighbours", says Carolyn France. "The cows on the croft at our holiday cottage near Tarbert, Harris, were very interested in us and our car. The following day it was covered in lick marks!"

  ... and another peek-a-coo: "This is a photo of my daughter Síofra from Dublin checking out the Tay Rail Bridge in Newport", says Louise McManus of her photo next to pigeon images. "We were visiting her grandparents in Broughty Ferry for the first time since she was born."

  Home maker: "Gannet returning to the Bass Rock carrying seaweed to patch up its nest", says Ian Woodrow.

  Brewing up a storm: Natalie Gallan captured this menacing scene at Footdee (pronounced Fittie) in Aberdeen by the sea.

  Tents atmosphere: "I thought you might like this photo of the Big Tent at Fringe by the Sea in North Berwick", says John Drysdale. "It was taken prior to Reginald D Hunter’s show"

  A quiet place: "I took this from my kayak", says James Henderson, after a trip around Calve Island off Tobermory, Isle of Mull. "The day was pretty grey and drizzly, but the evening was amazing, so clear with beautiful colours. Absolutely flat calm."

  Sun and daughters: "My girls Amelia, eight, with her baby sister Ailidh, who is 10 months", says Alex Valentine. "Taken at Polkemmet Country Park in West Lothian".

  This is nut what I had in mind: "Cheeky squirrel stuck in 'squirrel-proof' bird feeder", as seen by Roy Williamson. It escaped by itself soon after, apparently.

  Well-heeled: Six-year-old Ayda McGregor seems to have things under control during dog walking duties with Sue Forrester in Falkland, Fife.

  Cast away: "I was up in West Ardnamurchan and this particular photo was taken from Sanna Bay looking south towards Ardnamurchan Point Lighthouse", says Marcus Milton. "My two youngest sons are fishing in the foreground".

  Rays the bar: "This was taken towards sunset while out walking after I noticed a passing walker looking over my shoulder at the way the light was coming through the clouds", says Gerry McCormick of his impressive shot at Clarkston, East Renfrewshire.

  Not quite a full moon: "I took this from Stirling University", says Barry Hughes. "I noticed the moon was just emerging from behind the National Wallace Monument and managed to get this photo".

  Delayed reaction: "I was delighted to get up Ballageich Hill just outside Glasgow on a clear night to see the annual Perseid meteor shower", says William Johnston. "I set up my camera to continuously shoot long exposures for an hour to capture the rotation of the stars and this is what turned out!"

  Board meeting: "Rachel and William, my daughter and son, enjoying the sunset on their paddleboard at Port Ban, Achateny, Ardnamurchan", says George Urquhart of his lovely shot.

  The night Skye: Stuart McGinlay captured this wonderful image at Dunvegan.

