title: Police ride snowmobiles as snowstorm hits North America - BBC News
date: '2025-02-14'
section: General
url: http://www.bbc.co.uk/news/videos/cwyjv9k5d9jo
content: |-
  Heavy snowfall has downed power lines and left tens of thousands without electricity in the US and Canada.

  A snowstorm sweeping through the US and Canada has left tens of thousands of people without power.

  The weather front brought icy rainfall and more than a foot (30.48cm) of snow to some areas.

  At Toronto Pearson Airport in Canada more snow fell in one night than than all the snow in January combined.
