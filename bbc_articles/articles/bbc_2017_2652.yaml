title: Steel firm unlocked disabled woman's potential - BBC News
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/business-39052747
content: |-
  A young disabled woman discusses how she overcame barriers to find a fulfilling job in South Africa.

  There are close to three million South Africans who suffer from some form of disability and they experience high unemployment, due to discrimination and lack of access.

  One exception to the trend is Mbalenhle Nkhumelani, who was left paraplegic after a childhood injury, but has found employment with the global steelmaker ArcelorMittal.
