content: |-
  Chelsea right-back Reece James is set for his first start for England since September 2022 in Monday's World Cup qualifier against Latvia.

  James set for first England start since 2022

  Reece James (right) has struggled with injuries over recent years

  Chelsea right-back Reece James is set for his first England start since September 2022 in Monday's World Cup qualifier against Latvia. Crystal Palace centre-back Marc Guehi is also hopeful of returning to the side following his shock omission from the 2-0 win over Albania on Friday. Neither defender started that game, although James came on in the final minute. Guehi was one of England's key players in their run to the Euro 2024 final last summer. But he was omitted in place of Dan Burn and Ezri Konsa against Albania. However, he could now get the nod against Latvia.

  Burn has faced some criticism since the win over Albania, and it remains to be seen whether he has kept his place. Intriguingly, Thomas Tuchel has kept the team guessing over the full starting XI, with the head coach not naming his team until late afternoon. He did not name the team that started against Albania until noon on Friday. Newcastle United defender Tino Livramento has been left out of England's squad for the game. The 22-year-old was an unused substitute for the Albania game. Tuchel selected a 26-man squad for fixtures against Albania and Latvia but Uefa rules state that a 23-man matchday squad must be picked for each individual match. Nottingham Forest midfielder Morgan Gibbs-White and Liverpool defender Jarell Quansah, who both missed Friday's match, return to the squad while Newcastle winger Anthony Gordon drops out after returning to his club following injury. Southampton goalkeeper Aaron Ramsdale has also been left out again. "We have to get the process right to find the best group," Tuchel said. "If that means we leave very good and talented players out of the squad this can happen. In the next 16 months it is important we find the right team and not the most talented 26 players. "We need to get the team right. We need to get the team spirit right because it's one thing to play qualifiers, it's another thing to play tournament football."
