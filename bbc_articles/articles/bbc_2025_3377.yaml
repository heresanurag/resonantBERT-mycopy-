  Ollie Lawrence's Achilles injury in the early stages of England's win was a blow to club, country and potentially the Lions. Apart from England's Six Nations finale in Cardiff, it is likely to rule the centre out of Bath's Premiership run-in and consideration for this summer's tour. Lawrence has been one of England's leading lights in both attack and defence, while midfield partner Henry Slade was dropped for Fraser Dingwall against the Azzurri. Former England wing Chris Ashton said he was "absolutely gutted" for Lawrence. "He was almost nailed on after the way the Irish centres were handled by France on Saturday, which made his case stronger," Ashton told BBC Rugby Union Weekly. "There is still a lot to be discussed in the centre with Scotland's Sione Tuipulotu [injured] to come back too but it looks like Lawrence will be unavailable now." As Ashton alluded to, Ireland's Bundee Aki, a Lions tourist to South Africa in 2021, had a quiet afternoon in the defeat by France before being replaced by Jack Crowley in the 55th minute. Scotland's Tom Jordan, meanwhile, produced an impressive display at inside centre in victory over Wales. The New Zealand-born 26-year-old, who can also operate at fly-half, was on hand to support midfield partner Huw Jones for his opening try and also dotted down twice himself. He was also sound defensively for the most part - although he was easily shrugged off by Teddy Williams in the build-up to Wales' third try.

  Former Ireland and Lions wing Simon Zebo says "hot competition" remains across the back-three positions. Wing Duhan van der Merwe had some nice touches but did not score any of Scotland's five tries against Wales, and Ireland's James Lowe injured his back in the warm-up in Dublin and had to withdraw. England wing Tommy Freeman added his fourth try of the campaign with a powerful finish from Elliot Daly's clever kick through, while his Northampton club-mate Ollie Sleightholme scored twice out wide. Zebo says Freeman, who has the second-most tries in the tournament alongside Jones, is a strong contender for the Lions. "He has been fantastic for Northampton for some time and is a fantastic finisher," Zebo told BBC's Six Nations Rugby Special. "He is definitely in with a shout. It is hot competition in the back three but he is probably the form player at the moment." Scotland full-back Blair Kinghorn, meanwhile, also strengthened his claim for a place in the Test team. The Toulouse flier showed his athleticism and power to finish two tries in victory over Wales, but his unavailability in the early stages of the tour with the Top 14 season still ongoing may concern Farrell. Elsewhere, Hugo Keenan had a quiet game for Ireland and England's Marcus Smith was dropped for Daly, before producing an impressive try-scoring performance from the bench at Allianz Stadium. Lawrence's early injury saw Smith, who usually operates at fly-half, enter the fray at full-back with 32-year-old Daly moving into midfield. Daly will be targeting a third Lions tour after starring at outside centre, while Smith made a crucial try-saving tackle on Italy's Matt Gallagher before stretching England's lead with a fine solo finish at the other end.

