title: 'Lions watch: Who impressed in Six Nations round four? - BBC Sport'
date: '2025-03-11'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/ce8mzke00k1o
content: |-
  After an entertaining penultimate round of the Six Nations, BBC Sport looks at the Lions selection battle across three areas.

  Scotland's Blair Kinghorn and England's Ollie Chessum both starred for their nations during Six Nations round four

  The selection dilemmas facing British and Irish Lions head coach Andy Farrell rumble on after an entertaining penultimate round of the Six Nations. Ireland were beaten by France in Dublin, while Scotland withstood a Wales fightback to claim victory and recover from defeat by England, who cruised past Italy. BBC Sport looks at the Lions selection battle across three areas with just one round of the Six Nations remaining.

  Before France arrived in Dublin, Ireland were on course for the Grand Slam and a record third consecutive title after wins over England, Scotland and Wales. Eighty minutes later, the hosts' crown had started to slip. Les Bleus ended Ireland's Slam chances and moved to the top of the standings in a blow to the hosts' collective and individual targets. The Ireland engine room has been largely untarnished in the opening three rounds, and while Tadhg Beirne remained solid, Joe McCarthy fell foul of some costly ill-discipline. The 23-year-old was shown an early yellow card for a needless pull on Thomas Ramos, which led to Louis Bielle-Biarrey's opening try for France. Ireland's defeat had handed England an opportunity to leapfrog them in the table with victory over Italy at Allianz Stadium. The hosts were comfortable winners with captain Maro Itoje continuing his fine form, while his lock partner Ollie Chessum was a standout performer in the set-piece and from open play. Chessum's tireless display, including some hard carrying with ball in hand, resulted in a player-of-the-match performance - just days after the Leicester forward had been unable to train because of illness. The 24-year-old can also play in the back row and his versatility will be a bonus when considering forward options in Australia.

