  It is one of several viral social media trends that have resulted in warnings from schools and experts about their dangers. TikTok said in 2021 it would strengthen its detection and enforcement of rules around dangerous online challenges, and reportedly blocked some searches for the blackout challenge. But it has faced a number of lawsuits and accusations from parents of deceased children claiming it recommended harmful content to them. The Social Media Victims Law Center helped Tawainna Anderson sue the platform in 2022 after her 10-year-old daughter Nyla died after allegedly taking part in the blackout challenge. A US appeals court overturned a lower court's dismissal of her case in August 2024.
