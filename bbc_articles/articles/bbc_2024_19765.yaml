title: 'Kemptown: Unusual double yellow lines appear in Brighton - BBC News'
date: '2024-08-24'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cx2n3wwplp2o
content: |-
  The council says "more detail" was added than necessary.

  The city's local authority said it had recently refreshed markings

  Unusual road markings have appeared in Brighton, sparking online jokes and ridicule. The double yellow lines painted on Ardingly Street, Kemptown, loop back on themselves around a kerb and then snake along a wall, where they are seemingly not necessary. Brighton and Hove City Council told the BBC existing markings had been recently refreshed, but it accepted "more detail" was given than required. Some commentators on Facebook joked "only in Brighton", while others criticised the council as "not fit for purpose".

  People wrote on social media the markings had made them smile

  One online commentator suggested the painter was a "frustrated graffiti artist". "Is this a new Banksy," quipped another on Facebook. Others suggested that if the markings were not there people would park in the spot to avoid charges. "They [the council] probably wouldn't have to do this if people could just park like decent human beings," one said.

  The markings are in central Brighton

  Councillor Trevor Muten, cabinet member for transport, parking and public realm, said: "These are not new parking restrictions and this area already had these yellow lines in place. “We recently completed some resurfacing work and refreshed the existing lines as they were. “While we appreciate the contractor’s precision in not cutting corners and following what was there previously, we accept it is probably more detailed than is needed.”
