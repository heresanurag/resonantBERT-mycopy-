title: 'M6: Dashcam captures lorry falling 60ft from Thelwall Viaduct - BBC News'
date: '2024-10-01'
section: England
url: http://www.bbc.co.uk/news/articles/cy8057g787lo
content: |-
  Police say it was "remarkable" the driver was not more seriously injured.

  This video can not be played To play this video you need to enable JavaScript in your browser. Dashcam footage captured the moment a lorry crashed through the barriers and fell off the Thelwall Viaduct on the M6

  Dashcam footage captured the dramatic moment a lorry left a motorway carriageway and plummeted 60ft (18m) on to an embankment. The lorry fell from the Thelwall Viaduct on the M6 near Warrington, Cheshire, at about 18:50 BST on Monday. Cheshire Police said the 56-year-old male driver was not believed to have suffered any life-threatening injuries and he was taken to hospital with minor injuries. It released dashcam images of the HGV's plunge as Insp Anton Sullivan said was "remarkable" the driver was not more seriously injured.

  The lorry fell down on to an embankment under Thelwall Viaduct in Cheshire

  Cheshire Fire and Rescue Service said firefighters used specialist equipment to lower themselves down to reach the driver. Crews then used water to cool the lorry. They also contained a leak of about 220 gallons (1,000 litres) of bio-diesel from the vehicle's fuel tanks. Barrier repairs to the motorway bridge have been completed and all the lanes between junction 20 and 21 northbound have now been reopened, police said. National Highways said the HGV has been recovered.

  A fire engine at the Thelwall Viaduct after the crash

  Insp Anton Sullivan said: "It is remarkable that the driver of the HGV was not more seriously injured, and other road users managed to escape unscathed. "This incident had a rapid response and the scene was well managed by officers in dangerous motorway conditions, due to poor visibility and heavy rain. "The recovery phase of the incident was hampered by poor weather and challenging terrain where the lorry had landed." He said the the force, along with firefighters and Highways staff, had worked all day to recover the vehicle and trailer which were completely destroyed.

  The lorry that left the Thelwall Viaduct has been recovered

  He said they also repaired a damaged railing on top of the viaduct before things could get safely back to normal, and thanked motorists for their patience with the delays. The inspector said an investigation into the cause of the plunge was ongoing and asked anyone with information or relevant footage to contact Cheshire Police.
