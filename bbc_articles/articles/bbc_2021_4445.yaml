title: Ash falls like snow after St Vincent volcano eruption - BBC News
date: '2021-04-10'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-56704752
content: |-
  Huge plumes of smoke filled the sky above the Caribbean island, forcing thousands from their homes.

  A series of volcanic eruptions has blanketed parts of the Caribbean island of St Vincent in ash and smoke.

  Locals reported "extremely heavy ash fall and sulphur smells" and thousands of people were forced from their homes.

  La Soufrière, which had been dormant for decades, started showing volcanic activity in December, but that increased this week.

  The first sign that an eruption was imminent came on Thursday evening, when a lava dome became visible on La Soufrière.

  Just before 09:00 on Friday (13:00 GMT), seismologists from the University of the West Indies confirmed that an "explosive eruption" was under way.

  Evacuees were taken to cruise ships and safer parts of the island.
