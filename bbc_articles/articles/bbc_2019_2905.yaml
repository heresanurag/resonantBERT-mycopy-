title: Rescued Glen Coe climber dies after hypothermia - BBC News
date: '2019-03-10'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-47518969
content: |-
  The 57-year-old was airlifted from a mountain after he and another man went missing in Glen Coe.

  Two coastguard helicopters were involved in the operation

  A climber who was rescued after going missing on a mountain in the Highlands has died.

  The 57-year-old was airlifted from Stob Coire nan Lochan, part of the Three Sisters ridges in Glen Coe, on Saturday.

  He and another climber, 49, were found at about midday, both with hypothermia, after they were reported overdue from a climb the previous day.

  Both climbers had travelled to the Glen Coe area from Nottinghamshire as part of a larger group.

  The other climber is at Belford Hospital in Fort William and described as stable.

  The men were found following an extensive search involving police, HM Coastguard and mountain rescue teams.

  The two men were located with assistance from members of the public at around lunchtime on Saturday.

  They were taken to hospitals in Aberdeen and Fort William.

  The man's next of kin have been made aware.

  A number of teams combed the area to find the two men

  The risk of avalanche in Glen Coe on Friday and Saturday was rated "considerable" by the Scottish Avalanche Information Service (SAIS), particularly at corrie rims, gully tops and steep slope tops.

  A SAIS report warned that conditions would "remain wintry and unsettled" for a few days.
