title: US taxes imports from Canada, Mexico and China as Trump's tariffs begin - BBC
  News
date: '2025-02-02'
section: World
url: http://www.bbc.co.uk/news/articles/c627nx42xelo
content: |-
  Trump accuses the US's main trading partners of not addressing concerns over illegal drugs and migration - his main election pledges.

  Trump had threatened to impose major tariffs upon taking office

  Canada, Mexico and China have vowed to respond to sweeping new tariffs to their exports to the US announced by President Donald Trump. Trump said a levy of 25% on Canadian and Mexican imports as well as an additional 10% tax on Chinese goods would come into force on Tuesday. Canadian energy faces a lower 10% tariff. The US president said the move was in response to his concerns about illegal immigration and drug trafficking - two of the main promises on which he was elected. In response, both Canada and Mexico said they were preparing similar tariffs on US goods, while China added it would take "necessary countermeasures to defend its legitimate rights and interests".

  The implementation of tariffs and the subsequent retaliation could mark the start of a new era of global trade wars. Economists have warned the introduction of the import taxes by the US, and the responses from other countries, could lead to prices rising on a wide range of products, from cars, lumber, and steel to food and alcohol.
  • None China, Mexico and Canada to retaliate in kind - follow reaction Consumers in all countries could see an increase in the cost of living if businesses decide to pass on higher costs to customers, with US industry groups already raising the alarm. But Trump has indicated he is ready to escalate the duties further if the countries retaliate. "Today's tariff announcement is necessary to hold China, Mexico, and Canada accountable for their promises to halt the flood of poisonous drugs into the United States," the White House said in a statement on X on Saturday. Trump posted on his Truth Social platform: "This was done through the International Emergency Economic Powers Act (IEEPA) because of the major threat of illegal aliens and deadly drugs killing our Citizens, including fentanyl."
  • None How countries respond to Trump's tariffs is what matters next
  • None China ready for new US tariffs A tariff is a domestic tax levied on goods as they enter the country, proportional to the value of the import. They are a central part of Trump's economic vision. He sees them as a way of growing the US economy, protecting jobs and raising tax revenue - and in this case, pushing for policy action. Together, China, Mexico and Canada accounted for more than 40% of imports into the US last year.

  Canada, Mexico and the US have deeply integrated economies, with an estimated $2bn (£1.6bn) worth of manufactured goods crossing the borders daily. In its announcement, the White House accused Mexico's government of having "an intolerable alliance" with Mexican drug trafficking organisations. In her response, Mexican President Claudia Sheinbaum called allegations that the Mexican government had alliances with criminal organisations "slander". Sheinbaum called on the US to do more to clamp down on the illegal flow of guns south to arm the cartels. Her country is willing to work with the US, she said. "Problems are not resolved by imposing tariffs, but by talking." She instructed her economy minister to respond with tariff and non-tariff measures, which are expected to include retaliatory tariffs of 25% on US goods into Mexico. Canada has already announced retaliatory tariffs against the US, with Canadian Prime Minister Justin Trudeau matching the 25% imposed on his country. He set out "far-reaching" tariffs would affect 155bn Canadian dollars' worth ($106.6bn; £86bn) of American goods ranging from beer and wine, to household appliances and sporting goods. Non-tariff measures being considered are related to critical minerals and procurement, although Trudeau did not offer more detail.

  "We don't want to be here, we didn't ask for this," he said. "But we will not back down in standing up for Canadians." The Canadian prime minister pushed back on the suggestion the shared border posed a security concern, saying less than 1% of fentanyl going into the US comes from Canada. He also added less than 1% of illegal migrants entered the US through the border. Canada is America's largest foreign supplier of crude oil. According to the most recent official trade figures, 61% of oil imported into the US between January and November last year came from Canada. China said it "firmly opposes" the tariffs, but has not yet announced any retaliatory measures. The 10% tax on its imports to the US will be added over and above tariffs already imposed on China by Trump in his first term and by President Joe Biden. "Trade and tariff wars have no winners," said a spokesperson at China's Washington embassy.

