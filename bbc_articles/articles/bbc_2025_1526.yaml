  Trump has acknowledged there could be "some temporary, short-term disruption" a as a result of tariffs. The car manufacturing sector could be especially hard hit. Parts cross the US, Canadian and Mexican borders multiple times before a final vehicle is assembled. TD Economics suggested the import taxes could push up the average US car price by around $3,000, while the National Homebuilders Association said housing costs could increase. The Canadian Chamber of Commerce said the levies would have "immediate and direct consequences on Canadian and American livelihoods" and will "drastically increase the cost of everything for everyone". The Farmers for Free Trade said with many US farmers already struggling, "adding tariffs to the mix would only exacerbate the situation across much of rural America". But the US Retail Industry Leaders Association, which includes big names such as Home Depot, Target and Walgreens among its more than 200 members, expressed hope tariffs could still be averted. The White House, explaining on Saturday why it was targeting its top trading partners, said Mexican cartels were responsible for trafficking fentanyl, methamphetamine and other drugs. It said tariffs on Canada would remain until it "co-operates with the US against drug traffickers and on border security". Lastly, it said "China plays the central role in the fentanyl crisis" with exports of the lethal synthetic painkiller. Both the northern and southern US borders have reported drug seizures, though amounts at the border with Canada are considerably lower than those with Mexico, according to official data. US border agents seized 43lbs (19.5kg) of fentanyl at the northern border between October 2023 and last September, compared to more than 21,000lbs (9,525.4kg) at the southern border. Still, recent reports from Canadian intelligence agencies suggest a growing number of transnational organised crime groups are manufacturing drugs in Canada. Ashley Davis, a Republican lobbyist for businesses, who represents major US companies, including Walmart and Boeing, and has been involved in discussions about tariffs, told the BBC's World Business Report she thought Trump would pull back on the tariffs in North America if he could point to progress on the issues he has raised as complaints – especially immigration. "You have to remember – the border and China are the two biggest issues that Americans voted him on in the elections in November. Anything he can do to claim wins on that, I think he's going to do," she said.
