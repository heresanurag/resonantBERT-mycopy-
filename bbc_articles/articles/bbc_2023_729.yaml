title: 'Ukraine: Scene of devastation after Brovary helicopter crash - BBC News'
date: '2023-01-18'
section: General
url: http://www.bbc.co.uk/news/world-europe-64325218
content: |-
  Ukraine's interior minister and a child were among those killed when a helicopter came down near Kyiv.

  Ukraine's interior minister has been killed in a helicopter crash near a nursery in Brovary, east of Kyiv.

  Denys Monastyrsky, his first deputy minister and state secretary were among 14 people who died in the incident. A child was one of the other victims.

  Officials often fly at low altitude to avoid Russian missiles but the cause of the crash is being investigated.
