title: Woman dies in hospital following dog attack in Southend-on-Sea - BBC News
date: '2024-08-02'
section: Essex
url: http://www.bbc.co.uk/news/articles/ck5gkpk7r5ko
content: |-
  Essex Police says the dog, which is not a banned breed, has been seized.

  Essex Police was called to a property in Retort Close, Southend-on-Sea, on Monday evening

  A 34-year-old woman died after she was attacked by a dog, police said. Michelle Hempstead suffered serious injuries in the incident at Retort Close, Southend-on-Sea. The ambulance service was called at 23:30 BST on Monday and Ms Hempstead, whose name was given locally, was taken to the Royal London Hospital on Tuesday where she died. Essex Police said the dog, which was not a banned breed, had been seized.

  Police said officers were not looking for anyone else in connection with the incident and a file would be prepared for the coroner in due course. "Our deepest sympathies are with the family of the woman involved at this time," Det Supt Gary Biddle said. "While our investigation into the circumstances of this tragic incident continues, we would ask that the privacy of the woman's family is respected." The BBC understands at least one of the seized dogs was a Pomeranian.

  Marie Russell, who lives in the block of flats where the incident took place, said the victim was a "lovely, lovely lady". "She shouted 'My dog's bit me', then ran off trying to get away in case the dog got out," Ms Russell told the BBC. "She collapsed and another resident found her. We were all there, 15 of us trying to get out to get to her and help her. "When we heard the news we were all very shocked. We knew how bad it was but now everyone's giving each other comfort. "I feel grateful to the neighbours that we all did try and work together for her and did the best we could, not knowing what to do."

  The woman collapsed in an archway

  At the scene on Thursday afternoon, BBC reporter Laura Foster said: "Having spoken to many people on this quiet cul-de-sac in Southend, we now have a better idea of what happened on Monday night. "A 34-year-old woman died after being attacked in her flat by one of two dogs. "Neighbours have told us that she was crying out for help, shouting 'My dog has bitten me'. "We understand she then ran out of her flat, along the pavement before collapsing under an archway near a children’s play area – a distance of around 100m. "A witness told us the woman had been bitten in her upper arm. "The two dogs, believed to be a Pomeranian and a bull mastiff, have been seized by Essex Police. "It’s not clear which one was involved in the attack, but neither is a banned breed."

