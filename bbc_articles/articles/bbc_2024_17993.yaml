title: 'Hamas: What has happened to its most prominent leaders? - BBC News'
date: '2024-08-01'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-67103298
content: |-
  The top figures in Hamas have become targets of Israel since the 7 October attacks.

  Many of Hamas's top leaders have been killed since the group's attack on Israel on 7 October 2023, dealing it a severe blow. Here's what has happened to Hamas's most prominent figures:

  In September 2015, the United States included Sinwar's name on its blacklist of "international terrorists"

  Yahya Sinwar was the architect of the 7 October attacks, in which about 1,200 people were killed and 251 others taken back to Gaza as hostages. He was also one of Israel's top targets from that day on. Sinwar had been the leader of Hamas in Gaza, but became the overall head of Hamas following the assassination of Ismail Haniyeh in Tehran in July this year. Sinwar, who was born in the Gaza Strip in 1962, joined the movement at an early age. He founded Hamas's security service, known as Majd, which manages internal security matters, investigates suspected Israeli agents, and tracks down Israeli intelligence and security services officers. Israel had arrested Sinwar three times. After his third arrest in 1988 he was sentenced to four life terms in prison. However, he was among 1,027 Palestinian and Israeli Arab prisoners released by Israel in exchange for an Israeli soldier held captive for over five years by Hamas. Sinwar returned to his position as a prominent leader in Hamas and was appointed head of the group's political bureau in the Gaza Strip in 2017. In 2015, the US included Sinwar on its blacklist of "international terrorists". Sinwar was killed by Israeli forces in Rafah on 16 October 2024.

  Haniyeh was killed in an explosion on a visit to Tehran in July 2024

  Ismail Haniyeh was Hamas's overall leader until the group confirmed his death in Iran on 31 July 2024. A prominent member of the movement in the late 1980s, Israel imprisoned Haniyeh for three years in 1989 as it cracked down on the first Palestinian uprising. He was then exiled in 1992 to a no-man's-land between Israel and Lebanon, along with a number of Hamas leaders. After a year in exile, he returned to Gaza. In 1997 he was appointed head of the office of Hamas's spiritual leader, strengthening his position. Haniyeh was appointed Palestinian prime minister in 2006 by President Mahmoud Abbas after Hamas won the most seats in national elections, but was dismissed a year later after the group ousted Mr Abbas' Fatah party from the Gaza Strip in a week of deadly violence. Haniyeh rejected his sacking as "unconstitutional", stressing that his government "would not abandon its national responsibilities towards the Palestinian people", and continued to rule in Gaza. He was elected head of Hamas's political bureau in 2017. In 2018, the US Department of State designated Haniyeh a terrorist. He had lived in Qatar for the last several years.

  Deif was known for his ability to evade assassination, but Israel says it killed him in July 2024

  Mohammed Deif was the head of Hamas's military wing - al-Qassam Brigades - and is thought to have been a key planner of the 7 October attack. He was a shadowy figure known to Palestinians as The Mastermind, and to Israelis as The Cat with Nine Lives. Israeli authorities imprisoned him in 1989, after which he formed the al-Qassam Brigades with the aim of capturing Israeli soldiers. After his release, he helped engineer the construction of tunnels that have allowed Hamas fighters to get inside Israel from Gaza, Deif was one of Israel's most-wanted men, accused of planning and supervising bus bombings which killed tens of Israelis in 1996, and of involvement in the capture and killing of three Israeli soldiers in the mid-1990s. Israel imprisoned him in 2000, but he escaped at the beginning of the second Palestinian uprising, or intifada. In one assassination attempt, in 2002, Deif survived but lost one of his eyes. Israel said he also lost a foot and a hand, and that he had difficulty speaking. Israeli security forces again failed to assassinate Deif during a 2014 assault on the Gaza Strip, but killed his wife and two of his children. Israel says it eventually killed Deif in an air strike on a compound in Khan Younis in July 2024.

  Marwan Issa is thought to have played a significant role in attacks on Israel

  Marwan Issa was the deputy commander-in-chief of al-Qassam Brigades and believed to have been a key planner of the 7 October attack. He was on Israel's most-wanted list for years, and was injured when it attempted to assassinate him in 2006. Israeli forces detained Issa during the first intifada, or Palestinian uprising (1987-93), for five years because of his activity with Hamas. The Palestinian Authority arrested him in 1997, but he was freed after the second intifada began in 2000. Israeli warplanes destroyed Issa's house twice during invasions of Gaza in 2014 and 2021, killing his brother. Issa was given the nickname the Shadow Man, Israeli media reported, because of his ability to evade being found, and it was not known what he looked like until 2011, when he appeared in a group photo taken during a reception for exchanged prisoners. Israel says it killed Issa in an air strike on a tunnel under a refugee camp in the central Gaza Strip in March 2024.

  Meshaal is one of the founders of Hamas

  Khaled Meshaal, who was born in the West Bank in 1956, is considered one of the founders of Hamas. Under direct instructions from Israeli Prime Minister Benjamin Netanyahu, Israel's Mossad spy agency attempted to assassinate Meshaal in 1997 while he was living in Jordan. Mossad agents entered Jordan with forged Canadian passports and Meshaal was injected with a toxic substance while walking along a street. Jordanian authorities discovered the assassination attempt and arrested two Mossad members. The late King Hussein of Jordan asked Israel's PM for the antidote for the substance Meshaal was injected with. Facing pressure from then US President Bill Clinton, Mr Netanyahu provided the antidote after initially rejecting the request. Meshaal, who lives in Qatar, visited the Gaza Strip for the first time in 2012. He was received by Palestinian officials and crowds of Palestinians came out to welcome him. Hamas elected Ismail Haniyeh to succeed Meshaal as head of its political bureau in 2017, and Meshaal became head of the group's political bureau abroad.

  Mahmoud Zahar was born in Gaza in 1945 to a Palestinian father and an Egyptian mother. He is considered one of Hamas' most prominent leaders, and a member of the movement's political leadership. He went to school in Gaza and university in Cairo, then worked as a doctor in Gaza and Khan Younis until Israeli authorities dismissed him over his political position. Mahmoud Zahar was held in Israeli prisons in 1988, months after the founding of Hamas. He was among those deported by Israel to southern Lebanon in 1992, where he spent a year. With the Hamas movement winning Palestinian general elections in 2006, Zahar joined the Ministry of Foreign Affairs in Prime Minister Ismail Haniyeh's newly formed government before its eventual dismissal. Israel attempted to assassinate Zahar in 2003, when a plane dropped a bomb on his house in Gaza City. The attack left him with minor injuries, but killed his eldest son, Khaled. His second son, Hossam, who was a member of the al-Qassam Brigades, was killed in an Israeli air strike in Gaza in 2008.
