title: Reduce electricity bills in an hour - how are homes doing it? - BBC News
date: '2023-01-23'
section: Business
url: http://www.bbc.co.uk/news/live/business-64374308
content: |-
  Customers are telling us how they are changing their use to save money, and our expert is answering your questions.

  We're going to close this page shortly but first, let's take stock of what's been happening today.

  First energy-saving scheme rollout: Outside of trials, today marked the first time some energy customers could earn money for cutting back on the electricity they used.

  How it works: Officially dubbed the Demand Flexibility Service , it sees energy suppliers pay customers a small bonus if they use less electricity than usual, at a particular time (today was between 17:00 and 18:00 GMT). The money earned is then taken off a customer's bill.

  People who can partake: You must have an electricity smart meter installed and be with a provider signed up to the scheme (there are 26 in total, including British Gas and E.ON Next). Providers must also offer you the chance to take part.

  User experience: Some of our readers, who took part in today's session, documented their experience. You can catch up on their stories by scrolling down.

  What happens next... There'll be another energy-saving session tomorrow, which is due to last for an hour and a half (between 16:30 and 18:00). We're yet to hear details about more dates.

  For more information, including how much of a discount can be made, read our main story.
