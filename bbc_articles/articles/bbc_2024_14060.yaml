title: 'Paris Olympics 2024: Helen Glover in Team GB rowing squad - BBC Sport'
date: '2024-06-05'
section: Olympic Games
url: http://www.bbc.co.uk/sport/rowing/articles/czddj1qw5j0o
content: |-
  Helen Glover won gold at the 2012 and 2016 Olympic Games

  Two-time gold medallist Helen Glover is set to compete in her fourth Olympics after being selected for Paris 2024. After having three children the 37-year-old, who won gold in 2012 and 2016, came out of retirement to race at Tokyo 2020 in the summer of 2021 and finished fourth in the women's pairs. "A huge reason for aiming for Paris was thinking how great it will be to have my family there to watch and support me," said Glover. "Being able to share all of this with them is so special." She will race in the women’s four, while Tokyo 2020 silver medallist Tom Barras returns in the men’s quadruple sculls. Brother and sister Tom and Emily Ford have also been included in the 42-person squad of 23 women and 19 men, with half of the team set to make their Olympic debuts.

  Team GB chef de mission Mark England said: "The Olympic experience in this squad is huge, and I have no doubt it will be an asset to the 21 rowers who will make their Olympic debut in Paris this summer. "Team GB is also set to include more women than men in the team for a second successive Games and it is fantastic to see two mothers, Helen Glover and Mathilda Hodgkins Byrne, named as part of the team today." The rowing will take place at the National Olympic Nautical Stadium of Ile-de-France, 20 miles outside Paris, from 27 July to 3 August.
