  The 26-year-old, who owns a fleet of luxury cars, was caught speeding on the M60

  Manchester United striker Marcus Rashford has been banned from driving for six months after admitting speeding, court officials have confirmed. The 26-year-old, who owns a fleet of luxury cars, was caught exceeding the 70mph (112km/h) speed limit on the M60 in Manchester on 12 December last year in a Rolls-Royce. HM Courts and Tribunals Service confirmed the forward had been disqualified for six months, fined £1,666, and ordered to pay £120 court costs and £66 surcharge. The speed Rashford was travelling at was not available on the court record.

  Rashford's representatives have been contacted for comment. Awarded an MBE in 2021 for his charity work, the footballer recently said he was planning to take some time to reset mentally after acknowledging he has endured a "challenging season". He was not included in manager Gareth Southgate's squad after enduring a difficult season, scoring just eight times for United in all competitions. He thanked fans for their support, telling his seven million followers on X he would be coming off social media to "rest and reset". The speeding incident came three months after he was left unhurt following a car crash in September last year. Manchester United players had returned to their Carrington training base on the team bus following their Premier League victory over Burnley at Turf Moor. After collecting their own cars and setting off for home, Rashford - in one of his £700,000 Rolls-Royce cars - was involved in a collision with another car. Emergency services attended the scene, but Rashford did not require medical attention and no arrests were made. He also reportedly owns a £280,000 McLaren 765 Long Tail and a £350,000 Lamborghini Urus Performante.
