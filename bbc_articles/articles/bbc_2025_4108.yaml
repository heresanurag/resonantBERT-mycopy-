title: 'Challenge Cup draw: Hull FC to face Hull KR in quarter-finals - BBC Sport'
date: '2025-03-18'
section: Rugby League
url: http://www.bbc.co.uk/sport/rugby-league/articles/cx291n9ype7o
content: |-
  Hull FC will face city rivals Hull KR in the Challenge Cup quarter-finals following their sensational comeback win against holders Wigan Warriors.

  John Cartwright's side trailed 22-6 at half-time but roared back in the second half to beat the 21-time champions 26-22.

  They will face Hull KR in the last eight at MKM Stadium, after Willie Peters' team cruised past second second-tier Oldham.

  The last time the pair met in the Challenge Cup was in 1986.

  Last year's beaten finalists Warrington Wolves will host St Helens after beating Widnes Vikings, while 2023 champions Leigh Leopards will face Wakefield Trinity.

  The draw, made live on the BBC, pits 2018 winners Catalans Dragons - who will start as heavy favourites - against Super League strugglers Salford in Perpignan.

  All ties will be played across the weekend of 5 and 6 April.
