title: 'Ian Tomlin death: Battersea murder-accused pair in court - BBC News'
date: '2018-10-20'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-45923273
content: |-
  Michael Swan and Gary Beech are charged with the murder of Ian Tomlin in Battersea.

  Ian Tomlin was described as a "great father"

  Two men have appeared in court charged with murdering a father-of-two who was beaten to death outside his home in Battersea, south-west London.

  Ian Tomlin, 46, was killed outside flats on Charlotte Despard Avenue on Wednesday.

  Gary Beech, 48, who lives on the same street, and Michael Swan, 45, from Wandsworth, appeared at Wimbledon Magistrates' Court on Saturday.

  Mr Tomlin's cause of death was a head injury caused by blunt force trauma.

  A post-mortem examination was carried out on Friday.

  Magistrate Kevin Hearn remanded Mr Beech and Mr Swan in custody ahead of a hearing at the Old Bailey on 24 October.

  A fundraising page has been set up to raise money for the victim's funeral.

  A local councillor said Mr Tomlin's death had caused "deep upset" in the community

  Mr Tomlin died about 45 minutes after police arrived at the scene

  The GoFundMe page was set up on Saturday and aims to raise £60,000 towards a memorial and a boxing academy in memory of him.

  "Ian was passionate about his boxing and fitness, he also trained as a boxer many years ago," the page said.

  "Our family want to give Ian Tomlin a send-off that stays with the community and the general public."

  Mr Tomlin's father, Cecil Tomlin, told the Evening Standard his son was a "a great father".

  The victim had worked for a waste company contracted to Wandsworth Council. Leader Ravi Govindia described the killing as "truly shocking".

  The Metropolitan Police said extra patrols would be carried out around the estate where Mr Tomlin was killed.

  More than 100 murder investigations have been launched across London so far in 2018.

