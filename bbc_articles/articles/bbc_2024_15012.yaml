title: MP Clive Lewis makes anti-monarchy protest as he is sworn in - BBC News
date: '2024-07-12'
section: Politics
url: http://www.bbc.co.uk/news/articles/cnl0q2lqgepo
content: |-
  MPs must be sworn in in order to take part in debates, votes or receive their salary.

  Clive Lewis has been the Labour MP for Norwich South since 2015

  An MP declared his allegiance to the King "under protest" as he took his seat in the House of Commons. Clive Lewis has been the Labour MP for Norwich South since 2015 and lined up alongside 649 MPs in the chamber as the swearing-in process began. When it came to his turn, external he said: "I take this oath under protest and in the hope that one day my fellow citizens will democratically decide to live in a republic." By law, MPs have to make an oath or affirmation of allegiance to the crown and are not allowed to speak in debates, votes or receive their salary until they do so.

  During his swearing-in speech, he continued: "Until that time I do solemnly sincerely and truly declare and affirm that I will be faithful and bear true Allegiance to His Majesty King Charles, according to the law." Typically, when MPs swear in they can chose a religious or non-religious text.
