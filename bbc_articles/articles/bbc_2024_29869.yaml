content: |-
  Donald Trump is facing three criminal cases and a sentencing over a felony conviction.

  What happens to Trump’s convictions and legal cases after election win?

  Trump is the first person with a felony conviction to serve as president

  Donald Trump will be the first president to take office while several criminal cases against him are pending. His ascent to the highest office in the US while facing dozens of criminal charges has left the country in uncharted territory. Many of his legal problems will go away when he steps into the White House. Discussions already have started between Trump's team and the office overseeing federal cases about how to wind those down, according to the BBC's US news partner CBS. Here's a look at what could happen with each of the four legal challenges he faces.

  Donald Trump was convicted on 34 felony counts of falsifying business records in May in New York. A jury of New Yorkers found him guilty of all counts in connection with a hush-money payment made to an adult film star. Judge Juan Merchan pushed back Trump's sentencing from September to 26 November, after the election. He could still go forward with the sentencing as planned despite Trump's win, said former Brooklyn prosecutor Julie Rendelman. But legal experts said it is unlikely that Trump would be sentenced to prison as an older, first-time offender. If he was, his lawyers would appeal the sentence immediately, arguing that jail time would prevent him from conducting official duties and that he should remain free pending the appeal, Ms Rendelman said. "The appellate process in that scenario could go on for years," she said.

  Special counsel Jack Smith filed criminal charges against Trump last year over his efforts to overturn his 2020 election loss to Joe Biden. The case has been in legal limbo since the Supreme Court ruled this summer that Trump was partially immune from criminal prosecution over official acts committed while in office. Smith has since refiled his case, arguing Trump's attempts to overturn the election were not related to his official duties. This is one of the cases which could be wound down under current discussions.

  As president-elect, Trump's criminal problems from the case now "go away", according to former federal prosecutor Neama Rahmani. "It's well established that a sitting president can't be prosecuted, so the election fraud case in DC District Court will be dismissed," he said. Mr Rahmani said that if Smith refuses to dismiss the case, Trump can simply get rid of him, as he has pledged to do already. "I would fire him within two seconds," Trump said during a radio interview in October.

  Smith also is leading a case against Trump over his alleged mishandling of classified documents after he left the White House, charges Trump denies. He is accused of storing sensitive documents in his Mar-a-Lago home and obstructing Justice Department efforts to retrieve the files. The judge assigned to the case, Trump-appointee Aileen Cannon, dismissed the charges in July, arguing Smith was improperly appointed by the Justice Department to lead the case. Smith appealed the ruling, but with Trump set to take office, talks are now underway about ending the case. Mr Rahmani said he expects the classified documents case will meet the same fate as the election case. "The DOJ will abandon its Eleventh Circuit appeal of the dismissal of the classified documents case," he said.

  Trump is also facing criminal charges in Georgia over his efforts to overturn the 2020 election in the state. That case has faced a number of hurdles, including efforts to disqualify District Attorney Fani Willis over her relationship with a lawyer she hired to work on the case. An appeals court is in the process of weighing whether Willis should be allowed to stay on the case. But now that Trump is the next president, the case could face even more delays, or possibly dismissal. It is expected to be paused during Trump's time in office, according to legal experts. Trump's lawyer Steve Sadow said as much when asked by the judge if Trump could still stand trial if elected. "The answer to that is I believe that under the supremacy clause and his duties as president of the United States, this trial would not take place at all until after he left his term in office," he said.

  In theory, yes. A president has never pardoned himself before, so the move would be unprecedented. But presidential pardons only apply to federal cases. Trump has only been convicted of 34 state felony charges, so he would not be able to pardon himself in the New York hush-money case.

