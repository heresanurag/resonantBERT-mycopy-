  Glenda says Amanda had entirely lost faith in the government and believes medication was not helping her

  Things came to a head one day this January. Glenda was growing ever-more nervous about her daughter, and knew she needed urgent medical attention. She says she'd written a "fairly assertive" letter to a hospital where her daughter had been previously treated, warning her condition was getting serious. Travelling to London through the rain, she found herself "phoning and phoning and phoning" the hospital to try to get doctors to intervene again. The following day Amanda was found dead. Asked if she'd ever thought that her daughter might kill herself, Glenda says: "Manda had talked about it. She'd talked about it." She says she can understand her daughter's state of mind that weekend. "Yeah, I've seen it so often. I'm different from her and she felt despair... She wanted justice and she felt it was just awful. I think she lost faith in the government completely."

  Amanda's parents, who still haven't been able to sell the flat, hope their daughter's campaigning will make life easier for people stuck in buildings with defective cladding

  The government says that work is already underway through the Remediation Acceleration Plan "to make sure those responsible for the cladding crisis pay their fair share". It says it is "continuing to look at all options to ensure residents no longer have to deal with the nightmare of living in unsafe buildings". Amanda's flat has now passed to her parents to deal with. Its exterior cladding has now been replaced and they are trying to sell - but they still haven't been able to, due to structural fire issues inside the property. Unless the Building Safety Act is amended by fresh legislation, Amanda's parents or any future purchaser will be liable for paying to fix those problems. Amanda's mother hopes that speaking about her daughter's death has not been in vain, and that her story can be a catalyst. "You go through grief... and perhaps the anger's getting in there a little bit now. "For her sake, we'd love to think that she had caused some small change."
