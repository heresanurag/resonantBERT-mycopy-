content: |-
  Suffolk Police tracked the movements of the couple while the toddler's body was locked in a bathroom.

  Police have released footage of a couple laughing together as they pushed around the body of a toddler in a pushchair.

  Scott Jeff and mother Chelsea Gleason-Mitchell concealed the body of two-year-old Isabella Jonas-Wheildon in a pushchair to go shopping in Ipswich.

  Jeff, 24, was only in the toddler's life for 36 days, after rekindling his relationship with Gleason-Mitchell, also 24.

  The pair are from Bedfordshire and arrived at temporary housing in Ipswich days before the murder.

  During that time Jeff repeatedly beat Isabella, causing her to suffer "traumatic injuries" which ultimately contributed to her death on 26 June 2023.

  After their arrest and subsequent trial, Jeff was sentenced to life with a minimum term of 26 years for murder while Gleason-Mitchell was acquitted of murder but was given 10 years after admitting causing or allowing the death of a child.
