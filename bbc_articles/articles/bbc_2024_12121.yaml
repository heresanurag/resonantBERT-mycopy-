content: |-
  Corey Sewell caused the death of his friend in the Birmingham crash in a 30mph speed limit zone.

  Car flew into the air before fatal 90mph crash

  Cory Sewell was over the drink-drive limit when he killed his friend in a crash while driving at up to 92mph in a 30mph limit area

  A man who killed a friend in a crash while driving at more than 90mph in a 30mph zone has been jailed. Cory Sewell was over the legal alcohol limit when his grey Mercedes was "momentarily airborne" before it hit a lamppost in Birmingham, on 29 April 2023, killing Hamse Ismali, 28. There were two other men in the vehicle, one who suffered minor injuries and a second suffered an arm injury during the crash on Penncricket Lane. Sewell, 27, was jailed for nine years after he pleaded guilty at Wolverhampton Crown Court to one count of causing death by dangerous driving and one of causing serious injury by dangerous driving.

  The defendant, from Barr Street, Birmingham, was driving between 83mph and 92mph, on the 30mph speed limit road, just before the crash, West Midlands Police (WMP) said. CCTV footage seen by the force showed the vehicle was "momentarily airborne" as Sewell lost control, before it mounted a footpath and hit a lamppost. Despite the best efforts of emergency services, Mr Ismali died at the scene.

  Police said Sewell initially refused assessment for his injuries and admitted to officers "I’ve just seen my friend die because of me". He was found to be over the legal alcohol limit for driving and was arrested. As well as being jailed, he was disqualified from driving for five years, which will start when he is released from prison.

  Det Sgt Julie Lyman, from WMP's serious collision investigation unit, said: “Sewell had total disregard for his and his friends’ safety and made the decision to get behind the wheel despite being over the legal alcohol limit. “He drove dangerously, flouting the speed limit and his decision ultimately cost Hamse’s life – a tragic incident that could have easily been prevented. “My thoughts are with Hamse’s loved ones and I hope the sentence offers a sense of closure.”
