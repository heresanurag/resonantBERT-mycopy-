title: Ripley Castle owners say retirement is behind reason for sale - BBC News
date: '2025-02-02'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/cj02eyv4v6yo
content: |-
  Sir Thomas and Lady Ingilby say selling the estate will allow them to spend more time together.

  'Why we're selling family castle after 700 years'

  Sir Thomas and Lady Ingilby say they are looking forward to retirement

  The owners of a 700-year-old castle and estate have said it has been a "privilege" to have been its custodians. Ripley Castle, near Harrogate, has been the home of the Ingilby family since the 14th Century. However, Sir Thomas and Lady Ingilby have put the property up for sale with a £21m price tag. The baronet and his wife said the decision was due to a desire to retire and do other things after decades working to maintain the large estate.

  "There are days when we are very positive about it, there are other days when we are sad for what we will miss," Sir Thomas said. "I've been looking after the place for over 50 years, so this has been my whole life. I don't want to be carried out of here feet first, I've got things I want to do."

  The castle includes the Gatehouse, completed in 1450s and the three-storey Old Tower

  Lady Ingilby said the estate was run commercially and the couple were hoping to "spend some time together in retirement". Sir Thomas inherited the estate at the age of 18, and said when he married Emma in 1984 they had a list of things they wanted to achieve for the castle, including replacing the majority of the roof. "We've ticked every box on that list. "We've left it in the best state possible and safeguarded the heritage for future generations." Lady Ingilby said plenty of people sold their homes but "ours just happens to be bigger". "Someone else can have the experience, because it has been a privilege, such a privilege, to be able to live here." The couple said the final family events at the castle would include the weddings of their daughter and youngest son, which Sir Thomas said was rather apt given the estate was acquired through marriage in the early 1300s.

  This video can not be played To play this video you need to enable JavaScript in your browser. The Ingilby family have occupied the estate since the 14th Century

  The estate includes 445 acres of land, a cricket pitch, hotel, tea room, gift shop and wedding venue. It has been divided into nine lots, which can ether be bought individually or as a whole. The Grade I-listed castle has three reception rooms, 11 bedrooms, and six bath/shower rooms. Lady Ingilby added: "I hope the new owner does appreciate the history, because the history of the Ingilbys is the history of England. "But nothing stands still, they must do what they like with it, as long as they just love it and take care of it." Sir Thomas said he could reassure whoever bought it they did not have to stay for 700 years. "They shouldn't feel under that pressure. They can reflect after 100 years or so and I hope that they enjoy it." Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
