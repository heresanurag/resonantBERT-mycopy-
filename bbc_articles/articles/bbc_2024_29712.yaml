content: |-
  The band's frontman fell through a trapdoor during a concert in Australia but appeared unharmed.

  The band's frontman had an unexpected trip when he fell through a trapdoor during a concert in Australia on Sunday.

  Chris Martin joked about the incident afterwards, telling fans "that was nearly a YouTube moment".

  He appeared unharmed and was able to continue with the show, which is part of Coldplay's Music Of The Spheres tour.
