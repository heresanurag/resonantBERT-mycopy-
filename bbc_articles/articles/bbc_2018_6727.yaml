  Eva Lewis decided the best place to celebrate her 102nd birthday was in a wind tunnel.

  A 102-year-old woman has celebrated her birthday with an indoor skydive.

  Eva Lewis, from Hertfordshire, was lifted off the floor in 110mph (177km/h) winds at a wind tunnel in Milton Keynes.
