  The US Open becomes the first major to provide players on the LIV Golf tour with an exemption for the tournament.

  US Open becomes first major to award LIV Golf exemption

  American Bryson DeChambeau won the 2024 US Open having joined LIV Golf in 2022

  The US Open will become the first major to provide players on the LIV Golf tour with an exemption for the tournament based on rankings. The United States Golf Association (USGA) said the top player from the Saudi Arabia-backed tour, who is not otherwise exempt, will directly earn a place in the field for the US Open. Additionally, the top 10 players in the LIV Golf standings on 7 April will also be exempt from local qualifying and instead go straight into the final 36-hole qualifying. The 2025 US Open will be held at the Oakmont Country Club in Pennsylvania from 12-15 June. LIV Golf chief executive Scott O'Neil said: "Every golf fan in the world longs to see the greatest players in the world competing on golf's biggest stages at the majors. "LIV Golf is committed to working hand in hand with golf's governing bodies to elevate the sport in all corners of the world." USGA chief championships officer John Bodenhamer added: "Consistent with our historical approach, we continuously evaluate talent levels on professional tours and in amateur events, which has led us to add a new exemption category." To date, none of the other majors have offered a direct exemption tied to the LIV Golf points system.

  The US Masters and the PGA Championship have awarded special exemptions to LIV golfer Joaquin Niemann. Sergio Garcia also received an invite for the PGA Championship. Niemann and Garcia finished second and third, respectively, in the 2024 LIV Golf individual standings behind Jon Rahm. Rahm already has an exemption for all of this year's majors based on his victories at the 2021 US Open and 2023 Masters. LIV golfer Bryson DeChambeau won the 2024 US Open and is exempt, along with Brooks Koepka, Cameron Smith, Dustin Johnson and Phil Mickelson, based on past championships. The PGA Tour has been in protracted negotiations with LIV's backers, the Saudi Public Investment Fund (PIF), in an attempt to heal the split in world golf.
