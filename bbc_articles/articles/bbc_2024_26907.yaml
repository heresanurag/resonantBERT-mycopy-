title: LeBron James and Bronny James make NBA father and son history with Los Angeles
  Lakers - BBC Sport
date: '2024-10-07'
section: Basketball
url: http://www.bbc.co.uk/sport/basketball/articles/c243g24enl0o
content: |-
  NBA great LeBron James, 39, has played alongside son Bronny, 20, for the first time in a game with the Los Angeles Lakers.

  LeBron James and son play together in pre-season game

  LeBron James and Bronny James made NBA history by becoming the first father-son duo to play together on the same team during the Los Angeles Lakers' pre-season game against the Phoenix Suns. Bronny, on his 20th birthday, entered the court during the second quarter in a 118-114 defeat by the Suns. Never before had a father and son played in an NBA game of any type - including pre-season - at the same time. "Wow that was surreal," LeBron wrote on X following the match. Speaking to reporters, he added: "We came out of a timeout and we kind of stood next to each other. I kind of looked at him. "It was like being in The Matrix or something. It just didn't feel real. But it was great to have those moments." LeBron scored 19 points on the night, with four assists and five rebounds. Bronny went scoreless during his 13-minute run, finishing with two rebounds and four turnovers.

  Bronny joined the Lakers as a second-round draft pick from the University of Southern California in June. LeBron, 39, is the NBA's all-time record point-scorer and a four-time NBA winner. The veteran is entering his 22nd season in the NBA. He signed a new two-year deal with the Lakers following Bronny's arrival at the franchise. The 2024-25 NBA season begins on 22 October, with the Lakers in action against the Minnesota Timberwolves after champions the Boston Celtics face the New York Knicks.
