title: Texas beekeeper viral videos saving bee nests - BBC News
date: '2024-06-26'
section: General
url: http://www.bbc.co.uk/news/science-environment-56396914
content: |-
  Beekeeper Erika Thompson says the video, viewed over a million times, was "just a normal Tuesday".

  Texas beekeeper Erika Thompson rescued a nest of bees that had been stuck under the floorboards of a garden shed for over two years, in a video that has since gone viral.

  Since posting the video online on Friday, it has been viewed over 1.5 million times on Twitter.

  She said the reaction to the video was incredible as, for her, it was "just a normal Tuesday".
