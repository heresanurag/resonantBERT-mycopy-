title: Met Police deploy helicopter in pursuit of suspected phone thief - BBC News
date: '2025-06-05'
section: General
url: http://www.bbc.co.uk/news/videos/c0ln2x0x40ro
content: |-
  The incident began following a report of an iPhone theft on Whitechapel Road in east London.

  The Metropolitan Police has released aerial and body-worn camera footage of officers trying to apprehend a suspect believed to have stolen a mobile phone in central London.

  The incident began following a report of an iPhone theft on Whitechapel Road, east London.

  Officers used the device's tracking capabilities to locate and monitor the suspect who was driving an e-bike.

  A 14-minute pursuit followed, supported by the National Police Air Service, which resulted with the suspect being taken into custody.

