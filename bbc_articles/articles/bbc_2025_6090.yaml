  -7 J Rose (Eng); -4 C Conners (Can), S Scheffler (US), L Aberg (Swe); -3 T Hatton (Eng), B DeChambeau (US); -2 A Rai (Eng), H English (US), J Day (Aus), A Bhatia (US) Selected others: -1 F Couples (US), M Fitzpatrick (Eng), S Lowry (Ire); Level C Morikawa (US), S Garcia (Spa), R McIlroy (NI); +1 T Fleetwood (Eng); +3 D Willett (Eng), R MacIntyre (Sco), J Rahm (Spa); +5 L Canter (Eng)

  England's Justin Rose leads the Masters after threatening to break the Augusta course record on an opening day where Rory McIlroy faded after a fast start. A majestic first round saw 44-year-old Rose card a seven-under 65, putting him three clear of a group featuring defending champion Scottie Scheffler at the top of leaderboard. McIlroy's pursuit of a career-defining Masters win was hit by two late mistakes which leave him seven shots behind Rose. The 35-year-old Northern Irishman started his latest bid to complete the career Grand Slam with a level-par 72. Rose, also bidding to wear the Green Jacket for the first time, leads with world number one Scheffler, last year's runner-up Ludvig Aberg and Canada's Corey Conners joint second. Tyrrell Hatton, another Englishman, is a shot back after a 69, the same score as two-time US Open champion Bryson DeChambeau. England's Aaron Rai briefly led on his Masters debut before ending the opening day in joint seventh after a two-under 70.

  With an enviable record at Augusta, Rose possesses the knowledge and expertise to finally get his hands on the Green Jacket. The former world number one has secured two runners-up finishes, plus 14 others in the top 25, since making his debut in 2003. While many thought his chance of adding to his 2013 US Open victory might have gone, Rose has given himself another opportunity as he bids to become the oldest first-time Masters champion since 41-year-old Mark O'Meara in 1998. Rose made a rapid start with three birdies in the opening three holes, continuing to use his putter marvellously to sink three more in a row around the turn. Further birdies on 15 and 16 secured his position as the first-round leader for a record fifth time - but he fell short of creating further history. Two more birdies on the final two holes would have seen Rose become the first man to shoot 62 at Augusta National. One birdie would have equalled the course record of 63 held jointly by Nick Price and Greg Norman. Loose drives led to a par-bogey finish but it did not diminish a wonderful round which saw him post his joint lowest score at the Masters. Rose looked totally relaxed as he headed off the course, smiling broadly as he slapped high-fives with the patrons congratulating him on a fantastic day's work. "It was a really good day's golf on a course that was a stern test," he said. "If you look at the leaderboard, there are not many low scores out there."

