  Angel Cabrera, the 2009 champion who is making a controversial return this year following his release from prison, shot a three-over 75. The 55-year-old Argentine was found guilty in 2021 of numerous charges that included assault, theft and illegal intimidation against former girlfriends. While Augusta chairman Fred Ridley said Cabrera was invited to return, as all past champions are, women's action groups have expressed their disappointment with that decision. Live text commentary of round two starts at 13:00 BST on the BBC Sport website and app. Radio coverage starts on BBC 5 Live at 19:00 BST with full commentary from 20:30, or listen via BBC Sounds.
