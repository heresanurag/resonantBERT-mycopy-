  However, the veteran Englishman knows those errant tee-shots on 17 and 18 serve as a reminder of how quickly things can change at a major. It was a lesson McIlroy endured once again at Augusta. The world number two said he has "never been in better form" when he arrived in Georgia for his 11th attempt at completing the career Grand Slam - having won two PGA Tour events at Pebble Beach and TPC Sawgrass. And he demonstrated his confidence in a bogey-free first nine containing three birdies. Another birdie on the 13th left McIlroy well placed on four under before an aggressive chip from off the back of the par-five 15th green ended in the water and led to a seven. He followed that with another double bogey on the par-four 17th, blotting what had previously been a consistent card where he had played with patience and maturity. Such was his disappointment at his closing holes, McIlroy passed on post-round media interviews, and headed straight to the practice area.

