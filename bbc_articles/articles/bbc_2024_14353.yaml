  The BBC's Henry Zeffman explains what to expect in tonight's seven-way election debate.

  Presented by Mishal Husain, the debate will be broadcast from 19:30 BST to 21:00 on Friday 7 June on BBC One and BBC News in the UK.

  Read more here and follow the latest updates on our live page.
