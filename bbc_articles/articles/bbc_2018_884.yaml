title: 'Germany school attack: Pupil ''killed by classmate'' near Dortmund - BBC News'
date: '2018-01-23'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-42788849
content: |-
  Reports say a 15-year-old student stabbed a 14-year-old boy at a secondary school near Dortmund.

  Police say they have arrested one pupil from the Kaethe Kollwitz comprehensive school over the killing

  A pupil at secondary school near the German city of Dortmund has been killed by a fellow classmate, according to police.

  The attack happened at around 08:00 local time (07:00 GMT) at the Käthe Kollwitz comprehensive school in the town of Lünen.

  One teenager has been arrested on suspicion of murder. Pastors are at the school to support pupils and parents.

  Police say they are investigating and have not released any further details.

  German media say both the victim and the suspect are German citizens, while the latter also has a Kazakh passport.

  Officials in North Rhine-Westphalia have recently vowed to tackle the problem of youth violence in Germany's most populous state.

  According to police, one in five criminal suspects in 2016 was under 21.
