title: 'Brexit: Hornby stops non-UK orders due to price confusion - BBC News'
date: '2020-12-16'
section: Business
url: http://www.bbc.co.uk/news/business-55329570
content: |-
  The model train maker says it's in a difficult position and has paused all international orders until January 2021.

  Model railway maker Hornby is pausing all international orders until January next year because of uncertainty around post-Brexit trade rules.

  "We hope you can understand the difficult position we are in and remain patient with us until we can find a solution," the company said on Twitter.

  Hornby, which also makes Corgi cars and Scalextric racing kits, said non-UK orders can resume on 4 January 2021.

  The company said port congestion issues are also affecting its operations.

