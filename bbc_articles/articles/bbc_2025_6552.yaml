title: 'Myanmar earthquake: Welsh teacher in Bangkok captures aftermath - BBC News'
date: '2025-04-16'
section: General
url: http://www.bbc.co.uk/news/videos/cq67r6v3rv1o
content: |-
  Isabelle Willis was at her apartment during the earthquake and thought she was going to die.

  A Welsh woman has captured the moments after the tremor from the Myanmar earthquake hit her apartment in Bangkok.

  Isabelle Willis said she was "desperate" to get out of the building after initially getting stuck when her door was jammed.

  Ms Willis, 26, from New Quay, Ceredigion, managed to escape and followed people running down the stairwell.

  She had some minor injuries and is now staying at a hotel until her accommodation is safe.

  More than 1,700 people are thought to have been killed and 3,400 injured, following the powerful 7.7 magnitude quake.
