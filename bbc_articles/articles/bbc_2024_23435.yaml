  • None Listen to World of Secrets on Sounds In a statement released on Friday, Justice for Harrods Survivors said: "Since announcing our proposed claim last week, we have been responding to inquiries from more survivors of abuse, whether from their time at Harrods or in other corners of Mohamed Al Fayed’s empire." The lawyers said they had "fielded well over 200 inquiries" from potential victims and witnesses from across the world. "We can confirm that we now represent 60 survivors as part of our claim, with more to come," they said. The statement added: "Given our prolonged experience in dealing with the women impacted by this case, we expected that anywhere Mohamed Al Fayed went, abuse would follow." Al Fayed served as chairman of Fulham between 1997 and 2013. Last week, a former manager of the women's team told BBC Sport extra precautions were put in place to protect female players from Fayed. Gaute Haugenes, who managed the team from 2001 to 2003, said staff were aware the late billionaire "liked young, blonde girls". Players were not allowed to be left alone with Al Fayed as a result, Mr Haugenes said. In an earlier statement, Fulham Football Club said: "We are deeply troubled and concerned to learn of the disturbing reports following yesterday's documentary. We have sincere empathy for the women who have shared their experiences. "We are in the process of establishing whether anyone at the club is, or has been, affected." Meanwhile, the BBC has again attempted to speak to Michael Cole, who was Harrods' director of public affairs in the 1990s, at his home this morning. His wife, Jane, said Mr Cole did not want to say anything, adding that they knew nothing about the allegations of sexual impropriety against Al Fayed. She also said her husband had not worked for Al Fayed for 25 years. Mr Cole has responded to some text messages from the BBC in recent days but has not been seen in public since Tuesday. If you are affected by issues of sexual assault you can contact the BBC Action Line here.

