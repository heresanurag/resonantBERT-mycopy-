title: 'Wrexham AFC: Hollywood stars and fans celebrate historic promotion - BBC News'
date: '2025-04-27'
section: Wales
url: http://www.bbc.co.uk/news/articles/cm2xpx2nmygo
content: |-
  Fans ran out to pitch in celebration with their team that sealed a historic third successive promotion.

  Co-owners Ryan Reynolds and Rob McElhenney celebrated as the team scored twice during the first half of the game

  Rob McElhenney and Ryan Reynolds, along with Reynolds' wife Blake Lively, supported Wrexham as they confirmed their third successive promotion, sealing a place in the Championship. Fans ran out onto the pitch after the Dragons beat Charlton Athletic 3-0. Speaking after the match, captain James McClean said the success was "one big group effort". "It doesn't just come from the dress room. It comes from the management, the owners, the fans and our families and the staff behind the scenes," he said.

  The hosts scored twice in quick succession in the first half, with Ollie Rathbone's strike putting Wrexham ahead at the Stok Cae Ras. Sam Smith then netted his sixth goal for the club since joining from Reading in January only three minutes later. Smith completed his double late on as Wrexham kept a 23rd league clean sheet of the season to take second place in style - and with a game to spare.

  Wrexham are a club and city united on a steep upward trajectory as they savour the journey of a lifetime

  Ryan Reynolds has said Wrexham made "history" despite people doubting him and McElhenney thinking their dreams of being in the Premier League could be possible. In an Instagram post on Sunday, Reynolds said: "We've been with Wrexham for what seems like the blink of an eye, but so much has happened. "I remember the first press conference, we were asked what our goals were... and I think Rob jumped in with, 'The Premiere League'. "People laughed. They had every right to. It seemed insane... but we weren't kidding," he added. The Deadpool actor added he feels at "home" in Wrexham, which he sees as a "place that values community, decency and history".

