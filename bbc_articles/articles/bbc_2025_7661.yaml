  The Hollywood A-listers stopped for selfies with fans ahead of Saturday's crucial game. After the match Reynolds and McElhenney joined their team on the pitch and embraced the players that made their dream come true, celebrating with the trophy after match at SToK Racecourse. Lifelong fan Mark Nicholls, from Wrexham, said the win was "unbelievable" . "I've been coming here since I was eight years old, standing in the Kop with my family and this is totally unbelievable. It's like a dream come true. It's what we always wanted as Wrexham and it's about time the town, and north Wales, had an uplift," he said. Another supporter, Ben, from Llandudno said he could not explain what the win meant. "From being nearly relegated in the National League to now being in the Championship next year."

  Nicola said the result means "so much to the town and people"

  Nicola Jane Williams, from Chirk, said the result meant "so much to the town and people". "Back to back to back - who would have thought!" Cledwyn Ashford has been a scout with the Academy at Wrexham for around 40 years. He said it was unbelievable and "like a dream". "Who would have thought years ago that we would be where we are. We were in that National League for so long, and we have come up and now we are in the Championship. "Its just like a fairy story," he said.

  David Jones, from Ellesmore Port, has been a supporter since 1958.

  David Jones, from Ellesmere Port, has been a supporter since 1958. "I have never seen anything like this, I remember when they won promotion in the 70s but I think this surpasses it. "Lets have a season in Championship and see where we go," he said. Simon Elliot, from Mold, said it was the best performance they have seen all season. "It means an awful lot for the area and the town. The expectation levels have been set very high after the first two years of promotion so to do it a third time I think is legendary. "Fantastic news for north Wales," he said.

  The couple said the atmosphere at the game was "incredible"

  Jane and Peter Lewis, from Ruthin, said the win was amazing Mr Lewis said: "It's fantastic to be back in the second division as it was after all these years." Jane added that the promotion "means the world for Wrexham and its people".

  Ryan Reynolds, Rob McElhenney and Blake Lively were in Wrexham to see the Dragons historic win

  Hollywood stars Ryan Reynolds and Rob McElhenney's takeover of Wrexham kicked off an adventure which would lead to the club from non-league to the Championship

  Elsewhere Cardiff City fans spoke of their disappointment as the team was relegated. Cardiff City will play in the third tier of English football for the first time in 22 years next season after their relegation from the Championship. Kirby England, 33, Rhondda Valley, said she was devastated but the team did their best. "I thought we could have scored at least a good few on just how we did but it is what it is. "We go down to League one with them and we'll support them all way back up to the Championships again."

  Bianca Ali believes the team will come back "better and stronger" next year

  Bianca Ali, 33, Cardiff, said it had been difficult being a Cardiff City fan this year. "It's been sad and heart-breaking. It's been a rollercoaster of emotions," she said.
