title: 'Cristina Fernández de Kirchner: Gun jams during bid to kill Argentina vice-president
  - BBC News'
date: '2022-09-02'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-62762421
content: |-
  Cristina Fernández de Kirchner escapes unharmed after a gunman's weapon jammed at the last moment.

  This video can not be played To play this video you need to enable JavaScript in your browser. Gun jams as it's aimed at Argentina's vice-president

  Argentina's vice-president has narrowly avoided assassination after a gunman's weapon jammed as he aimed at her.

  Footage shows the moment Cristina Fernández de Kirchner found herself face-to-face with the loaded weapon.

  The former president was outside her home, surrounded by a mob of supporters who back her in her fight against corruption charges.

  Police said the gunman, identified as a 35-year-old Brazilian man, had been taken into custody.

  They are attempting to establish a motive for the attack on the left-leaning politician, who was Argentina's president from 2007 to 2015, and its first lady for four years before that.

  President Alberto Fernández revealed the gun was loaded with five bullets, but failed to fire when triggered.

  Video circulating on social media shows the gun emerging from the crowd as Ms Fernández de Kirchner approaches. She initially appears confused by what is going on, ducking down to retrieve an object dropped on the floor.

  In another video, people in the crowd appear to try to block Ms Fernández de Kirchner from the suspected gunman, who came within inches of her.

  The crowd has been gathering outside her home for the last few nights in a show of support as she fights charges of defrauding the state and being involved in a scheme to divert public funds while she was president.

  A police spokesperson earlier told Reuters news agency that a weapon was found a few metres from the scene after the man had been arrested.

  Police named the suspect as Fernando Andrés Sabag Montiel, Brazilian-born but with an Argentine mother, who has lived in Argentina since he came to the country as a child in 1993. He had previously been arrested in 2021 while carrying a 35cm knife.

  Pictures of him taken from his social media posts and published on Argentine newspaper websites depicted him with tattoos associated with neo-Nazi groups.

  After searching his apartment, police seized two boxes containing 100 bullets, according to investigators quoted by La Nación newspaper.

  La Nación also reported that Pope Francis had telephoned Ms Fernández de Kirchner and had a "brief and cordial" conversation with her.

  The Argentine-born Pope, who has received the vice-president several times at the Vatican, also sent her a telegram in which he expressed "solidarity and closeness" with her.

  He added that he was praying for "social harmony and respect for democratic values" to prevail in his native country.

