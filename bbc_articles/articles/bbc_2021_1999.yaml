title: Police watchdog launches investigation after arrest at shooting commemoration
  - BBC News
date: '2021-02-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-55956285
content: |-
  A situation about a coronavirus rule breach during a commemoration to victims of a 1992 attack "escalated", police say.

  This video can not be played To play this video you need to enable JavaScript in your browser. Footage of the incident has been posted online

  The police watchdog has launched an investigation after a survivor of a loyalist gun attack was arrested at a memorial marking the shooting.

  He was part of a group who had gathered for a ceremony on Belfast's Ormeau Road, where five people were murdered in Sean Graham bookmakers in 1992.

  Police said "between 30 and 40" people had gathered and a man was approached about the coronavirus regulations.

  He added that a man was arrested for disorderly behaviour and resisting arrest.

  Sinn Féin's Michelle O'Neill called it a "shameful display of policing" and said officers were "heavy handed".

  Public gatherings of more than six people are currently prevented under Covid-19 lockdown regulations in Northern Ireland.

  The Police Ombudsman's Office said officers were involved in an "altercation" with a group of people.

  "We are aware of the incident and have received a complaint about what happened," a spokesman said.,

  "Our investigation will focus on establishing all of the facts surrounding the incident and investigators will be examining all available evidence in order to consider the appropriateness of the actions taken by police, including the arrest."

  The man arrested is Mark Sykes, who was among those seriously injured in the 1992 attack.

  His solicitor Niall Murphy said the arrest was made shortly after 14:30 GMT and his client was released about two hours later.

  A memorial to the five victims of the attack was put up outside the Belfast betting shop

  Footage of the incident has been posted online.

  Mr Byrne said the Police Service of Northern Ireland (PSNI) was reviewing all footage of the incident, including from their own body-worn cameras.

  He added the PSNI was "carrying out an assessment of the conduct of the officers involved".

