title: 'Darts Players Championship 12: Gerwyn Price wins in Leicester as Luke Littler
  loses early - BBC Sport'
date: '2025-04-10'
section: Darts
url: http://www.bbc.co.uk/sport/darts/articles/c5yggemeqzyo
content: |-
  Wales' Gerwyn Price beats Northern Ireland's Josh Rock to win the 12th Players Championship darts event, as Luke Littler is knocked out early in Leicester.

  Gerwyn Price was runner-up in the Players Championship in 2019

  Wales' Gerwyn Price beat Northern Ireland's Josh Rock in a nail-biting final to win the 12th Players Championship event in Leicester, after world champion Luke Littler slipped to a last-16 defeat. Price led 4-0 and 5-2 in the best-of-15 finale but was pegged back to 5-4 by Rock, who hit a nine-darter in his third-round win over Matt Campbell. Price, who was world champion in 2021, extended his advantage to 7-5 before Rock got eight darts into another perfect leg. He came back to take out double six and then forced a deciding leg, which Price won on double 10 to clinch an 8-7 victory for his third Players Championship win of the year. The 40-year-old was in superb form throughout the day but was spectacular in his quarter-final, averaging 112.25 against compatriot Jonny Clayton, and then in his semi-final where he averaged 110.8 against Ian White. Price will be back in action on Thursday for the 10th night of the Premier League season in Manchester. He sits third in the standings and will look to consolidate his place in the season-ending play-offs. "I wasn't as good as I was in the semis or quarters. Josh played fantastic to come back but thankfully I got a big lead or he would have blew me away," said Price. "Winning these events gives you a good boost of confidence, regardless of whether you're playing well or not, it gives you great confidence for going forwards."

  Littler, 18, trailed 4-1 but fought back to lead 5-4 before being taken to a deciding leg by world number 26 Ritchie Edhouse. The current Premier League Darts champion then hit double five rather than double 20 when attempting a 120 checkout and Edhouse hit double tops with his first dart to earn the win. Defeat for Littler follows him being knocked out in the first round of the 11th event on Tuesday. He will also be in Premier League action on Thursday and will look to extend his six-point advantage at the top of the table. Edhouse lost 6-4 to the Netherlands' Gian van Veen in the quarter-finals. World number one Luke Humphries lost 6-5 to Belgium's Mario Vandenbogaerde in the last 32, while Michael van Gerwen was beaten 6-3 by Rhys Griffin in the opening round. Scotland's Cameron Menzies, who won Tuesday's event in Leicester, opted not to play on Wednesday. There are 34 Players Championship events across the year, with the competition's finals held in Minehead in November.
