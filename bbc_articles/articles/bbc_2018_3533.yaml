title: Cambridge Half Marathon winner disqualified for wrong-name run - BBC News
date: '2018-03-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-43295444
content: |-
  Jack Gray, 24, was disqualified soon after winning Sunday's race.

  Jack Gray, 24, won Sunday's Cambridge Half Marathon but was disqualified afterwards when he admitted running under the name of his boss.
