id: bbc_2023_15472
title: Drone captures flock of sheep crossing US highway - BBC News
date: '2023-10-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67070505
content: |-
  Timelapse footage shows the animals moving like a murmuration of birds near the city of Othello, in Washington state, USA.

  Aerial footage shows sheep moving in formation as they are guided across a highway by three farmers and a dog.

  After crossing the road, the animals continue grazing in a field.

  The striking display was captured near the city of Othello, in Washington state, USA.
