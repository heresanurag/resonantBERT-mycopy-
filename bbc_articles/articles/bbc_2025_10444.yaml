title: Nigel Farage hails Reform UK's 'unprecedented' election results - BBC News
date: '2025-05-03'
section: Politics
url: http://www.bbc.co.uk/news/articles/c62gy310ry2o
content: |-
  Reform UK took control of 10 local councils, won two mayoral races and added a fifth MP to its ranks.

  Nigel Farage has hailed Reform UK's gains in Thursday's elections as "unprecedented" and "the end of two-party politics". The party has taken control of 10 local councils, won two mayoral races and added a fifth MP to its ranks in the Runcorn and Helsby by-election now counting has been completed. Many of these wins came at the expense of the Labour and Conservative parties, which have both sought to explain the results. Prime Minister Sir Keir Starmer conceded that people were not yet feeling the benefits of a Labour government, while Conservative leader Kemi Badenoch pledged to make her party a "credible" alternative once again.

  Farage claimed on Saturday: "In post-war Britain, no one has ever beaten both Labour and the Tories in a local election before." Writing in The Times, Sir Keir said, external the lesson learned from the elections was not that the country needed "ideological zealotry". "It's that now is the time to crank up the pace on giving people the country they are crying out for," he said. But some within Labour have called on the prime minister to change direction, saying the decision to cut winter fuel payments to all but the poorest pensioners had put off voters. Labour MP Rachael Maskell urged the government to ditch the cuts, telling BBC Breakfast: "We have got that mandate, I believe, as a party to look at how we can better redistribute wealth, as opposed to taking out of the pockets of the poorest."

