title: 'Russian spy: Putin challenged over Salisbury poisoning - BBC News'
date: '2018-03-12'
section: General
url: http://www.bbc.co.uk/news/uk-43375274
content: |-
  The BBC's Steve Rosenberg asks Russia's president if Moscow was behind the attack on Sergei Skripal.

  BBC Moscow correspondent Steve Rosenberg has asked Russian President Vladimir Putin whether Russia had a role in the poisoning of Sergei and Yulia Skripal in Salisbury.

  He responded that he would discuss the case once UK authorities had dealt with it.
