title: Leeds woman found dead next to estranged husband had been stabbed - BBC News
date: '2024-05-07'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-68948930
content: |-
  Karen O'Leary and her estranged husband were found dead at their home in April.

  Police said they were not looking for anyone else in connection with Mrs O'Leary's death

  A woman found dead alongside her estranged husband at her home in Leeds had died from multiple stab wounds, an inquest has heard. The bodies of Karen O'Leary, 63 and Dennis O'Leary, 61 were found by police in the bedroom of the property on Fearnville Close, Oakwood, on 25 April. The inquest heard a blood-stained knife was found and there was evidence a fire had been started in the bedroom. Police are not looking for anyone else in connection with the deaths. The hearing in Wakefield, led by senior coroner Kevin McLoughlin, was told the couple had been experiencing difficulties in their marriage. Mrs O'Leary had left the marital home seven weeks earlier and had returned to the house on the day of her death to talk to her estranged husband, the inquest heard. West Yorkshire Police discovered the bodies when they were called to the house after receiving a report of a concern for safety. The inquest has been adjourned until a later date.

