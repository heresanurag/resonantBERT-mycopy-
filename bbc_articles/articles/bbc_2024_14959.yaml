title: 'Jonny Greenwood: Radiohead guitarist treated in intensive care - BBC News'
date: '2024-07-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/c1dmp5x758xo
content: |-
  Jonny Greenwood was treated for an infection but is now "out of danger", his band The Smile say.

  Radiohead guitarist Jonny Greenwood has been in intensive care in hospital in recent days but is now "out of danger", according to a statement from his side project The Smile. "A few days ago, Jonny became seriously ill from an infection that needed emergency hospital treatment, some of it in intensive care," it said, external. "Mercifully he is now out of danger and will soon return home." Greenwood, 52, has been on tour with Radiohead bandmate Thom Yorke in The Smile in recent months, but they have now cancelled future concerts.

  "We have been instructed by the medical team in charge of Jonny's care to cancel all engagements until he has had time to make a full recovery," the statement said. "To that end, The Smile tour of Europe in August is cancelled." It added: "We all wish Jonny a speedy recovery." No further details of his infection were given. As well as being a member of Radiohead and The Smile, Greenwood is an Oscar-nominated film composer, scoring movies including The Phantom Thread, Spencer, There Will be Blood and The Power of the Dog. This summer, he has also been performing with Israeli-Arabic musician Dudu Tassa.
