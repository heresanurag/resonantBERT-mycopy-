  Should Trump disobey, and therefore delegitimise, the courts, the decision could come back to bite him when the time comes for the president to see his own lawful agenda enforced, some legal experts say. Democratic states like California, for instance, might be inclined to ignore White House directives and federal laws they don't like - and Trump would be hard pressed to use the courts to bring them to heel. "If the executive decides it will obey some court orders but not others, it will find it won't get any court orders that it wishes to obey," said Philip Bobbitt, a constitutional scholar at Columbia University Law School. "I just don't think they thought that through." When Donald Trump redecorated the Oval Office to his liking in January, he reinstalled a portrait of President Andrew Jackson that had hung on the wall across from the Resolute Desk in his first term. The seventh US president is remembered for a critical moment of defiance against the United States Supreme Court. When the justices decided a dispute between the state of Georgia and Cherokee Indian governments in 1832, Jackson did not seem interested in following its direction. Jackson allegedly said of the Chief Justice's ruling, "John Marshall has made his decision; now let him enforce it!" Nearly 200 years later, Trump himself has found himself on his own collision course with America's judiciary.
