title: Legal showdown looms as Trump tests limits of presidential power - BBC News
date: '2025-02-12'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c70kd686k2do
content: |-
  A judge accused the Trump administration of defying his orders, setting up a battle that could end up at the Supreme Court.

  Trump shows an executive order he has just signed

  In the first weeks of his second term, President Donald Trump has wasted no time in flexing his political muscle. That much is clear. Since taking office in January, he has ordered the suspension of all new asylum claims, cancelled refugee resettlement, frozen government hiring and spending, gutted agencies established by Congress, moved to ban gender transition care for teenagers and offered a buyout deal for hundreds of thousands of federal workers. The whirlwind of unilateral action on his campaign promises has pushed the limits of presidential power – and prompted legal challenges from Democrats, unions and legal groups. So far the federal courts have been the only substantive roadblocks to Trump's agenda, as judges have temporarily suspended some of his most contentious actions, including a bid to end automatic citizenship for anyone born on US soil - a right established from the 14th Amendment of the US Constitution. But Trump is pressing on - and seems headed for a showdown with the judiciary that could eventually end in the highest court in the land. This week, a Rhode Island judge said the Trump administration was clearly and openly defying his court order to unfreeze billions in federal funds. The White House responded by saying that "every action" the president took was "completely lawful".

  If Trump's orders do reach the US Supreme Court, six of the nine justices there - including three appointed by Trump in his first term - are conservative. Just last term, the court issued a decision holding Trump, and all future presidents, largely immune from prosecution for official actions while in office. At the time, it was a landmark expansion of presidential authority. But some observers have suggested that Trump's latest moves could be part of a strategy to expand his powers even further. Trump's move to freeze hundreds of billions of dollars in federal grants and dismantle the United States Agency for International Aid (USAID) could run afoul of the checks-and-balances system of US government. Congress, rather than the White House, holds the authority to control federal spending and taxation - what's known as "the power of the purse". Legislators also established USAID and lawsuits have been filed arguing that Trump has no legal authority to dismantle it and refuse to spend funds allocated by Congress. But if the high courts agree to uphold some of his sweeping executive actions, it could strengthen his ability to transform the government and enact policy changes without the help of Congress. And even if the courts rule against the president, says Ilya Shapiro, a constitutional expert at the Manhattan Institute, those legal defeats might be politically advantageous. "There could be political benefits to being challenged in court and then even losing in court because then you can run against judges and make political hay of it." There is another scenario, however. Trump could simply refuse to comply with any court that tries to stop his exercise of unfettered presidential power.

  In Oval Office comments on Tuesday, the president hinted that this might be an option, in his typically oblique way. "We want to weed out the corruption," Trump said. "And it seems hard to believe that a judge could say we don't want you to do that." "Maybe we have to look at the judges," he continued. "I think it's a very serious violation." On Sunday, Trump's vice-president, JD Vance, was even more blunt. "Judges aren't allowed to control the executive's legitimate power," he posted on the social media site X. That view was similar to one Vance expressed in a 2021 podcast, when he said that if Trump returned to power he should refuse to comply with any court order that prevented him from firing federal workers. Directly defying a court ruling, however, would cut against centuries of US history and amount to the opening skirmishes in a constitutional crisis that pits the president against the branch of government designed to establish and interpret the law of the land. "My read is that President Trump is testing the outer boundaries of what he might be able to get away with, doing a lot of things that are blatantly against the law and maybe some things that are closer to the line," said Fred Smith, a professor at the Emory University School of Law. "They are breaking a lot of norms," Mr Smith added of the nascent Trump administration. "Why he is doing that, only he knows fully. But he is doing it."

  A judge has temporarily halted some aspects of Trump's moves to shut down the US Agency for International Development

  So far, Trump and his allies have made aggressive comments about unfavourable court decisions in the public and in legal filings, but have yet to be sanctioned for disobeying a court. When Trump was the target of multiple prosecutions over the past four years, he frequently questioned the legitimacy of the presiding judges, but his courtroom lawyers adhered to the law and legal procedures. The federal judge in Rhode Island, who had placed a temporary hold on another Trump order to freeze some federal spending, did warn in court filings Monday that the administration was violating his temporary restraining order but stopped short of finding them in contempt. Conservative legal scholar Ed Whelan wrote on X that it would be "extremely grave" for the Trump administration to defy a federal court order. "I'm open to the argument that truly extraordinary circumstances (the makings of a wild hypothetical) might justify defiance," Mr Whelan wrote. "But in our constitutional system there should be an overwhelming presumption in favour of executive-branch compliance with federal court orders."

