content: |-
  Officials say it might take another 12-15 hours to reach the workers as they cut through debris.

  While we wait for more details of where the operation is at, here's what will happen once the rescuers reach the workers - the process will be a delicate one, and has to be carried out with utmost caution.

  Once the final rescue pipe reaches the workers, a doctor will be sent ahead to check on their condition.

  They will also help guide the workers through the tunnels which have sharp edges, reports NDTV news channel.

  The rescue operation has hit several obstacles in the past 11 days Image caption: The rescue operation has hit several obstacles in the past 11 days

  There are other concerns too. The workers have been inside for 12 days and may be weak as they have mostly been eating snacks - they only got their first hot meal two days ago.

  Officials have told the BBC that it's hotter inside the tunnel than outside, so rescuers will have to keep the temperature difference in mind.

  The aim is to to pull them out to safety and shift them to the nearby hospital as quickly as possible, they said.
