content: |-
  Scientists have been holding a news conference to show off material brought back to Earth by the Osiris-Rex mission.

  And with all the really interesting stuff, the stream ends

  That's it from Nasa at the Johnson Space Center in Texas, where they've revealed more about the sample they extracted from the asteroid Bennu by first blasting it with nitrogen then grabbing a chunk and bringing it to Earth. We'll get more information in the coming days, weeks and months about what Bennu is made up of - and it's hoped this will help scientists learn more about our Solar System and also how life began on our planet. You can read more about the material Nasa gathered from Bennu in this story by our science correspondent Jon Amos.
