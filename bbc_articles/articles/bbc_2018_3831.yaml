title: 'Verne Troyer: Mini-Me Austin Powers actor dies aged 49 - BBC News'
date: '2018-04-21'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-43853755
content: |-
  The actor, who also appeared on a number of TV shows, was admitted to hospital earlier this month.

