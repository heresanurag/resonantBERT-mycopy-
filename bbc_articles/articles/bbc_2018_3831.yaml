  One of Troyer's first roles was as a stunt double for a nine-month-old baby in the 1994 film Baby's Day Out.

  He appeared in two Austin Powers films as Mini-Me, the clone and sidekick of Dr Evil, played by Mike Myers.

  "Verne was the consummate professional and a beacon of positivity for those of us who had the honour of working with him," Myers said in a statement given to The Hollywood Reporter.

  "It is a sad day, but I hope he is in a better place. He will be greatly missed."

  Troyer starred alongside Myers in the last two Austin Power films

  Earlier this month, Troyer was admitted to hospital in Los Angeles but his team did not say what he was suffering from.

  He was treated for alcohol addiction last year and released a statement addressing his problems.

  "While it's not always been an easy fight, I'm willing to continue my fight day by day," he said.

  In 2012, Troyer made a donation to a disabled children's charity in Northern Ireland after it was targeted by thieves.

  "I heard what happened and I just wanted to help you and the kids," he wrote in a letter to the charity,

  "Please tell them hello from me. Also, remember you can do anything you set your mind to, always be optimistic."
