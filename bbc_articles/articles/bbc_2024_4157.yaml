title: Car slides on roof after Cambridgeshire drink-driver crash - BBC News
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-68538480
content: |-
  Dashcam footage shows the car sliding along the carriageway with sparks flying out from underneath.

  Police have released footage of the moment a drink-driver crashed into the back of another car, causing it to flip onto its roof and slide along the carriageway.

  Neither driver was seriously injured in the accident that happened on the A14 at Bar Hill, near Cambridge, on 14 September.

  Nilen Chauhan, 27, admitted drink driving and driving a vehicle dangerously at Cambridge Crown Court on 26 February.

  Chauhan, of Westrow Gardens, Ilford, Greater London, was given a 16-month prison sentence, suspended for two years.

  He was also banned from driving for three years, ordered to carry out 150 hours of unpaid work and must take an extended driving test when his ban expires.
