title: Sara Sharif was an innocent soul, murder accused stepmother said - BBC News
date: '2024-11-01'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cr4l6g9qyg9o
content: |-
  Jurors at the Old Bailey are shown a series of messages between Sara's stepmother and her sisters.

  Sara Sharif's body was found in August last year

  A woman accused of killing 10-year-old Sara Sharif had told her sister the girl was an "innocent soul" who needed love, a court heard. Sara's stepmother, Beinash Batool, also said Sara's father, Urfan Sharif, had beaten up his daughter as she had been “naughty”, jurors at the Old Bailey were told. She sent the Whatsapp messages in 2022 - months before Sara’s body was found with dozens of injuries at her family home in Woking on 10 August last year.

  Jurors previously heard Sara had been hooded, burned, bitten and beaten during more than two years of abuse. They were also previously told by the prosecution that the accuracy of messages sent by Ms Batool to her sisters over a number of years was in dispute, as they only reflected what she was choosing to tell them. Ms Batool sent images of Sara’s injuries to her sister Qandeela Saboohi, but then deleted them from the message stream, the court heard.

  Urfan Sharif, Beinash Batool and Faisal Malik are each facing two charges relating to the death of Sara Sharif

  In May 2021 Ms Batool told her sister that she wanted to report Urfan for beating “the crap out of Sara”. Ms Batool said: “She’s covered in bruises, literally ... black”, adding “poor girl can’t walk, she literally fainted in the kitchen in the morning” and “he made her do sit ups all night”.

