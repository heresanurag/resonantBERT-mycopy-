  In one exchange in February 2022, Ms Batool messaged another sister, Amima Shahid, to say that Mr Sharif was beating Sara up at home. Ms Batool went on to say that “[if] something happens to Sara I will not be able to forgive myself".

  Sara Sharif's family pictured at Heathrow Airport as they leave for Pakistan

  On 24 November, 2022, Ms Batool messaged Ms Shahid saying that she was “too stressed to talk” and that she and Mr Sharif had separated. Ms Batool said Mr Sharif was going to Pakistan the following day, adding: “He went crazy today”, and that he had taken money and a passport. Six months before Sara died, Ms Shahid messaged Ms Batool to ask how Sara was. “I feel so sorry for her," the aunt said. Ms Batool replied: "She’s fine, I explained to her like I do every night." She added in other messages: "There’s something that’s not right with her like mentally; She needs to get help; She’s an innocent soul man who needs love." On 11 August, the day after Sara’s body was found, Sara’s aunt blocked Ms Batool's number. The court was also shown footage of the three accused relatives at Heathrow airport as they left the UK for Pakistan, the day before Sara's body was found.

