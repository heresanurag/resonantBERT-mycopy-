content: |-
  Her mother said they were on a "dream" holiday to see the singer before the Leicester Square attack.

  Girl, 11, was stabbed on trip to see Taylor Swift

  The girl's mother told an Australian broadcaster they had been on a "dream" holiday to see Taylor Swift before the attack

  An 11-year-old girl who was stabbed in Leicester Square was on a trip to the UK to see Taylor Swift perform, according to an Australian broadcaster. The girl was shopping with her mother at the busy central London tourist spot when she was attacked on 12 August. In an interview with 7News Australia, her mother said they were on a "dream" holiday and had just left the Lego store when the girl was "jumped on". Ioan Pintaru, 32, is charged with attempted murder and possession of a bladed article.

  The girl was taken to hospital with serious injuries which included wounds to her face, shoulder, wrist and neck area. She thanked the hospital staff who treated her for "making her feel more safe". "It was bad to meet them under those circumstances but they are some people I will remember forever," she said. According to the broadcaster, after a week of recovery with the help of Australian consular officials she was able to watch Swift perform after all, before returning home on Sunday. Her mother said her daughter has been "incredible" and is ready to "get back to normal". "She's the most optimistic kid you could meet, she's super bouncy," she continued. Police previously said there is no suggestion the incident was terror-related and officers do not believe the suspect and the victims were known to each other. Mr Pintaru is due to appear at the Old Bailey on September 10.
