title: 'Allison Bailey: Barrister labelled transphobic, tribunal hears - BBC News'
date: '2022-05-05'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-61326359
content: |-
  Allison Bailey is suing her chambers and LGBTQ+ charity Stonewall for discrimination over her views.

  Allison Bailey argues that the discrimination she faced caused her to suffer "various detriments", including a loss of work and a consequent fall in her income

  The views of a barrister were labelled "transphobic" in a colleague's email, a tribunal has been told.

  Allison Bailey is suing her chambers and LGBTQ+ charity Stonewall, arguing she was unlawfully discriminated against due to her view that sex is biological and cannot change.

  Ms Bailey, who is a lesbian, argues her chambers wrongly treated her views as transphobic.

  The tribunal heard that on 14 December 2018, GCC family law barrister Stephen Lue sent an email to those working at the chambers to let them know it was becoming a "Stonewall Diversity Champion".

  Under the scheme, the chambers paid Stonewall for continuing advice on how to create an inclusive workplace.

  Ms Bailey opposed the move. She argued via email that Stonewall was involved in "harassment, intimidation and threats" made to anyone who opposed its viewpoint - a claim the charity rejects.

  The tribunal heard Ms Bailey wrote: "There are many of us within the LGBT community who fully support trans rights but who do not support the trans-extremism which is currently being advocated by Stonewall and others.

  "I emphatically object to any formal association with Stonewall."

  The following day, GCC barrister Michelle Brewer sent an email to Mr Lue, in which she wrote: "Great, now Allison's wholly unfounded allegations are going to be aired... nothing like washing our dirty transphobic laundry in public."

  Ms Bailey alleges that as a result of her treatment, her income was "substantially reduced" in comparison to previous years, "most notably to 2018".

  She says the central London chambers "withheld instruction and work" from her following these interactions.

  Ms Bailey has raised about £500,000 to fund her legal case.

  The GCC has said it "strongly refutes" the claims made against it and that following an investigation in 2019 into complaints made about Ms Bailey's social media posts, it was concluded that no action against her was necessary.

  The tribunal, being held at Central London Employment Tribunal at Victory House, continues.

