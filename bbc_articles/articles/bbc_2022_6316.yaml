content: |-
  Find out who won in the national elections in Northern Ireland and local elections in the rest of the UK.

  The majority of results are in following Thursday's elections across the UK.

  Search below to see the results in your area.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. More information about these elections Who won in my area? Enter your postcode, or the name of your English, Scottish or Welsh council area or Northern Ireland constituency to find out.

  Nearly all of England's 146 councils that had an election have declared. More than 4,000 council seats were being contested. The Liberal Democrats gained the most seats, while Labour gained control of the most councils. The Conservatives lost more than 300 seats.

  The Mayor of South Yorkshire has also been elected alongside six other local authority mayors.

  In Scotland, all results for the 32 councils have been declared, with the SNP finishing as the largest party. In Wales, Labour has gained the most seats, while Plaid Cymru took control of three councils.

  In Northern Ireland, voters are electing all 90 MLAs to the Stormont Assembly. Sinn Féin received the most first-preference votes by a wide margin.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. More information about these elections Who won in my council area? Enter your postcode, or the name of your English, Scottish or Welsh council area to find out. There are no council elections in Northern Ireland.
