title: 'Spring Statement: One family''s cost of living experience - BBC News'
date: '2022-03-24'
section: General
url: http://www.bbc.co.uk/news/uk-60855084
content: |-
  The Fords are a busy family and, like many, they’ve noticed the impact of rising prices.

  The Ford family, from the West Midlands, have noticed "significant rises" in their bills.

  They spoke to the BBC about their experiences and reacted to the chancellor's Spring Statement.
