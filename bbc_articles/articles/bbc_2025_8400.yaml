title: Eni Aluko speaks out after Joey Barton defamation case win - BBC News
date: '2025-04-09'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cn9115j3dvzo
content: |-
  The ex-England striker is "past the point of asking nicely" for people to treat women with respect.

  Think twice before posting online, says Aluko

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Broadcaster and former England striker Eni Aluko - who was targeted on social media by ex-footballer Joey Barton - has said she hopes a judgement that his posts were defamatory will make people think twice about what they say online. Aluko said she should not have to be anxious that her race and gender would be attacked every time she was on TV. Speaking after winning the first stage of a High Court libel claim against Barton, she said she was "past the point of asking nicely for people to understand the importance of language and how to treat women". The 38-year-old told BBC News: "I can't feel anxious every time I get on TV that my race and my gender are going to be attacked."

  Referring to comments made by Aluko in 2020, which appeared to criticise people placed on the government's furlough scheme, for which she apologised, Barton posted comments suggesting Aluko's late father had been financially corrupt, and that her private education made her a "hypocrite". He also accused her of "playing the race card".

  High Court judge Mr Justice Lavender ruled Barton's comments were mainly statements of opinion, but were defamatory by meaning or innuendo. Aluko said: "Things need to change. "There's a double standard held for me, sometimes a triple standard held for me as a black woman, if I say anything. "This is bigger than me. This was just not something I could accept and actually it's part of a wider culture towards women in broadcasting. "Opinions and free speech are a human right and I support but it can't be weaponised and used as a route to hate speech" "The only way to change is to hold people accountable."

  Barton could still choose to defend the comments at trial

  The former Lioness scored 33 international goals in 102 appearances before retiring in 2020 and moving onto a career in broadcasting. She said she had faced threats of violence and had suffered abuse on social media after Barton twice posted on X about her in January 2024. The ITV and BT Sport regular said she hoped the judge's finding would lead to more people speaking out about bad behaviour and online abuse. She added: "I love what I do. I love broadcasting. I love talking about football. I love being an example for other young black girls and women of colour that you can do it and can break into spaces that ordinarily have not always been taken up." Barton is yet to respond to the ruling and could appeal against it. The 42-year-old could also defend the statements if the case goes to trial. In a separate criminal case, Barton has pleaded not guilty to allegedly posting offensive comments on social media about Aluko, as well as broadcasters Lucy Ward and Jeremy Vine.

