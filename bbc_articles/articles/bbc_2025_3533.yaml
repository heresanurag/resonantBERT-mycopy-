title: Decoding the Ukraine ceasefire plan line-by-line - BBC News
date: '2025-03-13'
section: World
url: http://www.bbc.co.uk/news/articles/c5y42125239o
content: |-
  The US is expected to present a 30-day ceasefire proposal to Russia in the coming days.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'All of this now hinges on Vladimir Putin's response'

  Hours of talks in Saudi Arabia on Tuesday ended with a joint US-Ukraine statement backing an American-proposed 30-day ceasefire in the war with Russia. Trump administration officials see this as a major breakthrough towards the foreign policy goals of a leader who campaigned on a promise to end the war. For Ukraine, the joint announcement amounts to a critical reprieve for President Volodymyr Zelensky after a humiliating attack in the Oval Office a fortnight ago by Trump and Vice-President JD Vance. For Moscow, it shifts the onus to them, while the war itself intensifies. But so far only one side in the war - the one dependent on the Americans - has signed up. And the proposal is only eight paragraphs long, with meagre details beyond the desire to rapidly press ahead. So does it make a ceasefire plausible? And if so, can it end the war after Russia's full-scale invasion three years ago in a just and sustainable way, and on terms that keep the region and the world safe?

  Statement: "Ukraine expressed readiness to accept the U.S. proposal to enact an immediate, interim 30-day ceasefire, which can be extended by mutual agreement of the parties, and which is subject to acceptance and concurrent implementation by the Russian Federation. The United States will communicate to Russia that Russian reciprocity is the key to achieving peace." Analysis: The key word here is "immediate," which doesn't leave any doubt: Trump wants the guns to fall silent now. His sense of urgency, however, has often led to concerns in Europe. Many fear that rushing the desired outcome without first working out the terms takes the military pressure off Moscow as the invading power and could lead to a truce being exploited. They argue it empowers the occupying force. The fear is of ultimately leading Ukraine into an effective surrender. The theory is that Russia - the bigger, more populous and militarily more self-sufficient power - could use a truce without first establishing concessions to consolidate its forces, string out a negotiation process and wait to see what happens politically for Trump during his term while it holds on to everything it seized; and even then try to take more ground, building on its current occupation and potentially using a fracture in the Western alliance to threaten more of Europe. The process of negotiating terms before a ceasefire in conflicts can be important to ensure the sides convert current military threats into meaningful strategic gains. Zelensky has previously tried to persuade the Americans that Russian President Vladimir Putin cannot be trusted, evidenced by the fact he broke the European-backed Minsk agreements after seizing Ukrainian territory in 2014. Trump dismisses these concerns, saying there will be security for Ukraine, but without saying how this will be assured. He has said Putin will be deterred and is in a difficult position with "no choice" but to make a deal for reasons that "only I know". Rubio said on Tuesday the US delegation had substantive discussions with the Ukrainians on a permanent end to the war, including "what type of guarantees they're going to have for their long-term security and prosperity", but again didn't elaborate.

