id: bbc_2023_4878
title: Watch moment Russian warplane accidentally bombs Belgorod - BBC News
date: '2023-04-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-65346486
content: |-
  CCTV video captured the explosion at an intersection in Belgorod.

  A Russian Sukhoi-34 fighter-jet has accidentally bombed the Russian city of Belgorod, around 40km (25 miles) from the border with Ukraine.

  Regional governor Vyacheslav Gladkov said three people were injured and several buildings were damaged.
