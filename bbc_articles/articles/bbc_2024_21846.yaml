title: 'London transport cyber attack: Boy, 17, arrested - BBC News'
date: '2024-09-13'
section: England
url: http://www.bbc.co.uk/news/articles/c4gqg2elkj4o
content: |-
  The teenager was arrested on suspicion of Computer Misuse Act offences and has since been bailed.

  Tfl says a "limited number of customers" may have had bank account numbers and sort codes accessed

  A 17-year-old boy has been arrested in connection with the cyber security incident affecting Transport for London (TfL), the National Crime Agency (NCA) said. TfL said that about 5,000 customers' sort codes and bank account details could have been accessed by hackers amid an "ongoing cyber security incident". The NCA said the teenager was arrested in Walsall, West Midlands, on 5 September, after the cyber attack began four days earlier. TfL said data including names, emails and home addresses had been accessed.

  The NCA said the teenager was arrested on suspicion of Computer Misuse Act offences. He was questioned by NCA officers and has since been bailed. The NCA said it was working with TfL and the National Cyber Security Centre (NCSC) to minimise the risk to customers. Paul Foster, head of the NCA's National Cyber Crime Unit, said: "Attacks on public infrastructure such as this can be hugely disruptive and lead to severe consequences for local communities and national systems."

  Transport for London, which is based at Palestra House in Southwark, first reported the cyber attack on 2 September

  He added: "We have been working at pace to support Transport for London following a cyber attack on their network, and to identify the criminal actors responsible. "The swift response by TfL following the incident has enabled us to act quickly, and we are grateful for their continued co-operation with our investigation, which remains ongoing." TfL’s chief technology officer Shashi Verma said the customers who had been affected would be contacted directly. He added that an investigation into the cyber attack was taking place alongside the NCA and the NCSC.

  "Although there has been very little impact on our customers so far, the situation continues to evolve and our investigations have identified that certain customer data has been accessed," he said. "This includes some customer names and contact details, including email addresses and home addresses where provided. "Some Oyster card refund data may also have been accessed. This could include bank account numbers and sort codes for a limited number of customers. "As a precautionary measure, we will be contacting these customers directly as soon as possible to advise them of the support we can provide and the steps they can take."

  Mr Verma added that the "security" of its systems and customer data were "very important" to TfL. "We continually monitor who is accessing our systems to ensure only those authorised can gain access," he said. "We will continue to keep our customers and our staff updated. "I would like to apologise for the inconvenience this incident may cause customers and I thank everyone for their patience as we respond to this incident." The NCSC is urging anyone who thinks they may have been the victim of a data breach to be vigilant about suspicious emails, phone calls or text messages.
