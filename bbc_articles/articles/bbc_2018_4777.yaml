content: |-
  England beat Wales to maintain their unbeaten record at the 2018 Commonwealth Games and guarantee a place in the netball semi-finals.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England beat Wales 85-31 to maintain their unbeaten record at the 2018 Commonwealth Games and guarantee a place in the netball semi-finals. The Red Roses led 46-10 at half-time and easily beat 10th-ranked Wales. Wales, under interim head coach Julie Hoornweg, remain bottom of Pool B having lost all three of their matches. England, ranked third in the world, now have a rest day before facing world number two side New Zealand, who beat Scotland 60-29 on day five. The Silver Ferns lost their unbeaten record in the competition after a shock defeat against Malawi on Sunday.

  A win for England on Wednesday (00:02 BST) would see them finish top of Pool B, and Tracey Neville's side will be hoping to avoid a semi-final match-up with hosts Australia, who are currently unbeaten and top of Pool A. "You can never write off the Silver Ferns," said centre Serena Guthrie. "We haven't underestimated that result. We know they are world beaters and we'll have to play our best netball to beat them." The Roses finished a disappointing fourth at Glasgow 2014, after losing to Jamaica in the bronze-medal match, but will be expected to challenge for the gold medal in Australia.
