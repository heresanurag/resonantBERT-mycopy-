title: Man charged in Milton Keynes double murder investigation - BBC News
date: '2024-12-27'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cg4zgggr33xo
content: |-
  A man is charged with murder and attempted murder after suspected stabbings at a block of flats.

  Forensic officers were pictured at the flats in Bletchley on Thursday

  A man has been charged with murder after the suspected stabbing of two women who died in a block of flats on Christmas Day. Joanne Pearson, 38, and Teohna Grant, 24, died at the scene in Santa Cruz Avenue, Bletchley, Milton Keynes and were found by police at about 18:36 GMT. A man in his late 20s and a teenage boy were taken to hospital with serious injuries. Jazwell Brown, 49, of Santa Cruz Avenue, has been charged with two counts of murder, two counts of attempted murder, possessing a knife, blade or sharp-pointed article in a public place and causing unnecessary suffering to a protected animal. He is due to appear at High Wycombe Magistrates' Court on Saturday.

  Thames Valley Police said Mr Brown had been remanded into custody until the hearing. The force confirmed both women were from Milton Keynes. A spokesperson said: "We continue to support the families at this difficult time." Earlier, the force had said the injured man and boy were in a stable condition. It was also confirmed an injured dog, originally believed to have died, had survived.

  Thames Valley Police was called on Wednesday to Santa Cruz Avenue, Bletchley

  Residents of the flats have placed flowers and tributes close to where the women were found. Sophie Pritchard told the BBC: "It's just awful what's happened, tragic... something like this shouldn't be happening anywhere." Ed Hume, a Milton Keynes city councillor, said: "The community here in Newton Leys is a strong community. "It's a close knit community that looks out for each other and I know it is shocked and saddened."

