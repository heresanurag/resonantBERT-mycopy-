title: Laurence Fox denies sharing Narinder Kaur upskirting image - BBC News
date: '2025-04-25'
section: UK
url: http://www.bbc.co.uk/news/articles/cly1r2e0k7po
content: |-
  Fox is alleged to have posted an intimate photograph on X of the broadcaster without her consent in 2024.

  Fox pleaded not guilty to two counts under the Sexual Offences Act 2003

  Laurence Fox has denied sharing an intimate image of TV star Narinder Kaur without her consent on social media. The actor-turned-politician is alleged to have shared the 'upskirting' image of Kaur, a broadcaster who appears on Good Morning Britain and GB News, on X in April 2024. Fox, 46, of Peldon in Essex, appeared at Westminster Magistrates' Court charged with two counts under the Sexual Offences Act 2003. During the hearing, he spoke to confirm his identity and enter not guilty pleas to both charges. He was released on bail on condition that he does not contact the complainant directly or indirectly.

  Upskirting, taking pictures of people under their clothes without their permission, became a specific criminal offence in 2019. Offenders found guilty of upskirting face up to two years in prison for taking an image or video under somebody's clothing in order to see their genitals or underwear. It is also against the law to share upskirting photographs taken by other people. The Metropolitan Police said the person who took the original photograph of Kaur has not yet been identified. Kaur has chosen to waive her right to anonymity, which victims of sexual offences are automatically entitled to as soon as they make an allegation. Fox's charge over the alleged sharing of the image came after a month-long investigation. Fox is accused in the first count of sharing a "photograph or film of person in intimate state intending to cause alarm, distress or humiliation", with the second alleging he sent a "photograph or film of genitals to cause alarm, distress or humiliation". He will appear at Woolwich Crown Court for a pre-trial hearing on 23 May after choosing to proceed with a jury trial. Fox made his name as an actor in TV shows like Inspector Morse spin-off Lewis. In recent years he has repositioned himself as a right-wing commentator, activist and aspiring politician. He set up the Reclaim Party and unsuccessfully stood for election for London mayor in 2021. In 2023, Fox was sacked from his role as a TV presenter on GB News after an on-air rant about a female journalist.
