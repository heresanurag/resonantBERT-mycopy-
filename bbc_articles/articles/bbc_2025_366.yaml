content: |-
  The 62-year-old's win caps a triumphant comeback and puts her in a strong position ahead of the Oscars.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Best moments from the 2025 Golden Globes

  Demi Moore has made a triumphant return to the Golden Globes, winning best actress for a role in a body horror which has revitalised her career. The 62-year-old gave an impassioned speech as she collected her award, telling the audience she was "at a low point" before being cast in The Substance. Moore said the award was a celebration of "the gift of doing something I love and being reminded that I do belong". Other film winners included Emilia Pérez, The Brutalist and Wicked, while Baby Reindeer and Shōgun won the big TV prizes.

  The Golden Globes, the first major ceremony of awards season, are considered to be a strong measure of which films have momentum ahead of the Oscars. One of the night's big surprises was Brazilian actress Fernanda Torres winning best drama actress for her tremendous performance in I'm Still Here, which held off competition from Hollywood A-listers Angelina Jolie and Nicole Kidman. Unlike the Oscars, the Golden Globes split many of their film categories in two, with prizes for dramas and musicals/comedies. Moore won best actress in a musical or comedy.

  Moore was a fixture at the Globes in the 1990s and 2000s, but has only won an award for the first time this year. The Substance sees her play a woman who trades her body for a younger, more beautiful version of herself. Moore said she was "in shock" after winning in such a competitive category, which also included Anora star Mikey Madison, Wicked's Cynthia Erivo, and Emilia Pérez star Karla Sofía Gascón.
