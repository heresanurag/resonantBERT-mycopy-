content: |-
  Rita was last seen on Saturday morning, and she is thought to be travelling on foot.

  Rita was last seen on Saturday morning

  Police are "increasingly concerned" for a 96-year-old woman who has gone missing.

  Rita - whose surname has not been released by officers - is from Brecon, Powys, and was last seen at 10:20 GMT on Saturday.

  Dyfed-Powys Police said there would be more officers than usual in the town.

  Firefighters, mountain rescue, and the National Police Air Service are now looking for her. Rita is believed to be travelling on foot.

  She may be wearing a fleece jumper with a leaf design.

