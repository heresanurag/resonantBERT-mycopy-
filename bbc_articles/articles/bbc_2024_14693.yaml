content: |-
  On a day primed to look back at the career of James Anderson, Gus Atkinson showed he can be England's future, says Stephan Shemilt.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Life comes at you fast and Gus Atkinson bowls faster. For all of the attention and emotion generated by James Anderson’s final appearance in Test cricket, it was Atkinson who eased into the slipstream and hinted at England’s tomorrow. How perfect it would have been had Anderson presented Atkinson with his cap on a moody Wednesday morning at Lord’s – that honour went to debuting wicketkeeper Jamie Smith, with Atkinson welcomed to the England fold by Surrey team-mate Ollie Pope. Instead, Atkinson had to settle for taking over from Anderson, literally replacing him in the attack 10 overs into the first morning of the first Test against West Indies, and responded with the best figures by an England bowler on debut for 29 years. His name was on the famous honours board before the day was out. “I walked in after and the board is right where I’m sitting, so it’s very special to see it up there,” Atkinson told BBC Sport. “I’m very proud. I don’t think it’s really sunk in yet.” On an occasion all about Anderson, the stars (and dark clouds) had aligned to present what seemed the perfect conditions to end a legendary career with one final mesmeric spell.

  Seldom do home crowds cheer quite so loudly when England win the toss and choose to field, but the Lord’s spectators recognised the grey sky and floodlights were prime Jimmy material. There was a moving tribute video played on the big screen to England’s all-time leading wicket-taker, he led his team out for the national anthems and the entire Anderson family were on hand to ring the five-minute bell. But this stage would not be filled by a greatest hits set, rather a thrilling debut album, one that will be music to the ears of the England hierarchy following the decision to pull Anderson from the dancefloor. Not for one second is anyone trying to claim Atkinson is a better bowler than Anderson now, or that he will be in the future. England, though, have nailed their colours to pace, consistently telling us that Test bowlers are most likely to be successful when they get up above 85mph. And, for all of the encouragement offered to Anderson and Chris Woakes in the early going, West Indies openers Kraigg Brathwaite and Mikyle Louis were relatively untroubled by bowling in the low 80s.

