title: Huw Edwards hometown mural painted over by artist - BBC News
date: '2024-08-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/cye0ennkkgzo
content: |-
  Steve Jenkins says it is a shame he had to paint over the mural but called the charges disgraceful.

  Artist Steve Jenkins has painted over a mural he made of former BBC newsreader Huw Edwards

  A mural of former BBC newsreader Huw Edwards has been removed after he admitted having indecent images of children. The artwork, unveiled in 2023, was part of a bigger mural in the presenter's home village of Llangennech, Carmarthenshire. Artist Steve Jenkins, 50, painted over the portrait on Tuesday after it was announced Edwards had been charged with three counts of making indecent images of children. Cardiff council has also removed a plaque honouring Edwards at Cardiff Castle, and the BBC has removed from the iPlayer a Doctor Who episode featuring him.

  How the wall looks now that the Huw Edwards mural has been removed

  Mr Jenkins, from Llanelli, had been proud to paint Edwards's picture. He said: "I feel deeply saddened to have to remove it as the whole village loved it when it was first done. "I was given the topic of the village to base the mural on and we thought it would be nice if Huw was included." The mural was in an underpass and Edwards had been to see it. "It was lovely, he brought his mum along to see it and that's why this is such a bitter pill to swallow," Mr Jenkins said.

  Edwards was one of the BBC's highest paid presenters

  The BBC has removed an episode of Doctor Who from iPlayer which featured Edwards as himself in Series 2 episode Fear Her, broadcast in 2006 as part of David Tennant's debut series. Visitors to Cardiff Castle will no longer have access to an audio guide narrated by Edwards, or see a plaque in his honour previously erected there. Cardiff council said: "The plaque on the Cardiff Castle interpretation centre has been removed and the audio guide discontinued."

  Cardiff council says it removed the plaque mentioning Edwards' links to Cardiff castle

  Edwards admitted having 41 indecent images of children, sent to him by a convicted paedophile on WhatsApp at Westminster Magistrates' Court on Wednesday. Llanelli councillor Gary Jones said: "The mural had been previously defaced, on hearing the latest news the graffiti artist decided to paint over the image. "The community council have already removed the photograph of Huw Edwards that hung in our community centre." Edwards' is involved with a number of different organisations in Wales. His membership of the Gorsedd of the Bards will be discussed at the Eisteddfod in Pontypridd on Tuesday. Recorder of the Gorsedd, Christine James, said: "The Gorsedd does not have a process or a specific mechanism to expel members." The National Churches Trust said Huw Edwards was no longer vice president for the charity. The Royal Welsh College of Music and Drama, where Edwards is an honorary fellow, said it was not able to comment. Cardiff University said it was "reviewing procedures" in relation to Edward's honorary fellowship and position as an honorary professor. Swansea University said it had no comment on Edwards' honorary fellowship. S4C said it had not commissioned any content involving Edwards since he left the BBC. The oldest Welsh chapel in London, Capel Jewin, confirmed Edwards was a member but said he had not been seen for "some time". Secretary Llinos Roberts she said: "No-one can comment because we don't know anything about it." Llanelli Mind, where Edwards was a patron, said it ended its relationship with him in May. The University of Wales, Bangor University, University of Wales Trinity St David’s and the London Welsh Centre have all been approached for comment.
