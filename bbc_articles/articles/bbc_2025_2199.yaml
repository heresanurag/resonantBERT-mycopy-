title: Bristol M4 death investigated after 'predator' sting - BBC News
date: '2025-02-25'
section: England
url: http://www.bbc.co.uk/news/articles/c4gelvm7vero
content: |-
  Police arrested the man after accusations against him were live streamed on social media.

  The M4 was closed in both directions after the man fell on to the motorway

  A man found dead on the M4 had been arrested hours earlier after being confronted by a self-proclaimed "online child protection team". Avon and Somerset Police arrested the man on Friday night after accusations against him were live streamed on social media. He was released from custody on police bail on Saturday and later found dead on the motorway near Bristol. He had not been charged with any offences. A mandatory referral has been made to the Independent Office of Police Conduct due to the police contact.

  Police urged people not to speculate to respect the privacy of the man's family. The group that confronted him also asked people to "allow his family to grieve in a respectful manner". The motorway was closed for a number of hours while officers investigated. At the time, a police spokesperson said: "We understand from witnesses a man in his 40s fell from a height and was subsequently struck by vehicles travelling between junctions 20 (Almondsbury) and 21 (Awkley). "The death is being treated as non-suspicious and his next of kin are being offered support during this difficult time. "Our thoughts and sympathies remain with them."

  If you are affected by any of the issues raised in this story, support and advice is available via the BBC Action Line.
