  Developments on the coronavirus outbreak in Wales on Sunday 3 May

  As we bring our live coverage to an end for the day, here's a reminder of today's developments:

  Public Health Wales has announced the death of a further 14 people in Wales after testing positive for coronavirus, taking the total to 983.

  Schools would need about three weeks to prepare for a phased return, according to First Minister Mark Drakeford. But his mention of June in an interview with Andrew Marr has caused confusion according to a teaching union.

  The way we buy and sell food should be reviewed after the coronavirus crisis, according Dr Ludivine Petetin, from Cardiff University. She said the weaknesses of the current "just in time" delivery system had been exposed by the crisis.

  We'll be back with the latest on the outbreak in the morning.
