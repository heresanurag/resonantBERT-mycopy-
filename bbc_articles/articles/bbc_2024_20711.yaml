title: John Swinney warns against 'speculation' after Stirling stabbing - BBC News
date: '2024-08-05'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/cv2ggn0x802o
content: |-
  A 29-year-old local man is in custody and the woman's condition is described as non life threatening.

  First Minister John Swinney has warned against "unhelpful speculation" following the stabbing of a woman in Stirling. The 21-year-old woman was hospitalised following a stabbing on King Street about 20:20 on Saturday. She was later treated for non life threatening injuries at Forth Valley Royal Hospital. A 29-year-old man was arrested and charged in connection with the attack. Speculation on social media following the attack suggested three people had been stabbed and the attacker was a Muslim. Police Scotland said the man arrested is a white man from the local area.

  The first minister stressed there was no wider threat to the public, adding: "This is a serious incident and my thoughts are with the victim. "This is an isolated incident and I have been advised there is no wider threat to the public. "I would encourage everyone to refrain from unhelpful speculation on social media." The rumour had been promoted by Stephen Yaxley-Lennon, known as Tommy Robinson, the founder of the English Defence League (EDL). This follows riots across England and Belfast in recent days after the murders of three young girls in Southport on Monday. Bebe King, six, Elsie Dot Stancombe, seven, and Alice Dasilva Aguiar, nine, were killed in the attack, with 17-year-old Axel Muganwa Rudakubana appearing court charged with the crime. A statement from Police Scotland said: "We are aware of speculation and false information circulating on social media regarding this incident. "Extensive inquiries are ongoing to establish the full circumstances and we would urge people not to add to this speculation online."
