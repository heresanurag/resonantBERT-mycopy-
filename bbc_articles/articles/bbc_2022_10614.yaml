content: |-
  The organisation, started in Australia, offers a space for men to talk about issues they have.

  "I can talk to someone who knows exactly how I feel."

  These was Darren's thoughts on Men's Sheds - an organisation that gives a space for people to relax or discuss issues to help with their mental health.

  The Denbigh shed has fully reopened after the pandemic and Darren is able to talk to people who also experience feelings of anxiety.
