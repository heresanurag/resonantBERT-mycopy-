title: Woman sets record for world's longest mullet - BBC News
date: '2023-09-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66689773
content: |-
  Tami Manis' hair is 172.72cm (5ft 8in) long. She says she has to braid it to keep it safe.

  Her hair is 172.72cm (5ft 8in) long and now officially the world's longest female mullet in the Guinness World Records book.

  She says she has to braid it to keep it and herself safe.
