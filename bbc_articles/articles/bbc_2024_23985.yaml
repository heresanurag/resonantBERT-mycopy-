  • None Ukraine says it has uncovered major arms corruption Another opposition MP, Iryna Gerashchenko, accused Mr Zelensky of "breaking parliamentary tradition" by not being present at votes to approve his new ministers. She said that the nomination of key posts, such as that of foreign minister, were a "presidential prerogative", adding that "always the presidents represented their candidates". Oleksandr Merezhko, a lawmaker with Mr Zelesnky's Servant of the People Party, rejected the concerns, noting that the president has always been quick to dismiss ministers who were not meeting his expectation, citing the early dismissal of his first Prime Minister Oleksiy Honcharuk after less than a year in office. "He came from the sphere of business and he is himself a result-orientated person," Mr Merezhko told the BBC. "When Zelensky sees someone can't deliver, he will make a change," he added, noting some of ministers dismissed this week were "professionally exhausted". Prime Minister Denys Shmyhal welcomed the new appointments, acknowledging that they faced "difficult tasks," but insisted that "their experience and skills will help in the implementation of our state's strategic goals". Under martial law, Mr Zelensky boasts considerable executive powers. With elections suspended while the war continues, and the Servant of the People Party maintaining a parliamentary majority, there is a limited check on his government, some experts say. But Mr Merezhko dismissed concerns of an over-centralisation of power around Mr Zeleasnky's office. "In a state of war, some kind of concentration of power is a necessity," he told the BBC. "After all he is the commander-in-chief and we are waging a war, the whole state is like an army right now." "The challenge for us, and we are coping with this challenge so far, is to preserve democracy and pluralism."
