title: Ukraine names new foreign minister as Zelensky overhauls cabinet - BBC News
date: '2024-09-05'
section: Europe
url: http://www.bbc.co.uk/news/articles/cwywj71ywyeo
content: |-
  Parliament approves several new ministers, but some MPs accuse President Zelensky of centralising power.

  New Foreign Minister Andrii Sybiha has previously worked closely as a top adviser to President Zelensky

  Ukraine's parliament has approved President Volodymyr Zelensky's biggest government reshuffle of cabinet ministers since Russia launched a full-scale invasion in February 2022. Andrii Sybiha, a 49-year-old former diplomat and ex-adviser to President Zelensky, was appointed as foreign minister in the revamp, which saw nine new ministers take office. The shake-up had been expected for months, with much of the president's cabinet left holding office in an acting capacity after a spate of resignations and dismissals. But critics have accused the president of seeking to centralise power around his office, with several of the new ministers having once served as his advisers.

  Supporters say that concentrating political power is necessary during war. In the opening months of the war, Mr Zelensky largely kept senior political and military figures in place. But in May last year, he fired defence minister Oleksii Reznikov after a series of corruption scandals, then sacked Kyiv's top military commander Valerii Zaluzhnyi earlier this year. In his nightly address from Kyiv, President Zelensky justified the changes, telling Ukrainians that he wanted his government to be "more active" in securing aid from the country's Western allies. Mr Sybiha will replace Dmytro Kuleba at the foreign ministry, but his appointment is not expected to alter policy significantly. President Zelensky and his office have broadly overseen international relations from the presidential palace. The ex-ambassador is seen by some as being closer to Andriy Yermak, the increasingly powerful presidential chief of staff. Mr Yermak was said to have clashed with Mr Kuleba. Another key adviser to the president, Oleksiy Kuleba, has been appointed as deputy prime minister in charge of reconstruction, regions and infrastructure. He previously served as deputy head of the presidential office. Other changes include the promotion of 38-year-old Olha Stefanyshyna. She has been reappointed as deputy prime minister in charge of European integration, while also being handed the justice portfolio. Analysts say the move represents Ukraine's desire to move forward with its bid for EU membership. She told MPs on Wednesday that "hundreds and thousands" of legal changes are needed before Kyiv can become a member of the bloc. Meanwhile, Herman Smetanin, 32, has been appointed strategic industries minister in charge of domestic arms production, a key position as Kyiv's forces face intense Russian attacks in the eastern Donetsk region, while continuing their incursion into Russia's Kursk border province. Speaking to the BBC on Wednesday, MP Inna Sovsun echoed the president in saying the reshuffle was "the best way to bring in new people, new ideas into the government". But Dmytro Razumkov, a former ally of Mr Zelensky's turned opposition MP, said the new changes would have little impact on decision-making, claiming in a Telegram post on Thursday that the "Cabinet of Ministers has not influenced anything for a long time".
