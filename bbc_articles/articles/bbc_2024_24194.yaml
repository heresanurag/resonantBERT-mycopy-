  A landslide threatened properties at Afan Valley Road, Port Talbot, and one house was evacuated because of concerns an external wall could collapse. Stephanie Grimshaw, a Neath Port Talbot councillor, took to Facebook on Friday evening warning residents to take care due to !severe flooding in the area!. "Sandbags are in the process of being delivered out to residents," she said. Natural Resources Wales said one flood warning for Ilston Brook at Ilston, Gower, has since been lifted.

  A new weather warning for rain comes into force between Saturday and Sunday evening

  On Friday evening, David Rees, Aberavon Member of the Senedd whose constituency includes Port Talbot, wrote on X, formerly Twitter, external, that there had been "terrible conditions". "Everyone take care & stay safe. Horrendous flooding seen in parts of the constituency," he wrote. Gwent Police said officers dealt with surface water issues on the A449 Newport to Usk trunk route. There were dozens of lightning strikes reported across south Wales between Chepstow and Gower. A new Met Office yellow weather alert has been put in place between 21:00 on Saturday and 18:00 on Sunday for much of Wales. "Areas of heavy, possibly thundery rain may cause flooding and disruption," it warned.
