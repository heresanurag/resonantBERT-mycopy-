title: 'Wales weather: Flash flooding in south after torrential rain - BBC News'
date: '2024-09-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn7l4lljgd4o
content: |-
  A warning for more heavy rain has been put in place for much of south Wales on Saturday evening.

  Flash flooding on Oystermouth Road, in Blackpill, Swansea on Friday night

  Firefighters attended dozens of incidents after receiving 180 calls as flash floods hit several areas of south Wales on Friday night, with the deluge described as "horrendous" in one community. One person was rescued after 10 properties were flooded at Ty Caer Castell, Bridgend, according to South Wales Fire and Rescue Service. Firefighters also rescued a couple from their car in Roath, Cardiff, with flooding also reported on the outskirts of Cardiff and in Port Talbot. Sandbags were also handed out in Aberavon. A Met Office warning for more heavy rain, external has been put in place for Powys and across south Wales on Saturday from 21:00 BST.

  BBC Wales senior meteorologist Derek Brockway said a month's rain fell in 24 hours at Swansea's Victoria Park on Friday, with 87.2mm (3.4in) recorded, of which 43.8mm (1.7) fell in an hour after 20:00. He said it was the UK's wettest place with a total of 107.8mm (4.2in) of rain on Thursday and Friday. Elsewhere in Swansea, motorists were led to safety from flooded cars in West Cross Lane on Friday just after 21:00. And firefighters rescued four people and a dog from a flooded garden in Swansea just after 23:00.

