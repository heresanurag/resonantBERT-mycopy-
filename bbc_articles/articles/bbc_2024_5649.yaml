  Robin Windsor's funeral will be held in his home town of Ipswich on Tuesday.

  A private funeral will be held for Robin Windsor in Ipswich

  A private funeral for former Strictly Come Dancing professional Robin Windsor is set to be held in his home town.

  Windsor, 44, will be laid to rest in Ipswich on Tuesday.

  The star was paired with various celebrities between 2010 and 2013 on the BBC One show.

  A family statement said: "The funeral will be a private service for invited family, friends and colleagues who were important to Robin in both his personal life and professional career."

  Windsor was a professional Latin and ballroom dancer and worked with Dragons' Den star Deborah Meaden and actresses Patsy Kensit, Anita Dobson and Lisa Riley on the show.

  For the Christmas specials, he was partnered with Great British Bake Off host Alison Hammond and Radio 2 presenter Sara Cox.

  The statement continued: "We once again thank everyone for the love and the memories shared of Robin.

  "As a family we also please ask for there to be no further upsetting speculation. We thank you for respecting our continued privacy at this difficult time."

  Windsor's death was announced in February and Strictly's team paid tribute, saying they were "deeply saddened" by the loss of their "dear friend".

  According to his website, he began dancing at the age of three when his parents enrolled him in classes in Ipswich, and he went on to represent England in numerous championships at home and abroad.

  Windsor also appeared in stage shows Come What May, a tribute to Moulin Rouge, and Burn The Floor.

