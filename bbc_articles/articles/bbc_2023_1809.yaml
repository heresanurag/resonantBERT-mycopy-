  UN aid chief Martin Griffiths says the emphasis is now switching from rescue efforts to caring for survivors.

  Why are some parts of Syria so hard to reach?

  During the last 12 years of war, Syria's territory has become fragmented, and many parts have long been hard to reach by international aid organisations. In the first few days after the quake, some supplies reached the government-controlled areas of Syria, primarily from friendly countries like Russia, Iran and the UAE. But the north-western rebel-controlled areas of Syria remain virtually cut off. This is because international humanitarian aid to these parts can only arrive through a single crossing from Turkey or through the government-controlled areas of Syria. The latter is not currently an option, as western countries that have all but severed ties with Syrian President Bashar al-Assad are reluctant to send aid through the Syrian government. And although this week, the US announced an emergency relief package of $85m (£70m) to both Turkey and Syria, the Syrian government is still resisting pressure to open the rebel-controlled areas to international teams. As for the Turkey border crossing, it was closed for 72 hours after the earthquake. Even now it has reopened, the flow of aid is very limited - the roads leading to it have been severely damaged and, in any case, many airports in southern Turkey remain shut, making it difficult to deliver large supplies. It’s worth remembering that this section of Syria has already been devastated by years of war, which has seen Syrian government and allied Russian bombardment target infrastructure including hospitals. This is what experts are referring to when they say that the quake has caused “a crisis on top of multiple crises”.
