content: |-
  Four activists glued their hands to the frame of the Renaissance painting in the Piccadilly gallery.

  The Just Stop Oil protesters gathered at the Royal Academy

  The Last Supper in the Royal Gallery is the latest painting to be targeted by climate protesters.

  Four Just Stop Oil activists glued their hands to the frame of the Renaissance artwork hanging in the Royal Academy.

  They also daubed a slogan in spray-paint underneath the frame in the Piccadilly gallery.

  Yesterday, a pair from the same group glued themselves to a painting in the National Gallery, in Trafalgar Square.

