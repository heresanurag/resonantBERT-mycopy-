  Tottenham sign midfielder Archie Gray from Leeds United in a deal worth about £30m, with defender Joe Rodon moving the other way.

  Tottenham sign Gray from Leeds for about £30m

  Tottenham Hotspur have signed midfielder Archie Gray from Leeds United for about £30m, with defender Joe Rodon moving in the opposite direction in a deal worth about £10m. Gray has signed a contract until 2030 with Spurs, who Leeds said had "met a release clause that was triggered by the club’s failure to get promoted at the first attempt". The sale is believed to be enough to make the Elland Road club compliant with profit and sustainability rules, after their defeat in the Championship play-off final by Southampton cost them promotion and forced them to sell players. Spurs have beaten Brentford to the signing of 18-year-old Gray, who played 52 matches in all competitions - in midfield and at right-back - for Leeds last season.

  Gray had begun a medical at Brentford's training ground, only for the Bees to have their bid of a similar value rejected by Leeds over the payment structure and add-ons on Sunday. England Under-21 international Gray, who also qualifies for Scotland, is the great-nephew of Leeds legend Eddie Gray and the Yorkshire club said they had agreed to the teenager's transfer "with a heavy heart". They added: "Whilst we understand that supporters will be hugely disappointed to lose such a homegrown talent, and a family name so synonymous with Leeds United, the move improves the club’s chance to compete for automatic promotion next season by increasing our ability to build a competitive squad within the league’s financial control regulations. "Everyone at Leeds United is heartbroken to see one of our own depart and would like to thank Archie for all his efforts and professionalism." Wales international Rodon, who was on loan at Leeds last season, has signed a four-year deal with the club.

