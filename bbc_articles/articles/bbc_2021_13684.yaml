title: 'Antrim: Rathenraw industrial estate fire ''deliberate'' - BBC News'
date: '2021-10-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-58976061
content: |-
  Police say "significant damage" was caused by the Rathenraw industrial estate blaze on Tuesday night.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A blaze at an Antrim industrial estate was started deliberately, the fire service believes.

  Firefighters were called to Rathenraw industrial estate at 20:35 BST on Tuesday and had to work "in challenging conditions".

  It is believed a lorry caught fire, spreading to a truck containing plastic and 30 other trailers, 18 of which were destroyed.

  Thirty-eight firefighters and six appliances were at the scene

  Thirty-eight firefighters and six appliances were at the scene at the height of the blaze.

  Water jets and foam were used to help bring it under control.

  Plumes of black smoke could be seen across the town

  The blaze was burning for several hours

  Northern Ireland Fire and Rescue Service (NIFRS) said the fire was believed to have been caused by "deliberate ignition" and the incident was dealt with by 01:33 BST on Wednesday.

  Police said they were investigating.

  Stiles Way, which runs beside the industrial estate, was closed in both directions.

  Police asked residents living nearby to stay indoors and keep their windows closed due to large amounts of smoke in the area.

  Residents were urged to keep windows closed

  Police said a significant amount of damage was caused by the fire.

  Det Sgt Lyttle said that inquiries were ongoing and appealed for anyone with information to contact police.
