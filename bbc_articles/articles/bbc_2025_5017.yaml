  Dr Dwayne Ryan Menezes, founder and managing director of Polar Research and Policy Initiative think tank, based in London, criticised the visit. He said it was "highly unusual" that a high-level delegation of US officials are visiting Greenland without being invited, especially after a national election in the country, where the parties are still in talks to form the next government. The US' interest in Greenland's security, given its strategic importance, makes sense, he said. But he added that it is "inexplicable" for Washington DC to have taken such an aggressive approach, especially in light of Trump's comments about acquiring the territory. "Disrespecting the people of Greenland by saying the US will acquire it 'one way or the other' is unhelpful and counter-productive as a tactic," he added. According to recent polls, almost 80% of Greenlanders back independence from Denmark. But an opinion survey in January suggested an even greater number rejected the idea of becoming part of the US.

