id: bbc_2019_2588
title: 'Christchurch shootings: Flowers and haka - BBC News'
date: '2019-03-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-47600877
content: |-
  The Christchurch community remembers those killed with a large floral memorial and an outpouring of grief.

  A large flower memorial has been laid by the local Christchurch community in memory of those killed in the mosque attacks.

  A group of bikers performed a traditional Maori ritual at the memorial and one couple brought flowers from their wedding that took place on the same day at the attack.

  Fifty people were killed in the rampage.
