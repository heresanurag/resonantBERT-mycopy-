title: 'Belfast: Petrol bombs and paint thrown at police - BBC News'
date: '2024-07-16'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c3g97nykd3no
content: |-
  Police said petrol and paint bombs were thrown at officers and vehicles by groups of up to 50 young people.

  Paint was thrown during the disturbance on Monday evening

  Police cars and vehicles belonging to members of the public were damaged during a disturbance in south Belfast on Monday night. The disorder at Broadway roundabout has been described as "particularly protracted" by police. “Petrol and paint bombs were thrown at officers and vehicles by groups of up to 50 young people," Ch Supt Jeremy Lindsay. "The windscreens of three cars were shattered and splattered with paint with some damage also caused to our police vehicles."

  Police have described the disorder as "particularly protracted"

  No injuries to police officers or members of the public have been reported. Ch Supt Lindsay said that police will continue to patrol the area on Tuesday night to prevent anti-social or disorderly behaviour and detect those involved in Monday night's trouble. “I would urge the young people who have been involved and their parents or guardians to seriously consider the impact of their actions on the local community, but also on their own futures," he added. "These actions have serious consequences. My message is simple, walk away and don’t get involved in any trouble. “I want to thank local community representatives who worked with us to restore calm and minimise the impact on the local community."

  Several police Land Rovers were at the scene on Monday evening

  DUP assembly member Edwin Poots said there had been trouble in the area since last October. "Someone is going to get seriously injured," he told BBC Radio Ulster's Good Morning Ulster programme. "That’s a busy road, people are fighting - hand to hand fighting - they were throwing missiles. "A member of the public could get hurt who’s in a vehicle, a vehicle could hit one of these young people." West Belfast MP Paul Maskey said: “Scenes of disorder and anti-social behaviour in the Broadway area over recent days are deeply concerning, and totally unacceptable. “I would appeal for calm in the area and urge young people not to get caught up in this type of activity." Alliance Party MLA Kate Nicholl said she was "disgusted, disappointed and angry" about what happened. "What possesses people to go out and carry out such attacks on those who are there to protect us?" she said. "Those involved have done nothing but bring misery and disruption to residents, workers and anyone else affected."
