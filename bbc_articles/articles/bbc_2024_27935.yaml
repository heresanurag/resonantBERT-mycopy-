content: |-
  A news conference between a disinterested Mike Tyson and an agitated Jake Paul ended with a cordial face-off.

  Paul tries to goad Tyson at baffling news conference

  This video can not be played To play this video you need to enable JavaScript in your browser. You can follow live text commentary of Mike Tyson v Jake Paul from 03:00 GMT on Saturday, 16 November on BBC Sport website & app

  Mike Tyson spoke just a few words, Jake Paul made crude references and Briton Tony Bellew was escorted out of the arena by security at a baffling news conference in Texas. Former world heavyweight champion Tyson, 58, will face YouTuber-turned-fighter Paul, 27, at Dallas' AT&T Stadium on Friday. Tyson has not fought as a professional in 19 years and appeared disinterested as Paul dominated the microphone. Paul tried to goad Tyson by asking him about comments made in a documentary where the former champion described himself as "natural born killer". Tyson refused to play ball. "That's what I said," he replied.
  • None Tyson v Paul - all you need to know Perhaps the most bizarre moment at Wednesday's event at the Toyota Music Factory in Irving came when Liverpool's Bellew inaudibly shouted into a microphone – which he had brought along - from the press area. The chaos was quite fitting for an event criticised by many boxing purists, but it was given some credibility by the presence of pound-for-pound greats Katie Taylor and Amanda Serrano. Light-welterweight champion Taylor edged her rival to win by split decision in an all-time classic in 2022. The pair – who will compete for the undisputed title in the chief support - conducted themselves appropriately to build up to the richest fight in female boxing.

  Paul wore a diamond stud cover on his ear, in reference to Tyson biting Evander Holyfield in their heavyweight title fight in 1997

  About 70,000 fans are expected on Friday in a fight which will be streamed live on Netflix, and a healthy crowd of more than 1,000 – mostly Tyson fans - attended the news conference. There were jeers for Ohio's Paul, who wore a diamond spiked ear cover and referenced the infamous title fight where Tyson bit a chunk out of Evander Holyfield's ear in 1997. When Paul called his opponent's comments "cute", Tyson was either not listening or chose to ignore him. One of the most controversial and volatile figures in sporting history having been undisputed champion and served three years in prison for rape, Tyson became animated when a reporter asked him about potentially being defeated by Paul. "I am not going to lose, did you hear what I said?" he shouted.

  Tyson first won the world heavyweight title in 1986 as a 20-year-old

  BBC Sport caught up with former cruiserweight champion Bellew as he was ushered out by a few men dressed in black. Bellew, in what appeared to be a stunt for a betting company, was joined by an older man. "He's the champion of the care home. [Jake] is fighting a grandfather so why not fight a great-grandfather who has had two new hips and is 106," he said. After Bellew's ejection, the news conference quickly turned into a one-man show. Paul – who has mainly fought ex-UFC stars in an 11-bout career – cursed at a journalist who asked him when he would face "a real fighter". Promoter Eddie Hearn, who said he plans to leave before the main event, was also in the firing line with Paul calling him a "clout chaser". All fighters on the undercard were asked to predict the outcome of Tyson-Paul. An offended Paul approached all those who went against him and asked them how much they wanted to bet. The range went from Paul's purse – rumoured to be $40m (£31m) - to $20. Rather surprisingly, the obligatory face-to-face between Tyson and Paul ended without any drama, but there was already enough of that in the hour and half that preceded it.

  Paul tried to make a bet with multiple fighters on stage including Katie Taylor, with the Irishwoman suggesting he put his entire purse on the line

  Taylor won her first fight with Amanda Serrano narrowly via split decision in 2022, with 320 punches landed between the two over 10 epic rounds

  Tyson tried to make a quick exit after the face-off but was ushered back to pose for more pictures

