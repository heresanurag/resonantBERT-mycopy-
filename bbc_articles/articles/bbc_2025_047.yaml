title: 'EastEnders: Ross Kemp to return as Grant Mitchell for soap''s 40th anniversary
  - BBC News'
date: '2025-01-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/cgkx68mk5l3o
content: |-
  Kemp will appear as Grant Mitchell in the BBC soap for the first time in nine years.

  Kemp said it was an "absolute honour" to be returning to Walford

  Actor Ross Kemp is to return to Albert Square as EastEnders prepares to celebrate its 40th anniversary. His character Grant Mitchell first appeared in the TV soap almost 35 years ago, and was last seen on screen in 2016. In a statement, Kemp said he was "delighted to be returning" to the BBC programme. "EastEnders has always meant so much to me, so to return as the show is about to celebrate such a special anniversary is an absolute honour," he added.

  The TV soap first aired on BBC One on 19 February 1985. Producers said Kemp would return in the New Year for a "short stint" and would "play a significant part in the show's 40th anniversary". Details of his new storyline and the circumstances of his return have not been revealed, but the BBC said "there is sure to be drama". In recent weeks, viewers have watched his brother Phil Mitchell (played by Steve McFadden) struggle, while Grant's estranged best friend Nigel has returned to the square. Meanwhile, Grant's ex-wife Sharon is now dating his long lost cousin Teddy Mitchell. Kemp commented: "Grant has never been far from the action and let's just say, this time is no different as he certainly comes back with a bang." Grant Mitchell first appeared in Walford in 1990, but has been living in Portugal since his last episode nearly a decade ago. EastEnders executive producer Chris Clenshaw said he was "absolutely thrilled" to welcome Kemp back, describing Grant as a "legendary role". "Whilst I'm not currently revealing exactly what brings Grant back to Walford, I can say that his return will play a significant part in the show's 40th anniversary, and will make up many moments of truly unmissable TV." Kemp's return follows that of Paul Bradley, who played Nigel Bates, who returned to the show just before Christmas, more than 25 years since his last appearance. Actress Tracy-Ann Oberman also returned to the series in 2024, with her character Chrissie Watts reappearing after nearly two decades away. In recent years, Kemp has been hosting hit daytime game show Bridge of Lies. He has also carved out a career fronting documentaries, often about dangerous places and people, most recently Sky History's Mafia and Britain.
