  • None How you rated the England players at Euro 2020

  "The way some people acted was totally wrong," he added.

  "Dad will always support me and go to the games but he will be a little bit more aware of everything going on around.

  "[Wembley] has been an amazing home, and the way [fans] have acted has been unbelievable, apart from the odd few in a final.

  "We need to learn and we will — and it would be an amazing place to hold the World Cup."

  Separately, Julian Knight, chair of the Digital, Culture, Media and Sport Committee, has written a letter to Mark Bullingham, chief executive of the Football Association, asking for further detail on the safety and security measures taken.

  The MP said he was "shocked and appalled by the violence seen at Wembley for Sunday's final" and expects a reply by 20 July.

  "These culturally significant events should inspire the next generation, not leave reports of children being terrified," he said.

  "We have concerns about whether the preparations for the event were sufficient and are requesting urgent answers from the FA. Given the situation, what planning had been done for people 'storming' the stadium?"
