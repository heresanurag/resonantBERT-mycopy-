title: Greta Thunberg changes Twitter name to 'Sharon' after game show error - BBC
  News
date: '2020-01-04'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-50989594
content: |-
  It was a playful nod to actor Amanda Henderson, whose answer to a game show question went viral.

  Greta Thunberg has changed her name to Sharon on Twitter, in honour of a game show contestant who appeared to have no idea who she was.

  While appearing on BBC's Celebrity Mastermind, actor Amanda Henderson was asked to name the teenage climate activist.

  Looking stumped, Henderson shook her head and guessed: "Sharon."

  A clip of her answer - and host John Humphrys' deadpan response - has been viewed more than five million times.

