title: Joey Barton trial date set over alleged malicious posts - BBC News
date: '2024-08-27'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/ce31w676wpeo
content: |-
  The ex-footballer denies sending malicious communications to football pundit Eni Aluko.

  A trial date has been set for ex-footballer Joey Barton, who is accused of sending malicious communications to football pundit Eni Aluko. Mr Barton, 41, pleaded not guilty at Liverpool Crown Court to a charge of conveying an indecent or offensive message, for the purpose of causing distress or anxiety, between 3 and 8 January, The charge relates to posts on social media site X that were allegedly made from Mr Barton's account about the former Chelsea and England footballer. Recorder of Liverpool Andrew Menary KC said a three-day trial would be held on 19 May next year.

  Mr Barton, wearing a dark checked jacket with a shirt and tie, also spoke to confirm his name and date of birth. The former football manager was granted bail, with a condition not to make any mention of Aluko on any social media. The hearing, which lasted about 10 minutes, dealt with administrative matters ahead of the trial. Aluko scored 33 international goals in 102 appearances for the Lionesses before retiring in 2020 and establishing a broadcasting career. Former Manchester City and Newcastle player Barton, of Widnes, Cheshire, was sacked from his role of manager at Bristol Rovers in October 2023 after almost three years in charge.
