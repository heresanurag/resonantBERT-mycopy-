  Hanef Bhamjee was awarded an OBE for his fight against apartheid.

  Hanef Bhamjee was awarded an OBE for his fight against apartheid

  Tributes have been paid to a life-long anti-apartheid campaigner who has died.

  Hanef Bhamjee, of Cardiff, was born in apartheid-era South Africa and campaigned against its whites-only rule from the age of 10.

  He fled in South Africa for the UK in the 1960s because of his involvement in the student wing of the African National Congress.

  "He was indefatigable in leading and sustaining the anti-apartheid movement in Wales," he told BBC Radio Wales' Sunday Supplement.

  "He had lived in Cardiff for decades having left South Africa in difficult circumstances.

  "He was a legend who led the Wales anti-apartheid movement with great verve and distinction and for everyone involved was regarded as a total legend."

  Senedd member Mick Antoniw said Mr Bhamjee, originally from Marikana, had been in hospital recently having been ill for a number of years.

  "He looked like he was making a recovery but the repeated strains on his body perhaps became too much," he said.

