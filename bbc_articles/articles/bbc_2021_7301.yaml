content: |-
  People have also been advised to minimise travel in and out of the area and avoid meeting indoors.

  Some pubs and restaurant owners in England says their efforts to make up for lost time and money during lockdown are being hampered by booked-in customers not turning up.

  Becky King, general manager of the Anchor Inn in Nayland, Suffolk, says she had about 100 no-shows last weekend.

  The 33-year-old says the pub is now thinking about taking deposits, although they "really don't want to".

  "We are casual dining and we don't want to put that in place, but to protect ourselves and the business, that's something we may have to do," she says.

  What are the Covid rules for restaurants and pubs? Read more here.

  Long-established Suffolk restaurateur Ruth Watson - former star of Channel 5's The Hotel Inspector - says her Italian restaurant Watson and Walpole in Framlingham has been plagued by no-shows.

  They have started to take card details for all bookings and a deposit of £25 for all Friday and Saturday dinner reservations and Sunday lunch.

  "I don't know why people don't take it seriously. If you booked theatre tickets or an airline ticket, you'd get charged," she says.

  You can read about how other business owners are coping with no shows here.
