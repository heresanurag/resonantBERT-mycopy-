content: |-
  Football players from Gloucestershire refused to let Storm Bert stop them from taking the pitch.

  Football players from Lydney Town AFC in Gloucestershire refused to let Storm Bert stop them from taking to the pitch this weekend.

  Footage shows players heading the ball back and forth and swimming in waist-deep floodwaters.

  "Can’t believe I’m saying this... but GAME ON! Teams are out and kick off is imminent," the club wrote, sharing the footage on X.
