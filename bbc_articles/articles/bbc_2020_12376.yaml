  Paul Hunter, a professor of medicine at the University of East Anglia and an adviser to the World Health Organization, also said he believed England would need to return to the tier system after the national lockdown ends.

  "What we need to do is make it more responsive and rapid to changes in the epidemic at the local level... then I think we do have a real opportunity to control the epidemic," he told the programme.

  However, he said he hoped there would be some further relaxation over the Christmas period.

  "Maybe only for a few days but I think providing that we have some rules still in place and we avoid too big gatherings - I do hope that we can manage to have a more normal Christmas than we might otherwise have been expecting," he said.

  It comes a day after Public Health England's Susan Hopkins - who is a member of the government's scientific advisory group (Sage) - said tier one measures had "very little effect" on the spread of the virus.

  Speaking at the government's evening coronavirus briefing on Monday, she said that, prior to the lockdown, the "tiering of the country" had had a "different effect in each area".

  "Tier three plus" had led to a reduction in cases in the North West, she said, while tier two "holds in some areas and not in others", depending on "how well individuals are taking that advice in".

  However, she added: "We see very little effect from tier one and when we look at what tiers may be there in the future, we will have to think about strengthening them to get us through the winter months until the vaccine is available for everyone."

  The UK reported another 21,363 daily Covid cases on Monday, as well as a further 213 deaths within 28 days of a positive test.

  Before England went into its second lockdown this month, nearly a fifth of the population was living in tier three areas.

  They included those in West Yorkshire, South Yorkshire, Greater Manchester, Lancashire, the Liverpool City Region, Warrington and Nottinghamshire.

  Some areas introduced tougher restrictions than others, going beyond the baseline tier three measures.

  For example, betting shops, saunas, tattoo parlours and nail salons were closed in Nottinghamshire.

  Last month, police officers told the Home Affairs Select Committee that the tier system made it harder to enforce coronavirus restrictions because of the nuances that had been "creeping in".
