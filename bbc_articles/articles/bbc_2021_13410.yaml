  A Welsh government spokesperson said: "Alongside engineering works, technology has an important role to play in ensuring the safety of disused coal tips.

  "It's important that all possible means of monitoring tips over the long term are considered, and funding different technology trials helps to ensure we have appropriate approaches in place."

  Richard Pidcock says the data will be key to prioritising work on the tips

  Mr Pidcock, joint managing director at Central Alliance, said it was "fantastic" to see the Welsh government and Coal Authority use cutting-edge technology, which was originally developed by the company Asterra, to "provide reassurance that existing drainage systems are effective and to identify hidden wet areas".

  He added: "As we have seen from recent extreme weather events from around the world, it is vitally important to monitor the impact of climate change, and the GroundSat satellite mapping project will form an important dataset for that assessment."

  Phil Thomas lives near a coal tip in Ynyshir, and said the work needed to be done as soon as possible.

  "I am really pleased to see the Welsh government and local authorities are working together to find out whether these tips are wet or need any kind of work, but it does surprise me it has taken 19 months to get to this point," he said.

  Mr Thomas welcomed the use of new technology, but said this should not replace the use of older technology such as boreholes.

