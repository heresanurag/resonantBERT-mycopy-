title: 'Coal tips: Satellite technology to cut landslide dangers - BBC News'
date: '2021-10-09'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58821164
content: |-
  The answer to making coal tips safer could be out-of-this-world.

  The Tylorstown landslide has left a scar on the hillside

  Satellite technology usually used to find water on other planets could help make Wales' coal tips safe.

  The Welsh government-commissioned project comes after landslides at a tip in Tylorstown, Rhondda Cynon Taf, during Storm Dennis in February 2020.

  Analysis after the slide showed stability problems would be widespread, and affect other tips in south Wales.

  The data will be key to prioritising work on the tips, according to joint project manager Richard Pidcock.

  Due to climate change, Mr Pidcock said it was even more important to monitor the risks.

  In 2020, Rhondda MP Chris Bryant warned it could cost £500m to ensure the safety of more than 2,000 coal tips across Wales.

  The Coal Authority has appointed ground investigation specialists Central Alliance, who will use satellite imagery to analyse soil moisture at coal tips and surrounding areas across 10 local authority areas in south Wales.

  It will assess a large number of high-risk tips, irrespective of ownership.

  Technology used to find water on Mars is being used to assess soil moisture at coal tips

  It is an adaptation of technology used to search for water and life on other planets such as Venus and Mars, and allows users to remotely measure soil moisture levels below ground level and assess risks.

  The first stage starts in October to create a baseline during drier months, and will be followed with a second phase to capture seasonal change in winter early next year.

  The assessment will confirm the effectiveness of existing drainage systems and identify any hidden moisture which could represent a future risk, the project leaders have said.

