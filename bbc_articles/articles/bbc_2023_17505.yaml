title: Elon Musk visits 7 October kibbutz with Israeli PM Netanyahu - BBC News
date: '2023-11-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67542129
content: |-
  The US entrepreneur was shown around a kibbutz in Israel that was attacked on 7 October.

  Israeli Prime Minister Benjamin Netanyahu has given Elon Musk a tour of Kfar Aza, a kibbutz that was attacked by Hamas on 7 October.

  The US entrepreneur is currently on a visit to Israel.
