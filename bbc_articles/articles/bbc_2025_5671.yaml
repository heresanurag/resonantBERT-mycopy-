content: |-
  It grounded flights in Orlando, Miami and Palm Beach after debris concerns from Starship's failed launch.

  SpaceX rocket explodes, raining debris from sky for second time in a row

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: SpaceX rocket spins out of control in test flight failure

  A SpaceX rocket exploded shortly after it was launched from Texas on Thursday, grounding flights and triggering warnings about falling spaceship debris. SpaceX confirmed the un-crewed ship had suffered "a rapid unscheduled disassembly" during its ascent into space, and lost contact with the ground. The massive SpaceX Starship, the largest rocket ever created, spun out of control shortly after its launch. No injuries or damage have been reported but images from those in Caribbean Sea island nations show fiery debris raining from the sky. This was the eighth mission to test the rocket, and its second consecutive failure.

  The spaceship, which measures 123m (403ft) at takeoff, was meant to re-enter Earth's orbit over the Indian Ocean after a one-hour flight. Its Super Heavy booster, which helps it leave the ground, did manage successfully to return to the launchpad. SpaceX, which is owned by billionaire Elon Musk, said teams immediately started co-ordinating with safety officials for "pre-planned contingency responses". The statement added that SpaceX would review data "to better understand [the] root cause" of the misfire and noted the explosion happened after the loss of "several" engines. "As always, success comes from what we learn, and today's flight will offer additional lessons to improve Starship's reliability." The statement says debris should have fallen within a pre-planned area and the rocket did not contain any toxic materials. The company also included an email and phone number for those who believe they've found any remnants of the craft. Musk has yet to comment on Thursday's explosion.

  Debris was seen falling from The Bahamas

  The accident briefly halted flights at several Florida airports, including in Miami and Orlando, over concerns about flaming debris. A statement from the Federal Aviation Administration (FAA) said the flights in and out of airports were delayed due to a "space launch incident". The incident follows a test in January, which saw a Starship rocket fail minutes after launching from SpaceX's Texas facility. The FAA also briefly closed airports two months ago, due to the same concerns about falling debris. After January's incident, the FAA grounded Starship launches and noted the incident had led to property damage in the Turks and Caicos Islands in the Caribbean. "Unfortunately this happened last time too, so we have some practice at this now," SpaceX flight commentator Dan Huot told reporters at the launch site on Thursday. This latest Starship launch was conducted before the FAA finished investigating January's explosion, according to US media reports. A statement issued from the government of the Turks and Caicos said they were in contact with US authorities and SpaceX and would "continue to keep the public apprised as we work to ensure the safety and security of our Islands". Footage posted on X purported to show flaming rocket debris falling over the Caribbean Sea. In the Bahamas, people posted that they were seeking shelter in order to take cover from debris. Starship is the biggest, most powerful rocket ever built, and is key to Musk's ambitions for colonising Mars. SpaceX's Starship spacecraft and Super Heavy rocket - collectively referred to as Starship - is intended to be fully reusable, the company says. Nasa hopes to use a modified version of the spaceship as a human lunar lander for its Artemis missions to return to the Moon. In the more distant future, Musk wants Starship to make long-haul trips to Mars and back - about a nine-month trip each way.
