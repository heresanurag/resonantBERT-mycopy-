title: Wolverhampton house fire leaves two dead and four in hospital - BBC News
date: '2024-05-11'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-68995856
content: |-
  Two men have been arrested on suspicion of murder, West Midlands Police say.

  The two victims of the fire were confirmed dead at the scene

  Two men are being held on suspicion of murder after two women died and four people were taken to hospital following a house fire. Emergency services were called to a house in the Dunstall Hill area of Wolverhampton, just before 02:00 BST. The women, aged in their early 20s, died at the scene, West Midlands Police said. The arrested men, who are aged 19 and 22, are thought to be known to the women, the force said. Three men and a woman are being treated in hospital, with the woman in a critical condition.

  A joint fire and police investigation is under way into the cause of the fire, which left a further four people injured

  West Midlands Fire Service said another person was discharged at the scene by the ambulance service. "Several firefighters wearing breathing apparatus entered the property. Very sadly, the bodies of two people were found inside," a spokesperson said. "The fire was confirmed to have been extinguished shortly before 3am." Officers are working to establish the cause of the fire and a cordon is in place at the scene.

