  Ferjani Sassi celebrated with a prayer after putting the ball past English goalkeeper Jordan Pickford, who touched the ball with his fingertips but could not keep it out.

  Sassi's goal was also the first scored by an African or Arab team at this World Cup, with Tunisia both the fourth African nation to play, after Morocco, Egypt and Nigeria, and the fourth Arab nation, after Saudi Arabia, Morocco and Egypt.

  The match settled into a tense stalemate, with England probing without much success and Tunisia defending stoutly.

  The tension showed on the faces of fans watching back home as England spurned a series of first-half chances and then struggled to create openings in the second half.

  One watching journalist suggested England were "playing like the Arab Spring" - the movement to overthrow dictators and cultivate democracy that began in Tunisia and spread to other countries before largely fading.

