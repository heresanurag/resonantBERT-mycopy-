title: 'World Cup 2018: Kane breaks Tunisian hearts - in pictures - BBC News'
date: '2018-06-19'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-44532627
content: |-
  Supporters in both countries went through highs and lows before England won with a last-minute goal.

  England - whose recent World Cup outings have proved as disappointing as the expectations heaped on the team were high - faced Tunisia in their opening match in Volgograd.

  Could the Three Lions pounce or would they be picked off by the Carthage Eagles?

  Here, in pictures, is the story of that encounter.

  As it turned out it was the bugs who struck first, here seen troubling England's Jesse Lingard during the warm-up.

  The Volgograd air was full of them - a regular occurrence at this time of year. Russian organisers had been spraying the stadium with insecticide for days previously, but to little avail.

  Players and everyone else in the stadium sprayed on repellent to ward the insects off.

