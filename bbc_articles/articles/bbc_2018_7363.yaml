  Anticipation was high, with fans packing out public places in both countries. In Tunisia, some people congregated in the Roman amphitheatre at El Jem, near the city of Sfax.

  The match under way, it was first blood to England, captain Harry Kane tapping in from a corner after 10 minutes.

  But later in the first half Tunisia's Fakhreddine Ben Youssef won a penalty after the referee judged that he had been fouled by Kyle Walker.

  The decision went down badly among English pundits, who raged on social media.

