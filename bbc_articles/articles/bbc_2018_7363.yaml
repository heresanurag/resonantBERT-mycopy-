  Then, in stoppage time after the regulation 90 minutes had already passed, a moment of drama.

  Kane scored his second goal after the ball was flicked on towards him at an England corner.

  Among England fans - including these watching on a beach in the southern town of Brighton - an intense release of emotion and relief.

  For Tunisians meanwhile, dejection and tears.

  As one social media user pointed out, Tunisia had become the the third North African team to lose to a last-minute goal. "It's too much," he wrote.

  For England's Kane however, victory was "no less than we deserved".

