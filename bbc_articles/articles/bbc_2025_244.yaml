title: Baby dies after Grantham A1 crash in icy conditions - BBC News
date: '2025-01-03'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/c3vr49kk5d9o
content: |-
  The seven-month-old died in hospital after a car hit a tree near Grantham on Thursday night.

  The crash happened on the southbound A1 near Grantham

  A seven-month-old baby has died after a crash on the A1 as officers investigate whether the incident was linked to icy conditions. The baby boy suffered serious injuries when the vehicle left the dual carriageway and struck a tree near Grantham, Lincolnshire, at 22:50 GMT on Thursday. He was taken to hospital but died just after 05:00 on Friday. A woman who was travelling in the Honda Jazz also suffered serious injuries when the car crashed about 500 yards from the Spittlegate junction. The southbound carriageway remains closed while investigations take place.

  Diversions have been put in place while investigations are carried out

  Lincolnshire Police said two other people were in the vehicle and were not seriously hurt. The force said it was keeping an "open mind" over the cause of the collision but said it could be linked to icy conditions in the area. Met Office records show temperatures had fallen to around -2C (28F) at the time of the crash. The family of the boy is being supported by specially-trained officers. Alicia Kearns, the Conservative MP for Rutland and Stamford, said the incident was "heart-breaking" and said her "heart goes out to the family and loved ones at this impossible time". Lincolnshire Police said it was keen to speak to anyone who may have been driving in the area at the time of the incident or over the past few days. Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
