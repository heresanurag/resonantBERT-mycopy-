title: US lifts weapons ban on Ukraine's Azov brigade - BBC News
date: '2024-06-11'
section: Europe
url: http://www.bbc.co.uk/news/articles/c1vv6p9k1z1o
content: |-
  The brigade, whose origins were mired in far-right controversy, hails the move as blow to Russia's propaganda.

  The Azov brigade is seen as one of Ukraine's most effective fighting units

  The US has lifted its long-standing ban on weapons supplies and training to Ukraine's Azov brigade, whose origins were mired in controversy over alleged links to far-right groups. A state department spokesman told the BBC a vetting process "found no evidence of gross violations of human rights" by the brigade. The Azov brigade, now a unit within Ukraine's National Guard, hailed the move, saying Russia's "lies... received a devastating blow". Moscow condemned the decision, with Kremlin spokesman Dmitry Peskov saying the US was "even prepared to flirt with neo-Nazis" to suppress Russia. Russian President Vladimir Putin has repeatedly made false claims about a "neo-Nazi regime" in Kyiv to try to justify first the annexation of Ukraine's southern Crimea peninsula and backing of pro-Moscow fighters in the east in 2014, and then his full-scale invasion launched in 2022.
