title: 'Brexit: EU''s Donald Tusk on ''special place in hell'' - BBC News'
date: '2019-02-06'
section: General
url: http://www.bbc.co.uk/news/uk-politics-47144819
content: |-
  The European Council president says he has been "wondering what a special place in hell looks like for those who proposed Brexit without a sketch of a plan"

  Donald Tusk has told a press conference that he has been "wondering what a special place in hell looks like for those who proposed Brexit without a sketch of a plan".

  The President of the European Council also said he was prepared for the "possible fiasco" of a no-deal Brexit
