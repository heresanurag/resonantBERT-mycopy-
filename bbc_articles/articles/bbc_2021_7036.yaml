title: Five in court over fatal Gucci bag robbery in Newport - BBC News
date: '2021-06-14'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57465896
content: |-
  Ryan O'Connor was killed on a south Wales estate and three men and two boys are accused of murder.

  Ryan O'Connor was described as a loving and caring person by his family

  Three men and two boys have appeared in court charged with murdering a man and robbing him of a Gucci bag.

  Ryan O'Connor, 26, died after being found unconscious and unresponsive in Balfe Road in the Alway area of Newport on Thursday at about 21:00 BST.

  Lewis Aquilina, Elliot Fiteni, both 19, and Ethan Strickland, 18, all from Cardiff, appeared in front of Newport Magistrates Court on Monday.

  Two 17-year-old boys also appeared and are accused of murder and robbery.

  Floral tributes were left at the scene

  The court heard the defendants were charged with murdering Mr O'Connor on 10 June and robbing him of a Gucci bag "of a value unknown".

  They were remanded in custody and will appear before Newport Crown Court on Tuesday.

  His brother Johnny said Mr O'Connor, who was known as 'Apple', had a "heart of gold" and was well known on the Alway estate.

  Ryan O'Connor "left us far too soon", his family said

  Mr O'Connor's family issued a statement describing him as a loving and caring person.

  "He has left us far too soon, and he will be greatly missed by all of us," it said.

  "He was loved by his family and the local community, which is reflected in the support that we've received from them at this difficult time for our family.

  "The whole family would like to thank everyone for the kindness they have shown us so far.

  "We would urge anyone with information to work with the police and assist their investigation in any way they can."

  Ryan O'Connor was found dead on Thursday night in Newport's Balfe Road

  Gwent Police are appealing for more information and said they will maintain a "presence in the area".

  "We will continue to be visible over the coming days and our local police patrols will remain in place," Chief Supt Tom Harding said.

  Mr O'Connor was found on the busy road - just off Newport's main Southern Distributor Road - unconscious and unresponsive on Thursday evening.

  Paramedics from the Welsh Ambulance Service later confirmed he had died and police said his family is receiving support from specialist officers.
