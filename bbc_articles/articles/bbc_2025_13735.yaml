title: Family of Cole Cooper 'shattered' after police find body - BBC News
date: '2025-06-09'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/cg4vwwyw7z9o
content: |-
  Officers notified relatives after a body was found in Banknock, near Falkirk, on Friday, four weeks after his disappearance.

  Cole Cooper was last seen alive in the Banknock area in early May

  The family of teenager Cole Cooper, who was missing for four weeks, have said their "worst fears have become reality" after the discovery of a body. Police notified the 19-year-old's relatives after the body was found in a wooded area near Cole's home village of Banknock, Falkirk, on Friday afternoon. In a statement Cole's family, who had planned a fresh search for Sunday, said they were "completely broken" following the news. They thanked all those who had supported them and joined searches for Cole, and said they were left with many unanswered questions.

  In a post on social media, Cole's aunt Aimee Tennie said: "With shattered hearts, we share the devastating news that our beloved Cole, who was missing, has been found, but not in the way we hoped or prayed for. "We never gave up, and we will never give up—not until we have the answers. The fight for truth, for justice, and for Cole is not over. "Cole, you were our world and now our world will never be the same. "Your life was only just beginning. The world didn't get to know the light you carried, but we did and we will carry it with us, always." She added the family intend to hold a vigil for the teenager, with details to be announced soon.

  Specialist search teams had been looking for Cole

  Cole was reported missing on Friday 9 May. Detectives previously said they had a confirmed witness sighting of him at about 20:45 on 7 May in the nearby village of Longcroft, near Banknock. Prior to that he had been captured on CCTV at several locations in Longcroft, in the early hours of Sunday 4 May, after he had left a party in Denny. Police spoke to almost 400 residents through door-to-door inquiries and more than 2,000 hours of CCTV have been seized. Officers earlier said that numerous potential sightings, images and other possible lines of inquiry had been passed directly to the investigation team since a dedicated online information portal was set up.

  3 May: Cole is on a night out with friends in Denny 4 May: He leaves a party in Denny just before 05:00 in the morning. He was seen on CCTV approaching the door of his father's house in Mayfield Road, Longcroft, at 05:49 before leaving four minutes later. He was then captured on CCTV at various other locations in Longcroft. The last footage of Cole was at around 06:00 on Cumbernauld Road. 7 May: A witness told police they spoke to Cole at around 20:45 on the A803 Glasgow Road, at the Intersection with Cumbernauld Road, Longcroft. 6 June: Officers confirm the family have been notified after a body was found
