id: bbc_2018_15222
title: Poland climate summit protest limits anger young activists - BBC News
date: '2018-12-12'
section: General
url: http://www.bbc.co.uk/news/science-environment-46516019
content: |-
  Protesters are frustrated by strict controls on protests at the UN climate summit in Poland.

  With 30 minute slots, allocated areas, volume limits and guidance on the wording of signs, protests inside the UN climate summit in Poland are strictly controlled.

  Meanwhile, spontaneous outdoor demonstrations in the host city of Katowice are banned during the talks.

  Two young activists at COP24 shared their frustrations.
