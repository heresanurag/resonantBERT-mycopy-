title: '''Proud'' 20,000 bikers finish Dave Myers Barrow tribute ride - BBC News'
date: '2024-06-09'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/c722j5gp65jo
content: |-
  A procession made up of thousands of motorcycles arrives in the Hairy Biker's Cumbrian home town.

  This video can not be played To play this video you need to enable JavaScript in your browser. The bikers roared into Barrow-in-Furness as they finished the ride

  Thousands of motorcyclists have arrived at the end of a mammoth ride from London to Cumbria to celebrate the life of Hairy Biker Dave Myers. The TV chef died in February, at the age of 66, after he was diagnosed with cancer. 'Dave Day' has seen a huge remembrance procession of bikers journeying from the capital to Myer's coastal home town of Barrow-in-Furness. Organisers said some 20,000 people joined the ride up the country - with the distance between the first and last biker spanning about 25km (16 miles). Fellow Hairy Biker Si King addressed the crowds waiting to greet the bikers and said: "Thank you. You’ve made David Myers very proud." His words drew cheers, and Myers' widow Lili said: "Dave was always a Barrovian in his heart, he loved Barrow and he wanted to put Barrow on the map. "And today, beyond his grave, he’s done it again."

  Thousands of bikers joined the Hairy Bikers' Si King to pay tribute to Dave Myers

  Si King told the crowd: "We've all been in tears, not one dry eye"

  Crowds of the bikers gathered at the end of the ride in Barrow

  The procession began to arrive from about 16:00 BST, waved on by thousands of people, external, and continued to stream into the town into the evening. One onlooker, Marie, who watched the procession from a bridge near Burton services, around 40 miles from the finish point, said: "The atmosphere was lovely, warm and quite emotional to see so many bikers. "We were pleased to wave them in and welcome them to our beautiful county of Cumbria." Organisers said the service station was closed due to the sheer number of travellers. The procession had planned to stop there for a break but instead drove straight on towards Barrow. Another onlooker said it was an "utterly extraordinary sight" and "it took about an hour-and-a-half for the bikes to pass us from the first of the group to the last".

  Si King (left) took part in the ride for his friend and TV partner

  As the riders set off on Saturday morning, fellow Hairy Biker Si King described it as "amazing" and a "celebration of the best friend that I've lost". Many of those who gathered at the start point, the Ace Cafe in north London, were wearing Hawaiian shirts. King said of the crowd: "Everybody's got that lovely Dave sartorial elegance about them, ie dodgy shirt. "Some of them have had them specially printed, it's remarkable."

  He added: "You never know how these things are going to impact you. It is a celebration of Dave's life. "That's why we're here, because he was so irritatingly positive all of the time. And we love him and that's why we're here." Before the event, Mrs Myers said: "We have people coming from all over the country. We have people coming from Texas, from Malaysia, from all over Europe. "Oh, it's endearing. It just helps me go through my process of grief because it just makes me feel that I'm not on my own with all this.

