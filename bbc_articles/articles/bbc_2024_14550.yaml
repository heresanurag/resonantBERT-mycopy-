  One of the stop-offs was at the National Motorbike Museum in Solihull

  Jason Woodcock, who organised Dave Day, said the idea arose at Myers' funeral, for which Lili had asked him to "get a couple of bikes together". "They got to the funeral, had a few beers as you would do, and then the idea came up during the conversation of let's do a memorial ride."

  People gathered along the route to cheer on the procession

  As the crowds in Barrow waited for the procession to reach them, celebrations centred around the Town Hall, external with performances, stalls by local vendors who have worked with the Hairy Bikers on various projects, and a service of remembrance. The event was also raising money for NSPCC Childline and The Institute of Cancer Research, with donations being split evenly between the two charities, organisers said.

  The route of the memorial ride with planned stop-offs

  In the run-up to the day, staff and students from Greengate Junior School in Barrow dressed up as Myers. Those who took part sported fake beards and moustaches, as well as a waistcoat similar to the one the chef wore. Dylan, 10, said the moustache felt itchy, while teacher Stephen Leigh said Myers was a Barrovian treasure. "Any sort of focus on the positives of Barrow is really, really good. And it's a marvellous place," he added.

  Students and staff at Greengate Junior School in Barrow dressed up as Dave Myers for their Dave Day celebrations

  People have travelled from all over the world to take part in the event. Dawn Mayers, who is originally from Fleetwood near Blackpool, lives in Malaysia for the most of the year. She decided to come back to the UK especially for the celebration. "Dave died when we were in Malaysia, so we decided to light a candle for him at a local Buddhist temple. "We've watched every episode [of the Hairy Bikers], we have every cookbook," she said. Ms Mayers arrived in Barrow on Friday and said the atmosphere was electric.

  Dawn Mayers has flown from Malaysia to take part in Dave Day

  Keni Carrington, 70, travelled from France on Friday and is riding the entire route to Barrow from the Ace Cafe. Ms Carrington's husband of 35 years, Chris, who was also a biker, died last June following a cancer diagnosis. "Chris was my soulmate and he would love to have done this ride for Dave Myers," she said.

  Keni Carrington has travelled from France and is riding in memory of her late husband, Chris

  Meanwhile, riders struggling for somewhere to stay were helped out by local residents offering their spare rooms, caravans, and even their backyards. Tim Walker offered up his garden in Askam-in-Furness for people to camp out in. "We thought, well, we've got plenty of room [in the garden]. Got some tents and some spare rooms," he said. Mr Walker and his wife are also planning to serve breakfast to their eight guests. He did not want people to pay to stay on his property and asked people to "put a donation in the bucket" instead.

  Tim Walker offered up his garden in Askam-in-Furness for people to camp out in

  Barrow Town councillor Dani Petrova said of Myers: "He was just a normal guy from Barrow doing us all proud. She added she was "absolutely gobsmacked" at the reaction to Dave Day. "The people of Barrow are what makes Barrow beautiful and Dave was one of us."
