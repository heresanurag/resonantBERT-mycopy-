title: Two people in critical condition after arson attack - BBC News
date: '2025-02-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c4gx7d14k82o
content: |-
  Two children were also rescued from the property after a suspected arson attack in Dungannon, County Tyrone.

  Two people in critical condition after arson attack

  This video can not be played To play this video you need to enable JavaScript in your browser. Police officers rescued a man and a women, along with two children from the house

  Two people are in a critical condition following a fire at a house in Dungannon, County Tyrone. Police officers rescued a man aged 37 and 70-year-old woman along with two children, aged seven and 10, from the house in Cunninghams Lane on Monday night. The children are in a stable condition. A 21-year-old man and 15-year-old boy have been arrested on suspicion of arson with intent to endanger life. The 21-year-old was arrested after being found on the roof of the house.

  Deputy Chief Constable Bobby Singleton said police are not currently treating the incident as a hate crime.

  The fire was started deliberately, police said

  Eight Police Service of Northern Ireland (PSNI) officers were treated in hospital for the effects of smoke inhalation but were later discharged. Speaking on Tuesday afternoon, Dep Ch Cons Singleton praised the officers' bravery, and said were it not for their actions, lives would have been lost. He added the fire was started deliberately. "It's hard to comprehend the mindless cruelty of this act, and the panic and fear caused to those in the home," he said.

  Deputy Chief Constable Bobby Singleton praised the officers who helped rescue the victims of Monday's arson attack

  He confirmed that officers responded to a report of children trapped in a house just after 20:30 GMT on Monday. Police were the first emergency responders on site, at which point the fire was well alight, he added. Two ladders were then obtained from nearby properties, and officers rescued two adults and two children, including an unresponsive 70-year-old woman. "The adults remain in a critical condition in hospital today, while the children, thankfully, as we understand are presenting in a stable condition," Dep Ch Cons Singleton said. He said he was aware of images and videos of the incident circulating online, and urged people not to share them.

  "It's hard to comprehend the mindless cruelty of this act," says Deputy Chief Constable Bobby Singleton

  Earlier, Supt Peter Stevenson said their thoughts are with those who remain in hospital. "We want to thank the residents of Cunninghams Lane for their assistance with this terrible incident, which was undoubtedly traumatic for all involved," he added. "The community will continue to see the presence of the emergency services in the area, as we proceed with our investigation into the cause of this fire."

  Cadalia Freitas, who lives in the area, rang emergency services when the alarm was raised

  Cadalia Freitas was in her home nearby when her brother, who had left to go to work, raised the alarm. She called the police before rushing to the house, where Ms Freitas heard children crying for help. Police arrived soon after. She directed an officer with a ladder to the window, who helped rescue them. Ms Freitas said she was "scared" and "traumatised" after witnessing the incident, and struggled to sleep as she smoke in the area made her cough.

  Police said the "terrible incident was undoubtedly traumatic for all involved"

  David Thompson, principal of Dungannon Primary School, told BBC News NI that the two children attended his school. "We just think of the trauma that those children have gone through," he said. "As a school community we want to get the message out there that we will be with those families to help and support them." A police cordon remains in place as officers work alongside the Fire Service to establish the cause of the fire.

  There was still the smell of smoke in the air on Tuesday morning in the Cunninghams Lane area of Dungannon. In the cold light of day, the full extent of the damage caused by the house fire could be seen. Black scorch marks were etched on to the exterior walls and there was a broken upstairs window, with a ladder still perched on it. It was used to rescue those inside. The local primary school is just around the corner. Dozens of school children walked past the fire cordon.

  Councillor Clement Cuthbertson praised the bravery of the police officers

  Democratic Unionist Party councillor Clement Cuthbertson said: "There were a number of videos of the fire on social media, and to be honest they were horrific. He praised the brave actions of the police officers who managed to get the people out of the house before the fire brigade arrived. Sinn Féin councillor Deirdre Varsani said she hoped that everyone caught up in the blaze was now safe.

  The Northern Ireland Ambulance Service said it despatched six emergency crews, one hazardous response team, two paramedics and an ambulance officer. Following assessment and initial treatment at the scene, 12 patients were taken, by ambulance, to Craigavon Area Hospital.
