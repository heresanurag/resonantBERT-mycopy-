title: '''Attack on democracy'' - Slovak President Caputova - BBC News'
date: '2024-05-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-69017195
content: |-
  Slovakia's outgoing president expressed shock after the shooting of PM Robert Fico.

  Slovak President Zuzana Caputova has staid that the shooting Prime Minister Robert Fico is an "attack on democracy".

  "I am shocked, we are all shocked... The hateful rhetoric we witness in society leads to hateful acts. Please, let's stop it," she told reporters.

  She also confirmed that police have detained the attacker and that officials will be providing more information "as soon as possible".
