title: 'Emma Raducanu: US Open champion ''outstanding'', says the Queen - BBC Sport'
date: '2021-09-12'
section: General
url: http://www.bbc.co.uk/sport/tennis/58533034
content: |-
  The Queen leads the congratulations to Emma Raducanu after the 18-year-old Briton clinches the US Open title with victory against Leylah Fernandez.

  Last updated on .From the section Tennis

  The Queen led the congratulations to Emma Raducanu after the 18-year-old clinched the US Open title with a stunning victory in New York.

  "I send my congratulations to you on your success," the Queen said.

  "It is a remarkable achievement at such a young age, and is testament to your hard work and dedication."
