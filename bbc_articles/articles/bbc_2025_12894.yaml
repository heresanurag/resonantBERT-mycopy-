  Reform UK Warwickshire said the party would not be "distracted" by the resignation and it was "getting on with the job". "We're already exploring how we can implement our Pothole Renewal Plan for the county to fill the 6,500 potholes we inherited from the Conservatives, introduce an apprenticeship programme to kickstart careers, and improve provisions for children with SEND," a spokesperson said. Finch, councillor for Bedworth Central, was a member of the Conservative Party for three months before switching to Reform on the grounds that it would better tackle illegal immigration. On the New Reformer website, he said his politics could be summed up as "Brexit, sovereignty and a strong and united family unit".

