title: Warwickshire Reform County Council leader resigns, leaving 18-year-old in charge
  - BBC News
date: '2025-06-26'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/c93knke95peo
content: |-
  Rob Howard leaves his position as leader of Warwickshire County Council, citing health concerns.

  The recently elected leader of Warwickshire County Council has resigned, leaving his 18-year-old deputy in charge. Reform UK councillor Rob Howard, who was in power for 41 days, said he had made the decision with "much regret", citing health reasons were behind his departure. Howard, was elected in May, when Reform made unprecedented gains in the local elections, becoming the largest party in Warwickshire and forming a minority administration. George Finch, his deputy, is to serve as interim leader until a new council leader has been chosen, with the teenager not ruling out running for the top job permanently.

  Announcing his departure, the outgoing leader said: "The role of leader is an extremely demanding role and regretfully my health challenges now prevent me from carrying out the role to the level and standard that I would wish."

  In a statement acknowledging the news, Finch confirmed there would be a leadership election in the next week. "We want to make sure the election process is fair and candidates are competing on a level playing field. Let's see where we are in a week's time," he added. The 18-year-old said he would ensure the council was in "steady hands" until then and the party's mission "remained unchanged". Asked if he would be interested in becoming the new council leader, he said: "I haven't given it thought yet. It has been less than 24 hours and we have a lot to do. "I am still doing the job as leader until we elect a new one, the job is still being done and needs to be done so it is business as usual until we elect a new leader."

  Rob Howard said health issues were the reason for his resignation

  Rachel Taylor, Labour MP for North Warwickshire and Bedworth, said Howard's resignation would be a "real concern" for her constituents. "We desperately need a functioning council to fill in potholes, deliver our care services and end the crisis in SEND education," she said. Taylor added there had been questions about how well the Reform administration had been functioning since the local election. "[The questions are] not helped by the council leader missing the first meeting to take a holiday to the Dominican Republic or telling the local paper his council didn't have any specific policies," Taylor said. She wished Howard well and urged Reform councillors to elect a new leader "as quickly as possible", so the authority could "start governing effectively in the interest of Warwickshire residents".

  Speaking to the BBC earlier this month, Howard had stressed he was "not intimidated" by the challenge of running a local authority with £1.5bn of assets and a revenue budget of about £500m. Despite resigning the top job with immediate effect, Howard confirmed he would be staying on as a county councillor. "I am honoured and privileged to have held the role, even if only for a short time. I remain committed to my continued role working as a county councillor for the benefit of Warwickshire residents," he said.

