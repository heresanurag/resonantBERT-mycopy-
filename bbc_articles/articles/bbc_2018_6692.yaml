  Hands-on with Super Smash Bros Ultimate and two of its new characters at the E3 games expo

  Nintendo's Super Smash Bros Ultimate will be one of its Switch console's biggest ever releases when it goes on sale later this year.

  The BBC's Chris Foxx got an early hands-on at the E3 games expo in Los Angeles.

  Read and watch all our coverage from E3 at bbc.co.uk/e3
