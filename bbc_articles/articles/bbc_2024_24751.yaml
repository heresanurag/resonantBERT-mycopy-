content: |-
  This video can not be played To play this video you need to enable JavaScript in your browser. WXV 2: Wales avoid relegation with first win of WXV against Japan

  Wales ran out comfortable winners against Japan to salvage some pride in their WXV2 campaign. With the threat of relegation hanging over both sides, Wales for the most part outclassed their opponents, who will drop into WXV3 when the competition resumes in 2026. Nel Metcalfe, Keira Bevan and Jasmine Joyce ran in the tries for Wales as Japan looked a shadow of the side seen in the previous two rounds. But they finished with a flurry, with Misaki Matsumura and Ayasa Otsuka scoring late tries.

  It was far from a perfect performance from Wales, but brings a positive end to a disappointing 2024 in which they won only four from 11 Tests. It also relieves some of the pressure on head coach Ioan Cunningham before a Rugby World Cup year. Japan, meanwhile, continue the longest winless run in their 33-year Test history, with the Sakura Fifteens having failed to win in their last seven outings.

  Springbok legend Siya Kolisi was a surprise visitor to Wales' camp in Cape Town this week. The inspirational World Cup-winning captain told the players to believe in themselves and that belief was evident from the onset. Wales absorbed some early Japan possession before striking on their first visit to the 22. It was an opportunist try from wing Metcalfe, who has been one of Wales' standout players in an otherwise disappointing campaign. Metcalfe saw the pass out to her opposite number Matsumura was slow and was able to charge down a poor clearance kick before dotting down. Wales were back in again shortly after, and it was just reward for some innovative play between the loose forwards. Alex Callender, Alisha Butchers and Bethan Lewis combined beautifully before releasing Bevan, who had a clear run to the posts. Wales continued to pile on the pressure with Kayleigh Powell pulling the strings at 10 in place of the injured Lleucu George. They played with an unpredictability, with Sisilia Tuipulotu running off line-out ball instead of Wales' usual driving maul. It set up a series of pick and goes as Wales edged ever close to the line. Lewis deservedly crashed over on the week she celebrated her 50th cap for Wales, but her effort was later chalked off when Natalia John was shown to have tackled a Japanese player off the ball in the build-up. Wales went in at half-time with a healthy 12-0 lead but Japan came out strongly after the break, showing good hands as they went through the phases.

  They were within a metre of the line, until the pass out wide was read perfectly by last defender Joyce, with the GB sevens star uncatchable as she bolted 100 metres down the field. Butchers, who had been lively all afternoon, came close to adding a bonus-point try with a strong running line, but she was hacked down agonisingly short. Japan continued to tackle their hearts out as handling errors starting to creep into Wales' game, and they got their just rewards with the two final scores. A kick through caught the defence off-guard and simple hands put Matsumura over in the corner. Wales were then reduced to 14 players after Hannah Bluck was shown a yellow card for a high tackle. It allowed Japan space and Otsuka ran in unopposed to make the scoreline more respectable, but Wales looked comfortable in seeing out the game.

  Wales head coach Ioan Cunningham said: "We're delighted to get the win. Japan are a great side who are well coached but I'm full of pride for our players at how they have stuck in there. "I thought defensively we were great and we dug in to get the win." Wales captain Hannah Jones said: "It is brilliant to get the win. The girls have worked extremely hard for this and we're glad we ended on a high. "We had more composure in the [red] zone this week which we worked hard on, and that was outstanding. "We are working hard each week."
