  Watch Christian Fraser talk to journalists in the BBC's Washington DC newsroom on election night.

  Christian Fraser is in the BBC's Washington DC newsroom on election night.

  He's finding out how journalists there verify information when they cover the midterms; and how and when they work out when to call the results.
