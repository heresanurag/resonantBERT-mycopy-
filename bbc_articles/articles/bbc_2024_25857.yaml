title: Australian teen denies murdering British mum Emma Lovell - BBC News
date: '2024-10-21'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/c0m0dd92107o
content: |-
  Emma Lovell, 41, was fatally stabbed during the break-in at her Brisbane home, a court hears.

  Emma Lovell and her husband Lee confronted two teenagers who entered their Brisbane home, a court has heard

  A second teenager accused over the killing of a British woman during a break-in at her home in Australia has denied murder. Emma Lovell, 41, was stabbed when allegedly confronting two intruders in Brisbane on Boxing Day in 2022. Another teenager admitted murder earlier this year and was jailed for 14 years. The judge-only trial heard it had been accepted the second defendant, aged 17 at the time of the attack, did not commit any of the violent acts himself, ABC in Australia reports., external

  Mrs Lovell was killed in the attack on Boxing Day 2022

  Mother-of-two Mrs Lovell emigrated from Ipswich in 2011 with her daughters and her husband Lee, who was also injured in the attack. In the latest trial, the youth, who cannot be named for legal reasons, also pleaded not guilty to armed break-in as well as malicious acts and assault occasioning bodily harm on Mr Lovell, who was kicked and then stabbed in the back, according to Nine news, external. Justice Michael Copley will have to consider whether there was a common purpose to cause harm, the court was told.

