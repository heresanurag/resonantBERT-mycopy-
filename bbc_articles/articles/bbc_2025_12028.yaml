  "I don't care what she said," Trump told reporters when asked about her earlier comments before Congress. "I think they were very close to having a weapon." She later accused the media of taking her comments out of context, telling CNN that she was on "the same page" as Trump. Gabbard was not alone among Republicans in criticising potential US involvement in the conflict. On Tuesday, conservative Republican congressman Thomas Massie of Kentucky sided with Democrats to introduce a bill that would block Trump from engaging US forces in "unauthorised hostilities" with Iran without congressional approval. "This is not our war. Even if it were, Congress must decide such matters according to our Constitution," Massie posted on X. Several proponents of Trump's "America First" doctrine pointed out that he vowed to keep the US out of "forever wars" such as those that led to the deaths of thousands of US troops in Afghanistan and Iraq.
