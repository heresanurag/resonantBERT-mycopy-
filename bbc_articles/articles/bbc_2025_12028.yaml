  Kentucky Senator Mitch McConnell said it had "been kind of a bad week for the isolationists" in the party. "What's happening here is some of the isolationist movement led by Tucker Carlson and Steve Bannon are distressed we may be helping the Israelis defeat the Iranians," McConnell told CNN. Other warhawks in the party are egging on Trump to target Iran. South Carolina Senator Lindsey Graham said it was in the national security interests of the US to prevent Iran from obtaining a nuclear bomb. Tehran maintains its nuclear programme is for peaceful, civilian purposes such as energy. "President Trump understands the threat the ayatollah [Iran's Supreme Leader Ali Khamenei] presents to us, not just Israel, and that he will, at the end of the day, help Israel finish the job," Graham told Fox News. Vice-President JD Vance, seeking to bridge the divide, said in a social media post that Trump "may decide he needs to take further action to end Iranian enrichment". "That decision ultimately belongs to the president," he added. "And of course, people are right to be worried about foreign entanglement after the last 25 years of idiotic foreign policy." An opinion poll in recent days indicates Trump voters would broadly support the US in helping Israel to attack Iran. The survey by Gray House found that 79% of respondents would back the US providing offensive weapons for Israel to strike Iranian military targets. Some 89% were concerned about Iran obtaining atomic bombs. On Trump's Truth Social social media platform, however, many expressed concern that the US could again find itself embroiled in a Middle Eastern conflict thousands of miles away. "No war with Iran. No more foreign wars," one user wrote. "America first!" Another user warned that US involvement in Israeli operations could cost the Republicans politically in the years ahead. "Don't do this," the user wrote. "Republicans will never win again if you do this." While campaigning for the White House in September, Trump said: "We will quickly restore stability in the Middle East. And we will return the world to peace." With the Iran-Israel conflict on a knife-edge, the question of whether the US president is an isolationist or an interventionist may be answered sooner rather than later.
