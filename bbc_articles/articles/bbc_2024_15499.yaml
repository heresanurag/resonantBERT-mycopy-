content: |-
  Seven-year-old William Brown died at the scene of the collision on the A259 Sandgate Esplanade.

  Driver who left boy in road after crash sentenced

  William Brown died at the scene of the crash in Folkestone

  A driver who hit a seven-year-old boy in his van and left the scene of the crash has been given a suspended sentence at Folkestone Magistrates’ Court. William Brown died in Folkestone on 6 December 2023 after being struck by the van on the A259 Sandgate Esplanade, throwing him into the path of another car. Stewart Powell, 49, of Dunstall Gardens, St Mary’s Bay, pleaded guilty to failing to stop following a collision and driving without valid insurance at an earlier hearing. He was sentenced to 14 weeks' imprisonment suspended for 12 months and a curfew.

  Prosecutor Julie Farbrace said Powell drove a short distance after hitting William and saw CPR being carried out on the boy as he he lay in the road. She said Powell fled the scene as he "panicked". The court heard Powell called 999 the following day and told officers the incident had "stressed me out", as he described how William ran in front of him.

  William's mother, Laura Brown, read out a statement in court that said he left her son in the road "like an animal" and said he "deserved better". She said: "Stewart stood watching the whole catastrophic incident unfold. He made a conscious decision to get back into his van and leave him. That behaviour is simply inhumane." The boy's father, William Brown Snr, said: "It was cowardly not to stop and keep driving." But he said: "I know William would forgive Stewart.... I forgive you Stewart. I give your family peace and restoration." Mr Brown said his son should not have been in the road and the accident "could have happened to anyone". He added: "I hope we can all consider road safety a priority moving forward...so William's life is not wasted."

  In mitigation, Adrienne Wright said the incident was out of character for Powell and he had "sheer panic" over not being to handle what was happening. She said: "Not a moment passes that he does not regret his decision." District judge Claire Loxford, sentencing, said: "Your punishment will go far beyond the sentence I impose on you this morning. "By leaving the scene you denied police the opportunity to investigate other offences, having accepted being a cannabis user at the time, and having used cannabis that day."
