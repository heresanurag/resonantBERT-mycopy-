content: |-
  New Zealand-born MP Sir Paul Beresford struggles to understand a question from the SNP's David Linden.

  New Zealand-born Conservative MP Sir Paul Beresford struggles to understand a question from the SNP's David Linden.

  After two attempts, and a request to speak more slowly, Deputy Speaker Sir Lindsay Hoyle stepped in and suggested they resolve the issue by letter.
