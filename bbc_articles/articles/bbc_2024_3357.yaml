title: Watch Yulia Navalnaya speak following report of husband Alexei's death - BBC
  News
date: '2024-02-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-68319500
content: |-
  Yulia Navalnaya tells a conference in Munich she doesn't know whether the "horrible news" is true.

  Jailed Russian opposition politician Alexei Navalny is dead, the prison service of the region where he had been serving his sentence says.

  An outspoken critic of President Putin, he had been jailed since 2021 on charges widely viewed as politically motivated.

  Shortly after his death was announced, his wife Yulia Navalnaya said the news so far only came from state sources.

  "We can't really believe Putin and his government," she told the Munich Security Conference in Germany.

  She then added that if news of her husband's death is true, Putin and his allies should bear personal responsibility for it and everything "they are doing to Russia".

  "I am asking everyone who is here to unite and help punish the Russian regime," she said.
