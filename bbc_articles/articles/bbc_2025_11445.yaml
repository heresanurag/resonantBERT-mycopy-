title: 'Brian Wilson: Paul McCartney, Bob Dylan and more pay tribute to Beach Boys
  ''genius'' - BBC News'
date: '2025-06-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/cg71xrxrn8go
content: |-
  Sir Paul joins Wilson's surviving bandmates, Sir Elton John and Bob Dylan in paying tribute.

  Sir Paul McCartney described Wilson as a "musical genius" in a tribute on social media

  Sir Paul McCartney has paid tribute to legendary Beach Boys frontman Brian Wilson, as a legion of stars hailed the singer and songwriter's legacy following his death at the age of 82. Wilson "had that mysterious sense of musical genius that made his songs so achingly special", the Beatles musician said in a statement on Instagram. "I loved him, and was privileged to be around his bright shining light for a little while," wrote Sir Paul, who had a friendly rivalry with Wilson in the 1960s. Sir Elton John, Bob Dylan and former Beach Boys bandmate Mike Love all also described Wilson as a genius.

  Love said his "musical gifts were unmatched" and had "changed the course of music forever". Speaking to BBC Radio 4's Today, fellow band memeber Al Jardine said: "He was a humble musical giant, and his huge musical intellect was apparent quite early on. At the same, time, he didn't need or want attention, was only interested in making the best possible music." Jardine added Wilson should be remembered "as a real gentleman, a real musical intellect, who taught the world how to smile".

  To play this video you need to enable JavaScript in your browser. This video can not be played Interview from 2011: How music takes Brian Wilson back to the 1960s

  In his tribute, Sir Paul added: "The notes he heard in his head and passed to us were simple and brilliant at the same time. How we will continue without Brian Wilson, 'God Only Knows'. Thank you, Brian."
  • None Listen on BBC Sounds: Brian Wilson at the BBC Dylan said: "Heard the sad news about Brian today and thought about all the years I've been listening to him and admiring his genius. Rest in peace dear Brian". Sir Elton described him as a "true giant" who had the "biggest influence" on his songwriting. "He was a musical genius and revolutionary. He changed the goalposts when it came to writing songs and shaped music forever." The Who's Roger Daltrey told BBC News: "Brian managed to write songs that took music into the realms of heaven. His harmonies and his melodies always contain so much joy. And he was such a lovely guy."

  Singer-songwriter Carole King described Wilson as "my friend and my brother in songwriting", adding: "The world will miss Brian, but we are so lucky to have his music." The Velvet Underground's John Cale said: "To me, Brian Wilson was not merely about surf music, rather a true musical genius toiling away at melding POP into startling sophistication. He will he be missed mightily." Announcing Wilson's death on Wednesday, his family said they were "heartbroken" and "at a loss for words". Their statement did not give a cause. The Beach Boys were one of America's biggest bands, whose success rivalled the Beatles in the 1960s.

  Born in 1942 and raised in Hawthorne, California, Wilson formed a group with his younger brothers Carl and Dennis, cousin Love and friend Jardine. They went on to sell more than 100 million records globally, according to the group's website. Wilson churned out dozens of hit singles, including the three number one songs I Get Around, Help Me, Rhonda and Good Vibrations. He was known for using the recording studio to create unique sounds, especially on the album Pet Sounds, which contributed to his reputation as a music pioneer.

  Mick Fleetwood, of the band Fleetwood Mac, wrote: "Anyone with a musical bone in their body must be grateful for Brian Wilson's genius magical touch!! And greatly saddened of this major worldly loss!!" Sean Ono Lennon, son of Beatles frontman John Lennon and Yoko Ono, called Wilson the "American Mozart" and a "one of a kind genius from another world". Randy Bachman of Bachman–Turner Overdrive agreed that Wilson was on a par with all-time musical greats. "He was Beethoven, he was Tchaikovsky," he told BBC Radio 5 Live. The Beach Boys "took California sunshine all over the world", Bachman explained. "There are some bands that are so monumental that no-one could ever come close, and the Beach Boys are one of those bands. "Even their sad songs were happy. There was some joy in their high voices when they were singing and in the chord progressions. Some of the greatest chord progressions of all time came from Brian Wilson."

  Wilson (left) reuinted with his bandmates in 2006

  Radio host Bob Harris told BBC Breakfast: "Their impact was absolutely enormous. I think they were to America what the Beatles were to Britain." Rolling Stones guitarist Ronnie Wood said his "world is in mourning", as he noted that Sly Stone and Wilson both died this week. "If there was a human being who made art out of inexpressible sadness it was Brian Wilson," musician Questlove wrote in a long tribute on Instagram. Gene Simmons of Kiss remembered Wilson as a "visionary", adding: "Thank you for a lifetime of wonderful melodies that spanned decades." Frank Sinatra's daughter Nancy, who enjoyed a high-profile music career around the time of The Beach Boys' heyday, shared a picture with Wilson on Instagram. "His cherished music will live forever as he travels through the Universe and beyond," she wrote. "God bless you, sweet Brian."

  Fans laid flowers on the Beach Boys' Hollywood Walk of Fame star in LA following news of Wilson's death

  Micky Dolenz, the last surviving member of the band the Monkees, wrote of Wilson's passing: "His melodies shaped a generation, his harmonies changed the game, and his soul came through in every note." Wilson lost his wife Melinda in 2024. The couple had been married for 24 years, and adopted their children Dakota Rose, Daria Rose, Delanie Rose, Dylan and Dash together. Wilson also had two daughters, Carnie and Wendy, from his first marriage. The musician was diagnosed with paranoid schizophrenia in 1984, according to Forbes, when doctors found evidence that his use of psychedelic drugs had potentially damaged his brain. In February 2024 it was revealed he had dementia.
