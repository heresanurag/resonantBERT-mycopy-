  One confirmed bidder is Perplexity, an AI search startup which counts Amazon's Jeff Bezos among its backers. The company recently published its "vision", external for what its version of TikTok would look like for America. Another potential investor is Frank McCourt, who founded the Project Liberty organisation in 2021, which aims to give more power to internet users. He says he would scrap the current algorithm in favour of a far more open version where users have more control over what they see on the platform. Also part of this bid are Reddit co-founder Alexis Ohanian and Canadian businessman Kevin O'Leary.

  According to the Financial Times, external, a consortium of American businesses is close to getting US government endorsement for a bid - though of course it is up to ByteDance, not the White House, whether they sell or not. Oracle already handles the data for TikTok in the US.There are a number of other potential bids which have been mentioned by Donald Trump when he has been asked. He has said, in responses to questions from reporters, that Elon Musk may be interested in getting hold of TikTok, and has also mentioned Microsoft in the past. Microsoft had a bid rejected in 2020 when the previous Tump administration explored a TikTok ban which never happened. YouTuber Jimmy Donaldson, or MrBeast to his millions of fans, has also said he's been contacted by a number of different groups trying to get him to be the face of a new bid. But whoever ends up being picked by the White House to go forward with a bid will still have to get over the same huge hurdle: how do you buy a company that's not for sale?
