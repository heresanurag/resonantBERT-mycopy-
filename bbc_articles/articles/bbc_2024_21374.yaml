  “I was so scared going into the hospital because you would hear stories that you would catch [Covid]," Fahmeda said. "And I remember when Aqil was going into theatre, I was so upset. There was a nurse there and she said ‘I'm so sorry. I can't hug you’." Four years on, Aqil and Fawaz are healthy young boys, about to start reception at Elizabeth Selby Infants' School in Bethnal Green. But they both have speech and language needs. Their two-year child development check was delayed, they weren't able to attend any baby classes and their first year involved very little interaction with the outside world. Fahmeda believes all these factors have had a lasting effect, and experts agree. "Children need opportunities to go out into the world and have new experiences and with those new experiences come new words - but that is happening less during the cost-of-living crisis and it happened less during the pandemic," says Jane Harris, head of children's charity Speech and Language UK.

  The school has employed a speech and language therapist for its pre-schoolers for the first time

  Prof Catherine Davies, from the University of Leeds, who is also involved in the study, says many of the safety nets for families like Fahmeda's were taken away during the pandemic. “The education systems weren't there, health and medical support was not there, their interaction with their wider social networks wasn't there," she said. One third of pre-schoolers (34%) at Elizabeth Selby had speech and language needs during the last school year - up from a quarter (25%) in 2020, according to the school. This year, the school has had to employ a speech and language therapist for its pre-school class for the first time. In June, 22,952 children were waiting 19 to 52 weeks for a speech and language therapy appointment, and 5,832 children were waiting over a year, according to NHS England. The Department for Education in England says it will be focusing on high quality early education and is continuing the Nuffield Early Language Intervention programme for another year. “If I could, I'd have a speech and language teacher in five days a week - and I would still have a waiting list," says Shahi Ahmed, head teacher at Elizabeth Selby. "But I have to think about the budget and how that impacts the school." Mr Ahmed says there is a "massive increase" in the number of children needing help with toilet training, which takes teachers away from teaching. The school is now bringing in outside agencies to help support parents. And among all of this, attendance is falling, which Mr Ahmed says is important as it sets "routine and expectations".

  Lots of families haven't had health visitors or access to GP appointments

  Mr Ahmed believes the increase in children needing more help is "absolutely" a direct result of the pandemic. "They didn’t have the chance to interact with other children or even just go out or have visitors to the house," he says. "They've been limited to what's around them - and that has caused a gap in their social interaction skills." Thankfully, Fahmeda says her twin boys have already benefited from their time in Elizabeth Selby's pre-school classes. "Fawaz has changed completely - he never used to call me mum," she says, wiping her tears away. "It's so nice to hear. You might think I'm being silly, but that’s so amazing and it’s because of the teachers." As for Elijah, his first interactions with family members were all on Zoom. "We would hold up the iPad to his face and introduce him but he wasn’t really paying much attention," Fiona said. "I think he saw the lights and colour but I don’t think he understood he was meeting humans." He didn't attend any baby classes as they had all been cancelled. "He spent the first three months solely with us," she said. Elijah was diagnosed with tongue tie when he was born. Fiona and Ben were told by a midwife that they would be better off getting tongue-tie surgery, also known as a lingual frenotomy, privately, as there would be a long wait on the NHS. "The first day I came back from hospital I was phoning around frantically to find someone who could do it privately but no-one was allowed to physically come in - it wasn’t legal for them to come in and do the operation," Fiona explained. Elijah finally had the operation when he was two-months-old.

  Over the next year, the Bicycle project will be using interactive games to study children born during the strictest lockdown

  The long-term impact of Elijah's early years remain to be seen but it was certainly a "tricky" time for his parents. Two years after Elijah's birth, Fiona and Ben were back in the same maternity room, welcoming a baby girl. “It was a completely different experience, both in the hospital and after," Fiona said. "My mum saw Amelia within 12 hours and was giving her newborn cuddles." The couple volunteered to take part in the Bicycle study because they want to help researchers understand exactly how the lockdowns affected the youngest members of society. It's hoped the results will help answer one pressing question - if it happens again, what should we do differently?

