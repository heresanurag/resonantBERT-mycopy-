content: |-
  Aqil and his twin were eight weeks old when lockdown hit - both are starting school with speech and language needs.

  How did the pandemic impact babies starting school as children now?

  Baby Elijah, who was born in the strictest lockdown, met his grandparents for the first time online

  On 25 March 2020, Fiona and Ben Young drove to their local maternity unit through London’s empty streets. When they arrived, security guards sent them to the back entrance. It was day three of England's first lockdown and the front was surrounded by patients being treated by doctors in hazmat suits. Two days later, after a long labour, they welcomed baby Elijah. Delighted and exhausted, they left the hospital and headed home, full of anticipation over their new life as parents. But because of lockdown, it was far from what they expected. "No-one was allowed to visit us for months - there were no newborn cuddles with family," Fiona recalls. "I had a number to ring if there was an emergency, which didn’t work. We had no health visitor and no midwives. Our first visitor was a friend who walked four hours across London to sit in our garden." Elijah, now four and about to start school, is one of tens of thousands of babies born during the Covid pandemic. He is also one of 200 children being studied as a 'lockdown baby'. The Bicycle (Born in Covid Year, Core Lockdown Effects) study, which launched in July, is looking at whether the lockdowns had an impact on children's talking and thinking skills. Based at London's City University, it also involves five other English universities.

  More than a third of the children going into reception at Elizabeth Selby have speech and language needs

  "Some children may have benefited from more time at home with their parents and some children might have been negatively impacted," Prof Lucy Henry of City University explains. "They may be learning words more slowly or their fine motor skills may possibly be behind. "The real question is: who was affected and what can we do to support them as they go into their school lives?" Reduced interactions with family members and the loss of access to services such as health visitors has had a serious impact on the speech and language of some of these children, initial research by the University of Leeds found at the end of 2023. In Bethnal Green, London, twins Aqil and Fawaz were just eight weeks old when the pandemic hit. Their mother, Fahmeda Ahmed, lived in a second-floor flat with her husband and their two older children - Hasan, four, and two-year-old Khaijah. "It was just the same day over and over again," she said. "We couldn't go out, we couldn’t socialise, we couldn’t invite friends over and we couldn't go anywhere with the kids."

  Fahmeda and her son Aqil had regular pre-school catch up sessions to help him with his progress

  Fahmeda bought an inflatable swimming pool for the balcony to try and keep her older children entertained. She attempted to homeschool her four-year-old, who had just started reception, but he completely stopped talking. And then there was baby Aqil. He was having difficulty swallowing and Fahmeda tried for months to get a face-to-face appointment with a doctor. Eventually, at three months, he was diagnosed with tracheomalacia, a condition where the walls of a child’s windpipe collapse. He needed a minor operation.
