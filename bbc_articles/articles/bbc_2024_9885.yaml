title: 'Disability: Doctor assumed woman using wheelchair did not have sex - BBC News'
date: '2024-05-01'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68891090
content: |-
  Adults with disabilities describe traumatic experiences trying to access healthcare.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Wheelchair user Kat Watkins has said a doctor assumed she was not having sex because of her disability. The 37-year-old from Swansea said she had also been told she was "a very odd shape" by the consultant while having a smear test. She is one of more than 30 adults who told BBC Wales Live they had faced barriers to healthcare because of their disabilities. The Welsh government said it was "very disappointing" to hear these stories. Due to her condition, osteogenesis imperfecta - which creates brittle bones - Ms Watkins said gaining proper healthcare is almost impossible. She said she now avoided seeking medical attention because of her "traumatic" past experiences. "I've been fighting for the last 37 years to get through barriers and they're still there. So for me they're more than just barriers, it is a constant battle," she said.

  Ms Watkins described the smear test, saying the consultant had recommended cancelling them in the future as she was not sexually active at the time. "He was making the assumption that I wasn't having sex because I'm a disabled person," she said. Despite telling staff the best way to position her body, she said they had also treated her like a "textbook example", rather than as an individual. It meant she had to revisit several times until they were able to obtain a result. During another visit to hospital she said she felt she was not listened to or believed by staff when she told them she had broken several bones in her leg - it was later confirmed that it was broken in five places. "I got a letter back to say the doctor had done everything correctly and they couldn't see any problems," she said. "I was heartbroken, I was completely dismissed - all my feelings were dismissed." Swansea Bay health board said it could not comment on individual cases but it would be happy to discuss Ms Watkins's concerns with her.

  Michelle Penny has never had a smear test due to lack of access and, like Ms Watkins, she feels failed by the healthcare system. "I just hope and pray that nothing is going wrong, I'm crossing my fingers and hoping for the best," said the 39-year-old. She has been left almost bedbound by Myalgic encephalomyelitis, external and struggles to leave home to attend medical appointments. "Everyone needs healthcare of some type, but if you can't get to them then you're failed completely," she said. Ms Penny has not seen a GP in around six years, and has routine asthma appointments over the phone - but says it is not satisfactory. "You could tell them anything they'd have to believe you because they can't see you," she added. She has backed calls for at-home tests to detect for HPV, external, which are currently undergoing a trial in England.
