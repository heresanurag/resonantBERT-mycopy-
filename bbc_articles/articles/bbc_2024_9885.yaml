  • None A woman said a lack of ways to contact her surgery put her off contacting them after it recently took 339 attempts to get through on the phoneline
  • None A deaf woman claimed she had her BSL interpreters cancelled by a hospital, as they had seen her speak and so assumed she could lip-read
  • None A woman said private tests had confirmed that new symptoms were not a part of her existing disability after NHS doctors insisted that they were

  Alex Harrison, disability equality officer at Disability Wales, external, said that many people who had "battles" with healthcare simply disengaged from it. "As a result they say they have new impairments or conditions have worsened," she said. Wales has the highest proportion of disabled people in the UK at 26%, according to the organisation, and Ms Harrison said communication was a common barrier many might face to healthcare services. "Many feel like they've just been ignored or are too much work to engage with," she said. "We hear so much that people are just waiting and waiting for contact and then it never coming." She believes disability equality training, "delivered by a disabled person", and more opportunity for feedback are needed to create change. A Welsh government spokesperson said: "It's very disappointing to hear these stories and we expect people with disabilities to be listened to and treated respectfully when they access NHS services. "Our Disability Rights Taskforce is working with disabled people and organisations to make recommendations to improve the lives of disabled people in Wales." For more on this story, watch Wales Live on BBC iPlayer.
