title: Shazam reveals 2018's most-searched songs - BBC News
date: '2018-12-17'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-46596623
content: |-
  A lot of people wanted to know the name of the song that goes: "I do it solo." (It's called Solo.)

  Clean Bandit and Demi Lovato had the most-Shazamed song of 2018

  In a world full of smart devices, self-driving cars and voice assistants, Shazam is the closest technology comes to actual magic.

  The software allows you to hold your phone up to a speaker and answer the age-old question, "what is this song and who's it by?" without the humiliation of having to ask the DJ.

  And in 2018 the answer, most frequently, was "Solo by Clean Bandit".

  The song, which features US star Demi Lovato, was tagged 9.1 million times.

  That's half a million more than the second most searched-for song, X by Nicky Jam and J Balvin.

