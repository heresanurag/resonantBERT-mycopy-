title: Yvette Cooper on Illegal Migration Bill to cut small boat crossings - BBC News
date: '2023-03-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-64876668
content: |-
  The government's plan to cut the number of migrants crossing the English Channel in small boats is “just more chaos” says the shadow home secretary.

  The government's plan to cut the number of migrants in small boats crossing the English Channel was "just more chaos" the shadow home secretary has said.

  Yvette Cooper claimed Suella Braverman's Illegal Migration Bill was not a solution but a "con".
