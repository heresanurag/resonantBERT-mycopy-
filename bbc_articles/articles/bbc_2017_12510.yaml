title: Moment quake hit South Korea - BBC News
date: '2017-11-16'
section: General
url: http://www.bbc.co.uk/news/world-asia-42018424
content: |-
  The 5.4 magnitude tremor hit the port city of Pohang, and was followed by dozens of aftershocks.

  The 5.4 magnitude tremor hit the south-eastern port city of Pohang in the afternoon, and dozens of aftershocks have occurred since.

  More than 1,000 buildings, homes and vehicles have been destroyed or damaged.
