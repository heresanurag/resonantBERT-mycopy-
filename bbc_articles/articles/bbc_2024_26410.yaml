title: Gwent Police PC Huw Orphan jailed for breaking wife's back - BBC News
date: '2024-10-26'
section: Wales
url: http://www.bbc.co.uk/news/articles/c1e783pzp68o
content: |-
  Huw Orphan is jailed for two-and-a-half years after kicking his wife down the stairs.

  Huw Orphan's wife Amy Burley said since the attack she "can’t think of a day where I feel happy"

  A police officer who broke his wife’s back after kicking her down stairs has been jailed for two-and-a-half years. PC Huw Orphan, 32, was convicted of causing grievous bodily harm and actual bodily harm at Cardiff Crown Court. He denied attacking Amy Burley, who also worked for Gwent Police, at their home in Barry, Vale of Glamorgan, in 2020, claiming he accidentally caught her with his leg after a row and was cleared of a more serious charge of causing grievous bodily harm with intent. Earlier this month, he was banned from joining any police force during a misconduct hearing by the Gwent force, which said he would have been dismissed immediately if he had not resigned shortly beforehand.

  In an impact statement read to the court, Ms Burley said she had been left with frequent pain and mobility issues. "I'm unable to sit or stand for a long period of time and I have a very poor and irregular sleep pattern," she said. "I was unable to perform simple activities with my children, such as playing and having fun. "After six months of sick leave, I went off on unpaid leave which has affected me and my family financially. I’m constantly drained by the whole thing."

  Judge Tracey Lloyd-Clarke said: "This was a grave injury, as demonstrated not only by the injury itself, but by her personal statement, which shows she is still significantly affected more than four years after the incident." The jury was told the couple met in 2017 while working for Gwent Police and got married two years later. They fought and argued often and had been arguing by text on the evening leading up to the assault.

  He broke Amy Burley's back by kicking her down stairs

  Orphan had no previous convictions, and was described as a “dedicated father”, who had carried out a lot of voluntary work during his time with Gwent Police. A restraining order application will be considered on 29 November.
