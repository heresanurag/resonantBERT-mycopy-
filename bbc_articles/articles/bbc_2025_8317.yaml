title: Ripon Ferris wheel shuts after generator catches fire - BBC News
date: '2025-04-09'
section: General
url: http://www.bbc.co.uk/news/videos/cy8e3xlv1m4o
content: |-
  The Ripon Big Sky Wheel is closed for the rest of Monday after the blaze.

  A big wheel has been forced to temporarily halt turning after being engulfed in smoke when its generator caught fire two days after opening.

  The infrastructure of the Ripon Big Sky Wheel caught fire at around 15:00 BST on Monday, according to North Yorkshire Fire and Rescue.

  It was extinguished using a bucket of water before the fire service arrived.

  The wheel will be closed for the rest of the day and everyone on the attraction at the time has been offered a free replacement ride, according to Visit Ripon.

  North Yorkshire Council previously said it hoped the wheel would boost footfall in the city and offer visitors a new angle on Ripon Cathedral, Fountains Abbey and the surrounding hills.

