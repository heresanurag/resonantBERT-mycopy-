title: Menendez brothers murder case under review in LA County - BBC News
date: '2024-10-04'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c8djrdzn19vo
content: |-
  The brothers, who were jailed for killing their parents at a Beverly Hills mansion, say it was self-defence.

  Erik and Lyle Menendez have spent nearly 35 years behind bars for the murder of their parents

  The convictions of Erik and Lyle Menendez, who were jailed more than three decades ago for the murder of their parents in the US, are set to be reviewed. The brothers shot Jose and Kitty Menendez at their Beverly Hills mansion in 1989, in what prosecutors said was a plot to inherit their father's fortune. On Thursday, LA County district attorney George Gascon said there was "a moral and an ethical obligation" to review evidence submitted by the brothers last year, which claimed they were sexually abused by their father and acted in self-defence. There has been renewed public interest in the murders since a Netflix series depicting the events was released in September.

  During the original trial, prosecutors said the killings were motivated by greed. They said the brothers spent much of their large inheritance on Rolex watches, cars and luxury property prior to becoming suspects. These allegations of lavish spending, aired in a widely watched televised trial, made the case notorious in the US. That original trial ended with a hung jury after the Menendez brothers submitted allegations of abuse spanning several years. At a second trial, the abuse claims were largely withheld. The brothers were found guilty and sentenced to life in prison without parole in 1996. Lyle Menendez was 21 and Erik Menendez was 18 at the time of the murders. New evidence now being considered includes a 1988 letter from Erik Menendez to his cousin, which reportedly appears to reference his father's abuse.

  A controversial Netflix drama based on the crimes stars Nicholas Chavez as Lyle Menendez, Cooper Koch as Erik Menendez and Javier Bardem as their father Jose Menendez

  "None of this information has been confirmed," Gascon - the most senior prosecutor in LA Country - told a news conference. He continued: "We are not, at this point, ready to say that we either believe or do not believe that information. "But we're here to tell you that we have a moral and an ethical obligation to review what is being presented to us." He added that his team was "not saying there was anything wrong with the original trial". Gascon said a review could potentially lead to resentencing or a new trial. A hearing is set for 26 November, the BBC's US partner CBS News reports. Gascon said his office had received an influx of calls following the release of Monsters: The Lyle and Erik Menendez Story on Netflix The drama has caused controversy, with relatives saying the brothers had been "victimised by this grotesque shockadrama". The show's creator Ryan Murphy has defended the series, and described the family's negative reaction as "predictable at best". On Thursday, reality TV star Kim Kardashian voiced her support for the brothers, further fuelling renewed popular interest in the case. "They are not monsters. They are kind, intelligent, honest men," she said in an article for NBC News.
