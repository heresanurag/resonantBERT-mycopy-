title: 'Para-cycling Track World Championships: Fachies and pilot Corrine Hall robbed
  of silver medals - BBC Sport'
date: '2024-03-21'
section: Disability Sport
url: http://www.bbc.co.uk/sport/disability-sport/68625226
content: |-
  Lora and Neil Fachie and pilot Corrine Hall were "mugged" and had their silver medals stolen after the opening day of the Para-cycling Track World Championships.

  Neil and Lora Fachie are both OBEs

  Lora and Neil Fachie and pilot Corrine Hall were mugged and had their silver medals stolen after the opening day of the Para-cycling Track World Championships in Rio. Husband and wife Neil and Lora, both double Paralympic champions, also had their passports and money stolen. The Fachies and pilots Hall and Matt Rotherham took silver behind Italy in the tandem team sprint on Wednesday. Neil Fachie posted on X, external: "We're all OK, other than being shaken up." He added: "A sad way to end the day." British Cycling has reported the incident to police and cycling's governing body, the UCI.

  British Cycling said the three riders "had their possessions stolen" as they returned to team accommodation after competing. Its statement added: "The three riders are safe and well and are being supported by our staff both on the ground and at home. "We have raised the matter with the UCI, the local organising committee and the police." The Fachies provided one of the highlights of the Tokyo Paralympics in 2021 when they both won gold within the space of an hour with Neil and pilot Rotherham smashing their own world record in the 1,000m time trial before Lora and pilot Hall retained their B 3,000m pursuit crown.
