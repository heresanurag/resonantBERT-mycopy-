title: Moment mace is stolen in Nigerian Senate - BBC News
date: '2018-04-19'
section: General
url: http://www.bbc.co.uk/news/world-africa-43818769
content: |-
  Intruders stormed into the Nigerian upper house and took the symbolic mace.

  Intruders have stormed into the Nigerian upper house of parliament and taken the symbolic mace.

  Senate decisions cannot be approved without the mace - a large ornamental staff that represents the legislature's authority.

  The mace has since been found under a flyover in the capital, Abuja, police say.
