title: 'North West: Yellow weather warning for fog across region - BBC News'
date: '2024-09-15'
section: England
url: http://www.bbc.co.uk/news/articles/c5y00x28pggo
content: |-
  A yellow weather warning issued by the Met Office is set to come into effect early on Monday.

  The yellow weather warning kicks in on Monday morning

  Motorists and commuters are being warned of widespread fog which could affect travel across the North West on Monday. A yellow weather warning from the Met Office begins at 05:00 BST on Monday and is expected to last until 10:00. "It is looking like one of the first occasions in autumn 2024 when we will see more widespread fog developing overnight and lasting well into the morning," the Met Office warned. It said some of the fog could be "quite dense", making journey times longer and causing possible delays to bus services.

  A Met Office spokesperson said motorists should check road conditions if driving, leaving extra journey time or changing plans if necessary. "Make sure you know how to switch on your fog lights, and check they are working before setting off on your journey," the spokesman added. Bus and train services, as well as flights and ferry travel might also be affected, with travellers advised to check with their travel company for updates. The Met Office has issued the following advice to anyone driving in foggy conditions:
  • None Know where the fog light switch is before setting off
  • None Stay at a greater distance than usual from the car in front
  • None Be prepared for a sudden bank of fog or drifting, patchy fog
  • None Check mirrors and slow down before entering fog
  • None Use fog lights when visibility drops below 100 metres, which is roughly the length of a football pitch
  • None Do not use full beam as fog reflects the light back
  • None Once the fog has lifted switch off fog lights The warning applies to Blackburn with Darwen, Cheshire East, Cheshire West and Chester, Greater Manchester, Halton, Lancashire, Merseyside and Warrington.
