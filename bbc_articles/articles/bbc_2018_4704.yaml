title: 'Toronto eyewitness: ''People were shouting, stop the car'' - BBC News'
date: '2018-04-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43874150
content: |-
  An eyewitness says she saw a truck in Toronto hit multiple people before driving away.

  An eyewitness says she saw a truck in Toronto hit several people. The driver did not stop, she says, and three people who were lying on the ground "didn't move at all".
