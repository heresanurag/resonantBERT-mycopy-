title: Tom Cruise calling? Film theme tune interrupts Parliament - BBC News
date: '2023-12-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-67750014
content: |-
  A new peer’s introduction to the House of Lords is briefly sidelined as a mobile phone’s ringtone is heard.

  A new peer’s introduction to the House of Lords was briefly sidelined when a mobile phone’s ringtone went off.

  As Robbie Douglas-Miller was being sworn in, the well-known tune from the Mission Impossible films was heard in the House of Lords.
