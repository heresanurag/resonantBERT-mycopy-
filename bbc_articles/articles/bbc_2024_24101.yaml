content: |-
  Prisons across England and Wales are facing an overcrowding crisis. The number of people on remand awaiting trial is at a 50-year high, with criminal courts facing a huge backlog of cases.

  The BBC's Senior UK correspondent Sima Kotecha was given rare access to HMP Pentonville across two days.

  Produced by Claire Jones. Filmed and edited by David Mcllveen.
