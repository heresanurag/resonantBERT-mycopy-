  Bhim Kohli died in hospital after being attacked while walking his dog in a park.

  Boy, 14, in court charged with murder of 80-year-old

  Bhim Kohli was walking his dog Rocky on Sunday evening when he was attacked

  A 14-year-old boy accused of murdering an 80-year-old man in a park has appeared in court. Bhim Kohli died on Monday after an attack at Franklin Park in Braunstone Town, Leicestershire, while walking his dog Rocky on Sunday. The boy, who cannot be named because of his age, appeared at Leicester Magistrates' Court on Thursday. He appeared at Leicester Crown Court later and was remanded in custody.

  Mr Kohli died in hospital following the attack, which happened near the park's Bramble Way entrance at about 18:30 BST on Sunday. In a statement, his family described him as "a loving husband, dad and grandad". "Bhim loved to laugh," they said. "He was always very happy and talkative, the joker of the family and always loved to outsmart us with a smile." The 14-year-old was charged with Mr Kohli's murder on Wednesday. Appearing at court, the boy, dressed in a black jumper and black tracksuit bottoms, spoke only to confirm his name and address. He is next due to appear at Leicester Crown Court for a plea and trial preparation hearing on 11 October, with a provisional trial date set for 17 February.

  Floral tributes have been laid next to the entrance of Franklin Park

  On Wednesday, Andrew Baxter, deputy chief crown prosecutor for the Crown Prosecution Service (CPS), said: "The Crown Prosecution Service reminds all concerned that criminal proceedings against this defendant are now active and that the youth has a right to a fair trial. "It is extremely important that there should be no reporting, commentary or sharing of information online which could in any way prejudice these proceedings." Because of prior police contact with the victim, Leicestershire Police made a voluntary referral to the Independent Office of Police Conduct (IOPC). Following further contact with the IOPC, the force has now made a mandatory referral. An IOPC spokesperson said: "We can confirm that we have received a referral from Leicestershire Police in relation to this matter. "We will carry out an assessment to decide what further action may be required from us."

