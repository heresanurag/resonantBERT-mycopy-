title: 'Brexit: ''No optimism'' for summit breakthrough, says Donald Tusk - BBC News'
date: '2018-10-16'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45871254
content: |-
  The European Council president calls for new ideas but Theresa May is standing by her plan.

  Donald Tusk has poured cold water on hopes of a Brexit breakthrough at Wednesday's EU summit, saying the Irish border was still a sticking point.

  The European Council president said he had "no grounds for optimism" it would be solved at the summit.

  And he called on Theresa May to come up with "concrete proposals" to break the "impasse".

  The prime minister told her cabinet a deal was within reach if the government "stand together and stand firm".

  Asked if she would be coming forward with "concrete proposals" at the summit, Mrs May's official spokesman said: "The prime minister set out her position yesterday (Monday). She looks forward to a face-to-face discussion with him tomorrow.

  "There are many areas where we have made progress. More progress is needed on the backstop."

  The "backstop" is a fall back plan for avoiding a hard border in Ireland if the two sides can't strike a trade deal in time - but they can't agree on how long it should last and what form it should take.

  No new proposals are expected to be tabled or discussed this week and discussions are likely to continue at official level only.

  Mrs May had already put forward a "workable solution", Downing Street said.

  Speaking at a press conference in Brussels, Mr Tusk said: "As I see it, the only source of hope for a deal for now is the goodwill and determination on both sides.

  "However, for a breakthrough to take place besides goodwill we need new facts.

  "Tomorrow (Wednesday), I am going to ask Prime Minister May whether she has concrete proposals on how to break the impasse."

