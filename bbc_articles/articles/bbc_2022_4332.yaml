title: 'Sacramento shooting: At least six dead in centre of California state capital
  - BBC News'
date: '2022-04-03'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-60974119
content: |-
  Police appeal for public help in search for suspects in Sacramento shooting that left six dead.

  Police say the area has been secured

  Police are searching for multiple suspects after at least six people were left dead and 12 wounded in a shooting in the centre of Sacramento, California's capital.

  No arrests have yet been made in the worst US mass shooting so far in 2022, which broke out early Sunday morning.

  Victims were still being identified on Monday, and police are seeking public help for evidence.

  The violence was "unprecedented" for the city, its police chief said.

  Videos posted online appear to show a brawl break out in the area - packed with restaurants and bars - in the early hours on Sunday, just before rapid gun fire sent people fleeing.

  It was so far unclear whether the fight led to the shooting, police say, and on Monday, officials set up an online portal to ask the public to submit information from the scene.

  The shooting took place at around 02:00 (09:00 GMT) near the junction of 10th Street and K Street, in an area that leads to the Golden One Center, where the Sacramento Kings play basketball.

  It is also only a few streets from the state Capitol building.

  "This is a really tragic situation," Police Chief Katherine Lester said.

  Police nearby responded to the gunfire and came across a "very large crowd", Chief Lester said. At least one handgun, now understood to be stolen, was recovered.

  Three men and three women were killed in the street.

