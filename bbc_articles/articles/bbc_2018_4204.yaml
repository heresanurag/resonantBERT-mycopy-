title: 'Commonwealth Games: Home nations win 14 of 44 golds on day 10 - BBC Sport'
date: '2018-04-14'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43764636
content: |-
  Athletes from the home nations win 14 of a possible 44 gold medals on day 10 of the Commonwealth Games on the Gold Coast.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's sprinters secured an impressive relay double as athletes from the home nations won 14 of a possible 44 gold medals on day 10 of the Commonwealth Games. Eight of those came in the boxing ring, with six English fighters topping the podium, along with Sammy Lee and Lauren Price from Wales. There was success in the shooting for Wales' Michael Wixey and Englishman David Luckman, who won his second title of the Games. Ross Wilson secured TT6-10 singles table tennis gold in an all-English final, with compatriots Liam Pitchford and Paul Drinkhall adding a gold of their own in the men's doubles pair. England's Lisa Whiteside and Gal Yafai won boxing golds, with Peter McGrail, Sandy Ryan, Pat McCormack and Frazer Clarke following suit. Northern Irish fighters, meanwhile, were left feeling hard done by in several bouts as the country's boxers ended Saturday with six silver medals. Scotland added to their medal haul with bronzes for Jack Wightman in the 1500m and Kirsty Gilmour in the badminton, but a winning run in the men's basketball came to an end in the semi-finals with a 103-46 defeat by Australia. England's netballers kept their hopes of a gold medal alive, beating Jamaica in a dramatic semi-final.

  Wales are seventh with 10 golds, 12 silvers and 14 bronzes, Scotland are eighth with nine golds, 13 silvers and 21 bronzes, Northern Ireland are 19th with one gold, seven silvers and four bronzes while the Isle of Man are 34th with one silver

  England delivered a double relay gold on the track as both the men's and women's quartet won their 4x100m events on the final day of athletics action at the Carrara Stadium. The men's four of Reuben Arthur, Zharnel Hughes - after his 200m disqualification, Richard Kilty and Harry Aikines-Aryeetey stormed home in a season's best time of 38.13 seconds to edge South Africa into the silver-medal spot. Jamaica, whose team included Yohan Blake, had to settle for bronze.

