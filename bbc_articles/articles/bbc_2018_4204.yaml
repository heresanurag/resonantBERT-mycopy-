  00:01 Badminton - mixed doubles gold-medal match. Husband and wife Chris and Gabby Adcock are the defending champions and will face England team-mates Marcus Ellis and Lauren Smith 01:15: Table tennis - mixed doubles gold-medal match. Liam Pickford and Tin-Tin Ho will attempt to go one better than their silver four years ago. 03:20: Table tennis - men's singles gold medal match. Singapore are historically the Commonwealth's pre-eminent table tennis nation, and Gao Ning is their leading man with seven medals at the Games, although he will try and win a first singles title on the Gold Coast. He faces Nigeria's Quadri Aruna. 04:02: Netball final. All five previous Commonwealth Games netball finals have been between Australia and New Zealand but England have broken up the Antipodean duopoly and will face reigning champions Australia. 05:42: Rugby sevens - women's gold-medal match. Reigning Olympic champions Australia are the standout favourites for the gold medal, having made history, external in January when they won a World Series tournament without conceding a single point. Neighbours and reigning world champions New Zealand could meet them in the final, although Olympic bronze medallists Canada are another threat. 06:04: Rugby sevens - men's gold-medal match. Eleven days of action on the Gold Coast will conclude with what promises to be a fitting finale. Reigning Commonwealth champions South Africa have been in good form in the World Series this season, world champions New Zealand have a point to prove after bombing at the last Olympics, Fiji are reigning Olympic champions, and England followed up helping Great Britain earn silver in Rio by coming second again in last season's World Series.
