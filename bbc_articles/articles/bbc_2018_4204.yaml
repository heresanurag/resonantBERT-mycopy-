  Asha Philip, Dina Asher-Smith and Bianca Williams set a healthy lead for long jumper Lorraine Ugen to bring the baton home in a time of 42.46, ahead of Jamaica and Nigeria. "We usually compete before the boys, but they competed before us and won gold, so we thought we had better not embarrass ourselves," said Philip. Elsewhere, Morgan Lake secured women's high jump silver for England and Scotland's Wightman put in a superb performance to take bronze in the men's 1500m, while England's Laura Weightman claimed bronze in the women's 5,000m. "That was a superb last lap from Jake Wightman and that is a great bronze medal for him," said former 1500m world champion Steve Cram.

  This video can not be played To play this video you need to enable JavaScript in your browser. Sammy Lee toughs it out to win 81kg boxing gold for Wales

  There was a flurry of medals for the home nations during a busy boxing schedule on Saturday. England's Whiteside unanimously outpointed Northern Ireland's Carly McNaul at -51kg, while Yafai got a split call against India's Amit Phangal at -49kg in the morning session. And the gold medals kept coming. England's Ryan beat Rosie Eccles of Wales in the -69kg for a gold medal she said "means everything", before Price topped the podium for Wales at -75kg by defeating Australian Caitlin Parker. "It doesn't seem real yet," said Price. "I was up against it fighting in her backyard but it was a more technical fight." Walker claimed the decision against Northern Irishman Kurt Walker in the -56kg gold-medal bout, with England edging Northern Ireland again at -69kg as McCormack beat Aidan Walsh. Welshman Lee was the unanimous winner in his gold-medal match-up with Samoa's Ato Plodzicki-Faoagali, before England's Clarke beat India's Satish Kumar to take the +91kg title. But along with the gold medals came tears, Northern Ireland's Michaela Walsh stunned by the split decision which handed Australia's Skye Nicolson gold in the -57kg. Northern Ireland's Kristina O'Hara (-48kg) and Brendan Irvine (-52kg) also ended up with silvers, while England's Paige Murney was beaten at -60kg.

