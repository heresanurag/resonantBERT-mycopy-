  England's netball team were six goals down at half-time of their semi-final against Jamaica, but recovered to reach their first Commonwealth Games final. Shooter Jo Harten scored in the final second to secure a 56-55 victory and set up a gold-medal match on Sunday at 04:02 BST against world number one side Australia, who thrashed New Zealand 65-44 in the other semi-final. Former England captain Sara Bayman told BBC Sport: "If you are writing fairytales, that is one right there. This is breaking history and breaking the Australian and New Zealand dominance. "You can't write it. What amazing mental strength. That is absolutely amazing."

  As is tradition, David Luckman was carried from the range to the medal ceremony in a Sedan chair by his opponents

  England's Luckman retained the men's individual full-bore rifle Queen's Prize title he won at Glasgow 2014 as team-mate Parag Patel clinched the bronze medal. It was Luckman's second gold after he and Patel, 42, retained their Queen's Prize pairs title earlier in the week. Wales' Wixey took gold in the men's trap final, finishing ahead of England's Aaron Heading in second, while England's Dean Bale took bronze in the men's 50m rifle. The Welsh continued to build on their record medal return at an overseas Games, taking their haul to 36 - 11 more than the country's previous best, recorded in New Zealand in 1990. Dani Rowe added bronze in the women's road race, before team-mate Jon Mould added a silver in the men's event and Joshua Stacey came third in the men's T66-10 table tennis singles. "I feel like an honorary Welsh girl," said Rowe. "I've been living there for over five years now. It means so much to fly the flag for Wales." The medals kept coming, and Wilson took the TT6-10 para table tennis title with a 3-1 victory over fellow Englishman Kim Daybell before Pitchford and Drinkhall beat India 3-2 to win the men's doubles. Scotland's Gilmour and England's Rajiv Ouseph claimed badminton singles bronze medals, with Syerus Eslami taking third in the men's freestyle -86kg wrestling and both England's men's and women's hockey teams winning their bronze-medal matches against India. England's Matthew Dixon claimed the final silver medal of a frantic day, the 17-year-old narrowly pipped to gold in the men's 10m platform diving.

