  "This squad really enjoy working together and they have delivered," said two-time world 110m hurdles champion Colin Jackson on BBC TV. "It is all the time they spend practising with each other. It's really difficult to get in the England 4x100m relay team because there is real competition for places." Fifteen minutes later the women's four clocked a new national record to take gold.

