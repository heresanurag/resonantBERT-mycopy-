title: Drug dealers arrested after high-speed chase - BBC News
date: '2023-10-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-67242763
content: |-
  Patrick McCabe, 28, and Ronnie Beckett, 19, have both been jailed following the police chase.

  Two drug dealers have been jailed after leading police on an hour-long high-speed chase.

  Patrick McCabe, 28, of no fixed address, drove off from officers at a car wash in Copthorne, West Sussex, on July 12 this year.

  McCabe, at that time a disqualified driver, proceeded to drive through red lights and the wrong way around a roundabout before he and his passenger Ronnie Beckett, 19, from Ifield, attempted to flee on foot. They were both arrested at a housing estate in Horley, Surrey.

  At Lewes Crown Court on 6 October, McCabe admitted dangerous driving, possession of class B drugs with intent to supply, driving while disqualified and driving without valid insurance.

  He was sentenced to two years and five months in prison and given a new disqualification from driving for five years and four months.

  Beckett admitted possession of class B drugs with intent to supply, breach of a suspended sentence order, and failing to provide a specimen for analysis. He was jailed for 17 weeks.
