title: Firefighters battle to contain Australia bushfires - BBC News
date: '2019-11-10'
section: General
url: http://www.bbc.co.uk/news/world-australia-50346073
content: |-
  More than a dozen emergency-level fires are burning across New South Wales and Queensland.

  Authorities have deployed more than 1,000 firefighters and 70 aircraft in the battle against the bushfires blazing along Australia's east coast.
