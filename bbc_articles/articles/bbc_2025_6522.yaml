title: Murder arrest over fatal house explosion in Worksop - BBC News
date: '2025-04-16'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/cy0ywpd59pvo
content: |-
  Police confirm a man has been arrested and bailed following the explosion in John Street, Worksop.

  Three houses were badly damaged in the blast

  A man has been arrested on suspicion of murder after a fatal house explosion that damaged multiple homes and cars in Nottinghamshire. Emergency services were called to John Street in Worksop at 19:39 BST on Saturday evening. David Howard, 53, was found in the rubble and declared dead at the scene. Nottinghamshire Police said a 43-year-old man had been questioned and then bailed pending further investigation.

  Officers said the cause of the explosion remained unclear and they were keeping an open mind at this stage in the investigation. Det Ch Insp Ruby Burrow said: "Whilst we have made an arrest, I want to be really clear that our investigation remains at a very early stage and we are doing everything possible to establish what caused this deeply tragic incident. "It remains too early to say whether there is a criminal element to this case and would ask that people avoid speculation."

  David Howard, 53, died in the explosion in John Street

  One terraced house was destroyed and two more partially collapsed in the blast. Eight other properties and 20 cars were damaged by debris, police added. About 50 people from 35 properties were evacuated, and while many have returned, a number are still in temporary accommodation. Part of John Street is still cordoned off while demolition and investigation work continues. One other person was treated for minor injuries, police said, but everyone in the area has been accounted for. Bassetlaw District Council has warned it could be up to two weeks before residents from properties within the remaining cordon can return home. The authority has joined Nottinghamshire County Council and the police in thanking the public for their patience and cooperation in the aftermath of the emergency.

  The clear-up operation began on Monday with damaged walls being removed

  On Monday, residents spoke of their shock. Debbie Adams, who lives on the same road, said the explosion shook her house and filled her dining room with dust. She went into the street and saw the house "totally collapsed" and neighbours walking in clouds of dust. Piotr Peruki, whose house backs on to the scene, slept in his car and took a day off work due to exhaustion and shock. His teenage son was also badly affected. "For him it was a very bad experience, he is scared," he said. "He says he does not want to stay here, he wants to move house, he does not feel safe because maybe the accident will happen again."

