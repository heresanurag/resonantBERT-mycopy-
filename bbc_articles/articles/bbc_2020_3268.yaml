title: 'Woolton death: Son charged with mother''s murder - BBC News'
date: '2020-03-09'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-51791056
content: |-
  The cause of 64-year-old Janice Child's death was severe blunt force head injuries, police say.

  A man has been charged with murdering his mother at a house in Liverpool.

  Janice Child's body was found in Kings Drive, Woolton, in the early hours of Friday morning.

  A post-mortem examination found the cause of the 64-year-old's death was severe blunt force head injuries, Merseyside Police said.

  Robert Child, 37, of Kings Drive, Irby, Merseyside, was charged with her murder and will appear at Liverpool Magistrates' Court on Monday.

  A 33-year-old woman, also from Merseyside, who was arrested on suspicion of conspiracy to murder has been released on bail.

