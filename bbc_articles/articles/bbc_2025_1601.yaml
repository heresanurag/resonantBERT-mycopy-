title: 'Evan Ferguson: Brighton striker set for West Ham medical before loan move
  - BBC Sport'
date: '2025-02-02'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c0e4r2yed7no
content: |-
  Brighton striker Evan Ferguson is set to join West Ham on loan until the end of the season and will have a medical at the Hammers on Sunday.

  The 20-year-old will link up with his former Brighton manager Graham Potter in east London and the Hammers will pay a loan fee, Ferguson's wages and any add ons.

  The Republic of Ireland international came on as a substitute in Brighton's 7-0 loss to Nottingham Forest on Saturday as he returned from an ankle injury.

  But it was just the 20-year-old's 15th appearance of the season for the Seagulls, with 11 of those coming from the bench, and he has had few chances to impress manager Fabian Hurzeler.

  His only goal this season, and his first since November 2023, was in the draw against Wolverhampton Wanderers in October - a far cry from the form that shot him to prominence in the 2022-23 campaign and led to him being nominated for the PFA Young Player of the Year.

  Only Michael Owen (28), Wayne Rooney (15) and Francis Jeffers (12) scored more Premier League goals before their 19th birthday than Ferguson, while Owen, Robbie Fowler and the late Chris Bart-Williams are the only other players to hit a Premier League hat-trick at his age.

  West Ham are currently missing injured forwards Jarrod Bowen, Niclas Fullkrug and Michail Antonio.
