title: Man, 81, critically injured in motorbike hit-and-run - BBC News
date: '2024-07-13'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c51yl7zv73eo
content: |-
  The man was using a walking frame to cross Bathgate Road in Blackburn on Friday night when he was hit by the bike.

  An 81-year-old man is in a critical condition after being struck by a motorbike in a hit-and-run in West Lothian.

  He was using a walking frame to cross Bathgate Road in Blackburn at about 19:15 on Friday when he was hit by the bike.

  The rider left the motorbike and fled the scene.

  The man was taken to the Royal Infirmary of Edinburgh where medical staff have described his condition as critical.

  Insp Colin Morrison said: “An elderly man has been left critically injured and extensive inquiries are ongoing to trace the rider of the motorbike.

  “We are appealing for anyone who may have witnessed what happened to please get in touch, external.

  "We are also asking motorists with dashcams who were in the area around the time of the incident to check their footage in case they have captured anything of significance."
