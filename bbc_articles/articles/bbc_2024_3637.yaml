title: Prince William pours dodgy pint on St David's Day pub trip - BBC News
date: '2024-03-01'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68449403
content: |-
  Prince William admits the drink will take about an hour to settle after his trip to a Wrexham pub.

  Prince William attempted to pull a pint on a visit to Wrexham to mark St David's Day... with very little success.

  The royal visited the Turf pub and, after professing a love of cider, struggled to pour a pint of lager, which by his own admission would "settle in about an hour".

  He then knocked back a shot of whisky back with Rob McElhenney - the co-owner of Wrexham AFC.
