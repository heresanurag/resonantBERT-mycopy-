title: Hull school's tribute to 'kind' girl killed in crash - BBC News
date: '2024-04-12'
section: Humberside
url: http://www.bbc.co.uk/news/uk-england-humber-68796073
content: |-
  Humberside Police was called to Hopewell Road in the Bilton Grange area of Hull on 11 April.

  A five-year-old girl on a bike has died in a crash with a lorry in Hull.

  Humberside Police was called to Hopewell Road in the Bilton Grange area at 15:40 BST on Thursday.

  Despite efforts from emergency services, the girl suffered fatal injuries and died at the scene.

  The family of the girl were "being supported by officers during this extremely difficult time", said police, who also appealed for dashcam or CCTV footage.

  The girl died at the scene of the crash in Hopewell Road, Hull

  The girl, who Mountbatten Primary School said was called Jessica, has been described as "wonderfully unique, curious, funny and so very kind".

  Head of school, Mr Jamie Wegg, said: "The whole school community is deeply saddened and devastated by the death of young Jessica.

  "Our thoughts are with her family and friends at this most difficult of times."

