  The Princess of Wales' return to public life and the King's Birthday Honours leads Saturday's papers.

  Sign up for our morning newsletter and get BBC News in your inbox.

  The i says three Household Cavalry horses, which were injured after bolting through central London in April, have recovered and will take part in the Trooping the Colour parade. Photographs of the injured horses running through Belgravia were prominently published at the time of the incident. The Times reports that police in the city of Gelsenkirchen, which hosts England's match against Serbia on Sunday night, are urging fans to smoke cannabis instead of drinking alcohol before the game., external Marijuana was legalised in the country on 1 April, and a raft of measures - including only serving weak beer - have been brought in to reduce the likelihood of violence between fans. "Smoking cannabis puts people in a chill mood," the police spokesman Stephan Knipp is quoted as saying.
