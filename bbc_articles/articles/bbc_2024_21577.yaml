title: 'Knife crime: Bereaved dads call for compulsory school lessons - BBC News'
date: '2024-09-11'
section: England
url: http://www.bbc.co.uk/news/articles/ckg2ymg284jo
content: |-
  Colin Knox and Martin Cosser who both lost teenage sons to knife crime call for lessons in schools.

  Left to right: Martin and Charlie Cosser, and Robert and Colin Knox

  Two dads who have met for the first time since their teenage sons were fatally stabbed are calling for compulsory knife crime lessons in schools. Colin Knox, whose 18-year-old son, Harry Potter actor Robert Knox, was murdered outside a London bar in 2008, said: "I had to kiss him on his forehead and it was cold." Martin Cosser whose 17-year-old son Charlie, was fatally stabbed at a party in West Sussex in 2023, said: "The night Charlie was stabbed the word shank was mentioned twice, and knife, and nobody did anything." Sir Keir Starmer has pledged to "double down" on knife crime after a summit at Downing Street aimed at halving it over the next decade.

  This video can not be played To play this video you need to enable JavaScript in your browser. Colin Knox and Martin Cosser both lost sons to knife crime

  Mr Cosser and Mr Knox shared some of their most difficult moments. Mr Knox, from Hawkinge in Kent, said the hardest thing was saying goodbye. "I had to kiss him [Robert] on his forehead and it was cold, I could have just collapsed on the floor. What a way to say goodbye." Mr Cosser described his memory of seeing his son Charlie's lifeless body. "Nothing could prepare me to go in and see my little boy lying there at that age, it was just horrific and all because someone thought it was alright to take a knife out to a party and use it on an innocent human being."
