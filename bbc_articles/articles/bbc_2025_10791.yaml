title: Clean energy mission blow as Hornsea 4 windfarm cancelled - BBC News
date: '2025-05-07'
section: General
url: http://www.bbc.co.uk/news/articles/ce848g8l8vro
content: |-
  In a blow to the government's clean energy ambitions, a company cancels a huge windfarm off Yorkshire.

  In a significant blow to the government's clean energy ambitions the Danish energy company Orsted has cancelled plans for a huge windfarm off the coast of East Yorkshire. The Hornsea 4 project would have become one of the biggest offshore wind farms in the world with a potential capacity of 2.4GW – enough to power more than a million homes. Orsted said the project no longer made economic sense, despite signing a 15-year contract with the UK government guaranteeing to sell power at an agreed price. The UK's offshore wind sector has faced soaring costs in recent years, as the government has acknowledged.

  A spokesperson for the Department of Energy Security and Net Zero (DESNZ) said it recognised "the effect that globally high inflation and supply chain constraints are having on industry across Europe." But this is the second developer to pull out of a major offshore project. The Swedish company Vattenfall halted development of a 1.4GW wind farm off the coast of Norfolk in July 2023, again due to rising costs. Thay project was sold to the German energy company RWE, which has said it plans to see the project through. However, the difficulties offshore developers are facing raise significant questions about the viability of the government's clean power by 2030 target – one of the Labour government's five central "missions". Just over half of the country's power currently comes from wind, solar, nuclear and biomass – organic matter. The government wants to raise that to 95% by 2030 – so in just five years' time. In order to meet that target the UK will need to triple offshore wind capacity and double the amount of solar and onshore wind power on the system, according to estimates by Aurora Energy. It will also need a significant upgrade to the electricity grid with 620 miles of new power lines as well as substations and other equipment.

  Many local communities are pushing back at the prospect of major new energy infrastructure near their homes. Some industry experts - as well as the Conservative and Reform parties – say the 2030 target is not achievable. Dieter Helm, professor of economic policy at the University of Oxford, has long argued building out this infrastructure in the timescale would be near impossible. "In failing to meet a very short-term target, it is going to maximise the costs of trying," he has warned. Chris Stark, the head of the government's Clean Power 2030 mission, has conceded the target will be – as he put it - "bloody hard", but that with a "Herculean effort" it can be met., external Energy Secretary, Ed Miliband, accepts the plan it is ambitious and controversial but is adamant that it is essential to: "cut bills, tackle the climate crisis and give us energy security." The government has said it plans to work with Orsted to get Hornsea 4 "back on track" and said it believed the clean power mission was still achievable. "We have a strong pipeline of projects to deliver clean power by 2030 and our mission-led approach ensures we can steer our way through global pressures and individual commercial decisions to reach our targets," a spokesperson said.

