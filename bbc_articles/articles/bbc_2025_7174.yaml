title: Prince William to attend the funeral of Pope Francis - BBC News
date: '2025-04-22'
section: UK
url: http://www.bbc.co.uk/news/articles/cg41ed60gp5o
content: |-
  The Prince of Wales will represent the King at the funeral of Pope Francis at the Vatican on Saturday.

  Prince William will attend the funeral on behalf of King Charles

  The Prince of Wales will attend the funeral of Pope Francis on Saturday, Kensington Palace has announced. Prince William will represent the King and will join world leaders, including UK Prime Minister Sir Keir Starmer, US President Donald Trump and France's President Macron, at the funeral service at St Peter's Basilica in the Vatican. King Charles and Queen Camilla were among the last high-profile figures to hold a meeting with the Pope. The private meeting, which took place two weeks ago during the royal visit to Italy, was held at the Casa Santa Marta, where Pope Francis died on Monday morning.

  King Charles and Queen Camilla had a meeting with the Pope during their trip to Italy

  Representing the Royal Family at the Vatican funeral will be the latest high-profile international event for Prince William, following a meeting with US President Trump in France last year. The King was Prince of Wales when he attended the funeral of Pope John Paul II in 2005. His attendance at the funeral meant his wedding to Camilla was delayed to 9 April and the King and Queen's 20-minute private meeting with Pope Francis fell on their 20th wedding anniversary. In what was described by Palace officials as having been a very moving encounter, the Pope gave them his best wishes for their anniversary. Buckingham Palace said the meeting with the Pope had been a highlight of the couple's trip to Italy, describing it as a "very significant and special moment". There had originally been plans for a state visit to the Vatican, but the Pope's serious health problems meant that it had been cancelled. The couple had been praying for the Pope's recovery - and Pope Francis in turn wished King Charles well with his own health problems, as the King continues to be treated for cancer. King Charles has been a great advocate of building links between different faiths and the planned state visit to the Vatican would have seen symbolic moments such as an ecumenical service in the Sistine Chapel. The King has spoken of the "devastating loss" at the Pope's death and praised his compassion in a statement issued by the Palace - and flags were flown at half mast on royal residences. In another sign of respect for Pope Francis, the King wore a black tie when he met the New Zealand prime minister in Windsor Castle on Tuesday. Meanwhile, Downing Street said the prime minister would also attend the Pope's funeral. Asked whether Sir Keir Starmer would be there, his spokesperson said the prime minister had paid tribute to the Pope's leadership "in a complex and challenging time" and that it was "right, like other world leaders, that he pays tribute to his life and attends his funeral".

