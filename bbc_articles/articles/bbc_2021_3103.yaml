  • None Liverpool remain unbeaten in their last 12 meetings with German opponents in all European competition (won nine, drawn three) since a 2-4 loss to Bayer Leverkusen in April 2002.
  • None RB Leipzig have lost back-to-back games in European competition for only the second time (also November 2018), and the first time in the Champions League.
  • None Liverpool won both legs of a Champions League two-legged knockout tie while also keeping a clean sheet in each leg for the first time since the 2008-09 last-16 tie against Real Madrid.
  • None Having won three and lost just one of their first four meetings with English sides in all competitions (two against Spurs, two against Manchester United), RB Leipzig have lost both of their last two against Liverpool.
  • None Liverpool's Mohamed Salah has scored 25 goals in all competitions this season, the most of any player for all Premier League clubs.
