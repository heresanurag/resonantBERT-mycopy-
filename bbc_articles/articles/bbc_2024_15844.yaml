content: |-
  Arsenal sign Barcelona and World Cup-winning Spain forward Mariona Caldentey.

  Mariona Caldentey played 43 matches across all competitions last season, scoring 18 goals

  The 28-year-old joined Barca in 2014 and has since won six Liga F titles, three Champions Leagues and six Spanish Cups. She has made 302 appearances for the Catalan side, scoring 114 goals - making her Barcelona's fifth all-time top scorer. Caldentey was also part of the Spain team that beat England in the World Cup final in Australia last year to win the nation's first major women's title. "I think what Arsenal are doing as a club is amazing - on and off the pitch," Caldentay said. "I love the way we want to play as a team and I think there’s a strong mentality building here. "It’s been incredible to see what the club has done away from the pitch, with supporters following the team everywhere and lots of records being broken. I can’t wait to get started and help the team win trophies and entertain our supporters." Arsenal boss Jonas Eidevall said: “Mariona is a world-class forward and we are delighted to bring her to Arsenal. "She’s a winner with proven experience of excelling on the biggest stage, which is exactly where we aim to be at this club." Caldentey has scored 26 goals in 72 matches for Spain, also helping them to win the 2023-24 Nations League. Arsenal confirmed in May that Netherlands striker Vivianne Miedema will leave the club having not been offered a new contract, with rivals Manchester City set to make a move for her. The Gunners have also been linked with Aston Villa goalkeeper Daphne van Domselaar and England midfielder Fran Kirby.

  Arsenal believe this signing is a real statement of intent as they prepare for a fourth season under manager Jonas Eidevall. They have been trying to build a squad capable of winning the biggest pieces of silverware and competing on several fronts but have fallen short in recent years. Arsenal hope Caldentey - who has lifted multiple European titles with Barcelona and Spain - can make a difference with her winning mentality. Ultimately, they underperformed last season and know the time has come to deliver. They believe Caldentey will take them to the next level. There is also a sense of pride that Arsenal were able to attract Caldentey given she is in the prime of her career and was available on a free transfer, undoubtedly with interest from elsewhere. With legendary striker Vivianne Miedema allowed to leave the club this summer there are high demands, but Caldentey is capable of stepping up, although she is not seen as a direct replacement. Caldentey's move to England follows a trend of Spain internationals moving to the WSL, as she joins Arsenal club-mate Laia Codina and Manchester City's Leila Ouahabi.
