  The suspect, a doctor from Saudi Arabia named Taleb al-Abdulmohsen, arrived in Germany in 2006 and in 2016 was recognised as a refugee. An atheist, he ran a website that aimed to help other former Muslims flee persecution in their Gulf homelands. His social media was full of anti-Islamic sentiment and conspiracy theories. At Saturday's press conference, Magdeburg police chief Tom-Oliver Langhans said police had conducted an evaluation as to whether the suspect might be a potential threat, "but that discussion was one year ago". He added that investigations into the suspect's past were ongoing and declined to comment further. Federal Minister of the Interior Nancy Faeser told German newspaper Bild that investigators would examine "in detail" what information authorities had on the suspect in the past and how he had been investigated. The German Office for Migration and Refugees announced in a post on social media that it had fielded a complaint about the suspect, which it had "taken seriously", but as the office is not an investigative body, had referred the complainant to other authorities. One tip-off received by authorities is believed to have come from Saudi Arabia, the suspect's home country. A source close to the Saudi government told the BBC it sent four official notifications known as "Notes Verbal" to German authorities, warning them about what they said were "the very extreme views" held by al-Abdulmohsen. However, a counter-terrorism expert told the BBC the Saudis may have been mounting a disinformation campaign to discredit someone who tried to help young Saudi women seek asylum in Germany. On Saturday, Langhans said he did not have information when asked about Saudi Arabia issuing warnings. Later, the head of the Federal Criminal Police Office (BKA), Holger Münch, told public broadcaster ZDF that his office had received a notice from Saudi Arabia in November 2023. He said local police took appropriate investigative measures, but the matter was unspecific. He added that the suspect "had various contacts with authorities, insulted them and even made threats, but he was not known for violent acts". Past investigations would need to be revisited, Münch said.

