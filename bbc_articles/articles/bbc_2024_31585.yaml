  The social media accounts of the suspect are under a great deal scrutiny as investigators build their case against him. He was a prolific poster of anti-Islamic sentiment and conspiracy theories on X, and had made threats in the past. The German ambassador to the UK said X owner Elon Musk had questions to answer about why his platform had not taken action against al-Abdulmohsen. "We have seen that the man who committed this terrible attack was extremely active, threatening on X. The question is, 'does X really act against these things?'," Ambassador Miguel Berger told BBC Radio 4's Broadcasting House programme on Sunday. "We have a Digital Safety Act in the European Union which requires social media to act [...]. It has not happened," he said. Musk's own account called for Scholz to resign, and retweeted several accounts broadly criticising the German government for failing to act on threats made on social media by the suspect. The BBC has contacted X for a response. Musk's criticism of German authorities goes beyond the Magdeburg attack. In the morning before the attack, he posted in support of far-right political party Alternative for Germany (AfD). "Only the AfD can save Germany," he said. Leader of the party, Alice Weidel, thanked Musk for his "note" and said "the Alternative for Germany is indeed the one and only alternative for our country; our very last option," in a post retweeted by Musk. When asked by the BBC to comment on Musk telling Germans how to vote, Berger said: "I think Elon Musk - before giving unwanted advice to German citizens - he should look at the responsibility of his own platform".
