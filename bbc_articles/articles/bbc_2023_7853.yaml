  Ant and Dec are among the celebrity guests arriving at Westminster Abbey for the Coronation.

  TV presenters Ant and Dec, Dame Judi Dench, Dame Joanna Lumley and Stephen Fry are among those attending the coronation of King Charles III.

  You can watch full highlights of the Coronation now, on BBC iPlayer.
