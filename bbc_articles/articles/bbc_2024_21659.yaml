title: 'Bronson Battersby death: IOPC finds no breach of police standards - BBC News'
date: '2024-09-12'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/cwyxyqvy5dro
content: |-
  The police watchdog ends its probe into the deaths of Bronson Battersby and his father in Skegness.

  Police 'did not breach standards' over boy's death

  Bronson Battersby was found dead between the legs of his father, Kenneth, in January

  An investigation into the deaths of a two-year-old boy and his father in Skegness found "no indication" of a breach in police standards, a watchdog has said. Bronson Battersby was found between the legs of 60-year-old Kenneth Battersby at a property in Prince Alfred Avenue, Skegness, on 9 January. Lincolnshire Police referred itself to the Independent Office for Police Conduct (IOPC) which then launched a six-month investigation. Derrick Campbell, the IOPC regional director, said a report had been shared with Lincolnshire Police and the coroner to "inform future inquest proceedings".

  He said: "This is a harrowing case, and our sympathies go out to everyone affected by the sad deaths of Bronson and Kenneth. "It was appropriate we carried out a thorough investigation into the relevant contact between police and social services. "We have concluded that there was no indication any Lincolnshire Police officer or member of staff may have breached police professional standards." The IOPC also confirmed it had met the families involved to explain its findings and had advised the local child safeguarding practice review.

  An inquest into the deaths heard the two-year-old had died from dehydration

  A rapid review was launched in January following the discovery of the two bodies. At the time, it was revealed the family was known to children's services and the local authority confirmed a social worker had had "contact" with Mr Battersby on 27 December and had arranged a home visit for 2 January. But when that appointment was missed, the police were contacted and the social worker also tried to make contact on 4 January and followed it up again five days later. In June, an inquest opened at the Mile Cross Centre in Lincoln and heard Bronson had died from dehydration and "appeared to be quite malnourished". Coroner Paul Smith described the investigation as "thorough and sensitive" and adjourned the full hearing until 10 December.
  • None 27 December 2023: A social worker "has contact" with Mr Battersby and a home visit is arranged
  • None 2 January 2024: The social worker arrives at the property but there is no response at the door. She tries to locate Bronson at other addresses and unable to find him, speaks to her manager and the police
  • None 4 January: A second attempt at a home visit is made. Again, there is no response. The social worker informs police
  • None 9 January: A third attempt is made and the social worker alerts Mr Battersby's landlady. Entry is gained and the bodies of both father and son are found
  • None 15 January: LCC notifies the Child Safeguarding Practice Review Panel (CSPRP) of a serious incident that meets the criteria for rapid review
  • None 17 January: LCC confirms a review is under way and Lincolnshire Police says it has referred itself to the IOPC
  • None 20 February: Lincolnshire Safeguarding Children Partnership announces an in-depth independent review supported by the CSPRP
  • None 6 June: Inquest hears two-year-old Bronson died from dehydration. Hearing is adjourned until December
  • None 12 September: IOPC confirms investigation into Lincolnshire Police has found "no indication" of a breach in police professional standards Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
