id: bbc_2018_1554
title: Liam Fox questions Labour's customs union stance - BBC News
date: '2018-02-25'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43189392
content: |-
  Liam Fox says Labour's position on joining a customs union with the EU is not clear.

  International Trade Secretary Liam Fox has said he UK can only strike its own trade deals if it is not part of a customs union.

  Earlier Shadow Brexit Secretary Sir Keir Starmer said Labour has "long championed" being in a customs union with the EU.

  Speaking to the BBC's Andrew Marr, Liam Fox said Labour's position was not clear.
