title: Ed Sheeran and Cherry Seaborn announce birth of daughter Lyra - BBC News
date: '2020-09-01'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-53983387
content: |-
  The singer tells fans his wife has given birth to daughter Lyra, their first child.

  Ed Sheeran and his wife Cherry Seaborn have announced the birth of their first child - a daughter named Lyra Antarctica Seaborn Sheeran.

  The singer said the couple were on "cloud nine" after their daughter's arrival last week.

  Sheeran returned to Instagram for the first time since December to share the news and thank the "amazing delivery team".

  He added: "We are completely in love with her."

