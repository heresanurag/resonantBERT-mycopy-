  Former British Gen Sir Richard Barrons says there is a danger of Afghanistan feeling "friendless", in the wake of recent battlefield defeats and the possible withdrawal of diplomats and contractors from Kabul if things get worse.

  It is much too early to speculate about a Saigon-style withdrawal from the capital, echoing the way the Americans hastily left Vietnam in the final act of the war there, in 1975.

  But in recent days, British and American calls for their nationals to leave the country threaten to create a dangerous narrative.

  It is something that western military planners have been worried about for some time, following US President Joe Biden's decision, in April, to withdraw American forces by 11 September.

  In June, classified UK Ministry of Defence documents were found at a Canterbury bus stop by a member of the public. One of them voiced just this concern, speaking about the need to counter an "abandonment narrative" in Afghanistan.

  "Precise language may be needed," it said, "to avoid misunderstandings about 'retrograde to zero' vs normal diplomatic (including military) representation."

  "Retrograde to zero" is the peculiar euphemism used to describe the withdrawal process now in its final weeks. In other words, planners were only too aware of creating the dangerous impression that Afghanistan might indeed be left "friendless".

  That is not yet the case. American air strikes are still being used in an attempt to halt the Taliban's advances. Britain and the US will doubtless have hidden assets on the ground, working feverishly to stem the tide of the war.
