title: 'Cardiff: Boy, 13, arrested with suspected Class A drugs - BBC News'
date: '2022-04-27'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61244078
content: |-
  The teen was allegedly in possession of white powder, and a 17-year-old had a "Rambo-style" knife.

  Two teenagers allegedly found with drugs and a "Rambo-style" knife in Cardiff city centre have been arrested.

  A 13 year old, from Grangetown, Cardiff, allegedly found with bags of white powder, and arrested on suspicion of possession of Class A and B drugs.

  A 17 year old, from Caerau, Cardiff, was arrested on suspicion of possession of a knife in a public place.

  Officers were responding to reports of suspicious individuals gathering in the city centre.
