title: The remarkable recovery of Syria's earthquake baby - BBC News
date: '2023-08-06'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-66398976
content: |-
  Six months ago today, Afraa was pulled from rubble, still attached to her umbilical cord and barely alive.

  Six months after her rescue, Afraa is healthy and happy

  When Afraa was found in the rubble of a collapsed building in Syria, her umbilical cord was still attached to her mother, who had died just after giving birth. The video of the baby's rescue from the earthquake in February captivated the world. Since then she has made a remarkable recovery.

  Today, Afraa is six months old - a typical happy, healthy baby.

  Her aunt and uncle are raising her along with their seven children in the Syrian town of Jindayris, not far from the Turkish border.

  "She's still very young but she reminds me of her dad and her sister Nawara, especially her smile. They passed away in the earthquake too," says her uncle, Khalil al-Sawadi, rocking the smiling baby girl in her swing. "They would often spend time at ours."

  On 6 February, a devastating earthquake ripped through south-eastern Turkey and northern Syria, killing more than 44,000 people. Just after the devastating quake hit Jindayris, Afraa's mother went into labour and gave birth under the rubble of her home. She died before rescuers found them. Baby Afraa was the only member of her immediate family to survive - her father, Abu Rudaina, and her four siblings died, along with her mother.

  "We saw that Abu Rudaina's house had collapsed," says Khalil. "My wife started screaming: 'My brother, my brother'."

  Khalil recalls vividly the moment he pulled Afraa from under the rubble: "The roof had fallen over them. Someone called me and said they found a woman's body. As soon as I arrived, I started digging, then I heard a voice. It was baby Afraa still attached to her mother. We were determined to save her, we knew she would be the only memory left of her family."

  A dramatic video of the rescue was shared on social media and went viral. The baby was taken to hospital and was initially given the name Aya, which means miracle in Arabic.

  Afraa was treated in hospital after rescuers saved her from under the rubble

  The doctor looking after her said she had bumps and bruises and was barely breathing. Six months on, those injuries are no longer visible.

  "Immediately after the earthquake she had some chest problems because of the dust from the rubble, but now her health is 100%," says Khalil.

  But the past six months have been tough. When Afraa was in hospital, thousands of people around the world offered to adopt her, so Khalil and his wife Hala had to prove they really were related before they were allowed to take care of her. "I felt that they didn't want to hand Afraa to us," he says.

  Hala had to do a DNA test and waited "almost 10 days" to hear back.

  There had been so much interest in Afraa's story that Khalil and his family worried as they waited for the DNA results, that someone might try to kidnap her. They spent as much time as they could at the hospital and took extra precautions. "Both the civil and military police helped us protect her," he says. "There were lots of them. They stayed in the room next to Afraa and watched over her day and night."

  Eventually, the DNA results confirmed Hala was a blood relative - the sister of Afraa's father - and the little girl was discharged from hospital.

  Afraa is now living with her aunt, uncle and seven cousins

  One of the first things Khalil and Hala did was to give her a new name: Afraa, after her mother.

  "She is one of my children now," says Khalil. "I can't spend too much time away from her.

  "When she grows up, I will tell her what happened and show her the pictures of her mother, father and her siblings. We buried them the next day in a nearby village called Hajj Iskandar, where the Civil Defence had dug mass graves."

  Hala had been pregnant at the same time as Afraa's mum and three days after Afraa was born, Hala also gave birth to a baby girl. They called her Ataa after another auntie who died in the earthquake.

  But their home in Jindayris was so badly damaged that they couldn't live there any more. "It has big cracks and is not safe," says Khalil. "I lost my home and my car, it was like going back to square one. I can't even afford to send my kids to school."

  They lived in a tent in a camp for two months where life was "extremely difficult, it was very hot and we had two babies to take care of".

  Khalil has found a new home for his family, but is worried as he cannot stay in the house for long

  The family finally managed to find a house to rent where they now live, but they are afraid they won't be able to stay for long. "It is very expensive and I don't know if we will be able to keep it much longer as the owner needs it," says Khalil.

  People have offered to help them move to the UAE or the UK but he has turned them down. "Honestly, I was still worried [if I go abroad] they might take Afraa away from us."

  He reminds us that "there are people living under worse conditions in Jindayris".

  Drone footage shows the extent of the devastation in Jindayris

  His hometown was one of the worst-hit by the earthquake and thousands of other families found themselves in a similar predicament.

  At least 4,500 were killed in north-west Syria, where an estimated 50,000 families were also displaced, according to the UN.

  Delivering aid to the four million people living in this rebel-held area of Syria is extremely difficult, where most of the residents have already been displaced by the country's 12-year war.
