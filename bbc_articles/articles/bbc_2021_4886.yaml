title: 'Post Office scandal: Postmaster emotional as conviction is quashed - BBC News'
date: '2021-04-23'
section: General
url: http://www.bbc.co.uk/news/uk-wales-56862111
content: |-
  Noel Thomas was jailed for nine months in 2006 for false accounting.

  Four former postmasters from Wales are among 39 to have their convictions for stealing money quashed at the Royal Courts of Justice.

  Noel Thomas, Damian Peter Owen, Pamela Lock and Lorraine Williams were among hundreds convicted after a fault with the Post Office's Horizon computer system led to huge discrepancies in the accounts of several post offices.

  Mr Thomas from Gaerwen, Anglesey, was jailed for nine months in 2006 for false accounting after £48,000 went missing from his accounts.

  "It's been 16 years and it's not been easy. But you find out who your friends are," he said after hearing the news.
