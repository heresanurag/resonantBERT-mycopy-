title: NHS trust stops taking Worcestershire ADHD referrals due to backlog - BBC News
date: '2024-08-03'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/c035387dvzro
content: |-
  The trust has blamed a lack of capacity for being unable to cope with demand in its ADHD service.

  Dan Boatright-Greene said he understood the pressures the NHS was under but worried that stopping referrals would put people at risk

  An NHS trust has said it has stopped accepting referrals and carrying out attention deficit hyperactivity disorder (ADHD) assessments for adults in Worcestershire, blaming a lack of capacity. In a letter to patients, Herefordshire and Worcestershire Health and Care NHS Trust said its ADHD service was unable to manage demand, adding that a different approach was needed. The trust said it was accrediting other providers for GPs to send referrals to.

  County councillor Dan Boatright-Greene, who has ADHD, said he understood the pressures the NHS was under but worried that stopping referrals would put people at risk. “The detrimental impact this decision will have on mental health services is also a concern,” he said. “This is a short-sighted decision which will cause the NHS problems elsewhere. The whole system needs a rethink. That includes how we approach neurodiversity as a society.” Lisa Ventura, from Worcester, was awarded an MBE last year partly for her work around neurodiversity and said she was concerned about people on the waiting list who may need urgent support. “I know first-hand what living with ADHD is like without a diagnosis and without any support mechanisms in place,” she said. She added: “The urgency of the situation calls for prompt and decisive action. “Mental health is a critical component of overall wellbeing, and delays in assessment and treatment can have profound consequences on individuals’ lives.”

  A spokesperson for Herefordshire and Worcestershire Health and Care NHS Trust said patients would be contacted about arrangements to address the waiting list in the next few months. The trust added that it retained responsibility for all reviews currently open to them until 31 March 2025. “All new referrals from 1 August 2024 now come under Patient Choice (Right to Choose) which means that GPs can select an assessment from a number of providers,” they said. “These providers are currently being accredited by Herefordshire and Worcestershire Integrated Care Board.” Patients are being advised to contact their GP for support.

  This news was gathered by the Local Democracy Reporting Service which covers councils and other public service organisations.
