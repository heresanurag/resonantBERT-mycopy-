title: Sainsbury's and Morrisons run 'prohibited' tobacco advertising - BBC News
date: '2025-02-01'
section: Business
url: http://www.bbc.co.uk/news/articles/c4gxe40zky7o
content: |-
  Trading Standards says adverts for heated tobacco products are banned, but some supermarkets disagree.

  Advert for heated tobacco product on display in a Sainsbury's store in London

  Sainsbury's and Morrisons are displaying adverts for tobacco products in their stores which Trading Standards says are against the law. Video screens and posters promote devices that deliver nicotine by heating tobacco rather than burning it. The two supermarkets say they believe the laws banning tobacco advertising do not apply to the devices. Heated tobacco is less harmful than cigarettes, but experts say it is probably more harmful than vapes, and less effective at helping smokers quit.

  Tobacco adverts were banned in 2002. But if you walk into a Sainsbury's or a Morrisons you may well see adverts for iQos, a device that uses an electric current to heat tobacco. Some are on flashing video screens in places where they can easily be seen by children. The BBC has also seen adverts in Morrisons for a similar device called Ploom. Heated tobacco is different from vapes, which contain nicotine but no tobacco, and they are much less popular. But tobacco companies are keen to promote it as a new revenue stream to replace dwindling cigarette sales. The Chartered Trading Standards Institute (CTSI), which represents local authority trading standards teams, says the ads are "prohibited" by the 2002 law. CTSI says the issue has never been tested in court, so it cannot say conclusively that running them is illegal. "The only people who can definitively test it are the courts. Now the courts are chocka. Trading Standards is very stretched, and I think that's probably the reason why you're seeing more and more of these ads," Kate Pike, lead officer for tobacco and vaping at CTSI, told the BBC. "It's taking the mick, is my view." There is limited evidence regarding the health effects of heated tobacco, according to Prof Lion Shahab, co-director of the tobacco and alcohol research group at University College, London. "As it involves no combustion, heated tobacco is likely less harmful than cigarettes," he said. "Current findings suggest that heated tobacco may be more harmful than e-cigarettes, and less effective at helping smokers give up cigarettes long-term."

  In June 2018, then-health minister Steve Brine wrote to the company that makes iQos, Philip Morris International (PMI), to say advertising for it was "prohibited" and to ask them to "desist from such promotion in the future". Two months later, he wrote to thank them for "agreeing to comply with our request to stop advertising and promoting the iQos device". PMI says it only agreed to suspend advertising, not stop. A spokesperson said: "We maintain our view that communications regarding the iQos device at appropriate points of sale is lawful."

  Japan Tobacco International (JTI), which makes Ploom, said the 2002 law defines a tobacco product as something that is "smoked, sniffed, sucked or chewed", and because heated tobacco products do not produce smoke, they aren't covered by that definition. Morrisons cited the same argument. "On that basis, we are comfortable that it is legal for heated tobacco products to be advertised in store," it said. Sainsbury's said the ads were "in line with current tobacco legislation". Both supermarkets say they do not sell the devices to children. PMI and JTI say their heated tobacco devices are only intended for existing nicotine and tobacco users. Hazel Cheeseman, chief executive of Action on Smoking and Health, said supermarkets advertising these products was "disgraceful behaviour". "[It] puts pressure on overstretched enforcement services and risks introducing children and young people to new tobacco products." The government would not say whether it still thinks advertising heated tobacco is prohibited. A spokesperson said: "This government's landmark Tobacco and Vapes Bill will enhance existing legislation, including on advertising, and put us on track for a smoke-free UK." The forthcoming bill, external is expected to ban all advertising of nicotine and tobacco products including nicotine pouches and vapes. The UK's biggest supermarket Tesco said it does not run tobacco ads, while a spokesperson for Asda said it doesn't advertise tobacco products "in order to comply with current legislation as we understand it".
