id: bbc_2018_8802
title: Russian ambassadors react to Trump remarks at Helsinki summit - BBC News
date: '2018-07-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-44893576
content: |-
  Steve Rosenberg hears from ambassadors "amazed" at how Russia-US relations are being portrayed negatively.

  BBC Russia correspondent Steve Rosenberg speaks with Russian ambassadors about the aftermath of the Helsinki summit.

  Trump had come under fire for defending Russia against claims that they meddled in the 2016 US presidential elections.
