content: |-
  The first minister says only small steps to change the lockdown are possible to keep the rate of Covid-19's reproduction down.

  That's all from us today. Thanks for joining us for us our live coverage of the coronavirus pandemic in Wales on Saturday.

  Here's a round-up of the main stories in Wales today:
  • Public Health Wales has announced an additional nine deaths of people with coronavirus in Wales, bringing the total to 1,099.
  • First Minister Mark Drakeford has acknowledged extending lockdown is damaging people's sense of mental well-being.
  • Artists have been left in "real hardship" by the closure of venues and festivals, the Arts Council of Wales has warned.
  • Wales has followed England in offering financial help to dairy farmers hit by the outbreak.

  Join us from Sunday afternoon for all the latest updates from across Wales.
