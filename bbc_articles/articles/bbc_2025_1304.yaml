title: Central Cee makes history at Mobo Awards after seventh win - BBC News
date: '2025-02-18'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cdx2lv0kgndo
content: |-
  The rapper has matched Stormzy's record of seven awards, after winning best male act for the second year running.

  Central Cee is the first artist to win best male act at the Mobos three times

  Central Cee has made history at the Mobo Awards, becoming the first artist to be named best male act three times. It was his seventh trophy, matching Stormzy's record as the most decorated rapper in the awards' history. He did not attend the ceremony in person, with his prize instead collected by host Eddie Kadi who joked they "share everything... except royalties". The event in Newcastle also saw Bashy claim best album and best hip-hop act after a 15-year break from music and Darkoo beat off competition from Raye and Jorja Smith to be recognised as best female act.

  Accepting her award, Darkoo said she "tried Chat GPT" to write her speech "but I didn't know how to make it work", so instead freestyled and thanked her family for supporting her. "It's been a rollercoaster but they believed in me for the past year and I've been shutting it down."

  Darkoo also performed at the event, treating the audience to the song of the year - Favourite Girl

  Central Cee, also known as Cench, was previously named best male act in 2024 and released his debut album last month after eight top 10 singles. Reacting to his win on Instagram, he posted a screenshot of the awards' coverage with the comment "that's nice". He missed out on his other two nominations including best drill act, which went to Pozer, and song of the year which was won by Darkoo alongside her trophy for best female act. Despite not making breaking into the UK singles charts, the British-Nigerian artist won for Favourite Girl, a collab with Dess Dior, ahead of Stormzy's number one track with Chase & Status, Backbone, as well as Central Cee's collab with Lil Baby, Band4Band, which peaked at number three.

  Ayra Starr made history as the first African woman to win best international act

  Ayra Starr also scooped two awards, making history as the first African woman to win best international act and becoming the first woman to win best African music act in 16 years. Jamaican dancehall artist Vybz Kartel was also recognised with the Mobo impact award. He was released from jail last year after his murder conviction was overturned and at the weekend was confirmed to be performing at this summer's Wireless festival. "Think about this, got locked up, did 13 years in prison," he said while accepting his accolade. "Meanwhile I'm diagnosed with Graves' disease so I'm fighting to be free, I'm fighting my illness, I'm fighting to keep my family together, I'm fighting to keep the fans pleased. "And now I'm here, I walked the red carpet at the Mobo's. That taught me to believe in three things now more than ever: fate, change and forgiveness."

  Vybz Kartel attended the awards where he was honoured with the Mobo impact award

  The ceremony saw performances from Nova Twins, Spice, Krept And Konan and award winners Odeal, Darkoo and Bashy. Bashy, who returned to music after a 15-year break to focus on his acting career, won best hip-hop act as well as album of the year for Being Poor Is Expensive - an award he said he "wanted and deserved". "This has been a 20-year plus journey, it's been hard work, tenacity, a lot of ups and downs. "I stood in my truth, stood in my community's truth and now I'm here," he said on stage, making a point to thank the Windrush generation. "I'm just a regular guy from the ends. I was a bus driver, I was a postman, I worked in retail. So if you're out there and you're working a job to fund your passion, don't be ashamed of your job. "This is an amazing honour, I'm humbled."

  Bashy, real name Ashley Thomas, won two awards on his comeback to music after a 15-year break

  It was the first awards since Mobos founder Kanya King revealed she'd been diagnosed with stage four bowel cancer. Labour MP Dawn Butler became emotional as she announced Kanya would receive a surprise award, paving the way, which was also won by athlete and broadcaster Denise Lewis. Kanya came on stage to a standing ovation from the crowd, saying she felt an overwhelming sense of gratitude "because there was a time I thought I wouldn't make it". "Next year marks our 30th anniversary and I very much intend to be there."

  Kanya said her diagnosis was "a chance to inspire resilience and raise awareness"
  • None Album of the year - Bashy, Being Poor Is Expensive
  • None Video of the year - Mnelia, My Man
  • None Best performance in a TV show/ film - Jacob Anderson as Louis in Interview With The Vampire

