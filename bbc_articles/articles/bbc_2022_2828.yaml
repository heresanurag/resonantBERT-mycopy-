id: bbc_2022_2828
title: Woman stranded on Newquay cliffs rescued - BBC News
date: '2022-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-cornwall-60824505
content: |-
  Emergency services renew warnings to stay safe in the water and check tide times.

  Coastal safety warnings have been renewed after a woman who was stranded 10ft (3m) up a cliff face in Cornwall had to be rescued.

  The woman, who was on holiday at the time, was winched to safety by a coastguard helicopter at the weekend in Newquay.

  High tide was just two hours away and waves were crashing against the rocks when she called 999.
