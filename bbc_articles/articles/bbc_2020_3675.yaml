  Downing Street has now intervened after comments appeared on social media criticising the police for not observing distancing rules.

  "We would ask that everyone takes responsibility and adheres to social distancing rules so that we can safely show our appreciation for those who are working so hard to fight coronavirus," said the Prime Minister's official spokesman.

  Former Met and Surrey Police and Crime Commissioner Kevin Hurley was also critical.

  "This is about persuading the public to stay at home to save lives," he said.

  "How much better if the commissioner had just walked around the corner into one of the estates at eight o'clock and started clapping?"
