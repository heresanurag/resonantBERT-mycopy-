  Keely Hodgkinson sets her sights on breaking the 800m women's world record which has stood for more than four decades.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Keely Hodgkinson has set her sights on breaking the 800m women's world record which has stood for more than four decades. The 22-year-old won gold over the distance at the Olympic Games in Paris and has now targeted one of the oldest track world records. Czech athlete Jarmila Kratochvilova ran a record 800m time of one minute 53.28 seconds at Munich’s Olympic Stadium in July 1983. Hodgkinson's winning time in Paris was 1:56.72, but her confidence has soared since clocking 1:54.61 in London in July. Speaking at a special 'Team GB's Homecoming' event at Manchester's AO Arena, Hodgkinson said: "It's definitely something I've thought about since I raced in London. "I think that record has stood for so long. It's been a long time since anyone has hit [one minute] 53 seconds, so I'd love to do that. I think I can. I now believe I can do that."

  Olympic 1500m bronze medal winner Georgia Bell said she is still undecided about whether to become a full-time athlete. The 30-year-old only returned to running three years ago having fallen out of love with the sport. Bell still works for a cyber security software company in London. "I've been on a break over the summer to focus on the Olympics and the plan is to go back in September," she said. "Work have been super-supportive and we'll see what happens. I think it will be really difficult to balance both. So it's something I'm going to think about." Toby Roberts became the first Briton to win an Olympic medal in sports climbing after he dramatically took gold in the boulder and lead event in Paris. The 19-year-old said things had "been a bit of a blur" since and it still "feels surreal to have this medal round my neck right now". He added: "I've always seen myself as a climber who loves competing and to be among all these great athletes in this environment feels like a dream really."

  Team GB Homecoming by the National Lottery will be broadcast on BBC One on Sunday 18 August at 20:30 BST. It will be available for catch up on BBC iPlayer a day later.
