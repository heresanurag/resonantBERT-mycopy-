id: bbc_2018_6477
title: Drone light show in China breaks world record - BBC News
date: '2018-05-02'
section: General
url: http://www.bbc.co.uk/news/technology-43981145
content: |-
  More than 1,000 illuminated dancing drones have set a new Guinness World Record in a 13-minute flight.

  1,374 illuminated dancing drones have achieved the Guinness World Record for the most unmanned aerial vehicles in simultaneous flight.

  The stunning display in Xi'an, China, saw the drones take part in a 13-minute flight, spread over a kilometre.
