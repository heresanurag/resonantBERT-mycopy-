id: bbc_2018_5931
title: '''Hear our message'': Gaza border violence in pictures - BBC News'
date: '2018-05-15'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-44123116
content: |-
  Israeli troops killed 58 Palestinians protesting along the Gaza border on Monday.

  Monday was the deadliest day since violent unrest returned to the Gaza Strip border fence with Israel almost two months ago.

  Palestinian protests were fuelled by the opening of the new US embassy in Jerusalem.

  Israeli troops guarding the border killed at least 58 people and injured almost 3,000.

  Israel says some 40,000 Palestinians took part

  Israeli forces responded to protesters with tear gas and live fire from snipers

  About 2,700 people were injured, Palestinian officials say

  Monday was the deadliest day in Gaza since the 2014 war

  Israel said soldiers had fired on people carrying out "terrorist activity and not on demonstrators"

  There was fierce condemnation from some countries but Israel's key ally, the US, stood by it

  Tensions were high in Gaza on Tuesday as Palestinians prepared to bury their dead

  All images subject to copyright. Witness interviews by Reuters and AFP news agencies.
