title: 'Sri Lanka: Police fire tear gas as protesters storm PM''s office in Colombo
  - BBC News'
date: '2022-07-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-62147363
content: |-
  President Gotabaya Rajapaksa has fled the country, while a state of emergency has been declared.

  Police have fired tear gas as protesters stormed the prime minister's office in Colombo, amid Sri Lanka's worst economic crisis in decades.

  President Gotabaya Rajapaksa has fled the country - while the Prime Minister Ranil Wickremesinghe has been appointed acting president, according to the parliament's speaker.

