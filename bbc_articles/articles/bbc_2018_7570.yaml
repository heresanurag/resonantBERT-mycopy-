  Cristiano Ronaldo heads Portugal's goal in the 1-0 win against Morocco, making him the all-time leading European goalscorer in international football.

  Cristiano Ronaldo heads Portugal's goal in their 1-0 win over Morocco in their second Group B match, making him the all-time leading European goalscorer in international football with 85 goals.

