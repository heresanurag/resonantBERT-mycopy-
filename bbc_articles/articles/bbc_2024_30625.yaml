  After Isabella's death a local children's safeguarding practice review was launched, examining the multi-agency safeguarding approach prior to her death. It will be published once complete. A statement provided on behalf of Central Bedfordshire, Suffolk, and Norfolk safeguarding children partnerships read: "It is important we do all we can to learn from cases such as this to reduce the risk of similar cases occurring in the future. "We send our condolences to Isabella's family and our thoughts are with all those who knew and loved her at this extremely difficult time."

