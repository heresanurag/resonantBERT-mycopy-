title: Man jailed for life after murdering partner's toddler in Ipswich - BBC News
date: '2024-12-13'
section: England
url: http://www.bbc.co.uk/news/articles/c07gzr5r9eko
content: |-
  Jeff Scott and the child's mother wheeled her two-year-old daughter's body around in a pushchair.

  Isabella Jonas-Wheildon was found dead in a locked bathroom at the East Villas housing complex in Ipswich

  A man has been jailed for at least 26 years after killing his partner's two-year-old daughter and abandoning her body in a locked bathroom. Scott Jeff, 24, will serve a minimum term as part of a life sentence for the murder of Isabella Jonas-Wheildon, who was found with "traumatic injuries" in Ipswich on 30 June 2023. Her mother, Chelsea Gleason-Mitchell, 24, received 10 years in prison after admitting causing or allowing the death of a child. Ipswich Crown Court heard how the couple, from Bedfordshire, had wheeled Isabella's dead body around in a pushchair for days after her death on 26 June before fleeing from Ipswich.

  Scott Jeff and Chelsea Gleason-Mitchell were sentenced at Ipswich Crown Court following a seven-week trial

  The pair were also sentenced to three months each for cruelty to a child in relation to cannabis and six months each for cruelty to a child in relation to cocaine, to run concurrently. Gleason-Mitchell was found not guilty of murder at a trial in November. High Court judge Mr Justice Neil Garnham said: "There she was, a two-year-old child, totally dependent on the two of you. "Jeff, you subjected that defenceless little girl to a brutal campaign of violence and those attacks were monstrous. She feared what was going to happen next. "Gleason-Mitchell, you are a weak and spineless person and pathetically desperate. Isabella must have looked to you for your help but you did nothing. "It is perfectly clear to me that her killing has had a devastating effect on her family and the lives of all of them will be permanently disfigured. "You two are responsible for all this pain."

