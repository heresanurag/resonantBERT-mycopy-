content: |-
  The Duke of Sussex will give a reading at the thanksgiving service in St Paul's Cathedral celebrating the 10th anniversary of the games.

  The Duke of Sussex has arrived at St Paul's Cathedral in London for a thanksgiving service for the 10th anniversary of the Invictus Games. He was met on the steps by the dean of the cathedral.

  Prince Harry is visiting the UK from his home in California to celebrate the Games' anniversary.

  He founded the international sporting competition for injured service men and women in 2014.

  The duke's father, King Charles III, is also making a public appearance in London on Wednesday, but he will not meet Harry on his visit.
