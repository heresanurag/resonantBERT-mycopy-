title: Brexit panic not justified, says ex-Trump adviser Stephen Vaughn - BBC News
date: '2019-08-09'
section: Business
url: http://www.bbc.co.uk/news/business-49279139
content: |-
  A former US trade representative tells the BBC the UK has "enormous leverage" in any deal with Washington.

  This video can not be played To play this video you need to enable JavaScript in your browser. UK shouldn't be afraid of US farm exports, says former Trump adviser

  A former top trade adviser to US President Trump has told the BBC "there is a level of panic" around Brexit "that is not justified".

  Stephen Vaughn, who served as acting trade representative before becoming general counsel on trade, stressed the UK has "enormous leverage" in a potential trade deal with the US.

  On a deal's likelihood, he said the Trump administration is "ready to go".

  The UK will be able to strike its own trade deals only after leaving the EU.

  As a member of President Trump's negotiating team, Mr Vaughn had a key role in the talks with Canada and China, before leaving the administration in April.

  In reference to a potential UK deal, he compared the situation with US-Canada negotiations: "No one would say, 'Canada has to join the US in a union or Canada will get steamrolled by the US'."

  "You have an enormous amount of leverage, and we'll see how you use it," he added, speaking in his first broadcast interview since leaving the Office of the US Trade Representative.

  On US preparations for a potential deal with the UK, he said that Robert Lighthizer, the current US Trade Representative, had done all the preparations needed.

  However, he acknowledged that agreeing a deal could take "months or years".

  The US Trade Representative, sometimes shortened to USTR, is the president's top adviser on international trade. The team negotiates directly with foreign governments to create trade agreements and participate in global trade policy organisations.

  Concerns have been raised over the impact of a deal on life in the UK, including whether US drugmakers would demand the ability to sell to the NHS.

  Another key export for the US is agricultural products, but the fact farming methods in the US don't fall under the EU regulations has led some to worry about food standards.

  Could Boris Johnson and Donald Trump agree a trade deal together?

  Mr Vaughn emphasised that the US would like a deal to involve the expansion of farm exports, saying he doesn't think it's "something people should be afraid of".

  The trade expert, who now works in the private sector, also played an active role in the Trump administration's trade war with China.

  He said that a key aspect of those talks was to make sure the two sides comprehended each other: "You really just want to make sure everybody is understanding the issues and what is at stake."

  He added that the talks are very "serious" and there is no "yelling and screaming".

  Mr Vaughn stressed that the US is concerned about various Chinese practices and that it wants to see Chinese businesses become more "market-oriented".

  He went on to defend the use of tariffs against China: "You're trying to figure out, how do you get leverage on the other people?", he explained, adding that Mr Trump is not satisfied with the status quo he inherited.

  On the impact of tariffs, he rejected the idea that the measures may be having a negative effect on US business.

  "When you look at the actual data, we have by far the largest economy in the G7 and our manufacturing sector continues to grow," he argued.

  US business groups have called for a rethink on tariffs, including the National Retail Federation, which has complained about the administration "doubling down on a flawed tariff strategy".

  The former top adviser to President Trump, Gary Cohn, has also warned that the tariffs are backfiring.

  Speaking in an earlier interview with the BBC, Mr Cohn criticised the approach the Trump administration is taking against China, saying: "I think everyone loses in a trade war."

  Mr Cohn, who served as director of the National Economic Council in the Trump administration, announcing he was resigning after Mr Trump decided to impose import tariffs on steel and aluminium.

  Mr Vaughn became the acting USTR on Trump's inauguration day in January 2017, staying on until Mr Lighthizer was confirmed in May 2017. He served as Mr Lighthizer's general counsel until the end of April 2019.

  Before entering the White House, he was a partner at US law firm King & Spalding, a role to which he has returned.

  On his departure, a statement by Mr Lighthizer read: "Stephen has played a central role in shaping and implementing the President's trade policies."
