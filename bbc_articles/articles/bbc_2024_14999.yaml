  England refreshed their team in response to the 4-1 defeat in India and with an eye on planning for the Ashes in 2025-26. Atkinson was superb, bowling with high pace and little fuss to record the best match figures by an England bowler on debut since Fred Martin against Australia at The Oval in 1890. He also managed to trump Anderson’s career-best match figures of 11-71. Jamie Smith was tidy behind the stumps and impressive for his 70 on day two, while off-spinner Shoaib Bashir was not required to bowl in his first home Test. Perhaps most importantly for England, Stokes’ return to play a full part as an all-rounder provides balance that has been badly missing. His repaired left knee allowed him untroubled spells of eight overs in the first innings and 10 in the second. Still, the skipper would like a score with the bat – his four on Thursday was his fifth successive single-figure score in Tests. England will make at least one change for Nottingham, with Matthew Potts and uncapped Dillon Pennington vying to replace Anderson. At some point in the summer Mark Wood will come back into the Test reckoning. This was a chastening week for an inexperienced West Indies side. Concerns over their batting were realised and an exciting bowling attack was hampered by an injury to Shamar Joseph. The Windies do have form for shock results. They stunned England at Headingley in 2017 and at the beginning of this year produced one of the all-time great Test wins by beating Australia in Brisbane. They should improve as the series progresses, but England look too strong and anything other than a 3-0 series win should be regarded as a disappointment for the home side.

