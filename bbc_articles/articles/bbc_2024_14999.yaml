content: |-
  James Anderson ends his legendary international career in England’s crushing victory over West Indies in the first Test at Lord’s.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  First Rothesay Test (day three of five), Lord's: England won by an innings and 114 runs, take 1-0 lead in three-match series

  James Anderson ended his legendary international career in England’s crushing victory over West Indies in the first Test at Lord’s. Anderson, England’s all-time leading wicket-taker, took one of the four wickets to fall on the third morning as the hosts completed a rout by an innings and 114 runs. On an poignant day at the home of cricket, 41-year-old Anderson was given a guard of honour by both teams on his entrance to the field and was visibly moved by the standing ovation he received from the expectant crowd. The result was already in little doubt after West Indies had been reduced to 79-6 on the second evening, 171 away from making England bat again. Anderson bowled the first full over of the day and struck in his second, having Joshua da Silva caught behind. Gus Atkinson had Alzarri Joseph held at long leg to become the first England bowler to take a 10-wicket haul on Test debut since 1976, then bowled the swiping Shamar Joseph. The stage was set for Anderson, who somehow missed the chance for the fairytale finale when he dropped a caught-and-bowled chance off Gudakesh Motie. Instead it was Atkinson who had the final say when Jayden Seales was caught at deep square leg to leave West Indies 136 all out. It gave Atkinson 5-61 in the second innings and 12-106 in the match, the best figures by an England debutant in 134 years. The win halts a run of four successive Test defeats for England and gives them a 1-0 lead in the three-match series. Anderson immediately joins the England coaching team as a bowling mentor for the second Test at Trent Bridge, which begins on Thursday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  This has been a long goodbye for Anderson, who announced his intention to retire in May after talks with England captain Ben Stokes, coach Brendon McCullum and managing director Rob Key. Much of the week has been a celebration of his unparalleled career, one that has made him the most successful fast bowler to ever play Test cricket. This did not have the drama of the exits of his great friends Sir Alastair Cook and Stuart Broad. Cook made a century in his last Test against India, while Broad hit a six from the final ball he faced in Test cricket then sealed an Ashes draw with his final delivery against Australia at The Oval last year. On the same ground where he made his Test debut against Zimbabwe in 2003, Anderson was last down the pavilion steps. He walked between the two sets of players lined up on the outfield while the big screen showed his picture and a caption of “James Anderson The Greatest”. In a mix of England’s old and new, Atkinson, playing his first Test, and Anderson, in his 188th and last, bowled unchanged and in tandem throughout the hour of play on Friday morning. Anderson, as he has done so often, found movement down the Lord’s slope to take Da Silva’s edge, while Atkinson bounced out Alzarri Joseph and splattered the stumps of Shamar Joseph. With the last pair at the crease and one final wicket to take, the crowd sang Anderson’s name and cheered him to the crease, only for Motie’s chipped drive to pop out of the bowler’s left hand as he followed through. In almost comical scenes, with Motie somehow evading fielders and the whole ground willing Anderson towards his moment, celebrations were muted when Seales hooked Atkinson to Ben Duckett. Anderson led England from the field, soaking up the adulation, then was interviewed by his first Test captain Nasser Hussain in the England dressing room, pint of Guinness in hand. Anderson’s 3-32 leaves him with 704 Test wickets, third on the all-time list behind only spinners Muttiah Muralitharan and Shane Warne. It was England who decided to move on from Anderson, and now England must prepare for life without him.

