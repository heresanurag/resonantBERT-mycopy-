title: Girl, 15, dies in Southampton boat crash - BBC News
date: '2020-08-22'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-53874700
content: |-
  The teenager was one of four people seriously injured when a boat hit a buoy at a Southampton marina.

  A 15-year-old girl has died following a boat crash off Southampton.

  Twelve people were on board the rigid inflatable boat (RIB) when it hit a buoy near Netley, in Southampton Water, just after 10:00 BST, police said.

  Peter Brown, duty coxswain of Hamble Lifeboat, said passing boats had helped four people who required "urgent medical care" out of the water.

  All of those on board the RIB were taken to hospital where the teenage girl was pronounced dead.

  Her next-of-kin have been informed, Hampshire Constabulary said.

  A spokesman for the South Central Ambulance Service said no-one else involved in the crash suffered life-threatening injuries.

  The coastguard said it received multiple 999 and mayday calls following the crash near the entrance to the River Itchen.

  The Southampton Harbour Master was seen inspecting buoys in the stretch of water where the crash happened

  Officers have asked any that anyone who witnessed the crash or has footage of the incident to contact the police.

  The Marine Accident Investigation Branch (MAIB) has started an investigation into what caused the crash.

