title: Birmingham bin strike to continue as deal rejected - BBC News
date: '2025-04-14'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cd9ljx8qdqdo
content: |-
  The month-long walkout has seen bin bags and fly-tipped rubbish piled high on Birmingham's streets.

  The council declared a major incident at the end of last month (file photo from 3 April)

  A strike by bin workers in Birmingham is set to continue after the latest pay offer by the city council was "overwhelmingly" rejected. It follows a month-long stand-off between members of the Unite union and the Labour-run authority as bin bags and fly-tipped rubbish have piled high on streets. Unite said the city council's "partial" offer was "totally inadequate" and did not address the potential pay cuts for 200 drivers. The council has previously said the offer on the table was a fair one.

  Unite's national lead officer Onay Kasab said 97% of those who voted rejected the council's deal, on a 60% turnout. "They could see through what this so-called proposal meant, it simply failed to deal with all of the issues and it also nailed the lie," he said. The union's general secretary Sharon Graham said the rejection was "no surprise as these workers simply cannot afford to take pay cuts of this magnitude to pay the price for bad decision after bad decision".

  Unite's national lead officer Onay Kasab the latest deal had been rejected by 97% of those who voted

  The dispute centres around the council's decision to remove Waste Recycling and Collection Officer (WRCO) roles. The union argued that it was an important health and safety role and about 170 affected workers faced losing up to £8,000 annually due to the decision, with hundreds more losing out on the prospect of pay progression. A spokesperson for Birmingham City Council said the vote was "incredibly disappointing" but the authority's "door remains open". They claimed Unite's proposals focused on retaining a role that did not exist at other councils and could open up the council to more equal pay claims as refuse collection is a job overwhelmingly performed by men. The statement said a "fair and reasonable offer" was made while suggesting "every employee affected by the removal of the WRCO role could take an equivalent graded role in the council, LGV Driver training or voluntary redundancy packages."

  Speaking last week, councillors said with those deals in place no worker "need lose a penny". However, on Monday, Mr Kasab said the result of the ballot was proof that the dispute was more than "simply about 17 workers" - a number previously quoted by the council. He said: "This is about huge pay cuts and hundreds of people, it's time now for us all to sit down, no more negative briefing, and let's reach a negotiated resolution and solution." One refuse collector told the BBC on Monday that the mood among their colleagues was "powerful", while another said their sentiments remained unchanged. "As much as we want a resolution, none of us are willing to lose money," they added.

  Sadia Khan, from the Friends of Spark Green Park, said there was a "limit to how long this can go on"

  Local government minister Jim McMahon said the "deeply disappointing" result of the ballot would further add to the weeks of disruption. "The huge effort to clear the backlog has already seen over 11,000 tonnes of waste collected, and will now continue at pace to protect public health while the dispute remains ongoing," he said. At the end of March, the council declared a major incident, saying that some 17,000 tonnes of rubbish was lining the city's streets. Some residents have also reported an increase in rats and other vermin. Adam Yasin said his Mercedes had been "completely written off" just weeks ago because rats had chewed through electrical wires. The 33-year-old, from Balsall Heath, said: "Because of that certain wiring, the car wouldn't start. "They said they need to rewire the whole car but the insurance company said it was too expensive. "It has been really bad, especially where I live, there are a lot of restaurants there."

  Other councils, including those in Lichfield and Telford, have offered assistance to clean up the streets

  In recent days, military planners have been called in to help deal with the situation. Deputy Prime Minister Angela Rayner said that was not about "boots on the ground" but it would help get waste cleared. Other neighbouring authorities have also stepped in to help clear rubbish. "We've got over two-thirds of the rubbish cleared off the streets now, this week we'll start to see cleaning up the pavements and streets as well as the clearance of all of that rubbish, I'm very pleased about that," Rayner said. "The kids are off school - obviously it's Easter holidays, we want that rubbish cleared."

  Sadia Khan, the chairperson of Friends of Spark Green Park, said while she sympathised with those on strike, "rejecting another offer is just going to make the whole population a lot sicker". She said dead cats had been found in parks and that she suspected it was due to them eating rat poison left out to reduce the growing problem of vermin. "I know it's a financial crisis people are struggling to manage, and everyone deserves a better wage, but there's a limit to how long this can go on," she said. "How much can you can risk the health of a population? Over a million people will be very, very impacted by things if it carries on." Last week, Health Secretary Wes Streeting said he was very concerned by the public health situation in Birmingham.

  The council has come under fire for sending out leaflets about changes to recycling in the middle of the strike

  The local authority is facing criticism, meanwhile, for pressing ahead with plans to switch from weekly to fortnightly collections while the strike remains unresolved. Leaflets about the change have appeared in residents' letter boxes, but Martin Mullaney, a former councillor for the city's Moseley and Kings Heath ward, said the timing was "politically insensitive". The leaflets state residents will have a new green recycling bin to be collected fortnightly, a food bin to be collected weekly, and a black bin to be collected fortnightly on alternate weeks to recycling collections. Although an all-out strike began on 11 March, there have been a series of on-off walkouts since January and some residents have told the BBC they have not had recycling collected in 2025.

