content: |-
  Details and reaction as First Minister Mark Drakeford gives a live televised briefing.

  Retailers in Wales should not encourage people "to all rush to the shops together' for post-Christmas sales, the first minister says.

  “It isn't just the risk when you're in a shop, it's everything that goes with people travelling, people mingling outside - all of those things add to risks," Mark Drakeford said.

  “We have worked very hard with the retail sector and others to try to find a pathway through to Christmas where those shops can stay open because I understand that if you're selling goods for Christmas, you need to sell them before the 25th of December.

  “But beyond Christmas there seems to be much less of a case for the need to try and encourage people to come together in large numbers and run the risks that will inevitably be there."

  Mr Drakeford urged shops to “go on doing all the things that they have done very carefully already".

  But he also asked them to "think carefully about whether or not patterns of sale beyond Christmas can be smoothed out, done over a longer period, rather than encouraging people to all rush to the shops together".

