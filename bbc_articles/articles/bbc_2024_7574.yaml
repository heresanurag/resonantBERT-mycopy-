title: Lone police officer shot dead Sydney attack suspect - BBC News
date: '2024-04-13'
section: General
url: http://www.bbc.co.uk/news/world-australia-68805653
content: |-
  Assistant commissioner Anthony Cooke confirms five people, in addition to the attacker, were killed.

  Police have confirmed that six people have died and several are in hospital after a stabbing attack at a Sydney mall.

  The death toll was revised upwards after this press statement was filmed.

  Assistant Commissioner Anthony Cooke also said that a small child was among those injured.

  The attacker was shot dead by a lone police officer who arrived at the scene and located the perpetrator.

  Read more on this story.
