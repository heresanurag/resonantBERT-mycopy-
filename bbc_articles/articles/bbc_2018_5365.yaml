title: Alabama 'miracle' boy wakes before doctors pull plug - BBC News
date: '2018-05-07'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-44032831
content: |-
  A 13-year-old with brain trauma regains consciousness as doctors were about to end his life support.

  This video can not be played To play this video you need to enable JavaScript in your browser. Trenton McKinley is now on a slow recovery process - half his skull must be re-connected

  A 13-year-old boy in the US state of Alabama regained consciousness just after his parents signed the paperwork to donate his organs.

  Trenton McKinley suffered severe brain trauma when he fell from a car trailer which flipped over and hit his head.

  Doctors told his parents he would not recover and that his organs were a match for five children who needed transplants.

  A day before his life support was to end, Trenton showed signs of awareness.

  The teenager suffered seven skull fractures in the accident in Mobile, Alabama, in March.

  According to his mother, Jennifer Reindl, Trenton has since undergone several craniotomy surgeries, suffering kidney failure and cardiac arrest.

  At one point, Ms Reindl said, Trenton died on the table for 15 minutes, after which doctors told her he would "never be normal again".

  Ms Reindl told CBS News that she agreed to sign the organ donation papers when she learned her son's organs could save five other children.

  "We said yes, that also ensured that they would continue to keep Trenton alive to clean his organs for the donation," Ms Reindl said, recalling how her son regained consciousness in March.

  "The next day he was scheduled to have his final brain wave test to call his time of death, but his vitals spiked so they cancelled the test."

  Trenton says he does not remember anything from the accident

  Trenton is now going through a slow recovery process.

  "I hit the concrete, and the trailer landed on top of my head. After that, I don't remember anything," he said.

  He still has nerve pain and seizures, and will need surgery to reconnect half of his skull.

  He has been walking and talking, even reading and doing maths, Ms Reindl said, calling it "a miracle".

  Trenton himself told WALA he thought he was in heaven while he was unconscious.

  "I was in an open field walking straight," the 13-year-old said.

  "There's no other explanation but God."
