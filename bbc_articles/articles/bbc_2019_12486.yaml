title: Airport catering truck spins out of control - BBC News
date: '2019-10-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49897529
content: |-
  A worker had to intervene after a catering truck lost control at O'Hare International airport in Chicago. American Airlines is investigating the incident.
