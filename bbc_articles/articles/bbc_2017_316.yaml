title: Australian baby Brian Junior weighs in at 6.06kg - BBC News
date: '2017-01-25'
section: General
url: http://www.bbc.co.uk/news/world-australia-38743296
content: |-
  Brian Junior was born in Melbourne and weighed in at 6.06kg (13.5lb) and was 57cm long.

  His mum, who always wanted "a little fat baby" says she was shocked to find out he was twice the size of an average baby.
