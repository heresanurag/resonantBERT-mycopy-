title: Delayed orchestra's impromptu airport gig - BBC News
date: '2018-09-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-45633552
content: |-
  When stuck in Geneva Airport, these professional musicians decided to treat their fellow passengers.

  As their easyJet flight to Venice was delayed by an hour, the Camerata of Léman orchestra chose to play a spontaneous concert for other passengers stuck in Geneva Airport.
