title: Boy charged after girl found stabbed near A63 in Hessle - BBC News
date: '2024-11-02'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/c4g7880646jo
content: |-
  A 14-year-old boy is charged with attempted murder after a girl was found seriously hurt at Hessle.

  The girl remains in hospital where she is receiving treatment

  A boy has been charged with attempted murder and possession of a bladed article after a 13-year-old girl was stabbed, police said. The teenager was discovered with stab wounds and lacerations to her neck, abdomen, chest and back near the A63 in Hessle at about 06:50 GMT on Friday. The 14-year-old boy has been remanded into custody to appear at Hull Magistrates Court on Monday. Six teenagers were arrested on suspicion of attempted murder in a wooded area nearby in connection with the incident.

  Three boys, aged 15, 16 and 17, and two girls, aged 14 and 15, have since been released on police bail. The injured girl remains in a serious but stable condition in hospital, Humberside Police said.
