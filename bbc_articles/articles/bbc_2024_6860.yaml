content: |-
  It's the second year that the West End will be adorned in lights marking the Muslim holy month.

  Lights marking Ramadan have been switched on in London's West End.

  It was the second year that central London has been adorned in lights for the Muslim holy month.

  The idea came from Aisha Desai, a young Muslim from north London, who created her first Ramadan lights display in Finchley inspired by her love of Christmas lights.

  The lights are due to be switched on every evening for 30 nights until Eid in April.
