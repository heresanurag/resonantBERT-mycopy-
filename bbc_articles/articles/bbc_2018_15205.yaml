content: |-
  Here are the eight most popular news stories on the BBC website this year. What could be number one?

  Chanin "Titan" Vibulrungruang, one of the 12 boys rescued from a Thai cave - but where are they on our list?

  As everyone knows, Christmas is a time for lists, so we decided to pull together one of our own.

  We took a look through our statistics since 1 January and found the eight articles and live pages that got the most page views this year.

  And no, your eyes aren't deceiving you - not one of our best-read stories this year is about Donald Trump...
