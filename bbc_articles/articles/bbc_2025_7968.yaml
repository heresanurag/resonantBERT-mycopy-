  Lincolnshire Police say officers investigating the cause of the blaze are "keeping an open mind".

  Two dead after caravan fire at holiday park

  Emergency services were called to Goldenbeach Holiday Park in the early hours of Saturday

  Two people have died following a fire at a caravan park in Lincolnshire. Emergency Services were called to Goldenbeach Holiday Park, Roman Bank, Ingoldmells at about 03:53 BST on Saturday, Lincolnshire Police said. Lincolnshire Fire and Rescue said five crews from Skegness, Wainfleet, Spilsby and Alford attended the scene with two crews still on site. A police spokesperson said the investigation into the cause of the blaze was "at the very early stages" and said officers were "keeping an open mind".

  Lincolnshire Fire and Rescue said two crews were still on site

  The force said the next of kin of two people who died had been informed and were being supported by specially trained officers. National Grid said following the fire its engineers had disconnected and isolated the electricity supply in the area to allow the police and fire service to carry out their investigation. "We will be working to restore power to 50 locally affected customers as soon as those investigations have been completed," a spokesperson for the National Grid said. East Lindsey District Council has asked members of the public to avoid the area to allow emergency crews to work safely.

