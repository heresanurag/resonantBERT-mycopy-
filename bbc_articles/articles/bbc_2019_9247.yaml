  Later in life he put his efforts into environmentalism, and in 2012 he co-produced The Big Fix - a film about the explosion of the BP oil rig Deepwater Horizon.

  Born in 1940 in New York City, Fonda lost his mother when he was 10 years old.

  On his 11th birthday, he accidentally shot himself with a rifle and almost died.

  He later discussed the incident with The Beatles' John Lennon and reportedly inspired the line "I know what it's like to be dead" in their song "She said She Said."

  On his website he said: "Part of my lifestyle you should all remember is having fun. Being funny is a big part of it. After all, if one is in tune, funny is the tune to play. Giving laughter is more fun than giving advice. Giving laughter while giving advice is the jackpot."

  "While we mourn the loss of this sweet and gracious man, we also wish for all to celebrate his indomitable spirit and love of life," the family's statement said.

  "In honour of Peter, please raise a glass to freedom."
