  Still, the real impact of Ms Harris and Mr Walz’s sit-down won’t be known until it is done. Ms Harris’s record with high-pressure interviews is mixed. A 2021 conversation with NBC’s Lester Holt, in which she fumbled through questions about her role in the administration’s border policy, was widely regarded as a failure. But in a more recent appearance, a one-on-one with CNN’s Anderson Cooper, in which she defended Mr Biden’s calamitous debate performance, Ms Harris looked calm and confident amid a political firestorm. If this high-stakes CNN joint interview falls into the latter category, then the Harris campaign will hope much of the criticism will fall away, said Mr Felkel, the Republican strategist. “They just need to be able to say ‘See, we told you,’” he said. “And then keep moving.”
