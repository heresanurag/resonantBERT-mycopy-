  It is the same on the pitch. Since Al-Ettifaq's 1987 title, only two clubs have broken the stranglehold of the big four - Al-Fateh and Al-Shabab, who finished seventh and eighth last season. Al-Taawoun actually took fourth, but will be hard-pressed to repeat that feat. Steven Gerrard led Al-Ettifaq to sixth and has since brought in goalkeeper Merek Rodak from Fulham. Much attention will be on Al-Qadsiah, promoted last season. The team from the eastern city of Al-Khobar were taken over by Aramco, the country's state-owned oil company - one of the richest in the world in terms of revenue. Robbie Fowler was fired despite eight unbeaten games at the start of the season, and his successor Michel led the team to the top tier. In order to compete, the club have been busy. In attack Pierre-Emerick Aubameyang has come in from Marseille, and he is joined by Spanish centre-back Nacho who signed from Real Madrid. There is a strong Spanish-speaking contingent with Mexican international Julian Quinones, Andre Carrillo from Peru, Uruguay's Nahitan Nandez and Argentina Under-23s midfielder Ezequiel Fernandez.
