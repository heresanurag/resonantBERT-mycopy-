content: |-
  Saudi Arabian clubs lavished about £700m on bringing the world's biggest stars to their league last summer - so why does the spending appear to have stopped?

  What has happened to Saudi Pro League's big spending?

  The 2024-25 Saudi Pro League season kicks off on Thursday, 22 August. A year ago, it seemed there was a star player arriving in Riyadh, Jeddah and elsewhere on a daily basis. In all, more than £700m was spent on the likes of Neymar, Karim Benzema and Riyad Mahrez among others who joined Cristiano Ronaldo in the Middle East. If there were expectations that this summer would be as free-spending as the last, they have not yet been met, though there has been a general downturn in the wider transfer market. "It has been a relatively quiet summer across global football," Simon Chadwick, professor of sport and geopolitical economy at Skema Business School in Paris, told BBC Sport. Chadwick attributes it to "a combination of harsh economic conditions, the late finishing of continental national team tournaments, and clubs across various territories trying to navigate local financial regulations".

