title: Gerry Adams says BBC response to his complaint over a report was 'insulting'
  - BBC News
date: '2025-05-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cy704m3z0yeo
content: |-
  Former Sinn Féin president Gerry Adams is giving evidence on the third day of his libel case against the BBC in Dublin.

  Adams 'insulted' by BBC response to his complaint over murder allegations

  Gerry Adams, pictured on Thursday, is giving evidence for the third day of his libel case against the BBC

  The former Sinn Féin president Gerry Adams has said he was insulted by the BBC's response to his complaint about a Spotlight programme dealing with the murder of informer Denis Donaldson. Mr Adams is suing the BBC for damages at the High Court in Dublin. The programme, and an accompanying online article, alleged he sanctioned the murder of Mr Donaldson in 2006, an allegation Mr Adams denies. The 76-year-old has been giving more witness evidence on the third day of a case which is expected to last four weeks.

  On Thursday, his lawyers read out correspondence between his solicitors and the BBC after its story in 2016. They stated the allegation was spurious and not supported by An Garda Síochána (Irish police). It accused the BBC of being motivated by malice and sensationalising its broadcast with a "gratuitous" reference to Mr Adams to boost ratings. Mr Adams pointed out that an article remained on the BBC website with the headline "Gerry Adams 'sanctioned Denis Donaldson killing"'. The BBC's lawyers rejected the remedies sought by Mr Adams. The corporation said it was satisfied the programme was the product of responsible journalism which followed its editorial guidelines. Mr Adams said: "The headline on the website was very clear."

  Adam Smyth, Director of BBC Northern Ireland, pictured outside the High Court in Dublin on Thursday, is attending the hearings

  Mr Adams was asked by his barrister for views on the BBC's response. "The BBC doubled down on the allegations." He claimed it had "dismissed" efforts to resolve the issue , adding: "That is what has us all here today." Mr Adams then read out a press statement he had issued immediately after Mr Donaldson's murder. It stated he condemned the murder "without reservation" and that it was carried out by people opposed to the peace process. The Real IRA admitted the murder in 2009.

  During pre-trial hearings, the BBC argued the broadcast and publication were put out in good faith and concerned a matter of public interest. It stated the reports constituted responsible journalism as a result of careful investigation.

  Mr Adams was the former president of republican party Sinn Féin from 1983 until 2018. He served as MP in his native west Belfast from 1997 until 2011 before sitting as a TD (Teachta Dála) in the Dáil (Irish parliament) between 2011 and 2020. Mr Adams led the Sinn Féin delegation during peace talks that eventually brought an end to the Troubles after the signing of the Good Friday Agreement in 1998. He was detained in the early 1970s when the government in Northern Ireland introduced internment without trial for those suspected of paramilitary involvement. Mr Adams has consistently denied being a member of the IRA.

  Denis Donaldson was a key figure in Sinn Féin and worked closely with former leaders Martin McGuinness and Gerry Adams

  Mr Donaldson was once a key figure in Sinn Féin's rise as a political force in Northern Ireland but he was found brutally murdered in 2006 after it emerged he had been a spy. He was interned without trial for periods in the 1970s. After the signing of the Good Friday Agreement, Sinn Féin appointed Mr Donaldson as their key administrator in the party's Stormont offices. In 2005 Mr Donaldson confessed that he was a spy for British intelligence for two decades, before disappearing from Belfast. He was found dead in a small, run down cottage in Glenties, County Donegal. After Mr Adams had given his evidence, the judge, Mr Justice Alexander Owens, told the jury that some legal issues would be dealt with before the BBC barristers began their cross-examination. The case is due to continue on Friday.
