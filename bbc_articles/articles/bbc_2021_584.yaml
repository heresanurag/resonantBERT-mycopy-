  The UK's unemployment rate rose to 5% in the three months to November, up from 4.9%, as the pandemic continued to hit the jobs market. In November, Chancellor Rishi Sunak said unemployment could peak at 2.6 million by the middle of this year - that's 7.5% of the working population.

  The EU has been criticised for a slow vaccine rollout - which is partly down to delays from manufacturers Pfizer and AstraZeneca (although the latter's jab hasn't actually been approved in the EU yet). Now the EU says vaccine makers must provide "early notification" when they want to export vaccines outside the bloc. This could mean more doses stay inside the EU. The UK minister responsible for vaccine deployment, Nadhim Zahawi, has said he is confident Pfizer - which manufactures its vaccine in Belgium - will deliver for both the UK and the EU. This tweet is from the EU's health commissioner.

