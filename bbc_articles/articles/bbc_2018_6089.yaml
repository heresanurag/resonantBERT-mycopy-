  The picture was on display at the university's school of geography, as part of a series of portraits of "outstanding female graduates" from the department.

  "It has now been taken down and will be re-displayed so it can be seen as intended," said a statement from the university.

  "We remain proud of her success and that of all the graduates celebrated in the display."
