  The Universities Minister Sam Gyimah entered the argument on Twitter, saying it was "utterly ridiculous" that "even portraits are being no-platformed".

  He said the university faculty "should get a grip" and "put the portrait back in a more prominent place".

  Mrs May's government last week promised to protect free speech in university - and above her portrait in Oxford an invitation had been added: "Free space - share your thoughts."

  Messages added to the picture included "school of geography and hostile environment?" and a picture of Mrs May and Donald Trump captioned "complicit relationship".

