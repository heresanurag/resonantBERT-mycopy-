title: Celtic, Rangers & Well face SPFL charge over fan pyrotechnics - BBC Sport
date: '2024-12-06'
section: Scottish Football
url: http://www.bbc.co.uk/sport/football/articles/c3e38qw94vno
content: |-
  Motherwell and Rangers fans set off pyrotechnics at Hampden that delayed kick-off

  Brendan Rodgers says "it's right they look into it" after Celtic as well as Motherwell and Rangers were charged by the SPFL over the use of pyrotechnics. The clubs are facing potential fines after the extensive "irresponsible" and "unacceptable" use of flares by fans during last month's Premier Sports Cup semi-finals at Hampden. All three will be called before an independent panel at a hearing early next year. A specific law banning the use of pyrotechnics inside stadiums in Scotland was introduced in 2023. Celtic's match with Aberdeen was delayed by 14 minutes after fireworks and flares were set off. "Safety is of paramount importance, for firstly the people in the stands," said Rodgers.

  "I always worry for the people in that area when they are going off. When you're young sometimes you don't see the dangers but that's a concern for me, especially our own supporters. "My concern is then also for the players. When you're preparing for a game, it's detailed to the second so you're ready to go. We had a 14-minute delay in that semi-final. That can be the cause of someone getting injured, particularly this time of year. You're standing about waiting, the body is cold again and muscles are at risk. "These are the little things you would never think about when you're holding the flare. I don't see what it adds to the game. It's right they look into it and try to stop it, hopefully." The following day's game between Rangers and Motherwell was also delayed by five minutes after both sets of fans set off pyrotechnics. And Rangers manager Philippe Clement said: "It's not safe. It costs the club money. We want to use that money in a better way that we can do the right things with the squad, that the squad becomes better and the fans can be happy with the squad. "It doesn't help in any sense towards the team."

  The SPFL said that, although "it was fantastic to have over 80,000 supporters attend" the League Cup semi-finals, "the large-scale, organised and illegal pyrotechnics displays which were carried out by a small minority of supporters before the Celtic v Aberdeen and Motherwell v Rangers matches were totally unacceptable". The governing body said in a statement: "This irresponsible behaviour caused significant inconvenience to thousands of fans at the game and to supporters watching worldwide. "The SPFL, Scottish FA, Police Scotland and other organisations have been clear that such use of pyrotechnics is illegal and poses clear dangers and health and safety risks to fellow supporters, players and those working at matches. "There have been a number of complaints from supporters about these incidents and the SPFL and Scottish FA have been in ongoing discussions with the clubs involved in the weeks since the semi-finals." Celtic are due to face Rangers in the League Cup final at the national stadium on 15 December, when a capacity crowd is expected. "The SPFL and Scottish FA will continue to work closely with the finalists in the build up to this showpiece occasion to reinforce the importance of ensuring a safe and enjoyable match day experience for all supporters, in the context of what is now an ongoing disciplinary process," the SPFL added. League rules state that each club, "so far as is reasonably practicable", must ensure that supporters do not engage in "unacceptable conduct"; that they identify any fans who engage in such conduct at a match; and take "proportionate disciplinary measures" on such supporters.
