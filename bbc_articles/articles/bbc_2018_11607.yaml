id: bbc_2018_11607
title: Ramsgate boys, 15, held over 'extreme right' terror - BBC News
date: '2018-09-20'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-45589213
content: |-
  Police say they will confront "all ideologies" after detaining the boys at their homes.

  Two 15-year-old boys have been arrested on suspicion of planning to carry out far-right terrorism offences in Kent.

  Police said the pair, both from Ramsgate, were arrested at their home addresses on suspicion of preparing for terrorist acts.

  Both of the teenagers are being questioned at a police station in the South East.

  The South East Counter Terrorism Unit has confirmed the alleged offences involved far-right ideology.

  Det Supt Nigel Doak said: "We treat the threat from the extreme right in exactly the same way as any other threat."

  He said the arrests were planned and intelligence-led, and there was no immediate threat to the public.

  "We are committed to tackling any and all ideologies which pose a threat to the public's safety and security," he added.

