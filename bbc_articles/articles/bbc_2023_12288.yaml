  Anti-discrimination body Kick It Out said it welcomed Fifa's action but COO Hollie Varney added: "There has been a complete lack of accountability and it is now up to international bodies such as Fifa and Uefa, or the Spanish government, to try and resolve these issues and ask whether those in charge at the Spanish FA are fit to lead."

  Match of the Day presenter Gary Lineker, who played for Spanish club Barcelona, said it was a "disgrace" that Rubiales has "taken all the attention away from the Spanish women's wonderful achievement".

  Fellow Match of the Day pundit Ian Wright, meanwhile, was critical of the lack of comment from European football's governing body Uefa, where Rubiales is a vice-president.

  "[Fifa's action is] good. But still silence from Uefa. No solidarity. No comment on the behaviour of their vice-president," he said.

  "Same Uefa whose president did not attend the Women's World Cup final where both teams represented the region. These are the same people in charge of leading the future of women's football."

  Aintzane Encinas, who played for Spanish club Real Sociedad for 13 seasons and is now a coach, told the BBC it was time that things changed.

  "I think it's a very, very important moment for Spanish football, and also for world football," she said.

  "Football is an incredible tool for transforming society, to showcase values like respect, ability and equality - we must use it.

  "We all stand with Jenni Hermoso - the whole world is speaking out about what's happening. We are united in this, and that makes me very proud."

  Barcelona manger Xavi Hernandez is among those speaking out. He posted on social media: "I want to give my unconditional support to Jennifer Hermoso and the players. I condemn the behaviour of the president of the Spanish Football Federation."

  20 August - During the ceremony following the World Cup final, Spanish forward Jenni Hermoso is first embraced and then kissed on the lips by Luis Rubiales.

  Hermoso later reacts to the kiss during a live stream and says she "did not enjoy" it.

  21 August - Rubiales issues an apology saying he is "sorry for those who were offended" after being fiercely criticised by other footballers, the media and even by the Spanish prime minister, some of whom called on him to step down.

  25 August - A defiant Rubiales insists at a RFEF emergency meeting that he will not resign, and calls the kiss "consensual".

  25 August - The Spanish government says it is beginning legal proceedings seeking to suspend Rubiales, with the Spanish secretary of sport saying he "wants this to be Spanish football's MeToo moment".

  25 August - Later that day, Hermoso releases a statement on Instagram rebuffing Rubiales' claims, saying that "at no time... was his kiss ever consensual".

  25 August - 81 Spanish players - including all 23 players who went to the Women's World Cup - announce they will not play for Spain's women's team until Rubiales is removed from his position.

  26 August - The Spanish football federation says it will take legal action against Hermoso over her "lies" about the kiss.

  26 August - Fifa announces it is provisionally suspending Rubiales pending the outcome of its disciplinary proceedings.

  No comment from Uefa but insiders 'incredulous' - Analysis

  In addition to his post as Spanish FA president, Luis Rubiales is also a member of the powerful executive committee of European football's governing body, Uefa.

  Even if Rubiales is eventually removed from his position with the Spanish FA, there is a possibility that he could remain on Uefa's executive committee until his run is due to end in 2027.

  Uefa has offered no public comment about the present situation, but speaking to people who are part of the organisation, there is incredulity from some that Rubiales has not resigned.
