content: |-
  More than 700 phones, laptops and USB sticks were also lost or stolen over the past two years.

  Machine guns and pistols among firearms lost by MoD

  A pistol, rifle and deactivated World War One machine gun were among the items lost or stolen from Ministry of Defence facilities over the past two years. Figures uncovered by the Liberal Democrats show more than 700 phones, laptops, computers and USB sticks also went missing over the period. The party's defence spokesperson Helen Maguire said the losses were "deeply concerning", especially "at this time of heightened global security tensions". The government said it has "robust policies and procedures to prevent losses and thefts".

  The number of firearms lost or stolen from MoD facilities in 2023, under the previous Conservative government, were revealed in response to a written parliamentary question by the Lib Dems. A deactivated World War Two Luger Pistol and Sten submachine gun were both lost in June 2023. In July 2023 an SA80 rife was also lost, along with a deactivated World War One German machine gun the following month, although both have subsequently been found. Meanwhile, a Glock 19 Pistol was stolen in December 2023. In his response, Minister for the Armed Forces Luke Pollard said the security of firearms was taken "very seriously" by the department, with all losses and thefts "fully and rigorously investigated". Figures for firearms which have been lost or stolen in 2024 are not available.

  The number of phones which have gone missing from the department has risen from 101 in 2023 to 159 in 2024, while for USB sticks the figure was 20 in 2023 and 125 in 2024. However, the number of laptops lost or stolen has fallen from 176 in 2023 to 138 in 2024. Some 25 computers were also lost or stolen in the past year. The government said proportionate security controls were used to protect electronic devices according to the nature of information they can hold. The Lib Dems called for an urgent inquiry into how the items were misplaced and what was being done to reduce losses and thefts. Maguire said: "The government is more butterfingered than Goldfinger when it comes to national security. "The loss of these crucial resources is deeply concerning - especially at this time of heightened global security tensions. "Sensitive national safety information may end up in the wrong hands, while precious public money is spent on replacements in the meantime. And the theft of dangerous weapons should seriously raise alarm bells when it comes to security." An MoD spokesperson said: "We take the security of defence assets extremely seriously and have robust policies and procedures to prevent losses and thefts. "If any assets are reported lost or missing due to suspected criminal activity, we take the necessary steps to investigate, prosecute and recover the items."
