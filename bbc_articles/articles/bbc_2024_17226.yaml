  Mayor of Mullingar-Kinnegad Municipal District Ken Glynn described the incident as "shocking and tragic". "I'm surprised and shocked, it's not something you would expect to hear in your own locality," Mr Glynn said. He said his thoughts and prayers are with the families of those involved in the incident and the first responders. "It is a difficult scene for emergency services to be attending," he said.

  The crash is said to have happened on a farm near a GAA club in Killucan

  Fr Stan Deegan, parish priest of St Brigid's Church in Raharney, told RTÉ News he was "shocked to hear the news". "Whoever the people are who are involved in the incident, and wherever they are from, I hope and pray that life will be spared," he said. "It is a serious event, and you would worry for the families involved. "The local community is a very hospitable one, with a good community spirit, and the people here would respond to local needs."
