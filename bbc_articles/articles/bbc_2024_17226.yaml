title: 'County Westmeath: Two people dead in helicopter crash - BBC News'
date: '2024-07-30'
section: Europe
url: http://www.bbc.co.uk/news/articles/cjqe8p7nqp5o
content: |-
  The incident happened at around 15.30 BST.

  The incident happened at a rural farm at around 15:30 BST

  Two people have died following a helicopter crash near Killucan, County Westmeath in the Republic of Ireland. The incident happened at a rural farm at around 15:30 BST. An Garda Síochána (Irish police) and emergency services responded to the incident. Two men on board the helicopter were pronounced dead at the scene. Gardaí are liaising with the family of one of the men, an Irish national aged in his 40s. Gardaí have said they may require the assistance of Interpol in establishing contact with the next of kin of the second man, who they believe is from eastern Europe.

  Both bodies have been taken from the scene to Regional Hospital Mullingar where post-mortem examinations will take place. The local coroner has also been notified. Westmeath Fire and Rescue Service and the National Ambulance Service have now left the scene which will remain persevered overnight.

