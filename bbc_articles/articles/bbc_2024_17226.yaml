  The Air Accident Investigation Unit (AAIU) is the authority for investigating air accidents and serious incidents in Ireland and it is the lead agency investigating the incident.

  A local hurling club has cancelled all training for Tuesday evening. Declan Weir, chairperson of Raharney Hurling Club, said the farm is very close to the GAA club. "There was camogie and hurling training there this evening, so we called it off as a mark of respect to the families," Mr Weir told BBC News NI. "That was our initial thing to do as a mark of respect to the families," he said. Mr Weir said people in the local community were "shocked and concerned" to hear the news of the crash. "There was relief at first to find out there was nobody killed in the farm building, but then shock and sadness, of course, when they found out that there were two men killed in the helicopter," he said. Mr Weir added: "I’m sure there’ll be prayers said and maybe a memorial or something for the families, locally."

  Declan Weir said people in the community are "shocked and saddened"

  Daryl Kennedy, secretary of Raharney Hurling Club, told RTÉ News: "Conditions today were perfect; there is a beautiful open landscape here, and whatever happened, it is quite unfortunate." Mr Kennedy offered thoughts and prayers with all those involved in the incident and emergency services.

  The Taoiseach (Irish Prime Minister) Simon Harris said he is being kept up-to-date on the crash and extended thanks to emergency services at the scene. In a post on X, formerly twitter, Mr Harris said he is "thinking of all those involved".

