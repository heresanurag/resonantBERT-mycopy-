title: WW2 bomb found near London City Airport blown up - BBC News
date: '2018-02-14'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-43058168
content: |-
  The 500kg device was discovered at the King George V Dock during planned work at London City Airport.

  A World War Two bomb that caused London City Airport to be closed earlier this week has been detonated off the Essex coast.

  The device was discovered at the King George V Dock on Sunday during planned work at the east London airport.
