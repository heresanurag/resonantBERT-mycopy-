title: 'Ipswich A14: Lorry hangs over dual carriageway bridge - BBC News'
date: '2019-06-07'
section: Suffolk
url: http://www.bbc.co.uk/news/uk-england-suffolk-48560286
content: |-
  The lorry is overhanging the A14 after tipping over on a bridge near Ipswich.

  The lorry toppled over during the evening rush-hour at the A12/A14 junction near Ipswich

  A lorry was left hanging over a dual carriageway after tipping over on a bridge.

  Traffic has been stopped on the eastbound carriageway of the A14 at Copdock near Ipswich.

  Suffolk Police said removal of the vehicle could take until Saturday morning, but disruption was likely throughout the weekend as repairs were carried out.

  The driver of the lorry was taken to hospital with minor injuries.

  Recovery teams worked to right the lorry cab

  Damage to safety barriers will be repaired over the weekend

  The crash happened at about 17:00 BST, affecting rush-hour traffic and thousands of people heading to a Rod Stewart concert at Portman Road on Friday night.

  Police said by 21:30 the cab had been righted but the body of the lorry was still on its side.

  Witness Roxy Louise Sier, who was held up in traffic shortly after the crash, said the lorry had been hanging "precariously" over the edge.

  She added that she saw firefighters rescue the driver through a window.

