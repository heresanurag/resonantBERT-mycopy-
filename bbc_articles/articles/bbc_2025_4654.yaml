title: 'Belfast building site ''swoop'': 36 people arrested - BBC News'
date: '2025-03-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c2d4wed5ywdo
content: |-
  The Home Office says 35 Romanian men and a 16-year-old boy were arrested as part of the operation.

  The Home Office said 35 Romanian men and a 16-year-old boy were arrested

  More than 30 people have been arrested at a construction site in Belfast's Titanic Quarter. The Home Office said that on Wednesday, its immigration enforcement officers, supported by the Belfast Harbour Police, "swooped" on the site. It said it was "acting on intelligence of illegal workers operating for a sub-contractor inside the premises". The Home Office said 35 Romanian men and a 16-year-old boy were arrested.

  The Home Office said alleged "offences ranged from working in breach of visa conditions to illegal entry in the UK with no permission to work". It said that a man was "also arrested on suspicion of assisting unlawful immigration by the Home Office's Criminal and Financial Investigation team". The Home Office said those arrested had agreed to leave the United Kingdom and "return to their home country or been placed on strict immigration bail conditions - and are now required to report regularly to the Home Office". "The 16-year-old boy has been referred to the relevant authorities for further investigation and support." The Home Office said the visit formed part of its enforcement action "to tackle illegal working in all its forms under the Plan for Change". Minister for Border Security and Asylum, Dame Angela Eagle, said the government was "cracking down on those who attempt to flout the rules by ramping up our enforcement activity right across the UK". "My message is clear: illegal workers, and those who employ and exploit them, will be caught and they will face the full force of the law," she said.

  The Home Office said it was "ramping up its enforcement action to ensure there is no hiding place from the law and rogue employers also face the full consequences, including fines of up to £60,000 and, in serious cases, a prison sentence". Paul McHarron, Immigration Compliance and Enforcement Northern Ireland lead, said it was committed to "clamping down on illegal workers and non-compliant employers". "Not only does illegal working undermine our immigration system and economy, but it's inextricably linked to extremely poor living conditions, inhumane working hours and below minimum wage," he added.
