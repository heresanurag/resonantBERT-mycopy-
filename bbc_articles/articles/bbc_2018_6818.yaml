  Who should start for England in Sunday's World Cup match against Panama? Pick your XI and see the most popular team so far.

  Last updated on .From the section World Cup

  We asked you who should play for England against Panama on Sunday - and you answered.

  As of 08:00 BST on Saturday, your most popular formation was 3-5-2, the tactic Gareth Southgate is likely to play in Nizhny Novgorod.

  And you really want Marcus Rashford to play, with the forward being the second most selected player - behind captain Harry Kane - in any position.

  It's not too late to get involved.

  Who would you pick if you were in Southgate's position?

  Pick your formation and starting XI - and don't forget to share your team on social media.
