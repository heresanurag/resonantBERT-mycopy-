title: 'Manchester United: Andre Onana analysis after Ipswich error - BBC Sport'
date: '2025-02-27'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/c1lppd1p9mzo
content: |-
  Manchester United's Andre Onana is in the spotlight as a result of his error against Ipswich - but how does he stack up against the man he replaced, David de Gea?

  Only three Premier League goalkeepers - Ipswich's Arijanet Muric, Robert Sanchez of Chelsea and Brighton's Bart Verbruggen - have made more errors leading to goals this season than Andre Onana

  Manchester United goalkeeper Andre Onana is in the spotlight again after his error led to Ipswich Town taking an early lead in their Premier League game on Wednesday evening. United rallied and eventually won the game 3-2 despite being down to 10 men, but the mistake has reignited the debate about the Cameroon international. The 28-year-old endured a tough start to life at Old Trafford but appeared to have turned a corner earlier this season when he had the most clean sheets in England's top flight with six. However, four minutes in to the game against the Tractor Boys, he illustrated why United fans and pundits have persistent doubts about him. He dashed to the edge of his penalty area as Patrick Dorgu ran towards him and, as the left wing-back nudged the ball towards where he expected Onana to be, it gifted Jaden Philogene with a tap-in. The former Aston Villa winger later scored his second of the night from a deep cross that deceived Onana because of Liam Delap's run across him. Speaking on TNT Sports, former Blackburn and Wales midfielder Robbie Savage said: "I've got no idea why Onana is running out to that position [for the first goal]. "Dorgu has got it under control, no problem at all. He shouldn't come there. "You should be talking, lay it back to him on his right foot and then he can clear it. I don't know why he's come." Former United defender Rio Ferdinand added: "It was a terrible start. Onana doesn't need to come. The full-back is in complete control and he can just hold his ground and let him play it back to him." On BBC Radio 5 Live, former Celtic boss Neil Lennon added: "I don't know where Andre Onana is going. It is a shambles."

  United paid £47m to sign Onana from Inter Milan in the summer of 2023 as a replacement for four-time club player of the year David de Gea. But he has largely failed to shake the view that his occasional fallibility adds to the fragility of a struggling side. Onana made several glaring mistakes in the Champions League last term that contributed heavily to United's early exit from the competition at the group stage. There had already been notable errors against Viktoria Plzen, Brighton and Nottingham Forest this season prior to the Ipswich game as he has slipped down in the race for the Golden Glove.

  His performance in the 1-0 defeat at Tottenham, where he pushed Lucas Bergvall's tame effort straight into the path of goalscorer James Maddison, encouraged further scrutiny. His understudy, Turkey's Altay Bayindir, has played just seven times since joining in September 2023 and is yet to start a Premier League game. Onana's form and the reluctance to use Bayindir prompts questions about the decision to let De Gea, Dean Henderson and Czech Republic goalkeeper Matej Kovar to leave for less than half the amount Inter were paid for their goalkeeper. De Gea, 34, who has won 45 caps for Spain and is now at Fiorentina in Serie A, is the obvious barometer.

  He has a better shot save percentage than Onana - 72 compared to 65 - and has yet to make any big errors directly leading to goals, compared to three for Onana. In mitigation, De Gea has faced fewer shots (90 to 111) and Onana has also had to contend with a switch in formation from 4-3-3 to 3-4-3 under a new manager in Ruben Amorim. The Portuguese boss is also yet to name an unchanged starting XI in any of the 23 matches he has taken charge of and has had a habit of substituting one of his three central defenders after about an hour. That can hardly help build relationships and understanding at the back and nor can Onana be blamed for some of the static defending in front of him. It should also be noted Onana has at times made crucial saves this season. What's more, Fiorentina are in better form than United, challenging for a Champions League spot in Italy while United are a lowly 14th in the Premier League. However, a perhaps surprising statistic against Onana centres around passing accuracy, given he was brought in as the calatyst towards a possession-based style of play. De Gea was not noted for his dexterity with his feet but trails Onana by just 1%, although he has made significantly fewer passes. His pass completion statistics in his final season at United (73%) were also higher than Onana's this year. Former United goalkeeper Massimo Taibi, whose famous howler against Southampton in 1999 hastened his own departure from Old Trafford, believes Onana could be on borrowed time. "I think subconsciously the United environment isn't ideal for him and when a marriage is showing cracks, it's pointless to continue," he told the Sun in December. "I'd be straight to the point and tell him, 'Andre, you are one of the best keepers in Europe but in the Premier League, you are under-performing. Block out criticism, do some soul-searching, press the reset and go again. And if things don't change by June, move on'." Onana will perhaps be wondering if his latest error will lead to his exit from Old Trafford after just two seasons in Manchester.
