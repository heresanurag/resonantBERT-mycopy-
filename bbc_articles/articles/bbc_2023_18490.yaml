title: 'Aberfan: Man, 28, charged after pregnant woman stabbed - BBC News'
date: '2023-12-07'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67635455
content: |-
  The woman was airlifted to hospital with non life-threatening injuries but has since been released.

  Police were called just before 09:10 GMT after the 29-year-old woman was attacked

  A 28-year-old man has been charged with attempted murder after a pregnant woman was stabbed.

  Daniel Mihai Popescu, from Merthyr Tydfil, was arrested after police were called to Moy Road in Aberfan just before 09:10 GMT on Tuesday, where the 29-year-old woman was attacked.

  Eyewitnesses said the victim was pregnant.

  Mr Popescu is due to appear at Merthyr Tydfil Magistrates' Court on Thursday morning.

  He is also charged with stalking and witness intimidation.

  The injured woman has been discharged from hospital.

  On Tuesday, a police cordon was erected on Moy Road and some schools and community facilities were locked down as a "precautionary measure".

  About 10 armed officers were seen on Wyndham Street in Troedyrhiw - about 1.6 miles (2.4km) from Moy Road - before the arrest.
