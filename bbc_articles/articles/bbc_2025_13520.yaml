title: 'Leicester 21-16 Sale: Tigers hold off Sharks to reach Premiership final -
  BBC Sport'
date: '2025-06-07'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cq851p4n4k2o
content: |-
  Leicester Tigers reach the Premiership final for the second time in four seasons as they edge Sale Sharks 21-16 in a pulsating play-off semi-final.

  Adam Radwan's first-half double took his Premiership try tally to 12 this season

  Leicester Tigers reached the Premiership final for the second time in four seasons as they edged Sale Sharks 21-16 in a pulsating play-off semi-final. Handre Pollard and George Ford traded penalties before Adam Radwan's double - including a sensational diving finish - put the dominant hosts 13-3 up at the break. Pollard quickly matched Ford's second penalty, but a Rob du Preez score from a slick move and another three points from Ford brought the Sharks level to tee up a grand finale. Izaia Perese's scorching run to the line with his first touch restored the Tigers' lead with 13 minutes remaining and Michael Cheika's men survived intense late pressure to preserve their unbeaten home play-off record. Leicester will now chase a record-extending 12th league title at Twickenham next Saturday when they take on six-time champions Bath in the final. The result ensured the departing head coach Cheika, skipper Julian Montoya and fly-half Handre Pollard, as well as retiring former England trio Dan Cole, Ben Youngs and Mike Brown, will get the chance to see out their Tigers careers with a title.

  Rob du Preez went over for Sale's only try shortly before the hour mark

  In a high-energy, intensely physical start, played out in a raucous atmosphere, Pollard's pinpoint penalty from the left touchline put the hosts ahead after Sharks infringed at the line-out. Amid a fierce battle for supremacy up front, former Tigers fly-half Ford levelled following a hard-won scrum penalty, but that was as good as it got for Sale before half-time. Radwan struck with virtually his first touch of the ball when Jack van Poortvliet's switch of play and long pass gave the winger space to run into down the right flank before his dart back inside to the line took out three defenders. However, the former Newcastle wing's second finish was sensational. Ollie Hassell-Collins and Ollie Chessum were both stopped just short before Radwan at full-stretch somehow gathered Pollard's overhit crossfield kick in mid-air as he dived for the line. The Tigers smothered the Sharks and wrestled control of the set-piece, but a huge defensive effort from Sale at least denied Leicester another try in first-half stoppage-time and limited the damage. Arron Reed's explosive burst and Raffi Quirke's line break shortly after the restart signalled intent and Sale's threat, the latter earning Ford a simple penalty for 13-6. Pollard sliced a makeable penalty wide - his third successive miss - but took another chance moments later.

  Izaia Perese provided the match-winning score within a minute of coming off the bench

  Yet having been on the ropes for so long, the Sharks hit back with virtually their first visit to the Leicester line when a spell of pressure ended with Ford feeding du Preez's run under the posts. The crowd were on their feet to welcome long-time servants Cole and Youngs on to home turf one last time, but the momentum and energy seemed to be all with the visitors who levelled through Ford's third penalty with 15 minutes left. Yet it was another Tigers replacement, Perese, who stole the show almost instantly, hitting the line at full tilt just inside the Sale half and scorching away on a diagonal run to the left corner. Chessum went close to sealing the match after Freddie Steward's try-saving tackle on Du Preez and Emeka Ilione had made a crucial turnover in front of his own posts. And in a frantic finale, the Tigers had to summon up one last huge defensive push in front of their own line to withstand a late, late Sale surge and ensure it would be them who made it to Twickenham next weekend. "It was tough. First half I thought we were excellent, and second half I thought Sale upped their game. "We didn't go backwards or drop our game but maybe we didn't have enough impact forward to keep them away. "I always knew it would be a game that would go right down to the wire. Once you're ready for a game like that and think about it mentally then when it comes you're okay with it and I think we handled that pretty well. "We need to go up a level that's for sure, so it will be on us as coaches to give the lads some tips on how they can get up that extra level." "It's crushing. The season crashes to a very abrupt end in the semi-finals when you're hoping and have planned for something more. "I don't think we deserved to get to a final on that performance. "I thought how they (Leicester) played in terms of their game plan and how they executed it - aerial contests and scrums on what was a slippy pitch, I thought they played that game very well and deserved to win by a few more if I'm honest. "We came right back into it, scored a try and those moments when you've just scored are the ones when you can't take a collective breath. "So to concede so quickly after scoring opens the door for them again and after that it was always a difficult task on that kind of day with the form they were in."
