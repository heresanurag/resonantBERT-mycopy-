title: Co-op and Morrisons payment problems investigated - BBC News
date: '2021-01-26'
section: Business
url: http://www.bbc.co.uk/news/world-55805777
content: |-
  Supermarkets say card payment problems that led to long queues are resolved, but cause still unknown

  Co-op, Morrisons and their payments processing provider ACI say they are investigating an IT glitch that created problems for card payments in stores.

  Long queues were seen outside some of the Co-op's convenience stores from Sunday amid the snow, with some shoppers asked to use cash.

  Co-op and Morrisons said customers were no longer experiencing problems but they, and ACI, were studying the cause.

  One MP said the problem exposed the risks of letting cash use "wither".

  ACI, which provides real-time payments processing for the retailers, said: "We are working closely with the IT teams at our partners to resolve the problem as quickly as possible. We apologise to shoppers for any inconvenience caused."

  The issue comes as contactless payments have taken off in the UK during the pandemic, with fewer consumers using cash to pay for groceries.

  Customers complained about the issue on social media.

