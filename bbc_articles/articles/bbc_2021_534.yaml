  A Co-op spokesman told the BBC: "All card transactions are being processed as usual and our payment process partner is investigating after we experienced an intermittent issue.

  "We would like to apologise to customers for any inconvenience caused during that time."

  The BBC witnessed the card processing issue affecting some of The Co-op's stores meant that self-service checkouts had to be closed, requiring customers to queue to be served at tills manned by staff.

