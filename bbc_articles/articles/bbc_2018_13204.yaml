id: bbc_2018_13204
title: Reaction as EU signs off UK withdrawal deal - BBC News
date: '2018-11-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-46329414
content: |-
  EU leaders have approved two key documents which set out the terms of the UK's departure from the European Union.

  EU leaders have approved two key documents; a political declaration, and a 585-page draft deal, which set out the terms of the UK's departure from the European Union.
