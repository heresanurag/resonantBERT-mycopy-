  The US has repeatedly rejected any ICC jurisdiction over American officials or citizens, and has accused the court of placing constraints on Israel's right to self-defence, while ignoring Iran and anti-Israel groups. During his first term in office, Trump imposed sanctions on ICC officials who were investigating whether US forces had committed war crimes in Afghanistan. This included a travel ban and asset freezes against former chief prosecutor Fatou Bensouda. Those sanctions were lifted by President Joe Biden's administration. But during his last weeks in office, Biden also criticised the ICC's warrant for Netanyahu, calling the move "outrageous" and saying there was no equivalence between Israel and Hamas. In response to efforts to what they described as attempts to challenge the ICC's authority, nine nations - including South Africa and Malaysia - launched the Hague Group last month in an effort to defend the court and its rulings.

  Trump's signing of his latest executive order follows his announcement of a plan for the US to "take over" Gaza, resettle its Palestinian population and turn the territory into the "Riviera of the Middle East". After Arab leaders and the UN condemned the idea, the US president restated it on his Truth Social social media platform on Thursday. In recent years, the court has issued arrest warrants for Russian President Vladimir Putin over alleged war crimes in Ukraine, Taliban leaders for "persecuting Afghan girls and women" and Myanmar's military leader for crimes against the Rohingya Muslims.

