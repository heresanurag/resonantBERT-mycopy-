title: '''Walking skeleton'' dog dumped in Barnsley gets new lease of life - BBC News'
date: '2024-03-20'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-68616080
content: |-
  Luca, a lurcher cross, was described by an RSPCA inspector as the skinniest dog he had rescued alive.

  Luca has now recovered despite initial fears he may not survive

  A dog described by his rescuer as a "walking skeleton" has found a new home after being nursed back to health.

  Discovered dumped in Barnsley, lurcher cross Luca was described by RSCPA inspector Ben Cottle-Shaw as the skinniest dog he had ever found alive.

  As well as being very underweight, the dog, found in April 2023, had lost almost all of his fur.

  New owner David Hagan said Luca was now much healthier, adding the canine was "trusting and loving".

  Mr Cottle Shaw said it was "heartbreaking" to see the dog, renamed by the charity, barely able to move when he was found.

  "He was the thinnest dog that I had ever seen which was still alive," he said.

  Warning: This story contains a graphic image that some readers may find upsetting

  Mr Cottle-Shaw said Luca was so unwell he was unsure if the dog would survive.

  He said: "I could tell by his demeanour and look in his eyes Luca had given up on life as he was so broken and withdrawn.

  "It was heartbreaking to see."

  Part of Luca's tail had rotted away due to infection, with other broken bones also affecting the dog.

  He was microchipped but his ownership details had not been kept up-to-date, meaning his actual owner could not be traced.

  Part of Luca's tail had rotted away when he was dumped in South Yorkshire

  Just a few weeks into his rehabilitation at the RSCPA Felledge Centre in County Durham, he was adopted by David and Gillian Hagan.

  Mr Hagan said: "We just fell in love - he is such a lovely boy.

  "At the time we didn't know the circumstances of how he was found but we have since discovered what had happened to him.

  "I found the pictures of him when he was found so very hard to look at."

  Luca is now living with a family who love him

  "Luca now has a beautiful, shiny coat now and has increased his weight.

  "You wouldn't really be able to tell he had such a terrible experience as he is so trusting and loving."

  The person responsible for dumping Luca has not been traced and the RSPCA are still keen to hear from anyone with information.

