title: David Baddiel on impact of dad's dementia - BBC News
date: '2017-02-21'
section: General
url: http://www.bbc.co.uk/news/uk-39029945
content: |-
  Comedian David Baddiel has made a documentary about the impact of his father's rare form of dementia.

  Stand-up comedian David Baddiel has invited cameras to film his father over the past year – to show the reality of his life living with a rare form of dementia called Pick’s disease.

  Symptoms include excessive swearing and inappropriate sexual behaviour, which means the comedian had to stop his children visiting their grandfather.

  The Trouble With Dad is on Channel 4 on Monday 20 February at 9pm.

  The Victoria Derbyshire programme is broadcast on weekdays between 09:00 and 11:00 on BBC Two and the BBC News channel.
