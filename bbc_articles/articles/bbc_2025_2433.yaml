title: Teenager arrested after boy, 15, stabbed at Sheffield school - BBC News
date: '2025-02-03'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cdry23ryy3ro
content: |-
  The victim suffered serious injuries in the incident at a high school in Sheffield, police say.

  Police have sealed off the area around the school as investigations begin

  A 15-year-old boy has been arrested after a pupil was stabbed at a school in South Yorkshire. The victim, a 15-year-old boy, suffered serious injuries in the incident at All Saints Catholic High School in Sheffield and was taken to hospital for treatment, according to police. Emergency services were called to the school on Granville Road at about 12:15 GMT and officers had since urged people to avoid the area while emergency services carried out their work, a force spokesperson said. The victim's family was aware and the school had been closed, they added.

  Officers were called to the school at about 12:15 GMT on Monday, police said

  The force spokesperson said: "We would like to reassure parents of pupils we do not deem there to be a further risk at the school." All Saints was last inspected by Ofsted in October 2023. It was rated Good overall, and also received a Good rating in 2014. Inspectors said the school had a "strong ethos of warmth and respect". Most pupils felt "happy and safe" with bullying described as "rare" and dealt with quickly. It is the second time that the school has gone into lockdown in a week, said the PA Media news agency. According to reports, on January 29 headteacher Sean Pender sent a message to parents, saying: "The reason for the lockdown was due to threatening behaviour between a small number of students where threats were made of physical violence." A number of parents had arrived at the school to collect their children. One told the BBC they were keen to get their youngster home after hearing a variety of rumours about what had happened. "Until we get kids out and get home and speak with them to find out more, we cannot say more things about it," they said. "Kids were getting panicked, we had a lot of calls, even now," they added.

  There is a heavy police presence in the area around the school

  One woman, who did not give her name, said she worked at a neighbouring school and had been told about the incident on her way to work. "I've heard that there's been a stabbing, that's all I've heard up to now. "Somebody on the Supertram told me as I was coming to work." South Yorkshire Police have said they will hold a press conference at 15:30 GMT at their force headquarters. Assistant Chf Con Lindsey Butterfield is expected to make a statement about the incident. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
