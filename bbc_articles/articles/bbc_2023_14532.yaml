title: 'Sheffield: Man stabbed and another hit by car in linked attacks - BBC News'
date: '2023-09-09'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-66763556
content: |-
  The man who was struck by a car has been left with "potentially life-changing" leg injuries.

  Two men have been seriously injured in a double attack in Sheffield city centre, police have said.

  A 20-year-old was stabbed on Carver Street at about 03:00 BST. Shortly after, another man - also aged 20 - was hit by a car at the same location.

  South Yorkshire Police said officers believe the two incidents were linked.

  Officers said the stab victim was in a "serious but stable" condition, while the other man suffered "potentially life-changing" leg injuries.

  A third man, in his 20s, has been arrested on suspicion of possession of controlled drugs with the intention to supply. He remains in police custody.

  Det Insp Mark Cockayne said there would be a heightened police presence in the area as the force investigated the incidents.

  Police have confirmed they are linking the two incidents.

  Det Insp Mark Cockayne said there will be a "heightened police presence" in the area as officers investigate.

  I know incidents of violence such as this will be a cause for concern for people who live, work in and visit Sheffield city centre.

  Anyone with information is asked to contact police.

