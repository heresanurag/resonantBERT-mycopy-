content: |-
  World number two Rory McIlroy is in a positive mood as he looks to put last month's US Open collapse behind him, writes Iain Carter.

  'It was a great day until it wasn’t' - McIlroy reflects on Pinehurst pain

  Rory McIlroy's last major victory came at the 2014 US PGA Championship

  A penny for the thoughts of Rory McIlroy as he wandered along New York’s High Line on the west side of Manhattan during the days that followed his crushing defeat at last month’s US Open. As he took in the sights from the elevated converted former railroad, the world’s number two golfer reflected on the two short missed putts that contributed to three dropped shots in the closing four holes of a major he seemed destined to win. Ending the frustration of a near decade wait to land one of the sport’s big four prizes was within his grasp that fateful day at Pinehurst. He was playing high quality golf, the sort that had eluded him all too frequently on the final day of recent major championships. “I did things on that Sunday that I haven't been able to do in the last couple years,” McIlroy said in his first public comments since the US Open. “I Took control of the golf tournament, holed putts when I needed to.” Until, of course, he missed for par from inside three feet on the 16th green. He then missed a slightly longer and certainly more difficult one on the final hole to lose by a single shot to Bryson DeChambeau. He departed Pinehurst with no comment and without the slightest regret at ignoring the media. “No offence; you guys were the least of my worries at that point,” he said.

