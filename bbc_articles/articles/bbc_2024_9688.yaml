title: Matt Richards wins British 200m freestyle title but Tom Dean misses out on
  Olympic title defence - BBC Sport
date: '2024-04-08'
section: Swimming
url: http://www.bbc.co.uk/sport/swimming/68754130
content: |-
  Matt Richards wins an epic men's 200m freestyle race at the British Championships but Olympic champion Tom Dean misses out on the chance to defend his title.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'I'll have a burger then it's back to training' - Matt Richards

  Matt Richards won an epic men's 200m freestyle race at the British Championships in London but Olympic champion Tom Dean missed out on the chance to defend his title in Paris. Richards won a race billed as the most competitive domestic contest in history with Duncan Scott taking silver. Dean was third but only two can race in the event at this summer's Olympics, although he will contest other events. "It lived up to the hype," said 2023 world 200m freestyle champion Richards. "That was probably the best field you are going to find domestically. It was great practice for the Olympics." The trio, who won gold together in the 4x200m freestyle relay at the Tokyo Olympics, have battled each other in events all week but this race was always expected to be the championship's grand finale. Seven of the eight men in the final were former Olympians with Scott, 26, the Olympic silver medallist when Dean won gold in Tokyo. Richards, 21, won gold in the event at last year's World Championships and Dean, 23, silver but it is the latter who missed out on qualification. Dean, who had set himself a bold target of five medals in Paris, had already effectively qualified for the 200m individual medley on Thursday by taking silver but also missed out on the place for the 100m freestyle event. "I knew it was going to take a momentous effort," Dean said. "It is fine margins and you can pay for it at the front end. "I have been top three in the world for three years in a row and it shows the calibre of this competition. This is what you've got to do to just get on the team. "I have spoken about my big medal aims in Paris. That is still there. I want to win individual medals, relay medals and do as much as I can for the team. I have got to reset and slightly refocus." Richards said: "I said to him at the end of the race it is so bitter-sweet because in a perfect world we would love it if we could all get in there and race. "There is always going to be someone who just misses out and Deano is a phenomenal talent." James Guy finished fourth meaning he will travel to Paris for the relay as the same quartet - Guy, Dean, Scott and Richards - will look to defend the title they won in Tokyo.

  Elsewhere on the final night of the championships, 12-year-old Iona Winnifrith shared the women's para 100m breaststroke title with Brock Whiston to put herself in line for Paralympic qualification. The pair, plus four others in the race - Maisie Summers-Newton, Rebecca Redfern, Grace Harvey, Louise Fiddes - made the nomination time for Paris with the Paralympic team to be confirmed in the coming months. Will Ellard equalled the S14 200m freestyle world record for his third title of the week, beating his fourth Paris nomination time in the process. Fourteen-year-old Amelie Blocksidge won the women's 800m freestyle title but missed out on the time needed for the Olympics. Anna Hopkin will race the 100m freestyle in Paris after she completed the sprint double by following up her win in the 50m event. Freya Anderson, on her return from glandular fever, was third and requires a coaches' pick to make the team. Oliver Morgan also won his second title of the week, backing up his 100m backstroke with an impressive finish to win the 200m event. He beat the qualification time, as did Luke Greenbank in second, meaning the pair will likely compete again in Paris. Tully Kearney won her second title of the meet, clinching the para 100m freestyle crown under the time needed for Paris while Angharad Evans won the 100m breaststroke but was outside of the Olympic time.

