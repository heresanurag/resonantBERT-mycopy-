title: 'Australia bushfires: Homes destroyed in Victoria - BBC News'
date: '2019-03-03'
section: General
url: http://www.bbc.co.uk/news/world-australia-47434599
content: |-
  Hundreds of firefighters in Australia are battling bushfires which have destroyed homes.

  Hundreds of firefighters are battling fires in Victoria, Australia.

  Multiple lightning strikes on Friday started the largest fire in Bunyip State Park, east of Melbourne.

  The country's meteorology bureau said plumes of smoke have risen up to 15km into the atmosphere.

  Parts of this video have no commentary.
