content: |-
  The oil and gas producer faces criticism for its shift away from green energy, but many support it.

  BP shareholders want it to make money, not climate policy

  It was more than 20 years ago that the then boss of BP reframed those famous initials as "Beyond Petroleum". It was the first tentative step in transforming the company from an oil and gas producer to an energy provider investing an increasing amount of its fossil fuel profits into greener technology. Five years ago, chief executive Bernard Looney, who was in charge at the time, accelerated that process with ambitious targets to cut oil and gas production 40% by 2030, while massively ramping up investment in wind and solar. Today, BP could stand for "Back to Petroleum" following its announcement to shift back to oil and gas production and slash investment in renewables.

  Profit and share price. There is simply less money in renewables than in oil and gas and some BP shareholders have become angry and impatient as they watch Shell produce double the returns they have seen while Exxon investors have received four times as much. For most - but not all - shareholders, the number one job of a company's board and management is to maximise the value of the company. BP's failure to do this has led to active speculation that BP should be taken over by a company that understands this. Or one that list its shares in the US where investors are less interested in a green transition. Not all shareholders agree with BP's radical strategy shift back to petroleum. Dozens of them signed a letter expressing concern about increasing fossil fuel production and want to have a say in the company's direction of travel. BP's move follows rivals' Shell and Norwegian company Equinor scaling back of plans to invest in green energy. Meanwhile, US President Donald Trump's "drill baby drill" comments have encouraged investment in fossil fuels. Many groups say that long term BP and others are pursuing a no-win strategy. Climate concerns will become so acute that much of the oil and gas they're searching for will have to remain in the ground and become unusable "stranded assets" of no commercial value. However, the least patient shareholders tend to have the loudest voices. As such, the cries of dismay from those concerned about the climate are being drowned out by those demanding that BP does what it knows best: drilling for oil and gas and returning those profits to shareholders, who include millions of pension savers. They would say it is not BP's job to question how much oil and gas the world wants or needs - that is the job for the societies it serves and their policy makers. And, while the UK government has decided it wants no new oil and exploration in UK waters, over 90% of BP's activities are outside the UK and the current US government thinks very differently.
