title: 'Trump''s medical: What we learned - BBC News'
date: '2018-01-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42713437
content: |-
  A White House doctor says President Trump could benefit from a low-fat diet and routine exercise.

  Dr Ronny Jackson attributed Donald Trump's "excellent" health to his "incredible genes" and said he is not concerned that the president only sleeps four to five hours a night.
