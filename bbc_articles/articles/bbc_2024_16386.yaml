content: |-
  In December 2022, the singer revealed she had been battling Stiff Person's Syndrome (SPS) and cancelled all of her upcoming shows.

  Celine Dion greeted fans in Paris on Tuesday, further stoking rumours that she's set for a come-back performance at the opening ceremony of the Olympics Games.

  In December 2022, the singer revealed that she had been battling a rare neurological condition called Stiff Person Syndrome (SPS), and cancelled all of her future shows.

  There has been speculation online and in the media that the Canadian may perform at the Olympic Games Paris 2024 opening ceremony on Friday.

  Last month, France's Sports Minister, Amélie Oudéa, told French broadcaster France 2 that a performance "is within the realm of possibility”.

  The songstress is no stranger to the Olympics, she sang The Power of the Dream at the1996 Summer Olympics in Atlanta.
