title: Ex-marine climbs Everest after 'record-breaking' triathlon - BBC News
date: '2025-05-12'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/ckgxrzk2rveo
content: |-
  Mitch Hutchcraft and his team say the challenge is the longest ever ascent of Everest.

  Ex-marine Mitch Hutchcraft undertook the mammoth triathlon to reach the summit of Mount Everest

  A former Royal Marine has reached the summit of Mount Everest after swimming, cycling and running more than 8,000 miles. Mitch Hutchcraft started by swimming the English Channel on 15 September and the 240-day challenge concluded when he topped the world's highest mountain on Sunday at 07:30 BST. His team said it was the world's longest ever ascent of Everest from sea to summit. The 31-year-old, from Ramsey in Cambridgeshire, said the achievement was "more magical than I could have ever dreamed".

  "Although I lost my dad 11 years ago, he was with me every step of the way," said Hutchcraft, speaking to his team over the phone after summiting. "It's been tough. Really tough. The most difficult thing I've ever done. "But I couldn't be happier and more proud of finishing this epic adventure."

  In previous challenges, Hutchcraft rowed 3,000 miles across the Atlantic Ocean and cycled 5,000km across North America

  After swimming the 35km width (21 miles) of the Channel from Dover, Hutchcraft cycled about 12,000 km (7,456 miles) from Europe to Digha in India. He then ran 900km (559 miles) to Kathmandu in Nepal, before starting his 360km (223-mile) trek to Everest basecamp. Hutchcraft, who now lives in Torquay in Devon, said he had dreamed of completing the climb since he was eight years old. "Never in a million years did I think this would be how I'd get here," he said. "I just want it to inspire others to believe that whatever they're dreaming, however small, they just need to get out there and smash it." In his previous challenges, Hutchcraft has rowed 3,000 miles (4,800km) across the Atlantic and cycled 5,000km (3,100 miles) across North America.

  Hutchcraft was supported by Nepalese guide Gelje Sherpa to the summit at Mount Everest

  Hutchcraft, who has had a full knee reconstruction, was once told the surgery would make it impossible to even join the military, let alone complete a challenge of this magnitude. He has been raising money for SAVSIM, external, a wildlife conservation organisation for which he is an ambassador, and which also provides mental health support to veterans and others suffering from post-traumatic stress disorder and similar issues. He said: "For me this is so much more than just a dream to make history, it is also the chance to raise funds and awareness for an amazing non-profit organisation very close to my heart and give back to veteran mental health and wildlife conservation." His father died suddenly when he was 20, which became a driving force in his decision to join the Royal Marines. He served six years until 2021. His challenge, named Project Limitless, is being filmed by a production team and is due to officially end when he returns to basecamp - which he was due to do by Monday morning.

