title: Bleak picture for Sunak but no sign of rebels moving against PM - BBC News
date: '2024-05-03'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68954537
content: |-
  Labour has discovered a knack of winning in the local elections where they need to win in a general election.

  There has been lots of noise and lots of numbers. And, for plenty of us, not a lot of sleep. And there are still more results to come this weekend. But how do things look right now? Firstly, dire election results are becoming a dangerous habit for the Conservatives. There were last year's local elections. The picture for Rishi Sunak has been consistently bleak. If his premiership set out with two aims, steadying the ship of government and reviving Conservative fortunes, it's fair to say he did achieve the first of these.

  Gone was the rolling psychodrama of Boris Johnson's last few months and Liz Truss's entire vanishingly brief tenure. But as for the second, making the Tories popular again? The evidence suggests this has been a spectacular failure. He yanks various policy levers. He sets ideas out with passion. And they appear to make barely any difference whatsoever to either his or his party's fortunes. In contrast - and blackening the Tory mood still further - is Labour's relatively newly discovered knack of winning where they need to win in a general election. They used to be rather good at stacking up loads of votes in places where they won already, and nowhere near enough votes in places where they didn't. That appears to be changing. Strikingly, though, there is no sign, yet at least of this prompting a Conservative insurrection against the prime minister. Why? Because the results for them are grim but perhaps no more grim than feared.

