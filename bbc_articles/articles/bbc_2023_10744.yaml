title: 'Jenin: Mourners fill streets for funerals as Israel ends assault - BBC News'
date: '2023-07-05'
section: Middle East
url: http://www.bbc.co.uk/news/live/world-middle-east-66104725
content: |-
  Twelve Palestinians and one Israeli soldier have been killed following clashes in the West Bank refugee camp.

  Israeli forces member on an armored bulldozer near the Jalamah checkpoint on 4 July Image caption: Israeli forces member on an armored bulldozer near the Jalamah checkpoint on 4 July

  There were drone strikes, armoured bulldozers and hundreds of soldiers involved in Israel’s major two-day military operation in Jenin’s decades-old refugee camp.

  The army says it uncovered weapons labs and stores and has today been showing journalists the large quantities of guns, bullets, explosive devices and protective vests which it says it seized in the camp.

  It says some were found in hideouts, a mosque, pits and in vehicles.

  The Israeli military claims that all 12 Palestinian men and teenage boys who were killed in its raid were militants and that it was successful in avoiding casualties of unarmed civilians.

  So far, it has been confirmed to the BBC that eight of the dead were members of the military wings of the main Palestinian factions.

  A Palestinian doctor told me that civilians were among some 120 people injured.

  Longer-term, Israeli military analysts suggest the impact of this operation is likely to be limited.

  “At best it’s a paracetamol for a terminal illness,” said Avi Issacharoff, a journalist known as one of the creators of the TV series, Fauda, in the Yedioth Ahronoth newspaper.

  He predicted that the Jenin refugee camp might now be “a bit less dangerous in terms of the weaponry it holds” but that no reduction in the overall number of Palestinian attacks on Israelis should be expected.
