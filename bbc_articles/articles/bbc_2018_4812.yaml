title: Olympic rower Helen Glover loses unborn twin - BBC News
date: '2018-04-09'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-43705409
content: |-
  Team GB rower Helen Glover says she has "received the hard news that one baby hasn't made it".

  Olympic rower Helen Glover announced she was pregnant with twins in March

  Double Olympic champion Helen Glover has announced she has lost one of the twins she was expecting.

  The Team GB rower announced on Twitter that she and her husband, TV wildlife expert Steve Backshall, had received "the hard news that one baby hasn't made it".

  The gold medallist, who is from Newlyn, Cornwall, said the couple were "very excited and hopeful for the remaining baby to arrive this summer".

  She is due to give birth in July.

