title: Passersby narrowly avoid Dorset cliff collapse - BBC News
date: '2019-03-15'
section: General
url: http://www.bbc.co.uk/news/uk-england-dorset-47577206
content: |-
  Over 1,000 tonnes of rock and debris fell on East Beach in Dorset, although no-one was injured.

  About 1,000 tonnes of rock and debris fell at East Beach in West Bay, Dorset in a dramatic cliff collapse.

  Although people were walking by at the time, no-one was hurt by the rockfall.

  “It is extremely dangerous to be on or near cliffs when the wind is high and waves are strong. Your life is not worth risking for a walk,” the Environment Agency cautioned.
