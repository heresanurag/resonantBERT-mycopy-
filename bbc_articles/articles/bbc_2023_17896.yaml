content: |-
  The Prince of Wales was said to have “kept up really well” during a dragon boat training session.

  The Prince of Wales was said to have “kept up really well” during a training session with a British dragon boating team in Singapore.

  The prince is in the city state to attend the annual Earthshot Prize ceremony.

  Five winners are chosen each year, with each receiving £1m ($1.2m) to fund projects that aim to save the planet.
