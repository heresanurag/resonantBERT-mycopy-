id: bbc_2022_2002
title: 'Ukraine: Kyiv apartment building hit by missile - BBC News'
date: '2022-02-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-60536614
content: |-
  Video has emerged of the apartment building near Kyiv's Zhuliany airport that was struck earlier on Saturday.

  The pictures show a hole covering at least five floors.

  Authorities say the number of casualties is "being specified" while an evacuation is under way.
