title: 'US election 2024: Netanyahu and Starmer lead world leader congratulating Trump
  - BBC News'
date: '2024-11-06'
section: World
url: http://www.bbc.co.uk/news/articles/cly2z812zxvo
content: |-
  Hungary's prime minister hails a "much-needed victory for the world", and France's president said it would work with him "with respect and ambition".

  Israeli Prime Minister Benjamin Netanyahu and the UK's Keir Starmer are among the many world leaders who have congratulated Donald Trump on winning the US presidential election. The election of a new president is not just a big deal for the US - a new leader in the White House can transform the country's foreign policy and its position towards its friends and foes internationally. Netanyahu - who has had a difficult relationship with President Joe Biden - said it was "history's greatest comeback". Sir Keir said he looked forward to "working with Trump in the years ahead" and that the UK-US "special relationship will continue to prosper on both sides of the Atlantic".

  Here is how some leaders and others around the globe have reacted so far.

  Ukraine's President Volodymyr Zelensky said he appreciates President Trump’s "commitment to the 'peace through strength' approach in global affairs". He added that he hoped for "further strong bipartisan support" for Kyiv's war effort. Many observers have questioned whether US support for Ukraine will last, given Trump's scepticism about military aid to the country. In Russia, Kremlin spokesperson Dmitry Peskov said he was "not aware of the president's plans to congratulate Trump on the election," adding that Russia would judge Trump on his actions. Trump has also been critical of Nato, accusing European allies of not paying enough on defence. Nato secretary general Mark Rutte said he was looking forward to "working with him again to advance peace through strength through Nato".

  European leaders' congratulations messages to Trump on his election victory did little to mask a sense of nervousness over what repercussions his second term would mean for trade, global security and support for Ukraine. Last month, Trump warned that the European Union would have to "pay a big price" for not buying enough US exports if he won the election. The EU's President Ursula von der Leyen stressed in her congratulations message that "millions of jobs and billions in trade and investment on each side of the Atlantic" depend on the trade relationship between the US and EU. French President Emmanuel Macron said he was ready to work together with Trump "with respect and ambition". But he said he had held talks with German Chancellor Olaf Scholz about creating a "more united, stronger Europe". In his own statement, Scholz stressed Germany and the US's shared history of upholding democratic values.

  French President Emmanuel Macron looks on as US President Donald Trump flicks a bit of lint off his jacket during a meeting in the Oval Office

  Hungarian Prime Minister Viktor Orban meets Donald Trump at Trump's Mar-a-Lago home in Florida in July 2024

  Hungary's Viktor Orban - who, unlike other EU leaders, publicly endorsed Trump's re-election bid - said the result was "a much-needed victory for the world". Meanwhile, Italy's leader, Georgia Meloni, stressed Italy's "unshakable alliance" with the US.

  Other leaders who congratulated Trump as results continued to roll in on Wednesday included India's Prime Minister Narendra Modi, who described Trump as a friend, Turkey's Recep Tayyip Erdogan, who expressed hope that the election would lead to the end of the wars in Gaza and Ukraine, and Argentina's Javier Milei. The government of Iran, one of the US's most steadfast foes, insisted Iranians' livelihood would not be affected by the US election, the semi-official news agency Tasnim reported. Trump has promised to impose massive tariffs on all Chinese goods. But in a routine press briefing, China's ministry of foreign affairs said Beijing respected "the American people’s choice". Speaking to reporters, a senior Taiwanese official expressed hope that Trump would continue US policy of defending the island from a potential Chinese invasion. There has been no official statement from North Korea, but analysts believe Kim Jong Un is invested in the US electoral outcome, because it could reopen the possibility of talks. Kim held three historic meetings with Trump when he was president. In the run-up to the first summit, he announced that Pyongyang would be halting missile and nuclear tests. Since the failure of those talks, the reclusive country has continued expanding its nuclear weapons programme, despite UN sanctions. Leaders from across the African continent have also congratulated Trump, with South African President Cyril Rhamaphosa saying: "I look forward to continuing the close and mutually beneficial partnership between our two nations." During his first term, Trump did not visit Africa, drawing criticism for his limited engagement with the continent.

  Canadian Prime Minister Justin Trudeau said he would "work together" with Trump "to create more opportunity, prosperity and security for both of our nations". Brazilian President Luiz Inácio Lula da Silva, who had expressed his support for Harris, wished "luck and success" to Trump, adding that "the world needs dialogue and joint work for more peace, development and prosperity".
