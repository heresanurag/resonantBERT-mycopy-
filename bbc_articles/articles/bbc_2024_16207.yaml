  Mr Johnson's appearance on CNN came just a day after reports emerged that top officials at the Secret Service had denied some requests from Trump's security team for additional resources in the two years leading up to the assassination attempt. The report, first published in the Washington Post, external, said the agency had refused additional resources such as more agents and snipers because of a lack of resources and staffing shortages within the Secret Service. Mr Johnson blamed the Department of Homeland Security (DHS) for failing to allocate more resources to the Secret Service, an agency that it oversees. The Republican House speaker told CNN on Sunday that Congress had increased funding to DHS in recent years, but that DHS Secretary Alejandro Mayorkas was responsible for ensuring the Secret Service had enough funds. "Secretary Mayorkas is in charge of that agency. If he needed to allocate more resources to the Secret Service then that should have been done," Mr Johnson said. Mr Johnson added that he had spoken to Mr Mayorkas hours after the assassination attempt and that the DHS leader was unable to answer "basic questions", including whether the gunman, Thomas Crooks, had used a drone to survey the outdoor rally area. Law enforcement officials told US media on Saturday that Crooks had flown a drone above the site ahead of the shooting. Trump has made several appearances since the incident, including at a rally in Grand Rapids, Michigan on Saturday, where he told the crowd that he "took a bullet for Democracy". His former White House physician, Dr Ronny Jackson, released a statement the same day saying the bullet created a 2cm-wide wound on Trump's ear that was beginning to "heal properly".
