title: Sex abuse victim 'vindicated' after High Court win - BBC News
date: '2018-03-02'
section: UK
url: http://www.bbc.co.uk/news/uk-43261021
content: |-
  Three women groomed into sex work as teenagers, fought for the right to not reveal their convictions.

  Three women, who say they were groomed into prostitution as teenagers, have won a High Court battle which means they will not have to tell future employers about their soliciting.

  Fiona Broadfoot said it was a disgrace that she had carried these convictions, while no men who had "bought and used" her had faced any consequences.

  The Home Office said it was considering the court's decision.

  Ms Broadfoot, one of the claimants who waived her anonymity in this case, said it had been a long fight, but "worth it".

  "Finally, I feel like a weight has been lifted off my shoulders - it's a vindication," she added.

  The women successfully argued that the disclosure of convictions for working in the sex trade many years ago was disproportionate and a breach of their Article 8 Human Rights - the right to a private life.

  This video can not be played To play this video you need to enable JavaScript in your browser. Fiona Broadfoot spoke to the BBC's Today programme before the ruling, about why her convictions for soliciting have stopped her from moving on

  The ruling would bring about real change for sex trade survivors "who should never have been criminalised in the first place", their lawyer Harriet Wistrich said.

  Ms Broadfoot, who said she was a child when first put on the streets, said she had carried "eight pages" of convictions all her life.

  The judgment means that any convictions for soliciting will now be "filtered out" when it comes to DBS checks - although how this will be done is still to be determined.

