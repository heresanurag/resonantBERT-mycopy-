title: Under-25s turning their backs on alcohol, study suggests - BBC News
date: '2018-10-10'
section: UK
url: http://www.bbc.co.uk/news/uk-45807152
content: "Young people are rejecting alcohol - with abstinence almost doubling in\
  \ a decade, a study suggests.\n\nYoung people are turning their backs on alcohol,\
  \ a new study has suggested.\n\nResearchers looked at official health data from\
  \ the last decade and found almost a third of 16 to 24-year-olds in 2015 said they\
  \ didn't drink, compared with around one in five in 2005.\n\nNon-drinking was found\
  \ across a broad range of groups, suggesting it was becoming \"more mainstream\"\
  .\n\nBinge drinking rates also decreased - from 27% in 2005 to 18% in 2015, based\
  \ on Health Survey for England figures.\n\nAlmost 10,000 people were questioned,\
  \ with the results demonstrating a clear decline in consumption of alcohol among\
  \ young adults.\n\nThe new research, published in the medical journal BMC Public\
  \ Health and carried out by University College London, revealed that the proportion\
  \ of 16 to 24-year-olds who do not drink alcohol has increased from 18% in 2005\
  \ to 29% in 2015.\n\nJust 28% admitted drinking above the recommended limits, compared\
  \ with 43% a decade earlier in 2005.\n\nAnd the number of lifetime abstainers also\
  \ increased significantly, from 9% in 2005 to 17% in 2015\n\nIt echoes recent findings\
  \ by the Office for National Statistics which determined that the number of adults\
  \ who said they drank alcohol was at its lowest level since surveys began in 2005.\n\
  \nLead researcher Dr Linda Ng Fat from University College London described the trend\
  \ as \"stark\" and \"widespread\".\n\n\"Increases in non-drinking among young people\
  \ were found across a broad range of groups, including those living in northern\
  \ or southern regions of England, among the white population, those in full-time\
  \ education, in employment and across all social classes and healthier groups.\"\
  \n\n\"The increase in young people who choose not to drink alcohol suggests that\
  \ this behaviour maybe becoming more acceptable, whereas risky behaviours such as\
  \ binge drinking may be becoming less normalised.\"\n\nHow does your drinking measure\
