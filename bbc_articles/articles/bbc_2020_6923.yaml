content: |-
  The World Health Organization says there were 150,000 new cases on Thursday - half from the Americas.

  Outbreak accelerating 'in many parts of world' - WHO

  Here’s a little more on the news we brought you earlier that the World Health Organization is warning that the pandemic is entering a “new and dangerous” phase. Maria van Kerkhove, technical lead of the WHO’s Covid-19 response, told a press conference the pandemic is “accelerating in many parts of the world”. “While we have seen countries have some success in suppressing transmission and bringing transition down to a low level, every country must remain ready,” she said. Mike Ryan, the head of the WHO's Health Emergencies Programme, said that some countries had managed to flatten the peak of infections without bringing them down to a very low level. "You can see a situation in some countries where they could get a second peak now, because the disease has not been brought under control," he said. “The disease will then go away and reduce to a low level, and they could then get a second wave again in the autumn or later in the year.”
