title: Oscar first for Native American actor Wes Studi - BBC News
date: '2019-06-04'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-48511186
content: |-
  The Last of the Mohicans actor is the first Native American actor to be honoured with an Oscar.

  Wes Studi first caught the public's attention for his role in Dances with Wolves

  Nearly 50 years ago, Marlon Brando famously declined his Oscar for The Godfather over Hollywood's treatment of Native Americans.

  He sent Native American actor and activist Sacheen Littlefeather on stage to refuse the award on his behalf on stage at the 1973 ceremony.

