content: |-
  The singer's car was stolen and contained books in which she'd written songs for her second album.

  Raye made history when she won six Brit Awards earlier this year

  Singer Raye has said books in which she'd written songs for her forthcoming second album are missing after the car they were in was stolen. The star had been working on the follow-up to her multi-Brit Award-winning debut My 21st Century Blues. But in an Instagram post, she revealed:, external "It’s my birthday and my car got stolen with all my song writing books in the boot so no second album any time soon love you bye." Raye also posted a picture of a cake for her 27th birthday, which had been iced to say "sorry ur car got stolen".

