  Raye is best known for her single Escapism, the break-out hit from her debut album. She has also appeared on a string of other top 10 hits, such as Bed (a collaboration with Joel Corry and David Guetta), Prada (with Cassö and D-Block Europe) and Secrets (with Regard). She made history at the Brit Awards earlier this year when she won six of the seven prizes she was nominated for. But it took a long time to get there. In 2021, five years after she was signed, her label was still refusing to release her debut, prompting the singer to ask to be freed from her contract. Raye was allowed to keep the songs she had written, and ultimately found huge success as a solo artist after Escapism became a viral hit. In the years leading up to her album's eventual release, Raye also collaborated with Mabel, Jax Jones, Rudimental and Disclosure.
