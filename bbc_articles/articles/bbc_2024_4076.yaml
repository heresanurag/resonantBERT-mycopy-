  Former special counsel Robert Hur is defending his report into the president's handling of classified documents.

  How White House tried to defuse potency of Hur report

  We've just heard from Republican Congressman Tom Tiffany who spoke of how the White House tried to get Hur to tone down some of his report. According to our US partner CBS News, Biden's lawyer Richard Sauber tried to convince the special counsel to drop references to Biden's mental acuity and mental lapses, writing in a letter that such language was not "accurate or appropriate". In the letter, Sauber and Bob Bauer, personal counsel to Biden, took issue with the fact the report had referenced Biden’s memory “on at least nine occasions” which they called “gratuitous”. "It is one thing to observe President Biden's memory as being' significantly limited' on certain subjects. It is quite another to use the more sweeping and highly prejudicial language employed later in the report,” the letter said.
