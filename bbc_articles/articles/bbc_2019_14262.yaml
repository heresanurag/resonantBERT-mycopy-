title: 'NHS: Donald Trump on the UK''s National Health Service - BBC News'
date: '2019-12-03'
section: General
url: http://www.bbc.co.uk/news/uk-50647945
content: |-
  Speaking at the 70th anniversary of Nato trump said that the NHS is not on the trade talk table.

  Speaking in London at the 70th anniversary of Nato, Donald Trump said that the UK's National Health Service, the NHS, is not on the trade talk table.

  But during a news conference with Theresa May in June, he said something very different.
