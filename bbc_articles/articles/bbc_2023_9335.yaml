title: 'Bournemouth beach deaths: Children not related, police say - BBC News'
date: '2023-06-01'
section: UK
url: http://www.bbc.co.uk/news/live/uk-65778225
content: |-
  A 12-year-old girl and a 17-year-old boy died after being pulled from the sea in Bournemouth on Wednesday.

  We're going to end our live coverage now after today's police press conference on yesterday's incident at Bournemouth beach.

  A 12-year-old girl and a 17-year-old boy died after being pulled from the sea, while eight others were treated for non-life-threatening injuries.

  You can read all the key details in our main story here.

  Updates were written by Thomas Mackintosh and Malu Cursino, and the page was edited by me.

  Thanks for joining us.
