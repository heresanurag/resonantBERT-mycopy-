content: |-
  Nottingham Forest's unlikely third place in the Premier League has some echoes of Leicester in 2016... can they maintain their excellent early-season form?

  Why are Forest so good this season - and can it last?

  Chris Wood has 23 Premier league goals for Forest since joining, initially on loan, in 2022-23. That is more than Stan Collymore's 22 top-flight goals for the club and one short of Bryan Roy's long-standing record of 24

  Are Nottingham Forest showing signs of 'doing a Leicester 2016'? Hang on, hear us out first... The broad picture is this:
  • None Forest are third in the Premier League - their highest position since 1998 - after winning three on the bounce in the top flight for the first time since 1999
  • None Their opening 10 games mirror Leicester's 2015-16 start when the Foxes stunned the sport as they won the Premier League at odds of 5,000-1
  • None Forest's five wins, four draws and one defeat is identical to Leicester's record, although they have three more clean sheets than Claudio Ranieri's side did nine years ago and a better goal difference by seven
  • None Striker Chris Wood - a different player but just as talismanic as Jamie Vardy - has eight goals and they have the second-best defence in the division, having only avoided relegation by four points last season.

  This video can not be played To play this video you need to enable JavaScript in your browser. The Football News Show: Are Nottingham Forest too reliant on striker Chris Wood?

  Forest's search for a new striker to support and challenge Wood ultimately failed as Eddie Nketiah joined Crystal Palace from Arsenal and Feyenoord striker Santiago Gimenez remained at De Kuip. "In the transfer window we were looking for many options that could help us. The main thing was we looked for someone who could improve us and someone who wanted to be with us. These two things are very important," said Nuno, tellingly, in September. It looked like they would be short up front but Wood's electric start has neutralised any fears.
  • None The 32-year-old New Zealand international has scored more than half of Forest's 14 goals this season and has 22 goals in 30 Premier League starts since making his move from Newcastle permanent in June 2023
  • None Nineteen of those league goals have come under Nuno since the Portuguese boss arrived last December
  • None Only Manchester City's Erling Haaland has scored more non-penalty goals than Wood's 18 since 23 December 2023
  • None Wood also has the fourth best conversion rate (32.8%) in the Premier League since Nuno arrived and is over-performing his expected goals figure (14.04) by almost five goals. Nuno has refused to tread softly with Wood, especially after international duty, saying the striker is a "competitor" and will always be ready.

  The arrival of Nikola Milenkovic (right) from Fiorentina has helped shore up Forest's previously vulnerable defence from set-pieces

  While Wood has scored the goals, the management will always highlight that their foundations start in defence. Matz Sels - having become the undisputed number one - has kept the joint-most clean sheets, along with Manchester United's Andre Onana and Liverpool's Alisson Becker, in the Premier League this season. The arrival of Nikola Milenkovic from Fiorentina - for a little less than the reported £12m - has already looked a bargain and he has formed an impressive partnership with Brazilian Murillo at the back.
  • None Last season Forest conceded 23 of their 68 goals from set-pieces, four more than relegated Luton and Sheffield United, but this season have let in just one
  • None Last season's figure was almost double their expected set-piece goals against of 12.25, highlighting a fragility from corners and free-kicks
  • None In a stark transformation, this season Forest have the best xG against figure from set pieces - just 1.23 - in the league. It is too simplistic to say the big man at the back and the big man at the front have Forest ticking - but it is definitely working.

  Forest have courted controversy since they returned to the Premier League in 2022-23 with owner Evangelos Marinakis a high-profile figure

  While it looks like Forest have evolved quickly from the side which finished 17th last season, following a four-point deduction, seven of the players from Saturday's 3-0 win over West Ham started the final day victory at Burnley last term. Boss Nuno Espirito Santo had the luxury of a pre-season this year, and while the club added just six senior signings in the summer, defender Milenkovic and midfielder Elliot Anderson instantly upped the first-team quality. Indeed, that relatively calm window was a change from the summer of 2022 when Forest signed a then-record 22 players following promotion. It has been evolution, not revolution, at the City Ground but while there have been tweaks in the last 11 months since Nuno replaced Steve Cooper, they have moved on quickly from two years ago. In Forest's 1-0 win over Crystal Palace last month, with Morgan Gibbs-White suspended, just one player signed during that 2022 spending spree started - and that was goalkeeper Dean Henderson, who was playing for the opposition. There was an agreement at the start of the season the club needed a campaign of anonymity, a mid-table finish to avoid the spotlight following two seasons of struggle, controversy and chaos. A points deduction in March, following a profit and sustainability breach, came before a controversial social media post about VAR Stuart Attwell a month later which ultimately saw the club fined £750,000 this season. With owner Evangelos Marinakis currently midway through a five-game for spitting towards officials - he lost his appeal on Monday - Forest have snubbed the quiet life again. But it is on the pitch where they are making the most noise this season.

