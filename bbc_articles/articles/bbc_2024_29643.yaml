  Nuno returned to the Premier League after a spell in Saudi Arabia and there were a few doubters when he replaced Steve Cooper in December last year. He had won the Saudi Pro League and the Super Cup with Al-Ittihad but after a short and difficult time at Tottenham, Forest fans would have been forgiven for being underwhelmed at his appointment. His four-year spell at Wolves ended as things went stale at Molineux and the squad was unable to maintain their spectacular rise from the Championship to the Europa League quarter-finals. But before the decline, he built a squad - with the help of agent Jorge Mendes - which included young talent like Ruben Neves combined with the experience of Joao Moutinho. He is slowly doing the same at the City Ground with the arrival of six senior players, including defender Milenkovic who has helped Forest tighten up at the back and concede just seven goals so far. Only Liverpool - six - have shipped less. Those who have covered Nuno at either Wolves, Spurs or now Forest know he is not the most expressive in news conferences. He is a meticulous planner of what happens on the pitch which, over the course of a year, has steadily improved Forest's prospects, although he has still benefited from the foundations predecessor Cooper laid. Cooper's influence and relationship was crucial to signing Gibbs-White - with whom he won the Under-17 World Cup while England youth manager - while the now-Leicester boss brought Wood to the club and kept them in the Premier League. Nuno has built on that success, although he has let his emotions get the better of him on the touchline - despite promising to rein in the criticism of officials - and in August he was fined £40,000 and given a one-game suspended ban after his comments following the 2-0 defeat at Everton last season. That suspension was activated when he was dismissed for contesting Gibbs-White's red card in the draw at Brighton in September, meaning he has watched Forest's past three games from the stands.

  Despite Nuno and owner Marinakis' disciplinary issues, Forest are on a three-game winning run which has propelled them to third. Trips to Arsenal, Manchester City and Manchester United come swiftly after the international break, which starts after Sunday's league visit of Newcastle, while they also host Aston Villa and Tottenham before the end of the year. Those who are sceptical of their chances will point to the fact that five of their 10 games so far have come against the bottom seven, while their past three games have been against Crystal Palace, Leicester and West Ham, none of whom have started the season well. But Forest have gone to Anfield to inflict leaders Liverpool's only defeat this season and have also claimed draws at Chelsea and Brighton.
  • None Opta's expected points model has Forest in fifth and suggests they are over-performing their game statistics by 2.23 points
  • None Compared to last season, Forest have turned an away defeat by Liverpool into a win and losses to Bournemouth (h) and Brighton (a) into draws
  • None Forest have had the fourth-easiest opening 10 fixtures but they now face the fourth-most difficult fixtures for their next 10 outings. Sunday's game against Newcastle - who won at the City Ground in the Carabao Cup in August - starts a spell which will test Forest's staying power and by Christmas it will be clear whether they can sustain their form.
