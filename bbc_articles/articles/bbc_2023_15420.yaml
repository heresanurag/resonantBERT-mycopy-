content: |-
  The DUP leader has told delegates at the party's conference that power-sharing is "essential" for securing Northern Ireland's future within the UK.

  The leader of the DUP has told delegates at the party's conference that power-sharing is "essential" for securing Northern Ireland's future within the UK.

  Speaking at a hotel in south Belfast, Sir Jeffrey Donaldson said that the party must not allow republicans to "perpetuate the myth that Northern Ireland is a failed and ungovernable political entity".
