  The ONS estimates about 130,000 people in the UK would have had coronavirus in the week to 10 April.

  What do we know about the Indian variant?

  Viruses mutate all the time in a bid to survive. The challenge for scientists is to work out which mutations change how the coronavirus behaves. Do they alter how the virus spreads, for example, do they cause people to be more seriously ill and could they evade the protection of vaccines? These are all questions experts will now try to answer about the Indian variant by carrying out experiments in the lab and looking at data on cases in the real world. So far, we know that it has two mutations – the first, E484Q is similar to one found in the Brazilian, South African and Kent variants – and the second, L452R has been found in a variant in California. That means it could be a concern based on what is known about those variants already. But the "double mutation" on its own isn’t unusual and has been found in other variants. Covid vaccines are still very effective at reducing the risk of serious illness and manufacturers plan to update their vaccines in response to the most worrying new variants.
