title: Upturned plane lies on Toronto Pearson Airport runway after crash - BBC News
date: '2025-02-17'
section: General
url: http://www.bbc.co.uk/news/videos/c0lzl2ekrk5o
content: |-
  The flipped over plane lies on the snow-covered tarmac and appears to be missing at least one of its wings.

  Emergency teams are responding to a plane crash at Toronto Pearson International Airport.

  The airport says it is aware of an incident involving a Delta Airlines plane arriving from Minneapolis and says all passengers and crew are accounted for.

  Three people are currently being transported to hospitals to be treated for critical injuries, including one child, according to Ontario's air ambulance service, Ornge.
