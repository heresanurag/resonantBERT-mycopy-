content: |-
  A 45-year-old man is due to appear in court charged with the murder of Margaret Una Noone in Cookstown.

  A 45-year-old man is due to appear in court charged with the murder of a woman in Cookstown, County Tyrone.

  Margaret Una Noone, 77, was found dead at a house in Ratheen Avenue in the town on Sunday.

  Local politicians said the community was devastated by her death.

  The man is due to appear at Omagh Magistrates' Court on Tuesday.
