title: Parrots free-fly around Primrose Hill park delighting onlookers - BBC News
date: '2024-07-21'
section: General
url: http://www.bbc.co.uk/news/videos/cjqez4dgw8vo
content: |-
  Happy and Scarlet are taken to the park by their owner, Hisham Bondok.

  Say hello to Happy and Scarlet.

  The two macaws can be found flying around Primrose Hill in central London every day.

  They're owned by Hisham Bondok who's been bringing the birds there for the past five years.

  An Instagram page, external dedicated to the parrots has amassed almost 60,000 followers and Mr Bondok has started an exotic fruit business off the back of the attention.

