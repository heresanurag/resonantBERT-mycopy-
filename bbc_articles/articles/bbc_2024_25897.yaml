content: |-
  Freddie Thomas and Blair Murray are named by Wales for the autumn series along with Rhodri Williams, 10 years after his last cap.

  Freddie Thomas and Blair Murray qualify for Wales through family ties

  Uncapped pair Freddie Thomas and Blair Murray have been included in Wales' 35-man squad for the autumn series in November. New Zealand-born Scarlets wing Murray qualifies for Wales through his mother. Gloucester lock Thomas has been capped by England at under-18s and under-20s level but has switched allegiance as he qualifies through his Welsh grandparents. Head coach Warren Gatland has also given a shock recall to 31-year-old Dragons scrum-half Rhodri Williams, more than 10 years after his last Wales cap. Gareth Anscombe, Nicky Smith and Tomos Williams also return following international absences as Gatland looks to bring back experience. Aaron Wainwright, one of only three players with 50 caps, is included despite not having played this season because of injury. Wales have lost their last nine Tests and kick off their campaign against Fiji in Cardiff on Sunday, 10 November before hosting Australia and world champions South Africa.

  “This is an exciting squad with some key experience coming back to join the younger players," said Gatland. "We're trying to build depth and competition in the squad and we're starting to see that, especially when you consider the players still to come back." Dewi Lake retains the captaincy despite the return of Jac Morgan, who missed the summer tour to Australia through injury and faces stiff competition for the number seven jersey from Leicester's Tommy Reffell.

  Murray's selection comes just days after he scored his first try for Scarlets, who he joined in the summer from Super Rugby outfit Crusaders. Gatland said the former New Zealand Schoolboy international offers pace, a left-foot option and cover for the problem position of full-back. Gatland has also been tracking Thomas, who qualifies through grandparents from Swansea and is among five Gloucester players in the squad. Potential first-choice half-backs Anscombe and Tomos Williams, Josh Hathaway and Max Llewellyn, who scored a hat-trick on Saturday, make up the Kingsholm contingent, who outnumber players from Dragons. However Dragons' Rhodri Williams, who made his 150th league appearance on Saturday, appears to have quickly benefited from Gareth Davies’ decision to retire from international rugby earlier this week. "Rhodri has been around for a while and we're seeing that experience with his leadership and calmness for Dragons," said Gatland. "He also played well last season, kicking well and scoring tries. He deserves his chance."

  Rhodri Williams won the last of his three caps against Scotland in the 2014 Six Nations

  Adam Beard, Ryan Elias, Will Rowlands and Henry Thomas all return after missing the summer tour. But Wales are still without Taulupe Faletau, Josh Adams, Dafydd Jenkins and Elliott Dee through injury while Liam Williams is unavailable. And there is no place for injured props Corey Domachowski and Leon Brown, with Gatland admitting to having concerns over the fitness of many of his front-rows. Cardiff back-row Mackenzie Martin, Dragons flanker Taine Basham and Scarlets centre Johnny Williams all miss out on selection.
