  Manchester United forward Mason Mount will be out for "several weeks" with a leg injury, says manager Ruben Amorim.

  Mount 'devastated' after injury but Amorim offers help

  Mason Mount has made just nine Premier League starts since joining Manchester United in July 2023

  Manchester United forward Mason Mount says he is "devastated" after being ruled out for "several weeks" with a leg injury. The England international was forced off just 14 minutes into Sunday's Manchester derby win at neighbours City. In a post on Instagram, Mount said: "Words can't portray how devastated I'm feeling right now. "You could probably see the look on my face when it happened. I knew what it meant." Speaking after United's Carabao Cup defeat at Tottenham about Mount's expected absence, Amorim said: "I don't know the exact date but it is going to be long." Mount was making just his fourth Premier League start of the season. He started only five matches during his first season with United after joining from Chelsea in July 2023.

  The 25-year-old missed five months of last season with thigh and calf injuries, and has been out for two months of the current campaign after suffering hamstring and head injuries. "United fans, you may not know me too well yet but one thing I can guarantee, I will never give up or lose faith," Mount said. "I've said this before, but I will continue to give everything, get through this tough period and won't stop until that's achieved." Amorim, who took charge of United on 1 November, said he will "help" Mount through his injury struggles. Asked whether Mount is injury prone, Amorim added: "That is not my department. "What I can do is help Mase to teach him to play our game while he is recovering, to give him that time to think about different things. "With Mason Mount, we are going to help him and it is really hard for him to be out so long. He is trying really hard. If they try hard, we will help them to the end."
