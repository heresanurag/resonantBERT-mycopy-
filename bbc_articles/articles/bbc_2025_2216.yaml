title: 'Arne Slot ban: Liverpool manager gets two-game touchline ban for Everton red
  card - BBC Sport'
date: '2025-02-26'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/cx2gj4qvjelo
content: |-
  Liverpool manager Arne Slot is banned for the second time this season following his red card against Everton this month.

  Arne Slot has won 31 of his 42 games in all competitions since taking over at Liverpool last summer

  Liverpool manager Arne Slot has been given a two-game touchline ban for his red card against Everton. He was dismissed for approaching referee Michael Oliver on the pitch after the 2-2 Premier League draw at Goodison Park on 12 February. Slot will miss the league leaders' home game with Newcastle on Wednesday and the visit of Southampton on 8 March. He can be on the touchline for the Champions League last-16 first-leg tie with Paris St-Germain on 5 March. Slot was also fined £70,000 by an independent Football Association commission after accepting the charge.

  Liverpool assistant coach Sipke Hulshoff was banned for two games and fined £7,000, while Liverpool and Everton were fined £65,000 and £50,000 respectively for failing to control their players. James Tarkowski's 98th-minute equaliser sparked chaotic scenes, with Everton fans entering the field to celebrate. Liverpool thought Tarkowski's goal, which was checked by the video assistant referee (VAR), should have been ruled out for a push on defender Ibrahima Konate in the build-up. Slot exchanged words with one of the assistant referees before shaking hands with Oliver, who immediately showed him a red card. Hulshoff was also sent off. Slot, who was unable to speak to the media after the match because of his red card, later voiced his frustration over the amount of stoppage time played, after five minutes were initially signalled. In a news conference two days after the game, Slot said "emotions got the better of me".

