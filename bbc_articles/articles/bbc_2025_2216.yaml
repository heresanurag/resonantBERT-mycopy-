  Everton's Abdoulaye Doucoure and Liverpool's Curtis Jones were sent off after the final whistle for second yellow cards. Both served one-game bans. Slot's first domestic game back in the dugout will come after the international break when Liverpool face Newcastle in the Carabao Cup final on 16 March. Liverpool, who are 11 points clear at the top of the Premier League, face Everton at Anfield on 2 April. Slot served a touchline ban for the EFL Cup quarter-final against Southampton in December after being shown three yellow cards.
