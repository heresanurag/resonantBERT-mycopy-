content: |-
  Teagan McFarlane, who is 14, remains in hospital with "potentially life-changing" injuries and has undergone surgery.

  Man held after acid attack on girl outside school

  There has been an increased police presence outside the school since Monday

  A 35-year-old man has been arrested after a suspected acid attack on a girl outside a school in west London. Teagan McFarlane, 14, remains in hospital with "potentially life-changing" injuries and has undergone surgery. A 16-year-old boy was also injured outside Westminster Academy, Westbourne Park, on Monday afternoon, while a staff member was hurt trying to help them. The Metropolitan Police said the man was arrested on suspicion of causing grievous bodily harm, and remains in custody.

  Teagan McFarlane's father Corey said her injuries are potentially life-changing

  Detectives said "a lone man" threw a substance at the teenagers before fleeing on an electric scooter along Harrow Road. Corey McFarlane, Teagan's father, said "words could not express the shock, pain, and trauma" his daughter is going through, "both physically and emotionally". He added that she was initially discharged from hospital, but was later readmitted. The 16-year-old boy was treated at hospital and has now been allowed home.

  In an online post, Mr McFarlane said: "Teagan’s injuries are not life-threatening at this time, but it’s still early days, and she will need plenty of rest". Mr McFarlane said his family would be leaving the area. He thanked the public for donations made via an online fundraiser, which he said would help towards relocating his family which "has become necessary due to our circumstances". He added that the attack "deeply affected" his daughter's mental health and she has said she does not want to return to school. He wants the 14 year-old to continue her GCSE studies with a private tutor, also funded by public donations.

  The suspected acid attack took place just after school was finishing on Monday afternoon

  Det Supt Scott Ware said: “We are aware of the concerns raised by the community and questions that are being asked about the circumstances surrounding the incident. “We will maintain a visible policing presence outside the school."
