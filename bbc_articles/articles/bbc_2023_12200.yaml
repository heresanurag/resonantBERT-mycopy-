title: Fire and smoke tears through Maui towns - BBC News
date: '2023-08-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66453622
content: |-
  Eyewitnesses filmed intense smoke clouds and fire rampaging through the Hawaiian island of Maui.

  Eyewitnesses filmed intense smoke clouds and fire raging on the Hawaiian island of Maui. The fire, a result of dry conditions and forceful winds brought by Hurricane Dora, has prompted extensive evacuations in the Lahaina area.
