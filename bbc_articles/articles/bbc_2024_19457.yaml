  A 31-year-old man was found unresponsive in his cell at HMP Fosse Way, police say.

  Six arrested after inmate dies at prison

  The man was found unresponsive in his cell at HMP Fosse Way

  Six men have been arrested after an inmate died at a prison in Leicestershire. Police were called to HMP Fosse Way, in Tigers Way, Glen Parva, on Tuesday, after a 31-year-old man was found unresponsive in his cell. The man's death is currently being treated as unexplained and inquiries are ongoing, Leicestershire Police said. The arrested men remain in police custody, the force added.

  The £286m Category C prison, which has space for 1,715 inmates, was first opened by the government in June 2023. It replaced the former HMP Glen Parva which closed in 2017. A spokesman for Serco, which manages the facility, said: "We can confirm that a 31-year-old man has died at Fosse Way prison. "The matter is now being investigated by Leicestershire Police."

  The design of HMP Fosse Way follows the blueprint of HMP Five Wells, which the Ministry of Justice said aimed to "boost security, rehabilitate offenders and protect by helping prisoners find work". It includes X-shaped blocks, industry workshops and a variety of classrooms designed to train offenders. Follow BBC Leicester on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
