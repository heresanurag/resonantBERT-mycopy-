title: BBC Verify analyses where Iran's missiles struck in Israel - BBC News
date: '2024-10-03'
section: General
url: http://www.bbc.co.uk/news/videos/cr4x3xnn7w7o
content: |-
  BBC Verify analysed three locations that were hit by Iranian missiles.

  Iran launched a missile attack on Israel on Tuesday night, hitting three key locations.

  Most of the ballistic missiles were intercepted, according to the Israeli military.

  This was Iran's second attack on Israel this year, after firing 300 missiles and drones in April.

  BBC Verify's Nawal Al-Maghafi analysed videos that emerged following the attack and pinpointed three key locations that were targeted.
