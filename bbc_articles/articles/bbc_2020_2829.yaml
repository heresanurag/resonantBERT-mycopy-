content: |-
  The ex-mayor of New York suffers a series of defeats - but insists he's the man to beat the president.

  The ex-mayor of New York suffered a series of defeats - but insisted he's still the man to beat Donald Trump.

  Talking to supporters at a rally in Florida, Michael Bloomberg turned to humour to attack the current US president.
