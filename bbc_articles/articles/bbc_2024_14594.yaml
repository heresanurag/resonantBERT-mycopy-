  Tony said he was “very happy” to be able to finally attend a party. “I was supposed to go to a garden party, but we got stuck in traffic,” he said. “My mum put out a tweet and the Queen’s team said, ‘so sad that you didn’t make the garden party today’. But we found out I was having a private one with another person called Lyla.” Brain tumour patient Lyla O'Donovan, 11, of North Yorkshire, was also invited to meet Camilla after she missed the garden party in May due to ill-health. She said: “We couldn’t come to the garden party last month because I was in hospital. “We sat around the table and just chatted for a bit. We had some little cookies, some sandwiches, and tea.” Garden parties are held each summer to invitees who have made a positive impact in their community.
