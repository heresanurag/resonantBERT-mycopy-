title: 'Tony Hudgell: Queen Camilla hosts boy who missed garden party - BBC News'
date: '2024-07-01'
section: England
url: http://www.bbc.co.uk/news/articles/cy94gqjq41lo
content: |-
  Tony Hudgell was on his way to Buckingham Palace in May when he got stuck in traffic on the M20.

  Tony Hudgell has attended a private gathering with Queen Camilla and Lyla O'Donovan, a brain tumour patient

  A nine-year-old double amputee who missed the King’s garden party due to a traffic jam has attended a private gathering with Queen Camilla. Tony Hudgell, from West Malling, Kent, was on his way to Buckingham Palace in May when he and his family got stuck in traffic on the M20. He was subsequently invited to have tea with the Queen at her London residence. At the party, Tony also received the British Empire Medal (BEM) for services to the prevention of child abuse.

  Tony, who had both legs amputated after he was abused as a baby, became the youngest ever recipient of a New Year Honour.

  Tony had both legs amputated after he was abused as a baby

  The boy's adoptive mum, Paula Hudgell, previously said the family were originally invited to a garden party on a different date, but they had to bring the date forward so she could have surgery for her bowel cancer. In a video posted on X, formerly Twitter, the Queen said: “Really nice to get you here today.

