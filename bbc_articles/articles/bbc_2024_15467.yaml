title: Drake's Toronto home 'The Embassy' hit by floods - BBC News
date: '2024-07-17'
section: General
url: http://www.bbc.co.uk/news/videos/cpd97p33y4jo
content: |-
  The Canadian rapper joked on Instagram that the rushing floodwaters "better be espresso martini".

  Canadian rapper Drake has posted a video which appears to show part of his Toronto home submerged in flood waters.

  The city has been hit by record rainfall from three huge storms that have cut power and stranded motorists.

  Drake joked on Instagram that the rushing waters "better be espresso martini" as he shared a video of the home he refers to as The Embassy.
