content: |-
  The Duke and Duchess of Cambridge attend the premiere of the long-awaited Top Gun sequel.

  The Duke and Duchess of Cambridge have attended the premiere of Top Gun: Maverick in London.

  Its star Tom Cruise joined them on the red carpet in Leicester Square.

  The original Top Gun movie was released more than 30 years ago.
