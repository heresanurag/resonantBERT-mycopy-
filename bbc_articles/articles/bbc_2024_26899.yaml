id: bbc_2024_26899
title: 'Manchester Airport: Man held after EasyJet flight security blunder - BBC News'
date: '2024-10-06'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cvgdryzplvdo
content: |-
  A flight was delayed at Manchester Airport after a man "incorrectly" boarded it, EasyJet says.

  Passengers due to fly from Manchester to Milan had to disembark the plane following the error on Friday

  A flight was delayed at Manchester Airport after a man "incorrectly" boarded the plane, an EasyJet spokesman has said. The BBC understands he had been due to fly on another EasyJet flight but gained entry to the Milan-bound flight on Friday evening in error. All passengers had to disembark the plane as extra security checks were carried out in line with standard procedure. Greater Manchester Police (GMP) said a man had "embarked on a flight without the correct documentation". Nothing suspicious was found on board and there was no suggestion that it was terror-related.

  An EasyJet spokesman said the flight was "subject to additional security checks, in line with procedures, due to a passenger incorrectly boarding the flight". They added: "Safety and security is our highest priority and so we will now work with our ground partner at Manchester Airport to understand how he was able to board the flight." A GMP spokesman said a man in his 20s was arrested on suspicion of hiding himself with the purpose of "being carried in an aircraft without consent and intentionally or recklessly causing public nuisance". The suspect remains in police custody as inquiries continue. An EasyJet spokesman said they were "not able to provide further details while that is ongoing".
