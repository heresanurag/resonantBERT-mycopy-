id: bbc_2018_7561
title: Boy falls down 80ft Cornish coastal blowhole - BBC News
date: '2018-06-16'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-44506060
content: "There have been calls for safety signs and fencing near the blowholes on\
  \ Cornwall's north coast.\n\nIt is believed the 16-year-old had been celebrating\
  \ the end of exams with friends\n\nA 16-year-old boy was rescued after falling down\
  \ an 80ft (24m) blowhole in Cornwall.\n\nRescuers were lowered into the hole at\
  \ Trevone, near Padstow at about 01:00 BST and the boy was airlifted to hospital.\n\
  \nNewquay Coastguard Rescue Team said it was a \"complex cliff rescue\". The teenager's\
  \ injuries are not believed to be life-threatening.\n\nThe rescue team said it was\
  \ thought he had been celebrating the end of exams.\n\nCoastguards have described\
  \ the cliff rescue as \"complex\"\n\nThere have been calls in the past for safety\
  \ signs and fencing near the blowholes on Cornwall's north coast after a 56-year-old\
  \ man fell over the edge of one in April.\n\nA blowhole is a vertical fault in a\
  \ cliff that is widened after exposure to strong waves - creating water pressure\
  \ that can escape up through the hole.\n\nThe best-known blowhole at Trevone is\
  \ the Round Hole, which is formed by a collapsed sea cave and can be seen on a sloping\
  \ field above the east side of the beach.\n\nThe Round Hole at Trevone is north\
  \ Cornwall's best-known blowhole\n\nCoastguards initially thought this was the location\
  \ of the emergency, but they discovered it was actually in between Harlyn and Trevone\
  \ across the bay.\n\nTrevone Bay is a site of special scientific interest and lies\
  \ within the Cornwall area of outstanding natural beauty.\n\nPadstow Coastguard\
  \ has reminded people to \"stay away from cliff edges\" and for people to \"call\
  \ 999 immediately\" if they see someone in danger.\n\nThe best way to get news on\
  \ the go \n\nThe BBC is not responsible for the content of external sites."
