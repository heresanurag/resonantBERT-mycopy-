content: |-
  Protests in major cities, including New York and Washington, continue for an eighth night.

  Here's what the situation on the ground looked like across some major US cities on Tuesday:

  Thousands of people across New York turned out as protests continued over the death of George Floyd Image caption: Thousands of people across New York turned out as protests continued over the death of George Floyd

  In Los Angeles, placards with the phrase Black Lives Matter - a movement in protest against police killings of black people - were seen Image caption: In Los Angeles, placards with the phrase Black Lives Matter - a movement in protest against police killings of black people - were seen

  One man and his one-year-old daughter were among protesters in the Californian city of Pasadena Image caption: One man and his one-year-old daughter were among protesters in the Californian city of Pasadena

  And in Washington DC, police in riot gear were seen through the metal fence in front of the White House Image caption: And in Washington DC, police in riot gear were seen through the metal fence in front of the White House
