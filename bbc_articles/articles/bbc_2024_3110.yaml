content: |-
  Kylie Davies was last seen four days before her body was found on a beach, an inquest hears.

  Kylie Davies's disappearance led to a search along the coast in Porthcawl

  A woman whose body was found on a beach was seen walking into the sea four days earlier, an inquest opening heard.

  Kylie Davies's body was discovered on Southerndown beach on 27 January, a short distance down the coast from where she was last seen in Porthcawl.

  Ms Davies, 35, was reported missing on 23 January, the day she was seen going into the sea of her home town.

  No provisional cause of death has yet been established and a full inquest will be held at a later date.

  The hearing in Pontypridd was told a member of the public saw Ms Davies go into the water on the evening of the 23rd as Storm Jocelyn approached the UK, bringing with it winds in excess of 70mph (110 km/h).

  Her disappearance led to a search along the coast involving teams from the coastguard, the RNLI, South Wales Police and a helicopter from St Athan.

  This was called off on 24 January when it became a police matter.

  Ms Davies was identified by a family member and a post-mortem examination was carried out at the Royal Glamorgan Hospital.

  At the brief hearing, assistant Coroner for South Wales Central, Rachel Knight sent her condolences to Ms Davies's family.
