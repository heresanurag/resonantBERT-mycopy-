title: 'M1 crash: Woman dies in Christmas Eve collision - BBC News'
date: '2019-12-25'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-50911132
content: |-
  A number of vehicles were involved in the crash on the northbound stretch of the M1 at about 23:15 GMT.

  The woman was pronounced dead at the scene

  A woman has been killed in a crash on the M1 late on Christmas Eve.

  A number of vehicles were involved in the crash at about 23:15 GMT on the northbound stretch of the motorway, Bedfordshire Police said.

  The woman was pronounced dead at the scene and the force has appealed for any witnesses to come forward - another person suffered minor injuries.

  The M1 was closed between junctions 11a, north of Luton and Dunstable, and 12 at Flitwick, but has since reopened.

