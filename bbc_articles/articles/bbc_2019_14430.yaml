  There was also an unrelated crash on the southbound carriageway between junctions 10 and nine. It is not yet known if there were any injuries.

  This stretch of the M1, between Luton Airport and Dunstable, was reopened by 09:00.

  Firefighters and paramedics attended both crashes along with the two police forces.

