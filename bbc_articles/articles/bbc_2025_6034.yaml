title: 'Buckinghamshire: ''Mum was handcuffed and bludgeoned to death'' - BBC News'
date: '2025-04-10'
section: England
url: http://www.bbc.co.uk/news/articles/cvgppplzze5o
content: |-
  A family and Thames Valley Police appeal for information on the 30th anniversary of a cold case murder.

  'Mum was gagged, handcuffed and bludgeoned to death'

  Janet Brown (left) with her eldest daughter Zara Harden (right) who remembers her loving Mum as "always there for us"

  The violent murder of mother-of-three Janet Brown "totally shattered" her family and has baffled police for three decades. Janet, a 51-year-old research nurse in Oxford, was home alone in the Chiltern Hills, near Radnage in Buckinghamshire, when someone broke in, handcuffed her and hit her on the head repeatedly with a heavy object. The murder weapon was never found and the motive remains a mystery. On the 30th anniversary of Janet's death in April 1995, her family and the police are calling for help in identifying her killer, who until now has "got away with it".

  This video can not be played To play this video you need to enable JavaScript in your browser. Janet's eldest daughter, Zara Harden, believes "someone must know something"

  Janet's eldest daughter Zara Harden described her Mum as petite, capable, calm, kind and gentle. "She was alone that night and defenceless," Zara said, "that's why it's so hard to try and understand why somebody felt the need to handcuff her and be so violent and brutal towards her. "She was bludgeoned to death. You just don't imagine that someone could get away with something that is so horrendous. "There would have been a lot of blood and somebody must know something and we just ask they please come forward to the police. "It's not too late. The police have DNA from the scene so they just need a name to be able to find a match."

  Janet Brown "juggled working life with family life" and her family was "everything" to her

  After training as a nurse and midwife, Janet had been working as a medical research nurse for Oxford University's Public Health and Primary Care department at the John Radcliffe Hospital. At the time of her killing, Janet's husband Grahaem Brown had been working abroad in Switzerland. The couple had three children; Zara who was living and working in London, Ben who was away at university and Roxane who was still living at home, but had been staying the night with a friend on 10 April 1995. Her older sister Zara is relieved Roxane wasn't home because "I dread to think what would have happened if she'd have been there as well."
