  Janet was beaten to death sometime between 20:15 and 22:15 (GMT) in the evening at Hall Farm in Sprigs Holly Lane. The next morning a builder arrived to work at the house, heard the burglar alarm and looked through a window. He then saw Janet's naked lifeless body lying at the bottom of the stairs.

  The head of Thames Valley Police's major crime investigation review team, Peter Beirne told the BBC Janet's killing was "extremely unusual" and "perplexing". He explained that most burglaries take place when a property is unoccupied and it would have been obvious someone was at home as there were two cars on the drive. He said: "It could have been a burglar. It could have been someone who knew Janet, we just don't know." "She was bludgeoned to death for no apparent reason. She'd been handcuffed. Nothing appears to have been stolen from the house and there was no sexual motive."

  Senior investigator, Peter Beirne, still believes there are people with information or suspicions about the possible identity of Janet's "vicious" killer

  Mr Beirne announced ten years ago a DNA profile had been developed from evidence collected at the scene in 1995 and revealed it belonged to a man unrelated to the Brown family. He added: "We believe it could be a vital piece of evidence linking the killer to the scene." So far no match has been found on the national DNA database which holds the DNA of almost six million people. The cold case investigators have also seen and eliminated more than one thousand other men as being the source of the DNA. Mr Beirne said "It's very frustrating we haven't had a result as of yet, but we're optimistic and our hope is that the next time we knock on someone's door their DNA matches and that's why we're making this appeal today. "With the help of the public, ideally what we'd like is the names of anybody they've got suspicions of who they think could be responsible for this horrific crime."

  Janet with her family in happier times. Left to right at back: Janet's son Ben, Janet's brother-in-law, Stewart and Janet's husband Grahaem Brown. Left to right in front: Janet's mother-in-law Isobel, Janet Brown and her daughters Zara and Roxane

  Janet's family remain traumatised by what happened to her. Zara says they have all shed a lot of tears and remain fearful for their safety. Zara has suffered panic attacks and still wakes often at night listening for noises. She said her mum's killer or killers "have so far gotten away with it". In a final plea for help she told the BBC: "We want to see them prosecuted and not have somebody who's extremely dangerous to still be out there on the loose. We just want to stop it happening again."

