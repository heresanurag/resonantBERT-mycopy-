id: bbc_2017_11767
title: Migrants die as boat capsizes off Libya - BBC News
date: '2017-11-26'
section: General
url: http://www.bbc.co.uk/news/world-africa-42126207
content: |-
  At least 31 migrants have died after their boat capsized off the coast of Libya.

  They had been trying to cross the Mediterranean along with another boat.
