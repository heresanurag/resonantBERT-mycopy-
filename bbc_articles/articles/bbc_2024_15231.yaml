title: King Charles and Queen Camilla to visit Australia and Samoa - BBC News
date: '2024-07-15'
section: UK
url: http://www.bbc.co.uk/news/articles/c51yg8d4zdvo
content: |-
  The King has been taking on more public-facing duties since his cancer diagnosis earlier this year.

  King and Queen to visit Australia in October

  King Charles III and Queen Camilla are set to visit Australia and Samoa in October, as the King takes on more public duties while receiving cancer treatment. The pair will carry out engagements in the Australian Capital Territory and New South Wales, before heading to Samoa for a Commonwealth summit. The King will make the lengthy journey despite his diagnosis for an undisclosed form of cancer earlier this year. But Buckingham Palace have confirmed that the couple will not visit New Zealand, saying doctors have advised against an extended visit on health grounds.

  "In close consultation with the Australian and New Zealand prime ministers, and with due regard for the pressures of time and logistics, it has therefore been agreed to limit the visit to Samoa and Australia only," the Palace said in a statement. This will be the King's first visit to Australia as Monarch. It is also his first official overseas tour since his cancer diagnosis. In Samoa, they will attend the Commonwealth Heads of Government Meeting. In Australia, their programme includes visits to the Australian Capital Territory and New South Wales. The couple are expected to attend the Commonwealth Heads of Government Meeting (Chogm), which brings together delegations from the 56 countries in the Commonwealth. Further details of the visit to the two countries are expected to be announced shortly, and the couple's programme and schedule changes will be subject to doctor's advice. The 75-year-old monarch last visited Australia in 2018 with the Queen for the Gold Coast Commonwealth Games.

  The King and Queen last visited Australia in 2018 for the Commonwealth Games

  Australians narrowly voted against cutting ties with the monarchy in a referendum in 1999, but calls have continued in the quarter-century since for another ballot. It is a longstanding policy of Australia's Prime Minister Anthony Albanese to hold a vote on becoming a republic - but in January the government indicated that it has put that referendum on hold, saying it was not a priority. Buckingham Palace confirmed in February that the King would pause some public events while receiving treatment for cancer. At the time they said it was not prostate cancer, and that it was discovered during treatment for an enlarged prostate. The King later returned to public-facing engagements in April when he spoke to patients at the University College London Hospital about the "shock" of hearing about his cancer diagnosis.

  In recent weeks, he visited Normandy as part of a D-Day commemoration event, hosted actor Idris Elba for a summit on tackling youth crime and hosted the Japanese emperor and empress during their state visit to the UK. Earlier on Sunday, the Princess of Wales presented the Wimbledon men's singles trophy to Carlos Alcaraz, in her second public appearance since confirming her cancer diagnosis earlier this year. Catherine made her return to public duties with an appearance at Trooping the Colour last month, waving and smiling from the Buckingham Palace balcony with her children. At the time, the princess addressed her cancer diagnosis in a statement saying that while she is making "good progress", she was "not out of the woods yet".
