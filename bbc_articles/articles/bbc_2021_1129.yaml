  "When companies make these games, they don't run every aspect by me and so I had no idea of the types of questions that were on these playing cards."

  She added: "Now when I first saw this, I was really really really upset at how gross these questions were. And so I brought it to Nickelodeon's attention immediately and since then, they have been working to get this game stopped being made, and also pulled from all shelves wherever it's being sold."

  She went on to say that she would have "never approved or agreed to be associated with this game," if she had seen the cards beforehand.

  Other questions featured in the board game included: "Have you ever stolen from a store?" and "Have you ever walked in on someone naked?"

  The US teenager posts videos of her day-to-day life on her YouTube channel, Its JoJo Siwa.

  She is also a singer and dancer, having appeared on the reality TV series Dance Moms, alongside her mother, Jessalynn Siwa.

  Her musical offerings so far include the singles Boomerang and Kid in a Candy Store.

  Last year, she was included on Time magazine's annual list of the 100 most influential people in the world.

