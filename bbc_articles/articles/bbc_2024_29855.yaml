content: |-
  MP Mike Amesbury is charged with assault after a video emerged of him appearing to punch a man.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV captures an incident in a street in Cheshire in the early hours of 26 October

  MP Mike Amesbury has been charged with assault after a video appeared to show him punching a man to the ground in the street. The charge against the 55-year-old, who has been suspended from the Labour party, relates to reports of an assault on a 45-year-old man in Frodsham, Cheshire, at just after 02:45 BST on 26 October. The MP will appear in court at a later date to be formally charged with common assault. Mr Amesbury confirmed he had been told to appear in court after the "deeply regrettable" incident.

  Mike Amesbury was suspended by the Labour Party after the alleged assault was reported

  The Runcorn and Helsby MP said he was continuing to cooperate with police and he could not comment further "given this is an ongoing case". The date and venue of his first appearance has not yet been confirmed. Mr Amesbury volunteered to be interviewed under police caution after reports of an assault on Main Street in the town. Cheshire Police investigated the complaint and submitted a file for prosecutors to review on 29 October. Rosemary Ainslie of the CPS said it was "extremely important that there should be no reporting commentary or sharing of information online which could in any way prejudice these proceedings". "The Crown Prosecution Service reminds all concerned that criminal proceedings against the defendant are active and that he has the right to a fair trial," she added. Mr Amesbury won his seat with a majority of 14,696 in his Cheshire constituency at the July general election. He served as a Labour MP since 2017 until his suspension, and was a shadow minister between 2018 and 2024.
