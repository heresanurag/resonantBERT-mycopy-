content: |-
  Jay-Z has dismissed the action as a "blackmail attempt", while Diddy has denied the claims against him.

  Jay-Z accused with Diddy in lawsuit of raping girl, 13, in 2000

  Jay-Z and Diddy are seen together at the latter man's 50th birthday party in 2019.

  US rapper Jay-Z has hit back at a lawsuit which alleges that he, along with Sean "Diddy" Combs, drugged and raped a 13-year-old girl at a party in 2000. The anonymous accuser alleges she was assaulted at a house party after the MTV Video Music Awards (VMAs) in New York and that an unnamed female celebrity was in the room at the time. In a statement, Jay-Z, whose real name is Shawn Carter, dismissed the legal action as a "blackmail attempt". Mr Combs - who is in jail awaiting trial after being charged in September with sex-trafficking and other offences - denied the latest accusation.

  Warning: This story contains details that some readers may find distressing. The lawsuit was originally filed in October, and was refiled on Sunday to list Mr Carter as a defendant. The BBC has contacted Mr Carter's lawyer, Alex Spiro, and his publicist for comment. The legal action was filed under New York's Victims of Gender-Motivated Violence Protection Act, by a Texas-based lawyer, Tony Buzbee. Mr Buzbee has filed several lawsuits in recent months accusing Mr Combs of assault and rape - though none have provided the names of victims. The hip-hop artist is due to face a criminal trial on 5 May. Mr Carter said in a statement posted to social media: "My lawyer received a blackmail attempt, called a demand letter, from a 'lawyer' named Tony Buzbee. "What he had calculated was the nature of these allegations and the public scrutiny would make me want to settle. "No sir, it had the opposite effect! It made me want to expose you for the fraud you are in a VERY public fashion. So no, I will not give you ONE RED PENNY!!" Mr Carter added that he found the allegations "so heinous in nature that I implore you (Tony Buzbee) file a criminal complaint, not a civil one!! Whomever would commit such a crime against a minor should be locked away, would you not agree?" A statement from Mr Combs's legal team said this amended lawsuit was the latest in a series of "shameless publicity stunts, designed to extract payments from celebrities who fear having lies spread about them, just as lies have been spread about Mr Combs". The statement said that the judicial process would show Mr Combs to be innocent of all the allegations against him. He faces 30 other lawsuits. Responding to the criticism, Mr Buzbee posted a picture of himself to his Instagram as a younger man in military uniform, with a caption saying he had faced "a coordinated and aggressive effort" to stop him from bringing the case forward. "I also won't allow anyone to scare my clients into silence," he wrote. "Sunlight is the best disinfectant and I am quite certain the sun is coming." The accuser in Sunday's legal filing, who is identified only as "Jane Doe", said that in 2000, when she was 13, a friend dropped her off at the VMAs at Radio City Music Hall in Manhattan. She approached limousine drivers outside the venue to try to gain access to the show, according to the legal action. One driver told her that he was employed by Mr Combs and that she "fit what Diddy was looking for", says the lawsuit. Later that evening the chauffeur drove her to a party at a white house, according to the legal action.

  Jay Z and Sean "Diddy" Combs pictured together in 2000

  Jane Doe says when she arrived at the party she was asked to sign a document, which she believes was a non-disclosure agreement, says the lawsuit. The legal action says she recognised "many celebrities" at the party and observed widespread drug use, including cocaine. A waitress offered her a drink that made her feel "woozy", so she went into a room to lie down, according to the lawsuit. Soon afterwards, the legal action says, Mr Combs and Mr Carter entered the room with a female celebrity, described as Celebrity B. "Plaintiff immediately recognized all three celebrities," says the lawsuit. The legal action says Mr Combs approached her "with a crazed look in his eyes", grabbed her and said: "You are ready to party!" Mr Carter held her down and raped her, before Mr Combs did the same, all while Celebrity B watched, according to the lawsuit. Jane Doe fought back during the assault and when Mr Combs backed away in surprise she escaped, the legal action says. The lawsuit, which seeks unspecified damages, says the plaintiff still suffers from post-traumatic stress disorder and depression as a result of the alleged rapes. In his statement, Mr Carter, who is married to Beyoncé, with whom he has three children, said: "My only heartbreak is for my family. "My wife and I will have to sit our children down, one of whom is at the age where her friends will surely see the press and ask questions about the nature of these claims, and explain the cruelty and greed of people."

