id: bbc_2024_4569
title: 'Russia election: Polling booth set on fire on voting day - BBC News'
date: '2024-03-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-68581214
content: |-
  Russian officials say several people have been arrested for vandalism on the first day of voting in the presidential election.

  Videos shared online show a petrol bomb being thrown at a polling station, and elsewhere a woman can be seen setting alight to a polling booth.

  Vladimir Putin is certain to win six more years in office after the vote.
