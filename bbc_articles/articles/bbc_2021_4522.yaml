title: 'Boat Race 2021: Universities move from London to Ely - BBC News'
date: '2021-04-04'
section: General
url: http://www.bbc.co.uk/news/uk-56624251
content: |-
  The traditional showdown between Oxford and Cambridge universities takes place on the Great Ouse this year.

  The traditional showdown between Oxford and Cambridge universities has been moved from the River Thames in London to Ely in Cambridgeshire for the first time since World War Two, because of the coronavirus pandemic and safety concerns over Hammersmith Bridge.

  The 166th Boat Race will take place on the River Great Ouse on Sunday 4 April.
