title: '''It''s hypocritical'' - Constituents react to MP''s Covid journey - BBC News'
date: '2020-10-02'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-54392446
content: |-
  People in Margaret Ferrier's constituency give their reaction to the MP's trip from London to Scotland while positive for Covid-19.

  BBC Scotland has asked people in Margaret Ferrier's constituency about the MP's decision to travel by train from London to Scotland after testing positive for Covid-19.

  The SNP MP for Rutherglen and Hamilton West is under pressure to resign, with First Minister Nicola Sturgeon telling her daily coronavirus briefing that Ms Ferrier had been guilty of the "worst breach imaginable".
