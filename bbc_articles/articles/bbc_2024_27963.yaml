content: |-
  As Amanda Serrano challenges undisputed light-welterweight champion Katie Taylor, BBC Sport asks the world of boxing for predictions.

  This video can not be played To play this video you need to enable JavaScript in your browser. Serrano 'ready to put on a show' against Taylor

  Ireland's Katie Taylor defends her undisputed light-welterweight crown in a rematch against Amanda Serrano in Texas on Friday. The pair meet at Dallas' AT&T Stadium on the undercard of 58-year-old Mike Tyson's controversial bout against YouTuber-turned-boxer Jake Paul, 27. You can follow live text commentary of Tyson-Paul from 03:00 GMT on Saturday, 16 November on BBC Sport website and app. Taylor claimed a split-decision victory against Serrano in April 2022 to retain her undisputed lightweight crown. The 38-year-old has since suffered the first defeat of her career, losing against Chantelle Cameron, but she avenged that loss by edging the rematch. Serrano, who has won world titles in seven divisions, is on a five-fight win streak since losing against Taylor. The Puerto Rican has lost twice and drawn once during her 50-fight career. Their previous meeting is widely regarded as the greatest female contest of all time.
  • None Tyson v Paul - all you need to know Will Taylor come out on top once again? Or will Serrano make the adjustments required to become champion in an eighth division? BBC Sport has asked personalities from the world of boxing for their predictions.

  Former light-welterweight champion Regis Prograis: "I am going with Taylor - we are in the same squad." Former middleweight world champion Hannah Rankin: "I think the rematch is going to be just as good, if not better than the first fight. I think Amanda has a point to prove but I'm going to go with Katie on points." Featherweight world champion Skye Nicolson: "I will always back Katie Taylor. Breaking down the first fight and the last couple of years, I feel Taylor has had better performances and against better standard of opponents. She has also been fighting at the weight whereas Serrano has gone back down to featherweight. I haven't been impressed by Serrano's performances either, so I will say Taylor by a wider points decision than last time."

  This video can not be played To play this video you need to enable JavaScript in your browser. Tyson slaps Paul at chaotic weigh-in, Taylor and Serrano also weigh in

  Former lightweight world champion Anthony Crolla: "I might be going with heart but I think Taylor wins a close points decision, maybe even a controversial one. I was lucky enough to be ringside for the first fight. It was one of the greatest atmospheres I've ever experienced. I would have loved if Taylor had retired that night, [to] go out on a great performance and great fight. "I thought Taylor had done enough that night although a lot of people I was around thought Amanda should have been awarded the decision. I thought she was fantastic in avenging the defeat to Chantelle Cameron but how many more nights can Taylor keep going to the well? I don't believe there's many more, but you can also say the same about Serrano." Light-welterweight Jack Catterall: "I've been a fan of Taylor for a quite a while so I'll be rooting for her."

  This video can not be played To play this video you need to enable JavaScript in your browser. It's important to stay disciplined - Taylor on what it takes to beat Serrano

  Former cruiserweight world champion Lawrence Okolie: "I obviously want to back Taylor. I hope the fights she had with Chantelle Cameron haven't taken too much out of her at this stage of her career. If so, Amanda Serrano is a good puncher, worker and could out-graft her. But I do think Taylor has already shown her talent and hustle throughout her career so it's hard to go against her." Two-weight world champion Natasha Jonas: "You can never usually bet against Katie Taylor but I am going to. Being out the ring for so long against a pressure fighter and, most of all, a southpaw, will cause her a lot of problems like it did in the first fight. "There isn't a style that Taylor hasn't come across. Even when she lost, she came back and won emphatically. But I do think everything edges to Serrano."

  Lightweight contender Caroline Dubois: "I believe Katie wins the fight on points." Retired world champion Barry Jones: "Katie Taylor v Amanda Serrano 2 - still the best fight in boxing, as was the first fight. An absolute war of the ages. This fight is a little different as both fighters have a few more miles on the clock. Katie probably has a few more miles, although Serrano hasn't been the vintage fighter we've seen in the past. "This is at light-welterweight, the weight advantage is with Katie even more so in this second fight. I see it coming down to who can dominate early. Serrano is a heavy hitter. It's important for her to make Katie feel the pace. Will it be about wear and tear? Miles on the clock? Desire? Will Katie Taylor go to her well again? I think she can. I'm predicting a very close points victory for the queen of Ireland." Olympic gold medallist Galal Yafai: "It's a tough fight. I actually fought on the first [card] at Madison Square Garden and it was the best atmosphere of any fight I've ever been too. If I had to bet my house on it then I'd probably have to go with Serrano, but I'll be rooting for Katie Taylor because she's an icon and a lovely person."
