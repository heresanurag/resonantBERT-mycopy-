content: |-
  Brighton and West Ham are interested in signing Mats Hummels, Manchester United could pursue a deal for Sander Berge, plus more.

  Brighton and West Ham target Mats Hummels, Manchester United could pursue a deal for Burnley's Sander Berge, Arsenal remain in the race to sign Victor Osimhen. Brighton have made contact with free agent, former Bayern Munich and Borussia Dortmund defender Mats Hummels, 35, who won the World Cup with Germany in 2014, although they could face competition from West Ham. (Sky Sports), external Manchester United's search for a midfielder could see them make an offer for Burnley's Norway international Sander Berge, 26, after the Old Trafford club turned their search away from Paris St-Germain's 23-year-old Uruguayan Manuel Ugarte. (Athletic - subscription required), external However, Championship side Burnley will demand up to £30m for the midfielder. (Sun), external Manchester United have also expressed late interest in Monaco's 25-year-old France midfielder Youssouf Fofana, who is on the verge of a move to AC Milan. (Sky Sports Italia), external Erik ten Hag has not discounted the idea of Manchester United signing Fiorentina's Morocco midfielder Sofyan Amrabat, 27, who spent last season on loan at Old Trafford. (Telegraph), external Arsenal remain in the race to sign Napoli's Nigeria forward Victor Osimhen, 25, despite strong interest from Paris St-Germain. (Gianluca di Marzio on X), external Barcelona have reached a verbal agreement on a £47.3m fee plus £6m in add-ons with RB Leipzig for Spain attacking midfielder Dani Olmo, 26. (Fabrizio Romano on X), external Tottenham are interested in Bournemouth forward Dominic Solanke, but a move for Englishman could be dependent on the future of 27-year-old Brazilian striker Richarlison. (Standard), external Spurs are preparing themselves for a huge offer for Richarlison from the Saudi Pro League. (Football Insider), external
