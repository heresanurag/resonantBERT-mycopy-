title: 'Batley death: Craig Stanton charged with murder - BBC News'
date: '2020-05-04'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-52525200
content: |-
  The victim, 61-year-old Saleem Butt, was described as a "lovely and very gentle" man.

  Saleem Butt died from head and neck injuries sometime on 22 or 23 April

  A man has been charged with murdering a 61-year-old who was tied up and killed in his own home.

  Saleem Butt, 61, died from severe head and neck injuries after being "severely beaten" at Hyrstlands Road, Batley, between 22 and 23 April.

  Craig Stanton, 42, of Southgate in Huddersfield, appeared at Leeds Magistrates' Court on Monday.

  Mr Stanton was remanded in custody and told he will next appear at the city's crown court on Tuesday.

  A 46-year-old man from the Dewsbury Moor area was arrested on Monday morning on suspicion of murder. He is being held in custody, police said.

  A man and a woman who were arrested on suspicion of assisting an offender have been released on bail.

  Police said Mr Butt had been "severely beaten in what was clearly an horrific sustained attack".

