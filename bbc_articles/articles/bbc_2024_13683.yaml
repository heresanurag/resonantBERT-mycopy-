content: |-
  Novak Djokovic says he is "pain free" after coming through an exhibition against Daniil Medvedev prior to the start of Wimbledon next week.

  Djokovic trained for nearly two hours at Wimbledon on Monday

  Novak Djokovic has said he is "pain free" after coming through an exhibition match against Daniil Medvedev prior to the start of Wimbledon next week. The Serb tore the medial meniscus in his right knee at the French Open and had surgery three weeks ago which put his participation at the All England Club in doubt. However Djokovic, wearing strapping on his knee, beat world number five Medvedev 6-3 6-4 on Friday and seems set to play at Wimbledon, which starts on 1 July. "I can tell you I enjoyed myself really, really much," said the 37-year-old. "I can tell you that pain-free tennis is the best tennis. I was pain free and I'm really glad. It was a great test obviously against one of the best players in the world. "I've played a couple of practice sets but I really wanted to test myself. The test was very successful so I'm obviously really glad. It's been an intense three weeks after surgery, spending a lot of hours rehabbing. "I kind of always wanted to give myself a chance to be in London. I think my surgeon is here. He's the MVP for sure the last three weeks. I'm trying to take it day by day and see how far it goes."

  Djokovic is a seven-time Wimbledon champion and has been drawn against debutant Vit Kopriva of the Czech Republic in the first round of this year's championship. If he plays it will be his 19th appearance at the grass court Grand Slam. Djokovic has reached the Wimbledon final for the past five years, losing the 2023 showpiece to Carlos Alcaraz in a memorable five-set match on Centre Court. "He seems to be fine," said Medvedev. "You never know what he feels inside of him. "It's a five-set match on grass [at Wimbledon], which is never easy for the knee, so I don't know how it's going to go during the matches. But he seemed to be moving well, even if I got him off guard a little bit."
