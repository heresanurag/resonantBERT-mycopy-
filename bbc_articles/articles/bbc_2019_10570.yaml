  Her photo prompted her fans to share their images of cellulite with her too - which she also included in her Instagram story.

  Mari, 20, who posts as @lovatolight, was one of those who responded.

  She told the BBC: "When I saw she posted my picture and said she was proud of me, all I did was cry. She is such a strong person and that meant a lot. I had that picture but I had never posted it before because I was really insecure about my body. When Demi posted hers I felt really inspired by her courage and decided to post mine too."

  Cellulite is a condition where the skin has a dimpled and lumpy appearance. It affects 90% of all women at some point in their lives yet is often airbrushed from pictures or not shown at all.

  Demi Lovato updated her Instagram story with a response to the reaction her initial picture had

  Fellow celebrities have expressed support for Lovato's post too.

  Comedian Amy Schumer added Demi's photo to her own Instagram story stating "@ddlovato is the truth" while model Ashley Graham wrote: "I love Demi".

  The singer took a short break from the platform in July this year after facing abuse.

  As well as working on new tracks in the studio and appearing as a recurring character in the television show Will and Grace, the star is also working on a film for Netflix called Eurovision.
