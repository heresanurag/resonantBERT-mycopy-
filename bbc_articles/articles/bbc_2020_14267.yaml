  UK leaders earlier discussed travel over the festive period but no decisions were made.

  Elizabeth has enjoyed getting "glammed up" for date nights Image caption: Elizabeth has enjoyed getting "glammed up" for date nights

  All day, on BBC Radio 5 live, listeners are sharing their stories about Covid.

  Elizabeth Blythe is 29 and lives in Stoke-on-Trent. She and her husband are 999 call assessors at West Midlands Ambulance Service.

  She has had a tough year. As well as grieving for her dad who died last November, she had to postpone her honeymoon to New York because of Covid. Work has been challenging too.

  "When coronavirus first hit the UK, it was pandemonium," she said. "The phone was going constantly, you didn't get a break between calls.

  "But as people got used to the 'new normal', the calls decreased quite a bit and it almost seemed that people were scared to call for an ambulance because they didn't want to go anywhere near where they thought coronavirus would be."

  To make up for missing her honeymoon, Elizabeth and her husband have been having "date nights" to cheer themselves up.

  “I get myself all glammed up, he puts on nice clothes and we have a date night in the house," she said.

  How has coronavirus impacted your life this year?

