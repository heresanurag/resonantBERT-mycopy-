title: Victims will be able to attend parole hearings - BBC News
date: '2025-04-01'
section: Manchester
url: http://www.bbc.co.uk/news/articles/ce3vwz73g3no
content: |-
  The scheme, piloted in Greater Manchester, is being rolled out across England and Wales.

  Victims will be able to attend offenders' parole hearings

  Alex Davies-Jones said the move is part of the government's improvements to the justice system

  A scheme that saw victims of crime in Greater Manchester get to go to criminals' parole hearings is to be rolled out across England and Wales. It will mean they will be able to see offenders held accountable for their crimes, their subsequent behaviour in prison and their work to prove they can live law-abiding lives if released. A victim who attended a parole hearing as part of the pilot said it was a "surprisingly positive process" and helped her "move on". Minister for Victims and Violence Against Women and Girls Alex Davies-Jones said victims had been "locked out" of the system for too long.

  Victims who are part of the Victim Contact Scheme, external can apply to the Parole Board to attend hearings and if successful they will be able to observe remotely so they do not have to sit with the perpetrator. They will be supported during the hearing and given counselling if they need it. A victim known as Anna said going to the hearing helped clear up unanswered questions she had. "It has helped us to draw a line under the whole chapter and move on," she said. "Witnessing the level of care taken by the Parole Board instilled in me genuine confidence regarding how the offender will be managed upon release."

  Baroness Newlove welcomes the national rollout of the pilot

  Victims' commissioner Baroness Newlove of Warrington said: "This is a vital step towards lifting the lid on a system that has long felt closed off to victims, helping them feel more meaningfully involved rather than bystanders to proceedings." The latest reform to the Parole Board process will follow new measures to be brought in later this year to introduce a ministerial check on the release of the most dangerous offenders. The changes will also allow them to refer certain cases directly to the High Court for a second check.

