title: Robbie Williams paid £20,000 for Eric Morecambe's glasses - BBC News
date: '2025-02-09'
section: England
url: http://www.bbc.co.uk/news/articles/cp82lg6vjn1o
content: |-
  The singer says he won Eric Morecambe's glasses at auction and regards him as an "uncle of sorts".

  Robbie Williams said Eric Morecambe was "the very best of the very best", as he revealed his winning bid, which was far in excess of the the estimate

  The singer Robbie Williams has revealed he cried "happy, childlike tears" after making the winning bid for comedy legend Eric Morecambe's glasses and pipe at auction. A lifetime of showbiz memorabilia and personal items from the comedian's former home, Brachefield in Harpenden, Hertfordshire, were sold in January. The imitation tortoiseshell Metzler glasses and pipe went for far in excess of their £2,000 to £4,000 estimate - fetching £20,000. In a post on social media, Williams said he treated himself to the items ahead of his 51st birthday.

  The singer told his wife Ayda Field Williams he was going through their children's inheritance as the bidding climbed, which she dismissed, he said

  "I guess we all need friends-we-never-meet from off the telly. Eric has always been mine. An uncle of sorts," he said in the post. Williams, who has spent recent months publicising his new semi-autobiographical film Better Man, said he appointed one of his team to be "chief bidder", as he was in Los Angeles and about to board an aeroplane when the bidding began. He managed to watch a lot of the auction online, spurred on by his wife Ayda Field Williams who told him to "keep bidding" when he had doubts. He admitted to crying "happy, childlike tears" when he won the bidding war. Williams continued: "Eric, you were and are the very best of the very best. "That sunshine you asked for, you gave to me."

  The lot included one of Morecambe's trademark pipes

  Morecambe met comedy partner Ernie Wise in 1940, aged 14, and despite a wartime separation formed an enduring double-act. They had many lean years touring theatres before they broke into TV, appearing on both ITV and the BBC, and by 1977 their Christmas BBC special was watched by 28 million viewers, at a time when there were only three channels in the UK. The comedian died of a heart attack aged 58 in 1984 and his family home's contents were put up for sale after his widow, Joan, died aged 97, in March. Their daughter Gail Stuart, who lives in Northamptonshire, said she and her brothers Gary and Steven decided to give fans the opportunity to own some of his belongings, more than 800 of which went under the hammer. Speaking to BBC Three Counties Radio's Justin Dealey after the auction, she said: "When mum died, it felt like an end of an era and we decided it could be the start of a new era - and I've had so many fans message me with what they'd got at auction and it's just fabulous."

