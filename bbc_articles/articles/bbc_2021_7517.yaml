  During the trial, prosecutors said Ms Class had been stamped on, strangled with a ligature and run over by a car before being dragged to the water on the night of 25 October 1997. Her body was discovered the following day.

  Ms Grlakova's body was found in a stream in Rotherham in April 2019, three months after she was reported missing.

  Just weeks after he was acquitted of murdering Ms Class in February 2000, Allen assaulted two sex workers in separate attacks in Plymouth, for which he was convicted and jailed.

