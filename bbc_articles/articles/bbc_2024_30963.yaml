  The school's director of relations said pupils' training for a mass shooting would have been "very fresh" after sessions were held earlier this year. President Joe Biden said the shooting was "shocking and unconscionable", and called on lawmakers to act immediately on legislation that could prevent more gun violence. Mass shootings are common in the US, including at schools. According to news organisation EducationWeek, 38 of them have caused deaths or injuries this year. There were a total of 69 victims - including 16 deaths - before Monday's attack. But school shootings by female attackers are rare. The school, which has around 400 students from kindergarten to high-school age, remains closed during the investigation.
