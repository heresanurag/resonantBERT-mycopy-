content: |-
  PC Craig Carter will appear in court on Friday charged with misconduct in public office.

  A serving Metropolitan Police officer has been charged after allegedly stealing from a man who collapsed and died in north London.

  PC Craig Carter is due to appear at Westminster Magistrates’ Court on Friday charged with misconduct in public office.

  A Met Police spokesperson said the alleged incident was said to have occurred in Hornsey. The officer was attached to the force's north area command unit.

  PC Carter has been suspended following the charge.
