title: James Heatly continues family's Commonwealth medal success - BBC News
date: '2018-04-13'
section: General
url: http://www.bbc.co.uk/news/uk-43747131
content: |-
  James Heatly's Commonwealth bronze is Scotland's first diving medal since his late grandfather won gold in 1958.

  James Heatly has followed in his grandfather's footsteps by winning a Commonwealth Games medal in diving.

  His bronze is Scotland's first medal in the discipline since his late grandfather Sir Peter Heatly won gold in 1958.
