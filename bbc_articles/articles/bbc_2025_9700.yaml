title: 'George Wendt: Ted Danson and Kelsey Grammer lead tributes to Cheers co-star
  - BBC News'
date: '2025-05-20'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cx2xx998102o
content: |-
  Kelsey Grammer and Ted Danson pay their respects to their "beloved" co-star from the hit US sitcom.

  Wendt appeared in every episode of Cheers

  Tributes have been paid by the cast of US comedy series Cheers after George Wendt - who starred as Norm Peterson - died at the age of 76. Ted Danson, who played bar boss Sam Malone, said he was "devastated to hear that Georgie is no longer with us". Kelsey Grammer, who played Frasier Crane before starring in his own spin-off, said in a statement to Deadline: "I believe mourning is a private matter. But I liked George a lot. He was beloved by millions." Wendt starred as Norm in all 275 episodes of Cheers, which ran from 1982 to 93. He earned six consecutive Emmy nominations for outstanding supporting actor in a comedy series.

  The actor and comedian died peacefully in his sleep at his home early on Tuesday morning, his family said. "George was a doting family man, a well-loved friend and confidant to all of those lucky enough to have known him. He will be missed forever," a representative told the BBC.

  Wendt pictured with co-stars (left-right) John Ratzenberger, Kelsey Grammer, Ted Danson, Rhea Perlman and Kirstie Alley in 1999

  "I am sending all my love to Bernadette and the children," Danson added. "It is going to take me a long time to get used to this. I love you, Georgie." Wendt had reunited with some of the cast, including Danson, Grammer, Rhea Perlman and John Ratzenberger, at the Emmy Awards in 2024. Perlman described Wendt as "the sweetest, kindest man I ever met", adding that she would "miss him more than words can say". And Ratzenberger said he was "heartbroken to hear about the passing of my friend", noting how they had "shared a stage, a lot of laughs, and a front-row seat to one of television's most beloved friendships". Actress Melissa Joan Hart reflected on the handful of times they had worked together on the show Sabrina the Teenage Witch. "He was warm, professional and kind and our cast and crew were gifted with his presence every time. Rest in peace!" she wrote on Instagram. "Heaven just got a little funnier."

  Norm (second from left) was a fan favourite

  Wendt also appeared in several movies such as Dreamscape, Forever Young and Gung Ho. He also appeared as the father of a boy played by Macaulay Culkin in Michael Jackson's Black or White music video, external, which was released in 1991. He had been married to fellow actor Bernadette Birkett since 1978, with whom he had three children. He was also the uncle of actor and comedian Jason Sudeikis, who is most recently known for playing the title character in the sports comedy Ted Lasso.

  Wendt's character Norm was a bar regular in Cheers, and was one of the few characters to appear in every episode. His entrance into the bar was a running gag on the show, beginning with him greeting the other patrons followed by the crowd yelling his name. Speaking 20 years after the show ended, Wendt said people still recognised him because the show had been a once-in-a-generation hit. "I live just a few blocks from where Friends was shot and from where Seinfeld was shot and I'd see the helicopters going over the studio and I'd think, wow, I'm one of a few dozen people who have a unique perspective on what all these people are going through," he reflected. Cheers Boston, the pub that inspired the hit television show, paid tribute by sharing a picture of Norm's spot at the bar on Instagram, external. "George wasn't just an actor - he was a symbol of comfort, laughter, and that familiar feeling of walking into a place where everybody knows your name," they said. "To George: thank you for the laughs, the memories, and the legacy you leave behind. You'll always have a stool at our bar."
