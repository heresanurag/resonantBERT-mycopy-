content: |-
  Esther Keim started delivering frozen turkeys after one of her neighbours told her squirrel for Thanksgiving did not stretch very far.

  Esther Keim has been delivering airborne frozen turkeys to her remote neighbours since once of them told her that squirrel for Thanksgiving did not quite satisfy three diners.

  She flies from Wasilla, about 100 miles south of Denali, North America’s tallest mountain, often bringing a friend to help.
