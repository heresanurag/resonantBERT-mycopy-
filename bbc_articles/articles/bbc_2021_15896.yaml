title: 'Indonesia volcano: Villages buried under hot ash - BBC News'
date: '2021-12-05'
section: General
url: http://www.bbc.co.uk/news/world-asia-59543120
content: |-
  Rescuers are searching for survivors after Mt Semeru erupted in eastern Java on Saturday.

  A huge cloud of hot ash engulfed villages in eastern Java on Saturday when Mt Semeru erupted.

  Fourteen people are known to have died and dozens were injured, emergency authorities have said.

  Rescuers in the district of Lumajang are searching for survivors amid the devastation.
