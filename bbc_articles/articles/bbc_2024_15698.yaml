  But the emphasis on the unity and love of the family does not hide that some key members are a missing presence so far at the Republican National Convention. Trump's wife Melania rarely appears in public with her husband and has not been seen publicly by his side since the rally shooting. Their son Barron, 18, has not yet appeared at the convention either. He has been kept out of the public eye for years but stood to receive a standing ovation at a recent Trump rally in Miami, signalling that he might have a political future too. Linda Stoch, the vice-president of Club 47 USA, which hosted Trump for his 78th birthday in June, dismissed the idea that Melania and Barron would not appear at the convention. "His family have always been with him, from day one," she said. When asked if she saw any particular Trump family member ushering in the next phase of Maga politics, Ms Stoch said we would have to wait and see. She then paused, and added: "Maybe Barron."
