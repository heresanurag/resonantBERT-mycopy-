title: Green Party celebrate record four seat win - BBC News
date: '2024-07-05'
section: Politics
url: http://www.bbc.co.uk/news/articles/cjr48kpjpk9o
content: |-
  Carla Denyer and Adrian Ramsey win in Bristol Central and Waveney Valley with big swings to their party.

  The Green Party has had its most successful election night ever after winning four seats. Up until now, the party had only ever won in the East Sussex constituency of Brighton Pavilion. In this election, the Green Party was able to hold that seat, whilst also securing wins in Bristol Central, Waveney Valley and North Herefordshire. Party co-leader Carla Denyer said Bristol had "made history" by electing her as the city's first Green MP. She defeated Labour's shadow culture secretary Thangam Debbonaire by a majority of 10,000. Her co-leader Adrian Ramsay overturned a 22,000 Conservative majority to win Waveney Valley, with a huge swing to his party of 32.1%. The Green Party is currently on course to win 7% of the vote which would be its best general election performance yet. At the last general election in 2019, it secured less than 3%.

  Speaking to the BBC, Ms Denyer said she believed there was public support for the party's policies - including a proposal to increase the minimum wage and raise taxes to help invest in public services. She said people had been hesitant about voting for her party in the past because they didn't think they would win. However, she said her result proved that "if you want Green, you can vote Green and you will get a Green MP". The Green Party won a seat in the House of Commons for the first time in 2010, when Caroline Lucas became the MP for Brighton Pavilion. Last year, she said she would not be standing again. Sian Berry took on the seat for her party, winning with a majority of 14,000 - down by around 5,000 from the last election. In North Herefordshire, Ellie Chowns defeated the Conservatives' Bill Wiggin, who had previously held the seat with a 25,000 majority.
