title: Teen, 17, accused of Southport murders named - BBC News
date: '2024-08-02'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c6p2yrg3pvpo
content: |-
  Axel Rudakubana appeared at Liverpool Crown Court where a judge ruled his identity could be made public.

  A court sketch of Axel Muganwa Rudakubana, who appeared at Liverpool Crown Court earlier

  A 17-year-old charged with murdering three girls who were stabbed at a Taylor Swift-themed dance class in Southport has been named. Axel Muganwa Rudakubana is also charged with 10 counts of attempted murder after eight other children and two adults were seriously injured in the attack on Monday. The suspect, who is from the Lancashire village of Banks, appeared at Liverpool Crown Court, and also faces a charge of possessing a curved kitchen knife. He was remanded into youth detention accommodation.

  The Cardiff-born teenager could not previously be named due to his age but Recorder of Liverpool Judge Andrew Menary KC ruled it could be made public following applications from the media. The defendant is due to turn 18 next week. The judge said he was mindful of "misinformation" that had spread regarding the accused's identity. Southport saw a night of unrest on Tuesday following a vigil in memory of the victims, with protesters gathering near a mosque in the Merseyside town. Five men were arrested - with one later charged with possessing a knife - after a police van was set alight and bricks were thrown, with 53 police officers injured. A further Section 60 order, which gives police enhanced powers to stop and search and is designed to minimise violence, was put in place on Thursday evening. This follows the original Section 60 order brought in for 24 hours from 17:00 BST on Wednesday evening. The latest order came into effect at 18:00 BST and will also last for 24 hours, with extra officers in the area, Merseyside Police said. Judge Menary said: "Continuing to prevent full reporting at this stage has a disadvantage of allowing others up to mischief to continue to spread misinformation in a vacuum."

  Elsie Dot Stancombe, Alice Dasilva Aguiar and Bebe King died after the attack

  He acknowledged his decision was "exceptional" but said "the balance clearly comes down in favour of the public interest in allowing full reporting of these proceedings". Arguing against naming the defendant, the prosecution said he had an "autism spectrum disorder diagnosis" and had been "unwilling to leave the house and communicate with family for a period of time". He attended an appearance at a youth court at about 09:00 BST, arriving in a prison van with a large police escort. In front of a packed press gallery, he glanced at reporters before he was asked to sit down before District Judge James Hatton. Wearing a grey police-issued tracksuit, the defendant pulled his sweatshirt above his nose and lowered his head during the five-minute hearing, in which he did not speak. None of the families of the victims or the defendant were in court. The accused will next appear at Liverpool Crown Court on 25 October for a pre-trial preparation hearing.

  The teenager did not speak during his court appearance and covered his face

  Bebe King, six, Elsie Dot Stancombe, seven, and Alice Dasilva Aguiar, nine, died after the stabbings on Hart Street in the Merseyside town, just before midday on Monday. Eight children and two adults were also seriously injured. Earlier on Thursday, Alder Hey Children's Hospital confirmed two children who were being treated there had been discharged. The hospital said it was continuing to treat five other children, and all were now in a stable condition. A statement read: "We are delighted that two of the children involved in Monday's awful incident have now been discharged. "Our heartfelt sympathies remain with all those affected." The hospital also thanked Taylor Swift fans for raising more than £340,000. Set up by two members of the Taylor Swift UK & EU Facebook Group, the fundraiser has had donations from fans around the world. “Thank you for embodying the spirit of Taylor’s music and for turning empathy into action,” the hospital said.

  Floral tributes continue to be left around Southport

  Following Tuesday's disturbances in Southport, further disorder broke out in areas across England, with more than 100 people arrested at a protest in central London on Wednesday night. There were also incidents in Hartlepool, Manchester and Aldershot. Prime Minister Sir Keir Starmer said "action will be taken" following the "violent disorder" at a meeting with police chiefs at Downing Street earlier. Speaking in a televised speech afterwards, he laid out plans for forces across the country to increase their co-operation to tackle such incidents. He described the widespread disorder as the "actions of a tiny, mindless minority" and condemned "far-right hatred". The prime minister added: "These thugs are mobile, they move from community to community, and we must have a police response that can do the same." Following Monday's attack, the families of Bebe King and Alice Dasilva Aguiar issued tributes and asked for privacy. Bebe's family said "no words can describe the devastation that has hit our family as try to deal with the loss". The family of Alice said "keep smiling and dancing like you love to do our Princess".
