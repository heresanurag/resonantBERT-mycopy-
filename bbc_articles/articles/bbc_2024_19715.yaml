content: |-
  Bryonie Gawith's family describe her as a "happy, joyful, bubbly beautiful woman".

  Tributes to 'joyful' mum and children killed in fire

  Bryonie Gawith and her three children all died in the fire

  Tributes have been paid to a "happy, joyful, bubbly beautiful woman" who died with her three children in a house fire in Bradford. Bryonie Gawith, 29, and her daughter Denisty Birtle, nine, son Oscar Birtle, five, and daughter Aubree Birtle, 22 months, died in the blaze on Westbury Road, on Wednesday. A 39-year-old man was arrested at the scene on suspicion of murder and remains in hospital with critical injuries. Police have confirmed he was the ex-partner of a woman who had been visiting the family.

  West Yorkshire Police earlier said officers believed the incident was "deliberate" and "domestic" in nature and said it was keen to address speculation. A spokesperson for the force added: "Uniformed officers had visited the address last month due to an unrelated matter. "Therefore, we will not be making a referral to the Independent Office for Police Conduct." They added that specialist officers continued to support the family who are "understandably devastated at their loss" and asked for the family's privacy to be respected.

  Dozens of tributes have been left outside the scene of the fire

  The force also released two statements from Ms Gawith's partner and family. The children's father, Jonathan, said he was "absolutely distraught at the sudden loss of my fiancée, Bryonie and our three beautiful children". “Bryonie and I were together for a long time, and we had a good life together. “She was a beautiful woman and a loving mother to Oscar, Aubree and Denisty. “I loved them with all my heart and if I had the chance, I would take their place in a heartbeat. I cannot imagine life without them. “They will never be forgotten and will always be in my heart.”

  Ms Gawith's partner and family have paid tributes to her and her children

  The family said Ms Gawith, also known as B, had been the "life and soul of the party". The statement also said: "Music was a big part of her life, she loved music, singing and dancing, she would always be singing and dancing with Chuch, Oggy and Strawberry [her three children]. "B was always a really happy, joyful, bubbly beautiful woman, who cared for everyone and was loved by everyone, her kids were everything to her, her whole life. "Oggy had the cheekiest smile, he was cheeky but he was a shy boy, Strawbs was shy and bashful with big blue eyes and blonde hair and Chuch was a beautiful, confident, outgoing and creative young girl." The family said they were still trying to comprehend what had happened to their "beautiful family". "No words can describe how we are feeling and no words could ever make up for the profound loss we are now faced with." They also asked for privacy so they can try and come to terms with the "unimaginable sadness and grief of this tragic loss". The statement added: "We are overwhelmed and grateful for all the support and kind words we are receiving...also for the thoughts and support for the father of our three babies. "Please allow him peace to grieve and come to terms with the loss of his family." Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
