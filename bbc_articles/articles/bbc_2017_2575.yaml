id: bbc_2017_2575
title: The human scars of Philippines drug war - BBC News
date: '2017-02-15'
section: General
url: http://www.bbc.co.uk/news/world-asia-38977969
content: |-
  The effects of the violent war against drugs are still keenly felt in Manila's poor "promised land" district.

  A violent government war against drugs in the Philippines has left thousands dead.

  Though it has been suspended, many people living in Manila's impoverished "promised land" district are still suffering the effects. The BBC's Jonathan Head reports.
