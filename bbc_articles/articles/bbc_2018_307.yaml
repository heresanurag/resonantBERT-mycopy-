title: Tokyo amusement park evacuated in missile drill - BBC News
date: '2018-01-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-42775909
content: |-
  Tokyo carries out an evacuation drill amidst fears of a missile attack from North Korea.

  Tokyo has carried out an evacuation drill amidst fears of a missile attack from North Korea.

  Volunteers were evacuated from a fair ground and a park and then took cover in subway stations and underground spaces.
