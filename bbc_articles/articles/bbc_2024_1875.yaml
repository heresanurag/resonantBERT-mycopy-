content: |-
  Britain's Josh Kerr is targeting world indoor gold in Glasgow this weekend as he prepares for the Paris 2024 Olympics.

  Josh Kerr became the first British man to win an Olympic 1500m medal since 1988 with bronze at Tokyo 2020

  Coverage: Watch live on BBC TV, BBC iPlayer and online; Listen to commentary on BBC Radio 5 Sports Extra & BBC Sounds; Live text and video highlights on the BBC Sport website and app.

  What will happen on Tuesday 6 August 2024? The level of conviction in Josh Kerr's immediate response is comparable to someone who has travelled back from the future having witnessed the moment with their own eyes. "Josh Kerr gets crowned as the Olympic 1500m champion," the 26-year-old Scot tells BBC Sport. It is that unwavering confidence in his own ability which allowed Kerr to claim his first global title in Budapest six months ago, when he stunned reigning Olympic champion Jakob Ingebrigtsen to take World Championship gold. Kerr is a meticulous planner but until Budapest he had never left a global championships completely satisfied, despite becoming Britain's first Olympic men's 1500m medallist for 33 years with bronze in Tokyo. It has set him up perfectly for a date with destiny in Paris, one he identified as his crowning moment as early as the age of eight after calculating that was when he would be at his peak. "If you go on my phone, you will already know my tactics. That tells you enough," says Kerr. "I know exactly what I'll be doing and it means I can work on those tactics in training. "I will be ready to go when the time comes. I have been visualising that last lap for a long time." Having broken British legend Mo Farah's world indoor two-mile record this year, running eight minutes 0.67 seconds to beat the nine-year mark, Kerr will next attempt to put on a show at the World Indoor Championships on home soil in Glasgow starting on Friday.

