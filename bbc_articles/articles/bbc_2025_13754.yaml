title: Trump's intervention in LA is a political fight he is eager to have - BBC News
date: '2025-06-09'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c628vwq9z9zo
content: |-
  The president sees immigration and law and order as winning issues. Critics say deploying the National Guard is inflammatory.

  Trump's intervention in LA is a political fight he is eager to have

  On the campaign trail last year, Donald Trump promised that he was not going to tolerate left-wing lawlessness on American streets and would use the full force of his presidential powers in response. The protests against Immigration and Customs Enforcement (ICE) efforts in California on Saturday night gave him an opening to follow through on that promise. Never mind that the Los Angeles Police Department (LAPD) said that the protests were largely peaceful, or that local authorities said they could handle the clashes that did turn violent. Trump administration officials said that immigration agents were being targeted and injured – and that local law enforcement had been too slow to respond.
  • None When can a president deploy National Guard on US soil? "Waiting several hours for LAPD to show up - or them telling us that they're not going to back us up until they have an officer in a dangerous situation - is something that just isn't workable when you have violent protests going on," Homeland Security Secretary Kristi Noem told CBS News on Sunday morning. The LAPD said it "acted as swiftly as conditions safely allowed" and began dispersing crowds within 55 minutes of receiving the call. Over California Governor Gavin Newsom's objection, Trump federalised the 2,000 California National Guard soldiers, and Defence Secretary Pete Hegseth warned that US Marines were also on "high alert" to deploy – which would mark a rare use of the active duty military on US soil. By Sunday morning, Trump was declaring victory and thanking the National Guard for restoring peace, even though the guard had yet to fully assemble.

