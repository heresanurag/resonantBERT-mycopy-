  The speed with which Trump reacted suggests that this is a fight his administration is prepared for – and even eager to have. The White House believes that law and order, and aggressive immigration enforcement, are winning issues for him. His actions will thrill his core base of supporters and could sway political independents concerned about public safety. Noem, in her interview, said the Black Lives Matters protests of 2020 in Minnesota were allowed to spread unchecked – and that the new Trump administration was going to handle things differently. "We're not going to let a repeat of 2020 happen," she said. Democrats, however, have said the administration's use of masked immigration officers with military gear to arrest civilians in restaurants and shops has been inflammatory, and that the president's eagerness to deploy trained soldiers was unwarranted. "For the president to do this when it wasn't requested, breaking with generations of tradition, is only going to incite the situation and make things worse," said New Jersey Senator Cory Booker. "A lot of these peaceful protests are being generated because the president of the United States is sowing chaos and confusion by arresting people who are showing up for their immigration hearings, who are trying to abide by the law." The US has a long tradition of summer protests, and it is only early June. Five months into Trump's second term, these California demonstrations may be an isolated event – or the start of greater civil unrest in the days ahead.

