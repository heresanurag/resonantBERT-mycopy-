title: Nigel Farage denies being paid nearly £100,000 a month by GB News - BBC News
date: '2024-08-18'
section: Politics
url: http://www.bbc.co.uk/news/articles/c2l1kk9xqnyo
content: |-
  The Clacton MP has told the BBC the sum also covers work carried out since April and includes additional services.

  Nigel Farage has denied being paid almost £100,000 a month to present a show on GB News. His entry in the recently published Parliamentary Register of Interests, shows GB News paying his company, Thorn in the Side Ltd, £97,928.40 for what amounts to 32 hours work a month. The sum would have meant he earned more than a million pounds a year on top of his MP's salary of £91,346. But the Clacton MP has since told the BBC that the sum actually covers work carried out since 1st April 2024 and includes services such as media consultancy as well as his presenter role.

  Mr Farage said the figure was the gross sum, including VAT, paid to his firm. He said he does not get a fixed monthly fee from GB News but is paid varying amounts as a contractor. In a statement posted on X, Mr Farage said: "To be clear... the GB News sum paid to me and declared includes VAT, and was for several months of work. "It was paid to my company, which has significant expenses. "Sorry to disappoint the media." The Reform UK leader has also declared income of £4,000 a month for writing for the Daily Telegraph and a payment of £16,597.22 for recording personalised video messages, such as birthday greetings, for individuals through the Cameo.com website. He has also declared earnings from social media including £1,551.29 from X and £853 from Meta, which owns Facebook. The total time Mr Farage estimates he spends on work outside parliament for his TV, video-recording and newspaper writing equates to around 72 hours a month, the equivalent of nine full working days. He had suspended his GB News TV show, which airs Monday to Thursday weekly, to focus on the election campaign, but has now returned to the channel. The disclosures were made in the latest Register of Members' Financial Interests, external, published by parliament. It is drawn up by House of Commons officials based on information provided to them by MPs. All MPs have to register their financial interests within 28 days of a new Parliament beginning, with newly elected MPs required to declare any relevant interests from the year prior to the election. They must also notify the Commons of any changes or additions that happen throughout the parliament within 28 days.
