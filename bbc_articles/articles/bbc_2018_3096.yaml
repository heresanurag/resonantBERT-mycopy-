title: 'Irish abortion referendum: Two women''s stories - BBC News'
date: '2018-03-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-43338266
content: |-
  The Irish public is to vote in a referendum on abortion, prompting women to share their stories.

  The Irish public is to take part in a referendum on the country's abortion laws.

  It has prompted women on both sides of the debate to share their stories.

  The BBC has been hearing from two of them.
