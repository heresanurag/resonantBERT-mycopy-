title: 'Thwaites: Ice robot reaches under mighty Antarctic glacier - BBC News'
date: '2024-02-22'
section: General
url: http://www.bbc.co.uk/news/science-environment-64640799
content: |-
  A robotic submersible reveals new details about the melting occurring under Thwaites Glacier.

  A robotic submersible called Icefin has revealed new details about the melting processes occurring under Thwaites Glacier, one of the biggest and fastest flowing rivers of ice in Antarctica. The BBC was given special access to film the deployment of the sub.
