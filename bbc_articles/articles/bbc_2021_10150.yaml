title: Bournemouth beach closed after 'large animal' spotted in sea - BBC News
date: '2021-08-05'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-dorset-58090890
content: |-
  Visitors say there was a shark sighting, though lifeguards were unable to identify the animal.

  Beachgoers were evacuated from the sea off Boscombe Beach on Wednesday

  Beach-goers were evacuated from the sea after reports of a "large marine animal" in the water.

  Lifeguards instructed swimmers to leave the sea at Boscombe Beach in Bournemouth while they scanned the water on Wednesday.

  Visitors took to social media and said there had been a shark sighting.

  The RNLI said it received reports of "significant movement" in the water but lifeguards were unable to formally identify the animal.

  On Twitter, one woman said: "Possible shark sighting at Boscombe Beach. Everyone called out of the water."

  Beach-goer Steve Lutwyche tweeted: "I'm on the beach at Boscombe where the RNLI have had to red flag the beach due to reported sightings of a shark.

  "The lifeguard called everyone out of the water. They discreetly referred to sightings of a 'large marine animal' so as to not scare any children.

  "Lifeguard crew patrolled the bay on a personal watercraft trying to spot it."

  He added it was "very well-handled" by the RNLI.

  Visitors were able to re-enter the water 30 minutes later.

  This video can not be played To play this video you need to enable JavaScript in your browser. Climate change: How marine life is on the move

  The RNLI has asked members of the public to report any concerns about wildlife to lifeguards as soon as they are spotted.

  BCP Council said the beach was temporarily closed as a precautionary measure while an inspection was carried out.

