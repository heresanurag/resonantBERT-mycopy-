title: Residents evacuated as wildfires near Athens spreads - BBC News
date: '2024-08-12'
section: Europe
url: http://www.bbc.co.uk/news/articles/cwyj80v2wrpo
content: |-
  Thousands have to leave their homes as fires reach the suburbs of the Greek capital.

  This video can not be played To play this video you need to enable JavaScript in your browser. Smoke blew into Athens - including in the sky above the Parthenon

  Thousands of residents have been evacuated from their homes as large wildfires reach the suburbs of Athens, with some flames leaping as high as 25m (80ft). Homes and properties in nearby towns such as Varnavas as well as northeastern parts of the Greek capital are on fire, including a school in Nea Penteli. Aircraft working to extinguish the flames were forced to land when the sun set, making it a ground operation overnight. Residents have complained of a lack of fire trucks and firefighters, and the Greek authorities have accepted offers of international assistance. Greece has just experienced its hottest June and July on record., external

  A woman hugs her aunt as a wildfire burns in Penteli

  The fire service has said conditions for new fires remain dangerous not only for Tuesday, but also for the coming days. In unprecedented scenes, people in Athens have been wearing masks to protect themselves from the choking smoke that has filled the air. A human chain of firefighters, volunteer firefighters, police officers and citizens has been using everything they have to try to put fires out, with some resorting to tree branches. Strong winds are also aiding the rapid spread of fire, carrying burning pine cones from trees. Thousands of people have been ordered to evacuate, with some refusing to in order to save their homes. A message from emergency services called on residents of the capital's northern suburb of Dionysos to evacuate toward nearby Kifissia. Thirty such localised messages have been sent.

  Although the fire service has said there is no longer an active fire front, there are still many hotspots, in particular in the area of Mount Penteli, famous for its marble quarries, and Lake Marathon. People in towns and villages, including in the historic site of Marathon, had been ordered to move to safer areas on Sunday. More than 700 firefighters, 119 vehicles, and large numbers of soldiers have been deployed to put out the flames, with many volunteers also contributing. Further help is expected to arrive from Spain, Italy, Turkey, Romania and Canada, with France also providing a Super Puma utility helicopter and the Czech Republic sending 75 firefighters and 25 vehicles. The blaze raging around Mount Penteli, and the adjoining Athens suburb of the same name, has led to the evacuations of three hospitals. The National Observatory of Athens in Penteli is also under threat, as the flames burn through some of its facilities. One blaze - which has engulfed a timber factory - is a particular concern due to the dangerous materials in the surrounding area. There is an out-of-business petrol station next door. In other parts of Penteli, various explosions have been heard, most likely from fuel tanks and residential gas cylinders.

  A car is seen in flames as a wildfire burns in the village of Varnavas, about 24 miles (40 km) north of Athens

