id: bbc_2018_11797
title: Angry crowds block women from Sabarimala Hindu temple - BBC News
date: '2018-10-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-45896128
content: |-
  A BBC team is forced to leave as protests over a recent court ruling turn violent.

  Angry crowds have prevented women from entering one of Hinduism's holiest temples.

  The Supreme Court previously ruled against the Sabarimala temple in Kerala, India, which stopped women of "menstruating age" from attending.

  Most Hindu temples allow women to enter as long as they are not menstruating.

  Angry devotees forced women to turn back, and pelted journalists' cars with stones and bottles. The BBC's James Clayton was there.
