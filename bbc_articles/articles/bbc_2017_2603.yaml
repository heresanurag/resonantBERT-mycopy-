title: Donating my kidney saved two lives - BBC News
date: '2017-02-15'
section: General
url: http://www.bbc.co.uk/news/magazine-38968856
content: |-
  Jen donated a kidney to a stranger to make sure her husband would receive a kidney transplant.

  When Jen found out her husband needed a kidney transplant she wanted to give him one of hers but they weren't a match.

  Then they heard about a scheme that could save his life.

  Jen and Elliot's story is featured in #Hospital at 21:00 on Wednesday 15 Feb on BBC Two.

