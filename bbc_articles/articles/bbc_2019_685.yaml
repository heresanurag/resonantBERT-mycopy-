title: 'Plus-size beauty queen: ''Pageants rebuilt my life'' - BBC News'
date: '2019-01-27'
section: General
url: http://www.bbc.co.uk/news/uk-46973268
content: |-
  Lady Mya Amarise is a British Muslim mother-of-four who wants more women like her to compete in beauty pageants.

  Lady Mya Amarise is a British Muslim plus-size model and beauty queen promoting body positivity by example.

  She was married at the age of 16, and raised four children after the breakdown of her marriage.

  After a sickness that left her bedridden, the now 41-year-old gained so much weight, she lost confidence in herself.

  Competing in beauty pageants, she says, has changed her life.
