title: Winter Olympics Robots serve food, cocktails and clean - BBC Sport
date: '2022-02-06'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60271190
content: |-
  Welcome to the 24th edition of the Winter Olympics and Robot bar staff.

  Robot bartenders can measure, shake, and serve a cocktail in just 90 seconds

  Welcome to behind the scenes at the Beijing 2022 Winter Olympics - welcome to the future. Inside the Olympic bubble, Covid-19 measures mean Star Wars R2-D2-esque robots are a familiar sight in media centres and hotels, cleaning and reminding people to wear their masks. And in scenes resembling a science fiction movie, temperature checks, cooking and delivering food are all offered as an automated service. It even extends to mixology - meaning you can be sipping your favourite cocktail without even having to tip the bartender. Have a look at some of these videos for a glimpse into the 2030s and beyond...

