  England travel to Dublin to play the Republic of Ireland on Saturday, 7 September before they host Finland three days later. Carsley won 40 caps for the Republic of Ireland during his playing career. The FA has said, external Carsley would be in charge for those games "with a view to remaining in the position throughout autumn while the FA's recruitment process for a new permanent head coach continues". "Lee is a fantastic coach who is well known to the majority of our current senior squad having worked with most at international or club level," said FA chief executive Mark Bullingham. "He offers us a very strong interim solution and we are confident he will perform well in the Uefa Nations League games. "We are grateful to Lee for stepping up to manage the team while we continue with our recruitment process." Howard Wilkinson, Stuart Pearce and Southgate have all previously stepped up to take charge of the senior team after managing the Young Lions. Southgate went on to secure the job permanently and led the side for eight years, reaching a World Cup semi-final in 2018, a World Cup quarter-final in 2022 and Euros finals in 2021 and 2024. The FA has been conducting a search for a replacement and a job advert was published on its website. Ben Futcher will replace Carsley as England U21 boss, with "respective backroom teams for both squads to be confirmed in due course".
