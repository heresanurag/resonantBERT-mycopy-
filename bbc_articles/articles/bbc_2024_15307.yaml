  Huge crowds celebrate in Madrid after Spain's 2-1 victory over England in the European Championship final.

  Huge crowds of Spain fans celebrated in the streets after their 2-1 victory over England in the Euro 2024 final.

  Video shows people erupting with joy as the final whistle was blown, as BBC correspondent Mark Lowen reported live from Madrid.
