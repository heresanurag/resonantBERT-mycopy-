  People living near railway lines have been asked to secure any loose gardens items, after several trampolines were blown on to the tracks last weekend.

  Storm Ciara created winds so strong that trees were blown over

  The weather for the coming week is expected to remain quite unsettled.

  But some sunny, dry spells are expected in places, especially in the east of the UK.
