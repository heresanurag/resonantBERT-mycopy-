title: 'Covid-19: Serious incident investigation after lab gives false negatives -
  BBC News'
date: '2021-10-15'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58922518
content: |-
  NHS Test and Trace suspends testing at a private lab amid fears of thousands of false negatives.

  Helen Diggle, who lives in Tellisford in Somerset, says she had five positive lateral flow tests and three negative PCRs before finally testing positive for Covid on a PCR test.

  On one of her visits to a testing centre she said a member of staff told her she had seen lots of very similar cases recently, particularly involving local schools.

  Helen tells BBC News: “It is really worrying that some people in the system, people on the ground, have been aware that something is going on.”

  When Helen and her 10-year-old daughter kept testing negative on PCRs despite high temperatures and positive lateral flow tests she knew something was not right.

  “I was very conscious that by having all these tests I could have been wasting NHS resources to satisfy my own conviction that I had Covid," she adds. “I felt like I was being unnecessarily neurotic.”

  But when her son tested positive on private PCR testing equipment owned by his school, it was “blindingly obvious we all had Covid", she says.

  Helen feels the situation is particularly unfair to school children.

  “If children test negative on PCR then schools have to take children back," she says.

  “So you probably have many more cases in school than they are expected to deal with.”

  “I feel we have been short changed – particularly the children – because testing is not working as it should be," she adds.

  "My concern is it is leading not just the spread of the virus but is eroding trust in the testing system.”
