  Man, 76, dies following crash between car and taxi

  A 76-year-old man has died following a crash between a car and a taxi in Falkirk. The collision, involving a white BMW X6 and a black Kia Cee'd taxi, happened on Cochrane Avenue at about 03:05. The BMW driver was pronounced dead at the scene. The taxi occupants were not injured. Police have appealed for witnesses to contact them.

  Sgt Fraser Mitchell said: “Inquiries are ongoing to establish the full circumstances and we are asking anyone who saw what happened to get in touch. “In particular, if you were driving in the area at the time please check your dashcam to see if you have anything that could help with our investigation.”
