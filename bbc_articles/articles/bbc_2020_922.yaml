title: 'Labour leadership: Long Bailey, Nandy and Phillips secure nominations - BBC
  News'
date: '2020-01-09'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-51055663
content: |-
  The Labour MPs join Sir Keir Starmer on the ballot paper in the race to replace Jeremy Corbyn.

  Rebecca Long Bailey, Lisa Nandy and Jess Phillips (l to r) have all secured the number of nominations needed

  Rebecca Long Bailey, Lisa Nandy and Jess Phillips have secured support to run in the contest to succeed Labour leader Jeremy Corbyn.

  The MPs for Salford and Eccles, Wigan and Birmingham Yardley join Sir Keir Starmer on the ballot paper.

  Candidates need 22 Labour MPs or MEPs to nominate them before Monday.

  Emily Thornberry and Clive Lewis have also declared they are running, but Barry Gardiner, who was considering joining, has now ruled himself out.

  Ms Thornberry - the shadow foreign secretary - has only secured seven nominations so far, while Mr Lewis - a shadow treasury minister - has four.

  There is also a contest to become deputy leader after Tom Watson stepped down in December.

  The new leader and deputy leader will be announced on 4 April.

  Shadow business secretary Mrs Long Bailey has 26 nominations so far.

  Her supporters include shadow chancellor John McDonnell, shadow home secretary Diane Abbott and Labour Party chairman Ian Lavery - who had been considering his own run.

  Both Ms Phillips and Ms Nandy have 22 nominations.

  Ms Phillips has the backing of former Labour ministers Margaret Hodge and Chris Bryant, while Ms Nandy has shadow health secretary Jon Ashworth and former shadow minister Jack Dromey on side.

  The leadership candidates tweeted to thank the people who had nominated them, with Ms Phillips celebrating the amount she had raised through crowdfunding, adding: "It means so much to be powered by people."

  Ms Nandy said she was "proud" to have gained support from MPs "representing different parts of the country and different traditions in our movement".

  And Mrs Long Bailey tweeted that her nomination was "an honour and responsibility" that she took "incredibly seriously", adding: "Together we will build a winning vision of a socialist future."

  However, all three candidates are behind the shadow Brexit secretary Sir Keir, who has secured 63 nominations so far - including from the shadow leader of the House Valerie Vaz and shadow Brexit minister Paul Blomfield.

  He also got the backing of the UK's largest union Unison.
