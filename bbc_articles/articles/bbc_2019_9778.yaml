id: bbc_2019_9778
title: Turkey bridge collapse injures pedestrians - BBC News
date: '2019-08-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-49478187
content: |-
  Two people fall into a river as a bridge collapses after torrential rain in the Black Sea.

  A bridge collapsed following torrential rain in the Black Sea town of Terme, northern Turkey.

  Two people fell into the river but survived with minor injuries.
