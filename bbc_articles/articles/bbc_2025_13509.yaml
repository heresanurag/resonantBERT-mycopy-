  Trump and Musk's war of words continue and an investigation into cheap weight-loss drugs on the black market.

  'Trump and Musk, babies at war' and 'DIY Ozempic boom'

  The row between Donald Trump and Elon Musk is on many of the front pages. The Financial Times headline says the pair have been urged to "hug and make up". The Mirror calls it "babies at war". The Express says Mr Trump has "met his match". In its cartoon, "i" Weekend portrays Mr Trump and Mr Musk in opposing corners of a boxing ring. The men are sitting on stools, typing furiously into smartphones, their discarded boxing gloves laying between them. The caption reads "the gloves are off!". The Times claims that the NHS will receive significant additional funding, external in Wednesday's spending review. It says the £30 billion increase will lead to "painful compromises" for other departments, and reports of concerns from health bosses that it might not be enough to reduce patient waiting times significantly. In Scotland, the National has spoken to SNP activists who say their internal concerns about the party's approach to fighting Reform UK at the Hamilton, Larkhall and Stonehouse were ignored. The Daily Telegraph says it's seen official training documents which say that concern about mass migration is a terrorist ideology, external, which may require a referral to the government's anti-radicalisation Prevent programme. In its editorial, the paper muses whether or not Sir Keir Starmer could be classed as a "dangerous right wing extremist" based on the definition. A Home Office spokesman tells the paper that Prevent isn't about restricting free speech - but about protecting people from radicalisation. "Russia is at war with us", says Fiona Hill, the former White House chief adviser on the country, in an interview with The Guardian. She cites "the poisonings, assassinations, sabotage operations, all kinds of cyber attacks and influence operations. "We're in pretty big trouble," she says. The Sun has seen a note said to have been written by the prime suspect in the disappearance of Madeleine McCann. , externalChristian Bruekner writes that what he calls decisive questions in the case can never be answered. In the undated letter he says "is there a body? No, no, no." The Daily Mail reports that social media sites are being used to sell cut-price weight loss drugs, which people have to mix with other substances themselves. Its investigation says the cheap treatments put lives at risk.

