title: Coalville Instagram couple make plea over stolen purse - BBC News
date: '2020-02-11'
section: General
url: http://www.bbc.co.uk/news/uk-england-leicestershire-51460940
content: |-
  Pauline and Geoffrey Walker posted a video on Instagram in a bid to find Mrs Walker's purse.

  An elderly couple from Leicestershire have been inundated with messages after their plea for the return of a stolen purse.

  Geoffrey and Pauline Walker posted a video to their 124,000 Instagram followers after Mrs Walker's purse was taken at a cafe in Coalville, Leicestershire.

  Mr and Mrs Walker have gained a cult following on their @geoffreywalk account, by posting throwback photos from their relationship of six decades, as well as pictures and videos documenting their daily lives.

  Mr Walker said they wanted the purse back because of its sentimental value, and because his wife kept phone numbers and medication notes inside.

  They have received thousands of messages of support and offers of replacement purses.

  "There's so many caring people out there," said Mr Walker.
