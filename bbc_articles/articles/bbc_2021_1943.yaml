  The deputy chief medical officer for England urges people to maintain discipline and stick to the rules.

  'Moral thing to do was save most lives' - Hancock

  The BBC's Hugh Pym asks what the health secretary would say to teachers who argue being given priority for the vaccine could help prevent absences from the classroom. Matt Hancock says the "overall view we came to" was that the "right thing to do, the moral thing to do was to make sure we save the most lives". It's also a matter of how people can receive vaccines most quickly - and the quickest way is by prioritising by age, he adds. "Trying to come up with a scheme which prioritises one professional group over another would have been complicated to put in place and wouldn't have done what we asked the JCVI to put in place", he adds, which is to prevent deaths. Prof Van-Tam says the ONS data suggests restaurant and catering managers have the highest risk of death, followed by other professions including metal working and machine operatives, chefs and cab drivers. The figures for male teachers is much lower for mortality. "We have to start in a logical place," he adds, and says that is going to be difficult because of the many occupations that would need to be called forward. The pace of the rollout would be damaged and the "big win" is in speed, he adds.
