content: |-
  There are widespread power cuts across the country as Wales recovers from the damaging storm.

  Power still out for thousands after Storm Darragh

  The clean up of downed trees is happening all over Wales, including this clean up crew on the B4422, Anglesey

  About 57,000 homes and businesses are still without power across Wales after Storm Darragh battered large parts of the country. Despite extreme winds easing, a yellow Met Office weather warning, external remained in place across Wales until 18:00 GMT on Sunday. It comes after a day of widespread damage and travel disruption from winds that gusted to 94mph (150 km/h). Numerous roads are still closed, with one council boss issuing a plea to drivers to stay off the roads while they are cleared. Meanwhile, train services are mostly cancelled, as are ferry sailings to and from Ireland.

  This video can not be played To play this video you need to enable JavaScript in your browser. Phone warnings, crushed cars and damaged homes - how Storm Darragh ripped through Wales

  The leader of the Welsh Local Government Association, Andrew Morgan, told BBC Politics Wales there were thousands of downed trees across the country. "Luckily, we didn't get the severe rain that was suggested," said Morgan, who is also the council leader in Rhondda Cynon Taf where Storm Bert inflicted heavy flooding damage in November. Damaged buildings include some schools, he said, and debris on the roads remained a problem in many areas. "We've asked people to try and avoid travel if they can just for [Sunday]... in terms of clearing highways."

  Scottish Power says it is working to restore supply to thousands of customers

  National Grid said there were about 39,000 properties without power in mid and south Wales. Scottish Power said about 18,000 properties, mainly across north and mid Wales, were also without power. "This is one of the worst storms we've seen in a long time," said Liam O'Sullivan from Scottish Power. Strong winds hampered repair efforts overnight, he added, but with the weather subsiding, he added that the company had "every team available working to get people back on supply". Natural Resources Wales (NRW) said there were a handful of flood warnings, external - the second highest alert - in effect.

  There are still road closures across Wales, including the M48 Severn Bridge in Monmouthshire, due to high winds. Meanwhile, on the railway, teams have been "working very hard in difficult conditions" to get lines reopened. "We are confident the majority of services east of Swansea, including South Wales Main Line, the Vale of Glamorgan and Core Valley Lines will be running in the morning," said a Transport for Wales spokesperson. Great Western Railway also expects its service between London Paddington and Swansea to run from the start of service tomorrow. However, services between Swansea and Carmarthen will not resume until at least midday as safety checks continue.

  Trampoline or bridge? The extreme winds blew items away, including someone's trampoline in Penrhyncoch, Ceredigion

  Irish Ferries cancelled service to and from Wales for most of Sunday, with some Pembroke and Holyhead sailings scheduled for later. The last red warning in Wales was during 2022's Storm Eunice, which left tens of thousands of people without power. NRW said before the storm the amount of rain expected would be less than that which fell during Storm Bert, which wrought havoc across Wales last month.
