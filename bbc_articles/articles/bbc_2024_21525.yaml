title: Oliver Campbell cleared of murder after decades ‘not had a life’ - BBC News
date: '2024-09-11'
section: England
url: http://www.bbc.co.uk/news/articles/c70j2d4v24wo
content: |-
  Judges quashed the "unsafe" conviction of Oliver Campbell, who has learning difficulties, after more than three decades.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A man with learning disabilities who says he felt under pressure to confess to murder says he has not "had a life" for the last 33 years. Three judges ruled that Oliver Campbell's 1991 conviction for the murder of Baldev Hoondle in east London the previous year was "unsafe". "I could have had a full-time job, been in a relationship, had kids, been on holiday. I couldn’t do that yesterday, but now I can - and plan the rest of my life," he told the BBC. His purported confession at the time was made up amid the stress of being "badgered and bullied" during interviews, judges have previously heard.

  He said he believed part of the reason why he was jailed was that he was being treated as a "scapegoat", and said: "I didn’t put myself in prison, it’s the system that put me there". Speaking to the BBC, he added that despite his time in prison, he had not lost faith in the justice system, and had never considered ending his fight against his conviction. "The weight is off my shoulders, but the thing is, there is still someone who committed a crime out there... that’s all I’ve got to say," he said. The Crown Prosecution Service, which opposed the bid, said they respected the judgement of the court. "The Court of Appeal rejected 17 grounds of appeal and these convictions were only quashed on the basis of new evidence providing more information about Oliver Campbell's mental state when he confessed to murder," a spokesperson said. Among the grounds of appeal rejected was a claim of "serious allegations of manipulation, deliberate misleading bullying" made against police officers. In their ruling, external, Lord Justice Holroyde, sitting with Mr Justice Bourne and Mrs Justice Stacey, said the court could not be sure how a jury would have considered new evidence of mental capacity and “on that narrow but very important basis, we have concluded that the convictions are unsafe.” Given Mr Campbell had already spent more than a decade in prison, and more than two decades on licence, he could not have a fair trial where he would be unable to process the information.

  Mr Campbell was jailed for life in 1991 over the murder of Mr Hoondle, who was shot dead during a botched robbery in Hackney carried out by two men. His lawyers and supporters say his confession at the time mirrored what he had watched on BBC's Crimewatch. Mr Campbell was released on a life licence in 2002 and lives in Felixstowe, Suffolk, with the assistance of a close group of friends and helpers. His supporters added: "We are all in tears. Ollie's life starts now." Mr Campbell suffered a brain injury when he was a baby. Experts say the injury has badly affected his memory and general ability to process more than basic information, leaving him suggestible and vulnerable to potential manipulation. His barrister, Michael Birnbaum KC, told the court earlier this year that there were "ample" grounds to find the conviction unsafe - suggesting he was "badgered and bullied" by police into giving a false confession over his involvement. Mr Birnbaum said that his client's learning disabilities meant he made admissions which were "simply absurd" and "nonsense", and contained a "litany of inconsistencies" against the facts of the case. Lord Justice Holroyde said in the ruling: "We accept that, considered in the light of the fresh evidence, the rulings might be different." He continued: "A jury knowing of the fresh evidence would be considering the reliability of those confessions in a materially different context. "In those circumstances, we cannot say that the fresh evidence could not reasonably have affected the decision of the jury to convict." The judge said that the decision would be a "heavy blow" to the family of Mr Hoondle, but he trusted "they will understand that we must reach our decisions in accordance with the law, uninfluenced by emotion".

  Lawyers said Mr Campbell's confession simply mirrored what he had watched on BBC’s Crimewatch

  "The murder of Baldev Singh Hoondle in July 1990 was fully investigated by detectives at the time with a range of evidence brought before a jury who convicted the defendant the following year," they also said. After Mr Campbell was arrested in late 1990, he was interviewed 14 times by detectives as they sought to build a case to prove that the then 19-year-old had pulled the trigger. Officers at Hackney Police Station recognised that Mr Campbell had learning difficulties and, for the first 10 interviews, local social services had provided an adult to assist him. His lawyers believe the purported confession may have therefore been inspired by what he had remembered seeing on the TV, as he tried to end the repeated questioning.

  Oliver Campbell told the BBC on Wednesday he had missed out on life because of his conviction

  Speaking to BBC Newsnight in 2021, Mr Campbell said the trauma of his conviction had destroyed his life, and that he had lost contact with most of his friends and family. "It’s disgusting what's happened to me," he told the programme. "That's all I've got to say, it's disgusting how different people out there got away with what they've done to me in my life in 1991." Mr Campbell added: "I'm an innocent person in the justice system and in the prison system. The justice system put me there." The quashing of the conviction comes 20 years after the Criminal Cases Review Commission (CCRC), the miscarriages of justice body, rejected his pleas for help - and after two inquiries were triggered into how it had handled the case of Andy Malkinson, who was cleared of rape after a 20-year campaign. A spokesperson for the CCRC said it referred Mr Campbell's case in 2022, having declined to do so in 2005, "in light of new evidence that his vulnerabilities had not been properly understood or explained at trial". The commission's review involved speaking again to an expert used at the original trial, as well as a second expert who explained "how a modern approach to assessing Mr Campbell would take a more holistic view that considered his background and experience". "The Court of Appeal judgment makes clear that its decision is based on fresh evidence from recent research work, and that the understanding of the factors which may contribute to a false confession has increased," the CCRC said. "It also states that there have been important developments in the law relating to admissibility of evidence and in matters of practice and procedure relevant to a fair trial."
