title: Umbrella sends distress alert when left behind - BBC News
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/news/technology-38473422
content: |-
  An app-connected umbrella is on show at CES that texts its owner when it has been left behind.

  An app-connected umbrella for forgetful people is on display at the CES technology show in Las Vegas.

  But the BBC’s Leo Kelion questioned whether the innovation justifies its price tag.

