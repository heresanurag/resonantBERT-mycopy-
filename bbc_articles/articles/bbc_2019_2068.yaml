  Live updates as weather warnings for snow and ice remain in place on Friday.

  Dad of baby nearly born in Asda: We were panicking a bit

  Among the stories that have emerged from the snow chaos is that of mum Roxanne Campbell, who went into premature labour while stranded on the A30 in Bodmin, in Cornwall, on Thursday. Pregnant Roxanne and husband Alex went into Asda as "it was the nearest place where it was warm" - but soon the contractions were coming fast. Alex said when the contractions started he was "panicking a bit". Store manager Lee Coshall said: "The contractions were getting closer together, I brought them down into the office. "We got to the point where they were coming every minute and a half. So that's when we asked her to lay down and have a look and then she started breaching. "It got to the point the baby was almost here and thankfully the paramedics did turn up." The couple were taken to hospital and baby Amelia was born at Treliske Hospital at 20:21, weighing 5lb 5oz.
