  Myers, from Barrow-in-Furness, found fame alongside Si King in their Hairy Bikers TV show 20 years ago. The programme saw the bearded pair travelling around the UK and the world on their motorbikes, sampling and cooking food from different regions. On Saturday, King addressed the crowds waiting to greet the bikers and said: "Thank you. You’ve made David Myers very proud."

  Crowds of the bikers gathered at the end of the ride in Barrow on Saturday

  The freedom of the town is the highest award that a town council can offer. The wording on the scroll reads: "We, the council, posthumously grant the highest honour we can bestow to David, and is given in recognition of his service to the Barrow community and the promotion of Civic Pride. "We loudly applaud your valuable and sterling service whilst thanking you most sincerely."
