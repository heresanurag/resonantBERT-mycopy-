title: Hairy Biker Dave Myers honoured with freedom of hometown Barrow - BBC News
date: '2024-06-11'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/cljj08xpg2ro
content: |-
  The Hairy Biker is given the posthumous title for his "valuable and sterling service" to Barrow.

  Dave Myers was thanked for his services to Barrow

  Hairy Biker Dave Myers has been posthumously given the freedom of his hometown of Barrow. The TV chef died in February at the age of 66, after he was diagnosed with cancer. It comes as thousands of motorcyclists travelled from London to Barrow to celebrate his life on Saturday. Barrow Town Council thanked Myers for his "valuable and sterling service to the Barrow community and the promotion of civic pride".

  Myers' widow Lili, who was presented with the award, said she "wasn't expecting it at all". She told BBC Radio Cumbria: "I feel this is such a huge honour... what a proud moment."

  Lili Myers said her husband was "always a Barrovian in his heart" and "he wanted to put Barrow on the map"

  'Dave Day' saw a huge remembrance procession of bikers journeying from the capital to his hometown. Cumbria Police estimated 20,000 people joined the ride up the country, while organisers said the figure was closer to 45,000. The distance between the first and last biker spanned about 25km (16 miles). Speaking on Saturday, Lili said: "Dave was always a Barrovian in his heart, he loved Barrow and he wanted to put Barrow on the map. "And today, beyond his grave, he’s done it again."

