id: bbc_2024_2759
title: Drone footage shows Chile forest fire devastation - BBC News
date: '2024-02-05'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-68205132
content: |-
  At least 112 people have been killed in Chile's Valparaiso region.

  Drone footage shows part of Chile's Valparaiso region that was devastated by a forest fire, killing more than 100 people.

  Many of those killed were visiting the coastal region for the summer holidays.
