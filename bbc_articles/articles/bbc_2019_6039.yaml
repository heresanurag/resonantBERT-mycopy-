title: Who is Julian Assange? - BBC News
date: '2019-05-01'
section: General
url: http://www.bbc.co.uk/news/explainers-47895662
content: |-
  Some see the man behind Wikileaks as a reckless 'hacktivist' – others think he's a campaigner for truth.

  Some see him as a reckless 'hacktivist' – others, a campaigner for truth.

  Julian Assange lived in the Ecuadorian embassy for seven years and is the man behind whistleblowing site Wikileaks.

  After being removed from the embassy and arrested, Assange is serving a jail sentence in the UK for jumping bail.

  But why was he there in the first place?
