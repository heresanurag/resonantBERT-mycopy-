title: UK wage growth faster than expected - BBC News
date: '2019-06-11'
section: Business
url: http://www.bbc.co.uk/news/business-48594011
content: |-
  Wages rose at an annual pace of 3.4% in the three months to April, official figures show.

  Wage growth beat market and economist expectations in the three months from February to April.

  Pay rose by 3.4% compared with a year ago. After taking inflation into account, wage growth was 1.4%, official figures show.

  The unemployment rate remained at 3.8%, and has not been lower since the October to December 1974 period, the Office for National Statistics said.

  The employment rate for women was 72%, the highest on record.

  This is after changes to the state pension age leading to fewer women retiring between the ages of 60 and 65.

  Matt Hughes, deputy head of labour market statistics at the ONS, said: "With employment growth among women coming from full-timers, the overall gap between men and women in hours worked is now the lowest ever - women now average about three-quarters of men's weekly hours, compared with around two-thirds 25 years ago."

  Sterling rose from five-month lows against the euro after wages rose faster than expected, beating some economists predictions of a 3% rise.

  While employment growth slowed, the jobless rate held at 3.8%.

  John Hawksworth, PwC chief economist, said it was "interesting" that female employment rose by 60,000 compared with the previous quarter, while male employment fell by 27,000.

  "This is consistent with a longer-term trend towards a narrowing gender employment gap.

  "Male employment is still higher at around 80%, but this is well below its historical highs of over 90% back in the 1970s."

  Tej Parikh, chief economist at the Institute of Directors, said: "The buoyant labour market is still going strong for the UK economy, even as it weathers widespread political uncertainty."

  "However, the employment boom cannot last forever, and is certainly showing signs of softening."

  How is it that employment has reached record levels yet people aren't feeling that in their pockets? It's a question that has confounded labour market experts.

  But with 357,000 jobs having been created over the last year, overwhelmingly full-time, companies are now having to pay a higher price to attract staff.

  Wages across the economy grew by 3.4% in the three months to April, compared with a year ago, according to the Office for National Statistics, with the biggest increases in the construction and financial services industries.

  Strip out inflation, however, and real wages remain on average a touch below pre-financial crisis levels.

  What happens next? The rate of job creation is slowing, and economists are divided over whether this represents more caution on the part of employers or a lack of suitable candidates.

  If it's the former, then the rate of pay growth could moderate. But if it's the latter, then salaries may rise faster as firms compete for the best talent.

  But bumper pay rises could come at a cost. The Bank of England is known to be concerned that faster pay growth could equal higher inflation, which could mean it's more inclined to raise interest rates.

  Meanwhile, data for a separate time period out on Tuesday showed the scale of job losses in the retail sector after tough conditions on the High Street.

  From the first quarter of 2018 to the first quarter of 2019, retail lost 79,000 jobs. In total, 54,000 employee jobs went, and 25,000 self-employed retail jobs.

  Kyle Monk, head of retail insight and analytics at the British Retail Consortium, said: "It has been a turbulent year, with many well-known brands disappearing from our High Streets, as has been evidenced by the substantial loss in retail jobs this quarter.

  "Political and economic uncertainty has compounded many of the challenges created by the pace of technological change."
