title: 'Sturgeon: Prime minister ''kicking the can'' over Brexit - BBC News'
date: '2019-04-02'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-47790048
content: |-
  Theresa May wants a further extension to the Brexit deadline - but Nicola Sturgeon says she's "kicking the can".

  Nicola Sturgeon has accused Theresa May of "kicking the can" after the prime minister said she would ask the EU for a further Brexit deadline extension.

  Mrs May called for talks with Labour leader Jeremy Corbyn to "break the logjam" in the Commons over Brexit.

  Ms Sturgeon said the prime minister was "kicking the can and delaying making any decision" on how to compromise.

  The first minister had earlier proposed cancelling Holyrood's Easter recess if the UK is heading for a no-deal exit.

  Westminster looks set to sit through its Easter recess as MPs attempt to agree a plan for the UK's exit from the EU, and the Scottish government said it would be "weird" if MSPs took time away from Holyrood if a no-deal exit was looming.

  Mrs May has been unable to win backing for her proposed Brexit plan, suffering three defeats in the Commons, while MPs have failed to unite around any alternative after a series of "indicative votes".

  The UK's departure from the EU was put back from 29 March to 12 April following a summit of European leaders late in March. If MPs or ministers cannot come up with a plan, which is accepted by the EU, then the UK will leave without a deal.

  After an all-day meeting of her cabinet on Tuesday, Mrs May said she would ask the EU for a further extension to the deadline to "break the logjam in parliament".

  She said she wanted this delay to be "as short as possible" - before 22 May, so the UK does not have to take part in European elections - and that she would seek talks with Mr Corbyn to agree a new approach.

