  In a post on Twitter, Ms Sturgeon responded: "This does seem very much like the PM kicking the can and, yet again, delaying making any decision that could break her cabinet.

  "What is missing is an answer to the question that many MPs faced up to last night - what is the compromise she is willing to make?"

  The SNP leader favours having a second referendum on EU membership, but her MPs have also backed proposals that would keep the UK in the single market and customs union to keep the option of a softer Brexit on the agenda.

  She said: "The sensible way forward - and I think one the PM would take if this was a serious attempt to build consensus - is to agree to fight an election, seek a longer delay and allow the option of a public vote on what the Commons says."

  The SNP's Westminster leader Ian Blackford added: "Scotland has been utterly ignored throughout the Brexit process.

  "The SNP has shown we are willing to find a compromise position to end the impasse, but out priority remains stopping Brexit in its tracks.

  "Time is fast running out and the prime minister must now seek a long extension to Article 50, bring this back to the people through a fresh referendum, and keep the option to revoke Article 50 on the table to avoid a no-deal Brexit."

  In her Downing Street statement, Mrs May said: "This is a difficult time for everyone. Passions are running high on all sides of the argument, but we can and must find the compromises that will deliver what the British people voted for.

  "This is a decisive moment in the story of these islands and it requires national unity to deliver the national interest."

  Mrs May made a statement at Downing Street offering talks with Labour leader Jeremy Corbyn

  Ms Sturgeon had earlier agreed with her own cabinet that Holyrood's Easter recess should be curtailed if the UK is heading for a no-deal Brexit.

  MSPs are due to have two weeks away from the parliament from 8 April, clashing with the latest deadline.

  A spokesman for the first minister said "MSPs should not be on holiday" while the UK is "staring down the barrel of the disaster of no-deal".

  The move would have to be confirmed by Holyrood's cross-party business bureau management group of MSPs, but has been backed by the Greens and the Lib Dems.

  A spokeswoman for the Scottish Parliament said the bureau would consider its position "before the close of business on Thursday".

  It is understood the current proposal is that if the UK is heading for a no-deal exit on 12 April, Holyrood would sit that Thursday and Friday to provide updates and communicate resilience plans.

  Brexit Secretary Mike Russell said MSPs would need to "discuss issues involved, hear about work being done on resilience, and to prepare for the terrible situation we'd find ourselves in".

  MSPs could return to Holyrood to sit during the upcoming Easter recess

  Ms Sturgeon's official spokesman said that if the UK was "staring down the barrel of the disaster of no-deal, then members of the public would find it weird if parliament was in recess and not focused on the issue in front of them".

  He added: "The first minister's view is clearly MSPs should not be on holiday when the biggest, most momentous, potentially most damaging issue to hit Scotland and the UK since the Second World War is about to take place."

  The Scottish Greens said it would be "quite right" for Holyrood to sit in light of the "unprecedented crisis" of no-deal, while the Lib Dems said there would be "a lot of frightened people out there" who would "need reassurances that their representatives are dealing with any issues that arise in a focused and collaborative way".

  However a number of MSPs hit out at the idea of recess being a "holiday", with several stressing that it was rather "a chance to catch up on local issues" and hold constituency surgeries.
