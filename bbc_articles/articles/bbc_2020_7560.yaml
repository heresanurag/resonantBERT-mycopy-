title: Coronavirus in Scotland - Sixth day of no new deaths - BBC News
date: '2020-07-14'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-53348478
content: |-
  Just two patients in Scotland are in intensive care with coronavrius and only three new positive cases were reported in the last 24 hours.

  That's all from us here on the BBC Scotland live page, on the eve of what the first minister has called "the biggest step so far" out of lockdown.

  Here are the changes coming tomorrow as Scotland continues with Phase 3 of the route map out of lockdown :
  • Indoor hospitality in pubs and restaurants will return on "a limited basis" and subject to several conditions
  • Places of worship can re-open for congregational services,communal prayer and contemplation
  • Easing of restrictions on attendance at funerals, marriage ceremonies and civil partnership registrations

  For many a trip to the hairdressers has been high on their wish list Image caption: For many a trip to the hairdressers has been high on their wish list
  • Museums, galleries, cinemas, monuments, libraries can reopen - with physical distancing and other measures
  • All childcare providers can open subject to individual provider arrangements
  • Hairdressers and barbers will be able to reopen - with enhanced hygiene measures - guidance will be published later this week
