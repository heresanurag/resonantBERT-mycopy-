  Lava continues to spurt from from a volcanic system in Reykjanes Peninsula, after Wednesday's powerful eruption.

  Lava is continuing to spurt from a volcanic system in Reykjanes Peninsula, Iceland, after a powerful eruption on Wednesday.

  The town of Grindavik, which has been threatened several times since eruptions in the region began in December, was once again evacuated. The world-famous geothermal Blue Lagoon spa was also forced to close.

  However volcanic activity is said to have eased significantly following the initial eruption.
