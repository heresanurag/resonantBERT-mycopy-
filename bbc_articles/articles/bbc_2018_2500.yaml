content: |-
  Dozens of women abused by ex-Team USA gymnastics sports doctor Larry Nassar confront him in court.

  Several women described how ex-Team USA gymnastics sports doctor Larry Nassar sexually abused them, imploring the court to impose the maximum sentence. Nassar has pleaded guilty to sexual assault charges.

  This video has been optimised for mobile viewing on the BBC News app. The BBC News app is available from the Apple App Store for iPhone and Google Play Store for Android.
