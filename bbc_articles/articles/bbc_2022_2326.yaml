title: 'Australia floods: Woman killed as flash floods hit east coast - BBC News'
date: '2022-02-23'
section: General
url: http://www.bbc.co.uk/news/world-australia-60489660
content: |-
  Flash floods hit multiple states, with some areas receiving up to 400mm of rain in 24 hours.

  A woman has died in flash flooding that has lashed Australia's east coast.

  Some areas have received up to 400mm of rain within 24 hours, prompting warnings in multiple states.
