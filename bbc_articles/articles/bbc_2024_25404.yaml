content: |-
  The visit to Australia is the biggest international trip by the King since his cancer diagnosis.

  King and Queen greeted by light show on Australia tour

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sydney Opera House was lit up with images of past royal tours as King Charles and Queen Camilla touched down in the Australian city on Friday. The couple arrived on a Royal Australian Air Force aircraft, following a torrential rainstorm, to begin their six-day tour of the country. Australia’s Governor-General Sam Mostyn was there to greet the King and Queen, along with Prime Minister Anthony Albanese. It is the King’s first visit to Australia since he became the country’s head of state in September 2022.

  This video can not be played To play this video you need to enable JavaScript in your browser. King Charles III and Queen Camilla landed in Sydney on Friday

  Images of members of the Royal Family visiting Australia were projected onto Sydney Opera House in honour of the King and Queen's arrival. However, they were partially blocked by a cruise ship, aptly named Queen Elizabeth, after its departure from the harbour was delayed by lightning and rain. Queen Camilla disembarked the plane holding an umbrella. On her coat she wore a brooch made of white and yellow diamonds that was given to the late Queen Elizabeth II in February 1954 during her Commonwealth tour. Before being driven away from the airport, the Queen received a posy of flowers from a group of young people. The King and Queen were then brought to Admiralty House, the governor-general’s residence, for a private meeting with Australia's prime minister. Official royal engagements will begin on Sunday, giving the King and Queen a day to recover from the long flight. The programme of events for the King and Queen also looks a bit different from regular royal tours. The timetables do not include evening engagements. There are no state dinners, and no trips out late in the day.

  King Charles III speaks to Australia's Governor-General Sam Mostyn after he and Queen Camilla landed in Sydney on Friday

  This will be the biggest trip by the King since his cancer diagnosis earlier this year. His treatment will be suspended while he is in Australia and during the next leg of his trip in Samoa, where he will attend a Commonwealth leaders’ summit. The last such official arrival by a monarch in Australia was in 2011, when the late Queen Elizabeth II landed in Canberra. The visit by King Charles will include supporting environmental projects, meeting political and community leaders and a naval review in Sydney Harbour. The King will also meet two Australian scientists, Georgina Long and Richard Scolyer, who have carried out pioneering research on melanoma, one of the country's most common cancers. He's been coming to Australia since he was a schoolboy and this will be his 17th visit - but his first as monarch.

  Australia's Prime Minister Anthony Albanese greets King Charles III and Queen Camilla as they arrive at Sydney Airport

  A message on the the Royal Family's social media account said: "Ahead of our first visit to Australia as King and Queen, we are really looking forward to returning to this beautiful country to celebrate the extraordinarily rich cultures and communities that make it so special." The visit has also re-opened questions about whether Australia should be a republic with an Australian head of state. Albanese is a supporter of Australia becoming a Republic and appointing an Australian Head of State. Those supporting a republic have been selling T-shirts labelling the royal visit a “farewell tour”. But monarchists say it is “insulting” that none of the six state premiers will attend an official reception for the King in Canberra on Monday. Ahead of the visit, letters between Buckingham Palace and the Australian Republic Movement were revealed, in which palace officials repeated that whether Australia became a republic or remained a constitutional monarchy was a choice for the Australian people.
