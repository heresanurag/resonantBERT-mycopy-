  Weekly quiz: Which famous couple spent their wedding anniversary here?

  This week saw Spain and Portugal plunged into darkness by a major power cut, Donald Trump celebrate his first 100 days in power, and Liverpool FC win the Premier League. But how much attention did you pay to what else has been going on in the world over the past seven days?

