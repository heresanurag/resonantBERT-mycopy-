  Coca Cola, the longest-standing partner of the Olympics, was named the world's leading plastic polluter, external in a recent survey by non-governmental organisation Break Free From Plastic. Toyota has committed to providing 500 hydrogen-fuel cell vehicles to "the Olympic and Paralympic family", with zero tailpipe emissions. However, a group of scientists, academics and engineers have penned an open letter to the IOC, external arguing that hydrogen vehicles require three times more electricity than battery electric vehicles. Bach told BBC Sport that the use of EV, hybrid and hydrogen-powered vehicles within the fleet for Paris 2024 sent "a very strong signal with regard to reducing the footprint of the Games". He added that Coca Cola will use "a beverage fountain" for catering at the Games, which "will reduce their plastic used by 50%". The Games plan to serve beverages in reusable plastic packaging at scale. However, French newspaper Le Monde has reported, external that 40% of drinks will still be served in single-use plastic bottles. More than 100 athletes have signed an open letter, external calling on Coca Cola and Pepsi to stop selling single-use plastic bottles and promote reusable products.
