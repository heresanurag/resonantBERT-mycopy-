title: PE teacher sets Over-50s high jump record - BBC News
date: '2020-10-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-54377705
content: |-
  Julia Machin, who was also a junior champion as a teenager, broke the previous record by 5cm.

  A PE teacher who "just loves competing" has broken the world record for the Over-50s at high jump.

  Julia Machin, from Burgess Hill, West Sussex, leapt 1.66m, beating the previous record by 5cm.

  She said she still participates in sport because she enjoys it, adding: "I consider records to be a bonus."
