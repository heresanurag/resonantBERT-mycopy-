title: The influencers risking death for Hurricane Milton clicks - BBC News
date: '2024-10-12'
section: General
url: http://www.bbc.co.uk/news/videos/cz042eld2kno
content: |-
  As Hurricane Helene and Hurricane Milton tore through Florida, some influencers ignored evacuation orders, risking their lives to post livestreams and stunts.

  The content creators are keen to cash in on the exposure, but many consider their behaviour to be reckless and selfish.

  BBC Verify has been looking at some of the videos posted online.
