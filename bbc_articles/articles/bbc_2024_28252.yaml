content: |-
  The software company's boss said Sergey, who teaches coding in online videos, was "a kind of Mozart".

  Seven-year-old gets job offer from Russian IT firm

  Sergey also enjoys playing the piano, chess and reading Harry Potter

  A Russian software company has invited a seven-year-old coding prodigy to join its management team, as soon as he is old enough to take up paid employment. Sergey from the Russian city of St Petersburg has built a name for himself, uploading videos that explain how to write software since he was five. On the strength of those videos, the information security firm Pro32 sent him a written job offer, for the post of head of corporate training. Under Russian law, Sergey would not be able to take up any paid role until he is 14.

  But Pro32's chief executive Igor Mandik told the BBC World Service he had spoken to Sergey's parents about finding ways to collaborate in the meantime. "His father, Kirill, was surprised and said that [they were] really happy and looking forward [to when] Sergey would be able to join the company," Mr Mandik said.

  On his videos, Sergey appears fresh-faced and smiling enthusiastically. Speaking in Russian and sometimes in slightly broken English, he goes through coding challenges step-by-step. His YouTube channel has more than 3,500 subscribers, interested in learning programming languages Python and Unity, or who want to hear more about neural networks, which underlie many artificial intelligence tools. Sergey's father Kirill told the BBC that his son got into coding when observing his older sister learn about programming. "At first, we studied the material together with the children to explain the basic principles to them. After a month, our help was no longer needed, and after two, Sergey was so carried away that he overtook everyone," he said. Sergey also enjoys reading the Harry Potter books, chess and playing the piano, and plans to post videos of his musical performances online too, his father added. Mr Mandik said Sergey showed not only remarkable developer skills but also "equally unique" skills in teaching. "For me, he is kind of a Mozart. "I'm absolutely sure that when he reaches 14, he'll be a guru of teaching and a guru of developing, and that is why we're really looking forward to this time," he said. Not just coders, but salesmen, accountants and others at Moscow-based Pro32 could learn from Sergey, Mr Mandik said. No promises have been made over pay, as yet, given that the going rate is likely to change significantly. "We have to wait for seven years," Mr Mandik said. "Then we will definitely start a conversation about his salary."
