title: Supreme Court lets Trump end deportation protections for Venezuelans - BBC
  News
date: '2025-05-19'
section: World
url: http://www.bbc.co.uk/news/articles/cvg78471n85o
content: |-
  Temporary Protected Status allows people to live and work in the US legally if their home countries are deemed to be unsafe.

  The US Supreme Court has said it will allow the Trump administration to terminate deportation protections for some 350,000 Venezuelans in the US. The ruling lifts a hold that was placed by a California judge that kept Temporary Protected Status (TPS) in place for Venezuelans whose status would have expired last month. Temporary Protected Status allows people to live and work in the US legally if their home countries are deemed unsafe due to things like countries experiencing wars, natural disasters or other "extraordinary and temporary" conditions. The ruling marks a win for US President Donald Trump, who has repeatedly tried to use the Supreme Court to enact immigration policy decisions.

  Venezuelans living in the US were first granted TPS in 2021. The secretary of Homeland Security at the time, Alejandro N Mayorkas, said the Biden administration had taken the decision "due to extraordinary and temporary conditions in Venezuela that prevent nationals from returning safely". He said the South American country was suffering "a complex humanitarian crisis marked by widespread hunger and malnutrition, a growing influence and presence of non-state armed groups, repression, and a crumbling infrastructure". According to the UN's refugee agency, almost eight million Venezuelans have left their homeland since the crisis began in 2014. Most of them are living in Latin American and Caribbean countries but hundreds of thousands moved to the United States. The Trump administration wanted to end protections and work permits for migrants with TPS in April 2025, more than a year before they were originally supposed to end in October 2026. Lawyers representing the US government argued the California federal court, the US District Court for the Northern District of California, had undermined "the Executive Branch's inherent powers as to immigration and foreign affairs," when it stopped the administration from ending protections and work permits in April. Ahilan Arulanantham, who represents TPS holders in the case, told the BBC he believed this to be "the largest single action stripping any group of non-citizens of immigration status in modern US history". "That the Supreme Court authorized this action in a two-paragraph order with no reasoning is truly shocking," Mr Arulanantham said. "The humanitarian and economic impact of the Court's decision will be felt immediately, and will reverberate for generations." Because it was an emergency appeal, justices on the Supreme Court did not provide a reasoning for the ruling. The court's order only noted one judge's dissent, Justice Ketanji Brown Jackson. In August, the Trump administration is also expected to revoke TPS protections for tens of thousands of Haitians. The ruling on Monday by the Supreme Court marks the latest in a series of decisions on immigration policies from the high court that the Trump administration has left them to rule on.
  • None What is the 1798 law that Trump used to deport migrants? Last week, the administration asked the Supreme Court to end humanitarian parole for hundreds of thousands of Cuban, Haitian, Nicaraguan and Venezuela immigrants. Along with some of their successes, the Trump administration was dealt a blow on Friday when the high court blocked Trump from using the 1798 Alien Enemies Act to deport immigrants in north Texas. Trump had wanted to use the centuries-old law to swiftly deport thousands from the US, but Supreme Court judges questioned if the president's action was legal.
