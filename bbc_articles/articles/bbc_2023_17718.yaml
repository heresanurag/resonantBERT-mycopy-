title: 'Crossmaglen: Significant weapons hide found buried in hedgerow, police say
  - BBC News'
date: '2023-11-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67290657
content: |-
  Police say suspected firearms and ammunition were found buried in a hedgerow earlier this week.

  The hide was found in a hedgerow on agricultural land near Crossmaglen

  A significant amount of suspected weapons and ammunition have been recovered from a hedgerow in County Armagh, police have said.

  It follows a search at Monog Road, Crossmaglen, on Monday and Tuesday.

  The weapons, including an assault rifle, two shotguns, three revolvers and seven handguns, as well as ammunition, were found in a hide on agricultural land.

  Police have said they are keeping an open mind over who owned them.

  The items will also be subject to forensic testing, Supt Norman Haslett added.

  "These searches send a clear message to those involved in organised criminal activity that we will continue to disrupt their activities so that our communities can live in peace and without fear," he said.

  He urged anyone with information about the items or any suspicious activity to contact the police.
