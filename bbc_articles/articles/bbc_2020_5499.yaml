  All your coronavirus updates from 15 May.

  Welsh Secretary Simon Hart says the UK and Welsh governments have “worked closely together every step of the way” after First Minister Mark Drakeford announced Wales’ lockdown exit plan.

  Mr Drakeford said he was “disappointed” over a lack of communication with the UK government over the last week.

  Welsh Conservatives in the Senedd have criticised the Welsh Government's roadmap out of the lockdown for a lack of detail on dates, but the exit strategy was welcomed by Mr Hart.

  "Throughout the coronavirus crisis, the UK and Welsh Governments have worked closely together every step of the way," he said.

  "I am glad that this announcement brings that alignment even closer, providing more certainty for jobs and businesses across Wales.

  “The approach being taken by the Welsh Government in its roadmap will allow us to continue with a UK-wide response to the emergency at the same time as taking a flexible approach according to the data in different parts of the UK.

  “The UK Government is providing the devolved governments with testing, funding, and logistical support from our armed forces.

  “No one part of the UK could face this pandemic alone and the UK Government has provided unprecedented support to every part of the UK.

  “There are far more similarities than differences in the approaches of the nations of the UK.

  "We entered this fight as a United Kingdom and we will come out of it equally united."

