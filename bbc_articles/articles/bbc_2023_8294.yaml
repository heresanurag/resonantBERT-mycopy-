title: 'FonaCab: Man faces charges over ''suspected gun'' video - BBC News'
date: '2023-06-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-65778897
content: |-
  A video circulating on social media shows a driver pointing what appears to be a gun.

  The video shows the driver pointing what appears to be a gun

  A 48-year-old man has been charged in connection with a video circulating online showing a man with a suspected firearm.

  In the video posted on social media, a driver for Belfast firm FonaCab points what appears to be a gun.

  A man was arrested on Thursday on suspicion of a number offences.

  He is charged with possession of a firearm or imitation firearm with intent to cause fear of violence, threats to kill and common assault.

  The man is also charged with having a Class A controlled drug.

  He is due to appear before Laganside Magistrates' Court on Saturday.

  FonaCab said on Thursday that it had terminated the employment of a driver over the video.

  A spokesperson for the company said it was liaising with the Driver and Vehicle Agency (DVA) Northern Ireland and the Police Service of Northern Ireland (PSNI).
