title: Bear breaks into house and smashes wall to leave - BBC News
date: '2019-08-11'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-49314846
content: |-
  Police in Colorado said the bear broke through a wall "like the Kool-Aid Man".

  The bear was probably attracted by the smell of rubbish

  A black bear broke into a house in the US before escaping by smashing through a wall.

  Police in Colorado said the break-in happened on Friday evening when the house was vacant. Nobody was injured.

  The smell of rubbish probably attracted the bear, Estes Park police said.

  "Upon officer's arrival, said bear forcibly breached a hole in the wall like the 'Kool-Aid Man' and made its escape," the police department wrote on Facebook.

  The mascot for the soft drink Kool-Aid is typically featured in adverts smashing through walls.

