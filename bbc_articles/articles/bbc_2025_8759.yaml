title: 'Dublin: Garda Kevin Flatley dies while on speed checkpoint duty - BBC News'
date: '2025-05-12'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx27dkkkev1o
content: |-
  Kevin Flatley, who was 49, had worked for An Garda Síochána for more than 26 years.

  Kevin Flatley had more than 26 years of service with An Garda Síochána

  A garda (Irish police) officer has died whilst carrying out a speed checkpoint in County Dublin. Kevin Flatley, 49, died at the scene after he was hit by a motorcyclist in Lanestown, in the north of the county, shortly before 13:00 local time on Sunday. A motorcyclist, a man in his 30s, was seriously injured in the incident and has been taken to Beaumont Hospital in Dublin where his condition is described as critical. Garda Commissioner Drew Harris said he was deeply saddened by the death of his colleague and extended his sympathies to Mr Flatley's family and friends.

  Garda Commissioner Drew Harris said he was deeply saddened by the death of his colleague

  "Kevin has over 26 years of dedicated service to An Garda Síochána and the people of Ireland," he said. He also revealed that Garda Flatley was the "90th member of An Garda Síochána killed in the performance of duty". "His death is a terrible reminder of the dangers faced by gardaí," he added. Speaking at a press conference on Sunday evening, Mr Harris said it was a "terrible loss for us all". "Kevin has been a very faithful public servant," Mr Harris said. He added that he was very well-known and well-liked throughout the organisation.

  Micheál Martin extended his "deepest sympathies" to Garda Flatley's family, friends and to the "entire membership of An Garda Síochána"

  The Taoiseach (Irish prime minister) said he was "very shocked and deeply saddened" to hear of Garda Flatley's death. Speaking in Cork to RTÉ News, Micheál Martin said he wanted to extend his "deepest sympathies to his family, to his friends and to the entire membership of An Garda Síochána". He added that "gardaí work bravely on our behalf to keep us safe every day" and it was "truly shocking" that this has occurred. Irish President Michael D Higgins said Garda Flatley had "dedicated his career to public service and to keeping people safe". "The loss of a garda has a deep impact on society due to this strong connection and my thoughts are with his family and all those who knew and cared for Garda Flatley across his life," he added.

  General Secretary of the Association of Garda Sergeants and Inspectors (AGSI) Ronan Clogher described the news as "devastating" and called it a "dark day" for An Garda Síochána. "We are in shock and numbed at the news this afternoon. No Garda shift is ever routine, but this one has ended in the most horrendous of circumstances." The Police Service of Northern Ireland (PSNI) Chief Constable Jon Boutcher said: "The loss of an officer is felt across the entire policing family and our thoughts are with his family, friends and An Garda Síochána colleagues at this difficult time. "Kevin's death is a stark reminder of the risks that police officers face every day as they work to protect the public and keep people safe."

  Gardaí have appealed for witnesses to come forward
