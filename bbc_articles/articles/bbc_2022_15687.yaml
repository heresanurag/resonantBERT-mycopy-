title: Ukrainian soldiers' joyful reunion with family after liberating Kherson - BBC
  News
date: '2022-11-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-63639918
content: |-
  They are able to visit their homes and see relatives for the first time since the Russian invasion began.

  Ukrainian forces have liberated Kherson, which means many soldiers from the city and nearby villages can finally visit their homes and see relatives for the first time since the start of the Russian invasion.

  The BBC's Abdujalil Abdurasulov has travelled with some of those fighters and witnessed their emotional reunions.
