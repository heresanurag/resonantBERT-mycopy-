title: 'Sir Graham Brady: ''Massive speculation on confidence vote was unhelpful''
  - BBC News'
date: '2018-12-12'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46535830
content: |-
  Sir Graham Brady says he phoned the prime minister to advise her the threshold of 48 letters had been reached to trigger a vote of no confidence.

  Sir Graham Brady, chair of the 1922 committee, says he phoned the prime minister to advise her the threshold of 48 letters had been reached to trigger a vote of no confidence.

  The vote will take place between 18:00 GMT and 20:00 GMT on Wednesday.
