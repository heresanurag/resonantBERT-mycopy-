title: Firefighters tackle blaze at London's Somerset House - BBC News
date: '2024-08-18'
section: General
url: http://www.bbc.co.uk/news/videos/c7v57e16g95o
content: |-
  Around 100 firefighters have been sent to tackle a blaze at Somerset House in central London.

  The London Fire Brigade (LFB) said it had sent crews after receiving a call just before midday.

  There are no reported injuries, the Metropolitan Police has said.

  LFB added that the cause of the fire was not yet known.
