title: Wine-bottle snowman towers 26 feet over Mendips pub - BBC News
date: '2024-12-10'
section: Somerset
url: http://www.bbc.co.uk/news/articles/cn8gyeq1zddo
content: |-
  Thousands of lights have completely covered the Queen Victoria Inn in Somerset.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A Mendips pub has become home to a 26-foot snowman made of wine bottles this festive season. The Queen Victoria Inn in Priddy, Somerset, has also been completely covered in Christmas lights to raise money for Children's Hospice South West. Comprising of a huge steel structure supporting 2,500 bottles, the eight-foot top hat worn by the snowman towers over the building itself. Thousands of lights will be switched on each day from 16:00 GMT to 21:00, with the spectacle closing for the season on New Year's Eve.

