content: |-
  Molten rock has been edging towards the coastal town of Grindavik after a volcanic eruption last month.

  A flow of molten rock has consumed a road in Iceland as it edges towards the coastal town of Grindavik.

  Grindavik is not subject to an evacuation order as the lava's slow progress means there is not believed to be an imminent risk.

  The lava is a result of a volcanic eruption last month in the Reykjanes Peninsula region. The volcano has since stabilised.
