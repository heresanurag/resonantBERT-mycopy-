title: 'Watch: Shoplifters steal £100 of Easter eggs from Nottingham Tesco - BBC News'
date: '2025-04-16'
section: General
url: http://www.bbc.co.uk/news/videos/c3evzy0e2lko
content: |-
  A shoplifter caught on CCTV stealing £100 worth of Easter eggs has been sentenced.

  CCTV footage has shown the moment two people stole £100 worth of Easter eggs before smashing through the glass doors of a supermarket to make their escape.

  Jordon King, of no fixed address, and a second suspect - who has not yet been identified - took the chocolate eggs from a Tesco Express store in Alfreton Road, Nottingham, on 27 February.

  Nottinghamshire Police said shops were targeted at various times between 27 February and 27 March, as the offenders also stole nappies and washing pods from supermarkets in Radford.

  King pleaded guilty to three counts of shop theft, resisting an officer when arrested and criminal damage, Nottinghamshire Police said on Monday.

  The 28-year-old was sentenced to eight weeks in prison at Nottingham Magistrates' Court on 28 March, and ordered to pay the cost of the stolen items.

  Police said inquiries were ongoing around a second person seen on CCTV during the Tesco theft.

