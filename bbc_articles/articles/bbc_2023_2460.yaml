content: |-
  Zendaya is among the stars posing for photographers at the Screen Actors Guild Awards in Los Angeles.

  Dead To Me star Christina Applegate, who announced in 2021 she had been diagnosed with multiple sclerosis, walked the red carpet with her daughter Sadie Grace LeNoble. Earlier this month, Applegate told the Los Angeles Times the SAGs would probably be her last awards show as an actor
