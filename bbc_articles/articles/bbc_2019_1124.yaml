content: |-
  People are being evacuated from the Dusit hotel complex after two explosions and gunfire were heard.

  Many people have been killed after a hotel complex came under attack in the Kenyan capital, Nairobi.

  At least two blasts and gunfire were heard at the compound in the Westland district of the city, which houses the Dusit hotel as well as offices.

  Police are treating it as a terrorist attack. Witnesses saw four armed men entering the complex.

  The Somalia-based militant group al-Shabab claimed responsibility for the attack.
