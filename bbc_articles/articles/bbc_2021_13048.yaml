title: 'Sabina Nessa: Hundreds pay respects at Eastbourne vigil - BBC News'
date: '2021-10-05'
section: England
url: http://www.bbc.co.uk/news/uk-england-58807300
content: |-
  The vigil is being held in the town where the murder suspect was arrested.

  The vigil has been held amid continuing public outrage about male violence towards women

  Hundreds of people have held a vigil in Eastbourne, the town where the man suspected of murdering school teacher Sabina Nessa was arrested.

  About 200 people gathered to pay tribute to Ms Nessa and to call for an end to male violence against women.

  Ms Nessa was found a few minutes' walk from her home in Cator Park, Kidbrooke, on 18 September.

  Koci Selamaj, 36, of Terminus Road in Eastbourne, has been charged with the 28-year-old's murder.

  The vigil at Eastbourne Pier was held amid continuing outrage and debate over women's safety and policing.

  At about 19.00 BST, those who had gathered paused in thoughtful reflection as a Muslim prayer was read out.

  Many of those attending held pictures of Ms Nessa, while others carried signs protesting against male violence or remembering Sarah Everard.

  Those gathered at the vigil held up candles and posters in a "peaceful protest"

  Addressing the crowd on the seafront, co-organiser Natasha Peacock said: "Sabina Nessa should still be alive. She was loved and she will be deeply missed."

  She said the vigil had be organised "to mourn Sabina and the other 109 women killed this year due to male violence", and described it as "a peaceful protest to say that we need to make the safety of women and girls a priority".

  Another attendee, Nicolette Florides, said: "A lot of the girls around me are too scared to walk home. We want the community to make girls and women feel safe."

  About 200 people gathered at the pier in Eastbourne to pay their respects

  Marie Goodchild added: "The police force needs more resources and there needs to be more victim support.

  "There should be a safe space for victims to come forward, not feel humiliated or that you are going to get scrutinised if you do come forward."

  Koci Selamaj was arrested in Eastbourne in the early hours of 26 September.

  He has indicated he will deny the charge of murder and has been remanded in custody ahead of a plea hearing on 16 December.

