  Barry Noone, 47, had previously denied murdering his mother but has now admitted manslaughter.

  Man admits killing his mother in her home

  Una Noone was found dead in her home in June 2022

  A man has admitted killing his 77-year-old mother in her home more than two years ago. Barry Noone, 47, had previously denied murdering Una Noone. But at Belfast Crown Court on Thursday he was re-arraigned following a request by his defence barrister. When the charge of murder was put to Mr Noone, of Daleside Road in London, he replied: "Not guilty to murder but guilty to manslaughter by reason of diminished responsibility.''

  Mrs Noone was found dead at the house in Rathkeen Avenue, Cookstown, County Tyrone in June 2022. A prosecution barrister said the Public Prosecution Service was content to accept the plea of manslaughter. Mr Noone was remanded back into custody to allow a pre-sentence report to be compiled. He is due back in court on 6 December.

  Barry Noone was re-arraigned in court on Thursday
