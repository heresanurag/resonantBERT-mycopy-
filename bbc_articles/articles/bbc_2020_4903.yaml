  Golfer's living room practice pays off on first game back

  A golfer says practising shots in his living room helped for his first game back playing after the government eased some coronavirus lockdown restrictions. Bruce Allison, 73, from Harrogate teed off at 07:40 this morning - making him one of the first golfers back on the course since the government allowed some sports to resume under social distancing rules to keep players safe. Mr Allison said his club, in Pannal, organised a charity draw to find out who had the privilege of being one of the first to tee off. He said: "It was wonderful. For members it was terrific and great to be back on the course. "We have distance markings around the tee and you have to turn up five minutes before your tee time for when you've booked. "You don't touch the pin and clearly you can't shake hands with your partner after the game,” he added.
