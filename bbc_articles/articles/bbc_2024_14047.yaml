title: 'Liam Jones: Released murderer''s second killing ''horrific'' - BBC News'
date: '2024-06-05'
section: Oxford
url: http://www.bbc.co.uk/news/articles/cw4433dpj48o
content: |-
  Liam Jones inflicted at least 37 injuries on disabled, father-of-five Phillip Breach in Oxford.

  Liam Jones had killed a man in 2002 but was released on parole in 2021

  A second murder by a man who had killed before has been described as "horrific" but "rare" by the Probation Service. Liam Jones, 45, inflicted at least 37 injuries on disabled father-of-five Phillip Breach in Oxford in November 2022. He had been jailed for another man’s murder in 2002 but was released on parole in 2021. A Parole Board spokesman said its reviews were "undertaken thoroughly and with extreme care".

  Jones was jailed for life again, with a minimum of 37 years, at Reading Crown Court last month. A Probation Service spokesperson said: "This was a horrific crime and our thoughts remain with the family of Phillip Breach. "Serious further offences (SFOs) like this one are rare but have a devastating impact on victims and their families which is why each one is thoroughly investigated so we can improve the work we do to keep the public safe." The BBC understands a review into the case has been completed and will be presented to the Breach family. Fewer than 0.5 % of people under Probation Service supervision go on to commit SFOs, according to government figures.

  A Parole Board spokesman said its decisions were "solely focused on what risk a prisoner could represent to the public if released and whether that risk is manageable in the community". "A panel will carefully examine a huge range of evidence, including details of the original crime, and any evidence of behaviour change, as well as explore the harm done and impact the crime has had on the victims," he continued. "Members read and digest hundreds of pages of evidence and reports in the lead-up to an oral hearing." He said evidence from witnesses such as probation officers, psychiatrists and psychologists, officials supervising the offender in prison, as well as victim personal statements may be given at a hearing. "It is standard for the prisoner and witnesses to be questioned at length during the hearing which often lasts a full day or more. Parole reviews are undertaken thoroughly and with extreme care," he said. "Protecting the public is our number one priority."

  Mr Breach, 59, was making his way back from the Co-op shop in Wood Farm Park, after buying a newspaper and a chocolate bar, when he was attacked. Body-worn video footage from a police officer patrolling the murder scene hours after the attack showed Jones asking him about what had happened. He told the officer, "I hope they're alright, whoever it is", before cycling off. He was arrested the next day. Sentencing Jones, Mr Justice Murray said he was sure he had meant to kill Mr Breach. He said while the killing was different to his knife attack on a man in Southampton in February 2002, there were “striking coincidences”, including their “savage” nature. He said Jones, of Bonar Road, Oxford, must serve “every single day” of the 37 years before he could be considered for release by the Parole Board. If he is ever released, Jones will remain on licence and could be recalled.

