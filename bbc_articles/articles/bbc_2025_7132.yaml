content: |-
  A Supreme Court ruling that a woman is defined by biological sex continues to make the front pages on Monday.

  PM 'must break silence' on ruling and the 'spy who bugged me'

  The Telegraph claims that Prime Minister Sir Keir Starmer has refused to stop what it calls "a plot", external by some of his ministers to defy the Supreme Court ruling that a woman is defined by biological sex. The Daily Mail accuses the prime minister of being silent, external on the court's verdict. Downing Street says the government has welcomed the "clarity" the ruling has brought. Meanwhile the Daily Express reports that the women's rights campaigners who brought the case are facing what it calls a "disgraceful campaign of death threats and abuse"., external

  "UK boosts munitions to end dependence on US" is the lead headline for the Times. It says the UK is to dramatically increase the production of explosives, external used by the military so as not to be reliant on US and French manufacturers. The paper quotes the Defence Secretary John Healey who calls it "an important step". The Guardian says rising drug prices and red tape brought about by Brexit are "derailing" opportunities for cancer patients, external to receive certain treatments and participate in international clinical trials. It cites a leaked report compiled by experts from organisations including Cancer Research. "Trade uncertainty haunts key IMF meetings" is the lead headline for the Financial Times ahead of a major gathering of finance ministers and economic policymakers in Washington this week. The paper focuses on the impact of what it calls the "US-driven trade shock" caused by President Donald Trump's new tariffs - and says threats to global growth are rising., external The Mirror's front page carries what it calls an exclusive report on the sale of hunting trips to Africa., external The paper publishes pictures of animal skins and heads on a stall, which it claims was among several selling trophy hunting holidays at a trade fair in Staffordshire. The report says campaigners are calling on the government to speed up a ban on the import of animal trophies to the UK. And several papers feature the story of 12-year-old Cooper Worthington, who is reported to be the UK's youngest Elvis impersonator. The youngster from Devon says his "dream has come true" after being invited to perform at his hero's former home, Graceland, in August.

