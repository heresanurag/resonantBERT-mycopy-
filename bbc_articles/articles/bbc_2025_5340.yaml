title: Mice experiment as step to create mammoth-like elephants - BBC News
date: '2025-03-04'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/c0jg4n776evo
content: |-
  Experiments on mice could see hairy, genetically modified elephants living in the Arctic, a US company claims.

  The mice have been genetically modified to be hairier

  Genetically engineered woolly mice could one day help populate the Arctic with hairy, genetically modified elephants and help stop the planet warming. Those are the startling claims being made by a US company that said on Tuesday it had created mice with "mammoth-like traits". Colossal Biosciences' eventual goal is to engineer mammoth-like creatures that could help stop arctic permafrost from melting. Criticism has flooded in, including that engineering mammoth-like creatures is a big stretch from making mice hairier, as well as being unethical, and that the whole project is a publicity stunt. But the company says it has been misjudged and that the mouse is an important tool on the path to restoring Earth's depleted nature.

  Colossal Biosciences says that the experiments with hairy mice was a step towards genetically modifying elephants to be hairy and better able to withstand the cold. Its stated goal is to create herds of what it calls mammoth-like creatures to live in the arctic tundra. The company says the creatures' grazing habits would encourage grasslands to flourish and reduce the amount of carbon dioxide being released from melting permafrost. Carbon dioxide is a greenhouse gas which is one of the main drivers of global warming. But critics say there are significant scientific challenges to overcome before these changes in mice can be tried out on elephants. Colossal's co-founder and CEO, Ben Lam, told BBC News that the woolly mice marked a big step forward. "We are on track to have the first cold adapted elephant by 2028 and that would mean having the first embryos by the end of 2026," he said. "Over time we are going to have this entire lineage of cold adapted elephants that we can put back into the wild that can interbreed"

  Artwork: from mouse to a mammoth-like creature in five years, but is it realistic?

  The woolly mice had eight of their genes modified: seven were adapted mice genes related to hair growth and the eighth was a mammoth gene related to increasing body fat. The researchers found that the animals had longer, curlier hair, but no evidence that the mammoth's fat-increasing gene had an effect.

  The woolly mouse had seven genes associated with hair growth altered to make it hairier

  Colossal Biosciences work has been met with scepticism from scientists not employed by the company. Their concerns include:
  • None The Colossal team has altered mice genes long known to be related to hair formation and produced hairy mice. It is a huge leap to go from woolly mice to cold-adapted, woolly elephants in just five years.
  • None It will be hard enough to produce one woolly elephant, but to produce hundreds or thousands needed to restore the arctic tundra would be even more challenging.
  • None Genetic changes that might work in mice could lead to abnormalities in elephants resulting in animal suffering.
  • None That these modified creatures would be regarded as freaks by other elephants and rejected by other members of their herd. "This doesn't seem to have a practical use or any real scientific value," said Dr Helen Wallace of the campaign group GeneWatch. "It is designed to get publicity, and I think most people will be shocked," she added.

  Founder and CEO of Colossal Biosciences, Ben Lam, says experiments will be carried out on elephants only when his scientific team are confident that the procedures will be safe

  In response, the Colossal researchers say they feel misjudged. Their mouse is a tool, they say, with which to test whether different genetic alterations they have planned are effective and safe before they try them out on elephants. "Validation that this works is really exciting for this project," says the firm's chief science officer, Prof Beth Shapiro. She adds that the firm has other research programmes running in parallel, such as studying embryo development and creating artificial wombs for the genetically modified elephants to grow in, and which the company says will ensure that they achieve their target of creating cold adapted elephants in a few years. Prof Shapiro firmly disputes the allegation that the work is pointless. She says that the firm's plan to reintroduce extinct species, such as the Dodo and Tasmanian Tiger, as well as the mammoth, will fill ecological niches that have been lost, and so restore biodiversity and benefit the environment. The genetic tools it is developing in the meantime are already helping species at risk of extinction, she adds. These include developing a vaccine for elephants against a deadly virus; the creation of genetically modified marsupials in Australia known as quoll to be resistant to neurotoxins produced by the cane toad; and reintroducing genetic diversity in the pink pigeon in Mauritius. And Prof Shapiro says that elephants won't suffer. The team is developing techniques to screen only viable embryos, and she believes that they won't be treated as outcasts either. "We really are only going to be changing a few letters in their DNA code. The elephants will be born to mothers who are not going to see them as freaks because they are going to be very much the same as them, just a lot more hair and can survive colder climates".
