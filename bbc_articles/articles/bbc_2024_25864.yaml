  She would not reply when asked who she had voted for. As well as the referendum on changing the constitution, Moldovans also voted in the country's presidential election on Sunday. The votes were seen as key tests for the country, which is facing a choice between pushing on with EU membership or keeping close ties to Russia. Sandu topped the election first round with 41% of the vote versus her closest opponent's 26%. The result for Aleksandr Stoianoglo, who is supported by the pro-Russian Party of Socialists, was considerably higher than expected. Sandu will now face a difficult second round on 3 November in which her eliminated rivals - populist Renato Usatii and former Gagauzia governor Irina Vlah - will likely unite against her behind Stoianoglo.

  Maia Sandu arrives to give a press briefing in Chisinau, following a disappointing result for her

  She accused "criminal groups" of working together with "foreign forces", using money, lies, and propaganda to sway the vote. Sandu also said her government had "clear evidence" that 300,000 votes were bought, which she called "a fraud of unprecedented scale". Moldova is currently in talks with the EU on becoming a member. These accession talks will continue despite Sunday’s outcome, as the referendum was not legally binding. The vote, however, was supposed to make the process irreversible. Instead, it feels a little shakier now.

  At Sandu's election headquarters on Sunday evening, the mood was extremely subdued, with one of her advisers describing the result so far as "not what we expected". Sandu, who has cultivated close ties with Moldova’s EU neighbours, had campaigned for the Yes vote in the referendum. She had previously said the vote was would set up the future of Moldova for "many decades ahead". When the first results began trickling in showing that the No vote had done better than expected, Sandu’s team put the disappointing results down to the first count coming in from villages and rural areas. The big city count narrowed the lead for the No vote, but by 01:00 (22:00 GMT) few thought the Yes camp could still stand a chance. Many of Sandu’s supporters left her headquarters in Chisinau where they had been hoping to celebrate her victory before the count was even over. The little EU flags they’d been given to wave were abandoned, on chairs or strewn on the ground. But as the night went on, the gap narrowed even further. In the end, the Yes vote clinched it - but only just. Voter turnout stood at more than 51% when polls closed at 21:00 local time (18:00 GMT), making the referendum valid. Several presidential candidates boycotted the referendum. Aleksandr Stoianoglo said he did not support the idea of changing the constitution - although he added he was a supporter of his country's "European aspirations". However, many young people queuing at polling stations on Sunday were vocal about their support for Moldova’s future as an EU member state, with some saying they were voting because they wanted to choose a European future for their country – for the sake of the economy and for more opportunities. Some said they were fed up of being "pulled" towards Moscow, decades after the Soviet Union collapsed and Moldova became independent. "We have to choose a European future for our country, for our children, our future – for geopolitics, for peace, that’s the most important," a voter called Oksana told the BBC. "Because we are between Europe and Russian influence, and we have to choose what we want."
