content: |-
  The storms hit Missouri, Kansas, Texas and Oklahoma, whipping up fires and overturning trucks.

  Tornadoes and dust storms leave at least 34 dead in southern US

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At least 34 people have died in the US after violent tornadoes tore through several south-eastern states, flipping cars and flattening homes. In Kansas, a dust storm on Friday afternoon caused a crash with more than 50 vehicles, killing at least eight people. Texas saw a similar mass pile-up. A state of emergency has been declared in several states, including Arkansas, Georgia and Oklahoma, where more than 100 wildfires were raging. A third day of severe weather was forecast for Sunday, with flash flooding and more tornado warnings issued across the region. The National Weather Service (NWS) warned of "intense to violent" tornadoes, describing the situation as "particularly dangerous".

  "Get to the sturdiest structure you have access to and remain in place until the storms pass," the NWS told residents in Alabama on Saturday night, when multiple tornado warnings were issued. At least 250,000 properties across the US were without power on Sunday morning, according to tracker PowerOutage. In Missouri, where at least 12 people died, Governor Mike Kehoe said the state had been "devastated by severe storms... leaving homes destroyed and lives lost". Initial reports showed 19 tornadoes had struck 25 counties in the state, its emergency management agency said. A home belonging to one of those killed was torn apart. "It was unrecognisable as a home. Just a debris field," Coroner Jim Akers of Butler County told the BBC's US partner, CBS News. "The floor was upside down. We were walking on walls." Alicia Wilson, who was evacuated from her Missouri home, told local TV station KSDK: "It was the scariest thing I've ever been through - it was so fast, our ears were all about to burst." A woman in Mississippi described how terrified her daughter was. "All I could hear was my six year old screaming that she didn't want to die - you don't want to hear that coming out of your baby's mouth," Jericho McCoy said.
