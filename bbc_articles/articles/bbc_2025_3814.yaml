  Tornadoes form when moist, warm air rises, mixing with cold air above to generate thunderclouds. Winds blowing from different directions cause the air to rotate, creating a vortex of air that moves upwards. Several states, including Texas, Louisiana, Oklahoma and Kansas, lie within so-called Tornado Alley - a path frequently hit by the weather phenomenon, as the geography is ideal for their formation. Peak tornado season in the region is from May to June - but meteorologists caution that they can occur at any time of year.

