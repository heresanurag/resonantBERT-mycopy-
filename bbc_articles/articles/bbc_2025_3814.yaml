  In Texas, a dust storm caused a pile-up of about 38 cars, which killed at least four people, local officials told AFP. "It's the worst I've ever seen," Sgt Cindy Barkley, of the state's public safety department, told reporters. "We couldn't tell that they were all together until the dust kind of settled." The destructive storms fuelled many wildfires in several central states, including Oklahoma, where more than 130 fires were reported on Friday, the state's department of emergency management said, external. As of Saturday, it said there had been 112 fire-related injuries reported by hospitals in the state. Governor Kevin Stitt, who visited his own ranch to find he had "lost everything to the fires", said the damage in the state was unbelievable. "Oklahomans, we are in this together and we will build back stronger," he said.
