content: |-
  Natalie Christopher, 35, was last seen on Monday going for a run on the island of Ikaria.

  Natalie Christopher was last seen going for a run on Monday morning

  Police searching for a 35-year-old British woman who disappeared on the Greek island of Ikaria say they have found her dead in a ravine.

  Natalie Christopher, an astrophysicist from London, was reported missing by her partner on Monday after failing to return from a run.

  The couple, based in Cyprus, were on holiday on Ikaria, 130 miles (210km) south-east of Athens.

  Detectives are investigating the circumstances of her death.

  A major air-and-land search had been launched with island authorities joined by specialist teams.

  The body was found around three miles from where she was last seen in a 20m (66ft) ravine, police said.
