title: 'Phillip Schofield: Tearful Holly Willoughby says she feels ''let down'' by
  Schofield - BBC News'
date: '2023-06-05'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/live/entertainment-arts-65765769
content: |-
  Willoughby hosts the show for the first time since Schofield left, after he admitted an affair with a colleague.

  "Hi there, good morning, Josie, thank you for being here. Right, deep breath. Firstly, are you OK? I hope so.

  "Feels very strange indeed sitting here without Phil. I imagine that you might have been feeling a lot like I have - shaken, troubled, let down, worried for the well-being of people on all sides of what's been going on, and full of questions.

  "You, me, and all of those at This Morning gave our love and support to someone who was not telling the truth, who acted in a way that they themselves felt that they had to resign from ITV and step down from a career that they loved.

  "That is a lot to process, and it is equally hard to see the toll that it's taken on their own mental health. I think what unites us all now is a desire to heal for the health and well-being of everyone.

  "I hope that as we start this new chapter, and get back to a place of warmth and magic that this show holds for all of us, we can find strength in each other. And from my heart, can I just say thank you for all of your kind messages and thank you for being here this morning?

  "Myself, Josie, Dermot, Alison and Craig, and every single person that works on this show will continue to work hard every single day to bring you the show that we love."
