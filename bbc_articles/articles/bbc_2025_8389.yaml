title: Watch flames and explosions rip through battery recycling plant - BBC News
date: '2025-04-09'
section: General
url: http://www.bbc.co.uk/news/videos/c86jjg3j713o
content: |-
  Firefighters have been tackling a large blaze at a battery recycling plant in North Ayrshire exactly a year after another fire at the site.

  The Scottish Fire and Rescue Service (SFRS) sent six fire appliances to the Fenix Plant on Byrehill Place in Kilwinning at about 12:40.

  Motorists and pedestrians have been urged to avoid the area and people in the houses nearby are asked to keep their windows and doors closed. Police said there had been no reported casualties.

  It comes exactly a year after the SFRS battled a fire at the site which raged for four days.
