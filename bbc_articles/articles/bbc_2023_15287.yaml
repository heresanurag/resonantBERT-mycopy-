title: 'Peter Bone: Ex-aide speaks about ‘abuse’ by MP - BBC News'
date: '2023-10-25'
section: General
url: http://www.bbc.co.uk/news/uk-politics-67211032
content: |-
  The MP's ex-assistant spoke anonymously to the BBC’s Hannah Miller. His testimony has been voiced by an actor.

  A former parliamentary staff member has described how "physical, emotional and psychological abuse" by Peter Bone left him a "broken shell” of his former self.

  Speaking anonymously to the BBC's Hannah Miller, his words have been voiced by an actor.

  Mr Bone was suspended as a Conservative MP after an investigation by Parliament's behaviour watchdog found he had bullied and was sexually inappropriate around the individual.

  In a statement following the publication of the watchdog's findings, Mr Bone said the allegations were "false and untrue".

  He has not responded to the BBC's request for comment on the complainant's interview.

