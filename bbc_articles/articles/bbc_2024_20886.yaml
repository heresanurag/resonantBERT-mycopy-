content: |-
  Eluned Morgan becomes the first woman to lead the Welsh government, following a Senedd vote.

  Eluned Morgan confirmed as first minister of Wales

  Eluned Morgan says it is "the greatest honour of my life" to be Wales' first female first minister

  Eluned Morgan has been confirmed as the first female first minister of Wales, following a vote in the Welsh Parliament. The Senedd was recalled from its summer break to nominate her, after Vaughan Gething resigned. Members of the Senedd (MSs) were able to take part in the vote virtually, including from abroad. Ms Morgan said it was "the greatest honour of my life to stand before you today as the first woman to become the first minister of Wales".

  Ms Morgan became leader of Welsh Labour last month, after being elected unopposed, and has been health minister since May 2021. On Tuesday in the Senedd, after being nominated by Mr Gething, she was backed by 28 MSs, Conservative Andrew RT Davies received 15 votes and Plaid Cymru's Rhun ap Iorwerth 12. The only Liberal Democrat, Jane Dodds, abstained. Ms Morgan's name was then sent to the King who gave his approval, allowing the new first minister to officially take office. Ms Morgan, who became the sixth Welsh first minister, thanked Mr Gething for his service, describing him as a "true trailblazer" on Wales' "devolution journey". Mr Gething was Wales' first black first minister. "As I take up the mantle of leadership I promise to honour [my predecessor's] achievements and add my own contributions to this legacy," she told the Senedd. "Perhaps with a vibrant splash of colour - the grey suits are out." Mr Gething quit last month after four members of his cabinet resigned. His leadership was mired in controversy after he accepted donations from a man twice convicted of environmental offences during his election campaign. The sacking of one of his cabinet ministers over leaked messages also caused a row within the party.

  This video can not be played To play this video you need to enable JavaScript in your browser. Your potential is limitless, Wales new FM Eluned Morgan tells women

  Ms Morgan told MSs that she looked forward to the day when a "woman becoming first minister is no longer extraordinary but a normal part of our Welsh political life". She told women watching events in Cardiff Bay "you need to know your potential is limitless". "The path to leadership is not now just a possibility, it's a reality," she said. After a period of infighting within the Welsh Labour group, which she described as "difficult", Ms Morgan said "we must work to restore trust". "Wales is warm and welcoming nation and our political discourse needs to reflect that." "Our differences should be a source of strength, not a source of division," she said. "We have been through some turmoil, but we know we are best when we work in unity, as a party and nation." Pledging to focus on achievement and delivery, she warned of "tough decisions" because of what she called the "dire" state of UK public finances. Ms Morgan previously ran to be Welsh Labour leader and first minister in 2018, coming third behind Mark Drakeford and Vaughan Gething. Prime Minister Sir Keir Starmer spoke to Ms Morgan on Tuesday evening, after an earlier statement offering his "heartfelt congratulations and support". In the statement the UK Labour leader said she had "today made history as the first ever woman to become first minister of Wales". “Eluned has a long history of public service and her commitment to delivering for the people of Wales is unwavering," he said. In a nod to the turmoil that has engulfed Welsh Labour in recent months which led to her appointment, the prime minister added: "I know she will lead a unified and ambitious Welsh government. “Labour in Wales and Westminster will work side by side firmly in the service of working people."

  Labour Senedd members were in good spirits after Eluned Morgan's elevation

  Welsh Conservative Senedd leader Andrew RT Davies congratulated Ms Morgan on winning the top job, but warned that "for the last few months, the Welsh Labour government has been so busy with infighting it has further neglected our public services". "Wales needs someone in the top job now who can drive down our waiting lists, improve educational attainment and turbocharge our economy," he said. “Sadly, on the basis of her record, there is little reason to believe Eluned Morgan will be that person.” Plaid Cymru leader Rhun ap Iorwerth called for a Senedd election, 21 months before one is due to take place to end the "revolving door of first minsters". Wales has now had three first ministers since March, when Mr Gething replaced his predecessor Mark Drakeford. With 30 of the 60 seats in Cardiff Bay, Labour needs opposition help to govern, and Plaid pulled its support from a cooperation agreement with Welsh ministers during Vaughan Gething's administration. Mr ap Iorwerth said he had "no intention to do a budget deal with Welsh Labour". "We will look at things in a mature way, but whilst always telling the people of Wales now at this crucial juncture, less than two years from the next Senedd election, there is a different way of doing politics," he said. Welsh Liberal Democrat leader Jane Dodds, and the party's only MS, said she was "delighted to see another woman leading the way in Welsh politics". She said that "with the new government in Westminster and a new first minister, we have a real opportunity here in Wales to demonstrate a fresh Welsh, ambitious approach and a different kind of politics".

  After the turmoil of the past few months there were plenty of smiles from Labour Senedd members and, perhaps, a sense of relief. But the new first minister faces a formidable to-do list. She needs to make sure that Labour Party unity extends beyond today's vote. Part of that might come from whoever she appoints as new health secretary on Wednesday. And she will need to decide whether her predecessor Vaughan Gething will have a place in cabinet. What about the country more widely? Record NHS waiting lists - on her watch as health secretary - steel jobs, farming subsidies, 20mph, cost of living and poverty, persuading another party or politician to do a budget deal.
