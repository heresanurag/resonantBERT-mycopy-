title: Fishermen rescued from flooded river in Jammu, northern India - BBC News
date: '2019-08-20'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-49413744
content: |-
  An Indian Air Force crew saved the two men in Jammu, India which has been hit by heavy rain.

  Two fishermen have been rescued after getting stranded by flooding at the Tawi River in Jammu, northern India.

  At least 38 people have died in floods that have hit northern states during this year's rainy season.
