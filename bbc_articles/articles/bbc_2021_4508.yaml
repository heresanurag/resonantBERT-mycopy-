title: 'Thatcham stabbing: Man charged with woman''s murder - BBC News'
date: '2021-04-04'
section: Berkshire
url: http://www.bbc.co.uk/news/uk-england-berkshire-56631063
content: |-
  A 35-year-old man is charged with murdering a woman who was found stabbed in a street.

  The woman was found with stab wounds in Crookham Hill, Thatcham

  A man has been charged with murdering a woman who was found stabbed in a road.

  Police said the victim, aged in her 40s, died from her wounds in Thatcham, Berkshire, shortly after officers were called at 23:45 BST on Thursday.

  Four roads around the scene in Crookham Hill were closed.

  Christopher Minards, 35, of Station Road in Thatcham, who is also charged with possessing a blade in public, is due to appear before Reading magistrates on Monday.

