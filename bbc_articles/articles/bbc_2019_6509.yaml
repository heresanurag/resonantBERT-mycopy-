title: Oxted skateboarding boy, 3, dies after Tesco van crash - BBC News
date: '2019-06-03'
section: Surrey
url: http://www.bbc.co.uk/news/uk-england-surrey-48490515
content: |-
  The boy was hit by the Mercedes Sprinter box van in Oxted and died in hospital an hour later.

  The boy was knocked down while riding a skateboard

  A three-year-old boy has died after being hit by a Tesco van while riding a skateboard.

  The youngster was knocked down by the white Mercedes Sprinter box van in Oxted, Surrey, at about 10:45 BST on Sunday.

  Emergency services, including an air ambulance, were called to the scene at The Hollies, in Hurst Green.

  He was taken to the East Surrey Hospital in Redhill but pronounced dead just after midday.

  A Tesco spokesman said: "We are deeply shocked and devastated by this tragic incident and are currently doing everything we can to support the police with their investigation."

