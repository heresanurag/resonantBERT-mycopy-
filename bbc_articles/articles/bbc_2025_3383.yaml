  Uncapped teenagers Lennon Miller and James Wilson are named in Scotland's squad for this month's Nations League play-off matches with Greece.

  Scots call up 'two for the future' Miller & Wilson

  Uncapped teenagers Lennon Miller and James Wilson have been named in Scotland's squad for this month's Nations League play-off matches with Greece. Meanwhile, Lewis Ferguson, Kevin Nisbet and Kieran Tierney have been recalled by Steve Clarke. Motherwell midfielder Miller and Hearts forward Wilson, both 18, have represented their country at age grade level. Well regular Miller has captained his club side of late while Wilson, who also qualifies for Northern Ireland, has broken into the Hearts team in recent months, scoring six times. "A lot of call-offs, a lot of injuries, especially in middle to forward areas," Clarke said. "I just felt it was a chance to have a look at two young boys, who've caught the eye - Lennon certainly over the last 18 months and James over the last six months. Two for the future but also can help us just now. "Lennon plays with a maturity beyond his year. Good qualities, he can play deep in midfield, can play higher midfield, good delivery, box-to-box, good energy. Now we have to see if he can fit in among the group. "[James] is someone who catches your eye, runs behind, looks to score goals, which is a great trait. We're always looking for goal scorers. Clarke's side are bidding to stay in League A and are away for the first leg on 20 March (19:45 GMT), with the return at Hampden on 23 March (17:00).

  Bologna midfielder Ferguson, 25, missed Euro 2024 with a long-term knee injury but has returned to action in Serie A. Forward Nisbet, 28, is rewarded for his recent form on loan at Aberdeen from Millwall, netting 10 goals this season including five in his past six appearances. Defender Tierney, 27, last played for Scotland during the Euros, where he picked up a hamstring injury, but recently returned to the Arsenal side. He will move back to first club Celtic this summer. "Always good to get your good players," Clarke said of Ferguson and Tierney. "Unlucky with injury. Fingers crossed they can come back and have an injury-free year and help us stay in [the highest tier of] the Nations League and qualify for the World Cup. "Kevin's scored a couple of goals recently. Sometimes when a striker starts scoring goals, it becomes a habit so hopefully with Kevin that's the case. "We want to stay at the top level, we want to be competitive against the top teams and to do that, we're going to have beat a good Greece side over two games. "Good team, defend well, don't give many goals away, score goals. Really good on the counter attack, their away performances particularly catch the eye. "Any team that goes to Wembley and beats England is always going to catch your eye." Hearts captain Lawrence Shankland, 29, also featured in the finals in Germany but is not included in the latest squad. Ipswich Town forward George Hirst, 26, had been linked with a Scotland call-up and Clarke commented: "It's possible, there was a delay in the paperwork. "George is somebody that we've had in mind for a few months. I've watched him recently. He's a player that would help to give us more depth to that position, if we can do it."

  Greece named their squad on Monday, with head coach Ivan Jovanovic including three Premier League players. Newcastle United goalkeeper Odysseas Vlachodimos, Liverpool defender Kostas Tsimikas and West Ham defender Konstantinos Mavropanos are part of Jovanovic's 26-strong squad. Genk midfielder Kostas Karetsas, 17, is given a first call-up but 31-year-old captain Tasos Bakasetas misses out after sitting out Panathinaikos' past four games, as does former Celtic forward Giorgos Giakoumakis, now with Cruz Azul. Scotland and Greece have only faced each other twice before in the men's game, during the Euro 96 qualifying campaign. The home side won 1-0 on both occasions.
