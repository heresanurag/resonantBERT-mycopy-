  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Andre Onana (Manchester United): People may say that 'it was only against Leicester' but he made some big saves to keep it level, particularly his stop to keep out Wilfred Ndidi. His distribution was miles better, too.

  Noussair Mazraoui (Manchester United): The full-back gets a shoutout because Diogo Dalot was given the runaround by Leicester winger Abdul Fatawu - he had a tough time. United took Dalot off, moved Mazraoui over and he nullified that threat. Craig Dawson (Wolves): It was a huge game for Wolves against Southampton - and he was excellent. He showed what he can deliver, didn't put a foot wrong and even looked like he could play for another 40 minutes after the game - as he was playing on the pitch with his kids! It was easy for him. Dan Burn (Newcastle): Two old-fashioned English centre-halves this week and they were both excellent and did their jobs so well. Forest's Chris Wood has been the striker of the year so far and Burn put him to task. He did such a great job that Wood only had one touch in the Newcastle box. Pervis Estupinan (Brighton): A massive win for Brighton against Manchester City. I was looking to put some of their other players in but they were subs who came on and did good things. Estupinan was solid throughout and made sure things were good.

  Bruno Fernandes (Manchester United): Here's where we send the internet into meltdown because I'm dropping Bruno back to play alongside Joelinton. He wasn't great throughout the game but at critical stages he scores massive goals. He just settles it down when they need him. He's had his leadership questioned a lot but he came out after the game and spoke well about his team-mate Alejandro Garnacho. Joelinton (Newcastle): Everyone keeps forgetting that Joelinton came as a striker and game upon game, season upon season he just gets better and better as a midfielder. He's a big, strong physical specimen who scored an excellent goal but I like the whole way he conducts himself. He gets after people, and he's not afraid to make a tackle.

  Mohamed Salah (Liverpool): He's just excellent, isn't he? Every time I think he's going to slow down or he's ready to leave he gets better and better. He gets another goal and assist in a huge weekend for Liverpool, after Manchester City lost. It was an opportunity for Liverpool to kick on and they were excellent against Aston Villa. Matheus Cunha (Wolves): There are few games I have been to this year when I look at one player and think 'he is better than every other player on that pitch'. But Cunha was miles better than Southampton and his Wolves team-mates. He was a level of class above. Look at the way he carries the ball and the defensive work he does - and it was the first time my wife has told me off for screaming at a goal, when he put his strike in the top corner. So he gets extra credit for making me lose my composure. Yoane Wissa (Brentford): Two more goals for Wissa, who goes under the radar. When Ivan Toney was at Brentford he was the main man and now everyone thinks this is Bryan Mbeumo's team, but in the last 18 months Wissa has been excellent. When he's fit and available Brentford look like a proper outfit. Alexander Isak (Newcastle): A first time in the team this season for Isak. He got a goal and an assist against Forest and had great link-up play. He could have scored another one in the second half as well. When Newcastle were up against it he went 'right, watch this'. He can turn it up a level and dragged his team with him.

  Gary O'Neil (Wolves): Delivered a huge win against Southampton with all the pressure on him.

