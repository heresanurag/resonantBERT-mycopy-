content: |-
  At number of people have died in catastrophic floods that have hits parts of eastern and central Europe.

  A number of people have died in catastrophic floods that have hits parts of eastern and central Europe.

  A firefighter was killed during a rescue in Austria and people have drowned in Poland and Romania, while several people are missing in the Czech Republic.

  Tens of thousands of people are without power and many have been evacuated from badly-hit areas to higher ground.
