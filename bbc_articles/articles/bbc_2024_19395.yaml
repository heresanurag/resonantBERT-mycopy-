title: Mike Lynch co-defendant Stephen Chamberlain dies after car crash in Cambridgeshire
  - BBC News
date: '2024-08-20'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/c74jzd22dkno
content: |-
  Stephen Chamberlain's family describe him as "an amazing individual".

  Stephen Chamberlain was previously acquitted with Mike Lynch following a US fraud trial

  The co-defendant of British tech tycoon Mike Lynch - who is currently missing in Italy - has died after being hit by a car. Stephen Chamberlain, 52, was Mr Lynch's co-defendant in his US fraud trial in which both men were acquitted following the $11bn (£8.64bn) sale of the software giant Autonomy. Mr Chamberlain died after being struck by the vehicle while out running in Cambridgeshire on Saturday and his family has now paid tribute to him. Mr Lynch and his daughter are currently missing after a luxury yacht sank off the coast of Sicily on Monday.

  Mr Chamberlain's family described him as a "much loved husband, father, son, brother and friend". "He was an amazing individual whose only goal in life was to help others in any way possible," they added. "He made a lasting impression on everyone who had the privilege of knowing him. "He will be deeply missed but forever in the hearts of his loved ones." Mr Chamberlain died in hospital after the crash on the A1123 at Stretham in Cambridgeshire at about 10:10 BST on Saturday. The driver of the car, a 49-year-old woman from Haddenham, remained at the scene and is assisting with enquiries. Gary Lincenberg, Mr Chamberlain’s lawyer, also described his client as a "courageous man". "Our dear client and friend Steve Chamberlain was fatally struck by a car on Saturday while out running," he said. "He was a courageous man with unparalleled integrity. We deeply miss him. "Steve fought successfully to clear his good name at trial earlier this year, and his good name now lives on through his wonderful family."

  Divers are helping in the search for those missing from the yacht off the coast of Sicily

  Mr Chamberlain was the former vice-president of finance at Autonomy. Prior to his US trial he was the former chief operating officer of British cyber security company Darktrace. A spokesperson for Darktrace said he was a "substantial contributor" to the team in its early years. "Steve was much loved by his colleagues and leaves many friends at Darktrace," they added. "We extend our deepest condolences to his wife and the rest of his family who are very much in our thoughts at this challenging time." Mr Lynch similarly had connections to Cambridgeshire after studying Natural Sciences at the University of Cambridge. He was raised near Chelmsford in Essex and more recently has been living in the Loudham Hall estate in Suffolk.

  Mike Lynch's wife was saved from the yacht but he and his daughter remain missing

  Searches for those missing from the yacht off the coast of Sicily have resumed on Tuesday. Six tourists - including Mr Lynch and his 18-year-old daughter - remain missing from the yacht named Bayesian. It was hit during intense storms in the early hours of Monday. Morgan Stanley International Bank chairman, Jonathan Bloomer, and Clifford Chance lawyer, Chris Morvillo, are also among those missing.

