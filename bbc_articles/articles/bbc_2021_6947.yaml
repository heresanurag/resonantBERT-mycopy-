id: bbc_2021_6947
title: 'Covid: No substantial outbreaks at UK test events - BBC News'
date: '2021-06-25'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57607679
content: |-
  The first nine pilot sport and culture events resulted in 28 positive tests among thousands of attendees.

  The Brit Awards took place at the start of May when case rates in the UK were much lower than they are now Image caption: The Brit Awards took place at the start of May when case rates in the UK were much lower than they are now

  The results from the first phase of the pilot scheme exploring the impact of large-scale events on Covid-19 transmission are encouraging but do not necessarily indicate such events pose little or no risk, scientists say.

  The events in May took place at a time when case rates were low in the UK generally, the Events Research Programme report says.

  In a foreword Nicholas Hytner and David Ross, chief advisers for the ERP, say the report "does not make conclusive public health recommendations on the reopening of events at this stage".

  They highlight the studies took place during low prevalence of coronavirus, adding "future public health measures need to adapt to the prevailing levels and patterns of the virus".

  Prof Iain Buchan, executive dean of the Institute of Population Health, says: "The main findings... tell us good ventilation, quick action on test results, not attending the event if feeling unwell, were critical areas where even further improvements are possible."

  Professor Paul Monks, chief scientific adviser to the Department for Business, Energy and Industrial Strategy, says: "The reassurance is it's not that different to what you would have got with or without the event. But that's a measure of the level of prevalence and the protection protocols we had in place."

  But he adds: "Many of us who've been to these events have been very moved as well. I have never seen a crowd of 6,000 people suddenly burst into happy tears - an outbreak of joy, rather than an outbreak of a virus, it was incredibly moving."
