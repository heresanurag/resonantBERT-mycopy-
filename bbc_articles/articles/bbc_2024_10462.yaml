title: '''Injecting son with infected blood played on mother''s mind'' - BBC News'
date: '2024-05-20'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-68973670
content: |-
  Euan McDougall was just 16 when he died from Aids in 1994 after being infected with HIV by blood products used to treat haemophilia.

  Under the care of doctors at Yorkhill Children’s hospital, he became one of the thousands of victims of what has been called the worst treatment disaster in the history of the NHS.

  His mum Kate died earlier this year, exactly 30 years after her son.

  According to her ex-husband John, she is another victim of the scandal as she never got over her unwitting role in causing Euan’s illness.

  "I mean to me Kate is the latest victim," said John.

  "Kate died three months ago, as a direct consequence of all that had gone before."
