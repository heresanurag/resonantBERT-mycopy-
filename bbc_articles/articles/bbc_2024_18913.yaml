title: Boy alerts police to rescue mother trapped in sinking car - BBC News
date: '2024-08-17'
section: General
url: http://www.bbc.co.uk/news/videos/cz73vyqzgxzo
content: |-
  Bodycam video shows the 12-year-old telling an officer the woman had a seizure before driving into a pond.

  A woman who drove into a body of water after having a seizure was rescued from the sinking vehicle after her 12-year-old son alerted a police officer.

  Newly released bodycam footage shows the moment of the near-fatal accident in West Orange, Texas. Officer Charles Cobb and multiple Good Samaritans jumped into the pond and eventually were able to rescue the woman out of the car.

  Officer Cobb received a "Life Saving Award" from the police department in recognition of his efforts.

  The woman is recovering in hospital after being on a ventilator for three weeks.
