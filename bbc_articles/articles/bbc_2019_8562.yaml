id: bbc_2019_8562
title: '''Government has same-sex marriage duty'', says Sinn Féin - BBC News'
date: '2019-07-11'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-48937481
content: |-
  Sir Jeffrey Donaldson made the comments after MPs voted to change same-sex marriage and abortion law.

  The DUP's Sir Jeffrey Donaldson says a vote by MPs to legalise same-sex marriage and liberalise Northern Ireland's abortion law has "breached the devolution settlement".

  But Sinn Féin's Conor Murphy says the government has a responsibility to deliver rights in Stormont's absence.
