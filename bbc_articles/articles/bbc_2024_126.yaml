content: |-
  The attacker, a 17-year-old, died of a self-inflicted gunshot wound after opening fire on Thursday morning.

  Candidate Vivek Ramaswamy (right) speaks to parents from Perry after the shooting attack Image caption: Candidate Vivek Ramaswamy (right) speaks to parents from Perry after the shooting attack

  The eyes of all political journalists are on Iowa, which is the first state in the US to vote on which Republican candidate should be in November's race for the White House.

  Earlier today, Republican Vivek Ramaswamy was in Perry, the same town where the school shooting occurred.

  He posted a video of himself meeting two parents at a campaign event there, telling them "we're obviously still in shock as we learn what's happened here in this community".

  He added that he would "pray and reflect on how we make sure that something like this never happens again".

  Donald Trump, Ron DeSantis, Nikki Haley and Asa Hutchinson were also due to hold events in Iowa on Thursday.

  DeSantis, in an interview with the Des Moines Register after the attack, said that the federal government should not lead new efforts to stem gun violence.

  "The federal government is probably not going to be leading that effort, I think it is more of a local and state issue," he said.
