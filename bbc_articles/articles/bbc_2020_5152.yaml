  Bringing you the latest news from across England about the coronavirus pandemic.

  That's it for our live coverage of the coronavirus pandemic in England for today.

  We'll be back with more updates from across the country from 07:30 BST on Monday, when the country will start to implement any changes to lockdown measures that Prime Minister Boris Johnson unveils in his briefing this evening.

  Remember, there is plenty of information on symptoms of the virus and guidance on social distancing rules on the coronavirus section of the BBC News website.

  Thanks for joining us.
