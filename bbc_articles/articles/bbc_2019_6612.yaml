title: 'Emma Faulds: Body found in forest in search for missing woman - BBC News'
date: '2019-06-13'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-48620864
content: |-
  Police say the remains were discovered in the Galloway Forest, Dumfries and Galloway, on Wednesday.

  Detectives searching for missing Emma Faulds have found a body in Dumfries and Galloway.

  Ms Faulds, 39, from Kilmarnock, was last seen in Monkton, South Ayrshire, on Sunday 28 April.

  Last month Ross Willox, 39, was charged with Ms Faulds' murder. He made no plea and was remanded in custody.

  A Police Scotland spokeswoman said: "On Wednesday, June 12, human remains were discovered in the Galloway Forest, Dumfries and Galloway."

  She added: "The family of Emma Faulds has been made aware of this discovery and police inquiries are ongoing."

  Police officers were at the scene where the body was found

  Police were concerned that she may have come to harm after she failed to contact her family and made no arrangements for the care of her pet dog.

  Earlier in the investigation specialist officers searched woodland near the village of Barrhill in South Ayrshire.

  They also appealed for information about two cars known to have been on the A714 Girvan to Newton Stewart road around the time of her disappearance.

