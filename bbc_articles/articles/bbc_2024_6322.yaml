title: Edinburgh bin lorry crash victim, 11, was 'the perfect son' - BBC News
date: '2024-03-04'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-68462435
content: |-
  Thomas Wong was riding his bike when he was critically injured in a collision in Edinburgh on Friday.

  The family of an 11-year-old boy who died after being hit by a bin lorry in Edinburgh have described him as "the perfect son".

  Thomas Wong was riding his bike when he was involved in a collision with the vehicle on Whitehouse Road, at about 08:20 on Friday.

  Police Scotland said he was pronounced dead at the scene.

  In a statement, released by the force on Sunday, Thomas' family said they were "utterly heartbroken".

  It continued: "Thomas was the perfect son. He was the best little brother to his older sister and was adored by all his family.

  "Thomas went to Cramond Primary School which he loved. He made good friends there. We will all miss him terribly."

  The family, who live in Edinburgh, added they were very grateful for all the sympathy and heartfelt messages they had received.

  The collision happened on Whitehouse Road in Edinburgh

  On Friday, Helen Donaldson, head teacher of Cramond Primary School, said Thomas was "always smiling" and that he was a "positive, friendly and curious" boy.

  She said: "We are utterly devastated by the tragic news of the sudden death of one our pupils. Our thoughts are with his family and friends during this incredibly difficult time.

  "He was kind and always eager to support others, and will be greatly missed by all of us."

  Insp Andrew Thomson said: "Our thoughts are very much with Thomas's family and friends. Specially trained officers are supporting the family at this time.

  "We are continuing with our inquiries to establish the full circumstances of the incident and would appeal to anyone who may have information, and has not yet contacted police, is to get in touch with officers."

  Insp Thomson also urged anyone with private CCTV or dash cam footage to get in touch.

  The bin lorry driver was not injured in the incident, which happened near the junction with Braehead Road.

  Thomas is the second child to be killed after being hit by a bin lorry in Scotland this year.

  Last month an 11-year-old girl died in hospital in Edinburgh a week after she was critically injured in the Borders.

  Elizabeth Bell was struck by a vehicle on the A6105, near East Gordon, on 31 January.
