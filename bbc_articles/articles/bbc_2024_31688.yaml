content: |-
  The cast recount one of the most memorable challenges of filming the first series on a limited budget.

  The cast of Gavin & Stacey presented BBC Radio 2's Breakfast Show this morning, days ahead of the series' finale. Hosts James Corden and Ruth Jones - Smithy and Nessa on the show - spoke to castmates about their memories filming the programme.

  Mathew Horne and Joanna Page recount one of the most memorable moments during the recording of the first ever episode of the hit BBC sitcom. Limited funding meant that in the show's early days the cast and crew had to rethink the episode's famous nightclub scene.

  The show was a BBC Three original and was first aired in 2007 with the main cast being relatively unknown at the time.

  The final episode is due to air on BBC One on Christmas Day.
