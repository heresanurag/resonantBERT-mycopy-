title: 'Crime figures: Violent crime recorded by police rises by 19% - BBC News'
date: '2019-01-24'
section: UK
url: http://www.bbc.co.uk/news/uk-46984559
content: |-
  The number of homicides - including murder and manslaughter - also rose by 14%.

  Violent crime recorded by police in England and Wales has risen by 19% in a year, latest Home Office figures show.

  The number of homicides - including murder and manslaughter - rose from 649 to 739, an increase of 14%, in the 12 months to the end of September 2018.

  It is the the highest total for such crimes since 2007.

  Robbery went up by 17%, as did recorded sexual offences, according to the data released by the Office for National Statistics (ONS).

  Overall crimes recorded by police went up by 7% with a total of 5,723,182 offences recorded.

  John Apter, chairman of the Police Federation, which represents thousands of lower rank officers across England and Wales, said: "Society just isn't as safe as it once was, and although the police service is doing everything within its power, we are swimming against the tide and it is the public who are being let down."

  There has also been an increase in stalking and harassment offences recorded by police, which have risen by 41%. The ONS said it was likely that improvements in the way such crimes are recorded were likely to be behind the rise.

  Public order offences went up by 24% to 427,134. In this case, while the ONS said changes in recording practices might have had an impact, there could also be a "genuine" increase.

  Alex Mayes, policy and public affairs adviser at charity Victim Support, said of the violent crime statistics: "These figures starkly highlight the devastating human cost of the recent rises in serious violence that we've seen across the country.

  "Working with bereaved families through our national homicide service we know just how destructive these shocking crimes are."

  Policing Minister Nick Hurd said overall the chance of being a victim of crime remains low, but added: "We accept certain crimes, particularly violent crime, have increased and we are doing everything possible to reverse the trend."

  He said those moves included a proposed increase in police funding, and a strategy to prevent young people turning to crime.

  Prime Minister Theresa May's official spokesman said: "These statistics show that your chance of being a victim of crime remains low, but we recognise that certain crimes - particularly violent crime - have increased, and we are taking action to address this."

  Labour shadow home secretary Diane Abbott said the data "underlines the failures of government policy".

  She said: "Serious violent crime continues to rise yet the government remains in denial about the effects of its own policies. The Tories have cut police officer numbers.

  "They have also exacerbated all the causes of crime, including inequality, poverty, poor mental health care as well the crisis in our schools, especially school exclusions.

  "Labour is committed to increasing police numbers and to reversing the austerity policies which are contributing to crime."

  There has been an 8% rise in the number of offences involving knives

  On homicide, statisticians said the increase continues an upward trend that has been seen since March 2014, indicating a change to the long-term decrease over the previous decade.

  The homicide figures exclude victims of terrorism attacks in England and Wales.

