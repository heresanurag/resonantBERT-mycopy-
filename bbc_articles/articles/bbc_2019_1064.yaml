  A lot of these crimes, which the ONS describes as "lower-volume, higher-harm types of violence", happened in London and other major cities.

  Chief Constable Bill Skelly, of the National Police Chiefs' Council, said some increases could be due to changes in how police record crime, and increasing reporting of incidents, there are "real rises in serious crimes like robbery and violence with weapons, with a devastating impact on victims and families".

  Police forces are committed to tackling violent crime and those having offensive weapons, but need to work alongside other organisations like the Home Office "because this is not something that can be solved by policing alone," he said.

  "Rising crime, increased terrorist activity and fewer police officers have put serious strain on the policing we offer to the public," he added.

  "We are determining the additional capabilities and investment we need to drive down violence and catch more criminals - and we will make the case at the next government spending review."

  The Home Office statistics are published at the same time as the Crime Survey for England and Wales, which is based on people's experiences of crime. The survey includes crimes that people do not report to police.

  Longer-term trends, measured by the survey, suggest crime overall is stable.

  The only main crime type that showed a change in the 12-month period, according to the survey, was computer misuse - including crimes involving scams and computer viruses - which went down by 33%.

  Helen Ross, from the ONS centre for crime and justice, said: "In recent decades we've seen the overall level of crime falling, but in the last year, it remained level.

  "There are variations within this overall figure, depending on the type of crime. Burglary, shoplifting and computer misuse are decreasing but others, such as vehicle offences and robbery, are rising.

  "We have also seen increases in some types of 'lower-volume, high-harm' violence including offences involving knives or sharp instruments."

  BBC home affairs correspondent Danny Shaw said the figures painted a "pretty bleak picture" and there were a number of possible reasons for the increase in violent crime.

  "The Home Office has said that it's linked to the drugs market and the fact that cocaine, in particular, is now more readily available in this country," he said.

  "The price of it has come down, the purity has gone up, and that is increasing the tension between drug gangs, which spills across to the streets.

  "We're also seeing in these homicide statistics that there have been more domestic killings.

  "That obviously isn't explained by the drugs market but there could be other factors - social factors, could it be to do with the fact there's been a decrease in the number of police officers in the past seven or eight years?

  "These are some of the theories being put out there, but there's no simple explanation."
