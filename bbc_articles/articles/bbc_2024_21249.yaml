content: |-
  Jade Jones loses in the first round of the taekwondo but Katarina Johnson-Thompson makes an excellent start to the heptathlon at Paris 2024.

  GB gold, Covid hits 200m and KJT starts well - day 13 in Paris

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Team GB are back among the gold medals after Ellie Aldridge secured their 13th podium-topping triumph of the Paris Olympics, winning the women's kite sailing final on the water off Marseille. There was also success in the velodrome where Emma Finucane took bronze in the women's keirin to win her "surreal" second medal at these Games. A good start for Britain's Katarina Johnson-Thompson means she leads the heptathlon after day one. But there was heartbreak for Jade Jones as she suffered a second successive Olympic first-round loss in the women's under-57kg taekwondo. British team-mate Bradly Sinden cruelly missed out on the podium, having to pull out before a bronze medal bout because of injury. Botswana's Letsile Tebogo claimed a surprise but brilliant Olympic 200m gold at the Stade de France, with Covid-affected 100m winner Noah Lyles leaving the track in a wheelchair after taking bronze. In the diving, Grace Reid and Yasmin Harper progressed to the final of the women's 3m springboard, but there was disappointment for Jack Laugher and Jordan Houlden in the men's final. What's happening and when at Paris 2024

  Aldridge secured Great Britain's 13th gold of the Olympics with her kite sailing victory. In doing so she became the inaugural champion, with the discipline making its debut. It is a fast and furious event, with competitors flying above the water on hydrofoils attached to lightweight boards and powered by huge kites at up to 40 knots. Aldridge secured gold by winning two races in the final series on Thursday. The 27-year-old went into the last of those tied on points with France's Lauriane Nolot but behind her on countback. World silver medallist Aldridge led almost from start to finish in the first race of the day and was even more dominant in the second, in which Nolot fell off her board early on to put herself out of contention. Aldridge was able to cruise to the finish line before celebrating her moment of history and Team GB's 50th medal of the 2024 Games.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tebogo wins gold in men's 200m final as Lyles comes third

  Botswana's Tebogo claimed a surprise Olympic 200m gold medal as Lyles was denied a sprint double at Paris 2024. Tebogo, 21, stormed clear of his rivals to clock an African record of 19.46 seconds and finish ahead of American Kenneth Bednarek, who crossed the line in 19.62 secs. America's sprint showman Lyles, who claimed 100m gold by five-thousandths of a second on Sunday night, burst out on to the track to huge cheers before the race. However, he struggled to compete with those at the front and ultimately matched his Tokyo bronze in 19.70 secs, before receiving medical attention and leaving the track in a wheelchair. US Track and Field then revealed that Lyles had tested positive for Covid and pictured showed he had been wearing a mask before coming out to race. Winner Tebogo, competing in his first Olympics, lost his mother in May and wears her date of birth on his shoes. "It's basically me carrying her through every stride that I take inside the field. It gives me a lot of motivation. She's watching up there, and she's really, really happy," he said after taking gold.

