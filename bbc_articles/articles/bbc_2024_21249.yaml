  Sinden and Jones were among Britain's major medal hopes at these Games, and both started their taekwondo campaigns on Thursday. He then won the first round of his semi-final against Zaid Kareem of Jordan. However, after losing a tight second round, he received two kicks to the head in the decider and slipped to a 10-2 defeat. That left Sinden facing a bronze medal bout but he was forced to pull out with a knee injury. But Jones' hopes of gold were over at the last-16 stage, as they were in Tokyo. She was beaten 7-6 4-5 1-1 by Miljana Reljikj - who won the tie despite the drawn final round as she landed more hits across the bout. It follows a controversial build-up to the Games for Jones. She was provisionally suspended for failing to provide a sample to testers before being cleared to compete after she was found to having committed a no-fault doping violation on confidential medical grounds.

