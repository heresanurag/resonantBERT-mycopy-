  Conditions in the River Seine have been a constant concern for Games organisers, with pollution leading to several familiarisation sessions being cancelled and the men's triathlon being delayed by a day. But they got some respite as the women's 10km marathon swim was cleared to take place as scheduled early on Thursday morning. The Netherlands' Sharon van Rouwendaal took gold after two hours of gruelling swimming, for her second Olympic title after winning at Rio 2016. Australia's Moesha Johnson came second with Italy's Ginevra Taddeucci in third, while GB's Leah Crisp finished 20th. Afterwards, Van Rouwendaal dedicated the victory to her pet dog Rio, who died in May and had been given his name because of her golden success eight years ago in Brazil. "My world stopped and I didn't care about swimming for three weeks. He was my little baby," she told the BBC. "I swam for him with my whole heart. I won it for him."

  Van Rouwendaal has a paw print tattoo on her wrist in honour of her late dog Rio
