content: |-
  Oasis Cardiff, which supports refugees and asylum seekers, says the truck was crucial to its work.

  This is the moment thieves targeted a charity which supports refugees and asylum seekers.

  Oasis Cardiff was left "devastated" after its truck was stolen from its garden, which was caught on CCTV.

  Two people wearing balaclavas can be seen on the charity's site at 01:00 BST on 5 April.

  The truck was used for delivering training and employment opportunities to refugees and asylum seekers and South Wales Police says its investigation is ongoing.
