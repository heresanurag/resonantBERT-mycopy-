  Without the ability to control gene expression, every cell in an organism would be identical, so microRNAs helped enable the evolution of complex life forms. Abnormal regulation by microRNAs can contribute to cancer and to some conditions, including congenital hearing loss and bone disorders. A severe example is DICER1 syndrome, which leads to cancer in a variety of tissues, and is caused by mutations that affect microRNAs.

  Prof Ambros, 70, works at the University of Massachusetts Medical School, and Prof Ruvkun, 72, is a professor at Harvard Medical School. Both conducted their research on the nematode worm - C. elegans. They experimented on a mutant form of the worm that failed to develop some cell types, and eventually homed in on tiny pieces of genetic material or microRNAs that were essential for the worms' development.
  • None A gene or genetic instruction is contained within our DNA
  • None Our cells make a copy, which is called messenger RNA or simply mRNA (you'll remember this from Covid vaccines)
  • None This travels out of the cell's nucleus and instructs the cell's protein-making factories to start making a specific protein
  • None But microRNAs get in the way by sticking to the messenger RNA and stop it working
  • None In essence the mircoRNA has prevented the gene from being expressed in the cell Further work showed this was not a process unique to worms, but was a core component of life on Earth. Prof Janosch Heller, from Dublin City University, said he was "delighted" to hear the prize had gone to Profs Ambros and Ruvkun. "Their pioneering work into gene regulation by microRNAs paved the way for groundbreaking research into novel therapies for devastating diseases such as epilepsy, but also opened our eyes to the wonderful machinery that is tightly controlling what is happening in our cells.”
