  The building, made famous by the BBC sitcom Open All Hours, is set to go under the hammer in October.

  BBC sitcom corner shop set to be auctioned off

  Ronnie Barker starred as Albert Arkwright in the BBC sitcom Open All Hours

  A South Yorkshire hairdressers better known as a corner shop in a hit BBC sitcom is set to go under the hammer. The property, in Lister Avenue, Balby, Doncaster, was used for external shots of Arkwright’s in Open All Hours, starring Ronnie Barker and Sir David Jason. In 2008, the building, which campaigners had previously saved from demolition, went up for auction but failed to meet its reserve price. It is now listed for bidding once again from 15 October, with a guide price of £150,000.

  The show, written by Roy Clarke, followed the money-making antics of Barker's miserly grocer Albert Arkwright. Running for 26 episodes between 1973 and 1985, Arkwright also acted as a reluctant father figure to his nephew and delivery boy, Granville, played by Jason.

  The building in Lister Avenue was used as a hairdressers for several decades

  Comedy legend Barker died in 2005, with the series revived as Still Open All Hours from 2013 to 2019 with Granville running the shop. Pugh Auctions said the property comprised a commercial unit which had been used as a hairdressers and two self-contained flats above. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
