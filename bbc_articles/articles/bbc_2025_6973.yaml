  Scores of Muslims in the town died when their mosques collapsed during Friday prayers at the end of Ramadan.

  Myanmar quake: Imam's grief for 170 killed as they prayed in Sagaing

  Soe Nay Oo was an imam in Myanmar but had been working for a human rights group in Thailand after fleeing the 2021 coup

  As the call to prayer rang out in Sagaing last Friday, hundreds of Muslims hurried to the five mosques in the city in central Myanmar. They were eager to hold their last Friday prayers for Ramadan, just days away from the festive period of Eid that would mark the end of the holy month. Then, at 12:51 local time (06:21 GMT), a deadly earthquake struck. Three mosques collapsed, including the biggest one, Myoma, killing almost everyone inside. Hundreds of kilometres away, the former imam of Myoma mosque, Soe Nay Oo, felt the quake in the Thai border town of Mae Sot. In the following days, he found out that around 170 of his relatives, friends and members of his former congregation had died, mostly in the mosques. Some were leading figures in the city's close-knit Muslim community. "I think about all the people who lost their lives, and the victims' children - some of them are young children," he told the BBC. "I can't hold back my tears when I talk about this." More than 2,700 people have died in the quake which happened near Sagaing and Mandalay, Myanmar's second city. The death toll is expected to rise as rescuers continue to pull out bodies from rubble.

  While the area was known for its ancient Buddhist temples, the cities were also home to a significant Muslim population. An estimated 500 Muslims died while praying in their mosques, according to figures given by the country's leader, Min Aung Hlaing, on Monday. Eyewitnesses in Sagaing have told the BBC that the road where the mosques were, Myoma Street, was the worst hit in the city. Many other houses on the street have also collapsed. Hundreds of people have sought shelter by the side of the road, either because they are now homeless, or are too afraid to go back to their homes in case there are aftershocks. Food supplies are reported to be scarce. In Myoma alone, more than 60 people were said to be crushed in the collapse, while scores more died in the Myodaw and Moekya mosques. More bodies were still being pulled out on Tuesday. There are indications that the worshippers had tried to escape, according to Soe Nay Oo, who has received multiple reports from surviving members of his community. He currently lives in the Thai city of Mae Sot with his wife and daughter, after escaping from Myanmar soon after a coup that took place in 2021. There were bodies found outside of the main prayer hall, he said, in the area where worshippers wash themselves. Some were also found clutching other people's hands, in what looked like attempts to pull them away from the crumbling building.

  Pictures sent to Soe Nay Oo show the Myoma mosque in complete ruins

  Among the many loved ones Soe Nay Oo lost was one of his wife's cousins. Her death, he said, was "the most painful thing that I have endured" in his 13 years as an imam. "She was the one who showed her love to us the most," said Soe Nay Oo. "Everyone in the family loved her. The loss is unbearable for us." Another of his wife's cousins, a well-respected businessman who had performed the Islamic pilgrimage to Mecca, also died. "He always called me Nyi Lay ['little brother' in Burmese]...When I married my wife, he said we are family now and he always treated me like his own little brother," said Soe Nay Oo. "He was always there for us whenever we needed him. I have lost those whom I love like brothers like him." Some of the close friends who died include Soe Nay Oo's former assistant imam, whom he remembered for his strong work ethic and remarkable talent in reciting the Quran. The principal of the local public school, who was also the only female trustee of the Myoma mosque, also died. She was remembered by Soe Nay Oo as a generous soul who would often pay for mosque programmes out of her own pocket. He said every time he hears of yet another person from the community who died, he experiences a new wave of grief. "I feel devastated... it always comes to my mind, the memories I cherish of them. "Even though they were not close relatives, they were the ones who always welcomed me, followed my prayers, and who prayed together." The fact that they died during Ramadan is not lost on him. "All the departed have returned to Allah's home, I would say. They will be remembered as martyrs accordingly," he said.

  Other buildings in Sagaing, including this fire station, have also collapsed

  Like other parts of Myanmar affected by the quake, the community is struggling to deal with the sheer number of bodies. It has been complicated by ongoing fighting between the military junta and resistance groups. The Muslim cemetery in Sagaing is close to an area controlled by the rebel People's Defence Forces (PDF), and has been closed to the public for several years. The military has continued to bomb some parts of the wider Sagaing region following the quake. Sagaing city's Muslim community has had to move the bodies of their dead to Mandalay, crossing the Irrawaddy River using the sole bridge connecting the two cities, according to Soe Nay Oo. Their bodies are being left at Mandalay's biggest mosque for burial. Some have not been buried within 24 hours of their death per Islamic tradition. "For Muslims, it is the saddest thing, that we cannot bury our families by ourselves at the end of their journey," he said. The survivors have been trying to help in the rescue, even as they cope with the trauma. "Some from my community told me to pray for them. To be honest, they couldn't even describe their loss in words when I speak to them." It is hard for Soe Nay Oo to be far from his former congregation. Like many other people from Myanmar who have migrated abroad, he feels survivor's guilt. "If I were the imam still, at the time of the quake, I would have gone with them – that I can accept peacefully. If not, at least I could be on the ground to do anything that I can. "Now I can't go back. It's painful to think about it. Soe Nay Oo began to sob. "This sad and frustrated feeling I have right now, I have never felt this way before in my life. I am the kind of man who would hardly cry. He adds that he has not been able to sleep for days. His worry has been magnified by the fact he has yet to hear from some family members, including his own siblings who were in Mandalay. Soe Nay Oo has paused his work for a human rights group in Thailand and is currently helping to coordinate rescue efforts in Sagaing - sharing any information he can get from his contacts in the city. At least 1,000 Muslims in the area have been affected who still need assistance, he estimates. "I feel relief only whenever somebody on the ground asks for help, and I can help them."
