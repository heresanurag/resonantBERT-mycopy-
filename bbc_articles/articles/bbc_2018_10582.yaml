  A look at the biggest headlines from Apple's event in California.

  Apple has updated its iPhone X handset with three more powerful models.

  The new XS Max will become the most expensive handset Apple has sold to date, with its price ranging from $1,099 to $1,449 depending on the size of the internal storage.
