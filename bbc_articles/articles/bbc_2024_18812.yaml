content: |-
  The actual number of people killed in the war is likely to be higher, local officials say.

  More than 40,000 killed in Gaza, Hamas-run health ministry says

  The Hamas-run health ministry says most of those killed who have been identified are woman, children and elderly people

  More than 40,000 Palestinians have been killed as a result of Israeli military action in Gaza since the 7 October Hamas-led attack on Israel, the Hamas-run health ministry says. That number - 40,005 on Thursday - equates to about 1.7% of the 2.3 million population of the territory - another sobering indication of the human cost of the war. Alongside the fatalities, satellite image analysis suggests nearly 60% of buildings in Gaza have been damaged or destroyed since the beginning of the war. In the past few months, the southern city of Rafah has suffered the most damage, imagery shows. The ministry’s figures for the number of people killed do not differentiate between civilians and fighters.

  However, its breakdown of identified reported fatalities says a majority are children, women or elderly people. This month, Israel’s military told the BBC that more than 15,000 terrorists had been killed during the war. International journalists, including the BBC, are blocked by Israel from entering Gaza independently, so are unable to verify figures from either side. In the past, figures from the Gaza Ministry of Health (MoH) were widely used in times of conflict and seen as reliable by the UN and international institutions. It only counted deaths registered in hospitals with these entered in a centralised system along with names, identity numbers and other details. However, by late last year the MoH was unable to function effectively with overflowing mortuaries, fighting in and around hospitals and poor internet and phone connectivity. The Hamas Government Media Office (GMO) in Gaza began publishing numbers of deaths including reports given in “reliable media”. UN agencies started to incorporate this into their data breakdowns as well as MoH figures when updates were available. More recently, Gaza’s MoH has begun to incorporate those reported as killed in the war including by family members online in its overall tally. However, it also counts separately the number of unidentified bodies among the total number killed. The UN now quotes these figures, with officials attributing them and stressing that their Gaza teams cannot independently verify them due to the conditions on the ground and the high volume of fatalities. Israel has consistently questioned the credibility of the information. In May, the Foreign Minister Israel Katz described it as “fake data from a terrorist organisation”. Several experts have said the actual number of people killed as a direct result of the war in Gaza is likely to be far higher, with local officials estimating that about 10,000 bodies remain under the rubble of buildings hit by Israeli air strikes. Ali Ashraf Ata Gheith, 15, told the BBC he spent two months digging his dead family from the wreckage of their bombed-out home. His mother, father, brother and two sisters were killed when it was hit by a strike. Ali was in the building too, but survived after being trapped under the rubble for seven hours. After he got out, he began trying to retrieve the bodies of his family. “I could see my father under the rubble but I couldn’t extract him at first because he was under two columns of cement, and the ceiling would have collapsed. He decomposed in front of my eyes,” he said. Even with a halt in fighting, researchers point out that in addition to the number of people killed as a direct result of the war, many more could die from indirect causes, such as disease and hunger. Ultimately when the war ends, efforts to recover bodies and trace the missing should allow a clearer idea to emerge of the number killed, including a figure for combatants. The UN and rights groups, as well as the Israeli military, can be expected to carry out their own investigations.

  The majority of the destruction in the southern city of Rafah came after Israel launched an offensive there in early May

  Satellite image analysis suggests that around 59.3% of buildings in Gaza have been damaged or destroyed since the beginning of the war. The damage analysis, carried out by Corey Scher of City University of New York and Jamon Van Den Hoek of Oregon State University, compares images to reveal sudden changes in the height or structure of buildings. The southern city of Rafah has sustained the highest rise in damaged buildings since March, according to the expert analysis. The majority of the destruction came after Israel launched an offensive on the city on 6 May. The military says that taking control of the area and eliminating the remaining Hamas battalions is crucial to achieving its war aims. In satellite imagery analysed by BBC Verify, large swathes of the city can be seen to be left in ruins - particularly around the border with Egypt and neighbourhoods to the north and south. Social media videos verified by the BBC and footage shared by Israel’s military shows that areas across Rafah have been damaged or destroyed by aerial bombardment as well as demolition by Israeli forces on the ground. In the image below we see a large section of cleared buildings immediately adjacent to the border.

  Satellite imagery shows land has been cleared along the so-called Philadelphi corridor – a buffer zone along the 14km (9-mile) border with Egypt. BBC Verify’s analysis of the imagery showed Israeli military vehicles in several areas where building clearance had taken place along the corridor. This includes a small neighbourhood located where the border meets the coast which was flattened within a month of the Rafah operation starting. On the ground footage filmed by an Israeli soldier also showed that an observation tower was later built in the area. The operation has also destroyed key Rafah landmarks which includes the border crossing, several major mosques and the city's main market. On 7 May, videos verified by the BBC showed Israeli tanks crushing a "Welcome to Gaza" sign at the Rafah border crossing. Video posted on the same date also showed damage to the blue dome of the Abrar mosque. Satellite imagery captured subsequently showed the building was later destroyed. In another social media video shared on 27 June, roads and green lawns that once centred around Rafah’s famous Al-Najma roundabout were now churned up, with nearby buildings heavily damaged. The war began when thousands of Hamas fighters stormed into southern Israel on 7 October, killing about 1,200 people and seizing 251 hostages, according to Israeli tallies.
