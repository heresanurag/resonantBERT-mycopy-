title: Harvey Willgoose a best friend to all, say stabbed teen's family - BBC News
date: '2025-02-04'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cqx9lr2z0ldo
content: |-
  The family of Harvey Willgoose, 15, say they are "utterly heartbroken" over his fatal stabbing.

  Stabbed schoolboy a best friend to all, say family

  Harvey Willgoose's family said their lives would "never be the same again"

  The "utterly heartbroken" family of a 15-year-old boy who was fatally stabbed at a Sheffield school on Monday have described him as a "best friend to all". Harvey Willgoose died after he was attacked at All Saints Catholic High School on Granville Road on Monday. In a statement issued through South Yorkshire Police, Harvey's family said: "Our lives are devastated and will never be the same again." A 15-year-old boy who was arrested on Monday on suspicion of murder remained in custody, officers said.

  Harvey's family said: "We have lost a beloved son, brother, grandson, cousin, nephew and, most importantly, a best friend to all." "Harvey will be forever known for being a caring, loving and funny young man. "At this difficult time, we ask you to please respect our privacy as we grieve as a family." A small police scene remained in place at the school on Tuesday as the investigation into the incident continued.

  All Saints Catholic High School was closed on Tuesday, with a police scene remaining in place

  Assistant Ch Con Lindsey Butterfield said: "Our thoughts remain with Harvey's family, friends and loved ones, as well as the wider school community as they come to terms with his loss. "Our investigation into Harvey's death is continuing at pace and, with this in mind, I would urge people to avoid unhelpful online speculation and identifying anyone who they believe to be involved in this tragic incident." The CEO of the academy trust which runs All Saints School described Harvey as an "immensely popular young man with his fellow students and teachers alike". Steve Davies said: "He had a smile that would light up the room. Harvey was young. He was precious. He was loved. "We are all struggling to process what has happened and our thoughts and prayers are with Harvey's family and friends at this incredibly difficult time."

  Relatives described Harvey as a "best friend to all"

  Mr Davies added: "Whilst there are no words that will take away the pain and grief from Harvey's family and friends, I simply want to express, on behalf of the whole school community, our heartfelt condolences." Harvey's family visited the school on Tuesday afternoon, where flowers, balloons and cards have been left in tribute. The Right Reverend Ralph Heskett, Bishop of Hallam, said a mass would be held for Harvey at St Joseph's Catholic Church in Handsworth on Saturday. "Our prayers, and those of every parish and school, are with Harvey, his parents, family, and friends for a young life lost and all those affected by this tragedy," he added. Sheffield United, the football team Harvey supported, said fans had approached the club to ask about holding a tribute to him at an upcoming game. A club spokesperson said: "We share the shock and distress of the community following this tragic incident and appreciate that discussions are underway with regards to tributes to remember Harvey." Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
