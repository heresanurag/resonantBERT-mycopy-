  This week has revealed much about Trump's ambition but also hinted at tests and headaches that may lie ahead.

  United by loyalty, Trump's new team have competing agendas

  If personnel really does amount to policy, then we’ve learned a lot this week about how Donald Trump intends to govern in his second term. More than a dozen major appointments, some of which will require Senate approval, offer a clearer picture of the team entrusted to drive his agenda as he returns to the White House. On the outside they appear united by one thing - loyalty to the top man. But beneath the surface, there are competing agendas. Here are four factions that reveal both Trump’s ambition and potential tricky tests ahead for his leadership.

  Their agenda: This trio have been among the most vocal politicians actively opposing US policies, particularly under President Biden. Choosing Gaetz as his attorney general nominee is possibly Trump’s most controversial pick. Gaetz has represented Florida's first congressional district since 2017. A graduate of William and Mary Law School, he led the removal of California congressman Kevin McCarthy as the sitting Speaker of the House in October 2023. He has come under investigation by a House ethics committee for allegedly paying for sex with an underage girl, using illegal drugs and misusing campaign funds. He denies wrongdoing and no criminal charges have been filed.
  • None Five takeaways from Trump's first week Tulsi Gabbard, picked to be Trump’s director of national intelligence, is a military veteran who served with a medical unit in Iraq. She is a former Democratic congresswoman from Hawaii who switched parties to support Trump. Gabbard has routinely opposed American foreign policy, blaming Nato for Russia’s invasion of Ukraine and meeting Syrian President Bashar al-Assad – then casting doubt on US intelligence assessments blaming Assad for using chemical weapons. Robert F Kennedy Jr, Trump’s nominee to oversee health, is a longtime lawyer and environmentalist. He also spread fringe theories – about vaccines and the effects of 5G phone signals.

