title: 'Hurricane Helene: Political row erupts overs disaster relief - BBC News'
date: '2024-10-05'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c5y3qgqxpwno
content: |-
  A month from the election, misinformation is spreading as Republicans try to tie spending on the storm with immigration.

  A political row has erupted after Donald Trump claimed Americans hit hard by Hurricane Helene were losing out on emergency relief money because it had been spent on migrants. The White House swiftly rebutted the claims and accused Republicans of spreading "bold-faced lies" about funding for the disaster response. On Wednesday US Homeland Security Secretary Alejandro Mayorkas had said the Federal Emergency Management Agency (Fema), which he oversees, was short on cash for the rest of hurricane season. Trump and his allies expressed outrage that the agency had spent over $640m (£487m) on housing migrants.

  But officials pointed out that this funding, authorised by Congress, was part of an entirely different programme run by Fema unconnected to disaster relief. With less than a month to go before the White House election, Trump and the Democratic nominee Kamala Harris are neck and neck in the handful of swing states, such as storm-hit North Carolina and Georgia, that will decide the vote. The deadliest mainland US hurricane since Katrina in 2005, Helene tore through the south-east last week, claiming at least 225 lives and leaving hundreds more missing. Both Trump and Vice-President Harris have made trips to some of the affected states. Republicans have attempted to link the disaster relief effort to immigration - an issue seen as a strength for Trump - but have spread misinformation about how government money is used. At an event in Evans, Georgia, on Friday, Trump said, without evidence, that: "A lot of the money that was supposed to go to Georgia and supposed to go to North Carolina and all of the others is going and has gone already. "It's been gone for people that came into the country illegally, and nobody has ever seen anything like that. That's a shame." Fema did receive a budget from Congress - $640m in the last fiscal year - to provide housing to immigrants applying for US citizenship.

