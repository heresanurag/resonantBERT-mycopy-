  But the cash came via a federal immigration agency, Customs and Border Protection. It was spent through Fema's Shelter and Services Program (SSP) and is a separate pot of money to the agency's Disaster Relief Fund of nearly $20bn, which is used to respond to hurricanes and other natural disasters. Fema's disaster relief budget for the year expired at the end of September and the agency is currently running on temporary funding while Congress negotiates a new annual budget. The agency has responded to Trump's claim with a dedicated fact-check page, external, and a statement from the Department of Homeland Security. “This is false," Fema said in a statement. "No money is being diverted from disaster response needs.” So far, more than $45m has been given to communities affected by Hurricane Helene, said the agency. Fema has also shipped over 11.5m meals and 12.6m litres of water in the aftermath of Helene, said Vice-President Harris on Friday, adding that more than 5,600 federal personnel were on the ground. But Trump's son, Donald Trump Jr, posted on X, formerly Twitter, on Thursday that it was "madness" for billions of dollars in foreign aid to be sent to Ukraine, instead of to American citizens who had lost everything in the storm. Meanwhile, critics of Trump have pointed out that when he was president back in 2019, $155m was transferred from Fema's operating budget to fund deportations of migrants to Mexico.
