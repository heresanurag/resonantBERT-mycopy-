  Bukayo Saka is your highest-rated player as England beat the Czech Republic to finish top of Group D at Euro 2020.

  Last updated on .From the section European Championship

  Bukayo Saka delivered a superb display for England as they beat the Czech Republic to finish top of Group D at Euro 2020.

  In only his sixth appearance for the Three Lions, the 19-year-old Arsenal winger outshone the more experienced players on the pitch.

  It was enough for him to earn your highest rating in our Player Rater with 7.74.

  The only other player with a rating above seven was Jack Grealish, who scored 7.44 after setting up the only goal of the game for Raheem Sterling.

