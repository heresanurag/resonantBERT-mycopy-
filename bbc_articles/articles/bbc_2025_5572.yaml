title: 'Kyle Clifford trial: Crossbow murderer found guilty of raping ex - BBC News'
date: '2025-03-06'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cr52r7ndjl6o
content: |-
  A judge tells Kyle Clifford his crimes were "dreadful" and "almost unspeakable".

  Kyle Clifford, who is paralysed from the chest down after shooting himself with the crossbow, did not attend court

  A man has been found guilty of raping his ex-girlfriend in an attack in which he murdered her and her sister with a crossbow and their mother with a knife. Louise Hunt, 25, and Hannah Hunt, 28, suffered fatal crossbow bolt injuries at the family home in Bushey, Hertfordshire, in July 2024, while Carol Hunt was stabbed to death. Kyle Clifford, 26, of Enfield, north London, admitted the murders but denied raping Louise, but a jury convicted him at Cambridge Crown Court. Judge Mr Justice Bennathan said Clifford's crimes were "dreadful" and "almost unspeakable".

  The lead detective in the case said he did not think "this is the case of a spurned lover in any way".

  Warning: This article contains details that some people may find distressing

  Louise (left), Hannah and Carol Hunt were killed during an attack that spanned over four hours

  Louise had ended the relationship with Clifford two weeks earlier, and told him in a message, "Take care of yourself". "He simply couldn't deal with what he perceived to be a dent to his pride," said Det Ch Insp Nick Gardner. "He then sought to control the situation, in terms of weapons purchases; the cold, calculating way in which he lay in wait in the house for [Louise]." The women were the wife and daughters of BBC horse racing commentator John Hunt.

  John Hunt, pictured with Carol, had not been at home on the day of the attacks

  The trial heard that in the days leading up to the murders, Clifford bought a crossbow online, and a replica Glock air pistol from a shop in Essex. Prosecutors also said "violent misogyny" promoted by social media influencer Andrew Tate "fuelled" his attacks. He searched for Tate's podcast less than 24 hours before the murders. However, the defence argued this material had too vague a link and was far too prejudicial. The judge agreed it was of limited relevance and of "great possible prejudice", and that it should not be put before the jury.

  Prosecutors said he arrived at the family home at 14:32 BST on 9 July, under the guise of dropping off Louise's belongings, before stabbing Carol, 61. Screams and banging sounds were heard from the property. Clifford attacked Louise, a dog groomer who had been working in a pod in the garden, as she entered the home at 16:13, before taping her ankles and wrists - and eventually raping her - in a horrific onslaught that lasted nearly three hours. The former soldier stopped during the attack to send a text message to Louise's father using her phone, asking him, "What time are you home?" After Hannah arrived her and Clifford shouted and swore at each other. She then managed to message her partner to state "he's tying us up", in the minutes before she was also fatally shot.

  Clifford fled the scene and was arrested by firearms officers in a cemetery near his Enfield home the following afternoon - but only after he had shot himself in the chest, paralysing him. He later told police "sorry" and "what I have done is atrocious". He was finally deemed fit to be interviewed by police on 16 September and on 22 January, he pleaded guilty to the murders. His rape trial - which lasted only three days this week - heard he searched "horse racing today" on the day of the killings to check whether their father was working. Jurors were also told he hid his relationships with other women from Louise while they were dating, and was signed up to dating apps Hinge and Bumble.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV showed the former soldier at the gym on the day of the triple murder

  Applause and cries of "Yes!" could be heard in the public gallery when the jury returned its unanimous verdict after less than an hour of deliberations. One woman pumped her fists and another wept. Lisa Kiff, a senior Crown prosecutor, said: "His crimes are among the very worst I have encountered in my career." Det Ch Insp Gardner said he did not know why Clifford contested the rape charge. "He knew the game was up. I have no idea why he failed to plead. The jury saw through his lies." Clifford is due to be sentenced on Tuesday. After the murders in July, Mr Hunt confided in his ITV colleague Matt Chapman, and said "make the most of every day". He later said every message of support he had received was "like a hug".

