title: 'As it happened: Nadhim Zahawi and Jeremy Hunt out as Rishi Sunak tops first
  round of Tory contest - BBC News'
date: '2022-07-13'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-62144706
content: |-
  The ex-chancellor leads the first ballot of the Tory leadership race - as Nadhim Zahawi and Jeremy Hunt are knocked out.

  Leadership contenders have been out in force looking to shore up their support ahead of the first round vote - and now six will proceed to Thursday's second ballot. Here are some of the key quotes of the day:

  Quote Message: We will cut taxes and we will do it responsibly. That's my economic approach. I would describe it as common-sense Thatcherism. I believe that's what she would have done." from Rishi Sunak We will cut taxes and we will do it responsibly. That's my economic approach. I would describe it as common-sense Thatcherism. I believe that's what she would have done."

  Quote Message: A gentle word of advice to the remaining candidates: smears & attacks may bring short term tactical gain but always backfire long term. The nation is watching & they've had enough of our drama; be the broad church & unbeatable, election winning machine that our country deserves." from Jeremy Hunt A gentle word of advice to the remaining candidates: smears & attacks may bring short term tactical gain but always backfire long term. The nation is watching & they've had enough of our drama; be the broad church & unbeatable, election winning machine that our country deserves."

  Quote Message: This is not about petty politics, this is not some sort of a game. This isn't just some sort of knife fight in a phone box. This is a battle of ideas that is actually going to determine the future of our country." from Tom Tugendhat This is not about petty politics, this is not some sort of a game. This isn't just some sort of knife fight in a phone box. This is a battle of ideas that is actually going to determine the future of our country."

  Quote Message: Now is the time for colleagues to unite behind the candidate who will cut taxes, deliver the real economic change we need from day one and ensure Putin loses in Ukraine." from Spokeswoman for Liz Truss Now is the time for colleagues to unite behind the candidate who will cut taxes, deliver the real economic change we need from day one and ensure Putin loses in Ukraine."

  Quote Message: I don't intend to make any further intervention, but I wish all the candidates in the leadership contest the very best of luck." from Nadhim Zawahi I don't intend to make any further intervention, but I wish all the candidates in the leadership contest the very best of luck."
