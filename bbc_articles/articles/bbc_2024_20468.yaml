  Kadeena Cox describes the 2024 Paralympics as "a nightmare I can't wake up from" after her crash in the final of her C4-5 500m time trial.

  Paralympics 'a nightmare I can't wake up from' - Cox

  Kadeena Cox qualified second fastest for her final but crashed on the first corner

  Kadeena Cox has described the 2024 Paralympics as "a nightmare I can't wake up from" after she crashed in the final of her C4-5 500m time trial. Cox won the event at the last two Games but struggled out of the blocks in the final before slipping and crashing on the first corner. It has been a tough year for the 33-year-old, who has been unable to compete in athletics as she has in previous Games due to a calf injury, while also struggling with multiple sclerosis and an eating disorder. "The last two Paralympics I've woken up laid next to a medal grateful it wasn't a dream! Today feels like a nightmare I can't wake up from," Cox wrote on Instagram, external. "It's hard to put into words how I feel. After everything I've battled to come back from this last year I thought this moment was going to make it worth it. All I thought about when I was pushing to try get the strength back to walk, let alone run/cycle. "Yesterday, I learned a hard lesson in that sometimes it just doesn't happen, whether you think you deserve it or not!"

  Cox is hoping to compete in the C1-5 team sprint for GB on Sunday after it was confirmed she did not sustain a major injury in the crash. She says she will now try to "salvage something from this Games" and add to her six Paralympic medals, which include four golds. "Sport can be cruel, MS can be cruel, living with an eating disorder can be cruel but I'm telling myself what I'd tell the riders on my academy - true strength is seen in how you bounce back against all adversity," she said. "In how you keeping showing up even when you want to hide away. And in how you pick yourself up, straighten your crown and fight to show the world what you're really capable of!" She added: "I'm sorry because I feel like I’ve let everyone down, especially those that have battled to piece me together this past few months, but hopefully I can salvage something from this Games."
