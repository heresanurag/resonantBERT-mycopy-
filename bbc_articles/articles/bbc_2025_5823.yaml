  But England, as the old adage goes, earned the right to play before exercising it well in the second half. Marcus Smith, who started the campaign as England's attacking talisman but began this match on the bench, was key. His defensive ability has been questioned, but his tackle on Matt Gallagher early in the second half as the Italy wing loomed out wide was impeccable in intent and execution. Two minutes later he picked his moment in attack perfectly too, timing his run off Tom Curry's shoulder to scamper in. A twin-moment, 10-point swing, that critical passage eased the pressure and allow England to loosen up their style. When Sleightholme dotted down his second it was via a party game of a passing move, with England's forwards improvising increasingly outlandish offloads. By then the Italy defence had faded. This was still streets behind the otherworldly handling France showed off in Dublin the day before. But it was a definite step up by England.

