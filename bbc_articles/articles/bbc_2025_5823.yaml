title: 'England 47-24 Italy: Hosts shine in Six Nations sun but Cardiff cauldron awaits
  - BBC Sport'
date: '2025-03-09'
section: England
url: http://www.bbc.co.uk/sport/rugby-union/articles/cdelgz3wgewo
content: |-
  England delivered the scoreline and style that fans craved, but they will face a stiff test to repeat that feat on the final day of the Six Nations.

  England shine in the sun but Cardiff cauldron awaits

  This video can not be played To play this video you need to enable JavaScript in your browser. England keep alive Six Nations title hopes with seven-try win

  Perhaps it was not quite sevens weather, but there was a definite post-season play-offs feel as the team buses rolled into the Twickenham car park. Supporters shed layers and donned shades as the sun shone on south-west London, and with a change of season in the air England needed to show a spring in their step. The standings demanded it. With a free-scoring France now making the pace at the top of the table, a bonus point would bolster England's - admittedly slim - chances of a title heist. More importantly though, the public required it. After the strength of the opposition, the situation of the game and the severity of the conditions had variously been blamed for England's inability to deliver running rugby, this was a day that invited ambition and invention. England's pre-match record against Italy was as pristine as the Twickenham turf, with 31 unanswered wins. When Ben Earl galloped clear on the final play to add a seventh try, pump the winning margin to 23 points and make it 32 straight successes, it felt like the hosts had lived up to the occasion. "We were trying to play a lot more," said Luke Cowan-Dickie after the 47-24 win. "We got seven tries so something went right. "We tried to attack from anywhere. We knew it was going to be risky, but we want to show the fans that we don't want to kick as much and play with the ball." Wing Ollie Sleightholme, who crossed twice for the hosts, added: "Us as players decided just to beat people, score more tries and be more aggressive with the ball." It was clear. England kicked 31 times, but carried 145 times. Against Scotland last time out, they kicked five times more and carried 67 times fewer. A remarkable shift, even allowing for the change in opposition. It isn't a tactic that comes naturally to England's coaching staff, whose Premiership triumph with Leicester in 2022 came via grindingly accurate percentage rugby and a barrage of kicks. And, even with the near-wholesale adoption of a Northampton backline which won the 2024 domestic crown in more style, England's attack took time to throw off the ring rust. A duff pass from Tommy Freeman drew the first groan from the stands inside 30 seconds. Earl was pounced on for a turnover shortly after. For much of the first half Italy snapped and fizzed with more danger, throwing cleverer shapes and more accurate passes.

