  The pluses are multiple for head coach Steve Borthwick. Fin Smith, with sharp shooting off the tee, put in another cool-headed performance at fly-half, pulling strings and making plays. Fraser Dingwall, forced into an unexpected centre combination by Ollie Lawrence's injury, was smart enough to find a way. Elliot Daly, the other half of that makeshift midfield, worked the angles superbly. The 32-year-old's abilities - grey matter as much as fast twitch - will age slowly and well. Ollie Chessum, Tom Curry and Earl ranged wide, far and effectively. Ben Curry and Chandler Cunningham-South added energy from the bench. Jamie George felt the love as the crowd took to their feet to clap him on and off the pitch on his 100th appearance for England. He and his front-row colleagues had the best of the set-piece once more. There will be tougher days and more stringent tests ahead. Cardiff, on the final day, will probably be one of them. Wales have stirred themselves under Matt Sherratt. The prospect of wrecking England's title pretensions while dodging the Wooden Spoon will brew up an almighty atmosphere under the Principality roof. The sunlight and support won't be nearly so plentiful next week. There won't be much of either for England in that city-centre cauldron. It will be a very different feel. England's challenge is to deliver a similar result - and hope France might wobble so the trophy tips unexpectedly their way.

