title: 'Winter fuel payment cut: ''I will miss out by £3'' - BBC News'
date: '2024-09-10'
section: Politics
url: http://www.bbc.co.uk/news/articles/ce80l2l4126o
content: |-
  Pensioners are missing out on winter fuel payments by as little as £3, with some saying they will have to continue working well into old age.

  'I will miss out on winter fuel payment by £3'

  Dawn Matthews will miss out on the winter fuel payment

  "I think I will be working until I die, because that payment meant I could pay the bills." Dawn Matthews, 68, from Hampshire, works from home for 18 hours a week in an administrative job for the NHS. Because of her income, she misses out on being eligible for the Government's pensioners' winter fuel payment by less than £3. She says the government's planned cuts will force her to “sit in the cold” of her home.

  "I had cancer and my immunity isn’t the same," she said. "Doctors have said what were mild illnesses before could kill me. "I am almost 69 and I have to continue to work literally just to live. I really wish I could retire - but I think I will be working until I die." She is just one of many pensioners who have told the BBC they are very worried about the scrapped payment. More than 9 million pensioners will lose out on the annual payment of between £200 and £300 a year under the proposals, which would see money only paid to those on low incomes who receive certain benefits. Prime Minister Sir Keir Starmer has stood by the proposals ahead of a vote on the policy in Parliament on Tuesday, which Labour is expected to win.

  Sandra, 66, from Durham said she had just £4 left in her account, and had to borrow money from her brother last month to pay the bills. She told the BBC she got through last winter by wearing a hat and scarf in doors, and using hot water bottles, warm beverages and extra bedding to keep the cold away. In the coming months, Sandra plans to visit public spaces to keep warm. "My local library is open a couple of days a week, so I'll go there. I don't have a lot to complain about, because I don't go hungry - but I'm sure some do." She said she feels the "vulnerable" are being punished by the cuts. "I pay tax already and have nothing left each month before the next state pension payment, which is my main source of income, " she said. "£215 every month goes towards council tax and energy bills. I don't drive, eat out, go on holiday or buy new clothes - I can't do anything extra." Labour has insisted that the cut - worth about £1.5bn - is necessary to fill an alleged £22bn "black hole" in the budget left by the previous Conservative government. The Conservatives say Labour is exaggerating the state of the public finances to lay the ground for tax rises in the October budget.

  Martin Hewgill, from Sussex, thinks the fuel payment should be better means tested

  The winter fuel payment was a universal benefit, meaning it was paid to all pensioners, regardless of their income or wealth. Martin Hewgill, 75, from Sussex, has been receiving his winter fuel payment for nine years, and says there are "much more deserving people" who need the money. "I receive a state and private pension, which I've been really privileged to have, but I haven't ever needed the winter fuel payment." He says it would be better spent on those narrowly missing out on it. "There must be tens of thousands of people who would have better use of this payment," he said. "I've had no financial problems since I've retired. I've never needed it. It just goes to show this hasn't properly been means tested."

  On Monday, Downing Street said there are no plans to give further mitigations to pensioners who have lost on out on the payment. As is stands, the government is planning to restrict winter fuel payments to only those pensioners who are receiving pension credit. The prime minister said he would "guarantee" the state pension increase would surpass any reduction in the winter fuel payment. According to the Office for National Statistics, the full state pension will go up by £460 a year. But the state pension increase will not rise come into effect until April, and the £460 will be spread over the following year. Winter fuel payments are usually made in November or December, leaving a five month gap for people who might be depending on the contribution.

  Denise Mardell says she's missing out on 'hundreds of pounds' because of the cut

  And some pensioners are losing out on being eligible for the payment by mere pounds. Denise Mardell, 70 from Nottinghamshire, narrowly misses out on the allowance, and says she will have to sell her car to make ends meet. "There’s no way I can afford to maintain it without this money," she said. "I’m relying on buses - I can luckily get to most places I need to go to. But it limits me so much more. "That £2 means I'm missing out on hundreds of pounds - I'm just over the threshold. It feels like I'm being punished for working hard."

  There has been speculation about a potential rebellion by some Labour MPs to the policy, with the vote on Tuesday signalling another early test of the prime minister's authority following Labour's general election win in July. Conservative leader Rishi Sunak accused ministers of trying to "fast-track cuts" to vital support for pensioners "to fund an inflation-busting pay rise for train drivers". Ahead of the vote, Chancellor Rachel Reeves addressed Labour MPs' concerns at a meeting of the Parliamentary Labour Party on Monday evening.
