content: |-
  The 20-year-old World Champion looks forward to competing in the 2024 Paris Olympic Games.

  From spectator in London to competitor in Paris

  Freya Colbert became World Champion in Doha in 2024

  A swimmer who watched the London 2012 Olympic Games with her family will be competing at Paris 2024. Freya Colbert from Grantham said she was just eight years old when she was first inspired to compete, and said it was finally "sinking in" that at 20 she would be part of Team GB. The former Kesteven and Grantham Girls’ School pupil will be competing for Team GB in the women's Freestyle and Medley events. “When I got the kit, with the Olympic rings and Lion on my chest, that’s when it really sunk in and I was like ‘wow, I’m really part of an Olympic team’,” she said.

  The World Champion was thrilled to become part of Team GB
  • None Paris 2024: How is France preparing for the Olympics and Paralympics Ms Colbert said 2024 had been her "breakthrough year", winning gold and silver medals at the World Championships in Doha, before being selected for Paris 2024. She said people had started to recognise her, receiving fan messages on social media and children telling her she was their "inspiration", which she described as "so emotional!" The swimmer's family will be joining her in Paris, which she said would be "an amazing almost-holiday" for them. Speaking about his daughter's achievements, dad Guy Cowhig said the family were "just all very proud" and "in awe" of her Olympic achievement. Meanwhile sister Molly Colbert couldn't believe how much her sister had achieved at her age. "I mean she’s 20 – she became world champion when she was 19!” she said.

