title: King Charles serves up a martini at Italian-themed dinner - BBC News
date: '2025-02-12'
section: General
url: http://www.bbc.co.uk/news/videos/cx2418xxjjvo
content: |-
  Stars including actor Stanley Tucci, David and Victoria Beckham, and Dame Helen Mirren were at the star-studded event.

  King Charles has taken part in a martini-making session alongside actor Stanley Tucci and Italian mixologist Alessandro Palazzi.

  It was during a star-studded Italian-themed dinner, held ahead of the King and Queen's state visit to Italy and the Vatican in early April.

  As well as actor Tucci, David and Victoria Beckham, Dame Helen Mirren and Donatella Versace were in attendance.
