title: 'Covid: Children missing school to protect family holidays - BBC News'
date: '2021-07-13'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57809611
content: |-
  One mum says "it's something we've got to do" because her children are looking forward to a holiday.

  Heddwen Williams does not want any of her three children to have to self-isolate ahead of a family holiday

  Parents are keeping their children off school so they can avoid self-isolating ahead of the summer holidays.

  Heddwen Lois Williams said "it's something we've got to do" before a family trip away.

  For the week ending 2 July, there were 8,393 unauthorised absences in Wales - up 1,000 on the previous week.

  Education Minister Jeremy Miles said children had lost a lot of school in the past year and it was important they attended.

  However, for the week ending 2 July, 84.2% of pupils were in the classroom - the lowest rate since the return after Easter holidays.

  Heddwen, 37, said she had no choice but to keep Seren, Deian and Owain Iago off school in Caernarfon, Gwynedd.

  Instead of being in lessons, they have been playing football in their grandparents' garden.

