  Heddwen said: "I know my husband and I still have to go to work, but then we decided that we don't really have to send the children to school, so we've decided to keep them away for the last week."

  Seren is in Year 7 - the first year of secondary school - while Deian and Owain Iago are in Year 3 and reception, respectively.

  As her children are young, Heddwen is not too worried about whether it could affect their education.

  "I'll be honest - it's the last week before the summer and I know everybody is starting to wind down. So no, because of the timing, I'm not feeling guilty about them losing anything," she added.

  "I think it's been a hard year for everyone and I think it's something we've got to do, because the children are really looking forward to a nice family break. That's the decision we've done and we're happy with that decision."

  The children's grandparents are looking after them ahead of a staycation next week and Heddwen said she knows of others taking similar steps.

  "Some other parents have tried to reduce the risk by not taking them on the school bus, for example, just to get those bubbles down."

  The children will not miss out on too much school, says mum Heddwen

  Figures released on Thursday showed 549 cases in the preceding week were linked to schools - almost a fifth of all new Covid-19 cases in Wales.

  Positive cases in schools have led to thousands of children having to self-isolate.

  At one point two weeks ago, all remaining pupils at Rhyl High School in Denbighshire were in isolation.

  While fines may be issued for unauthorised school absences, Welsh government guidance says: "Punitive measures, including fines, would not be appropriate measures to take unless authorities deem it necessary to pursue a small number of cases relating to persistent absence, which are unrelated to the Covid-19 pandemic."

  Mr Miles told BBC Radio Cymru's Dros Frecwast school was where children got "the best education and support".

  He added: "I want to make sure that they have the opportunity to be in school to be able to build on what is needed after the last year."

  A Welsh government spokesman said: "We'll continue to work together to take further steps to make sure education continues for all children and young people, with as little disruption as possible."
