  In his first interview in January 2022, Khalife told police he had an ambition to work in military intelligence or for an elite signals unit. He said he had been informed by an officer that his ancestry meant he was unlikely to qualify for the high-level security vetting - called "developed vetting" - that would allow him to work in sensitive roles. "After this I decided to start my own intel operation to prove that I was able to do this," he wrote in an electronic note in 2021. Khalife told the jury that he escaped because he was being held on the vulnerable prisoners unit where most inmates are sex offenders, and because he had been warned that "terrorists" in Wandsworth prison would try to attack him. He said he believed that if he escaped he would be put in the high security unit at Belmarsh prison. After the escape, an audit found 81 security failings at the prison. It also resulted in "long overdue" upgrades being made to CCTV cameras which had not worked for more than a year, the prison's Independent Monitoring Board said. It emerged that on the day of Khalife's escape, nearly 40% of prison officers did not turn up for their shift at Wandsworth prison. However, the Ministry of Justice insisted the prison had been adequately staffed. After Monday's sentencing, security minister Dan Jarvis said the case showed the government "will use the full range of appropriate tools and powers available" to disrupt the activity of "individuals who pose a threat to our national security."
