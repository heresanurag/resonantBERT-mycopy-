  Airline Tui has apologised to its customers for flight and baggage delays.

  The operator said a "sudden increase" in visitor numbers combined with "operational and supply chain issues" had affected a small number of flights.

  A spokeswoman said May half-term holidays were "always incredibly busy" but added it was the "first peak period in more than two years" that was not impacted by Covid restrictions.

  Manchester Airport has previously blamed staff shortages and a post-pandemic spike in demand for recent travel chaos.

  It said it was aware of challenges being faced by a number of airlines and handling agents which had led to delays in check-in and baggage reclaim for some passengers.

