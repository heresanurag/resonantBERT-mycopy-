title: 'Kenya: Moment helicopter lifts lorry driver from flash flooding - BBC News'
date: '2023-05-05'
section: General
url: http://www.bbc.co.uk/news/world-africa-65505715
content: |-
  Flash flooding surrounded a lorry driver who was crossing the Gulana-Kulalu causeway in Kenya.

  A lorry driver crossing the Gulana-Lulalu causeway in Kenya was surrounded by sudden flood waters.

  The alarm was raised by worried onlookers, but thankfully the aerial unit of a local wildlife charity were on hand to save the day.

  The Sheldrick Wildlife Trust flew their helicopter over the rushing water and managed to save the driver.
