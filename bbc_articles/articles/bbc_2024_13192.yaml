content: |-
  The princess is being treated for a minor head injury and concussion thought to have been caused by a horse.

  Princess Anne is 'fine', husband says after hospital visit

  The Princess Royal is "fine", her husband has said, after she sustained a minor head injury and concussion thought to have been caused by a horse. Vice Admiral Sir Tim Laurence visited Princess Anne, 73, at Southmead Hospital, Bristol, for two hours on Tuesday. As he left the main entrance of Southmead Hospital, Bristol, at about 14:00, he said: "She's doing fine, slow but sure." It is the second day in hospital for the princess, after she was admitted on Sunday following an accident on her Gloucestershire estate.

  Asked if he had taken anything for the princess, Sir Tim said: "Just a few little treats from home." When asked about Princess Anne's recovery by a well-wisher, Sir Tim replied: "She is recovering well, thank you. "We are both profoundly grateful to the medical team and hospital support staff for their expert care - and to the emergency services who were all so wonderful at the scene. "We are both deeply touched by all the kind messages we have received from so many people near and far. It means a great deal." Princess Anne is expected to make a full recovery but she will miss the state banquet with the Emperor and Empress of Japan later and her trip to Canada this week has been postponed. The King has sent "his fondest love and well-wishes" to the princess "for a speedy recovery", while Prime Minister Rishi Sunak and Labour leader Sir Keir Starmer have also sent their best wishes. The Princess Royal was injured on Sunday evening when she was out walking on her estate and horses were nearby. It is understood the princess has not been able to recall the details of what happened on Sunday evening due to her concussion.

