  Her medical team suggested her head injury is consistent with the type of impact from a horse's legs or head. Emergency services were called to the estate and the princess was taken to hospital. Her husband Admiral Sir Tim Laurence and her daughter Zara and son Peter were on the estate at the time. The princess is conscious and is expected to stay in hospital until later this week "as a precautionary measure for observation", a Buckingham Palace statement said on Monday. Southmead is an NHS hospital, part of the North Bristol NHS Trust, and has a number of major specialities, including neuroscience.

  A Buckingham Palace spokesman said: "Her Royal Highness is recovering well, is in a comfortable condition and is being kept in hospital as a precautionary measure for further observation." The spokesman added: "On doctors' advice, Her Royal Highness's engagements for the week ahead will be postponed. Her Royal Highness sends her apologies to any who may be inconvenienced or disappointed as a result." According to the NHS, concussion can be the result of a "temporary injury to the brain caused by a bump, blow or jolt". It can cause forgetfulness, tiredness and a lack of concentration and can take a couple of weeks before a full recovery. This week, the princess had a series of events planned, including the Japanese state visit, with other engagements scheduled in Scotland, Hampshire and Gloucestershire. The hospitalisation of Princess Anne is the latest health problem facing the Royal Family. King Charles and the Princess of Wales both have had a cancer diagnosis this year, limiting their public engagements. Meanwhile, Emperor Naruhito and Empress Masako of Japan have begun a three-day state visit to the UK. They received a ceremonial welcome and a carriage ride up the Mall, with a state banquet being hosted later by King Charles III at Buckingham Palace. But because of the general-election campaign, the Japanese royal couple will not make a trip to Downing Street.

