date: '2025-05-05'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/czx19pz3x53o
content: |-
  Donald Rose, of Ilkeston, Derbyshire, was filmed meeting war history enthusiast Al Murray.

  Donald Rose at the VE Day party with comedian Al Murray and the Mayor of Erewash, Kate Fennelly

  The UK's oldest surviving World War Two veteran will be part of a special hour-long episode of The One Show to celebrate the 80th anniversary of VE Day. War hero Donald Rose, who turned 110 on Christmas Eve, enjoyed a wartime-themed party at the care home where he lives in Ilkeston, Derbyshire. Mr Rose - a recipient of France's highest award - the French Legion of Honour - was filmed meeting comedian and war history enthusiast Al Murray ahead of the show's VE Day 80 Special on BBC One on Monday at 18:30 BST. Veterans charity The Not Forgotten, external helped organise the party for Mr Rose – who survived a bullet to the leg during the D-Day Landings.

  Mr Rose joined the Queen's Royal Regiment at the age of 25 and went on to train as a sniper

  One of the charity's officials described him as "incredible". A retired colonel from his old regiment made an emotional presentation of a new beret with a replacement cap badge, as Mr Rose's original had been lost. Mr Rose, originally from Westcott, Surrey, even made it to his feet to salute, Erewash Borough Council said. Swingtime Sweethearts, who perform songs from the 1940s, serenaded Mr Rose at the afternoon tea concert. Mr Rose joined the Queen's Royal Regiment at the age of 25 and went on to train as a sniper. He served in North Africa and Europe and puts his longevity down to salty water he had to drink during his time as a Desert Rat King Charles will oversee the Victory in Europe (VE Day) events, which span four days, and include a flypast over Buckingham Palace featuring 23 current and historic military aircraft.

