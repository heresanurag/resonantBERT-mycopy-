content: |-
  Man City make Bruno Guimaraes contact, Liverpool want Bayern's Jamal Musiala, Arsenal line up Brahim Diaz move, plus more.

  Last updated on .From the section Gossip

  Manchester City have made contact over a potential move for Newcastle United's Brazil midfielder Bruno Guimaraes, 26. (AS - in Spanish)

  Liverpool are keen to make a deal for Germany midfielder Jamal Musiala, with Bayern Munich setting an asking price of £100m for the 21-year-old. (Football Insider)

  Liverpool are also being linked with a potential summer move for Eintracht Frankfurt's Egypt forward Omar Marmoush, 25. (Bild, via FourFourTwo)

  Arsenal are lining up a deal for Real Madrid midfielder Brahim Diaz and are prepared to pay up to £60m for the 24-year-old, who has recently committed his international future to Morocco. (Football365)

  Chelsea are interested in Lille's 18-year-old French centre-back Leny Yoro, who is also on the radar of Paris-St-Germain and Real Madrid. (Standard)

  Manchester City have agreed a summer deal to sign 19-year-old Brazilian winger Savio, who is on loan at Girona from another of City's sister clubs, Troyes. (Football Insider)

  Brentford and Aston Villa are both keeping tabs on Bologna's Scotland midfielder Lewis Ferguson, 24. (TeamTalk)

  Can you name the Premier League player? Try naming this current or former footballer from these clues

  Fulham are preparing a new contract offer for English defender Tosin Adarabioyo, 26. (Mail)

  Leeds United are ready to listen to offers for 27-year-old English winger Jack Harrison, who has spent the season on loan at Everton. (Football Insider)

  Jurgen Klopp could yet land the job managing Germany's national team as they are prepared to make a concession for the outgoing Liverpool boss. (Football Transfers)

  The uncertainty over Erik ten Hag's future as Manchester United manager has left his coaching staff in limbo. (Mail)

  Manchester United want £40m to £50m for England winger Jadon Sancho, who is on loan at Borussia Dortmund, if they sell the 23-year-old in the summer. (Football Insider)

  Manchester United will be hit with a £10m penalty each season they fail to qualify for the Champions League under the terms of their new £90m-a-year kit deal with Adidas. (Times)

  Reading are in advanced talks with a North American company to buy the club. (Sky Sports)

  Wolves are closing in on a deal to sign 16-year-old English Rochdale midfielder Matheus Mane for their academy. (Fabrizio Romano)

  Napoli are set to meet with winger Khvicha Kvaratskhelia's camp in the summer to discuss an improved contract for the 23-year-old Georgia winger. (Calciomercato - in Italian)
