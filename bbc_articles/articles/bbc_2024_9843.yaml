id: bbc_2024_9843
title: 'Football: Linesman punched during Anglesey match - BBC News'
date: '2024-05-01'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68940084
content: |-
  Police are investigating after footage shows a linesmen punched to the ground during a match.

  Police are investigating an alleged assault on a linesman during a football match on Anglesey.

  The incident happened during Penrhyndeudraeth FC’s 8-0 win at Amlwch FC's Lon Bach ground in a North Wales Coast West Premier League encounter on Saturday.

  Noel Mooney, chief executive of the Football Association of Wales, said on X, formerly Twitter, that "there is no room in football for this".

  Penrhyndeudraeth FC has been asked for comment. Amlwch FC has declined to comment due to the ongoing investigation.
