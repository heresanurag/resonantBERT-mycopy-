id: bbc_2019_12997
title: 'Venice floods: Further warnings of high tides - BBC News'
date: '2019-11-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-50452688
content: |-
  Large parts of the centre of the Italian city have been hit by exceptionally high tides for the third time in a week.

  Large parts of central Venice are under water again, as another exceptionally high tide inundated the Italian city.

  Three of the worst 10 floods since records began in Venice, nearly a hundred years ago, have now happened in a week.
