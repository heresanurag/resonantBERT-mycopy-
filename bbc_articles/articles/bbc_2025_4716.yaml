content: |-
  Two record shops in Scotland were recently featured on a "world's greatest" list with others across the world.

  Two record shops in Scotland recently featured on the Financial Times "world's greatest record stores" list.

  Thorne Records in Edinburgh and Assai Records in Dundee were listed among shops located across the world - from North America to Australia.

  Gary Moore, manager of Assai Records, said that they try to mix it up as much as they can and get involved in all aspects of music in Dundee.

  Owner of Thorne Records, Mark Thorne, said that connecting with the community around him is what makes his shop unique.

  But what is it that makes vinyl records so popular?

  Gary says streaming may feel too easy - leading people to collect again, while Mark feels the opportunity to slow down with the music makes the experience more fulfilling.
