  Annabel Mackey was discovered unresponsive in Kingsley Pond in Hampshire in September 2023.

  Woman charged with murder of toddler found in pond

  Annabel Mackey was a "beautiful, positive and very happy little girl", her father said

  A woman has been charged with the murder of a two-year-old girl who died after being found in a village pond. Annabel Mackey was discovered unresponsive in Kingsley Pond, near Bordon, Hampshire, on 10 September 2023, shortly after she was reported missing. She was pronounced dead in hospital a day later. Alice Mackey, 42, of Gibbs Lane, Oakhanger, has been remanded in custody to appear at Basingstoke Magistrates' Court on Wednesday. Earlier, Annabel's father paid tribute to the toddler who he described as a "shining star" who would be "loved forever".

  He said Annabel was a "beautiful, positive and very happy little girl". "She had an incredibly pure and caring nature that we miss so much," he continued. "She loved story time, dogs and her dolly. She enjoyed singing songs and nursery rhymes and had a very sweet tooth. "Annabel loved to laugh, she brought so much happiness into our lives. "She was dearly loved by her family and friends. Thank you to everyone who was a positive influence in her life. Please continue Annabel's legacy by remembering her and caring for others as much as she did. "The world needs more people like Annabel to spread positivity and kindness. "Annabel, I love you so much, you are a shining star and you will be loved forever."

  Annabel was reported missing from her home on Forge Road, Kingsley, on Sunday 10 September 2023. Police later cordoned off a house on the road, which is about 1,500ft (460m) from the large pond along a rough track.

