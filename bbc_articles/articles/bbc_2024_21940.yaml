content: |-
  Ireland beat England for the first time in women's T20 internationals, completing their record chase in Dublin to draw the series 1-1.

  Ireland claim first T20 win over England to draw series

  Orla Prendergast hit back-to-back fifties for Ireland in the T20 series

  Ireland completed their record chase in women's T20 internationals to secure a thrilling five-wicket victory over England in Dublin. Orla Prendergast top scored with a sublime 80 from 51 deliveries as Ireland reached their target of 170 with just one ball to spare. It is Ireland's first T20 victory over England in their fourth meeting and means the two-match series is drawn 1-1. A partnership worth 79 between Prendergast and captain Gaby Lewis set the platform after opener Amy Hunter fell for one off the fourth ball of the innings. Lewis was eventually dismissed for an entertaining 38 from 35, but Leah Paul hit a run-a-ball 27 to put Ireland within sight of victory. There was time for a late twist when Mady Villiers took two wickets in the final over but then missed a run-out chance, with Ireland claiming another run on the overthrow to secure the win. England earlier reached 169-8, with Tammy Beaumont hitting a blistering 40 from 34 balls that included seven fours. England's first-choice squad will be back in action for the T20 World Cup in the United Arab Emirates, with their tournament opener against Bangladesh on 5 October.

  After a crushing 67-run defeat in the first T20, Ireland showed considerable resolve to seal a memorable win that goes with their dramatic victory in the recent ODI series. They were much more disciplined with the ball in a topsy-turvy innings for the tourists. Openers and Beaumont and Bryony Smith got England off to a flying start, reaching 44-0 at the end of the powerplay. Two quick wickets from Arlene Kelly stymied England's momentum, with Smith dismissed for 28 and Seren Smale falling for 10. But Paige Scholfield and Beaumont put on 59 for the third wicket to wrestle the momentum back England's way. Ireland hit back once more as Scholfield and Beaumont fell in quick succession, before Prendergast bowled Hollie Armitage for a golden duck to leave England wobbling on 137-5. Georgia Adams, in just her second T20 international, then hit 23 from just 15 deliveries as England scrambled their way up to 169-8. Like on Saturday, Ireland lost opener Hunter in the first over of their reply. But rather than triggering a collapse, Prendergast and Lewis showed composure to slowly take the game away from England.

  Ireland all-rounder Orla Prendergast, speaking to TNT Sports: "I knew if I got myself in and got a start I would convert and accelerate towards the back end. "It was our last game of the summer. To put in a really good performance to finish to show how good a side we are was what motivated us." Ireland captain Gaby Lewis: "I am so proud of the girls, it shows the maturity of Orla with that innings, she is such a world-class player." England captain Kate Cross: "It was brilliant game of cricket, Orla batted brilliantly to keep them in the game and to win it eventually. "We have come over with an inexperienced team and I am hugely excited about the performances over the last couple of days."
