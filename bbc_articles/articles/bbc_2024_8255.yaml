title: Antisemitic false Rothschild quote cut from Liz Truss memoir - BBC News
date: '2024-04-19'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68853672
content: |-
  The ex-PM's publishers apologise and agree to remove a fake quote tied to an antisemitic conspiracy theory.

  Liz Truss's publishers have apologised and agreed to remove a false quote linked to an antisemistic conspiracy theory from her new book.

  The ex-prime minister's memoir includes a quote wrongly attributed to banking dynasty founder Mayer Amschel Rothschild, suggesting he wanted to "control" a nation's money.

  Biteback Publishing says it will remove the quote from all future editions.

  Ms Truss's spokesman said she had not "meant" to cause offence.

  A source close to Ms Truss said: "Liz came across the quote and thought it a useful way of illustrating a point about the Bank of England.

  "Numerous online sources have stated that it was attributed to Rothschild, so she simply attributed it thus. Clearly nothing more was meant of it."

  Ms Truss's book Ten Years to Save the West, discussing her political views and tenure as prime minister, was published on Tuesday.

  In the book, Ms Truss wrote: "If only the words attributed to Mayer Amschel Rothschild of the famous banking family had been heeded: 'Permit me to issue and control the money of a nation, and I care not who makes its laws.'"

  There is no evidence that Mr Rothschild said this, and the quote first appeared in print long after his death.

  It has long been used in antisemitic conspiracy theories which falsely accuse the Rothschild family and other Jewish people of secretly trying to control global finance.

  The Board of Deputies of British Jews, the UK's largest Jewish community organisation, wrote to Ms Truss and also complained to Biteback about the line appearing her memoir.

  Ms Truss's staff told the Board of Deputies she had believed the quote to be genuine and was "horrified" to learn of its true origin.

  The Board of Deputies said: "She entirely agrees with the UK publisher's decision to remove this quote from the e-book and any future print editions.

  "We are following up to ensure that her team requests similar removal from English-language publications abroad, as well as any potential foreign language editions."
