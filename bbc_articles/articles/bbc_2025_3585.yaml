  Easterby reverts to a five-three split of forwards and backs on the bench after opting for a six-two against France. Gus McCarthy and Jack Boyle join Furlong, McCarthy and O'Mahony as forwards cover, while Bundee Aki is the third backline replacement alongside Murray and Prendergast. Lowe, a last-minute withdrawal from the France game because of a back spasm, returns on the left wing as Hansen is reinstated on the right after recovering from a quad problem. Calvin Nash and Jamie Osborne, the starting wings against France, drop out of the squad. "While there was disappointment with certain aspects of our performance last weekend, we are thankful for the chance to get back on the horse this week," added Easterby. "We've shown our resilience in recent years and I have no reason to believe that the game in Rome this weekend will be any different."
