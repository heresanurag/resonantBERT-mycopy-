content: |-
  Jack Crowley is recalled at fly-half for Ireland's final Six Nations match against Italy in Rome, as Sam Prendergast drops to the bench.

  Crowley starts as Ireland make six changes for Italy

  Three of Crowley's four substitute appearances this year have been at full-back

  Coverage: Listen on Radio 5 Sports Extra, BBC Radio Ulster and BBC Sounds; text updates and highlights on BBC Sport website and app; watch on ITV1

  Jack Crowley has been recalled at fly-half for Ireland's final Six Nations match against Italy in Rome, as Sam Prendergast drops to the bench. Munster's Crowley played every minute of Ireland's title-winning campaign in 2024, but Leinster's Prendergast has started the past six Test matches. Crowley, 25, returns to the starting XV amid reports linking him with a move, external to English Premiership side Leicester Tigers when his Munster deal expires this summer. It is one of six changes made by interim boss Simon Easterby as Ireland aim to bounce back from last week's crushing defeat by France that ended their Grand Slam hopes. In the backline, there are also returns for fit-again wingers James Lowe and Mack Hansen, while Garry Ringrose starts at outside centre after missing the France match through suspension. James Ryan is recalled to the second row, replacing Joe McCarthy, and Jack Conan - who has scored tries in Ireland's past three games - starts at blind-side flanker. "We have freshened things up a little this week in selection and it's a great boost to welcome back some players from injury, alongside others who have patiently waited in the wings for their chance to start," said Easterby. Ireland will win a third consecutive title if they beat Italy with a bonus point and both France and England lose.

