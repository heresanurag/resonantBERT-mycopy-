  Having recovered from a calf injury, prop Tadhg Furlong is set to make his first appearance since last year's series in South Africa after being named on the bench. Centurions Peter O'Mahony and Conor Murray will make their final Ireland appearances from the bench, but Cian Healy - who is also retiring - is not included. Italy boss Gonzalo Quesada makes seven changes from last week's loss to England. Tommaso Allan is recalled at full-back as Ange Capuozzo moves to the wing. Martin Page-Relo replaces Stephen Varney at scrum-half. Juan Ignacio Brex captains the side as Michele Lamaro drops to the bench, bringing to an end the flanker's run of 24 consecutive Six Nations starts.

  Andrew Porter and Tadhg Beirne, who were criticised by France head coach Fabien Galthie for their part in Antoine Dupont's season-ending injury, are retained in the Irish pack. Galthie reported both players to the match's citing commissioner, but no action has been taken against them, and Porter later dismissed the coach's claim of foul play. But lock McCarthy drops to the bench after being yellow-carded for cynically pulling back Thomas Ramos, resulting in the penalty from which France scored their opening try.

