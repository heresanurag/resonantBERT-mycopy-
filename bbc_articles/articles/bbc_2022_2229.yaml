  Unvaccinated 12 to 17-year-olds will be able to enter Spain with a negative test from Monday.

  An exclusive look into the Olympics as a spectator

  Despite pursuing a tough "dynamic-zero" policy to contain coronavirus - and unlike Japan during last summer's games - China has found a way to put some spectators in the stands during the Winter Olympics. Through a complicated configuration dividing arenas into sections, authorities have been able to invite fans to events and avoid them coming into contact with those in the two bubble zones - the teams competing and the locked-in sports media. To be chosen as a spectator for these Olympic events, you are most likely to be from a Communist Party organisation, a state company, or a student group. There are also local government officials with tickets to the Games, sponsors, and a smattering of diplomats. The planners have decided that such groups can be easily counted on to do what needs to be done (especially when compared to the general public). Then there is another category of people, of which I am one, who are being allowed in to see these supreme athletes compete: foreign correspondents. We have to do a Covid test 96-hours prior to any event, then a second test 24 hours before. According to the rules, this is then followed up with a third test three days after and a fourth test a week later. Read more about how China is managing the games here.
