title: Bowe Bergdahl spared prison time for US Army desertion - BBC News
date: '2017-11-03'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-41860828
content: |-
  The former prisoner of war will be dishonourably dismissed, in an outcome Trump calls a "disgrace".

  Bergdahl was facing up to life in prison after he pleaded guilty last month to desertion

  US Army soldier Bowe Bergdahl will be spared prison time after he was found guilty of deserting his Afghan outpost in 2009, a military judge has ruled.

  Under the sentence in his court martial, the 31-year-old sergeant will be dishonourably discharged, reduced to private in rank and lose pay.

  Prosecutors had argued Bergdahl should spend 14 years behind bars for endangering US troops in Afghanistan.

  He spent five years in Taliban captivity after abandoning his post.

  US President Donald Trump tweeted that the sentence was a "total disgrace".

  He has repeatedly called Bergdahl "a traitor" and criticised the Obama-era prisoner exchange with the Taliban that led to the American soldier's release.

  The judge, Army Col Jeffery R Nance, considered the president's attacks as a mitigating factor in sentencing Bergdahl, whose lawyers argued he could not receive a fair trial because of the comments.

  On Friday, the judge said the Idaho native must forfeit pay equal to $1,000 (£765) per month for 10 months.

