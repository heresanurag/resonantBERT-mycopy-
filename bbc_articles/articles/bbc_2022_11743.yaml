content: |-
  The new monarch speaks to well-wishers after leaving Buckingham Palace.

  Charles III speaks to well-wishers after leaving Buckingham Palace, thanking them for their condolences.

  The new monarch stopped to greet onlookers after his proclamation ceremony earlier in the day.
