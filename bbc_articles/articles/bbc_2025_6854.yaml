  Celtic clinched the Premiership title on 26 April with a 5-0 win against Dundee United. They will enter the Champions League play-off round, with runners-up Rangers entering in the second qualifying round. The Premiership has now split in half after 33 games - with each club playing the others in their 'half' for a fourth and final time. The third-placed Premiership team will enter the Europa League at the second qualifying round, with the fourth-placed team entering the Conference League at the second qualifying round. If Aberdeen win the Scottish Cup, regardless of their league position, they will enter the Europa League at the play-off round. If Celtic win the Cup, "their" Europa place reverts to the league and will go to the third-placed Premiership team, with the fourth-placed team entering at the second qualifying round and the fifth-placed team entering the Conference League at the second qualifying round. The Premiership's bottom club will be relegated to the Scottish Championship, while the 11th-placed team will enter a play-off with three Championship sides.

  The champions - Falkirk or Livingston - will be promoted to the Scottish Premiership. The title will be decided on the final day of the season, with Falkirk currently ahead on goal difference. Whoever does not win the division will enter a play-off with Ayr United, either Partick Thistle or Raith Rovers, and the 11th-placed Premiership team. Bottom club Hamilton Academical were deducted 15 points on 17 April for a breach of SPFL rules, and their relegation was confirmed two days later after a 0-0 draw with Queen's Park, though the Accies could yet appeal against the deduction. Ninth-placed Airdrieonians face a relegation play-off with three League One sides.

  Arbroath clinched promotion with three games to spare

  Arbroath were promoted to the Scottish Championship after beating Stranraer 4-0 on 12 April to clinch the title. Cove Rangers, Queen of the South and either Alloa or Stenhousemuir will enter a play-off with ninth-placed Championship side Airdrieonians. Bottom club Dumbarton are relegated to Scottish League Two. They became the first SPFL team to be relegated after drawing 0-0 with Queen of the South on 22 March. Ninth-placed Annan Athletic will enter a play-off with three League Two teams.

  Peterhead clinched the title and automatic promotion to Scottish League One by beating East Fife 1-0 on 26 April. East Fife, Edinburgh City and Elgin City will enter a play-off with ninth-placed League One side Annan. Highland League champions Brora Rangers and Lowland League winners East Kilbride are contesting a two-legged play-off on 26 April and 3 May, with the winners facing the 10th-placed League Two team (on 10 and 17 May) for the final place in League Two for 2025-26. The 10th-placed team will be either Bonnyrigg Rose or Forfar. Bonnyrigg's goal difference means that realistically, they will finish bottom unless they win their last game and Forfar lose.
