  Burnley and Leeds were both promoted with two games to spare after the Clarets beat Sheffield United - the only other team who could catch either of them

  Leeds United and Burnley both clinched automatic promotion to the Premier League on 21 April when the Clarets beat Sheffield United 2-1. The teams are level on points with two games to go, so the title cannot be decided until the final day of the season. Sheffield United, Sunderland and two other teams will contest the play-offs for the third promotion place. The bottom three teams will be relegated to League One. Cardiff City's relegation was confirmed on 26 April by a goalless draw with West Brom, while Plymouth look all but certain to join them because of their goal difference.
  • None Can Leeds and Burnley survive in Premier League?

  Birmingham clinched promotion with six games to spare, and were confirmed as champions before they played again

  Birmingham City became the first team in England's top five divisions to be promoted when they won 2-1 at Peterborough on 8 April, and clinched the title without kicking a ball four days later as Wrexham drew 0-0 at Wigan. Wrexham made sure of the second automatic promotion place on 26 April when they beat Charlton 3-0. Stockport, Wycombe and Charlton will contest the play-offs with either Leyton Orient or Reading, with the O's superior goal difference meaning they just need to match Reading's result on the final day. The bottom four teams will be relegated to League Two. Shrewsbury Town's relegation was confirmed on 18 April because of Burton's 0-0 draw at Exeter, Cambridge United joined them on 26 April after losing 2-1 at Burton, while Burton will send both Bristol Rovers and Crawley down if they avoid defeat in their game in hand on Tuesday.

  Port Vale and Doncaster both clinched promotion with a game to spare

  Doncaster Rovers and Port Vale were automatically promoted to League One on 26 April, as Rovers beat Bradford 2-1 and Vale won 2-0 at AFC Wimbledon. Doncaster hold a one-point lead going into the final game of the season as both clubs chase the title. There is one more automatic promotion place, with the next four teams entering a play-off. Bradford, Walsall and Notts County are assured of at least a play-off place. The bottom two teams are relegated to the National League. Morecambe's relegation was confirmed on 21 April as they lost 3-1 to Salford, while Carlisle United's stay in the EFL was ended on 26 April as they lost 3-2 at Cheltenham.

  Barnet clinched the title and the sole automatic promotion place with a game to spare on 26 April as they beat Aldershot 4-0. York, Forest Green Rovers, Rochdale, Oldham, Halifax and one other team will contest the play-offs for the second promotion spot. The bottom four teams will be relegated to National League North or South, and will be replaced with the champions and play-off winners of those two divisions. Ebbsfleet United became the first team in England's top five tiers to be relegated after drawing 3-3 with Aldershot on 22 March, and AFC Fylde joined them on 18 April after losing 1-0 to Halifax. The final two relegation places are between Maidenhead, Wealdstone, Dagenham & Redbridge and Braintree. Brackley Town secured the National League North title and Truro City won the National League South title on 26 April.

