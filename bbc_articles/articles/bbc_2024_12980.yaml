title: Israeli army strapped wounded Palestinian to jeep - BBC News
date: '2024-06-23'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cjqq5n8911do
content: |-
  The Israeli military says the man was a suspect in a raid in the West Bank, but its forces violated protocol.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Israeli military has said its forces violated protocol by strapping a wounded Palestinian man to the front of their vehicle during a raid in the West Bank city of Jenin. The Israel Defense Forces confirmed the incident after it was captured on video and shared on social media. An IDF statement said the man was wounded in an exchange of fire during the raid, in which he was a suspect. The injured man's family said that when they asked for an ambulance, the army took him, strapped him to the bonnet of their military vehicle and drove off. The individual was eventually transferred to the Red Crescent for treatment. The IDF said the incident would be investigated.

  Eyewitnesses speaking to Reuters news agency identified him as a local man and named him as Mujahed Azmi. "This morning [Saturday], during counter-terrorism operations to apprehend wanted suspects in the area of Wadi Burqin, terrorists opened fire at IDF troops, who responded with fire," the IDF statement said. "During the exchange of fire, one of the suspects was injured and apprehended. "In violation of orders and standard operating procedures, the suspect was taken by the forces while tied on top of a vehicle. "The conduct of the forces in the video of the incident does not conform to the values of the IDF. The incident will be investigated and dealt with accordingly." There has been a surge in violence in the West Bank since the start of the war in the Gaza Strip, triggered by Hamas's deadly attack on southern Israel on 7 October. The UN says at least 480 Palestinians - members of armed groups, attackers and civilians - have been killed in conflict-related incidents in the West Bank, including East Jerusalem.
