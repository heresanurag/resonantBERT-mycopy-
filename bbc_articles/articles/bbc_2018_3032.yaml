title: 'Australia-UK: Passengers welcomed after non-stop flight - BBC News'
date: '2018-03-26'
section: General
url: http://www.bbc.co.uk/news/world-43534734
content: |-
  The 14,498km (9,009-mile) journey from Perth to London took just over 17 hours.

  The first scheduled non-stop flight between Australia and the UK has touched down in London's Heathrow Airport.

  Qantas Flight QF9 completed its 14,498km (9,009-mile) journey from Perth in just over 17 hours.
