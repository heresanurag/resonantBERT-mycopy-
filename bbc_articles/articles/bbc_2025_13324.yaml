content: |-
  Cynthia Erivo and Ariana Grande will return for the second half of The Wizard of Oz spin-off.

  New trailer for Wicked sequel takes fans back to Oz

  Cynthia Erivo and Ariana Grande, pictured in 2024, will return as Elphaba and Glinda in Wicked: For Good

  The first full-length trailer for Wicked's forthcoming sequel has been released, offering fans a glimpse of how the Wizard of Oz spin-off will conclude. Wicked: For Good will see Cynthia Erivo return as Elphaba, the Wicked Witch of the West, alongside Ariana Grande as Glinda the Good Witch of the North. The sequel picks up where the first film left off and covers the years after Elphaba and Glinda's decision to part ways. Elphaba is now an enemy of the state of Oz, while Glinda has become a public figure controlled by the Wizard.

  The new trailer shows Glinda's bedroom window cracking. She goes outside to her balcony to search for Elphaba, who then appears next to her from the shadows. It also teases the arrival of Dorothy - seen walking down the yellow brick road with her friends - suggesting the character might have a bigger role in the films than in the musical. But the actress who plays her has not yet been revealed.

