title: Welsh government focused on helping Labour win general election, Ken Skates
  says - BBC News
date: '2024-06-09'
section: Wales
url: http://www.bbc.co.uk/news/articles/cyee7zrr8lgo
content: |-
  Ken Skates says the Welsh government is focused on helping UK Labour, despite facing trouble in the Senedd.

  Ken Skates denies the Welsh Labour government is distracted, but that it is focused on helping UK Labour win the general election

  The biggest issue facing the Labour Welsh government is the UK general election, Wales' transport secretary has said. Ken Skates said there was "no denying" that Welsh Labour colleagues were focused on "the need to turf out the Tories" - while critics continue to call for First Minister Vaughan Gething to resign over his campaign donations row. Mr Gething lost a vote of no confidence in the Senedd on Wednesday, and opposition parties have indicated they wouldn't support the government to pass a future budget. When asked on BBC Politics Wales how the Welsh government would pass legislation without a majority, Mr Skates said "everything would change on July fifth if we wake up to a new UK Labour government".

  "Vaughan is determined to deliver for the people of Wales," he added. Mr Skates denied the Welsh government would be distracted by the UK election, saying it was delivering "on doctor's pay, we've seen it with the significant improvements in rail services operated by Transport for Wales". "We are delivering, and we'll go on delivering," he said. Mr Skates also said Mr Gething hadn't considered resigning, and insisted he had the "full support of his colleagues" in Labour. Meanwhile, former first minister Carwyn Jones has called on critics of Mr Gething to give him a chance "to prove himself". Mr Gething's lost no-confidence vote in the Senedd came by two votes, following a row over donations to his leadership campaign by a man convicted of environmental offences. Two Labour colleagues who have had fallouts with Mr Gething were said to be too ill to take part in the vote, after which both the Welsh Conservatives and Plaid Cymru have called on the first minister to resign.

  Vaughan Gething was congratulated by former first minister Carwyn Jones when he was elected to the role earlier this year

  Speaking to Sunday Supplement, Mr Jones said: "He knows he'll have to work very, very hard to make sure that he increases the people of Wales' confidence in his tenure as first minister." Mr Jones was first minister of Wales between 2009 and 2018, and followed by Mr Gething's predecessor Mark Drakeford. Mr Jones added: "There's an election in 2026, that'll be the time to judge the Welsh Labour government and Vaughan as a first minister. "He hasn't had much of a chance to prove himself." Asked if Mr Gething had brought the problems on himself, Mr Jones replied: "Well, people have to judge for themselves. "I'm absolutely sure Vaughan would've wanted to have a different start to his time as first minister. "But he does need, I think, to be given the opportunity to prove himself over the next two years, and then people can judge him in [a Senedd] election."

  Welsh Conservative's leader Andrew RT Davies said: "With Vaughan Gething at the helm, the Welsh government is completely paralysed and unable to focus on the people’s priorities and deliver the change needed to save Wales’ public services." He said: "They are asking us to move on to concentrate on the election because they want us to forget about what happened. We can't. And the people of Wales cannot forget about what happened. "This is a scandal of the like of which we have never had before in Wales."
