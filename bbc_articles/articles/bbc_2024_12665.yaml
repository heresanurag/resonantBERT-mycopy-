  Actor Kiefer Sutherland announced the death of his father, Donald, in a post on X, formerly known as Twitter.

  Actor Donald Sutherland has passed away at the age of 88, his son and fellow actor Kiefer Sutherland has said. In 2011, Donald Sutherland spoke to BBC Breakfast about his career.
