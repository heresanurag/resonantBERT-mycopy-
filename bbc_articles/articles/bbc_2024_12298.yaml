content: |-
  The Royal Air Force's jets left trails of white, blue and red as they flew over central London on Saturday.

  The Royal Air Force has released cockpit footage filmed as its jets flew over central London to mark the King's official birthday on Saturday.

  Famous landmarks like the London Eye, Big Ben and Battersea Power Station can be seen in the video.

  It was King Charles III's second Trooping the Colour as monarch - a ceremony that takes place every year to mark the official birthday of the British sovereign.
