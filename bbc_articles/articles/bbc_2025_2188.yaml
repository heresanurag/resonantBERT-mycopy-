  The proposal to give the US access to minerals would also include those from territories taken from Ukraine.

  Putin offers Russian and Ukrainian rare minerals to US

  This video can not be played To play this video you need to enable JavaScript in your browser. Ros Atkins on... the fight for Ukraine's critical minerals

  Russian President Vladimir Putin said he is open to offering the US access to rare minerals, including from Russian-occupied Ukraine. This comes after US President Donald Trump has repeatedly pushed for Ukraine to give up some of its minerals in exchange for support, in a deal which is currently being finalised, according to a Ukrainian minister. In a state TV interview on Monday, Putin said he was ready to "offer" resources to American partners in joint projects, including mining in Russia's "new territories" - a reference to parts of eastern Ukraine that Russia has occupied since launching a full-scale invasion three years ago. The proposal could also see the two countries collaborating on aluminium extraction and supply to the US to stabilise prices, he added.

  In his televised interview, Putin countered Trump's push to access Ukraine's mineral deposits, saying they were ready to work with "foreign partners" including companies on mining minerals. Putin said a potential US-Ukraine deal on rare minerals was not a concern and that Russia "undoubtedly have, I want to emphasise, significantly more resources of this kind than Ukraine". "As for the new territories, it's the same. We are ready to attract foreign partners to the so-called new, to our historical territories, which have returned to the Russian Federation," he added. He also suggested that Russia and the US could collaborate on aluminium production in Krasnoyarsk, in Siberia, where one Russian aluminium maker, Rusal, has its largest smelters. The televised comments followed a cabinet meeting on Russia's natural resources. On Tuesday, Kremlin spokesman Dmitry Peskov told journalists the proposal opened up "quite broad prospects", adding that the US needed rare earth minerals and Russia had "a lot of them". Offering the US access to minerals is an eye-catching move by Putin, given how much pride the Kremlin has taken in keeping Russia's natural wealth in Russian hands. In 2023 Putin accused the West, particularly the US, of trying to "dismember" Russia to gain access to its natural resources.
  • None Why is Ukraine negotiating a minerals deal with the US? Putin's intervention comes as Ukraine has been facing growing pressure from the Trump administration to sign a deal for access to its mineral deposits. Kyiv estimates that about 5% of the world's critical raw materials are in Ukraine. However, some of the mineral deposits have been seized by Russia in the three years since its invasion of Ukraine. Trump said earlier this month that the US military and economic aid to Ukraine amounted to about $500bn (£396bn), and he wants the US to have access to Ukrainian minerals of that value. Zelenzky has disputed that figure and is also said to want any deal to include security guarantees. On Monday Ukraine's deputy prime minister for European and Euro-Atlantic integration, Olga Stefanishyna, said negotiations on such a deal "have been very constructive, with nearly all key details finalised". Similarly - albeit in a different approach to the US - the European Union has also proposed a partnership with Ukraine that would give it access to minerals in what the the European Commissioner for industrial strategy, Stéphane Séjourné, called a "win-win".
