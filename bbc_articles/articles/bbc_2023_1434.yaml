  This video has been removed for rights reasons.

  The film world's award season has officially kicked off in Los Angeles. The Golden Globes, which is now in its eightieth year, honours work in both film and television.

  The Banshees of Inisherin was the night's biggest winner in the film categories, with three wins, closely followed by The Fablemans and Everything, Everywhere All at Once with two.
