title: 'Dunloy: Police name motorcyclist killed in crash as Andrew Agnew - BBC News'
date: '2024-08-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cn0l9jdkp5po
content: |-
  Andrew Agnew, 53, died in hospital a short time after the collision on Monday evening, police say.

  A motorcyclist who died following a crash in Dunloy, County Antrim, has been named as 53-year-old Andrew Agnew.

  Mr Agnew's motorcycle was involved in a collision with a car at the junction of Frosses Road and Station Road at about 20:20 BST on Monday evening.

  In a statement on Tuesday, the police said that Mr Agnew died in hospital a short time after the collision.

  The police are investigating the circumstances of the crash and have appealed for anyone who may have witnessed it, or has dash-cam footage, to contact them.
