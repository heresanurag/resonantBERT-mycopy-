  Bringing you the latest news from across England about the coronavirus pandemic.

  The number of people killed by coronavirus in London in the four weeks to 24 April was significantly higher than the number of civilians killed during the worst four-week period of aerial bombing of the city during the Blitz.

  Registered deaths in London attributed to Covid-19, in the four weeks to 24 April this year, reached 5,901 according to data from the Office for National Statistics (ONS).

  Figures held in the National Archives, and collated by the Commonwealth War Graves Commission, show that 4,677 people were killed during the Blitz in the 28 days to 4 October 1940.

  "These are the best figures available for the civilian deaths in the Blitz," said Prof Richard Overy from the University of Exeter.

  "This dramatic war on civilians has come to symbolise the horrors of total war, with the images of burning and ruined buildings and bodies dug out from the rubble.

  "All the more poignant is the contrast with the current epidemic which has killed considerably more people in 28 days in London's hospitals and care homes."

