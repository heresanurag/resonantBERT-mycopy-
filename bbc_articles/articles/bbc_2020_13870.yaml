title: Suspected gas explosion causes Lincolnshire house collapse - BBC News
date: '2020-12-14'
section: Lincolnshire
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-55279445
content: |-
  Police said the male occupant suffered minor injuries and was a "little shaken".

  A house has collapsed after a gas explosion is believed to have ripped through the property.

  The explosion happened in Holly Drive in Bourne, Lincolnshire, at about 09:10 GMT causing severe damage.

  A male occupant suffered minor injuries and is a "little shaken", Lincolnshire Police said.

  A spokesperson said the scene had been assessed and it had been deemed that there was no need to evacuate any other properties.

  The force said: "Whilst a full investigation is to be conducted, we believe it is probably a gas explosion."

  Police, fire and gas services were called to the scene

  No other properties were evacuated

