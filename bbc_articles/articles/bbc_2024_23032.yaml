  In Monday's other game, rookie quarterback Jayden Daniels threw two touchdown passes and ran over for a score of his own as the Washington Commanders edged the Cincinnati Bengals 38-33. Daniels, the second overall pick in the 2024 draft, completed 21 of 23 passes for 254 yards as the Commanders recorded their second win of the season. Cincinnati quarterback Joe Burrow completed 29 of 38 passes for 324 yards and three touchdowns, including two for Ja'Marr Chase. Zack Moss scored on a one-yard run with 40 seconds left to narrow the gap to five points, but the Bengals ran out of time. Defeat means Cincinnati have lost their opening three matches of a season for the first time since 2019.
