title: 'NFL round-up: Bills thrash Jaguars and Commanders edge Bengals - BBC Sport'
date: '2024-09-24'
section: American Football
url: http://www.bbc.co.uk/sport/american-football/articles/c05gnpd905jo
content: |-
  Josh Allen throws four first-half touchdown passes as the Buffalo Bills thrash the Jacksonville Jaguars 47-10 to maintain their perfect start to the season.

  Josh Allen (centre) was seventh overall pick for the Buffalo Bills in the 2018 NFL draft.

  Josh Allen threw four first-half touchdown passes as the Buffalo Bills thrashed the Jacksonville Jaguars 47-10 to maintain their perfect start to the season. Allen set up scores for Dalton Kincaid, Keon Coleman, Khalil Shakir and Ty Johnson, while James Cook had a rushing touchdown as the Bills raced into a 34-3 lead after two quarters. Brenton Strange collected Trevor Lawrence's six-yard pass for a Jaguars touchdown in the third quarter, but Ray Davis rushed over late on to complete a thumping win for the Bills. Jaguars quarterback Lawrence was sacked four times as Jacksonville suffered their third defeat from as many games this season. Buffalo safety Damar Hamlin, who suffered a cardiac arrest during a game in January last year, was mobbed by his team-mates when he recorded his first career interception.

