  A spokesman for Mr Trump, said the case was likely to be appealed.

  Taylor Budowich said Mr Trump was committed to defending the right of US presidents to assert executive privilege and "will be seeing this process through".

  But Bennie Thompson, the Mississippi Democrat who is chairman of the committee, called the lawsuit "little more than an attempt to delay and obstruct our investigation."

  Sixteen of Mr Trump's closest aides have been subpoenaed in the past two days.

  They include Kayleigh McEnany, the White House press secretary, Stephen Miller, who was Mr Trump's senior adviser, Bill Stepien, campaign manager, Mark Meadows, former White House chief of staff, and Michael Flynn, former national security adviser.

  Bennie Thompson, the Mississippi Democrat who chairs the House committee, said in a statement he wanted to know every detail about what happened on 6 January, and in the days leading up to it.

  The committee expects the witnesses to "comply fully", he added.

  The panel has already subpoenaed Dan Scavino, former deputy chief of staff, and Steve Bannon, a former Trump strategist.

  Mr Bannon refused to comply with the subpoena and was charged with contempt of Congress.

  Following the Capitol riot, Mr Trump was impeached by the lower house of Congress, but cleared by the then Republican-dominated upper house, the Senate, of inciting an insurrection.

  More than 670 people have been arrested for the invasion of the Capitol complex.
