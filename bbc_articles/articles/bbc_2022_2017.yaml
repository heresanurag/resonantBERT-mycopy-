title: 'As it happened: Ukraine tensions: Biden says he is ''convinced'' Putin has
  decided to invade Ukraine - BBC News'
date: '2022-02-18'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-60428211
content: |-
  The US president made the comments in a televised address following a call with allies over the crisis.

  A former high-ranking US national security official believes that Russia is working to manipulate media perceptions at home and abroad ahead of a potential invasion of Ukraine.

  Andrea Kendall-Taylor, an ex-senior analyst at the CIA and Deputy National Intelligence Officer for Russia and Eurasia at the Office of the Director of National Intelligence, said she believes Russia is "accelerating its efforts in the information domain" to build the case for conflict.

  As examples, she pointed to Russian media coverage of purported mass graves discovered in separatist areas or the recent shelling of a kindergarten, which Russian-backed separatists blamed on Ukraine.

  "The Russian media is really trying to spin this all up as Ukraine mounting an offensive," she said. "It creates justification."

  Kendall-Taylor added that Russian military doctrine views the "information space" as a key part of their competition with the US and the West.

  She added that this sort of media is aimed both at the Russian public and at external observers across the world.

  "They're going to flood the information space with fabricated stories and half-truths in order to confuse and disorient, and make it hard for outside observers to discern the truth," she said.
