title: Rafah offensive starts and King 'a bit busy' for Harry - BBC News
date: '2024-05-08'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68974106
content: |-
  Israel's offensive in Rafah and Prince Harry's UK trip are leading Wednesday's front pages.

  The Daily Telegraph, external leads with the proposed introduction of tougher age checks for users of sites such as Facebook and Instagram and says the firms risk being fined if they fail to comply. The paper carries an article by Technology Secretary Michelle Donelan, in which she says the government will no longer tolerate a "wild west", where children are "force fed" violence and harmful online content. In an editorial, the Times questions how effective the policy will be but it congratulates the government and the regulator for putting in place what it describes as the most thorough and balanced regime anywhere, to tackle the issue. The i, external reports that the firm at the centre of a cyber attack on the Ministry of Defence has contracts with several other government departments, as well as the Metropolitan Police. The Times, external says the company provides both the Home Office and the Cabinet Office with payroll and HR functions. According to the paper, Whitehall sources say there's no evidence to suggest that the suspected Chinese hackers have data from other departments. The Sun, external is one of several papers to highlight a report from a think tank, which claims that migration is to blame for almost 90% of housing shortfalls. The paper asks if politicians will ever "wake up" to the pressure caused by mass immigration, but also says too many MPs whine about property prices and then block all development. The Daily Express, external describes the report - by former minister Robert Jenrick - as "hard-hitting". It quotes him as saying the government must undo what he calls "the disastrous post-Brexit liberalisations that betrayed the wishes of the British public for lower immigration". The Daily Telegraph, external reports that the Oxford-AstraZeneca Covid vaccine is being withdrawn worldwide. It mentions a legal document from earlier this year, in which the pharmaceutical giant admitted the vaccine could cause a rare and dangerous side effect. According to the paper, AstraZeneca insists the decision to withdraw the jab is not linked to the court case and has been done for commercial reasons. The Times, external reflects on the Garrick Club's decision to allow female members for the first time in its 200-year history. The paper says the actors Nigel Havers and Stephen Fry were among members who spoke in favour of the change at a meeting last night. It quotes a supporter of the move saying that "a remarkable club will become more remarkable".

  The Daily Mail, external says an announcement that the King is too busy to see Prince Harry on his visit to the UK will come as a ''crushing blow'' for the Duke of Sussex. The Daily Telegraph, external says Harry had made no secret about his wish to see his father during his three-day trip. False teeth, underwear and a distressed-looking Ken doll are some of the more bizarre items found in sewers, according the Daily Star. Although amusing at times for its workers, the water company Severn Trent says it's an important reminder to be careful with what you throw away.

