id: bbc_2018_14059
title: West Croydon bus station crash leaves 20 injured - BBC News
date: '2018-11-12'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-46171805
content: |-
  The double-decker bus driver has been arrested on suspicion of driving under the influence of drugs.

  Police have taped off the scene and said a teenage girl had been taken to hospital

  A 15-year-old girl has been critically injured and 19 other people hurt as a double-decker London bus collided with two vehicles and hit a bus shelter.

  The bus collided with a car, a single-decker bus and hit a shelter at West Croydon bus station at about 12:20 GMT.

  The driver of the 198 Arriva double-decker bus was arrested on suspicion of driving under the influence of drugs.

  London Ambulance Service said 18 people were taken to hospital.

  A Metropolitan Police spokesman said the 15-year-old girl had been a passenger on the bus and was taken to a south London hospital.

  He added: "She remains there in a critical condition. Her next of kin have been informed."

  Videos on social media showed dozens of emergency service workers at the scene.

