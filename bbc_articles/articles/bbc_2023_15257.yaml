content: |-
  Watch the footage of unprecedented scenes in Israel and Gaza, verified and explained by the BBC.

  Palestinian militant group Hamas has launched its biggest attack on Israel, with rocket strikes, killings and hostage taking.

  In turn Israel launched a retaliatory wave of air strikes on Gaza.

  Prime Minister Benjamin Netanyahu said that Israel was "at war". Hamas, which rules Gaza, would "pay an unprecedent price," he added.

  BBC Verify have been examining the shocking footage coming out of Israel and Gaza, and Jon Donnison explains what they have been able to confirm about the day.
