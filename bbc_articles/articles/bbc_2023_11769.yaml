  A look back at some stand-out interviews from Sir Michael's best-known show, Parkinson.

  Broadcaster and journalist Sir Michael Parkinson interviewed many of the world's most famous celebrities for his best-known show, Parkinson.

  Take a look at some memorable moments from the series, which wasn't without elements of controversy.
