id: bbc_2017_2887
title: Migrants take public transport to Calais - BBC News
date: '2017-02-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-38880918
content: |-
  Scores of migrants take buses to Calais each day, and use them to get home again if they fail to stow away on a lorry to the UK.

  Every day scores are migrants are using public buses to travel to the port of Calais from the only official camp near Dunkirk, the BBC has discovered.

  Many say they are hoping to stow away in lorries and enter the UK via Dover.
