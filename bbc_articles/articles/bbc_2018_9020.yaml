title: Warning after Kent boy's henna tattoo burns - BBC News
date: '2018-07-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-44854602
content: |-
  The mother of a boy who was burnt after getting a henna tattoo is warning holidaymakers to be careful.

  Joe Stuart, six, from Bearsted, Kent, was badly burnt after getting a henna tattoo while on holiday in Crete.

  His skin became red and inflamed and he was referred to specialists at a burns unit.

  Joe's family are warning other holidaymakers to be careful.

  His mother Sally said: "We were really upset because he was in a lot of pain."
