  • None A rash (like eczema), crusting, scaly or itchy skin or redness on or around your nipple
  • None A change in the appearance of your nipple, such as becoming sunken into your breast Some of these symptoms are common and can be caused by other conditions, but it is still important to get checked by a GP.
