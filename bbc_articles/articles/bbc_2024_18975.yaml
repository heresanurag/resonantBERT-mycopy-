title: 'Manx Grand Prix: Louis O’Regan dies after crash in qualifying - BBC News'
date: '2024-08-18'
section: UK
url: http://www.bbc.co.uk/news/articles/c3rdp52j815o
content: |-
  Louis O’Regan, 43, dies after a crash during the opening qualifying session, race organisers confirm.

  Louis O’Regan first competed in the Manx Grand Prix in 2013

  A competitor has died after a crash during the opening qualifying session of the 2024 Manx Grand Prix, organisers have confirmed. Irish rider Louis O’Regan died of his injuries after crashing at Kate’s Cottage on the mountain section of the 37.73-mile (60km) course at about 16:50 BST. The 43-year-old, who lived in Didcot in England, made his debut at the event in 2013, finishing 12th in the Newcomers A Race that year. In a statement, race organisers extended their “heartfelt condolences to Louis’s partner Sarah, his family, loved ones, and friends”.

  The opening qualifying session was not restarted following the red flag incident. The organisers statement said: “With great sadness, the organisers of the Manx Grand Prix can confirm that Louis O’Regan, 43, has died following injuries sustained in an accident at Kate’s Cottage during the opening qualifying session of the 2024 event. “Louis, an Irishman who lived in Didcot, England, was an experienced competitor at the Manx Grand Prix having made his debut in the 2013 Newcomers A Race, finishing 12th. “He recorded his personal best lap speed in the 2019 Junior Race, lapping at an average speed of 114.7mph. “We extend our heartfelt condolences to Louis’s partner Sarah, his family, loved ones, and friends.”

