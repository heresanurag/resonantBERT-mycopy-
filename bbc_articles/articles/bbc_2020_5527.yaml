title: Coronavirus in Scotland - Changes will be 'careful and gradual' - BBC News
date: '2020-05-15'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52561846
content: |-
  First Minister Nicola Sturgeon says polling shows "widespread endorsement for the approach we are taking".

  The UK government has now started daily reporting of the R number, an important measure of how fast the virus is spreading.

  The latest estimate is between 0.7 and 1.0. It needs to stay below one if the virus is to remain under control.

  Previously it has been sitting at between 0.5 and 0.9 in England

  Jenny Harries, deputy chief medical officer for primary care in England, said there was a range in the estimate because different models were being used.

  She also stressed it was a "national average" - in some places such as care homes it would be higher and in other places it would be lower.

  It is thought up to one in 400 people, about 148,000 individuals in England, have Covid-19 at any one time, she said.
