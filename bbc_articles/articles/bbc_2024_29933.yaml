  Fresh Spain floods sweep away dozens of cars near Girona

  This video can not be played To play this video you need to enable JavaScript in your browser. Cars washed away as new flash floods hit Spain

  New floods have hit the region of Girona in north-eastern Spain, sweeping away around 30 cars in the town of Cadaqués, according to Spanish media reports. Videos posted by a local journalist showed, external a torrent of water gushing down the street and a pile of cars blocking a bridge early on Friday. No casualties were reported in the latest round of flooding to hit the country. More than 200 people were killed last week, most in the Valencia area, in one of the worst floods in Europe this century. The disaster ignited intense anger at the authorities for not issuing emergency alerts sooner.

  Flooding in Cadaqués in the early hours of Friday morning caused around 30 vehicles to pile up under a bridge, Catalonia's fire service said on X, but luckily no one was injured or trapped. More potentially dangerous weather is expected in the region on Friday night. Catalonia's meteorological service issued a rain warning from Friday evening until Saturday afternoon for the area of Alt Emporda, where Cadaqués is located. The weather agency warned rain intensity could exceed 20 mm (0.7 inches) in 30 minutes. The agency recorded 76.8 mm (3 inches) of rain in Cadaqués on 7 and 8 November, with more than 100 mm logged in two other towns nearby. Spain received 72% more rainfall from 1 October to 5 November than the normal value for that time period, according to Aemet, Spain's weather agency. The rainfall, which experts said was intensified by climate change, led to flash floods that trapped people in their cars.
