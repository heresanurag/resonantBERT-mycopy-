content: |-
  Primary schoolchildren in West Bromwich have sent a good luck message to the England team ahead of their World Cup quarter-final against Sweden.

  Primary schoolchildren in West Bromwich give a team talk for England ahead of their World Cup quarter-final against Sweden.

  The Year 5 and 6 students from St John Bosco Catholic Primary School also showed off their goal celebrations.
