  Kelly called into England squad as Mead drops out

  Chloe Kelly left Manchester City to join Arsenal on loan in January

  Chloe Kelly has been called into the England squad to replace the injured Beth Mead for their Women's Nations League matches this month. The 27-year-old joined Arsenal on loan from Manchester City on deadline day in January after saying she "wanted to be happy again" in a social media post. The forward has made just one Women's Super League start this season and was not named in the original Lionesses squad by Sarina Wiegman last week. However, Kelly made her return to action in Sunday's 5-0 win over Tottenham at Emirates Stadium and hit the crossbar in a bright appearance as a substitute. Mead was on the bench for that game but has withdrawn from the England squad with an injury, as has defender Lotte Wubben-Moy, who missed Sunday's north London derby victory.

  Arsenal manager Renee Slegers said Wubben-Moy had picked up "a minor muscle injury" and was scheduled for a scan on Monday. Aston Villa defender Lucy Parker, 26, has been called up to replace Wubben-Moy as part of Wiegman's 24-player squad. The Lionesses arrived at St George's Park on Monday morning and will travel to Portugal for Friday's game (19:45 GMT). They face world champions Spain at Wembley Stadium on Wednesday, 26 February at 20:00 GMT.
