title: 'Watch: Volcano in Indonesia spews lava and smoke - BBC News'
date: '2024-04-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-68841333
content: |-
  Hundreds of people have been evacuated as Mount Ruang continues to erupt for the second day.

  Hundreds of people have been evacuated after Indonesia's Mount Ruang erupted for the second day on Wednesday.

  Indonesia's volcanology agency said the eruptions were triggered by recent earthquakes in the area.

  There were no reports of deaths or injuries, state news agency Antara reported.

  The country's geological agency said the eruption pushed an ash column of up to 2.5km (1.6 miles) into the sky.
