title: Australia fire evacuees use car park as pet shelter - BBC News
date: '2019-12-22'
section: General
url: http://www.bbc.co.uk/news/world-australia-50878463
content: |-
  Evacuating residents and their pets have found safety and support in a store's car park.

  Evacuating residents and their pets have found safety and support in a store's car park which they've made their temporary shelter.

  Fires have hit many parts of Australia, including the region of New South Wales on the country's eastern coast.
