title: 'Boris Johnson resignation: Wallace rules out bid to replace PM - BBC News'
date: '2022-07-09'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-62106884
content: |-
  The defence secretary says he hopes the Conservatives can "swiftly return to focusing on the issues".

  Defence Secretary Ben Wallace, one of the bookies' favourites to succeed Boris Johnson, has said he will not run for the Conservative Party leadership.

  In a statement on Twitter, he said his focus is on his current job and "keeping this great country safe".

  Wishing luck to the contenders, Mr Wallace said he hoped "we swiftly return to focusing on the issues".

  The most high profile candidate to replace Mr Johnson so far is former Chancellor Rishi Sunak.

  It had looked like Mr Wallace was in a particularly strong position as he had been topping surveys run by the website Conservative Home and was the bookmakers' favourite.

  There will now be a lot of interest in which of the candidates he endorses, as getting him on board is likely to be a big boost to their campaign.

  Mr Sunak launched his campaign on Friday saying "someone has to grip this moment and make the right decisions".

  His resignation from the cabinet on Tuesday helped trigger the mass walkout of ministers that forced Boris Johnson to stand down as Tory leader.

  Several senior Tory MPs have endorsed Mr Sunak's campaign, including Oliver Dowden, Mark Spencer and Liam Fox.

  But a No 10 source told the BBC there was "real disappointment" with Mr Sunak in Downing Street.

  They accused him of having a "short memory", adding: "It was the prime minister who trusted him and gave him a top job when he was a junior minister.

  "The prime minister backed him to the hilt. It's a shame it wasn't reciprocated."

  Mr Sunak responded to a number of supportive posts on social media from Tory MPs, tweeting: "Thank you. I've been truly overwhelmed by the support and so grateful for the thousands of people who have signed up to join the campaign.

  "Together we will restore trust, rebuild the economy and reunite the country."

  Mr Johnson has said he intends to stay on in Downing Street until a successor is chosen.

  Former Equalities minister Kemi Badenoch became the latest Conservative MP to enter the race, confirming her candidacy in the Times.

  She said she wanted a limited government and to "tell the truth".

  Senior Conservative backbencher Tom Tugendhat and Attorney General Suella Braverman have also launched leadership bids.

  Writing in the Daily Express, Ms Braverman pledged she would bring in "rapid and large tax cuts" as leader.

  Following his announcement, Mr Tugendhat - MP for the Kent seat of Tonbridge and Malling - told BBC South East: "I've spent 10, 15 years serving our country in uniform, I've spent six, seven years now serving our community in Parliament, and I'd like the chance to serve again because I think this country matters.

  "I think the innovation and opportunity that these people demonstrate every day is what we need to champion and to make that new deal, because there is a new deal for Britain."

  Meanwhile, former Northern Ireland Secretary Brandon Lewis has endorsed Nadhim Zahawi for leader, although the chancellor has yet to confirm he will stand.

  Writing on Twitter, Mr Lewis described his former cabinet colleague as a "passionate advocate for opportunity for all", adding Mr Zahawi is someone who "delivers and gets things done".
