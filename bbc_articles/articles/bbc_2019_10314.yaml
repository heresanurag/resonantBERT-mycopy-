title: When an ethical vegan met a sheep farmer... - BBC News
date: '2019-08-20'
section: General
url: http://www.bbc.co.uk/news/uk-49399478
content: |-
  Many vegans boycott woollen clothing on the basis that it is cruel to sheep.

  For the world’s shepherds, shearing sheep is a vital part of caring for their flock. However, many vegans consider the wool industry to be cruel and harmful to animals.

  In early 2019, an online clothing retailer temporarily stopped selling woollen products and farmers were furious.

  So who’s right? BBC reporter and former farmer, Gareth Barlow, took 'ethical vegan' Kirsch Bowker to meet sheep farmer Gareth Wyn Jones to hear both sides of the debate.

  Ethical vegans try to avoid using any form of animal product, such as wearing clothes made from wool or leather, and are against the farming of animals.

