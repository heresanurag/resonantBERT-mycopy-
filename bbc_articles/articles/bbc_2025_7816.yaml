title: Can Romford residents end the Essex versus London debate? - BBC News
date: '2025-04-03'
section: General
url: http://www.bbc.co.uk/news/videos/cwyn1e3l5v1o
content: |-
  It’s an age-old question, but is Romford in Essex or London?

  Originally under the umbrella of Essex, it all changed 60 years ago when on 1 April 1965 the local government map of London was set, with the establishment of the 32 boroughs that still exist today.

  As part of this, Romford changed from being part of Essex and instead became a part of the borough of Havering.

  Although it is officially in Greater London, some residents told the BBC they feel their identity resides in Essex.

