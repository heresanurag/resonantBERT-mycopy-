content: |-
  More than 1,000 fans gathered at Old Trafford to pay their respects to the Manchester United legend.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Family, fans and footballers from across the generations have bade a final farewell to Manchester United and Scotland legend Denis Law. About 750 mourners paid their respects to one of the game's all-time greats at his funeral earlier. More than 1,000 fans gathered at Old Trafford to applaud as the cortege passed the stadium, pausing at the Trinity statue which depicts him alongside Sir Bobby Charlton and George Best, and then travelling on to Manchester Cathedral. The Red Devils icon and only Scotsman to ever be named the world's best player died last month aged 84.

  Denis Law played for Manchester United for 11 years scoring 237 goals in 404 appearances

  Footballers past and present turned up to pay their respects to Law as well as Manchester United's Sir Alex Ferguson who described Law as "my hero" and current manager Ruben Amorim. Among the myriad of United legends who paid their respects, some of Manchester City's greats joined the mourners where Law also played. These included Law's former teammates Joe Corrigan and Mike Summerbee.

  The bagpipes played Flower of Scotland as the funeral procession arrived at Manchester Cathedral

  The funeral procession arrived at Manchester Cathedral to the sound of bagpipes playing Flower of Scotland. Diana Law paid tribute to her late father, who she said has now reunited with club greats Charlton and Best. She said: "There is an Englishman, Irishman and Scotsman. I think of them all up there in heaven. Reunited smiling down. Maybe they have started a team already with Sir Matt as the manager." Sir Alex also paid tribute to his fellow Scotsman at the service. "Trying to place Denis in the pantheon of all time greats is a challenge. But it is made easier by Pele. "He was asked if there was a British player who could get in the [great] Brazil team. He said Denis Law - which is a fantastic tribute."

  Sir Alex joked Law "would fight his granny for a goal"

  Sir Alex then talked about Law's love for Scotland and how "he loved beating England". "He once lined up before a game against England. "He loved Nobby Stiles and Nobby worshipped him. Nobby came bounding down the tunnel and wished Denis all the best. "Denis gave him a withering look and let off a volley of abuse Nobby never forgot." Sir Alex went on to say he often wondered why supporters called him The King, and came to the conclusion "it was to do with his profile". "He would fight his granny for a goal," he said. "He had so much courage. A skinny guy standing among all those big defenders."

  Leading the service, Cannon Grace Thomas told mourners Law's death marked "the end of an era, the last of the famous Trinity to go". "But what a wonderful legacy he leaves behind for supporters. And also in the hearts, minds and memories of all who loved him," she said. Rod Stewart's rendition of Angel was played as the service ended.

  Law who was born in Aberdeen in 1940 was capped 55 times for Scotland. He remains the country's joint-top scorer of all time with 30 goals. Law started out at Huddersfield Town at the age of 15 before going to United's great rivals, Manchester City. He left City for Italy's Torino after a year but moved back to Manchester to join United in 1962. It was the third transfer involving Law to set a new British record fee. Law spent 11 years at Old Trafford, where his 237 goals in 404 appearances have kept him in third place on United's all-time goal scorers list, behind Wayne Rooney and his former teammate Charlton. His time at the club saw it win two league titles, the FA Cup the European Cup as the first English team to do so.

