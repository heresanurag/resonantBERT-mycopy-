title: 'Elle Edwards: Car used in shooting found burnt out, jury told - BBC News'
date: '2023-06-19'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-65953824
content: |-
  Elle Edwards, 26, was caught up in the crossfire of a gangland feud on Merseyside, a trial hears.

  Elle Edwards was caught in the crossfire of a gangland feud, a court has heard

  A stolen car used in a shooting which killed a woman was burnt out a week later by the man accused of her murder, a court has heard.

  Elle Edwards was killed by a gunman who opened fire with a Skorpion sub-machine outside the Lighthouse pub in Wallasey Village, Merseyside, on 24 December.

  A black Mercedes A Class is alleged to have been used by Connor Chapman, 23, during the shooting.

  Mr Chapman denies the murder of Ms Edwards, 26, at Liverpool Crown Court.

  The jury was shown footage of the stolen Mercedes travelling in a convoy with another Mercedes vehicle, both with false registration plates, from Wirral to Frodsham, Cheshire, on New Year's Eve.

  Nigel Power KC, prosecuting, said cell site data showed the phones of Mr Chapman and co-defendant Thomas Waring appearing to move with the cars as they travelled.

  The jury has been told Mr Chapman accepts he was involved in burning out the car but Mr Waring denies a charge of assisting an offender and claims he was separated from his mobile phone at the time.

  Footage played in court showed the car on fire at Grassy Lane just after 22:00 GMT.

  Elle Edwards was on a night out with friends at the pub when she was shot

  Det Con Steve Duke said the vehicle was set alight in an area near the M56 motorway.

  He said: "It's a very secluded place with high banks, so it is very concealed."

  The car was found by a dog walker the following day and identified by its chassis number, the court heard.

  Home Office pathologist Christopher Johnson said Ms Edwards was hit by three bullets in the shooting.

  The court heard there were two gunshot entry wounds to the back of her head, as well as a graze to her shoulder where a bullet had gone through her coat.

  Dr Johnson said one of the injuries to her head was "irrecoverable".

  The court heard the two men said to be the intended targets of the attack, Jake Duffy and Kieran Salkeld, were both taken to Aintree University Hospital following the shooting.

  A bullet was recovered from Mr Salkeld's chest and, after surgery and time in the intensive care and major trauma units, he was discharged on 7 January, the jury heard.

  Mr Duffy had surgery for wounds to his thighs and was discharged from hospital on 27 December.

  Connor Chapman, 23, denies murder and seven other charges

  The court was told on 30 December a booking was made for Mr Chapman to travel on a ferry from Portsmouth to Santander in Spain on 2 January, but it was later cancelled.

  The jury was told Mr Chapman was arrested in a Tesco store in Newtown, north Wales, on 10 January and told officers: "It wasn't me."

  He answered no comment in police interviews but gave a prepared statement in which he said he was at home in Houghton Road, Woodchurch, at the time of the shooting.

  He said he spoke to police on the phone on New Year's Day, when they searched his grandparents' house, and claimed an officer said he wanted to speak to him over a serious matter, but did not mention it was murder.

  He said: "In recent years, I have felt targeted by the police and I didn't want to go and speak to them."

  The shooting is alleged to have been the culmination of a feud between a group of people on the Woodchurch and Beechwood estates, on either side of the M53 motorway in Wirral.

  Mr Chapman denies the murder of Ms Edwards, two counts of attempted murder and three counts of wounding with intent to cause grievous bodily harm.

  He also denies possession of a Skorpion sub-machine gun with intent to endanger life and possession of ammunition with intent to endanger life.

  Mr Waring, 20, of Private Drive, Barnston, Wirral, denies possessing a prohibited weapon and assisting an offender by helping Chapman to dispose of the car.

