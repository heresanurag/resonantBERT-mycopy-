title: Five taken to hospital after bus crashes into Paisley flats - BBC News
date: '2024-03-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-68556721
content: |-
  Police say two people suffered serious injuries following the incident in Hamilton Court, Paisley.

  Five people have been taken to hospital after a bus crashed into a high-rise block of flats in Paisley.

  Emergency services were called to the scene on Hamilton Court, Calside, at about 12:20 on Wednesday.

  Police Scotland said two people suffered serious injuries and inquiries were ongoing.

  McGill's Buses said the driver was among those taken to hospital, but added it was too early to know what caused the incident.

  A spokesman said the company was working with officers investigating the crash in the Renfrewshire town and its thoughts were with those injured.

  The Scottish Ambulance Service said three people were taken to the nearby Royal Alexandra Hospital and two to the Queen Elizabeth University Hospital in Glasgow.

  Experts prepare to remove the bus from the scene

  Resident David Bannerman, who went to the scene with his sister Debbie Tiffen, described the aftermath.

  He told BBC Scotland News: "We heard the crash, looked out the window and seen the barriers had been hit so went down to see what we could do to help.

  "The people on the bus were all a bit dazed and confused so we just tried to calm them down. I think they'll all be ok in the end.

  "Me and my sister jumped onto the bus through the windows to see if we could help calm people down."

  Mr Bannerman, 40, said they were shocked to see the bus had "gone into the flats".

  "We couldn't get the people off the bus because the doors were buckled but we made sure they were all sitting down until the emergency services got here," he added.

  Another eyewitness who asked not to be named said: "It must have been really frightening for the driver.

  "I was in my flat and heard the sirens, I didn't hear the crash. I was shocked when I came out and seen what had happened.

  "A car crashed into the building a few years ago too, it's a bad bit of road."

  The Scottish Fire and Rescue Service said it sent three appliances and a special resource to the scene but crews left after ensuring the area was made safe.

  A police spokesperson said the road closures include Calside Avenue, Polsons Crescent, Craw Road and Alexandra Gate.

  In August 2022 a man was charged with road traffic offences after a car crashed into the same tower block.
