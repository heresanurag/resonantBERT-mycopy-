title: Pro-Palestinian protest blocks Golden Gate Bridge - BBC News
date: '2024-04-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68822317
content: |-
  San Francisco's Golden Gate Bridge was blocked for hours during a pro-Palestinian demonstration.

  Pro-Palestinian demonstrators forced the closure of San Francisco's Golden Gate Bridge on Monday, causing hours of gridlock. The protesters held signs that read “Stop the world for Gaza" and "End the siege on Gaza now".
