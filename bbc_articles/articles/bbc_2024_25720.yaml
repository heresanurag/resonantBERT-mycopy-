  A selection of pictures sent in by our readers on the theme of 'in the air'.

  Your pictures on the theme of 'in the air'

  We asked our readers to send in their best pictures on the theme of "in the air". Here is a selection of the photographs we received from around the world.

  Steve Demeranville: "Got up early one morning in Myanmar to observe the fishing net casting techniques of the local fishermen. This net thrown high appears to catch the sun rising."

  Jason Shrubb: "Squidge and Pop whipped up a froth of excitement at the Arts by the Sea festival in Bournemouth last month as bubbles and shrieks filled the air."

  Roland Trope: "In the 88th annual Macy's Thanksgiving Day Parade, a Paddington Bear balloon made its way along East 59th Street, New York."

  Peter Norris: "Traditional to Catalonia in Spain, this team is called Castellera de Figueres."

  David Hanson sent in a photo of competitors at Crankworks, Whistler, Canada

  Philip Marchington: "My son grabbed our Appalachian broom and took off with it."

  Matt Kirk sent us a picture of basketball player throwing a basketball into a hoop.

  Jasmine Swindail: "I took a picture at a zoo of a meerkat with sky behind it, as it made the meerkat seem high up."

  Geoff Matthews: "The Red Arrows finish their final display of the 2024 season, their 60th Anniversary season, at IWM Duxford Flying Finale Air Show."

  Sean Knight captured an art installation in Montreux on the shores of Lake Geneva.

  Zayne Lockhart sent a photo of a robin in flight.

  John West: "This from a story I made up for my grandchildren. The paperclip children are jumping on their beds, pretending to be superheroes."

  The next theme is "road trip" and the deadline for entries is 5 November 2024. The pictures will be published later that week and you will be able to find them, along with other galleries, on the In Pictures section of the BBC News website. You can upload your entries directly here or email them to yourpics@bbc.co.uk. Further details and themes are at: We set the theme, you take the pictures.
