content: |-
  Tawana tells the Reliable Sauce podcast that she unexpectedly found out she was pregnant in month eight.

  Cryptic pregnancy: 'I had 4 weeks to get my life together'

  Tawana had no idea she was pregnant with River, who's now aged one

  She was, in her own words, "living a wild, crazy life", partying and having fun with friends. That was until she ended up in hospital after collapsing. She had no idea why. Then she was told she'd be having a baby in four weeks' time. She was blindsided by the news. "Because someone is telling you, yeah, you've got four weeks to get your life together." After being admitted to hospital doctors had asked Tawana to take a pregnancy test before an MRI scan. She'd dismissed the concern as ridiculous - she had a contraceptive implant in her arm and had shown no symptoms of being pregnant. And when the test came back negative Tawana was even more convinced she was right. But a nurse tried to convince the doctor to let her have an ultrasound, as she still believed Tawana might be pregnant. River's dad, Emmanuel, says when Tawana told him the news that she was due to give birth, he didn't believe her. "It just didn't make sense at all," he says. "It seemed very miraculous."

  Tawana and Emmanuel, with their baby, River after speaking to the BBC's Reliable Sauce podcast

  Having a baby without any of the typical symptoms such as vomiting or having a noticeable bump is called a cryptic pregnancy. It’s rare, but Tawana says she was told by doctors that "it’s more common in the black community" to have one. "[I was told] it's because of our hip and bone structure, the baby doesn't grow outwards, it grows inwards, and we're more likely to become breech," she says. "So when it was time for me to give birth, my biggest concern was if she was going to be upside down." While data on cryptic pregnancy isn't readily available, Alison Leary, a professor of healthcare at London South Bank University says there is wider data which suggests there are disparities in maternity care experienced by women from ethnic minorities. "There have been quite a lot of studies that show women, particularly black women, have poor outcomes in terms of pregnancy and childbirth," she tells BBC Newsbeat. And she feels there needs to be more research done and available on the specific issue of cryptic pregnancies. "That's why [it's] quite an important issue even though it affects a small amount of people because if you don't get early access to good maternity care, good antenatal care, you're more likely to experience poor outcomes."

