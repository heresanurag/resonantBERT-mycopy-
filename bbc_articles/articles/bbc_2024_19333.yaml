content: |-
  Brentford forward Ivan Toney should not move to Saudi Arabia while he is at his "peak", says ex-Premier League striker Chris Sutton.

  Brentford forward Ivan Toney should not move to Saudi Arabia while he is at his "peak", says former Premier League striker Chris Sutton. The Bees rejected a £35m bid for the 28-year-old from Saudi Pro League side Al-Ahli last week. Brentford left Toney out of the side which beat Crystal Palace 2-1 on Sunday because of "transfer interest", but Sutton says the England striker should choose to stay in the Premier League. “At this stage of his career, I think Saudi is a no-no," Sutton told the BBC's Monday Night Club on 5 Live. "He has proven himself in the Premier League and he has all the attributes. His link up, his physicality, set-piece [ability] and his all-round play have developed really well. "You can have all the money in the world but this is Ivan Toney at his peak and I would like to see him stay in the Premier League. I would go to Saudi Arabia when I was 35 and past it."

