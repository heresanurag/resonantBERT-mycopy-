title: Emerging DJs 'blown away' by Radio 1 Ibiza slot - BBC News
date: '2024-08-02'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c87rz837r66o
content: |-
  Radio 1's Dance Weekend is in Ibiza, with opening slots reserved for Shelly and Boo.

  DJ Boo first got into making music during the pandemic and has dreamed of playing Ibiza

  Two up-and-coming DJs say they're "blown away" after being surprised with slots at Radio 1's Dance Weekend in Ibiza. Boo and Shelly won a competition run by the station and BBC Introducing to open the festival at venue 528 Ibiza. "I'm still pinching myself," says Shelly, 18, from Suffolk. "Wow, this is actually really happening." They'll be performing alongside the likes of Hannah Laing, CamelPhat and Gorgon City.

  "It's massive," says Shelly - real name Theo. "It's nice to be in a line-up with them but also just have the experience to see them. "To be in the same place them is crazy."

  Boo, from Teesside, tells BBC Newsbeat she manifested DJing in Ibiza after first getting into producing during the pandemic. "It's somewhere I've always wanted to play," she says. "I wrote it on a list of goals on New Year's Eve and I was just so happy that it was actually going to happen this year." "It's so iconic," she says, adding she's looking forward to "meeting everybody and connecting with new people and just sharing music".

  Shelly and Boo will perform at the start of the festival on Friday night

  The pair were surprised with the news they were heading to Ibiza by Jaguar on Radio 1 Dance last month. Jaguar got them on the show under the guise of getting to know the DJs who'd entered the competition before telling them they had won. Each of BBC Music Introducing's 20 regional shows sent an entry to a panel of Radio 1 DJs and producers before the winners were decided. Boo says it's an "amazing opportunity" for an artist at the start of her career. "Coming from such a remote area where there's not really that much of a scene, it's challenging," she says. "It's difficult because I'm still breaking through." Shelly, who's been creating and mixing UKG, jungle and techno for the past five years, says he was "in shock" when he was told but "amazement is probably the word to describe it best". The dance music scene in Ibiza is "monumental", he says. "I think for every DJ and producer it's the place to be. "It's every DJ's dream to play even a small club so to be playing somewhere like 528, it's massive."

