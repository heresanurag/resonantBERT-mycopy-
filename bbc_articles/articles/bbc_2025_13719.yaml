  Since his return to the White House, US President Donald Trump has promised mass deportations of undocumented immigrants. Arrests made by ICE officers have increased during Trump's second term. Trump said he had deployed 2,000 National Guard troops to California to deal with the unrest over the immigration raids, saying the federal government would "step in and solve the problem". But the Democratic governor of California has appealed to Trump to pull National Guard units out of the city, accusing the White House of inflaming tensions. Stern said: "The communities in LA are very tight and very close-knit. "So an outside organisation like ICE coming in and removing - whatever you want to call it, removing, kidnapping, abducting people from the community - is not going to go down well at all."

  Demonstrations against immigration raids have been taking place in LA since Friday

  Stern said he had also sustained injuries after being hit by non-lethal rounds while covering protests in LA in 2020 in the aftermath of George Floyd's death. George Floyd - an unarmed Black man - was killed during an arrest by white police officer Derek Chauvin in 2020. Chauvin was sentenced to 22 years in jail for his murder.
