content: |-
  Maia Bouchier (left) and Freya Kemp are part of a 13-player Test squad

  Maia Bouchier and Freya Kemp could make their Test debuts after being included in the squad for England's tour of South Africa. Batter Bouchier, 25, and 19-year-old all-rounder Kemp are the two uncapped members of a 13-player group for the sole Test in the multi-format tour. Both players are also included for the three T20s and three one-day internationals but, as expected, Alice Capsey is omitted from the T20 and Test list. Batter Paige Scholfield is named for the T20s after making her England debut against Ireland in September, all-rounder Danielle Gibson misses out following knee surgery and pace bowler Lauren Filer is included in all three squads. Filer was not part of the team that suffered a shambolic group-stage exit at the T20 World Cup last month. All-rounder Capsey, 20, is the highest-profile casualty from that tournament, when England failed to make it out of their group.

  Bouchier, who has played 51 white-ball games for England, could play a Test for the first time as part of the top six. It was Bouchier who put down three of England's five dropped catches in the T20 World Cup defeat by West Indies. Kemp, a left-hand batter and left-arm seamer, first played for England in limited-overs cricket as a 17-year-old and is back to full bowling fitness after a back injury. England travel to South Africa on 16 November, with the series beginning on 24 November. It will form the final part of their build-up to the Ashes series in Australia in early 2025. England are also due to announce a new list of central contracts, deals that will include pay rises for the players.
