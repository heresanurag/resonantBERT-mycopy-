title: Royals celebrate NHS anniversary with George Cross and tea party - BBC News
date: '2021-07-04'
section: UK
url: http://www.bbc.co.uk/news/uk-57714088
content: |-
  The Queen awards the NHS the George Cross while Prince William attends a thanksgiving service.

  The Duke of Cambridge arrived alone for the service as his wife is self-isolating

  The Royal Family has celebrated the 73rd anniversary of the NHS with the award of the George Cross and a cathedral service.

  In a personal message, the Queen said NHS staff across the UK had worked "with courage, compassion and dedication" for more than 70 years.

  The Duke of Cambridge joined NHS staff at a thanksgiving service at St Paul's Cathedral in London.

  He later hosted a Buckingham Palace tea party to thank NHS workers.

  The Duchess of Cambridge had been due to join him for the events, but is now self-isolating after coming into contact with someone who later tested positive for Covid.

  The George Cross, instituted by King George VI in 1940 during the height of the Blitz in World War Two, is awarded for "acts of the greatest heroism or of the most courage in circumstances of extreme danger".

  In her handwritten message, the Queen wrote: "It is with great pleasure, on behalf of a grateful nation, that I award the George Cross to the National Health Services of the United Kingdom.

  "This award recognises all NHS staff, past and present, across all disciplines and all four nations.

  "Over more than seven decades, and especially in recent times, you have supported the people of our country with courage, compassion and dedication, demonstrating the highest standards of public service.

  "You have our enduring thanks and heartfelt appreciation."

  A copy of the handwritten message from Queen Elizabeth II in support of the award of the George Cross to the NHS

  NHS England chief executive Sir Simon Stevens said the award recognised the "skill and fortitude" of NHS staff, who had responded to "the worst pandemic in a century and the greatest challenge this country has faced since World War Two".

  Prof Stephen Powis, NHS England medical director, said he could not be "prouder and more humbled" by the work of his medical colleagues, adding that the reward recognised the contribution of the NHS since inception as well as over the last 18 months.

