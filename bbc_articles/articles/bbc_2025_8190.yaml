  In response, Sir Elton thanked Madonna for "forgiving me and my big mouth". The singer added that he was not proud of what he had said over the years, especially considering Madonna's "ground-breaking work... paving the way for an entire generation of female artists to succeed and be true to themselves". "I'm increasingly distressed by all the divisiveness in our world at the moment," he said in a comment on her Instagram post. "By pulling together, I'm hopeful that we can make great things happen for those who really need support, and have a lot of fun doing it."
