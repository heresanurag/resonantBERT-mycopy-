title: We set the theme, you take the pictures - BBC News
date: '2024-04-21'
section: In Pictures
url: http://www.bbc.co.uk/news/world-10768282
content: |-
  Each week, we ask you to send in your pictures on a set theme and a selection of these are then published each Thursday on our In pictures page

  Each fortnight, we ask you to send in your pictures on a set theme and a selection of these are then published on our In pictures page and BBC social media.

  Interpret the theme in any way you see fit and then send your pictures to us directly from your computer here. Alternatively, you can email them to us at yourpics@bbc.co.uk.

  If sending them by email please include the theme in the subject line of your message.

  Remember to add your name and a caption: who, what, where and when should be enough, though the more details you give, the better your chance of being selected.

  You can enter up to three images per theme and these can have been taken at any time. A gallery of the selected photographs will be published on the Sunday following the closing date for each theme. You can see previous entries below.

  Pictures should be sent as Jpeg files.

  Please see our terms and conditions.

  Finally, when taking photos, please do not endanger yourself or others, take unnecessary risks or infringe any laws.

  If you have any questions then please email: viewfinder@bbc.co.uk
