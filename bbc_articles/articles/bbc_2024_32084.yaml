title: 'Welsh Tories: Andrew RT Davies narrowly survives leadership vote - BBC News'
date: '2024-12-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/cewx12kpepko
content: |-
  The Welsh Conservative's Senedd leader has narrowly won a vote of confidence.

  Andrew RT Davies has survived as Welsh Conservative leader in the Senedd after he narrowly won a vote of confidence of Tory politicians. But BBC Wales understands the Senedd Tory group was split, with nine including Davies voting for backing his leadership, versus seven against. The vote was called after some of his Senedd members raised concerns with him last week. He has been under pressure since the summer amid controversies connected to his social media presence, and the direction of the party.

  The vote took place in a meeting room on the Senedd estate on Tuesday morning. It was followed by another meeting of the group. Davies has been the Senedd Conservative leader for most of the last 13 years, with a short break between 2018 and 2021 when Paul Davies held the role. He took over the party group after his predecessor Nick Bourne lost his seat in 2011. He has faced internal criticism from some Westminster Conservatives about the direction of the party, and whether they are giving voters an alternative vision. Former Welsh Secretary Stephen Crabb has suggested a refresh may be needed before the next Senedd election in 2026. It comes after a poll at the weekend suggested the Conservatives were in fourth place in Wales, behind Plaid Cymru, Reform and Labour. In the summer comments about halal meet led to accusations from a Muslim group of "race-baiting". Bourne also criticised a message on X which showed Davies asking constituents if they think the Senedd should be abolished. Supporters of Davies say he is taking on the threat of Nigel Farage's Reform UK, while opponents are concerned the party is not trying to broaden its support.
