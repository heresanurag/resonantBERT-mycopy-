title: Cyclone Belal submerges cars in Mauritius and batters Reunion - BBC News
date: '2024-01-15'
section: General
url: http://www.bbc.co.uk/news/world-67984044
content: |-
  Torrential rain and flooding hit islands in Mauritius and Reunion, leaving homes without electricity.

  Cyclone Belal has struck the Indian Ocean islands of Mauritius and Reunion, bringing strong winds and heavy flooding.

  Video shows people stranded on the roofs of cars submerged on flooded roads in Mauritius.

  The Red Cross said that on the French island of Reunion one person has died and more than 600 people have been temporarily displaced. Authorities have warned people not to go outside, as the the cyclone brought torrential rain and winds gusting up to 250 km/h (155mph)

  French President Emmanuel Macron posted a message on social media promising state support to the residents of the French overseas region.
