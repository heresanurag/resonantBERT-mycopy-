  \ content of external sites.\n\nCommenting on social media, Sarah Griffith who runs\
  \ the charity Bridge2 in Guernsey, said she would be becoming a member of Dignitas\
  \ as a result of the vote, adding \"I was hoping I would not have to make that decision\
  \ but now I have to.\"\n\nShe added that it was a shame it had taken assisted dying\
  \ proposals to prompt the States of Guernsey to improve its palliative care programme.\n\
  \nAnti-euthanasia campaign group Care Not Killing said it welcomed the \"powerful\
  \ rejection\" of the proposals.\n\nThe group's campaign director Dr Peter Saunders\
  \ described the plans for assisted dying as \"dangerous\" and said island politicians\
  \ had recognised \"the erosion of so called safeguards\" in other places which had\
  \ allowed assisted dying, including the US.\n\nDeputy Gavin St Pier, the island's\
  \ most senior politician and champion of the proposals, said: \"The important thing\
  \ is we've brought this topic up the agenda, it hasn't been debated (in Guernsey)\
  \ for 14 years, we've now had a debate, a conclusion has been reached - we accept\
  \ that result.\"\n\nHeidi Soulsby, president of the Committee for Health and Social\
  \ Care, said although rejecting the proposals was right, she does not know anyone\
  \ who would be \"pleased\" with the result of the emotive debate.\n\nDuring the\
  \ debate she said she was sure an assisted dying regime \"would eventually come\
  \ to pass\" in the island, but now was not the time.\n\nThe best way to get news\
