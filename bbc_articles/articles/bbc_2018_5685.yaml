id: bbc_2018_5685
title: Guernsey's politicians vote to reject assisted dying - BBC News
date: '2018-05-18'
section: Guernsey
url: http://www.bbc.co.uk/news/world-europe-guernsey-44153575
content: "The island would have become the first place in the British Isles to allow\
  \ assisted dying.\n\nThose behind the call were disappointed but not surprised when\
  \ it failed\n\nGuernsey's government has rejected proposals that may have seen assisted\
  \ dying legalised in the future.\n\nHad it been approved, the island could have\
  \ become the first place in the British Isles to allow assisted dying.\n\nAfter\
  \ a three-day debate, the proposals were rejected.\n\nThe plans would have prompted\
  \ a lengthy consultation period before a legal framework was presented back to the\
  \ island's politicians.\n\nHowever, politicians did agree to a review of palliative\
  \ and end-of-life care due to an anticipated \"substantial increase\" in healthcare\
  \ needs for the island's ageing population.\n\n\"Measures necessary to improve quality\
  \ of life and health outcomes for all islanders towards the end of their lives\"\
  \ will be investigated.\n\nPoliticians who supported the introduction of assisted\
  \ dying said they were \"disappointed\" with the result, although described it as\
  \ \"not entirely unexpected\".\n\nSarah Wootton, chief executive of Dignity in Dying\
  \ which campaigns for assisted dying in the UK, said despite the defeat the debate\
  \ had shown there was \"immense public support for change\".\n\nThis Twitter post\
