content: |-
  Details and reaction to the first minister's briefing on the day Wales goes into lockdown again.

  Supermarkets say they have been given "very little time" to implement changes announced ahead of tonight's firebreak lockdown.

  A spokesperson for Asda said: “The Welsh Government’s firebreak regulations means that we can only sell products they deem to be essential.

  “We have been given very little time to implement these changes or clarity on what is deemed ‘essential’."

  The store chain expressed "deep concerns about the implications for customers accessing products they genuinely need and the risk to colleagues' safety".

  “We will continue to do our utmost to keep our customers and colleagues safe and would appeal to our customers to be patient when they shop with us and to continue to treat our colleagues with respect as they do their best to help them understand the new regulations,” said the spokesperson.

