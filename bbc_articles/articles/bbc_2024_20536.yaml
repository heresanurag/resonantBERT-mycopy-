title: Civil Service Commissioner Baroness Gisela Stuart launches cronyism probe -
  BBC News
date: '2024-08-30'
section: Politics
url: http://www.bbc.co.uk/news/articles/cewlzrzqep4o
content: |-
  A review of appointments to some Government jobs has been launched after accusations of cronyism.
  Labour has defended the appointment of three people to top civil service jobs who are also linked with donations to the party.

  A review of appointments to some government jobs has been launched after accusations of cronyism. Labour has defended the appointment of three people to top civil service jobs who are also linked with donations to the party. The Conservatives have claimed the appointments are evidence of a “culture of cronyism” in government. Civil Service Commissioner Baroness Gisela Stuart has now written to government departments confirming a review of appointments since the general election.

  Baroness Stuart, a former Labour MP who is now a crossbench peer, explained the review will focus on “exceptions” allowing appointments to be made outside the normal process in certain circumstances, such as when people have particular skills. She said: “Given interest in a number of recent civil service appointments by exception and the importance of public trust in these appointments, the commission has decided to undertake a short review of appointments.” In opposition, Labour often accused the Conservatives of "cronyism" in appointing political allies to public bodies. So eyebrows were raised when Labour donor Ian Corfield was appointed to a Treasury role to help deliver an October investment summit. Mr Corfield is a former banker who has donated a total of £20,000 to Labour MPs including £5,000 to now-Chancellor Rachel Reeves in 2023. Jess Sargeant, who previously worked for think tank Labour Together, has been appointed as deputy director in the Cabinet Office's Propriety and Constitution Group. And Emily Middleton was named a director general in the Department for Science, Innovation and Technology (DSIT), where the secretary of state is Peter Kyle. She was previously a partner at consultancy firm Public Digital, which paid for her secondment to Mr Kyle's office in opposition - a donation-in-kind of more than £65,000. She was also seconded to Labour Together. Conservative MP John Glen, shadow paymaster general, said: “I welcome that the commission has backed our calls for a review into Labour’s crony appointments. "As the first step, we need full transparency from the government on every 'exceptional' appointment they have made since the general election. "Keir Starmer can no longer try to brush this under the carpet." Liberal Democrat Cabinet Office spokesperson Christine Jardine said a review was important "to ensure no rules have been broken" and called for the Ministerial Code to be enshrined in legislation. She said: "It is so disappointing that yet again there are questions being raised over government appointments after the sleaze and scandal that mired our politics throughout the previous Conservative administration." A Cabinet Office spokesperson said the government would work with the independent commission and fully supported the review. “All civil service appointments must follow the correct rules and processes," they said. In a letter, external published on X, Labour MP Siobhain McDonagh asked Baroness Stuart - who was appointed, external under Boris Johnson's government in 2022 - whether she would also be reviewing certain appointments made by the previous government.

