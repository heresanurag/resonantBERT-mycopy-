title: 'Westbury Road: Murder arrest after four die in Bradford fire - BBC News'
date: '2024-08-21'
section: England
url: http://www.bbc.co.uk/news/articles/cp9r48nzx33o
content: |-
  A 29-year-old woman, two girls aged one and nine, and a five-year-old boy died after the Bradford fire.

  Mum and three children who died in fire named

  Bryonie Gawith and her three children all died in the fire

  Police have named the mother and three children who died following a house fire in Bradford in the early hours of the morning. Bryonie Gawith, 29, and her daughter Denisty Birtle, nine, son Oscar Birtle, five, and daughter Aubree Birtle, 22 months, died after the incident on Westbury Road. A 39-year-old man was arrested at the scene on suspicion of murder and had been taken to hospital with critical injuries. West Yorkshire Police confirmed the family's names at a news conference at the scene on Wednesday afternoon and also stated that they believed the incident was "domestic" in nature.

  Denisty, Oscar and Aubree Birtle all died in the fire

  Det Ch Insp Stacey Atkinson, from West Yorkshire Police, said: “This is an absolutely devastating incident in which three children and a woman have lost their lives. "Our thoughts remain with their family, friends and loved ones. "Whilst enquiries are in their early stages, we believe that the fire was started deliberately, and that this incident was domestic related. “Specially trained officers are supporting the family, and my neighbourhood officers are in the area carrying out reassurance patrols." She added: “I would appeal to anyone who was in the Westbury Road area at the time of the incident or who has CCTV or doorbell footage to come forward."

  An aerial view of the fire-damaged house

  Lyndsey Pearson, who lives near the scene, said people in the community had been left "devastated" by what had happened. Ms Pearson said she was alerted to the blaze in the early hours of the morning by blue flashing lights, while her daughter had said she could smell smoke. Speaking to the BBC, she said: "At first we thought it was a car on fire. We came out, but [the emergency services] wouldn't let us past. "They said it was a house fire and there were people inside. We could hear shouting. "I just feel sick. It's horrible. I just wanted to help, but what can you do? I've got grandchildren myself, so you think about them." Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
