title: Denise Welch surprised with special prize at British Soap Awards - BBC News
date: '2025-06-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/ce39787pxlqo
content: |-
  The actress was recognised for having appeared in EastEnders, Hollyoaks, Emmerdale and Coronation Street.

  Martin Kemp surprised Denise Welch with a special award just before the pair presented best newcomer

  Actress Denise Welch has been honoured with a special prize at the British Soap Awards, in recognition of her appearances in Emmerdale, Coronation Street, Hollyoaks and EastEnders. Welch was due to present the award for best newcomer at the ceremony, but was taken by surprise when it was revealed she was in fact about to receive a special award herself. Welch said "thank you so much" as she received a trophy which referenced all four shows, before joking that she didn't mind which show won best soap at the event, because "I've been in all of them". The ceremony took place last weekend but was broadcast on ITV on Thursday, with some viewers affectionately declaring Welch the "Queen of England".

  Welch was due to present best newcomer at the event, and walked on stage alongside former EastEnders star Martin Kemp, as the category was introduced. However, once at the podium, Kemp said: "Before we go any further, there is something very special that I need to mention. "Now, this year, Denise appeared in Emmerdale as a juror in Tom King's court case. "This means she's officially the only actor to have had a major part in Coronation Street, Hollyoaks, EastEnders and Emmerdale. So, Denise tonight we want to give you a special award."

  Welch has appeared in EastEnders (pictured in 2016), Coronation Street, Hollyoaks and Emmerdale

  Kemp's wife Shirlie then joined the pair on stage to hand over the CHEE award to Denise - so named because each letter represented a soap she had been part of. The trophy included memorable items from each show, including a cobblestone from Coronation Street, a wellington boot from Emmerdale, a label from The Dog in the Pond pub in Hollyoaks, and one of EastEnders character Pat Butcher's earrings. Denise accepted the award, saying, "Thank you so much!" before adding: "Hey, Mum and Dad, I've won a CHEE." She added jokingly: "I was going to say, when the press say, 'Who do you want to win best soap?' I say, 'Well, I don't mind because I've been in all of them.'" Viewers shared their reaction and well wishes on social media as the moment was broadcast, with one saying they were "crying" and another commenting it was "nice to see her get an award", while one viewer declared Welsh "the Queen of England". EastEnders was the big winner of the night, taking home eight prizes including best British soap. The ceremony was held at the Hackney Empire and hosted by singer and Loose Women star Jane McDonald.
