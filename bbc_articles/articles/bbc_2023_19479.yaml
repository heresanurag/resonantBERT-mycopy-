title: Homeless man soaked by McDonald's guard speaks out - BBC News
date: '2023-12-12'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67682933
content: |-
  Aaron McCarthy says he was left to feel like "nothing" when a security guard soaked his bedding.

  This video can not be played To play this video you need to enable JavaScript in your browser. The workers were confronted by members of the public. Credit: @damocrat

  A homeless man who was filmed being soaked by a McDonald's security guard has said he was made to feel "like I was nothing".

  Aaron McCarthy, 25, said his bedding was left unusable after the worker threw water over the pavement where he was sitting.

  A McDonald's spokesperson said the firm had "permanently removed" the "third-party security guards involved".

  Mr McCarthy said McDonald's had also bought him new bedding.

  After the incident, Mr McCarthy said he was given money which enabled him to stay in a hotel for the night.

  He said he didn't blame the fast-food chain, and said it had apologised to him. Mr McCarthy said he did plan to follow up with the yet unnamed external security company.

  A video of the guard's actions, filmed by a bystander, showed the worker kicking Mr McCarthy's belongings away as he cleaned the ground on Victoria Street on Saturday.

  Mr McCarthy told the BBC: "Most people think we're just all drug addicts; no, I don't chose to be out here, I don't want to be out here."

  "I'm only 25 years old - I've been out here since I was 17."

  Aaron McCarthy said he doesn't leave his usual spot outside McDonald's

  Homeless charity Crisis told the BBC it condemned the actions of the security guard.

  Crisis CEO Matt Downie said: "It's appalling to see people mistreated like that."

  Westminster Council said it would also be offering support.

  It said it was very concerned to see the video and would also be raising the issue with McDonald's.

  Footage of the incident posted on social media showed the security guard soaking the pavement where the man had been sitting with his sleeping bag outside a Nationwide bank branch, next door to the McDonald's.

  In the video, the rough sleeper said "leave me alone" before one security guard kicked his blanket out of the way and splashed more water along the pavement.

  Mr Downie from Crisis said "There's a climate of this going on at the moment.

  "The recent comments from the (now former) home secretary saying that homelessness was a lifestyle choice have not helped at all.

  "Words really do have consequences and we end up in situations like this where people are more likely to be abused and mistreated in this way."

  Damon Evans, who filmed the incident, could be heard telling the security guard "you're covering his sleeping bag" and he and other witnesses described the situation as "outrageous behaviour" and called it "disgusting" and "bang out of order".

  A spokesperson for McDonald's said they were "shocked and saddened by this incident".

  They added: "The restaurant team has been reminded of the importance of treating all people with respect including vulnerable people both in the restaurant and within the wider community.

  "We would like to wholeheartedly apologise to the gentleman in the video and will work with the council to locate him and make amends, as part of our continued support for homelessness charities and organisations across London."

  Suella Braverman's office has been approached for comment.

