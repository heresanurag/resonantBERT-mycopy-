content: |-
  Great Britain's men come from behind for the third match in a row to beat France and seal a quarter-final place at Yves-du-Manoir Stadium.

  This video can not be played To play this video you need to enable JavaScript in your browser. Great Britain into men's hockey quarter-finals with win over France

  Great Britain's men came from behind for the third match in a row to beat France 2-1 and seal an Olympic quarter-final place at Yves-du-Manoir Stadium. GB had the better of the early stages but, with 46 seconds remaining in the second quarter, France's Timothee Clement was in the right place to bundle past keeper Ollie Payne. Zach Wallace's powerful conversion from a penalty stroke brought GB level with the host nation to quieten the partisan crowd. James Albery then picked a fine moment to register his first senior goal for GB, slapping the ball goalwards and seeing it diverted beyond the French keeper. The win moved Britain up to second in the group, with the top four teams advancing to the knockout stages.

  Britain, Germany, the Netherlands and Spain have all secured their last-eight spots but, with two games remaining, GB's aim now is to top the group. "France fought for every inch but I'm very proud of our guys, the way we've fought back consistently over the last three games," said captain David Ames. "We have a never-say-die attitude. This team wants to fight for each other and we're doing whatever it takes to win. "Quarter-finals, yes, it's a nice one - but ultimately this team wants to stand on the podium." Britain's men have not won a hockey medal since their gold at Seoul in 1988. They reached the quarter-final stage in Tokyo three years ago, losing 3-1 to India. Britain's women, who picked up their first win on Wednesday, face the United States at 16:00 BST on Thursday.

  Great Britain's men are bidding for a first Olympic medal since 1988
