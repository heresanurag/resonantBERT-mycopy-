content: |-
  Tottenham manager Ange Postecoglou says he "didn't like what was being said" by some Spurs fans after their defeat by Bournemouth.

  'I didn't like what was being said' - Postecoglou on fan confrontation

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Tottenham manager Ange Postecoglou says he "didn't like what was being said" by some Spurs supporters after their defeat by Bournemouth - but that "you've got to cop it". In the immediate aftermath of their 1-0 loss at Vitality Stadium, Postecoglou pointed at a group of Tottenham fans who were voicing their anger and marched across the pitch towards the away end to confront them. Words were exchanged before a steward attempted to defuse the situation by waving the 59-year-old Australian away. "They're disappointed and rightly so," said Postecoglou in his post-match news conference. "They gave me some direct feedback, which I've taken on board. "I didn't like what was being said because I'm a human being but you've got to cop it. "I've been around long enough to know that when things don't go well you've got to understand the frustration and disappointment. And they're rightly disappointed because we let a game of football get away from us. But that's OK. I'm OK with all that. "All I can say is I'm really disappointed and I'm determined to get it right and will keep fighting until we do." Tottenham's defeat by Bournemouth leaves them 10th in the Premier League table, one place below the Cherries. It was Spurs' sixth league defeat this season, with only five sides in the top flight having lost more games than them. "It comes down to us as a collective being a lot more determined to control a game of football and not let the opposition take control," added Postecoglou.

  Ange Postecoglou confronted a group of Spurs fans after Tottenham's loss to Bournemouth

  Tottenham have only won one of their past six matches, a 4-0 victory at Manchester City - which now feels like an outlier. "I now know what people mean when they say Tottenham are like Jekyll and Hyde," said former Stoke boss Tony Pulis on BBC Radio 5 Live. "They have been really poor tonight." Spurs managed 12 shots, four on target - about half the total of Bournemouth - but their expected goals was only 0.58, compared to Bournemouth's 3.31. Former England striker Les Ferdinand, who played for Spurs between 1997 and 2003, said on Amazon Prime: "Tottenham didn't look like they could score today. "I thought Spurs could only be better in the second half and they were slightly better, but there was no urgency. We didn't know what Spurs was going to turn up tonight - and that wasn't the Spurs we wanted." Bournemouth also had a goal disallowed for offside and hit the post in a game they should really have won by more. Former England striker Alan Shearer called it "a terrible performance" from Spurs. "I was really surprised they came out with the same team after half-time because they needed some energy and freshening up," he said. "I never felt they were ever going to score tonight."

