title: 'Watch: Fire engulfs high-rise and sprays embers over UAE city - BBC News'
date: '2023-06-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-66027205
content: |-
  Residents are evacuated after a fire rips through a high-rise residential building in Ajman.

  Residents were evacuated after a fire spread through a residential building in the city of Ajman. Police said teams were able to extinguish the blaze and nobody was injured.

  A large fire tore through two apartment towers in the same complex in 2016.
