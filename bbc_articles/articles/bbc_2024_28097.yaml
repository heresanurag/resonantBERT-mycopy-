title: Spa refused Warrington woman a massage 'because she has cancer' - BBC News
date: '2024-11-16'
section: England
url: http://www.bbc.co.uk/news/articles/ce31e5z24ygo
content: |-
  Sindy Sidhu is calling for the misinformation around massage treatments for cancer patients to be addressed.

  'Spa refused me a massage because I have cancer'

  Sindy Sidhu was diagnosed with ovarian cancer in 2021 and said she was told she could not have a massage at a spa

  A woman who was turned away from a massage at a spa because of her illness has backed calls to tackle the "misinformation" around treatments and their suitability for cancer patients. Sindy Sidhu from Warrington said she now felt too intimated to try other spas after her negative experience. She has instead been getting help from the Made For Life Foundation, a charity fighting for spas and salons to end policies banning staff from treating cancer patients. Carden Park Spa in Cheshire has backed the campaign, and director Emma Pridding, admitted the industry "had been a little guarded" in treating those with cancer due to insurance concerns and false fears it could cause harm.

  The charity says some spas are "misinformed" about how to treat cancer patients

  Made For Life Foundation founder Amanda Winwood said a large proportion of the women who attend her events have been turned away from some spas, salons, or independent therapists. She told BBC Radio Manchester that there was a huge lack of awareness about how to look after people with cancer in the spa community. She said that this started at college level as some spa therapists were trained that it was harmful to massage cancer patients. Ms Winwood added that another factor that contributed to this issue was insurance companies. She said: “Often insurance companies will refuse to insure spas to welcome people with cancer, which is an absolute travesty as far as I’m concerned, and contravenes the Equality Act 2010.” Under the Equality Act, cancer is classed as a disability and therefore all anti-discrimination laws apply to people with cancer or those who have had cancer in the past. In the past it was thought that having a massage when you have cancer may make the cancer cells travel to other parts of the body. However, Cancer Research UK have since stated that no research has proved this to be true. A spokesperson for complimentary therapies at The Christie Cancer Hospital said "historically there had been some misunderstandings about the safety of offering massage to patients with cancer". The caution was "understandable when spas were first open" but research has shown massage for patients can be "highly beneficial to their physical, psychological, and emotional health and wellbeing", they added. "However, deep tissue massage is best avoided, and it's crucial to provide the therapist with your full medical history so they can identify any contraindications and adjust your treatment accordingly.”

  Ms Sidhu now attends Tea and Therapy events run by the Made for Life Foundation

  Ms Sidhu, 60, was diagnosed with ovarian cancer in 2021, and said that "touch is something that you do need". She added that after ticking that she had cancer on a form, a spa informed her that she could not have any of the treatments. Ms Sidhu continued: "Now I don't ask the question. "It's ironic because I have a therapist at the hospice that gives me massages but when it comes to spas, I don't ask because I felt quite intimidated, and I don't want to feel like that again." Ms Sidhu instead started attending Tea and Therapy events, a wellbeing event for people with cancer, where they can socialise, receive guidance, and get massages.

  Tea and Therapy is run across the UK by Amanda Winwood, founder of the Made for Life Foundation and Jamie Edwards, a performance coach from Manchester. It aims to offer a safe space for women with cancer, acting as a temporary solution for the issues within some parts of the spa industry. Ms Winwood said: "It’s important to have facilities like this to stop the social isolation that happens when you get a cancer diagnosis. Mr Edwards added: “Change needs to happen. The impact of having these events is going to be down the road and we can only do that by speaking about it, having conversations and not avoiding the difficult topics.”

  If you, or someone you know, have been affected by cancer, visit BBC Action Line for information on where you can access support.
