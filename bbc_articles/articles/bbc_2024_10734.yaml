  The party also gained 10 new police and crime commissioners (PCCs) from the Conservatives, leaving both parties with a total of 17 each. Plaid Cymru's PCC candidate won in Dyfed-Powys. Meanwhile, the Liberal Democrats are celebrating gaining more than 100 councillors and taking control of the councils in Dorset and Tunbridge Wells. However, it missed out on securing a majority of seats in its target areas of West Oxfordshire and Wokingham. Party leader Sir Ed Davey said: "Up and down the country Conservative MPs will be looking over their should terrified of the Liberal Democrats who have won more seats than them in this election." The Green Party hailed a "record breaking campaign" after winning a total of 181 council seats, an increase of more than 70. Reform UK performed strongly in the Blackpool South by-election coming just 117 votes behind the Conservatives. George Galloway's Workers Party of Britain won four council seats including one in Manchester where they unseated Labour's deputy leader of the council Luthfur Rahman. The Women's Equality Party won its first council seat when Stacy Hart was elected to Basingstoke and Deane Borough Council.
