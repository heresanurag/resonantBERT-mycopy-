content: |-
  Liverpool miss the opportunity to go eight points clear at the top of the Premier League but did Arne Slot's side show title-winning character against Fulham?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Liverpool may have dropped points against Fulham - but the performance given by Arne Slot's 10 men only served to reiterate their title credentials. Twice the Premier League leaders fell behind following Andy Robertson's 17th-minute red card, and on both occasions they found an answer despite their numerical deficit at Anfield. Liverpool played 89 minutes with 10 players, including stoppage-time, but an 86th-minute equaliser by the returning Diogo Jota earned reward for their impressive efforts in an enthralling encounter. Perhaps the biggest compliment on Saturday was offered by Fulham's Antonee Robinson. "Credit to them, it didn't feel like they had 10 men at all," the left-back said. "They took a lot of risks pushing men high and they were rewarded for it. They piled the pressure on and were really positive."

  This video can not be played To play this video you need to enable JavaScript in your browser. Match of the Day: How 'brave' Fulham & 'fighting' Liverpool earned deserved draw

  Not only did Liverpool battle to a point despite the circumstances, but title rivals Arsenal failed to capitalise as they were held to a goalless draw by Everton. It meant the Reds, who saw their advantage cut after last weekend's Merseyside derby was postponed because of severe weather, extended their lead to five points before nearest challengers Chelsea host Brentford on Sunday (19:00 GMT). "Liverpool were phenomenal. They went down to 10 men and didn't feel sorry for themselves," former Premier League striker Chris Sutton told BBC Radio 5 Live. "It was a brilliant game. I thought Liverpool were phenomenal in the face of adversity." Liverpool have won 19 and lost just one of 23 games since Dutchman Slot replaced Jurgen Klopp in the summer, and they also sit top of the Champions League table with a perfect record in that competition. With 10 men, against a Fulham side enjoying the club's best start to a Premier League season since 2003, the Reds still ended the match with more than 60% possession and led a host of attacking metrics including shots, big chances and touches in the opposition box. The trick, according to Liverpool captain Virgil van Dijk, was to "stay calm" - although he added that is "easier to say than do". "A great comeback, it is very positive. It's disappointing having 10 men but we showed fight," Van Dijk told Sky Sports.

