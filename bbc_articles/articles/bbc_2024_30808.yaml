  There were no complaints from Slot regarding Robertson's early dismissal, after the left-back - earlier injured in a high tackle by Issa Diop - denied Harry Wilson a goalscoring opportunity. Instead, Slot praised Robertson for embodying the spirit shown by the side for the remainder of the match. "The character the team showed, that is what Robbo showed," Slot said. "Nothing to blame him [for], [only praise for] the character showed in wanting to continue because he got quite a hard knock. Unfortunately, it led to a deserved red card." On his team's performance, the Liverpool boss said: "I don't think I could've asked for more from my players, especially after going down to 10 men. "It's an emotional game and we were a man down. It's frustrating [but] it's good to see our performance after so many setbacks." He added: "Being a goal down twice, it's all going against you. I thought we were outstanding."
