title: Amazon delivery driver death in Wortley sparks murder inquiry - BBC News
date: '2024-08-21'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cq82777838po
content: |-
  The Amazon driver was killed as he tried to stop a thief stealing his van in Leeds, police say.

  A police scene remained in place in Heights Drive on Wednesday morning

  A delivery driver has been killed as he tried to stop a thief stealing his van in Leeds. The victim was found seriously injured in Heights Drive, Wortley, just before 19:00 BST on Tuesday, and later died. West Yorkshire Police said the van was driven off at speed with the man "still partly inside the passenger door". The courier, aged in his 40s, had returned to his Ford Transit after delivering an Amazon package nearby.

  Detectives said the victim had dropped a parcel off at a house half a mile away in Alliance Street around 15 minutes earlier, then returned to discover the attempted vanjacking. As the thief drove away at speed, with the courier in the door, the van struck two parked cars on Heights Drive and the man was left at the junction of Heights Way and Heights Bank. Members of the public gave first aid and the Transit was recovered about four miles away in Highlands Walk, Belle Isle, a short time later.

  The stolen van was recovered in Highlands Walk, Belle Isle, police said

  Det Ch Insp James Entwistle, of West Yorkshire Police, said: “Our investigation remains at an early stage but, based on what we currently know, this appears to be a truly shocking incident where the victim has been killed while going about his business as a parcel delivery driver. “His family has been informed and they are completely devastated. "We are working to support them at what is a really difficult time and are doing everything we can to get them the answers they need." Det Ch Insp Entwistle added that "extensive inquiries" were being carried out to establish what had happened and "to identify the person whose incredibly dangerous actions have been responsible for causing his death". The force urged anyone with information to get in touch. Amazon confirmed that the driver had been contracted to deliver parcels for the company. A spokesperson said: "This is a terrible incident and our thoughts and deepest sympathies are with the delivery driver's loved ones, family and colleagues at our delivery service provider. "We will do all we can to assist police with their investigations.”

  A woman living nearby said neighbours "rushed out" to help the victim

  A resident in Heights Drive, who gave her name as Miss May, told the BBC: "I saw the police go past and then I went down and saw a man being given CPR. "It's normally quiet around here. It's a bit of a shock. I've been here for 24 years." Another resident, who did not want to be named, said she was in her home when the incident happened and only witnessed the aftermath. "Lots of neighbours rushed out to try to help. Forensic investigators have been here all night," she said. "Happening during the day, it's really concerning and not pleasant. You just think, what's happening with people?" Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
