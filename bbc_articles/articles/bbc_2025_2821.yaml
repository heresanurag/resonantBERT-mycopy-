  'He's not a baby any more' - Van Gerwen on Littler

  Three-time world champion Michael van Gerwen has been beaten by Littler twice in 2025

  Michael van Gerwen has criticised world champion Luke Littler for his poor timekeeping after the 18-year-old arrived 45 minutes late for a media day in Belfast. Littler, who became the youngest world champion when he defeated the Dutchman last month, is one of eight players competing in the Premier League which starts in Northern Ireland on Thursday. The teenager from Warrington said he had overslept after taking a morning nap, which did not impress his colleagues. "They need to stop treating him like a baby. He's not a baby any more, he's 18 years old now," Van Gerwen said. "It happens. He has to learn. You have to learn the hard way. It's a professional sport so you have to be responsible for your actions. Simple as that. "If he turns up late for an interview, I don't mind. But seven other people are waiting for him. That's not very nice, is it?"

  The comments were laughed off by Littler, who is looking forward to renewing his rivalry with the three-time world champion Van Gerwen. "He's going to be up for it, he's going to be hungry but I'm up for it as the reigning champion. Whoever wins, it will be big for us," Littler said. "This is the biggest tournament I am going to defend all year around until the Worlds. I might feel nervous when it does come to the task, but there is always nerves, but I'm hoping to make a fast start like I did in the final. "The first win last year came here in Belfast, so I have got good memories here and I want to kick on." After their meeting in the World Championship final, the pair met again in the quarter-finals of the Dutch Masters two weeks ago with Littler again coming out on top. They are set to renew their rivalry again at the oche in Belfast on Thursday as they will face each other in their opening quarter-final of this season's Premier League. You can follow live text commentary on the BBC Sport website from 19:00 GMT on Thursday
