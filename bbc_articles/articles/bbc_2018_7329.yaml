title: '''Common sense has bust the system wide open'' - BBC News'
date: '2018-06-19'
section: General
url: http://www.bbc.co.uk/news/uk-44536008
content: |-
  The mother of a boy who takes medical cannabis says a review on its use could change thousands of lives.

  The mother of a boy who takes medical cannabis says the political process has been "bust wide open" after a review on the drug was announced.

  Charlotte Caldwell, whose son Billy takes medical cannabis oil, said the review is "on the verge of changing thousands of lives".
