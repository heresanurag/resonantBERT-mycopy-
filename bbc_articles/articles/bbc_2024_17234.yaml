  Choudary’s co-accused, Canadian Khaled Hussein, who was convicted of being a member of al-Muhajiroun, was jailed for five years, with an additional year on a supervision licence after his release. Earlier in the hearing, Paul Hynes KC, for Choudary, argued that whatever the jury’s verdict, al-Muhajiroun was nothing like al-Qaeda or Islamic State. “We are left with dense theological lectures which are not particularly accessible,” he said. “We do not see that the court is in a position... to conclude that Mr Choudary was gathering the masses. It was a failed organisation.”
