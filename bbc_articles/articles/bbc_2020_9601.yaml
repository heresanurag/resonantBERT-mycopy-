title: Latest on passenger train derailment near Stonehaven - BBC News
date: '2020-08-12'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-53751774
content: |-
  A train has derailed near Stonehaven in Aberdeenshire, sparking a major response from emergency services.

  How will an investigation into the derailment work?

  Kevin Lindsay is the organiser in Scotland for Aslef, the train drivers' union. He confirmed the driver was a member of the union. The organiser told BBC Radio Scotland's Drivetime programme how the derailment would be investigated. He said: "The rail accident investigation branch will come on site. They will investigate the train, the track, the signalling system, the performance of the train, the performance of the signalling, the performance of every train crew member who was on the train. "They will also look to see if everyone had sufficient rest, everything like that. The black box, which many people will be aware of is very similar to what's on an aeroplane, that will be examined to get as much information as possible. "And then as an industry we we will sit down and look to see what lessons we can learn to ensure that none of this can ever happen again". Ian Prosser, HM Chief Inspector of Railways, confirmed that inspectors from the Office of Road and Rail were on site at Stonehaven, assisting in the preliminary investigation.
