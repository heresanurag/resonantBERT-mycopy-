title: Jeremy Corbyn statement on UK military action in Syria - BBC News
date: '2018-04-16'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43789908
content: |-
  Jeremy Corbyn says this weekend's military action in Syrian is "legally questionable".

  Parliament should have the powers "to support or stop" a government decision to take part in military action, said Jeremy Corbyn, as he claimed this weekend's military action in Syria was "legally questionable".

  The Labour leader called for a war powers act, and told the prime minister she was "accountable to this Parliament, not the whims of the US president".
