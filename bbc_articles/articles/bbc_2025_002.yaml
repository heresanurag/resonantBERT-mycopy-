title: Welsh ambulance critical incident stood down but pressures remain - BBC News
date: '2025-01-01'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy89exyn4w5o
content: |-
  Bosses urge people to be mindful of calling 999 unnecessarily amid "significant pressures".

  People are being asked to continue being mindful about their use of the service as ambulance bosses stand down the 48-hour critical incident

  A critical incident declared by the Welsh ambulance service has been stood down. It comes after its boss urged people to "drink sensibly" at new year to help reduce demand, following a 340-call backlog on Monday. Bosses apologised to patients who waited "far too long" for an ambulance over the 48-hour period. "While the critical incident is behind us, significant pressures remain, and it's really important that the public play their part to protect our precious resources for those who need them most," added Judith Bryce, assistant director of operations.

  She asked people to continue to "only call 999 in a life-threatening emergency", and first consider if NHS 111 Wales symptom checkers, a local pharmacist, minor injuries unit or a GP would be more appropriate. "For anyone under the weather after New Year's Eve celebrations, consider what you can do at home to self-care, including for common ailments like coughs, sore throats and diarrhoea. "And while yellow weather warnings remain in place for heavy rain and high winds, please take extra care to avoid accidents on the road, as well as slips, trips and falls." On Tuesday, Jason Killens, the ambulance service's chief executive, said the critical situation was "very rare", as he issue a plea for people to use the service "wisely". High pressure on resources was also reported by health boards including Cwm Taf Morgannwg, Hywel Dda, Aneurin Bevan and Cardiff and Vale - which all announced new mask wearing measures last week amid a rise in flu cases. It is not the first time in recent years that a critical incident has been declared during the busy winter period, with high demand particularly in south Wales prompting one in December 2020, and an extraordinary incident declared in 2023 after an ambulance spent more than 28 hours outside a hospital. The Welsh government said urgent and emergency care services across Wales continued to see high levels of demand this winter and asked people to "carefully consider where to go for care".
