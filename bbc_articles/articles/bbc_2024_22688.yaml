title: Two-year-old boy dies after TV falls on him in Wigan home - BBC News
date: '2024-09-20'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c7815280vz7o
content: |-
  Carter Walsh died after a TV fell on him in what is believed to be a “tragic accident”, police say.

  The child was injured while at home in Fisher Close, Wigan

  A two-year-old boy has died after a TV fell at his home in what is believed to have been a “tragic accident”, police have said. Carter Walsh was rushed to hospital after he was injured in Fisher Close, Wigan, at about 14:15 BST on Thursday, Greater Manchester Police (GMP) said. He later died despite treatment from medics. A GMP spokesman said they were still examining the circumstances but believed it was “a tragic accident with nothing suspicious”.

  It is believed the TV dislodged before falling and that a fireplace was also involved. More than £1,000 has been raised via a Gofundme page in the toddler's memory.
