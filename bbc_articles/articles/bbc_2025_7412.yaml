  Weekly quiz: What kind of bread was crowned Britain's Best Loaf?

  This week saw pilgrims flock to Rome to pay tribute to the late Pope Francis, the US threaten to pull out of Ukraine peace talks, and Prince Louis celebrate his seventh birthday. But how much attention did you pay to what else has been going on in the world over the past seven days?

