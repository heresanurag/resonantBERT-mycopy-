content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  Residents have described the "mayhem" as tens of thousands of sun-worshippers descended on Bournemouth beach "with no idea of social distancing".

  Bournemouth, Christchurch and Poole Council declared a major incident after services were "completely overstretched" as huge numbers of visitors crowded on to the beach on Thursday.

  Pat Munday, 73, described how cars were double-parking and blocking driveways, preventing emergency vehicles from getting through, while people were using the gardens of her apartment block as a toilet on Wednesday and Thursday.

  "It was just mayhem, people just want to have a good time but they just don't give a monkey's about others," she said. "It's a shame, it's such a beautiful part of the country but people just need some control, people have lost all sense of respect - when they urinate in your garden, it's the pits."

  Vic Williams, 75, said: "There was no idea of social distancing, when we left at 14:00 the crowds were still arriving, there wasn't any two metres...because the restaurants are closed, there's nowhere else for people to go."

  He added: "The litter afterwards was unbelievable, they just walk away from the beach and leave their rubbish. There were tents left, BBQs - it costs us ratepayers a fortune."
