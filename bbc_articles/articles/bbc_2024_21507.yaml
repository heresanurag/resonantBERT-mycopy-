title: 'England v New Zealand: Allianz Stadium win would help undo World Cup final
  hex - Breach - BBC Sport'
date: '2024-09-10'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/ckg2r0yvdeeo
content: |-
  Beating New Zealand at the Allianz Stadium would help England end a run of five World Cup final defeats by the Black Ferns, says Jess Breach.

  Jess Breach ran in two tries in last weekend's win over France at Kingsholm

  Coverage: Watch live on BBC One, BBC iPlayer and online; updates on BBC Radio 5 Live; text commentary on BBC Sport website & app

  England wing Jess Breach believes facing New Zealand at Twickenham's Allianz Stadium will help the Red Roses vanquish a Rugby World Cup final curse next year. They face the Black Ferns at the 82,000-capacity venue on Saturday, hoping to extend a 16-match winning streak that began after New Zealand's win in the World Cup final in 2022. That was the latest in a series of New Zealand victories when the two teams have met in the sport's biggest game, with England also losing to them in the 2002, 2006, 2010 and 2017 finals. But Breach hopes next year's World Cup final - played at the same venue as this weekend's match - will have a different outcome. "It's incredible," said Breach of the prospect of playing at the newly renamed Allianz Stadium. "The more we play New Zealand, the more we get used to playing them and hopefully when it comes to that World Cup it will be a different story." England took some measure of revenge for their World Cup final defeat with a 33-12 win over New Zealand in Auckland in November and the teams will meet again in WXV in Canada in October.

  England won the inaugural WXV title in New Zealand last autumn

  England have drawn bumper crowds to the Allianz Stadium for their final matches of their last two Six Nations campaigns, with 58,498 watching them beat France in 2023 and 48,778 travelling to Twickenham for the win over Ireland in April. Hooker Lark Atkin-Davies believes the backing of home fans can draw some of the sting from New Zealand's traditional pre-match haka. "I think it will be interesting to see what happens, we can't wait to go and play at the Allianz and hopefully get a really amazing crowd there," she said. "I love walking out and belting out the anthem - that is a huge thing when you are surrounded by so many fans. "We respect the Black Ferns doing the haka at the beginning of the game, but we want to show we are together and we're ready to perform. "Whatever happens hopefully Allianz will bring the noise at the weekend and it will be a special occasion."
