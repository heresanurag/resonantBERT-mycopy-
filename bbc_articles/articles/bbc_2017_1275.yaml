title: Katie Hopkins invited for tea by Muslim family - BBC News
date: '2017-01-19'
section: General
url: http://www.bbc.co.uk/news/uk-38670716
content: |-
  Zahid Mahmood, wrongly accused by columnist Katie Hopkins of being a Muslim extremist, has invited her to his house for tea. Catrin Nye reports.

  Zahid Mahmood, who was accused by Mail Online columnist Katie Hopkins of being a Muslim extremist, has invited her to his house to have tea and meet his family.

  Hopkins wrongly said the family had links to al-Qaeda in two articles published in December 2015. The Mail Online paid £150,000 in libel damages.

  The Victoria Derbyshire programme is broadcast on weekdays between 09:00 and 11:00 on BBC Two and the BBC News channel.
