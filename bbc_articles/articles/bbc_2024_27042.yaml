  June Fox-Roberts’ body was discovered at her home in November 2021.

  This is the moment a daughter called 999 after discovering her mum’s body.

  June Fox-Roberts’ body was found by one of her daughters, Abi, and a family friend who were concerned as they could not contact her.

  Ms Fox-Roberts was killed by Luke Deeley at her home in Llantwit Fardre, Rhondda Cynon Taf, on 21 November, 2021.

  Deeley, 26, who has schizophrenia, pleaded guilty to manslaughter by reason of diminished responsibility.

  A report has now criticised the care Deeley received prior to him killing Ms Fox-Roberts.
