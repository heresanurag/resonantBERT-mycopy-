title: Nancy Pelosi stands down as leader of US House Democrats - BBC News
date: '2022-11-18'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-63669581
content: |-
  The 82-year-old has led the party in the lower chamber of Congress for almost two decades.

