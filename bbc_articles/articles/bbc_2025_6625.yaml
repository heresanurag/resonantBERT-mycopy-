  Prosper used a shotgun and a knife in the attack that took place in his home on 13 September. He had planned to murder his family and then continue the killing at his former primary school in Luton where he would have shot teachers and four-year-old children. However a loud struggle with his family alerted his neighbours who called police at about 05:30 BST, forcing Prosper to leave his home earlier than planned - long before school opened for the day. Later that morning Prosper flagged down a police car on nearby Bramingham Road having given up on his scheme. During sentencing Mrs Justice Cheema-Grubb said: "Juliana Falcon, Kyle Prosper and Giselle Prosper's deaths are almost certain to have saved the lives of many children. "The community owes them its gratitude and their memory should be honoured." After the killing Prosper wrote a note, which read: "I was right in predicting no-one would've called the police had I killed them in their sleep."

  Nicholas Prosper had designed a black and yellow uniform to be identified by during the school shooting

  Prosper had wanted to be known as the world's most famous school-shooter of the 21st Century, and had designed a black and yellow uniform to wear. During sentencing, the judge explained she did not issue a whole life order after considering guidance relating to Prosper's age and lack of previous convictions. Mitigating, David Bentley KC had also argued his client was living with an undiagnosed neurological development disorder related to autism spectrum disorder (ASD). However the judge told Prosper that any condition did not "impair your ability to understand the nature of your conduct, exercise self-control or form rational judgments when you decided to commit violent crimes". The judge added: "You remain highly dangerous and it may be you will never be released."

