content: |-
  The Greater Manchester detective was stabbed at the prison in County Durham last month, police say.

  The Greater Manchester Police officer was stabbed inside HMP Frankland in County Durham

  A man has been charged with the attempted murder of a police officer who was stabbed inside a prison. The detective constable, from Greater Manchester Police, was stabbed in the chest at Frankland Prison, County Durham, on 23 July. The officer suffered critical injuries but has since been discharged from hospital and is recovering at home, Durham Police said. David Taylor, 62, has been charged in connection with the attack and was remanded in custody ahead of a court hearing.

  Mr Taylor, formerly of Willington, will appear at Newton Aycliffe Magistrates' Court on 3 September. Police previously said the officer suffered a single stab wound while attending the jail to interview a prisoner. HMP Frankland is a category A men's prison, which is the highest level of security.
