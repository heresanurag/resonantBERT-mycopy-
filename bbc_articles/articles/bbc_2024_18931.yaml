content: |-
  Ed Sheeran turns up at Portman Road ahead of the Tractor Boys' first game back in the top flight.

  Ed Sheeran, who is a lifelong fan of the Tractor Boys, made an appearance for the team's first home match back in the Premier League

  Despite having a gig in Serbia tonight, singer-songwriter Ed Sheeran paid a visit to Ipswich Town on Saturday ahead of the team's first match since promotion back to the Premier League. The award-winning star handed out pies and autographs to Tractor Boys' fans at Portman Road before the Liverpool game. Suffolk-boy Sheeran recently bought a minority stake in his beloved club and sponsors the team's shirts. He left at half-time, with the score 0-0, ahead of his performance in Belgrade. Perhaps it was the turning point, however, with the match eventually ending 0-2 to Liverpool.

  The lifelong fan has long-term use of an executive box at Portman Road, but has not join the club's board. Before kick-off, Town fans from across the world sent the players their well-wishes, with the club back in the top flight for the first time in 22 years. One supporter in Canada, Will Thompson, said he would even be watching the match before his own wedding.

  Will Thompson (left) said he had managed to convert several Canadian friends into Town fans

  After the match, fans James Laughlin and James Mower said they left with a "feeling of pride", despite the two-goal loss. They praised the team's performance and said Ipswich did well to hold their own in their first match back in the top flight.

  James Laughlin (left) and James Mower (right) said they had high hopes for the season despite the loss

