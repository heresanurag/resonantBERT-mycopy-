id: bbc_2020_2393
title: 'Streatham attacks as it happened: Met Police respond to ''terrorist-related''
  incident - BBC News'
date: '2020-02-02'
section: UK
url: http://www.bbc.co.uk/news/live/uk-51350195
content: |-
  A man reported to have stabbed a number of people in south London is shot dead by police.

  'There was a woman shouting not to go any further'

  An eyewitness has told BBC News that she was walking in the Streatham area towards a pub when she was approached by another woman "in distress". Emma, from Streatham, said: "She was shouting her head off saying 'don’t go any further, he has stabbed this woman with a knife, he stabbed her in the back.' "We then saw a woman half sitting, half lying on the floor with people around her but no ambulances or anything. "About 30 seconds before that a dark car sped past us and we looked ahead up the road realising that it was police in plain clothes, which the woman was pointing to and shouting ‘that’s the police they’ve shot the guy'." She added: "The distressed woman who stopped us kept pointing at that injured lady and saying 'he came in the shop, grabbed a knife, pulled out a knife and walked out on the street and just stabbed that lady'."
