title: Killer A1(M) motorist Darryl Anderson 'should never drive again' - BBC News
date: '2024-07-10'
section: England
url: http://www.bbc.co.uk/news/articles/cnk4q7p8jnpo
content: |-
  The family of Darryl Anderson's victims say his 21-year driving ban is not enough.

  Killer motorist 'should never drive again'

  Darryl Anderson was jailed for more than 17 years and banned from driving for 21 and a half years

  A speeding drink-driver who killed a woman and her baby nephew should never be allowed to drive again, the victims' family have said. Darryl Anderson, 38, was jailed for more than 17 years for causing the deaths by dangerous driving of Karlene Warner, 30, and her eight-month-old nephew Zackary Blades. The pair were killed on the A1(M) in County Durham when Anderson, from Rotherham, was taking a picture of himself driving at more than 140mph. Shalorna Warner, Zackary's mother and Ms Warner's sister, who was driving the car Anderson hit, said she would "fight every day" for justice in their memory.

  Zackary Blades and Karlene Warner were killed by a drunk and speeding driver

  Anderson was almost three times the drink-drive limit when he drove his Audi Q5 from Newcastle Airport towards his home in Thorpe Hesley, in the early hours of 31 May. Shalorna Warner had taken her sleeping son with her to pick up her sister from the airport, who had returned early from a holiday to start her dream job as a flight attendant.

