title: Plastic pollution reaching record levels in once pristine Arctic - BBC News
date: '2018-02-08'
section: General
url: http://www.bbc.co.uk/news/science-environment-42990391
content: |-
  Here's why the Arctic is no longer what you see in the pictures.

  Plastic waste is increasing in the supposedly pristine wilderness of the Arctic.

  Scientists say almost everywhere they have looked in the Arctic Ocean, they’ve found plastic pollution.

  In the northern fjords of Norway, one man is on a mission to pick up as much plastic as he can.

  Read more - the plastic waste building up in the Arctic
