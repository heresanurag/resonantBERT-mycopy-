  Hundreds of thousands of people have signed a petition to revoke Elon Musk's Canadian citizenship amid tensions between the Trump administration and Canada. The petition, which opened to signatures five days ago, accuses Mr Musk of acting against Canada's national interest and undermining its sovereignty. In Canada, citizenship can be revoked , externalonly if someone has committed fraud, misrepresented themselves or knowingly hid information on an immigration or citizenship application. Mr Musk, who was born in South Africa, holds both Canadian and US citizenship. Responding to the petition, the billionaire wrote on X: "Canada is not a real country." The post was later deleted.

  The petition, external claims the billionaire "has used his wealth and power to influence our elections" and "has now become a member of a foreign government that is attempting to erase Canadian sovereignty". Mr Musk has Canadian citizenship through his mother, who was born in Saskatchewan. Launched on 20 February, the petition, already signed by more than 250,000 Canadians, remains open for signatures until 20 June.
  • None What it means when Musk brings his children to work
  • None Who is Musk and what is he worth? It is mostly symbolic and has no legal force. But petitions with at least 500 signatures and a member of parliament's backing typically receive a government response, this one may not, as a spring election could dissolve parliament. It was created by a British Columbia author and endorsed by MP Charlie Angus of the New Democratic Party. Angus, a 20-year MP for Timmins–James Bay, has announced he will not seek re-election. The BBC has contacted his office for comment.

  US-Canada tensions have escalated since Trump's return, with the president repeatedly suggesting Canada could become a US state and threatening tariffs on steel, aluminium, and other imports. The spat has spilled out beyond government, with Canadians cancelling US trips, boycotting American products, and booing opposing anthems at hockey and basketball games.
  • None What is Doge and why is Musk cutting so many jobs? Mr Musk moved to Canada from South Africa at 18, and worked odd jobs before studying at Queen's University in Kingston, Ontario. He later emigrated to the US. The billionaire has backed Trump's hardline immigration policies but now faces scrutiny over claims he worked illegally in the US on a student visa. In a recent interview, Steve Bannon, a former advisor to President Trump, called Mr Musk a "parasitic illegal immigrant". The Tesla CEO has denied the accusations, and has said he did not work illegally. He became a naturalised US citizen in 2002, according to a recent biography. The BBC has contacted Mr Musk via his businesses for comment.

