title: 'Scottish League Cup: Football fans throw missiles in pre-match violence -
  BBC News'
date: '2024-12-15'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c62zd50e21ko
content: |-
  Police Scotland are using stop and search powers around the Celtic v Rangers game at Hampden Park.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Violence and disorder broke out in Glasgow city centre ahead of the Scottish League Cup final between Celtic and Rangers at Hampden Park. Footage on social media shows large groups of fans charging down Argyle Street ahead of kick-off, setting off flares near fearful shoppers. Police officers can be seen using batons on running fans - some of whom were wearing Santa hats and face coverings. The force said missiles had been thrown and windows smashed. It said officers had been authorised to use stop and search powers, including removing items being used to conceal identity.

  The powers remained in place until 21:00 in areas including the city centre and parts of the south side, east end and into South Lanarkshire.

  Many trains had been cancelled ahead of the 15:30 kick-off with ScotRail warning of a driver shortage. Large groups of fans could be seen walking through the city centre from about 13:00, escorted by police. However violence soon erupted, with one group charging down Argyle Street towards the Trongate. Shoppers trying to leave can be seen screaming and running back indoors to avoid the rush. One football fan falls to the group while others run around him shortly before a flare is set off near a shop doorway. A shopper told BBC News they were forced to take refuge in a nearby shop "for their own safety". An officer can then be seen using his baton on a number of fans passing by. Police Scotland said officers had been authorised to use stop and search powers under Section 60 of the Criminal Justice and Public order Act 1994. This allows officers to stop people when appropriate and necessary, either in vehicles or on foot. Ch Supt Steve Dolan said: "Officers have had to act swiftly and robustly to ensure public safety and reduce disorder. "The use of weapons or violence will not be tolerated and officers will take action where necessary to ensure safety. "It impacts other members of the public and the vast majority of football supporters who want to enjoy the cup final event safely. Officers will remain in the city as our operation continues and anyone with any concerns can approach them."
