  Former World Championship Wrestling (WCW) president Eric Bischoff said he was "saddened to hear about the passing of Silver King".

  "Like so many of the great Luchadores that helped Americans appreciate Lucha Libre and make Nitro [a WCW flagship show] the success it was, he will be missed," he added.

