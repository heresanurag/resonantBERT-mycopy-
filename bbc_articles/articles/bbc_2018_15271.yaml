title: Could a porn star payment bring down Trump? - BBC News
date: '2018-12-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45291768
content: |-
  The president's former personal lawyer Michael Cohen says Mr Trump instructed him to make the payments.

  US President Donald Trump's former personal lawyer Michael Cohen said he was instructed by Mr Trump to make hush money payments to his alleged lovers, including adult film actress Stormy Daniels.

  Could those payments lead to the end of his presidency?
