title: 'Paris 2024 Olympics: GB''s Georgia Bell clinches sensational 1500m bronze
  - BBC Sport'
date: '2024-08-11'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cq82qq12w00o
content: |-
  Great Britain's Georgia Bell clinches a sensational women's 1500m bronze on her Olympic debut at Paris 2024.

  This video can not be played To play this video you need to enable JavaScript in your browser. Faith Kipyegon sets new Olympic record as GB's Georgia Bell gets bronze in the 1500m final

  Georgia Bell's sensational 1500m performance delivered one of three bronze medals for Great Britain amid a party atmosphere on the final night of track and field at Paris 2024. Bell had given up on her Olympic dream when she quit athletics in 2017, but the 30-year-old broke the British record with a time of three minutes 52.61 seconds on her Games debut, as Faith Kipyegon won a third successive title. That excitement was followed by success for both the men's and women's 4x400m quartets, which ensured GB won a medal in every relay event. It took Team GB's total medal haul at the Stade de France to 10 - twice as many athletics medals as they achieved in Tokyo three years ago - with the women's marathon to come on Sunday. The men’s 4x400m quartet featuring Alex Haydock-Wilson, Matthew Hudson-Smith, Lewis Davey and Charlie Dobson set a European record of 2:55.83 as they earned bronze behind the United States and runners-up Botswana. That third-place achievement was matched 10 minutes later by Victoria Ohuruogu, Laviai Nielsen, Nicole Yeargin and Amber Anning, who clocked a British women's national record of 3:19.72 as the USA again took gold, this time ahead of a Netherlands team anchored by the fast-finishing Femke Bol. It marked a fifth relay podium result for GB, who won women’s 4x100m silver and men’s 4x100m bronze on Friday, following mixed 4x400m bronze last week. And it contributed to the team's highest athletics medal count at an Olympics for 40 years, since 16 were won by GB athletes at Los Angeles 1984.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch as Team GB secure bronze in the men's 4x400m relay final

  Bell has made remarkable progress since rediscovering her love of running three years ago. Once a hugely talented junior athlete, winning the English Schools 800m in 2008, both mentally and physically she was unable to sustain that promise. It was only during the pandemic that she rediscovered her enjoyment of running and, noticing continuous improvement, she chose to get back in contact with her former coach Trevor Painter - the man who, alongside wife and world medallist Jenny Meadows, has overseen Keely Hodgkinson's rise to Olympic 800m champion. The progress she had made since, despite holding down a full-time job in cyber security, has been remarkable.

  After winning European silver in June, Bell beat Laura Muir to the British title to secure her Olympic debut, having taken a summer sabbatical from work to pursue a dream that seemed unlikely even at the start of the year. And in Paris, contesting her first final at a global championship in the city where she was born, she completed a fairytale journey to the Olympic podium. "I don't know if I've ever been this happy," Bell told BBC Sport. "I woke up really calm and in a good mood and I just thought ‘I’m not the fastest person in that race' but I thought if I was brave and got stuck in, I could make something special happen. "It's obviously amazing to be here in the Olympics but when I got back into running the goal wasn't to try and make the Olympics - that would've been absolutely bonkers at the time. It was just going back to something I really loved. "Taking time away showed me that I actually love it, love it being part of my life, look forward to that part of the day." Bell dug deep to overhaul Ethiopia's Diribe Welteji in the final metres, taking almost four seconds off her personal best in a stunning performance. Kenya's Kipyegon, now a three-time reigning Olympic 1500m champion, set an Olympic record 3:51.29 for victory as Australian Jessica Hull took silver in 3:52.56. Tokyo 2020 silver medallist Muir missed out on the medals in fifth, despite running a personal best 3:53.37.

