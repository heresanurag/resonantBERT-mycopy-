  Half of Team GB's track and field medals in Paris were delivered by the relay teams, their success here undoubtedly something to build on before next year's World Championships. It comes one year after they won four world relay medals in Budapest, only failing to make the podium in the men’s 4x100m. After double medal delight on Friday, individual 400m silver medallist Hudson-Smith starred for the men by running an unmatched 43-second leg to put GB in medal contention, before Dobson brought the team home a comfortable third. One day after breaking the British 400m record to finish fifth on her global championship debut, Anning produced a gritty final leg to hold out for bronze ahead of Ireland after Bol stormed past for silver in the closing stages.

  The women's marathon is the final athletics event at Paris 2024 on Sunday

  Overall, Great Britain won one gold, four silvers and five bronze medals in nine days of electrifying track and field competition at the Stade de France, three years after winning just two silvers and three bronze medals in Tokyo. Hodgkinson delivered the standout moment as the 22-year-old ended her wait for global gold in the women's 800m. Hudson-Smith was just four-hundredths of a second away from the gold-winning time in the men's 400m final, while Josh Kerr and Katarina Johnson-Thompson also won silver medals in close contests. Britain's women's 4x100m relay team also finished second, while there were bronze medals for the four other relay teams – and of course Bell in a strong finish to the Games.

  This video can not be played To play this video you need to enable JavaScript in your browser. Masai Russell edges past Cyrena Samba-Mayela to win gold in the women's 100m hurdles final

  The United States were the undoubted track and field champions in Paris, their total of 34 medals dwarfing Great Britain and Kenya who had the joint-second most with 10. The USA beat the totals of their closest challengers with golds alone, collecting 14, and the team finished with a flurry on Saturday night. Their two relay successes were complemented by women’s 100m hurdles gold for Masai Russell. That event saw hosts France win their first athletics medal of the Games as Cyrena Samba-Mayela claimed silver. Samba-Mayela crossed the 0.01 seconds behind Russell, who edged a photo finish in 12.33, but the colour of the medal mattered little to the jubilant home support. Jakob Ingebrigtsen recovered from missing out on the medals in the men’s 1500m final to claim a stunning men's 5,000m gold.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ingebrigtsen, 23, won in a season's best 13:13.66 after bursting clear on the final lap, as Kenya's Ronald Kwemoi took silver ahead of American Grant Fisher. Great Britain's George Mills finished 21st in 13:32.32 after being reinstated following a fall in the semi-finals. Mills' team-mate Max Burgin was eighth in his first global 800m final in 1:43.84 as Kenya’s Emmanuel Wanyonyi claimed gold. Wanyonyi became the third fastest man of all time in 1:41.19, ahead of Canada's Marco Arop (1:41.20) and Algeria's bronze medallist Djamel Sedjati.

  This video can not be played To play this video you need to enable JavaScript in your browser. Kenya's Emmanuel Wanyonyi takes dramatic gold for Kenya in the 800m final

  A joint-gold medallist in Tokyo, Gianmarco Tamberi announced hours before the men's high jump final in Paris that his Games were over, having been taken to hospital after vomiting blood. He chose to contest the final but was unable to perform to his usual standards, managing only a third-time clearance at 2.22m. New Zealand's Hamish Kerr took gold in a jump-off against American Shelby McEwen after both men cleared 2.36m. In the women's javelin final, Japan's world champion Haruka Kitaguchi won gold with a best throw measuring 65.80m.

