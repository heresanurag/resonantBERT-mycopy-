  "Everything has gone wrong. Politicians either don't understand or they don't care. Mumbai pays a bulk of India's taxes, but it gets nothing back," senior urban planner Chandrashekhar Prabhu told the BBC.

  The problem, according to Mr Prabhu, is that Mumbai is being "slowly strangled" by politicians and corporate lobbies who treat the city as a "milking cow" and have no sense of responsibility towards its people.

  "We only notice when a stampede kills 23 people in one go. But about eight to 10 people die every day in stations due to issues like unsafe crossings and overcrowding. It's become so normal, no-one talks about it. It's like these deaths mean nothing".

  Mumbai's train system, according to a 2010 estimate by the World Bank, suffers from some of the most severe overcrowding in the world, carrying 4,500 passengers in trains with a rated capacity of just 1,700.

  It funded a project to increase the number of carriages from 9 to 12 in an effort to decongest the lines, but the project took so long that, by the time it was implemented, it did very little to change the situation.

  Naresh Fernandes, the editor of Indian news portal scroll.in and an author of several books on the city, said the lack of planning in Mumbai could only be described as "criminal".

  Some urban planners believe Mumbai's infrastructure is in serious trouble

  "Mumbai has had so many wake up calls and yet it's as if these things don't sink in," he told the BBC. "Take the terrible flooding the city saw in 2005. There was so much anger and yet officials continue to pass and enact policies that only exacerbate the issue."

  The 2005 Mumbai floods, when the city received an unprecedented 944 mm of rain, killed some 500 people and brought the city to a complete halt. The airport was shut for more than 30 hours, offices and schools were closed and citizens were stranded in waist deep water across the city.

  The biggest issue at the heart of everything, both Mr Prabu and Mr Fernandes say, is poor urban planning, driven by Mumbai's high real estate values and a powerful builders lobby that influences policy in the city.

  The result is that money is sucked out of essential public infrastructure projects and pushed instead into things like clearing land for new housing projects, gated communities for the very rich and infrastructure projects that not everyone can use.

  "Mumbai is being taken away from its people," said Mr Fernandes who described this as his "pet peeve". "It has given up on the notion of the public."

  The 2005 floods were a "wake up call" that have not been heeded, says local journalist Naresh Fernandes

  Mr Fernandes alleged that the railways suffered in particular because there was no money or kickbacks to be had from them any more. "This is why we end up with things like sea links and the upcoming coastal road, which are essentially vanity projects," he said.

  Travel expert Sudhir Badami believes that part of the solution, at least, is a radical overhaul of the transport system. He is an avid proponent of introducing a Bus Rapid Transit (BRT) system to ease the congestion on the railways and give people another viable commuting option.

  But Mr Fernandes says that Mumbai's citizenry also has to stand up and be counted. "It is a callous system. It is tempting to blame individuals and yes, we are being serviced very badly, but plastic is in the drains because someone put it there. We should also take some responsibility."
