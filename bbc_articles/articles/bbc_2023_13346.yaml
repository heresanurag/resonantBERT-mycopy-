title: Queen Camilla and Brigitte Macron play table tennis - BBC News
date: '2023-09-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-66880763
content: |-
  King Charles and Queen Camilla are in France for the second day of a three-day state visit.

  The Queen played table tennis against France's first lady Brigitte Macron during a joint visit to a sports centre near Paris.

  Camilla and Mrs Macron were touring the Saint-Denis centre just outside the capital as part of the King and Queen's three-day state visit.

  Earlier in the day, King Charles became the first British monarch to speak on the floor of the upper house of the French parliament.
