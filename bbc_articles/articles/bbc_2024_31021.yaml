title: Victoria Thomas Bowen sentenced for Nigel Farage milkshake attack - BBC News
date: '2024-12-17'
section: Essex
url: http://www.bbc.co.uk/news/articles/c5ywp7lgwvro
content: |-
  The Reform UK party leader was drenched in liquid when he started his constituency campaign in June.

  Nigel Farage was leaving the Moon and Starfish pub, in Clacton-on-Sea, when he was attacked

  A woman who threw a McDonald's milkshake over Reform UK leader Nigel Farage during the general election campaign has been given a suspended prison sentence. Victoria Thomas Bowen hurled the drink at Farage as he left a JD Wetherspoon pub in Clacton-on-Sea on 4 June, having just launched his candidacy for the Essex constituency. Thomas Bowen has been given a 13-week jail sentence, suspended for 12 months, must pay the MP £150 compensation, complete 120 hours of unpaid work and pay £450 in court costs. Following her sentencing, Farage posted on social media, external: "We now live in a country where you can assault a Member of Parliament and not go to prison."

  Thomas Bowen, 25, from Clacton, admitted assault by beating and criminal damage at a previous court hearing. She attacked Farage as he left the Moon and Starfish pub on Clacton seafront.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Nigel Farage has drink thrown over him on Clacton seafront

  In a statement read by prosecutors during sentencing at Westminster Magistrates' Court, Farage said he had "felt humiliated" and was left fearing for his safety in public. He added he was "deeply thoughtful for some time afterwards that next time it may not be a milkshake". Prosecuting counsel Nishma Shah told the court that after her arrest Thomas Bowen told police she did "not agree with his [Farage's] political views" and that she "had the opportunity" to confront him. She told officers "she did not regret her actions", added Ms Shah. Farage's security officer, James Woolfenden, had his suit damaged by the milkshake, and Thomas Bowen was also ordered to pay him £17.50 compensation for the criminal damage. Deputy senior district judge Tan Ikram told the defendant she must also pay a victim surcharge of £154 and complete 15 rehabilitation activity requirement days. Thomas Bowen, who is an OnlyFans model, had originally denied the charges and was due to go on trial at the same court in October, but changed her pleas to guilty before proceedings began. Farage was standing in the constituency for the first time and won the seat, securing a large swing from the Conservatives' Giles Watling, who had a 24,702 majority in 2019. Farage secured a majority of 8,405 on 4 July in what was his eighth attempt to get elected to the House of Commons.

  Victoria Thomas Bowen has "suffered multiple threats" since the incident, her lawyer said

  Thomas Bowen's defence counsel Zarif Khan told the court there was "some evidence in my submission of mental health issues". "This was a naive stupid reaction by this young woman, at a time when she was going through some personal distress," he said. In a statement following the sentencing, the defendant's lawyer Caroline Liggins said: "She has suffered multiple threats since this happened, which have had a serious impact on her mental health. "Victoria understands the impact of her actions and wishes to put the whole episode behind her. She hopes others can do the same."

  The judge said the "unprovoked, targeted attack" was "humiliating and it was in the full glare of cameras". He added: "It is also clear to me, irrespective of what you now say, that at the time you had no regret at all in attacking the now elected Member of Parliament. "In recent months I have dealt with several cases of unlawful attacks on politicians, whether online or physical. He continued: "This was not just an attack on him, but in my judgement, an attack on our parliamentary democracy. "The risks of face-to-face engagement with the public are just too clear, bearing in mind the murders of two other Members of Parliament in recent years." Southend West's Conservative MP Sir David Amess was stabbed to death at a constituency surgery in 2021, while Labour MP Jo Cox was shot and stabbed in her West Yorkshire constituency of Batley and Spen in 2016.

  Nigel Farage, who posed with a milkshake later on the day of the attack in neighbouring Jaywick, told the court he "felt humiliated" by the incident

  In August, Josh Greally, of Clowne, Derbyshire, was given a suspended sentence for throwing a coffee cup and another item at Farage while he was campaigning in Barnsley. During a campaign walkabout in Newcastle in 2019, the former UKIP leader and Euro MP had a banana and salted caramel milkshake thrown at him. "Milkshaking" - the act of dousing public figures with the drink - was recognised as a word by the Collins Dictionary in 2019.

