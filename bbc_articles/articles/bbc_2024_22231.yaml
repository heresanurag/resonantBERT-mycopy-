  Tributes paid to mother and children killed in flat

  Juliana Prosper, 48, and her children Kyle, 16, and Giselle, 13, were declared dead at the scene

  Tributes have been paid to a "strong loving mother" and her two children after they were killed in a tower block flat. Police were called to Leabank in Luton, Bedfordshire, at about 05:30 BST on Friday. Juliana Prosper, 48, Kyle Prosper, 16, and Giselle Prosper, 13, were declared dead at the scene. Their family said Ms Prosper "was always putting others first" while Kyle was "a kind and funny young man" and Giselle was "loveable with an infectious smile". Nicholas Prosper, 18, also of Leabank, has been charged with the murder of his mother and siblings. He appeared at Luton Magistrates' Court on Monday.

  Nicholas Prosper was named locally as Juliana Prosper's son and sibling to the child victims

  He was also charged with firearms offences and possession of a bladed article and is next due at Luton Crown Court on 18 September. Paying tribute, the family said: “Julie was a strong, loving mother to her four beautiful children, who were her absolute world. "In her spare time, she was a keen athlete and enjoyed raising money for charity – she was always putting others first. “Kyle was a kind and funny young man who loved football and boxing. "He was creative and thriving on TikTok, a big talent with massive potential. Kyle’s friends were his everything. “Giselle was a beautiful soul and caring young girl; she liked to laugh lots and loved her family and big brothers. "She was so loveable with an infectious smile. She was also an exceptional pupil at school and was loved dearly by her friends in Year 9.” The family thanked their loved ones and the wider community for their support and kind messages and asked for their privacy to be respected. Bedfordshire Police said formal identifications of the family had yet to take place.

