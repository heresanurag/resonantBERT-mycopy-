  However, a former Biden aide told Axios, another political news outlet, that Harris was making excuses. "How did you spend $1 billion and not win?” said the aide, adding an expletive. An unnamed former Biden aide told Politico this week that former President Barack Obama’s advisers were to blame because they “publicly encouraged Democratic infighting to push Joe Biden out, didn’t even want Kamala Harris as the nominee”. Pennsylvania Senator John Fetterman, a Democrat, blamed the election loss on those who plotted to oust Biden. “For those that decided and moved to break Biden, and then you got the election that you wanted, it’s appropriate to own the outcome and fallout,” he told political outlet Semafor in an interview. Congressman Tom Suozzi, New York Democratic congressman, said the election loss was partly due to the party's focus on "being politically correct". He said the party had struggled to counteract Republican attack lines on "anarchy on college campuses, defund the police, biological boys playing in girls' sports, and a general attack on traditional values". Ritchie Torres, another New York Democratic congressman, posted on X, formerly Twitter, blaming "the far left”. He said radicals within the party had “managed to alienate historic numbers of Latinos, Blacks, Asians, and Jews from the Democratic Party with absurdities like ‘Defund the Police’ or ‘From the River to the Sea’ or ‘Latinx’”. Independent Senator Bernie Sanders, who ran for president as a Democrat in 2016 and 2020, accused the party in a lengthy statement of abandoning working people. "While the Democratic leadership defends the status quo, the American people are angry and want change," he wrote. "And they’re right." He argued Democrats probably wouldn't learn from the election outcome. But Democratic National Committee Chairman Jaime Harrison responded on X that Sanders' accusation was "straight up BS".
