title: Israel shoots down Hezbollah drones heading for gas rig - BBC News
date: '2022-07-03'
section: Middle East
url: http://www.bbc.co.uk/news/world-europe-62022452
content: |-
  The drones are launched from Lebanon, amid border tensions between the nations.

