  Next week, Trump's senior officials will travel to Saudi Arabia to meet Zelensky's team amid growing pressure for him to sign up to Trump's demands. Ukraine's president has said he hopes the talks will be "meaningful". On Friday, he said his country was "ready for peace as soon as possible" and had proposed "concrete steps" to achieve it. "Every day, new Russian strikes and reality itself prove that it is Russia that must be forced to peace," he added. Zelensky has expressed regret in the days since his public clash with Trump and worked to mend relations with the US. On Thursday, US special envoy Steve Witkoff said Trump had received a letter from Zelensky that included an "apology" and "sense of gratitude". "Hopefully, we get things back on track with the Ukrainians, and everything resumes," Witkoff said. UK officials have said around 20 countries are interested in joining a "coalition of the willing" to help Ukraine, as European leaders forge ahead with plans for much bigger military expenditure. Fighting on the ground in Ukraine continued on Friday, with five people killed by Russian troops in the Donetsk region, according to local authorities.
