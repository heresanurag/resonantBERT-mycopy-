title: 'M6 closure: Man dies in crash after police pursuit - BBC News'
date: '2022-02-26'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/uk-england-stoke-staffordshire-60537373
content: |-
  Officers say they had been pursuing an Audi when it struck a stationary traffic management vehicle.

  Drivers have been warned of about five miles of congestion on the M6 in Staffordshire

  A man has died in a crash on the M6 after a car being pursued by police collided with his vehicle.

  The victim was in a stationary traffic management vehicle when it was hit on the northbound side between junctions 14 at Stafford and 15 for Stoke-on-Trent at about 05:00 GMT, police said.

  Officers had been trying to stop the Audi, Staffordshire Police added.

  A 27-year-old man has been arrested on suspicion of causing death by dangerous driving and remains in custody.

  The M6 has been closed for several hours following the collision with delays of at least 60 minutes in the area, National Highways tweeted.

  The man who died was in his 40s and was the only person in the traffic vehicle, detectives said.

  They said they believed the Audi had previously been involved in an incident elsewhere in the West Midlands.

  The crash has been referred to the Independent Office for Police Conduct due to the police activity before the collision.

