  The Monkey World Ape Rescue Centre in Wareham, Dorset, welcomes Chocolat.

  New home for disabled chimp saved from bushmeat trade

  The Monkey World Ape Rescue Centre in Wareham, Dorset, has welcomed Chocolat

  A disabled chimpanzee who was orphaned by the illegal bushmeat trade in Africa has been given a new home. The Monkey World Ape Rescue Centre in Wareham, Dorset, has welcomed Chocolat, who has been cared for in Kenya for the past 20 years. The female chimp was an infant when her family were hunted and killed in the Democratic Republic of the Congo. Chocolat arrived at her new home on 16 August and has been gradually introduced to six other chimpanzees who have become her adopted family.

  The chimp has been cared for in Kenya for the past 20 years

  When she was first rescued, she was found to have injuries from shotgun pellets that have left her with a paralysed hand and foot on her right side. Monkey World is home to chimpanzees rescued from 16 different countries. Chocolat’s new family were rescued from Mexico, Argentina, Cyprus, and Thailand, and also have various disabilities as a result of their tragic backgrounds.

  Dr Alison Cronin MBE, director at Monkey World, said they are "so happy to welcome Chocolat". She added: "Companionship of their own kind is vital to chimpanzees’ wellbeing, as they are social, intelligent animals. "Living in family groups in as natural an environment as possible is the best kind of rehabilitation we can provide to chimpanzees like Chocolat."

  Chocolat was hit by shotgun pellets when she was an infant and her mother was killed for bushmeat

  Chocolat has already made friendly contact with Bryan, the dominant male in her group. She reached out to him - touching a fellow chimp for the first time in more than 20 years. Monkey World was established in 1987 to provide a home for chimpanzees who were being abused in the Spanish beach photography trade. Since then, it has continued to rescue monkeys, apes and prosimians who have been used or abused by humans.

