title: 'Rwanda plan: What’s next after Sunak wins vote? - BBC News'
date: '2024-01-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68012008
content: |-
  As Rishi Sunak’s Rwanda plan passes a key vote, the BBC’s Peter Saull explains what happens next.

  Rishi Sunak’s flagship Rwanda plan has passed a key vote amongst MPs by 320 votes to 276.

  Enough MPs backed the government's key Safety of Rwanda Bill, meaning a touted rebellion by a group of Conservative MPs failed to materialise.

  The BBC’s Peter Saull explains what this means for the prime minister’s authority and the prospect of asylum flights taking off for Rwanda.
