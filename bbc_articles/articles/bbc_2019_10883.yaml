title: NHS will not pay for 'life-changing' migraine drug - BBC News
date: '2019-09-26'
section: Health
url: http://www.bbc.co.uk/news/health-49831726
content: |-
  Erenumab is the first drug specifically designed for preventing migraines.

  A migraine drug that has been described as "life changing" by some patients will not be made available on the NHS outside of Scotland.

  Erenumab - also known by the name Aimovig - is one of the first bespoke migraine drugs in decades and has been described by doctors as a "huge deal".

  But the body that approves new drugs said there were doubts whether it was good enough or worth the money.

  Charities said it seemed to be a "very bad day" for migraine suffers.

  Current drugs to prevent migraine are former epilepsy or heart failure medicines or the anti-wrinkle drug Botox.

  However, some patients have migraines that do not respond to any available treatments.

  What makes Erenumab different is it is specifically designed for preventing migraine.

  It uses antibodies to alter the activity of chemicals in the brain that are involved in both pain and sensitivity to sound and light that comes with migraine.

