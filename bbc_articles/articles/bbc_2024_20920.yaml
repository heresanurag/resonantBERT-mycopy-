title: 'D’Vontaye Mitchell: Milwaukee hotel staff face murder charges in man''s death
  - BBC News'
date: '2024-08-07'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4geegne2l5o
content: |-
  D’Vontaye Mitchell, 43, ran into a women's bathroom before he was allegedly held down for up to nine minutes.

  Four hotel employees who allegedly pinned a man to the ground after he behaved erratically in a Hyatt Regency lobby in the US state of Wisconsin are facing murder charges. D’Vontaye Mitchell, 43, ran into a women's bathroom before staff dragged him outside, beat him and held him face down on the ground for eight or nine minutes, according to court documents. Mitchell was unresponsive when police arrived at the scene in Milwaukee on 30 June. He was later pronounced dead. He died of “restraint asphyxia and toxic effects of cocaine and methamphetamine”, found a post-mortem examination that also noted he was morbidly obese.

