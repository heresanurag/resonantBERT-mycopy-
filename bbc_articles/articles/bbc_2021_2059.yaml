  Swansea University lecturer Simon Williams, a researcher into public attitudes, tweeted to say the good weather would increase the risk of non-compliance and there were "cars and crowds" at his local beaches at Langland and Caswell on the Gower.

  Checks will be conducted in Swansea, Cardiff and Vale of Glamorgan to "ascertain the reason for travel"

  But it was "nice and quiet" at Moel Famau Country Park, a popular beauty spot in Denbighshire.

  Ranger Ed Sopp said it appeared motorists were heeding the advice to stay away.

  No signs of vehicles at Moel Famau Country Park in Denbighshire on Saturday
