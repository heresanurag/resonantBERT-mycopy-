title: Georgia president calls on Georgians to protest 'falsified' election result
  - BBC News
date: '2024-11-17'
section: General
url: http://www.bbc.co.uk/news/videos/c9dlpv8eleeo
content: |-
  Georgia President Salome Zourabichvili has called on the public to protest an election result she says was "totally falsified".

  In Saturday's election the Georgian government won almost 54% of the vote. Ms Zourabichivili has sided with the opposition.

  The ruling Georgian Dream party and the election commission are adamant the result was free and fair.

  In an interview with the BBC’s Russia editor Steve Rosenberg, the president said this was a crucial moment for Georgians to keep their aspirations for a European future alive.
