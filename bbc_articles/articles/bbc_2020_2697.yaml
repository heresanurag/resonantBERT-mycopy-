title: 'Coronavirus: Stephen Fry''s take on managing anxiety - BBC News'
date: '2020-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-51995797
content: |-
  Stephen Fry looks at the positives around self-isolation and managing stress.

  Stephen Fry has been giving advice on dealing with anxiety and stress whilst self-isolating during the coronavirus pandemic.

  He told the BBC's Andrew Marr "anxiety and stress are almost as virulent as this coronavirus".
