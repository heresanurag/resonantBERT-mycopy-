content: |-
  A group of divers have found a shipwreck with a cargo of 1840s Glasgow pottery off the west coast of Scotland.

  A group of divers have found a cargo of old Glasgow pottery after discovering a shipwreck off the west coast of Scotland.

  Diver Graeme Bruce, 65, from Oban made the discovery in July 2024, a mile from Lamlash Bay on the Isle of Arran.

  The wreck is believed to be the SS Eagle, an early steamboat on the way to Northern Ireland, which sank in 1859 after colliding with another vessel, killing 11 people.

  Graeme, a retired engineer, and the team of seven other divers, were about 53 metres below sea-level when they spotted the wreck littered with pottery.

  The artefacts found included items of Bell's Pottery, first produced in Glasgow in the early 1840s.
