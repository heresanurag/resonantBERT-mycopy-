  Russia's ambassador to the UK, Andrei Kelin, told the BBC's Sunday with Laura Kuenssberg that the US was not its ally. He said the US and Russia had not been able to go from "total distrust to alignment in two months" since Trump returned to the White House. "We have too many disagreements," he said. "But we are working on these disagreements step by step in different areas." Earlier this week, Washington and Moscow went ahead with a prisoner swap. Ksenia Karelina, a Russian-American, was sentenced to 12 years in jail in Russia for donating $51 to a Ukrainian charity when the war began in February 2022. The Los Angeles resident was freed on Thursday morning and exchanged for Arthur Petrov, a dual German-Russian citizen arrested in Cyprus in 2023. He was accused of illegally exporting microelectronics to Russia for manufacturers working with the military.
