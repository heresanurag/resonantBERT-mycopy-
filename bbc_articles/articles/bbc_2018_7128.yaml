  "All I can say is the manner in which he attempted to enter that home in the face of a firearm pointed at him and the implements we recovered from him - the only inference is that he had very bad intent," Sheriff Agnew said.

  Mr Skinner was shot once in the neck and fled to a nearby yard where he collapsed.

  Police found him with a knife, pepper spray, tape and his plane ticket from New Zealand in his pocket.

  They say he had planned to return to New Zealand on 30 June.

  Police say the parents knew nothing of the teen's communications with Mr Skinner

  Police believe the weapons and tape had been purchased hours earlier at a nearby Walmart.

  Mr Skinner is now in hospital and is expected to survive.

  He is facing charges of breaking and entering with a deadly weapon and with the intent to commit a serious offence.

  Goochland County officials say they have contacted the FBI for assistance.

  The sheriff said that the girl's parents were unaware of her contact with Mr Skinner, and that the girl had tried to cut off communication with him since first meeting online four months earlier.

  He told reporters that he found it hard to fathom how far the suspect is believed to have travelled.

  "When I sit back and think about it, I said: 'You've got to be kidding me.'"
