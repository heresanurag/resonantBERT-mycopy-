id: bbc_2018_7128
title: New Zealand man shot after 'flying to US to attack teenager' - BBC News
date: '2018-06-27'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-44617074
content: |-
  The girl's mother shot the man after he smashed his way into their house with a brick, police say.

  US police say they know nothing of Mr Skinner's background

  A New Zealand man flew to the US state of Virginia and was shot after trying to break into the home of a teenage girl whom he met online, police say.

  Troy George Skinner, 25, was shot in the neck by the girl's mother after smashing his way through a glass door.

  Goochland County Sheriff James Agnew said the man was also armed with a knife, duct tape and pepper spray.

  He travelled over 8,500 miles (13,500km) after the girl stopped speaking to him online, police say.

  "This was not random, not spontaneous, this was something very planned," Sheriff Agnew said on Monday, describing Mr Skinner's two days of travel.

  "It's a new world," he added.

  A landscaping brick was hurled through the family's glass door, police say

  Police say the man had taken three flights and a bus, and had from Auckland, New Zealand, to the suburbs of Richmond, Virginia.

  "He was not invited here, he was not expected here, he had been told in the past that the daughter no longer wished to communicate with him," Sheriff Agnew said, adding that the two had met through Discord, an app that allows video-gamers to speak to each other online.

  The incident occurred on Friday in the Holland Hills neighbourhood while the mother and her two teenage girls - aged 14 and 18 - were painting inside the house.

  He knocked on the door, but the mother - whom police did not identify - chose not to answer, telling investigators she was not in the habit of answering the door during the day.

  After breaking the glass, Mr Skinner allegedly stuck his hand inside to unlatch the door

  After seeing the mother inside, he yelled that he had hitchhiked 30 miles to the house and needed help.

  He then attempted to enter the home, and eventually "he got a brick and attempted to break that door down," the sheriff said, adding that he "attempted to violently get inside her house".

  The mother warned Mr Skinner that she had a gun, and waited until he had reached his arm past the broken glass to attempt to unlatch the door before she fired two shots.

