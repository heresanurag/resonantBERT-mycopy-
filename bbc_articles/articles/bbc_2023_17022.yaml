title: 'Top Gear: James May says show''s format needs a rethink - BBC News'
date: '2023-11-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-67494368
content: |-
  The former presenter of the BBC car series says it's time for a new approach, after the show was "rested".

  May left Top Gear in 2015 after his co-host Jeremy Clarkson punched a producer

  Former Top Gear presenter James May has said the show's format "needs a rethink" following the BBC's decision to rest the series.

  Production was paused after host Andrew Flintoff was badly injured in an accident while filming last year.

  May, who hosted the show alongside Jeremy Clarkson and Richard Hammond, said a new approach was needed.

  May told the Today Podcast: "My honest view is - I can say this now - it does need a bit of a rethink.

