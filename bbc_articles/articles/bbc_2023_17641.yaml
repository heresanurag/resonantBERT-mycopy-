content: |-
  The Mobo Award winner was arrested at Heathrow Airport, Metropolitan Police say.

  Rapper Nines has been charged with drug offences after being arrested at Heathrow Airport.

  The Mobo Award-winner is accused of being concerned in the supply of cannabis and possession of a Class B drug, the Metropolitan Police said.

  He was bailed and is set to appear at Kingston Crown Court on 15 December.

  It comes after a video was widely shared on TikTok claiming to show police walking the rapper through the airport in handcuffs.

  The Met confirmed the Tony Soprano 2 rapper was detained on 15 November at the airport.

  The 33-year-old of Bushey, Hertfordshire - whose real name is Courtney Freckleton - is also charged with three counts of the breach of an existing Serious Crime Prevention Order.

  Last month Nines released album Crop Circle 3 which peaked at number two in the UK album charts.

  The rapper, from north-west London, beat the likes of Stormzy and J Hus to collect album of the year at the Mobo Awards in 2020 for Crabs In A Bucket.

  He has also collaborated with Dave and Tion Wayne.
