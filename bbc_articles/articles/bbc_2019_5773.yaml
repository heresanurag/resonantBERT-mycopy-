id: bbc_2019_5773
title: 'NI council elections: Alliance hails ''breakthrough'' NI vote - BBC News'
date: '2019-05-05'
section: N. Ireland Politics
url: http://www.bbc.co.uk/news/uk-northern-ireland-politics-48158555
content: |-
  Final results show DUP and Sinn Féin remain the biggest parties but Alliance and others make gains.

  Alliance leader Naomi Long has hailed her party's "incredible result" in the council elections as a watershed moment for Northern Ireland politics.

  With all 462 seats declared, Alliance saw a 65% rise in its representation. It had 32 councillors five years ago but now it has 53.

  Other smaller parties and independents also made significant gains.

  The DUP and Sinn Féin were returned as the two biggest parties, but the DUP lost eight seats.

  In terms of first preference votes the DUP saw a marginal increase to 24.1% but Sinn Féin's was 23.2%, a slight drop on its 2014 results.

  Alliance saw its share of the vote increase from 6.7% to 11.5%.

  A sister party of the Liberal Democrats in Great Britain, Alliance is Northern Ireland's main centrist cross-community party, seeking to attract support from both Protestants and Catholics.

  It won 10 seats in Belfast and will continue to hold the balance of power between unionists and nationalists.

