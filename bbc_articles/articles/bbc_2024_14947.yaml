content: |-
  We don't care how we win, says England's Watkins

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England striker Ollie Watkins says the team are not bothered about their performances or goalscoring tally - so long as they win games. The Three Lions have reached Sunday's Euro 2024 final against Spain despite failing to set the tournament alight. Spain have netted 13 times with six victories in 90 or 120 minutes. That is in comparison to England's seven goals and three wins - excluding penalty shootouts - while playing against lower-ranked teams than Spain. Boss Gareth Southgate and his players were heavily criticised by fans on an unconvincing run to the quarter-finals - but a penalty shootout win over Switzerland followed by a 2-1 comeback win over the Netherlands has changed the national mood. Watkins scored the 90th-minute winner in that semi-final victory over the Dutch, in only his second substitute appearance of the tournament. "I watched it quite a few times, when I got back to camp," said the Aston Villa frontman. "I was manifesting it, a lot has led up to it. "A good friend said he felt like I would score in the Euros final, I did it a match before, but you never know, I might be saving another one for the final." Watkins was asked about King Charles' message to the team - to try to win without any more stressful late dramas. "As much as it makes it more exciting, I feel like personally we don't care how we win or score, as long as the ball goes in the back of the net," added the 28-year-old.

