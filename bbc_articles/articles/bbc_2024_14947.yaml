  Liverpool right-back Trent Alexander-Arnold started England's first two games in midfield - but has only made two short substitute appearances since then. "To get this far you have to be elite in every department, which we have been," he said. "We have found our rhythm now within the team, on the pitch and in the games at a good time as well. "As the saying goes, it is not how you start, it is how you finish. We are finishing this tournament well and hopefully we go out even better on Sunday."
