  The stop motion duo appeared "live via video link" to announce Strictly's voting terms and conditions.

  Wallace and Gromit in surprise appearance on Strictly

  Animated superstars Wallace and Gromit made a special guest appearance on Saturday's Strictly Come Dancing, in what co-host Claudia Winkleman said was the "single best thing that's ever happened to me". The duo - dog Gromit and cheese-loving inventor Wallace - appeared via "video link" to read out the terms and conditions ahead of viewers being able to vote for their favourite celebrity dancer. While Wallace was still in the shower when Winkleman crossed "live" to his home, Gromit stepped in once again to save the day. Wallace and Gromit will next be seen on BBC One this Christmas Day in the latest Aardman film Vengeance Most Fowl.

  Covering for Wallace in their home studio complete with a silvery disco ball, a glittering purple rainbow backdrop, and a big cup o' cha cha cha on the desk, Gromit plays a "practice tape" of the inventor reading out the terms and conditions for voting. Wallace soon waltzes into the room to take over, having accessorised his usual clothes with a larger-than-life sparkling red bow tie. As to be expected, there was a Wallace-involved mishap - midway through reading the conditions his seat dropped down behind the desk. "Best of luck to all the couples," Wallace calls out, peering over the top of the desk with a thumbs up, while Gromit holds up a score paddle with "7" on it. Vengeance Most Fowl will see the return of the villainous penguin Feathers McGraw, who first made an appearance in 1993's The Wrong Trousers, as he seeks revenge on the duo. The Aardman Animations stop-motion film can be seen at 18:10 GMT on Christmas Day and will also be on BBC iPlayer.
