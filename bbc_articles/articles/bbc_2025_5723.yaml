content: |-
  Country trio Remember Monday will be representing the UK at the Eurovision Song Contest in 2025.

  All-female country trio Remember Monday will represent the UK at Eurovision 2025 with their song What The Hell Just Happened?.

  When asked on BBC Radio 2 how excited the musicians felt about the announcement, group-member Holly-Anne Hull said: "We feel like we're on another planet, nothing is sinking in."

  The Eurovision Song Contest will be held in Basel, Switzerland, in May, after Switzerland's Nemo won the competition in 2024.

  Olly Alexander - the UK's entrant in 2024 - came 18th in the competition out of 25 countries with his song "Dizzy".
