title: 'Coronavirus: Eastbourne women charged with assault - BBC News'
date: '2020-04-11'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-52254724
content: |-
  Police responding to reports of a house party were attacked.

  Police were attending reports of a house party in Edgeland Terrace

  Three women have been charged with assault after police were threatened with being spat at and exposure to Covid-19.

  Police were responding to reports of a house party in Edgeland Terrace, Eastbourne, on Wednesday evening.

  One officer also suffered a head injury and required hospital treatment.

  Bayleigh Meadows and Millie Robinson, both 21, are due to appear before magistrates later. Nicole Stonestreet, 20, has been released on bail.

  Ms Meadows, of Lottbridge Drove, Eastbourne, was charged with assault occasioning actual bodily harm and affray.

  Ms Robinson, of Edgeland Terrace, Eastbourne, was charged with two counts of assaulting an emergency worker and affray.

  Ms Stonestreet, of Seaside, Eastbourne, was charged with assaulting an emergency worker and affray.

  Update on 14 April 2020: Ms Meadows and Ms Robinson appeared before Brighton magistrates on Saturday 11 April and were conditionally bailed to appear at Lewes Crown Court on 11 May.

