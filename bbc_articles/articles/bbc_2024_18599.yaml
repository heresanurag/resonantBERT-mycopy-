content: |-
  Wednesday's papers cover tensions in the Middle East and Starbucks' new boss.

  'Retaliation is our right' and Starbucks' new boss

  The Daily Mail uses its front page to call on Sir Keir Starmer to "get a grip", external on what it calls "work shy Britain". It says official figures showing that the number of people who are economically inactive has climbed to a 12-year high are a "major headache" for the government. The paper highlights Conservative claims that plans to strengthen workers' rights will only make things worse. Chancellor Rachel Reeves has signalled she will announce further measures to help people back into employment when she unveils her budget. The Sun's editorial argues ministers will need to take a tough line on benefits. It questions whether Labour can "brave the uproar" if they cut welfare or impose new restrictions. The Daily Telegraph suggests, external that the Ministry of Defence is facing deep cuts to its budget for modernising the armed forces. The paper says civil servants have been told to reduce research spending by 20%, putting hundreds of jobs at risk. Officials have called the figure "incorrect". "Don't blame UK's finances for not fixing pension injustice" is the headline in the Daily Express, external. Campaigners have told the paper that stretched government budgets are no excuse for denying compensation to women affected by changes to the state pension age. Tens of thousands argue they weren't adequately informed about plans to equalise their age of retirement with men. The government says it "remains committed to ensuring historical errors are corrected" and that "pensioners get the financial support to which they are entitled".

  The Guardian highlights research, external that suggests cheaper food brands saw the biggest price rises during the cost of living crisis. According to the study, the cost of the least expensive groceries rose by more than a third in the two years to last September. Meanwhile the most expensive items went up by 16%. The article says the report, by the Institute for Fiscal Studies, lays bare the disproportionate impact of rising food costs on the poorest households. "Get ready to flee" is the headline in the Daily Mirror, external. It leads on previously reported plans to get UK nationals out of Israel, should Iran launch an attack on the country. It says officials are investigating the possibility of putting on emergency flights if commercial jets are grounded. The front pages of the i and the Financial Times both carry stories about Elon Musk's social media network X. The i alleges, external the website, formerly known as Twitter, has been running adverts for major brands alongside far-right posts. X hasn't responded to the article. The Financial Times says the European Union has accused its digital commissioner, external, Thierry Breton, of going rogue after he warned Mr Musk against spreading harmful content. Several papers highlight research that suggests living in Australia could extend your life. The study, published in the British Medical Journal, says people there survive 2 years longer on average than those in the UK. The Times says, external while it's tempting to put the difference down to "ice-cold beer and al-fresco shrimp and burger dining", the likely reason is the healthier lifestyle and better healthcare.

