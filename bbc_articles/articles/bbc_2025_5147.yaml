title: Chimamanda Ngozi Adichie on 'terrifying' writer's block during pregnancy -
  BBC News
date: '2025-03-03'
section: Africa
url: http://www.bbc.co.uk/news/articles/c89yp2xjzjko
content: |-
  Author Chimamanda Ngozi Adichie tells the BBC's Emma Barnett about her experience of writer's block.

  Chimamanda Ngozi Adichie says the writer's block she experienced after becoming pregnant with her first child was "terrifying". "It's a really frightening place to be, because writing is the thing that gives me meaning," the acclaimed Nigerian author, 47, tells the BBC's Emma Barnett. "I'm not sure that it was just entirely physiological but something changed, and I just could not get back into that magical place where I can write fiction." Adichie had her first child, a daughter, in 2016. Last year, she had twin boys, now 11 months old. While she was pregnant, she had a "very foggy feeling" and "couldn't think as clearly," she says. "I'm a person for whom thinking clearly is so important, and so to be in that kind of place emotionally is very frightening," she says. Adichie is now releasing her first novel in more than a decade, Dream Count. The book tells the story of four women navigating lives that aren't going to plan. "I couldn't write for a while, and then I started writing again," she says.

  In a wide-ranging interview with the BBC's Emma Barnett, Chimamanda Ngozi Adichie discusses topics including parenthood, grief and artificial intelligence

  Adichie is known for work that explores themes including feminism, gender and immigration. The novelist's 2012 Ted Talk We Should All Be Feminists helped push her to greater prominence, and was even sampled by Beyoncé on her 2013 song Flawless. In a wide-ranging interview with the BBC, she speaks about topics including parenthood, grief and artificial intelligence (AI). Adichie's beliefs about gender have led her to reflect on how she'd like to bring up her sons. "I'm determined to raise good men," she says. "I want to raise my boys to be emotionally comfortable, to be in touch with emotion, to not be afraid of emotion, and also to not be afraid of fear," she continues. Compared to girls, Adichie believes boys don't have many "wholesome" role models. "This space is just occupied by noxious characters and ideas," she says. The writer adds that she wants her sons to be "the kind of boys that never start a fight but if you bring a fight to them, they will beat you up". As well as having her three children, since writing her last novel, Adichie has also lost both of her parents. "Grief recedes but only in waves and then, at some point, it comes back," she says. Adichie was surprised by how physical grief felt. "Your heart really is very heavy, you feel as though your body is somehow no longer able to carry the weight of your heart," she says. The novelist says that grieving for her mother, who died suddenly on her father's birthday in 2021, had a role in shaping her new novel. When she started writing the book - after her mother died - "I did not think I was writing about my mother," she says. But when she had nearly finished, she reread the manuscript and realised there was "so much about mothers and daughters" in it, even though she hadn't been conscious of this while writing. "I felt very strongly that, in some ways, my mother had opened the door for me to get back into this magical place that means that I can write fiction," Adichie says. "I kind of thought that she's comforting me, and it was actually deeply emotional for me to make that realisation."

  As someone with a deep emotional connection to the creative process, it is perhaps unsurprising that when the conversation turns to AI, Adichie has a strong stance. The author says that we should not refer to any written content produced by generative AI produces as stories and that the technology is going to make all of us, if we embrace it widely, "increasingly stupid". She argues that AI could limit human creativity, something she says "we should never think that we can somehow replace". Even using AI for tasks like summarising work emails can be damaging, she says. "The ability to summarise is something that requires a certain level of creativity and imagination and intelligence, and it just seems to me that if you're ceding that to something else, what are we going to let our brains do for us?"

