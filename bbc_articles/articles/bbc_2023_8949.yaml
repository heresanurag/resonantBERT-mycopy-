content: |-
  Footage shows a man with a knife attacking people at a playground in Annecy, France, this morning.

  Footage shows a man with a knife attacking people at a playground in Annecy, France, this morning and also shows the man being chased through a park.

  Four children were injured in a knife attack in a playground and two adults were also hurt, French authorities have said.

  Police have said the man who carried out the attack was shot in the legs, overpowered, and arrested.
