title: What's happened in elections so far and what's still to come? - BBC News
date: '2025-05-02'
section: Politics
url: http://www.bbc.co.uk/news/articles/c1k410w11r3o
content: |-
  Reform UK wins its first Parliamentary by-election and makes gains in council elections.

  • None Reform UK has made big gains in council seats across England and has picked up more than 650 seats
  • None The Conservatives have lost more than 650 seats and Labour - which was defending fewer seats - is down by more than 180
  • None For the first time Reform UK has won control of councils - they are now in charge in Derbyshire, Durham, Kent, Lancashire, Lincolnshire, Nottinghamshire and Staffordshire - all except Durham were taken from the Conservatives
  • None It also made gains in Devon, Cornwall, Leicestershire, Warwickshire, Worcestershire and Northumberland - areas where no party holds the balance of power
