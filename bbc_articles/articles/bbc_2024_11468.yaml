title: King Charles and Queen Camilla to visit Guernsey and Jersey - BBC News
date: '2024-06-11'
section: Guernsey
url: http://www.bbc.co.uk/news/articles/cz44yn3xqdzo
content: |-
  The King and Queen will visit the islands in July in their first visit since His Majesty’s Accession.

  It will be the King and Queen's first visit since His Majesty’s accession to the throne

  King Charles III and Queen Camilla are set to visit the Channel Islands next month. The visit on 15 July will be the first time a British monarch has visited Jersey since 2005, when Queen Elizabeth II came to the island. Their Majesties, who last visited the Bailiwick of Guernsey when they were the Prince of Wales and Duchess of Cornwall in July 2012, will arrive in Guernsey the following day on 16 July. Leaders in the islands said the visits would show "just how special the relationship is" between the Crown and the islands.

  Deputy Bailiff of Jersey, Robert MacRae announced the visit to the States Assembly on Tuesday morning. Mr MacRae said the King and Queen would visit the States Assembly and Royal Court, and the rest of the visit would be mainly focused in St Helier, with further details of the day's events to be shared later. Lieutenant-Governor of Jersey Jerry Kyd said he was "absolutely delighted" about the visit. In Guernsey, the royal programme is due to include meeting local politicians and a centuries-old ceremony of homage to His Majesty, held outdoors on the St Peter Port seafront where islanders can come to watch the event.

  King Charles and Queen Camilla were in Normandy last week for the 80th anniversary of D-Day

  The King and Queen will then go to Crown Pier to learn more about the island's environment, heritage and traditions. The showcase will include the ongoing work to promote Guernesiais - or Guernsey French, local food production and biodiversity initiatives. The Bailiff of Guernsey, Sir Richard McMahon, said: “It will be a great privilege to welcome Their Majesties to the bailiwick for the first time as King and Queen; the year after their Coronation." "Their visit this summer shows just how special the relationship between the Crown and the islands is.” Part of the visit is to demonstrate the bailiwick's commitment to supporting biodiversity, sustainability and combatting climate change. Chief Minister Lyndon Trott said: "We are looking forward to showcasing our initiatives to support those efforts and promote sustainability across a range of sectors." The States of Guernsey said the King and Queen were not able to go to Alderney and Sark due to "time restraints". Representatives from those islands will be present. The Lieutenant-Governor of Guernsey, Lt Gen Richard Cripwell CB CBE, said: "We look forward to welcoming representatives from Alderney and Sark to Guernsey on the day of the visit.” King Charles has resumed some public duties as he continues to be treated for cancer. He temporarily stopped most of his public engagements after his diagnosis in February, but is now undertaking a full summer programme of appearances. He is due to the deliver the King's Speech on 17 July as part of the State Opening of Parliament after the UK general election on 4 July.
