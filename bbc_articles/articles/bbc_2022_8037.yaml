title: Voting continues in Wakefield and Tiverton and Honiton by-elections - BBC News
date: '2022-06-23'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-61898785
content: |-
  Voters in Wakefield, and Tiverton and Honiton will choose their new MPs on Thursday.

  Voting continues at polling stations in Tiverton and Honiton, and in Wakefield where the two English by-elections are being held.

  The two seats, in West Yorkshire and Devon, were won by the Conservatives at the last general election, in 2019.

  People in the constituencies have until 22:00 to cast a ballot.

  The weather has been warm and sunny in Wakefield, while there has been sunshine and showers in Honiton and Tiverton.

  Eight candidates are running in Honiton and Tiverton.

