title: Virginia McCullough admits murdering parents in Great Baddow - BBC News
date: '2024-07-04'
section: Essex
url: http://www.bbc.co.uk/news/articles/cgrl9r1312jo
content: |-
  Virginia McCullough pleads guilty to killing her mum and dad, whose bodies were found at her home.

  Virginia McCullough appeared at court via video link from HMP Peterborough

  A woman has admitted murdering her parents after their bodies were discovered at the family home. Virginia McCullough, 36, pleaded guilty to murdering Lois and John McCullough, aged 71 and 70, between 17 and 20 June 2019. She poisoned her father with prescription medication and stabbed her mother shortly afterwards, Essex Police said. McCullough, of Pump Hill, Great Baddow near Chelmsford, was told she would be sentenced in October at Chelmsford Crown Court.

  Remains were discovered in the search for missing Lois and John McCullough

  Police initially attended McCullough's address on 13 September 2023 following concerns for the welfare of Mr and Mrs McCullough, who were missing. The defendant appeared at the brief hearing earlier via video link from HMP Peterborough. Judge Christopher Morgan remanded her in custody ahead of the sentencing. "There is a single sentence that can be passed upon you in these circumstances," Judge Morgan said, referring to the mandatory life sentence for murder. "Consideration, however, has to be given to the minimum term."

  Det Insp Lydia George said it had been a "hugely complex investigation"

  McCullough confessed to officers that she continued to live at the address after concealing her parents' bodies inside the property. She then lied about their whereabouts, telling doctors and relatives they were unwell, on holiday or on lengthy trips, Essex Police said in a statement. McCullough was caught after her parents' GPs raised concerns over missed appointments.

  An inquest into the deaths of Mr and Mrs McCullough was opened and adjourned in October last year. Area coroner Michelle Brown said Mrs McCullough died from “stab wounds to the chest” but the cause of death for her husband was “pending further investigation”. The coroner suspended both inquests until the outcome of the police investigation. Speaking after the guilty pleas were entered, Det Insp Lydia George said McCullough's actions had a "significant and emotional impact" on the family. “Clearly this was a hugely complex investigation from the outset," she said. “Officers were met with an incredibly challenging scene and worked at the address over the course of several days to carry out forensic inquiries."
