id: bbc_2023_18786
title: 'Watch: Flames engulf Guinea oil depot after huge blast - BBC News'
date: '2023-12-18'
section: General
url: http://www.bbc.co.uk/news/world-africa-67749873
content: |-
  The blast at the African country's only oil refinery blew out the windows of local houses, witnesses say.

  A fuel depot in the West African country of Guinea has exploded, killing at least eight people and injuring more than 80.

  Eyewitnesses said the blast at the Guinea's only oil refinery blew out the windows of local houses.

  Firefighters in the capital, Conakry, rushed to the oil terminal after it caught fire early on Monday.

  The explosion was caused by a fire. It is unclear what started the blaze but an investigation has been launched, the government said.
