title: Barn owl filmed perched on moving car on A11 in Suffolk - BBC News
date: '2024-12-22'
section: General
url: http://www.bbc.co.uk/news/videos/c4gl8d1vd0eo
content: |-
  The "troubling" footage shows the bird balancing on an open window frame on a dual carriageway.

  A barn owl has been filmed perched on a the frame of a car's open window as it travelled along a dual carriageway.

  The video, viewed tens of thousands of times on TikTok, shows the bird balancing and flapping its wings as the driver slows down to approach the Fiveways roundabout on the A11 at Mildenhall in Suffolk on 6 December.

  Adrian Blumfield, from the Hawk and Owl Trust, external, based in Fakenham in Norfolk, described the footage as "troubling" and said he was extremely concerned.

  "This behaviour shows complete disregard for the bird's welfare, with the loud noises, vibrations and movement potentially causing significant stress, while also putting the bird at risk of physical injury," he said.

  An RSPCA, external spokesperson said: "Not only could this have caused a potentially dangerous distraction to the car driver and other road users too but it is placing the owl in an unsafe and distressing situation which is completely unacceptable."
