title: 'Nora Quoirin: Police set up new hotline to locate her - BBC News'
date: '2019-08-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49311248
content: |-
  Nora Quoirin, 15, has been missing from her room at a Malaysian holiday resort since last Sunday.

  Police officers announced the new hotline during a press conference earlier

  Malaysian police have set up a hotline dedicated to receiving information about teenager Nora Quoirin who has been missing for a week.

  A team of 200 people are currently searching for the 15-year-old, who has special needs.

  Nora was last seen in the Dusan resort on 4 August where she was on holiday with her parents.

  Police officers announced the new hotline in Malaysia - 0111 2285058 - on Sunday.

  On Saturday, her parents Meabh and Sebastien Quoirin thanked the teams searching the Malaysian jungle for her.

  Nora's mother thanked the emergency crews for their work "especially at a special festival time", referring to the Islamic festival of Hari Raya Haji.

  Nóra Quoirin went missing from her room on 4 August 2019

  The Quoirins, an Irish-French family who have lived in London for 20 years, arrived in the Dusun forest eco-resort in southern Negeri Sembilan state a week ago.

  Nora was last seen on Sunday 4 August. Her father raised the alarm the following morning when the family realised the teenager had gone missing from her bedroom with the window open.

  The teenager's family said she was born with holoprosencephaly, a disorder which affects brain development, meaning that she "struggles with co-ordination".

  Her family has said Nora is "not independent and does not go anywhere alone".

  At Sunday's press conference the local police force also released pictures of them with Nora's father.

