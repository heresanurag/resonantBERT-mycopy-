title: Poorest children missing more school and further behind after Covid, study
  says - BBC News
date: '2025-03-17'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/c4g0rxz2yj4o
content: |-
  Those from the lowest income families are now up to 19 months behind peers by the age of 16.

  Poorest children missing more school and further behind after Covid

  The poorest children are missing more school and falling further behind classmates, research shared with the BBC suggests. According to new analysis by the Education Policy Institute (EPI) - which looked at pupil performance after the Covid-19 pandemic - children from the lowest income families are now up to 19 months behind peers by the time they are 16 years old. Education Secretary Bridget Phillipson told BBC Panorama Covid had led to a "serious and profound shift" in attitudes to attendance. She said lockdowns had cast "a long shadow" over the life chances of the youngest children. The latest statistics for persistent absence show 15% of primary children in England have missed at least one in ten days of school this school year - up from about 8% before Covid. It comes as the gap between the poorest students and other pupils had mainly narrowed before the pandemic, following years of effort by schools. However, the report suggests it is getting worse. The gap - which is measured using GCSE results - would reduce from 19 months to 15 months of learning if school attendance was the same for all pupils, it says.

  Natalie Perera, from the EPI, said it is the first time "a very clear link" has been made between how much children from the lowest income families attend school, and how far behind other pupils they have fallen. Her team looked specifically at children who have received free school meals in the past six years, which means the family income is less than £7,400 a year after tax and not including benefits. Ms Perera said more research was needed to understand why these children struggled to be in school, with possible factors including poor housing and mental health. It is five years since the UK went into lockdown, when schools closed to most children. Playgroups and nurseries also shut, with parents of babies and toddlers isolated from their extended family. There were other changes too, as health visitors were re-deployed or in contact with parents only online.

