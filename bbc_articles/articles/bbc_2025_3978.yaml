  Panorama has heard from families and teachers about the impact on these children, who are just starting or are still in primary school. Schools say some have delayed speech and understanding of words, or have slower social or emotional development, or they lack basic skills normally picked up through play. Professor Catherine Davies, from the University of Leeds, says some children missed out on "fundamental skills" they need to make sense of school and get on with wider groups.

  At Queen's Drive Primary School, in Preston, teaching assistant Sarah Barraclough has been trained in a national programme to help four and five-year-olds in England with speech and language. She says the impact of Covid has been "huge" and if they don't learn to say and understand more words, children then become isolated. "You're lonely and not getting involved in the games in the playground," she says. Emaan, now aged four, was born during the first UK lockdown and is one of the children receiving help through Nuffield Early Language Intervention (NELI). His parents, Ruby and Charles, really notice the difference between Emaan and his older brother. During the pandemic, Emaan barely went out and met other people. Charles says there is a "stark difference" between their sons and that Emaan is a lot more clingy. The NELI programme to train teaching assistants is funded until the end of this school year in England. But beyond then, funding has not yet been confirmed.

  The government has set a 2028 target for 75% of children - up from 68% - to reach a good level of development by the time they leave reception. Some of the cultural shifts caused by the lockdowns and partial school closures could prove to be the hardest to resolve. The education secretary told the BBC the pandemic had profoundly changed attitudes towards attendance. She said it was important the youngest pupils got the "support they need to thrive".

