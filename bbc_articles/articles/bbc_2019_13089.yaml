content: |-
  The trial continues of four people for the murder of 17-year-old Jodie Chesney in east London.

  'I know where your mum lives and snitches get stitches'

  After being arrested at his sister's address in Leicester and being interviewed by police in east London, Manuel Petrovic was charged with Jodie's murder on 9 March - a week after the fatal stabbing. Mr Petrovic was remanded into custody at Belmarsh Prison - and he told jurors he and Svenson Ong-a-Kwie had a "heated" chat in prison. "He came to my door at one point," Mr Petrovic said. "He asked me to go on a visit with someone. "Someone called Kevin. I said I did not know a Kevin. "He said, 'I know where your mum lives' and 'snitches get stiches or something'. "I can't remember what I said that day and that was it." The following day, Mr Petrovic said the pair met again in the exercise yard at Belmarsh. The 20-year-old told jurors: "He came to me and said sorry for what he had said the day before. "He said I was only the driver, I was not involved and I should be going home."
