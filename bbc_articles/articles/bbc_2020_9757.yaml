  • None Mikel Arteta has become the first person to both captain and manage Arsenal to victory in an FA Cup final.
  • None Chelsea have lost three of their past 10 FA Cup final matches, with all three defeats coming against Arsenal.
  • None The Gunners have won each of their past seven FA Cup final appearances since 2002 - no team has had a longer run of successive final triumphs in the competition.
  • None Arteta is the first Arsenal manager to win a major trophy in their first season in charge of the club since George Graham in 1986-87.
  • None There was just one shot on target in the whole of the second half, which was Pierre-Emerick Aubameyang's winning goal.
  • None Since his debut for Arsenal in February 2018, Pierre-Emerick Aubameyang has scored 70 goals in all competitions, more than any other Premier League player in that time.
  • None Christian Pulisic's opener was the first FA Cup final goal scored by an American player.
  • None Mateo Kovacic became the sixth player to be sent off in an FA Cup final, with the last two of them being Chelsea players (Victor Moses was dismissed, also against Arsenal, in 2017).
  • None Willy Caballero (38 years 308 days) became the oldest player to play for Chelsea in an FA Cup final, while substitute Callum Hudson-Odoi (19 years 268 days) became the youngest to play in the showpiece for the Blues.
