title: Asia Argento's accuser Jimmy Bennett speaks out - BBC News
date: '2018-08-23'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-45281595
content: |-
  Actor Jimmy Bennett says he was "ashamed and afraid" when the story came out.

  Jimmy Bennett played Asia Argento's son in 2004 film The Heart Is Deceitful Above All Things

  Actor Jimmy Bennett, who has accused Italian actress Asia Argento of sexually assaulting him as a teenager, has said he was "ashamed and afraid" when the story came out.

  He said he felt there was a "stigma" to being in the situation as a man.

  The New York Times said Argento, a leader of the #MeToo movement, paid Bennett $380,000 (£298,000) after he accused her of assaulting him at 17.

  She has admitted making a payment but denied any sexual misconduct.

  The NY Times said Bennett had accused Argento of assaulting him in 2013. He played Argento's son in the 2004 film The Heart Is Deceitful Above All Things.

  He said he came forward when Argento made public her claim of rape against Harvey Weinstein.

