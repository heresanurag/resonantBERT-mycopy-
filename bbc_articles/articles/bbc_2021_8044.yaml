id: bbc_2021_8044
title: Commuters and children rescued from China floodwaters - BBC News
date: '2021-07-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-57908888
content: |-
  Many people have been saved from the the waist-high waters across Henan province.

  Days of record-breaking rainfall have caused widespread floods across China's Henan province.

  Twelve people died after record-breaking rainfall flooded underground railway tunnels in China, leaving passengers trapped in rising waters.

  More than 500 people were eventually rescued from the tunnels in Henan province, officials said.

  Around 150 children and teachers were rescued from a kindergarten.

  China's meteorological authority said heavy rain was likely to continue until Thursday.
