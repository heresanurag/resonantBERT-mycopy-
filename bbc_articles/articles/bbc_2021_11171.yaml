title: 'Sabina Nessa: Hundreds gather to pay respects at London vigil - BBC News'
date: '2021-09-25'
section: General
url: http://www.bbc.co.uk/news/uk-58684583
content: |-
  More than 500 gather for a vigil for the teacher who was killed as she walked to a London pub.

  Hundreds of people have joined a vigil for teacher Sabina Nessa, who was killed as she walked to a pub in south-east London.

  The 28-year-old was discovered in Cator Park in Kidbrooke by a member of the public last Saturday.

  She had been walking to meet a friend at The Depot bar the night before, a journey which "should have taken five minutes".

  More than 500 people gathered at Pegler Square, not far from where a wanted suspect was captured on CCTV.
