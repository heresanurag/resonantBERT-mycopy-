  After receiving complaints about work undertaken by Key Forensic Services, Essex Police appointed Iain Peck, a specialist fire investigator from Prometheus Forensic Services, to review it. Mr Peck said he was disappointed by the way samples of a large piece of laminate flooring in the lounge, where it was believed the fire started, had been taken. "Whoever was doing the packaging had stuck a nylon bag over one end, another nylon bag over another end, and then used Sellotape to kind of make some sort of Christmas cracker." The samples were rejected as they needed to be airtight so they could retain vapour from any potential accelerant used, he added. Mr Peck said the neighbour's car, a silver Ford Focus, which had been set alight the night of the fire, had not been fully excavated and appropriate samples had not been taken within 24 hours. Prometheus Forensic Services complained to the Forensic Science Regulator at the Home Office at the time about Key Forensic Services' work. However, the regulator said although a code of practice and conduct was published in 2011, it did not cover fire scene investigation.

  The government-owned Forensic Science Service (FSS) was closed down in early 2012 by the Home Office, with much of its work taken on by private companies which had to bid for contracts with police forces in England and Wales. In 2011 Andrew White, then chief executive of Hertfordshire Police Authority, warned in The Guardian, external the decision to close FSS was so rushed that forces would have to turn to private suppliers without doing due diligence. Mr Hadjicostas believes the loss of the FSS affected the investigation. "The impact of that is when we're trying our best to try to find the cause and the origin of a fire in very, very difficult circumstances, you want your best people there," he added.

  Dr Shakoor remains frustrated that no-one has been brought to justice for the deaths of his family

  Essex Police discovered there were three other burglaries within the hour of the fire at Barn Mead and seven people have been arrested during the investigation. One person arrested in May 2013 was found to have a glass fragment on their clothing that matched the neighbour's torched car, but not all the fragments were tested.

  Coroner Caroline Beasley-Murray recorded an open verdict at an inquest into the deaths at Chelmsford Coroner's Court in 2014, adding: "Not all of the pieces of the jigsaw are there yet." Dr Shakoor said he remained frustrated that no-one had been brought to justice and that he was "losing hope." "I'm really shocked because I never thought they wouldn't have done it properly. We put our trust in the relevant departments," he said. "We need some sort of a conclusion and some closure."

  Key Forensic Services said it was still working with Essex Police and therefore unable to comment. It was unable to put the BBC in touch with the forensic scientist it used for the case, and we have been unable to trace them. Essex Police said it remained committed to doing all it could to give Dr Shakoor justice for the loss of his family. It added the investigation remained live and so there were elements raised by the BBC that it could not speak about. The Home Office said forensic investigations were conducted independently of the government and that it could not comment on specific aspects of the case as it remained an ongoing investigation. A spokesperson added the Home Office would be appointing a national forensic science lead who would "transform our approach to forensics, ensuring these vital services deliver justice for victims".

