title: Liam Smith beats Chris Eubank Jr via fourth-round stoppage - BBC Sport
date: '2023-01-21'
section: General
url: http://www.bbc.co.uk/sport/boxing/64362496
content: |-
  Liam Smith stops Chris Eubank Jr in four rounds to win their middleweight fight in Manchester.

  Last updated on .From the section Boxing

  Underdog Liam Smith stopped Chris Eubank Jr in four rounds to bring a bitter rivalry to an explosive end.

  Eubank Jr, 33, had been unbeaten since 2018 but suffered the first stoppage defeat of his career.

  Liverpool's Smith knocked Eubank down twice in quick succession in the fourth round before the referee waved off the middleweight contest in Manchester.

  Fight week was dominated by controversy but it was Smith who pulled off the upset after moving up in weight.

  There were rapturous celebrations among Smith's team and in the crowd when the fight ended, with the 34-year-old's brothers Callum, Paul and Stephen joining him in the ring.

  The two fighters hugged in the ring after emotions calmed and Smith opened the door to a rematch in his post-fight comments.

  "I said all week I'm a good finisher and I knew if I got him hurt that I would finish him," Smith told BBC Radio 5 Live.

  "Name me a Chris Eubank fight that has been respectful - not many.
  • None Reaction & as it happened: Smith upsets Eubank at middleweight

  "Something I said may have come across wrong and I apologise for anyone offended by that. I respect everybody and it was just tongue in cheek with Chris.

  "There's not many fighters who can milk a crowd like I can. That was up there with the best nights in my career.

  "I'll do the rematch on my terms."

  Eubank-Smith had gradually turned into an unexpected grudge match that erupted during fight week.

  The pre-fight media conference saw Eubank suffer homophobic taunts from Smith. The Liverpudlian denied his comments were homophobic. He was then the victim of taunts about social class and personal attacks about infidelity from Eubank.

  It meant fight night was a charged affair once the main event rolled around just before 23:00 GMT.

  Smith emerged first to a brilliant reception and was the clear crowd favourite having made the short trip from Liverpool.

  Eubank entered the arena to a chorus of boos, but appeared undeterred, taking an extra moment to turn and face the crowd before jumping over the ropes.

  But it was a cautious opening from Eubank. Smith was on the front foot, tagging Eubank in the opening rounds with quick right hands.

  Eubank, though, was prepared to ride out the pressure and came to life in the third with a flurry of uppercuts after a left hook landed on Smith.

  But just as it seemed Eubank was getting a foothold in the fight, Smith came back strong in the fourth round.

  He caught Eubank with a succession of left hooks and landed an uppercut during a combination that sent Eubank falling backwards.

  The Brighton native immediately returned to his feet but was visibly unsteady.

  The referee allowed the contest to continue and Smith pounced on a hurt Eubank, immediately sending him back to the canvas.

  The defeat is the third of Eubank's career and leaves him at a crossroads should he decide against fighting Smith again.

  For Smith, victory marks the fourth stoppage win in a row as the veteran fighter continues to enjoy a purple patch, picking up the 33rd win of his career.

  Will there be a rematch?

  After such a bitter rivalry and thrilling conclusion, many fight fans will be hoping to see Smith and Eubank meet again in the near future.

  Before fight week, Smith revealed there was a rematch clause and Eubank has the option to activate it.

  Eubank, who had never been dropped before in his career, is open to a second fight and it seems a likely proposition considering the attention this week has generated - with the fighter citing Liverpool's Anfield home as a potential venue.

  "Big congratulations to Liam. I felt like it could've gone on but he caught me with a great shot," Eubank told Sky Sports afterwards.

  "The build-up got a bit ugly at the end and I regretted that.

  "I respect you and your family and I always have. If the fans want to see a rematch, we can get it on at Anfield."
