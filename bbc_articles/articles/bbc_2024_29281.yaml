title: Cheshire East bins will be collected once every three weeks - BBC News
date: '2024-11-27'
section: England
url: http://www.bbc.co.uk/news/articles/ce31xwq2ev9o
content: |-
  Parts of Cheshire will see their general waste bins collected once every three weeks.

  84% of people who responded to a consultation were against the plans

  Household general waste bin collections in parts of Cheshire are set to be reduced to once every three weeks. Cheshire East Council is set to sign off plans to introduce to move away from fortnightly collections despite significant opposition to the proposals. Around 84% of people who responded to a consultation on the plan opposed it, with concerns raised including around vermin, littering and fly-tipping. Cheshire East Council, which has faced financial issues in recent months, said it had “no choice” but to bring in the measure and recognised the proposal was not supported by some residents.

  More than 6,200 people responded to a consultation, with 77% saying they strongly opposed the plan and 6% saying they tended to oppose the plan. The changes will come into force in April 2026 - the same date by which councils need to implement weekly food waste collections as part of recycling reforms announced by the previous government. A spokesperson for Defra said ministers are currently reviewing the policies. The BBC understands that the government is planning to bring in the reforms.

  Mick Warren, the chair of the council’s environment and communities committee, said the plans were linked to the changes to food waste recycling. "Financially, we have no choice but to propose a move to three-weekly black bin collections. "It could reduce the expected costs of introducing weekly food waste collections from £1.75m per year to around £450,000," he said. He added the council had listened to feedback and was planning to invest in mitigation measures including the introduction of more education and enforcement officers. Alongside the collection changes, the council is set to bring in an order to allow for £80 fixed penalty notices for those who leave bins out for days before or after bin collections. In the consultation, 69% of people said they were against plans to bring in more education and enforcement officers. The council has also said it recognised some households required a larger bin, and would clarify its waste policy guidance for larger households and those who need to throw away bulky medical waste. The proposals are set to be signed off by the authority’s Environment and Communities Committee later.

