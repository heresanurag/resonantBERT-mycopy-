title: Baby hit by brick thrown through bus window in Glasgow - BBC News
date: '2023-01-11'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-64237314
content: |-
  The infant was taken by ambulance to hospital but was not seriously injured.

  The brick was thrown through the bus window on Battlefield Road in the southside

  A baby has been hit on the head by a brick that was thrown through a bus window in Glasgow.

  Emergency services were called to the scene on Battlefield Road, in the city's southside, at about 18:45 on Tuesday.

  The 15-month-old was taken to hospital where she was checked over and later released.

  Police said she was not seriously injured, but her mother was "extremely upset and distressed".

  The baby was sitting in her pram on the a number five First bus with her mother when the brick came through the window.

  It landed on the pram and hit the infant on the head while glass from the broken window also landed on the pram.

  Det Insp Darren Munogee said inquiries are ongoing to establish the full circumstances.

  He urged anyone with information to get in touch via Police Scotland's non emergency line.

  A spokesperson for First Glasgow added: "We are shocked and saddened by this incident and are working closely with the relevant authorities to find those responsible.

  "Our thoughts are with the injured passenger and their family, and we wish them a speedy recovery."

