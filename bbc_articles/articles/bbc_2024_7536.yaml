content: |-
  England continued their perfect start to the Women's Six Nations as they swept to a comprehensive win away in Scotland.

  Marlie Packer goes over for England in a comprehensive victory

  England continued their perfect start to the Women's Six Nations as they swept to a comprehensive win over Scotland at Edinburgh's Hive Stadium. First-half tries from Amy Cokayne, Abby Dow and Ellie Kildunne put the visitors in control in front of a record crowd for Scottish women's rugby, and the scoring continued after the break despite Cokayne being sent off for her second yellow-card offence. Sadia Kabeya and Kildunne scored either side of a Jess Breach double, before Marlie Packer added further gloss. Defending champions England are top of the standings with three bonus-point wins, while Scotland are fifth after their second defeat of the championship.

  In the shadow of Murrayfield, England dominated possession and territory from the off, and the pressure soon told. Cokayne, starting her first Red Roses game in a year after overcoming a calf injury, stepped off her left foot to beat one defender, before crashing through another attempted tackle to open the scoring. Scotland's resolute defence was a feature of both their win over Wales and their narrow defeat by France, and they were forced to make tackle after tackle in the opening stages as England piled forward in wet and windy conditions. However, a lovely offload from Kabeya released Dow down the right, and the England winger pinned her ears back to score in the corner. The visitors thought they had a third score when Maud Muir blasted her way over from close range, but Cokayne was sin-binned for an illegal clearout on Evie Gallagher in the build-up and the try was chalked off. The numerical disadvantage did not slow England down though, and the third try arrived soon after in stunning fashion. Holly Aitchison's grubber kick was weighted perfectly for Meg Jones, who showed superb vision to kick the ball square for the onrushing Kildunne. England's full-back beat Alex Stewart to the ball to score under the posts. Scotland did have their moments in attack, but they were hamstrung by a malfunctioning lineout and several handling errors, as the blustery conditions played a part. Kabeya had the simplest of finishes following a dominant England scrum, which wrapped up the bonus point, and Breach then crossed for her first try of the contest after a clinical backs move. England played the majority of the second half with 14 players, after Cokayne received a second yellow card for a high tackle on Lana Skeldon. However, Scotland were unable to turn the tide, and Breach, who said this week that she wanted to "ruin" the home crowd's day, skipped past Helen Nelson to score her second. The hosts found themselves more and more overrun as the game went on, and Kildunne had the freedom of Edinburgh to stroll into the corner for her sixth try of the tournament. Regular England captain Packer came off the bench to complete the scoring with a strong finish from close range after Scotland coughed up possession from their own lineout throw. Bryan Easson's Scotland side have progressed steadily since they went professional and pushed France close last time out, but this was a reminder of just how far ahead England are in the women's game. The Red Roses, who have scored eight tries in each of their three matches and only conceded once, have won 27 consecutive Six Nations matches and are eyeing a third Grand Slam in a row.
