title: Bluey animated film announced by Disney+ and BBC Studios - BBC News
date: '2024-12-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/cvg60qy01eyo
content: |-
  The movie, based on the hugely successful children's TV series, will hit cinemas in 2027.

  Bluey has become a sensation across the world

  Bluey, the puppy and star of the Bafta-winning children's TV show, is hitting the big screen in her first feature film. It will arrive in cinemas in 2027 and will then stream on Disney+, ABC iView and ABC Kids in Australia. BBC Studios, the BBC's commercial arm, is teaming up with Disney for the project. Bluey is a blue heeler dog, who lives with her mum, dad and little sister, Bingo. She turns everyday events in her life into adventures.

  The show's voice actors will be working on the film as well

  The show's creator, Joe Brumm, said: "I've always thought Bluey deserved a theatrical movie. I want this to be an experiential event for the whole family to enjoy together." The TV series was co-commissioned by ABC and BBC Studios in 2017 and is made by Australian production company Ludo (a blue heeler is an Australian dog breed). It's available in more than 140 countries, and is the top show on CBeebies and Disney+ in the UK. It's also this year's most-watched series globally on Disney+, according to Nielsen Media Research. The series has also won numerous awards including Television Critics Association Awards in 2023 and 2024 and this year's Peabody Award. The series has been streamed for more than 20 billion minutes on Disney+ in the US over the last year, putting it in the country's top 10 streaming programmes for minutes viewed. The film will feature the vocal actors from the TV show, including Melanie Zanetti and David McCormack as Bluey's parents, Chilli and Bandit Heeler, and music created by its composer Joff Bush.
