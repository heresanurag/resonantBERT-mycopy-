content: |-
  A dam in Minnesota fails from heavy flooding prompting evacuations

  The Rapidan dam in Blue Earth County, Minnesota, failed on June 24, 2024, due to intense flooding. The breach has led officials to issue an urgent evacuation order for nearby residents. The flooding not only compromised the structural integrity of the dam but also resulted in significant infrastructure damage. Emergency services are actively managing the situation to ensure the safety of the residents and mitigate further damage.
