title: Jeffrey Donaldson sent for trial on sex offence charges - BBC News
date: '2024-07-03'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cql8qyqlj2eo
content: |-
  The ex-MP is charged with rape, four counts of gross indecency and 13 counts of indecent assault.

  Jeffrey Donaldson sent for trial on sex offence charges

  A judge has ruled there is sufficient evidence for Sir Jeffrey Donaldson and his wife to face trial over historical sex offence charges. The former Democratic Unionist Party (DUP) leader, 61, has appeared at a preliminary enquiry hearing in Newry Magistrates' Court. He is accused of 18 offences involving two alleged victims. The ex-MP is charged with rape, plus four counts of gross indecency and 13 counts of indecent assault. She faces five charges of aiding and abetting between 1987 and 2008 in connection with the alleged offences. His offences are alleged to have happened between 1985 and 2008. Both accused appeared in the dock during a three-minute hearing on Wednesday. It was held to establish whether there is sufficient evidence to progress the case to crown court trial. During proceedings, both defendants were asked if they wished to say anything in respect of the charges. District Judge Eamonn King said: “I am satisfied, on the basis of the papers before the court, there is a prima facie case to answer.” He set the date of the next hearing for 10 September. The pair were arrested at their home on 28 March and charged after a day of questioning at Antrim police station. They first appeared in court in April. Sir Jeffrey stated he would be strenuously contesting the charges when he announced he was quitting as DUP leader.

  Photographers were in position on ladders at the court entrance long before Sir Jeffrey and Lady Donaldson arrived this morning. Television camera crews and news reporters pressed against crush barriers looking for a perfect vantage point. Dozens of police officers wearing high visibility jackets were positioned beside the steel barriers erected along both sides of the busy main road outside the courthouse. The two defendants arrived separately, between 09:30 BST and 10:00. Sir Jeffrey was first to arrive, followed a short time later by Lady Donaldson. A handful of bystanders watched from across the road as they walked in turn between the barriers and through the front door of the courthouse. Shortly after 11:00, they walked back out of court, once more to the sound of clicking cameras, and news reporters watching every step as they made their way, minutes apart, to a waiting car.

  Sir Jeffrey Donaldson pictured after he was elected as DUP leader in June 2021

  Sir Jeffrey Donaldson was elected leader of the DUP in 2021. He was Northern Ireland's longest-serving MP, having been first elected to Parliament in 1997 as a representative of the Ulster Unionist Party (UUP) He first entered politics when he worked for MP Enoch Powell between 1982 and 1984 after joining the UUP. Sir Jeffrey's own career in front-line politics began in 1985 when he was elected to the Northern Ireland Assembly as its youngest member. In 2003, he left the UUP to join the DUP due to his long-standing opposition to the 1998 Good Friday Agreement and the leadership of David Trimble. Sir Jeffrey recently steered the DUP back into government in Northern Ireland ending a two-year boycott of the devolved institutions. He was knighted in 2016 for political service. He married his wife Eleanor in 1987.
