title: 'Boy George: Bowie''s gig in Lewisham ''big turning point for me'' - BBC News'
date: '2025-06-15'
section: General
url: http://www.bbc.co.uk/news/videos/ce3v9qgr476o
content: |-
  The documentary Boy George & Culture Club had its world premiere this week in New York.

  Boy George has said seeing David Bowie perform as Ziggy Stardust was "a big turning point" for him at the age of 11.

  Speaking to the BBC about his upcoming album SE18 and the documentary Boy George & Culture Club, which had its world premiere at the Tribeca Film Festival, external in New York this week, he reflected on how London's music scene influenced him growing up.

  The new film dives headfirst into the "chaos, charisma, and enduring bond" of one of the most iconic bands of the 1980s.

