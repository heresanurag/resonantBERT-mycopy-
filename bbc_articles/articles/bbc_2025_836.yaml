title: Burst water pipe causes '30-foot geyser' in street in Sheering - BBC News
date: '2025-02-13'
section: General
url: http://www.bbc.co.uk/news/videos/cjr8w7p1lj2o
content: |-
  Water gushed high into the air near homes, with one person saying "it was like a river".

  Video showed water gushing high into the air from a burst pipe in a residential street.

  People in Sheering Lower Road near Sheering, Essex, said it began at about 09:30 GMT and lasted until about midday.

  Lorraine Thompson likened it to a "massive geyser". She said: "Honestly, it's the only way I can describe it. About 30ft (9m) in the air - just shot up."

  Jeanette Ayres, who also lives nearby, added: "A lot of water went, a lot... it was like a river out there."

  Affinity Water said its site technician "responded immediately" and the pipe had since been repaired.

  "Thankfully, no customers were affected," a spokesperson said.
