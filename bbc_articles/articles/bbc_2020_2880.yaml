title: 'Coronavirus: Self-employed will get 80% income, chancellor announces - BBC
  News'
date: '2020-03-26'
section: General
url: http://www.bbc.co.uk/news/uk-52054746
content: |-
  Rishi Sunak says the money will be paid in a single lump sum, but will not begin to arrive until June.

  Self-employed workers can apply for a grant worth 80% of their average monthly profits to help them cope with the financial impact of coronavirus, the chancellor has announced.

  UK Chancellor Rishi Sunak said they had "not been forgotten" when he announced the new measures in the daily Downing Street briefing.

  Plans for 80% wage subsidies for staff kept on by employers were announced last week.
