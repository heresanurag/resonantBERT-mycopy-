id: bbc_2019_2537
title: The bar on wheels keeping French villages alive - BBC News
date: '2019-03-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-47419915
content: |-
  How one man and his mobile bistro are fighting back against the decline of rural communities.

  As a result of rural decline, most French villages no longer have a bar or café.

  But in the Cher department of central France, one man is fighting back with a novel idea: a bistro on wheels.
