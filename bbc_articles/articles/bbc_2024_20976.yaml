  • None Watch: Seven days of violence and disorder in the UK "We don't know if they will transpire to be protests like we've seen in other places or whether it's a list that's intended just to cause alarm and distress or even to provoke," Mr McMahon said. "But to be clear we are absolutely prepared in terms of our policing response, in terms of our prosecutor response, and also in terms of our court response." The BBC has approached Telegram for comment on the spreading of the list - it is yet to respond. However, in a previous statement about the unrest it said its moderators were "actively monitoring the situation and are removing channels and posts containing calls to violence." It said such "calls to violence" were explicitly forbidden in its terms of service. Mr McMahon warned people could "expect the full force of the law" if they "cross the line", whether it is "on the street or online". The Telegram group was created just hours after the killing of three children at a holiday club in Southport, on Merseyside, on 29 July. That triggered waves of unrest in England and Northern Ireland, partly fuelled by far-right activists and online misinformation. Henry Parker from fact-checking firm Logically said one issue the government was facing is that powers in the Online Safety Act - which could be used to tackle the spread of misinformation - aren't yet in force. "Unfortunately, riots haven't waited for regulatory processes to catch up, and that's the situation we find ourselves in at the moment," he said.

