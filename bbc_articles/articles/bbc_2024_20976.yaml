  Mr Parker added, that while he was confident the government was taking steps to tackle the problem, multiple teams had a role in fighting misinformation which could lead to a “to-and-fro where people are trying to work out ‘Well what do we do about this?’” slowing down action." Mr McMahon would not be drawn on whether Telegram could be told to remove channels where the list is being spread, or whether the messaging app could be blocked altogether. He said it was important that police and prosecutors were able to do their jobs "without any political interference". Mark Webster, the chief constable of Cleveland Police, told Today people should be "very careful" about "naming individual premises or saying what we’re doing individually in forces". "You will see an awful lot of resource today and over the following days to make sure we can manage responses to all of the intelligence that comes in," he said. He urged people to focus on official communications online, and not to "react to things on social media from sources you can’t verify". Ciaran O’Connor, analyst at online extremism think thinktank, ISD, told the BBC that Telegram had taken "a hands-off approach to tackling disinformation and all shapes of extremism" on its platform. "We’ve seen lists of refugee accommodation and immigration services addresses being shared, and an invitation to ‘protest’ on Wednesday evening," he said. "We’ve seen the celebration of violence that has happened so far, and the widespread dissemination of false, misleading and inflammatory claims about Muslims, migrants and the stabbing. "This captures the essence of the largely unmoderated space on Telegram.”
