  A round-up of news and information on coronavirus in Wales.

  'Most careful steps' to avoid virus taking off again

  The Welsh Government will not risk creating conditions in which coronavirus "takes off again", the first minister has said. Mark Drakeford told the Senedd his administration would take the "most careful and cautious steps forward" that will have the "best impact for the minimum amount of risk". "Any step beyond lockdown is a risk", Mr Drakeford said, but he was not prepared to sign up to "any sense of a cavalier approach to risk in which we put people knowingly in harm's way". Answering a question from UKIP's Neil Hamilton, Mr Drakeford agreed that the economy needed to be opened up again but added: "We are not going to create conditions in which coronavirus simply takes off again and spreads like wildfire to the whole population, creating huge spikes again in hospital admissions, overwhelming critical care capacity and so on." Mr Hamilton had suggested to the first minister that "we have to take the risk that the infection rate of coronavirus will continue as it is, so long as we can protect the vulnerable" in order to "get the economy back on its feet". The exchange came after Boris Johnson confirmed in Prime Minister's Questions that he would be setting out plans to begin lifting England's lockdown measures on Sunday, adding that he hoped to "get going on some of these measures on Monday".
