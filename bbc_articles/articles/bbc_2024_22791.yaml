title: 'Hampshire: Man arrested and stones thrown at police at car meet - BBC News'
date: '2024-09-22'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cpqz29340p0o
content: |-
  Officers were met by a 'hostile crowd' of about 500 people at a car meet in Hampshire, say police.

  This video can not be played To play this video you need to enable JavaScript in your browser. Stones were thrown at police during the car meet, which started in Winchester and ended in Southsea

  A man has been arrested after police were met with a "hostile crowd" of approximately 500 people at a car meet. Hampshire and Isle of Wight Constabulary said stones were thrown at officers by some of the people gathered. The event started at Winchester Park and Ride, before travelling around Hampshire and ending on Southsea seafront shortly after midnight on Sunday. Police received reports of dangerous and anti-social driving, public disorder and violence in connection with the event, including an assault on a member of the public.

  When the police attempted to engage with the group in Southsea they were met with a "hostile crowd", which included individuals throwing stones at them. One driver was arrested on suspicion of drug driving in Fareham, it said.

  Police said the crowd at the car meet had been "hostile"

  In videos posted on the social media platform Snapchat, a large crowd of people could be seen alongside cars loudly revving their engines and performing wheel spins and tricks. Ch Insp Marcus Cator said Hampshire police recognised that "not all car enthusiasts who meet up socially are involved in criminal or anti-social behaviour". He added: "However, there were some individuals last night who demonstrated a clear lack of regard for the safety of not only themselves but other road users and the community at large."

  Police said a a crowd of around 500 people had gathered

  He said the force would be reviewing evidence to "establish the extent of any offences" and "deal with anyone identified as being involved". Police have asked anyone with information or video footage of the meet to come forward.

  Hampshire and Isle of Wight Police and Crime Commissioner Donna Jones called the large-scale meets a "total blight on decent people's lives". In a post on X, Ms Jones said the events were "criminal" and "dangerous", adding: "They must stop."

