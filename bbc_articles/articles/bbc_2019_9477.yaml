title: 'Shah Faesal: India detains Kashmir politician at airport - BBC News'
date: '2019-08-14'
section: India
url: http://www.bbc.co.uk/news/world-asia-india-49345052
content: |-
  A day earlier, he told the BBC that PM Modi had "murdered the constitution in broad daylight".

