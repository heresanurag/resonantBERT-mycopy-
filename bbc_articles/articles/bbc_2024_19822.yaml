  Korda leads Women's Open from Hull after round two

  This video can not be played To play this video you need to enable JavaScript in your browser. Best shots from the second round of Women's Open

  -8 N Korda (US); -5 C Hull (Eng), L Vu (US); -4 R Yin (Chn); -3 M Saigo (Jpn), C Alexander (SA), P-Y Chien (Tpe), A Buhai (SA), L Ko (NZ), L Rydqvist (Swe*)

  Nelly Korda has a three-shot lead after a blemish-free 68 in the second round of the Women's Open at St Andrews. The American is eight-under for the week with England's Charley Hull - who led after round one - and defending champion Lilia Vu, also of the US, her closest challengers. After birdies at five and nine, two-time major winner Korda also sunk long putts for gains on the 17th and 18th holes. "I didn't take advantage of the calmer conditions on my front nine [the back nine]. But I played some really solid golf, and I'm happy with that," Korda said. Meanwhile, Hull, who is seeking her first major title, followed up her 67 in round one with a level-par 72. Runner-up in both the Women's Open and Women's US Open last year, Hull started on the back nine and bogeys at 10 and 14, followed by another on the second saw her slip back to two-under. However, she rallied with three birdies in five holes to finish to stay in contention going into the weekend. "I actually thought I hit it just as good as yesterday, I just missed three or four four-foot putts, but that was early on in my round," said Hull. "I'm only three shots behind. That's nothing going into the weekend, especially on this golf course."

  This video can not be played To play this video you need to enable JavaScript in your browser. Women's Open: Hat goes flying during tee off

  Vu was two-under for the round, with three birdies and a solitary bogey on the 17th. China's Ruoning Yin birdied the last to edge ahead of a six-strong group on three-under and is fourth, four strokes off the lead. Among the group tied for fifth on three-under is amateur Louise Rydqvist of Sweden, who produced one of the rounds of the day. The 23-year-old hit five birdies, including three on the back nine, to surge up the leaderboard with a superb 67. English amateur Lottie Woad remains within striking distance of the leaders on two-under, tied for 11th, after making four birdies in a second round of 70. Her compatriot Georgia Hall is a further shot back on one-under. Scotland's Catriona Matthew failed to make the cut in her final Women's Open but the 2009 champion signed off in style with a birdie on 18 at the home of golf.
