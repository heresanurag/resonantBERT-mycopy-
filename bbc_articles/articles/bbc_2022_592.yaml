  Rabbi Charlie Cytron-Walker speaks to CBS Mornings about being held hostage at a Texas synagogue.

  Watch as Rabbi Charlie Cytron-Walker speaks to CBS Mornings about being held hostage at a Texas synagogue on Saturday.

  He and three other hostages escaped unharmed.

  British citizen Malik Faisal Akram, 44, from Blackburn, was shot dead after a stand-off with police in Colleyville.

  More on this story: Two teens held in UK over Texas synagogue siege
