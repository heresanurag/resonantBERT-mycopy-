  The planes, which include Spitfires, Hurricanes and a Lancaster bomber, are a popular sight at summer shows and military events. Last week, the flight was unable to participate in events to mark 80 years since D-Day. The King's Birthday Parade, also known as Trooping the Colour, is staged to celebrate the monarch's official birthday. The Red Arrows will be among planes taking part in the flypast. Follow BBC Lincolnshire on Facebook, X (formerly Twitter), external, and Instagram. Send your story ideas to eastyorkslincs.news@bbc.co.uk, external
