title: Battle of Britain Memorial Flight to miss Trooping the Colour - BBC News
date: '2024-06-12'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/czddq0dnd4yo
content: |-
  The planes have been grounded temporarily following the death of Spitfire pilot Sqn Ldr Mark Long.

  The Battle of Britain Memorial Flight has been grounded temporarily

  The Battle of Britain Memorial Flight (BBMF) will miss the Trooping the Colour flypast on Saturday. The vintage planes, based at RAF Coningsby, were grounded last month following the death of Sqn Ldr Mark Long, who was flying a Spitfire when it crashed in a field in Lincolnshire. In a statement, the RAF said that "after the tragic accident" the planes would "regretfully" not be participating in the flypast. However, a "large number" of RAF planes would be taking part, including a Typhoon display jet in D-Day colours, which would use the BBMF call sign "MEMORIAL".

  The RAF took the decision to ground the BBMF while investigations take place into Sqn Ldr Long's death on 25 May. A visitor centre at RAF Coningsby is also closed until further notice.

