title: 'Ken Reid: Former UTV political editor dies - BBC News'
date: '2024-11-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c05z2vzqrrmo
content: |-
  Mr Reid reported on key moments in the peace process during almost three decades on screen.

  Ken Reid retired from UTV in 2021 after almost three decades on screen

  The former UTV political editor Ken Reid has died. Mr Reid, 69, reported on key moments in the peace process during almost three decades on screen. In 2017, he revealed he had been diagnosed with a form of leukaemia. He was also diabetic but continued to work until his retirement from UTV in 2021. A well-known figure in Northern Ireland, he was honoured by Queen’s University earlier this year for his contribution to journalism.

  He regularly interviewed Prime Minister Tony Blair before and after the 1998 Good Friday Agreement. Among his political scoops was breaking the news in 2008 that the then DUP leader Ian Paisley was to step down as first minister and party leader.

  First Minister Michelle O'Neill said that Mr Reid was "a true giant in local journalism, and an all-round gentleman". The Sinn Féin deputy leader added that his "strength and courage in the face of illness served as an inspiration to many, as he became a powerful advocate for raising awareness of cancer". "We mourn the loss of a dear friend, and a remarkable man," she said.

