title: 'Gregg Wallace allegations indicate ''culture of silence'': Minister - BBC
  News'
date: '2024-12-11'
section: Culture
url: http://www.bbc.co.uk/news/articles/clyk4wd4ywdo
content: |-
  The culture secretary said she was "prepared to take further action" against claims of misconduct.

  Wallace stepped aside from presenting MasterChef after allegations against him

  There are "too many cultures of silence", Lisa Nandy has said, following the allegations against MasterChef presenter Gregg Wallace. Speaking to MPs on Tuesday, Nandy said she was "prepared to take further action" if the media industry couldn't address claims of misconduct. Wallace stepped aside from presenting MasterChef two weeks ago, after a BBC News investigation revealed allegations of inappropriate sexual comments and inappropriate behaviour against him. His lawyers have strongly denied he engages in behaviour of a sexually harassing nature.

  Appearing before the Culture, Media and Sport Committee, Nandy spoke about recent questions of behaviour, including those around Wallace. She said: "Having spoken with the BBC in recent weeks about the Gregg Wallace allegations, I am really clear that we're seeing too many of these cultures of silence and issues being swept under the rug. "People who cannot advance through the current complaints system because it would have an impact on their career, potentially ending their career. "And I am clear that people need to be heard, action has to be taken and perpetrators have to be held to account."

  Our investigation heard from 13 people across a range of ages, who worked across five different shows. They included the broadcaster Kirsty Wark, who appeared on Celebrity MasterChef. Most, however, were production workers. Many were freelancers. Nandy said that one of her concerns is that the creative industries rely heavily on freelancers: "It's very casual employment contracts, people are often employed or promoted because of who they know, whether they're liked or trusted, and you do get a lot of younger people coming into those industries, and there is an enormous power imbalance between the people who run those industries and the people who work in them." She added that the Department of Business and Trade and the deputy Prime Minister were pursuing a plan to "make work pay". "They're looking very closely at the use of things like unpaid internships which they're intending to consult on, self-employed workers, zero-hours contracts, harassment." Nandy also confirmed that on Wednesday she would be meeting the Creative Industries Independent Standards Authority (CIISA), an industry body aimed at tackling bullying and harassment in the sector. She said she shared their position, that it was "better that the industry grips this". "But if they don't, I will be prepared to take further action," she said. Nandy added that she was "quite astonished" that when she got the list of organisations that are financially supporting CIISA, Banijay – the production company that employs Gregg Wallace and makes MasterChef – was not on the list. "I take quite a dim view of company executives that don't take this seriously, and after I've had those discussions with CIISA I will write to the chair to update the committee on the work that we're taking forward with them." Responding to the culture secretary's comments, Banijay UK told BBC News it "takes behavioural standards across the industry incredibly seriously". "We have been supporting CIISA since its inception with multiple meetings at the highest level and we look forward to agreeing next steps." Last week, Wallace apologised for suggesting allegations against him came from "a handful of middle-class women of a certain age". He concluded: "It's obvious to me I need to take some time out while this investigation is under way. I hope you understand and I do hope that you will accept this apology." On Friday, BBC bosses said they would not tolerate behaviour that "falls below the standards we expect". In the message sent to staff by the corporation's director-general Tim Davie, and Charlotte Moore, the BBC's chief content officer, they added that they would be supporting Banijay UK with its investigation, and added: "It is critical that every part of the BBC upholds our values, including where companies are working with us".
