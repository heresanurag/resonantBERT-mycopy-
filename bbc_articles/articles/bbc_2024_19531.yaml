title: Man, 81, charged after city centre protest - BBC News
date: '2024-08-22'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c5y84jz33pyo
content: |-
  Keith Edwards, from The Meadows, is due to appear at Nottingham Magistrates' Court on 6 September.

  Demonstrations, organised by rival groups, took place in Nottingham on 3 August

  An 81-year-old man has been charged following protests in Nottingham city centre earlier this month. Rival groups were separated by officers during the demonstrations near Old Market Square on 3 August. Keith Edwards, of Kinglake Place, The Meadows, Nottingham, has been charged with using threatening, abusive or insulting words or behaviour with intent to cause fear of or provoke unlawful violence. He has been released on bail and is due to appear at Nottingham Magistrates' Court on 6 September.

  Another man was fined for shouting aggressively for up to two hours while drunk during demonstrations on the same day.

  Anthony Chadwick, 36, was caught on video during an incident in Queen Street, which showed him saying "I'm going to knock you out" while bare-chested. Chadwick, of Nuthall Road in Leen Valley, Nottinghamshire, pleaded guilty at Nottingham Magistrates' Court to using threatening or abusive words or behaviour. The court heard Chadwick did not plan to take part in the protest but was "riled up" after a water bottle hit his head. Fining the defendant £365 on Thursday, District Judge Sunil Khanna said: "Thankfully none of the others around you reacted to your drunken behaviour. "In the future, please do not get involved in things you are not interested in." Nottinghamshire Police said the demonstrations remained "largely peaceful" and had warned any other disorder would be met with a "robust response". Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
