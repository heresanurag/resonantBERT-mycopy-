title: 'Mukesh Chandrakar: Body of missing Indian journalist found in septic tank
  - BBC News'
date: '2025-01-05'
section: Asia
url: http://www.bbc.co.uk/news/articles/clygl0rjy2no
content: |-
  Mukesh Chandrakar's corpse was found with severe injuries consistent with a blunt-force attack, police say.

  Mukesh Chandrakar had reported widely on alleged corruption in public construction projects

  The body of an Indian journalist who had reported on alleged corruption in the country has been found in a septic tank in Chhattisgarh state. Mukesh Chandrakar, 32, went missing on New Year's Day and his family registered a complaint with the police. His body was found on Friday in the compound of a road construction contractor in the Bijapur town area after officers tracked his mobile phone. Three people have been arrested in connection with his death, reportedly including two of his relatives. A media watchdog has demanded a thorough investigation.

  Police in the Bijapur district did not find anything during an initial visit to the compound on 2 January. "However, after further inspection on 3 January, we discovered Mukesh's body in the newly floored septic tank near the badminton court," a senior police officer said, referring to the fact concrete slabs had been placed on top of the tank. Police said his body showed severe injuries consistent with a blunt-force attack. Mr Chandrakar, a freelance journalist, had reported widely on alleged corruption in public construction projects.

  The tank containing Mr Chandrakar's body was covered by a concrete slab

  Following his death, the Press Council of India called for a report "on the facts of the case" from the state's government. The chief minister of the state described Mr Chandrakar's death as "heartbreaking". In a post on X, he said a special investigation team had been formed to investigate the case. It has been reported in Indian media that one of those under arrest over the journalist's death is his cousin. One of the main suspects - compound owner Suresh Chandrakar, also a relative - is on the run. Local journalists have held a protest demanding strict action against the alleged perpetrators. Attacks on journalists reporting on corruption or environmental degradation are not uncommon in India. In May 2022, Subhash Kumar Mahto, a freelance journalist known for his reporting on people involved in illegal sand mining, was fatally shot in the head by four unidentified men outside his home in Bihar. Media watchdog Reporters Without Borders has said that an average of three or four journalists are killed in connection with their work in India every year, making it one of the world's most dangerous countries for the media.
