title: Ilfracombe harbour waves swept child into the sea - BBC News
date: '2023-08-09'
section: General
url: http://www.bbc.co.uk/news/uk-england-devon-66450755
content: |-
  Warnings are issued after a child is swept to sea at Ilfracombe Harbour.

  Warnings have been issued after a child was swept into the sea at Ilfracombe Harbour.

  North Devon Council said a group of four children were playing on the pier slipway during high tide when a wave knocked a girl off her feet.

  The child was swept between the railings and into the sea, but was saved by two members of the public.
