title: Ukrainian soldiers killed in vehicle donated by Welsh miners - BBC News
date: '2024-09-21'
section: Wales
url: http://www.bbc.co.uk/news/articles/cd7xnlxj8qjo
content: |-
  A vehicle donated by a group of Welsh miners is destroyed in Ukraine, killing six.

  This donated vehicle was destroyed in 2022

  Six Ukrainian soldiers have been killed in an attack on a vehicle donated by Welsh miners just months ago. The men died when their SUV was shelled by Russian artillery in August, according to a Ukrainian trade union. The car was driven to Ukraine by Welsh miners as part of an aid convoy in February and some of the men who died were Ukrainian miners. Attacks on donated vehicles have only now been revealed, including one which was destroyed in 2022.

  It is not known if anyone was injured in that attack.

  Former miner Carwyn Donovan has taken part in several aid trips to Ukraine

  Carwyn Donovan, 36 from Abercraf, Powys, drove the vehicle that was destroyed to Ukraine last month. Looking at a picture of the wreckage, he points out the now barely visible sticker he placed on the front. “You can just see the Ukrainian flag that we put on it before we left - it's still there,” he said. Mr Donovan has taken part in seven aid convoys to Ukraine. He said knowing people were killed when the vehicle was attacked was “gut wrenching”. “There's an overwhelming sense of sadness for the lives lost but also a profound admiration for their bravery and their selflessness,” he said. “There’s a feeling of helplessness and even guilt knowing that these people have paid the ultimate price for something which is in all of our interests.”

  Thermal imaging of a vehicle donated in February and destroyed in August

  The attack in August happened in the Kharkiv area, not far from the Russian border. "This aid is especially critical," said Olesia Briazgunova, from the Confederation of Free Trade Unions of Ukraine. She said the vehicles in particular were “a vital aspect of Ukraine's defence”. The vehicles are used by “defenders, volunteers, medics and rescue services - and often save lives, especially in regions close to hostilities”, she added.

  Welsh miners delivered medicine, warm clothing and vehicles to Ukrainian miners in Kyiv in February. The link between Wales and Ukraine began in the 1980s when Ukrainian miners, then part of the Soviet Union, donated a portion of their wages to striking miners. The donated vehicles have been used to take supplies to the front line and evacuate civilians from dangerous areas.

  There are currently hundreds, if not thousands of miners fighting in the war against Russia. Ukrainian soldiers sent a video message to miners in Wales thanking them for the vehicles and aid. They said: “Thanks to our British colleagues from the NUM (National Union of Mineworkers). “Thank you to all the people of the UK for your continued support and help - the war continues,” they said. Standing holding a Welsh flag in front of a donated vehicle they said: “We fight every day for our independence and peace in Ukraine and all of Europe. “These vehicles help us to save lives - and bring our victory closer."

  The NUM, a cross-party Senedd group and Welsh businesses have donated 25 vehicles since the conflict began in 2022, with funds being raised for five more. There are now plans for another aid convoy from Wales to Ukraine in October.

  Former Welsh government counsel general Mick Antoniw travelled as part of the convoy in February. The Pontypridd Member of the Senedd (MS) has Ukrainian heritage and relatives of his have been killed in the war. He said the vehicles they were supplying “are vulnerable to artillery and drone attacks”. “These vehicles which we deliver save Ukrainian lives on the front line”, he said.
