id: bbc_2022_10657
title: 'Gaza: Emergency services arrive at flats hit by strike - BBC News'
date: '2022-08-05'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-62441969
content: |-
  The deadly strike killed at least eight Palestinians, including a child, says Gaza's health ministry.

  Firefighters and ambulance crews have rushed to the site of a deadly air strike in Gaza.

  The Israeli military has claimed responsibility for the attack and says it is targeting the Gaza Strip in response to threats from a Palestinian militant group there.

  At least eight Palestinians, including a child have been killed in the blast, according to Gaza's health ministry.
