  Three inmates are in hospital after an altercation at a prison where 10 have died in three months.

  Inmates in hospital following disorder at prison

  Three prisoners have been taken to hospital following disorder at a prison where 10 inmates have died in the last three months. Security firm G4S, which runs HMP Parc in Bridgend, said two "unrelated incidents" occurred at the site on Friday. It said the first involved about 20 prisoners and was "resolved safely" after support was received from the Prison Service. The second was an altercation between three prisoners who required hospital treatment for non-life-threatening injuries.

  G4S added that an air ambulance attended the site but was not needed. A spokesperson said: “Staff at HMP Parc swiftly resolved two short-lived incidents involving prisoners on Friday, with no officers injured. “Those involved will receive the strongest possible punishments, including criminal prosecution.” Ten inmates at the prison have died since 27 February, with the most recent being 38-year-old Warren Manners on Wednesday. Earlier in the week, families of those that have died held a protest outside the prison demanding "justice" for the deceased. At least four of the deaths are believed to be drug-related, while one prison staff member has been arrested in connection with drug dealing there. G4S said it had a "zero-tolerance policy towards drugs".
