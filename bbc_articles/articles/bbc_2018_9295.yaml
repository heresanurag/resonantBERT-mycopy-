content: |-
  Simonne Kerr, who was found dead on Wednesday, performed on the talent show with an NHS choir.

  Simonne Kerr said she joined the B Positive Choir following the death of her son Kavele

  A man has been charged with the murder of a nurse who appeared on Britain's Got Talent in an NHS choir.

  Simonne Samantha Kerr, 31, from Wembley, was found fatally injured in a house in Grayshott Road, Battersea, on Wednesday.

  She was treated by paramedics but pronounced dead at the scene.

  Desmond Sylva, 40, of Grayshott Road, will appear in Wimbledon Magistrates' Court on Friday. Police are not looking for anyone else over Ms Kerr's death.

  The 31-year-old's body was found in Battersea on Wednesday

  Ms Kerr appeared on the ITV talent show with the B Positive Choir, performing in this year's final which was won by Lost Voice Guy.

  She had qualified as a nurse in January and began working at Guy's Hospital near London Bridge the following month.

  The 31-year-old previously told how she joined the choir "to raise awareness of the urgent need for more young and black people to give blood" after her six-year-old son Kavele died from complications of sickle cell disease.

  Her next-of-kin have been informed and a post-mortem is due to take place later, a Met spokesperson said.

  She was pronounced dead at the scene

