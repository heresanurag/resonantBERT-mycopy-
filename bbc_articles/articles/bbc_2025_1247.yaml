title: Rodgers wants no regrets and urges Celtic bravery against Bayern - BBC Sport
date: '2025-02-17'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cwyeygy155no
content: |-
  Brendan Rodgers calls for his Celtic team to play without fear and have no regrets in the second leg of their Champions League play-off against Bayern Munich.

  This video can not be played To play this video you need to enable JavaScript in your browser. Rodgers urges Celtic to 'give everything' in Munich

  Brendan Rodgers wants Celtic to come away from their Champions League play-off against Bayern Munich with no regrets. The visitors trail 2-1 going into Tuesday's second leg at the Allianz Arena and the manager accepts it will take a performance of the highest quality to be successful but stresses that it is a challenge he and his players "want to embrace". "There's no second chance," said Rodgers. "We've got to be clever, bright and brave and if we can do that, history has shown that in sport anything can happen. "You come to this level and you have to play without any fear. There's worse things in life than losing a game of football so we want to ensure when we come in after the game, if we don't go through, we've given it absolutely everything." Bayern, tournament winners on six occasions, are unbeaten in their past 20 Champions League home matches. The Bundesliga leaders have never lost to Celtic, winning four of the five previous meetings, while Celtic are still waiting for a first win in Germany after 15 attempts. But Rodgers is taking heart from a strong finish in Glasgow, with Daizen Maeda pulling a goal back for his side after strikes from Michael Olise and Harry Kane. "I'm so happy I have this group of players with incredible mentality and professionalism," added Rodgers. "If they show that then we know we're in with a chance. "As long as you can take that opportunity to give your very best, you can come in and say 'we were beaten by the better team'. The regret is if you don't and you just turn up too late. "We've shown that when we can play at the very top of our game and if a team are not quite at their best, then we can punish them. "We've done very well to get to this point and when you do that you're going to play top-level teams. This is a team that has world-class players. For us it'll be about our collective. "Everyone will look at this game with us as underdog but we're still very mindful to be super-competitive and, if we can play to our level, we can make the game very difficult for Bayern."

  Kane suffered a knock to the face during Saturday's 0-0 draw away to Bayer Levekusen

  Bayern Munich star Kane sat out training on Monday but head coach Vincent Kompany said the striker's facial injury is "nothing too bad". The England captain, who has 29 goals for the season, took a knock in Saturday's goalless draw at Bayer Leverkusen, although he lasted the whole match. "It's nothing really serious but we have not had much time to recover," explained Kompany. "Tomorrow morning we will see how he feels but I think it's nothing too bad." Joao Palhinha and Alphonso Davies missed the first leg and neither are expected to return in time for the hosts, but central defender Kim Min-jae is likely to be back after playing at the weekend. Celtic have a full squad, with Rodgers saying Jota is fit enough to start and that deploying fellow winger Maeda in a central role is "certainly something we have talked about". He added: "We design a plan for the game, knowing whatever team starts will need players coming off the side. It's such a demanding level, physically."

  Bayern have had their problems on the road in the Champions League recently. They had only won once in seven trips before beating Celtic. At home in this competition it's a different story, without a loss since going down 3-2 at the hands of a Kylian Mbappe-inspired Paris Saint Germain in April 2021. That defeat is their only Champions League home reverse in almost six years. Vincent Kompany has come in for some local criticism following the draw at title rivals Bayer Leverkusen, with his side second best for much of the game against last season's champions, who just happen to be the only team to win at the Allianz Arena this season. But they are eight points clear and heavy favourites to secure a last 16 tie against Leverkusen or Atletico Madrid when the draw is made on Friday. Bayern are under pressure to reach the final given Munich is hosting it. Lifting the famous trophy for a seventh time in their own city would feel all the more special and Kompany and his players know it.
  • None Bayern Munich have won their last five home European matches against Scottish opponents and have never lost at home against a Scottish team (W7 D3).
  • None Celtic have played 15 away games against German opposition in Europe and are still looking for their first victory (D3 L12).
  • None Celtic have been eliminated in their past nine major European knockout ties when they've lost the first leg, since going through against FC Koln in the first round of the 1992-93 Uefa Cup (0-2 first leg, 3-0 second leg).
  • None Celtic have never progressed when losing the first leg at home (seven previous instances).
  • None Bayern Munich have progressed from their last 13 Champions League knockout ties after winning the first leg. The last time they were knocked out was in the last 16 against Internazionale in 2010-11, winning 1-0 in Italy before losing 3-2 at home and going out on away goals.
  • None Celtic have lost on their past five trips to Germany by an aggregate score of 18-4, with their most recent game in Germany being a 7-1 defeat to Borussia Dortmund.
  • None Bayern Munich are unbeaten in their past 20 home matches in the Champions League (W16 D4). That record is the longest active one in the tournament.
  • None Since the start of last season, Harry Kane has scored more Champions League goals than any other player (15 in 20 games). Kane is the first Bayern player to hit 15 Champions League goals in 20 or fewer games, breaking Roy Makaay's record (21 games).
