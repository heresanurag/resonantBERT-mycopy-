title: Sing-along remembers Manchester attack victims - BBC News
date: '2018-05-22'
section: General
url: http://www.bbc.co.uk/news/uk-44216561
content: |-
  Manchester Together featured choirs leading songs by Ariana Grande, Elbow and Oasis.

  A mass sing-along event, Manchester Together: With One Voice, was held to remember those who died in the Ariana Grande concert attack a year ago.
