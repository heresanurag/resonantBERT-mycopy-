title: 'Mill Hill shop killing: Police release CCTV of two youths - BBC News'
date: '2018-01-10'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-42629227
content: |-
  A 16-year-old boy has appeared in court charged with the murder of Vijay Patel in north London.

  Police want to identify and speak to the two boys captured on CCTV over the death of Vijay Patel

  CCTV images have been issued by police of two youths sought over the killing of a shop worker in north London.

  Vijay Patel, 49, died on Monday from injuries he suffered in an attack outside a convenience store in Mill Hill two days earlier.

  Det Insp Ian Lott said it was "vitally important" the two youths were traced.

  A 16-year-old boy from Brent appeared at Willesden Magistrates' Court on Wednesday charged with Mr Patel's murder.

  Detectives said Mr Patel was "attacked" outside the shop on Saturday after three teenagers were refused items including cigarette papers.

  Three boys were seen "running along The Broadway in the direction of Mill Hill Broadway Tube Station" shortly after the alleged attack, the Metropolitan Police said.

  Det Insp Lott added: "This was an unprovoked and wholly unnecessary attack on a man who was just trying to do his job.

  "It is vitally important that these two males are traced as they undoubtedly have information that could assist our investigation."

