  There has to be a measure of sympathy for Postecoglou, who looked a disconsolate figure as he made his way across towards those Spurs supporters who were left after the final whistle, because some of these errors were the sort for which no manager can legislate. Postecoglou defended his players saying: "The goals weren't lapses or anything, they were individual errors, which is unusual for us to give goals away like that. But that's what happens and we got punished and makes it difficult for us to get an outcome." It was a very generous interpretation from a manager who has taken so much heat himself – but the volume of these mistakes, and the regularity with which they have happened in this dismal season, point to a deeper problem. On the individual errors by Romero and Bergvall, he added: "It's not like they're doing it on purpose. Those two are pretty reliable in those situations. Today was a collection of events that were unusual and that makes it difficult to get anything out of the game." Those who sit in judgement on Postecoglou's future, and in the stands at Molineux, may beg to differ given the number of times Spurs have been similarly exposed this season. And, with his usual honesty, Postecoglou added: "Mistakes are part of football, I'm not going to be holding anyone to account, the only person who gets held to account is me. "I thought we played pretty well but conceded some pretty poor goals. Individual errors cost us. It's disappointing to lose." The backdrop to it all was the sight of thousands of discontented Spurs fans stretched along one side of Molineux. They did not aim their ire in the direction of Postecoglou, but chairman Daniel Levy, with loud chants of "We Want Levy Out" after only eight minutes, while holding up banners emblazoned with the message "Time For Change". The status quo remains for now but it all comes down, as it has for some time, to the Europa League as Postecoglou's final chance to fulfil his promise of winning a trophy in his second season. It may be his final chance. Full stop. There is much to admire about Postecoglou and his purist footballing principles, but in reality it has all come down to events in Frankfurt this Thursday night. It is now or never for Postecoglou and Spurs.

  Tottenham fans expressed their discontent - especially towards chairman Daniel Levy - during the defeat at Wolverhampton Wanderers
