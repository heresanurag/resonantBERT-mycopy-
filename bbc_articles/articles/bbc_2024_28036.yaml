content: |-
  AUsome Kids were chosen as one of the recipients of BBC Children in Need’s Big Sky grant programme, which helps with running costs and activities.

  'Autism group is a safe space after my daughter's diagnosis'

  After Pamela Baxter’s daughter Poppy was diagnosed with autism, it initially felt like a lonely situation for her family. “We just felt like there was nowhere for us to go socially or things like that, where Poppy and I felt comfortable, certainly not where we lived,” she said. Pamela decided to take matters into her own hands and set up a group in Cookstown, County Tyrone, for children with autism and their families. It has now been chosen as one of the recipients of BBC Children in Need’s Big Sky grant programme, which helps with running costs and activities.

  “It’s been four years now and it’s been amazing, it’s primarily a social space for kids to enhance their socials skills and have fun with everything from dance to arts and sports," Pamela said. “But it’s really become a safe space for parents to share their stories and rely on each other as well.”

  The group hosts a number of activities for the young people

  Autism spectrum disorder (ASD) is the name for a range of conditions which affect how a person communicates and interacts with the world around them, as well as their interests and behaviour. Lesley, one of the parents who attends AUsome Kids, said it had been a “safe haven” for both her and her daughter Lilly-Jane. “Before we just found that a lot of places can be overwhelming for Lilly-Jane, too much noise, too many crowds, but she feels so comfortable at AUsome Kids, there’s no pressure on her," she said. “There can be a lot of doubt and uncertainty when your child receives a diagnosis, so to get relate to other parents going through the same journey, there’s no judgement, it just means a lot.”

  AuSome Kids got funding from BBC Children in Need

  Cathal and his son Ruairí have been coming to the group’s activities for a number of years. “It’s been a game-changer for Ruairí, whenever he is in this environment, he becomes so upbeat and that carries through for a few days," Cathal said. "So as a parent that it is just amazing to see, it has helped our son so much.”

  Cathal says the group has been "a game-changer" for his son

  "The group was started to try and stop other parents feeling that loneliness that I did at the start," Pamela said. “Having other parents around you means that if you’re having a bad day or a bad week, no one is going to judge you, we’re here for each other.” A special programme featuring local fundraising stories and highlights from the Children in Need Appeal Show will air on Saturday 16 November at 15:55 GMT on BBC One Northern Ireland and BBC iPlayer. For further information on BBC Children in Need and how to get involved can be found at bbc.co.uk/pudsey, external.
