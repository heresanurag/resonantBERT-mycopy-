  The lifelong Liverpool fan had travelled to Italy for Tuesday's game against AC Milan, according to Liverpool FC. Liverpool players wore black armbands to pay tribute to Mr Dooley while representatives from both teams place flowers on what would have been his seat for the Champions League clash. The club posted on X: "We are deeply saddened by the tragic passing of our supporter Philip Dooley, following a road traffic accident in Bergamo. "The thoughts and prayers of everyone connected to the club are with Philip’s family, friends and fellow supporters at this extremely difficult time." A club spokesman added: "Our staff in Milan are working with the local police and consulate, and continue to provide support to other fans impacted by this devastating incident.
