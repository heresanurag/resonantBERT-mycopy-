content: |-
  Philip Dooley, 51, died after he was hit by a vehicle in Bergamo, where he had gone to watch the team.

  Liverpool fan in Italy for match dies in crash

  The club said it was "deeply saddened" by the news

  A Liverpool fan was knocked down and killed in Italy where he had gone to watch his team play in the Champions League. Philip Dooley, 51, from Liverpool, was struck by a vehicle in Bergamo in the early hours of Tuesday, Merseyside Police have said. The force said its officers have informed Mr Dooley's next of kin in Merseyside and were helping the police in Italy. Two men who witnessed the incident are also helping Italian police with their investigation.

