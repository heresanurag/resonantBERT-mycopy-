content: |-
  Violent disorder has taken place in towns and cities across the UK over the weekend, with two Holiday Inn Express hotels being targeted.

  Violent disorder has taken place in UK towns and cities over the weekend, with two Holiday Inn Express hotels being targeted.

  In Rotherham, rioters broke into the hotel, set fires and smashed windows. No hotel staff or residents were reported to be hurt.

  A police officer was injured at the hotel in Tamworth, suffering a suspected broken arm.

  In Bolton, fireworks and smoke bombs were thrown, as police worked to keep rival protesters apart.

  There have now been several days of rioting in the UK, following misinformation about the fatal stabbing of three young girls in Southport on Monday.
