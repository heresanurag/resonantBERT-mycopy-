title: Joey Barton X posts about Eni Aluko had defamatory meaning - judge - BBC News
date: '2025-04-09'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cvgppp6pmymo
content: |-
  A judge rules Joey Barton's social media posts about the former England striker were defamatory.

  Former England striker Eni Aluko says she welcomes the ruling

  The first stage of a High Court libel case has found that ex-footballer Joey Barton's online posts about former England striker Eni Aluko and her family had a defamatory meaning. The broadcaster said she faced threats of violence and abuse on social media after Barton posted twice on social media site, X, in January 2024, which a judge has ruled were defamatory. Barton had claimed Aluko's father was financially corrupt, and that her private education made her a "hypocrite" and he accused her of "using the race card", the court heard. High Court judge Mr Justice Lavender ruled these were mainly statements of opinion and were defamatory.

  Joey Barton's posts on X were ruled to be defamatory at the first stage of the case

  Aluko, 38, welcomed the civil court ruling, adding: "The posts were an unwarranted attack on my personal and professional identity, my integrity and my family life - in particular my late father." Former Manchester City and Newcastle player Barton, of Widnes, Cheshire, is yet to respond and could appeal. He could also defend the statements if the case proceeds to trial. Aluko scored 33 international goals in 102 appearances for the Lionesses before retiring in 2020 and moving to a career in broadcasting. In a separate criminal case, Barton, 42, has pleaded not guilty to allegedly posting offensive comments on social media about Aluko, as well as broadcasters Lucy Ward and Jeremy Vine.

