title: Greek cliff rescue in double migrant tragedy off Lesbos and Kythira - BBC News
date: '2022-10-06'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-63155193
content: |-
  At least 18 people have died off Lesbos, after a boat hit rocks under a cliff elsewhere in Greece.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At least 18 people have died and 25 have been rescued after a migrant boat sank off the Greek island of Lesbos on Wednesday night.

  The Greek coastguard said the dinghy had left the Turkish coast carrying 40 people in very high winds.

  Elsewhere in Greece dozens of migrants were rescued when their boat hit rocks near the southern island of Kythira.

  Coastguard video showed a group of people trapped beneath a cliff as rescuers pulled them to safety.

  Both boats went down within hours of each other on Wednesday night and early on Thursday, hundreds of kilometres apart.

  Volunteers joined rescue officials at the top of the cliff face on Kythira, an island off the Peloponnese region of southern Greece.

  The migrant boat broke up close to the island's eastern harbour at Diakofti in winds of up to 70km/h (45mph) and according to Greek reports one of those on board raised the alarm when it got into trouble.

  "We could see the boat smashing against the rocks and people climbing up those rocks to try and save themselves," local resident Martha Stathaki told the Associated Press news agency.

  Eighty of the 95 people on board are said to have been rescued on the Kythira coast. Greek reports say they had originally come from Iran, Afghanistan and Iraq and included 55 men and 18 children.

  Mayor Stratos Harhalakis said the boat had arrived at the worst possible point on Kythira as a gale-force winds pushed it on to treacherous rocks. He described seeing five people drown as they were swept away. Their small boat was big enough for 15 to 20 people, rather than almost 100, he said.

  Meanwhile, on Lesbos, authorities said the bodies of 16 young women of African origin and a 15-year-old boy had been recovered after their boat went down near Thermi. The body of a man was also recovered later.

  Lesbos was hit by powerful winds as the coastguard searched for survivors.

  Local officials said the boat had left the Turkish port of Ayvali and Greek Migration Minister Notis Mitarachi called on Turkey to take "immediate action" to put an end to irregular migrant crossings in harsh weather. "Already today many lives lost in the Aegean, people are drowning in unseaworthy vessels. EU must act," he tweeted.

  While Lesbos is a short distance from the coast of western Turkey, Kythira lies some 400km (250km) west of Turkey's coastline on the Aegean Sea and is on what has become known as the smugglers' "Calabrian" route, named after their destination in southern Italy.

  Last month two migrant boats landed on Kythira carrying almost 100 people, mainly from Afghanistan. More and more crossings are being made from Turkey to the Italian coast, bypassing Greece.
