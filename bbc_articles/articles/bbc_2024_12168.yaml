content: |-
  Gareth Southgate has plenty of food for thought after England's "solid rather than spectacular" start at Euro 2024, writes Phil McNulty.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England’s Euro 2024 campaign started in the winning manner that manager Gareth Southgate demanded, but it was not an easy ride against Serbia in Gelsenkirchen. Jude Bellingham’s stunning display provided several highlights in a 1-0 victory which saw England get the job done in a solid rather than spectacular style. Southgate will be delighted with the three points but there was still plenty of food for thought for the England boss before Thursday’s second Group C game against Denmark in Frankfurt.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'He has everything' - BBC pundits analyse Bellingham's performance against Serbia

  Jude Bellingham's relentless brilliance that saw him collect the Champions League and La Liga in a stellar first season in Spain shows no sign of slowing down at Euro 2024 with England. A then teenage Bellingham shone on the international stage in front of a global audience at the 2022 World Cup in Qatar, performing with the confidence and right measure of footballing arrogance that are the hallmarks of a truly special player. He is not yet 21, but Bellingham acts like he was invented to play at this elite level and here he produced another headline-grabbing display as the inspiration behind England's win. Bellingham set England on their way with a dynamic run into the area and a flying header after 13 minutes that simply carried too much power for Serbia keeper Predrag Rajkovic. Serbia had to resort to illegal means on several occasions to stop Bellingham in his tracks, but he is so powerful physically, also possessing the added edge in his game to relish the physical confrontations. England's fans also have a new hero to worship, providing a songbook of several chants in honour of the player who manager Southgate will count on so much here in Germany. And it is an adulation Bellingham not only takes in his stride but encourages. We witnessed his now trademark arms-outstretched celebration in front of England's fans at one end of the Arena AufSchalke after scoring, before he ran back to the halfway line to demand more noise from those following Southgate's team at the other end. It is a love affair between Bellingham and England's fans that surely will run for many years. Bellingham's season has been close to perfection – now England will hope he can give it a final flourish at Euro 2024.

  Phil Foden was one of the Premier League's stellar performers as Manchester City claimed a fourth successive title but he still struggles to find a comfortable home in England's line-up. Foden’s natural position is working centrally, as he did to brilliant effect in Pep Guardiola's side, but in England's current system under Southgate he is unlikely to be deployed there with Bellingham the figure around which this side revolves. Southgate wants to utilise Foden, but against Serbia he once again struggled to make an impact in an area where there have been impressive reports about Anthony Gordon, a potential rival for his position, filtering out of England’s training base. Foden's left-flank partnership with Kieran Trippier did not look a natural fit and it is something Southgate must consider before England face Denmark on Thursday. There was no lack of endeavour, but Foden was never the constant threat he poses for City at club level. Foden had 64 touches but only one in the Serbia penalty area. He created one chance but it was a low-key, peripheral performance. No-one would ever question the talent of the English footballer of the year but accommodating him effectively is a conundrum for Southgate. Foden was not the only one to have a quiet night, with captain Harry Kane touching the ball just twice during the first half.

