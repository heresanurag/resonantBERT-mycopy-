  England looked on course for the sort of routine night that would have been the perfect opening to Euro 2024, where their experience of major tournaments and the talent at Southgate's disposal makes them among the favourites. Bellingham's header provided the perfect platform but, as they have done in the past, England failed to maintain intensity after the break and offered an average Serbia far too much encouragement. Keeper Jordan Pickford made one crucial late save from Dusan Vlahovic as England invited pressure of the sort that might have cost them dearly against a more accomplished side than Serbia. They must learn the lessons. Quickly. In the end, however, England got the job done and deserved to claim the three points that are always so vital in the opening game of a major tournament. England were also able to enjoy the added bonus of establishing early supremacy in Group C after the first game between Denmark and Slovenia ended all square.

  Bukayo Saka was at the centre of a debate about whether he would be edged out of England's starting line-up for this tournament by the emergence of Chelsea's Cole Palmer, a stand-out performer in his first season at Stamford Bridge following a £40m move from Manchester City. Palmer has shown he is at ease at England level in his brief appearances, and he may yet make his mark in Germany, but Southgate was right to stick with Saka and was rewarded with a fine performance from the Arsenal man. When England were at their most progressive, Saka looked refreshed and dangerous on the right flank, the high point coming with the cross that provided the invitation for Bellingham to score. Saka is one of Southgate's most trusted players, the added bonus being he has established a strong connection with Trent Alexander-Arnold in their appearances together for England. He made his point and is surely a certain starter against Denmark.

  Southgate's choice of a midfield partner for Declan Rice was one of the hot topics in the build-up to England's campaign getting under way. The manager decided to go with the positive attacking option of Liverpool’s Trent Alexander-Arnold despite having Manchester United teenager Kobbie Mainoo and the impressive Crystal Palace player Adam Wharton in his ranks. Alexander-Arnold's outstanding range of passing gives England an added dimension, while his ability at set-pieces can be a world-class weapon. The questions still surround whether he can operate in this role against opponents of the highest class at international level. Southgate has made his choice so it is very likely we will find out later in Euro 2024 if England progress. There were moments when Alexander-Arnold's unfamiliarity in the position was exposed, especially when he conceded possession and Serbia striker Aleksandar Mitrovic shot inches wide in the closing moments of the first half. A full-back for Liverpool, Alexander-Arnold also showed moments of the peerless raking passing that is his stock in trade. It is such creative ability that Southgate is counting on as England start their quest to win a first major men's trophy since the 1966 World Cup.

