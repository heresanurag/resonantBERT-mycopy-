title: Alaskan wilderness survivor tells his story - BBC News
date: '2020-01-14'
section: General
url: http://www.bbc.co.uk/news/world-asia-51113776
content: |-
  After his cabin caught fire in the Alaskan woods, Tyson Steele survived without shelter for 23 days.

  Rescue crews found Tyson Steele 23 days after his cabin burned down, killing his dog and leaving him with no shelter.

  Steele survived on rationed canned food that had been charred by the fire. He plans to return Alaska to rebuild his home.
