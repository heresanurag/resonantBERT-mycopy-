title: Anglesey crossbow murder victim 'defrauded' of £200,000 - BBC News
date: '2022-01-10'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59936183
content: |-
  Gerald Corrigan and his partner were victims of "a complete sham", a court hears.

  Gerald Corrigan was murdered by a crossbow shot outside his remote home near Holyhead in 2019

  A "fraudster" took more than £200,000 from a man who was later murdered after being shot with a crossbow, a court has heard.

  Gerald Corrigan, 74, was shot at his home at South Stack, Anglesey, in 2019.

  Richard Wyn Lewis, 50, of y Fferam, Anglesey, denies defrauding Mr Corrigan over a number of years before his death.

  Mold Crown Court was told the murder had "nothing whatsoever" to do with the alleged fraud.

  Mr Lewis, known as Wyn Lewis, is accused of fraud by making false representations to Mr Corrigan and his partner Marie Bailey.

  The charges relate to the alleged development and sale of their home at Gof Du, the alleged purchase of horses, the disposal and sale of their Citroen car and the alleged purchase of a former school at Llanddona.

  His partner Siwan Mclean is accused of money laundering by allowing £50,000 of stolen money into her bank account for the alleged purchase of the former school.

  Opening the case, the prosecution claimed Mr Lewis told Mr Corrigan he had a known buyer for Gof Du, named John Halsall, and he also knew a France-based ex-planning officer with Anglesey council called "David", who would help with the development.

  It is alleged Mr Lewis charged Mr Corrigan for the alleged work "almost always" in cash without ever giving a receipt or documentation.

  Describing Mr Lewis as a "fraudster", prosecuting barrister Peter Rouch QC said: "There never was the potential sale of Gof Du, there never was an ex-planning officer called David, there never was a planning application.

  "The whole thing was a complete sham which cost Gerald Corrigan and Marie Bailey hundreds of thousand of pounds."

  Mr Rouch said it was difficult to say precisely how much cash Mr Corrigan had given Mr Lewis.

  Mr Corrigan and Ms Bailey's cash withdrawals before they met Wyn Lewis were described as "modest".

  But, between the time they became involved with Mr Lewis in 2015 and up to Mr Corrigan's death in 2019, Mr Corrigan had withdrawn £170,000.

  The prosecution claimed the £50,000 transferred from Ms Bailey to Ms Mclean's account raised the total amount of money taken fraudulently from the couple to £220,000.

  Mr Lewis is also accused of seven other charges of fraud against other people and one count of perverting the course of justice.

  The court heard how in 2017 Andrew Shaw had given Mr Lewis £36,000 in cash, without receipts, to pay for work at a property owned by Gerald Corrigan, which Mr Shaw was to aiming to buy.

  The court heard the house had initially been valued at £130,000, but was later valued at less than £90,000, even after Mr Shaw had paid for work to be done.

  Another alleged victim was a friend of Gerald Corrigan, Eric King, who allegedly gave Wyn Lewis £13,000 in cash to invest in a horse. Mr King died in 2017.

  It is also claimed Mr Lewis took cash from a neighbour, Aiden McGinn, to pay for work which Mr McGinn said didn't need to be done.

  Mr Lewis is also accused of perverting the course of justice by telling Mr McGinn to tell the police that he gave permission for Mr Lewis to use his bank card.

  Mr Rouch added that "over a period of years Wyn Lewis made substantial sums of money", and he used it "to fund the lifestyle of Wyn Lewis and Siwan McLean. But that lifestyle was paid for by others."

  Mr Lewis and Ms McLean deny all charges and the trial continues.
