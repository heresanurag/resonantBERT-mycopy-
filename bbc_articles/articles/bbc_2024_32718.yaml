title: Police investigating Labour's Edinburgh council leader Cammy Day - BBC News
date: '2024-12-09'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c9wllwex1j8o
content: |-
  Scottish Labour confirmed Cammy Day has been suspended pending the outcome of the investigation.

  Allegations about Cammy Day's behaviour are being investigated by police

  The leader of Edinburgh City Council, Labour's Cammy Day, is being investigated by police over an allegation of inappropriate behaviour. Scottish Labour confirmed he had been suspended pending the outcome of the investigation. According to the Sunday Mail, external, Day "bombarded Ukrainian refugees" with messages. Day has been approached for comment.

  BBC Scotland has spoken to one of the refugees - who came to Scotland following Russia's invasion of Ukraine in 2022 - contacted by Day. They say the council leader sent them messages on social media and added them on a dating site. They claim he asked them sexually explicit questions and suggested meeting for wine. The refugee says they were uncomfortable with the contact but felt pressure to respond, given his status, and were afraid of his influence.

