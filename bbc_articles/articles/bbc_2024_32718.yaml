  A spokeswoman for Edinburgh City Council said: "All matters raised with the chief executive and monitoring officer have been progressed through our established processes in consultation [with] our independent whistleblowing service, Safecall, and, where appropriate, Police Scotland."

  Speaking on BBC Scotland's Sunday Show, Scottish Labour leader Anas Sarwar described the allegations as "deeply distressing". He said the party became aware of the claims on Saturday and Day was immediately suspended. Sarwar said it was for the police and council to decide if further investigation was warranted, and it was right to let these processes take their course.

  A senior councillor in the Labour-led administration told BBC Scotland News he was "confident" Day would "do the right thing". Asked if Day should resign as leader, transport convenor Stephen Jenkinson said the party had moved swiftly to suspend his former colleague but that resignation was not "a decision that's within my control". A Scottish Labour spokesperson said the party took all complaints seriously and that they are investigated in line with party policy.

  A Police Scotland spokesman said: "On Tuesday 22 October, we received a report of inappropriate behaviour. "Inquiries are ongoing to establish the full circumstances." The force also confirmed that a report had been made about Day earlier this year but no criminality was established in that case. The Ukrainian consulate in Edinburgh expressed concerns about the reports. It said: "Our goal is to protect the rights and dignity of Ukrainian citizens who have been forced to seek temporary sanctuary in Scotland due to Russia's war against Ukraine." The consulate said it "looks forward to the results of the investigation and expresses hope for a fair resolution of this case".

  A former community development worker, Day moved into politics in his 30s, becoming a councillor in 2008. He has led a minority Labour administration since 2022. Opposition politicians are now calling for his resignation. Cllr Simita Kumar, who leads the SNP group in Edinburgh, posted on social media saying Day should "resign immediately". Leaders of the council's Liberal Democrat and Conservative groups have made similar calls. Sue Webber, Scottish Conservative MSP for Lothian, said: "Cammy Day should step down as leader of the council while these allegations are investigated. "There is surely no way he can command the support of the local Labour group, and will be unable to carry out the critical and important role as leader of the council."
