title: 'Hair transplants: Fighting against my receding hairline - BBC News'
date: '2018-09-04'
section: General
url: http://www.bbc.co.uk/news/uk-45415071
content: |-
  Paul is one of thousands of British men to travel to Turkey this year to have a hair transplant.

  Each year thousands of men fly to Turkey to go under the knife to stop them losing their hair.

  The BBC's Tiffany Sweeney follows one of them as he undergoes the costly procedure miles from home to see how effective the operation is.
