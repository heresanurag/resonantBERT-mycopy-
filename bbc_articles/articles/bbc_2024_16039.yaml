  Dressage rider Charlotte Dujardin says it feels "surreal" that she is on the cusp of becoming Britain’s most decorated female Olympian.

  This video can not be played To play this video you need to enable JavaScript in your browser. Paris 2024: Dujardin says becoming Britain’s most decorated female Olympian would be 'incredible'

  Charlotte Dujardin says it feels "surreal" she is on the cusp of becoming Britain’s most decorated female Olympian. The 39-year-old dressage rider needs a medal of any colour to take the outright lead from now-retired cyclist Dame Laura Kenny, with whom she is currently tied on six medals. Dujardin believes she has a "really good chance" of success at the Paris Games, where she will compete in both the individual dressage and team event alongside Carl Hester and world champion Lottie Fry. "It will be one of the most incredible moments if that does happen," she said of her chance at making history. "But I don't put any pressure on myself to make that happen." Since the last Olympics in 2021, Dujardin has become a mother, with daughter Isabella born in March 2023. She said becoming a parent had changed her as a person. "With our sport there's always another day, another competition to go to," she said. "But when you've got a child, it kind of just changes your perspective on real life."

  Dujardin still has big ambitions and goals, but is adamant the atmosphere should be positive for Isabella - who will be in Paris. "For me it's showing her that actually most important for me is to enjoy it. I don't want it to be a stressful event," she said. "It's really about making her proud. I want for her, one day, to look back and go: 'That's my mummy and how cool was that that she was there competing at the Olympics. And, I was there to watch.'" Dujardin announced herself to the equestrian world and beyond at the London 2012 Olympics when she won team and individual gold medals on Valegro. The pair went on to win individual gold and team silver four years later in Rio. On a different horse, Gio, she won two bronzes at the delayed Tokyo 2020 Games. This summer she will be riding Imhotep - nicknamed Pete - who she describes as "fantastic". "He's a real bouncy character and he's got such a lovely nature. He's very, very enthusiastic," Dujardin said. "I'm the sort of competitor that when I go in, I am very much in it to win it. And Pete definitely takes that on." She said if a medal does not happen this summer, 57-year-old Hester - the oldest member of Team GB - is proof that she can hopefully be at the top of the sport for many years to come. He will be competing at his seventh Olympics. Dujardin added: "It's a brilliant team with Carl and Lottie. I'll be in it to win it. For sure I'm not going down without a fight. "That's the sort of person I am. I'm very, very competitive." The dressage competition at Paris 2024 begins on 30 July and will be held at the iconic Chateau de Versailles.

