content: |-
  Four other teenage boys are on conditional bail after being arrested earlier this week.

  Four more boys arrested in rape investigation

  Police said the assault happened on Yorke Drive playing fields

  Four more boys have been arrested on suspicion of the rape of a teenage girl. Police received reports of a serious sexual assault in Yorke Drive playing fields, in Newark, on 25 May between 17:30 and 19:00 BST. A boy aged 12, a 13-year-old, and two boys aged 14 were arrested and have all been released on bail with strict conditions, said officers. Four other teenage boys were arrested earlier this week on suspicion of rape and all remain on conditional bail.

  Dete Insp Amy Revill, of Nottinghamshire Police, said: “We are continuing to support the girl and her family with specially trained officers and are doing everything we can to establish exactly what’s happened. “I want to again appeal to the local community and anyone who may have any information to please get in touch with us." Insp Charlotte Ellam, district commander for Newark, added: “I understand the concerns this incident has caused to our community in Newark. "We’ve been carrying out extra patrols in the area and this will continue. So, if you do have any concerns, please speak to one of my officers. "We would also ask that people please avoid speculation.” Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
