  Watch: A clip from Michael Mosley's last recording at the Hay Festival in May

  Michael Mosley recorded his last interview How to Live a Good Life with psychologist Paul Bloom at the Hay Festival on the 25 May 2024.

  Dr Mosley died of natural causes on 5 June, four days after he went missing while on holiday on the Greek island of Symi.

  Paul Bloom is Professor Emeritus of Psychology and Cognitive Science at Yale and Professor of Psychology at the University of Toronto and he shares with Dr Mosley his top five tips for living a good life.

  In this clip, Dr Mosley discusses the psychology of doing uncomfortable things, like taking cold showers, which we know are ultimately good for us.

  You can listen to the recording in full on BBC Sounds which has an introduction by fellow medical broadcaster Chris Van Tulleken.
