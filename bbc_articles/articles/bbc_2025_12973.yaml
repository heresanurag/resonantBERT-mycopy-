title: Sir Mark Cavendish Raceway officially unveiled on Isle of Man - BBC News
date: '2025-06-27'
section: Isle of Man
url: http://www.bbc.co.uk/news/articles/c8d6443q8jro
content: |-
  The raceway where the Manx Missile first started cycling competitively as a child is renamed.

  Sir Mark Cavendish broke the record for the most Tour de France stage wins last year

  The raceway where Sir Mark Cavendish fell in love with cycling as a 10-year-old boy has been officially renamed to celebrate his legacy in the Manx capital. The cycleway at the National Sports Centre in Douglas was where the Manx Missile first started cycling competitively as a child. The 40-year-old went on to become the most successful stage winner in Tour de France history when he took his 35th victory last year, having claimed 135 career wins. Sir Mark said he was "massively honoured" to have the "place where I started" named after him, adding it "was definitely the place I honed my craft".

  A guard of honour by members of his boyhood cycling club welcomed him back to the track

  The record-breaking cyclist was welcomed to the raceway with a guard of honour by members of his childhood racing club before he completed a timed "hot lap" of the 0.6-mile (1km) circuit. Following a ceremony to officially open the newly-renamed raceway, school children from across the island were invited to join him on two laps of the circuit. Reflecting on the celebrations, Sir Mark said: "I know there's so many riders who start here and dream of being professional, and if they can take a small bit of inspiration from that that's important to me. "If it can help people even start ride a bike, let alone start to pursue their dreams,. then I'm going to be happy."

  A young Mark Cavendish started cycling competitively as a boy on the circuit

  The mural is made up of the names of 1,000 school children

  A mural featuring the names of hundreds of pupils, a new podium, finish lines and signs explaining the cyclist's successes, were all unveiled at the launch event. The new artwork also includes a quote from the cycling legend reflecting on his experience from before childhood races. It reads: "I dreamed of being like my heroes." The Manx government said the project had been designed to celebrate Sir Mark's legacy by encouraging the next generation to take up the sport, while recognising the place where his journey began.

  Children from all of the island's primary schools were invited to take part in the event

  Dot Tilbury said she hoped it would inspire more children to excel in cycling

  Dot Tilbury, who leads the cycling club at the raceway, said Sir Mark's achievements were "just sensational". "I think it's wonderful what they've done, and I hope it will attract more children to cycling or whatever sport.," she said. "But this boy has gone far, he's the Isle of Man's greatest asset." The Manx Missile took part in a similar event in August by taking part in a lap of honour the first time he returned to the island after breaking the Tour de France record.

  The raceway in Douglas will now be known at the Sir Mark Cavendish Raceway

