title: Trump's Criminal trial nears end as defence team rests - BBC News
date: '2024-05-20'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-69028137
content: |-
  The ex-president will not testify in the criminal trial, in which he is accused of falsifying business records.

  Court sketch artists have been busy providing a regular supply of images to show us the inside of the courtroom.

  Here are some of the key moments we've seen thanks to their deft handiwork.

  David Pecker, the ex-tabloid publisher, is the first witness called to the stand Image caption: David Pecker, the ex-tabloid publisher, is the first witness called to the stand

  Keith Davidson, who represented Stormy Daniels in the hush-money negotiations, testifies how the deal was made Image caption: Keith Davidson, who represented Stormy Daniels in the hush-money negotiations, testifies how the deal was made

  Hope Hicks, who served as a Trump campaign spokeswoman , breaks down in tears during her testimony on the stand Image caption: Hope Hicks, who served as a Trump campaign spokeswoman , breaks down in tears during her testimony on the stand

  Adult-film star Stormy Daniels, whose hush-money payment lies at the centre of this trial, testifies in court Image caption: Adult-film star Stormy Daniels, whose hush-money payment lies at the centre of this trial, testifies in court

  Trump's long-time fixer Michael Cohen alleges that his former boss falsified business records to repay him for the hush-money payment to adult-film star Stormy Daniels Image caption: Trump's long-time fixer Michael Cohen alleges that his former boss falsified business records to repay him for the hush-money payment to adult-film star Stormy Daniels

  Court sketch artists capture Trump yawning during his lawyer's lengthy cross-examination of Michael Cohen Image caption: Court sketch artists capture Trump yawning during his lawyer's lengthy cross-examination of Michael Cohen
