title: Cole Palmer's goalless run for Chelsea a mental thing - Enzo Maresca - BBC
  Sport
date: '2025-04-26'
section: Chelsea
url: http://www.bbc.co.uk/sport/football/articles/c78jly1qz31o
content: |-
  Cole Palmer has not scored a goal for Chelsea since 14 January

  Chelsea forward Cole Palmer's recent struggles on the pitch are "a mental thing", says boss Enzo Maresca. The England international, 22, has not scored in 16 games - having netted 14 times in his first 23 games of the season. Chelsea have slipped from second place to sixth - and out of the Champions League places - in that time. But Palmer has had more shots than any other Premier League player during his goalless spell - 41 efforts. "For sure it's a mental thing, it's not tactical or technical," said Maresca. "Cole is still the player who scored 14 goals in 20 games. The style is the same, the manager is the same, the club is the same. Nothing has changed around Cole. It's just mentally in this moment. "You can see he's a little bit worried because he wants to help the team. You can see he's struggling a bit on that. But he showed how happy he was after Fulham. It's just a matter [of whether] we can win games. For sure he's going to score goals. "If you go back game by game, he had at least every game one or two chances, so it's not about how the team is playing."

  Maresca will miss Saturday's game against Everton as he serves a one-match touchline ban. Assistant boss Willy Caballero will be in the dugout. "They asked me if I need someone next to me [in the stands]," said Maresca. "I don't know if I'll be alone or if I'll be with someone. Tomorrow I'll try to be in the way I always try to be. When the manager is not there it's for the leadership group to step forward and take responsibility." Meanwhile, Maresca says this season is "not a failure". The Blues, who are in the Conference League semi-finals, may not qualify for the Champions League next season. "Compared with the past two years, it is not a failure," said Maresca, who is in his first season in charge. "How many times in the past two years have Chelsea been in the Champions League [places]? And this season we have been there almost all season. It's an improvement or not? It's already an improvement."
