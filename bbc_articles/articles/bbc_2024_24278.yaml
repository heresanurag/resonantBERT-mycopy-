title: More bus services could come under control of councils under planned law -
  BBC News
date: '2024-09-08'
section: Business
url: http://www.bbc.co.uk/news/articles/cpvyev943v4o
content: |-
  Transport Secretary Louise Haigh promises to deliver a "bus revolution" that will save vital routes.

  More bus services could come under control of councils

  Parts of the bus network in Manchester have already been brought back under local control

  More local authorities in England are to be given powers to take control of bus services under legislation being laid before Parliament on Monday. Transport Secretary Louise Haigh says the changes will deliver a "bus revolution" that will save vital routes. It will allow all authorities to introduce a franchising system, under which they can decide routes, timetables and fares, with operators bidding to run services for a fixed fee. The Conservatives said the government's plans were "unfunded" and called on the £2 fare cap it introduced when in power to be extended. Ms Haigh said the cap was being looked at "carefully" and decisions would be made in the Budget in October.

  Some industry figures have said minimum service level guarantees should also be set out as routes and timetables have faced cuts in recent years. Silviya Barrett, director of policy and research at Campaign for Better Transport, said giving councils more power would create "a more reliable bus network for all". "Whilst franchising may not be suitable for all areas, everyone should have access to a quality bus service without risk of it being cut, which is why we are also calling for a minimum service level guarantee and long-term, ringfenced funding for all local authorities," she said. Sandra, from Macclesfield, has seen the frequency of local services reduced which makes it tricky to plan trips. "I’ve looked at doing evening classes at the leisure centre but the timings of the buses mean that to do a 45-minute class it would be a half-day outing," she told the BBC's Today programme. "Somehow people have to be persuaded to use the buses and that’s not going to happen until there’s a better service available."

  Until the 1980s, most bus services were delivered through publicly owned companies, often run by councils, but in 1986 services outside London were deregulated and privatised, leading to the mass sale of council bus companies. In London a franchising system was introduced, with Transport for London deciding routes, timetables and fares and operators bidding to run services for a fixed fee. There are only a few areas in England where the local bus company is still owned by the council, and currently only areas with metro mayors can introduce "franchising" to private companies. Last year, Greater Manchester became the first place outside of London to bring bus services into public control since deregulation. The "Bee Network", where all-night services have been trialled, has been described as a success, despite facing some teething problems with delays. In the run-up to the general election, Labour pledged, external it would hand all local transport authorities the power to run their own bus services and lift restrictions on new, publicly-owned bus operators. Adam Hug, a Labour councillor and transport spokesperson for the Local Government Association which represents councils, welcomed the changes but warned they were not going to be an "overnight fix" for the bus network. "It’s going to take time and it’s not going to be delivered in the same way in every part of the country," he said.
  • None What happens when councils take control of buses?

  Buses are the most commonly used form of public transport, external in Britain, but services have been in long-term decline and the pandemic hit passenger numbers hard. The number of local bus passenger journeys in England rose by 19.4% to 3.4 billion in the year ending March 2023, according to the Department for Transport, external. However, this is much lower than pre-pandemic levels, when journeys totalled 4.1 billion in the 12 months to March 2020.

  "For the last 40 years since deregulation we've allowed private operators to pick and choose whatever routes they want," said Ms Haigh. "If they don't want to run routes either local authorities have to step in and fund them themselves or they simply don't run and communities are left with no say. "What we are doing today is extending power to every area of England so if they want to move to franchising and to build their own public transport network they will now have the power to do so." Monday’s announcement raises many questions but all roads lead to funding. There is currently no detail on how much this will cost and who will fund it. Shadow transport secretary Helen Whately said the government needed to explain whether local authorities would be expected to raise tax or cut services to fund the proposal. "Moreover, it won’t make a blind bit of difference for passengers. "It won’t increase the number of services and they would much prefer to have the £2 fare cap extended at the Budget," she added, referring to a policy introduced by the Conservative government, external to cap single bus fares on participating bus routes at £2, which has been extended until December. Ms Haigh said the government was looking "very carefully" at funding for the £2 fare cap, adding: "Those decisions will be made through the Budget." Later, in a debate in the House of Lords, Rail Minister Lord Hendy was pushed on whether free bus passes for older and disabled people in England could be means-tested. However, the BBC understands there are no plans to withdraw the scheme.

  The government has also launched a consultation on simplified guidance aimed at speeding up processes and reducing costs for local councils looking at bringing services into public control. A "Better Buses Bill" will be put forward later on in this parliamentary session, which will look at measures for areas where leaders would not consider franchising. It is not known how many councils will take up the new powers.

  The head of transport at Cheshire East Council, Mark Goldsmith, said it was unlikely to operate buses directly, but franchise agreements do have "some benefits". "It gives us more powers to control the market a little bit more without actually having to run it all." However, there are financial risks for councils running services under franchise. "In most franchising arrangements it’s the local authority who takes the revenue risk, so if passenger numbers aren’t where they expect to be, they and their council tax payers take the hit," said Graham Vidley, head of the Confederation of Passenger Transport, which represents the bus industry. Mr Vidler added that the government faced "tough decisions" in next month’s Budget. "Will they continue to support local authorities and invest in bus services in the way that the last government did? Will they commit to an extension of the national £2 fare cap beyond New Year’s Eve when it’s currently scheduled to end?"

