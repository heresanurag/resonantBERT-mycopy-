title: 'Prince William: Aston Villa fan says 3pm Saturday TV blackout is ''irritating''
  - BBC Sport'
date: '2025-03-13'
section: Aston Villa
url: http://www.bbc.co.uk/sport/football/articles/c3378054g1no
content: |-
  Football Association patron Prince William criticises the rules which stop football matches being televised in the UK at 3pm on Saturday afternoons.

  Prince William says the rules which stop football matches being shown on television if they kick off at 15:00 on a Saturday are "irritating".

  The Aston Villa fan - who is patron of the English Football Association - says the blackout often stops him being able to watch his side when he can't get to matches.

  "Getting up to Villa Park isn't the easiest thing for me but I like to watch as many games as I possibly can either by being there or on TV," he told The Sun, external newspaper.

  "The biggest thing at home is trying to find it on TV sometimes because obviously you've got the Saturday 3pm blackout which is irritating.

  "But it's really annoying that we still can't watch our own team's Premier League match in this country but you can go abroad and watch any game any time."

  The rule to stop matches being televised on Saturday afternoons, when most games are played, was introduced in the 1960s to encourage fans to attend lower league games.

  European football's governing body Uefa imposes the blackout when it is requested by the Football Association.

  And the blackout was protected in the last Premier League domestic TV rights deal, which runs to 2029.

  However, broadcasters abroad hold rights to show the Saturday afternoon games.

  The most recent English Football League (EFL) rights deal also protects the 3pm Saturday blackout.

  The Prince also confirmed in the interview what he had revealed to some Villa fans in a pub conversation earlier this year - that he went on fans forums, anonymously, to comment on issues at the club.

  "I like going on the forums, I can be on there for ages," he said.

  "I listen to what other fans have to say and give them my opinions. I get quite into it, definitely. It's important to have that debate."
