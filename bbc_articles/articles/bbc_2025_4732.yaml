content: |-
  Lebanon's health ministry says seven people, including a child, were killed and 40 injured.

  Israel strikes Lebanon after first rocket attack since ceasefire

  Smoke billows from the site of Israeli strikes in southern Lebanon

  Israel has carried out multiple air strikes on Lebanon after several rockets were fired from Lebanon into Israel, in the worst violence since a ceasefire came into effect in November. The Israeli military said it had hit dozens of rocket launchers and a command centre belonging to Hezbollah, the Iranian-backed militia and political group, in southern Lebanon. Lebanon's health ministry said seven people, including a child, were killed and 40 injured in the air strikes. Several armed groups operate in Lebanon, including Hezbollah and Palestinian factions, and no-one has claimed responsibility for the attack.

  Hours after the first set of strikes, a second wave of attacks were carried out at night on targets that included what the Israeli military described as command centres, infrastructure sites and a weapons storage facility in Lebanon. Saturday's rocket attack from Lebanon came days after Israel reinforced its offensive against Hamas, a Hezbollah ally, in Gaza. The Israeli military said it had intercepted three rockets in the northern Israeli town of Metula, and there were no casualties. Hezbollah said it had no involvement, and it remained committed to the ceasefire. The Lebanese military said it had dismantled "three primitive rocket launchers" in the south, and the country's defence minister said an investigation had been launched into the attack. The developments put pressure on a fragile truce, brokered by the US and France, that ended more than a year of conflict between Israel and Hezbollah. Under the terms of the ceasefire deal, the Lebanese military would deploy thousands of additional soldiers to the south of the country to prevent armed groups from attacking Israel. Hezbollah was required to remove its fighters and weapons, while the Israeli military would withdraw from positions occupied in the war. But Israel has carried out nearly daily air strikes on what it describes as Hezbollah targets, and has indicated that attacks will continue to prevent the group from rearming.
  • None Battered but defiant - what will happen to Hezbollah's weapons?

  The Israeli military is still occupying five locations in southern Lebanon, in what the Lebanese government says is a violation of the country's sovereignty and a breach of the deal. Israel says the Lebanese military has not yet fully deployed to those areas, and that it needs to remain at those points to guarantee the security of its border communities. Saturday's attack is further proof of the challenges facing the Lebanese army, as it tries to exert control over southern areas where Hezbollah has traditionally had a strong presence and support. Lebanon's President Joseph Aoun, who came to power in January, has said only the state should have arms in the country, in what is seen as a reference to Hezbollah's arsenal. On Saturday, he condemned "attempts to drag Lebanon into a cycle of violence", while Prime Minister Nawaf Salam said the escalation carried the "risk of dragging the country into another war". The UN peacekeeping force in Lebanon, Unifil, said it was "alarmed by the possible escalation of violence", urging both Israel and Lebanon to "uphold their commitments". Hezbollah was battered in the conflict with Israel: many of its leaders were assassinated, hundreds of fighters killed and much of its arsenal destroyed. The group faces the huge challenge of providing financial help to its communities affected by the war, and pressure from its opponents to disarm. Lebanon's international partners say they will only help the country if the government acts to curb Hezbollah, the most powerful group in Lebanon. Hezbollah launched its campaign the day after the Hamas attacks on southern Israel on 7 October 2023, saying it was acting in solidarity with Palestinians in the Gaza Strip. The longstanding conflict escalated and led to an intense Israeli air campaign across Lebanon, and a ground invasion of southern Lebanon. The offensive killed about 4,000 people in Lebanon - including many civilians - and led to the displacement of more than 1.2 million residents. Israel's stated goal in its war against Hezbollah was to allow the return of about 60,000 residents who had been displaced from communities in the country's north because of the group's attacks, and to remove it from areas along the border.
