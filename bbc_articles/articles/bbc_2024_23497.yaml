title: 'Bo Westcombe-Evans: England rugby''s new star as WXV begins - BBC Sport'
date: '2024-09-28'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cg7859k1ex1o
content: |-
  Bo Westcombe-Evans pulls on an England shirt for the first time on Sunday, less than three months after pulling off boxing gloves for the last time.

  Westcombe-Evans was part of a Loughborough Lightning side who finished fifth in last season's Premiership Women's Rugby

  It's a team game, but Bo Westcombe-Evans relishes the individual battle. "Me, in space, one v one, is my ideal scenario," the England wing tells BBC Sport. "I like to back myself on the edge. I have quite a good hand-off, so I try and step on the outside and use it to fend. "I like taking the handbrake off and just going for it." Less than three months ago, that combination of footwork, fast hands and full-on attack carried Westcombe-Evans into a rather different contest. As Ini Kamoze's 1994 hit 'Here Comes the Hotstepper' blared out across Leicester's Athena venue, she emerged though the dry ice and spotlight, bouncing on her toes and decked out in red boxing shorts. In the blue corner was a fellow student, representing Loughborough University's powerlifting scene. Despite giving up several inches in height and reach, it was Westcombe-Evans who emerged victorious over three bruising rounds. "It was a charity-run event– a student fight night, I just thought it is a bit of me - that aggressive side - and signed up," Westcombe-Evans says. "There was a moment when you are looking out over that arena – hundreds of people watching, the ring on stage – when I thought 'oh my gosh, what have I done'. "It was a really cool experience though; all my friends came down to watch dressed up in really smart clothing and winning was amazing. "I wouldn't do it again though. I am retiring undefeated!"

  Westcombe-Evans fought in a student charity boxing event, beating her opponent over three rounds

  If that was the end of one career, Sunday marks the start of another. The 22-year-old will make her England debut against the United States on Sunday as the Red Roses begin their WXV defence. Alongside Westcombe-Evans at outside centre will be former world player of the year Emily Scarratt who, by contrast, will be winning her 114th Test cap. Westcombe-Evans won't be in awe. She has gone through that already. Playing for Loughborough's student side meant sharing facilities and pitches with Loughborough Lightning stars such as Scarratt, former England captain Sarah Hunter and Helena Rowland. "I remember being in pre-season in my second year of university, once social distancing had ended, being around Scaz [Scarratt], Helena Rowland and Sarah Hunter and thinking 'this is crazy'," Westcombe-Evans says. "But they are such great people as well as players; they made me feel so welcome. The knowledge they have has helped me as well to be the best version of me." Hunter's knowledge helped on paper as well as the pitch. Now overseeing England's defence, Hunter was a star interviewee for Westcombe-Evans' dissertation on the barriers female coaches face in rugby. "I didn't realise, even as a player, how hard it is for females to get into coaching," says Westcombe-Evans. "It is crazy, most of the girls who coach are at a high level, whereas male coaches could be grassroots players who think they have better knowledge than international players. "It was really interesting."

  Westcombe-Evans has part of England's training group for the past seven weeks, but was not included in the squad for the warm-up wins over France and New Zealand

  That may be a fight Westcombe-Evans takes up in future. In the meantime, she is scoring top marks in Premiership Women's Rugby. During the regular season, she made more metres (1,700) and more line breaks (25) than anyone else in England's top flight., external Those stats have bolstered her belief as she has become used to life inside the world's best women's rugby team over the past seven weeks of training. "I do get quite a lot of imposter syndrome – wondering if I deserve to be here," Westcombe-Evans says.

  "But, at the end of the day, I play with or against all these girls so I have earned my right to be here and my place in the team." Alex Matthews, who captains England on Sunday, certainly believes Westcombe-Evans has earned that right, describing her as "electric" and predicting some "real damage" to the US defence. When she lines up in the tunnel within the cavernous 54,000-seater BC Place – a venue that will host Taylor Swift for three nights in December – Westcombe-Evans anticipates she will be "super nervous". "Nerves are natural, but I am filled with excitement," she says. "I want to go out, show what I can do on such a big day and full-on rip in." In the ring, those tactics proved too much for her opponent. The United States might also be left seeing stars.
