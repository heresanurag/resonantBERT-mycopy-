title: 'Worksop explosion: Major incident after house destroyed and people evacuated
  - BBC News'
date: '2025-04-13'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/ce3q700xnw5o
content: |-
  Nottinghamshire Police, the fire service and ambulances will be at the scene overnight.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Emergency services have declared a major incident following an explosion that destroyed a terraced property. Nottinghamshire Police said officers were called to John Street in Worksop, Nottinghamshire, just before 20:00 BST on Saturday. Multiple properties on the street have been evacuated, and fire crews, police officers and ambulances are at the scene. There is no confirmation of injuries, police said.

  Emergency services will remain at the scene overnight

  Fire crews from Warsop, Worksop and Mansfield Fire Station as well as Clowne Fire Station are also in attendance. Ch Insp Neil Humphris said: "This is a major incident and emergency services will remain at the scene throughout the night. "Multiple properties have been evacuated as we work with our partners to respond to this incident and understand how it happened." The Crown Place Community Centre was opened for residents and police remained at the scene to provide assistance. Karolina Ciolko, who lives nearby, told the BBC: "I was lying in bed when I heard an explosion. "I quickly looked out the window. I saw smoke and the car in front of me rocked and the alarm went off. We quickly ran out of the house to see what had happened."

