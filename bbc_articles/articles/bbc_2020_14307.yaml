title: 'Jack Grealish: CCTV shows motoring offences that lead to ban - BBC News'
date: '2020-12-15'
section: General
url: http://www.bbc.co.uk/news/uk-55324929
content: |-
  The Aston Villa captain was given a nine month ban and fined following two motoring offences.

  England footballer Jack Grealish has been banned from driving for nine months and fined £82,499 for two motoring offences.

  CCTV footage from an incident on 29 March shows the Aston Villa captain crashing into parked vehicles after disobeying lockdown rules to meet friends.

  The video shared by West Midlands Police also shows Mr Grealish driving carelessly on 18 October.
