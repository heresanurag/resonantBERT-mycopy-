content: |-
  A search has been underway for Tom Phillips since he took his three children from their home in 2021.

  Fugitive father seen with children in NZ wilderness for first time in years

  The family were spotted by a group of pig hunters in a chance encounter

  A New Zealand father who disappeared with his three children into the country's wilderness three years ago has been publicly seen with them for the first time in years. A national search has been under way for Tom Phillips since he took Ember, 8, Maverick, 9, and Jayda, 11, away from their family home in December 2021, after a dispute with their mother. Police believe they have been hiding and camping in the North Island's western Waikato region and earlier this year posted an NZ$80,000 (£37,200) appeal for information. The sighting last week came from a group of teenage pig hunters who had been trekking through the bush and filmed the encounter on their phones.

  New Zealand media reported the teenagers had briefly spoken to one of their children - asking if anyone knew they were there. They had replied "only you" and kept walking, the father of one of the teenagers told New Zealand's 1News. The teenagers reported that Mr Phillips had been carrying a gun and had a long beard while the children were masked and carrying their own packs. New Zealand Police have described the sighting as "credible", and said it was "positive information" for relatives. "We know it will be reassuring for the children’s wider family," said Det Insp Andrew Saunders. While there have been a number of reported sightings of Mr Phillips - this is the first time he is believed to have been seen with all three of his children.

  Police believe this CCTV footage captured Phillips with one of his children attempting to break into a store in Piopio last year.

  The footage was shot on 3 October in a bush area of Marokopa, with police becoming aware of it at about 19:00 local time (06:00 GMT) that day. That prompted a three-day search involving police and army helicopters. In the video, Tom Phillips can be seen leading his children through the rugged terrain. They are all wearing camouflage clothing. Speaking to the New Zealand Herald newspaper, external on Thursday, the mother of the children, Cat, expressed her relief that they were still alive and that her children appeared well enough to be carrying their own bags. She accused her ex-partner of using the children as "pawns in his game". “They shouldn’t have to be worrying about where they’re going to sleep that night or whether they’re going to be warm," she told the paper. She also said authorities should be doing more to track down her ex-partner, and appealed to those she believed were helping her ex-husband.

  [L to R] Ember Phillips, Jayda Phillips, and Maverick Phillips have been missing since December 2021

  Police have said they believe Mr Phillips is being helped by other parties. In June, authorities offered the cash reward for information which would lead to the safe return of the children - although the offer expired before being claimed. Police said the children had not been in contact with other people in the past three years, and had not received an education. "We believe that Tom and the children are being assisted and we’re urging anyone who’s doing this to please stop, do the right thing and tell police what you know," said Det Insp Andrew Saunders. Last year, a warrant was issued for the arrest of Mr Phillips over his suspected involvement in a bank robbery in Te Kuiti, a small town in the North Island. Police said he had an accomplice during the alleged incident, and cautioned the public against approaching him as he was probably armed.
