title: Arsenal 1-2 Watford - BBC Sport
date: '2017-02-01'
section: General
url: http://www.bbc.co.uk/sport/football/38727389
content: |-
  Arsenal's Premier League title hopes suffer a huge blow with a shock defeat against Watford at Emirates Stadium.

  Last updated on .From the section Football

  Arsenal's Premier League title hopes suffered a huge blow with a shock home defeat as Watford secured their first top-flight win over the Gunners since 1988.

  Former Tottenham defender Younes Kaboul lashed in the opener within 10 minutes for Watford with a shot from outside the area which deflected off Aaron Ramsey.

  Just two minutes and 57 seconds later, the visitors doubled their lead as Troy Deeney tapped in the rebound after Etienne Capoue's fine run ended with his shot being saved by Petr Cech.

  The Arsenal goalkeeper was called into action again as he tipped Sebastian Prodl's header over the crossbar and pushed away Daryl Janmaat's curling strike.

  The hosts improved significantly in the second half and Alex Iwobi pulled a goal back by steering Alexis Sanchez's cross home.

  Lucas Perez struck the crossbar with a powerful drive, but they could not find the equaliser.

  Relive Watford's win over Arsenal at the Emirates Stadium

  Challenge over for another year?

  Arsenal last won the title in the 2003-04 season and face clawing back a nine-point deficit on London rivals and leaders Chelsea, who drew 1-1 with Liverpool.

  And their task is made more difficult as they still face trips to play Antonio Conte's side as well as Liverpool and Tottenham - the other three teams in the top four - between now and the end of the season.

  Going into this game they were unbeaten in their last five league fixtures, but a desperately poor first half showing - with manager Arsene Wenger watching powerless from the stands as he served the second of a four-match touchline ban - cost them dearly.

  The Gunners failed to get a shot on target in the first 45 minutes, but forced Watford goalkeeper Heurelho Gomes into sharp saves from substitute Theo Walcott and Iwobi after the break, while the Brazilian pushed away Mesut Ozil's snap shot.

  But they suffered their first defeat at the Emirates Stadium since the opening day against Liverpool, ending a run of eight victories and two draws.

  Watford boss Walter Mazzarri was under increasing pressure after an embarrassing FA Cup exit at Millwall and seven games without a win in the league.

  But the visitors' energetic start - pressing Arsenal high up the pitch and not allowing the hosts time on the ball - created the platform for them to climb to 13th in the table, eight points clear of the relegation zone.

  Central midfielder Capoue produced a dynamic performance. He contributed seven tackles and won the ball back the same number of times to top his team's defensive statistics and lay the groundwork for Watford's first league win over Arsenal in nearly 30 years.

  Debutant M'Baye Niang, signed on loan from AC Milan until the end of the season, showcased his pace in the 70 minutes he was on the pitch and his strong running down the left caused Arsenal right-back Gabriel constant problems.

  'You have to press them'

  Arsenal manager Arsene Wenger: "It was obvious we lost duels and were not sharp enough. It looked more mentally that we were not ready for the challenges. We were unlucky for the first goal which was deflected after a soft free-kick.

  "It took us a while to get into the game; it was all us in the second half and we were unlucky not to get something from the game."

  Watford boss Walter Mazzarri: "We played a great first half and the condition of some of the players is returning. In the second half, Arsenal managed to press us but in general it was very well done.

  "Against a great team in their stadium, you cannot allow them to play too much of the ball and you have to press them. We did that very well but you cannot do it for 90 minutes. That was our tactic."

  Analysis - Arsenal are nowhere near Chelsea

  "I have to give Watford credit because they had not won in seven games but did not look like a side lacking confidence. They had a good game plan and looked a threat on the break.

  "I was a bit surprised by Arsenal. You can't start games like they did today. It was lethargic, sloppy and they did not look like a team going for the title. For the first 25 minutes they were lucky to be only 2-0 down. Watford were the first to every ball.

  "Capoue was a driving force throughout the game. He had a great start to the season and faded but he was back to his best today. His performance was superb.

  "Arsenal played better in the second half but you can't keep giving yourself a mountain to climb against such quality and expect to win games. You are never going to win the league that way. Defensively, even though they brought in reinforcements, I still don't think they are anywhere near Chelsea."

  Arsenal face a crucial trip to Chelsea at Stamford Bridge on Saturday (kick-off 12:30 GMT), while Watford host Burnley the same day at 15:00 GMT.

