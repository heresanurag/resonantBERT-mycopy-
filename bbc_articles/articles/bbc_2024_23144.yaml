  The defendants will next appear at Bristol Crown Court on 27 September.

  Four men charged with murder of missing man

  Michael Wheeler has not been seen or heard from since 24 August

  Four men have been charged with murder in connection with the disappearance of a man who has not been seen or heard from in a month. David Garland, 39, and Jack Rance, 28, both of no fixed address, Mark Roberts, 38, of Juniper Close, Yeovil, and Reuben Clare, 18, of Sherborne Road, Yeovil, are accused of murdering Michael Wheeler. They appeared before Yeovil Magistrates' Court earlier. Police launched an investigation after concerns were raised about Mr Wheeler's welfare on 16 September. He has not yet been found. The defendants have been remanded into custody ahead of their next appearance at Bristol Crown Court on 27 September

  A fifth man, who had been arrested last week, was re-arrested on Wednesday, while another man arrested on Monday was currently on bail, police said. A woman who had been arrested on suspicion of assisting an offender was also on bail, the force added.

  Mr Wheeler's car had been recovered last week after being found abandoned in Yeovil, police said. Officers carried out searches in Ham Hill, Stoke sub Hamdon and at addresses in Yeovil and Crewkerne after the 37-year-old failed to contact friends or family or attend regular appointments. He has not been seen or heard from since 24 August. The investigation is continuing and Avon and Somerset Police has asked anybody with information to contact them.

