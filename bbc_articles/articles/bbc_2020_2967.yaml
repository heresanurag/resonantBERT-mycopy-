title: 'Hythe baby death: Woman arrested on suspicion of murder - BBC News'
date: '2020-03-08'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-51792347
content: |-
  A 36-year-old woman is arrested on suspicion of murder after a baby's body is found in Hampshire.

  Police were at the scene on Shore Road in Hythe on Friday morning

  A woman has been arrested on suspicion of murder after the body of a baby was found in woodland.

  The newborn boy was found near Shore Road in Hythe, near Southampton, on Thursday.

  Hampshire Constabulary said a 36-year-old woman has been arrested on suspicion of murder and was in police custody.

  Det Ch Insp Liz Williams called the investigation into the baby's death "difficult and complex".

