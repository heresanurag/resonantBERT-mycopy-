title: Prince Louis photo marks seventh birthday - BBC News
date: '2025-04-23'
section: UK
url: http://www.bbc.co.uk/news/articles/c33zj5rgv13o
content: |-
  A photograph taken in Norfolk this month has been released to mark the birthday of Prince Louis.

  A new photograph showing a gap-toothed Prince Louis has been released by Kensington Palace to mark his seventh birthday. The youngest son of the Prince and Princess of Wales appears in a picture taken in Norfolk earlier this month, with the photo posted on their social media platforms. The picture shows the schoolboy prince smiling, set against a woodlands backdrop. The photo was taken by Josh Shinner, who has taken pictures of Prince William and Catherine's family before, including their Christmas card for 2023.

  An accompanying video clip, also put on social media by Kensington Palace, shows the prince grinning at the camera and jumping off a fallen tree trunk. The photo was posted on social media with the message: "Wishing Prince Louis a very Happy 7th Birthday! " along with a birthday cake emoji. Prince William and Catherine spent Easter at Norfolk, where the photo was taken - with the family having a home in Anmer Hall, part of the Sandringham Estate. Prince Louis, the King's grandson, is fourth in line in succession to the throne. Louis's father, Prince William, will attend the funeral of Pope Francis on Saturday, where he will be representing King Charles.

  This year's photograph to celebrate Louis's seventh birthday was taken in Norfolk

  Last year's photograph was taken by Louis's mother, Catherine, who is a keen photographer

