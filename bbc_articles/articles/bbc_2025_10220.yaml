  A rescue was launched off the Lincolnshire coast after the man got into difficulty in the water.

  Man, 60, dies attempting to help children in sea

  An air ambulance was deployed during the rescue effort (file picture)

  A man has died after attempting to help two children who appeared to be in distress in the sea. The 60-year-old man got into difficulty in the water off Ingoldmells, near Skegness. Lincolnshire Police said the incident happened close to the Promenade, shortly after 16:00 BST. The air ambulance, coastguard and RNLI were deployed.

