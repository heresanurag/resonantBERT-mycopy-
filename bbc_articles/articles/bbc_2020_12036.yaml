title: 'Walthamstow stabbing: Teenage boy killed in street - BBC News'
date: '2020-10-24'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-54674293
content: |-
  The 17-year-old boy was pronounced dead at the scene in east London on Friday night.

  A 17-year-old boy has been killed in a street stabbing in east London.

  The Met Police said officers were called to Westbury Road in Walthamstow at 21:20 BST on Friday, where they found the boy injured.

  Paramedics treated the teenager at the scene but he was pronounced dead shortly after.

  Officers are in the process of establishing his identity and informing his next of kin. No arrests have been made.

  A crime scene remains in place while detectives carry out an investigation.

  A local resident, who did not want to be named, said that before the arrival of emergency services they "didn't hear anything at all that indicated violence, heard no shouting etc that we thought was odd".

  "It is incredibly tragic and such a senseless loss of life. It feels especially shocking when it happens so close to home, and on an otherwise peaceful street," they said.

  The resident said sniffer dogs were at the scene on Friday night, while two cars had been removed by police.

