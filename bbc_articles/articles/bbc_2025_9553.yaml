  How to follow the local elections on the BBC

  Elections are taking place in 23 councils on Thursday, alongside six mayoral races. Voters in the Runcorn and Helsby constituency will also elect their new MP. BBC News is on hand to keep you up-to-date with the latest developments across all platforms.

  Follow all the latest election developments on the BBC News website and app. A round-the-clock live page will feature the expertise of polling guru Professor Sir John Curtice, with input from BBC News reporters stationed at counts across England. Check the results in your area as they come in with our easy-to-use postcode lookup tool. Our Local Elections 2025 page will be continually updated with explainers and detailed analysis from our political correspondents and editors.

  From 23:10 BST on Thursday, Laura Kuenssberg will host an Elections 2025 Special on BBC One, with political editor Chris Mason and correspondent Damian Grammaticas reporting from the count in Runcorn and Helsby. Polling expert Professor Sir John Curtice will be on hand to offer his analysis and insight. On Friday, BBC Breakfast will take a comprehensive look at the results and will bring you the latest live reaction from the Runcorn and Helsby by-election. At 12:00 BST, Laura Kuenssberg's Election 2025 Special will be back on BBC Two until 14:00 BST. From 14:00 to 16:00 BST, it will continue on BBC One, and will then switch to the BBC News Channel. On Sunday 4 May, Politics England will bring you the latest developments live from 10:00 BST on BBC One. All of our coverage will be available for streaming on BBC iPlayer.

  BBC News will be providing results on local radio on Thursday night, along with bulletins on BBC Radio 4 and Radio 5 Live. On Friday, the Today programme will bring you all the latest analysis from 06:00 BST. A special edition of Newscast hosted by Adam Fleming and Chris Mason will also be available on the BBC Live News stream on BBC Sounds from 07:00 BST on Friday. Across the weekend, Laura Kuenssberg and Paddy O'Connell will wrap up the rest of the results with episodes on Saturday and Sunday.
