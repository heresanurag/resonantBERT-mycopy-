title: US carpenter helps rebuild Notre Dame Cathedral - BBC News
date: '2024-04-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65773145
content: |-
  Peter Henrikson uses medieval techniques to create the new roof for the fire-ravaged structure.

  Peter Henrikson, from Minnesota, is working with French carpenters to create the new roof for the historic fire-ravaged structure. They're using medieval techniques, like those used to build the original structure.
