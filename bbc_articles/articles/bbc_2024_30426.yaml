title: Government department spends £1,200 on two folders - BBC News
date: '2024-12-11'
section: General
url: http://www.bbc.co.uk/news/articles/c3vrw9pd16do
content: |-
  It comes as Chancellor Rachel Reeves asks departments to highlight savings they can make in the next few years.

  Culture Secretary Lisa Nandy's department bought the new folders in October

  A government department spent almost £1,200 of taxpayers' money on two ministerial folders, official figures show, external. It came as Chancellor Rachel Reeves launched a crackdown on government waste. The Department for Culture Media and Sport bought the folders from luxury leather goods manufacturer Barrow Hepburn & Gale, at a cost of £594 each. Other government departments routinely buy the same folders, and ministerial red boxes, from the company, which also supplies the Royal Family. Leather-bound document holders are available in the House of Commons shop for £30. But sources suggest the extra expense is justified to enhance the image of the government.

  Government sources added that ministerial folders last for years and are used by successive ministers, with replacements only being ordered when the need arises. Rachel Reeves - who also uses a Barrow Hepburn & Gale red box and folders - has ordered government departments to show how they can make annual savings of 5%. The DCMS spending on the folders was dated 29 October - the day before Reeves's first Budget - and details were revealed as the chancellor set out the next phase of her spending review. Asked if Sir Keir Starmer would consider the spending excessive, the PM's official spokesman said: "It's going to be up to departments to find this 5%, they'll be able to look line-by-line, make sure every pound of government spending is being focused and delivering on the plan for change. "It will be up to departments through the spending review process to identify those savings to help drive out waste and ensure that all funding is focused on the priorities that the prime minister set out in the plan for change." A government spokesperson said it was "entirely focused on ensuring every pound of spending represents the best value for taxpayers, while also increasing investment in our public services and delivering on key growth projects".
