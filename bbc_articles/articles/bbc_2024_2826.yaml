title: The CCTV that helped convict Brianna Ghey's killers - BBC News
date: '2024-02-02'
section: General
url: http://www.bbc.co.uk/news/uk-68178354
content: |-
  Brianna Ghey and her murderers were seen on camera multiple times the day she was killed.

  Scarlett Jenkinson and Eddie Ratcliffe stabbed Brianna, 16, to death in a park in Cheshire in February 2023.

  They have been convicted of her murder.

  Read more: 'I've never felt such grief' - Brianna Ghey's mother
