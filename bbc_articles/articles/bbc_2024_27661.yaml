content: |-
  The BBC has "agreed in principle a contract extension through to the 2026 World Cup," with Lineker.

  Lineker to stop hosting Match of the Day, BBC confirms

  This video can not be played To play this video you need to enable JavaScript in your browser. Gary Lineker seen after stepping down from Match of the Day

  The BBC has confirmed that Match of the Day host Gary Lineker is to step down from the flagship football show at the end of this season, but will host BBC Sport’s coverage of the 2026 World Cup. He will also front the BBC's coverage of the FA Cup 2025/2026. "The BBC and Gary Lineker have agreed in principle a contract extension through to the 2026 World Cup," the BBC said, while confirming his Match of the Day tenure was ending. Lineker said: “I’m delighted to continue my long association with BBC Sport and would like to thank all those who made this happen.”

  He will continue with the MOTD Top Ten podcast and the BBC will also now host the popular The Rest is Football podcast on BBC Sounds. The podcast features Lineker, Alan Shearer, and Micah Richards discussing the latest football news along with stories from their careers, and is part of Goalhanger productions, co-founded by Lineker. This marks the first time it will also be made available on the BBC's own audio platform; it is currently available on podcast platforms such as Spotify and Apple. The BBC said there will be one episode per week of The Rest is Football on BBC Sounds from next month. Goalhanger also produces popular shows including The Rest is History, The Rest is Politics and The Rest is Entertainment.

  Gary Lineker: “I’m delighted to continue my long association with BBC Sport"

  Lineker, whose contract was coming to an end, entered negotiations with the BBC's new head of sport in October. BBC News understands that Lineker was open to staying on at Match of the Day, but the BBC did not offer him a new contract for the show. However, it's understood both parties are now happy with the new agreement. "With 33 million viewers last season across the Premier League and FA Cup, Match of the Day remains part of the staple diet of football fans who still get a huge buzz from hearing that iconic theme tune on a Saturday night," the BBC said. "The show continually evolves for changing viewing habits bringing its unique and unmatched analysis and commentary across all platforms. Future plans for Match of the Day will be announced in due course." Alex Kay-Jelski, director of BBC Sport described Lineker as a world-class presenter. "We’re delighted that he’ll lead our coverage of the next World Cup and continue to lead our live coverage of the FA Cup," he said. “After 25 seasons Gary is stepping down from MOTD. We want to thank him for everything he has done for the show, which continues to attract millions of viewers each week. "He’ll be hugely missed on the show but we’re so happy he is staying with the BBC to present live football.”

  Former BBC director general Greg Dyke told BBC Radio 4's Today programme that Lineker was "the outstanding sports presenter of his time", but added: "Life moves on, presenters don't stay forever." The 63-year-old has hosted Match of the Day since 1999. He will have held the post for 26 years when he leaves at the end of the Premier League season in May 2025. Dyke, who was director general when Lineker first began hosting the football show in 1999, did not speculate on whether Lineker had been "offered a new contract or not". He also said he did not know whether the recent controversy over the presenter's social media use was connected with his departure. "Whether this is anything to do with that I don't know. It's one of the few times I've disagreed with the BBC since I left," he said. "I thought that he was a sports presenter, and therefore what he was saying about politics was irrelevant to his performance as as a presenter. "But it's there in the background. So it must have been a thought in the mind of of whoever took the decision." Dyke said losing the presenter was "a big loss", but "in the end people watch Match of the Day for the football".

  Lineker told Esquire magazine in an interview published earlier this month that he accepted he will "have to slow down at some point". Dyke also said the BBC is "in difficulties financially", referring to recent job cuts being made as part of wider BBC efforts to save £700m a year, adding that losing Lineker "would be a saving on a sports budget, which you could use elsewhere". Lineker is one of the corporation's best-known presenters and its highest-paid star, of those whose salaries are declared, earning more than £1.3m a year. He has also presented coverage of major tournaments like World Cups and European Championships for the BBC, as well as BBC Sports Personality of the Year ceremonies. Lineker has worked for other sports networks during his time at the BBC, including US network NBC and BT Sport (now TNT Sport). Alastair Campbell, who co-presents The Rest Is Politics podcast, said Lineker would be "a very hard act to follow", Sky News reported. "He is an excellent broadcaster and a very good guy," Campbell said. Lineker's new contract has now been agreed and he will leave on a high at the biggest tournament in world football. But replacing a star presenter on a high profile show is always a risk. Lineker was briefly suspended by bosses last year after an outcry over his social media post about the UK's asylum policy. The incident led to a review of BBC social media guidelines, which concluded that high-profile presenters should be allowed to express views on issues and policies but stop short of political campaigning. Lineker described the new rules at the time as "all very sensible". Before becoming a TV presenter, Lineker had a hugely successful career as a striker for England as well as Leicester, Everton, Tottenham Hotspur and Barcelona.
