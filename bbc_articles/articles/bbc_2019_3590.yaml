title: 'Jacinda Ardern: ''A leader with love on full display'' - BBC News'
date: '2019-03-24'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-47630129
content: |-
  The NZ prime minister has been held up as an example of good leadership after the Christchurch attack.

  Jacinda Ardern met with victims, and other members of the community, in Christchurch the day after the attack

  On a calm Friday lunchtime, people gathered for prayers at a mosque in Christchurch, New Zealand. Minutes later, a young man walked up to the door brandishing an assault rifle.

  Despite having his weapon on aggressively clear display, he was greeted by one of the worshippers - an elderly Afghan man - with the words "Hello, brother".

  The pain of the massacre reverberated not just across New Zealand, but also around the world. It seemed to signal that, almost everywhere, something had changed. And because of the ubiquity of social media, people were able to view live footage of a self-proclaimed white supremacist murdering 50 people in a place of worship.

  The main suspect is Australian, and the victims were from a number of different countries including India, Pakistan, Egypt, Jordan and Somalia. So when Prime Minister Jacinda Ardern appeared behind a podium to deliver a statement a few hours after the attack, it wasn't just New Zealand who listened to what she had to say.

  "It is clear that this can now only be described as a terrorist attack."

  By so swiftly and decisively describing the shooting as a "terrorist attack", Ms Ardern seemed to show an awareness and consideration of the fact that many people feel officials are reluctant to use this word when an attacker is white, even if that attack is politically motivated.

  Her acknowledgement of the fear and sorrow of the Muslim community didn't end there, either. She hugged the victims in Christchurch, wearing a black headscarf as a simple show of respect; she gave people the unifying cry "They are us"; and addressing parliament for the first time a few days later, she made a small but bold statement by opening her remarks with the Islamic greeting "As-Salaam Alaikum".

  But she's combined this show of empathy with promises of concrete legislative and cultural change. A few hours after the attack, she announced a clampdown on the country's lax gun laws "within 10 days", and speaking to the BBC's Clive Myrie she promised to "weed out" racism both in New Zealand and globally.

  "We cannot think about this in terms of boundaries," she insisted.

