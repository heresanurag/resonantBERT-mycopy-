title: 'Cardiff riot: It was complete chaos - BBC News'
date: '2023-05-23'
section: General
url: http://www.bbc.co.uk/news/uk-wales-65680982
content: |-
  The violence began after car crash took place in the Ely area, according to police.

  A riot unfolded in the Ely area of Cardiff after a road traffic accident in which two teenagers are understood to have died, police have said.

  Between 100-150 people gathered, with rioters burning cars and throwing objects in clashes with police.

  BBC Wales correspondent Tomos Morgan visited the scene the morning after, to see the devastation.
