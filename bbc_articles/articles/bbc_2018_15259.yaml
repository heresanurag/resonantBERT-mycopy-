title: 'Raheem Sterling row: Is there a racial ''double standard''? - BBC News'
date: '2018-12-12'
section: General
url: http://www.bbc.co.uk/news/uk-46516014
content: |-
  Raheem Sterling has accused the press of helping fuel racism, but does this fit with people's experiences?

  Footballer Raheem Sterling has accused the press of helping fuel racism and holding people of colour to "double standards".

  The BBC went out onto the streets of London to find out whether this fits with people's personal experiences.
