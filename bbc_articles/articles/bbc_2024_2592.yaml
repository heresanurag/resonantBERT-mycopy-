id: bbc_2024_2592
title: Moment giant Antarctica drone takes off - BBC News
date: '2024-02-22'
section: General
url: http://www.bbc.co.uk/news/science-environment-68363623
content: |-
  Scientists want to use the robot plane to reach inaccessible areas to understand climate change.

  The first pictures of a giant drone flying in Antarctica have been released by the British Antarctic Survey.

  Scientists want to use the drone to reach inaccessible parts of the continent to understand the impacts of climate change.

  The drone is operated remotely and engineers with company Windracers monitor it from a computer.

  BBC climate and science reporter Georgina Rannard explains what it has been mapping.
