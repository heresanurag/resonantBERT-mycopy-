content: |-
  Jill Biden, accompanied by her grandson Beau, welcomed the arrival of the festive fir hailing from North Carolina.

  Jill Biden, accompanied by her grandson Beau, has welcomed the arrival of the White House Christmas tree.

  Called the Fraser fir, it was grown at a farm in the Blue Ridge Mountains of North Carolina.
