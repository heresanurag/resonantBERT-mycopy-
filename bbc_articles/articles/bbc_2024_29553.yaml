title: Rachel Reeves 'not immune' to National Insurance hike criticism - BBC News
date: '2024-11-04'
section: Business
url: http://www.bbc.co.uk/news/articles/cq6l708vve7o
content: |-
  The chancellor defends the rise in employer contributions telling BBC public finances had to be strengthened.

  Reeves 'not immune' to criticism over NI hike

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Chancellor Rachel Reeves has defended increasing taxes for employers in last week's Budget while saying she is "not immune" to the criticism she has received. However, she told the BBC money had to be raised in order to put public finances on a "firm footing". The decision to increase National Insurance (NI) contributions made by companies has come under fire from many businesses, including GPs who argue it could hit services for patients. The new Conservative Party leader Kemi Badenoch criticised the move, telling the BBC it would not result in growth and would "make all of us poorer".

  Appearing on Sunday with Laura Kuenssberg, the chancellor was asked whether there was any chance she would rethink the NI rise for employers. "I'm not immune to their criticism," Reeves said, "but we've got to raise the money to put our public finances on a firm footing." Wednesday's Budget outlined policies to increase spending by almost £70bn a year over the next five years. About half of this is being funded by tax increases, with the other half coming from a rise in borrowing. The NI rise for employers is set to raise £20bn a year making it one of the biggest single tax-raising measures in history. From next April, employers will have to pay NI at 15% on salaries above £5,000, instead of 13.8% on salaries above £9,100 currently. The Institute of General Practice Management, which represents GP practice managers, has estimated the rise will put up the tax bill of the average surgery by around £20,000 a year. Businesses are likely to respond by holding back on pay rises, influential think tanks, the government's independent forecaster and the chancellor herself have all said. "It will mean businesses will have to absorb some of this through profits and it is likely to mean wage increases might be slightly less than they otherwise would have been," Reeves previously told the BBC. The Institute for Fiscal Studies (IFS) said the rise in employer NICs will affect larger firms hiring people on low wages the most, while the Resolution Foundation think tank described the move as a "tax on working people".

  Also speaking to Sunday with Laura Kuenssberg, Badenoch said the Conservatives would be thinking about the economy "in a different way", which would be "completely the opposite" of what Labour was doing. She criticised the rise in employers' NI contributions as being "not coherent" as most of the increase would be passed on through lower wages and higher prices, but she did not say whether or not she would reverse it. This goes to the core of the growing political divide in UK politics, following the first Labour budget in 15 years and Badenoch’s victory. The new Conservative leader believes lower taxes will help boost economic growth, with the tax burden too high even under her own government. Labour has been willing to hike taxes because it believes without significant investment in the NHS, too many people of working age who have been ill will not be able to return to the labour market. It also thinks without a further boost to education, people will lack the skills needed in a modern economy. But the scale of the tax rises were never revealed before the election and the chancellor insists her hand has been forced because the public finances were worse than she anticipated when in opposition. Some in Labour’s ranks feel she should "lean in" more to the arguments for greater borrowing and investment. But Reeves insisted her budget was not "ideological" despite increasing taxes on some inherited land, second homes and flights on private jets, as well as imposing VAT on private school fees - something Badenoch has committed to reversing, branding it a "tax on aspiration that won't raise any money". Reeves also denied that raising employer NI had been considered by Labour before they came to power. "No, this was not something that was on the agenda before the election," she said. Asked if she had been wrong to say during the election that there would not be any extra taxes if Labour won, she replied: "What I was wrong about was the mess that the previous government had left for us," citing the £22bn black hole that Labour say the Tory party left them with.

  Earlier on Sunday, in an interview with Sky News, Reeves said she was wrong to say higher taxes would not be needed during the election as she "didn't know everything". Reeves told the BBC the previous Conservative government cut NI contributions made by workers without the money to do so, but she had not reversed the move because it would be a "direct breach" of Labour's manifesto. The chancellor said Labour had had to make "difficult choices", but she believed the economy was now "on a strong footing". Asked if she could rule out putting up more taxes during this parliament, Reeves said she was "not going to write four or five years' worth of Budgets" on the programme. However, she said Labour's pledge "not to increase for working people the key taxes they pay - income tax, National Insurance and VAT - that is a commitment for the duration of this parliament".

  Changes to the rules around inheritance tax have come under fire since they were announced in the Budget, with farmers angry about the loss of exemptions. From April 2026, inherited agricultural assets worth more than £1m, which were previously exempt, will have to pay inheritance tax at 20% - half the usual rate. Rebecca Wilson, a fifth-generation farmer from Yorkshire, told the Laura Kuenssberg programme that their farm could be facing a tax bill of nearly £1m when her parents died. Reeves said a farm owned by two people could pass on "£3m essentially tax-free" and there would be 10 years to pay any tax owed. She added that only "a very small number" of farms would be affected, but said last year 40% of the tax relief fell to "7% of the wealthiest land owners". "I don't think it is affordable to carry on with a relief like that when our public finances are under so much pressure."
