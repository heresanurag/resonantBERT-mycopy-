title: 'Newspaper headlines: ''Strike pain'' and ''has Labour lost control of the
  unions?'' - BBC News'
date: '2024-08-17'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c70j5yjxw15o
content: |-
  Concern over planned strikes by train drivers and border staff is leading a number of Saturday's front pages.

  'Strike pain' and 'has Labour lost control of the unions?'

  The train drivers' union Aslef has called a series of strikes on London North Eastern Railway

  The Times, external highlights what it calls further "strike pain" for travellers after train drivers and Border Force officers at Heathrow Airport announced a series of new walkouts. The paper says this latest round of industrial action comes after the government agreed above inflation pay rises for millions of workers - prompting the Conservatives to accuse ministers of being "played" by unions. "Has Labour lost control of the unions already?", asks the headline of the Daily Mail., external The Crown Prosecution Service has told the Daily Telegraph, external that some of the evidence presented in the first trial of Lucy Letby was "wrong". Prosecutors say data, showing which staff entered and left the baby unit where the former nurse committed her crimes, was corrected for her retrial. The paper says Letby's convictions - for murdering seven babies, and attempting to murder seven others - have come under scrutiny in recent months, with several scientists and doctors questioning the statistical and medical evidence that was put before the jury. Plans to set up a new unit in the Home Office dedicated to preventing violent crime among young people are featured by the Guardian, external. It says new guidelines will set out how police, schools, charities and mental health professionals can work together to steer teenagers away from breaking the law. The Home Secretary, Yvette Cooper, is reported to have told councils and police forces they have until Christmas to come up with proposals to tackle youth crime.

  The Home Secretary tells the Guardian that she thinks young people have to deal with a lot of pressures these days

  With the headline "Britain's worst looter", the Sun, external reports on one of the latest offenders to come before the courts after the spate of violent disorder across parts of England and Northern Ireland earlier this month. It says John Honey was jailed for nearly five years for stealing from shops in Hull, after he was seen at the front of a "baying mob", stirring up trouble. The 25-year-old is said to have been "easily identifiable" because of the distinctive shirt, featuring a St George's cross, that he was seen wearing in social media footage. The Daily Express, external says pensioners have warned they will have to choose between heating and eating, as a result of the chancellor's decision to scrap Winter Fuel Payments for those not on means-tested benefits. The paper says "swathes" of older people have got in touch to share "heartbreaking stories" of how they'll be affected, after it launched a campaign to save what it calls the "essential lifeline". In a column, the shadow Work and Pensions Secretary, Mel Stride, says cutting the Payment is a "downright disgrace". Last month, the chancellor said she had to make "urgent decisions" because of the previous government's "undisclosed" overspending. Freedom of information requests by the Daily Mail, external have revealed that the vast majority of civil servants based in Whitehall don't work in the office every day. According to the paper, the Department for Business and Trade is the "single worst" department at coaxing mandarins back to their desks, with as few as 17% of staff turning up on an average day. The Mail claims official figures are misleading as they simply count the number of occupied desks, so a department with 1,000 employees but only 500 desks would record a 100% occupancy rate if just half the staff turned up for work. The Cabinet Office says the Mail's figures fail to reflect how civil servants are required to work away from their department headquarters in other buildings or on site visits.

