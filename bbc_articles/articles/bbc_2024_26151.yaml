title: Horrible Histories to receive special Bafta Award - BBC News
date: '2024-10-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/c98d45kxp9lo
content: |-
  The children’s historical sketch show is rewarded for its "extraordinary cultural and social impact".

  The long-running children’s sketch show Horrible Histories will be rewarded for its "extraordinary cultural and social impact" with a special Bafta Award next month. Bafta cited the "joy, enrichment and hilarity it continues to bring to people of all ages" since it began 15 years ago, as well as its "legacy as a springboard for British comedic talent and impact on the school curriculum". Based on the best-selling books by Sunderland author Terry Deary, Horrible Histories has been one of the UK's most popular children's TV programmes since its debut in 2009. Bafta chair Sara Putt said: "Horrible Histories has transformed traditional ideas of what educational television should be."

  Spanning 11 series and multiple spin-offs, the BBC show followed the books' unconventional and engaging approach to history, with titles such as Groovy Greeks, Terrible Tudors and Vile Victorians. Lion Television, which produces the series, said it was "thrilled" by the special Bafta Award. "Through comedy, hideous historical facts and some banging tunes, we hope we’ve brought joy, laughter and - maybe - inspired new generations of young historians," executive producer Richard Bradley said. The show has already won nine Bafta Children's Awards and a British Comedy Award. Internationally, its honours include an International Emmy for best kids factual & entertainment. Over the years, Horrible Histories' regular cast members have been joined by a long list of guest stars, including Rowan Atkinson, Meera Syal, Rose Ayling-Ellis, Rosie Jones and David Baddiel. The makers will receive the honour as part of a special presentation on 29 November. The BBC also recently announced an addition to the 'Horrible' TV brand: Horrible Science.
