title: Coronavirus in Scotland - 18 more hospital deaths - BBC News
date: '2020-04-26'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52329071
content: |-
  As the hospital death toll rises to 1,249, ministers announce five military-staffed mobile testing units will start in Scotland next week.

  Rangers say they will produce "our evidence at the appropriate time" after calling for an independent inquiry into the Scottish Professional Football League's handling of an early end to the season.

  Hearts, who also want a general meeting of all clubs to consider the circumstances, and Ross County today called on the Ibrox club to reveal details they say came from a "whistleblower".

  An investigation by auditor Deloitte concluded there was "no evidence of impropriety" in the vote that led to the Championship, League One and League Two being ended early, with the Premiership likely to follow.

  But Rangers say: "It is vital that those involved in making those decisions have the confidence and support of member clubs. An independent investigation provides a route to achieving this.

  "The evidence will be provided to all member clubs well in advance of a general meeting to approve an independent investigation."
