title: Baby born after mum killed in Burmantofts tower block fall - BBC News
date: '2024-10-22'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/ckg2gpgrjd0o
content: |-
  The baby was born in hospital after the woman fell from the tower block close to Leeds city centre.

  Police said they were called at 10:24 BST to the tower block

  A baby born after its mother died falling from a tower block is receiving "critical care", police have said. The woman was in the "late stage of pregnancy" when she fell from Shakespeare Towers in the Burmantofts area of Leeds about 10:25 BST, West Yorkshire Police confirmed. The child was delivered afterwards in hospital. A spokesperson for the force said there were believed to be no suspicious circumstances relating to the death of the woman, who was in her 30s.

  The woman fell on Tuesday morning, police said

  She died at the scene and the coroner has been informed. BBC Yorkshire reporter David Spereall said there was no sign of a police cordon when he arrived at the scene. He said a small number people had gone in and out of the flats since he arrived and one woman, believed to be a relative, stopping to lay flowers. Councillor Luke Farley said the incident was "deeply distressing" and he was "saddened" by the news. The Labour councillor said the area was full of young families and the tower block had been refurbished four or five years ago. Sending condolences to the woman's family, he added: "I also want to reassure residents that there will be a police presence there over the next day or so."

  Floral tributes were left close to the entrance of Shakespeare Towers on Tuesday evening

  One resident told the BBC he had been in his flat on the 14th floor when he heard a "thud", followed by screaming. He said: "It's a shock to everybody, to the whole community." Shakespeare Towers is a 17-storey block of flats to the east of the city centre, close to St James's Hospital. The flats are owned by Leeds City Council, which has been approached for comment. If you, or someone you know, have been affected by this story, please visit BBC Action Line to find information on organisations that can help.
