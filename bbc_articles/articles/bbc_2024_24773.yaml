content: |-
  The Repair Shop host was charged by police last month.

  Jay Blades found fame on TV in 2017 when The Repair Shop launched

  BBC presenter Jay Blades has pleaded not guilty to engaging in controlling or coercive behaviour towards his estranged wife. Mr Blades, who fronted primetime show The Repair Shop, was charged by police last month. His wife, fitness instructor Lisa-Marie Zbozen, announced the pair's relationship was over in an Instagram post on 2 May. Appearing before Judge James Burbidge KC at Worcester Crown Court, Mr Blades entered his plea at a hearing on Friday.

  The charges relate to events between 1 January 2023 and 12 September this year, and claims that the 54-year-old engaged in behaviour that caused Ms Zbozen "to fear, on at least two occasions, that violence will be used against her". The judge rejected an application for part of the proceedings to be heard in private. He also removed a bail condition that required Mr Blades to wear an electronic tag, which had not yet been fitted, due to "failings" by the company responsible.

  The judge told Mr Blades that he would face a trial

  The judge said to Mr Blades: "You have denied responsibility for the crime alleged against you and the prosecution propose to try you. "I remove the tagging of your exclusion zone but you are still subject to the exclusion zone." Mr Blades, whose address was given by court as Wightwick, in Wolverhampton, but is formerly from Shropshire, is expected to face trial on 6 May next year. Wearing a dark suit and tie, he spoke only to confirm his identity to the clerk and enter his plea. After the 12-minute hearing, Mr Blades left the court without comment.

