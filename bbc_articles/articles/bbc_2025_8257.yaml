title: Experts dispute Colossal claim dire wolf back from extinction - BBC News
date: '2025-04-08'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/c4g9ejy3gdvo
content: |-
  Independent experts say three white wolf puppies are not dire wolves, as claimed by US company Colossal

  This video can not be played To play this video you need to enable JavaScript in your browser.

  There is a magnificent, snow-white wolf on the cover of Time Magazine today - accompanied by a headline announcing the return of the dire wolf. This now extinct species is possibly most famous for its fictional role in Game of Thrones, but it did exist - more than 10,000 years ago - when it roamed across the Americas. The company Colossal Biosciences is behind today's headlines, external. It announced that it used "deft genetic engineering and ancient DNA" to breed three dire wolf puppies and to "de-extinct" the species. But while the young wolves - Romulus, Remus, and Khaleesi - represent an impressive technological breakthrough, independent experts say they are not actually dire wolves.

  Zoologist Philip Seddon from the University of Otago in New Zealand explained the animals are "genetically modified grey wolves". Colossal publicised its efforts to use similar cutting edge genetic techniques to bring back extinct animals including the woolly mammoth and the Tasmanian tiger. Meanwhile experts have pointed to important biological differences between the wolf on the cover of Time and the dire wolf that roamed and hunted during the last ice age.

  Two of the puppies at one month of age
  • None How extinct animals could be brought back from the dead Paleogeneticist Dr Nic Rawlence, also from Otago University, explained how ancient dire wolf DNA - extracted from fossilised remains - is too degraded and damaged to biologically copy or clone. "Ancient DNA is like if you put fresh DNA in a 500 degree oven overnight," Dr Rawlence told BBC News. "It comes out fragmented - like shards and dust. "You can reconstruct [it], but it's not good enough to do anything else with." Instead, he added, the de-extinction team used new synthetic biology technology - using the ancient DNA to identify key segments of code that they could edit into the biological blueprint of a living animal, in this case a grey wolf. "So what Colossal has produced is a grey wolf, but it has some dire wolf-like characteristics, like a larger skull and white fur," said Dr Rawlence. "It's a hybrid." Dr Beth Shapiro, a biologist from Colossal Biosciences, said that this feat does represent de-extinction, which she described as recreating animals with the same characteristics. "A grey wolf is the closest living relative of a dire wolf - they're genetically really similar - so we targeted DNA sequences that lead to dire wolf traits and then edited grey wolf cells... then we cloned those cells and created our dire wolves." According to Dr Rawlence though, dire wolves diverged from grey wolves anywhere between 2.5 to six million years ago. "It's in a completely different genus to grey wolves," he said. "Colossal compared the genomes of the dire wolf and the grey wolf, and from about 19,000 genes, they determined that 20 changes in 14 genes gave them a dire wolf."

  The edited embryos were implanted in surrogate domestic dog mothers. According to the article in Time, all three wolves were born by planned caesarean section to minimise the risk of complications. Colossal, which was valued at $10bn (£7.8bn) in January, is keeping the wolves on a private 2,000-acre facility at an undisclosed location in the northern US. The pups certainly look like many people's vision of a dire wolf and the story has gathered global attention. So why is this scientific distinction important? "Because extinction is still forever," Dr Rawlence told BBC News. "If we don't have extinction, how are we going to learn from our mistakes? "Is the message now that we can go and destroy the environment and that animals can go extinct, but we can bring them back?"
