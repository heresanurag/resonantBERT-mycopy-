id: bbc_2024_32328
title: 'Tim Westwood: BBC pauses report publication after Met request - BBC News'
date: '2024-12-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy47nrwn0y7o
content: |-
  The BBC's report is set to examine what it knew about allegations of unwanted sexual behaviour by the former BBC Radio 1 DJ.

  The BBC has paused the publication of its report into what the corporation knew about the alleged behaviour of former BBC Radio 1 DJ Tim Westwood following a request from the Metropolitan Police. In 2022, BBC News broadcast accusations by 18 women of predatory and unwanted sexual behaviour and touching by Tim Westwood, in alleged incidents from 1992 to 2017. A Met police spokesperson said: "While consultation with the CPS is ongoing, we have asked the BBC to pause the publication of their report to allow for further time to consider any potential impact on the investigation."

  The BBC's report, led by Gemma White KC, was commissioned by the BBC to examine Mr Westwood's employment with the broadcaster. The BBC confirmed police had requested it pause publishing this report, adding it would continue to correspond with authorities. In a statement it said it would provide a further update when there was clarity to do so. "The police have requested that the BBC pause its intended publication of the report. This is to allow the investigating authorities further time to consider the impact of the publication of the report on the ongoing investigation. "We have discussed the police's request with Gemma White KC and she has agreed that it is appropriate to pause publication in these circumstances. "The BBC has always been clear that it intends to publish Gemma White KC's report. We recognise that this pause to publication will be disappointing – particularly to those who came forward to participate in the review and to whom we are very grateful. "However, we must continuefro to ensure that any steps we take, including in relation to publication of the report, do not negatively impact any criminal process."

  It is believed Mr Westwood has been interviewed under caution by the Metropolitan Police four times since the broadcast of the joint BBC News and the Guardian investigation. In a statement, police said the offences are alleged to have happened between 1982 and 2016. Detectives said they interviewed a man in his 60s man under caution last year. There has been no arrest. The BBC's review into Westwood's employment with the BBC was initially expected to take around six months. A freedom of information request by BBC News earlier this year revealed the BBC had spent more than £3 million on the review so far. Last month, the Met police confirmed it had made recommendations to the BBC that parts of the report "may interfere with justice if published." The force had also confirmed it had submitted a file of evidence to the Crown Prosecution Service but is continuing to make enquiries. It called the investigation "a complex and sensitive matter" and their "absolute priority is to maintain the integrity of our investigation and support and retain the confidence of potential victims". Tim Westwood stood down from his Capital Xtra show in 2022. The 67-year-old has continued to play in gigs up and down the country, despite some campaigners calling for nightclubs not to host him since the allegations emerged. He also regularly plays gigs in West Africa.
