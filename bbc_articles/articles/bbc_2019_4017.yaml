content: |-
  Gordon Strachan apologises for "any unintended distress caused" after being dropped by Sky Sports for comments over sex offender Adam Johnson.

  Last updated on .From the section Football

  Gordon Strachan held the position of Scotland manager between January 2013 and October 2017 Gordon Strachan has apologised for "any unintended distress caused" after he was dropped by Sky Sports for comments over sex offender Adam Johnson. The former Scotland manager appeared to compare potential criticism of Johnson with racial abuse. He had said: "If he goes on to the pitch and people start calling him names, have we got to do the same as it is to the racist situation?" In a statement, Strachan acknowledged an "imprecise use of language". Former England international Johnson, 31, was released from prison on 22 March after serving half of a six-year term for engaging in sexual activity with a 15-year-old fan. Discussing this on The Debate on Sky Sports, Strachan had said: "Is it all right to call him names now after doing his three years - have we got to allow that to happen?" On Sunday, Strachan apologised for his comments in a statement. It read: "Given the response in the last 24 hours to a point made on The Debate programme on Sky Sports from over a week ago, and having reflected on it personally, it is important for me to address the issues that have arisen. "In no way did I intended to confuse or conflate the very serious issue of racism targeted at footballers with the potential verbal abuse towards a player who has been convicted of a sexual offence. "Having reviewed the particular segment in light of the reaction, I fully acknowledge that the imprecise use of language in my initial response has left open a perception that should easily have been avoided. For that I sincerely apologise." Strachan added: "I would like to take the opportunity to atone for that: to reaffirm my condemnation of the behaviour that led to [Johnson's] conviction, to convey my heartfelt sympathy and support to the survivor, and to apologise for any unintended distress caused." The 62-year-old is not an employee of Sky, and was not subject to its disciplinary protocols following the broadcast. The broadcaster also apologised for Strachan's comments in a statement: "The comments were made by a guest on The Debate. Of course Sky Sports does not support the comments and we're sorry for the offence they have caused." There have been a number of high-profile instances of racism in football in recent months, including:
  • None following their Euro 2020 qualifier against England in Podgorica
  • None Allegations, being investigated by Uefa, that Chelsea's
  • None during his side's Serie A win at Cagliari.
  • None in the Championship on Saturday.
