  Two people were hospitalised after a huge blast destroyed a house in Ilford.

  Dashcam footage has captured the moment a house exploded in north-east London, sending debris flying into the street.

  About 60 firefighters attended the scene in Ilford on Tuesday afternoon. London Ambulance Service said they had treated three people for injures, with two taken to hospital.

  The blast was caused by gas, the London Fire Brigade (LFB) has said.

