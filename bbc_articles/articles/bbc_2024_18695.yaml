title: Five charged in Matthew Perry’s drugs-related death - BBC News
date: '2024-08-15'
section: General
url: http://www.bbc.co.uk/news/videos/c8rxgj6xpnjo
content: |-
  Police say an 'underground criminal network' took advantage of the actor's addiction to make money.

  Five people have been charged for their involvement in the drug-related death of Matthew Perry.

  The actor, famed for his role as Chandler Bing in the sitcom Friends, died in his Los Angeles home in October 2023. A post-mortem examination found a high concentration of ketamine in his blood and determined the "acute effects" of the controlled substance had killed him.

  Police say that a criminal network "took advantage of his addiction issues".
