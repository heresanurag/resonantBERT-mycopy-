content: |-
  Lukasz and Agnieszka say they "lost everything" in the fire in Dagenham, two weeks ahead of their wedding in Poland.

  A couple that escaped the Dagenham block fire fear for their wedding day after becoming homeless and losing everything.

  Lukasz and Agnieszka are to due to get married in Poland in two weeks. However, the bride's wedding dress purchased two days before the fire burned down along with the rest of their belongings.

  "That was supposed to be the best day of our lives," said Lukasz.

  Agnieszka fears her trip to Poland is in jeopardy as she believes her documents have also been lost.
