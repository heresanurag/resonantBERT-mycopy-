title: How North Sea tanker collision could impact Norfolk coastline - BBC News
date: '2025-03-11'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/czdngyedm26o
content: |-
  Experts tell the BBC the wind could blow materials from the crash towards Norfolk's protected coastline.

  The oil tanker and cargo vessel were involved in the serious collision in the North Sea close to the East Yorkshire coastline

  Academics have raised fears over the ecological impact the dramatic crash involving an oil tanker and cargo vessel could have on the Norfolk coastline. The two ships – including one carrying jet fuel - went up in flames in the North Sea off the coast of East Yorkshire on Monday. Although the air quality at ground level has been recorded as at normal levels, experts said the event could damage the environment of the protected Norfolk coastline. Environmental biologist Prof Ben Garrod said "we should be doing all we can to ensure this never happens again".

  A director at the Norfolk Wildlife Trust (NWT) said the "pollution incident" could be "potentially devastating" for wildlife and the local nature reserves.

  Prof Ben Garrod, from the University of East Anglia's school of biological sciences, said there could have "far-reaching impacts"

  Prof Garrod, from the University of East Anglia's School of Biological Sciences, said the coast's shallow bay, The Wash, could be particularly impacted. "The Wash is recognised for its local, national and international ecological importance for flora and fauna alike," he said. "Some migrate there, others breed there, and for many species of plants, fungi, and animals, it's home. "The possible addition of tonnes of highly soluble toxic material which shuts down the respiration system into such a fragile and important habitat will likely have far-reaching impacts on our local wildlife, especially fish, birds and mammals. "We should be doing all we can to monitor the impact that the release of tonnes of ecologically damaging chemicals has on our fragile marine environment."

  This video can not be played To play this video you need to enable JavaScript in your browser. RSPB Snettisham, which is at The Wash in Norfolk, is often home to tens of thousands of knot birds

  The collision occurred at about 10:00 GMT, sparking fires and a mass evacuation, with one crew member saying the incident "came from out of the blue". Thirty-six people were rescued from the collision and one crew member remained unaccounted for. The Stena Immaculate ship, the US-flagged oil and chemical tanker, was carrying jet fuel on behalf of the US military. The Solong meanwhile, a Portuguese-flagged container vessel, denied that it was transporting 15 containers of sodium cyanide. "There are four empty containers that have previously contained the hazardous chemical and these containers will continue to be monitored," said Ernst Russ, the ship's owner.

  Gnasher, a four month-old grey seal pup, was released back into the wild at Hunstanton beach in 2019

  Dr Paul Johnston, senior scientist at Greenpeace Research Laboratories at the University of Exeter, said he was "very concerned". "The wind is blowing from the north and will drive any material that is released towards the north Norfolk coast," he told the BBC Radio 4 Today programme. "There are bird colonies, there will be seals hauled out, dolphins and porpoises passing through the area and animals, together with fish and marine vertebrate. "[They will] all be very vulnerable to toxic events, from both oils and chemicals."

  Videos from the scene showed large clouds of smoke billowing out from the tanker, and the firm which managed the Stena Immaculate reported "multiple explosions". "The jet fuel will continue burning [but] the heavy fuel oil is more of a problem if it comes ashore - it will fell beaches and be very difficult to clean up," added Dr Johnston. "Any containers that go over the side are likely to be a navigational hazard in so far as any ship that strikes them could become disabled or even sink." When asked if he thought this could result in the largest environmental disaster for a generation, he said it was a "very difficult thing to predict". "And that's why so much effort is being put into salvage efforts in order to minimise the amount of material entering the sea. "An ounce of prevention is worth many tonnes of cure but what we can learn from previous events in terms of clean-up is that it is very, very difficult."

  Prof Alastair Grant, from the University of East Anglia's school of environmental sciences, said "a detailed evaluation" of the environmental risks posed by the jet fuel would need to be conducted. "It contains up to 25% aromatic hydrocarbons, which are relatively toxic and slow to break down in the environment," he said. "This makes it approximately 50 times more toxic to aquatic life than diesel oil, which in turn is more toxic than crude oil."

  Kevin Hart, director of nature conservation at NWT, said The Wash and the north Norfolk coast - including NWT Holmes Dunes nature reserve - could be "at risk" depending on the wind direction and contaminants. "Hydrocarbon pollution reaching Norfolk's shores could have significant damaging impacts on our wildlife and habitats," he said. "The Wash is the UK's most important estuary for wild birds, home to the largest common seal colony in England, and the intertidal sandbanks support important local fisheries. "If harmful pollutants end up here the whole interlinked eco-system would be at risk."

  The sea crash involved a Portuguese-flagged container vessel and a US-flagged oil and chemical tanker

  While the incident happened in UK waters, the responsibility for the investigation will fall to the United States and Portugal. The Marine Accident Investigation Branch, however, is already gathering evidence and undertaking a preliminary assessment of the accident. The Maritime and Coastguard Agency (MCA) is also "rapidly assessing" the potential environment impact of the collision. When it is considered safe to do so, the BBC understands the MCA will deploy equipment to contain and disperse the oil spills. The government agency is also working with the owners of the ships and the Department for Transport to understand potential risks to public health. According to the UK Health Security Agency (UKHSA), any public health risk on shore is deemed to be very low.

  Labour MP Heidi Alexander, the transport secretary, said she was grateful to HM Coastguard, the RNLI and emergency services for their response. "They were on the scene swiftly, have helped rescue those in immediate danger and I know they will continue to work tirelessly over the coming days. "My thoughts are with all those involved, especially the family of the missing crew member. "I am working closely with the MCA as they conduct an assessment of any counter pollution response which may be required over the coming days."

