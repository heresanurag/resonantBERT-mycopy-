title: The Jam drummer Rick Buckler dies aged 69 - BBC News
date: '2025-02-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/c99n0p2x94vo
content: |-
  Tributes pour in, with bandmate Bruce Foxton remembering him as a "good guy and a great drummer".

  Buckler performing live at the Palladium in New York City in February 1980

  Rick Buckler, former drummer in The Jam, has died at the age of 69, his ex-bandmates have confirmed on social media. The Jam rose to fame in the punk and new wave era of the late 1970s and are credited with inspiring a revival in mod fashion and music. The band were led by singer and guitarist Paul Weller, who posted on X that he was "shocked and saddened" by Buckler's death. Bass player Bruce Foxton said he was "devastated".

  In a statement, his family described him as a "loving husband, father and grandfather" who was "devoted to many" and will be "greatly missed". The statement added that he had "passed away peacefully on Monday evening in Woking after a short illness with family by his side". The Jam had 18 consecutive UK top 40 singles from their debut hit in 1977 to their break-up in December 1982. Their four number one hits included Going Underground and A Town Called Malice.

  Buckler and Foxton later played together in a successor band, From the Jam, while Weller continued his career with the Style Council and as a solo artist. Buckler had recently been forced to cancel a spoken-word tour of UK venues because of health problems. "I'm shocked and saddened by Rick's passing," Weller said on X. "I'm thinking back to us all rehearsing in my bedroom in Stanley Road, Woking. To all the pubs and clubs we played at as kids, to eventually making a record. What a journey!" Foxton said: "I was shocked and devastated to hear the very sad news today. Rick was a good guy and a great drummer whose innovative drum patterns helped shape our songs. "I'm glad we had the chance to work together as much as we did. My thoughts are with Leslie and his family at this very difficult time."

  Rick Buckler is pictured on drums with The Jam bandmates Paul Weller (left) and Bruce Foxton (centre) performing in 1977 on the BBC's Top of the Pops show

  The lead singer of ska group The Bodysnatchers, which gained popularity around the same time as The Jam, also paid tribute. "A band is only as good as its drummer," said Rhoda Dakar. "So I would say he was a bloody good one. "My sincere condolences to his family and friends. Don't waste a day people - tomorrow isn't promised." The cause of Buckler's death has not yet been confirmed.
