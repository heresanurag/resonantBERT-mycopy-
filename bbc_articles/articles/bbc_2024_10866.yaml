content: |-
  Ipswich Town celebrate a return to the top flight with a bus parade from Portman Road.

  BBC Suffolk's Brenner Woolley has been on the players' bus throughout the procession. Here are a few more of his photos:

  Harry Clarke looking slightly more lively than Marcus Harness Image caption: Harry Clarke looking slightly more lively than Marcus Harness

  Janoi Donacien, an international with St Lucia, joined Town permanently in 2019 after a loan spell from Accrington Stanley Image caption: Janoi Donacien, an international with St Lucia, joined Town permanently in 2019 after a loan spell from Accrington Stanley

  Welsh international Nathan Broadhead fails to pass incognito as the bus passes St Margaret's Church Image caption: Welsh international Nathan Broadhead fails to pass incognito as the bus passes St Margaret's Church

  Kayden Jackson gives it the thumbs-up Image caption: Kayden Jackson gives it the thumbs-up

  Boxer Fabio Wardley joined in the celebrations as they turn into Soane Street Image caption: Boxer Fabio Wardley joined in the celebrations as they turn into Soane Street

  Ipswich players share the moment with their fans outside the New Wolsey Theatre Image caption: Ipswich players share the moment with their fans outside the New Wolsey Theatre

  We await the police/council estimates for the size of the crowd that has lined the streets and thronged Christchurch Park Image caption: We await the police/council estimates for the size of the crowd that has lined the streets and thronged Christchurch Park
