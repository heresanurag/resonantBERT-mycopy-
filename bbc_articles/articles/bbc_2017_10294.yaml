title: Boy, 15, missing in London is found - BBC News
date: '2017-10-22'
section: England
url: http://www.bbc.co.uk/news/uk-england-41717365
content: |-
  The teenager went missing in Covent Garden while on a family trip to London.

  A 15-year-old boy who had been missing in London has been found.

  Benjamin Moorcroft, from Shrewsbury, had been separated from his family while they were on a trip to the capital on Saturday evening in Covent Garden.

  He was found shortly before 07:30 BST on Monday in the Waterloo area.

  In a statement, the Metropolitan Police thanked a member of the public who spoke to the teenager and called police.

