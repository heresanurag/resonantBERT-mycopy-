id: bbc_2024_4631
title: Some Gaza cancer patients denied exit through Rafah - BBC News
date: '2024-03-16'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68569692
content: |-
  Despite their names appearing on authorised evacuation lists, cancer patients in Gaza are struggling to evacuate.

  Leukaemia patient Siham Arook has tried three times to cross the border to get treatment in Turkey, as she has entirely run out of her medication. At one point, she was told the envoy hadn't arrived.

  But the BBC has found this wasn't the case as another cancer patient, Mona Al Shorafi, was allowed to travel to Turkey the same day.

  The two told the BBC their stories.
