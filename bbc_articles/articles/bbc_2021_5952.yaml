title: '2021 elections: What are the results in my area? - BBC News'
date: '2021-05-08'
section: UK Politics
url: http://www.bbc.co.uk/news/56129210
content: |-
  National elections in Scotland and Wales and local elections in England took place on 6 May 2021.

  The last few results are still coming in after a bumper set of local and national elections.

  With ballots being counted over several days final results for some areas will be spread out over the weekend and into Monday.

  Search below to find the result in your area.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. More information about these elections Who won in my area? Enter your postcode, or the name of your English council or Scottish or Welsh constituency to find out. Eg 'W1A 1AA' or 'Westminster' A really simple guide to the 2021 elections

  The Scottish and Welsh national parliaments and the London mayor and assembly have declared all their results.

  There have also been council elections across England and Police and Crime Commissioner votes in England and Wales, and some areas may have had parish or town council elections, referendums on local issues and council by-elections.

  Some parts of England had four votes or more, as elections postponed from last summer were carried over to this year.
