content: |-
  Farmers of all ages and hair types are getting on board with the mullet craze.

  The mullet craze has taken over this year's Royal Welsh Show, with the hairstyle being spotted all over the Llanelwedd site, near Builth Wells in Powys.

  Farmers of all ages have got on board, from five-year-old Griff, to "mullet mama" Sarah Gibbons, a sheep farmer from Hay-on-Wye.

  "I don't think I'm ever going to go back to be honest," said 17-year-old Hayden Clarkson.
