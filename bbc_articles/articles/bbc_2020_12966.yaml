title: Oscar Saxelby-Lee turns on Worcester Christmas lights - BBC News
date: '2020-11-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-hereford-worcester-55071615
content: |-
  People in the city helped to raise £750,000 for the six-year-old to undergo cancer treatment abroad.

  A six-year-old boy who had an aggressive form of leukaemia has switched on the Christmas lights in Worcester, the city where people raised thousands of pounds to help save him.

  Oscar Saxelby-Lee, who lives with his family in Worcester, flew with his parents to Singapore for CAR-T therapy, after more than £700,000 was raised through crowdfunding.

  Olivia Saxelby, Oscar's mother, previously said that the therapy was not available to Oscar on the NHS. Any money left over from his treatment will go to the Grace Kelly Childhood Cancer Trust.

  Mrs Saxelby said turning on the lights was a lovely way to end the year.
