title: 'Newspaper headlines: ''Don''t let Putin win'' and ''King''s trip to charm
  Trump'' - BBC News'
date: '2025-02-14'
section: The Papers
url: http://www.bbc.co.uk/news/articles/ckgx7jjdkplo
content: |-
  The papers are still mostly leading with Trump and Putin's pledge to begin negotiations to end the Ukraine war.

  'Don't let Putin win' and 'King's trip to charm Trump'

  The i, external says there's panic and disbelief in Europe after Donald Trump signalled a reset in America's relationship with Nato. Intelligence sources tell the paper that when the US President agreed to negotiate Ukraine's future with Vladimir Putin, he granted the Russian leader the "upper hand". The Daily Express, external says President Zelensky has "begged the world" not to sell out Ukraine to the Russians. The front page of the Guardian highlights comments by US Defence Secretary Pete Hegseth that "everything is on the table", external in negotiations over Ukraine's future. The Sun's main editorial warns that Russia may now be preparing for war with Nato and, the paper says, we need to "rearm and recruit"., external Government sources have told the Times they believe America could provide air cover for European forces, external if they end up monitoring any peace deal in Ukraine. The paper says the support - possibly in the form of air defence missiles - would come in return for rare earth minerals from Kyiv. The Times believes a split has emerged among Ukraine's allies over Trump's peace talks with Putin. It says the Defence Secretary John Healey was more measured that his European counterparts when he said on Thursday, "we mustn't get ahead of ourselves". French President Emmanuel Macron has given an interview to the Financial Times, in which he describes Donald Trump's return to the White House as an "electro-shock"., external He tells the paper that European countries need to "muscle up" on defence and the economy in light of a generational shift in US foreign policy, towards Asia. On Ukraine, he warns that "peace as a capitulation" would be "bad news for everyone", including the United States. The Daily Mail leads on Rachel Reeves' CV, saying the Chancellor is under pressure to "come clean", external about her past employment. The paper says she's "come out fighting" after BBC News revealed that a probe was launched into her expenses before she left her job at Halifax Bank of Scotland. A spokesperson for Reeves tells the Mail she's not aware of any investigation and all claims for expenses were submitted and signed off in the proper way. The front page of the Daily Star, external mocks up an image of Rachel Reeves as Pinocchio - complete with a satirical resumé - in which she claims to have invented the World Wide Web, and walked on the moon. Military chiefs are said by the Daily Telegraph to have warned Prime Minister Sir Keir Starmer that plans to increase defence spending to 2.5% of GDP "won't touch the sides", external. Sources tell the paper that the government's refusal to commit to a higher figure has led to fears among military chiefs that the armed forces won't be able to meet current targets. A Ministry of Defence spokesperson explains that the strategic defence review, currently underway, will look hard at the threats facing the UK, and capabilities we need. The Daily Mirror reports that the King is to tour Canada and United States, external, in a bid to boost transatlantic ties. A source tells the paper that Americans love the Royal family and it's a great opportunity to reaffirm the special relationship. There is no comment from Buckingham Palace but the Mirror says the visit will take place next year, most likely in the spring, coinciding with the 250th anniversary of American independence from Britain.

