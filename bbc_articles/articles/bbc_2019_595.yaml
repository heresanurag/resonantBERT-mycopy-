  • None Liverpool have been eliminated from the FA Cup in six of their past eight ties against fellow Premier League opponents.
  • None Wolves have eliminated Liverpool from the FA Cup five times - Stoke are the only side they have knocked out of the competition more (six).
  • None Jimenez's goal was Wolves' first at home against Liverpool in 398 minutes, since Kenny Miller scored a 90th-minute goal against them in January 2004.
  • None Eight of Neves' nine goals for Wolves in all competitions have been from outside the box, with his other strike coming from the penalty spot.
  • None Origi scored his second goal in the FA Cup, with the other also coming against Wolves back in January 2017.
  • None At 16 years and 354 days, Hoever became Liverpool's youngest ever player in the FA Cup, and third youngest to debut for the Reds overall.
  • None Shaqiri has ended on the losing side in all four of his appearances in the FA Cup (three times with Stoke).

  Liverpool are away at Brighton on Saturday (15:00 GMT) and Wolves are at Manchester City next Monday (20:00 GMT).
