  As a fixture, Ireland against England is usually the good thing that comes to those who wait. But not this year. Only twice have Ireland and England locked horns on the opening weekend in the Six Nations era, with England winning both times, in 2000 and 2019. It is often kept for the tournament's pressure-packed latter stages, so when organisers released the 2025 schedule in the hours leading up to last year's match at Twickenham, eyes were immediately drawn to 1 February: Ireland v England. Now, with 10 months having flown by, the rugby world braces itself for the latest chapter in a rivalry that began 150 years ago. When they met last March, the stakes were sky-high. With seconds left, Marcus Smith's drop-goal sent Twickenham crazy. Ireland's hopes of back-to-back Grand Slams were crushed and suddenly all was fine in England's world. This weekend, it's all about setting tones, settling scores, laying down markers and capturing that early jolt of momentum that can shape a championship.

  To England first. The pressure on head coach Steve Borthwick is intense. That Twickenham win promised a new dawn. What followed, however, was a defeat in France and summer and autumn campaigns filled with agony. New Zealand on three occasions, Australia, South Africa. Southern hemisphere scalps kept slipping through England's grasp. Those results were, of course, bookended by a couple of thumping wins over Japan, but there is no escaping the sense that English rugby needs a lift, the ongoing tumult in its corridors of power having served only to darken the mood lately. Speaking of lifts, the aerial battle has been a point of discussion since the teams were announced. Borthwick has created history by starting Curry twins Ben and Tom either side of Ben Earl, who was outstanding against Ireland last year. And while that trio offers speed, mobility and breakdown menace, the selection may give Ireland - for whom the 6ft 6in Ryan Baird is a surprise inclusion - the edge at the line-out. Maro Itoje, England's new captain, was quick to assuage such fears this week. "We have enough line-out jumpers. The line-out is a massive part of the game and we have a well-oiled machine," said the lock, who has replaced Saracens team-mate Jamie George as England's skipper. "If you were to look at our statistics over the last autumn, it's an area that we're pretty strong at in terms of ball winning."

  Returning scrum-half Alex Mitchell was key to England's win over Ireland last year

  Last year, England attacked Ireland from the outset and stopped the green machine clicking into gear. Key to that was Alex Mitchell, who is reinstalled at scrum-half after missing the autumn matches through injury. Mitchell will start alongside Marcus Smith instead of Northampton team-mate Fin Smith. In addition to delivering the killer blow against Ireland last year, Marcus Smith stood out during a difficult autumn campaign. The rekindling of that half-back partnership could breathe new life into an England attack that features wing Cadan Murley, who makes his debut. Next week, England host France. Suffice to say, these first two weekends could decide not only England's fate this year, but Borthwick's future too.

  Ireland may be chasing an unprecedented third title in a row, but they do not approach this year's tournament without trepidation. With head coach Andy Farrell deep in British and Irish Lions prep, his assistant Simon Easterby has stepped up to lead a team who huffed and puffed their way through November. They were well beaten by the All Blacks - their first home reverse since the 2021 Six Nations - and laboured to wins over Argentina, Fiji and Australia. That series exposed some alarming frailties, with 13 penalties shipped against both New Zealand and Argentina, 23 turnovers conceded against Australia, and 49 handling errors combined in the All Blacks and Wallabies games. And the line-out, like at the World Cup, faltered at key times. Ireland have not shied away from their underwhelming displays in November, and given how the England game ended last year, Easterby's side need not look far for motivation. Like England, Ireland are missing some key operators. Tadhg Furlong is a world-class tight-head prop while Joe McCarthy started every Test in 2024 having enjoyed a breakthrough Six Nations. Both are absent. It is, however, still a formidable pack, with Josh van der Flier and captain Caelan Doris among those to have found form with Leinster prior to entering Ireland camp. No doubt Farrell will be keeping a close eye on Doris and his England counterpart Itoje as the battle to be named Lions captain intensifies.

  Sam Prendergast's goal-kicking will be one of several facets under the microscope when he makes his Six Nations debut on Saturday

  Easterby has been able to field a settled backline, although handing a Six Nations debut to fly-half Sam Prendergast is a big call, leading former England winger Chris Ashton to suggest England will target the 21-year-old's inexperience. As ever, the respective benches could have a big say and Ireland can call upon 509 caps worth of experience. Easterby will emphasise the importance of a fast start against an England side who won three Six Nations games last year despite trailing in all five at half-time. Ireland's back-to-back title wins were built on strong starts. They swatted Wales aside in Cardiff in 2023 and crushed 14-man France in Marseille last year. If they produce another stirring performance on Saturday and claim a 26th win in 30 Six Nations home matches stretching back to 2013, few will doubt their title credentials.

