title: 'Covid: Jeremy Hunt apologises for pandemic ''groupthink'' - BBC News'
date: '2024-07-21'
section: Health
url: http://www.bbc.co.uk/news/articles/c035v67zjqjo
content: |-
  The ex health secretary says the government only prepared for a flu pandemic, which he "should have challenged".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jeremy Hunt has apologised "unreservedly" to the families of people who died due to Covid-19, after an inquiry found there were significant flaws in the government's preparations for a pandemic. The former Conservative chancellor - who was also the UK's longest-serving health secretary - admitted to being part of "groupthink" among officials over pandemic policy. He told the BBC that the government had "over-prepared" for a flu pandemic, but "didn't think of other types of pandemic". On Thursday, an initial report from the Covid inquiry found that "groupthink" - when a group of people reach a consensus without thinking critically about alternatives - led officials to plan for the "wrong" pandemic.

  Baroness Hallett, who chairs the inquiry, said the government's sole pandemic strategy from 2011 "was outdated and lacked adaptability". She wrote that the flaws in preparation meant the emergency of Covid-19 - a coronavirus like Sars or Mers, not an influenza virus - caused a greater number of deaths and more economic damage than it should have. Mr Hunt told Sunday with Laura Kuenssberg that he was one of "many ministers, many officials, many scientists" who had reached the same presumption, adding: "We should have challenged that groupthink." Baroness Hallett's report also criticised the "labyrinthine" government bureaucracy in place for responding to pandemics. She recommended simplifying these official structures, as well as bringing in external experts to challenge civil service thinking and creating an independent statutory body responsible for pandemic preparedness.
