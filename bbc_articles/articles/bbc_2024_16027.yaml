  • None What is the Covid inquiry and what powers does it have? The Covid-19 Bereaved Families for Justice group welcomed the findings of the report, but argued that it did not fully address underlying issues of inequality and public health service capacity which exacerbated the crisis. Mr Hunt, now the shadow chancellor, said: "I apologise unreservedly to the families - that was the most terrible tragedy, what happened to this country during Covid. "And I think, by the way, the report has some very sensible recommendations, including simplifying the structures for preparing for these kinds of emergencies. "I very much hope the government adopts them." After the report was released, Prime Minister Sir Keir Starmer said it showed the country was "under-prepared for Covid-19". He added that his government was committed to "putting better measures in place to protect and prepare us from the impact of any future pandemic".
