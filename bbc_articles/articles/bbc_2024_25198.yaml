title: Watch police block dangerous driver with blown tyres in Cardiff - BBC News
date: '2024-10-16'
section: General
url: http://www.bbc.co.uk/news/videos/c62gel6yw17o
content: |-
  Caleb Ayodele, 27, damaged two police cars and an injured an officer in motorway crash.

  A dangerous driver can be seen racing along in a car with blown tyres as four police cars close in to block him.

  South Wales Police said Caleb Ayodele, 27, from London, damaged two police cars and injured an officer, who later required surgery.

  He then locked himself in the BMW on the A48 Eastern Avenue in Pentwyn, Cardiff, and "laughed" at officers, the force added.

  Police said Ayodele pleaded guilty to dangerous driving, driving without a licence and without insurance and failing to stop for police.

  There is no sound on this video
