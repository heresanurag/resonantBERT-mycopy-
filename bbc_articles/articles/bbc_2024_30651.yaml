content: |-
  Items included the American singer and actor's silver ring, one of his cigars, and a wristwatch.

  Elvis memorabilia sells for more than £14,000

  Elvis Presley had a string of hits over his career which lasted from 1954 until his death in 1977

  A collection of Elvis Presley memorabilia has sold at auction for more than £14,000. All belonging to one man, 99 lots of Elvis memorabilia, many of which were said to be personal, went under the hammer on Wednesday at Prestige Auctions in Grimsby. Items included the American singer and actor's silver ring, a part-smoked cigar, his father's wristwatch, and an elaborate, white jumpsuit, which sold for £400. Other items included a Science Of Religion book, said to be personally owned by Elvis, with his own handwritten notes in the margins, which sold for £2,600.

  The sterling silver ring was owned and worn by Elvis Presley in the mid to late 1960s

  A sterling silver ring owned and worn by Elvis Presley in the mid to late 1960s sold for £1,200, and a part-smoked German-branded cigar which was handed to the collector by Elvis in 1972 before the singer entered the lift at The Oakland Hilton Inn, sold for £170. Prior to the sale, Carl Vince, auctioneer and owner of Prestige Auctions, said the client selling the memorabilia had been collecting it since the 1960s. "The client said he's loved the collection for many years but no members of his family have any interest in it so it's time to go to other collectors who enjoy it," Mr Vince added.

  The 'Villiger Kell' German-branded cigar was handed to the collector by Elvis in 1972 before the singer entered the lift at The Oakland Hilton Inn

  Earlier this year, a pair of blue suede shoes worn by Elvis sold for £120,000. The singer wore the pair on and off stage during the 1950s, including during an appearance on the Steve Allen television show. They were sold by auctioneers Henry Aldridge & Son in Devizes. A lock of hair from the legendary singer was sold for £4,000 in 2020.

