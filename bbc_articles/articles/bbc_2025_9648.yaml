title: Merthyr Tydfil death crash caught on CCTV - BBC News
date: '2025-05-20'
section: General
url: http://www.bbc.co.uk/news/videos/ckg779lz1yxo
content: |-
  Dale Grove is given a suspended sentence for killing another man in the crash.

  A man has been given a suspended prison sentence after killing someone in a crash.

  CCTV captured the moment a black car turns off from Fochriw Road, Pant Y Waun, near Merthyr Tydfil, just as a white car approaches from behind and ploughs into the side of the vehicle.

  Gareth Davies died after the crash and Dale Grove, 30, of Alfred Street, Penydarren, Merthyr Tydfil, was sentenced to 10 months in prison, suspended for two years, after pleading guilty to causing death by careless driving.

  He was also banned from driving for five years and must carry out 250 hours of unpaid work within 12 months.
