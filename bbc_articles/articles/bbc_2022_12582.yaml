id: bbc_2022_12582
title: 'Ukraine blackouts: Russia accused of attacking infrastructure - BBC News'
date: '2022-09-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-62873488
content: |-
  Ukraine has accused Russia of attacking civilian infrastructure in response to its counter-offensive.

  Ukrainian officials have said Russia is targeting infrastructure to get revenge for their counter-offensive.

  They say targets include a thermal power station and water facilities.

  This has resulted in blackouts which have reportedly affected around nine million people.
