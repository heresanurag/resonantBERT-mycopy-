title: King Charles holds private meeting with John Caldwell - BBC News
date: '2023-05-25'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-65697128
content: |-
  Det Ch Insp John Caldwell has met King Charles during a royal event at Hillsborough Castle.

  John Caldwell was invited to the garden party hosted by the King and Queen at Hillsborough Castle

  Det Ch Insp John Caldwell has attended a garden party in County Down with King Charles and Queen Camilla.

  It is his first public appearance since he was shot in front of his son at a sports complex in Omagh in February.

  It is understood that he had a private meeting with King Charles ahead of the event.

  The Queen spent some time speaking to the police officer during the garden party.

  It is the royal couple's first official visit outside England since the coronation.

  Det Ch Insp Caldwell, 48, was seriously injured in the attack by two gunmen as he coached a youth football team while off-duty.

  Police believe dissident republican group the New IRA may have acted with an organised crime gang to carry out the attack.

  The King and Queen attended a Garden Party at Hillsborough Castle

  The shooting, which happened in front of school children including Det Ch Insp Caldwell's son, was widely condemned by political representatives across Northern Ireland.

  DUP leader Sir Jeffrey Donaldson was also among the guests at the garden party at Hillsborough, the royal residence in Northern Ireland.

  The King and Queen also visited a newly-created Coronation Garden in Newtownabbey, designed by Diarmuid Gavin, during the visit.

