title: 'Swansea: Woman, 18, dies and another hurt in car crash - BBC News'
date: '2022-01-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-60096963
content: |-
  An 18-year-old woman dies and another is taken to hospital following a single-vehicle crash.

  The crash happened on A4067 from Swansea towards Godre'r Graig

  An 18-year-old woman has died and another woman, also aged 18, has been taken to hospital following a single-vehicle crash.

  A white Citroen C1 left the road while travelling along the A4067 from Swansea towards Godre'r Graig in the early hours, according to South Wales Police.

  One woman died at the scene and the other woman was taken to Cardiff's University Hospital of Wales.

  Police are appealing for witnesses and dashcam footage.

  Councillor Alyn Llewelyn said it was inappropriate to comment on safety measures while the accident was still being investigated

  Alyn Llewelyn, councillor for Ystalyfera In the Swansea valley, said: "It is tragic and it's extremely frightening for the community as a whole that a young girl has lost her life in the accident and that another young person has been seriously injured.

  "Everybody's thinking of the families and are very very sad at what's happened overnight."

  He repeated the police's appeal for information regarding the accident and said he would be "in favour of more speed measures along the A467".

  But he added he would not want to speculate on the circumstances surrounding the accident while it was still being investigated.

