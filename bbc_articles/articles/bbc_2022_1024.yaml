title: 'Bronx fire: ''A horrific, painful moment '' says New York City Mayor Eric
  Adams - BBC News'
date: '2022-01-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-59932113
content: |-
  At least 17 people, including eight children, have died after a fire in the Bronx.

  At least 17 people, including eight children, have died after a fire in an apartment building in the Bronx.

  City Mayor Eric Adams called it a "horrific, painful moment" for New York.

  This video was updated on 10 January, to reflect that city officials had revised the number of people killed in the fire downwards, from 19 to 17.
