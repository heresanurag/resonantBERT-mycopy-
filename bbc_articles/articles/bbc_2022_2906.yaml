id: bbc_2022_2906
title: 'Ukraine: Dorries gives emotional tribute to UK journalists - BBC News'
date: '2022-03-03'
section: General
url: http://www.bbc.co.uk/news/uk-politics-60602985
content: |-
  The UK culture secretary gives her "heartfelt thanks and admiration" to members of the press in Ukraine.

  The UK culture secretary has given her "heartfelt thanks and admiration" to all journalists risking their lives to bring "unbiased and accurate news" from Ukraine.

  Nadine Dorries appeared emotional as she spoke about their work.

  She also pledged to use her powers to make sure President Putin would be "fully ostracised" from the international community.
