id: bbc_2020_6017
title: Boris Johnson 'appalled and sickened' by Reading stabbing attacks - BBC News
date: '2020-06-21'
section: General
url: http://www.bbc.co.uk/news/uk-53127373
content: |-
  The UK prime minister says that if there are lessons to learn after the terror attack the government will learn them.

  Boris Johnson has said his thoughts are with the families of the three people killed in a stabbing attack in Reading.

  The prime minister said that if there were lessons to be learnt after the attack the government would not hesitate to take action.
