title: 'Liverpool: CEO Billy Hogan says club are undergoing a ''reset'' after Jurgen
  Klopp departure - BBC Sport'
date: '2024-07-30'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/c10l68z712po
content: |-
  Billy Hogan, Liverpool's CEO, says the club are undergoing a "reset" following Jurgen Klopp's departure.

  Liverpool chief executive Billy Hogan says the club are undergoing a "post-Jurgen Klopp reset" under new head coach Arne Slot and the Reds' revamped football structure. The club have implemented several changes behind the scenes at Anfield since Klopp, who won seven major honours in nine years, announced his departure in January. Slot, 45, has replaced the German but Liverpool's parent company, Fenway Sports Group (FSG), has brought back former executives Michael Edwards and Julian Ward, who left in 2022, to build a new structure overseeing strategy for principle owner John W. Henry and the organisation's president Mike Gordon. Hogan, who leads the business operation on Merseyside, told BBC Sport that Klopp's departure has "provided an opportunity for a reboot or reset and maybe to look at how things operate going forward." Hogan, who is known to have a close personal bond with Klopp, added: "Jurgen departing was a seismic decision but clearly the right decision for him and his family, so by extension the right decision for the club. "He was very clear about leaving the club in a better place than where he found it and I think he has done that. The timing of his announcement gave us an opportunity to go through a proper process."

  Behind the scenes, Liverpool have appointed Richard Hughes from Bournemouth as the sporting director and Pedro Marques from Benfica as the technical director, which Hogan says will bring "new energy and vision." Hughes and Marques will focus solely on transfers and supporting Slot but FSG will continue to explore a multi-club structure after insurmountable issues caused talks with French club Bordeaux to collapse. Hogan said it was "sad" Bordeaux have filed for bankruptcy as alternative options are "something being looked at by Michael Edwards". On financial controls within the Premier League, Hogan said Liverpool remain committed to strong rules. "I think it is important that the rules have teeth and if clubs fall foul of that then the Premier League has a process to go through. We are supportive of those rules and being sustainable," he said. But he backed the different interests within the league to find an alternative solution to Premier League profit and sustainability regulations as rules closer to UEFA's are being discussed. "We are trying to find the best way to operate for all of us going forward," he continued. "We have the most competitive and global league, and it's important we keep it that way." Liverpool are among 10 clubs on tour of the United States, with others travelling to Asia or around Europe, and he addressed the environmental impact of such tours, which were detailed in BBC Sport's recent report. "We have the foundation event here in Philadelphia with a group of people engaging with our supporters and bringing the club out to markets and supporters who may not get the opportunity to come to Anfield or Liverpool. In terms of the overall environmental impact, that's something we take very seriously." Liverpool next face Arsenal in Philadelphia before taking on Manchester United in South Carolina to end their US tour.
