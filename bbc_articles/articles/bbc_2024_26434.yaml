content: |-
  The BBC's analysis editor examines what happened in 2020 and how the Republican might react if he were to lose again.

  The polls in the US election are incredibly tight, but if Donald Trump loses there are concerns that he will refuse to accept the results, as he did in 2020. The BBC's analysis editor Ros Atkins looks at why these concerns have emerged and what might happen this time.
