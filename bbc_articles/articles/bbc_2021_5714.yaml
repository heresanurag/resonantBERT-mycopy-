title: 'Covid: Wales lockdown rules being eased - BBC News'
date: '2021-05-14'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-57100651
content: |-
  Details and reaction as First Minister Mark Drakeford announces changes to the regulations.

  First Minister Mark Drakeford confirmed that international travel for any reason would resume in Wales on Monday, the same as England and Scotland, although he would prefer people to stay within Wales.

  He said there will be a traffic-light system introduced for international travel as in other parts of the UK.

  "This lets people know what the quarantine and testing requirements are when they come home," Mr Drakeford said.

  "We want to do everything we can to prevent coronavirus re-entering Wales as a result of international travel."

  He added that everyone returning from a green-list country will have to book and pay for a test on their return, and travellers and their households are reminded to use lateral flow tests.

  Mr Drakeford said there will be "no English-style test-to-release scheme for Welsh travellers returning from amber list countries... because around a third of people who have developed coronavirus linked to travel have done so five days after arriving in Wales".

  Urging people to consider whether to travel or not, he said: "I know many people have been looking forward to a holiday abroad, but travel will be very different to what it was before the pandemic.

  "I believe this is the year to holiday at home and enjoy everything that our wonderful Wales has to offer."
