  Her first foray into fiction, when she was in her mid-40s, brought huge success and broke the mould. "When I wrote A Woman of Substance I didn't sit down and think, I'm going to write about a woman warrior who conquers the world and smashes the glass ceiling, but I did want to write about women in a positive way," she told the Guardian in 2017, external. "At the time there were a lot of very sexy books out there but the women didn't come out of them very well." Her other novels included the Ravenscar trilogy, about a 20th Century dynasty that finished with 25-year-old Elizabeth, loosely based on Elizabeth I, at the head of a business empire. The four-book Cavendon series follows two families - one aristocratic, the other their servants - from the 1920s to the 40s.

  Standalone novels included A Sudden Change of Heart, The Women in His Life and A Secret Affair. Her most recent novel, The Wonder of it All, was published last year. "I think people understand now, I write about women warriors - women who go out and conquer the world, who are not going to be dependent on anybody," the author told BBC Radio 3's Private Passions in 2022. "They're going to have a career, and they're going to be successful, and they're driven and ambitious and disciplined and determined. "And I guess I keep borrowing from myself because that's the way I'm made."

  Barbara Taylor Bradford was married to Robert Bradford for more than 50 years

  A number of her books were turned into TV or film versions. A Woman of Substance starred Liam Neeson opposite Seagrove, while Elizabeth Hurley appeared in 1989's Act of Will, and Anthony Hopkins was in 1991's To Be The Best. The screen versions were made by the author's husband, Hollywood producer Robert Bradford. They married on Christmas Eve in 1963, after which she moved to the US. He died in 2019. Taylor Bradford's spokeswoman said she would be buried alongside her late husband in New York. Taylor Bradford was made an OBE for services to literature by Queen Elizabeth in 2007, and was also an ambassador for the National Literacy Trust. In its tribute, the charity hailed her as "a passionate advocate for improving literacy skills throughout her life", and said she "helped change lives in some of the UK's most disadvantaged communities".
