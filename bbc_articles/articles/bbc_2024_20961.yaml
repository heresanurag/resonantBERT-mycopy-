title: Take action now over riot posts, social media firms told - BBC News
date: '2024-08-07'
section: Technology
url: http://www.bbc.co.uk/news/articles/c2076n7w4qlo
content: |-
  The government and the media regulator have faced criticism for not intervening sooner.

  Take action now over riot posts, social media firms told

  Protestors clashed with police as violent disorder occurred in England and Northern Ireland

  The role that social media is playing in the disorder being seen in England and Northern Ireland is coming under increasing scrutiny, The government said on Wednesday social media platforms "clearly need to do far more" after it emerged a list purporting to contain the names and addresses of immigration lawyers was being spread online. The Law Society of England and Wales said it was treating the list as a "very credible threat" to its members. Telegram, where the list appears to have originated, told the BBC its moderators were "actively monitoring the situation and are removing channels and posts containing calls to violence". It said such "calls to violence" were explicitly forbidden in its terms of service. Earlier this week, the prime minister became embroiled in an online spat with Elon Musk, after the tech billionaire responded to the disorder by writing on X that "civil war" in the UK was "inevitable." In its open letter, external, Ofcom acknowledged there was an "increased risk" of the sites being used to "stir up hatred" and "provoke violence". It added that under existing regulations, video-sharing platforms such as TikTok and Snap "must protect their users from videos likely to incite violence or hatred". But many platforms which allow people to upload video - such as YouTube and Elon Musk's X - do not need to follow these rules, external. Prof Lorna Woods, of the University of Essex, who helped shape the Online Safety Act, said Ofcom was "in a difficult place", because of the need to wait for its enhanced powers. She also pointed out even the new legislation had its limitations. "If the Act were fully in force, it wouldn't catch all the content," she told the BBC. "So while organising a riot would be caught, some of the dog whistling tactics and disinformation would not be. "This was a concern from the last Government not to regulate non-criminal speech where adults were concerned."
