title: 'Swanage care home deaths: Woman released without charge - BBC News'
date: '2024-11-14'
section: Dorset
url: http://www.bbc.co.uk/news/articles/ckglnvweqyvo
content: |-
  Three elderly care home residents were found dead in Swanage, Dorset, on 23 October.

  Police were called to the care home early on 23 October

  A woman who was arrested on suspicion of manslaughter following the deaths of three care home residents has been released without charge. The 60-year-old was questioned by detectives after two men - aged 74 and 91- and an 86-year-old woman were found dead at Gainsborough Care Home in Swanage on 23 October. Dorset Police, who previously said carbon monoxide poisoning was a possible cause, said the deaths were still being treated as "unexplained". Detectives said it could take months to establish how the residents died, while they awaited the results of "detailed forensic submissions and analysis".

  The home was evacuated while emergency services carried out safety checks

  Det Ch Insp Neil Third said: “Over recent weeks we have been continuing to gather as much information as we can, working with HM Coroner, to establish a cause of death. “To enable us to take a full account and recover any available evidence, while providing legal protection to the person, we made an arrest as part of our inquiries. "The arrest was also made to establish where there were any actions or omissions by that individual that were believed to be grossly negligent and we have now reached a position where we do not believe that to be the case." Emergency services were first called to the home on Ulwell Road at 05:20 BST. About 40 residents have been moved to temporary accommodation in Dorset, Hampshire and West Sussex. The home remains empty. A spokesperson for Gainsborough Care Home previously said they were "deeply saddened" and were "fully co-operating" with lead agencies.

