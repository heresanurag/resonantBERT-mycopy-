  Bringing you the latest news from across England about the coronavirus pandemic.

  'I really don't get why we can't open'

  While pubs and hairdressers in England have been given the all clear by government to reopen on 4 July, many businesses have been told to remain doors closed for now. Beautician Tara Williamson is frustrated by what she sees as a double standard from government, with hairdressers allowed to reopen but beauty salons staying closed. She runs The Beauty, Skin and Eyelash Lounge in Epping and had planned to open on 4 July. "I don't really get it. I don't see a reason why we couldn't open and it will obviously be a big blow," she says. "We've put screens in place, we've done a one-way system in the salon, we've prepared everything for the two metre distancing, we've staggered appointments, we've got sanitising stations," she says. "It just seems crazy that we have no guidelines of when we can open and what is going to be happening."
