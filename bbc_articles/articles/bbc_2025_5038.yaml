content: |-
  Economists say the president's import taxes could result in higher prices for a range of products in the US.

  Six things that could get more expensive for Americans under Trump tariffs

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: What is a tariff? The BBC's Adam Fleming explains

  US President Donald Trump has imposed a range of tariffs - or import taxes - on billions of dollars worth of goods coming into the US from some of its top trading partners. The tariffs apply to steel and aluminium imported to the US, as well as to some other products from Mexico, Canada and China - prompting announcements of counter-measures from the latter two countries and the European Union. Trump has also announced tariffs on cars coming into the US which are due to come into effect on 3 April. Tariffs on certain car parts are set to start in May or later. Economists have warned these tariffs - and those introduced in response by other countries - could put prices up for American consumers. That's because the tax is paid by the domestic company importing the goods, which may choose to pass the cost on to customers, or to reduce imports, meaning fewer products are available. So which things could become more expensive?

  The US imported about eight million cars last year - accounting for about $240bn (£186bn) in trade. Many US car companies also have operations in Mexico and Canada, set up under the terms of the longstanding free trade agreement between them. Component parts typically cross the US, Mexican and Canadian borders multiple times before a vehicle is completely assembled. The new tariffs on car parts from Canada and Mexico are exempt for now while US customs and border patrol set up a system to assess the duties. Anderson Economic Group has estimated that tariffs on parts just from Canada and Mexico could lead to costs rising by roughly $4,000-$10,000 depending on the vehicle.

  The cost of the higher taxes is likely to be passed on to customers. Andrew Foran from TD Economics has said that disrupting trade flows through tariffs "would come with significant costs". He argues that the "uninterrupted free trade" which has "existed for decades" in the car-making sector has lowered prices for consumers.

  Popular Mexican beers Modelo and Corona could get more expensive for US customers if the American companies importing them pass on the increased import taxes. However, it's also possible that firms could decide to bring in less foreign beer. Modelo became the number one beer brand in the US in 2023, and remains in the top spot, for now. The picture is more complicated when it comes to spirits, which have been largely free of tariffs since the 1990s. Industry bodies from the US, Canada and Mexico issued a joint statement in advance of the tariffs being announced saying they were "deeply concerned". They argue that certain brands, such as Bourbon, Tennessee whiskey, tequila and Canadian whisky are "recognized as distinctive products and can only be produced in their designated countries". So given the production of these drinks cannot simply be moved, supplies might be impacted, leading to price rises. The bodies also highlighted that many companies own different spirit brands in the US, Canada and Mexico.

  The US imports about a third of its softwood lumber from Canada each year, and that key building material could be hit by Trump's tariffs. Trump has said the US has "more lumber than we ever use". However, the National Association of Home Builders urged the president to exempt building materials "because of their harmful effect on housing affordability". The industry group has "serious concerns" that the tariffs on lumber could increase the cost of building homes - which are mostly made out of wood in the US - and also put off developers building new homes. "Consumers end up paying for the tariffs in the form of higher home prices," the NAHB said. Imports from the rest of the world could also be affected. On 1 March, Trump ordered an investigation into whether the US should place additional tariffs on most lumber and timber imports, regardless of their country of origin, or create incentives to boost domestic production. Findings are due towards the end of 2025.

  The "most obvious" household impact of a trade war with Canada would be on the price of Canadian maple syrup, according to Thomas Sampson from the London School of Economics. Canada's billion-dollar industry accounts for 75% of the world's entire maple syrup production. The majority of the sweet staple - around 90% - is produced in the province of Quebec, where the world's sole strategic reserve of maple syrup was set up 24 years ago. "That maple syrup is going to become more expensive. And that's a direct price increase that households will face," Mr Sampson said. "If I buy goods that are domestically produced in the US, but [which use] inputs from Canada, the price of those goods is also going to go up," he added.

  According to the most recent official trade figures, 61% of oil imported into the US between January and November 2024 came from Canada. While the US has introduced a 25% tariff on most goods imported from Canada, Canadian energy faces a lower rate of 10%. The US doesn't have a shortage of oil, but its refineries are designed to process so-called "heavier" - or thicker - crude oil, which mostly comes from Canada, with some from Mexico. "Many refineries need heavier crude oil to maximize flexibility of gasoline, diesel and jet fuel production," according to the American Fuel and Petrochemical Manufacturers. That means if Canada decided to reduce crude oil exports in retaliation against US tariffs, it could push up fuel prices.

  Avocados thrive in in the Mexican climate. Nearly 90% of the avocados consumed in the US come from Mexico, external. The US Agriculture Department has warned that tariffs on Mexican fruit and vegetables could increase the cost of avocados. Related dishes like guacamole could also become more expensive.
