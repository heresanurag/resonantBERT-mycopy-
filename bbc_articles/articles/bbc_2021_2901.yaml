id: bbc_2021_2901
title: 'Sarah Everard: Police remove people at Clapham vigil - BBC News'
date: '2021-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-56388455
content: |-
  Hundreds of people had gathered on Clapham Common in south London to remember Sarah Everard, whose body was found in woodland in Kent earlier this week.

  Officers branded the gathering as "unsafe", and urged people to go home. A number of people were removed.
