  The family of Dame Deborah James pay tribute to her after a fund started by her reaches £11.3m.

  The family of Dame Deborah James, who died last year, have paid tribute to her after a fund she started reached £11.3m.

  In an emotional BBC interview, all of the family spoke about how Dame Deborah "embodied rebellious hope".
