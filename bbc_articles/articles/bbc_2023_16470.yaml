title: What happens in Gaza when the war ends? We answer your questions on the Israel-Gaza
  war - BBC News
date: '2023-10-16'
section: Middle East
url: http://www.bbc.co.uk/news/live/world-middle-east-67124253
content: |-
  What happens next in Gaza? What is Israel's aim? Jeremy Bowen, Lyse Doucet and others answer now.

  Smoke rises from the town of Beit Lahia after Israeli airstrikes in northern Gaza on Monday Image caption: Smoke rises from the town of Beit Lahia after Israeli airstrikes in northern Gaza on Monday

  In this war, all of our local team are doing that, in extreme ways.

  Some have had those they know or love caught up in the atrocities committed by Hamas in Israel. While under siege and intense bombardment in Gaza, my colleagues are struggling to find water and food for their families.

  Today in the Jerusalem office we ran back to the air raid shelter as rockets flew overhead.

  It appears we are at a key moment in this war, as Israel prepares for a huge ground offensive to eradicate Hamas that looks set to be complicated and dangerous.

  Meanwhile, the clock is ticking to see if a deal can be done to allow aid into Gaza and prevent a bigger humanitarian catastrophe.

  What happens in the coming days could reshape the decades-old Israeli-Palestinian conflict and the lives of those of us based here.
