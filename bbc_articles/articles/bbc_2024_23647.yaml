  He was there to promote new film, Wolfs, which he stars in with Brad Pitt, who arrived with girlfriend Ines de Ramon.

  George Clooney sprang into action to help a fallen photographer at the Venice Film Festival in Italy.

  He was there to promote new film, Wolfs, which he stars in with Brad Pitt.

  The actors are attending the festival with their other halves, Amal Clooney and Ines de Ramon.
