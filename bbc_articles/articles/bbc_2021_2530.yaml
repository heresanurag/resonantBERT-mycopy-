title: 'Covid-19: Welsh Government update 12 February 2021 - BBC News'
date: '2021-02-12'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-56030464
content: |-
  Details and reaction to a briefing by the first minister with Covid vaccination lead Dr Sally Lewis.

  Wales' first minister has said if current progress against coronavirus continues to be maintained, the authorities could "slowly and cautiously" lift restrictions in the run-up to spring and Easter "in all aspects of our lives".

  Mark Drakeford said this included tourism, but depended on Wales continuing to see reductions in infection levels, as well as "the impact on our health service being drained away" and "our vaccination programme delivering what we hope it will do in terms of the protection it will offer to people".

  He said: "If that is the path we are on, then the pattern in Wales, as we move towards the spring and Easter, will be one in which we will be able to slowly and cautiously lift the restrictions that are currently in place in all aspects of our lives.

  "That will include the tourism industry and it'll include those aspects of family life which are denied to us all at the moment, but that is a path that depends upon continuing success.

  "And we've learned so often, haven't we, over the last 12 months coronavirus continues to have very unpleasant surprises up its sleeve."
