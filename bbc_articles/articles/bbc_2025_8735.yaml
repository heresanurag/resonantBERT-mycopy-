content: |-
  The Philippines' mid-term elections saw fewer than expected senators elected from President Marcos' camp.

  Marcos' hold on senate grows shaky while Duterte wins mayor race from jail

  To play this video you need to enable JavaScript in your browser. This video can not be played Power, survival and revenge: What’s at stake in the Philippines election?

  Dominated by a fiery feud between two political dynasties, the Philippine mid-term elections have thrown up unexpected results that may shake President Ferdinand "Bongbong" Marcos Jr's hold on the senate. According to the latest count of 80% of the votes, Marcos allies appear to have captured fewer senate seats than expected. Meanwhile his rival, former Philippine President Rodrigo Duterte who is detained in The Hague over his drug war that killed thousands, has been elected mayor of his family's stronghold. The fate of his daughter Vice President Sara Duterte, who is facing an impeachment trial, remains in the balance.

  The mid-terms held on Monday saw 18,000 seats contested, from local officials to governors and senators. It served as a proxy war between Marcos Jr and Sara Duterte, who were one-time allies. The senate race, where 12 seats were up for grabs, was closely watched as it affects Sara Duterte's trial, which she has called "political persecution". The popular vice-president, who is widely expected to run for president in 2028, is facing the prospect of a ban from politics, should a jury made up of senators vote to impeach her. Many people had expected Marcos Jr's picks to win most of the 12 seats. But according to the latest count of 80% of the votes, only six from his camp appear to have won seats, and one of them has also been endorsed by the Dutertes. In the top five ranking - a barometer of public popularity - only one Marcos-backed candidate, broadcaster Erwin Tulfo, made it. Meanwhile, at the very top of the list is a Duterte loyalist - long-time aide Christopher "Bong" Go - while at number three is another Duterte ally, former police chief Ronald "Bato" dela Rosa. The Duterte camp appears to have won at least four seats. They include Marcos Jr's older sister Imee, who recently bolted from her brother's alliance to side with the Dutertes. What complicates things is that it is still unclear how Marcos' allies in the senate will move on Sara Duterte's impeachment. Their loyalty can shift, as senators also balance their own interests and ambitions with their political allegiances. Meanwhile, two people who are not affiliated with either camp appear to have also won senate seats. They are Paolo Benigno "Bam" Aquino, and an Aquino ally, Francis Pangilinan. Bam Aquino, the cousin of a former president, has in fact clinched second place in the rankings, in what he called a "very, very surprising" result. It marks the first time in years that voters had chosen outside the Marcos and Duterte dynasties. The Aquino family was the Marcoses' main political nemesis in the 1980s and early 1990s before the rise of the Dutertes. It was the assassination of opposition leader Benigno "Ninoy" Aquino Jr in 1983 that galvanised protests against Ferdinand Marcos Sr - the current president's father - culminating in the Marcos family's ouster and exile in 1986. Monday's result signals their comeback after being wiped out of national politics in recent years.

  Ronald dela Rosa (L) and Christopher Go (R) campaign with Duterte's youngest daughter, Veronica (Centre).

  Results so far also show the Dutertes have managed to retain their power base in the south of the country, just two months after the 80-year-old populist leader Rodrigo Duterte was arrested at Manila Airport and flown to the Netherlands on the same day to face the International Criminal Court. It was his arrest - approved by Marcos Jr - which pushed the rivalry between his daughter and the current president to boiling point, a few weeks after the president's allies in the House of Representatives voted to impeach Vice-President Duterte. Rodrigo Duterte was always expected to win as mayor, given the family has held the post since the mid-1980s. Duterte himself led Davao, a sprawling southern metropolis, for two decades before he was elected president in 2016. There, he showcased his drug war that he credited for the city's success, and won him the support of millions far beyond its borders. His youngest son, Sebastian, the incumbent mayor, was elected vice-mayor, meaning he can discharge his father's duties in his absence. Another Duterte son, Paolo, was re-elected as congressman. His grandchildren won local posts. Duterte's name remained on the ballot as he has not been convicted of any crime. He beat the scion of a smaller rival political family. Maintaining a political base in Davao city in the south is crucial for the Dutertes - it is where they get the most voter support.

  A Duterte campaign poster with pastor Apollo Quiboloy is displayed in Manila

  The election was not just a battle between the two families, however. Monday's vote saw long queues under temperatures of 33C (91F) and sporadic reports of violence and vote machines malfunctioning. Like past elections, song-and-dance, showbusiness-style campaigns played out on stage and on social media, underscoring the country's personality and celebrity politics that sometimes overshadow more pressing issues such as corruption, high cost of living and creaking infrastructure.
