title: Wiltshire pub's new chalet 'breaks Covid rules' - BBC News
date: '2021-04-08'
section: Wiltshire
url: http://www.bbc.co.uk/news/uk-england-wiltshire-56666447
content: |-
  The bar, with pizza oven and TV, does not comply with outdoor shelter guidelines, a council says.

  "The Chalet" at The Marlborough has been completed in the past year

  A "livid" pub landlord says he has spent £50,000 on a chalet for outside dining only to be told a week before opening it contravenes Covid-19 rules.

  Jason Kalen, who runs The Marlborough in Wiltshire, fitted a bar, pizza oven and a TV in the wooden structure.

  He said he followed Wiltshire Council's advice to comply with the regulations.

  But it said government guidance had not changed and outdoor roofed structures had to have at least 50% of their walls open when in use, which his did not.

  "Less than a week before we're supposed to open saying it doesn't comply. It makes no sense."

  The wooden structure was mostly built during the first lockdown in 2020 and finished in the second. A planned New Year's Eve party sold out, but had to be cancelled.

  "I built it to their [Wiltshire Council] specifications. I've got a breathable roof with a one inch gap around the outside, I've got double doors, I've got ventilation through the ground up. Then we get an email saying it's not permitted," he said.

  "It's the lack of timing. They should've sent this a month ago, it's just not fair."

  Mr Kalen said having worked closely with the council to realise his project "to suddenly do this to us is outrageous. I'm livid."

  Jess Gibbons, the council's director for communities and neighbourhood services, said guidance on outdoor hospitality was emailed to more than 800 alcohol licensed premises in Wiltshire on Monday night, following the government's confirmation on moving to step 2 of the roadmap on 12 April.

  He added: "This guidance is not new - it is the same as the guidance issued previously, following the last re-opening just prior to Christmas which was covered by the "all tiers" regulations.

  "It is based on the legal rules for smoking shelters in the smokefree legislation from 2007 which licensees will be very familiar with.

  "We have now contacted Mr Kalen to find out more about his new structure and to work with him and offer advice on what he needs to do to ensure it meets planning and licensing regulations."

