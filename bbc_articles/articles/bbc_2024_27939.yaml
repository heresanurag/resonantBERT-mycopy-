  Back row Freddy Douglas could become the youngest Scotland men's debutant for more than 60 years after being named as a replacement against Portugal.

  Coverage: Listen on BBC Radio Scotland and follow live text commentary on the BBC Sport website and app

  Back row Freddy Douglas could become the youngest debutant for Scotland's men's side for more than 60 years after being named as a replacement against Portugal in the third Autumn Test.

  The 19-year-old represented Scotland's Under-18 side in the 2023 Six Nations Festival only 18 months ago but looks poised to be the youngest player to feature for the full national side since Donald White in 1963.

  The forward is yet to play a senior game and has featured instead for Edinburgh A this season as well as representing Scotland in the Under-20 Six Nations and World Rugby Under-20 Trophy.

  Douglas, who made the most tackles and breakdown steals in the Under-20 Six Nations, is likely to see some game time against Portugal at Murrayfield on Saturday given Scotland are expected to have control of the match.

  His Edinburgh team-mate Ben Muncaster, who played for Scotland A against Chile on the 2022 summer tour, will definitely make his debut after being named in the back row alongside Bath's Josh Bayliss and Luke Crosbie of Edinburgh.

  Glasgow lock Alex Samuel will also win his first Scotland cap and will be joined in the second row by Scarlets' Alex Craig in a much-changed line-up from the one that started against South Africa.

  Scotland coach Gregor Townsend says Douglas' mentality and physicality during training sessions suggests he is ready to play international rugby.

  "It was meant to be a non-contact day on Wednesday and he was putting some big tackles in," the former fly-half said.

  "He has got the mindset we believe is ready for Test rugby. He will go forward and attack in defence. And he's got a super strength, which is his ability to win turnovers.

  "I remember Rory Darge coming in to train with us because he wasn't really training with Edinburgh, never mind getting a chance to play for Edinburgh. And he impressed us in training.

  "I think his mindset was the one thing that stood out. That he was taking on the opposition no matter the fact they were seasoned Test players.

  "That is in our mind when we see Freddie. We saw it when we trained against the Under-20s last year and he was picking fights. He was tackling the big guys in our team.

  "We've seen the ability for him to win the ball as well. It's tougher and tougher now to win those tackle turnovers. But he's got a brilliant technique and a bravery that he gets in those positions and he gets the ball back for his team."
