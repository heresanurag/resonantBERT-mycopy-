title: Elon Musk to spend election night with Donald Trump - BBC News
date: '2024-11-06'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c9dlg1v7jevo
content: |-
  The tech billionaire has aggressively campaigned for the Republican candidate in swing states across the country.

  Trump revellers gather in Florida to await his arrival

  Musk has been campaigning hard for Trump in Pennsylvania, where polls suggest Trump is in a tie with his Democratic rival

  Elon Musk, the world's richest man, planned to spend election night with Donald Trump in Florida at his Mar-a-Lago resort, he said on X/Twitter. Mr Musk, the owner of Tesla and X, has aggressively campaigned for the Republican candidate in swing states across the country. Trump's campaign is also hosting a watch party at the Palm Beach Convention Center for thousands of supporters. The tech billionaire has emerged as one of the most important backers of Trump and donated more than $119m (£91.6m) this election cycle to America PAC - a political action committee he created to support the former president.

  Mr Musk announced his support for the former president earlier this year, despite saying in 2022 that "it's time for Trump to hang up his hat and sail into the sunset". He posted a photo of himself on Tuesday saying he voted in Cameron County, Texas - where some of his companies are headquartered - before heading to Florida. Later in the evening, he wrote on X, "Game, set and match". The campaign was feeling confident late on Tuesday as supporters gathered at Trump's headquarters in the Palm Beach convention centre to wait for results. At one point, the crowd broke into a dance celebration to YMCA. Huge cheers erupted in the crowd as the state of Florida was projected as a win for Trump, albeit a win that was never in doubt. Former congresswoman Tulsi Gabbard arrived at the party, after previously attending Trump's more exclusive watch party at Mar-a-Lago. "There's a lot of really excited people there" who were "cautiously optimistic", she told the BBC. Steve Witkoff, a close friend of Trump, was also with him at Mar-a-Lago. There was "a strong feeling of excitement and purpose", he said.

  The crowd included Blake Marnell, who often wore a brick-patterned suit to Trump events in support of Trump's as-yet unfounded promise to build a wall along the southern border. He said he was feeling very optimistic about his candidate's chances. Sergio Ramirez, a businessman originally from El Salvador, claimed Trump could only lose if the Democrats "cheated... I don’t see how she can win — Kamala wasn’t a popular candidate." Michael, dressed in a “Blacks for Trump 2024” T-shirt. “We outnumbered them in early voting and we outnumber them now”, he claims. At a formalwear event next door in the Hilton hotel, Iowa Republican delegate Deborah Yanna said it felt like "Christmas morning". "When President Trump takes the White House back, he’s going to make America sparkle again," she said. Elsewhere, Steve Bannon, former chief strategist of the Trump White House, plans to hold an election watch party tonight at the Willard Hotel - the five-star Washington DC hotel that served as the "command centre" for Trump loyalists seeking to overturn the 2020 election results. Bannon was released from federal prison one week ago, after serving four months behind bars for contempt of the US Congress. Kamala Harris will spend election night at Howard University, her alma mater and a historically black university in Washington DC.
