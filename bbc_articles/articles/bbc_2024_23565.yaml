content: |-
  England are on a winning run of 17 matches and are fresh off the back of victories over France and New Zealand, as they face the United States in their WXV1 opener in Canada on Sunday.

  Venue: BC Place, Vancouver Date: Sunday, 29 September Kick-off: 20:30 BST Coverage: Watch live on BBC Sport website, BBC iPlayer and Red Button with live text commentary online.

  WXV1 was designed to get the best playing the best more often - but can any other team match England as its second season kicks off on Sunday? World number one side England will be heavy favourites to defend the inaugural title they won last year in New Zealand. The Red Roses are on a winning run of 17 matches and are fresh off the back of victories over France and world champions New Zealand. Games against the Black Ferns and hosts Canada are still to come, but up first on Sunday are the the United States, who are ranked eighth in the world. Head coach John Mitchell has built enormous strength in depth and can afford to rest captain Marlie Packer and star wing Abby Dow. Number eight Alex Matthews is one of a few regular starters to retain their spots and captains her country for first time, while Zoe Harrison starts in the key position of fly-half.

  When a fresh-faced Harrison made her England debut as a 19-year-old in 2017, it looked like the Red Roses had a potential long-term successor to Katy Daley-McLean. Harrison spent the next few years learning from the 116-cap World Cup winner before permanently taking the coveted jersey following her mentor's retirement in 2020. The heir to the number 10 shirt was ready, and a string of impressive performances helped her side to another World Cup final in 2022. A few months on from the devastating final defeat by New Zealand, Harrison ruptured her anterior cruciate ligament playing for Saracens. She returned before this year's Six Nations and started the opening game against Italy, but struggled in a first half as England only led 10-0 at half-time. Bristol Bears' Holly Aitchison, who deputised at fly-half during Harrison's absence, regained her starting spot for the rest of the campaign, with her 26-year-old rival focusing on getting back to her best. "It has been a really good challenge," Harrison said. "Coming back from a long-term injury, I knew I couldn’t just come back into a shirt, it was a nice challenge to work my way back in. "In terms of my game, I haven't been working on anything in particular but just on getting back to playing to get my sharpness back." Now back up to speed and having impressed off the bench in their recent victory over New Zealand at Allianz Stadium, the Saracen has been rewarded with a start against the United States. Attack coach Lou Meadows described her impact as "awesome" after working on her ability to "attack the line" with ball in hand. "She has worked hard with connecting the backline," Meadows added. "They [Zoe and Holly] have got a healthy competitive nature between them and drive each other. "It will give us an advantage as opponents won't be sure who we go with."

  The United States qualified for WXV1 after finishing third in the Pacific Four Series. Despite heavy defeats by New Zealand and Canada, the Eagles beat Australia 32-25 in the final round to secure a spot in the top tier. Their last game against England came at Sandy Park in a World Cup warm-up back in 2022, ending in a 52-14 defeat. Victory would be a big ask for a side that finished fifth in WXV2 last year after defeats by Scotland and Italy. However, American rugby is improving with a large contingent playing in the Premiership Women's Rugby league, including vice-captain and flanker Rachel Johnson, who is at Exeter Chiefs. "They are strong athletes - someone like Rachel Johnson has given me a dead limb every time we [Gloucester-Hartpury] have played against her," said Matthews. "They are very physical, which is something we like, so we must keep upping our skill set as a pack." The entire starting USA pack contains players from the PWR, with Meadows in particular wary of Exeter Chiefs props Hope Rogers and Charli Jacoby. "The US are going to have a strong set-piece as we know a few of their front rowers," Meadows said. "So at scrum and line-out there will be a bit of competition there and they will try to go after us."
