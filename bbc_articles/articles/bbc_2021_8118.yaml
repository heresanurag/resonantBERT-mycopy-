  Gareth Southgate says it is "good" England are not playing their Euro 2020 quarter-final at Wembley as it would have been hard to replicate the atmosphere of the Germany win.

  England face Ukraine in Rome on Saturday for a place in the semi-final.

  The Three Lions beat Germany amid scenes of huge tension and elation at Wembley in the last 16 on Tuesday.

  "To have a different focus, different surroundings, a different challenge it's good for us," said Southgate.

  Saturday's match in Italy's capital is England's fifth of the tournament - and first away from Wembley.

  Covid travel restrictions mean that fans in the UK have been told not to travel to the game.

  "I think it's good to come away from Wembley now," added Three Lions boss Southgate on Friday.

  "It would have been hard to replicate the atmosphere we had the other day."
  • None What threat will Ukraine pose in Rome?

  Southgate said he would not be satisfied with beating Germany if England go on to lose to Ukraine.

  The Three Lions will reach consecutive major tournament semi-finals if they win in Rome after qualifying for the last four at the 2018 World Cup.

  Southgate said his players were determined to improve on what they did at the last tournament.

  "It would be a step forward," Southgate told BBC Radio 5 Live on reaching another semi-final.

  "I personally won't be satisfied if we are going home on Sunday.

  "I think the team and the staff are of the same mindset and we have got to carry that into the game with Ukraine.

  "I'm very conscious that I knew how it felt at the time [beating Germany] and I knew how the fans were and how they would be around the country.

  "We had a sense of that at the World Cup in Russia, but I also know what it took for us to go from a night like Colombia [when England needed penalties to advance after conceding a 93rd-minute equaliser] to getting a result against Sweden in the quarter-finals, and the journey we needed to go on psychologically.

  "We started that process very quickly."
