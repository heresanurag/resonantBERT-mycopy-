title: 'Cardiff: Woman took drugs before club death, inquest hears - BBC News'
date: '2023-12-08'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67659587
content: |-
  Olivia Spencer took an illegal drug before collapsing at a venue in Cardiff, an inquest hears.

  Olivia Spencer's family said she had a "heart of pure gold"

  A 21-year-old woman who died after falling ill at a nightclub had taken an illegal drug, an inquest has heard.

  Olivia Morgan Spencer collapsed at a venue in Butetown, Cardiff, early on Saturday morning.

  The coroner in Pontypridd was told emergency services were called and attempted to save her life, but she died at the scene.

  A post-mortem examination found further investigation was needed to establish a cause of death.

  Describing the circumstances of the death, usher Catherine Burnell said: "On 2 December 2023, an emergency call was made to the ambulance service after 21-year-old Olivia collapsed at a night club [Vaults Cardiff] on Bute Street in Cardiff."

  Ms Burnell added: "Police were also in attendance and received information that Olivia had consumed an illegal drug. Toxicology tests are ongoing."

  The family of Ms Spencer, who was from Pentre in Rhondda Cynon Taf, have agreed her organs and tissue samples would be donated for medical research and teaching purposes.

  After her death, they said they were "devastated" to have lost someone who "lit up every room."

  Area Coroner Patricia Morgan said an inquest was required because she suspected Ms Spencer's death was "un-natural in nature".

  The inquest was adjourned to allow further investigations to take place.

  Ms Morgan added "I wish to express my deepest condolences to the family of Olivia Spencer at such a difficult time."
