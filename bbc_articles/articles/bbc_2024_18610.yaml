  The Nord Stream pipelines carried gas from Russia to Germany under the Baltic Sea and were a controversial and unpopular symbol of European energy dependence on Moscow. In other words it’s easy to imagine motives for such an attack. For years Eastern Europeans warned Berlin that this dependence on Russian gas made Europe vulnerable. But successive German governments, from Gerhard Schröder’s left-wing coalition to Angela Merkel’s conservative-led administrations, argued that binding Russia to Europe with energy and trade links would help both countries economically and ensure peace. Russia’s full invasion of Ukraine in February 2022 destroyed that hope and mainstream politicians across the political spectrum in Germany have now admitted they were wrong.
