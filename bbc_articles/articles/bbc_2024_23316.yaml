  She added that over 60 people were leaving just as she arrived. "People leaving told me to just go bar-hopping with them." Another disappointed TikTokker posted a picture of the outfit, external she says she "wasted" at the event. "I was ready to be diamond of the season. I left early," she said.

  In an interview, external with local news station WXYZ-TV, Detroit acrobat Tink said she had been hired as a pole-dancer just three hours before the event. "I just feel very bad for all the patrons who showed up to the event just because my goal as a performer is to bring happiness and cheers to everyone," she said. "So it kind of just bummed me out knowing everyone was so unhappy with the outcome." People on social media have been quick to note the similarities with other viral flops, including the Fyre festival in the Bahamas and the Willy Wonka experience in Glasgow, which saw a handful of embarrassed actors trying to make the best of some sad-looking props and a bouncy castle. In a statement to WXYZ-TV, Uncle & Me LLC said: "We understand that not everyone had the experience they hoped for at our most recent event Sunday night at The Harmonie Club, and for that, we sincerely apologise. "Our intention was to provide a magical evening, but we recognise that organizational challenges affected the enjoyment of some guests. We take full responsibility and accountability for these shortcomings." The company said it was working to address all concerns raised by guests, adding: "We are reviewing resolution options, which will be communicated shortly."
