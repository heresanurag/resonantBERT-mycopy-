title: 'Bridgerton ball: Fans fuming after Detroit event flops - BBC News'
date: '2024-09-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/cly3q8ynlxyo
content: |-
  Guests complained they were met with cheap decor, undercooked food and just a stripper for entertainment.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Bridgerton fans have been left fuming after an unofficial ball in Detroit based on the Netflix show fell far below expectations. The event on Sunday was supposed to be a glamorous affair with ballroom dancing and music, similar to that enjoyed by the members of Regency high society in the hit series. But it has since gone viral on social media, as attendees complained it was a "scam", with cheap decor, undercooked food and just a stripper for entertainment. Event organisers Uncle & Me LLC have not responded to the BBC's request for comment, but they told a local media outlet that they were working to address concerns.

  The event was not endorsed by or associated with Netflix or production company Shondaland. The advert for the event, external invited fans to "step into the enchanting world of the Regency era at the Detroit Bridgerton-themed ball". "Join us for an evening of sophistication, grace, and historical charm. Experience a night like no other filled with music, dance, and exquisite costumes," it read. But fans are now calling for refunds, with photos and videos circulating on social media, external showing women, dressed in their finest outfits, sitting on the floor scrolling on their phones.

  "This is right up there with the Fyre Festival scam," wrote one on Facebook, referring to another infamous failed venture. "I've seen kids parties that look better. It was bare and ugly," wrote another, who said most people had left by 9pm. Screenshots of tickets online showed prices starting at around $150, but others spent more for the "Duke and Duchess" package which included dinner. But the meal was criticised by attendees, with one saying it was "terrible" and others saying it was still raw.

  The third season of Netflix's period drama Bridgerton was released earlier this year

  "Chicken was undercooked and pasta was cold. By the time I got a plate they were running out of food," wrote one. Several people also complained about the food running out.

