  Meanwhile, the entertainment also disappointed, with just one violinist despite guests being told there would be a full orchestra. There was also a pole-dancing stripper, leaving some fans to question what that had to do with Bridgerton. "They hired a stripper, we were promised an instrumental performance," wrote a TikTok user, external.

