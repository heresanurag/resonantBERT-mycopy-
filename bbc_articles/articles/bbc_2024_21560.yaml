title: Manchester rioter's mum to pay compensation after Ibiza trip - BBC News
date: '2024-09-11'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c4gdn8dj62wo
content: |-
  The boy's sentencing had been postponed because his mother went on holiday to Ibiza.

  The boy had previously admitted his role in two separate riot incidents in Manchester

  A mother who went on holiday to Ibiza rather than attending her son's sentencing for his role in riots has been ordered to pay compensation to the victims. Her 12-year-old boy kicked a bus outside a hotel housing asylum seekers in Manchester on 31 July, before joining a mob that targeted a vape shop and threw missiles at a police van on 3 August. The 30-year-old mother was ordered to pay £1,200 compensation - approximately the same price as her holiday - and attend a six-month parenting course. The boy, who cannot be named because of his age, was handed a 12-month referral order and told had he been an adult he could have been sent to prison for between four and five years.

  He is the youngest person to be sentenced over the widespread disorder so far. District Judge Joanne Hirst told the youngster at Manchester Magistrates' Court he had displayed "the worst type of feral behaviour". His mother, who told the judge her holiday to the Spanish party island had cost £1,000, was ordered to pay £300 each to the bus driver, a housing officer at the asylum hotel, an asylum seeker who was on the bus and a member of staff at a looted Sainsbury's store for the distress caused. Parents can be ordered to pay financial penalties when their children have committed a crime under terms of the Criminal Justice Act. The judge told her: "You know it's approximately the same cost as your holiday to Ibiza." The mother flew abroad for a five-day break the day before her son was due to appear in court on 2 September for sentencing. The boy was accompanied to the hearing by his uncle but Judge Hirst said the mother's actions left her "frankly astonished" and said she would summon the woman to court to explain herself. The judge asked the mother: "Can you explain your point of view?" The mother said she spoke with her solicitor and the youth justice team and "it was not put to me how much I needed to be there". She said: "Each one said, 'Is there an appropriate adult?'" The mother said her brother was accompanying him "which is why I went on holiday".

  The court was shown video footage of the boy's offences

  The boy, who has ADHD, was described as a "lovely affectionate little boy" by his single mother, but who had at times a "chaotic" home life. He told the judge he was sorry, and now had help from social workers and had taken up boxing. The boy made no comment in his police interview but pleaded guilty to two counts of violent disorder at the first court hearing on 12 August. Catherine Baird, defending, told the court the youngster had no previous convictions, adding: "This is a child. He simply got wrapped up, surrounded by peers, many of them were adults. Custody would do more harm than good." Under 18s appearing in youth courts cannot be identified for legal reasons so his mother cannot be named as that would lead to his identification. The Crown Prosecution Service said in the disorder on 31 July at about 18:00 BST the boy was captured on CCTV as part of a group who became aggressive, throwing rocks and other missiles at police officers who were trying to protect the staff and residents of the hotel. The boy was seen handing a rock to another boy at the scene. Later, the group, who were in the road, stopped a bus full of passengers and the boy was seen on CCTV to kick out at the bus from his bike. Widespread disorder broke out in towns and cities across the UK in July and August following the Southport knife attack in which three young girls were killed.
