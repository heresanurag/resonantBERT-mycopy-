  Russia was suspended from track and field events by the International Association of Athletics Federations in November 2015 following the publication of the independent Wada report. Former sports minister Vitaly Mutko apologised for Russia's failure to catch the cheats, but stopped short of admitting the scandal had been state-sponsored. However, an independent report commissioned by Wada and completed by Canadian law professor Richard McLaren suggested senior figures in Russia's sports ministry were complicit.

  The report implicated the majority of Olympic sports in the cover-up and claimed Russian secret service agents were involved in swapping positive urine samples for clean ones. As a result, Wada recommended all Russian athletes be banned from competing in the Rio 2016 Olympic Games. The IOC chose not to impose a blanket ban, instead leaving decisions on whether Russians could compete to individual sporting federations. In total, 271 Russians competed in Rio. "While it's another sad moment in this entire sordid affair, there was really no other outcome, based on their unwillingness to admit what the flood of evidence proves, said the US Anti-Doping Agency's Travis Tygart. "Now clean athletes are watching anxiously to see if the IOC similarly will take action to finally stand up for their rights or not."

  Some figures from the world of winter sport have come out in support of Russia. Bob Storey, former president of the International Bobsleigh and Tobogganing Federation, said: "These issues are not just in Russia, and not without resolution over time. "Now many innocent athletes, who have worked a lifetime to earn Olympic status, are in limbo because of the interminable squabble over past doping transgressions. Those athletes wait while sport politicians and technocrats decide whether or not they can compete at Pyeongchang. "I have never met an Olympic competitor who wants to win through technical disqualification of clean competitors. Banning clean athletes from future games or from competing under their country's flag serves no sporting or Olympic purpose."

