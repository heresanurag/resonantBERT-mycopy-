title: 'Winter Olympics 2018: Russian boycott would damage athletes - Wada - BBC Sport'
date: '2017-11-16'
section: Winter Sports
url: http://www.bbc.co.uk/sport/winter-olympics/41996128
content: |-
  A Russian boycott of the 2018 Winter Olympics would "damage athletes wishing to compete", says Wada president Sir Craig Reedie.

  Russia topped the medal table with 33, including 13 golds, when it hosted the 2014 Winter Olympics in Sochi

  A Russian boycott of February's Winter Olympics would "damage athletes", says World Anti-Doping Agency (Wada) president Sir Craig Reedie. Wada said on Thursday that Russia remains non-compliant with its code, but clean Russians may compete in Pyeongchang under a neutral banner. It has been claimed President Vladimir Putin would not allow them to do so. "Boycotts, in my view, never really work. All they do is damage athletes," Reedie told BBC Sport. "The Olympic movement was plagued with boycotts 20, 25 years ago and it has got over that issue. I hope that people come and compete." The International Olympic Committee (IOC) will make the final decision on Russia's participation in South Korea from 9-25 February at its next board meeting from 5-7 December.

  Last year, an independent report commissioned by Wada found evidence of state-sponsored doping in the country. Wada told BBC Sport last week that the "best solution" is for Russia to "work with them" after receiving new intelligence. Russia's sports minister said their anti-doping agency (Rusada) have "fulfilled all of their obligations" to get the ban - implemented after an initial Wada report in 2015 - lifted. However, Wada says two criteria remain outstanding: granting access to the Moscow laboratory suspected to be the hub of the operation, and a public acceptance that senior sports ministry figures were complicit in an organised cover-up. Reedie said Wada and the Russian authorities "seem to have very different definitions" of what is deemed state-sponsored doping. "Their definition seems to be that state sponsored means from the very top of state down to the very bottom of state," he said. "In the western world it would be different. "If it comes down to a situation where we're one letter apart then I'm sure we could resolve that. "There would have to be a will to do it. At the moment there are still feelings that we shouldn't." Kuwait, Equatorial Guinea and Mauritius were also found non-compliant by Wada's independent compliance review committee on Thursday.

  Russian authorities have never acknowledged any involvement in doping, and President Putin has suggested the allegations were an attempt to sow discontent in the build-up to the presidential elections. Russian Olympic Committee president Alexander Zhukov, who said in September he expected the country to have a team at the Winter Games, reiterated the state's innocence and said Wada's latest judgement "cannot be accepted". "We accept the fact our national anti-doping system has failed [but] we absolutely deny a state-sponsored doping system," said Zhukov, who added that unconditional recognition of the McLaren report "is impossible". Sports minister Pavel Kolobkov said the criteria for reinstatement have a "political character". "I got the impression that the decision was made in advance," he told TASS news agency after Wada's announcement, made on the recommendation of its independent compliance review committee. "[The] committee has been inventing reasons not to reinstate Rusada; the accusations are simply a joke."

  This is important news as it will heap pressure on the IOC to ban Russia from the 2018 Winter Olympics when it meets in early December. IOC president Thomas Bach has been weighing up a compromise, such as a hefty fine. But now the pressure to allow only Russians who can prove they are clean to compete as neutral athletes will intensify. Insiders believe that, with an election in March looming, this may mean President Putin will boycott the Games and order his athletes to stay away rather than compete as neutrals. We are a step closer to the first major boycott of an Olympics since 1984.

