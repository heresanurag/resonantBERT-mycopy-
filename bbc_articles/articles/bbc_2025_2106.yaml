content: |-
  Kyle Shaw, 37, pleaded guilty to stalking the Strictly Come Dancing judge between 2017 and 2023.

  Shirley Ballas has been head judge on the BBC One show Strictly Come Dancing since 2017

  Strictly Come Dancing judge Shirley Ballas moved her mother to a different home and increased security measures due to a stalker, a court has heard. Kyle Shaw, 37, pleaded guilty at Liverpool Crown Court to stalking the 64-year-old star causing serious harm or distress between 31 August 2017 and 29 November 2023. He also admitted possession of a quantity of cannabis. Shaw, of Whetstone Lane, Birkenhead, Wirral, was given conditional bail ahead of sentencing on 1 April.

  The court heard Shaw made continued unwanted attempts to contact Ballas and posted on social media about the star, including posting an image of her house. He also attempted to contact her family, friends and work colleagues, monitored her online and TV presence and made arrangements to attend her book tour.

  According to the charge, Shaw's actions had a "substantial adverse effect" on Ballas's usual day-to-day life as she increased her security measures, relocated her mother to a different property and made different arrangements surrounding her social and work schedules. Judge Gary Woodhall told Shaw: "There is a very real risk you will receive an immediate custodial sentence and you must come to court prepared for all eventualities." Ms Ballas, originally from Wallasey, Wirral, has been head judge on the BBC show since 2017. By the age of 21, Ballas had won nearly every major title she competed in including the World Latin American Championships. She retired from competitive dancing in 1996.

