  Kent Fire and Rescue Service said it had responded to incidents of flooding in Dover adding that crews have been working to clear properties of flood water and provide assistance and support to affected residents. Late on Friday night, Heathrow Airport apologised to passengers for flights delayed by "adverse weather conditions". Meanwhile, East Sussex Fire and Rescue Service said a lightning strike was deemed the likeliest cause of a fire in a residential building in St Leonards-on-Sea. There were no reports of casualties and the fire has been extinguished.

  How hot is too hot? From heat labs to firefighting helicopter pilots and wineries, we look at how extreme heat impacts people and environments in the UK.

  It was not just the south-east that saw heavy rainfall on Friday, however. In Devon, North Wyke near Okehampton saw 36.4mm of rain. Five flood warnings were issued overnight by the Environment Agency, all in the South West, but as of 12:15 BST on Saturday these had been removed. National Rail also said a landslip had stopped all services between Exeter St Davids and Okehampton. Disruption is expected until at least 17:30, with rail operators warning customers to check for updates on services on Saturday.

  The Met Office warns that some areas could see 30-50mm of rain in a few hours, while a few locations could reach up to 80mm. A further yellow warning is also in force in the eastern half of Northern Ireland from 06:00 to 18:00 BST on Saturday. The rain will spread north and west, turning more showery in the afternoon but there will still be a risk of thunderstorms, the weather agency said. The heat and humidity has been building gradually, especially across northern and eastern parts of England. With the rising humidity and heat, thunderstorms will bring the end to the hot spell. Temperatures will be lower on Saturday with highs like low to mid-twenties across eastern England and high teens elsewhere.

