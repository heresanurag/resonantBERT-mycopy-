title: Yellow weather warning for UK after flooding and lightning strikes - BBC News
date: '2025-06-14'
section: UK
url: http://www.bbc.co.uk/news/articles/c93lrqk60geo
content: |-
  Yellow warnings remain in place after heavy rain and storms overnight and the hottest day of the year so far.

  More than 30,000 lightning strikes were recorded overnight up to 06:00 on Saturday, the Met Office says

  More than 30,000 lightning strikes were recorded overnight after thunderstorms swept across parts of England, the Met Office has said. Yellow weather warnings for rain and thunderstorms remain in place for the far north of England, eastern parts of Northern Ireland and much of Scotland on Saturday. The vast majority of the lightning struck over the sea, however, torrential downpours also hit land, causing disruption in Kent with flooding in the Dover area. Rain and lightning rolled in at around 22:00 BST on Friday after the country experienced its hottest day of the year so far with temperatures reaching 29.4C in West Suffolk.

  Kent Fire and Rescue Service said crews have been working to clear flooded properties in Dover

  This exceeded the previous recorded high of 29.3C in Kew, London, on 1 May. Scotland also had its warmest day of the year so far with 25.7C recorded at Lossiemouth in Moray. A spokesperson for the Met Office said that temperatures in the south east were "comfortably 9C or 10C higher than the average expected for this time of year". An amber warning for thunderstorms was in place in the east and south-east from Eastbourne, Sussex, in the south up to Cromer in north Norfolk from 20:00 BST on Friday till 05:00 on Saturday.
