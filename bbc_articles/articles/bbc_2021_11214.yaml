title: La Palma volcano lava engulfs homes and swimming pools - BBC News
date: '2021-09-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-58653737
content: |-
  Molten rock from the erupting Cumbre Vieja volcano is destroying hundreds of buildings.

  Lava pouring from a volcano on the Spanish island of La Palma has damaged hundreds of homes, as the molten rock heads to the sea.

  Thousands of people have been forced to flee the path of the lava that has been spewing from the Cumbre Vieja volcano since Sunday.
