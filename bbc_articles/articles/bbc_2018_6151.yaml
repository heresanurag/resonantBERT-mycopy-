id: bbc_2018_6151
title: 'Ed Sheeran data breach: Ipswich Hospital staff disciplined - BBC News'
date: '2018-05-19'
section: Suffolk
url: http://www.bbc.co.uk/news/uk-england-suffolk-44155784
content: "The singer's personal details were accessed while he was being treated at\
  \ Ipswich Hospital.\n\nEd Sheeran had to pull out of a number of dates of his Asian\
  \ tour after \"a bit of a bicycle accident\"\n\nTwo members of hospital staff were\
  \ disciplined for accessing Ed Sheeran's personal details with no legitimate reason,\
  \ the BBC understands.\n\nIpswich Hospital said a medical staff member was given\
  \ a written warning and a member of admin staff was sacked.\n\nIt said both cases\
  \ of disciplinary action happened after 16 October, the date on which the singer\
  \ was admitted to the hospital.\n\nSheeran had broken his right wrist and left elbow.\n\
  \nThe singer, from Framlingham, Suffolk, told fans on Instagram he had \"a bit of\
  \ a bicycle accident\".\n\nHis injuries meant he had to pull out of a number of\
  \ dates of his Asian tour.\n\nEd Sheeran told fans on Instagram he had broken his\
  \ wrist and elbow\n\nIpswich Hospital would not provide further details of the data\
  \ breach incident but said in a Freedom of Information response to the BBC both\
  \ staff members \"accessed patient information without legitimate or clinical reason\"\
  .\n\nIt said neither were referred to the Nursing and Midwifery Council or to other\
  \ professional bodies.\n\nThe hospital previously said it launched a review of care\
  \ given to \"high profile\" patients after Sheeran's visit.\n\nIt said the review\
  \ covered \"confidentiality, privacy of the patient and their loved ones and practical\
  \ considerations\".\n\nThe BBC understands the singer was asked to sign autographs\
  \ and pose for photographs by some Ipswich Hospital staff while there.\n\nThe best\
  \ way to get news on the go \n\nThe BBC is not responsible for the content of external\
  \ sites."
