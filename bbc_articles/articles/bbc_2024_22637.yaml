title: Man admits killing Leeds delivery driver but denies murder - BBC News
date: '2024-09-20'
section: England
url: http://www.bbc.co.uk/news/articles/cgj4699ywp0o
content: |-
  Mark Ross denies murdering Claudiu-Carol Kondor in Leeds, but admits his manslaughter.

  Claudiu-Carol Kondor lived in Sheffield but was originally from Romania

  A man has admitted causing the death of a delivery driver in Leeds, but denied his murder. Mark Ross, 32, pleaded guilty to the manslaughter of Claudiu-Carol Kondor but denied the more serious charge of murder when he appeared at Leeds Crown Court. Mr Kondor, a 42-year-old Romanian national who was living in Sheffield, was left fatally injured on Heights Drive in Leeds on 20 August after he tried to stop a thief stealing the van he was driving. Mr Ross, of Conference Road in Armley, is due to stand trial from 4 March 2025.

  At the opening of Mr Kondor's inquest on 13 September, senior coroner Kevin McLoughlin confirmed the delivery driver died from injuries to his head and chest. The brief hearing at Wakefield Coroner's Court was told his family was making arrangements to have his body flown back to Romania for a funeral. Mr McLoughlin described the death as "heartbreaking" and said Mr Kondor had been "contributing to society". "He was here and he was working hard." The inquest is expected to resume following the conclusion of criminal proceedings into Mr Kondor's death. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
