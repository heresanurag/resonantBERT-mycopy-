title: IPL suspended for one week amid ongoing India-Pakistan tension - BBC Sport
date: '2025-05-09'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/c753n4ngd0ko
content: |-
  The Indian Premier League is suspended for one week amid the ongoing tensions between India and neighbouring Pakistan.

  IPL suspended for one week over safety concerns

  MS Dhoni (left) and Ajinkya Rahane were the captains for the last completed IPL match, between Chennai Super Kings and Kolkata Knight Riders on Wednesday

  The Indian Premier League has been suspended for one week amid the ongoing tensions between India and neighbouring Pakistan. Overnight, India accused Pakistan of attacking three of its military bases with drones and missiles, a claim which Islamabad denied. Pakistani authorities say 31 people have been killed and 57 injured by Indian air strikes in the country and Pakistan-administered Kashmir since Wednesday morning. Twenty-six civilians were killed in Indian-administered Kashmir last month and India has accused Pakistan of supporting militants behind the attack - an allegation the neighbouring country has rejected. The situation escalated on Tuesday evening when India launched a series of strikes in a move named "Operation Sindoor". The Board of Control for Cricket in India (BCCI) said it had consulted "key stakeholders" including franchisees, broadcaster and sponsors, before taking the decision. "While the BCCI reposes full faith in the strength and preparedness of our armed forces, the Board considered it prudent to act in the collective interest of all stakeholders," the statement added. On Thursday, the IPL match between Punjab Kings and Delhi Capitals in Dharamsala was abandoned mid-match because of floodlight failure, with players, staff and media set to be evacuated from the city, which lies close to the contested region of Kashmir. Later on the same day, the remaining matches in the Pakistan Super League (PSL) were moved to the United Arab Emirates. The IPL, the richest franchise T20 league in the world, had been set to run until 25 May, with 16 games left to be played. "Further updates regarding the new schedule and venues of the tournament will be announced in due course after a comprehensive assessment of the situation in consultation with relevant authorities and stakeholders," said the BCCI.

  There are 10 England players - past and present - involved in this year's tournament. They include former white-ball captain Jos Buttler, fast bowler Jofra Archer and all-rounder Jacob Bethell. BBC Sport understands those players will be leaving India, with some already travelling home. Australian players are also expected to leave and are being supported by Cricket Australia. It is understood the Professional Cricketers' Association (PCA) has been in regular communication with England players in both the IPL and PSL. This has mainly been in the form of WhatsApp groups and one-to-one conversations, and there has been a focus on verifying information that players are hearing and helping to support them with travel if needed. There is said to have been a mix of reaction from players, with some relaxed and others concerned. Although sources have described the situation as "delicate", the discussions between the IPL franchises and the England players have been described to BBC Sport as "amicable" and "reasonable". IPL matches have been staged outside India, with the 2009 edition held in South Africa following an attack on the Sri Lanka national side in Lahore in Pakistan, while the 2020 and second half of the 2021 seasons were staged in the United Arab Emirates during the Covid-19 pandemic. A new schedule for the PSL is yet to be confirmed, but it is understood that teams are due to travel to the UAE on Friday. Overseas players, including seven from England, are expected to take part in the remainder of the competition.
