title: Anger after 'hardcore huntress' shoots goat on Scottish island - BBC News
date: '2018-10-24'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-45967845
content: |-
  Television presenter Larysa Switlyk posed beside dead goats on the Scottish island of Islay.

  Ms Switlyk posted a photograph of herself next to a dead goat on Tuesday

  Photos of an American TV presenter posing beside wild goats shot dead in Scotland have been condemned by a Scottish government minister.

  Mike Russell was responding to social media posts showing Larysa Switlyk hunting on the island of Islay

  Ms Switlyk, who describes herself as a "hardcore huntress", hosts the Larysa Unleashed programme.

  Mr Russell, who is the local MSP for the area, told BBC Scotland that the images were "horrific".

  He said he had contacted Scotland's environment secretary, Roseanna Cunningham, to call for goat hunting to be "stopped immediately" on the island.

  Several tourism companies offer the chance to stalk and shoot wild goats in Islay, Dumfries and Galloway and other parts of the UK.

