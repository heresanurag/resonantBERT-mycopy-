title: Video captures moment glacier collapses in Italian alps - BBC News
date: '2022-07-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-62030708
content: |-
  Five people were killed in an avalanche sparked by the glacier collapse on the Marmolada mountain.

  Video has captured the moment an ice mass collapsed down the slopes of Marmolada, in the northern Italian Alps.

  At least five people have been killed after being caught in an avalanche sparked by the collapse of a glacier in the area's highest mountain.

  Emergency officials said eight others were injured in the collapse, with two people suffering serious injuries.

