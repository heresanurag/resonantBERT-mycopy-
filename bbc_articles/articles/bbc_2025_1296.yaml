content: |-
  Janice Forsyth has worked for the BBC for more than 30 years, presenting shows on various radio stations.

  Janice Forsyth has worked for the BBC for more than 30 years

  BBC Radio Scotland presenter Janice Forsyth has stepped down after being diagnosed with early-onset Alzheimer's disease. The broadcaster has worked for the BBC for more than 30 years, presenting shows on BBC Radio Scotland, BBC Radio Four and BBC Radio Three. She also co-founded a podcast production company five years ago, a role she will continue. Ms Forsyth, 65, said the diagnosis came as a "huge blow" but also provided her with some relief.

  In a statement, she explained that since 2022 she had been finding some tasks such as navigation difficult, and had experienced anxiety. "I'd hoped that I was simply worn out by my many years as a freelance broadcaster and perhaps exhausted following the loss of our dear Mother, Patricia, the previous Christmas, but sadly, I now have a firm diagnosis of early onset Alzheimer's disease," she said. "It's been a huge blow, but I'm also feeling some relief that I finally have an explanation for lapses I'd been experiencing, and I'm managing to remain buoyant most of the time." During her career, Janice Forsyth interviewed stars such as Leonard Cohen, David Bowie and Billy Connolly. She presented the Culture Studio on BBC Radio Scotland, which then became the Janice Forsyth Show and then the Afternoon Show, a role which she undertook from 2013 until early 2024. She has also appeared on BBC titles such as Radio Café, Authors Live and the Hogmanay Show.

  Away from the airwaves, she has worked as a columnist and is also the chair of the Rothesay Pavilion charity, a group set up to restore the arts venue on the Isle of Bute. She continued: "Much as I have loved seeking out and sharing the best of music/literature/theatre/cinema with you, I'm happy now to have the time and freedom to enjoy all of these simply for my own pleasure," she continued. "Call it living in the moment, and you won't be far off! "I never took my role lightly and hope I always gave my best, both for your sake and that of my interviewees. "It's been a blast, and I send a high five to everyone who tuned in on Saturday mornings or on more recent weekday afternoons and heard something interesting."

  Louise Thornton, head of commissioning at BBC Scotland, said: "Janice has been a hugely popular personality on our airwaves for many years. "The many production teams she has collaborated with have appreciated her outstanding skill as a presenter on radio and television. "Her warmth, relaxed interviewing style, and peerless knowledge of arts, music, and culture in Scotland and beyond, have made her a firm favourite with audiences over the decades. "Everyone at BBC Scotland wishes Janice all the very best and we'll be pleased to continue to explore suitable opportunities where we can work together."
