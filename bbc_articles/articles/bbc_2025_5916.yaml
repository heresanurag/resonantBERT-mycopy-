title: 'Newspaper headlines: ''Le Pen rails against ban'' and ''Trump''s tariffs to
  hit UK'' - BBC News'
date: '2025-04-01'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cq674yg0jmro
content: |-
  A mixture of headlines dominate the front pages of UK papers on Tuesday.

  'Le Pen rails against ban' and 'Trump's tariffs to hit UK'

  All of the broadsheets carry photographs on their front pages of the French far-right leader Marine Le Pen whom the Guardian describes as "furious", external after she was banned by a court from running to be French president for embezzling EU funds. The Financial Times, which also leads with the story, says her hopes have been "shattered" by the ruling, which it claims has "upended France's political landscape", external. The looming US tariffs feature on the front pages of the Times and the Daily Telegraph. The Times says an exemption for UK goods is "considered unlikely", external, and any failure of negotiations with Washington would be a "blow" to the prime minister. The Telegraph says that free speech is a key point of contention, external between the US and the UK - and quotes what it calls a "highly unusual" US state department comment, citing concern about an anti-abortion campaigner who was prosecuted for holding a sign near a clinic in Bournemouth. A source described as being "familiar with trade negotiations" tells the paper, "There should be no free trade, without free speech." According to the Daily Mail, police have been told to treat black and white suspects differently, in what it calls a "new" row over "two-tier justice"., external The paper says a report by police chiefs declares that racial equity does not mean treating everyone the same or being colour blind. But a Labour source tells the Mail there's nothing in the document suggesting preferential treatment for black people. The Sun says it has uncovered social media accounts from asylum seekers who have travelled to the UK by boat, showing off their "taxpayer-funded" hotel rooms., external It says one video - with captions in Albanian - showed two men gloating about having a large flat-screen TV, and advertising the "route" they took to get here as "100% guaranteed". The paper quotes from the prime minister's speech on Monday at an immigration summit in London - where he told delegates that 18,000 social media sites had been taken down since Labour came to power in an effort to "disrupt the way smugglers promote their services". Fasting for part of the week is a more effective way to lose weight than calorie counting every day - according to a study in the Telegraph., external It says researchers from the University of Colorado's School of Medicine noted that the "periodic nature" of fasting may mitigate the "constant hunger" of daily calorie reduction.

