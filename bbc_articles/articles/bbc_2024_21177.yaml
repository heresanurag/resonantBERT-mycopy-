title: Police left with broken bones and teeth from riot clashes - BBC News
date: '2024-08-08'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c36n1x2dr9ko
content: |-
  More than 90 Merseyside Police officers suffered injuries in the recent disorder.

  Merseyside Police have battled violent agitators in Southport, Liverpool and Walton since the knife attacks on 29 July

  More than 90 Merseyside police officers were injured during violent disorder over the last week, the chief constable has said. The impact of the past week on the force was outlined in a statement read out as three men were sentenced in connection with the violence. Widespread disorder erupted after an attacker walked into a Taylor Swift-themed holiday club in Southport and killed three children on 29 July. Chief Constable Serena Kennedy said some injured officers had suffered fractures, broken jaws and lost teeth.

  Serena Kennedy (left) said the impact of an assault on a police officer could be "devastating"

  Ms Kennedy's community impact statement formed part of the prosecution case against Derek Drummond, 58; Declan Geiran, 29; and Liam James Riley, 40, who appeared at Liverpool Crown Court. Drummond, of Pool Street, Southport, was jailed for three years; Riley, of Walton Road, Kirkdale, for 20 months and Geiran, of Kelso Road, Kensington, for 30 months for their roles in the disorder. Large groups of agitators clashed with police in Southport on 30 July, while violence also broke out in Liverpool city centre and in Walton on Saturday and Sunday. She said injuries related to the violence since 30 July were being "assessed daily" and the total number or officers hurt stood at 93. Ms Kennedy said officers had been waking up with panic attacks and were in "disbelief" that none of their colleagues had been killed. Some of officers feared for their own safety and and that of their families, she added. The force's dog unit had been particularly badly affected, with six teams out of action due to injuries to both officers and dogs. Ms Kennedy said: "The level of aggression that I witnessed which was directly aimed at my officers on the nights of 30 July, as well as 2 and 3 August, is unprecedented. "It was horrifying to see but the officers did an excellent job in pursuance of their primary aim to keep our communities safe." Ms Kennedy said the impact of being assaulted on a police officer can be "devastating", and also increases strain on the force due to sick leave. She said: "Such offences, particularly when carried out in public view, can also damage the credibility and reputation of the police service to safeguard our communities."

  Ms Kennedy said the extra pressure on policing had meant it had been harder to respond to other reported crimes as quickly as the force would have liked. She said: "Although we are doing everything to minimise this, it is going to impact on the service deserved by those victims of crime; the court will be mindful of the mantra that justice delayed is justice denied." She said a full investigation team continued to investigate the deaths of Bebe King, six; Elsie Dot Stancombe, seven; and Alice da Silva Aguiar, nine. However the force had deployed around 150 officers every day to respond to the threat of new violent disorder as well as a 55-strong investigation team to track down offenders involved in the trouble last week.
