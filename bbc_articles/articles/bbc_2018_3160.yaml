content: |-
  Police send rights activist Hu Jia on a "holiday", just one way dissent is silenced during the annual congress.

  As China’s annual parliament meets, one proposal in particular has caught the world’s attention - the scrapping of the presidential term limits, potentially making Xi Jinping president for life.

  But his critics are not welcome at the party. The BBC captured rare footage of one of the most prominent Chinese rights critics, Hu Jia, as he was sent on an enforced "holiday", paid for by the police, to keep him away.
