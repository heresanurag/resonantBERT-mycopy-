title: North Korea hosts military spectacle - BBC News
date: '2020-10-10'
section: General
url: http://www.bbc.co.uk/news/world-asia-54491827
content: |-
  As North Korea celebrates its military arsenal, leader Kim Jong-un says his country is "healthy and sound" in terms of coronavirus.

  Speaking to the crowd about the coronavirus pandemic, he said "I feel very grateful for all our people being healthy and sound."
