title: Tornado ravages Wellington, Florida during Hurricane Milton - BBC News
date: '2024-10-11'
section: General
url: http://www.bbc.co.uk/news/videos/c07n0319yllo
content: |-
  BBC News presenter Sumi Somaskanda speaks with residents who were forced to take shelter in their bathroom when the storm hit.

  Multiple tornadoes were reported across Florida ahead of Hurricane Milton's landfall on Wednesday. Now, communities assess the damage left behind.

  The BBC's Sumi Somaskanda surveyed the tornado damage in Wellington, Florida, where some residents told her they took shelter in their bathroom.

  Surveillance footage from one neighbour shows lawn furniture being thrown across the yard as the tornado hit.
