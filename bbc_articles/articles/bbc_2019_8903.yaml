content: |-
  Tuesday night saw thunderstorms sweep across much of the UK.

  This electric blue sky was pictured over Milton Road in Cambridge

  The skies above the UK were lit up by about 48,000 lightning strikes on Tuesday night.

  The thunderstorms came ahead of further warm weather with temperatures in London expected to reach 38C on Thursday.

  Lightning was seen over Scarborough, North Yorkshire

  The storm passed over the Solent in southern England

  Tim Fisher caught this thunderstorm in the Lake District

  Skies in Preston, Lancashire, are seeing purple
