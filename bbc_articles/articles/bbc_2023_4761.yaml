title: 1894 shipwreck confirms survivor tale of treacherous lifeboat - BBC News
date: '2023-03-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64819156
content: |-
  The Ironton yields a secret, jealously guarded until now by the deep, about the sailors' demise.

  A "magnificently preserved" shipwreck from 1894 has been found hundreds of feet below the icy surface of Lake Huron near the US state of Michigan, say researchers.

  The discovery of the Ironton confirms a tale by the only two survivors about why the other sailors who boarded the vessel's lifeboat still perished.
