title: 'NI election 2022: Deadline to apply for postal/proxy vote passes - BBC News'
date: '2022-04-12'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-61073776
content: |-
  Those applying had to complete an application form specifying the reason why they cannot vote in person.

  The deadline for applying to vote by post or proxy in next month's Northern Ireland Assembly election has passed.

  Those who wished to apply had to complete an application form specifying the reason why they cannot go in person to vote at a polling station by 17:00 BST on Tuesday.

  The assembly election is being held on Thursday 5 May across 18 constituencies.

  It is not possible to register online to vote by post or proxy in any part of the UK as legislation has never been updated to allow for this.

  SIGN UP FOR ALERTS: Get extra updates on BBC Northern Ireland election coverage

  Two hundred and thirty-nine candidates are standing, of whom 90 will be elected.
