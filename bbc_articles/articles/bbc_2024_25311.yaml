title: Politician's wife Lucy Connolly jailed for race hate post - BBC News
date: '2024-10-17'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cp3wkzgpjxvo
content: |-
  Lucy Connolly, wife of West Northamptonshire councillor Raymond Connolly, is jailed for 31 months.

  Lucy Connolly was being held on remand at HMP Peterborough prior to the hearing

  The wife of a Conservative councillor has been jailed for 31 months after calling for hotels housing asylum seekers to be set on fire. Lucy Connolly, whose husband serves on West Northamptonshire Council, posted the expletive-ridden message on X on the day three girls were killed in Southport. The 41-year-old childminder called for "mass deportation now" and added: "If that makes me racist, so be it." Judge Melbourne Inman KC told Birmingham Crown Court the sentence for these offences was intended to "punish and deter".

  The hearing was told Connolly, of Parkfield Avenue in Northampton, sent a WhatsApp message on 5 August joking that the tweet to her 10,000 followers had "bitten me on the arse, lol".

  Opening the case, prosecutor Naeem Valli said Connolly also sent a message saying she intended to work her notice period as a childminder "on the sly" - despite being de-registered. Mr Valli added: "She then goes on to say that if she were to get arrested she would 'play the mental health card'." The court heard Connolly, who had no previous convictions, also sent another tweet commenting on a sword attack, which read: "I bet my house it was one of these boat invaders." Another X post sent by Connolly - commenting on a video posted by the far right activist Tommy Robinson - read "Somalian I guess" and was accompanied by a vomiting emoji. Connolly appeared before the court via a video link to HMP Peterborough while her husband, councillor Raymond Connolly, watched the proceedings from the public gallery.

  Liam Muir, defending, said Connolly had lost a child in horrific circumstances and was distinguished from other offenders using social media in that she had sent the tweet at the heart of the case before any violence against asylum seekers had started. Mr Muir told the court: "The horrendous way in which she lost her son, being turned away from the health service, can only have a drastic detrimental effect on someone. "Whatever her intention was in posting the offending tweet, it was short-lived and she didn’t expect the violence that followed, and she quickly tried to quell it."

  Connolly appeared at Birmingham Crown Court for sentencing via a video link from HMP Peterborough

  Passing sentence, Judge Inman told the court that Connolly's tweet - which was read 310,000 times - was "intended to incite serious violence". "When you published those words you were well aware how volatile the situation was," he said. "That volatility led to serious disorder where mindless violence was used." Connolly wore a blue short sleeve top and appeared emotionless for most of hearing, pushing her hair back at times. The judge, considering the mitigation, noted Connolly's previous good character and that she did not repeat her statement. Connolly was ordered to serve 40% of her 31-month sentence in prison before being released on licence.

  Lucy Connolly has been jailed for 31 months by a judge at Birmingham Crown Court

  Det Ch Supt Rich Tompkins, head of crime and justice at Northamptonshire Police, said he hoped the sentencing demonstrated "that the police take reports of this nature seriously". "We will do everything we can to help our communities feel safe and protected from fear of violence," he added. "If you have been a victim of a hate crime, please contact us so we can investigate it. No one should be targeted for who they are."

