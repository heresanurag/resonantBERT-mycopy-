content: |-
  Jacob Bethell discusses his route from Barbados to England's T20 team, advice from Garfield Sobers and his friendship with Dan Mousley.

  Jacob Bethell qualifies to play for West Indies but opted for England after moving to the UK

  Jacob Bethell will be glad England players do not have to share rooms. At Warwickshire the 20-year-old rooms with another England new boy Dan Mousley. It is the biggest threat to their otherwise close friendship. "It was either I sort something out or I get moved out of the room. "Now I tape my mouth shut every time I share a room." Bethell and Mousley, 23, are two of five uncapped players in England's squad to play Australia this month as they build for the future.

  Bethell was still in school during England's World Cup win in 2019 and was being driven from Warwickshire to Yorkshire to make his county second team debut as a 15-year-old on the Sunday Eoin Morgan lifted the trophy at Lord's. Now he is tasked with replacing some of those World Cup winners. "I didn't get to watch a whole lot of it," he recalls. "It has been weird. "The first couple of training days I was like, jeez there are a lot of eyes on you - and a lot of eyes that have played a lot of cricket." As the latest England cricketer born and raised in Barbados, Bethell's path to this point has been well told. His grandfather, Arthur, was a first-class cricketer for Barbados while his father, Graham, also played for the island's talent-packed youth teams. Bethell's talent was spotted as a youngster in the Caribbean and he moved to Rugby School aged 12 on a cricket scholarship. The story goes that Brian Lara was among those impressed but the big break almost did not happen. "It was an under-18s game and I was about 12," he says, still speaking with his Bajan twang. "It was during an Easter camp and I wasn't supposed to be playing but would take my whites down in case someone didn't turn up. "It just happened the person didn't rock up and I got asked to play. I got 50-odd and four-fer – a half decent game."

