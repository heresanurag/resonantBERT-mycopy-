title: 'East Belfast: Man charged with murder after body of woman found - BBC News'
date: '2024-09-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cm29n3gz1pzo
content: |-
  Police discovered 43-year-old Rachel Simpson's body in the garage beside a house in Castlereagh Road.

  A 21-year-old man has been charged with murder after the discovery of a woman's body in east Belfast on Friday night.

  The woman has been named as 43-year-old Rachel Simpson.

  Ms Simpson's body was discovered in a garage beside a property in the Castlereagh Road area.

  The man is due to appear at Belfast Magistrates' Court on Monday.
