  Fashion entrepreneur Simon Suphandagli has set up a pop-up shop for London Fashion Week Men's, to help young fashion designers.

  Fashion entrepreneur Simon Suphandagli was granted a pop-up shop for London Fashion Week Men's, which he is using to help young fashion designers.

  Designer Emay is fulfilling a childhood dream of his and being environmentally friendly at the same time.
