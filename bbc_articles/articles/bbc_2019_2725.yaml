title: 'Gary McAllister: Football star ''punched outside Leeds bar'' - BBC News'
date: '2019-03-25'
section: England
url: http://www.bbc.co.uk/news/uk-england-47690607
content: |-
  Gary McAllister was reportedly waiting for a taxi outside a bar in Leeds when he was attacked.

  Gary McAllister was attacked in Leeds and needed hospital treatment

  Football star Gary McAllister has been attacked in the centre of Leeds.

  The Rangers assistant manager and former Leeds United captain was outside a bar in Call Lane when he was attacked at about 04:00 GMT on Saturday.

  He was reportedly punched in the face and required hospital treatment, and is said to be recovering at home.

  In a Facebook post, former Leeds player Dominic Matteo said the attack left McAllister without three teeth and needing plastic surgery and stitches.

  West Yorkshire Police has not named McAllister, but confirmed officers were investigating an alleged assault.

  McAllister, who is Steven Gerrard's assistant at Rangers, is said to be recovering at home in North Yorkshire, according to The Sun newspaper.

  The 54-year-old had been out for a meal in the city centre with his wife when they were attacked while waiting for a taxi, the newspaper said.

  In the Facebook post, Matteo described the attack as "totally unprovoked and very vicious".

  He added: "The attacker is thought to be American, and due to the severity of the injuries may have been wearing a 'knuckle duster' or similar."

  The attack happened on Call Lane in the city centre in the early hours

  McAllister won 57 caps for Scotland and captained the team to the Euro '96 finals.

  He played for Leeds from 1990 to 1996, during which time they became champions of the former First Division in 1992.

  He also captained the team for two seasons before moving to Coventry City.

  The former midfielder joined the management team at Coventry in 2002, after a period playing for Liverpool, and took up his role at Rangers last year.

  Det Insp James Entwistle, of Leeds District CID, said: "The initial report was that a man, aged in his 50s, was stood outside a bar when a man approached him and punched him in the face causing injuries that required hospital treatment.

  "We are currently arranging to speak to the victim to take fuller details of the incident and will be progressing the investigation to identify the person responsible."

  McAllister has been contacted for a comment.

