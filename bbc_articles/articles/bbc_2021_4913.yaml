  Simon Byrne appears at the Policing Board amid calls for him to resign over Bobby Storey's funeral.

  Coronavirus Catch-up: What are your questions on the vaccine rollout in NI?

  There's plenty still to come from the BBC News NI team this evening. In about half-an-hour Coronavirus Catch-up will be coming live from Belfast's SSE Arena - Northern Ireland's new mass Covid-19 vaccination centre. Presenter Jordan Kenny will be joined by senior GP Dr Alan Stout to bring you the latest developments and the answers to your Covid-related questions. Watch Coronavirus Catch-up live at 19:00 BST. Tune in on the BBC News NI website, the BBC iPlayer and the BBC News NI Facebook page.
