title: 'F1 Q&A: Lawson future at Red Bull, Ferrari, Hamilton, Leclerc and Racing Bulls
  - BBC Sport'
date: '2025-03-25'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cddyv2g45p7o
content: |-
  F1 correspondent Andrew Benson answers your questions following the Chinese Grand Prix in Shanghai.

  Were Ferrari at fault or unlucky with disqualifications?

  Oscar Piastri converted pole position to win the Chinese Grand Prix, as McLaren made it two wins from two races at the start of the season. Lando Norris finished second to make it a McLaren one-two, with George Russell's Mercedes completing the top three. Ferrari's Lewis Hamilton won the sprint race on Saturday but he and team-mate Charles Leclerc were both disqualified from the main grand prix. BBC Sport F1 correspondent Andrew Benson answers your questions after the race in Shanghai.

  How long do you think Red Bull will give Liam Lawson to get up to speed before contemplating a switch? - Jon It rather looks as if their patience has already run out. Red Bull are to discuss Lawson's future this week, and there is a strong possibility he will be dropped for the next race in Japan. If they go through with it, it will be regarded as a quite remarkable decision, which raises serious questions about the management at Red Bull Racing. In May last year, Red Bull team principal Christian Horner decided to re-sign Sergio Perez on a two-year contract taking him to the end of 2026. This was despite the fact that the Mexican was struggling as Max Verstappen's team-mate, and that the 2024 season looked to be going the same way as the year before - a bright start from Perez, and then an alarming slump in form. Horner could have brought in Carlos Sainz, who was a free agent following Ferrari's decision to sign Lewis Hamilton. But he remembered the tension between the Sainz and Verstappen camps when they were team-mates at Toro Rosso in 2015 and decided he did not want go there again. Re-signing Perez, Horner's theory went, would give him the confidence to recover his form. The strategy failed spectacularly. Perez's performances fell off a cliff, and the team slumped to third in the constructors' championship despite Verstappen winning a fourth world title by 63 points. Verstappen only won twice in the final 14 races of the year because the car lost competitiveness and became difficult to drive. Hence Perez's struggles. But Horner and Red Bull motorsport adviser Helmut Marko decided that Perez had had his day and they needed to make a change. They paid him off - to the tune of many millions of dollars - and signed Lawson. They picked the New Zealander over his much more experienced team-mate at the junior Racing Bulls team, Yuki Tsunoda, because they believed he had a mental toughness the Japanese lacked. Lawson has had a dire start to the season. He qualified 18th at the season-opener in Melbourne, where he crashed out of the race, and last in both the sprint and grand prix in China, failing to make much progress in either event. But Verstappen is also struggling - at least relatively. He is not hiding his belief that the car is the slowest of the top four teams - indeed he implied pretty strongly in China that he believed it may not be as fast as the Racing Bull. The Red Bull is nervous on corner entry, has mid-corner understeer and is snappy on exits. And the team don't seem to know how to fix it. Verstappen likes a sharp front end, but he doesn't want the car to behave like this. But he can cope, and get a lap time out of it. Lawson cannot, at least not yet. Lawson was talking in China as if he already knew the writing was on the wall. "It's just (got) a very small window," he said. "It's hard, you know – it's hard to drive, to get it in that window. I'd like to say that with time that'll come – I just don't have time to do that. It's something I need to get on top of." If Red Bull drop him after two races, the management will have some serious explaining to do. If signing him was the right decision in December, why is it the wrong decision now, they will be asked. If Tsunoda is the driver replacing him, the question becomes even starker. And if instead they choose Frenchman Isack Hadjar, who has impressed as Tsunoda's rookie team-mate in the first two grands prix, well, that's surely too early. Equally, if the first-order problem is the car - as it seems to be - why blame the driver? For many in F1 there is an aphorism that sums up Red Bull's approach to their second seat: "Insanity is doing the same thing over and over again and expecting different results."

  Liam Lawson finished 12th in the Chinese Grand Prix, eight positions and nearly 55 seconds behind Red Bull team-mate Max Verstappen

  Are Ferrari at fault for the double disqualification, or was it just unlucky and out of their control? – Ozan Formula 1 lives on the edge. To win, teams have to push their cars as close to the limit of the technical regulations as possible - because that is what everyone is doing. The line between success and failure is so fine. And weight and ride height are two of the key performance differentiators. One kilogram of extra weight in F1 costs approximately 0.035secs a lap. Multiply that by the 56 laps of the Chinese Grand Prix, for example, and it's two seconds of race time. Not a lot, but it could be the difference between winning and not, or one place higher or lower. That's just to explain why cars are run to the edge. And when you run to the edge, mistakes can happen. In the case of Ferrari on Sunday, Charles Leclerc's car was found to be 1kg underweight. Ferrari ascribed this to the fact that they had switched to a one-stop strategy, so the car finished the race with less rubber on the tyres than had they run the expected two-stop, and that was the difference between being over the minimum weight limit and under. Of course, other teams also switched to a one-stop, without ending up underweight. But exactly the same thing happened to Mercedes with George Russell in Belgium last year when he was disqualified from victory. As for Lewis Hamilton, his skid blocks had worn too much. Again, it's the sort of thing that can happen - indeed, it happened to Hamilton when he was at Mercedes in the 2023 US Grand Prix, and Leclerc in the same race. Again, it's about pushing the margins. Generally with these current cars, the lower they can be run, the more downforce they can create, as long as teams can keep the aerodynamics stable. But run them too low, and they risk wearing the floor excessively - and that's what happened. These things are generally not deliberate. They are just what can happen when pushing performance to the edge.

  Aside from the McLaren, who has impressed you the most at this very early stage? – SJM Racing Bulls have had a very strong start to the season. Tsunoda qualified fifth in Australia, and his team-mate Hadjar was seventh on the grid and Tsunoda ninth in China. The races have gone a bit wrong so far, but the car looks strong - in China, Verstappen was even implying it was better than the Red Bull. Racing Bulls use a fair few Red Bull parts but since Red Bull have started struggling that is not necessarily the boost it was in theory a year or two ago, when the close relationship between the two teams was causing concern among rivals. In the cockpit, Hadjar, notwithstanding his crash on the formation lap in Australia, has made a strong first impression. Overall, a very positive start to the year by the second Red Bull team.

  Racing Bulls' Isack Hadjar and Yuki Tsunoda both finished the Chinese Grand Prix but outside of the points

  How was there such a big gap between Lewis Hamilton's sprint pace and qualifying pace? Or how did the other drivers close the gap in such a short space of time? – Ash There is a combination of reasons. Ferrari hit the ground running in China and landed on a decent set-up for sprint qualifying in the single practice session before it. On top of that, Hamilton put in a brilliant performance on a track where he has always excelled to take pole. But there was an element of underachievement from other teams involved. The McLaren was the fastest car in China and Oscar Piastri was more comfortable in it than Lando Norris. Both made mistakes in sprint qualifying - so they ended up third and sixth on the grid. Hamilton converted pole into a lead at the first corner and then used the benefit of free air to maximise his opportunity. He drove superbly, but he was protected from Piastri for much of the race by Verstappen, who the Australian did not pass until four laps from the end, by which time Hamilton had built a lead too big to overhaul. The teams can change their set-ups after the sprint and it looks as if, by the time of grand prix qualifying, a more natural order emerged. As Hamilton put it: "We had a pretty decent car in the sprint, and then we made some changes to try and move forward and improve the car, but it made it quite a bit worse, basically, going into qualifying - and then it was even worse in the race." Among those changes seems to have been lifting the car slightly, which Hamilton more or less confirmed after the race: "I don't know who said we lifted the car, but we made some other changes, mostly, as well as that, but not massively, just small amounts." They did not work - team-mate Leclerc was faster than Hamilton in the grand prix even though he had a damaged front wing. And the changes were not enough to stop Hamilton's car wearing the skid blocks too much. Hence his disqualification. Throw in Leclerc's disqualification for his car being underweight and it was a bad day at the office for Ferrari.

  Why do teams put a board out from the pit wall as the drivers go through; surely all information is passed by the radio or telemetry? – Phil Pit boards are there to give non-essential information relating to the drivers - primarily laps remaining. The gap to the drivers in front and behind are often also included. They're also there as a back-up in case the radio fails. It is, to a degree, a hangover from the past. But it's also simple and effective and there is no reason to stop doing it and plenty of reasons to continue.

