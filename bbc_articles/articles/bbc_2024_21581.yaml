  The Conservative leadership contest has been whittled down to four candidates in a vote of Tory MPs.

  Mel Stride out as four left in Tory leadership contest

  Mel Stride, shadow work and pensions secretary, went out in the second round

  The Conservative leadership contest has been whittled down to four candidates after former cabinet minister Mel Stride was knocked out in a vote of Tory MPs. The former immigration minister Robert Jenrick finished top with 33 votes, with Kemi Badenoch second on 28 votes. James Cleverly and Tom Tugendhat got 21 votes each from Tory MPs, leaving Mel Stride with the fewest votes on 16. There will be further voting by MPs after the party’s conference next month to select the final two to be put to a vote of Tory members, who get the final say over who will be the new leader.

  Posting on X, formerly known as Twitter, Stride said, external: "Out of the contest but really enjoyed the journey. "Met so many wonderful people. Our party’s values still run deep and strong. "In time we will prevail. Thank you to everyone who had a kind or positive word for me along the way." The leadership contest winner will replace former prime minister Rishi Sunak, who stood down as party leader after leading the Conservatives to their worst performance at a general election in July. Former home secretary Priti Patel went out in the first round of voting by Tory MPs last week. In the second round, Jenrick and Badenoch slightly increased their vote shares, while Cleverly stayed on 21 and Tugendhat added four to his tally. Stride, former work and pensions secretary, was a loyal ally of Sunak when the Tories were in power and was often seen defending his decisions in TV interviews. Now shadow work and pensions secretary, he had tried to position himself as a steady hand who could restore the credibility of the Conservative Party after its historic defeat in the general election. Stride's leadership platform offered to unite the party behind Conservative values and win back the public's trust.

  The four remaining candidates posted to social media to thank their supporters. Jenrick told, external said “we can change our party for the better”, while Badenoch said, external the Conservatives “need a leader who can cut through in opposition, and defeat Labour and Reform”. Cleverly said, external “we must unite our party with Conservative values”, and Tugendhat thanked Stride, external for showing “our party has the economic vision and ideas that we need to win”. The final four have already made speeches setting out their visions and the next big moment to impress the Tory faithful will come at the party conference at the end of September.

  Each of them will make speeches and give interviews at conference, with the four put through their paces repeatedly in front of party activists. On the final day of conference, each candidate will give a speech in a repeat of the format that saw David Cameron emerge as the frontrunner to be the next Tory leader in 2005. It will be a vital opportunity to woo the party’s 121 MPs and convince them they can restore their electoral fortunes from opposition. An intensive round of hustings and multiple votes will follow the conference from 8 October, lasting three days, until only two candidates are left. Conservative Party members will then choose which of the final two candidates they want as the new leader, with the result announced on 2 November. A Labour Party spokesperson said the Tories had put forward "four people who played key roles in 14 years of chaos and decline". "Their failure to take responsibility for the mess they made, demonstrates that none of these candidates are cut out for the job," the spokesperson said.
