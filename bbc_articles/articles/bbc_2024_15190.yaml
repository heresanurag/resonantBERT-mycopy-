  Yamal has underlined his humble origins, holding his fingers up after scoring to show the postcode 304, the working-class, multi-cultural district of the Catalan town of Mataró where he grew up. It’s a place that a member of the far-right Vox party, Manuel Gavira, once described as a "multi-cultural dung heap". But the overwhelming sensation is that Spaniards are embracing their team, both for its performances and what it represents. El Periódico newspaper said "a young Spain, sassy and reinvigorated, has become the mirror for a country which has changed and is multi-racial and diverse". Even King Felipe joined in the plaudits, saying that the men’s team, radiated "excitement, joy and security", while praising the "sparkle" of Yamal. It's easy to forget that Yamal's selection raised eyebrows and led to accusations that De la Fuente - a relatively junior coach who had never worked with a top-flight club - did not have the experience to succeed. On the face of it, the team was a far cry from the star-studded side that conquered two European titles and the World Cup between 2008-2012. Now, there is a feeling that the national team has returned to the elite, restoring the self-esteem of Spanish fans in the process.

  Results are an obvious reason for the renewed belief. It has six wins out of six – a first for any team in the Euros – against opponents that included not just Didier Deschamps’s France, but also hosts Germany and Euro 2020 champions Italy. The style of those victories has also been crucial. Gone is the close-passing, possession-obsessed "tiki-taka" play which brought Spain so much success in the past. Instead, Spain is playing more directly, with two of its emerging stars, Williams and Yamal, wreaking havoc down the wings. The result is a less controlled and more thrilling style than in the past. Spanish fans, who abhor dull football, have bought into it. "Spain is going to win, without a doubt," said Luis García, a Venezuelan migrant who supports Spain. "They’ve shown that they are the best team. It’s amazing that the team has improved so much with this younger generation of players and that our hopes rest on these kids."
