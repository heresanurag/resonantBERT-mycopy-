content: |-
  The prime minister had to contend with pouring rain while announcing the General Election outside No 10.

  Prime Minister Rishi Sunak has announced a General Election that will take place on 4 July.

  Mr Sunak addressed the nation outside his residence on Downing Street, at a podium in the pouring rain.
