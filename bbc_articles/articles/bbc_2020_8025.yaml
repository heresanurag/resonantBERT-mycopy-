  Funding gap from coronavirus could see further council cuts

  Council services in Cornwall could see further cuts as a funding gap emerges due to coronavirus. The council has estimated the cost of Covid-19 and the accompanying lockdown measures at £74m, and has so far received about £40m from central government to cover the losses. "We may see further cuts to services which obviously we don't want to do," said Cornwall Council's deputy leader, Adam Paynter. "We've already had 10 years of austerity - the government has said that austerity is over and that they will support councils, but we don't know yet the full details of how they will guarantee the incomes that we usually receive," he added.
