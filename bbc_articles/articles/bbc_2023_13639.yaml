title: Watch elderly man air rescued after cliff fall - BBC News
date: '2023-09-25'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66918551
content: |-
  Authorities responded to a hiker who had fallen from a cliff next to the Golden Gate Bridge in San Francisco.

  The San Francisco Fire Department and the California Highway Patrol Golden Gate Division Air Operations unit responded to a call about a hiker who fell from a cliff next to the Golden Gate Bridge on Sunday. The man was taken to San Francisco General Hospital to be treated for the injures suffered because of the fall.
