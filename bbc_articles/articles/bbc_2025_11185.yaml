title: Deer gets stuck in garden gate railings in Surrey - BBC News
date: '2025-06-01'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cd0lygylygjo
content: |-
  An inspector from the RSPCA tried freeing it using a car jack, but the animal was wedged tight.

  An RSPCA inspector used a car jack to try to free the deer

  A deer has been rescued after getting wedged between the metal railings of a garden gate. The animal got stuck after attempting to squeeze through the gate at a property in Banstead, Surrey, according to the RSPCA. A man living at the house called the charity when he found it trapped as he was leaving for work. RSPCA inspector Jo Bowling said: "I tried freeing him myself with a car jack, but I couldn't lift the deer over the bottom bit of the gate on my own."

  She said: "We have no idea how it got there as their garden has 6ft high fence panels all the way round and the back gate into the fields was locked shut. "It seems he jumped into their garden and then tried to get out using the gate, but got himself stuck." The rescuers released the deer who fled "uninjured" into neighbouring fields.

  Rescuers used specialist kit to free the stricken animal

  "Deer are particularly susceptible to stress and therefore in many cases they do not survive for very long after being trapped. "It's wonderful on this occasion, after a careful assessment, that we were able to release the deer back to the wild. "It's always the best part of the job to see such a beautiful, powerful animal finally free and released back into the wild."

