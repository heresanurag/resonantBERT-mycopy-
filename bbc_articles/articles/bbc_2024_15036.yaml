title: 'New Zealand 24-17 England: All Blacks maintain Eden Park record as England
  come close - BBC Sport'
date: '2024-07-13'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cmj2k4dxv4xo
content: |-
  Substitute Beauden Barrett inspires a New Zealand fightback in their 24-17 win over England to claim the series at Eden Park.

  New Zealand's Beauden Barrett started both Tests against England on the bench

  Replacement Beauden Barrett inspired a New Zealand fightback in their 24-17 win over England to claim the series 2-0 at Eden Park. The All Blacks trailed by four points before two-time world player of the year Barrett was introduced off the bench to set up Mark Tele'a's second try and break English resistance. England had threatened to become the first side to win at Eden Park in 30 years after excellent tries by Immanuel Feyi-Waboso and Tommy Freeman handed them a slender advantage at half-time. In a frenetic game littered by handling errors on the greasy Auckland surface, the All Blacks struggled to wrestle back momentum and Marcus Smith stretched England's lead with a penalty before Barrett's arrival from the bench. The full-back cut a composed figure to steady the New Zealand ship as he first ran an excellent line against England's scramble defence to feed Tele'a - who had opened his account in the first half with a smart poach from the breakdown - before holding up Jamie George over the whitewash in the final play. Victory for the All Blacks maintains their formidable record at Eden Park and hands them a series win to kickstart Scott Robertson's era as head coach.

  England arrived at the spiritual home of All Black rugby sensing an opportunity to spring a famous upset after their narrow defeat in last week's first Test in Dunedin. Many of England's young squad were not born the last time New Zealand were beaten at Eden Park, by France in 1994, but they were undaunted. Tele'a handed the All Blacks the lead as he reacted quickest to pick up the ball from a ruck and scamper clear but England hit back through his opposite number Feyi-Waboso. The wing latched on to a pinpoint Marcus Smith cross-field kick before beating Tele'a and Damian McKenzie to score his fourth try in six England appearances. Smith was disappointing from the tee in Dunedin but his accurate kicking from hand is a real weapon for England and New Zealand failed to heed the early warning as Freeman was the beneficiary of another smart cross-field kick to hand the visitors the lead. They held a one-point advantage at the break but the All Blacks were boosted by the introduction of Beauden Barrett - the oldest of the three Barrett brothers in the matchday squad. The utility back prowled the back field and nullified England's kicking game as the hosts began to control the battle for territory. England were in touching distance of a first win in New Zealand since 2003 but although they came up short, their performances in both Tests show a marked improvement from when Steve Borthwick first took charge of this side before the 2023 Six Nations.

  The All Blacks pride themselves on their Auckland record and they were intent on keeping it intact. England flanker Chandler Cunningham-South grew up in New Zealand and impressed in the first Test but he was welcomed to Eden Park with a meaty double tackle from Codie Taylor and Finlay Christie less than a minute after kick-off. New Zealand made more handling errors than England and Taylor had moments of uncertainty in the line-out, but you cannot buy experience at the highest level. The hosts had more caps in their squad and the introduction of prop Fletcher Newell and Beauden Barrett from the bench shored up the set-piece and the backfield. Robertson will be tasked with equalling South Africa's record of four World Cup wins in 2027, but the new head coach has come through his first assignment. New Zealand have overcome Borthwick's side having only had just over a couple of weeks in camp and their preparations will now gear up as they look to defend their Rugby Championship title next month.
