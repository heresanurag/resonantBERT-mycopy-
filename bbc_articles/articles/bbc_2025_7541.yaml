  For months, Raymond Lloyd performed magic and even socialised with other Magic Circle members. When Ms Lloyd and Miss Winstanley later heard the society was going to begin accepting female magicians as members, they decided to come clean about their deception and Miss Winstanley told the society about it over the phone. But the Magic Circle did not take kindly to the news. The duo got a letter saying that Raymond had been expelled, and in October 1991, at the first meeting accepting women into the society, Ms Lloyd was kicked out. "We couldn't get our heads round it," Ms Lloyd said. Ms Lloyd spent about 10 years performing across the country as a magician, including performing anti-bullying shows, before she moved to Spain, where she took early retirement and has been involved in animal rescue work. Miss Winstanley went on to run a pottery firm in Norfolk, before she died in a car crash in 2004. The Magic Circle started a search for Ms Lloyd last year. "I felt it important that the Magic Circle should be able to recognise Sophie as the role model for women magicians, as well as show that we are now a completely open society," said Laura London, the society's first female chair. Ms Lloyd only found out about the search for her when her sister sent her a link to an interview. Initially reluctant to join the society because of the amount of time that had passed, she eventually decided to do it to honour Miss Winstanley's legacy.

  Sophie Lloyd (pictured on the left in 1991 and on the right in 2025) has joined the Magic Circle twice - once as Raymond Lloyd and once as herself

  Today, the Magic Circle is still heavily male-dominated. The society has around 1,700 members, of which 5% are women. Ms Lloyd will receive her new membership certificate at an event at the Circle's London headquarters on Thursday evening, which will feature performances by five magicians and be attended by both members of the society and the general public. The society says Miss Winstanley will also be recognised at the event. "This is for Jenny, really," Ms Lloyd said. "I just think Jenny would have loved it."

