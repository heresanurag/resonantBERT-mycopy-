title: Police investigate after 'Sara Sharif killer attacked in prison' - BBC News
date: '2025-01-03'
section: UK
url: http://www.bbc.co.uk/news/articles/c2exl843edmo
content: |-
  Urfan Sharif, who was convicted of murdering his daughter Sara, is said to have been assaulted in HMP Belmarsh on New Year's Day.

  Urfan Sharif was jailed at the Old Bailey in December

  Police are investigating after the father of Sara Sharif was reportedly assaulted in prison weeks after being jailed for the 10-year-old's murder. Urfan Sharif is said to have been attacked at Belmarsh Prison on New Year's Day by two other inmates in a cell, the Sun newspaper reported., external Sharif reportedly suffered cuts to his face, and it is understood he received medical treatment inside the prison. The weapon alleged to have been used in the assault was part of a tuna can. Sharif, 43, and Sara's stepmother were sentenced to life imprisonment after being convicted at the Old Bailey last month of killing Sara at their home in Woking, Surrey.

  A Prison Service spokesperson said: "Police are investigating an assault on a prisoner at HMP Belmarsh on 1 January. "It would be inappropriate to comment further while they investigate." Belmarsh is a Category A jail in south-east London housing some of the UK's most dangerous prisoners. A Met Police spokesperson said: "Police are investigating an allegation that a prisoner was assaulted at HMP Belmarsh on 1 January.

  The tragic story of Sara Sharif who was brutally killed by her father and stepmother.

  Sara was hooded, burned and beaten during a "campaign of torture" that lasted two years before her body was found at the family home in August 2023. Urfan Sharif was sentenced to a minimum of 40 years in prison for murder, while his wife Beinash Batool, 30, received a minimum of 33 years. Sara's uncle, Faisal Malik, 29, was sentenced to 16 years' imprisonment for causing or allowing her death. The three fled to Islamabad, Pakistan, with Sara's five siblings, the day before her body was found, prompting an international manhunt. They hid out there for four weeks before returning to the UK, where they were arrested.
