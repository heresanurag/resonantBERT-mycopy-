  Celtic open their SWPL title defence with an emphatic 9-0 win over Dundee United.

  Celtic opened their SWPL title defence with an emphatic 9-0 win over Dundee United.

  The flag was unfurled and trophy put on display pre-match at Celtic Park and the hosts soon began to dominate.

  Lucy Ashworth-Clifford's delightful chip gave the hosts the lead and they doubled their advantage when Colette Cavanagh crossed for Saoirse Noonan to head in from close range.

  Jenny Smith swept in Celtic's third just before the break and Bruna Lourenco's impressive strike came five minutes into the second half.

  Amy Gallacher added her name to the scoresheet from close range soon after and Noonan got her second at a corner.

  Debutant Signe Carstens' fine run and shot from outside the box made it seven and Maria McAneny's late double completed the scoring.
