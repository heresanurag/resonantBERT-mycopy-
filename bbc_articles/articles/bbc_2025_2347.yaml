title: Inside the Taliban's surveillance network monitoring millions - BBC News
date: '2025-02-27'
section: Asia
url: http://www.bbc.co.uk/news/articles/cjev9kzxeqqo
content: |-
  The Taliban say 90,000 CCTV cameras in Kabul will reduce crime but there are fears for human rights.

  Thousands of cameras are now being used to monitor the movements of Kabul residents

  In a crowded control centre, surrounded by dozens of TV screens, the Taliban's police force proudly shows off its newly-acquired network of 90,000 CCTV cameras - used to watch over the day-to-day lives of millions of people. "We monitor the entire city of Kabul from here," says Khalid Zadran, a spokesperson for the Taliban police chief, pointing to one of the screens. The authorities say such surveillance will help fight crime, but critics fear it will be used to clamp down on dissent and to monitor the strict morality code enforced by the Islamist Taliban government under their interpretation of Sharia law. The BBC are the first international journalists allowed to see the system in action. Inside the control room, police officers sit in rows watching the live streams from thousands of cameras, keeping tabs on the lives of the six million people who live in Kabul. From car licence plates to facial expressions, everything is monitored. "In certain neighbourhoods, when we notice groups of people and suspect they might be involved in drug use, criminal activities, or something suspicious, we quickly reach out to the local police," says Zadran. "They arrive swiftly to investigate the nature of the gathering." Under the previous government, Kabul was threatened daily with attacks from the Taliban and so-called Islamic State militants, as well as high profile kidnappings and car-jackings. When the Taliban retook power in 2021, they promised to crack down on crime. The dramatic increase in the number of surveillance cameras in the capital is a sign of growing sophistication in the way the Taliban enforce law and order. Before their return, just 850 cameras were in place in the capital, according to a spokesman for the security forces that were driven from power. However, in the past three years, the Taliban authorities have also introduced a range of draconian measures limiting people's rights and freedoms, especially those of women. The Taliban government has not been formally recognised by any other country.

  Taliban spokesperson Khalid Zadran says the surveillance system is being used to reduce crime

  The surveillance system the BBC is shown in Kabul features the option to track people by facial recognition. On the corner of one screen images pop up with each face categorised by age range, gender, and whether or not they have a beard or a face mask. "On clear days, we can zoom in on individuals [who are] kilometres away," says Zadran, highlighting a camera positioned up high that focuses on a busy traffic junction. The Taliban even monitor their own personnel. At a checkpoint, as soldiers popped open the trunk of a car for inspection, the operators focused their lenses, zooming in to scrutinise the contents within. The interior ministry says the cameras have "significantly contributed to enhancing safety, curbing crime rates, and swiftly apprehending offenders". It adds the introduction of CCTV and motorcycle controls have led to a 30% decrease in crime rates between 2023 and 2024 but it is not possible to independently verify these figures. However, rights groups are concerned about who is being monitored and for how long. Amnesty International say installing cameras "under the guise of 'national security' sets a template for the Taliban to continue their draconian policies that violate fundamental rights of people in Afghanistan - especially women in public spaces". By law women are not allowed to be heard outside their houses, although in practice this is not being strictly enforced. Teenage girls are prevented from accessing secondary and higher education. Women are barred from many forms of employment. In December, women training as midwives and nurses told the BBC they had been ordered not to return to classes. While women continue to be visible on the streets of cities like Kabul, they are required to wear a face covering.

  Fariba is worried the cameras will be used to monitor women's adherence to strict rules around the way they dress in public

  Fariba*, a young graduate who lives with her parents in Kabul, has been unable to find work since the Taliban came to power. She tells the BBC there is "significant concern that surveillance cameras may be used to monitor women's hijabs [veils]". The Taliban say only the city police have access to the CCTV system and the Propagation of Virtue and Prevention of Vice Ministry – the Taliban's morality police - does not use it. But Fariba is concerned the cameras will further endanger those opposed to Taliban rule. "Many individuals, especially ex-military members, human rights advocates and protesting women, struggle to move freely and often live in secrecy," she says. "There is significant concern that surveillance cameras will be used to monitor women's hijabs too," she says. Human Rights Watch, meanwhile, says Afghanistan does not have the data protection laws in place to regulate how the collected CCTV footage is held and used. The police say the data is kept only for three months, while, according to the interior ministry, the cameras do not pose a threat to privacy as they "are operated from a special and completely confidential room by a specific and professional person in charge". The cameras appear to be Chinese-made. The control room monitors and branding on the feeds the BBC saw carried the name Dahua, a Chinese government-linked company. Earlier reports that the Taliban were in talks with China's Huawei Technologies to buy cameras were denied by the company. Taliban officials refused to answer BBC questions about where they sourced the equipment. Some of the cost of installing the new network is falling on ordinary Afghans who are being monitored by the system. In a house in central Kabul the BBC spoke to Shella*, who was asked to pay for some of the cameras installed on the streets near her home. "They demanded thousands of afghanis from every household," she says. It's a large amount in a country where those women who have jobs may earn only around 5,000 afghanis ($68; £54) a month.

  Shella says she was asked to pay for the cost of some of the cameras

  The humanitarian situation in Kabul, and in Afghanistan in general, remains precarious after years of war. The country's economy is in crisis, but international aid funding has been largely stopped since the Taliban came back to power. According to the United Nations, 30 million people are in need of aid. "If families refused to pay [for the cameras], they were threatened with water and power cuts within three days," Shella adds. "We had to take loans to cover the costs. "People are starving - what good are these cameras to them?" The Taliban say that if people do not want to contribute, they can put in an official complaint. "Participation was voluntary, and donations were in the hundreds, not thousands," Khalid Zadran, the Taliban police spokesperson, insists. Despite the assurances, rights campaigners both inside and outside Afghanistan continue to have concerns over how such a powerful surveillance system will be used. Jaber, a vegetable seller in Kabul, says the cameras represent another way in which Afghans are made to feel powerless. "We are treated like trash, denied the opportunity to earn a living, and the authorities regard us as worthless," he told the BBC. *The names of the women interviewed for this piece were changed for their safety
