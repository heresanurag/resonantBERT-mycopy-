  Although care home residents and staff were placed at the top of the priority list agreed by the Joint Committee on Vaccination and Immunisation (JCVI), they are not getting the very first vaccinations.

  The government has explained this is because the chosen hospital hubs already have the facilities to store the vaccine at the required temperature of -70C. But Health Secretary Matt Hancock said the government was doing everything it could to overcome "significant challenges" to ensure care home residents were vaccinated as soon as possible.

