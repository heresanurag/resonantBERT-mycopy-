title: Sister of Bebe King witnessed Southport knife attack - BBC News
date: '2024-08-10'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/ce80x0jn44jo
content: |-
  The parents of six-year-old Bebe have released a tribute to their "sweet, kind, and spirited girl".

  Bebe King was "full of joy, light, and love", her parents have said

  The parents of Bebe King have said her older sister witnessed the stabbing attack that killed the six-year-old in Southport. Lauren and Ben King described Bebe as "full of joy, light and love" in a tribute released via Merseyside Police. Bebe was killed alongside Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, when a knifeman attacked a Taylor Swift-themed holiday club event on 29 July. Mr and Mrs King said their older daughter, nine-year-old Genie, had "shown such incredible strength and courage" since that day.

  "The response from Southport, the whole of Liverpool, and even further afield has deeply touched our hearts", Bebe's parents said

  Their statement said Genie's resilience was "a testament to the love and bond she shared with her little sister". The couple also thanked the public in Southport and beyond for the "outpouring of love and support" during this "unimaginably difficult time". All children injured in the knife attack have been discharged from hospital, police said on Thursday.

  On Monday 29 July, our world was shattered by the loss of our precious daughter, Bebe. Along with two other beautiful souls, Elsie and Alice, she was taken from us in an unimaginable act of violence that has left our hearts broken beyond repair. Our beloved Bebe, only six years old, was full of joy, light, and love, and she will always remain in our hearts as the sweet, kind, and spirited girl we adore. The outpouring of love and support from our community and beyond has been a source of incredible comfort during this unimaginably difficult time. From the pink lights illuminating Sefton and Liverpool, to the pink bows, flowers, balloons, cards, and candles left in her memory, we have been overwhelmed by the kindness and compassion shown to our family. The response from Southport, the whole of Liverpool, and even further afield has deeply touched our hearts, and we are so grateful to everyone who has reached out to us. We want to acknowledge our older daughter, Genie, who witnessed the attack and managed to escape. She has shown such incredible strength and courage, and we are so proud of her. Her resilience is a testament to the love and bond she shared with her little sister, and we will continue to support her as we navigate this painful journey together as a family. Our thoughts are also with everyone else involved in this tragedy and all those who were injured. We hope that they find strength and healing in the days ahead. To the children who witnessed this terrible event, we send our love and hope that they too can begin to heal, surrounded by the care and support of those who love them. To the emergency services, who acted with such care and professionalism on that terrible day: thank you. Your support has continued as you have looked after our family with compassion and dedication, and we will forever be grateful for the way you have helped us through this harrowing time. To our community, friends, and strangers who have shown us such love: Thank you. Your messages, your tributes, and your presence have meant the world to us and have helped us find some solace in our grief. We are also thinking of Elsie and Alice's families, who are sharing in this unimaginable loss, and we hold them close in our hearts. Our hearts are broken, but we find some comfort in knowing that Bebe was so deeply loved by all who knew her. She will forever be our shimmering star, and we will carry her with us in everything we do.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King were killed in the attack on 29 July

  On Tuesday, a memorial service was held in Southport's St Patrick's church for Alice, whose funeral is due to take place on Sunday. One speaker, who spoke on behalf of Alice's family, fought back tears as she said: "Alice, you are the most beautiful, strongest girl in the world and I hope you know we love you from the bottom of our hearts. "Keep smiling and dancing with the girls." Jean Stevenson, Elsie's great-aunt, previously said the seven-year-old was "absolutely the sweetest child you could ever wish to meet". Ms Stevenson said she had been teaching Elsie to sew, and remembered her delight at being able to make her own top.
