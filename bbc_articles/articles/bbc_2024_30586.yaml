title: Avanti West Coast strike at Christmas called off - BBC News
date: '2024-12-13'
section: Business
url: http://www.bbc.co.uk/news/articles/cn9g10x4w3po
content: |-
  Train managers will vote on a revised offer from the company in a dispute over working arrangements.

  Planned strike action by Avanti West Coast train managers over the Christmas period has been called off, the RMT rail union has said. The walkouts, announced earlier this week, had been planned for 22, 23, and 29 December, but that action will now not go ahead. The union said a new offer had been made that will now be put to train managers. Even if they reject that offer, by law unions have to give a minimum of two weeks' notice of strike action, so none would take place until the new year.

  The revised offer includes higher rest day working payments and other changes to working arrangements. This includes more organised allocation of work on rest days, a union spokesman said. The RMT said train managers will vote on the offer in a referendum that finishes on 17 December. Train managers usually work a 41-hour week but due to staff shortages can be asked to work on their days off. The RMT had said that this situation was "unacceptable". About 300 train managers had been expected to join the walkout, limiting train services on those three days. Avanti runs services between London and Glasgow and Edinburgh, plus to stations including Birmingham, Liverpool and Manchester. Avanti West Coast said it was "pleased that the RMT have decided to suspend these strikes which would have caused major disruption to our services". "This will come as a relief to our customers who were making travel plans over the Christmas period," it said, adding that it remains open to discussions with the union.
