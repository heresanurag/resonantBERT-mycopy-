title: Farmers gather at Eikon for protest over inheritance tax changes - BBC News
date: '2024-11-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/clygwpe17evo
content: |-
  Thousands packed into the Eikon Exhibition Centre to protest against planned changes to inheritance tax on family farms.

  Farmers gather for protest over tax changes

  Thousands of farmers gathered at the Eikon Exhibition Centre in Lisburn

  Thousands of farmers have come together to protest against planned changes to inheritance tax. The event at the Eikon Exhibition Centre in Lisburn, organised by the Ulster Farmers' Union, was also attended by politicians as well as agricultural leaders. Farmers say the cap of £1m on agricultural property relief (APR) announced in the Budget last month will see the next generation deterred from taking over family enterprises. The rally was called ahead of national protests in London on Tuesday.

  Earlier, a cross-party letter signed by all of Northern Ireland's MPs was sent to Chancellor Rachel Reeves. The letter called on her to reconsider her plans to change APR, which reduces the amount paid when farmland is passed to the next generation.

  Paul Crawford said he was worried about how the tax change would affect the next generation of farmers

  Paul Crawford, from Islandmagee in County Antrim, brought nine-month old Rowan to Monday's rally. "Already he will sit there and chat to the calves and the lambs all day long," he told BBC News NI. "But if these sort of rules come in there might not be the opportunity for him to do that and carry that on."

  Catherine McAdoo, a young beef and dairy farmer, said: "At the end of the day it's going to be the next generation that is going to deal with the consequences if it's not sorted."

  First Minister Michelle O'Neill and Agriculture Minister Andrew Muir were among the politicians there - they are pictured with Ulster Farmers' Union president William Irvine

  Before the event, farmer Martin Cunningham, who is among those set to be affected, spoke to BBC News NI. Martin has always dreamed of taking on his family's farm in the Belfast Hills and building on what his great-grandfather started. But he says the Budget announcement ending APR on inheritance tax has ended that. "If this farm’s handed down to me, I'll have an incredible tax bill to pay," Mr Cunningham said.

  Martin Cunningham is worried about the future of his family's farm

  "I'll have to sell land in order to pay that, I'm going to have to sell land over the value of £200,000," he said. "It's not simple to sell land up here, it's either all or nothing."

  Since 1984, APR has allowed land used for crops or raising animals, as well as farm buildings, cottages and houses, to be exempt from inheritance tax. From April 2026, it will only apply to the first £1m of the estate, with anything over that value taxed at 20% - half the usual rate. Research by the Department of Agriculture, Environment and Rural Affairs suggests a third of farmers in Northern Ireland will be affected, with the dairy sector particularly badly hit.
  • None How are the inheritance tax rules changing?

  The average farm in Northern Ireland is about 100 acres and land values have risen in recent years. For Mr Cunningham, this means the value of his family's almost-200 acres alone puts the farm over the £1m tax-free bracket. That's before any equipment, farm buildings and house are taken into account.

  The average farm in Northern Ireland is about 100 acres and land values have risen in recent years

  Speaking to BBC Radio Foyle’s North West Today programme on Monday, farmer Ian Buchannan said he believes changes to inheritance tax will be “the final straw that has broken the camel’s back” for many farmers. Mr Buchannan, who has a farm outside Dungiven, County Londonderry, said he, like many other farmers, are very concerned over what this will mean for the future of farming in Northern Ireland. “The return we get on an investment on a farm, say it is worth one million or two million pounds, whatever the farm value is, it is well known that the return on that is 0.5% net profit per year – which is peanuts,” he said. “60%-80% of all farm income over the last 10 years in Northern Ireland comes from subsidies."

  Farmer Ian Buchannan says there is "a lot of mental stress” within the farming commmunity

  “Farms are like parcels that are passed down; you don’t open it but you just pass it on – farms are not generally sold unless a [family] line dies out," Mr Buchannan said. “This is incredibly tough for a lot of farmers and I do feel there is a lot of mental stress within the community.”

  Farmers from across the UK are preparing for a rally in London on Tuesday, calling on the Chancellor Rachel Reeves to reverse the changes. But the Treasury has rejected proposals that would soften the impact.
