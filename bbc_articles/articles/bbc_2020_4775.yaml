content: |-
  From a helipad to the streets, millions thank front-line workers risking their lives to fight coronavirus.

  From a helipad to the streets, millions of people across the UK have shown their appreciation for front-line workers risking their lives to fight coronavirus.

  It's the ninth week in a row that Clap for Carers has taken place.
