title: Haiti police raid gang leader Barbecue's stronghold in capital - BBC News
date: '2025-03-02'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c78ejpvdlezo
content: |-
  Officials say several gang members have been killed in a major police operation in Port-au-Prince.

  Gang control in Port-au-Prince has led to an almost complete breakdown of law and order

  The government of Haiti says police have launched a large-scale operation in a shantytown controlled by powerful gang leader Jimmy Chérizier, who is widely known as Barbecue. The authorities say several gang members have been killed in the Lower Delmas area of the capital Port-au-Prince. Local reports say military drones carrying explosives are being used in the operation. Prime Minister Alix Didier Fils-Aimé praised the assault. He said it was the work of a special task force created two days ago to tackle insecurity.

  Jimmy 'Barbecue' Chérizier has become one of the most powerful gang leaders in Haiti

  Chérizier, aged 47, is the feared leader of Viv Ansam (Live Together), a coalition of gangs that control much of the city. It is not clear whether Kenyan police officers deployed in Haiti last year to help fight the gangs are involved in the security operation. Last week, a Kenyan police officer - who was on patrol with the Kenyan-led Multinational Security Support mission - was killed in a confrontation with gang members.
  • None The men fighting gang leader Barbecue for power in Haiti Gang control in Port-au-Prince has led to an almost complete breakdown of law and order, the collapse of health services and emergence of a food security crisis. More than 5,500 people were killed in gang-related violence in the Caribbean nation in 2024 and more than a million people have fled their homes. Haiti's transitional presidential council, the body created to re-establish democratic order, has made little progress towards organising long-delayed elections.
