content: |-
  The girl's father used his jacket to cover her body, placed a US flag over her and took her away.

  No survivors have been found since the first few hours after the building collapsed

  A firefighter has carried the body of his own seven-year-old daughter from the rubble of the apartment block that collapsed near Miami last week.

  He had kept vigil at the site for nine days and was there when she was extracted from the ruins.

  Stella Cattarossi was one of two more victims pulled from the wreckage on Friday, taking the death toll to 22, with 126 people still missing.

  Residents of another block have been told to leave on safety grounds.

  Crestview Towers Condominium residents were ordered to evacuate by North Miami Beach Building Department.

  Officials are investigating many of the local tower blocks for structural faults following the partial collapse of the Champlain Towers South condominium in Surfside on 24 June.

  An engineer report from January states that Crestview is "not structurally nor electrically safe for continued occupancy", local TV outlet Miami Seven reports.

  Crews continue to scour the wreckage of the 12-storey Champlain Towers South for survivors, despite the risk of falling debris and an incoming hurricane.

  Stella Cattarossi is the third child to be recovered from the site in the Miami suburb of Surfside.

  She was with her mother, grandparents and an aunt visiting from Argentina, according to local10.com.

