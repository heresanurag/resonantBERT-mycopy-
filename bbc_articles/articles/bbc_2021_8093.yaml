  "When he was made aware that we were close to where his loved one may have been, then he stood side by side with some of his other fellow firefighters," Miami Fire Rescue Capt Ignatius Carroll told WPLG.

  "We were able to bring her and then at least give him an opportunity to say his farewells."

  Stella's father used his jacket to cover his daughter's body, placed a small US flag over her and carried her out of the area.

  The other body found has not yet been publicly identified.

  On Friday the mayor of Miami-Dade County ordered the demolition of the remaining structure of Champlain Towers South, amid fears it could collapse on rescue crews below.

  The bodies of two sisters, Lucia Guara, 11, and Emma Guara, four, were found on Wednesday.

  No-one has been pulled alive since the first hours after the Champlain Towers South apartment block caved in on itself in the early hours of 24 June as residents slept.

  Some 126 people remain missing nine days after the collapse

  Rescuers are keen to make progress before the arrival of Storm Elsa, a 75-mph (120kmh) hurricane that could potentially hit Florida early next week.

