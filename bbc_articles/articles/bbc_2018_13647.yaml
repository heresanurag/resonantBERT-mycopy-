  Mr Hunt said on Monday the UK government had "never seen any evidence" the spying charges were true.

  Prime Minister Theresa May's official spokesman also said on Monday: "As we've been clear, we didn't agree with the charges, but we are grateful to the UAE government for resolving the issue."

  This video can not be played To play this video you need to enable JavaScript in your browser. Daniela Tejada: "My hopes had been shattered on so many occasions"

  Following her husband's arrival back in the UK, Ms Tejada thanked "the international community and the international media who were very supportive from the beginning".

  She said in a statement: "I hope you can all understand that Matt and I, as well as his family, really need some time to process everything that we have been through.

  "No one should ever have to go through what he did and it will take him time to heal and recover. He is very overwhelmed.

  "To say we are happy is an understatement."

  Matthew Hedges has always maintained his innocence and said he had been researching his PhD

  Matthew Hedges praised his wife and said: "I thank you all once again, this is very surreal."

  British businessman David Haigh, who spent nearly two years in a Dubai prison for fraud, which he denied, warned that returning home would not be the end of the matter.

  The former managing director of Leeds United said: "It's not an acquittal. He is still a convicted spy, so he's going to have all sorts of issues for his life in terms of travel and going forward.

  "But also he was six months in solitary confinement, so that's going to have a lasting effect - I'm sure he saw many horrors."
