  Ruben Amorim says he is ready to face the challenge of the "difficult" job ahead at Manchester United.

  This video can not be played To play this video you need to enable JavaScript in your browser. I'm ready for the challenge - Amorim before starting role as Man Utd manager

  New Manchester United head coach Ruben Amorim says he is under "no illusions" as to the difficulty of the job facing him at Old Trafford. The 39-year-old was appointed on a two and a half year deal earlier this month. While he moves to Old Trafford this week, he will not be able to officially start work until he gets his visa, which is expected to take a couple of days. Amorim signed off from his time at Portuguese side Sporting with a 4-2 win against former club Braga on Sunday night. "I feel ready for the new challenge," Amorim told reporters after the match. "I'm not naive, I know it's going to be very different, very difficult. "I'm at peace now. I can focus on my new job and I'm looking forward to starting tomorrow. "I know it will be difficult to reproduce what I have here anywhere else but there are other places with different exposure and pressure."

  Amorim will have 13 days during the international break to prepare for his first match in charge away against Ipswich in the Premier League on 24 November. A combination of the number of players leaving for international duty this week, and some of those not called up being given time off, means that it will be largely those who are injured that Amorim first gets to see when he reports for duty at United’s Carrington training complex. Amorim has predominantly played a 3-4-3 system during his time in Portugal and says he knows how he wants to set up his team at Old Trafford. "I know how I am going to play in the beginning because you have to start with a structure that you know and then you will adapt with the players that you have," said Amorim. "Some injuries or no injuries, what kind of players, the abilities to defend, to attack... I will discover that in the next few weeks." United are yet to confirm the precise nature of Amorim's backroom team and whether Ruud van Nistelrooy, who took interim charge following Erik ten Hag's sacking, will remain at the club. Van Nistelrooy said he had been told by the club there would be an update on his own situation after the Leicester match and that he expected to find out on Sunday night or Monday. "I have to talk with him tomorrow," Amorim said on Sunday night. "I will explain everything. I'm very clear and I will tell you like it is. So let's wait until tomorrow."

