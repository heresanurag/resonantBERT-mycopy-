content: |-
  Footage shows the chaotic aftermath of an attack on a mosque in Egypt that left at least 235 dead.

  Footage shows the chaotic aftermath of a bomb and gun attack on a mosque in Egypt that left at least 235 dead.

  Militants opened fire on worshippers at the al-Rawda mosque in the town of Bir al-Abed during Friday prayers.
