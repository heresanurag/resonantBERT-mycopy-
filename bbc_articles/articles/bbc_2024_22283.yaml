  As in Jack’s case, he says anyone restraining Joe must be specially trained. Joe's placement costs his local authority, Halton Council, £13,600 per week - about £750,000 per year. Judge Parker describes the costs of placements as “breathtaking” and comments that local authorities are “essentially being left to the mercy of the private sector”. He says that local authorities are often faced with “Hobson’s Choice” (a choice that is no choice at all). Speaking to the BBC after the court hearing, Ms Derbyshire says that while there are excellent Ofsted-registered placements run by private companies who do not charge excessive rates, there are also private care providers who are not registered or inspected - some of these, she says, “are in it for the wrong reasons”. Ms Derbyshire says some of these unregistered providers charge “staggering” sums, and says the placements are not usually staffed by trained social workers, nor do they offer specialist or therapeutic care.

  Samantha Derbyshire: Some providers may be exploiting the care system for profit

  However, she says it is difficult for councils to challenge the rates. “They will always say it’s an executive cost or it’s a responsible individual cost or a management cost,” she tells us. “And equally it’s difficult for us at this moment in time to engage in those conversations because we know there’s 10 other children waiting for that one bed.” Ms Derbyshire says her council is not an outlier and many others face similar problems. Last year the Local Government Association said “immediate national action” was needed. Responding to the BBC report Ofsted national director for social care Yvette Stanley said that “urgent action across the whole of national and local government” is needed now. She said that unlawful children’s homes were a “huge concern” to the regulator. Ms Stanley told the BBC “it can’t be right” that the most vulnerable children are without the safeguards the regulator provided - like inspection, and power to enter the homes where they lived. She said these children, some requiring medication, some subject to restraint, could be “at risk of actual harm today” from untrained staff, or those who had not been checked through the disclosure and barring service. Its CEO, Dr Mark Kerr, says his members want to see action taken against unregistered homes: “They’re warehousing children [who are] not getting the care that they need.” Dr Kerr says the government also needs to support new specialist provision for children like Jack and Joe. At the moment, he says, it would be difficult to accommodate them in homes with other children.

  The Minister for Children and Families, Janet Daby, has told us that the government is committed to “cracking down on providers making excessive profits”, and that measures will be contained in the upcoming Children’s Wellbeing Bill, Labour’s flagship legislation on education and children’s care. “It is devastating that these young people are being let down by a system that should be keeping them safe,” she says. Meanwhile, more children like Jack and Joe are coming before the Family Court. The number of DoL orders has increased 12-fold in the past six years, from just over 100 per year to 1,200. Ms Derbyshire tells us she often worries about whether these children are safe. “I’m constantly thinking - where are they going tonight and is somebody looking after them to the standards which we expect?”
