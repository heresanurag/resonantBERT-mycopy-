id: bbc_2017_2654
title: 'Brexit: Barclays ''committed to London'' - BBC News'
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/business-39062975
content: |-
  Barclays is making plans in case the UK loses access to the EU single market after Brexit, but is committed to London, chief executive Jes Staley says.

  Barclays will keep the bulk of its operations in London after Brexit, even if the UK loses access to the single market, chief executive Jes Staley says.

  The bank is making Brexit plans including expanding operations in Ireland and Germany, he tells BBC business editor Simon Jack.
