content: |-
  Brendan Rodgers is appointed Leicester City's new manager after leaving his job at Celtic.

  Last updated on .From the section Leicester

  Brendan Rodgers has been appointed Leicester City's new manager after leaving his job at Celtic.

  The Northern Irishman has signed a contract until June 2022 and succeeds Claude Puel, who was sacked on Sunday after 16 months in charge.

  It marks a Premier League return for Rodgers, who previously managed Liverpool and Swansea City.

  "I'll give my life to make the supporters proud of their club," Rodgers said.

  He watched from the stands as the Foxes beat Brighton 2-1 on Tuesday and spoke to the players in the changing room after the game.

  Adding that he was "privileged and honoured" to take on the role, Rodgers said: "Together, we'll be stronger and I'm looking forward to working with the players, staff and supporters to make the right steps forward."

  Neil Lennon replaces Rodgers at Celtic as interim manager until the end of the season.
  • None 'Sentiment trumped by ambition' - why Rodgers' Celtic exit is no surprise

  Former Arsenal, Liverpool, Manchester City and Celtic defender Kolo Toure also joins Leicester as a first-team coach, having worked as a member of Rodgers' backroom staff at Celtic.

  While at Liverpool, Rodgers almost won the Premier League title in 2013-14 before he was sacked in October 2015.

  He then took over at Celtic in May 2016 and won all seven domestic trophies available, most recently leading them to the Scottish League Cup in December.

  During his two and a half years in Scotland, he also qualified twice for the Champions League group stage and broke the 100-year-old British unbeaten domestic record with a 69-game unbeaten run.

  Rodgers has also managed Watford and Reading and was named the LMA Manager of the Year in 2014.

  "I'm absolutely delighted to bring a manager of Brendan's calibre to Leicester City," said club vice-chairman Aiyawatt Srivaddhanaprabha.

  "I look forward to seeing what he, our talented, young squad and our dedicated, skilled team of staff can achieve together."

  Rodgers will be Leicester's fourth permanent manager in 23 months after Puel, Craig Shakespeare and 2015-16 Premier League-winning manager Claudio Ranieri were all sacked.

  Saturday's 4-1 defeat by Crystal Palace meant Leicester had lost four consecutive home Premier League games for the first time since January 2000.

  They have conceded the first goal in 19 Premier League matches this season - more than any other side.
