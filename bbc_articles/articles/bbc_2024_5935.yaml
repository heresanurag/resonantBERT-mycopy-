title: Motorcyclist falls from Milton Keynes bridge after collision - BBC News
date: '2024-03-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-68610723
content: |-
  Video shows a rider being pushed against railings by a car after a disagreement with its driver.

  Video showed the moment a motorcyclist was thrown from his bike and over a bridge after being hit by a car.

  Police said driver Nikesh Mistry, 34, had forced the rider on to the wrong side of the carriageway following a "non-verbal exchange" as the pair exited Walton Roundabout in Milton Keynes on 19 November 2022.

  The motorbike was pushed into the bridge railings, causing the rider to come off and fall over the edge before the car collided with an oncoming vehicle.

  The rider of the motorcycle suffered serious injuries and was airlifted to hospital, while the occupants of the cars were taken there by ambulance.

  Mistry, of Groundsel Close, Walnut Tree, Milton Keynes, admitted two counts of causing serious injury by dangerous driving and one count of causing grievous bodily harm with intent.

  He was jailed for four years and 10 months at Aylesbury Crown Court and will need to take an extended driving test before getting his licence back.

