  Verstappen being at the front sets up an intriguing race. Rain is forecast overnight and into the morning, and in the wet the Dutchman always excels. But the first race of the season in Australia was also wet, and there the McLarens had his measure. In Melbourne, Norris and Piastri pulled out a significant lead over Verstappen as the track slowly dried before further rain. Verstappen came back at Norris later on, but Norris held him off, even with a car with a damaged floor. And if it's dry, there has to be a question mark over whether Verstappen can keep up a pace fast enough to fend off the McLarens. Having the supernatural ability to pull off a single qualifying lap that gets every last millisecond out of a car is one thing. But if the car is not balanced, it's unlikely to be able to be as competitive over a race distance. Piastri, winner last time out in Shanghai, said: "We've got good pace. Max has obviously done a great job getting up on pole. But we've also got a great car for tomorrow and (are) still in the fight for the win." Norris was looking to the weather forecast when he said: "It's probably going to be a bit of a race like Melbourne, and that was an exciting race for everyone. "Now I've got to try and do some overtakes, you know? The unknown of the weather is going to make it exciting and nerve-racking for everyone. And I've got to try to get past the guy on my left (Verstappen). So, yeah, excited." If it's wet, the stakes are high for everyone. Suzuka is arguably the most challenging race track on the calendar - hence the extreme satisfaction Verstappen felt at producing such a lap to grab pole. Rain should lessen the risk of the race being interrupted by the grass fires that have caused five red-flag stoppages through practice and qualifying - certainly that's the hope of the governing body - but it makes the challenge of Suzuka even more extreme. Alex Albon, who starts ninth in his Williams, said: "This track in the wet is really difficult. It's got a lot of rivers and it's quite dangerous around here. The one good thing about it being wet is hopefully no grass fires."
