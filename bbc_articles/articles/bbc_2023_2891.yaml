id: bbc_2023_2891
title: 'Turkey and Syria earthquake: Aerial footage shows Syria aftermath - BBC News'
date: '2023-02-06'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-64539126
content: |-
  Drone footage shows the earthquake aftermath and the search and rescue operation in Idlib, Syria.

  Drone images show the earthquake aftermath in the town of Sarmada in the countryside of the north western Syrian Idlib province in Syria.

  Members of the Syrian civil defence, known as the White Helmets, are searching for casualties under the rubble.

  The huge earthquake has caused devastation across southern Turkey and northern Syria. More than 1,200 people are known to have died, but that number is expected to rise.
