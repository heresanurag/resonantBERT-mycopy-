content: |-
  Anna Beaumont was on holiday when she got into difficulty in the water at Discovery Cove.

  Anna Beaumont was described by her family as a beautiful soul

  A 13-year-old girl drowned after getting into difficulty in the water at a Florida theme park during a family holiday, an inquest has heard. Anna Beaumont from St Fagans, Cardiff, was on holiday in the US state with her family when they visited the Discovery Cove theme park on 28 May. On Wednesday, a coroner in Pontypridd was told that Anna's father heard a lifeguard whistle at about 10:20 on the day of the incident and saw Anna was in trouble. Attempts were made to revive her by lifeguards at the scene and she was taken to the Arnold Palmer hospital in Orlando.

  But despite doctors' efforts, she died at 17:22 on 31 May. A post-mortem examination was carried out at the hospital, with the cause of death given as drowning, followed by seizure disorder, the inquest was told. Area Coroner Patricia Morgan said she was opening a formal investigation because she had "reason to believe the death was unnatural". Ms Morgan said the investigation would focus on Anna’s "past medical history and the circumstances leading to her sad passing". She said it would require further information to be obtained from Florida and adjourned the inquest. “I wish to express my condolences to the family of Anna Beaumont at this sad time," she said. Anna, a pupil at Radyr Comprehensive School, was previously described by her family as "a beautiful soul".
