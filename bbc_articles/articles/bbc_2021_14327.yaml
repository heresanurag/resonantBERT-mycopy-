title: 'Storm Arwen: Falling tree kills man as Storm Arwen hits UK - BBC News'
date: '2021-11-26'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-59429484
content: |-
  A tree fell on the man's car in Northern Ireland as the Met Office issued a red warning for parts of Scotland and England.

  There were high winds in Burghead harbour at about 2pm Image caption: There were high winds in Burghead harbour at about 2pm

  Crystal Jones, from Burghead in Moray, says her community has been "badly hit" by the high winds.

  That included damage to roofs, trees down and fences uprooted.

  "Power has flickered but not gone out. Our house has sustained minor roof damage but we're staying indoors and safe," she says.
