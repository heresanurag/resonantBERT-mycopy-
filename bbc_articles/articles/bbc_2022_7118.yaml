  CCTV footage has been released to try to identify two people seen near the statue shortly before the damage was caused.

  The bronze statue was originally destined for Parliament Square in Westminster

  A council-installed CCTV camera overlooks the bronze statue of the Iron Lady

  "We hope that the distinctive clothing, build, and gait of the individuals could help lead to identification," police said.

  Both people are dressed in dark clothing and have face coverings, with one person having white stripes running down their trousers.

  The other person has dark shoes with a red Nike logo and white soles.

  Anyone with information, especially a cyclist who was in the area at the time, is asked to get in touch with the force.

