title: Two Orkney couples married in joint ceremony celebrate 70 years - BBC News
date: '2025-04-10'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/cwyngk3kk8go
content: |-
  In 1955 in Orkney a brother and sister married their sweethearts at the same ceremony and now they are celebrating with family 70 years on.

  Tommy Budge, Thelma Budge, Violet Flett and Leslie Flett on their wedding day

  Two couples who got married together in 1955 have put the foundation of their 70 years of marriage down to spending plenty of time apart. Tommy Budge and Thelma Bruce had a joint ceremony with Tommy's older sister Violet Budge and Leslie Flett in Kirkwall, Orkney. The four have now marked the rare double platinum anniversary together, this time with their children, grandchildren and great-grandchildren for company. They described their earlier times together as days of leaving post-it notes for each other rather than phone calls or modern-day text messages, and joked that time spent apart had helped them stay together.

  Thelma is now 87, Tommy is 89, Violet is 91, with Leslie now aged 94. Between them, they have seven children, eight grandchildren, and five great-grandchildren.

