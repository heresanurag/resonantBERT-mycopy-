content: |-
  More than 70 people died in Kentucky in Friday night's storms, including dozens in a candle factory.

  More than 70 people have died in Kentucky after Friday night's storms, including dozens in a candle factory, and the death toll is expected to rise above 100.

  The governor of Kentucky has said the tornado system was "the deadliest to ever run through" the US state.

