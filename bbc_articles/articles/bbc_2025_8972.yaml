title: University of Greater Manchester suspends vice chancellor - BBC News
date: '2025-05-14'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cx2jvv20xv4o
content: |-
  The University of Greater Manchester suspends George Holmes after 'serious allegations' are raised.

  Professor George Holmes has led the university for 20 years

  The University of Greater Manchester has suspended its vice chancellor following a range of "serious" allegations. Professor George Holmes, who has led the university for 20 years, has been suspended alongside two senior members of academic staff at the institution, formerly known as the University of Bolton. It comes after the university commissioned an independent inquiry into allegations made about the institution in Bolton following an investigation by The Mill, external news outlet. A spokesman for Greater Manchester Police said the force was holding its own investigation into "allegations of financial irregularities at the university".

  It comes after Lucy Powell, leader of the House of Commons, told MPs in March that the police and the Office for Students (OfS) were investigating "serious allegations" of racism, bullying and financial misconduct. Her comments came after Phil Brickell, the Labour MP for Bolton West, said he had been contacted by whistleblowers with further allegations about "concerning practices" at the institution.

  The police probe follows "a review of allegations published in The Mill, and subsequent report commissioned by the university's Fraud Response Panel," the police spokesman added.

  The university has taken action after an independent investigation

  In a statement a university spokesman said the suspensions are a "precautionary measure and do not imply any assumption of guilt". A statement by the university on Tuesday said: "The university was made aware of the report's findings following its investigation into serious allegations raised in the media and subsequently in Parliament." "The university has taken this step to ensure a fair and transparent process. "As the university's internal procedures, involving all relevant parties, have now begun, we are not able to comment further until such matters are concluded." Dr Greg Walker has assumed the role of acting vice-chancellor and interim accountable officer during the investigation. In December, the University of Bolton changed its name to the University of Greater Manchester following approval from the OfS.

