  Your player ratings out of 10 for Colombia v England at the World Cup.

  Last updated on .From the section World Cup

  England survived the dreaded penalties to beat Colombia and reach the quarter-finals of the World Cup. Harry Kane scored from the spot in normal time and converted in the shootout to earn the highest marks in our Player rater. If you are viewing this page on the BBC News app please click here to see the ratings.
