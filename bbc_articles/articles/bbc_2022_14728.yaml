title: 'COP27: Antonio Guterres apologises after reading wrong speech - BBC News'
date: '2022-11-10'
section: General
url: http://www.bbc.co.uk/news/world-63581486
content: |-
  Antonio Guterres apologises after being given a speech intended for an event for young people at COP27.

  The United Nations Secretary General sparked a few moments of laughter at COP27 when he started to read from the wrong speech.

  His staff quickly brought him the correct papers and he explained he was meeting a group of young delegates later in the day and that that speech was for that event.
