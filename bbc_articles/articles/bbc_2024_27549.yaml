title: Glasgow Warriors forward trio drop out Scotland squad - BBC Sport
date: '2024-11-11'
section: Scottish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/c9vn1rw71y9o
content: |-
  Three Glasgow Warriors forwards drop out of the Scotland squad through injury as club-mate Johnny Matthews and Scarlets' Alex Hepburn are called up.

  Jack Dempsey (centre) was injured after starting Sunday's loss to South Africa

  Glasgow Warriors forwards Jack Dempsey, Max Williamson and Gregor Brown have all dropped out of the Scotland squad as Gregor Townsend's side prepare to face Portugal on Saturday. Club-mate Johnny Matthews and Scarlets prop Alex Hepburn have been called up as replacements. Number eight Dempsey picked up a shoulder injury after starting Sunday's defeat by South Africa. Lock Williamson suffered a hand injury after coming on as an early replacement following Scott Cummings' red card, while flanker Brown, who did not feature at Murrayfield, has a rib injury.

  Hooker Matthews, who has one Scotland cap, was a surprise absentee from Townsend's original squad following fine try-scoring form for his club. Portugal visit Murrayfield on Saturday in the second of Scotland's Autumn Series internationals, which conclude with the visit of Australia on 24 November. Meanwhile, Glasgow lock Cummings will face an independent disciplinary hearing following his ruck infringement against South Africa. He will learn his fate via video link at the hearing, which is due to take place on Tuesday evening.
