title: 'Channel migrants: Crossings in 2022 now exceed whole of 2021 - BBC News'
date: '2022-09-13'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-62889043
content: |-
  A total of 28,592 people have crossed the Channel so far this year, compared to 28,526 in 2021.

  Dover MP Natalie Elphicke has said tackling small boat crossings must be a top priority for Prime Minister Liz Truss

  The number of people who have crossed the English Channel in small boats so far this year has now exceeded the total for the whole of 2021.

  The Ministry of Defence (MoD) said 601 migrants made the crossing on Monday in 19 boats, bringing this year's total so far to 28,592 people.

  In 2021, the total was 28,526 people.

  The latest crossings come as the High Court hears a challenge against the government's plan to send migrants to Rwanda.

  The Home Office will not comment on these figures, saying it would be inappropriate in a period of national mourning.

  There's no doubt though that they will be causing concern for the new home secretary, Suella Braverman.

  On her appointment, she said controlling immigration would be a top priority.

  The Rwanda policy is facing a number of legal challenges, so any flights to Kigali would be some way off, if they are ruled to be legal.

  In the shorter term, the Home Office may look to strengthen relations with the French authorities, to try to stop boats setting off in the first place.

  The 2022 figure to date is almost double the number of people that had been detected by this point last year, which was just over 14,600.

  August saw the highest daily total on record, with 1,295 people crossing in 27 boats.

  The number of people reaching the UK in small boats from France has increased steadily in recent years.

  In April, former home secretary Priti Patel signed what she described as a "world-first agreement" with Rwanda in an attempt to deter migrants from making the journey to the UK.

  However, several asylum seekers, the Public and Commercial Services Union and charities Care4Calais, Detention Action and Asylum Aid are embroiled in a court case with the Home Office as they challenge the legality of the policy.

  The first deportation flight - due to take off on 14 June - was grounded amid legal challenges.

