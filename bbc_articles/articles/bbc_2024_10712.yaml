title: King enjoys 'most marvellous' record of Coronation - BBC News
date: '2024-05-03'
section: UK
url: http://www.bbc.co.uk/news/uk-68931958
content: |-
  For 700 years there has been a handwritten account of coronations, and this one took 56 days to finish.

  The King and Queen were shown the 21-metre long roll, which the King said "goes on for miles"

  King Charles has been presented with a beautifully illustrated record of his Coronation, almost a year after the historic service at Westminster Abbey. For at least 700 years, monarchs have been given a "Coronation roll". Stretching for 21 metres, the hand-stitched manuscript was written by calligrapher Stephanie von Werthern-Gill. And there are no nightmare spelling mistakes, bar a single dot missing over an 'i'. "Most marvellous illumination work," said the King, while Queen Camilla said she would need "my specs" to read it.

  The Coronation roll is as much a work of art as an official record of events

  For the first time, the manuscript did not use any animal skin. But spare a thought for the calligrapher who wrote it. Like a massive roll of historic wallpaper, the roll includes 11,500 elegantly inscribed words, using specially made ink. In an epic achievement of concentration, Stephanie says she kept going for 56 days, without any weekend breaks, determined to keep her rhythm going, phone switched off, her calm sustained by breathing exercises and classical music. "It was very intense," she says, but the outcome "feels like a piece of art". "All the right spelling?" joked the King, when he looked at the huge roll, which he said "goes on for miles".

  In fact, there was only a single dot missing on a letter i in the hand-stitched pages of copperplate writing, which she'd managed to spot.

  Stephanie von Werthern-Gill focused for 56 consecutive days on her copperplate handwriting of the 11,500-word document

  The result was shown to King Charles and Queen Camilla at Buckingham Palace on Wednesday, as the King continues his return to duties after more positive news about his ongoing cancer treatment. This is the official state record of a monarch's accession and Coronation, but it is now as much an artwork as a formal document. It includes intricate illustrations by Tim Noad, who must soon be the country's most widely viewed, but least well-credited, artist. Because as well as illustrating this historic document, he is the designer of the King's cypher, the logo that you will begin to see on new banknotes, public buildings, uniforms and eventually on new post boxes.

  The digital version of the roll includes an interview with Penny Mordaunt

  The roll records the ceremonies, processions and promises of the Coronation service and shows who was there in the Abbey, particularly those with a ceremonial role, as well as the long lists of royal guests, politicians and overseas representatives. But not everyone gets a mention. When the document is finally lodged in the National Archives, there will be no record of Ant and Dec or Katy Perry having been there. And there is not even a hello for Lionel Richie. They have been reduced to a catch-all heading of "Other groups". There is also no mention of the protests by anti-monarchists that day.

  Ant and Dec were guests but have not made it into the record of the Coronation

  This Coronation roll, the first for 70 years, is intended to be more accessible than its predecessors, so there will be an online video version at www.coronationroll.gov.uk, external with recordings of some of those present, such as Leader of the Commons Penny Mordaunt, famous for her sword-carrying skills. The King and Queen watched the video of themselves at their own Coronation. It was like the most upmarket-ever edition of Gogglebox. Deputy Prime Minister Oliver Dowden, who presented the roll to the King, said: "For the first time, this Coronation roll will be digitised - bringing the tradition into the 21st Century and giving as many people as possible the opportunity to see it." Also for the first time the official signing of the roll was carried out in front of the cameras, at an event in the College of Arms in London, a venue atmospheric enough to have been used as a location in a James Bond film.

  The rolls were once seen as important evidence of allegiance to a monarch, says Sean Cunningham of the National Archives

  The finished roll, which travelled in a big covering of unhistoric looking bubble wrap, was carefully signed by the clerk of the crown in chancery, Antonia Romeo. The original documents, signed by the King on the day in Westminster Abbey, in big black ink, are also now stitched into this long scroll. The King, who has an occupational interest in signing things, looked at earlier versions of rolls on shiny parchment and said: "You'd have frightful difficulty signing on that."

  The oldest surviving roll is from Edward II's Coronation in 1308

  The oldest surviving roll is from the Coronation of Edward II in 1308. It is in remarkably good condition, considering it had been stashed away in the Tower of London for hundreds of years before later being more carefully protected in the National Archives. Until this latest 2024 roll, all the previous versions had been written on materials made from animal skin. But this time the roll has been recorded on high-quality paper, reflecting other modern changes such as the Coronation oils also being made animal-free. Dr Sean Cunningham, from the National Archives, said that rolls once had a very practical political purpose. It was documentary proof of the legitimacy of a reign, with evidence to show rebellious nobles about the promises they had made. "In medieval times when the crown was contested a lot more, these were important records of the authority of an incoming monarch. It's about the loyalty and allegiance to that new king," says Dr Cunningham.

  The King and Queen watching the video version of their own Coronation

  The rolls have also been crib sheets for how to run a Coronation. Charles II used them to find details "to add lustre and splendour to the solemnity" of his crowning in 1661. Medieval rolls were consulted for James II's Coronation in 1685. The early rolls were written in Norman French and Latin, with the first version fully in English not until 1820 and the Coronation of George IV. Queen Camilla raised the question: "Why are they called rolls not scrolls?", and the answer was because of the Rolls Chapel where they were kept. The roll for King Charles III, an exercise in craftsmanship as much as record-keeping, is expected to go on public display, before being stored in the National Archive, so that future generations can unroll this moment of history.

