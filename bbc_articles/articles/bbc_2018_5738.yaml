title: Spider trained to jump on demand - BBC News
date: '2018-05-08'
section: General
url: http://www.bbc.co.uk/news/science-environment-44039857
content: |-
  This is a regal jumping spider, and there are no prizes for guessing what it's good at.

  The diminutive arachnid, which is nicknamed Kim, can leap six times her body length from a standing start.
