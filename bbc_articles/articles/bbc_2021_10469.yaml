title: 'Afghanistan: Joe Biden said chaos was ''inevitable'' - BBC News'
date: '2021-08-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-58264718
content: |-
  In an interview with ABC, Joe Biden said nobody could have anticipated the speed of the Taliban takeover.

  In an exclusive interview with ABC News' George Stephanopoulos, Joe Biden said nobody could have anticipated the speed of the Taliban's takeover.

  The US president has been criticised for his handling of the withdrawal.

  "The idea that somehow, there's a way to have gotten out without chaos ensuing, I don't know how that happens," Mr Biden told ABC News.
