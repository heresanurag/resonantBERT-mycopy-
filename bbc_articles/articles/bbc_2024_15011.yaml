title: Suspect in John Hunt's family killings has not spoken to police - BBC News
date: '2024-07-12'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cd1jxz0439lo
content: |-
  Prime Minister Sir Keir Starmer says the government will look at legislation around crossbows following "this awful incident".

  Crossbow killing suspect 'yet to speak with police'

  Kyle Clifford was found injured near a cemetery in north London

  A man suspected of killing three women in a crossbow attack remains in hospital in a serious condition, police say. Carol Hunt, 61, Hannah Hunt, 28, and Louise Hunt, 25, died at their home in Bushey, Hertfordshire, on Tuesday evening. Hertfordshire Police have recovered a crossbow but have not been able to question suspect Kyle Clifford, 26, after he was found injured at a cemetery on Wednesday. Tributes to the family have flooded in, with the victims described as "wonderful, hard-working, kind women".

  Prime Minister Sir Keir Starmer announced the government would look at the legislation around crossbows following “this awful incident”. The victims were the wife and two daughters of BBC Racing commentator John Hunt, and Mr Clifford is the ex-boyfriend of Louise Hunt. Emotional tributes have been paid to the family and a church vigil was held in Bushey on Thursday.

  Carol Hunt (left) and her daughters Louise (top right) and Hannah were killed

  Hertfordshire Police said in a statement that Mr Clifford was still receiving medical treatment in a London hospital. "At this stage, he is currently in a serious condition and is yet to speak with officers," it said. "A crossbow has been recovered as part of the investigation." Police previously confirmed "no shots were fired" by officers as they captured Mr Clifford at Lavender Hill Cemetery in Enfield. The force said there were no reports of "prior police contact between Hertfordshire Constabulary, Kyle Clifford and the victims".

  There has been an outpouring of grief among friends and colleagues of the family

  Det Supt Rob Hall, from the Bedfordshire, Cambridgeshire and Hertfordshire Major Crime Unit, said: “Our thoughts remain with the victims’ family and loved ones at this devastating and indescribable time. They are being supported by specially trained officers. "This was an unprecedented attack and we are determined to understand the full circumstances of what happened that evening and the events leading up to it. We are wholly committed to seeking justice for the victims and their family. "This investigation, as I’m sure people can imagine, will take time. I’d like to reiterate my sincere thanks to the members of public who contacted us yesterday and helped with our enquiries."

  Prime Minister Sir Keir Starmer commented on the case on Thursday evening. He said: "First let me say how awful this was, and our condolences and thoughts are with all of the family and those affected. "In relation to crossbows, the home secretary has announced she will look at the legislation, and we will." Home Secretary Yvette Cooper will look at the findings of a Home Office review into crossbows carried out earlier this year. A Home Office spokeswoman said: "The home secretary will swiftly consider the findings to see if laws need to be tightened further."

  Forensic teams and detectives are still at the house where the attack happened on Tuesday

  Tributes to the family have flooded in from friends, fellow broadcasters and from members of the sporting world. In Bushey, more than 50 people attended a vigil at St James’s Church to pay their respects. Sally Golding who knew Hannah Hunt as her beautician, said: “I felt I needed to come today. “Hannah was just a really, really lovely bubbly person with a great personality. She was a sweet girl, a very happy little soul."

  Lea Holloway, a longstanding friend of Carol Hunt, was in tears as she left the church. “I’ll miss Carol like crazy. There were four of us who were close friends, and we were pregnant at the same time," she said. "I can’t believe this has happened. It’s the thing nightmares are made of. "I feel for their oldest daughter and John. I can’t imagine what it must feel like."

  A vigil was held at St James's church in Bushey

  Bouquets of flowers have been mounting at the family home in Ashlyn Close as friends and neighbours of the Hunt family left messages of condolence. "I wish none of this were real," reads one. “Rest in peace Carol, Hannah and Louise,” one of the cards reads, and another, “This is heartbreaking". Luisa, 36, said she had been a client of Louise's dog grooming business, Groom and Glow, for three years. She added: "I hope they are remembered as wonderful, hardworking, kind women, rather than victims." Hannah Hunt's colleagues at the Anti-Ageing Clinic in Radlett have expressed their "deep regret and sadness" over her death. They said on social media that "she was a fantastic therapist and clients loved her". The post continued: "We send our condolences and prayers to her dad, sister and family."

  Floral tributes have been placed in memory of the family

  Tributes to the Hunt family and expressions of support from sports personalities and broadcasters have also been appearing on social media. After Wednesday’s England victory in Euro 2024, the former England footballer Michael Owen posted on social media: "And while the country celebrates, spare a thought for John Hunt. I can't remember feeling so utterly horrified in years." The football commentator Jacqui Oatley said: "I couldn't/didn't want to tweet about football yesterday due to the utter horror of hearing about John Hunt's family. "What a truly lovely, wonderful man he is. He has had so much support. He'll need it."

  A minute's silence was held in memory of commentator John Hunt's family at Newmarket Racecourse

  A minute’s silence was held at Newmarket Racecourse in Suffolk on Thursday afternoon in memory of the victims. In a statement, the British Horseracing Authority said: "The thoughts of everyone at the BHA are with John Hunt, his family and friends at this shocking and tragic time. "It is impossible to comprehend the horror that has been inflicted upon them by this dreadful event." Jockeys at Kempton Park Racecourse wore black armbands to show support on Wednesday. The Sky commentator Mike Cattermole said it was "hard to comprehend and process the shock and disgust of what happened to John Hunt and his family". "John lived for his girls, they were the world to him."

  Flowers and messages of condolence have been left near the scene at Ashlyn Close
