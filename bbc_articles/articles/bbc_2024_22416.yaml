title: How the Hezbollah exploding device attacks unfolded - BBC News
date: '2024-09-19'
section: General
url: http://www.bbc.co.uk/news/videos/cy80nwggdz8o
content: |-
  More than 20 people, including at some children, have been killed after pagers and walkie talkies exploded, Lebanon says.

  Hundreds of pagers used by members of the armed group Hezbollah exploded across Lebanon on Tuesday, killing 12 people including two children.

  Iran’s ambassador to Lebanon was among 2,800 of people who were wounded by the simultaneous blasts in Beirut and several other regions.

  Hezbollah, which is backed by Iran, said the pagers belonged “to employees of various Hezbollah units and institutions” and confirmed the deaths of eight fighters.

  The group blamed Israel for what it called “this criminal aggression” and vowed that it would get “just retribution”.

  The next day, exploding walkie-talkies killed several people and injured at least 300 across Lebanon, the country's health ministry said.
