  The weekly report on Covid-19 linked deaths show that there has been a total of 4.070 fatalities.

  Five years before air travel is back to normal says minister

  Transport Secretary Michael Matheson has predicted air travel to and from Scotland will take at least five years to return to pre-coronavirus levels. A limited number of flights have continued during lockdown and he said the Scottish Government expects "a slow recovery of some air services" over the summer. This will start with domestic services and be followed by international routes, he said. In a written answer to Scottish Conservative MSP Dean Lockhart about the speed routes can be re-established, Mr Matheson said: "Realistically, it will take at least five years for services to recover to pre-Covid-19 levels."
