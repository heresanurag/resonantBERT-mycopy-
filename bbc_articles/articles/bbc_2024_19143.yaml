title: 'Smarden: Rescued Ukrainian lion arrives at Kent sanctuary - BBC News'
date: '2024-08-19'
section: Kent
url: http://www.bbc.co.uk/news/articles/cgm7w94dlkgo
content: |-
  Three-year-old lioness Yuna has arrived at her new enclosure at The Big Cat Sanctuary.

  Yuna arrived at The Big Cat Sanctuary in Kent on Saturday

  The first of two lions rescued from Ukraine has successfully arrived in Kent after leaving war-torn Kyiv. Yuna, a three-year-old lioness, has shell shock but it is hoped she can now heal at her new home at The Big Cat Sanctuary in Smarden. Rori, a male lion, is currently in Belgium and will join the sanctuary when a specially built enclosure is completed in November. Briony Smith, a keeper at The Big Cat Sanctuary, said Yuna was "so brave" and "had been through so much".

  The big cat completed her 1,400-mile (2,253km) journey at 01:00 BST on Saturday. Cam Whitnall, from The Big Cat Sanctuary, witnessed the effects of war on Yuna. He said: “When the bombs hit last year she suffered from shell shock and concussion and she wouldn’t stand for a very long time. "You could see from her body movement that she was suffering and she wouldn’t eat. “For the last three months she has got a loss of co-ordination when she walks."

  Yuna will be joined by Rori in November when a new enclosure is built

  While the lion's new enclosure contains trees and ramps for her to climb up, staff have removed most to ground level so that she cannot hurt herself. Mr Whitnall said: "We are trying to get her outside and build up the muscles on her legs and get her out to feel grass under her paws for the very first time." The sanctuary is aiming to raise £500,000 to complete the facility to be able to eventually bring a total of five lions from Kyiv to Kent.
