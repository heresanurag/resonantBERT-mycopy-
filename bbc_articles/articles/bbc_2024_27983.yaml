title: 'Newspaper headlines: City to get ''bonuses early'' and PM ''backs thought
  police'' - BBC News'
date: '2024-11-15'
section: The Papers
url: http://www.bbc.co.uk/news/articles/ckg0kx3v6m0o
content: |-
  A speech by Chancellor Rachel Reeves and a row over non-crime hate incidents make the front pages.

  City to get 'bonuses early' and PM 'backs thought police'

  A number of different investigations into non-crime hate incidents (NCHI) feature on Friday's front pages. The Times, external says it has found evidence of "confusion" among police after Freedom of Information requests revealed that children as young as nine have been investigated over such incidents in the classroom, something that is not supposed to happen. The Daily Telegraph, external reports that three police forces have been involved in the investigation into a social media post by one of its journalists, Allison Pearson, prompting what the paper calls a "major backlash" from critics who fear a threat to free speech. And the Daily Mail, external says Sir Keir Starmer has been told to "police the streets, not tweets" after Downing Street said the prime minister supported police action to "capture data" on incidents and comments which are not serious enough to constitute a crime. The Guardian, external says more than 250 unpaid carers could face trial after falling foul of what the paper calls "draconian" benefit rules over the past six months. It reports that campaigners are calling for a halt to prosecutions of people unable to return benefit overpayments while an independent review of the carers allowance is carried out. With the headline, "stop the cosmetic cowboys", the Daily Mirror, external has launched a campaign to ban unlicensed surgeons from carrying out procedures such as Brazilian butt-lifts in the UK. The paper says a woman has died and hundreds of other patients have been left injured after high-risk operations at unregulated clinics. The paper's calling for further legal safeguards, including a requirement for practitioners to have malpractice insurance.

  Donald Trump announced on Thursday that he would nominate anti-vaccine activist Robert F. Kennedy Jr as his health secretary

  Across the pond, Donald Trump's nomination of Robert F. Kennedy Jr as his new health secretary has drawn some strong reactions. The Los Angeles Times, external says Kennedy is a lawyer who's built a loyal following of people who admire his lawsuits against pesticide and pharmaceutical companies, but adds that he is also an anti-vaccine activist who will now be in charge of the agency overseeing drug and vaccine safety. The Boston Herald, external similarly says Kennedy is "one of the most prominent anti-vaccine activists in the world" and has views that have been decried as "dangerous" by many public health officials. In a damning editorial, the New York Post, external, which endorsed Trump for the presidency, says the appointment breaks the overriding rule of medicine - "do no harm" - and warns that Kennedy's views on health are a "head-scratching spaghetti" of "what can only be described as warped conspiracy theories".

