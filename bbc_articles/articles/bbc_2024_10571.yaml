id: bbc_2024_10571
title: Nigel Farage rules out standing for Reform UK in general election - BBC News
date: '2024-05-24'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-69052837
content: |-
  Reform leader Richard Tice says his party will contest 630 of the 650 seats up for grabs on 4 July.

  Reform UK founder and honorary president Nigel Farage has announced he will not stand in the general election. There was speculation he would be unveiled as a parliamentary candidate by Reform leader Richard Tice. But Mr Farage told the BBC six weeks was "not long enough" to fight a constituency while campaigning for the party around the country. Launching Reform's campaign, Mr Tice said it would field candidates in all but 20 of the UK's 650 constituencies. The party would contest 630 seats across England, Scotland and Wales "no ifs, no buts", he said. Mr Farage said he would be "100 per cent behind" Mr Tice - travelling across the country, speaking at rallies and doing interviews. "You'll see a lot of me," he added. Earlier, in a statement posted on X, he said he would "do my bit to help" the party, but now was "not the right time to go any further than that". Mr Tice will stand in Boston and Skegness in Lincolnshire, where Conservative MP Matt Warman had a majority of 25,621 in the 2019 general election. Reform currently has one MP, Lee Anderson, who defected from the Tories in March. "Contrary to what all the commentators say, the likes of my good friend Lee Anderson and myself, we are going to win seats," Mr Tice told the party's campaign launch in London. He played down Mr Farage's decision, saying he would "be helping out significantly" during the election campaign. The GB News presenter is cancelling his show on the channel for the duration to free up time for campaigning.

  Calling it "the immigration election", Mr Tice hit out at high levels of net migration, "establishment experts" and the "weak, feeble politicians who have broken Britain". Rishi Sunak had "bottled it" and decided to "cut and run" by calling a summer election instead of holding on for the autumn, he argued. He said the prime minister was "absolutely terrified" by Reform's upward progress in the opinion polls, "terrified as to where this may end up". The latest polls put the party at around 11% of the national vote, ahead of the Liberal Democrats, and Reform says it will have enough candidates to contest every seat. Reform insists it is targeting both Conservative and Labour voters, but evidence from recent by-elections suggests the Tories have the most to fear from the party, which Mr Farage led from 2019 to 2021 when it was known as the Brexit Party. In the last general election in 2019, it did not stand in constituencies won by Conservatives in 2017.

  Mr Farage had previously said he would not make an eighth attempt to become an MP at Westminster under its first-past-the-post electoral system. In his statement, external, he suggested his priority would be helping his friend, Donald Trump, return to the White House. He said he had "thought long and hard as to whether I should stand in the upcoming general election". "As honorary president of Reform UK, I am fully supportive of Richard Tice's leadership and urge voters to put their trust in him and Lee Anderson. "Important though the general election is, the contest in the United States of America on November 5 has huge global significance. "A strong America as a close ally is vital for our peace and security. I intend to help with the grassroots campaign in the USA in any way that I can. "The choice between Labour and the Conservatives is uninspiring, and only Reform have the radical agenda that is needed to end decline in this country."

