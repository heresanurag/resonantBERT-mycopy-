  A busy day at in the Ulster Hospital in Dundonald as two sets of triplets are born within 24 hours.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Two sets of triplets have been born within 24 hours in the Ulster Hospital at Dundonald in County Down.

  On Tuesday, Brendan and Kirsty McMenamin from Downpatrick in County Down had Zoey, a baby girl, and two boys called Cameron and Brody.

  On Wednesday, Claire and Johnny Stewart from Donaghadee in County Down had three baby girls Libby, Evie and Annie.

  Claire Stewart said she had been "shocked but delighted" when she found out she was having triplets.

  "One of my first responses was: 'I'm so glad my mum's retired', she said.

  "The practicalities did come into my head - I only have two hands, what do I do with the third one?"

  Her husband Johnny said he was glad he was sitting down when he found out, but it was a "pleasant surprise".

  "We had an early scan and I remember just listening to the consultant say, 'do you want to hear something interesting?'

  "He said it was twins. Before we had a chance to recover from that he said: 'Actually hold on a minute - it's triplets.'"

  He said the birth had been "calm", despite the fact that there were more than 20 people in the room and students looking in the windows.

  Mrs Stewart said: "We were overwhelmed. I lay there with tears rolling down my face, but just to hear their cries was amazing.

  "We held them before the teams took them off".

  More than a handful - the proud parents with their babies

  Mrs Stewart said twins run in her family.

  "My younger brother and sister are twins.

  "My mum is signed up to move into the spare room," she added.

  How do they feel from about going from being a couple to a family of five?

  "It really hit us when we got cards with our names and all their names - that really warmed our hearts," said Mr Stewart.

  According to Cambridge University Hospitals NHS Foundation Trust triplets occur naturally in approximately one in 10,000 pregnancies and quadruplets are even more rare.
