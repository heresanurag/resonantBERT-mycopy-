content: |-
  Zaza the tiger cub is practising her roar, but it is more of a squeak at the moment.

  This is Zaza, the first tiger cub born in a zoo in Wales.

  She arrived on 25 May at Manor Wildlife Park in Pembrokeshire, which said she had been "bonding beautifully" with her mother Terima.

  Sumatran tigers are one of the world's most endangered tiger subspecies, threatened by loss of habitats and poaching.

  Zoo animal manager Rick Newton called Zaza a "beacon of hope for the conservation of Sumatran tigers," adding that the zoo was "committed to ensuring she grows up healthy and strong".

  It may be a while until she perfects her roar, though.
