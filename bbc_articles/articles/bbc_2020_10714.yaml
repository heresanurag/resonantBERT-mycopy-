id: bbc_2020_10714
title: 'Birmingham stabbings: Video shows emergency vehicles - BBC News'
date: '2020-09-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-54042489
content: |-
  Video posted on social media shows emergency service vehicles, and parts of the city centre have now been cordoned off.

  Video posted on social media shows a number of emergency service vehicles in Birmingham.

  West Midlands Police said they were called to reports of a stabbing at around 00:30 BST on Sunday, with other stabbings reported shortly afterwards.

  Parts of the city centre have now been cordoned off by officers.
