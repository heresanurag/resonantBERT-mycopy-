  It would be foolish to say Nwaneri is yet a perfect replacement for Saka - but he is arguably the best Arsenal currently have in their squad. The touch maps of Saka in his final full Premier League match before injury - the goalless draw with Everton - and Nwaneri's against Brentford are very similar, suggesting the youngster fits most naturally into Arsenal's usual system. Meanwhile, Martinelli's against Ipswich - where he holds much closer to the byeline as would be expected from a right-footed right winger - shows just how differently Arsenal are forced to play with him in that role. In that game, the Brazilian failed to have a shot or create a chance for a team-mate - and no other Gunners player who lasted the full 90 minutes had fewer touches of the ball. Back in his more familiar role on the left against the Bees, Martinelli had four shots, created four chances and, for the second time in three games, scored.

  While Nwaneri impressed out wide against Brentford, Jesus continues to thrive down the middle. Before Saka went off against Crystal Palace, Jesus had one goal in 20 appearances. Since then Jesus has six in four, as many as in his previous 48 games. A remarkable 23% of his goals for the club have come in the past two weeks. Whether freed up by Saka's absence or stepping up to shoulder his share of responsibility, it has been a extraordinary, timely and welcome transformation. "It is a quality of the team to share the goals," said Arteta. "They [Jesus and Martinelli] are so consistent in the way they train and behave." Fans have been clamouring for Arsenal to sign an attacker in January and the calls have gained volume since Saka's injury. Whether they enter the market remains to be seen. They cannot sign anyone on loan, as Sterling and back-up keeper Neto fill their two temporary slots from top-flight clubs. And, without arguably their biggest star, it will be a tricky ask to stay in touch with leaders Liverpool until Saka returns, potentially as late as March. But with impressive resolve from the players to fill the gap left by their injured comrade - and with a starry young talent growing his reputation still further - there are more than a few sparks of hope.
