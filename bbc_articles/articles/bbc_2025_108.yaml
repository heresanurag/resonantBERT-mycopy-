content: |-
  With Bukayo Saka out until March, 17-year-old Ethan Nwaneri shows glimpses against Brentford to give Arsenal hope.

  'No-one can replace Saka' - but Nwaneri, 17, gives Arsenal hope

  Bukayo Saka sustained a hamstring injury during Arsenal's win at Crystal Palace on 21 December

  "No-one can replace him. He is one of the best players in the world." Gabriel Martinelli's comments about Bukayo Saka are telling as to just how much Arsenal depend on the England winger, how much they will miss him during the months he is absent because of a hamstring issue and how all of Arsenal's front line must step up to replace him. That was the case in their 3-1 win over Brentford, where Arsenal came from behind thanks to goals from Gabriel Jesus and Martinelli, either side of Mikel Merino's close-range strike. But while Jesus and Martinelli scored, it was the third member of the front triumvirate, 17-year-old Ethan Nwaneri on his first Premier League start, who really impressed. Nwaneri, who made his Premier League debut as a 15-year-old at Brentford two years ago and has appeared 10 times as a sub in the league in 2024-25 before his start here, played key roles in Arsenal's two goals in three second-half minutes. His corner led to Merino's strike, before his uncleared cross was swept home by Martinelli for number three.

  Saka's injury is a major blow to Arsenal's title hopes - it is up to his team-mates now, not just one player, to limit the damage. This win was doubly satisfying for Arsenal manager Mikel Arteta as he had to deal with illness in the squad, which ruled Kai Havertz out of the game. He said afterwards it had affected some of those who did play at Brentford and partially explained their slow start. It meant Arteta had to revert to another new tactic, having flipped through plans when Saka has been absent this season. When Saka missed the 2-0 defeat at Bournemouth in August, Raheem Sterling played right wing. He was largely ineffective before being hooked on 37 minutes following William Saliba's red card, and amid injury issues of his own has become a peripheral figure this season. Martinelli started there and played 90 minutes during the 1-0 win over Ipswich, but is far more comfortable on the left - the position he reverted to at Brentford. And against Shakhtar Donetsk in the Champions League, Arteta completely changed shape with two strikers and Jesus wide.

  Ethan Nwaneri made his third start of the season against Brentford - the other two were in the League Cup

  Against Brentford, however, Arteta deployed Nwaneri in the role Saka has perfected, cutting in as a left-footed right winger. And Arsenal looked far more coherent for it. In the first half, Nwaneri and Martinelli had the fewest touches of all outfield players, but the teenager impressed with what little ball he had. He was the only player to complete all of his passes in that opening period - 17 of 17. It was a test to see if he could step that up in the second half when Arsenal needed it. It was an exam that the college-aged student passed with flying colours. "He just makes me smile," TNT Sports pundit Karen Carney said of Nwaneri. "He's brave, he's bold - for someone who's so young as well. "For a young man he was outstanding. He was positive and a joy to watch. I can't believe how young he is - he will be an absolute player for Arsenal." "He's definitely going to get chances with Saka not available," added former Arsenal defender Martin Keown. "It's all there under the bonnet waiting to come out. "It's really important you have those players in the group demonstrating the quality coming out of the academy." Arteta has handled Nwaneri with kid gloves since giving him his debut, but felt this was the time and place to give him the biggest spotlight of his career so far. "We had a 17-year-old in the starting line-up who did great," Arteta told his post-match media conference. "I thought Ethan was the best player in that position to start the game. He also made his Premier League debut here, sometimes a feeling like that can help. "It is patience, managing frustration and expectation. We are building him."
