title: Elon Musk accused of copying designs by I, Robot director - BBC News
date: '2024-10-15'
section: Technology
url: http://www.bbc.co.uk/news/articles/ced04q39w33o
content: |-
  Alex Proyas, who directed the 2004 Will Smith film, compared his film to Tesla's new vehicles.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Musk promises self-driving Tesla taxis, but are they safe?

  The director of 2004 sci-fi film I, Robot has accused billionaire Elon Musk of copying his designs for humanoid machines and self-driving vehicles. At a Tesla event on Thursday, Musk unveiled Tesla's futuristic Cybercab, complete with winged doors and no steering wheel or pedals, and a new look at its Optimus robots. But the "We, Robot" showcase, playing on the title of an Isaac Asimov short story collection, also caught the eye of I, Robot director Alex Proyas. The filmmaker, whose film stars Will Smith as a detective sceptical of seemingly obedient androids, accused Musk of copying his work in a post on X. "Hey Elon, can I have my designs back please," Proyas said in a post viewed 6.4 million times, external.

