content: |-
  The Falcon 9 rocket was carrying 20 Starlink satellites, which will be used to improve access to the internet.

  A SpaceX Falcon 9 rocket took off from Vandenberg Space Force Base in California on 17 November, carrying on it 20 second-generation Starlink satellites.

  The satellites will be used to improve access to the internet.

  A stunning light show was seen in the night sky as the rocket left Earth.
