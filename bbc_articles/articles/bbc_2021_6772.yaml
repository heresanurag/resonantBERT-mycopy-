  Players and fans from Denmark and Belgium show support for Christian Eriksen in their Euro 2020 match.

  Last updated on .From the section European Championship

  Dates: Venues: Coverage: Live on BBC TV, BBC Radio 5 Live, iPlayer and the BBC Sport website and app. Click here for more details

  Players and fans from Denmark and Belgium showed support for Christian Eriksen during an emotional minute's applause after halting their European Championship group game.

  Referee Bjorn Kuipers stopped play in the 10th minute after Yussuf Poulsen had given Denmark an early lead.

  Eriksen is recovering in hospital after he suffered cardiac arrest in the same stadium during Denmark's opening loss to Finland in Copenhagen on Saturday.
  • None The Sports Desk: What can sport learn from Eriksen's cardiac arrest?

  Kevin de Bruyne inspired Belgium to a comeback victory that secured their place in the last 16.

  "The only thing I'm disappointed by is the result, I didn't expect much from this game, but I can't describe the pride I feel about this squad," said Denmark coach Kasper Hjulmand.

  "We've felt an enormous back-up from the people, from all the people following us, this whole stadium and all the people we've met and felt the love from - that's what did it in the end.

  "We know that it's going to be a tough few weeks for you, Christian, but we're here for you. We're going to stick together and we're going to beat the Russians. We're not done in this competition.

  "Four days after almost losing one of their best friends, they get on and the play a game like this, this is just amazing. They totally dominated the best team in the world, and I have so much respect."
