  Five things you need to know about the coronavirus outbreak this evening.

  Here are five things you need to know about the coronavirus outbreak this Thursday evening. We'll have another update for you on Friday morning.

  In the first evening Downing Street briefing for more than a week, Education Secretary Gavin Williamson stressed the importance of all children once again attending school in England from September. Earlier, the government published guidance on measures to ensure that return. Speaking alongside Jenny Harries, the deputy chief medical officer for England, Mr Williamson said it was important not to "underestimate the value that our children going back to school brings, not just them but the whole of society". He added: "That is why we cannot sit back and cannot be in a position where we just say children cannot go back to school."

  Face coverings will become mandatory in shops in Scotland by the end of next week, Nicola Sturgeon announced today. Non-essential shops have already reopened in Scotland, with bars and restaurants due to open up again later this month. The first minister said the 2m physical distancing rule would be eased for some premises when the country enters the next phase of its routemap on 10 July. And she said face coverings would be mandatory in shops from that date.

