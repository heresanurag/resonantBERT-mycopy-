content: |-
  After a thrilling 2-2 draw away to Benfica, BBC Scotland examines if Rangers are now favourites to make the quarter-finals of the Europa League given their strong home record.

  Last updated on .From the section Rangers

  "I don't think they'll like coming to Ibrox... so game on." Rangers midfielder and opening goalscorer Tom Lawrence calmly underlined the confidence he and his team-mates have when playing on their own patch in the Europa League, after their thrilling 2-2 draw with Benfica in Lisbon. It may sound bold, even arrogant, but the confidence is grounded in plenty of evidence. Rangers are unbeaten in nine home matches in the Europa League, having vanquished plenty of big clubs in Govan, in particular on their road to the final in 2022. RB Leipzig, Borussia Dortmund, Porto, Feyenoord, and Benfica themselves, to name a few, have all failed to win at Ibrox in recent seasons. So with that strong record, forged by a marriage of team and fans, are Rangers now favourites to defeat Benfica and reach the quarter-finals?
