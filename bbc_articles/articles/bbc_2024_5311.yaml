title: 'Wales v Finland: Rhys Ifans gives rousing speech to players - BBC News'
date: '2024-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68625706
content: |-
  Rhys Ifans gives a motivational speech to the Wales team ahead of their crunch Euro 2024 qualifier.

  "Nothing unifies us in the way you do," actor Rhys Ifans told the Wales football squad.

  The Harry Potter and Notting Hill star gave a rousing speech ahead of the crunch Euro 2024 play-off against Finland on Thursday.

  Describing to the squad what the game means, he said: "There have been poets, actors and politicians.

  "But no one, and nothing, unifies us in the way that you do."
