title: 'BBC 500 Words: London children ''excited'' to have reached final - BBC News'
date: '2024-02-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68384927
content: |-
  The young Londoners share the short stories that helped them receive an invite to Buckingham Palace.

  Three London children have spoken of their excitement after making it to the final of the BBC's 500 Words competition.

  The trio are among 50 finalists chosen for their original stories and who have been invited to attend Buckingham Palace on Wednesday.

  Winners will have their stories read out by celebrities including Hugh Bonneville and former Strictly Come Dancing dancer Oti Mabuse.

  One of the finalists, eight-year-old Levana, said she would be "very excited and impressed and proud of myself" if she won.

