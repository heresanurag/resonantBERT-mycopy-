title: 'Colin Berry: Ex-Radio 2 newsreader and presenter dies at 79 - BBC News'
date: '2025-04-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/cly160ydd72o
content: |-
  The broadcaster was also the UK's jury spokesman at the Eurovision Song Contest for 25 years.

  Colin Berry in the Radio 2 studio in 1973

  Former BBC Radio 2 newsreader and presenter Colin Berry has died at the age of 79. Berry was a fixture on Radio 2 from the early 1970s to the early 90s, hosting the early slot and late-night shows including Night Ride and You and the Night and the Music. He stood in for daytime presenters including Sir Terry Wogan, and was a host on BBC Three Counties Radio from 2004 to 2019. He was also familiar to Eurovision viewers, reading out the UK jury's results between 1978 and 2002.

  Paying tribute, Helen Thomas, head of Radio 2, said: "All of us at Radio 2 were saddened to hear of the passing of Colin Berry, who was part of our on air family for many years. We send our condolences to his family and friends." Berry started his career on pirate station Radio Caroline in 1965, before moving to BBC Radio Medway (now Kent), HTV in Cardiff and Radio 1 before settling at Radio 2. He was the station's first overnight host when it started 24-hour broadcasts in 1979, external, with a programme that included a what's on guide and a cookery slot "for those of our listeners who get home late and feel like a snack". He also made appearances on TV shows including Top of The Pops, Blankety Blank and Going Live.
