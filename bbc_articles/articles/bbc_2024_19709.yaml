  Rory Allington-Mott, 34, travelled from his home in Newport, to join the riot in Southport.

  Rioter who threw bricks and bin at police jailed

  This video can not be played To play this video you need to enable JavaScript in your browser. A man who threw bricks and a wheelie bin at police during a riot has been jailed

  A man who threw objects including bricks and a wheelie bin at police during a riot has been jailed. Rory Allington-Mott, 34, pleaded guilty to violent disorder and was jailed for three years and three months at Liverpool Crown Court. He had travelled from his home in Newport, Shropshire, to take part in the disorder in Southport on 30 July. Merseyside Police Assistant Chief Constable Paul White said it was "only right" that Allington-Mott received one of the longest prison terms issued by the courts so far, following the disorder.

  Rory Allington-Mott, 34, from Newport, Shropshire, has been jailed for taking part in the Southport violence

  He added that Allington-Mott had played a "leading role" in the violence. In video footage of him taking part in the unrest, Allington-Mott appeared to smile. He was seen to throw bricks, a wheelie bin, a plastic box, and what appeared to be a picture frame, towards police vans and officers. The court heard he had been given a six-month sentence in 2023 for racially or religiously aggravated criminal damage. The riot broke out after hundreds of people gathered for a vigil to remember Bebe King, six, Elsie Dot Stancombe, seven, and Alice Dasilva Aguiar, nine, who were stabbed to death at a Taylor Swift-themed dance class a day earlier.
