title: Police helicopter filmed 29 immigrants in van - BBC News
date: '2020-02-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-cornwall-51621798
content: |-
  The Vietnamese passengers had earlier sailed across the channel from France to Cornwall.

  Four men, from Lancashire and Kent, have been jailed after 29 Vietnamese men, women and children were found in a van, after it was boxed in on the hard shoulder of the M5 motorway.
