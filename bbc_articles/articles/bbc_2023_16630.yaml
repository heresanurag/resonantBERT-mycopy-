title: 'Cardiff Half Marathon: Runner proposes during race - BBC News'
date: '2023-10-02'
section: General
url: http://www.bbc.co.uk/news/uk-wales-66984096
content: |-
  About 27,500 runners took part in Sunday's race, with one ending up with more than just a medal.

  While 27,500 runners were huffing and puffing their way around Sunday's Cardiff Half Marathon, one of them seemingly felt it was a case of perfect timing to pop the question.

  The runner was seen getting down on one knee to propose to his other half in a very quick proposal.

  Judging by the pictures, it looks like she said yes... before she ran off to complete the race with her running partner.
