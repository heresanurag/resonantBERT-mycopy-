title: 'Royal wedding: Manchester attack survivor ''speechless'' at invite - BBC News'
date: '2018-04-11'
section: General
url: http://www.bbc.co.uk/news/uk-43721943
content: |-
  Manchester attack survivor Amelia Thompson, 12, is going to Prince Harry and Meghan Markle's wedding.

  Twelve-year-old Amelia Thompson has been invited to Windsor Castle for Prince Harry and Meghan Markle's wedding.

  Amelia was left traumatised after witnessing the deadly bomb blast at an Ariana Grande concert in Manchester in May 2017.
