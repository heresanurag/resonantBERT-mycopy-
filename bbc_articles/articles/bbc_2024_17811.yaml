  Increased funding for a wall on the US-Mexico border - one of Trump's signature proposals in 2016 - is proposed in the document. Project 2025 also proposes dismantling the Department of Homeland Security and combining it with other immigration enforcement units in other agencies, creating a much larger and more powerful border policing operation. Other proposals include eliminating visa categories for crime and human trafficking victims, increasing fees on immigrants and allowing fast-tracked applications for migrants who pay a premium. Not all of those details are repeated in the Republican party platform, but the overall headlines are similar - the party is promising to implement the "largest deportation programme in American history".
  • None What a Trump second term would look like

  The document proposes slashing federal money for research and investment in renewable energy, and calls for the next president to "stop the war on oil and natural gas". Carbon-reduction goals would be replaced by efforts to increase energy production and energy security. The paper sets out two competing visions on tariffs, and is divided on whether the next president should try to boost free trade or raise barriers to imports. But the economic advisers suggest that a second Trump administration should slash corporate and income taxes, abolish the Federal Reserve and even consider a return to gold-backed currency. The GOP party platform does not go as far as Project 2025 in these policy areas. The platform instead talks of bringing down inflation and drilling for oil to reduce energy costs, but is thin on specific policy proposals. And Trump himself has come out in favour of raising tariffs on imported goods.

  Under the proposals, pornography would be banned, and tech and telecoms companies that allow access would be shut down. The document calls for school choice and parental control over schools, and takes aim at what it calls "woke propaganda". It proposes to eliminate a long list of terms from all laws and federal regulations, including "sexual orientation", "gender equality", "abortion" and "reproductive rights". Project 2025 aims to end diversity, equity and inclusion programs in schools and government departments as part of what it describes as a wider crackdown on "woke" ideology. The proposals in this policy area are broadly reflected in the Republican platform, which in addition to calling for the abolishing the Department of Education, aims to boost school choice and parental control over education and criticises what the party calls the "inappropriate political indoctrination of our children".

  Prior to the swirling controversy around the proposals, Project 2025 was backed by a $22m (£17m) budget. It includes strategies for implementing policies immediately after the presidential inauguration in January 2025, such as the creation of a database of conservative loyalists to fill government positions, and a programme to train those new workers. But with the Trump campaign seeking to distance themselves from the project, its future is in doubt - even if many of its core ideas seem likely to shape policy in a hypothetical second Trump administration. At the same time, many of the proposals would likely face immediate legal challenges from Trump's opponents if implemented.
