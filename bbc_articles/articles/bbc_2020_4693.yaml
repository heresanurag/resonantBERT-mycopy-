content: |-
  The Prince of Wales has spoken of the "strange and distressing" experience of self-isolation

  Prince Charles has spoken of the "strange, frustrating and often distressing experience" of being without family and friends during self-isolation. He was diagnosed with the virus in March.

  In a recorded a video message in support for the charity, Age UK, the Prince of Wales called for "faith in ourselves and in each other" as the world battles the pandemic.
