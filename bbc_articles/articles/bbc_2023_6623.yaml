content: |-
  Marcus Osbourne appears before magistrates charged with killing Steven Harnett and Katie Higton.

  Steven Harnett, 25, and Katie Higton, 27, died after being attacked at a house in West Yorkshire

  A man has appeared in court charged with the murder of a man and woman found dead at a house in Huddersfield.

  Steven Harnett, 25, and Katie Higton, 27, were found fatally injured at an address in Harpe Inge, Dalton, on Monday.

  West Yorkshire Police said the pair had injuries "believed to have been inflicted by a bladed weapon".

  Marcus Osbourne, 34, was charged with two counts of murder and appeared before Leeds magistrates on Wednesday.

  He was also charged with assaulting and detaining a second woman against her will in the property on the night Mr Harnett and Ms Higton died.

  During a short hearing at Leeds Magistrates' Court, Mr Osbourne spoke only to confirm his name, date of birth and address.

  He was not asked to enter a plea.

  Mr Osbourne was remanded in custody to appear at Leeds Crown Court on Thursday.

  West Yorkshire Police said its investigation was continuing.

  The force has also referred the case to the Independent Office for Police Conduct (IOPC) due to the contact officers had with both the victims and Mr Osbourne prior to their deaths.

