title: Trent Alexander-Arnold boos made Jurgen Klopp 'turn off television' - BBC Sport
date: '2025-05-23'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c0k3zvrm6epo
content: |-
  Former Liverpool boss Jurgen Klopp says he "turned off the television" when he heard supporters booing defender Trent Alexander-Arnold.

  Klopp said Trent Alexander-Arnold was key in delivering success for the club during his reign

  Former Liverpool boss Jurgen Klopp says he turned off his television when he heard supporters booing Trent Alexander-Arnold. The 26-year-old defender is leaving the club at the end of the season and is expected to join Real Madrid. Alexander-Arnold arrived at the club aged six and was a key component in Liverpool's success under German Klopp, which included a first league title in 30 years in 2019-20. However after announcing his decision to not sign a new contract, some fans turned against the player and some booed him when he came off the substitutes bench against Arsenal earlier this month. Speaking at a fundraising event for the LFC Foundation on Friday, where he brought along a signed Alexander-Arnold shirt to auction, the ex-manager said supporters were "wrong" to boo and launched a passionate defence of the England full-back. "I don't want to tell you what you have to think. I can tell you what you think is wrong," Klopp said. "I don't tell you you should not be angry, you should not be disappointed, I tell you don't forget. This club doesn't forget. "I watched the game when he came on and I heard the booing. I switched the telly [television] off. Honestly, I could not have been more disappointed at this moment." And he highlighted the Liverpool-born player's commitment to the club and his best moments during Klopp's spell as manager. "He gave absolutely everything and wears the Liverpool badge in the skin," he said. 'Why didn't he sign a new contract?'. I hear this from fans, this money discussion: 'He goes without a transfer fee'. "They (the owners) have to be angry. "This boy, 18 years old, scored a free-kick in Hoffenheim where if he doesn't score that we don't qualify for the Champions League. "Against Barcelona he did the most cheeky thing in the world and set up the goal for 4-0, a result and a game which will not happen again. "But now he plays next year for another club and we decide how we deal with that."

  The 26-year-old has been named in the Three Lions squad for upcoming games against Andorra and Senegal, having been injured for the March camp. Though admired for his offensive ability, England boss Thomas Tuchel said he had told the player he needs to improve his "defensive discipline" if he is to help his country to win a major tournament. "I can see that sometimes he relies heavily on his offensive contributions, and gives not so much emphasis on the defensive discipline and effort," Tuchel said. "This major impact that he had for Liverpool over so many years, if he wants to have this impact in the English national team, then he has to take the defensive part very, very seriously. "Because when we are talking, especially, about qualifying football and then tournament football, the one defensive error, the one moment where you are not 100% awake, can be decisive, can be the moment where you pack your suitcases and go home."

