  Also speaking on Friday, Liverpool manager Arne Slot said he had spoken to Alexander-Arnold about his defending and stressed he "could do a bit more, to say it mildly" in training to improve, but that he was a better defender than people give him credit for. England face Andorra in a World Cup qualifier on 7 June, before welcoming Senegal to Nottingham Forest's City Ground for a friendly on 10 June. "Now is the moment to get to know him," added Tuchel. "I know him. I played against him. I had phone calls with him. But now is the moment to feel him for nine or 10 days, feel him around the squad, see what he can do, what he can bring, and then from there we go."

  Trent Alexander-Arnold is poised to join Real Madrid as a free agent
