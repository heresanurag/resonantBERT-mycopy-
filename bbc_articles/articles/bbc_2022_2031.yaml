  North Cornwall, North Devon and Sharpness in Gloucestershire are feared to be the worst-hit areas due to the tidal impact from the storm surge and very high spring tides.

  National Highways said to expect dangerous driving conditions with exceptional sidewinds and wind-blown debris.

  It also warned there was a particularly big risk to high-sided vehicles and other vulnerable vehicles such as caravans and motorbikes.

