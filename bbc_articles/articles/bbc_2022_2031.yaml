title: 'Storm Eunice: Somerset and Gloucestershire declare weather emergencies - BBC
  News'
date: '2022-02-18'
section: Gloucestershire
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-60420909
content: |-
  Winds of up to 90mph, flooding and disruption to transport is expected in Somerset and Gloucestershire.

  People have been warned about possible big waves in towns like Clevedon in Somerset

  Two counties have declared an emergency as a red weather warning - suggesting a risk to life from flying debris - has been issued for Storm Eunice.

  Forecasters predict severe flooding, wind speeds of up to 90mph (144kmh) and disruption to transport services and roads in Gloucestershire and Somerset.

  The M4 Prince of Wales bridge and the M48 Severn Bridge are likely to close.

  All schools in Somerset will close and Avon and Somerset Police has advised people to avoid travelling on Friday.

  Some schools in Wiltshire have announced closures and Bristol City Council has advised schools in the city to close too.

  Areas along the River Severn between Avonmouth and Sharpness in Bristol are also expected to flood.

