  Western Power operations director Graham Halladay said it had made storm preparations but to be prepared for power cuts.

  "If members of the public see fallen lines I would urge them to stay well clear and ring 105," he said.

  "A fallen power line could still be live and can deliver a fatal shock."

  It will be one of the most significant storms to hit the UK in many years.

  Throughout the day we should be prepared for trees being uprooted, power cuts with significant travel disruption of delays and cancellations.

  Eunice will start bringing impacts early Friday morning with particular concern around the Bristol Channel, where the Met Office red warning is in force for.

  The wind strengths forecast for southern parts of the UK are comparable to the Burns' Day Storm of January 1990, which caused widespread damage, and the storms that hit the UK during the winter of 2013-2014.

  West of England Metro Mayor Dan Norris encouraged residents to exercise extreme caution and take all possible precautions.

  "I'm urging all local people to act sensibly and take all reasonable precautions with the approach of Storm Eunice," he said.

  Prime Minister Boris Johnson said the Army would be on stand-by to help those affected by Storm Eunice.

