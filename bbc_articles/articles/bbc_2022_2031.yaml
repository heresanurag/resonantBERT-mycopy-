  Staff from local councils and emergency services will be knocking on doors on Thursday afternoon to help people who need to evacuate from their homes safely.

  Those who are being evacuated are asked to pass on the message and knock on neighbours' doors where possible.

  Residents have also been asked by local authorities to place any recycling boxes in a safe place.

  Waste collections in Bristol and Somerset on Friday have been suspended.

  Areas near the River Severn could be affected by flooding

  Officials will be visiting homes near the River Severn to ensure they are safe

  A Network Rail spokesman said disruption was "inevitable" after the Met office released red and amber warnings for the South West of England from 05:00 to 21:00 GMT.

  "The safety of passengers and staff is our top priority," he said.

  Letters have been sent to some residents in preparation

  In Bristol, services on the Severn Beach line have been cancelled for Friday morning.

  First Bus has suspended all of its services in Bristol, including Metrobus, Bristol Park and Ride and Airport Flyer, South Gloucestershire, North Somerset and Wells until 13:00 GMT on Friday.

