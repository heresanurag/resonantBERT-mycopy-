title: Oasis star Noel Gallagher's daughter Anais criticises fan 'ageism and misogyny'
  - BBC News
date: '2024-08-30'
section: Culture
url: http://www.bbc.co.uk/news/articles/cdrl22k3xxzo
content: |-
  Anais Gallagher weighs into a debate over whether long-time fans deserve tickets more than others.

  Anais Gallagher is the oldest of Noel's three children

  Noel Gallagher's daughter has said there is "ageism and the misogyny" from long-time Oasis fans who feel they deserve tickets to the band's reunion tour more than young women who have discovered them more recently. Anais Gallagher's dad has buried the hatchet with her uncle Liam to announce the Britpop giants' first tour for 15 years. The 24-year-old posted on TikTok after some fans complained about young people now jumping on the Oasis bandwagon. Anais wrote: "One thing I won’t stand for is the ageism and the misogyny around people getting tickets. "Sorry if a 19-year-old girl in a pink cowboy hat wants to be there, I will have my friendship bracelets ready."

  She was responding to a video posted by another user, Josie, who said she had seen people online complaining that "everyone now suddenly loves Oasis". "What do you mean everyone suddenly loves them? Everyone has always loved them," Josie said in the video. "They're one of the most famous bands in the whole entire world."

  In a follow-up, she said her video was meant to be "a fun little laugh, and people are getting very, very heated in my comments section". She added: "It was just a point in that don't try and gatekeep Oasis because you can't gatekeep probably the most famous band to come out of the UK, if we're disregarding The Beatles and stuff like that, but definitely the most famous Britpop band. You can't gatekeep them." As well as Anais Gallagher's response, the replies to the original video included one saying: "I don’t think it’s a case of ageism; it’s would just be disappointing if long-time fans miss the chance, because some people who barely know them go for the sake of it - without being fans." Another said they went to see Liam Gallagher's recent solo tour performing Oasis' debut album Definitely Maybe, and "the amount of people around me that didn't know half the songs was amazing, while loads of my family that are die-hard fans couldn’t get tickets". However, one wrote: "I think it’s actually impossible to be born in Britain and not know Oasis like regardless of age." Another said: "Literally the entirety of Britain are Oasis fans." Demand for tickets is expected to be huge to see the Gallagher brothers at 17 major outdoor shows in Cardiff, Manchester, London and Edinburgh next summer. More dates could be added when tickets go on general sale at 09:00 BST on Saturday.
