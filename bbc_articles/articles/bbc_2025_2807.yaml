title: 'Tyler Kerry: Authorities re-open Turkey hotel lift shaft death - BBC News'
date: '2025-02-06'
section: Essex
url: http://www.bbc.co.uk/news/articles/c3913w0r2z0o
content: |-
  Investigators will look into Tyler Kerry's death, as well as a previous incident at the same hotel

  Barrister Michael Polak said he felt the Turkish police drew conclusions "a bit too quickly"

  Turkish authorities have reopened their investigation into the death of a British man whose body was found at the bottom of a hotel lift shaft. Tyler Kerry, 20, was on holiday with his family when he died at the Trendy Lara hotel in Kundu, near Antalya, in November 2024. At the time, Turkish authorities said Mr Kerry, of Pitsea, Essex, had been drinking and that there was no evidence of "intervention" with his body, but his family believe he was murdered. Michael Polak from Justice Abroad - who is representing Mr Kerry's family - believes the Turkish police drew their conclusions "too quickly".

  Mr Kerry was on his first family holiday abroad with his grandparents, girlfriend and other relatives. Less than 36 hours after arriving, he was found in the lift shaft in the basement level, wearing just a pair of boxer shorts and socks. Medics were unable to save him.

  Tyler Kerry was on holiday with his grandparents, other relatives and his girlfriend (pictured)

  Mr Kerry's family said they were "disgusted" at the Turkish authorities' handling of the situation, including the lift reportedly being put back into use for hotel guests just a few hours later. International lawyer Michael Polak - who set up Justice Abroad to help British citizens navigate legal processes in foreign countries - said evidence in Mr Kerry's case may have been lost. "It was little bit worrying that the scene was cleaned up so quickly because that impedes investigations," he told the BBC. "If it was in the United Kingdom, you'd hope that they'd set up a cordoned-off area, they'd bring different experts in to gather all the evidence before any of it's damaged." "We hope that we'll still be able to find evidence and be able to help the family to find those answers they need," the barrister said.

  Mr Polak said Mr Kerry's family had been contacted by another holidaymaker who stayed at the same hotel earlier in 2024, whose son was allegedly "beaten up" by security guards in the basement, very close to where Mr Kerry's body was found a few months later. "It does ring some alarm bells that something similar has happened at the same hotel in relation to the security and it's something that, at the very least, needs to be investigated," Mr Polak said. A judge in Turkey has now instructed investigators to look into both Mr Kerry's death and the alleged assault on the other holidaymaker, Mr Polak told the BBC. "We are confident that they will do the right thing and they'll look into this closely," he said. "Tourism is a huge part of the Turkish economy, especially in the Antalya area, so they'll want to make sure that they are looking at this really properly." Mr Polak said he expected the hotel would cooperate with the investigation, and that the holiday operator Tui - who Mr Kerry's holiday was booked under - "will want to look into the safety of the hotel if they are sending people [there] again and again".

  Tyler Kerry's funeral took place on 25 January at Pitsea Crematorium

  Mr Kerry's family - who arranged a private autopsy to be carried out in addition to those which took place in Turkey and at the East London coroner's service - are said to be "very pleased" that the case is being re-investigated, and are continuing to fundraise, external to help pay for legal costs. An inquest was opened and adjourned in December into Mr Kerry's death. The area coroner, Michelle Brown, said she was "in the hands of the Turkish authorities" who would "not engage with the UK coroner's service at all". A spokesperson for the Presidency of Turkey told the BBC in a statement they "are deeply saddened by the loss of Tyler Kerry..." and that "the safety of millions of UK citizens who visit our country each year is of the highest priority." "Türkiye and the UK are participants in the European Convention on Mutual Legal Assistance in Criminal Matters," the spokesperson said, adding that they "will make their best efforts to assist the relevant authorities in the UK". Both the Trendy Lara hotel and Tui said it would be inappropriate to comment while the investigation is ongoing.

