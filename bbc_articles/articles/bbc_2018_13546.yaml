id: bbc_2018_13546
title: Folkestone Morrisons supermarket catches fire - BBC News
date: '2018-11-08'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-46137004
content: |-
  The fire is thought to have been started by a deep fat fryer in the Morrisons cafe.

  A huge fire has ripped through a Morrisons supermarket in Folkestone, Kent and caused part of the roof to collapse.

  The blaze, which started at about 07:30 GMT, is thought to have been started by a deep fat fryer in the cafe and has destroyed part of the store.

  The supermarket was evacuated and there are no reports of injuries.

  Video footage shows the moment part of the roof collapsed.
