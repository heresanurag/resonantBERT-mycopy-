title: World landmarks recreated with Lego - BBC News
date: '2017-01-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-38697427
content: |-
  An artist has recreated more than 70 global landmarks using Lego bricks.

  More than 70 famous world landmarks have been recreated with Lego.

  The models were put together by professional Lego builder Warren Elsmore and feature a new exhibition at The Harley Gallery in Nottinghamshire.

  Mr Elsmore said each creation could take several months to build.
