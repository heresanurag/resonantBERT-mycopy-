  After being kept for a night at the palace, the Queen's coffin will move to Westminster Hall to lie in state - with hundreds of thousands expected to file past.

  'We're staring into the abyss' - Former Archbishop of Canterbury

  The former Archbishop of Canterbury, Dr Rowan Williams, has been discussing the challenges facing the King and the UK as the country enters a new phase in its history. Dr Williams told the BBC’s Newscast podcast: “We’re a society staring into a little bit of an abyss in the next few months, where poverty and deprivation for quite a lot of people, are going to be a major issue.” Talking about the role of King Charles III, he said: “I think it is crucial that the new King give the message... that he's committed to a society where nobody gets forgotten.” He went on to say: “Lots of communities are faced with really impossible choices about energy, about food, about their general security. It’s the biggest thing I know on the agenda of the new prime minister and the new government. It’s a watershed moment for them just as much as for the monarchy.” Dr Williams said: “If we can get through this winter without collapse, we can manage with all those pressures, we will have sent a very important message to the other end of Europe that we are prepared to face some constraints for the sake of Ukraine.” Last Thursday, the government set out its energy support plan which included limiting energy bill rises for all households for two years, and six months for businesses. Newscast’s full interview with Dr Williams is available on BBC Sounds. This content is currently not available
