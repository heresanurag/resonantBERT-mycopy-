title: 'As it happened: More than 40 million people have first dose of Covid vaccine
  - BBC News'
date: '2021-06-05'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57367906
content: |-
  It comes as the number of people in hospital with Covid rises but not "very significantly," an NHS boss says.

  Margaret Keenan was the first person to be vaccinated in the UK Image caption: Margaret Keenan was the first person to be vaccinated in the UK

  There has been more reaction to news the UK has now administered more than 40 million first vaccine doses.

  Health Secretary Matt Hancock says in a statement that it's an "astonishing achievement" to reach the milestone less than six months after the UK's vaccination programme began.

  He says: "In all corners of the UK, people are rolling up their sleeves when their time comes to protect themselves and the people around them. It seems with every day, we pass another major vaccination milestone on the road back to recovery."

  Hancock adds: "I encourage everyone who is eligible to join the millions who have the fullest possible protection from this virus by getting their jab when the time comes."

  NHS national medical director Prof Stephen Powis also says: "This latest milestone in our ongoing fight against coronavirus gives us another welcome opportunity to thank everyone in the NHS working flat out to deliver the biggest vaccination programme in our history - they are protecting millions of people at speed and saving thousands of lives.

  "There has never been a more important time to get protected so when it's your turn and you're contacted by the NHS, book your jab or bring forward your second dose."
