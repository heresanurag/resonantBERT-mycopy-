title: Calvin Harris headlines final night of TRNSMT festival - BBC News
date: '2024-07-14'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cnd0r5ddrkxo
content: |-
  Thousands of music fans attended the third and final day of the Glasgow festival at Glasgow Green.

  Tens of thousands of music fans enjoyed the final day of Scotland's biggest music festival. This year's TRNSMT at Glasgow Green concluded on Sunday night with a set from chart-topping DJ Calvin Harris. Those attending were warned to plan their travel home in advance due to ScotRail's reduced timetable, which meant many services from Glasgow stopped running at about 21:00. The three-day event saw Liam Gallagher headline Friday night, with Castlemilk singer Gerry Cinnamon topping the bill on Saturday. Sunday was kick-started by Rejjie Snow on the main stage, followed by Irish singer CMAT, who was a lively figure onstage as the sun emerged and temperatures rose.

  Blossoms sang a song inspired by the theft of Gary the Gorilla

  However, it wasn't until later in the afternoon that the Main Stage started to become busy, with revellers flocking over from funfair rides and food stalls for the set by indie band Blossoms. The Stockport band had a surprising Scottish inspiration - the fibreglass gorilla that went missing from a Lanarkshire garden centre last year. The group introduced new song Gary, the title track of their upcoming fifth album, and explained it was about the missing statue, which was eventually found cut in half in a layby near Dundee earlier this year. A replica of the ape was also an onstage prop, sitting behind the group as they delivered jaunty indie and psychedelic pop. Over Friday and Saturday 25 people were arrested for offences including sexual assault and drugs.

  About 50,000 fans turned up each day of the festival

  CMAT performed at the festival on Sunday

  Enter Shikari said they accepted that most of their audience would be supporting Spain in the Euro final against England

  The finale of the festival went head-to-head with the Euro 2024 final between England and Spain, with Spain taking the tile. A number of early arrivals clearly had their minds on events in Berlin with plenty of Spanish - and a few English - flags being worn and waved by punters. However, the football proved a problem for some of the acts. Before the match, rock band Enter Shikari told BBC Scotland News they hoped the game would go into extra time, as it otherwise clashed with their headline set on the King Tut's stage. Guitarist Rory Clewlow joked. "We threatened to pull out! We did talk about having a wee phone set up to keep an eye on it, but it would be doing a disservice to the fans. "99% of the audience will be supporting Spain, so we can't really share the game with them either." The band, who topped the album charts last year with their seventh album A Kiss For The Whole World, were delighted to be back in Scotland. Drummer Rob Rolfe added: "We have a lot of history with the King Tut's venue - it was one of the first places we played in Glasgow. "It holds a special place in our hearts, so it's an honour to be playing there today. It feels a bit like going full circle." Other acts that performed on Sunday included dance duo Chase & Status, electropop singer Alison Goldfrapp and Sprints, who brought their abrasive rock to the Tut's stage. Around 50,000 people have attended each day of the event, which first ran in 2017.
