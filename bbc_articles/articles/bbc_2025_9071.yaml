title: Congressman falls asleep during an all-night House meeting - BBC News
date: '2025-05-15'
section: General
url: http://www.bbc.co.uk/news/videos/crlj3713yp9o
content: |-
  Watch the moment Representative Blake Moore's name is called and a colleague nudges him awake.

  A Congressman had to be woken up during a House Ways and Means Committee meeting, where US politicians discussed the reconciliation bill that would include Trump's tax cuts.

  When it was time to vote on an amendment, Congress members realised that Representative Blake Moore had dozed off in his chair. He was woken up by Representative Michelle Fischbach, a Minnesota Republican.

  During the meeting, legislators debated and voted about specific amendments that would go into the bill.
