  Against all odds, Mr Fontana's health has improved since the wedding and he has been moved to an acute care ward. He described the experience as "surreal" after watching back a wedding video made by hospital staff. "Here I am three weeks later, still alive and kicking," Mr Fontana added. While it may not have been the wedding the couple usually would have planned for, the pair described it as "very special". "I keep telling everybody that love conquers all and it is the love and the care between us that has spurred him on, though science will probably say that it was the drugs kicking in," Mrs Fontana concluded.

