title: 'Daniel Anjorin: Man charged with murdering boy in sword attack - BBC News'
date: '2024-05-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68932780
content: |-
  Schoolboy Daniel Anjorin died from his injuries following the attack in Hainault on Tuesday morning.

  Daniel Anjorin had a "positive nature and gentle character", his school said

  A man has been charged with murdering 14-year-old schoolboy Daniel Anjorin in a sword attack in north-east London. Marcus Arduini Monzo, 36, is due before Barkingside Magistrates' Court on Thursday over the attack in Hainault. Police were called to reports of a car crashing into a house and people being stabbed at about 07:00 BST on Tuesday. Five people, including two police officers, were injured. Daniel - said by teachers to be positive and gentle - was taken to hospital where he died. Jaswant Narwal, chief crown prosecutor for Crown Prosecution Service (CPS), said: "The CPS has authorised the Metropolitan Police to charge Marcus Arduini Monzo with the murder of 14-year-old Daniel Anjorin, who was fatally stabbed in Hainault on Tuesday 30 April." She said Mr Monzo had also been charged with two counts of attempted murder, two counts of causing grievous bodily harm, aggravated burglary, and possession of a bladed article.

  Police were called to reports of a car crashing into a house and people being stabbed in Hainault on Tuesday morning

  The Met Police said a 33-year-old man was injured when a van crashed into a property on Laing Close. He was then attacked and sustained a neck wound. Another man, 35, was cut on his arm when he was assaulted inside a nearby house. Their conditions are not considered to be life-threatening. Following this, Daniel was attacked and suffered stab wounds. He died later in hospital. Two officers were seriously injured while attending the crime scene. One suffered "horrifically serious" arm wounds, while the other officer sustained a hand injury.

  Daniel's school, Bancroft's, in Woodford Green, said he was a "true scholar" who had a "positive nature and gentle character". In a statement, it described him as a "core member" of the community, adding: "Losing such a young pupil is something we will always struggle to come to terms with." Chief crown prosecutor Ms Narwal added: "Our thoughts remain firmly with the family of Daniel and all those who have been impacted by this horrific incident."

