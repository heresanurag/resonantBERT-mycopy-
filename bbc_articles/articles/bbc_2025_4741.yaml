title: Netflix's Adolescence makes UK TV ratings history - BBC News
date: '2025-03-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/c62kyg00q71o
content: |-
  The hit drama becomes the first streaming show to top the UK's overall weekly TV ratings.

  Owen Cooper and Stephen Graham have been widely praised for their performances in Adolescence

  Netflix drama Adolescence has become the first streaming show to top the UK's weekly TV ratings, beating BBC shows like The Apprentice and Death in Paradise in the latest official rankings., external The first episode of Adolescence was watched by 6.45 million people in its first week, according to ratings body Barb. That is the biggest audience for any streaming TV show in the UK in a single week, beating the 6.3 million who watched Fool Me Once on Netflix in January 2024. Adolescence's achievement in breaking the dominance of the traditional broadcasters at the top of the UK's weekly TV ratings will be seen as another milestone in the growth of Netflix and streaming.

  The second episode of Adolescence was seen by 5.94 million, with BBC One's The Apprentice and Death in Paradise third and fourth respectively in the weekly chart with almost 5.8 million each. Adolescence's third episode was fifth in the weekly ratings with 5.14 million, while the fourth and final instament was seen by 4.65 million.

  Adolescence quickly became the most talked-about show of the year so far after it launched on 13 March. It won acclaim from critics and viewers for its hard-hitting story of a 13-year-old boy who is arrested on suspicion of murdering a girl from his school, with the drama made more intense by filming each episode in a single shot. Its cast has come in for particular praise, including newcomer Owen Cooper as young Jamie, and Stephen Graham as his dad. The show has also sparked a national conversation about the impact of social media and "manosphere" influencers. Prime Minister Sir Keir Starmer told BBC Radio 5 Live in an interview broadcast on Monday: "There's a reason why the debate has suddenly sparked into life - a lot of people who work with young people at school or elsewhere, recognise that we may have a problem with boys and young men that we need to address." Adolescence is now among the programmes with the highest seven-day ratings so far this year, behind the BBC's The Traitors, Call The Midwife and the Gavin & Stacey: A Fond Farewell documentary. ITV's drama Mr Bates vs the Post Office, which similarly made headlines and set the political agenda last year, was watched by 10 million people in its first week. Barb began including streaming data in its ratings in November 2021.
