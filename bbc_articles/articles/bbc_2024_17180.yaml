content: |-
  Jack Draper marks his first Wimbledon match as British men's number one with a five-set win under the Centre Court lights.

  This video can not be played To play this video you need to enable JavaScript in your browser. Highlights: Draper comes through five-setter on Centre Court

  Jack Draper marked his first Wimbledon match as British men's number one by evoking memories of Andy Murray with a five-set success under the Centre Court lights. Draper, seeded 28th, started tentatively against Swedish qualifier Elias Ymer - and lost his way in the fourth set - before coming through to win 3-6 6-3 6-3 4-6 6-3 in the first round. The 22-year-old replaced Murray in the evening slot on the iconic show court, with the former world number one having withdrawn through injury earlier on Tuesday. Draper provided a timely pick-me-up for the home fans disappointed by Murray's misfortune. Making his return to Wimbledon after being injured himself last year, Draper celebrated clinching victory at 21:15 BST by whacking a ball into the jubilant crowd. "I know you wanted to see Andy out here but you were stuck with me instead," he joked. "The crowd helped me massively. I love playing in front of loads of people. There were some nervy moments and I really appreciate the support, it means a lot." In round two, he will face Cameron Norrie - the player he deposed as Britain's leading man last month. Norrie, who reached the Wimbledon semi-finals in 2022, sealed a 7-5 7-5 6-3 win over Argentina's Facundo Diaz Acosta shortly before Draper's victory. It ended a run of four successive tour-level defeats for Norrie, who has dropped outside the world's top 40 after first-round defeats at the French Open, Queen's and Eastbourne. He and Draper were among 11 Britons playing on the second day of the 2024 Championships.

  This video can not be played To play this video you need to enable JavaScript in your browser. Norrie through to round two in straight sets

  British number 13 Jacob Fearnley was the other notable home men's winner as he set up a second-round encounter with seven-time champion Novak Djokovic. The 22-year-old from Scotland, playing in his first Grand Slam match, battled to a 7-5 6-4 7-6 (14-12) victory over Spanish qualifier Alejandro Moro Canas. But there were defeats for last year's boys' champion Henry Searle, Billy Harris, Paul Jubb and Jan Choinski. Dan Evans, who was also a doubt for the tournament with a knee injury, trailed 6-2 3-3 against Chilean 24th seed Alejandro Tabilo when play was stopped because of bad light. In the women's singles, Katie Boulter and Harriet Dart both won - and will now play each other - to ensure five British women reached the second round for the first time since 1987.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'You guys wanted Andy, you're stuck with me' - Draper on five-set Wimbledon win

  At the start of his career, Murray emerged to pick up the baton from Tim Henman as Britain's leading men's player - and carry the nation's hopes at Wimbledon. There is a parallel to be drawn with the Scot and Englishman Draper. He has long been regarded as the natural heir to Murray in terms of British hopes on the ATP Tour and, having suffered with fitness problems in recent years, has finally started to fulfil expectations. In the past month he has climbed into the world's top 30 and claimed his first tour title at Stuttgart. Being moved to Centre Court to fill the void left by Murray could not have felt any more symbolic of the changing of the guard. Initially the atmosphere failed to ignite like it would have done if Murray had the chance to play in the singles at the final Wimbledon of his career. That was down to 28-year-old Ymer. The world number 205 barely missed a beat with his explosive returning from the baseline, hitting 15 winners compared with four unforced errors as he quietened Centre Court. But the home fans, like Draper, warmed up as the match wore on. A more aggressive game has been key to Draper's recent rise and, after a break for the roof to be closed as darkness fell, that came to the fore as he raced through a dominant deciding set. As he homed in on victory, the crowd willed him over the line with many celebrating each victorious point by jumping from their seats in joy.

