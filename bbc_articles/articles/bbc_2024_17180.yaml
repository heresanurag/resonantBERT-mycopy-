  Six weeks ago, Fearnley wrapped up a kinesiology degree - the study of human movement - at the Texas Christian University in the United States. Now he is putting the energy into his tennis career. Fearnley won the Nottingham Open title last month - his first on the second-tier ATP Challenger - to earn a wildcard for Wimbledon. Ranked 277 in the world, he said he "froze" when he realised he was one of three names left who could draw Djokovic in the first round. But, after avoiding the 24-time major champion, he hoped coming through the first round against Moro Canas would provide "more confidence and less nerves" if he made round two. Fearnley, who said he was watching the score of Djokovic's match while playing, will find out for sure on Thursday. Jubb missed out on a first Wimbledon success in agonising fashion, falling in five sets to big-hitting Brazilian Thiago Seyboth Wild. The 24-year-old led by two sets to love and had a match point in the third-set tie-break, but he could not take it and Seyboth Wild fought back to win 1-6 3-6 7-6 (8-6) 6-4 7-5. Choinski also went down in five sets, losing 7-5 4-6 2-6 7-5 6-2 to Italian Luciano Darderi. The late-blooming Harris, making his Grand Slam debut after a fine summer, ended in a 6-4 6-4 3-6 6-3 defeat by Spain's Jaume Munar.
