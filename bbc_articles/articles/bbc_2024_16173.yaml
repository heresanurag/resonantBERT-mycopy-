  The 20-year-old was also able to accept the pressure of expectation in the fourth innings of the second Test, a time when spinners are supposed to come to the fore. His 5-41 made him the youngest man to take a five-wicket haul for England in a home Test. Naturally, there is always room for improvement. England might think they could have made more runs in both innings, even though this was the first time they have made totals in excess of 400 twice in the same Test. Root also dropped a crucial catch that allowed Kavem Hodge to make a century. Looking ahead to the third Test at Edgbaston on Friday, England could need a refresh of the fast bowlers, possibly meaning a chance for Matthew Potts or the uncapped Dillon Pennington. Having said that, the management are not keen on rotation unless they absolutely have to, a policy I agree with. England should be targeting 3-0 wins over both West Indies and Sri Lanka, and are going about it the right way.
