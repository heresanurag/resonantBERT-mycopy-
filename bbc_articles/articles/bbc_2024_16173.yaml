title: 'England vs West Indies: Bazball V2 shown in second Test makes hosts more dangerous
  - Jonathan Agnew - BBC Sport'
date: '2024-07-22'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/c849kj9y0wdo
content: |-
  A tweak to Bazball makes England a more dangerous side and there were encouraging signs in the win over West Indies in the second Test, writes Jonathan Agnew.

  This video can not be played To play this video you need to enable JavaScript in your browser. England beat West Indies by 241 runs in second Test - highlights

  There is a significance attached to England’s performance at Trent Bridge in the defeat of West Indies in the second Test. It was two years ago at Trent Bridge where what we came to know as Bazball was born, with Jonny Bairstow’s blistering century leading England to an astonishing run chase against New Zealand. At the time, there was a need for Ben Stokes and Brendon McCullum to come in and do something different with England’s Test cricket. They inherited a team that had won only once in 17 matches. They were in crisis-management mode. For as much as England have thrilled and entertained us since then, their style was too risky and full-on. They jeopardised good positions, particularly in the Ashes last summer and on the tour of India earlier this year. It was time for a particular chapter of Bazball to come to an end, for England’s method to be recalibrated and retuned. We didn’t need to see it in the first Test at Lord’s, because West Indies were rolled over quite easily, but the second Test required a common-sense approach to Test cricket.

  And so, in Nottingham, the circle became complete. A year ago, faced with a first-innings deficit of 41, England would have come out in their second innings looking to go ‘bang, bang’ and score runs as quickly as possible. This time, they played sensibly to ensure they earned the lead that would eventually win them the match. England’s batting was still positive, but measured. It was the work of a team intent on winning matches and series, which they hadn’t done for more than a year. An intelligent England team is a more dangerous England team, because they and their opponents will know they have the gears to go through when needed. As an example, the third Ashes Test, when England dished out a proper Bazballing only to be thwarted by rain, will live long in the memory of the Australia bowlers. Someone like Zak Crawley is still the same player who hit the first ball of that Ashes series for four. The likes of Ben Duckett and Harry Brook just go out and bat, because they score quickly anyway. And Joe Root, who will end up with more Test runs than any other England batter, is playing like Joe Root. I got the impression he was quite badly affected by the Bazball mentality, none more so than when he was dismissed reverse-scooping Jasprit Bumrah in India. At Trent Bridge Root played his trademark shot, but not until he had a century to his name in the second innings. Sir Alastair Cook, sitting next to me in the Test Match Special box, actually called it as bowler Shamar Joseph was running in. It was the right moment to play it, rather than doing something silly in an attempt to make a statement to the opposition.

