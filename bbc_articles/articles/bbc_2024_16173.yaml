  In addition to the change of approach, England are doing some really interesting things with selection and these decisions are paying off. With all due respect to West Indies and Sri Lanka, this summer always seemed like a good opportunity to look to the future. That is why it was right for England to tap James Anderson on the shoulder. I have often talked about the integrity of selection, the idea that a player can know performances in domestic cricket are recognised and can lead to an England call-up. It’s not that England are ignoring these performances, they are instead looking really closely at the attributes of county players and how they can benefit the Test team. Jamie Smith is not the first-choice wicketkeeper at Surrey, yet England have identified his batting talent and got him in behind the stumps. He has kept beautifully, answering any questions over whether he would be up to the job. And then there’s Shoaib Bashir, who was head and shoulders the best of the three young spinners England took to India, despite having only six previous first-class matches under his belt. He showed England enough to persuade them he should be their spinner over Jack Leach, even though Leach is the senior man at their county Somerset. There are not many spin bowlers that I have to physically look up to, but at 6ft 4in, Bashir is one of them. England have decided they want a tall finger spinner, particularly with the next Ashes in mind, and Bashir fits the bill. But to say his only attributes are his height and lofty release point would do him a disservice. He is a quick learner, as he showed by adjusting his line between the first and second innings at Trent Bridge. Bashir gets loop and possesses subtle changes of pace.

