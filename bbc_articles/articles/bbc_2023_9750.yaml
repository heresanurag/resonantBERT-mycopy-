  Llŷr Jones, a farmer in Corwen, North Wales, has already noticed the effects of heat on his farm this year.

  Temperatures in the sheds for his flock of 32,000 hens have consistently reached 28C for the past 10 days.

  "We put in extra fans and encourage them to drink more water. They don't like anything higher than 25C so we're constantly checking to make sure they're happy," he says.

  A field of spring barley planted in April was close to failure until thunderstorms on Monday rescued the crop, he explains.

  "Last year, on this mountain in Wales, it reached 32C. You get to a point where there's nothing else you can do but desperately hope for rain to save the crops," he says.

  He lives on the family farm with his wife and three young children, and says it's clear they will have to change how they farm.

  "We are fully aware of the weather changing and we're doing everything we can to adapt," he explains.

  The environment is already showing signs of drought, explains Ali Morse at The Wildlife Trusts.

  "Vegetation is starting to look a bit drier, flowers aren't as healthy. If you look out at the countryside, it doesn't look as green," she explains.

  But the "hidden impacts" of drought on wildlife are really concerning, she says, adding that there is some evidence that insect numbers are lower this year after the 2022 drought.

  Butterflies and moths can be affected if they lay their eggs on plants that are dried out, or young fish may have stunted growth in rivers with low flows, affecting their ability to mate as adults.

  "If we do avoid drought this year it was by chance, not because the UK did the right things to avoid it," she adds.
