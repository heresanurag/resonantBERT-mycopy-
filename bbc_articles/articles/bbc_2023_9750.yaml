title: South rainier than north as UK weather trend flips - BBC News
date: '2023-06-16'
section: Science & Environment
url: http://www.bbc.co.uk/news/science-environment-65916142
content: |-
  Scottish rivers have broken low water records while southern England benefitted from a wet spring.

  The northern UK tends to be much wetter than the south, but this summer that pattern is being flipped on its head.

  Water levels in much of Scotland are very low with some rivers breaking records, while southern England is mostly healthy after a very wet spring.

  The UK Centre for Ecology and Hydrology warns of increased risk of drought affecting farmers and nature.

  One North Wales farmer told BBC News he has already almost lost a crop.

  Meanwhile, experts at the Wildlife Trusts say they are seeing signs of stressed nature.

  But current forecasts suggest the UK is unlikely to face drinking water shortages or hosepipe bans this summer.

  However, "vigilance is still required" in the southeast after demand for water in the recent heatwave may have depleted supplies, explains Jamie Hannaford, UKCEH Group Leader for Hydrological Status and Outlooks.

  Climate change is driving up global temperatures but there are currently no studies that clearly link human-induced climate change with altered risk of drought in the UK, according to the Met Office.

  UKCEH is an environmental research institute that analyses data from the Environment Agency and other public bodies.

  A map of UK river flows in May shows a clear divide between southern England and Wales, compared to Scotland, north-west England and north Wales.

  The river Nevis in western Scotland registered its lowest May flow since records began in 1983, while the Ewe had its second lowest since 1971.

  The Highlands had its eight driest May since 1890.

  Last week the Scottish Environment Protection Agency issued water scarcity alerts for the majority of the country, with Loch Maree in the northwest highlands facing significant shortages.

  By contrast, most southern regions received over 140% of their average rainfall. Wessex had its fifth wettest spring since records began there in 1890.

  One exception is in Devon and Cornwall where hosepipe bans remain in place after drought last year affected reservoir levels.

  The effects of dry weather are already being felt in parts of Scotland and Wales. A large wildfire burned overnight on Wednesday in the Rhondda valley, South Wales.

  Last week firefighters in the Scottish Highlands fought to control what could be the UK's largest fire to date.

