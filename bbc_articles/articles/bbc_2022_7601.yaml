content: |-
  Coco Gauff says she has shaken off the pressure she felt as a teenager and is ready to win a first Grand Slam against Iga Swiatek at the French Open.

  Last updated on .From the section Tennis

  Coco Gauff has reached the women's singles and doubles final at this year's Roland Garros Coverage: Live text and radio commentaries of selected matches across BBC Radio 5 Live Sports Extra, the BBC Sport website and app Coco Gauff says she has shaken off the pressure she felt as a 15-year-old and is ready to win a first Grand Slam against heavy favourite Iga Swiatek in the French Open final. Gauff first broke through by reaching the Wimbledon fourth round in 2019. The 18-year-old says her change in perspective will help her try to end Swiatek's superb 34-match unbeaten run. "I always wanted to play her in a final - I just didn't think it would happen so soon," American Gauff said. Swiatek, champion in Paris in 2020, is the overwhelming favourite at Roland Garros, having won the past eight finals she has played in and claimed five successive titles this year alone. However, Gauff has yet to drop a set in this year's tournament and has spent the past three years building on her eye-catching performances at Wimbledon. Since beating Venus Williams at SW19 on her Grand Slam main draw debut, Gauff has enjoyed a steady rise up the rankings and claimed some notable wins, including ending Naomi Osaka's title defence at the 2020 Australian Open. Swiatek and Gauff will meet on Court Philippe Chatrier from 14:00 BST on Saturday, with live text and radio commentary available on the BBC Sport website and app.
