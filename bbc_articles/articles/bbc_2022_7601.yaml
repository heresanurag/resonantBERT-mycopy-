  • None Alerts: Get tennis news sent to your phone This version of me is ready to win a Slam - Gauff Gauff is bidding to become the youngest American to win a Grand Slam since Serena Williams lifted the US Open trophy in 1999. Her Wimbledon run caught the attention of the public, with former First Lady Michelle Obama and singer Beyonce's mum posting about her on social media. On the eve of the final, Gauff spoke openly about how she "wanted to win too much" during that time, which led to her putting "way too much pressure" on herself. "I think there's a fine line between believing in yourself and almost pushing yourself too much," said Gauff, who won the 2018 junior title at Roland Garros. "If I do lift the trophy, honestly, I don't think my life is going to change really. "The people who love me are still going to love me regardless if I lift the trophy or not." Gauff is known for speaking out for social change, including calling for an end to gun violence in America after her semi-final win over Martina Trevisan. She credited her family and those around her with helping her to look at life beyond tennis. "I feel like I put myself in a bubble to the point where it was like tennis, tennis, tennis, tennis," she said. "Talking to my family in general, my grandmother is always like there is more to life than this. "Since I was younger my dad told me I could change the world with my racquet. He didn't mean that by just playing tennis. He meant speaking out on issues like this." Iga Swiatek has worn a ribbon in the Ukrainian colours on her cap during her matches Swiatek has become one of the best front-runners on the tour, having broken her opponent's service in their first service game in all six of her matches in Paris. She often overwhelms her opponents through her sheer power, most notably at last year's Italian Open when she thrashed Karolina Pliskova 6-0 6-0 in just 45 minutes. Victory in the final will mean Swiatek will draw level with Venus Williams for the longest winning streak on the WTA Tour in the 21st century. "I want to start with being proactive and put pressure on my opponents because I know how it feels," Swiatek told BBC Sport. "I try to be aware that my opponent is also going to be stressed and realise that I have nothing to lose." Swiatek, who turned 21 earlier this week, has said she believes Gauff could be a rival for years to come. The two met earlier this year at Miami Open, with Swiatek winning in straight sets. "I'm pretty happy that she's doing well, because I think she's also had a huge amount of pressure in her life," Swiatek said of her opponent. "When I see her, I tend to forget that she's 18."
