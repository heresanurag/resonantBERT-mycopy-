content: |-
  Manchester United's senior figures, including owners the Glazers, discuss Ole Gunnar Solskjaer's future after the loss at Watford and decide it will be the Norwegian's last game in charge.

  Last updated on .From the section Man Utd

  Manchester United boss Ole Gunnar Solskjaer is set to leave the club after Saturday's 4-1 defeat by Watford.

  There has been no official confirmation but it is understood all the club's senior figures, including owners the Glazers, have discussed his future.

  It was decided the Watford loss would be Solskjaer's last game in charge and the terms for his exit would be agreed.

  Technical director Darren Fletcher is set to take over for Tuesday's Champions League trip to Villarreal.

  It is possible first-team coach Michael Carrick could remain at Old Trafford despite being part of a management team responsible for a terrible run of results during which United have won just four of their past 13 games and two of their past eight.

  Some felt Solskjaer, 48, was fortunate to survive during the recent international break, before which United suffered a 5-0 home defeat by Liverpool and were beaten in a far more comprehensive way by Manchester City than the 2-0 scoreline suggested.

  The club's hierarchy stuck with him, believing the Norwegian could turn the situation around.

  However, both the defeat at Watford and the manner of the performance, which included a red card for captain Harry Maguire, have changed the landscape.

  And, with qualification for the Champions League knockout stage at stake if they fail to get at least a draw against Villarreal, United's senior figures were not prepared to risk a defeat by Unai Emery's team.

  They were by far the better side when they played at Old Trafford in September, only for United to beat them thanks to Cristiano Ronaldo's last-minute winner.

  United goalkeeper David de Gea described the loss against Watford as "embarrassing" and "another nightmare".

  It left the side seventh in the Premier League, following a run of one league win in seven games.

  Solskjaer replaced Jose Mourinho on an interim basis in December 2018.

  He was then given the job full-time in March 2019 on a three-year deal and in July signed a new deal until 2024.
