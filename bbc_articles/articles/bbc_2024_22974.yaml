  John was eventually referred by his GP for cognitive behavioural therapy (CBT). It is an NHS-approved talking therapy that can help you manage problems by changing the way you think and behave. John described this as the start of his recovery. "I would use the analogy of being in a boat that is leaking, and then you’re given the right tools. "This wonderful bucket that helps you empty the boat of some of that water, but the boat was still leaking." John waited several months for his first CBT appointment through the NHS and was given an initial six sessions. He later paid for further sessions through the private sector. John said CBT was the starting point of a longer journey that included coaching, training and self-reflection. “I was able to reconfigure my thoughts and not catastrophise things and realise they’re just thoughts, you don’t have to act on them, but it also took a lot of self-reflection and working on myself. "It really got me thinking, if this is what happened to me...it must be happening to others."

  Over 20 years on, issues around waiting lists and access to talk therapies remain. In Northern Ireland, it is recommended that mental health support or treatments should be made available within nine weeks. But research published in June this year by the office of Northern Ireland’s mental health champion shows this target is being missed in a high number of cases. Data from the Northern Ireland Life and Times Survey shows 47% of those who sought services before October 2021 did not receive effective treatment within nine weeks. The Department of Health has acknowledged that health trusts were experiencing “significant pressures” that put increased demands on services. A spokesperson added that the mental health strategy was working towards reducing waiting lists and supporting people in times of crisis.

  She said psychological therapies were known to be "very effective," but waiting lists are simply too long. Prof O'Neill said this resulted in mental health problems getting worse with many people "suffering in silence". "It’s really important to see a man coming forward and talking about this publicly, in terms of how he recovered and what worked for him," she said. After years of working on his own physical and mental health, John Kelly now coaches businesses on bringing positive cultural change to their organisations.

  John Kelly is part of the line-up for an event in Belfast this week

  This week, he is sharing his story in front of an audience as part of a speaking event in Belfast. The line-up also includes Northern Irish rock musician and frontman of The Answer and the Unholy Gospel, Cormac Neeson. John Kelly said: “I suppose being involved in this event does show how far you can come, but there is still such a stigma around mental health. “I just want to share my story because I think it can help others; I’m living proof that no matter how down or anxious you feel, things can get better.”
