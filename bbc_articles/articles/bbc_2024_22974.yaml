title: 'Anxiety: ''I thought my panic attack was a heart attack'' - BBC News'
date: '2024-09-24'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cd98n4wnk53o
content: |-
  A man from County Tyrone is sharing his story of overcoming anxiety to help tackle the stigma around it.

  John Kelly was driving to Dublin for a work meeting when he began to feel a tightness in his chest

  "I had to pull the car over and phone emergency services, and I just thought this is it; I’m having a heart attack.” John Kelly was driving to Dublin for work when he felt a tightness in his chest and pins and needles in his arm. He called an ambulance and spent the next three days in the hospital for extensive tests, but these all came back clear. “I was visited by a doctor who said the problem wasn’t with my heart," he said. "When I asked what the problem was, he pointed to my head.”

  Previously, the Dungannon-born businessman spent most of his career in the corporate world, occupying a senior position at a soft drinks company. In the early 2000s, he started his own sales training business, and soon after this, his symptoms of anxiety began. “I had been self-employed for a few years, and I thought I was doing OK; I had a nice house, loving family, but I suppose work was getting increasingly pressurised. “One day, I just remember feeling like this fog on my brain and not understanding what it was, but I was still able to function." A few days later, John had his first panic attack.

