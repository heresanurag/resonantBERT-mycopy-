title: D-Day landings in colour - BBC News
date: '2019-06-06'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-48544713
content: |-
  Marina Amaral a digital colourist transforms black and white pictures of D-Day into colour.

  Digital colourist Marina Amaral has transformed a number of photographs taken during the D-Day landings by using digital techniques to add colour to the black and white pictures.

  Here we present a small selection of her work.

  British paratroops of the 6th Airborne Division aboard an aircraft en route to their drop site

  Troops from the 101st Airborne with full packs and a bazooka, in a C-47 just before take-off from RAF Upottery Airfield en route to Normandy

  US troops use a lifeline to rescue several men from a landing craft sunk by enemy fire on D-Day

  US landing craft fly the stars and stripes as their troops wade ashore in Normandy after D-Day
