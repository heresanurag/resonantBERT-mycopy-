title: Plan for workplace health checks to curb heart disease - BBC News
date: '2024-08-30'
section: Health
url: http://www.bbc.co.uk/news/articles/clywg73vzxdo
content: |-
  The government hopes the new scheme will save lives and help ease the pressure on the NHS.

  Men especially are being urged to get the tests as they are more likely to develop cardiovascular disease at an earlier age than women

  More than 130,000 people in England will be offered free workplace health checks in the next six months under a new initiative to try and prevent heart disease. From September, employees in several sectors including building and hospitality will be able to access quick assessments that will determine their risk of developing cardiovascular disease (CVD), which can cause heart attacks and strokes. Those aged between 40 and 74 who do not have certain pre-existing conditions linked to heart disease will be eligible. According to the government, these checks will save thousands of hours of NHS time and will help to cut waiting lists.

  The scheme is an effort to increase the number of NHS Health Checks, first introduced in 2009, that are carried out. As well as targting heart disease, the programme aims to prevent diabetes and kidney disease, as well as some cases of dementia among adults. Health minister Andrew Gwynne said that while over 16 million people were eligible for the check, current data showed only 40% went on to complete one. "This is especially true for men, who are less likely to get early help but who are more likely to develop cardiovascular disease at an earlier age than women," he said. "This new programme aims to reach more people through their place of work and make it more convenient for people to understand and improve their cardiovascular health." People taking part will be required to answer a short lifestyle questionnaire; have their height, weight, and waist measured; undergo a blood pressure test; and have a simple blood test to measure cholesterol and blood sugar levels. The checks will also record key information including smoking status; family history of coronary heart disease; and cholesterol level. They are part of government efforts to boost economic growth in the UK by improving healthcare. “Health checks can save lives. They can prevent people from developing largely preventable diseases, such as heart disease, cancer, Type 2 diabetes and liver disease," said Louise Gittins, chair of the Local Government Association. Plans for a digital version of the NHS Health Check have also been announced, with testing for this due to take place next year. Councils in Norfolk, Medway and the London borough of Lambeth have signed up for the trial. It is estimated the initiative will deliver one million checks in its first four years and there are plans to then roll it out nationally alongside face-to-face assessments. CVD is a leading cause of death and disability in England. It accounts for 1 in 4 deaths in England, according to NHS figures, despite being largely preventable if people lead a healthy lifestyle.
