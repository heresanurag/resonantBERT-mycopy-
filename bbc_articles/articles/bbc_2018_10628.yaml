title: Labour's Joan Ryan and Gavin Shuker lose no-confidence votes - BBC News
date: '2018-09-07'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45445297
content: |-
  Labour MPs Joan Ryan and Gavin Shuker tell constituents they will not quit over local party votes.

  Two Labour MPs who lost no-confidence votes among local party members have told constituents they will not quit.

  Former minister Joan Ryan, MP for Enfield North, blamed the 94-92 vote defeat on "Trots, Stalinists, Communists and assorted hard-left".

  Luton South MP Gavin Shuker said he was "sorry a handful of people" wanted to overturn his 2017 win.

  Both are among MPs to have criticised Jeremy Corbyn and faced no confidence votes in their local parties.

  Others include Frank Field, who quit the parliamentary party last week citing the handling of the anti-Semitism row and bullying in local constituency parties, Kate Hoey, who has voted with the government on Brexit, and another Brexit-backing Labour MP Graham Stringer, who won his no confidence vote.

  In July, Momentum's national co-ordinator Laura Parker suggested Ms Hoey, Mr Stringer, Mr Field and John Mann - who also backs Brexit - should be deselected, saying there was "no room" for them in the party.

  No confidence votes carry no official force within the Labour party but local activists could hold a "trigger ballot", where sitting Labour MPs can be forced to compete for selection as a candidate against all-comers, ahead of the next general election.

  Ms Ryan, who chairs the Labour Friends of Israel group and has been critical of Mr Corbyn, said on Twitter: "Just to be clear, I am not resigning. I am Labour through and through and I will continue to stand up and fight for Labour values."

  She added that losing 92 to 94 votes was "hardly a decisive victory": "It never occurred to me that Trots, Stalinists, Communists and assorted hard left would [have] confidence in me. I have none in them."

  The vote was covered by Iranian station Press TV, which published video on its Twitter feed. Labour Party deputy leader Tom Watson said that made a "farce of the proceedings and is not how the modern Labour Party should conduct its affairs".

