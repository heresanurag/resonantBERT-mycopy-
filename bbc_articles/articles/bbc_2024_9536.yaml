title: 'Nail art: Salons to collectively raise manicure prices - BBC News'
date: '2024-04-07'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68740412
content: |-
  Nail technicians say they are struggling with rising costs and need to increase prices to survive.

  The cost of getting a manicure will increase on Monday, as thousands of nail technicians across the UK come together to raise their prices.

  The Nail Tech Org, which is behind the National Nail Price Increase Day movement, said its members were making about £7 per hour, below the minimum wage of £11.44.

  “We don’t necessarily want to, but we’ve got to live as well,” said Ellie Jenkins, a self-employed nail technician.
