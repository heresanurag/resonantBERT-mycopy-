  Mother heartbroken over death of 'angel' sons in M6 crash

  Jaroslaw Rossa and his sons Filip and Dominic died in the M6 crash

  The mother of two boys killed in a car crash on the M6 has said she is heartbroken at the deaths of her "beloved angels". Jaroslaw Rossa, 42, his sons Filip, 15 and Dominic, seven, and passenger Jade McEnroe, 33 - all from Glasgow - were killed when the Toyota they were in collided with a Skoda driving the wrong way last Tuesday. Filip and Dominic's mother Kamila said her family would "never be the same again." Ms McEnroe's parents said their daughter was a "much-loved mummy" to her seven-year-old son Arran, who was also in the vehicle and remains in hospital with serious injuries.

  The driver of the Skoda, a 40-year-old man from Cambridgeshire, also died in the crash. The collision occurred just after 16:00 on 15 October, following a report of the Skoda travelling southbound on the northbound carriageway. It was then involved in a head-on collision with a Toyota.

  Jade McEnroe's parents said she was a 'much-loved mummy'

  In a statement released through Cumbria Police, Kamila described her boys as loving, intelligent children and said her family was heartbroken at their loss. She said: “Filip was very intelligent, sensitive and full of love. We will never forget his smile, open arms, and the words "tuli, tuli" (hugs, hugs). "He was fascinated by computer games but also incredibly good at chess. He loved chemistry and dreamed of studying at the University of Glasgow. “Dominic was always smiling, very resolute and sociable. He was extremely caring, always thinking of others first, and the first to help if someone was in trouble. "Always surrounded by a group of friends of all ages. He loved dinosaurs and Pokémon, but most of all he loved penguins and dreamed of adopting one. “Our lives will never be the same again.” Ms McEnroe's parents said: “Our beloved daughter Jade, you are so loved, and we will miss you every day. “You are a very much-loved mummy to Arran.” Arran's father said he would like to thank everyone for their kind messages, as well as the emergency services and members of the public who tried to help after the crash. Tributes had previously been paid to Mr Rossa, a chef and Ms McEnroe, a spa therapist, by their employers.
