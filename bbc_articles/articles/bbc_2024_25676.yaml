id: bbc_2024_25676
title: Video shows Iran's missile attack on Israel - BBC News
date: '2024-10-02'
section: General
url: http://www.bbc.co.uk/news/videos/c3rlvj3xgpyo
content: |-
  A statement on Iranian state TV confirmed "dozens" of missiles have been launched towards Israel.

  Video shows a barrage of missiles being launched by Iran, towards Israel.

  Iranian state television carried a statement confirming that "dozens" of missiles were fired.

  The Israeli home front command sent text messages to people in certain areas of Israel, containing "life-saving instructions" directing them to protected areas.

  Israel's Iron Dome intercepted some of the incoming missiles.
