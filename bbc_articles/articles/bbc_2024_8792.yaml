title: Ram-raiders use digger in Whittlesey cash machine theft - BBC News
date: '2024-04-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-67250351
content: |-
  Ram-raiders used a digger and a pick-up truck to steal money from the building society cash machine.

  Ram-raiders used a digger and a pick-up truck to steal money from a building society cash machine in the early hours of Saturday morning.

  Police were called to the Nationwide branch in Whittlesey, Cambridgeshire, at about 01:45 BST.

  Det Insp Shish Thind said business burglaries were not "victimless crimes" but had a huge impact on shop workers and the people who use their services.

  One bystander was heard to say ram-raiding the property was "a bit overkill" for the market town.

  Cambridgeshire Police is appealing for witnesses or dashcam footage.
