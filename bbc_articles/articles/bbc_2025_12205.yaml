title: Graphic footage of Ross Monaghan shooting broadcast on Spanish TV - BBC News
date: '2025-06-02'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c79e5y5pvx1o
content: |-
  The CCTV shows Ross Monaghan's final moments in a bar in Fuengirola after Eddie Lyons Jnr was gunned down outside.

  The gunman opened fire in Monaghans pub in Fuengirola

  Graphic footage showing the final moments of Scottish gangland shooting victim Ross Monaghan has been broadcast on Spanish TV. The video was captured inside Monaghans bar in Fuengirola on the Costa del Sol on Saturday, seconds after Eddie Lyons Jnr, 46, was gunned down outside. The footage, which the BBC is not publishing here, shows Monaghan with blood seeping through his white t-shirt from a chest wound, propping himself up on a table before collapsing. Spanish detectives said investigations were ongoing into the murder of the two men, who were major players in Glasgow's Lyons crime clan.

  CCTV from the bar showed the gunman - who was dressed in black - chasing critically-injured Monaghan before he stumbled and fell to the ground. Two bystanders, thought to be a waitress and another man in black, can be seen running away from the suspect.

  Eddie Lyons and Ross Monaghan pictured together outside Glasgow Sheriff Court

  The gunman appeared to be wearing a black baseball cap, a black jacket, black shorts and had a white T-shirt round his neck, which he is thought to have used to hide his face before opening fire. The indoor lounge bar was deserted at the time but a number of customers, who had been watching the Champions League final, were outside.

  Monaghan, 43, who is believed to be the owner of the pub, was a suspect in the 2010 murder of Kevin "Gerbil" Carroll outside an Asda supermarket in Robroyston, Glasgow. The case against him later collapsed but he returned to the headlines in 2017 when he was shot in the shoulder after dropping his child off at a primary school in the city's Penilee area. Spanish police confirmed on Monday that they had yet to make any arrests. A spokesman said: "The investigation is continuing into the fatal shooting of two men at a pub in Fuengirola, with nothing new at the moment."

  Tourists walk near the crime scene Monaghans bar on Monday

  The gunman fled on foot before rejoining an accomplice in a car who had driven him to the murder scene. Detectives have retraced part of their escape route to the old N-340 dual carriageway heading towards Benalmadena. No details about the getaway vehicle have been released. Officers from the Spanish National Police's Anti-Drug and Organised Crime Unit are heading the ongoing probe but they are reporting to a local investigating judge coordinating the operation. Court officials are expected to confirm later if a secrecy order has been placed on the investigation, preventing public officials from making any detailed public comment. Such orders are often placed on criminal probes especially in their infancy to protect investigations by limiting the number of people who have access to sensitive information.

  Ross Monaghan (blurred here by BBC News) was slumped against a table in a bloodied t-shirt

  The National Police has confirmed two men were killed but declined to name them. A force statement said: "Around midnight on Saturday an incident with firearms occurred in Fuengirola, specifically at an entertainment venue along the seafront. "Two males died as a result from gunshot wounds. "The investigation is ongoing and no arrests have been made so far." In August 2017 Monaghan and Eddie Lyons Jr, both members of the Lyons Glasgow crime family, were cleared of being involved in a street attack on three men outside the Campsie bar in Bishopbriggs, East Dunbartonshire. The shooting in Spain comes amid a series of assaults, shootings and firebombings across Glasgow and Edinburgh since March which have resulted in more than 30 arrests.

  Gangster: The Story of the Daniels and the Lyons The bloody feud between two of Glasgow's most notorious crime families

  Saturday night's gun murders followed the fatal shooting nearly six weeks ago of a 32-year-old British man in nearby Calahonda, a 15-minute drive from Monaghans. He was shot dead around 20:00 on 21 April in a professional hit as he headed back to his car after playing in a football match with friends. Police are treating the shooting as drugs-related but have yet to make any arrests. The victim has not been named but was known to come from Liverpool. Reports at the time described the incident as the fourth shooting so far that month on the Costa del Sol, where rival gangs have increasingly used extreme violence to settle scores and a number of international mafias are known to have a base. Four days before the Calahonda shooting, a 34-year-old man was rushed to the Costa del Sol Hospital in Marbella after being shot outside a nightclub in the famous Costa del Sol resort.
