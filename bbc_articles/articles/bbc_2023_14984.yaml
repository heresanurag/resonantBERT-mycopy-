title: 'Ukraine war: Six postal workers killed in Kharkiv missile strike - BBC News'
date: '2023-10-21'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-67185216
content: |-
  The regional governor Oleh Syniehubov says a further 16 people have been taken to hospital with injuries.

