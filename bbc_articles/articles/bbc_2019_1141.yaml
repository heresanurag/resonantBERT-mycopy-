id: bbc_2019_1141
title: 'David Cameron: I don''t regret calling referendum - BBC News'
date: '2019-01-16'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46891769
content: |-
  Former UK Prime Minister David Cameron says he backs Theresa May's efforts to secure a Brexit deal with the EU, but insists he does not regret calling the referendum.

  Mr Cameron told the BBC, as he headed off for a run, that he regretted losing the 2016 referendum but said he backed Theresa May.
