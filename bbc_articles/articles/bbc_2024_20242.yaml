content: |-
  Mussie Imnetu was found unconscious with a head injury near the Notting Hill Carnival on Monday.

  Mussie Imnetu works at an exclusive private members' club in Dubai

  A chef is in a critical condition after being attacked near Notting Hill Carnival, the Metropolitan Police said. Swedish national Mussie Imnetu was found unconscious with a head injury in Queensway, Bayswater, west London, at about 23:20 BST on Monday. A 31-year-old man has been arrested at an address in Newham, east London, on suspicion of attempted murder. He remains in custody. Police are appealing for information about Mr Imnetu's movements on Monday.

  The 41-year-old is the head chef at Arts Club in Dubai and has worked under Alain Ducasse, Gordon Ramsay and Marcus Wareing, according to the club's website. He was visiting London on a business trip. Mr Imnetu left Arts Club - a sister club to the Dubai venue - on Dover Street shortly after 13:00. He was wearing a blue T-shirt and black jeans, and later bought a white baseball cap, a Met spokesperson said. He arrived at Dr Power restaurant on Queensway at about 22:30. The restaurant was serving food from stalls outside and playing music, with the surrounding area "extremely busy with people who had been to carnival", the spokesperson added.

  Police released a CCTV image of Mussie Imnetu leaving the Arts Club on Monday

  Det Ch Insp Brian Howie said: “While the arrest of a suspect is a significant step in our investigation, we are still very keen to hear from anyone who can help piece together Mussie’s movements between when he left the Arts Club at 13:00 and when he arrived at Dr Power restaurant at 22:30." He urged anyone who was at the restaurant between 22:00 and 23:30 on Monday, or in the area, to contact police with any information they may have. Det Ch Insp Howie added: "Customers at the venue tried to help stop the attack. We need to speak with these people and I urge them to contact us."
