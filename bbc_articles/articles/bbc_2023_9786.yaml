title: Three teens killed and one hurt as car hits tree in Oxfordshire - BBC News
date: '2023-06-20'
section: Oxford
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-65954358
content: |-
  The teenagers were passengers in a BMW when it crashed into a tree just after midnight on Tuesday.

  The car left the road and hit a tree in the early hours of Tuesday, police said

  Three teenagers have died and a fourth is in a life-threatening condition after the car they were travelling in hit a tree.

  The four were in a silver BMW that crashed on the A415 in Marcham, Oxfordshire, at about 00:10 BST.

  The passengers, two 18-year-old men and a 17-year-old boy, all died. Police said their next of kin have been told.

  The driver, an 18-year-old man from Oxfordshire, remains in hospital with life-threatening injuries.

  The site of the crash is on a bend in the road on the edge of the rural village of Marcham, near Abingdon. The A415 cuts through the village between Frilford and the A34.

  Emergency services have cleared the road but Scottish and Southern Energy was still working to make safe a live cable from a lamp-post.

  It was not clear whether it was damaged by the car or the tree falling on it.

  Susie Jackson, who lives close to the scene, told the BBC: "Something needs to be done about the road, it's too dangerous.

  "There's been about four incidents in the last couple of years and there have been several fatalities here."

  Resident Andrew James said he had known three serious accidents at that spot

  Nearby resident Andrew James said he was woken up at 02:00 by flashing blue lights outside.

  "There were about 20 police [officers] and two fire crews, and activity just down the road in the trees," he said.

  Mr James added: "This is the third serious accident at almost exactly the same spot. It's an unexpected curve, surrounded by trees, which seems to create a black spot.

  "It is so sad to see yet another instance like this, especially with such tragic loss of life."

  Research by the AA showed there had been 96 collisions on the A415 between 2013-18, 13% involving young drivers.

  Sgt Matt Cadmore, from Thames Valley Police, said: "This is an extremely tragic incident which has resulted in the deaths of three young men.

  "Our thoughts remain with their families and friends at this extremely difficult time."

  He urged anyone who witnessed the crash or with dashcam footage prior to it to contact the force.

