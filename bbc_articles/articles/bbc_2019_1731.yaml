title: Housebuilder Persimmon's profits top £1bn - BBC News
date: '2019-02-26'
section: Business
url: http://www.bbc.co.uk/news/business-47368308
content: |-
  The firm also names a new chief executive, following the pay row surrounding his predecessor.

  Profits have topped £1bn for the first time at housebuilder Persimmon, which was caught in a pay row last year and is under scrutiny over its continued involvement in the Help to Buy scheme.

  Annual profits jumped 13% to £1.091bn, up from £966m in 2017.

  The firm also said its interim chief executive, Dave Jenkinson, would now take on the role permanently.

  Mr Jenkinson's predecessor, Jeff Fairburn, left last year following controversy over his £75m pay package.

  "We are the first company to make over £1bn profit in this sector," Mr Jenkinson said. "The whole team are very proud."

  The results come a day after shares in Persimmon fell 5% because of questions over its continued involvement in the Help to Buy scheme.

  The firm sold 7,970 homes under the scheme in 2018, up from 7,682 in 2017.

  At the weekend, a source close to Housing Minister James Brokenshire said the minister was "increasingly concerned" by Persimmon's practices, including its use of leasehold contracts, the quality of its buildings and its leadership.

  He said this meant its inclusion in the Help to Buy scheme was under review.

  Mike Amey, managing director of global investment management firm Pimco, told the BBC that profit per house at Persimmon had trebled since Help To Buy was introduced.

  And housing expert Henry Pryor told the BBC: "There is no doubt that Help to Buy has been the crack cocaine of the housing industry. We've all got addicted to it and when we are weaned off it, it is going to be painful."

  The Persimmon money machine rolls on, profits past the £1bn mark and £2.2bn returned to shareholders in the past seven years, with the promise of more - much more - to come.

  Persimmon has been an astonishing success for its investors, and of course its executives, who are benefiting from a giant pay scheme agreed in 2012.

  Sometimes, though, you can have too much success, particularly when you are a big beneficiary of a taxpayer-funded housing scheme, in this case Help to Buy.

  Jeff Fairburn, the former chief executive, had to fall on his sword after public and investor opinion swung sharply against the size of his remuneration - £75m, although he gave some to charity.

  The danger now is that a similar shift in sentiment undermines the company as a whole.

  Politicians might decide that £1bn a year in profits, a 30% operating margin and giant dividends to shareholders are evidence the new-build housing market is no longer sufficiently competitive, and has instead turned into an oligopoly, a market carved up between a few big players.

  There was a hint of that in weekend reports that Persimmon's participation in Help to Buy was under government scrutiny - a hint strong enough to send the shares down nearly 5%.

  If the hint were to turn into reality, the Persimmon money machine would judder to a halt.

  Mr Jenkinson has been with the firm for 22 years and had been interim chief executive since November, following Mr Fairburn's departure.

  He said: "2018 has been a year of disciplined high quality growth again for Persimmon Homes.

  "We have a lower average selling price than our competitors, but that is a function of our desire to hit all parts of the market."

  He added: "It is important for me as the new CEO to acknowledge that we still have work to do in customer care."

