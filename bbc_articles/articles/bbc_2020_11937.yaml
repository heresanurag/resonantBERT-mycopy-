  A round-up of reaction to the first minister's announcement of a "short, sharp" lockdown.

  Deaths at home up by nearly a quarter in Wales

  More than 1,600 extra deaths have occurred in people's own homes in Wales so far this year than average, according to analysis by the Office for National Statistics (ONS). Deaths from heart disease amongst men in their own homes were 22.7% higher compared with the five-year average - while there were more than 29% fewer deaths through this cause in hospital. Deaths for women from dementia in their own homes almost doubled in Wales, while in hospitals they fell by 25.5%. “While deaths in hospitals and care homes have dropped below the five-year average since the initial peak of the coronavirus pandemic, we’ve consistently seen deaths in private homes remain well above the five-year average," said ONS analyst Sarah Caul. Unlike the high numbers of deaths involving Covid-19 in hospitals and care homes, the majority of deaths in private homes are unrelated to the virus. Up to 11 September, there have been 7,440 deaths in people's homes in Wales, with 134 of these involving Covid-19. This was 1,624 deaths more than the five-year average for the same period. Nearly two-thirds of these excess deaths came in the 70 to 89 years age group. One expert has suggested these deaths would normally have occurred in hospital. People may have been reluctant to go, discouraged from attending, or the services have been disrupted, Sir David Spiegelhalter of the Cambridge University said.
