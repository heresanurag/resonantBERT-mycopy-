  As questions are asked about her future, Liz Truss faces Keir Starmer in the House of Commons.

  Amid speculation about Liz Truss's future, here are some of the highlights as she faced Sir Keir Starmer and other MPs at Prime Minister's Questions.

  She gave further apologies for policy U-turns, saying she had acted in the "national interest", but had made mistakes.
