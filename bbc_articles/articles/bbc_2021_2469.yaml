title: 'Tiger Woods wins 2019 Masters: What was it like to witness his victory? -
  BBC Sport'
date: '2021-02-24'
section: General
url: http://www.bbc.co.uk/sport/golf/47930154
content: |-
  The cheers, the emotion, the standing on a chair to catch a glimpse - what was it like to witness Tiger Woods' Masters victory?

  A first birdie of the day on three. A first Augusta Sunday Tiger roar.

  It's an earthy roar, the sort that comes up through the ground and rumbles through your boots. Breakfast beer feeding already animated spectators - or 'patrons' as they are always referred to here.

  "It's Tiger at Augusta. On a Sunday. In contention. Why would you not follow him round?" says just about everyone.

  Thousands are tracking Tiger Woods' every move round Augusta National, hoping to witness the writing of another glorious sporting chapter.

  You're not allowed to run at the Masters so instead you just ride the wave of Tiger mania as it builds into the realisation you are witnessing something truly monumental.

  This is what it was like following Woods on his way to his first major victory since 2008.
  • None I had serious doubts I could compete again - Woods

  It was an earlier start than usual because of the threat of afternoon electrical storms but thousands of patrons streamed through the entrance gates at breakfast, some keen to stake their place by a favourite green, others gathering by the first tee, waiting for Tiger.

  The patrons are 10 deep, I'm five back. At 09:21 I see the top of the backswing, a flash of red, and then the whooping and hollering starts as the disciples set off after their leader.

  There is chaos as early as the second hole of his final round of 18 with marshals trying in vain to halt the swarming masses moving from the first green to second tee, with Aaron Wise, Marc Leishman and Kim Si-woo trying to tee off between the two on the ninth.

  While Woods is knocking in a birdie at seven, the patrons watching from just down the hill are oblivious to Kiradech Aphibarnrat teeing off right next to them on the third.

  And so it continues.

  The atmosphere is incredible round Amen Corner. Overnight leader Francesco Molinari dumps his tee shot into the water on the short 12th.

  There are a few whoops and hollers but one over-exuberant fan shouts "Go Tiger".

  It's blood in the water for Woods. I'm probably 20 people back and can just about see the top of his head. He strikes the ball with a nine-iron. Almost before it's off the tee there's a shout of "get in the hole".

  Both men are ushered away by marshals. Unlike the tribal Ryder Cup, Augusta National doesn't tolerate over-zealous shouting.

  You can understand them getting carried away. You can feel the momentum growing and the volume levels rise with each shot edging Woods closer to his moment of history.

  The 12th - the moment Woods hunts down Molinari

  While Molinari double-bogeys the 12th, Woods two-putts for par. The second stroke is received with as much gusto as if he had birdied. Those watching on know how significant a par it was. Their man has drawn level with the Italian.

  Tiger - who always used to lead from the front - has hunted down Molinari. The noise from those fans that have followed his every stroke this week alerts even more to join the party and roar Woods home.

  The stands empty out as the players head to the 13th tee. Woods, Molinari and Tony Finau are the final group out. So the support swells with each passing hole.

  I don't see the drive on 13 but I know Woods is in the fairway. The cheers tell me that. I also know Molinari is in a good spot. The 2018 Open champion has his supporters.

  There is zero chance of getting close to the 13th green to watch one of the most iconic shots in golf, over the creek on to the green to set up an eagle chance.

  The 13th & 14th - standing on chairs & trying to see past umbrellas

  It's tricky following Tiger. You have to reconcile yourself to the fact you won't see many shots but it is enough for most to simply be in the presence of a sporting legend.

  For some it was a like a military operation, presumably months in the planning, working out which side of the fairway to be to get prime access to greens and the next hole.

  For others, it was about always being on the move, staying ahead of the game, missing the odd hole to ensure an optimum view later down the line.

  A brief downpour hampered many, with huge Masters green and white umbrellas blocking out much of the 13th green.

  A couple tried standing on their chairs in front of the packed grandstand on the 14th - another act frowned upon - but they were getting away with it.

  Others were on tip-toes, clinging to Georgia pines, taking advantage of higher ground but so far away they were relying on those closer to relay, via roar, if Woods had an eagle three.

  The groans speak volumes. Molinari's missed eagle putt is understandably greeted more joyfully. The Italian had his fun back in July at Carnoustie when the pair played together in the final round of The Open but now we are in Woods' backyard.

  The leaderboards suggest Brooks Koepka and Xander Schauffele may also have a say in the outcome. The Woods fans are having none of it.

  This is his time. This is their time. Time to see the four-time Masters champion edge one closer to Jack's Augusta National record. And also move within three of Nicklaus' record major haul of 18.

  Molinari, a machine all week with just one bogey in his first 54 holes, makes another mistake. This time it's terminal. His third to the 15th joins the turtles in the pond protecting the green. Stifled cheers greet the news.

  Another birdie for Tiger. He's now at 13 under par, three clear of Molinari but the threat comes from elsewhere. World number two Dustin Johnson sets the target at 12 under.

  Woods loads up at 16, the scene of 'that shot' from off the back left that led to his last Masters win 14 years ago.

  He's long. But the Augusta patrons know where this ball will end up.

  Gravity takes over and the ball feeds back down, encouraged all the way by thousands. A tap-in birdie. Fourteen under par. Leader by two with two to play.

  There is a dawning realisation of what we are watching. The players emerge out of that bottom corner of the course. Woods steely-faced, almost unchanged from the first tee. Molinari looks like he could cry.

  A par on 17 for Woods. A bogey at the last will win the Masters.

  He doesn't make it easy. A chunked second on the 18th leaves him with work to do. But the chip is decent and Woods finishes the job.

  The outpouring of emotion on the green is matched by the cries of "Tiger, Tiger, Tiger" off it.

  He's come full circle. Twenty-two years ago he won his first Masters and hugged his dad, the driving force behind the young Tiger, as he left the green.

  On Sunday it was a hug for his mother. And his own children. The emotion of it all overwhelming.

  He lets out his own roar. A real Sunday-at-Augusta Tiger roar as he walks off.

  It's been a special day and one that will live long in the memory of all those here to witness it.
