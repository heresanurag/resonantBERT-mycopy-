content: |-
  Rishabh Pant hits a brilliant 61 but Scott Boland takes 4-42 as India lead Australia by 145 with four wickets remaining after day two of the final Test.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Strewth' - Pant hits Starc for back-to-back sixes as he reaches half-century

  Rishabh Pant's stunning 61 helped give India a lead of 145 runs in the final Test against Australia after an enthralling second day that saw 15 wickets fall. The wicketkeeper-batter produced the explosive innings off just 33 deliveries after Scott Boland had put the home side in the driving seat at the start of India's second innings. The Australia fast bowler took three quick wickets in an inspired spell after his side had posted a first innings of 181. Debutant Beau Webster top scored for the hosts with 57 as India took a first-innings lead of just four runs. India captain Jasprit Bumrah walked off the field early in the afternoon session and left the ground to have an injury assessed, although he was seen returning before the close of play. One of Boland's victims was Virat Kohli as the India great's final Test innings on Australian soil ended for six as the tourists finished the day on 141-6.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Pant's arrival at the crease came moments after Kohli had been smartly caught by Steve Smith at slip and that significant moment was quickly followed by the explosive left-hander hitting Boland over the long-on boundary for six. He missed an attempted ramp shot completely two deliveries later but was not to be deterred and at one stage Australia captain Cummins had six fielders on the rope. Mitchell Starc, taken for 16 by Yashasvi Jaiswal in the first over of the innings, was hit for two consecutive sixes as Pant reached a frantic 50 off only 29 deliveries, one slower than the record he set against Sri Lanka in 2022. A swipe off Cummins through to Alex Carey brought the mayhem to an end, and Ravindra Jadeja and Washington Sundar piloted India to stumps after Nitish Kumar Reddy had holed out to Cummins at mid-off. Smith dropped Jadeja to deny the impressive Webster a second wicket just before the close. While it remains to be seen whether Bumrah will bat on day three, it feels more certain the Border-Gavaskar Trophy - which Australia lead 2-1 - will be decided with plenty of time to spare.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'It's a gimme' - Kohli angry after falling to Boland

  Australia's decision to replace the out-of-form Mitchell Marsh with Webster looks an inspired one after the 31-year-old Tasmanian made an important contribution on his second day of Test cricket. With Australia in trouble at 39-4 after Mohammed Siraj had dismissed Sam Konstas and Travis Head in the same over, Webster knuckled down with a determined innings that included six fours. He then claimed his first Test wicket when a swipe from Shubman Gill was pouched by Carey, and should have had Jadeja as his second - but Smith could not hold on to a one-handed effort in front of Usman Khawaja at first slip. The bowling honours for Australia went to Boland, who was an immediate threat after Starc had proved expensive. The delivery that moved off the seam to clip Jaiswal's off stump was a highlight for the popular 35-year-old Victorian. If Boland and the rest of the attack can finish India off quickly on the third morning then Australia will have a good chance of winning the match and making sure of the series victory. That said, the dramatic second day suggested making predictions is folly, and the availability of Bumrah will surely prove to be crucial.

