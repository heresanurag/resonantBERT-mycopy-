  Australia's Alex Carey on ABC: "The game is in the balance, it is exciting Test cricket in fast-forward mode. "The pitch has not died down, I have not seen as much bounce at the SCG for a while. Let's see if we can take four early ones, and see how we go. "250 would be a lot to chase, we will back ourselves to take those four quickly. We are creating chances. "These two batters have proved difficult to get out in this series but there is enough there. If we can get them out and get their bowlers in, hopefully we can run through them. "I thought Beau's innings was fantastic, he jumped on anything full - he's a big boy and killed off the movement." Former Australia fast bowler Glenn McGrath on ABC: "There is enough in this pitch that if you get on a roll when bowling, you can knock two, three or four wickets over very quickly. "Without Pant's innings, India would be in some serious trouble. If you are just looking to defend on this pitch, one has got your name on it. You have to look at putting pressure on the bowlers, you have to find a way to score runs. "If you are just looking to survive then it is all over."

