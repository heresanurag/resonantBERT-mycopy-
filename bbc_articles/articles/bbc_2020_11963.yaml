  The BBC's Laura Foster explains what a circuit-breaker is and how it could help tackle Covid-19.

  Health Secretary Sajid Javid says there are "no guarantees" when it comes to ruling out new restrictions or another circuit breaker before Christmas.

  But what exactly is a circuit breaker in Covid terms?

  The UK, Northern Ireland, Singapore and Israel have all previously used circuit breakers to try to reduce their coronavirus cases.

  But how do they work? How long is a Covid circuit breaker? How can it help tackle Omicron?

  BBC health correspondent Laura Foster explains it all in a minute.
