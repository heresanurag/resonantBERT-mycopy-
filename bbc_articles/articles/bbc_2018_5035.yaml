title: Man charged after car hits pedestrians in Blackpool - BBC News
date: '2018-04-16'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-43779421
content: |-
  Three women were injured when they were hit by a car in Blackpool on Saturday night.

  Three people were hit by a car outside a nightclub in Talbot Road, Blackpool

  A teenager has been charged with injuring three women who were hit by a car in Blackpool.

  The pedestrians were struck by a Skoda estate in Talbot Road at about 23:50 BST on Saturday, leaving a woman in her 80s with a broken collarbone.

  A woman in her 70s suffered a sprained ankle and a third, aged in her 30s, had a broken tooth and leg injuries.

  Jake Hartley, 19, from Todmorden, appeared before Blackpool magistrates charged with attempted wounding.

  He was also charged with three offences of assault, dangerous driving, driving with more than twice the legal limit of alcohol in his blood, driving without insurance and possession of a weapon.

  Mr Hartley, of Rochdale Road, was remanded in custody to appear at Preston Crown Court on 16 May.

  Armed police attended the scene and a car was recovered outside Norbreck Castle Hotel.

  All three women have been discharged from hospital but officers believe other people may have suffered minor injuries and have urged them to get in touch.

  Police have appealed for anyone who witnessed the incident, or captured footage on their phones or dashcam, to contact them.

