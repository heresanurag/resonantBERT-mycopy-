id: bbc_2023_9512
title: Bodycam shows Florida police officer dragged into drainpipe in flood rescue
  - BBC News
date: '2023-06-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65956619
content: |-
  The officer and the man he was rescuing are swept through a drainpipe, and underneath a four-lane highway in Florida.

  Body camera footage shows the moment a Florida police officer, William Hollingsworth, was sucked through a drainage pipe while trying to rescue a man from flood water.

  Both men were dragged underneath the four-lane highway, before resurfacing on the other side, safe and well, 30 seconds later.
