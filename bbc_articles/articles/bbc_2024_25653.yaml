title: '''I just broke down'' - Helene takes emotional toll on survivors - BBC News'
date: '2024-10-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4gdw2w5dnwo
content: |-
  Entire communities in North Carolina are coming to terms with devastating losses after a historic, deadly storm.

  Nancy Berry tried to rescue her family mementos from the floods - but much of it was lost

  Days after a tropical storm inundated parts of North Carolina with catastrophic flooding, leaving scores dead and hundreds more missing, entire communities are beginning to come to terms with devastating losses and, for some, narrow escapes. For over 40 years, Nancy Berry’s trailer in the town of Boone was her mountain oasis and her family’s homestead. It was where she created memories with family and friends, and where she preserved the memories of those lost. Her mother died in the same trailer. But it took just a matter of hours for Hurricane Helene to wash it all away. Now, the 77-year-old is trying to salvage what remains. On her bed, still soaked from the floods, she’s placed mementos of who she was, and where she came from. On top of the pile, her son’s death certificate from when he died of Covid three years ago. “I grabbed it and laid it out,” she told the BBC. “I’ve got to protect my family’s history. A lot of it is lost though.”

  Ms Berry's trailer in Boone was washed away in a matter of hours

  It was Ms Berry’s great-niece who saved her, helping her wade through three to four feet of water. “They kept calling me – thank God for the cell phones. You never know, a long time ago, what would have happened,” Ms Berry recalled. When her great-niece arrived, she found Ms Berry trying to save some of her belongings by putting them up high. “Aunt Nanny. Come on. Get out. Get out,” she called out. “I’m coming, I’m coming!” Ms Berry replied. She grabbed her purse, handing it to her great-niece, who carried it over her head while helping Ms Berry to safety. “She's strong and she was just pushing me, pulling and that water was – ,” Ms Berry, said, shuddering. “It was not a nice moment.” As flood water levels rose, others on her street had to be rescued by boat. Ms Berry's hometown is a relatively quiet place tucked between the mountains, with a population of about 20,000. Its landscape is marked by creeks and rivers that flow beneath towering green trees rising into the clouds. It's also home to Appalachian State University, which has converted one of its facilities into an emergency shelter for the storm-stricken.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ms Berry shows where floodwaters reached during the peak of the storm

  Communities like this one can be fairly isolated - built off a dirt road on a mountainside. Such features add to Boone's beauty - but also its vulnerability. Two people are reported by local outlets to have died in the surrounding Watauga County. Western North Carolina, located more than 300 miles (482km) from the ocean, is no stranger to storms, said Kathie Dello, a climate expert at North Carolina State University. Six people died when a tropical storm caused “catastrophic” flooding in nearby Carusoe – but nothing like this, she said. At least 180 people are now known to have died. More than 600 are still unaccounted for. Thousands are without power, and fresh water supplies are dwindling. The government has deployed 6,000 National Guard members and 4,800 federal aid workers to the region, but many have criticised the response, saying that the bulk of rescue efforts have been left up to volunteers. "We were cut off from [the outside world] for about three days," said Kennie McFee, the fire chief for Green Valley. "Here, it was mainly neighbours helping neighbours."

  Ms Berry's trailer park in Boone was almost entirely destroyed

  The cities of Boone and Asheville were hard hit, but remote communities located deep within the Appalachian Mountains are also seriously struggling, Diello told the BBC. Even before the storm, mobile reception and Wi-Fi was patchy. Poverty and rough, rural roads have added to the difficulties people have faced getting out. “A lot of times people say ‘well, why didn’t they leave?’,” Diello said. “Well maybe you can't afford a tank of gas, and how many nights in a hotel in a safer place? Maybe you know you can't leave your family, maybe you can't leave your job.” In Green Valley, a woman, who did not want the BBC to use her name, said that five days after the storm she still had no power and no communication with the outside world. Her only functioning device was a battery powered antenna radio that she said was decades-old. "If you're raised in the mountains, you'll cope," she said. While talking with the BBC, a car pulled up to bring her news of her family that lived down the road. She hadn't seen or heard from them since the storm hit. "They were all okay, another thank you, Lord," she said. Although she recalled bad storms, the woman said she'd never seen anything like Helene. Less than a five-minute walk from where she stood in her driveway, another house was completely flattened. "God is getting people's attention. He really is getting people's attention, not just here, but it's everywhere," she said. "But I really think it's just, it's to let us know who's in control."

  A home located nearby the woman who told the BBC she only recently discovered her family was alive

  Nicole Rojas, 25, moved to her remote home up the mountain in Vilas, North Carolina not long ago from nearby Tennessee, where she had lived, in her own words, “off grid”. “I kind of wish I would have stuck to my lifestyle a little bit, because I always had drinking water, showering water, food,” she told the BBC, while looking for supplies in Boone. Now, she and her roommates, who include a 54-year-old woman named Karen, Karen’s 74-year-old mother and a family with young children, will likely be without power for weeks, she heard, with the only way in and out a single-lane, tree-strewn road. “The only reason I was even able to step out was from the gentlemen in the community taking out their chainsaws and their tractors and moving all the trees,” she said. Ms Rojas had been at home on Friday, when the storm struck the mountain. On Sunday, after her neighbours spent all of Saturday clearing the road, she and Karen ventured out to town. Karen, who amid the chaos of the storm had suffered a life-threatening allergy attack after being stung by an insect, brought supplies back to their house. Ms Rojas, meanwhile, stayed in Boone with friends, so that she could go to work at a local health store. She plans to return home, with more supplies, on Wednesday. It was at work when it all finally hit her, after hearing the story of another customer. “She had to drive by a truck that was picking up, that had like, dead bodies on there, and she started crying,” she recalled. “And that's when I just broke down.” “You hear everyone's horror stories about how, like, literally their entire house just slid down the mountain.” “I feel like I just survived the apocalypse.”

  Green Valley Fire Chief Kennie McFee says there almost no wifi or cell reception in his community

