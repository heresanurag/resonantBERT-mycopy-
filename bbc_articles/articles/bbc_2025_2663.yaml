title: Belgian police hunt for gunmen after Brussels shooting - BBC News
date: '2025-02-05'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn4mvl1ngk1o
content: |-
  Police say they are looking for "a small group of people, probably two or three individuals".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Belgian police are looking for armed men after a shooting was reported outside a metro station in the centre of Brussels. CCTV footage broadcast by local media shows at least two men wearing balaclavas and carrying weapons at the entrance of Clémenceau station in the Belgian capital early on Wednesday. Video from the scene shows an exchange of fire at about 06:15 local time (05:15 GMT). Sarah Frederickx, spokeswoman for Brussels police, said the suspects may have fled into the tunnels of the metro system.

  The spokeswoman said there were no injuries in the shooting. Police are looking for "a small group of people, probably two or three individuals", Ms Frederickx said, adding that they may still be armed and that police did not want to take any risks. BruxellesToday reported the suspects were carrying what appeared to be Kalashnikov weapons. The BBC has verified footage of the incident circulating on social media, which showed two men brandishing what looked like rifles and shooting. From the video, it is unclear who they are aiming at.

  Multiple metro stations closed for hours this morning and interrupted service at Clémenceau station and the nearby Brussels-Midi station, which also serves as a terminal for Eurostar trains. They have since reopened and lines are gradually returning to their usual service. A command post to coordinate the search has been set up at the Anderlecht town hall, west of the Belgian capital's city centre. No arrests have been made yet and nobody was injured in the shooting, the prosecutor's office said in a recent update. They add that, at this time, authorities don't believe there was a "terrorist" motive behind the attack. Belgium's interior minister, Bernard Quintin, joined police and Anderlecht's mayor at the town hall on Wednesday morning. "We are following the situation closely," he said in a post on X.

  Reports on Belgian media suggest the events might have been linked to drug trafficking. The area around Brussels-Midi has long had a reputation for violence and crime. Tram lines that were disrupted - namely between Lemonnier and Berkendael and between Port d'Anderlecht and Gare du Midi stations - have now resumed service. Thousands of commuters were impacted by the incident, which took place during the morning rush hour. One local resident told Belgium's VRT broadcaster he heard five or six shots. Another resident, also unnamed by the broadcaster, said she was scared. "I went outside and wondered what is happening. Is this war? We have to send our children to school, we take the metro. We are scared, yes."

