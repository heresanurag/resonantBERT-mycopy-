  • None England and Australia have met 50 times. England have won 24 of those matches with Australia winning 25, a drawn game in 1997 completes the head-to-head record.
  • None England and Australia have played each other six times in the World Cup, both sides winning three including a triumph each in the final: Australia beat England in 1991 at Twickenham and England exacted revenge in Sydney in 2003.
  • None England have won their last six Tests against Australia, their longest winning run against their rivals. However, their last defeat against them came at the 2015 World Cup.
