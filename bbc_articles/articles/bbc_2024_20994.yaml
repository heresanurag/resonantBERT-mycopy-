  BBC Sport looks at what the Premier League can expect from this season's new managers.

  What can fans expect from new Premier League bosses?

  Arne Slot is managing in England for the first time with Liverpool

  A quarter of the managers in the Premier League will be taking charge of an English top-flight game for the first time on the opening weekend of the season. They are Arne Slot at Liverpool, Enzo Maresca at Chelsea, Russell Martin at Southampton, Kieran McKenna at Ipswich and Fabian Hurzeler at Brighton. Slot and Hurzeler have come from abroad, while Martin, McKenna and Maresca - albeit with Leicester - all won promotion from the Championship last season. BBC Sport looks at what the Premier League can expect from the new quintet.

  This video can not be played To play this video you need to enable JavaScript in your browser. Liverpool: Standards are really high when it comes to new players - Slot

  The highest profile new Premier League manager is Liverpool's Slot, who has the difficult task of replacing the legendary Jurgen Klopp at Anfield. The Reds paid Feyenoord £9.4m in compensation to bring the 45-year-old to the club. The Dutchman led Feyenoord to the 2022-23 Eredivisie title, and the Dutch Cup last season. He previously managed AZ Alkmaar and had them battling for the 2019-20 title, sitting level on points with leaders Ajax, when the season was ended early because of the Covid pandemic. Slot used a 4-2-3-1 formation in the Eredivisie, compared to the Reds' 4-3-3 - with his full-backs heavily involved. Reds midfielder Harvey Elliott says his playing philosophy is a typically "elegant" Dutch style - compared to Klopp's 'heavy metal football'. "The style of play is a lot different. It's more about in possession now," he said. "The players are excited, we play certain patterns, it is a good buzz around the team and the lads are excited to apply it in games." Fellow midfielder Wataru Endo says adapting will be a "challenge" and a "priority". Slot has previously said watching Pep Guardiola's teams gives him the "ultimate joy in football". "There is no team in the world I would rather watch than Manchester City, followed by Napoli, Arsenal and Brighton," he said.

