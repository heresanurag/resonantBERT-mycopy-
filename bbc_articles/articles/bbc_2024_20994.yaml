  Maresca led Leicester City to the Championship title in his one and only season in charge - and immediately moved to Chelsea to replace Mauricio Pochettino. The former Parma boss was previously Manchester City assistant under Pep Guardiola. The Italian turned around the morale of a Foxes team who had just been relegated, with some players who had been planning to leave deciding to stay after experiencing his training. Despite leading the Foxes back to the Premier League at the first attempt, he never won over some of their fans because of his style of play. Maresca prefers a heavy possession-based style - which is how he has started his reign at Chelsea too - and was sometimes criticised for his reluctance to make subs. Results initially proved his approach right, with Leicester winning 21 of their first 26 games. They led the Championship from 23 September until 29 March when a fourth defeat in six games saw them drop out of the top two. However, they rallied and went up with one game to spare. BBC Sport reporter Nizaar Kinsella, who followed Chelsea in the USA this summer, said: "Enzo Maresca really appears to be rolling out his identikit Leicester City plan in pre-season. "It means a 4-3-3 will be used but when in possession the Blues build up play in a 3-2-5 shape. "The potential weaknesses are that Chelsea will at times play risky passes and concede goals, as we've seen in pre-season, and a high defensive line will occasionally allow fast players the chance to run in behind."
