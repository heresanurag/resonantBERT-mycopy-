  McKenna has done a remarkable job at Ipswich Town, leading them from League One to the Premier League in just two and a half years in charge. An expansive brand of football saw them gain promotion with successive second-placed finishes, scoring 101 goals in League One and 92 in the Championship. That means it is no surprise that the 38-year-old from Northern Ireland is considered one of the top managerial prospects around. He had been planning to leave the club this summer - and was linked with the jobs at Brighton, Manchester United - where he used to be assistant manager - and Chelsea. However, he signed a four-year deal at the Tractor Boys. He was also in the running for the Crystal Palace job earlier this year. The new deal makes him best paid managers in the Premier League, according to BBC reporter Nick Mashiter. One of the most impressive elements of Ipswich's rise has been that they only spent £4m last summer to bolster their League One promotion squad for the Championship. He has been praised for his attention to detail and willingness to discuss his thinking. "He's a different type of manager to what I grew up with, where you have one man that controlled the whole club," former Ipswich captain Mick Mills told BBC Radio Suffolk. "It became apparent very quickly that his forte was on the training ground. The training ground is his domain." Leif Davis supplied 18 assists last season from left wing-back. Conor Chaplin contributed 42 goals over the past two years. "He's an unbelievable manager, his attention to detail is second to none," said Wales striker Kieffer Moore, who spent the second half of last season on loan at Ipswich. "You can see it in everything he does, the way he delivers presentations and training sessions, the way he goes about his business is top notch. I can really see the gaffer having an amazing career."

  Russell Martin led Southampton to promotion in his first season in charge at St Mary's

  There were a lot of similarities between Martin and Maresca last season. Both were appointed in the summer, both had their passing-based style criticised by swathes of the support - and both led their teams to promotion from the Championship. Former Scotland defender Martin, who left Swansea for Southampton a year ago, took the Saints up through the play-offs. Unlike Maresca who left for Chelsea, Martin signed a new three-year deal at St Mary's this summer. "I know possession won't win you games," said Martin after beating Leeds in the Wembley final. "But it is a vehicle for us to give ourselves the best opportunity to show the best version of ourselves." The former MK Dons boss led the Saints to a club-record 25-game unbeaten run from September to February. Former Southampton midfielder Jo Tessem, now a BBC Radio Solent summariser, said: "He used the style of football perfectly for the players that he has got in the squad. "He will need to be a bit smarter with his style next season." BBC Wales football correspondent Rob Phillips said Martin "finally confirmed that zealous adherence to his possession-based football principles can bring success" after polarising the Swansea fans during his two years there. Off the field, 38-year-old Martin speaks out about the environment, co-owns a vegan restaurant and is interested in Buddhism.

  This video can not be played To play this video you need to enable JavaScript in your browser. Brighton: new boss Fabian Hurzeler says he is a 'friendly authority'

  Hurzeler is the least known name in England of the managers on this list. The 31-year-old became the youngest permanent Premier League manager ever when he replaced Roberto de Zerbi at the end of this season. He is younger than six Brighton players, and seven years the junior of midfielder James Milner. Like three of the other four managers in this article, Hurzeler won promotion last season - with German second-tier side St Pauli. He stopped playing at the age of 23 to focus on coaching - and had spells as assistant boss of Germany Under-18s and Under-20s before joining St Pauli in the same role. He became their manager in December 2022. Bundesliga 2 expert Matthew Karagich told BBC Radio Sussex: "St Pauli are a very strong ball-playing team and that is one thing you will see from his teams - it is all about possessing the ball. "You're looking at a team that will try to use its pace to get behind defences and create opportunities. The one thing that you can also add is that he likes his teams to be quite flexible. "[They have the attitude of] 'we don't want to just beat you, we want to destroy' - that resembles the way he reacts on the touchline. He is very passionate." Owner Tony Bloom called it the "least risky option of all the options we had".
