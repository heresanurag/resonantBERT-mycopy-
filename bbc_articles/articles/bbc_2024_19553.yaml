  Mabli Cariad Hall died in hospital four days after a car hit her pram outside Withybush Hospital.

  Woman accused of killing baby after crash into pram

  Eight-month-old Mabli died four days after the crash outside Withybush Hospital

  A woman has appeared in court charged with causing the death of an eight-month-old baby in a crash outside a hospital. Mabli Cariad Hall, from Neath, died four days after a car hit her pram outside Withybush Hospital in Haverfordwest, Pembrokeshire, on 21 June 2023. Bridget Carole Curtis, 70, from Begelly, Pembrokeshire, appeared at Llanelli Magistrates' Court on Thursday, charged with causing death by dangerous driving. She did not enter a plea and was bailed to appear at Swansea Crown Court on 20 September.

  Bridget Carole Curtis will appear in court again in September

  An inquest was told in 2023 that Mabli was in her pram outside the hospital at the time of the crash and died four days later at Bristol Royal Hospital for Children from a severe traumatic brain injury. Her father, Rob, was also injured in the incident and was present in court for the short hearing, along with Mabli's mum Gwen. They left court clutching a soft toy, surrounded by their wider family

  In a tribute following Mabli's death, her family said: "Our family life has been changed forever and to this day we are still trying to come to terms with what has happened. "We will never forget that love and support shown to us and for the memory of our precious angel, Mabli Cariad." In June, the family laid flowers at the spot where Mabli was fatally injured, exactly a year since the incident.
