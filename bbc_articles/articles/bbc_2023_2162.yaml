title: People in Chile loot beer after truck overturns - BBC News
date: '2023-02-04'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-64521112
content: |-
  Locals in Santiago collect beer from the road after the vehicle carrying it was involved in an accident.

  Locals in Santiago have been looting beer after the truck carrying it was involved in an accident.

  The vehicle, carrying around 18 tonnes of beer, overturned when it was overtaken.

  There are no reports of injuries.
