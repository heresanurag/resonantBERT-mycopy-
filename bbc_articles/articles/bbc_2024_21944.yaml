title: 'Flu vaccine: Parents urged to have young children immunised - BBC News'
date: '2024-09-15'
section: Health
url: http://www.bbc.co.uk/news/articles/c4g5dlndd5do
content: |-
  The flu vaccine is given to most children as a quick, painless spray up the nose, with no injection

  The NHS is urging parents and carers of two and three-year-olds to schedule a flu vaccine for their children ahead of an expected surge in respiratory illnesses this winter. School-age children, kids in clinical risk groups and pregnant women are among the groups also eligible to get vaccinated. The flu vaccine is given to most children as a quick, painless spray up the nose, with no injection. Children who cannot have pork gelatine in medical products will be offered an injection. The health service expects a wave of Covid-19 infections alongside a rise in flu and other illnesses this winter.

  From 3 October, the campaign will also target over-65s, adults in clinical risk groups and carers. Vaccinations this autumn will ensure those most at risk are protected by the time flu season peaks in December and January, when people gather indoors, the NHS says. Pregnant women and adults aged 75 to 79 will also be offered the respiratory syncytial virus (RSV) vaccine for the first time ever this year. RSV usually causes mild, cold-like symptoms, external, but can lead to bronchiolitis and pneumonia. Steve Russell, NHS England's national director for vaccinations and screening, said: "The flu virus puts thousands of people in hospital each year and vaccinations help us to keep more people well. "I would urge everyone eligible to book their jabs when they become available, to protect themselves and people around them."
