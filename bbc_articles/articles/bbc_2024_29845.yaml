title: Police helicopter Edinburgh firework attacks as 19 arrested - BBC News
date: '2024-11-07'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c4gp84qdzpjo
content: |-
  Officers said residents in Edinburgh and Glasgow were left terrified by the "targeted" disorder.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Police helicopter footage has captured the firework disorder in Edinburgh, as officers confirmed they made 19 arrests over Halloween and Bonfire Night. Six people have been charged under the Fireworks and Pyrotechnic Articles Act and 26 further charges have been made for related criminal behaviour. Police Scotland released video showing how officers were attacked with fireworks, bricks and bottles on Bonfire Night and said more arrests would be made. The force said residents in Edinburgh and Glasgow were "terrified" by targeted disorder and inquiries were continuing to identify those responsible.

  The Scottish Fire and Rescue Service (SFRS) received 1,000 emergency calls from across the country. There were six incidents where fire crews were attacked - three in Clydebank, two in Edinburgh and one in Blackridge in West Lothian. Police officers were also attacked but said incidents of serious disorder had fallen compared to last year.

  Fireworks are hurled at police officers in riot gear in Niddrie

  The Niddrie, Calder Road, Gracemount and Moredun areas of Edinburgh and the Pollokshields area of Glasgow were the worst affected. Assistant Chief Constable Tim Mairs said: “While I am encouraged that we didn’t see the same levels of serious disorder, when compared to last year, I am under no illusion that the actions of a minority of individuals still had a significant and detrimental impact on various communities across Scotland. “Their actions will not be tolerated, and detectives are working tirelessly to make arrests and ensure all of those involved in the offences we witnessed are brought to account.”

  In Edinburgh, large groups of youths had gathered and thrown fireworks, bottles and bricks at cars and police vehicles. A police helicopter was brought in to assist with the operation. The helicopter footage showed large groups of people throwing missiles at officers and fireworks at public property.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Fireworks set off on Scottish streets on Bonfire Night

  A major incident public portal, external has been created for people to share video and photo evidence of Bonfire Night offences in their area. A police spokesperson said they received a report of 21 cars being damaged by fireworks at a car dealership in Calder Road, Edinburgh. Several car windows were smashed and bodywork was dented and scratched. Staff at a nearby BP petrol station told the BBC they had to seal off pumps to prevent an explosion as fireworks were being launched into the restaurant next door.

  Vandals smashed car windows at the dealership on Calder Road

  Control zones banning the use of fireworks in certain areas of Edinburgh are in place until 10 November for the first time. Parts of Glasgow were due to be covered by a similar ban but it was delayed until next year due to a council error. Police said fire crews were called to large number of unauthorised bonfires being lit in Glasgow and they were met with large groups of hostile youths. Footage taken in Pollokshields, in the south side of the city, showed fireworks being set off by a group in the middle of the street. The Unison union said residents saw large groups of young men causing disorder until 02:00, firing "industrial-sized" fireworks and setting fire to public property.

  Fireworks were set off in the middle of the street in Pollokshields

  Ch Supt Lynn Ratcliff, divisional commander for Greater Glasgow, said groups of young people involved in the disorder had been "motivated to cause the maximum amount of fear and alarm". She added: “This put not only local residents at risk, but meant police officers, fire service personnel and ambulance crews were in danger of being injured, as they responded to protect communities." No one was injured in incidents in Glasgow and Edinburgh, police confirmed. A 25-year-old man was arrested and a "significant quantity" of fireworks seized after a search of a van in Drumchapel. The force said the fireworks were being sold to the general public, including to under-age children. Meanwhile, in Peterhead at about 21:20, a man was hit by a van driven by individuals who, moments before, had set off a pyrotechnic in a skate park in Aalesund Road. The 33-year-old was treated by paramedics at the scene but did not need further medical attention. Two men, aged 62 and 57, were arrested over the incident.
