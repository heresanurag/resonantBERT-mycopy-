id: bbc_2018_8014
title: M1 breakdown driver 'had somewhere to be' - BBC News
date: '2018-07-22'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-44910854
content: |-
  Highways England said the car was left in lane one of the southbound M1 for almost an hour.

  The vehicle was abandoned on the southbound M1 between junctions 35 and 34

  A motorist left a broken-down car on a busy motorway carriageway because "they had somewhere to be".

  The vehicle was abandoned on the southbound M1 between junctions 35 and 34 near Sheffield at about 11:00 BST.

  Highways England took to Twitter to highlight the incident, saying: "Broken down car in lane 1. The owner abandoned it telling us they had just left it there as they had somewhere to be."

  The car was removed and the carriageway reopened at about 11:45 BST.

