  The Cote d'Azur allows for shorts and T-shirt attire in early February as temperatures reached almost 20 degrees, although the locals still have their coats on. "It's beautiful. It allows you to train outside, just getting some sun on you," said Wales forwards coach Jonathan Humphreys. "Especially when you look back in the UK and you can see the weather, it's always raining." Nice is also a safe haven from the backlash to yet another heavy defeat. The squad have been out of the Welsh rugby bubble. Whether it be wandering along Promenade des Anglais, strolling around the port looking at the multi-million pound boats, popping over to Monaco or meandering through the Old Town. There will have been no chat among the crowds smoking outside the bars and cafes about whether Gatland should go, how the WRU has ruined the Welsh game or what has happened to the side's attacking system.

  Josh Adams has returned to the Wales side for the 2025 Six Nations after recovering from injury

  After the Paris disappointment, the squad started the week with a reflective team meal on Saturday night. "You have to lick your wounds," said Henry Thomas. "We went for a meal and just tried to keep the squad together and strong." Then it was down to the training workouts at a local rugby club and recovery sessions in the Mediterranean. You would expect morale to be low for a team that has not won an international in 16 months. Yet each player and coach refuted this publicly - insisting spirits remain high despite the wretched run of defeats. The early-week build-up was dominated by whether influential number eight duo Aaron Wainwright and Taulupe Faletau would be fit. Wainwright was forced off in the fourth minute in Paris after suffering a nasty facial injury with back-row colleague James Botham saying he looked like 'The Joker'. He has been named among the replacements. Faletau, 34, starts his first international for 16 months and has missed the 13 losses. Wales will hope his return inspires an end to the drought.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'That was terrible!' - Six Nations captains take on reactions challenge

  Wales left their Nice base and arrived in Rome on Thursday night. They will not be alone in Italy's capital this weekend. There were small pockets of red jerseys in the Stade de France for last Friday night's game under lights. The atmosphere in Rome will be different for a game played on a Saturday afternoon with more Welsh supporters travelling to the Italian capital to offer their backing. "The main thing is getting a result for them and showing them we are coming back," said Botham. "They make the sacrifice and effort to come out, especially with how much everything costs now. "We can't thank them enough. It shows how strong we are as a nation when it comes to the sport we love." Players, coaches and supporters wait to see the ramifications of Rome for Welsh rugby - and hope for brighter times ahead.
