content: |-
  Struggling Wales and head coach Warren Gatland prepare for a Six Nations date with destiny against Italy in Rome on Saturday.

  Wales have had four camps in Nice in the last six years

  Coverage: Listen live on BBC Radio 5 Live, BBC Radio Wales & BBC Radio Cymru; text commentary and highlights on BBC Sport website and app; watch on ITV1 and S4C.

  Storm clouds have been gathering over Welsh rugby for some time now. But the 43-0 defeat inflicted by France in Paris in their opening Six Nations game has heightened the problems for Warren Gatland's Wales squad after 13 consecutive Test defeats. Soon after the Stade de France hammering, attention turned towards Saturday's showdown against Italy in Rome and a fixture being billed as a must-win game. A date with destiny for Wales and their head coach. Former fly-half Dan Biggar labelled the Stadio Olimpico occasion as the most important Wales match for the "last 15 to 20 years" and the narrative for the week was set. Instead of having to return to the doom and gloom of Welsh rugby's goldfish bowl, the Wales squad have at least been able to make a now familiar trip to sunny Nice, where there has hardly been a cloud in the sky over the past few days - in stark contrast to the stormy backdrop for Wales national side.

  This video can not be played To play this video you need to enable JavaScript in your browser. Is trip to Rome really Wales' biggest game in 20 years?

  There have been bleak forecasts for Welsh rugby, particularly Gatland, whose record since returning for a second spell as Wales boss in December 2022 shows just six Test wins in 25 games. Saturday will mark 490 days since Wales' most recent Test victory. Turn back the clock to the New Zealander's first term in charge and his side set a national record of 14 wins over 2018 and 2019 that saw them briefly top the world rankings. Now within six years, they are on the brink of extending their record losing sequence to 14 and providing some unwanted symmetry. Defeat in Rome would also likely result in Wales slipping to their lowest ranking of 12th, below Georgia. The statistics make for grim reading, with Wales having now suffered seven Six Nations losses on the bounce. Another defeat will equal their tournament record of eight and send Gatland's team tumbling towards successive Six Nations Wooden Spoons.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Wales have to be smart' Gatland on defeat to France

  If he is a man who fears for his future, Gatland was in relatively relaxed mood when he conducted his press conference close to Nice Airport. Gatland refuted Biggar's "biggest game" comments. This is a coach who has prepared Wales for Grand Slam matches and Six Nations deciders and two World Cup semi-finals. Biggar's assessment was based on the consequences of another defeat, and the head coach acknowledged the importance of the match and that Wales are desperate for a win. Gatland, who has a set of gates named after him at the Principality Stadium, continues to divide opinion in Wales. There are some who point to his poor record since 2020, who believe his coaching methods are outdated and insist a change is required. There are others who believe he is still the man to turn things around and he is doing the best he can with the quality of the squad at his disposal. His supporters lay the blame for the malaise in Welsh rugby solely at the door of the Welsh Rugby Union (WRU). There are also those who believe Gatland and the WRU must share responsibility for the respective failures on and off the field. After an independent review, Gatland was given a vote of confidence for the 2025 Six Nations, despite a calendar year where he oversaw 11 defeats. The mood music is the New Zealander might well be moving on at the end of the tournament, barring a miraculous turnaround. Whether victory or defeat this weekend in the Eternal City affects this prospective scenario remains to be seen.

  Liam Williams returned for this year's Six Nations after missing the 2024 tournament

  The players are hurting. At the final whistle in Paris there was an air of disbelief among the squad that Wales had failed to score a point in a Test match for the first time in either of Gatland's two eras in charge. It was left to 93-cap full-back Liam Williams to take the initiative by delivering a defiant message in the post-match huddle. "Liam spoke after the game about sticking together," said prop Henry Thomas. "What he said was massively important because there can be a lot of negativity from outside the circle. "It's about the belief in the circle that we can turn this around. "Everybody knows the current run of losses is not acceptable for Wales, for where we plan on being and how proud a rugby nation this is. "You can't hide behind the fact there have been too many losses." At 1am on Saturday morning, bloodied and bruised wing Josh Adams stood in the bowels of the Stade de France. He was just as determined as Thomas to emphasise the players' desire. "I can never question anyone's commitment to this team," said Adams. "Whoever puts the jersey on I know will give their right arm or right leg for this side."

  Later on Saturday morning, former England wing Ugo Monye recalled conversations with Welsh rugby fans as he prepared to board the Eurostar at Gare du Nord to return back to St Pancras. One supporter told him: "It is not the hope that kills you, it's the no hope." As Welsh fans returned home, the squad made the journey south to Nice. The luxurious destination has been a familiar home from home for Wales, especially when they are playing in Rome and Paris on consecutive weekends. Nice is not considered a rugby city, more associated with football. It is where Wales captain Aaron Ramsey spent a season before returning home to Cardiff in 2023. When the Wales rugby squad have been here before, it was in less trying circumstances. Six years ago they arrived having just produced a record comeback victory against France, while during the 2023 tournament they landed in Nice having just won away in Italy. There was the occasion later that year in the World Cup when they came back to their adopted French base to defeat Portugal. Happier times.

