title: Woman in devil mask filmed throwing acid over house - BBC News
date: '2019-04-18'
section: General
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-47979274
content: |-
  People in a Forest of Dean village say there has been a spate of acid attacks on cars in recent months.

  A woman wearing a wig and a devil mask has been caught on CCTV throwing acid over a house and a car.

  People in the village of St Briavels in the Forest of Dean, Gloucestershire, say there has been a spate of acid attacks in recent months.

  Police have appealed for information after a report of criminal damage last month.
