title: Liam Payne fans hold vigils around the world - BBC News
date: '2024-10-20'
section: General
url: http://www.bbc.co.uk/news/videos/cm295x352v1o
content: |-
  Thousands of the One Direction star's followers have gathered globally in memory of the singer who died last week.

  Liam Payne fans have gathered at vigils around the world - from London to Manila - to grieve, sing, and cry in memory of the former One Direction star who died on Wednesday.

  Police estimated that between 800 and 1,000 people gathered in London's Hyde Park on Sunday to remember the 31-year-old who died after falling from the third floor of a hotel balcony in Argentina.

  The crowd sang One Direction songs, such as the chart-topping hit What Makes You Beautiful, with many fans in tears.

  Groups of fans have also come together in Jakarta, Paris, Sydney and elsewhere.
