title: 'Beaumaris: Pedestrians and driver die after Anglesey Audi crash - BBC News'
date: '2024-08-29'
section: Wales
url: http://www.bbc.co.uk/news/articles/cwyx6x4dl4wo
content: |-
  A driver in his 80s died along with a man and woman in their 60s who were visiting the area.

  Two pedestrians and driver dead after car crash

  The crash involving an Audi happened at Alma Street near Beaumaris Pier

  Two men and a woman were killed when a car crashed into pedestrians visiting a popular seaside town. The crash involving an Audi happened at Alma Street near Beaumaris Pier on Anglesey on Wednesday afternoon. North Wales Police said "despite the best efforts of all involved" a woman and a man, along with a male driver, were pronounced dead at the scene. Police said the driver was in his 80s and from north Wales, while the pedestrians were both in their 60s and from outside the area

  Police said despite the efforts of everyone involved, all three people were pronounced dead at the scene

  Rhys Morgan Eckley was working near the pier in Beaumaris when he heard the screech of tyres and "the biggest bang". He said that he "just thought it was a silly driver at the start," but as he got closer to the scene he saw three bodies. "I think it has shook up Beaumaris and the island as well, it's such a tragic event, and a lot of people witnessed it." Ifan Huw Jones, who works in Beaumaris, said the car "instantly caught his eye". "There was screeching and a wheelspin and there was smoke in the air," he said. "The car really just took off towards the building at the end of the street and it took a right turn, I did not see any brake lights and then it went straight in to the house head on. Ynys Môn MP Llinos Medi said news of the crash "has shaken the isle of Anglesey". "Individuals have seen things that will take time to cope with," she said. Ms Medi said Beaumaris is a town "that tourists flock to" in the summer holidays.

  Rhys Morgan Eckley, who works near the pier, says he heard "the biggest bang"

  David Evans, the mayor of Beaumaris, said the town is "extremely busy" during the summer, and that Wednesday "was not any different". "This is a small but close-knit community. This is such heartbreaking news for us all." He said he had "never seen so many emergency service vehicles in Beaumaris". A witness told the PA news agency she saw "a car hitting a pedestrian and then hitting a house". "It was just awful, the ambulance took ages to get here and when the police and the vehicles eventually came... there was nothing they could do once they got here," she said. "Everybody really rallied around, diverting the traffic and trying their best to give the people dignity, but it was pretty horrific."

  A witness said the collision involved a car hitting a pedestrian and then hitting a house

  Another witness described the scene on Alma Street minutes after the incident which claimed three lives. Gareth Williams, who lives in Beaumaris, who was working on the pier when the crash happened, said: "Someone called me to say that something had happened. "When I arrived I saw two bodies with people administering CPR to them. I must have arrived some five minutes after the accident. "One of the patients was on the floor and the other was round the corner. There were three people giving CPR, taking it in turns to try and help."

  Ifan Huw Jones was working when he saw the car go "straight into the house head on"

  Mr Williams said he couldn't see into the car involved because the airbags were blocking his view. "There was oil everywhere, and water on the road," he said. "About five minutes after I arrived the car ambulance arrived and then the police were on the scene." He added: "The paramedics were doing their best for about 20 minutes to save the people."

  Beaumaris is a holiday destination on the east of the island of Anglesey

  The Reverend Lesley Rendle told BBC Radio Wales Breakfast about an "overwhelming feeling of sadness across the town." "People have been checking on neighbours and making sure that their friends are OK," she said. Police said officers, along with fire, ambulance and air ambulance crews attended. The Welsh Ambulance Service said it was called to the scene shortly before 14:45 BST on Wednesday. All police cordons have now been removed from the scene on Alma Street near Beaumaris Pier.

  Beaumaris is a popular holiday destination located on the east of the island of Anglesey, with many tourists visiting the Unesco-listed Beaumaris Castle or nearby Puffin Island. North Wales Police said it wants to speak to witnesses, and anyone with dashcam footage.
