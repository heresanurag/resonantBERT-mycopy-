title: 'Mexico earthquake: Tremor shakes newspaper office - BBC News'
date: '2018-02-17'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-43096449
content: |-
  Journalists at the office of Mexican newspaper Milenio film the moment a 7.2-magnitude earthquake hit.

  A 7.2-magnitude earthquake has hit south-western Mexico, causing buildings to shake in the capital, Mexico City.

  Journalists at the office of one Mexican newspaper, Milenio, filmed the moment the quake shook their building.
