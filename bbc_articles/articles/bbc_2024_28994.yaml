content: |-
  A body has been found in the search for a man who went missing while walking his dog in Conwy county.

  Body found in search for man missing during Storm Bert

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A body has been found by police searching for a man who went missing in a river during Storm Bert. Formal identification has yet to take place but the family of Brian Perry, 75, have been informed. North Wales Police said the man, who went missing in the River Conwy near Trefriw in Conwy county at about 16:30 GMT on Saturday, had been out walking with his wife and dog. They said the area had been affected by "significant floodwater".

  Chief Insp Simon Kneale said Mr Perry's family was being supported by officers. “This is a particularly difficult time for this gentleman’s family,” he said. Homes and roads have flooded and dozens of flood warnings are in force across Wales as Storm Bert continues to batter the UK. The Welsh government said the trauma floods cause should not be underestimated. "As the focus moves to recovery, it is important that those affected receive ongoing support and we will play our part alongside our partners in delivering that," a spokesman said. "Despite the significant impacts, it appears that flood defences played a role in protecting many homes and businesses, and we will continue our investment programme to make communities even more resilient to severe weather events in future." Prime Minister Sir Keir Starmer said he had spoken to First Minister Eluned Morgan about the flooding, thanking "the emergency services who are working tirelessly to protect communities".

  Brian Perry was reported as missing on Sunday afternoon

  In south Wales, Rhondda Cynon Taf council declared a major incident due to "significant flooding" across the county, including in Pontypridd where residents have been bailing out their homes. Between 200 and 300 properties have been affected, with the rainfall surpassing some records set by Storm Dennis in 2020, council leader Andrew Morgan said in a press conference. He said that water levels were higher than expected and he was "amazed" that there was only a yellow weather warning in place and it was not upgraded to amber. He added that one bridge that was under construction, and which was replaced after Storm Dennis, was completely washed away. Mr Morgan also said deputy First Minister Huw Irranca-Davies visited Pontypridd on Sunday, while the prime minister’s office has also been in touch seeking “an update and asking what assistance we may need”.

  Cars were lifted off their wheels after the Ebbw River burst its banks and flooded Pandy Park at Cross Keys, near Newport

  Many of the flooded properties are on Sion Street, where cars have been left stranded in deep water, although water levels have since dropped considerably. Claire Instrell, whose home in Pontypridd was flooded four years ago, has avoided water this time, but said she was woken on Sunday morning by flooding in her area. She said she did not want to sleep in her home on Sunday evening because she was worried water could come in during the night. Rania Koutsikou, 32, was woken at around 07:00 GMT by a neighbour telling her to move her car. "Obviously it was already pretty bad even then. We're just trying to save what we can," she said, adding that people did not receive sandbags to help deal with the flooding.

  Pontypridd residents bail out their houses after flooding

  Rest centres have been set up for people affected by flooding at Ystrad Sports Centre, Pontypridd Library and Aberdare's Sobell Leisure Centre. Businessman Steve West said he had cleared his office in Mill Street and had to "just hope for the best". "The shops behind me, they've been affected worse because they're at a dip," he told BBC News. "We're just waiting for the water to recede now really and we'll go and help clear out the other shops." More than 10,000 people across Rhondda Cynon Taf (RCT) have also been advised to boil their tap water after Welsh Water "identified an issue with quality of water" at Tynywaun water treatment works. RCT council has also announced several road closures, external around the county.

  Cars have also been submerged in flood water at Blackwood in Caerphilly county

  Flooding has also been reported in Caerphilly, Newport and Welshpool and there have been landslides in Wrexham county and Merthyr Tydfil. Natural Resources Wales, external has issued two severe flood warnings, as well as more than 50 flood warnings and 44 alerts. The National Grid, external said about 1,300 properties were without power in south and west Wales on Sunday morning Traffic Wales, external said a number of roads had been closed due to flooding and fallen trees. Transport for Wales, external also said there would be ongoing disruption across its network on Monday, urging people to check before they travel.

  Storm Bert has been felt across much of Wales, including Llangurig in Powys

  The heavy rain has also caused a number of landslips. Firefighters were called to the A4106 Bwlch Road from Treorchy to Nantymoel overnight, where debris was strewn across the highway. And there was a landslip in Merthyr Tydfil, causing the Brecon Mountain Railway to abandon its special Christmas services.

  A landslip has closed the A4106 Bwlch Road between Treorchy and Nantymoel in Rhondda Cynon Taf
