title: 'Cardiff: Trampoline park owner sentenced over injuries - BBC News'
date: '2023-06-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-65956291
content: |-
  Philip Booth of Supajump is given a 10-month sentence, suspended for a year and a half.

  Philip Booth, owner of Supajump, put "profit over safety", a judge said

  The owner of an indoor trampoline park where four children broke their legs has been given a suspended sentence.

  Philip Booth, 61, from St Mellons, Cardiff, did not report the injuries to the council.

  The children, who cannot be named for legal reasons, were hurt at Supajump on Trident Trade Park, Ocean Way, Cardiff.

  A judge at Cardiff Crown Court on Monday sentenced him to 10 months in prison, suspended for 18 months, and 200 hours of unpaid work.

  He also fined the company £10,000 and ordered it to pay prosecution costs of £10,000.

  He said Booth had put "profit ahead of safety" and the trust the families of the children had put in him was "sorely misplaced".

  Booth previously admitted six health and safety offences which occurred between August 2017 and October 2019.

  Four children suffered broken legs, another fractured her spine, and a sixth sustained facial injuries.

  Supajump consists of about 20,000 sq ft (1,858 sq m) of interconnected trampolines with features such as angled walls, trick airbags, slam dunk basketball, and a battle beam.

  Carl Harrison, prosecuting, told the court the attraction did not have a suitable risk assessment, systems of work or staff training procedure in place.

  Mr Harrison added there was no suitable supervision of young children and no reporting took place which would have triggered a review of the premises to see if it was up to standard.

  He said Booth largely ignored guidance from the regulator which resulted in further accidents and more children being injured.

  The mother of a girl who broke her leg at Supajump in 2018 in an incident not related to the case said it was "shocking" to know there were unsafe attractions for children.

  "You don't think to research these places before you take your children," said Amy Kirkpatrick, whose daughter Lilly broke her tibia and fibula just under he knee.

  Lilly, with her mum Amy, broke her leg at Supajump in 2018

  The injury caused Lilly's leg to grow at an angle and she needed metal plates to straighten it out.

  "It really shocked me and I was in a lot of pain," the 11-year-old recalled.

  "I used to not be able to run properly," she said. "My leg would hurt sometimes and I wouldn't be able to skip around."

  Mum Amy said: "It's horrific how there can be somewhere you take your children thinking you are having a nice day thinking it's safe because you assume the people running the parks have done all the right safety things."

  Of the six children whose injuries were part of the case, the court heard one child, aged eight, got stuck underneath an airbag trampoline in October 2017 and had difficulty breathing.

  When she managed to free herself she had blood coming from her mouth and had cuts on her face and arms.

  Booth told her parents it was "only a graze" and the accident was not reported to the local authority, Mr Harrison said.

  In February 2018, another girl, aged three, broke her leg after an adult in his 30s landed on top of her while doing a star jump. The child was crying and was offered an ice pack.

  But when she was taken to University Hospital of Wales in Cardiff, an X-ray revealed she had broken her leg and spent nine months in a plaster cast. The accident was again not reported by the company.

  Multiple broken legs at Supajump in Cardiff went unreported

  Another child, aged 11, broke her leg after landing on something hard in the foam pit in April 2018.

  Mr Harrison said when the parents filled out a form explaining what had happened, they were told by a staff member to take out any reference to her hitting something hard, claiming it was not possible, and the incident was not reported by Supajump.

  In April 2019, a nine-year-old girl broke her thigh bone in the foam pit, and in August that year another girl, also nine, fractured her spine in the same area of the trampoline park. Neither incident was reported.

  Finally, the court heard a three-year-old boy broke his leg in August 2019 after an older boy jumped on his trampoline.

  The double jump resulted in him landing awkwardly. An X-ray at the Royal Gwent Hospital revealed breaks in both lower leg bones in one leg, but the accident was not reported by the attraction owners.

  Representing Booth, John Ryan said: "There are failures for which he is truly remorseful."

  Addressing Booth, Judge Matthew Porter Bryant that problems "soon became evident" at the park after it opened in April 2017 and that "basic principles" of safety were absent.

  He said: "Premises like yours should remove risk and give children a chance to have fun in a safe place.

  "People put their trust in you that all safety precautions are taken but that trust was sorely misplaced. There is evidence you put profit ahead of safety."
