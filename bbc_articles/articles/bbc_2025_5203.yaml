title: Scottish painter Jack Vettriano dies aged 73 - BBC News
date: '2025-03-03'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c5y02wxgrzlo
content: |-
  The artist, best known for The Singing Butler, was found dead at his apartment in the south of France.

  Scottish painter Jack Vettriano, best known for his painting The Singing Butler, has died at the age of 73. His publicist said the artist was found dead at his apartment in Nice, in the south of France, on Saturday. It is understood there are no suspicious circumstances surrounding his death. Vettriano was a self-taught artist whose most famous work became the UK's best-selling art print and set a Scottish record when it was auctioned in 2004.

  The Singing Butler set a Scottish record when it was sold at auction in 2004

  He was born Jack Hoggan on 17 November 1951 in Methil, Fife, and left school at 15 to become a mining engineer. He later moved into personnel management. For his 21st birthday, he was given a set of watercolour paints and then spent much of his spare time teaching himself to paint. He drew inspiration from works at Kirkcaldy Galleries, studying paintings from artists such as Samuel Peploe and William McTaggart so intently that he feared arousing the suspicions of gallery staff. His breakthrough came in 1989 when he submitted two paintings to the Royal Scottish Academy's annual show and both sold on the first day, inspiring him to become a full-time artist. His works garnered international acclaim, leading to exhibitions in cities including London, Hong Kong, Johannesburg and New York.

  Vettriano was appointed an OBE for services to visual arts in 2003

  Vettriano was often dismissed by critics, who variously described his work as "brainless erotica", "mere wallpaper" and "crass male fantasy". But in an interview with the Radio Times, he responded: "They don't like an artist who is as popular as me because it takes away part of their authority. If they want to ignore me, let them. "I have what I want and that is the support of the public. "That means far more to me than the approval of a bunch of well-educated art buffs." He was appointed an OBE for services to visual arts in 2003.

  Vettriano's best-known painting was reimagined by Banksy as Crude Oil (Vettriano) which is set to be sold at auction

  His best-known work, The Singing Butler, depicts an elegant couple dancing on a storm-swept beach accompanied by their butler and maid. It sold at auction in 2004 for £744,800 - a Scottish record at the time - and reproductions of the painting were the best-selling art print in the UK. It was reimagined by Banksy for Crude Oil (Vettriano) - a painting now owned by Blink-182 star Mark Hoppus and expected to fetch between £3m and £5m at auction in London on Tuesday. Despite being shunned by galleries earlier in his career, Vettriano's self-portrait The Weight went on long-term display in the Scottish National Portrait Gallery when it reopened after a renovation in 2011. The first major retrospective of his work was held in the Kelvingrove Art Gallery and Museum in Glasgow in 2013. It attracted more than 136,000 visitors during its five-month run and was said at the time to be the most successful commercial exhibition ever staged in Glasgow. A further retrospective was held at Kirkcaldy Galleries in 2022, focusing on his formative years and early career. Vettriano created a portrait for one of three giant murals of Billy Connolly installed in Glasgow in 2017 as part of a BBC programme marking the comedian's 75th birthday.

  First Minister John Swinney was among those paying tribute to the artist

  Among those who acquired Vettriano paintings were Jack Nicholson, Sir Alex Ferguson, Sir Tim Rice and Robbie Coltrane. He has spoken publicly about his struggles with his mental health and his dependence on alcohol and drugs. Vettriano's publicist said that his passing "marks the end of an era for contemporary Scottish art. "His evocative and timeless works will continue to captivate and inspire future generations." First Minister John Swinney paid tribute to the artist and offered his condolences to his family. "I am very sorry to hear the news that Jack Vettriano has died," he wrote in a post on X. "He made a unique and evocative contribution to artistic life in Scotland in such compelling style."

  There are few artists who have such instant recognition outside the world of art or who are loved and loathed in equal measures. From the moment Jack Hoggan invented Jack Vettriano, submitted two paintings to the Royal Scottish Academy and sold both in a day, he set in motion the commercial pull and establishment disdain which would follow him throughout his career. The commercial success and record prices only further antagonised the critics who dismissed his work as "colouring in". The first major retrospective of his work in Kelvingrove Art Gallery in 2013 had not just a separate room with a warning for his more explicit paintings but a gift shop which did a roaring trade in spin-off merchandise. Would he have traded some of that success for a fairer review of his work? When I first met him 25 years ago, he was keen to dismiss any criticism as art establishment snobbery. What ordinary people thought of his work was all that mattered. Each time I met him, more and more people had made that clear by attending his exhibitions in their thousands or buying prints and postcards. The last time – on home turf at Kirkcaldy Art Galleries where he'd once studied the colourists – was especially emotional. "I'm not just happy, I'm proud," he told me, "to have done that without any tuition and be back here where it all started." Self-made, self-starting, Jack Vettriano gave a large section of the public what they wanted and the world is a little less colourful for his passing.
