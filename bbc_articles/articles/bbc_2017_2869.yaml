  The New England Patriots complete the greatest comeback in Super Bowl history to beat the Atlanta Falcons 34-28, having trailed 28-3.

  The New England Patriots complete the greatest comeback in Super Bowl history, courtesy of a Tom Brady performance "for the ages", beating the Atlanta Falcons 34-28, having trailed 28-3.

