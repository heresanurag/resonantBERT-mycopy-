title: £210,000 compensation for most urgent victims - minister - BBC News
date: '2024-05-20'
section: UK
url: http://www.bbc.co.uk/news/live/uk-69025640
content: |-
  Some 30,000 NHS patients were infected with hepatitis and HIV - the compensation could hit £10bn in total.

  Labour MP asks if all inquiry recommendations have been accepted

  Labour's Dame Diana Johnson says she wants to remind Glen of the principle of "no decision about us without us", in reference to what she says is the need to engage with the infected blood community going forward. She asks why only today Parliament is learning the names of the experts advising the government. Johnson also asks whether the minister can set out whether all 18 recommendations in the inquiry report are being accepted by the government, and how can we ensure the body is accountable to parliament. On transparency on the experts advising government, Glen says he was "always prepared" to reveal the names but "did not want them to be distracted while doing urgent work". He says he has been mindful of the principle of the government managing public money, as well as the priorities set out in the report about setting up the arms' length body to restore trust with the community.
