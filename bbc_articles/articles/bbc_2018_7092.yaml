content: |-
  The blaze, which has raged since Sunday, has scorched a path stretching 3.7 miles (6km) across the moors.

  The blaze at Saddleworth Moor has been raging since Sunday

  A blaze scorching a path near Saddleworth Moor is continuing to spread as England bakes in hot weather.

  More than 50 homes have been evacuated and fire crews are dumping water on the tinder-dry hills on foot and from above.

  The fire has been spreading for days and billowing smoke can be seen rising above Greater Manchester for miles.

  The Army is on standby to provide assistance as firefighters struggle to contain the flames.

  The flames have been fanned by evening winds

  Villagers in Greenfield can see plumes of white smoke

  Pockets of fire remain along the affected 3.7-mile (6km) stretch

  Greater Manchester Fire and Rescue crews are battling through the smoke

  Firefighters say the sheer scale of the fire makes battling it a challenge

  The fire was accompanied by a dramatic full moon on Tuesday night

