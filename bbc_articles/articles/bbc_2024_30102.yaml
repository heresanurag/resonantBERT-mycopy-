title: King Charles to bestow Elizabeth Emblem on emergency staff who died in line
  of duty - BBC News
date: '2024-11-09'
section: UK
url: http://www.bbc.co.uk/news/articles/ce31jgjel81o
content: |-
  The first batch of Elizabeth Emblems will be given to relatives by King Charles later this year.

  Emergency staff who die in line of duty honoured with new award

  Bryn Hughes campaigned for emergency workers following the murder of his daughter, Nicola

  The first recipients of an award for emergency service workers who die in the line of duty have been announced. The Elizabeth Emblem, named after the late Queen, will be given to the next of kin of more than 30 deceased firefighters, police officers and public servants in recognition of their loved ones. Among those honoured are PC Fiona Bone and PC Nicola Hughes, who were killed in an ambush responding to a bogus 999 call in September 2012. To mark the new honour, King Charles will award the first batch of emblems later this year.

  The award was announced earlier this year following a two year campaign by Nicola's father, Bryn Hughes, for an award recognising their sacrifice. Mr Hughes previously said he started his campaign after being "surprised" there was no official state recognition specifically for emergency service workers who had died in the line of duty. The Elizabeth Emblem is the civilian equivalent of the Elizabeth Cross, which recognises members of the armed forces who died in action or as a result of a terrorist attack. NHS workers who died during the pandemic will also be eligible for the award.

  Det Con Malcolm Wiltshire died in an air crash in 1985

  "It was a complete shock," Martin Wiltshire told the BBC after being informed he would be receiving the award on behalf of his father, Det Con Malcolm Wiltshire. "It’s a real privilege that dad’s memories been kept alive after all these years," he said, adding that his father "loved his job" and "took great pride in his work". Det Con Wiltshire served in the Hampshire Constabulary. He died in 1985 when the aircraft he was onboard taking aerial photographs of traffic congestion crashed. Both he and the pilot were killed on impact.

  Mr Wiltshire and his daughter took part in the Police Unity Tour in memory of his father

  "It really did affect the family," said Mr Wiltshire, who was 15 at the time of his father's death. "But obviously time helped." He added that his family had been welcomed in by the Hampshire and Isle of Wight Constabulary in recent years. Police have supported him taking part in various events. "They always remember the anniversary of dad's death each year." Speaking about the significance of the award, he said: "It’s really important that their memories are not forgotten and their service to the public is remembered."

  "I’d never even heard of the Elizabeth Emblem," another recipient, William Cruickshank, told the BBC. "I'm really proud of it. I can't believe it." Mr Cruickshank said he had been encouraged by his sister Elaine to apply for the award on behalf of their father, William Wallace Crocket, who was a firefighter for Glasgow Fire Service. He was one of 19 firefighters and crew who died tackling a warehouse blaze in Cheapside Street on 28 March 1960. It was the biggest loss of life ever suffered by one of the UK's fire services.

  Mr Cruickshank as a child with his father, mother and sister Elaine

  Mr Cruickshank, who was six when his father died, added: "Obviously, it doesn't make up for the fact my dad died in service," but said he saw the recognition as a "positive" thing. "Those days you didn’t have counselling," he explained, saying it was "quite hard to live with the fact you didn’t have a dad". Mr Cruickshank was also an 2012 Olympics torch-bearer, carrying it in memory of his late father. He said it was a "special moment" when he handed the torch over to another firefighter.

  Lissie Harper will receive an award in recognition of her late husband, Andrew

  Also receiving an emblem will be the families of PC Andrew Harper and firefighter Leslie Marsh. Lissie Harper's husband died in 2019 while responding to a call about the theft of a quad bike. During the attempted arrest, PC Harper was pulled behind the vehicle for several miles and died of his injuries. Mr Marsh's daughter will receive the honour 75 years after he died from spinal injuries after falling through a hole in the first floor of a derelict church while responding to a fire in Birmingham. Prime Minister Sir Keir Starmer said: “We must never forget those who have given their lives to protect others in the line of duty. “While families will never be able to replace their loved ones, the Elizabeth Emblem pays tribute to the sacrifice they have made.”

  The design of the emblem includes a rosemary wreath - a symbol of remembrance - around the Tudor Crown, which the King adopted when he took the throne. It will be inscribed with the words "For A Life Given In Service" and will have the name of the person it commemorates on the reverse. Relatives of deceased emergency responders can apply for the emblem on the government's website by filling in an application form and providing necessary supporting documents to meet the eligibility criteria. Applications are verified and the George Cross Committee then assesses them. Recommendations are then made to the King and prime minister.
