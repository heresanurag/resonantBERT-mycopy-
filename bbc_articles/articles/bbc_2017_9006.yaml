id: bbc_2017_9006
title: Two arrested at Birmingham airport on terror offences - BBC News
date: '2017-09-07'
section: England
url: http://www.bbc.co.uk/news/uk-england-41186753
content: |-
  The UK nationals were arrested after getting off a flight from Istanbul.

  The arrested men had flown into Birmingham from Turkey

  Two men have been arrested at Birmingham Airport on suspicion of terror offences.

  The pair, aged 40 and 29, and from the UK, were held on Thursday after getting off a flight from Istanbul, Turkey.

  The older man is being held on suspicion of being concerned in the commission, preparation or instigation of acts of terrorism. He is currently in hospital in London.

  The other was arrested on suspicion of belonging to a proscribed organisation.

  He is being questioned at a London police station.

  They are being detained by officers from the Met's Counter Terrorism Command.
