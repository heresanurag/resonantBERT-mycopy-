title: 'Bristol ''explosion'': Three people injured as flats are damaged - BBC News'
date: '2019-02-24'
section: Bristol
url: http://www.bbc.co.uk/news/uk-england-bristol-47346758
content: |-
  People living in the Hartcliffe area of Bristol reported hearing a loud bang shortly before 20:00 GMT.

  The area around the damaged property has been cordoned off

  Three people have been injured after flats were damaged in what is reported to have been an explosion.

  The incident happened in Whitchurch Lane in the Hartcliffe area of Bristol at about 19:50 GMT on Saturday.

  Several roads have been closed and emergency crews were at the scene.

  A woman who lives in the block of flats told the BBC she heard a "humongous bang" before her partner rescued a man on fire from one of the damaged properties.

  The eyewitness, who did not want to be named, said the injured man - her neighbour- was doused with water to put out the flames, but another woman escaped from the flat unharmed.

  She said she ran inside to get her four-year-old daughter and as they reached their garden gate "the whole house just fell in".

  Another anonymous witness told the BBC: "When I arrived they were still letting people walk down the slip road, but half way down the police came and told us the fire brigade had asked us to move back further and taped across".

  She said she saw "lots of debris and a large glass panel that looked as though it had been expelled with some force from the upstairs window" on the road.

  The corner of the property appears to have been destroyed

  She added: "The fire brigade were standing outside the house and initially all I could see was smoke but a flame started burning inside and was starting to get brighter and brighter as the smoke smell got stronger. It looked as though it was too dangerous for them to enter."

  Steve Imrie, area manager with Avon Fire and Rescue, told Bristol Live: "We committed two crew in breathing apparatus to contain and inspect the fire, while other firefighters began to administer first aid to a number of persons at the scene.

  "All casualties were conscious and breathing. Certainly the initial person who was treated has suffered minor burns."

  The cause of the damage to the flats is not yet known.

