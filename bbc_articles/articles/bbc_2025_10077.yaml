  Police arrest a 15-year-old after another teenager dies following a "medical episode".

  Teenager arrested as boy who died at funfair named

  Taha Soomro died at Barry Island Pleasure Park following a "medical episode", police say

  A teenager has been arrested after the death of a boy at a funfair. Taha Soomro, 16, from Grangetown in Cardiff, died at Barry Island Pleasure Park, Vale of Glamorgan, at about 17:00 BST on Friday after suffering a "medical episode", South Wales Police said. Officers investigating the incident have now arrested a 15-year-old boy from Grangetown on suspicion of assault and he remains in custody. In a statement, the park said staff "did their best to assist the emergency services but, unfortunately, the boy suffered a medical emergency and could not be saved".

  It added: "Our thoughts and prayers are with the family at this very sad time." Police said Taha's family were being kept informed about updates in the case and its investigation was ongoing.
