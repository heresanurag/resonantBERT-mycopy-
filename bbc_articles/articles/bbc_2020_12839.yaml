title: 'Covid-19: Welsh Government update - BBC News'
date: '2020-11-18'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-54986672
content: |-
  Details and reaction to the briefing by NHS Wales Chief Executive Dr Andrew Goodall.

  A decision on whether or not the Welsh Government will introduce a further "firebreak" lockdown shortly after Christmas will be “a matter for the first minister and the Cabinet”, the head of NHS Wales has said.

  Dr Andrew Goodall said there had been “encouraging signs that the firebreak has had some influence on our system”, with regards to reducing the number of coronavirus cases in the community.

  He went on to say that early data appeared to show the reproduction rate of Covid-19 had decreased as a result of the 17-day lockdown.

  “There are some emerging signs maybe of some stabilisation, in terms of some of the pressures in the hospital side of the system,” Dr Goodall said.

  “We currently assess that the reproduction rate is between 0.9 and 1.2, but it’s quite possible that we may see that reduce further as a reflection of the firebreak.”

  Dr Goodall suggested that was an encouraging sign that similar measures would have an impact, but stopped short of saying that a single lockdown would be enough to keep transmission levels low across the winter.

  “They will reinforce that we know that things can make a difference,” he said.

  “There will be an evaluation of the data, we will see whether that will be sufficient to manage through, but ultimately that will revert to the ministerial reflections and considerations.”
