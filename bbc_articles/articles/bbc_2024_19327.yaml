title: 'Harry Dunn: Family due to meet Foreign Secretary David Lammy - BBC News'
date: '2024-08-20'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/crlr0x0ee9eo
content: |-
  A family spokesperson says the Foreign Office will be in touch "with a firm date" for the meeting.

  Harry Dunn died in 2019 following a crash close to RAF Croughton

  The family of Harry Dunn, a teenage motorcyclist killed in a crash near a US airbase five years ago, said they expect to have a meeting with the foreign secretary next month to discuss an inquiry. Radd Seiger, the family's spokesperson, said the Foreign Office has told him it will be in touch "with a firm date [in September] soon" for a meeting. Mr Dunn, 19, from Northamptonshire, died in a crash near RAF Croughton after a car driven on the wrong side of the road by an American citizen collided with his motorbike. The driver returned to the US, causing an international row. A spokesperson from the Foreign Office said: “Harry Dunn’s death five years ago was an absolute tragedy. We stand by our commitments to his family to help ensure we are learning the right lessons.”

  David Lammy called for an inquiry in 2022 when he was shadow foreign secretary

  Following Labour's election win, the Dunn family called on the party to honour its promise of an inquiry into the government's handling of the case, which caused a diplomatic dispute with the US government. In 2022, Labour's David Lammy wrote to the then foreign secretary, James Cleverly, demanding an inquiry into the events. Following the crash in August 2019, the driver of the car, Anne Sacoolas, took advantage of diplomatic immunity and flew back to the US. The teenager's family campaigned to get Sacoolas back to the UK to face trial. She was eventually sentenced in 2022, via video link, to eight months in prison, suspended for a year, after admitting causing death by careless driving. Now the Dunns want to meet new Foreign Secretary Mr Lammy to discuss the appointment of an inquiry chair and the scope of the inquiry. Mr Seiger added the new Minister for the Americas Stephen Doughty will also "join that meeting".

  Anne Sacoolas was been sentenced to eight months in prison, suspended for 12 months, for the death of Harry Dunn in 2019.

