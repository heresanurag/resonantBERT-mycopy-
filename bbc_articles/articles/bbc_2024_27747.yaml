title: Conor McGregor tells court sex with rape accuser was consensual - BBC News
date: '2024-11-13'
section: Europe
url: http://www.bbc.co.uk/news/articles/cx27ggzq9w6o
content: |-
  Irish mixed martial artist Conor McGregor claimed to have had consensual sex with a woman who is accusing him of rape, a court has heard.

  Mr McGregor and James Lawrence deny the allegations made by Nikita Hand

  Irish mixed martial artist Conor McGregor says sex he had with a woman who is accusing him of rape was consensual, a court has heard. Nikita Hand is claiming civil damages against Mr McGregor and another man, alleging she was sexually assaulted in December 2018. Ms Hand has accused Mr McGregor of pinning her to a bed and raping her in a hotel bedroom in Dublin. The court also heard on Wednesday that DNA samples matching the profile of Mr McGregor were found on the body and underwear of Ms Hand.

  Dr Charlotte Murphy said she analysed DNA swabs taken from Ms Hand's body and clothes after the alleged assault. Profiles matching Mr McGregor’s profile were found in analysis of semen stains on the playsuit and underwear. Under cross-examination, Dr Murphy said the presence or absence of semen did not indicate consent. The second defendant James Lawrence, from Rafters Road in Drimnagh, Dublin, was excluded as a contributor to any of the DNA profiles.

  Nikita Hand is claiming civil damages for an alleged sexual assault in 2018

  Dr Murphy also said both straps were ripped on the playsuit Ms Hand was wearing. John McMahon, the co-owner of the hairdressing salon in Dublin, where Ms Hand worked, said she had returned to work after the incident but had struggled and resigned in May 2019. Vocational assessor Elva Breen said that after the incident, Ms Hand found great difficulty in working in a customer-facing role and was struggling with significant anxiety and panic attacks.

  Taking to the stand on Wednesday, Conor McGregor accused Ms Hand of lying. "She didn't get her bruises from me, as far as I'm aware," Mr McGregor said. Conor McGregor said Ms Hand performed oral sex on him and said the sex was enthusiastic and athletic. He also said when he was leaving Ms Hand wasn't distressed or upset. Danielle Kealey, who was called to give evidence for Mr McGregor, was there on the night of the alleged rape. She said she did not know Ms Hand well, because they worked in different salons. Ms Kealey told the court they were collected by Mr McGregor from the salon and after collecting Mr Lawrence, they were taken to the Beacon Hotel. She said she knew Ms Hand and Mr McGregor went into the bedroom, but didn't know what was happening in the room. She said they "came back out and everything was fine" . She was asked if anyone seemed upset and she said no. Mr McGregor will return to the stand on Thursday when proceedings resume.
