  Nasa Nobel Laureate Dr John Mather has worked on the Webb project since 1995. He is the senior project scientist and had to argue the telescope's case during periods when budget overruns and technical delays nearly resulted in cancellations.

  "I'm thrilled and I'm relieved, because, you know, when you start something this big, there's always a possibility it might not work. It did work. We are so proud," he said on seeing the first pictures.

  Key partners on the Webb project are the European and Canadian space agencies. One of Europe's contributions was the rocket that launched the telescope to orbit on 25 December. It did so with such accuracy that it saved Webb fuel that should see it working for two decades.

  "It was the Ariane rocket's Christmas gift to humankind," said Esa director general Josef Aschbacher, "putting Webb safely in orbit and extending its life probably by 10 years.

  "And it demonstrated once again the trust Nasa puts in Esa. Europe is America's number one international partner," he told BBC News.

  Viewers in the UK can watch a special programme on Webb - Super Telescope: Mission to the Edge of the Universe - on BBC Two, on Thursday at 20:00 BST, or afterwards on BBC iPlayer.
