title: 'Blaenau Gwent: Girl, 12, has life-changing injuries in dog attack - BBC News'
date: '2024-10-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cqlvgrp5771o
content: |-
  Two arrests are made after a young girl was left with serious injuries due to the dog attack.

  A 12-year-old girl has suffered life-changing injuries following a dog attack in The Crescent, Nantyglo on Monday night

  A 12-year-old girl has suffered life-changing injuries and been taken to hospital following a dog attack. Gwent Police were called to Nantyglo, in Blaenau Gwent, following reports of the attack on Monday evening. A 42-year-old woman and a man, both from the local area, have been arrested on suspicion of owning or possessing a dog bred for fighting and owning or possessing a dog dangerously out of control. The force said there was no further risk to the public.

  The girl was taken to hospital after the attack, which occured on The Crescent, Nantyglo, at about 17:50 BST on Monday. The police said that the dog has been seized by officers and will be destroyed, adding that no other animals were involved in the attack. Supt John Davies said: "This was a distressing incident for those involved. I would like to reassure the local community there is no further risk to the public." He added that there may be an ongoing police presence in the area. The two people arrested remain in police custody.
