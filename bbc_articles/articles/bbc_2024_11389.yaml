content: |-
  Emma Raducanu defies a late wobble to get her grass-court season off to a winning start with a straight sets victory over Japan's Ena Shibahara.

  'Two v one' - Raducanu unhappy with line calls

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Emma Raducanu defied a shaky finish to get her grass-court season off to a winning start at the Nottingham Open, despite criticising some of the line calls against her. Playing her first match since April, having opted to skip the French Open to focus on her fitness, the 21-year-old Briton beat Japan’s Ena Shibahara 6-1 6-4. Raducanu said she felt like she was “playing two v one” against Shibahara and the umpire Ana Carvalho. Electronic line-calling technology is not in use at the Nottingham tournament. Raducanu’s comments come a day after fellow Briton Harriet Dart repeatedly argued with the umpire over what she believed to be incorrect line calls during her defeat by Katie Boulter. "I feel like I was playing two v one on court, it was insane," said Raducanu. "I think a lot of the time they go both ways, today I felt they were all against me but it just makes me feel better that I managed to beat her and the umpire as well. "It is difficult when there is no challenge but it is something everyone has to deal with. "You can be fortunate in some ways, maybe it was just trying to make the match more competitive. It was 6-1 and 5-1 and all of a sudden first point serving at 5-3 it's a really bad line call. "It's something I had to deal with and overcome. I am very pleased with the attitude I came out with from the get-go and also having to deal with the adversity." In a statement to BBC Sport, the LTA said it has a "highly trained workforce" of umpires. It continued: "Along with the rest of tour events we will be moving to electronic line calling for ATP Tour-Level events in 2025. This continues to be a topic that we discuss with the WTA at our tournament meetings.”

  Emma Raducanu is currently ranked 209th in the world

  Tuesday's match came 713 days after Raducanu's last appearance on grass, having had wrist and ankle surgeries in 2023 that ruled her out of Wimbledon. Playing at the venue of her very first WTA match in 2021, months before her astounding run to the US Open title, Raducanu showed her intent early on by breaking Shibahara in the opening game. Shibahara, predominantly a doubles player who won the French Open mixed title in 2022, was playing her first singles match on grass at Tour level but proved no match for Raducanu in the early stages. After saving two break points, the British number six went on a run of seven successive games to see out the first set and continue into the second, halted only by a Shibahara hold to love. But, after going a double break up with a 5-1 lead, cracks started to appear in Raducanu's performance as calls went against her. Serving for the match, she conceded a break for the first time, before Shibahara then held to love for a second time. At the third time of asking, the Japanese player broke again to wipe out Raducanu's second-set advantage. But that was where Shibahara's resurgence ended as Raducanu sealed her place in the second round, converting her first match point on her opponent's serve. She will face Daria Snigur next after the Ukrainian defeated compatriot and second seed Marta Kostyuk 6-3 6-3. "It's been quite a few weeks since I last played a competitive match so I didn't really know how it would go," said Raducanu. "I think my intentions were great from the start." Later, Britain's Fran Jones followed Raducanu into the second round with a 7-6 (7-3) 6-3 win over eighth seed Caroline Dolehide of the United States. Jones will face another American, Ashlyn Krueger, next. Women's top seed and world number 10 Ons Jabeur of Tunisia beat Colombia's Camila Osorio 6-2 6-3 and will face Czech qualifier Linda Fruhvirtova in the second round.
