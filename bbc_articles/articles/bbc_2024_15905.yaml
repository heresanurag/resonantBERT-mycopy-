title: 'Euro 2024: England winning goal stuns during live interview - BBC News'
date: '2024-07-02'
section: General
url: http://www.bbc.co.uk/news/videos/c98ql1v53nno
content: |-
  Jude Bellingham scored a winning goal against Slovakia, with an airborne kick that shocked the audience.

  The BBC's Joe Inwood couldn't contain his excitement as the goal that kept England's Euro dream alive was scored midway through a live interview he was conducting.

  Jude Bellingham scored in the 95th minute at England's match against Slovakia with a bicycle kick that stunned the audience.

  Reporting live from Brixton in London, Inwood was talking to a couple who were disenchanted with England's performance in the match up until that point.

  Harry Kane then scored the winner in extra time meaning they are now through to the quarter-finals.
