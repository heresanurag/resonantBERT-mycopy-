title: 'Simone White: Tributes paid to British lawyer killed in suspected mass poisoning
  - BBC News'
date: '2024-11-22'
section: London
url: http://www.bbc.co.uk/news/articles/cyv702vmp80o
content: |-
  Simone White's law firm said she was a "dear friend and colleague" who would be "sincerely missed".

  A British woman, one of six tourists to die in a suspected mass poisoning in Laos, has been described as a talented lawyer who had a bright future ahead of her by her employer. Simone White died in hospital after drinking alcohol suspected to have been laced with methanol in the backpacking hotspot Vang Vieng. Law firm Squire Patton Boggs said in a statement: "It is with deep sadness that we mourn the tragic passing of our dear friend and colleague Simone White." It described Ms White, from Orpington, south-east London, as "someone who epitomised our firm values".

  "Our thoughts go out to all of Simone's family, friends, and those colleagues and clients who had the privilege to work with and know Simone. She will be sincerely missed," the firm added.

  In comments under the statement posted on professional networking site LinkedIn, colleagues and others in the legal sector also offered their condolences and shared memories. One colleague at the firm wrote: "Simone was one of the kindest, most genuine and thoughtful people I have ever met. "She was also hilarious. She was a core part (/the unofficial social secretary) of our friendship group, always organising dinners, drinks and trips away for us. She lived life to the fullest and encouraged everyone around her to do the same." He added that Ms White will be "forever missed". Another wrote: "Simone was such a bright light - may she rest in peace." A woman who says she worked with Ms White while at Newcastle University described her as being "such a lovely girl".

  Holly Bowles', a 19-year-old Australian, is the sixth person to die from the suspected poisoning. Her friend Bianca Jones, also 19, an unnamed US man and two Danish women, aged 19 and 20, are also among the victims. In a statement on Thursday, the Foreign Commonwealth and Development Office (FCDO) said it was supporting Ms White's family and other British nationals affected by the incident.

