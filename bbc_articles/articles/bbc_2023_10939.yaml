title: What's next in BBC presenter claims? - BBC News
date: '2023-07-11'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-66158050
content: |-
  The BBC still has questions to answer after lawyers representing the young person at the centre of the allegations disputed the mother’s account.

  The BBC still has many questions to answer after lawyers representing the young person at the centre of the allegations disputed the mother’s account.

  In a letter to the BBC, the lawyer makes claims that throw doubt on the story that has dominated front pages through the weekend, but with the BBC facing the media as it presents its annual report, the corporation's director general can expect the event to be dominated by the crisis.
