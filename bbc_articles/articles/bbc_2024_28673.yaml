title: Codsall High School temporarily closes after death of teacher - BBC News
date: '2024-11-20'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/cx2892vl3vgo
content: |-
  The school was closed on Monday, after staff were told of the death of a teacher on Saturday.

  A high school in Staffordshire was closed on Monday following the recent death of a teacher. In a statement, Codsall Community High School’s headteacher, Simon Maxfield, said staff were made aware that a colleague had been found dead unexpectedly on Saturday morning. “As would be expected, our community is coming to terms with deep feelings of grief, and we are working to ensure appropriate support is in place for all that need it,” he said. A post on Facebook said the school would be closed to pupils on Monday.

  Mr Maxfield added: “As we begin to make sense of this, we would ask that the privacy of the family, staff and students is respected.” The school was open again on Tuesday.

