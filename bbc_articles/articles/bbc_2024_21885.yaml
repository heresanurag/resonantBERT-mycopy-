  Weavers in east London have celebrated the soon-to-be Weaver Line by producing a fabric roundel.

  Weavers in east London have celebrated a newly-named stretch of the London Overground by producing a roundel made out of fabric.

  The soon-to-be Weaver Line, part of the London Overground connecting Liverpool Street with Spitalfields, Enfield Town and Chingford, has been named in recognition of the area’s historic textiles trade.

  A woven version of the Overground sign for the line is being created by residents,

