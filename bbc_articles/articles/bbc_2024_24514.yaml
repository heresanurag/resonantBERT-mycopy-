content: |-
  A derelict department store was the site of a multi-storey cannabis farm uncovered by police.

  This is the moment a derelict department store in Newport city centre was revealed as the site of a multi-storey cannabis farm.

  The former Wildings store on Commercial Street contained more than 3,000 cannabis plants, with an estimated street value of £2.1m.

  The raid was conducted as part of Operation Forester – a Gwent Police drugs operation that has seized over £7m worth of the Class B drug across several commercial properties in the area.

  Adrian Daja and Andi Shabani, both 28, appeared at Cardiff Crown Court on 10 January, where they admitted producing a controlled Class B drug, and each received a two-year jail sentence.

  Rookie Cops Series 2 is available to watch on BBC iPlayer.
