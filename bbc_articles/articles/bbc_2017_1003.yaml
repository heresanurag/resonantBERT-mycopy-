title: US troops welcomed by Poland - BBC News
date: '2017-01-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-38624809
content: |-
  A deployment of 3,000 US soldiers is welcomed by Poland's prime minister and local residents.

  A deployment of 3,000 US soldiers has been welcomed by Poland's prime minister and local residents.

  The move was a response to concerns over a more aggressive Russia, but Moscow said the troops would destabilise Europe.
