title: 'Nadja Regin: Bond actress dies aged 87 - BBC News'
date: '2019-04-08'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47854805
content: |-
  The Serbian actress appeared opposite Sean Connery in From Russia With Love and Goldfinger.

  Actress Nadja Regin, who appeared in two James Bond movies, has died at the age of 87.

  The news was announced on the official 007 Twitter account, which said: "Our thoughts are with her family and friends at this sad time."

