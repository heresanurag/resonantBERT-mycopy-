  A selection of your pictures of Scotland sent in between 19 and 26 July.

  Paul Thompson, from Manchester, bought 16 "rather excellent" steak pies from the Pathhead Bakery in Sanquhar, Dumfries and Galloway. He says: "We take in English-language students from all over the world and we make it a cultural experience too. Tonight our two Italian boys will be being educated and next week two Spanish girls will enjoy the same."
