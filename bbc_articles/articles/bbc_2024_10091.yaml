title: Plumes of wildfire smoke block Canadian motorway - BBC News
date: '2024-05-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-69005913
content: |-
  Thousands have evacuated British Columbia, as the Parker Lake fire marks the start of Canada's wildfire season.

  A wildfire in British Columbia, Canada, has led to thousands of evacuations over the weekend. The Parker Lake fire marks the beginning of the country's wildfire season.

  Eyewitness Heather MacKenzie captured plumes of wildfire smoke blocking a motorway between the Northwest Territories and Alberta.

  The Canadian government has warned the country could face another devastating wildfire season as spring and summer bring higher than normal temperatures.
