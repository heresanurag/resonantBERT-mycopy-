content: |-
  Storehouse is an immersive theatre show opening in an unused warehouse Deptford.

  An immersive theatre show the size of two football pitches is making its debut in an unused warehouse in south-east London.

  The production Storehouse uses art, technology and storytelling in a bid to challenge how the audience perceives truth, trust and narratives that shape the digital world.

  Staged in Deptford at what was once the paper store of some of Fleet Street's biggest newspapers, the show takes people on a journey through an imaginary archive built to house every news story, message, memory and meme ever transmitted across the world's digital networks.

  The show features a group of radical visionaries, who believed that by storing and analysing all human knowledge they could ignite the dawn of a new digital consciousness.

