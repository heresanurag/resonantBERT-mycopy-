title: Shoplifting levels 'unacceptable', inquiry finds - BBC News
date: '2024-11-05'
section: Business
url: http://www.bbc.co.uk/news/articles/c4gzreg4dypo
content: |-
  Cases are under-reported and "immediate action" is needed to tackle the crisis, a Lords review finds.

  There were more than 440,000 incidents of shop theft recorded by police in the year to March

  Shoplifting is at "unacceptable" levels and not being tackled properly, a Lords inquiry has found. The crime is seriously under-reported and the problem is so urgent police forces need to take "immediate action", according to the House of Lords Justice and Home Affairs Committee. It says retailers need to be able to report crimes more easily, more funding is needed for offender rehabilitation, and regulations should be introduced to make it more difficult to sell stolen goods online anonymously. The Home Office said it was making assaults on shop workers a criminal offence and deploying "thousands" of police officers dedicated to tackling shoplifting.

  The Lords committee held an inquiry into tackling shoplifting in which it heard evidence from police chiefs, retailers and industry experts in May and September. In a letter published today, it said there were more than 443,000 incidents of shop theft recorded by police in the year to March 2024 – the highest ever since records began 20 years ago. But they were "a drop in the ocean" when compared with likely real figures estimated at 17 million annually – which has "devastating consequences for businesses and families". Shop theft has evolved from "individualised offending to relentless, large-scale, organised operations accompanied by unprecedented levels of violence", it added. Tracey Robertson, co-owner of Paw Prints – a small chain of pet shops across Yorkshire – says shoplifting costs her business around £8,000 a year. "It’s a financial impact on a family business. It’s bad in the fact that it affects the staff that work for us because sometimes it’s aggressive and violent," she said.

  Tracey Robertson, who owns a small chain of pet shops in Yorkshire, says shoplifting costs her around £8,000 a year

  The committee supported schemes like Project Pegasus - a partnership between retailers and police to tackle organised shoplifting gangs - but said there needs to be a strategy to deal with local prolific offenders too. "The scale of the shop theft problem within England and Wales is totally unacceptable and action, like that under way in the Pegasus scheme, is vital and urgent," said Lord Foster of Bath, chair of the committee. The committee found there is a widespread perception that shop theft is not treated seriously by the police which "risks undermining confidence in the police and wider criminal justice system". It said shoplifting cost the retail sector nearly £2bn last year – which resulted in price rises impacting individuals, families and communities. "We acknowledge the pressures on police resources, but we believe that the urgency of the situation relating to shop theft requires immediate action within existing police staffing levels," the letter said. It has made a series of recommendations to the government which it says would "help tackle the problem and keep the public and our economy safer".
  • None Phasing out the use of the outdated term "shoplifting" which serves to trivialise the severity of the offence
  • None Developing improved reporting systems to enable retailers to report crime to the police quickly and easily
  • None Introducing regulations to make it more difficult to sell stolen goods on online marketplaces anonymously
  • None Introducing regulations and best practice guidance for the use of facial recognition technology by private companies Shop owner Tracey Robertson believes the recommendations do not go far enough and wants to see much tougher sentences for repeat offenders. Professor of criminology Emmeline Taylor, who gave evidence to the inquiry, said the committee recommendations are "far-reaching" and understand the multiple root causes of shop theft. "If adopted by the police, the industry and the government it will certainly do a huge amount to begin to turn the tide on the tsunami of shop theft that has impacted the retail sector across the UK."

  The National Police Chiefs’ Council (NPCC) said it welcomed the report which further highlights the significant impact retail crime has on its victims. "We are doing all we can to reduce thefts and pursue offenders, especially those prolific and habitual offenders, who cause misery within the community," said Chief Constable Amanda Blakeman, the NPCC’s lead for acquisitive crime. The Home Office said it understands the "devastating impact" of shop theft has on communities. A spokesperson added: "We are taking immediate action through our commitment to scrap the £200 shop theft threshold, and making assaults on shop workers a criminal offence. "We will also put thousands more dedicated police officers on our streets, and establish a Retail Crime Forum for retailers to confidently implement tactics against shop theft."
