content: |-
  Using footage from inside Hamas' tunnels, Gordon Corera explores how they could shape the war.

  The BBC's security correspondent Gordon Corera analyses videos from inside Hamas' network of tunnels - thought to cover around 300 miles under Gaza - and explores how they could shape the next phase of the war.
