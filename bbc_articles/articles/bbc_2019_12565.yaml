title: Bystanders rescue woman from train tracks - BBC News
date: '2019-10-19'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-50104738
content: |-
  Footage shows a woman being knocked off a platform in Buenos Aires, Argentina.

  Footage shows a woman being knocked off a platform at Pueyrredon station in Argentina's capital, Buenos Aires. Bystanders quickly responded to help.
