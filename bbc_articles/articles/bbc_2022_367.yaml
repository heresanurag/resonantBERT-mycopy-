  Several tennis websites reported he was training in Marbella for the possibility of competing in the Australian Open.

  This is where he was quizzed by border officials and his visa was revoked after he confirmed he wasn't vaccinated.

  In Mr Djokovic's Australian travel entry form - released by the federal court - it was stated that he had not travelled anywhere else in the 14 days prior to his arrival there.

  Mr Djokovic says the form was filled in by a member of his team who - in "human error" - had ticked the wrong box about his previous travel before coming to Australia.

  Australian immigration officials said on Tuesday they were investigating whether he had made a "false declaration" - which would be grounds for a visa cancellation.
