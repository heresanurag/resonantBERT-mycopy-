  Following this engagement, Mr Djokovic says he cancelled all other events and isolated for the required period.

  In the court documents provided by Mr Djokovic's lawyers, there is confirmation that he had another PCR test on 22 December.

  This test came back negative at 16:15 the same afternoon, although we don't know when Mr Djokovic was informed of the result.

  Serbian Covid regulations stipulate a full 14-day self-isolation period, unless the person who has tested positive receives a negative PCR test result during that period.

  Mr Djokovic was pictured playing tennis in the streets of Belgrade over the Christmas period.

  A fan tweeted a video of the outing on 25 December, which was also reported in several tennis publications in the days following.

  The video was caption: "Novak Djokovic, playing tennis on Christmas Day in Belgrade... Footage from today!"

  On the same day, Mr Djokovic was also pictured posing with Serbian professional handball player, Petar Djordjic, in Belgrade.

