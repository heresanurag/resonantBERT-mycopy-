  Before attending the event Mr Djokovic says he produced another negative lateral flow test, and he was "asymptomatic and felt good".

  It was after this event that Mr Djokovic says he received notification that his PCR test was positive. At this point he should have began 14 days of isolation.

  It has been reported by French newspaper L'Equipe that Mr Djokovic attended an interview and photo shoot with their paper in Belgrade on 18 December.

  He has since admitted attending this engagement, which he says was "an error of judgement and I accept I should have rescheduled".

  Serbian Prime Minister Ana Brnabic told the BBC that it was "a clear breach of the rules" if Mr Djokovic continued with public events, knowing he had Covid.

  The paper says he wore a face mask during the interview, but removed it for the photo shoot.

  He posed with the newspaper's Champion of Champions trophy - an award which recognises the outstanding sportsperson of the year.

