title: Video shows gunmen in Moscow concert hall lobby - BBC News
date: '2024-03-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-68641092
content: |-
  Footage shows gunmen in the lobby of a concert hall near the Russian capital Moscow.

  A number of people have been killed and injured during an attack on a concert hall near the Russian capital Moscow, Russian media say.

  Footage shows gunmen in the lobby of the concert hall.
