title: Watch moment police dog sniffs out €1m hidden cash - BBC News
date: '2023-08-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-66379987
content: |-
  The Italian canine named ‘Elio’ foiled a cash smuggling attempt at a bus station near the city of Florence.

  An Italian police dog named ‘Elio’ has thwarted a cash smuggling attempt by sniffing out over €1,075,600 (£925,000) stashed in two suitcases while on patrol at a bus station near Florence.

  Authorities said the owner of the bags was a Chinese national residing in Italy, and a formal investigation has been launched.
