title: '''I threw a crate at the attacker'' - BBC News'
date: '2018-07-19'
section: General
url: http://www.bbc.co.uk/news/uk-40161223
content: |-
  Florin from Romania fought a London Bridge attacker off using a crate.

  Florin from Romania describes what happened during the London Bridge attack and talks about how he used a crate to fight off one of the attackers.

  Watch the Victoria Derbyshire programme on weekdays between 09:00 and 11:00 BST on BBC Two and the BBC News Channel.
