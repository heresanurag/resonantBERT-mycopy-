title: 'Moseley deaths: Bodies of man and woman found at flat - BBC News'
date: '2019-11-10'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-50363449
content: |-
  The pair, both 28, knew each other and no-one else is being sought in connection with their deaths.

  The bodies were found at a flat in Oxford Road, near Moseley Church of England Primary School

  A man and a woman have been found dead at a flat in Birmingham.

  The pair, both 28 and known to each other, were found at the property in Oxford Road, Moseley, at about 17:30 GMT on Saturday.

  Post-mortem examinations have not yet taken place but police said they had suffered serious injuries.

  West Midlands Police said they were not looking for anyone else in connection with the deaths. One of the pair lived at the flat, a spokeswoman added.

  Officers have been speaking to neighbours near the property, which is opposite Moseley Church of England Primary School.

