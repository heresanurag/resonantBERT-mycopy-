title: Croydon bus stabbing teenager dies - BBC News
date: '2020-03-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-51798528
content: |-
  The boy, thought to be 17, was killed in south London on Sunday evening.

  Whitehorse Lane in South Norwood has reopened since the police cordons were lifted

  A teenager has been stabbed to death on a bus in south London.

  The boy, believed to be 17, was found injured when police were called to Whitehorse Lane in South Norwood, Croydon, at about 20:30 GMT on Sunday.

  He was treated by paramedics but died at the scene 40 minutes later.

  Scotland Yard said no arrests have been made. A Section 60 order, giving police additional stop and search powers, has been put in place across several areas until 13:10.

  Those areas are: Selhurst, Thornton Heath, Bensham Manor, South Norwood, Woodside, New Addington North and New Addington South.

  Local roads were closed but have since been reopened.

