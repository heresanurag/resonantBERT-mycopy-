  When approached, she was wearing clothes and carrying items seen in Ms Doncheva's social media posts: a distinctive blue tracksuit, a pair of glasses, and a patterned mobile phone case. We also observed her entering Ms Doncheva's registered home address less than 20 minutes after she denied being Ms Doncheva. She has not responded to a letter offering her a chance to comment. The two women worked alongside the six Bulgarians who were convicted of conspiring to spy for Russia.

  A cache of almost 80,000 Telegram messages between Roussev and his controller Marsalek was recovered by UK police. The messages revealed multiple operations carried out by the cell in the years before February 2023, when their activities were disrupted by police. The UK-based spies even targeted Ukrainian soldiers thought to be training at a US military base in Germany. Roussev and Marsalek discussed kidnapping and killing journalists Christo Grozev and Roman Dobrokhotov. Unlike the six spies convicted in the UK, Ms Doncheva and Ms Gencheva are not in custody and have not been convicted of any offence. The Austrian public prosecutor's request for pre-trial detention of Ms Doncheva was rejected and she was released. Austrian court documents state there is "no risk" of Ms Doncheva absconding because she is "socially integrated" in the country and cares for her mother, and that a risk of further crime is not particularly high given the imprisonment in the UK of others involved. Ms Thalhammer told the BBC she "can't understand" why the person who spied on her was released. "Maybe [they] shouldn't believe everything a spy says." She said the Austrian secret service thinks there are other spy cells and that their activity has continued after the arrest of the six Bulgarians in the UK. Ms Gencheva has remained free in Bulgaria, publicly presenting herself as an experienced airline and travel industry professional. After being contacted by the BBC, Ms Gencheva changed her profile name on Facebook and LinkedIn. She continues to list her proficiency with the Amadeus airline software.

