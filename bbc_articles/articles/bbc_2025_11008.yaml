  The Hollywood actor says his offer to help players when they need anything was taken literally.

  Ryan Reynolds says one player took his offer of help with anything he needed too literally

  Hollywood actor Ryan Reynolds says one Wrexham AFC player took his offer of a helping hand literally by asking the Hollywood star to book him a rental car. In an effort to forge connections with the club's players, Reynolds and fellow co-owner Rob McElhenney get in touch with them personally after they sign with Wrexham, he told the Fearless in Devotion podcast , externalon Wednesday. "We just wanted to connect with the players. Every player, when they sign, we Facetime them, we call them, we give them our info," he said. "We say 'if you need anything, call us, we're here to help'."

  "That is our version of meddling with football. We don't make football decisions," the actor said. But Reynolds said it backfired with one player, whom he did not name. "One player did call, to ask me to rent him a car and I said 'when I said call me for anything, I meant a kidney'," he said. "I didn't mean: how do I get you a Hertz rental car. Let's try Google next time," he added. Wrexham sealed a third consecutive promotion earlier this month, and will play in the Championship next season - one division below the promised land of the Premier League. Reynolds said he would remain passionate about the club because it was "the most romantic version of storytelling". "It isn't about a football club. It's about a town," he said. "The sentiment that we feel when we walk through the streets of Wrexham today versus four years ago is a contagion, and I love that. "That's not something you get bored of."
