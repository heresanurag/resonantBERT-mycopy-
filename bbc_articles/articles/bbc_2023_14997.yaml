title: BBC reports from inside destroyed Gaza neighbourhood - BBC News
date: '2023-10-21'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67176203
content: |-
  BBC Arabic's Adnan El-Bursh speaks to residents in a destroyed neighbourhood in Gaza.

  Residents of a neighbourhood in central Gaza say it was completely destroyed by Israeli airstrikes overnight, leaving thousands homeless.

  BBC Arabic's Adnan El-Bursh met people who lived there. While he was in the neighbourhood, a warning came from the Israeli army telling people to evacuate.

  Palestinian officials say more than 4,000 people have been killed in Gaza.

  Israel is continuing its strikes on Gaza and has insisted that it is striking Hamas targets.

  The bombardments are a response to attacks by Hamas gunmen on Israel on 7 October, in which at least 1,400 people were killed and 203 taken hostage. Israel is now poised to launch a ground offensive.
