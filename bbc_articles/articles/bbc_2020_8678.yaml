content: |-
  Pupils in England, Wales and Northern Ireland receive their A-level, BTEC and other results.

  'This is completely out of my hands'

  Ella Jarvis in Twickenham was driving to school with her mum Tracy when she spoke to BBC Radio 5 Live, trying to find out what options were open to her after she didn't get the grades she wanted. Ella was predicted AAA* in her A-levels but awarded CBC. She was unable to take her mock exams earlier in the year because she had glandular fever. She said she feels her “future has been taken away by people who don’t even know me”. She wants to study English at university after a gap year, but now isn’t sure about her options. “I was initially hoping to go to a Russell Group uni next year, even Oxbridge, and I have no chance of going to that now because of the grades. If I had done the exams and got these grades I would feel a lot more comfortable because at least it would’ve been me and it would’ve been me in control, but this is completely out of my hands.” Ella said she’s now wondering whether to sit the exams later on this year. “I have lots of work planned, I have work experience... we’re just going to see what happens today. It has put a big spanner in the works.”
