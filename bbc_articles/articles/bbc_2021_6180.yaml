title: Three people arrested in Connah's Quay murder probe - BBC News
date: '2021-05-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57213541
content: |-
  Police were called to reports of a stabbing but Dean Bennett died after being flown to hospital.

  Police continue to investigate the incident in Connah's Quay on Saturday afternoon

  A murder investigation has been launched after a man died following a "serious assault" in north Wales.

  Dean Bennett, 31, was airlifted to hospital after police were called to reports of a stabbing at Connah's Quay in Flintshire at 17:00 BST on Saturday.

  North Wales Police said the victim of the attack in Dock Road later died.

  Detectives said a 46-year-old woman, a 35-year-old man and a 16-year-old girl have been arrested on suspicion of murdering Mr Bennett, of Connah's Quay.

  Officers were called just after 17:00 on Saturday by the Welsh Ambulance Service to a report that a man had been stabbed.

  Mr Bennett was flown to Aintree hospital in Liverpool but was pronounced dead shortly after his arrival, the police said.

  The man and woman remained in police custody on Sunday night, while the 16-year-old girl was released on police bail pending further investigations.

  "Our heartfelt sympathies go out to Dean's family and friends at this incredibly difficult time," said Det Ch Insp Sion Williams.

  "We understand that a serious incident like this has caused a lot of concern in the local community and we'd like to reassure residents that we are doing all we can to establish what has happened.

  "Officers are on patrol in the area and a police cordon remains in place."
