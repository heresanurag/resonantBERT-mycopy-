  A selection of news photographs from around the world.

  The Jarl Squad take part in the torch procession through Lerwick on the Shetland Isles during the Up Helly Aa festival. Originating in the 1880s, the festival celebrates Shetland's Norse heritage. More than 1,000 torches are lit on the last Tuesday in January.
