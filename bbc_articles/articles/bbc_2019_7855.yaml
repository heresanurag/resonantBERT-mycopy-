  See how the players rated as England lost 2-1 to the USA in the Women's World Cup semi-final.

  Last updated on .From the section Women's Football

  England missed out on a place in the Women's World Cup final after losing 2-1 to holders the United States in Lyon. Ellen White was your star performer for the Lionesses. Here's how you rated the players out of 10.
