  The Netherlands' Femke Bol stormed to victory in the women’s 400m hurdles before her eagerly anticipated showdown with American world record holder Sydney McLaughlin-Levrone in Paris. Bol set a meeting record of 51.30, one week after running the third-quickest time in history of 50.95. Briton Jessie Knight ran a season-best 54.15 for fifth, while Lina Nielsen, also in GB’s Olympic squad, was eighth. In the men’s event, Brazil’s Alison dos Santos took a dominant victory in 47.18 before an Olympic showdown with Norway’s Karsten Warholm and American Rai Benjamin, while Britain’s Alastair Chalmers finished eighth. Jamaica’s Nickisha Pryce set a world-leading time this year in the women’s 400m, taking victory in 48.57 ahead of Poland’s Natalia Kaczmarek. GB’s Amber Anning was fourth, Laviai Nielsen fifth and Victoria Ohuruogu seventh.

  Switzerland’s Dominic Lobalu won the men's 3,000m in 7:27.68, with Jack Rowe the best-placed Briton in 12th in a personal best of 7:38.70. George Mills, who will contest the men’s 1500m and 5,000m in Paris, and British team-mate Neil Gourley suffered early falls in the Emsley Carr Mile, won by Australian Oliver Hoare in 3:49.03. Britain's William Grimsey was third in the men’s high jump. Hamish Kerr of New Zealand won after clearing 2.30m, while Olympic champion Mutaz Essa Barshim withdrew. Italy’s Leonardo Fabbri beat American two-time defending Olympic champion Ryan Crouser to win the men’s shot put with a mark of 22.52m. Briton Scott Lincoln was seventh. GB's Bekah Walton was eighth in the women’s javelin as Ausralian Mackenzie Little threw a personal-best 66.27m for victory. Zak Skinner won the ambulant men’s 100m in a national record 10.84 and Sophie Hahn clocked 12.55 to win the women’s race as athletes build towards the Paralympics. The ambulant men’s 1500m was won by Ben Sandilands in 3:55.10, while Sammi Kinghorn took victory in the wheelchair women’s 800m in 1:43.24. The Paris 2024 opening ceremony takes place on Friday, before the athletics programme starts on 1 August. The Paralympics begin on 28 August. The Diamond League series will resume after the Olympics with meets in Lausanne, Silesia, Rome and Zurich before the two-day finals event in Brussels in September.
