  Hughes, who last year claimed a breakthrough first global medal with world 100m bronze, had his season disrupted by a hamstring injury in June and could not compete for victory. But Hinchliffe, coached by American icon Carl Lewis, can be pleased with another sub-10 second clocking in a breakout season. "I am happy with the time but I really wanted to win the race," said Hinchliffe, who ran the second-fastest all-condition 100m in British history with a wind-assisted 9.84 in May. "I am confident in myself, so I am especially happy to finish first Briton in the race. In Paris I am aiming to win." Asher-Smith and Neita, who will both contest the 100m and 200m events in Paris, ran their fastest times this season before they pursue their first individual Olympic medals. Earlier, they partnered Amy Hunt and Imani-Lara Lansiquot in the women’s 4x100m relay, taking a commanding win and equalling the British record of 41.55. Asher-Smith said: "I am a little frustrated but, on the other hand, it is my best time in two years and I am feeling fit and healthy going into the Olympics." In the men’s 4x100m, Britain’s first team failed to finish following a breakdown in communication between Richard Kilty and Reece Prescod at the final changeover.

