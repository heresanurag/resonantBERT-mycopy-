  The delight was evident on Hodgkinson’s face as she crossed the line to deafening noise at the stadium where she was unable to compete last year because of illness. A three-time global silver medallist, the European champion was in dazzling form and demonstrated she is ready to end her wait for a global gold after a series of near-misses. In the absence of American defending champion Athing Mu in Paris, world champion Mary Moraa represents the main obstacle to success for Hodgkinson, who beat the Kenyan in Eugene this season. "I felt really good. I just wanted to go for it and see what was there. It was a little bit of bravery and fearlessness," Hodgkinson said. "With a great atmosphere like this, I didn't want to waste the opportunity. I'm feeling really good and confident ahead of Paris." Reekie - the second-fastest woman this year after running 1:55.61 - will take huge confidence before her podium bid, having missed out on Olympic bronze by 0.08secs in Tokyo, while Bell (1:56.28) and Muir (1:57.63) recorded fast times before contesting the Olympic 1500m. Among GB's other Olympic medal contenders, Caudery, whose British record clearance of 4.92m is unmatched in the world this year, said her performance felt like a “lost opportunity”. "I didn't quite do as well as I wanted. It's always such a dream competing here. I love this stadium, I love the British crowd and I still had a lot of fun," said the 24-year-old. "I'm really excited for my first Olympics, I know today didn't go as planned but I've got so much consistency behind me this year and I'm feeling confident." In the long jump, Johnson-Thompson, who is aiming to beat two-time defending Olympic heptathlon champion Nafi Thiam in Paris, replicated the 6.54m jump she produced in winning her second heptathlon world title last year.

  The men’s 100m brought the curtain down on a spectacular day, and it was one of the sport’s major stars who claimed victory as Lyles showed he is in the shape of his life before bidding for an unprecedented four track titles in Paris. The 24-year-old, who won 100m, 200m and 4x100m world gold last year and is aiming to add the 4x400m to that haul this summer, came through in the closing stages to defeat several of his Olympic rivals, including world silver medallist Tebogo. "A personal best and getting faster before Paris. I live for the biggest moments. The more eyes the better I perform," said Lyles.

