content: |-
  Matthew Hudson-Smith smashes his European 400m record and Keely Hodgkinson sets a national 800m record as Great Britain's Olympic gold medal hopes produce statement performances in London.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Matthew Hudson-Smith smashed his European 400m record and Keely Hodgkinson set a national 800m record as Great Britain's Olympic gold medal hopes produced statement performances at the London Diamond League. World silver medallist Hudson-Smith, 29, clocked 43.74 seconds to set the fastest time in the world this year, six days before the Paris 2024 opening ceremony. Olympic silver medallist Hodgkinson, 22, improved her world-leading time in 2024 to one minute 54.61 seconds and led British team-mates Jemma Reekie and Georgia Bell - second and third respectively - to personal bests in a stunning performance. In the final event of the day at a sold-out London Stadium, American world champion Noah Lyles ran a personal best of 9.81 seconds to take victory in the 100m, ahead of South African Akani Simbine and Botswana's Letsile Tebogo. Britain's rising sprint star Louie Hinchliffe - soon to make his Olympic debut - was fourth in 9.97, while team-mates Zharnel Hughes and Jeremiah Azu were sixth and seventh respectively in 10.00 and 10.08. Dina Asher-Smith was third in the 200m in 22.07, with compatriot Daryll Neita fourth in 22.20.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  American world silver medallist Gabrielle Thomas finished strongly to edge victory in 21.82 from St Lucia's Julien Alfred, who ran 21.86. Britain's world indoor champion Molly Caudery was third in the women's pole vault with a clearance of 4.65m, while Katarina Johnson-Thompson produced a long jump best of 6.54m to finish fifth.

  A crowd of 60,000 at the home of iconic Team GB moments at London 2012 provided the perfect platform for many of Britain’s Paris Olympians to complete their Games preparations. Two of the squad’s main gold medal hopes shone in particular, Hudson-Smith and Hodgkinson making their intentions clear with world-best performances. Hudson-Smith missed Tokyo 2020 with injury and his world silver last year was achieved despite Achilles tendonitis wrecking his preparations. But, after setting a European record of 44.07 in May, he showed he is peaking at the ideal moment before chasing a first Olympic podium. "It was an amazing crowd. It's always good to perform in front of them and it's a great send-off," Hudson-Smith told BBC Sport. "It's a long time coming and I'm actually healthy. Now I'm putting in a lot of work. The proof is in the pudding. I'm excited. "One of the biggest changes is that I'm doing a lot of gym, which I actually hate. I'm an overall better athlete and better person. I'm on salads now." Behind him, Olympic debutant Charlie Dobson ran a personal best of 44.23 to become the second-fastest British athlete in history in fourth.

