title: 'Pembroke Dock murder: Accused man Matthew Harris dies - BBC News'
date: '2022-06-13'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61782603
content: |-
  Matthew Harris was due to appear in court to offer a plea on a charge of killing Lisa Fraser.

  A man on remand in prison accused of murdering a 52-year-old woman in Pembrokeshire has died.

  Matthew Harris, 41, of Haverfordwest, was found in his cell on Wednesday, 27 May and died in hospital the next day.

  He was due to appear in court accused of killing Lisa Fraser, whose body was discovered at a house on Military Road in Pembroke Dock on Friday, 13 May.

  His death was confirmed at Swansea Crown Court and the criminal proceedings have now ended.

  He also faced charges of threats to kill, robbery and criminal damage to property in Neyland, Pembrokeshire.

  Lisa Fraser was found dead in a house in Pembroke Dock

  He had been remanded in custody at HMP Long Lartin near Evesham, Worcestershire, and had been due to enter a plea at court.

  However the case can no longer be tried and Judge Paul Thomas QC ordered his death be noted on the case file.

  Dyfed-Powys Police said the death had been referred to the coroner in Worcestershire and Ms Fraser's family were being supported by specialist officers.
