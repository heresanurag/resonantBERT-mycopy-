  See how you rated the players out of 10 as France beat Australia 2-1 in Kazan.

  World Cup 2018: France 2-1 Australia - how you rated the players Last updated on .From the section World Cup

  France edged out Australia in a tight opening Group C game in Kazan thanks to a VAR decision and goal-line technology. Having narrowly missed out on what would have been an impressive draw, the Australian players fare better in your ratings, with Huddersfield's Aaron Mooy voted the star performer in the match. Here are your player ratings...
