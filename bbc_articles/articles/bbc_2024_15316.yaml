title: 'Jim Allister: TUV leader won''t take Reform whip in Commons - BBC News'
date: '2024-07-16'
section: Northern Ireland Politics
url: http://www.bbc.co.uk/news/articles/c98q1xgx4r3o
content: |-
  Jim Allister will continue to sit as a TUV MP and will support Reform UK in areas of mutual interest.

  Jim Allister said he will not take the whip of Nigel Farage's Reform UK in the House of Commons

  Traditional Unionist Voice (TUV) leader Jim Allister has ruled out formally joining Reform UK at Westminster. Mr Allister had been in talks with the party about taking the whip and joining Reform UK's five MPs on the Commons benches. But he has now decided to sit as a TUV MP and will support Reform UK in areas of mutual interest as set out in a memorandum of understanding. Those include opposition to the Irish Sea border, taxation and immigration. TUV and Reform UK announced an electoral partnership in March ahead of the recent general election. The then Reform UK leader Richard Tice co-signed a "memorandum of understanding" at the TUV conference alongside Mr Allister. Speaking at Parliament Buildings on Tuesday, Mr Allister said: "I would anticipate taking the Reform whip on those agreed issues, but I will continue as the TUV member of parliament for North Antrim. "There are parallels, I believe Stephen Farry took the Liberal Democrat whip but continued to be the Alliance MP, so the two will work in tandem." "The common thread is a commitment to our union, a belief in the integrity of the United Kingdom and a belief that Northern Ireland needs to be governed as a part of the United kingdom, not as some adjunct of the EU."

  Timothy Gaston (right) is to replace Jim Allister in the Northern Ireland Assembly

  Mid and East Antrim councillor Timothy Gaston has been selected by the TUV to replace Mr Allister in the Northern Ireland Assembly. It follows Mr Allister’s election as MP for North Antrim earlier this month. Mr Allister said Mr Gaston has had a "long and effective apprenticeship" to succeed him as a Stormont assembly member for North Antrim. He said Mr Gaston is “no stranger to rough and tumble of politics” and has been a "scourge of squander” as a councillor on Mid and East Antrim Borough Council. Mr Gaston said he would "not shy away from asking the hard questions" at Stormont. Mr Gaston, from Ballymena, had been a councillor for more than 10 years and is a former deputy mayor. He also worked as Mr Allister’s office manager in Ballymena.
