content: |-
  Monty defeated more than 2,500 canines for the top prize in New York.

  A giant schnauzer named Monty has triumphed over more 2,500 canines to be crowned the Best in Show winner at the 2025 Westminster Kennel Club dog show.

  Monty's victory in New York gave the Working Group of breeds its first winner since 2004.

  Bourbon the Whippet came out of retirement to take the runner up prize of Reserve Best in Show.
