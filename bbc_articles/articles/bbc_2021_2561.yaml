  The health secretary welcomes news infection levels are falling but says there's still more to be done.

  Before lockdown, Lorna was happy to just snuggle up with her cats Image caption: Before lockdown, Lorna was happy to just snuggle up with her cats

  When Wales was locked down to try to stop the spread of coronavirus, comedian Lorna Pritchard thought it would put a halt to her planned return to the world of dating.

  But the romcom fan went online, found her hero and fell in love. Here she describes how she found her happy ending:

  I spent a couple of years in the dating wasteland. And in March 2019 I decided to give myself a year off. Instead, I'd focus on my career in stand-up comedy. March 2020 would be the perfect time to get back on the dating scene.

  When that month finally came round, I realised to my dismay that a global plague had accompanied it. Dating was completely off the cards!

  By May I was ready to give up. I thought I'd have one more trawl through my dating inboxes out of politeness.

  That's when a man called Leo caught my eye.

