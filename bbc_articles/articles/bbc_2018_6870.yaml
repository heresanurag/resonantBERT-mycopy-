  Sarah Jarvis is one of the unsung heroes of social care.

  Norfolk care worker Sarah Jarvis showed the BBC the challenges and rewards on her daily rounds.

  The government will publish new plans for funding social care in England soon.

  Producer: Sophie Woodcock, Correspondent: Alison Holt, Filming and editing: Tony Smith for BBC News at Six and Ten
