  Democratic congressman Chris Deluzio said in a press statement that the House Armed Services Committee, on which he sits, must conduct a full investigation and hearing on the matter as soon as possible. "This is an outrageous national security breach, and heads should roll," he said. Don Bacon, a Republican congressman from Nebraska, told the political website Axios that the administration's action was "unconscionable". "None of this should have been sent on non-secure systems," he said of Waltz's messaging. "Russia and China are surely monitoring his unclassified phone."

  With Republicans in control of both the House of Representatives and the Senate, Trump's own party would have to initiate any kind of formal congressional investigation into the matter. Republican Speaker of the House Mike Johnson appeared to downplay such a possibility as he told reporters that the White House had admitted its error. "They'll tighten up and make sure it doesn't happen again," he said. "I don't know what else you can say about that." Trump, for his part, pleaded ignorance when asked by reporters in the Oval Office about the Atlantic story, saying that it was the first he had heard of it. The White House then released a statement defending the president's national security team, including Waltz. By Monday evening, however, rumours in Washington were swirling that high-level resignations may ultimately be necessary, with attention focusing on Waltz, whose invitation brought Goldberg into the group conversation. The White House has provided no further comments even as this speculation has grown. In its afternoon statement, the White House noted that the strikes were "highly successful and effective". That could help minimise some the political fallout from the chat-group discussions, which also revealed some divisions within Trump's national security team.

