  This is also not the first time that the handling of sensitive national security material has generated headlines. Both Trump and Joe Biden were investigated for their possession of classified information after leaving office. Special Counsel Jack Smith indicted Trump for alleged violations related to his refusal to turn over material stored at his Mar-a-Lago residence – a case that was dropped when Trump won re-election last year. In 2016, Hillary Clinton's use of a private email server for communications while US secretary of state became a major issue during her unsuccessful presidential campaign. Like this White House group chat, some of those messages provided insight into the inner workings of Clinton's team. Their revelation also proved to be politically damaging. A handful of her stored messages were later deemed to contain "top secret" information. "We can't have someone in the Oval Office who doesn't understand the meaning of the word confidential or classified," Trump said during that campaign – one of many attacks on Clinton for what he said was a clear violation of federal law. On Monday afternoon, Clinton took to social media to posted her own, brief comment on the revelations of the White House group chat on Signal. "You've got to be kidding me," she wrote.
