title: Irish 'laughing dad' goes viral - BBC News
date: '2021-01-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-55620141
content: |-
  County Mayo man howls with laughter while trying to record a birthday message for his son.

  A video featuring footage of a County Mayo man being consumed by fits of laughter while trying to record a birthday message for his son, has gone viral.

  Vincent McDonnell was sending the message to his son David, who was celebrating his 40th birthday in Australia.

  His younger son Paul got the video rolling, but the pair could not contain their laughter as they racked up the attempts.

  The video has been viewed more than 1.5m times on Paul's Twitter account.
