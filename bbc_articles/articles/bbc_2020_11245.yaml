  The surge is being driven by fears over the coronavirus, and it could affect the way results play out.

  'The only wasted vote is the one never cast'

  Brandon Swearengin is a law student. He has worked for state government officials and ran earlier this year for a local school board seat in his hometown of Tulsa, Oklahoma. He voted for Donald Trump in 2016 and will vote for the Libertarian Party nominee in the upcoming election. Why does this election matter to you? This election matters to me because political power at all levels of government is up for grabs. I feel that many people overemphasize the presidential election. Though the Executive does have considerable powers, many of those powers, like war powers and regulation-making for example, are only exercised by virtue of congressional enactment. The federal government also has less impact in the day-to-day lives of everyday Americans than state and local government. So while many Americans are paying close attention to the presidential race, I’m more interested in my state legislative/judicial, county commissioner, and city council races as well as in competitive congressional elections around the country. Why do you support your chosen candidate? In the presidential election, I’m voting for the Libertarian Party nominee, Jo Jorgensen. I’m a registered Libertarian voter, and I strongly agree with roughly 80% of her campaign platform. I’m opposed to the de-facto two-party system, I want a smaller federal government in favor of stronger states’ rights, and I refuse to vote for a “lesser of two evils” between the major party nominees. Many Americans will make the fallacious statement that voting for a third party is a “wasted vote,” but my response is that the only wasted vote is the one never cast. Brandon is a member of our US election voter panel. You'll hear more from him, and many of our other voters, throughout the week.
  • We want to hear from you -what questions do you have about the US election?
  • In five words, tell us what's at stake in this election.
