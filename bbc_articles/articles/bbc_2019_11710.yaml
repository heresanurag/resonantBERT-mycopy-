id: bbc_2019_11710
title: Paris police cordon off scene of deadly knife attack - BBC News
date: '2019-10-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-49924299
content: |-
  A knife attack at police headquarters in Paris has left four members of staff dead, French media say.

  The attacker was shot dead by police.

  The area has been cordoned off as investigations continue.
