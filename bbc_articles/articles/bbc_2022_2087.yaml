title: 'As-it-happened: Johnson faces fresh Tory criticism after Starmer mobbed -
  BBC News'
date: '2022-02-08'
section: UK
url: http://www.bbc.co.uk/news/live/uk-60299650
content: |-
  The Labour leader was bundled into a police car after protesters surrounded him outside Parliament.

  That's the end of this morning's live page, looking at reaction after the Labour leader was targeted by protesters near Parliament on Monday.

  Overnight, some Tory MPs urged the PM to apologise for his false claims in Parliament last week regarding Sir Keir Starmer and Jimmy Savile.

  The PM has no intention of apologising, No 10 said this morning.

  Boris Johnson did condemn the harassment of the leader of the opposition , but the No 10 source said it was unreasonable to suggest what happened on Monday "was Boris's fault and not the mob's fault".
