title: Debenhams secures £200m lifeline with lenders - BBC News
date: '2019-04-09'
section: Business
url: http://www.bbc.co.uk/news/business-47745898
content: |-
  The chain completes a £200m deal to stay afloat, and leaves the door open for a bid from Sports Direct.

