title: Farmer Tony Martin never remorseful for shooting, says reporter - BBC News
date: '2025-02-04'
section: England
url: http://www.bbc.co.uk/news/articles/cwy183rrd7xo
content: |-
  A journalist who spent two weeks living with Tony Martin says the farmer believed he was the victim.

  Martin never remorseful for shooting, says reporter

  Tony Martin never expressed remorse for the killing of Fred Barras in 1999, having spoken instead of his paranoia of being burgled and attacked

  A journalist who spent two weeks living with Tony Martin said he never heard any indication the farmer was remorseful about shooting dead a teenage burglar. Martin, who died on Sunday aged 80, was jailed for killing 16-year-old Fred Barras and wounding his accomplice, Brendon Fearon, 29, at his Fenland home in 1999. Aidan McGurran worked for the Daily Mirror, which signed an exclusive interview deal with Martin that resulted in the pair living together for a time once he had left prison. He said: "I never once heard Tony Martin in all the interviews I conducted with him ever, ever express any remorse."

  Aidan McGurran worked for the Daily Mirror and lived with Tony Martin for a time after his release from prison

  The pair had broken into Martin's home at Emneth Hungate on the Norfolk-Cambridgeshire border on 20 August 1999 when the shooting occurred. At his trial, Martin claimed to have been acting in self-defence while prosecutors argued he had anticipated the pair and lay in wait for them. Sentenced in 2000 for murder, an appeal reduced Martin's conviction to manslaughter on grounds of diminished responsibility, after a diagnosis of paranoid personality disorder. He was released in 2003 and his case was one of those that led to the law on self-defence being changed.

