  • None The family shop saying goodbye after 64 years Weeks after his diagnosis, Dave was given the all clear. A consultant at St James' Hospital in Leeds last year told him he would no longer have been alive had he not had been diagnosed when he was. "Charlotte may say I saved her life, which I don’t know about really, but she saved my life as well," Dave says.

  The couple say they wanted to share their story in the hope that anyone who is struggling can know better times are around the corner. "Life does get better," Charlotte, who is now a mum of three, says. "You just have to be here to see it." Charlotte says that it is often too difficult for people who are struggling to "reach out" and ask for help, so suggests people around them "reach in" instead. She continues to receive ongoing support for her mental health. She believes asking someone if they are OK more than once can help them open up. "We owe it to each other to be checking in with people around us," she says. "You don't have to offer life-changing advice or say anything profound. Just sitting down with a cuppa can make all the difference. "Because of what I’ve been through, I had a duty to talk about it and I’m hoping it’s going to be a conversation starter."
