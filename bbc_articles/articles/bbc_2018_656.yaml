id: bbc_2018_656
title: 'NHS ambulance A&E delays: Patient''s hospital wait filmed - BBC News'
date: '2018-01-05'
section: General
url: http://www.bbc.co.uk/news/health-42570660
content: |-
  Two relatives tell us about their experiences both inside and outside A&E departments this winter.

  Leah Butler Smith filmed a queue of ambulances outside a hospital. She was with her mother who she thought was having a stroke.

  BBC analysis shows that more than one in eight patients rushed to hospital in an ambulance this winter has faced a delay of more than 30 minutes on arrival.

  Correction 14 January 2018: This article has been amended after the Mid Essex Services NHS Trust provided a statement about the care given to Leah Butler-Smith's mother, pointing out when she was seen by an emergency department nurse and consultant. References to her having a stroke have been removed.
