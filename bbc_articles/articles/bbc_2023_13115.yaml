content: |-
  Lauren Hemp was your player of the match as England reached the World Cup final, where they will face Spain.

  Last updated on .From the section Women's World Cup

  Lauren Hemp was your player of the match as England beat co-hosts Australia to reach their first World Cup final.

  Manchester City forward Hemp was once again the top choice for BBC Sport readers after you also named her player of the match in England's quarter-final win over Colombia.

  Hemp secured a rating of 8.31 after scoring the goal to restore England's lead once Sam Kerr's wonder strike had cancelled out Ella Toone's sweetly struck opener.

  She then set up Alessia Russo with a stunning pass for the Lionesses' third which sealed their spot in Sunday's final.
  • None Relive England's semi-final win over Australia at the Women's World Cup

  Goal scorers Russo and Toone were also highly rated, earning scores of 7.54 and 7.34 respectively, while defender Lucy Bronze also stood out with a rating of 7.43.

  Chelsea forward Kerr, who scored but also missed two good chances, was rated highest for Australia with a score of 5.73.

