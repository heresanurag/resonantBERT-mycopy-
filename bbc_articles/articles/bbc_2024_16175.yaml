  Bowel cancer is the second biggest cancer killer in Northern Ireland and about 460 people in Northern Ireland die each year from the disease. BBC News NI previously reported on how the local screening programme lags behind the rest of the UK as people are waiting longer to be tested. Aidan’s family say they hope his book can continue to raise awareness of symptoms.

  Aidan's daughter says she will finish the book when she's ready

  For now though, his daughter Éirinn is still taking things one page at a time. She said: “I think it’s amazing Dad has left this legacy and it’s helping a lot of people, but I still find it quite tough to read. "I’ve only made it to page four. “Someday I will read it and I know I’ll love it, but at the minute hearing how much others get from it is enough, I’ll take it a page at a time.”
