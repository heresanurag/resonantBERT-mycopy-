title: Wolves agree five-year deal with Braga for Portuguese winger Rodrigo Gomes
  - BBC Sport
date: '2024-06-10'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c4nn0r3g681o
content: |-
  Wolves agree a five-year deal with Braga to sign highly-rated Portuguese under-21 winger Rodrigo Gomes.

  Wolves have agreed a deal with Braga to sign Portugal Under-21 winger Rodrigo Gomes for 15m euros (£12.7m).

  The 20-year-old is due to have a medical later this week before signing a five-year contract.

  Gomes spent last season on loan at Estoril, scoring seven goals in 30 league appearances.

  Atletico Madrid had been linked with Gomes but Wolves have moved quickly to secure his signature.
