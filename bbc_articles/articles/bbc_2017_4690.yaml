  Nine months, 380 games and more than 1,000 goals - how well do you remember the 2016-17 Premier League season?

  Premier League quiz: How well do you remember the 2016-17 season? Last updated on .From the section Football

  After nine months, 380 games and more than 1,000 goals, another Premier League season grinds to a halt on Sunday. Last August feels like a long time ago and a lot has happened since - how well do you remember the past 39 weeks?
