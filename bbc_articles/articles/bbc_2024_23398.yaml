title: Joseph Eubank found not guilty of raping teen on Brighton beach - BBC News
date: '2024-09-27'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c99v1kyldg9o
content: |-
  A jury finds Joseph Eubank, 27, not guilty of raping a 16-year-old girl on Brighton beach.

  Joseph Eubank had denied raping a teenage girl who was out celebrating a friend’s birthday on 16 July 2022

  A 27-year-old man accused of raping a teenage girl on Brighton beach has been found not guilty. Joseph Eubank had denied raping the 16-year-old when she was out celebrating a friend’s birthday on 16 July 2022. Prosecutor Beverly Cripps previously told Lewes Crown Court the girl was so drunk she "couldn't see straight". Mr Eubank, of Hove, has been found not guilty of two counts of rape.

  Speaking to Mr Eubank, who is a son of boxing legend Chris Eubank senior, Judge Christine Laing KC said: “You need to think about your behaviour. “You need the reflect on what you did that night. It was not decent behaviour in any way shape or form.” Outside the court room, Mr Eubank’s mother cried as she hugged her son. His solicitor Shahid Choudhary said it had been an “extremely difficult time for him and his family”. “Joseph's life has been at a standstill since he was arrested and he can now move on to rebuild his future,” he said.

  Giving evidence on Wednesday, Mr Eubank said he had initially approached the teenager because "she was attractive" and that their encounter was "all very fluent and all very consensual". "The body language was very clear," Mr Eubank told the court. "There was smirks, smiles, intense looks that we were sharing. Showing we were both attracted to each other." Mr Eubank said he had not been drinking the night of the alleged attack. He also told the court he believed she was "around uni age" and that while she did stumble "one time" as they walked to the beach "it was not a drunken stumble". The teenager said he had initially been friendly but became more aggressive "moving her quickly down the beach". She said she "didn't realise" he had pulled her down to the bottom of the groynes near the sea at about 23:30 BST, where he forced her down, the jury was told.
