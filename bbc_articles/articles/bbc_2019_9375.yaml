title: 'Maidstone stabbing: Man killed and four others injured - BBC News'
date: '2019-08-25'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-49464946
content: |-
  Four others were injured and four men have been arrested on suspicion of murder, police say.

  A man has been stabbed to death and four others have been injured in a town centre.

  Police were called to a disturbance involving a number of people in Maidstone High Street at 03:00 BST.

  A 21-year-old London man who suffered injuries from stab wounds was declared dead at the scene, police said.

  Four men, also from London, two aged 21 and the others aged 19 and 23, have been arrested on suspicion of murder and remain in custody.

  A police forensics van was at the scene on Sunday

  Three of the four injured men were taken to a London hospital, with the fourth taken to a local hospital.

  Supt Simon Thomson of Kent Police said specialist officers were supporting the victim's relatives and said the force's thoughts were with the family of the deceased.

  He told BBC South East it was a "large-scale, complex" case and crime scene investigators were carrying out a thorough investigation of the scene.

  The High Street remains closed and anyone with any information has been asked to contact Kent Police.

