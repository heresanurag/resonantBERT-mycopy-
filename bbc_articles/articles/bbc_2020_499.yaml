title: 'Hove flats fall: Murder arrest as woman plunges to her death - BBC News'
date: '2020-01-18'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-51161528
content: |-
  A 52-year-old man is in custody after a woman fell seven floors to her death in Hove.

  Officers have been at the flats since 05:55 GMT

  A man has been arrested on suspicion of murdering a woman who fell to her death from a block of flats.

  The woman fell from the seventh floor of Clarendon House in Clarendon Road, Hove, at about 05:55 GMT.

  A 52-year-old man, said by police to have known the victim, was arrested.

  The Independent Office for Police Conduct (IOPC) has been notified, as Sussex Police had had recent contact with the man and woman.

  The force has notified the Independent Office for Police Conduct

  The victim was pronounced dead at the scene

  Police said the suspect and victim were known to each other

