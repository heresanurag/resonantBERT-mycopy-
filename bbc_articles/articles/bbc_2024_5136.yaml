title: North Korea footage shows Kim Jong Un overseeing rocket launcher drills - BBC
  News
date: '2024-03-20'
section: General
url: http://www.bbc.co.uk/news/world-asia-68611316
content: |-
  Video shows the North Korean leader speaking to military officials as rockets fire into the sky.

  North Korea's state broadcaster has aired footage of the country's leader, Kim Jong Un, overseeing a missile test.

  Mr Kim was animated as he spoke to a military official in a field next to several large rocket launchers.

  Korean Central Television said the drill aimed to test the "real war capabilities" of the launchers and their operators.

  The footage was aired a day after South Korea and Japan said North Korea had launched several short-range ballistic missiles into the sea.
