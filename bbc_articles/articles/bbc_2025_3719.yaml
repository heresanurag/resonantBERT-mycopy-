title: 'Runcorn and Helsby by-election: Labour picks candidate to replace Amesbury
  - BBC News'
date: '2025-03-14'
section: England
url: http://www.bbc.co.uk/news/articles/cdrxe4x74gmo
content: |-
  Cheshire councillor Karen Shore hopes to retain the seat which Labour won at the general election.

  Mike Amesbury won the new seat of Runcorn and Helsby for Labour in the 2024 general election

  Labour has announced that a Cheshire councillor will be its candidate in the forthcoming Runcorn and Helsby by-election. It follows the recent decision by Mike Amesbury to quit the House of Commons after he was convicted and given a suspended prison sentence for repeatedly punching a constituent in the street. Amesbury has been sitting as an independent MP since he was suspended by Labour bosses following the assault in Frodsham, Cheshire, in the early hours of 26 October. Deputy leader of Cheshire West and Chester Karen Shore will hope to retain the seat which Amesbury won for Labour at last year's general election with a majority of more than 14,000.

  Video footage showed Amesbury, 55, punching Paul Fellows in the head and knocking the 45-year-old to the ground, before hitting him at least five more times. The former Labour MP was initially handed an immediate 10-week prison term before it was later suspended on appeal. Any custodial sentence for an MP means they are vulnerable to being ousted from Parliament through a process in which they can be recalled by constituents. Amesbury told the BBC on Monday that he would "step aside at the earliest opportunity".

  Karen Shore is the deputy leader of Cheshire West and Chester Council

  The date of the Runcorn and Helsby by-election - the first under Sir Keir Starmer's Labour government - has not yet been set. "Karen Shore will be a champion for the people of Runcorn and Helsby," said Starmer. "She's local and her experience as a teacher and serving the community as a councillor will give people a strong voice in the House of Commons. "That's what people in Runcorn and Helsby deserve in their Member of Parliament. "I look forward to her working hard with ministers if she is elected to deliver the local change that the area and our country deserve." The other major parties have not yet announced their candidates for the Runcorn and Helsby by-election.

