content: |-
  Emily Jones died shortly after she was stabbed in a park where she was playing in front of her father.

  Seven-year-old Emily Jones was stabbed as she played in Queen's Park, Bolton

  A woman has appeared in court charged with the murder of a seven-year-old girl who was stabbed in a park.

  Emily Jones was stabbed in front of her dad as she played in Queen's Park, Bolton on 22 March.

  Eltiona Skana, formerly of Turnstone Road, Bolton, appeared at Manchester Magistrates' Court by video link.

  The 30-year-old later appeared at the city's crown court and was remanded to custody until 15 September.

  She is being detained under the Mental Health Act.

  Ms Skana is also charged with possession of a blade - a craft knife - in a public place on the same date.
