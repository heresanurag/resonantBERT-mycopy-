id: bbc_2024_5786
title: Learn how the BBC is working to strengthen trust and transparency in online
  news - BBC News
date: '2024-03-25'
section: BBC News Services
url: http://www.bbc.co.uk/news/help-41670342
content: |-
  Identifying credible journalism on the internet can be a confusing experience - this is why we are making greater efforts to explain what type of information you are reading or watching on our site.

  If an article has been edited since publication to correct a material inaccuracy, a note will be added at the end of the text to signal to the reader there has been an amendment or correction with the date of that change. If there is a small error in a story that does not alter its editorial meaning (eg name misspelling), the correction will be made without an additional note.
