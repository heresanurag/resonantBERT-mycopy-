title: Jeffrey Barry admits killing neighbour in 999 call - BBC News
date: '2018-06-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-41649445
content: |-
  Paranoid schizophrenic Jeffrey Barry called 999 to report he had killed Kamil Ahmad.

  This is the moment Jeffrey Barry called 999 to report that he had killed Kamil Ahmad.

  The attack happened at Mr Ahmad's flat on Wells Road in Bristol in July 2016.
