  Police find a firearm and arrest an 18-year-old on suspicion of murder.

  Murder arrest after three die in tower block

  A man was arrested and a firearm was recovered after three people died in Marsh Farm

  An 18-year-old man has been arrested on suspicion of murder after three people died in a tower block. Bedfordshire Police responded to concerns about the welfare of some residents and discovered three injured people in a flat in the Marsh Farm area of Luton at about 05:30 BST. All three people were pronounced dead at the 15-storey Leabank building and police found a weapon following searches. Det Supt Rob Hall said: "As part of our investigation, we have recovered a firearm from Bramingham Road and inquiries will be ongoing in relation this."

  This video can not be played To play this video you need to enable JavaScript in your browser. Police began triple murder inquiry after being called out at about 05:30 BST

  Armed police and investigators wearing white forensic gear were spotted at the tower block on Wauluds Bank Drive, and a nearby green open space. The 18-year-old was arrested in the morning on Bramingham Road, which has a junction with Wauluds Bank Drive.
  • None Live updates: How the story unfolded on Friday Det Supt Hall added: “We are still in the early stages of this investigation and formal identification of the victims has yet to take place. However we do believe that all of those involved are known to each other and we are not currently looking for anyone else in connection to this incident. "We’ll have officers working around the clock both at the scene and in the community over the weekend and I would encourage anyone with concerns to speak to their local community officers.” He added there was not believed to be any threat to the wider community.

