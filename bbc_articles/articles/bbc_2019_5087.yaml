title: 'Brexit: Is there anything new in Theresa May''s ''new deal''? - BBC News'
date: '2019-05-21'
section: UK
url: http://www.bbc.co.uk/news/uk-48359350
content: |-
  The PM wants MPs them to vote on what she says is a "new" Brexit deal - but what exactly has changed?

  Theresa May has urged MPs to back what she has described as a "new" Brexit deal - but what exactly is different in this updated withdrawal agreement?

  The prime minister's "new Brexit deal" isn't all that new.

  For a start, the withdrawal agreement itself - which includes the backstop plan for the Irish border - remains exactly the same.

  That was always going to be the case. The EU has insisted that there will be no further negotiation on the text.

  Instead, the government will seek changes to the accompanying political declaration, which focuses on the future relationship after Brexit.

  But, as we've said many times before, it is not a legally binding document.

  What Mrs May has offered for the first time is the prospect of a vote on holding a second referendum, and a vote on a temporary customs union.

  But she says that will only be the case if MPs are willing to approve the withdrawal agreement bill in the House of Commons in the first week of June.

  There are also promises on workers' rights and environmental protection - measures designed to appeal to Labour MPs. But similar promises, albeit in different form, have been made before.

  As for Northern Ireland, the PM has said that the government would be under a legal obligation "to seek to conclude alternative arrangements" to the backstop by the end of 2020.

  But note the word "seek" - it is an aspiration not a guarantee, and finding alternative arrangements, through the use of technology or other means, has so far proved very challenging.

