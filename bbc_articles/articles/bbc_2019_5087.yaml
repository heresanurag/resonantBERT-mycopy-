  Mrs May also spoke of a commitment, should the backstop have to come into force, to ensure that Great Britain will stay aligned with Northern Ireland to prevent new checks at the border.

  Again, this is something that has been said before.

  Nevertheless, the government is portraying this speech as a genuine effort to find compromise.

  Others see it as a last roll of the dice.

  The trouble is that Brexit has become a binary issue, and almost no-one in politics - whether they voted to leave or remain - seems to want to give up on their vision of how all this should be resolved.

  That's why much of the initial reaction to the PM's speech from MPs, from all sides of the House of Commons, including her own backbenches, has ranged from lukewarm to openly hostile.

  She will continue to warn that anyone voting against her latest plan risks losing Brexit altogether.

  But the biggest problem for Mrs May is that there doesn't appear to be a majority in the Commons for any Brexit option.

  That has been clear for many months now.

  And nothing in this speech is likely to move the goalposts.
