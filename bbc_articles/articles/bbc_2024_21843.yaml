  Two men have been charged after the artwork was stolen from a central London gallery, the Met Police has said.

  Two men have been charged after a Banksy artwork was stolen from a central London art gallery, the Met Police has said.

  An investigation was launched after a burglary at Grove Gallery on New Cavendish Street at about 23:00 BST on Sunday. The work, Girl with Balloon, was the only item stolen and has since been recovered.

  The BBC's Nicky Schiller went to the gallery, and has walked us through what police say happened on the night.
