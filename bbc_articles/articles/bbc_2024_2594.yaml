content: |-
  Leaks, uneven floors, and exposed electrics are some of problems inside this hospital.

  St Mary's in Paddington has the largest backlog in England for the amount of high-risk repairs that need to be done.

  The data was gathered by the BBC to find out the condition of hospital buildings across the country.

  A "high-risk repair" means repairs need to be urgently done to prevent "catastrophic failure or major disruption to clinical services" according to NHS Providers.

  BBC London's Karl Mercer explored part of St Mary's in Paddington and the route some patients have to take when they are admitted.
