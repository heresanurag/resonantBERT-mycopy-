title: UK antisemitic hate incidents surge in 2024, says charity - BBC News
date: '2024-08-08'
section: UK
url: http://www.bbc.co.uk/news/articles/cx285v8djejo
content: |-
  The Jewish securities charity CST recorded 1,978 anti-Jewish hate incidents from January to June 2024.

  Reports of antisemitic incidents in the UK in the first half of this year have reached another record high, according to figures from a Jewish security charity. From January to June 2024, the Community Security Trust (CST) recorded reports of 1,978 anti-Jewish hate incidents, up from 964 in the first half of 2023. The CST says the record high total in the first half of 2024 is a continuation of the impact of antisemitic reactions to the 7 October attack in Israel and the ongoing war. The report relies on figures from incidents that are self-reported. Some 1,037 of the recorded antisemitic incidents were in Greater London, including 411 in Barnet - the local authority home to the biggest Jewish community in the UK. The CST said a technical problem in March onwards disrupted the flow of reports received from the Metropolitan Police, meaning the actual figure for Greater London would be even higher. The region with the second highest number of recorded antisemitic incidents was Greater Manchester with 268, followed by West Yorkshire with 115.

  Across the UK, the CST recorded 121 incidents of assault in the first six months of the year, an increase of 41% in the same period last year. Cases of damage and desecration to Jewish property rose by 246% from 24 in the first half of 2023 to 83 between January and June 2024. There were 142 incidents of threats in the six months from January to June. This is a rise of 158% from 55 in the same period a year ago. There were 162 cases of antisemitism affecting people and property in education. This is an increase of 119% from the 74 such incidents reported from January to June 2023.

  A defaced menorah in London was one of the incidents documented in the report

  The starkest figure is the rise in anti-Jewish hate involving higher education showing a 465% rise. In the first six months of the year there were 96 antisemitic incidents in which victims were or offenders were students or academics, or which involved student unions or societies. The CST says it is a record half-year spike as there were 17 instances of university-related antisemitism in the first six months of 2023. Mark Gardner, chief executive of the CST, says the figures are unprecedented. “The CST will continue its steadfast protection of our British Jewish communities, driven by our values of Community, Security and Trust," he added. "CST applauds our community’s ever-increasing determination to stand strong and proud, despite the hatred.”

  Home Secretary Yevette Cooper says there is no place in Britain for antisemitism

  Home Secretary Yvette Cooper described the figures as "truly appalling". She added: "There is no place in Britain for this vile hatred and we are absolutely clear that those who push this poison - on the streets or online - must always face the full force of the law." Conservative shadow home secretary James Cleverly said: "We must root out antisemitism wherever it occurs. "It is up to all of us to stop and reverse the increase in this vile hatred we have seen in the UK since the Hamas terror attack on 7 October. "It can never be right British Jews could be concerned for their safety on the streets of modern Britain." In November, then Chancellor Jeremy Hunt promised £7m over the next three years to charities tackling antisemitism in the UK.
