  The talent which has brought him here has long been evident. James Hurrell, Littler's England darts captain when he was 14, believes it is his confidence which sets him apart. "He's just ridiculous, really," Hurrell told BBC Radio 5 Live. "I think it's the confidence. His idol is Phil Taylor and he is just carrying on from [him]. He bounces off the pressure - I think he gets better [as it increases]." Should Littler triumph against Humphries, he will become the youngest winner by quite some margin. Michael van Gerwen was aged 24 years and nine months when he won his first title to set the record in 2014. Darts referee Russ Bray, for whom the final represents the last match of his career in this tournament, believes three-time world champion Van Gerwen is the only player comparable to Littler at his age. "At 17, Michael was unbelievable, the same as Luke, hitting nine darters in TV tournaments," Bray told BBC Radio 5 Live. "For Luke to come through the way he has done is incredible. He's taken out some really big names and he seems so, so cool. "He's certainly an entertainer, which is what you want. You want style in the game. He's a raw talent and when you see how he performs up there, with no fear at his age, it's a breath of fresh air."

  Littler's run has captured the imagination beyond anything darts has seen before. The peak audience for his most recent win was an increase of 165% on last year's semi-final figures - and 40% higher than Sky's previous overall record (1.65m) for the final in January 2015. Tuesday's peak is, for comparison, in line with Sky's live coverage of Premier League football. Premier League footballers are among those engrossed in Littler's story, with the teenager closing in on 500,000 Instagram followers and 100,000 on X. "Obviously I've got a lot of followers now, I've had a message off Luke Shaw of Manchester United, Rio Ferdinand and I had a message off Gary Neville and Jonny Evans before my game against Barney, so it's just crazy," said Littler. "People I've looked up to, and especially my club Manchester United, are wishing me luck."

