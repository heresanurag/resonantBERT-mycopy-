  Ticket trading website Viagogo has reported a "surge in demand" for final seats, with the average price rising to £238 per ticket, £73 higher than for last year's showpiece. Meanwhile, a theme park has offered Runcorn-born Littler "the keys to the resort" - should he triumph against Humphries. "It has definitely had a good effect," said Littler's friend Eleanor Cairns, Girls World Champion in 2022, who spoke to him shortly before his semi-final. "In the darts shop alone we have had loads of kids coming in saying 'I want to be like Luke Littler'. It is incredible to see the young people can look up to him," she added. "Everyone is saying 'he is only 16' but I don't think he realises himself that he is only 16. It is incredible to see what he has achieved, the amount of money, everything that comes with it and the publicity. "Like he has said, he only wanted to win one game so he didn't realise he would get this far. There is no pressure on him. He has already shown what he can do."

  Standing in Littler's way of a historic success is Humphries, also through to his first final and now world number one after an impressive 6-0 semi-final win over Scott Williams. "It feels amazing, I would never have imagined myself to be world number one and I did it in style, I was really pleased with the performance," Humphries said. "I have always said world number one can last a number of months, world champion is forever." Humphries, a three-time beaten quarter-finalist, averaged 108.74 in a victory over Williams, which is in the top 10 in the history of the tournament. "Humphries has won the last three PDC TV tournaments and he's only 28, we lose the perspective of age here," said referee Bray. "Littler is a kid but Humphries is only 28 years of age. He's very much a young man in the sport. His talent is also amazing. "He's gone to world number one now by getting to the final and I honestly think he could be a party spoiler."

