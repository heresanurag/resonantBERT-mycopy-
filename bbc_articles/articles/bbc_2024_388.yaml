title: 'Luke Littler: Teenager in PDC World Darts Championship final against Luke
  Humphries - BBC Sport'
date: '2024-01-03'
section: Darts
url: http://www.bbc.co.uk/sport/darts/67870593
content: |-
  Having set out to win one game on his PDC World Darts Championship debut, 16-year-old Luke Littler bids for a historic title triumph against Luke Humphries on Wednesday.

  Luke Littler has already earned £200,000 for his run to the final

  You can follow live coverage of the PDC World Darts Championship final in a text commentary on the BBC Sport website from 19:30 GMT on Wednesday, 3 January. Luke Littler began his PDC World Darts Championship debut hoping simply "to win one game" but now the 16-year-old sensation will face Luke Humphries on Wednesday evening in what is anticipated to be the most-watched final in the tournament's 31-year history. In polishing off his latest remarkable victory at Alexandra Palace - this time stunning former champion Rob Cross - Littler became the youngest person to reach the title decider. And his meteoric rise has transcended the sport to an extent that his semi-final match set a Sky tournament viewing record, with a peak audience of 2.32 million, comfortably surpassing the 2015 final (1.65 million). The record for a darts final is the 8.3 million who tuned in to watch qualifier Keith Deller win the 1983 title by beating favourite Eric Bristow in the now defunct BDO World Championship on the BBC. Littler, who began playing darts on a magnetic board when he was just 18 months old, entered this tournament ranked 164th in the world. Since then he has made national and international headlines, defeated former world champions and sent crowds into raptures.

  Should he achieve a success which seemed unthinkable at the start of his opening match only two weeks ago, he will rise into the world's top 10 - and pocket a cool £500,000. Marketing experts say his earnings from potential sponsorship deals could be "huge". But regardless of the outcome against Humphries - the 28-year-old charging to the final on an 18-game unbeaten run - Littler's life will never be the same after an extraordinary fortnight. "It's just unbelievable," Littler said. "Unbelievable to even think I'm in the final. I wanted to just win a game and come back after Christmas and I'm still standing. "In this World Championship I've got nothing to lose. It's just a free hit for myself. "There's no pressure. It's my first time being here and I'm still here, so I just take it in my stride and take it game by game."

  It is that fearless approach which has allowed Littler to defy the odds. Demonstrating ice-cool composure belying his age and experience on one of his sport's biggest stages, he completed victory over Cross with minimal fuss as he hit a concluding double 10 with awe-inspiring disregard for the magnitude of the occasion. It was the fourth match of the tournament in which Littler, with only four senior matches at PDC premier events prior to the tournament, has averaged more than 100. His level did not waiver as the match reached its crescendo either, taking three consecutive sets to seal victory in style. His secret? "Just got to stay focused, just got to be Luke Littler, and just relax," he said after his semi-final. "I stick to the routine that I've always been doing and whatever Luke Littler turns up, turns up. So far it's been good in this tournament." That is a considerable understatement and although Littler, not 17 until 21 January, continues to perform as if this were all completely normal, it is not. Overtaking Kirk Shepherd - who was 21 years and 88 days old in 2008 - as the youngest World Championship finalist, he has overcome four top-30 ranked players along the way, including his childhood idol and five-time champion Raymond van Barneveld.

