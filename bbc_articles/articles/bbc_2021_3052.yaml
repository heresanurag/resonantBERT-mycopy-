title: Clive Myrie to replace John Humphrys as Mastermind host - BBC News
date: '2021-03-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/newsbeat-56484185
content: |-
  The BBC journalist will take over from John Humphrys on the long-running quiz show.

  Clive Myrie is known for presenting the BBC's News at Six and Ten

  BBC journalist Clive Myrie has been named the new host of quiz show Mastermind, replacing John Humphrys, who has stepped down after 18 years.

  Myrie will be the fifth host of the BBC Two quiz, which marks its 50th anniversary next year.

  "They are big shoes to fill but all I can do is bring a little bit of my own personality to what is a grounded format," he said.

  He will continue to present programmes like the BBC's News at Six and Ten.

  "That side of me is still very much there, but it's good to be able to be liberated every now and again when I do Mastermind," he added.

  Myrie recently won two Royal Television Society journalism awards - for network presenter of the year and television journalist of the year.

  As well as being a newsreader, he is known for his work as a foreign correspondent and recently fronted a series of acclaimed reports from hospitals dealing with the Covid pandemic.

  This video can not be played To play this video you need to enable JavaScript in your browser. Clive Myrie spoke to Martin Freeborn, whose wife, Helen, died from Covid at the Royal London Hospital

  On Monday, he said he thought producers had offered him the Mastermind job after seeing his lighter side on the BBC News Channel's late-night newspaper round-up.

  "I can't imagine they would have got me to present Mastermind if it was just seeing me in some refugee camp in Yemen," he said. "It's that other side of my personality that I think they noticed."

  In a statement, Kate Phillips, the BBC's director of entertainment, said: "Clive will be a superb host, witty, wise and with a wicked sense of humour, he's a consummate interrogator who also understands the fear involved when facing a barrage of questions in the spotlight."

  Myrie said he might change "little things" on his new programme, but added: "The fundamental format, the basic structure - the chair, the spotlight on the individual who's dealing with this - is going to stay the same.

  "You can have a bit more fun in the celebrity series, for instance. That's maybe where there's a little bit more latitude."

  He will begin filming in July, with the show set to return to screens later in the year. Humphrys' last episodes will be broadcast next month.

