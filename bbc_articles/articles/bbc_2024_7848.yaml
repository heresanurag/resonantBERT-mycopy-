title: 'Watch: Olympic flame lit in Greece''s ancient Olympia - BBC News'
date: '2024-04-16'
section: World
url: http://www.bbc.co.uk/news/live/world-68818723
content: |-
  The lighting of the flame is the start of an international torch relay, which ends at the Paris 2024 Games.

  The torch will first travel 3,000 miles through Greece, before crossing the Mediterranean to France in May on the three-masted ship Belem.

  It will then travel though France and its overseas territories before arriving in Paris for the start of the games in July.

