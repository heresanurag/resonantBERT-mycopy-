title: Murdered Southend MP Sir David Amess' daughter wants full inquest - BBC News
date: '2024-10-27'
section: Essex
url: http://www.bbc.co.uk/news/articles/cp877w63x20o
content: |-
  Katherine Amess says there is "so much" society does not know about the death of her father.

  The daughter of murdered Conservative MP Sir David Amess has called for a full inquest into his death. Actress Katherine Amess, 39, said in an interview with The Sunday Times there was "so much" society did not know about what happened. Sir David, 69, MP for Southend West, was stabbed to death while holding a surgery in Leigh-on-Sea, Essex, on 15 October 2021. Ali Harbi Ali was given a whole-life prison sentence, after being convicted of murdering Sir David at a trial in April 2022.

  Coroner Lincoln Brookes opened an inquest into Sir David's death, at a hearing in Chelmsford on 27 October 2021. But a full inquest hearing has not been staged. “We live in a democracy where elected officials should be safe," Ms Amess said. "We have never had a full public examination into the events leading up to his death. "My hope was, through this full public inquest, everybody would be given the knowledge of how this happened, and (that would) prevent it happening again. "And right now it feels like we are waiting for the next one to happen.” She added: "... there is still so much that we as a family and as a society do not know about what happened. It’s been failing upon failing.”

  An artist's sketch of Ali Harbi Ali, who was convicted of murdering Sir David, at a court hearing

  Ms Amess, who lives in California, has begun legal action against police and the Home Office. High Court papers show she filed a personal injury claim against the two authorities in December. Her solicitor told the BBC in January Ms Amess was "horrified" by her father's murder and wanted lessons to be learned. Essex Police and the Home Office said they were aware of the court action.

  Earlier this month, a service of remembrance was held at St Peter's Catholic Church, close to where Sir David was killed. Father Jeff Woolnough said it was "important to keep his memory alive".

