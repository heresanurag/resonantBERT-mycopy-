  The shape is thought to be the result of leftover fuel released into space as the Falcon 9 rocket returned to Earth.

  Spiral in the sky likely to be from SpaceX launch

  This video can not be played To play this video you need to enable JavaScript in your browser. Space X spiral in the night sky on Monday

  A large glowing spiral visible in the night sky on Monday is believed to have been caused by a SpaceX rocket launch in the US. The Met Office said the shape was likely produced by a frozen plume of fuel from the rocket's exhaust, which reflected the sunlight and appeared to spin in the atmosphere. The cloud-like shape was visible for several minutes above the UK and elsewhere in Europe before fading. The Falcon 9 rocket from Elon Musk's space company lifted off at around 13:50 local time in Florida (17:50 GMT) on a classified US government mission.
