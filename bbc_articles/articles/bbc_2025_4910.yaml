  • None The swirl was also spotted in Clee Hill, Shropshire Slide 1 of 3 , Bulwick, Northamptonshire , This image was taken in Bulwick, Northamptonshire

  The Falcon 9 is a reusable rocket. After launching, the first part takes the payload it is carrying, such as a satellite into space. While this part of the rocket then turns back around towards Earth, the second stage of the rocket continues to take the satellite to the correct orbit. Once released, the second stage will eject any leftover fuel, which freezes instantly due to the altitude and forms into a spiral pattern because of the rocket's movement as it falls back to Earth. Light is then reflected off the frozen fuel, making it visible on Earth.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: What caused the unusual display in the sky above the UK?

  Astronomer Allan Trow said it had appeared above Wales's Bannau Brycheiniog national park at around 20:00 GMT. He said he had seen the phenomenon before around four years ago. "But these are pretty rare," he told the BBC, and agreed the rocket was its likely source. Stockport-based Sonia was already out with her telescope when she saw "a swirling galaxy that was moving across the sky". People living almost 200 miles (321km) away also spotted the unusual glow. Steven Hall was taking his bins out from his home in rural Suffolk when he saw what looked like "a huge Catherine wheel which appeared to have its own atmosphere around it". He added: "It did pass my mind, is this an unexplained, unidentified flying object?" SpaceX said on X the launch was carried out on behalf of the US government National Reconnaissance Office mission. The Kennedy Space Center also said on X the launch was a classified mission for that office.
