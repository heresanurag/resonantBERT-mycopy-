title: 'Christchurch shootings: The people killed as they prayed - BBC News'
date: '2019-03-24'
section: Asia
url: https://www.bbc.co.uk/news/world-asia-47593693
content: |-
  The lives and stories of those killed in the two Christchurch mosque attacks.

  The 70-year-old father of four from Somalia was killed at the Al Noor mosque.

  His son Said arrived at the mosque as the attack was underway, saw the gunman in the street and drove off.

  "This is devastating. My father survived through civil war. I never thought this kind of stuff would happen to him in New Zealand," he told the Washington Post.
