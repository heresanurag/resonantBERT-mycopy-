title: 'As it happened: Dominic Raab grilled by MPs on Afghan withdrawal - BBC News'
date: '2021-09-01'
section: UK
url: http://www.bbc.co.uk/news/live/uk-politics-58411100
content: |-
  The foreign secretary says intelligence suggested Kabul would not fall to the Taliban this year.

  'You can browbeat me all you like....'

  Dominic Raab clashes with Labour MP Neil Coyle over the issue of the numbers of people left behind in Kabul. Mr Coyle says the evacuation of some UK embassy guards was held up by paperwork. Dominic Raab says buses weren't given permission to enter the airport - a reflection of conditions on the ground. Mr Coyle accuses him of failing to answer the question and they talk over each other. "You can browbeat me all you like...." says Mr Raab. Mr Coyle interrupts to tell him: "You're not answering the question so let's move on." He is asked about the personal details of UK-linked Afghans which were found by a Times journalist in the British embassy in Kabul. Mr Raab says three families were evacuated within 24 hours and were now in the UK. Asked if he owes them an apology, he says the UK owes them every effort to get those out that we did.
