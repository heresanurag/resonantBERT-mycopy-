title: 'Coronavirus: Vaccine volunteers begin to get immunised - BBC News'
date: '2020-06-24'
section: General
url: http://www.bbc.co.uk/news/health-53173145
content: |-
  Kathy is one of about 300 people who will be immunised to help find a vaccine for Covid-19.

  Kathy is one of the first volunteers taking part in a trial to find a vaccine for coronavirus.

  About 300 people will be immunised in the coming weeks in the Imperial College London trial.
