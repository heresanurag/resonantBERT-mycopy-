title: 'North Yorkshire mudslide: Leah Harrison, 10, died on school trip - BBC News'
date: '2024-05-24'
section: York & North Yorkshire
url: http://www.bbc.co.uk/news/uk-england-sussex-69053280
content: |-
  Leah Harrison was taking part in a "forest walk" during a residential trip when she was killed.

  Leah Harrison's death has been described as a "heartbreaking tragedy"

  The family of a 10-year-old who died in a mudslide in North Yorkshire have described her as a "happy, bubbly, go-lucky little girl". Leah Harrison, a Year 6 pupil at Mount Pleasant Primary School in Darlington, was killed on Wednesday afternoon during a school residential trip. She had been taking part in an outdoor education forest walk at Carlton Adventure in Carlton-in-Cleveland. The site operators, Hartlepool Council, said activities had been suspended. An investigation is being carried out by North Yorkshire Police and the Health and Safety Executive to establish what happened.

  Tributes have been left at Leah's school

  In a statement, the family said: "Leah Harrison, the happy, bubbly, go-lucky little girl. "The beautiful smile, the giddy laugh, the silly jokes. "You will never ever be forgotten baby girl. You will achieve your dream and become a player for the Lionesses. "Spread those wings. May you rest in paradise." Leah is believed to have been one of a number of pupils who were on the school residential trip, following the conclusion of SAT tests the previous week. Denise McGuckin, managing director of Hartlepool Borough Council, said: "The tragic incident occurred during one of the centre's instructor-led outdoor education forest walks near to Carlton-in-Cleveland. "We are utterly devastated and heartbroken and our thoughts are with Leah's family and friends and all those affected. "We are working closely with our partner agencies to carry out a full investigation and we are temporarily suspending all outdoor activities and residential breaks managed by the council. "Whilst the investigation is being carried out it would be inappropriate for us to comment further." A Met Office yellow weather warning was in place for the area on Wednesday as heavy rain fell.

  Heavy rain fell in the area around Carlton-in-Cleveland on Wednesday

  Nick Blackburn, chief executive of the trust which runs Leah's school, also paid tribute, describing her as "much-loved". In a statement, he said it was a "heart-breaking tragedy" and full details were "still emerging".

  Mr Blackburn said: "Leah was a much-loved part of our school and our thoughts and prayers are with her family, friends, and the school staff. "Counselling is being arranged within the school for pupils and staff. "We are all in a state of shock and we would ask that the privacy of the family and the school community is respected while we try to come to terms with what has happened." He added that it had been very hard to see children return to school upset but that the school was "committed to helping the community through this". The Cleveland Mountain Rescue Team (MRT) confirmed it despatched 30 volunteers to the incident, which occurred on Carlton Bank.

  Mountain rescue teams were called to the incident on Wednesday

  Gary Clarke, from Cleveland MRT, told the BBC he was very proud of his "resilient" team. He said they were used to dealing with minor injuries but this incident had been a "very tough one". "This one in particular, the circumstances of it and the young age of Leah, will stick in our minds for a very long time," he said. "It will be difficult to come to terms with but, at the end of the day, our thoughts are primarily with Leah's family and friends."
