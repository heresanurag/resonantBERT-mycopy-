title: 'French election 2022: As it happened - Macron vows to govern for all after
  election victory - BBC News'
date: '2022-04-24'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-61151604
content: |-
  France's sitting president beats his far-right rival and secures a second term in office.

  'I am the president of all'

  Macron thanks all those who voted for him, and says he is conscious that many voted for him to block the far right. He says he owes an obligation to those voters for the years ahead. He says he is thinking of who those who abstained and also those who voted for Le Pen who are now disappointed. This gets jeers from supporters, and he urges the crowd not to boo them. "From now on, I'm no longer the candidate of one camp, but the president of all. "I tell those who voted for the far right that my responsibility and that of my team will be to address their concerns."
