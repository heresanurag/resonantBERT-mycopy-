content: |-
  The actress was the last surviving original cast member of BBC Radio 4 serial The Archers.

  June Spencer, who has died aged 105, was the last surviving original cast member of The Archers. For nearly 70 years, she played Peggy Woolley in the long-running radio drama: one of the best-loved matriarchs in British broadcasting. Spencer helped launch BBC Radio's "everyday story of country folk" on 1 January 1951. Clement Attlee was Prime Minister, and meat, cheese, sugar, and petrol were still being rationed after World War Two. As Peggy, she weathered the ups and downs of life in Ambridge, with plot lines including alcoholism, gambling, and dementia, until Spencer’s retirement in 2022 at the age of 103. At the time, her colleagues paid tribute to an actor who never fluffed a line. “I have rarely worked with such an inventive, focused and technically brilliant actor,” said Jeremy Howe – the editor of the programme, "or with such a lovely person".

  June Spencer was born in Nottingham soon after the end of World War I

  June Rosalind Spencer was born on 14 June 1919, just six months after the end of World War One. Her acting career began at the age of three, when she was cast as King of the Land of Nod in a school play. When she heard the audience laugh, June knew it was the life for her. She went to Nottingham High School for Girls, which she found “very stark, grey and cold”. She was forced to give up sport – her favourite lesson – when a doctor somehow misdiagnosed a heart condition. An only child, her father was a “sensible and supportive” biscuit salesman, but her mother was another story. A “complex woman”, Mrs Spencer had once aspired to the stage herself, but – according to her daughter - “just gave up on life... and decided she was an invalid at the age of 40”. June Spencer had little choice but to leave school to look after her mother – who eventually lived until she was 94. Miserably, mother and daughter sat together in a darkened room in case Mrs Spencer had "an attack". Her headmistress was angry, complaining that her former pupil was throwing her life away. “I was frightened of her,” June later recalled. “She told me, ‘Of course, you can't expect to get anywhere without your School Certificate’. "I have thought of those words many times since, particularly when I received my OBE.”

  June Spencer left school at the age of 15

  In her teens, the aspiring actress enjoyed writing comic monologues - performing them as part of the after-dinner entertainment at local Masonic lodges. But with her heart set on the stage, her mother was obstructive: refusing to let her daughter sit the exams for the Royal Academy of Dramatic Art. “I think my mother thought I would fall in with a bad lot,” Spencer said. "When I did finally get in [to the theatre] she said: 'Oh well, I suppose it was inevitable'." She joined a drama club, studied for a London Guildhall drama school certificate, and finally joined a local theatre company in 1942. The same year she married a “fair-haired, blue-eyed boy with the cheekiest grin I’d ever seen”. She had first met Roger Brocksom when she was 17 years old, on holiday near Skegness – but he didn’t have the money to buy her a ring. The wedding took place while he was on leave from the army; wartime shortages meant they had rice paper rather than icing on the cake. A series of small parts on BBC radio programmes followed, and – by the time her husband returned from the war – Spencer was finding regular work.

