  Then came the moment that changed her life. The founder of The Archers, Godfrey Baseley, is said to have talked openly in meetings about who was going to be in his new programme – and news travelled fast. It reached a mystified June Spencer while she was getting lunch in the BBC canteen. “A girl said to me, ‘Oh, you’re going to be in The Archers, aren’t you?’" she recalled. “And I said, ‘Am I? What’s The Archers?’” In 1950, there were a few pilot episodes and then the big launch on New Year’s Day, 1951 – with June Spencer playing a heavily pregnant Peggy Archer. The series hoped to be a public service for farmers, with gentle storylines that brought urban listeners into rural surroundings – almost as if they were eavesdropping on farmers and their wives. To start with, Spencer had a 13-week contract and little idea that she was helping to create a unique slice of British life. The shows were then broadcast live, with producers creeping in and scribbling alterations on scripts, moments before she read them.

  As Peggy Archer (later Woolley), June Spencer was involved in many of the show's most exciting storylines

  But The Archers was an instant hit with the actors – despite never having their credits read out on air – in demand for local appearances. "I remember going down to a gathering of all the Women's Institutes in Cornwall,” June recalled, “and I was mobbed. It was quite frightening." There was a brief break from the show when June and Roger adopted two children in the late 1950s. Thelma Rogers took over the part for a while, but soon returned to the theatre. On taking back the role, Spencer insisted she had little in common with Peggy, who rather lacked a sense of humour, but her on-air journey from young barmaid to grieving widow saw them both involved in some of the show's strongest storylines. Peggy’s first husband, Jack Archer, succumbed to alcoholism, while her second husband Jack Woolley – with whom she hoped to enjoy a happy retirement - was diagnosed with Alzheimer's. The show’s slow-moving plot lines meant each disease unfolded over years - as they do in real life. And both issues were close to June’s heart.

  Arnold Peters and June Spencer as Jack and Peggy Woolley in 1991

  Around the time of her Golden Wedding anniversary, Spencer had noticed that Roger’s memory “was playing him false” and “then the repetitive questions started,” she said. When Peggy Woolley’s husband was given the same disease in The Archers, June was supportive and – with her experience of Roger’s gradual disintegration – was often consulted by the scriptwriters. Roger passed away in 2001. Five years later, June saw her son David – a ballet dancer who had lost his career through injury - die of alcohol abuse. He was 55 years old. For Spencer, such things were not unusual occurrences of life imitating art. Her attitude was that every family experiences traumas and disasters, and drama helps them to deal with it. “We tackle difficult situations that come up in real life, and treat them without being sensational,” she said. “I think people appreciate that. When they have the same sort of problems, they hear how the Archers coped, and I think it helps them."

  The cast and crew of The Archers celebrating June Spencer's 100th birthday in 2020

  June Spencer was made an OBE in 1991 and a CBE in Queen Elizabeth’s Birthday Honours List in 2017. Interviewers who came to her home in rural Surrey were routinely charmed. “It's hard not to go overboard with admiration for a nonagenarian who remains so unaffected by her fame on the one hand,” wrote one, “and some of the awful things life has thrown at her on the other.” She held a special place in the nation’s heart as queen of its longest-running radio drama, and was thought of with enormous affection by her fellow cast members. June “shone through sadness without a word of complaint," recalled Charles Collingwood - who plays Brian Aldridge, her fictional son-in-law, “and always remained immense fun".
