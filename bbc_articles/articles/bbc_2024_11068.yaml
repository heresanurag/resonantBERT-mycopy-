title: 'Edgware: Murder arrest over stabbing of woman near bus stop - BBC News'
date: '2024-05-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68983357
content: |-
  The woman, in her 60s, was treated for her injuries but died at the scene, the Met Police said.

  Emergency services were called to Burnt Oak Broadway shortly after 11:50 BST

  A 22-year-old man has been arrested on suspicion of the murder of a woman who was stabbed near a bus stop in north-west London. The woman, in her 60s, was treated by paramedics at the scene in Edgware but died shortly before midday. The suspect was arrested in the Colindale area, in what the Met Police described as a "significant development". Police are still trying to find the woman's family.

  The Met has not said whether the suspect and victim are known to each other and has asked the public not to speculate. Supt Tony Bellis, from the North West Command Unit, said the arrest came as a result of "fast-time work from specialist detectives".

  The attack happened just before midday, police said

  Emergency services were alerted at about 11:40 to the area close to the junction of Limesdale Gardens. He added: "A family has been left devastated by this shocking attack and my thoughts are with them at this unimaginably difficult time."

  A cordon was put in place while investigations were carried out

  Pictures from the scene showed at least six emergency service vehicles inside a police cordon on Burnt Oak Broadway, where a crime scene remains in place. Supt Bellis said there would be an increased police presence in the area over the coming days.

