content: |-
  Former Manchester United boss Erik ten Hag signs a two-year contract to succeed Xabi Alonso as Bayer Leverkusen head coach.

  Erik ten Hag led Manchester United to FA Cup and Carabao Cup success during his time in charge at Old Trafford

  Former Manchester United boss Erik ten Hag has signed a two-year contract to succeed Xabi Alonso as head coach of German club Bayer Leverkusen. It is the first managerial role that Ten Hag, 55, has taken since his departure from United in October. Alonso was confirmed as the new boss of Spanish giants Real Madrid on Sunday. Ten Hag won the Carabao Cup and FA Cup during a spell of just over two years in charge at Old Trafford, but was dismissed with United 14th in the Premier League. The Dutchman had enjoyed prior success with Ajax before joining United in 2022.

  Leverkusen sporting director Simon Rolfes said:, external "With Erik ten Hag, we have brought in an experienced coach with impressive success on the pitch. "With three league titles and two domestic cup wins, he and Ajax dominated Dutch football from 2018 to 2022. "And Erik demonstrated his quality as a coach with the ensuing success at Manchester United under difficult circumstances at times." Under former Liverpool midfielder Alonso, Leverkusen won a league and cup double in 2023-24. They finished second in the Bundesliga this season, 13 points behind champions Bayern Munich. Ten Hag, who will officially start his new role on 1 July, said Leverkusen are "one of the best clubs in Germany and also among the top clubs in Europe". He added: "I've come to Leverkusen to continue with the ambition shown in recent years. It's an attractive challenge to set up something together in this period of change and develop an ambitious team."
