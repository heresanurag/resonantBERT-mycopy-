  It is not clear if Mr Giuliani is experiencing symptoms or when he caught the virus.

  Nearly 14.6 million people have been infected with Covid-19 in the US, according to Johns Hopkins University, and 281,234 people have died - the highest figures of any country in the world.

  On Sunday, Dr Deborah Birx, the White House coronavirus task force co-ordinator, criticised the Trump administration for flouting guidelines and peddling "myths" about the pandemic.

  "I hear community members parroting back those situations, parroting back that masks don't work, parroting back that we should work towards herd immunity," Dr Birx told NBC.

  "This is the worst event that this country will face," she said.

  This video can not be played To play this video you need to enable JavaScript in your browser. "Grow up, mask up": Tensions in US Covid hotspot of North Dakota

  Since the 3 November election, Mr Giuliani has travelled the country as part of unsuccessful efforts to overturn Mr Trump's election defeat. During many of his events, he was seen without a face mask and ignoring social distancing.

  Last Wednesday, he appeared at a hearing on alleged election fraud in Michigan where he asked a witness beside him if she would be comfortable removing her face mask.

  "I don't want you to do this if you feel uncomfortable, but would you be comfortable taking your mask off, so we can hear you more clearly?" said Mr Giuliani, who was not wearing a face mask. The witness chose to keep her mask on after asking the panel if she could be heard.

  On Thursday Mr Giuliani travelled to Georgia where he repeated unsubstantiated claims of voter fraud at a Senate committee hearing about election security.

  Dozens of people in Mr Trump's orbit are said to have tested positive for Covid-19 since October.

  Boris Epshteyn, another Trump adviser, tested positive shortly after appearing alongside Rudy Giuliani at a news conference on 25 November.

  Others include the president's chief of staff Mark Meadows and press secretary Kayleigh McEnany, along with his wife Melania and sons Donald Jnr and Baron.

  Mr Trump's own diagnosis and hospital stay upended his campaign for a second term in office, less than a month before he faced Joe Biden in the presidential election.

  Mr Trump has refused to concede, insisting without evidence that the election was stolen or rigged. Attorney General William Barr said last week that his department had not seen any evidence of widespread voter fraud that would change the result.

  Mr Biden will be sworn in as president on 20 January.
