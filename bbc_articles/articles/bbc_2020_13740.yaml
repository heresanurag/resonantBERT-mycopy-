title: Trump lawyer Rudy Giuliani admitted to hospital with Covid-19 - BBC News
date: '2020-12-07'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-55210243
content: |-
  Rudy Giuliani has been leading the Trump campaign's legal challenges to the 2020 election results.

  This video can not be played To play this video you need to enable JavaScript in your browser. The witness chose to keep her face mask on after Mr Giuliani made the request

  President Donald Trump's personal lawyer, Rudy Giuliani, has tested positive for Covid-19 and is being treated in hospital.

  Mr Giuliani, who has led the Trump campaign's legal challenges to the election results, is the latest person close to the president to be infected.

  Since November, he has been on a cross-country tour in an effort to convince state governments to overturn the vote.

  Like other Trump officials, he has been criticised for shunning face masks.

  Mr Trump, who was ill with the virus in October, announced the diagnosis in a tweet, writing: "Get better soon Rudy, we will carry on!"

  Mr Giuliani, 76, was admitted to the Medstar Georgetown University Hospital in Washington DC on Sunday.

  The news came after Mr Giuliani had visited Arizona, Georgia and Michigan all in the past week - where he spoke to government officials while not wearing masks.

  Following news of Mr Giuliani's diagnosis, the Arizona legislature announced sudden plans to shut down for one week. Several Republican lawmakers there had spent over 10 hours with the former New York mayor last week discussing election results.

  Following Mr Giuliani's visit to Phoenix, Arizona, the state's Republican party tweeted a photo of him with other mask-less state lawmakers.

  In a tweet, Mr Giuliani thanked well-wishers for their messages, and said he was "recovering quickly".

