  Hitchon, the only one of the women's hammer field to have made last year's World Championship final in London, fouled out with three no-throws. "It just wasn't quite there. The warm-ups were really good but it just didn't happen," the 26-year-old said. "I've been working on a new technique and I've got to keep working on it because it is definitely the way forward. "When I land it, it will go very far. It's track and field; it happens sometimes - I didn't execute so it didn't quite work. "No-one thought I was going to win a medal in Rio, so, two years out from Tokyo, I'll be ready for it."

  Isaac Makwala justified his status as heavy favourite for the 400m with an assured victory. Last summer, he was denied the chance to compete in the final at the World Championships as athletics' governing body barring him from the London Stadium in case he passed a sickness bug to other athletes. It would have taken a similarly extraordinary turn of events to deny the 32-year-old here as he strolled home in 44.35 seconds, well clear of compatriot Baboloki Thebe. Once again however, he was denied a chance to test himself in a major final against Wayde van Niekerk. The South African, who added the world crown to his Olympic title in London last summer, missed the trip to the Gold Coast with a knee injury. The pair last met in a major 400m final back at the Worlds at Beijing 2015, where Makwala finished fourth behind a victorious Van Niekerk.

