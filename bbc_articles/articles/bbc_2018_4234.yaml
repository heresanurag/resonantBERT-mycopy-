  Scotland's flagbearer Eilidh Doyle, who has silver medals from the past two Commonwealth Games, overcame an outside-lane draw to make the 400m hurdles final. The 31-year-old has not raced over barriers since September but looked assured as she won her heat in 54.80 seconds. British record holder Dina Asher-Smith of England also eased through to the next round in the 200m, easing up well before the line as she won her heat in 23.28. Double Olympic champion Elaine Thompson of Jamaica and Rio 2016's 400m gold medallist Shaunae Miller-Uibo of the Bahamas also advanced with victories in one of the most eagerly awaited events of the meet. With 74 entrants, the men's 200m has the biggest field of any athletics event at the Games. England's Zharnel Hughes, attempting to recapture the form that took him to fifth in the 2015 World Championships at just 20, was second fastest into the semi-finals in 20.34 seconds. England's Kyle Langford and Scotland's Jake Wightman progressed to the 800m final, with Botswana's defending champion and London 2012 silver medallist Nijel Amos fastest into Thursday's medal-decider. Defending decathlon champion Damian Warner threw away a 223-point lead in the eighth event of the men's decathlon, failing to clear his opening height of 4.50m in the pole vault to sink his bid for gold. Canadian Warner, who had hoped to break the Commonwealth Games points record set by Daley Thompson in 1986, slipped out of contention as Grenada's Lindon Victor took advantage and gold.
