title: Winter solstice celebrated at historic sites celebrated - BBC News
date: '2024-12-22'
section: England
url: http://www.bbc.co.uk/news/articles/ckg349e4q22o
content: |-
  Crowds gather to watch the sunrise over spiritual sites in Wiltshire and Somerset.

  Special access is allowed to the ancient Stonehenge monument during the solstice

  The winter solstice sunrise was greeted by thousands of people at Stonehenge, with a focus on "renewal, rebirth and good vibes". The ancient site opened its Monument Field at 07:45 GMT so crowds could see the sun break over the iconic stones. Despite a windy Wiltshire morning, people followed the "spiritual draw of the area" to mark the winter solstice, which is the shortest day of the year. From now on, the nights will slowly start to draw back again and the days will gradually become longer.

  Hundreds of people came to the stones to mark the occasion

  The sun rose at Stonehenge at approximately 08:09 to cheers and applause. It is due to set at 16:02, meaning there will be little under eight hours of daylight. Civil servant Chris Smith, 31, had come to Stonehenge for the first time. "This is all about renewal, rebirth, we're entering into the new year, and it's also a good time to acknowledge what's taking place in the year that's been," he said. "For me, I've gone through a bit of a tumultuous year, there's been lots that has taken place for me in the past 24 months, and this is an opportunity to consolidate everything that has taken place this year and bury that in the past and be able to move forward then into this next new year. "There's such a vibe. I mean, if you look around, you've got everybody here, there's such an energy in the space. "You can really feel it, like it's all good vibes. People are just here enjoying themselves, and that's kind of one of the draws of these sorts of events. "We have got people here from all walks of life. This is the community. And I think in today's age, this is a really important thing to do."

  Stonehenge won't see crowds like this again until June 21 2025

  The stones, which are thought to have been placed there around 2,500 BC, line up with the Sun's movements during the two solstices, marking the changing of the seasons. Usually, access for large crowds of people is prohibited, but English Heritage opens up the site for the summer and winter solstices.

