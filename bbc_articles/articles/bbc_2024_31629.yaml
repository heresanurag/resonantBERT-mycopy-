  English Heritage's Stonehenge director Steve Bax said: "It was fantastic to welcome around 4,500 people to Stonehenge this morning to celebrate winter solstice, and we were delighted that more than 100,000 people also watched live online from around the world. "It was an enjoyable and peaceful celebration despite the sun not making an appearance and it was great to see so many families enjoying themselves around the monument."

  This video can not be played To play this video you need to enable JavaScript in your browser. Timelapse: Watch as crowds gather at Stonehenge to mark the winter solstice

  In nearby Avebury, which is home to another ancient stone circle, two men wearing cloaks could be seen blowing horns as people gathered to watch the sunrise over the fields. Near the stone circle there is a group of beech trees which people tie ribbons to. This is a pagan tradition known as "wishing trees", done as prayers to the tree spirits or in the memory of loved ones.

  Glastonbury Tor also saw celebrations this morning

  In Somerset, Glastonbury Tor also saw crowds of people climbing the hill earlier this morning to mark the sun rising. The Tor is part of the ruins of the 15th Century St Michael's Church, and rises 518ft (158m) above the Somerset Levels to give a panoramic view of Wells, the Bristol Channel, Wiltshire, the Polden Hills and Exmoor. It is regarded by some as a spiritual site just like Stonehenge. At the top of the hill, a fire was lit and songs were sung by people gathered there.

  Stonehenge has strong associations for people with spiritual beliefs

