title: Woman arrested over attempted baby abduction in Blackpool - BBC News
date: '2025-05-11'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cj6renxr7ddo
content: |-
  Police say members of the public stepped in to help the baby's parent.

  The incident took place near the Coral Island centre

  Police are investigating claims of an attempted abduction of a baby near Blackpool promenade. The baby was being pushed in their pram by their parent when a stranger approached at about 11:30 BST in Central Drive, near to Coral Island amusement centre. People nearby noticed what was happening and stepped in to help the parent, police said. The baby was unharmed. A woman has been arrested on suspicion of child abduction and police assault.

  A police spokesman said: "Members of the public, and the baby's parent intervened, and thankfully the baby was unharmed." Ch Insp John Jennings-Wharton, of Blackpool Police said: "We know that something like this can be very concerning for the community to hear about. We are in the early stages of our investigation and are working to establish the full circumstances. "We are aware of some social media posts that have been shared online. We'd encourage you not to speculate, and to understand that our enquiries are very much ongoing. "If you do have information or footage that could assist those enquiries, we ask you report them to us through the appropriate channels."

