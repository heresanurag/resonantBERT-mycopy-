title: 'Ecopetrol: Whistleblower reveals Colombia oil giant''s ‘awful’ pollution -
  BBC News'
date: '2025-03-20'
section: Latin America
url: http://www.bbc.co.uk/news/articles/crewlj11jljo
content: |-
  Colombia’s Ecopetrol polluted hundreds of sites, including water sources and wetlands, the BBC finds.

  An iridescent film could be seen on the water surface in some places the BBC visited

  Colombian energy giant Ecopetrol has polluted hundreds of sites with oil, including water sources and biodiverse wetlands, the BBC World Service has found. Data leaked by a former employee reveals more than 800 records of these sites from 1989 to 2018, and indicates the company had failed to report about a fifth of them. The BBC has also obtained figures showing the company has spilled oil hundreds of times since then. Ecopetrol says it complies fully with Colombian law and has industry-leading practices on sustainability. The company's main refinery is in Barrancabermeja, 260km (162 miles) north of the Colombian capital Bogota. The huge cluster of processing plants, industrial chimneys and storage tanks stretches for close to 2km (1.2 miles) along the banks of Colombia's longest river, the Magdalena – a water source for millions of people.

  Yuly Velásquez says manatees have been among dead animals found in the Barrancabermeja area

  Members of the fishing community there believe oil pollution is affecting wildlife in the river. The wider area is home to endangered river turtles, manatees and spider monkeys, and is part of a species-rich hotspot in one of the world's most biodiverse countries. Nearby wetlands include a protected habitat for jaguars. When the BBC visited last June, families were fishing together in waterways criss-crossed by oil pipelines. One local said some of the fish they caught released the pungent smell of crude oil as they were cooked.

  A fisherman pulled up a clump of vegetation caked in dark sediment, which Ms Velásquez says is a sign of oil pollution

  In places, a film with iridescent swirls could be seen on the surface of the water - a distinctive signature of contamination by oil. A fisherman dived down in the water and brought up a clump of vegetation caked in dark slime. Pointing to it, Yuly Velásquez, president of Fedepesan, a federation of fishing organisations in the region, said: "This is all grease and waste that comes directly from the Ecopetrol refinery." Ecopetrol, which is 88% owned by the Colombian state and listed on the New York Stock Exchange, rejects the fishers' claims that it is polluting the water. In response to the BBC's questions, it says it has efficient wastewater treatment systems and effective contingency plans for oil spills.

  Mr Olarte says he realised "something was wrong" soon after joining Ecopetrol

  Andrés Olarte, the whistleblower who has shared the company's data, says pollution by the firm dates back many years. He joined Ecopetrol in 2017 and started working as an adviser to the CEO. He says he soon realised "something was wrong". Mr Olarte says he challenged managers about what he describes as "awful" pollution data, but was rebuffed with reactions such as: "Why are you asking these questions? You're not getting what this job is about." He left the company in 2019, and shared a large amount of company data with US-based NGO the Environmental Investigation Agency (EIA) and later with the BBC. The BBC has verified it came from Ecopetrol's servers.

  One database he has shared, dated January 2019, contains a list of 839 so-called "unresolved environmental impacts" across Colombia. Ecopetrol uses this term to mean areas where oil is not fully cleaned up from soil and water. The data shows that, as of 2019, some of these sites had remained polluted in this way for over a decade. Mr Olarte alleges that the firm was trying to hide some of them from Colombian authorities, pointing to about a fifth of the records labelled "only known to Ecopetrol". "You could see a category in the Excel where it lists which one is hidden from an authority and which one is not, which shows the process of hiding stuff from the government," says Mr Olarte. The BBC filmed at one of the sites marked "only known to Ecopetrol", which was dated 2017 in the database. Seven years later, a thick, black, oily-looking substance with plastic containment barriers around it was visible along the edge of a section of wetland.

  The BBC saw a black, oily-looking substance and containment barriers at one of the sites listed in the database as "only known to Ecopetrol"

  Ecopetrol's CEO from 2017 to 2023, Felipe Bayón, told the BBC he strongly denied suggestions that there was any policy to withhold information about pollution. "I say to you with complete confidence that there is not, and was not any policy nor any instruction saying, 'these things can't be shared'," he said.

  A whistleblower reveals Colombian oil giant Ecopetrol's ‘awful’ pollution. BBC Eye investigates as part of the Life at 50C series.
