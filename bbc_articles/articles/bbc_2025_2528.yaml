title: 'Mathys Tel transfer: Tottenham sign Bayern Munich forward on loan - BBC Sport'
date: '2025-02-04'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cvgpv0nzq06o
content: |-
  Tottenham Hotspur sign France Under-21s forward Mathys Tel from Bayern Munich on loan until the end of the season.

  Mathys Tel has only started four games for Bayern Munich this season

  Tottenham Hotspur have signed France Under-21s forward Mathys Tel from Bayern Munich on loan. The 19-year-old reportedly rejected Spurs earlier this month but will now move to north London, with Tottenham having an option to buy him in the summer for £45m. A picture was posted by his agent Gadiri Camara on Monday appearing to show them both on board a private jet. Tel has made 83 appearances for Bayern since joining from French club Rennes in 2022, scoring 16 goals and providing seven assists. Tottenham beat Brentford 2-0 on Sunday at Gtech Community Stadium for their first league win in eight Premier League matches. Ange Postecoglou's side sit 14th in the table but are in the last 16 of the Europa League and the Carabao Cup semi-finals. They travel to Liverpool for the second leg of their semi-final in the latter competition on Thursday, holding a 1-0 advantage.

  It is the club's second transfer in two days after they announced the signing of Austria defender Kevin Danso on loan from Ligue 1 club Lens on Sunday. On Monday, Tottenham had a £70 million bid for England centre-back Marc Guehi rejected by Crystal Palace. Tel had been linked with a move to Manchester United, but European football expert Julien Laurens said Postecoglou urged the striker to opt for Spurs instead. "Ange Postecoglou spoke with Mathys Tel at length earlier today and convinced him to come to Tottenham," said Laurens. "Huge role played by the Spurs manager to get one of the most coveted youngsters in Europe."

  Tottenham chairman Daniel Levy reportedly travelled to Munich to convince winger Tel to join his club last week - only for it to collapse. The talk from these unconfirmed reports was that Tel wanted a move to Manchester United or another of English football's giants. Arsenal were reportedly interested right up until the transfer deadline, while Chelsea were considering a swap deal involving Christopher Nkunku earlier in the window. However, no alternative move materialised and - out of nowhere - agent Gadiri Camara and his client Tel were pictured together on a private jet. Minutes later, reports broke that he was joining Spurs and it shows how Tel has left English football on tenterhooks. It has been some window for Tel, who also had Bayern go from saying he is not for sale, to allowing England's biggest clubs to discuss signing him.
