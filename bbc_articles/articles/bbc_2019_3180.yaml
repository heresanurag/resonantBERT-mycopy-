title: 'Homeless children: One-year-old living in hostel - BBC News'
date: '2019-03-27'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-47698664
content: |-
  A single dad and his one-year-old who are living in a homeless hostel in County Antrim.

  One-year-old Barry Flynn lives in a hostel with his dad. He has never had a home of his own.

  He is one of more than 2,000 homeless children living in temporary accommodation in Northern Ireland.

  A spokesman for the Housing Executive said it hopes to provide the pair with a permanent home soon.
