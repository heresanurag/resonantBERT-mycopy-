  Newly re-elected Labour MP Andrew Western claimed online his home had been attacked with a sledgehammer. He called for an end to political toxicity, stressing that harassment and intimidation are unacceptable. In a post on social media Mr Western said "no-one was hurt" and the incident was being investigated by police. In Truro and Falmouth, Reform UK candidate Mr Rubidge was assaulted and left with severe injuries while campaigning. Mr Rubidge suffered "severely torn ligaments" after being attacked by a man while handing out election leaflets, the party said. Devon and Cornwall police have launched an investigation into the incident. Party chairman Richard Tice condemned the attack saying: "This is no way of having a democratic debate and discussion. We can disagree, but we don't fight each other."

  Ms Ali said she is coming forward now because she still has "regrets about not speaking out enough" before the murder of Labour MP Jo Cox by a far-right extremist. In the last eight years, two MPs have been murdered, including Ms Cox. Sir David Amess was killed while holding an MP surgery in his Southend constituency in 2021 by an Islamic State supporter. "All of us are still traumatised, and still grieving for the loss of Jo Cox and David Amess," she said. "It's really important when people are entering public life they can act and carry out their duties to serve without fear of intimidation, hostility and danger to their lives and their families," she said. "It’s important to learn the lessons of what happened this election" to ensure "these things do not get worse," she added.

  A Met Polce spokesperson confirmed four people had been arrested on "suspicion of committing offences whilst campaigning for the general election" while campaigning in Bethnal Green and Stepney. “We are committed to ensuring that MPs, their families and their staff can go about their work and lives without feeling unsafe and we will not tolerate MPs being intimidated," the spokesman added. “Any other incidents involving alleged offences in relation to the election will be assessed and if a criminal offence has been committed this will be investigated.”
