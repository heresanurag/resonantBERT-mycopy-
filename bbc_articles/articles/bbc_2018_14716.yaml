  Sgt Anthony Pasco had not seen his teenage twins in months as he was based away from home.

  Sgt Anthony Pasco hadn't seen his teenage twin daughters for six months, as he's based away from home with the US Air Force. So he planned an early Christmas surprise with the help of their school mascot.
