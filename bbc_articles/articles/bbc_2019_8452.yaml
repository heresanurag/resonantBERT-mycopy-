title: Domestic abuse reports increase in summer, says PSNI - BBC News
date: '2019-07-05'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-48876475
content: |-
  Reports of domestic abuse increase over the summer months, says the PSNI.

  Reports of domestic abuse increase over the summer months, the Police Service of Northern Ireland (PSNI) has warned.

  It is using a new animated video to explain that the abuse can take many forms.

  The awareness campaign comes just weeks after the PSNI said it had received the biggest number of abuse reports in a single year last year.

  Read more: New campaign after rise in domestic abuse
