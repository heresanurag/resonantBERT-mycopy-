title: 'UK heatwave: Hottest day expected on Saturday as sweltering weather continues
  - BBC News'
date: '2023-09-06'
section: UK
url: http://www.bbc.co.uk/news/uk-66730779
content: |-
  The UK experiences its hottest September day since 2016 as London's Kew Gardens sees 32C (89F).

  A commuter with a portable handheld fan on the tube

  Saturday is expected to be the hottest day of the year as September's warm weather reaches its peak.

  The UK experienced its hottest September day since 2016 on Wednesday, with 32C (89F) recorded in Kew Gardens in west London.

  Heat-health alerts have been upgraded to amber for much of England, with only the North East under a yellow one.

  It means people of all ages could be affected, putting the NHS at risk.

  Areas of West Yorkshire, Cornwall, Devon and Wales all hit the heatwave threshold on Tuesday, the Met Office said, although the hottest temperatures did not pass June's 32.2C high - the current hottest day of the year.

  Saturday could see temperatures reach as high as 33C in London, although it will be cooler further north.

  On Wednesday much of England and Wales remained in the high 20s. But areas of north-east Scotland and the north of England experienced cooler temperatures due to sea fog.

