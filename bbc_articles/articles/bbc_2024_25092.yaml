  The court previously heard Mr Sharif, Ms Batool and Mr Malik travelled to Islamabad, Pakistan, with Sara's five brothers and sisters on 9 August 2023, the day before her body was found. Prosecutors said Mr Sharif called police from Pakistan and admitted he killed Sara about an hour after his family’s flight had landed in Islamabad. Jurors were told Mr Sharif's case was that Ms Batool was responsible for Sara's death, and he made a false confession on the phone call and also in a note to protect his wife.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sara had suffered 11 fractures to her spine, burns to her buttocks, caused by a domestic iron, six “probable human bite marks” and signs of a traumatic brain injury, the court also heard. The three defendants, who lived with Sara before her death, are also charged with causing or allowing the death of a child, which they deny.

