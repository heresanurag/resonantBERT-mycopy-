title: 'Sara Sharif: Girl, 10, hooded and burned by abusers - court - BBC News'
date: '2024-10-15'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cn8jnggdj0qo
content: |-
  Makeshift plastic hoods were used on the 10-year-old, who suffered dozens of injuries, jurors heard.

  A 10-year-old girl who allegedly died at the hands of her father, stepmother and uncle was hooded, burned and beaten during more than two years of abuse, a court has heard. Sara Sharif began wearing a hijab to hide her facial injuries in January 2023, months before her body was discovered at her home in Woking, Surrey, jurors at the Old Bailey were told. A post-mortem examination found Sara had suffered dozens of injuries including "probable human bite marks", an iron burn and scalding from hot water. Her father Urfan Sharif, 42, stepmother Beinash Batool, 30, and uncle, Faisal Malik, 29, have denied murder.

  Sara Sharif's body was found at her home in Woking on 10 August last year

  Prosecutor Bill Emlyn Jones KC said the hijab was “indicative of the need to conceal injuries to her face and head from the outside world”. Sara's primary school noticed a bruise under her left eye in June 2022, a bruise on her chin and a dark mark on her right eye in March 2023, the court heard. She gave multiple conflicting tales of how she got the injuries and used her headscarf to conceal her face when questioned by teachers, Mr Emlyn Jones KC said. A neighbour found it “unusual” that Sara was the only member of her large extended family that lived at the address to be dressed in a hijab, the court heard. Sara was withdrawn to be home schooled in April 2023.

  Urfan Sharif, Beinash Batool and Faisal Malik are each facing two charges relating to the death of Sara Sharif

  Mr Emlyn Jones KC also gave accounts from neighbours, including one woman who heard two days before Sara's death "a single high pitched scream, which lasted a couple of seconds and stopped suddenly". A woman who lived near the family's previous address in West Byfleet said she heard “shockingly loud” sounds of smacking and “gut wrenching screams” of young female children.

  Warning: This article features details that some people might find distressing

  Another West Byfleet neighbour said they heard banging and rattling sounds, often accompanied by the sounds of a child crying or screaming, the court heard. She did consider reporting what she heard to social services but ultimately decided against it, Mr Emlyn Jones KC added. Mr Emlyn Jones KC said a bloodstained cricket bat, a rolling pin with Sara’s DNA on it, a metal pole, a belt and rope were found near the family’s outhouse. “You can now look again at the bruises and broken bones Sara had suffered with a clearer understanding of how at least some of those injuries appear to have been inflicted,” he told the jury.

  Faisal Malik, Beinash Batool and Urfan Sharif have all denied murder

  Plastic bags bound with parcel tape were also found in wheelie bins at the family’s property, after Ms Batool ordered 18 rolls of parcel tape in two separate online orders, prosecutors said. “It is obvious what these are. They are homemade hoods. They had been placed over Sara’s head and taped in place,” Mr Emlyn Jones KC said. “If this was being done by one of the adults in the house, why aren’t the others releasing her? Why aren’t the others helping her, preventing this terrible treatment?” he added.

  Urfan Sharif left a note found near Sara's body, tucked under a pillow, in which he confessed to killing his daughter

  Ms Batool also sent text messages to her sisters admitting she knew Sara was being hurt by her husband in the house, jurors were told. "She’s covered in bruises, literally beaten black,” said one message in May 2021. In the summer of 2022, Ms Batool also sent text messages to her sister expressing concern over how she would conceal Sara’s bruising. “I can’t even cover it up," she said. “He beat Sara up yesterday, and I can’t send her to school on Monday looking like that." Giving evidence, a police officer said he found Sara in a bunkbed, covered with a white sheet. He said the sheet was “like it had been laid” on top of her body.

