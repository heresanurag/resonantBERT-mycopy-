  Winners are voted for by Radio 1 listeners, who collectively decided Cardi B is this year's most entertaining celebrity.

  Last year the award went to Stormzy.

  Ed Sheeran and Little Mix won in their categories for the second year running, as did Love Island, which was voted the best TV show.

