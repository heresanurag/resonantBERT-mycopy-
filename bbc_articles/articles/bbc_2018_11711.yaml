  The awards show, which is in its ninth year, also saw performances from the likes of 5 Seconds of Summer, Not3s, Mabel, Little Mix and Jonas Blue featuring Liam Payne.

  And Gemma Collins - who suffered a viral fall at the 2017 Teen Awards - made a triumphant return.

