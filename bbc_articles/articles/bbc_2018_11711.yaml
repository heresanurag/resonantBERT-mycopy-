  Lily, Siena and Junior were thanked for their "selfless" work.

  Lily, 14, is a wheelchair motocross competitor who helps children like her access her sport. Siena, 16, works to support students with autism and learning disabilities and Junior, 14, is a UK freestyle dance champion who campaigns against bullying.

  All three of them were recognised for their outstanding dedication to helping others.

