title: 'Teen Awards: Little Mix, BTS and Cardi B winners at Radio 1 awards - BBC News'
date: '2018-10-21'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-45933886
content: |-
  The winners were chosen by Radio 1 listeners, who also voted Cardi B as the most entertaining celeb.

  Little Mix and BTS were the big winners at Sunday's BBC Radio 1 Teen Awards 2018.

  The girlband took home best British group while K-pop superstars BTS were awarded with the best international group award - appearing by video link to surprise fans at Wembley Arena.

  Ed Sheeran won best British solo artist, with Shawn Mendes taking home the international equivalent.

  This year's Teen Heroes were celebrated and awarded their prizes on stage.

