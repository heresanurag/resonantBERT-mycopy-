id: bbc_2018_12304
title: Captain America actor Chris Evans to 'retire' from role - BBC News
date: '2018-10-05'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-45756235
content: |-
  Chris Evans tweets that it's been "an honour" to play "Cap", after finishing filming Avengers 4.

  It looks like Chris Evans - the actor who plays Captain America in the Marvel movies - is giving up the role after eight years.

  He's played him in 10 films, starting with Captain America: The First Avenger.

  Chris portrayed one of the original cinematic Avengers alongside Iron Man, Thor, Hulk, Black Widow and Hawkeye.

  He's now finished filming Avengers 4, Marvel's 22nd film, and tweeted to say that playing Cap has been "an honour".

