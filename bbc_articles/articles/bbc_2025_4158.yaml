title: Eddie Howe to be given Freedom of Newcastle after Carabao Cup win - BBC News
date: '2025-03-19'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cn89p53dey7o
content: |-
  League Cup celebrations continue, with Blyth's Dan Burn nominated for the Freedom of Northumberland.

  Eddie Howe to be given Freedom of Newcastle

  Eddie Howe managed Newcastle United to victory against Liverpool at Wembley on Sunday

  Eddie Howe will be awarded the freedom of the city following Newcastle United's historic Carabao Cup win. The manager led Newcastle to a 2-1 victory over Liverpool on Sunday, securing the club's first piece of major silverware since 1969. He is now in line to receive the highest civic honour the city can bestow and one that has been awarded to legendary figures in Newcastle's football history- including Sir Bobby Robson, Alan Shearer and Jackie Milburn. Meanwhile, Blyth-born Dan Burn had been nominated for the Freedom of Northumberland following his man of the match performance.

  City council leader Karen Kilgour told the Local Democracy Reporting Service she was "delighted" to nominate Howe. "Generations of supporters have never seen their beloved club lift a domestic trophy, and under his leadership we all now have treasured memories of a truly unforgettable day," she said. The honour is expected to be formally confirmed at a full council meeting later this year.

  Opening goal scorer Dan Burn has been nominated for the Freedom of Northumberland

  On Monday, the leader of Northumberland County Council Glen Sanderson said he intended to nominate Burn for the Freedom of Northumberland after the 32-year-old scored Newcastle's first goal at Wembley in 25 years. "It's a great victory for the region and the fact a local lad from Blyth played such a crucial part of the journey is wonderful," he added. Celebrations are set to continue in the city with the club announcing the date for an open-top bus parade. The Magpies issued a "save the date" for 29 March, after the international break, to celebrate Sunday's Carabao Cup glory. It is the club's first major domestic trophy in 70 years, with supporters expected to line the streets of Newcastle to watch the team parade the silverware.

  The club revealed the date on their website, with more details set to follow

  The honours continue to stack up for the winning side. Northumberland National Park has announced it has temporarily renamed Elsdon Burn Walk, near Elsdon, to "Big Dan Burn Walk". Once the centre of defence in the Border Reiver battles, a spokesperson said it "seems like a fitting place to mark Dan's and the whole teams' heroic achievements". "Northumberland National Park is a place as grand and expansive as Dan himself," they added, in a nod to the player's 6ft 6in (1.98m) height.

