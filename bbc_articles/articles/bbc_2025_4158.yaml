  Meanwhile, Burn's former PE teacher Dan Kennerley, of The Blyth Academy, has recreated the player's goal. Mr Kennerley went to Wembley to watch Newcastle United lift the trophy, before travelling back on Sunday night for school the following morning. He told BBC Look North: "It was destiny - everyone thought he was going to score and when he put that header in, it was like the roof just lifted off".

