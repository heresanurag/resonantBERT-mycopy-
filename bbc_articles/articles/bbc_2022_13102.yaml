  Simon Armitage’s poem Transmission Report celebrates 100 years of the BBC.

  Poet Laureate Simon Armitage’s poem Transmission Report was broadcast on The One Show to mark 100 years of the BBC.

  Famous faces from across the BBC joined Simon Armitage to read the poem; including Jodie Whittaker, Prof Brian Cox, Carol Kirkwood, Clara Amfo, Jay Blades, Huw Edwards and many others.
