title: Rare accounts of life for women inside notorious Iranian prison - BBC News
date: '2024-12-19'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cd75g5eyqv2o
content: |-
  Interrogations, beatings, cramped quarters and the tight bonds women forge inside Tehran's Evin prison.

  Crouched alone on the floor, in a tiny, windowless cell, Nasim could hear what sounded like other prisoners being tortured. The guard would bang on the door and say: "Can you hear that beating? Get ready, you're next." She was "interrogated for 10 to 12 hours every day" and repeatedly threatened with execution. The bare cell, no more than two metres across, had no bed or toilet. Four months in solitary confinement was the 36-year-old hairdresser's introduction to Iran's notorious Evin prison. The only people she saw were her interrogators. She thought that she would "die and no-one would know". We have pieced together accounts from multiple reliable sources to build a picture of everyday life for Nasim and other women, who are currently being held in Evin prison. Many were among the tens of thousands of people arrested in connection with the "Woman, Life, Freedom" protests that followed the death of 22-year-old Mahsa Amini in September 2022. Mahsa had been arrested for allegedly breaking Iranian laws that require women to wear the hijab and she died in police custody. While people have spoken about conditions in Evin after they have been released, it is rare to get details of inmates' lives while they are still inside.

  Nasim worked as a hairdresser before she was arrested in April 2023

  What we have heard reveals not only brutality, but a place of complex contrasts where the prisoners continue to campaign for women's rights and defiantly challenge restrictions imposed on them. There are surprising moments too - one inmate, occasionally allowed time alone with her husband, has even got pregnant. Nasim - who loves rap music and make-up - was taken into custody in April 2023 after joining protests with her friends, one of whom was killed in the government crackdown. She survived interrogations "by thinking about those who died on the street". People who saw Nasim when she came out of solitary confinement have described cuts and bruises on her body and how she was tortured to make false confessions. Rezvaneh was also arrested following the protests, along with her husband, in 2023. They both ended up in Evin, which has separate sections for men and women. Her interrogators said they would kill her husband and "hit him so much that he would turn black like coal, and purple like an aubergine". After solitary confinement, interrogations and humiliation, Nasim was moved to the women's wing, that houses about 70 people, including Rezvaneh, most of whom were arrested on political charges.

  CCTV footage of a cell for trans inmates in Evin prison was leaked in 2020 - it is similar to the cells in the main women's wing

  It is where the British-Iranian citizen Nazanin Zaghari-Ratcilffe, who was allowed to return to the UK in 2022, spent nearly four years of her sentence. Most of the women there have been sentenced because of their activism, for offences including spreading propaganda, drawing arms against the regime, and endangering national security. They live in four crowded cells with up to 20 people in each one and bunk beds stacked three-high. Living together in cramped quarters often causes friction, and sometimes fights - both physical and verbal - break out. But the women also forge tight bonds. In winter, "everyone is freezing" and the women "walk around with hot water bottles" to stay warm. In summer, they swelter in the heat. There is a small kitchen area with a couple of hobs where - if they have enough money to buy food from the prison shop - they can cook for themselves to supplement the basic prison meals that are brought to their cells. A dark, dirty area at the end of a corridor serves as a place to smoke. A small cemented yard with a little area for plants and a volleyball net provides a bit of outside space.

  They can wear their own clothes and are free to move around their living quarters which have two bathrooms. Every evening, they queue to use the toilet and brush their teeth. It was here, after she had been in prison for about four months, that Rezvaneh found out she was pregnant. She had struggled with infertility for years and had given up on ever having a baby. But according to Evin's rules, she and her husband - who is still a prisoner in the men's wing - were occasionally allowed to meet in private and, on one of these occasions, she conceived. When she realised she was pregnant she "cried for several days". She found "the worst thing was the mental pressure and tensions inside the prison". Finding a quiet place in the crowded cells, where people spend most of their days sitting on their beds, was a constant challenge. The prison food left her craving apple juice, bread, and meat, which were hard to get hold of. When she could get some meat from the prison shop it was at least twice the price of meat on the outside. The prison eventually allowed her to have an ultrasound scan at four months, and doctors told her she was having a girl. As she listened to "each heartbeat the sense of hope became stronger". But she was afraid that the conditions in prison would endanger the baby's health. Rezvaneh was not just concerned about her diet - she has epilepsy and needed to avoid stress. Prison doctors told her she had a high risk of miscarriage.

