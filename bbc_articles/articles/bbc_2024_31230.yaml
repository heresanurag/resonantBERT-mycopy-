  Vida, a journalist, loves to paint. She uses bedsheets for canvases and paints portraits of the other women. One, which was smuggled out of Evin, is of Kurdish prisoner Pakhshan Azizi who travelled to Kurdish areas of Iraq and Syria to help victims of the Islamic State group. Pakhshan has been sentenced to death, following charges of using arms to fight the Iranian regime, and there is great concern this sentence could be carried out soon. Vida has been warned not to draw anything with a hidden meaning. On one of the walls in the yard she painted crumbling bricks with a green forest behind them. The authorities sprayed over it. In a corridor she painted a picture of an Iranian cheetah running. Some of the women "kept saying how much good energy they got from it". But one night the authorities "went and painted over it" and restricted Vida's access to painting supplies. One of her murals has been left intact though - huge, blue ocean waves on the walls of the corridor where the women go to smoke.

  Vida's portrait of Pakhshan Azizi, who has been sentenced to death

  Getting medical care has been a constant battle for the women. One of the inmates, human rights activist and Nobel Peace Prize winner Narges Mohammadi, has life-threatening heart and lung conditions. But in prison she has had to fight long and hard for access to a doctor. Relatives said that officials repeatedly blocked treatment because she refused to wear a headscarf to a medical appointment. The authorities only relented after fellow prisoners went on hunger strike for two weeks. Narges was released for 21 days at the start of December on medical grounds. Behind bars, she and the others have carried out protests, pushing the boundaries and continuing to fight for their rights. Although the law requires them to wear headscarves, many refuse. And after a long fight with the authorities, the women were allowed curtains around the beds so they could have some privacy, out of view of CCTV cameras. One of the toughest things for the women is waiting to hear their sentences. Nasim's interrogators had threatened her with the death penalty and she had to wait nearly 500 days to find out her fate. She found solace in her fellow prisoners - who she has described as sisters who give her life and act as "a balm on the wounds" of her wings. Every morning, one of her friends pulls aside the bed curtain and makes her get up for breakfast. "Each day we think of something to do, so by the end of the day we can tell ourselves, 'We lived today,'" one of our sources explains.

  Thirty-five-year-old Vida was charged with distributing anti-government propaganda and working against national security

  Others spend their time reading poetry, singing, playing homemade card games and watching TV - there are two televisions where they can watch Iranian channels showing drama, documentaries and football. It is these small things that kept Nasim going while she waited for her sentence, under the constant threat of execution. When the sentence finally came, she was given six years in prison, 74 lashes and 20 years in exile in a small town far from Tehran. She had been charged with distributing propaganda and drawing arms against the Islamic Republic. Despite the severity of the sentence, Nasim felt she could breathe again, and embrace the life she thought she had lost. Three other women in the wing have been sentenced to death for drawing arms against the regime or affiliation to armed groups. However one of them has had her sentence overturned. More than 800 people were executed in Iran last year - the highest number in eight years, according to Amnesty International. Most were for crimes involving violence and drugs. A handful were women. So every Tuesday, the women protest against executions, chanting in the prison yard, refusing to move all night and staging hunger strikes. The campaign has spread through jails across Iran, gaining international support. On the anniversary of Mahsa Amini's death the women in Evin burned headscarves. There have been repercussions - sometimes the guards raid their cells and women have been beaten and injured. They can also be taken for further interrogations, put back in solitary confinement or have phone calls and visits blocked. Most of the guards are women and "sometimes they are kind, sometimes they are cruel and hard-hearted, depending on what orders they receive from a higher authority", says one of our sources. The Iranian government routinely denies allegations of human rights violations, saying conditions inside Evin prison meet all necessary standards and prisoners are not mistreated.

  As Rezvaneh's due date approached, the prison authorities allowed her to temporarily leave prison for the birth. In October, she had a baby girl. But her joy and relief at the safe arrival of her daughter is mingled with fear, sadness and anger. Her husband was not allowed out of prison with her, although she has been able to take their daughter to visit him in Evin. And because of the stress, Rezvaneh has struggled to produce breastmilk. She is expecting to be recalled to Evin prison soon with her baby daughter to serve the rest of her five-year sentence - if she's not granted an early release, that could be nearly four years. Babies are usually allowed to stay with their mothers in jail until the age of two. After that they are often sent to a close relative, or if that is not possible, they might be placed in a children's home. But rather than stop the inmates, one prisoner has said the challenges they face have made her "braver and stronger," supporting their belief that "the future is clear: to fight, even in prison".

  One of Vida's paintings shows the hills north of Tehran which can be seen from Evin

