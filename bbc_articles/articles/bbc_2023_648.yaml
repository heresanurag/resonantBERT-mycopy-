title: Lucky escape after bus plunges into Turkey lake - BBC News
date: '2023-01-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-64414073
content: |-
  CCTV shows the driver lose control of the steering wheel in an accident that left no-one seriously hurt.

  CCTV from on board the bus shows the driver lose control of his steering wheel before entering the lake.

  The driver was trying to board a ferry before the accident. Luckily, nobody suffered life-threatening injuries.

  This video has no sound.
