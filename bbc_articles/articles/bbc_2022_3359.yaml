content: |-
  People hoping to escape besieged cities in Ukraine are forced back to shelters, as fresh shelling is reported elsewhere.

  Visa and Mastercard pull out of Russian market

  The payments giants Mastercard and Visa have announced that they are suspending their operations in Russia in protest over the invasion of Ukraine. In a statement, Mastercard said that Russian banks would no longer be supported by its network and any card issued by the company outside of country would not work at Russian merchants or ATMs. The company said it had listened to representations from partners and taken its decision due to the "unprecedented nature of the current conflict and the uncertain economic environment". Meanwhile, Visa said that it would work to cease all transactions in the country in the coming days, adding that Visa cards issued by financial institutions outside of Russia would also stop working in the country' territory. Al Kelly, Visa's CEO and chairman, said the company had been "compelled to act following Russia’s unprovoked invasion of Ukraine, and the unacceptable events that we have witnessed". “We regret the impact this will have on our valued colleagues, and on the clients, partners, merchants and cardholders we serve in Russia. This war and the ongoing threat to peace and stability demand we respond in line with our values,” he concluded.
