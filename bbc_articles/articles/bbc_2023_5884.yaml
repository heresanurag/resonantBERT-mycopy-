title: Emergency alert sounds on UK phones - but silence for some - BBC News
date: '2023-04-23'
section: UK
url: http://www.bbc.co.uk/news/live/uk-65330397
content: |-
  The alert was testing a new system for use in life-threatening emergencies but some people are yet to receive the notification.

  This is how the alert appeared for users who did receive it Image caption: This is how the alert appeared for users who did receive it

  As we've been reporting, quite a few people didn't get an alert on their devices. Now the Three network has tweeted saying it was aware "that a number of customers" were affected.

  "We're working closely with the government to understand why and ensure it doesn't happen when the system is in use," it adds.

  We've been hearing from Three network-users who didn't get the alerts.

  Neil says out of the three phones in his household, none received the alarm. “Common theme is they’re all on the Three network,” he added.

  And a Three employee, who wishes to remain anonymous, told us:

  Quote Message: Not one staff member with a Three SIM got the alert. On the intranet a lot of staff are talking about how nobody with a Three SIM they know got an alert" Not one staff member with a Three SIM got the alert. On the intranet a lot of staff are talking about how nobody with a Three SIM they know got an alert"

  Although, this was not the case for everyone. Yvonne, who is also with Three, did not get the alert but her friend, also on Three, did.
