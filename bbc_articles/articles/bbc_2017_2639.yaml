id: bbc_2017_2639
title: '''Glamour and disability can mix'' - BBC News'
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/business-39056075
content: |-
  Hulya Arif is one of a number of disabled women breaking into the beauty business.

  Hulya Arif is a business entrepreneur who started her Pro Beauty Clinic in Dulwich, south London, two years ago. She specialises in treatments that other clinics don't offer.

  Hulya is also disabled, suffering from a rare disorder called transverse myelitis, meaning she is partially paralysed from the chest down.

  But she argues there is no reason disabled people should feel shut out of the world of glamour.
