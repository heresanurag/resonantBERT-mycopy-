title: Raising children 'in a box room' - BBC News
date: '2017-02-08'
section: General
url: http://www.bbc.co.uk/news/uk-38902881
content: |-
  Mums Abigail Tumfo, Sheila Navacroft and Shakeria Wright describe the difficulties of raising their children in one room.

  Mums Abigail Tumfo, Sheila Navacroft and Shakeria Wright have told BBC Newsnight about the difficulties of raising their children in one room.

  They are all living in a 45-room development in Welwyn Garden City, after being forced to leave private rented accommodation in Waltham Forest in London, where council housing is sparse.

  Waltham Forest council has said it does all it can to house people in the borough, and is working to repair any sub-standard housing.
