  The pacts added that both the countries would also help the UK in a crisis.

  The outgoing prime minister said at the time the agreement would become the "foundation of an intensification of our security and our defence relationship in other ways as well".

  Following Russia's invasion of Ukraine in February, Sweden and Finland submitted applications to join Nato, also in May.

  The alliance's secretary general Jens Stoltenberg called it "a historic moment, which we must seize".

  Out of the 30 members of Nato, 23 have already ratified the membership.

  However, Turkey only agreed to offer approval if the two nations agreed to extradite people it regards as terror suspects.
