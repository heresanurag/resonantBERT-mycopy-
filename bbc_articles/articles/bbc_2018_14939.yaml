title: Linton railings crash escape leaves police 'speechless' - BBC News
date: '2018-12-15'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-46578052
content: |-
  The metal railings came through the windscreen, but missed the driver and his passenger.

  The metal railing avoided both the driver and his passenger when it came through the windscreen

  Police officers were left "speechless" that a driver and his passenger were uninjured when railings pierced their windscreen.

  The car, driven by a male who passed his test weeks ago, crashed on a frosty road near a water pumping station in Linton, Cambridgeshire, on Friday.

  He had a front-seat passenger and police said they were "thankfully going home to their families uninjured".

  The roads policing team for the area said: "Please drive to the conditions".

