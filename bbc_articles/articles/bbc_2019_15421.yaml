title: Speaker Sir Lindsay Hoyle reveals diabetes diagnosis - BBC News
date: '2019-12-20'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-50865877
content: |-
  Sir Lindsay Hoyle was diagnosed with the condition shortly before the general election.

