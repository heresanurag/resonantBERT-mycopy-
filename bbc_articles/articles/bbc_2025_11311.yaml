  Three days of mourning were declared in Austria following the attack, and a nationwide minute's silence was held on Wednesday at 10:00 local time (08:00 GMT) in memory of the victims. The Austrian flag has been lowered to half-mast on all public buildings. After the minute's silence in Graz's main square, one woman, Tores, told BBC News that she knew one of the boys who had died. He was 17. "I've know this family for a long time, including the son of the family, and knew that he attended that school. I rang immediately, to ask if everything is OK. Then they let me know at midday, that the boy was one of those slaughtered," she said. The incident is the deadliest mass shooting in Austria's recent history. In 2020, jihadist gunman Kujtim Fejzulai shot four people dead and wounded 23 others on a rampage through Vienna's busy nightlife district. Meanwhile, in 2016, a gunman opened fire at a concert in the town of Nenzing, killing two people before shooting himself dead. Eleven other people were injured in the attack.
