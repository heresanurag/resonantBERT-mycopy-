title: Moment SUV driver narrowly escapes train collision - BBC News
date: '2025-02-13'
section: General
url: http://www.bbc.co.uk/news/videos/c8d93dd63v2o
content: |-
  The driver managed to flee with seconds to spare after their vehicle was pushed onto a train track in Utah.

  Footage released by Utah Transit Authority captures a driver's narrow escape from a train collision in Layton, Utah. The vehicle can be seen stuck in front of the train crossing arms, after being rear-ended by a pickup truck onto the tracks. Failing to reverse, the driver exits the car seconds before impact. No injuries were reported, according to local media.
