id: bbc_2025_5413
title: Anger over JD Vance 'random country' peacekeeping remark - BBC News
date: '2025-03-05'
section: Politics
url: http://www.bbc.co.uk/news/articles/czx7w7q7qzro
content: |-
  The US vice-president faces criticism after saying troops from "some random country" will not deter Russia.

  The US vice-president has sparked a row with his comments about a potential peacekeeping force in Ukraine. UK opposition politicians accused JD Vance of disrespecting British forces after he said a US stake in Ukraine's economy was a "better security guarantee than 20,000 troops from some random country that hasn't fought a war in 30 or 40 years". The UK and France have said they would be willing to put troops on the ground in Ukraine as part of a peace deal. Vance has since insisted he did not "even mention the UK or France", adding that both had "fought bravely alongside the US over the last 20 years, and beyond".

  However, he did not specify which country or countries he was referring to. In a post on social media, Vance added: "But let's be direct: there are many countries who are volunteering (privately or publicly) support who have neither the battlefield experience nor the military equipment to do anything meaningful." So far only the UK and France have publicly committed troops towards policing any potential peace deal in Ukraine, although Prime Minister Sir Keir Starmer has previously said a "number of countries" have agreed to. Vance's comments came as the US paused military aid to Ukraine, following an explosive spat between President Donald Trump and Volodymyr Zelensky in the Oval Office last week. Zelensky left the White House before a proposed deal on sharing Ukrainian minerals with American companies could be signed. Speaking about the proposal, Vance told Fox News: "The very best security guarantee is to give Americans economic upside in the future of Ukraine. "That is a way better security guarantee than 20,000 troops from some random country that hasn't fought a war in 30 or 40 years." Sir Keir has said US security guarantees - such as air cover - will be needed to deter Vladimir Putin from invading Ukraine again, if there is a deal to end the war. However, Trump has so far refused to pledge this, instead arguing that US workers in Ukraine as part of a minerals deal could provide such assurances.

  Speaking in the French Parliament, France's Armed Forces Minister Sébastien Lecornu welcomed that Vance had "corrected his remarks". He paid tribute to the memory of French soldiers who had died in recent decades, earning applause from French MPs by saying they "deserved the respect of our allies". Conservative shadow defence secretary James Cartlidge pointed out both the UK and France deployed forces alongside the US in Afghanistan, adding: "It's deeply disrespectful to ignore such service and sacrifice." Asked about Vance's comments later, Conservative leader Kemi Badenoch said the vice-president did not call Britain a "random country". "A lot of people are getting carried away. They're saying loads of things and getting quite animated. Let's keep cool heads," she said. Reform UK leader Nigel Farage said Vance was "wrong, wrong, wrong", adding that the UK "stood by America" for 20 years in Afghanistan. Liberal Democrat defence spokesperson Helen Maguire, a former captain in the Royal Military Police who served in Iraq, urged the UK's ambassador to the US, Peter Mandelson, to call on Vance to apologise for the comments. "JD Vance is erasing from history the hundreds of British troops who gave their lives in Iraq and Afghanistan," she said. She later told the BBC Vance's comments "were clearly referring to the UK and France", adding that they were "deeply disrespectful".

  Conservative MP Ben Obese-Jecty, a former British Army officer who fought in Iraq and Afghanistan, said: "The disrespect shown by the new US vice-president to the sacrifices of our service personnel is unacceptable." Speaking after Vance posted on social media to defend his comments, Obese-Jecty told BBC Two's Politics Live programme: "It's difficult to see who he was talking about, if he wasn't talking about Britain and France." He called on the vice-president to clarify which countries he was referring to, and to apologise, adding that Vance had caused "real offence". Downing Street refused to be drawn on whether the prime minister found the comments insulting or disrespectful, but said he was "full of admiration for all British troops who have served, for instance in Iraq and Afghanistan". The UK joined the US invasion of Afghanistan in October 2001, following the 9/11 attacks, with France also sending forces to the country. More than 150,000 British personnel have served in Afghanistan over the last 20 years, with the final troops withdrawing in 2021. The UK was also part of a US-led invasion of Iraq in March 2003, with British forces in the country peaking at 46,000.

