title: 'England 5-0 Czech Republic: Gareth Southgate''s side live up to the hype -
  BBC Sport'
date: '2019-03-23'
section: General
url: http://www.bbc.co.uk/sport/football/47675815
content: |-
  England raised expectations by reaching the World Cup semi-finals and their subsequent performances raise the prospect of greater glories, says Phil McNulty.

  England's years of living down to expectations are over - now the difficult part will be keeping a lid on the rising hopes and anticipation surrounding Gareth Southgate's exciting young side.

  The euphoria of a surprise run to the World Cup semi-finals in Russia was tempered by the sense of a missed opportunity after they were beaten in extra time by Croatia in Moscow and failed to reach their first final for 52 years.

  As Wembley rose in unison at the end of this emphatic 5-0 thrashing of the Czech Republic there was the sense that Russia was simply the start of something very special for England and this emerging generation of players.

  The Czech Republic were compliant opponents, barely offering a threat and with several accidents waiting to happen in defence - which duly occurred.

  England were ruthless and dynamic. They were simply too fast, too mobile, too good - and no-one should pour cold water on that.

  And after their advance to the final stages of the inaugural Nations League in Portugal in June, secured by their first win in Spain in 31 years and a superb comeback to exact revenge over Croatia at Wembley, there is every reason to believe this England team is not just here to stay, it is going to get better.

  It was crucial England capitalised on the wave of goodwill that accompanied them back from Russia. The nation loved their football team again and momentum needed to be maintained.

  It has not simply been maintained. It has been gained.

  And at the head of it all was Manchester City's Raheem Sterling, now the mature, high-class player everyone assumed he would become when he first demonstrated his brilliance at Liverpool.

  Sterling, still only 24, has become the complete forward under Pep Guardiola's guidance at City. Southgate's careful handling and support during much of a three-year spell in which he never scored an England goal in 27 games is now reaping its reward.

  Southgate never wavered. He insisted he could not understand questions about Sterling's place in England's side. They were not words to bolster fragile confidence. They were delivered with conviction and belief.

  Sterling now has 24 goals for club and country this season. He is flourishing in the Premier League, Champions League and with England. He is naturally gifted but now more clinical - and there is more to come.

  This is a message that applies to this England side, a team now confident in itself and with the growing confidence of supporters who became accustomed to bitter disappointment. As recently as 2016, they were bundled out of the Euros by Iceland in the last 16 under Roy Hodgson's management.

  England's first goal against the Czechs summed up their fluidity, confidence and cutting edge.

  It was a passage of 25 passes in which only Dele Alli did not touch the ball. Even goalkeeper Jordan Pickford was involved before the final thrust from Harry Kane's clever pass inside the defence, Jadon Sancho's perfect cross and Sterling's sliding finish.

  Kane has now scored 16 goals under Southgate, 11 more than any other player. Sterling is another who is among the first names on the manager's teamsheet.

  What adds to the excitement is the lengthening undercard of young, precocious talent with the confidence to not simply stand alongside their more experienced, established England team-mates but to push them for their places.

  England's evolution has picked up pace rapidly since the World Cup - which was crucial - and the evidence of future potential was paraded before elated fans at Wembley.
