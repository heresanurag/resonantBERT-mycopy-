  Sancho, just 18, wore the England shirt that used to weigh so heavily on so many before him like it was a perfect fit.

  If anything, the Borussia Dortmund youngster was almost too confident, too eager early on before all of his burgeoning talent came to the fore.

  Sancho had the vision and composure to play in Sterling for the first, then brought England's fans to their feet with two quick-fire pieces of sleight of foot in the Czech penalty area.

  And the substitute appearances of 20-year-old Declan Rice and Chelsea's Callum Hudson-Odoi - the youngest player to make his debut for England in a competitive international, aged just 18 years and 135 days - gave another tantalising glimpse into the future.

  It was the first time in 138 years that England had fielded two players aged 18 or younger (Sancho and Hudson-Odoi) in an international.

  Southgate's own boldness deserves credit here. It is hard to imagine any of his predecessors thrusting a rookie such as Hudson-Odoi into his England debut before he had even made his first Premier League start at Chelsea.

  This is another sign that the emphasis has changed around England.

  And with the likes of Liverpool's Trent-Alexander Arnold and Joe Gomez, Manchester United's Marcus Rashford, Jesse Lingard and Luke Shaw and Manchester City's John Stones to come back from injury - plus midfield quality in the shape of Southampton's James Ward-Prowse and Leicester City's James Maddison - there will be some very hot competition for places to add to England's edge.

  England look a team perfectly equipped for the modern game in attack with pace, mobility and threat. The midfield has yet to pass the stiffest tests but Rice's switch from the Republic of Ireland may provide the missing link in that department.

  The same questions can be applied to England's defence in the face of this flimsy Czech Republic side but this was not a night for quibbling or negativity. This was a night when England delivered on the hype.

  They are now unbeaten in their past 40 qualifying matches in the World Cup and Euros, winning 31 and drawing nine since a 1-0 loss to Ukraine in October 2009 - but rarely in that sequence has there been the sort of hope and optimism that surrounds this group of players.

  Now the good work must continue when England face Montenegro in Podgorica on Monday.
