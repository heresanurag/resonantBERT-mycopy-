title: 'Battersea: Woman and child injured in London flats blaze - BBC News'
date: '2021-10-12'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-58892014
content: |-
  At its height, about 70 firefighters were involved in tackling the blaze at the flats in Battersea.

  The blaze was brought under control at about 20:50 BST on Tuesday, according to London Fire Brigade

  A child was taken to hospital following a blaze at a tower block in south London on Tuesday night.

  A woman was also injured and 50 people were evacuated after a flat on the 20th floor of the building in Westbridge Road, Battersea, caught light.

  One person who lives on the 20th floor said she first heard "an explosion" and then saw flames "gushing out".

  London Fire Brigade (LFB) said the fire was thought to have been accidental and caused by a candle.

  Fire crews had been called to the scene shortly after 20:00 BST, with about 70 firefighters battling the blaze at its height.

  At its height, about 70 firefighters were involved in tackling the blaze

  A resident who lives on the 20th floor said she called 999 after hearing "an explosion from next door".

  "The smoke took on quick, then it just started engulfing the whole landing," she said.

  "The flames were just gushing out of the flat."

  Another neighbour on the same floor said she and her children fled down 20 flights of stairs.

  "I instantly just got wet towels and put it over their faces," she said. "They came out with no shoes on, nothing.

  "A man helped me carry my son down the stairs and my other son was helping my daughter."

  LFB said the flat had been destroyed by the fire

  She said her family was not offered any first aid from the ambulance and Wandsworth Council did not tell them about any overnight accommodation being available.

  "The man from the council was just oblivious," she added. "They said they didn't know there was a fire."

  Claire Walsh, who lives on the third floor, said "everyone was screaming" and "banging down neighbours' doors" as they tried to evacuate.

  "There's no sprinklers, there's no fire alarm system, there's no nothing, so we literally relied on each other to get out of the building," she said.

  Fifty people were evacuated from the building

  Ishika Deb, who lives nearby and witnessed the blaze, said it had "started with a loud bang" and "the glass exploded".

  "I was outside with my neighbour and glass started pouring out from the flats," she said.

  Another witness said residents who had left the building were taken to nearby pubs while fire crews dealt with the blaze.

  "A lot of people are crying. There are children in their pyjamas and people carrying their cats," he said.

  Fire crews tackled the blaze on the 20th floor

  LFB said the blaze had completely destroyed the flat on the 20th floor of the building.

  Station commander Pete Johnson explained that there had been "lots of visible flame" when firefighters first arrived at the scene.

  "Crews were faced with a lot of smoke issuing from the top of a block of flats," he added.

  The fire was under control by 20:55, LFB said.

  Speaking about the council's actions following the blaze, a Wandsworth Council spokesman said: "We arranged for a nearby community centre to be opened as an emergency shelter but fortunately the fire was dealt with quickly and efficiently so this was not needed.

  "We spoke to the small number of residents affected by smoke and water damage and offered them overnight emergency accommodation but they chose to stay with friends and relatives.

  "If anyone requires further housing assistance tonight we will of course arrange that."

