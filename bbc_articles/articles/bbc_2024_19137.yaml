content: |-
  An asylum seeker says he feared for his life when masked rioters broke into his accommodation during violent unrest in Rotherham.

  An asylum seeker has shared footage of the panic inside the Rotherham asylum hotel when masked rioters broke in earlier this month.

  Abdullah, an Iraqi Kurd, had been in the UK for four months, having arrived in the country by boat, when the incident took place at the Holiday Inn Express in Manvers.

  Watch footage taken by Abdullah and others from inside the hotel, which came under attack by a large crowd on 4 August - Abdullah's birthday - showing people shouting threats and obscenities at those inside.
