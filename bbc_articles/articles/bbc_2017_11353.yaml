title: Anzac soldier 'reunited' with brothers killed in WW1 - BBC News
date: '2017-11-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-lincolnshire-41946945
content: |-
  Harold Beechey was one of five brothers killed in WW1 who have been remembered as part of a symbolic reunion.

  Harold Beechey was one of five brothers killed during World War One. He was blown up by a German shell on a French battlefield after surviving conflict in Gallipoli and Egypt.

  Crosses made of Lincoln limestone have been placed around the world to reunite Harold symbolically with his four brothers. His cross is at the Anglican Cathedral in Perth, Western Australia.
