  This was the first summer Olympics to be held since Russia's ban for its great state-sponsored doping scandal. And yet you would have hardly noticed. While the team, flag and anthem were officially barred, more than 330 athletes represented the 'ROC', and performed better than Russia did at either the 2012 or 2016 Olympics. For many critics, a top five finish in the medal table makes a mockery of the punishment, and taints the legacy of Tokyo 2020, proving the inherent weakness of authorities charged with protecting clean sport. Given the restrictions on anti-doping officials during the pandemic, it would also be little surprise if, as with other recent Games, a number of results end up being changed, and medals re-awarded in the years to come, thanks to retrospective testing. Given the spate of athlete welfare scandals in recent years, a new emphasis on winning 'in the right way', and expectations that the Team GB medal tally would suffer a 'correction' after the remarkable second-place finish at Rio, the haul achieved in Tokyo will be seen as a major triumph. The failure of traditional powerhouse rowing will see funding agency UK Sport come under pressure to redistribute some of the millions it receives, but any disappointment has been balanced by the success of other disciplines, especially those like BMX and skateboarding, which have the potential to attract new and younger audiences. To have won as many medals as in London, and in more sports than any other nation is a significant achievement, and many will now desperately hope that this translates to a new emphasis by policy-makers on community and school sport, after the damage lockdowns have done to participation rates and grassroots facilities. Many thought a new focus on duty of care would mean less medal success, but perhaps Tokyo proves it need not be 'either or'. Eight years ago I was in Buenos Aires to see Tokyo awarded the 2020 Games. Just as the city's first Olympics in 1964 was about re-emerging from the impact of World War Two, the promise to use its second to symbolise the country's recovery after the 2011 earthquake and tsunami disaster was a compelling one. Instead of course, it was another huge crisis that has come to define this event. But ultimately, even something as monumental as the pandemic could not deny the Games. Many will be relieved. Others dismayed. And whether it was right that the Olympics happened at all will always be a matter for debate. But what seems certain is that, as ever, the athletes proved an uplifting and irrepressible force, even in these times of doubt.
