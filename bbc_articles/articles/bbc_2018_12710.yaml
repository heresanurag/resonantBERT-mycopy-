title: App brings back the voice of 34-year-old cancer patient - BBC News
date: '2018-10-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-coventry-warwickshire-45960123
content: |-
  Craig Robinson has had his voice box removed but is still able to use his own speech thanks to an app.

  Craig Robinson was diagnosed with extensive tongue and throat cancer earlier this year.

  As a result, he had to have his voice box removed at the age of 34.

  But thanks to smartphone technology, the resident of Bedworth, Warwickshire, is still able to communicate using his own voice.

  Macmillan Cancer Support staff at University Hospitals Coventry and Warwickshire Trust helped him access technology in the US that allowed him to record 1,400 sentences before his operation.
