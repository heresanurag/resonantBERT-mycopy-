  PGMOL taking new Coote allegations 'very seriously'

  David Coote officiated his first Premier League game in 2018

  Referees' body PGMOL says it is taking new allegations around Premier League official David Coote "very seriously". Coote is suspended from his role pending an investigation into a video which emerged earlier this week, in which the 42-year-old appeared to make disparaging remarks about former Liverpool manager Jurgen Klopp. Uefa, European football's governing body, has also launched its own investigation and suspended Coote. On Wednesday, the Sun newspaper published pictures it says were taken during this summer's European Championship, alleging they appear to show Coote sniffing a white powder through a rolled up US bank note. Coote was working at the Euros in his capacity as a match official. A PGMOL spokesperson said: "We are aware of the allegations and are taking them very seriously. "David's welfare continues to be of utmost importance to us and we are committed to providing him with the ongoing necessary support he needs through this period. We are not in a position to comment further at this stage."
  • None 'Crisis for referees and fuel for toxic fan conspiracies'

  The Sun says images of Coote were sent to a friend on more than one occasion during the tournament. Neither the pictures nor the video have been verified independently by the BBC, which has approached Coote for comment. Uefa said an investigation has been launched into a potential violation of its disciplinary regulations with an "ethics and disciplinary inspector appointed". The European governing body said Coote had been withdrawn from an international commitment this week and added: "The Uefa Referees Committee immediately suspended David Coote until further notice on 11 November - in advance of the upcoming round of Uefa matches - when it became aware of his inappropriate behaviour."
