content: |-
  Great Britain's defending champion Max Whitlock reaches the pommel horse final at the Tokyo Olympics with a score of 14.900.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's defending champion Max Whitlock safely reached the pommel horse final at the Tokyo Olympics. Whitlock was third after scoring 14.900 points, with the top eight making the 1 August final. Ireland's Rhys McClenaghan was joint leader in the pommel standings after a score of 15.266. Britain also reached the team final, qualifying in fifth with a points tally of 256.594. The quartet of Whitlock, Joe Fraser, James Hall and Giarnni Regini-Moran qualified in fifth place.

  Whitlock had been cheered on from home by his two-year-old daughter Willow in a video posted on social media by his wife Leah, and admitted to being relieved after qualifying. "I can say on behalf of every gymnast that qualification is the hardest and most nerve-racking thing ever, because everything rides on it," said Whitlock.

