  Joe Fraser was Britain's top all-around scoring gymnast, accumulating 86.298 across the apparatus to qualify in fifth place for the final where he will be joined by James Hall, who scored 84.431 for 12th. Fraser will also be in the parallel bars final, with the 2019 world champion qualifying in sixth with15.400.

