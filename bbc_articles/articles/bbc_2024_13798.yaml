title: 'Wetherspoons: Man steals children''s cancer charity collections - BBC News'
date: '2024-06-03'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c900ke2d898o
content: |-
  The pub manager pleaded with the burglar to leave the boxes, but he refused and said he had a knife.

  A man who stole three children's cancer charity collections in a pub break-in and threatened the manager has been sentenced. Police said Jonathan Blundell broke into Lloyds No.1 bar, in Carlton Street, Nottingham, at about 02:30 BST on Wednesday. The manager of the Wetherspoons pub pleaded with him to leave the boxes – but Blundell refused, and said: “You better let me out...I’ve got a knife on me." At Nottingham Magistrates' Court, Blundell was handed a seven-month jail term suspended for 12 months.

  Sgt Liz Johnson said: “It is despicable that Blundell targeted charity boxes"

  Nottinghamshire Police said CCTV footage showed Blundell, of no fixed abode, smash a window and climb into the pub. The collection boxes were attached to the bar by a chain, but the 35-year-old then broke them off. The manager told officers he came downstairs to find the burglar with boxes in his arm, and Blundell told him he had a knife. No knife was produced, and he left the pub. The manager followed Blundell into the street and, with the help of two members of the public, retrieved the boxes. Blundell fled and was arrested hours later after a patrolling officer recognised him from CCTV footage.

  Blundell climbed in through the window after breaking the glass

  At Nottingham Magistrates’ Court on Thursday, he admitted burglary with intent to steal. He also pleaded guilty to using threatening, abusive or insulting words that were racially aggravated after verbally attacking a police officer in custody. Sgt Liz Johnson said: “It is despicable that Blundell targeted charity boxes after breaking into this premises. “Thanks to some excellent police work, we were able to arrest and charge Blundell within hours of him burgling the pub. “I’m pleased he has already been sentenced for his crimes, for which there can be no justification." Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
