title: Man found dead inside house was West Midlands paramedic - BBC News
date: '2024-06-27'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/cye0nkdnp62o
content: |-
  The ambulance service confirms that one of the two people found dead was a member of staff.

  A man found dead at a house was a paramedic working in the West Midlands, the region's ambulance service has confirmed. A murder investigation was launched after the bodies of two people were found at a home on Alpine Drive in Hednesford, Staffordshire, at about 12:30 BST on Tuesday. Police believe them to be 24-year-old Daniel Duffield from Cannock and Lauren Evans, 22, from Bridgend in south Wales, though formal identification has yet to take place. West Midlands Ambulance Service said Mr Duffield had been employed by the trust at its hub in Willenhall.

  Senior operations manager Richard Barratt said: “Daniel Duffield was a well-known member of staff and always keen to help and support his colleagues. His death at such a young age is a great tragedy. “I hope Daniel’s family can take some comfort from the hundreds of patients he helped through his time as a paramedic. Our thoughts go out to the families of both of those found at the scene.”

  A murder investigation was launched after two people were found dead in Hednesford

  Staff were being provided with specialist support as they come to terms with his death, the statement added. Mr Duffield was one of the paramedics who featured in the Channel 4 series 999: On the Frontline, appearing in the 11th season of the show.

  Paying tribute on Facebook, Mr Duffield’s sister said she was “distraught” and described him as the best brother she could have asked for. Staffordshire Police said the murder investigation was ongoing and that it had referred itself to the Independent Office for Police Conduct (IOPC) because of recent police contact. Detective Superintendent Nicki Addison urged people not to speculate about what happened and said the families were being supported by specialist officers.
