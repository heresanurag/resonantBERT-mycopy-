  How much attention did you pay to what's being going on in the world over the past seven days?

  This week saw Iran and Israel agree a ceasefire after 12 days of conflict, MPs vote to allow assisted dying in England and Wales, and a forced evacuation in a wildlife park after two bears staged a raid on its honey store. But how much attention did you pay to what else happened in the world over the past seven days?

  Fancy testing your memory? Try last week's quiz, or have a go at something from the archives.
