title: Mrs Hinch treated for blood clot weeks after giving birth - BBC News
date: '2025-03-14'
section: Health
url: http://www.bbc.co.uk/news/articles/c74kvegremjo
content: |-
  Sophie Hinchliffe, the social media cleaning star, says she has been treated and hopes to be home on Friday.

  Sophie Hinchliffe from Maldon, Essex has been a "cleanfluencer" since 2018

  Influencer Sophie Hinchliffe - known as 'Mrs Hinch' - has revealed she has been treated for a blood clot three weeks after giving birth to her son Vinnie. Speaking from her hospital bed and still wearing a gown, the mother-of-three said she had had an operation for the clot in her "groin, pelvis, leg area" - saying she had also suffered one back in 2018. Hinchliffe, famed for her cleaning advice on social media, said she had bumped into some of her followers in A&E so felt she needed to let people know that she was alright. In good spirits, she joked: "They hoovered out the blood clot... they literally hoovered me which is ironic isn't it."

  Patients can be at increased risk of blood clots if they have had a baby in the previous six weeks, the NHS says. Hinchliffe started sharing cleaning videos in 2018 and now has 4.8 million Instagram followers. She has also written several books including a memoir, which was a Sunday Times Bestseller. Appearing visibly emotional, she told her followers: "To cut a long story short guys, I had a blood clot... "I hadn't had one since 2018 and then another one decides to hit me three weeks postpartum. What a 12 months it's been." Hinchliffe's father died suddenly in April 2024. She announced the news she was expecting her third child in November saying there was "no doubt" her father had sent him. In the videos, she thanked the followers she bumped into in hospital calling them a "lovely bunch of people". Hinchliffe said she would be able to return home to her husband and three sons Ronnie, Lennie and Vinnie on Friday. "I cannot wait to smell my boys, pick up Vinnie - that newborn smell. OMG I swear I'm getting withdrawal symptoms from him."

  Health assessment body NICE estimates that each year, external around 1 to 2 people in every 1,000 in the UK get a blood clot - a blockage in a blood vessel which can be life-threatening if not treated quickly. According to the NHS, external, reasons for being at a higher risk of blood clots include pregnancy or having had a baby in the past six weeks, or having been in hospital, possibly after a operation. The NHS advises people to call 999 if the patient is struggling to breathe, if someone has passed out or if they are coughing up blood
