title: Murder arrest after Lloyds customer killed in bank - BBC News
date: '2025-05-06'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/ce3q3y05zxko
content: |-
  A section of the road between St Peter's Church and the HSBC branch in Derby remains taped off.

  A pedestrianised street in Derby is currently taped off

  Two men have been arrested after a customer was stabbed to death in a city centre bank. The customer, aged in his 30s, was assaulted inside the Lloyds bank in St Peter's Street in Derby at about 14:30 BST on Tuesday, police said. The pedestrianised street and nearby East Street remain taped off. A man in his 40s has been arrested on suspicion of murder, while another in his 30s was arrested on suspicion of assisting an offender.

  Both suspects were detained at about 18:00 at an address in Western Road, Normanton. They remain in police custody, Derbyshire Police said. The victim is yet to be formally identified but his family have been made aware, the force added.

  Police say the man was stabbed inside the bank

  A spokesman said St Peter's Street would remain shut for the rest of the evening. Anyone with information about the stabbing has been asked to contact police. In a statement, Lloyds said: "We are deeply saddened by the incident at our Derby branch and our thoughts are with those affected. "We are supporting our colleagues during this difficult time and will co-operate closely with the police." In a joint statement, Catherine Atkinson and Baggy Shanker, the Labour MPs for Derby North and Derby South respectively, said they had contacted emergency services "to offer our support". "This is a tragic and shocking incident," they added. "Violence has no place in our community."

