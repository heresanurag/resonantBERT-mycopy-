url: http://www.bbc.co.uk/news/articles/c0dmdmgzmnvo
content: |-
  Cristina Pittalis is still looking for her missing son Michael after police suspended the search.

  Mum's search in extreme heat for missing son in Italy

  Michael Frison went missing in Sardinia, Italy, on 13 July

  The mother of a British man who disappeared on holiday in Sardinia is continuing her desperate search without police support. Michael Frison, from Chard in Somerset, was last seen leaving for a walk in the countryside near Luras on 13 July. The 25-year-old, who grew up in Bristol, had been visiting his family and volunteering on a farm. A police search was suspended on Friday, 26 July. Since then, his mother Cristina Pittalis has been picking up leads, searching for her son throughout the night to avoid the severe Italian heat.

  Mr Frison's family have been concerned about the severe heat in Sardinia

  There is currently an excess heat weather warning in Sardinia, external, with temperatures reaching 40C (104F) in the daytime and 30C (86F) at night. Ms Pittalis has been searching villages, open terrain and cities where they have been alerted of potential sightings. Liberal Democrat MP for Yeovil, Adam Dance, made his first intervention in the House of Commons on 30 July to ask the Foreign Commonwealth and Development Office to urge the Italian authorities to continue their search.

  More than £3,000 has been raised to help Michael's family find him

  In a statement, Mr Dance said: "Michael is a constituent of mine and I was pleased to raise the issue of Michael's disappearance in the Commons last week. "We now have government attention which has led to further involvement both in the UK and in Italy to help Michael's mother Cristina find out what has happened to her son." A fundraising page has raised over £3,000 to help Ms Pattalis search for her son.

