title: Fires blaze across London and south-east England - BBC News
date: '2022-07-19'
section: General
url: http://www.bbc.co.uk/news/uk-62228790
content: |-
  The London Fire Brigade declares a major incident after a number of fires break out across the capital.

  Thick, dark smoke rose from fields, buildings and grassy areas in the capital and south-east England as fire engines tackled raging blazes on Tuesday afternoon.

  The London Fire Brigade declared a major incident and urged people not to have barbecues or bonfires due to the "unprecedented" challenges facing crews.

