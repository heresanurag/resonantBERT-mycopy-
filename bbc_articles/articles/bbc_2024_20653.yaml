title: 'Watch: Unrest grips Southport as town mourns - BBC News'
date: '2024-08-04'
section: General
url: http://www.bbc.co.uk/news/videos/c3gvqkgywnyo
content: |-
  Thirty-nine police officers were injured when disorder broke out in Southport shortly after a vigil for knife attack victims.

  Unrest broke out in Southport on Tuesday just hours after the community gathered for a peaceful vigil to remember the victims of Monday's knife attack.

  The disorder, which police said was believed to involve English Defence League supporters, began only a few streets away from Wednesday's vigil location, near to a mosque on St Luke's Road in Southport.

  Social media posts had incorrectly suggested an Islamist link to Monday's stabbing.

  Those involved threw bricks at the mosque, set fire to cars and wheelie bins and caused damage to a local convenience store, police said.
