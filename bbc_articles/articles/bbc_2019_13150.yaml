title: 'Natural history: Bangor''s part in the quagga''s missing leg - BBC News'
date: '2019-11-25'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-50239551
content: |-
  The quagga was sent to Bangor for safe-keeping during WW2 but on its return it was missing a leg.

  The quagga looked like it was part-zebra, part-horse and is now extinct

  The aerial bombing of London during World War Two saw many of the city's treasures shipped out for safekeeping.

  One of the world's rarest skeletons was sent from the Grant Museum of Zoology to Wales.

  The extinct quagga had the appearance of being half-zebra, half-horse, and died out in 1872.

  The skeleton was sent to Bangor University but on its return the museum found one of the limbs was missing and its whereabouts remain a mystery.

  Tannis Davidson is curator at the museum which is part of University College London.

  She said when it was first sent to Bangor, Gwynedd, no-one realised it was a quagga.

  That only came to light in 1972.

  Until then it was thought to simply be a zebra or a horse.

  "It is one of many mysteries here," Ms Davidson said.

  "Every specimen in the collection has an interesting mystery about how it got here.

  "It would have been used by students as a zebra from 1940 to 1972 when it was identified as a quagga."

  There are just seven quagga skeletons in the world - making it the planet's rarest

  She urged anyone who thought they might have the missing leg to get in touch.

  "Not that I want to receive 50,000 random horse legs," she said.

  "If this was a crime caper I would definitely follow up this Welsh lead," Ms Davidson said.

  But when BBC Wales called Bangor University they were unable to locate the runaway leg.

  Tannis Davidson hopes someone knows where the missing back leg is

  Senior biology lecturer Rosanna Robinson is museum curator at Bangor University's school of natural sciences.

  "We wish we could give this story legs," she said.

  "But the extensive catalogue of our Brambell Natural History Museum has not thrown up any 'horse' limbs which shouldn't be there, so the trail has gone cold at our end."

  Ms Davidson hopes the riddle might yet be solved - though the skeleton is also missing a shoulder bone.

  "It is a long-standing mystery and to have the rarest skeleton in the world fully completed again would be fabulous," she said.

