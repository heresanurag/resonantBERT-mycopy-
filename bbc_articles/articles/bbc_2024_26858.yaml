content: |-
  Scotland are comprehensively beaten by West Indies in their second match of the Women's T20 World Cup in Dubai.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland suffered their second defeat of the Women's T20 World Cup as West Indies strolled to a six-wicket win in Dubai. In another low-scoring encounter, Scotland were restricted to just 99-8 from their 20 overs, with West Indies reaching their target in 11.4 overs. Deandra Dottin, who came out of retirement to play in the tournament, rolled back the years with an explosive 28 not out from 15 balls and sealed the dominant win in style with a six. There were some nerves as the experienced duo of Stafanie Taylor and Hayley Matthews fell early for four and eight respectively, but Qiana Joseph's 31 from 18 balls provided a much-needed surge to lay the platform for Dottin. West Indies' disciplined bowling effort ensured they were chasing a modest target in spite of a sloppy fielding performance, with Scotland's Ailsa Lister dropped three times on her way to a top score of 26. Captain Kathryn Bryce added 25 as the pair tried to rebuild from slipping to 13-2, but boundaries were hard to come by with the ground's big boundaries and the slow outfield. Bryce's side were guilty of losing their wickets in clusters as two fell with the score on 13, two on 59 and two on 76, restricting their momentum considerably throughout the innings. Spinner Afy Fletcher was the pick of the West Indies bowlers with 3-22, though Matthews was let down with all three of Lister's chances put down off her bowling. It was an impressive fightback from West Indies, who were thrashed by South Africa in their opener, and will be in a strong position to take on Bangladesh in their next outing on Thursday as the quick chase gave their net run-rate a crucial boost. Meanwhile, Scotland face last year's finalists South Africa on Wednesday.

  This video can not be played To play this video you need to enable JavaScript in your browser. West Indies' Deandra Dottin hits two sixes to complete victory against Scotland

  Since winning the T20 World Cup in 2016, West Indies' struggles have been well-documented as they failed to produce up-and-coming talent to match the likes of Taylor, Matthews (who was a teenager at the time) and Dottin who were so integral to that triumph. And Dottin's knock, as well as her athletic catch to dismiss Scotland opener Saskia Horley while other chances were being spilled, proved exactly why her decision to reverse retirement excited so many. Leaning on all her experience, she initially allowed Joseph to play her expansive shots and break the back of the chase, with the 23-year-old clubbing three fours and a six in her innings from number three. Joseph executed her role to perfection as she took all the pressure off 33-year-old Dottin, but when she departed with 41 runs still needed, there was some concern that West Indies could crumple. But her wicket simply gave Dottin the freedom and responsibility of taking the game on, and she did not hesitate in putting her foot on the accelerator, clubbing the ball down the ground with ease in her trademark, brutal style as soon as the Scotland bowlers overpitched. With the game in the bag, she hit the winning runs with a reverse-sweep for four and then a straight six to deliver the message that she is back and means business.

  West Indies captain Hayley Matthews: "First of all, it does our net run-rate some justice. "As a group, starting with the ball and restricting them to 99 was good to see, the way Qiana Joseph came out was really positive in the powerplay and then Chinelle [Henry] and Deandra [Dottin] at the end, it was a really good win." Scotland captain Kathryn Bryce: "It was tricky out there, we didn't get a good start, the slow outfield meant boundaries were hard. 120 would have been a good score. "It is a difficult stage to be trying things out there, it is a big learning curve taking this forward." England bowler Tash Farrant on BBC Test Match Special: "What an impressive batting display from the West Indies. Every batter that came in, came in with intent. "I don't think Scotland bowled that badly, West Indies just outdid them in all departments today."
