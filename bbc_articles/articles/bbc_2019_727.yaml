  An easy New York cliche would tell us that if Murray could make it there he could make it anywhere.

  It didn't feel that way on Centre Court on Sunday, 7 July 2013. People had lived and died waiting for a British man to win Wimbledon, and many more were close to the edge in that last excruciating game.

  Murray was leading 6-4 7-5 5-4. He was 40-0 up. And on serve. First one championship point was lost, then another, then another, then three break points for Djokovic.

  You can't forget these moments, not when you have gone through them with a sportsman. And when Djokovic's backhand into the net ended it, after 77 years of waiting, no-one knew quite what to do.

  Murray put his hands to his head. His legs went. He booted a ball into the crowd and fell over and cried. Around the country millions were doing the same and more.

  That would have been enough. Except there was so much more, the bewilderment now coming from the fact a lot of what was to come wasn't even that anxious.

  Murray's second Wimbledon title was a fortnight of total control, sport as a nerveless execution. You could almost enjoy it. You could almost relax.

  The implausible no longer had the same power. A first Davis Cup triumph for Britain since 1936? Why not? Becoming world number one, in the most competitive era of all, when Federer, Nadal and Djokovic were stockpiling Grand Slam titles in an unparalleled arms race? Of course.

  It is one of the melancholy truths of sport that only a few of the greats get to retire on their own terms. Even the strongest, the most tactically astute, are overtaken or outshone in the end.

  Murray wanted longer. Some of his supporters will still be in a state of partial denial.

  None have been short-changed or cheated. Murray's successes were never preordained but were the culmination of a lifetime of relentless work and ceaseless ambition.

  It took him eight attempts to win Wimbledon, four semi-finals to make the final, another to finally step onto the summit. He won Grand Slams for a country that had long ago forgotten how to. He began as an awkward, gawky teenager and ended by winning BBC Sports Personality of the year three times.

  This is one ending. Murray will be remembered for another: standing under a cloudless July sky six years ago, arms aloft, a famous golden trophy glinting in the warm summer sun.

  In an era of special sporting memories, that is one to keep you warm long beyond this grey winter.
