title: 'Andy Murray: How tennis star helped create golden period for British sport
  - BBC Sport'
date: '2019-01-11'
section: General
url: http://www.bbc.co.uk/sport/tennis/46840844
content: |-
  Andy Murray is one of the special few who created a dizzy golden period for British sport that defied the old cliches of plucky defeats, writes Tom Fordyce.

  Maybe this is all Andy Murray's fault. So often over the past decade has he made the impossible real, against all precedent and logic, that you never wanted to give up on one final sweet miracle.

  It won't happen. This is not the end, only because the end has been in progress for a while now - since his first hip operation a year ago, through the painful and truncated comebacks, every time he has limped along a baseline between points like a man twice his age and with half his physical gifts.

  You don't want to believe it's the end because it still feels so early. Murray is 31. Roger Federer turns 38 in August and goes into the Australian Open looking to win his third title on the bounce. Rafael Nadal went through a three-year period where he failed to win a Grand Slam, has suffered with knee problems throughout his career and recently had ankle surgery - yet still the sensible expect him to win in Paris come early summer.

  Murray's tears in Melbourne on Friday told a different story. Maybe his body will hold up in his first-round match against Roberto Bautista Agut. Maybe he will even beat a man who beat Stan Wawrinka, Novak Djokovic and Tomas Berdych to win the Qatar Open last week.

  Even if that comes to pass - and only the sentimental and speculative would wager much on it - it changes almost nothing. "If" became "when" a long time ago.

  There will be more tears on Monday but it should also feel like a celebration. Murray has been one of the special few who created a dizzy golden period for British sport that took the old cliches of plucky defeats and oh-so-nears and submerged it in a flood of ludicrous success: successive Olympics awash with golds, fourth in a medal table, then third and then second; a British man winning the Wimbledon singles title, a Briton winning the Tour de France, those grails repeated and made commonplace.
