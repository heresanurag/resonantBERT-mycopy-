  Members of the Indian-Australian community, which makes up about 2.6% of the population, have expressed anger over the sudden ban. Some have told the BBC they feel they are being treated like criminals and "second-class citizens" for wishing to flee danger.

  Legal experts have also raised concerns that the temporary ban violates international law. That includes the right for citizens to not be arbitrarily deprived entry to their country - recognised in the International Covenant on Civil and Political Rights, to which Australia is signatory.

  The Australian Human Rights Commission said in a statement: "The Government must show that these measures are not discriminatory and are the only suitable way of dealing with the threat to public health."

  The situation in India has also put renewed focus on Australia's quarantine system, which has seen more than a dozen infection leaks since November.

  The country has successfully operated a policy of mandatory, 14-day quarantine for all international arrivals - mostly conducted in hotels.

  But the government said the spike in positive cases from India now threatened to overwhelm its quarantine system, which has capacity to handle a maximum limit of 2% of arrivals being infected.

  The Australian Medical Association, the nation's peak medical group, said the need to pause Indian arrivals was an indication of the "frailty" of the quarantine system.

  "We would rather our governments focus on fixing the quarantine system and bring Australians home, rather than extend this ban any longer than it needs to be."
