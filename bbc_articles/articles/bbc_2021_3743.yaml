title: Flu levels in Wales see 'remarkable' suppression - BBC News
date: '2021-03-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56402489
content: |-
  Only 18 cases have been recorded since the start of flu season, compared with 1,657 last winter.

  This year saw the highest ever uptake of the flu vaccine in over-65s

  A "remarkable" suppression of seasonal flu has seen only 18 cases recorded in Wales this winter, with no confirmed cases in the most recent week of data.

  This compares with 1,657 recorded cases last winter, the largest year-on-year drop ever recorded.

  Catherine Moore of Public Health Wales said measures to slow the spread of Covid had led to levels of flu in winter she had never seen before.

  But she said it could mean "slightly more severe" flu cases next winter.

  Public Health Wales has said the flu virus is not currently circulating in Wales.

  Covid restrictions have been in place for most of the typical flu season, with strict limits on social contact in place.

  Across a five-year average, flu has been the third-highest cause of death in Wales during winter months.

  However four out of the 11 leading causes of death are significantly lower than the five-year average.

  In February 2021 flu and pneumonia were the ninth-highest causes of death, 73.2% lower than the five-year average.

  The consultation rate for flu-like illnesses per 100,000 of the population hit a peak of 1.5 in early December.

  In 2019-2020, that rate hit a high of just under 40 consultations per 100,000 over the Christmas period.

  Last winter, the level of flu circulating in Wales was seen as "medium intensity" - this winter has not even come close to meeting the threshold for "low intensity".

  Consultant virologist Dr Moore said: "Any mitigation factor that we know reduces the transmission of a virus with a high transmissibility rate is likely to have a huge impact on a virus with a lower transmissibility rate.

  "So people not moving around, people hand washing, all of the distancing, face cover wearing, all of that has a huge impact on viruses that perhaps don't transmit as well as the Sars-Cov-2 virus.

  "The only time we see [figures this low] is in the summer months, when the virus is known not to be circulating.

  "To see this level of suppression is remarkable, I've never seen something like this in my entire career working with influenza."

