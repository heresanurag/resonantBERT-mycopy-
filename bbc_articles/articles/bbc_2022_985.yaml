title: 'Colorado Wildfires: Thousands evacuated as buildings burn - BBC News'
date: '2022-01-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-59837697
content: |-
  Around 30,000 people have been evacuated as wildfires sweep across the US state of Colorado.

  Wildfires have devastated parts of Boulder County in the US state of Colorado. Tens of thousands of people were evacuated from their homes on Thursday as the fire spread, destroying hundreds of homes and businesses.

  Officials have said that a mixture of dry conditions and very high winds have contributed to the destruction caused by the fire and that fatalities are likely.
