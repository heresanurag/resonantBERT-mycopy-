id: bbc_2020_12315
title: 'Vienna shooting: Pictures from scene of deadly attack - BBC News'
date: '2020-11-03'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-54789664
content: |-
  Several men opened fire at six different locations, killing at least three people, police say.

  Four people have died in a gun attack in the centre of the Austrian capital, Vienna, on Monday night.

  One suspect was shot dead by police. Austrian Chancellor Sebastian Kurz called it a "repulsive terror attack".

  The shooting happened just hours before Austria imposed new national restrictions to try to stem rising cases of coronavirus.

  Many people were out enjoying bars and restaurants which are now closed until the end of November.

  Police said the incident began near the Seitenstettengasse synagogue, which is the main temple in Vienna though it is not yet clear if that was the target.

  Roadblocks were set up around the city centre. Large numbers of police officers were seen near Vienna's world-famous opera house.

  Interior Minister Karl Nehammer said: "This is the hardest day for Austria for several years. We're dealing with a terror attack the severity of which we haven't experienced in Austria for a long time."
