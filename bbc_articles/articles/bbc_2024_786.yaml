title: Rare white penguin filmed in Antarctica - BBC News
date: '2024-01-14'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-67977693
content: |-
  A penguin with leucism from the gentoo species has been filmed in the icy climate in early January.

  A female penguin with leucism from the gentoo species has been filmed at a base in Antarctica.

  White penguins are rare because leucism is a recessive gene, and they may be more vulnerable to predators due to being more easily seen.
