title: 'Keiron Charles: Murder arrest over East Acton stabbing - BBC News'
date: '2025-04-06'
section: London
url: http://www.bbc.co.uk/news/articles/cevde8xm0yzo
content: |-
  A boy is arrested after Keiron Charles was stabbed to death in what police call an "awful incident".

  Keiron Charles was one of two teenagers found with stab wounds

  A teenager has been arrested on suspicion of murder after a 17-year-old boy was stabbed in what police have called an "awful incident". Keiron Charles, 17, was pronounced dead at the scene on Erconwald Street in East Acton, west London, at about 13:10 BST on Saturday. Another boy, aged 16, was taken to hospital with stab wounds and was arrested on suspicion of murder after his injuries were assessed as non-life-changing. A third boy, also aged 16, fled the scene but was arrested in the early hours of Sunday, the Met Police said. Both remain in custody and police are not looking for other suspects.

  The victim's family is being supported by specialist officers. Det Ch Insp Alex Gammampila said: "The thoughts of everyone in the Met remain with Keiron's family and loved ones as they begin to come to terms with their tragic loss. "Detectives have worked around the clock to follow every possible available line of inquiry and I'm pleased that we have made two arrests as part of our early inquiries. "While we are working hard to understand the exact circumstances, we are not looking for anyone else in connection with this incident at this stage."
