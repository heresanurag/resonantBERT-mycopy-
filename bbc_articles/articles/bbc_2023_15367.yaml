title: 'Storm Babet: Swimming sheepdog saves ewes stranded by flood - BBC News'
date: '2023-10-22'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67183322
content: |-
  Patsy the dog dived in into the water to herd the ewes after heavy rain caused flooding in Wales.

  A sheepdog has swum across flooded fields in Wales to herd three ewes to safety.

  Farmer Llŷr Jones said Patsy the dog dived into the water after heavy rain from Storm Babet caused flooding in the village of Llanfihangel Glyn Myfyr in Conwy county.

  "I know she's a good swimmer and I thought I'd let her have a go," Mr Jones said of eight-year-old Patsy, who earned herself an extra biscuit for guiding the sheep to safety.

  "She had no fear," said Mr Jones, who filmed the rescue effort on his phone.
