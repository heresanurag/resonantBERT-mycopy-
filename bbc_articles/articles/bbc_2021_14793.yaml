title: 'Cladding: Why must flat owners pay the bills, asks Gove - BBC News'
date: '2021-11-09'
section: UK
url: http://www.bbc.co.uk/news/uk-59216211
content: |-
  The housing secretary says the government has a responsibility to help remove dangerous cladding.

  Housing Secretary Michael Gove has questioned why flat owners should have to pay anything for dangerous cladding to be removed from their buildings.

  He said the government had a responsibility to help leaseholders - who were "innocent parties" - with the huge costs.

  Plans to make flat owners take out loans to pay for the work would be put on pause, he said.

  Mr Gove also said requirements for 24-hour fire patrols were "a rip-off".

  In the wake of the Grenfell fire, which killed 72 people in 2017, flammable cladding and other fire safety defects were discovered in hundreds of blocks of flats across the UK.

  Removing cladding can cost millions of pounds per block, with the cost often being borne by individual flat owners, under the leasehold system in England and Wales.

  Hundreds of thousands of people are still living in dangerous blocks four years on from Grenfell - while many flat owners have been left with spiralling insurance costs, service charges, and requirements for expensive 24-hour "waking watch" patrols in case of fire.

  The government has promised a £5bn Building Safety Fund to remove flammable cladding on high-rise buildings, but MPs estimated the total cost would be £15bn.

  And buildings between 11m and 18m are not covered by the Building Safety Fund, so ministers announced a loan scheme, where leaseholders would repay up to £50 a month.

  But Mr Gove told the House of Commons housing committee on Monday that he would "pause" plans for the loans.

  "I'm still unhappy with the principle of leaseholders having to pay at all, no matter how effective a scheme might be in capping their costs or not hitting them too hard at any one time.

  "My question is why do they have to pay at all?

  He said the government should help with the costs faced by leaseholders, who are "innocent parties in this" who are being asked to pay "disproportionate sums".

