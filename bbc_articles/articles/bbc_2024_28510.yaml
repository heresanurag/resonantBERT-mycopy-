title: Sidmouth house teetering on cliff after Jurassic Coast rockfall - BBC News
date: '2024-11-02'
section: Devon
url: http://www.bbc.co.uk/news/articles/cn8grjjrk7lo
content: |-
  The property, on the Jurassic Coast, is now only 40ft (12m) from a 400ft (121m) drop over the edge.

  A house is just yards from the cliff, which shows signs of previous falls

  A house has been left teetering close to the edge of a crumbling cliff following significant rockfall along the Jurassic Coast. The property, near Sidmouth, in Devon, is now only 40ft (12m) from the 400ft (121m) drop over the edge. Aerial photos reveal large sections of the cliffs, famed for their fossils, have collapsed. Nearby, tonnes of debris fell near Jacob’s Ladder, prompting East Devon District Council to urge people in a social media post to avoid the cliffs,, external which it said were "prone to rock falls, and landslides, which can happen at any time".

  A footpath from the house now ends abruptly on the cliff edge

  "We'd like to remind visitors to keep their distance from cliffs along the East Devon coastline," the council said. "Cliff falls are a natural and unpredictable occurrence along the East Devon coast." The South West Coastal Path was already closed following a cliff fall on 25 October. Drone photographer James Loveridge shared images on social media, showing the dramatic rockfall between Sidmouth and Ladram Bay.

  A huge cliff fall nearby led to the closure of the coastal path and warnings to stay away

  Signs of a collapse at the base of the cliffs are visible below the house
