title: A nervous ex-aide testifies at Trump hush-money trial - BBC News
date: '2024-05-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68924799
content: |-
  The BBC's Nada Tawfik explains what Hope Hicks, Trump's former press secretary, revealed about the hush-money deal.

  On Friday, Hope Hicks took the stand at Donald Trump's hush-money trial, admitting that she was "really nervous".

  Ms Hicks, who served as the Trump campaign's press secretary and held two stints as the White House communications director, became emotional towards the end of her testimony.

  The BBC's Nada Tawfik explains what Ms Hicks revealed about the hush-money deal and whether it was Trump or Michael Cohen who directed it.
