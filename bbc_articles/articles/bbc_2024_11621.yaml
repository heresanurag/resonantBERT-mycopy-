  Meanwhile, several jurors who convicted Hunter Biden have said politics was not a factor in their decision. "I was never thinking of President Joe Biden," one juror told the BBC. "Out of all the jurors, nobody mentioned anything about political motivations," he added. Aides to President Biden have told US news outlets that the trial and verdict have taken an emotional toll on Mr Biden, who has been closely watching the case. Politico reported that Mr Biden had been "consumed with the trial for weeks" and asked family members for updates while he was on a trip to France for D-Day anniversary events. The outlet also said Mr Biden has at times felt guilty about the spotlight that has been placed on his son, and believes his political career has contributed to his son's legal problems. According to the Washington Post, external, the president's advisers have often been reluctant to speak to him about his son and some have tried to limit Hunter Biden's public appearances. Hunter Biden will be sentenced at some point in the next 120 days, but the judge overseeing the case has not set a date for the hearing. He faces up to 25 years in prison, but legal experts say it is highly unlikely the eventual sentence will be close to that given he is a first time, non-violent offender. His legal issues are set to continue throughout the year, and throughout his father's election campaign. In September, he will face trial in California on charges of failing to pay $1.4m (£1.1m) in income taxes. If convicted in that case, Hunter Biden could face up to 17 years in prison.

