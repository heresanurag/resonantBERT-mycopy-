title: 'Windrush Day: Events mark 75th anniversary of Caribbean arrivals - BBC News'
date: '2023-06-22'
section: UK
url: http://www.bbc.co.uk/news/live/uk-65972914
content: |-
  In 1948, passengers from the Caribbean disembarked in Tilbury - the first of what became known as the Windrush generation.

  More now from Tilbury in Essex, where 75 years ago, passengers from the Caribbean disembarked from the HMT Empire Windrush at Tilbury docks to begin new lives in the UK.

  Artist Evewright is the creator of the Walkway of Memories at the port - an art and sound installation set in one of the original walkways used by the original Windrush passengers.

  Walkway of Memories is an art and sound installation Image caption: Walkway of Memories is an art and sound installation

  "I call it the family album from the Windrush generation," he says. "I asked my community to send me images of their parents, grandparents, tickets, passports, just everything and anything they could."

  "It is not just the Windrush story, it is a British story, but another type of British story," Evewright told the BBC Image caption: "It is not just the Windrush story, it is a British story, but another type of British story," Evewright told the BBC

