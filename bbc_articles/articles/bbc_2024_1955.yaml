title: 'Elm Park attack: Suspected corrosive liquid thrown at two boys - BBC News'
date: '2024-02-27'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68411400
content: |-
  Detectives release images of people they would like to speak to over the attack at a Tube station.

  Detectives have released CCTV images of three people they would like to speak to in connection with the attack

  Two boys have been injured after a suspected corrosive liquid was thrown at them at a London Tube station.

  British Transport Police (BTP) received reports of the boys having a substance thrown at them at Elm Park underground station at about 20:00 GMT on Saturday.

  The boys were taken to hospital with their injuries, which are not believed to be life-changing.

  Detectives have released CCTV images of three people who they would like to speak to in connection to the attack.

  British Transport Police urges anyone who recognises the people in the CCTV images to contact the force

  BTP urged anyone who recognises the people in the images to contact the force.

  Det Insp Marvin Bruno said: "Violence in any form will not be tolerated on the rail network and we would like to reassure the travelling public that our officers are working tirelessly to identify and apprehend those responsible."

