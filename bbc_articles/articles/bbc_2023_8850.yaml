title: 'Ballymena: Man smashes windows with a hammer in racist attack - BBC News'
date: '2023-06-26'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66018866
content: |-
  Police are treating criminal damage in Ballymena, County Antrim, as a racially-motivated hate crime.

  It is understood those targeted are Bulgarian and Portugese

  Windows at a number of houses have been smashed in a racially-motivated hate crime in Ballymena, County Antrim, police have said.

  It is understood the homes of four Bulgarian families and one Portuguese family were attacked.

  Officers were called to Larne Street at about 02:15 BST on Monday.

  The suspect is described as being a man of stocky build, wearing dark shorts and an orange top.

  Windows were smashed at a number of properties in the street

  Police said they will be increasing patrols in the area following the attack and urged anyone with information to get in touch.

  "Everyone has the right to feel safe in their home," added Insp Reid.
