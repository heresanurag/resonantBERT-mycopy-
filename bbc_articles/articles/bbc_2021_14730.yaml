title: Negative test added to vaccine passport scheme - BBC News
date: '2021-11-23'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-59387465
content: |-
  Nicola Sturgeon says vaccine passports will not be extended to more places, but from 6 December a negative test can be used as proof at venues currently covered.

  Will family coming from abroad at Christmas be able to go out?

  With travel rules at their least strict since the start of the pandemic, many Scots will welcome family members from abroad for the first time in many months over the festive period. Louise from Edinburgh asks how people from abroad can prove their status when visiting Scotland. Businesses here can accept proof of vaccination from across the UK as well as from members of the EU Digital Covid Certificate Scheme . This currently includes all EU Member States plus an additional 16 countries and territories. For countries outside the UK and the EU, certification rules for international visitors will align with the current border rules - that means visitors from other nations, such as the USA, should provide the same proof of vaccination status that they showed for entry into the UK. The letter and app on your mobile device has a QR code which they will be able to present to the venue, where staff will carry out a visual check or scan the code with a verifier app to confirm the record is authentic. A reminder, too, that you can get all the details on the Scottish vaccine certification scheme here .
