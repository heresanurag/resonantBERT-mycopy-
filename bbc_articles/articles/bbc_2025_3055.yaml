  It showed that England have the ability to dominate teams in those "championship minutes" – the times that really matter, the ones that France fluffed in the first half. Marcus Smith is a game-breaker. He score tries, he is on all the posters and is so exciting to watch - his is probably the one name that kids growing up who want to get into rugby know about. But at that level yesterday, it is very difficult to integrate those type of players into key decision-making roles. While George Furbank recovers from his injury, I think Marcus Smith will play at full-back, but I don't necessarily think he is the long-term solution there. Fin Smith showed there is a difference in the way you can compete. There has to be an element of calmness and control. For all his individual gifts – perhaps because of them - that isn't Marcus Smith's forte. I don't think it will be a difficult decision for Steve Borthwick. In opting for Marcus Smith over Freddie Steward at full-back, you sacrifice aerial security for more of an attacking threat, but I think that is a price worth paying for this England team. Long-term though, particularly with the Northampton connection, I foresee George Furbank coming back into the team at 15. It is uncompromising high-performance environment. We are now more mindful of looking after each other in the work place and that is vital and important. But this is sport and it is a strict meritocracy. If there is someone who will serve the team better, you are out. And that is OK.

  This video can not be played To play this video you need to enable JavaScript in your browser. I couldn't have dreamt France win any better - Smith

  It is up to every player to prove they either deserve to stay in the team or should oust the person in possession of the shirt. England for too long have handed out caps based on the fact that you were in the week before. It has started to frustrate me. I understand consistency is important, but the number of caps you have doesn't give you some special quality. It means so very little. When talent is coming through, you can't deny it. Tom Willis is a good example. I thought he had really steady game at number eight and the balance of the back row looked good, with Ben Earl playing at open-side flanker where he is best. You can't be scared to put these players in. We have to see what they are like in the heat of battle. There will be wobbly moments, but you will also see what they are capable of. That was certainly the case with Fin Smith.
