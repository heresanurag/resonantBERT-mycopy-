content: |-
  Rookie fly-half Fin Smith showed England there is another way to play after stepping in for maverick Marcus Smith says Matt Dawson.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  In his BBC Sport column, World Cup winner Matt Dawson examines the different outlook that rookie fly-half Fin Smith gave England in their surprise win over France. This was such a gritty performance by England, but by no means perfect. It couldn't have been. France could, perhaps should, have been out of sight. France's performance in the first 60-odd minutes was good enough to put themselves in an unassailable position, but they coughed up two or three tries. Sport is like that though. It is not about how many opportunities you create, it is about how many you take. You have to execute and seize those moments. And Fin Smith did exactly that. Over the past year, England have suffered a series of narrow defeats that have left us crying out for nouse, character and game management. When it mattered on Saturday, they had that in spades. Once England got themselves through an opening passage in which France were getting round the defence, offloading and finding space, they stood up, stayed in the fight, and worked out where to apply the pressure in the right areas.

  Fin Smith had a couple of moments, particularly in the first half, in which the reality of being at the centre of a monster Test match hit him hard. There were a few wayward kicks where he looked rushed into decisions by the faster pace of the game. But in the second half, he understood the situation. He saw that England needed to play, needed to be more ambitious. But in that decision you saw the difference between him and Marcus Smith. Marcus Smith is a brilliant runner, who breaks lines and beats defenders. No-one in the England team can do that like him. But it means that when the pressure comes on and the team needs to chase, he naturally takes that responsibility on himself and relies on his own individual ability. It will be a goosestep or a dummy. An attempt to conjure something magical out of nothing.

  Marcus Smith made 131 metres from full-back, beating two defenders and making one line break

  Fin Smith's mindset is a little different. His first thought will be how to create a situation for the team to exploit. His breadth of vision and understanding meant that he could spot those possibilities. For England's second try he saw Northampton team-mate Tommy Freeman isolated against the smaller Louis Bielle-Biarrey and put the cross-field kick on a sixpence. In that helter-skelter finale to the game, his execution was so accurate; doing the right thing at the right time and understanding the physics of the situation and how to exploit it. Nowhere was that clearer than on the final, decisive try. Outside centre Pierre-Louis Barassi, with four previous caps, was the least experienced of the France starting XV, but England hadn't been able to test him. But after a spotless line-out drill from replacements Jamie George and Ollie Chessum had provided front-foot ball, England worked it perfectly. All the different moving parts came together to unlock the France defence. Freeman's dummy run fixed Barassi, Fin Smith floated out the back beautifully and delayed his pass to bring Elliot Daly into the hole on a clever arcing line for the try. England made it look easy, but to get all those things right when you are deep in the game, with fatigue affecting your skills and the pressure bearing down, is so hard. I don't think it gets any better than to finish a game like that.

