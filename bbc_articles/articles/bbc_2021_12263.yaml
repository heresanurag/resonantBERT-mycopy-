content: |-
  Beheshta Arghand, who made headlines when she interviewed the Taliban, has spoken out after fleeing the country.

  Beheshta Arghand, an anchor for Tolo News, made headlines when she interviewed the Taliban just days after they took control of Afghanistan.

  Two weeks later, she has fled the country amid fears for her life.

  Arghand spoke to the BBC's Christian Fraser about the fears she has for her country's future.
