  On the Welsh coast, a team from Aberystwyth University use the same technology the police use at a crime scene to track changes in the marine population of Cardigan Bay. Collecting DNA traces from water samples, they show some invasive species are thriving, including a sea squirt that is believed to have originated in Japan and which grows like a carpet over the sea floor. "They prevent the growth of native organisms in the areas that they colonise," says Prof Iain Barber, head of Life Sciences at Aberystwyth University. "Because they do so well in our environment, they can potentially take over huge areas of the seabed." Species that are more invasive appear to be responding more strongly to global warming and the increasing water temperatures, Prof Barber says.

  One important factor that's made the last year more impactful in seas all over the world has been the El Niño weather phenomenon, adding to human-driven emissions of warming gases. El Niño sees warmer waters come to the surface of the Pacific. As a result, it tends to push up the global average.

  El Niño kicked into gear in June 2023 - after a prolonged period of cooler La Niña conditions - and reached a peak in December, although it has since been fading away. But other ocean basins that aren't usually affected by El Niño have also experienced record marine heatwaves - leaving scientists trying to work out exactly what is going on.

  "The Atlantic has been warmer than usual, and this is not a pattern you normally associate with El Niño - so it's something somehow different," explains Carlo Buontempo, director of Copernicus. This heat is still persisting in many ocean basins, including the tropical Atlantic. Warmer seas give tropical storms extra energy, and this could help to fuel a potentially damaging hurricane season. "There is still a large patch of warmer than usual water in the tropical Atlantic [and] this is the main development region for tropical cyclones," explains Dr Buontempo. "We are almost a month ahead in the sea surface temperature in the Atlantic with respect to the annual cycle [...] so this is an area that has to be watched." As well as these short-term impacts, researchers warn there will be long-term consequences that society will have to adapt to.

  Experts say that emperor penguin chicks have suffered as a result of warmer seas

  For example, ice-sheet melting and deep-ocean warming are likely to continue to fuel sea-level rise in the centuries to come. "When we talk about climate change, we tend to reduce that to changes on the surface because we live there," said Angélique Melet, a researcher with Mercator Ocean International. "However, the deep ocean is one of the aspects [of global warming] that is committing us to centuries and millennia of [climate] change." But Dr Melet stresses that is not a reason to give up on cutting emissions. "Depending on our actions, we can reduce the speed of that warming, and we can decrease the overall amplitude of that warming and sea-level rise."
