title: 'Climate change: World''s oceans suffer from record-breaking year of heat -
  BBC News'
date: '2024-05-09'
section: Science & Environment
url: http://www.bbc.co.uk/news/science-environment-68921215
content: |-
  Every single day of the past 12 months has seen a new global sea temperature high for the time of year.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch - 'If I were a barnacle I'd be worried' - a marine biologist talks to BBC News Climate Editor Justin Rowlatt about ocean warming

  Fuelled by climate change, the world's oceans have broken temperature records every single day over the past year, a BBC analysis finds. Nearly 50 days have smashed existing highs for the time of year by the largest margin in the satellite era. Planet-warming gases are mostly to blame, but the natural weather event El Niño has also helped warm the seas. The super-heated oceans have hit marine life hard and driven a new wave of coral bleaching. The analysis is based on data from the EU's Copernicus Climate Service. Copernicus also confirmed that last month was the warmest April on record in terms of global air temperatures, extending that sequence of month-specific records to 11 in a row.

  For many decades, the world's oceans have been the Earth's 'get-out-of-jail card' when it comes to climate change. Not only do they absorb around a quarter of the carbon dioxide that humans produce, they also soak up around 90% of the excess heat. But over the past year, the oceans have displayed the most concerning evidence yet that they are struggling to cope, with the sea surface particularly feeling the heat. From March 2023, the average surface temperature of the global oceans started to shoot further and further above the long-term norm, hitting a new record high in August. Recent months have brought no respite, with the sea surface reaching a new global average daily high of 21.09C in February and March this year, according to Copernicus data. As the graph below shows, not only has every single day since 4 May 2023 broken the daily record for the time of year, but on some days the margin has been huge.

  Around 47 days smashed the record for that day of the year by at least 0.3C, according to BBC analysis of Copernicus data. Never before in the satellite era had the margin of record been this big. The biggest record-breaking days were 23 August 2023, 3 January 2024 and 5 January 2024, when the previous high was beaten by around 0.34C. "The fact that all this heat is going into the ocean, and in fact, it's warming in some respects even more rapidly than we thought it would, is a cause for great concern," says Prof Mike Meredith from the British Antarctic Survey. "These are real signs of the environment moving into areas where we really don't want it to be and if it carries on in that direction the consequences will be severe."

  This human-driven ocean warming is having considerable impacts on global sea life and may even be shifting the seasonal cycle of sea temperatures, according to a recent study, external. Perhaps the most significant consequence of the recent warmth has been the mass bleaching of coral globally. These key ocean nurseries turn white and die because the waters they live in grow too hot. They are a critical element in the ocean ecosystem, home to around a quarter of all marine species.

  A global coral bleaching event has been declared by scientists, with Australia's Great Barrier Reef seeing record damage

  Unusually warm seas may also have taken a direct toll on one of the most beloved ocean-going creatures in the coldest continent, the emperor penguin. "There have been examples of the sea-ice collapsing before emperor chicks have properly fledged, and there have been mass drowning events," says Prof Meredith. "The emperor penguin is a threatened species because of climate change, and the sea-ice and the ocean temperatures are strongly implicated in that." In the UK, rising sea temperatures are having an impact, with a number of creatures having vanished completely from coastal locations - some barnacle species, for example. "The problem of climate change is that it's happening too quickly for evolution to catch up with it," says marine biologist Dr Nova Mieszkowska from the University of Liverpool.

