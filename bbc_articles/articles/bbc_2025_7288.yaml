  Trump has also said he is optimistic about improving trade relations with China, saying the level of tariffs - or import taxes - that he had imposed on Chinese imports would "come down substantially, but it won't be zero". Tensions between China and the US have shaken investors, with violent swings in share prices and sharp falls in the dollar. Stocks surged on Wednesday on hopes that trade tensions between the US and China could soon ease. Aside from the trade war, Bessent called on the IMF and the World Bank to refocus on the core missions of economic stability and development, arguing that they had strayed too far into vanity projects such as "climate change, gender and social issue". "These issues are not the IMF's mission," he said. Tensions between the countries have rattled financial markets, with both sides introducing strong tariffs on each other. Bank of England Governor Andrew Bailey said that he was "very frankly encouraged" by Bessent's comments on the IMF and World Bank. Although Mr Bessent said the IMF and the World Bank are "falling short" he did not call for the US to withdraw from the institutions as some conservatives have lobbied for. He said the Trump administration will use US influence at these institutions and "push them to accomplish their important mandates".
