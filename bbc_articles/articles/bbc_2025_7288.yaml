title: 'US-China trade deal: A big opportunity for one, says Scott Bessent - BBC News'
date: '2025-04-23'
section: Business
url: http://www.bbc.co.uk/news/articles/clywg25ykqno
content: |-
  The comments from the US Treasury Secretary come as the trade war between the world's two biggest economies has escalated.

  The US Treasury Secretary indicated a trade deal between the US and the UK could be on the cards, as policymakers gather in Washington

  There is an opportunity for a "big deal" between the US and China on trade, America's Treasury Secretary Scott Bessent has said. Asked about an upcoming meeting between the countries, Bessent said it would be an "incredible opportunity" to strike an agreement, if China was "serious" on making its economy less dependent on manufacturing exports. "China needs to change. The country knows it needs to change. Everyone knows it needs to change. And we want to help it change because we need rebalancing too," he said. The comments come as the trade war between the world's two biggest economies has escalated in recent weeks.

  US President Donald Trump has brought in a number of tariffs on imports to the US which he has said are aimed at increasing US manufacturing and protecting jobs. These include import taxes of up to 145% on Chinese goods, but China has hit back with a 125% tax on US products. Speaking at the Institute of International Finance conference on Wednesday, Bessent, said it was a "matter of impetus and will". "There is an opportunity for a big deal here, that the US is looking to rebalance to more manufacturing, the identity of that would be less consumption. "If China is serious on less dependence on export-led manufacturing growth, and a rebalancing towards a domestic economy... if they want to rebalance, let's do it together." The comments come after Bessent reportedly said on Tuesday that he expected a de-escalation of the trade war and that the current situation was "not a joke".

