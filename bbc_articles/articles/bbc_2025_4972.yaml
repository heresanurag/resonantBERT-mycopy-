title: 'Harry Kane: England forward says players unheard over scheduling concerns
  - BBC Sport'
date: '2025-03-26'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/ckg8kp4e64yo
content: |-
  Players are not "listened to" over their scheduling concerns, says England captain Harry Kane. The next international window takes place between 2-10 June following the conclusion of the Premier League season on 25 May and the Champions League final on 31 May. Kane's Bayern Munich are also set to be involved in the new expanded Fifa Club World Cup from 15 June to 13 July, which means the striker could go without a substantial break this summer. The 31-year-old, however, intends to play as much as possible in search of silverware. "I don't think the players are listened to that much, if I'm totally honest," he said. "But also everyone wants their piece, their tournament, their prize, and the players are kind of the people who have to get on with it. "But it is what it is. I love playing football, so I'm never going to complain about playing football. "I think if you manage it well, with your coaches and your manager and your clubs, there are ways of getting more rest in certain moments. "But it's not an easy question, it's not an easy situation. I think there could be a balance from both sides, but we'd have to see how that pans out." Kane's comments echo those made by Liverpool's Brazil goalkeeper Alisson Becker last September, while Manchester City and Switzerland's 29-year-old defender Manuel Akanji has previously said he may have to retire after his next birthday because of the fixture schedule. The Professional Footballers' Association also joined a legal action against Fifa last summer over the "overloaded and unworkable" football calendar.

  Kane scored his 71st international goal in England's 3-0 win over Latvia in a World Cup qualifier on Monday and is 20 appearances behind Peter Shilton's 125-cap record. Victory over Latvia handed new England boss Thomas Tuchel a second win in as many games at the start of his tenure following an opening 2-0 victory over Albania on Friday. Tuchel's side will reconvene in June for their World Cup qualifier with Andorra before a friendly with Senegal, during a window which the German says could be moved in the calendar. "I am not so concerned about the amount of games the players play in total," he said. "I am more concerned that they never have a real break of three to four weeks. "Maybe they have three weeks holiday but maybe after five days they play another competition. That's the problem. "They should have a minimum three or three-and-a-half weeks of preparation, then it would be better for everyone. "In general, being a club coach or international coach, the Fifa June window is, I think, debatable if this makes sense." Tuchel added: "I think it would be Fifa to align the calendar and maybe find a gap where we could put this window somewhere else, to open the window for the better of the players."
