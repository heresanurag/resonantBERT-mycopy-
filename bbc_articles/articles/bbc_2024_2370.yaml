title: People 'scared to leave' homes after burning body find - BBC News
date: '2024-02-26'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-68396876
content: |-
  Motherwell residents say they are "disturbed" by scarce details and fear an attacker could be in the area.

  This video can not be played To play this video you need to enable JavaScript in your browser. One Motherwell resident says the community will be "on eggshells" after a man's burning body was found on a football pitch.

  People in a Motherwell housing estate say they are scared to leave their homes after a man's body was found burning on a nearby football pitch.

  Police and firefighters were called to Margaret Drive at about 09:00 on Saturday after the discovery was made by a member of the public.

  Residents have told the BBC they have been "disturbed" by scarce details and fear an attacker could be in the area.

  Police Scotland has not released details on the nature of the incident.

  In its last statement on Saturday, they said a body of a man had been found and the death was being treated as "unexplained".

  A spokesperson for the force added: "Officers remain at the scene and anyone with information or concerns can speak to them."

  A body was found on a football pitch in Motherwell - the site is now covered by a small white forensics tent

  Forensic officers examined the area in detail on Sunday

  The Scottish Fire and Rescue Service said it sent two fire engines to the area shortly after 09:00 and left just before 11:00, but have not confirmed whether crews extinguished a fire.

  The Scottish Sun reported that fire crews doused the man's body.

  It was found on a football pitch which is used by local children.

  On Sunday forensic officers carried out details examinations of the park, which is also popular with dog walkers.

  A patch of ground has been covered with a white forensic tent and the park has been sealed off.

  Laura Morgan, who has lived in the area for 10 years, told the BBC her daughter is too scared to go near the site.

  Asked how the community was feeling, she said: "I think it's shock, because it is so close to home and it's such a built up area as well.

  "It's weird how it's just happened at a football pitch. The kids play football down there so I'm just glad it wasn't the football team that actually found them."

  Flynn Bryson, who also lives in the area, said rumours had been spreading about what happened.

  "We don't know if it's drug-related or even if it's a murder, it's just all rumours," he said. "All of it seems like it could be possible but at the same time all of it seems false. It's hard to really tell what's what.

  "Everyone is actually quite scared to leave their houses - and rightfully so. Anyone would be terrified. If I had kids around this area I wouldn't want them leaving the house.

  "It's really disturbing. My heart goes out to their family."

  Irene Felvus (pictured in the video above) has lived in the area for 17 years.

  She said: "People are quite shocked, we're not sure whether it's been foul play. People will be scared if someone has done it to that person - [then] they're obviously still on the loose.

  "Until we find out actually what's happened, people are obviously worried going about their everyday business."

  Formal identification of the man has yet to take place.

  Members of the public are being urged to come forward if they have any information.

