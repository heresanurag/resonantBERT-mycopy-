title: Police cars block traffic near Trump golf course - BBC News
date: '2024-09-15'
section: General
url: http://www.bbc.co.uk/news/videos/cj311xkevr2o
content: |-
  Donald Trump says he is "safe and well" after a suspect was arrested following what authorities have called an apparent assassination attempt.

  Police cars were spotted blocking traffic near a Florida golf course on Sunday, where a suspect was arrested following what the FBI says "appears to be an attempted assassination" on former president Donald Trump.

  The suspect was spotted with an AK-47 and a GoPro while near the former president, authorities have said.

  Donald Trump says he is "safe and well".
