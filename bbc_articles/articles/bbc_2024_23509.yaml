  Slide 1 of 8 , Back page of the Daily Express on 28 September 2024 , Back page of the Daily Express

  Lille braced for Angel Gomes offers, Newcastle face Marc Guehi competition and Manchester City weigh up Samuele Ricci move. England midfielder Angel Gomes, 24, is the subject of interest from Premier League and European clubs as Lille brace themselves for offers for the Manchester United academy product. (Telegraph – subscription required), external Newcastle United face competition from Liverpool and Manchester United if they make another bid to sign England centre-back Marc Guehi, 24, from Crystal Palace in January. (Football Insider), external Manchester City are weighing up a move for Torino's Italy midfielder Samuele Ricci, 23, to try to fill the void left by their injured Spain international Rodri, 28. (Guardian), external Liverpool are planning to revamp their attacking options in 2025 and eyeing a move for Borussia Dortmund's Germany winger Karim Adeyemi, 22. (Teamtalk), external England winger Anthony Gordon, 23, is close to signing a new six-year deal with Newcastle, which will come as a blow to suitors Liverpool. (Mirror), external Liverpool are interested in Freiburg midfielder Merlin Rohl, 22, who has represented Germany at under-21 level. (Bild), external Arsenal have no desire to sell Takehiro Tomiyasu, 25, despite the Japan defender being linked with a January move to Inter Milan. (Football Insider), external

  Barcelona are willing to pay former Manchester United target Frenkie de Jong his deferred wages - amounting to 18m euros (£15m) - on the condition the Netherlands midfielder, 27, agrees to leave the club next summer. (FootballTransfers), external Manchester United and Manchester City are both keen on Bayer Leverkusen and Netherlands utility player Jeremie Frimpong, 23. (Football Insider), external Wolves have been told they will need to pay £40m to secure the services of Burnley and Italy under-21 winger Luca Koleosho, 20, who is also attracting interest from Nottingham Forest and Newcastle. (Football Insider), external Manchester United have received Premier League approval to sign 16-year-old Danish forward Chido Obi-Martin from Arsenal. (Manchester Evening News), external Arsenal's Italy midfielder Jorginho, 32, is considering moving into a coaching role with the Gunners when his current deal expires in 2025. (FootballTransfers), external
