  When tickets went on sale for the tie, well before Nadal announced his farewell plans, they were being picked up for €55 (£45). On Tuesday morning €25,000 (£21,000) was needed to secure one from a resale website. Fans arrived early and patiently waited in long queues which snaked around the Jose Maria Martin Carpena Arena Spanish red and yellow was ubiquitous in the form of Nadal t-shirts, Zorro-style cordobes hats and football scarves. Inside the 11,500-capacity stadium, plenty held aloft cardboard signs - colourful and creative DIY jobs - with personal messages. Like on the gigantic banner outside, the LED screens flashed 'Gracias Rafa' during his emotional farewell speech. Gratitude and grief intertwined. Lopez believes the message summed up the mood of the nation - and beyond. "His contribution to the whole country has been massive. But not only his titles and everything he has achieved as a human being," he said. "I think 'Gracias Rafa' is something that every tennis fan in the world is thinking right now."

  The range of Nadal's appeal is broad and it was striking to see how mixed the Malaga crowd was. Young and old, female and male, groups and individuals. Nadal strikes a chord with the person on the street. He also has the King of Spain on speed dial. Some local people in Malaga this week have discussed their disappointment about his lucrative ambassadorial role with Saudi Arabia - whose human rights record has been criticised - but the majority speak glowingly. "Nadal means everything. Not only because he is one of the best players but because of how he is as a person," said Javier Ibañez, who had travelled 250 miles from Murcia for the occasion with his friend Pedro Ayala. "He has good values which we cherish. It is respect for his rivals, his humbleness, but most of all his fighting spirit. "He inspires others to fight in every problem they have in their whole life, not only in tennis." Showing a humbleness which motivates others was illustrated off court when, in 2018, he led from the front to help his home island of Mallorca recover from devastating flash flooding. Pushing away the slurry water with a bristled brush became a defining image. It also showed the love which proud homebird Nadal retains for his roots. Despite travelling to every corner of the globe to play the sport he adores, he has never permanently left his hometown of Manacor. But the talent honed by the tough-love tutelage of his uncle Toni, who guided Nadal from a toddler to his 16th major title in 2017, was too great not to be appreciated further afield.

  Nadal won 14 of his 22 major titles in Paris

  The other place with which Nadal will always be associated is Paris. The City of Love has played host to the 'King of Clay's' greatest triumphs, racking up a tally of 14 French Open victories which few think will ever be bettered. In the hours after Nadal played what has proved to be the final match of his career in Malaga, a striking piece of digital art appeared in the French capital. The installation, created by his long-time sponsor Nike, projected iconic images of Nadal onto a purpose-built stand in Trocadero. Nadal stood next to the Eiffel Tower. One Parisian icon standing shoulder to shoulder with another. When Nadal emerged as a prodigious teenager, making his ATP Tour debut in 1999 aged 15, he was known simply for being the nephew of Barcelona and Spain footballer Miguel Angel. Fast forward a couple of decades and he is retiring as one of the most recognisable athletes on the planet. "He is the biggest athlete we've had in the history of our country, by far," said Lopez, who ranked NBA basketballer Pau Gasol and World Cup-winning footballer Andres Iniesta just behind. "I say that with all respect to other athletes because we've had plenty of very good ones. "But we have experienced so many things with him that we haven't experienced with other athletes. There is no-one like Rafa."
