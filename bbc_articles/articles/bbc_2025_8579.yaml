  BBC Match of the Day pundits discussed the incident and former Wales defender Ashley Williams said: "I don't think he means it. But only Tyrone Mings knows. "I think it is the height difference in this. Mings does have a little look to see where the pressure is coming from and puts his arm out to protect the ball. It's a nasty collision." Former Newcastle and Aston Villa goalkeeper Shay Given said: "I kind of disagree. I think he knows what he's doing a little bit. He does have a look at him. He doesn't swing the elbow but he straight arms him across the jaw."
