title: 'Alex Scott: Bournemouth midfielder suffers fractured jaw - BBC Sport'
date: '2025-05-10'
section: Bournemouth
url: http://www.bbc.co.uk/sport/football/articles/cp3n97ll0ygo
content: |-
  Bournemouth midfielder Alex Scott suffers a fractured jaw from what manager Andoni Iraola describes as a "very violent" elbow by Aston Villa's Tyrone Mings.

  Bournemouth midfielder Alex Scott suffered a fractured jaw from what manager Andoni Iraola described as a "very violent" elbow by Aston Villa's Tyrone Mings. The 21-year-old midfielder went down in the sixth minute after being caught by Mings' right elbow in Saturday's Premier League defeat at Vitality Stadium. Scott required lengthy treatment but continued to play, before going to ground again holding his face after an incident involving Amadou Onana, and was subsequently replaced at half-time. Bournemouth confirmed on Sunday that Scott will undergo surgery to stabilise the jaw and will miss the final two matches of the season. Aston Villa were reduced to 10 men with 10 minutes to play when Jacob Ramsey was shown a second yellow card, but Mings did not receive a caution, to Iraola's dismay. "The second yellow that Ramsey received is not a second yellow," the Spaniard told BBC Sport. "Tyrone Mings knows what he is doing, he knew where Alex was. It was very violent. "The value of a red card in the sixth minute or the 80th minute is very different. He sees Alex coming and for me it is very dangerous. "He was almost knocked out. After the elbow we didn't know if he could continue. He wanted to continue but he was not 100%. It [was] a very violent elbow."

