content: |-
  From half-term, this group will be able to get vaccinated at national hubs, rather than at school.

  We'll only use winter plan B if NHS pressure gets too much - No 10

  The number of daily coronavirus cases in the UK reached nearly 50,000 yesterday, which would have been the first time that's happened since mid-July. No 10 says it is keeping a "very close eye" on the situation - and urged people to get their booster jabs. "We have seen case rates rising, we've started to see some indications that hospitalisations and death rates are increasing also," the PM's spokesman says. "The most important message for the public to understand is the vital importance of the booster programme and indeed for those children who are eligible to come forward and get our jab. "We're seeing some groups come forward slightly more slowly than they did perhaps when they were getting their first or second vaccination and it's important that the public understand that getting your booster jab is just as important as getting your first and second dose." And asked about whether ministers had discussed rolling out the government's "plan B" of extra rules for winter - which you can find more about here - he says: "It remains the case we would only look to use that if the pressure on the NHS was looking to become unsustainable."
