  The Luton-born singer says he'll never forget playing in front of a home crowd last May.

  ‘It’s wild’: Myles Smith on his meteoric year since Big Weekend

  Myles said it was a "proper emotional day" when he performed at the Big Weekend in Luton last May

  A year ago, Myles Smith stood on the BBC Introducing stage at BBC Radio 1's Big Weekend in his home town of Luton. Performing his newly-released single Stargazing, he could not imagine how the song – and his musical career – would take off.

  Since then, the 26-year-old won the Rising Star Brit Award, nailed the best-selling British song of 2024, toured the world and made the Time 100 list of influential people. He is back on the Big Weekend main stage in Liverpool this Saturday, before playing Glastonbury, Wembley and supporting Ed Sheeran later this summer. "It's wild," he told the BBC. "Main stage at Big Weekend is huge for me - it's one of those pinch-me moments. "I'm just trying to take it all in and enjoy the ride."

  Myles has visited 17 countries during his 2025 We Were Never Strangers tour

  In June he will appear alongside stars including Mariah Carey and Will Smith at the Capital Summer Ball at Wembley Stadium, then in July he joins Ed Sheeran for one of his homecoming gigs at Portman Road stadium in Ipswich. "Ed's been such a big influence on me growing up. To share a stage with him, especially in a place that's important to him, it's an honour." Myles recalls the "surreal" feeling of playing in his own home county last May. "I remember walking out on to that stage and just thinking, how is this real? "To be able to play Big Weekend at home, in front of people who've supported me from the beginning - it felt like everything had come full circle. "Proper emotional day. I don't think I'll ever forget it."

  "I'm proof that you don't have to come from a big city or a fancy school to make it work," says Myles

  Stargazing became the sound of the summer, streamed more than one billion times and even featuring on former US President Barack Obama's playlist. "You always hope people connect with a song, but Stargazing just seemed to take on a life of its own," Myles says. What is it about the song that resonates with people? "I think it's the honesty in it - everyone's either been through heartbreak or held on to hope when they probably shouldn't have. "It's simple, but it's real. And I think people felt that." A bigger surprise came in April 2025, as he was included in Time 100's list of most influential people,, external alongside Serena Williams, Mark Zuckerberg and Snoop Dogg. "That one caught me off guard. I never imagined I'd end up in it. It's mad. "I think I just felt really grateful, you know? To be recognised on that level for doing something I love."

  Myles was listed as a "pioneer" in the top 100 influential people in Time Magazine

  Myles admits his life has changed "massively" in the past year. "Eighteen months ago, I was still figuring a lot of things out," he said. "Now I'm touring, releasing music that's reaching people all over the world, meeting heroes of mine. "But at the same time, I'm still just me. Still grounded in the same values. Still got the same people around me." That is at the heart of how Myles is keeping it together while being thrown into the limelight. "I try to stay close to my people. My family, my team, my friends - they keep me level. "And I write. Even if it's not for a song, just getting stuff out helps. "And when I can, I get home. There's something about being back in Luton that resets everything for me."

  Myles says Luton, where he performed at Big Weekend last year, "has always been home"

  Myles remembers "a few moments" growing up that helped to build him into the musician he is today. "I had a music teacher who really believed in me - and my mum, always pushing me to keep going, even when I wasn't sure. "I used to play little open mics, local gigs when I could find them. Nothing glamorous, but those nights taught me a lot." "Luton's always been home. It shaped me."

  What would he say to young musicians growing up in Luton? "Don't wait for permission. If you love it, do it. Write the songs, upload them, play the gigs - no matter how small. "Keep going even when it feels like no-one's listening, because someone will. "I'm proof that you don't have to come from a big city or a fancy school to make it work. You've just got to stay honest and consistent."

  Connecting with people is "the best part" of his career, Myles says

  With his new EP - A Minute, A Moment - released this weekend, he says "there's loads I'm excited about – more music, more touring". "But honestly, I'm just looking forward to connecting with more people. That's always been the best part of this. "And maybe, if I'm lucky, a bit of time to breathe and take it all in."

