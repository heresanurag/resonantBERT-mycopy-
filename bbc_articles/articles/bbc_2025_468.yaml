title: 'Newspaper headlines: ''AstraZeneca ditches vaccine plant'' and Trump''s EU
  tariff threat - BBC News'
date: '2025-02-01'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c62e3p4l5l7o
content: |-
  A decision to scrap a £450m vaccine plant in the UK and fears of a global trade war lead the papers.

  The Financial Times, external leads on AstraZeneca's decision to scrap plans for a new vaccine manufacturing plant in Liverpool, calling it "a blow to the government's growth agenda". The paper says executives have warned that policies pursued by the government will make the UK a less attractive place to invest. The Times, external says it has seen letters which show that AstraZeneca asked for assurances about the plant as soon as Labour took office, but did not get a result for months. The Daily Mail, external calls the news a "sharp setback" for the Chancellor, Rachel Reeves. The paper's City editor, Alex Brummer, external, says AstraZeneca was a hero of the pandemic and that failing to support its project "makes a nonsense" of the government's goal of turning Britain into a science powerhouse. Ministers are working on an overhaul of welfare which could mean the long-term sick are required to look for work, according to the Times, external. The paper predicts that hundreds of thousands of people might have their sickness benefits cut. It says Prime Minister Sir Keir Starmer could be pitched into a bitter fight with his party, with changes likely to anger Labour's base. The Daily Mail, external says Prince Andrew "faces fresh pressure" after an email emerged undermining his claims about when he broke contact with paedophile financier Jeffrey Epstein. It calls the revelations a "bombshell" and in its editorial says they further underline how the Duke of York is a "dangerous liability" to the monarchy. The Sun, external speaks of a "humiliation" for Prince Andrew, while the Daily Mirror, external concludes that "the more we learn, the worse it appears to get for the Prince and the Royal Family". The front page of the Guardian, external features an account by its reporter in Gaza of her return to the territory. Malak Tantesh says she felt she could have "flown away with joy" when the road was finally opened. But she describes the dust, and exhaustion of the journey, and says that when she realised the family home was now rubble it was like being "stabbed in the heart". "My memories, and everything we owned", she says, "have all been crushed and buried".

  York Minster faced a backlash from parishioners over plans to hold a metal gig in its nave

  The Daily Telegraph, external carries an article by Sir Peter Lampl, founder of the Sutton Trust, who the paper describes as "Britain's most eminent social mobility expert". Sir Peter, who attended the same grammar school as Sir Keir, accuses the prime minister of denying poorer students the opportunities by imposing VAT on private schools. A government spokesman said the tax change would provide extra money for state schools, where 94% of children are educated. The Guardian, external reports on problems surrounding a rock concert scheduled to take place in York Minster in April. It's just the latest attempt by churches to open up to more people, but parishioners have complained after discovering that two members of the band, Plague of Angels, used to belong to Cradle of Filth, a metal group whose merchandise included a lewd t-shirt featuring a nun. One churchgoer said the concert was an insult. A cathedral spokesman said the event, intended to showcase the Minster's refurbished organ, would "align with its values". The band's guitarist apologised and confirmed that the two members deeply regret their involvement in Cradle of Filth.

