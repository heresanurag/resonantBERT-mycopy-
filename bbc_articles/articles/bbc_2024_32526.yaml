  BBC Verify has been tracking the territory captured by Syrian rebels as they move towards Homs.

  Rebel forces in Syria say they have taken full control of the city of Hama and appear to be moving towards Homs.

  BBC Verify has been tracking the territory captured by Syrian rebels.
