title: 'Brexit in pictures: The UK leaves the EU - BBC News'
date: '2020-02-01'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-51332761
content: |-
  People gathered across the country to mark the moment the UK officially left the EU.

  The prime minister holds a cabinet meeting at the National Glass Centre, a museum and arts centre in Sunderland, the city that was the first to back Brexit when results were announced after the 2016 referendum
