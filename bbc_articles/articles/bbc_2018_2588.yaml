title: 'Paris metro: Pregnant Frenchwoman fined for walking wrong way - BBC News'
date: '2018-03-03'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-43272326
content: |-
  A €60 fine to a pregnant Paris metro user for misusing a one-way system sparks social media anger.

  Social media has reacted with outrage after a pregnant Frenchwoman was fined €60 (£54; $74) for walking the wrong way at a Paris metro station.

  The ticket was issued when she tried to shorten her journey by walking counter to a one-way system at Concorde.

  Paris metro operator RATP said the system was needed to control flow and prevent "incidents".

  The woman's partner posted a picture of the fine on social media, saying "Bravo for this racket."

