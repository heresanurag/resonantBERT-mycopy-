content: |-
  Rear Adm Daniel Hagari says the strikes are in response to Iran "relentlessly attacking" Israel.

  The Israeli military has announced it has launched airstrikes on Iran.

  In video distributed by the Israel Defense Forces (IDF), spokesman Daniel Hagari said the operation involved "precise strikes on military targets".
