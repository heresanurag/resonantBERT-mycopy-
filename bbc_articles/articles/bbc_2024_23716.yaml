  Jack Draper says it means "the absolute world" to have reached his first Grand Slam quarter-final after an emphatic victory over Tomas Machac at the US Open. The 22-year-old produced a brilliant display to beat the Czech 6-3 6-1 6-2. Draper is the first Briton to reach the quarter-finals of the men's singles at Flushing Meadows since Andy Murray in 2016. "I thought I did the basics really well," Draper told BBC Radio 5 Live. "I increased my level when I needed to and I was pretty clinical in some moments and that was it really. "I felt like I competed really well and did what I needed to do." Czech Machac had won the three previous matches between the pair but, after a strong start, was outclassed by a laser-focused Draper in just one hour and 44 minutes. With a number of big names, most notably Novak Djokovic and Carlos Alcaraz, having gone out early, Draper has yet to drop a set in the tournament and has every reason to believe he can go all the way. This was a statement performance in what has been a breakthrough year for the 6ft 4in left-hander, one that has included his maiden ATP title in Stuttgart and victory over Wimbledon champion Alcaraz at Queen's. He will face 10th seed Alex de Minaur next as both men bid to reach a first Grand Slam semi-final. "I feel amazing being in the last eight," Draper told Sky Sports. "My first quarter-final, it means the absolute world to me. I’ve definitely felt more and more confident in myself."

  Jack Draper's previous best at a Grand Slam was a fourth-round exit at the 2023 US Open

  Machac, 23, made the brighter start to the match, imposing himself with a flurry of crunching forehands and taking Draper to deuce in the Briton's opening service game. But Draper withstood the early barrage, settled in with three aces in his next service game and soon began to take control. He was gifted the first break when Machac put a routine overhead into the net and then went long, but took full advantage, hammering a scorching backhand down the line to bring up two set points before converting a third. After showing his power from the baseline in the first, Draper showed his deft touch to start the second with a pair of fine drop shots. But while there was a swagger to an increasingly confident Draper, his opponent was growing ever more frustrated and heated discussions with coach Daniel Vacek between - and during - games became the norm. Double faults were becoming an issue for the Czech world number 39 and two in a game enabled his opponent to break at the first time of asking in the second set. Having got the advantage, Draper was ruthless as he moved serenely around the court, coolly staving off a break-back point before earning his second break to go up 5-1. Two eye-catching winners helped him serve it out and the prospect of a Machac comeback looked unlikely when the Briton broke in the first game of the third set. Of the six break points Draper faced five came in his final two service games as Machac - by this stage two breaks down - tried to delay the inevitable but again the British number one kept his cool. "After the tournament, I can look back and be proud of whatever I have achieved but for now I’m focused on the next round and hopefully going further," he said. "One of my main goals was to consistently be great in practice and keep my body robust and just all around get stronger and stronger and I think some of that work’s paying off. "I’m just glad to be in the position I’m in." With a quarter-final place confirmed, another win would see Draper become the first Briton to make the men's semi-finals in New York since Murray claimed his first Slam in 2012.

  Former British number one Tim Henman on BBC Radio 5 Live: "From 3-3 in the first set, it was a masterclass. "Jack was just so efficient in all areas. His movement, his controlled aggression his consistency. No unforced errors really. He just never let his opponent settle. "I thought Jack showed a lot of maturity in the process of making his first Grand Slam quarter-final. Big moment in Jack’s career and hopefully more to come." Great Britain Davis Cup captain Leon Smith on BBC Radio 5 Live: "Jack has got a love of the game. He is interested in it and he’s curious about it which is a really good thing to have within you." Former British number one Annabel Croft on BBC Radio 5 Live: "Oh my goodness, did Jack demolish him. He took away every sort of ounce of belief that the guy had on the other end of the court. "He played some sensational tennis not just with his serve, his attacking brand, the forehands, the backhands stood up to everything. "What was so impressive was how calm and how composed he was. He never ranted at the box. He didn’t need to and he just looked ready for this stage of a Grand Slam."
