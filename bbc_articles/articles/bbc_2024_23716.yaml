title: 'US Open 2024: Jack Draper storms past Tomas Machac to reach quarter-finals
  - BBC Sport'
date: '2024-09-03'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/cj62pwer4n2o
content: |-
