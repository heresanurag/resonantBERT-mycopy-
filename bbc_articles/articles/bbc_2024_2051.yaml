title: 'Alexei Navalny: Tributes and arrests as Russians mark opposition leader''s
  death - BBC News'
date: '2024-02-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-68325344
content: |-
  Across the country people have been forcibly taken away for leaving flowers and tributes for the deceased political activist.

  People in different towns and cities across Russia have been leaving flowers and tributes for Alexei Navalny, after reports the political activist had died in prison. His death was later confirmed by his team.

  Video shared online and by journalists in the region show authorities forcibly removing people from areas where tributes were being given.

  Navalny had been serving a lengthy sentence at a Siberian prison, after being jailed in 2021 on politically-motivated charges.

  In 2020, the outspoken critic of Vladimir Putin required life-saving treatment in the West, after being poisoned with nerve agent Novichok.
