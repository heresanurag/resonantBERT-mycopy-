title: 'North Belfast: Four arrested after assault in flat - BBC News'
date: '2024-07-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c29dkl67krgo
content: |-
  A fight broke out in a flat on Cliftonville Road on Saturday evening, according to the police.

  Four men arrested after a serious assault in north Belfast have been released on bail.

  The incident on Saturday night left two men in hospital.

  It was reported that a fight was taking place in a flat on the Cliftonville Road at about 17:50 BST.

  Weapons may have been used the attack, police said.

  Four men - two aged 26 and two aged 34 - were arrested after the incident.

  All four have been released on bail.

  Police have said that their enquires are ongoing.
