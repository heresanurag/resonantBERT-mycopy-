title: 'Newspaper headlines: Kate''s photo apology and Tory donor''s Abbott remarks
  - BBC News'
date: '2024-03-12'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68540733
content: |-
  The controversy over an altered royal photo and allegations about a major Tory donor lead the papers.

  Former Prime Minister Boris Johnson is expected to play a significant role in the Conservative Party's general election campaign, according to the Times

  The Daily Telegraph leads on plans for new gas power stations set to be announced today. The paper says the stations will be paid for through household energy bills, though adds that the government says the plan will ultimately save homes £45 a year on their electricity costs. Writing in the paper, Prime Minister Rishi Sunak says that "increasing gas capacity is the insurance policy Britain needs to deliver net zero".

  The Guardian leads with a report alleging that the Conservative Party's biggest donor told a meeting that looking at MP Diane Abbott made him "want to hate all black women" and that she "should be shot". The paper says Frank Hester, a businessman who runs healthcare technology firm Phoenix Partnership (TPP), made the remarks in 2019. In a statement, the firm says Mr Hester "accepts he was rude about Diane Abbott in a private meeting" but abhors racism and maintains that "his criticism had nothing to do with her gender nor colour of her skin".

  Former prime minister Boris Johnson is expected to play a significant role in the Conservative Party's general election campaign, particularly in red wall seats, according to the Times. A government source tells the paper that Mr Johnson's relationship with Mr Sunak - whose resignation as chancellor contributed to his ousting as prime minister - is now "in a fairly good place", though adds that they will not be seen on stage together. The paper also reports that another former prime minister, Foreign Secretary Lord Cameron, will be "deployed widely" in the run up to polling day.

  The i says the introduction of the British ISA, first announced in last week's Budget, will be delayed until after the general election. The policy would allow savers to invest £5,000 a year in the UK stock market tax-free. The paper says Chancellor Jeremy Hunt wanted to introduce it immediately but that the Treasury concluded it was too expensive to do this year. It adds that Labour has not committed to the policy and speculates that it may never happen at all.

  An asylum seeker has told the Daily Express that migrants are increasingly faking conversion to Christianity to remain in Britain. The man says some are going as far as burning copies of the Koran. The Church of England says people do not take baptisms lightly, while the Home Office says conversions will not guarantee asylum.

  "How did Kate's photo become a PR disaster?" asks the Daily Mail. The paper's lead story describes the Princess of Wales' admission that she altered an image of her and her children released on Mother's Day as an "extraordinary mea culpa". But the Sun calls on everyone to "lay off Kate" and says she has been very sad at the furore.

  The Daily Mirror argues that publishing the original photo "might go some way to dampening wild speculation", while the Daily Star says her "heinous crime" was just "being pretty dodgy at Photoshop". And the Telegraph has a cartoon of a group wakeboarding behind the Loch Ness monster above a caption that reads: "Royals release photo of holiday in Scotland".

