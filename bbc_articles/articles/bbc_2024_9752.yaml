title: 'Telscombe: Chalk cliff collapses on to beach - BBC News'
date: '2024-04-09'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-68770507
content: |-
  The cliff fall between Saltdean and Telscombe comes after the authorities warned people to stay safe.

  A section of coastal chalk cliff has collapsed in East Sussex.

  Large quantities of rock can be seen on the beach between Saltdean and Telscombe.

  In March local councils teamed up with HM Coastguard to warn people to stay safe.

  It came after huge sections of cliff at Seaford Head and Peacehaven collapsed in the space of two weeks.
