title: 'Covid: German cases hit new high after Merkel warning - BBC News'
date: '2021-11-18'
section: World
url: http://www.bbc.co.uk/news/live/world-59329996
content: |-
  Some 65,000 cases are recorded with the chancellor warning of a fourth wave hitting with "full force".

  As we've been reporting, there has been some fierce debate in the German lower house of parliament over proposed new measures to curb the current spike in the country's cases.

  Here are some excerpts that give a flavour of what was said in the chamber.

  Quote Message: More people will get infected and become ill, many of them seriously. That worries me deeply and I will say clearly: we are in an emergency situation, especially the hospitals and we must react now, resolutely and together, the government, the German states and communities. This is what today's parliamentary debate is about, as is customary in a democracy." from Katrin Goering-Eckardt Green Party parliamentary chairwoman More people will get infected and become ill, many of them seriously. That worries me deeply and I will say clearly: we are in an emergency situation, especially the hospitals and we must react now, resolutely and together, the government, the German states and communities. This is what today's parliamentary debate is about, as is customary in a democracy."

  Quote Message: Today's debate is not about the conservatives or the [incoming] SPD, FDP and Greens government, it's about protecting our country and in order to do so, we are putting the right measures in place, ladies and gentlemen." from Marco Buschmann Senior FDP lawmaker Today's debate is not about the conservatives or the [incoming] SPD, FDP and Greens government, it's about protecting our country and in order to do so, we are putting the right measures in place, ladies and gentlemen."

  Quote Message: If you decide to go down that road with the majority you have here, against our and my proposals, please don't use someone else as a scapegoat every time or as a punching ball. If you want to represent the new majority here, you have to take on the responsibility. No-one can relieve you of that duty." from Jens Spahn Outgoing Health Minister If you decide to go down that road with the majority you have here, against our and my proposals, please don't use someone else as a scapegoat every time or as a punching ball. If you want to represent the new majority here, you have to take on the responsibility. No-one can relieve you of that duty."
