title: 'Najib Razak: Malaysia''s former PM and his downfall over alleged corruption
  - BBC News'
date: '2018-05-10'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-22338100
content: |-
  The former PM promised to boost Malaysia's economy but has been found guilty of corruption.

  But in 2018, the then prime minister lost a general election to his former mentor, 92-year-old Mahathir Mohamad. The Barisan Nasional coalition, which had governed the country since its independence in 1957, was voted out of power.

  Following the defeat, Najib's properties were raided, and both he and his wife were charged with a string of offences.

  He has since been found guilty on seven charges of corruption linked to the multibillion-dollar state investment fund, 1MDB. Najib could face decades in prison.

  Najib has always denied the allegations and while still in office had been cleared by the country's authorities.

  But his time in office will likely be remembered as an era plagued with scandal and a strengthening of central power.

  Najib Razak is the eldest son of Abdul Razak, Malaysia's second prime minister and the nephew of Hussein Onn, its third prime minister.

  After earning an industrial economics degree from the University of Nottingham in the UK, Najib returned to Malaysia in 1974 and worked for the state oil firm Petronas.

  Najib and his wife have both denied accusations linking them to 1MDB corruption

  When he moved into politics, Najib held numerous cabinet posts - as minister for energy, telecommunications, education, finance and defence - before becoming deputy prime minister to Abdullah Badawi in 2004.

  When Mr Abdullah stepped down in 2009, he handed power to Najib.

  Najib initially promised a more liberal political approach, but did not really follow through.

  While he reformed tough laws on public gatherings and repealed the controversial Internal Security Act in 2011, he later reinstated detention without trial.

  The following year, he also went back on a pledge to repeal a controversial sedition law and instead strengthened it.

  Najib set up the 1MDB state investment fund in 2009 to help develop the economy

  Critics say the laws were a way for Najib to silence his political opponents and to pander to the ethnic Malay-Muslim majority who formed his political party's largest support base.

  Opposition leader and former deputy prime minister Anwar Ibrahim was convicted of sodomy for a second time in 2015, charges Mr Anwar maintained were politically motivated.

  The opposition politician has since been pardoned by the new prime minister and is seen as a likely successor to Mr Mahathir.

  In 2016, a security act aimed at combating terrorism was used to detain electoral reform activists.

  Ahead of the 2018 election, Najib's government set up a law against spreading "fake news".

  The real blight of Najib's political career has been accusations of corruption and mismanagement over the state investment fund, 1Malaysia Development Berhad.

  Najib, members of his family and several allies are accused of embezzling huge sums allegedly used to buy everything from artwork to high-end real estate around the globe.

  Raids on properties linked to Najib uncovered luxury goods worth millions of dollars

  In July 2015 he replaced his deputy, who had criticised his handling of the affair, and the attorney-general investigating the case was dismissed for health reasons.

  In January 2016 the new attorney-general cleared Najib of wrongdoing but the criticism remained.

  Ahead of the 2018 election, mass demonstrations in Kuala Lumpur called on him to resign.

  After his defeat, authorities reopened their investigation and charged the former PM with money laundering, breach of trust and abusing his position.

  On 28 July he was found guilty of money laundering, abuse of power and criminal breach of trust. He had pleaded not guilty to all seven charges.

  Najib said he would appeal and his lawyers are seeking a delay to his sentencing.

  The former prime minister also faces a separate trial that began last August and looks at accusations that he illicitly obtained 2.28bn ringgit ($550m, £448m) from 1MDB between 2011 and 2014.

  He faces 21 counts of money-laundering and four of abuse of power. He denies any wrongdoing.
