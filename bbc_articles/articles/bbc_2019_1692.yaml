title: Rail staff issued with body cameras to record assaults - BBC News
date: '2019-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-47096261
content: |-
  Rail staff are being issued with body worn cameras in a bid to cut abuse and assaults towards them.

  Rail staff are being issued with body-worn cameras in a bid to cut the amount of abuse they're having to face.

  The cameras can record an incident and be used as evidence against the attacker.

  Some staff say they've switched jobs after being attacked, which they describe as "part of daily life".

  See more on this story on Inside Out South East on Monday 4 February at 19:30.
