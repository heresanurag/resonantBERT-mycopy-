  Wigan captain Liam Farrell also played alongside Burrow for England and agrees with Burgess that the weekend offers an opportunity to pay tribute. Despite the sport losing a figurehead in Burrow, Farrell believes that his legacy will remain and a huge day at Wembley is the first opportunity for that to take hold. "We've got an iconic week of rugby league coming up and we're talking about an iconic player," Farrell told BBC Radio Manchester. "I've always said, playing against anyone on the field, I'd rather have the biggest player run at me than Rob Burrow. "It's very sad news but also we will make sure we remember a legend this week." Sinfield, who Burrow first met when he was 12 years old, has completed several endurance challenges which have raised more than £7m and been featured in two BBC documentaries. "He was so brave, so tough. I wish he could have seen the outpouring of love," Sinfield told BBC Sport. "We all lose special people. But it's very rare you lose someone who's so special to so many different people. "What's really important is that Rob Burrow continues to live forever and I'm sure the MND community, and everyone who's supported us previously, will make sure that Rob's name is at the forefront of everything we do going forward."
