title: 'Liz Truss resignation: How the day unfolded - BBC News'
date: '2022-10-21'
section: General
url: http://www.bbc.co.uk/news/uk-63338397
content: |-
  The BBC looks back on the day that the prime minister resigned.

  In the lead up to Liz Truss's resignation, politicians and journalists discussed her time in power and her chances of staying in the UK's top political office.

  Truss later spoke with His Majesty the King to notify him of her desire to step down.
