title: Koala drinks from water bottle amid bushfires - BBC News
date: '2019-12-24'
section: General
url: http://www.bbc.co.uk/news/world-australia-50904876
content: |-
  The animal drank from a bottle before running back into an area of unburnt scrub in south Australia.

  This koala was filmed drinking from a water bottle offered by firefighters tackling bushfires in south Australia.

  Afterwards, the animal was seen running back into an area of unburnt scrub.

  Read more: The sacrifices of Australia's unpaid firefighters
