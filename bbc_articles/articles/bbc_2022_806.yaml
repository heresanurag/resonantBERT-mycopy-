title: Serbian PM comments on Djokovic PCR test - BBC News
date: '2022-01-11'
section: General
url: http://www.bbc.co.uk/news/world-59957779
content: |-
  Ana Brnabić says it would be a clear rule breach if Novak Djokovic was out after a positive Covid test.

  The Serbian Prime Minister, Ana Brnabić, has said it would be "a clear breach of rules" if tennis star Novak Djokovic was out in public following a positive Covid test.

  Speaking to the BBC's Guy De Launey, Ana Brnabic said she did not know details of the sequence of events in December - and that only Djokovic had the answers.
