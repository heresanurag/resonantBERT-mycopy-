title: 'Youngest Mastermind winner: ''It feels like a dream'' - BBC News'
date: '2021-04-27'
section: General
url: http://www.bbc.co.uk/news/uk-56900431
content: |-
  Jonathan Gibson won the competition by four points and got a perfect score in his specialist subject.

  Jonathan Gibson, a student from Glasgow, has been crowned the youngest ever champion of Mastermind.

  Gibson scored a perfect 11 out of 11 on his specialist subject, the comedy song-writing duo Flanders and Swann.

  He told BBC Breakfast he had used the trophy to hold sweets that he was given at Christmas.
