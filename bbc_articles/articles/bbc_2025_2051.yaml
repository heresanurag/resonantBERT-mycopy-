title: Venus Williams turns down Indian Wells wildcard offer - BBC Sport
date: '2025-02-24'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/cgq914eggj1o
content: |-
  Former world number one Venus Williams turns down a wildcard offer for next month's Indian Wells tournament.

  Williams has won 49 WTA singles titles in her career

  Former world number one Venus Williams has turned down a wildcard for next month's Indian Wells tournament. Organisers said last week the 44-year-old had been invited but the seven-time Grand Slam singles champion has not taken it up. "Our team has been informed that Venus is not accepting the wildcard this year," the event posted on X in a statement attributed to tournament director Tommy Haas. "We wish Venus all the best and hope to see her back in Indian Wells in the future." Williams has dropped to 974th in the world and has not played a WTA Tour-level match since losing in the first round of the Miami Open last March. She earlier told the TennisWeekly podcast she would not be making her return at the Indian Wells tournament, which runs from 2-16 March. "I'm not playing - I'm going to be overseas. I'm not going to be here," she said.

  Williams boycotted Indian Wells for 15 years after her younger sister Serena was booed and heckled by fans during her win against Kim Clijsters in the 2001 final. The jeers appeared to be in response to Venus withdrawing injured from the semi-final between the siblings. Their father Richard later accused fans of racial abuse. Serena returned to the tournament in 2015 while Venus played the following year.
