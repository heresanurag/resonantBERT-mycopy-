title: Romford charity calls for Christmas gift donations for children - BBC News
date: '2024-12-18'
section: General
url: http://www.bbc.co.uk/news/videos/cgkxg32lmlgo
content: |-
  The presents go to children from low-income families living in Romford and Essex, the charity says.

  Financial hardship means many children might not receive a present from Santa this Christmas.

  With their shoebox donations, S.M.I.L.E, a charity based in Romford, hopes to change that and help over 2,000 low-income families have that Christmas miracle.

  The deadline for donations is Christmas Eve.

