title: 'Newspaper headlines: ''Tariff storm'' and MP Norris ''rape arrest'' - BBC
  News'
date: '2025-04-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cp8k2n4kr2mo
content: |-
  The papers are dominated by the UK reaction to Trump's tariffs and the arrest of MP Dan Norris.

  Pictures of jockey Patrick Mullins and his father Willie Mullins feature on many front pages after he won the Grand National Handicap Chase with Nick Rockett - a horse trained by Mullins Sr

  In response to what the Observer calls President Trump's "tariff mayhem", external the prime minister is reportedly preparing to rethink key elements of the government's economic policy. The paper says this may include changing the "iron clad" fiscal rules to allow for more borrowing. Writing in the Sunday Telegraph, external, Sir Keir Starmer pledges to "turbocharge plans that will improve our domestic competitiveness". But Sun on Sunday's leader warns his words "ring hollow" - because British businesses are being "crippled" from today with higher employer national insurance contributions. There is not a shortage of advice for the Prime Minister on how he should respond to the US tariffs. In a nod to the film, Love Actually, one Labour MP has told the Mail on Sunday that Sir Keir "should channel his inner Hugh Grant and tell Trump where to get off". One pollster quoted by the Sunday Times, external should also advocates this approach, suggesting Labour are "clueless" if they think they are going to get "any political dividend by sucking up to Trump". In the same paper, the leader of the Conservatives, Kemi Badenoch, urges the Prime Minister to embrace the UK's role as an "independent trading nation". The Sunday Telegraph leads on the arrest of the MP, Dan Norris, external, on suspicion of rape and child sex offences. The paper says he was immediately suspended from the Labour Party pending the outcome of the police investigation. The Sun on Sunday reports that he was arrested and questioned on Friday. Officers were reportedly seen carrying boxes from his property. The Sun has approached Mr Norris for comment.

  A number of papers focus on the threat from Moscow. The Sunday Times leads on reports that Russian sensors suspected of spying on the UK's nuclear submarines have been found hidden in seas around Britain. Several were seen after they washed ashore. In the Mail on Sunday, external security advisors say families should pack a 72-hour survival kit because of fears of a Russian plot to sabotage Britain's energy pipelines. And the Sunday Express leads on a warning that an Israeli-style Iron Dome would not protect British towns and cities from missile attacks if targeted by Russia. "That's my boy", declares the Sunday Times, as it toasts the father-son duo, Willie and Patrick Mullins, for their triumph as trainer and rider in the Grand National at Aintree. In what the Daily Star Sunday calls "one of the greatest ever training performances" Willie Mullins had the top three horses in the race, with Nick Rockett coming home ahead of I Am Maximus and Grangeclare West. "Perfect", is how Patrick Mullins described the winning horse's performance, while the Observer says, external the champion jockey left with a smile "that could have lit up the whole of Liverpool".

