title: 'Ronnie O''Sullivan: Masters winner responds angrily after being criticised
  by Ali Carter - BBC Sport'
date: '2024-01-16'
section: Snooker
url: http://www.bbc.co.uk/sport/snooker/67988328
content: |-
  Ronnie O'Sullivan calls Ali Carter "not a nice person" and "a nightmare" to play against after being criticised by the beaten Masters finalist.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ronnie O'Sullivan has called Ali Carter "not a nice person" and "a nightmare" to play against after being criticised by the beaten Masters finalist. On Sunday, O'Sullivan rallied from 6-3 down to beat Carter 10-7 and win a record-extending eighth Masters title. Afterwards, Carter accused the world number one of "snotting" - clearing his nose - "all over the floor". A World Snooker Tour spokesperson said the whole incident between the two players was "under review". The WST did not go into what the ramifications could be or a timeframe. On Tuesday, O'Sullivan beat Pang Junxu of China 4-2 at the World Grand Prix in Leicester. Following the win, world number one O'Sullivan told ITV he will "definitely be missing a few tournaments" after this. "I shouldn't even really have come here to be honest, but it is alright so I thought I would just turn up. In hindsight, I shouldn't have come," he added. "I would like to think if I fell off the tour I might get a wildcard, but knowing World Snooker they would probably say no. "I am just trying to keep my tour card really, that's all I am trying to do. "I am not bothered about tournaments, it is not my favourite bit to be fair."

  In response to Carter's comments after the Masters final, O'Sullivan said: "He [Carter] has got issues. He's got to go and sort his life out. "He's got to go and see a counsellor or something. He's got to deal with that because that isn't any good." Carter, 44, criticised "some morons" in the crowd at Alexandra Palace in London and also called out 48-year-old O'Sullivan's behaviour during the match. "It's just disgusting, no one wants to say anything though do they?" said Carter. "Snotting all over the floor and all that, it's outrageous behaviour from a top professional and if it gets swept under the carpet then it's not good."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  O'Sullivan has now won 23 of his 26 matches against Carter, including victories in the 2008 and 2012 World Championship finals. Carter did beat his fellow Englishman in the second round of the same tournament in 2018 when they were involved in a "shoulder barge" incident during the match. "I don't talk to him. I haven't spoken to him for 20 years. I played with him when he was a kid, shared a lot of stuff with him," said O'Sullivan, who swore repeatedly in his response. "For him to come out and trash talk me like that, everybody knows what he's like, he's got issues. Why has he got issues with me? I'm not having it. I don't care. "I will not skirt around it any more, tiptoeing on egg shells around someone like that. "He's a nightmare. To have to play snooker against someone like that is a nightmare. [He's] not a nice person, not a nice vibe that he leaves around the table. "That's it, I've said my piece. I've said it now, done."

  Carter hit back again on Tuesday, telling ITV: "Ronnie is entitled to his opinion. I just said what it is and how it was and I talk facts. It is as simple as that. "It makes no difference to me what he says - he says different things on different days. I don't think he even knows what is going to come out of his mouth at certain times. "I actually feel a bit sorry for him. I don't think he is that well. So we move forward and we go again this week." Former world champion Ken Doherty said the ongoing row was not a good look for the sport. Speaking on ITV4's coverage of this week's Grand Prix event, Doherty said: "There is history behind it with the shoulder barge at the World Championship and it goes from there. "It is bad blood and [O'Sullivan] was reacting to what Ali said in the press conference as well. "I am sure World Snooker will review it and we'll see what happens, but not great headlines really."

