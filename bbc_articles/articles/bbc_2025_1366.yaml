title: 'Newspaper headlines: ''Zelensky could fall'', as US and Russia agree more
  talks - BBC News'
date: '2025-02-18'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cz7v30rg53lo
content: |-
  High-level talks over ending the Ukraine war dominate the papers on Wednesday.

  'Zelensky could fall as price of peace', as US and Russia agree more talks

  A number of the front pages focus on the meeting between senior American and Russian officials in Saudi Arabia, about ending the war in Ukraine. The Guardian says, external the two parties agreed to explore the "economic and investment opportunities" that would be created by a truce. The paper says the meeting marks a tectonic shift in Washington's approach to Russia, and a clear break with the Biden administration's efforts to isolate Moscow. The Financial Times called it, external an extraordinary turn of events, with a backdrop that would have been unthinkable even a few weeks ago. The Daily Telegraph has the headline "Zelensky could fall as price of peace". The paper says, external Donald Trump has demanded Volodymyr Zelensky hold elections in Ukraine before any peace settlement. This, says the Telegraph, raises concerns that Russia will use the ballot to oust Mr Zelensky, and install a pro-Putin candidate. "Typhoons may help to keep peace in Ukraine" is the headline for the Times,, external which says Britain is exploring ways of providing security guarantees for Ukraine without the need to deploy large numbers of troops. It believes an "air policing" mission using fighter jets is one such consideration. "UK on collision course with Russia over peacekeeping troops in Ukraine" is the headline for the i newspaper, external - which points out that Russia has explicitly rejected the idea of Western forces stationed on Ukrainian territory.

  Zelensky is in Turkey for talks with the president

  The Daily Mail leads on the comments by the most senior judge in England and Wales about Sir Keir Starmer and Kemi Badenoch. The paper says Lady Chief Justice Carr issued a "rare rebuke", after the pair criticised an immigration ruling which allowed a Palestinian family from Gaza to gain asylum through the Ukraine refugee scheme. According to the Mail,, external the Conservative leader warned the judge that politicians had a right to speak out, because "Parliament was sovereign". "Our blood was boiling" are the words on the front page of the Daily Express,, external which says representatives of the farming sector were left furious by a meeting with ministers yesterday. The paper says the talks collapsed after the government showed "no movement" on the decision to introduce inheritance tax for farms worth more than £1m. In its opinion column, the Express called the government's claim that the tax revenue was needed to pay for the NHS a "despicable insult". The Guardian features research, external published in the Lancet, which shows improvements in life expectancy are stalling across Europe, with the biggest slowdown in the UK. The paper quotes health experts who are blaming a mixture of poor diet, obesity and "mass inactivity". But the study's author says Europe hasn't reached a "natural longevity ceiling". "Duchess facing pain in Spain" is the Sun's headline. , external It says the mayor of the Majorcan town of Porreres is considering legal action against the Duchess of Sussex, because of similarities between the town's crest, and the new logo of Meghan's lifestyle brand. Both feature a palm tree flanked by two birds in flight. The mayor said she didn't want the town's badge - which is believed to be more than six centuries old - "perverted".

