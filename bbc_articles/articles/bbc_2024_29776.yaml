title: Firefighters take 1,000 calls during Bonfire Night attacks - BBC News
date: '2024-11-06'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c9wr182e5pko
content: |-
  Police and firefighters were targeted by fireworks, bricks and bottles in pockets of disorder across Scotland.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Fireworks set off on Scottish streets on Bonfire Night

  Firefighters say they were "bombarded" by missiles and fireworks on Bonfire Night, while crews responded to more than 1,000 emergency calls. The Scottish Fire and Rescue Service said there were six incidents where teams were attacked - three in Clydebank, two in Edinburgh and one in Blackridge in West Lothian. Police officers were also attacked with fireworks, bricks and bottles but said incidents of serious disorder had fallen this year. The force said the attacks on emergency services were "wholly unacceptable" and officers were working to trace those responsible.

  Andy Watt, deputy chief officer for the Scottish Fire and Rescue Service, said the attacks prevented crews from dealing with emergencies swiftly. He said: "This type of behaviour is, of course, carried out by a very small minority and we once again thank our communities for their continuing support and working together with us to stay safe across the Bonfire period.” Police were called to tackle disorder in Edinburgh, Glasgow and other parts of the country. The force said large groups of youths had gathered in Niddrie, Sighthill and Moredun in Edinburgh and thrown fireworks, bottles and bricks at cars and police vehicles. A police helicopter was brought in to assist with the operation.

  Masked youths faced off with police officers in Edinburgh

  A large group of youths gathered on Hay Avenue on Tuesday evening

  A 42-year-old mother who lives on Hay Avenue told the BBC that dozens of young people arrived on her street at 20:30 and began setting off fireworks. The woman, who asked not to be named, said she feared the group would break her window because a firework had hit her property last year. “Because it was so bad last year I asked my husband not to go to work so he could be with us this year," she said. Niddrie resident George Pringle, 72, has lived on Hay Avenue for 10 years - he heard fireworks being set off near his home but kept his curtains closed. "I could hear big bangs which were setting off the car alarms," he said. "I just turned the TV up and let them get on with it."

  George Pringle witnessed a bonfire in the middle of the road outside his house

  Fireworks are hurled at police officers in riot gear in Niddrie

  Earlier this week Mr Pringle witnessed a large bonfire in the middle of the street outside his house. “The flames were as high as a man and I saw about five teenagers around it," he said. “There is nothing we can do about it. They need to stop selling them fireworks in the local shops.” In the west of the city, the Macklin Motors Hyundai car dealership on Calder Road was targeted by vandals. Several car windows were smashed and bodywork was dented and scratched.

  Vandals smashed car windows at the dealership on Calder Road

  Staff at a nearby BP petrol station told the BBC they had to seal off pumps to prevent an explosion as fireworks were being launched into the restaurant next door. Control zones banning the use of fireworks in certain areas of Edinburgh are in place until 10 November for the first time. Parts of Glasgow were due to be covered by a similar ban but it was was delayed until next year due to a council error. Police said there were pockets of disorder in Glasgow, with youths throwing fireworks at members of the public, vehicles and police officers. Footage taken in Pollokshields, in the south side of the city, showed fireworks being set off by a group in the middle of the street. The Unison union said residents had seen large groups of young men causing disorder until 02:00, firing "industrial-sized" fireworks at people, buildings and cars, and setting fire to public property.

  Anti-fireworks campaigner and Pollokshields resident Danny Phillips called it the "worst firework disorder in years" and criticised the council for failing to implement the control zone. He said: “We warned them that this would happen again. The city council’s incompetent blunder, failing to implement our no firework zone, has had a very heavy cost." No one was injured in incidents in Glasgow and Edinburgh, police confirmed. A 25-year-old man was arrested and a "significant quantity" of fireworks seized after a search of a van in Drumchapel. The force said the fireworks were being sold to the general public, including to under-age children. Meanwhile, in Peterhead at about 21:20, a man was hit by a van driven by individuals who, moments before, had set off a pyrotechnic in a skate park in Aalesund Road. The 33-year-old was treated by paramedics at the scene but did not need further medical attention. Two men, aged 62 and 57, have been arrested in connection with the incident.

  Gus Sproul, chair of the Fire Brigades Union in Scotland, said there had been a "concerning" increase in the number of attacks on firefighters and blamed cuts to public services. However Police Scotland said the incidents of serious disorder had fallen this year. As part of Operation Moonbeam, a police operation launched in 2020 to deal with disorder at this time of year, specialist resources were deployed 26 times on 5 November last year - this year there were 18 deployments. The number of injured officers has also reduced significantly - 62 last year compared to one this year. Assistant Chief Constable Tim Mairs, gold commander for Operation Moonbeam said challenging scenes had not escalated to mass disorder as it had last year. He said: "Nevertheless, the levels of violence and aggression police officers, fire service and ambulance service personnel faced in some areas was wholly unacceptable and a significant investigative response is now underway to identify each and every one of those involved and bring them to justice." He added that discussions with local authorities and the Scottish government were ongoing to explore more ways to reduce fireworks offences in future. First Minister John Swinney said it was "completely unacceptable" for emergency workers to be attacked, adding: "I think the fact that we’ve had a lower incidence of events as a consequence of fireworks gives me encouragement that the steps we are taking are having an effect."

