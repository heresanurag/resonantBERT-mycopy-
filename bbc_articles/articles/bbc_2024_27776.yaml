title: 'Abergavenny fire: Children''s charity loses everything in blaze - BBC News'
date: '2024-11-13'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckgdzlndey0o
content: |-
  The Magic Cottage was the epicentre of the blaze which broke out in Abergavenny on Sunday night.

  The fire caused the first and second storeys of the old building to collapse

  A children's charity says it is devastated after losing “absolutely everything” in a large fire. The Magic Cottage, which supports children with additional needs and life-limiting illnesses, was the epicentre of the blaze which broke out in Abergavenny, Monmouthshire, on Sunday night. More than 100 firefighters were called to the scene on Frogmore Street and about 12 residents had to leave their homes. Lesley Reynolds, who was inspired to set up the charity after adopting an autistic child, thanked crews for “valiantly battling the inferno with an incredible emergency plan in place”.

  More than 100 firefighters tackled the flames, but could not save the shop

  But despite the team endeavour, she added, the “old, iconic building could not be saved”. The row of shops affected by the fire was in the town centre, and residents said the loss would be felt greatly by the community. The Magic Cottage had taken over the unit last year, which was previously occupied for nearly a century by family-run department store Richards of Abergavenny. Lesley said the team’s thoughts were with all those affected, including the building’s owner Alan Griffiths, and thanked the community and her staff for their unwavering support. “The next few months will be a time of uncertainty for us as a charity, however we will do our very best to keep offering the help and support that we give to our Magic families, schools and hospitals,” she said.

  Lesley Reynolds is the director of the Magic Cottage, which was destroyed in the fire

  Lesley said she set up the charity after adopting her daughter Gabby from Croatia, who is partially sighted and autistic, with the family struggling to access support. “She is extremely upset but trying to stay positive,” Lesley told BBC Radio Wales Breakfast of Gabby's reaction to the fire. “We are finding a new place in Abergavenny and would appeal to any landlords with decent-size shops available to rent." She said "things are moving towards a good direction" as authorities work to determine the cause of the blaze.

  Lesley set up the charity inspired by her daughter

  Firefighters used four water bowsers, two aerial ladder platforms, and a high volume pump to tackle the flames. South Wales Fire and Rescue Service said the fire caused the first and second floors and roof of the building to collapse and a "thorough investigation" alongside Gwent Police crime scene investigators would be carried out to establish how the outbreak began. Police added the large cordon encompassing several nearby streets remained in place after the blaze was extinguished due to ongoing safety concerns, but this would be continually reviewed and adapted by experts.

