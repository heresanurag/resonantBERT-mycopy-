  Political disagreements between Europe's far-right parties could limit their influence, writes Katya Adler.

  Far right makes gains in EU election but it could struggle to unite

  Supporters of the French far-right National Rally party react following their victory

  In Brussels, at past EU leaders’ summits, Emmanuel Macron has at times been accused of trying to steal the limelight. He certainly managed that on Sunday night. Although probably not in the way he’d have liked. As votes for the European Parliament were still being counted, Mr Macron dominated the headlines. His drubbing in the poll by French hard-right nationalists had been expected. His decision to dissolve France’s national parliament as a result, came as a shock. He had played with the idea last year, after getting trounced in France’s last general election but few expected this move now. Emmanuel Macron describes himself as a centrist and a passionate European. This snap general election, taking place in two rounds on 30 June and 7 July, could result in him having to work alongside a French prime minister from the Eurosceptic far right. Marine Le Pen, regularly portrayed as his political nemesis, declared on Sunday that her party was ready to govern. It’s happened before in France that the president, who is the country’s most powerful politician, and the prime minister, hail from different political parties. But if the new prime minister were to come from the far right, that would be a first for France. Marine Le Pen has worked hard in recent years to try to broaden the appeal of her political movement and to soften its extremist image. She and her supporters hope this significant victory at EU level (her National Rally party garnered more than double the number of votes of President Macron’s Renaissance party) will translate into huge wins in the snap election back home. Her dream would be that those successes would then bring her, or her hugely popular prodigee, the 28-year-old Jordan Bardella, a big stride closer to eventually becoming French president - something she’s attempted and failed to achieve a number of times before. The next presidential vote in France is scheduled for 2027.

  Official campaign posters of the two French presidential election candidates in 2022

  Staying with this election for the European Parliament, the hard right and nationalist right made gains in many parts of the EU, with voters worried about migration, inflation and the cost of environmental reforms. But whether they will be able to really influence future EU policy is unclear. The majority of seats in the EU chamber where the bloc’s laws are debated, modified, passed or rejected, remain firmly in the hands of centrist parties. To affect EU policy, hard-right parties from across the bloc will have to unite, to give them clout. And that’s a challenge. They have differing national priorities and some deep-seated differences, like how far to support Ukraine against Russia.

  One issue affecting the lives of all EU citizens, that the hard right has already influenced, is environmental reform. It’s a trillions-of-euros priority for the EU which has long been ambitious about wanting to be a world leader in climate action. But green parties lost a whopping 20 seats in this EU Parliament vote. EU taxpayers, faced with the cost-of-living crisis, are increasingly nervous, even resistant to new environmental rules, putting them under pressure to purchase a new heating system for their home or a less-polluting car. Farmers across the EU have staged mass protests about environmental rules they label unfair and ruinous. The hard right across Europe visibly used their grievances to portray themselves as the voice of the people, standing up to "remote elites" in Brussels and in national government. The result: under pressure ahead of this EU Parliament vote, a number of EU environmental regulations were watered down or rescinded, including one governing pesticide rules. This weakening of green goals could well be an indication of things to come.

  A final thought: When trying to make firm predictions about the kind of power the nationalist right will, or will not, exert in the EU going forward, labels are often not that helpful. Some hard-right nationalists are becoming more mainstream to woo more voters and increasing numbers of centre-right politicians have been aping the language of the far right on hot button issues like migration and the environment, in an attempt to hold on to supporters. Overall, the centre-right won the largest number of seats and made the biggest number of gains in the European Parliament. You might not see that headline all that often though. It’s less eye-catching than a debate about far-right gains.
