  Reporters and members of the media packed the hallway outside the room where members of the committee met on Wednesday. Most lawmakers remained tight-lipped as they passed the gauntlet of journalists on their way out of the meeting. Speaking to MSNBC afterward, Congressman Mark DeSaulnier, a Democrat, said he had faith "we will get to the right solution". Gaetz, 42, is a lawyer who made a name for himself on Capitol Hill and cable news as a right-wing rabble rouser. He is a staunch defender of Trump and led a successful effort to oust Republican House Speaker Kevin McCarthy last year. Some of Gaetz's former House colleagues have voiced support for his nomination, including Speaker Mike Johnson, who called him a "reformer" who would "bring a lot to the table". But Gaetz also has been dogged by allegations of impropriety in recent years. The US justice department previously investigated him for allegations he had a sexual relationship with a 17-year-old girl and violated sex trafficking laws. But the case was dropped and Gaetz, who denied the allegations, was never charged.

  In June, the ethics committee announced it was investigating several allegations against Gaetz, including that he “engaged in sexual misconduct and illicit drug use, accepted improper gifts, dispensed special privileges and favours to individuals with whom he had a personal relationship, and sought to obstruct government investigations of his conduct”. Two women testified to the committee that Gaetz paid them "for sex", their lawyer, Joel Leppard, told CBS this week. One of the women also testified that she witnessed the then-congressman having sex with a minor during a party in 2017, the lawyer said. Gaetz has repeatedly denied any wrongdoing and says the accusations are politically motivated. "Lies were weaponised to try to destroy me," Gaetz posted on X on Friday. "These lies resulted in prosecution, conviction, and prison. For the liars, not me." Trump showed no sign of backing down on his cabinet pick this week. "Matt Gaetz will be the next attorney general. He’s the right man for the job and will end the weaponisation of our justice system," Trump transition spokesman Alex Pfieffer said in a statement. Meanwhile, Senators of both parties have spoken in favour of accessing the ethics report. Dick Durbin, an Illinois Democrat and chair of the Senate Judiciary Committee, demanded that the other committee “preserve and share” the report with his panel. “Make no mistake: This information could be relevant to the question of Mr Gaetz’s confirmation as the next attorney general of the United States, and our constitutional responsibility of advice and consent,” Durbin said. Chuck Grassley, an Iowa Republican who also sits on the judiciary committee, said: "I think that if they want a speedy consideration of this nomination, we've got to have as much transparency as we can have."

