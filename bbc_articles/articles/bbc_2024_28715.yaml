title: Matt Gaetz ethics report release uncertain after panel deadlocked - BBC News
date: '2024-11-21'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cx2l0vqdg92o
content: |-
  Pressure has been mounting on the ethics committee to release a report on Donald Trump's nominee for attorney general.

  Pressure has mounted on the ethics committee to release its findings into Gaetz

  A congressional ethics committee has failed to reach an agreement over whether to release a report on alleged sexual misconduct by Matt Gaetz, Donald Trump's nominee to lead the US Department of Justice. The House committee met for two hours behind closed doors on Wednesday, as calls grew for details of its investigation into Gaetz, a former Florida congressman whose nomination to serve as attorney general has proved controversial. "There was no consensus on this issue," Democratic Representative Susan Wild told reporters, adding that a vote had been taken but the bipartisan committee remained split along party lines. She said they would meet again on 5 December. It is unclear whether they could release the report into Gaetz, who denies any wrongdoing, before then.

  Pressure has mounted on the ethics committee to release its findings, as members of the Senate begin meeting with Gaetz ahead of a hearing when they will vote on whether to confirm him as attorney general. "They’ve been going great," Gaetz said of the meetings on Wednesday. "Senators been giving me a lot of good advice. I'm looking forward to a hearing." The ethics committee had been preparing to vote on the report's release before Gaetz's abrupt resignation from the House, which came just after Trump's nomination, the New York Times reported. His departure cast doubt on whether the report would see the light of day, because having resigned he is no longer under congressional jurisdiction and the committee only investigates House members. The committee Chairman Michael Guest, a Republican, told reporters on Wednesday that he had "some reservations" about releasing the report because it is still going through the review process. He told CNN the committee would consider releasing it publicly or sending it directly to the Senate Judiciary Committee, but it remains uncertain whether it will leave the committee at all.

