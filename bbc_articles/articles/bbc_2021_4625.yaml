  In Wales, 1,519,760 people have been given their first dose of a coronavirus vaccine - 48.2% of the population.

  On Wednesday, unpaid carer Elle Taylor, 24, became the first person to receive the Moderna vaccine in the UK, as the rollout of the third vaccine in Wales began.

  Miss Taylor, 24, from Ammanford, cares for her grandmother and said it was important so she could care for her safely and properly.
