content: |-
  He freezes alcohol and fuel duty, and increases taxes on vaping - but Keir Starmer calls it a "last desperate act".

  'I don't think it goes far enough for people'

  Watching the Budget, ready to give us his reaction was Joe Makin, 23, who earns £22,000 a year working in admin and rents a one-bedroom house in Selby, North Yorkshire. The 2% National Insurance (NI) cut announced today means he will keep £188 a year more of his salary, or just over £15 a month. However, the NI cuts announced last autumn and today, combined with the income tax threshold freezes between 2021 and this April, mean that people earning £22,000 will still be over £150 a year worse off overall. Joe says: "Each month I earn about £1,600 after tax. Maybe £1,000-£1,100 of that goes on rent and bills. "The National Insurance cut for me is so negligible it's going to make little difference to me, but its scalable so for others it's a step in the right direction. "But as usual it never tends to go far enough for me. I was waiting for [the chancellor] to say 'And...' but it never came. "I don’t think it goes far enough for people who are worse off than me as the cost of living crisis is still very present."
