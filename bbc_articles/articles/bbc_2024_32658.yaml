title: 'Watch: Crowds gather in Damascus after rebels declare city ''free'' - BBC
  News'
date: '2024-12-08'
section: General
url: http://www.bbc.co.uk/news/videos/c75wwppvkp3o
content: |-
  Rebel forces say they have captured Damascus and that President Assad has fled the Syrian capital.

  Rebel forces in Damascus have declared the capital city "free" of long-time ruler Bashar al-Assad in the early hours of Sunday.

  Video, from the Associated Press, appears to show crowds of people gathered in the city, while gunfire can be heard in the background.

  President Assad is said to have left Damascus by plane for an unknown destination.
