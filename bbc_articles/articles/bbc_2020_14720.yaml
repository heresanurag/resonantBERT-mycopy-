id: bbc_2020_14720
title: Matt Hancock 'thrilled' with Covid vaccine approval news - BBC News
date: '2020-12-02'
section: General
url: http://www.bbc.co.uk/news/uk-55157299
content: |-
  The health secretary says the Pfizer/BioNTech vaccine will be rolled out in the UK "from next week".

  The UK has become the first country in the world to approve the Pfizer/BioNTech coronavirus vaccine for widespread use.

  Health Secretary Matt Hancock said he was "thrilled" with the news and that the vaccine would be rolled out "from next week".
