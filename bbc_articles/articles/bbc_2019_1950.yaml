title: Trump and Kim meet in Vietnam - BBC News
date: '2019-02-27'
section: General
url: http://www.bbc.co.uk/news/world-47383079
content: |-
  US President Donald Trump and North Korean leader Kim Jong-un are in Hanoi for talks.

  US President Donald Trump and North Korean leader Kim Jong-un are in Vietnam for a second summit, following a historic first round of talks in Singapore last year.

  The two leaders are expected to discuss progress towards ridding the Korean peninsula of nuclear weapons.
