content: |-
  Footage shows bodies being transferred on stretchers a Red Crescent team.

  Footage shows bodies being transferred on stretchers by a Red Crescent team after a helicopter crash killed Iranian President Ebrahim Raisi and Foreign Minister Hossein Amir-Abdollahian.

  The helicopter - one of three travelling in a convoy - crashed in heavy fog in the north of the country.
