  Gavin and Stacey originally ran for three series between 2007 and 2010, and follows a young couple, played by Mathew Horne and Joanna Page, who pursue a relationship despite one living in Essex and the other in Barry. Some fans already think they know what the new show holds. "I think I might have seen a spoiler - but I'm not prepared to say," said Karen. "I’m not going to tell you what my ending is - it's a spoiler. I think it is anyway!" The final episode of Gavin And Stacey will air on BBC iPlayer and BBC One on 25 December.
