  Steadman recalled reading the original script for the first time. "James and Ruth together, they are amazing, their scripts, so witty and funny," she said. "When I read the first scene I thought I've got to do this. I couldn't wait, I was going through the script and they didn't let me down." The 2019 episode had the highest overnight Christmas ratings in 12 years, with an average audience of 11.6 million viewers, making it the biggest festive special since 2008. By the new year, it had been viewed by 17.1 million people, making it the biggest scripted programme of the decade at the time.

  The episode won the impact award at the 2020 National Television Awards. After the final episode finished filming, the BBC posted on X, formerly Twitter: "And that's a wrap... for the last time ever." Earlier on Wednesday Steadman told BBC Radio 4's Woman's Hour: "It's been a real experience over 17 years from when we did the first series. It can't get better than that, really. "It has to go down as one of my most favourite, fun jobs."

  Alison Steadman, pictured filming for the 2019 Christmas special, said the tears were flowing when filming wrapped

  Hundreds of fans of the sitcom have queued up to see the stars of the show at well-known locations across the Vale of Glamorgan since filming began. "We've come down a few times over the last few weeks," said 61-year-old Karen Ash from Cwmbran, as shooting wrapped at Pam and Mick's Essex house, which is actually filmed a few miles away from Barry, in Dinas Powys. "I've been to every location," said 22-year-old Owain Cleese, from Barry. "I'm the biggest, biggest fan... I love them all, but I've got to say, who I miss the most is Doris. "It puts Barry on the map. If people come from England they could come and think 'Oh, let’s go to Barry. Oh, that's Gavin and Stacey's place - let's go there!'"

