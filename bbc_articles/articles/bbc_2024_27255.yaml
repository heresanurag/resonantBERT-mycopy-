content: |-
  The final episode of the sitcom, written by James Corden and Ruth Jones, will air on Christmas Day.

  Gavin and Stacey cast 'in tears' as show wraps

  Crowds of fans have queued to catch a glimpse of the stars of Gavin and Stacey, including Joanna Page and Ruth Jones, since filming began in September

  Gavin and Stacey star Alison Steadman has said after filming the final scenes of the hit show "90% of us were in tears". The actress told BBC's The One Show the cast had all been dreading the end. The sitcom's co-creators, James Corden and Ruth Jones, confirmed in May it would return for one last episode, which will be shown on Christmas Day. Filming began in September, with fans queuing up to see the stars at locations across the Vale of Glamorgan. It ended on Monday night.

  Filming the finale was emotional, said Steadman, who plays Gavin's mum Pam. The 78-year-old added: "We've had a great five weeks, we only finished on Monday night," she said.

  "But we were all dreading that final scene when we finished. "I think 90% of us were in tears, some people braved it, because it's been so fantastic. "We had a wrap party, it was very nice, it was lovely. "We'll just miss not filming it any more, it was fabulous." The show returned in 2019 for a one-off festive episode, which ended with Ruth Jones' character Nessa proposing to Neil "Smithy" Smith, played by James Corden.

