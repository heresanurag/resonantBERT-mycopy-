title: 'Covid-19: Oxford-AstraZeneca vaccine arrives at hospitals - BBC News'
date: '2021-01-02'
section: General
url: http://www.bbc.co.uk/news/uk-55515831
content: |-
  The first doses of the latest coronavirus vaccination to be approved are due to be given on Monday.

  The Oxford-AstraZeneca vaccine has started to arrive in hospitals, with the first doses due to be given on Monday.

  The Princess Royal Hospital at Haywards Heath in West Sussex was one of the hospitals taking a delivery on Saturday.

  The UK has ordered 100 million doses of the new vaccine - enough to vaccinate 50 million people.
