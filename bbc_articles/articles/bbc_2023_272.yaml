title: Further rail disruption in Scotland as RMT strike resumes - BBC News
date: '2023-01-07'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-64177118
content: |-
  UK-wide industrial action by RMT union members is continuing on Friday and Saturday.

  Train passengers in Scotland have been facing further disruption as Network Rail staff resumed strike action.

  The UK-wide industrial action by members of the RMT union took place on Tuesday and Wednesday, and is continuing on Friday and Saturday.

  ScotRail said a very limited service would run on strike days and schedules would also be disrupted on Sunday.

  Meanwhile engineers have fixed the main rail line between Glasgow and Carlisle after it was damaged by floods.

  The line reopened for passenger trains on Friday, but Network Rail urged customers only to travel if their journey was essential due to services being limited by strike action.

  About 40,000 Network Rail workers are expected to take part in the nationwide strikes over a pay dispute.

  Network Rail owns, repairs and develops the railway infrastructure - tracks, bridges, tunnels and signals - and its staff have essential safety roles.

  ScotRail said the action meant it would not be able to run the vast majority of its services.

  On strike days the train operator will run services on 12 routes across the central belt, Fife and the Borders between 07:30 and 18:30.

  The UK government is planning to introduce anti-strike laws in the current parliamentary session, which would mean unions could be sued if they do not provide minimum levels of fire, ambulance and rail services.

  The legislation - which would not resolve the current wave of strikes - would apply in England, Scotland and Wales - but not in Northern Ireland.

  Unions have condemned the proposed restrictions and threatened legal action, while Labour says it would repeal them.

  RMT members on the picket line in Glasgow

  Meanwhile, engineering on the West Coast Mainline near Carstairs was completed on Thursday.

  An embankment under the railway was damaged during heavy rain last week.

  Network Rail said its engineers had worked round the clock to remove hundreds of tonnes of landslip material along a 40m (131ft) section of the line.

  They also reinforced the area with more than 300 tonnes of new stone, re-laid the track above and checked signalling in the area.

  The embankment has been reinforced following the landslip

  The same section of track on 31 December following heavy rain

  Liam Sumpter, Network Rail's Scotland route director, said: "Our engineers have worked as quickly as possible to complete these repairs and reopen the railway.

  "We appreciate the inconvenience the closure of the line has caused and we thank everyone for their understanding during these recovery works."

  Avanti West Coast said a significantly reduced service would operate on Friday and Saturday and urged people travelling to and from Scotland to make their journeys on Sunday, Monday or Tuesday when a full timetable would be operating.
