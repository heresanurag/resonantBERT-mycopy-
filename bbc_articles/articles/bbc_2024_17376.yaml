content: |-
  The US president admits he 'had a bad night' in his debate against Donald Trump.

  President Biden has said he "had a bad night" after his debate against Trump but vowed to fight on in the election race and moved to reassure key allies.

  Questions have been swirling around his fitness for office and his ability to win the election following a debate marked by verbal blanks and a weak voice.
