title: Brexit bill clears Parliamentary hurdles - BBC News
date: '2020-01-22'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-51206245
content: |-
  The House of Lords bows to the will of the Commons and passes the government's Brexit bill.

  Lord Blunkett asks the government about the review of the continuation of the BBC licence fee at the next BBC Charter Review.

  Baroness Barran, answering for the government, says: "The Royal Charter maintains the licence fee funding model until the end of the charter in 2027.

  "However, the prime minister has indicated that the government will consider the licence fee funding model in the long term.

  "In addition, under the charter, the BBC has committed to consider how alternative funding models, such as subscription, could supplement licence fee income.

  "And the results of this will feed into the next charter review."

  Lord Blunkett says the BBC and its funding model is “held in such esteem across the world”.

  He says its right to independence should be defended, as well as its ability to hold politicians to account "in a vigorous fashion".

  He also thanks Lord Hall for "his stewardship over a very difficult and turbulent seven years at the BBC".

  Baroness Barran also thanks Lord Hall for his "extraordinary contribution to public service broadcasting".

  She says there is "no question" that the government supports the BBC to "bring impartial news and hold politicans to account".

  Lord Hall announced earlier this week that he is to step down as director general of the BBC in the summer.
