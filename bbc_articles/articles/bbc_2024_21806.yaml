title: 'Banksy theft: Two charged over stolen Girl with Balloon artwork - BBC News'
date: '2024-09-13'
section: London
url: http://www.bbc.co.uk/news/articles/ckgjg0zzypeo
content: |-
  The Girl with Balloon artwork was stolen from a central London art gallery on Sunday night.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV video shows the moment the Banksy artwork is stolen from a London gallery

  Two men have been charged after a Banksy artwork was stolen from a central London art gallery, the Met Police has said. An investigation was launched after a burglary at Grove Gallery on New Cavendish Street at about 23:00 BST on Sunday. The work, Girl with Balloon, was the only item stolen and has since been recovered and returned. Larry Fraser, 47, of Evelyn Denington Road, Beckton, and James Love, 53, of Elvin Drive, North Stifford, appeared at Wimbledon Magistrates' Court on Thursday, a Met spokesperson said.

  The Girl with Balloon piece was stolen on Sunday and later recovered

  The pair are set to appear at Kingston Crown Court on 9 October. According to court documents, the pair allegedly entered Grove Gallery as trespassers and stole "Girl With Balloon print to the value of £270,000". Grove Gallery held an exhibition called Banksy’s London Rebellion from 21 August to 7 September which featured the artist's works.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The gallery told BBC News there was over £1.8m worth of art on display at the time of the burglary. All of the artwork was removed and taken to storage following the theft.

  Lindor Mehmetaj, the gallery manager said he was "petrified and horrified" when he arrived at the gallery to find the broken glass and the Banksy gone. He alerted the police on Monday morning.

  Lindor Mehmetaj said he was "petrified" to see the artwork was taken

  On hearing from them that the artwork had been recovered he said it was remarkable to hear it had been found and that he could not believe his eyes when it was returned. It now sits in a nondescript office in the gallery, wrapped in a police evidence bag. He described the last few days as "completely bonkers". When asked if he had been in contact with Banksy since the robbery Mr Mehmetaj replied: "My lips are sealed."

  Professor Paugh Gough, an arts expert at the University of Bournemouth, said Girl with Balloon is Banksy's "most iconic images". "In 2017, it was voted by the British public, not in a huge survey (2,000 people), but an impressive survey as the most popular painting of that year, beating Turner and Constable," he said. One version was partially shredded after going under the hammer for more than £1m in 2018. "It does have a part in the British psyche," he added. Last month, Banksy unveiled a series of animal-themed works dotted across the capital, including one at London Zoo.
