content: |-
  The town is undergoing its own healing process ahead of the former president's visit.

  Sadness and defiance in Trump-shooting town trying to heal

  There is anger that the assassination attempt occurred in rock-solid Trump country

  In front yards, on the sides of roads and at filling stations, the messages on the billboards are blunt. "Bulletproof" is one, on a picture of the former president with his fist raised, moments after he was shot in this very town. Another, more overtly political, reads: "Even my dog hates Biden." The former president got twice as many votes as Joe Biden here in 2020, beating Hillary Clinton in 2016 by a similar margin. In fact, this county has only voted Democrat once in the past 150 years of presidential elections. Butler has always been proud to be known as the home of the American Jeep but this year it is better remembered for one thing - where a former Republican president was inches away from being assassinated. A bullet grazed his ear that day, on 13 July, and Butler is undergoing its own healing process as Donald Trump returns to the same spot, the Farm Show grounds, for a rally on Saturday evening. Trump's speech is expected to begin at about 17:00 local time (21:00 GMT), with the site reportedly already in lockdown ahead of his visit. For the first time since publicly endorsing the former president, Elon Musk - the boss of X, Tesla and SpaceX - has confirmed he will be in the audience. Ahead of Trump's return to Butler, the BBC has spoken to some of the people who were just a few feet away from him as the gunfire rang out back in July. There is sadness and guilt among local Republicans and resentment, too, that their county - so staunchly pro-Trump - was where this happened.

  The rally grounds where the shooting took place

  "That was the saddest moment of my life," said Jim Hulings, chairman of the Butler County Republican Party, who was 30ft away at the time and thought Trump had been killed. “I was horrified to think that somebody had the audacity to shoot a great man.” Jondavid Longo, the mayor of Slippery Rock, a small town just a few miles away, was on stage moments before the shooting, part of the warm-up act. When the gunman began to fire, he instinctively used his body to cover his pregnant wife. He says he replays the incident in his mind every day. "It's a difficult thing for us to come to terms with," he said. There is guilt that somebody else did lose their life that day, he says, and two others were seriously injured.
  • None Wife of man killed at Trump rally struggles with loss

  That person was Corey Comperatore, a 50-year-old former volunteer fire fighter, who died after throwing himself in front of the bullets to protect his wife and daughters. His widow Helen seems lost and distracted when I meet her. It’s clear she’s struggling. "I think about it every day. I see it every time I close my eyes." She and Corey were childhood sweethearts, married for 29 years. And both staunch supporters of Trump. They joked that day that the former president was going to invite Corey up on stage, she said. Days later, his fire chief’s jacket was taken to the Republican convention in Milwaukee and placed on stage as Trump made his acceptance speech for the nomination.

