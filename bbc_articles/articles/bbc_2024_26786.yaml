  "I just cried because, you know, I said he got his moment on stage with Trump." Like Helen, Trump supporters in Butler have dozens of questions about how it could have happened. While the motive of the 20-year-old gunman, Thomas Crooks, remain obscure, what has become much clearer is the series of security blunders that led to him pulling the trigger. Two hours before he opened fire, he was able to fly a drone around the site without being detected because Secret Service counter-surveillance equipment was not working. Communications failures meant that suspicious sightings of Crooks an hour and a half before he shot at Trump were not passed on to all elements of the Secret Service. More than half an hour before the shooting, he was seen by police using a rangefinder pointed at the stage - a device often used by hunters pursuing their prey.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'I see it every time I close my eyes', says widow of man killed at Trump rally

  Yet a little over 25 minutes later, Crooks had managed to climb on to the roof of a local business and fire eight shots. Seconds later he was dead, a single shot to the head from a Secret Service sniper. Those few seconds are still haunting many of those who witnessed it. Lucie Roth can be seen in the VIP seats behind Trump in one of the most recognisable pictures of the shooting, taken by a Reuters photographer. She initially thought the gunfire was fireworks but then she heard screams to "Get down!" and dropped to the floor. "I truly thought he was dead. I saw the Secret Service pile on top of him like he was the quarterback at a football game." She was still down when she heard the crowd roar and cheer, and knew then he was OK. Renae Billow and her 11-year-old son and Trump impersonator, Gino Benford, were a few feet away from Lucie and Gino is clearly visible in the Reuters photo, complete with a blond wig and a dark suit.

  Speaking from the family home in Johnstown, Pennsylvania, Gino says he was both scared and calm, "half and half", when the shots rang out. "I thought, who would want to do this to such a great president?" Reporting from just outside the rally that night, we began to interview people as they left. But one man stood out. He was wearing a Trump hat with fake orange hair sprouting out of it and holding a can of beer. Greg Smith’s words, in which he described how he had seen the gunman on the roof and tried to warn the Secret Service, reverberated around the world.
  • None Witness tells BBC he saw gunman on roof It provided the first hint at the catastrophic security failure and a clip of the interview was viewed by tens of millions of people on social media. Meeting him again this week at his store, just yards from the scene of the shooting, he still feels angry. "I was very frustrated when I talked to you, extremely frustrated because I think of the time frame. He was on that roof for minutes, crawling, and we were pointing and yelling." "I remember thinking 'Why? Why isn't someone doing something? How is this happening? How do I still hear President Trump talking as this is going on?'"

  There is also pride in what he did in speaking out. People tell him he is part of history, the first person to tell the world what happened. As someone who usually shuns the limelight, he added: "I jumped out of my comfort zone and did that. And I'm glad that it went like it did, that everything I told you that night has proven to be true." Greg, who that day was listening to Trump from outside the rally, does not plan to go to Saturday’s event. He says his 12-year-old son has been traumatised by it, jumping whenever he hears fire works. Despite still feeling angry about the security lapses, Helen Comperatore and her daughters will go back. It's what Corey would have wanted, she says. "I have tried to do that with everything I do, what would he want me to do? What would Corey do? And that's how I go."
