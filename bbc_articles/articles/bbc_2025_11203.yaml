content: |-
  Police have arrested two more men after a crash which left three people with serious injuries.

  Two more arrests after car hits pedestrians

  Police were called to the scene in the early hours of Saturday morning

  Two more people have been arrested after a car crashed into pedestrians in Leicester. Police were called to the incident in De Montfort Street in the city centre at 00:34 BST on Saturday, which left three people with serious injuries and one person with minor injuries. A 31-year-old man, from Leicester, had already been arrested on suspicion of causing grievous bodily harm with intent and causing serious injury by dangerous driving and has since been released on police bail. Officers said a 28-year-old man, from Leicester, and a 34 year-old man, also from Leicester have now been arrested, but said the 34 year-old was also released on bail.

  Officers said all four victims were sent to hospital on Saturday

  The 28-year-old man has been arrested on suspicion of causing grievous bodily harm with intent and causing serious injury by dangerous driving following the collision, and remains in police custody. The 34-year-old man was arrested on suspicion of affray, added officers. Police said the incident was reported to have happened following a fight at the same location and believe the suspects and the four victims had all been in attendance at a private event nearby prior to the incident. Three of the seriously injured people currently remain in hospital in a serious but stable condition, said police. The fourth person who suffered minor injuries and has been discharged from hospital.

