id: bbc_2019_13138
title: 'Iraq protests: Tear gas canisters ''aimed at protesters'' - BBC News'
date: '2019-11-25'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-50522724
content: |-
  Activists say military-grade cans are being fatally shot at people in anti-government protests in Iraq.

  More than 300 people have been killed in protests in Iraq since they began in early October.

  Several are reported to have died after being shot in the face with tear gas canisters, like 26-year-old Safaa al Saray who was protesting against the lack of jobs, an end to alleged corruption and better public services.

  The anti-government protests began in Baghdad's Tahrir Square and spread to cities across the south of the country.
