title: 'Covid: US funeral directors reflect on 200,000 death toll - BBC News'
date: '2020-09-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54244012
content: |-
  Three funeral directors reflect on the human toll of the pandemic, as the US hits a milestone.

  As the US Covid-19 death toll passes 200,000, owners and directors of funeral homes across the country reflect on how the loss of life has affected the families and communities that they serve.
