title: 'Watch: Dolphin pod spotted in the River Thames - BBC News'
date: '2024-04-06'
section: General
url: http://www.bbc.co.uk/news/uk-68409493
content: |-
  Volunteers from the RNLI said it was "incredible to witness" the two adults and a calf swimming in the river.

  A pod of dolphins have been spotted in the River Thames near Northfleet, Kent.

  Volunteers from the Royal National Life Boat Institution (RNLI) sighted the two adults and calf on Sunday afternoon.

  John Robinson, a crew member, said it was "incredible to witness right here on the River Thames, especially when they were jumping out of the water".

  The Thames is home to 125 species of fish, marine and terrestrial mammals, according to the RNLI.
