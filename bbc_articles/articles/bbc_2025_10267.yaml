title: Father of nine children killed by Israeli strike in Gaza still in critical
  condition - BBC News
date: '2025-05-26'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cp8djlg3zq5o
content: |-
  Hamdi al-Najjar's "life remains in danger", a Bulgarian doctor working at Nasser hospital in southern Gaza tells the BBC.

  Father of nine children killed by Israeli strike still in critical condition

  Hamdi al-Najjar is visited by relatives in Nasser hospital

  The husband of a Palestinian doctor in Gaza whose children were killed in an Israeli strike on Friday remains in critical condition, according to the hospital treating him. Hamdi al-Najjar's "life remains in danger", Dr Milena Angelova-Chee, a Bulgarian doctor working at Nasser hospital in Khan Younis, told the BBC. An Israeli strike killed nine of the couple's 10 children on Friday and left him and the couple's 11-year-old son injured. The Israeli military has said the incident is under review. The Red Cross meanwhile said two of its staff were killed in a strike on their home in Khan Younis on Saturday.

  The killing of Ibrahim Eid, a weapon contamination officer, and Ahmad Abu Hilal, a security guard at the Red Cross Field Hospital in Rafah "points to the intolerable civilian death toll in Gaza", the ICRC said, repeating its call for a ceasefire. On Sunday the Hamas-run health ministry said Israeli air strikes had killed 23 people since dawn, including a senior rescue service official and a journalist. Ashraf Abu Nar, a senior official in the territory's civil emergency service, and his wife were killed in their home in central Gaza, health officials said, while journalist Hassan Majdi Abu Warda and several family members were killed by a strike on his home in Jabalia in northern Gaza. Hamdi al-Najjar - a doctor like his wife - sustained significant injuries to his brain, lungs, right arm, and kidney in Saturday's attack, Dr Angelova-Chee said. The hospital is "doing everything we can for him", she added. The couple's surviving son Adam was also injured. Dr Angelova-Chee said her colleagues had told her he was doing "reasonably well". Dr Alaa al-Najjar was working at Nasser hospital when the Israeli attack happened. Video shared by Health Ministry Director Dr Muneer Alboursh and verified by the BBC showed small charred bodies being lifted from rubble. The nine children - Yahya, Rakan, Raslan, Gebran, Eve, Rival, Sayden, Luqman and Sidra - were aged between just a few months old and 12.

  Adam (L) is the only surviving child in the family. He is pictured here with his sisters Sidra and Rival (R) who were both killed in the Israeli air strike

  Right now Alaa's "priority is her family", she said, adding: "She's not the only one who faces this, many families are in the same position." "Everybody is really shocked because this continues already 18 months and it's compounded by constant threat of death, constant relocations and evacuations," she said. The Israel Defense Forces (IDF) said on Saturday that its "aircraft struck a number of suspects who were identified operating from a structure adjacent to IDF troops in the area of Khan Younis". It said the Khan Younis area was a "dangerous war zone" and the IDF had told people to leave for their own safety. On Monday the IDF said people in Khan Younis governorate should leave ahead of an "unprecedented attack" in one of the largest such evacuation orders in recent months. Some Palestinians told the BBC they had not left "because there is no place to go". According to the UN, about 81% of the territory is now either subject to Israeli evacuation orders or located in militarised "no-go" zones. Israel resumed air strikes and ground operations on 18 March and these have since killed 3,785 Palestinians, the health ministry says. Speaking after the strike that killed the nine al-Najjar children, an Israeli woman who was held hostage in Gaza told a rally in Tel Aviv that air strikes were what she feared most while in captivity. Naama Levy - one of five female surveillance soldiers abducted during the 7 October attack led by Hamas - said that each time air strikes began she was convinced she would die. She said she feared for the lives of remaining hostages in Gaza.

