  Israel also imposed a total blockade on Gaza on 2 March that lasted 11 weeks before it allowed limited aid to enter the territory in the face of warnings of famine and mounting international outrage. Israeli military body Cogat said on Saturday morning that 388 trucks carrying aid had entered Gaza since Monday. The UN says much more aid - between 500 to 600 trucks a day - is needed. The World Food Programme (WFP) told the BBC that no more trucks had entered Gaza on Saturday, and there had been a halt in the distribution of bread due to "severe security threats" faced by bakeries. "Operations in the current imposed conditions are not viable," the spokesperson said. WFP Director Cindy McCain later told the BBC's US partner CBS News that more trucks needed to enter Gaza "at scale" because there were "500,000 people inside of Gaza that are extremely food insecure, and could be on the verge of famine if we don't help bring them back from that." She said the looting of aid trucks since Israel partially eased its blockade was carried out by civilians who she described as "poor souls" who "are really, really, really desperate." Dr Angelova-Chee said her colleagues at the hospital were working "hungry", with one telling her on Saturday that he had only a couple more small packets of date biscuits left to eat. Israel has said the blockade was intended to put pressure on Hamas to release the hostages the Palestinian armed group Hamas is still holding in Gaza. Israel also accuses Hamas of stealing supplies, which the group has denied. On Sunday Israeli army chief Eyal Zamir visited Israeli troops in Khan Younis and told them that "this is not an endless war" and that Hamas had lost most of its assets and capabilities, the IDF said in a statement. Israel launched a military campaign in Gaza in response to Hamas's cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. At least 53,939 people, including at least 16,500 children, have been killed in Gaza since then, according to the territory's health ministry.
