title: Justin Timberlake admits 'tough week' after arrest - BBC News
date: '2024-06-22'
section: Culture
url: http://www.bbc.co.uk/news/articles/cn00w4zl76lo
content: |-
  The singer was arrested for driving while intoxicated in New York on Tuesday.

  The Cry Me A River singer was arrested on Tuesday

  Justin Timberlake has admitted it's been "a tough week" after he was charged for driving while intoxicated. Addressing fans at a concert in Chicago on Friday night, the singer also thanked them for continuing to support him. The 43-year-old pop star was arrested in New York on Tuesday for running a stop sign and failing to stay on the right side of the road. His lawyer has said he looks forward to "vigorously defending" the singer. In his first performance since the incident, Timberlake told the crowd: "It's been a tough week." "I know sometimes I'm hard to love, but you keep on loving me and I love you right back," he added. He also reminded fans that they have all been through “ups-and-downs and lefts-and-rights”.

  Police released the mugshot of the pop star shortly after news broke of his arrest

  The arrest occurred in Sag Harbor in the Hamptons, a popular summer destination for celebrities on Long Island. When officers stopped him, Timberlake's eyes were "bloodshot and glassy" and a "strong odour of an alcoholic beverage was emanating from his breath", according to a charging document. His speech was slowed and he performed poorly on the officers' sobriety tests, the document said. He also refused a breathalyser test, it added. "I had one martini and I followed my friends home," Timberlake allegedly told the officer who stopped him, according to the BBC's US partner CBS News. He was released without bail after being formally charged, and is scheduled to appear virtually in court on 26 July, Suffolk County District Attorney's Office has said. Timberlake has previously spoken openly about seeking help for excessive drinking. On Wednesday, his lawyer Edward Burke Jr told PA Media news agency: "I look forward to vigorously defending Mr Timberlake on these allegations." He added: "I will have a lot to say at the appropriate time but am currently awaiting full discovery from the District Attorney's office." Timberlake has been touring the US to promote his sixth album, Everything I Thought It Was, and is due to launch the international leg next month, kicking off with a two-night run in Poland. His scheduled court date coincides with the start of his world tour at the Tauron Arena in Krakow. In the state of New York, penalties for charges related to driving while intoxicated include up to a year in jail, a $1,000 (£786) fine and the suspension of a driver’s licence for at least six months. Timberlake was scheduled to perform two shows in Chicago this weekend, followed by a show in New York’s Madison Square Garden next Tuesday. A former member of the popular 90s boy band NSYNC, Timberlake is an actor, songwriter and one of the best-selling music artists in the world. The 10-time Grammy winner is also known for his roles in the films The Social Network and Friends With Benefits. Timberlake is married to actor Jessica Biel, with whom he shares two children.
