title: 'Premier League: Who is making the most of their substitutions in 2024-25?
  - BBC Sport'
date: '2025-03-07'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/cx2gl2j8x54o
content: |-
  Which Premier League teams make the most substitutions - and which manager has been able to create the biggest impact through changes?

  Brighton's Fabian Hurzeler uses the most substitutions, with 130 out of a possible 135 at an average of 4.8 per game. This is remarkably similar to his predecessor Roberto de Zerbi, who made 4.6 per match.

  Last season, Brighton were seeking to avoid injuries while balancing a maiden season in the Europa League.

  However, as Europe's second biggest spenders last summer, Albion now have a plethora of wingers to turn to off the bench and are not afraid to use them, making all five changes in 80% of their games.

  The majority tend to come late in matches, as Hurzeler shuffles his attacking wingers to have another go at a full-back if his first choice has not been successful or is tiring.

  It is interesting that two clubs in the relegation zone - Southampton and Ipswich Town - are in the top five for most substitutions made, with the majority coming early in games, either at half-time or shortly after the break.

  This is because both teams have regularly gone behind in matches and found themselves in need of a quick change to try to find a solution.

  At the other end of the scale, just like last season, Manchester City boss Pep Guardiola barely makes substitutions.

  In 2023-24 when City won the league, Guardiola averaged three subs per game. That was justified with City rarely needing to alter a winning machine - but, despite more obvious problems this season, he still only makes an average of 3.3 substitutions per match.
