  The plan is widely expected to encounter resistance from Republicans in Congress.

  Although the Democrats hold a slim majority, they may not support the plan unanimously.

  Nevertheless, the news was enough to cause a few jitters on Wall Street.

  The Dow Jones Industrial Average fell 420 points before reining in its losses slightly.

  "If it had a chance of passing, we'd be down 2,000 points," Thomas Hayes, from Great Hill Capital told Reuters.
