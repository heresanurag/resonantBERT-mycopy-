title: Vladimir Putin congratulates 'courageous' Trump on election win - BBC News
date: '2024-11-08'
section: General
url: http://www.bbc.co.uk/news/videos/c30pzd3znqmo
content: |-
  The Russian president says he was impressed by Trump's reaction to the first assassination attempt against him.

  Russian President Vladimir Putin has congratulated Donald Trump on his victory in the US presidential election.

  Calling him "courageous", Putin said he was impressed by Trump's reaction to the first assassination attempt against him in Butler, Pennsylvania.

  Putin has been addressing the Valdai Discussion Club in the Black Sea resort of Sochi.
