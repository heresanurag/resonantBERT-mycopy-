title: Crocodile Dundee croc Burt dies in Australia - BBC News
date: '2024-12-23'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx2we313k6ro
content: |-
  Burt, who had lived at Crocosaurus Cove since 2008, was thought to be over 90 when he died.

  The crocodile from Crocodile Dundee dies in Australia

  For safety reasons, a fake version of Burt (pictured with Hogan) was used for some of the promotional photographs

  The crocodile who starred in 1980s hit film Crocodile Dundee has died in Australia. Burt, who was thought to be over 90 years old, appeared alongside Paul Hogan and Linda Kozlowski in the 1986 movie. News of his death was confirmed by staff at Crocosaurus Cove in Darwin, a reptile and aquarium attraction where Burt had lived since 2008. In a statement posted on Instagram, external, the wildlife centre wrote: "It is with great sadness that we announce the passing of Burt, the iconic saltwater crocodile and star of the Australian classic Crocodile Dundee.

  "Burt passed away peacefully over the weekend, estimated to be over 90 years old, marking the end of an incredible era."

  Burt, pictured with Hogan on set, had lived at Crocosaurus Cove in Darwin since 2008

  In the film, character Mick Dundee (Hogan) swaps the Australian outback for the jungle of New York after meeting American reporter Sue Charlton (Kozlowski), who eventually falls in love with him. The croc is famously seen in the scene where Kozlowski's character is attacked as she kneels next to a creek. Burt, who was captured in the 1980s in the Northern Territory's Reynolds River, was described by Crocasourus Cove as having a "bold" personality. "Burt was a confirmed bachelor - an attitude he made clear during his earlier years at a crocodile farm," the centre's statement continued. "His fiery temperament earned him the respect of his caretakers and visitors alike, as he embodied the raw and untamed spirit of the saltwater crocodile." "Burt was truly one of a kind. He wasn't just a crocodile; he was a force of nature and a reminder of the power and majesty of these incredible creatures.

  "While his personality could be challenging, it was also what made him so memorable and beloved by those who worked with him and the thousands who visited him over the years. The statement concluded: "Visitors from around the globe marvelled at his impressive size and commanding presence, especially at feeding time." It's not unusual for saltwater crocodiles to live beyond 70 years old, especially in captivity. Burt will be honoured with a commemorative sign at the attraction.

  Crocodile Dundee remains the highest grossing Australian film of all time, taking $47,707,598 (Australian dollars). It also spawned two sequels, 1988's Crocodile Dundee II and 2001's Crocodile Dundee in Los Angeles. Hogan and Kozlowski got married in 1990 but later divorced. A documentary on the making of the film is expected to be released next year.
