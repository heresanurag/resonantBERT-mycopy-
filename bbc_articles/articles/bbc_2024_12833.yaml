title: Hungary's Euro 2024 ambitions and Viktor Orban's politics - BBC Sport
date: '2024-06-21'
section: European Football
url: http://www.bbc.co.uk/sport/football/articles/cekk4zp5rg8o
content: |-
  Hungary have ridden back into contention for international honours on the back of billions of euros and one man's passion for football.

  Seventy years ago - 150 miles south of Stuttgart, where the two teams' met at Euro 2024 on Wednesday - Hungary faced West Germany in the World Cup final.

  Having beaten the Germans 8-3 in the group stage, Hungary were hot favourites to win the final in Bern, Switzerland. But, after taking a two-goal lead inside eight minutes, they were sensationally defeated 3-2, losing their first game in five years and breaking a 31-match unbeaten run.

  They never scaled such heights again.

  Hungary's stellar group of players - known as the 'Mighty Magyars' or 'Golden Team' - broke up two years later, many of its members choosing not to return home after the Hungarian Uprising of October 1956 had been violently crushed by the Soviet Union.

  The finest of them all - Hungary's captain Ferenc Puskas - wound up at Real Madrid, where he was given the nickname 'Pancho'.

  The stadium in Felcsut bears Puskas' nickname thanks to the village's most famous resident - Hungary's football-crazy Prime Minister Viktor Orban.

  First elected in 1998 at the age of 35, and now the longest-serving leader in the European Union, Orban has transformed Hungary, rewriting the country's constitution and election laws. What he has changed it into is open to debate. Orban has described his approach as "illiberal democracy" and "Christian democracy".

  In 2022, the European Parliament opted for a "hybrid regime of electoral autocracy", accusing Orban and his government of “deliberate and systematic efforts to undermine European values"., external

  On the new stadium in his hometown, Orban is certain however.

  "It's art," he said in February 2017.

  "It would be easier to build up something more simple, you know, but this is evidence that football is part of art."

  Orban wasn't born when Hungary played in the 1954 World Cup final, yet his childhood passion for the game was fuelled by the near-mythical tales of the 'Golden Team'.

  Orban was a good footballer as well. He played for the youth team of top-flight team Fehervar (known as Videoton at the time), before law school and a political career - supercharged by the fall of communism in Eastern Europe in 1989 - focused his career aspirations elsewhere.
