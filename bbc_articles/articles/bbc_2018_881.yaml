title: Joey Barton speaks out about gambling addiction - BBC News
date: '2018-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-42783956
content: |-
  The footballer says he thinks he'll always be in recovery from the addiction.

  Former England player Joey Barton was banned by the Football Association in April 2017 for breaching betting rules.

  He told the Today programme he thinks he'll always be in recovery from the addiction.
