title: Double decker bus roof ripped off in Fauldhouse bridge crash - BBC News
date: '2024-03-11'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-68534379
content: |-
  The 59-year-old driver was the only person on the bus in the incident in Fauldhouse, West Lothian.

  The bus crashed through the bridge near Fauldhouse Railway Station

  The driver of a double decker bus has been charged after its roof was ripped off in a crash with a bridge in West Lothian.

  The Lothian bus hit the railway bridge on Shotts Road near Fauldhouse station just before 06:00. There were no passengers on board at the time.

  Network Rail said the bridge was not damaged and trains were operating as normal.

  Police said a 59-year-old man would be reported to the Procurator Fiscal.

  West Lothian Council said its staff had attended to assist with the clean-up.

  A spokesperson for Lothian buses said the firm was "fully assisting Police Scotland" with enquiries into the incident.

  A bus crashed into the same bridge in July 2019

  A Police Scotland spokesperson said: "Officers received a report of a bus crashing into a bridge on the B7010, Fauldhouse.

  "There were no reported injuries. Arrangements were made for the bus to be recovered and the road is open."

  The incident comes after a Lothian double decker bus hit the same bridge in a similar crash in July 2019.

  No-one was injured and the bus driver was the only occupant of the vehicle at the time.

  Meanwhile, 10 people were taken to hospital in May last year after a double-decker bus crashed into a bridge in Glasgow and had its roof torn off.
