content: |-
  Sara Beare, a commuter, confronts Southern Rail and RMT bosses.

  Sara Beare is a commuter from Lingfield on Southern Rail. She teamed up with Today's Matthew Price to put questions to Southern and the RMT.

  Alex Foulds, passenger services director at Southern, said that the unions have overreacted, while Mick Lynch from the RMT defended their reasons for striking. Did Sara get some answers for herself and her fellow commuters?
