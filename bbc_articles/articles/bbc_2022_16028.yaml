  • None And put yourself in Southgate's shoes - who should start for England?

  England midfielder Jack Grealish says the team enjoy trying to "prove wrong" the doubters as they gear up for their biggest test yet against France.

  After England's 3-0 win over Senegal in the last 16, midfielder Declan Rice said he did not think the team received the credit they deserved and Grealish agrees with his team-mate.

  "I don't think we ever do [get enough recognition] but sometimes it is nice to be, not underdogs, but where people just don't really give you credit and you can keep proving them wrong," the Manchester City forward told BBC Sport.

  "People were saying things about us when we played the USA and we didn't score.

  "But we have been scoring goals, keeping clean sheets and controlling games, so we will go into the [France] game full of confidence."
  • None We really believe we can win World Cup - Maguire

  After runs to the 2018 World Cup semi-finals and Euro 2020 final, Grealish says this England team has a "special bond" with the fans and thinks Three Lions supporters now have a belief that had been previously lacking.

  "The fans are going into each game thinking this team can win whoever they play against," he said.

  "No doubt this game [against France] will be biggest test yet but you're never going to get to a World Cup final without playing the best.

  "But we know if we do everything right and play the way we have been then we can beat anyone on our day and I think we have proven that in the last few games."
