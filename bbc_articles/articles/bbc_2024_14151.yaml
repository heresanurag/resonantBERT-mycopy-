content: |-
  Wales call up Scarlets centre Eddie James to the squad preparing for summer games against South Africa and Australia.

  Wales coach Warren Gatland has called up uncapped Scarlets centre Eddie James to his squad preparing for summer games against South Africa and Australia.

  The 21-year-old's inclusion takes the squad total to 37 and its uncapped tally to five.

  James joins Cardiff pair Mason Grady and Ben Thomas, Nick Tompkins of Saracens and Ospreys' Owen Watkin as a contender for a midfield spot.

  Gatland also initially selected Gloucester wing or full-back Josh Hathaway among the uncapped players to face South Africa and Australia.

  Ospreys wing Keelan Giles and Cardiff pair Jacob Beetham and Ellis Bevan are the other uncapped players in the training squad.

  Gatland's side face the Springboks at Twickenham on 22 June, when several players based outside Wales are unavailable for a match outside the official Test window.

  Veteran full-back Liam Williams and Japan-based lock Cory Hill were the surprise inclusions when Gatland announced the squad.

  The squad will be trimmed to 34 before heading on a two-Test tour of Australia in July.
