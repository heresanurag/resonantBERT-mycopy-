title: London Bridge attack hero feels 'abandoned' - BBC News
date: '2018-06-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-44329243
content: |-
  Florin Morariu confronted three attackers during the violence in London Bridge and Borough Market.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A Romanian baker who fought three terrorists with crates during the London Bridge attack has said he feels abandoned by the authorities.

  Florin Morariu helped people hide in his bakery then confronted the three men when they launched their van and knife attack on 3 June last year.

  He said he had suffered post-traumatic stress disorder (PTSD) since then but "felt like no-one was helping me".

  The government said it was "committed" to providing support to those affected.

  Eight people died when three men drove a van into pedestrians on London Bridge and launched a knife attack in Borough Market.

  This video can not be played To play this video you need to enable JavaScript in your browser. Florin tried to fight off an attacker at Borough Market

  Mr Morariu said he had suffered nightmares about what had happened.

  "I remember how people have died. How people lay on the pavement having been stabbed. The chaos," he said.

  This video can not be played To play this video you need to enable JavaScript in your browser. Traders who were affected by the attack on London Bridge and Borough Market speak about it a year on

  Afterwards, Mr Morariu was asked to leave his home by his landlady who feared reprisals from supporters of the attackers.

  He then returned to Romania for counselling and to try to get his life back on track.

  His "heroism" was praised by Theresa May in the House of Commons but the Romanian national said he "didn't need to be called a hero. I only need to be supported".

  The Home Office told the BBC the government is "committed to supporting those caught up in attacks" and said Mr Morariu can apply for financial compensation.

  The baker has returned to the UK for the anniversary "out of respect for the victims" and hopes to attend a remembrance service on Sunday at Southwark Cathedral.

  This video can not be played To play this video you need to enable JavaScript in your browser. PC Marques fought all three attackers at the same time

  Meanwhile, a British Transport Police (BTP) officer who was seriously injured has said he hopes to return to work next month having made "significant progress".

  PC Wayne Marques was stabbed multiple times, including in the head, leg and hand, when he confronted the attackers with just his baton.

  The 39-year-old said his family were concerned about his return to work but "it's a job that I enjoy. It's who I am".
