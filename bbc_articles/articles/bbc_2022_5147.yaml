  Burnley sack manager Sean Dyche with eight games left of their season in the Premier League.

  Burnley sack manager Sean Dyche with eight games left of Premier League season Last updated on .From the section Burnley

  Sean Dyche managed just four league wins with Burnley this season Burnley have sacked manager Sean Dyche with eight games left of their season in the Premier League. The Clarets, who have lost five of their last six top-flight games, are 18th and four points from safety. Dyche was the Premier League's longest serving manager, having taken over at Turf Moor in October 2012. Burnley chairman Alan Pace said it was "an incredibly difficult decision" to part company with the 50-year-old, but "we feel a change is needed". Dyche's last game in charge of Burnley saw them lose 2-0 to Norwich City, who are bottom of the Premier League. Assistant manager Ian Woan, first-team coach Steve Stone and goalkeeping coach Billy Mercer have also left the club. "Firstly, we would like to place on record our sincere thanks to Sean and his staff for their achievements at the club over the last decade," said Pace. "During his time at Turf Moor, Sean has been a credit both on and off the pitch, respected by players, staff, supporters, and the wider football community. "However, results this season have been disappointing and, while this was an incredibly difficult decision, with eight crucial games of the campaign remaining, we feel a change is needed to give the squad the best possible chance of retaining its Premier League status. "Under-23s coach Mike Jackson, assisted by academy director Paul Jenkins, Under-23s goalkeeping coach Connor King and club captain Ben Mee have been asked to take charge of the team for Sunday's game with West Ham United. "The process of replacing Sean has begun and further announcements will be made to supporters in due course." Dyche had signed a new four-year contract until 2025 with Burnley in September last year. During his spell at the club he guided them to two promotions from the Championship and two top-half Premier League finishes. He also helped Burnley achieve their first European qualification in 51 years courtesy of leading them to a commendable seventh place in the Premier League in 2017-18. However, the Clarets have won just four Premier League games this season, the worst win record in the league. 'Burnley fans were still loyal to him' "It's massive news, no one really expected it," reacted former Burnley midfielder Paul Weller. "He has been backed by the board for so long, so to do it so late in the season is a really big surprise. "To do it so late in the week is leaving it really tight because there's a massive game coming up against West Ham on Sunday. There's a big eight games left and we need somebody in there quick." Weller added: "Sean has had to take the ultimate punishment. "What he has done at Burnley is unbelievable, he has done it on a shoestring [budget]. He's not been supported by any of the chairmen financially like other Premier League managers have been. "It's been a really difficult season and I think that's why everybody is so surprised because the fans love him. "Even though we are struggling, we are down at the bottom and it's looking like relegation, Burnley fans were still loyal to him." 'The impact has to be absolutely immediate' - Analysis Burnley are in their sixth successive season in the Premier League, which is their longest run in the top flight since their heydays in the 1960s. It is a brave owner of any football club who just accepts relegation without doing something to stop it. Alan Pace, the owner and chairman of Burnley, is a relatively new owner and he has decided to act. The impact has to be absolutely immediate and I guess that means Burnley picking up points immediately. They start against West Ham on Sunday, then Southampton and Wolves. Sean Dyche is highly employable. Any like-minded club such as Burnley, Dyche will be top of the people who will be to be favourites to take over that job. He has been linked with many Premier League jobs over the years. He has always responded to those rumours by saying he was at Burnley - now he is not. I don't think it will be long until he gets another job. Clearly the problem for Burnley is getting another manager for themselves.
