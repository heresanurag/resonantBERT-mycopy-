title: 'As it happened: Cases up three quarters in England in a week, figures show
  - BBC News'
date: '2021-06-04'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57355091
content: |-
  Portugal has moved off the the government's travel "green list", with no countries added to it.

  Simon Smith, who is currently in Portugal, says his family has been racing to find Covid tests to get a return flight to the UK on Saturday morning.

  The property developer from Stamford, Lincolnshire, who owns a villa in the Lagos area, says he has visited five medical centres and the main hospital to try and get his family tested.

  He says he was turned away from one centre after it ran out of testing kits.

  Mr Smith, who is abroad with his wife and two children, aged two and four, says: "There were about 35 people in the queue, all British, and they told us, 'the first 15 are okay, but the rest of you might as well go home because we don't have enough tests'."

  "It's really safe here in Portugal," he adds. "On the Algarve, there are very few cases, and all the restaurants and shops take it really seriously."

  The family has been told the airport has a small amount of Covid tests available, so plan on turning up to their flight five hours early in the hopes of getting one.

  "If we can't get that, we can't fly," he says. "And then we are going to be stuck here, and then have to face ten days' quarantine. I have meetings on Friday, I can't afford ten days' quarantine, it is a joke."
