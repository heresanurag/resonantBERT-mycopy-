title: 'Crazy Town: Butterfly singer Shifty Shellshock dies, aged 49 - BBC News'
date: '2024-06-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/cpdd91d3lmko
content: |-
  The band were best known for the rap-rock single Butterfly, which was a top 10 hit in 2001.

  The singer and rapper was best known for the hit single Butterfly

  Shifty Shellshock, the frontman of rap-rock band Crazy Town, has died aged 49. The musician was best known for the 2001 single Butterfly, which was a US number one hit, and reached number three in the UK. Born Seth Binzer, he founded Crazy Town in 1995, and later enjoyed success with DJ Paul Oakenfold on the club track Starry Eyed Surprise. However, he struggled with addiction throughout his life, addressing his condition on reality shows such as Celebrity Rehab and its follow-up, Sober House. He was found dead at his home in Los Angeles on Monday 24 June. A cause of death has not yet been disclosed.

