content: |-
  British boxing trailblazer Chantelle Cameron has stopped working with trainer Jamie Moore.

  Chantelle Cameron (right) has only lost to Katie Taylor in 20 pro fights

  Former undisputed light-welterweight champion Chantelle Cameron has split with trainer Jamie Moore. Briton Cameron, 32, was outpointed by Katie Taylor in Dublin in November, having beaten the Irishwoman on points in their first meeting in May. A trilogy bout is in the works for this summer, but Cameron will be without the coach who led her to becoming England's first undisputed champion. She will now work with Sheffield-based trainer Grant Smith. "We've just decided to go our separate ways," Moore told Pro Boxing Fans., external "We haven't fallen out or anything like that. I wish her all the best. I'll always love her. We had a great ride together." Cameron, who has won 19 pro fights with one loss, linked up with Manchester-based Moore in 2019 before winning her maiden world title the following year. The Northampton fighter unified the division against Jessica McCaskill in 2022, becoming the first boxer from England to hold all four recognised world titles.

  Her breakout night, however, came when she inflicted a first career defeat on pound-for-pound star Taylor last year. Despite losing the rematch, promoter Eddie Hearn says Cameron is the frontrunner to face Taylor in Dublin this summer.
