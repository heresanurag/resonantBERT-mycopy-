title: Fire brigade help Yorkshire Wildlife Park give polar bear dental check-up -
  BBC News
date: '2017-01-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-38729348
content: |-
  South Yorkshire Fire Brigade were called in to assist in giving a polar bear a dental check-up.

  Staff at the Yorkshire Wildlife Park noticed Victor had a discoloured tooth.

  After being put to sleep and moved by fire officers, the 18-year-old was ready for his "scrape and polish".
