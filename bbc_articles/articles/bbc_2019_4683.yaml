title: 'Nipsey Hussle: The rapper who gave back - BBC News'
date: '2019-04-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-47781313
content: |-
  Ermias Asghedom, known as Nipsey Hussle, was shot dead outside his clothing store in Los Angeles.

  Artists including Drake, Rihanna and J Cole have paid tribute to the 33-year-old rapper who was known for giving back to his community in Crenshaw, Los Angeles.
