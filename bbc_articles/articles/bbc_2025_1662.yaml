  Earlier, Zelensky also rejected Trump's attempts to access Ukraine's rare minerals, saying no security guarantees were offered in exchange. Trump has attempted to make an issue out of Zelensky's popularity, claiming the Ukrainian president had only a 4% approval rating. But BBC Verify reports that polling conducted this month found 57% of Ukrainians said they trusted the president. In Wednesday's explosive Truth Social post, Trump also took aim at Europe, saying the war in Ukraine is "far more important to Europe than it is to us". "We have a big, beautiful ocean as a separation," he said. Europe had "failed to bring peace" in the region, he added. Meanwhile, Russian President Vladimir Putin also spoke to reporters, saying he would meet Trump "with pleasure". For its part, the EU said it would place further sanctions on Russia. The new sanctions target Russian aluminium and dozens of vessels suspected of illegally transporting oil. They would also disconnect more Russian banks from the global Swift payment system and ban more Russian media outlets from broadcasting in Europe.
