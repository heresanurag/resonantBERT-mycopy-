  The former prime minister of Ukraine, Arseniy Yatsenyuk, told the BBC that Russia was "popping champagne right now" in response to Trump's comments. "Volodymyr Zelensky is a completely legitimate president," he said. "We cannot hold elections under martial law." The war of words began with comments made by Trump on Tuesday at a news conference at Mar-a-Lago in Florida, when he blamed Ukraine for the war. Trump was asked by BBC News what his message was to Ukrainians who might feel betrayed, to which he replied: "I hear that they're upset about not having a seat, well, they've had a seat for three years and a long time before that. This could have been settled very easily." "You should have never started it. You could have made a deal," Trump added. Trump did not mention that President Vladimir Putin took the decision to invade Ukraine in February 2022. Then on Wednesday, Zelensky told reporters in Kyiv: "We are seeing a lot of disinformation and it's coming from Russia. With all due respect to President Donald Trump as a leader... he is living in this disinformation space." He added that he believed "the United States helped Putin to break out of years of isolation". Later in the day, the Ukrainian leader said the world faced the choice to be "with Putin or with peace" and announced he would be meeting Washington's Ukraine envoy, Keith Kellogg, on Thursday.

