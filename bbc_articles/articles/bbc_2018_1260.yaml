title: British 'extreme kayaker' sets 128ft waterfall record - BBC News
date: '2018-01-20'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-42744530
content: |-
  Bren Orton plunged down the Big Banana falls in Mexico, setting a British record.

  Bren Orton holds the British record for the highest waterfall descent navigated in a kayak.

  He spoke to the BBC about how it felt as he plunged down the Big Banana Falls, in Mexico, at a speed of 60mph.
