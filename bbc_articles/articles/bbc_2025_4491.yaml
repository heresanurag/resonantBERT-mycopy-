title: Hare-coursing dogs found in water butt near Soham, Cambridgeshire - BBC News
date: '2025-03-21'
section: General
url: http://www.bbc.co.uk/news/videos/c1kj14p8vngo
content: |-
  Four dogs are seized as police tackle the illegal bloodsport in rural Cambridgeshire.

  Police have seized four dogs suspected of being used for illegal hare-coursing, two of which had been hidden inside a water butt.

  Rural patrols attended Long Dolver Drove in Soham, near Cambridge, after a farmer reported hare coursers near the A142 last week.

  After a short pursuit on foot, three men were detained and given community protection warnings, external by Cambridgeshire Police.

  The seized dogs have been put into kennels.
