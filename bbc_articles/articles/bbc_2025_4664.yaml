  Liberal Democrats' Treasury spokesperson Daisy Cooper said she was "deeply concerned that the government may even be considering reducing the digital services tax". "If the government is seriously talking about putting savage cuts in place that will affect disabled people while also giving a tax handout to Elon Musk, Zuckerberg, and other US tech barons, then the Labour government are at real risk of losing their moral compass," she told the BBC. The Liberal Democrats are pushing for the DST to be tripled to 6%.
