title: 'Kent: Manhunt continues after Knockholt Valentine''s Day shooting - BBC News'
date: '2025-02-17'
section: Kent
url: http://www.bbc.co.uk/news/articles/cn930n4lgz0o
content: |-
  Police say they are "not ruling out the possibility" that the suspect may have entered the Thames.

  The shooting took place outside the Three Horseshoes pub on Friday evening

  Police are investigating whether a suspect wanted after the fatal shooting of a woman outside a pub on Valentine's Day may have entered the River Thames. The woman, who was in her 40s, died at the scene of the attack, which happened at the Three Horseshoes in Knockholt, Kent, just after 19:00 GMT on Friday. Police later found a vehicle that contained a gun on the Queen Elizabeth II Bridge, which crosses the River Thames, near Dartford. The force said it was not ruling out the possibility the suspect may have entered the water after it received reports of a man "on the wrong side of the barrier".

  The woman has not been identified but police said her attacker was known to her. It is thought neither were from Kent but had connections to the local area. A Kent Police spokesperson said: "Officers continue to work with the families of both parties involved to support them following this tragic incident."

  Flowers have been left outside the pub in Knockholt where the woman died

  BBC reporter Ben Schofield, at the scene in Main Road, Knockholt, on Sunday, said more information was "gradually becoming available". The Three Horseshoes landlady told him staff recognised the victim, though she was not a regular at the venue. She confirmed the pub was reopening Sunday lunchtime. Villagers recalled hearing gunshots "ringing out" at about 19:00 GMT on Friday. On Saturday, police said they were looking for one suspect and did not believe there was an ongoing risk to the public. Flowers have been left outside the village pub, which is about five miles (8km) north-west of Sevenoaks.

