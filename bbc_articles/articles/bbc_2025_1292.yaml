  In a statement posted on its Facebook page, the Three Horseshoes pub expressed its "sincere condolences to the victim's family and friends". A spokesperson added: "We also want to send our support to anyone else in the local and surrounding community who have been impacted by this. "Please be respectful of everyone involved at this difficult time." Meanwhile, local reverend Tim Edwards said prayers had been offered at St Katherine's Church in Knockholt "for the family and all affected". He said the church would also be open for anyone who wanted "to pray or just sit quietly".
