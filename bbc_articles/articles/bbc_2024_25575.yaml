title: Teen given life sentence over Devon school hammer attack - BBC News
date: '2024-10-19'
section: Devon
url: http://www.bbc.co.uk/news/articles/c781p92vdyko
content: |-
  Two pupils and a housemaster at Blundell's School in Tiverton suffered serious injuries.

  Two pupils and a housemaster were injured during the attack at Blundell's School

  A teenage boy has been detained for life to serve a minimum term of 12 years after trying to kill three people in an attack with a hammer at a boarding school. The 17-year-old - who cannot be named for legal reasons - attacked two roommates, aged 15 and 16 at the time, during the early hours of 9 June 2023 at Blundell's School in Tiverton, Devon, leaving them with severe injuries. He also attacked housemaster Henry Roffe-Silvester, who suffered six wounds to his head. The teenager, who claimed he was sleepwalking during the incident, was sentenced at Exeter Crown Court on Friday after previously being found guilty of three counts of attempted murder.

  Sentencing him, Judge Mrs Justice Cutts said: "You knew the difference between right and wrong and you intended to kill those boys."

  During a trial which ended in June, the court heard the defendant - who was 16 at the time of the attack - had armed himself with three claw hammers. The trial heard the teenager had admitted assaulting the victims but claimed he was sleepwalking when the attack took place, meaning he would be not guilty of attempted murder by reason of insanity. Giving evidence, he claimed he kept two hammers by his bed for "protection" from a "zombie apocalypse". He added: "I feel very terribly sorry for all three individuals because of what I did to them. "I feel very sorry for everyone, the families and themselves."

  The defendant had bought the hammers for "protection", the court was told

  The court heard he waited for his two roommates to fall asleep before attacking them. The pair suffered injuries including skull fractures, a punctured lung and internal bleeding, with the court being told both were now living with "long-term consequences" of the incident. Mr Roffe-Silvester was hit several times over the head with a hammer when he went to investigate what was happening when he was awoken in his quarters by the incident, the court was told.

  Kerim Fuad KC, defending, told the court the defendant had also been diagnosed with autism spectrum disorder and had an "unhealthy interest in violence and violent films". He added the defendant was also struggling with other difficulties, including exam and personal life issues, and was being blackmailed by a female at the time of the incident over intimate photographs. Mr Fuad said: "This was a very unhealthy cocktail of extreme stress."

  Sentencing, Mrs Justice Cutts said the defendant was "dangerous". She added she accepted things "would be difficult" for the teenager in custody, but felt there was a "significant risk" he could behave in a similar manner again. "You planned your offences and used hammers you had bought as weapons," the judge said. "You knew full well if you hit the boys multiple times with the hammers they would die."

  The attack took place in a bedroom at the boarding school in Devon

  The families of the victims - who are now aged 16 and 17 - said the hammer attack had been a "horrific case" to deal with and thanked everyone who had helped them. A family member of the 17-year-old victim said: "I am looking forward to my family moving on now that the trial is over, and I hope my son will continue his recovery and have a good future ahead." The 16-year-old's family added: "We are indebted to everyone involved and would like to convey our sincerest thanks." After the sentencing, Det Insp Dave Egan, senior investigating officer for Devon and Cornwall Police, said it had been an "unprovoked attack" which would have a "lasting impact" on the victims, their families and the whole school community. "The assaults were both brutal and savage, and I have no doubt that his intent was to kill," Insp Egan said.

  School head teacher Bart Wielenga said he was "tremendously proud" of how the community at the school had reacted. Mr Wielenga said: "We should be pleased that the process is coming to an end, glad that justice is taking its course, grateful for the wellbeing of Mr Roffe-Silvester and the boys concerned; but, ultimately, sad that such an event with such horrific consequences ever took place here."
