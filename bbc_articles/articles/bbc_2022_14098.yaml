content: |-
  Voters in Hull react to Prime Minister Liz Truss's resignation and speculate on what comes next.

  Sir Keir Starmer, Rishi Sunak or Boris Johnson were the names mentioned by voters in Hull when asked who should take over from Prime Minister Liz Truss.

  The BBC spoke to people in the city centre on Thursday after Ms Truss announced she would be standing down.
