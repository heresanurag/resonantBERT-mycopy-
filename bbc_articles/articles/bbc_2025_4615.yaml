content: |-
  Saturday's front pages cover the chaos at Heathrow and one year since the Princess of Wales shared her cancer diagnosis.

  'Heathrow's day of chaos' and 'Kate's year of courage'

  The FT Weekend, the Sun and the Mirror all carried images like this of the fire at the substation near Heathrow

  The Financial Times Weekend says Chancellor Rachel Reeves will blame a "changing world", external when she outlines more than £10bn of spending cuts in her Spring Statement next week. The moves are said to include a £5bn crackdown on departmental spending growth, in addition to the £5bn of welfare cuts already announced. The paper says people briefed on her speech have warned it will make "dismal reading". The Times says Reeves "faces a day of reckoning",, external with the independent watchdog, the Office for Budget Responsibility, expected to halve growth forecasts for next year when it delivers its latest verdict on the economy ahead of her statement. A campaign urging ministers to provide funding for veterans to attend World War Two commemorations this year has been launched by the Daily Express, external. It says funds from a previous government scheme have dried up, leaving the few surviving soldiers from the war to fear they could miss memorial events in France and the Netherlands this summer. Writing in the paper, the former deputy chairman of the Conservatives, Lord Ashcroft, gives his backing to the campaign arguing "it's hard to imagine a more deserving cause". The government says veterans will be at the heart of 80th anniversary commemorations in the UK. The Daily Telegraph reports that President Trump has suggested he could sign up the US as an associate member of the Commonwealth, external, because of his love for the King. The paper says he backed the idea on social media, in response to claims that Buckingham Palace could make him a "secret offer" during his second state visit to the UK. It adds it is "not known" whether the palace or the government have been involved in any such discussions, with plans for the trip still being finalised.

