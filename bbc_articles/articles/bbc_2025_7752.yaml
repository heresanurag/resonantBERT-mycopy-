content: |-
  England's world number one Lottie Woad shares the lead heading into the final round of the Augusta National Women's Amateur as she looks to become the first to defend the title.

  Woad led by two going into the final round at Augusta National when she won in 2024

  England's defending champion Lottie Woad holds a share of the lead going into the final round of the Augusta National Women's Amateur in Georgia. The 21-year-old, who is the world number one amateur, is trying to become the first player to win successive titles in the sixth staging of the prestigious event, which has the third round at Augusta National, home of the Masters. "I can definitely use last year," said Woad who went into the final round 12 months ago two shots ahead of the field. "I had the lead and then lost it. If that happens again, then I'd know that I've come back from there before. So they're positive memories." Woad had three birdies and a bogey in a solid two-under-par 70 in the second round at the Champions Retreat course. That improved her overall score to nine under par, and left her joint top with American Kiara Romero. Overnight leader Megha Ganne is in a three-way tie for second place on eight under after she shot a 73 to follow a 63 in the opening round.

  Among the group one shot further back is rising American star Asterisk Talley. The 16-year-old, who beat Woad in last year's Curtis Cup singles, shot a six-under 66. The third and final round will be played on Saturday after a practice day on Friday. However, England's Patience Rhodes, Scotland's Hannah Darling and Ireland's Beth Coulter will not be playing at Augusta National, having missed the cut. Rhodes finished on four over and Darling three over after they both shot 72s, while Coulter's 77 left her on five over. Also missing the final round is last year's runner-up Bailey Shoemaker and Malaysia's Mirabel Ting, who is top of the American NCAA collegiate standings after winning six events in the past year. Woad birdied three of the final four holes to beat American Shoemaker by one shot for the 2024 title. That victory kick-started a stellar year which saw her compete in her first majors, finish as the top Briton at the Women's Open, help Great Britain and Ireland win the Curtis Cup and end it as the world's top-ranked amateur.
