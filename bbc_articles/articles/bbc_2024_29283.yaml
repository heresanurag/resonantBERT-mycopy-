content: |-
  Residents and businesses in Chippenham are cleaning-up after flooding caused by Storm Bert.

  Business owners are still cleaning up in a town brought to a standstill by Storm Bert.

  Heavy rain and high winds caused widespread disruption across Wiltshire, Gloucestershire and South Gloucestershire, with damage to homes, shops and roads.

  A huge clean-up operation is ongoing in the town of Chippenham, Wiltshire, where businesses are working hard to dry out their shops and reopen as soon as possible after widespread flooding.

