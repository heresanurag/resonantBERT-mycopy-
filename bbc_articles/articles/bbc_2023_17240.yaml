title: BBC visits scene of Bognor Regis flooding - BBC News
date: '2023-11-04'
section: General
url: http://www.bbc.co.uk/news/uk-67324354
content: |-
  One local man describes the damage to his home as 'catastrophic'.

  A Met Office yellow weather warning for heavy rain has been issued for parts of southern and south eastern England, where many communities have already been deluged following Storm Ciarán.

  The BBC's Duncan Kennedy visited Bognor Regis, where homes have been breached by the flood waters.
