  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Aaron Ramsdale (Southampton): I thought he made a mistake leaving Arsenal to go to Southampton but I understand the logic behind it. I don't think he'll end up with many clean sheets and he rode his luck a few times against Everton - but probably made Southampton's save of the season from Michael Keane's header which would have changed the focus of the match. He was a big part in why they won the game.

  Adam Smith (Bournemouth): I was at Bournemouth against Man City and was mightily impressed by the Cherries. I could have put the whole Bournemouth team in but that would have been unfair. As captain at right-back Smith showed his experience and guile, he was excellent. He made Matheus Nunes look bang average, he didn't get past him once. Radu Dragusin (Tottenham): I think he was superb coming into a new partnership with Cristian Romero because Micky van de Ven was injured - and then Romero went off too. Dragusin equipped himself well against a very good Aston Villa team and didn't put a foot wrong. Taylor Harwood-Bellis (Southampton): He's had a tough time this season getting to grips with the Premier League but he was really good against Everton. He was brave on the ball, playing well and defending when he needed to. Southampton's players have to realise that you have to dig in at times - and he epitomised that. Ola Aina (Nottingham Forest): I could have put Ipswich's Leif Davis in and wanted to but Forest are steadily going about their business. Aina was great in the win over West Ham - he has been for a few weeks and has been unfortunate to miss out. I like to give credit to people who have showed they can do it over a period of time.

  Moises Caicedo (Chelsea): His performance in Chelsea's draw at Manchester United was arguably his best game for the club. I know people think it is about his goal - and it was a wonderful strike - but he was all over the place, putting his foot in, making loads of fouls, ratty tackles. He got on the ball more too and was braver, playing it forward. I thought he was miles better than he has been. Joao Gomes (Wolves): He covered every blade of grass as Wolves earned a point against Crystal Palace - and has been doing that for a number of weeks. Wolves are going to need him to continue doing it to get them out of a relegation battle. If he keeps playing like this they will struggle to keep him. A very good footballer. Lewis Cook (Bournemouth): He was excellent. The best thing I can say about him is I didn't have to mention his name too many times. He did everything right, a proper 8/10 or 9/10 performance. He got the ball, moved it well and kept it ticking over. He made fouls when he needed to, broke up play and kept the team going. Beating Manchester City is a massive result for Bournemouth.

  Anthony Gordon (Newcastle): Newcastle are a better team when he is involved. He got an assist for Alexander Isak's winner against Arsenal, but the way he drives with the ball and carries the team forward means he's always a threat. He can be on the right, left or the middle - he's just a wonderful football player for Newcastle and England. Getting injured and then missing a penalty against Everton could have knocked his confidence but didn't. He's straight back on the horse, straight at it - I can respect that. Dominic Solanke (Tottenham): I have been giving him a bit of stick because I'm not sure if he is the man who will score enough goals to take Tottenham all the way to where they want to be, but he was really good in the win over Villa. When I give people stick I also look to give them praise and credit. His goals were two proper poacher's finishes. He was much better and played on the last man, didn't come short and get involved. He was always available for a cross and got his just rewards. Hopefully he can continue and start firing Tottenham to where they want to be. Antoine Semenyo (Bournemouth): The player of the weekend by far. He dominated Kyle Walker. I'll put it down to this - Walker played a 6/10 and Semenyo was 9.5/10. I don't think Semenyo will have a better game - everything he touched landed at his feet. He got himself a goal. He bodied Walker at one stage, put him on the ground. We've all had those games - if you're Kyle you think "stay away from me". I have been critical of Semenyo and didn't think he would step up from Bristol City to the level he has done now. He looks like he could be in the Premier League for a very long time.

  Andoni Iraola (Bournemouth): Tactically he was excellent. His team were so brave in the way they pressed Manchester City, they left one v one at the back with Erling Haaland - nobody has done that this season. They could have been 4-0 up in the first half.

