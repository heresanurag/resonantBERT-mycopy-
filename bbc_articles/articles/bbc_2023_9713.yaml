title: Durham robber drinks lager while trapped under shop shutters - BBC News
date: '2023-06-16'
section: General
url: http://www.bbc.co.uk/news/uk-65922321
content: |-
  The intruder drank from a can of lager while he was pinned down in Durham.

  Police in Durham released video showing the moment a robber was trapped underneath a shop's shutters as he was trying to flee.

  Malcolm Trimble can be seen drinking from a can of lager before the police arrive.

  The 30-year-old was given three years and four months after admitting attempted robbery and possession of a knife.
