title: What are fixed-odds betting terminals? - BBC News
date: '2018-11-02'
section: General
url: http://www.bbc.co.uk/news/business-44153894
content: |-
  The government has announced tough stake limits on fixed-odds betting machines, sometimes called the "crack cocaine" of gambling.

  Fixed-odds betting terminals - found in bookmakers' shops - have been called the "crack cocaine" of the gambling world. Punters lose nearly £2bn a year playing them, and now the government has announced plans to restrict the maximum stake to £2. So, what are they?
