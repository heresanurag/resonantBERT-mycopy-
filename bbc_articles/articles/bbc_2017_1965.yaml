title: Will robots replace workers by 2030? - BBC News
date: '2017-02-07'
section: General
url: http://www.bbc.co.uk/news/science-environment-38890905
content: |-
  According to some predictions, robots will go on to replace people in a third of UK jobs by 2030.

  So should we be worried by the rise of the machines?
