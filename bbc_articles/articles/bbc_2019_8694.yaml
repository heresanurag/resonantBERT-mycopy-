id: bbc_2019_8694
title: Trump and Kim Jong-un meet at Korean demilitarised zone - BBC News
date: '2019-07-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-48815938
content: |-
  The US president and North Korean leader meet at the demilitarised zone between North and South Korea.

  North Korean leader Kim Jong-un and US President Donald Trump met in Panmunjom, the so-called truce village inside the border zone, where negotiations between South and North Korea have often taken place.

  President Trump said: "Stepping across that line was a great honour".
