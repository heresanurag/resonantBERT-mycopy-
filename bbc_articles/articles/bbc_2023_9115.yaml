id: bbc_2023_9115
title: Police hunt man filmed carving names on Colosseum - BBC News
date: '2023-06-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-66029783
content: |-
  Italian officers are investigating the act of vandalism at the historic Roman amphitheatre.

  Italian police are investigating after a tourist was filmed carving names into a wall at Rome's Colosseum.

  The incident was filmed by another visitor who verbally reprimanded the man before handing the recording to security officials.

  The amphitheatre is nearly 2,000 years old and is Italy's most popular tourist site.
