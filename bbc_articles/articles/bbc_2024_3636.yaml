  BBC Russia Editor Steve Rosenberg marks St David's Day by playing Ar Lan y Môr on the piano.

  BBC Russia editor Steve Rosenberg has marked St David's Day with a rendition of the welsh folk song Ar Lan y Môr, (On the seashore) on the piano.

  Steve, a talented pianist who duetted with Mikhail Gorbachev when he interviewed the former President of the Soviet Union in 2013, says he has a passion for welsh songs and his hero is the late actor, comedian and performer Ryan Davies.

  "I just needed to play something beautiful when there is so much tragedy around me," he says.
