title: Bomb disposal unit destroys item found at Seafield recycling centre - BBC News
date: '2021-04-22'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-56835779
content: |-
  Police said the item was found to pose "no risk" to the public, but had been destroyed.

  Police said a specialist team was assessing the "unidentified item"

  A bomb disposal unit has destroyed an "unidentified item" found at a waste disposal centre in Edinburgh.

  The item, which appeared to have to cylinders connected to a timer, was discovered by a worker at the site at about 09:20 on Thursday.

  Roads were closed around the Seafield recycling centre and a cordon was put in place after the alarm was raised.

  Police Scotland said the item was found to pose "no risk to the public" and had been destroyed.

  The recycling centre was closed and Seafield Road was also shut in both directions during the incident

  Lothian Buses said bus services in the area had also been disrupted.

  A Police Scotland spokesperson said: "A cordon was put in place while specialist teams attended to assess the item.

  The item has been established to pose no risk to the public and has been destroyed. Enquiries remain ongoing."
