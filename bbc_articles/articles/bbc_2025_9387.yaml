  Second man arrested over fires at homes linked to PM

  A second man has been arrested in connection with alleged arson attacks in north London at properties connected to Sir Keir Starmer. The 26-year-old was arrested on Saturday at London Luton Airport on suspicion of conspiracy to commit arson with intent to endanger life. The arrest relates to three incidents: a vehicle fire in Kentish Town, a fire at the prime minister's private home on the same street, and a fire at an address he previously lived at in north-west London. Another man, Roman Lavrynovych, 21, who the BBC understands is a builder and roofer, appeared in court on Friday and is accused of three counts of arson with intent to endanger life following the fires. He did not enter any pleas.

  The 26-year-old man is in police custody in London. The Metropolitan Police's Counter Terrorism Command have led the investigation into the fires because of the connection with a high-profile public figure. Emergency services responded to a fire in the early hours of Monday at the Kentish Town home where Sir Keir lived before becoming prime minister and moving into 10 Downing Street. Police were alerted by the London Fire Brigade to reports of a fire at the residential address at 01:35 BST. Damage was caused to the property's entrance but nobody was hurt. It is understood Sir Keir still owns the property and is renting it out. On 8 May, a car that Sir Keir sold to a neighbour in 2024 caught fire on the same street. In the early hours of Sunday, firefighters dealt with a small fire at the front door of a house converted into flats in nearby Islington, which the prime minister previously lived at. One person was helped to safety via an internal staircase by crews wearing breathing apparatus, the fire brigade previously said.
