  Former footballer Graeme Souness joins Isla Grist to discuss their work fighting the rare skin condition epidermolysis bullosa (EB).

  Former footballer Graeme Souness is to complete a cycle ride to raise money for those living with the rare skin condition epidermolysis bullosa (EB).

  It is the latest challenge for Mr Souness, who last year completed a gruelling swim across the English Channel to raise money for the cause. Mr Souness, who is also Vice President of EB charity DEBRA UK, has been inspired 16-year-old Isla Grist, who has lived with EB since birth.

  They've been talking to BBC Breakfast about their latest fundraising campaign - and their friendship.
