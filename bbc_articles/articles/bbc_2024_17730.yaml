title: George Russell relishes British GP fight with Hamilton & Norris - BBC Sport
date: '2024-07-07'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c06kgy5p1dmo
content: |-
  The British Grand Prix is live on 5 Live and the BBC Sport website

  George Russell says he and Mercedes team-mate Lewis Hamilton expect a “good fight” for victory in the British Grand Prix with Lando Norris and Max Verstappen. Russell beat Hamilton to secure an all-Mercedes front row, while Norris took third on the grid in his McLaren to secure the first all-British top three at a home race since 1962. Russell said he believed Norris and Verstappen, who qualified fourth, had an edge on ultimate performance in the dry but that unpredictable weather could lead to a challenging race. “Realistically, we know we're probably a tenth or two behind Lando and Max,” Russell said. “But I think we've got a good fight on our hands. “The weather's going to play a huge part in that. It's been raining and drying up throughout the last couple of days. There's a bit of rain on the forecast. “The crowd give us all so much energy, the three of us. I don't think Silverstone could have dreamt of the three Brits in the top three. So, honestly, the support, we just absolutely love it and we can't wait for the race.” Hamilton said he was confident of a strong showing, having prepared his car with a view to the race rather than optimum performance over one lap. “I was cautious with my set-up,” the seven-time champion said, "more thinking to have a nice balance in the race rather than all for one particular lap. So I do think that the car will be good tomorrow.” Russell said that he expected a race similar to the one in Canada last month, when mixed conditions led to a race that ebbed and flowed between himself, Norris and Verstappen before the Dutchman eventually prevailed. “We're probably on course for another Montreal-style race where it's going to be very changeable,” he said. “So it's going to be a long race. As I said, we're riding this wave right now, but it doesn't mean anything because tomorrow is where the points are scored. But we're obviously in a great position to fight for victory.” In Canada, Russell led the early laps but made a number of key errors that left him third at the end of the race behind Verstappen and Norris. “I said after Montreal, my sort of risk-reward dial was turned up to the max and that sort of played against me at certain points,” Russell said. “And just remembering that the race is won right at the end. It doesn't matter what happens beforehand. So yeah, that was a good learning for me.”

