  Norris, who has been Verstappen’s most consistent challenger for victories since his own maiden win in Miami in May, said: “Even if you look at last year, Mercedes were probably one of the quickest in the race. If not potentially the quickest. “So I expect them to be very quick tomorrow, especially as they can look after their front tyres very well. “They have a very good front end. And I think that's going to be a good saviour for them. “Like George said, the conditions are going to be tricky. But we're there. We've been very quick in the races over the last two months. It's probably been one of our strengths. It's been actually race pace over quali pace. “This is a very different type of circuit. It's a very different layout. But it's still a strength. And hopefully it comes back towards us a little bit tomorrow.” Norris missed out on a victory when he and Verstappen collided in the closing laps in Austria last weekend but believes he has a chance to come out on top on Sunday. “I'm sure Max is going to be racing us,” Norris said, “but I've still got two other guys I've got to worry about, so I don't care just about Red Bull. “Our strategy has been very good over the last two months, so I'm happy. The team are doing a good job and therefore I’m confident we can execute a good race. “We need good pace. We need to be able to race well. I need to pass two guys if that's going to be on the cards. So, yeah, confident from what we know and what we've seen over the last few races that we can go forwards.”

  The last time three British drivers occupied the entire podium at a grand prix was at the US race at Watkins Glen in 1968. But Verstappen will be a significant threat after qualifying fourth. The Red Bull driver said he believed he would have been in the fight for pole had he not damaged his car with a trip through the gravel trap at Copse when rain hit mid-way through the first qualifying session. “If you look at the floor, it has a lot of damage,” he said. “At least we know can drive an attacking race and put them under pressure up front.”
