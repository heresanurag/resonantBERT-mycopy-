content: |-
  The 19-year-old from Lancashire has been missing in Tenerife for more than a month.

  Body found in Jay Slater hunt near last phone location

  Police say the body of a young man has been found in the area where Jay Slater, pictured here with his mother, went missing

  Search teams looking for Jay Slater in Tenerife have found a body near the last known location of the missing British teenager's mobile phone. The Guardia Civil said its officers and a mountain rescue unit found the body of a young man in the Masca area "after 29 days of non-stop searching". The 19-year-old was last seen on 17 June, after visiting an Airbnb rented by two people he had been with at a music festival on the island. A police statement said that "initial evidence" suggested the person found had "suffered an accident or fall in the inaccessible zone". It added that "the discovery was possible thanks to the incessant and discreet search carried out by the Guardia Civil... in which the natural space was preserved so that it would not be filled with onlookers." Police said that "all the evidence" suggested the remains found were those of "the young British man who disappeared". Full identification of the body is yet to be carried out, it added.

  The charity LBT Global, which works with families of people missing overseas, said that the remains were found along with Mr Slater's clothes and possessions, close to his mobile phone's last known location. The group said it was supporting Mr Slater's family "at this distressing time and ask for everyone to afford them space and privacy to come to terms with the news". Mr Slater's father Warren Slater described his disappearance as "a living hell", while his mother Debbie Duncan told of her "pain and agony" as no trace could be found. The search for Mr Slater since his disappearance has involved his family, friends, police and specialist mountain rescue teams as well as volunteers from several countries. Most recently the family, from Oswaldtwistle, Lancashire, was helped by a group of Dutch mountain rescuers.

