title: Seven Earth-sized planets found orbiting single star - BBC News
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/science-environment-39056228
content: |-
  Seven planets orbiting a single star have been discovered in a solar system 40 light-years from Earth.

  Seven planets have been discovered in a solar system 40 light-years from Earth.

  The researchers say that all seven could potentially support liquid water on the surface, depending on the other properties of those planets.
