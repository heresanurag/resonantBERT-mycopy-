content: |-
  Northern Ireland's Rhys McClenaghan beats England's Max Whitlock to win his country's first medal of the 2018 Commonwealth Games on the pommel horse.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Northern Ireland's Rhys McClenaghan beat England's Max Whitlock to win his country's first medal of the 2018 Commonwealth Games on the pommel horse. The two finished with scores of 15.100, but 18-year-old McClenaghan took gold over the Olympic champion thanks to better execution. England's Georgia-Mae Fenton, 17, won a gold medal in the women's uneven bars with a score of 14.200. Englishman Nile Wilson claimed silver behind Tulloch with a score of 14.400, the 22-year-old capturing his third medal of the Games. Whitlock, who helped England to the team gold on Thursday, began his day with a sixth-placed finish on the floor as Scotland's Dan Purvis won bronze. Marios Georgiou of Cyprus took the floor title with a score of 13.966 as Canada's Scott Morgan won the silver medal.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Olympic bronze medallist Purvis, 27, scored 13.733 as he won his second medal of the Games following a bronze in Thursday's team final. His team-mate Hamish Carter came fourth, with English all-around champion Nile Wilson in last place.

  It was a poor start to the day for England's gymnasts, who have been dominant until this point on the Gold Coast. Wilson looked tired after his efforts to win gold in the all-around on the floor, while Whitlock's decision to sit out that event in favour of the floor and pommel finals may now be questioned.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The floor and pommel Olympic champion made one major mistake in his floor routine, before he was edged out by McClenaghan on his second apparatus of the day. Instead, it was Scot Purvis who impressed for the home nations on the floor while McClenaghan's execution of 8.600 meant he saw off 25-year-old Whitlock (8.300). McClenaghan described his gold medal as "a huge result". "Max has been my idol growing up and I've been watching him since 2010 when he was competing in the Delhi Commonwealths," said the 18-year-old. "I've always felt though that one day I could be up there with the best and beating them." Fenton said: "It's my mum's birthday today and I was thinking about what I could get her as a present. I thought, 'hey, let me do my best and see'.

