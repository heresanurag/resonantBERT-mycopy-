title: 'Paralympics 2024: Dan Bethell and Krysten Coombs win Para-badminton silvers
  - BBC Sport'
date: '2024-09-03'
section: Disability Sport
url: http://www.bbc.co.uk/sport/articles/cyvp2nq7176o
content: |-
  British Para-badminton players Dan Bethell and Krysten Coombs both win silver in their respective finals in Paris.

  Bethell is competing at his second Paralympics

  British duo Dan Bethell and Krysten Coombs both claimed Paralympic badminton silver medals after losing out in their respective finals in Paris. Bethell had a gold-medal point against Kumar Nitesh of India in the men's SL3 singles decider, but went down 14-21 21-18 23-21 to finish runner-up for a second Games in a row. Coombes, a bronze medallist in Tokyo in 2021 when the sport made its debut, gave everything in the men's SH6 decider against French favourite Charles Noakes who was cheered on by a raucous late night home crowd at La Chapelle Arena. After a tight opening game, Noakes pulled away early in the second and despite a late Coombs flurry, sealed a 21-19 21-13 success.

  Bethell, the world number two, had not dropped a game on his way to his second consecutive final and beaten Nitesh in their nine previous encounters. "I came here for gold and after winning silver in Tokyo I wanted to go one better, but I just couldn't get over the line," said the 28-year-old. "At the moment it feels pretty devastating." After the pair shared the first two games, Bethell recovered from 19-16 down in the decider, saved a match point and had one of his own before Nitesh rallied again to break British hearts.

