title: 'John Caldwell: Man arrested in attempted murder inquiry - BBC News'
date: '2024-02-08'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68241895
content: |-
  Police arrested a 44-year-old man in Dungannon in County Tyrone on Thursday.

  John Caldwell was off duty when he was shot at a sports centre in Omagh

  A man has been arrested in connection with the attempted murder of Det Ch Insp John Caldwell.

  Mr Caldwell was off duty when he was shot several times in Omagh, County Tyrone, in February 2023.

  The 44-year-old man was arrested in Dungannon in County Tyrone on Thursday and is being questioned under the Terrorism Act.

  Police said a property was also searched and a number of items were seized by detectives.
