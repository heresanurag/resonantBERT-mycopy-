title: 'Coronavirus: Trump offers ventilators to UK - BBC News'
date: '2020-04-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-52211653
content: |-
  The president says the US can help countries like the UK which are "desperate" for the machines.

  President Donald Trump has said the US will have 110,000 ventilators by the end of June.

  He said some of the machines could go to countries like the UK which were "desperate" for the machines.
