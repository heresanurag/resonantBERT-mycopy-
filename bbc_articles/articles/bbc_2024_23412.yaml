title: Lana Del Rey reportedly marries alligator tour guide in Louisiana - BBC News
date: '2024-09-27'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cz6wg15nxvvo
content: |-
  The Grammy-nominated singer is reported to have tied the knot with Jeremy Dufrene near a bayou south of New Orleans.

  Lana Del Rey performs during the Reading Festival in August

  Pop star Lana Del Rey has ended weeks of speculation by reportedly marrying her alligator tour guide boyfriend, Jeremy Dufrene, in Louisiana. The couple applied for a marriage licence on Monday in the Lafourche parish of the state, south of New Orleans. The star used her legal name Elizabeth Woolridge Grant on the document, according to records seen by the BBC. Court records show the application was valid for a month and was signed off by a clerk at the court.

  Reports in US media said Del Rey and Mr Dufrene did not wait that long and tied the knot on Thursday in Des Allemandes, Louisiana, near where Mr Dufrene works as a boat tour operator. "The wedding ceremony and reception were both held in the same bayou where Jeremy operates his swamp boats tours,” People magazine reported on Friday, citing a source. Del Rey has not commented publicly on the reported wedding. The pair met back in 2019, when the singer posted photos from one such tour and wrote on her Facebook page: "Jeremy lemme be captain at Arthur’s Air Boat Tours x". The couple were spotted together this summer at the Reading and Leeds festivals, where Del Rey was a headliner, and in London. The 39-year-old singer was propelled to fame in 2011 with the success of her self-titled debut album and its breakout single Video Games, and has cultivated a glamorous and somewhat mysterious image while releasing nine albums in total. Her latest effort, Did You Know That There's a Tunnel Under Ocean Blvd, received mostly positive reviews and was nominated for an Album of the Year Grammy Award. Mr Dufrene's bio on the website of Arthur’s Air Boat Tours notes that he used to work at a chemical plant until he decided it was "not his calling". "After a little convincing by his family, he got his captain's licence and started running tours," it reads.
