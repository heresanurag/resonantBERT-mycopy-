  Anger erupted after Jones posted a video of her taking a baby wombat from its distraught mother.

  US influencer who snatched baby wombat has left Australia

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: The influencer who stole a baby wombat... in 60 seconds

  Sam Jones, a US influencer who briefly snatched a baby wombat from its distressed mother, and uploaded the footage to social media has left Australia. Australia's Home Affairs minister Tony Burke had earlier said his department was reviewing whether it could revoke Ms Jones's visa, but the BBC understands that she left the country of her own accord. "There has never been a better time to be a baby wombat," Burke said in a short statement on Friday celebrating Jones's departure. Anger erupted across Australia after Jones posted a video of her taking a baby wombat from the side of a road while laughing and running away from the distraught mother wombat.

  The video also shows the baby wombat hissing in distress before Jones then returns it to the bush. Jones, who also goes by the name Samantha Strable, has nearly 100,000 followers and describes herself as an "outdoor enthusiast and hunter" on her Instagram profile. She has since made her account private and deleted her post. Her video was swiftly met with widespread condemnation, with Australian Prime Minister Anthony Albanese calling the incident an "outrage". On Friday, opposition leader Peter Dutton said he thought it was "a cruel act" and that he was "glad" the influencer has now left. An online petition demanding Jones be deported from Australia garnered more than 30,000 signatures. However, as Jones had not been charged nor been deemed a threat to the country – the government may not have had any grounds to cancel her visa. In since-deleted comments, Jones said "the baby was carefully held for one minute in total and then released back to mom". "They wandered back off into the bush together completely unharmed," she wrote. "I don't ever capture wildlife that will be harmed by my doing so." But wildlife experts have deemed Jones's act a "blatant disregard" for native wildlife. The Wombat Protection Society said it was shocked to see the "mishandling of a wombat joey in an apparent snatch for 'social media likes'". Suzanne Milthorpe, Head of Campaigns at World Animal Protection Australia, told BBC Newsday that posting such a video for "cheap content" was "unacceptable". "To that baby it must have seemed like a giant predator was picking it up and taking it away," she said. Wombats, which are native to Australia, are a legally protected species across the country. Baby wombats share a strong bond with their mothers, and any separation can be distressing and harmful, conservationists say. A new TikTok account claiming to be Jones after her original account was allegedly banned, published a post on Thursday saying that "the hate is currently too much for me to handle" and that there had been "hundreds" of death threats. "Imagine someone just goes up to your child and curses at them? Let's have some respect," the post said. Most, however, have remained critical of Jones's act. "Maybe imagine if someone picked up your child and laughed while you screamed for them to give them back," read a comment under the post, a reference to Jones's snatching of the wombat from its mother.
