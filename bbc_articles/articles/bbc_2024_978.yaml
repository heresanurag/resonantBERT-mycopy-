title: 'Luke Littler v Brendan Dolan: Teenager ''daring to dream'' of World Championship
  glory - BBC Sport'
date: '2024-01-01'
section: Darts
url: http://www.bbc.co.uk/sport/darts/67853905
content: |-
  Luke Littler says he is "daring to dream" of winning the PDC World Darts Championship as the 16-year-old prepares to face Northern Ireland's Brendan Dolan in the quarter-finals.

  Luke Littler (left) used to imitate his idol Raymond van Barneveld's arms-outstretched celebration aged three

  Like most 16-year-olds in England, Luke Littler began 2023 preparing for his summer GCSE exams. A year on and he is three victories from becoming the youngest winner of the PDC World Darts Championship. A fairytale run to the quarter-finals, including a dazzling win over childhood idol Raymond van Barneveld, has taken him from relative obscurity to sporting stardom - and he is ready for more. "I think I am daring to dream now," said Warrington-born Littler. "I'm so young, only 16 and I have got nothing to fear. I have got no-one to fear. "The thought of winning it gives me goosebumps. I've got three junior titles but this is the biggest one of all. I'm only three games away."

  Luke Littler (right) posed for selfies with fans while sitting in a hospitality box at Tottenham's Premier League game against Bournemouth on New Year's Eve

  Littler's confidence is justified by his scintillating performances so far at Alexandra Palace. His average of 106.2 in his 3-0 first-round win against Dutchman Christian Kist was the highest achieved by a tournament debutant. The next day, UK Open champion Andrew Gilding was dispatched 3-1, before Canada's Matt Campbell was beaten 4-1 to set up a last-16 match with five-time world champion Van Barneveld. The Dutchman, 40 years Littler's senior, was the youngster's idol growing up, but he showed no sign of being overawed as he breezed past the veteran 4-1. "My game can be better than anyone's on the day and I have shown it there against one of the greatest who have graced that stage," added Littler. "It is just unbelievable. Thirteen years ago I was doing his celebration throwing on my little board, and I've just beaten him in the World Championship." Standing between Littler and a place in the last four is Northern Ireland's Brendan Dolan, who is also enjoying a fine tournament. The 50-year-old beat 2021 winner Gerwyn Price in the third round before overcoming two-time champion Gary Anderson to reach the quarter-finals for the second time in his career. "Brendan has been brilliant and definitely deserves to get to this stage," added Littler. "I guess my performances would put me as the favourite but it's about whatever happens on New Year's Day." Littler's meeting with Dolan is the second quarter-final of the afternoon session, with 2018 winner Rob Cross taking on fellow Englishman Chris Dobey in the opener from 12:30 GMT. The evening session features Dutch three-time champion Michael van Gerwen against England's Scott Williams from 19:00. Another all-English match rounds off the evening as pre-tournament favourite Luke Humphries plays Dave Chisnall.

