  In Scotland, people have already cut back on socialising, which has slowed the Omicron wave a little, said national clinical director Prof Jason Leitch. "But it's coming," he warned.

  It is not a simple choice between prioritising the virus and the economy, he said. "You either take the pain now or you take it later."

  Labour leader Sir Keir Starmer said his party stood ready to support more measures if needed - but called on the prime minister to "come up with a plan and get a grip".

  "The ball's in his court, but where is he?" Mr Starmer said, calling for clarity over whether schools will reopen and whether businesses will get economic help.

  "There's a vacuum of leadership at the moment," he added.

  Current Plan B rules for England include Covid passes for certain events, face masks in more places and people being urged to work from home if they can.

  Other nations of the UK have similar rules, though Scotland has gone further by asking people to limit social contact to three households at a time in the run-up to Christmas, and could go further still in the new year.

  Wales has also ordered nightclubs to close from 27 December.

  The prospect of possible new restrictions comes as a photo emerged of the prime minister, his wife and government staff at a gathering in Downing Street's garden during last year's lockdown.

  At the time, there were strict restrictions on mixing, but No 10 says this gathering in the Downing Street garden was a work meeting.
