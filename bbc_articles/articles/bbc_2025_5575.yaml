title: 'David Bowie: Site of Ziggy Stardust pub could become housing - BBC News'
date: '2025-03-06'
section: London
url: http://www.bbc.co.uk/news/articles/cn8963nz5l0o
content: |-
  The site of a famous 1970s rock venue is at the centre of plans for a new community in south London.

  Site of Ziggy Stardust pub could become housing

  David Bowie created Ziggy Stardust as a stage persona during the early 1970s

  The site of a famous 1970s rock venue where David Bowie made one of his earliest appearances as Ziggy Stardust is at the centre of plans for a new housing development. The Toby Jug pub, which also hosted notable bands such as Thin Lizzy, Led Zeppelin and Fleetwood Mac, was demolished in 2002 and the site in Tolworth, south-west London, has lain largely undeveloped for more than 20 years. Plans have now been announced for more than 950 homes, a new community centre, shops, offices, gardens and play areas, on what is one of London's largest brownfield sites. A final decision on whether the project can go ahead will be taken by Kingston Council.

  The site of the Toby Jug before demolition was behind the yellow hoarding

  The application provides for 336 proposed homes arranged in four blocks

  In their application documents, developers Countryside Partnerships and the Guinness Partnership said the scheme would turn the Signal Park site into a "vibrant new destination in Kingston". Pedestrian and cycle routes would be created at the site, which is next to Tolworth station, while the public square that was built in phase one would be extended. The application provides detailed designs for 336 proposed homes arranged in four blocks up to 16 storeys tall, along with outline plans for 629 more homes. Bowie, who died in 2016, created the Ziggy Stardust character - an androgynous, alien rock star - as a stage persona in 1972. The character, closely associated with the Bowie album The Rise and Fall of Ziggy Stardust and the Spiders from Mars, was retired by the singer in 1973.
