title: 'Royal Wedding: How to dress a Royal groom - BBC News'
date: '2018-05-16'
section: General
url: http://www.bbc.co.uk/news/uk-44113654
content: |-
  The people who dressed Prince William for his wedding show us what it takes to get a Royal groom kitted out.

  Kashket and Partners dressed Prince William for his wedding in 2011 and hold a royal warrant.

  They've been showing the BBC what it takes to get a Royal groom dressed for his big day.
