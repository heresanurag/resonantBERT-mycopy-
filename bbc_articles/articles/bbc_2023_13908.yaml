title: 'Swansea: Murder accused appears in court after car fire - BBC News'
date: '2023-09-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-66912649
content: |-
  Helen Clarke, 77, died after sustaining significant burns and a head injury in a car fire.

  Helen Clarke died in hospital following a car fire on Friday morning

  An 80-year-old man has appeared in court charged with the murder of his 77-year-old wife in a car fire.

  Helen Clarke died in hospital on Sunday after emergency services were called to a fire on Sketty Lane, Swansea, at about 08:20 BST on Friday morning.

  David Clarke was also taken to hospital, but in a stable condition.

  He appeared at Swansea Crown Court and was remanded into custody until his next appearance in November.

  Ms Clarke's family, who are being supported by specialist officers, said: "Our families are trying to come to terms with the tragic passing of a mother, grandmother, and friend in uncharacteristic circumstances.

  "We request that we are given the privacy to deal with this tragedy as a family."

  Police officers were called to Singleton Hospital in Swansea on Friday morning

  Det Ch Insp Paul Raikes of South Wales Police said: "Our thoughts remain with Helen's family at this incredibly painful time.

  "Detectives continue to work alongside other specialists to understand the full circumstances behind this incident."
