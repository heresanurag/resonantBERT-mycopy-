title: 'Watch: Motorists block road to save runaway chihuahua - BBC News'
date: '2023-12-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67700100
content: |-
  Dashcam footage shows drivers trying to steer the dog towards exits on the Staten Island Expressway.

  Dashcam footage shows drivers trying to steer the dog towards exits on the Staten Island Expressway in New York.

  Several cars slowed down to corral the dog to one side, before one motorist gave chase on foot. Local media report that Bean the chihuahua ran away after being spooked by a pitbull.

  He is now safe and has been reunited with his owners.
