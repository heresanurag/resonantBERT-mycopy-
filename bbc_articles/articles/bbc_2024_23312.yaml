  A sum of nearly £345,000 was recovered from the charity by investigators and protection for a further £98,000 of charity money has been established. The funds have been used to make payments to two other charities - Save the Children Fund and the Mayor’s Fund for London - and to cover the cost of Fashion for Relief's liabilities. The inquiry, which looked at Fashion for Relief's expenses between April 2016 and July 2022, found that just 8.5% of funds raised were spent on grants to charity. Following the opening of the inquiry, both Save the Children Fund and the Mayor’s Fund for London made complaints to the commission regarding Fashion for Relief. Fashion for Relief held fundraising events for the two charities, but the inquiry found that it failed to manage its partnership arrangements. Tim Hopkins, who was part of the investigations team, said in a statement: “Trustees are legally required to make decisions that are in their charity’s best interests and to comply with their legal duties and responsibilities". He added: "Our inquiry has found that the trustees of this charity failed to do so, which has resulted in our action to disqualify them". Fashion for Relief was removed from the register of charities on 15 March 2024.
