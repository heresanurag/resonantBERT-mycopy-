title: Naomi Campbell banned from being charity trustee - BBC News
date: '2024-09-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/c70zn97q1n8o
content: |-
  The model cannot be involved at charities for five years after an inquiry discovered mismanagement.

  Campbell cannot be a charity trustee for five years

  The model Naomi Campbell has been banned from being a charity trustee after a UK watchdog found charity funds were spent on luxury hotels and spa treatments. A Charity Commission inquiry found Fashion for Relief was not passing on as much of the money raised as it was supposed to. Instead it was being spent on cigarettes and security for Campbell and other unauthorised payments to one of her fellow charity trustees. "I've just found out today about the findings, and I am extremely concerned," Campbell, 54, told AP news agency. She added she was not the person "in control" of the charity.

  She has been banned from charity involvement for five years with two other trustees, Bianka Hellmich and Veronica Chou, being banned for nine years and four years respectively. Representatives for the British model have been contacted by the BBC. The inquiry found that unauthorised payments totalling £290,000 for consultancy services had been made to Ms Hellmich, which was in breach of the charity’s constitution. Whilst Ms Hellmich had proactively proposed repaying these funds, the Commission-appointed interim managers secured repayments to the charity.

