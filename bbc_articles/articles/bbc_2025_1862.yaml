content: |-
  Ireland clinch their 14th Triple Crown and remain on course for a third successive Six Nations title after beating a resurgent Wales in a Cardiff thriller.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ireland clinched their 14th Triple Crown and remain on course for a record third successive Six Nations title after beating a resurgent Wales in a thrilling game in Cardiff. Ireland centre Garry Ringrose was shown a 20-minute red card in the 34th minute for a high tackle on Wales' Ben Thomas. The visitors shrugged this off and recovered from an 18-10 deficit, scoring tries through Jack Conan and Jamie Osborne, with fly-half Sam Prendergast kicking 17 points. Wales produced an outstanding performance under new interim coach Matt Sherratt with tries from inspirational captain Jac Morgan and Tom Rogers and eight points from recalled Gareth Anscombe. Ireland will hope to complete a Grand Slam as they host France before finishing the tournament in Italy against Rome, while Wales will hope to avoid a Wooden Spoon when they face Scotland and England in their final two games.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'It's all about player safety' - Are 20-min red cards working?

  Wales' losing international sequence has reached 15 games and this was a record ninth successive tournament loss. But this occasion will be remembered as an inspirational performance to help restore some much-needed faith in Welsh rugby. The team were unrecognisable from the side that lost against France and Italy, which led to the departure of head coach Warren Gatland. Sherratt has taken over and transformed the side despite having only four sessions and less than a week to prepare against the tournament's defending champions. He made multiple changes, recalling individuals Gatland had discarded such as Anscombe and Max Llewellyn and picked others players in their regular positions, including Thomas at 12 instead of fly-half. It resulted in a much more cohesive attacking performance despite Wales being written off as 25-1 no-hopers by some bookmakers, with most observers expecting a comfortable Irish victory. Wales' impassioned performance proved what they can achieve with some structure and belief, while Ireland once again displayed their impressive resolve to remain on course for the Grand Slam.

  Both sides were in the strange scenario of having caretaker coaches. Gatland stepped down last week after defeat by Italy condemned Wales to a 14th successive loss and a 20th defeat in 26 matches in his second stint in charge. This followed his first 12-year stint in which he led the side to three Grand Slams and two World Cup semi-finals. Sherratt was placed in charge on an interim basis, but insisted he will only be in charge for the Six Nations, having signed a long-term deal with Cardiff. Easterby, who is overseeing Ireland while Andy Farrell prepares for the upcoming British and Irish Lions tour to Australia, had masterminded victories over England and Scotland. The former Ireland flanker, who lives in Wales and played for Scarlets, responded to reports he is a contender to take over from Gatland by insisting he is committed to Ireland and stated he had yet to be approached by the Welsh Rugby Union (WRU). Sherratt made eight personnel changes including Gloucester duo Llewellyn and Anscombe, and a debut for Nottingham-born Scarlets wing Ellis Mee, who impressed in only his 11th professional game. Captain Morgan moved from open-side flanker to blind-side to accommodate Tommy Reffell. Ireland made seven changes with hooker Dan Sheehan captaining, Conan slotting in for the injured Caelan Doris and full-back Osborne making his Six Nations debut. There was a maiden Test start for prop Thomas Clarkson, while lock Joe McCarthy, centre Ringrose and wing Mack Hansen were recalled.

