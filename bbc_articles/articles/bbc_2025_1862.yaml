  The Principality Stadium roof was closed and Ireland were playing predominantly in white to help supporters impacted by colour blindness, with the traditional green shirts having in the past clashed with Wales' red. The new-look Wales front-row of Nicky Smith, Elliot Dee and WillGriff John won three early scrum penalties, while Taulupe Faletau started brightly. A clever Ringrose 50-22 kick provided an early attacking platform for Conan to power over, with Prendergast converting before slotting over a penalty. Anscombe kicked the hosts' first points before Wales spurned a try opportunity when Tomos Williams dropped a pass from Morgan, which in any case might have been forward. The home side were looking more cohesive in attack than the opening two games with centre Llewellyn prominent. Ireland also blew an attacking chance when a long pass from Osborne to Ringrose went astray with the line at his mercy. Resurgent Wales continued to pressurise Ireland with Ringrose initially shown a yellow card for his high tackle on Thomas, with the decision sent to the bunker. Anscombe reduced the deficit to four points with his second penalty and Wales piled on the pressure before eventually Morgan burrowed over to give the hosts a 13-10 half-time lead.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'What a finish!' - Rogers dives over the line to extend Wales' lead

  During the interval Ringrose's 20-minute red card was confirmed and Wales soon utilised their extra man with a free-flowing move started by a huge Will Rowlands carry. That laid the foundations for full-back Blair Murray to set up Scarlets team-mate Rogers, who produced a spectacular finish in the corner. Prendergast reduced the deficit to five points with his second penalty before centre Bundee Aki came on to the field to level up the numbers after the 20-minute red card. Ireland levelled the score with a second try that came from a superb 50-22 kick, this time from Prendergast. An ensuing cross-kick from player-of-the-match Jamison Gibson-Park was palmed by James Lowe into the hands of the onrushing Osborne to score. Hansen was held up over the Wales line by Murray, but Prendergast slotted over a penalty to restore the Irish lead before an excellent long-range effort set up a six-point advantage. Wales refused to give up and Mee looked like he had scored a brilliant try in the corner, but it was justly ruled out by television match official (TMO) Ian Tempest for a knock on. Ireland rallied and Prendergast's fifth penalty clinched a victory that leaves his side on course to make history in the championship.

