  “It’s never easy losing the calibre of a human being and actor like Donald Sutherland, but this one really profoundly hurts because Donald was like my brother, and a big part of my own career,” he said. Will Smith, who starred with Sutherland in Six Degrees of Separation, paid tribute by posting two pictures from the 1993 film on Instagram, with the caption: “Rest in peace, Donald”. The 1970s also saw Sutherland play an IRA member in The Eagle Has Landed, a pot-smoking college professor in National Lampoon's Animal House and the lead in the 1978 remake of Invasion of the Body Snatchers. In the 1980s, he played the father of a suicidal teenager in the Oscar-winning Ordinary People. He turned to television in the 2000s, appearing in such series as Dirty Sexy Money and Commander-in-Chief. Despite his numerous roles, he was never nominated for an Oscar. He did receive an honorary Academy Award in 2017.

  Sutherland was known for his political activism throughout his career, and protested against the Vietnam war alongside Fonda. He also channelled his beliefs into some of his roles, including The Hunger Games: Mockingjay - Part 2, where he played the tyrannical President Snow. Sutherland told the BBC in 2015 that he hoped the film's socio-political message would help young fans become more aware of the world around them. "We asked the kindest man in the world to portray the most corrupt, ruthless dictator we’ve ever seen," the official Hunger Games X account posted following the announcement of his death. "Such was the power and skill of Donald Sutherland’s acting that he created one more indelible character among many others that defined his legendary career. We are privileged to have known and worked with him, and our thoughts are with his family." He also told the BBC that the biggest changes he'd noticed in the industry was that actors were making "a lot of money". "I don't think anybody of my generation became an actor to make money. It never occurred to me. I made £8 a week here [on stage in London]. When I starred in a play at the Royal Court, I made £17 a week, that was in 1964," he said. At the time, he said he had no plans to retire from acting. "It's a passionate endeavour. Retirement for actors is spelt 'DEATH'." he said. His memoir, Made Up, But Still True, is due to be published in November.
