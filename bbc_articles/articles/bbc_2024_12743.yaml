title: Donald Sutherland dies aged 88 - BBC News
date: '2024-06-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/c9rrvdq3g9zo
content: |-
  The star of films including The Hunger Games and Animal House has died after a long illness.

  The Canadian actor Donald Sutherland, star of films including The Hunger Games and Don't Look Now, has died at 88 after a long illness. His son, the actor Kiefer Sutherland, said: "With a heavy heart, I tell you that my father, Donald Sutherland, has passed away. I personally think one of the most important actors in the history of film. "Never daunted by a role, good, bad or ugly. He loved what he did and did what he loved, and one can never ask for more than that. A life well lived." Sutherland had almost 200 credits to his name in a career spanning more than half a century. The news was met with an outpouring of support and tributes. Actor Rob Lowe, who starred alongside Sutherland in the miniseries Salem's Lot, called his former co-star "one of our greatest actors". "It was my honor to work with him many years ago, and I will never forget his charisma and ability," he wrote on X/Twitter. Cary Elwes, a co-star in the 2001 television film Uprising, said he was "devastated" by Sutherland's death. "Our hearts are breaking for you," he told Kiefer in an Instagram message. "So grateful to have known [and] worked with him. Sending our love.

  Kiefer Sutherland (left) and his father Donald in the 1980s

  Born in New Brunswick, Canada, Sutherland started as a radio news reporter before travelling to London in 1957 to study at the London Academy of Music and Dramatic Art. He then took on small roles in British film and television. His earliest high-profile roles were in war films including 1967's The Dirty Dozen, and Kelly's Heroes and M*A*S*H from 1970. Canadian Prime Minister Justin Trudeau recalled feeling "deeply, deeply star-struck" when he first met Sutherland. "My thoughts go out to Kiefer and the entire Sutherland family, as well as all Canadians who are no doubt saddened to learn, as I am right now," he said. "He was a man with a strong presence, a brilliance in his craft and truly, truly a great Canadian artist," he added. US President Joe Biden said Sutherland was a "one-of-a-kind actor who inspired and entertained the world for decades". Ron Howard, who directed Sutherland in the 1991 film Backdraft, said that he was "one of the most intelligent, interesting [and] engrossing film actors of all time". Jane Fonda was Sutherland's co-star in Alan J Pakula's 1971 thriller, Klute, about a detective whose hunt for a missing person is assisted by a high-priced call girl. They dated for two years. In a tribute on Instagram, Fonda described Sutherland as a "brilliant actor" with whom she shared "quite a few adventures", including performances to active servicemen during an anti-Vietnam war tour in Hawaii, Japan and the Philippines. Helen Mirren, who appeared opposite Sutherland in 2017 film The Leisure Seeker, paid tribute to her “friend” and “one of the smartest actors I ever worked with” in a statement shared with The Hollywood Reporter, external. “He had a wonderful enquiring brain, and a great knowledge on a wide variety of subjects,” she said. “He combined this great intelligence with a deep sensitivity, and with a seriousness about his profession as an actor. “This all made him into the legend of film that he became. He was my colleague and became my friend. I will miss his presence in this world.”

