id: bbc_2018_4266
title: 'Syria fighting: Children treated after suspected chemical attack - BBC News'
date: '2018-04-10'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43688371
content: |-
  Children were among those hit by the suspected chemical attack in Douma, the Eastern Ghouta.

  A suspected chemical attack against rebel-held Douma in Syria's Eastern Ghouta has killed dozens of people.

  Children were among those killed and injured in the attack, which has been denied by the Syrian government.
