  Gisèle Pelicot's ex-husband Dominique Pelicot has been jailed for drugging her and recruiting strangers to rape her. He stood trial alongside 50 other men, 46 of whom were found guilty of rape, two of attempted rape, and two of sexual assault. Outside court Gisèle Pelicot gave a statement - here it is in full.

  "This trial was a very difficult ordeal. I think first of all of my three children, David, Caroline and Florian. I also think of my grandchildren because they are the future and it is also for them that I have led this fight, as well as my daughters-in-law Aurore and Céline. I also think of all the other families affected by this tragedy. "Finally, I think of the unrecognized victims whose stories often remain in the shadows. I want you to know that we share the same fight. "I would like to express my deepest gratitude to all the people who supported me throughout this ordeal. Your testimonies have upset me and I have drawn from them the strength to come back every day. Long days of hearings. "I also thank the victims' aid association for our unwavering support. It has been invaluable to me. To all the journalists who have followed me and followed this case since its inception. I wish to express my gratitude for the faithful, respectful and dignified treatment in which they reported daily on these hearings. "To my lawyers, finally, all the gratitude and esteem that I have for them for having accompanied me at each stage of this painful journey. "I wanted, by opening the doors of this trial on September 2, that society could take hold of the debates that took place there. "I have never regretted this decision. I now have confidence in our ability to collectively seize a future in which each woman and man can live in harmony with respect and mutual understanding. I thank you."

  The shocking story of Gisele Pelicot, raped by strangers her husband invited to abuse her.
