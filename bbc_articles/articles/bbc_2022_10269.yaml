  Supt Lee Pache said: "All of the those who were reported missing, other than the child who sadly died, were located safe and well."

  The search was carried out by two RNLI lifeboats from Skegness and Mablethorpe, the HMCG Helicopter from Humber and Sutton Bridge, Skegness and Wrangle coastguard rescue teams, along with Lincolnshire Police and East Midlands Ambulance Service crews.

