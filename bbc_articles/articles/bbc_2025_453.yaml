title: EuroMillions £83.4m prize the largest to go unclaimed for a week - BBC News
date: '2025-02-01'
section: UK
url: http://www.bbc.co.uk/news/articles/c5y793kg9z0o
content: |-
  The National Lottery operator says it is "very unusual" for such a large prize to go unclaimed this long.

  A EuroMillions jackpot of more than £83.4m is the largest lottery prize to go unclaimed for week, a lottery spokesman has said. A ticket holder who purchased their slip in a shop is yet to claim the £83,474,081 prize from a draw on 24 January. The mystery winner matched all five main numbers - 02, 11, 19, 30 and 49 - as well as the Lucky Star numbers, which were 03 and 08. A spokesperson for The National Lottery operator Allwyn said it was "very unusual" for such a large prize to go unclaimed for days, adding that it was the "biggest prize to have gone unclaimed at this stage".

  Where the pink ticket was purchased has not yet been revealed, but Allwyn said it would undertake "bespoke activity" there if the prize is still not claimed by next Friday. "It is in everybody's interest that this prize is claimed," the spokesman added. Andy Carter, senior winners' adviser at Allwyn, said: "I can't believe there's one lucky ticket holder out there who hasn't claimed this incredible EuroMillions jackpot prize - there are 83,474,081 reasons for them to check their ticket straight away. "We're urging all EuroMillions players to check their paper tickets to see if they are our missing multi-millionaire." According to The National Lottery website, external, there are currently nine other EuroMillions prizes that can still be claimed by UK ticket-holders, though the largest is worth £1m. The largest EuroMillions prize ever to not be claimed by a UK ticket holder was £63.8m in June 2012. Ticket holders have 180 days from the day of the draw to claim their prize.
