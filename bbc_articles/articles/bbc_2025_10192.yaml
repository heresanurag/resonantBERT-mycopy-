title: Driver Julian Grimwade dies in race crash at Donington Park track - BBC News
date: '2025-05-25'
section: Leicestershire
url: http://www.bbc.co.uk/news/articles/cq6954rq7jmo
content: |-
  Motorsport UK says it will be conducting an investigation into Julian Grimwade's death.

  Tributes have been paid to racer Julian Grimwade by motorsport governing bodies

  A driver has died in a crash during a race at Donington Park circuit in Leicestershire. Julian Grimwade had been competing in the event at a Vintage Motorsport Festival on Saturday, national governing body Motorsport UK said. It said in statement confirming the death that it joined "the entire UK motorsport community in mourning".

  A police spokesperson said: "Police were notified of a single vehicle collision at a licensed track day at Donington Park yesterday (24 May). "The driver of the vehicle – a man in his 70s – was taken to hospital where he was later pronounced deceased. "Enquiries are continuing on behalf of HM Coroner. Identification of the deceased is a matter for the coroner." Motorsport UK has also issued a statement, adding: "It is with great sadness that Motorsport UK confirms the passing of Julian Grimwade, who was competing at the Vintage Sports Car Club's race event at Donington Park today [Saturday 24 May]. "Motorsport UK joins the entire UK motorsport community in mourning and sends its sincerest condolences to the family, friends and loved ones of Julian, as well as the Vintage Sports Car Club. "As with all serious incidents, Motorsport UK will conduct an investigation into the matter and cooperate with the relevant external authorities."

  A number of races had been scheduled to take place during the festival at the Castle Donington circuit

  Sharing the statement on social media Donington Park added: "Our thoughts go to the family and friends of the driver, as well as those in the VSCC [Vintage Sports Car Club] community." International motorsport governing body, the Fédération Internationale de l'Automobile also issued a statement on X, following the Donington Park death which it said was one of three fatal motorsport incidents, including one in Scotland and a third in Denmark. It said: "The FIA is saddened to learn of the tragic incidents today at the Jim Clark Rally in Scotland, Vintage Motorsport Festival at Donnington Park and Nykøbing Falster Motor Sport's Anniversary Rally in Denmark. "We extend our heartfelt condolences to the family, friends, and loved ones of those who have sadly lost their lives. "Our thoughts are also with those injured in the accidents and we send our best wishes to them for their full and swift recovery." It added: "The tragic incidents today have united our global motor sport community as we reaffirm the FIA's full support to our members, officials and competitors."

