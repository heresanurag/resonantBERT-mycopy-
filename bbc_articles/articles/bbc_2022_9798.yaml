title: Nicki Minaj's Camden meet and greet cancelled due to overcrowding - BBC News
date: '2022-07-12'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-62127936
content: |-
  Fans are left disappointed after an event with the US rapper is cancelled because of overcrowding.

  Police officers were called to the area to escort the star

  Fans of Nicki Minaj have been left disappointed as a meet and greet event in London had to be cancelled after the star was mobbed.

  The rapper posted on Instagram that she would be at Cafe Koko in Camden from noon on Monday, prompting many to arrive at the venue in the early hours.

  Her appearance was pushed back and when she arrived just before 18:00 BST, police had to form a wall around her.

  They then had to escort her to the venue before she could enter.

  The US star is in the UK as she was part of a historic line-up of all-female headliners at Wireless Festival.

