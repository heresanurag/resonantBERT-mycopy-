content: |-
  The move makes it easier for future presidents to ignore guardrails and use the pardon power as a political instrument.

  Biden may be criticised for breaking his promise and for using his presidential power to protect his son Hunter

  Joe Biden had repeatedly denied that he was going to pardon his son Hunter for his gun and tax evasion convictions or commute what was shaping up to be a substantive prison sentence. On the Sunday evening after Thanksgiving – at a moment when the American public’s attention was decidedly elsewhere – he announced he had changed his mind. “There has been an effort to break Hunter - who has been five and a half years sober, even in the face of unrelenting attacks and selective prosecution,” he wrote in a press statement announcing his decision. “In trying to break Hunter, they’ve tried to break me - and there’s no reason to believe it will stop here. Enough is enough.” Biden's move has already prompted furious claims of hypocrisy from Republicans – for breaking his promise and for using his presidential power to protect his son. One Democratic governor, Jared Polis of Colorado, quickly released a statement saying he was “disappointed” and that the move would “tarnish” the outgoing president’s reputation.

