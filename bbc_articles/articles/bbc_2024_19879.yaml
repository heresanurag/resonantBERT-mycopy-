title: 'Southwark Tube: Man dies in hospital after assault at station - BBC News'
date: '2024-08-25'
section: London
url: http://www.bbc.co.uk/news/articles/cy54q265e2ko
content: |-
  Police charged a man with grievous bodily harm, but say they are reviewing this after the death.

  A man has died after being assaulted at Southwark Underground Station, British Transport Police (BTP) has said.

  The 28-year-old man had been in a critical condition in hospital since Thursday and died on Saturday evening, with his family by his side, the force added.

  Officers were called to the station in south-east London on Thursday at about 21:44 BST after reports of an assault on the stairs.

  A 23-year-old man from Southwark was charged with grievous bodily harm with intent, said police, who have been reviewing the charges following the other man's death.
