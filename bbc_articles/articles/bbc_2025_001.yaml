content: |-
  When Jordan Izzett wanted to improve his fitness, he took an unusual approach: racing London’s buses.

  When people want to improve their fitness, many will go to the gym or join a sports club. That was not the route for Jordan Izzett - after lockdown, he decided to race against London's buses to improve his health.

  The 23-year-old from east London posts videos of himself telling London's bus drivers that he will be racing them, he then runs the entire bus route, ticking off each stop on his way.

  He says he now takes part in the activity at least once a week and has raced against nine or 10 buses.

  "Racing a bus is just like doing a normal run, but with a competitive element," he says.

  He does not recommend it for any fresh starters, however.

