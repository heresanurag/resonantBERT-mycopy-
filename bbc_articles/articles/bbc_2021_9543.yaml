title: 'Tokyo Olympics: Great Britain eventers win team gold and Tom McEwen claims
  individual silver - BBC Sport'
date: '2021-08-03'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/58047135
content: |-
  Great Britain win Olympic team eventing gold for the first time in 49 years and Tom McEwen adds a silver in the individual category.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain won Olympic team eventing gold for the first time in 49 years at Tokyo 2020, before Tom McEwen secured silver in the individual category. World number one Oliver Townend, Laura Collett and McEwen sealed team victory in the final show-jumping stage. They claimed the gold ahead of Australia, while France took bronze. Germany's Julia Krajewski took the individual honours from McEwen and Australian Andrew Hoy, 62, as Townend finished fifth and Collett was ninth. She is the first female rider to win the competition which first allowed women at the Tokyo Games of 1964. McEwen took silver in the individual competition on Toledo De Kerser after a faultless display followed his earlier clear rounds in the team show jumping and cross-country stages. The GB team finished with 86.30 penalties - 13.90 clear of Australia - to seal Britain's 11th gold of the Games. "My nerves were fine," said McEwen, 30, whose stables are on the the Princess Royal's Gatcombe estate in Gloucestershire. "They [Townend and Collett] are both brilliant riders, and I had no doubt they would pull it straight out of the bag quite easily and comfortably."

  GB riders Tom McEwen (pictured), Laura Collett and Oliver Townend were making their Olympic debuts

  Britain last won eventing team gold at the 1972 Games in Munich, and only two riders - Richard Meade (1972) and Leslie Law (2004) - have tasted individual glory. Despite all three this time making their Olympic debuts, GB held a huge lead of 17.9 penalties after impressive rounds in Sunday's cross-country phase, and they comfortably retained top spot. McEwen went clear, while Collett had four faults aboard London 52 and Townend also collected four with Ballaghmor Class.

  Victory sealed a remarkable return for Collett, who nearly died in a fall eight years ago and spent six days in a coma. She suffered a punctured lung, spine, shoulder and rib fractures, and lost much of her vision in one eye. Two years after her accident, Collett had to deal with unfounded malicious rumours about the two-time Cheltenham Gold Cup winner Kauto Star, who was being trained at her yard for a dressage career but died in a freak accident. "I know I am lucky just to be alive, let alone doing the job I love and winning an Olympic gold medal," the 31-year-old told BBC Sport. "Just to be here was more than a dream come true. "Standing on the podium, it makes every bad day worth it. It was an incredible experience."

  Collett said an air jacket saved her life after a fall in 2013

  Collett said her horse London 52 - who is nicknamed 'Dan' at his stables near Cheltenham - was spooked by the reflection from water when they made a mistake. "He got it back together. It's a shame, but it could have been a whole lot worse in that situation. It was a very clever course," she added.

  Townend adds Olympic gold to a glittering CV which includes victories at the major Badminton, Burghley and Kentucky events. "The other guys have made it so easy for me - they are such brilliant riders," said the 39-year-old, who is based in Shropshire.

