  "I'm surrounded by class horses and very classy people. "There will be a big celebration and I don't think it will be with a cup of tea and a biscuit." That was a third equestrian medal in Tokyo for Team GB following Charlotte Dujardin, Carl Hester and Charlotte Fry winning dressage team bronze, and Dujardin also collecting an individual bronze. McEwen then made it four with his silver.

