  Humphries was celebrated for his comedic “genius” but also kindness, at a state memorial in Sydney.

  Barry Humphries has been remembered for his comedic “genius” but also his kindness, at a state memorial in Sydney.

  In a message read out at the service, King Charles said: “Life really won’t be the same without him.”

  Musician and friend Elton John, in a recorded video, told those at the service to “celebrate with laughter because that was what Barry was all about”.

  The 89-year-old comedian and raconteur died in April of complications from hip surgery.
