title: Police investigated sex assault at Fayed estate in Scotland - BBC News
date: '2024-09-20'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/articles/c748ejp5jdno
content: |-
  The former Harrods owner, who has been accused of rape at his London store, previously owned Balnagown Estate in the Highlands.

  Mohamed Al Fayed has been accused by dozens of women

  Police Scotland says it has investigated a report of a "non-recent sexual assault" by Mohamed Al Fayed at his former estate in the Highlands. Fayed was the owner of Balnagown Estate in Easter Ross. Police Scotland said its inquiries into the matter were complete. A force spokesperson said: "Should new information be obtained or reported to police, then further inquiries will be carried out." The late Harrods owner has been described as a "sexual predator" who assaulted staff and threatened them over a 25-year-period in London and other locations, according barristers representing dozens of women.

  Mohamed Al Fayed is the former owner of Balnagown Estate in the Highlands

  Fayed , who died in August last year, bought Balnagown Estate, north of Invergordon, in 1972. He also owned Sutherland's Falls of Shin Visitor Centre, which was damaged by fire in 2013. A lawyer for his accusers was described him as "a monster" enabled by a system that pervaded Harrods' London store. Dean Armstrong KC said Harrods should take responsibility after allegations against Fayed - including rape - were made in a BBC investigation this week. Harrods has said it was "utterly appalled" by the allegations and has condemned his actions "in the strongest terms". The department store's new owners have a compensation scheme for ex-employees who say they were attacked by Fayed, which is separate to the legal action being taken by some accusers. Harrods has already reached financial settlements with the majority of people who have approached them since 2023, and has had new inquiries this week.
