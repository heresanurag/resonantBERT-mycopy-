  England lock George Martin is expected to miss the rest of Leicester Tigers' season, putting his British and Irish Lions selection hopes in doubt.

  Cheika 'puts line through' Martin for rest of season

  England lock George Martin is expected to miss the final weeks of Leicester Tigers' season, putting his hopes of British and Irish Lions selection in doubt. The 23-year-old has not made an appearance since being forced off the pitch in England's narrow Six Nations win against France in February. A combination of knee and shoulder injuries kept Martin from adding to his 21 caps after that - a tally of Test appearances which included starting in all of England's summer and autumn fixtures last year. He has missed Leicester's Premiership and European games since the return of top-flight club action in late March, and head coach Michael Cheika said it is unlikely he will get back to help the Tigers try and clinch a play-off spot. "I think you can almost put a line through him for the rest of the season," Cheika told BBC Radio Leicester. "It doesn't look like he is going to come back any time soon. We will always keep trying."

  Injuries have meant that Martin has played almost as often for England this season as he has for Tigers. The combative forward featured in five of their opening 11 Premiership games before the Six Nations, and also in two European Champions Cup group games in that time. Martin's form for club and country in recent years, including a start for England in their 2023 World Cup semi-final defeat by South Africa having largely been used from the bench during the competition, has linked him with a potential first British and Irish Lions call-up, external for the coming summer. While Cheika was open about Martin's unlikely involvement with Tigers for what remains of the season, the Australian would not be drawn on how it might impact his Lions' hopes. "I don't know about that bit," Cheika added. "I'd rather just talk about Leicester and [you] make your own conclusions off the back of that. The important thing is for him to recover at this stage." While third-placed Tigers may not have Martin for what remains of the campaign, fellow England international Ollie Chessum is edging closer to making his first appearance since the Six Nations. "Ollie has been involved these last few weeks, and we started getting him involved a bit more today," Cheika said. "I think off the back of what we see tomorrow we'll get a good picture of whether he'll be available this week. The same with Julian Montoya. Tommy Reffell is the most active of all of them." Tigers are next in action on Sunday away to second-placed Bristol Bears.
