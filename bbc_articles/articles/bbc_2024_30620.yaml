  A community group in Edinburgh have unveiled a 16ft knitted Christmas tree aimed at bringing different generations together.

  A community group in Edinburgh has unveiled a 16ft knitted Christmas tree aimed at bringing different generations together.

  The Heart of Newhaven hope to tackle loneliness and isolation in people of all ages through shared activity.

  Volunteers have been meeting on a weekly basis to knit squares and decorations for the tree.

  Based in an old Victorian school building, north of the city centre, Heart of Newhaven hopes the tree boosts the development of an intergenerational hub.
