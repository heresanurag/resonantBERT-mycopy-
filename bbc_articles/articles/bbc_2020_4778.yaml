  Tube passengers 'could be banned' without face covering

  Passengers could be stopped from travelling on Tube trains and buses in the capital without a face covering, London Mayor Sadiq Khan has announced. He said he had the option to make it mandatory in London only, which he said he would be considering next week. Existing guidance from Transport for London only goes as far as advising passengers to wear face coverings, which is in line with nationwide policy. Mr Khan told the London Assembly he would lobby the government to try to "reach a sensible compromise", noting some train services in London were not under his control.
