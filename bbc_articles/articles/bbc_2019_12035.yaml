  Approving the terms of the settlement at the latest High Court hearing, Mr Justice Stewart said the case had concerned the "legality" of the shooting.

  He said had it gone to trial, the court would have examined whether Mr Duggan did have a gun and if V53 had a "reasonable belief that Mr Duggan was holding a gun when he was shot".
