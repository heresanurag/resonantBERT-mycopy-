  More than a hundred people were killed in a packed concert venue in Moscow after gunmen opened fire.

  More than a hundred people have been killed in a packed concert venue in Moscow after gunmen opened fire.

  BBC Verify’s Merlyn Thomas has been analysing the social media footage that has emerged from the Crocus Concert Hall, to piece together how the attack unfolded.
