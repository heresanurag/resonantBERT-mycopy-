title: Another heatwave forecast as temperatures climb late week - BBC Weather
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/weather/articles/cj0mr0l5d9eo
content: |-
  Temperatures have dropped a bit since the weekend but the heat is likely to start to build again over the next few days.

  Heatwave forecast for parts of the UK later this week

  This fresher feel to the start of this week has also brought heavy rain for some, but don't be fooled - very warm weather is set to return within days. Temperatures will temporarily head back up into the high twenties for eastern and south-east England on Wednesday before heavy showers and thunderstorms move through. But by the end of this week the heat is expected to build even further with temperatures in the high twenties and low thirties. Some locations in eastern and south-east England likely to have another official heatwave lasting until early next week.

  Temperatures are set to soar again at the weekend in some parts of the UK

  The cooler conditions for many of us on Monday and Tuesday have been accompanied by a blustery westerly wind bringing cloud, showers and longer spells of rain. On Wednesday those brisk westerlies will switch to a more south-westerly flow which will start to draw in some hotter weather across parts of the UK. Temperatures will rise to 26C to 29C across the Midlands, eastern and south-eastern England. The heat and higher humidity will then bring the chance of heavy and thundery showers across eastern areas overnight. Heavy, thundery rain will also spread to many parts from the west. It could become a little uncomfortable again for sleeping as overnight temperatures won't drop much below 15C to 17C in eastern areas.

  It's possible Monday could be the hottest day of the year so far in the UK

  While Thursday will be a little fresher with lower temperatures again, hotter weather looks like returning to some places for the end of the week. Temperatures on Friday will rise across parts of central and eastern England into the high twenties. And with 27C or 28C possible in East Anglia and south-east England, the official heatwave threshold temperature could be exceeded for the first day in a few locations in Suffolk and Norfolk. It'll get a little warmer still by Saturday with temperatures more widely in East Anglia and south-east England getting up to 27C to 29C. Then by Sunday and Monday the very warm – if not hot air – spreads further north and west into many parts of England and east Wales with reaching around 30C. By Monday afternoon many parts of eastern and south-east England will be on their third consecutive day of temperatures exceeding the Met Office's pre-defined heatwave threshold temperatures.

  As the gates open to Glastonbury on Wednesday it's looking like a fine day to get set up with temperatures rising to 25C. But the main risk of rain will be on Wednesday night and Thursday morning as a band of thundery rain moves from west to east across England. So it could be a rather muddy start to the Thursday even if the forecast for the rest of the day is looking dry and a bit cooler at 20C. As the festival really gets going by the end of the week the weather is looking pretty favourable with lots of dry weather with warm sunny spells. The hot weather is also likely to still be around at least at the start of next week and the opening days of the Wimbledon Championships. Temperatures will be peaking on Monday at around 32C, falling to the high twenties on Tuesday and mid-twenties for the rest of the week. And as for rain? While it looks predominantly dry for the first week of Wimbledon, the forecast this far ahead is always tricky so best to stay up to date on the BBC Weather app or website.
