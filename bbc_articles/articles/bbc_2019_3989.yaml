title: 'Brexit: Conservatives and Labour continue talks - BBC News'
date: '2019-04-13'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-47907260
content: |-
  Parties bid to break parliamentary deadlock, following the delay of UK's departure date from the EU.

  Michael Gove and John McDonnell have been involved in the talks

  The government and Labour have held further talks aimed at breaking the deadlock in Parliament over Brexit.

  Shadow Chancellor John McDonnell said discussions with cabinet ministers David Lidington and Michael Gove had been "positive" and "constructive".

  He added that a timetable was being worked out for more meetings over the next seven to 10 days.

  EU leaders have agreed to delay the UK's departure date from 12 April to 31 October, to avoid a no-deal Brexit.

  But Prime Minister Theresa May has said the UK can still leave before 22 May, if Parliament backs the withdrawal agreement she reached with the EU.

  This would avoid the UK having to take part in European Parliament elections, currently scheduled for 23 May.

  The UK was originally due to leave the EU on 29 March, but its departure date has been delayed twice, after the Commons rejected the withdrawal deal negotiated with the EU by large margins.

  The meeting between Mr McDonnell, members of Jeremy Corbyn's staff and Mr Gove and Mr Lidington lasted just over an hour.

  Asked if the government had moved on its "red lines", Mr McDonnell told reporters: "I'm not going into the detail of it.

  "We are trying to be as constructive as we possibly can on all sides... but we will see by the end of next week how far we have got."

