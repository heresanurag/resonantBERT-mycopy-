title: Firefighters and member of public die in fire at Bicester Motion - BBC News
date: '2025-05-16'
section: Oxfordshire
url: http://www.bbc.co.uk/news/articles/c3wd80173nzo
content: |-
  Two further firefighters suffer serious injuries after the blaze at Bicester Motion.

  Firefighters and member of public die in blaze at business park

  To play this video you need to enable JavaScript in your browser. This video can not be played Large plumes of smoke were filmed coming from one of the Bicester Motion buildings

  Two firefighters and a member of the public have died in a large blaze at a business park. Oxfordshire Fire and Rescue Service said one of its crew died while tackling the fire at Bicester Motion on Thursday evening, whilst London Fire Brigade confirmed the second fatality was one of its firefighters on retained duty in Oxfordshire. Two more firefighters are in hospital after suffering serious injuries. Thames Valley Police has launched an unexplained death probe following the fire at the former RAF base but stated it was "currently not a criminal investigation".

  In an emotional news conference at the site on Friday, Oxfordshire's Chief Fire Officer Rob MacDougall said: "It is with a heavy heart that we report the loss of two of our firefighters. A member of the public has also sadly died in the incident. "I am immensely proud and grateful for the exemplary multi-agency response and the unwavering bravery demonstrated by all the emergency services personnel," he continued. He confirmed the affected families had been informed and were being supported and asked "for their privacy to be respected". He said he could not release any further details but would provide more information "as soon as we can".

  To play this video you need to enable JavaScript in your browser. This video can not be played

  In a statement, London Fire Brigade said it was "devastated by the loss of our colleague". "We are working closely with our counterparts in Oxfordshire, providing support to the family and our crews affected by this tragic loss. "Our sincere condolences go out to Oxfordshire Fire and Rescue Service who also sadly lost a firefighter at this incident, with a further two colleagues in hospital." Sherine Wheeler, chief executive of the Fire Fighters Charity, told BBC Radio Oxford everyone in the firefighting community was feeling "heartbroken". "It's very rare and tragic to have the loss of two firefighters alongside a member of the public and I think the impact of that is being felt deeply," she said. "For a lot of people who serve in the fire service it brings the reality of the risks they hold crashing home."

  Images taken above the building show the level of destruction

  The fire was reported at about 18:30 BST on Thursday and rapidly spread through a former aircraft hangar at the site. Ten fire and rescue crews were called to tackle the blaze as witnesses reported seeing black smoke in the sky. The cause of the fire is not yet known. Bicester Motion is home to more than 50 specialist businesses, focused on classic car restoration and engineering on the former site of RAF Bicester. It was home to RAF Bomber Command in World War Two and became redundant in 2004. Historic England said the famous airfield was "the most complete and strongly representative example of an RAF airbase" in Britain. Thames Valley Police said additional officers would remain at the scene "for a number of days" and urged anyone with any concerns to speak to them.

  Smoke could be seen from the other side of the town

  Home Office statistics, external showed it was only the fourth incident in which a firefighter had died whilst tackling a blaze in England in the past 15 years. It is also the first time two firefighters have been killed in the same fire since Jim Shears and Alan Bannon died in a blaze at Shirley Towers in Southampton in April 2010. Paying tribute, Prime Minister Sir Keir Starmer said his thoughts were with the families and friends of those who had died following the "devastating news". He continued: "The bravery of our firefighters is astounding. Hoping those in hospital make a full and swift recovery." Conservative Party leader Kemi Badenoch described it as "an absolutely horrifying incident", adding: "I hope that we can get to the bottom of exactly what's caused this and make sure that it doesn't happen again."

  Lord Lieutenant of Oxfordshire Marjorie Neasham Glasgow - who is the King's representative in the county - said: "I know that His Majesty The King would want me to pass on his sincerest condolences to all those affected by the tragic news." Sending his thoughts to those affected, Philip Garrigan, chief of the National Fire Chiefs Council, said: "Our firefighters are the very best of us, their courage and compassion is what make them so very special." While the Fire Brigades Union said it would provide "whatever support is required in the days ahead, and in time we will investigate what happened".

  Bicester Motion said it was "deeply saddened to share the tragic news that two firefighters and a close friend of the site have lost their lives". It said there were "no words at times like this" and sent its "thoughts and prayers" to those affected. "The bravery shown by the emergency services teams has been overwhelming," the firm continued. "We are grateful for all the support and especially the exceptional work by all in such unprecedented circumstances." It said the site would remain closed over the weekend "as we continue to work closely with the emergency services".

  Emergency services remained at the scene on Friday

  People, including members of South Central Ambulance, have left floral tributes to those affected by the incident at nearby Bicester Fire Station. Jamie Jessett, from the town, said he went to school with one of the firefighters who died, but declined to name them to the BBC. He said the fire was "devastating", but also that it was "amazing" to see the community come together to pay their respects. "That's what we need, especially at this moment in time," he added.

  Floral tributes have been left at Bicester Fire Station

  Calum Miller, MP for Bicester and Woodstock, travelled from London to the site, where he told the BBC: "I understand from the fire service that firstly they are making sure everything is secure, and then of course in the fullness of time there will be an investigation." He added he was "devastated" and said his thoughts were with the families and friends of those who had died, and with the two firefighters in hospital. "It's a terrible thing to have happened, and I know it's a tight-knit community who are already showing their support for those families," he said. The MP said he was "in awe of the bravery of those who put themselves in the front line whenever there is danger". "It's an incredible commitment, it's an incredible path of service, and it's just so tragic that two members of that community have lost their lives," he said.

  The cause of the fire is not yet known

  Leader of Oxford City Council, Councillor Susan Brown described it as a "terrible reminder for us all that firefighters, as well as the other members of the emergency services, put themselves at risk on a daily basis, to protect us all. We owe them a deep debt of gratitude". Oxford City Council has lowered the city flag, flying over Oxford Town Hall, to half-mast in tribute. St Laurence's Church in Banbury Road, Caversfield, close to the site, said it had opened its doors "for anyone looking for a space for private prayer or for stillness and reflection" following the "tragic news". A book of condolence has also been opened at the church, as well as at Garth House - Bicester Town Council's headquarters.

