  Nicky Campbell pays tribute to Radio 2 DJ Steve Wright, who has died aged 69.

  Nicky Campbell has paid tribute to Radio 2 DJ Steve Wright, who has died aged 69.

  He told BBC News that if you spent 10 minutes or 15 minutes with Steve, "you thought for the rest of the day or the rest of the week, oh that was a brilliant 15 minutes."
