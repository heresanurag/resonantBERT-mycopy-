title: Men 'riding freight train' found dead on Hackney Wick line - BBC News
date: '2019-03-23'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-47658137
content: |-
  Two men found dead on the train tracks in east London suffered serious electrical burns, police say.

  The men suffered serious electrical burns on the line between Hackney Wick and Stratford

  Two men found dead on the train tracks had been riding on top of a freight train wagon, police said.

  Officers were called to the line between Hackney Wick and Stratford in east London in the early hours of Thursday.

  British Transport Police said a 27-year-old man from Clerkenwell and a 25-year-old man from Aberystwyth suffered severe electrical burns and died.

  Their next of kin were being supported by family liaison officers, it added.

  Det Sgt David Taylor said officers had worked throughout the night to understand what had happened to the men.

  He added: "The initial evidence that we've been able to gather suggests that both men were on top of a moving freight train wagon when they came into contact with the overhead power lines."

  On Thursday, a police spokesman confirmed they were investigating whether the victims were graffiti artists or possibly "train surfers".

  But Det Sgt Taylor said: "Our investigation will continue to examine how and why they came to be on top of this train although there is nothing to indicate that graffiti was involved."

