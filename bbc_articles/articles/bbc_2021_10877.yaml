title: Russia behind Litvinenko murder, rules European rights court - BBC News
date: '2021-09-21'
section: World
url: http://www.bbc.co.uk/news/world-58637572
content: |-
  The former Russian spy, who became a British citizen, was poisoned in London with polonium in 2006.

  This video can not be played To play this video you need to enable JavaScript in your browser. Alexander Litvinenko died in hospital three weeks after he was poisoned with polonium

  Russia was responsible for the killing of Alexander Litvinenko, the European Court of Human Rights (ECHR) has found.

  Litvinenko, a former Russian spy who became a British citizen, was fatally poisoned with radioactive polonium-210 in London in 2006.

  A UK public inquiry conducted 10 years later concluded that the killing was "probably approved" by Russian President Vladimir Putin.

  Russia has always denied any involvement in his murder.

  The UK inquiry said former KGB bodyguard Andrei Lugovoi and another Russian, Dmitry Kovtun deliberately poisoned Mr Litvinenko, probably by putting the radioactive substance into his tea.

  Litvinenko's widow, Marina, took the case against Russia to the Strasbourg-based rights court, which has agreed with the UK inquiry's conclusion.

  "The court found in particular that there was a strong prima facie case that, in poisoning Mr Litvinenko, Mr Lugovoi and Mr Kovtun had been acting as agents of the Russian state," the ECHR ruled.

  It concluded that Russia's failure to refute claims that it had organised the killing further pointed towards the state's responsibility.

  Both Mr Lugovoi and Mr Kovtun have denied any involvement in the killing.

  This video can not be played To play this video you need to enable JavaScript in your browser. Andrei Lugovoi speaking in 2016: "All this I can call nothing but a spectacle"

  A year afterwards, Mr Lugovoi became a member of Russia's lower house of parliament for a right-wing nationalist party. He later condemned the UK public inquiry as a spectacle and an open lie.

  However, the Strasbourg rights court found it had established "beyond reasonable doubt" that the pair had carried out the poisoning, from the complex procurement of "rare, deadly poison", to the travel arrangements and the repeated and sustained attempts to poison Litvinenko.

  Litvinenko had fled Russia, where he had been an officer with the FSB security service. He became a fierce critic of President Vladimir Putin and was in the pay of the UK's MI6 secret service, reportedly investigating Russian mafia links with Spain.

  Litvinenko was admitted to hospital soon after meeting the two Russians for tea in London

  He met Andrei Lugovoi and Dmitry Kovtun for a cup of tea at a central London hotel on 1 November 2006. He soon fell ill and was admitted to hospital shortly afterwards. His condition worsened and he died on 23 November.

  The ECHR found that if his murder had been a "rogue operation" then Russia would have been able to prove that. But the court said no serious attempt was made to disprove the findings of the UK authorities.

  Although it said Russia should pay Litvinenko's widow €122,500 (£105,000; $144,000) in costs and other damages, it rejected her claim for punitive damages.

  The poisoning of Alexander Litvinenko broke a number of unwritten rules and taboos.

  It was an unprecedented use of a radiological weapon - polonium-210 - on British soil, with the perpetrators leaving a trail of forensic clues wherever they went.

  The assassination, again on British soil, of someone who had been helpful to MI6, the Secret Intelligence Service, was also highly unusual. But the cause of his death very nearly went undiscovered.

  Polonium-210 is a rare material, produced in a reactor that emits alpha rays, not gamma rays. These are too weak to penetrate the skin but if ingested they are lethal, breaking down the cell walls, causing multiple organ failure.

  In Litvinenko's case it was only discovered, too late, in his urine and the precise source identified by nuclear scientists from the Atomic Weapons Establishment at Aldermaston in Berkshire.

  The ECHR's ruling that Russia was behind this murder will come as no surprise to those who have already investigated it.
