content: |-
  Violent attacks are making treating the worst Ebola outbreak in the history of DR Congo even harder.

  Violence by militia groups has made treating the worst Ebola outbreak in the history of the Democratic Republic of Congo even harder.

  Anne Soy joined teams in the east of the country to see their challenges and successes.
