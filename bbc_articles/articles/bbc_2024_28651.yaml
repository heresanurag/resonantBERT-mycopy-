title: Logan Paul accused of misleading fans over cryptocurrency investments - BBC
  News
date: '2024-11-20'
section: Technology
url: http://www.bbc.co.uk/news/articles/cze386d3enpo
content: |-
  New evidence suggests the YouTuber promoted investments without revealing his financial interest in them.

  Logan Paul, the massively popular social media personality, is facing fresh questions over his cryptocurrency dealings amid ongoing concerns he may have profited from misleading fans. The BBC has seen new evidence suggesting he promoted investments without revealing he had a financial interest in them. The influence of Paul - whose YouTube channel has more than 23 million followers - appears to have caused prices in these investments to spike, leading to suggestions he could have profited from sales of any tokens he held. Paul also currently faces a multi-million-dollar lawsuit over a failed crypto project called CryptoZoo.

  The BBC has discovered that shortly before Paul tweeted about a particular crypto coin in 2021, an anonymous crypto wallet with close connections to his public wallet had traded in the coin. That anonymous wallet went on to make a $120,000 (£92,000) profit. Crypto wallets (which can be physical devices or an online service) hold users' keys to their accounts, and let people send, receive and spend crypto. Our finding comes after Time Magazine reported similar activity involving a different cryptocurrency and another anonymous wallet. For several months, Paul refused to talk to the BBC about our investigation. Then he appeared to relent, inviting us to interview him at his gym in Puerto Rico. However, when our crew arrived, a Logan Paul lookalike turned up in the YouTuber’s place, shortly followed by a crowd shouting abuse about the BBC. Minutes after abandoning the interview, we received a lawyer’s letter on behalf of Paul, warning us of the possible consequences if we published our findings.

  Logan Paul built a worldwide following as an internet celebrity by uploading short video clips, first to the now-closed platform Vine, and then on YouTube. About three years ago, Paul’s videos began mentioning cryptocurrency (crypto, as it is commonly known) more and more. Crypto is a form of digital money that uses secure technology to work, without the need for a central bank. These are usually inspired by internet jokes or memes and are supported by online communities. Meme coins have no other real purpose other than to be traded and, since they have no intrinsic worth, their value can - and often does - drop to zero. Paul extolled the virtues of an Elon Musk-themed meme coin known as Elongate. “Elongate made me rich. Elon baby let’s go!” Paul announced in a video clip to Maverick Club, his subscription-only fan club. Following this namecheck, the price of Elongate rose by over 6,000% to an all-time high. It then remained at that price for a few hours before it crashed. We cannot be sure of Logan Paul’s intentions when he released his clip. However, it seems likely that his mention of Elongate affected its price. Tech journalist Will Gotsegen says crypto is a market driven to some extent by social media and influencers: “A big guy with a lot of influence... someone like Logan Paul, buys a tonne of crypto and tells their followers about it. They're going to buy it too.”

  Logan Paul has now branched out as a star of US wrestling

  The anonymous crypto wallet analysed by the BBC appears to have close connections to Paul. Anyone can see the transactions made by a wallet, but the owner can choose to remain anonymous. If an owner attaches their name or personal details it becomes a public wallet. We could see that the wallet first received funds in February 2021 from a public wallet owned by Logan Paul. It then started buying and trading crypto.

  Logan Paul, one of the biggest social media influencers in the world, is facing criticism for his role in promoting cryptocurrency projects. Matt Shea investigates the allegations. Speaking to law enforcement and alleged victims, and trying to get close to the man himself, Shea seeks to finally answer the question: did Logan Paul do anything wrong? Watch on BBC Three at 21:00, 20 November or on BBC iPlayer shortly after broadcast

  The wallet was later paid funds from Maverick Club and held Elongate when Paul promoted it on 10 May 2021. Shortly after, it also traded in another Musk-related meme coin - after Paul had tweeted that it was headed “to the moon”. In the crypto community, this means someone believes the price of the coin is about to shoot up. About an hour before Paul’s tweet, the unknown wallet purchased almost $160,000 (£123,000) worth of the token. The tweet prompted an influx of buyers, spiking the price. Twelve hours later, the wallet sold most of its holding. The total profit made from this trade appears to be just over $120,000 (£92,000). Logan Paul chose not to respond to the BBC’s allegations regarding the crypto wallet, the trading that occurred within it, or his connection to it, despite responding to some of our other requests via his legal team.

  Anyone who bought it would own shares in a cartoon character that resembled a metal coil. They would earn a portion of its earnings if it appeared in a TV show or film. Paul promoted the token on Twitter (as the site was then known), and told a Telegram group dedicated to Dink Doink that he “believed” in it, saying: “I think it’s going to go crazy.” Again, this led to a huge influx of buyers, causing Dink Doink's value to spike. Then - following a familiar pattern - large-scale holders of the token began selling, causing its price to fall by 96% in just two weeks. Time Magazine analysed another anonymous wallet, external that had bought Dink Doink prior to Logan Paul’s promotion of the coin and then sold its holding shortly after. This wallet later sent $100,000 (£78,000) to Paul’s public wallet. When the BBC asked the influencer about this wallet, his lawyers did not deny that it belonged to him, or was held for his benefit, but were adamant that the $100,000 that was transferred was not related to Dink Doink. They do accept that Paul traded Dink Doink, but say he only made $17,000 (£13,400).

  For several months, Paul refused to be interviewed by the BBC. Then, unexpectedly, he agreed to talk to us at the boxing gym in Puerto Rico that he co-owns with his brother. We sent Paul a list of the allegations we wanted him to respond to, and his PR team requested we travel to the Caribbean island, so he could answer in person. They also insisted we flew into the island while it was being pummeled by Tropical Storm Ernesto, which had knocked out power to hundreds of thousands of people. At the gym, we noticed a strange atmosphere - with a suspicious number of his own cameras pointed at us. Paul’s assistant insisted our cameras should be recording from the moment the star entered the room, because of his strict schedule and timekeeping. Then things became even stranger. Instead of Logan Paul, a lookalike arrived and sat down in front of our reporter, Matt Shea, and began impersonating the YouTuber. We called him out and began complaining to Paul’s assistant, asking whether the real Logan Paul would be coming. At that moment, a group of people suddenly appeared, apparently from nowhere, wielding banners and shouting that the BBC were “paedophiles”. We had flown all that way just to be trolled.

