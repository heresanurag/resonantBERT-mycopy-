content: |-
  Boris Johnson tells Radio 4's Today there will be no "psychological transformation" from him.

  Boris Johnson has told the BBC a transformation in his psychology is not going to happen in the wake of the Conservatives double by-election defeats.

  Speaking to Radio 4 Today's Mishal Husain, the prime minister said voters were "fed up" of the conversation being focused on him.
