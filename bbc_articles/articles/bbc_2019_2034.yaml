title: Trump in good health despite weight in obese range - doctor - BBC News
date: '2019-02-15'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-47243351
content: |-
  The president is a few pounds heavier and taking a higher dose of cholesterol medicine, his doctor says.

  This video can not be played To play this video you need to enable JavaScript in your browser. The president has installed a $50,000 golf simulator in the White House

  US President Donald Trump has put on weight since his last medical check-up, but remains in "very good health", his official doctor Sean Conley says.

  Mr Trump was receiving a higher dose of medicine to lower his cholesterol levels, his memo said.

  Mr Trump weighed 243lb (110kg) in last week's examination, which is up from 239lb in early 2018.

  Other doctors noted that his Body Mass Index (BMI) now fell in excess of 30, which is considered clinically obese.

  "It is my determination that the president remains in very good health," Dr Conley said in a brief statement issued by the White House after examining the 72-year-old.

  The news of his report was released minutes after officials announced Mr Trump would declare a "national emergency" at the US-Mexico border in a bid to secure funding for a border wall.

  President Trump, who has a common form of heart disease, had previously been asked to lose at least 10lb.

  The 6ft 3in (1.9m) US president reportedly favours a diet of fast food and diet sodas, and has long faced questions over his health.

  He famously does not drink alcohol, and says he has never done so. He is also a non-smoker.

  During his campaign, he produced a letter that said he would be the "healthiest individual ever elected", but the doctor named as the author later said Mr Trump had written the letter himself.

  Last year, Dr Ronny Jackson said the president had "incredible genes" and it was not a matter of concern that he only slept for four or five hours a night because this was "just his nature".

  This video can not be played To play this video you need to enable JavaScript in your browser. Dr Ronny Jackson said in 2018: "He has incredible genes"

  In the latest release, Dr Conley said he had found no significant health problems during the annual check-up.

  "There were no findings of significance or changes to report on his physical exam, including the eyes, ears, nose, mouth, teeth/gums, heart, lungs, skin, gastrointestinal, and neurologic systems," the medical summary said.

  The report detailed that the dosage of his anti-cholesterol medicine, Rosuvastatin, had been increased from 10mg to 40mg.
