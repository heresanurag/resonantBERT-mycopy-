title: Pregnant woman seriously hurt in Leicester hit-and-run crash - BBC News
date: '2019-12-03'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-50639434
content: |-
  The heavily pregnant woman was struck by a car as she cycled on a road in Leicester.

  The woman was knocked off her bicycle close to Park Hill Drive

  A heavily pregnant woman has been seriously injured in a hit-and-run crash.

  The victim was cycling in Aylestone Road, near Park Hill Drive, Leicester, at about 21:30 GMT on Monday when she was hit by the vehicle.

  A 40-year-old man from Leicester, is being held on suspicion of causing serious injury by dangerous driving and driving while under the influence of alcohol.

  Det Sgt Paul Hawkins said: "We are continuing to provide support to the woman injured and her family as the investigation continues."

