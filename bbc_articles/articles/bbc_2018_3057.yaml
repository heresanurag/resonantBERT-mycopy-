title: 'South Korea gaming: Death by overwork sparks calls for change - BBC News'
date: '2018-03-18'
section: General
url: http://www.bbc.co.uk/news/world-asia-43315496
content: |-
  Critics say "crunch time", an intense burst of work just before a game is released, can be dangerous.

  The recent death of an employee at a South Korean video game developer has sparked calls to change "crunch time", a period of high intensity work just before a game is released.

