  How much attention did you pay to what's being going on in the world over the past seven days?

  This week saw Donald Trump and Elon Musk have a very public falling out, the UK government do a U-turn on winter fuel payments for pensioners, and Zia Yusuf rejoin Reform UK's party leadership, just days after quitting as chairman. But how much attention did you pay to what else happened in the world over the past seven days?

