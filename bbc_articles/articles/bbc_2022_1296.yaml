title: Former city minister Lord Myners of Truro dies age 73 - BBC News
date: '2022-01-16'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-60014868
content: |-
  He led some of the UK's best-known companies and helped shape the response to the 2008 financial crisis.

  Lord Myners has died at the age of 73

  Former city minister and business leader Lord Myners has died at the age of 73.

  He "passed away peacefully" at Chelsea and Westminster Hospital in the early hours of Sunday, a statement from his five children said.

  Lord Myners was born in 1948 and was brought up by his adoptive parents, a butcher and a hairdresser, in Cornwall.

  In December he stepped down as Chancellor of the University of Exeter after five years in the role.

  His extensive financial career included stints with investment bank NM Rothschild and fund manager Gartmore.

  He later held prominent chairing positions, including at Marks & Spencer, the Guardian Media Group, Land Securities and Tate art galleries.

  He also held directorships of companies including NatWest, Coutts & Co, Lloyds of London, the Bank of New York and Singapore's sovereign wealth fund, as well as a membership of the Court of the Bank of England.

  Former prime minister Gordon Brown appointed him financial services secretary in 2008, with the task of managing the national response to the global banking crisis.

  In a tribute, Mr Brown tweeted: "I worked with Paul Myners during the global financial crisis while in government back in 2008 and he was a real tower of strength throughout that time.

  "My thoughts are with his family at this sad time."

  Also in 2008, he was elevated to the House of Lords as Lord Myners of Truro and later became a crossbench peer.

  The statement from his family said: "With great sadness we announce the loss of our beloved father Lord Paul Myners.

  "He passed away peacefully in the early hours of this morning at Chelsea & Westminster Hospital.

  "He will be deeply missed and in our hearts forever."

