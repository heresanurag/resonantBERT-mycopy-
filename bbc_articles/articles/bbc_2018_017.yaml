id: bbc_2018_017
title: Climbers rescued from snowy mountain ridge in Scotland - BBC News
date: '2018-01-21'
section: General
url: http://www.bbc.co.uk/news/uk-42767444
content: |-
  Two men were airlifted to safety after a night without shelter in sub-zero temperatures.

  Two climbers were airlifted to safety after spending a night without shelter in sub-zero temperatures.

  The men were stuck at 3,000 ft on Bidean Nam Bian in Glencoe until a coastguard rescue team managed to reach them.
