id: bbc_2022_9273
title: 'Chris Pincher: PM was briefed says Simon McDonald - BBC News'
date: '2022-07-05'
section: General
url: http://www.bbc.co.uk/news/uk-politics-62048638
content: |-
  A former senior civil servant says Boris Johnson was "briefed in person" about an investigation into Mr Pincher.

  No 10 did not tell the truth when it said the PM was unaware of official complaints about Chris Pincher's behaviour, an ex-civil servant in the Foreign Office has said.

  Simon McDonald said Boris Johnson had been "briefed in person" about an investigation into Mr Pincher, then a Foreign Office minister.

  Mr Pincher, the MP for Tamworth, was suspended as a Conservative Party MP last week over allegations he groped two men at a private members' club in London. He says he is seeking professional medical support.

  In a strongly-worded letter to the parliamentary standards commissioner, Lord McDonald has disputed No 10's version of events.
