title: 'Watch: Cannabis farm suspects dump phones on roof - BBC News'
date: '2023-05-20'
section: General
url: http://www.bbc.co.uk/news/uk-65656294
content: |-
  Two men attempt to hide their phones from West Yorkshire Police on the roof of a cannabis farm.

  Footage released by West Yorkshire Police shows the moment two men try to get rid of their mobile phones on the roof of a cannabis farm.

  The men were arrested and charged with possession of a class B drug after police found the large farm in the building.
