title: Massive explosion as Gaza high-rises destroyed by jets - BBC News
date: '2023-10-07'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67041495
content: |-
  The IDF says it struck military infrastructure belonging to senior Hamas terrorist organization operatives.

  Israeli warplanes have hit several buildings in the centre of Gaza City, including an 11-storey building called Palestine Tower.

  It houses Hamas radio stations on the rooftop and also holds a cinema.

  Israel has launched retaliatory strikes in the Gaza strip, officials there say, after an unprecedented assault into Israeli territory by Palestinian militants earlier on Saturday - follow the latest here.
