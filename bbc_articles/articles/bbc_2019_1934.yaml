title: MP Chris Williamson to be investigated in Labour anti-Semitism row - BBC News
date: '2019-02-27'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-47385108
content: |-
  Chris Williamson "deeply regrets" comments on extent of problem amid calls for him to be suspended.

  This video can not be played To play this video you need to enable JavaScript in your browser. Theresa May said Jeremy Corbyn should suspend Chris Williamson

  A Labour MP is to be investigated for remarks about the party's handling of anti-Semitism but will not be suspended amid a deepening row within the party.

  Chris Williamson claimed Labour had "given too much ground" in the face of criticism over the issue, remarks which he now says he "deeply regrets".

  Deputy leader Tom Watson criticised the "heavily caveated" apology and said stronger action was required.

  The MP remains a member of the party in Parliament during the investigation.

  Labour has put the MP under "formal notice of investigation" over a "pattern of behaviour" relating to the long-running row over anti-Semitism.

  The BBC's Vicki Young said the MP faced possible expulsion as the ultimate sanction but would remain a member of Labour's parliamentary party while the probe took place - a decision likely to anger many within the party.

  In footage published by the Yorkshire Post, Mr Williamson, who is a close ally of Jeremy Corbyn, told activists Labour had been "too apologetic" over anti-Semitism and was being "demonised as a racist, bigoted party".

