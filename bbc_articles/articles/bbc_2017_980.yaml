  • None Juan Mata has scored in three of his past four League Cup matches (two goals for Manchester United, one goal for Chelsea).
  • None All three of Henrikh Mkhitaryan's assists for Manchester United have been in the EFL Cup.
  • None Marouane Fellaini has scored his first League Cup goal since August 2013 (Everton v Stevenage).
  • None The Red Devils have progressed from all three of their previous League Cup semi-finals having won the first leg (1983 v Arsenal, 1991 v Leeds, 1994 v Sheffield Wednesday).
  • None United have won 12 and lost none of their past 13 matches against Hull City in all competitions (D1).
  • None The Red Devils have lost only one of their past 26 home League Cup games against fellow top-flight sides (W24 D1), losing 2-1 against Chelsea in January 2005.
  • None Hull have failed to score in each of their past four matches with United, losing three and drawing the other.

  What the papers say

  It's back to the Premier League for Manchester United as they take on Jurgen Klopp's Liverpool on Sunday (16:00 GMT) knowing a win could take them into the top five.

  Hull, meanwhile, host Bournemouth as they look to move off the bottom of the table. The Tigers have not won in the league since 6 November.
