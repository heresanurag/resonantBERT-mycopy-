title: Man Utd food hygiene rating cut after mouse droppings found - BBC News
date: '2024-12-24'
section: Manchester
url: http://www.bbc.co.uk/news/articles/ckg1v37ggy7o
content: |-
  The club said a "robust pest-control system" was in place and improvements were under way.

  The club is now working with the council to improve its standards

  The discovery of mouse droppings at Manchester United's Old Trafford stadium has led inspectors to downgrade the football club's food hygiene rating. Though no droppings were found in the actual kitchens, a council environmental health officer slashed the club's rating down from four to two out of five, following a visit in November. The club said a "robust pest-control system" was in place at the ground and included "multiple weekly checks" of all catering areas. Trafford Council said it was working closely with the club so "necessary improvements" were made.

  The Food Standards Agency rating scheme ranges from 0 (urgent improvement necessary) to 5 (very good). Manchester United's new score has seen it re-rated from good to "some improvement is necessary". About 250,000 people each season dine at Old Trafford on food prepared at the ground, according to the club. The club's pest-control teams were contacted soon after the rodents' droppings were discovered. "If incidences of this nature do occur, immediate and appropriate action is taken," the club said. The downgrade comes amid wider discussions about a new stadium for Manchester United, with the club expected to reveal its plans next year.
