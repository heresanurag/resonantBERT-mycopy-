  Ryoyu Kobayashi took Japan's first Olympic ski jumping gold in 50 years in the men's individual normal hill event. The 25-year-old started the final round at the top of the leaderboard, after scoring 145.4 with his first jump. He registered a score of 129.6 in the final round, finishing with 275.0 in total. Austria's Manuel Fettner took silver with 270.8 and Poland's Dawid Kubacki won bronze with 265.9.

  The men's downhill was not able to take place on Sunday because of the windy conditions at the Yanqing National Alpine Centre. The jury put back the start time from the original 03:00 GMT but it was eventually called off at 05:00 GMT (13:00 local). In a statement the organisers said the decision was taken "in the best interest of safety and fairness for the racers". They will try again at 04:00 GMT on Monday, sandwiched in between the two runs of the women's giant slalom.
