title: 'Winter Olympics: Zoi Sadowski-Synnott wins gold in women''s slopestyle final
  - BBC Sport'
date: '2022-02-06'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60276965
content: |-
  Zoi Sadowski-Synnott wins New Zealand's first Winter Olympics gold medal in the women's slopestyle final.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Zoi Sadowski-Synnott was jumped on by the women she beat after a sensational slopestyle run saw her win New Zealand's first Winter Olympics gold. The 20-year-old landed a huge 1080 spin with her final trick on the final run of the women's snowboard slopestyle competition to score a massive 92.88. "It was the best run of my life," she said. American Julia Marino, who had led, was the first to leap on Sadowksi-Synnott, recognising the brilliance of the run. Australia's Tess Coady, who claimed bronze, also joined in the celebration.

  Zoi Sadowski-Synnott is jumped on by Australia's Tess Coady and Julia Marino of the United States, who recognised the brilliance of her winning run

  The three medallists ended up in a heap on the floor in a wonderful show of sportsmanship after Sadowski-Synnott claimed the first of seven gold medals on offer on day two. She previously won bronze in the big air competition at Pyeongchang 2018. The Kiwi lauded the progression of women's snowboarding, saying: "It's been pretty crazy for years and you know what it's going to take to be on the top of the podium, but I owe it to all the other girls for pushing me. "It's going in the right direction and it's not really slowing down." Marino finished second on 87.68 points, while Coady took bronze on 84.15.

