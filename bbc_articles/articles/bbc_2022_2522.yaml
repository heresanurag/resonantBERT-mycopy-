  Sweden's Nils van der Poel set a new Olympic record when he secured his first gold medal in a blistering last lap in the men's 5,000m speed skating final. The world record holder was 0.99 seconds behind Patrick Roest of the Netherlands with just one lap remaining. But in a dramatic turn of events, Roest was bumped into silver medal position when Van der Poel clocked 28.8secs in his final lap and claimed gold. Hallgeir Engebraaten of Norway took bronze, with three-time champion Sven Kramer finishing sixth. Dutchman Kramer was hoping to add to an exclusive group of only six athletes who have won four Olympic gold medals in the same individual event, having already said he will retire later in 2022. Kramer said: "I knew it was going to be my last one. When I went to the rink, I knew this was the last time I would skate the 5,000m. That didn't work out the way I wanted. I tried to go for all or nothing."

