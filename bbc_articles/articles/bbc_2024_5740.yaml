title: Ferrari crashes into bike racks in Norwich city centre - BBC News
date: '2024-03-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-68598455
content: |-
  CCTV footage shows the sports car bouncing off the bike racks and mounting the opposite pavement.

  CCTV footage shows the moment a Ferrari driver lost control of his car and crashed it into bike racks and a planter.

  The accident happened on Rose Lane in Norwich just before 17:00 GMT on 17 March.

  No-one was injured but the road was closed whilst emergency services attended the scene.

  Norfolk Constabulary said no further action would be taken in relation to the collision.
