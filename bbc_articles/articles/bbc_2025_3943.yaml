title: Uninvited otter wreaks havoc in family kitchen - BBC News
date: '2025-03-16'
section: General
url: http://www.bbc.co.uk/news/videos/cdjymg2pjg4o
content: |-
  A family was surprised by the uninvited guest who wreaked havoc in their kitchen in Shetland.

  An otter was caught on camera causing chaos in the kitchen of a family in Shetland.

  Donna Mouat spotted the mammal outside her home in South Nesting while cooking dinner.

  The family went for a look, but the otter then dashed inside, and proceeded to knock things off shelves, and even went inside a wall-mounted kitchen cupboard.

  "It emptied a cupboard but other than that, there was nothing smashed or broken, remarkable really," Donna told BBC Scotland News.
