title: Americans freed in Russia prisoner swap land in US - BBC News
date: '2024-08-02'
section: World
url: http://www.bbc.co.uk/news/articles/cv2g2dx7d9wo
content: |-
  US President Joe Biden welcomed them off the plane at Joint Base Andrews in Maryland.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Biden, Harris and families greet freed prisoners on return to the US

  Three Americans who were freed in a prisoner swap deal with Russia, including Wall Street Journal reporter Evan Gershkovich, have arrived back on US soil. Mr Gershkovich, 32, was one of 16 people swapped for eight Russian prisoners in what has been described as the biggest exchange since the end of the Cold War between Russia and the West. The exchange at an airfield in Turkey also included the release of former US marine Paul Whelan and Russian-American journalist Alsu Kurmasheva. After touching down at Joint Base Andrews, in Maryland, Mr Gershkovich, Ms Kurmasheva and Mr Whelan emerged from the jet to cheers from those on the tarmac.

  US President Joe Biden watched on as Evan Gershkovich gave his mother Ella Milman a huge hug after disembarking at Joint Base Andrews

  All three were greeted by US President Joe Biden and Vice-President Kamala Harris before they embraced their families. They lingered on the tarmac for photographs and conversations before leaving the air base within an hour, as did Mr Biden and Ms Harris's motorcades. Speaking ahead of their return, Mr Biden welcomed their release and declared: "Their brutal ordeal is over." He praised the role played by America's allies, particularly Germany and Slovenia, and hailed the release of Mr Whelan, Mr Gershkovich and Ms Kurmasheva, as well as leading Kremlin critic Vladimir Kara-Murza, as a "feat of diplomacy". The three released Americans were then sent to the Brooke Army Medical Centre in Texas for a medical check-up.

  The deal had been more than 18 months in the making and appears to have hinged on Moscow's demand for the return of Vadim Krasikov, who was serving a life sentence in Germany for carrying out an assassination in a Berlin park. He is now back in Russia. Krasikov always maintained in captivity that the false identity he went under was real, but the Kremlin has admitted since his release that he was an agent with the FSB security service. In total, 24 people jailed in seven different countries were exchanged in Ankara, Turkey's presidency said. The prisoners were held in the US, Germany, Poland, Slovenia, Norway, Russia and Belarus, it said in a statement. Ten people, including two minors, were relocated to Russia, 13 prisoners to Germany, and three to the US, the statement added. The eight prisoners who returned to Russia were serving sentences on a variety of criminal charges in the West. Charges against the 16 held in Russia and Belarus included espionage and treason, but were generally considered by Western governments and rights organisations to be politically motivated. Of the 13 staying in Germany, most either have German citizenship or are former Russian political prisoners. The fate of the latter group seems unclear, as they have in effect been expelled from Russia. At least one of them, Ilya Yashin, has said in the past he did not want to be involved in a swap. Another, Andrei Pivovarov, was due to be released within Russia in September after completing his sentence, his mother told the Insider website in an interview. Oleg Orlov, 71, is a veteran Russian human rights campaigner and a founder of the long-standing and recently banned Memorial organisation. The 13 also seem to include Mr Kara-Murza, who has dual UK-Russian citizenship and is resident in the US. It is thought he may return to the US separately.

  This image released by the White House shows Evan Gershkovich, left, Alsu Kurmasheva, right, and Paul Whelan, second from right, and others onboard a plane after their release from Russian captivity

  In Russia, President Vladimir Putin personally greeted the Russians released from Western jails with bouquets of flowers at Moscow's Vnukovo Airport. He embraced them warmly on a red carpet and said they would be given state awards. Among those returned to Moscow in addition to Krasikov was a Russian couple, convicted of spying in Slovenia, who returned to Russia with their two children.

