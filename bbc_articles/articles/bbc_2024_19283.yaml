  German citizen Rico Krieger, who was sentenced to death in Belarus before being pardoned by the country's leader Alexander Lukashenko earlier this week, has also been released. Earlier prisoner swap discussions had included jailed Russian opposition leader Alexei Navalny, but the offer collapsed when he died in unclear circumstances in an Arctic penal colony in February. His widow Yulia Navalnaya welcomed the swap, describing it as a "joy". Three of the released dissidents were former regional leaders of Navalny's anti-corruption network, now branded extremist in Russia. Mr Yashin was also a close associate.

  Journalist Alsu Kurmasheva, detained in Kazan in October 2023, smiles between her daughters

  The exchange comes after days of speculation about a major swap between various countries, which increased after several dissidents and journalists jailed in Russia were moved from their prison cells to unknown locations. Although secret prison transfers are common in Russia, the multiple disappearances of well-known prisoners was unusual. The last high-profile prisoner swap took place in December 2022, when US basketball star Brittney Griner was exchanged on the tarmac at Abu Dhabi airport for notorious Russian arms dealer Viktor Bout, who had been held in an American prison for 12 years. The last comparable one occurred in Vienna in 2010, when 10 Russian spies held in the US were swapped for four alleged double agents held in Russia. One of them was Sergei Skripal, a former military intelligence officer, later poisoned by nerve agent Novichok in Salisbury in 2018. Tensions between Moscow and the West have been high in recent years, especially since the Russian invasion of Ukraine in February 2022. And Chatham House expert James Nixey told the BBC that while this was a rare good day in relations and a victory for diplomacy, it should not be seen as Russia showing its "softer side". It merely showed that Russia was determined to get its own people back, whatever crimes they had committed, he said. "From the Kremlin point of view, it merely confirms that hostage-taking and extortion is a successful tool in its wider geopolitical struggle," he added.
