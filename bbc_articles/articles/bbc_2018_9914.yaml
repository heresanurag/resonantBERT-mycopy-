title: Stolen Seattle plane seen flying erratically - BBC News
date: '2018-08-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45154357
content: |-
  "What is going on?", say residents as they watch a stolen passenger plane tailed by fighter jets.

  Residents in the US state of Washington capture footage of a plane that had been stolen from Seattle-Tacoma international airport.
