  "These attacks are yet again more examples of how criminal groups seek to control communities through fear and violence."

  The Western Trust said both men were in a stable condition at Altnagelvin hospital in the city.

  "There can be no place for the use of guns or gangs of masked men on the streets of our city," he said.

  "All of this is in stark contrast to the good work that is going on in this community."
