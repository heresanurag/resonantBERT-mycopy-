id: bbc_2019_3413
title: 'SpaceX: Dragon capsule splashes down after ISS mission - BBC News'
date: '2019-03-09'
section: General
url: http://www.bbc.co.uk/news/science-environment-47493572
content: |-
  SpaceX's capsule has splashed down after a week-long test mission to the International Space Station.

  SpaceX's Dragon capsule has returned to Earth, touching down in the Atlantic Ocean at 08:45 EST (13:45 GMT).

  The test craft was part of SpaceX's efforts to prove the viability of using commercial craft to send American astronauts to the International Space Station (ISS).

  Engineers from SpaceX will now pore over the data collected by the craft's onboard dummy, named Ripley, with a flight using real astronauts planned for no earlier than July.
