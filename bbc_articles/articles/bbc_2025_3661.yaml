title: Five Star singer Stedman Pearson dies aged 60 - BBC News
date: '2025-03-14'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5y9xvg2125o
content: |-
  In a statement, Pearson's family confirmed he was being treated for diabetes and was on dialysis.

  Stedman Pearson was part of the group Five Star along with his siblings

  Stedman Pearson from the British pop group Five Star has died at the age of 60, his family has announced. Pearson, who died on Monday, had diabetes and was on dialysis treatment, his sister Deniece said. Stedman and Deniece were members of the band along with their siblings Lorraine, Doris and Delroy. Their matching outfits and synchronised dance routines meant they were seen by some as a British answer to The Jackson 5.

  Five Star also known as 5 Star consisted of Lorraine, Deniece, Stedman, Doris and Delroy Pearson, seen in 1986

  In a statement, his family said: "He was a gentleman to the very end – in every way and an amazing son, brother and uncle. "May the memories and love he gave to us and the world be our greatest comfort. He will be deeply missed." Five Star released their debut album Luxury of Life in 1985, followed by Silk and Steel in 1986, which went to number one. The group had six top 10 singles in the UK charts, including System Addict, Can't Wait Another Minute and Rain or Shine. The five siblings won a Brit Award in 1987 for best British group. The band initially broke up in 1995 but began performing together again in 2001. They came together for another reunion in 2012, and, after Lorraine's departure, continued as a four-piece until 2016. Stedman also made TV appearances in 2006 and 2008 - first on Channel 5's The All Star Talent Show and later on BBC Three's Celebrity Scissorhands. The singer, who was from Romford in Essex, was the eldest of the five siblings. His band were formed by their dad Buster Pearson in 1983, who was also a singer.
