  While securing a mortgage is one thing, buyers also need to act relatively quickly when it comes to finding a new home, data suggests. Homes in England and Wales spend an average of 36 days on the market before a sale is agreed, according to news figures from the property portal Zoopla. Sales were agreed on half of homes within two months of being listed, it said. To complete a sale, sellers and buyers will typically need another four to six months, depending on the complexity of the transaction. The fastest sales were agreed for two-bedroom homes, at an average of 23 days, while homes with four bedrooms or more typically took an extra 15 days. Homes in northern regions of England tended to sell faster than homes in the south, where prices are higher, it said. Even so, the fastest selling, with an agreed sale taking an average of 19 days, had a north-south mix, with Manchester and the London borough of Waltham Forest hitting that mark. "Households that are thinking about listing their home and moving in 2025 need to set their asking price at the right level and take the advice of local agents," said Richard Donnell, executive director at Zoopla. "Buyers have a lot more choice of homes for sale than a year ago. Aiming too high on the asking price is likely to impact saleability and how long you may have to wait to agree a sale." Zoopla uses a median average figure (the mid-point) for its data. It also discards homes that have been listed for more than six months, as it considers them to be unlikely to sell.

