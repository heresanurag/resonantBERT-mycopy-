  Greece's Ministry of Maritime Affairs and Insular Policy told the BBC the footage is currently being investigated by the country's independent National Transparency Authority. An investigative journalist we spoke to based on the island of Samos says she began chatting with a member of the Greek special forces via the dating app Tinder. When he rang her from what he described as a "warship", Romy van Baarsen asked him more about his work - and what happened when his forces spotted a refugee boat. He replied that they "drive them back", and said such orders were "from the minister", adding they would be punished if they failed to stop a boat. Greece has always denied so-called “pushbacks” are taking place. Greece is an entryway into Europe for many migrants. Last year, there were 263,048 sea arrivals in Europe,, external with Greece receiving 41,561 (16%) of those. Turkey signed a deal with the EU in 2016 to stop migrants and refugees crossing into Greece, but said in 2020 it could no longer enforce it.

  Journalist Romy van Baarsen was told by a Greek special forces member that they are under government instruction to drive the boats back

  We put the findings in our investigation to the Greek coastguard. It replied that its staff worked "tirelessly with the utmost professionalism, a strong sense of responsibility and respect for human life and fundamental rights", adding that they were "in full compliance with the country's international obligations". It added: "It should be highlighted that from 2015 to 2024, the Hellenic Coast Guard has rescued 250,834 refugees/migrants in 6,161 incidents at sea. The impeccable execution of this noble mission has been positively recognized by the international community." The Greek coastguard has previously been criticised for its role in the biggest migrant shipwreck in the Mediterranean for a decade. More than 600 people are feared to have died after the Adriana sank in Greece’s demarcated rescue area last June. Greek officials have insisted the boat was not in trouble and was safely on its way to Italy, and so the coastguard did not attempt a rescue.
