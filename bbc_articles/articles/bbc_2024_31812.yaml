  Former Manchester United defender Rio Ferdinand recalls the time Sir Alex Ferguson made Cristiano Ronaldo cry.

  Former Manchester United defender Rio Ferdinand recalls the time legendary manager Sir Alex Ferguson was so angered by the performance of Cristiano Ronaldo that he brought the Portuguese forward to tears.

