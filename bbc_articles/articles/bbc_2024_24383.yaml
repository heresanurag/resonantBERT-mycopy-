title: 'Apollo Quiboloy: Fugitive pastor arrested for sex crimes - BBC News'
date: '2024-09-09'
section: Asia
url: http://www.bbc.co.uk/news/articles/c75npd1xw9qo
content: |-
  Apollo Quiboloy is charged with child sex trafficking in the US and in the Philippines.

  Mr Quiboloy pictured in an orange prison shirt in the capital Manila, where he is currently detained

  An influential Filipino pastor wanted in the Philippines and the US for child sex trafficking has been arrested, ending a two-week long standoff between police officers and his followers. Police have been attempting to arrest Apollo Quiboloy, who claims to be the "Appointed Son of God", in a raid on his sprawling church compound. Violent scuffles broke out between thousands of his followers and anti-riot police officers, with one church member dying of a heart attack during the raid. Mr Quiboloy, whose Kingdom of Jesus Christ (KOJC) claims to have seven million followers, has denied all charges against him.

  In 2021, the US Department of Justice (DOJ) charged Mr Quiboloy with sex trafficking of children, fraud and coercion and bulk cash smuggling. The US Federal Bureau of Investigation (FBI) said he trafficked girls and women from the Philippines to the US, where they were forced to solicit money for a bogus charity. He also required his female personal assistants, who are called “pastorals”, to have sex with him, the FBI said. But as all this was happening, Mr Quiboloy was rising to national prominence under then-president Rodrigo Duterte, previously serving as spiritual adviser to the former leader. However, his fortunes turned when Mr Duterte stepped down in June 2022. Filipino authorities soon charged him with child abuse, sexual abuse and human trafficking and a warrant was issued for his arrest.

  For two weeks , thousands of policemen have been engaged in a standoff with Mr Quiboloy's followers, as they raided his 30-hectare (75-acre) KOJC compound in Davao. They said Mr Quiboloy was hiding in an underground bunker based on the sound of heartbeats detected by surveillance equipment. The complex is home to some 40 buildings, including a cathedral, a school and even a hangar. Interior Minister Benhur Abalos said on Monday that Mr Quiboloy was found inside the compound's bible school. He also said that the pastor was arrested and did not surrender, contrary to earlier reports. Witnesses provided important information that led to his arrest, added Mr Abalos. Mr Quiboloy's lawyer, Israelito Torreon, said earlier said his client surrendered "because he does not want the lawless violence to continue to happen".

  For two weeks, Mr Quiboloy's followers figures in a standoff with the authorities

  The regional police chief, Brig Gen Nicolas Torre, said a "concerted effort of everyone involved" led to the arrest. Mr Quiboloy and four others who were arrested with him were flown to national police headquarters in the capital Manila where they are currently detained. Before his arrest, Mr Quiboloy said that the "devil" was behind his legal woes. He has also said that he does not want the FBI to "meddle" in his case. Speaking to reporters on Monday, Mr Marcos said the Philippines was not considering extraditing Mr Quiboloy for now.

  The standoff at the KOJC has taken place as a very public falling out between the Marcos and Duterte political families has unfolded. The US DOJ sought his arrest a few months before Mr Duterte handed power to current President Ferdinand Marcos Jr, but it was only during Mr Marcos' term that authorities started pursuing the pastor. While Mr Quiboloy was in hiding, Mr Duterte said he knew where he was but would not tell the police.

  Mr Quiboloy set up the KOJC in Davao in 1985, after hearing God whisper to him “I will use you” while attending an event by American pastor Billy Graham in South Korea in 1973, says the organisation. When he is not in Davao, he has been seen travelling on his private jet. He delivers his sermons from a glass podium that is set against giant photographs of his lush hilltop estate called the “Garden of Eden Restored”. These are broadcast on his own TV, radio and social media network. Outside of his long-standing ties with the Duterte's, Mr Quiboloy grew his political influence by endorsing candidates to his followers during elections, a common practice for religious leaders in the country where politics is based on patronage instead of ideology.

  Apollo Quiboloy claims to be the "Appointed Son of God"
