title: 'Coronavirus updates as they happened: Johnson says Dominic Cummings acted
  responsibly - BBC News'
date: '2020-05-24'
section: World
url: http://www.bbc.co.uk/news/live/world-52787969
content: |-
  The UK prime minister has come under pressure from some of his MPs to sack adviser Dominic Cummings.

  Self-isolation advice has 'in no way changed' - Johnson

  Charlie Cooper of Politico asks if rules have changed to allow anyone with symptoms who has concerns about childcare to travel to another home. "That is, that if you have symptoms then you should self-isolate for 14 days - and that's what Mr Cummings and his family did." The PM asks for the next question. But the reporter returns asking for further clarification. The advice makes it "absolutely clear" that childcare has to be "taken into account", Johnson says. He says the Cummings family may have needed childcare help if they were both taken ill, adding "as it happened that was not necessary". "I think it was a real risk and I think it was responsible of Dominic Cummings to see the risk to his family... and to take steps to avert it. "That in no way changes the guidance or the advice", he adds.
