title: 'Trump TPS decision: A Salvadorean driver reflects on uncertain future - BBC
  News'
date: '2018-01-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42626891
content: |-
  About 200,000 Salvadoreans in the US under a temporary permit called TPS have 18 months to leave.

  Juan Cortez is one of 200,000 Salvadoreans in the US under temporary protection status. But the Department of Homeland Security says it will not be renewed.
