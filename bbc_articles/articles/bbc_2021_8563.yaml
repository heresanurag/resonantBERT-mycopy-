title: 'Bernadette Walker: Scott Walker guilty of murder - BBC News'
date: '2021-07-26'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-57931813
content: |-
  Scott Walker murdered Bernadette Walker, 17, and her mother Sarah helped cover up the killing.

  Bernadette Walker was killed by the man she called "Dad", prosecutors said

  A man has been found guilty of murdering a teenage girl who called him her father, after she claimed he had sexually abused her.

  Bernadette Walker, 17, told her mother Sarah in July 2020 that Scott Walker had been abusing her "over a number of years", Cambridge Crown Court heard.

  Bernadette is presumed dead but her body had never been found.

  Walker, 51, and ex-partner Sarah Walker, 38, were both convicted of perverting the course of justice.

  Bernadette was last seen when Scott Walker collected her from his parents' home in Peterborough.

  The trial had heard he and Sarah Walker formed an "unholy alliance" to cover up her death.

  Scott Walker has been found guilty of murdering Bernadette Walker

  Just two days before she was last seen, Bernadette claimed Scott Walker had sexually abused her for years

  When the jury delivered its verdict on Scott Walker's murder charge, Sarah Walker wailed loudly "no, no, she's not dead" and the hearing was paused for a brief time before the jury were sent back to finish deliberating verdicts against her.

  Sarah Walker had already admitted two counts of perverting the course of justice by sending messages from Bernadette's phone after she was last seen alive and by providing false information to the police relating to her disappearance.

  Later she was found guilty by majority verdicts of two other counts of perverting the course of justice "knowing or believing" Bernadette to be dead.

