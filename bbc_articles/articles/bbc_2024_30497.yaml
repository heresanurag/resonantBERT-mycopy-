content: |-
  A woman, 76, and a man, 18, have been arrested in connection with the attack near Folkestone.

  Two held as baby hurt in suspected XL bully attack

  Police were called to Siskin Close on Wednesday afternoon

  Two people have been arrested after an eight-month-old baby was seriously injured by a dog in Kent. Police were called to Siskin Close in Hawkinge, near Folkestone, at about 14:25 GMT on Wednesday following a report that an infant had been bitten by a dog, reportedly an XL bully. The baby girl was airlifted to a London hospital where she remains in a serious condition, police said. A 76-year-old woman and an 18-year-old man have been arrested on suspicion of being in charge of a dog dangerously out of control.

  The dog was seized and destroyed at the family home. One family member told the BBC the dog, named Hunter, had never shown any form of aggression and that the attack was out of character. "For the dog to do what he did, for me, was totally out of the blue," he said.

