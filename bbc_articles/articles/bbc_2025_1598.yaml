content: |-
  Former captain Jamie George has re-joined England's squad ahead of their second Six Nations match against France at Allianz Stadium on Saturday.

  Former captain Jamie George has re-joined England's squad before their second Six Nations match against France at Allianz Stadium on Saturday.

  Having recently been replaced as skipper by Maro Itoje, George was not included in the initial Six Nations squad after picking up a hamstring injury during Saracens' defeat by Castres in January.

  The 34-year-old hooker has recovered and will be in full training next week and is the only change to Steve Borthwick's squad.

  Borthwick's side were defeated 27-22 by Ireland in Dublin in their opening Six Nations game on Saturday.

  France, who top the Six Nations after hammering Wales in their opening game, condemned England to their heaviest home defeat on their last visit to Twickenham.

  "Our role is to learn from it [the Ireland defeat] and build and get better," said Itoje.

  "There were large parts of our game in which I think we took a step forward. The energy we had on the field, the vibrancy to our attack, and the way the guys were attacking and flooding through holes I thought was very admirable."
