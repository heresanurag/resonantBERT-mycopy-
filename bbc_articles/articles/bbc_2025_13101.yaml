title: 'Jobe Bellingham: Borussia Dortmund confident of signing Sunderland midfielder
  - BBC Sport'
date: '2025-06-03'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cwy6x76x6x2o
content: |-
  Borussia Dortmund are confident of completing the signing of Sunderland midfielder Jobe Bellingham. The 19-year-old has been the subject of major interest across Europe having helped Sunderland return to the Premier League for the first time since 2017. However, the German club believe they are now in pole position to secure Bellingham's signature. They are yet to open talks with Sunderland but have received strong indications Bellingham wants to follow in his brother Jude's footsteps by joining them and believe an agreement will eventually be reached. Dortmund's bargaining position has been strengthened considerably by a strong end to the season. With eight games left, Dortmund were 11th in the Bundesliga, 10 points adrift of a top-four spot. They won seven of their remaining matches, and drew the other at eventual champions Bayern Munich, to finish fourth and secure a place in next season's Champions League.

  Dortmund signed Jude Bellingham from Birmingham City in 2020 and he made 132 appearances in a three-year stint with the club, winning the German Cup alongside Erling Haaland and Jadon Sancho in 2021. However, he missed out on the Bundesliga title immediately before joining Real Madrid in 2023. He was injured and watched the team draw with Mainz on the final day of the 2022-23 season, when victory would have seen Dortmund crowned champions for the first time in 11 years. Jobe Bellingham was named the Championship's Young Player of the Year last month - five years after Jude won the award. He was also named in the Championship team of the season before helping Sunderland beat Sheffield United in the Championship play-off final.

