title: 'General election: Fifth Tory politician in betting probe - BBC News'
date: '2024-06-25'
section: Wales
url: http://www.bbc.co.uk/news/articles/clkkyx9rxzzo
content: |-
  A Conservative in the Welsh Parliament is the latest to face inquiries by the Gambling Commission.

  Russell George has been Conservative Member of the Senedd (MS) for Montgomeryshire since 2011

  A Conservative politician in the Welsh Parliament is being investigated over a bet on the timing of the general election. Russell George was the fifth Conservative unveiled as facing inquiries by the Gambling Commission. It comes on the same day the Conservatives withdrew their support for two general election candidates, including Mr George's colleague Craig Williams, who is standing in the newly-named constituency of Montgomeryshire and Glyndŵr. Mr George, whose seat is Montgomeryshire, said he will co-operate fully with the commission, and has "stepped back" from the Senedd's Conservative frontbench. BBC Newsnight has learned up to 15 Conservative candidates and officials are being looked at by the Gambling Commission over alleged betting on the timing of the general election. It is understood the regulator will be carrying out interviews this week.

  Meanwhile, a former Labour parliamentary candidate was suspended by his party after he said he made a "stupid error" in betting he would lose his bid to become an MP. Labour, Plaid Cymru and Reform called for Mr George to be suspended from the Conservative Senedd group. He is the second Welsh Conservative to leave the Welsh Tory frontbench in the last month, after Laura Anne Jones was stripped of her spokesperson role in an expenses row. Mr Williams, who had been a parliamentary aide to Prime Minister Rishi Sunak, was the first Tory to admit he had placed a bet on the timing of the election. The BBC's political editor Chris Mason reported that Mr George’s bet, placed online for a July election, was placed more than a week before the election was called and neither man was aware of the other’s bet. It is not known how much Mr George bet or what the odds were. Mr George and Mr Williams share a constituency office in Welshpool. Earlier on Tuesday Mr George had called on voters to back his colleague Mr Williams despite the decision by the Conservatives to withdraw the party's support. He said at the time: "It may seem old fashioned, but I believe in innocent until proven guilty."

  Craig Williams has said he "committed an error of judgment, not an offence"

  Mr George's constituency was also represented by Mr Williams in Westminster before the dissolution of the UK parliament. He had been the party's spokesman for mid Wales on the Conservative frontbench. In a statement issued after The Guardian, external broke the story, Mr George said: "Whilst I will cooperate fully with the Gambling Commission, it would not be appropriate to comment on this independent and confidential process. "Doing so would only jeopardise and undermine the investigation. It is the Gambling Commission, not the media, that has the responsibility, powers and resources to properly investigate these matters and determine what, if any, action should be taken. "I have stepped back from the shadow cabinet while the investigation is ongoing. I have done this as I do not wish to be an unnecessary distraction to their work."

  Andrew RT Davies, Welsh Conservative leader in the Senedd, said Mr George had informed him he had "received a letter from the Gambling Commission regarding bets on the timing of the general election". Mr Davies added: “All other members of the Welsh Conservative [Senedd] group have confirmed that they have not placed any bets." Welsh Labour campaign chair Jessica Morden said: "It took Rishi Sunak almost two weeks to take action on one of his Conservative candidates. "How long will it take Andrew RT Davies to suspend Russell George?" Plaid's Mabon ap Gwynfor said: “You couldn't make this up. Hours after backing dropped candidate Craig Williams after another betting scandal, Russell George is found to have done the exact same thing. “He should have the whip withdrawn from the Welsh Conservative Senedd group at once." Reform's Oliver Lewis, who is standing in Montgomeryshire and Glyndŵr, claimed the Conservatives were suffering "institutional rot", adding: "We demand the Welsh Conservative whip be removed from Mr George pending conclusion of the investigation." A spokesperson for the Welsh Liberal Democrats said: "Time and time again we have seen the Conservatives more in scandal while the issues facing the country get worse." "Across Mid Wales we are the clear challengers to unseat the Conservatives," they added.

  Earlier on Tuesday the Conservatives confirmed they had withdrawn support for Mr Williams and Laura Saunders, the candidate for Bristol North West. Both will appear on ballot papers, but could become independent if elected, pending the result of an investigation. Two members of Conservative staff have also taken leaves of absence from their roles after it emerged they were being looked into by the Gambling Commission. In a video statement posted to X, Mr Williams said he remained committed to the election. He said he had "committed an error of judgment, not an offence" adding: "I want to reiterate my apology directly to you." "I am fully co-operating with routine inquiries from the Gambling Commission and I intend to clear my name," he said. Last week, a spokesperson for Ms Saunders said she would be co-operating with the Gambling Commission and had nothing further to add. You can find a full list of candidates for the Montgomeryshire and Glyndŵr and Bristol North West constituencies on the BBC News website.
