  Maeda can face Bayern Munich as Celtic win bid to reduce ban

  Daizen Maeda has scored six goals in his past three matches for Celtic

  Celtic winger Daizen Maeda is free to face Bayern Munich in Wednesday's Champions League play-off first leg after a two-match ban was reduced. The Japanese international was sent off for kicking out at an opponent in the win over Young Boys and missed the following defeat at Aston Villa. Celtic lodged an appeal against the initial punishment and broke the news of their success on Monday evening. Maeda, 27, has scored 21 goals for Celtic this season, including a hat-trick in Saturday's Scottish Cup win over Raith Rovers.
