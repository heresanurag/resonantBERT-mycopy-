title: 'Jay Slater: Snapchat footage reveals teenager''s final hours in Tenerife -
  BBC News'
date: '2025-05-23'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cdd2z841g86o
content: |-
  The teenager, who was found dead in the Spanish island, made Snapchat videos the day he went missing.

  To play this video you need to enable JavaScript in your browser. This video can not be played Jay Slater's unseen videos were released during his inquest hearing

  Jay Slater captured some of his final hours in Snapchat videos sent to friends, a court heard. The 19-year-old was found dead at the bottom of a Tenerife ravine on 15 July 2024 after having disappeared in the early hours of 17 June. An inquest at Preston Coroner's Court was adjourned on Wednesday after a plea from his mother to seek key witnesses to events leading up to his death on the Spanish island. The footage, released during the hearing, includes clips taken by Mr Slater in the back of a car and one in an area of mountains in the early morning of 17 June.

  One short clip showed him in the back of a car heading for an AirBnB in the remote village of Masca, about 22 miles (36km) away from where he was staying. Another shows a view of mountains, which the inquest heard Mr Slater sent to friend Joshua Forshaw, saying that it was taken between 05:50 and 07:20 that day.

  A video was also released showing the search for Mr Slater following his disappearance

  His mother Debbie Duncan had pleaded with senior coroner at the inquest Dr James Adeley to find two men who may have had vital information about his final moments. Ayub Qassim and Steven Roccas were renting the AirBnB property in the village of Masca where Mr Slater had travelled earlier that morning. Dr Adeley had told the court the Metropolitan Police had tried to find the two men in London to serve them with witness summons, but they could not be located. Ms Duncan said in court: "How can we ever get any understanding? "There's things we want to question. "We want these people to be sat in front of us, because our son went on holiday and didn't come back, so there's questions we need to ask." Dr Adeley agreed to adjourn the inquest for fresh attempts to find the two men despite the "difficulties" so far. He told Miss Duncan: "In view of your distress we will make attempts to find them using whatever means we can."

  The disappearance of Jay Slater sparked a month long period of intense publicity on both mainstream and social media

  Apprentice bricklayer Mr Slater, of Oswaldtwistle, Lancashire, was found by Spanish police in a remote national park around three hours walk from Masca after a 29 day search. He had suffered severe head injuries consistent with a fall from height. According to toxicology reports and his own messages to friends, Mr Slater had been under the influence of drugs and alcohol with traces of MDMA, cocaine and ketamine in his system when he died - although it was not clear how long before his death he had taken them. Friends of Mr Slater had previously reported him getting into a car with two men, understood to be Mr Qassim and Mr Roccas, in the nightlife hotspot of Playa de las Americas where he had been attending the NRG music festival.

  Jay Slater was on his first holiday abroad without his parents when he went missing

  The inquest heard local man Ramon Hernandez had recalled meeting Mr Slater on the morning of 17 June in Masca as he and a friend were on their way to work. They said Mr Slater asked if a bus or taxi would take him to Los Cristianos where he had been staying, and they told him the next bus was due at 10:00 and the area did not have a taxi service. He was last heard from at about 08:30 BST that morning when he called his friend Lucy Law, who he told he was lost and had 1% battery on his phone before the call cut out. The inquest had also heard from Det Ch Insp Rachel Higson, head of digital media investigations at Lancashire Police. She said she had examined Mr Slater's phone and said it had recorded "a lot of steps and inclines". Dr Richard Shepherd, a consultant forensic pathologist, told the court Mr Slater's cause of death was likely severe head injury. He said in his opinion there were no injuries consistent with an assault or suggesting he had been restrained against his will. The inquest is expected to resume later this summer on a date to be set.

