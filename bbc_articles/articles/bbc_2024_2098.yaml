title: 'Los Angeles: Helicopter crew rescues man from surging river - BBC News'
date: '2024-02-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68214577
content: |-
  The man entered the water to save his dog after it was swept away. The dog managed to swim to safety.

  A man has been saved from surging waters in the Los Angeles river, after a helicopter crew came to the rescue.

  In video shared by the Los Angeles Fire Department, the man can be seen being hoisted from the fast moving water, before being flown to a hospital.

  The man had entered the water to save his dog after it had been swept away, but got into trouble himself.

  The dog managed to swim to safety.
