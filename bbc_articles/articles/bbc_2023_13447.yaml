title: 'Manchester: Workman dies as wall collapses at house - BBC News'
date: '2023-09-17'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-66833770
content: |-
  A man in his 40s died despite efforts of emergency service workers to save him

  Inquiries into the "workplace accident" at the house are "ongoing", say police

  A workman died when a wall collapsed at a house in Manchester.

  Police, fire and ambulance services all attended the "workplace accident" in Lloyd Street, Fallowfield, at about 14:50 BST on Saturday.

  Attempts were made to save the man, who was in his 40s, but he died at the scene.

  A spokesman for Greater Manchester Police said officers were called to "reports of concerns for welfare of a man" at an address.

  "It was established that a man in his 40s was involved in a workplace accident and despite the best efforts of emergency services, he was sadly pronounced dead at the scene," the spokesman added.

  "Enquiries are ongoing at this stage."

  The Health and Safety Executive confirmed it had been made aware of the incident and said it was "liaising with police and making initial enquiries into the circumstances".

