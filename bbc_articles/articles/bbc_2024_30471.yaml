  During the sentencing hearing, the court heard that Tai Yasharahyalah had been attacked twice in the week since he was imprisoned after being found guilty, including an assault in a holding cell while on his way to Thursday's hearing. During the trial, jurors were told the couple were evicted from their Birmingham home in March 2022 before police found their son's body in December that year. After he was exhumed, Abiyah was found to have been in a severely malnourished state and suffered from a list of other health problems at the time of his death.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tai and Naiyahmi Yasharahyalah were arrested at a caravan in Somerset

  Post-mortem tests failed to ascertain the cause of Abiyah's death, but experts were able to say that if the three-year-old died from a respiratory illness, as described by his parents, the effects of malnutrition would have been a "more than minimal" cause of his death. Both parents had denied neglect, causing or allowing the death of a child and perverting the course of justice.

  A sign on the front door of their couple's home in Handsworth, Birmingham

  During the trial, the court heard that Tai Yasharahyalah had styled himself as the head of a fictional country for which the couple made their own passports. The couple claimed to have renounced their citizenship and he was called "King" by his wife and her family for a period of time. Tai Yasharahyalah, a former medical genetics student before quitting the field, invented his own laws, and claimed to have established his own kingdom. Their beliefs saw them eat a restrictive vegan diet, which saw all members of the family fall into a state of malnutrition. Mr Justice Wall said the couple cared more about their beliefs than the welfare of their child. "Your motivation for acting as you did was your prioritisation of your distorted system of beliefs over their welfare," he said. "You were prepared to live with any consequences which flowed from your adherence to these beliefs, including the disability or death of the children."

