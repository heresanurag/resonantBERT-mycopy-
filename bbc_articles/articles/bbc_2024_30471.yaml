title: Parents who caused death of buried Birmingham boy jailed - BBC News
date: '2024-12-12'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/ce902vk42d5o
content: |-
  Abiyah Yasharahyalah, three, had a "catalogue of injury and disease" when he died, a judge says.

  Tai and Naiyahmi Yasharahyalah were found guilty of causing or allowing the death of a child after a trial

  A couple whose severely malnourished son's body was found buried in the garden of their former home have been jailed. Three-year-old Abiyah's body was found behind a house in Birmingham, nine months after Tai and Naiyahmi Yasharahyalah's, 42 and 43, had been evicted from the property. Last week, the pair were were found guilty of causing the death of Abiyah, whose body was found at the house in Clarence Road, Handsworth. Tai Yasharahyalah was jailed for 24-and-a-half years and Naiyahmi Yasharahyalah was given 19-and-a-half years at Coventry Crown Court on Thursday.

  During an eight-week trial, the court heard that the couple lived off grid and created their own bespoke belief system based on a mixture of elements that drew from New Age mysticism and West African religion.

  Abiyah Yasharahyalah would have been about three years and nine months old when he died

  After the death of Abiyah, they kept his body inside their home for eight days, before embalming the body using frankincense and myrrh prior to a ritualistic burial in their garden. Sentencing, Mr Justice Wall their son died "as a result of your wilful neglect of him." He said the three-year-old had a "catalogue of injury and disease" at the time of his death. The couple heard that the judge believed they both realised how unwell their son was prior to his death. "I am sure that each of you played a part in starving him and failing to get medical care for him when the need for it was obvious to you," he said. "When Abiyah died you did not call an ambulance or seek any medical assistance in the hope that his life could be saved. "Instead you took his body into the back garden and there buried it."

