  Joe Biden and Kamala Harris will be barnstorming the battleground state on Sunday and Monday.

  What does the surge in early voting tell us?

  The massive surge of early in-person and mail voting in the 2020 general election is tangible evidence that interest and enthusiasm in the presidential race has translated into actual ballots cast. That should come as good news for Democrats, who may have wondered whether a supposed lack of excitement over Joe Biden’s candidacy would damp down turnout on their side. Whether the Delaware Democrat has surprising devotion from his party’s faithful or the prospect of four more years of a Trump presidency is too abhorrent for them to contemplate, the end result is the same – registered Democrats voted early in record-breaking numbers. Four years ago, Hillary Clinton’s campaign celebrated encouraging early voting numbers as well, particularly in Florida. On election day, however, an unexpected wave of support for Donald Trump erased that advantage. This time around, that phenomenon could be even more pronounced, given the president’s calls for his side to vote in-person instead of by mail. That would create its own set of problems if the race is close and overwhelmingly Democratic postal ballots take longer to count than in-person Republican ones. For the moment, however, higher civic involvement is something both sides can celebrate.
