  Newcastle to see fourth Marc Guehi rejected by Crystal Palace, Fiorentina eye Manchester United's Victor Lindelof, Arsenal close in on Mikel Merino, plus more.

  Newcastle face another setback in their pursuit of Crystal Palace defender Marc Guehi, Chelsea and Atletico Madrid plan more talks over deals for Conor Gallagher and Joao Felix, Fiorentina want to sign Victor Lindelof from Manchester United. Crystal Palace are set to reject a fourth bid worth around £65m plus add-ons from Newcastle for 24-year England centre-back Marc Guehi. (Sky Sports), external Newcastle are not ready to walk away from a deal for Guehi just yet but the club are considering their options. (, externalThe I, external), external An alternative target could be Chelsea's 25-year-old English defender Trevoh Chalobah who is admired by Newcastle boss Eddie Howe. (Talksport), external Palace have agreed personal terms with French centre-back Maxence Lacroix, 24, and are pushing for a deal with his club Wolfsburg. (Sky Germany - in German), external Newcastle could land Chelsea winger Noni Madueke for £30million but want to take the 22-year-old on loan in the first instance. (Football Insider), external Chelsea will hold a fresh round of talks with Atletico Madrid over the weekend as the two clubs look to break the deadlock over deals for England midfielder Conor Gallagher and Portugal forward Joao Felix, both 24. (Telegraph - subscription required), external Negotiations between Arsenal and Real Sociedad over a move for 28-year-old Spain midfielder Mikel Merino are in their final stages and will continue over the weekend. (Fabrizio Romano), external Merino is set to be left out of Real Sociedad's squad for their La Liga opener against Rayo Vallecano on Sunday as the finishes touches are put to the deal. (Marca - in Spanish), external
