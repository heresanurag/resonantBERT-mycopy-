title: Emily in Paris star Lily Collins welcomes first child - BBC News
date: '2025-02-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/c0m1kz92gpyo
content: |-
  The actress thanked her "incredible" surrogate as she announced her daughter's birth on social media.

  Emily in Paris star Lily Collins has welcomed her first child via surrogacy. The actress, 35, shared the news in a joint message on Instagram, external with husband, film director Charlie McDowell. "Welcome to the centre of our world Tove Jane McDowell," the pair wrote. "Words will never express our endless gratitude for our incredible surrogate and everyone who helped us along the way."

  The post was accompanied by a photo of their baby daughter sleeping alongside a blanket with her name on it. It ended by saying: "We love you to the moon and back again."

  Lily Collins and Charlie McDowell got married in 2021

  The announcement came a day after Collins posted a tribute to her father, musician Phil Collins on his birthday. "From a west coast star to the West End stage and everywhere in between, I'm so grateful to be by your side and for the support, experiences and love we have and will continue to share," she wrote on Instagram, external. She accompanied the post with pictures of the pair together, including one at her father's Hollywood Walk of Fame induction ceremony in 1999, when the actress was just 10 years old. Born in Guildford and raised in Los Angeles, Collins started acting at a young age. In 2020, she took on the role of American marketing executive Emily Cooper in the hit Netflix romantic comedy series Emily in Paris. The show follows Cooper's life as she works at a firm in Paris. In season four, which came out last year, Emily moves to Rome to open a new office. The hit series has been renewed for a fifth season, but the location for filming has yet to be announced. Last year, Collins made her West End stage debut in Barcelona. The romantic thriller saw Collins play an American tourist who has a one-night stand with a handsome Spaniard, played by Money Heist's Álvaro Morte.
