title: 'Stoke-on-Trent crash: Girl, 6, killed and father hurt - BBC News'
date: '2021-06-20'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/uk-england-stoke-staffordshire-57544083
content: |-
  The girl was walking with her father when the pair were reportedly hit by a car, police said.

  Flowers and tributes have been laid at the scene of the crash in Norton Green

  A six-year-old girl has died after she and her father were reportedly hit by a car in Stoke-on-Trent, police said.

  The pair were walking along Endon Road, Norton Green, at about 19:15 BST on Saturday when the crash happened.

  Staffordshire Police said passers-by attempted to save the girl but she died at the scene.

  Her father is being treated for injuries, while the car driver is being treated for a head injury, the force added.

  Insp Lee Robinson, of Staffordshire Police, said: "The girl's family will be supported by specially-trained officers and our thoughts are with them at this time.

  "We do not yet understand fully what has happened and so I'd urge people to avoid the area while we investigate and please not to speculate as to the circumstances.

  "However, I would appeal for anyone who witnessed the incident, or may have CCTV or dashcam footage, to get in touch and assist our inquiries."

  Staffordshire Fire and Rescue Service said it sent two appliances to the scene, one from Sandyford and another from Hanley, after being alerted by West Midlands Ambulance Service at 19:37 BST.

