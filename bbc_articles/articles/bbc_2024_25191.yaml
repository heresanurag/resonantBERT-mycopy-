  When asked how it felt to be compared to Best's hat-trick 53 years ago, Price said it was hard to put into words. "He's a Northern Ireland legend and hero. To do that is pretty surreal, really. "To follow up on that is unbelievable." Price added that he players want to "enjoy the moment" but will look to build upon the performance. A lot has been made of the potential of this Northern Ireland team and Tuesday's result was by far the most convincing of O'Neill's second stint in charge. Northern Ireland face Belarus and travel to Luxembourg in their final two Nations League matches before qualifying begins for the 2026 World Cup. "We know we're not the finished team and we have a lot of work to do to get there," Price added. "We've got a lot of young and exciting players and we can definitely kick on. "You can always see that the talent this squad has got, whether if it's in training or when we play. It's about those key moments and maybe in the first game we couldn't put the goals away. "Tonight it just went for us and that's the best feeling in the world really."
