  NI hat-trick 'best night of my life' - Price

  Isaac Price scored his first hat-trick for Northern Ireland against Bulgaria

  Northern Ireland forward Isaac Price says scoring a hat-trick in Tuesday's 5-0 win over Bulgaria is "the best night of my life". Price netted twice in the first-half before a stunning 25-yard effort with nine minutes to play secured a first hat-trick for Price as a Northern Ireland player. An own goal by Bulgarian goalkeeper Dimitar Mitov and a powerful Josh Magennis effort helped Michael O'Neill's side to a big win at Windsor Park. The result moves Northern Ireland to the top of Group C3 with two matches remaining. "It's the best night of my life. It's what you dream of as a kid," Price told BBC Sport NI. George Best scored a hat-trick the last time Northern Ireland won 5-0 at Windsor Park, in April 1971 against Cyprus and it was only the fourth time the nation has ever scored five goals in a match.

  Northern Ireland put in a dominant display against Belarus on Saturday but failed to find the breakthrough. However, once Price tucked away Dion Charles' pass in the 15th minute it seemed like a weight had been lifted off the players' shoulders against Bulgaria. Price, 21, fired home a second and Mitov's own goal made it three before half time. Charles saw an effort ruled out after Conor Bradley strayed offside, but Price's hat-trick strike and a late effort by substitute Magennis rounded out a famous win. When asked if the superb strike to secure his hat-trick was the best of his career, Price said: "By far, 100%." "There's no better feeling. My mum and dad were here to see it," the Standard Liege midfielder added. "All the sacrifices they've made to get me to this point, and they can come and witness that, it's great for me and my family. It's just surreal."

