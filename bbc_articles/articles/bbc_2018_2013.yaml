title: Dog escapes Australia rubbish truck - BBC News
date: '2018-02-15'
section: General
url: http://www.bbc.co.uk/news/world-australia-43068871
content: |-
  A dog thrown into a rubbish truck survives struggling against compacter blades and piles of rubbish.

  A pet dog tipped out of a bin into a rubbish truck in Queensland, Australia has survived his gruelling ordeal, struggling to avoid compacter blades and piles of rubbish.

  Australia's animal protection agency RSPCA released footage of the trapped dog, looking to find those responsible.
