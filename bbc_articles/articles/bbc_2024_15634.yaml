title: SK:N plastic surgery care clinic company collapses - BBC News
date: '2024-07-18'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c51yj723r3zo
content: |-
  The company had clinics in Birmingham, London, Manchester, Liverpool and Glasgow.

  Before its website closed down, SK:N said it had "the largest network of specialist skin care clinics in the UK"

  One of Britain's largest plastic surgery providers, which had more than 70 branches across the UK, has collapsed. Customers calling SK:N Clinics' main office number on Tuesday were told: "Unfortunately as of July 17, the SK:N Group, including SK:N Clinics, the Harley Medical Group, Skinbrands, The Skin Experts and ABC Medical has ceased trading." The Birmingham-based firm previously said it had "the largest network of specialist skin care clinics in the UK". Founded in 1990, it expanded to locations in Manchester, Liverpool, Glasgow as well as having 17 clinics across London.

  The company, which also had branches in Wolverhampton and Leamington Spa in Warwickshire, owned brands including cosmetic surgery firm Harley Medical Group and skin technology company ABC Medical, whose phone lines had the same automated message. SK:N had more than 450 consultants, doctors, nurses and medical practitioners operating across England and Scotland. The company provided services from tattoo and wart removal to acne and rosacea treatments, as well as lip filler and thread lifts - a type of facelift. However, customers were on Wednesday told their appointments would no longer go ahead.

  A poster stuck to the window of its clinic in Birmingham city centre said: "We are very sorry to inform you that SK:N and The Harley Medical Group, as of 17 July, have ceased trading. "As a result we will no longer be undertaking service from this site with immediate effect. "Further details will be made available on www.sknclinics.co.uk in due course. "We will be contacting all clients still awaiting test results as soon as possible."

  One of SK:N's clinics in Birmingham city centre

  As of 17:00 BST on Tuesday, SK:N's website was replaced by a message saying the company had "undertaken an extensive process to secure investment to enable it to continue trading but sadly we've been unsuccessful". Accounts on X, formerly Twitter, and Instagram, also appeared to have been shut down. The website message added: "We recognise this outcome will have a significant impact on our team members and our customers and we are deeply sorry for the stress and inconvenience this has caused. "We are doing all we can to address the concerns of those affected and will be contacting all clients still awaiting test results as soon as possible. All further updates will be provided on this website and when available."

  One customer, who asked not to be identified, said their upcoming appointment had been cancelled on Tuesday "out of the blue". They added that they had pre-paid about £700 for a series of appointments, and had not completed the course of treatment. "They've done this with no prior warning to customers, with no communications about how to get a refund on the treatments customers are owed," the person said.

  Communications firm Kendrick, the company's PR agency, indicated in an Instagram post that SK:N had ceased trading. Kendrick's post said: "At this time we have no information for the press and patients who are understandably reaching out to us wanting clarity on the situation. "We have no information regarding how things are being managed by SK:N (or HMRC/debt collection), or how cancelled patient appointments/payments etc will be redressed. "We are unfortunately in the same position as many staff and patients, and are sorry to have no news to share - this situation has blindsided us all." SK:N has been contacted for comment.

  Have you had your appointment cancelled? Are you owed a refund? Please share your experiences.
