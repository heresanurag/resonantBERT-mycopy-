id: bbc_2020_1177
title: 'Seven Kings stabbing: Three killed after disturbance - BBC News'
date: '2020-01-20'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-51171184
content: |-
  The men in their 20s and 30s were pronounced dead at the scene in Ilford - two men have been arrested.

  A forensic examination of the scene is under way, police said

  Three men have died in a stabbing in east London.

  Police said they were called at about 19:40 GMT on Sunday to reports of a disturbance in Elmstead Road in Seven Kings, Ilford.

  Three men, aged in their 20s or 30s, who were involved in a fight, were found by emergency services with stab injuries, the Metropolitan Police said.

  All three were pronounced dead at the scene. Two men, aged 29 and 39, have been arrested on suspicion of murder.

  Ch Supt Steve Clayman said a fight had broken out between two groups who were armed with knives, leaving three men fatally stabbed.

  "We can now say that two arrests have since been made, so there has been progress.

  "The parties are believed to be known to each other and the group are within the Sikh community," he added.

  Sabih Qureshi, who lives in the area, told the BBC he had seen seven or eight men "fighting each other" in the same place on Saturday, which he believed was "linked for sure".

  He said: "They were saying 'I will kill you', and the person was saying 'ok kill me'. For sure it was linked."

  After seeing the three "badly injured" men following the attack, Mr Qureshi said he and several others tried to help and give them CPR.

  The Ilford resident added that one of the men was already dead, while the other two were "not conscious" but breathing "just a little".

  "It was very violent. All the blood was in the street," he said.

  Louis O'Donoghoe described seeing "absolute chaos" after he had heard screaming and shouting outside his house.

  It was like something out of a movie, horrific," the 40-year-old scaffolder said.

  Formal identification of the victims is yet to take place.

  The stabbings bring the number of homicide investigations launched by the Met in 2020 to six.

  Police will continue to patrol the area on Monday

  There has been a visible police presence here since Sunday night.

  Officers were called just before 20:00 to reports of a disturbance but when they arrived, they found three young men - all in close proximity to each other - with fatal stab wounds.

  At the end of one of the police cordons put in place you can just about make out the tops of the forensic tents - three dotted next to each other - which marks the exact spots where these individuals were pronounced dead.

  An enhanced police presence was seen in the Redbridge area on Monday

  Despite the works of the emergency services, these men could not be saved.

  I've seen graphic video from a nearby resident that was filmed shortly after the incident showing pools of blood on the street.

  I've been speaking to some residents here this morning who say they have raised concerns to police over gangs congregating behind Seven King's train station, where they often drink and smoke cannabis.

  Road closures and an enhanced police presence will be seen in the Redbridge area.

  Mayor of London Sadiq Khan tweeted: "My thoughts are with their families and the local community at this dreadful time."

  He said extra police enforcement powers had been authorised for the whole of Redbridge borough until 08:00 on Monday.

