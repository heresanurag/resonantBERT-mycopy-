title: 'Covid in Scotland: 2.3 million to live under toughest rules - BBC News'
date: '2020-11-17'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-54960948
content: |-
  First Minister Nicola Sturgeon confirms that 11 local authorities will move to the strictest level four from 6pm on Friday.

  The Scottish government has published the protection levels that will apply in each local authority area in Scotland from 20 and 24 November, alongside evidence and analysis informing these decisions.

  If you have Covid-19 symptoms go immediately to NHS Inform online or phone 0800 028 2816 to book a test

  The latest from NHS Scotland and the Scottish government, including social distancing, face covering and stay at home advice.

  5. The ready.scot website has been updated with the latest help and advice and the helpline number remains: 0800 111 4000

  It's ok to not feel yourself right now, and the Scottish government has some great tips to help get you through these difficult times.
