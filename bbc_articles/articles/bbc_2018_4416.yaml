title: MPs given standing ovation after anti-Semitism speech - BBC News
date: '2018-04-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43802571
content: |-
  Labour's Luciana Berger and Ruth Smeeth are applauded by MPs after their speeches about anti-Semitism.

  Labour's Luciana Berger and Ruth Smeeth were both applauded in the Commons after their speeches about anti-Semitism.

  The MPs listed the abuse they had received, with Ms Smeeth saying they would "not be bullied out of political engagement".
