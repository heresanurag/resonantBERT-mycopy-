title: Ex-Man Utd player Brandon Williams did 99mph before crash - BBC News
date: '2025-03-14'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cwye9p15xe2o
content: |-
  The prosecution say it was fortunate nobody was killed or seriously injured by Brandon Williams.

  Former Manchester United footballer Brandon Williams has admitted dangerous driving after being caught doing almost 100mph. Williams, 24, was spotted driving at high speeds and in an erratic manner in an Audi A3 on the A34 near Handforth, Cheshire, on 20 August 2023, according to the Crown Prosecution Service (CPS). He pleaded guilty at Chester Crown Court earlier to dangerous driving and driving without third party insurance, the CPS said. Williams, who was contracted to Manchester United at the time, was with a female passenger and was driving at up to 99mph in a 70mph zone. The court heard he was seen with a balloon at his mouth.

  The CPS said the woman was seen filming them at one point on her phone, adding that it was clear to witnesses that the car was out of control and it collided with a blue Ford Fiesta at around 18:17 BST before crashing into the central reservation. There was extensive damage to Williams' car, damage to the offside on the Ford Fiesta with a wheel missing, as well as damage to the central reservation. Williams, who was on loan to Ipswich Town at the time, was breathalysed, but the test was negative. The ex-Premier League footballer was treated in hospital for his injuries and then taken to Middlewich custody suite.

  Andrew Madden, senior Crown Prosecution Service prosecutor said Williams' driving on that day "clearly fell far below what would be expected of a competent and careful driver". Expert analysis showed he was driving at 99mph four seconds before he hit the Ford Fiesta. "Witnesses said Williams kept speeding up and then braking sharply. It was clear he wasn't in control of the vehicle," said Mr Madden. "The driving was erratic and the speed was grossly excessive. Eventually, Williams lost control completely and crashed." Mr Madden said it was fortunate no one was seriously injured or killed. Manchester United did not renew the player's contract in June. The former England Under-21 player, who is currently without a club, will be sentenced on 9 May at Chester Crown Court.

