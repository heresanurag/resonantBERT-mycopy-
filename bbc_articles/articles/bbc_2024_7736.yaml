  Scheffler added a third successive birdie on the 10th but as the leaders approached Amen Corner - the famed section of the course featuring the 11th, 12th and 13th holes - it was still too close to call. However, by the time he teed off on the short 12th, it was his tournament to lose. His nearest rivals - Aberg, Morikawa and Homa - all picked up costly double bogeys in the space of about 15 minutes, handing a three-shot lead to Scheffler even though he had bogeyed the 11th. Aberg and Morikawa both pulled their approaches on the 11th into the water, while a bad bounce for Homa on the iconic par-three 12th left him in the bushes and taking a one-shot penalty. From that point, Scheffler could relax more and birdies on 13, 14 and 16 all but clinched victory. Aberg's hopes of becoming the third man to win on his first start in a major were over, but he finished second after recovering with birdies on 13 and 14. The composed 24-year-old, who only turned professional 10 months ago, was described as a "generational talent" by European Ryder Cup captain Luke Donald before helping Europe beat the US in Rome last September. He is admired for his clean ball-striking and showed this weekend why he is expected to challenge regularly for the majors.

  The progress of the players from Great Britain and Northern Ireland had been rather underwhelming, but 33-year-old Fleetwood remained patient and was rewarded with a top-10 finish. In reality, Fleetwood needed a better round to put himself into serious contention but played solidly to leave him feeling optimistic going into next month's US PGA Championship at Valhalla. "I guess I needed a few more fireworks. But the golf course wasn't giving much away," said Fleetwood, who made his eighth appearance at the Masters. "Who knows if my time will ever come, but all I can do is keep trying to put myself there and having performances like this." Northern Ireland's Rory McIlroy was unable to finish with a flurry as his 10-year wait for the major title which evades him continued. The 34-year-old won four majors between 2011 and 2014 - twice at the PGA Championship, plus the Open Championship and US Open - but was never in contention as he looked to become only the sixth man to complete the career grand slam. McIlroy struggled in the testing conditions as he opened with rounds of 71, 77 and 71, carding a final 73 to finish well adrift at four over. "It hasn't been my year but I'll keep coming back until it is my year," he said. England's Tyrrell Hatton was level par after a final-day 69, while Matt Fitzpatrick ended four over and 2016 champion Danny Willett, playing in his first tournament since having shoulder surgery in September, faded from a good start to finish nine over.

  Five-time Masters champion Tiger Woods finished last of the 60 players who made the cut to play all four rounds, shooting a five-over 77 to finish 16 over in total. Even making the weekend was an achievement for the 15-time champion, who had barely played in the past year as he continues to recover from injuries sustained in a car crash in February 2021. However, packed galleries followed Woods around the scene of some of his most famous triumphs, with patrons roaring him off the final green and hoping they will get many more chances to see the 48-year-old at Augusta in the future. Defending champion Jon Rahm was already out of contention and things got even worse as he recorded his highest total in eight appearances at the Masters. The 29-year-old Spaniard, who has made a shock switch to the breakaway LIV Golf tour since his victory last year, shot a 76 and finished nine over.
