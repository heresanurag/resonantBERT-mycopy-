title: Pedestrian, 73, dies after being hit by bus in Giffnock - BBC News
date: '2023-09-02'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-66691425
content: |-
  The man died at the scene of the crash at a junction in Giffnock, East Renfrewshire, on Friday.

  The crash scene was cordoned off by police on Friday

  A 73-year-old man has died after being hit by a bus in Giffnock, East Renfrewshire, during the evening rush hour.

  The pedestrian was struck at the junction of Orchard Drive and Fenwick Road at about 17:00 on Friday. He died at the scene.

  The 24-year-old bus driver was not injured.

  A police spokesman said inquiries were ongoing and urged any witnesses to get in touch.

  Sgt Adnan Alam said: "Our thoughts are with the family of the man who died at this very difficult time.

  "This is a busy road and we would appeal to anyone who witnessed the crash, who has not yet spoken to officers to please contact us. I am also keen to speak to any drivers who have dashcam footage that may assist."

