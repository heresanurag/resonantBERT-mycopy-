title: 'Ordsall Chord: Manchester rail link bridge lifted into place - BBC News'
date: '2017-02-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-39045147
content: |-
  The 600 tonne bridge across the River Irwell will link Manchester's Victoria and Piccadilly stations.

  Two giant railway arches have been lifted into place linking Manchester's Victoria and Piccadilly stations as part of the Ordsall Chord scheme.

  The 600-tonne structure was lifted into place across the River Irwell using one of the largest cranes in Europe on Tuesday.

  The scheme is part of the multi-million pound Northern Hub upgrade for rail services across the North of England.
