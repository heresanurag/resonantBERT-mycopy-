title: Girl, 14, arrested after fatal house fire in Leicester - BBC News
date: '2024-09-11'
section: Leicester
url: http://www.bbc.co.uk/news/articles/cdd7121754mo
content: |-
  Detectives say they are keeping an "open mind" in their investigation.

  Detectives say they are "keeping an open mind" about the fire

  A 14-year-old girl has been arrested on suspicion of arson after a fatal house fire. Police were called to a house in Bedale Drive, Leicester, at 04:08 BST on Tuesday when a person was found dead inside. Leicestershire Police said others inside the property received hospital treatment "as a precaution". The force said the girl had been released on bail while inquiries continued.

  Flowers have been left at the scene

  Detectives are "keeping an open mind" and working with the fire service to establish what happened, the force added. Det Insp Mark Chandler said: "I understand this incident will have caused distress and concern in the community and officers remain in the area to offer support and reassurance."

  Forensic officers were spotted outside the house on Wednesday

  Simon Holden, area manager, said: "This is a terribly sad incident and the thoughts of all of us are with the family, friends and all those affected at this difficult time. "Our community safety team will be in the local community over the coming weeks to offer support and advice where needed." Crews were called at 04:02, with about 25 firefighters from four stations responding, said the fire service. Two hose reel jets and an aerial ladder platform were used to extinguish the blaze.

  There's still quite a big investigation going on here in Bedale Drive. At the house, you can see damage from the fire on the roof. There are several vehicles from investigation teams, including the fire investigation dogs. People in white forensic suits, hard hats and masks have been going inside, and there is still a cordon outside the house with police on the scene. Some of the flowers outside have been left by neighbours. In messages, they've written the number of the house they live in. Some have left toys as tributes too.

