title: Iran missiles seen in skies over Jordan on way to Israel - BBC News
date: '2024-10-04'
section: General
url: http://www.bbc.co.uk/news/videos/c4g470n4qm1o
content: |-
  Video filmed from Dabouq shows the barrage of missiles which were launched on 1 October.

  Footage filmed from Dabouq, in Jordan, shows a barrage of missiles exploding over Israel after Iran launched almost 200 missiles towards the country on 1 October.

  The Israeli military said most of the missiles were intercepted, but that a small number struck central and southern Israel.

  The country's Prime Minister Benjamin Netanyahu said Iran had made a "big mistake" and "will pay for it".

  A man was killed by falling missile debris in the city of Jericho in the occupied West Bank, Palestinian officials said.

  Iran said the attack was in response to two assassinations by Israel - of the Hezbollah leader Hassan Nasrallah in Beirut and of the Hamas leader Ismail Haniyeh in Tehran.
