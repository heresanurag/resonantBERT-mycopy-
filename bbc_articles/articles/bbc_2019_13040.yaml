id: bbc_2019_13040
title: Hundreds of meteor sightings reported - BBC News
date: '2019-11-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50399138
content: |-
  Footage of a bright fireball was captured by home security systems as it travelled across the sky. The American Meteor Society said it received more than 120 reports of a meteor sighting.
