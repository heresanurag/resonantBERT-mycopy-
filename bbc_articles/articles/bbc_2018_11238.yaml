title: 'Lana Del Rey: Singer postpones Israel performance after backlash - BBC News'
date: '2018-09-01'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-45381228
content: |-
  The US singer was under pressure to cancel her show in protest at Israel's policy on the Palestinians.

  The singer initially defended her decision to perform at the Meteor Festival

  Lana Del Rey has postponed a scheduled performance in Israel following a backlash from fans and activists.

  "It's important to me to perform in both Palestine and Israel and treat all my fans equally," the singer said in a statement posted on Twitter.

  She added that she was hoping to "schedule visits for both my Israeli and Palestinian fans" in future.

  Activists had called on the star to abandon the show in protest at Israel's policies towards the Palestinians.

  She initially defended her decision to appear at the Meteor festival, which is scheduled to take place at Kibbutz Lehavot Habashan in the Upper Galilee region next week.

  "I would like to remind you that performing in Tel Aviv is not a political statement or a commitment to the politics there," she wrote in an earlier statement.

  "I'm not a travel agent promoting tourism for each country I go to," she said in a separate tweet.

