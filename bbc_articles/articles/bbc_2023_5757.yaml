  The pioneer of the confrontational American television show, Jerry Springer, talks about his early years when he lived in London.

  The pioneer of the confrontational American television show, Jerry Springer, has been speaking to the BBC about his early years in London and the unusual circumstances of his birth.

  Springer was born in Highgate tube station during World War Two, when it was used as a bomb shelter. He told the BBC's Laurence Pollard about some of his London memories, including the 102 bus.
