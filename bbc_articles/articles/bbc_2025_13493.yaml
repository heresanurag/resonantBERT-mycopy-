title: 'Ange Postecoglou: Tottenham captain Son Heung-min says Australian is club
  ''legend'' - BBC Sport'
date: '2025-06-07'
section: Tottenham
url: http://www.bbc.co.uk/sport/football/articles/cn5y96ndvp0o
content: |-
  Ange Postecoglou appointed Son Heung-min as Tottenham captain upon his arrival in 2023

  Tottenham captain Son Heung-min says sacked manager Ange Postecoglou is a "legend" who has "changed the trajectory of this club". Postecoglou, 59, was sacked on Friday just over two weeks after ending the club's 17-year wait for silverware with victory in the Europa League final. Spurs finished 17th in the Premier League after losing 22 out of 38 matches. "Gaffer. You've changed the trajectory of this club," Son posted on Instagram, external. "You believed in yourself, and us, since day one and never wavered for a second. Even when others did. "You knew what we were capable of all along. You did it your way. And your way brought this club the best night it's had in decades. We will have those memories for life. "You trusted me with the captaincy. One of the highest honours of my career. It's been an incredible privilege to learn from your leadership up close. I am a better player and a better person because of you. "Ange Postecoglou, you are a Tottenham Hotspur legend forever. Thank you, mate."

  England playmaker James Maddison, who joined Spurs from Leicester City in the same summer that Postecoglou arrived, paid his own tribute. "Your instant belief in me to not only sign me but make me the club's vice-captain and part of the leadership group from the get-go is something I'll always be thankful for," said Maddison. "You led us to victory and we're European champions, and in this club's history books, because of you and your winning mentality. "Lastly and most importantly, is how you are as a man and a person. Your unwavering self-belief and strong mindset is infectious and a massive reason in why you were the man to end this club's 17-year drought for a trophy. "A family man with great morals and I have honestly learnt so much from you. More than you will probably ever know." Goalkeeper Vicario said, external: "Boss, I just want to say a massive thank you for everything you have done for me and for all of us. "From that very first call, right from the beginning, you always showed so much belief in me. "Giving me the opportunity to be part of the leadership group... those moments, and many others, will stay with me forever. "You are not only a top manager, you are an incredible person to work for, a real leader, a mentor, and someone I'll always look up to. "What we achieved TOGETHER will stay in the history books. "Wishing you nothing but success as I know you will go on to achieve more and more. Defender Micky van de Ven said, external: "Gaffer, Thank you for everything! "Believed in me from the first day I arrived at the club. Many ups and downs in the last two years but you kept believing in us and kept pushing us. "Big part of the success from the club this year, and forever grateful that u made me part of it. Forward Dominic Solanke said, external: "Thank you for bringing me to this wonderful club, thank you for bringing us a wonderful trophy. "Won't ever forget the convo we had before I signed and we achieved a dream! All the best in your next adventure." Meanwhile, Tottenham Hotspur Supporters' Trust, external said the vast majority of fans will will "love Ange forever" although league results were a "long way short" of expectation. The fans group called for Postecoglou's replacement to be "fully supported" by the club's board in order to build on the "cup success that Ange has lain". Brentford boss Thomas Frank is among the leading candidates to replace Postecoglou, while Bournemouth's Andoni Iraola, Fulham's Marco Silva, Crystal Palace's Oliver Glasner and former Spurs boss Mauricio Pochettino are also linked with the vacancy.
