  The Duke of Sussex has told the BBC he "would love a reconciliation" with the Royal Family.

  The Duke of Sussex has told the BBC he "would love a reconciliation" with the Royal Family, but that the King "won't speak to me because of this security stuff".

  In an emotional interview in which he said he was "devastated" at losing a legal challenge over his security in the UK.

  You can watch Nada Tawfik's full interview with Prince Harry above.

