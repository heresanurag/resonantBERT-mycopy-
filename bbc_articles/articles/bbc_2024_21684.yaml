title: Bristol police officer in court accused of killing motorist - BBC News
date: '2024-09-12'
section: England
url: http://www.bbc.co.uk/news/articles/cq5d5z6l53jo
content: |-
  Keryl Johnson, 35, was killed after a driver who failed to stop for police crashed into her car.

  The collision happened a few minutes after the driver of a Volkswagen Tiguan failed to stop for police

  A police officer has appeared in court charged with causing death by dangerous driving during a police chase. Avon and Somerset Police officer Matthew Pike, 38, was driving an unmarked police car when the vehicle he was pursuing was involved in a fatal crash with a Honda on Newfoundland Circus, in Bristol, on 5 November 2021. The driver of the Honda, 35-year-old Keryl Johnson, died 11 days later after sustaining serious injuries. Mr Pike appeared before Bristol Magistrates’ Court accused of killing Ms Johnson. He was given unconditional bail and will next appear at Bristol Crown Court on 4 October.

  He also faces an additional charge of causing death by careless or inconsiderate driving relating to the same alleged victim. He did not enter pleas to either of the charges. It comes after Avon and Somerset Police made a mandatory referral to the Independent Office for Police Conduct (IOPC) in November 2021. A file was then sent to the Crown Prosecution Service, which authorised the charges against the officer. In a statement issued on Wednesday, the IOPC said: "The officer was driving an unmarked police vehicle and was pursuing a Volkswagen Tiguan which had failed to stop for police. "During the pursuit the Volkswagen Tiguan collided with a Honda Jazz. "The driver of the Honda sadly died in hospital."
