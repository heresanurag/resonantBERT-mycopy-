  Jordan Spieth was in command all day long. He set the tone with his amazing tee shot on the first that went 400 yards. The defending champion reads these greens so well and was at his imperious best.

  Tiger Woods marched through the field, which was a joy to watch. He played with total focus, total concentration, knew what was required of him and produced it really well.

  He hit an endless supply of solid shots and some ripping drives when he needed to. It was as good a round as he could have played and he looked back to his best.

  As for Rory McIlroy, he would definitely say this was a day of missed opportunities. He hit a lot of long tee shots, he didn't enter the rough too often, but he couldn't hole enough putts.

  He would have hoped to have broken 70 the way he hit the ball off the tee. However, he is still very much in the hunt and lives to fight another day.

  Sunday is entirely weather dependent. With wind forecast there are 35 players who will think that if they have the round of their lives early on before the winds hit they have a real chance. Anything could happen on a windy day in Carnoustie...
