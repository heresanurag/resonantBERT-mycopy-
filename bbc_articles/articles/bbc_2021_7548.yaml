content: |-
  The Glasgow fanzone rises to applaud Scotland as their Euro 2020 journey has come to an end.

  The Glasgow fanzone has risen to applaud the Scotland team as their Euro 2020 journey has come to an end.

  Hopes had been high after Scotland came away from Wembley with a point.

  But in the end Croatia proved too strong and the skills of Luka Modric too hard to contain.
