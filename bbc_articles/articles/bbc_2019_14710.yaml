title: James Paget Hospital to pay compensation for failings over baby death - BBC
  News
date: '2019-12-18'
section: Norfolk
url: http://www.bbc.co.uk/news/uk-england-norfolk-50823996
content: |-
  Harris James was mistakenly treated for pneumonia when he had a heart condition.

  A hospital has been told to pay compensation to the family of a baby who died because of "serious failings".

  Six-month-old Harris James was mistakenly treated for pneumonia when he had a heart condition, and multiple opportunities to save him were missed.

  The ombudsman's report ruled there were serious failings at the James Paget University Hospital in Norfolk, which said it had apologised to the family.

  The trust has been ordered to pay the baby's mother £15,000.

  The report from the Parliamentary and Health Service Ombudsman (PHSO) found mistakes were made in Harris's care and the trust mishandled his mother Mary Gunns' complaint, while also failing to properly investigate the death.

  Harris was admitted to the Gorleston hospital on 2 November 2015, after being referred by his GP.

  He had experienced weight loss following gastroenteritis but, after some tests at the hospital, was given an appointment with a dietician four weeks later.

  However, on 12 November he was taken by ambulance to the trust's A&E department after he vomited and became "floppy".

  A chest X-ray showed his right lung had changed and part of his left lung had filled with fluid.

  Staff suspected he had sepsis and possibly aspiration pneumonia - a type of pneumonia caused by breathing something in, such as vomit, rather than by bacterial infection.

  Harris James was "affectionate and sweet" according to his family

  Harris, from Lowestoft in Suffolk, was transferred to a paediatric ward but his condition got worse.

  An electrocardiogram (ECG) showed several heart abnormalities but Harris was still not referred to a specialist and did not see a consultant until the next day.

  Soon after that, he suffered a cardiac arrest and died.

  The ombudsman's report concluded the trust had failed to act on the results of the ECG and X-ray, failed to consider Harris's history and symptoms, failed to ask for input from specialist staff and failed to escalate his care when his condition was getting worse.

  The report said had Harris received the appropriate treatment it was "more likely than not that his death would have been avoided".

  Harris's parents, Mary and Ryan, said: "Our son was an affectionate and sweet little boy whose sudden death devastated our family.

  "We won't ever be able to forgive James Paget Hospital for its failings, nor will we forget the additional pain caused by its mishandling of our complaint."

  Anna Hills, chief executive at James Paget University Hospitals NHS Foundation Trust, said the trust had apologised to his family for its failings, how it communicated with them and for how it handled their complaint.

  The trust's latest Care Quality Commission inspection report, published on Tuesday, saw it rated "good" although the safety of services was rated as "requires improvement".

