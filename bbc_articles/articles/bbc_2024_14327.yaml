title: Eminem tops the charts for first time in four years with Houdini - BBC News
date: '2024-06-07'
section: Culture
url: http://www.bbc.co.uk/news/articles/ce99xe30g55o
content: |-
  The US rapper gains his 11th number one, his biggest hit since Without Me debuted in 2002.

  Eminem claims first number one since 2020

  Eminem performed on Thursday evening in his hometown of Detroit, Michigan

  Eminem has claimed his 11th number one single in the official charts this week with the track Houdini. It comes from his new album, The Death of Slim Shady (Coup de Grâce), and is the rapper's first chart topping hit since Godzilla in 2020. The Detroit artist is best known for his collaborations in recent years, but his newest track is his first solo number one single in 19 years. Houdini is also the biggest opening week for a song since Dave and Central Cee's hit Sprinter, which came out this time last year. Eminem, whose real name is Marshall Mathers, has sparked debate with his new album name, as he announces his goodbye to his alter-ego.
  • None 'The death of Slim Shady': Controversial legacy of Eminem's peroxide-blond alter ego

  In a surprise announcement in April, he teased the album in a mock murder news report, external - complete with cameos from long-time collaborators Dr Dre, Snoop Dogg and 50 Cent. His new track has knocked Sabrina Carpenter's Espresso off the top spot and draws the 51-year-old level with Calvin Harris on the list of most number one singles in the UK, with 11. Elsewhere in the charts, Central See and Lil Baby's BAND4BAND is in at number 3 and singer-songwriter Myles Smith hits new heights of number eight with his track Stargazing. The Luton-based singer says it is "beautiful to see Stargazing resonating with so many people".

  K-pop group ATEEZ have gained their third number one album in the space of a year

  A Bar Song (Tipsy) by Shaboozey droped to four, while Billie Eilish's Birds of a Feather remained at number five in the singles chart. Taylor Swift, whose Eras Tour lands in the UK this evening, remains top of the album charts with The Tortured Poets Department. Billie Eilish climbed one place to second with Hit Me Hard and Soft, while Becky Hill is a new entry in third place with her album Believe Me Now. Hill's album, which is her second studio offering, is her best performing album to date - her debut album Only Honest On The Weekend peaked at number seven, in 2021. There's also chart success for K-pop group ATEEZ, who have achieved their third top 10 album with Golden Hour: Part 1. The South Korean group are made up of eight members - Hongjoong, Seonghwa, Yunho, Yeosang, San, Mingi, Wooyoung and Jongho. It's a record-breaking achievement as the band have secured three top 10 albums in one year, following the success of The World EP.2: Outlaw and The World EP.Fin: Will.
