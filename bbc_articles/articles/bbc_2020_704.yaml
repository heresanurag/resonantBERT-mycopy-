content: |-
  The Northern Ireland Assembly returned on Saturday after three years of deadlock.

  That's all from us on a historic day at Stormont, which saw the return of power-sharing government after three years of paralysis.

  There will be more news and reaction on the BBC News NI website over the weekend.

  Thanks for joining us, and goodbye.
