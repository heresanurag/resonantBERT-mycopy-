content: |-
  A bipartisan US House report, based on dozens of interviews, called the July assassination attempt "preventable".

  Officer reveals how he locked eyes with would-be Trump assassin

  The rally stage in Butler, Pennsylvania just moments after the assassination attempt on Donald Trump in July

  A local police officer locked eyes with Donald Trump's would-be assassin as he perched on a roof near the rally site - but there is no evidence a warning about the gunman reached the Secret Service before the shooting, a new report says. A US House of Representatives task force on Monday published preliminary findings into the July assassination attempt at a Pennsylvania rally, outlining a list of security failings. The report from the bipartisan panel states that the attempt was “preventable and should not have happened”. The committee's investigation is ongoing, and it is also looking into a second suspected attempt on Trump's life at his Florida golf course in September.

  The new House panel report is based on interviews and documents related to the events of 13 July. At the rally in Butler, Pennsylvania, Thomas Matthew Crooks, 20, climbed on to the roof of a nearby industrial building, which was just outside the event's main security perimeter. From that vantage point, he eight fired shots. One nicked the Republican presidential candidate's ear and one killed a rally attendee. Two others were injured.

