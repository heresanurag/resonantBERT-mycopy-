  Local police noticed Crooks more than an hour before the shooting. He was looking at sniper positions and examining the stage through a gun rangefinder. At one point Crooks ran from officers who were on the lookout for him. He evaded police until he was later spotted on the roof. A Butler Township police officer then hoisted himself up on the roof. He testified that he locked eyes with the gunman. “I see Crooks facing downrange towards the stage, but his eyes are back at me as I'm coming up [onto the roof],” the police officer said. “And I would say, like, his facial expressions was surprised. His eyes were very big, like, 'what are you doing up here?'" Crooks pointed his assault rifle at the officer, who slipped, fell to the ground and then started yelling into his radio: “He’s got a gun. He’s got a long gun.” The report noted: “To date, the task force has not received any evidence to suggest that message reached the former President’s (Secret Service) detail prior to shots fired.” Other findings, some of which have been previously outlined in testimony and other public reports, include:
  • None “Inadequate planning and coordination before the rally”, with a disorganised walk-through of the site
  • None That local sniper teams had a limited field of vision
  • None There was no unified security command post, and communication between the US Secret Service and Butler Township law enforcement was slow and fragmented
  • None That local police fired a shot at the gunman which “may have caused Crooks to stop firing”. However, it did not hit Crooks, who was killed by a single shot from a Secret Service sniper
  • None That a ladder found at the scene did not belong to the gunman but was used by officers to climb onto the roof after the shooting. Crooks had bought a ladder that morning but abandoned it about 50 miles (80km) from the site. He managed to get onto the roof by climbing on air conditioning units In a statement, Republican House Speaker Mike Johnson called the security failures by Secret Service outlined in the report "shocking and inexcusable".
