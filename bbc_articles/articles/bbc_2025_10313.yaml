title: Ministers considering scrapping two-child benefit cap - BBC News
date: '2025-05-27'
section: Politics
url: http://www.bbc.co.uk/news/articles/c5ykp78r5r7o
content: |-
  The education secretary says the policy pushes people into poverty but warns scrapping it would be costly.

  Education Secretary Bridget Phillipson has said the government is looking at scrapping the two-child benefit cap but warned it would "cost a lot of money". Speaking to the BBC, the minister said the policy - which prevents most families from claiming means-tested benefits for any third or additional children born after April 2017 - had pushed people into poverty. However, she said "seeking to unwind that and to change the social security system is not easy", adding that the price tag would be big. The government is expected to announce its decision on the cap in autumn, when it publishes its child poverty strategy.

  Phillipson, along with Work and Pensions Secretary Liz Kendall, is leading the Child Poverty Taskforce putting together the strategy. It had been due to be published in spring but has now been delayed until the autumn. The taskforce was launched last year, at a time when the government was being urged by the SNP and some Labour MPs to scrap the cap. Pressure from Labour backbenchers over the issue - as well as cuts to welfare - have intensified since the Labour's poor performance at the local elections earlier this year.

  Phillipson told the BBC the taskforce was looking at the cap and "nothing is off the table". She said a Labour government would never have introduced the cap, adding: "Labour governments make different choices, we have different priorities, and you will see that coming through later this year." Although she emphasised the cost of removing the cap would be high, she added that the "cost of inaction" is also incredibly high because this scars the life chances of children in this country".

  In a speech on Monday, Reform UK leader Nigel Farage promised to lift the cap if his party gets into government. He said this was "the right thing to do", adding: "Not because we support a benefits culture, but because we believe for lower-paid workers this actually makes having children just a little bit easier for them." Conservative shadow chancellor Mel Stride defended the policy, which was introduced by his party in 2017. "A lot of people up and down the country go through those hard choices and often sacrifices, in order to have a large family," he told the BBC. "I don't think it's unreasonable under those circumstances to have a cap at the two-child level for those who would otherwise be relying on benefits for further children." The Liberal Democrats, the Green Party, the SNP and Plaid Cyrmu have all called for the cap to be removed. Liberal Democrat Treasury spokeswoman Daisy Cooper said: "Dangling hope in front of desperate parents is inexcusable. Continuing to punish children just for being born is unforgivable. "The public is fed up of a government failing to deliver change - Labour needs to learn to U-turn faster." Around 1.6 million children live in a household affected by the cap, according to statistics from the Department of Work and Pensions. The Resolution Foundation think tank says, external axing the policy would cost £3.5bn and would lift 470,000 children out of poverty.

