title: The Christians' drummer has cardiac arrest on Liverpool waterfront stage -
  BBC News
date: '2025-06-23'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/czjkdr7xvd0o
content: |-
  Lionel Duke fell ill as the band were supporting Sting during Liverpool's On The Waterfront festival.

  Lionel Duke was performing on stage with the Liverpool band The Christians when he collapsed

  A festival was halted after a drummer collapsed on stage after suffering a cardiac arrest while performing in front of thousands of fans. The Christians' Lionel Duke fell ill while the band were supporting Sting during the On The Waterfront festival at Liverpool's Pier Head on Sunday night. The Liverpool band's manager said the 58-year-old had been put in an "induced coma" after an operation at the city's Heart and Chest Hospital. The band asked fans to "please send positive vibes his way" and they praised the "phenomenal team of medics" from the festival who "stepped in so swiftly to help our poor Lionel".

  Lead singer Gary Christian had called for help after Duke collapsed with medics rushing on stage. Manager Emma Roberts said "it was a shock" as he was a "very fit regular swimmer". The Christians had just performed two songs before Duke became ill and were due to perform their biggest hit Harvest for the World later. The band were performing ahead of Sting who was headlining the four-day event.

  A sign informed the crowd what was happening

  The former Police singer performed his set after being given The Christians' blessing. Fans recalled the "terrifying" moment the performance stopped and black screens went up. A sign was put up telling the crowd medical staff were with the performer.

  Lionel Duke (second from right) with his bandmates in Madrid in 2024

  One fan said on Facebook: "It was frightening to see." Another added: "We were at the concert when this happened. Everyone was so professional and the crowd respectful. "It really felt like he had everyone's support and love - the audience were kept updated and the tribute by Sting singing Fragile as his last song was very emotional. Others sent their love, prayers and best wishes to Duke and his family. The Christians were formed in the 1980s and their self-titled debut album reached number two in the UK charts. Last year 45,000 people attended the On The Waterfront festival.

