title: Difficult hunt for 12 unbiased jurors in historic Trump trial - BBC News
date: '2024-04-13'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-68671730
content: |-
  Prosecutors and Mr Trump's team will weed through hundreds of people in Manhattan for the hush-money trial.

  The jury process for Donald Trump's first criminal trial will involve several stages that could last well over a week

  On the first day of Donald Trump's hush money trial, dozens of prospective jurors were sent home in a matter of minutes after they told the judge they could not be impartial.

  Hundreds of prospective jurors from across Manhattan will face similar vetting in the coming days, as lawyers seek to compose a fair panel in the first-ever criminal trial of a former president.

  Donald Trump is accused of falsifying his business records to disguise a hush-money payment made shortly before the 2016 election to an adult film star with whom he allegedly had an affair.

  It will be up to the Manhattan District Attorney's Office and Mr Trump's legal team to find 12 New Yorkers capable of setting aside their feelings about Mr Trump to give him a fair trial.

  Mr Trump's lawyers have already complained that the city's Manhattan borough, comprised predominantly of Democrats, will not allow for an impartial jury.

  And experts agree it will prove challenging.

  "There's nobody in the country who doesn't have an opinion one way or another," former Manhattan prosecutor Jeremy Saland says.

  "But those in New York have been exposed to Donald Trump and his father and children for literally generations, from every tabloid to the internet to Home Alone."

  "A jury should be fair no matter what, listen to the evidence and hold prosecutors to the burden," he says.

