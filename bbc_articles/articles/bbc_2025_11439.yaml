title: Several US Jolly rancher sweets unsafe to eat, FSA says - BBC News
date: '2025-06-12'
section: Business
url: http://www.bbc.co.uk/news/articles/crr7yjrnj89o
content: |-
  The FSA says chemical compounds in the sweets can increase the risk of cancer and damage DNA.

  Some Jolly Rancher sweets unsafe to eat, FSA says

  A number of products from a brand of US sweets are "unsafe to eat" and contain ingredients that could damage DNA and increase the risk of cancer, the Food Standards Agency has warned. UK businesses and consumers are being urged to stop buying and selling the Jolly Rancher products, owned by US firm Hershey. The FSA says they contain chemical compounds - mineral oil aromatic hydrocarbons (MOAH) and mineral oil saturated hydrocarbons (MOSH) - that are "not compliant with UK laws". A spokesperson for Hershey said the safety of Jolly Rancher was its "first priority", though it could not always guarantee that products produced in the US would meet the regulatory requirements of other countries.

  The FSA said the Jolly Rancher products pose a safety risk if consumed regularly over time but there is "no immediate cause for concern, as [the] food safety risk is low". In a food alert published on Wednesday evening, the FSA said: "MOAH can cause damage to DNA and has the potential to increase the risk of cancer, particularly if consumed in high quantities over a prolonged period of time. "MOAH is a genotoxic carcinogen, therefore no exposure is without risk to human health." MOAH and MOSH are used in confectionery to prevent stickiness and create a glossy appearance. According to the agency, The Hershey Company has been working with the UK government body to remove the affected Jolly Rancher products from the UK market since 2024, but some businesses in Britain have continued to import the products. The affected products are: Jolly Rancher Hard Candy, Jolly Rancher 'Misfits' Gummies, Jolly Rancher Hard Candy Fruity 2 in 1, and Jolly Ranchers Berry Gummies. The FSA is advising people who have any of the listed products to not eat them and dispose of them at home. If consumers have any concerns, they are being asked to notify the Trading Standards department or environmental health department in the local authority they made the purchase from. The agency said it was asking enforcement authorities to make "immediate contact" with businesses that had been supplied with or received any of the products, and take action to ensure they were withdrawn from the market. The spokesperson for Hershey said: "The safety and quality of Jolly Rancher is our first priority, and consumers can rest assured that our products are safe to enjoy." They urged all consumers to purchase Hershey products from "established retailers" to "ensure product integrity and compliance".
