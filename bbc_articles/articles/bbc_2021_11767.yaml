title: 'Isle of Man election: Results declared across island - BBC News'
date: '2021-09-23'
section: Isle Of Man / Ellan Vannin
url: http://www.bbc.co.uk/news/live/world-europe-isle-of-man-58670437
content: |-
  The island has chosen 24 members to serve in the House of Keys until 2026.

  That's all for tonight after a dramatic four hours of election results.

  Next Tuesday at the first sitting of the house, the new members will be sworn in for a five-year term of office.

  They will also elect a new Speaker and Deputy Speaker of the House of Keys.

  Keep an eye on the BBC Isle of Man page in the coming days for more reaction. For now though, goodnight!
