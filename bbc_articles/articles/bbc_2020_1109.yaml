title: What is climate change? - BBC News
date: '2020-01-16'
section: General
url: http://www.bbc.co.uk/news/science-environment-51129250
content: |-
  Countries are to set out how they intend to cut their emissions, but what's brought us to this point?

  The UK, France and the UN are hosting a virtual climate meeting on Saturday. About 75 world leaders will attend, marking five years since the adoption of the Paris climate agreement. Pope Francis will also address the meeting.

  This virtual gathering is taking place after the pandemic caused the postponement of the annual Conference of the Parties, due to take place in Glasgow this year.

  Nations will be revealing how they intend to cut their greenhouse gas emissions which means we’ll find out if their commitments are ambitious enough to stop the worst effects of climate change. But just what is climate change? And why are scientists calling for urgent action?

  This video was first published in January 2020.
