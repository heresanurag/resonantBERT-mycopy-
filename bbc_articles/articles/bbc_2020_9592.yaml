id: bbc_2020_9592
title: Aerial footage of passenger train derailment in Aberdeenshire - BBC News
date: '2020-08-12'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-53757907
content: |-
  Three people have died and six were injured when the train left the tracks near Stonehaven in Aberdeenshire.

  Aerial footage shows the scene of a passenger train derailment near Stonehaven in Aberdeenshire.

  Three people died and six people were taken to hospital as a result of the incident.

  It is thought the train hit a landslide after heavy rain and thunderstorms.
