title: Motorcyclists clocked speeding at 155mph near Norwich - BBC News
date: '2018-01-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-42812086
content: |-
  The five motorcyclists were stopped by police on the A47 near Norwich.

  Five motorcyclists were clocked speeding at 155mph (249km/h).

  The three men and two women were stopped by police on the A47 near Norwich in August last year.

  They are due to face a disqualification hearing in court in June.
