title: 100-year-old commando inspires the next generation in Devon - BBC News
date: '2025-02-23'
section: England
url: http://www.bbc.co.uk/news/articles/c2415r6egj1o
content: |-
  Veteran who earned his Green Beret in 1942 is described as an "unbelievable gentleman".

  John Eskdale earned his Green Beret in 1942 at the height of World War Two

  A 100-year-old World War Two commando has inspired the next generation of Royal Marines during a visit to the Commando Training Centre in Devon. John Eskdale from Lydney, Gloucestershire, visited the base in Lympstone to attend the pass out parade of 366 Troop. Recruit Sean Brennen described the veteran as an "unbelievable gentleman" who was "so inspiring". Mr Eskdale spoke to the recruits and told them they would have "good times and awful times," advising them to "take it as it comes".

  John Eskdale saw combat with HMS Charybdis on the Malta Convoys in 1942

  The 100-year-old saw combat with HMS Charybdis in the Mediterranean on the Malta Convoys in 1942 and was involved in the invasion of Sicily in the summer of 1943. He survived the sinking of Charybdis and went on to see action in Normandy and the Far East. In his speech to the recruits at Lympstone, he said: "The Royal Marines is a family, whilst you are serving, and more so afterwards, it can go on forever." During his visit Mr Eskdale presented the Commando Medal to James Barback. The marine was recognised for demonstrating unselfishness, cheerfulness under adversity, courage and determination throughout his training.

  John Eskdale visited the Royal Marine Commando base in Lympstone for the pass out parade of 366 Troop

  Recruit Sean Brennen said he took time to listen to the commando veteran. "An unbelievable gentleman, so inspiring and a real honour to chat with and find out what he did during the Second World War, quite remarkable," he said. "The stories about his service in the Far East just kept on coming and were very funny. Hearing first-hand accounts of his generation's experience are so important to us, we stand on the shoulders of these men who are real heroes."

  Mr Eskdale warned the recruits they should expect "good times and awful times"

  Mr Eskdale earned his Green Beret in 1942 at the height of World War Two. He initially tried to join the armed forces in 1940 but was too young so volunteered with the fire service in the heavily bombed city of Bristol. He finally joined the marines two years later. Mr Eskdale told how HMS Charybdis was torpedoed off the Channel Islands in late 1943. He said he spent five hours in the water on a Carley float before rescue by a destroyer took him back to Plymouth to recover. Of the crew of 533, only 107 were rescued. Following the sinking, he volunteered for hazardous service and after Commando training at Dalditch Camp on Woodbury Common in Devon was drafted to 30 Assault Unit. He saw action again, in Normandy and the Far East, taking part in operations to clear Japanese forces from Hong Kong, as well as peacekeeping operations.
