title: 'Coronavirus in Wales: A round-up of stories on Saturday - BBC News'
date: '2020-04-18'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-52328353
content: |-
  The Welsh Government says it has issued "more than 16.2m extra items of PPE" to front-line workers.

  As we bring our live coverage to an end for the day, here's a reminder of today's developments:

  Public Health Wales announced that 28 more people have died after testing positive for coronavirus.

  A shortage of personal protective equipment is creating "immense distress and heightened anxiety" for Welsh nurses, according to the Royal College of Nursing.

  A new drug for recovering heroin addicts is being rolled out across Wales to prevent them having to make daily trips to over-stretched pharmacies.

  We'll be back with the latest on the outbreak in the morning.
