title: HMP Kirkham governor 'had relationship with drug dealer prisoner' - BBC News
date: '2025-03-26'
section: England
url: http://www.bbc.co.uk/news/articles/cjd37e55dgmo
content: |-
  When police raided her home they found a toothbrush with inmate Anthony Saunderson's DNA on it.

  It is alleged Kerri Pegg approved the release of inmate Anthony Saunderson even though she did not have the authority to do so

  A prison governor began a relationship with a drug dealer who gave her a £12,000 Mercedes car after she illegally approved his early release on licence from jail, a court heard. Kerri Pegg, 42, was seen as a "rising star" in the Prison Service, quickly climbing the career ladder from graduate entrant to HMP Kirkham governor in six years, Preston Crown Court heard. But it is alleged she "didn't play by the rules" and while governor at the Lancashire prison she began a relationship with inmate Anthony Saunderson, who gave her the car. When police raided her home in Orrell, Wigan, they found a toothbrush with his DNA on it, jurors heard. Ms Pegg denies two counts of misconduct in a public office.

  Barbara-Louise Webster, opening the case for the prosecution, told the jury of seven women and five men: "Despite her success she didn't play by the rules that everybody else had to follow. "Her downfall was two-fold, the first, despite having a good income, she lived beyond her means. "She spent all her income and more, incurring debts and she had county court judgements made against her. "As a consequence, she became vulnerable and open to exploitation."

  "The second was she became emotionally and personally involved with a serving prisoner, Anthony Saunderson, and later accepted an expensive car, a Mercedes C class, which was paid for by him out of his proceeds of criminal activity ie trading in drugs." Ms Pegg denies two counts of misconduct in a public office, one by having a relationship with Saunderson and the second by failing to disclose county court judgements about her debts, as well as possessing criminal property, the Mercedes car. Pegg joined the prison service in 2012, working at prisons including, Risley, Liverpool and Styal and by April 2018, was a governor at HMP Kirkham, where Saunderson was reaching the end of a lengthy sentence for drugs offences. Jurors heard it was noted she spent a lot of time in her office with Saunderson and in October 2018, he put in a request to be released on temporary licence. Though such requests are routine there are specific rules for how they should be dealt with - rules which Ms Pegg broke, Ms Webster said. She did not have authority to approve the release, but intervened and approved the application without notifying the official who should have dealt with it, it is alleged. Days later she was moved to another jail, later becoming duty governor at HMP Lancaster Farms. Saunderson was released from prison in May 2019 and in early 2020, was using an Encrochat encrypted mobile phone, used by serious, organised criminals to send messages and secretly communicate. When the system was cracked by law enforcement agencies it showed Saunderson was involved in drug trafficking. He has since been convicted for those offences.

  But other messages also showed the "ongoing nature" of his relationship with Ms Pegg, the court heard. In April 2020, Saunderson was sent a message on Encrochat saying "car... for ya bird 12 quid or work" and a photo of the black Mercedes. Saunderson asked "what work they want" and he was told "top or weed" meaning cocaine or cannabis. Two days later Saunderson arranged for "17 packs" to be dropped off in Manchester to pay for the car, it is alleged. The Mercedes was registered to Ms Pegg at her home five days later. Ms Pegg was arrested at her home in November 2020. Officers found a toothbrush and a pair of flip flops at her flat. Both items were found to have mixed DNA samples on them, matching the DNA of Ms Pegg and Saunderson. Paperwork seized showed Ms Pegg was the subject of a number of county court judgements for unpaid debts.

