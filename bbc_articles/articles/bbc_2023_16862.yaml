  His brother, fellow Spandau Ballet member, former EastEnders star and Gogglebox regular Martin Kemp, added: "Thank you so much for showing me how much fun we could get out of life."

  Actress and anti-knife crime campaigner Brooke Kinsella said: "No one believed in us working class children more. She changed the course of so many lives.

  "More scared of her than my mum and dad combined, I owe everything to her. What a remarkable woman."

  Kidulthood and Adulthood star and rapper Adam Deacon added: "She helped me and so many other working class kids coming from a bad start to not only get a chance to have a shot in the acting industry and change our lives, but also grounded us and gave us the skills and the tools we needed to get by in life.

  "Thank you for everything Anna. For all the wisdom and resilience you installed in us. You always had the warmest heart and the strongest of morals.

  "You were never judgmental and would always go out of your way to help anyone. You're a legend and will always be remembered."

  Palmer, who played Bianca Jackson in EastEnders, said Scher's death was "a big one for me".

  In a long post on Instagram, she called her teacher "extraordinary", saying: "Most of us kids would've never had the opportunity to be actors or writers or had a career in entertainment. She gave us that, but with real hardcore training in so many thing, it wasn't just the acting, it was the discipline, the patience, the dealing with rejection.

  Anna Scher, pictured with Kathy Burke, won at The Sky Women In Film & Television Awards in 2011

  "She had no place for racism or homophobia and if the kids expressed any of this you were out, no chances and believe me after waiting two years on a waiting list it taught even the naughtiest kids (there were plenty until they got there).

  "Her approach was gentle but firm, kind but quirky."

  Scher was born in Cork, Ireland and moved to London as a teenager with her family. She trained as an English and drama teacher and founded a lunchtime drama club at the school where she worked in Islington.

  She told Islington Faces in 2016 that two of the children who tuned up were Quirke and Robson, who went on to star in BBC comedy series Birds of a Feather.

  Scher was inspired to found her theatre school, and by 1975 she had 1,000 pupils and 5,000 on the waiting list.

  Its other alumni include Phil Daniels, Dexter Fletcher, James Alexandrou, Gillian Taylforth, Reggie Yates, Susan Tully and Dizzie Rascal.
