id: bbc_2024_7225
title: 'West Belfast: Man and woman released on bail following stabbing - BBC News'
date: '2024-04-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68778139
content: |-
  A man in his 20s was found in the Ballymurphy area of west Belfast with serious stab wounds.

  A 38-year-old man and a 35-year-old woman who were arrested on suspicion of attempted murder have been released on bail.

  They were arrested after a man in his 20s was stabbed in the face, body and arms in Ballymurphy in west Belfast in the early hours of Wednesday, April 10.

  Police were contacted at about 02:45 BST by paramedics treating a man for stab wounds in St Bernadette's Avenue.

  The man suffered serious but non life-threatening injuries.

  Police are continuing with their enquiries.
