  The charges stem from the shooting of Ta'Kiya Young, 21, last August in a suburb of Columbus, Ohio.

  US police officer pleads not guilty to murdering pregnant woman

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A police officer has appeared in court to plead not guilty to murdering a pregnant woman in Ohio. Ta'Kiya Young, 21, was around 25 weeks pregnant when she was shot last August. Her unborn daughter also died. On Wednesday, a judge set bond at $250,000 (£194,866) for Connor Grubb, the accused Blendon Township police officer. He posted bond the same day, court records show. The 29-year-old has been charged with four counts of murder, two counts of involuntary manslaughter and four counts of felonious assault. His lawyers say he fired in self-defence.

  A grand jury found sufficient evidence to charge him on Tuesday. Bodycam video of last year's fatal encounter showed police approaching Ms Young in her car and attempting to stop her from driving away, so they could question her about alleged shoplifting. In the video, Ms Young appeared to drive toward the officer who fired the fatal shot as he commanded her to exit the car. Ms Young was suspected of shoplifting alcohol from a Kroger grocery store, investigators say. Detailing Mr Grubb's self-defence argument, his lawyers said: "When viewed through the eyes of a reasonable police officer, the evidence will show that our client's actions were justified, when there is video evidence that Officer Grubb was being hit by a moving vehicle." The local chapter of the Fraternal Order of Police (FOP) labour union on Tuesday slammed the indictment as "politically motivated". "We stand firm in advocating for an impartial justice system that focuses on truth and facts, not politics," said chapter president Brian Steel. "Like all law enforcement officers, Officer Grubb had to make a split-second decision, a reality all too familiar for those who serve to protect our communities," he also said, adding decisions were often made under "extreme pressure and often in life-threatening situations".

  Responding to the indictment, Blendon Township Police Chief John Belford said the force was immediately beginning a disciplinary process, in which it would review the facts and then decide the best course of action against the officer. "I want to be very clear: we're not passing any judgement on whether Officer Grubb acted properly. We haven't seen the evidence," Chief Belford said. A lawyer representing Ms Young's family, Sean Walton, called the arrest a "solemn victory in the pursuit of justice" and "yet another symbol of the urgent need for reform in police conduct and accountability". “The actions that led to the death of Ta’Kiya - the unnecessary aggression, the chilling commands that amounted to ‘comply or die’ - were there for us all to witness in dreadful clarity," he said. Ms Young's grandmother, Nadine Young, told CBS News that the past year had been very difficult for the family, including Ms Young's two young sons. "It's been agony, it's been like a whirlwind of hurt and pain," she said. Video from the 24 August 2023 encounter shows the two officers speaking with Ms Young for about one minute before the shot is fired. Both officers were in the car park for an unrelated call. Ms Young was the mother of two boys, aged six and three. She was due to give birth in November.
