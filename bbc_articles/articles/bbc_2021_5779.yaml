  Each stage has been separated by a gap of several weeks to allow scientists to assess the impact of previous changes, which in stage two included the reopening of non-essential shops and outdoor service in pubs and restaurants.

  The government has to be satisfied that its four tests have been met before progressing to the next stage.

  These tests rest on the successful rollout of vaccines; evidence that jabs are reducing serious illness and death; infection rates being under control and the risk from coronavirus variants not changing.

