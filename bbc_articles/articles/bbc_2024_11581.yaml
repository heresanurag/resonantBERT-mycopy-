  The Home Office has offered to pay for any additional private security he may need under a new scheme that allows electoral candidates to request funding for security during campaigning activities. Candidates have been told the Home Office "will consider requests for security on a case-by-case basis, judging each request on its own merits". Tuesday's incident is the second against Mr Farage in eight days. Politicians from other parties have condemned the "intimidation" of electoral candidates. Home Secretary James Cleverly said such acts of violence had no place in politics and "should be condemned by everyone". Following the incident, Mr Farage said he would not be "bullied or cowed" by people who want to stop his election campaign. "That’s never going to happen," he added on X. The recent incident comes after Victoria Thomas Bowen, 25, was charged with assault after throwing a milkshake over Mr Farage in Clacton-on-Sea. She is due to appear at Colchester Magistrates' Court on 2 July charged with assault by beating and criminal damage. Mr Farage also had a milkshake thrown at him during a campaign walkabout in Newcastle in 2019.

  Mr Farage announced earlier this month that he would again take up the role of Reform UK leader, having previously been in the position three years ago.
