title: Man charged after objects thrown at Nigel Farage - BBC News
date: '2024-06-12'
section: UK
url: http://www.bbc.co.uk/news/articles/c722578eyero
content: |-
  The incident occurred while the Reform UK leader was campaigning in Barnsley.

  A man has been charged with using threatening behaviour after objects were thrown at the Reform UK party leader Nigel Farage. The incident occurred while Mr Farage was on an open-top bus, campaigning in Barnsley, South Yorkshire, on Tuesday. Police said Josh Greally, 28, had been charged with using threatening, abusive, insulting words and behaviour with intent to cause fear. Mr Greally, from Clowne, Derbyshire, been released on bail to appear at Barnsley Magistrates' Court on 26 June. A man in a red hoodie could be seen shouting from a construction area, before reaching into a bucket and throwing objects, both of which missed. Mr Farage, speaking later while campaigning in Ashfield, Nottinghamshire, said the incident was "pretty nasty".

