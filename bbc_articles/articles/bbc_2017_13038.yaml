  Rolling updates as the UK and the EU seek to make a breakthrough on the Northern Ireland border.

  Scottish First Minister Nicola Sturgeon has been talking to the BBC about today's Brexit developments.

  She says no-one wants to see a hard border on the island of Ireland and suggests the "unhealthy influence" of the DUP at Westminster was a major factor in the apparent failure to finalise an agreement.

  If the concept of a distinct status for Northern Ireland is borne out in the final phase one agreement, she says "this will change everything".

  Quote Message: The bottom line is the UK government appears to be accepting parts of the UK can effectively stay within the single market, so if that's good enough and possible enough for Northern Ireland there's no reason why it can't be the case for Scotland." The bottom line is the UK government appears to be accepting parts of the UK can effectively stay within the single market, so if that's good enough and possible enough for Northern Ireland there's no reason why it can't be the case for Scotland."
