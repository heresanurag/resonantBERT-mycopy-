title: Stalybridge Aldi car park find could be human bones - BBC News
date: '2017-11-22'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-42079047
content: |-
  Police think the supermarket car park where the suspected remains were found was a burial ground.

  The bones were dug up on Tuesday afternoon in the car park at Aldi in Stalybridge

  Suspected human remains have been dug up in a supermarket car park.

  Workmen unearthed the bones outside a branch of German discount giant Aldi in Stalybridge, Greater Manchester, on Tuesday afternoon.

  Speculation has been rife among locals, but police believe the site may once have been a burial ground connected to a former chapel.

  Greater Manchester Police (GMP) said tests were being carried out to confirm if the remains were human.

  A photograph shared on Facebook showed workmen and onlookers peering down a large hole surrounded by fencing.

  Police are awaiting the results of tests following the discovery

  The discovery prompted reaction on social media, with many making reference to the 2013 discovery of the remains of English king Richard III in a car park in Leicester.

  Twitter user Jane Browne posted: "Wow, which king is it this time?"

  A Facebook user speculated the remains could be related to a burial site connected to a former Methodist church in the town.

  Edyth O'Connor wrote: "I remember the old cemetery around that area. It was all boarded up whilst they removed the remains."

  Norma Roberts said: "Canal street methodist [church] was where Aldi is now, and yes it was boarded up while all graves were removed to new locations. Or should have been."

  GMP said a team of archaeologists and anthropologists were examining the findings.

