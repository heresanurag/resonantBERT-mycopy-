title: Families tell BBC new Ofcom social media rules not tough enough - BBC News
date: '2024-05-08'
section: UK
url: http://www.bbc.co.uk/news/live/uk-68972494
content: |-
  Bereaved families whose children's deaths were linked to social media are sharing their stories with the BBC.

  We're going to wrap up our live coverage now detailing the new rules for tech firms designed to keep children safe online.

  This morning we heard from the Ofcom chief, technology secretary and bereaved families whose children's deaths were linked to social media.

  They shared their stories with BBC Breakfast and also outlined their thoughts on the new rules, after they wrote to Rishi Sunak and Sir Keir Starmer to say the measures don't go far enough.
  • You can watch the special hour-long segment back on BBC iPlayer here
  • If you would like to read more about the new Ofcom rules, you can read our news story here
  • While here's our explainer on the Online Safety Act and how to keep children safe online

  Thanks for joining us.
