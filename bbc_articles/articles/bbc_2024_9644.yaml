title: Remy Gordon and Kami Carpenter jailed for life over Cody Fisher's murder -
  BBC News
date: '2024-04-08'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/live/uk-england-birmingham-68741472
content: |-
  Cody Fisher was killed on the dance floor of the Crane club in Birmingham on 26 December 2022.

  Cody Fisher's mother, Tracey, said today he had inspired many young people and adults through his coaching.

  She has previously told how her football-obsessed son's first words had included ball and football and that he instantly took to the sport.

  He started at Redditch United at the age of about four and went on to join Birmingham City's academy and then Walsall as a full-time apprentice.

  He missed out on a professional contract at the club and then played at non-league Stratford Town, Stourbridge Town and Bromsgrove Sporting while also working as a PE teacher at schools, and was a qualified barber.

  "He'd come home and talk about the children and how much, just how much fun he'd had with them and how so many had come on," she said.

  "Even the teachers that I'd spoke to when I went into the school at Christmas, they've even had a mural painted in the playground of Cody.

  "That he inspired so many children that didn't believe in themselves, you know, that really didn't believe that they could achieve anything, and they certainly achieved it with him."
