id: bbc_2019_13455
title: Boris Johnson announces new business policy at CBI conference - BBC News
date: '2019-11-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50460811
content: |-
  Boris Johnson says the Conservative party will postpone further cuts to corporation tax if elected.

  Boris Johnson said that planned cuts to corporation tax next April are to be put on hold.

  The prime minister told the CBI conference the move could cost the Treasury £6bn and the cash would be better spent on the "nation's priority".
