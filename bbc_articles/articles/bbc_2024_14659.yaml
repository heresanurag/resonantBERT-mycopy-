title: Project Konstantin founder Peter Fouché dies in Ukraine - BBC News
date: '2024-07-01'
section: London
url: http://www.bbc.co.uk/news/articles/cp38xlkk5pzo
content: |-
  Peter Fouché died last week while working as a combat medic in Ukraine, his charity said.

  Peter Fouché died while working as a combat medic, Project Konstantin said

  The British founder of a charitable organisation providing support to frontline soldiers in Ukraine has died "like a hero in the battlefield". Peter Fouché, 49, from Fulham, west London, died on 27 June while working as a combat medic on the front line in east Ukraine, his organisation Project Konstantin said. It said in a statement on social media: "There are no words that can do Pete’s life justice." The organisation, which was founded in 2022, provides vehicles, drones, uniforms and food to soldiers in Ukraine.

  Halyna Zhuk, commercial director and co-founder of Project Konstantin, said Mr Fouché "lived like a hero and died like a hero in the battlefield".

  In a statement released on Monday, the organisation said: "It is with the heaviest of hearts that we announce the passing of Pete, our beloved director and founder. "There are no words that can do Pete’s life justice. No words or phrases that could ever encapsulate how much he meant to all of us. "Pete's unwavering dedication, endless compassion, and relentless commitment to Ukraine and her people have left an everlasting impact on the countless lives he touched.

  Project Konstantin said it would continue Mr Fouché's work

  "His heroism knew no bounds. He was actively involved in saving more than 200 wounded Ukrainian soldiers, evacuating civilians from the most dangerous frontline cities, as well as bringing humanitarian aid to people in those towns and cities. "Pete’s bravery and selflessness in the face of danger were nothing short of extraordinary, and his actions will forever be etched in our hearts."

  A spokesperson for the Foreign, Commonwealth and Development Office confirmed it was supporting the family of a British man who died in Ukraine.
