title: 'Brazil: Torrential rain triggers deadly mudslides in Brazil - BBC News'
date: '2022-02-17'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-60407747
content: |-
  Landslides and flash flooding have left a trail of destruction and many dead in Petrópolis, Brazil.

  Landslides and flash flooding have killed at least 71 people in the Brazilian city of Petrópolis, leaving a trail of destruction after a month's rainfall fell in three hours.

  Footage from the area shows destroyed hillside houses and vehicles that have been washed away by the floodwaters.

  On Wednesday, officials said dozens of people had been killed. Search and rescue teams are continuing to look for survivors.
