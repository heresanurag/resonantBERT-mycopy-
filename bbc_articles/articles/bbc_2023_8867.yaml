title: 'Australia: Watch ‘curious’ whale swim alongside kayaker in Sydney - BBC News'
date: '2023-06-26'
section: General
url: http://www.bbc.co.uk/news/world-australia-66016582
content: |-
  Drone footage shows a humpback whale swimming alongside a kayaker near Bondi Beach in Australia.

  Drone pilot Jason Iggleden captured footage of a humpback whale following a kayaker near Bondi Beach in Sydney, Australia.

  A record 5,092 whales were spotted from various points along the New South Wales coast on Sunday, as part of an annual census conducted during the migration season.
