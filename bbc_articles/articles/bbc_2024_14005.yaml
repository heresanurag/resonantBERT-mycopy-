title: Patsy Aust's brother appears in court charged with her murder - BBC News
date: '2024-06-05'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cy005lpk4l5o
content: |-
  Jim Moore, 85, was in court after the retired teacher, 81, was found dead at a house in Bangor on Sunday.

  Patsy Aust was found dead in a house in Bangor on Sunday

  The brother of a retired teacher from Bangor has appeared at Newtownards Magistrates' Court charged with her murder. Patricia "Patsy" Aust, 81, was found dead at a house in Hawthorne Court in the County Down city on Sunday. Dressed in a grey sweat top and trousers, Jim Moore, 85, with an address of Clandeboye Place in Bangor, spoke only twice to confirm his address and that he understood the charge against him. Giving evidence to the court a police detective said he was aware of the facts and circumstances of the offence, and he believed he could connect Mr Moore to the charge.

  The judge ordered the defendant to appear before court again on 26 June.
