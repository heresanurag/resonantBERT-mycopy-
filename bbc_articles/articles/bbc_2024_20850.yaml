  Prof Yunus, who was sentenced to six months in jail in January for violating labour laws, has said he too was a victim of Ms Hasina's ire. He has faced other allegations in the past, going back to 2011 when he was accused of defaming Bangladesh's politicians. In 1983, he started Grameen Bank, which offers micro, long-term loans to help poor people start small businesses - a concept that has since taken off around the world. He was accused of tax evasion and serving at Grameen Bank beyond the mandatory retirement age, which led to him being sacked - but Prof Yunus maintained that these were baseless charges. He, along with the bank, was awarded the Nobel Peace Prize in 2006 for showing that "even the poorest of the poor can work to bring about their own development". He became known internationally as the "banker to the poor", but Ms Hasina called him a "bloodsucker" of the poor and accused his bank of charging exorbitant interest rates. It was never clear what was the origin of the feud with Ms Hasina, but many believe it was his unsuccessful efforts to set up a political party.

  Ms Hasina is still in India but it's unclear yet if that is her final destination. Analysts believe that is unlikely despite her having been a close ally of Indian Prime Minister Narendra Modi. India, which shares a 4,096-km (2,545-mile) border with Bangladesh, will be averse to alienating the new government in Dhaka. Delhi has deployed additional troops along the border, its foreign minister S Jaishankar said. Foreign leaders called on Bangladesh to uphold democracy after Prof Yunus's appointment was announced. "Any decisions that the interim government makes, they need to respect democratic principles... to uphold the rule of law [and] reflect the will of the people," US Secretary of State Antony Blinken said. Australian foreign minister Penny Wong asked all parties to refrain from violence and "respect universal rights".
