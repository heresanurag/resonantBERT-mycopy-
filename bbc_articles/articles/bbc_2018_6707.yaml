title: 'E3: Battlefield V creator resists gender attacks - BBC News'
date: '2018-06-13'
section: General
url: http://www.bbc.co.uk/news/technology-44463924
content: |-
  The developer of the WWII game dismisses criticism of it placing a woman on the war's front line.

  The developer of the WWII video game Battlefield V has been attacked by some gamers for placing its female protagonist on the war's front line.

  But at the E3 games expo in Los Angeles, the studio involved assured the BBC's Cody Godwin that it has no regrets about the decision.

  Read and watch all our coverage from E3 at bbc.co.uk/e3
