  Judge Cottage told Zou: "You are a highly manipulative and intelligent young man, but you have no understanding of the meaning of consent. "There is a high level of danger because of your distorted thinking. You are a risk for an indefinite period."

  One woman was raped after Zou pushed her to drink excessive amounts of alcohol and would not let her leave his flat. In a victim impact statement, she wrote the attack had "deeply affected" her personality. She said: "I have lost faith in human beings, I have no trust in others. Before this incident, I was not aware that a human could do such evil things. "When I meet with strangers, I get flashbacks of what he did." A second identified woman, who is now living in China, was also raped by Zou in his student flat near Russell Square in October 2021 when she was unconscious. She said: "I know words will never fully convey the depth of this wound. But one thing is certain, what happened that night is etched into my soul forever. "His face, his expression - they will never leave me. I will never forgive him."

  He paid £4,000 a month to rent his luxury flat

  Commander Kevin Southworth, from the Metropolitan Police said: "I hope the fact Zou can no longer harm others serves as a small amount of comfort to the women who have suffered immeasurably. "I would also like to take this opportunity to stress that our investigation remains open and we continue to appeal to anyone who may think they have been a victim of Zou. "Please come forward and speak with our team - we will treat you with empathy, kindness and respect." Saira Pike, of the Crown Prosecution Service, said Zou was a "serial rapist and a danger to women" and that "his life sentence reflects his heinous acts". She added: "I'd like to take this opportunity to once again express my heartfelt thanks to the courageous women who came forward to report Zou's horrific crimes. "They have been incredibly strong and brave - there is no doubt that their evidence helped us to secure his conviction, and the life sentence handed to him today."
