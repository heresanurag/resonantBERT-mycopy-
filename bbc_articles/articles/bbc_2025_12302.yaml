title: PhD student Zhenhao Zou, who raped 10 women, jailed for 24 years - BBC News
date: '2025-06-20'
section: London
url: http://www.bbc.co.uk/news/articles/c4g8dy38qxjo
content: |-
  Zhenhao Zou, who drugged and raped women in London and China, has been called "one of the most prolific predators" in the UK.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  A Chinese PhD student named by police as "one of the most prolific predators" in the UK has been sentenced to life with a minimum term of 24 years. Zhenhao Zou, a Chinese national, drugged and raped three women in London and another seven in China between September 2019 and May 2023. Three of the 10 victims have been identified, prosecutors say, but Metropolitan Police detectives fear he could have targeted dozens more and have appealed for potential victims to contact them. Since the trial, 24 women have come forward. During sentencing, Judge Rosina Cottage KC said the defendant was a "very bright young man" who used a manipulative "charming mask" to hide that he was a "sexual predator".

  At the sentencing hearing at Inner London Crown Court, Judge Cottage told Zou: "You appear to the world to be a very well-to-do man. You are also a sexual predator." She said Zou had "planned and executed a campaign of rape", treating the women "callously" and as "sex toys" for his own pleasure, which had had "devastating and long-term effects". Judge Cottage added Zou had a "sexual interest" in "asserting power and control over women", and that the victims had been "pieces in an elaborate game" for the defendant, who had "no understanding of the meaning of consent".

  Since an appeal was launched, 24 women have come forward

  During sentencing, she added: "You told (the victims) that resistance was futile. "Sometimes you would be begged to stop. You sought power over them - these women you treated callously - and used them as sex toys for your pleasure." Judge Cottage said the court had watched videos of the rapes which had been "extremely distressing". "Some who watched, wept," she said. Zou, who was living in Elephant and Castle, south-east London, was convicted of 11 counts of rape, with two of the offences relating to one victim. He was also convicted of three counts of voyeurism, 10 of possession of an extreme pornographic image, one of false imprisonment and three of possession of a controlled drug with intent to commit a sexual offence. He kept a trophy box of women's belongings and filmed nine of the rapes, as the victims lost consciousness. Det Insp Richard Mackenzie from the Met Police said Zou was "one of the most prolific predators we have ever seen".

