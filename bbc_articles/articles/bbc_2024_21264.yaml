content: |-
  American Sydney McLaughlin-Levrone smashes her own world record to win Olympic 400m hurdles gold in Paris.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  American Sydney McLaughlin-Levrone smashed her own world record as she stormed to a sensational Olympic 400m hurdles gold in Paris. The anticipated title showdown with Dutch star Femke Bol never seriously materialised as McLaughlin-Levrone left her rivals far behind to defend the title in 50.37 seconds. Bol, the second-fastest woman of all-time in the event, faded to finish third in 52.15, behind US silver medallist Anna Cockrell, who ran a personal best 51.87. McLaughlin-Levrone improved her world record to 50.65 in June, but she saved her best for the sport's biggest stage to claim her sixth global title. Together, McLaughlin-Levrone and Bol have run 17 of the 20 fastest times in history.

  As defending champion and world record holder, it was McLaughlin-Levrone who entered their latest meeting as favourite, hinting at this form by improving her best time two months ago. However, Bol had shown progress of her own, setting an indoor 400m flat world record this year and a new European 400m hurdles record of 50.95 in July to become only the second woman to run under 51 seconds over the barriers. Bol produced a sensational sprint finish to take the Netherlands from fourth place to gold in the mixed 4x400m relay earlier in the Games, but on this occasion the 24-year-old did not have the legs to trouble a jubilant McLaughlin-Levrone. "My whole family's here. We're going to celebrate, we're going to enjoy this time and get ready for the relay too," said McLaughlin-Levrone, who celebrated her 25th birthday on Wednesday. "It's amazing to see our sport continue to grow, for people to want to watch the 400m hurdles, it's amazing." She spoke of what it had taken to achieve her gold mission, saying: "Just a lot of hard work put in this year. I knew it was going to be a tough race. An amazing competition all the way round."

  Sydney McLaughlin-Levrone is now a double Olympic champion in 400m hurdles

  Elsewhere, Arshad Nadeem made history by winning Pakistan's first Olympic gold in athletics - throwing a Games record of 92.97m in the men's javelin. USA's Grant Holloway beat compatriot Daniel Roberts to take the men's 110m hurdles title and upgrade his silver from Tokyo, while another American - Tara Davis-Woodhall - won the women's long jump.

