  Stokes doubtful for first Test against Pakistan

  Ben Stokes has not played for England since the end of July

  England captain Ben Stokes is a doubt for the first Test against Pakistan in Multan as he continues to recover from a hamstring injury. Stokes, 33, has been out since the beginning of August, missing the 2-1 series victory over Sri Lanka. England trained in Multan for the first time on Friday. All-rounder Stokes batted in the nets and bowled a handful of deliveries off a few paces. He indicated last week he is unlikely to bowl at the beginning of this three-match series, which gets under way on Monday. Opener Zak Crawley told BBC Sport: "He seems to be going well, recovering well from his injury. "We don't know just yet. I think he's got to do a few more tests, but he's been doing some running and stuff." If Stokes is fit to play, but not bowl, England will have a decision on how to balance their side. Against Sri Lanka they played five specialist bowlers, which would mean leaving out one of their regular top order.

  To avoid dropping a batter, or even leaving out wicketkeeper Jamie Smith and handing the gloves to Ollie Pope, England could play four specialist bowlers and lean on Joe Root's off-spin. Curiously, balancing the side might be easier if Stokes is ruled out completely. Pope would continue to deputise as skipper, Smith could remain at six, leaving space for the five bowlers, which seems particularly necessary in temperatures of around 36 degrees. Crawley said the Multan pitch currently has a "green tinge", so England may feel the need for three seamers and two spinners. With pace bowler Olly Stone set to leave the tour for his wedding and Josh Hull ruled out of the tour with a quad injury, Brydon Carse could be in line for a Test debut, possibly vying for a place in the side with Durham team-mate Matthew Potts. "We've got a really deep squad, with plenty of options with the ball and with the bat as well," added Crawley. "We've got bowlers who can bat really well, as proven in the summer. We feel ready. Whatever team comes out, it will be a nice balance either way." Crawley is also returning from an injury after spending more than two months out with a broken finger. The 26-year-old damaged the little finger on his right hand attempting a slip catch as England wrapped up a 3-0 series win over West Indies at Edgbaston in July. He was unable to hold a bat for five weeks, then returned to training just over two weeks ago. Though Crawley believes he is fit to return to his usual fielding position of second slip, he has been given medical advice to refrain from doing so yet. "I feel brand new," he said. "I'm looking forward to getting out there. I've certainly missed it, so I can't wait to get out there again with the boys. "I've come back with a new hunger. I feel like I've got a lot of energy. No one wants any time out and I wouldn't choose to do it again, but I've taken some positives from it for sure." Test Match Special will have live ball-by-ball commentary of England's tour of Pakistan on BBC Sounds, the BBC Sport website and app, and BBC Radio 5 Sports Extra.
