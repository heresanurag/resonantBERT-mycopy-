id: bbc_2018_13806
title: Theresa May avoids resignation question - BBC News
date: '2018-11-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46319275
content: |-
  Prime Minister Theresa May said her focus was "on getting this deal through", during a special BBC Radio 5 Live programme.

  Prime Minister Theresa May would not be drawn on a question about her resignation.

  Speaking to Emma Barnett BBC Radio 5 Live in a special programme, she said:

  "My focus is on getting this deal through".
