title: 'Tour de France 2027: UK to host historic dual Grand Departs - BBC Sport'
date: '2025-03-20'
section: Cycling
url: http://www.bbc.co.uk/sport/cycling/articles/c4gpyqp4g1zo
content: |-
  The men's and women's Tour de France will both begin in Britain in 2027, with Edinburgh to stage the men's Grand Depart.

  Edinburgh to stage start of Tour de France in 2027

  Tadej Pogacar was the men's champion at the 2024 Tour de France

  The men's and women's Tour de France will both begin in Britain in 2027, with Edinburgh to host the men's Grand Depart. Scotland, Wales and England will put on a stage in each of the events, with route details and the Grand Depart for the Tour de France Femmes to be announced in the autumn. The men's version of the world's most famous cycling race has been partly staged in Britain four times before, in 1974, 1994, 2007 and 2014. This will be the first time both men's and women's events have come to the same nation outside France in the same year. Crowds at the roadside for the three English stages in 2014 were estimated at 4.8 million. Scotland hosted the inaugural UCI Cycling World Championships in 2023 with around one million spectators turning out over 11 days of action. Organisers say the staging in Britain will "deliver long-lasting benefits for thousands of people by tackling inactivity, improving mental wellbeing, boosting economic growth and supporting communities to thrive". They add it will help "inspire a new generation of cycling fans and riders while boosting cycle tourism".

  The UK, Scottish and Welsh governments have been key partners in the arrangement, along with British Cycling and UK Sport. Scotland's First Minister John Swinney said: "It is a tremendous honour to welcome the Tour de France to Scotland. We know it is one of the most iconic and inspiring contests in sport, and that Scotland provides the perfect stage for major events." Culture Secretary Lisa Nandy added: "Staging the Tour de France Femmes for the first time will be an historic occasion and inspire the next generation of female cyclists while supporting our mission of breaking down barriers for women and girls to get more involved in sport." The first men's Tour de France was held in 1903 and the former British winners are Bradley Wiggins (2012), Chris Froome (2013, 2015, 2016, 2017) and Geraint Thomas (2018). The Tour de France Femmes was launched in 2022. Last year's men's Grand Depart took place in Florence, with the 2026 race starting in Barcelona. In 2024, the women's race had its first Grand Depart outside France, with Rotterdam the host city. Christian Prudhomme, general director of the men's Tour de France, described Edinburgh as a "magical city". He added: "In the Tour de France, what is very important is the helicopter shots. So Edinburgh and Scotland will offer a magnificent backdrop."
