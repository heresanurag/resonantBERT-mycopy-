id: bbc_2018_1207
title: Firefighter catches child from burning building - BBC News
date: '2018-01-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42698308
content: |-
  Footage captures the moment a child was dropped from a burning building in Georgia.

  Footage of a dramatic rescue has been released by the DeKalb County Fire Rescue Department in Decatur, Georgia.

  A fire broke out in an apartment building on 3 January but the video has only just been released.

  At least 12 people, including a number of children, were injured but none of them seriously.
