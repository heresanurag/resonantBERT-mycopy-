  Mr Welby has spoken openly of his own mental health struggles. He revealed he was suffering from depression last year in a Thought for the Day broadcast on BBC Radio 4's Today programme and separately said he was taking anti-depressants.

  Speaking this week to the BBC's religion editor Martin Bashir, he described "an overwhelming sense the world is getting more and more difficult and gloomy".

  Explaining how his own mental health has affected his behaviour, he said: "You turn inwards on yourself a lot. You become, frankly, narcissistic. And when you have good friends or family who spot it, they can say 'might it not be an idea to talk to someone'. Which I did."

  He added: "There is nothing pathetic about it. It is no more pathetic than being ill in any other way. And we just need to get over that."

  Both the archbishop's parents were alcoholics and he said his childhood was "disturbing" and "chaotic". Later, while working in business, his seven-month-old daughter Johanna died in a car crash.

  "As we will see as the recession takes hold, loss, grief, and anxiety are traumas. And trauma has to be gone through. You can't do it just with the stiff upper lip."

  He said the whole country had been "compulsorily fasting" and that had caused "huge suffering" for many.

  Asked what how he hoped Britain would recover after the coronavirus crisis, he said: "We don't do it with austerity. We don't do it with class fighting. We do it with community and the common good. And we're not afraid of spending money that will produce a better society."

  The archbishop has chosen to repeat a theme that runs through his book "Dethroning Mammon" published four years ago: that wealth is not an idol to be worshipped but an asset to be deployed for the benefit of all people.

  He's likely to enrage some politicians who will dismiss his remarks as irresponsible and failing to acknowledge the damaging effect of large deficits.

  But he does have particular insights into the impact of austerity - with the Church of England educating one in five primary school children, running vast numbers of food banks and engaged in a range of social projects that seek to support the young and the old in deprived and disadvantaged areas of the country.

  It is why he believes the burden of rebuilding post-pandemic Britain must not "fall upon the shoulders of those who are already turning up at food banks".
