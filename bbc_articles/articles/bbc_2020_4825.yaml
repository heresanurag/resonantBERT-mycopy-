title: 'Coronavirus: Archbishop Justin Welby says austerity would be catastrophic
  - BBC News'
date: '2020-05-17'
section: UK
url: http://www.bbc.co.uk/news/uk-52692142
content: |-
  The Archbishop of Canterbury warns against austerity, saying it would be a "terrible mistake".

  The Archbishop of Canterbury has warned cuts to public spending after coronavirus "would be catastrophic".

  The Most Reverend Justin Welby called for politicians to be "brave and courageous" as they sought to deal with the economic and social consequences of the lockdown.

  In response to spiralling public debt he said "going for austerity again would be the most terrible mistake".

  Estimates suggest the crisis could cost up to £298bn for this financial year.

  The Office for Budget Responsibility which keeps tabs on government spending, made the estimate for the figure for the final bill, for April 2020 to April 2021.

  The prime minister reportedly told backbench Conservative MPs on Friday there was "no question" of cutting public sector pay.

  Boris Johnson has previously insisted the costs of the crisis would not mean a fresh round of austerity, saying: "That will certainly not be part of our approach."

  Mr Welby, who worked as an oil executive before being ordained, was speaking to the BBC ahead of Mental Health Awareness Week.

  He called on government ministers to invest in mental health services and for a royal commission to be set up on social care.

  "Borrowing costs are the lowest they've ever been in our entire history. Spending money on mental health will have a positive rate of return," he said.

  "We can do it now in a way we've never been able to [before]. We must be brave and courageous in setting our vision for what society will be."

  He went on: "Just because we're in the middle of a crisis, it doesn't mean that we can't have a vision for a future where justice and righteousness are the key stones of our common life.

  "So we fund mental health; we have a commission of inquiry into what we learn from this - not to blame, but to learn; we have a royal commission on how we look after social care."

