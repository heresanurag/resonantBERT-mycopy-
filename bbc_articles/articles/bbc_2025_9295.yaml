title: Second man charged over Chris Brown nightclub disturbance - BBC News
date: '2025-05-17'
section: England
url: http://www.bbc.co.uk/news/articles/crmkjv20km3o
content: |-
  The R&B star and a second man have both been charged over an alleged assault at a London nightclub.

  Chris Brown has been remanded in custody over the alleged assault

  A second man has been charged in connection with an alleged assault at a London nightclub involving R&B star Chris Brown. US national Omolulu Akinlolu - the artist known as HoodyBaby - was due to appear at Manchester Magistrates' Court charged with grievous bodily harm with intent, the Metropolitan Police said. Brown, 36, appeared at the same court on the same charge on Friday and was remanded in custody. He is accused of using a bottle to cause grievous bodily harm to music producer Abe Diaw at the Tape club in London's Mayfair in 2023.

  Brown, who was arrested at Salford's Lowry Hotel on Thursday, will next appear at London's Southwark Crown Court on 13 June. The American singer was scheduled to perform in Amsterdam on 8 June, before heading to Germany then embarking on dates in the UK. Akinlolu, a rapper and producer, and Brown are known to be friends and have collaborated on a range of musical projects.

