  Championship top-two fight will go to wire - Wilder

  Tyrese Campbell (right) scored Sheffield United's winning goal against Preston North End on Saturday

  Sheffield United manager Chris Wilder expects the battle for automatic promotion to the Premier League to go all the way. With 10 games of the Championship season to go the Blades are level on points with table-topping Leeds United and two points ahead of third-placed Burnley. Wilder's side were five points behind the Whites just two weeks ago when Daniel Farke's men came back from behind to win 3-1 at Bramall Lane. "This is going to be how it is right the way through, I've said all along it's an accumulation of points," he told BBC Radio Sheffield. "We're old enough and experienced enough to know we have to get our heads down and work extremely hard for every result, and I mean every result, because there are no easy games in this division. "This is the unpredictability of the Championship." He added: "We have to concentrate 100% on ourselves, getting the job done and getting as many points as we possibly can. If it's enough, then fabulous, and if not then we'll have to address the next situation." The Blades, who beat Preston North End 1-0 on Saturday, will go top on Tuesday if they beat Bristol City at Bramall Lane. However, if the Clarets back up their 4-0 win over Luton Town with another home success over play-off chasing West Bromwich Albion at Turf Moor on the same night, and Sheffield United fail to beat the Robins, they will return to the division's summit instead. Leeds host Millwall on Wednesday looking to return to winning ways after their 17-match league unbeaten run was ended by Portsmouth on Sunday.

  Along with League One leaders Birmingham City, the Blades have claimed the joint-most wins in the EFL this season with 24. They would be top of the second tier now but started the season on minus two points for defaulting on payments to other clubs in the 2022-23 season. Wilder said after the win over Preston that it "absolutely does my nut in", external that the table does not denote United have had two points deducted. He is looking to lead his boyhood club to promotion for a third time across two spells and said he is "delighted" with where they are heading into the final part of the season. "What we've done on the pitch has been outstanding really," he added. "I'm delighted in terms of the position we're in. If it was easy as people make it out to be then why isn't everyone else at the top of the league winning matches? It isn't easy. "Everyone talks about the Championship and the challenges it poses. "To win any division in any country you have to do a lot of things right, and we're going to have to do that between now and the end of the season."
