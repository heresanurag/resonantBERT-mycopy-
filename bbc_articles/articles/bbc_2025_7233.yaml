  Golden retriever Ned helps to shape the paths in the RHS and BBC Radio 2 Dog Garden by running through plants.

  For the first time, a dog has been involved in designing a garden at the RHS Chelsea Flower Show.

  Monty Don's golden retriever, Ned, helped to design the shape of paths in the RHS and BBC Radio 2 Dog Garden by running through plants.

  The show opens in the grounds of the Royal Hospital Chelsea from Tuesday 20 May.

