  Craig Ballentine was arrested in Abu Dhabi airport in October because he posted critical comments about his former employer in Dubai.

  Craig Ballentine made an emotional return home after being detained in Dubai.

  The Cookstown man was arrested in Abu Dhabi airport in October because he posted critical comments about his former employer in Dubai.

  Speaking at Dublin Airport, he said the last couple of months had been overwhelming and confusing.

  He was greeted at the airport by his friend Sean.

