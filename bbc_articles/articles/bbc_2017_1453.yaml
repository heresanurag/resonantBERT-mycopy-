title: Driving to Greece's snowed-in migrant camps - BBC News
date: '2017-01-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-38592039
content: |-
  The BBC's Howard Johnson made a video diary of his journey to migrant camps in northern Greece.

  As a cold snap continues to affect Greece, thousands of homeless refugees and migrants remain at risk of exposure to the bad weather.

  Despite treacherous conditions our reporter Howard Johnson attempted to drive to Thessaloniki in northern Greece where some refugee camps have been inundated with snow. Here’s a video diary of his journey.
