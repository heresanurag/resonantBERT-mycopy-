title: Oxford Circus Tube pusher Brwa Shorsh jailed for eight years - BBC News
date: '2024-10-11'
section: London
url: http://www.bbc.co.uk/news/articles/ce8v4467806o
content: |-
  A man who pushed a postman in front of an oncoming Tube train is jailed after being convicted of attempted murder.

  Man jailed for pushing postman on to Tube tracks

  This video can not be played To play this video you need to enable JavaScript in your browser. Brwa Shorsh is seen shoving Tadeusz Potoczek onto the track

  A man who pushed a postman in front of an oncoming Tube train has been jailed for life, with a minimum of eight years. Brwa Shorsh, 24, was found guilty of attempted murder after shoving Tadeusz Potoczek, 61, off the southbound Victoria line platform at Oxford Circus station on 3 February. The victim, who narrowly missed touching the live rail, was helped off the tracks by a passerby who was awarded £1,000 by the judge at Inner London Crown Court. The Crown Prosecution Service said it was "impossible to imagine anything that could ever justify pushing anyone in front of a train like that".

  Brwa Shorsh was sentenced at Inner London Crown Court

  Shorsh, a Kurdish migrant who gave evidence through an interpreter, had claimed he was "angry" at Mr Potoczek as he felt as though the postman had given him a dirty look. Maxine Jarrousse-Jones, of the CPS, said: "Brwa Shorsh attempted to kill the victim by deliberately and forcefully pushing him into the path of an approaching train. “If not for the victim’s quick-thinking, the courage of the other passenger who came to his rescue and the speed at which the train driver brought the train to a halt, Shorsh’s actions could have cost the victim his life. “Commuters should be able to travel freely without fear of violence or harm and I hope this sentencing is a reminder that such acts will not be tolerated and will be prosecuted as fully as the law allows.”

  Det Ch Insp Sam Painter said: “I am pleased with today’s result and wish to thank everyone involved in the investigation who quickly worked to identify and arrest Shorsh. “As reflected by the life sentence handed down, Shorsh is an extremely dangerous individual who is thankfully now off the streets and behind bars. “It is hoped that this will provide some comfort and closure to his victim who continues to work toward his recovery from this terrifying encounter with Shorsh.”
