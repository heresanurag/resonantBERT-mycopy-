content: |-
  Yostin Mosquera appears at the Old Bailey charged with murdering Paul Longworth and Albert Alfonso.

  Man in court after men's remains found in cases

  Yostin Mosquera, 34, Albert Alfonso, 62, and Paul Longworth, 71, pictured on a boat in Colombia

  A man has appeared at the Old Bailey charged with murdering two men whose remains were found in suitcases at Bristol's Clifton Suspension Bridge and at a London flat. Yostin Andres Mosquera, of Scotts Road, Shepherd’s Bush, west London, is accused of murdering Albert Alfonso, 62, and Paul Longworth, 71, between 8 and 10 July in the London borough of Hammersmith and Fulham. The defendant, a Colombian national, appeared via video link and was remanded into custody. He listened intently as his Spanish interpreter relayed proceedings. Mr Mosquera is set to next appear at the same court for a plea hearing on 2 October.

  Prosecutor Teresa Hay, also appearing in court by video link, formally accused Mr Mosquera of killing the two men. She told the court she was not aware of any links the defendant had to the UK other than through the deceased. Mr Longworth was British and Mr Alfonso was originally from France with British citizenship.

  Human remains were found at a house in Shepherd's Bush

  Ms Hay told the court Avon and Somerset police had been called to the Clifton Suspension Bridge in Bristol shortly before midnight on 10 July, where officers had discovered human remains in suitcases that were linked to an address in Shepherd’s Bush, west London. Police entered the London address, in Scotts Road, where they found more remains, the prosecutor said. Following a high-profile search, the defendant was arrested on Saturday at 02:15 BST at Bristol Temple Meads train station. Mr Mosquera’s defence barrister, Edward Hetherington, also appearing via video link, did not make an application for bail.
