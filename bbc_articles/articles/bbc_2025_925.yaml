content: |-
  From Baby Shark, the Harlem Shake and Gangnam Style, the online site has been part of our lives for 20 years.

  YouTube at 20: Fame has made life easier, says Charlie Bit Me star

  The star of Charlie Bit My Finger, all grown up

  What do Baby Shark, the Harlem Shake and Gangnam Style have in common? But what's not in doubt is that they all went viral on YouTube, which is now 20 years old. It's become the place where 2.5 billion people log on monthly to kill time, be entertained and, sometimes at least, learn something. But it's also been life-changing for some of its breakout stars, like Charlie. You wouldn't recognise him now but millions around the world have watched him, as a baby, chomping on his big brother's digits. That's because he's the star of Charlie Bit My Finger. "It was never not a part of my life, it's always been there," Charlie, who's now 18, tells BBC Newsbeat. The 55-second clip has had almost 900 million views since it was uploaded in 2007.

