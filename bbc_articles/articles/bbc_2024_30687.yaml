content: |-
  Several weather warnings have been issued as the first snow of the season hit parts of the UK.

  The first snow of the season hit parts of the UK overnight, with people in some areas waking up to a winter wonderland.

  Motorists and commuters are being warned of possible disruption, while hundreds of schools have closed in England and Wales due to the heavy snowfall.

  Scotland recorded its coldest early winter temperatures since 1998, while snow has been falling in the Home Counties and in central London too.
