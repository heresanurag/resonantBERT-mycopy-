content: |-
  2024 was the deadliest year in the Channel, with 77 people known to have drowned trying to cross.

  Small boat crossings lead to 36,816 people arriving in Kent during 2024

  Home Office figures released on New Year's Day show 36,816 people crossed the English Channel in small boats throughout 2024, an increase on the previous year, but not as many as in 2022. The last group, made up of 291 people, arrived on 29 December. The year 2024 was the deadliest on record for the crossings, according to a United Nations agency. The government said it was working with the French authorities to try to stop the small boats.

  The total for 2023 was 29,437 people, while 2022 is still the busiest year on record with 45,774 arrivals. More than 150,000 people have made the journey since 2018. According to French figures, 77 people are known to have died attempting the crossing in 2024. Enver Solomon, chief executive of the Refugee Council, said: "The record number of deaths in the Channel this year should serve as a stark reminder that the current approach is not working. "More safe and legal routes are needed to provide a lifeline for those fleeing war and persecution. "The government needs to take a different approach if it is to ensure everything possible is done so that 2025 does not see a repeat of last year's devastating loss."

  According to Home Office figures, 695 small boats were used in successful English Channel crossings throughout 2024

  A plan by the previous government to deport migrants arriving illegally in the UK to Rwanda in Africa was abandoned by Labour days after the general election in July 2024. Shadow home secretary Chris Philp said: "These figures make clear Labour has totally failed on illegal immigration by small boat. "The National Crime Agency warned that a removals deterrent was needed, and the law enforcement alone would not be enough. This means Labour made a catastrophic mistake by cancelling the Rwanda removals to deterrent before it even started. A Home Office spokesperson said: "Every life lost at sea is a tragedy, which is why our efforts are focused on saving lives, as well as protecting our borders. "The people smuggling gangs only care about profit and we are seeing their behaviour adapt, with more people crammed into flimsy and dangerous boats. "Our joint work with France in preventing crossings is about stopping people putting themselves and others at risk."
