title: 'Arson attacks: 15 vehicles damaged in Carryduff and Saintfield - BBC News'
date: '2024-03-28'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68685074
content: |-
  Eight cars and a lorry were damaged at a property in Carryduff and six cars were damaged in Finaghy.

  Police said nine vehicles were either burnt out or badly damaged in Carryduff

  A total of 15 vehicles have been damaged in two separate arson attacks on the outskirts of Belfast.

  Eight cars and a lorry were either burnt out or badly damaged at a property on the Old Saintfield Road in Carryduff at about 22:00 GMT on Wednesday.

  In Finaghy in south Belfast, six cars were severely damaged.

  This was after an accelerant was poured inside a commercial yard in Diamond Gardens at about 01:00 GMT on Thursday.

  The arson attack in Carryduff happened on the Old Saintfield Road

  A fence was also damaged in the attack.

  The Police Service of Northern Ireland (PSNI) are investigating the two attacks and have appealed for information.
