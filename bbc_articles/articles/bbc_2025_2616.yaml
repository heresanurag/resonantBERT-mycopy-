title: 'AstraZeneca: Government hits back in funding row with pharmaceutical giant
  - BBC News'
date: '2025-02-04'
section: Business
url: http://www.bbc.co.uk/news/articles/c4gx2k35k7do
content: |-
  The firm scrapped its £450m investment despite the government's offer of support, the government says.

  The government has defended its negotiations with AstraZeneca, after the pharmaceutical giant ditched a planned £450m investment last week, blaming a shortfall in government funding. Science minister Sir Chris Bryant told Parliament that the government had made a "significant offer" of support to the firm, but doing more "simply didn't add up for the taxpayer". AstraZeneca's decision had been "deeply disappointing", Sir Chris said. The shadow science minister, Alan Mak, said the government had destroyed the deal, costing the UK jobs.

  "Securing this deal was a big test of Labour's economic credibility, and they have failed," said Mak. The pharmaceutical giant announced its decision to cancel its planned investment just two days after Chancellor Rachel Reeves set out Labour's plan to go "further and faster" to boost economic growth. She named AstraZeneca in her speech as an example of one of the "great companies" that was investing in the UK. The project would have seen an expansion of its vaccine manufacturing plant in Speke, Merseyside. But AstraZeneca said that following "protracted" talks with the government, it would not be going ahead with the investment, although existing production and jobs would be maintained. The firm said a number of factors had led to the decision including "the timing and reduction of the final offer compared to the previous government's proposal". Sir Chris said the company had decided to lower the amount it was investing in research and development. "AstraZeneca were going to put in £150m of R&D. They then decided to cut that to something like £90m of R&D. That was their decision based on their own investment decisions," he told MPs. The government had subsequently made AstraZeneca an offer that was "remarkably close to the £90m the previous chancellor had offered... but that, for whatever set of reasons, didn't get it over the line," he said. Plans to expand AstraZeneca's site at Speke had been set out by the previous Conservative Chancellor Jeremy Hunt in last March's Budget. But reports later emerged that talks over the plans between the new Labour government and the company had run into delays. Sir Chris insisted AstraZeneca had not lost confidence in the UK and still invested more than £2.5bn in the UK economy every year. "AstraZeneca aren't leaving. People aren't losing their jobs over this... there are still 10,000 people employed by AstraZeneca in the UK," he said.
