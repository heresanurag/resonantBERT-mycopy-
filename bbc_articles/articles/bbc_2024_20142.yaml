  However, despite rave reviews and several Bafta nominations it very nearly didn't get made at all, with Davies describing it as a "hard sell" due to its subject matter. "It's about people dying and a tough piece of work," he said. The series also boasted many celebrity fans who lavished it series with praise. Graham Norton described it as "the best five hours of television I've seen in years", while Sir Elton John said it was "a triumph of creativity and humanity".
