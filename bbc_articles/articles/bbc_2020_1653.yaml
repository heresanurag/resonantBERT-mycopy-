title: 'Kelly-Anne Case murder: Killer who blamed mystery man jailed - BBC News'
date: '2020-02-04'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-51357444
content: |-
  Brendan Rowan-Davies cut Kelly-Anne Case's throat before setting her house on fire in Gosport.

  Kelly-Anne Case was found dead at her home by firefighters on 30 July

  A killer who tried to blame the death of a mother-of-three on a mystery man has been found guilty of her murder.

  Brendan Rowan-Davies tortured Kelly-Anne Case before cutting her throat and setting her house on fire on 30 July.

  He attempted to film the 27-year-old victim having sex with his friend the night before her body was found bound with cable ties at her home in Gosport.

  The 29-year-old was also convicted of arson. He was jailed for life with a minimum term of 30 years.

  Rowan-Davies, who has learning difficulties and was assisted by an intermediary throughout the trial at Winchester Crown Court, had claimed he interrupted the "real killer".

  The judge, Mr Justice Garnham, described Rowan-Davies' attack on Ms Case as "sadistic" and "a truly dreadful crime".

  Brendan Rowan-Davies shook his head as the verdicts were read out

  The court heard the defendant had known Ms Case for some time and told her he "fancied" her while they were drinking vodka and taking cocaine on the night before her death.

  She laughed off his advances and had sex with his friend that same evening, with Rowan-Davies telling jurors he used his phone to try and film the pair through a gap in the bedroom door.

  He told the court he left the house but later returned to retrieve some tobacco the following morning and was confronted by a knifeman who had already killed Ms Case.

  Rowan-Davies was filmed heading towards the victim's house on a bus before the murder

  Rowan-Davies, of Haslar Road, Gosport, said he managed to escape the man and run downstairs, before collecting his tobacco and leaving the house.

  However, prosecutors said evidence from CCTV and witnesses suggested he must have been in the house at the time of the killing and no-one else was seen or heard leaving the property.

  Ms Case's naked body was found by firefighters on a bed, with her wrists bound with cable ties bearing the defendant's DNA.

  Prosecutor William Mousley QC said the attack was sexually motivated and at least eight shallow neck wounds were inflicted before the murder in order to "control, coerce or terrify Kelly-Anne".

  The court heard Ms Case was "alone and vulnerable" after her three daughters were placed in the care of others with the assistance of social services.

  Ms Case's body was found in an upstairs bedroom at the house in Grange Crescent, Gosport

  Ms Case's mother, Caroline Tebb, said her daughter had been "brutally, savagely and sadistically" taken from her by a "sick, vile excuse for a human being".

  The judge said the defendant had not immediately killed Ms Case, but instead used the knife to inflict "extremely painful" injuries before cutting her throat.

  He told Rowan-Davies: "You found Ms Case asleep. She was vulnerable and defenceless.

  "You attacked her, tying her arms together with cable ties. She was at your mercy and you showed her none."

