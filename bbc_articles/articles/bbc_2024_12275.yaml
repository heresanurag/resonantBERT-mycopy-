title: Villagers speak of shock after boy, 16, killed by falling tree - BBC News
date: '2024-06-18'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/cmmmd0j3lv4o
content: |-
  Three people have been arrested, including two on suspicion of manslaughter.

  Shock in village after boy killed by falling tree

  Police remained at the scene on Monday

  Villagers have spoken of their shock over the death of a 16-year-old boy who was killed by a falling tree in Nottinghamshire. The boy was pronounced dead after police were called to Rotherham Baulk, in Carlton-in-Lindrick, at about 11:20 BST on Saturday. Three people have been arrested in connection with the death, including two men - aged 28 and 31 - held on suspicion of manslaughter. Floral tributes have been left at the scene, with residents saying they "couldn't believe" what had happened.

  A police cordon was put in place around a boarded-up property in Rotherham Baulk

  Nottinghamshire Police said a 28-year-old woman was also arrested on suspicion of assisting an offender. The suspects remain in custody. A cordon was still in place around a boarded-up house on Monday, while two police cars and welfare unit van were parked outside. The remains of a felled tree could be seen in the front garden of the property. Local resident Rebecca – who did not wish to give her surname – said she "couldn't believe" what had happened. She told the BBC: "We heard about this tree incident in Carlton on the radio this morning, just as we were dropping my friend's child off at school. "I can't believe what's happened. I just don't understand how it could have happened. "It's very sad to see. I only live around the corner but I've been away and just got back. It's so sad."

  Flowers, balloons and other tributes were left at the scene

  The village, which is close to the Yorkshire border, is about three miles (4.8km) to the north of Worksop and 17 miles (27km) east of Sheffield. Rebecca added: "To walk past something like this and to see it, it's just so sad how it's happened – for the neighbours, for the family that it's happened to. I wasn't expecting to see this. "I've never seen anything like this before so to walk past, your heart goes out to the people that it's happened to." One resident – who asked not to be named – said: "There was a helicopter going over and we could hear the sirens on Saturday night. I don't know what's happened but it's very sad." Another neighbour added: "It's awful what's happened. It must be heartbreaking for the family." Det Insp Simon Harrison said the death was a "tragic incident", and said the boy’s family were being supported by specialist officers. Officers have appealed to anyone with information that could help with the investigation to make contact. Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk , externalor via WhatsApp, external on 0808 100 2210.
