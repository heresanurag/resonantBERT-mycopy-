  • None The Red Devils scored with both of their shots on target in the match.
  • None Huddersfield have won only one of their last 19 FA Cup matches against sides in the top flight (D4 L14).

  Huddersfield resume their bid for Premier League survival when they travel to bottom club West Bromwich Albion on Saturday, 24 February (15:00 GMT).

  Manchester United, meanwhile, are in Champions League action as they travel to Sevilla for the first leg of their last-16 match on Wednesday, 21 February (19:45 GMT).
