title: Rotherham theft suspect snared after car, foot and bike chase - BBC News
date: '2024-04-11'
section: General
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-68791541
content: |-
  A police officer gives chase in Rotherham - after a passer-by offers his bike.

  A man has been arrested after a "strange" pursuit in which a police officer ditched his car in favour of a passer-by's bike in Rotherham.

  The chase started after the driver of a Range Rover Evoque was asked by police to stop on Dalton Lane on Wednesday.

  The driver reversed down several roads, drove at 80mph in a 30mph area and then crashed, South Yorkshire Police said.

  A man fled the scene on foot, with the officer in hot pursuit - and an observer offered him his bike.

  The 25-year-old suspect was eventually arrested in a garden on suspicion of theft of a motor vehicle.

  Insp Matthew Collings said: "A huge thank you to the member of the public who lent our officer their bike.

  "Knowing we have the support of our communities is a great feeling."

  South Yorkshire Police asked for anyone with information to contact them.

