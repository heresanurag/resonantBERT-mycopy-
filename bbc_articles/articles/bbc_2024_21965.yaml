title: 'Irish Open: Rory McIlroy blows four-shot lead as Rasmus Hojgaard wins at Royal
  County Down - BBC Sport'
date: '2024-09-15'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/czxdd6dy7zno
content: |-
  Rory McIlroy is denied a fairytale win in front of his home fans as Rasmus Hojgaard produces a storming finish to win the Irish Open by one shot in a hugely dramatic final round at Royal County Down.

  McIlroy was unable to take Hojgaard into extra holes in a nerve-shredding conclusion at Royal County Down

  Rory McIlroy was denied a fairytale win in front of his home fans as Rasmus Hojgaard produced a storming finish to win the Irish Open by one shot in a hugely dramatic final round at Royal County Down. Overnight leader McIlroy led by four shots early in the round but dropped shots at 15 and 17 proved costly as Hojgaard birdied four of the last five holes to shoot 65 and snatch his fifth DP World Tour title. With the Dane having posted a nine-under total, McIlroy needed to eagle the last hole to force a play-off but his putt slipped by on the right edge. Hojgaard, brilliant on the day, surged to the finish line with the highlight of his back-nine 31 a brilliantly holed bunker shot at the par-four 17th. While the 23-year-old - who emulates countryman Soren Kjeldsen's triumph at this course in 2015 - can celebrate a superb victory, it is yet another agonising near-miss for McIlroy in a season where he has squandered a golden chance to win the US Open and an Olympic medal slipped through his grasp. "I felt like I was in control of the tournament for most of the day. I felt I was playing really solid and doing what I needed to do. Making a lot of pars, making the odd birdie," he said. "Then obviously the two bogeys on 15 and 17 opened the door for someone to have a good finish like what Rasmus did on the last few holes." Italy's Matteo Manassero finished third on seven under with England's Dan Brown a further shot back in fourth after a closing 66 in which he finished with six straight pars.

