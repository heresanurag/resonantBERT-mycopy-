title: Fifty countries affected by USAID freeze, says WHO chief - BBC News
date: '2025-02-12'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/czj3z290ngyo
content: |-
  HIV treatments and other services have been disrupted, says Dr Tedros Adhanom Ghebreyesus.

  Fifty countries affected by USAID freeze, says WHO

  Programmes to tackle HIV, polio, mpox and bird flu have been affected by the freeze on tens of billions of dollars of overseas aid from the US, says the head of the World Health Organization (WHO). US President Donald Trump has taken steps to close the United States Agency for International Development (USAID), arguing that its spending is "totally unexplainable". However, WHO chief Dr Tedros Adhanom Ghebreyesus has urged the Trump administration to consider resuming aid funding until other solutions can be found. HIV treatments and other services have been disrupted in 50 countries, he said at a briefing on Wednesday.

  Speaking publicly for the first time about the freeze on US aid funding, at a virtual press conference in Geneva, Dr Tedros said: "There are actions that the US government is taking... which we're concerned are having a serious impact on global health." In particular he pointed to the suspension of PEPFAR, the President's Emergency Plan for Aids Relief, which he said had halted HIV treatment, testing and prevention services in 50 countries. He added that a reprieve for life-saving services had not stopped the disruption. "Clinics are shuttered and health workers have been put on leave," Dr Tedros said. Experts in global health have warned of the spread of disease, as well as delays to the development of vaccines and new treatments as a result of the cuts.

  Trump has argued that USAID is "incompetent and corrupt". He recently announced huge cuts to the agency's 10,000-strong workforce and the immediate suspension of almost all of its aid programmes. The agency spends about $40bn (£32bn) - about 0.6% of total US yearly government spending - on humanitarian aid, much of which goes towards health programmes. The vast majority of USAID money is spent in Asia, sub-Saharan Africa and Europe, where it is primarily used for humanitarian efforts in Ukraine. Elon Musk, the tech billionaire who is working on the White House's effort to shrink the size of the federal government, has previously claimed that the aid agency is "a criminal organisation". Neither Trump nor Musk have provided clear evidence to support their claims.

  As well as the freeze on USAID, President Trump has taken steps to withdraw the United States from the WHO. Under the Biden administration the US was the largest funder of the UN's health agency and in 2023 it contributed almost one-fifth of the agency's budget. Dr Tedros said Trump's decision was affecting collaboration between countries on global health threats. He also said the US had reduced its reporting of bird flu cases in humans. The WHO says it has employed emergency measures similar to those used during the Covid pandemic to fill the gaps where there are shortages - in life-saving antiretroviral medication, for example, which is used to treat people living with HIV. Meg Doherty, director of global HIV, hepatitis and sexually-transmitted infection (STI) programmes at the WHO, said efforts were being made to co-ordinate the sharing of vital supplies of medicines between countries. However, she said a better, long-term solution was needed: "We have been seeking support from country to country for sharing, but this is a short-term approach."
