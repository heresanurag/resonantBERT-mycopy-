id: bbc_2023_11732
title: 'Watch: CCTV shows John Lewis shoplifter loading speaker in bag - BBC News'
date: '2023-08-03'
section: General
url: http://www.bbc.co.uk/news/uk-wales-66394123
content: |-
  Brazen shoplifting attempt caught on CCTV as John Lewis staff use bodycams to deter theft, violence.

  A man can be seen grabbing several smart speakers off a shop shelf, loading them into a bin bag and walking off in a brazen shoplifting attempt caught on CCTV.

  John Lewis has given its staff bodycams and "de-escalation" training to defuse tensions when shoppers react angrily.

  It comes as violence towards shop staff in Cardiff went up by 30%, according to the Welsh Retail Consortium, while shoplifting spiked by 68%.

  The Home Office said it had invested a record amount into policing but retailers have demanded tougher laws.
