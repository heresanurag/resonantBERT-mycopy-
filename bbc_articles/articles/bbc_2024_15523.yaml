title: 'Newspaper headlines: Southgate resigns and Starmer "to take brakes off building"
  - BBC News'
date: '2024-07-17'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c147pvlx7njo
content: |-
  Gareth Southgate's resignation and the King's Speech feature on many of Wednesday's front pages.

  Southgate resigns and Starmer 'to take brakes off' building

  Will Eddie Howe be the next England manager?

  The Daily Mail, external says Sir Keir Starmer is launching a "fresh assault" on the planning system in the King's Speech on Wednesday. The paper says a new bill in the speech will curb residents' rights to object to controversial building schemes. Sources also tell the paper that areas of green belt land considered "low quality" will be classified as grey belt and released for development. According to the Times, external, the bill will mean councils will have to identify land for their housing needs, and there will be a "presumption" in favour of development. Locals will be able to agree the style of housing, but not block plans. Councils that fail to outline their housebuilding plans quickly could see ministers stepping in to impose blueprints for building more homes soon. The Guardian, external reports that senior civil servants warned former Prime Minister Rishi Sunak a week before he called the election that he needed to take urgent action on the prison overcrowding crisis or risk breaching his legal responsibilities. The paper notes that senior civil servants felt the crisis was so severe that their boss, Simon Case, chaired emergency Cobra meetings on the issue. The Daily Telegraph, external has a photo of Donald Trump and Boris Johnson after their meeting at the Republican National Convention in Milwaukee. The paper reports that the former prime minister used the meeting to urge Mr Trump not to abandon Ukraine if he's re-elected, in the wake of his decision to pick JD Vance, who strongly opposes American support for the war, as his running mate.

  Gareth Southgate's decision to call it a day as England manager - and the issue of who will replace him - features in many of the papers. The Daily Mirror, external calls him a "man of honour", and says he's bowing out with his reputation intact... but without the trophy the nation craves. "Thank you Gareth... for everything" is the Sun's front page headline, external, echoing Southgate's farewell sign-off. Though it notes on its back page, external that "nervous" Newcastle have issued a "hands-off" warning to England over their manager Eddie Howe, who's being seen as a leading contender to replace Southgate. The Daily Express, external thanks Southgate for "taking us to the edge of glory". It too says the Football Association face a fight if it wants to prise Eddie Howe away from Newcastle to become the new England boss. The Daily Mail, external suggests Southgate's departure has sparked a frantic global scramble to replace him. It says the Argentinian Mauricio Pochettino, and the German Thomas Tuchel are both potential candidates.

