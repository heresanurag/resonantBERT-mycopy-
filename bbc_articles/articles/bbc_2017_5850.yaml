title: 'Recap: DUP deal agreed - and May gives detail on EU citizens - BBC News'
date: '2017-06-26'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-40403501
content: |-
  Reaction to DUP deal to back the Conservatives in government - and more detail on EU citizens' rights after Brexit.

  Business group says many questions on EU citizens' rights remain

  Stephen Martin, Director General of the Institute of Directors, said: “Employers will welcome the constructive clarity of intent offered today and businesses look forward to the UK and EU finally getting down to concrete discussions. “An aim is obviously not the same thing as a guarantee. Even today, many of the important details are absent, including information on the registration process for EU citizens and when the cut-off date will be. More fundamentally, employers still don’t know what will happen to their EU staff if no deal is reached, questions remain as regards whether or what salary thresholds will apply for workers and their families wanting to remain in the UK. Many EU citizens work part of the year in the UK and part overseas, so will not easily be able to prove their right to remain due to interrupted periods of residence. “The offer of a two year grace period after we leave for these workers to acquire their right to settled status is welcome, but two years may not be enough and five years would be better. The obligation on individuals who have previously received permanent residency to re-apply must be made as bureaucracy-free as possible, for employers and the individuals concerned alike."
