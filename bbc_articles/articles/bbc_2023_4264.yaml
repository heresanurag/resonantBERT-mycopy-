content: |-
  Constance Marten and Mark Gordon are being held on suspicion of gross negligence manslaughter.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A post-mortem examination is to be held after the remains of a baby were found as police continue to question Constance Marten and Mark Gordon.

  The baby's body was discovered after a huge 48-hour search by hundreds of officers and volunteers near Brighton.

  The couple, who had been missing for 53 days, were arrested on suspicion of gross negligence manslaughter.

  Police say they are doing all they can to establish what happened to the baby, whose sex and age are not known.

  Detectives began a search for the couple after a car was found on fire by the side of a motorway near Bolton in Greater Manchester in early January.

  They were arrested on Monday after being spotted by a member of the public who alerted police. They were first held on suspicion of child neglect, but were re-arrested on Tuesday on suspicion of gross negligence manslaughter.

  Police officers at a set of allotments in Brighton on Thursday, near to where the remains of a baby were found

  Det Supt Lewis Basford from the Metropolitan Police, the force which is leading the investigation, said a baby's body had been discovered close to where the couple were arrested.

  "This is an outcome that myself and that many officers who have been part of this search had hoped would not happen," he said.

  "I recognise the impact this news will have on many people who have been following this story closely and can assure them that we will do everything we possibly can to establish what has happened."

  The baby was found on Wednesday after an extensive search covering around 90-square miles involving sniffer dogs, drones and thermal cameras.

  A heavy police presence has remained close to where Ms Marten and Mr Gordon were arrested, with allotments at the centre of the search cordoned off.

  A blue forensic tent was positioned in Golf Drive, Brighton, which leads to the allotments, and uniformed officers have been seen entering the cordoned off areas.

  On Wednesday, police were granted an extra 36 hours to question the couple.

  People have been laying flowers in memory of the baby

  A missing persons investigation surrounding 35-year-old Ms Marten and Gordon - a convicted rapist and registered sex offender - began when their car was found alight near Bolton on 5 January.

  It triggered a national search and there were reported sightings in Liverpool, Essex and London, mostly limited to brief snatches of CCTV footage.

  Police believe they were sleeping outdoors in a tent and living off-grid, prompting fears for the health of the child in winter temperatures.

  The last confirmed sighting of the couple prior to their arrest was in Newhaven on 8 January. Their baby was with them and alive at that time, police said previously.

  Ms Marten is from a privileged background and lived in a stately home growing up.

  She became estranged from her family in 2016 after meeting 48-year-old Gordon at drama school.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  They were detained at a convenience store on Monday night after a member of the public recognised them from media appeals and called the police.

  Officers were on the scene within six minutes and every member of police staff available in the region was drafted in to begin the massive search operation.

  Hundreds of officers and rescue volunteers were seen probing the wide area inch by inch for signs of life or clues about the baby's whereabouts.

  It continued through the night and into Wednesday, with sniffer dogs, helicopters, drones and thermal cameras all in use.

  The fingertip search conducted in near-freezing temperatures extended east of Brighton to Newhaven, north of the town centre into a nature reserve and beyond to the South Downs.

  Witnesses told the BBC they had seen teams searching through thick bramble, allotments and bins, while people living in the area were told to look out for anything unusual.

  After confirming the discovery of a body, Det Supt Basford urged the public not to speculate about the case.

  Constance Marten and Mark Gordon disappeared with a newborn baby more than seven weeks ago

  Update 12 April 2023:This article was amended to make clear that the baby's sex was unknown, not its gender as we originally reported.
