title: Boardmasters in Newquay in August 2025 to have increased security - BBC News
date: '2024-11-06'
section: Cornwall
url: http://www.bbc.co.uk/news/articles/c0mz8nmmvd3o
content: |-
  Organisers of the Newquay music festival announce increases in security measures for the 2025 event.

  The organisers of Boardmasters said there would be 50% more high visibility security patrols

  Organisers of an annual music festival in Newquay have confirmed they have increased security measures for the 2025 shows. Boardmasters said in a Facebook post, external it was boosting security personnel to "crowd and behaviour management positions" by 20% for the event taking place between 6-10 August. The festival will have 25 more entry lanes which organisers said would enable deeper searches of visitors' belongings, 25% more watchtowers manned 24-hours a day, and 50% increase in high-visibility security patrols. On the Friday night of the 2024 Boardmasters event in August seven people were taken to hospital with injuries after there was a crowd surge.

  The annual festival takes place at Newquay in Cornwall

  In its Facebook post, Boardmasters said it would be sharing updates on changes for next year's event over the next few days and weeks. Organisers added there would be 50 buses for the park and ride and the drop-off area would be closer to the gates. The post on Facebook also said changes would be made to camping facilities for next year's event including a "chilled zone" which would have a noise curfew of 23:00 BST. The artist line-up for 2025's festival has not yet been revealed.
