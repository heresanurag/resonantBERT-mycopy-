title: 'West Park death: Two arrested after girl''s body found - BBC News'
date: '2018-04-14'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-43754146
content: |-
  Two boys, aged 16 and 17, have been arrested on suspicion of murdering Viktorija Sokolova.

  Viktorija Sokolova died from blunt force trauma to the head

  Two teenage boys have been arrested on suspicion of murder after a girl's body was found in a park.

  Viktorija Sokolova was discovered in West Park, Wolverhampton on Thursday.

  West Midlands Police said the 14-year-old had been reported missing the previous day and a post-mortem investigation found she died from blunt force trauma to the head.

  The suspects, aged 16 and 17, were arrested at addresses in the city.

  The victim was born in Lithuania and her family is being supported by specialist officers, the force said.

  West Park remains sealed-off for forensic searches to take place and is to stay closed over the weekend.

  Det Ch Insp Edward Foster said a number of people had come forward with information.

  However, officers have continued to appeal for witnesses.

  The death has also been referred to the Independent Office for Police Conduct (IOPC), as is normal procedure, as the girl had been reported missing.

  The body was found in West Park in Wolverhampton

  Neighbours have spoken of their shock at the death.

  One local resident, Kash Shenar, 52, said: "It's just horrific."

  Police patrols have been stepped up in the area.

