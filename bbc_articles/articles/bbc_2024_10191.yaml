title: Slovak PM Fico attends cabinet meeting before being shot - BBC News
date: '2024-05-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-69017193
content: |-
  Mr Fico was shot a number of times as he was leaving the meeting in the town of Handlova.

  Footage shows Slovak Prime Minister Fico attending a government meeting in the town of Handlova.

  He was shot a number of times as he was leaving the meeting, in what officials called an assassination attempt.

  Slovakia's president-elect Peter Pellegrini has said he is horrified by the attack, echoing many other European leaders.
