title: 'World Cup 2018: England fans praise ''hero'' players - BBC News'
date: '2018-07-12'
section: General
url: http://www.bbc.co.uk/news/uk-england-44803586
content: |-
  England may be out of the World Cup but fans and celebrities are showering the team with praise.

  England's bid to reach a first World Cup final since 1966 may be over - but these fans are optimistic about the future.
