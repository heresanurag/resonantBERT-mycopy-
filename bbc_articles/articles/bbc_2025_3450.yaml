content: |-
  Gianluigi Donnarumma saved two of the three penalties he faced during Paris St-Germain's shootout win against Liverpool.

  Why is Donnarumma so good at saving penalties?

  It is the life of a goalkeeper. One day you are the villain. The next, you are the hero. Gianluigi Donnarumma was blamed by some for Paris St-Germain's defeat by Liverpool last week, allowing Harvey Elliot's 88th-minute effort - the Reds' only shot on target - to slip in. At the other end, the Italian's opposite number Alisson produced the "performance of his career" as he single-handedly kept the French side at bay in Paris. Italy's Donnarumma was the hero, saving two of Liverpool's three penalties in a shootout to send his side through to the Champions League quarter-finals. "The first game belonged to Alisson, the second game belonged to Donnarumma," said PSG boss Luis Enrique.

  Donnarumma has now won six of the seven penalty shootouts he has taken part in for club and country. Since making his debut aged 16 for boyhood club AC Milan, Donnarumma has faced 60 penalties across his club and international career. He has saved 14 of those, giving him a save percentage of 23.3%. The 26-year-old has saved 10 of the 43 spot-kicks he has faced during shootouts - a save percentage of 23.3%. Donnarumma, who was player of the tournament after Italy's 2021 Euros triumph, saved penalties from Bukayo Saka and Jadon Sancho in the final against England at Wembley. His full record for penalties faced during matches and in shootouts is 24 saves from 103 penalties.

  Donnarumma missed Luis Enrique's pre-shootout team talk as he headed down the tunnel, choosing instead to retrieve some pre-prepared notes from the dressing room about Liverpool's spot-kicks. "I had prepared something with my trainer, it was right to take something back to try to save some penalties," said Donnarumma. "I see a lot of criticism from journalists without knowing what the goalkeeper's job is. "In the first leg we conceded a shot and a goal, it seemed like it was my fault but I always think about smiling, giving my best and working for the team."

  But unlike many of his peers, he has a slightly different tactic for penalties. Many goalkeepers use the moments before a penalty is taken to attempt to 'get into the head' of the taker - slowing down the taking of the penalty, retrieving the ball for the taker or moving along their line. Laidback and calm, the Italian barely moves until the player puts the ball on the spot. Just as they are readying their run-up, he expands his arms to make the goal look as small as possible. "The idea behind that is to stand as slim as you can to start with," former Liverpool defender Stephen Warnock told Football Daily. "The ball goes on the spot, now you're putting doubt in their mind, you spread yourself, make yourself big and awkward, making the goal look smaller. "You don't do that when they're walking forward. You do it when the ball is on the spot to put doubt in their mind in the last seconds." Donnarumma remained level-headed after both of his penalty saves, barely celebrating as he prepared for the next. "I'm sat here watching Donnarumma and thinking, 'Wow, look at the size of him!'" Warnock added. "How imposing is he in that goal? If he dives the right way he stands a great chance of getting it. The guy's a monster."
