title: 'England v Japan: Steve Borthwick defends playing style despite poor run -
  BBC Sport'
date: '2024-11-22'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cvg4jy87jj4o
content: |-
  England head coach Steve Borthwick urges his players to persist with an attacking style of play despite three defeats this autumn.

  I want England to be brave with the ball - Borthwick

  Steve Borthwick will face his predecessor Eddie Jones when England host Japan on Sunday

  Coverage: Listen to live commentary on BBC Radio 5 Sports Extra and BBC Sounds, follow live text commentary on the BBC Sport website and app

  England head coach Steve Borthwick has urged his players to persist with an attacking style of play despite three defeats this autumn. Borthwick's team are on a five-match losing run after being beaten 29-20 by world champions South Africa last weekend. But the England boss wants his side to be "brave with the ball" as they prepare to face Eddie Jones' Japan on Sunday. "We are trying to play the game a different way," he told BBC Sport. "I am encouraging the players to be brave with the ball, to move the ball, that’s where the strength of the team now is and where it is going to be in the future." This shift in style is in direct contrast to the more attritional approach England adopted in Borthwick’s first year in charge, which culminated with a third-placed finish at the Rugby World Cup in France. After losing twice narrowly to New Zealand on tour in July, England failed to capitalise on winning positions in the games against New Zealand, Australia and South Africa this month. Despite these matches all being in the balance on the hour mark, England have faded in the final quarter, with Borthwick desperate for his side to play with confidence and conviction for 80 minutes. "You’ve seen the way the team is trying to play now. You see the ball movement in the last 12 months that has changed with this team, and the way they can score wonderful tries," Borthwick explained. "There have been a few moments [at the end of games] when we aren’t throwing the final pass. "I am backing the players to continue to play with the ambition, courage and bravery to throw that final pass."

  Meanwhile Borthwick has defended the decision to bring flanker Tom Curry back into the starting XV, a fortnight after being knocked out against Australia. It was Curry’s second concussion of the season, while the 26-year-old missed the bulk of last season with a career-threatening hip injury. "The health and wellbeing of the players is paramount," Borthwick said. "Post the game against Australia, Tom went through all the protocols, which are very stringent protocols. "He has had a number of consultations with independent specialists. He is a man who is desperate to play this weekend. I am very confident in the medical and strength and conditioning team we have."

  Sale prop Asher Opoku-Fordjour started in England A's 38-17 win over Australia A last weekend

  Curry's return is one of two changes to the starting XV, with Freddie Steward making way for George Furbank at full-back, while there has also been a re-shuffle on the bench. Replacement fly-half Fin Smith is set for his first appearance of the autumn, while Sale's 20-year-old prop Asher Opoku-Fordjour will make his England debut if he comes on. England are looking to bring through a new generations of props following the international retirements of Joe Marler and Mako Vunipola, while Dan Cole – who is out of the squad this weekend – is nearing the end of his career at the age of 37. "He [Opoku-Fordjour] is a prop who can play both sides of the scrum and that is a huge asset," Borthwick said. "His first training session here he sidestepped two players and made a line break. He has a point of difference. "Dan Cole and Joe Marler gave me really high recommendations of him. So he is a young prop with a brilliant future."
