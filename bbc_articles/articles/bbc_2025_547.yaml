title: Watch TV's Gethin Jones and his nephew enjoy train game - BBC News
date: '2025-02-10'
section: General
url: http://www.bbc.co.uk/news/videos/c4ngvd8ypy2o
content: |-
  The BBC Morning Live star and the youngster had a ball persuading drivers to honk their horns.

  Birthday boy Alby was treated to a trip to the railway to play the "train game" by his TV presenter uncle Gethin Jones.

  This involved the BBC Morning Live star and the youngster miming pulling a train horn in a bid to get the driver to honk.

  They also had to guess the direction in which engines were travelling.

  But you'll need to watch closely if you want to know who won...
