title: Wokingham boy, 12, dies on Powys camping trip - BBC News
date: '2024-09-26'
section: Wales
url: http://www.bbc.co.uk/news/articles/c30l862njpno
content: |-
  Kaicy Brown was found unresponsive in his tent by his uncle, an inquest opening is told.

  The boy was sharing a tent (not pictured) with his grandfather

  A 12-year-old boy died while on a family camping trip in mid Wales, an inquest has heard. Kaicy Rakai Zelden Brown was staying in a tent with his grandfather in Powys on 14 September while his uncle was in a tent nearby. At about 11:00 BST, his uncle entered the tent and found Kaicy unresponsive. He contacted emergency services, but Kaicy could not be saved. Pontypridd coroner's court also heard an investigation was being carried out into the death of Kaicy’s grandfather David, from Wokingham, Berkshire - the circumstances of which were not laid out in court.

  A post-mortem examination at the Royal Glamorgan Hospital found the cause of death needed more investigation. Coroner Graeme Hughes told family members more toxicology analysis, including tests for carbon monoxide, needed to be carried out. He said the results would be provided to them as soon as they were available. He expressed his condolences to family members for the loss of Kaicy and David. The inquest into Kaicy’s death was adjourned until a future date.
