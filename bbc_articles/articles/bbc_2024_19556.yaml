content: |-
  The BBC radio presenter hosts the BBC Radio 6 Music breakfast show and Radio 4's Desert Island Discs.

  In 2018 Lauren Laverne became the host of Radio 4's Desert Island Discs

  BBC presenter Lauren Laverne has revealed she has been diagnosed with cancer and is recovering in hospital. Writing on Instagram on Wednesday morning, Laverne said the cancer was "caught early and unexpectedly during a screening test". She also told followers she was "expected to make a full recovery" and thanked the medical staff who had cared for her. Laverne is the host of BBC Radio 6 Music's breakfast show, and also presents BBC Radio 4's Desert Island Discs.

  In her statement Laverne wrote: "I'm in hospital at the moment and wanted to take this moment to say thank you: Firstly to medical teams who have got me this far with incredible skill and kindness." The 46-year-old also thanked her colleagues for "their support and for giving me the time off that I need to get better". She added her family and friends "have been absolutely extraordinary every step of the way". Laverne urged people who were "avoiding a test or putting off an appointment" to get checked out today. "Half of us will get cancer at some point and finding out asap is everything," she added. She concluded: "It’s usually my job to bring the good vibes on air but any you have to spare are very much welcome here. Sending loads of love to anyone in a similar boat, or who has made it back to shore." Laverne began filling in for Kirsty Young as BBC Radio 4's Desert Island Discs host in 2018 after Young had to step away due to health issues. She later permanently took over the role and has interviewed the likes of Hollywood stars Cate Blanchett and Stanley Tucci, as well as Young herself, over the years. In addition to her radio work, Laverne has also presented a variety of TV shows including The One Show on the BBC and Channel 4's 10 O'Clock Live. Laverne shot to fame as the lead singer and guitarist of 90s pop punk band Kenickie.

