  After posting about her diagnosis on Instagram, the radio DJ received comments of support from friends and fans. Fellow BBC presenters Gabby Logan, Clara Amfo and Anita Rani have sent well wishes, while other celebrities including comedian Sarah Millican and McFly's Harry Judd have also commented on her post. Presenter Dermot O'Leary, actor Richard E Grant and former Match Of The Day presenter Ian Wright all posted heart emojis. A BBC spokesman said: "Everyone at 6 Music, Radio 4 and The One Show sends Lauren our very best wishes and we look forward to welcoming her back to work when she's ready." After the news of Laverne's diagnosis was announced on her breakfast show, presenter Deb Grant, who was sitting in for her, said: "I just wanted to say on behalf of everyone here at 6 Music we're thinking of you, we hope you'll be back with us very soon... we love you Lauren." Grant then played the track We Can Work It Out, saying it is one of Laverne's "favourites". Nick Grimshaw will present 6 Music Breakfast Show next week while Laverne is on pre-planned holiday. The BBC said the following week's presenter will be announced in due course. Desert Island Discs is currently off air, and due to return in mid-September.
