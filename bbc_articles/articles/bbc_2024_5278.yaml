title: Man jailed for at least 34 years for torturing and murdering woman - BBC News
date: '2024-03-21'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-68624259
content: |-
  Shannon Grant tied up, tortured and murdered Natasha Morais before hiding her body under a bed.

  The family of Natasha Morais said her death would "forever leave a hole in our hearts"

  A man who tied up, tortured and murdered a woman before hiding her body underneath a bed has been given a life sentence.

  Shannon Grant, 27, killed Natasha Morais, who was found beneath an Ottoman-style bed in Whetstone, Leicestershire, on 22 June.

  Grant was jailed for a minimum of 34 years at Leicester Crown Court on Thursday.

  The court heard Grant had built a friendship with Ms Morais, after finding out she had received inheritance money from her grandmother.

  Ms Morais, the court was told, had previously lost her partner who died in a car crash that she walked away from without injuries.

  On 21 June, Grant had gone to her flat, in Loughland Close, to drink and take drugs, the court heard.

  Shannon Grant, 27, was jailed for at least 34 years

  Sentencing, Mrs Justice Tipples, said that at some point during the evening, Grant had attacked the 40-year-old, tied her up and gagged her.

  She said Grant then tortured her in a bid to get money.

  Ms Morais's mother and brother later attended her flat after receiving a text from her phone asking for £2,000 that was needed to pay a fine.

  They were met by a man they did not know, who refused to allow them access.

  The family called police, who forced entry to her flat and found Ms Morais, who was pronounced dead at the scene.

  One of Ms Morais's brothers then arrived and after being told of the description of the man, said it sounded like Grant - who he knew from school - Leicestershire Police said.

  Grant was traced to a flat in Coventry, where he was arrested. Officers also found a sawn-off shotgun during a search of the property.

  A post-mortem examination found Ms Morais suffered 25 individual injuries to her body, including burn marks to her arm.

  Her cause of death was given as ligature strangulation.

  In a victim impact statement, her family said they had felt an "emotional hurricane of pain" following her death.

  They said she was a "loving, kind and significant family member".

  Grant also pleaded guilty to possessing a firearm without a licence and was given a four-year prison sentence, which will run concurrently to the life term.

