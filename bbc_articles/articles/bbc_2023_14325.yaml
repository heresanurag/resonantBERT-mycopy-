title: Moment puma cub found and rescued by police - BBC News
date: '2023-09-15'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-66818671
content: |-
  Brazilian authorities think the big cat was destined to be sold for more than $4,000.

  This is the moment police in Rio de Janeiro swooped in and rescued a puma cub being held illegally.

  Brazilian Federal Police believe it was to be sold on for more than $4,000. Officers are investigating who is responsible, with no arrests made yet.

  The cub was sent to an animal centre in Seropédica for checks, with the aim to return it to the wild.

  Those responsible could face several years in prison.
