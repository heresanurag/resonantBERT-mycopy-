title: Plane left Leeds Bradford runway due to failed bearing - BBC News
date: '2024-10-25'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/cvg0d72n42wo
content: |-
  The plane came off the runway as it landed in windy conditions last year, the AAIB say.

  The TUI jet came off the runway as it landed at Leeds Bradford Airport

  A "catastrophic failure" of a nosewheel bearing caused a holiday jet to leave the runway at Leeds Bradford Airport, a report has found. The TUI flight from Corfu had been landing on 20 October last year, when it began to veer left off the runway. The Air Accidents Investigation Branch (AAIB) said the plane had touched down during Storm Babet in windy conditions. It came to a stop in the muddy ground after leaving the runway with none of the six crew or 195 passengers reporting injuries.

  According to the report, the pilot tried to correct the deviation but was met with a "significant judder" from the nose gear. Despite further efforts to intervene, the aircraft veered off course and sustained minor damage. Emergency services attended the scene and the passengers were evacuated.

  The investigation found the bearing likely failed during the plane's rollout at Leeds Bradford Airport. The resultant juddering had been unexpected and the crew were uncertain as to its impact, the report said. The AAIB investigation found there was "no mechanical impediment" to the use of additional rudder and braking to prevent the plane leaving the runway. "However, the crew’s actions may have been influenced by the nosewheel juddering," it added. After the safe conclusion of the incident, the airport reopened the following day. Travel firm TUI previously apologised to all passengers affected by the closure. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
