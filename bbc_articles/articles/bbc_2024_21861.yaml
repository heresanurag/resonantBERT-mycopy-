  Leclerc's fastest time, set when the track was in the region of 0.3-0.4secs faster than it had been when Perez did his, came after an incident-filled day for the Monegasque, who has been on pole in Baku for the last three years. He crashed midway through the first session, and then ran into a technical problem at the start of the second session, which curtailed his running time. When Leclerc first said there was a problem after taking to the track, the team told him they could not see any issues on the telemetry. But he said the car felt "not straight" and he needed to come in to the pits, saying: "It's impossible you cannot see that on the data." After the session, Leclerc said: "When we started P2 there was a problem on the car which we saw late on once I stopped (in the pits) and we we changed that particular part," he said. "It was nothing to do with the crash, we just had a problem with one new part we had just put on the car but that was giving me a very strange feeling with the steering wheel, changed that and then it was fine, not as many laps as I would have hoped for but competitive anyway. "It is very tight but it is very difficult to see (the true competitive order) with different engine modes for everybody. "We have been pretty quick in the past but it doesn't mean it will be the case tomorrow. There is quite a but to improve and with my driving, but we are fast and hopefully more to come."

