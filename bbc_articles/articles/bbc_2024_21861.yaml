  Mercedes have removed an updated floor introduced a couple of races ago and looked more competitive than they did in the last two races - Hamilton said he had had a "good day". And a new floor on the Red Bull seemed to have put them in more competitive shape than they were on a difficult weekend in Italy, when Verstappen qualified seventh and finished sixth. Verstappen was fastest of all in the first session but complained of understeer in the second, in which he had a near miss with the wall and a trip into a run-off area. He ended up 0.545secs off the pace but said: "Overall a good day, we learned quite a bit, now it is just about tidying up the things we tried, so far we have been more competitive this weekend, so that’s positive." George Russell was another to have a difficult session. He was late out after Mercedes discovered a problem that required an engine change and then was called in before the end of the session with a sensor problem - the team thought they had a water leak but they did not. Russell ended up ninth fastest admitting that on top of the reliability problems he was "struggling - I was definitely off the pace compared to Lewis, struggling with confidence in the car and trying to get the set-up in the right window". Oliver Bearman, standing in for the suspended Kevin Magnussen at Haas, was 10th fastest, two places and 0.072secs behind team-mate Nico Hulkenberg. "It was nice how it ended up, I was confident in the car, which is really important on a track like this," he said.
