  She added: "It's so fun and wholesome so that's what's really nice to see." She said she believed the location of the work above Bonners Fish Bar was significant. "It's a bit of an icon of the local area, so I'm sure that's why it's been chosen. It's been here a long time and it's well loved."

  This image of a howling wolf on a satellite dish was installed in Peckham on Thursday

  Another local, Hannah, said she joined other spectators as soon as she found out about the work. "I was lying in bed, scrolling through social media and it popped up." She added: "I said 'come on kids, get your coats on, we're going to go out and see the new Banksy on Bonners'. "We live a few doors away so it's very exciting."
  • None What do we know about Banksy?

  On Thursday, the Bristol-based artist posted an image on Instagram, external of the silhouette of a wolf howling on a satellite dish in Rye Lane, Peckham, south London. It was later removed, with a video appearing to show two people using a ladder to take it down and carry it off down the road.

  These three monkeys appeared as though hanging from a rail bridge in Brick Lane surprised passers-by on Wednesday

  The Banksy press team told the BBC they "believed" it had been stolen.

  On Tuesday, two elephants seemed reach out to each other with their trunks on the side of a house in Chelsea

  The Metropolitan Police said it had been called to reports of a "stolen satellite dish containing artwork" but no arrests had been made. The BBC understands the art series is set to continue over the coming days.

  A goat appeared on the side of a building near Kew Bridge on Monday morning
