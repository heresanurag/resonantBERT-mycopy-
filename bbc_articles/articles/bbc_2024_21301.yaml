content: |-
  The image of two pelicans fishing has appeared above a fish and chip shop in Walthamstow.

  Fifth Banksy in five days appears in London

  The image of two pelicans in silhouette fishing was spotted by locals in Walthamstow

  The artist Banksy has confirmed he is behind a new artwork of two pelicans above a fish and chip shop in north-east London. The birds are shown in silhouette, fishing, above the the shop on the corner of Pretoria Avenue and Northcote Road, Walthamstow. It is the fifth London image this week Banksy has confirmed is his work. A goat appeared in Kew on Monday while an image of two elephants touching trunks in Chelsea was first seen on Tuesday, although on Friday it was seen defaced with stripes. Three monkeys hanging from a bridge in Brick Lane drew crowds on Wednesday, and a howling wolf on a satellite dish was seen in Peckham on Thursday - which within hours was believed to have been stolen.

  One of the elephants in Tuesday's artwork in Chelsea was seen defaced with white stripes on Friday

  One local resident told BBC News: "It's genuinely really exciting. "A friend messaged me early this morning telling me it's appeared on my street so we arranged to come down as soon as we could."

