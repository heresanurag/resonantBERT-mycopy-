title: Hospital staff 'abused' vulnerable patients in Durham, BBC's Panorama reveals
  - BBC News
date: '2019-05-22'
section: General
url: http://www.bbc.co.uk/news/health-48371390
content: |-
  Undercover BBC filming shows staff swearing, mocking and taunting patients with learning disabilities.

  The BBC's Panorama programme has uncovered shocking evidence of patients with autism and learning difficulties being mocked, taunted and intimidated by abusive hospital staff.

  Whorlton Hall, near Barnard Castle in County Durham is a specialist hospital that cares for people with complex needs.

  Panorama filmed vulnerable adults being deliberately provoked by staff who then physically restrained them.

  The investigation comes eight years after the programme exposed the scandal of abuse at Winterbourne View, another specialist hospital.
