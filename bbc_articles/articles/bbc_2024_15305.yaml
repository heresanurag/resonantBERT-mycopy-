title: Serial rapist who hit woman with golf club in Edinburgh jailed - BBC News
date: '2024-07-15'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/cjr4yr7pjrro
content: |-
  James Kelly violently attacked and raped several women in Edinburgh over the course of seven years.

  James Kelly was jailed for a number of sexual offences at the High Court in Edinburgh

  A man who violently attacked and raped several women in Edinburgh has been jailed. James Kelly beat one of his six victims with a golf club and a tyre iron and threatened to kill another. He was convicted of 18 charges, including six charges of rape and a number of other offences including sexual assault and assault, between 2014 and 2021. The 43-year-old was jailed for 10 years for the offences at the High Court. This article contains details some may find distressing.

  The court heard Kelly, of the city's Clermiston, got on top of one woman and began having sex with her, telling her he was “going to rape her” when she repeatedly asked him to stop. Another woman, who he repeatedly raped, was pushed by him and fell down a flight of stairs. He also punched and kicked her. Kelly threatened and made offensive remarks to another woman. He also threatened to kill others and claimed that he was in possession of a gun. The court also heard he punched and kicked one woman, struck her with a golf club and jumped on her. Kelly also choked her and struck her with a tyre iron while he was speeding in a car. He denied deliberately using violence against women and maintained that sex without consent never occurred. He described himself as an unemployed musician who was previously diagnosed with ADHD. He said he took amphetamine which at one point he described as "my medicine".

  Judge Fiona Tait said Kelly had a “limited record” of previous offences and no history of sexual crimes. But she told him his offences were of “considerable gravity” and had a “substantial impact” on his victims. She ordered that Kelly should be under supervision for a further four-year period, during which he could be returned to prison if he breaches licence conditions. She also made non-harassment orders which ban Kelly from contacting or attempting to contact the complainers for 25 years. Kelly was placed on the sex offenders register indefinitely following his sentencing. Det Insp Eirlys Fraser condemned Kelly's behaviour and urged anyone who had experienced any sort of violence or sexual abuse to contact police. She said: “James Kelly subjected his victims to a shocking level of violence and sexual abuse. He is an extremely dangerous individual, who showed no remorse for his behaviour, but he is now paying the price for his despicable actions."
