content: |-
  Eyewitnesses tell of their horror as a deadly knife attack sparked panic at a Sydney shopping mall.

  Six people have died and several are in hospital after a stabbing attack at a Sydney mall, police have said.

  Assistant Commissioner Anthony Cooke said the attacker was shot dead by a lone police officer who arrived at the scene and located the perpetrator.

  Crowds could be seen fleeing the Westfield complex at Bondi junction and witnesses said people hid inside stores until the police could evacuated them.

  In this video, witnesses describe what they saw.

