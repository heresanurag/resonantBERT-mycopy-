  Since his debut in November 2018, Saka has made 250 appearances for the Gunners, scoring 67 goals and providing 63 assists. He scored 20 goals in 47 appearances last season, accounting for 17.7% of the 120 goals Arsenal managed in all competitions. This season that percentage has dropped slightly, with Saka having netted nine of the Gunners' 56 goals (16.1%). He has assisted 10 of Arsenal's 34 Premier League goals. In Saka's 250 Arsenal matches, they have won 143 (57.2%), drawn 50 and lost 57. In the 73 matches Saka has missed since his debut, the Gunners have won 41 (56.2%), drawn 10 and lost 22.

  There is no hiding from the fact that Bukayo Saka is one of Arsenal's key players - if not the most important. Since 2019, Saka has contributed 52 goals and 42 assists, the most of any Gunners player, with Gabriel Martinelli next on the list with 34 goals and 14 assists. Gabriel Jesus has scored five goals in the last week and his return to form was already a welcome boost for Mikel Arteta, but keeping the Brazil forward firing has now taken on a new importance. Martinelli deputised on the right wing for Arsenal when Saka went off against Crystal Palace and looks to be the player to fill the void for now. Arteta has said the club are going to look internally for solutions and he has "some ideas" about how to deal with the loss of Saka, but accepted his side are going to be "different". The Gunners have previously been active in January - signing Leandro Trossard in the 2023 winter window after missing out on Mykhailo Mudryk. Arteta has always said you have to be ready for anything in January and the upcoming window could be crucial for Arsenal as they look to keep their Premier League title challenge on track.
