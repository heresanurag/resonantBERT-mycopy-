title: Israel troops withdraw from corridor that split Gaza in two - BBC News
date: '2025-02-10'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c4g3yyv4egeo
content: |-
  Palestinians on cars and carts begin returning to northern Gaza - often to scenes of utter destruction.

  Israel troops withdraw from corridor that split Gaza in two

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Palestinians on the move as Israeli troops leave Netzarim Corridor

  Israeli troops have withdrawn from the Netzarim Corridor - a military zone cutting off the north of the Gaza Strip from the south. Hundreds of Palestinians in cars and on carts laden with mattresses and other goods began returning to northern Gaza following the pull-out - often to scenes of utter destruction. The Israeli withdrawal is in line with the Israel-Hamas ceasefire agreement of 19 January under which 16 Israeli hostages and 566 Palestinian prisoners have so far been freed. By the end of the first stage of the ceasefire in three weeks' time, 33 hostages and 1,900 prisoners are expected to have been freed. Israel says eight of the 33 are dead.

  Hamas seized 251 hostages and killed about 1,200 people when it attacked Israel on 7 October 2023, triggering the Gaza war. At least 48,189 Palestinians have been killed in Israel's offensive, according to Gaza's Hamas-run health ministry. About two-thirds of Gaza's buildings have been damaged or destroyed by Israel's attacks, the UN says. On Sunday, crowds of Palestinians were seen traversing the Netzarim Corridor - mostly moving north to see what had happened to their abandoned homes. "What we saw was a catastrophe, horrific destruction. The [Israeli] occupation destroyed all the homes, shops, farms, mosques, universities and the courthouse," Osama Abu Kamil, a resident of al-Maghraqa just north of Netzarim, told the AFP news agency. The 57-year-old, who had been forced to live for more than a year in the southern Gazan city of Khan Yunis, said he now planned to "set up a tent for me and my family next to the rubble of our house". "We have no choice," he added. Mahmoud al-Sarhi, another displaced Palestinian, told AFP that for him "arriving at the Netzarim Corridor meant death until this morning". He said this was "the first time I saw our destroyed house", referring to his home in the nearby Zeitun area. "The entire area is in ruins. I cannot live here," he added. About 700,000 residents of northern Gaza fled to southern areas at the start of the war, when the Israeli military issued mass evacuation orders before launching a ground invasion of the Palestinian territory. Many of those displaced were subsequently forced to move multiple times after Israeli forces pushed into southern Gaza, too. They were also prevented from returning to their homes through the Netzarim Corridor, stretching from the Gaza-Israel border to the Mediterranean Sea. Israeli forces partially withdrew from the west of the corridor last month and the first Palestinians - pedestrians - were allowed to walk along the coastal Rashid Street as they crossed into northern Gaza. Those on vehicles have to use Salah al-Din Street and undergo screening for weapons by US and Egyptian security contractors. The Israel Defense Forces have not officially commented on Sunday's withdrawal from the eastern part of the corridor, which will leave it in control of Gaza's borders, but not the road that had cut it in half. The Haaretz newspaper says the Hamas-run Gaza interior ministry has been urging people to "exercise caution and adhere to the existing movement guidelines for their safety".

  This video can not be played To play this video you need to enable JavaScript in your browser. Can Trump really take ownership of Gaza?

  The troop withdrawal comes as an Israeli delegation is expected to fly to Qatar which has been moderating talks between the two sides in the Gaza war. The Israeli government has previously said the delegation will initially discuss "technical matters" regarding the first phase of the ceasefire deal, rather than the more challenging second phase which is meant to lead to a permanent ceasefire, the exchange of all remaining living hostages in Gaza for more Palestinian prisoners and a complete withdrawal of Israeli forces from Gaza. That will require further direction from Israeli Prime Minister Benjamin Netanyahu, who recently became the first foreign leader to meet US President Donald Trump since his return to the White House. During the trip, in the most dramatic shift in US policy regarding Gaza in decades, Trump called for the removal of the territory's entire civilian population and the development of what he called "The Riviera of the Middle East". Convening his first cabinet meeting since returning to Israel over the weekend, Netanyahu said Trump had come up with a "completely different vision, much better for the State of Israel". "A revolutionary, creative vision - and we are discussing it," he was quoted as saying in an official readout of the meeting. "He [Trump] is very determined to carry it out. It also opens up many possibilities for us." Trump's proposal, which would be a crime under international law, has been almost universally rejected, including by Arab states. The Saudi foreign ministry said on Saturday that it would not accept "any infringement on the Palestinians' unalienable rights, and any attempts at displacement," accusing Israel of "ethnic cleansing". Egypt has also rejected any idea of the removal of the Palestinian population and has said it is calling an emergency summit of the Arab League on 27 February to discuss what it called "serious" Palestinian developments.

