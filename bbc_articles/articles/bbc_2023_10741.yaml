content: |-
  The BBC’s analysis editor assesses claims about the security of the Zaporizhzhia power station.

  Ukraine says Russia has planted ‘objects resembling explosive devices’ on the roofs of two reactors at the Zaporizhzhia Nuclear Power Plant.

  Russia has made counter-claims that Ukraine is planning to attack the plant.

  The BBC’s Analysis Editor Ros Atkins looks at what we know about the allegations, and what they tell us about the risk of an incident at Europe’s largest nuclear power station.
