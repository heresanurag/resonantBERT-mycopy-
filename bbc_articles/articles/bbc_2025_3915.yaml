content: |-
  Lando Norris and McLaren were as perfect as it is possible to be in very testing conditions as they won the Australian Grand Prix, writes Andrew Benson.

  'Copybook victory as Norris and McLaren come through chaos unscathed'

  Lando Norris' four previous F1 wins had come in dry races

  Lando Norris and McLaren delivered on their potential with a copybook victory in a demanding Australian Grand Prix in the most difficult of conditions to put their stamp on the start of the new season. Briton Norris described his win as "stressful but rewarding". The first adjective was justified by the conditions in a madcap, crash-strewn, incident-packed race where one small error can spell disaster - as it very nearly did for Norris himself at one point. The second adjective was a recognition of the fact that this was exactly the kind of race in which, last year, McLaren had proved less than perfect, and thrown away at least one potential victory, and perhaps another, too.

  But in Melbourne they were as perfect as it is possible to be in conditions such as these - even the renowned rain-master Max Verstappen slipped up at one point. And Norris and McLaren came through the chaos unscathed. The fine line between victory and defeat was underlined by an incident with 13 laps to go that defined the race. Norris was leading from team-mate Oscar Piastri and Verstappen as a heavy shower of rain approached the track. It hit as the leaders were negotiating the final corners on lap 44, with 13 to go. Both McLarens ran wide on to the gravel at the exit of Turn 12, and Australian Piastri then spun through Turn 13. Norris was able to continue without losing too much time, but Piastri ended up on the grass on the outside of Turn 12, where he sat with his wheels spinning helplessly for what seemed like an age as his hopes of victory at home evaporated before finally rejoining. He fought back to ninth by the end. Norris immediately pitted for treaded tyres. That decision won him the race, and demonstrated how far he and the team had come since last year - they had planned that they would pit as soon as it rained, and acted decisively on the plan. Verstappen stayed out and took the lead, but as the rain intensified he lost more time, and Norris resumed the lead when the Dutchman pitted himself two laps later.

  Norris said: "It's so easy to make a mistake, so easy to ruin everything. So quickly it can all have gone wrong within a second. "Any second of the race, you lock up, you hit the white line wrong, you have a big snap. It was just very, very difficult at times to just not go into a hole or a tyre barrier somewhere. "That's a big enough challenge, but then when you've got the weather changing and the track conditions changing, knowing when to make the correct decision to change on to a slick tyre and stay out on the inter-tyre, and then even more when I've got Max behind me and Oscar behind me, it's stressful. "But that's what makes it rewarding. "We worked a lot over the winter to prepare for a race like this, because it's where we threw away a lot of opportunities last season - Canada, Silverstone, where we were not the best at preparing and knowing how decisive we've got to be. "Today we were very, very decisive, calling to box five metres before I boxed. But it was the right call in the end, and that won us the race." The race was not over, though. In the final five laps after the final restart, Norris had Verstappen right behind him. The McLaren was hampered by significant floor damage - incurred either in the previously mentioned off, or in another in those final laps at Turn Six - but he hung on, despite Verstappen being less than a second behind, and having use of the DRS overtaking aid.

  The 25-year-old Norris, for whom last season was his first fighting consistently at the front, underlined his inexperience when he said: "That situation was new for me. I've not ever led a race with five laps to go with Max behind me, trying to put me under pressure, and in these conditions. "Maybe Max has had that a few times in his race against Lewis (Hamilton) a lot, and he can just deal with that probably better than I can. "I'm happy I got through it and stayed calm. It's something I improved from last year." McLaren's performance was as expected. They were the quickest car all weekend and delivered on a status as favourites that Norris acknowledged both before and after the race was justified. They earned it in pre-season testing, but Norris said that, while the long run in Bahrain two weeks ago had demonstrated their strong pace, the car was not necessarily as good as some felt it looked there. The job, he emphasised, was only just beginning, and not all races would be like this. "The car's flying," Norris said. "But we're going to have races where we are going to struggle. "[If] we race in Bahrain as round one, I wouldn't be confident that we could win the race. "But I'm confident that we're going to, say, China next weekend, and we can be very, very strong, because we were strong there last year, with not a very good car."

