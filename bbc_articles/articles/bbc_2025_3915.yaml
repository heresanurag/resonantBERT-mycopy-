  In the post-race news conference, with Verstappen and Mercedes' George Russell either side of him, Norris also pointed out that he felt that Piastri's presence alongside him was partly responsible for McLaren's strong weekend, making a pointed reference to the rookie team-mates of his rivals. "Let's allow a few more races to take place before we start making any (predictions), but we're the favourites, we are the team to beat, mainly because we have two drivers up there pushing each other," he said. "That helps. Do I think me and Oscar working together yesterday, in terms of pushing one another, allowed us to get one and a half, one 10th more than the two drivers here, because their team-mates aren't as equipped and as experienced? Yes." Verstappen and Russell, meanwhile, were talking as if they know that McLaren will take some beating. Verstappen was reflecting on the fact that he lost 15 seconds to the McLarens over the first stint as the track dried. "As the tyres started to overheat we had no chance," he said. "Yet basically McLaren just took off. "We still have a lot of work to do to fight for a win, but I'm very happy that we are second here. It's basically one place better than we should have been. We'll do our best." Russell added: "They look pretty good and groovy at the moment, so we'll see."

  Lando Norris is leading the drivers' championship for the first time in his career
