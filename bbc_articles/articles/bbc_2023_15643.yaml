id: bbc_2023_15643
title: Sydney surfer collides with whale - BBC News
date: '2023-10-26'
section: General
url: http://www.bbc.co.uk/news/world-australia-67226886
content: |-
  Jason Breen was wing foiling in the sea when he was dragged underwater by the young mammal.

  A man was taking part in the sport of wing foiling off the coast of Sydney, Australia, when he crashed into a breaching whale calf.

  Jason Breen was then dragged underwater by the whale until his leash broke, allowing him to surface.
