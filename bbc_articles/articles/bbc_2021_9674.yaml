  But Labour's shadow foreign secretary Lisa Nandy called on the prime minister and foreign secretary to "come out of hiding" and demonstrate a clear strategy to address the crisis in Afghanistan.

  There must be "no red tape or delays" to resettling Afghan nationals who assisted the British military in the UK, Ms Nandy said.

  Former International Development Secretary Rory Stewart said the withdrawal was "an absolute betrayal... totally heartbreaking and totally unnecessary".

  "There was no reason for us to do this, and by doing this we've broken Afghanistan in a matter of weeks," he said.

  Tom Tugendhat, chairman of the Foreign Affairs Committee, said Afghan forces had "stepped up" in recent years, allowing Nato to end its involvement in the fighting and bringing an end to British combat casualties.

  "Now we've just pulled the rug from under them," he said. "We've taken away their air support, taken away their logistics."

  Mr Tugendhat said the war had cost £40bn and taken the lives of more than 450 British soldiers, but he said the future commitment would have only been for 750 soldiers as part of a 10,000-strong Nato force, assisting 400,000 Afghan security forces.

  He contrasted the decision in Afghanistan to post-war Germany, where UK troops were only withdrawn in 1991. "Endurance matters, staying matters, being an ally matters," Mr Tugendhat said.
