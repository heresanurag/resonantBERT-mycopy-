title: Co-driver killed in crash at Jim Clark Rally in Scottish Borders - BBC News
date: '2025-05-24'
section: UK
url: http://www.bbc.co.uk/news/articles/cwy3514d733o
content: |-
  The rally has been cancelled after the 39-year-old man was killed in the crash.

  Welsh rally co-driver Dai Roberts died in the crash at the Jim Clark Rally

  A co-driver has been killed in a crash at the Jim Clark Rally in the Scottish Borders. Dai Roberts, 39, from Carmarthen in Wales, died at the scene after emergency services were called at around 10:50. Driver, James Williams, 27, was taken to the Royal Infirmary of Edinburgh with serious, but not life-threatening, injuries. The remainder of the closed-road event, held near Duns, was cancelled along with the Reivers Rally, scheduled for Sunday.

  In a team statement, James Williams Rallying said: "It is with a heavy heart, we have to share this sad news. "The motorsport community is deeply saddened to learn of the passing of our beloved Dai Roberts. "Our thoughts and prayers are with the Roberts family at this difficult time."

  Driver James Williams suffered serious injuries in the crash

  Mr Roberts survived a previous crash at the Ulster Rally in 2014 which killed 20-year-old driver Timothy Cathcart. His brother Gareth died competing in a rally in Sicily in June 2012. Governing body Motorsport UK said it had "initiated a full investigation into the circumstances of the incident" and would work closely with event organisers and the Jim Clark Memorial Motor Club. Police Scotland said that no-one else was injured in the crash. Supt Vincent Fisher said: "Our thoughts are with the family of the man who has died and inquiries are ongoing to establish the full circumstances."

  The rally is held near Duns in The Scottish Borders

  Around 260 competitors were expected to compete at the event over the weekend. First held in 1970, it is named after Formula One champion Jim Clark who grew up in the Scottish Borders. It is round of the Probite British Rally Championship, Asset Alliance Group Scottish Rally Championship and Protyre National Asphalt Championship. In 2014, three spectators were killed and six more were injured at the event when two cars lost control and veered into viewing areas. A fatal accident inquiry later found the deaths could have been prevented if people had been clearly banned from standing in the area where the crash happened. The event returned five years later in 2019, after "rigorous steps" were taken to ensure safety.
