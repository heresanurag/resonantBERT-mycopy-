title: Dublin hotel fire investigation to begin - BBC News
date: '2018-03-22'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-43493195
content: |-
  The fire began on the 13th floor and spread to the 10th, but floors 11 and 12 did not catch fire.

  This video can not be played To play this video you need to enable JavaScript in your browser. The fire is believed to have started on the 13th floor on Wednesday night

  An investigation into a major fire at a Dublin hotel, which destroyed at least five floors, will begin as soon as the high-rise building is declared safe.

  Up to 200 people were in the Metro Hotel in Ballymun when the fire started at about 20:00 local time on Wednesday.

  Dublin's chief fire officer said he was relieved that there were no injuries.

