  It's a sign of the new world in which we seem to be now that, while US-Ukraine relations are at risk of implosion, the opposite is true for US-Russia ties. In recent weeks, Trump and Putin have spoken on the phone and pledged to work closely together; there's talk of a possible summit sometime soon; lower-level US-Russia talks to reset relations and discuss potential economic cooperation have already started. President Putin has dangled the carrot of lucrative joint projects with the Americans involving rare earth minerals and aluminium production. The implications of a breakdown in relations between Ukraine and the US are potentially very serious for Kyiv, but very positive for Moscow. If the flow of American weapons to Ukraine were to stop, it would be much harder for Ukrainians to defend themselves against the Russian forces who have invaded their country, even if Ukraine enjoys solidarity and strong support from European leaders. For some time now, Moscow has believed that the war in Ukraine has been going Russia's way. The shouting-match in the Oval Office will have cemented that view.
