content: |-
  A breakdown in relations between Ukraine and the US is potentially very serious for Kyiv, but very positive for Moscow.

  Steve Rosenberg: Vladimir Putin can afford to sit back and watch events unfold

  Friday's drama in the Oval Office sparked a swift reaction from many world leaders. But not from Vladimir Putin. There's been no comment so far from the Kremlin leader. Then again, he doesn't really need to say anything. President Putin can afford to sit back and watch events unfold. Donald Trump predicted that the very public spat with President Zelensky was "going to be great television". There's little doubt that Vladimir Putin will have enjoyed the "show", the dramatic spectacle of Volodymyr Zelensky, leader of the country President Putin invaded, being berated by the president and vice-president of the United States in front of the world's media. Some Russian officials have commented, though, on events in Washington. In a post on social media, former president Dmitry Medvedev, now deputy head of the Russian security council, wrote that President Zelensky had received "a slap down in the Oval Office". He called on the US to stop military assistance to Ukraine. How Moscow would welcome that. Writing on Telegram, foreign ministry spokesperson Maria Zakharova praised Trump and JD Vance for their "miracle of restraint" at not hitting Ukraine's president.
