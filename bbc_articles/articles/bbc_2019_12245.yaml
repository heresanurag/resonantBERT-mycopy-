title: Strictly's Dianne Buswell 'fine' to perform after accident - BBC News
date: '2019-10-05'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-49945244
content: |-
  The dance star says she will perform on live show after accident with partner Dev.

  The show must go on! That's the message from Strictly Come Dancing's Dianne Buswell.

  Earlier this week, the dancer suffered a fall during rehearsals with her celebrity partner, Radio 1 DJ Dev Griffin.

  She was reportedly taken to hospital, but has now tweeted to tell fans that she's "fine".

  "We both cannot wait to dance tonight. Thanks again for your thoughts and well wishes."

