content: |-
  Meet light-heavyweight Ben Whittaker, who woke up to millions of hits on his Instagram after uploading a video of one of his knockouts.

  Ben Whittaker won silver for Team GB at the Tokyo 2020 Olympics

  One morning in February, light-heavyweight Ben Whittaker woke up to millions of hits on his Instagram account. It was the Monday after his stoppage win over Khalid Graidia at Wembley Arena. "My phone just blew up. It was just weird," Whittaker told BBC Sport. 'The Surgeon', as he is known, posted two videos in the days after his devastating disposal of Graidia, showcasing lightning-quick reactions and his showboating antics, which included dancing around the ring during exchanges. "I've been doing this style since I was a kid and out of nowhere my socials all went crazy," Whittaker said. "You can't complain, it is good, but I'm just being myself. I won't change for no-one and as long as I get the job done that's all that matters." Just 24 hours after he posted the first video,, external Whittaker gained over 100,000 followers on Instagram. By March, his follower count had reached 1m, and he has since passed the 2m mark. The highlight reel, external of that February win, just his sixth fight as a pro, reeled in 2.7m likes and 58m views on Instagram.

  Whittaker's style has received criticism from some boxing fans, with the claim it is disrespectful to the opponent across the other side of the ring. The 27-year-old, from Darlaston, near Walsall in the West Midlands, remains adamant that the showboating is simply a way in which he is able to express himself. He experienced the impact of wider exposure during a recent trip to America with his promotional company, Boxxer. "I had people recognise me on the streets from that video," Whittaker said. "It's humbling for me, a lad from Darlaston having people over there coming up to me." Whittaker took silver for Team GB at the Tokyo 2020 Olympics after defeat by Cuba's Arlen Lopez in the light-heavyweight gold-medal bout. He made his professional debut in Bournemouth in July 2022 and has now fought and won seven professional fights. These have all taken place in the UK apart from his second fight when he travelled to Saudi Arabia.

  Whittaker next fights at Selhurst Park in London on Saturday

  Following his viral moment, Whittaker found that a new audience had begun to follow him. It came as a surprise, having fought for most of his professional career in the UK. "On my Instagram it was mainly Brazil and the United States that engaged with that viral post," he said. "It is mad to be honest; Brazil is now the top country that follow me." Whittaker next fights on the undercard of Chris Billam-Smith's world title defence against Richard Riakporhe at Selhurst Park in London on Saturday. He will challenge for the first belt of his pro career when he takes on Ezra Arenyeka for the IBF international light-heavyweight title. Arenyeka is an undefeated fighter from Nigeria who called Whittaker out in person when he stormed the stage at a news conference before the Briton's last fight in March. "The main thing is that there's a belt on the line for me - something to show off and hold my jeans up with," Whittaker said. "It's a big card and will be a big atmosphere, I'll learn from the experience. I'm going to make an example of Ezra."
