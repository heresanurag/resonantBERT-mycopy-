title: 'Afghanistan: British Army officers tell of ''chaotic'' evacuation operation
  - BBC News'
date: '2021-09-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-58437673
content: |-
  The senior British commander in Kabul speaks for the first time about the UK's evacuation operation.

  The senior British commander on the ground in Kabul has been speaking for the first time about the UK's evacuation operation from Afghanistan.

  Brigadier James Martin spoke of his soldiers' resilience in the face of seeing children and women dying in front of them.

  The last British troops returned from the country at the weekend after helping to rescue more than 15,000 people.
