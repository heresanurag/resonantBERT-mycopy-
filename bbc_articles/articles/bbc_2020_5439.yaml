  Bringing you the latest news from across England about the coronavirus pandemic.

  A pensioner has set out to ride a total of 80 miles around West Sussex on a tricycle.

  Theo Ellert is riding a mile a day around the Littlehampton area, aiming to reach her target by her 80th birthday on 18 August.

  The money raised is for a charity she founded called Miracles , which provides caravan holidays in Selsey for families in crisis.

  Theo says she took up tricycling nearly a decade ago after a failed attempt at cycling.

  Quote Message: My son gave me a bicycle when I was 70, but unfortunately I kept falling off it, every bush, every ditch, I’m there. So my husband bought me a tricycle”. from Theo Ellert My son gave me a bicycle when I was 70, but unfortunately I kept falling off it, every bush, every ditch, I’m there. So my husband bought me a tricycle”.

