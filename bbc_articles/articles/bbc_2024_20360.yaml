  England interim manager Lee Carsley has put his own stamp on his first squad with an imaginative mix of youth and experience.

  'Bold but not reckless - Carsley adopts youthful evolution for England'

  England interim manager Lee Carsley has produced an imaginative mix of experience and youth

  England interim manager Lee Carsley has not embarked on wholesale revolution after they fell short at Euro 2024 - but there is a refreshing youthful evolution in his first squad. Carsley's selection for the Uefa Nations League meetings with the Republic of Ireland in Dublin and the Wembley clash with Finland is bold without being reckless, retaining a core of former boss Gareth Southgate's mainstays while firmly applying his own stamp. And this comes in the shape of an influx of young England stars who played key roles when Carsley's side beat Spain – their conquerors at senior level in Germany this summer – to win the European Under-21 Championship in 2023. Carsley, to his great credit, has ignored the temptation to play it safe post-Southgate. It means there is certainly plenty to be excited about with a heavy presence of England's gifted young brigade. It is an instant indication that, however long he is in charge, Carsley will stand or fall by his own picks and principles - and then see what the future brings. He has chosen six players who played in that under-21 final, with the inclusion of Lille's former Manchester United midfielder Angel Gomes perhaps the most eye-catching. The 23-year-old left Old Trafford in 2020 and his place in the squad confirms Carsley's admiration for his ability.

