  "Angel is probably different to a lot of what we would have seen in the past, in terms of a central midfield player being a lot more physical and robust," he said. "He’s a lot more of a technical player. He controls the game with his technique." Nottingham Forest midfielder Morgan Gibbs-White is another beneficiary of working closely with Carsley at under-21 level, as well his outstanding form in the Premier League. Newcastle United defender Tino Livramento and Chelsea forward Noni Madueke, who has made a fast start to the season with a hat-trick at Wolverhampton Wanderers on Sunday, also come in.

  Angel Gomes and Cole Palmer were in Carsley's England side that won the European Under-21 Championship in 2023

  The half dozen who played in the winning under-21 final were Chelsea trio Madueke, Levi Colwill and Cole Palmer, Newcastle forward Anthony Gordon, Gomes and Gibbs-White. Manchester United teenager Kobbie Mainoo showed great maturity at the heart of midfield at the Euros, while Palmer demonstrated his comfort and class at England level at just 22, producing decisive moments of genuine quality in Germany, including a goal in the 2-1 final loss to Spain in Berlin. Manchester City's Rico Lewis, at 19, is another exciting possibility for the future and is recalled to the squad. If it is not exactly out with Southgate's old, there is certainly an element of changing of the established guard after Newcastle full-back Kieran Trippier announced his international retirement and Manchester City defender Kyle Walker - a central figure in the Southgate era as England reached successive Euro finals as well as a World Cup semi-final and quarter-final - was left out. The 34-year-old Walker, for all his experience and endurance, is unlikely to be a contender for a potential place at the 2026 World Cup so the move makes sense, although Carsley was also keen to emphasise he is short of first-team action so far this season. There is no way back as yet for Manchester United striker Marcus Rashford, left out of the Euros squad and unable to provide evidence this season that he should return, while Chelsea exile Raheem Sterling's international career looks to be behind him. Brighton's 32-year-old centre-back Lewis Dunk and Crystal Palace midfielder Adam Wharton, both at the Euros, are also missing.

  Carsley has recalled Jack Grealish after he was axed from England's Euro 2024 squad by Gareth Southgate

  The absence of Trippier and Walker may finally see Liverpool's Trent Alexander-Arnold used at right-back, where Carsley sees him at his best, although Livramento may also eye an opportunity. Carsley has turned back to two experienced figures in Manchester United defender Harry Maguire and Manchester City forward Jack Grealish, who were both left out of Southgate's squad for Euro 2024 - the latter a particularly contentious exclusion. "I'm really excited to work with Jack," added Carsley. "I've seen his talent, maybe he is one of those players coming back who have a point to prove." Carley has produced an imaginative mix of the tried and trusted – even in the absence of injured Real Madrid midfielder Jude Bellingham – with goalkeeper Jordan Pickford, defender John Stones and captain Harry Kane, who endured such a disappointing Euros, once again providing the vastly experienced spine and bolted on to a collection of exciting, emerging talent. It is a selection that adds extra layers of interest and intrigue to Carsley's England reign - however long it lasts.
