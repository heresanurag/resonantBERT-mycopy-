content: |-
  A demure TikTok has gone viral, but is it an ironic joke or does it set unrealistic standards for women?

  'Very demure, very mindful' - are we missing the joke of viral trend?

  Jools Lebron, pictured on Jimmy Kimmel Live! this week, after her "very demure" TikTok videos went viral

  If brat described our wild and unapologetically messy summers, then exemplary manners, politeness and being a stickler for rules is what's taking us into autumn. In recent weeks, thousands of videos showing us how to refine our etiquette have popped up on TikTok, all off the back of the "very demure, very mindful" trend. The satirical idea started out as poking fun at the stereotypical ideas of femininity, but it has since taken on a life of its own. While half of the internet are using the phrase ironically, others are concerned that the trend is just another way of setting unrealistic standards for women.

  So, is anyone actually trying to be demure, or is this just a massive in-joke that's been blown out of proportion? The seemingly harmless catchphrase was coined by content creator Jools Lebron, who posted a TikTok earlier this month on her demure work outfit and mindful make-up. "You see how I do my make-up for work? Very demure, very mindful,” she told her millions of followers. "A lot of you girls go to the interview looking like Marge Simpson and go to the job looking like Patty and Selma. Not demure."

