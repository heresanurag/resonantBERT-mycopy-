title: Holiday flight chaos worsened by password problem - report - BBC News
date: '2024-11-14'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/ce8drx6v0ypo
content: |-
  An air traffic control engineer was unable to fix a major fault from home, a report says.

  More than 2,000 flights were grounded in August 2023

  Allowing an engineer to work from home delayed efforts to resolve Bank Holiday airport chaos caused by a flight data fault, a report has said. More than 700,000 passengers suffered cancellations and delays in August 2023 due to the computer shutdown at NATS, the UK's air traffic control service. The engineer was unable to reset the system from home and arrived at work more than three hours after the incident began, the Civil Aviation Authority (CAA) said. NATS said it would review its resilience plans and had ensured the fault could not happen again.

  A single flight from Los Angeles to Paris triggered the failure on Monday 28 August, the CAA report, external confirmed. Air traffic control systems handling the flight were confused by a duplicate code - DVL - representing both Deauville in France and Devil's Lake in North Dakota, USA.

