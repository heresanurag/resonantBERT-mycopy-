content: |-
  Transmission rates, hospital pressures and deaths are still very high, the UK's four chief medical officers say.

  'We should be under no illusions' despite alert level change

  As we reported a little earlier, the coronavirus alert level for the UK has been lowered from five, the highest level, to four. The four UK chief medical officers and NHS England's national medical director have agreed the change following advice from the Joint Biosecurity Centre. In a joint statement they say: "The health services across the four nations remain under significant pressure with a high number of patients in hospital, however thanks to the efforts of the public we are now seeing numbers consistently declining, and the threat of the NHS and other health services being overwhelmed within 21 days has receded. "We should be under no illusions - transmission rates, hospital pressures and deaths are still very high. In time, the vaccines will have a major impact and we encourage everyone to get vaccinated when they receive the offer. "However for the time being it is really important that we all - vaccinated or not - remain vigilant and continue to follow the guidelines. "We know how difficult the situation has been and remains to be for healthcare workers, we thank them for their immense effort, skill and professionalism throughout the pandemic." There's more detail on how the alert level works here.
