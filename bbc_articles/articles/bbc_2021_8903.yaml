title: 'Larry Nassar: FBI failed to investigate USA Gymnastics abuser, watchdog finds
  - BBC News'
date: '2021-07-15'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-57844784
content: |-
  While agents dragged their feet, the report found, Larry Nassar continued to prey on gymnasts.

  Larry Nassar has been given at least 300 years in jail for his crimes

  The FBI disregarded allegations about a prolific USA Gymnastics child abuser and later made serious errors in the investigation, a watchdog has found.

  The long-awaited report gave a scathing assessment of the FBI's investigation into former team doctor Larry Nassar.

  Nassar was sentenced to over 300 years in jail in 2018 for molesting gymnasts.

  Numerous missteps and cover-ups by FBI agents allowed his abuse to continue for months after the case was first opened, the report found.

  Rachael Denhollander, the first woman to publicly accuse Nassar of abuse, said that while the US justice department's internal review exposed serious failings, there was a lack of accountability.

  "This report lays bare the corruption, but its conclusion says 'doesn't matter'. Because nothing happens now," she wrote in a series of tweets. "These agents retire on government pensions while survivors fight to stay alive."

