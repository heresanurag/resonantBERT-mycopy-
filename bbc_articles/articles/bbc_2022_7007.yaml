content: |-
  Britain's most decorated elite climber Shauna Coxsey defends her decision to continue the sport while pregnant.

  Coxsey missed out on a medal at the Tokyo Olympics

  Britain's most decorated elite climber Shauna Coxsey has defended her decision to continue the sport while pregnant. The 29-year-old, who retired from competitive climbing after the sport's Olympic debut in Tokyo, is 38 weeks pregnant with her first child. But her choice has led to some criticism on social media. "Everyone assesses risk differently and I think people perceive me climbing as risky when I am actually climbing so well within my comfort zone," she said. Speaking to Radio 5 Live, she added: "It feels way more risky for me to walk down the street. I feel much more likely to trip over on a bumpy road than I do to go up an easy climbing wall." Coxsey created history in Tokyo as Britain's first competitor in the sport and finished 10th overall after being hampered by a back injury.

