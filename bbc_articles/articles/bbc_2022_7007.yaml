  The double World Championship bronze medallist has been involved in the sport since she was three years old. "If I don't climb for a week or so, my body feels quite clunky and everything gets a bit achy," she added. "As soon as I get back on that wall and start stretching and moving again, my body feels more connected and good and strong and also my mental health as well. "I can't imagine stopping if I didn't need to and I haven't needed to and it feels great. I've been really fortunate. "I wouldn't put my baby in danger. People think I might be able to fall and land on my stomach - which is something I have never ever done or seen happen before. "For me to share a bit and communicate how I have gone about this pregnancy and say it is possible to keep climbing in a safe way has been really important. "It's frustrating that other women are getting this judgement and choosing to give up something that they love and are comfortable with because of the fear of judgement. "It is such a sad position to be in - it is bullying."
