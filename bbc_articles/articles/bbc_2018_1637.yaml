id: bbc_2018_1637
title: Engine drama sparks mid-air emergency - BBC News
date: '2018-02-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43056912
content: |-
  Passengers on a United Airlines plane faced a scary landing in Hawaii.

  An emergency was declared because of engine vibrations during a United Airlines flight from San Francisco to Honolulu.

  The plane, with more than 370 people on board, landed safely.
