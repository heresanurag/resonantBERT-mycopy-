title: Mel C and Tom Grennan tribute to Hillsborough victims - BBC News
date: '2025-05-24'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c9vgdd4d2wwo
content: |-
  Mel C and Tom Grennan wear Liverpool and Everton shirts on stage at BBC Radio 1's Big Weekend.

  Tom Grennan was joined by Melanie C on the main stage at BBC Radio 1's Big Weekend

  Singer Tom Grennan paid tribute to the victims of 1989's Hillsborough disaster during his set at BBC Radio 1's Big Weekend in Liverpool on Friday. The Little Bit of Love singer was joined on stage by the Spice Girls star Mel C. She wore a Liverpool FC shirt with the number nine on the back, while Tom's Everton top had the number seven. Together they stood side by side to make the number 97 - a tribute to the 97 Liverpool fans who lost their lives at the 1989 FA Cup semi-final.

  Announcing his special guest, Tom told the crowd: "Liverpool is her manor, so make sure you make the biggest noise when I say this name."

  The pair shared the spotlight as Mel C performed her 1998 hit When You're Gone, originally a duet with Bryan Adams.

  The pair shared the spotlight as Mel C performed her 1998 hit When You're Gone, originally a duet with Bryan Adams. Taking a pause from the music, Grennan addressed the crowd about "uniting the city". Speaking to BBC Newsbeat ahead of his set, the Higher singer described "headlining the biggest weekend of the summer" as "pretty crazy". "It's been such a mad journey," he said. And on the collaboration with Mel C, he described her as "a superstar". "I've been friends with Mel for a while now and I just felt like we should do something special. "Thank God she said yes."

