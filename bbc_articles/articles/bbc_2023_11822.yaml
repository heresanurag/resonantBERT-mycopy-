  • None What did you make of Liverpool's display? Send us your views here When Liverpool manager Jurgen Klopp made the surprise decision to replace Salah after 77 minutes the forward made little attempt to disguise his unhappiness. Salah had shown his usual magic in the first half, hitting the bar then producing a brushstroke of genius to set up Diaz's opener. As a result, there were plenty of quizzical looks as he made his way to the technical area, shaking his head and throwing his wrist strapping to the turf as he did so. Klopp said: "I can understand because if Mo scored it would have been a new record for goals scored in the opening game but I didn't think about that. "We needed stability and we needed fresh legs. It was super intense for everybody. That's all I can say about it. His reaction was absolutely OK." Salah was part of a potent Liverpool attacking display but it was clear in this game why Klopp is keen to add a midfield shield of security in the shape of Caicedo or Southampton's Romeo Lavia. For all Liverpool's threat going forward, and substitute Darwin Nunez almost won it with a deflected shot in the last few seconds, Liverpool looked vulnerable at the back. The visitors will nevertheless be reasonably happy with a point, although they thought they had made it 2-0 when Salah scored in the first half before it was ruled out for offside by VAR. However the flaws Klopp is trying to address remain obvious, and at least one more midfield signing seems certain before the transfer window closes. Liverpool were angry they did not receive a penalty for a handball against Jackson but a point was probably what they deserved. "We scored a super first goal, scored a sensational second goal that was unfortunately offside," said Klopp. "If you ask me if I was completely happy with the game, then no, but I saw enough that we are a step further in the right direction. "We had our moments. It was a super intense game, a wild game in moments. We should have controlled it more but couldn't." Mohamed Salah has been directly involved in 12 goals in seven opening days of the season in the Premier League BBC Sport app: Download to follow all the latest on your Premier League team
