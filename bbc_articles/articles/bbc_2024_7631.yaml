title: 'Newspaper headlines: Iran''s drone ''swarm'' and Sydney knife ''rampage''
  - BBC News'
date: '2024-04-14'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68809954
content: |-
  Iran's drone attack on Israel and the knife attack in Australia feature on Sunday's front pages.

  The news of Iran's late night aerial attack on Israel prompted the Sunday Telegraph to change its front page.

  The paper details how the drones launched were seen flying low as they passed over Iraq, in an apparent attempt to avoid radar detection. The Telegraph report also describes "a loud buzzing noise" that could be heard on videos posted on social media as they passed overhead.

  The Sun says Royal Marines are ready for a "Dunkirk-style" evacuation to help British nationals in the Middle East if necessary. The paper reports the operation would take place if the Foreign Office urges civilians to take commercial flights out of Israel, and government charter flights have ceased.

  The Mail on Sunday says what it calls a "dramatic intervention" by one of Angela Rayner's former aides has piled even more pressure on to her to "finally come clean" over claims she breached electoral law. Her former adviser, Matt Finnegan, has told police she was living with her husband at a time when her main residence was registered elsewhere.

  The Sunday Times, which was the first to report the story, quotes Mr Finnegan saying the memory was "vivid" because Ms Rayner was not at home, and he had to wait for her in his car. Ms Rayner has said she has followed the rules at all times.

  According to the Observer, hundreds of extremely vulnerable children in England are being farmed out to illegal homes every year because of a chronic shortage of places in secure local authority units. The paper's investigation has established that Ofsted did not prosecute a single provider last year, despite launching more than eight-hundred investigations. The regulator tells the paper it needs new powers to take action against illegal providers.

  The Sunday Telegraph says Rishi Sunak has hit out at the European Court of Human Rights after it imposed a duty on governments to achieve net zero emissions. The paper says the prime minister's criticism will add to speculation that he is considering including a pledge in the Conservative party's manifesto to pull out of the ECHR.

  The Sunday Times leads on a warning from the business secretary, Kemi Badenoch, that the battle over gender ideology is only just beginning. The paper says she's set to call for "more bravery and less cancel culture" from UK institutions following the publication of a landmark review of child gender services, which recommends a more cautious attitude to social transitioning.

  Writing in the Times, Ms Badenoch says public organisations have become captured by "a minority of ideological activists", and it's time for leaders to "step up and recover impartiality."

  Several papers also feature punters at yesterday's Grand National, celebrating as I Am Maximus romped to a thrilling victory. The Daily Star says crowds enjoyed the event "to the Max".

