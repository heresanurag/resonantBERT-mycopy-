title: Police inquiries continue after baby killed by dog in Coventry - BBC News
date: '2024-06-20'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/cx77zv6v78vo
content: |-
  Police have yet to confirm the breed of the pet that bit the seven-month-old on the head at the family home.

  The dog attack took place at a property on Shorncliffe Road in Coventry

  Police investigations are continuing into the death of a baby girl who was attacked by the family's pet dog. The seven-month-old died after being bitten on the head by the animal in Coventry on Sunday, although its breed has yet to be confirmed by West Midlands Police. The force said on Wednesday, however, the breed was not classed as dangerous, adding the dog had been humanely destroyed. Police have been contacted by the BBC for an update on the inquiry.

  The attack took place within the family home on Shorncliffe Road. Police officers and ambulance crews were called at about 15:00 BST on Sunday, arriving at the scene within minutes, police said.

  The dog was not classed as a dangerous breed, West Midlands Police said

  The girl suffered "serious injuries" and was taken to hospital after being treated at the property by paramedics. She died a short time later. The dog was removed from the home and destroyed on the day of the attack.
