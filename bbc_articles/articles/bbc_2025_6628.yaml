title: Murder arrest as Little Aston golf course crash victim named - BBC News
date: '2025-04-17'
section: England
url: http://www.bbc.co.uk/news/articles/cvgpk32kg3lo
content: |-
  The woman died in hospital on Tuesday, after being struck by a van involved in a police chase on Friday.

  The woman was hit by the van at Aston Wood Golf Club

  A woman who died after being struck by a van on a golf course near Sutton Coldfield has been named, as police confirmed three arrests in the case. Suzanne Cherry, 62, from Aldridge, died in hospital on Tuesday night after the incident at Aston Wood Golf Club in Little Aston on Friday. The vehicle had been involved in a police pursuit, and Staffordshire Police said officers from the West Midlands had arrested three men. A 51-year-old from Bloxwich was held on suspicion of murder, a 22-year-old from Dudley on suspicion of manslaughter and assisting an offender and a 41-year-old from Worcester on suspicion of assisting an offender.

  They are being questioned by detectives in Staffordshire. Officers said they were continuing to search for a man seen leaving Aston Wood Golf Club on foot after the collision. His movements after the collision were being pieced together following witness accounts and CCTV footage the force has gathered. The club is on the Staffordshire-West Midlands border.

  Anyone with information that could help the investigation has been urged to contact Staffordshire Police. The Independent Office for Police Conduct (IOPC) is investigating the circumstances prior to the collision when officers from West Midlands Police had responded to the vehicle being involved in reports of suspicious activity.
