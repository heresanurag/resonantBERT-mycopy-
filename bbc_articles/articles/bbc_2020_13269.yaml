  England is expected to return to the tier system of localised restrictions, with household mixing banned indoors in the top two tiers, when its lockdown ends.

  Public Health England's Dr Susan Hopkins said on Wednesday that tough restrictions might be needed before and after Christmas to allow mixing to take place during the holiday.

  Defence Secretary Ben Wallace said he did not want to be "the Grinch that stole Christmas" but No 10 wanted to safeguard the NHS and protect lives.

  He told ITV's Good Morning Britain: "I would love all of us to be able to have a Christmas, but more than anything I want us to get through this Covid and try and get this country back to normal and I want to protect lives."

  Dr Gabriel Scally, president of epidemiology at the Royal Society of Medicine, told the same programme: "There is no point having a very merry Christmas and then burying friends and family in January or February... It's too dangerous a time and opportunity for the virus to spread."

  Speaking on BBC Radio 4's World at One programme, Dr Katherine Henderson, president of the Royal College of Emergency Medicine, said she was concerned some NHS hospitals in Covid hotspots were seeing "crowded" emergency departments, as well as the beginnings of "corridor care" and "problems unloading ambulances".

  She said: "That's the reality of what we've got in hospitals at the moment. Let's not have that happening and then we can talk about Christmas. But we're not in that situation at the moment."

  Dr Henderson warned that we would "regret" a [festive] season that's given Granny Covid for Christmas" rather than working through a "rational, controlled, plan to come out the other side of this when we've got a vaccine into spring and we can actually start having a much more normal society".

  Her comments follow news that the University of Oxford coronavirus vaccine has shown a strong immune response in adults in their 60s and 70s - raising hopes it could protect age groups most at risk from the virus.

  Prof Hayward also told the Today programme government messaging had not been consistent.

  He said: "When policy is undulating between stay at home to save lives, eat out to help out, the tier system, the second lockdown and now proposals for an amnesty on social distancing - it is a highly inconsistent message."

  Carl Heneghan, professor of evidence based medicine at the University of Oxford told the BBC said some "coherent thinking" from health officials was now required and they would need to "take the public with them" in the run up to Christmas.

  He said there had been some "impressive falls" in Covid cases in some areas and "if we can see that carrying on we would be in a much better position to see what to do at Christmas".

  It comes as scientists who advised the government during the early stages of the pandemic told a BBC documentary focused on the first lockdown that they "never checked" how Covid-19 could be spread by staff working at more than one care home.
