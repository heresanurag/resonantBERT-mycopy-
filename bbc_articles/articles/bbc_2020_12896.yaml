title: 'Milton Keynes murder inquiry: Boy, 16, arrested after death of 17-year-old
  - BBC News'
date: '2020-11-08'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-54865323
content: |-
  A 17-year-old boy dies after sustaining chest injuries during an altercation in Milton Keynes.

  Thames Valley Police said they would remain in the area where the boy died for some time

  A 16-year-old boy has been arrested on suspicion of murdering another teenager in Milton Keynes.

  A 17-year-old boy died after he was found with chest injuries in Kenwood Gate, in the Springfield area.

  Thames Valley Police were called to reports of an altercation in nearby Tyburn Avenue at about 18:40 GMT on Saturday.

  The arrested teenager, who is from Milton Keynes, remains in police custody.

  A large police presence would remain in the area for some time while officers conducted door-to-door inquiries, Thames Valley Police said.

  Det Ch Insp Stuart Blaik said: "I would encourage anyone who has information about what may have happened to please come forward, as well as those who may have been in this area between 18:25 and 18:50."

  He also asked people with dashcams and CCTV to check footage and contact police if anything had been captured which could be connected to the case.

