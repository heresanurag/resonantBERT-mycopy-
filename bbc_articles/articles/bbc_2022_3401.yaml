title: 'Ukraine: Not too late for Vladimir Putin to withdraw, says UK defence secretary
  - BBC News'
date: '2022-03-04'
section: UK
url: http://www.bbc.co.uk/news/uk-60600844
content: |-
  The Russian president risks his country being isolated for decades over Ukraine, Ben Wallace says.

  This video can not be played To play this video you need to enable JavaScript in your browser. Russia's plan not going as they wanted - Ben Wallace

  It is not too late for Vladimir Putin to end his invasion of Ukraine, UK Defence Secretary Ben Wallace has said.

  Speaking at a news conference, Mr Wallace said Mr Putin was risking his nation being isolated for decades to come if he did not withdraw troops.

  He also said thermobaric weapons had been deployed, and he worried how far Russia would go in the future.

  But he went on to predict continuing stiff resistance from Ukraine, in an interview with the BBC.

  "They won't break now and they won't break in 10 years' time," he said.

  He described the Russian president as a man "wrapped in sanctions of his own making, a man who's broken every international law and and a man more and more isolated".

  Meanwhile, the foreign secretary said Russia's economy must be "crippled" to stop it from funding Mr Putin's war.

  Speaking in Lithuania, Liz Truss said all Russian banks should be banned from using Swift, an international payment system, and Europe should reduce its dependency on oil and gas from the country.

  She added: "We need to make sure that the Russian economy is crippled so it is unable to continue to fund Putin and the war machine. And I suspect that the Russian people will draw their own conclusions from that."

