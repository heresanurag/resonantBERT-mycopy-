title: Storm Bert brings rain and high winds on Sunday - BBC News
date: '2024-11-23'
section: General
url: http://www.bbc.co.uk/news/videos/cn42nld94rro
content: |-
  The Met Office has issued a yellow weather warning until 07:00 on Sunday for some parts of Scotland

  Storm Bert will continue into Sunday, bringing further bursts of rain and high winds.

  The Met Office has issued a yellow weather warning for rain until 07:00 on Sunday, for southern Scotland and parts of central and eastern Scotland.

  BBC Scotland's Judith Ralston says there is also a weather warning as high winds are expected to hit the Western Isles and the north-west.

  Otherwise, the temperature should be noticeably milder than the last week.
