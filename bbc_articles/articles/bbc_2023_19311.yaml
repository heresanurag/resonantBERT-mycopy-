title: 'Solihull: Car flips and narrowly misses woman with child - BBC News'
date: '2023-12-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-67762440
content: |-
  CCTV from Solihull shows a car mounting a pavement, turning over and hurtling at pedestrians.

  A woman and her child were left shaken but unhurt when a car veered off a road and flipped on its side right in front of them.

  The crash happened on Warwick Road in Olton, Solihull, at about 16:00 GMT on Saturday, West Midlands Police said.

  CCTV footage showed the woman pushing her child in a buggy before the Peugeot mounted pavement, hit a post and turned over.

  The woman driving the car suffered cuts, said the force, adding an investigation was under way and it was reviewing footage.
