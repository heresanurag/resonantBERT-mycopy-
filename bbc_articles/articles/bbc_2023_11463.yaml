content: |-
  The business secretary signed the new trade deal this morning before speaking to Laura Kuenssberg

  Keir Starmer’s megaphone message to his party: We’re not going promise to spend lots of cash as we head into the next election.

  For political reasons, he wants to head off any attacks from the Tories. For economic reasons, he and the shadow chancellor think it would be the wrong thing to do.

  But when he repeatedly won’t say if Labour would spend more money on the public services than the Conservatives, that is a hard message for many in his party to hear. And likely for many members of the public too, who want more cash to be spent on the services around them.

  His answer is to use the ‘r’ word - reform.

  But when it comes down to brass tacks it is hard to understand what that really means. The labour leader gave an example of digitising paper files when he was the boss of the Crown Prosecution Service, and he emphasised again and again that he wants to fix the country’s long term problems.

  The tricky bit is that many voters want answers to problems they face right now. As the election approaches, the pressure on Sir Keir to make expensive promises is only going to grow.

  That’s why with a year or so to go, part of what the leadership is trying to do is manage expectations of how much they will actually be able to do if they win.

  A few months ago, Sir Keir said, there were “good Labour things” he would like to do in office, but they would have to wait.

  Today he spelt out even more forcibly that spending huge extra sums would only happen once the economy improves.
