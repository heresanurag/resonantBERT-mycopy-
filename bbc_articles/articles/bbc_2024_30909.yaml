content: |-
  A male voice choir surprises commuters on a train into Cardiff with a rendition of Calon Lân.

  Caerphilly male voice choir were on the Cardiff-bound train from Caerphilly when they broke into song.

  Poet Daniel James wrote the words to Calon Lân, Welsh for "a pure heart", in 1891.

  The tune was composed by John Hughes almost a decade later, and it became a favourite at rugby internationals in Wales.
