title: 'Sarah Cunningham: Body found in search for missing artist - BBC News'
date: '2024-11-04'
section: London
url: http://www.bbc.co.uk/news/articles/cy4nenv1g7lo
content: |-
  Police were called to Chalk Farm Underground station where a body was found on the tracks.

  Sarah Cunningham had last been seen in Camden in the early hours of Saturday

  A body thought to be that of Sarah Cunningham has been found, after the artist went missing in north London in the early hours of Saturday. Ms Cunningham, 31, was last seen at about 03:00 GMT on Jamestown Road in Camden wearing a black vest top, skirt and Converse trainers. In a post on X, external, Camden Police said emergency services were called to Chalk Farm Underground station in the early hours of Monday where they found "a casualty on the tracks". The death "is being treated as unexpected but at this time it is not thought to be suspicious", the post said, adding Ms Cunningham's family had been informed and had requested privacy.

  The force said formal identification was yet to take place. Officers from the Met Police are working with the British Transport Police to look into the circumstances. Jamie Klingler, co-founder of women's safety group Reclaim These Streets, posted on X, external after the announcement, saying: "Thank you to everyone that helped spread the word. Please respect her family’s privacy at this time." London's Lisson Gallery, where Ms Cunningham has exhibited, external, had posted on Instagram, external appealing for anyone with information to contact the Met, while her brother Anthony also posted on social media, external in an appeal for information. Ms Cunningham was born in Nottingham and attended Loughborough University. Her work has featured in exhibitions in Germany, Canada the United States.
