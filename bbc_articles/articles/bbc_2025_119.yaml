content: |-
  Being the UK's new City of Culture is a chance for Bradford to challenge prejudices against the city.

  UK's new city of culture seeks to overturn negative image

  "The stigma is old now - that's not what Bradford is," says actor and writer Natalie Davies

  As Bradford begins its year as UK City of Culture, it is not just trying to show a different face to the rest of the country - it's also hoping to win over doubters in the city. One of the first productions is a radio play written by broadcaster Nick Ahad, and its theme is Bradford's battered reputation. "The working title for this play was 'Bradford, City of Culture?!' because we knew that's what the reaction would be when people found out we would be the City of Culture for 2025," he explains. Ahad eventually settled on the excellent title Bilal and Ted's Bradfordian Adventure, and it's on BBC Sounds. One of the actors is Seeta Wrightson, a comedian from the city. "I think it's really unfairly got a bad rep. And I think that's because in the news or on social media, people don't want to talk about good things."

  "We don't want no negative talk" Nick Ahad and Seeta Wrightson in rehearsals for Bilal and Ted's Bradfordian Adventure

  The headlines about Bradford are often brutal. In recent months, news stories have declared it Britain's gloomiest city (because it has the least sunshine) and the second most miserable place to live. Type the words "Why is Bradford so....?" into a search engine and see what happens. The odds are you will probably get the following autofill options - "bad", "dangerous" and "poor". And it's not just the opinions of people outside the city. Dr Paul Sullivan of Bradford University has carried out research into the stigma. His hometown is Ireland's Cork, a place where its comedians make fun of its high opinion of itself. Bradford, he discovered, was rather different. "What surprised me was... the almost lack of civic pride. "Even reading the local newspaper, some of the headlines can be very upbeat, and beneath it are just loads of comments that, 'This is a disaster, it'll just never work, Bradford is doomed'." "I love the city. I fell in love with Bradford straight away. I love the city centre, the beautiful countryside. And it was really quite a surprise to me to see that level of negativity." Much of it, he believes, is rooted in an external and almost "ideological hostility" to the city's ethnic diversity. "I think there's a reluctance to admit that Bradford can succeed. A desire for Bradford to fail." However, in the face of this antagonism, something is, he feels, developing. In his recent interviews with residents, "there was a real sense of pride, in their sense of belonging". It was a topic Ahad and Wrightson also raised. Diversity has become utterly unremarkable. "I'm Bangladeshi and English. My wife's Pakistani and Indian, and you sort of don't have to explain here," says Ahad. "Like 100%," Wrightson adds. "I'm mixed heritage, my mum's Indian, my dad's English. And growing up, it wasn't a big deal." City of Culture has for many become a moment to look beyond the problems and champion what's growing out of its diversity.

  Loft living for £25,000 - Bradford city centre has a host of beautiful listed Victorian buildings that frequently appear in movies, with affordable prices

  Natalie Davies, an actor and writer from Bradford, is creating a play about the city's nightlife. "The stigma that's been attached for years is old now, and that's not what Bradford is. "I'm very lucky. I've worked in television, I've worked in film, I've worked in theatre and radio, and every time I go on to a set, I always champion Bradford. "This is actually a great place, and the thing about it is anybody from anywhere could come to Bradford and feel like they belong and we hold that. People come and completely feel welcomed. City of Culture has also been a chance for people to take stock of Bradford's cultural history and the famous names that have come from here. Among them are artist David Hockney, playwright JB Priestley, composer Delius and the Bronte sisters. "Emily Bronte, you just take it for granted that she's from Bradford," says Wrightson. For her, City of Culture has been a moment to look at what makes the city special. And again and again, talking to younger Bradfordians, while some might mention the Brontes, the spectacular Victorian architecture, the first free school meals or the diversity - almost everyone seems to agree that the city's food is key.

  "People have tried. None have succeeded," says Samad Iqbal of the unconquerable naan

  Of course, no two people ever seem to agree as to where you can get the best curry, but perhaps one of the best known restaurants is Akbar's, famous for the creation of the giant hanging naan. Created to save space on a table, the family naan grew to a size that has defeated even the largest Yorkshire appetite. "People have tried. None have succeeded," says Samad Iqbal, who started working at Akbar's aged 15 and is a proud ambassador for a city that describes itself as the Capital of Curry. "Some people call it elephant ears. Some people call it a Christmas tree. But this family naan has gone worldwide. "I am very proud of Bradford, I'm born and bred here. It's a fantastic place to live, a fantastic place to eat. It's places like this which show the true spirit of Bradford."

  It appears Bradford 2025 has already begun to have an effect. It has, says Dr Sullivan, encouraged people to talk positively about the city. "In the last couple of years we have seen a change. I am speaking from opinion here now rather than research, but I think we have seen a shift towards civic pride, and I think the catalyst for that really coming to fruition will be Bradford 2025."

