title: 'Cardigan: Search for canoeist reported missing at River Teifi - BBC News'
date: '2024-06-06'
section: Wales
url: http://www.bbc.co.uk/news/articles/ce77g0179ldo
content: |-
  Emergency services are at the scene following reports of a person in the water.

  A rescue helicopter could be seen flying in the area of the search

  Coastguards, the RNLI and emergency services are searching a river after a canoeist was reported missing. Dyfed-Powys Police said the search began on the River Teifi at Cardigan, Ceredigion, after the canoeist was reported missing just before 19:40 BST. A coastguard helicopter and coastguard rescue teams from Cardigan and Moylegrove said they were called the scene following reports of a person in the water. The helicopter could be seen doing sweeps above the river.

  A lifeboat from Cardigan RNLI also joined the search, HM Coastguard says

  A lifeboat from Cardigan RNLI also joined the search, as well as Mid and West Wales Fire and Rescue Service and other specialist search and rescue teams, police said. Police have asked people to stay away from the scene.

  Police and the fire are rescue service are also at the scene
