title: Coronation anniversary marked by 41-gun salute - BBC News
date: '2024-05-06'
section: General
url: http://www.bbc.co.uk/news/uk-68964598
content: |-
  It's one year since King Charles and Queen Camilla were crowned in a lavish, historic ceremony.

  Military celebrations in London marked the first anniversary of the coronation of the King and Queen.

  The King’s Troop Royal Horse Artillery fired a 41-Gun Royal Salute for King Charles and Queen Camilla outside Buckingham Palace.
