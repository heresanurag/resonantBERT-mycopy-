title: Veteran wants medal law after Northants police chief sacked - BBC News
date: '2024-06-22'
section: England
url: http://www.bbc.co.uk/news/articles/ce99rrq1r2xo
content: |-
  Tom Herring, a Falklands veteran, says military medals should be respected.

  Tom Herring served with 3rd Battalion, the Parachute Regiment, during the Falklands war

  A Falklands war veteran has called for a change in the law after a disgraced chief constable was found to have worn a medal from the campaign to which he was not entitled. Tom Herring, the chairman of the South Atlantic Medal Association, external, has described the actions of former Northamptonshire chief constable Nick Adderley as "despicable". Mr Herring fought in the Battle for Mount Longdon during the Falklands War in 1982, which left 23 British soldiers dead. He said the UK should look at introducing laws similar to other countries where wearing a medal without the right to do so, external can be a criminal offence.

  A complaint about Northamptonshire's chief constable wearing a South Atlantic Medal - which was awarded to those who served in the Falklands War between Britain and Argentina - when he would have only been aged 15 when the conflict started, was the first step towards his downfall. Investigations into claims made about his naval career led to Mr Adderley facing a disciplinary panel, which ended with his dismissal for gross misconduct after it found he exaggerated his naval rank, length of service and achievements. In a statement to the panel, he said: "To those veterans I have offended, I apologise unreservedly."

  Tom Herring, from Bedford, wears the South Atlantic Medal with pride as he served in the war which followed the Argentine invasion of the British-held Falkland Islands in 1982. He said he saw 23 of his comrades die on the mud-covered mountain overlooking Port Stanley, three days before the Argentine surrender.

  Tom Herring (in the centre with a moustache) took part in the battle for Mount Longdon in the 1982 Falklands War between the UK and Argentina

  The former Parachute Regiment sergeant said: "It's not illegal to wear medals that you're not entitled to, but it's probably despicable to be associated with it, and that's what [Mr Adderley] has done." Many countries have different laws to the UK, and a House of Commons briefing paper called Stolen Valour, external has looked at the issue and compared legislation across Europe, Australia, New Zealand, Canada and the US. Laws aim to tackle a range of crimes from fraudulent wearing of medals to wearing them without the right to/not having earnt them personally.

  Tom Herring wears his medals with pride, including his South Atlantic Medal (far right)

  Mr Herring said: "There should be a change in the law. "We're proud of our military and civilian forces and these people who put their lives on the line as and when their country needs them to, and they should be respected." He added that military medals should not be worn "by someone who is trying to get a job or make a quick buck".
