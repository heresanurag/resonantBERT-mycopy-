title: Escaped kangaroo caught in Canada after four-day search - BBC News
date: '2024-03-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67621262
content: |-
  The runaway animal had escaped its handlers while being unloaded and was finally caught - by its tail.

  Officers from the Durham Regional Police spotted the runaway animal on a property near Oshawa in Canada. The kangaroo had escaped its handlers while being unloaded and was finally caught four days later by its tail.
