  Meanwhile, NHS Dumfries and Galloway apologised after hundreds of children who were too young to receive a vaccination received invitation letters.

  Immunisation co-ordinator Dr Nigel Calvert said the health board had "got a bit ahead of ourselves" and would contact everyone affected.

  A health board spokesman confirmed more than 800 letters had been sent out in error.

  Dr Calvert said they could only vaccinate people who would be 18 or over by 31 July and apologised for the "misinformation" issued.
