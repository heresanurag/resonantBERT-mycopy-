  Faced with the possible resumption of war, Hamas may be wondering what incentive there is to release the remaining hostages. For relatives and friends of the hostages, the current impasse, and Trump's noisy intervention, is cause for fresh anxiety. "Each of these statements or announcements, of course, make Hamas more stubborn," Dudi Zalmanovich told the BBC. His wife's nephew, Omer Shem Tov, is still being held by Hamas. "I would prefer him to be less proactive," Mr Zalmanovich said of Trump. Israel has its own suspicions about the rationale behind Hamas's threatened delay. The spectacle of emaciated hostages being released at the weekend has raised fears that Hamas may not want the world to see others in even worse condition. On top of the televised scenes of well-armed Hamas fighters parading in broad daylight, and warnings from the former US Secretary of State, Antony Blinken, that the group has recruited as many soldiers as it's lost during the war, not all Israelis believe the ceasefire can – or even should – hold. It's too early to say whether this carefully negotiated, staged process is about to collapse – as many have predicted it will – but after a mostly positive start, it's under increasing strain.
