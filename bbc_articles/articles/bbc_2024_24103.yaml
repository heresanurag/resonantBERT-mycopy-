title: 'Staines: Police treating deaths of children as murder - BBC News'
date: '2024-09-06'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cn49p1qed14o
content: |-
  The three children who were found dead at a house in Staines were all aged under four.

  Piotr Swiderski with his three children Nikodem, Dominik and Kacper

  The deaths of three children found at a house in Surrey with their father are being treated as murder, police have said. Dominik Swiderski, aged three, and his brothers Nikodem and Kacper, both aged two, were found dead in Staines on Saturday. Their father had been identified by police as Polish national Piotr Swiderski, aged 31. Surrey Police said officers were not looking for anyone else in connection with the investigation.

  “Their mother is being supported by specially trained officers,” the force said. Police said inquests into their deaths are to take place next week. The force previously said it had referred itself to the Independent Office for Police Conduct (IOPC), due to previous contact with the family. The IOPC said on Tuesday that the previous contact, in August 2023, "related to concerns about a man's mental health" and determined that an investigation into this previous contact was not required. The children have been described as “full of life and happiness” by their grieving mother. In a statement, Angelika Swiderska said: “Piotr was an amazing husband and father to Kacper, Nikodem and Dominik. He loved us with all his heart and would have done anything for us. “Our boys were happy, active children, full of life and happiness. They were always smiling and even when I looked sad, they would say, 'Mummy smile like us'.”

  Flowers were left in Bremer Road, near a property where the bodies were found

  Police were called by the ambulance service to the house in Bremer Road on Saturday, where the bodies of three children and their father were located inside. Det Con Insp Kimball Edey said: "I would like to express my sincere condolences to the family of Dominik, Kacper and Nikodem for their loss. “They will continue to be supported by specialist officers as our investigation continues. I would ask that their privacy is respected at what is a tremendously difficult time for them." The inquests into the death of Piotr Swiderski and the three children are expected to be opened and adjourned on 10 September. The force added that post mortems would take place in due course.
