  • None This was England's first defeat in a European Championship qualifier since losing 3-2 at Wembley against Croatia in November 2007.
  • None Harry Kane has scored 20 goals in 21 matches for England when starting as captain - the only player with more is Vivian Woodward (23 goals between 1908 and 1911).
  • None Excluding shootouts, no player has scored more penalties for England than Harry Kane (9, level with Frank Lampard).
  • None Zdenek Ondrasek scored on his international debut for Czech Republic, scoring with his first shot in international football.
  • None Gareth Southgate (W21 D9 L8) has lost as many games as England manager in 38 matches as Roy Hodgson lost in 56 matches as manager (W33 D15 L8).

  England travel to Bulgaria on Monday (kick-off 19:45 BST) looking to secure a spot at Euro 2020.
