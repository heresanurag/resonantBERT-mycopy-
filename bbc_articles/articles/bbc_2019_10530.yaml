  A woman was shocked and tearful, saying her parents had been helping to look after the Mierlo cemetery for years.

  "My heart is crying. Here are 17- and 18-year-old boys buried, who liberated us."

  Dutch police have tweeted an appeal to the public for any information that could lead to the perpetrators.
