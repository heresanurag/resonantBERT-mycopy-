title: 'Honduras football rioting: Three killed ahead of Tegucigalpa derby - BBC News'
date: '2019-08-18'
section: Latin America & Caribbean
url: http://www.bbc.co.uk/news/world-latin-america-49386295
content: |-
  Three people are killed and several hurt in fighting between fans, after a team bus is attacked.

  This video can not be played To play this video you need to enable JavaScript in your browser. Phone footage captures tensions outside the stadium and armed police on the pitch

  Three people have been killed and about 10 injured in rioting between fans of rival football clubs in the Honduran capital, Tegucigalpa.

  The violence broke out ahead of a planned game between the Motagua and Olimpia clubs on Saturday evening.

  It began when crowds threw stones at the Motagua team bus, injuring three players with shards of broken glass.

  Fighting continued both inside and outside National Stadium after officials cancelled the game.

  "Three people died and seven were shot and stabbed. One of them is a boy. Three of the injured adults are in critical condition," local hospital spokeswoman Laura Schoenherr told Reuters new agency.

  More than 10,000 people were already in the stadium when the trouble erupted. Many were caught in a stampede as police used tear gas to tackle the rioters.

  The Motagua club tweeted pictures of the damage inside the bus after the attack, and of the wounded players being treated in hospital. Those pictured were named as Emilio Izaguirre, Roberto Moreira and Jonathan Rougier.

  The club blamed members of the Ultra-Faithful Olimpia fan club, saying: "This has to be severely sanctioned by the authorities."

