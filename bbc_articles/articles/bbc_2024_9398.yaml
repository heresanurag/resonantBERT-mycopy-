  However, his career has been hampered by injuries since and he missed the entire home summer last year with a stress fracture in his right elbow. Archer, who signed a two-year central contract with England in October, last played a Test in February 2021. "Jofra's been out at Sussex's pre-season in India and bowled quickly out there. He bowled really well," Key said. "He's now just gone back to the Caribbean, where he will play a little bit of club cricket, stuff like that. "It's all about getting himself ready for that T20 World Cup. He'll hopefully play the Pakistan [T20] series [in May], but it's all fingers crossed with Jofra at the moment. "What we're going to do is take it slower [rather] than trying to go too quickly so we get him back for not just a short period, but a long period." England play three Tests against West Indies and Sri Lanka this summer.
