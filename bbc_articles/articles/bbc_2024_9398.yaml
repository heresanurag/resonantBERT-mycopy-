title: 'Jofra Archer: England bowler ruled out of Tests until 2025 - BBC Sport'
date: '2024-04-05'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/68740765
content: |-
  England pace bowler Jofra Archer will not make his Test return this summer but the T20 World Cup in June is a realistic goal, says managing director Rob Key.

  Jofra Archer has taken 42 wickets at an average of 31 in 13 Tests since making his debut in 2019

  England pace bowler Jofra Archer will not play Test cricket until 2025 but this summer's T20 World Cup is "absolutely" a realistic goal, says managing director Rob Key. Archer, 29, has not played for England in any format since March 2023 because of an elbow injury. The T20 World Cup in the West Indies and United States starts on 1 June. "The whole plan with Jofra is he is going to play white-ball cricket this summer," Key told Sky Sports., external "Then hopefully next summer when we play India then the Ashes [in Australia] we get him back for Test cricket." Archer bowled the super over when England beat New Zealand in the final of the 2019 World Cup.

