content: |-
  Police believe Tom Voyce tried to cross a flooded ford and his car was pulled along by the current.

  Body found in search for rugby star missing in flood

  Tom Voyce retired from rugby in 2013 and has been living in Alnwick since 2020

  A body has been found in the search for former England rugby international Tom Voyce, who went missing in an area flooded during Storm Darragh. Police feared the 43-year-old had died after trying to cross Abberwick Ford, near Bolton, Northumberland, in a vehicle which was then pulled along by the current. A search had been ongoing since Sunday, but Northumbria Police's Marine Unit discovered a body near Abberwick Mill earlier. Formal identification is yet to take place, but Mr Voyce's next of kin have been notified.

  Concerns were raised after Mr Voyce, who was capped nine times for England from 2001 until 2006, had not returned home from being out with friends on Saturday evening.

  Former rugby player Tom Voyce, pictured here during his time at Gloucester, had been missing since Sunday

  Northumbria Police's Ch Supt Helena Barron said: "This is an extremely sad development and our thoughts very much continue to be with Mr Voyce's loved ones." Officers do not believe there to be any third-party involvement. The rugby player's family and friends were involved in the search alongside the police, mountain rescue teams and the National Police Air Service. His wife Anna and family previously thanked police, friends and the local community for their help and support.

  The search was carried out in "very challenging" conditions due to the river flow and level being heightened after the heavy rain over the weekend, police said. Mr Voyce, from Truro in Cornwall, played for Wasps, Bath and Gloucester before retiring from the sport in 2013. He previously worked for the bank Investec and has been living in Alnwick since 2020. Among those from the world of rugby who have paid tribute were former England international Mike Tindall, who played with Mr Voyce at Gloucester. A post shared by his podcast, The Good, The Bad and The Rugby, read: "He epitomised rugby as a game for all shapes and sizes, punching well above his weight. "His ability to break tackles and his durability were exceptional. He was a great character off the pitch." His co-host, former England star James Haskell, also paid tribute, adding: "He was a teammate, a friend and an incredible player - someone I admired who always punched above his weight. "He will be sorely missed by everybody."

  The body was found in the River Aln near Abberwick Mill

  A carol service due to take place at Bolton Chapel, near to the search, was cancelled on Wednesday. The Reverend Gill Lonsdale said: "Nobody really has the heart to gather and sing carols, so it felt the right decision not to hold the event this year."
