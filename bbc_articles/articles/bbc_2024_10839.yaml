  Second, the pundits' calculators suggested that if the whole country had voted on Thursday, the gap between the Conservatives and Labour comes out at 9%: not, theoretically, an insurmountable gap to close when the general election campaign is miles away and could bend the curves. One cabinet minister said that after months of "frothing at the mouth about apocalypse actually, maybe we could have a hung parliament. This will encourage people to believe there is a fight worth having." Remember too, Labour fell so far behind in 2019 that it needs to shift millions of votes, not a few here and there, to win outright when it comes to the national question. And even if the numbers look scary in lots of parts of the country, with the Tories losing hundreds of campaign foot soldiers, changing the leader to an as-yet-undecided alternative candidate might just cause more disruption, more bellyaching, more turmoil. If chaos in the Westminster party has been part of the problem, why on earth would it be the solution? A former minister says: "There just isn't the impetus to roll the dice one more time." There is no one guiding idea or philosophy that binds the malcontents together either, beyond 'it looks grim, surely we need to do something or else we're out of a job?' And there is no agreed candidate. Indeed, one of those who might be tempted to run, former cabinet minister Suella Braverman, has written in the Sunday Telegraph that while she believes the party must change course, changing the leader is not the answer.

  Rewind to the Theresa May days. The rebels weren't just well organised, they agreed they needed a more dramatic departure from the EU and they had a candidate waiting in the wings - Boris Johnson. They were pushing for a different policy platform and they had a big personality, bristling with ambition, eager to plot. That's just not the case now. And yet, one Tory describes it as "Alice in Wonderland" to suggest the victories of a mayor with strong personal backing like Ben Houchen means things are going to be OK for the national party. And look at some of the other mayoral contests, the West Midlands, the East Midlands, or the embarrassment for Rishi Sunak of losing the mayoral contest in his own North Yorkshire neighbourhood. Look at the map, not the mayors. Those councils the Conservatives have lost - Nuneaton, Redditch, Milton Keynes, Rushmoor, Basildon and so many others. It's like a roll call of towns and areas where the Labour party hopes to win MPs at the general election. Add in the Lib Dems taking Dorset council, Tunbridge Wells and kicked the Tories out of control in Gloucester, and, in fact, winning more councillors than the Conservatives for the first time since 1996. One former Tory minister told me, it has "been an appalling night and no amount of spin from the national party can hide the fact that we are in very, very big trouble". Many of them are areas that were captured by the Tories as David Cameron made his way to Number 10 that now Keir Starmer is taking back as he attempts the same journey.
