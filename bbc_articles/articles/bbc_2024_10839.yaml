title: 'Laura Kuenssberg: Are Tories resigned to electoral fate under Rishi Sunak?
  - BBC News'
date: '2024-05-06'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68956828
content: |-
  Tory MPs are in no mood to oust Rishi Sunak despite local results pointing to general election defeat.

  "This is the moment," a senior Tory excitedly told me just before these local elections began. The moment when Rishi Sunak's leadership was in jeopardy - they hoped at least. If the results were as dreadful as months of shocking national opinion polls suggest, there was a chance that Conservative MPs would find the desire and the gumption to push for change at the top. On Saturday night, West Midlands Mayor Andy Street lost his berth after a nail-biting count. That will be a huge disappointment to the Conservatives who had hoped to hang on there. Especially with a razor thin margin, and after counting some votes again and again. Like Ben Houchen on Teesside, Andy Street had campaigned as his own man, not a party apparatchik. Recounts, and bundles of votes being checked, tell you how close that outcome really was. The Street result is a huge last minute disappointment, and the council election results are dire. One minister told me there are "lots of places where panic could come from". But even with the Street defeat, it seems "the moment" is more likely to be the one where Rishi Sunak's position as leader has been confirmed. So far. Well, Tory HQ can't mention the mayor in Tees Valley, Ben Houchen's victory, often enough. Before the elections, the party was urging its own MPs and the public to concentrate on where there were prominent local politicians. It was a not very subtle pre-poll expectation management exercise. Lord Houchen, a local big character, did indeed buck the national trend. And that showed that in areas where Conservatives had a good, well-known candidate and chucked the kitchen sinks at their campaign, they can win. Although "there's an irony that a Boris guy, Ben, has saved Sunak", one Tory jokes. But the result there does give the party at least one reason for cheer.

