  You will hear senior Conservatives claiming it's a normal thing to happen in the mid-term of a government. But this is not mid-term. We are on the runway to the general election and the string of results culminating in the Tories losing shy of 500 councillors is about as bad as they feared it might be. The results aren't that different since this time last year. So, hey, maybe no new emergency. But hey, that means Rishi Sunak just isn't turning things round. This time last year his allies argued: give us time, we're only just getting to grips with the chaos that Liz Truss and her lettuce created. They hope there will be better economic news soon. But 12 months since the last set of council elections when the Tories got a kicking, all Rishi Sunak's resets, refreshes and attempts to regroup have had little effect so far. As a tribe, Rishi Sunak's MPs don't believe they can hang on to Number 10 right now. Isn't it weird for Tory MPs, often portrayed as the most Machiavellian and competitive people in the country, to hang on to a leader when they are pretty sure they are going to lose the election? As we've talked about, there are fears another leadership rumpus could do more harm than good after all the travails they've already had. Some still believe that Sunak is the best option they have. These results are grim. But it's also true that they don't mean Labour is guaranteed to get a majority. And there's another more calculating factor. Some MPs want Rishi Sunak and his cabinet to soak up the blame, when the defeat they expect comes. One former cabinet minister says: "Sunak isn't being challenged only because no-one wants to own the failure." So, for now, the Conservative Party seems to have made its choice. To hold on to power for a few more very difficult months with the hope of improving a dire situation, rather than taking a chance to change things that could spiral into an unknown chaos. If the Conservatives ultimately crash to a big defeat, this weekend might come to represent the moment it accepted its fate. One senior MP told me: "If it doesn't happen now then the party has made its choice and will suffer the consequences," with so many councillors gone, "there is nobody else left to sacrifice before it's us MPs." The loss of the West Midlands mayoralty could give the would be rebels another flash of desire to act. But the consensus in the party as this weekend of results draws to a close seems already to have settled against any concerted move. Would-be rebels have been avoiding, rather than rushing towards the microphones. One Tory in their loose camp told me "the momentum was taken out of it on Friday. It had to all start very bad and continue like that. Houchen early saved him". Will the symbolic loss of Andy Street's perch in the West Midlands change that? When MPs gather together again in Westminster, the mood could darken further, plotters could regroup and stiffen their resolve. But as the final tallies of winners and losers are finalised, after millions of votes that suggested how unpopular the Tories are right now, Rishi Sunak's backers believe he is safe from his party. But are the Conservatives safe from the country's verdict?

