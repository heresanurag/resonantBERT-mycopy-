title: 'Newspaper headlines: GPs ''standstill'' and ''silver for Peaty'' - BBC News'
date: '2024-07-29'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c72vgq6y83po
content: |-
  Monday's papers focus on GPs threatening industrial action and Adam Peaty narrowly missing a gold medal.

  Both the Daily Mail and the i lead on the threat that GPs could bring "the NHS to a standstill" if they vote to take industrial action for the first time in 60 years. The ballot closes at midday. The Daily Mail says if the action goes ahead it is feared up to three million GP appointments could disappear, external every month. The Daily Mirror says underfunding general practice could lead to a two-tier system where some patients go private. The Department of Health tells the i it is planning for all contingencies, external. The Guardian and the Times both focus on US efforts to urge Israel to exercise restraint after the rocket attack which killed 12 children and teenagers in the occupied Golan Heights. The Daily Telegraph notes in its leader column that Hezbollah is "an altogether different challenge to Hamas", external. The prospect of a war spreading across the Middle East will alarm foreign governments which, the paper says, have turned a "blind eye" to the threat from Hezbollah for too long.

  On its front page, the Financial Times says the US Vice-President Kamala Harris has raised $200m in the first week of her election campaign. The paper says that is more than either President Joe Biden or Donald Trump collected in the whole of June. The FT says there are signs in the polls that the vice-president is closing the gap between her and Mr Trump. The Olympic swimmer, Adam Peaty, is pictured on many front pages after being pipped to first place last night by two one-hundredths of a second. Most papers choose a photo in which he is smiling, holding up his silver medal. The Sun says he missed out on gold "by a fingernail" while the Times highlights his post-race comment that he was "crying happy tears", external. The Mirror sums up its disappointment with a pun on his name, "what a Peaty".

