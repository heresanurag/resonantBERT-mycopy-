title: World’s largest video screen transforms the Las Vegas skyline - BBC News
date: '2023-07-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66114544
content: |-
  More than a million LED lights assembled as a sphere are the latest addition to the strip.

  As part of a special show to celebrate the Fourth of July, the world's largest LED was completely illuminated in Las Vegas, creating a new landmark on the Las Vegas skyline.

  The sphere is made up of approximately 1.2 million LED pucks. Each puck contains 48 individual LED diodes, with each diode capable of displaying 256 million different colours.
