id: bbc_2020_1669
title: New Zealand flash floods leave tourists stranded - BBC News
date: '2020-02-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-51380141
content: |-
  Bad weather in the south of the country has hampered rescue efforts with hundreds still awaiting rescue.

  Torrential rain and flash flooding in the south of New Zealand has left many tourists stranded.

  Many hikers were evacuated from Fiordland by helicopter on Tuesday, but heavy rain meant rescue efforts for those trapped in Milford Sound was put on hold.
