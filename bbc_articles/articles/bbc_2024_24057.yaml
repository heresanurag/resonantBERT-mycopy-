title: 'Newspaper headlines: Rich ''to quit UK'' and Lee Carsley ''won''t sing anthem''
  - BBC News'
date: '2024-09-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cj3563knelro
content: |-
  Saturday's stories include England interim manager Lee Carsley suggesting he may not sing the national anthem.

  The Daily Telegraph takes a dim view of Lee Carsley's suggestion that he will not sing the national anthem, external as he takes charge of England for the first time. The paper's chief football correspondent, Jason Burt, says Carsley is being naive and should not be managing the national side if he does not sing God Save The King ahead of his inaugural match. The paper argues that even though the former Ireland international may not have sung it as a player or in charge of England under-21s this is - as it says - a whole new ball game, with new levels of responsibility and scrutiny. The Daily Mail says the Football Association should sack Carsley if he does not sing, external the national anthem. The Guardian leads on the government's plans to introduce a renters' rights bill, external next week, which it calls a major victory for campaigners. It says they have warned for years that the lack of tenant protections in the UK has made the housing crisis worse and added to the financial instability of millions of renters. The paper notes that the bill is a central plank in Labour's plans for the housing market but that landlords have warned ending no-fault evictions could lead to an overwhelming number of court cases.

  England's new interim manager said he will not sing the national anthem before his team take on Ireland on Saturday

  According to the Times, the number of wealthy Britons looking to move abroad has surged, external since Labour came to power. They are said to be concerned about the chancellor's tax plans for the Autumn budget. The paper said one company offering relocation services to high net worth individuals had seen a 69% spike in inquiries last month compared with August last year. A Treasury spokesman said difficult decisions would be made in the budget to fill a £22bn funding gap. The Financial Times suggests the chancellor is already facing a Whitehall "revolt", external against planned spending cuts. It says Rachel Reeves has given departments until next Friday to come up with plans to work with the spending restraints she says are inherited from the Conservatives. But one official tells the paper that the cuts the Treasury wants are "just not possible". The Daily Mail says the Royal Navy's fleet is in what it calls an "utterly dire" state, external - with many of its vessels broken down, being repaired, or doing trials. It says that open-source data suggests that out of 25 warships and its six attack - though not nuclear - submarines, only nine vessels are said to be active or deployed. The Royal Navy says ships rotate through planned cycles and that it can meet operational requirements.

  Frozen croissants are on the rise even in France, writes the Financial Times

  "Give back your gong! Fury as Sir Ian badmouths the Queen' is the headline on the front of the Daily Express, external - referring to comments the veteran actor, Sir Ian McKellen, made in another paper, the Times. In an interview about his latest film Sir Ian, said that the late Queen had been "rude" during the ceremony making him a Companion of Honour, when she asked him if anyone still went to the theatre. And the front page of the Financial Times will dismay fresh food traditionalists. It is reporting that frozen pre-made croissants are on the rise, external, replacing the freshly-produced real thing in cafes in the US and western Europe - including France. One leading maker of the frozen version claims even top pastry chefs can not tell the difference.

