content: |-
  Navy personnel from Devon and Cornwall were called on Christmas Day for a five-day operation.

  Russian warship tracked for five days off UK coast

  HMS Somerset's crew was recalled on Christmas Day after RFS Soobrazitelny and two support ships were spotted near the British coast

  Navy personnel from Devon and Cornwall were dispatched to watch Russian vessels sailing near the British coast. The Royal Navy said Devonport-based HMS Somerset's crew was recalled on Christmas Day before it sailed two days later as RFS Soobrazitelny and her two support ships MV Sparta II and MV General Skobelev sailed across the English Channel. Airborne support was provided during the mission by the Type 23 frigate's Merlin helicopter, which was provided by 814 Naval Air Squadron at RNAS Culdrose, the navy added. A navy spokesperson said the shadowing operation lasted five days and ended on New Year's Eve.

  HMS Somerset's commanding officer Cdr Joel Roberts said the crew, consisting of nearly 200 people, was always prepared to protect the UK, even during holiday periods. "As the UK is an island nation, at all times of the year the Royal Navy maintains units at very high readiness to conduct operations in support of the UK's national objectives," he said. Armed Forces Minister Luke Pollard, who is MP for Plymouth Sutton and Devonport, said the crew involved had shown great "professionalism" during the operation. "I would like to thank the crew of HMS Somerset for their dedication after readying themselves for action at short notice during the Christmas period, and promptly setting sail from Devonport to keep the UK safe," he said.
