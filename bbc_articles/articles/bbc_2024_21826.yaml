title: Police minister's purse stolen at police conference - BBC News
date: '2024-09-13'
section: England
url: http://www.bbc.co.uk/news/articles/cdx6xvvn25xo
content: |-
  Thieves struck while Diana Johnson spoke at the annual Police Superintendents' Association conference.

  Policing Minister Dame Diana Johnson had her purse stolen from the hotel where she gave a speech at a conference for senior police officers on Tuesday. Thieves struck while Dame Diana was giving a speech blaming the Conservatives for an “epidemic of antisocial behaviour, theft and shoplifting,” at the annual Police Superintendents' Association (PSA) conference at a hotel in Kenilworth. A member of Home Office staff also had belongings taken. A 56-year-old man from Coventry has been arrested on suspicion of burglary and released on bail in connection to the incident, Warwickshire Police said. The Home Office said no security risks had been identified.

  Dame Diana used her speech to attack the Conservative Party's legacy and outline the government’s plans to boost neighbourhood policing. Labour's mission "is to restore respect for the rule of law on British streets, including restoring respect for the police, which has sadly been eroded over many years," she said. "Too many town centres and high streets across the country have been gripped by an epidemic of anti-social behaviour, theft and shoplifting, which is corroding our communities and cannot be allowed to continue," she added. Dame Diana announced the government has "agreed initial funding to support the College of Policing in rolling out a specialist new training programme for neighbourhood officers". President of the Police Superintendents' Association (PSA) Nick Smart told the conference police have been left at the centre of a storm not of their making due to the early release of hundreds of prisoners. He complained that inmates are being set free without proper release plans and that the police would be left to deal with the consequences. Warwickshire Police confirmed it was investigating reports of a burglary at the Kenilworth hotel that hosted the PSA conference. A police spokesperson said: "The theft occurred some time between 11.00 BST-13.15 on Tuesday. "Inquiries are ongoing. A 56-year-old man from Coventry has been arrested on suspicion of burglary and has since been released on bail while enquiries continue.”
