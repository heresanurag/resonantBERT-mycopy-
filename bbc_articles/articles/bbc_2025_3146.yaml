content: |-
  Morgan Dorsett, from Shropshire died on Wednesday at a flat in south Bristol.

  19-year-old Morgan Dorsett died after she was attacked by a dog in Bristol

  A woman who died in a suspected XL bully attack at a flat in Bristol has been named by police as Morgan Dorsett. The 19-year-old, from Shropshire, died at about 19:00 GMT on Wednesday at a flat on Cobhorn Drive, south Bristol. A man and woman, both in their 20s, have been released on conditional bail after they were arrested on suspicion of being in charge of a dog dangerously out of control causing injury resulting in death and possession of a prohibited breed of dog. Police have confirmed the dog has been put down. They say they are still working to confirm the breed, but initial reports suggested it may have been an XL bully.

  Police have called the attack on 19-year-old Morgan Dorsett "incredibly rare"

  Police are asking anyone who has any information about the attack to contact them by calling 101. At a press conference on Thursday, Insp Terry Murphy, from Avon and Somerset Police, called the incident "incredibly rare" and said there would be an increased police presence in the area over the coming days. "Our thoughts, first and foremost, are with the family of the young woman who's tragically died as a result of yesterday evening's incident. "A full investigation is now well under way to establish the full circumstances of the events that led to her death," he said.
