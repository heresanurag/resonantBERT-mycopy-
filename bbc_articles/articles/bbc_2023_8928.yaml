title: Philippines passenger ship catches fire at sea - BBC News
date: '2023-06-18'
section: General
url: http://www.bbc.co.uk/news/world-asia-65942742
content: |-
  All passengers and crew on board have been accounted for and no casualties were reported.

  The Philippine Coast Guard has used a water cannon to extinguish a fire that broke out on a passenger ferry.

  The Esperanza Star was travelling between provinces when the blaze started off the island of Bohol.

  Officials said all 120 passengers and crew on board have been accounted for and no casualties were reported.

  The cause of the incident is still being investigated.
