title: Harvey Weinstein accuser Rose McGowan reacts to his arrest - BBC News
date: '2018-05-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44258280
content: |-
  The actress, one of the movie mogul's accusers, says it's 'a slap in the face of abusive power'.

  Rose McGowan, one of the movie mogul's accuser, reacts to Harvey Weinstein being arrested for sexual assault charges.

  Mr Weinstein has denied engaging in any non-consensual sex acts.
