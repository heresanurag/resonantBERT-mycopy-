id: bbc_2021_7253
title: 'In pictures: Scotland fans celebrate England result - BBC News'
date: '2021-06-18'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-57525529
content: |-
  Thousands were in London for the Euro 2020 match against England, while others watched from the Glasgow fan zone.

  Thousands of Scotland fans were in London to watch the match against England which ended in a 0-0 draw, enough to keep Scotland in the tournament.

  Supporters had been urged not to travel to London unless they had a ticket or had organised somewhere to watch the Euro 2020 game at Wembley Stadium.

  Others watched the game in homes and pubs around the country, or the fan zone at Glasgow Green.

  Fans at Glasgow's fan zone in George Square were happy with the result

  In London, fans celebrated in the streets following the 0-0 draw

  Scotland fans climbed on a statue of William Shakespeare in London's Leicester Square

  Scotland fans were hoping for a Lazarus-style comeback after defeat to the Czech Republic on Monday

  These young fans were among those that made the journey to London on Thursday

  Many supporters took the train from Glasgow Central to London the day before the match

  Hundreds of supporters piled out of trains at King's Cross Station in London on Thursday afternoon

  Scotland fans gathered outside King's Cross station after many of them travelled by train to London

  With their traditional gathering point of Trafalgar Square off limits, many fans went to Leicester Square - where this fountain was quickly filled with bubbles

  More supporters made the journey south on Friday morning from Edinburgh's Waverley Station

  Many fans arrived at King's Cross Station in London on Friday

  Supporters gathered in Leicester Square in the rain on Friday

  Fans have had to put up with downpours in London

  But some of those who stayed behind are enjoying sunshine in the Glasgow Green fan zone

  Fans have been arriving at Wembley for the match

  Inside the stadium some fans paid tribute to the victims of Covid-19
