content: |-
  For the first time, Syrians fleeing civil war have a chance of returning home. But do those settled on Bute want to?

  'We can finally return to Syria, but this island is our home'

  This video can not be played To play this video you need to enable JavaScript in your browser. Mounzer Darsani says he did not even know what the word island meant

  Bute, a small island off Scotland's west coast, has welcomed more than 100 Syrian refugees over the past decade. Fleeing civil war, they ended up more than 2,000 miles away in Rothesay, a sleepy town of 4,000 people. They have raised children and set up successful businesses, with many now UK citizens. The fall of Bashar Al-Assad's regime in Syria last year has given those who fled a glimmer of hope of returning. But it has also posed the question of where home truly lies.

  Rothesay, a town of 4,000 people, became a popular holiday resort during the Victorian era

  The first group of Syrian refugees arrived in Rothesay, Bute's largest settlement, in December 2015. Since then the town has welcomed 125 Syrians, with 17 babies born to those families. Mounzer Darsani arrived in February 2016 with his wife and children. He was forced to leave behind his barbershop, the Orient Salon, in Damascus following the outbreak of war in 2011. When he arrived in Scotland the food and culture was alien. His English was limited to a few basic phrases and he didn't even know what an "island" was. He also carried the trauma of a war which led to the deaths of more than half a million people, and forced 12 million to flee. "Many people died in jail when I was there, many people killed in the street - for nothing," Mounzer says. "Even now I can't imagine I am here." Although Assad was toppled by rebel forces last year, fighting continues in parts of the country, with infrastructure ruined and a stable future far from certain.

  Mounzer Darsani is considering returning to Syria for the first time since the civil war erupted in 2011

  Mounzer quickly settled in Scotland with the help of locals in Rothesay - former strangers he now considers "family". The barber runs two salons, one on Bute and one on the mainland in Greenock. Both are named Orient Salon. For the first time since 2011, he is planning to return to his homeland - not a permanent move, but a visit to reunite with relatives he has not seen in more than a decade. Mounzer wants to show his children the place where he once had a "beautiful" life. "My kids have all their lives here," he says. "They came too young and they don't have any memories [of Syria]."

  Having become a popular holiday resort in the early 19th century, the Isle of Bute once had a population of about 12,000. It is now home to about 6,500 people, with 4,000 in Rothesay. Youssef Al Najjar arrived in 2017 after fleeing Aleppo with his wife Khadijeh and son Taim, now aged nine. Since then the family has welcomed Jad, now six, and Laureen, now four - both born and raised in Scotland. Youssef, a chef, says his children are "very happy" in Rothesay. "Everybody is very friendly... I never have any problems," he tells BBC Scotland News.

  Youssef Al Najjar's children have been raised on the Isle of Bute

  In the centre of the town stand the handsome ruins of Rothesay Castle, surrounded by a moat. Walking along the shore, or climbing high up the slopes rising from the harbour, a sense of stillness is unescapable. A safe haven, separated by water from the outside world. It's a perception repeatedly raised by the island's Syrian contingent - Bute is quiet, and most importantly, safe. Youssef lost two sisters-in-law and a cousin in the civil war. "I'm not going back to Syria because lots of my family died there," he says. "My kids were born here, and we're very happy here."

  Youssef's children Jad, Laureen and Taim have been raised on the Isle of Bute

  Most of the Syrian refugees who came to Bute have moved on, many relocating to Inverclyde or Glasgow. About 35 have happily settled, including Yahya Fasi, 25, who fled Damascus as a child with his parents and two siblings. "I left my friends and my school," he says. "It was very painful for me." Yahya has taken over the running of Helmi's bakery, a much-loved shorefront café set up by former refugees Tasnim Helmi and her husband Mohamed, who have since expanded the business to the mainland.

  Yahya Fasi, who runs a cafe on Bute shorefront, says his future lies in Scotland

  Yahya arrived during the pandemic in 2020. Since then he has worked as a barber, baker and football coach, while making and selling artwork on the side. The first shock was the weather, he says, though he loved the ferry - the only way on or off the island. Underlining his local credentials, he now gripes about cancellations and delays. "People here are so friendly," Yahya says. "And that's the main reason why we love Bute." Like many young Syrians, he struggles to see a future to return to in his homeland. "All my life is here now," he says. "It's very hard to go to Syria and build again."

  Freezing rain greeted the first batch of refugees taking the ferry from Wemyss Bay to Rothesay in December 2015. "There was a lovely welcome for the people arriving here," says Angela Callaghan, who runs Bute Oasis, a second-hand shop and food bank. "You just cannae imagine what they've been through." Yet there were undoubtedly grumbles from some in the community about the new arrivals, prompting an excoriating editorial in The Buteman newspaper condemning "narrow-minded bigotry". "Ninety-five percent of people on the island were very happy to welcome them, and that wee 5% were a bit iffy," says Angela. "But they aren't any more." She says the Syrians won over any unsure neighbours "through their kindness". "They welcomed their neighbours, they asked them in for something to eat," Angela tells the BBC. "It's the way that they do things - family orientated."

  Angela Callaghan, who runs a second-hand shop and food bank, helped organise support for the Syrians when they arrived in Rothesay

  Residents in Rothesay are quick to speak of their pride in the Syrians. They have become "locals the same as anybody else", Angela adds. Reflecting on his time on Bute, Mounzer says a decade of happy memories have helped him cope with the horrors of war. "I am too lucky because I have two countries, two citizenships, and I can live anywhere I want," he says. "But I prefer here because my best time I spent here, with very good people."
