  British-Israeli hostage Emily Damari, 28, who was held captive in Gaza, is visiting the UK for the first time since her release.

  British-Israeli hostage Emily Damari has been visiting the UK for the first time since her release from captivity in Gaza in January.

  A supporter of Tottenham Hotspur, she arrived at the team's stadium to cheers and chanting from fellow fans.

  She thanked the crowd for their support and urged for the release of the remaining hostages.
