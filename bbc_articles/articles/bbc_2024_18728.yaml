title: Tortoise spotted walking on railway tracks in Southend - BBC News
date: '2024-08-15'
section: General
url: http://www.bbc.co.uk/news/videos/cy0r50vreq4o
content: |-
  A train operator says the creature is "safely shell-tering" with ticket office staff.

  A tortoise has been rescued from a railway line after being spotted wandering along the tracks.

  Video posted on social media by train operator c2c showed the creature beside the platform at Southend station in Essex.

  The company said he was "safely shell-tering" with ticket office staff.

  Responding to the post, several users joked the tortoise was moving faster than the trains.
