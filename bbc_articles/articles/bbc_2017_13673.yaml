title: China's huge new amphibious aircraft takes flight - BBC News
date: '2017-12-24'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-42473652
content: |-
  China's AG600 - which is roughly the size of a Boeing 737 - lifted off from Zhuhai airport in the southern province of Guangdong.

  China's huge new amphibious aircraft has made a successful one-hour maiden flight. China's AG600 - which is roughly the size of a Boeing 737 but with four turboprop engines - lifted off from Zhuhai airport in the southern province of Guangdong.
