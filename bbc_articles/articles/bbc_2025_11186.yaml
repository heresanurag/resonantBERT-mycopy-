title: Two Scottish men shot dead at Irish bar in Spain's Costa del Sol - BBC News
date: '2025-06-01'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cm2y1e61xn1o
content: |-
  A gunman is reported to have opened fire at Monaghans Irish bar in Fuengirola on Saturday evening.

  Two Scottish men shot dead at bar in Spain

  Video circulating on social media showed police at the scene of the attack

  Two Scottish men have been killed in a shooting at a bar in southern Spain, according to Spanish officials. A gunman fired several shots at Monaghans Bar in Fuengirola in Andalusia on Saturday evening before fleeing the scene. Javier Salas from the central government in the Malaga province confirmed to BBC News both men were believed to be Scottish. Spanish media reported that officers from the region's specialist and violent crime unit are leading the investigation.

  Regional newspaper Diario Sur reported the attack took place just after 23:00 when a car pulled up and a masked man opened fire. They said both men died at the scene, and the gunman fled in the vehicle.

  A gunman fired several shots in the incident at Monaghans Bar in Fuengirola

  Monaghans is located on the seafront and is a popular bar with tourists and expats. The bar had been screening the UEFA Champions League final on the evening of the attack. Police are yet to make any arrests but have not ruled out that the killings were linked to organised crime. Police Scotland said it was unable to comment on a possible link to a recent gangland feud in Scotland, and directed inquiries towards the Spanish authorities. BBC journalist Guy Hedgecoe said there had been a number similar shootings in the Costa del Sol area in recent weeks, several of which are believed to have some kind of connection to drug crime. The Foreign Office said it had not been approached for any consular assistance but that its staff stood ready to assist any British nationals if required.
