content: |-
  A replica of the 17th century El Galeon Andalucía arrives in London for people to visit.

  A full-sized replica of a 17th century Spanish armed merchant ship has arrived in London.

  Tower Bridge opened to let the 500-tonne El Galeon Andalucía pass through ahead of its arrival at St Katherine's Dock.

  The ship will stay docked there until 6 October with visitors able to take a self-guided walking tour, talk to crew members and see more about what life was like during that time.

  Anna O'Neill went aboard to find out more.

