content: |-
  A new 'immersive' experiences aims to remind people of the achievements of a great Scottish golfer.

  When Scotsman Bobby Cruickshank was taken prisoner during World War One, he could little have imagined he would later find enduring fame in America as a golfing legend. Born in Grantown-on-Spey in 1894, he escaped the prisoner of war camp and eventually crossed the Atlantic to follow his golfing dream. He went on to win more than 20 tournaments and be considered a sporting great in the USA. But his story is far less well known back home in Scotland. Now the Highland course where he learned to play is offering golfers an "immersive" experience in his honour, including the chance to use hickory clubs of the style he played with in the 1920s and 1930s.

  Bobby was born about 400 yards - or roughly the length of a par-four hole - from Grantown-on-Spey golf course.

  Bobby Cruickshank learned to play at Grantown-on-Spey's golf course

  At the time, it was just a nine-hole course. But it was big enough for Bobby. He caddied there as well as learning to play the game. Bobby later moved to Edinburgh where he developed his education and sporting skills, ultimately resulting in him pursuing his golfing ambitions. But World War One got in the way. Bobby signed up and managed to survive the horrors of the Somme only to be captured by the Germans. He succeeded in escaping a PoW camp at Arras in France.

