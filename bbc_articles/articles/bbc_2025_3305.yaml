  Bobby emigrated in 1921, joining a wave of Scottish golfers seeking success in the growing American golf scene. It was there that he ultimately won a series of tournaments and finished runner-up in the US Open in 1923 and 1932. He played alongside other greats of that era including Bobby Jones and his golfing status saw him rub shoulders with Hollywood icons including Charlie Chaplin. In 1967 he was elected to the PGA of America Hall of Fame, external - the highest honour it can bestow upon its membership or ambassadors of golf. Other greats of the game to have the same honour include Jack Nicklaus and Arnold Palmer. Bobby died at the age of 80 in 1975.

  Granddaughter Diana Smith, 82, who lives in Georgia, USA, is proud of his achievements. "He was one of the finest people you could ever meet," she told BBC Scotland News. "He loved the game dearly. He, along with his group of buddies in the States, literally started the concept of what is now the golf tour."

  Diana Smith is seen playing golf with her grandfather Bobby

  "We had more laughs on the golf course than I can even tell you. He used to chase the alligators away with his club," she said. "When he couldn't play golf anymore, he quickly passed away." Diana and the rest of Bobby's family are delighted by the new project at his home course. "We are thrilled. I know how much Grantown meant to my family and my grandad. I'm very proud of him. And I'm happy that people are recognising him. "It's easy to forget, but he was so much part of the golf world and for this chance for people to get to know him, does my heart good."

  Grantown-on-Spey Golf Club - which was established in 1890 - has launched the Bobby Cruickshank Hickory Experience. Players can use a set of hickory clubs and see footage, photographs and memorabilia related to Bobby's exploits. "I remember him coming over on holiday and he had a huge American car," he said.

  "I recall him coming down one night and his nephew was practising bunker shots. "Bobby was all dressed up in his dinner jacket, ready to go out for a meal with some friends. "And he saw his nephew and Bobby said 'Give me your wedge and one ball and I'll give you 10 shots if you can put it nearer to the hole'. "And of course he just flopped it out, six inches away, and his nephew had no chance. "He was a class act, there's no doubt about it." He added: "He had a super swing - a no-nonsense swing. One waggle and away it went."

  Steve Stuart from Grantown-on-Spey Golf Club has been driving the legacy project. "He won 25 tournaments in America - I can't think of another Scot who has done that," he said. Mr Stuart described Scottish golf tourism as "amazing" with the best courses in the world. "Most of the tourists visit them, but you've also got lots of hidden gems and we like to think that we're one of those," he said. "So what we're trying to do is celebrate our unique selling point in Bobby Cruickshank. "Tourists can expect a true and immersive history lesson. And if they have never played with hickory clubs, it's great fun. "He played all his golf in America and he was a household name there. "We sometimes get Americans coming here just to see the home of Bobby Cruickshank and people here generally don't give a very good response because nobody is clued up on it yet - but we're aiming to change that. "He really is the forgotten golfer. He was one heck of a golfer. Bobby Cruickshank deserves his place in history."
