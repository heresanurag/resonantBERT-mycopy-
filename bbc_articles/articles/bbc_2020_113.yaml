id: bbc_2020_113
title: 'Iran tensions: Khamenei''s ''defiant message'' at Friday prayers - BBC News'
date: '2020-01-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-51150971
content: |-
  Iran's supreme leader hit out at his "enemies" following recent turmoil in the region.

  Iran's Supreme Leader Ayatollah Ali Khamenei has led Friday prayers in the capital Tehran - the first time he has done so in eight years.

  His country has faced criticism at home and abroad after it admitted shooting down a Ukrainian passenger plane by mistake.

  The BBC's Martin Patience said he delivered "a defiant message designed for domestic consumption".
