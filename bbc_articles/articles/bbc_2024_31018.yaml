  Test your knowledge on the six contenders for Sports Personality of the Year 2024 with our quiz.

  How much do you know about the Sports Personality contenders?

  Jude Bellingham, Keely Hodgkinson, Luke Littler, Joe Root, Sarah Storey and Alex Yee are the 2024 contenders for BBC Sports Personality of the Year. Test your knowledge on the six nominees - and make sure to watch the show on 17 December, live on BBC One and iPlayer from 19:00 GMT.
