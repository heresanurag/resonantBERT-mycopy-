title: 'Vaughan Gething: First minister''s downfall delivers Keir Starmer first headache
  - BBC News'
date: '2024-07-16'
section: Wales
url: http://www.bbc.co.uk/news/articles/ce78ggzdpkgo
content: |-
  Just when you’d have been forgiven for thinking politics might quieten down a bit... The Welsh Labour government was for so long a case study in how the party could operate in power during its long years of opposition at Westminster. And yet here we are less than a fortnight into a UK Labour government, and the Welsh Labour government is imploding. So much for all that talk about bringing stability back to politics. Last week Vaughan Gething was sharing smiles here not just with the new prime minister but the King too. Now, he’s a goner, delivering Sir Keir Starmer a headache rather than a handshake. When I was here in March covering Mr Gething’s victory, the seeds of his political demise were germinating before our eyes. The donations row had already sprouted and his defeated opponent, Jeremy Miles, legged it from the venue without so much as any warm words about the victor on camera. It was another sign of the cultivating anger, the political knotweed that would soon flourish and ensnare Vaughan Gething.

  Along came the row about alleged leaking, a sacking, a confidence vote -- and a first minister whose tenure up until today at least amounts to 2.4 times that of Liz Truss. Ouch. Westminster has generated its fair share of turbulence in the last decade. But it is far from unique as a source of turbulence in UK politics. In February, Michelle O’Neill became first minister of Northern Ireland with Emma Little-Pengelly her deputy, after a long period without devolved government at Stormont. In March, we had a new first minister of Wales, when Mark Drakeford stood down and Vaughan Gething took the job. In April we had the resignation of the first minister of Scotland Humza Yousaf. He was replaced the following month by John Swinney. June was the quiet month then. Just the small matter of a general election campaign. And here we are in July, and Mr Gething is resigning. So will begin another leadership race, a new government in Wales, a new first minister and a new team of senior Welsh ministers. There will also be more arguments about Welsh Labour – its direction, its priorities, its capacity to govern effectively and its relationship with the UK party. If you’re watching this in Downing Street, it’s the last thing you need.
