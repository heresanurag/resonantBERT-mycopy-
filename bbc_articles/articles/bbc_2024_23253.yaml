title: Body found in search for missing Yeovil man Michael Wheeler - BBC News
date: '2024-09-26'
section: Somerset
url: http://www.bbc.co.uk/news/articles/ckg9q3nxjd9o
content: |-
  Police using specialist dogs in the search for Michael Wheeler made the discovery on Wednesday.

  The 37-year-old from Yeovil had not been seen or heard from since 24 August

  Police searching for a man who has been missing for a month say they have found a body. Avon and Somerset Police officers had been searching a property in Yarlington near Wincanton, Somerset, on Wednesday looking for Michael Wheeler, of Yeovil, when specialist search dogs alerted them to the body. Concerns were raised over the 37-year-old's welfare on 16 September after he missed several regular appointments, and his car was later found abandoned. Four men have been charged with murder in connection with his death.

  David Garland, 39, and Jack Rance, 28, both of no fixed address, Mark Roberts, 38, of Juniper Close, Yeovil, and Reuben Clare, 18, of Sherborne Road, Yeovil, appeared at Yeovil Magistrates Court on Wednesday. They were remanded into custody ahead of an appearance at Bristol Crown Court on Friday. Another man who was arrested last week has now been re-arrested, and currently remains in police custody.

  Police carried out searches in the Ham Hill area near Yeovil on Friday as part of the investigation

  Officers arrested two more men on Wednesday on suspicion of assisting an offender. One is being held in police custody while the other has been released under investigation. Two people remain on police bail - a man who was arrested on suspicion of murder on Monday, and a woman who was previously arrested on suspicion of assisting an offender. Mr Wheeler's family have been updated and continue to be supported by specially trained officers. Avon and Somerset Police has appealed for anyone with information which could aid their investigation to come forward. The force has also told the public not to publish any commentary or material, including images or footage, that could affect legal proceedings.

