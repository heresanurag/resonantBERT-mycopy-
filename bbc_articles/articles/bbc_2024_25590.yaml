  In an Instagram post on Friday, Girls Aloud singer Cheryl, who was in a relationship with Payne from 2016 to 2018 and shared a son called Bear him, said she was troubled he could access "abhorrent reports and media exploitation" and she could not protect him from it in the future. "Liam was not only a pop star and celebrity, he was a son, a brother, an uncle, a dear friend and a father to our 7 year old son," she said. "A son that now has to face the reality of never seeing his father again." “I am begging you to consider what use some of these reports are serving, other than to cause further harm to everyone left behind picking up the pieces." Since Payne's death, fans in the UK have been gathering at vigils. On Saturday afternoon fans gathered in Liverpool in memory Payne, lighting candles and placing flowers at the city's waterfront. A vigil also took place in his home city of Wolverhampton on Friday.
