title: Wales' newest baby snow leopard thriving - BBC News
date: '2024-08-16'
section: General
url: http://www.bbc.co.uk/news/videos/cwy56epk0n9o
content: |-
  The two-month-old cub is the first to be born at the zoo in more than a decade.

  The latest addition to Wales' snow leopard population is thriving as it finds its feet at the Welsh Mountain Zoo.

  The cub, born on 12 June - and the first to be born at the Colwyn Bay zoo, in Conwy county, for more than a decade - has been revealed to be a boy.

  The Zoo's Chris Mitchell said: "It’s great to see the most recent addition to our Zoo family thriving. He is developing just as he should and is growing in confidence every day."

  Zookeepers have narrowed down the shortlist for possible named to Zephyr, Tai Lung, Layan and Qilian - which will be put to the public for a vote.
