title: 'Covid pandemic: Key workers in Ibiza dance experiment - BBC News'
date: '2021-06-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-57614377
content: |-
  Key workers were able to dance in Ibiza's nightclubs this weekend, to test if they can reopen safely.

  Fifteen hundred key workers had the chance to dance in some nightclubs on the Spanish island of Ibiza this weekend, to test if they can reopen safely.

  They were allowed to join the trial only if they'd been fully vaccinated or tested negative for Covid.
