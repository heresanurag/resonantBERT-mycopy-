title: Trump evades debate question on whether he will accept election result - BBC
  News
date: '2024-06-28'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c51y85zwj1xo
content: |-
  Throughout the debate, Trump also repeated falsehoods on voter fraud, abortion and the 6 January riot.

  Former US President Donald Trump has refused to explicitly say whether he will accept the result of November's US presidential election. During his first debate with President Joe Biden on Thursday, Mr Trump was asked three times whether he would accept the outcome "regardless of who wins", finally answering: “If it's a fair and legal and good election, absolutely.” Mr Trump lost his shot at a second presidential term to Mr Biden in the 2020 election. He has since consistently claimed that the vote was rigged against him, without providing any evidence. During Thursday night's debate, Mr Trump repeated these claims, and played down his role in the 6 January riot on Capitol Hill. Mr Biden hit back, accusing Mr Trump of “continuing to promote this lie" about the election being "stolen" from him. The debate, hosted by CNN in Atlanta, saw Mr Trump remain largely composed and focused, as his opponent struggled to maintain his train of thought and at times finish his sentences clearly.

  CNN moderator Dana Bash had to repeatedly ask Mr Trump if he would accept the election results. The first time, he dodged the question by saying he wanted a fair and free election "more than anybody”. The second time, he ignored the question and instead ranted about the war in Ukraine, saying Vladimir Putin would never have invaded if he was the US president, because "I got along with him very well... he knew not to play games". The third time, when told to answer "yes or no", Mr Trump finally said he "absolutely" would accept the outcome if the election was "fair and legal and good". He then referenced the "ridiculous" fraud in the last election, for which there is no evidence. Mr Trump's repeated claims about the 2020 vote are related to criminal charges he is currently facing, as federal prosecutors allege he pressed officials to reverse the results and knowingly spread lies about election fraud. Mr Trump then said it would be easier for him to just accept the results rather than have to run for president again. “I doubt whether you’ll accept it because you’re such a whiner," Joe Biden said. "You can’t stand the loss. Something snapped in you when you lost last time.”

