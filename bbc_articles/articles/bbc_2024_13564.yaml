  Mr Trump made several assertions during the debate that either have no evidence or are factually wrong. On abortion, Mr Trump turned to what he called Democratic extremism - that the party wants to "take the life of the baby in the ninth month and even after birth". He even got graphic when he said they want to "rip the baby out of the womb." "That is simply not true," Mr Biden said. Mr Trump's comment stems from a popular falsehood with anti-abortion activists that Democrats are in favour of a policy that allows abortions right up to birth. When the debate turned to the 6 January riot, Mr Trump dodged the question on what he would say to voters who are worried about his actions and inactions on that day, and that he might do it again. Instead, he tried to turn the focus to Mr Biden, saying the US went from being respected "all over the world" to a laughing stock when the Democrat became president. Mr Trump insisted that he told protesters to be "peacefully patriotic". "What they’ve done to some people that are so innocent, you ought to be ashamed of yourself," he said to Mr Biden, who criticised him for refusing to denounce the rioters. Mr Trump has pledged to pardon "many" of those convicted of offences over the riot, describing them as "January 6th hostages". He also blamed the chaos on Nancy Pelosi, who was House Speaker at the time, saying he offered her 10,000 National Guard but she "turned them down". There is no evidence that this offer was ever made, the Select Committee that investigated the insurrection, external found. It was also refuted by Mr Trump's acting secretary of defence, Christopher Miller.

  Another exchange that led to one of the night's most tense moments was when Mr Biden accused Mr Trump of having called veterans who died in combat "suckers and losers". “My son served in Iraq,” said the president. “He lived next to burn pits. He came back with glioblastoma.... He [Trump] called veterans suckers and losers. My son was not a loser. He was not a sucker. You're the loser. You're the sucker.” The allegations that Mr Trump cancelled a 2018 visit to the Aisne-Marne American Cemetery in France because there were "losers" there first surfaced in 2020. Mr Trump's former chief-of-staff John Kelly had later confirmed his comments. On the debate stage, Mr Trump denied the comments and accused Mr Biden of falsifying the quote. “That was a made-up quote. ‘Suckers and losers'. They made it up. It was in a third-rate magazine that’s failing — like many of these magazines. He [Biden] made that up. He put it in commercials. We had 19 people who said I didn’t say it.”
