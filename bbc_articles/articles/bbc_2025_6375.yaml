title: 'Daniel Noboa: Centre-right leader wins re-election in Ecuador - BBC News'
date: '2025-04-14'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c4gr8dw20evo
content: |-
  The sitting president's challenger in the closely fought race, Luisa González, has claimed fraud without producing evidence.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sitting centre-right President Daniel Noboa has won the run-off round of Ecuador's presidential election, meaning he will now serve a full four-year term. Noboa, who described his victory as "historic", has only been in power since November 2023 after winning a snap election. He has defined his presidency, so far, through a tough military crackdown on violent criminal gangs in the country, which has become the most violent in the region. His left-wing challenger, Luisa González, said she did not accept the result and claimed fraud, without providing evidence.

  According to figures from Ecuador's national electoral council, this is a decisive win for Noboa - with about 56% of the vote - after polls before the election suggested it was neck and neck. "A victory of more than ten points and over 1 million votes, leaving no doubt as to who the winner is," he said after the result was announced. "This has been achieved through the perseverance, the struggle, and the hard work of every member of this team," he added. Noboa's win means he has a mandate to continue his self-described "war" on criminal drug gangs, which has included militarising Ecuador's streets and prisons, and constructing new maximum-security prisons. He recently told the BBC he wanted foreign armies from places such as the US and Europe to join his fight against gangs in the country. He is hoping to change the constitution to allow foreign military bases in the country again, which were banned under the presidency of Rafael Correa - the mentor of González.

  Homicides have fallen slightly during Noboa's tenure but violence remains very high. This January, more than 780 people were murdered in the country, making it one of Ecuador's bloodiest months on record. Polls before the election suggested that security was the top concern for voters. Noboa's challenge now is to prove to the country that his plan is working if he wants to avoid unrest and discontent. This means there will be pressure on him to show that violent crime is going down, as well as unemployment. Noboa's ratings fell last year, in particular after widespread drought caused extreme power cuts across the country. He has proposed investing more money in renewable energy to diversify the country's energy supply, the majority of which currently comes from hydropower. He has also signalled a desire to boost relations with the US and President Donald Trump. In February, he announced 27% tariffs on Mexican imports and also repealed his presidential decree that had granted amnesty to undocumented Venezuelan migrants in the country. His campaign was notable for its focus on young people - he is 37 - with a strong emphasis on job creation and slick social media videos. He also pledged to invest in infrastructure in the country and tackle corruption. After her defeat, González accused the electoral authorities of trampling on democracy, and demanded a recount. She would need to provide evidence of her claims for this to happen.

  This will leave Ecuador deeply polarised, which will prove another challenge for Noboa if he wants to avoid unrest and division. Many González supporters are nostalgic for what they perceive as a "better time" under Correa's presidency (2007-17), when oil revenues boosted the economy and poverty was reduced. He is a deeply divisive figure, though. His critics in the country decry his rule as authoritarian, and he has since been convicted of corruption and lives in exile. González's association with him remains controversial.
