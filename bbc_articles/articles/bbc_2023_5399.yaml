title: The moment Finland joined Nato security alliance - BBC News
date: '2023-04-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-65179108
content: |-
  The Finnish foreign minister handed over the accession document, making the country the 31st to join Nato.

  Finland has joined the Nato security alliance. The country's foreign minister Pekka Haavisto handed the accession document to US Secretary of State Antony Blinken, who then declared Finland a member of the security alliance.

  The move means Russia's border with Nato member states has now doubled, a setback for Vladimir Putin.
