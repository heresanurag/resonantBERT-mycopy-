content: |-
  Sheeran triumphs over superstar Swift but another US artist bags the most-played song of 2023.

  Ed Sheeran beats Taylor Swift to be most played artist

  Ed Sheeran has topped the list for the seventh time in nine years

  British singer-songwriter Ed Sheeran has been named the most played artist of 2023. The Suffolk-raised musician, 33, has topped the list of music - used across UK radio, TV and in public places - for the seventh time in nine years. He beat megastar Taylor Swift, who placed second on the list compiled by music licensing company PPL. Sheeran said: “Thank you for naming me the most played artist for last year. Thank you to my team, not just for me, but for all the other artists you work with – I’m happy that you get this recognition.”

  Swift trails Sheeran in the most played songs top 10 but has two tracks in the list

  Swift, who is currently playing UK dates with the Eras Tour, jumped from number 10 to two in 2023, matching her previous high from 2015. Dua Lipa was the third most played artist in the UK in 2023, propelled by the success of Dance The Night from the Barbie soundtrack, accord to PPL. Landing at number four was Scottish DJ Calvin Harris, fifth was French DJ David Guetta and taking the sixth spot was legendary hitmaker Sir Elton John. The only band in the top 10 was rock group Coldplay at number seven, while Bedford star Tom Grennan is a new entrant at number eight while former One Direction singer Harry Styles landed at number nine. Madonna makes a return to the top 10, following the launch of the Celebration greatest hits world tour in London last autumn, and landed with the last placement.

  Chart-topper Miley Cyrus is among a clutch of US stars in the most played top 10

  When it came to the most played song, PPL put Miley Cyrus’s break-up song Flowers in the number one spot, with Sheeran coming in at number two with Eyes Closed. Peter Leathem, chief executive of PPL, said: “Congratulations to all artists featured this year and especially Ed and Miley on their respective number ones. “These exclusive charts provide a snapshot of some of the most popular music being played publicly in the UK." He said that it was "fantastic" that many acts in the top 10 most played were British.
