title: Firefighters crawl to rescue deer stuck on frozen lake - BBC News
date: '2023-12-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67573279
content: |-
  A stag in Minnesota was stranded on thin ice until a rescue team stepped in - on all fours.

  Neighbours in the US state of Minnesota called the local fire department to report a deer stuck on a frozen lake. The fire and rescue team stepped in - on all fours.
