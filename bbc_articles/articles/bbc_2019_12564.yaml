content: |-
  But Boris Johnson is told by Jeremy Corbyn that Labour will not back the agreement he secured with the EU.

  As Prime Minister Boris Johnson tries to convince MPs to support his Brexit plan, Jeremy Corbyn tells the Commons he will not give the deal his backing.

  Read more: Commons set for knife-edge votes on deal.
