title: Rory McIlroy, Divorce proceedings ended as golfer reconciles with wife Erica
  - BBC Sport
date: '2024-06-11'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/clll8q972z7o
content: |-
  Rory McIlroy says he and his wife Erica have "resolved their differences" after dismissing the petition he filed for divorce.

  Rory McIlroy and his wife Erica have "resolved their differences" and dismissed the divorce petition he filed last month.

  The Northern Irishman, 35, filed for divorce on 13 May, the day after winning a PGA Tour event and three days before the start of the US PGA Championship.

  Court records in Palm Beach County in Florida show that a "notice of voluntary dismissal" was filed on Tuesday and the case status is listed as "closed".

  "There have been rumours about my personal life recently, which is unfortunate," the four-time major winner told the Guardian, external.

  "Responding to each rumour is a fool's game.

  "Over the past weeks, Erica and I have realised that our best future was as a family together. Thankfully, we have resolved our differences and look forward to a new beginning."

  They were married in 2017 and have one child together, Poppy Kennedy McIlroy, who was born in 2020.
