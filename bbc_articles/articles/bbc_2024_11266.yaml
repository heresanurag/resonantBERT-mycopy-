  A body has been found by authorities searching for TV presenter and author Michael Mosley.

  A body has been found by authorities searching for the prominent British TV presenter and author Michael Mosley on the Greek island of Symi.

  He was last seen early on Wednesday afternoon, as Joe Inwood reports.
