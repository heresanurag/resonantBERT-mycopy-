  Poorer patients missing surgery as they 'can't afford time off work'

  Chief executive of the Western Trust Neil Guckian said it was a "sad indictment of our society"

  Patients from poorer backgrounds are missing hospital operations because they can't afford to take time off work, a leading health chief has said. Neil Guckian, chief executive of the Western Trust, described it as "an indictment on society". Giving evidence to the Stormont health committee, he said Do Not Attends (DNAs) were a major issue for the health service. People "are foregoing their operation at the expense of maintaining their livelihood", according to the chief executive.

  Mr Guckian said he initially thought patient absence was due to people having to travel for appointments, but having done audits and phoned patients, he was told this was not the reason. "I believe it is linked to social deprivation. People do not want to admit that they can't take days off work," he told the committee. "That is a sad indictment of our society, so we have to have wraparound support to that." Mr Guckian also said that because patients were often waiting so long for a procedure, by the time they are seen their condition had deteriorated. That was one of the issues which the trust was dealing with through "mega clinic" sessions, aimed at ensuring patients were dealt with in a quicker way, he said. "They might be a day case, but they need an in-patient clinic because they have actually deteriorated during the course of their waiting list." The chief executives of all of Northern Ireland's health trusts gave an update to the Stormont committee on Thursday. Mr Guckian said the health service could not afford to see industrial action because of the current dispute over pay reviews. He added pay levels for all healthcare workers needed to be addressed as the health service was haemorrhaging staff across the border into hospitals in the Republic of Ireland.

  Speaking to Good Morning Ulster on Friday, chair of the Stormont Health Committee, Liz Kimmins, said that the evidence was deeply concerning. "We need to understand why this is happening and what can be done to ensure that everyone can attend appointments, taking the time off work for something that is important to their health," she stated. "There needs to be a follow up with patients who don't attend as to why this is the case. "The Department of Health are working hard to tackle waiting lists but there's more work to be done as there will be other patients on the waiting lists who will happily take their space, even if it is last minute," she added.
