  A CBS News/YouGov poll conducted in early June, before the protests kicked off, found 54% of Americans saying they approved of Trump's deportation policy, and 50% approved of how he is handling immigration. That compares with smaller numbers of 42% who gave approval to his economic policy and 39% for his policy on tackling inflation. On Monday, the Republican president said he supported a suggestion that California's governor should be arrested over possible obstruction of his administration's immigration enforcement measures. Newsom, who has engaged in a war of words in recent days with Trump, responded on X that "this is an unmistakable step toward authoritarianism". He said the troop deployment was "about stroking a dangerous president's ego". Trump's border tsar Tom Homan later told CNN he had "not at this time" seen anything that he felt would warrant an arrest of the California governor. Trump also sent a direct warning to protesters who confronted police and federal forces. He wrote on social media: "IF THEY SPIT, WE WILL HIT, and I promise you they will be hit harder than they have ever been hit before. Such disrespect will not be tolerated!" At a press conference on Monday evening, LA Mayor Karen Bass echoed the views of other local officials by saying the deployment of troops was a "deliberate attempt" by the Trump administration to "create disorder and chaos in our city". The city leader also said she was aware of at least "five raids by ICE throughout the region" on Monday, including one near her grandson's school. Trump's deployment of the National Guard faces a legal challenge from Newsom. The lawsuit argues that the president was violating the US Constitution and California's sovereignty. Newsom has also threatened to take separate legal action over the Marine deployment. Trump has argued that the administration of his predecessor, Democratic President Joe Biden, allowed millions of immigrants to enter the country illegally. He has pledged to deport record numbers of undocumented migrants, setting a goal of at least 3,000 daily arrests.

