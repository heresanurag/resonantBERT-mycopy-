  The 700 members of 2nd Battalion, 7th Marines, from Twentynine Palms, California, will help protect federal property and personnel, including immigration agents, said the US military. On Monday evening, Los Angeles police officers fired stun grenades and gas canisters to disperse hundreds of demonstrators who gathered outside a federal detention centre in downtown LA where undocumented immigrants have been held. National Guard forces formed a cordon to keep protesters out of the building in the heart of America's second largest city. Some demonstrators had thrown objects at officers, the Los Angeles Police Department (LAPD) also said on Monday. Late that day, US Attorney General Pam Bondi revealed the identity of a man accused of assault for throwing rocks at federal agents. Bondi said a search warrant has been conducted on his home, and that the man, Elpidio Reyna, would be added to America's "Most Wanted" list.

  Protests also sprang up in at least nine other US cities, including New York, Philadelphia, Dallas, Austin and San Francisco. Demonstrators originally took to the streets of LA on Friday after it emerged Immigration and Customs Enforcement (ICE) officers were raiding Latino areas. The protests unravelled into looting, self-driving cars being torched, rocks thrown at law enforcement and a major freeway blocked by demonstrators. The LAPD says it arrested 29 people on Saturday night and 21 more on Sunday. Suspects face charges ranging from attempted murder with a Molotov cocktail, to assault on a police officer, to looting. The LAPD also says more than 600 rubber bullets and other less-than-lethal rounds were used over the weekend. At the White House on Monday, Trump said his decision to send in the National Guard had stopped the city from "burning down". "You watch same clips I did: cars burning, people rioting, we stopped it," the president said. "I feel we had no choice."

