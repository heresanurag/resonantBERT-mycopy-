  • None Funding a new forensic evidence programme to share and track DNA of criminals in Albania to solve crimes in the UK
  • None A further £1m investment to upgrade Albania's forensics, biometrics and digital capability
  • None Greater intelligence sharing to allow local law, using UK-funded drones, to "snare gangsters" transporting migrants through the Western Balkans corridor
