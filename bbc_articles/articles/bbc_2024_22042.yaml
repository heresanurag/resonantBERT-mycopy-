title: Jane's Addiction cancel remaining tour dates after on-stage brawl - BBC News
date: '2024-09-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4g55y1kk5lo
content: |-
  The US band say they have made the "difficult decision to take some time away as a group" following the fight.

  American band Jane's Addiction have cancelled the remaining dates of their tour, days after an on-stage brawl in Boston, Massachusetts. On Friday night, the band - which hails from Los Angeles - cut short their gig after frontman Perry Farrell threw a punch at guitarist David Navarro. In a statement posted on social media on Monday, the band said it "made the difficult decision to take some time away as a group". The band have also said refunds will be issued at point-of-purchase for the cancelled dates.

  The band had 12 gigs across the US left on their tour before it was cancelled, ending in their home city on 16 October. Footage on social media from Friday night's gig showed 65-year-old Farrell shouting at Navarro, 57, and punching him, before being restrained by staff and taken off stage at Boston's Leader Bank Pavilion. According to Farrell's wife, Etty, there had been mounting "tension and animosity" between band members "night after night" in the lead-up to the incident. She added that Farrell had been frustrated with the volume the band had been playing at. Jane's Addiction formed in Los Angeles in 1985, and is considered one of the successes of the early alternative rock scene. The band consists of Farrell, Navarro, drummer Stephen Perkins and bassist Eric Avery. They recently reunited after more than a decade apart. Their hits include the songs Just Because, Been Caught Stealing and True Nature. The rockers released four albums together: Nothing's Shocking (1988), Ritual De Lo Habitual (1990), Strays (2003), and The Great Escape Artist (2011). In 2013, the band was honoured with a star on the legendary Hollywood Walk of Fame.
