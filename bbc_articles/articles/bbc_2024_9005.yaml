title: Tower Bridge's glass floor cleaned for first time - BBC News
date: '2024-04-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-68900235
content: |-
  High-pressure water jets were used to clean the underside of the glass floor.

  People venturing up to the walkway at Tower Bridge can now get a clearer view of what's going underneath their feet.

  High-pressure water jets using purified water were recently used to clean the underside of the glass floor for the first time.

  The cleaning crew had to be suspended 137ft (42m) above the River Thames to get the job done.
