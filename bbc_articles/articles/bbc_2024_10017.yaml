content: |-
  The Duchess of Sussex cheered on her husband from the side of the court.

  The Duke and Duchess of Sussex are on a trip to Nigeria, with a full diary of events. On a visit to charity Nigeria Unconquered in Abuja, Prince Harry played a game of sitting volleyball with army veterans while Meghan watched the game from the side of the court.
