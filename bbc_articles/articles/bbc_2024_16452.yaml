title: 'Moussa Diaby: Aston Villa winger close to joining Saudi side Al-Ittihad -
  BBC Sport'
date: '2024-07-24'
section: Aston Villa
url: http://www.bbc.co.uk/sport/football/articles/c6p25dzgemzo
content: |-
  Diaby was Villa's record signing when he joined the club last summer

  Aston Villa winger Moussa Diaby is poised to complete a move to Al-Ittihad for about £50.4m. The 25-year-old has travelled to Saudi Arabia to have a medical and finalise the deal after just a season at Villa Park. Diaby joined Villa from Bayer Leverkusen for a club record, reportedly £51.9m, last summer but manager Unai Emery has decided to cash in on the France international. It comes after the club re-signed Jaden Philogene from Hull, paying around £13.5m for the English wideman this month and they feel the academy graduate can make a big impact on his return.

  Diaby made 54 Villa appearances, scoring 10 goals, and helped them finish fourth in the Premier League to qualify for the Champions League. Villa are reshaping their squad ahead of the new season and sold midfielder Douglas Luiz to Juventus for £42.4m last month. They signed both Samuel Iling-Junior and Enzo Barrenechea from the Italian club, while left-back Ian Maatsen arrived from Chelsea for £35m and winger Lewis Dobbin from Everton for around £9m. On Tuesday, Villa also completed the £50m signing of Everton midfielder Amadou Onana.
