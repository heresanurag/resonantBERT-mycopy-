content: |-
  Former England striker Wayne Rooney looks back on his masterclass performance against Croatia as an 18-year-old at Euro 2004.

  Former England striker Wayne Rooney looks back on his masterclass performance against Croatia as an 18-year-old, when his impressive brace helped inspire the Three Lions to a 4-2 win, and a place in the Euro 2004 quarter-finals.

  Rooney, who was playing in his first ever international tournament for England, says that it is "one of the only times" in his England career that he walked out thinking "we're going to win this game no matter what they do".

  'Rooney 2004: World At His Feet' is available to watch now on BBC iPlayer.

