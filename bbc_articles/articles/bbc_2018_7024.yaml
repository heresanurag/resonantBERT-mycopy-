title: 'Casa Padre: Inside a child migrant shelter in Texas - BBC News'
date: '2018-06-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44491479
content: |-
  The children either crossed the US border unaccompanied or were separated from parents after arrest.

  A network of shelters house more than 11,000 children who either crossed the US border unaccompanied or were separated from their parents after being arrested by immigration authorities.

  The Trump administration released footage from one of them, a converted Walmart in Texas. News organisations have since been given a tour but were not allowed to take pictures or videos of their own.
