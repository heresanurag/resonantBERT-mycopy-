title: Southport attack yoga teacher readmitted to hospital - BBC News
date: '2024-08-17'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cze5169kn88o
content: |-
  Leanne Lucas, who was stabbed in the attacks has had further breathing problems, her family says.

  Leanne Lucas was said to have shielded some of the girls who attended the class

  A yoga teacher who was stabbed during the Southport knife attacks has been readmitted to hospital due to breathing problems, her family have said. Leanne Lucas, 35, is believed to have been one of the organisers of the Taylor Swift-themed dance class where the attack, which left three girls dead, happened. Her cousin previously said she ushered children into a storage room and "shielded two little girls" from the attacker, which was when she was thought to have been injured. Her family posted the update on a fundraising page on Thursday, adding Ms Lucas had "barely begun her road to recovery" and asked for people to keep her "in your thoughts".

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King died after the attack on 29 July

  Ms Lucas was initially in a critical condition after the attack on 29 July, which killed Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine. Her cousin Chris Rimmer previously told the BBC their family had been "torn apart" by the attacks. He said Ms Lucas "always gives and never expects anything from anybody". "She's one of the most outgoing people I've ever met in my life. She's absolutely amazing."
