title: Banksy painting of MPs as chimpanzees sells for £9.9m - BBC News
date: '2019-10-03'
section: Bristol
url: http://www.bbc.co.uk/news/uk-england-bristol-49924281
content: |-
  The artist says it is a "record price for a Banksy painting".

  The painting is nearly four metres (13ft) wide and is the largest known canvas by Banksy

  A painting by Banksy showing the House of Commons overrun with chimpanzees has sold at auction for just under £9.9m.

  The 4m (13ft) wide artwork Devolved Parliament was painted by the anonymous Bristol artist in 2009.

  Expected to fetch up to £2m, it sold for nearly five times its estimate at Sotheby's in London on Thursday.

  Banksy reacted on Instagram, saying it was a "record price for a Banksy painting" and "shame I didn't still own it".

  Sotheby's tweeted the painting had sold "to applause at £9,879,500 - nine times its previous record - after a 13-minute bidding battle".

  The auction house said: "Regardless of where you sit in the Brexit debate, there's no doubt that this work is more pertinent now than it has ever been."

