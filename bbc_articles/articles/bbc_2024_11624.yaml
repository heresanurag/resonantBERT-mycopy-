title: YouTuber Niko Omilana named as candidate in 11 constituencies - BBC News
date: '2024-06-12'
section: England
url: http://www.bbc.co.uk/news/articles/cm55x95xj54o
content: |-
  Police say they are aware Niko Omilana's name is listed in multiple constituencies.

  Niko Omilana gained 2% of the vote when he stood for London Mayor in 2021

  Police say they are aware an internet prankster has seemingly been registered to stand as a general election candidate in multiple constituencies. The name of YouTuber Niko Omilana, who stood in the London mayoral election three years ago, is on the ballot as an independent in at least 11 constituencies. However, it is unclear whether it is the same candidate or different ones who have legally changed their names. The Electoral Commission said it was an offence to provide false information on nomination papers and also to stand in more than one constituency.

  Among the 11 seats where his name appears on the ballot is Richmond and Northallerton, which is also being contested by Prime Minister Rishi Sunak. The other seats include Bermondsey and Old Southwark, Birmingham Perry Barr, Coventry South, Dundee Central, Ealing Southall, Greenwich and Woolwich, Leeds East, Leeds South, North West Essex and Stockton West. West Midlands Police said it had received information about the name appearing multiple times on ballot papers in the force area and was "liaising with the relevant authorities".

  In a video posted on X, he said: "We attempted to run Niko Omilana in multiple places across the country and somehow we managed to make it happen." The Electoral Commission said: "It is an offence for an individual to provide false information on nomination papers when applying to stand as a candidate, including to falsely confirm that they are not standing in another constituency. "If that has occurred, it would be a matter for the police to consider." It added that under electoral law, returning officers must take the details provided in candidate nomination forms at face value, and accept them if they meet the requirements. A full list of candidates standing in each constituency in the general election on 4 July is on the BBC website.
