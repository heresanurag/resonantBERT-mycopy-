content: |-
  Police have announced a new reward to find Peter Falconio body, 24 years on from his outback murder.

  Peter Falconio was killed while travelling around Australia with girlfriend Joanne Lees

  Police in Australia have announced a new reward of up to A$500,000 (£240,000; $325,000) for information leading to the discovery of the remains of British backpacker Peter Falconio, 24 years after his murder. Mr Falconio was shot dead on a remote stretch of highway about 300km (190miles) north of Alice Springs in July 2001. The 28-year-old from Huddersfield was travelling around Australia with his girlfriend, Joanne Lees, who was also from the West Yorkshire town. In 2005, Bradley Murdoch was convicted of murdering Mr Falconio, but has never revealed the location of his body.

  Murdoch was also convicted of the attempted kidnap and assault of Ms Lees, who managed to escape by hiding in the surrounding bushland. Acting Commander Mark Grieve of Northern Territory Police told a press conference on Wednesday investigators wanted to "bring some sliver of resolution to Peter's family by bringing home his remains". "Police still hold out hope that someone might be able to provide some vital information to assist in this search." Appealing to potential witnesses, he said it is never to late to speak to investigators. "You never know how beneficial that information you may hold may be. Sometimes you do not know what you know," Mr Grieve said. He added that police had "made numerous approaches" to Mr Murdoch, including this week, but said that "unfortunately... on all occasions he has chosen not to engage with police". Police have previously made renewed calls for information on the 15th and 20th anniversaries of Mr Falconio's death.

  Bradley Murdoch was given a minimum 28-year-sentence, during which time he is not eligible for parole

  Murdoch, 67, was sentenced to 28 years in an Alice Springs prison, and was due to be eligible for parole in 2032. However, the Northern Territory's "no body, no parole" legislation mean Murdoch will not be eligible for parole if he refuses to help police locate Mr Falconio's remains. Media reports this week have suggested that Murdoch is suffering from terminal cancer and has been transferred to palliative care, but police have said they cannot comment.
