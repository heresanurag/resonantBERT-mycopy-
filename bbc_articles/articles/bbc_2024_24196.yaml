content: |-
  The 35-year-old mother-of-three was last seen alive on a FaceTime call with a friend in October last year.

  Khasha Smith has not been seen alive since a FaceTime call with a friend in October last year

  A man has been charged in connection with the death of a woman missing from Edinburgh. Khasha Smith was last seen alive on a FaceTime call in October last year, but was not reported missing until 5 January. Police Scotland said they believed the 35-year-old mother-of-three had died, but her body has not been found. A 39-year-old man, who was arrested on Friday, has been charged over her death and is due to appear at at Edinburgh Sheriff Court on Monday.

  Det Ch Insp Bob Williamson, of Police Scotland's major investigation team, said: "Our thoughts remain with Khasha's family at this extremely difficult time and they continue to be supported by specialist officers. "They are understandably devastated and it is vital we get answers for them. "Extensive inquiries remain ongoing to trace Khasha and I would again encourage anyone with any information regarding her disappearance to contact police, as a matter of urgency. "Any piece of information, no matter how small or insignificant you think it is, could prove vital, so please get in touch."
