  A total of six images of the egg - with varying levels of damage - have been posted from the account @world_record_egg since 4 January.

  This latest post is a video showing the egg cracking alongside a caption that reads: "Phew! I feel so much better now. If you're feeling the pressure, visit talkingegg.info to find out more. Let's build this list together."

  It was actually broadcast first on streaming site Hulu as part of their Super Bowl coverage but now sits on the egg's Instagram page.

  A link then leads followers on to a website featuring a list of countries and the different mental health services available in those locations.

