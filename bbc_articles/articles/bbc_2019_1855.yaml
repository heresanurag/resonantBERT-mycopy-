title: Instagram's most-liked egg cracks to reveal a mental health advert - BBC News
date: '2019-02-05'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-47127298
content: |-
  The egg, Instagram's most-liked photo ever, has been used to promote a mental-health campaign

  A picture of an egg - which is Instagram's most liked photo ever - has been used to promote a mental-health campaign.

  The egg, known as Eugene, has now cracked after "feeling the pressure" of all the attention it's received.

  A message posted alongside the broken egg advises people to seek help if they feel the same way.

  More than 52 million people have now liked the original picture, which was posted in January.

