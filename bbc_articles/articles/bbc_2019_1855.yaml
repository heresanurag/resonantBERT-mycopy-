  There had been a lot of speculation about who was behind @world_record_egg and how it managed to get so many likes so quickly.

  Many believed it was a marketing ploy from a large company that had bought followers but British advertising executive Chris Godfrey has since claimed he created it, along with two others, and that their sole purpose was not to promote or advertise anything, just to get as many likes as possible.

  Now that the egg has more than 10 million followers, it's a very effective platform for reaching a lot of people.

  The team behind it has not said if it was paid by Hulu for the campaign or whether the egg will promote anything further on Instagram.

