title: How countries responded to Trump's travel ban - BBC News
date: '2025-06-06'
section: World
url: http://www.bbc.co.uk/news/articles/cwy325dx504o
content: |-
  Countries can be added and removed from the list following regular evaluations by the US government.

  US President Donald Trump has signed a proclamation banning travel to the US from nationals of 12 countries, which goes into effect on 9 June. The countries listed are Afghanistan, Myanmar, Chad, Congo-Brazzaville, Equatorial Guinea, Eritrea, Haiti, Iran, Libya, Somalia, Sudan, and Yemen. Nationals from a further seven countries - Burundi, Cuba, Laos, Sierra Leone, Togo, Turkmenistan and Venezuela - will face partial travel restrictions. So far, only the African Union, which represents all 55 nations on the African continent, Chad, Somalia and Venezuela have responded. Here is what they said.

  Chad President Mahamat Déby said he has told his government to "act in accordance with the principles of reciprocity" and has suspended issuing visas to US citizens. "Chad has no planes to offer, no billions of dollars to give but Chad has its dignity and pride," he said in a statement. Somalia, whose nationals are banned, had a different response and made an immediate promise to work with the US to address security issues. Somali ambassador to the US, Dahir Hassan Abdi, said: "Somalia values its longstanding relationship with the United States and stands ready to engage in dialogue to address the concerns raised." Meanwhile, African Union called on the US to "engage in constructive dialogue with the countries concerned". In a statement, it appealed to the US to exercise its sovereign right to protect its borders and its citizens' security "in a manner that is balanced, evidence-based, and reflective of the long-standing partnership between the United States and Africa". The union said it remains concerned about the "potential negative impact of such measures", and added that it "stands ready to support efforts that promote understanding, resolve concerns, and strengthen cooperation".
