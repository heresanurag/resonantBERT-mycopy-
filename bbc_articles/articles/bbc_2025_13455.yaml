  • None READ: Why were these 12 countries on Trump's travel-ban list? The ban has also drawn ire from Venezuela, whose Interior Minister Diosdado Cabello warned Venezuelans in the US. "The truth is being in the United States is a big risk for anybody, not just for Venezuelans," he warned, adding that the US is governed by what he called "bad people - it's fascism, they are supremacists who think they own the world and persecute our people for no reason". Venezuela is one of the seven countries listed with partial restrictions. Since starting his second term, Trump has deported a number of Venezuelans alleged to be gang members to El Salvador. Trump's proclamation stated that the list would be evaluated in three months time, and then every six months after that. "The list is subject to revision based on whether material improvements are made, and likewise new countries can be added as threats emerge around the world," he explained on Truth Social. In his video shared to the platform, he said: "We cannot have open migration from any country where we cannot safely and reliably vet and screen those who see to enter the United States." As well as security risks, Trump's proclamation gave other reasons such as the listed countries having "taken advantage" of the US by exploiting its visa system, as well as nationals from certain countries, "pose significant risks" of overstaying their visas.
