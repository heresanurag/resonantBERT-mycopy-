  Dujardin is one of four British women who arrived in Tokyo hoping to claim gold at a third Olympics. Jade Jones' taekwondo bid came to an early end, while rower Helen Glover is in the coxless pair semi-final on Wednesday (04:20 BST) and track cyclist Laura Kenny - who has four golds across two Games - begins her campaign on Monday. Germany's Isabelle Werth - who won team dressage gold four years ago - also made history as the 52-year-old became only the third athlete to win golds at six different Olympics. Team GB were second after Hester opened their challenge with a score of 2,577.5 and Fry followed with 2,528.5. But the United States' last rider Sabine Schut-Kery scored 2,684.5 to move ahead and Dujardin - whose horse Gio was making its Olympic debut - could not close the gap, scoring 2,617.0. Dujardin won team and individual dressage gold at London 2012 with Valegro, before the pair won individual gold and team silver in Rio four years later - the horse's final Olympics before it was retired. For 54-year-old Hester - the oldest Team GB athlete in Japan - it is a third Olympic medal, having waited 20 years to win his first after debuting at the 1992 Games. That debut came alongside current team-mate Fry's mother Laura, with the 25-year-old first taking dressage lessons with Hester aged 14. Riding Everdale, Fry will also compete in Wednesday's individual final (09:30 BST) as will Hester and En Vogue.
