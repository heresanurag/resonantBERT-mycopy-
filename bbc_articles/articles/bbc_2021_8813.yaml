content: |-
  Charlotte Dujardin equals the most number of Olympic medals won by a British woman by claiming team dressage bronze in Tokyo.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Charlotte Dujardin equalled the most number of Olympic medals won by a British woman by claiming team dressage bronze in Tokyo. Great Britain's Dujardin, Carl Hester and Charlotte Fry scored 7,723.0, while the United States won silver with 7,747.0 and Germany gold with 8,178.0. Dujardin joins rower Dame Katherine Grainger and tennis player Kathleen McKane Godfree on five medals. Dujardin, 36, won two golds at London 2012 and gold and silver at Rio 2016. She will bid to become the only British woman to claim gold at three Olympics in Wednesday's individual final. "To come away with another medal and be among so many other incredible, inspiring women - I'm so happy," Dujardin said. She has moved alongside Grainger, who earned one gold and four silver medals in rowing across five Games, and McKane Godfree who won one gold, two silvers and two bronzes in 1920 and 1924.

