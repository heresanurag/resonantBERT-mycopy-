title: Maesteg man jailed for running over pedestrian at nearly 90mph - BBC News
date: '2024-09-02'
section: Wales
url: http://www.bbc.co.uk/news/articles/cgq2pznq7qeo
content: |-
  Ricky Perkins is jailed for killing Byron Jeanes, 49, after crashing at speed in wet conditions.

  Man jailed for running over pedestrian at 90mph

  Ricky Perkins will serve at least half of a five year sentence

  A driver who hit and killed a pedestrian while travelling at nearly 90mph has been jailed for five years. Ricky Perkins, 32 of Castle Street, Maesteg, was travelling on the A4063 near Aberkenfig, Bridgend county, in January 2021 when he fatally injured 49-year-old Byron Jeanes. He pleaded guilty to causing death by dangerous driving in June. Passing sentence at Newport Crown Court, Judge Shomon Khan said Perkins' driving was "highly inappropriate".

  The court heard it was raining at the time of the crash but there had been heavy downpours overnight, causing a culvert to block on the road. In a statement read to the court, another driver, Craig Townsend, said he moved into the left-hand lane to avoid “clearly visible” surface water but Perkins undertook him at speed. The court heard Mr Jeanes was wearing a high visibility jacket and waiting in a layby to be picked up to go to work. A statement from his wife, Michelle Jeanes, said she had "lost her future and her dreams for life". Analysis of the BMW Perkins was driving put his speed at 89mph (143km/h) at the time of the crash, causing a lamp-post to collapse into the road, as well as fatal injuries to Mr Jeanes. The court heard Perkins was "in shock" at the scene and was heard saying "oh my god, I am going to lose my job, he’s dead".

  Defending, Andrew Taylor said it was a "tragic case" and Perkins had been "remorseful since the moment of that collision". He said while Perkins was travelling at a "grossly excessive speed", the defendant "wasn’t to know there was blocked culvert on the carriageway" which caused him to aquaplane and hit Mr Jeanes. "There are no winners in a case like this," he added. Judge Khan sent his condolences to the family of Byron Jeanes, saying he recognised how their lives had been shattered. Perkins was told he would be eligible for release after serving half of his sentence and was also banned from driving for five-and-a-half years.
