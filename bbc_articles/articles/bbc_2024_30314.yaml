title: 'Syria: UK ''keeping close eye'' on British jihadists - minister - BBC News'
date: '2024-12-10'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c8xj4jzqlvgo
content: |-
  Home Office minister Angela Eagle tells the BBC that UK intelligence services are monitoring the situation.

  Dozens of Britons who travelled to support jihadist groups are believed to be held in camps in northern Syria

  Any prospect of British jihadists returning from Syria would be "a concern" and the UK is keeping "a very close eye" on the situation, a Home Office minister has said. Dame Angela Eagle, the minister for border security and asylum, said the government is monitoring the "very fluid" situation in Syria following the toppling of Bashar al-Assad's regime. The majority of foreign fighters detained in Syria are held in Kurdish-controlled camps in the north-east, where rebel insurgency factions do not have a presence. Although there is no indication the security situation at those camps will change imminently, Dame Angela said British intelligence services will be "watching very, very closely".

  It is believed there are dozens of British jihadists being held captive in north-eastern Syria having been captured while fighting for the Islamic State group. Asked about the prospect of them seeking to return to the UK, along with an influx of asylum claims from pro-Assad fighters, Dame Angela told BBC Radio 4's Today programme: "Of course it's a concern and it's a concern that we constantly act on.
