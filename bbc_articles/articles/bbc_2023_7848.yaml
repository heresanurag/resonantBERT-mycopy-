content: |-
  The Duke of Sussex looked happy and relaxed as he entered the abbey with his cousins Princesses Beatrice and Eugenie, the daughters of Prince Andrew.

  He was seated a few rows behind his brother, the Prince of Wales during the service.

  You can watch full highlights of the Coronation now, on BBC iPlayer.
