title: Wheelie bins fly and caravan overturns in strong wind - BBC News
date: '2024-04-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-stoke-staffordshire-68820755
content: |-
  Cars are damaged and houses shake as a suspected tornado strikes in Knutton, Staffordshire.

  Wheelie bins went flying and a caravan overturned on a driveway as strong wind struck.

  The suspected tornado woke up residents in Knutton, Staffordshire at about 06:30 BST.

  Steven Hemmings said the wind made his home shake and had damaged cars and windows.

  Senior meteorologist Jim Dale said the village had been hit by either a tornado or a sudden squall.
