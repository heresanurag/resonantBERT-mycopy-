id: bbc_2024_4139
title: 'Buses: Councils warn ''on-demand'' buses under threat without more money -
  BBC News'
date: '2024-03-13'
section: Business
url: http://www.bbc.co.uk/news/business-67208829
content: |-
  Councils said they could not offer a like-for-like replacement for commercial services that have faced cuts.

  In Wiltshire, driver Andy says every day is different on the bookable service he operates

  "On-demand" bus services aimed at plugging gaps left by commercial operators face uncertainty without fresh funds, councils have warned.

  The County Councils Network, which represents rural councils in England, says three in four have rolled them out.

  But it warned many bookable services were making a loss and more money was needed to keep them going in future.

  More than half of journeys on public transport in Great Britain are by bus.

  The Department for Transport said it had already given millions to boost bookable bus services and was capping fares at £2.

  According to its latest figures, bus services have been in long-term decline, with the pandemic hitting passenger numbers and profits hard.

  Councils have increasingly been putting on what is known as a bookable service, typically a minibus, which only operates when and where users have booked it ahead of time.

  The stops on the journey, and the timings, depend on where people want to go - direct from their door to the train station, a local hospital or the supermarket, for example.

  But the County Councils Network group is warning they aren't a substitute for investing in commercial bus services.

