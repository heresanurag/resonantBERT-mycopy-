id: bbc_2019_11726
title: Climate protesters dragged from top of London Underground train - BBC News
date: '2019-10-17'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-50079717
content: |-
  The men were demonstrating at Canning Town but were pulled down to the ground by commuters waiting on the platform after the Tube was unable to leave the station.

  Protesters from the climate campaign group Extinction Rebellion have been dragged from the roof of a Tube by angry commuters.

  The men were demonstrating at Canning Town but were pulled down to the ground by people waiting on the platform after the Tube was unable to leave the station.

  Elliot Laughlin, who describes himself as an independent journalist, was also pulled to the ground as he tried to film the disruption. He said he was then protected by members of the public on the platform.

  The campaigners said the disruption was "necessary to highlight the emergency".
