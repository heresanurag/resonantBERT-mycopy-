  There were mixed reactions about the 30-hour truce from Ukrainians attending Easter morning services in Kyiv and the Russian-occupied city of Donetsk on Sunday. "I do not think this man [Putin] has anything to do with humanity," 45-year-old lawyer Olena Poprych told Reuters news agency. Meanwhile in Donetsk, which has been under Russian control since 2014, residents expressed similar distrust that Zelensky will stick to the terms of the ceasefire. "I watched very closely his [Zelensky's] reactions," said Vladimir, who attended an Easter morning service in the city. "There was nothing about the ceasefire... just some vague statements, not giving any confidence that we will not be shelled." On Sunday, the British government described the proposed ceasefire as a "one day stunt", saying that the claimed truce involved "violations, including the killing and wounding of more innocent Ukrainians". The statement from the Foreign, Commonwealth and Development Office (FCDO) said that the truce fitted the "pattern of previous fake ceasefires" and instead called for a longer 30 day pause in the fighting, as proposed by Ukraine. "As ever, we see no evidence that President Putin is seriously preparing for peace," the FCDO statement said. The US has been directly talking to Russia as part of its efforts to end the war, but has struggled to make major progress. On Friday, Secretary of State Marco Rubio said the US was not "going to continue with this endeavour for weeks and months on end", as it had "other priorities to focus on". "We need to determine very quickly now - and I'm talking about a matter of days - whether or not this is doable," he added. "If it's not going to happen, then we're just going to move on."
