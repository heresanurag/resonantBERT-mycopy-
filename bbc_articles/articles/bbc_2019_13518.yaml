  Despite criticism of it by Full Fact, an image of the tweet was shared by the official Labour Party Instagram account. The account has 90,000 followers, and the post has so far attracted more than 6,200 likes and almost 300 comments.

  It has also been shared on Facebook by Ms Abbott, as well as Labour supporting groups, receiving around 4,000 interactions.

  The tweet is also being used as a paid-for advert on Facebook and Instagram, funded by a Labour-affiliated group called Labour Future.

  The organisation says on its website it is a group at "the cutting edge of modern campaigning", and it is working with Labour to "add value" and help the party win the election.

  Mr Clarke suggested his support for his party could not be taken for granted

  Full Fact says Mr Clarke's comments appeared to come from a Channel 4 interview on 1 November when he said his voting Conservative next month was "not as certain as it has been in previous elections".

  He suggested his support depended on what sort of campaign the party ran.

  "If we really do make ourselves the Brexit Party under our brand, my loyalty is going to be strained absolutely," he said.

  "I am not voting for some crazy right-wing nationalist organisation calling themselves a Conservative government - but that, I think, is laying it on a bit. I don't think that's where we'll wind up."

  The former chancellor, who is standing down from Parliament after nearly 50 years, prefaced his statement by telling his interviewer: "I'm slightly teasing you and myself."
