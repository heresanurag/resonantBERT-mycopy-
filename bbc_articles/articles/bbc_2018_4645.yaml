id: bbc_2018_4645
title: Donald Trump attacks James Comey's FBI memoir of 'lies' - BBC News
date: '2018-04-15'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-43776171
content: |-
  The US president says the former FBI director's book is "fake" and suggests he should be jailed.

  Mr Trump called Mr Comey a "slippery slimeball" and the "worst FBI director in history"

  US President Donald Trump has attacked former FBI director James Comey over his "many lies", suggesting he be jailed over his testimony to Congress.

  "Why did he lie to Congress (jail)," Mr Trump said, adding: "How come he gave up classified information (jail)."

  He also criticised Mr Comey's forthcoming memoir, saying the "badly reviewed book" raises "big questions".

  His comments come ahead of an ABC News interview with Mr Comey to be aired on Sunday as part of his book tour.

  The book - A Higher Loyalty: Truth, Lies and Leadership - reportedly paints an unflattering portrait of Mr Trump, who fired Mr Comey last year.

