  Ross Edmonds, 26, of Bowmans Court, Hemel Hempstead, left the road and smashed in to a car park.

  A drink-driver has been given a 12-month jail sentence, suspended for two years, after his car left the road and smashed into a car park.

  Ross Edmonds, 26, of Bowmans Court, Hemel Hempstead, crashed his car in Maxsted Road, Hemel Hempstead, in March.
