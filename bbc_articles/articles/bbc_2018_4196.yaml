title: 'Commonwealth Games: Scotland lose to Australia in basketball semi-finals -
  BBC Sport'
date: '2018-04-14'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43763311
content: |-
  Scotland's men see their winning run in the Commonwealth Games basketball end in the semi-finals after a 103-46 loss to Australia.

  Alasdair Fraser, right, joint top scored for Scotland with nine points

  Scotland's men saw their winning run in the Commonwealth Games basketball tournament end in the semi-finals following a 103-46 defeat to Australia. After finishing the group stage unbeaten with four victories, Scotland found the gulf in class too great as the hosts eased to victory. Jesse Wagstaff was the top scorer for Australia with 17 points in the win. The Scots will now face New Zealand's in the bronze medal match on Sunday after the Kiwis lost 88-86 to Canada.
