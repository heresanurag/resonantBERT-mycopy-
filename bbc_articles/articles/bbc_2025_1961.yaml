title: 'K Pop, streaming, Taylor Swift: ''Threats'' facing UK pop music in bestseller
  charts - BBC News'
date: '2025-02-23'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5y23pe2v0vo
content: |-
  British acts miss out on the worldwide annual music charts for the first time in two decades.

  Charli XCX leads the nominations for next week's Brit Awards

  After years of global domination by stars such as Ed Sheeran, Adele and Harry Styles, British music artists have failed to make it into the worldwide annual charts of the year’s top 10 bestselling singles or albums - for the first time in more than two decades. No UK acts featured on either list for 2024, as published by global music industry body the IFPI. Two years ago, UK acts held seven of the 20 entries in the end-of-year singles and albums charts. US singer Benson Boone claimed 2024's number one song with Beautiful Things, while Taylor Swift's The Tortured Poets Department was the world's bestselling album.

  Releases by Coldplay, Charli XCX and Dua Lipa did not make the lists - with the highest-ranked British representative being singer and producer Artemas, whose song I Like The Way You Kiss Me was the 15th most popular single of 2024.

  Artemas, from Oxfordshire, had the top song by a UK artist around the world in 2024

  Previously, UK acts have appeared in one, or both, of the top 10 lists every year since at least 2003. The reduction in British stars is not just a global phenomenon. No British act held any of the top 10 most popular singles of the year in the UK in the most recent list - the first time that has happened since at least 2005. UK artists are facing competition from pop stars from Korea and Latin America, with four of the world’s 10 bestselling albums last year by South Korean boy bands.

  Seventeen had two albums in the global top 10 last year
  • None Seventeen - 17 Is Right Here

  However, a crop of new British stars including Lola Young, Central Cee and Myles Smith have made a big impact at home and abroad in recent months, suggesting the well is not running dry. Jo Twist, chief executive of British record industry body the BPI, said: "British artists may have enjoyed stronger years on the international stage, which perhaps isn't surprising given some of our biggest names were not in cycle in 2024. "There was still plenty to be excited about, as a new generation announced itself - not least Charli XCX, who enjoyed a breakthrough year globally, alongside international chart success for emerging artists such as Jordan Adetunji, Artemas and Good Neighbours, while the likes of Lola Young and Myles are now rapidly building an international following." While asserting UK record companies do "an amazing job" at nurturing new artists, it is "undoubtedly becoming much harder to break talent in a hyper-competitive global music economy", she admitted. "Streaming has created many benefits, enabling more artists to succeed, but has also levelled the playing field for music markets around the world, opening up more challenges to the UK."

  US singer Benson Boone was one of the breakout stars of 2024
  • None Post Malone - I Had Some Help (feat Morgan Wallen)
  • None Kendrick Lamar - Not Like Us

  Last year was "one of the most competitive years in recent memory to release music", according to Billboard's UK editor Thomas Smith, with big releases from major US stars such as Swift, Beyonce and Billie Eilish. "In terms of where the UK is at, it isn't great. I wouldn't say it's an existential threat just yet, but we're probably not far off," he said. "It's concerning that it's going down - it feels like quite rapidly. "But then, on the flip side, this is all cyclical." Next weekend, the British music industry will celebrate the achievements of acts such as Charli XCX, Ezra Collective and The Last Dinner Party at the Brit Awards. Another nominee, Sam Fender, released his latest album on Friday to strong reviews. This year has got "off to a great start from a UK perspective", Smith said, and things could pick up even more speed if superstars like Sheeran, Styles and Sam Smith return later in 2025.

  But the music industry landscape is very different from a decade ago, he adds. "We see artists from the K-pop scene and Latin America - like Bad Bunny, one of the biggest, most listened-to artists on the planet right now. "The UK has some really specific issues that need to be addressed, like the rising cost of touring. A lot of UK acts have to be really careful and can't afford to lose money on every single tour that they do when they go to Europe or to the US or anywhere else." Grassroots music venues are "key hubs for nurturing talent" but many have closed or are struggling, he said.

  UK music exports grew by 15% in 2023, the latest year for which figures are available. But US music data company Chartmetric has said much of this is driven by legacy acts such as Queen, the Beatles and the Rolling Stones. "While this may not appear problematic for the UK's bottom line right now, it could highlight potential concerns for the future," journalist Sonia Chien wrote in Chartmetric's How Music Charts newsletter, external last week. "If the UK does not foster the careers of new talent today, the contributions of current legacy artists would be expected to diminish, without being replenished."
