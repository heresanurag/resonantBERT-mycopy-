title: 'Stormont: Why doesn’t Northern Ireland have a government? - BBC News'
date: '2019-04-26'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46804468
content: |-
  The devolved nation has been without an executive for two years.

  Two years ago, the late Martin McGuinness resigned as Deputy First Minister of Northern Ireland. There hasn't been a devolved government since.

