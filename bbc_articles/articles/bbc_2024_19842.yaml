content: |-
  A mother and son duo are preparing enough food to serve hundreds of people over three days.

  Kelvin Adabla is juggling his time between setting up a new restaurant in north London and preparing to serve hundreds of meals at Notting Hill Carnival.

  In the week leading up to Notting Hill Carnival, Kelvin Adabla has to prepare a total of 600kg (1,320lbs) of chicken and four goats.

  Together with his mum Rebecca, the hope is to get enough food ready so they won't run out by Sunday morning as in previous years.

  BBC Radio London’s Aminata Kamara went to meet the duo ahead of the big weekend.

