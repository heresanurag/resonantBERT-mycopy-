content: |-
  Cameron Norrie's bid to crack the French Open last 16 is undone as Italy's Lorenzo Musetti outclasses the British number one.

  Last updated on .From the section Tennis

  Cameron Norrie has never reached the French Open fourth round Coverage: Live text and radio commentaries of selected matches across BBC Radio 5 Sports Extra, the BBC Sport website and app Cameron Norrie's bid to crack the French Open last 16 came undone once again as Italy's Lorenzo Musetti outclassed the British number one. Norrie, 27, lost in the Roland Garros third round for the third successive year with the 6-1 6-2 6-4 defeat. Norrie, who was seeded 14th, is ranked higher than Musetti, but produced an error-strewn display against the Italian 17th seed on the Paris clay. Norrie's exit means there are no British players left in the singles. "I would say this one hurts more than others being at a Grand Slam and wanting to play well," said Norrie, who reached the Wimbledon semi-finals last year. "Hopefully it gives me more fuel and I'll get ready for the next Grand Slam [at Wimbledon]. "There are no excuses to play the level that I did today. I missed so many easy-shot balls, and, yeah, I lost so many points within a couple of shots where usually I can win a lot of those ones." Defeat ended the possibility of Norrie facing top seed Carlos Alcaraz in the fourth round, with Musetti advancing to play the 20-year-old after the Spaniard beat Canadian 26th seed Denis Shapovalov.
