id: bbc_2017_13305
title: Snow affects UK airports, roads and homes - BBC News
date: '2017-12-27'
section: General
url: http://www.bbc.co.uk/news/uk-42496023
content: |-
  Several roads and thousands of homes have been affected by snowy weather conditions in the UK.

  Stansted Airport has been forced to close twice and thousands of homes have been left without power due to the snowy weather.

  Police are also warning drivers to be careful on the roads.
