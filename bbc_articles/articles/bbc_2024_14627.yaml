title: 'Crosby Beach: Search for missing swimmer, 14, stood down, coastguard says
  - BBC News'
date: '2024-07-01'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c84jywrr803o
content: |-
  A major search operation took place overnight and this morning at Crosby Beach on Merseyside.

  The boy had been swimming in the Mersey with friends when they lost sight of him

  A major search operation for a 14-year-old boy who disappeared while swimming in the River Mersey has been stood down. Emergency services received calls shortly after 19:00 BST on Sunday to say the boy had been in the water with friends, near the radar tower on Crosby Beach. Merseyside Police said the rest of the group had come out of the river but realised they had become separated from the teenager and had not seen him since. A search involving the coastguard, police, fire and rescue units, helicopters and the ambulance service has ended, a Maritime and Coastguard Agency spokesman said.

  A section of Crosby Beach near the radar tower was cordoned off

  The major operation, which ran overnight and into the morning, was stood down at 10:00 BST. A section of the beach, near the radar tower, had been cordoned off while emergency services searched the area.

  Helicopters were used to try and find the teenager
