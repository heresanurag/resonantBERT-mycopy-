title: Luton gang member jailed for knife attack - BBC News
date: '2024-07-02'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-49855242
content: |-
  Richards-Tindle is caught on dashcam as he attacked his victim while he was waiting in town traffic.

  A gang member has been jailed for 11 years for attacking a rival with a knife in broad daylight.

  Tyriq Richards-Tindle, 20, of Ashburham Road, Luton, approached his victim who was sitting in the passenger seat of a car, waiting at traffic lights in the town.

  The victim survived the attack but required "several surgeries", Bedfordshire Police said.

  Richards-Tindle was sentenced at Luton Crown Court for causing grievous bodily harm with intent.
