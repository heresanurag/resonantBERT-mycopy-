title: Huge sandstorm sweeps across Suez Canal in Egypt - BBC News
date: '2023-06-02'
section: General
url: http://www.bbc.co.uk/news/world-africa-65788250
content: |-
  Two of the canal's ports were closed as parts of Egypt were engulfed by dust and sand.

  A video posted online shows a sandstorm surrounding the Suez Canal, which led to authorities closing two ports.

  Parts of Egypt have been hit by clouds of dust and sand.

  One person died and five others were injured on Thursday, when a billboard collapsed as a result of the sandstorm sweeping through Egypt's capital city Cairo.

  The Suez Canal is one of the busiest waterways in the world.
