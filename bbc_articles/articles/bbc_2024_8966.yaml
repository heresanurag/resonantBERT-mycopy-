title: Police arrest Gaza protesters at Emory University - BBC News
date: '2024-04-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68902343
content: |-
  Video shows chaos erupting at one Atlanta college as police clear an encampment of pro-Palestinian demonstrators.

  Video shows chaos erupting at Emory University in Atlanta, Georgia as police clear an encampment set up by pro-Palestinian demonstrators.

  According to the university, people "not affiliated" with the school have been arrested.

  An official from the school's police force told local news that those arrested would be charged with criminal trespass and assaulting police officers.
