title: Comic Relief will stop sending celebrities to Africa - BBC News
date: '2024-03-15'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-54716750
content: |-
  The charity will also stop using images of starving people or ill children in its fundraising show.

  Stacey Dooley was criticised for a fundraising film she made in Uganda last year

  Comic Relief will stop sending celebrities to Africa after criticism that stars like Stacey Dooley were going to Africa as "white saviours".

  The charity will also stop using images of starving people or critically ill children to portray the continent, it has announced.

  Instead, its fundraising appeals will be made by local film-makers with a "more authentic perspective".

  "I think it's about time," he said. "And it's not to say that the films that have been made in the past weren't extraordinary and didn't have a huge effect.

  "But it's time for young black and brown film-makers to take charge and say, 'I want to tell you my story'.

  He added: "There are other ways to elicit sympathy - and maybe we'd been pushing on the same button for too long."

  As part of the new approach, Comic Relief will preview three videos by film-makers from across the African continent on Wednesday.

  The films will explore issues including mental health, climate change and forced marriages.

  The move comes after a backlash against the charity's tactic of sending British stars to poor African villages and filming their reactions.

  Last year, Labour MP David Lammy criticised an appeal in which documentary maker Stacey Dooley travelled to Uganda to visit a neonatal clinic that Comic Relief had supported.

  He said pictures of the Strictly Come Dancing winner holding a young Ugandan boy were perpetuating "tired and unhelpful stereotypes".

  "The world does not need any more white saviours," he added, saying the picture evoked "a colonial image of a white, beautiful heroine holding a black child, with no agency, no parents in sight".

  In 2017, a video Ed Sheeran filmed in Liberia for Comic Relief was handed a "Rusty Radiator" award, given to the "most offensive and stereotypical fundraising video of the year".

  Speaking to MPs last year, Comic Relief co-founder Richard Curtis said the charity was moving away from celebrity-led fundraising films.

  He said it would be "very careful to give voices to people" who live in Africa.

