title: Gove becomes eighth candidate to enter race - BBC News
date: '2019-05-26'
section: General
url: http://www.bbc.co.uk/news/uk-politics-48412701
content: |-
  Michael Gove has said he will enter the race for Tory leader, challenging his former Vote Leave ally Boris Johnson.

  Michael Gove has said he will enter the race to be Tory leader, challenging his former Vote Leave ally Boris Johnson.

  Speaking outside his home, Environment Secretary Mr Gove said: "I can confirm that I will be putting my name forward to be prime minister of this country.

  "I believe that I'm ready to unite the Conservative and Unionist Party, ready to deliver Brexit, and ready to lead this great country."

  Read more: Who will be the next prime minister?
