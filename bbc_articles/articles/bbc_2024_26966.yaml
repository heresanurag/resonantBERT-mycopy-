  An art installation containing 20,000 fibre optic lights has been turned on to mark the 200th anniversary of the RNLI. The Field of Light in Salcombe, Devon, involved more than 300 volunteers and was unveiled on Saturday. The work by Bruce Munro spans 3.5 hectares (8.6 acres) and is visible from Salcombe waterfront. Mr Munro said the installation, which runs off green power, was "for everybody".

  He said the Field of Light was first conceptualised more than 30 years ago in Australia after being "inspired by a moment of clarity and connection in a landscape." Mr Munro wanted to bring Field of Light to Salcombe having grown up in the town and seeing the work done by the RNLI. He added: "It's really for everybody, it's not for art lovers, it's for people who just want to be with their families, their friends, and maybe think about the good things in life. "If you leave here with a smile and a warm heart then we've done our job."

  Nigel Blazeby, volunteer lifeboat operations manager for Salcombe RNLI said the installation had been "about a year in planning". The work is free to view but people can sponsor a light stem with all funds going to the charity. Mr Munro said it would be "a miracle" to get a £20 donation for each of the 20,000 stems that make up the art work. Chris Lee, who attended the launch event, said: "It's been absolutely fantastic to see all the people supporting the RNLI and seeing all the work that people have put in to make this possible for everybody. "The RNLI crew are local people and they really care about the local community. "We enjoy getting out on the water, so to know that they're there for us behind the scenes if you need them, they're just amazing." Field of Light will run daily from dusk to 22:00 until 10 January.
