  Russian ice hockey player Alex Ovechkin has become the National Hockey League's joint-highest all-time scorer after hitting his 894th career goal. The Washington Capitals star is now tied with Canadian Hall of Famer Wayne Gretzky, whose record has stood for 26 years. Ovechkin, 39, drove home the puck to give the Capitals a 4-3 lead over the Chicago Blackhawks. He was mobbed by teammates when he equalled the record on Friday night with what was his second goal of the game.

  Ovechkin's feat is all the more remarkable given that his season was interrupted for a few weeks when he broke his leg in November. "It means a lot," Ovechkin said after Friday's game. "Right now it's so emotional. You never thought, like, you can reach that milestone." Gretzky, who was in the crowd at the Capital One Arena to see his record equalled, also drew cheers from the crowd. On Sunday, Ovechkin will have the chance to become the highest-ever goal scorer when the Caps play the New York Islanders.
