title: Motorist filmed diving along Cambridge guided busway tracks - BBC News
date: '2025-06-12'
section: General
url: http://www.bbc.co.uk/news/videos/cx2qz2e4x6eo
content: |-
  The county council says 112 similar incidents have occurred on the guided busway.

  A video has captured the moment a motorist drove their car along a guided busway.

  Passengers on a Stagecoach bus spotted the vehicle on the tracks between the railway station and Cambridge Biomedical Campus at about 16:00 BST on Monday.

  There are physical barriers, "car traps", CCTV and road signs prohibiting entry to vehicles other than guided buses.

  Passenger Nick Mann caught the incident on camera and estimated the driver must have been on the off-road route for a least two-and-half minutes.

  The busway is 16-miles (26km) and runs between Cambridge and Huntingdon.

  Cambridgeshire County Council said: "We would like to remind drivers to be aware and look out for the signage if they are driving around this location. "
