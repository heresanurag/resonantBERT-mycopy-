content: |-
  The seal has been bathed and is ready for some fish, South Essex Wildlife Hospital says.

  Seal is found 18 miles from the sea... in a park

  The lost common seal has been bathed and is ready to eat some fish, South Essex Wildlife Hospital says

  An adventurous baby seal was rescued from a park having ventured 18 miles (29km) upstream from the sea. It was spotted by a dog walker near a section of the River Crouch at Wickford Memorial Park in Essex. South Essex Wildlife Hospital said its lead veterinarian Tom Linsel managed to recover the pup after an hour of searching the area. "What's the last thing you expect to find in the middle of a park in Wickford... definitely a baby seal," the Orsett-based centre wrote on social media, external.

  Lead vet Tom Linsel rescued the seal after a "very muddy" search

  The common seal had been located on the edge of a muddy river bank about 500m (1,640ft) from where it was initially seen. "Now back at the centre, the young male has had a good bath and is now looking a lot better," the hospital added. "Our fish bill is on the rise yet again!"

