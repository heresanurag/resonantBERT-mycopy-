title: Rare footage captures fight between two wild pandas - BBC News
date: '2021-04-14'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-56735149
content: |-
  Some rare footage of two wild pandas having a fierce fight has been captured by researchers in China.

  Researchers in Sichuan Province, southwest China have captured some infrared footage of a rare fight between two rival wild pandas. They say its likely the fight was over a courtship.
