  Boris Johnson said the public reaction to Sarah Everard's death was "wholly justified".

  Crime Bill has higher sentences for damaging statues than rape - Starmer

  Sir Keir Starmer says the Police, Crime, Sentencing and Courts Bill presented last night has longer sentences for damaging statues, rather than rape cases he gives examples of. He says Labour are about to publish a load of ideas and practical changes that could take place in order to help victims. He says he "doesn't care" if this becomes a government bill or not, he says he wants to work together in order to address this problem. Mr Johnson says it is "entirely right in these circumstances" that Sir Keir is offering to work together with the government on these issues. But, he says, until women feel they are being heard "we will not fix this problem". He says if he wants to work with the government on this, he should be voting in favour of the Police, Crime, Sentencing and Courts Bill.
