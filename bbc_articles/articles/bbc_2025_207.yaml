title: 'Big Bash League collision: Sydney Thunder say Cameron Bancroft and Daniel
  Sams both ''conscious and talking'' - BBC Sport'
date: '2025-01-03'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/ce8xegg5lkmo
content: |-
  Cameron Bancroft and Daniel Sams are both "conscious and talking" after colliding with each other while playing for Sydney Thunder in the Big Bash League.

  Cameron Bancroft and Daniel Sams are both "conscious and talking" after colliding with each other while playing in the Big Bash League, Sydney Thunder say.

  The Thunder team-mates have shown "concussion symptoms" following the incident while fielding during Friday's game away to Perth Scorchers.

  The Australian pair, both 32, clashed heads as they tried to take a catch, with former T20 international Sams carried off on a stretcher.

  Bancroft, who served a nine-month ban for ball-tampering while playing for Australia's Test team in 2018, was able to walk from the field, though he had blood pouring from his nose.

  "Both players are conscious and talking, demonstrating symptoms of concussion and have possible fractures," Thunder said on X.

  "Both have been transported to hospital for assessment."

  They were substituted by Ollie Davies and Hugh Weibgen, who helped Thunder restrict Scorchers to 177-4 from their 20 overs.

  David Warner's 49 laid the foundation for Thunder's reply and they reached their target off the final ball of the game, with West Indies' Sherfane Rutherford crashing an unbeaten 39 off 19 balls.
