title: Tributes to Edgar Riches killed in Nairobi motorcade crash - BBC News
date: '2025-03-14'
section: Dorset
url: http://www.bbc.co.uk/news/articles/cx28j84j57vo
content: |-
  Edgar Riches, 79, was thought to have been struck by a car in a presidential motorcade in Nairobi

  Mr Riches worshipped at Poole's St Joseph and St Walburga and Our Lady of Fatima Churches

  A British man killed in a suspected hit-and-run involving a vehicle in the Kenyan president's motorcade was "incredibly generous" and "always pleasant", a friend has said. Edgar Riches, 79, from Poole, Dorset, died on Thursday after he was struck on a road in Kenya's capital, Nairobi. He had been visiting relatives in the country when he was fatally injured, the BBC was told. Police detained a driver, since bailed, who is thought to have been driving a support vehicle at the back of President William Ruto's official convoy.

  Mr Riches worshipped at Poole's St Joseph and St Walburga and Our Lady of Fatima Churches, was a long-standing member of the town's Conservative Association and raised money for Catholic aid charity Catholic Agency for Overseas Development (Cafod). Ann Stribley, the president of Poole Conservative Association, said she had known Mr Riches for about 50 years. "He was private, quiet person but incredibly generous and if he said he was going to do something, he always did it," she said. "There's a total sense of shock and loss. He will be greatly missed. I shall remember him as a kind, quiet and thoughtful, always pleasant, individual. "He was a huge benefit to the association for many years and we will be lucky to see his like again."

  Ann Stribley said Mr Riches was a valued member of Poole Conservative Association

  "[Mr Riches] was an active fundraiser and organised many social events, fundraising for Cafod to help a school in Kenya," a church representative, who did not want to be named, said. "He went every year to visit his sister and nephew." There has been uproar on social media following Thursday's incident. While Kenyans are accustomed to roads being cleared for the presidential motorcade, some have questioned why the convoy was so big and moving at such speed. Following a post mortem examination a pathologist determined the cause of death as multiple trauma. Mr Riches received head and chest injuries, and bruising to his left limbs. Kenyan police said Mr Riches' next-of-kin have been informed.

  William Ruto has been Kenya's president since 2022

