title: Missing Sutton Coldfield baby boy found 'safe and well' - BBC News
date: '2019-04-04'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-47818710
content: |-
  A manhunt for James Dempsey was launched after a five-month-old was reported missing in Birmingham.

  Police earlier asked for the public's help in tracing James Dempsey

  A missing five-month-old has been found safe and well, police have said.

  The boy was reported missing from Sutton Coldfield, Birmingham, on Thursday, as officers launched a manhunt for a man called James Dempsey.

  West Midlands Police later announced that the child had been found and thanked the public for its help in the search.

  A 35-year-old man has been arrested on suspicion of child abduction and remains in custody, the force said.

  Officers previously said the baby's family was "anxious and worried about the baby boy and just want him home".

  Detectives also appealed for sightings of a silver Vauxhall Astra seen heading towards Coventry early on Thursday morning.

