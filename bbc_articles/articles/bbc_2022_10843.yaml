  Earlier in the evening, England's Alice Tai put clear water between herself and the competition to take 100m S8 backstroke gold by more than four seconds. Victory continues the 23-year-old's impressive comeback from major surgery. After years of pain, Tai, who was born with bilateral talipes, or clubfoot, opted to amputate her right leg below the knee in January. "I realised I was wasting time, if a better quality life was possible what was I waiting for?" she said at the time. Major medals certainly are still part of her life. The change initially made turns challenging, but Tai showed she has adapted quickly as she left silver-winning New Zealander Tupou Neiufi in her wake with Wales' Lily Rice taking bronze. Wales' 19-year-old Medi Harris showed her potential with bronze in a high-class 100m backstroke won by Australian Olympic champion Kaylee McKeown. "I'm so happy with that swim, it was a really good race," she told BBC Sport "Hopefully as time goes on I'll be able to work on that back end and keep up with them." Meanwhile, England's James Guy won bronze - his first medal of these Games - in the men's 200m butterfly and England's team of Freya Colbert, Tamryn van Selm, Abbie Wood and Freya Anderson took bronze in the women's 4x200m freestyle relay.

  Australia's Emma McKeon shrugged off speculation over her relationship with team-mates Kyle Chalmers and Cody Simpson, her partners past and present, to win a record 11th Commonwealth gold. The 28-year's collection of Commonwealth golds now surpasses fellow Australian swimmers Ian Thorpe, Susie O'Neill and Leisel Jones, who previously shared the mark with 10. McKeon led home a green-and-gold clean sweep in the 50m freestyle with team-mates Meg Harris and Shayna Jack following her home for silver and bronze. McKeon's winning time was 23.99 seconds, 0.21 off compatriot Cate Campbell's Games record. South Africa's Chad le Clos won a record-equalling 18th Commonwealth Games medal, but had to settle for silver as Lewis Clareburt took his 200m butterfly title. Le Clos' haul matches that of two shooters - England's Mick Gault and Australian Phillip Adams. The 30-year-old led by a third of a second at halfway, but could not resist New Zealander Clareburt's late surge. South Africa's Tatjana Schoenmaker won 200m breaststroke gold with England's Molly Renshaw just outside the medals in fourth. The evening concluded with the Australian quartet of Madison Wilson, Kiah Melverton, Mollie O'Callaghan and Ariarne Titmus beating the world record on their way to 4x200m freestyle relay gold. Australia's time of seven minutes 39.29 seconds was an improvement of more than a second on the 7:40.33 set by surprise gold-medal winners China at the Olympics last summer.

