title: Adam Peaty suffers shock Commonwealth Games defeat as team-mate James Wilby
  wins 100m breaststroke - BBC Sport
date: '2022-08-01'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/62372115
content: |-
  England's James Wilby breaks team-mate Adam Peaty's grip on the 100m breaststroke title with a superb swim at the Commonwealth Games in Birmingham.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's James Wilby shattered team-mate Adam Peaty's hold on the 100m breaststroke title with a superb swim at Birmingham's Commonwealth Games. Wilby, so long in the shadow of Peaty, screamed with delight as his finish overhauled the fading Olympic champion and brought him home in 59.25 seconds. Peaty, who broke his foot in May, ended up fourth, behind Australian duo Zac Stubblety-Cook and Sam Williamson. "Sometimes it doesn't go to plan," Peaty told BBC Sport afterwards. "That's a lack of training, lack of racing... it is what it is. "I'm a fighter and sometimes you have got to have these moments to keep fighting." Peaty, 27 insisted that he still intends to defend his Olympic title in Paris in two years' time despite his first 100m breaststroke defeat since 2014 and described Wilby's performance as "great". Peaty had raised his friend's fist into the air, in the style of a boxing referee crowning a winner, while they were still in the water. "At the end of the day we're both incredible racers," Wilby told BBC Sport. "We all know what Adam is capable of. "We'll both be back to race again and race each other and It's always going to be an exciting one. But that one was really fun." Peaty had led by 0.13 seconds at halfway and an expectant crowd, including his partner and young son, anticipated victory. Instead they got a crowd-scene finish. Peaty's stroke shortened and by the time he had glided to the wall, he had been passed by his rivals. His time of 59.86 was well short of his own world record of 56.88. Peaty is due to return for the 50m breaststroke heats on Monday morning, less than 14 hours after his defeat.

