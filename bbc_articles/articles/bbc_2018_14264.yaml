  Gordon in Blackheath, London, texted BBC Radio 5 Live and said: "My wife and seven-year old boy are going to Greece to visit a very ill grandmother. It will break her heart if they can't make it. It may be her last chance to see them."

  Michelle from Guernsey told the radio station her daughter Caitlyn was stuck in Spain as her flight home via Gatwick had been cancelled.

  Emilie-Kate Owen from Dorking had planned to fly to Edinburgh for her grandfather's funeral on Friday but is now travelling with her father by train in the hope of making it on time. She said her ticket had been accepted on LNER so she did not have to pay extra.

  Caitlyn is a third year foreign exchange student who is spending a year living and studying in Barcelona.

  Her mother said: "It's going to be a big family Christmas, all four of my children are coming home and I would like her to be here, we don't want her stuck there on her own."

  Geoffrey Grove is trying to get to the Swiss Alps with his wife and five-year-old twins

  Geoffrey Grove, 42, is stranded on a plane at Orly airport in France after his flight from Boston, USA was grounded.

  The plane has been on the runway since 08:05 GMT and passengers are not allowed off the plane.

  "There is no air conditioning. Babies are being stripped because it is so hot," Mr Grove said.

  "We are trying to get to the Swiss alps. So this will definitely slow things down.

  "The unfortunate thing is the utter waste of time just sitting on the plane for four hours."

