title: Murder charge over Forest of Dean suitcase remains - BBC News
date: '2020-05-16'
section: Gloucestershire
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-52687415
content: |-
  Human remains were found in two suitcases in the Forest of Dean on Tuesday night.

  Human remains were found near Coleford on Tuesday evening

  A woman has been charged with murder following the discovery of human remains in two suitcases.

  Gareeca Conita Gordon, 27, from Birmingham, will appear at Cheltenham Magistrates' Court accused of killing a woman on or before 12 May.

  Police are awaiting DNA test results to establish the identity of the victim.

  Mahesh Sorathiya, 38, from Wolverhampton, will also appear in court - charged with assisting an offender.

  "The pair have been refused bail and are due to appear before magistrates in Cheltenham via videolink," a Gloucestershire Police spokesman said.

  The suitcases were found close to a quarry, near Coleford in the Forest of Dean, on Tuesday night.

  There have also been police searches in the Forest of Dean
