title: Girl, 13, critical but stable following Hessle stabbing - police - BBC News
date: '2024-11-02'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/c789jdz6nj5o
content: |-
  The girl was found with wounds and lacerations to her neck, abdomen, chest and back, police say.

  A cordon was in place on Friday around a wooded area off Ferriby High Road in Hessle

  A 13-year-old girl who was found stabbed by the side of a busy road in East Yorkshire remains in a "critical but stable" condition in hospital, police have said. The teenager was discovered with stab wounds and lacerations to her neck, abdomen, chest and back by the A63 in Hessle at about 06:50 GMT on Friday. Det Supt Simon Vickers, from Humberside Police, leading the investigation, confirmed that the girl's attackers knew her. Four boys, aged 14, 15, 16 and 17, and two girls, aged 14 and 15, who were arrested on suspicion of attempted murder near where the teenager was found remained in custody, he said.

  The girl was reportedly found injured on the side of A63 dual carriageway

  Det Supt Vickers said: “Over the course of the last 24 hours, my team have been conducting extensive lines of inquiry to ascertain exactly why this incident happened and to understand the circumstances that led to the attack on the 13-year-old girl." He added that he would like to again thank members of the public who had gone to the girl's aid, and those who had contacted police with information about what had happened. "Officers remain in and around the area throughout today and the weekend, should anybody wish to speak with them regarding any concerns they have," Det Supt Vickers said. Cordons around a wooded area on the A63 and Ferriby High Road where the girl was assisted by members of the public had been lifted, according to police. Officers appealed for anyone with information, particularly those who had dash cam or CCTV footage from the area, to get in touch with the Humberside force. Listen to highlights from Hull and East Yorkshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
