content: |-
  Darren Osborne was found guilty of murder, after driving a van into a crowd near a London mosque.

  Darren Osborne has been convicted of the murder of 51-year-old Makram Ali by driving a van into a crowd outside a Finsbury Park mosque.

  Osborne, from Cardiff, was also found guilty of attempted murder.
