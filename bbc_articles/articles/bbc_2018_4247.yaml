content: |-
  England's Louise Sugden wins Commonwealth silver in the heavyweight Para-powerlifting after bronzes for team-mates Zoe Newson and Ali Jawad.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Louise Sugden won Commonwealth Games silver in the heavyweight Para-powerlifting after team-mates Zoe Newson and Ali Jawad took bronze in their events. Sugden, 33, who only took up the sport nine months ago, lifted 103kg to finish behind Nigeria's Ndidi Nwosu. Rio silver medallist Jawad, 29, won men's lightweight bronze for the second consecutive Games. He matched his result at Glasgow 2014 with a best lift of 161kg to give him 182.7 points. Jawad, who has Crohn's disease, said he thought his career was "pretty much over last year". "I have only been training for six weeks so to perform like that was incredible. Just to be here was amazing and I just had to think of the dark times to inspire me," he said.

  Defending champion Paul Kehinde of Nigeria won lightweight silver as team-mate Roland Ezuruike took gold. England's Oliver Brown finished sixth and Wales' Nathan Stephens 10th. Sugden, 33, represented Great Britain in basketball at the Beijing and London Paralympics. Newson, a Paralympic bronze medallist, finished third behind Nigeria's Esther Oyema, who broke the world record - she lifted 131kg to give her 141.6 points - on her way to a third consecutive Commonwealth title. Team-mate Lucy Ejike took silver and England's Natalie Blake was seventh. Nigeria's Abdulazeez Ibrahim took gold in the men's heavyweight final, while silver went to Yee Khie Jong of Malaysia and Sachin Chaudhary of India took bronze. Scotland's Michael Yule was fourth and England's Nathaniel Wilding fifth. Wales' Sean Gaffney failed with three attempts at 120kg and finished last. Medals are decided on a formula which combines a competitor's bodyweight and the weight they lift.

