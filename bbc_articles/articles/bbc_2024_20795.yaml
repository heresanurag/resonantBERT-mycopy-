title: Light plane glides near homes before crash landing in Australia - BBC News
date: '2024-08-06'
section: General
url: http://www.bbc.co.uk/news/videos/c900npw99j2o
content: |-
  The pilot was able to steer clear of roofs in Sydney’s suburbs after the plane lost power mid-flight.

  In footage shared by local media outlet Nine, the Cessna 210 can be seen skidding across the tarmac at Bankstown Airport.

  Both the pilot and passenger were uninjured.
