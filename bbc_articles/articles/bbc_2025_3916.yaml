title: Newcastle United fans celebrate 'brilliant' Carabao Cup win - BBC News
date: '2025-03-16'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cj924vgelgvo
content: |-
  The Magpies beat Liverpool 2-1 in the league cup final - their first major trophy since 1969.

  Fans at the Strawberry pub, next to St James' Park, were ecstatic

  Geordie dreams have come true after Newcastle United won the League Cup. The Magpies beat Liverpool 2-1 in the Carabao Cup final at Wembley. The last trophy for the club was the old Fairs Cup in 1969, but the 1955 FA Cup was the club's last domestic success. Thousands had made the trip to London for the game, with crowds in Newcastle also following play from the city centre fan zone and other pubs across the city.

  Fans gathered outside St James' Park as celebrations continued into the night

  The crowd at the fan zone in Newcastle erupted when the first goal was scored

  Speaking from the fan zone, Jackie Gordon said: "Absolutely brilliant, they're bringing it home." Her friend, Tracy Smith, added: "I'm so happy. What an amazing day. They've been brilliant." Many fans were not alive the last time the club won a domestic trophy 70 years ago.

  There were tears and cheers in the fan zone

  'Howay the lasses' - Jackie and Tracy celebrate in the fan zone

  Gordon Rayner, who had travelled to Wembley for the game, told BBC Radio Newcastle: "I'm shaking. "I'm 55 so was born just after they last won anything... I've waited my whole life for this. "It's going to take a long time to sink in." Graham, also at the game, said: "I just can't describe the feeling. "I never thought I'd see the day. We've been in so many cup finals and we've lost. Brian Ramshaw, 65, said: "We have always been the bridesmaid, never the bride... but not today, not today." Also at the fanzone, Kelly Wood, 39, from North Shields, was wearing a plastic poncho and said she had been swilled with beer when the goals went in. Her friend joked: "Tomorrow should be a bank holiday, we deserve it."

  Newcastle captain Bruno Guimaraes, speaking to Sky Sports, said: "It's all for these fans. "I don't have any words. It's the best day of my life. "For them [the fans] it's like the World Cup. "People have grown up and not seen us as champions. This is unbelievable."

  Fans at Wembley were holding their breath before the final whistle went

  Fans celebrate the win in the Strawberry pub

  Other fans who did not make the journey south watched the match in homes and pubs across the city. There were scenes of jubilation as the final whistle blew.

  There is a party in Newcastle tonight

  Fans were hoping for 'Pandamonium' at the game

  TV presenters Ant McPartlin and Declan Donnelly were at Wembley to take in the historic result. Donnelly said on Instagram: "I cannot believe it, this is the best day of my life... apart from the wedding and the kids and all that, but apart from that it's the best day of my life."

  All kinds of fans got in on the action

  Alan Shearer, who captained Newcastle in the 1999 FA Cup final, said before the game he would be "as nervous as any supporter". "I know I am biased but if any set of fans deserves a trophy it is the Newcastle supporters because of their passion, their loyalty and how they have stuck by the team over the years," he wrote for BBC Sport. Afterwards he said on X: "Ah man. Did the Geordies deserve that or what."

  Supporters lined up outside Stack next to St James' Park hours before the game began

