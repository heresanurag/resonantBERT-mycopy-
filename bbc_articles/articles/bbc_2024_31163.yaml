title: 'Chris Mason: Elon Musk donation talks with Reform UK raise questions over
  rules - BBC News'
date: '2024-12-18'
section: Politics
url: http://www.bbc.co.uk/news/articles/c4g3zw1jx7vo
content: |-
  Nigel Farage tells the BBC he is in "open negotiations" with Elon Musk but no figure has been agreed on.

  Chris Mason: The challenge of disruptors with deep pockets

  Reform UK treasurer Nick Candy (left) and the party's leader Nigel Farage (right) have been holding talks with Elon Musk (centre) in Florida

  But they are more than that, for they are the most clear-cut proof yet of the richest man in the world's desire to get involved in – meddle in, as some see it – British politics. There is another way of describing the pictures of three men at Donald Trump's pad, Mar-a-Lago, in Florida: two billionaires and Farage.

  Farage had one mega rich man alongside him when meeting someone even richer. Reform UK's new Treasurer is Nick Candy, a billionaire property developer who used to donate to the Conservatives and who, incidentally, is married to the former pop star Holly Valance. But Candy is a pauper compared with Musk, the serial entrepreneurial disruptor in business with his rockets, electric cars and social media platform, now doing the same in politics. Farage is the master of political storytelling freighted with an intrigue that keeps people interested. This time it was all about eye-catching imagery and a teasing but not exactly straight answer about a donation. Money was discussed, we are not told how much, we don't know for certain if it'll ever happen and if it does what it will amount to, but the next chapter was trailed – Trump's inauguration next month, which Farage will be attending. The Reform UK leader, now back from Florida, told me the suggestion Musk might give his party $100m (£78m) was wildly over the top. But a number much smaller than that could still be very big, and game-changing for Reform's prospects. The question is whether it would be legal – and whether it would be seen as legitimate. The All Party Parliamentary Group on Fair Elections says it wouldn't and wants the law changed. Downing Street says the government has committed to strengthening the rules, which currently allow donations from UK registered companies.

  This video can not be played To play this video you need to enable JavaScript in your browser. Nigel Farage says he “did discuss money” during Mar-a-Lago meeting with Elon Musk

  The danger for the government is any change in the law might look like self-interest and changing the rules of the game half way through. But never before have we seen a man as rich, with a megaphone as large, so enthused about strutting the political stage – abroad as well as at home. That poses profound questions about how much influence and from where is judged to be too much influence from too far away.

  Nigel Farage also met US Vice-President elect JD Vance during his recent trip to America

  And here is a thought experiment for you: is your own instinct in how you answer those questions driven primarily by what you think of Farage and Musk, or about the principle of foreign donations? The former Conservative MP Miriam Cates wrote on X: "Now imagine...a picture of Bill Gates with Keir Starmer, pledging support for the Labour Party. You are either for or against foreign interference in British politics. It can't just depend on whether you agree with or like the individual billionaire concerned." Farage will be back across the Atlantic in a few weeks to toast Trump's return to the White House. On this latest visit he also managed a photo with the US Vice President Elect, JD Vance. The Reform UK leader has friends in high places and friends with deep pockets. Little wonder he is causing Labour, the Conservatives and others to fret about the political threat they fear he increasingly poses to them.
