title: Coldplay to help decide 2026 World Cup final half-time show performers - BBC
  Sport
date: '2025-03-05'
section: World Cup
url: http://www.bbc.co.uk/sport/football/articles/cge1q41np7go
content: |-
  Coldplay will work alongside Fifa to decide a "set of artists" to perform a half-time show at the 2026 World Cup final.

  Coldplay performed at the 2016 Super Bowl half-time show with Beyonce and Bruno Mars

  The 2026 World Cup final will stage a Super Bowl-style half-time show for the first time, with Coldplay helping to pick a "list of artists" to perform. The tournament, which will be co-hosted by the USA, Canada and Mexico, concludes with the final on 19 July 2026 at the MetLife Stadium in New Jersey. Though pre-match performances at showpiece occasions such as the Champions League final have become commonplace, there has never been a half-time show at a World Cup final. Half-times in the regular NFL season last around 15 minutes but they are extended up to 30 minutes at the Super Bowl in order to accommodate a half-time show. Fifa president Gianni Infantino says Coldplay lead singer Chris Martin and band manager Phil Harvey will help to establish a set of artists to perform in the 15-minute break at next year's final. "I can confirm the first ever half-time show at a Fifa World Cup final in New York New Jersey," Infantino wrote on Instagram. "This will be a historic moment for the Fifa World Cup and a show befitting the biggest sporting event in the world."

  The 2026 World Cup final will be held at the MetLife Stadium in New Jersey

  Rap artist Kendrick Lamar headlined this year's Super Bowl half-time show in New Orleans, which drew record audience figures of 133.5m across the United States. The performance surpassed the long-standing record set by Michael Jackson in 1993. The likes of Rihanna, Beyonce and Lady Gaga have also performed in recent years, while Coldplay headlined in 2016. Between 25 to 30 minutes are allocated for Super Bowl half-time shows so that the various stages and equipment can be built and dismantled.
