  The presenter raises £7.5m by cycling 300 miles from Wales to Scotland on a Raleigh Chopper bike.

  Paddy McGuinness completes Children in Need challenge on kids’ bike

  This video can not be played To play this video you need to enable JavaScript in your browser.

  BBC Radio 2 presenter Paddy McGuinness has crossed the finish line to complete his epic Children In Need cycling challenge, after riding almost 300 miles from Wales to Scotland on a Raleigh Chopper bike. The former Top Gear and Question of Sport host, 51, has raised more than £7.5m on his five-day journey on a customised 1970s children's bike called Patch. "What a sight, what a feeling!" he said, as he finished his journey at BBC Scotland's HQ in Glasgow just before 10:30 GMT on Friday. This year's televised Children in Need appeal starts at 19:00 on BBC One with Girls Aloud, Ella Henderson and Doctor Who star Ncuti Gatwa set to take part.

  McGuinness met Children in Need mascot Pudsey Bear on his route from Wrexham to Glasgow

  McGuinness set off from Wrexham on Monday and was met by crowds as he finished his ride on Friday. "Honestly I can’t believe it. I came out of East Kilbride, I was looking at Glasgow and it was lit up in sunshine," he said. "Then coming in here and the streets were lined. I had Sir Tom Hunter beside me and I came around the corner there... Thank you so much everybody." McGuinness's fundraising total will rise significantly after Scottish businessman and philanthropist Sir Tom said he would double any donations made from Wednesday onwards, up to a £3m limit.

  McGuinness rode all the way on a modified Raleigh Chopper bike

  The Bolton-born star has said he was motivated to take on the challenge by the people he had met who benefitted from projects funded by BBC Children in Need. "When you meet these people... that's what spurs you on, and when you see the work that's being done in and around it, and again, when you're out and about, just people stopping me," he said. He was joined by Olympic cyclist Sir Chris Hoy on Thursday, and received messages of support from astronaut Tim Peake and his Phoenix Nights co-star Peter Kay, as well as hundreds of listeners. Last year, another Radio 2 presenter, Vernon Kay, raised more than £6m for Children in Need after completing his ultra-marathon. The DJ ran from Leicester to Bolton - a distance of 116 miles - over four days.

  Children in Need is the BBC's charity for disadvantaged children and young people across the UK. It has raised more than £1bn for charities and projects since its first major appeal in 1980. Friday's live entertainment extravaganza on BBC One will involve three hours of comedy, music and surprise guests. Ade Adepitan, Chris Ramsey and Rochelle Humes will host the show, alongside Kay, Mel Giedroyc and Lenny Rush.

  Sarah Harding, who died in 2021, is being celebrated in a new single

  One of the most anticipated elements of this year's appeal is a new version of Girls Aloud's single I'll Stand By You, with the lead vocal sung entirely by their late bandmate Sarah Harding. The ballad was originally released as a Children In Need song in 2004 and topped the UK chart for two weeks. The 20th anniversary re-release will again raise money for the charity. A new version of the music video, featuring unseen archive footage, will be screened during Friday's appeal show.

  Other highlights on the night will include Doctor Who star Ncuti Gatwa introducing a preview from the show's forthcoming Christmas Special. Doctor Who fans will have the chance to own pieces of memorabilia from the long-running science fiction drama when two items go up for auction. There will also be a performance by singer Ella Henderson, while fellow pop star Kylie Minogue has recorded a special message which will be played on the night. Viewers can also expect a visit from the stars of Gladiators, as well as a special performance from Strictly Come Dancing as the professionals are joined by TV character Bluey. And actor Gary Oldman will read a CBeebies bedtime story, which will be aired as part of the show. BBC Children in Need will air at 19:00 on Friday 15 November on BBC One and BBC iPlayer.
