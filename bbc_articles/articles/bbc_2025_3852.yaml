  • None What is hantavirus, disease that killed Gene Hackman's wife? Arakawa's own will left her assets to Hackman, with a provision that if they died within 90 days of each other, her estate would go to a trust and later be donated to charity after covering medical expenses.

  Gene Hackman and Betsy Arakawa were married for more than 30 years.

  Hackman has in the past discussed his relationship with his children. "You become very selfish as an actor," he told The New York Times in 1989. "Even though I had a family, I took jobs that would separate us for three or four months at a time. The temptations in that, the money and recognition, it was too much for the poor boy in me." Hackman's children, though rarely in the public eye, occasionally attended red carpet events with him. In another interview, Hackman talked about the difficulty his children had of growing up with a parent who was constantly in the spotlight. "It's tough being the son or daughter of a celebrity," he told The Irish Independent in 2000. "I couldn't always be home with them when they were growing up, and then, living in California, they've had my success always hanging over their heads." His daughters and granddaughter expressed deep affection for him after his passing. "He was loved and admired by millions around the world for his brilliant acting career, but to us, he was always just Dad and Grandpa," they said. "We will miss him sorely, and are devastated by the loss."
