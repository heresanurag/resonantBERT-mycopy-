title: 'Alan Milburn: NHS needs big reforms, says newly appointed - BBC News'
date: '2024-11-10'
section: England
url: http://www.bbc.co.uk/news/articles/cgmvzy233w2o
content: |-
  Campaigners raise concerns about Alan Milburn's private sector links in his new role overseeing NHS reforms.

  Milburn - who has been a consultant to private healthcare firms- is now a top health adviser for the government

  Alan Milburn, a former Labour health secretary, has been made a top health adviser in the government as ministers look to reforming the NHS. Milburn, who served under Tony Blair from 1999-2003, is known for his connections to private healthcare sector, having worked as a consultant to several firms since he left public office. In an interview with the Times newspaper, external, he said the NHS needed "big reforms" to make it "fit for the future," arguing it was "in the worst state" he'd even seen. But his appointment as a lead non-executive director on the board of the health department has sparked concerns due to his links to private healthcare.

  Prime Minister Keir Starmer has pledged that there be no extra NHS funding without reform - and his government is set to reveal a new 10-year plan for the public health service this week. He has set out three key areas for reform - the transition to a digital NHS, moving more care from hospitals to communities, and focusing efforts on prevention over sickness. Some campaigners warned that Milburn's appointment showed that Labour would increase private sector involvement and undermine the NHS. Meanwhile the Conservative Party called his appointment an example of "blatant cronyism". “We will not put ideology over delivering better services for patients,” they told the BBC, saying changes Mr Milburn had made when he was healthcare secretary in the early 2000s had cut waiting lists and improved patient satisfaction. During his time there, Milburn had made dramatic reforms to the NHS including privatising more services and rapidly increasing budget. In an interview with the Times published on Saturday, he also argued for patient to have greater choice over their selection of treatments and GPs and for clinics to receive more money, for keeping people out of hospitals. “The NHS is in the worst state I’ve ever seen and I’ve been around health policy now for 30 years," he told the newspaper. He added the NHS must end it's “more, more, more culture” and accept reforms were needed to improve productivity. He also said PM Starmer prioritised a "real drive on value for money" for funding. His appointment comes just ahead of a major healthcare announcement expected from the government this coming week. On Wednesday health secretary Wes Streeting will deliver a speech announcing new policies to make the NHS use its funding more efficiently. It comes after the government announced an extra £22.6bn for the National Health Service in England in the Budget last week.
