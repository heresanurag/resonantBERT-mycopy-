  Wales coach Gatland to stay on for Six Nations

  Warren Gatland was Wales head coach from 2007 to 2019 before returning for a second spell in December 2022

  Warren Gatland will continue as Wales head coach for the 2025 Six Nations despite Welsh Rugby Union chief executive Abi Tierney admitting his position had been "on the line". Gatland, 61, has presided over statistically the worst side in Wales' 143-year international rugby history, slumping to a record 12 successive Test match defeats. Welsh Rugby Union (WRU) executive director of rugby Nigel Walker has resigned but Gatland, whose contract runs until the 2027 World Cup, will remain in his role for now. Wales begin their Six Nations campaign against France in Paris on Friday, 31 January before travelling to face Italy eight days later.

  After autumn defeats against Fiji, Australia and South Africa, the WRU announced it would be conducting a review into performances, led by Tierney. Tierney presented the review's findings to a WRU board meeting this week. While Gatland remains in post, the New Zealander has been warned there will be a further review of performances after the tournament. "I have had a number of honest conversations with Warren and I will make no secret of the fact his position was on the line as we undertook our review," said Tierney. "Further than that, like any head coach in any sport, he knows the security of his position is directly related to the performances of the team and this is a situation that will continue to intensify. "There is a tough challenge ahead but Warren is more than up for that challenge. We also believe he is equal to it." Tierney says the WRU board considered more wholesale immediate changes but concluded that challenging Gatland to change Wales' fortunes on the pitch was the best approach. "We have assessed in detail the planning and preparation, the enabling and controllable factors which are the responsibility of the coaches as well as the culture in camp, the mental fortitude of players, their experiences to date and their own heartfelt thoughts on the direction of travel for the squad," said Tierney. "We have included expertise and opinion from a wide range of reputable and knowledgeable sources and we have seen what many pundits and fans have expressed, that we are not performing to our potential at the moment."

  Gatland enjoyed a successful 12-year spell as Wales coach before leaving after the 2019 Rugby World Cup. However, since returning for a second stint in charge when he replaced fellow countryman Wayne Pivac in December 2022, Gatland has overseen six victories and 18 losses in 24 Tests, a win ratio of just 25%. Gatland managed only one win in the 2023 Six Nations, but the former British and Irish Lions coach did galvanise the Wales squad to reach the quarter-finals of the 2023 World Cup. Wales' last Test win came against Georgia in the World Cup pool stages in October 2023, before defeat by Argentina in the last eight of that tournament. In 2024, Wales finished bottom of the Six Nations for the first time in 21 years and lost 11 games overall. It was the first time Wales' men's side had not managed an international win in a calendar year since 1937. Wales have slipped to a World Rugby ranking low of 11th, with Gatland having been at the helm when they reached top spot in the build-up to the 2019 World Cup. "I've been honest in terms of welcoming scrutiny and challenge. As well as that I understand the pressures of international rugby with performances and results," said Gatland. "I am pleased to have the support of Abi and the board to take the squad into the Six Nations. "This group of players has a huge amount of potential and we will be working incredibly hard together to turn around our fortunes on the pitch. "We know, more than ever, we will be judged on competitiveness, on success and on winning during the 2025 campaign."

  Some key recommendations from the review will now be implemented, which include considering changes to Gatland's backroom staff before the Six Nations starts. Tierney will also review the high-performance structure at the WRU and make necessary changes after Walker's resignation. Huw Bevan, currently interim head of performance, and community director Geraint John will assume Walker's executive short-term duties in the short term, with a new director of professional rugby to be recruited in 2025. A new high-performance advisory panel is also being appointed and will be up and running in the 2025, including former senior players. The panel will also be an integral part of long-term changes to the high-performance structure at the WRU, with the alterations designed to directly benefit the women's high-performance game. Other changes being planned before the 2025 men's Six Nations will include improving the mentoring support for players with new mental skills resources being employed.
