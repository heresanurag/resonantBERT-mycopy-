content: |-
  George King, 21, was met by police after climbing a skyscraper hotel without safety equipment.

  Free climber George King, 21, has been met by police after climbing a skyscraper hotel without safety equipment in Barcelona.

  He has previously spent time in jail for climbing The Shard in London in 2019.
