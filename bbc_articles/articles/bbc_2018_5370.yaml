title: Beach lifeguards train volunteer lifesavers in The Gambia - BBC News
date: '2018-05-07'
section: General
url: http://www.bbc.co.uk/news/uk-england-cornwall-44006833
content: |-
  The RNLI says it has trained hundreds of lifesavers from developing countries in Africa.

  Beach lifeguards from the UK have been training volunteer lifesavers in developing countries such as The Gambia and the Philippines.

  The scheme is part of the RNLI's aim to reduce drowning deaths around the world.
