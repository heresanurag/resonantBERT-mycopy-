title: 'Trump-Zelensky: Would one-month Ukraine truce work? - BBC News'
date: '2025-03-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/ckg1r4g08kwo
content: |-
  BBC diplomatic correspondent James Landale considers the idea suggested by the French president.

  Could a partial month-long truce between Russia and Ukraine be the key to unlocking a lasting peace between the two sides? President Emmanuel Macron of France believes so and he floated the idea during Sunday's summit of European leaders in London. In an interview with Le Figaro newspaper, he proposed a four-week truce "in the air, at sea and on energy infrastructure". It would not cover ground fighting along the front line in the east. "In the event of a ceasefire, it would be very difficult to verify [a truce] along the front was being respected," Macron told the newspaper. In a separate interview, French Foreign Minister Jean-Noel Barrot said: "Such a truce on air, sea and energy infrastructure would allow us to determine whether Russian President Vladimir Putin is acting in good faith when he commits to a truce. And that's when real peace negotiations could start." This so far appears more of an idea than a fully worked-out plan and hard details are scarce. But the essence of the hypothesis would seem to divide the process of ending the fighting.

  An initial short-term truce - something less permanent than a formal ceasefire - would provide a moment to test Russia's willingness to negotiate a peace. It would also potentially give an early political win for President Trump. It would not involve any ceding of territory. And it could create the political space to allow serious talks to begin about a lasting peace. Under the French proposal, a European "assurance force" would deploy to Ukraine to deter future Russian aggression only after any lasting ceasefire had been agreed. Britain's Ambassador in Washington, Lord Mandelson, appeared to give credence to the idea on Sunday in an interview with ABC News when he said: "Ukraine should be first to commit to a ceasefire and defy the Russians to follow." But on Monday UK government officials and ministers were cool about the French truce idea and emphasised it was not yet an agreed proposal. Armed Forces Minister Luke Pollard told the BBC's Today programme: "A number of options that are being discussed at the moment. None of them have been agreed at this stage". The prime minister's spokesman said: "There are clearly a number of options on the table. I'm just not getting into a running commentary on the options." Italian Deputy Prime Minister and Foreign Minister Antonio Tajani was more blunt, saying the idea was "premature", according to the Italian news agency Ansa. "I believe that everything must be done together, Europe and United States, sitting at a table with Ukraine and Russia to reach a fair and especially a long-lasting peace," Tajani said. "Therefore, it is still premature to see what to do, how to do it." There are clearly difficulties with the idea. How would one measure a violation by an anonymous drone attack on a Ukrainian power plant? Why would Ukraine want to give Russian forces a free month to regroup and rearm? But for all that, Western diplomats said the idea of a partial truce was not entirely "blue-skies thinking" by President Macron - a man known for floating ideas at international summits. They said it could be part of the European ceasefire plans that are being worked on before being put to the Americans. Clearly some fresh thinking may be needed to try to unlock the current impasse with the US and Ukraine still at odds and the Europeans struggling to find ways of repairing the diplomatic breach. Everything of course depends on what Ukraine and Russia think. On Sunday night Ukrainian President Volodymyr Zelensky was asked if he was aware of the French truce plan and said simply: "I'm aware of everything." So far there is no evidence the Russians would be willing to agree to a partial truce. As Zelensky said: "Anyone who wants to negotiate does not deliberately hit people with ballistic missiles."
