content: |-
  Cher Maximen was stabbed with a zombie knife when a fight broke out next to her.

  The man who murdered Cher Maximen in front of her three-year-old daughter at Notting Hill Carnival has been jailed for life.

  Shakeil Thibou, 20, from Kensington in west London, was sentenced at the Old Bailey earlier where he was ordered to serve a minimum term of 29 years.

  Bristol-born Ms Maximen, 32, was fatally stabbed with a zombie knife when a fight between a group of men broke out next to her.

  The godmother to Cher's daughter revealed the three-year-old watched her mother bleed to death.

