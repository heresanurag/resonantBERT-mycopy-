  He came in after Connolly, not in Australia's squad 48 hours ago, was dismissed for a torturous duck, having been well beaten by six of his nine balls. Travis Head hit a match-winning 137 when these sides last met in the 2023 World Cup final and threatened again by hitting five fours and two sixes in a 33-ball 39 before chipping the second ball bowled by spinner Varun Chakravarthy to long-off. That left Smith to nudge and nurdle a rebuild, doing so effectively by rotating the strike in partnerships of 56 with Marnus Labuschagne and 54 with Alex Carey. The 37th and 38th overs went a long way to deciding the game, however. Australia were eyeing 320 when Smith advanced towards and missed a Mohammed Shami full toss. Maxwell swept a six off Axar Patel in the next over but was then bowled going back to a quicker delivery. Only 59 runs came after Maxwell was dismissed – a brilliant run-out of Carey for 61 also crucial. Shreyas Iyer swooped to collect at short fine leg and hit direct as Carey, who had timed the ball as well as anyone in striking eight fours and a six, returned for the second. This has still been another strong showing for Australia, who end a long winter that included an epic Test series win over India and victory in Sri Lanka.

