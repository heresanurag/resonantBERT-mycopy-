  Having moved serenely through the group stage, this was India's sternest test. Ultimately they came through with another confident victory to continue their quest for a second global title in eight months after they won the T20 crown last year. The match was probably decided at the end of Australia's innings. Another 20, even 30 runs, were possible and it may have been enough. Instead, Kohli was able to steer his side on after Gill was bowled for eight and Rohit Sharma pinned lbw by left-arm spinner Cooper Connolly for 28. Australia, without Pat Cummins, Mitchell Starc and Josh Hazlewood here, were always asking a lot of an inexperienced bowling attack. Smith may rue the decision to bat first, given the pitch did not turn as much as expected. Glenn Maxwell dropped Kohli on 51 but he was otherwise typically assured – the only surprise coming when he was dismissed by Zampa to set up a more tense finish than was expected. The crowd was quiet when the equation tightened to 24 runs required from 20 balls but erupted when Hardik struck consecutive sixes off Zampa. India have had plenty in their favour by playing all of their matches in Dubai. They are going to get one more on Sunday.

