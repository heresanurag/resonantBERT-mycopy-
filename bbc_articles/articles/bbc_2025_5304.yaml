  India captain Rohit Sharma: "Until the last ball is bowled, nothing is certain. That's how this game is. Halfway through the game, we felt like it was a reasonable score and we'd have to bat really bat well to get it because the nature of the pitch was - it didn't allow you to play how you wanted to play. "We were very, very clinical with the bat. Yes, we got the runs at the 48th over but I thought we were very calm and composed in our chase." BBC commentator Aatif Nawaz: "There is a huge self-assuredness about the way Virat Kohli bats. He doesn't worry about how many fours or sixes he scores, he just adapts his game to the task at hand. He takes his ego out of the equation completely and delivers for the team. "He has an instinct for the game and is one of the best to ever do it." Australia captain Steve Smith: "I thought the bowlers did a really good job. Our spinners squeezed and enabled us to take the game deep. It was tough to rotate the strike at times but I thought everyone did a good job tonight.

