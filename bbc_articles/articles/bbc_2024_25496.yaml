title: 'Pembrokeshire fire: Girl fascinated by flames died in blaze - BBC News'
date: '2024-10-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx2k3q2j99eo
content: |-
  Alysia Salisbury's screams could not be heard over the sound of a fire alarm, an inquest hears.

  Alysia Salisbury had autism and did not recognise the dangers of fire, the inquest heard

  The death of a five-year-old girl, who was "fascinated" by flames and died in a house fire, was accidental, a coroner has concluded. Alysia Salisbury’s body was found in her sister’s bedroom after emergency services were called to the blaze in Pontyglasier, near Crymych in Pembrokeshire on 27 May 2023. An inquest heard Alysia, who had autism and did not consider the danger of fire, was screaming but could not be heard above the noise of a fire alarm. Recording a conclusion of accidental death, acting senior coroner Paul Bennett said the most probable cause of the fire was a flame from a lighter making contact with flammable material.

  Alysia’s mother, Tara Salisbury, said the family would miss her "terribly", the inquest at Haverfordwest County Hall was told. The coroner extended his condolences to Alysia's family for their "sad loss". The family of five had gone to bed when a fire alarm activated in their house at about 21:40 BST. Mr Bennett described how Ms Salisbury thought it was because of an oven, which had very recently been used by another one of her children. Her eldest child then noticed smoke coming from underneath a bedroom door. Ms Salisbury and her partner, Joshua, opened the door and saw the room in flames, with the fire moving along the ceiling and up the stairs. The pair, along with Alysia’s siblings, left the house and windows started to smash when they got outside.

  Alysia Salisbury died at the scene of the blaze at Pontyglasier

  The inquest heard Mid and West Wales Fire and Rescue Service arrived at the property at 21:53, and Alysia’s body was found at 01:05. Fire officer Jason Woodman gave evidence in the inquest, describing how a wooden desk in the bedroom was fully consumed by flames when Ms Salisbury and her partner opened the door. He said it gave the service a "good indication that it was that area of the room that was the origin of the fire" and that scented candles had been kept on the desk. A lighter was in a drawer in the room and Ms Salisbury confirmed to the fire service that her daughter would be capable of using it, and that she had a "fascination" with anything sensory, including fire. The family kept a lighter locked away in the house, the inquest heard, but it had been moved to Alysia’s sister’s bedroom drawer. Alysia had a "curiosity with the colour and movement of the flames", the coroner added.

  A post-mortem examination indicated the cause of death was due to exposure to fire and fire effluent. The coroner's concluded the fire was an accident, being the "unintended consequence of a deliberate act". He said there were no signs of "a third party involvement" or any foul play. "I can't imagine the horror that Tara and Josh were faced with," Mr Bennett said. "The desperation and distress that the family have had to endure both then and now. "I have no doubt that the family miss her so desperately." Ms Salisbury, told the inquest via video link: "We miss her terribly. "It was hard to hear most of that. "She was very very loved, and will be very missed for a very long time."
