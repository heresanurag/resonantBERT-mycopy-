title: 'West Midlands: Thunderstorms and floods force evacuations - BBC News'
date: '2024-09-22'
section: England
url: http://www.bbc.co.uk/news/articles/c20md7e7rn8o
content: |-
  Power cuts are reported in10 areas in the region and flood warnings are in place in Staffordshire.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Storms have battered the West Midlands during a night of lightning and heavy rain, which led to flooded streets and evacuations. A pub in Aldridge "went off with a bang", police said, when it was struck by lightning and had to be evacuated. Meanwhile customers were forced to leave a bowling alley in Stafford when part of the ceiling collapsed as rain poured in. Players were also led off the pitch at Coventry City's game against Swansea at the Coventry Building Society Arena on Saturday following a flash of lightning.

  National Grid reports power cuts in 10 post code areas, external across Coventry, Worcester and Stafford and the Environment Agency (EA) has said there are concerns over flooding, external in Staffordshire.

  A lightning strike on The Avion in Walsall on Saturday night led to the building being evacuated

  Further heavy rain and thunderstorms are forecast for various parts of the UK in the coming days. The EA has issued a flood warning, with Saredon Brook at Wedges Mills, in Cannock at risk of bursting its banks as water levels continue to rise. In Stafford on Saturday, customers were forced to leave Tenpin's bowling centre after part of the roof fell through. Customers reported on Facebook that water was leaking through the ceiling near the children's soft play area. West Midlands Fire Service said it sent 15 firefighters to The Avion in Aldridge, after lightning set off the pub's alarms at about 19:00 BST. Customers were evacuated from the pub and there were no injuries, said police. Elsewhere in the town, doorbell footage captured lightning striking a tree.

  The rain caused flash flooding in Codsall on Saturday afternoon

  Streets in Rugby and Birmingham were also affected by the floods, as drivers attempted to get their cars through the water. At the Coventry City match against Swansea, players were led temporarily off the pitch in the 63rd minute, because of a thunderstorm overhead. During bad weather on Friday night, the Ross-on-Wye branch of Morrisons was forced to close after part of its roof caved in and rainwater poured into the shop.

  Drivers in parts of Birmingham have already been tackling flooded roads

  In Longton, Stoke-on-Trent, a crowdfunding campaign has been set up to help an elderly woman whose house was struck by lightning. Hayley Johnson said her 79-year-old neighbour was made homeless after a lightning strike set her roof on fire. She said the house had then also been flooded, with roof needing to be completely replacing. Ms Johnson added that her insurance company would not pay for repairs as lightning strikes were not covered in the policy.

  Drivers in Rugby have been attempting to drive through the flooded streets

  Staffordshire County Council’s Highways team has delivered 300 sandbags to help protect 10 homes in the Upper Tean area of Staffordshire Moorlands. Roads have also been flooded in Cheadle and Blythe Bridge. The rising water levels damaged roads by raising surfaces, cracking asphalt and depositing mud and debris across carriageways, said the council. Moddershall Oaks Spa, in Stone, was forced to shut due to flash flooding and mudslides throughout the property. It remained shut on Sunday, according to a statement published on its Facebook page.

  Draycott Road in Upper Tean has been damaged by the floodwaters depositing mud and debris in their wake

