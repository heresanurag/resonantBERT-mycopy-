title: Indonesia celebrates Independence Day with greasy pole contest - BBC News
date: '2019-08-19'
section: General
url: http://www.bbc.co.uk/news/world-asia-49397048
content: |-
  Indonesians take part in a greasy pole climbing contest - a tradition that dates back to Dutch colonial days.

  Indonesians have been taking part in a greasy pole climbing contest - a tradition that dates back to Dutch colonial days.

  Hundreds of participants climb 174 slippery poles to collect prizes at the top.
