title: 'Olivia Pratt-Korbel: CCTV shows moments before girl, 9, shot dead - BBC News'
date: '2022-08-24'
section: General
url: http://www.bbc.co.uk/news/uk-62667553
content: |-
  The BBC obtains footage where shots can be heard in the killing of nine-year-old Olivia Pratt-Korbel.

  The BBC has obtained CCTV footage showing the moments leading up to the fatal shooting of nine-year-old Olivia Pratt-Korbel.

  Four gunshots can be heard in the video which the BBC understands police have already seen.
