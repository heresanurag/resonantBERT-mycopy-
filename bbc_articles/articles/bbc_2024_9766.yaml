title: 'Louise Thompson: Former Made in Chelsea star reveals she had stoma bag fitted
  - BBC News'
date: '2024-04-09'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-68768862
content: |-
  The former Made in Chelsea actress, 34, said it 'saved her life' after battling with ulcerative colitis.

  Made In Chelsea star Louise Thompson has revealed she has been fitted with a stoma bag, saying it "saved her life" after years of battling with ulcerative colitis.

  In a post on Instagram, the actress, 34, said the bag was "the price I pay for good health".

  She told her followers the announcement was "not glamorous", but that she didn't want to keep it hidden forever.

  Ulcerative colitis is a condition where the colon and rectum become inflamed.

