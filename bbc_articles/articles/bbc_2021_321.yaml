content: |-
  Boris Johnson says it's more important than ever to be vigilant in following rules and staying home.

  PM: We are enforcing lockdown with increasing toughness

  Sky News's Sam Coates asks whether, if the new variant is more dangerous, it is right that more people are "out and about" during the current lockdown than the first one last year. The PM says that "we are enforcing the law very strictly with increasing toughness", meaning increased fines to dissuade risky behaviour. "It depends on everybody doing the right thing and avoiding transmission," he says, adding that is what will be more effective than police action. On why the new variant may be transmitting more readily, Sir Patrick Vallance says it is not believed the new variant has a higher viral load, meaning people "shed more virus". He suggests it may be other factors that make it more transmissible. On the current infection rate, Chris Whitty says that while infections are slowly going down "it is at a very, very high level". He says that among some age groups - including those 20 to 30 - infections may still be increasing. And on hospitalisations, he says that they are "broadly flat" for the UK as a whole, but there are variations between regions. "That peak is not yet definitely going down yet," he says. Deaths will be delayed further with the peak expected in the future, he adds. Video caption: Infection level 'very, very high' and 'extremely precarious' - Prof Whitty Infection level 'very, very high' and 'extremely precarious' - Prof Whitty
