content: |-
  Four members of the same family were among those who were killed in the crash on Sunday.

  Man bailed over A61 crash that killed six people

  Shane Roller and his partner Shannen Morgan were killed alongside two of their daughters Rubie, nine, and Lillie, four

  A man arrested on suspicion of causing death by dangerous driving after six people were killed in a crash has been released on bail. Nine-year-old Rubie Morgan-Roller and Lillie Morgan-Roller, four, died alongside their mother Shannen Morgan and father Shane Roller when their car collided with a motorbike. Christopher and Janine Barton, who were both travelling on the motorcycle, also died in the crash on the A61 between Barnsley and Wakefield on Sunday afternoon. On Wednesday, police arrested the man and appealed for anyone who saw a grey Porsche 911 being driven in the area around the time of the collision to come forward.

  Christopher Barton, 56, and Janine Barton, 48, were killed in the collision on the A61

  In an update earlier, West Yorkshire Police said the man had been released on bail pending further enquiries. The Bartons' BMW S1000 XR motorbike and the family's Ford Focus collided on the road at about 15:55 BST. Mr Roller and his partner, from Barnsley, had another daughter, aged 11, who was not with them at the time of the crash. More than £375,000 has been raised for the surviving daughter of Ms Morgan, 30, and her partner after a GoFundMe campaign was set up by family friend Paul Hepple. In an update posted on the page, Mr Hepple said: "We are absolutely overwhelmed by the incredible generosity and love that has poured in from around the world."

  The crash happened on the A61 on Sunday afternoon

  He added the youngster was being "incredibly brave, showing strength beyond her years. "She’s surrounded by love and support, and we’re all doing our best to keep her spirits high with fun activities and distractions. "Whether it’s playing games, watching her favourite shows, or simply spending time with her family and friends, we are all committed to helping [her] find moments of joy." Mr Hepple also thanked "those who have offered professional advice and support". He added: "Your guidance has been invaluable in helping us navigate this situation." Follow BBC Yorkshire on Facebook, external, X (formerly known as Twitter), external and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external
