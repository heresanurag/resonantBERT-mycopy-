  Police and MI5 officers were so concerned about Amman that they held an emergency meeting to discuss the prospect of arresting the recently released terrorist.

  However, HMPS decided not to recall him to prison. Amman was put under round-the-clock armed surveillance instead.

  One of his two victims had to be placed into an induced coma for five days, the police watchdog report revealed after the inquest.

  The Independent Office for Police Conduct (IOPC) said the man, who the inquest previously heard feared bleeding to death, is now recovering from his injuries.

  In a statement read out in court, he thanked passers-by who came to his aid after overhearing the phrase "he's not going to make it" in an ambulance.

  "They cut off my clothes, they saved my life. I will never forget," he said.

  Another member of the public required surgery to remove fragments of glass from her leg after a police bullet shattered a glass panel, the IOPC said.

  The senior investigating officer on the case denied suggestions from the terrorist's family that police should have intervened and that the undercover operation was a "massive failure", saying instead the Met's actions on the day he struck prevented further tragedy.

  The inquest previously heard there had been concerns about the 20-year-old's imminent release from HMP Belmarsh on 23 January 2020, part-way through a 40-month sentence for preparing and engaging in acts of terrorism.

  A request to extend Amman's sentence was turned down as the offence he was jailed for could not justify it. The law has since been changed.

  The 20-year-old was shot dead on Streatham High Road

  The inquest, held over three weeks in central London, heard Amman was considered "one of the most dangerous individuals" investigated by police and MI5.

  Jurors heard evidence he maintained an extremist mindset throughout his time in prison.

  He was said to have plotted to kill the Queen, pledged allegiance to so-called Islamic State, and wanted to commit atrocities.

  While in prison, Amman was also said to have revelled in his perceived notoriety as a young terrorist, and was said to have mixed with other high-profile offenders including the brother of Manchester Arena bomber Salman Abedi.

  Jurors concluded the decision not to search Amman's probation hostel, or search him in person, did not amount to a missed opportunity.

  Amman was placed in a bail hostel in Streatham after his release from prison

  The coroner Mr Justice Hilliard, at the inquest's conclusion, said: "Amman was prepared to risk his life... In stark contrast the Metropolitan Police surveillance teams were prepared to put themselves in harm's way.

  "They are all to be commended for their bravery, and they are owed a considerable debt of gratitude for their bravery."

  One of the armed surveillance officers who shot dead Amman told the Royal Courts of justice how he "immediately feared for his life".

  "I thought he was going to stab me and kill me or certainly seriously injure me," he said.

  Dean Haydon, for the Met's Specialist Operations, said: "I want to pay tribute to the courage shown by the officers in relation to how they pursued the attacker but also stopped anybody else coming to harm.

  "This demonstrates the true professionalism shown by them but also their bravery in the face of danger."

