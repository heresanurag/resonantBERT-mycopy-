content: |-
  Sudesh Amman could have been stopped from stabbing two people in south London, an inquest finds.

  Amman was jailed for 40 months in 2018 for preparing and engaging in acts of terrorism

  A terror attack might have been stopped had a convicted criminal been recalled to prison after buying items used to fake a suicide belt, an inquest found.

  Sudesh Amman was killed by surveillance officers following the attack in Streatham, south London, last February.

  The 20-year-old convicted terrorist stabbed two people 10 days after being released from jail, one of whom was put in an induced coma. Both survived.

  HM Prison and Probation Service could have recalled him to jail, jurors said.

  The inquest jury at the Royal Courts of Justice retired for 11 hours before returning a conclusion of lawful killing.

  On 31 January 2020, two days before the attack, undercover officers spotted Amman buying four small bottles of Irn-Bru, kitchen foil and parcel tape from Poundland - items they feared could be used to make a hoax suicide belt.

