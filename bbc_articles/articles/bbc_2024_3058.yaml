title: Nottingham tram 'legends' help push car from tracks - BBC News
date: '2024-02-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-68384172
content: |-
  Footage shows passengers helping to remove a broken down car that was blocking tram tracks.

  Footage has been shared of the moment customers jumped into action to help move a broken down car that was blocking tram tracks.

  Passengers were alerted to the hold-up at Noel Street in Nottingham on Thursday evening.

  Several then hopped off and helped the tram driver move the vehicle to safety.

  Tram operator Nottingham Express Transit (NET) praised the "legends" on social media as it shared the video, adding: "On behalf of everyone travelling this evening, thank you."

