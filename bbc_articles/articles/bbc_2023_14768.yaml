title: Kim Jong Un enters Russia on armoured train for meeting with Putin - BBC News
date: '2023-09-12'
section: World
url: http://www.bbc.co.uk/news/live/world-66757311
content: |-
  The North Korean ruler is on an armoured train heading to meet Vladimir Putin, who's in Russia's far east.

  Earlier today Kim Jong Un disembarked his train in Russia and was greeted in the Primorsky region Image caption: Earlier today Kim Jong Un disembarked his train in Russia and was greeted in the Primorsky region

  As Kim Jong Un's train makes its way across eastern Russia, we're pausing this page.

  But we will be back as soon as we know he's about to meet Putin and will bring you the latest updates here.

  This page was written in London by me, Ali Abbas Ahmadi and Jacqueline Howard with Rob Corp and Paul Gribben.
