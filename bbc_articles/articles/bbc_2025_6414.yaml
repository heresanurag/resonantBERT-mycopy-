  In a statement released on Sunday, the PRCS said: "We have been informed by the International Committee of the Red Cross that PRCS medic Assad al-Nassasra is being held by the Israeli occupation authorities. "His fate had remained unknown since he was targeted along with other PRCS medics in Rafah." It added: "We call on the international community to pressure the occupation authorities to immediately release our colleague, medic Assad, who was forcibly abducted while carrying out his humanitarian duties." A spokeswoman for the PRCS told the New York Times Mr Nassasra had worked for the PRCS for 16 years, and was married with six children. An ICRC spokeswoman said it had informed Mr Nassasra's family and the PRCS after receiving information about his whereabouts. It noted: "The ICRC has not been granted access to visit Assad al-Nassasra. The ICRC has not been able to visit any Palestinian detainees held in Israeli places of detention since 7 October 2023." The Israeli military launched a campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 were taken hostage. More than 50,940 people have been killed in Gaza since then, according to the territory's Hamas-run health ministry.
