title: 'Magherafelt: Man in court accused of murdering Sophie Watson - BBC News'
date: '2024-08-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c20r9nx10gwo
content: |-
  Sophie Watson was found dead in her home in Ashgrove Park in Magherafelt on Sunday.

  A 43-year-old man has appeared in court in Londonderry charged with the murder of a woman in in Magherafelt. Sophie Watson, who was 57, was found dead at a property in Ashgrove Park in Magherafelt on Sunday. She had sustained a number of stab wounds. Andrzej Pajaczkowski, 43, from Ashgrove Park, Magherafelt, appeared via video link at Londonderry Magistrates’ court on Wednesday facing one charge of murder.

  He was dressed in a grey tracksuit and had the aid of a translator for the hearing. A defence solicitor said the defendant, who is Polish, had been in the jurisdiction for more than 20 years and had a working knowledge of English. The accused, who was in Musgrave serious crime suite, confirmed his date of birth and that he understood the charge. The solicitor said there would be no challenge to the connection to the charge by police, nor would there be a bail application. The lawyer said the defendant had replied "not guilty" when the murder charge was put to him. He said it would be a complicated and complex case. The defendant was remanded in custody until 18 September.
