  A growing number of voices within the social conservative movement have started to say the same: that by playing to the middle on abortion, Trump may lose must-win voters, without actually attracting anyone new. “The frustration for pro-lifers is that Trump is saying things he thinks might ultimately reach more moderate voters, which frankly is not going to work,” said Matt Staver, founder and chairman of the Florida-based anti-abortion group Liberty Counsel. “And in doing that you’re causing consternation among other voters who are otherwise with you. There’s no point for him engaging in this.” There is no indication that Trump is facing any wide-scale exodus of social conservatives from his party, and both Mr Staver and Ms Hawkins said they would still be casting their ballots for Trump. But in an election that could hinge on a narrow slice of voters, in just a handful of states, some experts say Trump’s abortion wavering could still cost him the election. John Feehery, a Republican strategist, estimated that some 80% of white evangelical Christians - who make up about 14% of the American electorate - need to turn out for Trump to deliver him a win. “I don’t think there’s a danger of white evangelicals voting for Harris, I think there’s a real danger of them not voting,” Mr Feehery said, adding that “10,000 votes” could be enough to tip the scales.

  Former President Trump faces an electorate that broadly supports abortion access

  That risk could explain the reticence of most anti-abortion leaders to talk publicly about abandoning the Republican candidate. Indeed, some in the movement have expressed frustration with Ms Rose’s position, saying that while Trump is not the ideal candidate, he is still better for their cause than any Democratic opponent. Ms Hawkins of Students for Life has begun to focus her messaging, increasingly, on Harris, telling followers that the harm her administration could do - in the number of abortions alone - would eclipse any missteps by Trump. “I know we’ll be able to work with his administration,” she said. “When you believe, as pro-life activists do, that babies are dying that have a right to be born, I don’t feel I can morally take a position of sitting this out.” But Ms Rose has shrugged off any criticism that her position may inadvertently assist Harris, and her decidedly pro-choice agenda. For her, good enough is not good enough when it comes to abortion, and to Donald Trump. “I know it’s painful for a lot of you guys to hear this, people that want to go out and vote cheerfully for Trump because Kamala Harris is such a disaster... but we have to tell the truth,” she told followers the morning after the debate. “Abortion is the intentional killing of an innocent child," she said. "We need to oppose it loudly.”
