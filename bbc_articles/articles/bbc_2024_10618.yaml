title: CCTV images of Bournemouth beach murder suspect issued - BBC News
date: '2024-05-27'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-dorset-69064850
content: |-
  A 34-year-old woman died at the scene in Bournemouth and another woman was seriously injured.

  Dorset Police released CCTV images of the suspect on Sunday evening

  Police investigating the murder of a woman stabbed to death on a beach have released a CCTV image of the suspect. A 34-year-old woman, from Poole, died at the scene on Durley Chine Beach in Bournemouth shortly before midnight on Friday. Another woman, 38, was seriously injured and is receiving treatment in hospital, Dorset Police said. A 17-year-old boy, from Lancashire, who was arrested on suspicion of murder remains in custody.

  A woman died at the scene and another was taken to hospital with serious injuries

  Det Supt Richard Dixey, of the major crime investigation team, said: "We are now in a position to issue CCTV images of the suspect." He urged anyone who was in the area of Durley Chine beach during the night from Friday to Saturday - and may have seen the person pictured or anything unusual - to contact the force. "Similarly, anyone who was in the area of Durley Roundabout, West Cliff Gardens, Durley Gardens or West Cliff Drive during that night might have vital clues that could help us," he said. Earlier, police sought to "reassure" residents and visitors they were "investigating at pace" the "horrendous incident". An online portal, external has been set up so people can submit information. On Saturday, people arriving at the beach were turned away by police due to an extensive cordon. Officers guarding the cordon were unable to say how long it would remain in place, during what would normally be a busy Bank Holiday weekend.

