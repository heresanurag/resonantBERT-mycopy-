title: Grandad tackled Southport knifeman after hearing screams - BBC News
date: '2024-08-07'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cvg5lxke71zo
content: |-
  Johnathan Hayes was stabbed in the leg after he intervened in the attack.

  There was a major police response after the attack on children at a Southport dance event on 29 July

  A businessman has told of how he confronted a knifeman during the Southport attack after hearing children's screams coming from the dance class nearby. John Hayes, 63, was one of the first people on the scene of the stabbings in the Merseyside town on 29 July, in which three young girls were killed. Grandfather Mr Hayes, who was stabbed in the leg as he grappled with the attacker, said he was "hugely upset" he could not have done more to protect the children. "I don't know to what extent I've interfered or helped or delayed," he told BBC Radio 4's Today programme.

  Mr Hayes, who has an office in the same complex as the studio on Hart Street, said he "ran the full length of our building" when he heard screaming. He said he "opened the door and was confronted by a girl on the floor who looked badly injured, she had bloodstained clothing, she was motionless". He said he saw "the guy in front of me with a knife" and that "the knife had blood on it". "When I opened the door he was standing there, he had a hoodie on, but most of his face was concealed. "We locked eyes on each other and he looked pretty menacing," he said. "I described him at the police station as like a crouching tiger. "It registered immediately that he shouldn't have been there. "The next minute he's coming at me and then we had a bit of a grapple. He was flailing this knife around in front of me and I was trying to get it off him. "I couldn't tell you at what stage I realised I'd been stabbed but I was stabbed in my upper thigh, there was this bolt of pain and I fell backwards."

  Businessman John Hayes tackled the knifeman after hearing screams coming from the dance class

  Mr Hayes said he kicked out at the attacker, who then fled. One of Mr Hayes' colleagues then managed to close the doors. "My overriding thought at the time was not for myself," he said. Mr Hayes said he was recovering well from his injury, which left him in a critical condition and in need of major surgery. He said it would take time to come to terms with what he had witnessed.
