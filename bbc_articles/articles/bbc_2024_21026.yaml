  • None Aunt tells of 'sweet and gentle' girl killed in Southport attack "The last of couple of days I had the stark realisation that I was lucky. "It only narrowly missed my femoral artery and I've been told if it had caught that I probably wouldn't be here. "The blade went into my leg 12cm. It's not what I would call a superficial wound but there's no reason why I wouldn't make a full recovery. "I've not even begun to process the horror show that I've seen, it's just going to take me a while to process that."

  Elsie Dot Stancombe, seven, Alice da Silva Aguiar, nine, and Bebe King, six, died in the attack

  Primary school children Bebe King, six, Elsie Dot Stancombe, seven, and nine-year-old Alice da Silva Aguiar were killed during the attack, which also saw nine other children, Mr Hayes and yoga teacher Leanne Lucas seriously injured. Ms Lucas, 35, was leading the Taylor Swift-themed party and is understood to have tried to protect the children from the attack. On Thursday, Axel Rudakubana, from the Lancashire village of Banks, appeared at Liverpool Crown Court charged with three counts of murder and the attempted murder of eight children and two adults. The judge ruled that although he was 17 at the time, the youth could be named publicly. The former Formby Range High School pupil, who turned 18 this week, was remanded in custody ahead of a further appearance in October. An inquest into the deaths of the three girls was earlier opened and adjourned.

  Mr Hayes said he is now trying to focus "on the positives" and that he does not believe the riots happening around the country are a direct response to the incident in Southport. "The vigil last night, local tradesmen rallied round to help clean up the local mosque that was damaged. Those are the positive to take out of this," he said. "People will come to terms with it and I think Southport will be keen to distance itself from the trouble that sparked riots around the country. "I don't think the trouble has anything to do with the Southport stabbings. There appears to be a strong undercurrent of discontent for sometime about the levels of immigration and this is just a trigger but I don't think it's the root cause. "There's an awful lot of unhappy people in this country who want something to be done, I don't think this problem is going to go away until the government starts to address that."
