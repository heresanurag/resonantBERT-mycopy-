title: 'SAG Awards red carpet: Millie Bobby Brown, Mikey Madison and Selena Gomez
  - BBC News'
date: '2025-02-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy9dqvy4974o
content: |-
  Millie Bobby Brown, Mikey Madison and Timothée Chalamet were among the stars posing for pictures.

  Emilia Pérez star Zoe Saldaña won best supporting actress, a category she has dominated this awards season

  Millie Bobby Brown, Zoe Saldaña, Mikey Madison and Timothée Chalamet were among the stars walking the red carpet ahead of the Screen Actors Guild (SAG) Awards on Sunday. Black was very much the new black as a huge number of the nominees wore dark dresses and tuxedos as they posed for pictures in Los Angeles. But plenty of stars also added a splash of colour to their outfits ahead of the ceremony, which celebrates the best television and film performances of the last year and is voted for by fellow actors. Here are just a few of the film and TV stars who posed for photos before the ceremony got under way.
  • None How to watch the awards season films

  Demi Moore was named best actress for her performance in body horror The Substance

  Timothée Chalamet won the best actor prize for his portrayal of singer Bob Dylan in biopic A Complete Unknown

  Previous SAG winner Jamie Lee Curtis was nominated for her role opposite Pamela Anderson in The Last Showgirl

  Kieran Culkin cemented his supporting actor frontrunner status for his performance in A Real Pain

  Ariana Grande was nominated for playing Glinda the Good Witch in musical Wicked

  Selena Gomez was representing both her film Emilia Pérez and TV series Only Murders in the Building

  Anora star Mikey Madison was nominated for best actress, a prize she won at last week's Baftas

  The Brutalist's Adrien Brody (pictured with partner Georgina Chapman) was nominated for best actor

  Colman Domingo was also up for best actor for his leading performance in Sing Sing

  Wicked star Jeff Goldblum walked the red carpet with his wife Emilie Livingston

  Hollywood A-lister Harrison Ford appeared to hide from photographers by staying behind a curtain...

  ...but he later overcame any stage fright and emerged on the red carpet, smiling for pictures

  Best supporting actress nominee Danielle Deadwyler was recognised for her role in The Piano Lesson

  Queer star Daniel Craig also appeared, days after Amazon made headlines for taking creative control of the James Bond series

  Veteran actress Jane Fonda was the recipient of this year's SAG lifetime achievement prize

  Cynthia Erivo was recognised for her performance in Wicked, the film with the most SAG nominations this year

  Pamela Anderson was nominated for best actress for The Last Showgirl, which has seen her career enjoy a resurgence

  Monica Barbaro was nominated for her portrayal of Joan Baez in A Complete Unknown

  Jeremy Strong previously won a SAG Award for Succession but was nominated this year for his role in The Apprentice

  Edward Norton (pictured with wife Shauna Robertson) was nominated for playing Pete Seeger in A Complete Unknown

  Conclave ultimately won the top prize best ensemble, an award which was collected by its British star Ralph Fiennes

  Gillian Anderson, who presented an award, is set to star in the forthcoming film adaptation of best-selling book The Salt Path

  Lily Gladstone was one of the film acting winners in 2024, but this year was nominated for TV series Under the Bridge

  Kathy Bates was nominated for best TV drama actress for her performance in Matlock

  Anora star Yura Borisov was nominated for best supporting actor

  Elle Fanning also appears in A Complete Unknown, which was among the nominees for best film ensemble

  Sheryl Lee Ralph is part of the cast of Abbott Elementary, which was nominated for comedy ensemble cast

  Anna Sawai won best TV drama actress for Shogun, which was also a big winner at September's Emmys

  Stranger Things and Enola Holmes star Millie Bobby Brown also posed for pictures ahead of the ceremony, where she presented an award

  Colin Farrell won best actor in a limited series for his leading role in Batman spin-off The Penguin

  Jodie Foster was nominated in the limited TV series category for True Detective: Night Country

  Bridgerton star Nicola Coughlan was nominated for best TV drama actress

  Andrew Scott was nominated for his performance in Ripley

  British actress Jessica Gunning won best actress in a limited series for her performance in Baby Reindeer

  Baby Reindeer was created by Scottish star Richard Gadd, who was nominated for best actor in a limited series

  Quinta Brunson, who created and stars in Abbott Elementary, was up for best comedy actress

  The Bear's Jeremy Allen White was nominated for best comedy actor

  Ted Danson (with wife Mary Steenburgen) was nominated for comedy series A Man on the Inside
