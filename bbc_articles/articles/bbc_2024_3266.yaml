title: 'Watch: Volcanic lava creeps across frozen Icelandic peninsula - BBC News'
date: '2024-02-08'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-68237950
content: |-
  Lava and smoke is spewing from a new eruption in the south west of the country.

  No text updates - but you can keep an eye on the eruption

  Hello, we're bringing you a live stream of a volcano erupting in Iceland for the third time since December. We've seen images of molten rock shooting out of faults in the ground in the Reykjanes peninsula and a steady stream of lava moving across the landscape. According to local media, it has now flowed over a pipe supplying hot water to the region, and work is under way to replace it. The nearby town of Grindavík, which normally has 4,000 residents, was evacuated in mid-January. We won't be providing live text updates, but you can watch the latest scenes from Iceland by clicking the Play button at the top of this page.
