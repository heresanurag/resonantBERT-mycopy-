content: |-
  The coastguard said it was "shocking" how long plastic could "survive" in the sea.

  The "almost new" looking bottle was washed up on Brean Beach during last week's high tides

  A plastic washing-up liquid bottle that is at least 47 years old has been found on a beach in Somerset.

  The Fairy Liquid bottle was washed up on Brean Beach during last week's high tides. Up to 400 tonnes of rubbish ended up on the beach.

  Burnham Coastguard said: "This bottle still looks almost new - it's shocking how long rubbish can survive."

  Marked 4d off, the bottle dates back to before decimalisation in Britain in 1971.

  "There was about 300 to 400 tonnes of stuff that had been washed up overnight," said Dave Welland, coastguard station officer.

  "I've been part of the coastguard for years but I can't remember seeing that amount of rubbish on the beach before. It was mental."

  Dave Welland said he could not remember seeing "that amount of rubbish" on the beach

  More than eight million tonnes of plastic enter the world's oceans each year.

  The damage to marine wildlife was highlighted on the BBC's Blue Planet II, which helped to provoke a range of measures from the government and community groups.
