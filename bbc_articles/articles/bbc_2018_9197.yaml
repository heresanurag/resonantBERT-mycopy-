  Puma later apologised for its use of language, telling the Independent: "We want to make clear that Puma in no way endorses or intends to glamorise drug culture."

  One Twitter user linked the Nike and Puma incidents, tweeting: "We've had the Puma "Drug House" promotion and now Nike are using a black guy to promote a balaclava with straps and pockets.

  "Where there's blood there's money."

