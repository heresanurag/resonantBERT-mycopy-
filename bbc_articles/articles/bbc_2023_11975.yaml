content: |-
  The former US president turned himself in at the notorious Fulton County Jail.

  Former US President Donald Trump turned himself in at the notorious Fulton County Jail in Atlanta, Georgia. He was booked on charges of trying to overturn his 2020 election loss in Georgia and had his mugshot taken just like his 18 alleged co-conspirators.
