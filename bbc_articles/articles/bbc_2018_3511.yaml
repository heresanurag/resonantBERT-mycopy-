id: bbc_2018_3511
title: 'Russia election: How Vladimir Putin''s win unfolded - BBC News'
date: '2018-03-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-43454154
content: |-
  Vladimir Putin said voters had "recognised the achievements of the last few years".

  Vladimir Putin will lead Russia for another six years, after securing an expected victory in Sunday's presidential election.

  With almost all the ballots counted, he had received more than 76% of the vote, the central election commission said.
