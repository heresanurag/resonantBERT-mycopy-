title: 'London murders: Fact-checking the statistics - BBC News'
date: '2018-04-05'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-43643548
content: |-
  BBC London investigates how safe the capital really is.

  There is an alarming rise in the number of murders in the capital, yet the mayor's office says London is still one of the safest cities in the world.

  Helen Drew has been taking a closer look at the crime figures, after a claim London has overtaken New York for murders for the first time in modern history .
