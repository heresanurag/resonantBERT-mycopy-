title: BBC correspondents answer your questions on week three of Israel-Gaza war -
  BBC News
date: '2023-10-23'
section: Middle East
url: http://www.bbc.co.uk/news/live/world-middle-east-67194369
content: |-
  Our team of reporters around the region are answering your questions after more than two weeks of conflict.

  Elaine M Dewhirst wants to know why field hospitals can't be set up in neutral areas for the seriously wounded people of Gaza?

  The only available "neutral" area would be Egypt, which shares a border with Gaza. But President Sisi has made it clear he won’t allow Palestinian refugees (aside from those who hold other foreign passports) into Egypt.

  He has said they must stay "steadfast" and "remain on their land".

  Egyptians have strong sympathy with the Palestinian national cause and so he is partly playing to popular fears that Palestinians would be driven off their land and never allowed to return. This concern has a deep resonance with a core historical issue of the conflict - Palestinian dispossession.

  But in practice, the Egyptian president has spent years trying to stabilise the Sinai peninsula amid an insurgency there by armed Islamist militias, so he doesn't want an uncontrolled flow of people into the Sinai putting pressure on services and potentially overwhelming his security forces.

  Sisi doesn't like Hamas but he has tolerated its presence and coordinated with it in Gaza when it's been in his own security interests, while also backing the Israeli-led blockade of the group.
