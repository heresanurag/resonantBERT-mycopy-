title: 'Cyclone Idai: ''People didn''t stand a chance'' - BBC News'
date: '2019-03-19'
section: General
url: http://www.bbc.co.uk/news/world-africa-47613956
content: |-
  Drone footage shows the devastation caused by Cyclone Idai in Mozambique.

  Drone footage shows the devastation caused by Cyclone Idai in Mozambique’s city of Beira.

  At the same time large devastation has been seen in the east and south of Zimbabwe.

  It's feared that hundreds of people may have died.
