id: bbc_2022_17144
title: 'NHS Wales: Doctors question their future in staffing shortage - BBC News'
date: '2022-12-06'
section: General
url: http://www.bbc.co.uk/news/uk-wales-63864249
content: |-
  Doctors are thinking about quitting because they cannot deliver the care they want, a union says.

  "If I can't deliver the cancer care that I need to, the question is why I'm here in the first place."

  Consultant urologist Tim Appanna said staff shortages mean “inevitably patient care is going to suffer”.

  He called it "unbelievably frustrating", while another consultant said the impact on her patients was "heart-breaking".

  Staff morale is at "rock bottom", a doctors' union said, with many thinking about leaving the profession.

  The Welsh government said it was working on a plan to deal with the pressures.
