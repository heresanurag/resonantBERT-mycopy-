content: |-
  Marseille sign Denmark midfielder Pierre-Emile Hojbjerg from Tottenham on an initial loan deal for the coming season.

  Marseille have signed Denmark midfielder Pierre-Emile Hojbjerg from Tottenham on an initial loan deal for the 2024-25 season.

  The transfer includes what Spurs say, external is an "obligation that would see the move become permanent" for a fee believed to be about £17m.

  Hojbjerg joined Tottenham in 2020 in a £15m deal from Southampton, when Jose Mourinho was in charge of the north London club.

  He made 39 appearances last season but only 10 of those were starts as manager Ange Postecoglou favoured Yves Bissouma and Pape Matar Sarr in central midfield.

  Hojbjerg had entered the last year of his contract with Tottenham and would have been available on a free transfer in 2025 if fresh terms were not agreed.

  Spurs have strengthened their midfield this summer with the signings of Archie Gray from Leeds, and Lucas Bergvall from Swedish club Djurgardens.

  Marseille have been on a recruitment drive since appointing former Brighton manager Roberto de Zerbi.

  Forward Mason Greenwood has joined from Manchester United, and midfielder Ismael Kone completed a move from Watford this month.

  They are also reportedly interested in Arsenal striker Eddie Nketiah.
