title: Two babies die in 'tragic accident' in Wildmill, Bridgend - BBC News
date: '2017-09-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-41372554
content: |-
  The baby boys, who were two of a set of triplets, were found not breathing at a house in Bridgend.

  The two baby boys were not breathing at the address in Wildmill, Bridgend, police said.

  Two five-month old baby boys have died after they were found not breathing at a house in Bridgend.

  Emergency services were called to an address in the Wildmill area of the town at 10:05 BST on Saturday.

  The brothers, who were two of a set of triplets, were taken to the Princess of Wales Hospital where they were later pronounced dead.

  South Wales Police said the deaths were not being treated as suspicious, but as a tragic accident.

  Inquiries are continuing into the cause of the deaths.
