title: Bodycam footage shows arrest of suspected Trump gunman - BBC News
date: '2024-09-17'
section: General
url: http://www.bbc.co.uk/news/videos/c1jddyrp0glo
content: |-
  Footage shows the moment Ryan Wesley Routh, 58, is taken away by officers.

  Bodycam footage released by Martin County Sheriff's Office shows the moment the suspected Trump gunman, Ryan Wesley Routh, is arrested.

  Routh, 58, is charged with federal gun crimes - possession of a firearm by a convicted felon and possession of a firearm with an obstructed serial number.

  Trump was unharmed after being rushed to safety. This is the second apparent attempt on his life in two months.
