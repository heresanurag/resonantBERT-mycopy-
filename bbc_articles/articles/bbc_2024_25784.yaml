content: |-
  Storm Ashley could cause gusts of up to 70-80 mph (113-129km/h) in some areas of Scotland.

  Scotland has experienced strong winds and stormy waters as Storm Ashley hits across the country.

  High winds are expected to impact the north, east and much of south Scotland until 09:00 on Monday.

  Gusts of 70mph (113km/h) have been felt in Tiree, while winds of 102 mph (164km/h) have been recorded at the Cairngorm weather station.
