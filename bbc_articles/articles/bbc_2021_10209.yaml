title: 'David Gomoh stabbing: Gang guilty of murdering NHS worker - BBC News'
date: '2021-08-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-58113038
content: |-
  David Gomoh managed to stagger back home before dying in front of his family.

  David Gomoh, who graduated with a marketing degree from London South Bank University, was stabbed at least nine times

  Four gang members have been convicted of the murder of a "charismatic and intelligent" NHS worker who was stabbed in the street in east London.

  David Gomoh, 24, was attacked as he talked on the phone to his girlfriend on 26 April 2020. He staggered back home and died in front of his family.

  He had no links to any gangs but was randomly targeted in Canning Town as part of a feud.

  His killers will be sentenced on 17 September.

  Vagnei Colubali, 22, from Cambridge, Mohammad Jalloh, 19, from Pinner, north-west London, and David Ture, 19, of no fixed address, were found guilty along with a 17-year-old Telford boy who cannot be named because of his age.

  Vagnei Colubali, Mohammad Jalloh, and David Ture (l-r) will be sentenced on 17 September, along with a 17-year-old

  Mr Gomoh's mother Marian said: "David's murder is without doubt the hardest thing my family and I have been through.

  "Nothing will bring back a life that was so full of promise and hope, a life that was brutally taken away from us; but we are grateful that now we can begin to mourn and build a fitting legacy for David."

  The four killers were all connected to a gang based in north Newham, the Old Bailey heard.

  Prosecutor Oliver Glasgow QC, said Mr Gomoh's death was part of a "petty but fatal game of one-upmanship" played out on the streets of London.

  "This was a ride out into enemy territory and they were hunting for someone, anyone, to attack".

  Mr Gomoh, who worked at St Barts hospital, was walking from his home in Custom House, east London, to go to the local supermarket.

  The four killers fled the murder scene in a stolen car

  His girlfriend heard the killers ask Mr Gomoh where he was from, followed by sounds of a scuffle.

  CCTV cameras on a bus captured the moment a stolen car - a Dodge Caliber - stopped beside Mr Gomoh and he turned to run.

  The killers were then driven away.

  During the investigation police found sketches by Ture, which revealed a "picture-book story" of the murder.

  The drawings found in Ture's bedroom showed a number of young men carrying out a stabbing in the area of Mr Gomoh's murder and the clothing worn by the defendants that night - elements of which helped identify some of the other killers.

  Police found DNA evidence on two pairs of sunglasses, one at the scene and another in the abandoned stolen car, linking the 17-year-old and Jalloh to the killing.

  Jurors heard Jalloh had two convictions for carrying knives and that Ture had previously pleaded guilty to wounding with a knife.

  Ture's "childish doodles" were found by the police in his bedroom drawer and showed the group at "Threemasons (sic) Road" - the location of the killing

  Ture also drew one of the gang members with an Armani man bag, which Colubali was seen wearing on CCTV

  The four defendants first attacked a separate man, who they chased with their weapons, but he got away, jurors heard.

  All four defendants were found guilty of conspiracy to cause grievous bodily harm with intent with regard to the earlier attack.

  Det Ch Insp Laurence Smith said; "The four defendants set out that night ready and armed for savage violence.

  "What they had not worked out was who their victim would be.

  "They did not know David, they did not care who he was, or whether he was involved in a rival gang.

  "He was simply a fair target in their petty game."

