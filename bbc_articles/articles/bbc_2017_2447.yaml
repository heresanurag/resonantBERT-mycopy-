id: bbc_2017_2447
title: Rio's iconic Maracana stadium abandoned - BBC News
date: '2017-02-05'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-38865941
content: |-
  Just months after the Olympics, a dispute over the condition of Brazil's Maracana stadium has erupted.

  The building has been damaged by looters and has lain empty as clubs and authorities argue over who should manage it.
