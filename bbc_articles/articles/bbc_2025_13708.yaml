  More than 8,300 family members of US citizens are ready for an interview in Afghanistan, with more than 11,400 others awaiting family reunification, according to US Department of State data shared by AfghanEvac. Mojo, who asked to be identified by his nickname, is one of the 200,000 Afghans who have already reached the US, because he worked directly for the US military. He is now a US citizen. His sister, however, remains in Afghanistan where she and her husband are "living in a hide and seek game", he says. They change their address and city every couple months in order to stay safe. They passed the background and medical checks for refugee resettlement, but like the others who spoke to the BBC, they became trapped when the process was paused in January. This latest order has made Mojo, who lives in Houston, Texas, and the rest of his family lose "all our hope completely" . "I wish that he would change his mind, make some exception, change the rules or take his order back and let people have a peaceful life," he said.

  The ban also affects Afghans who are not trying to reach the US for resettlement. Zarifa Ghafari is studying at Cornell University in New York state, but is currently in Germany for the summer with her young child. She said she began a "frantic" race back to the US on Thursday in order to continue her studies, before the start of the travel ban on Monday. The ban has put her under "immense pressure" and has made her feel "very vulnerable", the the 30-year-old former politician told the BBC. What makes it worse, she said, was that she regularly had to return to Germany every few months to maintain her residency status there too. Describing her situation as "precarious", she said she worried about how she could make her regular trips to Germany when the travel ban began. Shawn VanDiver, of AfghanEvac, said the ban broke a promise Americans had made to Afghans over the 20 years they were in the country. "This policy punishes people who escaped the Taliban, risked everything to support democracy, are already vetted, were told by the US government to wait," he wrote on social media platform X. "They're not threats. They're our allies - and they're being left behind." Meanwhile, many of those still in Afghanistan have other problems to contend with. As one Afghan man in Kabul told AFP news agency: "We don't even have bread, why are you asking me about travelling to America?"
