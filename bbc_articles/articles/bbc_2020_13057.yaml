id: bbc_2020_13057
title: 'Nagorno-Karabakh: ''We’ve lost an entire generation'' - BBC News'
date: '2020-11-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-54942864
content: |-
  There may be a peace deal, but both sides are counting the cost of the conflict in Nagorno-Karabakh.

  The battle for Nagorno-Karabakh was not only for land, but also for a sense of national identity, and pride.

  Something that generations of Armenian and Azerbaijani residents of this region have been willing to fight, and die for.

  After six weeks of war, gains and losses are being counted. But it's the loss of life on both sides that leaves the most painful legacy of all.
