title: Flamstead hawk attacking villagers may have to be euthanised - BBC News
date: '2025-03-22'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/crlx7xwx21go
content: |-
  Between 40 and 50 people have now been attacked, a council says.

  Hawk attacking villagers may have to be euthanised

  Roy Lambden captured the moment the bird attacked him on his home security system

  A hawk that attacked between 40 and 50 people may have to be euthanised, a council warned. Flamstead Parish Council said a falconer had been brought into the Hertfordshire village to try and catch the bird of prey which had been swooping at residents for several weeks. It said while the falconer was "extremely close" to catching the bird, attacks were now becoming more regular and taking place over a greater distance. The authority added sadly it was "getting close to the stage where we may have to euthanise the hawk".

  Glyn Parry has made a chinstrap out of a shoe lace to avoid losing another hat

  "We are acutely aware that the hawk's attacking is becoming more regular and the area in which it is attacking has widened", the council added. It believed the hawk was eating in the village and warned people not to feed it. "The hawk is not as hungry as it has been and would not feed at all from the falconer last night, despite having done so over the past few evenings," the council said. "This was always going to be a long process, and by feeding the hawk, that process is now taking much longer than anticipated. "If you are feeding the bird, or know of anyone who is, please ask them not to." It added the falconer was still confident they could catch the bird.

  The bird has been swooping down and attacking people in Flamstead for several weeks

  The council's update came after the bird took two woolly hats from the head of Flamstead resident 91-year-old Glyn Parry. A spokesperson for nearby Whipsnade Zoo confirmed the bird was not theirs, but said: "Birds of prey aren't actively hostile towards humans, but may attack if provoked or if they feel threatened if a person got too close." Hertfordshire Police has also advised people not to feed it and it was working with local experts to try and safely deal with the situation.

