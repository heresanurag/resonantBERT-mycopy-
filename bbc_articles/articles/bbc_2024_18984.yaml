content: |-
  Homes shook and ash covered the roads after an earthquake caused the Shiveluch volcano to erupt.

  A powerful 7.0 magnitude earthquake early on Sunday morning has triggered a volcanic eruption in the Kamchatka peninsula.

  The area surrounding the Shiveluch volcano, on the far-eastern coast of Russia, was covered in a layer of ash following the eruption.

  There were no reports of damage or injuries in the immediate aftermath of the quake.
