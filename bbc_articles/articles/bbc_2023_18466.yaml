  Colombia and Brazil destroy 19 illegal gold mining sites and equipment in the Amazon rainforest.

  Colombia and Brazil have destroyed 19 illegal gold mining sites and equipment in the Amazon rainforest.

  They were responsible for producing six million pesos ($1.5m) worth of the metal a month.

  The sites were also contributing to local river pollution, with around 100,000 grams of mercury per month, police said.
