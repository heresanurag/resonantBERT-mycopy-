title: 'Newspaper headlines: Schools misogyny ''surge'' and ''cheers for beers'' -
  BBC News'
date: '2025-04-18'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cgen5v9yx1xo
content: |-
  Saturday's front pages include a warning from teachers over racism and misogyny increasing in schools.

  Rachel Reeves says its would be "very foolish" for the UK not to engage with China

  The chancellor's thoughts on the importance of the UK's trade ties with China are the lead for the Telegraph. In an interview, Rachel Reeves was asked if she would be willing to engage less with Beijing to placate President Donald Trump - as she heads to Washington next week to discuss a trade deal with the US. Reeves' answer - the paper reports - was that it would be "very foolish" for the UK to "not engage" with the world's second biggest economy, external. The Telegraph surmises that her comments also show she is "determined" to mend fences with Beijing after the UK took control of British Steel from its Chinese owner. The Times reports that Labour's plans to deport rejected asylum seekers to "return hubs" overseas have been endorsed by the United Nation's refugee agency, external. The paper says the home secretary discussed paying countries in the Balkans to take the UK's failed asylum seekers with the head of the UNHCR last month. It quotes government sources as saying that the endorsement is "vital" given that the agency's objection to the Conservative government's Rwanda scheme led to it being ruled unlawful.

  Nicky Butt played in midfield for Manchester United between 1992 and 2004

  The i-paper is predicting that a mortgage price war may be about to start, external after several lenders cut their rates in recent days. It says President Trump's tariff plans - which are set to dampen the economy - and lower than expected inflation figures, have raised the prospect of several base-rate cuts for the Bank of England this year. A claim by a team of scientists that they have discovered a new colour, external, is reported by the Guardian. It is the result of an experiment in which US researchers had laser pulses fired into their eyes, the paper reveals. It says the team from the University of California, Berkeley, have shared an image of a turquoise square to give a sense of the colour - which they have called Olo - stressing though that it could only be experienced by laser manipulation of the retina. The Sun is reporting that the former England and Manchester United player, Nicky Butt, has been given a police caution for head-butting a security guard, external at his own birthday party in January. It says the guard was treated in hospital for facial injuries, and received an apology. "Nicky Head Butt" is the inevitable headline.

