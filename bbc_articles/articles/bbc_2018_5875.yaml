title: 'London''s moped crime hotspots revealed: Check your area - BBC News'
date: '2018-05-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-44045128
content: "High car insurance and the boom in delivery services such as Deliveroo have\
  \ increased the number of mopeds.\n\nMany offenders take advantage of people distracted\
  \ by their mobile phones\n\nThe number of offences carried out by criminals using\
  \ mopeds in London has increased by 30 times in five years.\n\nData obtained by\
  \ the BBC shows a jump from 827 offences in 2012 to more than 23,000 last year.\n\
  \nHigh car insurance premiums and the boom in delivery services such as Deliveroo\
  \ have increased the number of mopeds, an expert said.\n\nPolice insisted they had\
  \ not lost control of moped crime but \"there was more work to do\".\n\nDuring the\
  \ period covered by the figures, more than 40% of such offences happened in just\
  \ two boroughs.\n\nA Met Police superintendent said the surge in Camden and Islington\
  \ was \"disappointing\", but new measures were helping to reduce offending.\n\n\"\
  Moped-enabled crime\" describes offences carried out by people on mopeds or scooters,\
  \ including drive-by thefts of pedestrians' phones and bags.\n\nUse our tool to\
