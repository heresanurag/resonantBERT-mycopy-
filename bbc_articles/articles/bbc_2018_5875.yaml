  \ Since 2012, by far the most common type of crime has been theft and handling with\
  \ 30,387 offences - around three quarters of the total:\n\nDet Supt Caroline Haines,\
  \ who leads the operation tackling moped crime in Camden and Islington, was asked\
  \ if her team had a handle on the issue.\n\nShe said: \"Yes we do, absolutely. Yes,\
  \ there is a significant increase on last year overall, and that is very disappointing.\n\
  \n\"Since January we've deployed a number of new tactics that are now starting to\
  \ see dividends.\n\n\"But we're not done yet, and we're not complacent. We do understand\
  \ there's a lot more work to do.\"\n\nAn increased number of scooters and mopeds\
  \ on the streets has helped fuel the phenomenon\n\nShe said hotspots arose around\
  \ transport hubs, where commuters and tourists alike were often distracted as they\
  \ checked their mobile phones or looked up directions.\n\nA plentiful supply of\
  \ main roads leading in and out of London also provide easy escape routes for offenders.\n\
  \nDet Supt Haines said new tactics to tackle the issue include training more officers\
  \ in pursuing offenders on mopeds, using remote-controlled spikes to puncture the\
  \ tyres of suspects' bikes, and educating members of the public to be more aware\
  \ of their surroundings.\n\nShe also urged moped riders to make their vehicles theft-proof,\
  \ due to the number of stolen vehicles used to commit crimes.\n\nSorry, your browser\
  \ cannot display this map\n\nMap built using Carto. If you can't see the map, tap\
  \ or click here. The data for the City of London Police area is incomplete.\n\n\
  Kirat Nandra broke her ribs and her hand when she was hit by a moped as thieves\
  \ grabbed her bag\n\nKirat Nandra, 51, broke her ribs and hand and got concussion\
  \ when she was hit and dragged along a pavement by two people on a moped in September\
  \ 2017.\n\nShe was mugged on North Road, half a mile from Highgate Hill - the worst\
  \ street in London for moped crimes.\n\n\"I didn't actually know what had happened\
  \ to me. All I heard was my friend shouting my name, and I was being dragged,\"\
  \ she said.\n\n\"I remember looking up, and realising the handles of my bag had\
  \ got caught in the zip of my leather jacket. And I'd got tangled.\n\n\"It was so\
  \ quick, so nobody could do anything.\"\n\nMs Nandra suffered severe bruising after\
  \ being attacked by \"thugs\" on North Road\n\nMs Nandra managed to pull herself\
  \ free just before the moped swerved back on to the road in front of other traffic.\n\
  \nHer handbag, two phones, cash and bank cards were all taken.\n\nThe offenders,\
  \ who wore dark clothes and had their faces covered, have not been caught because\
  \ of a lack of evidence.\n\n\"I don't want to start pointing fingers or blaming,\
  \ but something, somewhere, is going horribly wrong,\" Ms Nandra said.\n\nDet Supt\
  \ Haines said she was \"sorry\" to hear Ms Nandra's case was dropped, adding that\
  \ her team was \"absolutely committed\" to bringing moped criminals to justice.\n\
  \nDet Supt Caroline Haines says she has a handle on the issue in Camden and Islington,\
  \ despite the \"disappointing\" surge last year\n\nRemote-controlled spikes are\
  \ used to puncture the tyres of suspects' vehicles\n\nMs Nandra, who describes herself\
  \ as a strong and confident person, said she felt \"ruined\" after the attack.\n\
  \n\"Psychologically, it's scarred me,\" she said.\n\n\"I'll never be the same again.\"\
  \n\nShe had almost two months either off work or working part-time as she struggled\
  \ with post-traumatic stress disorder (PTSD).\n\nShe still has anxiety attacks,\
  \ fears going out alone and has moved away from the area.\n\n\"I'll be OK, but I'll\
  \ never be back to what I was before. I'll always have that fear in the back of\
  \ my head,\" she said.\n\nThis video can not be played To play this video you need\
  \ to enable JavaScript in your browser. Stories of moped crime from victims and\
  \ police\n\nDr Simon Harding, a criminology expert from the University of West London,\
  \ said the surge was partly due to criminal gangs using changes in public behaviour\
  \ to their advantage.\n\nThe high cost of car insurance and the proliferation of\
  \ food or goods delivery services such as Deliveroo meant there were more mopeds\
  \ on the streets than there used to be, he said.\n\nStealing a moped was simple,\
  \ as was plucking an expensive device out of a distracted person's hands, he added.\n\
  \nDr Harding said street gangs on estates in north London were partly why this area\
  \ has been so badly hit.\n\n\"We also know both Camden and Islington have a high\
  \ number of small alleyways and canal paths - those are places that are very easy\
  \ for people on scooters or bikes to access, but very difficult for the police to\
  \ follow,\" he said.\n\nThe BBC is not responsible for the content of external sites."
