title: 'Watch: Bride walks down flooded aisle after typhoon - BBC News'
date: '2023-08-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-66368764
content: |-
  A couple in the Philippines pressed ahead with their wedding in a flooded church.

  A couple in the Philippines have pressed ahead with their wedding, despite flooding in the wake of Typhoon Doksuri on Sunday.

  Guests and family members could be seen wading through floodwaters in gumboots and sandals at the Barasoain Church in Malolos.

  Typhoon Doksuri, known locally as Egay, as well as Typhoon Falcon have strengthened monsoon rains in the region and caused flooding in many parts of the province of Bulacan.
