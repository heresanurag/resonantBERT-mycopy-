title: Michelle O'Neill attends Dublin Somme commemoration - BBC News
date: '2021-07-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-57787718
content: |-
  The Sinn Féin vice-president took part in a Royal British Legion wreath-laying ceremony.

  First Minister Paul Givan and Deputy First Minister Michelle O'Neill both laid wreaths

  First Minister Paul Givan and Deputy First Minister Michelle O'Neill have laid wreaths in Dublin at an event to commemorate the Battle of the Somme.

  It is the first time Sinn Féin vice-president Ms O'Neill has attended a Royal British Legion wreath-laying ceremony.

  The event took place at the Irish National War Memorial at Islandbridge.

  It was addressed by representatives from the Royal British Legion districts in Dublin and Northern Ireland.

  The DUP first minister said it was "a privilege to lay a wreath on behalf of the people of Northern Ireland in honour of all those who gave their lives for our freedom".

  Ms O'Neill said she was paying her respects to all those who lost their lives and remembering the enormous loss felt by so many".

  "I hope my attendance here demonstrates my commitment to the principles of equality and parity of esteem for all identities and traditions on this island," she added.

