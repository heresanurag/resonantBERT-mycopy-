title: 'Hurricane Beryl: Deadly storm moves towards Jamaica - BBC News'
date: '2024-07-03'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c10lnnz1yj0o
content: |-
  At least three people are reported to have died in the hurricane so far.

  Fishing boats were damaged in Barbados even though it escaped the worst of the hurricane

  A deadly hurricane which has been tearing through the Caribbean is intensifying as it moves towards Jamaica. Hurricane Beryl is now a category five storm, meaning its winds and storm surges could prove catastrophic. The storm made landfall on Monday on Carriacou, an island which is part of Grenada. So far, there are reports of three people dead as a result of the storm, two in Grenada and one in St Vincent.

  Beryl hit land on Monday as a category four hurricane, with sustained winds of 150mph (240km/h). The US National Hurricane Center (NHC) said Carriacou had taken a direct hit from Hurricane Beryl's "extremely dangerous eyewall" - a ring of thunderstorms which produces heavy rain and particularly strong winds. Communications with Carriacou and the nearby island of Petite Martinique are still disrupted. The Prime Minister of Grenada, Dickon Mitchell, warned that there could be more fatalities than the two reported in Grenada so far. Mr Mitchell said the true extent of the damage would not be known until officials were able to reach the islands. Mikey Hutchinson, a journalist in Grenada, told the BBC's Newsday programme that at the height of the storm the situation had been "really, really bad". "It was extensive in terms of the strength of the wind and the intensity of the rain. We had a lot of reports of damage to homes, houses, a few government buildings," he said.

