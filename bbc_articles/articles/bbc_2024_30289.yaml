content: |-
  Firms which produce e-cigarettes will also be asked to pay more towards UK recycling.

  Amazon and eBay to pay 'fair share' for e-waste recycling

  Disposable vapes will be banned across the UK next year

  Online marketplaces such as Amazon and eBay will have to pay their "fair share" of the costs of recycling electrical waste under new government proposals. Circular economy minister Mary Creagh said planned reforms would create a "level playing field" for electronics producers by putting more onus on international retailers to contribute to recycling costs. Some foreign sellers have been able to avoid this charge by selling via online marketplaces, leaving UK-based firms such as Currys to foot much of the bill. Firms which produce e-cigarettes will also be asked to pay more, with the plans not coming into action until January, 2026.

  In 2023, the UN estimated 844 million vapes are thrown away every year - though it said "77 times more, external" e-waste is generated from unwanted toys. "Under these new plans, online marketplaces – Amazon, eBay and others – will face much tougher obligations to ensure that overseas sellers who use their platforms contribute to that cost of collection and recycling," Creagh told PA News. The minister is responsible for the UK government's commitment to a circular economy, which is the idea of reusing, repairing, and the sharing of materials and products to live in a more environmentally sustainable world. Amazon told BBC News it is "committed to minimising waste and helping our customers to reuse, repair, and recycle their products". It says it offers customers free recycling options including home pick-up via its website. Ebay said sustainability "is a core focus" for its business, and highlighted its new trade-in service where customers can hand in old technology in exchange for cash. Other major online marketplaces Temu and Euronics have not commented yet. The plans will bring an end to vapes being categorised alongside toys, leisure and sports equipment for recycling purposes. Instead, a new category for e-waste specifically from vapes will be introduced. UK non-profit Material Focus estimates five million vapes are either littered or thrown away in general waste every week in the UK. And it estimates British households throw away over 100,000 tonnes of smaller household electrical items, such as kettles and lamps every year. Elfbar, one of the UK's leading vape brands, told BBC News it welcomed the change. "We are committed to providing products that reduce waste and are working with retailers to support them through regulatory changes while ensuring adult smokers and ex-smokers get continued access to smoking alternatives," said a spokesperson.

  The UK government hope its plan will ensure fairness for UK businesses by making major online marketplaces pay more for the recycling of old technology

  The government will also require online marketplaces to register with the Environment Agency and report UK sales from their overseas sellers. This data will be used to calculate the financial contribution the online marketplaces must make towards the costs of recycling e-waste. The UK government said the new obligations will be enforced by the Environment Agency and equivalent regulators in Northern Ireland, Scotland and Wales. The government says the move will help fund recycling services. "We welcome the government's new measures to help level the playing field for responsibility for waste, making online marketplaces do their part," said Currys boss Alex Baldock. "Low value, low quality and unsustainable tech is piling up in landfills, and it's good to see government doing something to tackle that."
