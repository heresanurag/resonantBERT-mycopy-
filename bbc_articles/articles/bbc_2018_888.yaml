id: bbc_2018_888
title: Iran government supporters rally after protests - BBC News
date: '2018-01-01'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-42522264
content: |-
  The rallies, an annual occurrence, fall right after anti-government protests this year.

  Thousands of people attended pro-government rallies in Iran, just after two days of anti-government protests.

  State TV showed crowds of black-clad supporters in the capital, Tehran.
