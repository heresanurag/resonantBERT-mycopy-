content: |-
  Stephen Bunting claims his first Premier League victories of the season on the way to winning night nine in Berlin.

  Stephen Bunting's quarter-final win over Nathan Aspinall was his first in the Premier League since 2015

  Stephen Bunting claimed his first Premier League victories of the season to win night nine in Berlin. Having lost all eight of his previous matches in this year's competition, Bunting overcame Nathan Aspinall and Luke Humphries, before beating Gerwyn Price 6-5 in a topsy-turvy final at the Uber Arena. After six breaks of throw to start the final, Bunting took out 96 in two darts for the first hold to go 4-3 ahead. However, a pumped-up Price levelled, broke again and then missed two match darts as Bunting hit double eight to force a one-leg shootout. With a tense final leg still in the balance, 'The Bullet' produced a brilliant 107 checkout to seal a memorable success.

  "Don't get me wrong, there have been times through the Premier League where I've thought, 'Could I finish on zero points'?" Bunting told Sky Sports. "But to get off the mark tonight and to win a night is such a special feeling. "This is going to give me huge confidence and I can't wait to finish the campaign. I've really enjoyed it, even though I've not won a game until tonight." World champion Luke Littler remains top of the table despite a rare off night that saw him hit just two of his 13 darts at double in a 6-2 loss to Chris Dobey in the quarter-finals. Littler's lead has been cut to six points after world number one Humphries claimed five legs on the spin from 3-1 down to beat Rob Cross 6-3. Price is up to third after receiving a bye in the quarters following Michael van Gerwen's withdrawal with a shoulder injury. The Welshman enjoyed a convincing 6-2 win over Dobey in the semi-finals after Bunting had beaten Humphries by the same score in the other last-four tie. Bunting will also face Humphries in the last eight on Thursday, 10 April in Manchester, while Littler will take on Price on night 10.

  Premier League Darts is played across 16 initial weeks in the league stage with quarter-finals, semi-finals and a final each night. Each of the eight players is guaranteed to face the other seven in the quarter-finals in weeks one to seven and 9-15, with week eight and week 16 fixtures done off the table. It means we will get fourth v fifth in Sheffield on the final league-stage night, with the play-off spots potentially on the line. Players earn two points per quarter-final win, an additional point if they win their semi-final and five for winning the night. The top four players after the group stage progress to the play-off night at London's O2 Arena on 23 May, with first facing fourth and second against third in a best-of-19-leg match. The final, which is the best of 21 legs, follows. If players are level on points after the 16 weeks then places are decided by nights won and then matches won.
