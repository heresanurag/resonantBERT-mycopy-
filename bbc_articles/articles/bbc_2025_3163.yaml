  Six-year-old Teddy is gifted a "buddy bench" after saving more than 2,500 tubs from landfill.

  Boy surprised with gift made from sweet tubs he saved from landfill

  This video can not be played To play this video you need to enable JavaScript in your browser. Teddy was surprised to arrive at school and find a special bench made of his recycled plastic tubs

  A little boy, who has earned the nickname "Sweet Tub Teddy" after saving thousands of confectionery tubs from landfill, has been gifted a bench made from his recycled plastic tubs. The six-year-old from Netley, Hampshire, collected more than 2,500 tubs through the Tub2Pub scheme to make outdoor furniture. Arriving at school on Thursday, he was surprised to find the "buddy bench" in the playground. "Everyone can make a difference, it doesn't matter how small you are," said Teddy, as the bench was unveiled.

  A plaque on the purple seat reads: "With thanks to Teddy for your outstanding efforts contributing to Tub2Pub 2025 from Greene King, co-cre8, DCW Polymers and Macmillan Cancer Support." Teddy, whose hero is David Attenborough, previously told the BBC he was "angry" when he found out that the containers could not be recycled in his family's normal recycling bin. Some authorities in the UK have the capacity to recycle the tubs via kerbside collection but Hampshire currently does not. Teddy set about collecting the tubs from people's houses and bins and wrote a letter to his school, which in turn wrote to parents. With help from his mum Laura, he put up posters at local businesses and got his grandad to go to the local tip to ask them to save any tubs that people had binned. A post from Teddy on Facebook, in which he described himself as an "eco warrior on a mission" and telling of how "hundreds of thousands of [tubs] go to landfill or the ocean", helped gather further momentum.

  Georgia Harlow, from Co-cre8, said Teddy "epitomises the willingness of the public to engage with recycling", adding that he is a "fantastic example of what can be achieved". She said: "The bench we are donating to Teddy's school is not only to show our appreciation for his amazing efforts but also to demonstrate how he has helped to turn used plastic tubs that may have otherwise been discarded as general waste, into a new, useful product that will be used at the school for many years to come." The day before, Teddy visited a recycling facility to learn how they use the plastic collected through the scheme to make outdoor furniture.

  This video can not be played To play this video you need to enable JavaScript in your browser. Listen to Teddy as he tells you about his day out at a recycling centre

  You know what they say - every day is a learning day - and at the DCW Polymers warehouse in Exeter, although Teddy wasn't at school, he was learning nonetheless. Teddy helped staff to load sweet tubs on to a conveyor, which sent them to be shredded. The shredded material is then mixed with UV additives to avoid being bleached by sunlight. It is then heated up and pushed into a mould before being cut into planks and sent upstairs to be made into furniture.

  As part of the scheme, Teddy's tubs were first taken to the Shamblehurst Barn pub before being moved to a plastic reprocessing centre. The pub's general manager Kieron O'Donnell said: "Huge congratulations to Teddy on collecting over 2,500 tubs for Greene King's Tub2Pub campaign this year. "We are all so proud of his amazing efforts and enjoyed hosting a celebratory meal for Teddy and his family. "It is brilliant that he cares so much about the environment and good to see how the tubs saved from landfill have been recycled into this bench for the school. "Well done Teddy, from everyone at Greene King!"

