title: Nick Knowles to miss Strictly Come Dancing due to injury - BBC News
date: '2024-10-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/cdx9wqnw2rqo
content: |-
  The DIY SOS presenter was due to perform the charleston to Rain On The Roof from Paddington 2.

  Nick Knowles has been dancing in the show with his partner Luba Mushtuk

  Nick Knowles has pulled out of this week's Strictly Come Dancing show after sustaining an injury. The DIY SOS presenter and his partner Luba Mushtuk will not perform on Saturday night's show, which is movie week. The pair were due to perform the charleston to Rain On The Roof from the film Paddington 2. A post on Strictly's Instagram page, external said that Knowles, 62, had sustained an injury during rehearsals and will not dance this weekend. "As per the rules of the competition, Nick and Luba will receive a bye through to next week when he is hopefully able to dance again. "Everyone at Strictly Come Dancing wishes Nick a speedy recovery." No further details about the injury have been disclosed.

  Two days after this series' first live show, Knowles revealed he had injured his arm and shoulder while changing a tyre, but was given medical clearance to perform last weekend. He told Strictly spin-off show, It Takes Two, that he had suffered the "painful" injury on the way to a family party on 22 September to celebrate his birthday and now had to wear a sling. In a video posted to X, Knowles admitted it had been a "tough week", but he was "very excited" to dance and his shoulder was "getting stronger every day". On last weekend's programme, head judge Shirley Ballas said that what Knowles and Mushtuk had achieved with only 16 hours of rehearsal time was "absolutely amazing", after they performed an American smooth to Blur's Parklife.
