title: 'Gorton stabbing: Murder arrest after woman killed and two hurt - BBC News'
date: '2024-08-20'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cgedq7p8zn2o
content: |-
  The woman, named locally as Alberta Obinim, died at the scene in Gorton while two others are in hospital.

  Woman killed and two hurt in stabbing

  Alberta Obinim, 43, was stabbed to death in Gorton, east Manchester

  A man has been arrested on suspicion of murder after a 43-year-old woman was stabbed to death and two other people were left with life-threatening injuries. The woman, named locally as Alberta Obinim, died at the scene on Barnard Road in Gorton at about 23:20 BST on Sunday. A 17-year-old girl and a 64-year-old man were taken to hospital for treatment. Initial inquiries suggest the suspect, aged 22, was known to the victims, Greater Manchester Police said.

  Forensic officers near a property in Barnard Road in Gorton

  The arrested man has been held in custody for questioning by detectives. The injured girl and man suffered "serious stab wounds" in the attack and their condition is "believed to be life-threatening at this time", police said. Barnard Road has been closed off while officers investigate behind a police cordon. Three forensic tents have been put up, one in a garden, one in the road, and one at a property in the street. Plain-clothed officers have been seen knocking on doors, while others in white overalls and protective clothing have been seen in the road. One person, who lives within the cordon, told BBC Radio Manchester he woke up to hear a "lot of screaming and noises". Another person said "you don't expect to see such a large police scene" in the area, while another said it was unexpected for a "nice, quiet" place.

  Police said the stabbing was being treated as an "isolated incident". Sgt Adrian Girtchen said: "We can feel the shock waves that this incident has sent through the local community, who either witnessed this attack or woke this morning to hear the tragic news. "Many of you may know the family, and our thoughts and wishes remain with them and everyone who has been affected." Det Supt Toby Facey had earlier said an investigation had been launched and the force was in the "very early stages of our inquiries", adding that there would be an increased number of police patrols in the area. GMP appealed for anyone with any information about the attack to come forward.
