  Everton's new owners are interested in Gareth Southgate, Liverpool plot a raid for Bayern Munich trio, and Premier League sides eye Joe Gomez.

  • None Mirror back page - 'We'll be waiting for you'
  • None Guardian back page - 'Champions rocked as Rodri may miss rest of season'

  Everton's new owners are interested in Gareth Southgate as manager, Liverpool plot a raid for Bayern Munich trio, and Premier League sides eye Joe Gomez. Everton prospective owner Dan Friedkin has identified Gareth Southgate, 54, as a potential candidate to replace his fellow Englishman Sean Dyche, 53, as manager at Goodison Park. (GiveMeSport), external Liverpool are preparing to raid Bayer Leverkusen for their Germany midfielder Florian Wirtz, 21, Netherlands defender Jeremie Frimpong, 23, and Argentina midfielder Exequiel Palacios, 25. (CaughtOffside), external The Reds also remain interested in signing Spain midfielder Martin Zubimendi, 25, from Real Sociedad in the January window. (Fabrizio Romano, via TeamTalk), external Liverpool and England defender Joe Gomez, 27, is wanted by Aston Villa and Newcastle. (Football Insider), external Real Madrid are monitoring Nottingham Forest defender Murillo, 22, but face competition from Barcelona and Bayern Munich for the Brazilian. (HITC), external Newcastle, Manchester United and Tottenham are among the clubs interested in Lille and England midfielder Angel Gomes, 24. (GiveMeSport), external

  Nottingham Forest are the latest club to express an interest in 20-year-old Luca Koleosho after the American winger's impressive form at Burnley. (Football Insider), external Barcelona will hold emergency talks this week to discuss whether to bring in a free-agent goalkeeper to replace their injured 32-year-old Germany international Marc-Andre ter Stegen. (ESPN), external Chile's former Barcelona and Manchester City goalkeeper Claudio Bravo is prepared to come out of retirement aged 41 to help the club in Ter Stegen's absence. (90min), external Liverpool will open talks with Colombia winger Luis Diaz, 27, over extending his deal beyond its current expiration in 2027 following his impressive start to the season. (Football Insider), external Several clubs are monitoring the development of Eintracht Frankfurt's in-form 20-year-old Sweden winger Hugo Larsson. (Fabrizio Romano), external Southampton are hoping to convince English midfielder Tyler Dibling, 18, to sign a new contract amid interest from Manchester United. (GiveMeSport), external Sunderland are set to sign ex-Brighton and Republic of Ireland striker Aaron Connolly, 24, from Hull City. (Sun), external Leeds United are keen to open new contract talks with Wales winger Daniel James, 26. (Football Insider), external
