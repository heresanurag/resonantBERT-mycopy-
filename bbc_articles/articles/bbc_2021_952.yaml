title: 'Newyear 2021: NHS and BLM celebrated in light display - BBC News'
date: '2021-01-01'
section: General
url: http://www.bbc.co.uk/news/uk-55506604
content: |-
  The new year celebrations featured a tribute to the NHS and a message from David Attenborough.

  The UK celebrated the start of 2021 with a fireworks and light display over London that included tributes to NHS staff and the Black Lives Matter movement.

  Revellers were not able to gather to celebrate the London mayor's display in the usual way because of the coronavirus pandemic, with people instead told to stay at home.

  The new year celebrations also featured a message of hope from David Attenborough.

  Watch the full display on the BBC iPlayer
