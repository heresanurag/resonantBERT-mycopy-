content: |-
  Just two weeks after learning CPR at school, Ali Holborn had to use the skill to help save her dad's life.

  A teenager has saved her father's life just two weeks after being taught CPR at school.

  Ali Holborn, 15, from Poole, performed the life-saving technique on her dad, Kevin, after he became unresponsive following a cardiac arrest.

  Compulsory CPR lessons will be rolled out in schools across England from September this year.
