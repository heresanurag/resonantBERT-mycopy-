  Extreme day trips are popular on social media but have drawn criticism over environmental concerns.

  Extreme day trips: 'I go abroad then fly home in time for bed'

  Monica Stott, 37, says so-called "extreme day trips" are a great way to experience holidays around family, work, pets and plants

  For most people, the idea of a holiday abroad involves packing a suitcase and being away for at least a weekend, if not a week or more. But for Monica Stott, a single day is enough to fly to another country, explore, and return home before bedtime. The 37-year-old from Wrexham enjoys taking part in holidays that have become known online as extreme day trips - and has visited Milan, Bergamo, Lisbon, Amsterdam and even Reykjavik for a single day. Monica acknowledges the climate impact of flying, but argues that for many people a short trip abroad is simply more affordable than a longer stay. "I don't think it's fair to say one person's holiday is more important than another person's holiday, because they're going for longer," she said.

  Monica, who is a full-time travel blogger, said the idea of an extreme day trip first occurred to her while travelling for work. "My first few extreme day trips were to Ireland when I had clients over there," she explained. "I'd quite often pop over for a one or two-hour meeting and come home. Then I realised I could stay [a bit longer] and make a full day of it." Monica then discovered a number of Facebook groups where people were sharing their own experiences of extreme day trips, and became inspired to start booking her own in her spare time.

