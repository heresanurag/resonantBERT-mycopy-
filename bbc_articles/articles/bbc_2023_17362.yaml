  Passenger Alan Grisedale says the swell knocked his wife over and moved furniture in their cabin.

  A cruise passenger has filmed huge waves which buffeted the Spirit of Discovery ship in the Bay of Biscay.

  Alan Grisedale said the swell knocked his wife over and moved furniture in their cabin.

  About 100 people were injured when the boat veered dramatically during a safety manoeuvre on Saturday.

  Most of the injuries were described as minor by cruise company Saga, but five people were taken to hospital when the ship docked in Portsmouth on Monday.
