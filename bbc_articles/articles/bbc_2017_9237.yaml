title: 'Newspaper headlines: Prince William and Catherine''s new baby - BBC News'
date: '2017-09-04'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-41155563
content: |-
  Most newspapers lead on the Duke and Duchess of Cambridge's baby announcement.

  Prince William and Catherine already have two children, George, who is four, and Charlotte, aged two

  Bets are on for what the third royal baby could be called, with many papers leading on the announcement that the Duchess of Cambridge is expecting.

  The Guardian and the Telegraph are just two of the papers which say Alice and Arthur are the most popular possible names for Princess Charlotte and Prince George's new brother or sister.

  Others are taking a punt on the date and location of the child's conception. "The Warsaw Act" is the Sun's headline, referring to the royal couple's recent trip to Poland. But the Star reckons it's a south London baby, quoting a palace source who said "they both have so much fun during Wimbledon".

  There's widespread concern over the United States' warning that North Korea is "begging for war". Writing in the daily Telegraph, former Foreign Secretary William Hague says there are no sanctions that will deter Kim Jong-un from pursuing his nuclear weapons programme - and only China can halt his ambitions.

  The Daily Express agrees, saying Beijing now has the chance to show its maturity as a world power. But in its analysis, the Times thinks the crisis has highlighted the weakness in North Korea and China's relationship. It says China has lost control over its neighbour.

  And in the Daily Mirror, former Foreign Secretary Lord Owen asks whether force is the next step in standing up to the atomic threat.

  Meanwhile, the Guardian leads on its investigation uncovering a secret scheme to launder more than £2bn from Azerbaijan through a network of UK companies.

  According to the paper, some of the cash from the so-called "Azerbiajani Laundromat" was spent on lobbying to deflect criticism of the country's president, who is accused of human rights abuses and rigging elections.

  A journalist in Baku jailed for investigating government corruption, Khadija Ismayilova, says it is a kleptocracy which perpetuates the poverty of ordinary citizens.

  Rohingya refugees walk on the muddy road after travelling over the Bangladesh-Myanmar border

  There's criticism of the de facto leader of Myanmar, Aung San Suu Kyi, in both the Daily Telegraph and the Daily Mail.

  In its leader column, the Telegraph says she must speak out against the persecution of the Muslim Rohingya minority if she is to live up to her worldwide reputation as a defender of the oppressed.

  Mail commentator Peter Oborne goes further, accusing her government of complicity in genocide and mass rape. The journalist has travelled to Sittwe in Myanmar and spoken to Rohingyas who have been forced to live in a tiny ghetto with no access to proper healthcare.

  Criminals are launching hundreds of successful cyber attacks on UK universities each year, the Times reports. The groups are targeting scientific, engineering and medical advances including research into missiles.

  A cybersecurity expert tells the paper that many attacks go completely untraced, as most universities have "fundamentally backward-looking defences".

  Finally, the paper also says Labour leader Jeremy Corbyn has been toying with the idea of veganism.

  He announced he was "going through the process" of eliminating animal products from his diet but his love of Somerset brie has been holding him back.
