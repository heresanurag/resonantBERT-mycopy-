title: Octopuses filmed punching fish in the Red Sea - BBC News
date: '2020-12-23'
section: General
url: http://www.bbc.co.uk/news/science-environment-55426583
content: |-
  Scientists have filmed octopuses in the Red Sea lashing out at fish during a group hunt.

  Octopuses throw punches at fish and it could be out of spite, scientists say.

  Marine biologists filmed these interactions in the Red Sea but it has also been captured elsewhere. It's not entirely clear why they lash out but scientists say it may be a way of keeping the fish in line.

  Fish and octopuses are known to hunt prey together and their interactions will continue to be analysed.
