id: bbc_2017_1721
title: Pie-eating Sutton keeper Wayne Shaw resigns - BBC News
date: '2017-02-21'
section: General
url: http://www.bbc.co.uk/news/uk-39046583
content: |-
  Sutton United have accepted the resignation of reserve goalkeeper Wayne Shaw, who is under investigation for potentially breaching betting rules.

  A bookmaker had offered odds of 8-1 that Shaw would eat a pie on camera. Shaw, who said he was aware of the betting promotion prior to the match, played the incident down as "a bit of fun".
