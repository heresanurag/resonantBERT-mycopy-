title: 'Postal vote delays: Royal Mail denies backlog as concerns raised - BBC News'
date: '2024-07-02'
section: Politics
url: http://www.bbc.co.uk/news/articles/cv2gxxydxlzo
content: |-
  Postal affairs minister urges Royal Mail to do "all they can" to ensure postal votes arrive in time.

  Royal Mail has insisted there is no backlog of postal votes, as parties raise concerns some people may not receive their ballot in time to vote in Thursday's general election. Reports of delays receiving postal votes have caused particular concern in Scotland as most schools there have now broken up for the summer, with many families setting off on holiday. However, there have also been issues reported in Essex, Devon and parts of London. Postal affairs minister Kevin Hollinrake said there was "a resourcing issue" with Royal Mail, while SNP Westminster leader Stephen Flynn said the system was "not fit for purpose". An Electoral Commission spokesperson said: “The vast majority of postal votes have been delivered, with tens of thousands landing on doorsteps over the weekend. We are not aware of any outstanding large-scale issues.” Voters who have not yet received their postal ballot are advised to contact their local authority to request a replacement. Completed postal votes must have reached councils by 22:00 BST on polling day.
  • None What should I do if my postal vote has not arrived?

  Local councils are responsible for sending postal ballot forms to voters but some have blamed Royal Mail for delays. A Royal Mail spokesperson said: “We have no backlog of postal votes and, whilst we are not complacent, we remain confident that postal votes handed to us on time will be delivered prior to polling day. "Where specific concerns have been raised, we have investigated and confirmed ballot packs are being delivered as soon as they arrive in our network." The spokesperson said Royal Mail would welcome a review of the postal vote timetable for future elections. However, Mr Flynn told BBC Breakfast: "I would probably argue with some of the Royal Mail's sentiments because if there's no backlog then where's the postal votes for my constituents?" He said the prime minister had been warned a July election could pose issues in Scotland, where lots of families would be heading on holiday after schools broke up for the summer. "If their postal vote didn't land in time then they're now disenfranchised in this election," he added. Postal affairs minister Mr Hollinrake told the Telegraph, external: "We urge Royal Mail to do all they can to make sure that postal votes get to the right people at the right time, and time is completely of the essence now. “There’s a resourcing issue. They have recruited extra people and I welcome that but they’ve got to make sure they’ve got the right number of people to deliver the mail at busy times like this."

  Stephanie Carlton, who applied for a postal vote on 3 June, well before the deadline on 19 June, said she was “furious” it had not arrived before she went on holiday. The 44-year-old, who lives in Diss in Norfolk, flew to Australia with her partner on 28 June. Her partner did receive his postal vote as he applied earlier, but Ms Carlton says she was told by her local electoral office her ballot would be sent out in a second tranche and there was now nothing she could do to ensure she could vote. It was too late to cancel her postal vote and apply for a proxy, while a replacement postal ballot would not have arrived until after she had gone on holiday. “I do feel really strongly that my vote would count for once and I haven't been able to vote,” she told the BBC, adding that her constituency was now considered a marginal.

  Stephanie Carlton says she has previously always voted in every election she was eligible to do so

  Prime Minister Rishi Sunak said: "It's right that the Royal Mail have said that they will look at any concerns where they're raised, because obviously we want to make sure everyone can vote because this is an important election." Labour leader Sir Keir Starmer said Mr Hollinrake should call an emergency meeting with Royal Mail. "We are running out of time, it's not something we can do tomorrow," he added. Liberal Democrat leader Sir Ed Davey also called for Royal Mail to be "pushed" and said there needed to be contingency plans. The Local Government Association (LGA), which represents councils, said there had been an "unprecedented increase" in postal voting, which "adds more pressure to an already complex process and overburdened system". The LGA called for a review of the postal vote system and more support for Royal Mail and printers to be ready to deliver for elections.

  The Electoral Commission, which oversees elections in the UK, acknowledged there were "pressures on the postal voting system due to the holiday season" and said it would conduct a review after the election. "Voters can post their postal ballot until Wednesday, and we know the Royal Mail has plans in place to ensure all postal votes get delivered in time to be counted," the spokesperson added. If they are concerned about posting it back, voters can hand in their completed form to their polling station on polling day, take it to the address on their postal voting pack during office hours before 17:00 on polling day, or ask someone to do this on their behalf.

