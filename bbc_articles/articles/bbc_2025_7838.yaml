  Gloria, who is retired, feels Trump administration officials don't appreciate how tariffs will affect her life. I'm on a fixed income. I'm retired, so things are going to go up and I'm worried. It means less money that I'll have coming in. What I'm trying to do is stock up on food because I think things are going to get really, really bad as far as shipping. Food is the one thing that you can't really cut from your budget. If I can be honest, Trump's got all the money. He doesn't have to [worry about] food. Musk has all the things, so this isn't going to affect them. So they don't know about the pain. They say 'a little pain', but how little is this pain?

  Robin says she's trying to hold out hope, but she worries the economic turmoil will affect her and her family. I'm worried. I'm worried about my retirement funds. I'm worried that he's going to make other countries hate us for what he's doing. I just think he's an idiot. I have a son and he's 30. He has his own family and he's looking for work and he's struggling. This isn't going to help things. He has two children - 18 months and six. I tend to be a glass half-full type of person, but the president and his ideas are just so crazy sometimes. My financial adviser, who I really trust, did say that some of Trump's plans are good and good for the finance market. It gives me a little bit of hope, I guess. But then when you see the stock market plunging, it was like "oh, maybe not".

