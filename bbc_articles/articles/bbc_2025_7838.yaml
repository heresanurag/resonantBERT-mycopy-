  Five Americans share their view on the sweeping import taxes the president has announced.

  'So crazy' or a 'necessary evil'? - Americans react to Trump's tariffs

  This video can not be played To play this video you need to enable JavaScript in your browser.

  US President Donald Trump announced sweeping tariffs on Wednesday including a 10% tariff on most countries. Some of America's biggest trading partners will see even higher tariffs beginning 9 April. The aggressive shift in trade policy makes clear where Trump stands on tariffs, but has left much of the world wondering what Americans - who are expected to see the side effects - think of the move. We asked five people what they think.

  She thinks the pain Americans will feel will be temporary and worth it. I know we're all going to get pinched in the pocket for a while. I think in the long run, it's going to get us out of the massive deficit that we're in. I am concerned about the price of goods going up. I am going to end up being more particular about what I buy, basically I'll tighten the belt for a while. But then I think it's going to go full circle and it's going to be a good thing for the economy and for people in general. We've been the world's financial doormat for a while and we've gotta stop it.

  The soon-to-be-retiree worries about economic instability prompted by Trump's actions. I'm very unhappy. I'm probably a couple of years away from retiring and I don't know if I'm going to be able to retire. My 401k's not doing great, Social Security is on the line and I don't think the tariffs are going to help America's standing on the world platform. Trump is not a king and I feel like our Congress and Senate is letting us down, both parties, by not pushing back [on tariffs]. They know better, and they're not doing anything. Why?

  The trucker welcomes the incoming tariffs and hopes they can help restore smaller US towns. I feel like the way to kick-start investment back into US manufacturing is exactly this. Up until the 70s, there were two steel mills [in my area] and then they closed. And up until the last 10 years, the sites have been abandoned We might not get back everything, but even if we recover 30-40% of it, it's quite a bit of money and jobs.

