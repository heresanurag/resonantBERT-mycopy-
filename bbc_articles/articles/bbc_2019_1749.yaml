id: bbc_2019_1749
title: 'Vatican child abuse summit: Abusers are ''tools of Satan'' - BBC News'
date: '2019-02-26'
section: General
url: http://www.bbc.co.uk/news/world-europe-47348332
content: |-
  Pope Francis says that "no explanation suffices" for cases of child sexual abuse within the Catholic Church.

  Pope Francis has closed a summit on paedophilia by saying that "no explanation suffices" for cases of child sexual abuse within the Catholic Church.

  He said that the Church should be protecting children from "ravenous wolves" and would be "decisively confronting" abuse.
