title: 'Covid: Fines issued for rugby party lockdown breach - BBC News'
date: '2021-03-21'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56475051
content: |-
  Police broke up a party of 14 rugby fans watching the Wales game and issued fixed penalty notices.

  Police broke up a party of 14 rugby fans watching the Wales game and issued fines for breaching Covid rules.

  It was one of 1,500 incidents dealt with by South Wales Police, making Saturday "one of the busiest days of 2021", a tweet by an officer said.

  At least 32 fines were issued by police in Merthyr Tydfil with fans found watching Wales' Six Nations defeat to France.

  Households are not allowed to mix indoors due to current Covid rules.

