title: 'Sophie: Posthumous album set for release in September - BBC News'
date: '2024-06-25'
section: Culture
url: http://www.bbc.co.uk/news/articles/ckddgl5pkv9o
content: |-
  The self-titled album will be the last release by the avant-garde artist, who died after a fall in 2021.

  A posthumous album by Sophie is due in September

  A final, posthumous album by the experimental pop artist Sophie is to be released this year, her family have announced. The singer's family revealed the news on Monday, saying it was drawn from material she had almost completed at the time of her death three years ago. The album was “lovingly finalised by those who hold her closest”, including Sophie’s brother and collaborator Ben Long, they added. The musician died at the age of 34 in an accidental fall after climbing to watch the full moon in Athens, Greece.

  Several months after her death, her brother Ben told Billboard magazine that the musician had “literally hundreds of tracks” in the vault, but that he wanted to “do right by Sophie” in releasing what she would have wanted. "I don’t want to be like, ‘We’re going to put everything out,’ because sometimes Sophie didn’t want it to or it wasn’t finished," he continued. "But it was quite clear with a lot of songs, just from the fact that we had been working on them and mixing the album, that I know the direction a lot of things were supposed to be going." The family's statement said that the new, self-titled record would be Sophie's "final" release, and feature "her most cherished collaborators". Alongside the news, they also released the first single, Reason Why, with guest vocals from Kim Petras and BC Kingdom.

