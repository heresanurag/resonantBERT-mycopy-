  Born in Glasgow, Sophie Xeon was one of the most in-demand producers in pop - working with Madonna, Diplo, Vince Staples, Camila Cabello, Petras and Charli XCX. She released her debut single Nothing More to Say in 2013, and found her audience with the challenging and avant-garde follow-ups Bipp and Lemonade. Her stated goal was to disrupt the conventions of pop. "The language of electronic music shouldn’t still be referencing obsolete instruments like kick drum or clap. No one’s kicking or clapping," she said in 2014. "It makes more sense in my mind to discard those ideas of polyphony and traditional roles of instrumentation." In 2018, she released her debut album Oil Of Every Pearl’s Un-Insides, which received a Grammy nomination for best dance/electronic album. As a producer and writer, her credits included the combative Madonna single Bitch, I'm Madonna and Charli XCX's disruptive, career-defining Vroom Vroom. Her influence has permeated pop since her death. In the past year alone, St Vincent, Caroline Polacheck, Charli XCX and AG Cook have released songs paying tribute to her impact on their careers. Charli's track, called So I, is the most nakedly confessional. "When I make songs, I remember things you'd suggest," she sings. "Would you like this one?" The chorus also interpolates Sophie's It’s OK to Cry, the song in which she came out as transgender.

  Announcing the new album, Sophie's family said: "Sophie didn’t often speak publicly of her private life, preferring to put everything she wanted to articulate in her music. "It feels only right to share with the world the music she hoped to release, in the belief that we can all connect with her in this, the form she loved most. "Sophie gave all of herself to her music. It’s here that she can always be found."
