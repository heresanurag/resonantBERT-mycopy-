content: |-
  Laila Soueif has not eaten for 134 days as she campaigns for the release of her pro-democracy activist son from jail in Egypt.

  Mother on hunger strike asks PM for help to free her son

  Laila Soueif (centre) hasn't eaten for 134 days as she campaigns for her son's release from jail in Egypt.

  A mother who has been on hunger strike for 134 days to campaign for her son to be freed from an Egyptian prison has asked Sir Keir Starmer to continue to press for his release if she dies "in the coming days". Pro-democracy activist Alaa Abdel Fattah - a British and Egyptian citizen - was due to be freed in September 2024 but remains in jail. His UK-born mother Laila Soueif has consumed nothing but herbal tea, black coffee and rehydration salts since. Speaking outside Downing Street, the visibly frail 68-year-old said she feared she is running out of time to secure his release and called on the prime minister to act. A government spokesperson said ministers are "working intensively on his case".

  In 2019, Alaa Abdel Fattah was arrested on suspicion of spreading false news - a charge human rights groups have called spurious. He was convicted in 2021 and Egyptian authorities have refused to count the more than two years he spent in pre-trial detention towards his time served. Speaking outside the gates of Downing Street on Monday, Ms Soueif - who is also a prominent pro-democracy campaigner - told reporters: "I would like the prime minister's personal assurance that even if I die during the coming days, this case is not going to go away." Despite asking for a meeting with the prime minister, campaigners claimed Sir Keir has not responded to Ms Soueif's request - although he has exchanged letters with her. "We can't talk to the prime minister across the newspapers," she told journalists. "I'd like him to meet me." A government spokesperson said: "The prime minister recently wrote to Laila Soueif underscoring that at all levels of government we are working intensively on his case, and that progress is possible, but will take time." The spokesperson said the government has continued to press his case at the "highest levels" of the Egyptian government, including with President Sisi and his foreign minister. The prime minister recently wrote to Laila Soueif underscoring that at all levels of government we are working intensively on his case, and that progress is possible, but will take time. "Officials from the Foreign Office continue to call for consular access to Mr El-Fattah and for his release," the spokesperson added.

  Alaa Abdel Fattah (pictured in 2019) has spent years behind bars.

  Ms Soueif said she had lost a considerable amount of weight very quickly due to her hunger strike. Campaigners said her body weight had fallen by 28.3kg (4.5st), around a third of her starting weight. They also said Ms Soueif was taken to the emergency department of London's St Thomas's Hospital earlier in February when her blood sugar and blood pressure dropped to "concerningly low levels". "During the past four days, my weight has been going down at a very alarming rate," Ms Soueif said. "I've been losing like half a kilo every day. "So really I'm not feeling great. I'm still on my feet, which I find a miracle." She said it was vital that Sir Keir speaks directly to Egypt's President Abdel Fattah al-Sisi. "Somebody has to persuade Mr Sisi to give the green light for a process that will release Alaa. The only person who can do that is Mr Starmer, the prime minister". "I certainly don't think that we have much more time. I don't have time."
