  Craig, 31, contemplated quitting the sport after the last Games but instead fronted up to the disappointment by hanging a photo of the Tokyo finish line on the walls of her home in Mark Cross in Sussex. That memory - they were only 0.5 seconds from winning gold - has helped drive the world record holders through the gruelling hours of training and the many sacrifices made over the last three years. "It's so unbelievably simple and difficult to perfect - that's why I love it and hate it in equal measure," she said of the sport. "I want to spend the next couple of weeks hugging and thanking everyone who has helped me over the last two decades of my rowing career and then take stock." Grant, 28, started rowing at Cambridge University after signing up to join the boat club in exchange for two free drinks during Freshers Week. She went on to win three Boat Races and has achieved all of her international rowing success while studying to become a doctor. Now qualified, she will have little time to celebrate before starting her foundation year in Slough but is determined to carry on competing at the highest level. "Emily is the toughest, most incredible person I've had the pleasure to row with," said Grant. "She took me from a clueless single rower to an Olympic champion. "She's been there every single step of the way. I kind of want to go out and do it again. "I love this sport and am not ready to finish." However, they will be the last lightweight doubles champions with the discipline being replaced by beach sprint rowing at Los Angeles 2028.

