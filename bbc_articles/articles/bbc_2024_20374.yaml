  Wynne-Griffith, 30, and George, 29, were part of the British men’s eight crew that won bronze in Tokyo. The friends were both studying at Cambridge University and competing in the Boat Race when a coach suggested they team up as a pair. They went unbeaten in the build-up to the Olympics this season - winning the European Championships in April - and were bidding to become the first British champions in the men's pair since Sir Steve Redgrave and Sir Matt Pinsent in 1996. George praised his team-mate and said they were "clinging on" in the final 20 metres of the final. “We're incredibly proud and we're really happy with what we've achieved with each other," said George. "Doing it with your best mate's pretty special."

