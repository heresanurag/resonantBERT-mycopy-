title: 'Simon Boas: ''Inspirational'' Jersey aid worker dies aged 47 - BBC News'
date: '2024-07-15'
section: Jersey
url: http://www.bbc.co.uk/news/articles/c4ng9l07vy9o
content: |-
  Simon Boas had written about his terminal throat cancer diagnosis and preparing to die.

  Jersey Overseas Aid bosses said Simon Boas impacted millions of lives around the world

  An "inspirational" aid worker who wrote about dealing with his terminal cancer has died. Jersey Overseas Aid (JOA) said on Monday executive director Simon Boas died at the age of 47. A statement, external from JOA's chairman Carolyn Labey said Mr Boas, who was diagnosed with throat cancer in September, died peacefully in Jersey surrounded by his family. She said Mr Boas became an inspiration for millions around the world after sharing his cancer diagnosis and his approach on life and death.

  "Simon was an inspiration and larger-than-life character who impacted thousands of lives here in Jersey, as well as millions around the world," said Ms Labey, who is also a deputy in the States Assembly. Mr Boas was a director with JOA for eight years, joining the agency after a career in international development with a focus on the Middle East. JOA said that, during his time with the organisation, Mr Boas helped transform the agency into the "agile and respected international aid agency it is today". Bailiff of Jersey, Sir Timothy Le Cocq, said he was "deeply saddened" to hear of Mr Boas's death. "Through his writings and indeed through his interviews and in personal conversations he has shared an attitude of joy, optimism and positivity that many of us would struggle to emulate in the face of such an unforgiving prognosis," he said. Mr Boas "exemplified the stoic approach to life of loving one’s fate", he added. "His was a philosophy of courage and optimism which we may all admire." Away from JOA, Mr Boas chaired the Jersey Heritage Trust, served with the Trinity Honorary Police and worked with the Samaritans.

  Simon Boas has written a book due to be published later this year about his cancer

  After being diagnosed with throat cancer last year, Mr Boas wrote several articles about his illness and wrote a book called A Beginner's Guide to Dying, which is due to be published later this year. Ms Labey said Mr Boas' attitude and openness during his illness inspired millions around the world and received praise from many, including King Charles III who wrote to him shortly before his visit to Jersey. "While we all mourn Simon’s passing, both commissioners and the dedicated staff at JOA find solace in the privilege of having worked alongside him and the honour of sharing some of his journey with him," Ms Labey said. "His legacy will live on in the countless lives he touched with his kindness, compassion, sense of humour and love of life."

  Simon Boas told the BBC Radio 4's Today programme he was not frightened of death

  Weeks before his death, Mr Boas spoke to Emma Barnett on BBC Radio 4's Today programme about his life and attitude towards his terminal diagnosis. Mr Boas said his pain was under control and he was feeling as happy as he had ever been in his life. He added that, due to his choice of career, death had become part of his life and he was "ready" to die. Mr Boas said: "Most people have not seen a dead body, whereas, unfortunately, I have in lots of places. "I think it helps one come to a realisation that it's not something to be frightened of."

  Tributes have been paid to Mr Boas following news of his death. Deputy Ian Gorst, Jersey's Minister for External Relations and Financial Services, said Mr Boas was the "most capable public servants" he had worked with. Writing on X, external, formerly known as Twitter, Mr Gorst said : "He was intelligent, humble and kind. He loved Jersey and loved life. "Simon’s untimely death is a tragedy. We will all miss him greatly." Alex Burghart, Shadow Northern Ireland Secretary, also paid tribute to Mr Boas on X, external. The Conservative MP for Brentwood and Ongar said: "My very great friend Simon “Bob” Boas died last night - he was a hero."
