title: Lake Tahoe sees first August snow in 20 years - BBC News
date: '2024-08-27'
section: General
url: http://www.bbc.co.uk/news/videos/cx2newg9g89o
content: |-
  The unseasonable weather comes months before the local ski season in the Sierra Nevada is due to start.

  Lake Tahoe saw its first August snowfall since 2004.

  Just days before the unseasonable weather, it was bright and sunny at the holiday destination.

  The local ski season doesn’t start until November 27, though some resorts have announced they may tentatively open in August following the snowfall.
