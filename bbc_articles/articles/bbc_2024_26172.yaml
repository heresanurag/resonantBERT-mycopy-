title: Glasgow rape centre breaks away from charity in row over gender - BBC News
date: '2024-10-24'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cz7w322230go
content: |-
  The centre in Glasgow said it only wanted to employ women, but this was "at odds" with Rape Crisis Scotland.

  Rape centre breaks away from charity in row over gender

  A rape support centre in Glasgow has broken away from the supervision of the umbrella charity Rape Crisis Scotland in a row over gender. Glasgow and Clyde Rape Crisis said its priority was to provide a single-sex service by an "all-female workforce" - and this was "at odds" with the charity's priorities. RCS chief executive Sandy Brindley recently apologised after another centre in Edinburgh, which was run by a trans woman, failed to provide single-sex spaces for 16 months. At the time Ms Brindley made clear that all member centres should provide single-sex spaces, but said there was no reason why transgender people could not work in rape support centres.

  BBC News understands the Glasgow centre made the decision in February to end its membership with Rape Crisis Scotland (RCS) - the national charity that sets service standards for member centres. The centre then held a number of meetings with RCS to discuss concerns - its view was it wanted to go beyond providing single-sex spaces and have a women-only workforce. Katie Cosgrove, co-chair of Glasgow and Clyde Rape Crisis, said the centre was not changing the way its service is run - rather that the decision was to "publicly disassociate" from RCS. Asked what the impact of the move would be on service users, she said she was "not clear on what kind of impact that might be". She said she recognised there was a need for trans women to use the service and that the centre had seen a "small number" of trans women - 17 in the last year. A condition of the charity's funding from the Scottish government is that services are trans-inclusive. The Glasgow centre will continue to support trans women who seek support but will not employ trans women. Ms Cosgrove said: "We believe very strongly in the rights of women to have single-sex services within a rape crisis setting and we believe, to ensure that they are protected and that risk is minimised, that it should be an all-female workforce." Under updated guidance, external from the Equality and Human Rights Commission, that was published earlier this year, the definition of women only can include trans women who have a gender recognition certificate (GRC). However, it is legal to prevent trans women – including those with a GRC - from applying for a women-only role if it is a “proportionate means of achieving a legitimate aim”. RCS said it wished the Glasgow team well. It said member centres deliver services in a variety of ways tailored to the needs of communities. A spokesperson added: “All Rape Crisis Centres must provide women-only spaces within their service but how they define this is currently for individual centres to decide. "Rape Crisis Centres can provide single-sex spaces within Rape Crisis Scotland – and many do."

  Earlier this year a review found that Edinburgh Rape Crisis Centre (ERCC) had failed to provide women-only spaces and that its CEO - a trans woman named Mridul Wadhwa - had not acted professionally or understood the limits of her authority. The report also said there was "evidence that the actions of some ERCC staff had caused damage to some survivors", and that concerns had been raised that some women were "excluding themselves from approaching Rape Crisis Centres including ERCC" because of their approach to gender identity. Ms Brindley found out ERCC was not following national standards last October and paused referrals 11 months later when the review said safeguarding was a problem. The review recommended RCS facilitate a "shared approach" across its centres - the charity said this work was under way.

  Sandy Brindley is the chief executive of Rape Crisis Scotland - the umbrella charity which sets standards for member support centres

  Groups including For Women Scotland, which has campaigned against changes to transgender rights, accused the ERCC board of "ignoring its own culpability". The review was commissioned by RCS after an employment tribunal found in May of this year that a counsellor - Roz Adams - had been unfairly constructively dismissed. This was over her belief that people who used the service should be able to know the sex of the staff that would be dealing with their case. Ms Wadhwa was highlighted in the tribunal outcome as she appeared to believe that Ms Adams was transphobic. Ms Brindley stressed that Rape Crisis Scotland had no involvement in hiring Ms Wadhwa - who stood down from her role after the review was published. However she said there had been "no reason" not to agree with the appointment at the time as Ms Wadhwa had significant experience of working in the sector. The role Ms Wadhwa had is reserved for women only.

  Mridul Wadhwa became chief executive of the Edinburgh Rape Crisis Centre in 2021

  Since the controversy emerged, Ms Brindley has faced pressure from some groups to stand down, including from Scottish Conservative MSP Sue Webber. The BBC understands she still has the full support of the RCS board to remain in post. Ms Brindley told BBC News: "I don’t expect to be in post beyond the next 12 months but I definitely don’t intend to resign just now - we've got so many important things to do." The chief executive previously described how the controversy had led to rape survivors who supported RCS experiencing "horrendous" abuse online, including being told that they "must be lying" about being raped. "It is absolutely astonishing to me that this is the position we're in where rape survivors can be treated in this way in the name of women's rights supposedly," she said. RCS oversees 17 support centres across Scotland which offer support to men, women, transgender and non-binary people.
