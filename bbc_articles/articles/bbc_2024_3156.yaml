title: 'Kingswood and Wellingborough by-elections: Voters go to the polls - BBC News'
date: '2024-02-15'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68297927
content: |-
  Polls open to elect new MPs in Kingswood and Wellingborough.

  Voters are going to the polls to elect new MPs in Kingswood and Wellingborough.

  The by-elections will decide who will replace former Conservative MPs Chris Skidmore and Peter Bone, with both seats won by the Tories at the last general election in 2019.

  Polling stations opened at 07:00 GMT and close at 22:00, with results expected from early on Friday morning.

  Constituents will need photo ID to vote.

  The Northamptonshire seat of Wellingborough had a Tory majority of more than 18,000 at the last election, while in Kingswood, which is near Bristol, the party's majority was more than 11,000.

  There are 11 candidates on the ballot paper in Wellingborough and six in Kingswood.
