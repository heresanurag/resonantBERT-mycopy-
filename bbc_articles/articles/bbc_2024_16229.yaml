  This was golf being played as the game's Scottish founding fathers experienced it back in the 19th Century, when the first Opens were played down the road at Prestwick. Schauffele was calmness personified throughout these four ultra-demanding days. He carded only six bogeys, two of them in the worst of the third-round conditions. Stay out of the bunkers was a key maxim. He visited only three, and successfully got up and down on two of those occasions. Do not fall foul of the tiny Postage Stamp eighth was another. He birdied it three times, and will feel he should have had a full set having given himself a great look on his final visit to that magical par three. With the title on the line he hit 16 of 18 greens in regulation. He was the only man to birdie the treacherous 11th, where his six-iron approach from the left rough to inside three feet was arguably the shot of the tournament. His delicate chip to the par-five 16th was a shot of sheer class, having seen his plucky pursuer Rose smash a 300-yard driver off the deck on to the green. The Englishman was one poor pitch - at the 12th - from pushing Schauffele all the way to the end. His five on that hole was the only bogey between them in a fabulous display of links golf. Easing away with his four back-nine birdies, the champion demonstrated supreme ball-striking and clinical putting. That is champion golf, worthy of the greatest event on the calendar. "That walk up 18 truly is the coolest with the yellow leaderboards and the fans and the standing ovation," Schauffele reflected as he tightly clutched the precious Claret Jug. "It really is one of the coolest feelings I've ever had in my life." Schauffele is the only player to have finished top 10 in all four majors. At the PGA he set a new scoring record by finishing 21 under par, but his nine-under tally in Scotland was even more impressive. He is the 11th successive first-time winner of the Open - a run started when Phil Mickelson made a similar bolt from the pack in 2013. Such a record shows the championship is truly 'open' and rewards the best player in that given week. That is competitive golf in a nutshell. Schauffele was already one of the two best players in the world, and the time-honoured demands of links golf - in its most hostile form - ensured that only someone of such elevated status could prevail. The 152nd Open should be remembered as a classic. Roll on Royal Portrush in 12 months' time.
