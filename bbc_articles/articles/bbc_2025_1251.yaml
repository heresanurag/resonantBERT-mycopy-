content: |-
  Huge crowds gathered in Hong Kong to get a glimpse of Elder Sister and Little Brother

  Hong Kong's Ocean Park unveiled its new attraction to the public: twin panda cubs.

  Huge crowds flocked to the theme park for the debut of the fluffy pair.

  Their nicknames 'Elder Sister' and 'Little Brother' are only temporary. Hong Kong's residents have been taking part in a competition to name the duo.

  Their mother, Ying Ying, is the world's oldest giant panda on record to give birth, delivering the twins just a day shy of her 19th birthday.
