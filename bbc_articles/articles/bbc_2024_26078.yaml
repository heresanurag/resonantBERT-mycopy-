  Captain John McGinn says manager Unai Emery's place among the legendary figures in Aston Villa's history is already assured.

  'I've never met anyone like him' - McGinn on Emery

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Captain John McGinn says he has never met anyone else like manager Unai Emery and the Spaniard's place among the legendary figures in Aston Villa's history is already assured. Villa's impressive start to the season continued with a 2-0 victory over Bologna as they went top of the Champions League table. Emery, who celebrates two years in charge at Villa Park on Thursday, has also guided the side to fourth in this season's Premier League, four points behind leaders Liverpool. The 52-year-old has yet to win a trophy with the club but McGinn believes his place in Villa history is safe. "No matter what happens until now and whenever he leaves - we hope it's never - he will certainly go down as one of our club's greatest managers," McGinn said. "You feed off your leader. He is our leader and we feed off that. No-one can question what he puts in, the effort - and everything which comes his way and our way is on the back of hard work. "He is just so driven. I have never met anyone like him," added the 30-year-old. McGinn acknowledged Emery has been the "only person" who has not been excited by Villa's early season form, with the ex-Arsenal boss instead concentrating on his job. "He just focuses his full energy all the time," added the Scotland midfielder. "He does not let us take our foot off the gas so we can use all our energy and enthusiasm, and the excitement we have. His determination and intensity is unmatched."

  Villa were only three points off the relegation zone when Emery took over on 24 October 2022 following the sacking of Steven Gerrard. Fast forward 24 months and the transformation is remarkable. Villa are enjoying their best start to a Premier League season in 26 years as well as sweeping all before them in Europe, including a memorable win over Bayern Munich earlier this month. Emery's win percentage of 55.79 from his 95 competitive matches in charge of Villa is the best in the club's 150-year history. "It's amazing the way Aston Villa have started. He [Emery] is a manager that has such vast experience in these European competitions and he knows how to handle it," former England defender Matthew Upson told BBC Sport. "Under Emery, they are only going forwards so we are all really keen to see where they end up." Former Villa and England defender Martin Keown said on TNT Sports there has been "something special" about Emery's time in charge. "Villa had their best league finish for 28 years last season and quietly he has taken this club back to the big time," he said. Ex-England and Manchester United midfielder Owen Hargreaves added: "I look at Villa now and they don't have a weakness. They have a manager who is ruthless, a winner and has a clear identity."

