  Gymnast Max Whitlock tells BBC Breakfast he will retire after this summer's Olympics - and says he made the decision soon after the Games in Tokyo.

  Three-time Olympic champion Max Whitlock tells BBC Breakfast he will retire after this summer's Games in Paris - and the 31-year-old says he made the decision soon after Tokyo 2021.

