content: |-
  Authorities say she echoed words connected to the murder when she allegedly said "delay, deny, depose, you people are next".

  Woman charged with threatening healthcare firm by using CEO killer's words

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A woman has been charged with threatening a health insurance company by repeating words engraved on bullet casings found at the scene of UnitedHealthcare CEO Brian Thompson's murder. Briana Boston, 42, is accused of saying "Delay, deny, depose, you people are next" while speaking on a recorded line with a Blue Cross Blue Shield representative about a denied medical claim. Ms Boston, who is from Florida, was charged with threats to conduct a mass shooting or act of terrorism. A judge set her bond at $100,000 (£78,900). Following the Tuesday phone call with the US healthcare company, local media reported that detectives in Lakeland, Florida, appeared at Ms Boston's home and arrested her.

  The Lakeland Police Department and Ms Boston's lawyer, Jim Headley, did not respond to requests for comment. Ms Boston reportedly told police "healthcare companies played games and deserved karma from the world because they are evil". She said that she had used the words connected to Mr Thompson's killer "because it's what is in the news right now". Police said shell casings found at the scene in Manhattan were engraved with "deny," "defend" and "depose." Those words echo the title of a 2010 book: "Delay, Deny, Defend: Why Insurance Companies Don't Pay Claims and What You Can Do About It." Luigi Mangione, 26, is accused of Mr Thompson's murder. He was arrested in Pennsylvania on gun charges on Monday, bringing an end to a days-long, multi-state manhunt that seemed to have few leads. The case has sparked support for Mr Mangione and anger at the US's for-profit health insurance industry, as some customers have faced high costs and denied claims. Law enforcement officials have also warned of potential copy cats. The New York Police Department has said that some healthcare executives have been named on a "hit list" that was posted online in connection with Mr Thompson's murder. Authorities reportedly alleged that Ms Boston had used "the UnitedHealthcare CEO's homicide to her advantage" to make a threat against the insurance company. "She's been in this world long enough that she certainly should know better... You can't make threats like that in the current environment that we live in and think that we're not going to follow up and put you in jail," Lakeland Police Chief Sam Taylor said, according to local media. When she appeared in court, Mr Headley urged the judge to release her while the case proceeds, arguing that his client was a 42-year-old married mother of three who has "never had any criminal charges or convictions". The judge set her bail at $100,000, citing "the status of our country at this point". Ms Boston appeared to gasp in response to the judge's decision.
