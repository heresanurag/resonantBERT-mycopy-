title: 'Carrington: No suspicious package found in Nottingham incident - BBC News'
date: '2023-04-07'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-65213035
content: |-
  Roads were closed, properties evacuated and an extensive search of a house was carried out.

  Emergency services arrived at the scene at 13:00 BST

  A number of roads in Nottingham were closed as police "extensively searched" a home after reports of a suspicious package inside.

  Residents were evacuated from Mansfield Road after Nottinghamshire Police said it received a call about the item.

  The force said no such package was found and the property was safe.

  Ch Insp Amy Styles-Jones said: "Our top priority throughout this was to keep people safe, which is why we took this report as seriously as we did."

  "We're pleased to say that this incident has now been safely concluded and people are able to return to their homes," she added.

  "We would like to thank the public for their patience and understanding, as well as all the officers and supporting emergency services involved as part of our response to this incident."

  Residents from Magdala Road, Zulla Road and Ebers Road were also evacuated.

