title: 'Abkhazia: Georgia breakaway region''s leader resigns - BBC News'
date: '2024-11-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/crr91px4nlqo
content: |-
  Aslan Bzhania is quitting days after crowds stormed government buildings over a controversial pro-Russia bill.

  Aslan Bzhania has been Abkhazia's leader since 2020

  The leader of Georgia's breakaway region of Abkhazia is resigning after days of mass protests over a controversial pro-Russia bill. Aslan Bzhania's press office said he was quitting "to maintain stability and constitutional order" and that the two sides had agreed protesters who had stormed the parliament in Sukhumi must disperse on Tuesday. The bill, which would have legalised Russian investment and land ownership, has been withdrawn. Abkhazia declared its independence in 1999, and Russia recognised it as an independent state after the Georgian-Russian war in 2008. Georgia says Abkhazia is "occupied" by Moscow.

  Most countries regard the area on the Black Sea coast as part of Georgia.

  In a statement posted on Telegram late on Monday, Bzhania's press office said Abkhazia's parliament would consider his resignation on Tuesday. It said Bzhania's deputy would become Abkhazia's acting leader, who would then dismiss the current prime minister. The statement warned that Bzhania would withdraw his resignation offer if protesters refused to leave the government buildings. Bzhania describes himself as Abkhazia's president - Georgia and most of the world do not recognise his authority. Abkhazia's opposition has not commented on Bzhania's resignation offer. Located along the Black Sea and Caucasus mountains, Abkhazia is known for its natural beauty and coastline, and was one of the favoured holiday destinations for the Soviet elite until the collapse of the USSR in 1991. Locals feared that the proposed bill would trigger an influx of Russian investment, pricing them out of the property market and further strengthening Moscow's grip on the region. Backed by Russia, Abkhazia fought a war of secession with Georgia in 1992-93, before unilaterally declaring independence. In 2009, Moscow signed a five-year agreement with Abkhazia to take formal control of its frontiers with the rest of Georgia, while in 2014 Moscow and Sukhumi signed a "strategic partnership" agreement.

