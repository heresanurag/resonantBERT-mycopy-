content: |-
  Community activists visit Birmingham pub to apologise after an attack on Monday night.

  Community activists visited a Birmingham pub to apologise after an attack on Monday night.

  There had been rumours a far-right group was inside The Clumsy Swan pub on Stoney Lane in Yardley.

  The situation was calmed by older members of the community, social media posts suggested.

  MP Jess Phillips said the pub was able to lock up for the night as usual after being visited by "lots of lovely community sending solidarity".

  On Tuesday, staff at the pub thanked local people for their support with Sheldon Mosque offering to pay for repairs to the damage.
