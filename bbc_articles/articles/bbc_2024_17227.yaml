content: |-
  The opposition says it has proof President Maduro's victory claim is fraudulent; his defence minster has warned of a "coup".

  Fresh protests in Venezuela as anger grows at disputed election result

  Venezuelans have been gathering in central Caracas for a second day

  Fresh protests have broken out in the Venezuelan capital, Caracas, after the disputed result of the country's presidential election. Thousands gathered in the city centre to show their opposition to President Nicolás Maduro's claim of victory. Many said they would not stop until there was a new government, and some said this would only be achieved if the security forces joined opposition protesters. However the military and police have so far remained loyal to Mr Maduro and have fired tear gas and rubber bullets at some protesters.

  Local officials say around 750 people have been arrested. Two leading NGOs in the country say several people have died and dozens have been injured. On Tuesday, Venezuela's defence minister described the protests as "a coup". Surrounded by armed troops, Gen Vladimir Padrino read out a statement saying that President Nicolás Maduro had the "absolute loyalty and unconditional support" of the military. Venezuela's attorney general, who is a close ally of Mr Maduro, said a soldier had been killed in the anti-government protests. Opposition leader María Corina Machado called for protests to be peaceful. "We must proceed in a peaceful manner. We should not fall into the provocations the government has set us. They want to make Venezuelans face off against each other," she said. "Our candidate won 70% of the votes. We united a country, Venezuelans who once believed in Maduro are with us today.” One anti-government protester who did not want to be named because he feared repercussions from the security forces, told the BBC they had seen evidence of electoral fraud. “We are absolutely sure the election was stolen. I worked in an electoral booth. The government is not recognising it, they stopped all the tallies of the vote halfway through the night. They don’t want the world to know that they lost," they said. They said that Venezuelans who had been supporters of previous leader Hugo Chávez, known as Chavistas, were now withdrawing their support from Mr Maduro. “This is a very peaceful protest. This is an upper class part of Caracas. What we saw yesterday was quite violent. I believe the people who used to be Chavistas are no longer Chavistas,” they said. “I think people are hoping for a change. Most likely it will be violent.”

  In another development on Tuesday, Costa Rica's Foreign Minister Arnoldo André said it was prepared to give political asylum or refuge status to Ms Machado and Mr González. Ms Machado responded expressing gratitude, but said her priority was to protect "fellow asylum seekers" at the Argentine Embassy in north-eastern Caracas. "My responsibility is to continue this fight alongside the people," she wrote on social media. It comes after the head of congress Jorge Rodríguez said on state television that the opposition pair should be arrested. President Maduro also warned “justice must come” to the opposition leader and candidate and said he held them “directly responsible for the criminal violence".

  Protest erupted after the head of the National Electoral Council (CNE) - who is a member of Mr Maduro's party and used to work as his legal adviser - declared the president re-elected for a third consecutive term. The CNE had earlier announced that Mr Maduro had won with 51% of the votes, ahead of Edmundo González with 44%. However, the electoral authority has so far failed to publish detailed voting tallies, which the opposition says show that the result the CNE announced was fraudulent. The regional body for the Americas, the Organization of American States (OAS), has accused Venezuela's government of completely distorting the results. The opposition coalition backing Mr González said they had been able to review 73.2% of the voting tallies and maintained that they confirmed that Mr González was the winner by a wide margin. "We have the records showing our categorical and mathematically irreversible victory," Mr González said. However on Monday the CNE doubled down, announcing that all votes had been counted and Mr Maduro was the winner. Meanwhile, Attorney General Tarek Saab, a longtime ally of Mr Maduro, warned that those arrested would be charged with "resisting authority and, in the most serious cases, terrorism". The opposition Voluntad Popular (Popular Will) party said among those who had been detained was their national political co-ordinator, Freddy Superlano. The party warned that the government was stepping up its repression of activists who have been demanding the publication of results from polling stations.

