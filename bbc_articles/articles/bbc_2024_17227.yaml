  Julio Derbis from Petare, one of the slums on the outskirts of the city, said: “We are going to fight, we hope with the pressure from the streets, we will overturn what the president is pretending, which is him sticking to power. "The police are our neighbours, we live side by side, and they need to understand that they need to unite in the fight for all of our common good.” Another protester, Karina Pinto, said these protests felt different to previous rounds of anti-government demonstrations. “We have to get on the streets, it is the only way. We don’t support violence, but they are violent. We have to respond," she said. “The security forces need to get on our side, they are Venezuelans too. They can’t be against us, we are the people."

  Supporters of Maduro also took to the streets and insist he won fairly

  In another section of the city, groups of President Maduro’s supporters also gathered to show their backing for him. Nancy Ramones, one supporter of the president, said: “I’m not protesting anything, I’m supporting my government, the one who won. Nicolás Maduro. And I’m supporting him because he is the man that represents peace.” “What the opposition say, they have not proved. If they say there is fraud, they have to prove it. And fraud hasn’t happened. They always have a hidden agenda. “This is a coup that we are not going to allow, we are patriots. We are Venezuelans, we love peace.” Milagros Arocha said: “Here the one who really won was Nicolás Maduro, here are the people, representing Nicolás Maduro. We want peace.”

  Opposition parties had united behind Mr González in an attempt to unseat President Maduro after 11 years in power, amid widespread discontent. Almost 7.8m people have fled the economic and political crisis which has rocked the country under the Maduro Administration. The United Nations' human rights chief has said he is deeply concerned about the increasing tension and violence in Venezuela. Volker Türk called on the authorities to respect the rights of all Venezuelans to assemble and protest peacefully.
