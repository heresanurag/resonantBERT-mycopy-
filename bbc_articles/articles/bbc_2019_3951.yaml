content: |-
  As soaring inflation in Venezuela creates a shortage of cash, people are turning to bartering.

  As soaring inflation in Venezuela creates a shortage of cash, people have turned to bartering, exchanging fish for different types of food and other goods.

  BBC Mundo's Guillermo Olmo reports from the Coconut Market in Puerto la Cruz, eastern Venezuela.
