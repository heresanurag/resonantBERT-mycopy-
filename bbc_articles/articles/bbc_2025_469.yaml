  King Charles to feature in new Amazon documentary

  King Charles is set to feature in a new documentary for Amazon Prime Video. Filming has already started, with the project expected to highlight his environmental charity work in the UK and overseas. The King has long been a champion of nature and green causes, and explored the themes in his 2010 book, entitled Harmony: A New Way of Looking At Our World. A Buckingham Palace source told BBC News that the King was "greatly looking forward" to seeing how the concepts from his book could be communicated to new audiences.

  The decision to partner with US media giant Amazon marks a departure for the Royal Family who have typically worked with British networks for big on-screen appearances. The exception is the Sussexes, who have a multi-million pound deal with rival streaming platform Netflix. Prince Harry and Meghan starred in a 2022 Netflix docuseries, called Harry & Meghan, about their relationship and their decision to step down as senior royals. Both were also named as executive producers for the recent Polo documentary, and Meghan also has a new lifestyle show on the streaming service. With Love, Meghan, will be out in March having been postponed due to the Los Angeles wildfires. Filming for the King's documentary is taking place at Dumfries House in Scotland. According to The Times, external, which first reported the news, a number of platforms were considered before Amazon was selected. The newspaper added that the film is due out at the end of this year or early 2026. As Prince of Wales, Charles spent decades campaigning and convening meetings to drive action on environmental issues. His 2010 book, which he co-authored with Tony Juniper and Ian Skelly, called for a shift in how everyone interacts with nature. As King he is subject to different rules - the monarch is obliged to remain politically neutral. But he has not cooled on climate action. In December 2023, he warned the COP28 climate summit in Dubai that "our survivability will be imperilled" unless humans restore the balance with the natural world. A Buckingham Palace source said: "It's astonishing, really, what has been put into practice since publication of the original book, 15 years ago, and how many of those pioneering ideas have been adopted in different ways. "This is a chance to 'show, not tell', how they can transform people, placed, and ultimately the planet. I think many will be genuinely amazed at the scale, scope and vision of it all, for which Dumfries House continues to be the 'living laboratory'."
