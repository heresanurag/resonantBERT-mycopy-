title: Brantham murder investigation sees third person arrested - BBC News
date: '2024-08-01'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/c147k57yx57o
content: |-
  A man in his 20s has been arrested on suspicion of murder and remains in custody.

  Anita Rose died in hospital after being attacked in Brantham

  A third person has been arrested after a dog walker was killed. Anita Rose, 57, had been walking close to Rectory Lane in Brantham, Suffolk before she was found unconscious on Wednesday, 24 July and died in hospital on Sunday. Police confirmed a man in his 20s, from the village, has been arrested on suspicion of murder and remains in custody. Another man, 45, was previously questioned on suspicion of murder while a woman, 37, was arrested on suspicion of handling stolen goods.

  Suffolk Police published a map detailing the route Ms Rose took the morning she was attacked

  They were both released on bail with conditions to return to police in October. It is believed Ms Rose left her house at 05:00 BST to take her springer spaniel, Bruce, on their usual walk in the area. At 06:25 she was found with serious head injuries on a track road by a member of the public. Officers were called by paramedics and arrived shortly after 08:00 and a cordon was set up. Ms Rose was taken to Addenbrooke's Hospital in Cambridge where she died four days later. A Home Office port-mortem examination was carried out on Monday but was unable to establish a cause of death. Suffolk Police said further tests would now be carried out.

  CCTV images showed the pink jacket Ms Rose was wearing which is still missing and could be a key piece of evidence

  The latest arrest followed anniversary checks by police in the area one-week on from the incident. Police handed out more than 1,200 leaflets containing information on the investigations. Officers were also on trains appealing to passengers who may have seen something as they passed by the incident a week ago. Det Supt Mike Brown said there had been "a strong response from the public". "Today alone, and following this morning’s anniversary checks, we have had nearly 40 responses via our public portal and have identified new potential witnesses," he added. The force is still appealing to find a missing pink zip-up jacket Ms Rose was wearing prior to the incident. Det Supt Brown said it "could hold key information or evidence to the investigation". He also urged people to refrain from speculating about the incident.

