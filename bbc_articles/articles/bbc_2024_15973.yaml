  Welsh Labour announces a timetable for a leadership election after Vaughan Gething resigned.

  Wales to have new first minister in September

  Vaughan Gething's tenure as first minister of Wales lasted 118 days before announcing he would resign

  Welsh Labour has confirmed it will elect a replacement for Vaughan Gething by the middle of September. The party's Senedd politicians have until noon on Wednesday to decide who they are backing in the leadership contest, triggered after the first minister announced his resignation last week. Mr Gething was forced out after three ministers and his chief legal adviser all quit on Tuesday. Party officials met on Saturday to agree plans for the election - the second the party has held this year.

  The timetable is quicker than the process used to elect Vaughan Gething between December and March, and will see a result announced on 14 September. Mr Gething will appear for a final first minister's questions in the Senedd on 17 September, with the new first minister to be formally installed the day after. To get on the ballot paper candidates will need the support of either five other Labour Members of the Senedd (MSs), or the combined support of two other MSs and some constituency Labour parties, or affiliated organisations. Nominations from Senedd members will open from 19:00 BST on Saturday, and close at 12:00 on Wednesday. The new leader will be elected by members of Welsh Labour and its affiliated organisations, including trade unions. Ballots will be sent out from 22 August and will need to be returned by 13 September.

  Vaughan Gething's former rival Jeremy Miles is expected to stand

  No Labour Member of the Senedd (MS) has yet declared that they intend to run as a candidate. One of the ministers who quit on Tuesday - former Economy Secretary Jeremy Miles - is expected to run. BBC Wales was told that he already has the support of enough of his colleagues to secure his place on the ballot paper. Supporters of Mr Gething claim Mr Miles would not be able to unite the Senedd Labour party. Three of his allies have told BBC Wales they would like to see Health Secretary Eluned Morgan run. Mr Miles was narrowly defeated by Mr Gething in the last leadership race. Other Members of the Senedd discussed as potential candidates are Transport Secretary Ken Skates and Climate Change Secretary Huw Irranca-Davies. There have been calls for a full-blown leadership race to elect Mr Gething's successor rather than a coronation, with former First Minister Mark Drakeford saying a contest could be a "cathartic experience" for the party. Mr Drakeford has also said he would “very much like” there to be a woman on the ballot.

  Splits have developed as a result of the controversy that has surrounded Mr Gething’s time in office. He came under pressure over his decision to accept donations amounting to £200,000 to his leadership campaign from a business owner who had twice been convicted for environmental offences. His decision to sack a minister for leaking messages to the media was also controversial, as was his failure to stand down after losing a no-confidence vote in the Senedd. In his resignation statement on Tuesday, Mr Gething said he had hoped a period of "rebuilding and renewal" would have been possible over the summer, but now realised "this was not possible". On Thursday, he told BBC Wales there were people who "have not been prepared to accept" the result of the last leadership contest.
