id: bbc_2019_11129
title: 'Australia fires: Bodycam footage shows Queensland evacuations - BBC News'
date: '2019-09-11'
section: General
url: http://www.bbc.co.uk/news/world-australia-49663869
content: |-
  The fire season has started earlier than expected, with over 160 fires reported in the east of the country.

  Queensland Police Service has released footage of evacuation efforts in a residential neighbourhood engulfed in flames.

  Wildfires have broken out across the state and neighbouring New South Wales.

  The wildfire season usually runs from October to April but fires have started earlier than expected this year and officials fear it could be the worst season in decades.
