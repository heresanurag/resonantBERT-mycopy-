title: Portugal's wildfire that broke a community - BBC News
date: '2018-07-24'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-44438505
content: |-
  For the towns where 66 people died in last June's forest fires, life will never again be normal.

  The fires that tore through central Portugal last June destroyed lives and left homes in ruins

  "It's been like this every day and it's always about the same thing. The fire."

  The phone rings incessantly at Sílvia Bento's desk in the Pedrógão Grande Mayor's office.

  It was on 17 June last year that a wildfire raged through this part of central Portugal, devastating an area four times the size of Lisbon, destroying hundreds of homes and killing 66 people.

  Many victims were trapped in their homes or in their cars as they tried to escape. It was the deadliest fire in Portuguese history.

  "It's like it was yesterday," says Sílvia Bento.

  A year on, the ferocity and the scope of this tragedy are marked by thousands of acres of black and brown mountains and valleys stretching as far as the horizon.

  Charred road signs in Pedrógão Grande betray the traumatic events of a year ago

  The constant buzz of chainsaws suggests work on reviving the area has begun. But a lack of funding, a lack of people and the sheer shock of the disaster mean it will take some time for this part of central Portugal to recover.

