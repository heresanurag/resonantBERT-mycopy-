title: Storm Bert amber snow warning extended in Scotland - BBC News
date: '2024-11-23'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cqxw1x9d5zno
content: |-
  Yellow weather warnings for snow are in place for much of Scotland this weekend.

  A snow plough clears a path in Aviemore in the Cairngorms

  A Storm Bert amber warning for snow has been extended in Scotland to cover the Borders, Dumfries and Galloway, East Ayrshire and South Lanarkshire. The Met Office alert was already in place for parts of the Highlands, Aberdeenshire, Perth and Kinross and Angus. Police Scotland has urged drivers not to take to the road on Saturday - with further yellow warnings for snow, wind and rain covering most of the country. The amber warnings come into force at 07:00, external with the weather likely to impact travel, events and power supplies in several areas.

  Transport Scotland said roads may be affected by deep snow, particularly over higher routes, and some rural communities might be cut off. Scotland's Deputy First Minister Kate Forbes strongly encouraged people to take precautions. She said: “All parts of the Scottish government resilience network stand ready to respond to the storm.” Temperatures have dipped below freezing all week, with snow and ice settling across the north of Scotland.

  Snow blankets the streets in Huntly, Aberdeenshire, on Friday night

  Bear Scotland, which looks after roads in the north west and south east, said restrictions may be needed on the Skye Bridge, Kessock Bridge, Dornoch Bridge, Cromarty Bridge and the Forth Road Bridge. The Queensferry Crossing will also be monitored for ice. Ian Stewart, from Bear Scotland, said: “We are fully prepped and are closely monitoring conditions and will act quickly when required. "Drivers of high-sided and wind-susceptible vehicles such as caravans and trailers should take particular care and check for restrictions.”

  Environment agency Sepa has issued flood alerts covering Aberdeenshire, Dundee and Angus, Tayside, and Dumfries and Galloway. Councils have already cancelled weekend Christmas light switch-on events in Perth and Renfrew. Saturday's League Two match between Elgin City and Clyde at Borough Briggs has also been postponed.

  A very festive scene on the A9 near Carrbridge in Cairngorms National Park

  ScotRail has urged people to check if their routes are affected throughout the weekend. Ferry operator CalMac has warned that services could be cancelled at short notice due to high winds. Some services to Islay and Colonsay have already been cancelled in anticipation of the severe weather. About 30 schools were closed in Aberdeenshire on Friday as well as 10 in the Highlands - and many others are opening later in the day. Moray Council said it was forced to close nine schools due to the weather. Forecasters have said Storm Bert will be quite slow moving and will only start to clear from Monday. Earlier this week, Scotland recorded its coldest early winter temperature since 1998 when Braemar in Aberdeenshire reached a low of -11.2C (-11.8F).

