content: |-
  Lando Norris crashes out of qualifying at the Saudi Arabian Grand Prix as Max Verstappen beats McLaren's Oscar Piastri to pole.

  Before qualifying it had looked like Max Verstappen would struggle to be as fast as McLaren pair Lando Norris and Oscar Piastri

  Coverage: Live radio commentary online and BBC 5 Sports Extra; live text updates on the BBC Sport website and app

  Championship leader Lando Norris crashed out of qualifying at the Saudi Arabian Grand Prix and will start 10th as Max Verstappen beat the Briton's McLaren team-mate Oscar Piastri to pole position. Verstappen in his Red Bull pipped Piastri by 0.01 seconds to take his second pole position of the year in scintillating style. Mercedes' George Russell was third, split from team-mate Andrea Kimi Antonelli by Ferrari's Charles Leclerc. Williams' Carlos Sainz beat Ferrari's Lewis Hamilton to sixth place, ahead of Red Bull's Yuki Tsunoda and Alpine's Pierre Gasly.

  Norris' crash interrupted the first runs of all his rivals in Q3 apart from Piastri, who laid down a marker just before his team-mate lost control over the kerb at Turn Five and slid sideways into the wall. When the session resumed, Verstappen went out on his semi-used tyres and took over top spot in his Red Bull from Piastri by just 0.001secs. The four-time world champion came straight back in to switch to fresh tyres and, while he warmed up, first Russell - and then Piastri - took top spot. But Verstappen signalled his intent with a first sector 0.123secs quicker than Piastri, aided significantly by a tow from team-mate Yuki Tsunoda on the pit straight which gained him 0.1secs. Although the Australian was quicker in both the second and third sectors, the Dutchman had done enough to grab pole. Verstappen said: "I definitely didn't expect to be on pole here but the car came alive in the night and it was a lot more enjoyable to drive. The grip was coming to me. Around here a qualifying lap is extremely difficult. It is really satisfying. "Tomorrow in the race it will be tough to keep them behind but we are going to give it a good go."

  Norris did not want to speak about his crash in interviews after qualifying

  Piastri said: "Max has done a good job, another high-speed circuit for them, where they seem to have a little more success. Our pace is good. It's going to be a tough race, the tyres are softer than last year and we'll see if that plays to our advantage." Norris will have to rely on the strong race pace of the McLaren to try to limit the damage to his championship position, as he starts the race three points clear of Piastri and eight in front of Verstappen. His accident was caused by him misjudging the entry to the chicane at Turns Four and Five. The car oversteered on to the kerb at Five and was flicked into the wall on the exit, damaging the left-hand side of the car. He swore over the radio that he was an "idiot", but was unhurt. "Disappointed but I'm fine," Norris said. "The team have a lot of work to do. It has been such a smooth positive weekend so far, so I'm disappointed to have such big setback. But have to take it on the chin, and try and go again tomorrow. "The car is quick. It has been quick all weekend, so I have to work hard to overtake the cars tomorrow." Russell said he had "mixed feelings" because he felt there was more in his car, adding that he rued Mercedes' decision not to use the same strategy as Red Bull after the red flag. At Ferrari, Hamilton's travails this season continued, underlined by the statistic that he has only once so far qualified higher than the seventh place he managed this weekend. "I've been nowhere all weekend," Hamilton said. "I am happier than I was yesterday. It really wasn't coming easy, so P7 is OK. I still have work to do to try to gel with this car."
