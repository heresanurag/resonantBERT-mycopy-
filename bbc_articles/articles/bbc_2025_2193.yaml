title: 'Mike Amesbury: MP jailed for 10 weeks for punching constituent - BBC News'
date: '2025-02-25'
section: England
url: http://www.bbc.co.uk/news/articles/cjd3nr4rr5lo
content: |-
  The MP was suspended by Labour after a video emerged showing him punching a man to the ground.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Suspended Labour MP Mike Amesbury has been jailed for 10 weeks after he admitted punching a man to the ground in his Cheshire constituency. Amesbury, 55, who represents Runcorn and Helsby as an independent MP, pleaded guilty to assaulting 45-year-old Paul Fellows after video footage emerged showing the confrontation. He had his Labour whip removed after the incident in Frodsham, Cheshire, which happened in the early hours of 26 October. Sitting at Chester Magistrates' Court, Deputy Chief Magistrate Tan Ikram said a pre-sentence report showed Amesbury's actions were the result of a "anger and loss of emotional control".

  Amesbury was taken down to the cells immediately and an application for bail pending an appeal was refused. Addressing the MP before handing down the jail term, the magistrate said: "I have to say that I have seen a single punch to the head cause fatal injuries, but note the limited injuries in this case. "I note that you, Mr Amesbury, continued to punch Mr Fellows when he was on the ground and continued to shout at Mr Fellows. I consider this more culpable. "You continued to attack when he was on the ground and it may have continued further had a bystander not intervened," the magistrate said. "You continued to rant, your position ought to be as a role model to others."

  Mike Amesbury was suspended by the Labour Party after admitting assault

  Passing sentence, the magistrate said the immediate custodial sentence was "necessary both as a punishment and a deterrent". He said he accepted the incident was one incident "in an otherwise unblemished career". "You have spent your life in public service and served in high office", he told Amesbury. But the magistrate said he was of "the view that unprovoked drunken behaviour is too serious to be dealt with unpaid work". Mr Ikram said he had also considered how the MP was "unlikely to re-offend". But he said: "You were only stopped from going further by members of the public."

  Richard Derby, representing Amesbury, asked the magistrate: "Is that an immediate sentence?" Mr Ikram nodded and replied: "Yes," before leaving the courtroom. Amesbury was then joined in the dock by two security guards who took him down to the cells.
  • None Who is MP Mike Amesbury and what happened? Mr Derby requested the judge come back into court as he wished to make an application for bail for Amesbury, pending an appeal against his sentence. Mr Ikram returned to court, sat down, paused briefly, and said: "Application refused." Amesbury was also ordered to pay £200 compensation to the victim, costs of £85 and a surcharge of £154.

  Following sentencing, a Labour Party spokesperson said: "The Labour Party took swift action following Mike Amesbury's completely unacceptable actions and he is no longer a Labour MP or a member of the Labour Party. "It is right that Mr Amesbury pleaded guilty and has now been sentenced. "Local residents in the Runcorn and Helsby constituency deserved better and we look forward to them getting the representation they deserve in the future with a new Labour MP."

  The jail sentence means voters in Amesbury's constituency can remove the independent MP from his seat with a recall petition. This can be called if a sitting MP is convicted of an offence that leads to jail time, or even a suspended sentence. More than 10% of voters must sign the petition in his Runcorn and Helsby constituency for a by-election to be triggered. A recall petition would also be triggered if the House of Commons decided to suspend him for 10 sitting days or more.

  Reform UK party chairman Zia Yusuf called for Amesbury to stand down so a by-election could be held. He said: "The great people of Runcorn deserve far better than waiting six weeks for a recall petition to take place."

  A further application for bail is expected to be heard at the crown court later this week.

