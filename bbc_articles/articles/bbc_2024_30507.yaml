title: UK's last Trafalgar submarine makes final voyage - BBC News
date: '2024-12-12'
section: UK
url: http://www.bbc.co.uk/news/articles/c938gwvxg2no
content: |-
  HMS Triumph travelled from Clyde naval base to Devonport, where it will soon retire from service after more than 20 years

  Commander of the Submarine Flotilla, Commodore Paul Dunn OBE, salutes HMS Triumph as she leaves HMNB Clyde.

  The Royal Navy's last Trafalgar-Class attack submarine has completed its final voyage from Scotland to be decommissioned. HMS Triumph sailed from HM Naval Base Clyde, at Faslane in Argyll, to HMNB Devonport in Plymouth to retire after more than 20 years in service. It was the last remaining of seven Trafalgar Class attack submarines deployed in operations around the world including Australia, Afghanistan and Libya. Clyde tugboats fired water cannons to send off the submarine and its 110-strong crew on Tuesday, before being welcomed by waving well-wishers as it sailed into Plymouth Sound.

  HMS Triumph is showered with water during a send-off by Clyde tugboats

  HMS Triumph arrived flying a decommissioning pennant as it was escorted by tugboats and vessels from Devonport. Commander Aaron Williams, HMS Triumph's commanding officer, said the Royal Navy would reflect on the legacy of HMS Triumph "with immense pride". He added: "The submarine has served not just as a vessel, but as a symbol of commitment, courage, and camaraderie. "While this chapter of HMS Triumph's story ends, her spirit will endure in the memories of all who served aboard her, and in the gratitude of the nation she helped protect."

  HMS Triumph sails down Gare Loch on a sunny winter day after leaving Clyde base

  HMS Triumph was laid down in Barrow shipyard in February 1987 and commissioned less than five years later in October 1991. The submarine deployed to Australia in 1993, travelling 41,000 miles submerged without support, which at the time was the longest solo deployment by a Royal Navy nuclear-powered submarine. The vessel later served in Afghanistan, launching Tomahawk missiles at targets, and was later deployed to Libya – again firing her weaponry at positions from the Mediterranean Sea.

  A warm welcome for the submarine from onlookers in Plymouth Sound

  Royal Navy director of submarines, Rear Admiral Andy Perks, said the farewell stirred emotions of both "pride and sadness". He added: "The last of the Cold War submarines, these vessels have helped keep our country safe for over 30 years." Triumph will be officially decommissioned in a ceremony in 2025 as the baton is fully passed to Astute-Class attack submarines. Five vessels - HMS Astute, HMS Ambush, HMS Artful, HMS Audacious and HMS Anson - are all currently in service and operating from HM Naval Base Clyde. A further two boats are under construction at BAE Systems in Barrow-in-Furness.

  Triumph arrives at Devonport where it will be officially decommissioned next year
