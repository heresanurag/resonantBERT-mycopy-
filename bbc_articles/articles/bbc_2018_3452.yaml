  The ParalympicsGB squad for the 2018 Winter Paralympics Games in Pyeongchang, South Korea from 9-18 March.

  Gregor Ewan, Aileen Neilson and Robert McPherson represented Scotland at last year's World Championship

  The 2018 Winter Paralympics will be held from 9-18 March in Pyeongchang, South Korea. Great Britain will be sending a team of 17 athletes to the event, the biggest representation since the Turin Games in 2006. The Games will feature up to 670 athletes, who will compete in 80 medal events across six sports. Four years ago in Sochi, the ParalympicsGB team had their most successful Games of modern times, winning six medals. Skier Kelly Gallagher won Britain's first Winter Paralympic gold medal, team-mate Jade Etherington claimed three silvers and a bronze to become GB's most successful Winter Paralympian of all time, and there was also a wheelchair curling bronze.

  Millie Knight and her guide Brett Wild will hope for more success in Pyeongchang

  World champions Millie Knight and guide Brett Wild will be among the GB squad for this year's Games after winning gold and silver in last year's World Championships in Italy. Snowboarders Owen Pick, Ben Moore and James Barnes-Miller will become the first athletes to represent Great Britain in the sport at the Paralympic Games as it builds on its successful debut in Sochi. Four of the five wheelchair curlers who won a medal four years ago will also be back in action, while Britain will also be represented in Para-Nordic skiing for the first time since 1998.

  (L-R) GB Paralympic athletes Jennifer Kehoe, Menna Fitzpatrick, Owen Pick, Ben Moore, James Barnes-Miller, Millie Knight and Brett Wild pose for a photo during the team announcement for Pyeongchang 2018 Alpine Skiing and Snowboard Team

