title: Kate drinks Guinness, pets mascot in St Patrick's Day celebration - BBC News
date: '2025-03-17'
section: General
url: http://www.bbc.co.uk/news/videos/cvg1z5pxx0no
content: |-
  The Irish Guards regiment toasts the Princess of Wales, who has been its colonel since 2023.

  The Princess of Wales has taken part in celebrations with the Irish Guards for St Patrick's Day.

  Soldiers raised their glasses to Catherine, who is the colonel of the regiment, and she sipped half a pint of Guinness.

  Earlier, the princess took the salute as colonel during a traditional march-past and presented the traditional sprigs of shamrocks to officers, guardsmen and Seamus, the regimental mascot.
