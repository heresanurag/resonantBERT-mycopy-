title: Nicholas Prosper jailed for minimum 49 years for killing family - BBC News
date: '2025-03-19'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c62kx26657xo
content: |-
  The judge says his plans were "intelligent, calculating and selfish" and his ambition was notoriety.

  Juliana Falcon, 48; Kyle Prosper, 16, and Giselle Prosper, 13, were found dead at their home in Luton in September

  A teenager who was planning a school massacre has been sentenced to a minimum of 49 years for the "horrific" shotgun murders of three members of his own family. Nicholas Prosper murdered his mother Juliana Falcon, 48, his brother Kyle, 16, and 13-year-old sister, Giselle, at their home in Luton on 13 September 2024. The 19-year-old was arrested in the hours after the murders on his way to his former primary school, where he planned to kill young children and teachers. At Luton Crown Court, Mrs Justice Cheema-Grubb told Prosper: "Your ambition was notoriety, you wanted to be known posthumously as the world's most famous school-shooter of the 21st Century.

  "The lives of your own mother, and younger brother and sister were to be collateral damage on the way to fulfil your ambition." His plan would have seen him kill 34 people in total; his family, followed by four-year-old children at his old school, two teachers and then, finally, himself.

  Mrs Justice Cheema-Grubb paid tribute to Prosper's family, whose noise as they were being killed alerted neighbours in their tower block in the Marsh Farm area of Luton. She said: "Juliana Falcon, Kyle Prosper and Giselle Prosper's deaths are almost certain to have saved the lives of many children. "The community owes them its gratitude and their memory should be honoured." After the killing Prosper wrote a note, which read: "I was right in predicting no-one would've called the police had I killed them in their sleep." The judge told him: "You remain highly dangerous and it may be you will never be released."

  The judge told Nicholas Prosper his plan was "intelligent, calculating and selfish"

  Prosper had initially refused to attend court but was ordered to do so by the judge. When he arrived he stared at the floor and did not stand while the judge passed sentence. She told him: "I am conscious that nothing I can do or say can reflect the worth of Juliana, Kyle and Giselle's precious lives or the depth of their shocking loss for their family and friends. "You intended to unleash disaster on the community of Luton. Your plans were intelligent, calculating and selfish. "Words such as heartless and brutal are insufficient to describe the horror of those last moments of the people who were closest to you."

