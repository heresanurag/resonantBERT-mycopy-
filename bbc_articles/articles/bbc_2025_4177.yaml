  Mitigating, David Bentley KC argued Prosper was living with an undiagnosed neurological development disorder in autism spectrum disorder (ASD), lacked any previous convictions and stressed his young age must be taken into account. The judge cited these as reasons for not issuing a whole life order, which would have meant Prosper could never leave prison. She rejected the submission that the disruption to Prosper's childhood caused by his parents separation when he was nine was a mitigating factor. His father, Ray Prosper, sobbed as the judge recounted his son's crimes and did not stop until after his son had left the court. He had previously told the court how part of his soul died when he first heard the news.

  Nicholas Prosper had planned to kill children at his former primary school

  Consultant forensic psychiatrist Dr Iain Kooyman said Prosper had traits of ASD. The judge said this explained why Prosper became obsessed with subjects he was interested in, such as school shootings and serial killers, which he was researching in the hours before his murders. Dr Kooyman also explained that ASD could be a reason why Prosper could not adapt his school massacre plan once it was interrupted. However the judge noted ASD did not "impair your ability to understand the nature of your conduct, exercise self-control or form rational judgments when you decided to commit violent crimes".

  Nicholas Prosper wanted to be remembered by the distinctive black and yellow outfit he wore during the school attack

  John Tizard, Bedfordshire's Police and Crime Commissioner (PCC), said he has written to the home secretary to request an "urgent review" of legislation relating to firearms sales and exchange in light of Prosper's crimes. Tizard, who was elected as Labour PCC last May, wants Yvette Cooper to look at the law and "make us all safer". Det Ch Insp Sam Khanna said: "Our thoughts today are first and foremost with Juliana, Kyle and Giselle and all who knew and loved them. "They should be who we remember, their names who we say, rather than the person who carried out these despicable murders and who intended to carry out an unimaginable level of harm to innocent school children. "In my entire policing career, which has included many years spent investigating murders, I have never encountered anyone capable of such horrific acts whilst showing no remorse."

  Speaking of the victims the judge said the community in Marsh Farm, Luton, owes them "gratitude and their memory should be honoured"

