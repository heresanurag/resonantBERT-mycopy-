  Prosecutor Timothy Cray KC said Prosper had deceived a private gun seller online using a forged shotgun licence to acquire his gun. When officers forced entry to his flat they found the bodies of his family who had been shot. His brother had also sustained more than 100 knife wounds. Prosper later flagged down a police car on nearby Bramingham Road after trying to hide the gun in some bushes, giving up on his deadly plans.

  Prosper had initially refused to attend the second day of his sentencing

  The judge recounted: "After arrest you displayed no signs of agitation or mental distress. You were inappropriately cheerful and engaged the officers in conversation. You asked if the local schools were locked down." The 19-year-old pleaded guilty to three counts of murder and admitted to purchasing or acquiring a shotgun without a certificate, possessing a firearm with intent to endanger life and possessing an article with a blade or point. He was given a life sentence and told he will serve a minimum of 49 years. He will serve 48 years and 177 days in prison once his time already served in remand had been deducted. Following Prosper's sentencing, Prime Minister Sir Keir Starmer's spokesperson said: "This is the most appalling crime - we thank the police involved on the day who acted quickly to stop this vile perpetrator from carrying out the full extent of his awful plans. "Our thoughts are with those who lost their lives and the wider community who were affected by this. "The case has exposed some deep and longstanding weaknesses in the private sale of firearms and we are urgently looking at how we can tighten those controls."

