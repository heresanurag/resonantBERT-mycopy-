title: The missing - consequences of Trump's immigration crackdown - BBC News
date: '2019-01-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42667659
content: |-
  In a rural county that voted for Trump, people are shocked to see friends and schoolmates deported.

  In a rural county that voted for Trump, people are shocked to see friends deported and schoolmates disappear. Now a community is coming to terms with the economic and emotional consequences.

  The Trump team insists the actions of the deportation force, Immigration and Customs Enforcement (ICE), is simply a matter of applying the law and delivering a key election pledge.

  This story is part of the BBC’s coverage of President Trump’s first year, with reporting from across the US and perspectives from all sides.
