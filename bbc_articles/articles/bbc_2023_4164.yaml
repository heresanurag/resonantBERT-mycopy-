title: 'Budget 2023: Chancellor announces £11bn more for UK defence - BBC News'
date: '2023-03-15'
section: General
url: http://www.bbc.co.uk/news/uk-politics-64953193
content: |-
  Britain will spend more on defence and it will rise to 2.5% of UK GDP, says the chancellor.

  Britain will spend more on defence and it will rise to 2.5% of the UK's GDP "as soon as fiscal and economic circumstances allow" the chancellor has said.

  Jeremy Hunt told MPs there would £30m extra support for ex-servicemen and women.

  UK will avoid recession and inflation to fall to 2.9%, says Hunt
