  Mr Sunak leant, over and over again, on the word "surrender" – the idea, as he sees it, of the country giving up and opting for a Labour government. Sir Keir instantly dismissed Mr Sunak’s claim of an extra tax bill of £2,000 under Labour as a “lie”. He had jabs too claiming Mr Sunak was out of touch. This felt like a far more competitive contest than the opinion polls persistently suggest this election is. A snap poll by YouGov suggested it was a dead heat, external.

  More in Common’s poll, external suggested Sir Keir did better, but also that Mr Sunak was judged better than expected by a greater proportion of the audience than Sir Keir. After five weeks of campaigning, the vast lead Labour has in the polls over the Conservatives hasn’t budged. So the precedent of that period - a little over a month - suggests that a little over an hour spent in a TV debate is unlikely to shift the dial. But all politicians grasp that even though the campaign is a vanishingly small window in the five-year election period, it is their zone of attention in which they must convince the people who decide their futures. And how people might vote will move quickly from being a hypothetical exercise to become a reality for the politicians next week. The need to woo, reassure, persuade even convince is never more acute in politics than right now. And this last set-piece event now done, the sprint finish to the end of this contest is under way.
