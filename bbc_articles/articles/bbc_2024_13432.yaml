content: |-
  With the election finish line nearing, the vast lead Labour has in the polls over the Tories hasn’t budged.

  Debates done - next the election sprint begins

  Rishi Sunak and Sir Keir Starmer faced off in a spiky TV debate - their last head-to-head before the general election on 4 July

  This was this campaign’s most free-flowing debate. Spared the shackles of outwardly noticeable rules and early campaign nerves, this was an evening freighted with the jeopardy of the imminence of the electorate’s verdict. Or to put it rather less pompously, Rishi Sunak and Sir Keir Starmer were really up for it. Postal votes perch on kitchen tables, big thoughts about how to vote in person perch uppermost in the minds of millions.

  Mr Sunak is the more comfortable of the two in this format; he wore the role of underdog with little to lose and with a confident, persistent scrutiny of his opponent. Sir Keir – with everything to lose - had his own frequent scripted put-downs and jabs of scepticism; a notable difference from their ITV outing three weeks ago. Here’s a little insight where my job as a reporter on the telly and radio overlaps with those in political leadership. Half the knack in a live environment is to dream up some memorable phrases which can be deployed in particular circumstances. They won’t all get an outing. Sometimes none of them do. But when the moment arises they are delivered with a flourish. And given half the chance if you’re a political leader, you deliver them over and over again. They are not written down. They are memorised and practised. They are a scripted ad lib, a contradiction in terms, literally, but a vital tool in this format. There was a shedload of them in this debate.

