id: bbc_2019_989
title: Mexico pipeline explosion kills and injures dozens - BBC News
date: '2019-01-19'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-46930795
content: |-
  It is believed the blast in Mexico occurred after the fuel pipeline was ruptured by suspected oil thieves.

  More than 70 people have been killed after an explosion at an oil pipeline in Tlahuelilpan, Mexico.

  Officials say dozens of people had been filling up containers from an illegal pipeline tap when fire broke out on Friday evening.

  There have been explosions at illegal taps before.

  The government is attempting to prevent fuel theft but some argue the strategy has led to fuel shortages.
