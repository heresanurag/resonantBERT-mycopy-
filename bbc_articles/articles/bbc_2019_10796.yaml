title: Back to school for £1m Fortnite gamer - BBC News
date: '2019-09-04'
section: General
url: http://www.bbc.co.uk/news/uk-49573628
content: |-
  Jaden Ashman is focussing on his GCSEs despite winning second place in the Fortnite World Cup.

  After winning about £1m for securing second place in the Fortnite World Cup competition, Jaden Ashman is back to school to focus on his GCSEs.
