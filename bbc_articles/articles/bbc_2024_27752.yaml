title: Speed of cricket balls cause row over Bingley housing scheme - BBC News
date: '2024-11-13'
section: England
url: http://www.bbc.co.uk/news/articles/cx2d5xez419o
content: |-
  Developers and Sport England disagree over the risk from cricket balls to future residents.

  Sport England said too little consideration over the risk of injury from flying cricket balls had gone into the plans

  A row over the speed of balls being hit by cricket batsmen could delay a major housing scheme. Developers were granted permission to convert an office building next to Crossflatts Cricket Club in Bingley into 139 flats subject to a cricket ball risk assessment over concerns about the risk to future residents of flying balls. Aire Valley Ltd submitted its assessment and has applied to have that planning condition removed to progress the development. However, Sport England said it had not been produced by a qualified consultant and underestimated the power of some of the players’ shots.

  An application to turn Aire Valley House into 139 flats was approved by Bradford Council

  The Local Democracy Reporting Service said the planning application to convert the office block on Croft Road into 139 flats was approved by Bradford Council in 2021, with work on its conversion starting late last year. However, when the risk assessment was submitted by developers in summer this year, its accuracy was queried by Sport England. Aire Valley House Ltd's assessment suggested a 10ft (3m) tall fence along a stretch of the club boundary would be enough to stop balls from landing in the new development.

  Work to convert the residential site next to the cricket club began late last year

  However, Sport England said: "The ball strike assessment doesn’t appear to have been undertaken via a specialist qualified consultant." The agency also noted the assessment "contains flaws in that cricket shots can be played 360 degrees off the crease with only shots from the furthest crease being measured on this report". Sport England said the speed at which professional players hit a ball should also have been considered, as Crossflatts Cricket Club played in an ECB Premier League which allowed tier five professionals. The agency said "residents, visitors and property at the application site could be at risk of both injury and damage from cricket balls". Bradford Council planners are to decide at a date to be determined if the developer's risk assessment meets the planning condition and can be dropped allowing the work to continue. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
