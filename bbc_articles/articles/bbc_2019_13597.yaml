title: 'General election 2019: SNP manifesto launch and NHS claims - BBC News'
date: '2019-11-27'
section: Election 2019
url: http://www.bbc.co.uk/news/live/election-2019-50569827
content: |-
  All of the political news and reaction, including the launch of the SNP election manifesto.

  The Metro leads on the YouGov poll which claims the Conservatives will win a majority of 68 seats in the general election Image caption: The Metro leads on the YouGov poll which claims the Conservatives will win a majority of 68 seats in the general election

  The Times says Mr Johnson is on course for a comfortable majority as a result of making gains at Labour's expense - based on the YouGov poll Image caption: The Times says Mr Johnson is on course for a comfortable majority as a result of making gains at Labour's expense - based on the YouGov poll

  The FT reports a warning from the Resolution Foundation - that a new Conservative or Labour government would be likely to break its budgetary rules. Image caption: The FT reports a warning from the Resolution Foundation - that a new Conservative or Labour government would be likely to break its budgetary rules.

  The Guardian leads on the story we've been bringing you reaction to all day - a dossier released by the Labour Party which, it claims, is "proof" the Tories want to "sell" the NHS in a US-UK trade deal. Image caption: The Guardian leads on the story we've been bringing you reaction to all day - a dossier released by the Labour Party which, it claims, is "proof" the Tories want to "sell" the NHS in a US-UK trade deal.

  Although different in style, the Mirror's front page isn't too different from the Guardian's in sentiment Image caption: Although different in style, the Mirror's front page isn't too different from the Guardian's in sentiment

  Refraining from a focus on the YouGov poll, the Telegraph's main story is Dominic Cummings' warning that the election is too close to call Image caption: Refraining from a focus on the YouGov poll, the Telegraph's main story is Dominic Cummings' warning that the election is too close to call
