title: Iran drone attack 'major escalation' - Israeli military - BBC News
date: '2024-04-14'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68810399
content: |-
  IDF's Daniel Hagari says his forces shot down most of Iran's "massive swarm" of drones and missiles.

  Israeli military spokesman Daniel Hagari has described Iran's attack as a "major escalation".

  Rr Adm Hagari said Iran had launched a "massive swarm" of drones and missiles at Israel late on Saturday. Most were shot down, he said.
