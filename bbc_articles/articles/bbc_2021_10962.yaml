title: NZ Prime Minister Jacinda Ardern's response to Auckland terror attack - BBC
  News
date: '2021-09-03'
section: General
url: http://www.bbc.co.uk/news/world-asia-58432042
content: |-
  Jacinda Ardern says a stabbing attack in Auckland was carried out by a person who was a "known threat".

  Police in New Zealand have shot dead a man after he entered an Auckland supermarket and stabbed multiple people.

  Six people were injured, three of them seriously.

  Prime Minister Jacinda Ardern said the attack was carried out by a person who was a "known threat".
