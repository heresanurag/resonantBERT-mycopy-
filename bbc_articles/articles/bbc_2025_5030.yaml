content: |-
  Archie Vaughan, son of Ashes-winning captain Michael, speaks to BBC Sport about managing expectations, his friendship with Rocky Flintoff and how lockdown helped him become an all-rounder.

  Archie Vaughan on living with his father's legacy

  Archie Vaughan signed his first professional contract with Somerset in May 2024

  Archie Vaughan had not even been born when his father Michael famously led England to Ashes glory in 2005, but the legacy of that series surrounds him. There are undoubtedly expectations that come with a surname etched in cricket history but Vaughan, now 19 and about to begin his second full season with Somerset, is unfazed. The teenage all-rounder is calm and humble, focused on building on a breakthrough season that saw him average 33.71 with the bat in the County Championship, take 15 wickets with his off-spin, including two five-wicket hauls, and then named England Under-19s captain against South Africa in January. "The pressure [of expectation] is just outside noise, it definitely doesn't come from my dad himself," Vaughan told BBC Sport. "He's been a massive influence but what I admire most is that he takes a step back and just lets me enjoy it, leaving my coaches to it. I can't thank him enough for leaving me to it and just letting me be my own man. "I didn't choose my surname, but it's something I've got to live with."

  Though he says he has not watched any footage of the iconic 2005 series with his dad, Vaughan is fully aware of its significance and the impact it had on the generations before him. He is not the only one carrying a legendary surname from that series. Vaughan's good friend Rocky Flintoff, son of former all-rounder Andrew, has gained plenty of attention for his performances with the bat for Lancashire and England Lions. A Vaughan-Flintoff reunion has already taken place at under-19 level, and Vaughan says it is helpful to have the shared experience of having famous cricketing fathers. "We've played together since we were kids and we've spoken about it a few times," he said. "It must be a big challenge for him, being only 16 with all that attention and noise. It's nice to have someone in the same boat. "He's such a great player, he'll be playing for England no matter what. But his dad's a bigger name than mine so he puts up with a lot more than I do."

  Archie Vaughan finished with match figures of 11-140 against Surrey in September 2024

  Having spent most of his youth focused on batting, Vaughan's success with the ball was somewhat unexpected, the highlight being match figures of 11-140 against eventual County Championship winners Surrey last September. Vaughan then started 2025 by taking 6-19 in the Youth Test against South Africa, which England Under-19s won by 10 wickets. Those are remarkable feats considering he turned to bowling spin out of boredom during the Covid-19 lockdown, having only bowled seam previously. "It definitely took me by surprise," said Vaughan. "I would still probably say I'm more of a batter, but I will keep working hard at both and it's just about managing my expectations again. "I haven't been bowling for very long, I only started it properly in my back garden during lockdown - whereas I've been batting for as long as I can remember." Vaughan accepts his family gave him a "great opportunity" to attend Millfield School and pursue his cricketing dream, but he is extremely driven to make the most of it. While he is not drawn on comparisons to his dad's batting and captaincy, Vaughan is confident elsewhere. "I'm pretty sure I'm a better off-spinner than him," he added. "And I'm definitely a better fielder." A lot has changed in the 20 years since one of cricket's greatest Test series. But with a Vaughan and a Flintoff emerging as two of the country's most exciting talents, it feels like a full-circle moment is upon us.
