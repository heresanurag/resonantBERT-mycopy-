title: Elon Musk smokes marijuana live on web show - BBC News
date: '2018-09-07'
section: Technology
url: http://www.bbc.co.uk/news/technology-45445554
content: |-
  The tech entrepreneur was offered a joint by a podcast host in California, where marijuana is legal.

  Musk was offered a joint by a podcast host during filming in California, where marijuana is legal

  Tech entrepreneur Elon Musk has smoked marijuana live on the web during a podcast with comedian Joe Rogan.

  Mr Rogan offered his guest the drug, which is legal in California, as the pair discussed tech innovation and the public's perception of Mr Musk.

  "I mean, it's legal, right?" asked the Tesla founder, before taking a drag on the joint.

  Tesla shares fell more than nine per cent following Mr Musk's appearance on the show.

  BBC business correspondent Kim Gittleson says the podcast appearance coupled with the departure of a key executive who blamed increasing public scrutiny of the company for his decision to leave has shaken investor confidence in Tesla.

  Last month, Mr Musk said he was not "on weed" when he tweeted about plans to make the electric car company a private firm.

  The business leader made the comments in an interview with the New York Times.

  He also told the newspaper he works "120-hour weeks" and takes sedatives.

  His controversial plans regarding Tesla's ownership were dropped about two weeks later, following outrage from some investors.

  Tesla saw its share price fall after Mr Musk's tweet

  Elon Musk has certainly had a wild summer.

  From his frequent tweet storms, to accusing a British rescue diver in Thailand of pedophilia, to a quick u-turn on an effort to take Tesla private - it's no wonder both investors and his closest friends have begun to worry.

  This latest incident certainly won't allay those concerns.

  But when it comes to Tesla, the erratic behaviour of Mr Musk might be the least of the company's problems.

  That's because the electric car maker has consistently struggled to hit its production targets, even as it's taken on more debt.

  Tesla has long been one of the most bet-against stocks on Wall Street. While that's something that has long frustrated Mr Musk, this certainly won't change that.

  Tesla's chief accounting officer Dave Morton said he had resigned after only one month in the role, citing "the level of public attention placed on the company" among his reasons.

  The firm's head of HR, Gaby Toledano, also announced she would not rejoin the company after a leave of absence.

  During the podcast, Mr Rogan offered Mr Musk a joint, which he said contained a mix of tobacco and marijuana - dried leaves and flowering parts of the female cannabis plant.

  Of 50 US states, recreational cannabis remains illegal in 41 - but it was legalised in California, where the podcast was filmed, in January.

  "Is that a cigar?" asked Mr Musk when his host first proffered the joint.

  He later added that he "almost never" smoked marijuana, noting, "I don't find that it is very good for productivity".

  The pair also enjoyed whiskey during the podcast recording.

  During their conversation, Mr Musk talked about his health and his management of Tesla - which he said was the most challenging of his various businesses and projects.

  To close the podcast, Mr Musk was asked if he had any concluding remarks.

  "I think people should be nicer to each other," he said.

  "And give... give more credit to others and don't assume they're mean until you know they're actually mean.

  "It's easy to demonise people, you're usually wrong about it, people are nicer than you think."
