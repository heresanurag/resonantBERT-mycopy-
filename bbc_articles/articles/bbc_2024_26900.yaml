content: |-
  A flight was delayed at Manchester Airport after a man "incorrectly" boarded it, EasyJet says.

  Man who got on 'wrong plane' arrested

  EasyJet said a passenger had "incorrectly" boarded the plane

  A flight was delayed at Manchester Airport after a man "incorrectly" boarded the plane, EasyJet has said. The BBC understands an airport passenger had been due to fly on another EasyJet flight but gained entry to the Milan-bound flight on Friday evening in error. All passengers had to disembark the plane as extra security checks were carried out in line with standard procedure. Greater Manchester Police (GMP) said a man had "embarked on a flight without the correct documentation".

  Nothing suspicious was found on board and there was no suggestion that it was terror-related. An EasyJet spokesman said that the flight was "subject to additional security checks, in line with procedures, due to a passenger incorrectly boarding the flight". "Safety and security is our highest priority and so we will now work with our ground partner at Manchester Airport to understand how he was able to board the flight." On Saturday, a GMP spokesman said a man in his 20s was arrested on suspicion of hiding himself with the purpose of "being carried in an aircraft without consent and intentionally or recklessly causing public nuisance". An EasyJet spokesman said the company was "not able to provide further details while [the investigation] is ongoing".
