title: Mark Zuckerberg's Meta donates $1m to Trump fund - BBC News
date: '2024-12-12'
section: Technology
url: http://www.bbc.co.uk/news/articles/c8j9e1x9z2xo
content: |-
  It appears to be the latest attempt by the Meta boss to build a closer relationship with the incoming president.

  Meta, the parent company of Facebook and Instagram, has donated $1m (£786,000) to an inauguration fund for President-elect Donald Trump. The tech giant's boss, Mark Zuckerberg, dined with Trump at his Mar-a-Lago resort in November, having sought to repair his and his firm's relationship with Trump following the election. Trump previously was highly critical of Mr Zuckerberg and Facebook - calling the platform "anti-Trump" in 2017. Meta is not believed to have made similar donations to President Joe Biden's inaugural fund in 2020 or to Trump's previous inaugural fund in 2016.

  The company confirmed its million-dollar donation to the inaugural fund to several outlets on Wednesday. Inauguration funds are used to pay for events and activities when a new president takes office - some consider them an attempt to curry favour with a new administration. The donation was confirmed by CBS, the BBC's US media partner, on Wednesday, and was first reported, external by the Wall Street Journal. The BBC has approached Meta for comment. Trump will be sworn in as the 47th US president on 20 January.

  Relations between Trump and Mr Zuckerberg historically have been far less cordial. They particularly soured when Facebook and Instagram suspended the former president's accounts in 2021, after they said he praised those engaged in violence at the Capitol on 6 January. Since then, Trump has waged a war of words against Meta - calling Facebook an "enemy of the people" in March. He said a law that would ban TikTok in the US unless sold off by its parent company, ByteDance, would unfairly benefit Facebook. In August, Mr Zuckerberg told Republican lawmakers in a letter that he regretted bowing to pressure from the Biden administration to "censor" some Facebook and Instagram content during the coronavirus pandemic. Trump wrote in a book published in September that Mr Zuckerberg would "spend the rest of his life in prison" if he tried to intervene in the 2024 election. But the president-elect appears to have since softened his position. He told a podcast in October it was "nice" Mr Zuckerberg was "staying out of the election", and thanked him for a personal phone call after he faced an assassination attempt. Still, Mr Zuckerberg isn't nearly as close to Trump as fellow tech titan Elon Musk. The Tesla and X owner has been dubbed Trump's "First Buddy" because of his extensive donations to his election campaign. That led to Mr Musk being placed in charge of a new Department of Government Efficiency (Doge). There has been no such rapprochement between Mr Musk and Mr Zuckerberg - although the cage fight between them that was once mooted now appears to be off.
