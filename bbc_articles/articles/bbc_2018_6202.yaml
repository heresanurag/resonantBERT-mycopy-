title: Harry and Meghan souvenir mugs are Derek's bestseller - BBC News
date: '2018-05-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-berkshire-44002973
content: |-
  Derek has been selling souvenirs near Windsor Castle for 37 years - and has even met the Queen.

  With more than 100,000 tourists expected in Windsor for the wedding of Prince Harry and Meghan Markle, souvenir sellers are filling their shelves.

  Derek has been selling them for 40 years, and has even spoken to the Queen about his window display.
