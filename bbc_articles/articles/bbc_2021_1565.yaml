title: Disruption as snow moves across Northern Ireland - BBC News
date: '2021-02-13'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-56052922
content: |-
  Yellow wind warnings are issued for parts of NI and the Republic of Ireland for Sunday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Heavy snow across all counties caused travel disruption but created spectacular scenery

  Heavy snow has caused disruption in Northern Ireland and a warning of strong winds has been issued.

  On Saturday transport was disrupted and some sporting fixtures were called off, with people advised to only make necessary journeys.

  Driving conditions were difficult on the Glenshane Pass

  The Met Office has issued a yellow warning for wind for counties Down and Antrim from 04:00 GMT on Sunday to 23:59.

  In the Republic of Ireland there is an orange warning for wind in some parts.

  Cairn Wood was a popular spot for people to enjoy a walk in the snow

  There were slippery, icy conditions in Northern Ireland on Saturday with snow accumulating even at low levels.

  Some roads in several counties were impassable.

  Snowboarders took to Prince of Wales Avenue at Stormont

  Public transport operator Translink suspended all bus services to and from Armagh city, while there was also disruption on the Belfast-Dublin and Belfast-Newry routes.

  Belfast City Council closed Roselawn Cemetery to visitors on Saturday because of the weather.

  In County Fermanagh people were urged to stay away from the Cuilcagh Boardwalk.

  In spite of efforts to clear snow from the Oval, the Glentoran v Coleraine match was postponed

  Parts of the path were inaccessible due to the weather and road access in the area was described as "hazardous".

  In football's Irish Premiership, Ballymena United v Linfield and Warrenpoint Town v Glenavon were both been called off.

  An impressive snowman from Patrick Rodgers in Cookstown County Tyrone, (l), and fun at Stormont, Belfast (r)

  The Glentoran v Coleraine match was postponed after a pitch inspection and kick-off in Portadown's fixture against Cliftonville was delayed by two hours.

  The snow eventually cleared to the east, with temperatures increasing to between 4C and 6C.

  Portstewart in County Londonderry was covered in a snowy blanket

  Saturday night will be cloudy and windy but mainly dry, with lows of 1C or 2C and icy conditions expected.

  Sunday will become milder with temperatures rising to 9C or 10C.

  The waterfall at Seacoast Road, Downhill, County Londonderry was frozen

  The Department of Agriculture, Environment and Rural Affairs has advised the public not to visit forests, country parks or nature reserves on Sunday.

  It said that was "due to increased risks associated with falling branches and debris".

  A little robin captured on camera in Belfast on Saturday morning

  In the Republic of Ireland, the meteorological service Met Éireann has issued an orange warning for wind in counties Donegal, Dublin and Mayo.

  It is warning of the risk of "coastal flooding".

  Sheep in the snow in Augher, County Tyrone

  The rest of the country is subject to a yellow warning for wind.

  Several thousand homes and businesses were without power for much of Saturday in the Republic of Ireland.

  A number of crashes were reported on Irish motorways, including an eight-car pile-up between junctions six and seven on the M3.
