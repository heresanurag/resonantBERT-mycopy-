title: 'Danielle McLaughlin: Man sentenced to life imprisonment for murder - BBC News'
date: '2025-02-18'
section: General
url: http://www.bbc.co.uk/news/articles/crkeyy0yx0zo
content: |-
  Danielle McLaughlin, from County Donegal, was raped and murdered while she was touring around India.

  Danielle McLaughlin's mother said she would always be remembered for her "spirit, kindness and laugh"

  A man found guilty of raping and murdering a 28-year-old Irishwoman who was backpacking in India has been sentenced to life imprisonment. Danielle McLaughlin, from County Donegal, was found dead in a field in the western state of Goa in March 2017. Vikat Bhagat was convicted at the District and Sessions Court in south Goa, India, on Friday. Prosecutors involved in the case had asked for Bhagat to be sentenced to death over the death of Ms McLaughlin, who held both Irish and British passports.

  Vikat Bhagat was found guilty by an Indian court on Friday

  On Monday, the court sentenced Bhagat to "rigorous" life imprisonment for murder. He also received a second life term for rape, and three years for destroying evidence. All the sentences will run concurrently. Speaking to the media, the defence counsel for Bhagat, Adv Franco, said his client would be appealing against the conviction and sentence. Vikram Verma, who assisted the prosecution during the trial, said: "It was a difficult task for the prosecution to put together all the circumstantial evidence to convince the court beyond reasonable doubt about this conviction." He added that their hard work had been recognised. The investigating officer described it as a "very sensitive case". Insp Filomina Costa added: "The verdict today is quite satisfactory." Rape victims cannot usually be named under Indian law. Their identities are often hidden in a bid to protect them from being shunned in society. However, throughout their eight-year campaign for justice, Ms McLaughlin's family have spoken to the media to raise awareness of her case.

  Reacting to the sentencing, the McLaughlins' solicitor, Des Doherty, said: "For Andrea, [Danielle's mother] the road to truth and justice has been a very long and very difficult one. "She has had a lot of help and assistance from both the British and Irish consulate staff, as well as Mr Verma." Mr Doherty told BBC Radio Foyle's North West Today programme that despite the length of time the case had taken, Danielle's mother was thankful she was heavily involved in the legal process. He said she had "achieved what she set out to achieve". "Andrea stayed with the Indian legal process, difficult as it was, and that has now worked in her favour," he added.

  Danielle McLaughlin was killed two weeks after she arrived in India

  Danielle's mother and sister had travelled to Goa for the conclusion of the case after an online fundraiser was set up to help cover the costs of their journey. Reacting to the conviction on Friday, Andrea Brannigan said she was "glad and relieved" that the case was over. She said that although the family had secured justice, it would not bring Danielle back. "I lost my eldest daughter, she was stolen from us, she was stolen from her sisters and friends," she said. "She was also stolen the opportunity of becoming a mother herself." Ms Brannigan said her daughter would always be remembered for her "spirit, kindness and laugh". Ms McLaughlin's sister Joleen said her family could have never given up on their campaign to bring her killer to court, regardless of the length of time it took. "We thought maybe Danielle wouldn't matter here because she was a foreigner, but as the public prosecutor said on the day in court: a woman is a woman, regardless," she said. "They made sure her voice was heard and that she mattered just as much as any local. We are really thankful for that." The guilty verdict meant their family "can finally start grieving now for Danielle", she added.

  Ms McLaughlin grew up in Buncrana and was said to be a gifted student of drama and dance. On a previous trip to India she had volunteered in an orphanage. She returned to the country in February 2017, this time with hopes of working as a yoga teacher. However, she was murdered two weeks after her arrival. She had been staying in a beach hut with an Australian friend and they went to a nearby village to celebrate Holi, a Hindu festival. Ms McLaughlin left the village on the night before she was found dead. Her mother later told journalists she was not happy with the place she was staying and asked a man she believed was her friend for help to find new accommodation. Her body was discovered the next day by a local farmer in a field. A post-mortem examination found that the cause of her death was brain damage and strangulation. A Newry-based charity, the Kevin Bell Repatriation Trust, assisted her family to take her remains back to the Republic of Ireland. The priest at her funeral said she had had a "kindly heart and searching mind" and an extensive international circle of friends.
