  Luke Littler is another of sport's teenage prodigies, but is he younger or older than some of his peers when they first conquered the world?

  Quiz: Were these champions older or younger than Littler?

  Luke Littler made history as the youngest winner of the PDC World Darts Championship in a thrilling final against Michael van Gerwen. The Warrington teenager achieved the feat 18 days before he turns 18 on 21 January. But Littler is not the only sportsperson to have reached their pinnacle of their sport at a young age. Which champions were older or younger than "The Nuke" when they won some of their sport's biggest prizes? Have a go at our quiz...
