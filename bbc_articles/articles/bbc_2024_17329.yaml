  Team GB will go for a first swimming gold at the Paris Olympics after the 4x200m freestyle relay team qualified in first place for the final on Tuesday. The quartet of James Guy, Jack McMillan from Northern Ireland, Wales' Kieran Bird and Tom Dean set a time of 7:05.11 to progress. Two-time Olympic gold medallist Guy led GB away in first place, which was maintained by McMillan and Bird. Tokyo medallist Dean held off a late charge by Australia to secure GB's spot in the final as the fastest qualifiers. Matt Richards and Duncan Scott are likely to return to the relay team for the freestyle final at 21:15 BST. Adam Peaty and Richards have both won silver medals in the pool but Team GB are yet to secure a gold at the La Defense Arena.

  Team GB will go for gold in the 4x200m freestyle relay at 21:15 BST

  Earlier in the pool on Tuesday, Anna Hopkin and Richards qualified for the semi-finals of their respective 100m freestyle events. Hopkin was fourth in her heat with a time of 53.67 seconds, behind Australia's Mollie O'Callaghan and Shayna Jack, and home favourite Beryl Gastaldello. Her time was good enough to qualify in 10th position for the semi-finals, which take place from 20:30 BST. In the men's 100m freestyle, Welsh swimmer Richards, who missed out on gold in the men's 200m freestyle by just 0.02secs on Monday, progressed in 13th place in a time of 48.40. Richards will return to action at 19:30 BST for his semi-final. However, there was disappointment for Jacob Whittle, who missed out on progressing by 0.6secs. Also on Tuesday night, Daniel Wiffen will look to become the first Olympic gold medallist from Northern Ireland in 36 years when he competes for Ireland in the men's 800m freestyle final at 20:05 BST.
