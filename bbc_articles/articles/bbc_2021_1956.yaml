title: 'As it happened: Covid: Contact NHS if you haven''t had jab, over-70s told
  in England - BBC News'
date: '2021-02-08'
section: UK
url: http://www.bbc.co.uk/news/live/uk-55977904
content: |-
  The decision to get vaccinated against Covd "could save your life", says NHS England medical director.

  The next question comes from the Guardian about international travel. Should people be prepared for tougher restrictions on travel until there is widespread vaccination?

  Matt Hancock says: "The proportion of cases coming from abroad at the moment is obviously very low, not least because it's currently illegal to go on holiday anyway.

  "Of course we want to lift these measures... as soon is safely possible.

  "But until we know, we need to know more about the impact of the vaccines on all these different variants and therefore for now, the precautionary principle is the right approach."

  Prof Van-Tam is asked whether it is too early to book summer holidays in the UK.

  "Thanks for the question and I can't answer it. I think it's just too early to say," he replies.

  "We don't yet have the read-outs on the success of the vaccine programme although I expect we'll start to see these in one to two weeks."

  "The more elaborate your plans are for the summer holidays in terms of crossing borders, in terms of household mixing, given where we are now, I think we just have to say, the more you're stepping into making guesses about the unknown at this point.

  "I can't give people a proper answer at this point. We don't yet have the data, it's just too early."
