  First Minister John Swinney said it was a "deeply troubling" situation and denied there has been a lack of action by the Scottish government over the closure. Scottish Secretary Ian Murray said the UK government did everything it could, but Petroineos "didn’t countenance having a discussion” about keeping the refinery open. Unions said the facility should have remained open longer to provide time for a green alternative to be established. Derek Thomson of the Unite union said: "The failure of government to plan properly for a just transition will leave thousands of people out of work at Grangemouth but also thousands in the future if we don’t get it right." The refinery was opened by BP in 1924 and expanded into petrochemicals in the 1950s. It is the main supplier of aviation fuel for Scotland's airports and a major supplier of petrol and diesel ground fuels across the Central Belt. Ineos acquired the site in 2005 and are responsible for the entire plant, while the refinery itself is owned by Petroineos - a joint venture between Ineos and PetroChina.
