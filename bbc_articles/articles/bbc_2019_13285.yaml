title: 'Japan''s Emperor Naruhito: Festival celebrates enthronement - BBC News'
date: '2019-11-10'
section: General
url: http://www.bbc.co.uk/news/50364044
content: |-
  Tens of thousands gather in Tokyo to celebrate the enthronement of Emperor Naruhito.

  Tens of thousands of people gathered in Japan's capital, Tokyo, to celebrate the enthronement of the country's Emperor Naruhito.

  Dancers, musicians and flag-waving well-wishers marked the occasion during a festival on Saturday.

  On Sunday, the royal couple paraded in a convertible car along a 4.6-km (2.9-mile) route from the palace to their residence in central Tokyo to mark the enthronement.

  The event was originally scheduled for 22 October but postponed after more than 80 people were killed when Typhoon Hagibis hit Japan and caused widespread damage.
