id: bbc_2018_232
title: 'Russia probe: Trump ''looking forward'' to FBI interview - BBC News'
date: '2018-01-25'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42817403
content: |-
  President Trump has said for the first time he is willing to be interviewed under oath by the FBI.

  Investigators are assessing if the Trump campaign colluded with Russia to influence the election in his favour - a claim denied by Mr Trump and Russia.
