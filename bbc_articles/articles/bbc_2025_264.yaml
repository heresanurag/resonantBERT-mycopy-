title: China's young workers - overqualified and in low-paying jobs - BBC News
date: '2025-01-04'
section: Asia
url: http://www.bbc.co.uk/news/articles/ce8nlpy2n1lo
content: |-
  With high youth unemployment rates, Chinese graduates are resorting to working as waiters, cleaners and movie extras.

  Sun Zhan, 25, graduated in finance. He now works as a hotpot waiter in Nanjing, in eastern China

  China is now a country where a high-school handyman has a master's degree in physics; a cleaner is qualified in environmental planning; a delivery driver studied philosophy, and a PhD graduate from the prestigious Tsinghua University ends up applying to work as an auxiliary police officer. These are real cases in a struggling economy - and it is not hard to find more like them. "My dream job was to work in investment banking," says Sun Zhan as he prepares to start his shift as a waiter in a hot pot restaurant in the southern city of Nanjing. The 25-year-old recently graduated with a master's degree in finance. He was hoping to "make a lot of money" in a high-paying role but adds, "I looked for such a job, with no good results". China is churning out millions of university graduates every year but, in some fields, there just aren't enough jobs for them. The economy has been struggling and stalling in major sectors, including real estate and manufacturing. Youth unemployment had been nudging 20% before the way of measuring the figures was altered to make the situation look better. In August 2024, it was still 18.8%. The latest figure for November has come down to 16.1%. Many university graduates who've found it hard to get work in their area of selected study are now doing jobs well below what they're qualified for, leading to criticism from family and friends.

  When Sun Zhan became a waiter, this was met with displeasure by his parents. "My family's opinions are a big concern for me. After all, I studied for many years and went to a pretty good school," he says. He says his family is embarrassed by his job choice and would prefer he tried to become a public servant or official, but, he adds, "this is my choice". Yet he has a secret plan. He's going to use his time working as a waiter to learn the restaurant business so he can eventually open his own place. He thinks if he ends up running a successful business, the critics in his family will have to change their tune. "The job situation is really, really challenging in mainland China, so I think a lot of young people have to really readjust their expectations," says Professor Zhang Jun from the City University of Hong Kong. She says many students are seeking higher degrees in order to have better prospects, but then the reality of the employment environment hits them. "The job market has been really tough," says 29-year-old Wu Dan, who is currently a trainee in a sports injury massage clinic in Shanghai. "For many of my master's degree classmates, it's their first time hunting for a job and very few of them have ended up landing one." She also didn't think this was where she would end up with a finance degree from the Hong Kong University of Science and Technology. Prior to this, she worked at a futures trading company in Shanghai, where she was specialising in agricultural products. When she returned to the mainland after finishing her studies in Hong Kong, she wanted to work in a private equity firm and did get some offers but was not happy with the conditions. That she didn't accept any of them and instead started training in sports medicine was not welcomed by her family. "They thought I had such a good job before, and my educational background is quite competitive. They didn't understand why I chose a low-barrier job that requires me to do physical work for little money." She admits that she couldn't survive in Shanghai on her current salary, if not for the fact that her partner owns their home. At first, she didn't know anyone who supported her current career path, but her mother has been coming around after she recently treated her for her bad back, significantly reducing the pain she had been experiencing. Now the one-time finance student says she feels that a life working in the investment world actually doesn't suit her after all. She says she is interested in sports injuries, likes the job and, one day, wants to open her own clinic.

  Wu Dan, 29, says she couldn't find a job in finance with good conditions. She is now a trainee in a sport massage clinic

  Chinese graduates are being forced to change their perceptions regarding what might be considered "a good position", Prof Zhang says. In what might be seen as "a warning sign" for young people, "many companies in China, including many tech companies, have laid off quite a lot of staff", she adds. She also says that significant areas of the economy, which had once been big employers of graduates, are offering sub-standard conditions, and decent opportunities in these fields are disappearing altogether. While they work out what to do in the future, unemployed graduates have also been turning to the film and television industry. Big budget movies need lots of extras to fill out their scenes and, in China's famous film production town of Hengdian, south-west of Shanghai, there are plenty of young people looking for acting work. "I mainly stand beside the protagonist as eye candy. I am seen next to the lead actors but I have no lines," says Wu Xinghai, who studied electronic information engineering, and was playing a bodyguard in a drama. The 26-year old laughs that his good looks have helped him become employed as an extra. He says people often come to Hengdian and work for just a few months at a time. He says this is a temporary fix for him too, till he finds something permanent. "I don't make much money but I'm relaxed and feel free."

  Many young graduates travel to Hengdian to work as movie extras in the studios' productions

  "This is the situation in China, isn't it? The moment you graduate, you become unemployed," says Li, who didn't want to give his first name. He majored in film directing and screenwriting and has also signed up to work as an extra for a few months. "I've come here to look for work while I'm still young. When I get older, I'll find a stable job." But many fear they'll never land a decent job and may have to settle for a role unlike what they had imagined. The lack of confidence in the trajectory of the Chinese economy means young people often don't know what the future will hold for them. Wu Dan says even her friends who are employed can feel quite lost. "They are quite confused and feel that the future is unclear. Those with jobs aren't satisfied with them. They don't know for how long they can hold onto these positions. And if they lose their current job, what else can they do?" She says she will just "go with the flow and gradually explore what I really want to do".
