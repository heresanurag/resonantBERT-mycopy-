title: Donald Trump safe and suspect held after man spotted with rifle - BBC News
date: '2024-09-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c3rllnd1pypo
content: |-
  A gunman pointed a rifle at the former president on his Florida golf course, in what the FBI calls an apparent assassination attempt.

  Trump rushed to safety and suspect held after man spotted with rifle

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Former President Donald Trump is safe following an apparent assassination attempt at his Florida golf course on Sunday afternoon, and a "potential suspect", named as Ryan Routh by several media outlets, is in custody, US authorities have confirmed. Secret Service agents spotted the barrel of a rifle poking through some bushes and opened fire at him, officials said. The FBI said Trump was 300-500 yards (275 to 455m) away at the time. A witness reported seeing the suspect emerging from some bushes and jumping into a black Nissan car after the agents had fired at him a number of times. An AK47-style firearm and scope, along with two backpacks and a GoPro camera, were later found at the scene.
  • None Follow live: Trump targeted in apparent assassination attempt at golf course, says FBI The witness took a picture of the vehicle and number plate and it was stopped later in Martin County, north of the club. "We got a hold of Martin County Sheriff's Office, alerted them, and they spotted the vehicle and pulled it over and detained the guy," said Sheriff Ric Bradshaw of Palm Beach County. "After that, we took the witness that witnessed the incident, flew him up there and he identified as the person that he saw running out of the bushes, that jumped into the car," the sheriff told a news briefing. It is unclear whether or not the gunman fired at either the former president or the agents. “We are not sure right now if the individual was able to take a shot at our agents, but for sure our agents were able to engage with the suspect," said Rafael Barros from the Secret Service Miami Field Office.

  In an email to his supporters, Trump said he was "safe and well". "Nothing will slow me down," he wrote. "I will never surrender!" The incident comes almost exactly two months after a gunman attempted to assassinate Trump at a rally in Butler, Pennsylvania, striking his ear. The Secret Service confirmed in a post on X that they were investigating a "protective incident" involving Trump that took place shortly before 14:00 EDT (19:00 BST) on Sunday.
  • None What we know so far about Trump assassination attempt

