title: 'Watch: BBC correspondent records moment air strike hits Beirut - BBC News'
date: '2024-09-27'
section: General
url: http://www.bbc.co.uk/news/videos/cd0zvj0y9d7o
content: |-
  BBC reporters capture the moment and aftermath of an Israeli air strike in southern Lebanon.

  Plumes of smoke were seen across Beirut as the city has been rocked by multiple blasts.

  The moment of one of the explosions was captured by BBC World Service correspondent, Nafiseh Kohnavard.

  The BBC's Middle East correspondent, Hugo Bachega, reported from a car as he described scenes of chaos in the Dahieh district.

  Israel's military says it attacked Hezbollah's "central headquarters" in the Dahieh neighbourhood, a Hezbollah stronghold.
