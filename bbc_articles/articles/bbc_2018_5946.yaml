title: 'Shoreham air crash: Pilot Andy Hill denies manslaughter of 11 men - BBC News'
date: '2018-05-15'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-44120620
content: |-
  Andy Hill's Hawker Hunter jet crashed on to the A27 in West Sussex during an air show in 2015.

  Mr Hill has denied all the charges and will face a trial next year

  A pilot has denied the manslaughter of 11 men who died when his plane crashed during the Shoreham Air Show.

  Andy Hill, 54, of Sandon in Hertfordshire, survived after his Hawker Hunter came down on the A27 in West Sussex in August 2015.

  Mr Hill appeared at The Old Bailey charged with 11 counts of manslaughter by gross negligence and one count of endangering an aircraft.

  He pleaded not guilty to all charges.

  A trial date has been set for 14 January and is expected to last at least five weeks.

  The Hawker Hunter jet plummeted on to the A27 on 22 August 2015

  The Shoreham Airshow has not been staged again since the disaster

