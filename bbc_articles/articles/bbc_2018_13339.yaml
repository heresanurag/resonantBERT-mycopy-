title: Video of 'pushy' dad helping son save goal goes viral - BBC News
date: '2018-11-10'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-46155437
content: |-
  A children's game gains a Premier League-sized audience after a father's "hilarious" intervention.

  This video can not be played To play this video you need to enable JavaScript in your browser. A dad about to push his goalkeeper son to stop the ball going into the net

  When Phil Hatfield was watching his son, six, play football, he could not resist giving him a "helping" hand.

  Little did he know the moment would be seen by more than 18 million people.

  The video of the children's game between Bow Street and Llanilar, near Aberystwyth, shows under-8s goalkeeper Osian saving a shot - but only after being pushed on to the ball.

  Mr Hatfield told BBC Wales he would be staying on the touchline and keeping quiet during future games.

  "All the action had been on the other half of the field... he hadn't had much to do," he said.

  "So I went over to try and keep him focused, keep him going and shouting instructions... he came towards me because he hadn't heard what I said and [I was] just trying to guide him back to position, and he fell over."

  Former Wales and Everton goalkeeper Neville Southall offered some advice for budding goalie Osian, tweeting: "Keep hold of first ball".

