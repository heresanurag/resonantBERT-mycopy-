title: Bison charges at nine-year-old girl at Yellowstone National Park - BBC News
date: '2019-07-25'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-49120387
content: |-
  The nine-year-old child was part of a group of tourists who were reportedly too close to the animal.

  A nine-year-old child was charged by a bison in Yellowstone Nation Park after a group of tourists reportedly came too close to the animal.

  She was treated by a park emergency official and later released.
