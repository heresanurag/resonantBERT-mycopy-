  When I asked Home Secretary Yvette Cooper if she believed Wednesday night marked an end to the violence she told me the government was “not going to take its foot off the pedal on this”. “The police and the criminal justice system all have our strong support to keep going and keep making sure criminals pay the price for the kind of violent disorder, the thuggery, the extremism and the intimidation we have seen in communities. We will not stand for this violence,” she said. “We are going to continue with this strong policing response, making sure there are additional police officers ready to respond, and also making sure we continue with prosecutions and with taking cases rapidly to court and getting sentences.” Bringing those cases to court so quickly has taken an enormous effort by investigators. They have pored over body-worn video and CCTV, and made use of facial recognition technology to match people in riot footage against known offenders. Faced with overwhelming evidence, many of the rioters have pleaded guilty in order to reduce their sentences by a third. For example, at Liverpool Crown Court, had Derek Drummond not pleaded guilty to punching a police officer, his three-year sentence is likely to have been four-and-a-half years. And there are many others due to appear in court over the coming days in relation to this extraordinary week of violent disorder.
