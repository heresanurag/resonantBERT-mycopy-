title: Bridgend MP Jamie Wallis fined for road traffic offence - BBC News
date: '2022-02-15'
section: Wales politics
url: http://www.bbc.co.uk/news/uk-wales-politics-60332680
content: |-
  Conservative Bridgend MP Jamie Wallis is fined a total of £270 and given three penalty points.

  The MP for Bridgend has been fined for a road traffic offence.

  Jamie Wallis, 37, of Cowbridge, admitted to failing to comply with solid white line road markings.

  The charge relates to an incident in August last year on the A48 and the case was dealt with via the Single Justice Procedure at Cardiff Magistrates' Court.

  Mr Wallis was fined a total of £270 and had three penalty points added to his licence.
