content: |-
  Footage posted on social media by Ukraine's President Volodymyr Zelensky shows smoke rising from Ohmatdyt Children's Hospital and blown out windows.

  A children's hospital has been seriously damaged in the Ukrainian capital Kyiv, with the city's mayor saying there had been casualties from a Russian strike.

  Footage posted on social media by Ukraine's President Volodymyr Zelensky shows smoke rising from Ohmatdyt Children's Hospital, and broken windows inside the now deserted medical facility.

  More than 25 people were killed in attacks around the country on Monday morning.

