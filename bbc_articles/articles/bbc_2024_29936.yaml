  The family of Alice Webb, 33, gather to remember the mum who died after undergoing a Brazilian Butt Lift.

  Funeral for mum who died after BBL procedure

  A funeral has been held for a woman who died after undergoing a Brazilian Butt Lift (BBL) procedure. The family of mother-of-five Alice Webb, 33, walked behind her coffin which was pulled by two white horses as they made their way to St Mary's Church, in Kingswood. Ms Webb died at Gloucestershire Royal Hospital in the early hours of 24 September when she suffered complications following the BBL procedure, which involved cosmetic fluid being injected into her buttocks. Two people have been arrested on suspicion of manslaughter in connection with her death and released on bail.

  An inquest into Ms Webbs' death was opened and adjourned at Gloucestershire Coroner's Court last month. The coroner stated the medical cause of death had not yet been confirmed and further investigation is needed. BBL is a treatment designed to make buttocks bigger, more rounded or lifted. It can be offered as a surgical or non-surgical procedure. Surgical BBLs involve inserting silicone-filled implants and/or removing fat from other parts of the body before injecting it into the buttocks. Non-surgical BBLs - like the one Ms Webb is believed to have had - involves injecting dermal filler into the buttocks.

  Her family are now backing a Save Face campaign, external for a new law in her name, calling for more regulation in the industry. Save Face is calling for the enactment of 'Alice’s Law', which would make it illegal for anyone other than a registered Plastic Surgeon on the GMC specialist register, operating from a CQC regulated environment, to perform buttock augmentation procedures using hyaluronic acid dermal fillers. Speaking to Save Face, Ms Webbs' family said: "Alice’s death has left a huge void in our family, one that can never be filled. "We are devastated by the overwhelming feeling of grief, loss, and anger because her death should never have been allowed to happen."
