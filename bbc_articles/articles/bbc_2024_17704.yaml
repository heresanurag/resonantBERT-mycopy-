title: James Corden delays play to watch England on stage - BBC News
date: '2024-07-07'
section: General
url: http://www.bbc.co.uk/news/videos/cljywwzd497o
content: |-
  The actor pushed back the start of The Constituent so the cast and audience could watch the Euros.

  James Corden delayed the start of his play The Constituent on Saturday so the cast and audience could watch England's penalty shootout against Switzerland.

  The performance was scheduled to start just as the shootout was due to begin.

  The actor brought his mobile phone on stage at London's Old Vic theatre to watch the end of the match, which England won after beating the Swiss side 5-3 on penalties.

  One audience member said the play began about 10 minutes late but "no one at all minded".
