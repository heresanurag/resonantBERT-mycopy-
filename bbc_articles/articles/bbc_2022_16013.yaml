id: bbc_2022_16013
title: Ukraine’s missile graveyard 'is evidence against Russia’ - BBC News
date: '2022-12-13'
section: General
url: http://www.bbc.co.uk/news/world-europe-63951794
content: |-
  Prosecutors want the collection of more than 1,000 munitions to be used in any future court action.

  Ukraine’s second city, Kharkiv, has suffered from heavy Russian shelling and air strikes since the start of the war in February.

  Officials there told the BBC they have been collecting the remains of Russian munitions fired at the city, including fragments of missiles and rockets.

  Local prosecutors say the missiles caused the deaths of hundreds of civilians and hope the casings can serve as evidence in any future court action against Russia.
