title: Education agent recruits bogus students at private college - BBC News
date: '2017-11-13'
section: General
url: http://www.bbc.co.uk/news/education-41963557
content: |-
  Undercover investigation reveals how a recruitment agent is helping bogus students cheat the student loan system.

  A BBC Panorama investigation has uncovered evidence of abuse of the government's student loan system in one of the biggest private colleges in England.

  The Greenwich School of Management (GSM) and its students receive around £66m a year in maintenance and tuition fee loans.

  Panorama sent undercover reporters into GSM to investigate.
