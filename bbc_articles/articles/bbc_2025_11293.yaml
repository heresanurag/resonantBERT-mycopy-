title: 'Texas abortion case: man charged over drugging partner''s drink - BBC News'
date: '2025-06-10'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c0r1enk0x0eo
content: |-
  A Texas man is being accused of giving his ex-partner the abortion pill without her knowledge.

  A man in Texas has been charged with murder after he allegedly slipped an abortion drug into his pregnant girlfriend's drink. Justin Anthony Banta was arrested on Friday after a months-long investigation into his former girlfriend's accusation that he gave her the Plan C pill (known as an abortion drug) without her knowledge, according to police in the US state. Mr Banta's ex-partner said when she disclosed her pregnancy last year, he had offered to cover the cost of an abortion, but she expressed her desire to keep the baby. Police said after meeting with Mr Banta in a coffee shop, she experienced heavy bleeding and visited the emergency room, but lost her baby a few days later.

  Mr Banta was also charged with tampering with physical evidence and is awaiting prosecution, according to the Parker County Sheriff's Office. Police said Mr Banta's former girlfriend was around six-weeks pregnant when she went for a check up with her doctor, who told her the baby was healthy and had "a strong heartbeat" and vital signs. "Later that same day, the victim reported she met Banta at a coffee shop... where she expressed her suspicion that Banta had secretly added abortion-inducing pills to her drink without her knowledge or permission," the sheriff's office said in a statement. Mr Banta's former girlfriend also said he suggested they buy the Plan C abortion drug online after she disclosed her pregnancy. Following an interview with Mr Banta, police collected his mobile phone, but later discovered "crucial evidence relating to the case" was deleted, they said. Investigators said they believed Mr Banta, who worked in IT at the US Department of Justice, later accessed his phone remotely and performed a "reset". An arrest warrant for him was then obtained, and Mr Banta was charged last week with capital murder and tampering with physical evidence. Police said the cases against Mr Banta remained active and ongoing. Texas has some of the most restrictive abortion laws in the US, banning all abortions except in dire medical circumstances. The state introduced a law in 2022 that carries civil and criminal penalties for those who perform abortions. A law in 2021 also bans the termination of pregnancies after a baby's heartbeat is detected, but does make exceptions for medical emergencies.
