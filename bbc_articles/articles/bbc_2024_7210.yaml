  PSG take on Barcelona in the quarter-finals of the Champions League - but can you name the players to have featured for both clubs?

  Quiz: Can you name these players who have represented Barcelona and Paris St-Germain? Last updated on .From the section Champions League

  Two of the 10 players are above - but do you know who they are? Ballon d'Or winners, Brazilian superstars and outspoken forwards, Paris St-Germain and Barcelona have shared some iconic names over the years. On Wednesday, the clubs meet again in the Champions League for the first leg of the quarter-finals. One current player to have represented both clubs is likely to feature, but can you name all 10 of the stars we have selected for our quiz? Take the challenge below and see the hints for a little bit of help. Good luck. Can you name these 10 players who have represented both Barcelona and Paris St-Germain? Share your score with your friends!
