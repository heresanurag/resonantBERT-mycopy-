  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Robert Sanchez (Chelsea): I have criticised Sanchez on multiple podcasts, radio shows and Match of the Day because I think he is the reason that they are going to ultimately end up missing out on the top four. For the first time in a long time, he got a clean sheet - so you have to give him some credit and say well done to him.

  Marc Cucurella (Chelsea): He has surprised me. I didn't think he was going to be that good. I also thought: Why did Chelsea buy him when they had Ben Chilwell? But clearly they know more than me and they showed what they can do. He's doing really well. Virgil van Dijk (Liverpool): Composed, solid and brilliant - Van Dijk produced another masterclass as Liverpool registered their sixth clean sheet of the season. He's a huge part of the reason they have only conceded eight league goals so far. Gabriel (Arsenal): Every single time he plays, set pieces, he shows his demand. Just shows he is unfazed. Milos Kerkez (Bournemouth): He's been excellent in the past four or five weeks, both going forward and defensively, so just want to give him a bit of a shout out.

  Alexis Mac Allister (Liverpool): He dealt with everything that Manchester City threw his way. He broke up play, was great on the ball and just seems to be growing into a top-class midfielder. Justin Kluivert (Bournemouth): He scored three penalties and broke a lot of stereotypes about penalties being easy to take - when they are really difficult. Enzo Fernandez (Chelsea): After a slow start to the season and a difficult summer, with his comments and things of that nature, he looks like he is coming out of it the other side now. Taking the armband off him made him sit and wait, and relaxed him. Now we're seeing a team developing and he's starting to develop with it, so I thought I would give him some credit. Obviously the goal helps.

  Bukayo Saka (Arsenal): Just seems to be getting better and better in this Arsenal team. Goals, assists, he's even giving up penalties now because he knows he's going to score. There is a level of arrogance and confidence that is excellent. Kevin Schade (Brentford): A hat-trick, coming off a long injury from the summer, first start, three goals. Job's a good 'un. Marcus Rashford (Manchester United): This man is making his debut for us and I'm really happy to give it to him because he has come in for a lot of stick. I also want to caveat this by saying I expect these performances on a much more regular basis now because I'm sick of talking about his potential - he is 27 years old. But he now has three goals in two league games for the new head coach Ruben Amorim. You would expect and hope now that he will have confidence. The way that they play should suit him. But like Amorim said, the only person who can want it is Marcus. If he's in this form, he will deliver.

  Arne Slot (Liverpool): It was a huge game for Liverpool this week against Manchester City, the team that everyone, including me, expected to put up a real good fight and show they are still title contenders. Liverpool were excellent, probably should have won by four, maybe five goals. A great, solid performance. They just look like champions already - champions in the making.

