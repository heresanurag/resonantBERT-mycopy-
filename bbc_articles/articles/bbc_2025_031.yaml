title: 'Johnnie Walker: Former BBC Radio 2 DJ dies at the age of 79 - BBC News'
date: '2025-01-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/ce9051nljd3o
content: |-
  Tributes are paid to the DJ, who hosted BBC Radio 2's Sounds of the 70s and Rock Show until October.

  Johnnie Walker hosted his final show on Radio 2 in October

  Radio presenter Johnnie Walker has been described as a "broadcasting legend" following his death aged 79. The DJ died on Tuesday, two months after calling time on his 58-year radio career because of ill health. Presenter Bob Harris, who took over BBC Radio 2's Sounds of the 70s show after Walker's retirement, announced his former colleague's death live on the station. Harris described him as "an incredible, warm, superb broadcaster" who "went out on a limb many times to defend the music that he loved, and he was passionate about radio".

