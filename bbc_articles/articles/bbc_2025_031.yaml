  On his show on Tuesday, Harris recalled being friends with Walker since the 1960s, and said they had been exchanging texts recently after he took over Sounds of the 70s. "He wished me well for the first programme I did... 'The listeners are lovely and they'll look after you.'" Harris also read out a tribute from Shaun Keaveny, who took over the Rock Show from Walker. Keaveny described him as "a rebel, a soul searcher and a seeker, a rocker, a phenomenal broadcaster". "He absolutely lived life to the limit. It was a total privilege to have worked with him," he said. Radio 1 breakfast show host Greg James also sent a message to Harris. "My dad and I are sitting here listening to you. Such sad news, but radio is the greatest community at times like these," he wrote. Former Radio 2 host Ken Bruce wrote on social media, external: "So sorry to hear the news about the great Johnnie Walker. Not only was he a wonderful broadcaster but also a man of great personal strength and kindness." Radio 2 presenter Elaine Paige said she was "so very sad" to hear of Walker's death. "My deepest condolences to his wife Tiggy and his family. He will be so deeply missed by everyone," she added. Radio 5 Live's Nicky Campbell posted on X: "Goodbye Johnnie. Sweet and brilliant man. I am so lucky to have known you. You were an inspiration."

  Walker had announced live on air in October that he would be hanging up his microphone to retire. He explained the reason after reading out a letter from a listener whose dad had loved the show, but had passed away in 2022 due to pulmonary fibrosis. "Now, that leads me to be making a very sad announcement," he said. "The struggles I’ve had with doing the show and trying to sort of keep up a professional standard suitable for Radio 2 has been getting more and more difficult, hence my little jokes about Puffing Billy, so I’ve had to make the decision that I need to bring my career to an end." Walker's last episode of The Rock Show aired on 25 October, and his final episode of Sounds of the 70s was broadcast on 27 October. At the end of his final show, Walker said: "[It's] going to be very strange not to be on the wireless anymore. Also, by the same token, life will be slightly less of a strain really, trying to find the breath in order to do the programmes. "Thank you for being with me all these years and take good care of yourself and those you love, and may we walk into the future with our heads held high and happiness in our hearts. God bless you."

  Walker presented Sounds of the 70s for 15 years and the Rock Show for six years

  Walker began his radio career in 1966 on Swinging Radio England, an offshore pirate station, before moving to Radio Caroline. He was recruited by BBC Radio 1 in 1969, and then joined Radio 2 in 1997, where he remained until his retirement. On his lunchtime Radio 1 show, which launched in 1971, he championed names like Steve Harley, Lou Reed, Fleetwood Mac, The Eagles and Steely Dan. He also spent time living in California in the 1970s before returning home in the 80s, rejoining Radio 1 in 1987. He also presented shows for Radio 5 Live. In 2003, while host of Radio 2's drivetime slot, Walker had chemotherapy and emergency surgery for non-Hodgkin's lymphoma, and told listeners at the time he had "died" three times on the operating table.
