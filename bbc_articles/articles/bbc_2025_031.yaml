  Walker had pulmonary fibrosis, which is scarring of the lungs, a condition which makes breathing difficult. He stepped down from presenting Sounds of the 70s and the Rock Show, also on Radio 2, at the end of October. The station's controller Helen Thomas described him as "a much-loved broadcasting legend". "Johnnie's wry sense of humour and his warm, open style of presenting ensured he was adored by his audience," she said. "The airwaves simply won't be the same again. He will be very much missed by Radio 2 presenters, staff and listeners alike, and our thoughts are with his wife Tiggy and his children."

  Tiggy Walker said she "couldn't be more proud" of her husband and "how he kept broadcasting almost to the end, and with what dignity and grace he coped with his debilitating lung disease". "He remained his charming, humorous self to the end, what a strong amazing man. It has been a rollercoaster ride from start to finish," she said. "And if I may say - what a day to go. He'll be celebrating New Year's Eve with a stash of great musicians in heaven. One year on from his last live show. God bless that extraordinary husband of mine who is now in a place of peace." Traffic presenter Sally Boazman, who worked alonside Walker when he hosted Radio 2's drivetime show from 1999 to 2006, said he was "such a great broadcaster". "[He was] really great in the way that he presented, he had a great voice, he knew his music inside out, he was the real deal," she said. "It was very sad to see the way he lost his voice towards the end, but he still had that enthusiasm and that love of the music." Radio 2's Tony Blackburn said it was "a very sad loss because he was such a great broadcaster and a good friend as well".

