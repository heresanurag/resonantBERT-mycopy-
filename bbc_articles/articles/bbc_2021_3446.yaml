title: Kill the Bill protesters march in Bristol city centre - BBC News
date: '2021-03-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-56542898
content: |-
  Hundreds of demonstrators have gathered in Bristol city centre for the third time this week.

  Another march against the government's proposed Police and Crime bill is taking place in Bristol city centre.

  Hundreds of protesters gathered on College Green at 16:00 GMT before walking through the main shopping streets.

  Lines of riot police and vans prevented anyone reaching Bridewell Street, the scene of disorder on Sunday night.

  Full story: Third protest in a week closes down city centre
