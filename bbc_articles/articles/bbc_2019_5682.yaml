content: |-
  Heinz-Christian Strache resigned a day after secret video footage mired him in a corruption scandal.

  Heinz-Christian Strache has resigned as Austria's vice-chancellor a day after secret video footage mired him in a corruption scandal.

  He said he resigned to avoid further damage to the government
