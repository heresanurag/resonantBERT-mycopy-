title: 'Anglesey: Stephen and Kathy Burch named as Beaumaris crash victims - BBC News'
date: '2024-08-30'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckg284kdwgmo
content: |-
  Two pedestrians who died following a crash in a seaside town are named as Stephen and Kathy Burch.

  Stephen and Katherine Burch died in the collision in Beaumaris, Anglesey

  A couple who were killed after being hit by a car in a seaside town have been named. Stephen and Katherine Burch, both 65, and from Alcester, Warwickshire, were visiting Beaumaris, on Anglesey, at the time of the crash on Alma Street on Wednesday. Mr Burch was vicar of St James Fletchamstead, Coventry, for 19 years before retiring last year. The couple had three children. North Wales Police said the investigation to establish the cause of the crash in which an 81-year-old driver also died was continuing.

  The Diocese of Coventry said the news was a shock. A spokesman said: "Steve was a popular member of our diocese and well known for his good humour and unwavering faith, and many will also know Kathy well from her work with CPAS and worship ministry." The spokesman added: "As a couple they were still very active in retirement this year, running an alpha course leading to baptism and confirmations. "Our thoughts and prayers are with Steve and Kathy's family at this time especially their children, David, Jonathan and Sarah, as they come to terms with this devastating, unexpected loss." The couple's family asked for privacy and said: "Thank you for your understanding and prayers."

  The crash happened on Alma Street, on the seafront near Beaumaris Pier on Anglesey

  A tribute, issued through police, included a prayer which said: "Dear Lord, as Jesus' followers asked him to help their friends, so we ask you today to help our friends struggling in the darkness of grief. "May they know moments of peace in their pain, moments of joy in their memories, and moments of hope in your love." Crash investigator Sgt Emlyn Hughes said: "Officers and investigators are trying to piece together what happened." He said the crash had affected people across Anglesey. One witness said she was in a hotel overlooking the scene when she heard a loud bang and then saw someone performing CPR. She said: "Everybody really rallied around, diverting the traffic and trying their best to give the people dignity, but it was pretty horrific."
