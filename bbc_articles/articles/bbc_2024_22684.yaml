title: Hay-on-Wye divided over painting of naked woman - BBC News
date: '2024-09-20'
section: UK
url: http://www.bbc.co.uk/news/articles/c206e5qx82do
content: |-
  Officers visited the gallery in Hay-on-Wye after complaints Poppy Baynham's artwork was pornographic.

  Poppy Baynham said the controversy was improving her profile as an artist

  A painting of a naked woman in the front window of a high street shop has seen a gallery owner warned by police it could be a public order offence. Val Harris said officers visited The Chair gallery in Hay-on-Wye on Thursday but she rejected calls by them to remove it. The BBC understands they were acting on complaints from two members of the public. Dyfed-Powys Police confirmed officers attended the gallery but said it was too early to say if action would be taken.

  Hay-on-Wye, on the Powys-Herefordshire border, is best known for its bookshops and literary festival that attracts some of the biggest names in the cultural arena. The painting, by artist Poppy Baynham was part of a wider exhibition of work by her and her sister. "I just came to Hay thinking it would be a peaceful week but, no, we've stirred Hay up for sure!" she said. The artwork features a naked woman wearing cowboy boots with her legs spread, revealing a black triangle with pink wool on top, rather than genitals. However, that has not stopped a number of complaints, with some people branding it "pornography".

  The painting sits in the window of The Chair gallery, with a notice inviting people to leave their comments in a book

  Ms Harris said she chose the painting for the window, partly because of its proportions. Soon after it went on display on Monday, she said she was called back to the gallery after reports of abuse from some members of public. On Thursday she said police told her to remove it from the window and place it further inside the gallery.

  Some of the most famous artworks in the world feature naked women or men, and Ms Baynham said better-known artists were allowed to display similar works without the same backlash. "It just shows how closed-minded people are, and let's say if I was a famous artist I don't think anyone would say anything." In a statement, Hay Town Council said it had not received any complaints about the painting and that no action was being planned or discussed. Ms Harris said a sign next to the painting urged passers-by to come in and share their views in a visitor book.

  Val Harris said she would stand by the young artist

  She said the response had so far been "50:50", with as many people supportive of the painting's position as those angered by it. Speaking to the BBC outside, while some people described it as inappropriate or "lewd", many others, including those with young children, were relaxed about its presence. Jessie Dixon from Hay said she did not see it as being offensive, adding: "I thought of it as exciting and playful and I never thought of it as sexual object or anything like that." She also said she was upset that people had gone to the police with their concerns. Another woman, Dawn Lewis, said: "It's not my cup of tea but I can't see it being offensive personally, it's art."

  "That's all an artist ever dreams of... their name getting out there and being heard and their work being seen," she said. She studies at an art college in London and said the collection, and the comments it had generated, would form the basis of her final year dissertation. But she said that while her mother had been supportive, she had warned her "it's not very Hay-on-Wye". The painting itself is still for sale and Ms Baynham said she would listen to offers.

