title: 'Coronavirus: UK claps for health workers on NHS anniversary - BBC News'
date: '2020-07-05'
section: World
url: http://www.bbc.co.uk/news/live/world-53289613
content: |-
  Prime Minister Boris Johnson joins in the tribute as the National Health Service marks 72 years.

  Around the UK, people have paused once again to thank NHS staff and care workers for their tireless work during the coronavirus pandemic.

  Prime Minister Boris Johnson led the clapping at 10 Downing Street, where he was joined by Annemarie Plas. Plas initiated the weekly clap for the NHS, which became a regular feature of the pandemic at its height. Image caption: Prime Minister Boris Johnson led the clapping at 10 Downing Street, where he was joined by Annemarie Plas. Plas initiated the weekly clap for the NHS, which became a regular feature of the pandemic at its height.

  NHS staff outside the Royal Victoria Infirmary in Newcastle stepped outside to salute the NHS on its 72nd birthday. Image caption: NHS staff outside the Royal Victoria Infirmary in Newcastle stepped outside to salute the NHS on its 72nd birthday.

  Players and officials stood for a minute's applause for NHS staff before the Premier League match at Anfield, Liverpool Image caption: Players and officials stood for a minute's applause for NHS staff before the Premier League match at Anfield, Liverpool

  Members of staff at London's Chelsea and Westminster hospital were among those to celebrate 72 years of the NHS Image caption: Members of staff at London's Chelsea and Westminster hospital were among those to celebrate 72 years of the NHS

  Meanwhile, about 100 protesters gathered at Marble Arch in London, calling for the end of racial disparity in the health system. Image caption: Meanwhile, about 100 protesters gathered at Marble Arch in London, calling for the end of racial disparity in the health system.
