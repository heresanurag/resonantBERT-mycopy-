title: London Zoo counts its animals in annual stocktake - BBC News
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-38495250
content: |-
  Staff at London Zoo have been counting the animals for its annual stocktake.

  They are counting the animals one-by-one at London Zoo.

  The annual stocktake is required for the zoological gardens' licence.

  Last year, 18,430 were counted out of a total of 712 species.
