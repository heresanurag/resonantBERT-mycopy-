  -8 J Rose (Eng); -7 B DeChambeau (US); -6 C Conners (Can), R McIlroy (NI); -5 M McCarty (US), S Lowry (Ire), S Scheffler (US), T Hatton (Eng) Selected others: -3 L Aberg (Swe), C Morikawa (US); -2 T Fleetwood (Eng); Level M Fitzpatrick (Eng), A Rai (Eng); +2 J Rahm (Spa); D Willett (Eng); +6 R MacIntyre (Sco), +10 L Canter (Eng)

  Justin Rose continued his quest for a maiden Masters triumph at the age of 44 with a solid second round while Rory McIlroy raced back into contention at Augusta National. Veteran Englishman Rose, whose only previous major title came at the 2013 US Open, carded four birdies and three bogeys in a one-under 71 to sit on eight under at the midway point. McIlroy shot a superb six-under 66 - the lowest round of the day - to move two behind his European Ryder Cup team-mate and alongside Canada's Corey Conners. In between them is American superstar Bryson DeChambeau on seven under. Defending champion Scottie Scheffler took 71 shots in a rollercoaster round, putting him on five under in a group alongside England's Tyrrell Hatton, Ireland's Shane Lowry and American debutant Matt McCarty. Norway's Viktor Hovland, Denmark's Rasmus Hojgaard and Australia's Jason Day are four under after 36 holes. "If [winning the Masters] was a secret recipe, you'd know it by now," said Rose. "The leaderboard is stacking up with world-class players. "So you're going to have to play great golf, and you're going to have to go out there and want it and go for it and get after it. It's as simple as that."

  Rose has put together a stellar career, in which he has secured 25 professional wins, topped the world rankings, won Olympic gold and spearheaded Ryder Cup success - but fallen agonisingly short at Augusta on several occasions. Without a tournament victory since February 2023, and a catalogue of missed cuts since, few would have backed Rose to be in such a strong position at the halfway stage. Finding consistency throughout recent seasons has been difficult. But, as he did when coming through qualifying to finish second at last year's Open Championship, and in finishing joint sixth at last year's US PGA Championship, Rose has demonstrated again at Augusta National that he retains the hunger and heart to challenge for the biggest prizes. It is a testament to his quality, experience and nous around one of golf's most testing courses that he goes into the weekend with a fighting chance of victory. "I think my game is good. I feel like I'm showing much more quality this year in my game than I have done the past couple years," said Rose. Rose was the overnight leader after a majestic opening 65 during which he threatened to challenge the course record of 63. Failing to back up strong starts at the iconic venue has been a common theme for the former world number one, however. Rose's putter was red hot on the opening day, leading the strokes gained on the green category by a substantial margin and enabling him to open up a three-shot lead. From tee to green he was always not as precise, however, and that continued on Friday as his short game helped keep him ahead of the chasing pack. "It was a decent day. My wedge kept me in a good spot," he added.

