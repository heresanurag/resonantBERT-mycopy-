content: |-
  Inquests have opened into the deaths of a woman and three children found dead at a house in Derbyshire.

  Damien Bendall is accused of killing Terri Harris, her two children, and a friend who was staying over

  A woman and three children who were found dead at a house in Derbyshire died as a result of "violent acts", a coroner has said.

  Terri Harris and her children John Paul and Lacey Bennett were found dead along with Lacey's friend Connie Gent at a house in Killamarsh on 19 September.

  Their inquest openings heard police went to the house following a report Damien Bendall had stabbed himself.

  Mr Bendall was arrested on suspicion of murder and has since been charged.

  Det Insp Graham Prince told the inquest that Derbyshire Police received a phone call from Dorset Police at 07:26 BST on 19 September.

  "Dorset Police received a telephone call about the safety of Damien Bendall," Det Insp Prince said.

  "That phone call was made by a relative of Damien Bendall. They indicated to Dorset Police that Bendall had suffered a stab wound and that was self-inflicted."

  He said Derbyshire Police were alerted and officers were dispatched to Chandos Crescent in Killamarsh and were met by Bendall when they arrived at 07:39.

  Police found Terri Harris and the three children dead at the house in Chandos Crescent

  Det Insp Prince said police then entered the house "concerned for the safety of the other occupants".

  Once inside the house they located Terri Harris, 35, John Paul Bennett, 13, Lacey Bennett, 11, and Connie Gent, also 11.

  They were already deceased, he said, and paramedics confirmed this when they arrived a short time later.

  The coroner, Peter Nieto, said post-mortem examinations have been carried out and he is awaiting full reports. However, he said the early indications were that the deaths had been caused by "violent acts".

  He suspended the inquests, explaining that they cannot resume until after criminal proceedings have ended.

  John Paul and Lacey's father Jason Bennett said "life will never be the same again"

  Det Insp Prince said Connie had been stopping at the house since 17 September, as she was visiting Lacey and her family.

  A member of the Killamarsh community has revealed how the children had been selling sweets for a cancer charity the day before they died, and had been planning to go out again.

  They were widely praised after Terri Harris posted photos in a community Facebook group.

  One woman commented: "Well done to your kids. My niece bought some lollies from them, they were very pleasant and polite. A real credit to you."

  Ms Harris tagged the three children so they could read the nice comments people had written about them.

  She also posted: "Like to thank you for the lovely comments the kids will be back out tomorrow at the park or Chandos Crescent thank you for your support."

  Damien Bendall has been charged with four counts of murder

  Mr Bendall, 31, of Chandos Crescent, appeared at Derby Crown Court on Friday morning.

  He is due to appear at the same court for a review hearing on 26 November.

