title: John Swinney meets Donald Trump's son Eric at Bute House - BBC News
date: '2025-03-14'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cvgw118nlkeo
content: |-
  Eric Trump is a senior executive in his father's business - the Trump Organisation - which owns golf resorts in Ayrshire and Aberdeenshire.

  Eric Trump is a senior executive in his father's business

  First Minister John Swinney has met US President Donald Trump's son Eric at Bute House in Edinburgh. Eric Trump is a senior executive in his father's business - the Trump Organization - which owns golf resorts in Ayrshire and Aberdeenshire. The meeting took place over tea and biscuits, is understood to have lasted about 50 minutes and solely focused on Trump's golf resorts, according to his son. It comes after the first minister said he did not think it would be appropriate for Donald Trump to be offered a second state visit to the UK.

  Eric Trump flew into Edinburgh Airport before meeting the first minister

  It is understood Eric Trump flew into Edinburgh Airport earlier on Thursday. Trump Turnberry, the resort in Ayrshire, was vandalised by a pro-Palestinian group over the weekend. Red paint was daubed over one of the buildings. The words "Gaza is not for sale" were sprayed across one green and another green appeared to have been dug up.

  Paint was daubed on one of the Turnberry resort's buildings

  After the meeting, which also included Sarah Malone - executive vice president of Trump International - the Scottish government said the first minister "regularly meets with business people". A spokesperson said: "The meeting with Mr Trump provided an opportunity to discuss Scotland's investment potential and the first minister was pleased to hear about the company's continued commitment to Scotland, in particular Aberdeenshire and Ayrshire." Eric Trump said the meeting was "very warm and friendly" and that he was thanked for the Trump Organization's investment in Scotland. He said: "Our discussions focused solely on the Trump Organisation's commitment to creating in Trump Turnberry and Trump International in Aberdeenshire two of the most iconic golf destinations in the world. "We did not discuss Scottish or US politics but concentrated on golf. It was a very positive and constructive meeting about business and investment."

  Prime Minister Sir Keir Starmer used a US visit earlier this month to present Donald Trump with a letter from the King, offering an initial meeting in Scotland to discuss the logistics of a second state visit. Second-term US presidents are traditionally not offered state visits and have instead been invited for tea or lunch with the monarch, usually at Windsor Castle. The King invited President Trump to meet him at either Balmoral or Dumfries House - which are both near the Trump resorts. Balmoral is only about 58 miles (93km) from the Trump International golf resort in Menie, where the president is due to open a new course named after his mother this summer.

  Donald Trump and Eric on a visit to Turnberry in 2015 after the Trump Organisation bought the golf course

  The following day the US President had a meeting with Ukrainian President Volodymyr Zelensky, which spiralled into a fiery showdown. Trump accused Zelensky of "gambling with World War Three" and, alongside Vice-President JD Vance, demanded that he show more gratitude for years of US support. The Ukrainian president pushed back at suggestions from his more powerful partners that he should work harder to agree a ceasefire with Vladimir Putin. They responded that he was being "disrespectful". A number of SNP MPs have criticised the prime minister's relationship with Trump on social media, including the party's Westminster leader Stephen Flynn who said Starmer "better get back up off his knees and revoke that offer of a state visit".

  Taking a different tone from colleagues, Swinney said he welcomed the role the prime minister was taking and that he supported him trying to find a way through a difficult situation. But he added that he could not see how a state visit could go ahead if Trump was "not a steadfast ally of ours in protecting the future of Ukraine". Swinney has previously said he would use Trump's affinity for Scotland in a bid to avoid tariffs being applied on imports to the US, particularly on Scotch whisky.

  John Swinney had a phone call with President Trump in December

  He had publicly backed Harris, the Democratic nominee, in the run up to the 2024 presidential election. But he had a phone conversation with the new president in December and said afterwards Trump had been keen to "express his enthusiasm for Scotland". The Scottish Greens, who previously said Trump is not welcome in Scotland, said the decision to meet Eric Trump was "totally inappropriate" and sent a "terrible message". Co-leader Lorna Slater added: "When it comes to the Trumps, the line between business and politics has always been blurred."

  The first minister's backing for Kamala Harris before the US election provoked a disgruntled response from Eric Trump. Fast-forward several months, and following a meeting with John Swinney at Bute House, the president's son's tone is very different - the FM's approach previously described as "nasty", today it is characterised as "warm and welcoming". Likewise, the first minister's phone call with the president following his election victory was described as "positive". But that constructive conversation didn't stop Mr Swinney from calling for the president's UK state visit to be cancelled. It's clear the FM is walking a fine line between expressing his views, and recognising the need to be both pragmatic - and diplomatic - when it comes to dealing with one of world' most powerful men and his Scottish business interests.
