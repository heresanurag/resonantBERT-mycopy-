  A round-up of action from the American Music Awards which also honoured Sir Rod Stewart in Vegas on Monday.

  Six highlights from the AMAs - from J. Lo's kiss to Billie Eilish's wins

  There were big wins for Billie Eilish, Beyoncé, Eminem and Sir Rod Stewart at the American Music Awards (AMAs). Monday's event in Las Vegas was hosted - and in some ways dominated - by the evening's host, singer and actress Jennifer Lopez. There were also performances from stars including Benson Boone, Gwen Stefani and another award-winner, Janet Jackson. Here's some key takeaways from the ceremony.

  Billie Eilish won seven prizes at the fan-voted awards show, sweeping most of the major catergories in the process, including artist and album of the year - for Hit Me Hard and Soft - as well as song of the year, Birds of a Feather. The singer, 23, who also won the award for favourite touring artist, was not there to collect her awards in person however, as she was busy doing precisely that - being on tour in Europe. Eminem took home the awards for favourite male hip-hop artist and favourite hip-hop album, but he wasn't there either. And nor was favourite female country artist-winner Beyoncé, who won favourite country album.

  With many stars not in attendance, the focus fell almost fully on host Jennifer Lopez - aka J. Lo. The star, 55, danced to a medley of hits including Eilish's Birds of a Feather, Sabrina Carpenter's Espresso and Beyoncé's Texas Hold 'Em. But she will be remembered most on the night for having locked lips both male and female dancers during her performances. One viewer joked online that it made them "cringe", while another said the singer had "lost the plot". The sweat dripping emoji was used by another fan to describe the situation.

  Sir Rod Stewart will play the Glastonbury legends slot next month

  Sir Rod Stewart got a huge surprise on stage when he was presented with the lifetime achievement award by his children. The father-of-eight seemed shocked to be introduced to the stage by five of his own grown-up kids. "I'm absolutely flabbergasted," said Sir Rod. "I didn't know they were here - my children." The former Faces frontman, 80, thanked his bandmates, past and present, noting how when he was young he had a "burning ambition to sing". "That's all I wanted to do. I didn't want to be rich or famous. And here I am a few years later, picking up this wonderful award," he said. Sing is precisely what he then did, performing his 1988 track Forever Young.

  Another highlight on the night for many on social media it seems was Shaboozey's reaction to Megan Moroney declaring that the Carter Family "basically invented country music". The Carter Family - which featured singer June Carter who later went on to perform with her husband Johnny Cash - was an influential American folk music group that recorded and performed between the 1920s and 1950s. Shaboozey, whose hits include A Bar Song (Tipsy), appeared to pause and give Moroney a slightly sceptical look before letting out a little laugh in response, while they were jointly presenting an award. The Hollywood Reporter noted Shaboozey's apparent "side eye" look soon went viral, external.

  But you knew that already, right? Janet Jackson, 59, collected the icon award and showed why by performing a medley of her songs including Someone to Call My Lover and All for You. "I'm so grateful. I mean, no disrespect in any way, but I don't consider myself an icon," she said. Echoing Sir Rod, she added: "My family, myself, our dream wasn't ever to be famous; we weren't raised like that." She continued: "We always had a special love for music, dancing and singing, and fame came with the result of hard work and dedication."

  Or is this look more Captain Hook? The back-flipping pop star performed on the night and he looked resplendent in his green suit jacket and trousers while posing for pictures on the red carpet. The 22-year-old changed into a floral purple number for his typically acrobatic live performance of recent single Mystical Magical.

  Other performances on the night saw Gloria Estefan celebrate the legacy of Latin music by doing the Conga, and Gwen Stefani celebrate her noughties hits. Other winners on the night included R&B singer SZA, Post Malone, Gracie Abrams and Becky G, as well as Kendrick Lamar and collaborators Lady Gaga and Bruno Mars. Check out the full list of winners here, external, and a video of the action below.

