id: bbc_2024_4636
title: Gaza food aid lifted ashore from barge - BBC News
date: '2024-03-16'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68583865
content: |-
  Much-needed food aid was brought by ship for the first time, as lorry deliveries are insufficient.

  A first sea delivery of food aid for Gaza has been winched ashore by a humanitarian group, World Central Kitchen.

  A clip of the operation was posted by the group - but it is not yet clear how the aid will be distributed in the war-torn Gaza Strip.

  It was brought on a Spanish ship, Open Arms, from Cyprus.
