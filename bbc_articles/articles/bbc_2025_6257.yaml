  Photos and videos of the aftermath show bloodied bodies scattered in the streets around the impact of the missiles.

  At least 34 people killed in Russian ballistic missile attack on Sumy

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At least 34 people have been killed and 117 injured, including 15 children, after a Russian attack on the centre of Sumy, according to Ukrainian authorities. Two Iskander-variant ballistic missiles struck at around 10:15 local time (08:15 BST), both hitting the area around Sumy State University and its congress centre. Images and videos of the aftermath show bloodied bodies scattered in the streets around the impact of the missiles. At least two children were killed. Ukrainian President Volodymyr Zelensky said among the injured was a girl born this year, adding that medics were doing "everything they can" to save as many lives as possible.

  "The strike hit right in the heart of the city on Palm Sunday," he said in his evening video message. "Only completely deranged scum can do something like this." Moscow has not yet publicly commented on the attack.

  Two Iskander-variant ballistic missiles struck near the Sumy State University

  Ukrainian authorities told the BBC that 20 buildings were damaged, including four educational institutions, as well as cafes, shops and five apartment buildings. Ten cars and trams were also hit. Zelensky called for a "tough" response from other nations, adding that "talks have never stopped ballistic missiles and air bombs". "Russia wants exactly this kind of terror and is dragging out this war. Without pressure on the aggressor, peace is impossible," he said. The university's congress centre is often used for children's classes, according to BBC Ukrainian, with local residents saying that the space is an "educational hub for the entire city" and "very actively rented out for various courses, clubs, and master classes". Officials in Sumy have told the BBC that the missiles were packed with cluster munitions, which can kill indiscriminately over a wide area. They have caused burning vehicles and bent trees where the deaths seem to have been concentrated. Nataliia, who gave only her first name, had been taking her child and other children to a shelter when the second strike hit her car. "If we hadn't moved to the shelter on time we would have been in the car and we would be dead," she told the BBC.

  Nataliia said her and the children she was with "would be dead" had they not moved for shelter

  Svitlana Smirnova, 51, told the BBC she had run for shelter when the strike took place, after attending church with her friends on Palm Sunday. "A friend of mine was injured in a bus which was hit here. She is seriously injured, she is in the hospital, was operated on, she is still unconscious. She was riding with her son who was also injured," she said. Sunday's strikes have been widely condemned by world leaders. Keith Kellogg, the US special envoy to Ukraine, said the attack "crosses any line of decency" and was why US President Donald Trump "is working hard to end this war". UK Prime Minister Sir Keir Starmer has also condemned the attack as "horrific". "President Zelensky has shown his commitment to peace, President Putin must now agree to a full and immediate ceasefire without conditions - as Ukraine has done," he said. French President Emmanuel Macron said the Sumy strikes highlighted the urgent need to impose a ceasefire on Russia. "Everyone knows: this war was initiated by Russia alone. And today, it is clear that Russia alone chooses to continue it - with blatant disregard for human lives, international law, and the diplomatic efforts of President Trump," the French President posted on X. Both Starmer and Macron have been working together on plans for a so-called "coalition of the willing" to enforce any peace deal in Ukraine. The attack comes after US envoy Steve Witkoff met Russian President Vladimir Putin in St Petersburg on Friday. The Kremlin said the meeting lasted more than four hours and focused on "aspects of a Ukrainian settlement". The meeting, Witkoff's third with Putin this year, was described by Russian special envoy Kirill Dmitriev as "productive".
