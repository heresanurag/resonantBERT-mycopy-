  Suzanne Cherry died four days after being struck by a van which had been pursued by police.

  Manslaughter charges after fatal crash on golf course

  Suzanne Cherry died on Tuesday, four days after she was struck at Aston Wood Golf Club

  Three men have been charged with manslaughter after a woman was killed in a crash on a golf course. Suzanne Cherry, 62, from Aldridge, near Walsall, died in hospital on 15 April, four days after she was struck at Aston Wood Golf Club by a grey Nissan van which had been involved in a police pursuit. Her husband has described how he "watched in helpless horror" as his wife was fatally injured at the club on Blake Street in Shenstone. John McDonald, 51, of Bloxwich, Johnny McDonald, 22, of Dudley and Brett Delaney, 34, of Darlaston, Walsall, were charged and are due to appear at the North Staffordshire Justice Centre on Tuesday.

  Three other men who were arrested have been bailed with conditions, police said

  Two patrol cars had started following the van in Kingstanding in Birmingham after receiving reports of suspicious activity. They stopped chasing it when it came off the road and went up an embankment at Aston Wood Golf Club, where it hit Mrs Cherry. Her husband said his wife had an "amazing and infectious zest for life" but their "future together was snatched away in an instant". "She was unselfish, always ready to encourage with love and support those around her to achieve more than they themselves thought possible," he said. He added that she had left "a legacy and an unfillable void" in the lives of her mother, her three adult children, two step-children and "countless others from her work, her sporting activities and social circle".

  John McDonald was also charged with assault by beating and failing to stop a vehicle when directed by a constable. Three other men who were arrested in connection with the investigation have been bailed with conditions, Staffordshire Police said. The Independent Office for Police Conduct said it was continuing to investigate the circumstances prior to the crash. West Midlands Police said specialist officers were continuing to support Mrs Cherry's family.

