title: 'Dawn Butler: Met condemns ''trial by social media'' over car stop - BBC News'
date: '2020-08-12'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-53748929
content: |-
  Dawn Butler was pulled over by police while travelling through Hackney and filmed the encounter.

  Dawn Butler said she was pulled over by police while travelling through Hackney

  A senior Met Police official has condemned the "trial by social media" faced by officers who stopped a car carrying a Labour MP.

  Former shadow equalities minister Dawn Butler accused the force of racial profiling after the stop on Sunday.

  She shared footage of the incident on her Twitter account, which has spread widely on social media.

  Deputy Commissioner Sir Steve House defended the officers, who he said "acted professionally and politely".

  He said while officers "expect to be scrutinised", there are "existing, appropriate and proportionate processes" for complaints.

  Sir Steve said: "The increasingly routine trial by social media is unfair and damaging to individual officers and has the potential to undermine the role our communities need us to do to protect them, and keep them safe from violence."

  Dawn Butler filmed her discussions with the police officers who pulled her over

  The Met said the stop was a mistake caused by an officer incorrectly entering the car's registration number.

  Ms Butler said the BMW police stopped on Sunday was being driven by a black male friend.

  Officers said the car was registered in North Yorkshire and took the keys while checking the registration, she said.

  They then admitted there had been a mistake, that it was registered to the driver and apologised, she said.

