  'We all love you so much' - Kate's birthday tribute to William

  The image was posted online to mark Prince William's 42nd birthday

  A photo of the Prince of Wales and his children has been released alongside a special message to mark his 42nd birthday from Catherine, Princess of Wales. The picture showed the prince leaping into the air with the three young royals - Prince George, Prince Louis and Princess Charlotte. An accompanying message signed by Catherine read: "Happy birthday Papa, we all love you so much!" A similar picture was posted alongside a Father's Day message earlier this week. That photo was taken at Norfolk beach.

  The newly released photo was also taken by the princess in Norfolk last month. Earlier this month, the family attended the annual Trooping the Colour ceremony, which celebrated King Charles III's official birthday. It was the first time Catherine - who continues to receive chemotherapy to treat her cancer - had appeared at a formal public event this year. Days before the event, the princess released an update on her recovery, saying in a statement that she was making “good progress” and her treatment would continue for another few months. "I am not out of the woods yet," she said, adding that there had been "good days and bad days". The King is also being treated for an unspecified cancer and only made a return to public duties at the end of April. On Thursday, Prince William attended England's Euro 2024 match against Denmark in Germany. He was pictured alongside Denmark's King Frederick in the Frankfurt stadium where the 1-1 draw was played.

