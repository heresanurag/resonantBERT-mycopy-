title: Robbie Williams tickets sold at higher prices - BBC News
date: '2017-01-11'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38576749
content: |-
  Gig tickets are being put directly onto resale ticketing websites at higher prices by Robbie Williams's management team, the Victoria Derbyshire programme has found.

  Concert tickets are being put directly onto resale ticketing websites at higher prices by Robbie Williams's management team, the Victoria Derbyshire programme has found.

  Ie:music put tickets for Williams's 2017 tour on the Get Me In and Seatwave websites - in one case for £65 more, before fees, than a similar ticket on Ticketmaster.

  These are official tickets and not resale ones. Ie:music has not responded to requests for a comment.

  The Victoria Derbyshire programme is broadcast on weekdays between 09:00 and 11:00 on BBC Two and the BBC News channel.
