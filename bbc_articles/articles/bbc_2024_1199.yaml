content: |-
  A firefighter in Utah rescues a dog who was trapped in a frozen lake after taking a swim.

  A firefighter in the US has rescued a dog trapped in a frozen lake after taking a swim.

  "Bob the dog loves the water but the ice shelf prevented him from being able to get out after his polar plunge," a Facebook post by the North Davis Fire District read.

  The firefighter's colleagues were on hand to offer help and moral support as Bob the dog was eventually pulled to safety.
