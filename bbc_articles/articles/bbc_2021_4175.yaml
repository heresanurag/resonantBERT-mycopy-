content: |-
  The vehicle, which he had repainted in military green, will convey his coffin to the funeral on Saturday.

  A specially-modified Land Rover hearse, which Prince Philip helped to design over 16 years, will convey his coffin to the funeral on Saturday.

  The vehicle was manufactured at Land Rover's factory in Solihull in 2003. The Duke requested the vehicle be repainted in military green and helped to design the open top rear of the car.
