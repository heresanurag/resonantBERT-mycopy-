title: Man aged 18 stabbed to death in Neasden, north-west London - BBC News
date: '2017-10-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-41536572
content: |-
  The victim was attacked multiple times in the street, the Met Police said.

  An 18-year-old man has been stabbed to death in a north-west London street.

  He was found with multiple wounds in Tanfield Avenue, Neasden, on Friday afternoon.

  Police and paramedics were called but the man died at the scene. His family have been informed.

  A 15-year-old boy was arrested and taken to a north London police station for questioning. The police have appealed for witnesses.

