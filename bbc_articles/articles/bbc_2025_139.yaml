id: bbc_2025_139
title: 'Syria: New government''s school curriculum changes spark concern - BBC News'
date: '2025-01-02'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c1ln12056ppo
content: |-
  The curriculum will take on a more Islamic slant, with evolution and Big Bang theory dropped from science.

  There have been calls for protests ahead of the start of the new term on Sunday

  There is concern growing in Syria that the new Islamist-led authorities have already decided on changes to the school curriculum, without the input of the rest of society. The Facebook page of the transitional government's education ministry has posted the new curriculum for all age groups, which will take on a more Islamic slant, as well as dropping any reference to the Assad era across all subjects. The phrase "Defending the nation" has been replaced by "Defending Allah", among other changes. The Education Minister, Nazir al-Qadri, downplayed the move, saying the curriculum is essentially unchanged and will remain so until specialised committees have been set up to review and revise it.

  Other proposed changes include Evolution and the Big Bang theory being dropped from science teaching. References to the gods worshipped in Syria before Islam, as well as images of their statues, are also being dropped. The significance of the great Syrian heroine Queen Zenobia, who once ruled Palmyra in the Roman era, seems to have been downplayed. The Assad era has essentially been excised from the curriculum, including poems celebrating both Bashar al-Assad and his father, Hafez, in Arabic language courses. In a statement, al-Qadri said the only instructions he had issued were related to the removal of content that he described as glorifying the "defunct Assad regime" and the instatement of the Syrian revolutionary flag in all textbooks. The minister also said that "inaccuracies" in the Islamic education curriculum had been corrected.

  The education minister said the curriculum would remain essentially unchanged until specialised committees had reviewed it

  The changes have been welcomed by some Syrians. But the move has set off alarm bells among resurgent civil society activists, many of whom have returned to Syria for the first time in many years. They fear it is a sign that their voices - and those of groups and communities across the country - may not be listened to as the country develops under its new leadership. There have already been calls for protests ahead of the start of the new school term on Sunday. Activists want to make clear their opposition to any moves by the transitional government to bring in changes to the education system - or any other state institution - without the participation of all sections of Syrian society. The new authorities have made much of the fact that they are to hold a National Dialogue Conference. Officials have been holding meetings with many different communities - from Christians to Kurds, to artists and intellectuals. The message has been that they want to create a new Syria with the involvement of all sections of society so that all will have a stake in the country's future. But activists believe the unilateral changes in the school curriculum undercut such promises and want to make a stand right from the start for the values of freedom and inclusion that the removal of Bashar al-Assad has now made possible.
