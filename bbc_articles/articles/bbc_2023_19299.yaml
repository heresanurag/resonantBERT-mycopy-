content: |-
  Forecasters say the eruption has weakened, but warn new vents could open at short notice.

  No text updates - but you can keep an eye on the eruption

  Hello, we're bringing you a new live stream of the volcanic eruption on the Reykjanes peninsula of south-west Iceland, about 4km (2.5 miles) from the fishing town of Grindavik. Officials say the eruption is weaker today than on previous days, with magma coming out from fewer vents than before. However, they say that new vents could open at short notice and have warned people to stay away from the area. We won't be providing live text updates, but you can watch the latest scenes from Iceland by clicking the Play button at the top of this page.
