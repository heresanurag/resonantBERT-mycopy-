title: 'Baby Mabli Hall death: Woman, 70, charged with dangerous driving - BBC News'
date: '2024-07-25'
section: Wales
url: http://www.bbc.co.uk/news/articles/cprqp8w5gp3o
content: |-
  A woman is charged after a baby girl died following a collision outside a hospital in June 2023.

  Mabli died four days after the crash outside Withybush Hospital, Haverfordwest

  A 70-year-old woman has been charged with causing death by driving dangerously more than a year after a baby girl died following a collision outside a hospital. Eight-month-old Mabli Cariad Hall died four days after the incident outside Withybush Hospital in Haverfordwest, Pembrokeshire, on 21 June 2023. Bridget Carole Curtis from Begelly, Pembrokeshire, will appear at Llanelli Magistrates’ Court on 22 August. An inquest was told in 2023 that Mabli was in her pram outside the hospital at the time.

  She died from a severe traumatic brain injury at Bristol Royal Hospital for Children four days later. Mabli's family said: “This last year has been the most horrendous time of our lives. "Our family life has been changed forever and to this day we are still trying to come to terms with what has happened. "We understand we have more to come but this is the biggest step forward we’ve had since June last year," they said. "We want to thank our friends, family and well-wishers and who have supported us throughout this challenging time and will continue to support us as things progress. "We will never forget that love and support shown to us and for the memory of our precious angel, Mabli Cariad."
