title: 'Jung Woo-sung: South Korean star''s baby scandal sparks debate - BBC News'
date: '2024-11-27'
section: Asia
url: http://www.bbc.co.uk/news/articles/c30pej5z8e5o
content: |-
  Revelations that the actor had a baby outside marriage have shaken up ideals of the "traditional" family.

  Jung Woo-sung is an A-lister in South Korea’s film industry

  A South Korean actor’s revelation that he fathered a child with a woman to whom he is not married has triggered a national debate over celebrity conduct and non-traditional family structures. Jung Woo-sung, a 51-year-old A-lister in South Korea’s film industry, confirmed via his agency on Sunday that he is the father of 35-year-old model Moon Ga-bi’s newborn son. While Jung pledged to “fulfil his responsibilities” as the father, his silence on whether he plans to marry Moon drew fierce backlash in the conservative country where births outside marriage are seen as taboo. But some progressive voices have defended Jung, noting a shift in South Korea’s attitudes towards diverse family structures.

  Moon announced her child’s birth via Instagram on Friday, without mentioning the father, describing the pregnancy as “unexpected” and saying she had been “completely unprepared for the sudden news”. Two days later, Jung’s agency Artist Company released a statement confirming that “the baby Moon revealed on her social media is Jung Woo-sung’s son”. The statement further noted that Jung and Moon were “discussing the best way to raise the child”. It triggered outrage that quickly spread across the country, triggering a slate of opinion pieces in tabloids, spurring online debate and eliciting comments from national politicians. Online, the response was largely critical towards Jung, whose prolific film career has made him a household name in South Korea. Many commentators seemed to believe the actor had tarnished an otherwise upstanding and squeaky clean image, with some expressing disappointment that the former United Nations High Commissioner for Refugees ambassador “can’t accept his own child”. “Jung Woo-sung is pretending to be a good guy saying he will fulfil all his duty... A child does not grow on money alone,” wrote one commenter on Naver News, South Korea’s largest news aggregate website. “It’s not a problem not marrying after having a child. It’s that he pretended to be such an ethical person so far,” wrote another. Speaking to conservative news outlet JoongAng, an unnamed lawmaker from the right-wing People Power Party described Jung’s decision to have a child outside marriage as “something unthinkable in this country of social mores". “No matter how much the times are changing, Korea’s tradition and public sentiment must be kept (righteous),” the lawmaker said. A recent social survey by South Korea’s statistics agency found that 37% of people believed it was acceptable to have a child outside marriage - an almost 15% increase since 2012. Of those who said marriage was necessary, more than 72% were above the age of 60 - with younger respondents increasingly less likely to take that view.

  Other lawmakers have defended Jung, with Lee So-young, a member of the Democratic Party of Korea, saying that “deciding to live with someone is a deeply personal and existential choice”. “To assume that simply having a child obligates people to marry and take on the duties of cohabitation and mutual support feels suffocating,” Lee wrote on Facebook on Tuesday. “Of course, there’s nothing wrong with being ‘normal’... [But] even if society appears to have a standard of ‘normal’, every life is unique in its own way. “Perhaps a better society is one that accepts and respects such differences without judgment,” she added. “That’s what I believe.” Kyunghyang, a progressive major newspaper, put out an editorial piece noting that while some voices have pushed for traditional values, "also rising is the voice that our society must think of the diverse shapes families take". "It makes one hope that celebrities having babies outside of marriage, like Jung and Moon, will help change the public view which today is against [such] births." South Korea has a notoriously high-pressure entertainment industry, with celebrities often held to inordinately high social standards and placed under extreme scrutiny.
