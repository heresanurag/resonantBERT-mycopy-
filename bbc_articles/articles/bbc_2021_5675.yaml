title: Mayhill rioters attacked police van - BBC News
date: '2021-05-22'
section: General
url: http://www.bbc.co.uk/news/uk-wales-57199134
content: |-
  The van was targeted after police responded to calls of violent behaviour in Swansea on Thursday.

  Gangs of people attacked a police van as part of violent riots in Swansea.

  South Wales Police responded to reports of violence and disorder in the Mayhill area of the city on Thursday evening.

  Rioters threw bricks at the van and officers and and they were also seen kicking the vehicle.
