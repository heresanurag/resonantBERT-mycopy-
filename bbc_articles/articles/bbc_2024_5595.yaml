id: bbc_2024_5595
title: Video shows fire damage in Moscow's Crocus concert hall - BBC News
date: '2024-03-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-68644918
content: |-
  Moscow's state governor is shown the fire ravaged venue by rescue workers searching the location of Friday's attack.

  This video posted on Telegram by Moscow's state governor shows the severe damage to the Crocus concert hall, following Friday's attack.

  Andrey Vorobyov, seen in the video meeting emergency service staff in the destroyed music venue, says 20 more bodies were found under the rubble, and the ceiling is in danger of collapse.

  Rescuers are working at the site “round the clock” and will continue for “at least a few more days,” adds Vorobyov.
