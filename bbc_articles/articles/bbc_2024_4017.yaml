content: |-
  Stars including Ryan Gosling and Emily Blunt from this year's biggest nominated films hit the Oscars red carpet.

  The biggest awards night in film is underway and is being hosted by comedian Jimmy Kimmel for the fourth time.

  The Oscars red carpet is also famous for showcasing some of the best (and worst) fashion of awards season.
