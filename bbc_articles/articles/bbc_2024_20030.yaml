content: |-
  In two incidents the victims sustained slash wounds and one incident involved a corrosive substance.

  Eight stabbed and 334 arrests at Notting Hill Carnival

  Police were out in force over the past two days at Notting Hill Carnival

  Eight people were stabbed during the Notting Hill Carnival with a total of 334 people being arrested during the event, the Metropolitan Police has said. There were three stabbings on Sunday, with one of the victims being a young mother who was with a child. She remains in a critical condition. On Monday, five people were stabbed, with two of those attacked being critically injured. The Met said a total of 50 officers had been injured during the event, while most of the arrests were for possessing an offensive weapon or drug offences.

  More than one million people were expected at the carnival on Monday, a majority of whom police said had come "to celebrate", with a "minority of people using it as an opportunity to commit crime, including violence". Thousands of officers were deployed to the annual street party, which the force said was a "challenging event to police with very dense crowds". The organiser Notting Hill Carnival said it works "closely with the Metropolitan Police and many dedicated partners". The statement added "there is no excuse" for violence and "that is not Carnival". "Carnival is the people who dedicate so much time, love and incredible creativity to the parade, sound systems, music, food and costumes," its statement said. "The people of Carnival are part of the solution - providing community cohesion, a place for young people to gather, create and express themselves and for all generations and communities to come together, all year round. "It also benefits London as a whole, generating £369m to the economy, according to a recent study."

  The organisers of the weekend event said it "provides a place for young people to gather, create and express themselves"

  A total of 104 people were arrested on Sunday, with 230 arrests being made on Monday. In two attacks victims sustained slash wounds and one incident involved a corrosive substance. Three firearms were recovered and there were 49 arrests for other weapons. One of those arrested was a man wanted for attempted murder in Hackney. There were eight stabbings and 275 arrests at the 2023 event.

  Met Police deputy assistant commissioner, Ade Adelekan, said at the weekend the carnival was supposed to be a "family day" but was "marred by unacceptable violence". "We are tired of saying the same words every year," he said. "We are tired of telling families that their loved ones are seriously injured, or worse. We are tired of seeing crime scenes at Carnival." During the previous two carnivals, one person was killed, 14 others were stabbed and more than 125 police officers were assaulted. About 500 arrests were made at the carnival during those two years. Measures had been taken to reduce crime, including officers being given greater stop-and-search powers and being allowed to order the removal of face coverings. The Met said it had worked with event organisers for months to secure the event.

  Kensington and Chelsea Council said rubbish to the equivalent weight of about 27 London buses had so far been cleared from the streets. Approximately 30% of the waste will be recycled.
