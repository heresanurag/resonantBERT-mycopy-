title: 'LGBT Awards: Strictly''s Robin Windsor gets posthumous honour - BBC News'
date: '2024-06-22'
section: London
url: http://www.bbc.co.uk/news/articles/crgg3nx0zrdo
content: |-
  Robin Windsor will be honoured with a special award by his former dance partner Lisa Riley.

  Lisa Riley and Robin Windsor were paired in 2012

  Former Strictly Come Dancing star Robin Windsor has been honoured at the British LGBT Awards with a special posthumous award. Actor Lisa Riley, his dance partner for the 2012 series, accepted the award alongside the late dancer's family. Windsor, who appeared on the BBC One show between 2010 and 2013, died in February aged 44. His aunt Alison gave a speech thanking his fans for their "endless messages and tributes." She said: "[The tributes] have been a great comfort to myself and all the family on days when we needed it most." “He was out and living his best life, a proud gay man who wanted to be seen at his real self. “When we look at this beautiful award, we’ll smile back and feel him closer.” Speaking ahead of the ceremony, Riley told the BBC the honour was "incredibly important" and that she hoped to use the event to raise more awareness of mental health. Windsor was an advocate for mental health and worked closely with the charity Sane.

  Lisa Riley (left) collected the award alongside Robin's aunt Alison (centre) and sister Hayley (right)

  Riley said: "Mental health in the gay community is really bad, and if I can help in any way... then I've done my bit. "I wish he was here, he should be on my arm covered in sparkles and having a ball, but the energy he had is imprinted on my heart. "He would be shining down and laughing at us. His vibrancy, energy and zest for life was out there for everyone to see. "He wasn’t a hidden gay man, he was a proud, proud gay man." She said: "Events like these are hugely significant to the community and he'd have been over the moon." The British LGBT Awards, now in its 10th year, was created to celebrate and promote the work of the LGBT community. The host of this year's gala, Julian Clary, said the awards were a "loud, proud and inspiring" way of celebrating LGBT people's contributions to society. Windsor had previously spoken about his struggles with being open about his sexuality. In a 2021 interview with Jonny Harvey, host of the I'm Coming Out podcast, he said he had kept his sexual orientation a secret from his family until he was 35 - but that they had a positive reaction once they found out.

  Windsor was born in Suffolk and began dancing aged three, when his parents enrolled him in classes, according to his website. He moved to London aged 15 to pursue a career in dance and went on to represent England in a number of championships across the country and internationally. As well as Strictly Come Dancing, Windsor appeared as a professional on Dancing with the Stars Australia and So You Think You Can Dance in Holland. He also appeared in a number of Strictly specials, including the Christmas edition and an episode for Children In Need. Most recently, he starred in Come What May, a Moulin Rouge tribute show. He was forced to pull out of Strictly in 2014 after suffering from recurring back problems. Speaking at the time of his death, Riley called him her "bestie." She posted on Instagram, external: "My Robin, my Angel... now our forever Angel, who is loved, will always be loved. forever in my heart. "I love you, shine your beautiful, electric energy from heaven."

  The ceremony is held each year in central London during Pride Month. Ex-England forward Lianne Sanderson, who won 50 caps for the Lionesses, was given the Sports Personality of the Year award, while Dr Who actor David Tennant was recognised as Celebrity Ally of the year for his “vocal support of the trans community”. Previous winners include Adele Roberts, who won a Role Model of the Year award for her work promoting awareness of bowel cancer, and Tom Daley, who won the Sports Personality of the Year category in 2022. The founder of the awards, Sarah Garrett MBE, said: “We are delighted to honour those who have demonstrated an unwavering commitment to advancing LGBT+ rights, whether in the public eye, behind the scenes or in the face of adversity. “We are all focused on another stunning decade of the British LGBT Awards, celebrating this wonderful community.”
