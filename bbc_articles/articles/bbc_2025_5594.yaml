  Though Ivanchev identified himself to police outside Gaberova's flat, he would not be arrested for another year. In his first police interview, he told officers he had spoken to MI5 in the interim. The interview was paused.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  None of the six denied their actions. Roussev, Dzhambazov and Stoyanov pleaded guilty before trial. Ivanova, Gaberova and Ivanchev denied knowing they were working for Russia. Ivanova, Gaberova and Ivanchev were found guilty after the jury deliberated for over 32 hours. Ivanova was also found guilty of possessing multiple false identity documents. They could face up to 14 years in prison. They will be sentenced in May. "If there is no regime change, there will be new and new teams of people who come to kill or kidnap you," Roman Dobrokhotov told the BBC. "This is this actually something that motivates us to work. "From the very beginning, I was sure it was something directly controlled by Vladimir Putin. "In his dictatorship you would never take responsibility on your own to do such political stuff. "You'd always have a direct order from the president. "Putin is a psychopath who has no borders," he said. Message extracts have been edited for brevity.
