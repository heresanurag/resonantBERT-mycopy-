title: Social media sign cleaning star hits Essex streets - BBC News
date: '2025-03-26'
section: General
url: http://www.bbc.co.uk/news/videos/c62zy5g3yz2o
content: |-
  A man whose road sign cleaning videos have gone viral gets his hands dirty in his new home county.

  A man whose road sign cleaning videos went viral on social media has moved to Essex and wasted no time in seeking out the county's dirtiest examples.

  Liam Wildish, 28, recently moved from Surrey to Elsenham, a village near Stansted Airport, and has been hunting for grubby signs to share with his thousands of followers.

  "I'd say the signs here in Essex are a much of a muchness to most parts of the country. It's kind of the same state no matter where you go," he said.

  Essex Highways said it appreciated people "taking pride in their communities", but said dirty signs should be reported to the authority.
