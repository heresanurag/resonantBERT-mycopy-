  The vehicle's window was smashed in an attack while travelling through Edinburgh's Longstone Road.

  Hearse attacked by vandals while on way to funeral

  The hearse had its back window completely shattered by stones thrown from an unknown location

  A hearse carrying a coffin to a cremation service had its window smashed with stones during an attack in Edinburgh. Porteous Family Funeral Directors said the vehicle had been targeted in a "shocking act of vandalism" on Longstone Road, on its way to Warriston Crematorium last Thursday, The firm accused the perpetrators of an "appalling sign of disrespect" towards the grieving family. Police Scotland said they were investigating the incident.

  Images show glass in the back window of the hearse shattered, with a huge hole in the middle. No one was injured in the incident, the firm said. They added the stones were "launched from an unknown location" on the road, about five miles (8km) from the crematorium. In a statement, Porteous said the attack was an example of a "lack of compassion and understanding" experienced by staff.

  The firm said: "This deliberate damage was not just an attack on a vehicle which could have caused our funeral team risk of serious injury, but more importantly, is an appalling sign of disrespect towards the deceased and their grieving family. "Funerals are the very last opportunity for family and friends to remember and celebrate the lives of their loved ones and such actions undermine the dignity and respect that should be given to someone who has died and those in our communities who are mourning. "We condemn this disgraceful behaviour, and this matter has been passed to Police Scotland for investigation."

  The firm appealed for anyone with dashcam footage from the area to contact them or police immediately, external. A Police Scotland spokeswoman said inquiries into the incident were ongoing.
