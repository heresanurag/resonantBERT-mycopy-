id: bbc_2018_11379
title: 'Storm Ali: 100mph winds leave trail of destruction - BBC News'
date: '2018-09-19'
section: General
url: http://www.bbc.co.uk/news/uk-45582900
content: |-
  Flights fail to land and trees are pulled from the ground as high winds cause disruption in the UK and Ireland.

  Thousands of homes are without power, lorries have overturned and a cruise ship broke free from its moorings as Storm Ali hit parts of Britain and Ireland.

  A woman died after the caravan she was in was blown off a cliff in the Irish Republic, while in Northern Ireland a man was killed by a falling tree.
