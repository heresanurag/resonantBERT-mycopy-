title: 'UK weather: Snowy scenes across the UK - BBC News'
date: '2018-02-27'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-43209455
content: |-
  Bitterly cold weather and heavy snow sweep in from the east, causing disruption and delight.

  The UK is experiencing what is expected to be the coldest week of the winter. This elephant fountain in Colchester froze when temperatures fell below zero
