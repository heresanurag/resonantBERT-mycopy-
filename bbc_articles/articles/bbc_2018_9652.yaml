title: 'Samantha Eastwood: Rural searches for missing midwife - BBC News'
date: '2018-08-04'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/uk-england-stoke-staffordshire-45069311
content: |-
  Police are combing rural areas of Staffordshire in the search for 28-year-old Samantha Eastwood.

  Samantha Eastwood did not turn up for her night shift at the hospital

  Police searching for a midwife who has been missing for a week are combing rural areas of Staffordshire.

  Samantha Eastwood, 28, was last seen leaving Royal Stoke University Hospital at 07:45 BST on 27 July and did not return later for her night shift.

  Specialist search teams from Staffordshire Police have cordoned off part of Caverswall village and are carrying out searches in the area.

  Det Supt Simon Duffy said officers are "working round the clock".

  Dozens of officers and police dogs began a search shortly after 09:00 BST in fields near Tickhill Lane in the village - which is about 10 miles from Stoke-on-Trent.

  Police said officers are working "to find anything which brings us closer to finding Samantha"

  Uniformed officers are using sticks to search farmland and woodland in the area.

  Those living near Tickhill Lane have told me there has been a heavy police presence around a disused quarry for the last two days.

  One couple said police had asked to look at their CCTV recordings from the morning of 27 July between 09:00 and 11:00 BST, the morning Samantha Eastwood went missing.

  A police helicopter was also seen on Friday night hovering over nearby woodland.

  Specialist officers have been carrying out extensive finger tip searches through woodland and fields.

  Police have also renewed appeals for members of the public to report sightings of vehicles parked in strange locations or isolated areas.

  Local farmer Nigel Potts, 53, said he had seen police activity by a nearby disused quarry.

  "It seems that that's where the main focus of the search is," he said. "They've been down here for three days."

  On Friday, Ms Eastwood's sister Gemma made a tearful appeal, saying: "We miss you very much, we need you home where you belong."

  The 26-year-old support worker described her sister as "warm and generous with a great sense of humour".

