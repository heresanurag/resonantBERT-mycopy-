  Aside from icy conditions, there were 52 flood warnings in place as of Sunday morning across parts of England, along the River Severn and the River Thames, according to the Environment Agency.

  In Berkshire, parts of Cookham were left submerged after heavy rain caused flooding at Widbrook Common.

  Meanwhile, the Scottish Environment Protection Agency has issued a flood warning for Greenlaw to Allanton in the Borders.

  Flood alerts are in place across England, with roads almost impassable in Mountsorrel, Leicestershire

  Drivers are advised to make sure their vehicle is ready for the cold weather amid predictions of an increase in breakdowns.

  RAC spokesman Ben Aldous said: "This means checking oil, coolant and screen wash levels, as well as ensuring the tyres have plenty of tread and are inflated properly.

  "Large amounts of snow on vehicles should be cleared before setting off to avoid it falling on to other road users. And never attempt to use the windscreen wipers to clear an icy or snowy windscreen - you risk damaging not only the wipers but the linkages too, which could be a more costly repair."
