  Bringing you the latest news from across England about the coronavirus pandemic.

  A family has spent lockdown raising spirits by dressing up as popular children’s TV characters and going on regular walks to wave at youngsters stuck indoors.

  Anna Smith and her relatives have covered more than 15 miles of streets in Grantham, Lincolnshire over the past eight weeks disguised as Peppa Pig, Skye from Paw Patrol and a ninja turtle, as well as making socially-distanced visits to schools and nurseries.

  The disability consultant said: “Every week since the lockdown started we have visited different areas waving at children and adults to spread some joy.

  "No payment is ever taken and it is all from a distance.

  "I often work with children in my usual job and I have a passion for making them smile.”
