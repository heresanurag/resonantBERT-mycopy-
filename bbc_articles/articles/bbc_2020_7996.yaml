  Bringing you the latest news from across England about the coronavirus pandemic.

  Staff at Cornwall's Eden Project have been told that job losses for up to 40% of its staff "are sadly inevitable" because of the effect of the coronavirus pandemic on its finances and scale of operations.

  Managers said the prolonged lockdown closure and continuing restrictions on visitor numbers of the attraction near St Austell had resulted in the managing company "losing more than £7m in revenue so far this financial year" and they had told staff "redundancies will need to follow".

  Bosses said a six-week consultation process and restructuring had begun "across all areas and levels of the company".

  They estimated that the equivalent of about 150 full-time jobs would be lost out of the current total of 375 full-time equivalent jobs, but that would equate to between 200 and 220 people in full and part-time roles "likely to leave the organisation".

  Eden said it "would provide the fullest support in whatever ways it can to those employees whose jobs are at risk".
