title: Poet Amina Atiq marks 100 years since women's vote - BBC News
date: '2018-02-07'
section: General
url: http://www.bbc.co.uk/news/uk-england-42949610
content: |-
  Amina Atiq marks 100 years since some women got the right vote, with a spoken word performance.

  To mark 100 years since some women got the vote, her poem “What chance have I got?” questions identity, the pay gap and sexism.

  This clip is originally from BBC Radio 5 live.
