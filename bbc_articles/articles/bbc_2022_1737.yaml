title: Reaction to Scotland Covid rule changes - BBC News
date: '2022-02-22'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-60477468
content: |-
  Vaccine certificates will go on 28 February and the legal requirement to wear face coverings is to be lifted on Monday, 21 March.

  'We can always backtrack if we need to'

  Virologist Dr Chris Smith tells Drivetime many of the regulations that have been in place addressed last year's concerns. Dr Smith, of Cambridge University, says: "We're in a very different place now." He says the population is highly immune and we're heading towards summer, therefore the odds are stacked in our favour more. "The measures of de-escalating things moving ahead are sensible. "At the end of the day no-one is saying abandon all common sense." "We can always backtrack if we need to," he adds.
