id: bbc_2021_14657
title: Railway line reopens after truck crash - BBC News
date: '2021-11-15'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-59295839
content: |-
  Emergency services remove the vehicle which was stuck on a railway embankment in Fife.

  A railway line in Fife has reopened after a pick-up truck crashed down an embankment.

  The line between Ladybank and Perth was closed because of the risk of the vehicle falling on to the track.

  Five people were believed to have been injured in the incident at about 14:00 but were described as "walking wounded".

  The Scottish Fire and Rescue Service sent three engines and a heavy rescue unit at the scene at Lindores.

  Network Rail said the removal of the truck was proving more complex than expected, but at about 22:00 ScotRail tweeted the line had reopened.
