title: 'Covid-19: Welsh Government update - BBC News'
date: '2021-01-11'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-55617399
content: |-
  Details and reaction to Health Minister Vaughan Gething's vaccination rollout plan.

  Wales' health minister has acknowledged it was "entirely understandable people are concerned" about when they will receive their vaccine.

  But Vaughan Gething also stressed that supplies will increase over the coming weeks.

  "I think a number of people are are anxious because this is a worrying time. And it's entirely understandable on a human level why people are concerned", he said.

  Mr Gething admitted that other UK nations had made a better start in rolling out the vaccine.

  But he said that he believed Wales had still made a "good start" and "that's evidenced by the figures".

  When asked about the concerns made by some GP practices, Mr Gething said he understands why some of them "will be frustrated".

  He added: "But we're delivering the AstraZeneca vaccine in supplies that we have to keep it going.

  "And as I said, the availability of that vaccine is the current rate limiting step and significantly increasing our delivery because we know there are a range of general practices and others who could deliver more if we had more supply.

  "The supply they're being given is supplied for the week - it's not to stretch through for the whole population that they're covering."
