content: |-
  CCTV shows the moment rubble begins to fall from a building onto the street where a man is standing.

  The moment a man narrowly avoided a building collapse during Morocco's deadly earthquake has been caught on CCTV.

  The video shows debris from the building in Marrakesh falling onto the street where the man is standing.

