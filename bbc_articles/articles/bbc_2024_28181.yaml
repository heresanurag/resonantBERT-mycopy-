  Robotic dogs are helping law enforcement protect President-elect Donald Trump at his Florida residence.

  ‘Do not pet’: Why are robot dogs patrolling Mar-A-Lago?

  A robotic dog named “Spot” made by Boston Dynamics is the latest tool in the arsenal of the US Secret Service. The device has lately been spotted patrolling the perimeter of President-elect Donald Trump’s Mar-a-Lago resort in Palm Beach, Florida. They do not have weapons - and each can be controlled remotely or automatically - as long as its route is pre-programmed. Passers-by are warned by a sign on each of Spot’s legs: “DO NOT PET.” “I don't know that anyone is tempted to pet these robot dogs. They do not look cuddly,” said Melissa Michelson, a political scientist at Menlo College.

  Video of Spot strutting around the property has gone viral on TikTok - where reactions range from calling them cool and cute, to creepy - and become fodder for jokes on American late night television. But its mission is no laughing matter. “Safeguarding the president-elect is a top priority,” said Anthony Guglielmi, US Secret Service chief of communications, in a statement to the BBC. In the months leading up to the US presidential election, Trump was the target of two apparent assassination attempts. The first took place at a July rally in Butler, Pennsylvania and the other occurred at the Mar-a-Lago golf course in September. Citing “concern for operational security,” the Secret Service declined to answer the BBC’s specific questions about the use of robotic dogs in Trump’s security detail, including when the agency began deploying the device at his primary residence. Boston Dynamics also declined to answer specific questions, although it confirmed the Secret Service was deploying its Spot robot.

