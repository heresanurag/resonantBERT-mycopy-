content: |-
  Two teenagers shot 12 students and a teacher in one of America's worst school shootings.

  This video can not be played To play this video you need to enable JavaScript in your browser. Samantha Haviland was a student at Columbine High School when the 1999 shooting happened

  Survivors of the Columbine High School shooting have been speaking at a remembrance ceremony in Denver to mark the twentieth anniversary of the massacre.

  Twelve students and a teacher were murdered by two teenagers.

  A former student, Patrick Ireland, who was injured by bullets, said no one from the school or surrounding community had emerged unscathed.

  The event was the culmination of three days of commemorations. Earlier, members of the public left flowers and cards at a memorial to the victims.

