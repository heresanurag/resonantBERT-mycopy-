  Columbine students and staff also marked the day by taking part in community service projects.

  Survivor Will Beck placed flowers at the Columbine Memorial at Clement Park in Littleton, Colorado

  Sean Graves, a massacre survivor and 2002 graduate, spoke during the ceremony

  Crosses with the names and portraits of the victims at Chapel Hill Memorial Gardens, also in Littleton, Colorado

  People gathered to remember loved ones at the Columbine Memorial

  Spencer Greenlee, a student at Columbine High School, sat in prayer at the memorial

  Candles around a collection of flowers laid at the memorial
