title: Paula Radcliffe apologises for wishing convicted rapist luck at Olympics -
  BBC Sport
date: '2024-07-25'
section: Olympic Games
url: http://www.bbc.co.uk/sport/articles/cd10pyd7e2zo
content: |-
  Former marathon world champion Paula Radcliffe says she is "very sorry" after wishing a convicted rapist competing at the Olympics the "best of luck".

  Radcliffe competed at the Olympics four times in her running career

  Former marathon world champion Paula Radcliffe has said she is "very sorry" after wishing a convicted rapist competing at the Olympics the "best of luck". Steven van de Velde, who was named in the Netherlands beach volleyball squad for Paris 2024, was sentenced to four years in prison in 2016 after pleading guilty to raping a 12-year-old British girl when he was 19. The Dutchman, who met his victim on Facebook, travelled from Amsterdam to the UK and raped the girl at an address in Milton Keynes. The now 29-year-old resumed his volleyball career after serving just 12 months of his four-year sentence and was selected in June for the Dutch Olympic team for the Games. "I am mortified that I expressed it so badly and didn't condemn the rape out loud," said Radcliffe. Earlier, in an interview with radio station LBC on Wednesday, she said: "I know that he is married now and has settled down. "I think it's a tough thing to do to punish him twice and if he's managed to successfully turn his life around after being sent to prison, and to qualify and to be playing sport at the highest level, then I actually wish him the best of luck." She referred to doping offenders being allowed to return to sport after serving bans. In a series of posts on social media, BBC pundit Radcliffe apologised for her remarks. "I do believe in second chances after serving punishment but think the Olympics should be for those who uphold the ideals - that's why I poorly brought the doping comparison in," she added. "I myself am shocked and disappointed at how I expressed this so badly. "I am very sorry and should have done much better. I by no means meant to overlook the crime and meant to say those who don't uphold ideals should be excluded but can't be. "I profoundly apologise and am deeply shocked and disappointed in myself and can't understand how I managed to convey it so badly."

  Following Van de Velde's initial selection for Paris, the Dutch Olympic Committee (NOC) told BBC Sport: "After his release, Van de Velde sought and received professional counselling. He demonstrated to those around him - privately and professionally - self-insight and reflection." The NOC says his return to the sport met guidelines set by the Dutch Volleyball Federation (NeVoBo) in the organisation's 'Guidelines Integrity Record', which sets out conditions for athletes to resume competing after conviction. The International Olympic Committee (IOC) said the selection of athletes for the Games was the responsibility of individual committees. Van de Velde's inclusion in the Games has been criticised by women's safety groups. Kyniska Advocacy, a UK athlete-led safe sport organisation, is one of the organisations that has called on the IOC to disqualify Van de Velde from the Games. The group's CEO, Mhairi Maclennan, said: "To have a convicted rapist representing their country on a global stage not only goes entirely against the Olympic ideals and commitments but it shatters the IOC's vision of building 'a better world through sport'." Reflecting on the radio comments she made about Van de Velde, Radcliffe added: "I genuinely have no idea why I would ever wish luck when I didn't mean it and sincerely apologise for hurt." Later on Thursday, Radcliffe issued a second apology to say how "ashamed" she was that her words "so inaccurately represented" her views. "I am truly sorry for so wrongly expressing my intended views and understand that this statement can in no way repair the damage but hopefully conveys my deep regret," she added on X, external.
