title: 'Cher Maximen murder: Man guilty of London stabbing at Notting Hill Carnival
  - BBC News'
date: '2025-04-09'
section: London
url: http://www.bbc.co.uk/news/articles/cp9yvlvx4jpo
content: |-
  Shakeil Thibou is found guilty of murdering Cher Maximen after stabbing her at Notting Hill Carnival.

  Cher Maximen was stabbed at Notting Hill Carnival on 25 August and died six days later

  A man has been found guilty of murdering a "radiant, loving, passionate and kind" woman who he stabbed with a zombie knife in front of her three-year-old daughter at the 2024 Notting Hill Carnival. Cher Maximen, 32, had gone to the first day of the carnival, known as family day, with her daughter and a group of friends when she got caught up in a fight between a group of men and was stabbed. She died six days later. Shakeil Thibou, 20, from Kensington in west London, was found guilty of her murder at the Old Bailey following a four-week trial. Ms Maximen's family thanked the jury for "helping ensure justice is served for our beloved Cher Maximen – affectionately known to us as Princess Cher".

  Thibou was convicted of her murder by a majority of 10 to two. Jurors also found him guilty of attempting to cause grievous bodily harm with intent of another carnival-goer and of possessing an offensive weapon. He was acquitted of attempted murder.

  This video can not be played To play this video you need to enable JavaScript in your browser. Cher Maximen's family paid tribute to the "dedicated mother, a devoted granddaughter, niece, sister and friend" outside court

  During the trial, it was heard that Thibou had lunged at a man, Adjei Isaac, during the fight on 25 August with a weapon described by a witness as a zombie knife. As Mr Isaac tried to avoid being stabbed he came into contact with Ms Maximen, who fell to the ground. She was then stabbed by Thibou. Ms Maximen suffered a cardiac arrest after the stabbing and was taken to hospital, where she underwent two major operations.

  TJ Jacobs, a relative of Ms Maximen and godmother to her daughter, said: "What happened to us has completely turned our lives upside down. "Cher was pure magic. Radiant, loving, passionate and kind. She brought creativity, style and flawless flair to everything she did. "She was a dedicated mother, a devoted granddaughter, niece, sister and friend. "This senseless act of violence has cut short a life who had so much more to offer the world and was only beginning to blossom." Ms Maximen's grandmother Vyleen Maximen said "life will never be the same again". "Thirty-two years of loving, laughing, playing, crying and holidaying with you. I will no longer have that pleasure ever again," she said. "I won't see you get married, or have more children. I will never hear your key opening my front door and shouting 'hello Nanny'." Ms Maximen's family added that she would not have wanted Notting Hill Carnival to be cancelled in the future, and called for safety concerns around the event to be addressed.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Thibou's two brothers, Sheldon, 25 and Shaeim, 22, were both found guilty of assaulting an emergency worker and Sheldon Thibou of violent disorder. The fatal attack took place in the street on Golborne Road in north Kensington when there were hundreds of people in the area and the carnival was in "full swing". A disturbance had first broken out close to 18:00 BST involving the three defendants and at least two other men. Ms Maximen was knocked down in the events and in an effort to defend herself and her daughter had lifted up her leg but was then stabbed in the groin by Shakeil Thibou. "It was a truly shocking attack - and regarded as such by those around it," said prosecutor Edward Brown KC.

  Giving evidence in his defence Shakeil Thibou, of Masbro Road, west London, denied taking a knife to the carnival and instead claimed he had picked up a weapon from the ground and was acting in self-defence during his confrontation with Mr Isaac. He claimed he had no intention of harming Ms Maximen and was unaware of her presence. The court heard he disposed of the knife in a drain as he left the carnival. Sheldon Thibou, of Star Road, west London, declined to give evidence at the trial, while Shaeim Thibou, of Charleville Road, west London, denied the charges saying he was acting in defence of his brother. Sheldon Thibou had admitted possessing a stun gun before the trial started, the court heard. Shaeim Thibou was found not guilty of violent disorder. Shakeil and Sheldon Thibou were remanded in custody and Shaeim Thibou was readmitted to bail. Shakeil and Shaeim Thibou are due to be sentenced on 16 May. A date for Sheldon Thibou's sentencing is yet to be set.

  Emma Currie, a senior prosecutor in the Crown Prosecution Service's London Homicide Unit, said she hoped today's verdict would "bring a sense of justice for the community". She added: "This is a profoundly tragic case where a young child lost her mother, on what was meant to be a family-friendly day for them both at the carnival. "Cher was caught up in the panicked crowd caused by the actions of the Thibou brothers, who robbed her of her life and the chance to see her little girl grow up." Ms Currie said her thoughts "remain with Cher's family and friends as they deal with this unimaginable loss".
