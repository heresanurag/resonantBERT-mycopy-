  The ambulance service said the four casualties were taken to the city's University Hospital of Wales at about 02:30.

  Park Plaza general manager Margaret Waters praised emergency service personnel, who did a "wonderful job", along with staff who evacuated all guests.

  "Unfortunately, it has impacted on Park Plaza because of the sheer amount of water that was required," she said.

  "Our team did a great job, and we were greatly assisted by our colleagues at the Hilton Hotel who let us host our guests."

  The fire service said it received a stop message just after 05:05 on Sunday

  In a statement, South Wales Fire and Rescue Service said it was "grateful to the public and partners, for assisting in bringing the incident to a successful conclusion".

  "We also want to praise the work of control room staff, and the initial attending operational crews, in carrying out the rescue," it added.

