content: |-
  A court hears how Norman McAndrew, 82, swerved across the road when the pet jumped up at him.

  Driver killed man after dog jumped on his lap

  Norman McAndrew had been navigating a bend in Dedham Road when the dog jumped up at him

  An elderly driver swerved onto the wrong side of the road and fatally struck a motorcyclist after an unrestrained dog jumped on his lap. Norman McAndrew told witnesses he "lost concentration" before crashing into 66-year-old John Murkin in Ardleigh, Essex, on 7 October 2023. The 82-year-old, of Colchester High Street, was jailed for three years at Chelmsford Crown Court after admitting causing death by dangerous driving. In a statement read to the court, Mr Murkin's sister said his death was "the worst shock I have ever endured".

  McAndrew had been transporting a "small white dog" to his sister's house, but the pet was unrestrained in his Kia Picanto and instead left to lie in a small bed, the court was told. He told police the dog jumped up at him as he negotiated a bend, explaining he then attempted to "use one hand to pick it up and put it in the [bed]". The driver also told witnesses: "I just lost concentration, the dog jumped on my lap." Matthew Sorel-Cameron, prosecuting, said the distraction caused McAndrew to cross onto the wrong side of the road and crash into Mr Murkin. "Ultimately, Mr Murkin had no chance to avoid the collision," Mr Sorel-Cameron said. "John Murkin was projected a short distance from his motorcycle and into a ditch at the side of the road."

  McAndrew was sentenced at Chelmsford Crown Court on Thursday

  Mr Murkin cried out "help me, help me" to a person who arrived to help, but he later died at the scene from his injuries, the court heard. McAndrew was noted to say: "In hindsight, I should've pulled over, braked and tried to put the dog in its basket." The prosecutor said it would have been "abundantly clear" to him that the pet was not restrained, adding he had "ample time" to take action. He told the judge the only effort McAndrew made to secure the pet was by tucking its lead into a door.

  In a statement read on her behalf to the court, Mr Murkin's sister, Anne Weimar, said he was "the best motorcyclist ever". Referencing his death, she added: "I cried and sobbed and can't really explain what was going on in my head. "Norman McAndrew, you hit and killed my brother because of your negligence." In a separate statement, Mr Murkin's son, James, said: "I would give anything to have one last time to tell him how much he meant to me." The defendant bowed his head in the dock while both statements were read out. Kevin Toomey, mitigating, said his client had shown "extreme remorse" for his actions. "He did not do what he should've done and restrained that dog properly," he said. Judge Mary Loram KC said the case was a "profound tragedy", adding: "It is clear that the dog was providing a very real distraction."

