title: 'Battersea stabbing: Murder arrests over teen death - BBC News'
date: '2019-02-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-47141435
content: |-
  The 19-year-old victim died after being stabbed in Battersea, south London, on Tuesday.

  The 19-year-old victim was found with stab injuries at Wolsey Court on Westbridge Road in Battersea

  A man and a teenager have been arrested on suspicion of murder after a teen was stabbed to death in south London.

  The 19-year-old victim was found injured at Wolsey Court on Westbridge Road, Battersea, on Tuesday.

  Police said officers and paramedics were called just after 19:50 GMT but he was pronounced dead at the scene at 20:36.

  The two arrested, aged 19 and 27, were held after presenting themselves at a central London hospital.

  Both have been taken to separate central London police stations for questioning, the Metropolitan Police said.

  The victim's next of kin have been informed and a post-mortem examination is due to be held.

