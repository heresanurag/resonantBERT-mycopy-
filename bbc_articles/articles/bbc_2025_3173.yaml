  Some users on social media have described the changes as "disrespectful to the original art style", external and "an AI interpretation of what Shrek 5 could look like", external. Others have compared it to the film animation of video game character Sonic the Hedgehog, which Paramount Pictures changed after fan backlash in 2019. Hyatt added: "The generation of children that watched Shrek back [when it was first released in 2001] are now adults. "There's usually a feeling of 'this isn't what I knew' or 'I want the old show I remember back'", he says. Hyatt, whose team contributed to The Adventures of Paddington and Lego City - No Limits, said that "because the trailer is so short it's hard to tell how its going to look in general". But, he added: "You can see from a technical perspective, the advancement in technology. "That means that on a similar or lower budget, you can producer a higher sheen and render quality, so it doesn't look quite as CGI (computer-generated imagery) and feels more tangible and real". He doesn't feel like much has changed from the original "art style" of Shrek, but says "the colours, vibrancy and realism" have changed, which is a symptom of animation technology improving.

  Shrek and Fiona as they were in the original film in 2001

  In the short trailer, Shrek (Mike Myers), Princess Fiona (Cameron Diaz), Donkey (Eddie Murphy) and Felicia (Zendaya) gather round a magic mirror to ask "Who's the fairest of them all?". The face in the mirror, which also appears to have had a bit of a makeover, responds that it is Shrek, with images then flashed up on screen of Shrek wearing glasses and posing, then dancing in a skintight catsuit before appearing with rippling abdominal muscles. This pays tribute to some of the internet's favourite Shrek memes, whilst giving viewers a first look at the now grown-up Felicia, who first came to life in Shrek The Third in 2007, alongside her triplet siblings Fergus and Farkle. Shrek's return was teased at the end of the Puss In Boots sequel in 2022, so fans have been expecting this new film for quite some time. Its perhaps why the much-loved film has sparked so much pushback, with fans joking that Shrek looks like he's has had "botox and a face lift", external whilst others have criticised the characters for having rounder faces, external. But not everyone has a problem with the new looks - some have praised the animators for ageing the characters with greying hair and wrinkles,, external whilst others say the updated animations are just a symptom of CGI improving., external

  Hyatt said that despite the criticism that's been levelled at the trailer, he believes it will be "forgotten within two minutes of watching the movie". "Shrek has never been about looking cute or beautiful, it's about being gross with all the jokes and silliness," he says. "If they [the producers] have got the script right and the characters right, then people will still love it, it's still a great franchise." Shrek 5 is slated for release in December 2026, following on from Shrek Forever After in 2010.
