title: Has Shrek had a face lift? Trailer for new film divides fans - BBC News
date: '2025-03-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/cgkmmkyrl0vo
content: |-
  Some fans aren't happy with the characters' updated appearance, 15 years on from the last Shrek film.

  Has Shrek had a face lift? Trailer for new film divides fans

  Zendaya will voice new character Felicia, stars alongside Mike Myers, Cameron Diaz and Eddie Murphy

  The long-awaited first trailer for the new Shrek 5 film has been criticised by some film fans over the way characters have been animated, giving them different facial features. In the 27-second clip, external, recurring characters Shrek, Donkey, Pinocchio and Princess Fiona appear alongside Felicia - one of Shrek and Fiona's now grown-up children. The short teaser announces that Zendaya is joining the cast as Felicia, whilst also reintroducing Mike Myers, Cameron Diaz and Eddie Murphy who are all reprising their roles. Oli Hyatt, who runs Blue Zoo Animation, told the BBC there's often "an instant reaction" when changes are made to a film like Shrek, due to its "nostalgic properties".

