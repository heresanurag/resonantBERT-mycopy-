  Schoolchildren suggest names for Harry and Meghan's new son, amid speculation he might be named later.

  These school children told BBC Newsround what they think Harry and Meghan's new boy should be called.

  The Duke and Duchess of Sussex's son was born at on Monday 6 May 2019, weighing 7lbs 3oz (3.2kg).
