title: Mount Etna spits lava and smoke at dawn - BBC News
date: '2024-08-05'
section: General
url: http://www.bbc.co.uk/news/videos/c0w441d515xo
content: |-
  Europe's tallest volcano, Mount Etna, putting on a lava and smoke show over Sicily.

  Video shows Europe's tallest volcano, Mount Etna, erupting over the Mediterranean island of Sicily.

  Volcanic activity has intensified in recent weeks, with recurrent activity following a four year pause.

  A massive cloud of ash and smoke has restricted arrivals to Catania airport. Several flights have been diverted to airports such as Palermo and Comiso, as pilots struggle with visibility.
