title: 'Florida: Bodycam footage shows officials borrowing boat to chase suspected
  thief - BBC News'
date: '2022-06-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-61731562
content: |-
  Footage shows officials taking to the water to detain a man in the US state of Florida.

  Officials in Florida took an unusual step to catch a suspected thief.

  Bodycam footage from the Volusia Sheriff's Office showed officials asking to borrow a family's boat to track down the man, who was adrift on a stolen water scooter.
