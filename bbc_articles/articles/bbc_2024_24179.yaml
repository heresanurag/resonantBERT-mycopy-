content: |-
  Great Britain's Hannah Cockroft wins her ninth career Paralympic gold medal as she leads home a British one-two in the T34 800m final at Paris 2024.

  Hannah Cockroft is a world record holder at 100m, 200m, 400m, 800m and 1500m

  Great Britain's Hannah Cockroft won her ninth career Paralympic gold medal as she led home a British one-two in the T34 800m final at Paris 2024. A dominant Cockroft finished ahead of team-mate Kare Adenegan, just as she did in Sunday's 100m final, to win her second title in Paris. Cockroft has won gold in the 100m and 800m at every Paralympics since London 2012, and took the 400m title at Rio 2016. She finished in a time of one minute 55.44 seconds, almost eight seconds ahead of silver-medallist Adenegan, with the USA's Eva Houston denying a British clean sweep of the podium by outsprinting Fabienne Andre for bronze. Elsewhere, Didi Okoh took bronze in the women's T63 100m, while Aled Sion Davies missed out on winning gold at a fourth consecutive Paralympics. The 33-year-old Welshman took the lead in the men's F63 shot put with a third-round effort of 15.10m, but had to settle for silver after Kuwait's Faisal Sorour threw 15.31m in round four.

  Cockroft, 31, further cemented her reputation as one of the all-time Para-athletics greats. Her title comes three weeks and five days before she is set to get married. "[My fiance's] voice was the last one I heard," she told Channel 4. "It means so much. He understands what goes into that performance. "I'll go home, have an amazing wedding and have a great life." With 16 world titles and the world record in 100m, 200m, 400m, 800m and 1500m in her discipline, Cockroft was the overwhelming favourite at the Stade de France. She got off to a superb start in lane eight, quickly building a substantial lead, and time trialled her way to the line. She celebrated by ringing the bell at the side of the track nine times, one for each of her Paralympic medals, in front of a feverish support. "The atmosphere was amazing," she added. "I could feel the noise following me around, it’s like being back in London, I love it."
