title: 'Worksop explosion: Probe continues after man dies in blast - BBC News'
date: '2025-04-14'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/cx20kdlxdv3o
content: |-
  A man in his 50s died in the explosion that saw dozens of people evacuated from their homes.

  Probe continues into cause of fatal house explosion

  Neighbouring properties were also severely damaged by the blast

  Investigations are continuing into the cause of a house explosion that killed a man and saw dozens of people evacuated from their homes. Emergency services were called to John Street, Worksop, Nottinghamshire, on Saturday shortly before 20:00 BST. Disruption is expected around the scene for some time after one terraced house was destroyed and two more partially collapsed. Police confirmed on Sunday a man in his 50s was discovered in the wreckage having died at the scene.

  The aftermath of the explosion pictured on Monday morning

  A major incident was declared by emergency services following the explosion on Saturday evening. As well as the three houses directly affected, eight other properties and 20 cars were damaged by debris, Nottinghamshire Police said. One other person was treated for minor injuries. A number of families have been placed in temporary accommodation but the cordon has been reduced and residents of Sime Street have been returning.

  Resident Debbie Adams said the explosion filled her dining room with dust

  On Monday, a BBC reporter at the scene said the road outside the affected houses had been cleared and men in a cherry picker crane were removing loose parts of the structures. Vehicles from a demolition company and Bassetlaw District Council housing repair were at the blast site. Those residents who have still not been given permission to return permanently are being allowed through the cordon to gather belongings and medication. Debbie Adams, who lives just a few houses away, said the explosion shook her house and filled her dining room with dust. She said: "I went into the street and saw the house totally collapsed. "There was dust, and everybody was out, and nobody knew what was going on." She was told to leave by the emergency services and said she did not know when she might get back in. "I'm going to check to see if I can get some clothes and my medication. "I was put in a hotel but everybody has been very kind," she said.

  Piotr Peruki said his teenage son was so shaken by the blast that he had asked to move

  Piotr Peruki, whose house backs on to the scene, was offered a place in the community centre but spent Saturday night in his car. His 14-year-old son, who went to stay with friends in Sheffield, is still affected by the shock. "For him it was a very bad experience, he is scared," he said. "He says he does not want to stay here, he wants to move house, he does not feel safe because maybe the accident will happen again. "It had a very big impact on him."

  Police at the cordon on Monday

  In a police statement on Sunday evening, Ch Insp Clive Collings said: "I want to reassure our community in Worksop that we are doing everything we can this evening to support residents. "Officers are working at pace with Nottinghamshire Fire and Rescue Service to determine the cause of this tragic incident. "There will be an increased police presence in the area and a cordon and road closures will remain in place overnight and into tomorrow morning. "This is a large scene that will take some time to clear, and I want to thank residents for their patience and understanding."

  Nottinghamshire Police said emergency services treated the man but were unable to save him and he died at the scene

  Residents, who live on and around John Street, spoke of the "chaos" in the wake of the blast, which significantly damaged houses adjacent and opposite to the property. Joan Smith, who lives on the street, told the BBC: "I've never seen so many police, so many ambulances, and I've never seen so many fire engines. Nothing usually goes off around here. "It's upsetting [that someone has died]. You see these things but never think they're going to happen in your area. "We don't really know what happened yet, and I guess it might take a while."

  Residents said they heard a loud bang on Saturday evening

  Marie Mallion, who lives nearby on Manvers Street, said: "I was sat watching TV with my dogs, and we heard this massive crash, and the dogs went wild, and everyone came out of their doors. "I felt something had fallen on the roof; it was so loud, it was almost like a bomb had hit it or an earthquake or something. "It was just the weirdest noise, and everything shook in the house, and things just fell everywhere." Purvi Srikenthen, who runs a local shop, said: "We heard there were lots of families affected and children affected. "So we have tried to give them what they need, especially with food, so what they have asked for we have tried to give them."

  Bassetlaw District Council staff were due on site on Monday to inspect houses

  The explosion rocked the foundations of neighbouring homes

  About 50 people from 35 properties were evacuated and were supported by Bassetlaw District Council and Nottinghamshire County Council. A number have since returned to their homes but an emergency shelter at Crown Place Community Centre was still available, officials said. Those still in need of support have been found temporary accommodation. Everyone in the area has been accounted for, police confirmed. Fire crews from Warsop, Worksop and Mansfield Fire Station, as well as Clowne Fire Station, attended. Specialist urban search and rescue teams were called in to search the area after the blast, Nottinghamshire Fire and Rescue Service said. They had ended their search by Sunday afternoon, a police spokesperson told the BBC at the scene.

