title: 'Watch: Fire after Gaza City hospital blast - BBC News'
date: '2023-10-18'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67140939
content: |-
  Hundreds of Palestinians are feared dead after a huge blast at a hospital in Gaza City.

  Hundreds of Palestinians are feared dead after a huge blast at a hospital in Gaza City, blamed by the Hamas group on an Israeli air strike.

  Israel says the blast was caused by rockets misfired by another group, Palestinian Islamic Jihad, and both sides deny blame.

  Video verified by the BBC appears to show the hospital on fire.

  Emergency workers attended to casualties and took them to another nearby hospital.
