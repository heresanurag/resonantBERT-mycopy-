title: Gerwyn Price thrashes Luke Littler in Australian Masters final - BBC Sport
date: '2024-08-11'
section: Darts
url: http://www.bbc.co.uk/sport/darts/articles/c5y87j532k9o
content: |-
  Luke Littler is thrashed 8-1 by Gerwyn Price in the 2024 Australian Darts Masters final in Wollongong.

  Luke Littler was thrashed 8-1 by Gerwyn Price in the 2024 Australian Darts Masters final in Wollongong.

  The Welshman, who beat Peter Wright 7-6 in the semi-final, raced into a 5-0 lead before his 17-year-old opponent claimed his one and only leg in the first-to-eight contest.

  Littler had beaten Dimitri Van den Bergh 7-6 in his semi-final and had no answer to Price's dominance.

  Price had a 99.42 average and checkout percentage of 53.3% compared to Littler's average of 94.24 and checkout percentage of just 8.3%.

  The victory gave Price his second World Series of Darts title of 2024.
