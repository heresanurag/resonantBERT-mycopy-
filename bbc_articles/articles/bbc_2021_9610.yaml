content: |-
  Lailuma Sadid, a journalist with Brussels Morning Newspaper, became emotional when asking the Nato secretary general about the Taliban in Afghanistan.

  Lailuma Sadid, a journalist with Brussels Morning Newspaper, became emotional when asking the Nato Secretary General about the Taliban in Afghanistan.

  In a plea to Jens Stoltenberg, she said: “As a woman, please don't recognise the emirate Islamic Taliban without any condition like the agreement which is signed between Taliban and the government of Trump."
