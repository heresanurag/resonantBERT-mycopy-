title: 'Stuttgart Open: Emma Raducanu falls to top seed Iga Swiatek in quarter-finals
  - BBC Sport'
date: '2024-04-19'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/68859394
content: |-
  Britain's Emma Raducanu falls to world number one and defending champion Iga Swiatek in the quarter-finals of the Stuttgart Open.

  Raducanu was making her first WTA quarter-final appearance in 19 months

  Emma Raducanu has been knocked out of the Stuttgart Open despite a spirited quarter-final display against world number one Iga Swiatek. Britain's Raducanu, who is continuing her comeback from an injury-hit 2023 season, lost 7-6 (7-2) 6-3 against the clay-court specialist from Poland. Swiatek is on a 10-match winning run in Stuttgart, having won the last two editions of the WTA 500 tournament. She will face Kazakhstan's fourth seed Elena Rybakina next.

  Raducanu, 21, has enjoyed a return to form over the past week, helping Britain beat France in the Billie Jean King Cup at the weekend before wins against three-time major winner Angelique Kerber and Linda Noskova. Her run to the quarter-finals in Stuttgart will see her rise up the world rankings after dropping to 303rd following wrist and ankle operations in 2023. Asked if she thought Raducanu can return to the top level of the sport, Swiatek said: "I hope she will be able to do it because for sure she has the game for it."

  Swiatek is bidding to become the first player to win three straight Stuttgart Open titles since Maria Sharapova between 2012 and 2014

  Raducanu enjoyed a dream start against Swiatek, 22, fighting back from 40-0 down to break the defending champion's opening service game. The four-time major winner broke back immediately and continued to threaten Raducanu's serve throughout the first set, but the Briton held firm to force a tie-break. Swiatek raced through the tie-break before striking the first blow in the second set on her way to a 3-1 lead as a tumble onto the clay floor seemed to momentarily dent Raducanu's confidence. The 2021 US Open champion regained her composure to divert three break points in the fifth game, but the single break of serve in the second set proved enough for Swiatek to wrap up the win after a gruelling two hours and four minutes on court. "It was a pretty intense match so I am happy I was able to keep the intensity even though we played tough games for over two hours," Swiatek said. "It wasn't easy, I had a lot of break points that I couldn't convert."

  Earlier on Friday, Rybakina booked her last-four spot by defeating Italy's Jasmine Paolini 6-3 5-7 6-3. On the other side of the draw, Wimbledon champion Marketa Vondrousova knocked out world number two Aryna Sabalenka with a 3-6 6-3 7-5 win. Sabalenka has failed to go beyond the quarter-finals of a tournament since her Australian Open triumph in January. The Belarusian, a runner-up in the last three Stuttgart tournaments, committed 48 unforced errors and converted just six of her 15 break points. Vondrousova, the Czech sixth seed, will play Marta Kostyuk next after the Ukrainian secured her second straight top-10 win against US Open champion Coco Gauff. American Gauff sped through the first set in 36 minutes, but Kostyuk, who knocked out China's fifth seed Zheng Qinwen on Thursday, fought back from a break down in both the second and third sets to win 3-6 6-4 7-6 (8-6).
