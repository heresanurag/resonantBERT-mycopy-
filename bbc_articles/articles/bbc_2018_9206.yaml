id: bbc_2018_9206
title: Video shows Lancashire police officer strike girl, 14 - BBC News
date: '2018-08-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-lancashire-45257328
content: |-
  Lancashire Police said the officer used an "open hand strike" when the girl attempted to grab his Taser and radio.

  A video has been posted on social media showing a teenage girl being hit by a male officer.

  The footage was shot while the 14-year-old and a woman, 52, were arrested on suspicion of assaulting a police officer.

  Police had been called to reports of youths fighting on Peel Street, Accrington, at 17:45 BST on Monday.

  Lancashire Police Chief Inspector Andy Rhodes said he had personally reviewed the footage and the officers had his full support.

  The force said the officer used an "open hand strike" when the 14-year-old girl attempted to grab his Taser and radio.
