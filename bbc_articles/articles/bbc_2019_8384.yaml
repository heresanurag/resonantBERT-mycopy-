content: |-
  The 15-year-old girl was crossing Glenburn Road in Paisley with friends when she was struck by a car.

  The girl was struck as she crossed Glenburn Road in Paisley

  A 20-year-old man has been arrested over the death of a teenage girl in an alleged hit-and-run in Paisley.

  The 15-year-old girl was crossing Glenburn Road, near Fereneze Drive, with friends at about 02:00 when she was struck by a car.

  She was rushed to the Queen Elizabeth University Hospital in Glasgow by ambulance but died a short time later.

  Police have appealed for witnesses and for any dashcam footage of the area around the time of the incident.

  Ian McCabe, who lives next to the scene where the teenager was struck, said he heard cars on the road just before the collision.

  He told BBC Scotland news: "I heard the loudest bang I've ever heard. I looked out of the window and saw a girl. She was shouting 'they've just knocked down my pal'.

  "Cars are racing up and down here all the time. I've complained to the council and they've not done anything about it."

