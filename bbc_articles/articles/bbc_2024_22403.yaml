  A Japanese firm whose name was on devices that exploded says it discontinued them a decade ago.

  Japan firm says it stopped making walkie-talkies used in Lebanon blasts

  A man holds an Icom device in Beirut after he removed the battery. The devices that exploded in Lebanon on Wednesday appear to be Icom IC-V82 transceivers

  A Japanese handheld radio manufacturer has distanced itself from walkie-talkies bearing its logo that exploded in Lebanon, saying it discontinued production of the devices a decade ago. At least 20 people were killed and 450 injured after hundreds of walkie-talkies, some reportedly used by the armed group Hezbollah, exploded across Lebanon on Wednesday. The devices, according to photos and video of the aftermath of the attack, appear to be IC-V82 transceivers made by Icom, an Osaka-based telecommunications manufacturer. But Icom says it hasn’t produced or exported IC-V82s, nor the batteries needed to operate them, for 10 years.

  It is the second Asian company to be embroiled in bombing incidents in Lebanon this week, after thousands of exploding pagers seemingly linked to Taiwanese firm Gold Apollo killed at least 12 people and injured more than 2,000. Gold Apollo's founder Hsu Ching-Kuang flatly denied his company had anything to do with the attacks, saying he licensed his trade mark to a company in Hungary called BAC Consulting, whom the BBC has been unable to contact.

  Icom told the BBC it was aware of reports that two-way radio devices bearing its logo had exploded in Lebanon, and said it was investigating the matter. "The IC-V82 is a handheld radio that was produced and exported, including to the Middle East, from 2004 to October 2014. It was discontinued about 10 years ago, and since then, it has not been shipped from our company,” Icom said in a statement. “The production of the batteries needed to operate the main unit has also been discontinued, and a hologram seal to distinguish counterfeit products was not attached, so it is not possible to confirm whether the product shipped from our company.” Icom further added that all its radios are manufactured at the same factory in Japan, and that it only sells products for overseas markets via authorised distributors.

