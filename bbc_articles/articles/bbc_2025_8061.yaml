content: |-
  An investigation is launched after the victim was found dead in County Durham on Saturday evening.

  Man in 50s killed in shooting at house

  A cordon has been put in place with officers carrying out house-to-house inquiries

  A man has died in a shooting in County Durham. Emergency services attended a home in Elm Street, Stanley, at about 17:20 BST on Saturday following reports of a disturbance. A man aged in his 50s was declared dead at the scene despite the efforts of paramedics to save him. Durham Police described it as a "truly shocking incident" and an investigation has been launched.

  Det Supt Neil Fuller said officers were carrying out "several lines of inquiry" but the force has not indicated at this stage whether officers have made any arrests or were searching for anybody else.

  The victim's family have been informed and were being supported, police added.

  Police said they were called to a disturbance on Saturday

  A cordon was put in place with officers carrying out house-to-house inquiries, and witnesses or anyone with information has been urged to contact Durham Police. Det Supt Fuller said: "Residents may see an increased police presence in the area. I would like to thank them for their support while we carry out this investigation. "Our thoughts are with the man's family at this time."

