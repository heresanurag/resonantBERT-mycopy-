title: Can DNA tests identify litter louts? - BBC News
date: '2020-02-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-37355529
content: |-
  Mike Dilger examines a radical solution to stop people dumping rubbish using DNA testing, but can it identify the offenders?

  Littering and fly-tipping are a growing problem in many towns, cities and rural areas across Britain.

  There were about 90,000 cases of fly-tipping in England during 2014-15, according to government statistics, costing local authorities an estimated £50m.

  In addition, littering is one of the UK's biggest low-level crimes, and costs the taxpayer between £717m and £850m a year to clean up.

  But what can be done to reduce the scale of the problem?

  One radical solution is to use DNA testing to trace the identity of people who drop litter, a deterrent which has been used recently in Hong Kong.

  Inside Out's Mike Dilger looks at whether DNA evidence can help to identify people dropping rubbish in the UK.

  He meets experts from Kings College London who attempt to extract DNA from litter to trace people dropping rubbish.

  Inside Out is broadcast on BBC One England on Monday, 19 September at 19:30 BST and nationwide on the iPlayer for 30 days thereafter.
