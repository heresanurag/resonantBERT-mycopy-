content: |-
  As a frenzy has gripped all sides of the political spectrum following the assassination attempt on Trump, falsehoods have taken off online.

  How conspiracy theories and hate dominated social feeds after assassination attempt on Trump

  Within minutes of the news breaking about the assassination attempt on former President Donald Trump, that word was trending on X in the United States. It's a word that has become synonymous with conspiracy theories on the fringes of social media, often to cast doubts on an attack or shooting. But in the last 24 hours it has flooded into mainstream online conversation, and posts filled with evidence-free speculation, hate and abuse have racked up millions of views on X. Assassination attempts on US presidents have in the past been magnets for conspiracy - the killing of John F Kennedy in November 1963, most famously. This one was the first to play out in real time, so it’s not surprising that unfounded rumours flourished. But what has stood out is how this frenzy gripped all sides of the political spectrum. It’s not been limited to committed groups of political supporters. Instead, it was actively recommended in users’ “For You” feeds as they tried to make sense of what had happened. And it was often posted by users who have purchased blue ticks, offering their posts greater prominence.

  As ever, the conspiracy theories sometimes started with legitimate questions and confusion. They centred on alleged security failings, with lots of users understandably asking how this could happen. How did the attacker make it to the roof? Why weren’t they stopped? Into that vacuum rushed a wave of disbelief, speculation and disinformation. “It looks very staged,” read one post on X which racked up a million views. “Nobody in the crowd is running or panicking. Nobody in the crowd heard an actual gun. I don’t trust it. I don’t trust him.” The profile says it’s based on the south-west coast of Ireland. Its since been labelled with a note on X pointing out the shooting was real. Once more footage and testimony from both inside and outside the rally was shared, the panic and fear of those there became all too clear.

