title: Luke Littler's van window smashed during Norwich match - BBC News
date: '2025-05-18'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c0eqg03rj5no
content: |-
  The world champion darts player calls the vandals "scum of the earth".

  Luke Littler described those who smashed his Mercedes van as "absolutely scum of the earth"

  The rear window of a van belonging to world champion darts player Luke Littler was smashed while he took part in an exhibition match. Littler played in the MODUS Icons of Darts event at Epic Studios in Norwich on Saturday, where he defeated Luke Humphries. After leaving the event, he found his vehicle had been damaged. Posting to Instagram he said: "Just trying to do an exhibition in Norwich and this happens, absolutely scum of the earth." Norfolk Police has been approached for comment.

  The incident happened while the reigning world champion was in Norwich for a match

  Just a couple of days earlier, he had been taking part in the BetMGM Premier League at P&J Live in Aberdeen

  Littler is the youngest-ever darts world champion, and he took the record from Michael van Gerwen in January, aged 17. Van Gerwen was the previous youngest champion when he won the first of his three world titles in 2014, aged 24. Littler, who was born in Warrington and moved back to the town when he was six years old, has won 11 senior PDC titles and is also the reigning Premier League and Grand Slam champion.

