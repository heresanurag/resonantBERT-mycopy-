title: Forceps removed from stomach after 18 years - BBC News
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/news/world-asia-38497547
content: |-
  A Vietnamese man has had surgical forceps removed from his stomach after 18 years.

  Ma Van Nhat believes the forceps were left there during surgery in 1998.
