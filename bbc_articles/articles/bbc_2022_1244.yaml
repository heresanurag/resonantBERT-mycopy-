title: 'As it happened: Boris Johnson apologises for lockdown drinks party - BBC News'
date: '2022-01-12'
section: UK
url: http://www.bbc.co.uk/news/live/uk-59958872
content: |-
  After days of silence, the PM admits he went to a "bring-your-own-booze" party at No 10 in May 2020.

  Why have police not fined Downing Street staff yet?

  The police approach to the Coronavirus Health Protection Regulations from the start was to encourage people to comply over enforcement and fines. The Metropolitan Police have been reluctant to do retrospective investigations into events many months ago. It could also be seen as disproportionate for officers to start seizing emails and mobile phone messages from Downing Street staff while the Civil Service is already conducting its own investigation. So if there is any greater police involvement it is likely to wait until Sue Gray’s investigation is complete. Whether any regulations were actually breached that day is far from clear, as the regulations in force at the time applied to gatherings “in a public place” while the garden of No 10 Downing Street was many of the alleged participants’ workplace. There is also the question of whether police officers working in Downing Street at the time noticed that people were arriving at No 10 that evening with bottles bought at the local Tesco Express. If officers were aware of the drinks do, did they inform anyone or do anything about it at the time to ensure Health Protection Regulations were not being broken? The Metropolitan Police has not yet answered that question.
