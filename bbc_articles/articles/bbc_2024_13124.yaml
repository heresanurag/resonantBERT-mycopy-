  India captain and player of the match Rohit Sharma: "That's what I have to do at the top of the order, see what the bowlers are trying to do and play accordingly. "There was a strong breeze. They changed their plan, so I had to open up the other side of the field. We need to be smart, which I backed myself to do." Australia captain Mitchell Marsh: "It's so disappointing. We know we still have a chance to make the semis but India got the better of us. "Rohit Sharma is very hard to stop when he's in that mode. He deserves all the credit for that.
