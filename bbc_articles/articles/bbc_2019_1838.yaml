id: bbc_2019_1838
title: 'Genoa bridge collapse: Demolition begins six months after disaster - BBC News'
date: '2019-02-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-47177386
content: |-
  Six months after 43 people were killed when part of the bridge collapsed, work to rebuild it has started.

  Work to demolish Genoa's Morandi bridge, which partially collapsed last August killing 43 people, has begun ahead of its reconstruction.

  The new bridge is expected to be Europe's most expensive.
