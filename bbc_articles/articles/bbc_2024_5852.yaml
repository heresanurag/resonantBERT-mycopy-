  A BBC documentary follows soldiers on their mission to protect Ukraine’s second largest city, Kharkiv.

  A BBC documentary by Jamie Roberts follows soldiers on a mission to protect Ukraine's second largest city, Kharkiv.

  The group of 99 Ukrainians were told to protect a vital railway line in Kupyansk.

  They wore cameras which captured their deployment, from releasing drones to hiding from enemy fire.

