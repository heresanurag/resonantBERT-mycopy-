title: '''It''s an honour'': Paddy McGuinness completes charity bike ride - BBC News'
date: '2024-11-17'
section: General
url: http://www.bbc.co.uk/news/videos/ce89ej601w4o
content: |-
  The presenter rode 300 miles from Wales to Scotland on a Raleigh Chopper bike for Children in Need.

  Paddy McGuinness has said it was an "honour" to ride 300 miles from Wales to Scotland on a kids' bike in aid of the BBC's Children in Need charity.

  "It was such a joy, I can't even call it a challenge," said the BBC Radio 2 presenter.

  The former Top Gear and Question of Sport host, 51, has raised more than £7.5m on his five-day journey.
