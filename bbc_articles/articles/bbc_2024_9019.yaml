title: 'Cardiff Uni: Jacob Rees-Mogg chased by protesters after talk - BBC News'
date: '2024-04-27'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68913091
content: |-
  Demonstrators followed him as he was escorted to a car surrounded by security.

  These were the scenes as protesters waving Palestine flags descended on Tory MP Jacob Rees-Mogg after he gave a speech at Cardiff University.

  The politician can be seen surrounded by security guards as he is escorted to a car.

  Demonstrators filming and waving placards followed him as voices could be heard shouting at the former Tory minister.

  Organisers the Welsh Underground Network said he was not welcome in Wales.

  The talk was arranged by Cardiff University Conservatives who thanked attendees it said "conducted themselves appropriately".

  South Wales Police said there were no arrests.
