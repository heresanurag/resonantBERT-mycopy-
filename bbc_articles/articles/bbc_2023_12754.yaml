title: 'Moy: Woman missing in County Tyrone is found safe - BBC News'
date: '2023-08-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66590566
content: |-
  Police and the coastguard were involved in a search for Claire Rock.

  A woman who went missing in County Tyrone has been found safe, police have said.

  The police, Sligo Coastguard helicopter and Lough Neagh Rescue were involved in the search for Claire Rock.

  Lough Neagh Rescue said it had been tasked to the search operation along with the Police Service of Northern Ireland.

  On Wednesday evening police, said Ms Rock had been found and was safe and thanked the public for their help.
