  There is so much uncertainty around what will happen on Saturday. President Maduro still controls Venezuela's borders and in that respect has the upper hand.

  But many are looking to next week already.

  If the stand-off drags on, the fear is that this positive energy that has revived Mr Maduro's critics will wane, as will the interest of the international community, and that's what Juan Guaidó needs to achieve regime change.

  People want to know about a plan B - if indeed Mr Guaidó has thought of one. Otherwise, the hope here will soon turn to despair.

