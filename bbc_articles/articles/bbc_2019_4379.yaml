id: bbc_2019_4379
title: Did Russia meddle in Magadascar's election? - BBC News
date: '2019-04-08'
section: General
url: http://www.bbc.co.uk/news/world-africa-47830161
content: |-
  A BBC investigation has revealed that at least six candidates were offered money by Russians in the lead up to last year’s presidential elections in Madagascar.

  The presence of Russian political strategists with alleged ties to the Kremlin, posing as tourists with the alleged aim of helping to control the tightly fought race, has raised questions whether democracy in the former French colony has been fatally compromised.
