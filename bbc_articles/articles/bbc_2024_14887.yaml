title: Man jailed for 28 years for murder of Lorna England in Exeter - BBC News
date: '2024-07-11'
section: Devon
url: http://www.bbc.co.uk/news/articles/cv2g9d0z4w9o
content: |-
  Cameron Davis is sentenced to 28 years in prison for the murder of 74-year-old Lorna England.

  Lorna England was attacked in Ludwell Valley Park, in Exeter, in February 2023

  A man has been jailed for 28 years after he stabbed to death a 74-year-old woman he had never met as she walked through a park in Devon. Cameron Davis, 31, was found guilty of murdering Lorna England in Ludwell Valley Park, in Exeter, in February 2023. Exeter Crown Court heard victim impact statements from Mrs England's husband Dave and their two children, who called Davis a "cowardly, brutal monster" and "pure evil". Mr England told the court that his wife was his "guiding light" and "soulmate".

  He said his wife was "kind, with a smile that lit up the room", a "proud grandma" and always "so willing to help others". He said: "That morning she had planted daffodil and tulip bulbs ready for the spring. "No punishment that you ever receive will ever be adequate compared to the pain inflicted on Lorna and my family." Mr England said he had struggled to cope since she had been murdered. “I hate to think what she must have gone through... it breaks my heart the last face she saw was yours”.

  Cameron Davis, 31, was found guilty of murdering Lorna England in 2023

  Davis had denied murder but pleaded guilty to manslaughter due to diminished responsibility. During sentencing, Mrs Justice Stacey said Davis was "wholly responsible for Lorna's death". She said: “No-one but you is in any way to blame. “No punishment you receive will ever compare to the pain you inflicted on Lorna's family." Son Richard described his mum as the most “amazing person - kind, caring and generous in nature”.

  Daughter Jackie spoke of how she was extremely close to her mum and how she missed her every day. She said that "devastated and heartbroken doesn't even come close". Questioning Davis, she asked “how would you feel if someone murdered your mum?” She said: “What horrifies me the most - last thing she saw was you. “[It] torments me thinking how scared she was when you left her to die, [it] constantly plays in my head and will haunt me for the rest of my life. “You do not have any remorse or taken any responsibility - you are pure evil.”
