id: bbc_2024_1102
title: Storm Isha causes crazy flight diversions - BBC News
date: '2024-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-68062244
content: |-
  Passengers ended up hundreds of miles away and sometimes in different countries than intended.

  The strong winds caused by Storm Isha brought difficult landing conditions at the UK and Ireland's airports, with many flights cancelled, delayed or diverted.

  Some passengers ended up hundreds of miles away and sometimes in different countries than intended.
