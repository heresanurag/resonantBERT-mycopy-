title: Teachers at school 'absolutely horrible' to girl who died – inquest - BBC News
date: '2024-11-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/c5yp7rj40myo
content: |-
  Megan Evans was found dead at her Milford Haven home after allegedly being bullied on social media.

  Megan Evans was found dead in her family home in 2017

  Teachers of a teenage girl who died in 2017 were "absolutely horrible" to her, her best friend has said. Megan Evans, 14, was found dead at her Milford Haven home after allegedly being bullied on social media. Speaking at an inquest into her death, Chloe Boswell, now 22, said Megan did not want to go to school "because they [teachers] were horrible to her". A former assistant head teacher at Milford Haven School, in Pembrokeshire, had previously said they were "satisfied" anti-bullying policies had been implemented.

  Ms Boswell, who said she had been "practically inseparable" from Megan since the age of three, said she "saw first hand" how Mark Styles, a teacher responsible for behaviour management, would "pick away at her", referencing her incorrect school uniform. Ms Boswell said she was aware Megan had self-harmed in the past and had trouble with other pupils in the school, adding the school was "horrible to her".

  Giving evidence in Pembrokeshire County Hall, she said on the day of her death Megan was "her normal bubbly self, there was no indication that there was something wrong". However, the inquest heard Megan's behaviour changed in school in the days and weeks leading up to her death. "She didn't say 'I'm struggling' but you could see it in her behaviour," Ms Boswell said. Travis Johnson, two years above Megan at school, said he spoke with her on Snapchat hours before her death. The inquest saw a transcript of their conversation where Megan said: "I CBA [could not be bothered] anymore."

  An inquest heard Megan's behaviour in school changed in the weeks leading up to her death

  Another friend, Macey Power, 21, said she was aware Megan had received unkind messages on social media. Megan told friends she was "logging off" from Snapchat before her death, the inquest heard. Ms Boswell said she frequently saw bullying at the school. Becoming emotional in court, Ms Boswell said some pupils felt they could not speak to teachers. "You couldn't trust the teachers in school with things like that," she said. But quizzed by Malcolm Duthie, for Pembrokeshire County Council, about whether Megan was persecuted Nicola Evans said: "I disagree." Ms Evans was a pastoral assistant at Megan's school when she died. Mr Duthie said that the issue of Megan being "picked on" by staff over her incorrect uniform was "peripheral". The court was told bullying policies in the school said arguments between pupils were solved through restorative practice. When asked about bullying policies in the school Ms Evans said arguments between pupils were solved through restorative practice. She added bullying allegations would be given to a senior member of staff. Online bullying was harder to deal with, she said, adding: "We were advised that that should go to the police." The inquest heard of a matter where a photo of Megan holding a cigarette was shared online. Ms Evans told the pupil who shared the picture to delete it, adding Megan was "happy with the outcome". It was not treated as bullying. The court heard it was not mentioned to Megan's parents. "As she was holding a cigarette, I thought maybe Megan wouldn't want her parents to know," she said.
