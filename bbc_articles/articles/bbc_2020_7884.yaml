title: 'Coronavirus: UK had to act ''rapidly and decisively'' on Spain quarantine
  - BBC News'
date: '2020-07-27'
section: UK
url: http://www.bbc.co.uk/news/uk-53548893
content: |-
  No 10 will also keep the quarantine policy for other countries under review, a minister says.

  The government had to act "rapidly and decisively" to impose a quarantine on people arriving in the UK from Spain, a minister has said.

  Health minister Helen Whately said the UK virus rate must be kept down to avoid a second spike.

  Asked about a quarantine for other countries, such as France and Germany, she said No 10 will monitor virus rates and "take action" if necessary.

  Labour has called for support for those having to quarantine.

  The party says there is no guarantee employers will allow people to work from home for two weeks.

  It comes as a UK government source has confirmed talks are under way with Spanish authorities about introducing specific air bridges with the Balearic and Canary Islands.

  The rate of infection in Spain is 35.1 cases per 100,000 people, while the UK is at 14.7, according to the latest figures from the European Centre for Disease Prevention and Control.

  The new coronavirus travel rule was announced on Saturday evening following a spike in the number of new cases in Spain this week.

  It came into force less than six hours after it was confirmed by the government, and requires travellers returning from all parts of Spain - including the islands of Majorca, Menorca and Ibiza - to provide an address where they will self-isolate for 14 days or risk a fine.

  During those two weeks, people must not go out to work, school, or public areas, or have visitors except for essential support. They should not go out to buy food if they can rely on others.

  Almost 1.8m people were due to fly from the UK to Spain before the end of August, according to analysis by travel experts The PC Agency.

  Global airline body the International Air Transport Association (IATA) has called the UK government's decision "disproportionate" and warned that it will cause a "big setback for consumer confidence".

  Andrew Flintham, the managing director of Tui UK and Ireland, the UK's biggest tour operator, called for a more "nuanced" quarantine policy that would allow customers to go to certain regions of countries with a lower number of infections.

  The company has cancelled all mainland Spanish holidays until 9 August after the change in rules, but said all those going to the Balearic and Canary Islands could still travel as planned from Monday.

  This video can not be played To play this video you need to enable JavaScript in your browser. "I know it's hard for the many people who are on holiday in Spain," Health Minister Helen Whately said

  Ryanair has said it will continue its flights in and out of Spain as normal, and Jet2 said it will still operate its schedule of holidays and flights to and from mainland Spain, the Balearic Islands and the Canary Islands.

  EasyJet has said it is cancelling holidays to all Spanish destinations for the next few weeks, but flights will still go ahead.

  Mr Flintham told BBC Breakfast: "We'd really like a nuanced policy, so if there is a travel advice that says you can still go to the Canary Islands and the Balearics, we'd also like to have that backed up with a quarantine that obviously, isn't in place.

  "If there's a travel advice that says you can't go, then we believe that clearly the quarantine should be in place.

  "If we can have a lined up and regional policy, it will be much easier for us to communicate that to customers."

  Asked about this, and the difference in the number of new infections between mainland Spain and places like the Balearic Islands, Ms Whately said that she recognised that rates are "lower in the islands" but that they were going up "very rapidly in some locations, not just in mainland Spain" and No 10 had to take scientific advice on how to "best protect the UK".

  She urged anyone considering booking a holiday to "be mindful that we are still in the situation of a global pandemic".

  Asked about whether people arriving from other countries, such as France and Germany, could also soon have to quarantine, Ms Whately said No 10 will monitor virus rates and "take action" if necessary.

  She told BBC Radio 4's Today programme: "It is the right thing for us to do to keep an eye on the rate in these countries, so if we see something going on, like we've seen in Spain, we would have to take action."

  She said the so-called air bridges to other countries would be kept constantly "under review", adding that the government is "enacting the policy" it had committed to doing when they were first brought in.

