  Morgan's rebuild was remarkable, it progressed all the way to Lord's in 2019, but it began at a distinct path, with England playing dull, dated cricket. The requirements were clear - pick younger, more ambitious players available in county cricket but not selected. The present-day route is far less obvious. Initially, McCullum must decide if these are good players underperforming. Debate can be had over Liam Dawson, who should have been in Pakistan as an all-rounder and second spin option, but there are few other glaring omissions. Would the 35-year-old left-arm spinner have made this side semi-finalists? You are always a better player when away from the spotlight. Livingstone looks to be fighting for his ODI future and Salt is under pressure after a tournament in which he has averaged 10, but the rest of the top seven - Ben Duckett, Joe Root, Harry Brook, Jos Buttler and, to a lesser extent given his poor showing here, Smith - still looks a fearsome line-up on paper. In contrast, the bowling needs work and McCullum hinted at regrets over the limited, pace-heavy approach employed in Pakistan. "Obviously, our gameplan was to try and bring fast bowling over here, try to stock our batting and give ourselves that sort of conviction and that method," McCullum said. "We may not have got it totally right this time but you've got to have conviction in something." His side's new-ball economy rate is currently the most expensive in the world, their powerplay threat only better than Zimbabwe, Ireland and the United Arab Emirates and their middle-over record in Pakistan their worst at a major tournament. It leaves plenty of room for improvement. But with Jofra Archer on a three-year contract and Mark Wood lauded wholesale change does not look likely. Hampshire quick Sonny Baker - the 21-year-old who impressed for the Lions this winter - is one on the radar, while there is still hope Josh Hull could be the left-armer England so desperately require, but otherwise England will rebuild with the players seen here, meaning other gains will have to be made. It is three months and 23 days since England lined up with a top seven of Salt, Will Jacks, Jordan Cox, Bethell, Livingstone, Sam Curran and Dan Mousely. Greater consistency in selection would be a good place to start. That will be aided by the fact McCullum is now in charge of both red and white-ball teams, meaning there is no longer a tussle between two coaches with two different priorities. Difficulties will still appear with the New Zealander keen to promote multi-format regulars rather than white-ball specialists, which will leave a winter featuring an Ashes series flanked by white-ball trips to New Zealand and Sri Lanka to be balanced with great care. McCullum is now England's man for all seasons, who has sparked a rebuild twice before - first in Wellington and then with the Test side. His third act may be his most difficult.
