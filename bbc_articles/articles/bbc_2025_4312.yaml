content: |-
  A familiar white-ball defeat for England in Karachi must mark the start of their rebuild, writes Matthew Henry.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  If the defeats in India were alarming, and losses to Australia and Afghanistan in Lahore dispiriting, the thrashing by South Africa in Karachi was the moment England's winter plunged to the depths. Nasser Hussain's side famously won a Test here in 2000 in the dark. The winning runs were hit after the sun had set and the locals had broken their Ramadan fast. At one point on Saturday, there were fears the floodlights would not be needed. "As a whole group, not just batters, we're not getting the results and that does take away your confidence," captain Jos Buttler said. "It's time for everyone to get away, get a change of scenery and work hard wherever cricket takes you next." Buttler knows this feeling because the seven-wicket defeat by South Africa was English white-ball cricket going full circle. Back in 2015, he was part of the side also dismissed cheaply before their opponents cantered home - New Zealand the victors on that occasion in Wellington. That day England's players sat in silence in a shell-shocked dressing room as the baying crowd shook the foundations of the stadium above them. This was a Champions Trophy dead rubber rather than a live World Cup match and there were no such problems with the crowd. Still, it must be the spark of a rebuild, like the Cake Tin defeat was to Eoin Morgan. This has to be England's latest visit to rock bottom.

  The quirk is that England's destroyer 10 years ago will be the one to plot the path ahead to ultimately regain the world titles lost. "These guys are too hard on themselves," said their opponent turned coach Brendon McCullum. "They've got immense talent, they are desperate to want to perform. That's actually stymying the ability of us to get the performance we want. They care too much." Expect hard work but no change in England's rhetoric. And while there is some merit in McCullum words - relaxing his players and removing the fear of failure is what has helped him turn around the fortunes of the Test side alongside Ben Stokes - it was not the reason Phil Salt and Jamie Smith gave away their wickets or Liam Livingstone looked a novice when faced with spinner Keshav Maharaj. Attacking shots are causing England's downfall, not tentative prods. There is more at play here - muddled minds aplenty.

