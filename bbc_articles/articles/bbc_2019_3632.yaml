title: US mayor's apology for McGuinness award 'not enough' - BBC News
date: '2019-03-12'
section: Foyle & West
url: http://www.bbc.co.uk/news/uk-northern-ireland-foyle-west-47521926
content: |-
  A survivor of an IRA bomb calls on San Francisco's mayor to rescind a posthumous honour for the IRA leader.

  An IRA bomb survivor has called on the mayor of San Francisco to rescind a posthumous award honouring Martin McGuinness's "courageous service in the military".

  Mary Hamilton said an apology from mayor London Breed has "come too late" for IRA victims.

  Mrs Hamilton was injured in the 1972 Claudy bomb.

  Mr McGuinness has been awarded a Certificate of Honour, the equivalent to a "freedom of the city" award.

  IRA victims criticised the honour, which also recognises the former IRA leader's role in the peace process.

  On Monday DUP leader Arlene Foster invited Ms Breed to Northern Ireland to see how "terrorism still causes pain".

  In a statement, the mayor explained that Mr McGuinness had been selected as one of five Grand Marshalls for the award.

  "As part of San Francisco's annual St Patrick's Day festivities, the Mayor of San Francisco has traditionally provided Certificates of Honor to the Honorary Grand Marshalls selected by the United Irish Societies of San Francisco," she said.

  "San Francisco values mean respect for the democratic process and non-violent political actions.

  "The language on the Certificate of Honor should have taken more care to apply these values when reflecting the history of Mr McGuinness's life towards peacemaker and his role in the peace process that resulted in the Good Friday Agreement."

  Ms Breed said she apologised for "the pain this certificate has caused".

  But Mrs Hamilton said the award to Mr McGuinness should be rescinded.

  Now an Ulster Unionist party councillor, the former deputy Mayor of Derry, whose brother-in-law George Hamilton was also shot and killed by the IRA in 1972, said she broke down when she heard about the award.

  Mrs Hamilton said she believed them Mayor of San Francisco, who signed off on the award, had been ill-informed.

  "To me the mayor should have visited Northern Ireland to see the legacy that has been left behind," she added.

