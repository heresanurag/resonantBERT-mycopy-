title: '''Bully'' provost quits after berating Angus councillor to tears - BBC News'
date: '2024-07-09'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/c729eez0y9xo
content: |-
  Colleagues called the behaviour of Brian Boyd an "absolute disgrace" after meeting footage was posted publicly.

  This video can not be played To play this video you need to enable JavaScript in your browser. Provost of Angus accused of bullying during council meeting

  The provost of Angus has resigned after he berated a councillor to tears during a public meeting. Brian Boyd said his behaviour "fell below his personal standards" after footage from the meeting, external showed him interrupting independent councillor Lois Speed, who was preparing to ask a question during a full council meeting last month. Mr Boyd was accused of being a "verbal bully" by a fellow councillor after the footage emerged. He said he would continue as an independent councillor for the Carnoustie and District ward.

  In a statement, Mr Boyd said: "While I have thoroughly enjoyed serving the people of Angus as their provost, I recognise that my behaviour fell below my own personal standards. "Therefore, I will continue to put Angus first and be standing down with immediate effect. " In the video, Ms Speed is seen attempting to ask a question, first saying there had been "key themes today in terms of local democracy". Mr Boyd then interrupts, stands and reads out the council's policy on standing orders before asking a shaken Ms Speed: "Have I made myself clear?" He said: "Councillor Speed, when I stand up, everyone here sits down. "When the convener starts to speak, any member who is standing will resume his or her seat. "No other member will stand and the convener will be heard without interruption. Have I made myself clear?" The meeting stops for a break following the incident. When it returned, Mr Boyd apologises to Ms Speed saying: "As you can see it's been a very terse day and I think this is the opportune moment for me to apologise to Councillor Speed for my overreaction. "I'm a very dramatic person at the best of times and I did go over the score - I hope you accept my apology."

  Ms Speed, who is a councillor for Arbroath East and Lunan, declined to comment when approached by BBC Scotland News. Clips of the incident, which happened during the meeting on 20 June, are now circulating on social media. Scottish Conservatives councillor Craig Fotheringham called Mr Boyd "an absolute disgrace" during the meeting following his comments. He told BBC Scotland News: "I don't think he [Mr Boyd] is fit to be in the position that he's in. "He is a verbal bully, he verbally abused Councillor Speed. "Quite honestly, I don't think he handles the meetings well at all." He said there was "absolute disgust and shock" in the meeting room. "There's a lot of dedicated councillors but that just ruins it for everybody, he's made Angus Council look a fool."
