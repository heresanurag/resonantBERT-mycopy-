title: CCTV footage of 85-year-old tackling armed raiders goes viral - BBC News
date: '2018-09-18'
section: General
url: http://www.bbc.co.uk/news/45552553
content: |-
  When three would-be robbers stormed into a County Cork bookmakers, they did not bet on facing a formidable 85-year-old.

  A great-grandfather who tackled would-be robbers wielding a sawn-off shotgun and hammers has become an internet hit.

  Denis O'Connor was in the Glanmire office of Bar One Racing in the Irish Republic on Saturday when three raiders burst through the door.
