title: Donald Trump speaks behind bullet-proof glass at rally - BBC News
date: '2024-08-22'
section: General
url: http://www.bbc.co.uk/news/videos/cp81zl43ppgo
content: |-
  Trump was in North Carolina, at his first outdoor rally since an attempted assassination.

  Donald Trump stood behind bullet-proof glass while he address supporters at a rally.

  The former president was speaking in North Carolina, at his first outdoor rally since his attempted assassination in Pennsylvania in July.

  At the rally Trump commented on how Barack and Michelle Obama have criticised him during their speeches at the Democratic National Convention in Chicago on Tuesday night.

  There was a heavy security presence at the rally, with protective snipers seen around the event.
