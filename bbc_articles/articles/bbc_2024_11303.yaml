  For most people travelling to Heathrow Airport, the journey is a means to an end. But Bertie Taylor's aim was a little different: to capture everyday life underneath the flight path. The 37-year-old described the project as his "most relevant work" and is looking for a publisher for his collection of photographs, which has a working title Life Under the Flight Path. Between September 2018 and 2019, the photographer, musician and short film maker travelled from his parents' home in Piccadilly Circus to Hatton Cross in west London. "Most people are coming from Heathrow to central London for tourism and I was doing the opposite," Taylor, who lives in Newhaven, East Sussex, says.
