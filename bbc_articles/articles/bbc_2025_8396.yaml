content: |-
  Nemanja Matic says Andre Onana is 'one of the worst' goalkeepers in Manchester United's history. The BBC Sport Ask Me Anything team take a look at the stats.

  How does Onana compare to other Man Utd keepers after Matic criticism?

  Manchester United goalkeeper Andre Onana was described as "one of the worst keepers" in the side's history by the club's former midfielder Nemanja Matic. Matic, now playing for United's Europa League quarter-final opponents Lyon, has made the build-up to the tie unexpectedly tense. The Serbian was responding to comments by Onana who said his side are "way better" than their French opponents. Matic, 36, said: "If you are one of the worst keepers in Manchester United history, you need to take care. "If David de Gea, Peter Schmeichel or Edwin van der Sar said that, I would question myself. "But if, statistically, you are one of the worst goalkeepers in Manchester United's modern history, he needs to show that before he says." BBC Sport's Ask Me Anything team take a look at how Onana compares to his predecessors...

  The Cameroon international made a trophy-winning start to his career at Old Trafford by claiming the FA Cup in his first season - a stat he was quick to point out to Matic in response. "I would never be disrespectful to another club... We know that tomorrow will be a difficult game against a strong opponent... At least I've lifted trophies with the greatest club in the world. Some can't say the same," said Onana. The 29-year-old has played 93 matches since his £43.8m move from Inter Milan in the summer of 2023. In all club competitions, he has conceded 137 goals and kept 23 clean sheets, conceding an average of 1.47 goals per game. Nine of those 23 clean sheets have come in the Premier League this season, the fourth highest in the league, despite United sitting 13th in the Premier League table.

  Since the start of 2023-24, only Jordan Pickford (8.7) has prevented more goals based on Opta's expected goals model in the Premier League than Manchester United's Andre Onana (7.5).

  Since moving to the Premier League, Onana has ranked second on Opta's goals prevented metric, only behind Jordan Pickford in the Premier League over the past two campaigns. Opta calculate that Onana has actually conceded 7.5 goals fewer than expected from the quality of shots faced; with Pickford on 8.7. However, Onana has made high profile errors, especially in last season's awful Champions League group stage exit. And in the Premier League since 2023-24, only three goalkeepers have made more errors leading to goals than Onana has (4) - Arijanet Muric with seven and Robert Sanchez and Bart Verbruggen, both with six.

  Since the 2003-04 season, Onana tops the charts for the amount of saves made per game. Onana makes 3.4 saves per 90 minutes. In comparison, De Gea made 2.8 saves per 90 minutes and Van der Sar 2.5. Onana does not rank as well for save percentage. Andres Lindegaard is the only goalkeeper with a lower save percentage. De Gea, Van der Sar, Tim Howard, Dean Henderson, Ben Foster, Roy Carroll and Tomasz Kuszack all rank higher.

  In the Premier League, Onana has the lowest number of minutes per goal conceded of all Manchester United goalkeepers - conceding every 63 minutes, on average. Lindegaard was next on the list, every 81 minutes; De Gea every 84 minutes, Peter Schmeichel every 106 minutes, Van der Sar every 117 minutes and top of the list was Carroll, who conceded every 152 minutes. He is playing in a Manchester United team in the bottom half of the Premier League table. The lowest the club has ever finished is eighth, in Onana's first season. Red Devils head coach Ruben Amorim described the team as "maybe the worst" in the club's 147-year history in January. Only Raimond van der Gouw ranks lower than Onana for clean sheet percentage in the Premier League for United. Ben Foster has the highest percentage at 50% - but from just 12 appearances. Van der Sar, Schmeichel and De Gea - the only three goalkeepers with over 100 Premier League appearances - had clean sheet percentages of 48.4%, 44.4% and 35.4%, respectively.
