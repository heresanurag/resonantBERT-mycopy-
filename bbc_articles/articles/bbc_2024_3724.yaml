title: Donald Campbell's Bluebird welcomed home by crowds in Coniston - BBC News
date: '2024-03-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-cumbria-68527144
content: |-
  Donald Campbell's Bluebird is back in the Lake District 57 years after its pilot was killed in a crash.

  Crowds gathered to welcome Donald Campbell's Bluebird craft as it returned to the Lake District 57 years after its pilot was killed in a crash on Coniston Water.

  The hydroplane's wreckage was recovered in 2001 and rebuilt by Tyneside engineer Bill Smith.

  Following a legal battle, it was handed to Coniston's Ruskin Museum.

  Bluebird was collected from North Shields on Saturday morning and was welcomed with claps and cheers when it reached Coniston later that day.

