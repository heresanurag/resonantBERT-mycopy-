content: |-
  Harry Kane moves ahead of Jimmy Greaves to become Tottenham's all-time top goalscorer with his 267th goal for the club.

  Last updated on .From the section Tottenham

  'What a player' - How Spurs play to Kane's strengths Harry Kane says he has got "plenty of goals to come" after moving ahead of Jimmy Greaves to become Tottenham Hotspur's all-time top scorer. The England captain scored his 267th goal for Spurs in the 1-0 defeat of Manchester City. Kane, 29, now wants to surpass Alan Shearer's all-time Premier League record of 260 goals. "Alan has set the record to beat. I'll see if I can beat it," said Kane, who is on 200 Premier League goals. "I'm sure he'll (Shearer) be watching but I'm not sure if he'll be happy or not! I've got plenty of goals to come, I'm feeling good." Glenn Murray, a former Premier League striker with Crystal Palace, Bournemouth and Brighton, told BBC Radio 5 Live: "Strikers are greedy, he'll want more. The man in his sights will be a Mr Alan Shearer, I imagine." Greaves, who started his career at Chelsea, scored 266 goals in 379 games for Spurs between 1961 and 1970. Kane made his Spurs debut in 2011 and has played 416 times for the club. 'It's a dream come true' - Kane on goal record
  • None Listen to the latest The Far Post podcast Kane's finish in Sunday's game against City was typically well taken, fired in low after he had been set up by Pierre-Emile Hojbjerg in the box. "When you look at the names who have been here, to overtake Jimmy Greaves - one of the greatest to play the game - I'm extremely grateful," Kane told BBC Match of the Day. Kane is the third-highest scorer since the Premier League was formed in 1992 - after Shearer and Wayne Rooney, who scored 208 times. He has scored 17 league goals this season and 19 in total for Spurs - 11 more than the club's next highest scorer, Son Heung-min. Kane is also just one goal away from becoming the leading all-time goalscorer for England. He is tied on 53 with Rooney. Harry Kane's first Premier League goal was in a 5-1 Tottenham win against Sunderland on 7 April 2014 Kane was mobbed by his team-mates after the final whistle before the player addressed supporters in an interview on the pitch. A message of congratulations from the late Greaves' son Danny was also shown on the screens. Later in the Tottenham dressing room, with Kane still in his kit, he took a phone call from manager Antonio Conte, who missed the game after having surgery to remove his gallbladder. The Italian was heard saying "you make me proud" to Kane in a conversation on a mobile phone. 'Spurs should cash in on Kane' Despite his success in front of goal, Kane is yet to win a major trophy in his one-club career and was wanted by Manchester City in the summer of 2021. Jamie Carragher, a Champions League winner with Liverpool, does not believe a lack of winners' medals will play too much on Kane's mind. "If he can go down as the best Spurs player of all time, the record Premier League goalscorer, record England scorer - do you think he'll miss a Carabao Cup medal?" said the former centre-back said on Sky Sports. However, former Tottenham defender Ramon Vega believes the time could be right for Kane to move in order to win medals. "He can actually walk away from Spurs now without any question and go to a potentially better platform where they can actually win medals," Vega told Sportsworld on the BBC World Service. "If I was Daniel Levy (Spurs chairman) I think it's the best time now to sell him and really cash in and rebuild. Harry Kane is today, but we need to look for a future Harry Kane." Meanwhile, Manchester City boss Pep Guardiola congratulated Kane for his "incredible" achievement. "On behalf of Manchester City, I can say congratulations for this incredible milestone. He is an exceptional player," said Guardiola. Kane was set up superbly in front of goal by a driving run from Pierre-Emile Hojbjerg His low finish was calmly taken, slotted in past Ederson Cue the celebrations, with full-back Emerson Royal the first to reach the forward The rest of the Spurs players soon joined Kane to share in the moment The scoreboard in the stadium marked the moment with a visualisation of his familiar celebration
