content: |-
  Travis Head scores a stunning unbeaten 154 as Australia claim a convincing seven-wicket win over England in the first one-day international at Trent Bridge.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Travis Head scored a stunning unbeaten 154 as Australia claimed a convincing seven-wicket win over England in the first one-day international at Trent Bridge. After England had collapsed from 213-2 to 315 all out, Head's magnificent innings helped Australia to knock off the runs with 36 balls to spare. The 30-year-old opener put on an unbroken 148 with Marnus Labuschagne as he made the top ODI score by an Australia batter in England, to take the tourists to their highest successful ODI chase in England. A comprehensive victory extends the world champions' winning streak in ODIs to 13 as they took a 1-0 lead in the five-match series. England were in a good position to put that unbeaten run under threat thanks to a fine knock of 95 from opener Ben Duckett and Will Jacks' third ODI half-century, but crumbled late in the innings. Part-time spinner Labuschagne had Duckett caught and bowled just shy of his hundred then removed Harry Brook, captaining England for the first time, in his next over to start the hosts' slide. Labuschagne and Adam Zampa, in his 100th ODI, took three wickets apiece as Australia bowled only spin for the last 18 overs of the innings and England's innings unravelled. Jacob Bethell gave another glimpse of his talent with a handy 35 to take the home side beyond 300 but they finished a long way short of what they would have wanted on a famously high-scoring ground. Head had a moment of luck when he was dropped by Brydon Carse on six, albeit it would have been a stunning one-handed catch, but never looked back as he powered his way to a fantastic sixth ODI ton and Australia cruised to victory. England will attempt to level the series in the second game at Headingley on Saturday.

