  The left-hander got things moving with four boundaries in a Sean Abbott over and went from there. Phil Salt was bowled by left-arm seamer Ben Dwarshuis, on his ODI debut for Australia, but Jacks came in and helped build a strong platform alongside Duckett. Jacks played well with a number of eye-catching shots, while Duckett continued to pace his innings smartly. He was quick to sweep the spinners, thumping a reverse to the fence off Zampa, and peppered the short leg-side boundary when Australia tried to unsettle him with short stuff. In the Stokes and McCullum era, this was not unlike a Test knock from Duckett and it was only through taking on the bouncers that there was any discernible difference in the areas the left-hander was scoring his runs compared to a red-ball match.

  There was intent to every shot as he moved the field around and ran well between the wickets to get England, who averaged 367 in their last six ODIs at Trent Bridge, to the point where they would have been confident of posting something similar. A second ODI century seemed a formality but five runs from that milestone, he offered up a return catch from an innocuous Labuschagne delivery and was gone. It was the turning point of the innings as Labuschagne ousted Brook in his next over and the ensuing collapse left England well short.

  As early as it was in the innings – and as tough a chance as it was – Carse dropping Head felt like a significant moment. His recent form has been such that it felt inevitable he would make England pay. The short boundaries and fast outfield makes Trent Bridge an inviting place to bat for anyone, but few have the tools to exploit those conditions in quite the way Head does. There might be the odd play and miss or the occasional miscue but they are lost in a flurry of full-blooded shots, crunched to, or over, the boundary. Immense power and immaculate timing are combined with an uncanny ability to find the gaps and, once Head got going, England were left waiting for a mistake that never came. An inexperienced England attack were coolly dismantled with even senior bowlers Jofra Archer and Adil Rashid unable to stem the flow of runs. Head had broken the back of the chase and, with Labuschagne going nicely alongside him, could have just picked his moments to take the attack to the bowlers. Instead, he opted to get the game done in a hurry – pummelling the ball both sides of the wicket as he hit a remarkable 20 fours and five sixes in a career-best ODI knock. Illness had robbed Australia of key players such as Mitchell Starc, Josh Hazlewood and Glenn Maxwell but Head’s brilliance ensured they were not missed as the 50-over champions laid down a marker to begin the series.
