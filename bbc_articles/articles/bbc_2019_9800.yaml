  "There's something wrong in British football where these clubs with so much history and local connection are struggling at the same time the Premier League is absolutely booming," Bolton North East MP David Crausby told BBC Radio Manchester.

  "We've really got to put it right in the interest of the fans, not just for some individual who picks it up to make a profit on it.

  "We've got to be absolutely determined to defend this football institution. It can't be allowed to fail and disappear."

  What happens to Bolton Wanderers now?

  On Saturday, the EFL gave Bolton until its board meeting at 17:00 on Tuesday to complete a sale of the club or provide "credible plans" they can compete this season.

  As Bolton could not satisfy the league's requirements by that point, a 14-day notice period was activated for the club to prove it has the funds to survive or face losing its place in the league.

  Local neighbours Bury, who have had stark financial troubles of their own, were expelled from the Football League on Tuesday after failing to sell the club.

  Wanderers' administrators said on Monday that the club are not in a position to carry on trading and "the process of closing down" could start on Wednesday.
