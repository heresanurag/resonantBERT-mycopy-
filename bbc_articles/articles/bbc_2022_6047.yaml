title: Two arrested over Stockport nursery baby death - BBC News
date: '2022-05-14'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-61436664
content: |-
  The arrests were made after an eight-month-old girl died following a "medical episode", police say.

  Det Supt Phil Duffy said his officers' thoughts were "very much with the baby girl's family"

  Two people have been arrested over the death of an eight-month-old baby following a "medical episode" at a nursery.

  Police were called to an incident at a nursery in Stockport, Greater Manchester, on Monday.

  The girl was taken to hospital where she later died.

  The two people, held on suspicion of gross negligence manslaughter, were being questioned in custody, Greater Manchester Police (GMP) said.

  The force described the death as "heartbreaking".

  Det Supt Phil Duffy said: "Our thoughts are very much with the baby girl's family who are understandably shocked and devastated.

  "We're doing everything we can to get them the answers they deserve.

  "Officers are continuing to work to establish the full facts and ascertain the circumstances."

  A spokesman for Ofsted said the nursery had been temporarily closed and declined to comment further.

