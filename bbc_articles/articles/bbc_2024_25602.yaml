title: 'Irish general election: Leaders to discuss date next week - BBC News'
date: '2024-10-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cvgl0883k85o
content: |-
  It comes after the Green Party leader indicated he would like an election to take place on 29 November.

  Irish coalition leaders Simon Harris, Micheál Martin and Roderic O'Gorman are set to meet next week

  Tánaiste (Irish deputy prime minister) Micheál Martin has said a general election date will be discussed between the three coalition party leaders next week. A general election must be called in the Republic of Ireland before the term ends in March 2025, with speculation rising that a poll could be called imminently. It comes after Green Party leader Roderic O'Gorman proposed 29 November for the upcoming election. Speaking in Dublin on Friday, O'Gorman said it was time for "some degree of certainty" to the Irish people about a date.

  "I'm starting to get the sense that people are getting sick and tired of the will they, won't they," O'Gorman said. "Now is the time to bring some degree of certainty to the Irish people in terms of the election date." O'Gorman said he would be meeting Martin, as well as Fine Gael leader and Taoiseach (Irish prime minister) Simon Harris on Monday. "What I'll be saying to them is that I think we need to bring clarity and I'll be saying my preference is for a November election, the 29 of November." "That gives us the opportunity to get those final pieces of legislation through."

  Green Party Roderic O'Gorman (right) indicated his support for a 29 November election date

  On Friday, Harris said a date has not been set yet for the general election, but added that he will bring clarity on the matter "shortly". Speaking to Irish broadcaster RTÉ News, the taoiseach said he wants the government to finish the work it has underway. He said he then wants to "engage and take the views of the other coalition leaders in relation to the appropriate timing for a general election". "I want to do that at a time that is right for the country and I also want to do it at a time that makes sense in terms of finishing the work," Harris said. He added: "I've been very clear that I certainly won't be doing engagement or consultation through the media, but I will be bringing clarity to this matter shortly". Harris said he is conscious that it is his "constitutional prerogative to decide when to seek a dissolution of the Dáil (lower house of parliament)". "But I’m also very conscious of the fact that I think this government has worked very well together and therefore I want the government to end well too."

  Micheál Martin says a date for the general election will be discussed on Monday

  The tánaiste, also speaking on Friday, agreed that there is need for clarity around a poll date and said the issue will be discussed next week. Martin did not indicate a preferred date, but said he "always" favoured a February election date to allow the three-party government to complete its term "The difference between December and February isn't huge," he told RTÉ News. "I always said we need to get work done before the general election, because we are here to represent people." He said the passage of the Finance Bill 2024, which contains new taxation provisions, was "key". "That puts flesh on the bones of the Budget," Martin added. "I would agree that there is a need for clarity at this stage, but I think this is something we can deal with next week."
