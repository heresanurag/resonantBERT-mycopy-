id: bbc_2025_12298
title: '''They are shooting a lot'': voice notes from a Gaza hospital as war closes
  in - BBC News'
date: '2025-06-20'
section: General
url: http://www.bbc.co.uk/news/resources/idt-fd97bd85-5060-4a09-8525-053aee434cf7
content: "Al-Awda hospital has shut down as Gaza’s health system unravels. In voice\
  \ notes sent over two weeks, its director documented the collapse - until the moment\
  \ staff and patients were forced to flee.\n\n“They are shooting a lot. The tank\
  \ has sieged the hospital.”\n\n Gunfire can be heard in the background of a hushed\
  \ voice note sent in the middle of the night from inside al-Awda hospital, described\
  \ by the World Health Organization last month as the “last functioning hospital\
  \ in North Gaza”.\n\nA week later, the hospital was declared out of service and\
  \ the medical staff, including the director, Mohammed Salha, who recorded the voice\
  \ note, were forced to evacuate and head south.\n\n Patients were carried on stretchers\
  \ and wheelchairs past mounds of rubble and bombed-out buildings to waiting ambulances.\n\
  \n With fewer than half of Gaza’s hospitals now running - and those that are only\
  \ at a limited capacity - there are warnings from groups like the WHO and British\
  \ Red Cross that the health system is being “systematically dismantled” and \"on\
  \ the brink of collapse\", as the number of casualties from the 20-month war continues\
  \ to rise.\n\n Al-Awda in northern Gaza is one of several hospitals across the territory\
  \ to have ceased or reduced operations since Israel expanded its offensive last\
  \ month, with the Israeli military accusing Hamas and other armed groups of operating\
  \ in and around the facilities.\n\nIn red, damaged areas as of 22 May\n\nOver a\
  \ period of two weeks, Salha sent regular voice notes to the BBC from inside the\
  \ hospital, including at times when it could not be reached by patients or journalists,\
  \ tracking its rapid deterioration until the moment it shut down completely.\n\n\
  \ We have corroborated key details with others’ testimony, including two medics\
  \ who were inside the hospital at the time, as well as video and photo evidence\
  \ that we have verified, and sent multiple enquiries to the Israeli military. \n\
  \n This is an account of one hospital’s final days.\n\nSix bodies arrive - Salha\
  \ says his relatives are among them\n\nThe NGO-run al-Awda hospital is located in\
  \ the northern Gaza town of Jabalia. It is supported by international groups including\
  \ Action Aid and Relief International with the help of EU funding.\n\n Overnight\
  \ and in the morning the hospital receives “more than 97” patients injured by Israeli\
  \ bombing, Salha says by voice note. The emergency room has only 12 beds.\n\n Video\
  \ footage later verified by the BBC shows an injured man being brought to al-Awda\
  \ in a rickshaw, with a bandage and belt tied around his leg, and carried inside.\n\
  \nA still image from a video sent to the BBC by Salha\n\nAmong six bodies that arrive\
  \ are Salha’s eight-year-old nephew Jamal and nieces Fatima and Hanadi, aged 10\
  \ and 28, Salha says. The two children had been sleeping at a nearby home in the\
  \ neighbourhood of Tal al-Zaatar, when an Israeli strike hit leaving them under\
  \ rubble for more than five hours before rescuers could retrieve their bodies, he\
  \ says.\n\n The strike on the home is reported by a local journalist, and an al-Awda\
  \ hospital staff member says in a WhatsApp group seen by the BBC that children’s\
  \ bodies were brought to the hospital that day.\n\n The Israel Defense Forces (IDF),\
  \ when provided with the street, timeframe and name of the family living in the\
  \ building hit, said it needed more specific details before it could respond to\
  \ questions on the strike.\n\n On the same day, the United Nations releases a statement\
  \ saying the reported killing of “at least 45 children in the Gaza Strip in the\
  \ last two days is yet another devastating reminder that children in Gaza are suffering\
  \ first and foremost, having to starve day after day only to be victims of indiscriminate\
  \ attacks”.\n\n A life-saving operation is performed on the children’s mother who\
  \ has shrapnel in her liver, Salha says.\n\n The director’s grieving relatives shout\
  \ and cry in the hospital. He shuts himself in his office briefly to cry alone,\
  \ before returning to work.\n\n“Also, there is news that Israeli forces will enter\
  \ the north.”\n\n The Israeli military later confirms it has begun “part of the\
  \ opening moves\" of its expanded military offensive Operation Gideon’s Chariot,\
  \ launching “extensive attacks” aimed at defeating Hamas and bringing home the hostages\
  \ still held in Gaza.\n\n Salha says the hospital is running on a small generator\
  \ and is also struggling to deal with the effects of a total Israeli blockade now\
  \ in its 10th week, causing shortages of medical supplies and fuel.\n\nIsraeli ministers\
  \ have described the blockade as one of the “main pressure tools” to secure victory\
  \ over Hamas, which they accuse of stealing aid and profiting from it.\n\n “Hoping\
  \ it will be finished soon,” says Salha. “We can manage today.”\n\n‘Women will give\
  \ birth in the street’\n\nThe situation worsens at al-Awda, as the Israeli military\
  \ continues its ground operations and strikes “terror targets” across Gaza.\n\n\
  \ Overnight, Israeli forces bombed nearby houses and the surroundings of the hospital,\
  \ says Salha, causing damage to windows, doors, floors and ceilings - as well as\
  \ the gas, water and electricity network.\n\n A post on the hospital’s Facebook\
  \ page in the morning refers to a “harsh night”, with damage caused by shelling\
  \ in the immediate vicinity. Photos show damaged ceilings and walls and dust covering\
  \ ambulances in the courtyard.\n\n In a video shared overnight on social media and\
  \ verified by the BBC, an explosion close to the hospital fills the courtyard with\
  \ smoke and sends people scrambling into al-Awda.\n\nIn a statement the following\
  \ day, the United Nations Office for the Coordination of Humanitarian Affairs (Ocha)\
  \ also says al-Awda “was struck, putting scores of patients and medical staff at\
  \ risk”.\n\n The nearby Indonesian Hospital is declared out of service by Gaza’s\
  \ Hamas-run health ministry, following what the UN later describes as “repeated\
  \ Israeli attacks and sustained structural damage”. The IDF says it was fighting\
  \ “terrorist infrastructure sites” in the area.\n\n Israel does not allow international\
  \ journalists access to Gaza, and the situation around the hospitals in the far\
  \ north of the strip makes it too dangerous for the trusted freelancers the BBC\
  \ works with to go there.\n\n Al-Awda fills its oxygen cylinders at the Indonesian,\
  \ Salha says, so if it runs out of oxygen now it will become “impossible to work”.\
  \ Al-Awda also relies on the Indonesian for its intensive care unit.\n\n “If we\
  \ have ICU cases now we’ll have to refer them to Gaza City and we don’t know if\
  \ it’ll be possible to go because the situation outside is dangerous to move between\
  \ hospitals,” he says.\n\n Another nearby hospital, Kamal Adwan, is also classified\
  \ as out of service, though tents have been erected there to offer some care.\n\n\
  \ Salha fears what might happen if al-Awda has to shut - especially because of its\
  \ maternity services. “If there is no al-Awda hospital... women will give birth\
  \ in the street.”\n\n At this point, al-Awda is considered the last functioning\
  \ hospital in Gaza’s northern governorate, which does not include Gaza City.\n\n\
  \ Despite being declared out of service several times during the war, staff say\
  \ it continued to operate at some level throughout, including after its previous\
  \ director was detained by Israeli forces in December 2023. \n\n The IDF told the\
  \ BBC it was unable to confirm details of his detention or any charges unless his\
  \ ID number was supplied. The WHO says 300 health workers have been detained in\
  \ Gaza since October 2023. \n\n Asked after al-Awda’s eventual closure if there\
  \ was any evidence of Hamas or other groups’ activity there, the IDF said Hamas\
  \ had a strategy of using hospitals for “terror-related activities”, including holding\
  \ hostages, storing explosives and sheltering senior operatives, referring to allegations\
  \ related to several other hospitals across Gaza. \n\n Last month, the Israeli military\
  \ killed Mohammed Sinwar, Hamas’ military leader, later saying his body was discovered\
  \ in a tunnel underneath the European Hospital in southern Gaza.\n\n Asked twice\
  \ more if there was any evidence of armed groups operating in al-Awda, the IDF gave\
  \ no comment.\n\nSalha says that after his last message, the internet services have\
  \ gone down, meaning he is now relying on data from an eSIM.\n\n “The situation\
  \ this morning is less than the situation yesterday.... The drones and quadcopters\
  \ are shooting but the [frequency] is not like yesterday.”\n\n He says two women\
  \ gave birth at the hospital yesterday, but no one had arrived this morning “maybe\
  \ because of the dangerous situation surrounding the hospital”.\n\nAmbulances ‘shot\
  \ at’ and can’t get back to hospital"
