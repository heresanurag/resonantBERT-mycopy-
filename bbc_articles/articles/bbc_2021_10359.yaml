title: 'South Africa 27-9 British and Irish Lions: Springboks level series in fiery
  encounter - BBC Sport'
date: '2021-08-01'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/58041234
content: |-
  The British and Irish Lions' series with South Africa will go to a decider after the Springboks win a fiery second Test 27-9 at Cape Town Stadium.

  Last updated on .From the section Rugby Union

  Makazole Mapimpi's try gave South Africa a lead they never relinquished The British and Irish Lions' series with South Africa will go to a decider after the Springboks won a fiery second Test 27-9 at Cape Town Stadium. The Lions led after a cagey first half as Dan Biggar's three penalties trumped Handre Pollard's two, while a player from each side went to the sin-bin. But a stylish Makazole Mapimpi try gave the world champions a narrow two-point lead at the start of the second half. The hosts continued to dominate and Lukhanyo Am's score sealed victory. Pollard scored three more penalties to further put the Lions in their place after the tourists won the first Test 22-17. Both sides will have to raise their level once again in what promises to be a thrilling series decider on Saturday, 7 August.
