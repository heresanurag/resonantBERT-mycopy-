title: Your pictures of Scotland 26 March - 2 April - BBC News
date: '2021-04-02'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-56501926
content: |-
  A selection of your pictures of Scotland sent in between 26 March and 2 April.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Cherry on the cake: This beautiful pink blossom tells us all it is definitely Spring, says Vaiva Kuhne from Glasgow

  It's a lamb in a jam! Luckily Brian Colston prised the fence apart and let this little one return to its mother a bit sheepishly.

  Happy Easter: Alex Orr was taken with this glorious Georgian townhouse display from a resident in Edinburgh

  Brian Colston from Falkirk captured this shot of a Highland cow unsuccessfully trying to avoid being spotted

  Angela Bathgate said: "This is a photo of our five-month-old beagle, Dora, enjoying the sun and running among the daffodils at Calendar Park, Falkirk - she's springing into Spring!"

  Boxing clever: Gus Traill from Dumfries said: "This wee fella was guarding the feeding box as if his life depended on it in Barrhill Woods, Kirkcudbright."

  Lorraine Campbell from Dumbarton captured this skeleton crew on the canal towpath at Bowling. She said: "Just wondered how long they had been there playing their instruments?"

  Fly-tippers went to great lengths to illegally dump this settee. Derek Grist said: "A wee local walk today up Dunearn Hill near Burntisland and came across this sofa at the top of the hill."

  Bull's eye: Debbie Parker said: "I was walking up near my home up Carberry Hill near Musselburgh and whilst attempting to photograph one of the Hereford Bulls it started nuzzling its field mate!"

  Mark Reynolds took this picture of a mini rut between stags on the banks of Loch Arkaig.

  Sharon Dalgouute said: "My husband was driving as we came along the A78 as the heavy rains were coming in. I caught this picture as we drove by, the rain coming down behind the trees."

  Bernie Wilke took this photo of a small reservoir in Perthshire and asked: "Who pulled out the plug?"

  Double-header: Sylvia Beaumont took this photo of two Exmoor ponies "standing together but looking like it is a two-headed pony at North Berwick Law."

  Mairead Milburn said this snap of Aberdeen beach was "worth getting three children up at 06.15 for!"

  Sam Anderson from East Lothian sent in this photo of her cat Freya, who fancies her paw at a spot of herding

  Angus Laing took this shot of a "weed ceremony", part of the courting ritual of the great-crested grebe, on Linlithgow Loch, West Lothian.

  Victor Tregubov took this picture of Loch Arklet after a rainstorm

  Colin Smith caught this reflection during a walk at Leaderfoot Viaduct in the Borders, near St Boswells

  Dan Price-Davies took this shot at Glen Esk along Loch Lee up to the Falls of Unich. He said: "Brilliant weather with lots of mountain hares out still in winter coats."

  Joyce Grieves took this shot after "sneaking up" on this hare at Findo Gask in Perthshire

  Andrew Cuthbertson took this photo from Govan looking over the Clyde towards the Riverside Museum and Tall Ship

  Grace MacLean took this vibrant photo after the rain in Linicro, Isle of Skye

  "Preparing for landing on Strathclyde Loch in Motherwell," said John Dyer, who submitted this picture

  Johnston Craig subitted this photo of the Curling House in the grounds of Gosford House near Aberlady in East Lothian

