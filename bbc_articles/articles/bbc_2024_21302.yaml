  This is more than the probing attacks we have seen in the past. It is a committed assault which has shocked Russia’s military and the Kremlin. For the last 18 months, it has been Moscow dictating the dynamics of this war. Now it is having to contain this attack, as well as domestic criticism for not preventing it in the first place. Despite long-time Western worries of an escalation, the consensus among Ukraine’s allies is that this operation falls within its right to defend itself. While he is yet to directly reference the assault, President Zelensky said in a video address late on Thursday: “Russia has brought the war to our land and should feel what it has done.” But with his Ukrainian forces still outnumbered by the Russians on the battlefield, the line between masterstroke and miscalculation is a fine one. The Russian rouble was down 2.5% against the dollar on Friday, with traders telling AFP news agency that Ukraine’s Kursk offensive was one of the reasons behind the fall.
