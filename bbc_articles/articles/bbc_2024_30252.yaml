  Thousands of Syrians have flocked to Turkey's borders with Syria, but not everyone will want to go back yet.

  Turkey's 3m Syrian refugees face big decision on going home or staying

  Syrians have been queuing at the Turkish border in Hatay province to return home

  Syrian refugees have been celebrating the fall of Bashar al-Assad in the streets of Turkish cities, welcoming the sudden collapse of his regime, and many are now considering whether they should go back home. Thousands of Syrians have flocked to Turkey's borders with Syria, and President Recep Tayyip Erdogan has announced the opening of a border gate "to prevent any congestion and ease traffic". But almost three million Syrians are currently living in Turkey, having fled their country's civil war since it began in 2011, and they will face a difficult decision on what they do next. "There is still no water in many regions in Syria, electricity comes at certain times of the day. It is not even clear who will govern the country and how, but we need to return to get Syria back on its feet," says Ibrahim, a chemical engineer who has lived for 12 years in Hatay province which borders Syria. Despite all the risks he is among those Syrian refugees planning to go back as soon as possible, even though they will have to restart their lives from scratch.
