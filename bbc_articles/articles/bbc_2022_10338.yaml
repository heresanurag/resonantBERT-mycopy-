content: |-
  Education Secretary James Cleverly says there will not be any major support packages until parliament returns in September.

  'You get made to feel like you've done something wrong'

  Paige, from Gravesend in Kent, is on a key meter, which is a "pay-as-you-go" system so she pays for her energy for the day or week. The 30-year-old says she used to pay £20 per week on gas, but that has now doubled. And it is not just energy she is worrying about, with a water bill of £492 coming through and her provider telling her she was "in arrears even though I've never not made a payment". "You almost get made to feel like you've done something wrong and you know, everybody's in the same situation," she says. "I just find it really upsetting." Paige has previously had to "postpone payments by a couple of weeks" because of the timing of her pay day. "It's frustrating enough having financial worries without having someone on the end of the phone making you feel like a failure."
