title: Doncaster murderer posts prison cell video tour on Snapchat - BBC News
date: '2024-07-10'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/crgr72zl8e8o
content: |-
  Amrit Jhagra, who is serving a life sentence, has a games console and speaker system in his cell.

  This video can not be played To play this video you need to enable JavaScript in your browser. The video shows Amrit Jhagra's prison cell - equipped with a games console and designer clothes

  A mum has said she is "angry and upset" after her son's murderer posted videos on Snapchat from his prison cell. Amrit Jhagra fatally stabbed Ryan Theobald, 20, and his friend Janis Kozlovskis, 17, during a night out in Doncaster city centre in January 2022. A social media clip from inside an unnamed jail, where Jhagra is serving a life sentence for the murders, showed photographs of his friends plastered on the cell wall, along with a speaker system and games console. HM Prison Service said it was investigating.

  Ryan's mum, Lisa Theobald, was sent the video and said: "I had every emotion going through me, anger mainly. I don't understand it at all, how a prisoner can live like that?"

  Lisa Theobald said she was left feeling angry after seeing the video on social media

  The video opens with an early morning view of the prison's exercise yard, followed by a tour of the room. A flatscreen TV is visible, with an Xbox and speakers on the desk. A final image shows a person, wearing Under Armour-branded clothing, lying on the bed, looking at a blue cell door, with the words "Life of AJ" on the screen. Other items of clothing are hanging from the walls. A rap track is used as a soundtrack to the clip.

  Amrit Jhagra, now 21, was convicted following a 10-day trial at Sheffield Crown Court

  "Everything about it [upset me]," Ms Theobald added. "For one, how is he sharing it on social media? Two, how is he allowed all this stuff? I know they're allowed to wear normal clothing, but they've got sprays, an Xbox, he's obviously got a phone, speakers in his room. "Everything that a normal bedroom would have." Jhagra stabbed Ryan and Janis after chasing them following an altercation outside a bar on Silver Street. He was jailed for life with a minimum term of 24 years following a trial at Sheffield Crown Court. The sentence was increased to 26 years after the Court of Appeal found it was "unduly lenient".

  Ms Theobald said seeing Jhagra's video had taken her back to the day Ryan was killed. "It felt like it was happening all over again," she said. "It just seems you're back there that day, that morning, when the police were knocking on my door telling you what happened." A Ministry of Justice spokesperson added: "Mobile phones are not tolerated in prison and those found with them face extra time behind bars." Follow BBC Yorkshire on Facebook, external, X (formerly Twitter), external, and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external.
