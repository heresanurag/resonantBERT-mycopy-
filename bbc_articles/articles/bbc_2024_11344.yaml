content: |-
  Great Britain's Dina Asher-Smith clinches 100m gold at the European Athletics Championships in Rome.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Dina Asher-Smith claimed 100m gold at the European Athletics Championships as British team-mates Georgia Bell and Lizzie Bird also achieved medals in Rome. Asher-Smith took victory in 10.99 seconds, crossing the line ahead of Poland's Ewa Swoboda (11.03secs) and Italy's Zaynab Dosso to celebrate her first major international medal since winning European 200m silver in 2022. Bell clinched women's 1500m silver in four minutes 05.33 seconds to achieve her first major international medal behind Ireland's Ciara Mageean. Meanwhile, Bird replicated her European 3,000m steeplechase bronze medal-winning performance of two years ago in a time of 9:18.39 amid thunder and lightning in the Italian capital. Great Britain climbed to third in the medal table after winning two golds on Sunday. Asher-Smith's fifth European triumph followed team gold in the women's half marathon - led by bronze medallist Calli Hauger-Thackery - during the morning session on day three. Mageean finished the strongest at the end of a tactical 1500m final to cross the line in 4:04.66 seconds for Ireland's second gold of the championships. Britain's Jemma Reekie had appeared in control of proceedings but faded to finish fifth in 4:06.17, while team-mate Katie Snowden was ninth (4:06.83). Bird, 29, was temporarily lifted to the silver medal position after winner Alice Finot of France (9:16.22) was disqualified for an infringement on the inside of the track. But following an appeal, Finot was reinstated and Gesa Felicitas Krause of Germany (9:18.06) had to settle for silver.

  Asher-Smith's experiences in Munich two years ago led the former 200m world champion to call for more research into the effect of periods on performance, after her 100m title defence was ruined mid-race by calf cramps caused by her cycle. She bounced back from that setback to win 200m silver but, following a disappointing World Championships last summer where she finished eighth in the 100m final and seventh in the 200m, Asher-Smith split with long-time coach John Blackie in October, ending a 19-year partnership. Having now moved to train with Edrick Floreal in Austin, Texas, this was a timely victory for Asher-Smith as she builds towards an attempt at winning her first individual Olympic medal at Paris 2024. She was able to deliver in the final after producing a statement 10.97secs in her semi-final - the fastest time by a European woman this year. Asher-Smith told BBC Sport: "I’m in a great place, but when you’ve got a few new things to get your head round sometimes it does take a little bit of time. "Overall I’m really happy that I’m six-to-eight months into a new set-up and I’m here putting together performances like this back-to-back." On the Olympics, she added: "I’m very excited. I think a European Olympics is going to be so much fun and, if I am being honest, my mentality this year is just chill out and have a great time." Team-mate Amy Hunt, 22, finished seventh in the final in 11.15secs.

