  Bell has made great progress since returning to athletics post-lockdown, demonstrated by a fourth-place finish at the World Indoor Championships in March. The 30-year-old still fits training around working full-time, under the guidance of team-mate Keely Hodgkinson's coaches Trevor Painter and Jenny Meadows. "Even six months ago winning European silver would have sounded crazy. I was unranked, unsponsored, and had a 1500m personal best of 4:06," Bell said. "To see where I am now, I am very proud of myself, and I am excited for the future." In holding out for European bronze, Bird also achieved the Olympic qualifying standard to ensure she will just require a top-two finish at the UK Championships, which double as the Olympic trials, on 29 and 30 June to secure her spot in Paris. "I'm so happy with that," said Bird. "I'm having a day of sightseeing tomorrow and I might have some pizza and ice cream, but then it's back to work."

