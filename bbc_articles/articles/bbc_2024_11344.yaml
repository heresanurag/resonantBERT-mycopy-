  British athletes Morgan Lake, Elliot Giles and Jake Norris were also involved in finals on Sunday night. In the women's high jump final, Lake made a first-time clearance of 1.90m but finished sixth after exiting following three failures at 1.93m. Ukrainian world champion Yaroslava Mahuchikh took gold as the only athlete to clear 2.01m. British team captain Giles, winner of European bronze in 2016, finished seventh (1:47.06) in the men's 800m final, won by Frenchman Gabriel Tual in 1:44.87. Norris produced a best throw of 73.66m for 10th place in the men's hammer final, in which Poland's Wojciech Nowicki took gold with an unbeaten mark of 80.95m. Elsewhere, Spain's Ana Peleteiro clinched the women's triple jump title with a fourth-round leap measuring 14.85m.

