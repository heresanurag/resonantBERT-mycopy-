  The talented 24-year-old looked effortless as he set the fastest time across the three semi-finals in 44.65secs, having run under 45 seconds for the first time last month. And Laviai Nielsen qualified for the women's 400m semi-finals by finishing second to Ireland's Rhasidat Adeleke (50.54secs) in a personal best 50.73secs. But Alex Haydock-Wilson (46.05) - a late addition to the men's semi-finals after a qualified athlete withdrew with injury - and Victoria Ohuruogu (52.07) missed out on those finals. Jona Efoloko, third in his semi-final in 20.73secs, and Jeriel Quainoo (20.81secs) were unable to reach the men's 200m final. Alongside Britain's half marathon success on Sunday morning, Anna Purchase qualified for the women’s hammer final with a 68.91m throw - but Charlotte Payne missed out (68.47m). Alastair Chalmers reached the men’s 400m hurdles semi-finals by finishing third in his heat in 49.71 seconds.

  Italy lead the medal table ahead of France and Great Britain & Northern Ireland
