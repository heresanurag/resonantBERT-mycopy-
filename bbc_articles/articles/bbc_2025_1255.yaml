title: 'Michael Wimmer: Motherwell appoint German as new manager to replace Stuart
  Kettlewell - BBC Sport'
date: '2025-02-17'
section: Motherwell
url: http://www.bbc.co.uk/sport/football/articles/cvgegvv4m39o
content: |-
  Motherwell have appointed former Austria Vienna boss Michael Wimmer as their new manager.

  German Wimmer left the Generali Arena last year and was previously assistant at Stuttgart and Augsburg.

  The 44-year-old replaces Stuart Kettlewell, who left Fir Park citing the personal abuse he had received during a recent downturn in results.

  Bristol Rovers had been linked with Wimmer in December but the League One club were reportedly unable to secure a work permit. Motherwell say a work permit has been agreed for their new manager.

  A player with Lohhof, Dingolfing and Ismaning, he moved into coaching with Nuremberg in 2010, joining Augsburg eight years later.

  Wimmer had a brief spell in interim charge of Stuttgart in 2022, winning four of his eight games, and won 27 of his 61 matches with Austria Vienna, who finished eighth in the Austrian Bundesliga shortly after his sacking.

  The Steelmen sit eighth in the Scottish Premiership following Saturday's 3-0 home defeat by Ross County, having been fifth when Kettlewell departed.

  Kettlewell's assistant Stephen Frail had overseen the home losses to Celtic and County and Motherwell have confirmed Frail has left the club.
