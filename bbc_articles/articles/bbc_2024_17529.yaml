content: |-
  Online, on TV, and on Sounds and Radio - the BBC is bringing you full coverage of the 2024 UK general election and its results.

  How to follow the election on the BBC

  BBC News is on hand with a wealth of coverage for election night on 4 July. The latest news, analysis and results will be available from 22:00 BST on Thursday, across all platforms and whether you are in the UK or overseas.

  Follow all the election developments and the results as they come in on the BBC News website and app. BBC News cameras and reporters across the country will feature on our live pages and video streams, so you will not miss a thing. You can follow General election 2024 for simple explainers and in-depth analysis from BBC News political correspondents and experts. International users can access all BBC News election content on BBC.com.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Laura Kuenssberg and Clive Myrie will host BBC News' election night coverage, along with BBC political editor Chris Mason and other experts. The programme will be on BBC One in England, BBC Two in Wales and Northern Ireland, and the BBC News channel for audiences in Scotland and overseas. Dedicated election results programmes on BBC One in Scotland, Northern Ireland and Wales will be presented by Martin Geissler, Mark Carruthers, and Nick Servini respectively, with Anne McAlpine hosting a Gaelic-language election round-up on BBC Alba. You can also keep up to date through the BBC News Channel and the Election 2024 livestream on BBC iPlayer. News Channel coverage will be signed from 21:55 BST on Thursday night to 16:30 on Friday.

  Sign up for our Election Essential newsletter to bring all the latest news and analysis straight to your inbox.

  The BBC News flagship Newscast programme, rebranded Electioncast for the election period, will be running an all-nighter overnight on Thursday into Friday with Adam Fleming and the BBC News political team. It will transform the BBC Radio Theatre in Broadcasting House into the biggest living room in the country, getting live reaction from 150 audience members as results come in. BBC Radio 4’s election-night coverage will be hosted by Rachel Burden and Nick Robinson. For analysis, they will be joined by BBC News chief political correspondent Henry Zeffman. Audio-only political coverage will also be available on the “Election 24” stream on BBC Sounds and on smart speakers. Global audiences can follow events, with a mix of dedicated UK-election coverage and international news, through the BBC World Service.
