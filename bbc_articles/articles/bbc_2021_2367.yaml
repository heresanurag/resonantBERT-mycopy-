  Economy Minister Diane Dodds tweeted that she was hopeful of a "safe and sustainable" reopening of sectors.

  The chief executives of Hospitality Ulster, Belfast Chamber, Londonderry Chamber of Commerce and Retail NI described the changes to click-and-collect services as "positive steps".

  But they warned that the impact of repeated lockdowns would be "severe and long-standing".

  It came in response to a large spike in the number of coronavirus cases, which followed a relaxation of some rules in the run-up to Christmas.

  The restrictions have meant non-essential retailers have been closed, family gatherings have been prohibited and people have been ordered to stay at home for all but essential reasons.

  The number of people being admitted to hospital with Covid-19 has reduced in recent weeks

  It was initially imposed for six weeks but on 21 January ministers reviewed the measures and extended them until 5 March at the earliest.

  Meanwhile, latest figures from Stormont's Department of Health show 427,569 people have received their first coronavirus vaccine in Northern Ireland.

  Some 30,012 have received both their first and second.
