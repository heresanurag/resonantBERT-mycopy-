  On Thursday, Prime Minister Sir Keir Starmer confirmed the government was considering banning smoking in some outdoor spaces in England. It followed a report in the Sun newspaper, external that ministers could extend the indoor smoking ban to pub gardens, university and hospital campuses, sports grounds, and children's play areas. Health experts welcomed the proposals but the BBC has been told some ministers have raised concerns about the potential impact on the hospitality sector. Conservative shadow health secretary Victoria Atkins and Reform UK leader Nigel Farage were also among those to speak out against the idea. Asked about the report in the Sun, Sir Keir said deaths caused by smoking were "preventable" and "we've got to take action to reduce the burden on the NHS and the taxpayer". Earlier, this year the previous Conservative government proposed legislation to ban the sale of cigarettes to people born in or after 2009. The plans for a gradual ban on smoking have been taken forward by the new Labour government, which has also promised to introduce the legislation.

