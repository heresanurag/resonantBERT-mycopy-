title: BBC to show World Cup qualifiers live for Scotland, Wales and Northern Ireland
  - BBC Sport
date: '2025-03-07'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cj3nl3xm7mlo
content: |-
  Scotland last qualified for a men's World Cup in 1998

  The BBC will show all World Cup qualifiers for the men's teams of Scotland, Wales and Northern Ireland live. A new deal signed with Uefa means that 41 live matches will be shown. The deal also includes friendlies and Scotland's Nations League play-off with Greece later this month. The 2026 World Cup will include 48 teams and takes place across the United States, Canada and Mexico. Scotland last reached the World Cup finals in 1998, Northern Ireland have not played at the tournament since 1986 while Wales ended their 64-year wait by qualifying for the last finals in Qatar in 2022. It means all home nations World Cup qualifiers will be live on free-to-air television with ITV showing England's games.

  Rhodri Talfan Davies, director of BBC Nations, said: "I'm absolutely delighted that fans across Scotland, Wales and Northern Ireland will now be able to enjoy live, free-to-air coverage of all the big international football matches. "Nothing fires the imagination more than live international sport and the race to qualify for the world's biggest tournament. It's going to be quite a ride and I'm thrilled the BBC will be there every step of the way." The matches will be shown on BBC One in each nation and BBC iPlayer - with key fixtures also being broadcast on network television across the UK. The live games add to existing live international coverage on BBC Radio Wales, BBC Radio Ulster, BBC Radio Scotland, BBC Radio Cymru and the BBC Sport app. Live games on the BBC in March
