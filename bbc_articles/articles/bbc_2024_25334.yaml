title: William addresses his privilege in helping homeless - BBC News
date: '2024-10-17'
section: UK
url: http://www.bbc.co.uk/news/articles/cglk70e005do
content: |-
  Prince William says he wants to make use of his public platform to campaign against homelessness.

  Prince William says he "passionately believes" homelessness can be ended

  "Why else would I be here if I'm not using this role properly to influence and help people where I can?" says the Prince of Wales about whether he is the right person to campaign against homelessness. In a clip from a forthcoming ITV documentary, Prince William describes his work to reduce homelessness through his project Homewards - something critics have questioned as being inconsistent with his privileged life. He says he comes "with no other agenda than desperately trying to help people who are in need". The prince also gave a speech about homelessness this evening in London - where he said: "I passionately believe that it can, and should, be ended."

  Prince William says that for him the point of having such a high-profile public platform is to use it to make a positive impact on problems such as homelessness. "It's a big challenge," he says of his five-year Homewards project, that has built up local and national partnerships to reduce homelessness in six areas around the UK. "And I like a big challenge, I do like that, but I can't do it on my own," he said. "I think everyone having a right to a safe and stable home benefits us all," he adds. Anti-monarchists have accused the prince of being "hypocritical" for his housing project, when he has several homes and has more than £20m from the Duchy of Cornwall as a private annual income. But homelessness campaigners such as Mick Clarke, chief executive of the Passage, have welcomed the prince's involvement - and praises him for using his "considerable platform to say that homelessness is something that simply should not exist in 21st Century Britain". "For William this is personal. He has a long history of involvement on this issue, back to when his mother took him to the Passage when he was 11," Mr Clarke told the BBC. "As patron of the Passage he has seen first hand, through his many private visits, that homelessness can be prevented and ended. "That is where the genesis of Homewards came from - through his personal interactions with those experiencing homelessness." The prince first went as a child with his mother Diana to the see the Passage's work in central London - and he has often spoken of this influence on opening his eyes to the world outside of palaces and the challenges facing those without a home.

  Prince William with three of the Centrepoint Awards winners

  The prince's projects have become increasingly direct in their approach and include plans to build social housing on Duchy of Cornwall land. These will have "wrap-around support" to help settle people who might have complex social, psychological and health needs after many years without secure accommodation. It is a "housing first" model that draws on how Finland has cut homelessness, with an emphasis on getting people into housing and then offering intense support. At an awards event for the Centrepoint youth homelessness charity, Prince William said homelessness was a "complex societal issue" - but repeated once again that it could be tackled. "Achieving this will require a movement that creates systemic change. A change that focuses on prevention rather than management. And one that ensures all young people have truly affordable options to live and thrive independently," he said. The awards ceremony, held on Wednesday evening at the British Museum, recognised the achievements of young people who have experienced homelessness. One of the evening's winners, Shannon, said it was "surreal" to win the Inspirational Award and praised the prince for his campaigning. "He was actually genuine and he actually wanted to speak to us", the 26-year-old said after being presented the award by the prince. Prince William has been a patron of the charity since 2005.
