content: |-
  India will face Australia in the first semi-final of the Champions Trophy on Tuesday, having beaten New Zealand to finish top of Group A.

  This video can not be played To play this video you need to enable JavaScript in your browser. India secure comfortable New Zealand win to set up Australia semi-final

  India beat New Zealand by 44 runs in the final group match of the Champions Trophy to set up a semi-final against Australia. Having been set 250 to win on a slow surface in Dubai, the Black Caps were bowled out for 205 after a masterful performance from India's spinners with Varun Chakravarthy taking 5-42. Kane Williamson's 81 kept New Zealand in contention, but the required run-rate mounted through the middle overs and the last seven wickets fell for 72 runs. India are playing all of their matches in Dubai having chosen not to travel to Pakistan, and will face Steve Smith's Australia in the first knockout match on Tuesday. New Zealand, who had also already qualified before this match, will play South Africa in Lahore on Wednesday. India's batters also struggled for fluency as they slipped to 30-3, including another sensational catch from Glenn Phillips at point to remove Virat Kohli for 11. A patient stand of 98 between Axar Patel and Shreyas Iyer, who top-scored with 79, led India's recovery before Hardik Pandya's run-a-ball 45 helped post a competitive total. New Zealand were exceptional in the field while seamer Matt Henry starred with 5-42, but it was an ominously brilliant display from the India spinners on a favourable Dubai surface where the final will also be played if they qualify.
