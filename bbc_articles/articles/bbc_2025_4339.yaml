  India captain Rohit Sharma: "It was very important for us to finish on a high against a very good team. New Zealand are a very good side but we played perfect cricket today. "In such a short tournament you have to try and win every game that's in front of you. Australia have a rich history but it's about us." New Zealand captain Mitchell Santner: "It was a slower wicket than what we have come up against but we knew that coming in. "If you had said we'd have to get 250, we'd have been happy. It spun more than we thought but their four quality spinners makes it pretty tough." Former New Zealand wicketkeeper Katey Martin on BBC Test Match Special: "New Zealand looked clueless against the spin and it was a challenging innings for Kane Williamson. "It felt like they never got out of gear. They have to learn as much from this game as they can if they do come back to play here again."
