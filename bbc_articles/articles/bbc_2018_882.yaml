title: 'Princess Eugenie: Proposal ''was a complete surprise'' - BBC News'
date: '2018-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-42778186
content: |-
  Princess Eugenie says her long-term boyfriend Jack Brooksbank's proposal was "a complete surprise".

  Speaking to the BBC's The One Show, she said the moment Mr Brooksbank asked her to marry him was "perfect", adding: "We couldn't be happier."

  Mr Brooksbank told the programme he did get down on one knee to pop the question.
