content: |-
  Plans for a new takeaway prompt health bosses to chip in with their own suggestions.

  NHS bosses want chippy to sell fruit and veg

  This video can not be played To play this video you need to enable JavaScript in your browser. There could be something fishy about this chip shop's menu if health bosses get their way

  Plans for a new chippy have come up against a health board's demands for fruit and veg on the menu. Betsi Cadwaladr health board wants the proposed takeaway in Morfa Bychan, Gwynedd, to sell a "good selection" of fruit and veg. It wants the menu to have less fat, salt and sugar and is worried an increase in fast food outlets is "detrimental" to people's health. It is unclear whether customers would relish the prospect of cod and broccoli on the menu.

  The board said the location of the proposed new business was popular among holidaymakers, adding: "The food in these areas is targeted to meet the needs of tourists as opposed to local residents. "This is of particular concern for local permanent residents where this food is available throughout the year and not just during holiday periods."

  The more junk food was available, the board added, the more likely it was that people would get fat. "Increased access to unhealthy food retail outlets can be associated with increased weight status in the general population and increased obesity and unhealthy eating behaviours among children residing in low-income areas," it said. "While we appreciate this is only one extra takeaway unit, this would still be one additional takeaway than what is currently available." Porthmadog council also chipped in with its disapproval, dubbing the scheme an "overdevelopment" as there were "too many businesses in a small area".

  The proposed site for the new shop would be two doors down from another chippy

  The council warned the plans would cause traffic and parking problems, adding there was already a chip shop in the area. The application to change the use of the empty building was submitted in August and this is not the first time a health board has got involved in planning issues. KFC challenged at least 43 councils, external in England last year over planning policies that restricted new hot food takeaways, winning more than half of them. Public Health Wales, external previously estimated the cost of obesity to the NHS in Wales at £73m, which is expected to hit £465m by 2050. The health board has been asked to comment.
