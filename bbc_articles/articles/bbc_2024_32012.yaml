  Footage shows survivors walking and being dragged away from the tail section of the plane.

  Footage shows survivors walking and being dragged away from the tail section of a crashed Azerbaijan Airlines plane.

  Wednesday's flight from Baku to Grozny in the Russian republic of Chechnya was diverted across the Caspian Sea and went down near the western Kazakhstan city of Aktau.

  Some aviation experts have suggested was hit by Russia's air defence systems. Russia says it will wait for the results of an investigation before commenting.

  Twenty-nine of the 67 people on board survived. Azerbaijan held a national day of mourning on Thursday for the victims.
