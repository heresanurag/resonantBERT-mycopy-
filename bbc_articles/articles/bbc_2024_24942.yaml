title: 'Watch: SpaceX Starship booster caught in mid air - BBC News'
date: '2024-10-13'
section: General
url: http://www.bbc.co.uk/news/videos/cly57d5jw7eo
content: |-
  It’s the first time the "chopsticks manoeuvre" has been attempted, with previous boosters landing in the ocean.

  SpaceX's Starship has completed its fifth test flight, as Elon Musk pushes ahead in his quest to one day take astronauts to the Moon – maybe even to Mars.

  During this flight, the SpaceX team attempted something that had never been done before.

  Unlike in previous flights, when the booster falls away, it slowed itself down and descended gently back toward the launchpad for a pair of giant mechanical arms to catch it – in what’s known as the "chopsticks manoeuvre".

  Watch the moment the SpaceX control room erupted in cheers as the move was successfully completed, an achievement the BBC's Pallab Ghosh described as "absolutely astonishing".
