title: Essex ambulance dashcam captures speeding drivers - BBC News
date: '2024-12-16'
section: General
url: http://www.bbc.co.uk/news/videos/c9wl87xg7g2o
content: |-
  One car is seen speeding past the ambulance at up to 125mph (201km/h).

  Ambulance dashcam footage has been used to prosecute two speeding drivers seen overtaking at speeds of up to 125mph (201km/h).

  Crews in the ambulance called 999 after seeing the Audi and Ford Focus cars travelling on the wrong side of the road on the A133 in Clacton-on-Sea, Essex, on 25 August.

  A road safety support officer calculated one of the cars was travelling between 120mph (193km/h) and 125mph (201km/h), while the other reached an average speed of 101mph (162km/h), said Essex Police.

  The force added the single carriageway road, between Brook Retail Park and St Osyth Road, was "clearly marked" with the national speed limit of 60mph (96km/h).

  Police said two men were disqualified from driving and ordered to do 200 hours of unpaid work within 12 months.

  Both men, who admitted dangerous driving, would be required to sit an extended test to resume driving and were also ordered to pay court costs.
