id: bbc_2018_1051
title: Cars frozen in Revere, Massachusetts' floodwaters - BBC News
date: '2018-01-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42589963
content: |-
  Sub-zero temperatures and extreme floods in Revere, USA, trapped dozens of cars in ice. The severe conditions were powered by a "bomb cyclone".
