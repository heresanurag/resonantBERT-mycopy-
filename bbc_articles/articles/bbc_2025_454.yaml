  Author Helen Fielding on bringing her heroine to a Gen Z audience, and whether Bridget's Darcy is based on the PM.

  Author Helen Fielding has discussed bringing her heroine to a Gen Z audience, and whether Bridget Jones' Darcy was based on Prime Minister Keir Starmer.

  She was speaking to the BBC's Charlotte Gallagher at the premiere of Bridget Jones: Mad About the Boy in London's Leicester Square.
