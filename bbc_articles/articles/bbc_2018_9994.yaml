  This didn't seem a comfortable moment for Dominic Raab.

  The Brexit secretary campaigned for Leave, and is a true believer in the cause. Yet here he was, setting out plans to cope with a British failure to reach the kind of deal Brexiteers once claimed would be easy to accomplish.

  Again and again, the Brexit department's guidance refers to the "unlikely event" of Brexit without an EU deal - but Dominic Raab conceded it could happen.

  The risk was real. The International Trade Secretary, Liam Fox, has suggested that outcome is more likely than not.

  The Brexit secretary may disagree on the level of risk, but could not deny that it would lead to higher costs and a fresh burden of red tape on businesses, scientific and medical research and individuals.

  The European Commission said Brexit would lead to disruption "with a deal or without a deal".

  "That's why everybody, and in particular economic operators, need to be prepared," it said.

  The commission has already published its own assessment of no deal, saying there would be "no specific arrangement" for EU citizens living in the UK or for UK citizens in the EU and warning of "significant delays" at borders.

  For Labour, shadow Brexit secretary Keir Starmer said Mr Raab's speech was "thin on detail, thin on substance and provided no answers to how ministers intend to mitigate the serious consequences of leaving the EU without an agreement".

  "A no-deal Brexit has never been viable and would represent a complete failure of the government's negotiating strategy," he said.

  Welsh First Minister Carwyn Jones said a no-deal Brexit would cause "huge disruption and serious, long-lasting economic and social damage", and Lib Dem leader Sir Vince Cable added: "This isn't project fear by critics of Brexit, this is the government itself and independent bodies pointing to the damage that will be caused."

  The National Farmers' Union warned of a "disastrous" cliff edge scenario for the UK food supply chain.

  Business group the CBI said: "These papers show that those who claim crashing out of the EU on World Trade Organisation rules is acceptable live in a world of fantasy, where facts are not allowed to challenge ideology."

  Pointing to the possibility of new credit card charges, Lord Adonis of the People's Vote campaign, said: "Every time a new Brexit paper is published, more people are made worse off".

  TUC general secretary Frances O'Grady said the reports confirmed no-deal Brexit was not a credible option, as it would be "devastating for working people".
