title: 'Bristol Bears 12-35 Leinster: Four-time winners spark into life after slow
  start - BBC Sport'
date: '2024-12-08'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cpw2rwlwkp2o
content: |-
  Leinster begin their pursuit of a fifth Investec Champions Cup crown with a ruthless second half display to claim a bonus-point victory over Bristol Bears at Ashton Gate.

  Sam Prendergast inspired Leinster to victory over Bristol Bears with a 20-point haul at Ashton Gate

  Leinster began their pursuit of a fifth Investec Champions Cup crown with a ruthless second-half display to claim a bonus-point victory over Bristol Bears at Ashton Gate. Fly-half Sam Prendergast scored 20 points, including two of his side's four tries after the break, as new signing Jordie Barrett and Josh van der Flier also crossed. Bristol started brightly and took the lead through Max Lahiff from close range but Leinster, who had two players in the sin-bin, hit back almost immediately when Jordan Larmour capitalised on Rich Lane's handling error. The teams were tied at the interval but the visitors were able to bring on New Zealand utility back Barrett and South Africa's World Cup-winning lock RG Snyman, whose quality tipped the balance in Leinster's favour. Barrett opened his account for the club with a clever dummy before sliding over under the posts and Snyman's fierce charge set-up Prendergast on his shoulder to seal the bonus. Back row Van der Flier added further gloss to the scoreline for the four-time winners with a powerful surge from a line-out. Bristol salvaged a late consolation through winger Gabriel Ibitoye, who latched onto Kieran Marmion's kick to run clear. Leinster host Clermont Auvergne in their next Pool 2 game on Saturday (17:30 GMT), while Bristol travel to previous champions La Rochelle later on the same day (20:00).

  Prendergast's inspired performance strengthened his claim as Johnny Sexton's long-term successor for Leinster and Ireland. The first half was one for the purists as Bristol tried to starve Leinster of the ball, but Prendergast's clever chip over the top caused alarm in the Bears' ranks and Lane was unable to gather the ball, which popped up fortuitously for Larmour to score. After the break, Leinster turned the screw as Prendergast combined beautifully with debutant Barrett. The world famous All Black came on at full-back, but took the ball at first receiver before freeing the fly-half to glide through on the wrap around. Minutes later, Leinster set-up in the same way, but this time Barrett held onto the ball and dived over as Prendergast was used as a dummy runner. The number 10 then doubled his tally as he followed the bustling run of Snyman to run clear and score his side's fourth try. A full return of five conversions from five attempts from the tee rounded off a stunning performance by Prendergast as he looks to establish himself as the talisman for club and country.

  American rugby star Ilona Maher. who signed for Bristol Bears Women this week, was introduced to the home fans at half-time

  The Premiership side's chances were dented by an early injury to influential fly-half AJ MacGinty, and they were further disrupted when England prop Ellis Genge went off just after half-time. "It was a huge disruption losing AJ," said Bristol boss Pat Lam. "It had an effect on our game and being able to play our shapes, but the boys competed and kept coming at them. "They showed their strength, there were a couple of tries through the middle, but I can't fault the boys for hanging in there." Lam said that Genge suffered calf muscle cramp, but should be fine for the La Rochelle trip.
