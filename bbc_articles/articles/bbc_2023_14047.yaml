id: bbc_2023_14047
title: 'Daniel Khalife: First sighting of escaped prisoner investigated - BBC News'
date: '2023-09-08'
section: UK
url: http://www.bbc.co.uk/news/uk-66756233
content: |-
  Police say it could be "very significant" and offer a reward up to £20,000 for information leading to Daniel Khalife's arrest.

  A sighting of escaped terror suspect Daniel Khalife is being investigated by the Metropolitan Police.

  A witness saw him near Wandsworth roundabout on Wednesday morning, walking away from the food delivery van he used to escape from HMP Wandsworth.

  The Met is offering a reward of up to £20,000 for information that leads directly to his arrest.

  The 21-year-old is accused of trying to spy for an enemy state, understood to be Iran, and plotting a fake bomb hoax.

  The delivery van had stopped near the south entrance to the roundabout, at the top of Trinity Road, when a member of the public reported seeing Mr Khalife crawling out from underneath it.

  "The man was then seen walking towards Wandsworth town centre," the police statement added.

  The sighting is one of several "key lines" of enquiry the Met says it is following.

  Cdr Dominic Murphy, who leads the Met's Counter Terrorism Command, said the force had received 100 calls from the public and the Wandsworth Roundabout sighting "could be very significant".

  "This remains a fast-paced and dynamic investigation, but I want the public to know that a large number of officers are working extremely hard to locate Khalife," he said.

  He said his message to the suspect was to hand himself in: "We will be closing in on you, Daniel, you really need to come in and give yourself up."

  Cdr Murphy added that efforts were being focused on London but would also look at other parts of the UK as the investigation developed.

  The Met has also opened its UK Image Appeal website, allowing members of the public to submit any images and videos which are relevant to the investigation.

  Police have established the route the delivery van took on Wednesday

  Mr Khalife is described as slim, 6ft 2in (1.9m), with short brown hair.

  Police say there is no reason to believe he poses a threat to the public, but urged people not to approach him and instead call 999.

  Mr Khalife - who joined the British Army in 2019 - is thought to have clung to the underside of a delivery lorry to make his escape from HMP Wandsworth in London.

  Detectives believe he was still wearing his prison-issue cook's uniform when he slipped out of the category B jail on Wednesday.

  Some 150 Met Counter Terrorism Command officers have been deployed in the search since Khalife was declared missing at 08:15 BST.

  A search took place on Thursday night into the early hours of Friday in Richmond Park, south-west London - just 2.8 miles (4.6km) from the prison.

  BBC News was told it was not based on any specific lead or intelligence, and search efforts have been scaled back.

  Daniel Khalife, top left, during his time in the British Army in 2018

  The Met has released a photo of the type of clothing Mr Khalife was wearing when he escaped from prison

  The Met said it had been able to clarify the route taken by the delivery lorry as it left the prison, following new CCTV enquiries.

  "After exiting Wandsworth roundabout onto Swandon Road, the van remained on the road until turning left onto Fairfield Street," the force explained.

  Met Police Commissioner Sir Mark Rowley said the force was exploring the possibility the former soldier was helped by other prisoners or guards.

  Justice Secretary Alex Chalk said an independent investigation will take place following the escape.

  It will run alongside reviews looking at the categorisation and placement of all HMP Wandsworth prisoners, and all those in custody charged with terrorism offences.
