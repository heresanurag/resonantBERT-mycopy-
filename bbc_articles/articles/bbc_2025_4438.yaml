  Prisoner on the run after faking emergency on M55

  Jamie Cooper, 33, absconded from the van on the M55 motorway near Catforth in Lancashire

  A prisoner on his way to court "overpowered" escort officers after faking a medical emergency and is on the run, police said. Jamie Cooper was being taken to Lancaster Magistrates' Court at 8:54 GMT when he absconded from a GEOAmey owned prison van on the M55 motorway at Junction 2 near Catforth. Lancashire Police said Cooper, originally from Blackpool, should not be approached and police should be called immediately if anyone saw him. A spokesperson for GEOAmey said the van had been forced to pull over to deal with an "on-board medical emergency" involving Cooper, who then fought his way free.

  The 33-year-old was described as about 5ft 7in tall, of medium build with short, cropped hair and was wearing a blue coat, blue jeans and black trainers when he fled. The force said Cooper, who has links to Blackpool and Bolton, had been due to attend court to face charges of assaulting a police officer and criminal damage. The GEOAmey spokesperson said: "The detained person involved in this emergency then overpowered and evaded the escort officers and escaped from the vehicle. "Lancashire Police have been informed and are currently searching for the escaped prisoner." The force said escaping prisoners was a "rare" event and urged anyone with information to come forward.

