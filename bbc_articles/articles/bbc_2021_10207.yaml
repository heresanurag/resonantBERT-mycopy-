  Latest government figures also show almost 40 million people are fully vaccinated.

  Should I be working from home or going back to the office?

  We've already heard that Google in the US is considering cutting the pay of staff who work from home, but what is the work from home guidance in the UK? In England, people are are no longer being asked to work from home and a gradual return to workplaces is encouraged by the government. However, in the rest of the UK, people are still being advised to keep working at home where possible. You can ask to keep working from home in the future, but your employer doesn't have to agree. However, the Chartered Institute for Personnel and Development - which represents HR professionals - says there could be much greater freedom and flexibility in how, when and where people work in future. "People generally want a mix of workplace and home working, and the possibility of more choice in their working routines, meaning hybrid working can provide an effective balance for many workers." The CIPD adds that the lifting of Covid restrictions "shouldn't signal a mass return to workplaces," and "it should be down to individual organisations, consulting with their people, to agree working arrangements". On Monday, Business Secretary Kwasi Kwarteng rejected the idea that civil servants should be paid less if they continue working from home. Read more in our explainer on the UK's working from home guidance
