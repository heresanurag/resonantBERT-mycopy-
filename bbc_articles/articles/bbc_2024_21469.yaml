  Sam Wealleans, from Northumberland, died in hospital on Sunday after falling ill during the race.

  Sam Wealleans, 29, died on Sunday after falling ill along the GNR route

  A man who died after collapsing during the Great North Run has been named. Sam Wealleans, of Newbiggin-by-the-Sea, Northumberland, died in hospital on Sunday after falling ill during the race, The Great Run Company (GRC) said. The 29-year-old was running on behalf of mental health charity Mind in memory of his sister and a close family friend. The GRC said its "thoughts and sympathies are with all those who loved and knew him".

  A spokesperson said: "We are continuing to support Sam's close family during this incredibly difficult time." Mr Wealleans' cause of death is not yet known. He had been running the half marathon from Newcastle to South Shields to raise £350. An online fundraiser has now reached more than £8,000. Mind's chief executive Sarah Hughes said the team was "devastated" to learn of Mr Wealleans' death. "We will be forever grateful for Sam's contribution," she said, adding the charity was in touch with the race's organisers and was available to support the runner's friends and family. "Our thoughts and condolences are with Sam’s loved ones at this incredibly difficult time, and we ask that their privacy is respected," she added. About 60,000 runners signed up for the 13.1-mile (21km) event, in its 43rd year, in wet and cool conditions.
