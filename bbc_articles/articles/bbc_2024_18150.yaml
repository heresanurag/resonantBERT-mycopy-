title: Teenager stole £15k worth of vapes in Liverpool disorder - BBC News
date: '2024-08-10'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cy76k6xj50no
content: |-
  The 16-year-old boy also admitted assaulting an emergency worker and causing criminal damage to a police car.

  Disorder broke out in Liverpool as riots took place nationwide

  A teenager has admitted stealing £15,000 of vapes during disorder in Liverpool last weekend. The 16-year-old boy, who cannot be named due to his age, also pleaded guilty to assaulting an emergency worker and causing criminal damage to a police car. He was released on bail with conditions after appearing at Liverpool Magistrates' Court earlier. He is due to be sentenced at the city's youth court on 17 September.

  A 39-year-old man from Rufford was remanded in custody after he appeared on three charges, including publishing communications to encourage murder and violent disorder, alongside possession of a bladed article. A 28-year-old man also pleaded guilty to affray and is due to be sentenced on Thursday. He has been remanded into custody. Cheshire Police said a 55-year-old woman who was arrested over an inaccurate social media post about the identity of the perpetrator of the Southport attack has now been bailed pending further inquiries. She was detained on suspicion of publishing written material to stir up racial hatred.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King died after an attack at a Taylor Swift-themed dance class

  Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, were stabbed to death at a holiday club on 29 July. Violent disorder erupted in Southport, Liverpool city centre and Walton, along with other towns and cities across the UK, causing injuries to officers and widespread damage. Axel Rudakubana, from Banks in Lancashire, who turned 18 this week, has been charged with three counts of murder and 10 counts of attempted murder.
