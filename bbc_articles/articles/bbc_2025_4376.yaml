title: 'World Happiness Report: Finland named as happiest country for eighth year
  - BBC News'
date: '2025-03-20'
section: World
url: http://www.bbc.co.uk/news/articles/cr72xep44kdo
content: |-
  Access to nature and a strong welfare system are cited as factors as Nordic nations dominate the rankings.

  Finland has been ranked as the world's happiest country for the eighth successive year, with experts citing access to nature and a strong welfare system as factors. It came ahead of three other Nordic countries in this year's UN-sponsored World Happiness Report, while Latin America's Costa Rica and Mexico entered the top 10 for the first time. Both the UK and the US slipped down the list to 23rd and 24th respectively - the lowest-ever position for the latter. The study also found strangers are about twice as kind as people think. It measured trust in strangers by deliberately losing wallets, seeing how many were returned and comparing that with how many people thought would be handed in.

  The rate of wallets returned was almost twice as high as people predicted and the study, which gathered evidence from around the world, found belief in the kindness of others was more closely tied to happiness than previously thought. John F. Helliwell, an economist at the University of British Columbia and a founding editor of the report, said the wallet experiment data showed "people are much happier living where they think people care about each other". The 13th annual World Happiness Report, released to mark the UN's International Day of Happiness, ranks the world's happiest countries by asking people to evaluate their lives.

  Almost 90% of Finns go every week to a sauna, an activity considered good for both physical and mental health

  Finland again took top spot with an average score of 7.736 out of 10, with Denmark in second. Experts said family bonds were a factor in Costa Rica's and Mexico's rise in the rankings. The study, published by the University of Oxford's Wellbeing Research Centre, asked people to rate their own lives on a scale of 0-10 - zero being the worst possible life and 10 being the best possible life. Country rankings are based on a three-year average of those scores. The top 10 are:

