title: Deer hits rugby player in Aylesbury v Marlow match - BBC News
date: '2024-12-17'
section: General
url: http://www.bbc.co.uk/news/videos/c745zk7w321o
content: |-
  A muntjac sprints across the field of play, sending a surprised player flying.

  A rugby player ended up on the ground when a muntjac invaded the pitch and sent him flying.

  It happened during Saturday's Buckinghamshire derby between Aylesbury and Marlow in a London and South East Division league match.

  The deer sprinted on and hit a Marlow player. Both the player and the muntjac were said to be unharmed.

  Marlow went on to win the game against Rams 19-17.

