title: 'Pfeiffer Georgi: British champion says Olympics road race route suits her
  - BBC Sport'
date: '2024-07-16'
section: Olympic Games
url: http://www.bbc.co.uk/sport/cycling/articles/cg64y6v23rdo
content: |-
  British road champion Pfeiffer Georgi says the Olympics road race course suits her "quite well" after being selected for the Games.

  Pfeiffer Georgi won the British road race title for the third time in her career in Saltburn last month

  British road race champion Pfeiffer Georgi believes the Olympics course suits her "quite well" as she prepares for her first tilt at the Games. The 23-year-old will compete in a four-rider Great Britain team in Paris on 3 August alongside Lizzie Deignan, British time-trial champion Anna Henderson and Anna Morris. The Gloucestershire-based rider said she believes the 158km route, which features 1,700m of climbing, is a "really exciting" course. "I think the course does suit me quite well," Georgi told BBC Sport. "There's a lot of opportunities and I think the Olympics, with such small team sizes, it's always special and you never know what happens - looking at the last Olympics - so I think it's completely open. "I remember when I was 11 and I was watching Lizzie [Deignan] and [Marianne] Vos sprint for the win in London 2012 and since then I've always had it on my radar to one day go."

  Georgi won her third national title on 23 June for her first victory of the year, having also been crowned champion in 2021 and 2023. With the Olympics and the Tour de France Femmes to come in August, Georgi said she felt her form was where she wanted it to be. "After the classics I had about six weeks away from racing and then I came back for Ride London and the Women's Tour [of Britain] so I think I was building in those races," Georgi told BBC Sport. "It definitely gave me a massive confidence boost for the second part of the season that I was still in good form or getting better."

  Pfeiffer Georgi (second from left) finished third at the prestigious Paris-Roubaix race in April this year

  Georgi is in her sixth year as a professional with Dutch team DSM-Firmenich PostNL and had a standout spring that saw her finish on the podium in third in Paris-Roubaix for the first time, as well as fourth in the Amstel Gold Race and fifth in Trofeo Alfredo Binda. At the national road race, on a course that finished on the climb of Saltburn Bank just like in 2023, Georgi replicated her tactics from 12 months earlier to attack on the final slope to the line and win by six seconds. "During the race I didn't feel amazing and I felt a bit of pressure from myself because I really wanted to win it again," Georgi said. "But then also when you've won it twice - and last year pretty much on the same course - people are always watching you a bit more. "I got in the mental state that I was going to completely give it everything and just try and be confident that this was what suited me and then not look back until I got to the top."
