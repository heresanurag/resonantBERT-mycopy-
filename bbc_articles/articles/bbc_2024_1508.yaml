title: I did not hound Post Office victim, investigator tells inquiry - BBC News
date: '2024-01-11'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-67941754
content: |-
  Stephen Bradshaw denies he and his colleagues behaved like "mafia gangsters" towards branch managers.

  Bradshaw told he 'wasn't much of an investigator'

  Bradshaw is now being asked whether further Post Office data should have been looked into - and if he got in the way of it going ahead. Inquiry counsel Julian Blake says that according to an email shown to the hearing, a decision was taken not to look further into Post Office data. The email shown to the hearing from Cartwright King solicitor Andrew Bolc read out: "Dear Gareth, the investigator is happy with the report as it stands. Please could you proceed as before. Many thanks". But, Bradshaw says multiple times, that decision was not his. Who was responsible for not carrying out the investigation further, Bradshaw is asked, to which he replies: "Mr Bolc. He was the one putting the evidence together." According to another piece of evidence read out, Bolc said Bradshaw "wasn't much of an investigator". In response, Bradshaw says he could say the same about Bolc "but I'm not going down that line". Asked further about his opinion of Bolc, Bradshaw says all he is prepared to say is that he's employed by the firm that represented the Post Office.
