  There is little doubt that the Kremlin views the prisoner swap as a victory for Moscow. It got what it wanted... it got its agents back, including the man who was No.1 on its wish list, Krasikov. The German authorities had initially been unwilling to release a convicted assassin, who a German court had concluded had acted on behalf of the Russian authorities. That reluctance softened as a wider deal took shape. But why was it so important for the Kremlin to secure Vadim Krasikov’s release and to bring him home? “We’re returning our guys” is the headline in the government paper Rossiyskaya Gazeta, That is precisely the message the Kremlin wants to send to its agents and spies: if we send you on missions abroad, and things go wrong, we’ll find a way of getting you home.
