title: 'Newspaper headlines: Kyle ''just the host'' and royal back-to-work beard -
  BBC News'
date: '2024-09-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cdd7j311y19o
content: |-
  An inquest on the death of a Jeremy Kyle show participant and Prince William's beard lead the papers.

  Kyle 'just the host' and royal back-to-work beard

  The Daily Telegraph, external reports that British criminals could serve their time in jails in Estonia under plans being considered by ministers to ease Britain's overcrowded prisons. It says the Baltic state has plenty of empty cells it wants to rent out and government sources are quoted as saying "all viable options" are being considered while the UK system is "on the brink of collapse". The paper expected discussions to have taken place between ministers on Thursday but says the Prison Reform Trust called the idea half-baked. Germany is considering sending migrants who arrive in the country illegally to facilities in Rwanda paid for by the UK government, according to the Daily Mail, external. The idea has been floated by Joachim Stamp, Germany's special commissioner for migration agreements. The paper says Tory leadership contender Robert Jenrick has said the proposal makes Prime Minister Sir Keir Starmer, who scrapped the scheme after taking office in July, look "more foolish by the day". Number Ten tells the paper it stands by the decision and describes the scheme as a "gimmick". The Grenfell inquiry report continues to make headlines following its publication on Wednesday. The Times, external says the architecture firm which was behind the refit of the Tower has been prevented from closing down while investigations into the disaster continue - despite being in liquidation for four years. It says the inquiry found that Studio E bore a "very significant degree of responsibility" because of the materials used in the refit and that it had a "cavalier attitude to safety". The Guardian, external quotes a warning from a former chief prosecutor that justice for the 72 deaths may not come before the end of the decade. Lord McDonald tells the paper that the "creaking justice system" means any criminal trials may not begin before 2029.

  A monument honouring Queen Elizabeth II in St James's Park is to be announced this weekend, the Daily Mirror reports

  According to the Scottish Daily Mail, external, detectives have submitted the findings of their investigation into Nicola Sturgeon and the SNP's finances to prosecutors. It says police have made a formal request to Scotland's Crown Office asking what action to take next. Ms Sturgeon insists that she has done nothing wrong. The i reports, external that checks on fruit and vegetables being imported from the EU are to be delayed again amid fears they will push up food prices. The introduction of the checks was repeatedly pushed back under the previous government, and are now expected to be delayed again until July 2025, the paper says. The Times reports on medical evidence that backs up the traditional remedy of a salt water gargle to help cure coughs and colds in children. It says a scientific study has found that a homemade saline solution, used as nasal drops, could decrease the length of a childhood cold by two days. It also lowered the risk of passing on the infection. And the Daily Mirror, external says that a monument honouring Queen Elizabeth II is to be announced this weekend to coincide with the second anniversary of her death. The paper says the sculpture will be in St James's Park, which is overlooked by Buckingham Palace, and will be unveiled in 2026.

