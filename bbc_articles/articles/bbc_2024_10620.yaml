title: 'Bournemouth stabbing: Teen released without charge - BBC News'
date: '2024-05-27'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-dorset-69065705
content: |-
  Amie Gray, 34, died following the attack on Durley Chine Beach in Bournemouth on Friday.

  The woman was fatally stabbed on the beach on Friday night

  A teenage boy who was arrested on suspicion of murder after a woman was stabbed to death on a beach has been released without charge. The woman, named locally as Amie Gray, 34, from Poole, died at the scene on Durley Chine Beach in Bournemouth shortly before midnight on Friday. Another woman, aged 38, was seriously injured and remains in hospital. The 17-year-old from Lancashire has been eliminated from inquiries, Dorset Police said.

  A woman died at the scene and another was taken to hospital with serious injuries

  Ms Gray was a personal trainer and head coach at Dorset Futsal Club, a women's indoor football team. In a statement posted on Facebook, the club said: "The club has received some truly devastating news. "We cannot put this into words at this time and as a mark of respect to all those affected, we will not be posting anything new for the foreseeable future." On Sunday, police issued CCTV images of a man they want to speak to in a bid to prompt witnesses to come forward. An online portal, external has been set up so people can submit information.

  Dorset Police have renewed an appeal to trace a man seen in a CCTV image

  Det Supt Richard Dixey said: "We need the public's help to identify the suspect in the CCTV images. "If you were on Durley Chine beach during the night from Friday 24 May to Saturday 25 May 2024 and saw the man pictured or any suspicious activity, we need to hear from you." Police also appealed for suspicious sightings or video recordings from Durley Roundabout, West Cliff Gardens, Durley Gardens or West Cliff Drive, especially between 22:00 BST and midnight. On Saturday, police set up an extensive cordon on the beach, turning visitors away on what would normally be a busy Bank Holiday weekend.

