title: 'Rishi Sunak and Joe Biden latest: Leaders announce ''Atlantic Declaration''
  economic agreement - BBC News'
date: '2023-06-08'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-65827895
content: |-
  The "economic partnership" is not the same as a free trade deal, but is designed to strengthen ties.

  A proper free trade deal still not on the agenda

  Rishi Sunak and Joe Biden are keen to stress the economic special relationship. The announcements in the “Atlantic Declaration” indicate a closer relationship on technology, defence and green industries. The UK car industry wanted a “critical minerals agreement” to be signed with the US - opening up British car exports to be treated in the US like domestic-produced vehicles in terms of significant green subsidies. The declaration confirms that negotiations will now begin - though Japan signed an equivalent deal with the US three months ago, and the equivalent US-EU deal has already been drafted. The US and UK will now co-operate on critical supply chains, and economic resilience in the face of shocks. But what the friendly language of the declaration omits, though, is that the UK is not planning to follow the US on its path of massive tax subsidies for green investment. The White House believes this is creating hundreds of thousands of highly-paid manufacturing jobs, in left behind areas, helping with net zero ambitions and reducing economic reliance on China. Sunak is trying to keep in tune with this revolution in US economic policy without following it. The same Bidenomics policies also mean that what was thought of as one of the great prizes of Brexit - the ability to do a proper free trade deal with the US - is not on the US agenda.
