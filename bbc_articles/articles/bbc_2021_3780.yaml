title: 'As it happened: Concerns over accuracy of Covid testing in schools - BBC News'
date: '2021-03-06'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56304052
content: |-
  Mass testing using lateral flow devices is being carried out to get secondary schools in England back to class next week.

  What are the benefits and risks of mass testing in schools?

  To reduce the risk of spread of the virus, the government has introduced mass testing, with all secondary school pupils offered three tests on their return before being asked to carry them out twice a week at home. These will be rapid lateral flow tests that provide a quick result on the spot, unlike the ones that are carried out in official testing centres - known as PCR tests - that are sent off to labs. The rapid tests are less accurate - they may pick up only between half to three-quarters of positive cases, but given they are being used to spot cases before people develop symptoms or for those who do not develop symptoms, the government is adamant they have an important role. The problem is they can result in a false positive, telling people they are infected when they are not. Research suggests this happens one to three times for every 1,000 tests carried out. One safeguard would be to get anyone who tests positive to then take a PCR test to confirm it. This is being done for tests that are done in people's homes, but not for those carried out in school. Assuming most pupils take up the option of the tests, that could result in thousands of pupils and their close contacts being asked to isolate unnecessarily. That may be a price worth paying if it was spotting many more positives, but the testing done in schools in recent weeks, of pupils and staff who have been attending, shows the number testing positive is now at the lower estimate for the false positivity rate.
