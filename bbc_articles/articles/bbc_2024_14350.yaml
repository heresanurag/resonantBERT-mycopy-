  The key figures who took part in BBC election debate

  Who took part in the BBC election debate?

  Leading figures from the seven major political parties went head-to-head during the BBC's TV election debate on Friday. The following politicians took part:

  As a cabinet minister during the last parliament, she held the role of leader of the House of Commons and was responsible for managing the business of the House and the delivery of the government's legislative programme. After being elected as an MP in 2010, she has held a number of ministerial posts including defence secretary - the first woman to hold the post. Ms Mordaunt, 51, has run twice to be leader of the Conservatives following the resignations of prime ministers Boris Johnson and Liz Truss. The ex-Royal Navy reservist is widely known for her role during the Coronation as Lord President of the Council. She famously held ceremonial swords in a teal outfit, later admitting she had taken painkillers to help her carry them for more than an hour.

  She is Sir Keir Starmer's second-in-command as deputy leader and held the position of shadow levelling up secretary. Ms Rayner was brought up on a council estate in Stockport and left school at 16, pregnant and with no qualifications. When she was a care worker she was made union rep, later rising up the ranks in trade union Unison. The 44-year-old was elected an MP in 2015 and became deputy leader five years later, having developed a reputation for speaking her mind. Last month, she was told she will face no further action after an investigation into the sale of her former house in Stockport.

  She is the party's deputy leader and spokesperson for health and social care. After three unsuccessful attempts, she was elected an MP in 2019. Previously Ms Cooper, 42, had worked in Commonwealth affairs, including campaigning for LGBT rights abroad, and also worked for Hacked Off - a campaign working for a free and accountable press.

  Nigel Farage spoke on behalf of Reform UK following his appointment as party leader this week. His return to frontline politics comes after a spell as a GB News presenter. The former MEP and fervent Eurosceptic, who has unsuccessfully attempted to become an MP seven times, was a key player during the Brexit referendum in 2016. He resigned as UKIP leader in 2016 and later helped launch the Brexit Party. It rebranded in 2020 to become Reform UK and pivoted to campaign on broader issues. One of the most recognisable politicians, the 60-year-old finished third on ITV reality show I'm A Celebrity Get Me Out Of Here.

  SNP Westminster leader Stephen Flynn led the charge for his party. He took over from Ian Blackford as his party's main representative in the Commons in 2022. At the time of his appointment, then-Scottish first minister Nicola Sturgeon described him and his new deputy Mhairi Black as "formidable". Prior to his time in Westminster, he worked as an assistant to an MP before becoming councillor and then leader of the SNP group on Aberdeen City Council. He was elected as an MP in 2019. Earlier this year, the 35-year-old made headlines when he called for the departure of Commons Speaker Sir Lindsay Hoyle over his handling of a vote on Gaza.

  Carla Denyer is co-leader of the Green Party in England and Wales. She has held the role since 2021 after being elected alongside Adrian Ramsay. Ms Denyer started campaigning while in the sixth form and went on to become a city councillor in Bristol for nine years. An engineer by trade, the Durham University graduate also worked in the renewable energy industry. In 2018, she wrote Europe's first Climate Emergency declaration, pushing Bristol to become carbon neutral by 2030 - a measure later adopted by hundreds of councils and the UK Parliament. She describes herself as bisexual or pansexual and was recognised as one of Bristol’s most influential LGBTQ+ people by media website Bristol Live in 2021.

  Rhun ap Iorwerth leads Welsh party Plaid Cymru, which held three of 40 Welsh seats in the last Parliament. Prior to politics, he worked as a journalist for the BBC. Having been first elected to the Welsh Parliament or Senedd in 2013, he has held shadow minister roles. He was elected unopposed as leader of Plaid Cymru in 2023. In March, the 51-year-old announced an early conclusion to a co-operation agreement with Welsh Labour over donations to First Minister Vaughan Gething's leadership campaign.
