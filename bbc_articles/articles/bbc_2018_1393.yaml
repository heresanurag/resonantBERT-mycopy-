id: bbc_2018_1393
title: Policeman attacked in Ramsgate church graveyard - BBC News
date: '2018-02-03'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-42928265
content: |-
  A police helicopter joins the search for a group who reportedly left the officer unconscious.

  The officer was injured in the graveyard of St Lawrence Church

  A police officer is reported to have been knocked unconscious in a graveyard after he was attacked by a group of people.

  The officer was injured in the grounds of St Lawrence Church on Manston Road, Ramsgate, at about 21:50 GMT on Friday.

  He was treated at the scene for a head injury and taken to hospital but has since been discharged.

  A helicopter was used in the search for the suspects but no arrests have been made.

  In a tweet, Kent Police said: "A police officer was knocked unconscious in a graveyard.

  "He has been taken to hospital as a precaution and we are currently carrying out searches to find those responsible."

  Officers from the force's roads policing unit also tweeted: "Best wishes to our colleague and their team wishing them a speedy recovery. Wasn't nice to hear on the radio but was impressed at the professionalism of those who found the officer and dealt with the incident. #oneteam #RelentlessPursuit SL"

  A police spokesman appealed for anyone with information to contact officers.

