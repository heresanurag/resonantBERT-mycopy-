title: Neil Warnock's daughter interrupts Cardiff press conference - BBC News
date: '2018-05-07'
section: General
url: http://www.bbc.co.uk/news/uk-wales-44024978
content: |-
  Manager Neil Warnock was giving his post-match press conference after Cardiff won promotion to the Premier League.

  Cardiff City manager Neil Warnock's post-match press conference was interrupted by his daughter.

  He was speaking after the Bluebirds won promotion to the Premier League on Sunday.

  They clinched the second automatic promotion spot after drawing 0-0 at home to Reading.
