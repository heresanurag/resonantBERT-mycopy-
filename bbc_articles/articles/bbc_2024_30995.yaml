  After their wins in Liverpool, Jonas wasted little time in stoking her rivalry with Price when the pair shared an interview post-fight. Jonas said to her future opponent, "be careful what you wish for, be careful what you ask for", with Price firing back, "too young, too quick, too good". Despite being the older fighter, Jonas has now won her fifth world title in just six fights over three years and is in the form of her career. Price, who also holds the IBO and Ring Magazine world welterweight titles, admits the 'trash-talk' of pro boxing is a new aspect for her to deal with, but is certainly ready to bite back if she feels she is being belittled. "I don't really look too much into that, I'm too laid back for it," Price said. "As soon as she said 'you've got to be careful what you wish for', then I had to speak up and say I believe I'm in my prime, I'm at my best, I'm hungry, I'm driven, I'm a professional athlete. "I understand she's had a wonderful career, she's coming towards the back end of her career. She still wants to be in big fights and fair play to her, but I'm here. "[Promotor] Ben Shalom's going on about 'Lauren being the future', well I hold three belts now. It's not about me being the future, I believe I beat everyone at 147lbs and that's starting with our big fight next year."

  Like Price, Jonas has an Olympic past and was the first woman to represent Great Britain in the ring when she competed at the 2012 Olympic Games in London. She is relishing the chance to prove her mettle against Price as the pair headline at the Royal Albert Hall. "It's an honour to be headlining this incredible all-women's event at such an iconic venue. It shows how far women's boxing has come," Jonas said. "Throughout my career, I have broken down barriers and achieved what people said I couldn't - and there is still a lot more to come. "Lauren Price has a lot of hype around her but I believe this fight is going to be a step too far for her. I've been in big fights, I've fought world champions and Olympic medallists, but she's never faced anyone like me as a pro."
