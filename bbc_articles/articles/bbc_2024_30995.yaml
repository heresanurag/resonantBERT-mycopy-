title: Lauren Price v Natasha Jonas world unification fight agreed for March - BBC
  Sport
date: '2024-12-17'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/c0q08y0qv7lo
content: |-
  British rivals Lauren Price and Natasha Jonas will fight each other in a mouth-watering world title unification bout next March at the Royal Albert Hall in London.

  The winner between Lauren Price (L) and Natasha Jonas will be one belt from becoming the undisputed world welterweight champion

  Lauren Price and Natasha Jonas will fight each other in a mouth-watering world title unification bout on 7 March 2025 at the Royal Albert Hall in London. The British rivals both successfully retained their welterweight world titles with wins in Liverpool last weekend. Wales' Price, 30, defended her WBA title against Bexcy Mateus, dropping the Colombian three times before the referee stopped the contest in the third round. IBF champion Jonas, 40, added the WBC title, outclassing Ivana Habazin over 10 rounds to become a two-weight unified champion. The winner between Price and Jonas would then likely target WBO champion Mikaela Mayer in a fight to become the undisputed world welterweight champion. About 4,000 people were at the Exhibition Centre to watch Saturday's fight card, but a meeting between two of British boxing's brightest and best female fighters is sure to pack out the Royal Albert Hall which can host more than 5,000 fight fans.

