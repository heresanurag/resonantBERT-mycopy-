  Price has already stated a meeting in the ring with Jonas is overdue, saying she would have preferred to fight her now arch-rival last weekend rather than Mateus. "If it was down to me I would have loved to have been boxing for another belt, whether it was against Tasha [Jonas] or Ivana [Habazin]," said Price, who won Olympic gold in 2021 in the delayed Games in Tokyo before turning pro. "But that didn't happen this time round, so now I've got through that fight on Saturday the big fight is next year." Jonas has won 16 and lost two of 19 career fights - including nine wins by knockout - while Price has won all eight contests, with two KOs, since the former Wales football international turned professional. "As soon as I won the world titles in Cardiff I wanted more belts. I want to be in the biggest fights and it makes sense, we're [Price and Jonas] both with Sky, we're both with Boxxer, it's an easy fight to make. "My dream was to go to the Olympics, I won the Olympic gold medal, and now I've got more dreams, I've got more goals. I want to go on and create greatness, create a legacy. I want to bring big nights back to Cardiff. I want to win more titles. "She [Jonas] has two belts, that's the main aim. I have nothing against Tash, I respect her, but at the end of the day I'm a world champion, she's a world champion and if you're a world champion then you should fight anyone. "I think it's a great fight, it's a fight that I believe that I win, I believe I'm in my prime, I believe I'm too quick and too skilful, I'm just better overall, and I believe I come out on top."

