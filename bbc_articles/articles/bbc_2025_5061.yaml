title: 'Ian McKellen and Patrick Stewart: X-Men stars join Avengers Doomsday cast
  - BBC News'
date: '2025-03-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx208gdj2e0o
content: |-
  The film is set for release in May 2026, with Robert Downey Jr already announced as playing Doctor Doom.

  X-Men stars Sir Ian McKellen and Sir Patrick Stewart are reprising their roles by joining the cast of Marvel's forthcoming Avengers: Doomsday. The film is set for release in May 2026, with Robert Downey Jr already announced as playing villain Doctor Doom. Sir Ian has not appeared as Magneto since 2014's X-Men: Days of Future Past. Sir Patrick, meanwhile, last reprised his Professor Charles Xavier role in Doctor Strange in the Multiverse of Madness in 2022. Marvel Studios apparently listed the new movie's cast by posting a video, external showing a row of chairs with names on the back.

  As well as Sir Ian and Sir Patrick, other names included Chris Hemsworth, Tom Hiddleston and Anthony Mackie. They were joined by Florence Pugh, who plays Yelena Belova, and Simu Liu, who plays Shang-Chi. There were also chairs for Sebastian Stan, Letitia Wright, Paul Rudd, Wyatt Russell, Tenoch Huerta Mejia, David Harbour and Kelsey Grammer. Members of this year's upcoming Fantastic Four reboot, including The Last of Us actor Pedro Pascal and The Bear's Ebon Moss-Bachrach, joined them. Channing Tatum, who appeared as X-Men character Gambit in Deadpool & Wolverine, is also named. Last summer, Downey Jr was revealed to be returning to the Marvel Cinematic Universe after five years - but not to the Iron Man role that launched the blockbuster franchise. At Comic Con in San Diego, Downey Jr appeared on stage concealed behind Doctor Doom's iconic mask and green cloak before unveiling himself to fans. Speaking to reporters, he said: "I like playing complicated characters." The 59-year-old was instrumental in launching the Marvel movie universe, starring in its first film Iron Man in 2008. He last appeared in a Marvel film in 2019's Avengers: Endgame. The US actor won an Oscar for his role in Oppenheimer last year.
