title: 'Cristiano Ronaldo: Manchester Utd explore legal action to force player''s
  exit - BBC Sport'
date: '2022-11-18'
section: General
url: http://www.bbc.co.uk/sport/football/63676465
content: "Last updated on .From the section Man Utd\n\nManchester United are exploring\
  \ their legal options as they look to end Cristiano Ronaldo's time at the club.\n\
  \nIt is accepted at United that Ronaldo cannot play for manager Erik ten Hag again\
  \ following his fierce criticism of the Dutchman in his TalkTV interview.\n\nHe\
  \ has just over seven months remaining on his £500,000-a-week contract.\n\nUnited\
  \ could terminate the Portuguese forward's contract, which would leave him free\
  \ to sign for another club when the transfer window opens in January.\n\nIt is understood\
  \ they are loath to offer the 37-year-old any kind of pay-off given how strongly\
  \ they feel about the situation.\n\nThe club want the matter dealt with quickly\
  \ to avoid it spilling over into the second half of the season.\n\nIn his interview,\
  \ Ronaldo said he felt \"betrayed by the club\" and stated he had \"no respect\"\
  \ for Ten Hag, adding he felt he was being forced out of the club.\n\nUnited responded\
  \ on Friday with a statement to say they have \"initiated appropriate steps\" in\
  \ response.\n\nRonaldo will captain Portugal at the World Cup in Qatar, with their\
  \ opening Group H game against Ghana on Thursday.\n\nHe has not played because of\
  \ an unspecified illness since he captained United in their 3-1 defeat at Aston\
  \ Villa on 6 November\n\nRonaldo was dropped for the Premier League game at Chelsea\
  \ last month by Ten Hag after refusing to come on as a substitute against Tottenham\
  \ three days earlier.\n\nThe Red Devils, who beat Fulham 2-1 on Sunday, are fifth\
  \ in the Premier League in Ten Hag's first season as manager.\n• None All the latest\
  \ Manchester United news, analysis and fan views in one place\n• None You can now\
  \ get Man Utd news notifications in the BBC Sport app - find out more\n• None Podcast:\
  \ The Devils' Advocate - listen to the latest episode on BBC Sounds\n\nManchester\
  \ United wanted to see the full extent of Cristiano Ronaldo's interview. Now they\
  \ have acted.\n\nThe club are refusing to say what precisely 'appropriate steps'\
  \ are but cancelling Ronaldo's contract and/or taking legal action are likely to\
  \ be high on the list.\n\nUnited remain solidly behind manager Erik ten Hag, who\
  \ bore the brunt of a number of Ronaldo's criticisms. One Ronaldo claim was that\
  \ Ten Hag only wanted to bring him on in the final minutes of last month's win over\
  \ Tottenham to prove a point, Ronaldo adding that he has no respect for the Dutchman.\n\
  \nThe club have also expressed pride in the club and its staff, who were derided\
  \ by Ronaldo as part of his view of United being stuck in a time warp.\n\nIt is\
  \ inconceivable Ronaldo can play for United again under Ten Hag, so the only way\
  \ now is an exit.\n\nThis may not be straightforward. Ronaldo is the Premier League's\
  \ highest-paid player and his contract will contain numerous clauses.\n\nHowever,\
  \ the club have vowed to act as quickly as they can. They won't want this hanging\
  \ over them for any longer than is necessary.\n\nIt has been quite the week at Manchester\
  \ United and for Cristiano Ronaldo.\n\nSince details of his much-publicised interview\
  \ with Morgan emerged, it has felt like one drama after another as additional parts\
  \ of their chat became public as the week went on.\n\nHere's a quick guide to what\
  \ has been said and by who:\n• None by United, that the club had shown no \"evolution\"\
  \ and that he was being forced out.\n• None A\uFEFFs more of his interview is released\
  \ he says United's owners \"don't care about the club\".\n• None The club acknowledges\
  \ his interview and says it will \"consider its response after the full facts have\
  \ been established\".\n• None \"affects\" all of the players.\n• None Ronaldo explains\
  \ he was \"close\" to joining Manchester City but his \"heart\" took him back to\
  \ United.\n• None \"very happy with the way things have played out\" when reflecting\
  \ on their interview.\n• None United legend Peter Schmeichel says he still believes\
  \ in \"fairytales\" and hopes Ronaldo can have a future at the club.\n• None Former\
  \ Manchester United defender Gary Neville says the club must terminate Ronaldo's\
  \ contract.\n• None He said he turned it down as he was \"happy\" at Old Trafford\
  \ and \"motivated to do a great season\".\n• None Our coverage of Manchester United\
  \ is bigger and better than ever before - here's everything you need to know to\
  \ make sure you never miss a moment\n• None Everything United - go straight to all\
  \ the best content"
