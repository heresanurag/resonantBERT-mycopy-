title: 'Tory leadership race: Alan Duncan resigns as minister - BBC News'
date: '2019-07-23'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-49069880
content: |-
  Sir Alan Duncan presses for Commons vote on whether MPs support Boris Johnson forming a government.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sir Alan Duncan has quit as a Foreign Office minister in protest against a possible Boris Johnson victory in the Conservative leadership race.

  In his resignation letter, Sir Alan described Brexit as "a dark cloud".

  He told the BBC he quit to demand an emergency Commons debate to give MPs a chance to say whether they supported Mr Johnson's "wish to form a government".

  The request for a debate - which would not constitute a binding no-confidence vote - was rejected by the Speaker.

  Mr Johnson is the frontrunner in the contest which has seen him go head-to-head with Jeremy Hunt for Tory Party members' votes.

  The ballot closes at 17:00 BST - the winner will be revealed on Tuesday morning and will become prime minister on Wednesday.

  Sir Alan told the BBC's Laura Kuenssberg he did not have any personal animosity towards Mr Johnson and "wanted him to succeed".

  But he said he was worried by the ex-foreign secretary's "fly by the seats of his pants, haphazard" style and feared Mr Johnson was going to go "smack into a crisis of government".

  Mr Johnson's ability to command the support of a majority of MPs was "untested and in doubt", his former colleague said.

  By establishing this one way or another on Tuesday - after the leadership contest result was announced but before the winner took office - Sir Alan said it would prevent "complete constitutional mayhem" at a later date.

  "If he (Mr Johnson) has got the numbers to govern, then he can and should govern. But if he has not, in our constitution he cannot."

  Sir Alan said he was "bewildered" by the Speaker's decision to refuse his request.

