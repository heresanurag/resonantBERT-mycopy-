  The website features a list of conditions and a schedule for the three-month long application process.

  Written in a dating profile-style, the conditions say applicants must be single, over the age of 20, always positive and have an interest in going to space.

  The deadline for applications is 17 January and a final decision on Mr Maezawa's partner will be made at the end of March.

  Mr Maezawa said he would invite up to eight artists to join him in space

  An eccentric who garnered fame as a drummer in a hardcore punk band, Mr Maezawa has form for attention-grabbing stunts.

  Earlier this month, Mr Maezawa promised to share 100m yen ($925,000; £725,000) between 100 randomly selected people who shared one of his tweets.

  "To participate, all you have to do is follow me and RT this tweet," he said.

  Founder of Japanese online clothing retailer Zozo Inc, Mr Maezawa made his fortune in the fashion world. He is believed to have a personal wealth of close to $3bn, a lot of which he spends on art.

  Artwork: The BFR spaceship will be able to carry humans on a trip around the Moon

  He became more widely known abroad late last year after he was named as the first private passenger due to be flown around the Moon by SpaceX, the company owned by another famous billionaire, Elon Musk.

  The price Mr Maezawa agreed to pay for his ticket to space has not been disclosed, but according to Mr Musk it was "a lot of money".

  Mr Maezawa has said he plans to take a group of artists with him on the flight.
