title: 'Nigel Farage: Objects thrown at Reform leader while campaigning - BBC News'
date: '2024-06-11'
section: Politics
url: http://www.bbc.co.uk/news/articles/cmjj1n030djo
content: |-
  The Reform UK leader says he will not be cowed by the incident, which was caught on film.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nigel Farage appears to have had objects thrown at him while on the campaign trail in South Yorkshire. The Reform UK leader posted a video on X, formerly Twitter, which appeared to show objects being thrown at him while he was on top of a bus in Barnsley on Tuesday. It is not clear what exactly the objects are. One of them appears to be a takeaway cup. Another video of the incident, from a different angle, appears to show two objects missing Mr Farage, with one hitting the side of the bus. South Yorkshire Police says it has arrested a 28-year-old man on suspicion of public order offences.

  Nigel Farage was campaigning in South Yorkshire when the alleged incident happened

  "It is believed that the man threw objects from a nearby construction area," police said in a statement. "I will not be bullied or cowed by a violent left-wing mob who hate our country," Mr Farage wrote about the incident on X. "These people want to stop my election campaign. That’s never going to happen," he added. The video posted on his X account showed a man in a red jacket throwing objects from a building site before being stopped by what appears to be construction workers. He was later detained by police, who said the man remains in custody.

  Police officers escort a person after objects were thrown at Reform UK leader Nigel Farage on the Reform UK campaign bus

  The incident happened as a crowd of Stand Up to Racism protestors interrupted Mr Farage as he spoke from the vehicle. Reform UK supporters and Stand Up to Racism protesters both chanted against each other as crowds formed around the bus in the town centre. Mr Farage had been warned by police not to get off the bus. He had been touring Barnsley and had just left Hoyland, where he had had a warmer welcome. He called in at a beauticians and posed with staff while joking about having his nails painted. Mr Farage also spoke with shoppers and while standing by a market stall selling eggs, joked that after being covered in a milkshake last week he did not want eggs to be the next thing thrown at him. Last week, Mr Farage had a banana milkshake thrown at him while campaigning in Clacton. A woman was later charged with assault. During a campaign walkabout in Newcastle in 2019, he also had banana and salted caramel milkshake thrown at him.
