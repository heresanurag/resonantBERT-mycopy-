content: |-
  The spy cell undertook elaborate surveillance on people and places targeted by Russia.

  Bulgarians guilty of spying for Russia in the UK

  Vanya Gaberova, Katrin Ivanova and Tihomir Ivanchev were found guilty of conspiracy to spy

  Three Bulgarian nationals have been found guilty of spying for Russia, in what police have described as "one of the largest" foreign intelligence operations in the UK. Vanya Gaberova, 30, Katrin Ivanova, 33, and Tihomir Ivanchev, 39, who were all living in London, were part of a group who travelled Europe carrying out surveillance on journalists, a former politician and a US military base in Germany between 2020 and 2023. While the trio had day jobs as a beautician, a healthcare worker, and a decorator, the cell they were part of plotted to kidnap and kill targets, as well as planned to ensnare them in so-called honeytraps. The methods they used were the sort of thing you would "expect to see in a spy novel", said the Metropolitan Police's Cdr Dominic Murphy.

  Gaberova, of Euston, north London, Ivanova, of Harrow, north London, and Ivanchev, of Acton, west London, were convicted of conspiracy to spy, while Ivanova was also convicted of possessing multiple false identity documents. They were working for fellow Bulgarian Orlin Roussev, 47, who ran the spy ring from a 33-room former guest house in Great Yarmouth, Norfolk. Here police found a "treasure trove" of spying gadgets and equipment, including cameras hidden in ties, a camera hidden in a fake rock, and glasses containing recording equipment. They also found a number of Minions cuddly toys, including one which contained a spy camera. Roussev had referred to those working for him as his "minions", like the yellow sidekicks of dastardly villain Gru in the Despicable Me children's film franchise. Roussev previously admitted conspiracy to spy, alongside Biser Dzhambazov, 43, of Harrow, while a sixth defendant, Ivan Stoyanov, 34, of Greenford, west London, admitted spying before the trial. The cell's key targets were investigative journalists Christo Grozev and Roman Dobrokhotov, whose work includes exposing Russia's role in the nerve agent attacks on Russian opposition leader Alexei Navalny in 2020 and Sergei Skripal in Salisbury in 2018. As part of the surveillance, Gaberova was instructed to befriend Mr Grozev, with Roussev describing him as "hooked and in love" with her in WhatsApp messages. Another operation included carrying out surveillance to identify Ukrainian soldiers at a military site where they were being trained, around the time of Russia's invasion of the country in 2022.

  During the trial, prosecutor Alison Morgan KC said the spy cell was "sophisticated in their methodology; carrying out surveillance activity of individuals and places; manufacturing and using false identities and deploying advanced technology to acquire information". The police investigation received 221 mobile phones, 495 sim cards, 11 drones, and devices allowing data to be extracted from phones and eavesdropping on wi-fi activity. Met counter-terrorism chief Cdr Murphy said the case was an "extremely sophisticated" operation that "posed a threat to national security and individuals". Roussev received instructions from Jan Marsalek, who is wanted in Germany for his alleged fraud linked to the financial services company Wirecard. The Austrian national was described by prosecutors as an "intermediary for the Russian intelligence services". Roussev and Marsalek met a decade ago, with Roussev subsequently recruited as a spy. He then recruited other Bulgarians to undertake espionage operations.

