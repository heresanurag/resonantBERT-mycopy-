  Roussev was at one stage the chief technology officer for a city of London financial firm. Stoyanov worked as a medical courier, but also fought in mixed martial arts fights using the nickname "The Destroyer". Dzhambazov and Ivanova lived together as a couple and worked in healthcare jobs, but also ran a Bulgarian community organisation that provided courses on "British values". But Dzhambazov was also in a relationship with Gaberova – they were found in bed together when police made arrests – and Ivanchev had separately been in a relationship with her in the past. During their trial, Ivanova and Gaberova admitted undertaking surveillance operations but denied knowing it was for the benefit of Russia. Ivanchev did not give evidence during the trial but outlined a similar position during police interviews after being arrested. He was arrested a year after the other five defendants and told police he had several conversations with MI5.

  The prosecution case focused on six operations carried out by the spies: Marsalek and Roussev exchanged messages discussing their options in relation to Mr Grozev, including the placing of team members in seats next to him on planes. He was followed throughout Europe and properties connected to him were watched in Austria and Bulgaria. The spy cell also discussed potentially robbing him of his laptop and phone and taking it to the Russian Embassy, burning his property, kidnapping him and taking him to Moscow, or killing him. The cell followed him in various countries, and discussed kidnapping him in the UK and smuggling him out of the country using a small boat. At one stage, Ivanova was so close to him on a plane that she could see the Pin code for his phone. This targeted a man called Bergey Ryskaliyev in November 2021, the court heard. Mr Ryskaliyev is a Kazakhstan national and former politician. He fled to the United Kingdom where he was later granted asylum. There is and was a clear motive for Russia to develop relations with Kazakhstan, the court heard. Prosecutors said that targeting a political dissident on behalf of Kazakhstan cultivates those relations by providing Kazakhstan with what it might consider to be assistance. This involved plans for disruptive activity at the Kazakh embassy in London in September 2022. The court heard that the plan was to stage a demonstration outside the embassy - a "fake protest" - to create a pretence that they were in possession of genuine intelligence about those responsible, which they would then pass on to the Kazakhstan intelligence to try to gain favour with Kazakhstan on behalf of Russia. This involved surveillance at the Patch Barracks, a US Military Base in Stuttgart in late 2022. This is a US military airbase, which jurors heard was believed by the defendants to be a location where Ukrainian forces were being trained in the use of surface to air weapons, at the very time of Russia's invasion into Ukraine. Prosecutors say the defendants' plan was to target the airbase using a range of highly sophisticated technology designed to capture key intelligence about those present on the base. Jurors were told this plan was targeting a man called Kirill Kachur. He is a Russian national who spent time in Montenegro who was employed by the Investigative Committee of Russia but left the country in 2021 and was designated as a "foreign agent" by Russia in November 2023.
