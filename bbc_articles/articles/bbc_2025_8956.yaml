title: Gaza parents desperate as children face starvation under Israeli blockade -
  BBC News
date: '2025-05-14'
section: General
url: http://www.bbc.co.uk/news/videos/cwyn9291yv0o
content: |-
  The BBC's Fergal Keane reports on the rise of malnutrition in Gaza's children.

  The UN has called for urgent international action to get aid into Gaza, amid fresh warnings that nearly half a million people there - one in five of the population - now face catastrophic hunger.

  Parents are fearful about finding food and medication for their children as the Israeli aid blockade enters its third month. The BBC's special correspondent Fergal Keane reports.

  Warning: Contains distressing scenes from the start.
