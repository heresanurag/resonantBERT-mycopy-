  Kashmir is claimed in full by both India and Pakistan, but administered only in part by each since they were partitioned following independence from the UK in 1947. It has been a flashpoint between the two nuclear-armed nations and they have fought two wars over it. Confirming the ceasefire, India's external affairs minister S Jaishankar said the two nations had "worked out an understanding on stoppage of firing and military action". "India has consistently maintained a firm and uncompromising stance against terrorism in all its forms and manifestations. It will continue to do so," he added. Later, in an address to the nation, Pakistan Prime Minister Shehbaz Sharif said the ceasefire had been reached "for the benefit of everybody". US Secretary of State Marco Rubio said following the announcement that India and Pakistan had agreed to start talks on a broad set of issues at a neutral site. He said he and US Vice-President JD Vance had spent 48 hours with senior Indian and Pakistani officials, including their respective Prime Ministers Narendra Modi and Shehbaz Sharif. In a further Truth Social post on Sunday, Trump repeated praise for India and Pakistan's leaders for understanding it was "time to stop the current aggression". "I am proud that the USA was able to help you arrive at this historic and heroic decision," he added. UN Secretary General Antonio Guterres said he welcomed "all efforts to de-escalate the conflict". UK Prime Minister Sir Keir Starmer said the UK has been "engaged" in talks for "some days", with Foreign Secretary David Lammy speaking to both sides. "I'm pleased to see today that there's a ceasefire," Sir Keir said. "The task now is to make sure that that is enduring and is lasting." The recent fighting came after two weeks of tension following the killing of 26 tourists in the resort town of Pahalgam. Survivors of the 22 April attack in Indian-administered Kashmir, which killed 25 Indians and one Nepali national, said the militants had singled out Hindu men. The Indian defence ministry said its strikes this week were part of a "commitment" to hold "accountable" those responsible for the attack. Pakistan described them as "unprovoked". Pakistan said Indian air strikes and cross-border fire since Wednesday had killed 36 people in Pakistan and Pakistan-administered Kashmir, while India's army reported at least 21 civilians deaths from Pakistani shelling. Fighting intensified overnight on Friday, with both countries accusing each other of targeting airbases and other military sites.
