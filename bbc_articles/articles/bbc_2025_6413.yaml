  Jackson Page becomes the first player to score a maximum 147 break twice in one match as he bids to reach the World Snooker Championship.

  Page makes history with two 147s in one match

  Jackson Page has become the first player to make a maximum 147 break twice in one match. Page's achievement also secured him the £147,000 Triple Crown bonus. The 23-year-old Welshman had made his first 147 on Sunday, during the eighth frame of his third-round World Snooker Championship qualifying match against England's Allan Taylor. Resuming the match on Monday, leading 8-1 and needing only two frames to complete victory, Page racked up another maximum to clinch a 10-2 win. "I'm over the moon," Page told BBC 5 Live Drive. "It's a bizarre sort of feeling really." "I knew the bonus was up for grabs [for the second 147], so I went for it from the first ball and managed to make it happen. "I felt the same way as I did winning matches and in the deep end of tournaments, the same sort of pressure. As soon as the 15th black went in and I was on the yellow, I knew it was going to happen."

  The world number 35, who turned professional in 2019, had never previously made a single maximum break in his career. Monday's win has earned him a place in the final round of qualifiers. Page reached the tournament proper for the first time in 2022 and caused an upset by beating former finallist Barry Hawkins 10-7 in round one. He also qualified for the final tournament last year, but was well beaten 10-1 in the opening round by Ronnie O'Sullivan. Page told 5 Live that the money would help as he has a three-month-old son and has recently bought a house. But he said there would not be too much celebration, with a steak dinner on Monday night before practice on Tuesday. Page will meet England's world number 30 Joe O'Connor in the final qualifying round for a place in round one at the Crucible Theatre in Sheffield. While Page progressed, there were upsets elsewhere in qualifying as 2015 winner Stuart Bingham and former UK champion Stephen Maguire both lost.
