content: |-
  Hundreds gather at Coniston Water to remember "hero" and record-breaker Donald Campbell 50 years after his death.

  Hundreds have gathered at Coniston Water to remember "hero" and record-breaker Donald Campbell 50 years after his death.

  Campbell died at 08:51 GMT on 4 January 1967 while trying to break his own water speed record in Bluebird.

  His daughter Gina said she was "humbled" his achievements were still recognised half a century on from his death.

  She and former friends and colleagues took to the water as part of several days of events to mark the anniversary.
