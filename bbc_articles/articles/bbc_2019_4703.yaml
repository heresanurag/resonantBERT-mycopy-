  His members held meetings outside the jail on Monday to discuss their concerns and had talks with the Governor.

  As an alternative to segregation, a new section in Feltham A, known as the Falcon Unit, began operating in March to give the most challenging boys extra support.

  The Prison Service said it would contain "calm down" rooms by the end of the month.

  Last month, the Independent Monitoring Board, which carries out regular visits to Feltham, warned the government that it needed to take "urgent measures" to make Feltham safer after a rise in gang-related violence.

  In its annual report it said: "It is clear from talking to prisoners and staff that many prisoner-on-prisoner assaults and multi-prisoner fights are 'organised' and happen as a result of gang activity on the outside."

