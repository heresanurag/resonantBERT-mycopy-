title: French taxi driver charged with theft after David Lammy dispute - BBC News
date: '2025-05-14'
section: Politics
url: http://www.bbc.co.uk/news/articles/cz9ygl5g5n9o
content: |-
  French police charge a taxi driver with stealing luggage and cash from UK foreign secretary and his wife.

  David Lammy and Nicola Green had been part of a state visit to Rome

  French police have charged a taxi driver with stealing luggage and cash from UK Foreign Secretary David Lammy and his wife Nicola Green. The driver allegedly sped off with the couple's luggage after a row over a fare for the 360-mile journey from Forli, in Italy, to the French ski resort of Flaine, in Haute-Savoie. The driver insisted he was owed 700 euros (£590) in cash for part of the journey not covered by an upfront payment to a booking service. But the Foreign Office said in a statement the fare had been paid in full before they set off on their private holiday.

  The couple had decided to take a private holiday in France after spending three days on a state visit to Italy with King Charles and Queen Camilla. Sources say they arranged their own transport, at their own expense, through booking company getTransfer.com. The taxi driver had a row with Ms Green before driving off with their luggage to a police station, where he made a complaint. According to French newspaper la Provence, external, an investigation into a "commercial dispute" was opened by the Bonneville prosecutor's office in Haute-Savoie. A member of the foreign secretary's office contacted the driver to get the luggage back, and it was allegedly deposited at a police station with a "considerable" sum of money missing from Ms Green's bag, thought to be equivalent to the amount the driver believed was owed to him. Bonneville prosecutor Boris Duffau told the BBC the taxi driver has been charged with theft. "An investigation has been opened following a disagreement regarding the payment of a taxi ride between Italy and France," said Mr Duffau. "After an investigation by French police, the Bonneville prosecutor's office has decided to prosecute the taxi driver who has been summoned to appear at the Bonneville court on 3 November 2025. "He has been charged with theft (of luggage and cash) to the detriment of Nicola Green and David Lindon Lammy." Mr Duffau later told the AFP news agency the driver had been "placed under judicial supervision with a driving ban and a 2,000 euro (£1,690) bail". From a "commercial dispute born of a misunderstanding, the tone certainly rose and, after investigation, the prosecutor's office deemed it appropriate to state that the taxi driver's version was not proven", unlike that of the minister, added Mr Duffau. The driver told the BBC Lammy should have paid more than a standard fare because he is a British government minister, making the journey more "risky". The Foreign, Commonwealth and Development Office (FCDO) told the BBC there were no sensitive documents or laptops in the car and the foreign secretary had been travelling on his own personal passport, rather than a diplomatic one. The FCDO strongly disputes the taxi driver's version of events. A spokesperson said: "The fare was paid in full. "The foreign secretary and his wife are named as victims in this matter and the driver has been charged with theft. "As there is an ongoing legal process, it would be inappropriate to comment further."
