content: |-
  The 2019 interview, widely viewed as a "car-crash", saw the prince talk candidly to Maitlis about his friendship with convicted sex offender Jeffrey Epstein.

  An infamous BBC Newsnight interview with Prince Andrew - that was widely viewed as a "car-crash" - shows "the power of journalism, but also... its limitations", according to journalist Emily Maitlis.

  The 2019 interview saw the prince speak candidly with Maitlis about his friendship with convicted sex offender Jeffrey Epstein.

  The former Newsnight journalist spoke to the BBC about her experience with Prince Andrew, ahead of the release of a three-part drama, A Very Royal Scandal.
