title: Two new areas searched in Brantham dog walker murder probe - BBC News
date: '2024-08-05'
section: England
url: http://www.bbc.co.uk/news/articles/cyr772kv30do
content: |-
  Extra cordons are put up in a village where Anita Rose was found unconscious with head injuries.

  Two new areas searched in dog walker murder probe

  Police have remained in the village of Brantham conducting inquiries into Anita Rose's killing

  Detectives investigating the murder of a dog walker said they had identified two further "locations of interest" in the village where she was found unconscious. Anita Rose, 57, was discovered with head injuries on a track near Rectory Lane, Brantham, Suffolk at about 06:25 BST on 24 July, and died in hospital four days later. Suffolk Police said two cordons had been put in place in the Newmill Lane area while further inquiries were carried out. A man in his 20s, arrested on suspicion of murder, was released on bail on Saturday and told not to enter Brantham or Manningtree.

  Two additional cordons have been put up in "locations of interest", detectives said

  Officers believe Ms Rose left her house at 05:00 BST to take her springer spaniel, Bruce, on their usual walk in the area. A member of the public then found her at 06:25 on a track road close to a railway line with her dog still by her side. She was unconscious and found to have serious head and face injuries before the police arrived shortly after 08:00 and a cordon was set up.

  Anita Rose died in Addenbrooke's Hospital after suffering serious head injuries

  A Home Office port-mortem examination was carried out on 29 July but was unable to establish a cause of death. Police said further tests would be carried out. Investigators are working to find a missing pink zip-up jacket Ms Rose was wearing prior to the incident. Det Supt Mike Brown said previously it "could hold key information or evidence"

  Officers are still working to locate Ms Rose's pink zip up jacket

