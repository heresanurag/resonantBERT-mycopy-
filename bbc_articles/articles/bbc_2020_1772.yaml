  • None Klopp has failed to win all seven of his away games against Spanish clubs in the Champions League (D3 L4), including three with Liverpool (D1 L2).
  • None Atletico have won 12 of their last 13 home matches in all major European competitions (D1), also keeping 11 clean sheets in this run.
  • None Two of Liverpool's three defeats in all competitions this season have come in the Champions League, also losing 2-0 at Napoli in September 2019 (the third defeat being their 5-0 loss to Aston Villa in the EFL Cup in December 2019).
  • None Saul's opener for Atletico (03:46) was the earliest Liverpool have conceded in the Champions League since Gabriel Jesus scored past them in the second minute for Manchester City in April 2018; nine of Saul's 10 Champions League goals have come in the first half.
  • None Saul became only the second player to score 10 Champions League goals for Atletico, after Antoine Griezmann (21).
  • None Since the start of the 2013-14 season, Atletico's Jan Oblak has kept 26 clean sheets in 49 Champions League games; no other goalkeeper has more in the competition in this time (level with Marc-Andre ter Stegen, 26 in 57 games).
