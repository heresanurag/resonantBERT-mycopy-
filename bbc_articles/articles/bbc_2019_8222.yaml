  The Max Planck Institute for Molecular Cell Biology and Genetics said in a statement: "It is with enormous sadness and regret that we announce the tragic demise of our dearest friend and colleague, Suzanne Eaton... We are deeply shocked and disturbed by this tragic event."

  Suzanne Eaton was married with two sons.
