content: |-
  The North Korean leader is a man with many names. Which one will the US president choose?

  From chairman to supreme leader, Kim Jong-un is known by many names and official titles. So how should US President Donald Trump address the North Korean leader when they finally meet?

  Presented by Su-Min Hwang of BBC Korean. Produced by Tessa Wong.
