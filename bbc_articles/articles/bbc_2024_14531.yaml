title: 'Donegal: Pedestrian dies after being hit by car - BBC News'
date: '2024-06-09'
section: Europe
url: http://www.bbc.co.uk/news/articles/ckrrm87px3go
content: |-
  The collision happened on Main Street in Ballynall on Sunday shortly after 01:30 BST.

  A pedestrian has died after he was hit by a car in Moville, County Donegal.

  The collision happened on Main Street in Ballynally on Sunday shortly after 01:30 BST.

  Gardaí (Irish police) and emergency services found the pedestrian, a man in his 20s, dead at the scene.

  The driver of the car was brought to hospital for an assessment.

  Diversions are in place while Garda forensic investigators examine the area.

  Gardaí have appealed for anyone who may have witnessed the collision to contact them.
