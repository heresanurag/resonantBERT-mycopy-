content: |-
  The Pitch Perfect actress is shooting a Christmas comedy film in Knaresborough.

  Rebel Wilson said she was 'loving' shooting a Christmas film in Yorkshire.

  The Pitch Perfect actress is starring in a new Sky Original project with a cast that also features Hollywood actor Kiefer Sutherland and Danny Dyer.

  Tinsel Town, which will be released at Christmas 2025, is being filmed in Knaresborough.

  Wilson told reporters at the scene that she has been practising her Yorkshire accent.

