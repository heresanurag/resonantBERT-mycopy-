title: Ros Atkins on...why protests are happening in Iran - BBC News
date: '2022-10-03'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-63125721
content: |-
  Demonstrations are happening following the death of a woman detained by 'morality police'.

  The Supreme Leader of Iran has blamed the United States and Israel for orchestrating protests in Tehran and other cities following the death of a young woman who was detained by the nation's 'morality police'.

  In his first comments Ayatollah Ali Khamenei claimed he had been been heartbroken by Mahsa Amini's death. Social media is playing a key role in the protests, as our analysis editor Ros Atkins reports.
