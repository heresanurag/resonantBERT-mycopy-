title: Ros Atkins on... The creeping TikTok bans - BBC News
date: '2023-03-03'
section: General
url: http://www.bbc.co.uk/news/technology-64831583
content: |-
  The app is banned from employee phones by various governments amid security concerns.

  China has accused the US of exaggerating national security fears about TikTok to suppress the Chinese company.

  US government agencies have been ordered to wipe the Chinese app from all staff devices within 30 days.

  There have also been similar steps taken in Canada and the EU.

  Ros Atkins looks at how we got here.
