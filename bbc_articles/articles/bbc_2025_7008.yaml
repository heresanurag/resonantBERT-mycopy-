  Aberdeen's Scottish Cup semi-final hero Oday Dabbagh has journeyed from the West Bank to the north east, writes Tom English.

  The Hampden goal by a Palestinian that will be cheered in homeland

  This video can not be played To play this video you need to enable JavaScript in your browser.

  For much of the 120 minutes at Hampden, there was precious little hint of the beautiful story to come, the heart-warming endgame to a Scottish Cup semi-final that wasn't always easy on the eye. From a grind to a thing of glory for Aberdeen and their match-winner, Oday Dabbagh, a Palestinian, born in the Old City of Jerusalem. We waited and waited for a story and, boy, did we get one. Dabbagh came on to the pitch in the 81st minute when Aberdeen were mid-toil. Very little wit, very little imagination, very few signs that they had it in them to take advantage of their numerical superiority. Hearts had been down to 10 men since just short of half-time. It took a dreary Aberdeen another 58 minutes to get their first shot on target. Moments later, they had a second.

  Dabbagh, and fellow substitute Dante Polvara, were beginning to make a difference. The Palestinian forced a terrific save from Craig Gordon and slowly Aberdeen started to turn the screw. Alexander Jensen had a chance, Jeppe Okkels had one of his own. Penalties loomed, but so did Dabbagh. When he tucked away the goal that sent Aberdeen to the final - just two minutes short of penalties - he wheeled away to be with his supporters. On full-time, his team-mates went to him, one by one. Later, amid the bedlam, he spoke about it all. "It's a really incredible feeling, I can't explain," he said. "I'm happy to score the winning goal, I'm happy to be in the final. Thank you to the fans. "I want to thank the staff and my team-mates for believing in me. They said I would finally get the goal and I did."

  This was Dabbagh's 10th game for Aberdeen since he joined on loan from Charleroi at the turn of the year. A 90th-minute winner against Kilmarnock, a double against Queen's Park in the cup, and now this, a different stratosphere to the others. It's a goal that will mean more to him and football people in his homeland than we'll possibly ever know. His story is quite something. As a kid on the cobbles of Jerusalem, he idolised Robin van Persie. At the age of 16 he was playing for, and excelling with, Hilal al-Quds in the West Bank Premier League. He won league titles there. In 2018-19 he was the competition's top scorer. At 19, he played for his national team. A teenager, yes, but one who had already seen a lot - too much. Matches delayed while teams were held at checkpoints. Tear-gassing of stadiums. Players who lost homes in bombings. Dabbagh's reputation grew and he moved to Kuwait, broke a collarbone, got Covid and still won trophies and a golden boot. When winning a league title, he dedicated it to home. In August 2021, at the age of 22, Dabbagh was signed by Arouca in the Portuguese top flight. He made his debut off the bench against Porto and Pepe was his marker. Arouca lost 3-0, but the significance didn't come with the result, it came with Dabbagh's appearance - the first homegrown product to reach one of Europe's big leagues.

