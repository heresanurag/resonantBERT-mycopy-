title: 'Coronavirus: Irish St Patrick''s Day parades cancelled - BBC News'
date: '2020-03-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/world-europe-51806551
content: |-
  Belfast's parade has been postponed along with all parades in the Republic of Ireland.

  Thousands of people attend the Dublin parade every year

  St Patrick's Day parades across the island of Ireland have been affected by coronavirus.

  On Monday night, Belfast City Council in Northern Ireland voted to cancel the city's parade.

  Earlier, Taoiseach (Irish PM) Leo Varadkar announced all parades and festivals in the Republic of Ireland would not go ahead.

  Other parades in Northern Ireland are still scheduled to go ahead but are under review.

