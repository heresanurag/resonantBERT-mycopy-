title: 'DR Congo violence: Refugees fleeing M23 rebels say they ‘feel powerless’ -
  BBC News'
date: '2024-04-26'
section: General
url: http://www.bbc.co.uk/news/world-africa-68350274
content: |-
  Millions have been forced to flee the conflict between M23 rebels and DR Congo government forces.

  Millions of people have been forced to leave their homes and jobs behind and live in camps after an escalation in the conflict between M23 rebels and DR Congo government forces.

  The BBC talks to two internally displaced people about their new reality.

  Video produced by Beryl Wambani and edited by Mark Sedgwick
