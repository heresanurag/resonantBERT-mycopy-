content: |-
  The Prince of Wales tells reporters his year has been "dreadful", following a difficult year for the royals.

  It's been the hardest year of my life, says William

  The Prince of Wales has been visiting South Africa for his Earthshot Prize

  The Prince of Wales has described the past year as the "hardest year" of his life. Speaking to reporters at the end of his visit to South Africa, Prince William talked about how he has coped after both his wife and his father were diagnosed with cancer. "It's been dreadful. It's probably been the hardest year in my life. So, trying to get through everything else and keep everything on track has been really difficult," he said after being asked how his year has been after a difficult year for the Royal Family. Buckingham Palace revealed the King had cancer in February and would begin treatment. Just six weeks later it was announced the Princess of Wales was undergoing chemotherapy after a cancer diagnosis.

  The King has since returned to public duties and Catherine has finished chemotherapy treatment. Prince William said: "I'm so proud of my wife, I'm proud of my father, for handling the things that they have done. "But from a personal family point of view, it's been brutal.”

  On Friday, royal author Robert Hardman told the BBC's Today programme the prince's admission was part of a greater sense of the royal family "resetting the dial" on their public image. He also referenced the recent documentaries the Prince of Wales and the Queen have participated in, saying the monarchy had had "an extraordinary year". "It's been a hell of a year - there he (William) is on the one hand helping his wife through a very serious illness, and he's also expected to stand in for his father who is suffering from cancer," Mr Hardman, author of recently-released Charles III: New King. New Court. The Inside Story, added. "He's been holding the fort throughout all this". The Prince of Wales has been in South Africa for his Earthshot prize awards ceremony. On Wednesday night, five projects each won £1m in prize money for their environmental innovations. He was also asked about the role of Prince of Wales and whether he liked the freedom and responsibility that came with it. “It’s a tricky one. Do I like more responsibility? No," he said. "Do I like the freedom that I can build something like Earthshot then yes. “And that’s the future for me. It’s very important with my role and my platform, that I'm doing something for good. "That I'm helping people's lives and I'm doing something that is genuinely meaningful.” The prince has been sporting a beard since the summer and it has divided opinion even amongst those closest to him including his daughter Princess Charlotte. “Well Charlotte didn’t like it the first time. I got floods of tears, so I had to shave it off. And then I grew it back. I thought, hang on a second, and I convinced her it was going to be okay.” And on his general feelings about combining his role as a future king, husband and father, there was a sense that he had found the right mix of official duty and private time. “I enjoy my work and I enjoy pacing myself and keeping sure that I have got time for my family too.”

  On his final day Prince William met fishermen who were part of a 2023 Earthshot finalist project

  The Prince's final day in Cape Town saw him learn more about the work of Abalobi, a 2023 Earthshot prize finalist which aims to protect small-scale fishing communities. He was met with shouts of "we love you, William" and chatted to local fishermen and women involved in the programme. But later a handful of vocal protesters held up placards or shouted about a range of issues including conflict in Israel, indigenous rights, the culling of baboons in the area and lack of representation for local fishermen.

  On Wednesday, the Prince William told broadcasters Catherine is doing "really well" and has been "amazing this whole year".

