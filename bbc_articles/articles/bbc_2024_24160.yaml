content: |-
  Finlay Graham wins the men's C1-3 road race in Paris to take Great Britain's 43rd gold of the Paralympics.

  Finlay Graham won Great Britain's 43rd gold medal of the Paralympics in Paris with victory in the men's C1-3 road race.

  Graham, 24, beat France's Thomas Peyroton-Dartet in a sprint finish to the 71km route.

  He also won silver in the men's C3 3,000m individual pursuit on the track last week.

  Graham, Peyroton-Dartet and Alexandre Leaute broke clear on the third of five laps, before Leaute faded late in the race to take bronze.

  Britons Benjamin Watson, Jaco van Gass and Matthew Robertson were fifth, sixth and seventh respectively.

  Daphne Schrager finished sixth and Fran Brown seventh in a women's race won by Japan's Keiko Sugiura.

  Britain have won 101 medals at this year's Games, which end on Sunday.
