title: 'Newspaper headlines: Soldier stabbed and future of copper coins in doubt -
  BBC News'
date: '2024-07-24'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cxe21rpp0vjo
content: |-
  A mix of stories make Thursday's papers - including the knife attack on an Army officer in Kent.

  Soldier stabbed in 'frenzy' and no plans for new 1p or 2p coins

  Tom Tugendhat is the latest Tory to join the party's leadership race

  "Labour plans thousands of offshore wind turbines" is the headline in the Times,, external as it looks ahead to an announcement from the Energy Secretary Ed Miliband. The paper says he will stress it's time for the state to "own and build things again", unveiling a new partnership with the Crown Estate which owns swathes of Britain's seabed. The Daily Mail describes the deal, external as "unprecedented" and says the King is an avid supporter of onshore and offshore wind power The Guardian leads on, external what it says is exclusive data showing a surge in new oil and gas licences being granted this year - with the world's richest countries, like the UK and US, leading the way. The paper says wealthy countries are best placed to lead the move to clean energy -- but instead they are "spearheading the drilling frenzy". The Conservative MP, Tom Tugendhat, uses an article in the Daily Telegraph, external to declare he will run for party leader. "I’m ready to leave the European Court of Human Rights," is the headline on the front-page. Mr Tugendhat writes that he's willing to leave the ECHR if the institution stops the UK being able to control its borders. The paper says his position is an attempt to challenge Kemi Badenoch who it describes as one of the frontrunners in the race.

