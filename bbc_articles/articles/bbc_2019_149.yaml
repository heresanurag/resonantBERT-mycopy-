id: bbc_2019_149
title: 'Brexit: Which MPs have had talks in Westminster? - BBC News'
date: '2019-01-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-46907468
content: |-
  A timeline of the meetings held by Theresa May and senior colleagues about Brexit, as part of efforts to "find consensus".

  Former Brexit Secretary David Davis was among those who went to the Cabinet Office for talks

  Prime Minister Theresa May has been holding talks with MPs in the aftermath of the heavy defeat of her Brexit deal in the Commons - and following a slim victory in a no-confidence vote.

  Environment Secretary Michael Gove, Cabinet Office Minister David Lidington and Brexit Secretary Steve Barclay are also holding talks with senior opposition politicians.

  Meetings are being held in No 10 Downing Street and 70 Whitehall, the Cabinet Office.

  First up was SNP Westminster leader Ian Blackford, Plaid Cymru's Westminster leader, Liz Saville Roberts, and Lib Dem leader Sir Vince Cable, who all had talks with the prime minister on Wednesday night.

  Mr Blackford said that the extension of Article 50 - the two-year mechanism that means the UK leaves the EU on 29 March - the ruling out of a no-deal Brexit, and the option of another EU referendum would have to form the basis of future discussions.

  Ms Saville Roberts said they were "committed to finding a real solution" but "that means taking a no-deal Brexit off the table and a people's vote on our European future".

  Sir Vince said he was encouraged by Mrs May's "willingness to talk about these issues in detail". The preferred choice of his party is another referendum.

  Labour leader and leader of the opposition Jeremy Corbyn said he was "quite happy" to talk with Mrs May but she had to rule out a no-deal Brexit first.

  Members of the Tories' influential European Research Group (ERG) had a morning meeting with the prime minister

  Tory colleagues and Brexiteers Owen Paterson, Iain Duncan Smith, David Davis, Mark Francois and Steve Baker were among the first politicians spotted in Whitehall on Thursday morning, as well as Conservative MP and former Northern Irish Secretary Theresa Villiers. They are all members of the Tories' influential European Research Group (ERG).

  Brexiteer John Whittingdale tweeted afterwards that their group's meeting with the prime minister had been "constructive".

