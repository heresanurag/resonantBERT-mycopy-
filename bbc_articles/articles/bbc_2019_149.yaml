  Former Conservative cabinet minister Mr Paterson described the meeting as "thoroughly worthwhile", "very constructive" and a "good exchange".

  On the subject of taking a no-deal Brexit off the table, he said: "You will lose all the pressure on the EU if we give up no-deal, WTO (World Trade Organization) terms, and you give up the date. And we just drift on month after month and this whole saga continues."

  Sir Graham Brady, who chairs the 1922 Committee of Tory backbenchers, and Cheryl Gillan, MP for Chesham and Amersham and a vice-chair of the 1922 Committee, were also seen arriving at the Cabinet Office.

  They were later photographed leaving Downing Street with other members of the committee, after a meeting with the prime minister.

  Members of the 1922 Committee had a meeting with the prime minister in Downing Street

  09:00 GMT - After her meeting with the prime minister, Caroline Lucas, the Green Party's only MP, said Mrs May had refused to rule out a no-deal Brexit and resisted the option of extending Article 50.

  "I repeatedly urged her again and again to take no-deal off the table because I think it completely skews the talks - because you know that cliff edge is there," she said.

  Caroline Lucas, the Green Party's only MP, said Mrs May had refused to rule out a no-deal

  10:40 - DUP leader Arlene Foster and DUP Westminster leader Nigel Dodds arrived for their meeting. The prime minister relies on their party's support to prop up her government.

  Speaking in Downing Street following their meeting with Mrs May, Ms Foster said the prime minister had been in "listening mode" and there had been optimism that a Brexit deal could still be reached.

  She said she had made a "clear ask" in relation to the Irish backstop, urging Mrs May to address it "in a satisfactory way".

  The DUP's Arlene Foster and Nigel Dodds gave a statement outside Downing Street

  Tom Brake, the Lib Dem's Brexit spokesman, Alistair Carmichael, the Lib Dem's chief whip, and deputy Lib Dem leader Jo Swinson were all spotted arriving to the Cabinet Office.

  After his meeting with Mr Lidington, Mr Brake said a no-deal Brexit needed to be off the table.

  The Lib Dem's Brexit spokesman Tom Brake said a no-deal Brexit needed to be off the table

  11:27 - Plaid Cymru leader Adam Price met with Mr Lidington and Mr Gove, who he said had been in "listening mode".

  "If the government were to come out on Monday with that position [of another referendum] then the gridlock, the impasse, the logjam would be broken, and we could move forward," Mr Price said.

  "We talked in detail about the practicalities of how we could make it [another referendum] happen."

  Plaid Cymru leader Adam Price spoke to journalists after his meeting

  11:30 - Conservative MP Nicky Morgan, who chairs the Treasury Select Committee, arrived at the Cabinet Office.

  After 12:00 - Tory MPs Damian Green and Andrew Mitchell spoke to journalists outside the Cabinet Office after their meeting.

  "No two members of Parliament think precisely the same way but now we've got to make progress," Mr Mitchell said.

  "It's in the national interest and it's the right thing for the prime minister to do, to corral people together and make Parliament focus on what the answer to all of this is and what we agree about, not what we disagree about."

  Mr Green, a close ally of Mrs May, criticised Mr Corbyn's decision not to take part in the talks, saying the move was "completely absurd".

  Tory MP Damian Green, a close ally of Mrs May, criticised Mr Corbyn's decision not to take part in the talks

  John Mann, a Leave-supporting Labour MP and long-term critic of Mr Corbyn, was spotted coming out of the Cabinet Office.

  13:05 - Tory MPs George Freeman and James Cartlidge arrived at the Cabinet Office.

  13:57 - Labour MPs Yvette Cooper, who chairs the Home Affairs Select Committee, and Hilary Benn, who chairs the Brexit Select Committee, arrived at the Cabinet Office.

  After meeting Mr Lidington, Mr Benn said the government had to rule out a no-deal Brexit as a first step and secondly the prime minister had to change her "red lines".

  Labour MPs Yvette Cooper and Hilary Benn arrive at the Cabinet Office

  Ms Cooper said: "The most important thing now is that the government actually listens and it doesn't just think that a defeat that was that huge can simply be dismissed."

  They said they had attended the meeting in their capacity as chairs of cross-parliamentary committees, after Mr Corbyn barred Labour MPs from taking part in the talks while a no-deal Brexit remains an option.

  14:07 - Tory MPs Peter Bone and Tom Pursglove arrived at the Cabinet Office.

  On his way to meet the prime minister, Eurosceptic Mr Bone said he was "hopeful we can get a deal".

  Eurosceptic MP Peter Bone said he was "hopeful we can get a deal"

  15:31 - Tory MPs Tom Pursglove and Julian Lewis were seen leaving the Cabinet Office.

  15:50 - Labour MP Stephen Kinnock went into the Cabinet Office.

  16:08 - Tory MPs Steve Brine, Richard Harrington, Robert Buckland and Margot James were spotted outside the Cabinet Office.
