  Adam Peaty says he has his "spark" back after powering to a first Commonwealth 50m breaststroke title in what he says is his final race at the Games. Having missed out on a 100m medal on Sunday as he recovers from a broken foot, the English swimmer had said he was "not bothered" about adding the shorter title to his collection. That did not appear to be the case as he thrashed the water in celebration. "I had two options this morning - I either fight or don't fight," he said. "Everyone who knows me, knows I fight." Peaty certainly looked ready to fight as he entered the Sandwell Aquatics Centre, beating his chest twice before raising his hand to acknowledge the goosebump-inducing noise from the crowd. The 27-year-old jumped up and down behind his block, before eventually the shouts of "come on Peaty" subsided and silence fell. Initially, after touching first in 26.76 seconds, Peaty only gave an understated nod of his head. Before the final, he had said "you back a lion into a corner, they're going to bite". He looked every bit the king of the pool as his celebrations sprang to life and he climbed on the lane rope to roar at the crowd. It was a fairly comfortable victory in the end too. Australian silver medallist Sam Williamson was 0.21 seconds back, with Scotland's Ross Murdoch - who secretly retired in December before returning to swimming - taking bronze in 27.32 seconds. Peaty said after his 100m that he had lost his spark in the last two years and needed to take a long break before turning his attention to a third Olympic title at the 2024 Games. The crowd's response to his victory may go some way to helping him fall back in love with the sport and he repaid their applause by throwing his cap and goggles into the stands. "That means so much to me, because what I have been through the last five years," Peaty said. "I lost my spark towards the beginning of the week and I have it back now. A lot of people have got to understand that I reached the bottom of the bottom yesterday and to bring myself up with the crowd in my own mind and that is the result." Later, as he received his medal on the podium and lapped up the adoration of the Sandwell crowd, that spark had returned to his eyes and the smile to his face. Peaty said he "can retire now" after completing his collection of Commonwealth titles, but added that he was "looking forward to resetting" and training over the winter. "I am so glad I got that loss earlier in the week because these wins feel so much more alive and so much better," he concluded. Peaty also apologised in his post-race interview for his comments made after missing out on a medal in the 50m breaststroke final - saying he was "not bothered". BBC pundits had described his reaction as "disrespectful". He told BBC Sport: "I want to be accountable for that. It came across very wrong. I did address it and I'm sorry to anyone who misunderstood that. A lot of emotions yesterday. I'd reached the bottom of the bottom yesterday. Peaty, had earlier clarified his comments on Twitter,, external writing: "Sometimes in the heat of the moment, my emotions better me... These championships mean a lot to me, being a home Games."

