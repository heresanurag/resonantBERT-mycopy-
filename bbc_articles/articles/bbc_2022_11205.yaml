  Peaty's was not the first English gold on the penultimate night of swimming in Birmingham - as earlier on, Brodie Williams passed compatriot Luke Greenbank on the last length of the 200m backstroke to take the title. Greenbank had his head in his hands as Williams celebrated, but the pair then embraced as the home crowd cheered. Laura Stephens brought more joy for the hosts with 200m butterfly silver in the next race and James Guy continued the rush of medals for England with joint silver in a thrilling 100m butterfly final. Teenager Josh Liendo - the first black Canadian swimmer to win world short course gold in 2021 - took gold in in 51.24 seconds, ahead of 200m bronze medallist Guy and Australia's Matthew Temple, with South African Chad le Clos fourth. England's James Hollis won bronze in the 100m butterfly S10, in which Australia's Col Pearse won gold, and the hosts' quartet of Lauren Cox, James Wilby, Guy and Freya Anderson ended the night with a mixed 4x100m medley bronze. In the women's 200m butterfly, Australia's Elizabeth Dekkers claimed gold in two minutes 7.26 seconds - 0.64 seconds ahead of Stephens - and compatriot Brianna Throssell took bronze. Ben Proud - champion in the 50m butterfly - qualified fastest for the men's 50m freestyle final in 21.63 seconds, with Lewis Burras also qualifying.

  In the 100m freestyle, Emma McKeon became the joint most-decorated Commonwealth athlete of all time alongside South Africa's Le Clos as a bronze took her medal tally to 18. Fellow Australian Mollie O'Callaghan won that race and Shayna Jack took silver. Lara van Niekerk claimed a comfortable win in the women's 100m breaststroke with fellow South African Tatjana Schoenmaker taking silver and Australia's Chelsea Hodges bronze. Australia had time for three more golds before the night was through. Jasmine Greenwood won the 200m individual medley SM10 and for the fifth time in the Games, they claimed all three medals in a swimming event. Ariarne Titmus smashed the Commonwealth Games record of eight minutes 18.11 seconds in the 800m freestyle, winning in 8:13.59, with fellow Australians Kiah Melverton and Lani Pallister were second and third respectively. They then continued their domination of the relays - in which they have taken all six possible golds - by winning the mixed 4x100m medley.

