  Pilot events will see if tests, ventilation and other measures can make large gatherings Covid-safe.

  Starmer 'in awe' of Christian community during pandemic

  Sir Keir Starmer has joined the UK prime minister in paying tribute to the way churches have provided support throughout the pandemic. The Labour leader said he was "in awe" of the Christian community for its work in the past year. He said it has "always been there for the marginalised and for those that need support and help, but over the last year that has shone through so strong and so visible for everybody to see". He added: "I know Easter is a special time for Christians. It's a time for hope and renewal. And, as we come out of this pandemic, I think those values will be so important to us as a nation." For the first time, the Archbishop of Canterbury's Easter sermon has featured across BBC TV, radio, and digital platforms. The service, by the Most Reverend Justin Welby, took place at Canterbury Cathedral, but there is no congregation due to coronavirus restrictions. For some churches, Sunday will be the first time they have opened in months.
