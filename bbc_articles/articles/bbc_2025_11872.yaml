title: 'NI riots: Mother and daughter charged in court - BBC News'
date: '2025-06-16'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cd6261415eeo
content: |-
  In total, 64 police officers have been injured in disturbances which started a week ago.

  Mother and teenage daughter in court following recent disorder

  There were riots across Northern Ireland, including Ballymena

  A 13-year-old girl has appeared in court in connection with disorder in Ballymena last week. The teenager was arrested and later charged with riot following violence on Wednesday 11 June. The girl can't be named because of her age but appeared by videolink at Coleraine Magistrates Court on Monday afternoon. Her mother, who is in her 30s and who cannot be identified to protect her daughter's identity, also appeared in the same court charged with child cruelty.

  A police officer said a female who they believe to be the teenager was observed throwing items at police and was in the area for two and a half hours. The officer added that the child's mother was also present during the disorder and appeared to be aware of her daughter's involvement. The court heard claims the mother was "also present when her daughter was struck by a blast from the water cannon," when it was used to quell the disorder. However the court was told the woman refused to confirm that her daughter was present. A defence solicitor said no formal identification had taken place yet. They also said the woman was not facing any charges herself in relation to participating in the riot. Both were granted bail and will appear in separate court hearings next month.

  Twenty-nine people have now been arrested over the violence that erupted over the last week and police have warned that there will be further arrests. In total, 64 police officers have been injured in disturbances which started last Monday after a peaceful protest over an alleged sexual assault in Ballymena, County Antrim, and later spread to other areas. In the latest round of arrests, five people have been detained in connection with disorder in Ballymena and Larne. In total 21 people have been charged.

  Water cannons were brought to Portadown to deal with disturbances

  Detectives investigating online posts relating to the disorder have charged a 32-year-old man with sending menacing messages through a public electronic communications network and encouraging or assisting offences. Meanwhile, a 25-year-old man has also been arrested in relation to an arson attack at Larne Leisure Centre last week. The centre had been providing emergency shelter for families following the clashes earlier this week, the council said. A 56-year-old woman has also appeared in court charged with obstructing a police officer during last week's riots.

  Violence first broke out in Ballymena after two teenage boys appeared before Coleraine Magistrates' Court accused of sexually assaulting a teenage girl. They spoke through an interpreter in Romanian to confirm their names and ages. Their solicitor said they would be denying the charges. A peaceful protest was held on 9 June, but after it dispersed rioting broke out.

  Around 100 people gathered for another peaceful protest in Ballymena on Monday night. The rally, attended mostly by women and children, was held in the area of the town where there has been recent violence.

  North West Migrants' Forum integration and welfare officer Gaelle Gormley said the violence was "absolutely horrific". "Our service users are very concerned, we are very concerned," she said. "We are really, really worried that it will also come to the centre of Derry. It's outrageous." There was some violence in the city on Friday, but not on the same scale as Ballymena.

  Gaelle Gormley, of the North West Migrants' Forum, said the violence was "horrific"

  Ms Gormley said migrants were "very resilient" but at the moment they were avoiding going out late at night and avoiding certain streets. She called for people to show their support. "We want more people who are welcoming and aware of the fact that we are all citizens of the world and that everybody can be a migrant anywhere," she said. "Since the beginning of humanity people have been going to different countries and it's thanks to that that we have all the progress we have."

