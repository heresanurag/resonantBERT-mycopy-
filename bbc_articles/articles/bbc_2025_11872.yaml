  Sameh Hassan, chairman of North West Islamic Association, said many immigrants were scared to go out, while others had left their homes to go to safer places. "It's unfair for anyone to feel unsafe in their house, especially people who have kids and families," he said. "Feeling unsafe about your family is the worst thing you could experience." Mr Hassan said he had lived in Northern Ireland for 17 years and had found people "very welcoming". However he said there were some issues, such as housing and jobs, that were causing "anti-migrant sentiment" and needed "to be addressed in the right way". He added that the spread of misinformation on social media was "very misleading".

  Police said there had been "sporadic disturbances" in different locations on Sunday night but described it as a "reduced level of disorder". Overnight graffiti in Bangor, County Down and on an unoccupied house in Chadwick Street in south Belfast are being treated as race-motivated hate crimes, the police said. In Brompton Park in Ardoyne, in Belfast, about 30 young people set a bin on fire but no damage was caused to shops and police said "no serious disorder ensued". Ass Ch Cons Melanie Jones said "Our heightened presence in our local communities and continued community engagement to de-escalate violence continued last night, thankfully, similar to Saturday, the situation was much calmer. "Thankfully, none of our officers policing this disorder reported being injured on duty last night (Sunday)." Police have already circulated images of individuals they want to identify and interview.
