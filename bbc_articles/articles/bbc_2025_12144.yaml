title: Met PCs who put spit hood on 90-year-old face misconduct hearing - BBC News
date: '2025-06-19'
section: London
url: http://www.bbc.co.uk/news/articles/ckg3n8pyrmlo
content: |-
  Two serving PCs and a former officer will face gross misconduct hearings.

  The IOPC found there were gross misconducts cases to answer over the treatment of the woman

  Two serving Metropolitan Police officers and a former officer will face a gross misconduct hearing after a 90-year-old woman with dementia was "red-dotted" with a Taser, handcuffed and put in a spit hood. The woman was targeted with the Taser when she refused to drop kitchen utensils she had been holding after officers were called to an address in Peckham, south London, on 9 May 2023 over reports of a disturbance. She was then handcuffed and taken to hospital, but not arrested. Following an investigation, the Independent Office for Police Conduct (IOPC) found two serving PCs and a former PC had gross misconducts cases to answer over the treatment of the woman.

  The IOPC launched its investigation in June 2023 after a voluntary referral from the Met and a complaint from the family over use of force and allegation of discrimination due to the woman's age, race, sex and disability. It was determined there was a gross misconduct case to answer for one officer over their treatment of the woman, including their use of force regarding the Taser and their communication towards her. Another serving officer and former officer, who left the force in August, will also answer their own cases over the time the woman was kept in the handcuffs and spit hood and failing to take into account her age and disability during the incident. The police watchdog found no evidence the woman was discriminated against based on race or sex.

  The Met said both the serving officers had been placed on restricted duties, while three other officers will undergo a reflective practice review process following their behaviour during the incident. IOPC director Amanda Rowe said: "This was a concerning incident particularly given the woman's vulnerabilities. "It was important that we investigated the full circumstances surrounding this incident to determine exactly what occurred. "As a result we have decided that three officers who attended the incident should face a police disciplinary hearing which will ultimately determine whether the gross misconduct allegations are proven." Ch Supt Emma Bond, who leads policing in Southwark, said: "Officers know we expect them to show compassion and to adjust their approach according to the circumstances they are faced with. Over the coming days we will work closely with those communities most affected to ensure they feel heard and supported. "We have provided every assistance to the IOPC throughout its investigation and will now arrange for the hearing to be held as soon as possible."
