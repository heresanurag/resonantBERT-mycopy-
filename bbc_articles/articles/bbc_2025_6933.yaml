content: |-
  Durham's 20-year-old opener Ben McKinney is being tipped for the top after an eye-catching winter - and is ready to deal with the hype.

  England's next Bazballer? McKinney happy to deal with hype

  Ben McKinney has scored 634 runs at an average of 37.29 in 11 first-class matches

  Ben McKinney has already had a brush with celebrity. During series one of Netflix's fly-on-the-wall documentary Sunderland 'Til I Die, he is shown celebrating a rare goal in a season most Black Cats supporters would rather forget. "I got a message from one of my schoolmates saying they had seen me," McKinney tells BBC Sport. "It summed the season up that it was just me and my dad because no-one else wanted to come any more." Six years on, 20-year-old McKinney looks ready start his own journey, one he hopes will have a happier ending. Having made his debut for Durham aged 18 in 2023 and scored his first first-class hundred a year later, the opening batter was already seen as someone with a big future. Scoring 110 runs from 110 balls for England Lions this winter against an Australia A side featuring six full internationals confirmed it. "It was pretty surreal," McKinney says. "In the moment you are just doing it off instinct. "It is good, coming up against good players, to know you are worthy of playing at the standard."

  England's hierarchy have shown they are not afraid of giving inexperienced youngsters a chance and they are known to like what they see in McKinney. Former spinner Graeme Swann, part of the Lions set-up with McKinney in Australia, said the left-hander could "easily walk into Test cricket now", comparing him to New Zealand great Stephen Fleming. He is a former England Under-19 captain, stands at 6ft 7in and falls into the Bazball mould as an aggressive batter. It leaves those in the know thinking McKinney could follow where Jacob Bethell, Shoaib Bashir and Josh Hull have gone before in being given an early international bow. "You say it's a bit of pressure but you would rather that than no-one speaking about you, wouldn't you?" McKinney says. "Runs are your currency. I will just keep doing what I am doing and hopefully get opportunities." McKinney's height is now seen as an advantage, giving him the ability to attack lengths others would have to leave or defend, but it was not always this way. A talented footballer, he played for both Durham and Sunderland's academy as a teenager, having joined the Black Cats' ranks aged "six or seven". "I was a centre-mid but I was getting a bit too tall for it," he says. "I probably would have been a centre-back by now. "I was always OK but didn't really enjoy it." McKinney committed to cricket at the age of 16 – given confidence by Durham's production line which has overseen the development of Ben Stokes, Mark Wood, Paul Collingwood and Steve Harmison among others. "I remember a phone call my dad had with [Durham's academy manager] John Windows," McKinney says. "It went something like 'we have never let a lad fail from where he is now'. "That was a massive confidence boost when you are 15 or 16 years old. That tipped me over the edge. My love was always cricket."

  That love was first formed at Seaham Harbour Cricket Club, where his father Neil was one of the area's leading club cricketers. McKinney Sr also spent hours throwing to his son in the nets. "He was relentless and wouldn't let me leave," McKinney says. "Sometimes that might be bad but it definitely set me up for the future. It is amazing to have someone who cares for your success and you improving." Despite the promise, there has been no contact between McKinney and the England set-up, other than what he has been able to glean from having England skipper Stokes alongside him in the Durham dressing room. "How he practises is something I have never seen before," McKinney says. "He is so particular and there is always purpose." The opportunities given to McKinney are no coincidence, however. He was picked to open when warm-up opposition were provided to West Indies and Sri Lanka last summer and returned scores of 22, 46 and 20. He also toured Australia with England Under-19s in 2023 - another relevant point with an Ashes series to come this winter - and hit 12 fours in a 45-ball 70 in England's victory in Brisbane, hinting at a keenness to follow the Bazball mantra from the start. "It's actually the opposite," he says. "My dad is very old fashioned. I used to bat 50 overs for 80. "I used to love batting for time but somehow that flicked a switch, probably at a good time. "There was a period I was probably going too hard but trying to find that balance of soaking up pressure and putting it back on has been the most important thing for my success this winter." Those words will be likely be a soothing symphony in the ears of England fans. Their faith in England's approach is wobbling at the worst possible time with only a Test against Zimbabwe from 22 May to come before five against both India and Australia over the seven months that follow. "I would love to play all formats but I go back to being 10 years old and watching Alastair Cook opening the batting," McKinney says. "I loved the way he did it. It's not the road I have gone down now but the basics behind it, I will be happy keeping him as my role model." There are no vacancies in England's top seven but Zak Crawley's poor form, Jacob Bethell's Indian Premier League commitments and the chance for injuries means nothing can be ruled out at this stage. McKinney will get six County Championship matches to push his case further before Zimbabwe arrive, starting with a trip to Nottinghamshire on Friday.
