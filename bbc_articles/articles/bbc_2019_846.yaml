title: 'Charlotte Brown''s father tells killer: ''Hand yourself in'' - BBC News'
date: '2019-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-46973920
content: |-
  Charlotte Brown's father Graham says fugitive Jack Shepherd should hand himself in and serve his time.

  The man who killed her, Jack Shepherd, remains on the run - having been convicted of manslaughter by gross negligence.

  Miss Brown's father, Graham Brown, calls for Shepherd to hand himself in to police.

