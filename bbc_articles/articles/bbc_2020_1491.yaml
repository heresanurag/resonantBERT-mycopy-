id: bbc_2020_1491
title: 'Young people and housing: Could you live in your dream home? - BBC Bitesize'
date: '2020-02-25'
section: General
url: https://www.bbc.co.uk/bitesize/articles/zv3ht39
content: |-
  We spoke to three young people about their dream home and how it matches up with reality.

  The house of my dreams would be a penthouse, because I’m not really that into houses. I like to be on the top floor of things so that I can see the cityscape, see the landscape. I’m not very materialistic so it would just have the necessities.

  I think I would rent an apartment in the future with multiple people, rather than living by myself in a house because that just seems to be far too expensive. I spend most of my time in my room so I wouldn’t need to have an upstairs and a downstairs.

  The topic of housing never comes up in conversations with my friends. We just all agree that we’d never be able to afford a house of our own, because the houses in London are very expensive. Even the house I live in now, I’ve lived in it since I was born, and the price of it has just gone up even though it’s kind of small... so we’re very pessimistic when it comes to the topic of housing.

  Renting with people is easier than deciding who’s paying how much of the mortgage, so I think renting is a better idea, especially long term because you can just break out whenever you need to.
