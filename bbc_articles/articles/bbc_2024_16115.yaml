content: |-
  Joe Biden's decision to step out of the race for the White House dominates the front pages.

  Biden 'bows out' and 'quits the race'

  One story and two words - "Biden quits" - dominate the front pages. The Guardian carries a picture of President Biden,, external his head bowed and eyes closed - as it reports that his decision to end his re-election campaign appears to have been abrupt. According to the paper, he informed senior staff on Sunday afternoon that he had changed his mind as his campaign officials were still reportedly on the phone to delegates, asking if they could count on their support. The Daily Telegraph says the "shock announcement", external came hours after reports that Mr Biden still intended to fight the election, in spite of concerns from top Democrats. In a comment piece on the front page, Tim Stanley says Democrats "have finally got their gear together and effected a coup - but not before months of damaging the party's brand". The i says White House staff were "blindsided" by Mr Biden's statement., external But it says a growing rebellion had left an angry president with "no option" and he was "forced to stand aside.... to make way" for a younger candidate. The Financial Times says the president’s "unprecedented" move, external will reverberate across the globe, and inject new uncertainty..... "at a moment of acute geo­-political tension".

  The Times says the president bowed to mounting pressure, external to "pass the torch to a younger generation". The paper says Kamala Harris will now be the favourite for the Democratic nomination. But it also warns that some of her main party rivals didn't follow Mr Biden’s endorsement of her. The Times says they're calculating whether to stage a challenge leading up to the party's convention in Chicago, which starts on 19 August. Biden out...Kamala in? is the question posed by the Daily Mail., external It notes that the Clintons have publicly backed Ms Harris to be the Democratic presidential candidate, but says Barack Obama has "stopped short" of giving her his support. The Daily Express says, external President Biden's "seismic" decision , externalnow means "it's game on in the US elections". The paper says Donald Trump is ahead in the opinion polls, but asks how much is that due to Mr Biden's infirmity? It also says time is not on the Democrats' side - and questions if it will be a straightforward coronation of Ms Harris at her party's convention next month. Bye Biden, is the Sun's headline. , externalThe paper says that "finally, sense has prevailed". In an editorial, it goes on to say that the 81-year-old president cannot be blamed for physical decline and he deserves credit for now stepping aside. The paper also says his decision to quit is "probably his last hope of stopping his bitter rival". The Daily Star repeats a favourite Donald Trump insult,, external with the headline: "Sleepy Joe: It’s time for a nap."

