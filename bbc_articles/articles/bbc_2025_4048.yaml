  Real Madrid want Bournemouth's Dean Huijsen, Cherries target Liverpool's Caoimhin Kelleher, Al-Nassr eye Arsenal's Gabriel Magalhaes, plus more.

  Real Madrid will step up their bid to sign 19-year-old defender Dean Huijsen from Bournemouth this summer after he was promoted to Spain's senior squad. (Sun), external Bournemouth are leading the race to sign Republic of Ireland goalkeeper Caoimhin Kelleher, 26, from Liverpool. (Talksport), external Newcastle United are readying a new contract offer which would mean Sweden striker Alexander Isak, 25, nearly doubling his salary. (GiveMeSport), external Napoli will try to secure a deal for Denmark striker Rasmus Hojlund this summer, but cannot afford to meet Manchester United's asking price of £50m. (Gazzetta dello Sport - in Italian), external Napoli's 26-year-old Nigeria striker Victor Osimhen, currently on loan at Galatasaray, might go to Manchester United as part of a deal for Hojlund. (Mirror), external
