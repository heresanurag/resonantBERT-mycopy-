  Prince Harry says his fiancee's first Christmas with the Royal Family was "fantastic".

  Prince Harry discusses his fiancee Meghan Markle's first Christmas with the Royal Family.

  The fifth in line to the throne was interviewed as part of his guest editorship of Radio 4's Today programme on Wednesday.
