id: bbc_2018_2676
title: Russian exiles contacted over safety after tycoon murder - BBC News
date: '2018-03-17'
section: UK
url: http://www.bbc.co.uk/news/uk-43438615
content: |-
  Safety advice is issued as police investigate the death of Russian businessman Nikolai Glushkov.

  UK police have begun to contact a number of Russian exiles to discuss their safety as they investigate the murder of businessman Nikolai Glushkov.

  The 68-year-old's body was discovered at his south-London home on 12 March. A post-mortem examination has found he died from "compression to the neck".

  The UK granted Mr Glushkov political asylum in 2010 after he fled Moscow.

  The BBC has been told police and the security services have reassessed their view that other exiles are at low risk.

  Police say there is no evidence at this stage linking Mr Glushkov's death to the poisoning of former Russian spy Sergei Skripal and his daughter, Yulia, in Salisbury on 4 March.

  It comes as Russia said it would expel 23 British diplomats amid tensions with the UK over the incident.

  Nikolai Glushkov had been living in the UK since 2010

  The Metropolitan Police launched a murder investigation on Friday after post-mortem results indicated Mr Glushkov had died from "compression to the neck".

  They said the force's Counter Terrorism Command would continue to take charge of the investigation "because of the associations Mr Glushkov is believed to have had".

  Detectives are said to be keeping an open mind and are appealing for any information that will assist the investigation.

  In particular, they are appealing for anyone who may have seen or heard anything suspicious at or near his home in Clarence Avenue, New Malden, between Sunday 11 March and Monday 12 March to contact them.

  Mr Glushkov was the former deputy director of Russian state airline Aeroflot.

  He was jailed in Russia in 1999 for five years after being charged with money laundering and fraud.

  After being given a suspended sentence for another count of fraud in 2006, he was granted political asylum in the UK.

  He was due to appear in court in London this week. The Russian authorities were pursuing him for more than £100m of Aeroflot's money.

  He had also been a close friend of Boris Berezovsky, who also lived in Britain and died in 2013. Both men were critics of President Vladimir Putin.

  Mr Berezovsky was found hanged in the bathroom of his former wife's Berkshire home in 2013 and an inquest recorded an open verdict, but Mr Glushkov was said to have been convinced he and other exiles had been murdered.

  Former PR and advertising executive Lord Bell, who was a close friend of Mr Glushkov, said he was "concerned" his friend's past might have made Russia consider him to have worked against the state.

  BuzzFeed News claimed to have evidence of 14 deaths in the UK that were actually murders by the Russian state or mafia allies, including that of Mr Berezovsky.

  In each of the cases, police investigations and inquests did not find evidence of any crime.

  Mr Glushkov's death comes in the same week as Home Secretary Amber Rudd announced that some of the deaths are to be reinvestigated by the police and MI5.

  Moscow has denied any involvement in the attack on Sergei and Yulia Skripal, which is being treated as attempted murder. The pair remain in a critical but stable condition in hospital.

  The UK government says the Skripals were poisoned with a nerve agent of a type developed by Russia called Novichok, and Prime Minister Theresa May said she believed Moscow was "culpable".

  Foreign Secretary Boris Johnson went on to say on Friday that Russian President Vladimir Putin was "overwhelmingly likely" to have ordered the nerve agent attack.

  The UK is to expel 23 Russian diplomats as part of a "full and robust" response - a move that has prompted Russia to say it would expel 23 British diplomats from Moscow.
