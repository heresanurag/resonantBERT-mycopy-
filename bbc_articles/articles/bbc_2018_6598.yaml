id: bbc_2018_6598
title: 'Berlin Cathedral: Police officer shoots ''rampaging'' man in leg - BBC News'
date: '2018-06-03'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-44349468
content: |-
  A knife-wielding 53-year-old Austrian man is shot in the leg during a rampage in the building.

  A German police officer has shot a knife-wielding Austrian man who went on the rampage in Berlin Cathedral on Sunday afternoon.

  The 53-year-old man was shot in the leg, Berlin police said. A police officer was also injured in the incident and taken to hospital.

  Police said there was no indication of any terrorist motive.

  About 100 people were in the building at the time of the incident, around 16:00 local time (14:00 GMT).

  Police said they had been alerted by an emergency call from an employee at the cathedral.

  A police statement urged people to "avoid speculation" and said more details of the incident would follow.

  Witnesses quoted in German media said the man appeared to be in a "confused" state.

  Video from eyewitnesses showed police crews with submachine guns being set up outside the cathedral, with police tape placed around the building.

  Psychological counselling was offered to those who witnessed the events.

  The elaborate 19th Century church is located in the centre of Berlin on the historic Museum Island and is one of the city's top tourist attractions.

