title: My husband is battling MS - intense races help me cope - BBC News
date: '2024-12-16'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c9wr2lqp084o
content: |-
  Leigh McLean says training for the fitness race Hyrox helped her cope with caring for her disabled husband.

  'I'm caring for my husband with MS - intense races help me cope'

  Leigh (left) says training for a fitness race helped her cope with caring for her disabled husband

  Leigh McLean's husband Colin loved the gym and was always really fit until multiple sclerosis changed his life. The 57-year-old was diagnosed over a decade ago but since 2020 he has gone from being able to work and drive to being in a wheelchair permanently - and needing carers four times a day. His wife Leigh told the BBC she has found an unlikely way of coping with her caring duties which has also brought the couple closer together - a fitness competition. Hyrox, an indoor fitness race in which thousands of people take part in a series of challenges, has seen a dramatic increase in popularity since it started in Germany in 2017. Leigh, who is 51, says having a competitive goal has helped her remain upbeat and positive which her husband ‘feeds’ off. “When he hears I’m doing a competition, it gets him interested and it’s something for us to talk about," she said. "He will ask about my training and what I’ve been doing. He can get involved in it and be my support. "I think it would be really disrespectful for me to sit on my bum with full mobility. There is no reason I can't achieve these things."

  Leigh and her racing partner Wiki came fifth in their age group, completing the race in just under an hour and a half

  Hyrox, which is held in large venues around the world throughout the year, involves a gruelling circuit of eight strength-based exercise stations with a one kilometre run between each. In March this year, Leigh joined the crowded start line at Glasgow's SEC and came fifth in the woman's doubles category in her age group, with her friend Wiki. The ballot for next year's tickets has just opened and Leigh has already secured her tickets to take part again. "We are starting to think about our training now as it's only three months away," she said.

  Leigh and her husband Colin pictured in 2020 on holiday, shortly before Colin went rapidly downhill with his illness

  Part of the experience is that the competitors are cheered on by thousands of spectators, but Colin is unable to watch Leigh compete because of his MS. Despite this, Leigh says he has a "sense of pride" in her, loves to support her and be involved. "He likes to hear about me achieving stuff," she said. "He likes to go and tell his pals about it." Colin said he recognises that exercise is hugely important to Leigh. He said: "She is my carer I am very supportive of everything that she does. "I feel that it benefits both of us mentally and physically."

  A wave of participants start their race at Glasgow's SEC in March 2024

  The events take place indoors with an identical format each year

  When Leigh's friend originally suggested taking part she was reluctant. “I didn’t think a fitness competition was for me," she said. "It was the self-doubt that most people have. "As you get older you tend not to push yourself. It’s the fear of failure, of not being able to do it." But eventually she plucked up the courage to sign up. Participants can enter the race as a pair in the doubles section, allowing them to share the work, but not the running. One of the stations is called the farmer's carry. It involves walking for 200 metres (656 ft) carrying two heavy weights in each hand like shopping bags. Other stations involve pushing and pulling a weighted sled for 50 metres (164 ft) each time, doing 100 metres (328 ft) of lunges while carrying a sandbag and throwing a large weighted ball above your head 100 times.

  One of the stations requires you to push a sled weighing over 100kg for 50m

  Leigh says the strength training has a practical value when caring for Colin. “When you have a disabled husband there is a lot of physical care," she said. "He can’t sit himself up in bed or swing his legs out, I’ve physically got to pull him up. "I’m only 5ft 1in (1.55m) and physically that is a lot for me to lift. If my back goes it wouldn’t be good." Leigh also said staying fit allows her to switch off from her caring responsibilities. "Focusing on the training allows me to rationalise things in my head, and be much less stressed or upset about it," she said. "It helps me get my head around it, like a fuel that keeps me going."

  Leigh and Wiki share 100m of lunges carrying a weighted sand bag, while their progress is monitored by a race official

  Wiki walking her share of 200m with two 16kg kettle bells in the 'farmer's carry'

  Hyrox events attract thousands of competitors and spectators throughout the year and take place all over the world.

  Last year, about 175,000 athletes took part in Hyrox around the world. This year it could be as high as 425,000. The races have been so popular in the UK that a ballot system has been introduced for tickets. The Glasgow competition was officially announced this week and will run for four days from 13-16 March at the SEC - its biggest event in Scotland to date. A ballot for tickets opened on Wednesday and will run for five days. Leigh and Wiki are delighted to already have secured their tickets - and can't wait to start preparing.
