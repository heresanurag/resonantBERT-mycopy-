  • None City are unbeaten in their last 10 opening Premier League fixtures (W9 D1), winning the last eight in a row.
  • None Emery is the first of Arsenal's last six managers (including caretakers) to lose his first league game in charge of the club, since Steve Burtenshaw lost 1-0 against Tottenham in March 1986.
  • None Guardiola remains unbeaten against Emery in all competitions, winning seven and drawing four of the 11 meetings.
  • None Guendouzi is the 27th French player to play for Arsenal in the Premier League - a joint record high with Newcastle.
  • None Lichtsteiner is the oldest outfield player to make his Premier League debut for Arsenal, at 34 years and 208 days.
  • None Sterling has now scored 50 Premier League goals, with his opener against Arsenal only his third from outside the box.
  • None Sterling has been directly involved in 12 goals in his last 12 Premier League appearances, scoring five and assisting seven.
  • None Mendy registered two assists in a game in Europe's big five leagues for only the second time ever (also for Monaco v Nice in February 2017) and for the first time ever away from home.
  • None Bernardo has scored five goals in his last seven Premier League starts for Manchester City after failing to score in his first nine.

  Arsenal manager Unai Emery has got a really tough start - he follows this game up with a trip to Chelsea next Saturday (17:30 BST). City host Huddersfield on Sunday (13:30 BST).
