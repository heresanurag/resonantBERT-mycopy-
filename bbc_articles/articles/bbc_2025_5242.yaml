  These entanglements can involve creel fishing gear or ghost gear - rope and nets that have been lost or abandoned by fishing boats. A sperm whale that died after stranding on the Isle of Harris in November 2019 had a 100kg "litter ball" in its stomach. Fishing nets, rope, packing straps, bags and plastic cups were among the items discovered in a compacted mass during an investigation by Smass.
