content: |-
  Pennon Group chief executive Susan Davy concedes the increases may be too much for some.

  The boss of South West Water has apologised unreservedly for a parasite outbreak in south Devon a year ago.

  In an interview with BBC Spotlight's Victoria Graham, Pennon Group chief executive Susan Davy also responded to criticism over bill rises, sewage spills and her remuneration.

