title: Document work or resign, Doge says to US federal workers in email - BBC News
date: '2025-02-23'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cr72n1yyj30o
content: |-
  The weekend email comes as Elon Musk leads an effort to aggressively curtail the government workforce.

  US government workers received an email on Saturday afternoon asking them to list their accomplishments from the past week or resign - the latest development in the Trump administration's efforts to scale back the federal workforce. The email came after Trump's billionaire confidant Elon Musk posted on X that employees would "shortly receive an email requesting to understand what they got done last week". "Failure to respond will be taken as a resignation," he wrote. Musk, as the head of the so-called Department of Government Efficiency (Doge), has been leading an outside effort to aggressively curtail government spending through funding cuts and firings.

  The email arrived in inboxes shortly after Trump spoke at the Conservative Political Action Conference (Cpac). The messages came with the subject line "What did you do last week?" from a sender listed as HR. The Office of Personnel Management (OPM), the federal government's human resources agency, confirmed the email was authentic in a statement to CBS, the BBC's US news partner. "As part of the Trump administration's commitment to an efficient and accountable federal workforce, OPM is asking employees to provide a brief summary of what they did last week by the end of Monday, CC'ing their manager," it said. "Agencies will determine any next steps." In a copy of the email obtained by the BBC, employees were asked to explain their accomplishments from the past week in five bullet points - without disclosing classified information - before midnight on Monday. The message did not mention whether a failure to respond would be considered a resignation. The American Federation of Government Employees, the largest union representing federal employees, criticised the message as "cruel and disrespectful" and vowed to challenge any "unlawful terminations" of federal employees. "Once again, Elon Musk and the Trump Administration have shown their utter disdain for federal employees and the critical services they provide to the American people," Everett Kelley, union president, said in a statement. On Sunday morning, Musk wrote on his social media platform X that "a large number of responses have been received already", adding: "These are the people who should be considered for promotion." A few hours later, Musk said on X that the move was important because "a significant number of people who are supposed to be working for the government are doing so little work that they are not checking their email at all". Musk went on to say that Doge believes "non-existent people or the identities of dead people are being used to collect paychecks", claiming "outright fraud" without evidence. Musk has repeatedly made claims of fraud in defending his team's work across a range of government departments and functions. But on Saturday, there appeared to be some disagreement about the latest email among government department heads. Newly-confirmed FBI director Kash Patel told his employees in an email that they should "pause any responses" to the OPM memo. "FBI personnel may have received an email from OPM requesting information," Patel wrote in a message obtained by CBS News. "The FBI, through the Office of the Director, is in charge of all of our review processes, and will conduct reviews in accordance with the FBI procedures." The State Department sent a similar message to its employees and said it will respond on behalf of the department. "No employee is obligated to report their activities outside of their Department chain of command," an email from Tibor Nagy, acting undersecretary for management, that was obtained by US media said. The union that represents many government employees, the American Federation of Government Employees (AFGE), was critical of the email and threatened legal action if employees were unlawfully terminated. "It is cruel and disrespectful to hundreds of thousands of veterans who are wearing their second uniform in the civil service to be forced to justify their job duties to this out-of-touch, privileged, unelected billionaire who has never performed one single hour of honest public service in his life," AFGE President Everett Kelley said. Earlier in the day, Trump touted cuts and told a crowd of supporters at Cpac that the work of federal employees had been inadequate because some of them work remotely at least some of the time. "We're removing all of the unnecessary, incompetent and corrupt bureaucrats from the federal workforce," the president told the crowd at the annual conference in suburban Washington on Saturday afternoon. "We want to make government smaller, more efficient," he added. "We want to keep the best people, and we're not going to keep the worst people." Elon Musk's team has exacted wide-ranging changes to the US federal infrastructure through Doge and with approval from the White House. Thousands of government employees at the Internal Revenue Service (IRS), the Pentagon and the Federal Aviation Administration (FAA), as well as other agencies, have been fired in recent weeks. The email mirrors Musk's handling of employees after he acquired social media platform Twitter, now called X, in 2022. As the staff there shrunk under his ownership, he issued ultimatums that included a now-infamous request to commit to being "extremely hardcore" at work or resign. In a Truth Social post, Trump said that Musk is doing a "great job" in reducing the size of the federal government and that he would like to see him "get more aggressive" in the pursuit.
