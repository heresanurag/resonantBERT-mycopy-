title: 'David Lammy MP: ''I won''t let the bullies win'' - BBC News'
date: '2019-08-07'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49255891
content: |-
  MPs talk about the level of abuse and threats they receive – both online and offline.

  More than 100 MPs have spoken to the police after facing threats and abuse in the past year, a BBC survey has found.

  We spoke to MPs from various parties about the abuse they receive both online and offline.
