  This is not the first time that United Airlines has found itself in a public relations nightmare.

  In April 2017 a US doctor was dragged off a plane in Chicago after he refused to be "bumped" from his seat.

  Passenger David Dao, who had emigrated to the US from Vietnam, suffered a concussion and several broken teeth.

  His daughter said he found the ordeal to be worse than his experience fleeing from Saigon during the Vietnam War.
