content: |-
  The prime minister has sacked Mr Williamson, who faced repeated calls to quit as education secretary.

  Gavin Williamson has been sacked as education secretary in the prime minister's Cabinet reshuffle.

  The MP for South Staffordshire faced repeated opposition calls to quit, or be sacked, over his handling of disruption to schools and exams during the pandemic.

  Mr Williamson previously held the posts of chief whip and defence secretary.

  Here are some of Mr Williamson's memorable ministerial moments.
