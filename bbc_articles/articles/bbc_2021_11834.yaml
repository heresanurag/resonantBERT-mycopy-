title: Gunfire as Taliban celebrate US leaving Afghanistan - BBC News
date: '2021-09-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-58389771
content: |-
  Gunfire rang out as the BBC's Lyse Doucet reported on US troops' departure from Kabul.

  Gunfire rang out at Kabul as the Taliban celebrated the last US troops leaving Afghanistan.

  BBC News chief international correspondent Lyse Doucet says the skies were full of red tracer and machine gun fire as the Taliban hailed the US departure, nearly 20 years since the US-led invasion forced them from power.
