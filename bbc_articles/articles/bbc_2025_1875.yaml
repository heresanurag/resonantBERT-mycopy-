  Experts told BBC Verify that incidents such as these and major crashes are thoroughly investigated by authorities. New details and data from accidents are fed into pilot training simulators so that they can prepare for similar scenarios in the future. "If you look at simulators today, how advanced they are, they are like real aircraft," said Ismo Aaltonen. "It's completely different to when I started flying more than 40 years ago." Regulators can also impose penalties for safety violations which include fines, license suspensions and operational restrictions. Airlines can also be banned from countries and blocs if they don't adhere to safety standards. Despite the recent spate of incidents, air travel remains by far the safest form of travel. Of all transport-related deaths in 2022 in the US, over 95% occurred on the road, according to the latest available figures from the US Department of Transportation. Fewer than 1% were related to air travel. And if you look at the figures in terms of fatalities per distance travelled, the comparative safety of air travel is even clearer. In 2022, there were just 0.001 passenger deaths per 100,000,000 miles onboard airlines, compared with 0.54 in passenger vehicles, according to the most recent figures from the National Safety Council, a US-based non-profit organisation. "Be careful how you make your trip to the airport" said Mr Aaltonen. "That's the most dangerous part of the trip compared to the actual flight."
