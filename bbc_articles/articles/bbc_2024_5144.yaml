  England winger Immanuel Feyi-Waboso signs a new "long-term" contract with Premiership side Exeter.

  Last updated on .From the section Rugby Union

  England winger Immanuel Feyi-Waboso has signed a new "long-term" contract with Premiership side Exeter.

  The 21-year-old has had a breakout campaign for the Chiefs, scoring six tries in 14 games, and made three appearances as England finished third in this year's Six Nations.

  The former Wales youth international joined Exeter after the collapse of Wasps in October 2022.

  He has balanced his rugby with studying medicine at Exeter University.

  "People are probably aware we've been looking to bring in young players to reduce the age of our squad in more recent times," Exeter boss Rob Baxter said.

  "Ultimately, we saw a player who had massive physical attributes and huge potential, but hadn't played a lot of rugby.

  "We hoped that we could give him that game time and that opportunity, then hopefully he would come through and obviously things have happened very quickly for him - which I'm delighted with.

  "It's great to know that he's going to be here long-term and hopefully we can really help him with his rugby development so that he can go on to get many more England caps and see what else he can achieve down the line."
