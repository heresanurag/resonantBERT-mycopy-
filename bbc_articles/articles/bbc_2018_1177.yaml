id: bbc_2018_1177
title: Senator at Oval Office meeting confirms Trump's slurs - BBC News
date: '2018-01-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42668369
content: |-
  Dick Durbin says the president said "these hate-filled things, and he said them repeatedly".

  Democratic Senator Dick Durbin was present at the Oval Office meeting where President Donald Trump reportedly called Haiti, El Salvador and African nations "shithole countries".
