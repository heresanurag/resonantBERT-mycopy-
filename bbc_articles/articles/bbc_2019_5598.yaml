title: 'NI council elections: David Ford hails ''positive'' Alliance vote - BBC News'
date: '2019-05-04'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-48153862
content: |-
  Former Alliance Party leader David Ford says the party have been polling strongly in the council election.

  Former Alliance Party leader David Ford has hailed the party's performance so far in the council election.

  He said the strong numbers was testament to the party's leader Naomi Long and deputy leader Stephen Farry.
