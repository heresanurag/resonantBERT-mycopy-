title: Sheffield nurse Paul Grayson charged with hospital sexual offences - BBC News
date: '2021-12-08'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-59577675
content: |-
  Police say 13 charges relate to Paul Grayson's work at Sheffield's Royal Hallamshire Hospital.

  A number of offences are alleged to have taken place at the Royal Hallamshire hospital

  A nurse has been charged with a series of sexual offences against staff and patients at a Sheffield hospital.

  Paul Grayson, an operating theatre nurse at the Royal Hallamshire, faces 20 charges including sexual assault and voyeurism.

  South Yorkshire Police said 13 of the alleged offences were said to have been committed at the hospital between 2017 and 2020.

  Ch Supt Shelley Hemsley said the case was "extremely unsettling".

  Police said 10 counts of voyeurism and three of sexual assault were allegedly committed against hospital staff and patients.

  Three of the voyeurism charges and one of the sexual assault charges relate to recordings of the "intimate areas" of three unidentified female patients.

  Ch Supt Hemsley, the district commander for Sheffield, said "significant and wide-ranging" inquiries had been carried out to identify the women.

  However, it was highly unlikely they would ever be able to be identified as existing lines of inquiry had been "exhausted".

  The seven other charges against Mr Grayson - one of taking indecent photographs of a child, three counts of voyeurism and three counts of making indecent photographs of children - were not related to his employment, police said.

  The 51-year-old is due to appear at Sheffield Magistrates' Court on 4 February 2022.

  Prof Chris Morley, chief nurse at Sheffield Teaching Hospitals NHS Foundation Trust, said the trust took the allegations "extremely seriously" and had "fully co-operated" with police.

  He said Mr Grayson had not worked for the trust since his arrest in December 2020 and that the matter had been reported to the Nursing and Midwifery Council.

  He went on to apologise for any distress caused and said any concerned patients should contact the trust.

