title: Vault artists breathe new life into former Shankill Mission Hall - BBC News
date: '2024-08-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c7v5nmg1g23o
content: |-
  A disused, listed building finds new purpose as a group of artists transform it into studio space.

  The artists breathing new life into listed building

  Albert Hall, more commonly known as Shankill Road Mission, is a Grade B2 listed building

  A disused, listed building has found new purpose in recent months as a group of artists have transformed it into functional studio space. Founded in 1896 by Rev William Henderson, the Shankill Mission aimed to address the spiritual and physical needs of the area's impoverished residents. The building closed in 2009 after serving as a community hub for more than a century, however its latest tenants are now hoping to welcome local residents back to the space. Vault Studios are hosting an open day in the heritage building on Saturday, following an 18-month refurbishment.

  The building's newest inhabitant, musician Joshua Burnside, said he is looking forward to "having a bit of a session" on Saturday

  Formed in 2017 as a community driven, non-profit charity, Vault's initial intention was to transform neighbourhoods by breathing life into disused buildings and providing affordable artist studio space. The collective - made up of musicians, circus performers, visual artists, dancers, and more - were previously based in a former college in east Belfast, which accommodated more than 100 people, but that site was closed for demolition last year.

