  In an awkward exchange, John Coates ordered politician Annastacia Palaszczuk to attend the Olympics.

  Australian Olympic Committee president John Coates has been heavily criticised for lecturing Queensland Premier Annastacia Palaszczuk during a press conference in Tokyo.

  The pair's awkward exchange took place after Queensland's capital, Brisbane, was awarded the 2032 Games.
