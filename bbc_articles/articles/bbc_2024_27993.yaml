title: Welsh language SP Energy Glasgow advert causes Celtic confusion - BBC News
date: '2024-11-15'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn7mjj7lk21o
content: |-
  A large billboard partly in Welsh appears in Glasgow advising customers what to do in a power cut.

  The SP Energy Networks advert in both English and Welsh appeared in Glasgow

  Passers-by in Glasgow were left scratching their heads after spotting an advert by an energy company in the Welsh language. Pádraig Durnin saw the sign in Scotland's biggest city and posted it on social media platform Bluesky with the caption: "Some corporate outreach to the southside of Glasgow’s Welsh-speaking community." Scottish Power, which owns SP Energy Networks, said it hoped "the people of Glasgow enjoyed their brief introduction to the beauty of this wonderful language". The sign, advising what to do in a power cut, was in English as well - but the company said it would make sure its bilingual signs were shown in the right places in future.

  Which translates to: "In a power cut, call us on 105, no matter who you pay your bill to." Mr Durnin added: "Broke: Govanhill is turning into Little London Bespoke: Govanhill is turning into Little Llanfairpwllgwyngyllgogerychwyrndrobwllllantysiliogogogoch." Other users also saw the lighter side, with some posting their own Welsh responses, including bendegedig (fantastic), and dwi'n caru hyn (I love this). One even claimed - and you will understand that BBC Wales has been unable to verify this - that almost 20 years ago a post office in Aberdeen had a window display in Welsh for four years. However, there is probably a simple solution for the accidental Celtic crossover. And that is that Scottish Power's 3.5m customers include thousands in north Wales. The company also sent its best wishes in Welsh for the health of Glasgow by signing off its statement: "Iechyd da!"
