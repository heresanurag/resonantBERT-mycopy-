title: 'Commonwealth Games: England''s Tom Bosworth wins race walk silver, Wales''
  Bethan Davies a bronze - BBC Sport'
date: '2018-04-08'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43686287
content: |-
  England's Tom Bosworth wins silver in the men's 20km race walk at the Commonwealth Games, as Wales' Bethan Davies takes bronze in the women's event.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Tom Bosworth won silver in the men's 20km race walk at the Commonwealth Games, as Wales' Bethan Davies won bronze in the women's event. Bosworth, who was disqualified at last year's World Championships while leading, finished four seconds behind Australia's Dane Bird-Smith. He came home in a time of one hour 19 minutes 34 seconds - a British record. Welsh athlete Davies finished three minutes 18 seconds behind gold medallist Jemima Montag of Australia. The 27-year-old spent much of the race in fourth place, before race leader Claire Tallent of Australia was disqualified with two kilometres left.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  New Zealand's Alana Barber took silver as England's Gemma Bridge finished in fifth place. Wales' second competitor Heather Lewis came seventh, and the Isle of Man's Erika Kelly was ninth. In the men's race, Kenya's African champion Samuel Gathimba took bronze as Englishman Callum Wilkinson, 21, finished seventh in 1:22:35. Bosworth collected England's 33rd medal of the Games on the Gold Coast. "I like to put on a show and I'm glad Dane walked away with the medal," he said. "Some people doubt what race walking is about - well we put on a show there. "It was entertaining and that is what the sport is all about."
