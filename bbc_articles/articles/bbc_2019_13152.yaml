title: Wales university staff begin pay and pensions strike - BBC News
date: '2019-11-25'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-50519630
content: |-
  They object to casual contracts, increases to pension contributions and a squeeze on wages.

