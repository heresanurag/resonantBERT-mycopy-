content: |-
  The actor launches a fund to help young working class students into drama school.

  'We want to find new voices' - Naomi Scott

  Scott played the role of Princess Jasmine in the 2019 live-action Disney film Aladdin

  "I didn't go to drama school, I didn't get the opportunity to... there may be barriers to entry to that sort of thing," says east London actress Naomi Scott. She co-founded production company New Name Entertainment with her husband Jordan Spencer four years ago. It now has a special fund to help students from working class backgrounds to attend top drama and film schools. "It's not just about learning the thing, it's also about navigating it. That's something that is really important to us," she says.

  "We set up the New Name fund to put certain students and people through drama school or a National Film and Television School (NFTS) course," she adds. "I just think it's really important. "When it comes to the idea of barriers to entry, I think that people who are from lower socioeconomic situations or from maybe environments that aren't supportive of that type of path... you're not set up to succeed." The fund also supports working class students with a programme of mentoring and career development support. "I think it's a real blessing to just be able to make things out of curiosity... and lean into that," Scott says. "The idea of New Name is because number one, we always want to feel like we are learning. "We also want to find new voices: new writers, film makers, ideas and stories." She adds: "We can't do everything, but we can do our small bit to maybe help some people have a clearer path to what they want to do."

  Scott returned to the big screen on Thursday in horror film sequel Smile 2, directed by Parker Finn. Scott's last big role was as Princess Jasmine in the 2019 live-action Disney film Aladdin, directed by Londoner Guy Richie. When not filming, Scott says she enjoys travelling around London. ''I love being in London," she says. "Best city in the world. "I do love going on the Tube... it reminds me of being a teenager and the first time of feeling independence. "I used to always go into London for castings, so I guess there's something nostalgic about it for me. And it's great public transport.
