title: World's tallest sandcastle built in Denmark - BBC News
date: '2021-07-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-57757530
content: |-
  Standing at higher than 21m in the Danish town of Blokhus, it is even decorated with Covid particles.

  Standing at just over 21m, the world's tallest sandcastle has been built in the town of Blokhus in Denmark.

  The structure, reinforced with glue and clay, took 4,860 tonnes of sand to make.

  It is open to visitors and will stand in place until the winter.
