  Soldier F is accused of two murders and five attempted murders on Bloody Sunday in 1972.

  Soldier F pleads not guilty to murders on Bloody Sunday

  Thirteen people were shot dead by the Army on Bloody Sunday

  A former British soldier has pleaded not guilty to charges of murdering two men on Bloody Sunday more than half a century ago. In June, lawyers for the ex-paratrooper known as Soldier F applied to have the case against him dismissed ahead of his trial. Judge Mr Justice Fowler dismissed the application at Belfast Crown Court on Friday. Soldier F is accused of two murders and five attempted murders when members of the Parachute Regiment opened fire on civil rights demonstrators in Londonderry on 30 January 1972.

  Thirteen people were shot dead and at least 15 others injured when soldiers opened fire in the Bogside.

  Soldier F is accused of murdering James Wray and William McKinney

  Lawyers for the former soldier had argued the evidence against him was insufficient. However, Mr Justice Fowler dismissed their application to stop the prosecution. The key evidence is statements from the time by two other soldiers. Mr Justice Fowler ruled they provided "a sufficiency of evidence" to continue. He said it would be for the trial to decide upon their admissibility, reliability and what weight to attach to them. Protected from public view by a large curtain pulled across a corner of the courtroom, Soldier F replied "not guilty" when each of the seven charges was put to him. Mr Justice Fowler also ruled that Soldier F's anonymity would continue to be protected, as there is a risk he could be targeted for attack if identified. A date for Soldier F's trial will be decided early in the New Year.

  This video can not be played To play this video you need to enable JavaScript in your browser. William McKinney's brother Mickey hopes a trial will begin "as a matter of urgency"

  Speaking outside court, William McKinney's brother Mickey said "another step" had been taken in the campaign for justice for the Bloody Sunday families. "We are very pleased that Soldier F's application was refused and that he will now proceed rightly for trial. "We are disappointed however that the trial judge has granted his application for anonymity and screening. "It is difficult for us to reconcile the fact that anyone with an interest in the events of Bloody Sunday has been aware of Soldier F's true identity and appearance for many years," he said. With next month marking the 53rd anniversary of Bloody Sunday, Mr McKinney said, it was "imperative that the court does not tolerate any more delay and that this trial proceeds as a matter of urgency." In a statement, the Bloody Sunday Trust (BST) welcomed the ruling but said there would be "widespread disappointment" that Soldier F's anonymity would remain in place. The trust commended the "continued determination of the families of William McKinney and Jim Wray".
