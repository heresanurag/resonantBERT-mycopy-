  • None He also faces charges of attempting to murder Patrick O'Donnell, Joseph Friel, Joe Mahon, Michael Quinn and an unknown person on the same date

  The SDLP MP for Foyle, Colum Eastwood, who was in court on Friday, described the ruling as "another step forward in the long campaign for justice for the Bloody Sunday families". "Today we received welcome confirmation that the charges against Soldier F will not be dismissed and that he will face trial for murder and attempted murder," he said. He said while it represented progress, "none of this is easy for the families". "It remains a matter of regret that the Public Prosecution Service failed to consult the families before deciding not to contest the anonymity order against Soldier F," he said.

  The decision on whether to prosecute Soldier F involved several legal challenges and U-turns. Having weighed up 125,000 pages of material, prosecutors said in March 2019 that they would send Soldier F to trial for the murders of Mr Wray and Mr McKinney, as well as several attempted murders. However, in 2021, prosecutors dropped the case after the collapse of the trial of two other Army veterans who were accused of another Troubles-era killing. At the time, the families of the Bloody Sunday victims said the decision was a "damning indictment of the British justice system" - their legal challenge against the decision was successful.

  The court then rejected an attempt by the Public Prosecution Service (PPS) to have its own appeal referred to the Supreme Court. Prosecutors subsequently announced that they had decided to resume the prosecution in September 2022. He was returned for trial in December 2023, a decision subsequently challenged by his lawyers in June. That hearing was the first time Soldier F had appeared in court in person since being charged.
