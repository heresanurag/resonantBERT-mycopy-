  England have to be 'perfect' to beat Spain - Southgate

  Gareth Southgate has reached three semi-finals with England

  England will have to be "tactically perfect" to beat Spain in Sunday's Euro 2024 final, manager Gareth Southgate says. England's men booked their first appearance in a major final on foreign soil with a 2-1 victory over the Netherlands in their semi-final on Wednesday. It's the third time in the past four major competitions that Southgate has guided England to the semi-final stage of either the Euros or the World Cup. Southgate says three-time winners Spain are the "favourites" for the final as England's men bid to win their first Euros title. "They would be rightly favourites for what they have done this tournament. They have been the best team," said Southgate. “They have got a day longer and in the past three finals, maybe more, it has been quite significant, so we have got to get our recovery spot on. “Tactically we will have to be perfect as they are such a good side. But, you know, we are here."

  Arsenal midfielder Declan Rice says England's defeat by Italy in the Euro 2020 final will serve as motivation on Sunday. Italy beat England 3-2 on penalties at Wembley after a 1-1 draw over 120 minutes in London. "Seeing Italy lift that trophy will haunt me forever," said Rice. "We are now presented with another opportunity where we can write our own history but we are up against another top side who we have to massively respect. "Hopefully now we can do it. Not only for each other but also for the manager. I think he deserves it." Chelsea's Cole Palmer said the side can "finish the job" and change their lives forever by winning in Berlin. Palmer came off the bench to provide the assist for fellow substitute Ollie Watkins' last-minute winner in Dortmund. "Last night on the bus, tunes were on, [in the] changing room, everyone was just enjoying it. "But obviously it's a short turnaround and it's a massive, massive game to change our lives, our family's lives, and to make everyone proud. That's what we're trying to do. "I think if you've got to this final then you have to hopefully finish the job. It's all good getting to the final, and you've got to enjoy it because you don't get many moments to enjoy. But, no, everyone just wants to win so bad."

  Southgate's side have shaken off a slow start to the tournament to reach a second Euros final in as many attempts. Palmer, who won the European Championship at Under-21 level with England in 2023, feels the Three Lions have found their rhythm. "In the first few games, we didn't play the best that we could and everyone knew that," added Palmer. "But now I think as the tournament's gone on, especially yesterday, I think we had our best game in the tournament, and that's what you want going into the later stages. "It's huge. We played them last year in the Under-21s final, England versus Spain. Even that was a massive game, so I can't imagine this one."
