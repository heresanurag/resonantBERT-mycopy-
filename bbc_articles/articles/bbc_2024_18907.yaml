content: |-
  Two men were being arrested in connection with a string of robberies when the officer was attacked.

  Police officer in hospital after being struck with brick

  The attack on the police officer happened on Chesterfield Road in Blackpool

  A police officer has been taken to hospital with a "significant" head injury after he was hit with a brick during an arrest, police have said. The officer was attacked while arresting two men on Chesterfield Road in Blackpool on Friday as part of an investigation into a string of robberies in the resort. Lancashire Police said one of the men struck an officer with a brick. A 30-year-old man, of no fixed address, was arrested on suspicion of robbery, assault causing grievous bodily harm, and for prison recall. A second man, aged 37 from Preston, was arrested on suspicion of robbery.

  Assistant Chief Constable Karen Edwards said: "Whilst working hard to keep Lancashire’s communities safe, one of our officers has been assaulted resulting in a significant head injury. "Assaulting police officers is completely unacceptable and again shows the dangers that officers face every single day."
