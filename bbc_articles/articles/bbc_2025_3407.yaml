  Relations between the US and Ukraine soured after a testy exchange between President Trump and President Zelensky in the Oval Office

  What Ukraine's leader couldn't have predicted was how hostile the US's position would become. In return for giving the US a slice of its future wealth, Zelensky had wanted security guarantees - military assurances in case Russia breaks a future ceasefire. But the White House hasn't offered any, and instead has withdrawn vital military support to force a Ukrainian compromise. US President Donald Trump believes just the presence of American companies digging for critical minerals would put Russia off from invading Ukraine again. US businesses didn't exactly put Russian President Vladimir Putin off last time, but Zelensky has no choice but to agree, for now.

  Graphite is used for products like batteries, solar panels and electric car motors

  Graphite at the Zavallya quarry is processed at the sprawling refinery site a short distance from the canyon. At its height, up to 60,000 tonnes passed through here every month, now it's around 5,000. It's sorted into different grades before being sold around the world to make products like batteries, solar panels and the motors found in electric cars. As it is for most of the year, it's an industrial ghost town. It's why Valerii Kharkovets, a chief engineer, would welcome an investment in any form. "Security guarantees are unlikely, as this agreement is more economic than military," he says. "But if foreign companies are involved, those Ukrainian territories might be left alone." For Ukraine and the US to make a profit in critical minerals, it could take decades. But Kyiv needs to secure more than just an investment in Saudi Arabia. If, as reports suggest, a minerals agreement isn't enough to win the Trump administration over, a herculean diplomatic effort will be required as well. Neither Ukraine nor its European friends can afford a repeat of the verbal exchange we saw in the Oval Office.
