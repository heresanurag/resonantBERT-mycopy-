id: bbc_2024_19230
title: 'PSNI: Arrest after man with knife threatens children in park - BBC News'
date: '2024-08-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c9x8x70wdewo
content: |-
  Children are left "in shock" following an incident which police have described as "terrifying".

  Police said a man was arrested on suspicion of two counts of common assault and possession of an article with a blade or point

  A group of children have been left "in shock" following an incident in a Lurgan park in which they were threatened by a man with a knife. Youth workers who intervened in Lord Lurgan Memorial Park on Thursday evening have been praised for their actions. A man has been arrested following the incident, which police have described as "terrifying". Sinn Féin councillor Keith Haughian said he understood the youth workers physically stood between the man and the youngsters.

  Councillor Haughian says the children, their parents and the youth workers are "shocked" by the incident

  He said the group of about a dozen children aged between 12 and 13 had been in the park for much of the day. They had been doing activities with the Drumgor Detached Youth Work Project. "The children were left quite shocked, as you would imagine," Cllr Haughian said. "The youth workers probably understood the gravity of it a bit more. "So it was a case of trying to get the children to calm down and obviously inform the parents. The youth workers have been absolutely fantastic and without them last night, I'm not sure what we'd be dealing with this morning."

  The Drumgor Detached Youth Work Project praised their team members "who ensured that all young people were kept safe"

  Police located a man, who was armed with a knife, at a house in a street near the park where he was arrested on suspicion of two counts of common assault and possession of an article with a blade. In a statement, the Drumgor Detached Youth Work Project said its team had been engaging with young people in the park. "An incident then occurred which resulted in our staff intervening to de-escalate the situation," it said. "I would like to praise the actions of the team who ensured that all young people were kept safe. "As an organisation, we will continue to support the young people and staff who have been impacted by this event."

  Cllr Haughian said youth workers tried to "calm down" the children after the incident

  Cllr Haughian said parents in the area would have found the incident "quite shocking". He added: "But it's to reassure them that there were youth workers on the ground and I want to pay tribute to them, and also the police who responded very, very quickly. "I want to take time to appreciate that they were here so quickly. "So while it is a shocking incident, there is a lot of comfort knowing that the services were there to help."
