  On their behalf, Priscilla Presley read the tribute at a memorial service for her daughter Lisa Marie Presley.

  One of Lisa Marie Presley's daughters has paid tribute to her late mother at a memorial service in Graceland, Tennessee.

  It was read out by Lisa Marie's mother, Priscilla, to a crowd of mourners.

  Watch to hear the emotional tribute in full.
