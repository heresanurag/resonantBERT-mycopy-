  Officials say they tracked Mr Frisiello through his online purchase of a "glitter bomb" which was sent to a Stanford University professor.

  According to charging documents, "a glitter bomb is a letter containing glitter sent to an unsuspecting individual that, when opened, spills out onto the recipient".

  Mr Frisiello is due to make his first court appearance later on Thursday.
