title: The retailers living in fear of violent shoplifters in Edinburgh's Morningside
  - BBC News
date: '2024-12-18'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c623j8k7xy6o
content: |-
  One woman working in a store in Edinburgh's Morningside area was knocked to the floor and throttled by a thief.

  The retailers living in fear of violent shoplifters

  Ms Ness said the problem was the worst she had experienced in 40 years

  Shop staff in an upmarket Edinburgh neighbourhood say they have fears for their safety after attacks by shoplifters. One retailer in Morningside was knocked to the floor and throttled by a thief in the store where she works, while a colleague was punched in the face. Another shop owner in the area had a knife pulled on him during an attempt to rob the store. Police have responded by increasing patrols in the area and giving out a life-size cardboard cut-out of a police officer, which has been placed outside a prominent hardware store.

  Shopkeepers have welcomed the increased police presence but warn that cuts to policing have left shoplifting in effect "decriminalised". Their concerns come after retailers on the city's Royal Mile spoke out about smash-and-grab thieves stealing thousands of pounds' worth of goods from their stores in recent months. Anne Ness, the secretary of the Morningside Traders Association, said: "There has been an increase [in shoplifting] in the last couple of years but now it's at the point it's mad, it's completely off the scale. "We feel fearful in the shop now because we don't know how they are going to react." Ms Ness, who runs Houseproud of Morningside, said the situation was the worst she had known in 40 years of business. "We have groups of individuals and their sole purpose is to steal, they will steal anything," she said. "You see them on street corners and in the bus stops comparing who's got what."

  The cardboard cop is outside Anne Ness' store, Houseproud of Morningside

  She accepted an offer from the police to place the "cardboard cop" outside her shop and believes it makes potential thieves think twice. "I think it is a deterrent, people have to look twice to see what it is, so we are pleased to have it," she said. However, she said if there had been "proper prevention" in place a lot of the attacks and thefts would not have happened. "Police should be there to prevent crime, not just to react to crime," she said. Mandy Johnston, a shop manager at Toys Galore, was left badly bruised and shaken after an attack at the store on 3 December. The 60-year-old stood in the way of a woman who tried to leave with a £40 Lego set she had not paid for.

  The thief knocked her to the floor and put her hands around her throat. Donald Nairn, the shop's owner, said he was trying to pull the woman off his colleague when he was punched in the face by a male accomplice. "The people who are doing this have realised policing isn't as effective as it once was," Mr Nairn said. "Not because police aren't trying to do the best they can - they are all dedicated but they don't have the resource. "The priorities of the Scottish government haven't been policing." He said community policing had "ceased to exist in any meaningful form" and shoplifting had in effect been "decriminalised". "We are left fighting the fight on our own," he added.

  Donald Nairn on his CCTV camera just before he was attacked in his Toys Galore shop

  Moby Ali, who owns the Techfixd store, said he had a knife pulled on him by a man who was attempting to run off with a mobile phone. A female passer-by was taken to hospital after being knocked over and injured during the incident in November. "I am shocked how this could happen in this peaceful community," Mr Ali added. "This has changed me a little bit and I'm now very vigilant with customers." Police said a 51-year-old man had been charged in connection with the incident.

  Moby Ali says he is now more vigilant with customers

  Justice Secretary Angela Constance said she recognised the significant disruption and harm that retail crime caused. "I condemn any violence against retail workers and would always encourage retailers to report all crimes to Police Scotland." She said the government's budget, if approved by parliament, would make £3m available in 2025-26 to tackle retail crime. This is in addition to an investment next year of a record £1.62bn for policing – an increase of £70m on 2024-25. Insp Scott Casey, of Police Scotland, said there had been a rise in shoplifting incidents. "We have been working with retailers and traders' associations in the south east area of Edinburgh to help deter, prevent and investigate retail crime. "We have a real focus on targeting retail crime with dedicated high visibility foot patrols in the area who can also provide retailers with the latest retail crime material and advice and share best practice. "With regard to incidents in the area, we are following positive lines of enquiry. "We would encourage those employed within the retail sector to come forward and report any criminal activity, with the assurance all reports will be thoroughly investigated."
