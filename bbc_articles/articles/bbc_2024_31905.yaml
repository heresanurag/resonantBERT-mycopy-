title: 'Newspaper headlines: ''Tory war with Farage'' and Just Stop Oil ''hypocrites''
  - BBC News'
date: '2024-12-26'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c2ex4lm0m89o
content: |-
  Friday's papers include stories on a clash of words between Nigel Farage and Kemi Badenoch.

  'Tory war with Farage' and Just Stop Oil 'hypocrites'

  There are a range of stories on the front of Friday's post-Christmas newspapers. Former Tory Justice Secretary David Gauke tells the Times, external that thousands of prisoners should be moved to low security jails to tackle the overcrowding crisis. Gauke says England and Wales should emulate Spain - which allows many inmates to work and study during the day. The Guardian, external leads with a warning from the Institute of Public Policy Research think tank, that the NHS risks "paralysing uncertainty", as it waits to see Health Secretary Wes Streeting's ten-year plan for reform. Climate campaign group Just Stop Oil has been accused by the Daily Express, external of hypocrisy for selling merchandise made in the Dominican Republic. The paper says the organisation makes "no apology for the carbon creating journey" the goods make.

  The leader of Reform UK, Nigel Farage, says his party now has more members than the Conservatives

  The Daily Telegraph, external splashes on a a war of words between Conservative leader Kemi Badenoch and Reform UK's Nigel Farage about which party has more members. Farage and Badenoch's accuse each other of faking their membership figures, according to the front of Friday's i newspaper, external. In other domestic news the Daily Mirror, external leads with a story from Milton Keynes where two women died and a teenage boy and a man were both seriously injured in a suspected stabbing at a block of flats on Christmas Day. Finally, the Daily Star, external says the start of 2025 is expected to ring in "erratic changes" in the weather according to the Met Office, bringing rain, stronger winds and even snow in some parts of the UK, but not for long.

