title: 'GDPR quiz: How will data privacy law affect you? - BBC News'
date: '2018-05-24'
section: Technology
url: http://www.bbc.co.uk/news/technology-44224802
content: |-
  Test your knowledge of how the EU's data protection law could affect you.

  Tougher data privacy rules come into effect on Friday, impacting any organisation handling personal information linked to EU residents.

  The General Data Protection Regulation (GDPR) is pretty complex and it looks like many firms are still struggling to understand what it means for them, even at this late stage. Many members of the public are none the wiser. So, how well do you understand the new law...?

