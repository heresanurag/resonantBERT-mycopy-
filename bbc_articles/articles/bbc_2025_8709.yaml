  Eli Sweeting, originally from Bristol, is missing after a solo mountain hike in New Zealand.

  Large-scale search for missing Briton in New Zealand

  A "large-scale air and ground search" is continuing for a British hiker who has been missing for a week in New Zealand. More than 40 staff and volunteers are hunting for Eli Sweeting, who is originally from Bristol. The 25-year-old was reported missing on May 4 after failing to return from a solo hike up Mitre Peak, a steep mountain in Milford Sound area of Fiordland National Park on the country's South Island. New Zealand Police has said they "remain positive" despite the challenging terrain, which means at times they can only progress 250 metres (0.1miles) an hour. Helicopters, dogs and locals have been assisting with the hunt, and some of his family have also flown out to help.

  In a fundraising post, his sister Serena Sweeting described her brother as one of the "kindest, most compassionate people". "We just want him home safe," she said. The search party has been focusing on a route heading down the mountain after spotting a light there, but the dense area makes it hard for infrared cameras to detect any signs of movement. The operation was briefly halted on Wednesday and Thursday due to weather warnings, but resumed again on Friday and Saturday.

  Rescue teams have spotted a light on Mitre Peak which they are investigating

  Police confirmed this weekend there was "large-scale air and ground search effort planned for the coming days". The area where Mr Sweeting has hiking has incredibly steep rough terrain, but police said they remained hopeful as Mr Sweeting is an "experienced hiker". The police spokesperson added: "While the [man] has not yet been located, police remain positive as the search remains ongoing. "A Land Search and Rescue team stayed near Mitre Peak overnight to continue the search early this morning."

