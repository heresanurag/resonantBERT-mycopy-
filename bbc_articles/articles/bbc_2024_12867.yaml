title: People from across the world welcome solstice at Stonehenge - BBC News
date: '2024-06-22'
section: General
url: http://www.bbc.co.uk/news/videos/crgg998yr1ro
content: |-
  Summer solstice is one of the rare occasions when visitors can touch the stones.

  Thousands of people from all over the world came to Stonehenge to see the sunrise on summer solstice.

  They were able to come close to the stones and even touch them.

  People said it "felt emotional" and was a "spiritual experience".

