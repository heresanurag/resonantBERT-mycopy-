title: World breaks hottest day record twice in a week - BBC News
date: '2024-07-25'
section: Climate
url: http://www.bbc.co.uk/news/articles/crg7pen1xj7o
content: |-
  The global average temperature broke a record set in 2023, partly driven by heat in Antarctica.

  The record for the world's hottest day has tumbled twice in one week, according to the European climate change service. On Monday the global average surface air temperature reached 17.15C, breaking the record of 17.09C set on Sunday. It beats the record set in July 2023, and it could break again this week. Parts of the world are experiencing powerful heatwaves including the Mediterranean, Russia and Canada. Climate change is driving up global temperatures as greenhouse gas emissions released when humans burn fossil fuels warm the Earth's atmosphere. "While fluctuations are to be expected, as the climate continues to warm, we are likely to keep seeing records being broken, and each new record is taking us further into uncharted territory," says Prof Rebecca Emerton, a climate scientist at the Copernicus Climate Change Service. The naturally-occurring climate phenomenon El Niño also added heat to the climate in the first six months of this year but its effects have now waned. Extreme heat is a serious health hazard, with thousands of deaths attributed to high temperatures every year. In 2000-2019, almost half a million heat-related deaths around the world occurred each year, according to the World Health Organization. China has issued heat alerts this week, with central and northwestern areas of the country recording temperatures higher than 40C. Russia has been battling wildfires in Siberia, and Spain and Greece also endured days of high temperatures. In the US, more than 40 million people on Tuesday faced dangerous temperatures, and wildfires have broken out in western areas of the country.

  The global average temperature usually peaks in July or August during summer in the northern hemisphere. The northern hemisphere has large land masses - like the US or Russia - that warm up faster than the oceans that dominate the southern hemisphere. The recent sudden rise in temperatures is also down to significantly-above-average temperatures over large parts of Antarctica, according to Prof Emerton. Large swings in temperature are not unusual in Antarctica at this time of year - they also contributed to record temperatures in 2023. Sea ice in the region is almost as low as this time last year, which also leads to above-average sea temperatures in the Southern Ocean. “The hottest day record has been broken once again because the world continues to burn huge amounts of oil, gas, and coal," says Friederike Otto, Senior Lecturer in Climate Science at Grantham Institute at Imperial College London. “Every broken record is a warning that our climate is heating to dangerous levels. These warnings are becoming much more frequent; however, we have all the tools, technology and knowledge to stop things from getting worse – replace fossil fuels with renewable energy and get emissions down to net zero as quickly as possible," she added.
