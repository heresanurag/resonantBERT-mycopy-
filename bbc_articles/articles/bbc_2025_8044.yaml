title: Trump's agenda grapples with political and economic reality - BBC News
date: '2025-04-06'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c05np01y809o
content: |-
  Trump says it’s all going to plan but stock market turmoil plus struggles at home and abroad show how hard it is to deliver as president.

  Donald Trump, in announcing his sweeping new tariffs on US imports on Wednesday, promised that the history books would record 2 April as America's "liberation day". After two days of stock market turmoil, however, this may also be remembered as the week the president's second-term agenda ran headfirst into economic - and political - reality. US stocks have been in a tailspin since Trump unveiled his tariffs at Wednesday afternoon's White House Rose Garden event, with signs that America's trading partners - Canada, the European Union and China, most notably - are not backing away from a fight. Meanwhile, other presidential efforts, on foreign policy and immigration, and at the ballot box - have faced notable setbacks in recent days.

  The White House on Thursday felt a bit like a building battening down for a coming storm. The four big posters showing America's "reciprocal" tariffs on a long list of countries were on prominent display in the press briefing room, but administration officials available to respond to media questions were few and far between. Out on Pennsylvania Avenue, workers unloaded pallets of metal fencing, which will ring the White House grounds in preparation for what officials anticipate to be a large anti-Trump demonstration at the nearby Washington Monument on Saturday. The first lady announced that a White House garden tour event that had been scheduled for that day had been postponed because of security concerns. Even the normally loquacious president stopped only briefly to talk with the crush of reporters on his way to board the Marine One helicopter on the first leg of his journey to Florida. "I said this would be exactly the way it is," he declared when asked about the day's stock market turmoil. The markets - and America as a whole - would soon boom, he said. The president, it seems, is willing to wait out the tempest created by his tariff plan. He appears confident that his economic vision of a rebuilt, job-rich American manufacturing sector protected from foreign competition - a vision he has closely held for decades - will ultimately be proven right.

