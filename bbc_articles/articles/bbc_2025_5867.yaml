content: |-
  Ann Bigger took up the sport in January and has earned her yellow striped belt.

  Ann Bigger took up taekwondo in January

  A grandmother has earned her first graded belt in taekwondo at the age of 83. Ann Bigger, who only took up the combat sport in January, earned her yellow striped belt on Monday after practising night and day. Mrs Bigger, from North Hykeham, Lincolnshire, is taught by her son Mark Bigger, who said the martial art was good for physical and mental health at any age. She said she had not been able to sleep "because there's a lot to learn. It's hands this way and feet that way."

  Mrs Bigger is being taught the martial art by her son Mark

  Mr Bigger, who has been teaching at the North Hykeham Tae Kwon Do Club for 15 years, decided to introduce an afternoon class for older people. Mrs Bigger said she had not realised what she had let herself in for when she signed up but began to enjoy it. "It's good for the old brain," said the grandmother-of-two, referring to the co-ordination of her hands and feet. "I love the companionship. Afterwards we go downstairs and sit for an hour and have a coffee and a chat." Mr Bigger said his mum had been getting no special treatment and "needs to up her game a bit".

  Mrs Bigger said she initially thought she would not be able to take up the sport aged 83

  He said his mum had been the "perfect student" and had even been practising in the supermarket. Mr Bigger said: "What I initially thought was going to be a bit of a laugh turned into three months of training at least twice a week. "She has actually taken it really seriously and has exceeded my expectations throughout, while also having such a good laugh. "She's met new people, she's got stronger fitness, she's even been to the doctors and been told her blood pressure is down, so what a great achievement. I'm really proud of her." Mrs Bigger, who started as a white belt, said she had been "a bit nervous" about attempting her first grading. She added she had not thought she would be taking up the sport aged 83 but described herself as "lucky to be able to do it".

