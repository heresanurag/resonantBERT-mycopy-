  During the hearings, lawmakers also grilled Kennedy on his promotion of health misinformation and knowledge of the US healthcare system. He was asked to explain his stance on abortion, as he previously indicated that he was in favour of abortion rights. He responded by telling lawmakers he agreed with Trump that access to abortion should be controlled by individual states and that "every abortion is a tragedy". The exchange drew scrutiny from Democrats who accused Kennedy of "selling out" his pro-choice values in order to secure President Trump's nomination. One of his hearings was interrupted by shouting protesters. But he also received loud applause when promising to make America healthy again, a slogan used by Trump's administration. Ahead of the hearing, Caroline Kennedy - the cousin of Robert F Kennedy Jr - urged US senators to reject him as the next health and human services secretary. She said Kennedy's views on vaccines disqualify him from the role of being one of America's leading health policymakers. It wasn't enough to dissuade several Republicans who previously withheld their support from Kennedy but wound up approving his nomination during Thursday's vote. Many eyes were on Louisiana Senator Bill Cassidy, a Republican, who chairs the Senate Health Committee. Cassidy, a doctor, previously indicated that he was struggling with Kennedy's stance on vaccines. He voted to confirm Kennedy. "We need to make America healthy again, and it is my expectation that Secretary Kennedy will get this done," Cassidy posted on X after the vote. Others closely watched McConnell, a Kennedy critic and polio survivor. McConnell had warned Kennedy not to undermine the polio vaccine. "Individuals, parents, and families have a right to push for a healthier nation and demand the best possible scientific guidance on preventing and treating illness," McConnell said in a statement. "But a record of trafficking in dangerous conspiracy theories and eroding trust in public health institutions does not entitle Mr. Kennedy to lead these important efforts." The Senate continues moving forward with Trump's nominees. After confirming Kennedy, lawmakers are expected to advance the nomination of Howard Lutnick as the next Secretary of Commerce. This tees up the final vote for his confirmation to take place next week. Lawmakers are also expected to take up the nomination of Kash Patel, Trump's controversial choice to lead the Federal Bureau of Investigation (FBI), and Kelly Loeffler, Trump's pick for Small Business Administrator, after the picks received approval from a key committee on Thursday. Trump's pick to head the education department, Linda McMahon had her confirmation hearing on Thursday as well. This puts a handful of cabinet picks through a key hurdle and sets up confirmation votes of Lutnick and Loeffler no sooner than Tuesday, given the President's Day long weekend.
