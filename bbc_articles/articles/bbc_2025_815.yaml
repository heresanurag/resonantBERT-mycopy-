content: |-
  Kennedy will oversee the US health industry including food safety, pharmaceuticals and vaccinations.

  RFK Jr sworn in as US Health and Human Services chief

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Moment RFK Jr is sworn in as US health secretary

  Robert F Kennedy Jr, one of President Donald Trump's most controversial cabinet picks, has been sworn in as the next US Health and Human Services Secretary. The former presidential candidate will now oversee key health agencies with about 80,000 employees and a trillion-dollar budget. Lawmakers on both sides of the aisle had questioned his baseless health claims and vaccine scepticism. On Thursday, Kennedy was confirmed by a 52-48 vote. No Democrats backed him. Former Senate Majority Leader Mitch McConnell was the lone Republican to vote against Kennedy. Kennedy is the latest cabinet appointee installed as the president seeks to rapidly overhaul almost every level of government.

  The Senate is putting in late nights and early mornings as they hurry to round out the president's cabinet by confirming his remaining nominees. Lawmakers also approved Brooke Rollins as head of the Department of Agriculture by a vote of 72-28. Kennedy, who had his swearing in ceremony in the Oval Office, is the second controversial cabinet pick to be confirmed this week after Tulsi Gabbard was confirmed as director of National Intelligence in a narrow Senate vote on Wednesday. He will now oversee agencies such as the Centers for Disease Control and Prevention (CDC), the Food and Drug Administration (FDA), the National Institutes of Health (NIH) and the Centers for Medicare and Medicaid Services. Kennedy will also be charged with overseeing the US health industry which includes food safety, pharmaceuticals, public health and vaccinations. He ran for the White House himself in 2024 as an independent, but dropped out and backed Trump. The president's decision to tap Kennedy to lead the federal health agency drew scepticism from several Republicans. Many questioned Kennedy's past comments on immunisations, his ties to groups making unsubstantiated health claims and his views on abortion. Kennedy is the founder of the anti-vaccine group Children's Health Defense, which gained prominence in the US for casting doubt on the safety and efficacy of childhood vaccinations and making the discredited claim that the shots are linked to autism. Kennedy, the nephew of former President John F Kennedy, has denied that he is anti-vaccination, pointing out his own children are immunised. He insisted during his confirmation hearings that he merely supports more stringent studies and safety tests for injections. Some Republicans have praised Kennedy for his criticism over the use of food additives and push to curb big pharma.

