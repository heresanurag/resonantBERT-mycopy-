title: 'Operation Sanctuary: A survivor''s story of grooming gangs - BBC News'
date: '2018-09-26'
section: General
url: http://www.bbc.co.uk/news/uk-45618989
content: |-
  A victim of Newcastle's grooming gangs tells the BBC she believes "warning signs" were missed.

  A year on from the jailing of 18 people as part of Operation Sanctuary in Newcastle, an abuse survivor tells her story.

  Nicole - not her real name - tells the BBC about her experience and how she believes the authorities missed "warning signs".
