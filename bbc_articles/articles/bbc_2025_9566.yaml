  VE Day celebrations being held in the UK, France, Canada and other parts of the world this year mark 80 years since World War Two formally ended in Europe with Germany's unconditional surrender shortly after Berlin fell to Soviet forces. Russia commemorates the occasion as the end of what it calls the "Great Patriotic War". It is one of the most important holidays in the country and is marked by a massive parade. About 27 million Soviet citizens died during the war, which started in 1939 when Germany, alongside the Soviets, invaded Poland. According to statistics published online by the US National WWII Museum in New Orleans, about 418,500 Americans were killed in both the European and Pacific theatres of the conflict. Of the total, about 416,000 were military casualties. The US has not historically recognised VE Day. The country was still at war with Japan on the Pacific front for several more months after conflict ended in Europe. Veterans Day, known as Remembrance Day in the UK, was formerly known as Armistice Day in the US to mark the end of fighting in Europe on 11 November 1918. After World War Two and the Korean War, it was renamed to honour all US military veterans. Memorial Day, which always falls on the last Monday in May, honours Americans who were killed in battle.
