id: bbc_2019_1924
title: 'Abortion in Northern Ireland: Derry Girls join protest - BBC News'
date: '2019-02-27'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-47377612
content: |-
  Women march to Parliament to represent those forced to fly to England and Wales for treatment.

  Twenty-eight women, representing the number of women who fly from Northern Ireland for an abortion every week, marched with suitcases to parliament.

  They included MPs and actors from the TV comedy Derry Girls.
