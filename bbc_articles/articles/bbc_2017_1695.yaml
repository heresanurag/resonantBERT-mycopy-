title: 'Trump state visit: Protests outside as MPs debate petition - BBC News'
date: '2017-02-21'
section: General
url: http://www.bbc.co.uk/news/uk-politics-39034097
content: |-
  Protests take place in London as MPs debate whether Donald Trump should be given a state visit to the UK.

  Protests took place in central London as MPs clashed over whether US President Donald Trump should be given a state visit to the UK.

  The debate was triggered by two petitions - one against a state visit, which got 1.85 million signatures, and one in favour which got 311,000.

  A group of anti-Trump protesters gathered in Parliament Square, while similar demonstrations were organised elsewhere around the UK, including in Edinburgh, Manchester, Liverpool, Cardiff and Newcastle.
