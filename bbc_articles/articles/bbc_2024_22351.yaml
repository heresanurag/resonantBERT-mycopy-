  St Johnstone owner Adam Webb is being treated for cancer of the head and neck and will soon take medical leave.

  Adam Webb took majority ownership of St Johnstone in July

  St Johnstone owner Adam Webb is being treated for cancer of the head and neck. In an open letter,, external American lawyer Webb shared his health news and said his "prognosis is very good". The club sacked manager Craig Levein earlier this week and majority shareholder Webb intends to lead the appointment of a new boss before taking medical leave, aiming to return in December. "Since taking majority ownership of the club in July, I have taken an active role as owner and chairman," Webb said. "In a few weeks, the doctors tell me I will not be able to continue that active role.
  • None Who has your Premiership club brought in & let go?

  "Prior to that date, we will have all of our top priorities in good shape, including the installation of our new head coach/manager. Indeed, I will be leading the effort to select our new coach in the coming days. "CEO Fran Smith will serve as acting chairman while I take medical leave. I have requested that work on our priorities and improvements continue unabated. We've made a great start and we cannot pause now." Webb said he will not be in Perth "for some time" and added that "several of my co-investors will be attending games this autumn... and I will be staying informed". Interim manager Andy Kirk admitted he was "really shocked with the news". "It is not a great time for him and his family, but the club are behind him and everyone sends their best wishes from here, we hope the treatment works well and we see him back here soon," he said. Levein's departure and Webb's announcement comes with St Johnstone sitting 10th in the Scottish Premiership with one win from five games before they visit Ross County on Saturday. "It is football, it just throws things to you that you have got to deal with very quickly," Kirk said. "Obviously the manager losing his job was one thing, but the news of Adam coming out as well is extremely sad. "He has been across, he has been very positive, he was really supportive on the phone calls I have had with him. He has got a lot of good ideas for the football club and hopefully those things can come off." Asked if he would like to be considered for the manager's job on permanent basis, Kirk added: "It is not something I have thought about short term. "That is a decision for the club. If they want to have a conversation at some point around those things then absolutely I will have the conversation, but at the minute, this is about the team."
