content: |-
  Christian Michel has been held for six years in the high-profile AgustaWestland corruption case.

  Indian court orders release of Briton held without trial for years

  Christian Michel was in India's custody since 2018 when he was extradited from the United Arab Emirates

  A British man detained in India for six years without trial over a high-profile corruption case must be released on bail, the Delhi High Court has ruled. Christian James Michel, an arms consultant, is accused of bribing Indian officials to win a multimillion-dollar helicopter contract for British-Italian defence company AgustaWestland. He denies the charge. He was extradited to India from the United Arab Emirates in 2018 and has been in custody ever since, in what a judge called an "exceptional" situation. The AgustaWestland controversy was one of several corruption cases linked to India's former ruling Congress party, some of which fizzled out eventually.

  In 2010 the Indian government signed a deal with AgustaWestland's parent company to purchase 12 helicopters. The alleged irregularities came to light when India's federal auditor reported that the government may have vastly overpaid for the $753m (£455m) deal, which was eventually scrapped in 2014. According to court documents, Mr Michel is alleged to have received around €42m ($44.7m, £25m) for securing the contract. His lawyer has argued that there is no evidence to connect him with the alleged offence. India's financial crime fighting agency and domestic crime bureau have held separate investigations into Mr Michel. But both of those investigations have yet to be concluded and trials have yet to begin, leading to a "prolonged incarceration" of Mr Michel, the Delhi High Court noted. The judge said his six years in pre-trial custody was also "alarmingly close" to the maximum punishment of seven years' imprisonment for money laundering, which is one of the charges he faces. The court decided to grant him bail in one of the cases, after the Supreme Court did the same in another case on 18 February. This means that Mr Michel is now free to leave Delhi's high-security Tihar jail, but he cannot leave India as his passport has been seized. The deal for 12 three-engine AW-101 helicopters was signed in February 2010 after AgustaWestland beat off competition from US and Russian rivals. The aircraft were intended for an elite squadron of the Indian air force which ferries around the president, the prime minister and other VIPs. Only three of the helicopters were delivered to India before the deal was scrapped. Italian prosecutors suspected that kickbacks worth almost $67.6m were paid to Indian officials to secure the contract. Giuseppe Orsi, the former chief of AgustaWestland's parent company which at the time was called Finmeccanica, and Bruno Spagnolini, the former head of AgustaWestland, were tried in Italy on fraud and corruption charges. Both were acquitted in 2018. Indian officials have said their acquittals would have no bearing on the case in India. India's air force chief at the time of the deal was arrested for bribery in 2016, and later released on bail.
