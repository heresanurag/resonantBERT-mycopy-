title: Donald Trump impersonator in demand after US election - BBC News
date: '2024-11-24'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/c5yxzrlge59o
content: |-
  Donald Trump impressionist Mike Osman is inspired to keep performing after the US election.

  Mike Osman began impersonating Donald Trump in 2016, when he was running to be president against Hillary Clinton

  A Donald Trump impressionist has said his phone did not stop ringing after the result of the 2024 US presidential election. Mike Osman, a comedian from Southampton, was almost ready to retire his blonde wig and fake tan. But news of the Republican's return to the White House has inspired him to carry on. After launching his act in 2016, he now describes himself as the UK's number one Trump impersonator.

  This video can not be played To play this video you need to enable JavaScript in your browser. The comedian has been studying Trump's mannerisms for years

  With more than 16 million views on TikTok, Mr Osman has spent years working on his act, named Donald Trumped. Despite having a southern English accent, the comedian seems to imitate Trump's voice with ease. "The first thing you've got to do is get the wig - and you've got to get it right," he said. The impressionist wears a bespoke hairpiece created by wig designers, which is regularly re-styled by a hairdresser. Next is perfecting the costume, in particular Trump's suit and iconic crimson tie. "The tie is about eight foot long," he joked, adding his seamstress neighbour had made it especially for him. But the most important part of being a Donald Trump impersonator, he said, was replicating his eyes and mouth. "I have watched a lot of videos of Donald, believe me," he added.

  Mr Osman says he does his own make-up for the act

  The morning after the presidential election in November, Mr Osman said demand for his act was high. "I'm non-political, I have no axe to grind doing Donald Trump, the American people have decided," he said. "I'm the UK's number one Donald Trump impersonator - interestingly, I'm in the top five in the world, according to a survey." Mr Osman grew up on a council estate in Millbrook, a suburb of Southampton. "Nothing wrong with that," he said. "But if you'd have said to me when I was growing up in Millbrook that I would be the top five in the world at anything, you know, I'd have taken that." President-elect Donald Trump will take office in January.

