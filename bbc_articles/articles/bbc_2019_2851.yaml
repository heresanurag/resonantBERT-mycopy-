title: NHS let me down, says health manager with cancer - BBC News
date: '2019-03-14'
section: Health
url: http://www.bbc.co.uk/news/health-47528886
content: |-
  A patient with late-stage bowel cancer hits out as figures show cancer waits are at their worst level since records began.

  Lisa Pammen has spent most of her working life in the NHS - first as a paramedic and then as a manager of a group of GP practices.

  But when she really needed the NHS, it was not there for her.

  For 18 months, she struggled with abdominal pains - but despite visits to the GP and hospital, her cancer was not spotted.

  Only after the 49-year-old ended up in accident and emergency (A&E) was she diagnosed with late-stage bowel cancer, which had by then spread to her ovaries and abdomen.

  It took her three months to start treatment from the original GP referral - despite the fact the NHS is meant to do this within two months.

  Mrs Pammen, from York, said: "I feel let down.

  "It was extremely frustrating as I felt like I was left floundering for weeks and no-one was listening to me.

  "I was in intense pain and had a family history of bowel cancer and yet it felt like these things were being ignored.

  "I genuinely feel that because of these long referral times all my worry and anxieties were heightened, and it's made the treatment 10 times harder to deal with."

  Sadly, the problems experienced by Mrs Pammen are not unique.

  Latest figures from the NHS in England show only half of patients are diagnosed at an early stage, while nearly one in four patients waits longer than they should for treatment to start - the worst performance since records began, in 2009.

