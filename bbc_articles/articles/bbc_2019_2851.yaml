  Sara Hiom, of Cancer Research UK, said the whole system was being undermined by a lack of staff.

  "The figures show an NHS under continued strain, with many patients still waiting too long to get a diagnosis and start treatment."

  Pressure has been growing for some time. The target to see patients within two months has been missed for more than three years.

  In fact, this target has been met in only three months out of the past 60.

  And during that time, 130,000 patients have waited longer than they should have for their life-saving treatment.

  Dominic Bell, a manager at Macmillan Cancer Support's helpline, said it was as bad as he had known.

  "I've worked on the support line for the last seven years and throughout that time we've taken more and more calls from people going out of their mind with worry while they wait for a diagnosis and treatment.

  "Dealing with the prospect or the reality of a cancer diagnosis can be one of the most difficult experiences people will go through in their lifetime."

  Other parts of the UK are also struggling.

  Scotland, Wales and Northern Ireland all expect 95% of patients to be seen in 62 days.

  The last time any of those nations met the target was 2012.

  And, of course, the problems are not just confined to cancer.

  The latest figures show A&E performance has also dropped to its worst level.

  Under 85% of A&E patients were seen within four hours during February - well below the 95% target.

  Patricia Marquis, of the Royal College of Nursing, said: "What's worrying about all the figures is that they come at a point when we haven't yet had severe weather in England, and flu and norovirus levels are low."

  A spokesman for the NHS in England accepted there were challenges but said the increases in demand had been "significant".

  He said extra money was being invested in the health service in the coming years to provide more care to more people.
