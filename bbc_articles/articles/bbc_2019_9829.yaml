title: 'Dover: Ferry passengers stuck at sea due to high winds - BBC News'
date: '2019-08-11'
section: Kent
url: http://www.bbc.co.uk/news/uk-england-kent-49304501
content: |-
  The Port of Dover said it was "one ship in, one ship out", as heavy rain also caused rail delays.

  Ferries at Dover have been delayed by up to five hours

  Passengers were stuck on cross-Channel ferries off the Dover coast as the port operated a "one ship in, one ship out" policy due to high winds.

  Crossings between Dover and Calais were delayed by up to six hours, with tugs deployed to guide ships into port, P&O Ferries said.

  A man was also severely hurt when a tree fell on him in London.

  And train passengers across the UK faced disruption caused by the winds and flooding.

  P&O has said it will accommodate passengers on the "first available sailing once you reach check-in" and the wait time was a maximum of six hours.

