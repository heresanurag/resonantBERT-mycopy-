content: |-
  Watch Trump and Melania kiss as balloons drop to mark end of Republican convention.

  Donald Trump kissed his wife on stage at the end of the Republican convention, before balloons dropped down from the ceiling.

  After Mr Trump accepted the Republican presidential nomination, he made a speech talking about the recent attempt on his life.

  He was then joined on stage by his wife Melania Trump, before Ivanka Trump and Jared Kushner walked out, along with Eric Trump and Donald Trump Jr and their families.
