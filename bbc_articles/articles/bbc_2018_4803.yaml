title: 'Olivier Awards 2018: Hamilton wins seven prizes - BBC News'
date: '2018-04-09'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-43694573
content: |-
  The hip hop musical snaps up the most prizes on British theatre's biggest awards night.

  Hip hop musical Hamilton dominated the night, picking up seven awards from its 13 nominations.

  It equals Matilda's 2012 record for the most Olivier Awards won by a musical.

  The West End production of Lin-Manuel Miranda's show about US founding father Alexander Hamilton won, among others, best new musical and outstanding achievement in music.
