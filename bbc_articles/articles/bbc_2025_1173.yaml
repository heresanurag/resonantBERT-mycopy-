title: 'Baftas red carpet in pictures: Zoe Saldaña and Mikey Madison among stars at
  film awards - BBC News'
date: '2025-02-16'
section: Culture
url: http://www.bbc.co.uk/news/articles/cr46g45nvdko
content: |-
  Stars including Cynthia Erivo, Mikey Madison, Adrien Brody and Ariana Grande were in their finest outfits.

  Stars were all smiles despite the chilly weather as they walked the red carpet at London's Royal Festival Hall, for this year's Bafta Film Awards.

  Nominees and guests posed for photos as they gathered for the UK film calendar's biggest night.
