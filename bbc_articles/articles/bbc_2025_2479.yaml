title: AC/DC to play Edinburgh in first Scottish concert in a decade - BBC News
date: '2025-02-03'
section: Scotland
url: http://www.bbc.co.uk/news/articles/clykv830410o
content: |-
  The band will perform one UK concert in Edinburgh in August, concluding their Power Up European tour.

  AC/DC last performed at Hampden Park, Glasgow in 2015

  Rock legends AC/DC have announced they will play their first Scottish concert in a decade this summer. The group will play 12 dates across 10 countries before concluding their tour at Murrayfield stadium in Edinburgh on 21 August. Formed in Australia in 1973, the band have a loyal Scottish fanbase through Scottish-born members Bon Scott and Angus and Malcolm Young. Fans last saw the band on Scottish soil in 2015 at Hampden Stadium but the group continue to be celebrated annually at BonFest in Kirriemuir.

  The Edinburgh show is the only performance the band will give in the UK with other dates across Europe starting in June. The Power Up tour, named after the band's latest studio album, kicks off in the Czech Republic on 26 June. The album is the band's first since the death of Malcolm Young in 2017. Lead singer Brian Johnson previously told the BBC the band still has a "big connection" with Scotland. He said when the band got together again to work on the album, they "really wanted to do something for Malcolm - just to make him proud. "He was the band," he said. "Him and Angus started it, but it was Malcolm's idea. He was our spiritual leader."

  Malcolm and Angus Young co-founded the group after moving from Glasgow to Australia

  Malcolm and Angus Young were born and raised in Glasgow, moving to Australia in 1963. A decade later, the first iteration of AC/DC was formed. The line up went through many permutations, but stabilised around the Young brothers, singer Bon Scott - who was born in Angus and also moved to Australia - drummer Phil Rudd, and bassist Mark Evans. When Bon Scott died of alcohol poisoning in 1980, he was replaced as lead singer by Brian Johnson. The concert adds to an already busy line-up at Murrayfield this summer with Oasis set to perform three nights in August. AC/DC have sold more than 200 million albums worldwide and were inducted into the Rock and Roll Hall of Fame in 2003. Tickets for the band's European shows will be available from 10:00 on 7 February.
