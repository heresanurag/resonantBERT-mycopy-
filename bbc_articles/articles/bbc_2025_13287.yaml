content: |-
  He is the first star of the original movie series to appear in the spin-off stage show.

  'Draco is back' - Harry Potter star Tom Felton to reprise role on stage

  Felton said joining the cast of the play would be "a full-circle moment for me"

  Tom Felton is to reprise his role as the villainous Draco Malfoy in the Harry Potter stage show on Broadway. It marks the first time that a star of the Harry Potter movies has joined the spin-off stage production, Harry Potter and the Cursed Child. The hit play - which serves as an epilogue to the famous wizard's story, following on from the end of the book series - opened in London's West End in 2016 before transferring to New York two years later. Felton said: "It's surreal to be stepping back into his shoes - and of course his iconic platinum blond hair - and I am thrilled to be able to see his story through and to share it with the greatest fan community in the world."

  He will play the role at New York's Lyric Theatre for 19 weeks from 11 November.

  He appeared in all eight Harry Potter movies

  The English actor featured opposite Daniel Radcliffe, Rupert Grint and Emma Watson on screen in the film franchise from 2001 to 2011. Now 37, he will become the first member of the cast to join the stage show, which takes place 19 years after the end of the original story, with Harry, Ron and Hermione, as well as Draco, all sending their own children to Hogwarts. "Being a part of the Harry Potter films has been one of the greatest honours of my life," Felton said in a statement. "Joining this production will be a full-circle moment for me, because when I begin performances in Cursed Child this fall, I'll also be the exact age Draco is in the play." He added: "I look forward to joining this incredible company and being a part of the Broadway community." He also posted a teaser video on Instagram, external, in which he dons Draco's blonde wig and black robes and reaches for his wooden wand before menacingly asking: "Scared, Potter?" A caption then reads: "Draco is back."

