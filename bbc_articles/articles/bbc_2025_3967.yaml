  The Princess of Wales was seen sipping a Guinness to mark the day with the Irish Guards.

  The Princess of Wales has marked St Patrick's Day with the Irish Guards regiment in London.

  Catherine was seen sipping a Guinness before presenting medals to soldiers who had recently returned from Iraq.
