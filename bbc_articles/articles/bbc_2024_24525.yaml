title: Acid attack at west London school leaves girl seriously injured - BBC News
date: '2024-10-01'
section: London
url: http://www.bbc.co.uk/news/articles/cjd51x9yr89o
content: |-
  Police hunt a male suspect after two teens and a woman were hurt by a substance at a London school.

  Girl, 14, seriously hurt in acid attack at school

  A number of crime scenes are in place at the school following the attack

  A 14-year-old schoolgirl has been seriously injured after a substance, believed to be acidic, was thrown at her and another teenager outside her school in west London, with a staff member also becoming hurt while trying to help them. The girl remains in hospital with potentially life-changing injuries following the incident at Westminster Academy, Westbourne Park, which took place after school hours on Monday afternoon. The Metropolitan Police says it believes the two teens were approached on Alfred Road by a male "who threw a substance at them before fleeing down Harrow Road". The force described the suspect as a tall and slim black male wearing dark clothing and riding an e-scooter.

  It added the male's face was obscured "possibly by a mask or balaclava", and he rode the e-scooter to and from the scene. A boy aged 16 remains in hospital with non life-changing injuries, and the staff member, a woman aged 27, has been sent home from hospital. Westminster Academy said the injured teenage boy was a member of the public and not a pupil at the school. Two police officers were also taken to hospital by London Ambulance Service as a precaution after they reported feeling unwell, but have since been sent home. Met Police officers attended the incident after being flagged down while on patrol on Alfred Road by the staff member at about 16:40 BST.

  Lessons at Westminster Academy have moved online and staff are working from home following the attack

  Two fire crews and hazardous materials specialists from London Fire Brigade were also sent to the scene to make it safe. A Met police spokesperson said: "Tests of the substance are ongoing. At this stage officers believe it to be acidic." The school is closed, with lessons taking place online and many staff working from home.

  A Year 6 open morning for prospective students looking to join the school was due to take place on Tuesday but was cancelled, the school said. Westminster Academy's principal Numera Anwar said: “This was a distressing incident which took place after school hours when students and staff were leaving the school site. “This is a difficult time for our community and I took the decision to close the school today to allow for a thorough investigation and to ensure the school can resume normally from tomorrow [Wednesday] with all safety measures in place," Ms Anwar said. “We are working with the local authority and will have counsellors and other support available onsite. The welfare of the students at Westminster Academy is always our priority and that continues to remain the case." She also warned against speculation into the nature of the incident, "as this will not be helpful and may compromise the investigation". "This will clearly be an unsettling time for the wider community and parents."

  A number of crime scenes remain in place as investigations are carried out, the Met Police says. Adam Hug, leader of Westminster City Council, described the attack as "truly shocking" and said the local authority was assisting the school. "The council has been in touch with Westminster Academy and we will provide educational psychologists and any other support to help children through what is a traumatic ordeal. "Our thoughts are with all those who have been affected." He added: "Clearly this attack will be unsettling for the whole academy and the wider community, and we will be working with police to provide reassurance and whatever support we can." The Met said anyone with information should call police via 101 or share information anonymously by calling CrimeStoppers on 0800 555 111.
