title: 'Shelley Duvall: Tributes paid to ''unforgettable'' actress - BBC News'
date: '2024-07-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/crgm4wpng34o
content: |-
  Duvall was known for her role in horror classic The Shining and her work with director Robert Altman.

  Tributes have been paid to actress Shelley Duvall, known for her role in horror classic The Shining and her work with director Robert Altman, following her death at the age of 75. Duvall played Wendy, the wife of Jack Nicholson's terrifying hotel caretaker in Stanley Kubrick's 1980 horror classic The Shining, based on Stephen King's book. Paying tribute, King wrote, external: "Very sorry Shelly Duvall has passed. Wonderful, talented, underused actor." She also appeared in films including Annie Hall, Popeye, Nashville and 3 Women, and was fondly remembered for producing and presenting beloved 1980s children's TV show Faerie Tale Theatre. British actor Malcolm McDowell described her as, external "a dear friend and wonderful actress who played quirky/offbeat characters in some great films by Bob Altman". He added: "And of course her great performance in Kubrick’s The Shining. It was a pleasure working with her on Faerie Tale Theatre."

  Filming The Shining took its toll on Duvall

  Actress Mia Farrow said, external she was "SO good - and always mesmerizing". Farrow wrote, external: "Very very sad to hear that the unique and truly wonderful actor Shelley Duvall has died. She leaves us many unforgettable performances." Director Edgar Wright posted, external: "RIP to the truly iconic Shelley Duvall, who burned up the screen in many funny, intense and idiosyncratic roles. "I especially loved her in McCabe & Mrs Miller, Thieves Like Us, Nashville, the extraordinary Three Women, Annie Hall, Time Bandits, Roxanne, her Olive Oyl in Popeye (best comic book casting ever?) and, of course, her fierce, unforgettable performance as Wendy Torrance in The Shining. "Whatever horrors are conjured up in that film, its power stands and falls on Duvall’s terrified reactions. What an incredible screen presence she was." Singer Paul Simon, a former boyfriend, wrote, external: "So sorry to hear of Shelley’s passing. Sweet, talented eccentric." Actress Riley Keough posted, external a photo of Duvall and added the word "legend".
