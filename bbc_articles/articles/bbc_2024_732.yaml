title: 'Taiwan election: DPP supporters celebrate at rally - BBC News'
date: '2024-01-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-67967549
content: |-
  Democratic Progressive Party supporters celebrate at a rally as their opponents concede in the Taiwan election.

  Democratic Progressive Party supporters have celebrated their opponents conceding in the Taiwan election at a rally outside their party headquarters in Taipei.

  The results mean current vice-president William Lai is set to be Taiwan's next president.

  The BBC's Shaimaa Khalil was at the rally.
