content: |-
  Record-breaking England batter Danni Wyatt-Hodge signs for Surrey's new professional women's team.

  Record-breaking England batter Danni Wyatt-Hodge has signed for Surrey's new professional women's team. The 33-year-old has played 278 matches for England since her international debut, aged 19, in 2010, and was part of the team that won the World Cup in 2017. She is England's all-time leading T20 women's international run-scorer, having overtaken Charlotte Edwards in 2024. Wyatt-Hodge joins a Surrey team who are part of the new structure in women's domestic cricket with eight counties hosting professional teams in 2025. "I love playing at the Kia Oval and can't wait to entertain the Surrey supporters," Wyatt-Hodge said., external "The South East Stars' positive brand of cricket was an important factor in joining the club," she added, in reference to the team who formerly played at The Oval in the previous domestic structure. Wyatt-Hodge has spent the past seven years with Hampshire-based Southern Vipers and helped them win five trophies in the past five seasons. She has represented Nottinghamshire, Sussex, Lancashire Thunder, Vipers and Hundred franchise Southern Brave in various domestic competitions.

  Charlie Dean became the fastest woman to amass 50 one-day international wickets

  Wyatt-Hodge's departure from the Utilita Bowl was announced alongside that of team-mate Charlie Dean, who is also set to pursue opportunities outside Hampshire. Off-spinning all-rounder Dean, 23, departs Hampshire having represented the county in various guises since under-13 level. She became the fastest woman to take 50 one-day international wickets, reaching that milestone in just 26 matches, and has played for England in all three formats. "I can't speak highly enough of how important Hampshire and Southern Vipers have been in my cricketing journey," Dean told the club website., external "Since I joined Hampshire as a teenager, the coaches and staff have been exceptional, and it's been a privilege to call Utilita Bowl my home since 2017. "The successes we've had as a team have been nothing short of incredible, and I'll look back fondly on my time here." Hampshire are among the eight counties selected to compete in Tier One of the sport's new structure, along with Durham, Essex, Lancashire, Nottinghamshire, Somerset, Surrey and Warwickshire.
