  A visual guide to how the gender pay gap measures up at 10,433 UK companies

  10,443 companies have disclosed the average difference between what they pay men and women. Each dot represents one company.

  If you work at a large firm it probably pays the average man more than the average woman - 8,124 companies pay men more, while just 1,424 pay women more. 895 companies have reported no pay gap at all. Let's get rid of those for now.

  This is what it looks like when we reorder the companies by the size of their gender pay gaps. The ones at the top and bottom have reported the biggest difference between what they pay men and women.

  EasyJet pays men 47.9% more. That's one of the widest pay gaps reported among larger firms.

  The ones closest to the middle have the smallest pay gaps, for instance Royal Mail, with a 1% pay gap.

  The average pay gap reported is 9.6%, meaning that for every £1 the average man earns, the average woman takes home 90p. This means the gap has barely moved from last year, when it was 9.7%. The gender pay gap doesn't tell us if women are being paid less for the same job, something which has been illegal for decades. But it does let us size up the differences in men and women's occupations and working patterns. Women are much more likely to work part-time, and are under-represented in senior roles.

  Take airlines. Many have reported big pay gaps. Why? High-paid pilots are almost exclusively men, while women predominantly work as lower-paid cabin crew. Other airlines like EasyJet, TUI, Flybe and Jet2.com all have pay gaps of at least 40%.

  Let's look at the banks. The finance and insurance sector has one of the widest pay gaps. Women working in this sector are paid 22.9% less than men.

  Barclays Investment Bank, Lloyds Bank and Clydesdale Bank all report pay gaps of close to or above 40%.
