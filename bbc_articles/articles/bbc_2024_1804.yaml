title: Video shows fire engulfing Valencia tower block - BBC News
date: '2024-02-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-68379494
content: |-
  Firefighters In the Spanish city rescued some of those trapped, but were unable to save others.

  At least five people have died, and as many as 15 are missing, after a massive fire ripped through two joined apartment blocks in the Spanish city of Valencia, emergency services say.

  The blaze engulfed a 14-storey block in the Campanar neighbourhood and spread to an adjoining building.

  Firefighters were seen rescuing people from balconies.

  Experts say that highly flammable cladding on the building enabled the fire to spread rapidly.

  Read more: Four dead and more missing in Spain tower block fires
