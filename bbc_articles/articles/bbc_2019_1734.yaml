  Justin Chang from the Los Angeles Times was particularly scathing of Green Book's triumph, calling it "the worst best picture Oscar winner since Crash." Crash, a multi-stranded drama about race relations in contemporary Los Angeles, was the widely reviled winner of the best picture award in 2006.

  "Green Book is about as traditional a choice as you can get," wrote The Independent's Clarisse Loughrey, describing its win as "a case of the same old, same old".

  The film, which was released in the UK earlier this month, takes its title from a guidebook African-American travellers once used to negotiate the United States.

  Viggo Mortensen and Mahershala Ali as Tony Vallelonga and Don Shirley

  So what is it about Farrelly's film that has rubbed so many the wrong way? For many, it's the idea that the film perpetuates the "white saviour" trope that can be found in so many Hollywood films about bigotry and intolerance.

  Ali's character, real-life musician Don Shirley, is pivotal to the story. Yet its real protagonist is Viggo Mortensen's Tony "The Lip" Vallelonga, a bouncer-cum-bodyguard whose friendship with Shirley makes him wise up to his own racial prejudices.

  According to Vox's critic Todd VanDerWerff, the film "lets white folks off the hook for whatever responsibility we bear for the crushing weight of systemic racism". The film has also been criticised for its use of a so-called "magical negro" figure whose sole function is to facilitate positive change in a white character.

  Green Book won the People's Choice award at last year's Toronto Film Festival - an award seen by many as a reliable indicator of Oscar glory. Yet the film would soon run into a number of public relations potholes that made last night's win seem like a remote possibility.

  First came Mortensen's use of 'the N-word' in a post-screening Q&A session, an incident for which he issued a fulsome apology. Then came criticism from members of Shirley's family, who dismissed the film as "a symphony of lies" that exaggerated Vallelonga's relationship with his employer.

  Nick Vallelonga with two of Green Book's Oscars

  In January, Farrelly issued his own apology for exposing his penis to colleagues in the late 1990s, saying he had been "an idiot" and that he was now "deeply sorry".

  More contrition followed from Vallelonga's son Nick, one of Green Book's writers, over a 2015 tweet in which he claimed he had seen Muslims in New Jersey celebrating the 9/11 attacks.

  Controversy dogged Green Book all the way to the Oscar ceremony itself, with some questioning whether it was right to have veteran congressman John Lewis present its best picture citation. The US author and journalist Raquel Cepeda wrote that President Donald Trump "would have been a better peddler of Green Book's saccharine propaganda".

  Yet it would be wrong to say the film is entirely without friends. "I don't care about what they say, Green Book is a such a fantastic movie and deserved that freaking Oscar!" tweeted one defiant fan on Monday.

