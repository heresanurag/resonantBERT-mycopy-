title: Belfast student builds robot to solve Rubik's Cube - BBC News
date: '2024-09-13'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c20rqyk27rvo
content: |-
  Ruarcc, from St Malachy's College, started to create puzzle-solving robot prototypes aged 12.

  Ruarcc the year 10 student who has programmed a robot that can solve a Rubik's Cube puzzle

  A 13-year-old schoolboy has built a Lego robot that can solve a Rubik's cube. Ruarcc, from St Malachy's College in north Belfast, first took steps to create puzzle-solving robot prototypes in his second year at school, aged 12. This was made possible after the school launched its creative digital technology hub (CDTH) last year. Teacher Clare McGrath commented she "didn't believe" that Ruarcc's robot would work at first.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'People are amazed my robot can solve Rubik's Cube'

  Ruarcc told BBC News NI it was "frustrating", but he worked on making it better. "People tend to be amazed that it can solve one," he said. "Now that it's working, it's really rewarding, and it feels great." Ruarcc said he has already set his sights on a future career in the IT industry, possibly as a software engineer. His creation uses 5,000 lines of Python code and can solve the puzzle from any pre-set variation using colour sensors.

  Teacher Clare McGrath said the creation was very impressive

  Following the launch of the creative digital technology hub, the college started a new Key Stage Three curriculum. This included programming Lego robots, such as Ruarcc's, using block-based coding. Clare McGrath is the senior leader for creative skills at the college. Ms McGrath said pupils, once they had the basics down, were allowed to explore different methods of programming online to learn more than they had in the classroom. "A few of the boys were given the chance to take kits home with them; I said, build what you want... impress me," she said. "He showed me it working; there's 5,000 lines of Python code; no matter what way you mix it up, the robot will solve it, and it's very impressive. "Creativity is an amazing skill, so we need to be providing opportunities in school to see where they can take things - that builds the innovators of the future."

  One of two new digital technology suites where students are learning different coding methods

  It was the school principal, Paul McBride, who pitched the idea of the new hub. He wanted to renovate an old lecture theatre and the idea gained support from the Belfast Charitable Society and the James Kane Foundation. The new hub has been made available to pupils and staff from schools across north Belfast to develop their digital skills. Mr McBride said: "We have 10 or 11 post-primary schools from north Belfast coming here, and we want them all to use it. "By the end of our third year, we'll have 6,000 students and over 100 staff using the facilities.
