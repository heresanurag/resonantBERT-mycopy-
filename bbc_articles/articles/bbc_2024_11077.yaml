  After a second single, Somebody Told Me, crept into the top 40, The Killers were signed to Island Records in America and Mr Brightside was re-released. This time, the song caught fire, making the top 10 in both the UK and US. Even so, there was no indication that Mr Brightside would become a defining anthem of the 2000s. Flowers first realised Mr Brightside could become one of those songs when The Killers played Glastonbury's John Peel tent in 2004. "It went off," the singer told Rolling Stone., external "It looked like footage of the Sex Pistols!"

  Mr Brightside was nominated for a Grammy in 2006

  Pretty soon, the song began to reappear in the lower reaches of the charts. It made number 100 in the first week of 2005, as fans spent their Christmas record tokens (remember those?) on the remaining copies of the single. Once downloads started being counted towards the countdown in July 2005, Mr Brightside would pop into the charts every time The Killers played a festival or toured the UK. Meanwhile, the song became a staple of wedding parties and student discos. Ed Balls shrugged off his defeat in the 2010 Labour leadership race with a karaoke version, and Coronation Street star Andy Whyment made it his party piece, external on I'm A Celebrity... Get Me Out Of Here. In December 2018, Mr Brightside reached the landmark of one million pure sales (ie downloads and CD sales). But its unparalleled chart run truly began in 2014, when the Official Chart Company incorporated streams into its calculations.

  Brandon Flowers has received a new Top 10 Award from the Official Charts Company

  Since then, it has taken up semi-permanent residence in the lower reaches of the countdown, becoming the most-streamed song of any track released before 2010. At the time of writing, it features on 60 million separate Spotify playlists. The company says it's most likely to appear on playlists designed for road trips, although it also features on Billie Eilish's Life Playlist, external and compilations from Ultimate Party Classics to Darts: All the Walk-On Songs. While some bands grow to resent the idea of being forever associated with their debut single, Flowers has said he's proud Mr Brightside has "stood the test of time", insisting in 2015, external: "I never get bored of singing it." Fans, it seems, never get bored of hearing it either. This article updates an earlier version first published in April 2021, when Mr Brightside was announced as the UK's longest-running chart hit.
