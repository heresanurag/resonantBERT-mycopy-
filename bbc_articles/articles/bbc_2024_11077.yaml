title: 'Mr Brightside: The Killers'' hit becomes the biggest song never to top charts
  - BBC News'
date: '2024-05-09'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-68920975
content: |-
  The Killers' rock hit has become the biggest single never to reach number one. How did it happen?

  It started out with a kiss, how did it end up like this? It's a question that has rung out across dancefloors for more than 20 years. The answer, for The Killers' Mr Brightside, lies in breaking chart records... if not actually topping the charts. The 2000s indie-rock anthem has now overtaken Oasis' Britpop ballad Wonderwall to become the UK's biggest-selling single never to reach number one. According to the Official Charts Company, Mr Brightside's 5.57 million combined sales and streams also make it the UK's third biggest song of all time, surpassing Wham!'s festive staple Last Christmas. This is calculated from an eye-watering 530.3 million streams (100 paid streams or 600 free streams equal one sale) and 1.1 million copies sold since it was first released in 2003. It already holds the record for the UK's longest-running chart hit, after spending 408 weeks - or seven whole years - in the UK top 100. Its closest competitor, Lewis Capaldi's Someone You Loved, is far behind, with 234 weeks in the countdown at the time of writing.

  Mr Brightside is streamed 1.8 million times a week on average in the UK. Last year proved its most successful on streaming services, with a cool 80 million plays. Not bad for a song that only reached number 10 in the UK on its second release in 2004 - and didn't chart at all the first time around. Now a crowd favourite from indie discos to wedding dancefloors and karaoke bars, nowhere is its cross-generational appeal more evident than at the band's live festival shows. Luke Broadhurst, 51, says the song is "one of the few the whole family loves", including his teenage son and daughter. "Festivals have given it legendary status for us, from Latitude, with my then 10-year-old old daughter Roxy on my shoulders, to seeing them headline Glastonbury in 2019. "Being part of 130,000 fans was about as biblical an experience as you can get."

  Music fans Luke and his daughter Roxy, pictured with Ed Sheeran at Kingston's Banquet Records, say Mr Brightside is a family favourite

  Roxy, now 17, says experiencing Mr Brightside at Reading Festival with her friends was "the best thing I've seen live - uplifting, a sense of unity, it's seen as the national anthem. "At house parties people belt out the lyrics, it's a classic." Reflecting on the song's seismic impact, The Killers frontman Brandon Flowers told the Official Charts Company: "It's incredible. I recently went to see Ed Sheeran in Las Vegas, and I joined him for a version of Mr Brightside. "These are people that may not be Killers fans, but it just lit up like a casino in this place when we started playing Mr Brightside." So how did it all happen?

  Flowers wrote the lyrics when he was about 20, after discovering his girlfriend had been cheating on him. Around that time, Flowers met guitarist Dave Keuning, who'd already written Mr Brightside's backing track. As soon as Flowers heard that chiming riff, his heartbreak spilled onto the page.

  "When I first heard those chords, I wrote the lyrics down and we didn't waste much time," he told Spin magazine., external "That's also why there's not a second verse. The second is the same as the first. I just didn't have any other lines and it ended up sticking." The primitive demo was a much darker song. Flowers alternately sounds angry and on the verge of tears - his vocals raw and raspy against a grungy, fuzztone guitar.

