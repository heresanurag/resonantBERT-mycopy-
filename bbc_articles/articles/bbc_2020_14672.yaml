  A growing number of countries are stepping up restrictions on British travel after the government announced more restrictions.

  Readers' stories: 'I am missing potentially the last Christmas with my parents'

  “I am missing potentially the last Christmas with my parents.” The nurse says the original guidance for the rules to be relaxed for a five-day window over Christmas would have been the first opportunity to see her parents safely because of her job and their age. Her father also has prostate cancer. She lives with her husband and two daughters, aged 18 and 21, in Thame, Oxfordshire, and her parents, who are in their 70s, live five hours away in Northumberland. With the rule change, they are allowed to meet only on Christmas Day as they are in tier two and tier three respectively. She received approval from her boss to work from home for the two weeks leading up to 23 December and her family had also been isolating too, she says. “I cried myself to sleep last night as did my mother and my dad broke down on the phone to me which I have never heard before,” she says. “That is how my Christmas has been affected. I don’t know when or whether I will see my parents again.”
