title: 'Syria ''chemical attack'': Family seen in hospital video speak - BBC News'
date: '2018-04-16'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43776015
content: |-
  This is the story of Masa and her family, who survived the suspected chemical attack in Syria, in her own words.

  Speaking on Sunday alongside her mother, she described how she and her entire family were hiding in a basement when a "barrel" dropped.

  Update: 16 April 2018 Our original report confused the identities of identical twin girls in Syria. This item has been edited to correctly identify the two girls featured in the video.
