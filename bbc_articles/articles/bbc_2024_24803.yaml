content: |-
  Steve Clarke was denied a tangible and much-needed piece of optimism as Croatia inflicted Scotland's latest honourable defeat, writes Tom English.

  Scotland head coach Steve Clarke has presided over a run of one win in 15 games

  From Poland sickening Scotland late in the day at Hampden, to Cristiano Ronaldo doing the same in Lisbon, it was VAR's turn on Saturday night in Zagreb to bring the haunted look back to the faces of Steve Clarke's team. A point at the end? Glory be! But, no. Life is not like that for this Scotland right now. Offside. Goal ruled out. Defeat, again. From Spain to France, from the Netherlands to Germany, from Portugal and now Croatia, Scotland's miserable run carries on. Call it The Errors Tour. The end wasn't swift in Zagreb; it was a slow burn like many before it. A goal in the 100th minute to lose to the Hungarians, a goal in the 97th minute to lose to the Poles, a goal in the 88th minute to lose to the Portuguese, a goal disallowed in the 94th minute to lose to the Croatians. "Always make the audience suffer as much as possible" was the mantra of the great film-maker Alfred Hitchcock. Psycho and all of that. Right now, this Scotland team’s life is one giant loop of the shower scene. For Janet Leigh read the Tartan Army, screaming in horror at another late loss bursting through the curtain. Those words from Hitchcock could become Clarke’s catchphrase. One win in 15 and yet more agony prior to Portugal’s visit to Hampden on Tuesday night. Stand by for something wild. Scotland winning 2–0 when the floodlights fail or the heavens open or a plague of angry birds descend forcing the players to flee. It's just where they are right now. Scotland could try and buy a win but their card would be rejected.

  This was a more than admirable performance, but another one that left Clarke trying to pick his players up from the floor. Another narrow defeat that had encouraging things in it, but one that extends the worst run of competitive results in Scotland's history. A draw would have arrested the grim feeling that has closed in on this group pretty much from the moment they qualified for the Euros, but they were denied the crumb Clarke would have turned into a feast. There is huge nuance in this, but you get the feeling that for many, any appreciation or understanding of nuance was cast into the bin in Stuttgart when Clarke sent his team out against Hungary in the Euros with a caution first-second-and-third approach in a game they had to win. The memory of it follows him around. It's his shadow. It’s the grey cloud above his head. It’s the noise that goes bump in the night. Clarke can point to three close-run things against class opposition in the three games since Hungary, but some have just tuned out. Not interested. Send us a message when there's a new manager. That's what Clarke is fighting. Cynicism and scepticism. Old friends. They were waiting for him when he first set foot in the job, then he chased them away and now they're back.

