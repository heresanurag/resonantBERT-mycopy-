  Scotland's defence was missing the first-choice goalkeeper and, arguably, four guys who might have started, but they were resolute. There is a degree of hope that down the line, when the cavalry returns, a new phase can be entered. Throw in Aaron Hickey and Kieran Tierney, Scott McKenna and Jack Hendry, Nathan Patterson and John McGinn, Lewis Ferguson and the pick of the kids - Lennon Miller, David Watson, Max Johnston and others - and the picture alters. For some, bionic vision might be required to see that future, though. When you’ve won one game - an ugly thing against Gibraltar - in a year then it can be hard to see beyond the present. Clarke is losing supporters by the game. That's the reality of it. Honourable defeats ain't changing that. So we move on to Hampden on Tuesday and Ronaldo with his nostrils flaring at the thought of getting at a defence that has conceded seven goals in three games in this group so far. One of them to him, of course. We move on to another patchwork team doing its damndest to defy the odds. The defeats we've seen in the Nations League have been altogether different in tone than the Hungary one in the summer, which was just an abomination. On Saturday, again, Scotland tried to play with as much ambition as they could, but it didn't bring the reward their manager is desperate for. Clarke will now try to get it against Ronaldo's boys. He'll have mercy, won’t he?
