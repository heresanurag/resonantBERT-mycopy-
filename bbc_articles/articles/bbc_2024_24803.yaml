  Shorn of an entire team with at least three, and possibly as many as five or six, certain starters missing, Scotland showed a whole lot of resilience. They weren't outclassed. They weren't overrun. Luka Modric was a fairly hushed presence for 45 minutes and even though his influence grew, this was not the Modric show we've seen before against Scotland. Scotland took the lead and then lost it. They fell behind and then, for a few glorious seconds, looked like they'd drawn level. A point would have been a springboard for Clarke. A tangible piece of optimism. Once more he was left talking about positive signs and being on the right road and hoping against hope that his doubters are listening and understanding. There were positive signs and you could easily argue they are on the right road, but it doesn't take from the irritation of seeing them lose again. Ben Doak came into the team and showed up well. His pace and fearlessness will be an enormous asset. He is only a child but mixed it with men on Saturday and made an impressive contribution.

