title: Jose Mourinho wants more from Man Utd fans against Liverpool - BBC Sport
date: '2017-01-11'
section: General
url: http://www.bbc.co.uk/sport/football/38578534
content: |-
  Jose Mourinho urges Man Utd fans to create an atmosphere against Liverpool on Sunday, saying it will "not be a visit to the theatre".

  Last updated on .From the section Football

  Manchester United manager Jose Mourinho has told fans Sunday's Premier League match against fierce rivals Liverpool at Old Trafford will "not be a visit to the theatre", and instead invited them to "come and play with us".

  United beat Hull City 2-0 in the first leg of their EFL Cup semi-final on Tuesday thanks to second-half goals from Juan Mata and Marouane Fellaini.

  However, Mourinho said everyone must improve against Liverpool.

  "It's a special match for us," he said.

  "If we play enthusiastic football the fans come to the pitch and play with us. When we don't play with great intensity it is normal that the fans are not so vocal.

  "But we have absolutely amazing fans, fans who push us and get behind us.

  "Everybody likes big games - players, managers, fans. Everyone loves big matches so let's go for that one on Sunday."

  United host Liverpool (16:00 GMT) looking to extend their run of successive wins to 10 in all competitions.

  Liverpool have lost just twice all season, their last defeat a 4-3 loss at Bournemouth on 4 December.

  Jurgen Klopp's men are second in the Premier League, five points ahead of United in sixth and the same distance behind leaders Chelsea.

  United were without 13-goal striker Zlatan Ibrahimovic against Hull because of illness, but Mourinho said the Swede should return on Sunday.

  "Zlatan is ill so I think no problem for Sunday," he said. "I think he will be fine."
