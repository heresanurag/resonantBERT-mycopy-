  Ian Barnes, who lives in Darlington, recorded a time of eight minutes 10.40 seconds.

  An 85-year-old runner has set a new record for his age group in the mile.

  Ian Barnes, who lives in Darlington, recorded a time of eight minutes 10.40 seconds in a race against seven other runners at the Eastbourne athletics track.

  He is a retired legal executive and joint president of Darlington Harriers running club.
