id: bbc_2018_5547
title: 'Belhaj rendition: Fatima Boudchar on ''historic'' apology - BBC News'
date: '2018-05-10'
section: General
url: http://www.bbc.co.uk/news/uk-44065031
content: |-
  Fatima Boudchar gave a statement after the UK government apologised to her and her husband.

  The UK government has apologised to a Libyan dissident and his wife after its actions contributed to their detention, transfer to Libya and his torture by Colonel Gaddafi's forces in 2004.

  Prime Minister Theresa May said Abdul Hakim Belhaj and Fatima Boudchar had suffered "appalling treatment".

  Ms Boudchar said the apology was "historic" after what they had been through.
