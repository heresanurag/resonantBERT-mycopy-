title: Russia launches 'massive' strikes days after Ukrainian drone attack - BBC News
date: '2025-06-06'
section: Europe
url: http://www.bbc.co.uk/news/articles/cvg7zy1jq7no
content: |-
  Five people are killed in a drone and missile attack on Kyiv and other Ukrainian cities, officials say.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Russia launched a "massive" drone and missile strike on Ukraine's capital and other areas early on Friday, days after Ukraine's surprise attack on its air bases. Five people were killed and 80 injured, Ukrainian officials said, with cruise missiles and hundreds of drones launched. Strikes targeted the capital Kyiv, and the northern city of Chernihiv, as well as Lutsk and Ternopil in the north-west. Russia said the strikes were in response to "terrorist acts by the Kyiv regime", saying military sites were targeted. Moscow also reported downing 174 Ukrainian drones over parts of Russia and occupied Crimea. Neptune anti-ship cruise missiles, it said, were intercepted over the Black Sea.

  Russia's defence ministry said its armed forces had "launched a massive strike with high-precision long-range air, sea and ground-based weapons, as well as attack drones" on Thursday night. The attack came after Putin warned US President Donald Trump he would respond to Ukraine's recent strikes in several Russian regions. Late on Friday, Trump told reporters that the Ukrainians had given "Putin a reason to go in and bomb the hell out of them last night". Putin's spokesman Dmitry Peskov described the war in Ukraine as "existential" for Russia, saying it was an "issue of our national interests, an issue of our security". Moscow blamed Ukraine for three bomb attacks on railways in Russia's western Bryansk and Kursk regions which reportedly killed seven people and injured more than 100 last weekend. Kyiv has not commented on those attacks. Ukraine did say however that it had carried out its largest long-range drone strikes on at least 40 Russian warplanes at four military bases deep inside Russia last Sunday. Ukrainian President Volodymyr Zelensky said 117 drones had been used in Operation Spider Web by the SBU security service , striking "34% of [Russia's] strategic cruise missile carriers". Ukrainian officials say Russia's latest aerial assault included 38 cruise missiles, the kind Ukraine targeted on Sunday. Ukraine's state emergencies service DSNS said the three people killed in Kyiv had all been its employees. One person was killed in Lutsk, and the body of another victim was pulled from the wreckage in Chernihiv late on Friday. Zelensky said the Russian attack had used more than 400 drones. "Now is exactly the moment when America, Europe, and everyone around the world can stop this war together by pressuring Russia," he added. In a thinly veiled reference to Trump's apparent unwillingness to put pressure on Russia, he added: "If someone is not applying pressure and is giving the war more time to take lives – that is complicity and accountability."

