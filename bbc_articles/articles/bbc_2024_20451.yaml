content: |-
  Peggy's journey from East Yorkshire to the red carpet has been surreal, says owner Holly Middleton.

  Peggy's rise to fame has been "surreal", her owner says

  The transformation of Britain's "ugliest" dog into a Hollywood star has been unexpected and "surreal", her owner has said. Peggy is appearing alongside Ryan Reynolds and Hugh Jackman in the latest Marvel superhero film, Deadpool & Wolverine. The five-year-old pugese – a pug and Chinese crested cross – was cast as "Dogpool" after finding fame last year when she was crowned the ugliest pooch in a national contest. Recalling the past 18 months, Peggy's owner Holly Middleton, from East Yorkshire, said: "Not in my wildest dreams did I think anything like that would have ever happened."

  "When we submitted her picture [to the ugly dog competition], I didn't think it would get to the heights it did," she added. "I didn't think that'd be as big a deal as it was." However, despite amassing "a massive fan base", Mrs Middleton said Peggy was not displaying any "diva behaviour" at home. On the contrary, the usually "reserved and lazy" pugese had gained "a bit more confidence" from the trainer who was tasked with looking after her during production of Deadpool & Wolverine. "She's still just plain old Peg," said Mrs Middleton.

  The 37-year-old make-up artist said the family had missed Peggy when she was away filming. "It was really, really strange not to have her here," her owner said. "I've got two boys and they missed her terribly. "We didn't tell them where she was. Everything had to be kept quiet.

  Holly and Luke with Peggy in her "Dogpool" costume

  Watching Peggy making her debut at a premiere in New York and being held on the red carpet by Hollywood A-listers was "surreal", Mrs Middleton said. "I loved it. Peggy looked really comfortable the entire time, as probably most people would being cuddled by Ryan Reynolds. "They seem to really, really love her and they're so gentle with her, and you can see... they're giving her kisses and giving her little rubs on her head. "I just loved every second of it. I loved seeing her up there doing her thing. "She just looked so chilled and so happy." Mrs Middleton said there were no plans at present for future film roles and Peggy was content with chilling at home. "First and foremost, she is a family pet," she added. "There's nothing she likes more than either cuddling with us on the couch, or snuggling in her bed."

  Peggy joined the Deadpool & Wolverine cast after winning the ugliest pooch title in 2023

  Despite Peggy's global recognition, Mrs Middleton said she was "the same as every other dog that gets walked in the village" – though she "absolutely loves" attention and had become accustomed to turning people's heads. "When I read comments online, they're all very positive and very much in favour of Peggy, saying how beautiful she is. "Before all of this, just the way she looks she would get attention, but it was usually people sort of nudging each other and whispering, 'Oh, what's wrong with that dog'. "So since everything's happened, the public perception of Peggy, and whether she's beautiful, ugly, or whatever has definitely changed for the better."
