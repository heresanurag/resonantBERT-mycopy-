title: Police officer shot with crossbow in High Wycombe - BBC News
date: '2024-05-11'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-68994654
content: |-
  An officer is shot with a crossbow and a man is stabbed in a "serious assault and weapons incident".

  Police and forensic teams remain at the scene in Downley

  A police officer was shot in the leg with a crossbow and a man was stabbed in what was described as a "serious assault and weapons incident". Police attended School Close in Downley near High Wycombe on Friday after a man in his 60s suffered a stab wound. The suspected attacker was shot by armed police and has potentially life-changing injuries. Both the officer and the stab victim have now been released from hospital, police said. The suspect, a 54-year-old man from High Wycombe, was arrested on suspicion of attempted murder and remains under police guard in hospital.

  There is a high police presence in the road

  Assistant Chief Constable Tim Metcalfe, from Thames Valley Police, said the police officer who was shot was in "good spirits given the circumstances". "It is very fortunate no-one suffered life-threatening injuries." He praised the "incredible bravery" of the officers who responded to the incident, and added: "We are giving all the support we can to the officer who was injured during the incident."

  Armed police were called in on Friday evening and the scene is still cordoned off

  Police are not looking for anybody else in connection with the incident

  ACC Metcalfe added: "We are not looking for anyone else in relation to the incident at this time." Buckinghamshire commander Ch Supt Emma Burroughs said the incident had been "hugely challenging and unsettling" for the local community. "We do not underestimate the impact it has had on the community so we are doing all we can to support people, such as the patrols in the area over the coming day and engagement with stakeholders such as councillors, the MP and our independent advisory group," she said. Neil, who lives in the area and did not wish to give his last name, told the BBC he had seen an armed police officer crouching in a nearby bush.

  Neil, who lives close to where the incident happened, said he rushed to get his family inside when he saw the police

  "I was playing in the park with my son and my partner and I knew something was about to go down. I grabbed my son and told my partner to get home, and within minutes it was kicking off and pandemonium everywhere, then gunshots. "It happened so quickly. It was peaceful to mayhem." Fellow resident Andy Gupta told PA Media: "We saw three or four armed police through our window. That's when we realised there was something serious going on. "For the first time in my life, I felt like I was working in a movie. "There were 15 to 20 police cars, armed police, three or four ambulances, and two critical care units. "It was worrying - I've got family here. I know that kids play over there and my mate's kids are there so I was worried about them as well." Mr Gupta's 13-year-old daughter, said: "I saw a man coming out of a house and it looked like he had been stabbed in the stomach. "And then the police officers came and said, 'Don't stand outside, don't come outside, it's dangerous'. "They kept them all inside. And then armed police came and I heard two gunshots. "We were shocked - we didn't think it would happen in such a quiet area." Thames Valley Police has made a mandatory referral to the Independent Office for Police Conduct over the incident, which happened at about 18:00 BST.

