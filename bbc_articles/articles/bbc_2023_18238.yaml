title: 'Christmas: Girl, 4, takes busker''s mic for Jingle Bells - BBC News'
date: '2023-12-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67790843
content: |-
  Ariella delights Christmas shoppers as she belts out a festive song on a busker's microphone.

  How about this for festive joy?

  Ariella, four, was Christmas shopping with her mum and other family when she serenaded Cardiff city centre on a busker's microphone with a lively rendition of Jingle Bells.

  Mum Kelly, from nearby Caerleon, said: "She's been practising for her Christmas concert. So she's just been constantly singing at the moment.

  "The busker was super sweet and let her have a turn and then paid her a pound," she said. "So she was over the moon."

  Ariella is a keen performer and attends singing, drama and acting classes on the weekend "because she loves to bring the drama," her mum said.
