  Chart expert James Masterson says the Christmas number one race began as an invention of British bookmakers in 1984. While it used to produce many bona fide pop hits, he believes the concept has been "ruined" in recent years, not least by the admittedly well-intentioned LadBaby. "It became pointless speculating as to what was going to be Christmas number one," he says of the LadBaby era. "Which is why, when he didn't release a song last year, it left this void and it was a void that nobody came along to fill." Last Christmas "won by default", he says, because it appears at the top of all the Christmas playlists playing "the same old songs, every single year, in much the same order".

  Due to a crowded Christmas market, Masterson says many record labels began to feel it's not worth worrying about the end of year chart any more. Chart rules dictate that songs released in the last three years are weighted more favourably than those already in the Christmas canon. But even with that factor in their favour, he feels it is increasingly difficult for artists with genuinely good new seasonal songs to "achieve enough momentum" to "get lucky". "My view is that if Last Christmas by Wham! gets the Christmas number one again by default, it would be a disaster for the whole concept," he concludes. So anyone launching a late bid - be it fans of the late Liam Payne, Liberal Democrat leader Ed Davey or Yorkshire Pudding Boy - will probably require a cracking campaign. There have been upsets in the past - fans of Rage Against the Machine's Killing in the Name put a small-but-welcome dint in the X Factor monopoly in 2009.

