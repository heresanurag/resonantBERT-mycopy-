  Talbot thinks that if Sheeran really "wanted to really go for it" with Under The Tree, his song from Richard Curtis's That Christmas movie, he could challenge Wham! and Mariah. Alternatively, the "Wicked phenomenon could be really powerful", meaning Cynthia Erivo and Grande's Defying Gravity could pull off a "surprise" as families and friends head for outings to the cinema. US pop sensation Sabrina Carpenter has released a Christmas-centric EP, Fruitcake, which could top the festive album chart, but its tracks don't seem to be in the running for the singles crown. So it's beginning to look a lot like Wham! will be Christmas number one again - just like last Christmas. This year's Christmas Number 1 will be revealed on 20 December on the Official Chart on Radio with Jack Saunders.
