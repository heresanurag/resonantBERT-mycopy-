  "The other thing is, if you've got a charity record, let's not be shy about it," Talbot notes. That's an adage not lost on Bob Geldof and the Band Aid team, who are going again with their own 40th anniversary Ultimate Mix, which has made headlines this time after Ed Sheeran said he would have preferred for his vocals not to have been used again because of the song's portrayal of Africa. "When people engage with charity records, they're not doing it because they specifically want to listen to the charity record over and over again, Talbot notes. "Streaming doesn't really work." Instead, he says: "It's all about voting. And you cast your vote by buying a download or by buying physical products." East 17, Reverend and the Makers and The Celebs are all also having a go in aid of various charities this year, as are South Yorkshire Fire & Rescue.

  "Put your hand up if you can do the high note..."

  Mariah's slow-burning 1994 anthem finally topped the UK chart for the first time in 2020, returning to the summit in 2022. Yet despite it being screeched by revellers across the country every December, the unofficial queen of Christmas (her bid to trademark that moniker was denied by US authorities) has never been at the top of the UK chart in Christmas week itself. "It was the first Christmas song I ever wrote and I was just thinking about all the things that I really did want at Christmas," she recently told Rylan in a BBC interview. "I guess I turned it into, if there's something that you love, it means more than all that stuff." Aww. Her tune, like Wham!'s and Band Aid's, has benefitted from being heavily promoted by streaming services like Spotify, Apple and Amazon on their top Christmas playlists.

  "Look, is that Santa already?": Tom Grennan wrote his Christmas song last summer when he was still wearing a vest

  In recent years, Amazon has thrown its might behind new Christmas songs that are exclusive to its service. They have included Sam Ryder's You're Christmas To Me, which narrowly lost out to Wham! last year, and Ellie Goulding's River, which topped the chart just after Christmas in 2019. This year, Grennan's soulful, lovelorn It Can't Be Christmas is only available via Amazon Music. Grennan, who actually penned the track in Los Angeles in the summer, said it was a "no-brainer" for him to team up with the streamer to create his own festive song. She said being asked to come up with an original to go up against the usual suspects was "such a fun challenge". The classically-trained star's jazzy number features in Red One, a holiday-themed action movie starring Dwayne Johnson, Chris Evans and Lucy Liu - and made by Amazon.

