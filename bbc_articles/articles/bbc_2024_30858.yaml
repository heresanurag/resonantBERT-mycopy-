content: |-
  All Mariah and Wham! want for Christmas is a chartopper. Can a newcomer like Tom Grennan stop them?

  The Christmas number one race - and how to win it

  This year's Christmas number one single will be unwrapped on Friday, with a mixture of old favourites, new efforts and wild cards all in the running. Last year, Wham! classic Last Christmas topped the yuletide singles chart, remarkably for the first time since its release in 1984, when the original Band Aid kept it off the number one spot. As is tradition, the festive number one will be announced on BBC Radio 1's chart show from 16:00 GMT on the Friday before Christmas. At the time of writing, a stocking full of artists - naughty and nice - are hoping to top the list.

