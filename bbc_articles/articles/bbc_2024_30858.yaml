  Wham!'s hit is the frontrunner after reclaiming the top spot in the last chart before the Christmas one, as people streamed it to get into the festive spirit. It has also been reissued on CD and 12-inch vinyl for its 40th anniversary for the final week of the chart race, giving it a further boost. Another seasonal staple, Mariah Carey's All I Want for Christmas, is not far behind. Also in this year's mix are Brenda Lee's golden oldie Rockin' Around the Christmas Tree and the latest incarnation of Band Aid. They're joined by a new festive tune by Tom Grennan, while songs by Ariana Grande and Kelly Clarkson have established themselves as returning Christmas classics. Or the chart crown could go to something non-Christmassy - like recent hits by Gracie Abrams, Rose and Bruno Mars, or the fast-rising Lola Young. There was a long period when the Christmas number one was reserved for the latest X Factor winner - seven times between 2005-14 - or novelty charity-fundraising sausage-roll enthusiast LadBaby, a five-time victor between 2018-22. And just like with buying gifts, the key for any artists involved now, according to Official Chart Company boss Martin Talbot, is to step into Christmas with confidence and a strategy, and to go early.

  George Michael, Bob Geldof, Mariah Carey and Sir Paul McCartney performed at Live 8 in 2005

  "The singles market is very much dominated by streaming these days, in general terms, throughout the year," he says. "But the Christmas market is the one market where you can sell a lot of physical [copies and] a lot of downloads and actually make a big difference. Because people want to buy gifts. "That's where Wham! will do really well this year." Physical or download sales count for much more than streams in the chart in the digital era.

