title: Thai vet helps woman give birth by Bangkok road - BBC News
date: '2019-05-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-48401927
content: |-
  A veterinarian in Thailand stepped in to help a woman give birth on the side of the road in Bangkok.

  A veterinarian in Thailand stepped in to help a woman giving birth prematurely on the side of the road in Bangkok.

  The BBC's Thai Service spoke to Waree Limrungsukho who said she had "never done this for a human baby before".
