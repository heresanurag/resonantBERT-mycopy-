  Don't get me wrong, Mr Tusk is not alone in Europe in his frustration at leading Brexiteers' unrealistic promises (that the trade deal with the EU would be the easiest and quickest in history, that it would be concluded before the end of the UK's exit negotiations, that the UK could leave the customs union and single market and still enjoy frictionless trade with the EU and more...).

  EU leaders are irritated too that - as they see it - the UK voted for Brexit but keeps looking to Brussels to come up with ways to make its exit workable and painless.

  But most senior European politicians are keeping those thoughts quiet - in public.

  Considering the tortuous political dance Theresa May is trying to pull off in Westminster, they realise outspokenly critical EU opinions may not be helpful if, in the end, they want to get this Brexit deal done with the UK.

  And they do. The alternative - a no-deal Brexit - would be costly for them economically and politically.

  So - Mr Tusk's inflammatory comments aside - the intended EU message to Theresa May is: our door remains open. We are in listening mode but there is already a negotiated Brexit deal on the table. If you now want to make changes then it's up to you to ensure they are palatable both to the EU and to a comfortable majority of your MPs.

  And therein lies the prime minister's devilish dilemma.
