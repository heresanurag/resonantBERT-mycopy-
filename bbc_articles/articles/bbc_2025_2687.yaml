title: 'Sheffield: Boy, 15, in court charged with Harvey Willgoose murder - BBC News'
date: '2025-02-05'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/c17evpngvn0o
content: |-
  The boy, 15, is charged with murder, possessing a bladed article and affray over the death of the pupil.

  Harvey Willgoose was fatally injured at All Saints Catholic High School in Sheffield on Monday

  A teenager has appeared in court charged with murdering a 15-year-old boy at a school in Sheffield. Harvey Willgoose died after being stabbed twice in the chest with a large knife at All Saints Catholic High School, in Granville Road, at about 12:17 GMT on Monday, Sheffield Youth Court heard. A 15-year-old boy, who cannot be named because of his age, appeared in court on Wednesday morning charged with murder, possession of a bladed article and affray. No pleas were entered and he was remanded into youth detention ahead of a crown court appearance on Thursday morning.

  Harvey was stabbed in the heart with a knife, with the incident being captured by "good quality CCTV", prosecuting barrister Rob Coyne told the court. After the boy was charged, Chris Hartley, from the Crown Prosecution Service, said it was "extremely important" there should be no reporting, commentary or sharing of information online which could in any way prejudice proceedings. "The Crown Prosecution Service reminds all concerned that criminal proceedings against this defendant are active and that the youth has a right to a fair trial." In a statement issued on Tuesday, Harvey's family said they were "utterly heartbroken" as they paid tribute to their "beautiful boy, Harvey Goose". "Our lives are devastated and will never be the same again," they said. "We have lost a beloved son, brother, grandson, cousin, nephew and most importantly, a best friend to all. "Harvey will be forever known for being a caring, loving and funny young man," they added. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
