title: 'Newspaper headlines: ''Pay rise for teachers and nurses'' and ''Brexit betrayal''
  - BBC News'
date: '2024-07-21'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c1vdkd1qqxpo
content: |-
  A look at what's making the headlines of the newspapers this morning.

  The Sunday Telegraph focuses on the news that the government is considering awarding above inflation pay increases to teachers and NHS staff. , externalThe paper says Labour has only budgeted for a 3% increase and if it accepts a higher recommendation then the party will risk breaking its promise not to increase taxes or borrowing, just two weeks into office. The new education secretary, Bridget Phillipson, has given her first newspaper interview in the role to the Observer. She says expanding opportunities for working class children, by including more arts subjects and sport in the curriculum, external, will be a priority. Ms Phillipson told the paper she wants to break the link between background and success. Education is also the focus for the Sunday Times, which says "Universities are facing a cash catastrophe", external. The paper says three leading institutions are understood to be in serious peril, and that separately the government is drawing up plans to merge two medium-sized universities. The Sunday Times says ministers are being urged to introduce an emergency rescue package to prevent bankruptcies in the sector. President Biden's ailing re-election campaign features on the front pages of both the Observer and the Sunday Times. The Observer says he is continuing to resist the growing calls from within his party to step down, and that some advisers believe he is holding out at least until the Israeli Prime Minister Benjamin Netanyahu visits Washington on Wednesday. The Sunday Times reports that the president feels betrayed by calls to pass the torch to his Vice President Kamala Harris., external

  "Panic alarms given to all new MPs over safety fears", external is the main story for the Mail on Sunday. It says officials have beefed up security measures for politicians, who are facing unprecedented levels of threats. The paper says the panic alarms have a location tracker in them, so the police can dispatch a rapid response unit if they are activated. The Mirror’s front page features allegations of bullying , externalagainst an unnamed female professional on the BBC's Strictly Come Dancing programme. The paper says the contestant complained the dancer "screamed in his face in a rage". Although he hasn't made an allegation of physical abuse, he is said to be critical of senior staff for failing to support him at the time and after he left the show. The BBC says it takes its duty of care extremely seriously. Environment Secretary Steve Reed has told the Sunday Telegraph that every river in England is polluted, external. The paper says he has accused water companies of covering up the true scale of sewage spills and will introduce a new system to monitor the problem. Mr Reed said this will include independent scrutiny to stop providers massaging the figures. He added that his department's new measures will ensure that companies face automatic and severe fines for illegal pollution. "The Great Brexit Betrayal", external is the headline on the front of the Sunday Express. The paper says Labour is drawing up a new law which will put Britain back in the grip of Brussels. It says the measure will put manufacturers in "lockstep" with the EU on product safety rules. It says "four former cabinet big guns" have accused Keir Starmer of trying to trade away freedoms. Labour sources tell the paper the new bill will "in no way" force the UK to adopt EU rules.

