title: Euromillions £58m jackpot won by UK ticket - BBC News
date: '2018-07-11'
section: UK
url: http://www.bbc.co.uk/news/uk-44789517
content: |-
  A single ticket from the UK is the only one to match all seven numbers in Tuesday's Euromillions draw.

  A UK ticket has won the jackpot in Tuesday's Euromillions draw worth £57.9m, Camelot has said.

  A single ticket was the only one to match all seven numbers - which were 03, 08, 26, 33 and 45 with Lucky Stars 07 and 10.

  Andy Carter, from the National Lottery, urged players to check their tickets."Rest assured, we have plenty of champagne on ice," he said.

  The latest win comes just a few months after a UK ticket-holder claimed £121m.

  That winner, who landed the prize in April, became the country's third biggest lottery winner of all time.

  Two months earlier, a UK ticket holder won almost £78m in the draw.

  The UK's largest EUromillions win of £161m went to Chris and Colin Weir in July 2011

  Euromillions is played in nine countries - the UK, Austria, Belgium, France, the Irish Republic, Luxembourg, Portugal, Spain and Switzerland - with ticket-holders trying to win a share of the same jackpot.

  Colin and Christine Weir hold the record for largest ever Euromillions win by a UK ticket holder after picking up £161m in 2011.

  The second largest UK win went to Gillian and Adrian Bayford from Suffolk, who took home £148m in 2012.
