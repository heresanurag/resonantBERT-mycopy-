  Boy A lied to his mother that he was staying at a friend's house after school but instead Joynes picked him up and took him to the Trafford Centre, where she bought him a £350 Gucci belt. Judge Cornell said CCTV footage of Joynes buying the belt showed that "your flirtatious body language and eye contact could hardly be a clearer indication of grooming behaviour". Back at her flat Joynes had sex twice with Boy A. The next day the boy's mother noticed a love-bite on her son's neck, which he dismissed as "nothing". The court heard she stormed into school reception as police were called in about the case. Joynes was then bailed on condition she would have no unsupervised contact with anyone under 18. She told the trial she then moved back to her parents in Wirral after having a "breakdown" and she was at a low point when Boy B messaged her on Snapchat. He later told police they regularly had unprotected sex at her Salford Quays flat and that Joynes had told him she could not become pregnant. Joynes was arrested for breaking bail conditions and spent five months in custody until she was bailed in November last year.

  Joynes hid under a coat as she arrived at Manchester Crown Court to be sentenced

  Boy B said in his statement there had been a "massive mental toll" on him and his family. He said he had been told by social services that Joynes had refused to let them update him about the baby's due date, gender or health. "The thought of not being able to see my child was heartbreaking,” he added. Judge Cornell said Joynes was a "high achiever" who had thrown her career away and had her baby taken away from her through her own actions. "You felt buoyed and boosted by their attention," she added. "There's no real insight from you, you continue to deny the offences and have been silent on the distressing impact on these boys."

  Joynes was found guilty at an earlier court hearing

  Det Con Beth Alexander, from Greater Manchester Police, said: "School should be a place of safety for children. "It’s clear from some of the public commentary when Joynes was convicted that there is still a lack of understanding when it comes to men and boys being the victims of sexual offences. "They have had to read comments stating others are 'jealous' of them, and that they 'should be happy a young female teacher was interested in them', and this rhetoric is very damaging and dangerous. "Women can still be paedophiles; this term is not reserved only for men. Men and boys can still be victims of sexual abuse.”
