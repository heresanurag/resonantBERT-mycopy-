title: 'Rebecca Joynes: Teacher who had sex with two schoolboys jailed - BBC News'
date: '2024-07-04'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cn08y6785xqo
content: |-
  Rebecca Joynes, 30, who groomed the boys from the age of 15, is given a six-and-a-half year sentence.

  A teacher who sexually abused two schoolboys and became pregnant by one of them has been jailed. Rebecca Joynes groomed both boys from the age of 15, first exchanging messages on social media, Manchester Crown Court heard. The 30-year-old was previously convicted of four counts of sexual activity with a child and two counts of sexual activity with another child. Joynes cried and shook in the dock as she was sentenced to six-and-a-half years. The trial heard that Joynes was 28 when she had come out of a nine-year relationship and was "flattered" by the attention of teenage schoolboys. Neither teenager - known as Boy A and Boy B throughout the trial - can be identified due to their age.

  Joynes gave birth to Boy B's baby in early 2024, with the child being taken away from her within 24 hours. In a victim impact statement, Boy B said "one of the hardest things" was not being told anything about the baby. He added: "I struggled to come to terms with my abuse, I was completely in denial." During the trial, he said he felt he had "betrayed someone I love and done wrong by giving evidence" but had since realised "the full extent" of the abuse and "tactics used". He said he was "coerced, controlled, manipulated, sexually abused, and mentally abused", adding: "I will forever be Rebecca‘s victim and forever linked to her through our child." At the sentencing hearing, the judge, Kate Cornell, told Joynes: "You were the adult, the person in control. "You should have known better. You failed to enforce the boundaries of proper conduct but deliberately transgressed them." The trial heard Joynes would "laugh off" inappropriate comments instead of shutting down the behaviour. She gave Boy A all but one of the digits of her mobile phone number as a maths problem-solving exercise in which he had to work out the final digit. They then connected on Snapchat and he sent her flirtatious texts, with the pair agreeing to meet in secret.

