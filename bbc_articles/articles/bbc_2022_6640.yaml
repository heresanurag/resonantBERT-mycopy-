title: 'As it happened: Amber Heard lawyers decide not to call Johnny Depp as witness
  - BBC News'
date: '2022-05-23'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-61555078
content: |-
  The US actor had appeared on a list of potential witnesses as the trial entered its sixth, and final week.

  Amber Heard's legal team has called their next witness to the stand: Kathryn Arnold, an entertainment consultant.

  A source close to Amber Heard has confirmed that her team will no longer call Johnny Depp to the witness stand so we are pausing our live coverage.

