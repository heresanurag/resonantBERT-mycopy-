title: 'Election results: MP Vicky Ford upset as Tories lose council - BBC News'
date: '2019-05-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-48146485
content: |-
  Conservative MP Vicky Ford is visibly upset during a BBC interview as the Tories lose a comfortable majority in Chelmsford.

  Conservative MP Vicky Ford became visibly upset during a BBC interview as the Tories lost a comfortable majority in Chelmsford to the Liberal Democrats.

  At the count in Essex, Ms Ford became emotional as she reflected on "a very disappointing night".

  She said voters' frustration with Brexit was the cause of the Tory losses.

  "I think it is really disappointing when you look at some of the individuals who have lost their seats tonight," she said.
