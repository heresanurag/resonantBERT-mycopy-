content: |-
  British lucky loser Sonay Kartal continues to make the most of her reprieve at Indian Wells by earning the biggest win of her career.

  Sonay Kartal is competing in the main draw of a WTA 1,000 event for only the second time in her career

  British lucky loser Sonay Kartal continued to make the most of her reprieve by earning the biggest win of her career to reach the Indian Wells third round. It is the British number three's first win against an opponent in the top 20, with Haddad Maia ranked 17th. World number 83 Kartal has also reached the last 32 of a WTA 1,000 event - the tier below the Grand Slam tournaments - for the first time. "Being a lucky loser takes the pressure off and you could say it's a good position to be in," Kartal told BBC Sport. "It's nice to have this second chance and almost like a free run at it." Kartal lost in the second qualifying round on her debut in the Californian desert, but was handed a spot in the main draw when former US Open champion Sloane Stephens withdrew through injury. It is the first time the Englishwoman has been picked out as a lucky loser. Kartal was placed in a draw among the four highest-ranked players to lose in qualifying following Stephens' withdrawal.
  • None 'No idea if I would play' - how Kartal's success followed health scare

  After beating 38-year-old American qualifier Varvara Lepchenko in the first round, Kartal used the feel she has gained on the new-look Indian Wells courts, external over the past week to great effect against Haddad Maia. Haddad Maia received a bye into the second round and looked out of sorts as she slumped to a fifth successive defeat. "It was one of those matches where you come off court thinking 'I can't fault myself too much'," added Kartal, who plays 60th-ranked Polina Kudermetova for a place in the last 16. "I'm super proud of that performance and it's given me a lot of confidence heading into the next match." Kartal's run is another notable landmark for a player who has enjoyed one of the sharpest rises on the WTA Tour in the past year. In October, she won a maiden tour title in Monastir and cracked the world's top 100 for the first time as a result. At the start of 2024, Kartal feared she would not play again that season because of a health scare that left her going "in and out of hospital". But she returned to action within three months and has gone from strength to strength after saying the experience changed her outlook.

  Top seed Aryna Sabalenka clinched a 7-6 (7-4) 6-3 win over McCartney Kessler of the United States in her opening match of the tournament. The world number one from Belarus faces unseeded Italian Lucia Bronzetti in the third round on Monday. American Madison Keys, who denied Sabalenka a third straight Australian Open title in Melbourne last month, also booked her place in the third round. Keys saw off Russia's Anastasia Potapova 6-3 6-0 in her first match since her maiden Grand Slam success and will play Belgium's Elise Mertens next. American Coco Gauff survived 21 double faults to grind out a 6-3 3-6 7-6 (7-4) win over Japan's Moyuka Uchijima to secure a meeting with Maria Sakkari of Greece.
