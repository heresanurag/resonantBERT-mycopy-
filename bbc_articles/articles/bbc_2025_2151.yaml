title: Spanish city honours migrants who intervened in homophobic attack - BBC News
date: '2025-02-25'
section: World
url: http://www.bbc.co.uk/news/articles/cx29pnzy1l7o
content: |-
  Ibrahima Diack and Magatte N'Diaye are given "adopted sons of the city" status in A Coruña.

  Magatte N'Diaye and Ibrahima Diack - seen here with Mayor Inés Rey - have been honoured as "adopted sons of A Coruña"

  A Spanish city has honoured two Senegalese migrants for their heroism in trying to save a gay man beaten to death by a homophobic mob. Ibrahima Diack and Magatte N'Diaye were given "adopted sons of the city" status in A Coruña on Monday in a formal ceremony recognising their actions. The men were the only ones to intervene in July 2021, when Samuel Luiz was set upon by a group of men and kicked and punched outside a nightclub in the north-western city. The 24-year-old later died of his injuries in hospital - an event which sparked national outrage and condemnation.

  On Monday, at a formal ceremony in the city council's hall, Mayor Inés Rey described the migrants' actions as "pure altruism". Footage of that night showed other bystanders watching on, some filming on mobiles, and the two being the only ones who intervened. "That two undocumented migrants were the only ones who physically risked themselves to help the victim of a pack thirsting for horror leaves much food for thought and a series of lessons," Mayor Rey said. "Thank you for your example in risking everything despite having a lot to lose," said another councillor, Rosalía López, on Instagram in a post sharing videos of the ceremony. Mr Diack and Mr N'Diaye had been living in the city without papers at the time and doing irregular work, putting them at risk of arrest and deportation if they came into contact with authorities. But both men on Monday said they had just done what they thought was the right thing in trying to stop the violence. In front of friends, civic servants and other guests on Monday, they were handed plaques by the mayor bestowing them with the status of "Adopted Sons of A Coruña". "We are not heroes, we did what we had to do," said Mr N'Diaye, according to an AFP report. Mr Diack said: "I was born in a family that doesn't have much... but they gave me many things more valuable than money. They gave me respect, education and above all, values." The two were also crucial witnesses in the trial of Mr Luiz's killers last November, Spanish media reported. A jury found four men guilty of the murder, with the court ordering sentences between 10 and 24 years. The court found the main accused - given a 24-year sentence - had shouted homophobic insults during the attack. Tens of thousands of migrants reach Spain illegally every year through boat crossings across the Atlantic - with the most common arrivals from Mali, Senegal and Morocco.
