title: 'Coronavirus: Bournemouth A&E prepares for winter spike - BBC News'
date: '2020-10-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-dorset-54507205
content: |-
  Staff at the Royal Bournemouth Hospital are preparing for an expected rise in coronavirus cases.

  Hospital accident and emergency departments are making preparations for a surge in patients this winter.

  The Royal Bournemouth Hospital is already busy, despite doubling the number of beds since the beginning of the pandemic.

  It is now preparing for a further rise in admissions, with more people now in hospital with Covid-19 than before restrictions were announced in March.
