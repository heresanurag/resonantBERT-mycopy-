title: 'Easter travel: Rail and Tube closures set to disrupt travel - BBC News'
date: '2022-04-06'
section: England
url: http://www.bbc.co.uk/news/uk-england-60999522
content: |-
  People are being warned to expect long delays over the bank holiday weekend.

  Passengers travelling from London Marylebone to parts of Buckinghamshire will have to catch replacement buses

  People travelling over the Easter weekend are set to face delays and cancellations due to engineering works on the rail network.

  No trains will run in or out of Euston, which is likely to disrupt fans going to the FA Cup semi-finals at Wembley.

  Heathrow, Gatwick and Stansted Airports will also be affected.

  The timing has been called "ludicrous" by travel expert Simon Calder as it is the first bank holiday where all legal Covid restrictions have been axed.

  He said: "Far more people [are] travelling at weekends now than during the week and now they find they can't go anyway and that's something Network Rail has to address."

  Network Rail said it was undertaking a £22m upgrade project and had advised people to travel either side of the bank holiday.

  Many air passengers have already experienced a bad start to their holidays, after 1,000 UK flights were cancelled.

  British Airways and Easyjet blamed staff shortages for the problems.

  Mr Calder said "over-optimism on the part of the airlines" was to blame for the delays, and warned air travel could be problematic throughout the holidays.

  He warned the "pressure is going to be on" before the Easter weekend.

  Several parts of the Tube network are closing over the bank holiday weekend, which Transport for London acknowledged would be "frustrating"

  Network Rail said there was never an ideal time to shut the railway but Easter provided an opportunity to carry out essential work.

  Dave Penney, passenger director for the north west and central region, said: "Long bank holiday weekends continue to give our engineers the time they need to close the railway for complex jobs like track replacements and bridge overhauls while disrupting the fewest number of people."

  The construction of HS2 and its new Euston terminal has caused frequent line and station closures along the route

  If you are planning to stay in London, your journey could still be fraught with delays and diversions, due to several parts of the Tube network closing.

  Transport for London (TfL) said customers should check before travelling and acknowledged the closures may be frustrating.

  "Easter is an ideal time for us to undertake essential improvement works on the network as demand is lower and the four-day weekend means we can do complex works that take longer," a spokesperson said. "

  Network Rail is advising Manchester City and Liverpool fans against travelling by train to Wembley Stadium on 16 April as trains from the North West will terminate at Milton Keynes Central, potentially leaving fans stranded.

  Chiltern Railway trains will serve Wembley Stadium station, but the operator said it was expecting to be "extremely busy" due to closures on other lines and advised match-goers not to use its services.

  The FA is advising match-goers to travel by Tube to Wembley Park or by car.

  However, the Metropolitan line is operating a reduced service due to safety checks. TfL is advising people to use the Jubilee line to travel to Wembley Park or the Bakerloo line to Wembley Central.

