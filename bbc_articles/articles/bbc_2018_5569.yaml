id: bbc_2018_5569
title: Israel strikes Iranian targets in Syria - BBC News
date: '2018-05-10'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-44065528
content: |-
  Syrian state TV broadcast footage showing Israeli rockets being intercepted by anti-missile systems.

  Israel says its forces have struck almost all of Iran's infrastructure in Syria, in response to an Iranian rocket attack on the occupied Golan Heights.
