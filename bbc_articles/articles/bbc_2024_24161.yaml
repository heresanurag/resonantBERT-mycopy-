  Colt and Colin Gray make first appearance before judge over the murder of four people at Apalachee High School near Atlanta.

  Boy, 14, and father in court over Georgia school shooting

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A 14-year-old boy and his father were in court for the first time, charged in the murder of four people in a gun attack at a Georgia high school. Colt Gray was arrested shortly after the shooting on Wednesday at his school, Apalachee High in Winder, near Atlanta. He faced court in person on Friday, his hands and ankles shackled, to face four counts of first degree murder. The judge clarified that he would not face execution, after first stating the maximum penalty was death. His father, Colin Gray, 54, is charged with second-degree murder, manslaughter and child cruelty - the most severe charges against a parent over a US school shooting.

  Colt Gray faced court for the first time accused of murdering four people

  Those killed were identified as Mason Schermerhorn and Christian Angulo, both 14, and teachers Richard Aspinwall, 39, and Cristina Irimie, 53. Another teacher and eight pupils were wounded. The court appearances, held separately, were the first for the Grays. Families of victims were seated in the first row of the court, according to reporters. One woman held a stuffed animal of a Disney character in her arms. Wearing a green T-shirt, the 14-year-old suspect spoke little other than to acknowledge that he understood the charges he faces. The judge acknowledged heightened public interest in the case. Because of this, news cameras were allowed to record and livestream the hearings. He initially told Colt Gray that the maximum penalty for his charges was death or life in prison, but later called the accused back to clarify that under-18 cannot be executed. Colin Gray appeared distressed at some points during his hearing. Wearing a striped jail-issued shirt, he was seen rocking back and forth after the judge finished speaking. The judge told him he faced a total of 180 years in prison for his charges. Officials accused the father of allowing his son to possess an AR-15 style rifle which they allege was used in the attack. Both of the accused were told that they had the right to a "speedy and public trial by judge or jury". Neither requested a bond and no pleas were entered. They will both remain in custody and are next due in court on 4 December.

  Colin Gray, the father of Colt Gray, faces life in prison.
