title: Peterborough pooch Muppet is crowned Britain's ugliest dog - BBC News
date: '2024-12-13'
section: Peterborough
url: http://www.bbc.co.uk/news/articles/cwydqyz8q1do
content: |-
  Muppet, whose tongue is permanently hanging out of the side of his mouth, is in demand for selfies.

  A 12-year-old dog whose tongue is permanently hanging out of the side of his mouth has been crowned Britain's ugliest pooch. Muppet, a Chinese crested dog from Peterborough, won the title after beating seven others in a competition organised by photography company Parrot Print, and the final was held live on ITV's This Morning show. Owner Bev Nicholson said Muppet, who also has missing teeth, was a "wonky little rescue dog" but "beautiful inside and out". Head judge and founder of competition Matt Dahan said Muppet was "both cute and ugly at the same time".

  Muppet is the family's second dog to be crowned with this award after his brother Mugly won the world's ugliest dog in 2012. Alongside the trophy, Muppet was presented with a pamper session at a luxury doggie spa that included a mud bath followed by a Christmas-themed photoshoot. Ms Nicholson said: "I know people say there's no such thing as an ugly dog, but it is just a term of endearment. "There are ugly humans aren't there? "The difference is Muppet has inner beauty. He's not just a pink dog with a comb-over."

  "Walks often take some time as people want to stop us, especially if he's riding home in his stroller; we call it his chariot," added Ms Nicholson. "He loves it in there, he's warm and at a height where he's happier. "People often take selfies with him with their tongues sticking out too. "When I was told Muppet had won it gave me the giggles. "I am happy for him; he knows no different and it's nice that a little wonky rescue dog has ended up with this dubious title. "Muppet loved his mud bath and apart from a naughty poop at the photography studio he behaved perfectly and the photos look fabulous. "All in all it's been a great experience."

