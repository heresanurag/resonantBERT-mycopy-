  Shalom said it was up to 33-year-old Eubank if he wanted to activate the rematch clause.

  Eubank suggested on social media after the fight he would do that, but Smith insisted he would want the second fight to be in his home city.

  "This has to be right for me now, on my terms," he said. "[I want it in] Liverpool. The money side to it [has to change]."

  Smith has stopped his past four opponents and moved up to middleweight to fight Eubank.

  The intriguing fight threatened to be overshadowed by an ugly build-up in fight week, where Eubank suffered taunts about his sexuality from Smith but responded with jibes of his own about social class and personal attacks on Smith about infidelity.

  Eubank apologised, admitting he "regretted" what he had said.

  Smith briefly addressed the controversy in his post-fight news conference.

  "It got a little bit out of hand between me and Chris," he said.

  "I take what Chris said with a pinch of salt. I don't think he means it. A lot was said."
