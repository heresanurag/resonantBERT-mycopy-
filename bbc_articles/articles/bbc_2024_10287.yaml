title: Sunaks' wealth rises to £651m in latest Sunday Times Rich List - BBC News
date: '2024-05-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-69027955
content: |-
  Rishi Sunak and his wife Akshata Murty are richer than King Charles, according to The Sunday Times.

  The personal wealth of Rishi Sunak and his wife Akshata Murty rose by £122m last year, according to the Sunday Times Rich List. The couple's fortune was estimated at £651m in the latest list, up from £529m in 2023. This was mainly due to Ms Murty's shares in Infosys, the Indian IT giant co-founded by her father. It means they are richer than the King, according to the annual list of the UK's most wealthy people., external Charles III was ranked higher than the Sunak family last year, but his personal fortune is estimated to have grown more modestly over the past year, up £10m to £610m. The Sunaks were ranked higher than the late Queen in 2022 - with Elizabeth II's personal fortune that year evaluated at £370m. However, estimating the personal fortunes of monarchs is tricky, while the wider wealth of the monarchy - which includes various estates and palaces - has been estimated at dozens of billions of pounds.

  Mr Sunak became the first front-line politician to feature on the Sunday Times' annual wealth list in its 35-year history when he appeared on it as chancellor in the 2022 edition. At that point, the family's wealth was estimated at £730m.

  According to the Sunday Times, the 10 richest families and individuals in the UK, the estimated value of their fortunes and the primary source of their wealth are:
  • None David and Simon Reuben and family - £24.98bn (property and internet)
  • None Guy, George, Alannah and Galen Weston and family - £14.49bn (retail and real estate interests, including Primark)

  Mr Sunak worked as a hedge fund manager before entering politics and is personally wealthy, listing £2.2m in income, earnings, and capital gains last year in his latest tax summary. But he owes his place at the top table of wealthy Britons mainly to his wife's Infosys shareholding, estimated to be worth £590m last year. Downing Street declined to comment on Mr Sunak's latest appearance in the rich list, saying it was a "private family matter". But the PM's official spokesman added: "When he's been asked this question before he's responded and asked that people judge him by his actions, including to support livelihoods during the pandemic though the furlough scheme as an example. "That's his focus and his priority and he should be judged on that."
