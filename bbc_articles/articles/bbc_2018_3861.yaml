  • None Tottenham have not lost a single Premier League game in which they have led this season, but have now been eliminated from their three other competitions this season in games in which they took the lead (2-3 v West Ham in the League Cup, 1-2 v Juventus in the Champions League).
  • None Spurs also extended their record run of consecutive FA Cup semi-final defeats to eight, last winning one in 1991.
  • None Romelu Lukaku has been directly involved in 14 goals in his last 12 FA Cup appearances (12 goals, two assists), including seven in five for Manchester United.
  • None Manchester United midfielder Paul Pogba has now recorded 12 assists in all competitions this season - twice as many as he registered last season.
  • None Christian Eriksen has had a hand in 10 goals in his last six FA Cup appearances for Spurs (three goals, seven assists).
  • None Manchester United midfielder Ander Herrera has scored in each of his last two FA Cup games, as many as he had in his previous 15 in the competition.
  • None Jose Mourinho has reached his sixth major domestic final in England (two FA Cup, four League Cup), winning each of his previous five.
