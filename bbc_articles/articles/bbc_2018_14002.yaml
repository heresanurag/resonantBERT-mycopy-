id: bbc_2018_14002
title: Police Scotland link robbery rise with UK benefits changes - BBC News
date: '2018-11-24'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-46327838
content: |-
  A Police Scotland report says there is "anecdotal evidence" to link benefit changes to a rise in robberies.

  Universal credit has proved controversial since it was introduced

  Police Scotland has claimed UK government benefit changes may be linked to a rise in robberies.

  A force report said welfare reform, including the introduction of universal credit, may have helped push robberies up by 30% over the five-year average.

  There were 880 robberies throughout Scotland between April and June, an increase of 12% on the previous summer.

  The Department for Work and Pensions said there was "no firm evidence" to link any trends to changes in welfare.

  All 13 Police Scotland divisions produced "robbery problem profiles" as part of its overall crime report for April to September.

  It said robberies were up by 8.4% (68 crimes) on the previous year and up 23.3% (166 crimes) on the five-year average.

  However, that was an improvement on the April to June period, when robberies were up 12.5% (50 crimes) on the previous year and up 30.5% (105 crimes) on the five-year average.

  The Scottish Police Authority report says an increase in the price of illegal drugs also contributed to the rise in robbery rates.

  It states: "Analysis conducted during August 2018 has not identified a discernible pattern, although anecdotal evidence from intelligence suggests that a combination of increased drug prices due to police enforcement, and changes to welfare systems, may have contributed to an increase in crimes of dishonesty and robbery."

  Universal credit, which is being rolled out across the UK, has proved controversial with reports of IT issues, massive overspends and administrative problems.

  Concerns have been raised that 3.2 million working families will lose £48 a week - about £2,500 a year- compared with the old system.

  The Department for Work and Pensions said the police report was "purely based on anecdotal evidence".

  A spokeswoman said: "We continue to spend £90bn a year on working-age welfare, and 2.4 million households will be up to £630 better off a year as a result of raising the work allowance in Universal Credit.

  "In addition, Scotland has the power to top-up existing benefits, pay discretionary payments and create entirely new benefits altogether."
