title: 'Kansas: Toddler rescued after falling down 10ft pipe - BBC News'
date: '2024-08-04'
section: General
url: http://www.bbc.co.uk/news/videos/cql8lejjwlko
content: |-
  A 14-month-old boy has been rescued after falling down a 10ft (3m) pipe while playing outside his home.

  The toddler was pulled out by a makeshift "catch pole", which is often used by animal control to capture and restrain animals.

  Police said the boy was safely reunited with his family and did not need to go to hospital.
