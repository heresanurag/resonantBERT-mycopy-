title: Look back on a second night of stunning northern lights - BBC News
date: '2023-02-27'
section: UK
url: http://www.bbc.co.uk/news/live/uk-64789261
content: |-
  While clouds may limit seeing the aurora for some, others were treated to a second night of the phenomenon.

  Steven McKenzie and his daughter Ella raced to the top of a local hill above Inverness to get the best view Image caption: Steven McKenzie and his daughter Ella raced to the top of a local hill above Inverness to get the best view

  BBC Scotland reporter Steven McKenzie hurried to find the best vantage point during last night's dazzling display.

  "My eldest daughter Ella and I headed up a hill to see them above Inverness. The northern lights were amazing last night," he said.

  And it seems he wasn't the only one. Here's hoping the sky shines as bright for tonight's stargazers!

  BBC Weather Watcher Bluecat captured this view of the spectacle over Dunfermline Image caption: BBC Weather Watcher Bluecat captured this view of the spectacle over Dunfermline

  Vibrant green colours of the aurora filled the whole sky in the Shetland Islands Image caption: Vibrant green colours of the aurora filled the whole sky in the Shetland Islands

  A kaleidoscope of colours was cast over the Brecon Beacons in south Wales Image caption: A kaleidoscope of colours was cast over the Brecon Beacons in south Wales

  The lights are rarely seen in Kent, southern England Image caption: The lights are rarely seen in Kent, southern England
