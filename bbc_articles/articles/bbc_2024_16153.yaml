  A blaze at a historic church in Dallas has caused huge plumes of smoke to rise over the Texan city

  A massive blaze at a historic church in Dallas has caused part of the building's roof to collapse.

  Heavy plumes of smoke could be seen rising above the Texan city as fire crews were called to the First Baptist Dallas Church on Friday evening.

  The cause of the fire is currently under investigation and no injuries have been reported.
