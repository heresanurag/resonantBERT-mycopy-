title: Rob Burrow podcast nominated for award - BBC News
date: '2024-07-25'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/c03l2ylpj9eo
content: |-
  The rugby legend is posthumously nominated for the rising star award at the British Podcast Awards.

  In the podcast, Rob Burrow used an eye-gaze machine to ask his guests questions

  A series of podcasts made by late Leeds rugby legend Rob Burrow has been nominated for an award. The BBC's Rob Burrow Seven, Meets... podcast by the former Leeds Rhinos player and motor neurone disease (MND) campaigner has been posthumously nominated for the rising star award at the British Podcast Awards, external. Inspired by his Leeds Rhinos shirt number, Burrow, who died on 2 June at the age of 41, used an eye-gaze machine to ask seven questions to his guests. Over the nine episodes, interviewees included Rio Ferdinand, Dame Kelly Holmes, Mike and Zara Tindall, and Wayne Rooney.

  The awards celebrate individuals with less than two years experience of making podcasts. The winners will be revealed at a ceremony on 26 September at HERE at Outernet London and hosted by comedian Marcus Brigstocke. Though the deadline for nominations was in May, before Burrow died, it is understood the judging panel still wanted to honour him.

  Kevin Sinfield (left) and Rob Burrow raised more than £15m for MND charities in under five years

  On 7 July, thousands of people lined the streets to pay their respects to the former Leeds Rhinos star before a private funeral attended by 161 invited guests. Burrow spent his last years raising awareness and millions of pounds for research into MND after being diagnosed with the degenerative condition in 2019, two years after his retirement from rugby league. In less than five years following his diagnosis, he and his friend and former teammate Kevin Sinfield raised more than £15m for MND charities. Burrow was made an MBE in the 2021 New Year Honours for his services to rugby league and the MND community, and was promoted to a CBE in the New Year Honours in 2024.

  Comedian James Acaster is among the other nominees for his Springleaf podcast

  Among the other nominees, across 25 categories, are Lily Allen and Miquita Oliver for Miss Me?, comedian James Acaster for Springleaf, and DJ Annie Macmanus for Changes. Alongside the rising star category, there are awards for true crime, sport, parenting, news and current affairs, kids, history and more. Several podcasts have been nominated in multiple categories, including Educating Daisy, hosted by actress Daisy May Cooper, and The News Agents, hosted by journalists Emily Maitlis, Lewis Goodall and Jon Sopel. Elsewhere, Sidetracked with Annie Mac and Nick Grimshaw has been nominated in the arts and culture category, while George The Poet's Have You Heard George's Podcast? is nominated in the history category and for factual. The full list of nominations can be found on the British Podcast Awards website, external.
