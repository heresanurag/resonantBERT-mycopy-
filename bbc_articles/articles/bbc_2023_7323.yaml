title: 'Cardiff: Delivery driver murder accused appears in court - BBC News'
date: '2023-05-05'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-65497878
content: |-
  Christopher El Gifari appeared in court charged with the murder of Mark Lang.

  Mark Lang died from critical injuries after being hit by his own van

  A man has appeared in court over the murder of a delivery driver who was hit and dragged under his van.

  Christopher El Gifari, from Llanrumney, Cardiff was charged with murder during the hearing on Friday at Cardiff Magistrates' Court.

  Mark Lang, from Cardiff, died on 15 April after spending more than two weeks in hospital.

  The 54-year-old was left critically injured following the incident on 28 March on North Road, Cardiff.

  Mr Lang's partner previously described him as "a good man with a lot of love to give".

  The defendant was previously charged with attempted murder. After the victim's death he was further arrested and subsequently charged with murder.

  Mr El Gifari, 31, has been remanded in custody and is due to appear at Cardiff Crown Court on 9 May.
