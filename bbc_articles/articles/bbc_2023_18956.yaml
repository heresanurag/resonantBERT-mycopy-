content: |-
  The influencer is the second contestant to be kicked off the show after getting the fewest public votes.

  Nella Rose has left the jungle after being eliminated from I'm A Celebrity... Get Me Out Of Here!

  The influencer became the second contestant to be kicked off the ITV reality show after receiving the fewest public votes.

  Her 17 days in camp were marked by rows with politician Nigel Farage and First Dates star Fred Siriex after he said was he was old enough to be her dad.

  "You shouldn't bring up sensitive topics," she told hosts Ant and Dec.

  Rose, who has lost both her parents, said: "In the middle of a disagreement, he brought up a sensitive topic. I didn't understand why he would do that."

  Fred had been discussing his age with Nella when he said the common phrase "I could be your dad", which she took offence to because her father died in 2020. Their argument over the exchange attracted 861 Ofcom complaints.

  Asked in a post-elimination interview if it was a misunderstanding, she said: "It could have been, but things are so heightened in the jungle that everything is a big thing."

  Speaking about being around people from different backgrounds, she said: "So when they have different mindsets, and I hear them, I'm shocked because I'm like, 'People think like this?'"

  The internet personality also addressed her row with Farage, the former UKIP and Brexit Party leader, over his views on immigration, which attracted 856 Ofcom complaints.

  "I think that Nigel is an amazing person, until he speaks about what he really believes in, and it's like, 'You're a cool guy but why do you think like that?'"

  She is yet to address the much-talked about online abuse she received while in the camp.

  Nella's exit follows that of jockey Frankie Dettori who left on Sunday.

  Previously restaurant critic Grace Dent and Jamie Lynn Spears, sister of Britney Spears, left the show on medical grounds.
