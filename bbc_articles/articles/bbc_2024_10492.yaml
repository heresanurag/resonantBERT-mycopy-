title: 'Watch: Blue fireball lights up skies over Spain - BBC News'
date: '2024-05-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-69034415
content: |-
  The suspected meteorite was also seen in Portugal, with many sharing their videos on social media.

  Footage from static cameras in Spain shows a suspected meteorite streaking across the night sky.

  The European Space Agency said the object appeared to be "a small piece of a comet."

  The phenomenon was also spotted in Portugal, with many witnesses sharing their videos online.
