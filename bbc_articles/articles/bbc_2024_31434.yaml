title: Government borrowing lower than expected in November - BBC News
date: '2024-12-20'
section: Business
url: http://www.bbc.co.uk/news/articles/cvgmvr2n4v9o
content: |-
  Public sector borrowing was £11.2bn last month, the lowest November figure since 2021.

  Government borrowing fell in November as more money was raised from taxes and less was spent on the country's debt interest payments, according to official figures. Borrowing - the difference between spending and tax take - was £11.2bn last month, the lowest November figure since 2021, the Office for National Statistics (ONS) said. Separate figures from the ONS showed retail sales rose slightly last month, helped by stronger trading at supermarkets. The latest figures come as economic growth in the UK remains weak and inflation - the rate at which prices increase over time - is rising at its fastest pace since March.

  November's borrowing figure was down by £3.4bn from the same month last year and below expectations of around £13bn. It means the total amount the government has borrowed since the start of the current financial year stands at £113.2bn. This is below the same period last year, but £2bn above predictions by the government's forecaster the Office for Budget Responsibility (OBR). Debt interest was down £4.7bn from a year earlier to £3bn, mainly due to lower inflation. Ruth Gregory, deputy chief UK economist at Capital Economics, said November borrowing "undershooting" expectations meant "Christmas has come early" for Chancellor Rachel Reeves. But she added while the chancellor would be encouraged by the latest figures, weakening in the UK economy meant there was a growing chance of further tax hikes or spending cuts. Dennis Tatarkov, senior economist at KPMG UK, added the government had some "temporary respite" due to lower interest repayments, but warned the trend was "unlikely to last as actual and projected inflation has moved up in recent months". Retail sales rose 0.2% in November after a 0.7% fall in October, but a rise in sales at supermarkets was partly offset by a fall in clothing sales, the ONS said. However, its latest survey period did not cover the official Black Friday date of 29 November.

  The latest economic figures come after the Bank of England voted to hold interest rates on Thursday, stating it thought the UK economy had performed worse than expected, with no growth at all between October and December. The Bank downgraded its growth forecast from 0.3% for the final three months of 2024, to zero growth. The growth revisions were seen as a blow to Labour, which has made growing the economy its top priority. Other figures released this week showed inflation hit 2.6% in the year to November, above the Bank's 2% target. Responding to the latest borrowing figures, Darren Jones, Chief Secretary to the Treasury, said the government had "inherited crumbling public services and crippled public finances" when it entered power. "Now we have wiped the slate clean, we are focused on investment and reform to deliver growth," he said. Liberal Democrat deputy leader Daisy Cooper said lower November borrowing was "good news", but added "the bigger picture remains deeply troubling". She said people were "still feeling the pain of the previous Conservative government's economic mismanagement", but added the new Labour administration needed "a far better plan to turn things around". At the Budget the chancellor changed the government's self-imposed debt rules in order to free up billions for infrastructure spending, which she said would drive economic growth and create jobs. "What will worry government is that recent economic indicators such as weak [economic] growth and rising inflation are flashing amber," said Alison Ring, director of public sector and taxation at the ICAEW trade body for accountants. "Money remains extremely tight and that is unlikely to change any time soon."

  The rebound in retail sales in November was slightly lower than expected, with sales on course to decline overall in the year. Sales were a mixed bag, according to Capital Economics, with supermarkets up but department and clothing stores down "as households continued to delay spending on winter clothing". Nick Stowe, chief executive of Monsoon Accessorize, said retailers had "seen quite soft demand" due to low consumer confidence, hitting clothes shops.
