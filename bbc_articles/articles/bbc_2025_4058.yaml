title: 'Watch: Kendall pledges to reform ''broken benefits system'' - BBC News'
date: '2025-03-18'
section: General
url: http://www.bbc.co.uk/news/videos/c1w02l1xryvo
content: |-
  Work and Pensions Secretary Liz Kendall tells MPs the status quo is "unacceptable", but not "inevitable".

  Work and Pensions Secretary Liz Kendall announced changes to the welfare system that she said would save £5bn by the end of 2030.

  Kendall told MPs "the status quo is unacceptable, but it is not inevitable".

  She added that the Conservatives had left a "broken benefits system".
