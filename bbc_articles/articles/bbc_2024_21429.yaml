title: 'Ely riot: 31 people charged in connection with Cardiff disorder - BBC News'
date: '2024-09-10'
section: Wales
url: http://www.bbc.co.uk/news/articles/clyn4je36g8o
content: |-
  Twenty-seven are charged with the offence of riot and are due to appear in court next week.

  Thirty-one people have been charged in connection with a riot in Cardiff following the deaths of two teenage boys. The disorder in Ely began shortly after 18:00 BST on 22 May 2023 when friends Kyrees Sullivan, 16, and Harvey Evans, 15, died in a bike crash on Snowden Road. Twenty-seven people have been charged with riot, while four others have been charged with causing or threatening to cause criminal damage. The defendants are due to appear at Cardiff Magistrates' Court on 19 and 20 September.

  The ages of those charged range from 15 to 53, with eight defendants below the age of 18. Jenny Hopkins, of the Crown Prosecution Service (CPS), said: "We have authorised South Wales Police to charge 27 defendants with the offence of riot. "A further four defendants have been charged with causing or threatening to cause criminal damage." Fifteen police officers were injured in the disorder, which saw property damaged and cars torched.

  Kyrees Sullivan, 16, and Harvey Evans, 15, died in a bike crash prior to the disorder

  Claims the teenagers were being followed by a marked police van in the minutes before they died began to spread quickly on social media following the crash. Crowds of about 100 to 150 people gathered at the scene of the boys' deaths shortly afterwards.

  A mural has gone up to remember Kyrees Sullivan, 16, and Harvey Evans, 15

  Former South Wales Police and Crime Commissioner, Alun Michael, initially insisted the two teenagers were not being followed by police before they died. But following the release of CCTV footage analysed by BBC Verify, the force confirmed its officers had been following the teenagers. Gross misconduct notices were served on the driver and passenger in the police van following the two teenagers. The driver is also under a criminal investigation for dangerous driving by the Independent Office for Police Conduct (IOPC). Ch Supt Danny Richards of South Wales Police said: "During the disorder several vehicles were set alight, property was damaged, police officers were injured, and residents were scared in their homes. "We are extremely grateful for the support from the community throughout our investigation and we now await the outcome of the court process."
