  It doesn't look like it will happen any time soon. Trump launched an appeal in this case, claiming he had broad immunity from prosecution as president, due to a 1982 precedent that recognised immunity in civil cases. Lower courts rejected Trump's claim but the Supreme Court ruled that Trump had limited immunity for official acts he carried out as president. But the revised indictment shows that Department of Justice (DoJ) Special Counsel Jack Smith interprets the Supreme Court ruling to mean his case can still move forward. Mr Smith's office said the superseding indictment had been presented to a new grand jury that had not previously heard evidence in the case. But whether it would satisfy the Supreme Court's presidential immunity framework remains unclear. There is a strong chance some of the charges may not survive. If Trump wins re-election, he could in theory pardon himself or order all these charges to be dismissed. Could Trump go to prison?
  • None Conspiracy to defraud the US is punishable by a fine or up to five years in prison
  • None Obstructing an official proceeding is punishable by a fine or up to 20 years in prison
  • None Conspiracy against rights is punishable by a fine or not more than 10 years in prison, or both

  But there are logistical, security and political questions around whether Trump would actually serve time in jail even if convicted. A conviction at trial would take the US into uncharted territory.

  A payment made to the adult-film actress Stormy Daniels shortly before the 2016 election. Ms Daniels was paid $130,000 (£103,000) to keep quiet about her claim that she had sex with Trump, which he denies. Instead, this case was more technical and centred on how Trump's former lawyer, who paid Ms Daniels, had his reimbursement recorded as legal fees in Trump's accounts. The prosecution's key witness was ex-lawyer Michael Cohen, who testified that his former boss knew about the elaborate scheme to disguise the payment. In days of heated cross-examination, Trump's lawyers sought to undermine Cohen and paint him as an unreliable witness and convicted liar. The jurors deliberated over two days before finding the former president guilty of all 34 counts of fraud under campaign finance laws. Trump has said the case is politically motivated. His lawyers are requesting the conviction be overturned, citing the Supreme Court immunity ruling, according to a letter seen by US media including the BBC's partner network, CBS News. Could Trump go to prison? Each of the charges carries a maximum of four years in prison, although a judge could sentence Trump to probation later this month. Legal experts told the BBC they think it is unlikely Trump will be jailed and that a fine is the more likely outcome.

  Trump and some 18 other defendants are accused of criminally conspiring to overturn his very narrow defeat in the state of Georgia in the 2020 election. The racketeering investigation, led by Georgia prosecutor Fani Willis, was sparked in part by a leaked phone call in which the former president asked the state's top election official to "find 11,780 votes". Trump was hit with 13 criminal counts, subsequently reduced to 10. They include one alleged violation of Georgia's Racketeering Influenced and Corrupt Organizations Act (Rico). The former president has pleaded not guilty. A date has not been set. The timeline has been complicated by an effort by Trump and his allies to disqualify Ms Willis because of her romantic relationship with a man she hired to work on the case. An appeals court has tentatively set a date of 4 October to hear oral arguments in the bid to have Ms Willis removed. Could Trump go to prison? Georgia prosecutors would need to prove that there was a pattern of corruption from Trump and his co-defendants aimed at overturning the election result in order to bring a conviction. As for making false statements, that carries a penalty of between one to five years in prison or a fine.

  Whether Trump mishandled classified documents by taking them from the White House to his Mar-a-Lago residence after he left office. The case against Trump is also about whether he obstructed the FBI's efforts to retrieve the files, as well as the criminal investigation into his handling of them. The majority of the counts are for the wilful retention of national defence information, which falls under the Espionage Act. There are then eight individual counts, which include conspiracy to obstruct justice, withholding a document or record and making false statements. Trump has pleaded not guilty on all counts. The case was dismissed by a Florida judge on 15 July, marking a significant legal victory for Trump just days after he survived an assassination attempt in Pennsylvania. Judge Aileen Cannon, a Trump appointee, made the dismissal on the basis that the Justice Department's appointment of special prosecutor Jack Smith violated the US Constitution. But Mr Smith appealedthe decision, which came after Judge Cannon cancelled the 20 May trial date without giving a new one. Trump and his lawyers have long tried to put the case off until after the November presidential election. The case now faces an uncertain future after the Supreme Court's immunity decision. Could Trump go to prison? If the case is restarted, these charges could, in theory, lead to substantial prison time if Trump is convicted. Looking at the letter of the law, the counts under the Espionage Act each carry a maximum sentence of 10 years. Other counts, related to conspiracy and withholding or concealing documents, each carry maximum sentences of 20 years. But the logistics of jailing a former president mean a conventional prison sentence is seen as unlikely by many experts.

