title: Covid Christmas restrictions depend on data, says Chancellor - BBC News
date: '2021-12-21'
section: General
url: http://www.bbc.co.uk/news/uk-59739687
content: |-
  Rishi Sunak announces grants for hospitality and leisure businesses struggling with cancellations, and refuses to rule out more restrictions.

  The Chancellor Rishi Sunak has announced new measures to support restaurants, pubs and theatres struggling with cancellations due to Covid during the festive period.

  But, speaking to the BBC's business editor Simon Jack, he echoed the Prime Minister in refusing to rule out more restrictions before Christmas.
