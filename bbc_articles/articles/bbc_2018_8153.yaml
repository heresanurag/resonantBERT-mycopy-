content: |-
  Prince Harry and Meghan are greeted by the Irish prime minister and cheering crowds in Dublin.

  This video can not be played To play this video you need to enable JavaScript in your browser. Duke and Duchess of Sussex in Dublin

  The Duke and Duchess of Sussex have arrived in Dublin for their first official overseas visit since their wedding.

  It will be Prince Harry and Meghan's first trip outside the UK since getting married in May.

  They were greeted by Taoiseach (Irish Prime Minister) Leo Varadkar at Government Buildings in Dublin.

  Crowds had gathered outside and cheered as their convoy pulled up.

  Mr Varadkar walked the couple across the courtyard to show them the foundation stone which was laid by Edward VII in 1904.

