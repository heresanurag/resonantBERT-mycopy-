  Rhianna's baby bump and looks served by the likes of Cardi B and the Kardashian-Jenner sisters - here are the most iconic outfits at the 2025 Met Gala, one of the world's biggest nights in fashion.

  The theme for this year's event, held Monday at the Metropolitan Museum of Art in New York City, was "Superfine: Tailoring Black Style," the first since 2003 to focus exclusively on menswear.
