title: 'Davis Cup: Jack Draper ''working hard to get fit'' after US Open - BBC Sport'
date: '2024-09-09'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/cpvywvndj3jo
content: |-
  US Open semi-finalist Jack Draper leads Great Britain's squad which is bidding to reach the Davis Cup finals.

  Jack Draper is set to join up with the Great Britain Davis Cup squad on Tuesday and is “working hard to get fit” after picking up what he called a niggle at the US Open.

  Draper, 22, lost to Jannik Sinner in a physically demanding US Open semi-final in New York on Friday.

  "After a short turnaround following the US Open, Jack will be joining the team in Manchester on Tuesday ahead of the first match on Wednesday," a spokesperson for Draper said.

  "Jack and his team are working hard to get fit and Leon [Smith] will take all this into account when he makes his team selection."

  The British team will take on Finland on Wednesday, before facing Argentina on Friday and then 2022 champions Canada on Sunday, 15 September in Group D.

  Henry Patten, who won the men's doubles title at Wimbledon with Finland's Harri Heliovaara, replaced Joe Salisbury in the five-man team.

  Captain Smith also named Billy Harris, the veteran Dan Evans and experienced doubles player Neal Skupski in his squad.

  Harris replaced former British number one Cameron Norrie, who had to withdraw from the US Open through injury.

  The Davis Cup finals, which feature eight countries, will be held in the Spanish city of Malaga in November.
