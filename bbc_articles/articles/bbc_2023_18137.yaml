title: 'Albania: Opposition politicians set off coloured smoke flares in parliament
  - BBC News'
date: '2023-11-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-67479830
content: |-
  The smoke flares and fire were part of an attempt to try and stop the chamber voting on the 2024 budget.

  Albania's opposition politicians set off smoke flares and a fire in parliament in a bid to stop the chamber voting on the 2024 budget.

  The opposition lawmakers were protesting against what they said was increasingly authoritarian rule by the governing Socialist party.
