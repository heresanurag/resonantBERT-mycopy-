title: Video shows man driving into people at McDonald's in Chelmsford - BBC News
date: '2025-03-07'
section: General
url: http://www.bbc.co.uk/news/videos/cm2y1l9zrm1o
content: |-
  He is jailed for causing grievous bodily harm after the incident left a man with serious injuries.

  A man has been jailed for nine years after he drove his car into two people outside a McDonald's.

  Video showed the moments before Glenn Hobbs, 30, struck a man with his Mini Cooper in the restaurant car park in Drovers Way, Chelmsford at about 21:25 GMT on 18 December 2023.

  Witnesses are seen running towards the car, then as somebody tries to stop Hobbs driving away from the scene, they too are driven into.

  Essex Police said Hobbs, of Forefield Green in Chelmsford, had earlier been seen arguing with a male passenger in his 70s inside the car. The man was taken to hospital with serious injuries after the incident.

  He admitted causing grievous bodily harm with intent and assault of a person at Chelmsford Crown Court.

  Sgt James Pamment said: "This could easily have been a murder investigation. Hobbs struck his victim with a car, fully aware he could kill him."
