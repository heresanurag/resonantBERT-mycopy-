  The deal includes a £40m trust fund to support Chagossians, a component that the UN panel also questioned would "comply with the right of the Chagossian people to effective remedy... and prompt reparation". "The agreement also lacks provisions to facilitate the Chagossian people's access to cultural sites on Diego Garcia and protect and conserve their unique cultural heritage," the panel added. The Foreign Office spokesperson said: "We recognise the importance of the islands to Chagossians and have worked to ensure the agreement reflects this." Shadow Foreign Secretary Dame Priti Patel said the Conservatives "have been warning from the start that this deal is bad for British taxpayers and bad for the Chagossian people". "It is why I have introduced a bill in Parliament that would block the [agreement] and force the government to speak to the people at the heart of their surrender plans," she said. Both the House of Commons and House of Lords have until 3 July to pass a resolution to oppose the deal being ratified.
