content: |-
  Jeremy Bowen reports from Jenin as violence between Palestinians and Israelis continues.

  The BBC's international editor, Jeremy Bowen, is interrupted mid-flow by loud bangs of gunfire as he reports from Jenin refugee camp where Israel has been carrying out raids.

