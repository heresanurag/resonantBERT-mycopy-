title: 'Paris 2024 Olympics: North Korea performs diplomatic gymnastics - BBC News'
date: '2024-08-04'
section: Asia
url: http://www.bbc.co.uk/news/articles/crgkk0rle75o
content: |-
  They cheered Simone Biles and took selfies with their "foes" from the South - is this an-officially sanctioned charm offensive?

  An Chang-ok gave fleeting waves and smiles for the cameras on Saturday

  As the Paris gymnastics arena roared on American Simone Biles for her third gold medal of the 2024 Olympics, one of those applauding was none other than An Chang-ok, a rival from North Korea. Saturday’s women’s vault final saw the North share a stage with its foes South Korea and the US. An, 21, grinned and waved for TV cameras and hugged at least one fellow finalist - rare interactions with foreigners by a young woman required to perform diplomatic gymnastics while being carefully chaperoned on her trip away from home. Pyongyang’s decision to send athletes to these Games – two of whom even posed for a selfie with rivals from the South - has raised hopes that the secretive state could be partially reopening after a particularly deep period of isolation. After all, this comes after a heated period that has seen the North sending waste-filled balloons at the South.

  The North’s participation in these Games signalled a “remarkable” return to the international fold, suggested Jean H Lee, a former Associated Press journalist who opened the US news agency’s first bureau in the North Korean capital, Pyongyang. It did not send any athletes to the Tokyo Olympics, held in 2021, after the country shut itself off from the world even more sternly than usual due to the Covid-19 pandemic. But in Paris, it was “making the effort to rejoin the international community”, Lee said, “regardless of what’s happening with their nuclear programme, which is always the elephant in the room”. The North’s nuclear ambitions are an enduring cause of tension with the South and the US. But there was no sign of animosity between the three nations’ gymnasts on Saturday. This new generation of North Korean athletes have claimed two silvers in Paris, and occasionally surprised sport commentators who did not know what to expect from them. Winning medals was not the country's only aim, according to Prof Ramon Pacheco Pardo of King’s College London, who has written extensively on the two Koreas. The age-old North Korean art of “sports diplomacy” involved limited participation in a global forum to prove the country was normal, Prof Pacheco Pardo said. Athletes were some of the “few actors that North Korea has who won’t be viewed suspiciously” by the world, he explained.

  The limited support for An was in stark contrast to the roars for Biles

  The contrasting support for An and Biles could not have been starker. In an earlier competition during the Games in Paris, Biles was memorably cheered on by a host of celebrity supporters in the stands, including Lady Gaga, Ariana Grande, Tom Cruise and Snoop Dogg. Thousands of punters yelled her name on Saturday, too. An, meanwhile, received only polite appreciation from the neutrals. She had no compatriots in the room, since ordinary North Koreans are prevented from leaving their country. It is unlikely that anyone was watching at home, either, as the Games are not being televised live in North Korea, according to Radio Free Asia (RFA). And BBC Monitoring has only been able to find a handful of text reports in the tightly-controlled state media. Nonetheless, “the chattering class of Pyongyang certainly will, from one source or another” know the Olympic results as they come in, said John Everard, the UK’s ambassador to North Korea from 2006 to 2008.

