  An is among 16 North Korean who athletes have come to an opulent host city that could hardly be more different to the austere Pyongyang airport in which they were filmed setting off last month. Top North Korean athletes were likely to have some awareness of the outside world, said Everard, but there was still likely to be a “shock factor”. One of the viral moments of the Games so far was a rare encounter that seemed to break the boundaries: when a bronze-winning South Korean table-tennis player took a selfie that showed his mixed-doubles partner posing alongside the silver-winning North Korean duo. Would the leadership in Pyongyang have anticipated – or relished – this brief symbol of unity between two nations who are still technically at war? Agreeing to the selfie was “a message” from the North, said Prof Pachedo Pardo, who speculated that the move would have had Pyongyang’s consent. “North Korea is indicating that it doesn’t have a problem with South Korean people - that the issue it has is with the South Korean government.” At any rate, the moment was not totally unexpected, after something similar in 2016. And two years later, North and South fielded a joint women’s ice hockey team at the Winter Games in the South.

  A selfie taken earlier in the Games depicted table-tennis medallists from North and South Korea and China all together

  The selfie represents one of the North’s few visible interactions with the outside world during the Games, including a perfunctory press conference by the two table-tennis stars. Away from the stadiums, unverified footage has appeared to show An holding a collection of pin-badges, which are reported to be an item popularly traded by international gymnasts. After so much exposure to the Western world, the athletes will probably undergo a gruelling “debrief” after returning home to ensure they stay on-message, said Lee, who is also the co-host of the BBC World Service’s Lazarus Heist podcast. Contrary to the myth, any athlete deemed to have “failed” would probably not be punished, the analysts agreed. But they could face gruelling “self-criticism” sessions. “The big hit for not winning a medal isn’t so much the punishment, it’s that you don’t gain all the benefits that you could have gained,” said Everard. Victorious athletes may be given higher status in society and even prizes such as a new home. It remains to be seen whether this latest sporting diplomacy will translate into meaningful new talks between the two Koreas. The relative bonhomie in Paris was briefly imperilled at the outset by a furore when organisers mixed up the two nations’ names in the opening ceremony, for which they apologised. Outside the Bercy Arena after Saturday’s gymnastics, one fan from the Seoul side was not convinced the politics would change much. But she said the sight of sportspeople sharing a stage was at least a reminder that all Koreans were united by something “human”.

  The South Korean team was mistakenly announced during the opening ceremony as the "Democratic People's Republic of Korea" - the official name of North Korea
