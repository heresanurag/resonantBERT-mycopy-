title: 'Croydon: Rijkaard Salu Siafa, 22, named as man fatally stabbed - BBC News'
date: '2024-04-14'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68811431
content: |-
  A man is arrested on suspicion of murder as police ask anyone with information to get in touch.

  Members of the public rushed to give Rijkaard Salu Siafa first aid before medics arrived

  A 22-year-old man fatally stabbed in south London has been named by the Metropolitan Police.

  Rijkaard Salu Siafa was found injured in Fellmongers Yard, Croydon, just after 18:00 BST on Friday.

  Members of the public administered first aid before the ambulance service and air ambulance attended but he died at the scene.

  A 20-year-old man has been arrested on suspicion of murder and remains in custody, the force said.

  Police say there will continue to be an increased presence of officers following the stabbing

  Det Ch Insp Sarah Lee said: "Our thoughts and deepest condolences are with Rijkaard's family and friends who are coming to terms with his death following this shocking incident.

  "This loss has ripped an irreparable hole in their family and I would ask their privacy is respected at this difficult time.

  "I would also like to thank those members of the public who rushed help Rijkaard in the immediate aftermath."

  There will be an increased police presence in the Fellmongers Yard area and anyone with concerns, information or who witnessed the stabbing has been urged to contact police.

  Police cordoned off an area of Surrey Street, Croydon, as part of the investigation

