title: '‘It means a great deal’: Prince William thanks public for support - BBC News'
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/uk-68236387
content: |-
  The Prince of Wales expressed his gratitude for the well wishes sent to Catherine and King Charles.

  Prince William has expressed his gratitude for the “kind messages” for his wife, Catherine, as she recovers from surgery, and his father, the King, following the announcement of his cancer diagnosis.

  These were the first public comments from the Prince of Wales since Charles's news was made public on Monday.

  William made the speech at a charity fundraiser for London’s Air Ambulance and jokingly told Tom Cruise, who was also at the event, not to “borrow” any of the new helicopters.
