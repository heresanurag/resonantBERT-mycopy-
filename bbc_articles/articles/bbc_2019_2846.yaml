title: Chef's brother issues appeal to catch killer driver - BBC News
date: '2019-03-14'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-47568606
content: |-
  Nicolas Simenya said his brother Lionel, 36, suffered an "atrocious death" in Saughton, Edinburgh.

  Lionel Simenya was fatally injured on Fords Road in the Saughton area of Edinburgh

  The brother of a chef who was killed after being struck by a stolen car in Edinburgh has urged those responsible for the murder to give themselves up.

  Lionel Simenya, 36, died on Fords Road in the Saughton area at about 03:50 on 7 March.

  Detectives said he was knocked down by a Peugeot car which had been taken from a garage on the same road.

  Mr Simenya, who was originally from Burundi, had lived in the UK for several years.

  A week on from the murder, his brother addressed a media conference in a bid to bring those responsible to justice.

  Nicolas Simenya addressed the media at a police press conference in Edinburgh

  He said: "Lionel worked hard and never asked for help from anyone.

  "Lionel was in his prime and would have been 37 yesterday (Wednesday) had he not been taken away from us.

  "Yesterday we visited his body at the mortuary. He looked so peaceful. The same way he lived his life."

  Mr Simenya, 35, asked those with information to examine their consciences.

  The export manager added: "Lionel did not deserve to die such an atrocious death.

  "He should be living his life to the fullest, instead of having been cruelly taken away from us.

  "As his family, we urge anyone with information to come forward and contact the police so that we can start grieving."

  The father-of-one, who lives in Belgium, was joined at the media conference by Det Insp Stuart Alexander from Police Scotland's Major Investigation Team.

  Det Insp Alexander: "We need to get justice for Lionel's family."

  The victim left Burundi when he was 12 and settled in Belgium before moving to the UK.

  At the time of his death Mr Simenya was working as a chef in Gorgie.

  Police said the Peugeot was found abandoned at the end of the road before the occupants ran over a bridge and into a park.

