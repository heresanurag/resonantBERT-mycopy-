  • None Leicester are winless in their past 16 away top-flight matches on the opening day of the season (D8 L8) since a 3-2 win at Aston Villa in August 1933.
  • None United have won eight of their past nine home Premier League games against Leicester (D1), winning all three under manager Jose Mourinho.
  • None Mourinho is unbeaten in all 18 of his opening league matches of a season as a manager (W11 D7), winning nine of his 10 in the Premier League (D1).
  • None Pogba has scored in 11 Premier League games and ended on the winning side in all of them - a joint record he shares with former Liverpool player Ryan Babel.
  • None Leicester have conceded the first goal of the Premier League season in each of the last three seasons, also doing so in 2016-17 against Hull City and 2017-18 against Arsenal.
  • None Pogba's goal inside three minutes was Manchester United's fastest goal scored in a Premier League season opener - the previous fastest was Dwight Yorke after seven minutes against Everton in 1999-2000.
  • None Shaw registered his first senior goal in his 134th appearance in all competitions (67 games each for Southampton and Man Utd).
  • None Vardy has now ended on the losing side in four of the past five Premier League matches in which he's found the net (W1).

  United go to Brighton next Sunday (16:00 BST) in the second round of games, with Leicester hosting promoted Wolves on Saturday (15:00 BST).
