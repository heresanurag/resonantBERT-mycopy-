  The Metropolitan Police said a woman was arrested on suspicion of misconduct in public office.

  The Metropolitan Police said a woman was arrested on suspicion of misconduct in public office

  A woman has been arrested over a social media video allegedly showing a member of prison staff having sex with an inmate in a jail cell. The Metropolitan Police said it began an investigation on Friday "after officers were made aware of a video allegedly filmed inside HMP Wandsworth". It added a woman was arrested on suspicion of misconduct in public office the same day and is in police custody. The Met said its inquiries continue and it remains "in close contact with the Ministry of Justice".

  HM Prison Service previously said it had reported the former officer to police over the allegation. It follows an "urgent notification" about conditions at HMP Wandsworth in May, issued by chief inspector of prisons Charlie Taylor. An urgent notification, external means the chief inspector of prisons directly alerts the Lord Chancellor and secretary of state for justice if there is an urgent and significant concern about the performance of a jail. Inspectors found Wandsworth was stricken with severe overcrowding, vermin and rising violence among inmates. Wandsworth was also the scene of an alleged escape by Daniel Khalife last year. HM Inspectorate of Prisons declined to comment due to the pre-election period.
