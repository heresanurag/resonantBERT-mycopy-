  Take a look back at 20 years of the Wales Millennium Centre hosting incredible productions.

  • None The Wales Millennium Centre celebrates its 20th anniversary on 26 November, 2024
  • None The Wales Millennium Centre broke ground in February 2002 - this is the first steel strut to be placed
  • None The Wales Millennium Centre was designed by architect Jonathan Adams, who used local materials such as metal, slate, and glass to reflect Welsh history.
  • None 1,350 tonnes of Welsh slate were used in the Wales Millennium Centre's construction
  • None The building's iconic inscription was written in both English and Welsh, and composed by poet Gwyneth Lewis
  • None The Wales Millennium Centre opened on 26 November, 2004 with a weeklong celebration culminating in a visit from Queen Elizabeth II
  • None Inside the Wales Millennium Centre, its modern design features include multiple levels and several different performance spaces
  • None Its main theatre space, the Donald Gordon Theatre, can seat up to 1,897 people and has hosted a variety of huge events
  • None Queen Elizabeth II returned in 2005 for the 77th Royal Variety Show, which was hosted by the Wales Millennium Centre
  • None Dame Shirley Bassey also appeared at the 77th Royal Variety Show, alongside other Welsh stars, including Sir Bryn Terfel, Charlotte Church, and Katherine Jenkins
  • None Led Zeppelin frontman Robert Plant took to the stage at the Wales Millennium Centre in 2018
  • None The Welsh National Opera brought Madama Butterfly to the Wales Millennium Centre in 2022
  • None The Welsh National Opera returned with La Traviata in 2023, with Stacey Alleaume in the role of Violetta
  • None Hit musical Wicked came to the Wales Millennium Centre in 2024, with Sarah O'Connor and Laura Pick in the starring roles
  • None The Wales Millennium Centre also celebrated the coronation of King Charles III and Queen Camilla with a drone light display and change of colour on May 7, 2023 Slide 1 of 15 , A landscape photo of the distinctive Wales Millennium Centre at Cardiff Bay. , The Wales Millennium Centre celebrates its 20th anniversary on 26 November, 2024

  It’s been 20 years since the Wales Millennium Centre opened its doors for the first time. Since 26 November 2004, it has hosted world-class performances from entertainers including Van Morrison, Derren Brown, Rhod Gilbert, and even Welsh legend, Sir Tom Jones. “Here we have this perfect place to tell stories on a large scale, big stories about who we are, where we’ve come from and where we are going, and to tell them in here is just perfect," said actor Michael Sheen about appearing at the Cardiff venue. It has become a home for arts and culture in Wales, but it took a lot of planning to get the iconic venue built.

  “I began working on the project in 1998,” said architect Jonathan Adams. “There had been an earlier project called the Cardiff Bay Opera House, that was in the early nineties, and that didn’t go ahead.” The Cardiff Bay Opera House was intended to be home to the Welsh National Opera, but the project fell through. However, following funding from the Millennium Commission and the Welsh government, the Wales Millennium Centre was born. “I started with was photographs, pictures from books of Welsh landscapes, natural landscapes, coastline, cliffs and photographs of industrial relics,” said Mr Adams. The design he settled upon is now affectionately referred to as The Armadillo – its distinctive shape becoming a familiar Cardiff Bay landmark. “It’s not copper,” said Mr Adams, despite its distinctive colour. “It's actually a transparent skin on the top of the metal, and light interference gives the illusion of this kind of light bronzy colour to it.” Aside from its metallic look, the Wales Millennium Centre is renowned for the enormous inscription that makes up much of its windows. “The words have held their own,” said poet Gwyneth Lewis, who wrote the inscription. “I remember when the building first opened, a child commented that it looks like the building is dreaming.” The inscription reads "In These Stones, Horizons Sing". “Nothing like that had been done,” said Mr Adams. “It gives it kind of almost like a kind of spiritual feeling when you look in this, the coloured light, the way the light filters through it. "It is architecture, but it does something more because it's just not the kind of space that you, the people are used to experiencing.” The centre opened on 26 November 2004 with a huge celebration that lasted an entire weekend. It saw the new arts centre come to life with performances from Michael Ball, Charlotte Church, and Only Men Aloud! “When the building actually was opened and people came in, the response was unbelievably positive,” said Mr Adams. Over the years, the Wales Millennium Centre has seen plenty of world-class acts take to the boards within its several theatre spaces. Most recently, it was home to the hit musical, Wicked, and has also hosted theatre performances, hit comedians, and even rock stars at the stage doors. “No West End theatre boasts what we have here," said famed composer Andrew Lloyd Webber about the venue. "There’s nowhere in London that comes close to this facility.”
