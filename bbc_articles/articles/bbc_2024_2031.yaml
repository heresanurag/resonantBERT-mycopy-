title: Inside Nasser hospital as Israeli forces launch raid - BBC News
date: '2024-02-19'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68307982
content: |-
  Video verified by the BBC shows people in fear and trying to barricade themselves in.

  Israel's special forces have carried out a raid on the besieged Nasser medical complex, the main hospital in southern Gaza.

  The Israel Defense Forces (IDF) said Hamas fighters were hiding inside and that Israeli hostages' bodies might also be there.

  A spokesperson for Hamas denied that, calling it "lies".

  The sounds of battle and aftermath of the raid can been heard and seen in videos posted to social media and verified by the BBC.

  Read more on this story.
