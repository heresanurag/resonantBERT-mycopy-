title: 'Portstewart: Armed gang smash windows in attempted break-in - BBC News'
date: '2023-07-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-66143255
content: |-
  Four people, including a 61-year-old woman, are arrested after the house is extensively damaged.

  The armed gang smashed windows in the house

  A man and woman suffered a "terrifying experience" when an armed gang smashed windows when attempting to break into their home, the police have said.

  The incident happened shortly before 20:30 BST on Saturday at Swilly Close in Portstewart, County Londonderry.

  The man suffered minor injuries, which required treatment, and the woman was uninjured but shaken.

  Two men and two women were arrested on suspicion of aggravated burglary.

  The arrests came after police stopped a car on the Portmore Road.

  The attack happened at a house in Swilly Close, Portstewart

  The men, aged 31 and 34, and women, aged 28 and 61, remain in custody.

  PSNI Det Sgt Colhoun said: "This was a terrifying experience for the occupants of the property and our investigation is now under way to establish what happened, who was involved and a motive."

  Police are appealing to anyone who was in the area at the time, and saw anything suspicious to get in contact.
