content: |-
  The Princess of Wales has said her focus for now was to remain "cancer free".

  Catherine, Princess of Wales has said she has completed her chemotherapy treatment and is now focused on staying "cancer free", in a video message released by Kensington Palace.

  The princess revealed she was undergoing treatment for cancer in March and has been out of sight of the public for much of the year.
