title: 'Euro 2024: Uefa considering increasing squad sizes for tournament in Germany
  - BBC Sport'
date: '2024-04-09'
section: General
url: http://www.bbc.co.uk/sport/football/68766794
content: |-
  Uefa is considering increasing squad sizes for this summer's European Championship to 26 players following talks with coaches.

  Last updated on .From the section Football

  Uefa is considering increasing squad sizes for this summer's European Championship in Germany to 26 players following talks with coaches.

  Discussions with international bosses whose teams had qualified for Euro 2024 were held in Dusseldorf on Monday.

  "Uefa has taken note of the various opinions and points of view shared," said a statement from European football's governing body

  "A final decision will be made in the coming weeks."

  The subject was discussed as part of a wider two-day workshop for finalists, and now goes to Uefa's national team competitions committee then its executive committee.

  Squads are currently limited to 23 players, a return to the regulations used prior to Euro 2020. For that tournament, three further players were allowed to mitigate against the impact of potential Covid outbreaks in the squad.

  Uefa's statement added: "The positive discussions highlighted different points of view among coaches, with some expressing a desire to increase the squad size.

  "Others stated their preference to cap the squad size at 23, pointing out the difficulty in training with additional players, group management and the increased financial burdens placed upon national associations."

  England boss Gareth Southgate was previously in favour of 23-man squads but recently spoke of a preference for three extra players to cope with a demanding end to a domestic season "complicated" by personnel returning from long-term injuries.

  England and Scotland have two friendlies at the start of June before the deadline to submit their final Euros squads to Uefa on 7 June.

  Euro 2024 begins on 14 June with Scotland taking on hosts Germany in the opening game in Munich, while England get under way against Serbia in Gelsenkirchen on 16 June.
