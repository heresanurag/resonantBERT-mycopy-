title: Police rescue disabled man from burning home in New Jersey - BBC News
date: '2024-06-26'
section: General
url: http://www.bbc.co.uk/news/videos/clmmy7ggvz7o
content: |-
  A New Jersey police officer entered a burning home rescuing two people.

  A New Jersey police officer rescued two people from a burning home, including a disabled person unable to walk.

  The officer had to drag the man, who was in a chair, to safety on the grass outside.

  Both were taken to hospital and are expected to fully recover. The officer was briefly treated in hospital for the effects of smoke inhalation.
