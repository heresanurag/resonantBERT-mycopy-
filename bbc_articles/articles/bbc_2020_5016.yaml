content: |-
  A collection of your tributes to some of the thousands of people in the UK who have died with coronavirus.

  More than 127,000 people in the UK who contracted coronavirus have lost their lives - with the pandemic claiming more than 3.4 million deaths worldwide. As the UK marks a year since the first coronavirus lockdown was called, it's a time for reflection.

  We have gathered tributes to more than 770 of those who have died. Below are words of remembrance from friends, family and colleagues.

  Please enable JavaScript or upgrade your browser to see this interactive

  The tributes are displayed at random, which means that you will see different faces each time you visit this page.

  If we have used your tribute to your friend or family member, it will appear in the carousel above, or you can find it by entering their name in the search box below.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. Enter a name to search the tributes

  For more on NHS and healthcare workers, please see this page dedicated to 100 people who died while helping to look after others.

  For more on how it has affected people's lives, from family tragedy to its impact on everyday life, we have a collection of personal stories about life in lockdown.

