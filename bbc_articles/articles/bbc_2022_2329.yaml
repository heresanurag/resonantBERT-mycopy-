title: 'Lisburn: Man arrested over ''imitation gun'' at shopping centre - BBC News'
date: '2022-02-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-60485039
content: |-
  Police arrest a 50-year-old man after the incident at Bow Street Mall in Lisburn.

  Police officers responded to a report of a man acting suspiciously at Bow Street Mall in Lisburn

  A man has been arrested on suspicion of carrying an imitation firearm in a public place in Lisburn, County Antrim.

  The 50-year-old was arrested after police responded to a report of a man acting suspiciously at Bow Street Mall in the city centre at about 14:45 GMT.

  The shopping centre closed briefly due to the incident but reopened later on Tuesday afternoon.

  Earlier, officers said the man was also arrested on suspicion of possession of a point or blade in a public place.
