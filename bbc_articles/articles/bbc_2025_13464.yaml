content: |-
  President Trump said he's always liked Elon Musk, and was surprised to see Musk's criticism of his signature tax and spending bill.

  President Trump said he's always liked Elon Musk, and was surprised to see Musk's criticism of Trump's signature tax and spending bill.

  The president said the bill is incredible and a "huge tax cut", and he'd rather Musk criticise him than the bill. The president went on to say that he thinks Musk is upset because the administration took out the Electric Vehicle (EV) mandate.
