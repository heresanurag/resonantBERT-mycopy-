title: Stolen baby found 18 years on - BBC News
date: '2017-01-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38622076
content: |-
  A girl stolen as a newborn from a hospital in Florida has been found alive, 18 years on.

  The woman who raised Kamiyah Mobley has been charged with kidnapping.
