title: Murder investigation after death of two women in Milton Keynes - BBC News
date: '2024-12-27'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/c05pv0yy5y3o
content: |-
  A man has been arrested on suspicion of murder and attempted murder after the incident, police say.

  Two women dead and two hurt in suspected stabbing

  The incident happened in Santa Cruz Avenue in Bletchley

  Two women have died and a teenage boy and a man have been seriously injured in a suspected stabbing at a block of flats. They were found by police following an incident in Santa Cruz Avenue, Bletchley, in Milton Keynes at about 18:36 on Christmas Day. The women, aged 38 and 24, died at the scene while the man, in his late 20s, and the boy were taken to hospital, where they are said to be in a stable condition. A 49-year-old man from Milton Keynes was arrested on suspicion of murder and attempted murder, and remained in police custody.

  Forensic officers were at the scene on Thursday as investigations continued

  A dog was also injured in the incident and was taken to a vet but did not survive. Thames Valley Police confirmed a murder investigation was under way and the parties were "known to each other". Det Ch Insp Stuart Brangwin, of the major crime unit, said: "Firstly I would like to extend my deepest condolences to the families of the women who have tragically died in this shocking incident. "Members of the public will see a large police presence in the area while our investigation takes place. If you have any questions or concerns, please feel free to approach our officers and they will do their best to help."

  Forensic investigation officers could be seen walking to and from an address

  Floral tributes have been left close to the police cordon in the area. A family was seen leaving two bouquets of flowers, along with a grey teddy bear wearing a Santa Claus outfit, at the railings surrounding a children's play area in Santa Cruz Avenue. A woman, who said she did not know the deceased, said: "This is a lovely area. You don't expect to see this kind of thing here." Shazna Muzammil, a Conservative councillor on Milton Keynes City Council, said in a statement on X, external: "This is horrible on Christmas Day and we are deeply shocked and saddened by the tragic events in Bletchley. "Our thoughts are with the families, friends, and neighbours of the two women who have tragically lost their lives." The local St Joseph's church said it would open the school hall from 16:00 to 19:00 on Sunday, for those seeking a "moment of quiet contemplation or prayer, to light a candle or simply to have a cup of tea and a chat" following the incident.

  Flowers and a teddy bear were left close to the police cordon at the scene

