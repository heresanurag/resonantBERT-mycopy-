  James Waterhouse reports on how lives across Ukraine have changed irrevocably.

  From a basement in the centre of Kyiv, BBC Correspondent James Waterhouse reports on how lives across Ukraine have changed irrevocably in the last seven days.

  From a basement in the centre of Kyiv, BBC correspondent, James Waterhouse, has been reporting on the seismic developments in Ukraine as the Russian bombardment continues. In this special programme, James speaks with colleagues from BBC News across Ukraine and Russia on the extraordinary impact of seven days that have changed the world.
