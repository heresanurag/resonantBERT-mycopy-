  The UK left the European Union on 31 January 2020.

  Five key impacts of Brexit five years on

  Five years ago, on 31 January 2020, the UK left the European Union. On that day, Great Britain severed the political ties it had held for 47 years, but stayed inside the EU single market and customs union for a further 11 months to keep trade flowing. Brexit was hugely divisive, both politically and socially, dominating political debate and with arguments about its impacts raging for years. Five years on from the day Britain formally left the EU, BBC Verify has examined five important ways Brexit has affected Britain.

  Economists and analysts generally assess the impact of leaving the EU single market and customs union on 1 Jan 2021 on the UK's goods trade as having been negative. This is despite the fact that the UK negotiated a free trade deal with the EU and avoided tariffs - or taxes - being imposed on the import and export of goods. The negative impact comes from so-called "non-tariff barriers" - time consuming and sometimes complicated new paperwork that businesses have to fill out when importing and exporting to the EU.

  There is some disagreement about how negative the specific Brexit impact has been. Some recent studies suggest that UK goods exports are 30% lower , externalthan they would have been if we had not left the single market and customs union. We can't be certain because the results depend heavily on the method chosen by researchers for measuring the "counterfactual", i.e what would have happened to UK exports had the country stayed in the EU. One thing we can be reasonably confident of is that small UK firms appear to be more adversely affected than larger ones. They have been less able to cope with the new post-Brexit cross-border bureaucracy. That's supported by surveys of small firms, external. It's also clear UK services exports - such as advertising and management consulting - have done unexpectedly well since 2021, external. But the working assumption of the Office for Budget Responsibility (OBR), external, the government's independent official forecaster, is still that Brexit in the long-term will reduce exports and imports of goods and services by 15% relative to otherwise. It has held this view since 2016, including under the previous Government. And the OBR's other working assumption is that the fall in trade relative to otherwise will reduce the long-term size of the UK economy by around 4% relative to otherwise, equivalent to roughly £100bn in today's money. The OBR says it could revise both these assumptions based on new evidence and studies. The estimated negative economic impact could come down if the trade impact judged to be less severe. Yet there is no evidence, so far, to suggest that it will turn into a positive impact. After Brexit, the UK has been able to strike its own trade deals with other countries. There have been new trade deals with Australia and New Zealand and the government has been pursuing new agreements with the US and India. But their impact on the economy is judged by the government's own official impact assessments to be small relative to the negative impact on UK- EU trade.

  However, some economists argue there could still be potential longer term economic benefits for the UK from not having to follow EU laws and regulations affecting sectors such as Artificial Intelligence.

  Immigration was a key theme in the 2016 referendum campaign, centred on freedom of movement within the EU, under which UK and EU citizens could freely move to visit, study, work and live. There has been a big fall in EU immigration and EU net migration (immigration minus emigration), external since the referendum and this accelerated after 2020 due to the end of freedom of movement. But there have been large increases in net migration from the rest of the world since 2020.

  A post-Brexit immigration system came into force in January 2021. Under this system, EU and non-EU citizens both need to get work visas in order to work in the UK (except Irish citizens, who can still live and work in the UK without a visa). The two main drivers of the increase in non-EU immigration since 2020 are work visas (especially in health and care) and international students and their dependents. UK universities started to recruit more non-EU overseas students as their financial situation deteriorated. The re-introduction of the right of overseas students to stay and work in Britain after graduation by Boris Johnson's government also made the UK more attractive to international students. Subsequent Conservative governments reduced the rights of people on work, external and student visas, external to bring dependents and those restrictions have been retained by Labour.

  Freedom of movement ended with Brexit, also affecting tourists and business travellers. British passport holders can no longer use "EU/EEA/CH" lanes at EU border crossing points. People can still visit the EU as a tourist for 90 days in any 180 day period without requiring a visa, provided they have at least three months remaining on their passports at the time of their return. EU citizens can stay in the UK for up to six months without needing a visa, external. However, a bigger change in terms of travel is on the horizon. In 2025, the EU is planning to introduce a new electronic Entry Exit System (EES), external - an automated IT system for registering travellers from non-EU countries. This will register the person's name, type of the travel document, biometric data (fingerprints and captured facial images) and the date and place of entry and exit. It will replace the manual stamping of passports. The impact of this is unclear, but some in the travel sector have expressed fears it could potentially add to border queues as people leave the UK. The EES was due to be introduced in November 2024 but was postponed until 2025, with no new date for implementation yet set. And six months after the introduction of EES, the EU says it will introduce a new European Travel Information and Authorization System (ETIAS), external. UK citizens will have to obtain ETIAS clearance for travel to 30 European countries. ETIAS clearance will cost €7 (£5.90) and be valid for up to three years or until someone's passport expires, whichever comes first. If people get a new passport, they need to get a new ETIAS travel authorisation. Meanwhile, the UK is introducing its equivalent to ETIAS for EU citizens from 2 April 2025 (though Irish citizens will be exempt). The UK permit - to be called an Electronic Travel Authorisation (ETA), external - will cost £16.

  UK holiday makers will have to get ETIAS clearance to travel to the EU

  There are, of course, a large number of other Brexit impacts which we have not covered here, ranging from territorial fishing rights, to farming, to defence. And with Labour looking for a re-set in EU relations, it's a subject that promises to be a continuing source of debate and analysis for many years to come.

  Clarification: This article has been updated to clarify the amount of time EU citizens can spend in the UK, visa free.

