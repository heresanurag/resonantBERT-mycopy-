content: |-
  Nina Wilson said she wants Maddy Cusack's death to lead to more support for young players.

  'I want Maddy's death to lead to more support for girls playing football'

  Maddy Cusack made more than 100 appearances for Sheffield United

  When Maddy Cusack died in September 2023, her teammate Nina Wilson knew football was involved. Now, Wilson has spoken out in a bid to improve support for young players, saying she hopes the footballers of the future can feel "valued and protected" by their clubs.

  Cusack and Wilson first met when Wilson joined Sheffield United from Brighton Hove Albion in 2021. But, after the appointment of head coach Jonathan Morgan in February 2023, goalkeeper Wilson claims she and Cusack found themselves out of favour. Wilson was at Wolverhampton on loan and when she returned she said she was no longer allowed to train with the team. Wilson said during her last six months at the club she felt "crushed" by the environment and described her time there as the worst six months of her life. "Everyone gets dropped and football is ultimately about performance. But when you go into work every day and people walk past you and you feel completely valueless, it's easy to slip into a very dark hole, especially when you've given up your whole life to play football. "And that's the issue, when I had enjoyed it so much. I just had an awful time for the last six months, very isolated with a lack of support."

