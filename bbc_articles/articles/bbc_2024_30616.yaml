  Wilson said Cusack was also impacted by the change. "That bubbly person vanished. She wouldn't say a word at training. She was doing extra fitness sessions, extra running. She always did extra, but she was doing a lot. "She wouldn't say a bad word about anyone, so it was difficult for anyone to understand what was going on because she was trying to be professional but it was easy to see she wasn't herself." In September 2023 Cusack was found dead at home in Derbyshire. Sheffield United commissioned an investigation into the events leading to Cusack's death and found no evidence of wrongdoing at the club. An FA investigation that began in January is still pending. An inquest has been scheduled for April 2025. In February, Jonathan Morgan was sacked by Sheffield United after it separately emerged he had a relationship with a player at Leicester, where he had previously worked.

  Maddy Cusack had been playing football since she was a small child

  Wilson described Cusack as an "absolute sweetheart" off the pitch. She said: "She was the funniest person I've ever met, genuinely one of the best teammates I've had." Cusack was on a part-time contract to play football and also had a job in the club's commercial department. Her family have previously spoken of the "pressure" she was under while combining both roles. They began the Maddy Cusack Foundation to change the culture of women's football and make sure psychological support is available in every club. Wilson said: "We want girls at the age of four and five to play football like me and Maddy did, but we want them to go into a safe environment, into clubs where they feel valued and protected and where staff are looking out for them and are trained in mental wellbeing and warning signs."

  Nina Wilson and Maddy Cusack played together for 18 months

  When Wilson heard the news of Cusack's death, she said she "knew what that meant immediately". "It was very obvious to me that football was involved in some way. I knew nothing would be the same again. I don't think football will ever be the same for me." A Sheffield United spokesperson said the club had an external and independent whistleblowing service, a dedicated women's safeguarding officer, a player care officer and access to internal mental health first aiders and wellbeing services. They said: "As with the game in general, Sheffield United Women continue to grow and evolve, which includes transitioning from part-time to full-time. "Additionally, there are further plans to strengthen the support staff of the women's team. "There is currently a Football Association investigation ongoing with regards to a number of the points raised, Sheffield United has fully co-operated in this regard and continue to respectfully await the outcome." Wilson said she hoped the Foundation's work would inspire girls to play, but also inspire clubs and staff to do better. "That would be a fantastic legacy to have and that would sum up Maddy to a tee." Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
