title: Car crashed into Rutherglen ice cream shop and set alight - BBC News
date: '2023-12-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-67703639
content: |-
  Several flats were evacuated after what police believe was a deliberate attack in South Lanarkshire.

  Police said the shop was 'significantly damaged' in the attack

  A car was crashed through the front of an ice cream shop and then set alight during a suspected attack in South Lanarkshire.

  Fire crews extinguished the blazing 4x4 after it was driven into the front of Cookiez 'n' Creamz in Rutherglen at about 1:20 on Wednesday morning.

  Several flats above the shop on Kyle Square were evacuated following the fire, with one still affected.

  No one was understood to have been injured as a result of the fire.

  The Scottish Fire and Rescue Service (SFRS) said three appliances were dispatched to respond to the incident.

  Police Scotland said "significant damage" was caused to the store and inquiries were ongoing.

  The force said a flat immediately above the shop was still closed off, with the householder "seeking alternative accommodation".
