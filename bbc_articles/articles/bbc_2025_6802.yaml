  Team-mate Lewis Hamilton, though, admitted to struggling. The seven-time champion was down in 13th place and 0.622secs slower than Leclerc in the second session; eighth fastest, five places and 0.506secs off in the first. "Not the greatest," Hamilton said. "Getting the tyres working today was the issue from our side. "Normally Saturday goes backwards but there is not a lot of backwards for me to go from where I am. "I have to make some improvements to the car. There were a few bits through the session that felt good and just when we get to the soft tyre, it's not there. We will make some changes tonight and hopefully tomorrow we will come back stronger." Tsunoda's crash interrupted the race-simulation runs late in the second session. His initial impact with the wall broke the left-front track-rod, which catapulted the car into the outside wall, where the front right was damaged as well. "I just turned in too much and clipped the wall inside wheel and had damage," Tsunoda said.

