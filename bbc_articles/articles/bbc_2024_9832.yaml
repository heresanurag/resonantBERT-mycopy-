title: Hainault sword attack victim named as Daniel Anjorin, 14 - BBC News
date: '2024-05-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68932942
content: |-
  Daniel Anjorin died in hospital after the attack in north-east London on Tuesday morning.

  Daniel's family are being supported by specialist police officers

  A schoolboy who was killed in a sword attack in London on Tuesday has been named as Daniel Anjorin. The 14-year-old died in hospital after being stabbed in Hainault, where four other people - including two police officers - were seriously injured. A 36-year-old man was arrested at the scene on suspicion of murder and is in police custody. Daniel's school, Bancroft's, said he was a "true scholar" who had a "positive nature and gentle character".

  It described him as a "core member" of the community, and continued: "Losing such a young pupil is something we will always struggle to come to terms with." The teenager attended the school where Grace O'Malley-Kumar - who was killed in a random stabbing attack in Nottingham in June 2023 - was previously a pupil. In a letter to parents seen by BBC News, the school's head said it "seems scarcely believable" that children and teachers were "facing fresh sorrow". The suspect hit a 33-year-old when he crashed his van into a property in Laing Close, at about 07:00 BST on Tuesday, and then attacked the man who suffered a neck wound, the Met said.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Another man, 35, was cut on his arm when he was attacked inside a nearby house. Their conditions are not considered to be life-threatening, police said. The suspect then went on to attack Daniel. He died from stab wounds shortly after being taken to hospital. The Met said police arrived within 12 minutes of the first call and officers had used a kind of pepper spray and a Taser on the suspect, which did not stop him. Two officers were then attacked, suffering serious injuries, and will need long-term treatment to recover, the force added. The suspect fled before eventually being surrounded by other officers in Thurlow Gardens where he was overpowered with a Taser. He was arrested and taken to hospital due to injuries from the crash. He is now in police custody.

  Emergency services were called to Hainault, in north-east London, shortly before 07:00 BST on Tuesday

  Det Ch Insp Larry Smith described it as a "complex investigation due to the number of crime scenes, forensic evidence, hours of CCTV footage and witnesses we need to speak to". "I know that many people will want answers and we are working to provide them as soon as we can," he added. "I would also echo previous calls for patience as my officers carry out a painstaking investigation to deliver justice for Daniel, his family, those injured and the wider community."

  In a letter to parents, the school's head teacher, Simon Marshall, wrote: "Naturally this event will have a profound effect on the whole school, but this will be especially true of his peers. "All we can do for now is to look after one another and respect the privacy of Daniel's family - it is a time of profound grief and as a community we will endure best if we come together in kindness and compassion." A flag was seen flying at half-mast at the school on Wednesday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jubilee Church, which Daniel was a member of, expressed their "immense sadness" at the "sudden and tragic death". Separately, the school where his mother works, Holy Family Catholic School, has issued a statement naming her as Mrs Anjorin. It said: "It is with great sadness that I share with you the news of the death of the child of one of our staff members. "Please keep Mrs Anjorin, her husband and their other children in your prayers."

  The independent day school is in Woodford Green

  Janti Charalambous, whose son attended Snaresbrook Prep School with Daniel, dropped off a bag of supplies to the Anjorin family on Wednesday afternoon. The family friend told reporters: "Daniel was an amazing young man. "He was good at his studies. He was good at his sports. Very much loved by many, many people and came from a wonderful family. "The family are in shock. Obviously they are very heartbroken. He was such a young boy taken away from his family. "It's sad that it's happened in a family, a community, like this. It's heart-breaking.

  "At least they got their time to spend with Daniel, 14 years. Their faith is sustaining them and we are all supporting them in any shape or form that they need. "He was a joyful boy - he brought his family lots of joy and his life has just been taken away. Just walking out on his way to school. He was much-loved, his family are much-loved. "I was talking to my son and he was so heartbroken, he can remember Daniel driving his little car and playing in the street. "He said he can't imagine it happening to his own brother."

  Flowers have been left at the scene

  Speaking to LBC, Met Police Commissioner Sir Mark Rowley said: "The first thing you have to say is for the parents involved, who've lost their 14-year-old, and that is just horrific, and it's everyone's worst nightmare. "I'm sure we're all thinking about them." The Met said urgent checks on their system had so far found no traces of the suspect having previous involvement with the police but it was "investigating further for certainty". It confirmed he had not been arrested by officers on Monday. "An arrest did take place at Copperwell on Monday, 29 April which relates to a different person and a separate incident," a spokesperson said. Grace O'Malley-Kumar died in a knife attack in Nottingham where she was at university but had previously also attended Bancroft's School. Her family, from Woodford Green, about 15 minutes by car from Hainault, have sent their condolences to Daniel's family. Grace's mother, Dr Sinead O'Malley, said: "I don't think there's anything anybody can say that can really do anything to alleviate their hurt and their pain."

