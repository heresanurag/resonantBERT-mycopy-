title: Search for woman missing at Edinburgh wild swimming spot - BBC News
date: '2024-09-05'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c2edyggkk97o
content: |-
  HM Coastguard were alerted to concern for the woman shortly before 15:00.

  A search and rescue helicopter was at the scene

  Emergency services have been searching for a woman missing in Wardie Bay in Edinburgh. HM Coastguard was alerted to a "report of concern" for the woman at the popular wild swimming location shortly before 15:00 on Tuesday. A number of lifeboats and helicopters were deployed to search for the woman with other emergency services also in attendance. HM Coastguard said the search was stood down at 20:20 with the woman not found.

  A spokesperson added: "The HM Coastguard search and rescue helicopter from Prestwick has been sent as well as Coastguard Rescue Teams from Fisherrow and South Queensferry. "The RNLI's inshore lifeboats from Kinghorn and South Queensferry are supporting, as well as nearby vessels. Police Scotland has been alerted." A Police Scotland spokeswoman said: “We were made aware of concern for a woman in the water near Wardie Bay, Lower Granton Road, Edinburgh, around 15:05."
