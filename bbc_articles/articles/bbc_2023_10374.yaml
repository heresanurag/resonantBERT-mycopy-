title: Extra energy bill scheme was staggering failure, says MP - BBC News
date: '2023-07-14'
section: Business
url: http://www.bbc.co.uk/news/business-66203677
content: |-
  The scheme to help people who missed out on last winter's energy subsidy should be reopened, a senior MP says.

  The Alternative Funding scheme was set up for households such as those in narrow boats or park homes

  A scheme designed to help people who missed out on last winter's £400 energy bill subsidy was a "staggering failure", a senior MP has said.

  The Energy Bill Support Scheme Alternative Funding was set up for households who do not have an energy supplier, such as those in park homes.

  Nearly a million households could apply but only a fraction received the money.

  MP Angus MacNeil said the government should reopen the scheme, saying it had "missed the most vulnerable".

  The government said it had spent more than £50m supporting 130,000 households without a domestic energy supplier.

  All UK households were eligible for the £400 help with fuel bills, after energy prices rose sharply last year. For households who pay their bills by direct debit, the support was given automatically through monthly payments from October to March.

  But people who live off-grid, on narrow boats, travellers, people in park homes and some tenants and people on heat networks, did not automatically receive the support, because they did not have an energy provider.

  The government set up the Alternative Funding scheme for the over 900,000 households in those categories. It also applied to people living in care homes, who are charged for energy costs in their bills.

  But only 141,000 bill-payers managed to apply for and receive the subsidy before the scheme closed on 31 May.

  There remain 750,000 eligible households who have missed out on the £400 support payment.

  PHD student Sheree Smith had hoped money from the scheme would help her

  PHD student Sheree Smith said she spent more time at university than at her flat so she didn't have to pay higher energy bills.

  She told BBC Breakfast: "I was really hoping that £400 would have helped me to weather the storm so I could stay in my flat, but ultimately it didn't come in time.

  "I ended up having to return to my parents."

  Mr MacNeil, a former SNP member, who now sits as an independent and chairs Parliament's energy security and net zero committee, said the scheme should be improved and extended so that people could claim the subsidy they were entitled to.

  "A lot of these will be vulnerable people who are particularly suffering the bite of the energy price spike and government should be moving heaven and earth almost, to make sure these people are getting the money," Mr MacNeil said in an interview with the BBC's Money Box programme.

  In his role as chair of the parliamentary committee, Mr MacNeil is due to question Energy Security and Net Zero Secretary Grant Shapps in September. Mr MacNeil said he would ask him to relaunch the scheme and make it easier to use, since "clearly delivery has failed".

  Some applicants criticised the scheme for being too complex or not recognising their circumstances. Others said their applications were repeatedly rejected, despite being eligible.

  A government spokesperson said: "We spent billions to protect families when prices rose over winter, covering nearly half a typical household's energy bill.

  "We're now seeing costs fall even further with wholesale energy prices down by over two thirds since their peak."

  You can hear more on this story on the Money Box podcast after broadcast.
