title: 'Everton 1-1 Arsenal: I have seen it 15 times, it is never a penalty - Mikel
  Arteta - BBC Sport'
date: '2025-04-05'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c20xkrpp67vo
content: |-
  Iliman Ndiaye's equaliser for Everton in their Premier League draw against Arsenal was "not a penalty", says Gunners manager Mikel Arteta.

  'I have seen it 15 times - it is never a penalty'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Iliman Ndiaye's equaliser for Everton in their Premier League draw against Arsenal was "never a penalty", says Gunners manager Mikel Arteta. Ndiaye's second-half spot-kick at Goodison Park on Saturday lunchtime came after visiting full-back Myles Lewis-Skelly bundled over Jack Harrison inside the box. Referee Darren England immediately pointed to the spot and the video assistant referee (VAR) went with the on-field decision after a check. "I am 100% frustrated," Arteta told BBC Match of the Day. "We were very much in control of the match. We were hoping in the second half to continue the domination but out of nothing the referee decides to give a penalty. "I have seen it 15 times - in my opinion it is never a penalty. "They [Everton] are very good at what they do. We gave away so many silly fouls which led to set-pieces. They generated nothing at all." Blues manager David Moyes added: "I've watched it zero times so I couldn't tell you if it was a penalty or not because I've not seen it back."

  This video can not be played To play this video you need to enable JavaScript in your browser. 'If that's a penalty then O'Brien should be off' - Arteta

  Mikel Arteta (right) played more than 200 games for Everton between 2005 and 2011

  A game that lacked any real flow ended 1-1 - Leandro Trossard opening the scoring for Arsenal before Everton hit back via Ndiaye's coolly taken penalty immediately after the break. But there were question marks as to whether a foul should have been given when Lewis-Skelly and Harrison came together in the box. The Premier League match centre on X explained:, external "The referee's call of penalty for the challenge by Lewis-Skelly on Harrison was checked and confirmed by VAR - with the contact deemed to be sufficient for a penalty and inside the area." Former Premier League striker Chris Sutton said on BBC Radio 5 Live: "I think it was a very, very soft penalty. "Even David Moyes will look at that and agree that the penalty was a soft one." Former England striker Alan Shearer and ex-Liverpool midfielder Danny Murphy added on BBC Match of the Day the decision was "soft". Shearer said: "There was not enough to give a penalty for me. They aren't going to overturn it though. It is very harsh." Murphy, added: "I think Arteta is right. It is a really bad decision, it is never a penalty. They are both tugging and pulling each other." The result means Arsenal suffered a potentially fatal blow in their quest for the Premier League crown. Leaders Liverpool require only 11 points from their remaining eight games - starting with Fulham on Sunday - to guarantee themselves the title. Arteta said of the title race: "We have no margins - that's so clear. We have done enough to win the game but the margins are very small."

