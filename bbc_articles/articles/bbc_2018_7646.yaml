title: St Pancras International Station drinking fountain restored - BBC News
date: '2018-06-02'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-44333698
content: |-
  The makeover of the fountain at St Pancras in London marks the terminal's 150th anniversary.

  A historical water fountain outside London's St Pancras International Station has been restored.

  The 150-year-old fountain has been given a makeover to mark the station's anniversary celebrations.

  It can now be used by the public for drinking.
