content: |-
  Jury finds Ugandan high court judge Lydia Mugambe guilty and she will be sentenced in May.

  UN judge guilty of forcing woman to work as slave

  This video can not be played To play this video you need to enable JavaScript in your browser. Body camera footage showed Mugambe telling police "I even have immunity" as they arrested her

  A United Nations judge has been convicted of forcing a young woman to work as a slave. Prosecutors said Lydia Mugambe "took advantage of her status" over her victim by preventing her from holding down steady employment while forcing her to work as her maid and provide childcare for free. The 49-year-old, who is also a High Court judge in Uganda, was found guilty of conspiring to facilitate the commission of a breach of UK immigration law, facilitating travel with a view to exploitation, forcing someone to work, and conspiracy to intimidate a witness. She will be sentenced at Oxford Crown Court on May 2.

  In footage released by Thames Valley Police, Mugambe appeared shocked when an officer said he was arresting her under the Modern Slavery Act. She then had a conversation with the officer, in which she said: "I am a judge in my country, I even have immunity. I am not a criminal." Asked to reaffirm that she had immunity, Mugambe told the officer: "Yes, I have a diplomatic passport." The conversation ended with the defendant saying: "I came here as a student, I don't need anyone to work for me. "I didn't come with her, she asked me because she has worked at my home before, she asked me."

  Gasps were heard from the public gallery as the verdicts were given, and the court was cleared as the defendant appeared unwell. Caroline Haughey KC, prosecuting, told jurors during the trial: "Lydia Mugambe has exploited and abused [her alleged victim], taking advantage of her lack of understanding of her rights to properly paid employment and deceiving her as to the purpose of her coming to the UK." She alleged Mugambe, who was studying for a law PhD at the University of Oxford, had conspired with Ugandan deputy high commissioner John Leonard Mugerwa to arrange for the young woman to come to the UK. Prosecutors said the pair participated in a "very dishonest" trade-off, in which Mr Mugerwa arranged for the Ugandan High Commission to sponsor the woman's entrance into the UK. In exchange Mugambe would attempt to speak to a judge who was in charge of legal action Mr Mugerwa was named in, jurors heard. She was also found guilty of conspiring to intimidate the woman to withdraw her support for the prosecution, and to have the charges against her dropped.

  Mugambe's trial heard she had the intention of "obtaining someone to make her life easier and at the least possible cost to herself". She denied forcing the young Ugandan woman to do household chores and said she "always" treated her with love, care and patience. The young woman Mugambe tricked into coming to the UK, who cannot be named for legal reasons, told the court previously she felt "lonely" and "stuck" after her working hours were limited. According to her UN profile page, Mugambe was appointed to the body's judicial roster in May 2023, three months after police were called to her address in Oxfordshire. Thames Valley Police commander for Oxfordshire, Ch Supt Ben Clark, said: "Lydia Mugambe is an extremely qualified lawyer, a Ugandan High Court judge and a UN Criminal Tribunal judge. "After the offences had been reported to the police, Mugambe tried to evade justice by repeatedly claiming she had diplomatic immunity due to her status. "Any immunity Mugambe may have enjoyed as a UN judge has been waived by the Office of the United Nations Secretary General."

