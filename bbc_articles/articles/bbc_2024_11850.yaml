content: |-
  The BBC takes to the streets of Glasgow to find out what issues are on voters' minds ahead of the election.

  It is less than three weeks until polls open across the UK for the general election.

  As part of the Your Voice, Your Vote project, the BBC took to the streets of Glasgow to find out about key issues on voters' minds.
