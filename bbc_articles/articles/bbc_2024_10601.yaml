title: Police give reassurances following Bournemouth beach stabbing - BBC News
date: '2024-05-26'
section: Dorset
url: http://www.bbc.co.uk/news/uk-england-dorset-69063125
content: |-
  A 17-year-old boy has been arrested on suspicion of murder after a 34-year-old woman was stabbed.

  Dorset Police has closed the popular beach while officers investigate the murder

  Police investigating the murder of a woman stabbed to death on a beach have sought to "reassure" residents and visitors they are "are investigating at pace" the "horrendous incident". The double stabbing happened on Durley Chine Beach in Bournemouth shortly before midnight on Friday. The 34-year-old woman died at the scene and another woman, 38, was taken to hospital with serious injuries. A 17-year-old boy has been arrested on suspicion of murder. The boy, who is from Lancashire, remains in custody. Dorset Police has closed the popular beach while they investigate.

  A woman died at the scene and another was taken to hospital with serious injuries

  In a statement Det Supt Richard Dixey, of the major crime investigation team, said: "We recognise the impact this incident has on our communities and are aware of speculation already appearing online about the possible circumstances. "It is important to state that our investigation is still in the very early stages and it is unhelpful to speculate as to why this tragedy has happened, especially as an arrest has been made." He added: "I want to reassure our communities in Dorset as well as the many people who choose to visit our county during the bank holiday weekend that we are exploring all available lines of enquiry to establish the motives for this horrendous incident."

  A murder investigation is under way and police are appealing for witnesses

  He said there would be an enhanced police presence in the area, with the force "working closely" with partner agencies and community groups to achieve this. Police have appealed for anyone with information to come forward, including those in the vicinity of the beach who may have seen anything unusual. An online portal, external has been set up so people can submit information. People arriving at the beach on Saturday were turned away by police due to an extensive cordon. Officers guarding the cordon were unable to say how long it would remain in place, during what would normally be a busy Bank Holiday weekend.

  The beach is deserted due to a cordon between Bournemouth Pier and the west of Alum Chine

  Vikki Slade, leader of Bournemouth, Christchurch and Poole Council, said: "A cordon is in place between Bournemouth Pier and the western side of Alum Chine, and is likely to remain for some time." She said the number of Community Safety Officers on duty in the area over the Bank Holiday weekend "and beyond" would be increased "so there is an enhanced visible presence on our streets". He said it was "important to remember that these events are headline because they are thankfully still rare locally".

  A 17-year-old boy has been arrested on suspicion of murder

