title: 'As it happened: Vaccine joy as UK hits 15 million first jabs - BBC News'
date: '2021-02-14'
section: UK
url: http://www.bbc.co.uk/news/live/uk-56060135
content: |-
  Politicians and health experts welcome news that at least 15 million people in the UK have had their first coronavirus jab.

  The pandemic means that Valentine's Day is very different from last year, when coronavirus had only just reached the UK.

  Following nearly a year of social distancing, lockdowns and limited opportunities to socialise in person, some couples have been thinking about how to make the day special even though they are apart. Others will be trying to find some time for romance while cooped up at home with young children.

  The BBC has been asking people how they are celebrating this year, including Londoners Deep Bajwa, 37 and Bhavin Bhagalia, 39, who say this Valentine's will be a day for the family and their children are in charge of planning the festivities.

  Deep Bajwa says her children have planned their day Image caption: Deep Bajwa says her children have planned their day

  We've also been looking at how restaurants - usually booked up with Valentine's dates - have adapted their offerings this year.

  Eateries from local cafes to Michelin-starred restaurants are packaging up special dinners as a treat, in a bid to keep customers coming back when the pandemic is over.

  For Ruth Smith, who lives in East Molesey, near London, it's an opportunity for a fancy meal on Valentine's Day without being surrounded by loved-up couples.

  She will be getting a three-course meal kit from her local cafe, choosing from twice-baked cheese souffle with fennel and apple salad, individual beef Wellington, vanilla panna cotta with cardamom, and rose infused streusel.

  "It means I'm really looking forward to Valentine's Day rather than kind of thinking, oh I'm going to be on my own and really not concerned at all this year," she says.
