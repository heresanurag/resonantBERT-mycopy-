title: Dubai airport runway submerged as heavy rain causes flash floods - BBC News
date: '2024-04-22'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68833955
content: |-
  The UAE is known for hot and dry weather but heavy rains have become more regular in recent years.

  Heavy rain has battered parts of the United Arab Emirates, including Dubai, causing flash flooding in some areas.

  Footage shows the city being lashed by the fierce storm, leaving cars stranded in submerged roads.

  Operations at Dubai International Airport were temporarily suspended due to the deluge.

  Earlier in the day, the UAE's National Centre of Meteorology issued a weather warning for large swathes of the country, including Abu Dhabi, Dubai and Sharjah.

  The UAE is known for hot and dry weather, although heavy rains have become more regular in recent years.
