title: 'Porthcawl: Body found after search for woman missing at sea - BBC News'
date: '2024-01-27'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68118813
content: |-
  Police say the missing woman's family has been informed after a body is found.

  Emergency services, including the coastguard, RNLI and police, were involved in a search earlier in the week

  A body has been found after a woman went missing at sea.

  A search was launched on Tuesday evening after a woman was seen entering the sea in Porthcawl, Bridgend county.

  Emergency services called off the search on Wednesday evening and police said on Saturday a member of the public had found a body nearby.

  South Wales Police said formal identification was yet to take place but the woman's family and the coroner had been informed.
