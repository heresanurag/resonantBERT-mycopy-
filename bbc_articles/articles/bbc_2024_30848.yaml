title: Fear of a reckoning simmers in Assad's Alawite heartland - BBC News
date: '2024-12-16'
section: Middle East
url: http://www.bbc.co.uk/news/articles/ce8nzjkye42o
content: |-
  Quentin Sommerville is on patrol with HTS in Latakia, as they pledge to protect minorities.

  This video can not be played To play this video you need to enable JavaScript in your browser. Quentin Sommerville joins HTS forces as they make arrests on the streets of Latakia

  Noor stands trembling in the chill afternoon light of the courtyard, not from the cold, but from fear. Dressed in her thick winter coat, she has come to make a complaint to the men of Hayat Tahrir al-Sham (HTS), Syria's new de-facto rulers, and the new law in town. She begins to cry as she explains that three days earlier, just before nine in the evening, armed men had arrived in a black van at her apartment in an upscale neighbourhood of the city of Latakia. Along with her children and her husband, an army officer, she was forced out onto the street in her pyjamas. The leader of the armed men then moved his own family into her home.

  Noor (left) had her home taken over by armed men

  Noor - not her real name - is Alawite, the minority sect from which the Assad family originates, and to which many of the former regime's political and military elite belonged. Alawites, whose sect is an offshoot of Shia Islam, make up around 10% of Syria's population, which is majority Sunni. Latakia, on Syria's north-west Mediterranean coast is their heartland. As with other cities, an array of different rebel groups have rushed into the power vacuum left after Assad's soldiers abandoned their posts. The regime had exploited sectarian divisions to maintain its grip on power, now the Sunni Islamist HTS has pledged to respect all religions in Syria. But Latakia's Alawite population is fearful. Some people haven't even left their homes since the regime change because they worry that there will be a reckoning, and that they will have to pay a heavy price for the support of the old regime. Noor shows CCTV footage from her apartment, to 34-year-old Abu Ayoub, HTS general security commander. In the film, a group of bearded fighters, some wearing baseball caps and others in military fatigues, is pictured on her doorstep.

  They are not from HTS, she says, but another group, rebels from the northern city of Aleppo. "They broke down the door. There were 10 militants at our door and 16 others waiting down the street with three cars," Noor tells Abu Ayoub. His men are mostly from Idlib and Aleppo, where the HTS and allied rebel factions were based before launching the offensive that overthew Assad three weeks ago. They stand around in combat fatigues, holding their rifles and listening intently as she describes how the family's belongings were thrown into the street. HTS was once aligned with al-Qaeda and is still proscribed as a terror organisation by most Western countries, although the UK and US say they have been in contact with the group. In a matter of weeks, it has gone from enemy of the state to the law of the land. Abu Ayoub and his men are adjusting to the change in roles from revolutionaries to policemen. Noor is only one of a long line of complainants who have come to their general security station with grievances. The base, the city's former military intelligence headquarters, was perhaps the most feared place in Latakia. Now it is a shambles, with broken radios and equipment scattered across the courtyard. Torn portraits of Bashar al-Assad lie in the dirt. A man joins the queue of those making complaints. He has a black eye, broken ribs, and his shirt is torn and bloodied. He says men from Idlib had broken into his apartment.

  An injured man petitions HTS forces for help

  "Some of them were civilians, some wore military clothes and were masked," he says. "They hit my daughter and aimed weapons at my son's head. They stole money, they stole gold." Every call-out here is a show of force, especially with so many armed groups in the city. With the man's son directing them, the HTS security force drives to one of the poorer neighbourhoods, weaving through a warren of back streets, past scrapyards and middens. The armed police take up positions along the street and at the doorway of the apartment. They bring two suspects back to the station for questioning. But they barely have time to clear their weapons when there is another complaint, a dispute over gas bottles that left another man beaten. He says three men had pulled guns on him.

  Another race in the cars to a crowded commercial and residential neighbourhood. When the police pull a suspect out into the street - his face still bloody from the earlier fight - local women come to their balconies and shout "Shabiha! Shabiha!". They are accusing the suspect of being a member of the shadowy militia force, mostly made of Alawite men, who did the Assad regime's dirty work. Since its lightning-fast sweep to victory across Syria, Islamist HTS has pledged to keep the peace and protect all of the country's minorities. And every day Abu Ayoub has to make good on that pledge. "Some infiltrators into the revolution, some saboteurs, and some weak-minded people are taking advantage of the situation in the areas that were recently liberated," he says. Abu Ayoub admits the situation in the city was "a bit chaotic" but turns his attention to Noor. "We are here now, we weren't here when the army left. We were initially in Damascus and then we came. They are thugs, and we will evict them from your house. We will return your belongings. You have my word," he said. And with that he orders his men into their pickup trucks and with sirens blaring they head for the apartment.

  Latakia is a city liberated. Last Friday, tens of thousands of people from all sects, gathered on the streets to celebrate the downfall of the Assad dynasty. In a city square, they sat atop the plinth where the statue of Hafez al-Assad, Bashar's father - who ruled for 29 years before his death in 2000 - once stood, and joyfully waved the flag of a free Syria. The message that day was unity, of one Syria, without sectarian division. But after half a century of tyrannical rule from a regime which fanned sectarian hatred and warned that Alawites would be massacred if they ever lost power, it is an adjustment to say the least. On Saturday, three HTS fighters were killed, and 14 injured outside the city, in what it said was gun battle with a criminal gang. HTS, which is trying to maintain calm, claims there was no sectarian element to the attack. On the way to Noor's apartment, the HTS convoy speed through the streets and passersby cheer them and flash the peace sign.

  HTS drive through the busy streets of Latakia

  The new Syrian flag, with its green instead of red stripe, and three red stars instead of two green, is commonplace on shop shutters and hanging from balconies. But in Alawite areas, people mostly watch in silence as the convoy moves along. There are fewer new flags in evidence. Azam al-Ali, 28, an HTS security officer from Deir al-Sour in eastern Syria sits in the front seat. After so much oppression, he says, it will take time for people to trust authority again. "Most of the oppressed that come with complaints are from two sects, the Sunni and the Alawite. We do not differentiate. But the extreme poverty that this regime left behind caused this vast chaos," he tells me as the traffic parts for the convoy. And he notes that Alawites, some of whom were among the poorest in Syria, suffered too under the Assad regime. We arrive at Noor's apartment and half a dozen armed HTS men hurry up the stairs.

  HTS commander at the door of the apartment

  The woman behind the door refuses to open up, but after some negotiation the door opens, and she and her family are ordered to leave. Noor goes in to retrieve some clothes and books for her daughter who is studying for exams. Weapons and ammunition belonging to the rebel squatters are confiscated. "When I went to HTS today I was terrified," says Noor. "Their appearance was so intimidating and frightening. Honestly, though, they were very nice." But she won't be returning to the apartment. One nightmare has ended in Syria, and for Alawites, another has begun, she says. As she clutches her belongings, Noor says she no longer feels safe in her home. "It's impossible for me to live here again. I do have hope, but not in the near future. At the moment I don't dare."
