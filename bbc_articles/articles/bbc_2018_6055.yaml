content: |-
  Recent pay rises for stars in the Indian women's team has drawn the issue into sharp relief.

  England's women cricketers have just finished their tour of India, where they have taken on the highest paid female cricketers in the world.

  Recent pay rises for stars in the Indian women's team has drawn the pay gap in the sport into sharp relief.
