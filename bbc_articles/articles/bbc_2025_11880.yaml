content: |-
  The TV personality first found fame on Channel 4's How Clean is Your House alongside Aggie MacKenzie.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  How Clean Is Your House star Aggie MacKenzie has paid tribute to her former co-star Kim Woodburn, following her death aged 83. The pair shot to fame in 2003 on the Channel 4 show, which saw them visit dirty homes and spruce them up. MacKenzie told The Sun:, external "Kim was a tormented soul, but now she's finally at peace. "We clashed often. Behind the fierce persona was deep pain and incredible strength. She survived because she had to. I hope she's resting now. She was an unforgettable woman."

  MacKenzie and Woodburn did not know each other well before the launch of How Clean is Your House, having been paired up following a screen test. Woodburn also appeared on Celebrity Big Brother and was well known for her outspoken views.
  • None 'You're an adulterer!' - How Kim Woodburn became a one-liner legend In a statement announcing her death, Woodburn's manager told BBC News: "It is with immense sadness that we let you know our beloved Kim Woodburn passed away yesterday following a short illness. "Kim was an incredibly kind, caring, charismatic and strong person. Her husband Peter is heartbroken at the loss of his soulmate. "We are so proud of the amazing things Kim achieved in her life and career." He added: "We kindly ask that Kim's husband and close friends are given the time and privacy they need to grieve." On Woodburn's official Instagram account, external, run by her husband, a post read: "My wonderful, beautiful Kim passed away last night. God bless, my love," accompanied by numerous photos of Woodburn over the years.

  Woodburn shot to fame on How Clean is Your House

  Singing duo Jedward, who appeared alongside Woodburn in Celebrity Big Brother, were among those paying tribute., external "Rest in Peace My Lovely," the pair said. "You had our back when we got bullied in CBB and we will never forget that. There will never be another Kim Woodburn." Producer Lee Smithurst, who was the showrunner for Eurovision 2023 in Liverpool, posted a photo on X of Woodburn chatting with school children, external. "Sad to hear about Kim Woodburn," Smithurst said. "I only worked with her once in 2018 and she was everything you would want her to be. After finishing filming she noticed the venue was next to a school and said 'I'm a big hit with the primary kids, dear. Has anyone got a pen?' - she was right."

