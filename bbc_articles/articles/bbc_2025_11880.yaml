  Woodburn was also a regular contributor on Loose Women and This Morning, and was well known for her outspoken views. She became a well-known cultural figure following her stint on Channel 5's Celebrity Big Brother in 2017, going on to spark several memes. Woodburn famously fell out with Loose Women panellist Coleen Nolan when both took part in Celebrity Big Brother. Woodburn appeared on Loose Women in 2018 in an attempt to settle their feud but a tense exchange between them left Woodburn in tears. She broke down as she discussed her traumatic childhood, before walking off the set. The clash sparked more than 3,000 complaints to regulator Ofcom, with the majority about how the Loose Women panel treated Woodburn.

  Woodburn's other high profile TV appearances included appearing in the ninth series of I'm a Celebrity... Get Me Out of Here! She finished as runner-up to Gino D'Acampo in 2009. But it was Channel 4's How Clean Is Your House that gave Woodburn her big break. The producers teamed her up with Aggie MacKenzie and the show went on to be a hit, running from 2003 to 2009. It featured the dynamic duo tackling filthy homes, offering cleaning tips to viewers along the way. The highly camp show, with its dramatic music and Woodburn's scolding of the offending homeowners, proved a huge hit, turning the pair into overnight stars. Woodburn was also among the line-up for E4's Celebrity Cooking School in 2022. Liverpool-based radio presenter, Pete Price, wrote on X, external: "You loved or hated this larger than life character. I loved her." Pop culture writer Nick Levine said:, external "RIP Kim Woodburn. A high camp icon who drag queens will be doing for eternity, and gays and huns will still be quoting on the daily. Impact!"

  Woodburn finished in third place in Celebrity Big Brother in 2017

  Woodburn was born in Hampshire but left home at 16 and moved to Liverpool where she worked as a live-in cleaner. She later settled in Nantwich, Cheshire, with second husband Peter Woodburn, who she married in 1979. Speaking to BBC show Heaven and Earth in 2008, Woodburn talked about her difficult childhood, referring to her 2007 autobiography, Unbeaten. She said she was sent to a boarding school early on: "I found the nuns extremely cruel, my sister and I were there. We were very young, we were all very badly treated. They beat you, they were very cold to you. I was about three or four [when she went]. There was no kindness at all." She also talked about becoming pregnant in her 20s and losing the baby at six months, going on to bury him in a park in Liverpool. "I was on my own, I didn't have the backing of my parents. My boyfriend of three years had gone and found someone else. I'm so glad today it isn't such a shameful thing. You don't need to do what I had to resort to now out of shame and sadness. Of course I do (still think about her son)... it's only natural." She said she would never forgive her parents for the cruelty they showed her.
