  Mangione was indicted on federal charges of murder and stalking

  Mr Mangione is also facing state charges in both Pennsylvania, where he was arrested, and New York. At an arraignment in December, he pleaded not guilty to state murder and terrorism charges in New York. Mr Thompson was shot dead in Manhattan early on 4 December last year. The suspect escaped the scene before exiting the city. Five days later, Mr Mangione was arrested at a McDonald's restaurant in Pennsylvania. Public reaction to Mr Thompson's killing has shed light on deep frustrations with privatised healthcare. Some have celebrated Mr Mangione has a folk hero, and a fund set up for his legal defence garnered nearly $1m (£750,000) in donations. Supporters gathered outside the courthouse on Friday too. Shell casings with the words "deny", "defend" and "depose" were found at the crime scene. Critics say these words are associated with healthcare companies avoiding payouts and increasing their profits.
