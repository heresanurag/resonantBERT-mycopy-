title: 'Steve Wright: BBC DJ died from stomach ulcer rupture - BBC News'
date: '2024-07-10'
section: Culture
url: http://www.bbc.co.uk/news/articles/cd1jlvp77y4o
content: |-
  The causes of death for the DJ were were acute peritonitis and a perforated gastric peptic ulcer.

  Steve Wright was a radio DJ for nearly 50 years

  DJ Steve Wright's cause of death was a ruptured ulcer in his stomach, according to his death certificate. The long-standing presenter, who hosted shows on BBC radio for more than four decades, died suddenly in February aged 69. The certificate stated that the causes of death were acute peritonitis and a perforated gastric peptic ulcer. Peritonitis is an infection of the lining of the abdomen. Wright joined the corporation in the 1970s and hosted programmes including the popular afternoon shows on BBC Radio 1 and 2. He also presented TV shows including Top of the Pops.

  His death had been registered at Westminster Register Office on 3 July by a family member. The Metropolitan Police previously said Wright's death at a flat in Marylebone, central London, "was unexpected, but is not being treated as suspicious". In May, Westminster Coroner's Court said in a statement: "An inquest will not be required for Mr Wright. "The coroner has now discontinued this case."

  Wright was one of radio's most famous and most popular presenters. His broadcasting career began in 1976 as part of the team at Radio 210 in Reading. He launched Steve Wright in the Afternoon on Radio 1 in the early 1980s. It was known for its 'zoo' format, with contributions from his on-air "posse". He presented the afternoon show on Radio 2 from 1999 to 2022. Most recently he presented the station's Sunday Love Songs, as well as a series of podcasts and specials. Michael Ball took over the show in June, and paid tribute to Wright, calling his legacy "immeasurable". Wright was honoured for his services to radio in the December 2023 New Year Honours list.
