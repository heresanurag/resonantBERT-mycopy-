content: |-
  Fans piled on the vehicle, dancing and singing in celebration as it moved through Shoreditch High Street, London.

  This is the moment football fans surrounded the Bellingham bus in London, after spotting where it was headed.

  Fans piled on the vehicle, dancing and singing, as the number 47 bus moved through Shoreditch High Street, during celebrations after England's Euro 2024 semi-final win against the Netherlands.

  Some people on social media believed the bus had been renamed in honour of England and Real Madrid star Jude, unware that Bellingham is actually a place in south-east London.
