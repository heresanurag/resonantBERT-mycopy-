  A selection of striking news photographs taken around the world this week.

  On the 80th anniversary of the D-Day landings, veterans are applauded by the crowd in Arromanches-les-Bains, France. On 6 June 1944, tens of thousands of soldiers landed on five beaches in Normandy. The largest amphibious invasion in the history of warfare played a crucial role in the defeat of Nazi Germany, and the liberation of Europe.
