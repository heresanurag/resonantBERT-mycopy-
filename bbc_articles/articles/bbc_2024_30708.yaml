content: |-
  All scheduled academy fixtures over the weekend are being postponed as a mark of respect.

  A "friendly and happy" West Ham academy goalkeeper has died aged 15 after being diagnosed with cancer. Oscar Fairs from Benfleet, Essex, was found to have a rare 7cm (2.8in) ependymoma brain tumour in August 2023. He underwent seven surgeries, one round of chemotherapy and one round of radiotherapy, but was told palliative care was the only option. The club's sporting director Mark Noble said he had "such a bright future ahead of him, and it is just so unimaginably devastating that he has been taken from his family and friends at this age".

  Tributes have been paid on social media, external by many football clubs and players, including Real Madrid keeper Thibaut Courtois and retired Liverpool star Jamie Carragher. A donation page was set up to help the family raise £100,000 towards a treatment trial in France. West Ham footballers donated £27,000, chairman David Sullivan donated £10,000 and Arsenal footballer and former West Ham star Declan Rice gave £5,000, according to the family. Mr Noble said: "Oscar was adored by everyone at the academy - not only was he a great goalkeeper, he was a true Hammer and a fantastic young person, who will be deeply missed by everyone who had the pleasure to know him. "I have wonderful memories of Oscar playing in my garden - [my son] Lenny and his team-mates all loved him. "The thoughts and sincere condolences of everyone at the club are with Oscar's parents, Natalie and Russell, and his brother Harry, and we kindly ask that the family's privacy is respected at this extremely difficult time." All scheduled academy fixtures over the weekend have been postponed as a mark of respect.

