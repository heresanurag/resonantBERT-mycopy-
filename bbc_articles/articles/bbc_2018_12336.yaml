title: Sir Philip Green named in Lords over harassment claims - BBC News
date: '2018-10-27'
section: General
url: http://www.bbc.co.uk/news/business-45983550
content: |-
  Speaking in the House of Lords, Lord Hain said it was in the public interest to reveal his name.

  Sir Philip Green has been named by Lord Hain as the businessman behind an injunction against the Telegraph.

  Speaking under parliamentary privilege in the House of Lords, Lord Hain said it was in the public interest to reveal his name.

  The BBC has not been able to verify the allegations contained in the Telegraph's report.

  Sir Philip "categorically and wholly" denied allegations of "unlawful sexual or racist behaviour".
