title: Winter fuel cuts to go ahead after government wins Commons vote - BBC News
date: '2024-09-11'
section: General
url: http://www.bbc.co.uk/news/articles/cn5r07kw24no
content: |-
  The attempt to halt the planned cuts was defeated by 348 to 228 votes - a majority of 120 - but it is not clear how many Labour MPs abstained.

  Millions of pensioners will lose winter fuel cash after Commons vote

  Millions of pensioners are set to lose winter fuel payments this year after an attempt to block the cuts failed in Parliament. The government won a vote on the plan to restrict the payments to all but the poorest pensioners by 348 votes to 228 - a majority of 120. Fifty-two Labour MPs did not take part in the vote, including seven ministers, but it is not clear how many deliberately abstained or were absent from Parliament for another reason. Only one Labour MP, Jon Trickett, voted against the government, on what he said could "be a matter of life and death" for his constituents.

