  The vote was called by the Conservative opposition, who put forward a motion to block the government's plans to means-test the benefits. Shouts of "shame" were heard in the Commons chamber as the result was announced, which will mean the number of fuel payments will fall from 11.4 million to 1.5 million this winter. Dozens of Labour MPs were reported to have been planning to abstain in protest at the cuts despite Chancellor Rachel Reeves urging them to back the government. Labour sources said 12 of the MPs absent for Tuesday’s vote had not been authorised. However, BBC News has found that around 20 of those who did not vote have previously publicly expressed opposition to the policy - for instance in interviews or on social media. Several others have not expressed a view publicly and have not replied to requests for comment. Members of Parliament can be absent for a number of reasons, for example travel, medical appointments or constituency meetings. They can receive "slips" – or permission – from the party whips to miss the vote or be "paired" with someone from the opposing side who also agrees not to vote in order to nullify the effect of their absence. The winter fuel payments of either £200 or £300 are normally made in November and December and will still be paid to all pensioners claiming pension credit to top up a low income. The Prime Minister, Sir Keir Starmer, told the BBC's Laura Kuenssberg on Sunday that the impact on the 10 million pensioners losing out would be lessened by the fact pensions were rising by 4% in April, increasing the full state pension by £460 a year. However, pension payments are made throughout the year, rather than in a lump sum like winter fuel payments, and are not intended to cover only heating costs. During the debate, Conservative shadow work and pensions secretary Mel Stride said Labour had made no mention of cutting fuel payments during the election campaign. "Broken promises already, that special contract that they sought to have with the British people based on integrity and decency smashed into a million pieces," he said. He added the Labour government had "caved in to its trade union paymasters" with above-inflation pay settlements for striking workers made "on the backs of vulnerable pensioners". Work and Pensions Secretary Liz Kendall accused the Conservatives of "faux outrage" and accused them of leaving 880,000 pensioners eligible for benefits out in the cold. To loud cheers, she said the Tories "never took the action needed to increase pension credit uptake" and accused them of playing "fast and loose with the public finances". Veteran Tory MP Sir Edward Leigh described the decision as a "punishment beating" and said Labour's claims about the previous government's financial decisions were "absolute and complete rubbish". Leigh said pensioners on the cusp of the pension credit eligibility threshold were still "looking after every penny" and would now lose winter fuel payments too. Liberal Democrat Treasury spokeswoman Sarah Olney agreed with Kendall that the Conservatives had left "a legacy of reckless economic mismanagement" but said that should not "serve as a cover for measures that cause suffering for the most vulnerable in our society". Five of the seven Labour MPs suspended from the Parliamentary party for voting against the government over the two-child benefit cap also backed the Tory motion, as did former Labour leader Jeremy Corbyn and other members of his independent alliance. The Liberal Democrats, SNP, Greens and DUP also voted against the government's move to start means-testing the winter fuel payment. Trickett posted on X that he feared the measure would cause more pensioners to fall into poverty during the winter. The MP, who was a shadow cabinet member during Corbyn's leadership, said this winter would be "extremely difficult" for his constituents, and accused energy companies of continuing "obscene profiteering". He posted: "In my view the government should be looking to raise revenues from the wealthiest in society, not working class pensioners." The change is expected to shave £1.4bn from the welfare bill this year, as a step towards filling the £22bn "black hole" Reeves says the government inherited from the Conservatives.
