title: Huw Edwards tried grooming me as a school pupil, claims man - BBC News
date: '2024-11-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/cx2l4pxr5e7o
content: |-
  The former news presenter invited the 18-year-old to BBC offices, he claims.

  Huw Edwards was given a six month suspended jail sentence at Westminster Magistrates’ Court in September

  A man has accused former news presenter Huw Edwards of attempting to “groom” him when he was 18 and still in school. Saying he behaved inappropriately towards him, the man - now in his early 20s - said Edwards invited him to the BBC’s London offices when he was a pupil. He alleged Edwards messaged him offers of help with his career, adding that he now sees them as something more. A BBC spokesperson said "robust safeguarding policies are in place" regarding site visits and careful consideration would be given to any concerns.

  The young man, who requested anonymity, shared with Y Byd ar Bedwar - S4C’s current affairs programme - a series of messages where Edwards referred to him as “babe” and “big boy” and signed off with kisses. He also says he was invited to the BBC’s London offices by the former News at Ten presenter. Shortly after he visited the premises he said Edwards cut all contact with him. "I think it’s obvious he was grooming me, trying to pull me in," he said. "I remember him asking me to meet him, then telling me not to worry if I couldn't, which he followed with a few kisses. “I look at this now and think, 'He’s just playing with me'.

  “I feel angry about the way he’s treated people and because others have had much worse experiences than me. After pleading guilty to making indecent images of children, 63-year-old Edwards was given a six month suspended jail sentence at Westminster Magistrates’ Court in September. He had 41 illegal images of children on his phone, including an image of a child approximately aged between seven and nine. Journalist and presenter Beti George, who has worked regularly with Edwards, said: "Something has happened to Huw. "I don’t know what, but the Huw I know or thought I knew would never do something like that. "Who in their right mind would do such a thing? There is no justification for it."

  Edwards, who joined the BBC in 1984, was one of the UK's most high-profile broadcasters

  A BBC spokesperson said: "We have been clear that we are appalled by Huw Edwards’ crimes. "He has betrayed not just the BBC, but audiences who put their trust in him." They added that a board-commissioned independent review of the BBC’s workplace culture is under way, focusing on preventing abuse of power and ensuring everyone at the BBC conducts themselves in line with company values. "The BBC has robust safeguarding policies and processes in place and if people contact us directly with concerns we will look at these carefully, in line with our complaints framework," they added. Y Byd ar Bedwar, external's makers made repeated attempts to contact Edwards, but he did not respond to their messages.
