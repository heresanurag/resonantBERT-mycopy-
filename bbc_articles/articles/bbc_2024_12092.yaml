title: Swinney calls for 'social tariff' on energy bills - BBC News
date: '2024-06-17'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cw00lp8xlwko
content: |-
  The proposal would see people on low incomes, the elderly and disabled pay less on energy bills.

  SNP leader John Swinney has proposed a "social tariff" that would see people on low incomes, the elderly and disabled pay less on energy bills. The first minister said the policy would give people "reassurance and peace of mind" about energy costs, which have soared in recent years. The proposal would be funded by a mixture of general taxation and "top slicing" the profits of energy companies, with the party claiming the cost would be about £7.8bn for the current year. Mr Swinney claimed the bills could be cut in half for some people as a result.

  He said: "I want to make sure that people on low incomes, people who are elderly and people with disabilities are essentially given a social tariff for their energy costs, which will give them the reassurance and peace of mind that their energy costs are going to be sustainable." Mr Swinney added that fuel poverty had become "literally unbearable" for some, and that traditional rights, such as free healthcare and education, needed to be extended to "to reflect the realities of the modern world." The tariff would also cover broadband and mobile charges, in what Mr Swinney described as taking traditional left-of-centre politics and applying it to the modern world. He said the moves would mean people were "liberated of the excessive burden and they're able to access public services and their wider communication in society.". When asked if he would consider the Liberal Democrat proposal to expand fuel duty relief to new areas, including parts of Scotland, the first minister said his key focus was on improving the cost of living, which the social tariff would play a part in.

  The tariff will be part of the SNP manifesto, which is expected to be revealed this week. Mr Swinney said: "I think the future of Scotland is as an independent country, and that will be at the heart of my party's manifesto. "I want to make sure we set out why Scotland will benefit from being an independent country, and one of those areas in which we would benefit is by having access to to the full range of powers that will allow us to avoid the spending cuts coming down the track." Rural affairs also featured in the Liberal Democrat manifesto, which was launched by leader Alex Cole-Hamilton in in South Queensferry. The party's plans include investing £170m in Scottish agriculture and a £500m "rescue package" for care, which it says will relieve pressure on the NHS. The manifesto also contains a pledge to ensure everyone has a warm home and to guarantee people would have "fast access" to GPs and dentists. Elsewhere on the campaign trail, Scottish Labour leader Anas Sarwar said that his party would seek to "reset devolution" if it wins the election on 4 July. He told BBC Scotland News that Labour have "momentum" and that Scotland would be "at the heart" of a Labour administration. Mr Sarwar said: "If we're honest with ourselves, we have not used the full potential of devolution to deliver for people here in Scotland. An incoming Labour government would reset devolution, take it back to its founding principles, [and] get governments working together in the national interest."

  The Scottish Conservatives' deputy leader Meghan Gallacher accused the SNP of being "anti-business" as she campaigned in Annan. She called on the Scottish government to extend the 75% rates relief for firms in the retail, hospitality and leisure sector, which the chancellor Jeremy Hunt used in his autumn statement last year. That meant £230m was sent to Scotland due to the rates relieve being a devolved issue, but the Scottish government decided to use the funding elsewhere as they wrestled with financial issues. Ms Gallacher said: "The SNP government are crippling Scottish businesses by failing to pass on the rates relief available to firms south of the border. "The SNP's anti-business agenda is costing jobs and livelihoods, particularly in the retail and hospitality sectors, because firms are operating at a competitive disadvantage."
