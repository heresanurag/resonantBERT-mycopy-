title: 'Israel-Gaza war: Dead bodies and tanks on road south as people flee - BBC
  News'
date: '2023-11-09'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-67361128
content: |-
  BBC Verify has been looking at video, listening to eyewitnesses and analysing satellite images.

  Civilians fleeing intense fighting in northern Gaza have described seeing decomposing bodies and Israeli tanks along a designated "safe road".

  The Israel Defense Forces (IDF) has told people - via social media and leaflets - to use the Salah al-Din road between specific times of day.

  So what is this journey like?

  BBC Verify has been looking at video, listening to eyewitness testimony and analysing satellite images to try to get a clearer picture.

  Before the fighting started, northern Gaza was home to over one million people.

  It has been heavily bombed and Israeli ground forces are now fighting Hamas there, following the group's attack on Israel on 7 October.

  Salah al-Din is the main road crossing the length of Gaza and the Israeli military has told civilians to use it as an evacuation route. The road runs past Wadi Gaza, a valley the IDF uses to divide northern and southern Gaza.

  The IDF has said people will be safer in southern Gaza although its air strikes there have continued.

  On Wednesday Ahmed Zeyadah told a local journalist filming for the BBC about his journey. He had travelled from his home in the district of al-Nasr in the north.

  Carrying his toddler, he said, "I am so tired. We don't know what to do, we don't know where to go. To whom do we turn? To whom do we say: Come and save us."

  Mahmoud Ghazzaawi fled his home in al-Zeitoun in northern Gaza because of the number of attacks.

  He said he left his home at midday and had been walking for five hours. He also said he did not know where to go.

  "There are martyrs [dead people] thrown on the ground, may God have mercy on them," he said.

  Ahmed Zeyadah made the journey down Salah al-Din road with his toddler

  Most people appear to be walking. According to the UN, the Israeli military reportedly forced evacuees to leave vehicles at the southern edge of Gaza City.

  Those travelling from the furthest point north walked up to 12 miles (20km).

  One of the evacuees told UN observers: "I saw a lot of damage on my way, I saw Israeli tanks and soldiers positioned at the eastern side of the road, near Netzarim, and they did not approach us.

  "I saw a few dead bodies and body parts on the road."

  In another video, posted on the messaging app Telegram on Tuesday, a woman talked about bodies on the highway.

  She said she had been looking for her son near the Netzarim junction - named after the former Israeli settlement in Gaza that was located nearby - and described finding his body lying in the road among others as she travelled south.

  "I saw the Israeli tanks, but I didn't care, I looked around and found my son. I recognised him by his belt, and his phone," she said on the video.

  The BBC spoke to a local journalist who recognised the woman and said she had visited the Al Aqsa hospital in Deir al-Balah, central Gaza, on Tuesday where she registered the death of her son. He was buried on the same day, he said.

  The BBC has not found video footage or still images of bodies on the Salah al-Din highway in recent days. We have asked the IDF to comment on the reports of bodies there.

  This woman, seen in a video posted on Telegram, said she found her son's dead body on Salah al-Din Road

  The UN estimates up to 15,000 people made the journey on Tuesday, with around 5,000 the day before.

  On Wednesday the Israeli military said it was opening the road for an extra hour until 15:00 local time because large numbers of people were using it. A military spokesman later claimed as many as 50,000 people had left northern Gaza along Salah al-Din Road on Wednesday.

  The IDF has published video footage on X showing groups of people walking along the road, some of them waving white flags (to show they are civilians), with an Israeli tank next to the highway and facing them.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The BBC has verified the location - by matching distinctive buildings seen in the background of the shot, and it is on the Salah al-Din road about 3km north of Wadi Gaza.

  Satellite imagery of the highway - posted on 7 November - shows people walking along the same stretch of road and an IDF tank next to it.

  The image also shows damage to buildings alongside the Salah al-Din road and what appears to be debris on the road.

  Another satellite image from the same date shows a larger group of people walking along the road around 0.6 miles (1km) north of Wadi Gaza.

  Israeli tanks have been spotted on this key road before.

  On 30 October, the BBC verified footage of a tank firing near a car - trying to reverse away - followed by a large explosion.

  We asked the IDF whether - at the time of this incident - the road has been designated as "safe".

  It would not comment on this specific incident, but said Salah al-Din "had been an open road throughout the war" and they had been "securing it with ground troops and tanks to encourage safe evacuation".

  BBC Verify has also analysed satellite imagery of the Salah al-Din Road - as far as Wadi Gaza - to try to assess the level of damage to it during this conflict.

  Every red dot represents damage of some kind on the road: for example, a crater on the tarmac or a building damaged next to the highway.

  We have identified about 60 individual examples but we cannot tell exactly when these occurred.

  The IDF says it makes efforts to avoid harming civilians and will continue evacuation routes.
