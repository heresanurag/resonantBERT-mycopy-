title: 'Argentina: World Cup squad is the ''worst in their history'' says Ossie Ardiles
  - BBC Sport'
date: '2018-06-22'
section: General
url: http://www.bbc.co.uk/sport/football/44575673
content: |-
  Last updated on .From the section World Cup

  Argentina's World Cup squad is the "worst in their history" and not even "the best player in the world" can make them competitive, says Ossie Ardiles.

  Thursday's 3-0 defeat by Croatia has put Jorge Sampaoli's side at risk of an early exit from the tournament.

  The former midfielder said the "prestige" of the two-time world champions had been "thrown overboard".

  "From world champion to being the worst national team in Argentina history. Where to begin?" the former Tottenham player tweeted.

  Argentina, who drew their first group game 1-1 with Iceland, are no longer in control of whether they reach the last 16 with one game remaining, against Nigeria on Tuesday.
