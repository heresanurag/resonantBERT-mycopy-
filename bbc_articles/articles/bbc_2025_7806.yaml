title: Tate Modern announces major gift from art dealers - BBC News
date: '2025-04-03'
section: Culture
url: http://www.bbc.co.uk/news/articles/cm24mpx1xveo
content: |-
  A painting by the US modern artist Joan Mitchell is "one of the most important" Tate has received.

  Joan Mitchell was one of the most celebrated artists of the abstract expressionist movement

  Tate Modern has announced it has received a major gift from a couple of art collectors in the form of a painting by the US modern artist Joan Mitchell. It was unveiled on Thursday as one of a group of works being donated by the Miami-based philanthropists, Jorge M and Darlene Pérez. The six-metre-long triptych, entitled Iva 1973, can now be viewed for free at the London gallery next to Mark Rothko's Seagram Murals. Tate director Maria Balshaw said the gift was "one of the most important" it has received, describing the donation as "transformational".

  "To place such a significant and valuable work in public hands is an act of incredible generosity," said Balshaw. "It is also an endorsement of Tate's ability to share our collection with the broadest possible audience," she added. "And to care for that collection for future generations." Mitchell, who would've been 100 this year, was one of the most celebrated artists of the abstract expressionist movement. Arts Minister, Sir Chris Bryant said the "spectacular donation" of Mitchell's "masterpiece", which was originally dedicated to her dog, shows "the amazing difference one person's generosity can make". "I'm very grateful for this donation and for the work that went into making it possible," he said. "We are committed to ensuring art is for everyone, everywhere and the generosity of the Pérez family ensures that great art remains accessible to all, whilst also enriching our national collection."

  Jorge M and Darlene Pérez pictured in 2017 at the NSU Art Museum Fort Lauderdale in Florida

  Argentine-American businessman Mr Pérez is best known as the chairman and CEO of The Related Group, a Miami-based real estate company. He has given or pledged over $100m (£76m) to Miami's public art museum, which was renamed the Pérez Art Museum Miami in his honour in 2013. He also founded a not-for-profit contemporary art space in Miami called El Espacio 23. Mr Pérez told BBC News: "We've been talking to the Tate for a long time, we're great admirers of the Tate. "Our hope is always that our art is seen by the highest number of people. The Tate has huge viewership, millions and millions of people coming in." He added the work suited being displayed next to other famous artists. "This painting, when you see it next to the Rothko's, really resounds," he said, "and it'll be there forever. "So when you talk about legacy, we like to think that our names will not be forgotten, and that they will live, not only with the British audience, but also with the international audience that comes to the Tate. "We hope it fills a gap in the collection that is very important and maybe the most important art movement in America. It's found its home, we're very pleased with it here." Mrs Pérez noted female artists "play a significant role in shaping the cultural landscape" and that is was therefore "pivotal that we support and celebrate their contributions." "We've long admired Joan Mitchell's work and are thrilled to share Iva with the world through Tate Modern." Their gift also includes a multimillion-dollar endowment to support Tate's curatorial research. Also, a range of works and photographs by artists from across Africa and the African diaspora - including by Yinka Shonibare, El Anatsui and Malick Sidibé - will make their way from the Pérezes to Tate's collection over the coming years.
