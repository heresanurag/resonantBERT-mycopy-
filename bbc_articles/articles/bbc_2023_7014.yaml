content: |-
  Humza Yousaf was quizzed by opposition party leaders during first minister's questions.

  In his time as first minister so far, Humza Yousaf has faced a lot of familiar questions.

  Some have been on issues which dogged his predecessor Nicola Sturgeon, others on matters he was responsible for in his previous cabinet jobs – either way the topics and responses have been fairly well-worn.

  But Mr Yousaf has been making a deliberate attempt in recent weeks to differentiate his leadership from Ms Sturgeon’s regime.

  He delayed some of her flagship measures – like the National Care Service and the Deposit Return Scheme – and has now set out some ideas of his own in a bid to focus the government’s energies on tackling poverty.

  That could apparently involve some tough choices, which is another way of saying potentially controversial moves.

  He is also wrestling with a fresh SNP rebellion on the topic of Highly Protected Marine Areas, which saw three former ministers break the party whip in a vote yesterday.

  So as Mr Yousaf is settling into the role of first minister, there is a growing crop of new questions for the opposition to pose to him.
