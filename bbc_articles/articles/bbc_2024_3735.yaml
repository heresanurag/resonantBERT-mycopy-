content: |-
  Meteorologist Simon King was no match for Fire and Steel when he met them in the BBC Breakfast studio.

  BBC Weather's Simon King found himself swept off his feet when Gladiators Steel and Fire visited BBC Breakfast.

  Presenter Charlie Stayt suggested the meteorologist had been struggling with the logistics of getting on and off the set, so the athletes decided to give him a helping hand.

  Gladiator fans in the UK can catch up on the programme on iPlayer.
