content: |-
  Police name Kalvin Taylor as the victim after a body was found inside a flat on 21 September.

  Three charged with murder after man found stabbed

  Police have named the 19-year-old as Kalvin Taylor, pending formal inquest proceedings

  Three people have been charged with the murder of a man who was found stabbed to death at a flat in Norwich. The body of a 19-year-old man from London was found by police on Lefroy Road in the Mile Cross area of Norwich on 21 September. Police believe his body lay undiscovered for eight days. The victim has been named as Kalvin Taylor, pending formal inquest proceedings. Paying tribute, Mr Taylor's mother said the killing had "left our family in a million pieces".

  In a statement issued via the police, she said: "Kalvin was a son, a grandson, a brother, a cousin and a friend to us all. "We will remember and miss Kalvin all the days of our life. "We love you Kalvin, rest in heavenly peace until we meet again." A post-mortem examination confirmed the man's death was consistent with a single stab wound to the chest, Norfolk Police said. Overall, four people were charged in connection with Mr Taylor's death on Saturday evening, police said. Leon Bangura, 22, of Old Kent Road, London, is charged with murder and threatening another person with an offensive weapon. He is also charged with possession of a bladed article, possession with intent to supply, and being concerned in the supply of class A drugs. Adam Dugdale, 55, of Shorncliffe Avenue, Norwich, is charged with murder. Carrie-Anne Hall, 51, of Lodge Breck, Norwich, is charged with murder. Matthew Holmes, 51, of Bowthorpe Road, Norwich, is charged with assisting an offender. All four have been remanded in custody and are due to appear at Norwich Magistrates' Court on Monday. A teenager arrested on suspicion of conspiracy to murder has been released on police bail.
