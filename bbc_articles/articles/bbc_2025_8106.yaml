title: Israel carries out air strikes on Gaza after Hamas fires rockets - BBC News
date: '2025-04-07'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c0jzgp947qdo
content: |-
  A Palestinian journalist is reportedly killed in a strike at a hospital compound after 10 rockets are fired into Israel.

  Israel carries out air strikes on Gaza after Hamas fires rockets

  Israeli strikes hit Deir al-Balah, in central Gaza, from where the military said rockets had been fired

  Israel has carried out fresh air strikes on Gaza, with the Hamas-run health ministry saying on Monday morning that at least 56 Palestinians had been killed over the previous 24 hours. Israeli Prime Minister Benjamin Netanyahu had ordered a "strong response" after Hamas fired 10 rockets into Israel on Sunday. It's the heaviest barrage for several months and comes weeks after Israel resumed its military campaign in Gaza. About half of the rockets landed inside Israel with the remainder being shot down, the Israeli military said. One person was wounded by falling debris, Israeli medics said.

  In Gaza, a Palestinian journalist was killed and nine others wounded when an air strike hit a tent used by local media in Khan Younis, southern Gaza, the Hamas Government Media Office and the Palestinian Journalists Syndicate (PJS) said. Reuters news agency said footage showed people trying to put out a blaze in the tent which it said was inside the compound of Nasser hospital. The dead journalist was identified by the PJS as Helmi al-Faqaawi of Palestine Today TV. The PJS said it "strongly condemned, in the harshest terms, this appalling massacre". It called on the UN to take action to stop Israel from "targeting the entire Palestinian people, including journalists". In a joint statement, the Israel Defense Forces (IDF) and Shin Bet intelligence agency said they had struck a "Hamas terrorist... who operates under the guise of a journalist and owns a press company". They said the man, Hassan Eslaih, had participated in the 7 October 2023 attack on Israel which triggered the war. Nasser, which is the largest hospital still functioning in Gaza, has been struck multiple times by the IDF since the war began. Israel has repeatedly accused Hamas of using hospitals as covert bases and for storing weapons, which the group denies. Earlier, the IDF said it had hit the launcher which fired the rockets at Israel, after ordering residents in several districts of Deir al-Balah in central Gaza to evacuate. Issuing the order, IDF Arabic spokesman Lt Col Avichay Adraee warned that Israel would "launch a severe strike on any area from which rockets are fired". Hamas said it fired the rockets in response to Israeli "massacres of civilians in Gaza", Reuters news agency reported.

  Several rockets landed in the southern Israeli city of Ashkelon, causing damage

  Footage from the Israeli city of Ashkelon showed flashes in the sky as sirens wailed and an explosion at the bottom of a block of flats during the rocket attack on Sunday night. The rate and scale of Hamas's rocket attacks sharply dropped after the first few months of the war, as Israel intensively targeted its arsenals and launchers. But the group still intermittently fires at Israel, in a sign that it still possesses capabilities. Israeli air strikes continued overnight following the attack on the rocket launchers, with the official Palestinian news agency Wafa reporting that sites in north, central and south Gaza were hit. Meanwhile, French President Emmanuel Macron held talks in Cairo on Monday with Egyptian President Abdul Fattah al-Sisi and Jordan's King Abdullah II as part of efforts to try to restore a ceasefire. At a joint news conference, Macron said both he and Sisi "condemn the resumption of Israeli strikes on Gaza". He also said Hamas must not be part of any future government in Gaza, and that the internationally backed Palestinian Authority - Hamas's political rival - should take charge. Netanyahu said the Gaza war and Israel's efforts to secure the release of the 59 hostages still being held by Hamas would be on the agenda of his talks with President Trump at the White House on Monday. Israel resumed its military campaign in Gaza last month, blaming Hamas for rejecting a US proposal to extend a ceasefire which had begun in January. Hamas, in turn, accused Israel of abandoning the original deal which both sides had agreed to. The war was triggered by Hamas's unprecedented attack on Israel on 7 October 2023, in which about 1,200 people were killed and 251 others taken back to Gaza as hostages. More than 50,750 Palestinians have been killed in the Israeli offensive since then, according to the Hamas-run health ministry. Update 8 April: This article's headline and introduction have been amended in order to more precisely reflect the wider context of the Hamas attack and Israel's response.
