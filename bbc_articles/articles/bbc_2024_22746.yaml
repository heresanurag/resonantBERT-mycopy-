title: Bacteria found in maternity hospital weeks after handover - BBC News
date: '2024-09-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/clyvgy2qp89o
content: |-
  Pseudomonas can affect infants and those with weakened immune systems are vulnerable.

  The maternity hospital was due to open by the end of 2015

  Bacteria that can cause a number of infections was discovered at a new maternity hospital weeks after it was officially handed over to the Belfast Health Trust, BBC News NI has learned. Pseudomonas does not usually affect healthy people, but infants and people with weakened immune systems are vulnerable. The trust took possession of the five-story building in March, but high levels of the bug were discovered in water pipes a month later after a four-week operating exercise. Responding to a Freedom of Information (FoI) request, the trust said pseudomonas has been detected in several of its buildings since 2013, but declined to detail any impact on patients.

  The hospital is already almost 10 years behind schedule after numerous delays. The trust said it could not give a new projected opening date as an independent review is under way. Repairs to the building are expected to run to several million pounds. Asked if it had considered legal action in relation to the latest outbreak and repair costs, the trust said it “continues to consider all options available under the contract”. A previous outbreak of pseudomonas was discovered at the maternity hospital on the Royal Victoria site in March 2023, the costs of which were met by the main contractor, Graham Bam Healthcare Partnership, according to the trust. The contractor then engaged a specialist chemical treatment team to analyse and treat the pipework contamination. The trust said an additional chemical treatment system was installed on the pipework system and sections of pipework were replaced.

  It said a further two positive samples of pseudomonas were discovered by the contractor on 28 February 2024, but that “the levels detected were within contractual obligations”. The maternity hospital was due to open by the end of 2015 but has been beset with problems. The trust says it is currently carrying out a remediation plan to deal with the latest setback.

  It’s understood the delay could be up to five years as repairs are extensive

  Earlier this year, the Northern Ireland Audit Office said the latest estimated date for completion of the final phase of the maternity hospital is June 2025. "The original cost estimate was £57 million, with costs now expected to be £97 million,” it said in a report. However, BBC News understand the delays could last up to five years due to the need for extensive repairs, including removing ceilings to restore infected water systems. The trust said an independent investigation into the latest outbreak was being conducted by Hydrop and Porton Down, which is the government’s Defence Science and Technology Laboratory. In a statement, Graham Bam Healthcare Partnership said: “The new maternity hospital was handed over by GBHP in March 24 in agreement with the Belfast Trust and in accordance with contract specifications.” In its FoI request, BBC News NI asked if pseudomonas has been detected at any other sites within the Belfast Trust area within the past five years and if any patients had been affected. In response, the trust said: “It is not uncommon for PSA (pseudomonas aeruginosa) to be detected through water testing within augmented care areas. “The current mean detection rate is less than 2%.”
