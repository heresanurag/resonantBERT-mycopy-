title: Pret A Manger gives staff third pay rise in a year - BBC News
date: '2023-03-02'
section: Business
url: http://www.bbc.co.uk/news/business-64815332
content: |-
  The coffee chain follows other retailers in boosting pay during a labour shortage.

  Pret A Manger will give staff their third pay rise in 12 months, following other firms in boosting wages during a labour shortage.

  The coffee chain said the rise, to begin in April, amounts to a 19% bump in year-on-year pay for shop staff.

  Retailers including Tesco have made similar moves in the past year as firms try to retain staff struggling with near-record high living costs.

  Overall inflation, the rate at which prices rise, is at 10.1%.

  Around 7,870 Pret A Manger staff were given pay rises in April and December 2022.

  By raising base pay to above the rate of inflation, the chain said its baristas would be among "the highest paid in the industry", able to earn up to £11.80-£14.10 an hour based on location and experience.

  It said that by April, for entry level staff, the rise amounts to a 15% pay rise year-on-year.

  In February, Britain's biggest grocer Tesco agreed to increase its workers' wages by 7%, marking their third pay rise in 10 months, whilst Asda said it would raise pay by 10%. Aldi and Lidl also announced higher pay.

  The UK has been suffering a shortage of workers, attributed to long-term sickness after the pandemic and a lack of foreign workers to help fill available roles.

  The rising cost of living has also meant many staff are seeking roles at better paying firms.

  Rising costs have also led to widespread staff walkouts, leading to strikes in sectors such as rail, nursing and teaching.

  However, some economists are worried that large pay increases risk making it harder to reduce the rate of inflation.

  In February last year, Bank of England governor Andrew Bailey said workers should not ask for big pay rises in order to prevent prices rises becoming entrenched.

  The Bank has now increased interest rates from 0.1% to 4% since December 2021 - the highest rate since 2008 - and on Wednesday Mr Bailey said another rise might be "appropriate".

  Guy Meakin, Pret A Manger's interim managing director, said: "As the cost of living continues to rise, we hope this latest increase in pay, and our expanded benefits package, goes some way in providing further support for our hardworking teams."

  In February, the retailer received complaints after it said it would stop making smoothies, frappes and milkshakes, which can be more expensive and take longer to make.
