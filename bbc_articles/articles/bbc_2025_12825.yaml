title: Trump takes Middle East victory lap - but big questions remain - BBC News
date: '2025-06-25'
section: World
url: http://www.bbc.co.uk/news/articles/c17wejpw79qo
content: |-
  It's been a rollercoaster ride for Trump but it ends in Europe with high praise for US action in Iran ringing in his ears.

  Trump will be the toast of the Nato summit, where, Mark Rutte says, the US president will be "flying into another big success"

  Aboard Air Force One en route to the Nato summit in the Netherlands, Trump shared a personal text message from a somewhat unlikely source. It was sent by Nato boss Mark Rutte who praised the American president for what he had accomplished in using US bombers to attack Iran's nuclear facilities. "Congratulations and thank you for your decisive action in Iran, " wrote Rutte in a message the president posted to his Truth Social account. "That was truly extraordinary and something no one else dared to do." Trump has had his differences with Nato in the past, as he's called into doubt the alliance's mutual defence agreement and the military contributions made by other member nations. Rutte addressed that, as well, telling Trump he was "flying into another big success" at the Nato summit, where member nations had agreed to Trump's demand to boost defence spending to 5% of their gross domestic product. "It will be your win," he concluded.

  The warm words, and the president's eagerness to share them to the world, illustrated just how much the diplomatic equation in the Middle East and among US allies has changed for Trump. Last week he left the G7 summit in Canada a day early, as conflict raged between Israel and Iran and it appeared increasingly likely the US would join the fight. The Americans attacked Iran's nuclear facilities on Saturday night, but by Tuesday morning the president departed Washington for another international trip, this time with a fragile ceasefire established between the two warring parties. Rutte's text – which a Nato press officer confirmed to the BBC as authentic – dovetails with the accounts provided on and off the record by White House officials. Trump' military strike removed the threat of Iranian nuclear weapons. His actions triggered the ceasefire and ended what he calls the "12 Day War".

