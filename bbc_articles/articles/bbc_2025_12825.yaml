  At the moment, the dire warnings of Trump's domestic critics, particularly within his own party, have proven unfounded. Republican Congressman Thomas Massie of Kentucky, who had planned to introduce legislation curtailing Trump's use of military force in Iran, has announced he is abandoning that effort for now. That has given Trump the political space to herald what his administration is trumpeting as an unqualified success. Since Trump picked him as his vice-presidential running mate, JD Vance has often sought to add ideological substance to Trump's America First politics. On Tuesday morning, the vice-president took to Truth Social to offer his take on what he said were the three parts of Trump's "foreign policy doctrine". "1) clearly define an American interest; 2) negotiate aggressively to achieve that interest; 3) use overwhelming force if necessary," he wrote.

  As doctrines go, however, that's not much to work with. Often, the president's foreign policy seems reactive and contradictory, more tactical than strategic - whether it's applying and removing tariffs or negotiating with allies and adversaries. In the past two weeks, Trump has swung between distancing the US from Israel's attacks on Iran to becoming an active participant in them; from calling for Iran's "unconditional surrender" to negotiating a ceasefire with unclear terms; from entertaining the idea of regime change to downplaying it. It makes for a rollercoaster ride, with the prospect of a catastrophic derailment seemingly around every bend. But results, as they say, speak for themselves. And this week, Trump's tumultuous ride has ended in a victory lap.

