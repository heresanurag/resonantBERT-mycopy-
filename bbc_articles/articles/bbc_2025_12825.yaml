  His involvement and his pressure – including an angry outburst directed at both sides on Tuesday morning and what the White House called an "exceptionally firm and direct" phone call with Israeli Prime Minister Benjamin Netanyahu from Air Force One – ensured that the ceasefire would hold. Last week, America's allies were anxious. Now, it appears Trump is heading to Europe with the intention of basking in their praise. The outlook, however, is more complicated than that. While the administration touts that the US bombing raid "obliterated" Iran's nuclear research facilities, US military intelligence officials have told American media that the damage is not as severe as the White House has claimed. The country's nuclear programme has probably only been set back by months, according to a preliminary Pentagon intelligence assessment. And the Islamic Republic's stockpile of enriched uranium was not eliminated in the bombings, sources familiar with the report told CBS News. The White House says the assessment is "flat-out wrong" and is "a clear attempt to demean" President Trump.
  • None US strikes did not destroy nuclear programme, says Pentagon Questions remain about the quantity and location of Iran's enriched uranium supply – a key component of a nuclear weapon. There are also reports of the existence of an undisclosed and undamaged research facility elsewhere in Iran.

