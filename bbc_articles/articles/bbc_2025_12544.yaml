  Dave Myers' widow Lili says bikers 'just keep coming' to the celebration of her husband's life.

  Thousands of bikers turn out for 'joyous' Dave Day 2
  • None Lili Myers said she wanted to bring joy and energy to Barrow in memory of her late husband
  • None The charity bike ride raises money in honour of Dave Myers who died in 2024
  • None Thousands of motorcyclists descended on Barrow in Cumbria on Saturday Slide 1 of 3 , Lili Myers wears a black t-shirt and sunglasses and smiles at the camera. She is standing on a balcony above Barrow's high street, where there is a procession of motorcyclists. , Lili Myers said she wanted to bring joy and energy to Barrow in memory of her late husband

  Thousands of bikers have ridden in a "joyous" celebration of the life of Hairy Bikers presenter Dave Myers. Thousands of motorcyclists descended on Barrow in Cumbria on Saturday, the hometown of the 66-year-old TV chef, who died from cancer last year. His widow Lili Myers said the turnout for Dave Day 2 "surpassed all expectations" and added, "they [the bikers] keep coming". Hairy Bikers co-star, Si King, said the event, a repeat of the biking procession for Myers last year, was a "joyous celebration of me best mate".

  Hairy Biker Si King said the ride was a "joyous celebration of "me best mate" in Barrow

  Last year's event saw more than 20,000 bikers travel from London and raised £127,000 for charities the NSPCC and the Institute of Cancer Research. King said: "Last year was fantastic and this year is amazing. It's a culmination of what motorcycles are about - community, friendship and fellowship".

  Si King and Dave Myers had a shared passion for motorcycles and food

  Mrs Myers echoed her late husband's co-star and said there was "so much joy" at the gathering. "It's a feeling of energy, celebration and that's what's important, that's what we wanted to bring in Barrow," she told the BBC. "We had a figure in our heads, but it's surpassed all expectations... so I'm not going to say anything because they [the bikers] keep on coming".

  Si King, said Dave Day 2 was "about community, friendship and fellowship"

  The two-day celebration involves entertainment on Saturday and Sunday as well as a concert and a charity football match, with tickets priced £10 for each event. Westmorland and Furness Council had warned of congestion around junction 36 of the M6, with Dave Day motorcyclists arriving in Barrow from mid-afternoon. The procession came via the A590 from the M6, turning left on to Park Road at entry into Barrow and proceeded to the town centre through Abbey Road.

  People lined the streets in Barrow for Dave Day 2

  Barriers and designated crossing points were in place, which people were urged to use by the council, with help from marshals and signs. National Highways has told drivers to allow more time for their journeys and to plan ahead as "thousands more bikers than usual" were expected on the motorway over the weekend. "It is anticipated the M6 will be particularly busy, especially at Knutsford Services, where motorcyclists travelling from the south will gather before completing their journeys north," a spokesperson said.

