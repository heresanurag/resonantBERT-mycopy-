title: 'Lexi Thompson: Watch how golfer loses major after TV replay - BBC Sport'
date: '2017-04-03'
section: General
url: http://www.bbc.co.uk/sport/golf/39479987
content: |-
  American Lexi Thompson receives a four-stroke penalty after a TV replay shows her incorrectly replacing a ball.

  American Lexi Thompson receives a four-stroke penalty while leading the final round of the first major of the season - and then loses the play-off to So Yeon Ryu - after a TV replay showed her incorrectly replacing a ball.

  Available to UK users only.
