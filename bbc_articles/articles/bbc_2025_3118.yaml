title: 'Tabasco: Southern Mexico bus crash kills 41, authorities say - BBC News'
date: '2025-02-09'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c05ly8gp0llo
content: |-
  The bus operator says 48 people had been travelling on the Cancun to Tabasco bus service.

  The bus had been on a journey from Cancun to Tabasco

  At least 41 people have died in an accident involving a bus in southern Mexico, the government in the state of Tabasco has said. Images show the bus completely burned out after it was engulfed by flames following the collision which happened in the early hours of Saturday morning near to the small city of Escárcega. Bus operator Tour's Acosta said 48 passengers were onboard the vehicle - which had been travelling from Cancun to Tabasco - when it collided with a "trailer". Tour's Acosta added it was "profoundly sorry about what happened" and said it was working with authorities to find out the cause, adding that the bus had been travelling within speed limits.

  Reuters news agency reported that the government of Tabasco state said in a statement that 41 people had died, and recovery work was still ongoing. "The public ministry has informed us that the investigation will be taking effect in the prosecutor's office of the municipality of Candelaria, Campeche, for this reason the relatives of our passengers and friends will have to go to this department to perform the relevant procedures," Tour's Acosta said on Facebook. The government state of Tabasco said recovery work is continuing - including efforts to identify those killed. Authorities will give an update with details on the number of victims and their identities later on Saturday, said the secretary of government of Tabasco, Ramiro Lopez. Local council Palacio Municipal de Comalcalco has said it will support the transfer of the bodies of the victims in the passenger bus accident.
