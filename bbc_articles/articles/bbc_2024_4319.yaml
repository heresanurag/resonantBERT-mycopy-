title: Prince William compliments Kate's 'arty' side - BBC News
date: '2024-03-14'
section: General
url: http://www.bbc.co.uk/news/uk-68570304
content: |-
  He was at a youth centre in London, where he took part in activities, including biscuit-decorating.

  The Prince of Wales has visited a youth centre in London and taken part in activities, including a biscuit-decorating session where he quipped: "My wife's the arty one".

  Prince William also played basketball with the youth group in Shepherd's Bush and toured more of their facilities.
