content: |-
  Government policies on discharging patients from hospital to care homes at the start of the Covid pandemic have been ruled unlawful by the High Court.

  Dr Cathy Gardner and Fay Harris took the government to court after they both lost their fathers to Covid, and gave this reaction following the ruling.
