  "We have taken back control" Boris Johnson says while EU chief negotiator calls it "a day of relief, but tinged by some sadness".

  ‘It’s only my problem because of my postcode’ Felicity lives on the Irish border in South Armagh

  Felicity McKee lives in South Armagh which is on the border between northern and southern Ireland. As a PhD student at Swansea University she regularly drives to Bristol to fly home via Dublin. As a woman who lives with multiple disabilities she is concerned about how health insurance will work in the future. “I get ill when I travel and there is no way I could afford a hospital stay. The cost of health insurance is higher anyway for disabled people and I’ve got ill abroad before. It is very concerning “As far as I can see the European Health Insurance card (EHIC) is dead in the water in the future and the issue of health insurance is messy. When it comes to the NHS and health care I don’t know how that will work if I got ill on the wrong side of the border. “There’s data roaming; am I going to need two phones like I needed when I was in secondary school? Paying for two contracts on a phone will add up. It's little things but they make a big difference. “My European friends are concerned whether they’ll be able to stay. One of my friends had their tyres slashed after the referendum result and I’ve noticed a lot of anti-Irish sentiment too; I think it’s affected a lot of people. People don’t realise the consequences of Brexit. It’s not the 70s or 80s anymore and international links are beneficial to have."
