content: |-
  This video can not be played To play this video you need to enable JavaScript in your browser. Defending Olympic champion Peaty through to breaststroke final in Tokyo

  Adam Peaty will aim to become the first British swimmer to retain an Olympic title when he competes in the 100m breaststroke final at 03:12 BST on Monday. The world record holder, 26, qualified fastest from the semi-finals with a time of 57.63 seconds. James Wilby also made it into the final by finishing third fastest in the first semi-final with a time of 59 seconds. But there were no podiums for GB on the first day of medal races in the pool. Max Litchfield came closest but narrowly missed out in the men's 400m individual medley final for the second Olympics in a row.

  He was a close fourth - the same position he finished in Rio - as the USA's Chase Kalisz won gold to take the first medal in the pool at Tokyo 2020. Kalisz finished in four minutes 9.42 seconds, ahead of compatriot Jay Litherland (4:10.28) and Australia's Brendon Smith in third (4:10.38). Despite a strong showing in the heats, Aimee Willmott was unable to mark her final appearance at an Olympics with a medal in the women's 400m individual medley. The 28-year-old Commonwealth Games champion, who competed at the 2012 and 2016 Games, finished seventh as Yui Ohashi won Japan's first medal in the pool. Ohashi touched in four minutes 32.08 seconds, ahead of USA pair Emma Weyant (4:32.76) and Hali Flickinger (4:34.90). Britain finished fifth in the women's 4x100m freestyle relay as Australia won the gold medal with a world record time of 3:29.69. Canada won silver in 3:32.78 while the USA took bronze with a time of 3:32.81. In one of the early shocks of the Games, 18-year-old Ahmed Hafnaoui of Tunisia won men's 400m freestyle gold. The teenager finished in 3:43.36, overhauling Australian Jack McLoughlin (3:43.52) and USA's Kieran Smith (3:43.94).

