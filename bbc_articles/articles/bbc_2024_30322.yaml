content: |-
  Brighton agree to sign Paraguay international Diego Gomez from Major League Soccer club Inter Miami.

  Brighton have agreed to sign Paraguay international Diego Gomez from Major League Soccer club Inter Miami.

  The 21-year-old midfielder will join the Premier League club when the transfer window opens on 1 January 2025.

  Gomez started his professional career with Paraguayan club Libertad before joining Inter Miami, home of Lionel Messi, in July 2023.

  "We're looking forward to working with Diego very soon," said Brighton's head coach Fabian Hurzeler. "He has already made a real impression both at club and international level.

  "Like all young players who come to us from abroad, he will need a period of adjustment to the Premier League, but I feel he can make a big contribution and I'm looking forward to working with him."

  Brighton said that Gomez has agreed to join on undisclosed terms.

  After making his Libertad debut in May 2022 in the Copa Libertadores, Gomez scored six goals in 52 appearances to earn a move to Miami, scoring on his MLS debut.

  In his first season he scored once from five games but has become a regular this year, scoring six goals from 28 appearances as Miami reached the MLS play-offs.

  The 6ft midfielder represented Paraguay at the Olympics last summer and has made 12 appearances for the senior team.

  "He's a dynamic midfielder player who can contribute goals and assists, and we believe his physical profile will be important as he adjusts to the challenge of the Premier League," added Brighton's technical director David Weir.

  "He has only recently finished the MLS campaign so we're confident he will be ready to compete for a place in the squad when he joins us next month."
