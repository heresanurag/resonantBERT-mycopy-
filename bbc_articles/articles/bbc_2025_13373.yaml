content: |-
  Habibur Masum pleads guilty to manslaughter but denies murdering Kulsuma Akter in Bradford.

  Man admits killing wife as she pushed baby in pram

  A man has admitted killing his wife as she pushed their baby in a pram through Bradford, but denied her murder. Habibur Masum, 26, stabbed 27-year-old Kulsuma Akter several times as she walked through the city centre on 6 April last year. The baby was unharmed. Appearing at Bradford Crown Court, Masum, of Leamington Avenue, Burnley, pleaded guilty to manslaughter and possession of a bladed article, but denied a charge of murder. Following the hearing he was remanded into custody by the judge, Mr Justice Cotter, to stand trial for murder on Monday.

  Masum also denies two charges of assault, one count of making threats to kill and one charge of stalking. During a previous hearing the court heard those allegations relate to two days in November 23. Masum is accused of stalking Ms Akter between November and April, with the charge alleging he "tracked her movements and located her at a safe house, sent her messages of a menacing nature which contained threats to kill another and photos and videos of the area and premises where she was residing". He is also alleged to have "loitered in the area of her temporary residence". The charge alleges he caused her "alarm or distress" and to "fear that violence would be used against her".

  Ms Akter was attacked at about 15:20 BST as she pushed her baby in a pram along Westgate near to the junction with Drewton Road. She later died in hospital. Masum, who appeared in the dock wearing a blue T-shirt and grey fleece jacket, was arrested in Aylesbury after a three-day manhunt by West Yorkshire Police. Speaking last year Ms Akter's mother, Monwara Begum, said she had been left "heartbroken". From her home in Bangladesh, she said: "I am in shock. She was my youngest daughter and I adored her greatly. "When she moved to the United Kingdom I was alone, but Kulsuma would call me every day by video. The only day I didn't hear from her was the day she was attacked."

