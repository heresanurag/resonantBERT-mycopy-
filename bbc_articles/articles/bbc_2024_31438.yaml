title: 'Newspaper headlines: ''Hope after horror'' and Labour ''crashing the economy''
  - BBC News'
date: '2024-12-20'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cz9gj2y27qlo
content: |-
  Gisèle Pelicot's bravery is honoured on many front pages, while the growth outlook also makes headlines.

  'Hope after horror' and Labour 'crashing the economy'

  Gisèle Pelicot is on almost every front page. The Daily Mirror, external says she is "the World's bravest woman" while the Daily Mail, external describes her as "the elegant woman with a core of steel, who has become a heroine to every victim of male abuse". Gisèle Pelicot's words, that she wanted "all of society" to witness the trial, make the Guardian's, external front-page headline. The Mail's, external columnist Sarah Vine says the fact that most of those who raped Mrs Pelicot were middle-ranking, middle-aged family men "betrays a level of unconscious misogyny that is utterly chilling". She says it makes her think how many men she knows, given the chance, who would do what those 50 in France did. According to the Times, external, Lord Mandelson has been chosen as Britain's next ambassador to Washington because Prime Minister Sir Keir Starmer believes he has the expertise in international trade and networking ability to bolster British interests during a delicate period for relations with the US under Donald Trump. The next president has said he will introduce blanket tariffs on imported goods. The Daily Telegraph, external says Lord Mandelson will have a direct line to Sir Keir and will be able to speak to him frankly about the challenges presented by the Trump administration. But the paper warns the appointment could backfire if Trump allies, some of whom have been highly critical of the EU, alight on Lord Mandelson's previous role as the bloc's trade commissioner.

  Many people have praised the bravery of Gisèle Pelicot (right), who waved her legal anonymity in order to speak out against sexual abuse

  "Your cash splashed" is the Daily Star's, external take on the decision by Ofwat to allow water companies to increase household bills in England and Wales. Writing in the Daily Express, external, James Wallace, from the campaign group River Action, urges ministers to end the privatisation experiment and impose new financial and governance structures that prioritise people and nature over profits. The Times, external editorial argues that a properly run privatised industry, not a nationalised one, should still be the answer. But it says the regulator has failed consumers time and again, and its scrapping or reshaping should be on the table. The Daily Telegraph, external accuses the BBC of silencing a song lampooning the government's decision to cut winter fuel payments for pensioners. The paper says the song Freezing this Christmas, written by Chris Middleton, has risen to Number One in the downloads chart, but it has not had airtime on any of the BBC's radio stations. A spokesman for the corporation said decisions about which tracks get played are made on a case-by-case basis. The official Christmas card featuring the Prince and Princess of Wales and their children is on the front page of the Sun, external. The paper says the card is a message of hope after their "annus horribilis". The Daily Express, external says Catherine and William were absent from Thursday's pre-Christmas lunch at Buckingham Palace. Royal watchers guessed they might be spending time with Catherine's family before heading to Sandringham for Christmas.

