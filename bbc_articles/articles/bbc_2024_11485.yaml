  People say the television medic changed their lives with his health and wellbeing advice.

  'I owe him so very much': Your tributes to Michael Mosley

  Claire Yates with Michael Mosley, who she credits for reversing her type 2 diabetes

  Many of those paying tribute to Dr Michael Mosley after his death at the age of 67 never had the chance to meet him. But the impact the medical expert had on their lives - speaking to them through his radio and television programmes, podcasts and books - mean his loss is being mourned around the world. Fans of the TV medic, who pioneered the 5:2 diet and highlighted the benefits of intermittent fasting, have been contacting BBC News with their thoughts.

  Pilates teacher Gillian Burn, from Hampshire, said: "Over the last few years, I have incorporated Michael's amazing health messages in a fun way into my classes, including the value of regular squatting, balancing on one leg and breathing exercises. "We were not so keen on taking cold showers, though do advocate power naps, eating dark chocolate and green tea! "We are committed to keeping his legacy going during our exercise classes and will continue to promote healthy living in everything we do. "His messages have brought us many laughs and smiles." She added that during her most recent class - on Monday morning - each exercise was "a tribute to the amazing Michael Mosley".

  Pilates instructor Gillian Burn said Dr Mosley's messages brought her group "many laughs and smiles"

  Jennifer Clark, from Wagga Wagga, Australia, said the TV presenter had become "a fixture" in her life. "Dr Mosley was passionate, vulnerable and always brought a smile. He was human and I could identify with him," she said. "When I carry out my sleep plan, wake at 3am, do my deep breathing exercises, perhaps take melatonin - I feel Dr Mosley has been here before." Glenis Shaw, from New Zealand, said: "He was my absolute hero. He taught me how to eat properly, how to lose weight, which I had been accumulating all my life. "He taught me how to be healthy. I owe him so very much. We have all lost someone very special."

  Dr Mosley had reversed his own type 2 diabetes through diet and exercise - with others choosing to follow his example. Claire Yates, from Buxton, Derbyshire, said Dr Mosley saved her life - she lost both parents within 24 hours in 2018 and "didn't want to die young". Having been diagnosed with type 2 diabetes, she said she struggled to maintain her blood sugar levels and "was awake all the time". It was while awake at midnight that she found his blood sugar diet book. "Within weeks, my blood sugars had dramatically improved. I lost 33lb in eight weeks and came off all medication," said Claire, who now follows his maintenance plan. The 48-year-old met Dr Mosley twice on his tours, most recently in February. "I thanked him for everything he had done," she said. "He was an amazing man, with so much knowledge. "He made everything accessible, and not at all daunting. I'm 50 now and I'm healthier than when I was turning 40." She described him as a "legend of a man", adding: "I feel like I knew him, even though I didn't. He had so much work left to do and so much life to live - it's a tragedy."

  Michael Mosley was "so relatable", one reader said

  Lesley Cottrell, from North Somerset, said: "I was diagnosed as being on the verge of type 2 diabetes but then I found Michael's book the 800 diet and it changed my life. "So much so that my GP was astounded and wanted to use me as a role model for others in my situation. "Ever since I’ve followed everything he’s done related to health and have all his books. RIP Michael - so sad to see you go before your time." Janet Holgate said: "I am so sad for the family - it must be devastating for them. "I reversed my [type 2] diabetes after learning how to by following his recommendations and how he had done it. "That was six months ago and I am still free from diabetes." Akila Lingham, from Venice, Italy, said: "He remains an inspiration to all the pre-diabetics, diabetics and those with increased cholesterol levels - he provided another choice of reversing these issues. "He took the time to explain things in simple terms. He was willing to experiment and be so relatable to so many of us."

  Simon Strutt from Holmer Green, Buckinghamshire, said Dr Mosley and his wife Clare Bailey Mosley had "quite probably saved me from something serious" with their books. Preparing to undertake Dr Mosley's fasting plan, he bought a blood pressure monitor, as advised in the accompanying book - and found his levels were so high, he was advised to call an ambulance. "Thank the Lord and Michael and his book for the BP machine purchase," he said, explaining his readings had come down after 10 days of the diet. "I've recommended the books and a BP machine to all my family and friends."

  One reader, Charles, said: "Although we never knew him personally, his death is like losing a perceptive, utterly honest and reliable friend. "He understood our shared human weaknesses and never shied away from describing them truthfully, but he was always gentle as he reflected our frailties back to us, so we could take control of them. "I genuinely feel as if I have lost a friend." May East, from Edinburgh, wrote: "Dr Mosley's Just One Thing podcast changed my life in so many ways. "I drink more water than ever, I snack on nuts, I read before sleeping, I adopted flaxseeds in my diet and do some short runs while walking." Roy Lowe from Grimsby said he was "a brilliant broadcaster who made shows informative and entertaining". His wife Judith said she had used his 5:2 diet "with great effect" 11 years ago and "has never needed to diet again". Tara Moore said: "The country is in a state of mourning. Michael Mosley was a household name - if you had an ailment, chances are he'd covered it on one of his programmes. "He demonstrated cause and effect in a way that everyone could understand and many people have improved their health as a direct result."
