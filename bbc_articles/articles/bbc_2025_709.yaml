title: One killed in ballistic missile attack on Kyiv, Ukraine says - BBC News
date: '2025-02-12'
section: Europe
url: http://www.bbc.co.uk/news/articles/ce85x4792w6o
content: |-
  The attack comes after president Zelensky suggested peace negotiations with Russia could include a territory swap.

  One killed in ballistic missile attack on Kyiv, Ukraine says

  One person has been killed and four injured in a Russian missile attack on Ukraine's capital overnight. Kyiv's mayor said a nine-year-old girl was among the injured in the strikes which took place early on Wednesday. The Ukrainian military said it had shot down six of seven ballistic missiles and 71 drones launched by Russia, which sparked several fires throughout the city. It comes after President Volodymyr Zelensky suggested Ukraine would be prepared to swap land with Russia in potential peace negotiations.

  The strikes had caused damage in Kyiv's Holosiivskyi, Podilskyi, Sviatoshynskyi and Obolonskyi districts, mayor Vitali Klitschko said. Meanwhile, officials in the city of Kryvyi Rih also reported damage to residential buildings and infrastructure after the city was also targeted in Russian strikes on Tuesday night, the Dnipropetrovsk regional governor said on Telegram. On the Russian side, the governor of Belgorod said on Wednesday a woman had been killed in a Ukrainian drone strike on the region. "There are no words that could console the family and friends in such grief," Vyacheslav Gladkov said on Telegram. Reacting to Russia's attack on Ukraine, Zelensky said Russian president Vladimir Putin was "not preparing for peace". "He continues to kill Ukrainians and destroy cities. "Right now, we need unity and support from all our partners in the fight for a just end to this war," he wrote on Telegram.

  In an interview with the Guardian newspaper published on Tuesday, the Ukrainian president said he would be prepared to swap land with Russia , externalin a future peace negotiation. He said parts of Russia's Kursk region - which Ukraine has held since an offensive six months ago - could be returned in exchange for Ukrainian territory currently occupied by Moscow. Ukraine has never said it wanted to permanently occupy the hundreds of square kilometres it seized in Russia's Kursk region, but the goal has appeared to become clearer. Kremlin spokesman Dmitry Peskov said Zelensky's suggestion was "impossible," and Russia would never discuss the topic of exchanging territory. Earlier, Dmitry Medvedev, the deputy chairman of Russia's powerful Security Council, had also dismissed Zelensky's suggestion as "nonsense". "Peace through strength, you say?" he said, mocking a phrase used by Zelensky in international addresses. Medvedev appeared to suggest the overnight attack was how Russia could achieve that goal. For Ukraine, it was initially hoped the Kursk operation would relieve pressure on overstretched troops on other parts of the front line. However with continued Russian battlefield dominance, President Zelensky appears to be looking to use it as political leverage. He has admitted Ukraine can't enjoy any security guarantees without its biggest ally, the US. US President Donald Trump has been pushing for a swift end to the Ukraine conflict. During election campaigning last year, Trump claimed he would negotiate a settlement to Russia's full-scale invasion in a single day. And last month, on social media, he warned Putin that he would impose high tariffs and further sanctions on Russia if he failed to end the war in Ukraine. Putin has said repeatedly he is prepared to negotiate an end to the war, but that Ukraine would have to accept the reality of Russian territorial gains, currently about 20% of its land. Zelensky has previously conceded he may have to cede some land currently occupied by Russia temporarily, but the comments made to the Guardian mark the first time he has suggested permanent concessions. Putin also refuses to accept Ukraine joining Nato, the military alliance of Western countries. On Friday, Zelensky will meet US Vice President JD Vance, who has been a critic of American military support for Kyiv. Trump earlier suggested he could meet Ukraine's president too following the Munich Security Conference over the weekend. The White House has indicated interest in Ukraine's natural resources in exchange for continued aid.
