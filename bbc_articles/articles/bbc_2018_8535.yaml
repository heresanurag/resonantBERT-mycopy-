id: bbc_2018_8535
title: 'World Cup 2018: France football victory ends in tear gas - BBC News'
date: '2018-07-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-44789739
content: |-
  Crowds in Paris became rowdy during celebrations of France's World Cup victory against Belgium.

  Riot police in France cleared the Champs-Elysee with tear gas, as celebrations got out of hand.
