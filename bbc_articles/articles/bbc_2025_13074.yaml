title: Man admits stalking Cheryl Tweedy at her Buckinghamshire home - BBC News
date: '2025-06-27'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cpvjrknev4yo
content: |-
  The 50-year-old man pleads guilty to breaching a restraining order and is remanded in custody.

  Stalker admits going to Cheryl Tweedy's home again

  Cheryl Tweedy previously said panicked and feared for her safety after seeing Daniel Bannister on a security camera

  A man who stalked Cheryl Tweedy has admitted breaching a restraining order after turning up at her home again. Daniel Bannister, 50, pleaded guilty to a single charge at Reading Magistrates' Court, was remanded in custody, and is due to appear there again on 23 September. He had already twice been jailed for targeting the Girls Aloud singer at her home, in the Chalfonts area of Buckinghamshire, and was most recently sentenced to 16 weeks in March. At the time, she said she "immediately panicked" and "feared for my safety" after seeing him on a security camera.

  Daniel Bannister is next due in court on 23 September

  The court said the charge against Bannister stated he attended an address where he "reasonably believed or reasonably suspected" Tweedy to be residing. He had been given a restraining order for turning up in January last year and saying "it's Daniel, I've come to get Cheryl" and then returning in July asking for a glass of wine. He was given a four-month jail term in September for the initial offences. After showing up in December, he admitted harassment and the breach and attempted breach of his restraining order, and was sentenced to 16 weeks in March. The December incident took place three weeks after Tweedy attended the funeral of One Direction star Liam Payne in Amersham in Buckinghamshire. The pair had had a child together but had split up. Payne died after falling from a balcony in Buenos Aires, Argentina, in October.

  Cheryl Tweedy attended Liam Payne's funeral at St Mary's Church in Amersham on 20 November

  In an unrelated case, Bannister had also been jailed for killing Rajendra Patel, 48, at a south London YMCA homeless shelter in 2012. Mr Patel died 15 days after he was attacked in Croydon on 21 February that year. He died of a pulmonary thromboembolism in hospital, where he was being treated for bruising and swelling to the left side of his face, a broken nose and a fractured ankle. Bannister admitted manslaughter and was jailed for two and a half years at Kingston Crown Court.
