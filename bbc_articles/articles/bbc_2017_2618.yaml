title: Senator Grassley confronted by Afghanistan interpreter seeking asylum - BBC
  News
date: '2017-02-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-39060473
content: |-
  Republican Senator Chuck Grassley faced tough questions from his constituents at a town hall meeting.

  Among them was a man who worked as an interpreter for the US Armed Forces in Afghanistan who is struggling to secure asylum.

  Zalmay Niazy asked for the senator's help as a new White House travel ban looms.
