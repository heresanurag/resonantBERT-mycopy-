title: Crowds gather in Rome ahead of Pope's funeral - BBC News
date: '2025-04-26'
section: General
url: http://www.bbc.co.uk/news/videos/cvgpzxdrglxo
content: |-
  The BBC's Sarah Rainsford says people from all over the world have gathered to pay their respects.

  Politicians, royalty and Catholics from all over the world are gathering in Rome ahead of the funeral of Pope Francis.

  The BBC's Sarah Rainsford observed what she said was an international crowd - reflecting the global reach of the church.
