  She added: "She even put her arms around me. I can't think of anything more evil. It is despicable. I blame myself every day for my son's death. This monster, Karen Foster, deserves nothing. I hope her actions haunt her." Det Supt Allen Davies, of Lancashire Police, said: “The case of evidence proved beyond all reasonable doubt that Foster was solely responsible for Harlow’s unlawful killing, meaning Foster finally admitted her guilt last week. “My thoughts remain with Harlow’s family who have behaved with dignity while dealing with such an unimaginable and unexpected loss.”
