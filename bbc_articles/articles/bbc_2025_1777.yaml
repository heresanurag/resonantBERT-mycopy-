  Wallace and Gromit creator Nick Park unveils a bronze statue of villain Feathers McGraw in Preston.

  A bronze statue of Wallace and Gromit's arch-nemesis Feathers McGraw has been unveiled in creator Nick Park's home city of Preston.

  The Oscar-winning animator and the Mayor of Preston, Councillor Philip Crowe, revealed the 4ft (1.2m) sculpture in a special ceremony.

  The new statue, located close to a bronze Wallace and Gromit bench at Preston Market, marked the opening of Animate, a new £45m cinema and leisure complex.

  Park said: "One of the proudest things really is to have a statue of three of my characters in my home town."
