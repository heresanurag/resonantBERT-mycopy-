title: 'Football gossip: Mainoo, Garnacho, Cunha, Rashford, Murillo - BBC Sport'
date: '2025-02-05'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c8d9lpmy2pyo
content: |-
  Kobbie Mainoo and Alejandro Garnacho could still leave Manchester United, Matheus Cunha wants to leave Wolves and Barcelona make a blunder with Manchester City's new signing.

  Manchester United are still open to selling Argentina winger Alejandro Garnacho, 20, and England midfielder Kobbie Mainoo, 19, in the summer. (Guardian), external

  Brazil forward Matheus Cunha, 25, is keen to move to a bigger club despite signing a new Wolves contract. (Football Insider), external

  Nottingham Forest rejected a deadline day offer from Chelsea for Brazilian defender Murillo, 22. It would have been a club record sale. (Telegraph - subscription required), external

  Barcelona missed out on receiving £8.5m from the sale of Porto's Spanish midfielder Nico Gonzalez, 23, to Manchester City, because the Portuguese club paid the Catalan side a £2.5m fee to halve the sell-on clause. (ESPN), external

  Manchester United and England attacker Marcus Rashford, 27, rejected a move to a Turkish club before he joined Aston Villa on loan. (Manchester Evening News), external

  Rashford could lose as much as 100% of the sponsorship money he receives from Nike because the sportswear giant considers Aston Villa a lower category of club than United. Nike could also ask him to partially pay back signing-on fees. (Mail Plus - subscription required), external

  Industry insiders believe it could be 2032 before Old Trafford is fully rebuilt or redeveloped. (Mail Plus - subscription required), external

  Chelsea tried to sign a keeper before the January transfer window closed but could not find a target who would have been an improvement. (Football Insider), external

  Newcastle United are leaning towards building a new stadium next to St James' Park. (Telegraph - subscription required), external

  Manchester United want their rejection of Benfica's loan offer for Netherlands defender Tyrell Malacia, 25, to signify the end of them offloading players on unfavourable terms. (Mail Plus - subscription required), external
