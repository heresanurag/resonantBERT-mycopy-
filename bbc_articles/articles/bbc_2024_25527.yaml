content: |-
  The BBC's analysis editor Ros Atkins looks at footage said to show Yahya Sinwar's final moments.

  Hamas leader Yahya Sinwar, the key figure behind the 7 October attacks on Israel, was killed by Israeli troops on Wednesday. Drone footage released by the military is said to show Sinwar's final moments before he was killed.

  BBC Verify was able to confirm the location of the footage: a northern area of Rafah, in southern Gaza, and studied satellite imagery of the area.

  Watch as the BBC's analysis editor Ros Atkins takes a look at that footage.
