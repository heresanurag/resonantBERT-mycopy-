title: 'Cornwall snow: Schools shut and roads blocked - BBC News'
date: '2023-01-17'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-64301231
content: |-
  A new Met Office yellow warning for ice and snow is issued for much of Cornwall and Devon.

  Snow has hit much of Cornwall, including Madron in the west of the county

  Cornwall and Devon have been issued with a further yellow weather warning after schools were shut and some roads blocked by snow in parts of Cornwall.

  The Met Office has issued the new warning for snow and ice across most of Devon and Cornwall from 18:00 GMT on Tuesday until 12:00 on Wednesday.

  It said: "Snow showers and icy stretches may cause some disruption."

  On Tuesday, more than 80 schools were closed or opened late and drivers urged to take care after snow fell overnight.

  Devon and Cornwall Police said the A30 and A39 near Carland Cross, near Truro, were both blocked on Tuesday morning, with reports of cars and lorries stuck in the snow.

  Nicolle Mitchell tweeted this picture of snow in the Redruth area, saying: "Happy Christmas"

  Erica, from Four Lanes, near Pool, told BBC Radio Cornwall snow started in the area at about 01:00 and left cars trapped after "they were covered in snow in about an hour".

  BBC Radio Cornwall's Emma Clements said St Dennis had experienced "probably around 10cm [4in]".

  She said from one of the village's greens "which is quite near the main road between Newquay and St Austell, which runs right through the village" it had started becoming slushy by about 08:00.

  Twitter user @sweatpeafreesia sent this picture of how deep the snow has been in Stithians

  Cornwall Fire and Rescue Service tweeted it had received reports of vehicles getting stuck on the A39 at Trispen and the A391 at Bugle amid "hazardous" driving conditions.

  "Please allow extra time for any journey and drive with care," Devon and Cornwall Police said.

  The snow in Cornwall has allowed traditional winter activities, including this snowman made by a group in Goonhavern

  Cornwall Council said it had deployed gritters on main routes.

  Devon County Council said its gritters were out overnight, treating more than 2,000 miles (3,220km) of the county's main routes, and were going out again on Tuesday afternoon and 02:00 on Wednesday.

  It added that motorists should "stick to main roads where possible and expect to find ice, [and] drive with extreme care".

  Devon's volunteer snow wardens have also been advised to be prepared to treat priority routes in their local communities this week.

  No schools in Devon were closed, but some school routes did not operating because of the weather conditions.

