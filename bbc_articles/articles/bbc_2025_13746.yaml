title: Girl, 9, and her father die after Heckmondwike house fire - BBC News
date: '2025-06-09'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/c1j514l1x7eo
content: |-
  Another girl, aged 11, remains in a critical condition following the fire on Sunday, police say.

  Girl, 9, and her father die after house fire

  Firefighters were called to Russell Close, in Heckmondwike, on Sunday

  A nine-year-old girl and her father have died, and an 11-year-old girl is in a critical condition, following a house fire in West Yorkshire. Emergency services were called to an ongoing fire in Russell Close, Heckmondwike, shortly after 06:10 BST on Sunday. Despite medical attention the man was pronounced dead at the scene while the nine-year-old died in hospital later the same day, West Yorkshire Police said. An investigation into the cause of the fire is under way, but police said they did not believe it to be suspicious.

  The cause of the fire is not believed to be suspicious, according to police

  Darren O'Donovan, chairman of West Yorkshire Fire and Rescue Authority and a councillor for Dewsbury West, said it was thought the blaze could have been started by a tumble dryer, but that fire crews and police were "still investigating". Mr O'Donovan said: "We believe the fire started about an hour before the 999 call came in. "Initial investigations suggest the fire may have started in the kitchen area and its possible source could have been the tumble dryer, but that's still under investigation. "That's the tragedy: this was just a local family on a very regular street in Heckmondwike and a tragic accident has taken place." He said the local community had been "pulling together" to support those affected and said the fire service would be speaking with people in the neighbourhood about fire prevention measures.

  Kirklees councillor Ali Arshad said the girl's mother had been in Saudi Arabia to undertake the Hajj pilgrimage when the fire broke out. He said: "This should have been a joyous occasion for the family because of the festival of Eid and because one of their own, the lady of the house, had gone to perform her pilgrimage. "So, the family would have been really happy for when the mother returned from Saudi Arabia, but unfortunately this is a tragedy that's hit the family really hard." Mr Arshad said a third child, a boy, had been with grandparents at the time of the fire.

  Floral tributes left at the scene in Russell Close on Monday

  Neighbour Aliyah Hussain said she used to see the nine-year-old girl who died in the fire playing outside with other children on the street. "It's quite a reality check that tomorrow is not promised," she said. "It could've been anyone. It's quite upsetting it's happened just across the road." Another neighbour said it would be "really difficult" to break the news to her own child, who used to play with the nine-year-old. "We are just going to have to try to break it down to her gradually," they said. "It's going to be a big shock for her. I'm just devastated, lost for words."

  Det Insp Paul Greatorex said police were working with West Yorkshire Fire and Rescue Service to establish the cause of the "dreadfully sad incident". He said: "While our enquiries remain ongoing we do not believe there are any suspicious circumstances regarding the cause of the fire and will be preparing a file for the coroner in due course." West Yorkshire Fire and Rescue Service confirmed four crews were sent to the scene on Sunday. "Firefighters removed three people from within the property, two of whom were taken to hospital by ambulance," a spokesperson said. "Our fire investigators are working with police to establish the circumstances of the fire."

  Spen Valley Labour MP Kim Leadbeater said she was "deeply saddened by the tragic news". "My heartfelt condolences go to the family and all those affected by this unimaginable loss," she shared in a statement. "I know the local community will be shocked by this heart-breaking event, and I want to thank the emergency services for their swift response and the care they provided at the scene. "I will continue to stay in close contact with the relevant authorities and offer any support I can to the family and the wider community during this very difficult time."

