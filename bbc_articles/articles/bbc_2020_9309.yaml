title: 'VJ Day: Charles leads tributes on 75th anniversary - BBC News'
date: '2020-08-15'
section: General
url: http://www.bbc.co.uk/news/uk-53789686
content: |-
  The Prince of Wales and others attended a service of remembrance at the National Memorial Arboretum in Staffordshire.

  The Prince of Wales has led the UK's commemorations on the 75th anniversary of VJ Day.

  He attended a service of remembrance at the National Memorial Arboretum in Staffordshire, alongside the Prime Minister Boris Johnson.
