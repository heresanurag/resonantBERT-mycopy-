title: Daejaun Campbell named as Woolwich 'zombie' knife victim - BBC News
date: '2024-09-25'
section: London
url: http://www.bbc.co.uk/news/articles/cvglp6v80mzo
content: |-
  Daejaun Campbell was fatally stabbed in Woolwich on Sunday evening.

  A 15-year-old boy who died after being stabbed with a "zombie-style knife" in south-east London has been named. Daejaun Campbell was found with a stab injury on Eglinton Road, Woolwich, just after 18:30 BST on Sunday. He died at the scene. Two men aged 52 and 18 have been arrested on suspicion of murder and remain in police custody. Detectives investigating the case have appealed again for witnesses and anyone who knows anything about Daejaun’s death to contact them.

  A woman who lives locally told BBC London she had picked up the injured boy's phone after it rang and she was able to get a friend to come to his side. "I was back and forth with the boy on the floor and just trying to comfort him - he was saying 'I am 15' and 'to call my mum'," the witness said. The police say their investigation into Daejaun’s death is still in the early stages and that officers are trying to build a picture of what happened. Detectives believe the teenager was attacked with a zombie-style knife. Det Ch Supt Trevor Lawry said: “My thoughts are with Daejaun’s loved ones as they try and come to terms with this heart-breaking incident." He added: "I want to appeal to you again and ask if you know anything about the death of young Daejaun. “Did you see anything suspicious around the Eglinton Road area? Did you see anyone running away from the area? Do you have any footage? If you do then please contact police.”

  In an appeal for witnesses on Monday, Det Ch Supt Lawry said: "Once again we have had to tell a child’s family that their loved one has been killed in an act of violence using a knife. Our thoughts are with them as they struggle to comprehend what has happened. "The fact that a 15-year-old teenager, who had his whole life ahead of him, has been taken from his family in this way, is a stark and sobering reminder of the danger of ‘zombie-style’ knives. "We are committed to doing everything in our power to taking these weapons off our streets."
