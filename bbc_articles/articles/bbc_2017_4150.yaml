title: Badminton England blames funding cuts for tournament withdrawal - BBC Sport
date: '2017-04-04'
section: Badminton
url: http://www.bbc.co.uk/sport/badminton/39495928
content: |-
  Badminton England withdraws from a forthcoming international tournament in Australia after losing its Olympic funding.

  Chris Langridge and Marcus Ellis beat UK Sport's target for the Rio Olympics when they won doubles bronze

  In February, Badminton was among seven Olympic sports to lose funding despite Chris Langridge and Marcus Ellis winning doubles bronze at Rio 2016. "We are working through an unprecedented financial situation as a consequence of the recent funding decisions," Badminton England performance director Jon Austin said., external The Sudirman Cup starts on 21 May. The event in Gold Coast, Australia, is seen as an unofficial test event for English players ahead of next year's Commonwealth Games to be held in the same city.

  England finished ninth in the last edition of the World Mixed Team Championships, which take place every two years. "We have had to consider the investments we make very carefully," Austin added. "The pressures we are facing right now, both through the people resource and financial investment needed, means we are regrettably not in a position to commit to the Sudirman Cup this year." Badminton England received around £5.5m between London 2012 and 2016 and was left "staggered", external when it had its funding pulled, despite beating a Rio Games performance target set by elite sport funding body UK Sport.
