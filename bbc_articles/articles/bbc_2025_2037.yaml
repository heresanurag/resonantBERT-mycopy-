title: 'Storm Bert: Wrexham family left with ''scars'' after landslide - BBC News'
date: '2025-02-24'
section: Wales
url: http://www.bbc.co.uk/news/articles/cp8vm0vedk4o
content: |-
  Emyr Owens says it could have been a "total disaster" if the landslide had happened at night.

  The family had to smash windows to save the children trapped inside

  Emyr Owens and his family were doing jobs around the house when his daughter heard an unfamiliar sound. Within minutes there was six foot (1.8m) of water outside their family home in Wrexham, 15 trees had fallen and his son's car had been swept down the lane. Like hundreds of others across the country, Mr Owens and his son's homes were badly damaged by Storm Bert in November 2024. Three months on he said his family were lucky to be alive but were still living with the "scars" of such a "horrendous" event.

  Mr Owen's son said a tree came through the stone walls of his home

  "It could have been an absolute disaster," said Mr Owens, from Llanarmon Dyffryn Ceiriog, Wrexham. On the morning Storm Bert battered the country, Mr Owens and his daughter, Sioned, were moving furniture. They had taken the six children to the house next door, where his son and daughter-in-law live. The storm triggered a landslide on Mr Owens' doorstep, leaving destruction in its wake. "It was horrendous. At its worse it was six foot deep and it smashed all the doors where the cattle were," he said. A total of 15 trees fell, with one tree slicing through the stone walls of Mr Owens' son's house next door. He said he rushed to the house where his grandchildren were in order to save them. "We are lucky that it happened at 2pm and not 2am or it could have been a total disaster," Mr Owen said.

  This video can not be played To play this video you need to enable JavaScript in your browser. The family could not hide their emotions after the devastation caused by the landslide in November

  Three months on Mr Owens said Storm Bert had mentally impacted the family, particularly his six grandchildren. "You are always thinking about it," he said. "People are always asking how are things... but it brings back things - it's been a very stressful time." While Mr Owens has had support from his "fantastic neighbours and community", he said questions still remained about the preparation and reaction of authorities to the storm. "We haven't even had a phone call - we have had nothing," he said. "You'd think they would have come out and at least have a look at the situation. "At the end of the day they are partially responsible for it."

  The landslide destroyed the windows and doors of the Owens family home

  Mr Owens said he was frustrated he cannot dredge the river, saying "common sense" needed to prevail. "They say we will put a fence there and plant trees," he said. "They're going to extreme costs for no reason."

  More than 300 tonnes of silt was swept into the yard of the farm

  Lyndsey Rawlinson, head of operations for north east Wales at Natural Resources Wales, said: "All of our flood risk management activities must be prioritised and justified technically, environmentally, and economically. "Dredging and de-shoaling can be more effective in some locations than in others. "We make decisions on how best to manage increased flood risk on a site-specific basis, using specialist knowledge and evidence of how each river might respond to sediment removal." Ms Rawlinson added Natural Resources Wales had "permissive powers" to carry out flood risk maintenance work on main rivers, rather than legal duties.
