  Norris tops British GP practice but has 'more to find'

  The British Grand Prix is live on 5 Live and the BBC Sport website

  Lando Norris headed Oscar Piastri in a McLaren one-two in Friday practice at the British Grand Prix but said he had “more to find” before qualifying. Red Bull’s Max Verstappen was an unfamiliar seventh fastest but digging down into the data from the session suggested he was on the pace as usual. His team-mate Sergio Perez was third fastest, ahead of Haas driver Nico Hulkenberg, Ferrari’s Charles Leclerc and Mercedes’ Lewis Hamilton. Norris, who has competed for victory with Verstappen in the last three races and clashed with the Red Bull driver in Austria last weekend, said: “A good start to the weekend. Didn’t feel that comfortable this morning but we made some tweaks and got in a much nicer (set-up) window, which is important around here because it’s quite on the nose and quite sketchy and pretty high speed. “I’m happy. We are pretty tight and even with the Mercedes. They seem just as quick as us - they just didn’t turn up the engine and do as much in the final runs. “We are in a good place but we definitely have a little bit more to find.” The final part of the session was hit by rain, and more wet weather is expected over the weekend. “I wish the weather was a little bit better, but at least the rain held off for most of the day,” Norris said. “Trying to do my part and give a little bit back to (the fans).”

