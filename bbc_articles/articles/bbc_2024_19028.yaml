  Oval Invincibles captain Sam Billings: "Amazing. Just a real team effort throughout the tournament, probably even better than last year. It didn't go all our way and that's the strength of the group. "Saqib Mahmood came and changed the game with that set of 10." Oval Invincibles bowler Adam Zampa: "I love this tournament. Days like today - the way Lord's put the day on, the women's game before us - it is a really good event." Southern Brave batter Laurie Evans: "I'm gutted to be honest. It is the third year in a row [losing in the final]. All credit has to go to Oval Invincibles, they are a great team and have been for the last two years." Oval Invincibles bowler Saqib Mahmood: "I don’t want to sound arrogant but we just knew from the start we’d win. I don’t know what it was. "I really wanted to use this competition to try and get back in the England white-ball side. I haven’t played that much red-ball cricket, I’ve still got to get my body used to that. If I can get back into that white-ball team, that is my main target."

