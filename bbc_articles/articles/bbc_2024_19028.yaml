content: |-
  Oval Invincibles win The Hundred for the second year running with a convincing victory over Southern Brave in the final at Lord’s.

  Invincibles take down Brave to retain Hundred title

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Oval Invincibles have won The Hundred for the second year running after a convincing 17-run victory over Southern Brave in the final at Lord’s. Set 148, Brave made a solid start to their chase but then collapsed from 58-0 to 102-7 as Invincibles seized control. Australia leg-spinner Adam Zampa made the initial breakthrough before fast bowler Saqib Mahmood shredded the Brave middle order with three wickets in seven balls. Will Jacks took the key wicket of Brave skipper James Vince, the leading run-scorer in the tournament, to back up his tone-setting 37 from 22 balls at the top of the order for Invincibles. While no Invincibles batter was able to kick on, Sam Curran and Jordan Cox both contributed value knocks of 25 and Tom Curran added 24 from 11 balls late in the innings. Left-arm seamer Tymal Mills was the pick of the Brave attack, taking 3-33. It looked like the Brave innings may follow a similar pattern when opener Alex Davies fell to Zampa for 35 from 23 balls. Vince made 24 but Mahmood bowled Leus du Plooy for 20 then quickly added the wickets of Kieron Pollard and Laurie Evans to stop Brave in their tracks. Invincibles were able to see out the match without issue and become the first men's team to successfully defend The Hundred trophy.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Remarkable shot' - Jacks hits Archer's first ball for six

  For the past two years, Invincibles have been the strongest side in the men’s competition. That in itself is no guarantee of success but, combined with the ability to deliver when it really matters, they have proven unstoppable. Jacks gave them the ideal start in the final, negotiating a testing first five from Craig Overton before leaping into action to smash Jofra Archer’s first ball over cover for six. Overton got the treatment in the next set, then it was the turn of Akeal Hosein and by the time Jacks was bowled by a Mills full toss, the platform had been set. From there it was a case of 'next man up' with setbacks quickly forgotten. Even losing 4-9 in 10 balls was no problem as, with his side in need, Tom Curran took on the responsibility and led them to what proved to be a winning total. It was no different with the ball. There was no sense of panic as Vince and Davies built a strong opening stand, just belief the wicket would come eventually. It was little surprise that it was Zampa who provided it - the leggie ends the tournament as joint-leading wicket-taker with Mills, on 19. Jacks and Nathan Sowter did their bit before Mahmood, playing just his fifth game of the tournament, produced the match-clinching spell. There was no need for any heroics from player of the tournament Sam Curran. Invincibles had every base covered and ensured a match that threatened to go down to the wire was wrapped up with relative ease.

