  When China started putting bounties on dissidents' heads in 2023, they targeted prominent protest leaders and opposition politicians. Chloe, still finishing her A-levels at the time, thought was she too small-fry to ever be a target. Her inclusion underlines Beijing's determination to pursue activists overseas., external A Hong Kong government statement said: "Any individuals who endanger national security should not believe that being overseas will allow them to evade criminal responsibility. "We must emphasise that the Constitution and the Basic Law steadfastly safeguard the rights and freedoms enjoyed by Hong Kong people." Chloe says the bounty puts a target on her back and encourages third parties to report on her actions in the UK. China has been the leading country over the past decade trying to silence exiled dissidents, external around the world, according to a report this week. Another Hong Kong dissident who reported being assaulted in London blamed the attacks on Chinese government-linked actors. And last May, British police charged three men with gathering intelligence for Hong Kong and breaking into a home. One of the men was soon after found dead in unclear circumstances. "They're only interested in Hong Kongers because they want to scare off others," Chloe says. She says many of those who've moved over in recent years stay quiet, partly because they still have family in Hong Kong. "Most of the BNO visa holders told me this because they don't want to take risks," she says. "It's sad but we can't blame them."

  On the day her arrest warrant was announced, Foreign Secretary David Lammy said the UK would not tolerate "any attempts by foreign governments to coerce, intimidate, harass or harm their critics overseas". He added the government was committed to supporting Hong Kongers in the UK. But more needs to be done, says Chloe, who's spent the first weeks of this year lobbying Westminster. In the past fortnight she has met Prime Minister Keir Starmer at a Lunar New Year event at Downing Street, and shadow foreign secretary Priti Patel, who later tweeted: "We must not give an inch to any transnational repression in the UK."

  But she worries whether the UK's recent overtures to China could mean fewer protections for Hong Kongers. "We just don't know what will happen to us, and whether the British government will protect us if they really want to protect their trade relationship with China." Does she feel scared on the streets in London? It's not as bad as what activists back home face, she says. "When I think of what [they] face... it's actually not that big a deal that I got a bounty overseas."

  Hong Kong police first started issuing bounties for activists based abroad in 2023
