content: |-
  Chloe Cheung was just a year out of school when Hong Kong police issued a million-dollar bounty for her arrest.

  The A-level student who became an enemy of the Chinese state

  Chloe Cheung, 19, has been named a "wanted person" by Hong Kong police

  Just over a year ago, Chloe Cheung was sitting her A-levels. Now she's on a Chinese government list of wanted dissidents. The choir girl-turned-democracy activist woke up to news in December that police in Hong Kong had issued a $HK1 million ($100,000; £105,000) reward for information leading to her capture abroad. "I actually just wanted to take a gap year after school," Chloe, 19, who lives in London, told the BBC. "But I've ended up with a bounty!" Chloe is the youngest of 19 activists accused of breaching a national security law introduced by Beijing in response to huge pro-democracy protests in the former British colony five years ago. In 2021, she and her family moved to the UK under a special visa scheme for Hong Kongers. She can probably never return to her home city and says she has to be careful about where she travels. Her protest work has made her a fugitive of the Chinese state, a detail not lost on me as we meet one icy morning in the café in the crypt of Westminster Abbey. In medieval England, churches provided sanctuary from arrest.

  Hong Kong police issued the arrest warrant on Christmas Eve, using the only photo they appear to have on file for her – in which she is aged 11. "It freaked me out at first," she says, but then she fired back a public response, external. "I didn't want the government to think I was scared. Because if Hong Kongers in Hong Kong can't speak out for themselves any more, then we outside of the city - who can speak freely without fear- we have to speak up for them." Chloe attended her first protests with her school friends, in the early days of Hong Kong's 2019 demonstrations. Protesters turned out in huge numbers against a bill seen as extending China's control over the territory, which had enjoyed semi-autonomy since Britain handed it back in 1997. "Politics were never in my life before... so I went to the first protest with curiosity," she said. She saw police tear-gassing demonstrators and an officer stepping on a protester's neck. "I was so shocked," she says. "That moment actually changed how I looked at the world."

  At least a million people turned out to protests against China's rule in Hong Kong in the protests of summer 2019

  Growing up in a city that was part of China but that had retained many of its freedoms – she had thought Hong Kongers could talk about "what we like and don't like" and "could decide what Hong Kong's future looked like". But the violent crackdown by authorities made her realise that wasn't the case. She began joining protests, at first without her parents' knowledge. "I didn't tell them at the time because they didn't care [about politics]," she says. But when things started to get "really crazy", she browbeat her parents into coming with her. At the march, police fired tear gas at them and they had to run away into the subway. Her parents got the "raw experience", she says, not the version they'd seen blaming protesters on TV.

  Most rallies were peaceful but several escalated into violence from both sides. This picture shows riot police detaining protesters in September 2019

  After months of demonstrations, Beijing passed the National Security Law in 2020. The authorities in Beijing and Hong Kong argue the law is necessary to maintain stability and has not weakened the city's autonomy. But most of the freedoms that had set Hong Kong apart from mainland China - freedom of expression, the right to political assemblies – were suddenly gone. Symbols of democracy in the city, including statues and independent newspapers, were torn down, shut or erased. Those publicly critical of the government - from teachers to millionaire moguls like British citizen Jimmy Lai - faced trials and eventually, jail. In response to the crackdown, the UK opened its doors to Hong Kongers under a new scheme, the British National Overseas (BNO) visa. Chloe's family were some of the first to take up the offer, settling in Leeds, which offered the cheapest Airbnb they could find. Chloe had to do her GCSEs halfway through the school term, and during a pandemic lockdown. At first, she felt isolated. It was hard to make friends and she had trouble speaking English, she says. There were few other Hong Kongers around. Unable to afford international student fees of more than £20,000 a year, she took a job with the Committee for Freedom in Hong Kong Foundation, a pro-democracy NGO.

