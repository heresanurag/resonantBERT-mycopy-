content: |-
  The 26-year-old had not been seen since leaving a nightclub in the early hours of Friday morning.

  Luis Piovesana had not been seen since the early hours of Friday morning

  A body has been found in the search for a missing 26-year-old man, police have said. A huge search effort had been launched in Bristol after Luis Piovesana disappeared in the early hours of Friday morning after leaving The Jam Jar in St Judes, Bristol. Avon and Somerset Police said a body was discovered by a dive team which was searching the River Frome in the Napier Road area of Eastville at 18:00 BST on Monday. A spokesman said while formal identification had not yet taken place, detectives had met Mr Piovesana's family and updated them.

  "Our thoughts remain with them during this incredibly difficult time and they continue to be supported by specialist officers," they said. At a press conference on Monday afternoon Det Insp Pete Walker of Avon and Somerset Police said Mr Piovesana had called 999 for help in the minutes after he went missing. However the call had dropped out after 34 seconds, with officers unable to contact him again. He was later seen on CCTV, moving around the Eastgate Retail Park. Mr Piovesana's disappearance sparked a huge search effort over the weekend, with more than 100 police officers and staff involved as well as dozens of volunteers.

