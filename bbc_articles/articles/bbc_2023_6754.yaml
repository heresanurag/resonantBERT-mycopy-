title: Kate comforts crying girl as royal couple meet Windsor crowds - BBC News
date: '2023-05-07'
section: General
url: http://www.bbc.co.uk/news/uk-65518730
content: |-
  The Prince and Princess of Wales meet crowds celebrating the Coronation at Windsor.

  The Prince of Wales and Catherine, Princess of Wales, have been meeting crowds celebrating the King's Coronation on the Long Walk in Windsor.

  Thousands have been taking part in street parties across the UK as part of the Coronation Big Lunch.
