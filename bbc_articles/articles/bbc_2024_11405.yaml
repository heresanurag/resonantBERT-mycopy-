content: |-
  He will carry on in the role until after the election and will resign as an MSP if he is re-elected to Westminster.

  Douglas Ross to resign as leader of Scottish Conservatives

  Douglas Ross said it was not feasible for him to continue in three roles - as MSP, MP and party leader

  Douglas Ross has announced he will resign as leader of the Scottish Conservatives. He will carry on in the role until after the election and will also resign as an MSP if he is re-elected to Westminster. It follows a row over Mr Ross standing as a candidate for Aberdeenshire North and Moray East instead of David Duguid, who has been in hospital and was in effect de-selected. Mr Ross said he originally thought he could continue to serve as an MSP and MP as well as party leader, but said "on reflection, that is not feasible". He was the only MSP to also serve as an MP in the current Holyrood session before the UK Parliament dissolved.

  Mr Duguid, who had held the Banff and Buchan seat since 2017, had already been adopted by local party members and has disputed suggestions that he is "seriously ill". On Monday, a Scottish Conservative source told BBC News that Mr Ross had come to the realisation that the party's MSPs would not "put up" with him serving as both an MP and an MSP. They added that the reaction to him announcing plans to stand in place of Mr Duguid was another factor. The seat has recently been redrawn as Aberdeenshire North and Moray East. Speaking to BBC News, Mr Ross said colleagues had told him over the weekend they were "uncomfortable" with his decision to stand. He said he had to make the choice "overnight" and that the party management board had made "difficult decisions" on no longer having Mr Duguid in the running.

