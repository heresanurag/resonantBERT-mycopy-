title: 'Climbing: All-women Pinnacle Club celebrates its centenary - BBC News'
date: '2021-09-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-58496185
content: |-
  An all-women club for climbers marks its centenary where it began - in Snowdonia.

  They first came together in Snowdonia - and 100 years on, members of the Pinnacle Club have conquered the world's highest peaks.

  From the Alps to the Himalayas, the 200-strong club exclusively for women climbers has criss-crossed the globe.

  And they have been celebrating their centenary back where it all began, in Wales.
