content: |-
  BBC News NI looks at the background and the potential outcomes of the abortion referendum in the Republic of Ireland.

  Voters in the Republic of Ireland are set to decide on the future of the country's abortion laws in a referendum on 25 May.

  BBC News NI looks at the background to the referendum and what the verdict may mean.
