title: Speeding driver who paralysed young woman in crash jailed - BBC News
date: '2024-09-20'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cpdl9yn8z51o
content: |-
  Moments before the crash Gavin Coull uploaded video online which showed his car travelling in excess of 100mph.

  Speeding driver who paralysed woman in crash is jailed

  Gavin Coull claimed someone else was driving

  A speeding driver who left a young woman paralysed following a crash in Aberdeenshire has been jailed for three years. Ellen Stickle, now 27, was a passenger in a car struck by 32-year-old Gavin Coull's BMW on the A90 Ellon to Aberdeen road in March 2021. Moments before the impact, Coull, of Fraserburgh, uploaded video online which showed a speedometer displaying more than 100mph. Coull - who claimed someone else was driving - was found guilty of causing serious injury by driving dangerously, while unfit through drugs.

  He was also banned from driving for four years at Aberdeen Sheriff Court.

  Sheriff Philip Mann said the crash caused "catastrophic" injuries which meant that Ms Stickle would never become a mother. Coull had earlier been convicted following a five-day trial at Peterhead Sheriff Court. The court heard how Coull and a fellow passenger were travelling southbound on the dual carriageway late in the evening when he crashed into a red Ford Fiesta. Jurors were shown the footage he had uploaded to Snapchat which was captioned “Burning The Midnight oil” and showed how fast the car was travelling.

  Images uploaded to Snapchat shortly before the crash showed the car was travelling at more than 100mph

  The collision caused the Fiesta to smash through crash barriers and tumble onto a grassy embankment off the A90. Ms Stickle gave evidence and told the jury she had no memory of the crash. "I remember being told by the spinal consultant that I would never walk again," the former keen runner said. “It’s hard, but I’m just grateful that I didn’t die." Calum McIntyre, who was driving the Fiesta in which Ms Stickle was the passenger, was also injured.

  Defence solicitor Sam Milligan told the court that while Coull accepted the verdict he maintained he was not the driver at the time of the crash. Sheriff Mann told Coull it was an "outrageously bad" piece of driving. He said it caused catastrophic injuries to a young woman, who is now a wheelchair user, causing her "mental anguish". He said she would never again be able to gain pleasure from running or walking, never become a mother, and her relationship at the time came to an end. Sheriff Mann said he was aware no sentence could ever compensate her through the rest of her life. Coull was also ordered to sit an extended test before he can drive again.

  A statement on behalf of Ms Stickle said: “Ellen would like to express her heartfelt gratitude to those who arrived first on the scene, who she believes played a significant role in helping to save her life, including the various emergency services who attended. “In particular, Ellen would like to thank bus driver Sandra Cordiner and recovery driver John Shirran, not only for their immediate actions, but for their time and strength to give evidence in court. “Ellen would also like to thank Police Scotland and other organisations who worked tirelessly to secure this conviction.”

  Injured driver Mr McIntyre told BBC Scotland News: "I would like to say a big thank you to all the emergency services that came to help us that night. "After several years of stop and start court proceedings I am pleased a jury has found someone responsible for what happened. "The impact Gavin has caused by getting behind the wheel under the influence to a young woman's life and her family is incomprehensible." He added: "I hope other people think twice before they repeat Gavin's actions and the danger it puts other users on the road."

  Sgt Craig McNeill, of Police Scotland, said: "Coull’s disregard for road safety has had a devastating impact on her. “He drove dangerously at excessive speed whilst under the influence. “His actions highlight the devastating consequences of dangerous driving and the lasting impact it has on those involved, along with their families and friends. "Drivers must obey speed limits and respect the safety of other road users. "Drivers are responsible for their actions and the temptation to take risks can have severe and long-lasting consequences for everyone involved.”
