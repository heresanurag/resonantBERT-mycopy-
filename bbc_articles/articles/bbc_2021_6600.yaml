title: 'SpaceX ISS mission: Night-time splashdown for four astronauts - BBC News'
date: '2021-05-02'
section: General
url: http://www.bbc.co.uk/news/world-56962932
content: |-
  Four astronauts splash down off the coast of Florida after a six-month mission to the International Space Station.

  Four astronauts have returned to Earth from the International Space Station, in what was Nasa's first night-time landing in 53 years.

  They flew back in SpaceX's Crew Dragon Resilience and splash-landed off Panama City, Florida at 02:56 EDT (07:56 BST).
