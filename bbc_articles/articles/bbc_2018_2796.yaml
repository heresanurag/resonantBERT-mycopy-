title: 'Boat Races: Cambridge enjoy convincing men''s & women''s wins over Oxford
  - BBC Sport'
date: '2018-03-25'
section: Rowing
url: http://www.bbc.co.uk/sport/rowing/43528373
content: |-
  Cambridge convincingly beat Oxford in both the men's and women's Boat Races on the River Thames in London.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Cambridge beat Oxford in commanding manner to win the 164th Boat Race in gloomy conditions on the River Thames. The Light Blues took control from the start and remained ahead to win by three lengths in 17 minutes 51 seconds. That takes their advantage in the famous race against Oxford to 83-80. Cambridge earlier won the women's race in emphatic fashion, beating their rivals by seven lengths in just over 19 minutes. They also won both reserve races to complete a clean sweep. It is the first time Cambridge have won all four races in the same year since 1997.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Cambridge men's chief coach Steve Trapmore, who is leaving his role to take up a new post with the British Olympic rowing programme, said: "It's been a long year. Every year we review what we have done and try to make it better. "I really wanted the boys to do well and they stepped up. They took it by the scruff of the neck from stroke one and I'm really pleased they went and fulfilled their potential." Oxford president Iain Mandale said: "I think the guys did a really good job - Cambridge were just quite a good crew. It's not always easy to lose and say it was a good performance but there we are." Mandale denied a late change to their line-up - caused by Josh Bugajski's absence with gastroenteritis - was a key factor.

  "I think its a shame that is the story of this year's boat race," he said. The convincing win by Cambridge's men followed a dominant display by the women, who extended their overall number of victories to 43 against Oxford's 30. Having triumphed last year by 11 lengths in a course record of 18 minutes 33 seconds, it is the first time this century that Cambridge's women have won in consecutive years.
