id: bbc_2017_2559
title: Birmingham man makes videos to sign pop lyrics for deaf people - BBC News
date: '2017-02-15'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-38971644
content: |-
  Online videos feature man signing pop music lyrics for those who have never heard them.

  A man is using sign language to share pop music with deaf people.

  Wayne Barrow, from Birmingham, whose parents are profoundly deaf, makes online videos in which he signs lyrics.

  He said he learned to sign before he learned English and has called for signing to be taught in schools.

  The videos, which are posted to Facebook and YouTube, have, according to Mr Barrow, helped his mother understand music.
