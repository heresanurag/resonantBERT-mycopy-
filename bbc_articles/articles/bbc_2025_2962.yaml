title: Travis Kelce 'admire watching' Taylor Swift's work ethic - BBC News
date: '2025-02-07'
section: General
url: http://www.bbc.co.uk/news/videos/ce9npxjn1yvo
content: |-
  Kansas City Chiefs’s tight end said he watched his girlfriend's Eras Tour be 'excruciating' on her body and mind.

  Kansas City Chiefs's Travis Kelce praised his girlfriend Taylor Swift's work ethic at a press conference ahead of Sunday's Super Bowl game.

  He said the pop superstar's Eras Tour was "excruciating" on her body and mind, but it's something he could "could admire watching, and take a lot of notes from".

  The Kansas City Chiefs will take on the Philadelphia Eagles at Sunday's Super Bowl at the Caesars Superdome in New Orleans.
