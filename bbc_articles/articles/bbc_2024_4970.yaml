content: |-
  The US withdrawal in August 2021 ended America's longest war, but Biden has faced criticism over it.

  General says Taliban harbours those who want to attack the US

  Video caption: General says Taliban harbours those who want to attack the US General says Taliban harbours those who want to attack the US Failed Biden presidential challenger Dean Phillips has been asking questions. He's been talking about his visit to Vietnam, where his father was killed during the war, and how much it meant to him, to see the land. In response to his questioning, Milley says that it will "take years" to get families answers, and to responsibly bring Americans back to Afghanistan. Milley says he will go to his grave unwilling to reconcile with the Taliban, and still considers them a terrorist organisation. He says he does not recommend that any family members return there. McKenzie adds that "it is decades away before there is going to be any rapprochement with Afghanistan". He says of the Taliban, "they themselves don't have a desire to attack us and our homeland, but they do harbour entities and organisations that do have a desire to do that".
