content: |-
  Pamela Hayden also voiced Ned Flanders' sons Rod and Todd and school bully Jimbo Jones.

  Pamela Hayden said she would "always have a special place in my heart for that blue-haired 10-year-old boy"

  Pamela Hayden, the actress who voices the Simpsons character Milhouse, has announced her retirement from the show. Hayden has worked on the US animated series since 1989 and appeared in nearly 700 episodes. In a statement, 70-year-old Hayden said: “The time has come for me to hang up my microphone.” “It’s been an honour and a joy to have worked on such a funny, witty, and groundbreaking show... I’ll always have a special place in my heart for that blue-haired 10-year-old boy with glasses.”

  Milhouse has been a popular recurring character on the show for 35 years

  Producers plan to re-cast the role in the coming months. Milhouse van Houten has been a popular recurring character on the sitcom for the past 35 years, and is Bart Simpson's best friend. He is shy in nature, easily influenced by Bart's mischievous ideas, and regularly targeted by bullies. Milhouse is not the only character played by Hayden. She is also the voice behind Ned Flanders' sons Rod and Todd, school bully Jimbo Jones, Lisa Simpson's friend Janey, and Chief Wiggum's wife Sarah. But Milhouse was her most popular character, Hayden said, recalling in a video announcing her departure, external that "people would come up to me and they quote Milhouse lines". “People are always saying what a nerd he is, but one thing that I love about Milhouse is he’s always getting knocked down, but he keeps getting up,” she continued. “I love the little guy. It’s this wonderful analogy for life.” The show's creator Matt Groening said: “Pamela gave us tons of laughs with Milhouse, the hapless kid with the biggest nose in Springfield. She made Milhouse hilarious and real, and we will miss her." The blue-haired boy was said to be named after former US president Richard Milhous Nixon.
