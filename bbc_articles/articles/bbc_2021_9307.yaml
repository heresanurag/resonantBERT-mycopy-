title: 'Covid: Masks still advised after 19 July, Boris Johnson says - BBC News'
date: '2021-07-12'
section: UK
url: http://www.bbc.co.uk/news/live/uk-57801824
content: |-
  Government scientific advisers warn hospital cases could peak at 1,000 to 2,000 a day from mid-August.

  What measures might be needed in autumn and winter?

  Dan Bloom of The Mirror says he understands there could be up to 100 to 200 deaths a day, according to the modelling - is that a price the government is willing to pay for freedom, he wants to know? The PM says the reality is that both deaths and hospitalisations are sadly going to rise, whenever you decide to unlock. "We simply have to recognise that", he adds. Bloom also asks the scientists what measures might be needed this autumn and winter. Chris Whitty says it has already been said there is likely to be an increase in flu and other respiratory diseases this winter - and now there would be Covid on top of this. This would probably lead to people taking "sensible precautions" but that is different to there being restrictions, which is an issue for ministers, he adds. It is not an inevitability that because of a surge, there will be anything ministers have to do, he adds. The reality is that it is going to come in winter and possibly other winters, says the chief medical officer.
