title: 'Doctor Who: Varada Sethu wants to inspire young South Asian women - BBC News'
date: '2025-04-02'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c3e405g2e39o
content: |-
  Doctor Who's new companion Varada Sethu feels getting into the acting industry can be tough for South Asians.

  New Doctor Who star: 'I don't want to be a cautionary tale'

  When new Doctor Who companion Varada Sethu first told her family she wanted to be an actress, there wasn't immediate support. "They had difficulty coming to terms with it initially," she tells BBC Asian Network News. Varada, who will be playing Ncuti Gatwa's sidekick, Belinda Chandra in the upcoming series, feels going into acting is "sadly still not encouraged in the South Asian community". "There's an element of resistance we face," the 32-year-old says. But Varada wants to change all of that, and says inspiring young girls to follow their dreams is one of her big goals. "I want to be the person that these girls can point out to and say: 'She made it and she came from a community that looks like mine'. "So I think I've gone about this with the energy of, I can't fall flat on my face," she says.

  Ncuti Gatwa's playing the doctor for a second series

  But the actress, who has had roles in Disney+ Star Wars series Andor, 2018 crime drama Hard Sun and Jurassic World Dominion, says change comes with challenges. A report by the Creative Diversity Network, external found in 2022/23 the percentage of on-screen contributions by those who identify as South Asian or South Asian British was 4.9%. That's compared with the latest census data, analysed by the UK Government, external, that found around 8% of people from those backgrounds are in the working-age population. "It's a constant battle of failure isn't an option," says Varada. "Because, you know, your uncle's daughter who's six, who might wanna go into acting when she's a bit older, won't be allowed to, if I become the cautionary tale." Despite that, Varada says she tries not to put too much pressure on herself while filming. Rather, she tries to stay authentic to her true self instead of getting caught up in the moment. "Occasionally it does hit me in my face like 'oh, that's a lot, that's a big thing that's happening', she says. "But I try not to get swept up in it. You know, I try to just do the best I can."

  Varada says she has enjoyed working with Ncuti Gatwa

  Playing the role of Belinda in Doctor Who has been an "honour", Varada says. "Everyone's heard of Doctor Who, everyone knows of Doctor Who, even if you don't regularly watch it. "It's so iconic and British, and it's such a part of our culture." Praising Ncuti Gatwa for the "energy he brings to the role", she describes him as inspiring to watch work and "an absolute joy" to work with. Her character Belinda travels to a number of different planets and time periods after asking the doctor for help to get home, which Varada says was the most exciting thing about the role. "This character is discovering all these different sides to herself in circumstances that, no human gets to experience in real life." And she says some of her character's "feisty" and "independent" traits have helped her in her real life. "As an actor you get to practice saying things that you maybe you wouldn't be as brave in saying. "And it's safer because you know what the other person is going to say, but you know, your nervous system gets used to that. "I think with each character I play, I discover a new chapter about myself as well. "And Belinda's taught me a lot about that," she says.

  Doctor Who Season 2 is set to premiere on Saturday 12 April 2025, on BBC One and BBC iPlayer in the UK, with those outside of the UK able to watch on Disney+.

