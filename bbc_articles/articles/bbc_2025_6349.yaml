title: British Steel workers hopeful but cautious over plant's future - BBC News
date: '2025-04-14'
section: General
url: http://www.bbc.co.uk/news/videos/c0r57n01lz8o
content: |-
  Workers are optimistic the Scunthorpe plant can be saved but warn they have been "let down before".

  Steelworkers in Scunthorpe say they are optimistic about British Steel's future, but warn they have "been let down before".

  One worker - Rachael - said: "I don't want to feel relieved until it's all sorted".

  BBC News was speaking to workers on Monday morning, days after an emergency parliamentary vote to save the plant.

  Business Secretary Jonathan Reynolds said the government had "no choice but to act", after Chinese company Jingye, which bought British Steel in 2020, said it had been suffering financial losses of around £700,000 a day.
