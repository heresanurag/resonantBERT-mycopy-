id: bbc_2018_451
title: Aston Martin DB4 model built after 55-year gap - BBC News
date: '2018-01-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-42569130
content: |-
  The company has started production of 25 of the classic cars, which have been sold in advance for £1.5m each.

  Classic car production has restarted at the Aston Martin factory in Buckinghamshire, which was being used mostly for car refurbishments over the last ten years.

  The company said the new DB4 model would create jobs and boost the economy in Newport Pagnell.
