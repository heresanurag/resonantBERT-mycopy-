title: 'CrossFit Games: Lazar Dukic dies competing in swim in Texas - BBC News'
date: '2024-08-09'
section: World
url: http://www.bbc.co.uk/news/articles/cy847yp8kjgo
content: |-
  Lazar Dukic, from Serbia, was competing in Marine Creek Lake on Thursday when he disappeared under the water.

  An athlete has died while taking part in a swim at the CrossFit Games in Texas, organisers said. Lazar Dukic, 28, from Serbia, was competing on Marine Creek Lake near the city of Fort Worth on Thursday morning when he disappeared under the water and failed to resurface, officials from Fort Worth emergency services said. Emergency services were called at around 08:00 local time (14:00 BST) and a body was recovered about an hour later.

  "We are devastated by the passing of Lazar Dukic," a statement from the games read. "Our hearts are with Lazar's friends and fellow athletes." The rest of Thursday's events were suspended, but organisers took the decision to resume on Friday. "The first instinct is to shut down. To isolate. To mourn," the Crossfit Games said on Twitter/X. "But the only cure for grief is to grieve. And the best way to grieve is together." "In this spirit, we have decided to move forward with the 2024 CrossFit Games." In a statement shared with the BBC, Don Faul, the CEO of CrossFit, said the safety of the community was of "paramount concern to CrossFit". "[W]e have rigorous protocols in place for each event at the CrossFit Games," he said, adding the company had launched an investigation being conducted by an independent third party. According to the CrossFit Games website, external, the event included a 3.5-mile run followed by an 800m swim. The search for Mr Dukic's body involved a dive team from the Fort Worth Police Department as well as drones, the BBC's US partner CBS News reported, citing local officials. Mr Faul said Mr Dukic was a "loved and respected" member of the fitness community. "There's a lot of people in the community who are hurting right now," he said. "A lot of people are mourning. We want to do everything we can to support the community, to support the family." He also said a "fully documented safety plan" had been in place and that safety personnel were on site throughout the event. Crossfit's decision to re-start the games drew the ire of some observers on social media. "You'll keep pushing. Money's the main game," one commentator wrote on X. "You just needed to craft a story that makes you look like you care." Another commenter wrote that the re-start of the games is "so insensitive". "A sad day became even sadder with this disrespectful decision," he added. "So wrong."

  Lazar Dukic was considered a top CrossFit competitor in his native Serbia.

  A crowdfunder to support Mr Dukic's family that began with a target of $200,000 (£157,000) has already raised more than $310,000. The page said Mr Dukic debuted at the CrossFit Games in 2021 after years playing water polo in Serbia. "Known for his kindness, humour and supportive nature, Lazar brought a breath of fresh air wherever he went," it said. "Beyond his athletic achievements, Lazar was caring, humorous and relentlessly supported those around him." A CrossFit Games biography on its website ranked Mr Dukic as Serbia's number one CrossFit athlete between 2017 and 2021, and third this year. The games are an annual competition in which athletes take part in various events across numerous disciplines, often only finding out what each stage will entail shortly beforehand. This year's began on Thursday and was scheduled to finish on Sunday.
