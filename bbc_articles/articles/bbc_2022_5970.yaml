title: 'Stormont crisis: Sinn Féin bids to recall assembly - BBC News'
date: '2022-05-25'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-61585654
content: |-
  The party tables a petition but it is not clear yet if other parties will support it.

  Sinn Féin has tabled a petition to recall the assembly in a bid to elect a new Stormont speaker.

  The party's chief whip Pat Sheehan said the Democratic Unionist Party "needs to stop" blocking the formation of an executive.

  A petition requires the signatures of 30 assembly members to pass.

  It is not clear yet if other parties will support the bid.

  Mr Sheehan said he had tabled the recall petition to "allow parties to get to work".

  "The DUP need to stop blocking an executive being formed, so we can give workers and families that help right away," he said.

  "People want an executive now."

  Two weeks ago the DUP refused to support the election of a new assembly speaker.

  That is the first act that must happen after an election before the assembly can carry out any other business.

  It requires cross-community support from a majority of nationalists and unionists.

  Under the protocol, checks are required on goods coming into Northern Ireland from the rest of the UK

  The DUP - Northern Ireland's second-largest party by assembly seats after the 5 May election - said it would not nominate ministers to form a new executive until its concerns about the Northern Ireland Protocol - the post-Brexit trading arrangements for Northern Ireland - are resolved.

  The protocol is under fresh scrutiny following the elections to the Northern Ireland Assembly.

  The elections cemented a majority for assembly members who accept the protocol, including the new largest party, the republican party Sinn Féin.

  The protocol, part of the government's Brexit deal with the European Union, was designed to ensure free trade could continue across the Irish land border by keeping Northern Ireland aligned with the bloc's single market for goods.

  However, it has faced criticism from some unionists who argue it has undermined Northern Ireland's position in the UK by placing additional checks on some goods crossing the Irish Sea.

  DUP leader Sir Jeffrey Donaldson has said he believes the pressure his party is bringing to bear on the issue of the protocol was beginning to have an impact.

  Last week, No 10 announced it would introduce a law to change the trade deal.

  Foreign Secretary Liz Truss, who visited Northern Ireland on Wednesday, said issues around the protocol were "soluble" but could not be allowed to drift.
