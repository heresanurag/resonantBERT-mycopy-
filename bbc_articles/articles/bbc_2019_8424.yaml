title: Greece's New Democracy celebrates election win - BBC News
date: '2019-07-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-48903808
content: |-
  Supporters rally around the election winner's party headquarters in Athens.

  Supporters of Greece's incoming government rallied around the New Democracy headquarters in Athens to cheer leader Kyriakos Mitsotakis after the party won the general election.
