title: 'Jamie Theakston: Heart Radio host reveals he has laryngeal cancer - BBC News'
date: '2024-09-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/cqjr00171w4o
content: |-
  The presenter says a biopsy revealed it is stage one and the prognosis is positive.

  Heart Radio Breakfast co-host Jamie Theakston has announced he has been diagnosed with stage one laryngeal cancer. He said he "recently had an operation to remove a lesion from my vocal cords" and that the prognosis was "very positive". He added that the cancer was identified by a biopsy. Theakston, 53, said in a statement: "So - I have cancer - but cancer doesn't have me. "The prognosis is very positive and I'm hoping to be back with you in October. "Until then, I've been told to give my voice a rest and leave you in the mostly capable hands of JK (Jason King) and Amanda (Holden). "Big thanks to them and all the Global family who have been unbelievably supportive. "Be thankful for this day, and when I next see you, I've got a great story to tell ... Jamie x." Heart Radio posted a supportive message on Instagram, describing Theakston as "our beloved Jamie." His co-host, Amanda Holden, told listeners on Tuesday morning, external: "Now, even though it's been identified as cancer, it is not all bad news." Her current co-host JK, whose full name is Jason King, who usually does the Drivetime show with Kelly Brook, added: "The prognosis is very positive, and Jamie has an amazing team who are going to get this sorted. He's going to be okay. He's hoping to be back with us very soon." Holden said Theakson told them "we've got to hold the fort, and he has told us that the show must go on, and absolutely, that's what we are going to do. "We are going to do him proud, him and Sophie [his wife] and the boys, they're listening at home, and I know that after this announcement, all of you listening as well are going to be sending your best wishes to our king. "Our lovely Jamie, who is going to be better and back with us very soon."

  Celebrities and fans responded to Theakston's own Instagram post, external to wish him well. Singer Olly Murs posted: "Theakoo! Big love to you mate! Get well soon mate!", while TV cook and restauranteur Jamie Oliver wrote: "Big love brother you got this sending love xxx." Emma Bunton, who used to co-host the Heart breakfast show with Theakston, simply wrote: "Love you to bits." Other good wishes came from comedians Sarah Millican and Leigh Francis, presenters Mark Wright, Jenni Falconer and Lisa Snowden and All Saints' Natalie Appleton. Theakston rose to fame as a TV presenter in the 1990s on BBC shows such as The Ozone, children's Saturday shows Live & Kicking, which he presented alongside Zoe Ball, and Top of the Pops. He also fronted quiz show A Question of Pop and Channel 4's The Priory, teaming up again with Ball. In the early 2000s, he presented reality show The Games on Channel 4, and in 2009, joined up with Ball again for Channel 4 series, Britain's Best Brain., Theakston began co-hosting Heart Radio's flagship breakfast show in 2005 alongside Harriet Scott. She left in 2013 and was replaced by Bunton. Holden began hosting alongside Theakston in 2019.

  Laryngeal cancer is a type of cancer affecting the larynx (voice box). The larynx is part of the throat found at the entrance of the windpipe (trachea), and plays an important role in helping you breathe and speak. There are more than 2,000 new cases of laryngeal cancer a year in the UK. It is more common in people over the age of 60, and men. The main treatments are radiotherapy, surgery, chemotherapy and targeted cancer medicines.
