  The local authority said it believed the plate could still be sold for a six-figure sum.

  Rare number plate fails to sell after two years

  East Renfrewshire Council still hopes to sell the number plate

  A Scottish council has failed to sell a rare number plate it hoped would be snapped up by a star such as Harry Styles. East Renfrewshire Council aimed to sell the HS 0 plate – once used by the official car of its provost – for a six-figure sum to raise vital cash. It was hoping for interest from the likes of stars with the same initials including former One Direction star Harry Styles, Hollywood star Hilary Swank or TV presenter Helen Skelton. But the registration has attracted little interest since it went on sale in January 2023. However, the local authority said it remained "confident" the plate would still sell for a six-figure sum.

  It has not been in use since the lease on the council's car ended in 2022. One expert told BBC Scotland the plate could go under the hammer for about £250,000, and would "never go for less than £150,000 at auction" when the authority revealed its plans two years ago.

  It was hoped Harry Styles might have snapped up the number plate

  However Styles, who is known to be a fan of classic cars and has been spotted behind the wheel of a vintage Jaguar E-type, was unmoved by the offer. A freedom of information request found there had been little interest in any prospective buyers securing the plate. A spokesperson for East Renfrewshire Council insisted: "Our historic number plate is still for sale and we remain confident it will fetch a six-figure sum." East Renfrewshire Council inherited HS 0 plate from what was the Eastwood District Council. When the first system of motor vehicle registration was introduced in the 1900s, a one or two letter prefix was followed by a number with up to four digits. The prefix was used to indicate which local authority issued the registration mark. HS was used for Renfrewshire.
