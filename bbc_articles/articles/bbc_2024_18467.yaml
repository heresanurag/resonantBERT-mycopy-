title: Pokémon series star voice actress Rachael Lillis dies at 55 - BBC News
date: '2024-08-13'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c4ge9zdve9no
content: |-
  Lillis, who died from breast cancer on Saturday, began voicing characters on Pokémon in the late 1990s.

  Lillis seen alongside illustrations of the characters she voiced

  Pokémon voice actress Rachael Lillis, who starred in Pokémon TV series, films and video games dating back as far as the late 1990s, has died from breast cancer at the age of 55. Lillis voiced the main characters of Misty and Jessie and many more on the beloved Japanese animated series. Her death was announced by Veronica Taylor, who co-stars as Pokémon lead character Ash Ketchum. Ms Taylor wrote: "Rachael was an extraordinary talent, a bright light that shone through her voice whether speaking or singing."

  "We all know Rachael Lillis from the many wonderful roles she played," Ms Taylor wrote on social media on Monday. "She filled our Saturday mornings and before/after school hours with her beautiful voice, her terrific comic timing, and her remarkable acting skills." She said Lillis was grateful for the support she received as she battled cancer. "It truly made a positive difference," Ms Taylor said. Her sister also confirmed Lillis's death on a GoFundMe set up earlier this year to raise money for her cancer treatment and to move her into a nursing home. "This was unexpected and we are completely grief-stricken," wrote Laurie Orr, adding that her sister's health began to decline last week. "My heart breaks losing my dear little sister, though I am comforted knowing she is free," she said. The page has raised more than $100,000 (£78,000) - including donations made by fans since her death was announced, who said she had "gone too soon and much too young" and her "light shined bright" through her work. Ms Orr said the funds would now go towards paying off remaining medical bills, a memorial service and "efforts to combat cancer". Lillis was born in Niagara Falls, New York, in 1969 and trained in opera at university before becoming a voice actor. Her voice appeared on 423 episodes of Pokémon between 1997 and 2015, according to IMDB. She also voiced Pokémon character Jigglypuff, including in the 2019 film Detective Pikachu and in the Super Smash Bros video game series. A statement from The Pokémon Company International said: "We are deeply saddened to hear about the passing of Rachael Lillis." The company said that her performance on Pokémon "will be cherished by the many fans who grew up with the characters she brought to life with her special talent. "She will be remembered for generations to come, and we will always keep her close in our hearts."

  Correction: An earlier version of this article incorrectly reported that Lillis died at the age of 46
