title: 'Sicily yacht sinking: Italian investigators consider manslaughter - BBC News'
date: '2024-08-25'
section: Europe
url: http://www.bbc.co.uk/news/articles/cjdk0nd9n4zo
content: |-
  Authorities now believe a localised, powerful wind known as a downburst may have caused the sinking.

  Italian authorities had been leading a search operation since Monday for those on board the yacht

  Italian authorities investigating the deaths of seven people in the sinking of a luxury yacht in Sicily say they are looking into potential crimes of "shipwreck and manslaughter". They stressed, however, that the investigation was in its initial stages and they were not currently looking at anyone specifically. UK tech entrepreneur Mike Lynch and his 18-year-old daughter Hannah were among those who died when the Bayesian went down off the coast of Porticello during a storm in the early hours of Monday morning. It was previously believed the vessel may have sunk because of a waterspout, but the authorities now say the most likely cause was a localised, powerful wind known as a downburst.

  The bodies of Jonathan Bloomer, a Morgan Stanley International bank chairman, his wife Judy Bloomer, Clifford Chance lawyer Chris Morvillo, and his wife, jewellery designer Neda Morvillo were also recovered from the wreckage some 50m (164 ft) down, after days of deep dive searches with little visibility. The body of Canadian-Antiguan national Recaldo Thomas, who was working as a chef on the superyacht, was recovered at the scene on Monday. Post-mortems are set to be conducted. The remaining 15 people who were on board the luxury yacht were rescued.
