id: bbc_2022_8450
title: Chinese tornado rips through buildings and power cables - BBC News
date: '2022-06-20'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-61860618
content: |-
  A tornado has severely damaged buildings, cars and infrastructure in the southern Chinese city Foshan.

  Footage from China's state broadcaster, CCTV, has emerged showing a tornado striking the southern Chinese city of Foshan.

  Buildings, cars and local infrastructure has been damaged.

  Onlookers filmed the weather event as it ripped the roof off a building and tore through power cables.
