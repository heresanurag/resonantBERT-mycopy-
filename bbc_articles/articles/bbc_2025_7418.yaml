title: Former S Korea President Moon Jae-in indicted for bribery - BBC News
date: '2025-04-24'
section: Asia
url: http://www.bbc.co.uk/news/articles/c1wd5123j8yo
content: |-
  Moon is best remembered for his attempts to broker a peace deal with North Korean leader Kim Jong Un.

  Moon Jae-in, from the liberal Democratic Party, led the country from 2017 to 2022

  Prosecutors have indicted former South Korean President Moon Jae-in on charges of bribery related to his former son-in-law's job at an airline. Prosecutors argue his former son-in-law, identified only by his surname Seo, had little experience in the aviation industry but was hired in exchange for the airline's CEO leading a state-funded agency. Moon led the country from 2017 to 2022 and is best remembered for his attempts to broker a peace deal with North Korean leader Kim Jong Un. He joins a long list of South Korean presidents whose political careers have been marred by scandal, from jail to assassination to suicide.

  Former President Yoon Suk Yeol, who was removed from office this month for his shock martial law declaration, is also facing criminal charges. Besides Moon, former lawmaker Lee Sang-jik has also been indicted, prosecutors say. He is being accused of bribery and breach of trust. In 2022, Lee was sentenced to six years in prison for embezzling company funds. The founder of budget carrier Eastar Jet, Lee was named the head of the Korea SMEs and Startups Agency in 2018 - the same year that Seo was appointed executive director of his airline's subsidiary Thai Eastar Jet. Between 2018 and 2020, Seo received around 217 million won ($150,000; £113,000) in salary and housing support - a sum that prosecutors say constitute bribes intended for Moon. According to prosecutors, Seo was appointed "despite any relevant experience or qualifications in the airline industry", said a Reuters report. He "frequently left his post for extended periods... and did not perform his duties in a manner befitting the position", it added. The residence of Moon Da-hye, the former president's daughter, was raided last September during investigations of the bribery allegations. Moon's indictment comes amid a series of prosecutions against officials in his administration. Earlier this month, Moon's former national security advisor and defence minister were indicted for allegedly leaking intelligence to activists. The country's prosecution service is often accused of being politicised – and when the government changes hands, it's common for rival politicians to be investigated. The current government is led by acting president and prime minister Han Duck-soo the People Power Party's. Moon's Democratic Party has condemned the prosection, calling it a "politically motivated move aimed at humiliating a former president".
