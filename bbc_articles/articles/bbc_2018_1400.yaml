title: Protesters disrupt a speech by MP Jacob Rees-Mogg - BBC News
date: '2018-02-03'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42925176
content: |-
  The Conservative MP got caught up in a heated exchange with protesters at a university in Bristol.

  Protesters disrupted a talk by North East Somerset Conservative MP Jacob Rees Mogg at the University of West England in Bristol.

  They confronted Mr Rees-Mogg in heated scenes, also involving students from the university.
