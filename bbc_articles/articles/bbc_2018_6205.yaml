title: 'Turkey floods: Cars swept away in Ankara streets - BBC News'
date: '2018-05-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-44022350
content: |-
  Flash floods in the Turkish capital, Ankara, cause havoc.

  Flash floods in the Turkish capital, Ankara, have caused havoc.

  Cars were swept away and businesses hit, in the Mamak district of the city.

  So far injuries to six people have been reported.
