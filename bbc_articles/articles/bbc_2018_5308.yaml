title: Man stabbed near National Theatre on South Bank - BBC News
date: '2018-05-13'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-44102072
content: |-
  A man in his 20s is taken to a central London hospital with a stab wound.

  The Met Police say a crime scene remains in place.

  A man has been taken to hospital after being stabbed near the National Theatre on the South Bank in central London.

  Police, paramedics and London's Air Ambulance were called to the scene of the attack just before 16:00 BST, said the Metropolitan Police.

  The injured man, aged in his 20s, was taken to a central London hospital. The man's condition is said to be non life-threatening.

  Police said there had so far been no arrests, but inquiries were under way.

