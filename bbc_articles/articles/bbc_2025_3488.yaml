title: Infamous crash-prone bollards to remain on Watford road - BBC News
date: '2025-03-12'
section: General
url: http://www.bbc.co.uk/news/videos/cn0ynrwjy4go
content: |-
  Footage of vehicles smashing into the barriers, including a police van, was widely shared online.

  There are no plans to remove or change width restrictions on a road where multiple vehicles including a police van have crashed, a council has said.

  Woodmere Avenue in Watford shot to fame after videos of vehicles smashing into bollards were shared millions of times online in 2021 and 2022.

  Hertfordshire County Council said an automatic number plate recognition camera would be switched on to detect misuse of the central bus lane but the adjoining narrower lanes for other traffic would remain unchanged.

  A spokesperson said: "Last year, residents were consulted on whether to make physical changes to the Woodmere Avenue bus gate. The majority supported keeping the existing layout and introducing an automatic number plate recognition (ANPR) camera."

  The lanes were widened and brighter bollards installed at the site in August 2022 but this has not entirely stopped drivers hitting them.

