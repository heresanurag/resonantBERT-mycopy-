content: |-
  The UK has reported a record 33,470 cases in the past day - 10,520 more than Wednesday's total.

  Emily Ashton, from Bloomberg, asks the final set of questions.

  She first asks Powis: Lockdown will end 2 December, is that the right thing to do given the rise in cases?

  She also asks Sharma: Can you categorically say that the supply of the vaccine won’t be affected by Brexit disruption?

  Powis replies that that is "a matter for our elected representatives" but “we will not be going back completely to normal” after lockdown.

  “Exactly what those measures are [after lockdown] it’s too early to say yet,” he says. “We need to see what transpires over the next few weeks.”

  Sharma says the government has been preparing for Brexit, including investing hundreds of millions of pounds in border infrastructure.

  He says the key message is that businesses "do need to be prepared", adding that information for them is available on the .gov website.

