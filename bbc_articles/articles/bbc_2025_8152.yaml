title: 'Newspaper headlines: Petrol car ban eased and US to ''press on'' with tariffs
  - BBC News'
date: '2025-04-07'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c4g2w4n2nn2o
content: |-
  Sir Keir Starmer's bid to shelter the car industry from US tariffs is among stories leading the papers.

  Petrol car ban eased and US to 'press on' with tariffs

  Luxury car firms such as Aston Martin will still be allowed to keep producing petrol cars beyond 2030

  Billed by the Guardian, external as the prime minister's "first significant intervention" since President Donald Trump's announcement of US import tariffs, Sir Keir Starmer's speech in the West Midlands later features on many front pages. According to the Times, there will be a relaxation of the electric vehicle mandate, with fines for manufacturers for each non-compliant vehicle sold reduced from £15,000 to £12,000. The Daily Mirror, external says saving the British car industry is "critical". The Sun uses its editorial to urge the prime minister to go "much further," saying giving drivers tax breaks for buying electric vehicles makes more sense than fining manufacturers. The Daily Telegraph, external reports that an army of health workers will be sent door-to-door as part of a radical NHS scheme to tackle "Britain's sickness crisis". According to the paper, the plan will see one worker looking after 120 homes, typically paying monthly visits to check if help is needed. It is due to be rolled out in 25 parts of England, the paper says. Results from a pilot in Westminster suggest it has led to a 10% drop in hospital admissions over a year.

  "Our heroes will get help, external to pay respects to fallen comrades", declares the Daily Express. It says Sir Keir Starmer has pledged to fund travel, bed and board for all British Second World War veterans wanting to attend VE Day events. The Daily Mail , externalleads on a survey of GPs which suggests 94% of them believe the government should roll out life-saving checks for prostate cancer. The paper highlights analysis indicating that hundreds of lives would be saved by targeting the programme at men with the highest risk. The Mail's editorial says people should be invited for tests - pointing out how such a policy has "worked spectacularly well with breast cancer". Under the headline "Reds Arrows", the Sun reports, external that the RAF display team may trade in its fleet for Russian-designed jets. The team's Hawk T-1s are due to be retired by 2030 and the factory that made them has closed. One retired RAF pilot says opting for Russian-designed jets would be "bordering on treasonous". The Ministry of Defence says it has not yet, in its words, "engaged the market" on the future model.

