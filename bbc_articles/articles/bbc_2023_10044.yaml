title: 'M4 Bristol: Arrests after two women die in motorway crash - BBC News'
date: '2023-07-17'
section: Bristol
url: http://www.bbc.co.uk/news/uk-england-bristol-66219959
content: |-
  Three men are being questioned about the crash close to the Prince of Wales M4 bridge.

  The crash happened just after midnight on Monday

  Two women have died in a two-car crash on the M4 near Bristol and three men have been arrested, police say.

  Police were called to the eastbound carriageway between junctions 21 and 22 just after midnight on Monday.

  Two women, who were passengers in one of the vehicles, were pronounced dead at the scene.

  The men, one man in his 20s and two in their 30s, were all arrested on suspicion of causing death by dangerous driving.

  They are in police custody after also receiving hospital treatment.

  The crash caused significant delays on the bridge and into Wales

  The three remaining occupants of the vehicle the women were in attended hospital, but their injuries are not believed to be life-threatening.

  The motorway is now reopened.

