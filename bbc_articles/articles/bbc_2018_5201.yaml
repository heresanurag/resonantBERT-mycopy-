title: Chris Evans' message to Radio 2 listeners after mum's death - BBC News
date: '2018-05-03'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-43988466
content: |-
  Chris Evans has told listeners of his Radio 2 breakfast show of his mother's death.

  Chris Evans has told listeners of his Radio 2 breakfast show that he'll be back at his desk tomorrow following his mother's death.

  In a message read by Vassos Alexander, he said: "It's all ok. Mum needed to be at peace."
