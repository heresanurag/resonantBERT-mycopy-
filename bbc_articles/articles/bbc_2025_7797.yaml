title: '''He''s flipped the system'': Americans react to Trump''s tariffs - BBC News'
date: '2025-04-03'
section: General
url: http://www.bbc.co.uk/news/videos/c86jqng2dvlo
content: |-
  Everyday Americans share their opinions on President Donald Trump's announcement of global tariffs.

  From "very optimistic" to "very concerned", everyday Americans share their opinions after US President Donald Trump announced sweeping tariffs on Wednesday.

  A woman in Glendale, Arizona says it is "only right" that the US charges tariffs if other countries do.

  While in Washington DC, one man says Trump has "flipped the whole system around" and says he's already seen grocery prices increase.
