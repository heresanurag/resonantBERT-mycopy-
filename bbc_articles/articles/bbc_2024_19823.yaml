title: 'Grenfell Fire: Tributes to ''hero'' ahead of Notting Hill Carnival - BBC News'
date: '2024-08-24'
section: London
url: http://www.bbc.co.uk/news/articles/clyw73d5d50o
content: |-
  Raymond Bernard lived on the top floor of Grenfell Tower for over 30 years and died in the tragedy.

  'Keep Grenfell in your hearts during carnival'

  The Grenfell Tower Inquiry’s final report will be published in a few weeks

  During each day of the Notting Hill Carnival since 2017, the loud music coming from the sound systems is briefly turned off. People are encouraged to respect a short 72-second silence - one for each of the lives lost in the Grenfell Tower fire over seven years ago. At many points along the west London parade route, Grenfell Tower is clearly visible. The Grenfell tragedy on 14 June 2017 has had a great impact on the local community involved with the carnival ever since. Many of them have strong connections. In just a few weeks the Grenfell Tower Inquiry’s final report into what led to the fire - and who was accountable for what was described in the public inquiry as an "avoidable tragedy" - will be published. For families who lost their loved ones and have been fighting for justice for them ever since it happened, the report's publication will be a significant milestone.

  Raymond sheltered his neighbours in his flat on the 23rd floor

  Raymond Bernard, whose nickname was Moses, lived on the top floor of Grenfell Tower for more than 30 years. He came to London in 1968 from the Caribbean island of Trinidad. After leaving school in Ladbroke Grove he trained as an electrical engineer and for many years worked in the Houses of Parliament. His younger sister Bernadette Bernard, who calls him Ray, says music was always his first love. "He always had music playing from the moment he woke, mostly reggae," she says. As a young man Raymond was a DJ and was involved in the Gemini Sound System. They would play at parties and clubs in London, particularly the Embassy Club in Shepherd's Bush. According to family friend Jackie Leger, the annual Notting Hill Carnival over the August Bank Holiday was a highlight. "He would always go to carnival. It allowed him to reconnect with his roots, reconnect with being born in Trinidad listening to Soca music and then coming to the UK and understanding more of the reggae music," she explains.

  Jackie Leger (left) and Raymond's sister, Bernadette Bernard, take part in silent walks every anniversary of the tragedy

  Jackie says she regarded Ray as a brother and calls him a "well-loved" member of the local community in Grenfell Tower. "He was such a kind person. He would share his last with anybody and he didn’t have very much himself," she says. "He was very kind, gracious, he was just lovely and a lovely human being to other human beings." In his later years, Raymond sometimes walked with a stick and had severe arthritis. He was inseparable from his beloved dog Marley, a small spaniel named after Reggae icon Bob Marley. In evidence given to the inquiry Ray was praised as a hero - a modern day Moses. On the night of the fire he sheltered a number of people in his one-bedroom flat on the 23rd floor.

  The Grenfell "wall of truth" sits underneath the Westway flyover

  Some had dialled 999 and were told to stay in the tower and wait to be rescued. The transcripts of those desperate calls were submitted to the inquiry and make horrific reading. Many were found to have collapsed from the toxic fumes or suffocated with the excessive smoke. Forensic experts concluded many of Ray's neighbours died huddled on his bed. Ray was found on the floor. He was 63 years old. "He was very well known in Grenfell Tower, everybody knew who Moses was,” says Jackie. “He was a counsellor, a good friend and he was a great neighbour and that was the testament to him on the night of the fire. People who were in his apartment at the time of their demise - he looked after them. He was a great person,” she adds.

  A memorial bench to Raymond sits outside The Tabarnacle in Notting Hill

  His sister Bernadette has installed a memorial bench as a tribute to Ray on Powis Square, close to The Tabarnacle in Notting Hill. It’s a key location for the carnival celebrations and somewhere Ray in his younger years would often go. On it, the words are inscribed: "In loving memory of Raymond AKA Moses Bernard. A leader, a protector, who protected like no other. Moses is his name." "If Moses were still with us, he would be round by the sound systems listening to the music chatting to his friends, he would be enjoying it the same way everyone else enjoys carnival," says Jackie. Speaking about the silences observed to remember Grenfell victims during carnival that happen at 15:00 BST each day, Bernadette says: "It's important for us. "It not only shows respect for the victims and their families, it's a way of remembering what actually happened at Grenfell and the impact it's had on the bereaved survivors and the community as a whole." Jackie agrees with her, saying it reminds carnival-goers not to "forget about what happened seven years ago. "Always keep those victims in your thoughts, in your minds and in your hearts."

  Raymond's family friend Jackie says it's important that the Notting Hill Carnival observes daily silences for those who died

  After years of waiting, the final report from the inquiry will be made public in a few weeks. It's hoped it will be a significant step in the fight for justice. Like many other families, survivors and local residents in North Kensington, the two women are anxiously waiting for its findings. “No one would have thought seven years on, we’d just be finishing phase two of the report," says Jackie. “No one thought it would take this long, we know it will take even longer,” she adds. The Bernard family have given testimony at the inquiry and attended many of the hearings. They also sat through the cross examination of some of those who worked for companies and organisations who are part of what was described in the inquiry as being part of the "web of blame". "None of the defendants are taking responsibility for their actions," says Bernadette. "They are all trying to pass the buck so that no one says yes I made this decision knowing that should a fire occur it would be one of complete devastation." All the organisations and companies have submitted evidence to the Grenfell Tower Public Inquiry, with the final report due to be published on 4 September.
