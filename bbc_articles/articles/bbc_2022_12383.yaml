  Once the procession reached Wellington Arch at Hyde Park Corner, the coffin was transferred to the new State Hearse for its final journey to Windsor Castle.

  Just after 15:00 BST, the hearse arrived for a walking procession up Windsor Castle's Long Walk. The three-mile (5km) avenue was lined with crowds and members of the armed forces.

  The King and senior members of the Royal Family joined the cortege in the Quadrangle in Windsor Castle a little later ready for the committal service and later burial at St George's Chapel.
