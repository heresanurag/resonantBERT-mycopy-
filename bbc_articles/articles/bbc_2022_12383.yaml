  Full details of all those involved in the Queen's main funeral procession.

  Thousands of members of the armed forces from the UK and abroad have taken part in the state funeral of Queen Elizabeth II - one of the grandest ceremonial events in living memory.

  A procession involving the military, the Royal Family and those who have dedicated their lives to service of the Queen, gave the late monarch a final farewell full of pomp and pageantry ahead of her burial in Windsor.

  Here's everything you need to know about the main funeral cortege.

  Military personnel from the UK and the Commonwealth marched through London while others lined the route, providing guards of honour or undertaking other ceremonial duties.

  The Queen, who was head of the armed forces and served as their commander-in-chief, had a close personal relationship with the military and they accompanied her on processions throughout the day.

  The first, and shortest, of the processions on Monday carried her coffin to Westminster Abbey for the funeral service. The second took her from the Abbey to Wellington Arch, where the coffin was transferred to the State Hearse for the road journey to Windsor. In Windsor, her coffin joined a third procession to St George's Chapel in the castle's grounds.

  But the main focus was the journey through central London. The cortege, led by the Royal Canadian Mounted Police, was made up of seven groups, each with its own band. Members of the armed services from the UK and the Commonwealth, the police and the NHS were also involved.

  The Queen's coffin, topped with the Royal Standard, the Imperial State Crown and the Sovereign's orb and sceptre, was at the centre of the procession carried on the State Gun Carriage of the Royal Navy. The carriage was last seen in 1979 for the funeral of Prince Philip's uncle, Lord Mountbatten, and was used for the Queen's father, George VI, in 1952.

  She was accompanied by the bearer party of the Grenadier Guards, the King's Body Guards of the Honourable Corps of Gentlemen at Arms, the Yeomen of the Guard and the Royal Company of Archers.

  Senior members of the Royal Family, including the new King and his sons Prince William and Prince Harry, followed behind.

  They were joined by members of the Royal Household.

  Camilla, the Queen Consort, the Princess of Wales, the Countess of Wessex and the Duchess of Sussex followed the procession in cars. Behind them were Princesses Beatrice and Eugenie, the daughters of the Prince Andrew.

