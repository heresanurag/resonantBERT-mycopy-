title: 'Kingstanding stabbing: Boy 14, killed in attack - BBC News'
date: '2021-06-01'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-57311581
content: |-
  Up to seven people ran away from the scene of the attack in Kingstanding, Birmingham, police say.

  The 14-year-old was confirmed dead at the scene in Kingstanding, Birmingham, on Monday night

  Police are hunting up to seven people after a 14-year-old boy was stabbed to death in Birmingham.

  The boy was confirmed dead at the scene on College Road, Kingstanding, at about 19:30 BST on Monday.

  West Midlands Police said he is thought to have been chased towards the nearby McDonalds by a group of youths who fled the scene after the teen collapsed.

  The force said detectives were making "rapid progress" after launching a murder investigation.

  College Road remains closed for forensic investigations after the stabbing

  Det Ch Insp Stu Mobberley said officers were aware of "speculation in the community that this was a racially motivated attack".

  At the moment, he said there was is no evidence to suggest that was the case.

  "What we do know is that this was appalling violence which has cost a young lad his life," he said.

  The force said it had "flooded" the area with officers since the attack and was fast-tracking analysis of CCTV footage.

  The road remains closed for police investigations and a post-mortem examination is expected to take place on Tuesday afternoon.

  Det Insp Mobberley added detectives were "already following up a number of really strong lines of enquiry".

  Police said there is no evidence to confirm speculation the attack was racially motivated

  "Another young life has been taken far too soon," Det Insp Ranj Sangha said.

  "We have officers with the boy's family who are facing the cruellest of news.

  "We will be leaving no stone unturned in our hunt for the callous individuals responsible for this, or for anyone harbouring them, knowing what they have done."

  West Midlands Ambulance Service said it sent two ambulances to the scene, at the junction with Wardour Grove, at 19:35.

  "Crews arrived to find a teenage boy in a critical condition following a stabbing," a spokesperson said.

  "The team of ambulance staff worked together to administer advanced life support at the scene. Tragically, despite their best efforts, nothing could be done to save the boy and he was confirmed dead at the scene a short time later."

  Jack Dromey, the area's Labour MP, branded the attack "truly shocking".

  "My condolences to his family," he added.

