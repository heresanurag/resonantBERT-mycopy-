title: 'Celtic 1-1 Hibernian: Depleted hosts denied win by injury-time strike - BBC
  Sport'
date: '2021-01-11'
section: General
url: http://www.bbc.co.uk/sport/football/55525905
content: |-
  Last updated on .From the section Scottish Premiership

  Celtic's only regret about their Dubai trip was Chris Jullien contracting Covid-19, said coach Gavin Strachan, after the draw with Hibernian.

  Thirteen Celtic players missed the game as they self-isolate after being deemed close contacts of Jullien.

  The hosts led through David Turnbull's free-kick, but are now 21 points behind Scottish Premiership leaders Rangers after Kevin Nisbet's late Hibs strike.

  "There's regret that one person has caught the virus," said Strachan.

  "But there's not a regret in terms of the permission we got to go and the protocols that we followed, which we have done the whole season."
