title: 'Newry: Attack witness ''ran to her death rather than safety'' - BBC News'
date: '2024-09-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c7v5yn6q15do
content: |-
  Anu Okusanya's family say she had heart attacks after fleeing a gang that had previously attacked her.

  Attack witness 'ran to her death rather than safety'

  Anu Okusanya moved to Northern Ireland from Nigeria more than a year ago

  "She thought she was running for her life. Unfortunately she ran into her death." Last week, care worker Anu Okusanya, 46, died in hospital after she fled the scene of an assault on another person close to her home in Newry, County Down. Her family said she ran in fear having been attacked herself on two previous occasions in the same area. They said the incident on 24 August led her to having an asthma attack and multiple heart attacks.

  The family first shared their story with the Newry Reporter newspaper, external. Anu's brother, Gbenga Oluwasanya, told BBC News NI she had moved to Northern Ireland from Nigeria more than a year ago to work in healthcare and had finished a 12-hour shift when she witnessed the attack. She ran to a neighbour's house and "as she came in, she couldn't say anything; she was gasping for breath", he added.

  This video can not be played To play this video you need to enable JavaScript in your browser. Gbenga Oluwasanya said his sister ran into her death after seeing the attack

  The Police Service of Northern Ireland (PSNI) said when Anu became unwell officers performed CPR and applied a defibrillator to try to save her life. "She was taken to hospital but sadly passed away some days later," said Supt Norman Haslett. “Our enquiries have established that this verbal altercation involved a number of individuals to which Anu was a witness but not directly involved." Supt Haslett said he sent his sincerest condolences to her family and friends, adding that anyone with more information should contact the police.

  In recent weeks there have been a number of attacks on homes and businesses belonging to ethnic minorities following anti-immigration demonstrations in August. On Tuesday, the PSNI reported race hate crimes may have risen by a third compared to the previous 12 months. Mr Oluwasanya explained his sister was frightened because she had been attacked in June when a boy threw liquid over her while she was walking on the street in "broad daylight". "So they were known to her, and that's why she knew she had to run to protect herself," he said. In a earlier incident, a gang followed Anu to her home, banging on her door and they were "terrorising her", he continued, adding that Anu had reported both attacks to police.

  Lola Sonubi and Gbenga Oluwasanya said their sister died after fleeing from a gang

  Anu's sister Lola Sonubi, who lives in England, said the family had been "devastated" by her death. "All our sister was doing was trying to help somebody who they were attacking, and she has died," she said. Anu was "very hard working, intelligent, kind, full of life and beautiful", she continued. “This is a big loss for us, she was the last of five, both of us are the only two girls." Anu has a 24-year-old son who still lives in Nigeria. "Her son is really struggling, he is not taking it well at all, we hope he will be ok," Mr Oluwasanya said.

  Justice Minister Naomi Long described Anu's death as "devastating" and said people from ethnic minorities in Northern Ireland are living in "abject terror". She added many people are "afraid to go about their normal business in the normal way".

  Justice Minister Naomi Long said Anu will have "perceived a pattern" and carried fear with her

  "When someone is targeted in a hate crime incident and they perceive it to be because of who they are... that has ramifications in the wider community," she told BBC News NI's Good Morning Ulster. "It creates a fear with other people who share those characteristics, who then believe they may be vulnerable to attack," she added. Ms Long said "the fear of crime is significant" and people are fearful when using public transport and going out in the evenings. The minister added that because Anu had been targeted in two previous incidents, she will have "perceived a pattern" and carried that fear with her. "It is just tragic. These circumstances are just appalling. I really do feel for the family," Ms Long added.
