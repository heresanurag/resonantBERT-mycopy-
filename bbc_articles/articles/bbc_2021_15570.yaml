  Take a look at the damage on Siargao Island after a powerful storm kills hundreds in the Philippines.

  Super Typhoon Rai has struck the Philippines killing hundreds of people. Siargo Island is one of the worst-hit areas.

  BBC correspondent Howard Johnson has been there and describes just some of the damage inflicted on the island.
