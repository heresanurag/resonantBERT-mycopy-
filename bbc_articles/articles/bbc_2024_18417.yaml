title: Timelapse captures skies on Sunday night - BBC News
date: '2024-08-12'
section: General
url: http://www.bbc.co.uk/news/videos/ckg2yyj4z81o
content: |-
  The pink glow of the Northern Lights is visible in the video shared with the BBC.

  Footage shared with the BBC captures the night sky above Aylesbury, on the night the Perseid meteor shower could be seen in parts of the UK.

  In the amateur timelapse video, recorded across Sunday night and Monday morning, the pink glow of the Northern Lights is visible.

  An earlier version of the video said it showed the Perseid meteor shower, but further examination shows it is not conclusive.
