content: |-
  Thousand of fans have descended on Ahmedabad to watch the India v Pakistan match.

  The Narendra Modi stadium in Ahmedabad in the western Indian state of Gujarat is hosting the cricket World Cup match between India and Pakistan on Saturday.

  The stadium, which is named after the Indian prime minister, has a seating capacity of more than 130,000 spectators and it is expected to be full. Fans are arriving in Ahmedabad, hoping to see their cricketing heroes win the day.

  The BBC's Anshul Verma brings you all the colour and excitement from the city.

