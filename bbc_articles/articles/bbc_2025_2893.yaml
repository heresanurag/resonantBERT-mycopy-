  Scans at Newcastle's Royal Victoria Infirmary revealed Charlie had catastrophic bleeding in his brain which led to his death the next day. Pathologists concluded he had been deliberately violently shaken or had his head struck with severe force. Prosecutor Nicholas Lumley KC previously told jurors Stockton had "little patience" for Charlie, while Roberts was prepared to "overlook" her boyfriend's actions to "keep him in her life".

  The judge said Paula Roberts prioritised her relationship over her child

  Roberts had initially denied any wrongdoing but, partway through the trial, admitted child cruelty through the wilful neglect of Charlie by failing to get him medical treatment for injuries to his ear and genitals in the weeks before his death. Her barrister Richard Herrmann said she had the "wool pulled over her eyes" by Stockton and "did not believe" he was hurting her son. Stockton told her Charlie was hurt in accidents, such as falling out of bed, but Roberts admitted she was at fault by not getting her son medical treatment regardless of how she believed he had sustained the "excruciating" injuries, the court heard.

  Mr Herrmann said Roberts had multiple contacts with childcare professionals and social workers but none of them raised any concerns. Darlington Borough Council investigated after Charlie was taken to hospital with an injury in the summer of 2023, but they concluded it was not suspicious, Mr Herrmann said. He also said Roberts reviewed the footage captured on the bedroom camera but "saw nothing" to cause her to worry. Mr Herrmann said Roberts accepted if she had acted differently her son may still be alive, adding that was a "very significant cross to bear for the rest of her life".

  The court heard Charlie Roberts was deprived of his life and his family robbed of raising him

  Mr Justice Goss said Stockton had deprived a young "exuberant" child of his life and robbed his family of the joy of watching him grow up. He said Stockton had been "intermittently cruel and violent" towards Charlie during the boy's short life and "concealed" his actions by blaming "accidental falls or natural events". The judge said only Stockton knew why he had killed Charlie but said the force needed was "substantial" and his brain injuries were only accidentally caused in such things as car crashes, head crushing incidents or high-level falls. Mr Justice Goss told Roberts she had prioritised her relationship over her son's care and "turned a blind eye" to the abuse. "You remain a risk to any children in your care," the judge told her.
