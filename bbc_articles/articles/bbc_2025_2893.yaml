title: Darlington stepdad jailed for murdering 22-month-old boy - BBC News
date: '2025-02-07'
section: Tees
url: http://www.bbc.co.uk/news/articles/cwyw2x9l2n4o
content: |-
  Christopher Stockton is sentenced for fatally injuring his partner's son Charlie Roberts last year.

  Charlie Roberts died in hospital a day after being injured at his home

  A man who murdered his partner's 22-month-old son has been jailed for at least 25 years. Christopher Stockton, 38, claimed Charlie Roberts choked on a biscuit at their Darlington home in January 2024, but doctors quickly deduced the toddler had been fatally shaken. Stockton was jailed for life with a minimum term at Teesside Crown Court after being found guilty of murder and abusing Charlie in the months before the boy's death. Charlie's mum Paula Roberts, 41, who wanted her son to call Stockton "daddy", was jailed for four years having admitted neglect by failing to get him medical treatment for previous injuries.

  The judge said she had "turned a blind eye" to the cruelty and violence her boyfriend was inflicting on her son.

  Christopher Stockton was found guilty of murder and child cruelty

  Stockton and Roberts started a relationship in early 2023 and he moved into her home on Frosterley Drive just seven days before Charlie was fatally injured, the murder trial heard. Family and nursery staff noticed suspicious bruises on Charlie in the months before his death but, other than installing a spy camera in her son's bedroom, Roberts took no further action, the court was told.

  Stockton had been in sole charge of Charlie for just 18 minutes on the morning of 12 January when he called 999 to say the boy had gone "floppy" and was struggling to breathe. Stockton was so calm on the call that a Great North Air Ambulance medic thought it was a hoax, the court heard, with the killer claiming he was too unwell to perform CPR on Charlie as he was struggling with pneumonia at the time. He claimed Charlie had choked on a biscuit while playing in a toy tunnel in their living room, but medical staff were immediately suspicious.

