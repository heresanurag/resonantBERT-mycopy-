  Traitors Harry Clark and Paul Gorton are reunited for the first time since the series ended, charged with choosing a combined EFL Cup final XI - but who will they recruit?

  Traitors Harry Clark and Paul Gorton are reunited for the first time since the series ended, charged with choosing a combined Carabao Cup final XI - but will they stay faithful to the teams they support or will they turn traitor and recruit from the opposition?

  Watch Football Focus on Saturday, 24 February at 12:00 GMT on BBC One, BBC iPlayer and the BBC Sport website and app.
