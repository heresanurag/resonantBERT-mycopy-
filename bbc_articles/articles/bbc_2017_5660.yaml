title: London Eye evacuated after 'wartime bomb' found in Thames - BBC News
date: '2017-06-25'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-40398085
content: |-
  A "suspected WW1 or WW2 ordnance" was found in the River Thames", police say.

  A police cordon was put in place around the London eye after a suspected unexploded wartime era "ordnance" was spotted in the Thames

  The London Eye and Westminster Pier were evacuated after reports of a unexploded wartime era "ordnance".

  Police were called to the area at 10:30 BST after a suspected World War One or World War Two device was found on the foreshore on the River Thames.

  Cordons were in place for 40 minutes. The area has been reopened.

  Police said they would return to the area at low tide to remove the device.

