id: bbc_2018_9499
title: LazyTown's 'Robbie Rotten' actor Stefan Karl Stefansson dies - BBC News
date: '2018-08-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-45264994
content: |-
  Stefan Karl Stefansson played the children's programme villain for 10 years.

  Icelandic actor Stefan Karl Stefansson, who played LazyTown villain Robbie Rotten, has died aged 43 from cancer.

  Stefansson was best known for his role on the children's show, which was produced from 2004 to 2014.

  He was initially diagnosed with bile duct cancer in 2016, but said it had been removed with surgery.

  He often shared his treatment and progress with fans online on social media - announcing in March the disease had returned and was inoperable.

  "It's not until they tell you you're going to die soon that you realise how short life is. Time is the most valuable thing in life because it never comes back. And whether you spend it in the arms of a loved one or alone in a prison cell, life is what you make of it. Dream big," he posted to Twitter.

  In June his wife Steinunn Olina Thorsteinsdottir revealed the father-of-four's cancer was in its final stages.

