title: Whale calf rescued from shark net near Australian coast - BBC News
date: '2018-10-09'
section: General
url: http://www.bbc.co.uk/news/world-australia-45794805
content: |-
  It look two hours to free the new-born humpback whale, off Australia's Gold Coast.

  In a two hour ordeal, rescuers from the Australian Sea World Research and Rescue Foundation team freed a new-born humpback whale calf from a shark net off the Gold Coast.
