title: Russia concert hall attack suspects dragged into Moscow court - BBC News
date: '2024-03-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-68653290
content: |-
  Russia has charged four men it says attacked a Moscow concert hall and killed at least 137 people. All were charged with committing an act of terrorism.

  Russia has charged four men it says attacked a Moscow concert hall and killed at least 137 people.

  Three were marched into a Moscow court while the fourth was in a wheelchair. All were charged with committing an act of terrorism at the Crocus City Hall on Friday.

  Video shows one of the suspects - Shamsidin Fariduni - being marched into the courtroom and being photographed in the dock.

  Another suspect, Muhammadsobir Fayzov, is seen with cuts on his face being brought into the court in a wheelchair wearing a hospital gown.
