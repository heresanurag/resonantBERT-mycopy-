title: Prince William to visit British troops in Estonia - BBC News
date: '2025-03-12'
section: Europe
url: http://www.bbc.co.uk/news/articles/clyz3d514w0o
content: |-
  He will learn more about how British troops are bolstering Nato's eastern flank, the palace said.

  News of the prince's visit comes at a crucial moment for the war in Ukraine

  The Prince of Wales will make his first visit to Estonia at the end of next week to meet British troops providing a deterrent to Russian aggression in the region. Prince William will travel in his role as colonel-in-chief of the Mercian Regiment to learn more about how British troops are bolstering Nato's eastern flank, Kensington Palace said. He will also carry out engagements in Estonia's capital city Tallinn to see how the country, a Nato member, has responded to the ongoing conflict in Ukraine and how it is innovating in renewable energy and technology. News of the visit comes at a pivotal time for the war in Ukraine as the US prepares to present a proposed 30-day ceasefire to Russia.

  British forces are deployed to Estonia and Poland under Operation Cabrit, the UK's contribution to Nato's efforts to counter Russian aggression in the Baltic states. The official visit to Estonia has been planned for several months but it now feels especially timely. Royal sources see the trip as part of the "evolution of Prince William as a global statesman" and describe it as a serious trip for him where "he is showing his support for the leadership in the UK and the troops we have based at the fringes of Russia". Those working with the prince say he is increasingly comfortable in this world of soft diplomacy and believe he has something of value to add. They cite the role he played when he met US President Donald Trump in Paris in December, and when he represented the UK alongside other global leaders during the commemorations to mark the 80th Anniversary of D-Day last June. In Estonia, Prince William will be there professionally as a future commander in chief of the Armed Forces and personally as a former soldier. As ever, it is a delicate, diplomatic line to tread. While in Estonia, Prince William will meet Ukrainian families displaced by the war. After his father King Charles met Ukrainian President Volodomyr Zelensky at Sandringham just over a week ago, it is further public support from the royal family for those dealing with the conflict and experiencing its consequences. King Charles met Zelensky after the Ukrainian president attended a summit of European leaders in London. Estonia shares a border with Russia and has been a key supporter of Ukraine during the war. Last month, the country and two other Baltic states - Latvia and Lithuania - unplugged from Russia's electricity grid and joined the European Union's network.
