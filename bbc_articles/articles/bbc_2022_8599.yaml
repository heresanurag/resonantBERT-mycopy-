title: 'Conservative Party leadership: Stop toxic politics, says Penny Mordaunt -
  BBC News'
date: '2022-07-17'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-62196547
content: |-
  The focus needs to be on picking a new leader, contender Penny Mordaunt says as she hits back at "smears".

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: People want to get away from toxic politics - Mordaunt

  Conservative leadership hopeful Penny Mordaunt has called for an end to toxic politics, saying the focus needs to be on picking a new prime minister.

  She told the BBC there were a "number of smears going on in the papers" and hit back at claims that she had ever backed gender self-identification.

  Ms Mordaunt is one of five candidates left in the leadership race, ahead of the next round of voting on Monday.

  Tom Tugendhat meanwhile said the Tories needed a "clean start".

  The five remaining candidates vying to succeed Boris Johnson as Tory leader and prime minister will go head-to-head in the second TV debate of the campaign on Sunday evening.

  The debate on ITV, which starts at 19:00 BST, comes ahead of another round of MPs' voting on Monday, when the bottom-placed candidate will be knocked out.

  Ms Mordaunt - second in the contest according to the latest round of MPs' votes - told the Sunday Morning programme the cost-of-living crisis was her priority.

  She was also questioned about her stance on how people should be allowed to legally change their gender, after questions were raised during the contest about her record when she was equalities minister.

  Asked by Sophie Raworth whether she thought trans people should have to get a medical diagnosis of gender dysphoria before they could legally change their gender, she said: "Yes."

  It came after the Sunday Times said it had seen government papers which appeared to suggest Ms Mordaunt had been in favour of removing at least one element of the medical process required for transgender people to legally transition.

  "We all know what's going on. This is the type of toxic politics that people want to get away from," she said.

  "The poor British public have a month of this to go, they've got a month of us choosing our prime minister. It's an opportunity for our party to show ourselves at our best. We should be talking and focusing on the issues that concern them."

  She said while she was equalities minister "we didn't actually... produce a policy", but her role was to manage a consultation, asking healthcare professionals what they thought of the system.

  "My colleagues are very angry and upset that this is how the leadership contest is being dragged down."

  Her comments followed her first TV leadership debate on Friday where she clashed with fellow candidates Kemi Badenoch and Liz Truss as they claimed she had backed a change in the rules to allow self-identification.

  Ms Mordaunt was equalities minister from April 2018 to July 2019. Ms Truss took up the post in September 2019, while Ms Badenoch joined the department as junior equalities minister from February 2020 to July 2022.

  Under the Gender Recognition Act 2004, UK adults can legally change their gender on their birth certificate if they meet certain criteria.

  People have to provide two medical reports showing a diagnosis of gender dysphoria, and evidence they have lived full-time in their acquired gender for at least two years.

  In 2018, a consultation was launched by Theresa May's government looking at whether the rules should be changed.

  One of the ideas put forward was to allow "self-identification" - meaning that people would no longer need to have a medical diagnosis to legally change gender.

  The suggestion caused heated debate. Those in favour of self-ID said the current process is intrusive and bureaucratic, but others voiced concerns about what it might mean for areas like single-sex spaces and women's sport.

  The government decided not to change the current rules.

  Speaking before Sunday's interview Ms Badenoch's campaign manager said Ms Mordaunt still had questions to answer on the issue.

  MP Lee Rowley asked whether Ms Mordaunt had agreed with self-ID but "is now saying that she didn't".

  Suella Braverman - who also ran for the leadership but has been knocked out - told Times Radio she thought Ms Mordaunt was "woke" - and she disagreed with her views on "trans ideology".

  Woke is an informal term from the US, meaning alert to injustice and discrimination in society, but it is often used in a derogatory way to criticise someone for a certain set of views.

  Ms Mordaunt said she would not set out detailed tax and spending plans at this stage, saying the contest was the "wrong place to do it".

  But she said she planned to halve VAT on petrol and raise tax thresholds - saying they represented a "modest" set of changes to help people who are struggling.

  She said the fuel VAT plan would be cost-neutral, something Deputy Prime Minister Dominic Raab questioned on Sky News, saying he was not sure such suggestions were "particularly credible".

  Ms Mordaunt acknowledged that her plans to cut taxes would lead to increased government borrowing to fund day-to-day spending, saying: "We will have to do that for some time. The important thing is that debt (to GDP) ratio will fall over time."

  Mr Tugendhat - the last-placed contender among MPs and the only one not to have held a ministerial post under Mr Johnson - said he would cut fuel duty by 10p.

