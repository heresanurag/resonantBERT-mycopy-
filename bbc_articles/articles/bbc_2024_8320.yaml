title: 'Savannah Marshall: Boxing champion to make MMA debut in Newcastle - BBC Sport'
date: '2024-04-02'
section: Mixed Martial Arts
url: http://www.bbc.co.uk/sport/mixed-martial-arts/68704452
content: |-
  Unified super-middleweight boxing champion Savannah Marshall will make her MMA debut in Newcastle on 8 June.

  The Briton features in the Professional Fighters League (PFL) promotion and will face an as-yet-unnamed opponent.

  American Claressa Shields, the only woman to beat 32-year-old Marshall in pro boxing, is also signed to the PFL.

  "The two are on a collision course for a rematch wearing 4oz gloves and settling the score in the PFL," PFL CEO Peter Murray said.

  Two-division boxing champion Marshall signed a multi-year deal with the PFL in 2023.

  The Hartlepool fighter and Shields have a long history, having fought in the amateurs.

  Shields outpointed Marshall when they met for the undisputed middleweight boxing title in London in October 2022.

  The 29-year-old from Michigan is undefeated in pro boxing and has one loss and two wins in MMA.
