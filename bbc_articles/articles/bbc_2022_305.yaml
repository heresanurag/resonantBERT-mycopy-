title: Thousands needed to try a new Covid antiviral treatment - BBC News
date: '2022-01-25'
section: Health
url: http://www.bbc.co.uk/news/health-60117313
content: |-
  A UK study aims to find out who will benefit most from a pill designed to treat Covid-19.

  Molnupiravir is the first antiviral pill licensed for treating Covid in the UK

  Over-50s and younger adults with underlying health conditions are being urged to participate in a study of a life-saving treatment for Covid-19.

  The study is open to those who test positive for Covid and had symptoms develop in the previous five days.

  Volunteers will be given pills to take at home.

  The study will help decide how antiviral drugs will be used, Prof Sir Jonathan Van-Tam, the deputy chief medical officer for England, said.

  Health Secretary Sajid Javid asked everyone eligible to "step forward" and "help us to learn more about medicines which could save thousands of lives".

  Antivirals were "part of our approach as we learn to live with Covid, by preventing the most vulnerable from being hospitalised", he said.

  The pill being used in the Panoramic trial is called Molnupiravir and is made by Merck, Sharp and Dohme (MSD).

  It was licensed by UK regulators in November after trials showed promising results at reducing the risk of serious illness or death.

  The study will give doctors an idea of the potential benefits to vaccinated patients - and help the NHS plan how the drug can be used.

  Launched in December, it already has 4,500 people signed up but needs 6,000 more as soon as possible.

  You can sign up at the study website now or your GP may contact you to ask you to participate if you test positive for Covid.

  Charities, including the British Liver Trust, Kidney Care UK and the Cystic Fibrosis Trust, are urging anyone vulnerable to Covid to sign up.

  The study is open to those aged 50 and above or aged 18-49 with an underlying health condition that makes them more vulnerable to COVID-19.

