content: |-
  Cambridge continue their recent dominance over Oxford by winning the men's and women's Boat Races in London.

  Cambridge now lead Oxford 88-81 overall in men's Boat Races

  Cambridge continued their recent dominance over Oxford by winning the men's and women's Boat Races. After a delay to the start of the men's race because of debris on the River Thames in London, Cambridge took control from an early stage to win by 17 seconds. It was their third successive win and a sixth in seven contests. Earlier, Cambridge's women claimed an eighth consecutive victory after a restart following a clash of oars.

  The two men's crews were closely matched for the first couple of minutes before a Cambridge surge took them clear. Cambridge president Luca Ferraro told BBC One: "It's been a great weekend for Cambridge. Something really special is happening out of our boathouse. "I am just so proud of all of our teams. It's such a great place to be." Cambridge's George Bourne said: "We had such a nice press as we came past Fulham Football Club. We were really relaxed, really calm. "Our cox (Ollie Boyne) was doing a great job. Luca and Douwe (de Graaf) were starting to set the rhythm and you could feel yourself moving away, which is the best feeling in the world. "I feel like Andy Murray when he had just won Wimbledon. This is our Wimbledon final, our Champions League. That's the only way I can describe it - it's like a taste of that and it's awesome." Tom Sharrock of Oxford said: "I will commend Cambridge on their effort. They outdid us today, so full credit to them, but I don't feel we've lost today. "I'm still proud to be from Oxford. I'm still proud to wear dark blue."

  Oxford have not won the women's Boat Race since 2016

  There was drama at the start of the women's race, with the first restart since 2012. Umpire Matthew Pinsent stopped the race in the second minute after the Oxford boat drifted into Cambridge's path and their oars clashed. Oxford could have been disqualified but Cambridge were given a third-of-a-length advantage on the restart. They extended that lead to coast home, taking their tally to 49 victories in 79 stagings of the women's event. "I was absolutely clear in warning Oxford in the run-up to that," said Pinsent. "At that moment, with the two crews coming to a standstill, there was no way they were going to carry on racing. "It crossed my mind [to disqualify Oxford], but you also can allow after a restart to see if it affected the outcome of the race. In my opinion, it did not affect the outcome of that race." Cambridge cox Jack Nicholas said: "I was holding a line and Oxford really encroached on that territory. I just held that line and held that line. "We clashed - that's just racing. And I guess they paid the price. That's how it goes." Samantha Morton, stroke for Cambridge, said: "You prepare for a clash but you never really think it is something that is going to happen. "You can probably count on two hands how many times it's happened in the history of the Boat Race. When it happened I was honestly shell-shocked. I am feeling dazed." It was the 10th year the women's race has been staged on the same day and the same course as the men's. The race was held on the traditional course, which stretches four miles 374 yards between Putney Bridge and Mortlake, despite organisers saying this week that water quality was an "ongoing concern".
