title: Muse cancel Turkish gig after pressure from anti-government protesters - BBC
  News
date: '2025-04-02'
section: Europe
url: http://www.bbc.co.uk/news/articles/c3wxq8nw89qo
content: |-
  The British rock band scraps a concert after the promoter insulted anti-government protesters.

  Anti-government protests have erupted in Turkey after the arrest of the popular mayor of Istanbul

  British band Muse have scrapped a concert in Istanbul after the concert promoter insulted anti-government protesters, prompting pressure from fans and local artists. The band said it fully respected the concerns of fans, after promoter Abdulkadir Ozkan had denounced some opposition protesters' acts as treason. He later expressed regret for any "misunderstanding". Turkey has been gripped by protests following the arrest of Istanbul Mayor Ekrem Imamoglu on 19 March over corruption charges, which he denies. The popular opposition mayor was due to run for the presidency in 2028 elections. His supporters see his arrest as a political move by President Recep Tayyip Erdogan.

  Since 19 March, police have detained nearly 2,000 people, many of them university students. UK singer Robbie Williams has also faced calls to cancel his show after the Turkish promoter went on social media to condemn a fight that broke out in a coffee shop boycotted by protesters. "Plain and simple, this is hostility towards the capital. Act of treason," Abdulkadir Ozkan said on X. He later posted another message, explaining his comments were not aimed at the "constitutional right to protests", and that he "deeply regrets" any misunderstanding. The social media accounts of Muse and Robbie Williams have been flooded with comments calling for their concerts to be cancelled. "You've played a huge role in shaping my musical taste," wrote one post, "but unfortunately the company organising it is on our boycott list." Singer Gaye Su Akyol, a popular artist in Turkey, took to X to make a personal appeal to Muse, Robbie Williams and Norwegian singer Ane Brun. "I've respected your works for years and know how much you mean to many," she said. "But neither I, nor anyone, will attend your Istanbul concerts because the organiser is on the boycott list of the pro-democracy movement. Solidarity matters."

  Gaye Su Akyol, here performing in 2023, appealed personally for a concert boycott

  As pressure grew, Mr Ozkan announced on Tuesday that his company was "withdrawing from all projects" in relation to the two concerts. The promoter told BBC Turkish that the concerts would be organised by another company which would be determined by the artists. In a statement on Wednesday, Muse said: "After careful consideration and hearing the feedback from our fans whilst fully respecting their concerns, our show in Istanbul will be now postponed until 2026 so we can ensure DBL Entertainment will not be involved." Tickets for Muse's 11 June concert had been due to go on sale on Thursday, while tickets for Robbie Williams' October show in Istanbul are still available online.

  "I have decided not to play in Istanbul this October... unfortunately, this is not the right time," she said in an Instagram post. The BBC has reached out to Robbie Williams' management team but is yet to receive a response. A show in Istanbul by South African comedian Trevor Noah, promoted by Ozkan's firm and planned for 23 April has also been cancelled, with no reason given. The controversy over the concerts coincides with wider calls for a countrywide boycott in Turkey which has been criticised by the government as economic sabotage. As part of the anti-Erdogan protests, Imamoglu's opposition Republican People's Party has called for a boycott of companies which it says support the government. Party leader Ozgur Ozel supported a call by students to halt all shopping on Wednesday, and some shops closed in solidarity. Turkish Vice President Cevdet Yilmaz said the calls threatened social harmony and economic stability and were "doomed to fail".
