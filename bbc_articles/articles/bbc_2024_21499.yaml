title: Kate's cancer journey has a 'long way to go' says Prince William - BBC News
date: '2024-09-10'
section: Wales
url: http://www.bbc.co.uk/news/articles/c984xynzkplo
content: |-
  The Prince of Wales spoke about Catherine's cancer treatment during a public appearance in Llanelli.

  Prince William says Kate has a 'long way to go'

  The Prince of Wales has described the end of Catherine, the Princess of Wales' chemotherapy treatment as "good news", but added his wife still has "a long way to go". He made the comment during his first public appearance since his wife shared a personal video about her cancer treatment. He travelled to Llanelli, Carmarthenshire on Tuesday, a day after Catherine released a message saying she had completed her chemotherapy treatment and was now focused on staying cancer free. His solo visit - to celebrate Welsh sport and culture - began at Swiss Valley Community Primary School with pupils who took part in this year's Urdd Eisteddfod.

  Speaking to the media about Catherine completing her chemotherapy, Prince William said: "It's good news but there is still a long way to go." Prince William was greeted by a crowd outside the school where several people offered their well wishes to the princess following her announcement she had completed chemotherapy. He thanked everyone for their thoughts, with two people handing him cards. Among those was 10-year-old Ruby, a second-language Welsh learner whose enthusiastic celebrations after winning a recital category at the cultural event went viral earlier this year.

  This video can not be played To play this video you need to enable JavaScript in your browser. Prince William met Welsh language learner Ruby Davies, who starred at this year's Urdd Eisteddfod

  "I've watched your video a few times," Prince William said as he met Ruby. "You did brilliantly, you don't seem nervous about performing on stage at all." Ruby told him she was "a little bit" but also said she was "really excited". "It was very impressive, you're going to have to teach me how to speak Welsh," he added. When asked how it felt to meet the Prince of Wales, Ruby said it was "amazing". "He's a lovely man and it's an honour to meet him, and it's an experience that is going to be treasured and kept forever. We had a little chat about everything really and I gave him a hug." "I also presented him with a book and bracelets that I made for Kate and Charlotte," she added.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ruby's mother Lynne spoke of her happiness at hearing the princess had completed chemotherapy, saying it was something that affected so many people. The princess said in the video she was looking forward to being back at work and undertaking a few more official engagements in the coming months. The school's head teacher, Jo Davies, said: "The children have been so excited, and I think the staff were a bit shocked that the Prince of Wales would be coming, but everybody has really embraced the visit."

  Ruby did a dance for the Prince of Wales

  Ex- pupil Kate Davies, 24, and her mother Elizabeth Davies, 57, said they could not believe that their village had a royal visit. "We said 'bore da' to him and he answered us back in Welsh," said Elizabeth. Kate added: "It's been so exciting. This is my ex-school." Cameron Churchill, 24, lives close to the school and said it was an "unbelievable" experience. "To see the future king here, in my area, just incredible to see him so close up, just absolutely mindblown," he said. "I'd give him a five out of five for his Welsh. His pronunciation was very good."

  It was the Prince William's first visit since his wife released a video message saying she had completed chemotherapy

  He was serenaded with a medley of Welsh songs and was greeted by laughter when a child told him he had a bug on him. He asked the young boy, who was a sea cadet, if he wanted to keep it, and handed it to him. He said: "Good spot, it must have followed me here." The prince also visited the headquarters of the Wales Air Ambulance in Llanelli, of which he is a patron.

  WRU's chief executive described the visit as being "amazing" for womens rugby

  Prince William also met a number of the Welsh women's rugby team and presented caps for the WRU’s "missing caps" campaign to former players who were historically missed when they played for Wales. Abi Tierney, the chief executive of the Welsh Rugby Union said meeting Prince William at Parc Y Scarlets was "amazing" for women's rugby. She said it was "such an uplifting day" to see Prince William appreciate the women players that were not recognised at the time. "He was so passionate about it, and wanted to know all the detail about how we're supporting the game, he was genuinely interested."
