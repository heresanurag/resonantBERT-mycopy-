title: Richard Bacon out of coma and tweets 'I am alive' - BBC News
date: '2018-07-16'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-44845682
content: |-
  The former Blue Peter presenter was put into a coma after falling ill with suspected pneumonia.

  This video can not be played To play this video you need to enable JavaScript in your browser. Richard Bacon, who was diagnosed with ADHD aged 42, was taken ill with suspected pneumonia earlier this month

  Television and radio presenter Richard Bacon is out of a medically induced coma.

  The 42-year-old, who lives in Los Angeles, was taken ill on a flight from the US to Britain earlier this month with suspected pneumonia.

  After his condition worsened staff at the hospital in London put him into the coma to allow his body to fight the infection.

  He posted on Twitter: "I am alive. Or in Lewisham."

