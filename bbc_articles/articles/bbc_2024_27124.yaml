title: 'Newspaper headlines: ''The pain will never leave'' and ''No 10 crisis'' -
  BBC News'
date: '2024-10-08'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c62dg4x59nwo
content: |-
  The first anniversary of 7 October in Israel and a UK government "crisis" lead Tuesday's papers.

  'The pain will never leave' and 'No 10 crisis'

  In the run-up to the first anniversary, family and friends have been visiting the Nova music festival

  Pictures of emotional Israelis marking one year since the Hamas attacks feature on a number of today's front pages. The Guardian says the "sobs and murmured prayers" of mourners gathered at the site of the Nova music festival, external, where hundreds of people were killed, were punctuated by the "sound of artillery and machine guns being fired in nearby Gaza". The Daily Mirror has spoken to a British mother whose son was killed by Hamas while working as a security guard at the festival. She says he called her on the morning of the attack to say rockets were flying above him. She found out four days later he had been killed. The Daily Mail recounts the story of one of the survivors, external. Yovel Sharvit Trabelsi attended the event with her husband, only to be trapped beneath his body for five hours after he was shot dead.

  The I focuses on comments by Sir Keir Starmer in the Commons, in which he refused to rule out involving the UK military in Israeli operations, external against Iran. The paper says he didn't close down suggestions of British bases or personnel being used. It says there are calls for any involvement to be approved first by MPs. The Times has spoken to senior Whitehall figures who say the removal of Sue Gray as the prime minister's chief of staff will not resolve "systemic" issues in No 10. One source is quoted as saying the "dysfunction" is not her fault, and that "just because she has gone" it does not mean things are going to improve. The paper says Sir Keir will not reshuffle his cabinet this year, despite suggestions that Ms Gray's replacement, Morgan McSweeney, is in favour of such a move. The Sun says donors were offered the chance to "mingle" with the prime minister, external and his deputy, Angela Rayner, at the recent Labour conference, if they paid up to £50,000 to sponsor drinks parties. A Labour spokesperson tells the paper the offer wasn't an "authorised party communication" and that it wasn't "something that was taken up". The Daily Telegraph says a thief who was deported to Albania, but came back into the UK months later, has won his right to remain under the European Convention of Human Rights. It says the case will revive demands for Britain to leave the ECHR. The Home Office says three thousand people have been removed since the new government came to power. Demonstrators gathered outside parliament to protest against the government's cut to winter fuel payments appear on the front of the Daily Express. It says "hundreds rallied" as charities and unions joined forces to oppose the removal of support for those who don't qualify for certain means tested benefits. The government says more than a million pensioners will still get the payment. And behind the scenes pictures from the set of the forthcoming Christmas special of Gavin and Stacey appear in several of the papers. They show James Corden and Ruth Jones as Nessa and Smithy wearing smarter clothes than usual. "Is it finally Mr & Mrs Smithy in telly special?" asks the Daily Star, which says the characters appear to be wearing wedding rings.

