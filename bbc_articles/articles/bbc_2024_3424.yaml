  The presenter, who danced with Windsor in Strictly Come Dancing, pays tribute on Good Morning Britain.

  Good Morning Britain presenter Susanna Reid was emotional as she announced the death of Strictly Come Dancing dancer Robin Windsor on air.

  Reid - who danced with Windsor in a Children in Need special of the show - said there was "something very special about him".
