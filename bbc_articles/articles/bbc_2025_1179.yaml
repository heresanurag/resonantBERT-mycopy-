content: |-
  A 4 Nations game between the USA and Canada descends into chaos with three fights breaking out between players in the first nine seconds.

  Three fights in first nine seconds as US beat Canada

  This video can not be played To play this video you need to enable JavaScript in your browser. 'The gloves are off!' - Three fights in nine seconds as US beat Canada (Available to UK users only)

  A match between the United States and Canada descended into chaos on Saturday with three fights breaking out between players in the first nine seconds. Players exchanged punches at Montreal's Bell Centre during the 4 Nations fixture, which the US won 3-1 with Canadian Prime Minister Justin Trudeau in attendance. The game was played against the backdrop of tensions between the neighbouring countries and the pre-game US national anthem was loudly booed by the partisan home crowd. Booing the US anthem has become a regular occurrence in NHL and NBA games played in Canada. It comes after United States President Donald Tump said he will impose tariffs on imported goods from its North American neighbours, while he has also floated the idea of Canada becoming the US's 51st state. Canada's Brandon Hagel and USA player Matthew Tkachuk were the first to be sent to the penalty box after they fought just two seconds into the game. Tkachuk's brother Brady and Canada's Sam Bennett then dropped their gloves in a heated exchange a second later. Another six seconds went by before the third and final fight saw JT Miller and Canada's Colton Parayko throw punches at one another.

  US coach Mike Sullivan said: "I just think it's very indicative of what this means to the players. "There's two teams out there that are very competitive, that have a ton of pride for their respective teams and their countries. "For me, when you have an investment in trying to win like the way that it occurred, I think that's an indication of it. What an incredible hockey game." Canada coach Jon Cooper, who is a two-time Stanley Cup winner, added: "It wasn't planned. "That wasn't two coaches throwing guys over and saying 'This is happening' - none of that happened. That was as organic as it gets." The game had the added context of top NHL players having not played one another on an international stage for 10 years. Traditionally the league's best players skip the World Championships and the NHL did not send players to the 2018 or 2022 Winter Olympics. Cooper added: "It was probably I guess 10 years of no international hockey exhaled in a minute and a half." The US confirmed their spot in the 4 Nations Face-Off final thanks to two goals from Jake Guentzel and another scored by Dylan Larkin, with Connor McDavid scoring for the hosts. Canada face Finland on Monday in their final match of the pool stage, while the US play Sweden.

