title: Man arrested after high-value cheese theft - BBC News
date: '2024-11-01'
section: London
url: http://www.bbc.co.uk/news/articles/cg57yr2dqd2o
content: |-
  Fraudsters stole 22 tonnes of high-value cheddar worth more than £300,000 earlier in October.

  Hafod cheddar - produced near Lampeter, western Wales - was among the stolen cheese

  A 63-year-old man has been arrested after hundreds of truckles of cheddar, worth more than £300,000, were stolen from London cheese specialist Neal’s Yard Dairy. On 21 October police received a report of the theft from the manufacturer based in Southwark. The man was taken to a south London police station where he was questioned. He has been bailed pending further inquiries, which are ongoing.

  Neal’s Yard Dairy says it has honoured its commitment to its small-scale suppliers

  Fraudsters posing as legitimate wholesalers received the 950 clothbound cheeses from the Southwark-based company before it was realised they were a fake firm. More than 22 tonnes of three artisan cheddars - Hafod Welsh, Westcombe, and Pitchfork - which are all award-winning and have a high monetary value, were taken. Neal's Yard Dairy sells Hafod Welsh for £12.90 for a 300g piece, while Westcombe costs £7.15 for 250g and Pitchfork is priced at £11 for 250g. Neal's Yard said it had still paid the producers of the cheese so the individual dairies would not have to bear the costs. It is now trying to deal with the financial setback, a spokesperson said.
