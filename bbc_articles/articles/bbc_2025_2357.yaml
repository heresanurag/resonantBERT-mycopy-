title: Post-mortem into businessman murdered in Kenya inconclusive - BBC News
date: '2025-02-27'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/cjevvked2g4o
content: |-
  A Kenyan pathologist says the injuries suffered by Campbell Scott were "too minor" to have caused his death.

  Campbell Scott's body was found in a sack of pineapples by a cattle herder 60 miles from Nairobi

  A post-mortem examination of the body of a Scottish businessman found dead in Kenya has failed to determine his cause of death, according to reports. Campbell Scott's body was found in a sack of pineapples in a forest 60 miles (96.5km) from Nairobi days after he went missing from his hotel on 17 February. Mr Scott, 58, had been bound with rope around his hands and legs and the country's homicide unit is treating the case as murder. Two people have been arrested but local reports said injuries found on Mr Scott's body were "too minor" to have caused his death.

  The Kenyan government's chief pathologist, Johansen Odour, told Nation Africa, external the post-mortem examination on Mr Scott's body was inconclusive. Investigators have since taken samples for further screening, including toxicology tests to determine the cause of death. But he added: "Though just to clarify, the injuries as per the pathologists looked too minor to cause death. So they have taken samples to further investigate." Mr Scott is believed to have visited a nightclub after his arrival in Nairobi and was seen with an unidentified man who police are treating as a suspect. Nation Africa reported a taxi driver and waiter from the nightclub were in custody, but had helped direct police to a house in the Pipeline district on the outskirts of Nairobi where the suspect is believed to have taken Mr Scott.

  Mr Scott, from Dunfermline in Fife, was a senior director at credit scoring firm Fico and was attending a conference at the JW Marriott Hotel in Nairobi when he went missing. He was due to meet colleagues to deliver a presentation later but did not return to the hotel on 17 February, the day after he had arrived in the city. Colleagues filed a police report after failing to reach him. His body was found by a cattle herder in Makongo Forest on Saturday.
