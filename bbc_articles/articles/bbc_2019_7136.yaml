title: Doonbeg's warm welcome for Trump - BBC News
date: '2019-06-05'
section: General
url: http://www.bbc.co.uk/news/world-europe-48536054
content: |-
  Residents of the County Clare town of Doonbeg give their thoughts on the US president's visit.

  Donald Trump's first visit to Ireland as US president has created quite a stir.

  Although he met Taoiseach Leo Varadkar at Shannon Airport, the bulk of his time has been spent at his golf resort in Doonbeg.

  BBC News NI asked residents of the County Clare town what they made of their famous guest.
