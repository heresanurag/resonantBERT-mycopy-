  Substations, operated by National Grid, are designed to produce, convert, and distribute electricity at suitable voltage levels. Heathrow uses three electricity substations, each with a backup. There are also backup diesel generators, and uninterruptible battery-powered supplies which provide enough power to keep safety critical systems such as aircraft landing systems running. However, when the fire broke out the substation, it was out of action, along with its backup. Heathrow's main fall-back was the two remaining substations, but the airport's CEO, Thomas Woldbye, told the BBC that it "takes time" to "switch them". He said the incident was "not created at Heathrow Airport, it was created outside the airport and we had to deal with the consequences". In a statement released on Saturday evening, Mr Woldbye welcomed the investigation, saying that "we will support every effort to understand the causes and impacts of yesterday's off-airport incident". Heathrow's chairman Lord Paul Deighton said the airport regrets the disruption caused and hopes people affected "understand that the decision was made in order to prioritise the safety of our passengers and colleagues". He added that the airport is "committed to finding any potential learnings from this unprecedented incident" when its review is conducted.

