title: Jamie George on pain of losing captaincy before Six Nations - BBC Sport
date: '2025-03-05'
section: English Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cdelz3127d4o
content: |-
  Jamie George says he considered ending his England career because of the shock and pain of losing the captaincy before the start of the Six Nations.

  Jamie George contemplated ending his international career after losing the England captaincy to Saracens team-mate Maro Itoje

  Coverage: Live audio commentary via the BBC Sport website and app

  Jamie George has said he considered ending his England career because of the shock and pain of losing the captaincy before the start of the Six Nations. Hooker George, 34, succeeded Owen Farrell as England skipper before last year's championship, but was replaced by Saracens team-mate Maro Itoje in January. "It was hard, it was difficult, it was frustrating and obviously then that makes you question if you can do it," he told BBC Sport's Rugby Union Weekly podcast. "I won't lie and say it didn't go through my head [finishing his England career] because I didn't really know how logistically it would work and if it would be too awkward to be coming back in. I didn't want to tread on any toes." George says he consulted his father, uncle and wife on his decision, and not all of them thought he should continue his international career. "But ultimately it was 'what is your gut feel?" George added. "Initially I didn't know if I could go back, but I watched the Ireland game [this year's Six Nations opener which he missed through injury] and all I wanted to do was be back on that field because I missed it." Under George, England finished third in the 2024 Six Nations, but then suffered a run of five successive defeats in matches against New Zealand, Australia and South Africa across the summer and autumn. England won five of 12 Tests under his stewardship. George, who has picked up three Six Nations titles and played in the 2019 World Cup final, said head coach Steve Borthwick broke the news to him over coffee in a "pretty to-the-point" conversation in St Albans. "I think he was surprised by me questioning myself," added George. "I think it would hit anyone hard. It was a job that I loved, I was incredibly proud to be able to do it and I felt I was at the start of something. It was a surprise."

  England vice-captains Ellis Genge and Jamie George lifted the Calcutta Cup with skipper Maro Itoje last month

  George added that he would have preferred to have given more time to digest the news privately, with his conversation with Borthwick coming only a day before Itoje's promotion was made public. Upon his appointment, Itoje described George as "a great friend and leader" who had led the team "brilliantly", while Borthwick explained that having a skipper who was on the pitch for 80 minutes, rather than, like most front rows, replaced midway through the second half, was one factor in his decision. George said he is now taking inspiration from cricketer Joe Root, who was in a similar situation in 2022 when the England Test captaincy was passed to Ben Stokes. "His batting improved significantly off the back of not being captain any more and he looked freed up and enjoying himself and still contributing a huge amount and them valuing his leadership," said George. "I am not saying I am the Joe Root of the England rugby team, but I have taken inspiration from that." George, who said the captaincy going to Itoje "eased me a lot as I know how good Maro is", is poised to win his 100th England cap in Sunday's match against Italy. The Saracen replaced Luke Cowan-Dickie off the bench to help his team to nail-biting wins over France and Scotland in their past two matches. George still has big ambitions in the sport and wants to go on a third British and Irish Lions tour this summer and represent England at the 2027 World Cup, both of which are in Australia. He, along with fellow front row Ellis Genge, is now an England vice-captain.

  You will be able to hear the whole interview on the latest Rugby Union Weekly podcast with Chris Jones and Chris Ashton, which will be available to download from BBC Sounds first thing on Wednesday morning.

