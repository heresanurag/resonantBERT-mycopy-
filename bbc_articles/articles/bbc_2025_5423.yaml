  George made his England debut as a replacement for Tom Youngs in a 25-20 defeat by France before the 2015 World Cup. He helped England win a Six Nations Grand Slam in 2016 and retain their title in 2017 as Eddie Jones' team went on a run of 18 successive Test victories - but all his appearances came from the bench as then captain Dylan Hartley dominated the number two shirt. Instead, George's first Test start came for the British and Irish Lions on their tour of New Zealand in the summer of 2017. George started all three matches against the All Blacks in a drawn series, before finally making his first England start against Samoa at Twickenham in November that year.

  George made his England debut against France in 2015

  "I never thought I would be here, ever, in a million years," he said. "Genuinely it is surreal. I am blown away by it all. "The whole journey has not been straightforward, but you sort of learn and you get your head down. I learnt pretty early on that I had to be resilient and toughen up a bit. I feel that I have done that well. "I am as ambitious now as I was when I was 25 and I first came into the team." George is poised to become the seventh male player to win 100 England caps after Ben Youngs (127), Dan Cole (118), Jason Leonard (114), Owen Farrell (112), Courtney Lawes (105) and Danny Care (101).

