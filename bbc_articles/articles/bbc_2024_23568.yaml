  Launched at the height of Beatlemania in the 1960s, Jackie magazine was the first to target young teens. For just sixpence, it offered fashion, beauty tips and pop pinups - a young Cliff Richard was the first cover photo. DC Thomson launched a high-profile advertising campaign to secure as many young readers as possible. “It would have been filmed in London, but overseen from Dundee,” says DC Thomson archivist Barry Sullivan. He discovered the Jackie advert and close to a hundred other films in a storage basement. “When we stumbled across them it was quite a find," he says. "But we didn’t know how much of a find because some of the canisters couldn’t be opened. "They were rusted shut and the ones we could open looked so delicate that we realised we were not best placed to look after them.”

  One of the film canisters found in the basement at DC Thomson’s Kingsway office

  Barry says: “We brought the films down in 2022 and later that year, we were invited back to see some of them being run through the Steenbeck editing machine. “It was fascinating, to see these films for the first time in 50 or 60 years.” Kay Foubister, the acquisition curator at the moving image archive, says it’s an important addition to their existing collection. “It’s highly unusual to get a complete set of adverts, especially from the early days of commercial television," she says. "It only really began in Scotland in 1957 so to have a collection of ads relating to all these titles that we all know, and all had in our households, is fantastic. “I grew up with The Bunty, my mother got My Weekly and my granny got The People’s Friend. And now we have adverts for them all.“ While TV advertising might have been in its infancy, DC Thomson had connections with some of the biggest names in the business, including Mather and Crowther, whose founder James Ogilvie would go on to inspire the TV series Mad Men.

