  While Jackie’s advert features a pop soundtrack and flashy images, a 1950s ad for the Dandy has a cast of actors playing teachers, policemen and excited children. “The children’s ads do give an insight into what they were playing with and how they were selling their magazines,” says Barry. “But it’s the women’s titles which are most interesting because they show the way things change and the way television advertising evolves along with it.” Free gifts were an important part of the offer. They had to be small, lightweight and easy to attach to the magazine. “They were often interchangeable,” says Kay Foubister. “Rings for the girls could be Elvis or rosebud according to the age group. The boys were more likely to get things related to cars or football.” Or in the case of readers of the Dandy - a Thunderbang, a noisy paper toy which is demonstrated in one of the ads.

  Kay Foubister from the moving image archive with some of the film canisters

  Bunty, a weekly comic for girls under 14, had the added appeal of a back cover which featured a cut out doll with paper clothes which could be attached. Its most popular story was The Four Marys, which appeared from its creation in 1958 to its end in 2001. A quintessential English boarding school story, it was also a nod to DC Thomson’s Scottish base, and the ladies in waiting of Mary Queen of Scots. Whether it was the ads or the gifts, the comics were hugely successful. The Dandy first broke the one million mark in 1945 but by April 1950, sales were over two million. It was also the first title to issue a Christmas annual. Jackie went on to sell over a million issues a week. The adverts date back to a time when people bought their favourite publications from a newsagent on a particular day of the week. That era has gone, as have most of the publications advertised. Jackie printed its last edition in 1993 but it lives on in a number of the adverts which have now been digitised and can be viewed online at the NLS Moving Image Archive, external or in person at the archive in Glasgow's Kelvin Hall.
