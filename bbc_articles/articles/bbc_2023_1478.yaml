content: |-
  Assistant Commissioner Barbara Gray says the force should have spotted the officer's abusive behaviour and missed opportunities to remove him.

  One of the most shocking cases we have dealt with - CPS

  Speaking outside Southwark Crown Court, Jaswant Narwal of the Crown Prosecution Service (CPS) describes Carrick's case as "one of the most shocking cases" the CPS has dealt with involving a serving police officer. She says anyone hearing of the 49 counts which Carrick has pleaded guilty to against 12 victims "would agree that the sheer magnitude of his offending is horrifying", adding that she has seen nothing else like it in her 34 years working with the CPS. She says Carrick was "trusted with the responsibility of protecting the public", but in his private life he did the opposite. She says she commends "every woman" who "courageously" saw the case to court, and says that it is their courage which has "finally" led to justice being served. She also commends the CPS team, the prosecution council, and the police investigation team who "worked so hard and quickly" to build an "extremely strong case" against Carrick which left him "no option but to admit his crimes". "Women have the right to be safe, and feel safe," she says. She adds that she hopes the outcome of the case will encourage other women who may be in a similar position to come forward.
