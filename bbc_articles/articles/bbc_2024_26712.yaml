title: Fake ‘Kamala Harris ad’ used UK department store advert - BBC News
date: '2024-10-04'
section: General
url: http://www.bbc.co.uk/news/videos/cqjrwkw128no
content: |-
  BBC Verify analysed a false post claiming to show a pro-abortion campaign ad that has widely circulated on social media.

  A false post claiming to show a pro-abortion campaign ad by Kamala Harris has been widely circulated on social media.

  BBC Verify has found that it was made by recycling an old advert for UK department store and adding an AI-generated voice over.

  Produced by Jemimah Herd and presented by Merlyn Thomas
