title: 'Mary Ward: Man appears in court charged with murder - BBC News'
date: '2024-10-11'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c78dq9d05n4o
content: |-
  Ahmed Abdirahman, 31, was charged in Dublin after Mary Ward's body was found in Belfast last week.

  Mary Ward was last seen alive on 25 September

  A 31-year-old man has appeared in court in Dublin charged with the murder of Mary Ward in Belfast. The 22-year-old was found dead at her home in Melrose Street on 1 October with neck wounds. Ahmed Abdirahman, with an address at Kinlay House in Dame Street, Dublin, was arrested in the Irish capital on Wednesday. The court heard he replied "not guilty" when charged.

  Ms Ward's body was found by police officers who went to her house – but it is believed she was killed on 25 September. The Police Service of Northern Ireland had been contact with her on a number of occasions before her death. This began on 4 September when she made a complaint about being the victim of violence. The last contact it had with the mother-of-one was on 25 September. Officers said following a review of its previous engagements with Ms Ward the case had been referred to the Police Ombudsman. Details of the murder investigation were not released until just before midnight on Monday. In a statement, the PSNI said: "The joint investigation into the death of Mary Ward will now be led by An Garda Síochána with continued support from the PSNI." Under Ireland's Criminal Law (Jurisdiction) Act 1976, a suspect can be charged and tried for offences allegedly committed in Northern Ireland.

  There was a request for legal aid and a solicitor for the defendant said there would be an application for bail in Dublin's High Court. Mr Abdirahman will reappear via video link on 18 October.
