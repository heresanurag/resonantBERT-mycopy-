title: 'Amanda Abbington: Police probe Strictly Come Dancing exit ''death threat''
  - BBC News'
date: '2024-08-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/c6p22vg631eo
content: |-
  The actress was reportedly warned she would "die on stage" after complaining about her time on the BBC show.

  The actress Amanda Abbington withdrew from Strictly Come Dancing in October

  Police are investigating a reported death threat sent to actress Amanda Abbington. She received an email warning she would "die on stage" unless she retracted a complaint about her former Strictly Come Dancing partner Giovanni Pernice, according, external to the Sun newspaper. A Metropolitan Police spokesperson said officers were called to the Park Theatre in London - where Abbington is starring in a play - on Friday over an "alleged malicious communication". No one has been arrested and enquiries are ongoing.
