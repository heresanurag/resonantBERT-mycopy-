title: Hunt for two dogs suspected of killing man in Birmingham - BBC News
date: '2024-08-22'
section: England
url: http://www.bbc.co.uk/news/articles/c80egr50vmmo
content: |-
  Two dogs have been seized but two more American bulldog types are being sought by police.

  Hunt for two dogs suspected of killing man

  West Midlands Police released this image of one of the dogs they are looking for

  Police are urgently hunting two dogs they believe were involved in killing a man found dead outside a home in Birmingham. The 33-year-old man, who was looking after his brother's dogs, was found dead in the back garden of a home in Rubery on Wednesday. Police said two dogs had been seized but they were hunting two more American bulldog types, which are not thought to be a banned breed. “The investigation into his death is continuing and our priority right now is finding the other dogs that we believe may have been involved," Supt Sally Simpson said.

  At a press conference on Thursday, Insp Leanne Chapman of the West Midlands Police dog unit said they knew at least two dogs were missing, but there may possibly be a third dog. She clarified: "Everything is pointing towards there being two outstanding dogs." She said one of the two dogs that had already been seized had suffered “injuries to his head" and it was possible the other dogs they were searching for could also be injured.

  CCTV footage captured two hours after police were called showed two dogs by a nearby property, although it is not clear whether they were the missing animals

  Police were called to Hereford Close in the early hours of Wednesday to reports a number of dogs were loose. They found the victim outside where they seized the two dogs. Insp Chapman confirmed the dogs had been living at the home where the man had been found but the victim had been living elsewhere. "He wasn't living at that property," she explained. "The dogs were related to him through family but they weren't his dogs." "We've got no history of these dogs biting as far as the police are aware." There was no information which had suggested the dogs were not well looked after, she added. A post-mortem examination is being carried out to establish the man's cause of death. Police said they were working on the belief he had been "attacked by at least one dog, which may have contributed to his death".

  Insp Leanne Chapman said it was possible the missing dogs, which may be together, could be injured or hiding

  Police were called to a home on Hereford Close in the early hours of Wednesday

  Police have released an image of one of the dogs officers are searching for. The force said it was looking for another similar dog, which is described as black. Supt Simpson said the family of the man was being supported. Officers are carrying out house-to-house inquiries and reviewing CCTV footage. Drones are also being used to search the wider area. West Mercia Police has also confirmed that it has joined in the search. Insp Chapman urged anyone with any information to get contact. “We really need to hear from anyone who has seen these dogs and it’s vital that if you see them, you don’t approach them but call 999 immediately," she said. “Similarly, if you or someone you know has taken the dogs in after finding them loose, we need you to call us as soon as possible.”

  The man's body was found in the garden of a small maisonette
