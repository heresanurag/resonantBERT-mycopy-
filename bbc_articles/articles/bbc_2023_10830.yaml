title: 'Watch: Soldiers announce coup on Niger national TV - BBC News'
date: '2023-07-27'
section: General
url: http://www.bbc.co.uk/news/world-africa-66321256
content: |-
  Soldiers have gone on national TV in Niger to announce they have carried out a coup. Army spokesperson Col Maj Amadou Abdramane said defence forces had dissolved the constitution, suspended all institutions and closed the West African country’s borders. It comes after Niger President Mohamed Bazoum was held by troops from the presidential guard.
