content: |-
  Nick Kyrgios puts in a characteristically vocal performance, including complaining to the umpire that a fan was smoking marijuana, en route to the US Open third round.

  Last updated on .From the section Tennis

  Coverage: Daily radio commentaries across BBC Sounds and the BBC Sport website and app, with selected live text commentaries and match reports on the website and app

  Nick Kyrgios put in a characteristically vocal performance, including complaining to the umpire that a fan was smoking marijuana, en route to the US Open third round.

  The Wimbledon runner-up repeatedly berated his box as he beat France's Benjamin Bonzi 7-6 (7-3) 6-4 4-6 6-4.

  The Australian swore several times and was given a warning in the third set.

  World number one and defending champion Daniil Medvedev also won as he beat Arthur Rinderknech 6-2 7-5 6-3.

  His next opponent will be Wu Yibing, who earned a 6-7 (3-7) 7-6 (7-4) 4-6 6-4 6-4 win over Nuno Borges of Portugal to become the first Chinese man to reach the third round at the US Open.

  Earlier in the day, Norway's fifth seed Casper Ruud beat Tim van Rijthoven.

  The 23-year-old won 6-7 (4-7) 6-4 6-4 6-4 to reach round three for the second time and will face American 29th seed Tommy Paul.
