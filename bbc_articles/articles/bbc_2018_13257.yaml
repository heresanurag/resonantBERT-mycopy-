title: Buses damaged in Orpington depot fire - BBC News
date: '2018-11-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-46302650
content: |-
  Seven buses are completely destroyed and four seriously damaged in the blaze in south-east London.

  A huge blaze at a depot in south-east London has destroyed seven buses and badly damaged four others.

  Footage of the fire in Farnborough Hill, Orpington, was captured by John Jones.

  People living nearby said they were woken by "explosions".

  London Fire Brigade (LFB) said it had received around 40 calls.

  It took about 60 firefighters nearly three hours to get it under control.
