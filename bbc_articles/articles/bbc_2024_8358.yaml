title: 'Gwynedd: Hotel opens 1,375ft underground in old slate mine - BBC News'
date: '2024-04-02'
section: General
url: http://www.bbc.co.uk/news/uk-wales-66077475
content: |-
  The hotel claims to offer the word's deepest accommodation inside a disused slate mine.

  A long-abandoned slate mine in Gwynedd has been transformed into an underground hotel.

  The Deep Sleep Hotel, located 1,375ft (419m) below ground at the Cwmorthin mine, claims to be the world's deepest accommodation.

  But while there is a hint of luxury inside the four log cabins, getting there is not for the faint hearted.

  Expect a two-hour hike and scramble, including zip lines and flooded slate chambers to navigate.
