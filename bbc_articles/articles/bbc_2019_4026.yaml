id: bbc_2019_4026
title: Sainsbury's-Asda merger 'would have harmed competition'. - BBC News
date: '2019-04-25'
section: General
url: http://www.bbc.co.uk/news/business-48050879
content: |-
  The competition watchdog blocks the Sainsbury's-Asda merger, warning it would leave consumers worse off.

  The Competition and Markets Authority has blocked the proposed merger between Sainsbury's and Asda, warning it would leave consumers worse off.

  Stuart McIntosh, who led the CMA's investigation, told the BBC that promises of price reductions after the deal "were unlikely to have been realised".
