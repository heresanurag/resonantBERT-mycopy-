id: bbc_2020_11407
title: 'Coronavirus: Rapid antigen test rolled out in Madrid - BBC News'
date: '2020-10-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-54394128
content: |-
  The test gives results in 15 minutes and costs less than five euros.

  As Spain experiences the worst second wave in Europe, a new rapid antigen test to diagnose Covid-19 is being used.

  Its manufacturer says it's 93% accurate in detecting Covid-19 infection.
