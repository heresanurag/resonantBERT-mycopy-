  Britain's Emma Raducanu will play world number three Coco Gauff in the second round at Indian Wells - if she can beat Japan's Moyuka Uchijima.

  Emma Raducanu has direct entry into Indian Wells having climbed up to 55th in the world rankings

  Britain's Emma Raducanu will play world number three Coco Gauff in the second round at Indian Wells - if she can beat Japan's Moyuka Uchijima in the first round. Raducanu is scheduled to play world number 52 Uchijima on Thursday. It will be the British number two's first tournament since a stalking ordeal at the Dubai Tennis Championships last week. The former US Open champion was shaken after a man "exhibited fixated behaviour" during her second-round match. The man was later detained and given a restraining order, Dubai Police said. Raducanu was deliberating whether to travel to the United States for the hard-court event following the incident, but has decided to compete. In the men's draw, Novak Djokovic's second-round opponent could be Australian Nick Kyrgios. The 24-time Grand Slam champion is also projected to meet Carlos Alcaraz in the last eight, in a repeat of their Australian Open quarter-final. Andy Murray has flown to the United States to continue his coaching role with Djokovic, with the pair having worked together on a trial basis at January's Australian Open.

  British number one Katie Boulter, who has a first-round bye, will play Romania's Irina-Camelia Begu or American Ann Li in the second round. In the men's draw, Cameron Norrie faces Luca Nardi and Jacob Fearnley will play 18-year-old Brazilian Joao Fonseca, who won his first ATP singles title at the Argentina Open last month. The winner of that match will play British number one Jack Draper, who has a first-round bye. The Californian event is one of the biggest tournaments of the season outside of the four Grand Slams, with the world's best men and women competing in a combined ATP/WTA event over a fortnight. British women's number three Sonay Kartal was unable to secure a place in the main draw after losing 3-6 7-5 7-5 against American teenager Clervie Ngounoue in the second round of qualifying. British men's number four Billy Harris lost 6-3 6-2 to American opponent Michael Mmoh in his first-round qualifier.
