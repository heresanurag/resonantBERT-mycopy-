title: 'Whitby Goth Weekend: The town where a subculture feels safe - BBC News'
date: '2024-10-27'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/c99v3vnxg4do
content: |-
  Whitby Goth Weekend celebrates 30 years of being a place where people can express themselves.

  'This town is where goths feel safe and accepted'

  Whitby was chosen as the festival's host town due to its association with Dracula

  Thirty years since the seaside town hosted its first Goth Weekend, Whitby is still a "safe and accepting" place, say regular visitors to the festival. Held annually in April and October, the gothic gathering began in 1994 and now attracts large crowds to Whitby's cobbled streets. Inspired by the town's association with Bram Stoker's novel Dracula, it started out as a one-off meeting of pen-friends in The Elsinore pub. This year’s celebrations will take place from 1 November and include live music and stalls, with a 30th birthday party planned for 3 November.

  Elaine Horton, owner of goth shop Pandemonium, said her business would not exist without the boost in trade from the two weekends. Her alternative store sells clothing, shoes, babywear, hair accessories, jewellery and gifts and first opened in 1999. Ms Horton said there was a large variation within the subculture. "Believe it or not there are probably around 35 types of goth," she said. "There are a lot of people who come into Whitby just for the architecture, they come to Goth Weekend because they like the clothing, they like the music, some people like all of it," she added.

  The Sophie Lancaster Foundation said Whitby felt like a “second home”

  Members of The Sophie Lancaster Foundation charity have been attending Whitby Goth Weekend since the 20-year-old was killed in 2007. She died after a group of boys attacked her and her boyfriend in a park in Lancashire while they were dressed in gothic clothing. Two of them were convicted of murder. The foundation has a stall at the festival to raise money for its work, educate people and keep her memory alive. Elloise Dickinson, education and engagement manager, said the event was a “special place for the foundation”. “The Whitby goths have always been there for us," she said. “We meet people who would see Sophie in Manchester or know people who knew her and even those who don’t come up and say: ‘We resonate with her story.’ ” Ms Dickinson said the town felt like a “second home” for the foundation. “Our heart is there,” she said. “In a place like Whitby there’s so much support. “The festival gives a chance for alternative people to come out in finery and express themselves and feel safe. “It’s important for others to see alternative people look so amazing in a way they feel comfortable. “I’ve seen people as old as 80 or 90 but also children as young as four or five who are just getting into it. “It’s really important to celebrate difference in culture and celebrate diversity.”

  "Dr Crank", who runs Whitby Walks, says the weekend had become a "worldwide event"

  "Dr Crank", who runs ghost walks, said he had watched the goth festival grow into a "worldwide event". “The reason the goths like to come to Whitby, especially this time of the year, is it’s atmospheric," he said. Dr Crank, who also holds Halloween walks and a Dracula-themed tour, added: “You get goths from all over the world coming to Whitby, we welcome them all. “Whitby’s a very accepting town and every year they bring colour – mainly black or purple."

  The festival is held twice a year and welcomes visitors from around the world

  Merryn Wilderspin, an artist and designer from Malton, has created two Whitby Goth Weekend collections of her made-to-order designer bags. She said: “I thought Whitby’s goth and steampunk activities could make for interesting themes." Despite admitting she “can’t falsely claim to be a die-hard goth”, she said the weekend had a “fun atmosphere” and she loved being part of it. She said: “Goth is so much to do with fashion and music, which are natural parts of my life. “With the collections, I thought people would like to have something they can use in an everyday sense that offers a goth flavour without it being too obvious.”

  Whitby was chosen for the event because of its association with Dracula
