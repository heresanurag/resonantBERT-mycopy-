  Former Porto boss Vitor Pereira agrees an 18-month deal to become Wolves' new manager.

  Wolves agree deal for Pereira to become new boss

  This video can not be played To play this video you need to enable JavaScript in your browser. Vitor Pereira: Flamengo to Wolves, who is their new manager?

  Vitor Pereira has agreed an 18-month deal to become Wolves' new manager. The Premier League strugglers are paying about 1m euros to bring the boss of Saudi Pro League club Al-Shabab to the Midlands. Portuguese Pereira, a former Porto and Olympiakos manager, was due to travel to England on Tuesday and, although a contract is yet to be signed, no late problems are expected after negotiations went smoothly. The 56-year-old's first game will be at Leicester on Sunday with Wolves second-bottom, five points behind the 17th-placed Foxes. Wolves have lost 11 of their Premier League 16 games and sacked previous manager Gary O'Neil on Sunday following Saturday's 2-1 defeat by fellow strugglers Ipswich.

  This video can not be played To play this video you need to enable JavaScript in your browser. The Football News Show: Wolves fans excited by Vitor Pereira with 'fire in his belly'

  They sounded out other possible replacements, including former West Ham, Everton and Manchester United boss David Moyes. Pereira joined Al-Shabab in February, finishing eighth in the Saudi Pro League last season. They sit sixth with seven wins from 13 games. Pereira won two Primeira Liga titles with Porto in 2011-12 and 2012-13 and the Greek Super League with Olympiakos in 2014-15. Wolves could be without Matheus Cunha for the trip to King Power Stadium after the forward was charged with misconduct by the Football Association (FA) following his altercation with a member of Ipswich's security staff after the league game on Saturday.
