  Cooper told the Commons the government would follow all 12 of the report's recommendations, including suggestions to:
  • None Ensure adults who engage in penetrative sex with a child under 16 "face the most serious charge of rape" instead of lesser charges
  • None Launch a new national criminal operation overseen by the National Crime Agency (NCA) to tackle grooming gangs and hold a national inquiry that co-ordinates targeted local investigations into abuse
  • None Review the criminal convictions of victims of child sexual exploitation and quashing any convictions where the government finds victims were criminalised instead of protected
  • None Make the collection of ethnicity and nationality data for all suspects in child sexual abuse and criminal exploitation cases mandatory
  • None Commission research into the drivers for group-based child sexual exploitation, including the role of social media, cultural factors and group dynamics
  • None Bring in more rigorous standards for the licensing and regulation of taxi drivers following cases of them being used to traffic victims Cooper said: "To the victims and survivors of sexual exploitation and grooming gangs, on behalf of this and past governments, and the many public authorities who let you down, I want to reiterate an unequivocal apology for the unimaginable pain and suffering that you have suffered, and the failure of our country's institutions through decades to prevent that harm and keep you safe." She added: "Baroness Casey's first recommendation is we must see children as children. She concludes too many grooming cases have been dropped or downgraded from rape to lesser charges because a 13 to 15-year-old is perceived to have been in love with or had consented to sex with the perpetrator." The report is focused on "group-based child exploitation" by grooming gangs, a crime which is defined as involving "multiple perpetrators coercing, manipulating and deceiving children into sex, to create an illusion of consent".

  Baroness Louise Casey led the audit, which has prompted a national inquiry into grooming gangs

  The "grooming gangs model" of abuse is outlined in Casey's audit, which typically involves "a man targeting a vulnerable adolescent child - often those in care, or children with learning or physical disabilities" and "grooming them into thinking they are their 'boyfriend'. "Subsequently, they pass them to other men for sex, using drugs and alcohol to make children compliant, often turning to violence and coercion to control them," the report said. Taxis were often used by grooming gangs to transport vulnerable children around, it said. "Girls went missing frequently... for days at a time", Casey noted, adding: "Several victims had children by the perpetrators of their abuse." The audit is "the latest in a long line" of initiatives and measures looking into child sexual exploitation, Casey's report said. While many children did not report their abuse at the time, the report stated, many children who did report have been "ignored, treated like criminals and often arrested themselves."

  Fiona Goddard, a survivor of a grooming gang that operated in the Bradford area, told BBC News the "vast majority" of those who abused her "were Pakistani men". She said: "I do not believe it was just a misunderstanding and not understanding the crime or the victims. "I think that the crime was allowed to happen, one, because of the race of the perpetrators, and two, because of who the victims were."

  Before the publication of the report, the Home Office confirmed that a nationwide policing operation to bring grooming gang members to justice would be led by the NCA. According to the Home Office, the NCA will work in partnership with police forces to investigate cases that "were not progressed through the criminal justice system" in the past. Downing Street has said the full national statutory inquiry into grooming gangs would look "specifically at how young girls were failed so badly by different agencies on a local level". A national statutory inquiry is an investigation set up by the government to respond to events of major public concern - in this case grooming gangs - that has legal powers to compel witnesses to give evidence.
