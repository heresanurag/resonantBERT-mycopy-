  The names of those killed in the Grenfell Tower fire have been read out as the inquiry concludes - these are their stories.

  'She was so proud to live in Grenfell Tower': The 72 people killed by the fire

  The victims of the Grenfell Tower fire

  The fire in Grenfell Tower claimed the lives of 72 people, whose names were read out by chairman Sir Martin Moore-Bick as the inquiry into the disaster concluded. Speaking at the inquiry, Sir Martin said everyone who died in the fire in 2017 had been "failed" by those responsible for keeping them safe. He added that all of their deaths were avoidable. These are the stories of the people who died in the disaster, whose ages range from six months to 84.

  Mr Gottardi and his girlfriend Gloria Trevisan lived on the top floor of Grenfell Tower. Mr Gottardi's father, Giannino, told Italy's ANSA news agency that he had been on the phone to his son up until the last minute. He told him that the flat was full of smoke and then communications were interrupted.

  Gloria Trevisan, from Padua in Italy, managed to call home during the fire, when she and Mr Gottardi were trapped on the 23rd floor. Ms Trevisan's father Loris Trevisan told his local newspaper in 2017: "They wanted to go down but said they could see the flames going up the stairs and the smoke was more and more intense." Ms Trevisan completed her master's degree in architecture at the University of Venice in October 2016 before travelling to London with Mr Gottardi to find work.

  Raymond Bernard, known as Moses to friends, lived on the 23rd floor. His remains were found in his flat, along with those of Deborah Lamprell, Jessica Urbano-Ramirez, Berkti and Biruk Haftom, Hamid Kani and one other resident, the public inquiry heard. Mr Bernard moved to the UK from Trinidad in 1969, and had worked as an electrician. He was also a DJ in a sound system in his 20s, relative Ashley Anderson told the hearing. "He had long, flowing locks like the free-thinking lion that he was."

  Fethia Hassan (left) with her sister Hania Hassan and mother Rania Ibrahim

  Four-year-old Fethia lived in flat 203 with her parents Rania Ibrahim and Awadh Hassan, and sister Hania. Both girls and their mother died in the fire. Her aunt Rasha told the public inquiry how Fethia, known as Fou-Fou had "a very strong personality".

  Fethia's younger sister Hania lived with her and their parents on the 23rd floor. The girls and their mother all died in the blaze. Their father was not in the building at the time of the fire. The girls' aunt Sayeda Ibrahim told the Grenfell Inquiry that Hania "although small... had a very grown up attitude and would even roll her eyes at you."

  Fethia and Hania's mother Rania Ibrahim also died in the fire. Her husband Awadh Hassan was not in the building on the night of the fire. She recorded a live video of smoke filling the flat, but no one survived. Rania was born in Aswan, Egypt, and moved to the UK in 2009, marrying the following year. She was one of seven siblings. Her husband Awadh Hassan told the Grenfell Inquiry that his life had "fully stopped" since the fire. "I know if I keep talking I'm not going to get Rania, Fethia and Hania back".

  Hesham Rahman lived alone on the 23rd floor and had diabetes which made it difficult for him to walk. He was said to have last made contact with his family at 03:00, when he told them he could smell smoke.

  Mohamed Neda died after trying to help people on the 23rd floor, where he lived. His body was found outside Grenfell Tower, having died from injuries consistent with a fall. It is believed that his wife and son fled the blaze but he stayed behind because he was injured. He was last seen helping neighbours on the stairwell.

  Fathia Ahmed Elsanousi, 73, died on the 23rd floor with her daughter Isra Ibrahim, 33 and son Abufras Ibrahim, 39. The mother and children had fled persecution in their native Sudan and moved to London, the public inquiry heard. Sister Hayat Elsanosi said: "Fathia came to this country as a refugee seeking security... She felt safe here in London. Because of the way she died, this now feels like a illusion for us."

  Isra Ibrahim died on the 23rd floor of the tower block with her mother Fathia Elsanosi and brother Abufars. Her husband Said Essaouini told the public inquiry: "I feel like I lost my world. Every Friday I go to the cemetery and I sit down and I talk to her for two hours - I know she is listening to me."

  Abufars Ibrahim is believed to have been visiting his mother, Fathia Elsanosi, and sister Isra on the night of the fire. The family were found on the 23rd floor.

  Three-year-old Zainab Choucair was one of six members of a family who lived on the 22nd floor. She died in the fire along with her grandmother Sirria, parents Nadia and Bassem, and siblings Fatima and Mierna, aged 10 and 13. Zainab's aunt Sawsam said: "We all loved Zainab. When I would come back from work Zainab was so happy to see me."

  Thirteen-year-old Mierna Choucair lived with five other family members on the 22nd floor. She died with her grandmother, parents, and her two sisters in the tower block. Mierna's uncle Hisam Choucair said of her: "She loved school. Loved learning. She wanted to be either a doctor or a lawyer. The last time I talked with her about it, she couldn't decide."

  Zainab and Mierna's eleven-year-old sister Fatima Choucair also died in the fire. Of Fatima, her aunt Sawsam said: "Fatima was a great gymnast. She had the body for it and wanted to become a professional gymnast when she grew up."

  Bassem Choukair with his wife Nadia, who also died in the fire

  Bassem Choukair lived with his family on the 22nd floor. He died in the fire with his wife Nadia, 33, and their daughters Zainab, Mierna and Fatima. The Grenfell Inquiry heard that Mr Choukair, who worked for Marks & Spencer, was a dedicated man who never took a day off. Brother-in-law Hasem Choucair described him as "an excellent father, kind and considerate" and said "all he wanted was to look after and protect his family".

  Nadia Choucair died in the fire with her mother, husband Bassem, and their daughters Zainab, Mierna and Fatima on the 22nd floor. Her brother Hisam Choucair told the Grenfell Inquiry his sister, who was the youngest sibling, was the favourite. "We all loved her. She was beautiful, and she was wise."

  Sirria Choucair was one of six members of her family who lived on the 22nd floor. She moved to the UK in the 1960s from Lebanon, and worked at the Royal Marsden Hospital where she became close friends with her boss Maria Del Pilar Burton - who also lived in Grenfell Tower and died in hospital six months after the fire. Her daughter Nadia, her daughter's husband, Bassem, and their three daughters also died in the blaze.

  Twelve-year-old Firdaws Hashim died in the fire, along with her parents Hashim Kedir and Nura Jemal and two brothers, Yaqub and Yahya. Firdaws was described as a "talented public speaker" and had been awarded a debating prize by Bill Gates three months before she died, the public inquiry heard.

  Yaqub Hashim lived on the 22nd floor of Grenfell Tower with his family, who all died in the fire. In a statement, his family said he was a happy and energetic boy. They said his school friends described him as "funny, hilarious, honey with a big smile, a great boy and a kind friend".

  Thirteen-year-old Yahya Hashim lived on the 22nd floor with his family. Speaking on behalf of the family, his aunt said in 2017: "One tiny thing that gives me some type of comfort now and then is knowing the fact that you were/are together with your family that you loved most. "I have no choice but to accept the fact that you are in a better place now."

  Hashim Kedir, father of Firdaws, Yaqub and Yahya, lived on the 22nd floor with his family. Relatives of Hashim said in 2017: "You were intelligent, smart, hardworking, hilarious and caring. You were always there for everyone and anyone who needed help." The public inquiry heard that he had worked as a builder, parking attendant and electrician, and had recently gained his black cab licence.

  Nura Jemal died in the fire with her husband, Hashim Kedir, sons Yahya and Yaqub, and daughter Firdaws. The family lived on the 22nd floor of the tower block. "Nura was a positive-minded, devout and courageous mother and wife", a relative said.

  Retired lorry driver Anthony Disson was living on the 22nd floor of Grenfell Tower. Mr Disson phoned his son at 03:30 and said he was being told to stay in his flat. Police confirmed that he had died in the blaze. His son Lee said: "He was a very special person and I would like him to be remembered for who he was when he was alive. He was always there to help anyone, no matter who you were or where you came from."

  Marketing manager Mariem Elgwahry, 27, lived with her mother Eslah Elgwahry, 64, who also died in the fire. Their remains were found on the 23rd floor. Her brother Ahmed told the public inquiry he spoke to his sister by phone from the foot of Grenfell Tower. "She never mentioned she could see fire, but it was clear she knew it was coming. I can only presume... she was trying to keep my mum calm, doing what she does best which was to help others."

  Eslah Elgwahry lived with her daughter Mariem, 27, on the 23rd floor. Her son Ahmed told the public inquiry that he was in contact with his sister and mother by phone as the fire spread. Of his mother, he said: "My mum touched many hearts and was a strong woman who raised Mariem and I on her own since my father passed."

  Filipino pensioner Ligaya Moore loved her 21st floor flat because it made her feel on "top of the world", the public inquiry heard. She came to Britain from the Philippines in the early 1970s. Her British husband, James, died from cancer about 10 years ago. Her friend Nenita Bunggay told the inquiry: "She was so proud to live in Grenfell. She would always say every time we walked past: 'Nenita, that's my building, 21st floor. It's a big building and I love it so much, even though I'm alone there, I love seeing it every day'."

  Eight-year-old Medhi El-Wahabi lived on the 21st floor with his family. Both his parents, his older brother and sister also died in the fire. His aunt, her husband, and two children were able to escape from the sixth floor. Family members said in 2017: "Mehdi was a calm and friendly young boy who loved his family very much."

  Fifteen-year-old Nur Huda El-Wahabi died in the fire with both her parents and two brothers. Her younger cousin Mariam told the inquiry she had wanted to be like Huda: "We soon came to the realisation it was impossible to be like her - she was too unique." A character in a recent Philip Pullman book was named Nur Huda, after her former teacher James Clements bid more than a thousand pounds in the Authors for Grenfell Tower auction, which raised money for victims.

  Nur Huda and Mehdi's brother Yasin El-Wahabi also died on the 21st floor of the tower block. His cousin Zak Chebiouni said in 2017 Yasin studied at university part-time so he could continue his contributions to the community - he trained as a football referee and officiated at adult and children's games. "I felt inspired by his drive to create a better life for him and his family and I will always strive to be as social and outgoing as him so a piece of him can live on through me."

  Faouzia El-Wahabi died along with her husband Abdulaziz and their children. Her sister-in-law, Hanan, said in 2017 she was a wonderful baker who had a talent for sewing. "She had a real presence in the community and was loved by many."

  Abdulaziz El-Wahabi was found dead on the 21st floor, where he lived. His wife Faouzia, his sons Yasin and Mehdi, and daughter Nur Hada also died in the fire. Born in Morocco, Abdulaziz was a porter at University College London Hospital and a "popular colleague known for being kind", said his brother Hamed, who also lived in Grenfell Tower. "After our father passed away, Aziz became the heart of our family, he took on a father figure; the supporter, the protector and the carer," he told the public inquiry.

  Mary Mendy lived on the 20th floor with her daughter Khadija Saye, who also died in the fire. Mrs Mendy, also known as Cissy, died after trying to escape her flat. She was found in the lobby on the 13th floor. Born in Gambia in June 1965, Mary Mendy moved to the UK in the 1980s and had lived in Grenfell Tower since 1993. She worked as a carer in the community.

  Artist and photographer Khadija Saye, also known as Ya-Haddy Sisi Saye, lived on the 20th floor with her mother Mary Mendy, who also died. Ms Saye was found dead on the ninth floor after trying to escape the building. Her work was displayed at the Venice Biennale and British art gallery the Tate Britain following her death.

  Malak Belkadi died in hospital after she was recovered from the building by firefighters. Her parents, Omar Belkadi and Farah Hamdan, and her youngest sister Leena all died in the fire. A third sister escaped the fire and survived. Of the siblings, Mrs Hamdan's father said: "God bless their souls. They used to call me 'Jiddi', which means grandpa. That was my name."

  Six-month-old Leena Belkadi died in her mother's arms in the fire. Her parents Omar Belkadi and Farah Hamdan tried to escape the fire from their flat on the 20th floor. Her sister Malak was found alive by firefighters, but later died in hospital. A third sister survived.

  Farah Hamdan died with her husband Omar Belkadi, their oldest daughter Malak and their six-month-old baby Leena. They lived on the 20th floor. Two of their children were taken to hospital but one, Malak, later died from her injuries. Farah's cousin Adel Chaoui told the BBC in 2017 that Farah called her sister while the fire was raging to ask for advice. "When we told them to get out, Farah said she was told to stay put, not to go anywhere," he said. "That was the last we heard."

  Omar Belkadi died with his family, who he lived with on the 20th floor. Farah's cousin Adel Chaoui told the BBC in 2017 that Mr Belkadi's wife Farah Hamdan called her sister while the fire was raging to ask for advice. Mrs Hamdan's father said of his daughter and her husband Omar: "They were the best people. They really loved each other. You can see them in the photos, you can see how they were. It's very obvious that they loved each other."

  Jessica Urbano Ramirez was at home on the 20th floor of the tower block on the night of the fire. Her parents were not in the block at the time and received phone calls from Jessica, desperate for help. In a statement, the family said: "Nothing will ever bring our little girl back, and we are angry that this should ever have happened to our little angel. We will not rest until we get justice for her and for the many other lives lost as a result of this crime."

  Gary Maunders was among the victims found on the 23rd floor. His family remembered him at the inquiry as a man with a great personality and a "devoted" Manchester United football supporter. Ana Pumar, mother of his two youngest children, said in 2017: "Gary was without doubt a devoted and loving father, he would give everything he had to ensure his children had everything they needed and more."

  Deborah Lamprell lived on the 16th floor of Grenfell Tower. In a statement read at the inquiry, Deborah's mother Miriam Lamprell said: "When I think of Debbie, I think of her laughing. She was always laughing." She added that her daughter was happy and "did not want more, she felt blessed".

  Marjorie Vital lived in the tower block with her son Ernie. Both died in the fire. Her family said she was a beautiful, joyful, independent, intelligent, kind-hearted, sensitive individual who dedicated her life to her children. They said she carried herself with dignity and extended her warmth to family and friends, and would be missed both here in the UK and abroad.

  In 2017, his family called him "proud, humble, mature and independent", as well as a "loyal son" and a "law-abiding citizen".

  Mohamednur "Mo" Tuccu, his wife Amal and daughter Amaya all died in the fire. His body was recovered from the grounds close to the tower. Mr Tuccu's wife and daughter died on the 23rd floor. The Grenfell Inquiry heard that Mr Tuccu, who worked as a security guard, was a respected employee who always went the extra mile. Speaking in a pre-recorded video, Mr Tuccu's brother Ibrahim Toukou told of his devastation that he and his brother would never be able together with their families again.

  Three-year-old Amaya died at Grenfell Tower with her parents Mohamednur Tuccu and Amal Ahmedin. Her aunt Winta told the public inquiry that "cheeky" Amaya was the love of her mother's life, and that her sister was an incredible mother. "I will continue planning Amaya's life - what she would be doing today, tomorrow, her 10th birthday, her 18th, her 21st, and the rest of her life. We all miss them so much," she said.

  Amal Ahmedin died with her three-year-old daughter Amaya and cousin Amna Mahmud Idris on the 23rd floor. Speaking at the public inquiry, Ms Ahmedin's sister Feruza Afewerki said that a year on she still "still hadn't been able to make sense of the senseless deaths of innocent and precious lives". "Those we grew up with, who [we] shared our fondest memories with... have had their lives stolen from them while the whole of London watched."

  Amna Mahmud Idris died while visiting relatives who lived on the 19th floor. Her body was found on the 23rd floor with her cousin, Amal Ahmedin, and Amal's daughter Amaya. Amna's husband Ibrahim paid tribute to her at the time, saying: "She was all my life... now I have lost the support. She would support me at all times."

  Fatemeh Afrasiabi died while she was visiting her elder sister, Sakina Afrasehabi, who lived on the 18th floor. They were found on the 23rd floor of the tower block, where their family believes they went to escape smoke. In a video shown to the public inquiry, her daughters remembered her "beautiful" singing voice, and talents as a painter and doll-maker.

  Sakina Afrasehabi died in the fire with her younger sister, Fatemeh Afrasiabi, who had come to visit. Sakina's daughter Nazanin told the BBC that her mother, who was disabled, had no chance of escape. In a statement read to the public inquiry another of her daughters, Shiva Aghlani, recalled how her mother and aunt would sit in their flat and look at the "amazing" view of the London skyline. "I am glad that my mother at least did not die alone, but it terrifies me every time I think about how scared (they) must have been," she said.

  Isaac Paulos lived with his parents, Genet Shawo and Paulos Tekle, and his three-year-old brother Luca on the 18th floor. He reportedly got separated from his family in the fire and was found on the 13th floor. Isaac, a pupil at Saint Francis of Assisi Catholic Primary School, was described by his mother as a "beautiful boy". At the public inquiry, his father expressed anger at the advice to remain in their flat: "Why we were kept inside for so long? If I had not listened to the fire brigade, my son would have likely been alive today."

  Mr Kani, who moved to London from Iran in the 1970s, worked as an actor and later a chef, and spent 22 "happy years" living in Grenfell Tower. Speaking at the public inquiry, his cousin Masoud Shahabeddin said that Mr Khan "will not be remembered for the way he died, but the way he lived".

  Biruk Haftom lived on the 18th floor with his mother Berkti. Their bodies were found together in Raymond Bernard's flat on the 23rd floor. His family said in 2017: "Biruk was a loving, pure-hearted boy, wise beyond his years and known for his politeness, kind heart and his love for his family and friends."

  Berkti Haftom lived on the 18th floor of Grenfell Tower with her son Biruk. She was found dead in Raymond Bernard's flat on the 23rd floor, alongside her son and several other residents. Her family said in 2017: "She was a generous, caring, loving mother, partner, sister, aunty and friend and she will be missed by us all forever."

  Vincent Chiejina died on the 17th floor of the tower. In a video, his younger sister Obi told the public inquiry how the pair had spent their early years in Nigeria before their family moved to the UK. She said: "I think he was also quite good at looking after people who were quite vulnerable like himself, so would he never reject anybody just because they were less privileged than himself - and he was always good at spotting that, not exploiting it, but wanting to quietly support them with whatever troubles they had but also making them feel good."

  Kamru Miah died with his wife Rabeya Begum, two sons Mohammed Hamid and Mohammed Hanif, and daughter Husna Begum on the 17th floor. Mr Miah's son Mohammed Hakim told the public inquiry: "I am extremely proud of my family remaining close to each other in their last moments. "I am even more proud as a brother that my siblings did not leave my parents behind, even though they might have had the chance to escape."

  Rabeya Begum died along with her husband Kamru Miah and three of their adult children. Her son Mohammed Hakim remembered family trips to Holland Park and Battersea Park. He described his mother as "beautiful, loving and generous" in 2017.

  Mohammed Hanif died in the fire with four members of his family - his father, mother, sister and older brother. The family lived on the 17th floor, and were last heard from at 03:00 on the night of the fire.

  Mohammed Hamid died in the fire with four members of his family - his father, mother, sister, and younger brother. The family lived on the 17th floor.

  Husna Begum lived on the 17th floor with her parents and two brothers. She called her cousin at around 01:30, as the fire raged, to say there was a lot of smoke and that they were stuck inside their flat. Husna was due to get married the following month.

  Khadija Khalloufi lived on the 17th floor with her husband, Sabah Abdullah. Mrs Khalloufi's brother told the public inquiry that his elder sister, who had been like a mother to him and his siblings, had left a "void" in their lives when she moved from Morocco to London.

  Joseph Daniels lived on the 16th floor with his son Sam, who managed to escape the fire. He moved to London, and to Grenfell Tower, in 1984. Sam told the inquiry that the blaze took his father's life and "all trace of his existence", adding: "He never stood a chance of getting out, it should never have happened."

  Sheila, who reportedly dropped her surname, had lived in Grenfell Tower for 34 years. Her family described her in 2017 as an active member of the community, who was "cycling around London, performing yoga daily and swimming regularly in the Kensington Leisure Centre until she was 80 years old". She is also said to have created some highly original artwork - nearly all of which was lost in the fire. Sheila had two sons, six grandchildren and three great-grandchildren.

  Steven Power lived on the 15th floor of the tower. His daughter Sherrie Power told the public inquiry her father was a keen fisherman and DJ, with a style in which he came across like a "West Indies man trapped in an Irish man's body". Mr Power had lived in Grenfell Tower for 32 years. His best friends were his three Staffordshire Bull Terriers, who also died in the fire, the hearing heard.

  He managed to speak to his family on the night of the fire, saying he couldn't breathe because of the smoke. When he was young he had football trials with Charlton Athletic and Crystal Palace, and carried on playing Sunday league football until suffering an injury in his 30s. He worked as a painter and decorator and was described having three loves in life: his family, friends, and Chelsea FC.

  Civil engineering student and former refugee Mohammad al-Haj Ali had come to the UK after fleeing the war in Syria. He lived on the 14th floor with his brother Omar. Mohammad became separated from Omar as they tried to escape. He returned to his flat where he tried to call family members in Syria, but could not get through. His friend said: "I could see that he was special. One of a kind. He was a very compassionate person who cared about people. He was a perfectionist; everything that he did, he excelled."

  Jeremiah Deen lived on the 14th floor with his mother Zainab, who also died in the fire. "He was loving and full of life," his grandfather Zainu Deen told the Grenfell Inquiry. Mr Deen added that Jeremiah liked football, exploring and adventuring, and that the family would not dwell on the sadness, but would "focus on how happy he made us in his life".

  Zainab Deen lived on the 14th floor with her two-year-old son Jeremiah. Speaking at the Grenfell Inquiry, her father Zainu Deen said Zainab "had it all". "She was beautiful, smart, warm, caring - a confident and outgoing woman," he said. "We are so proud to be able to call you our daughter."

  Abdeslam Sebbar lived on the 11th floor, and was named by police as having died from smoke inhalation. He is believed to have been one of 11 Grenfell victims with Moroccan connections.

  Ali Yawar Jafari had lived on the 11th floor for 16 years. His daughter Nadia was visiting on the night of the fire, but they became separated on the 10th floor while trying to escape. "He was a great man who looked after his family," his son Hamid told the Grenfell Inquiry. "He was most happy when he used to see his family come together. His happiest moment was when my son was born. They seemed connected to each other. When I hold my son, I feel like I am holding my dad."

  Victoria King, 71, died with her daughter Alexandra on the 20th floor, according to media reports. Their family said in 2017 they were devastated. "They died at each other's side and now they can rest together in peace."

  Alexandra Atala died alongside her mother Victoria. They were found on the 20th floor, according to reports. Their family said they took some comfort "from the knowledge that she and Alexandra were devoted to one another". The two "spent so many mutually-supportive years together", the family said.

  Logan Gomes was stillborn in hospital hours after his parents escaped from the 21st floor. He was later recorded by police as a victim. He was due on 21 August and his parents and two sisters were "excited" about his imminent arrival. His father Marcio said Logan was going to be his "gaming buddy".

  Maria Del Pilar Burton died in hospital in January 2018, seven months after being rescued from Grenfell Tower. The Grenfell Inquiry heard that she had dementia, and her health deteriorated after the fire. Born in Spain in the 1940s, Maria Del Pilar Burton was one of the very first residents of Grenfell Tower. Paying tribute, her husband Nicholas Burton said in 2017: "I loved my wife and I was in awe of her... She was an extraordinary woman."
