content: |-
  Aston Villa's match-winners against Brighton prove they are reaping the rewards of their January business, writes Phil McNulty.

  'Aston Villa bucked the trend in January - and are reaping rewards'

  This video can not be played To play this video you need to enable JavaScript in your browser. Are Villa starting to get the best out of Rashford?

  Aston Villa and manager Unai Emery are reaping the rewards for bucking the trend that states the January transfer window is high risk and rarely offers value. If proof were needed, it came in the vital 3-0 win at Brighton that pushed Villa towards the Premier League's top four - with an FA Cup semi-final against Crystal Palace at Wembley and a Champions League quarter-final with Paris St-Germain already on a packed agenda. Villa's second-half goals all came from players who arrived at the club in January, the perfect advert for a fiercely ambitious manager in Emery and the progressive thinking of co-owners Nassef Sawiris and Wes Edens. Marcus Rashford's renaissance since being rescued from exile at Manchester United was illustrated again when he broke the deadlock with his first Premier League goal for Villa, following his first strikes for the club in Sunday's FA Cup quarter-final win at Preston North End. Marco Asensio, on loan from PSG, doubled the lead with 12 minutes left before Donyell Malen, a £19m January acquisition from Borussia Dortmund, put the icing on the cake in front of Villa's ecstatic supporters right at the end of 10 minutes of added time. Rashford may have claimed most of the spotlight with his re-emergence from the Old Trafford wilderness, but the experienced Asensio has had even more impact and provides Villa and Emery with a close acquaintance with the highest prizes at former club Real Madrid.

  Morgan Rogers celebrates with Marco Asensio after setting up the Spain international's goal in the 3-0 win at Brighton

  The 29-year-old Spain midfielder won La Liga and the Champions League on three occasions each with Real, also winning Ligue 1 and the Coupe de France with PSG before falling out of favour under coach Luis Enrique after scoring seven goals in 47 appearances. Emery has been a long-time admirer of Asensio and the midfielder has been high on his wish list. He was delivered in January to stunning effect. Since signing, the Spaniard has made 10 appearances for Villa with only four starts, but has scored eight goals, provided one assist and created 10 chances. Asensio has been instrumental in Villa's march to the Champions League quarter-final, scoring from the penalty spot after coming on as a substitute in the 3-1 last-16 first-leg win at Club Brugge. He made an even more significant contribution in the second leg at Villa Park, scoring twice in a 3-0 victory after again coming on as a substitute. He provided an impact off the bench once more at Brighton, sliding in a powerful finish to effectively seal the win that sees Villa leapfrog the Seagulls into seventh place in the Premier League. Asensio brings priceless big-match expertise to a Villa side that went into unknown territory in this season's Champions League, albeit under European specialist Emery - who won the Europa League three times at Sevilla, again at Villarreal and even guided Arsenal to the final in what is regarded as an unsuccessful time in north London.

