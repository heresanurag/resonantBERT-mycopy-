title: Prince Harry arrives in London for charity awards - BBC News
date: '2024-10-01'
section: General
url: http://www.bbc.co.uk/news/videos/c5y0210323zo
content: |-
  Prince Harry poses for photographs as he visits London for the WellChild Awards ceremony.

  Prince Harry poses for photographs ahead of the Wellchild Awards ceremony in London, a charity of which he is a patron.

  The WellChild Awards celebrates the achievements of seriously ill children and their caregivers.

  Harry has been a patron of the charity for 16 years and has attended 12 of its previous award ceremonies. It is expected that he will present an award to a child aged between four and six, and deliver a speech.
