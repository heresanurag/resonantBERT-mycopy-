content: |-
  A total of 13 people have appeared in court in Merseyside since Monday.

  Boy, 15, among those to plead guilty to violent disorder

  Liverpool saw widespread scenes of disorder over the last week

  A 15-year-old alleged to have thrown a paving slab at crowds is among 13 people to have appeared in court over the recent violent disorder on Merseyside. The teen, from Toxteth, who cannot be named for legal reasons, pleaded guilty to violent disorder at Liverpool Magistrates Court following the protests in Liverpool on Saturday. He was granted bail with a condition not to enter the city centre as his case was adjourned until 17 September. Others have also appeared in courts across the country after the disorder in Liverpool and in Southport following the fatal stabbings of three girls at a Taylor Swift-themed dance event in Southport on 29 July.

  A total of 11 people appeared at Liverpool Magistrates on Monday and a further two on Tuesday, charged in connection with disorder that occurred Southport, Liverpool city centre and Walton, Merseyside Police said Of the 13, 11 people were remanded into custody to appear before Liverpool Crown Court later this month, with 10 pleading guilty. Police said a 38-year-old man from Southport had been arrested on suspicion of violent disorder, possession of a controlled class B drug and criminal damage in connection to the disorder in Southport on 30 July and remained in custody.

  Meanwhile, a judge in Liverpool told one man he had a "real prospect of a custodial sentence" due to the "serious disorder" he had been a part of. Dylan Carey, 26, of Castle Hill Road in Hindley, Greater Manchester, pleaded guilty at Liverpool Magistrates' Court to violent disorder in Southport last Tuesday. Joshua Sanderson-Kirk, prosecuting, said police attended outside a mosque on St Luke's Road in Southport when a "hostile" crowd of about 200 people came towards them chanting. He said: "The crowd became more angry and began surging forward. "Several of the crowd were shouting 'why are you protecting them'." Mr Carey, who was identified by officers via footage on social media, kicked a police van and threw something towards it, the court heard. The defendant, who has no previous convictions, was remanded in custody to appear at Liverpool Crown Court this week for sentencing.

  Derek Drummond, 58, who lives in Southport, pleaded guilty to violent disorder and assaulting an emergency worker in Southport. Adam Wharton, 28, of Selwyn Street in Kirkdale, and Ellis Wharton, 22, of Selwyn Street in Kirkdale, both pleaded guilty to burglary with intent to steal at Spellow Library in Walton. William Nelson Morgan, 69, of Linton Street, Walton, pleaded guilty to violent disorder and possession of an offensive weapon in Walton. John O'Malley, 43, of Cambridge Gardens in Southport, pleaded guilty to violent disorder. Declan Geiran, 29, of Kelso Road, Liverpool pleaded guilty to violent disorder and arson (to a police vehicle) in Liverpool city centre. Liam James Riley, 41, of Walton Road, Kirkdale pleaded guilty to violent disorder in Liverpool city centre. A 14-year-old boy from Liverpool, who cannot be named for legal reasons, pleaded guilty to violent disorder at Clayton Square, Liverpool and was bailed on the condition he does not enter the L1, L2 or L3 postcode areas. Initial sentencing dates were set for later in August but it was later confirmed that proceedings will begin at Liverpool Crown Court on Wednesday before HHJ Menary KC.
