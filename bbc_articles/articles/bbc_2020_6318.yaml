id: bbc_2020_6318
title: 'Coronavirus: ''Earlier lockdown would have halved death toll'' - BBC News'
date: '2020-06-10'
section: Health
url: http://www.bbc.co.uk/news/health-52995064
content: |-
  Former government adviser Prof Neil Ferguson was giving evidence to a committee of MPs.

  Prof Neil Ferguson modelled the impact of the epidemic for the UK government

  The number of coronavirus deaths in the UK would have been halved if lockdown had been introduced a week earlier, a former government adviser has said.

  Prof Neil Ferguson, whose advice was crucial to the decision to go into lockdown, said the outbreak had been doubling in size every three or four days before measures had been taken.

  The prime minister said it was still too early to make such a judgement.

  "We will have to look back on all of it and learn the lessons that we can."

  Boris Johnson added: "A lot of these things are still premature. This epidemic has a long way to go."

  Chief scientific officer Sir Patrick Vallance said important questions about the measures taken "still needed to be addressed".

  The UK's chief medical adviser, Prof Chris Whitty, said looking back at "how we improve on what we do" was routine.

  "Part of the problem... at that stage is that we had very limited information about this virus," he added.

  In the UK, lockdown began on 23 March.

  The number of people known to have died with coronavirus in the UK stands at 41,128.

  Prof Ferguson, from Imperial College London, told a committee of MPs: "Had we introduced lockdown measures a week earlier, we would have reduced the final death toll by at least a half.

  "So whilst I think the measures, given what we knew about this virus then, in terms of its transmission, were warranted... certainly had we introduced them earlier, we would have seen many fewer deaths."

  Prof John Edmunds, another scientist who advises government, recently said the delay to go into lockdown "cost a lot of lives" but the data available in March had been quite poor, making it "very hard".

  Prof Ferguson, who resigned as a government adviser last month after allegedly breaching lockdown rules, indicated many lives in care homes could have been saved.

  "We made the rather optimistic assumption that somehow the elderly would be shielded," be said.

  But "that simply failed to happen".

  Prof Ferguson said the government's Scientific Advisory Group on Emergencies (Sage) had "anticipated in theory" the risk to people living in care homes.

  And it had been discussed in meetings as early as February.

  But the "only way you can really protect care homes is to do extensive testing to make sure it doesn't get in".

  And more was now understood about how the virus was transmitted,

  Care home workers often worked at more than one facility and might be spreading infection between residences, for example.

  Coronavirus was growing "exponentially" in February and March.

  Scientists have told BBC News an estimated 100,000 people were being infected every day in England by the time it went into lockdown.

  Introducing measures a week earlier would have significantly cut that figure and in turn saved lives.

  Why this did not happen is one of the major questions about the government's handling of this pandemic.

  It is far easier to look back than to make the decision in the moment.

  There was a lack of information and the scale of the outbreak within the UK was not clear.

  But other scientists were making the case for the UK to go into lockdown weeks before it happened.

  Discussing the timing of the lockdown on BBC Radio 4's More or Less programme, mathematician Kit Yates said there had been an "overreliance" on certain models when determining how fast the epidemic had been doubling.

  "Some members of [pandemic modelling group] SPI-M have communicated their concerns to me that some of the modelling groups had more influence over the consensus decisions than others," he said.

  This meant "some opinions or estimates that may have been valid didn't get passed on up the chain".

  On average, about 1,600 people a day die in the UK. What is not known about the coronavirus deaths reported during the epidemic is to what extent those deaths are on top of that figure, or part of it.

  Most of the victims have been older or with underlying health conditions.
