  The latest damage to hospitals comes after Israeli strikes hit two of the largest medical centres in Khan Younis, the Nasser Medical Complex and European Hospital. Israel accused Hamas of hiding a command and control centre beneath the European Hospital, and said it conducted a "precise strike" on "Hamas terrorists". Israeli media reported the target of the strike was senior Hamas figure Mohammed Sinwar – the younger brother of the former Hamas leader in Gaza, Yahya Sinwar. Thousands of people have been killed since Israel resumed its strikes on 18 March, following the collapse of a fragile ceasefire which lasted two months. Israel's military has said the expansion of its campaign is aimed at "achieving all the war's objectives" including releasing hostages and "the defeat of Hamas". But the hostages' families group said the operation posed "grave and escalating dangers" to hostages still held in Gaza. "Testimonies from released hostages describe significantly worsened treatment following military strikes, including physical abuse, restraint and reduced food," the Hostages and Missing Families Forum said. The war was triggered by the Hamas-led attacks on southern Israel on 7 October 2023, which saw about 1,200 people killed and more than 250 taken hostage. Some 58 hostages remain in Gaza, up to 23 of whom are believed to be alive. More than 53,000 Palestinians have been killed during Israel's military campaign in Gaza.

