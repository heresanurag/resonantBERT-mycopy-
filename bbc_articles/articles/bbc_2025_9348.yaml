  Three public hospitals are now "out of action" in the North Gaza governorate, the health ministry said, amid Israel's escalating air strikes. Medical staff at one of them, the Indonesian Hospital in Beit Lahia, told the BBC at about 21:40 local time (20:40 GMT) that IDF tanks had pulled up outside and were firing at the hospital. They said 55 people were inside, including four doctors and eight nurses. The rest were immobilised patients who were not able to flee the hospital after the morning's attack, they said. About 50 minutes later staff said the IDF had left the vicinity of the hospital. The IDF has said its troops are fighting "terrorist infrastructure sites" in northern Gaza, including the area adjacent to the Indonesian Hospital. Earlier on Sunday, Gaza's health ministry said staff and patients there had come under "heavy fire". It accused Israel of besieging the hospital, cutting off access, and "effectively forcing the hospital out of service". Medics told the BBC no evacuation order or warning was issued before the attacks, and at no point were there any military targets in the Indonesian Hospital. The onslaught comes as negotiators from Israel and Hamas continue trying to reach a ceasefire agreement in Qatar. Israeli media quoted the office of the prime minister as saying Israel's negotiating team was exhausting "every possibility" for a deal on Sunday. Netanyahu's statement said it "would include the release of all the hostages, the exile of Hamas terrorists, and the disarmament of the Gaza Strip", reports said. A senior Hamas source told the BBC that "no breakthrough or progress has been achieved so far in the ongoing negotiations in Doha due to continued Israeli intransigence". The source said Hamas had expressed willingness to release all Israeli hostages in a single phase, "on the condition of reaching a comprehensive and permanent ceasefire agreement – something the Israeli side continues to reject, as their negotiating team lacks the mandate to decide on key issues". The source stressed that Hamas "rejects any partial or temporary arrangements". The group has proposed releasing all hostages in exchange for an agreed number of Palestinian prisoners, a full Israeli withdrawal from the Gaza Strip, and the entry of humanitarian aid. "Israel wants to retrieve its hostages in one or two batches in return for a temporary truce," the Hamas source told the BBC.

  Speaking to the BBC on Sunday, Mohammed Salha, director of the al-Awda private hospital in northern Gaza, said the closure of the Indonesian Hospital would affect the care he was able to provide. He said al-Awda depended on the Indonesian Hospital for stores of oxygen and for its intensive care unit. Mr Salha added that there had been a bombing near his hospital overnight causing "a lot of damage" to the facility that staff were attempting to quickly repair.

