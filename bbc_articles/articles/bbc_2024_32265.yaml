content: |-
  Police launched a murder inquiry after Daniel Poole and his son Liam went missing in Spain in 2019.

  Two arrested in missing father and son case

  Daniel and Liam Poole travelled to Malaga in 2019

  Two arrests have been made by UK police investigating the case of a father and son who disappeared in Spain more than five years ago. Daniel Poole and his son Liam, from Burgess Hill, travelled to Malaga in 2019 and a decision to treat their disappearance as a murder investigation was made by Sussex Police in 2022. On Wednesday, the force said two men had been arrested, questioned, and released under investigation pending further inquiries. An appeal for witnesses is still ongoing and detectives are offering a £10,000 reward for information leading to the arrest and charge of any person responsible for the pair's disappearance.

  A man in his 30s from West Sussex and another in his 40s from the Merseyside area were both arrested on suspicion of the murders of Danny and Liam, Sussex Police said.

  Det Ch Insp Simon Dunn said anyone with information might not appreciate the importance of it, but it could be "the piece of the puzzle" needed by police to build the picture of what happened to them. He added: "Although Danny and Liam went missing in Spain, we believe there are people in the UK who may hold vital information about their disappearance. "We understand there may be some who have felt unable to come forward before now, but it’s not too late to do the right thing."

  Lauryn, Danny’s daughter and Liam’s sister, previously said she thought about what happened to the men every day. She said: “I beg and pray that someone could give me and our family the closure we need to move on from the sleepless nights, and that I can give an explanation to my dad and brother’s growing family one day."
