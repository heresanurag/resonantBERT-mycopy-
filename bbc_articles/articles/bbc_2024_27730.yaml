  Matt Proudfoot, an assistant coach in the Springboks set-up which won the World Cup in 2019 before overseeing England's forwards for three years under head coach Eddie Jones, believes that Genge is key to England's intensity. "Genge is the leader of the pack at front," Proudfoot told BBC Sport. "He brings a different emotional intent to the pack of forwards. "I would love to see Genge be aggressive. That is what England need. A talisman that is going to throw the gauntlet at the Springboks. I think Genge has that."

  Proudfoot, in black, departed his England role in January 2023, less than two months after Eddie Jones had been sacked as England head coach
