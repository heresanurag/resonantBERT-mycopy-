content: |-
  England prop Ellis Genge admits last year's World Cup semi-final defeat by South Africa is something he will carry for the rest of his career.

  I will always carry semi-final loss with me - Genge

  South Africa defeated England 16-15 at the semi-finals of last year's World Cup

  Coverage: Commentary on BBC Radio 5 Live and BBC Sounds; live text commentary on the BBC Sport website & app

  England prop Ellis Genge admits last year's Rugby World Cup semi-final defeat by South Africa is something he will carry for the rest of his career. Despite having a nine-point lead deep into the second half, coach Steve Borthwick's side were defeated by a single point after a late penalty from fly-half Handre Pollard. Genge, 29, replaced Joe Marler in the second half as England conceded a number of second-half scrum penalties, with Pollard landing the winning kick following another infringement from England's pack. "I'm not going to pretend that you completely forget about it. It is something that I will carry with me for the rest of my career at least," Genge told BBC Sport. "It's another game, another week at least but you obviously carry a bit of animosity from previous encounters." The aftermath of that defeat in France was dominated by England flanker Tom Curry's accusation that South Africa hooker Bongi Mbonambi had used a racial slur towards him during the match. Mbonambi denied the accusation, saying he had used an Afrikaans phrase that had been misconstrued, and World Rugby decided there was insufficient evidence to charge him. Back-to-back world champions South Africa now head to Twickenham on Saturday for their first meeting since that World Cup encounter. Vice-captain Genge is likely to be in the starting XV and concedes the scrums "are not going to be easy".

  He added: "It is a huge part of their DNA from a young schoolboy which is what they cherish, and it also helps that they have 150kg human beings. "Everyone needs to roll their sleeves up and be absolutely invested, then we will have it out. "Credit where credit is due, they have a great set piece, but I am not just going to roll over and let them have it." Despite that challenge for the England pack, Genge says preparation remains the same. "You can wear boys out by doing too many scrums, you could do 100 scrums this week and it isn't going to change the outcome on Saturday," Genge said. "You have got to stick to our process, I think our scrum has been good over the last two weeks." England have narrowly lost their last two games against Australia and New Zealand, with both coming down to the final play. "It is tough when you are up against it and you need to shake that negative energy I guess and move on," the Bristol Bears prop added. "A week like South Africa at Twickenham is probably the best week to do so. "Everyone thinks they are amazing, myself included, I think they are a great team. I'd love to get after the best."

