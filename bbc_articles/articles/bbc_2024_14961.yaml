id: bbc_2024_14961
title: Biden mistakenly calls Zelensky ‘Putin’ at Nato summit - BBC News
date: '2024-07-12'
section: General
url: http://www.bbc.co.uk/news/videos/ce78zklp77wo
content: |-
  Biden later corrected himself, saying his gaffe was because he's 'so focused on beating' the Russian president.

  US President Joe Biden mistakenly referred to Ukrainian President Volodymyr Zelensky as “President Putin” while speaking to reporters about Nato’s support for Ukraine. He later corrected himself, before Zelensky took the microphone.

  "President Putin?" Biden said, correcting himself. "President Zelensky. I'm so focused on beating Putin."
