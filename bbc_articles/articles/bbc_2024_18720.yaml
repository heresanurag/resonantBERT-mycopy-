title: Prince Harry and Meghan to begin Colombia visit - BBC News
date: '2024-08-15'
section: UK
url: http://www.bbc.co.uk/news/articles/c0qe1gg5pzlo
content: |-
  Prince Harry and Meghan are travelling to Colombia to support projects aimed at protecting young people.

  Prince Harry and Meghan are backing projects to protect young people online

  Prince Harry and Meghan will begin a visit to Colombia later this week where they are expected to support projects aimed at safeguarding young people from online harm. The couple have been invited by Francia Marquez, the South American country's vice president and the first black woman to hold that role. It comes ahead of a global ministerial conference about ending violence against children which is being held in Colombia in November. According to the vice-president's office, the couple will be meeting "leaders, youth and women who embody the voices and aspirations of Colombians committed to progress".

  Vice president Francia Marquez has invited Prince Harry and Meghan to Colombia

  Over the next few days, Prince Harry and Meghan will visit the capital Bogota and the regions of Cartagena and Cali. If the visit is anything like their recent trip to Nigeria, they can expect a rock star welcome. But it will also raise questions about the status of the trip. It is not a state visit or royal trip, which would be carried out on behalf of the government. The couple are no longer working royals. Nonetheless, the trip, which was arranged following an invitation from the vice president, might resemble an official royal visit. There are likely to be photo-friendly visits to cultural events and community projects. The couple are attending as guests of Ms Marquez, a political leader with a background in human rights and environmental campaigning. The vice president has highlighted the need to tackle "cyberbullying, online exploitation and the mental health impact of these threats" and says this will be a key feature of Prince Harry and Meghan's visit. The couple, who have faced their own attacks on social media, are campaigning to make the internet a safer place. They launched The Parents' Network to help families whose children have experienced the harmful effects of social media. The project aims to do more to protect the "mental, physical, and emotional well-being" of children who might have been adversely affected. In a TV interview with US network CBS News, Prince Harry spoke of some parents not knowing what their children are doing online. "They could be in the next door room on a tablet or on a phone, and can be going down these rabbit holes," he said.

  Ahead of the trip to Colombia, Prince Harry's chief of staff Josh Kettler has left his role. It was said to be a mutual decision to part ways. There will be concerns about security on the trip to Colombia, too, with the Foreign Office advising against travel to several regions of the country. In an interview with ITV, Prince Harry spoke of his fears about his family's safety, particularly in terms of threats provoked by negative press or social media coverage. He said it was one of the reasons he would not bring Meghan back to the UK. Prince Harry has been involved in ongoing legal cases against what he claims have been abuses of the tabloid press and the unlawful gathering of information. The California-based couple also appear to be working on a consumer lifestyle brand. There have been social media teases for a project called American Riviera Orchard. Pots of jam were sent to the couple's famous friends and then posted online.
