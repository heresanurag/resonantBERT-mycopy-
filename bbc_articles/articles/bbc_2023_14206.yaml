title: Croydon stabbing is every parent's worst nightmare - police - BBC News
date: '2023-09-27'
section: London
url: http://www.bbc.co.uk/news/live/uk-england-london-66938640
content: |-
  A teenage boy, believed to be known to the victim, has been arrested and a murder inquiry has begun.

  We're awaiting further developments after a 15-year-old girl was stabbed to death in Croydon this morning. Police have arrested a 17-year-old boy and have launched a murder inquiry.

  Here's a quick recap of what we learned from the Met Police's press conference, which took place shortly after 14:00 BST:
  • Ch Supt Andy Brittain, the local policing commander for south London, said officers were called at 08:30 and took two minutes to arrive at the scene of the stabbing in Wellesley Road, Croydon
  • He described the death of the 15-year-old girl, who was walking to school, as "every parent's worst nightmare"
  • Within 75 minutes, police arrested a 17-year-old boy in the New Addington area - about five miles away from Croydon town centre
  • Brittain said the suspect is known to the victim, and he confirmed police are not looking for anyone else
  • He said police won't be naming the victim at this stage, adding there are still many unanswered questions about what happened
  • The mayor of Croydon says the council will do "everything we can" to support the community

