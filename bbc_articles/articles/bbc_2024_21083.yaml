  This video can not be played To play this video you need to enable JavaScript in your browser. Liverpool: Standards are really high when it comes to new players - Slot

  Last season's finish: Third (nine points below City) Liverpool start a season without Jurgen Klopp as their manager for the first time since 2015-16. Klopp announced his end-of-season departure in the middle of the last campaign - and he was replaced by Arne Slot in May. The Dutchman appears to be changing the Reds' playing style from a high-energy pressing game to more of a possession-based set-up. The Reds, who are the only team other than City to win a Premier League title in the past seven years, have yet to sign anybody this season - but Slot hopes that will change. BBC Sport senior football news reporter Nizaar Kinsella, said: "Liverpool will expect to challenge even in Slot's first season in charge after a glorious era under Jurgen Klopp left the club in a good place. "They won’t be favourites, however, and there will also be a reasonable understanding if they fall short in what is his first season as he beds in his new approach."
