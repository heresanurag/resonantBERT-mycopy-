  Chelsea finished last season strongly to qualify for Europe, having been in danger of a bottom-half finish, but after another summer of major overhaul, how they will fare is anybody's guess. Enzo Maresca, on the back of leading Leicester to promotion, replaced Mauricio Pochettino in the Blues' hot seat this summer. They have made a flurry of summer signings - with Kiernan Dewsbury-Hall, Tosin Adarabioyo and Omari Kellyman all having Premier League experience. Veteran centre-back Thiago Silva, along with Hakim Ziyech, Ian Maatsen, Lewis Hall and Omari Hutchinson - who were all out on loan last season - have left permanently, with Conor Gallagher set to move to Atletico Madrid. BBC Sport's Nizaar Kinsella said: "Chelsea would be a real outsider for the Premier League title this season as a new manager in Enzo Maresca and young squad look like they need time to close the gap. "Qualification for the Champions League and success in the cups remains the ambition, but there's a hope that this young squad can grow up together and become contenders in future seasons."
