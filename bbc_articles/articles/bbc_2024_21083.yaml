  This video can not be played To play this video you need to enable JavaScript in your browser. Newcastle United: Eddie Howe says his commitment to club is 'unwavering'

  Newcastle set the bar so high in 2022-23 with their surprise Champions League qualification that last season's seventh-place finish felt like an anti-climax. Manchester United's win in the FA Cup final meant the Magpies, who finished the season strongly, missed out on Europe entirely. Now Newcastle will hope they can keep hold of manager Eddie Howe, who is considered one of the favourites to become England boss. BBC Sport's chief football news reporter Simon Stone said: "I am getting a sense of frustration around Newcastle that they are being handicapped by financial rules, meaning they are having to sell players when they really want to buy. "The good news is Alexander Isak, Bruno Guimaraes and Anthony Gordon are all still at the club. The bad news is there is another month before the transfer window closes. The uncertainty cannot be helping Eddie Howe in his planning."

  This video can not be played To play this video you need to enable JavaScript in your browser. Erik ten Hag: United's manager has a host of new faces working alongside him

  Manchester United had their worst league finish since 1989-90 last season as they finished eighth - although they did end on a high by winning the FA Cup. Manager Erik ten Hag had widely been expected to lose his job in Sir Jim Ratcliffe's overhaul of the club, but United decided to stick with the Dutchman who has won trophies in both his seasons at the club. Manchester United have splashed cash for two youngsters this summer - £36.5m Bologna striker Joshua Zirkzee and £52m Lille centre-back Leny Yoro. Already, though, Yoro is injured and facing months out of action. Several players have left on free transfers including ex-France internationals Raphael Varane and Anthony Martial. BBC Sport's Simon Stone said: "The sight of £52m new boy Leny Yoro in a protective boot sends a shudder down the spine of United's fans. "Injuries began in the last pre-season and didn't stop. Erik ten Hag must avoid a repeat because he simply cannot afford to finish eighth again. "That is likely to bring a renewed focus around further central defensive strengthening over the next couple of weeks."
