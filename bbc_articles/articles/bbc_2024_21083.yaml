  BBC Sport looks at how Manchester City's most likely title rivals are shaping up for the new Premier League season.

  Who are Man City's serious title challengers?

  The annual question is being asked - can anybody stop Manchester City? For the ninth season in a row Pep Guardiola's side have been installed as pre-season bookmakers' favourites to win the Premier League title. They have won six of the past seven titles, including an unprecedented four in a row. BBC Sport takes a look at City's seven likeliest title rivals, sorted by last season's finishing positions.

  This video can not be played To play this video you need to enable JavaScript in your browser. Arsenal is the 'best project for me' - new signing Calafiori

  Last season's finish: Second (two points below City) Arsenal have finished runners-up to City in the past two seasons and are only slightly longer odds than the champions this year - miles clear of any other team. The Gunners have made just one major personnel change this summer, bringing in Italy defender Riccardo Calafiori from Bologna for a fee of up to £42m. He can play at left-back or centre-back. They have also turned a loan deal into a permanent stay for Spain goalkeeper David Raya, who usurped Aaron Ramsdale as number one last season. Arsenal's goals have been shared out - with winger Bukayo Saka their top scorer over the past two seasons. Could a proper striker be the difference between winning the title and not? They have been linked to Napoli frontman Victor Osimhen. BBC Sport senior football news reporter Alex Howell says: "Arsenal have finished second for the last two seasons but the last campaign felt like a big change for all at the club. "The Gunners finished just two points behind champions Manchester City and pushed them until the final day of the season. "Captain Martin Odegaard said at the end of last season that they've changed the club and it does feel as though that Arsenal are going to be title contenders for a long time."
