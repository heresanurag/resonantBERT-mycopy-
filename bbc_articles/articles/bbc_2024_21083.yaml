  Villa are preparing for Europe's top competition for the first time in over 40 years

  Aston Villa qualified for the Champions League by achieving a hugely impressive fourth-place finish last season. Unai Emery has turned the club from relegation candidates to a team who were being talked about as title contenders for a while last season - and he has not even been in charge for two years yet. The club have needed to sell players this summer to meet the Premier League's profit and sustainability rules. But they have brought in plenty of new faces - including Everton midfielder Amadou Onana, Chelsea left-back Ian Maatsen, Luton midfielder Ross Barkley - and the return of academy products Jaden Philogene and Cameron Archer. BBC Sport senior football news reporter Nick Mashiter says: "Since being appointed when they were three points above the relegation zone in October 2022, Unai Emery has overseen a drastic transformation, along with Monchi - Villa's president of football operations - and others. "They were in the title conversation last season and were third at the end of the year, just a point off then leaders Arsenal, but two defeats by Manchester United and a home loss to Newcastle effectively ended any hopes by mid-February. "Villa have undergone a mini-refresh with Douglas Luiz and Moussa Diaby the biggest departures - as Samuel Iling-Junior and Enzo Barrenechea join from Juventus - but still feel light on title-winning experience, despite the huge strides made."

  Archie Gray is Tottenham's biggest signing of the summer so far

  Last season's finish: Fifth (25 points below City) Tottenham started brightly last season under Ange Postecoglou and were five points clear at the top after 10 games - but then tailed off and finished outside the Champions League places. Teenagers Archie Gray (£30m from Leeds), Lucas Bergvall (£8.5m from Djurgarden) and George Feeney (undisclosed from Glentoran - signed for the under-18 team) are their only summer arrivals to date. South Korean teenage winger Yang Min-hyuk will join the squad in January. BBC Sport's Nizaar Kinsella said: "Manager Postecoglou will be the force driving Tottenham to believe they can finally take that next step and win silverware for the first time since 2008. "As ever, he won't want to limit Spurs' ambitions but qualification for the Champions League seems a more realistic target."

