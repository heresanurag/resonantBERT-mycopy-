title: 'Staines: Huge plume of smoke as fire engulfs tower block - BBC News'
date: '2024-06-27'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cy008ddgr42o
content: |-
  Surrey Fire and Rescue Service says eight fire engines are at the scene of the blaze.

  The fire is burning on top of a town centre building

  Firefighters tackled a fire in a Surrey town centre where a large plume of smoke was seen. The owner of the building said the fire, at the top of a 14-storey block, resulted from welding works being carried out on the roof. Surrey Fire and Rescue Service (SFRS) said eight fire engines had been on the scene of the fire in Staines town centre since 12:35 BST. The fire broke out near the Tothill multi-storey car park, in Elmsleigh Road, on a building that is currently under construction and not occupied.

  A large plume of smoke was seen rising into the sky

  Residents are being asked to avoid the area and keep windows closed. Surrey Police confirmed Thames Street was closed between South Street and Church Street and that the force was on the scene supporting the fire service. The fire service also said closures were in place on Riverside Gardens, Clarence Street and Staines bridge. A spokesman said the fire was now under control but firefighters expected to be on site for "a while longer". They said everyone was accounted for, while paramedics assessed four patients for smoke inhalation. One was taken to hospital for further treatment, a South East Coast Ambulance spokesperson said. They added that its hazardous area response team is at the scene.

