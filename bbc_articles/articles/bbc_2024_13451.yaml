  SFRS group commander Aaron Spencer said it was too soon to tell if the recent hot weather had played a part in starting the fire. Fire crews from London and Berkshire have been brought in to assist with the operation. The building is owned by Fairview New Homes. A spokesperson said the fire brigade was immediately notified and the whole construction site evacuated. They added: "We would like to thank the fire brigade for their swift and effective action as well as apologise to the residents and businesses of Staines for any concern or inconvenience caused." Spelthorne Borough Council said residents using the nearby Staines Community Centre had been safely evacuated.

  The fire is now under control, the fire service said

  There were reports from near the scene that a loud bang was heard in the area. Laura Purkess, who lives nearby, described hearing a bang from inside her house. She said: "It was like a 'boom' noise loud enough for me and all my neighbours to run out onto the street, and the roof was very much on fire already. "It started on one side and then spread across the entire roof. There were then a few more crashing sounds." A fire service spokesperson said there was no mention of a cause at this stage.

  Surrey Fire and Rescue Service said eight engines were fighting the fire

