title: MI5 joins Instagram to bust martini-drinking stereotypes - BBC News
date: '2021-04-22'
section: UK
url: http://www.bbc.co.uk/news/uk-56840811
content: |-
  The service's first post says the secret to successful spying is to "consider all angles".

  This is precisely not the sort of picture that will be posted on the MI5 Instagram account, as it seeks to move away from the "martini-drinking" stereotypes

  British security service MI5 is joining Instagram in a bid to increase transparency and rid itself of "martini-drinking stereotypes".

  The account, @mi5official, will host Q&As with serving intelligence officers and promote career opportunities.

  In an intriguing first post, the service said the secret to successful spying was to "consider all angles".

  MI5 boss Ken McCallum said "being more open" was key to MI5's approach to the 2020s.

  Urging people to follow the service, Mr McCallum added: "You can insert your own joke about whether we will be following you."

  Replying to its first Instagram update - which showed the secure "pods" used by MI5 staff to enter its London HQ - Home Secretary Priti Patel said: "Thank you for your exceptional work in keeping our country safe."

