title: 'North Wales crash: ''It''s too late for the boys, but may happen again'' -
  BBC News'
date: '2024-10-17'
section: UK
url: http://www.bbc.co.uk/news/articles/cj046rl130zo
content: |-
  The mum of one of four boys killed when their car came off a road says a fence could have changed everything.

  'It's too late for the boys, but may happen again'

  The four friends died in November 2023 while on a camping trip

  The mum of one of four boys who died when their car careered off a road during a camping trip said fencing must be restored as soon as possible to avoid another tragedy. An inquest on Wednesday concluded Hugo Morris, 18, Harvey Owen, 17, Wilf Fitchett, 17, and Jevon Hirst, 16, died as a result of a traffic collision in Gwynedd, north Wales, last November. The coroner has called for more restrictions on drivers who have recently passed their tests and is to issue a report for the prevention of future deaths concerning fencing or a safety barrier in the area where the boys died. Heather Sanderson, Wilf’s mum, said her “spirits were lifted” after seeing signage had been improved but much more needed to be done.

  The boys drowned when the silver Ford Fiesta they were travelling in left the A4085 in Garreg, Llanfrothen. The coroner has asked Gwynedd Council to provide within seven days, the details of the landowner responsible for the fence. The inquest heard Hugo lost control after taking the bend too fast, entered on to a grass verge, went down a steep embankment and then into a water-filled drainage ditch. A fence bordering the road had not been repaired since a previous accident and Mrs Sanderson said she and her family believed a more robust barrier could have saved the boys' lives. "If all of those circumstances arose again then there's a possibility that could happen again,” she said. "It's too late for Wilf and his friends. It's not beyond the realms of possibility that could happen again even with improved signage. "I want to know who owns that fence and I think it should be protecting that hazard."

  Two days rain meant the road was wet on the day of the tragedy

  Crystal Owen, mum of Harvey, is campaigning to introduce graduated driving licenses, which would place restrictions on new drivers aged between 17 and 19. Senior coroner for north west Wales Kate Robertson said she would also be writing to the Department for Transport about the issue. Mrs Owen told BBC Breakfast she was happy with the outcome from the coroner, but the government still needed to act. If introduced, there would be a minimum six-month learning period and 17 to 19 year olds would be prohibited from carrying passengers under the age of 25, with some exemptions. “Every young person will still be able to drive, it's not stopping them from going anywhere, it's just making sure they do it safely, and not being responsible for people’s lives when they're at most risk," she said.

  Wilf's mum described him as "kind" with a "lovely sense of humour"

  The friends from Shrewsbury, who were reported missing on the afternoon of 20 November, were found when recycling collector Sion Griffith and his colleague drove along the road at about 10:00 on 21 November. Post-mortem test evidence showed none of the teenagers had significant injuries but examinations of their lungs showed features of drowning. Ms Robertson, said the signage in the area would not have given adequate warning of the upcoming bend. Forensic collision investigator Ian Thompson told the court although the speed limit on the road was 60mph, the critical speed for the bend was 38mph. He said: "The vehicle has come into the bend a little bit too quickly and has under-steered."

  Bollards, additional road signs and chevrons have since been added to the road

  Mrs Sanderson paid an emotional tribute to Wilf, who was her youngest child. She described him as a bright boy who did well at his GCSEs and was enjoying studying at A-level. "I was very proud of Wilf, he was so kind and had a lovely sense of humour," she said. "He had many friends and a lovely girlfriend." He also played the guitar, liked music by King Krule and was intrigued by nature - always taking pictures of insects.

  Wilf was "fascinated" by woodlice, and took this picture of one recently, his mother said

  She added he loved animals, particularly his corn snake and pygmy hedgehog. "He loved and was loved by his sisters Freya and Danni," she added. Mrs Sanderson thanked the people of north Wales for "opening their hearts" to the family. "It has been a salve to our broken hearts," she said. "We want to thank the emergency services, mountain rescue and the staff of Ysbyty Gwynedd hospital who looked for Wilf and his friends, recovered them and cared for them until their families could be with them."

  Mrs Sanderson said Wilf snapped this picture on his walk to college

  The family also thanked North Wales Police for their "professionalism and compassion". "They have helped us bear the unbearable," she added. "As an older mum, I was fortunate to have Wilf at the age of 42, I will forever feel blessed to have loved him and been loved by him for 17 years. "I will miss him for the rest of my life."

