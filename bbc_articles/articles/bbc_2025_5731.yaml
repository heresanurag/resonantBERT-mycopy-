id: bbc_2025_5731
title: Rapper Offset announces Russia gig despite label's boycott - BBC News
date: '2025-03-08'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/clyd8rvq28zo
content: |-
  After the Ukraine invasion, Universal Music Group, which owns Offset's label, pulled out of Russia.

  Offset is best known as one third of US rap trio Migos

  Offset has announced he'll be playing an arena gig in Russia next month. The US-based rapper is set to perform at Moscow's MTC Live Hall on 18 April, confirming the show on his Instagram. Real name Kiari Cephus, Offset is signed to Motown Records, owned by Universal Music Group (UMG), one of a number of labels which announced it was suspending operations in Russia after it launched a full-scale invasion of Ukraine in 2022. BBC Newsbeat has contacted UMG and Offset's representatives for comment.

  Days after the Russian invasion, UMG released a statement, external saying it was "suspending all operations in Russia and closing our offices there". "We urge an end to the violence in Ukraine as soon as possible," a spokesperson said. "We are adhering to international sanctions and, along with our employees and artists, have been working with groups from a range of countries to support humanitarian relief efforts to bring urgent aid to refugees in the region."

  A number of other labels and promoters, including Live Nation, external, Warner Music Group, external and Sony Music, external took similar action. Many artists, including Green Day, Louis Tomlinson and Yungblud have cancelled planned gigs since the war started. However some have resumed shows there, most recently rapper DaBaby - signed to Interscope, also part of UMG - who posted updates on his Instagram from his Moscow gig last week. Some Russian musicians were also "blacklisted" over their anti-war views.

  The rapper was married to Cardi B until 2023 and they have two children together

  Offset found fame as part of rap trio Migos with tracks like Stir Fry and Bad and Boujee, and has been releasing solo music since 2017. Last year he completed his first solo headlining tour, following the release of his 2023 album Set It Off. The site selling tickets for his Moscow gig describes Offset, who used to be married to Cardi B, as "a showman who turns a concert into a theatrical performance". It goes on to say the rapper is "leaving the past behind and striving to become better - more confident, aware, and full of energy". The gig has not been confirmed by his label Motown Records and is not listed on his official website, but has been listed on a bespoke site for the event shared by Offset as well as the venue's site. Tickets are priced between 5,000 - 45,000 Russian roubles - about £40 - £400.

