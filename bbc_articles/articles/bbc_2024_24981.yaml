content: |-
  Figen Murray whose son died in the Manchester Arena attack says Martyn's Law will save lives.

  Figen Murray says she can see Martyn's law is finally coming to fruition

  The mother of Martyn Hett, who was killed in the Manchester Arena attack, has said a parliamentary debate around public safety laws is "massively important" and a "super big day". Referred to as Martyn's Law, the reforms require venues with a capacity of more than 200 to have a plan in place in case of an attack on their premises. The bill's second reading was "incredibly exciting", Figen Murray said, as it felt like "the beginning of the end of the campaign". Ms Murray said she was confident the legislation would save lives, which meant she would "know at some level that Martyn hasn't died for nothing".

  MPs later voted to back the proposals as part of the Terrorism (Protection of Premises) Bill, which will now face further scrutiny. Martyn's Law should balance "protection of life with protection of our way of life", Home Secretary Yvette Cooper said during the Commons debate. Ms Murray, whose 29-year-old son was one of 22 people murdered in the 2017 attack, told BBC Breakfast there was currently "no legislation - for any venue big or small - to keep people safe" as it was up to the individual venues. She said watching the debate in the public gallery was "incredibly exciting". "All this started with an online campaign and trying to get to 10,000 signatures," Ms Murray said. In response to more than 40 foiled terror attacks on UK venues since the Manchester bomb, she said: "We’ve been lucky 43 times but they only have to be lucky once. "Sooner or later one will be missed so we need this legislation to stop it happening."

  Martyn Hett was among 22 people murdered at the end of an Ariana Grande concert

  Under the proposals, training would be required for staff on "simple and low cost" procedures like identifying safe exit routes and locking doors and windows. Venues with a capacity of more than 800 people would be subject to greater requirements, including measures like CCTV or security staff. Ms Murray said the security measures were "not meant to be punitive or onerous, like some people may suggest, it literally is very proportionate". "The feedback we got is that there is actually either no cost or very low cost." "It's common sense, and at the end of the day you need to just do the right thing and keep your customers and staff safe," she said.

  Earlier this year, Ms Murray walked 200-miles from the site of her 29-year-old son's death to London to campaign for Martyn's Law. "Certainly I feel this is the beginning of the end of the campaign, although there's a bit to go still," she said. "I can see it's coming to fruition now, finally." More than 100 public venues - from McDonald's to the Slug & Lettuce chain - have signed a letter backing the bill. John Shepherd, of the Manchester music venue, Band on the Wall, said: "Martyn's Law will make people safer; that's the bottom line and that's why we are delighted to support Figen Murray and all those campaigning for change." Ms Murray told BBC Radio 4's Today programme it had been hard campaigning but "having your child’s ashes on a bookshelf is a good motivator". “I don’t want any other family member to be in this situation to have a relatives ashes on a bookshelf or have to visit a grave," she added.
