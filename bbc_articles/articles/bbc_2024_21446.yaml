title: 'Linkin Park: Chester Bennington''s son Jaime criticises reunion - BBC News'
date: '2024-09-10'
section: Culture
url: http://www.bbc.co.uk/news/articles/c23ljk89rzpo
content: |-
  Jaime Bennington says his father's contribution to the rock group is "being erased in real time".

  Linkin Park announced their new line-up, featuring singer Emily Armstrong, last week

  Jaime Bennington, the son of late Linkin Park lead singer Chester Bennington, has criticised the band for replacing his father with musician Emily Armstrong. In an Instagram post, Jaime claimed the band's founder, Mike Shinoda, had "quietly erased my father's life and legacy in real time" by introducing Linkin Park's new line-up last week. Shinoda has said he knows "many people will take time to wrap their heads around" the change, and "if people are respectfully not there yet, I'm totally fine with that". Jaime Bennington also referenced accusations about Armstrong's ties to Scientology, and her alleged support of actor Danny Masterson during his 2020 rape trial. Armstrong previously issued a statement distancing herself from the actor, saying she had not spoken to him since a preliminary hearing revealed "unimaginable details" of his crimes. He was later found guilty.

  On Instagram, Jaime Bennington said fans were "having a hard time wrapping their heads" around her recruitment. He said the band had "failed to address the concerns of their diverse fan base" after the allegations emerged, and said they had "betrayed the trust" of their followers. In a long series of video posts, Bennington also accused Shinoda of blocking him on social media, and said the band had failed to inform him of their reunion. "They didn't come to me with this announcement, they didn’t ask me how I felt, they didn’t offer me a ticket," he said.

  Jaime Bennington is one of Chester's six children

  Armstrong was previously known as the frontwoman of LA rock band Dead Sara. She made her live debut with Linkin Park at a performance on Thursday alongside new drummer Colin Brittain. The concert coincided with news of the band's first new music since Bennington's death from suicide in 2017; and a world tour. Almost immediately, however, Armstrong was questioned over her support of Masterson. In an Instagram post, Mars Volta singer Cedric Bixler-Zavala wrote: "Do your fans know about your friend Danny Masterson? Your rapist friend." The singer's wife Chrissie Carnell-Bixler was one of several women who accused Masterson of sexual assault. The actor, best known for his role in That 70s Show, was cleared of those allegations, but was sentenced to 30 years to life in prison last September after being found guilty of two other charges of rape.

  Emily Armstrong found fame with the band Dead Sara in the 2010s

  Armstrong issued a statement over the weekend, saying she wanted to "clear the air about something that happened a while back". "Several years ago, I was asked to support someone I considered a friend at a court appearance, and went to one early hearing as an observer," she explained. "Soon after, I realized I shouldn't have. I always try to see the good in people and I misjudged him. I have never spoken with him since." Linkin Park did not comment on the accusations, a situation which Jaime Bennington characterised as disrespectful. "When something happens, take accountability for what you did," he said. "Imagine if Mike Shinoda came out now and said, 'You know what guys, I’m sorry. This was a little poorly planned. It didn't go the way I wanted it to... But I do care about you and I do see how it impacts you and I apologise. Let me make it up to you. Let me talk to Emily. Let's not move forward until we figure this out'. "But that’s not what's happening," he said. "He doesn't care to give an official statement about the impact of hiring someone like Emily."

  At around the same time as Bennington was posting on Instagram, Shinoda spoke to fans on his Discord channel, acknowledging the public reaction to Armstrong's hiring. "Seeing me and Em together, shoulder to shoulder, brought up SO many feelings for people in our crew and management," he wrote. "Happy and sad at the same time. So complex." However, he warned fans to be careful with the tone of their comments. "Disrespect me and you will lose my respect in return."

  Linkin Park's guitarist, Brad Delson, will no longer play with the band

  Separately, Linkin Park's lead guitarist Brad Delson has announced that he won't be playing with the band on their comeback tour. Delson, who was one of the original members in 1996, shared a statement saying he prefers to work "behind the scenes - in the studio, collaborating on our new music, and helping build our live show". As such, his place will be taken by guitarist Alex Feder for the forthcoming live shows. He added that Armstrong has his full support and highlighted her "talent, passion, and partnership" while making the band's new album.
