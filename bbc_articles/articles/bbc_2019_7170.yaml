id: bbc_2019_7170
title: '''Hero'' 17-year-old catches falling toddler - BBC News'
date: '2019-06-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-48781526
content: |-
  Feuzi Zabaat was working nearby when he caught a two-year-old girl as she fell out of a window.

  Syrian toddler Doha Muhammed stumbled out of an open second floor window while her mother was cooking.

  Luckily, Mr Zabaat saw her from the street and was able to catch her without any injuries.

  The incident took place in Istanbul, Turkey.
