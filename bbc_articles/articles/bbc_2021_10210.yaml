title: 'Mumbles: Boy, 12, in hospital after open-top bus crash - BBC News'
date: '2021-08-11'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58172145
content: |-
  Several other people also sustained minor injuries after the sight-seeing bus crashed.

  There were a number of injuries following the crash

  A 12-year-old boy remains in hospital after an open-top bus hit a tree in Mumbles.

  The crash happened at Mumbles Road, near Knab Rock, at about 14:30 BST on Tuesday and the road was shut for several hours but has since reopened.

  The boy was air-lifted to University Hospital Wales, Cardiff, where he is being treated. His injuries are not life threatening.

  Another person was taken to Morriston Hospital in Swansea.

  Seven other passengers were assessed and discharged at the scene and nobody sustained any life-threatening or life-changing injuries, South Wales Police said.

  Photographs from the scene show the damage to the bus

  Cheryl Hedges, from Mumbles, was on the top deck of the bus when it crashed.

  She said: "Suddenly, I heard screaming. There were about 14 of us on the open-top - about half were children."

  "I looked across and the young lad across the aisle from me was trapped."

  Ms Hedges said a bystander then got on the bus to help rescue those on the top deck.

  "We got help to climb through this smashed window and we were able to get down the stairs," she said.

  She said she had a black eye and cuts on her hands, but was discharged by paramedics at the scene.

  The bus involved was one of First Cymru's "Cymru Coasters"

  Scaffolder Jonathan Powell, who was in front of the bus when it crashed, helped rescue people who were trapped before the emergency services arrived.

  "As soon as I heard the bang I just turned around, seen the bus with its roof like that and I just run straight to it and just lifted the roof up for people to get out," said the 36-year-old from Merthyr Tydfil.

  "Another gentleman got them through the gap while I held the roof up so everyone could get off."

  Mr Powell, who was then trapped under the roof himself until the fire service arrived on the scene to free him, sent his best wishes to the 12-year-old boy who remains in hospital.

  "I'm hoping that he gets better soon," he said.

  Passer-by Jonathan Powell raced to the bus to help the trapped passengers

  The bus involved was one of First Cymru's "Cymru Coasters", operating between Swansea Bus Station and Bracelet Bay, near Mumbles Pier.

  Jane Reakes-Davies, managing director at First Cymru, said: "We are deeply saddened to hear of those who sustained injuries in yesterday's incident in Mumbles and wish them a speedy recovery.

  "I'd like to thank our driver, customers and passers-by for their quick action and efforts in evacuating the bus and alerting the emergency services.

  "The safety of our passengers and colleagues is our priority and we remain committed to the highest standards to ensure our customers can travel with confidence."

  First Cymru said it was working with emergency services and authorities to investigate the crash.

  Swansea council said there had been no previous problems on the route, but would not comment further while a police investigation was ongoing.

  "Our thoughts continue to be with the passengers at this time," a spokesman added.
