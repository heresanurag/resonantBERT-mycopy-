title: Body found in search for missing North Shields teenager - BBC News
date: '2020-09-01'
section: Tyne & Wear
url: http://www.bbc.co.uk/news/uk-england-tyne-53989406
content: |-
  Formal identification has yet to take place but police believe the body to be that of Seesha Dack.

  Seesha Dack was last seen on Sunday evening

  Police searching for a 15-year-old girl who has been missing for two nights have found a body.

  Seesha Dack left her North Shields home at 17:00 BST on Sunday to meet friends, but did not return home, sparking a major search operation.

  A body has been found in the Tanners' Bank area of North Shields.

  Formal identification is yet to take place but police said they believe the body to be that of Ms Dack and her family has been informed.

  There is not at this stage thought to be any third party involvement and a report will be prepared for the coroner.

  Tanners' Bank has been sealed off with a police cordon

  Supt Barrie Joisce, of Northumbria Police, said: "This is an extremely sad conclusion to an extensive investigation.

  "Specialist officers are currently supporting Seesha's family during this incredibly difficult time and our thoughts are with them.

  "We will continue to carry out inquiries to establish the circumstances around the death but at this stage we do not believe there to be any third party involvement."

