title: 'Prostate cancer: Rapid at-home PSA tests spark concerns - BBC News'
date: '2025-03-05'
section: Health
url: http://www.bbc.co.uk/news/articles/cgl00gn15y8o
content: |-
  Testing for PSA protein can indicate whether a man is at risk of prostate cancer.

  At-home tests for men worried about prostate cancer can give inconsistent and inaccurate results, BBC News has found. The tests, which resemble a Covid lateral flow strip, turn positive if a high level of a protein called PSA is detected in a drop of blood. Of five rapid tests analysed by the BBC, one did not work, three were negative or all-clear, but one returned a false positive result - all from the same blood sample. Prostate Cancer UK said it had significant concerns about the sale of the tests given their "questionable accuracy" and the absence of a doctor to interpret the results.

  There is no national prostate cancer screening programme in the UK, unlike for breast, bowel and cervical cancer. Instead, the onus is on men to request a blood test from their GP once they are over 50 years old, external, or from 45 for higher risk groups. That NHS test, which is processed in a laboratory, measures the level of PSA released by the prostate, a small gland involved in the production of semen. A high PSA level does not mean you have cancer but is a warning sign which can then lead to further scans and tests to rule out the disease. PSA levels can be high for a number of other reasons - including an infection, recent vigorous exercise or sex - or in some rare cases remain normal despite cancer.

  Of the five tests analysed by the BBC, one did not work, three were negative but one (left) returned a clear positive result

  Google search data suggests interest in testing has risen sharply since the Olympic cyclist Sir Chris Hoy went public with his own diagnosis in October 2024. Dozens of companies now sell self-testing kits designed to measure PSA levels. They are available online and from some pharmacies and convenience stores with prices from £6 to £95. They come in two main types:
  • None tests in which a blood sample is taken at home and posted to a private laboratory for analysis
  • None rapid tests which give a result in minutes and display a dark line if PSA is detected above a certain level The BBC analysed five rapid tests all bought online from different companies, using a blood sample taken on the same day. The UK medicines regulator, the MHRA, says in its guidance that over-the-counter PSA kits are "not a reliable indicator of prostate cancer" and must not "claim to detect cancer". Instead, some at-home tests are marketed online as a way to "screen" for the disease, language the regulator says would be acceptable under the current rules. Others are sold to "monitor prostate health" or identify "potential prostate issues early". One of the home tests ordered by the BBC also arrived in packaging and with instructions clearly marked "for professional use only".

  For someone with no medical experience, the kits can be difficult to use. A disposable lancet must pierce the skin, before drops of blood can be sucked into a pipette, mixed with a chemical and placed in the test cassette. Of the five kits analysed by the BBC, one did not produce a readable result; three came back all clear; but one did show a solid dark line, indicating a PSA level above 4.0 ug/l. A private blood test taken the same day and sent to a laboratory showed a much lower reading of 0.27 ug/l. "As your experience shows, these rapid tests appear to have questionable accuracy," says Amy Rylance, assistant director of health improvement at Prostate Cancer UK. "That's a big problem because they can falsely reassure people who really do have elevated levels of PSA and should seek further testing, or they can cause undue worry among people who are absolutely fine." Online reviews appear to bear that out. In one, a customer posted that he was "really scared" after two rapid home tests indicated a high PSA level. A later NHS test showed his reading was normal. In another one-star review, a woman wrote that her husband took two home tests for "peace of mind" and both were negative. An NHS blood test then showed high levels of PSA and he was diagnosed with stage four prostate cancer. The British In Vitro Diagnostics Association, which represents the blood testing industry, says that while home tests are appropriate in many circumstances, "this particular type of [PSA] test may not give an accurate indication of prostate health when taken outside the NHS". Instead it says men concerned they may have cancer should see their GP.

  Dr Sam Merriel, a GP and prostate cancer researcher, says patients "may not get the full picture" from at-home PSA tests

  In the NHS, doctors often use PSA testing as part of a wider consultation about prostate health, bringing in other risk factors like age, ethnicity and family history. Dr Sam Merriel, a GP and prostate cancer researcher at the University of Manchester, says a full NHS laboratory test can give a far more detailed picture than a cheap home kit that is either positive or negative. "The actual PSA reading is really important to understand because, as a GP, if I saw a PSA of 4.0 I'd be treating that very differently from a PSA of 400," he adds. "You just don't get that level of information from a fast home test, so patients might not get the full picture."

  Prostate Cancer UK describes the growth of home testing as "the symptom of a wider problem". "Too many men still don't realise they can access tests through a GP and the guidelines for doctors are dangerously outdated," says Amy Rylance from the charity. Sir Chris Hoy has been calling for the age to be lowered at which those at higher risk, such as black men or those with a family history, can ask their GP for PSA testing. The government says current guidelines should not stop doctors from offering a test under the age of 50, but critics say the rules are unclear and there are huge variations in diagnosis rates between GP surgeries. Prostate Cancer UK has also been calling for a change to allow medics to proactively talk to higher risk patients about the pros and cons of testing instead of waiting for them to come forward. A spokesman for the Department of Health says it has asked the UK National Screening Committee, which advises the NHS, to review the evidence on testing, with a response expected later this year. "Prostate cancer patients are waiting too long for diagnosis and treatment but through our National Cancer Plan we will transform the way we treat cancer," he added.

