id: bbc_2020_8491
title: Myanmar jade mine landslide captured on video - BBC News
date: '2020-07-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-53260841
content: |-
  Footage shows a wall of mud crashing into a lake at a jade mine in Myanmar, killing more than 160.

  More than 160 people have died after a landslide at a jade mining site in northern Myanmar.

  A wave of mud triggered by heavy rain engulfed those collecting stones in the Hpakant area of Kachin state.

  Myanmar is the world's biggest source of jade but its mines have seen numerous accidents, many involving people who scavenge for stones.
