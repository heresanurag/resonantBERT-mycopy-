id: bbc_2021_2061
title: Mother drops children from window to escape Istanbul apartment fire - BBC News
date: '2021-02-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-56218287
content: |-
  The four children were all caught by volunteers holding a blanket on the street in Istanbul.

  A mother in Istanbul was forced to drop her four children from their apartment window to save them from their burning building.

  The fire broke out at the entrance to the family's flat, causing the parent to take drastic action before firefighters arrived.

  The children and their mother all survived.
