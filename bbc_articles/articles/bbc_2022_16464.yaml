title: 'Mayfair restaurant fire: Guests flee after Christmas decorations catch alight
  - BBC News'
date: '2022-12-18'
section: General
url: http://www.bbc.co.uk/news/uk-64010597
content: |-
  Dramatic video shows flames inside the MNKY HSE restaurant in London's Mayfair as guests rushed to get outside.

  Video shows panicked guests at the MNKY HSE restaurant in London's Mayfair fleeing after Christmas decorations caught alight.

  London Fire Brigade said the fire had been extinguished before firefighters arrived on Friday night.

  Three people were taken to hospital by the London Ambulance Service.
