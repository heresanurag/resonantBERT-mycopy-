title: BBC Verify examines reported strikes on Russian oil depots - BBC News
date: '2024-04-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-68893589
content: |-
  The reported strikes have been geolocated to the Smolensk region of western Russia.

  Fires broke out at multiple oil depots in Russia after reports of Ukrainian drone strikes on Wednesday morning. BBC Verify has geolocated these incidents to the Smolensk region in western Russia.

  BBC Verify's Olga Robinson analyses the footage, as well as other sites targeted in Russia since January.
