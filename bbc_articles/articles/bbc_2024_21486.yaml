title: 'Adrian Newey: Aston Martin confirm signing of Formula 1 designer - BBC Sport'
date: '2024-09-10'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/c3rdgl74z5eo
content: |-
  Adrian Newey has designed championship-winning cars for Williams, McLaren and Red Bull

  Adrian Newey says he has joined Aston Martin to help lead them to the Formula 1 World Championship. The 65-year-old designer's new contract, with the title of managing technical partner, was announced on Tuesday at the team's F1 base at Silverstone. Newey, regarded as the greatest F1 designer in history, has also become an Aston Martin shareholder. The team did not initially reveal the length of the deal, but BBC Sport has been told it is a five-year contract worth up to a possible £30m a year, including bonuses and add-ons. That figure, barring Dutchman Max Verstappen and the British pair of Lewis Hamilton and Lando Norris, is believed to be more than all the drivers are earning. And according to business magazine Forbes, Newey would only be behind Anthony Joshua, Rory McIlroy and Tyson Fury in terms of other British sporting figures. Newey said he was "hugely inspired and impressed by the passion and commitment" of team owner Lawrence Stroll. The Canadian billionaire has already invested hundreds of millions in a new factory, including a state-of-the-art wind tunnel, and secured a factory engine partnership with Honda from 2026. The Japanese company have supplied Red Bull, the current world champions, since 2019. Aston Martin also have two-time world champion Fernando Alonso under contract until the end of 2026. The team's other driver is Stroll's son Lance. Stroll described Newey's arrival as "a huge day, the most exciting day in the team's history". Alonso said: "It's an incredible day for the team. Lawrence's vision is taking shape with this building, Honda, Adrian - this is definitely the team of the future and for me it is going to be an incredible opportunity professionally to work with Adrian."

