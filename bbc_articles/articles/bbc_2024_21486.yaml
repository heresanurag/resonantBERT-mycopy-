  Newey, regarded as the greatest F1 car designer in history, said Lawrence Stroll "is determined to create a world-beating team". "He is the only majority team owner who is actively engaged in the sport," he added. "His commitment is demonstrated in the development of the new AMR Technology Campus and wind tunnel at Silverstone, which are not only state of the art but have a layout that creates a great environment to work in. "They have all the key pieces of infrastructure needed to make Aston Martin a world championship-winning team and I am very much looking forward to helping reach that goal." Newey will start work for Aston Martin from early March next year and he said he would be full time, which is a contrast to his previous role at Red Bull who said he was spending about half his time on F1. Newey said: "Once I start I will be fully in. I need to be, I have to be. "This is something different. It is that fresh challenge, new stimulation, and so I always do what I feel is needed for the best of the team." He will join forces with a team of engineers in which Stroll has already invested heavily. The team's technical director is Dan Fallows, an aerodynamicist who worked under Newey at Red Bull from 2006-2021. Former Mercedes engine chief Andy Cowell, who masterminded the building of the standard-setting engine in F1's hybrid era, joins as chief executive officer on 1 October. And former Ferrari chassis technical director Enrico Cardile will start as chief technical officer at an unspecified date in 2025. Stroll said Newey would be "the leader" and that signing him was "the biggest part of the puzzle from the technical leadership point of view". He added: "He will be leading the team and that will have a trickle-down effect through the whole organisation."

