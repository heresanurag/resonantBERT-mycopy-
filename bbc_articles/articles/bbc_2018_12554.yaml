title: Tories applaud Digby Jones's attack on Boris Johnson - BBC News
date: '2018-10-01'
section: General
url: http://www.bbc.co.uk/news/uk-politics-45700829
content: |-
  Former CBI chief Sir Digby Jones attacks Boris Johnson for his attitude to business, in a speech to the Tory conference watched by Theresa May.

  Former CBI chief Sir Digby Jones - who voted for Brexit - attacks Boris Johnson for his attitude to business, in a speech to the Tory conference watched by Theresa May.

  He also hails the prime minister for standing up to EU "bully boys" who criticised her Chequers plan for post-Brexit trade.
