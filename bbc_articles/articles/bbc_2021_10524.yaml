  Earlier in the week, Jason Kenny had tipped team-mate Carlin for a medal in the individual sprint and that prediction came good in the bronze medal race. The Scot had earlier lost in two legs to Dutch world champion and eventual gold medallist Harrie Lavreysen in the semi-finals, meaning he would take on Denis Dmitriev of the Russian Olympic Committee in the race for the final step on the podium. Carlin comprehensively beat the Rio 2016 bronze medallist in the first race, crossing the line almost half a second before Dmitriev. The second race, however, was much closer, Carlin just holding on to pip his opponent to the line by 0.015 seconds. "Tough day today," he said. "I didn't feel like I had the same legs as yesterday but I gave it my all and managed to come away with something." Carlin took up cycling after breaking both ankles while playing football, needing a non-contact sporting option during his recovery, only to go on to break his wrist on his first track session. Lavreysen beat compatriot Jeffrey Hoogland over three legs in the gold medal race.

