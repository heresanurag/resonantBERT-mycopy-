content: |-
  Laura Kenny and Katie Archibald win Olympic madison gold before Jack Carlin wins sprint bronze.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tokyo Olympics: Laura Kenny and Katie Archibald win historic gold in the women's madison

  Laura Kenny became the first British woman to win gold at three Olympic Games as she and Katie Archibald were crowned madison champions in Tokyo. Kenny, 29, also becomes GB's most successful female athlete with her fifth gold and sixth Olympic medal. "I've never wanted to win a medal so much in all my life," said Kenny, the most successful female Olympic cyclist. Jack Carlin then won individual sprint bronze for his second medal of the Games and Team GB's fifth on the track. He won team sprint silver earlier in the week alongside Jason Kenny and Ryan Owens, while Laura Kenny and Archibald won team pursuit silver. Their madison gold on Friday follows Matt Walls' victory in the men's omnium the previous day. The women's madison was added to the Olympic programme for the first time at Tokyo 2020. "I messaged [husband] Jason and said I feel like my Olympics ends today," said Kenny. "I love the team pursuit but I felt relief when it was over because this was the one race I wanted to win - I just feel so relieved." Archibald added: "I've been dreaming about having this conversation - I've never wanted something so much, I've never been so nervous but we've been so clinical with our approach. "We had a change of coach last year for this event. We're going for the all round and trying to spread between events and it feels so satisfying for it to come off."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Archibald won World Championship madison gold in 2018 before she and Kenny teamed up for European silver in the event the following year. But their performance in Tokyo was a masterclass in madison racing, winning the three opening sprints of the 120-lap, 30km race. In total, they won 10 of the 12 sprints on offer and gained a lap - earning 20 points - alongside Denmark and the Russian Olympic Committee, who won silver and bronze respectively. But such was Kenny and Archibald's dominance that they finished with more than double the Danes' points, Amalie Dideriksen and Julie Leth ending their race on 35 points while the ROC had just 26. Dutch world champions Amy Pieters and Kirsten Wild finished off the podium, forced to settle for fourth after being involved in a crash. Kenny and Archibald credited coach Monica Greenwood - who took over coaching the endurance squad in December - for their win, revealing they had been training against GB's men's under-23 squad to perfect their madison plan. Kenny's gold was her first as a mother, having welcomed son Albie in August 2017. "All week I've been saying please don't ask me about Albie - I've never missed him so much," she told BBC Sport. "But I couldn't do it without these girls. With Katie I feel like I'm racing with a sister - I'm so grateful to have her here and her support. I couldn't have done it without her." She later said: "When I fell pregnant, there was a moment two months into the pregnancy where I woke up and said to Jason 'I can't do this, I'm not going to be able to carry on [with cycling], there's just no way.' And here we are."

