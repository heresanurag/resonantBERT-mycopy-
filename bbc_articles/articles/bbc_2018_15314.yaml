title: Struggling with universal credit in Hartlepool - BBC News
date: '2018-12-20'
section: General
url: http://www.bbc.co.uk/news/uk-46627877
content: |-
  Hartlepool has been one of the towns hardest hit by the welfare reforms of the last decade.

  Universal credit was designed to simplify the benefits system, but its introduction has seen some people worse off, and some have had difficulty claiming their money.

  Hartlepool is home to some of those who have faced the most difficulties with the new system.

  Read More: What's the problem with universal credit?
