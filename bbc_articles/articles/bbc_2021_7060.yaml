title: 'Euro 2020: Disappointment as Scotland lose opening Euro match - BBC News'
date: '2021-06-14'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-57438349
content: |-
  The national men's team's first major tournament game since 1998 ended in a 2-0 defeat at Hampden.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland fans have seen their team's first appearance in a major tournament in 23 years end in a disappointing 2-0 defeat.

  About 12,000 people were in Hampden Park in Glasgow to watch the Euro 2020 match against the Czech Republic.

  A further 3,000 people watched from a fan zone in the city, while many tuned in to the TV from home or in pubs.

  But goals in either half from the Czech Republic's Patrik Schick left the Tartan Army crushed.

  Steve Clarke's men now sit bottom of Group D and will play England in London on Friday.

  First Minister Nicola Sturgeon tweeted a tearful emoji but added: "Onwards and upwards though...next stop Wembley."

  They are due to play England on Friday, before returning to Hampden for the final group game against Croatia on 22 June.

  Richard Templeton, 33, a lawyer from Edinburgh, said he felt "dejected" by the defeat.

  He said: "They tried their best. They are going to beat England so I'm not so worried about this match."

  He said he took the day off work to watch the game in a pub in the capital but was still optimistic Scotland would qualify.

  Richard Templeton (left) and Ally Atha watched the match in Edinburgh

  Ally Atha, 34, a marketing manager from Edinburgh, also watched the match in a pub. He said: "I feel crestfallen. I thought they were going to win.

  "I have no hope now for the tournament... all my optimism is deflated, but it's good to be here."

  Fellow Tartan Army fan John Allardice felt Scotland manager Steve Clarke should take much of the blame for the result.

  He said: "Poor team selection and a negative mentality gets you exactly what you deserve. Really hoping the manager will make bolder choices for the England game, even if we get a pasting.

  Scotland fans react to the opening goal in the Glasgow fan zone

  Malcolm MacKenzie said the result reminded him of the disappointment of watching Scotland at the World Cup in Argentina 43 years ago.

  He said: "It will be the same as Ally McLeod not playing an in-form Souness in Argentina in 1978 - lose the first two games and be out before he plays Billy Gilmour in the Croatia game, and he plays out of his skin and Scotland win at a canter."

  Scotland supporters in the Glasgow Green fan zone said the atmosphere was "unbelievable" and a far better option than watching the game in a pub.

  Concerns had been raised about the safety of the event amid the pandemic and rising case numbers in Glasgow.

  But Eddie Smith, 25, from Dunfermline, said: "It needed to go ahead here and it's unbelievable it has. The security is great, everyone is sitting down, spaced apart.

  "If you didn't have this, everyone would be firing into a pub or a flat, with a lot more than six people."

  Supporters outside the fan zone before the match

  Supporters delivered a rousing rendition of Flower of Scotland on Glasgow Green

  James Hill, 26, was joined by his friends Steven Thistleton, 25, and Ross McArthur, 19, at the outdoor event.

  He said: "It's basically a massive beer garden, although I was a bit shocked that it's £13 for a pizza. Pints are £6 which is all right.

  "We've not come into close contact with anyone outside our group, everything's getting brought to us.

  "If you weren't here you would be in a pub or a flat, and they've got track and trace and security so it's brilliant."

  Where did you watch the match? At school, work or home? Or did you head to Hampden or the fan zone? Please share your stories and pictures with us.

