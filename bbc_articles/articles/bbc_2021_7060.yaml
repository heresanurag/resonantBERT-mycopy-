  The timing of the game clashed with the normal school day but thousands of pupils across the country were given dispensation to watch Scotland's opener.

  People watching in pubs had to observe social distancing and they were told they should not leave their seats to stand in front of TVs, or shout or sing.

  Those watching at home were subject to Covid restrictions on the number of people who can gather.

  In level one and two areas, up to six people from three households can meet up indoors, while in the island communities in level zero, the limit is eight people from four households.

  Scotland fans enjoyed the build-up to the game at Hampden

  Among Scotland's youngest supporters are three-year-old Baxter MacKenzie and six-week-old Magnus Lawson

  Yes Sir, I Can Boogie has become an anthem for Scotland fans since the team secured qualification for Euro 2020 following a nail-biting penalty shoot out over Serbia last year.

  Video of the Scotland team's joyful dressing room dance to the song went viral in the hours after the match.

