content: |-
  The pair will take part in the London Marathon and are hoping to beat the current handcuff record.

  A couple from West Yorkshire are making an ambitious bid to break the Guinness World Record for fastest marathon run while handcuffed together.

  Rebecca and Nuno César de Sá, from Burley in Wharfedale, are in training for the London Marathon and are hoping to beat the current record of four hours.
