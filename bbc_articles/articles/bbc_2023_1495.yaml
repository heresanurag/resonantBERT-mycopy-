title: 'UK weather: Snow and ice warnings as cold snap set to continue - BBC News'
date: '2023-01-16'
section: UK
url: http://www.bbc.co.uk/news/uk-64284255
content: |-
  A widespread frost is expected overnight, which could see temperatures drop as low as -4C.

  People on an early morning walk in the snow near Hexham

  Parts of the UK have been hit with snow and ice, amid warnings the cold weather is set to stay.

  Yellow weather warnings for snow and ice are in place for Northern Ireland, northwest England and north Wales from midday until 12:00 GMT on Tuesday.

  Drivers were warned to leave extra time for morning commutes due to icy roads, with more travel disruption expected.

  A sharp widespread frost, with lows of -4C to -8C, is expected overnight into Tuesday.

  Snow has hit south-east England and a yellow warning for snow and ice is in place for Scotland until Wednesday.

  The Met Office said snow showers and icy conditions might "bring some disruption" and warned it could lead to longer journeys for train passengers and drivers.

  BBC forecaster Billy Payne said a few centimetres of snow had fallen in parts of Scotland and northern England overnight, even on low ground - with 18cm (7in) recorded at Loch Glascarnoch in Scotland.

  Further frost and ice risks are expected over the next few nights and daytime temperatures should stay low, he said.

  But BBC forecasters said major weather disruption, like in December, was not expected.

