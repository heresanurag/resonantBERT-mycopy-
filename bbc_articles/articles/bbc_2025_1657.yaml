  Five things we learned in the LA case - including the stoicism of Rocky's longtime partner and fellow artist.

  Rihanna unwavering in support, and other takeaways from A$AP Rocky trial

  This video can not be played To play this video you need to enable JavaScript in your browser.

  It was a trial that could have dismantled the future for one of hip-hop's hottest stars. The felony assault trial of A$AP Rocky - in which he was found not guilty of firing a gun at a former friend - captured global headlines. There were outbursts during the proceedings and surprise visits in court by his longtime partner, singer Rihanna. Jurors in Los Angeles heard three weeks of testimony chronicling the bitter falling-out of childhood friends and the fight that led to the rapper, whose real name is Rakim Mayers, being charged on accusations he opened fire in the middle of a Hollywood street. After the rapper was acquitted, he left freely with singer Rihanna, who was seated behind him as the verdict was read. Here are five big things we learned while inside the courtroom.

  The couple locked arms outside the courthouse after the rapper's acquittal

  As the not guilty verdict was read in court, the rapper immediately jumped from the defence table and leapt over a wooden barrier to hug Rihanna, who was seated behind him in between his mother and sister. The couple embraced tightly, both breaking into tears as the courtroom erupted in cheers. Rihanna, a Grammy award-winning artist, was in court multiple days during the trial, including on Valentine's Day. On one of the days in court, she brought the couple's two young children, who were both dressed in suits with pacifiers in their mouths. You could hear them cooing inside the courtroom as they flipped through children's books. Joe Tacopina, the rapper's defence attorney, said Mr Mayers tried to shield Rihanna and their family from the criminal proceedings, but said that "wild horses couldn't keep her away" from the trial. Though she was often stoic and staring straight ahead while in court, she never flinched or showed emotion when prosecutors made negative comments about her partner. Following his acquittal, Rihanna expressed her gratitude on social media, stating, "The glory belongs to God and God alone! Thankful, humbled by his mercy!"

  The A$AP Mob is a hip-hop collective founded in 2006 in Harlem by a group of high school friends in New York. They adopted the "A$AP" title, which means "Always Strive and Prosper". The group, which has had more than 20 members over the years, have presented themselves as a family, but they've been plagued by jealousy, rivalries and disagreements since the death of its founder, A$AP Yams. Though there have been fallouts and issues between some members, this trial is the most notable instance of a complete dismantling of a relationship between members. A$AP Relli, whose legal name is Terell Ephron, was once a close friend and member of the Mob, accused Mr Mayers, known as A$AP Rocky, of shooting him during an altercation in 2021. During the trial, his defence team argued that Mr Ephron harboured resentment toward his former friend, feeling sidelined as A$AP Rocky's fame grew and saw mainstream musical success. They argued Mr Ephron was after money. Several members of the A$AP Mob testified during the trial in favour of Mr Mayers. A$AP Twelvyy challenged Mr Ephron's account of the events and suggested that he was the aggressor during the altercation, not Mr Mayers. A$AP Lou also took the stand, telling jurors that a Glock 43 magazine found during a search of Mr Mayers's home belonged to him, not the rapper. None of the A$AP members publicly testified for Relli.

  Do you know what AWGE stands for? If you know, I think both me and the jury would love to still know. During the trial, AWGE came up when A$AP Twelvyy was on the stand. He was asked by prosecutors about its meaning. But before he could answer, A$AP Rocky - who was seated with his attorneys - cut in and shouted, "Don't say!" Twelvvy abided and responded, "I just know it's AWGE". It was an astonishing moment. Criminal defendants don't typically say much during trials - let alone halt a witness from answering a question during their criminal trial.
  • None A$AP Rocky not guilty of firearm assault on LA street

  When asked about this exchange after the trial, A$AP Rocky's attorney Joe Tacopina explained what happened. He said it was an "acronym for his company that had to do with his family. I'm gonna leave it at that." Mr Tacopina went on to explain it was a private thing that the rapper didn't want revealed publicly to millions, especially in a criminal court case. But the answer really led to more questions. What does it mean and why is it so secretive? Here's what we do know: AWGE is the name of A$AP Rocky's mysterious creative collective and record label, and it's long been the subject of intrigue. Founded in 2014, the group operates across music, fashion and art, collaborating with brands like Mercedes-Benz and PacSun. Members include artists, designers and directors, and everyone remains loyal to one rule: no one publicly reveals what "AWGE" actually stands for. On the company's website there are two rules listed: "#1 Never reveal what AWGE means. #2 When in doubt always refer to rule #1." A$AP Rocky's fans do have some guesses though:
  • None "A$AP Worldwide Global Enterprises" – A possible nod to the A$AP Mob's broader brand and business ambitions.
  • None "Ain't Wanna Go Explicit" – This suggests that AWGE represents an inside joke or personal mantra within Rocky's circle.
  • None "All We Got is Everything" – A phrase that aligns with Rocky's philosophy of creativity and collaboration.
  • None "A$AP Worldwide Genius Elite" – Another theory that frames AWGE as a highly curated group of artists and visionaries. Despite the guesses, the rapper and his team have never officially confirmed any meaning. Instead, they've leaned into the secrecy, with members often responding to questions about AWGE with the phrase, "If you know, you know."

  A$AP Rocky's trial unfolded at a pivotal moment in his career, with the rapper riding a wave of creative and commercial success. The rapper is set to release his first solo album in nearly a decade and is scheduled to co-headline Los Angeles' Rolling Loud festival in March 2025. Additionally, he is starring in a summer blockbuster alongside Denzel Washington. Director Spike Lee's upcoming film "Highest 2 Lowest" is slated for a summer release. But his influence extends beyond music—his AWGE collective has been collaborating with brands like Mercedes-Benz and Puma. He's been celebrated for his fashion sense, too, and is known as being one of music's best-dressed men. In May, he is set to co-chair the 2025 Met Gala - one of fashion's biggest nights - alongside big names like Anna Wintour, British race car driver Lewis Hamilton, singer Pharrell Williams and basketball superstar LeBron James. His relationship with Rihanna, one of the most famous singers, has further cemented his cultural relevance. The couple welcomed their second child, Riot Rose, in August 2023, and their growing family had become a symbol of hip-hop royalty.

