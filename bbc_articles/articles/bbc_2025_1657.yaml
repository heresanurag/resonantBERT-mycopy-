  The trial wasn't just a battleground for the rapper's freedom—it also saw intense clashes between legal teams. Celebrity defence attorney Joe Tacopina, known for his aggressive courtroom style, relentlessly challenged the credibility of the prosecution's key witness, A$AP Relli, whose legal name is Terell Ephron. He painted Mr Ephron as an opportunist seeking financial gain and called the prosecution's case flimsy due to a lack of physical evidence. Mr Ephron got so fed up with the rapper's attorney during questioning that he called Mr Tacopina "annoying". Meanwhile, prosecutors pushed back, accusing Mr Tacopina of attempting to intimidate witnesses and dismiss key testimonies. Both sides were very liberal with their use of objections in court, and it sometimes felt as though both sides were trying to throw the other off their game, rather than being based on legal guidelines. It also got personal between the two sides. At one point during closing arguments, Mr Tacopina and prosecutor John Lewin traded misconduct allegations, with Mr Lewin accusing Mr Tacopina of using steroids and Mr Tacopina firing back by calling Lewin a "hunchback". After a short break, the judge attempted to lighten the mood by theatrically introducing the attorneys like boxers before resuming the trial.
