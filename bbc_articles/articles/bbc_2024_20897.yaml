content: |-
  Britain's Keely Hodgkinson takes 800m gold, GB cyclists power to women's team sprint title and Simone Biles wins her fourth medal on day 10 of the Paris Olympics.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great Britain's Keely Hodgkinson raced to a brilliant victory in the women's Olympic 800m final with a dominant display in Paris. It was Team GB's second gold of the day after Katy Marchant, Sophie Capewell and Emma Finucane broke the world record on three occasions as they powered to glory in the velodrome in the women's team sprint. Joe Clarke had earlier won silver just minutes after fellow Briton Kimberley Woods won bronze in the chaotic kayak cross event. Elsewhere, Simone Biles' "redemption tour" concluded with another gymnastics medal, though the American superstar reminded fans she was not invincible during the balance beam and floor finals. Britain also collected a third triathlon medal, but were downgraded from silver to bronze in a dramatic photo finish to an exhilarating mixed relay race.
