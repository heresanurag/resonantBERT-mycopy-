  Hodgkinson arrived at the Stade de France carrying a weight of expectation on her shoulders and as a heavy favourite to win Britain's first gold on the track since Mo Farah won two at Rio 2016. If there were any nerves, they barely showed as she delivered a calm and calculated performance to move into the lead before the bell and glide away from the field in the home straight. The 22-year-old was visibly emotional as she crossed the line and recognised the scale of her achievement that has long appeared her destiny. As a 19-year-old, Hodgkinson took a surprise silver at the Tokyo Games, breaking the British record set by Kelly Holmes in the process. She has since been a runner-up at the 2022 Commonwealth Games, and back-to-back World Championships, albeit having also won two European titles. Victory ended her streak of silvers on the global stage, though, and meant she emulated Holmes' achievement in Athens 20 years ago. Moments later, the Paris crowd were also thrilled by Armand Duplantis, as the Swede improved on his own world record in the men's pole vault final after securing the gold medal.

