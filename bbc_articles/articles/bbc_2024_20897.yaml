  With Britain having not qualified for the women's team sprint since 2012, Marchant, Capewell and Finucane had expressed a desire to change the narrative around the event. And they did not disappoint, lowering the world and Olympic records twice on the way to the final - though fast conditions also allowed Germany and New Zealand to set new world marks in the first round. Britain were behind on the splits after the first lap in the gold-medal race against New Zealand, but Capewell overturned that deficit and Finucane extended the lead on the last leg to secure GB's first medal in the event. It sparked emotional celebrations in the velodrome with Marchant kissing her two-year-old son Arthur at the side of the track while Capewell broke down in tears. In qualifying for the men's event, Jack Carlin, Ed Lowe and Hamish Turnbull clocked the second-fastest time behind the Netherlands. GB were also second-fastest in qualifying for the men's team pursuit as Dan Bigham, Ethan Hayter, Ethan Vernon and Ollie Wood set a new British record to finish behind Australia on the timesheets.

  This video can not be played To play this video you need to enable JavaScript in your browser. Joe Clarke comes back to claim silver in the kayak

  While it may not be an event for the purists, the chaotic kayak cross event proved hugely popular in front of packed grandstands on its Olympic debut. And it also delivered more success for GB as world champion Woods, 28, became the first British woman to win two Olympic medals in canoeing having also taken bronze in the women's K1. It was a "bittersweet" silver medal for Clarke, who won gold in the K1 in Rio in 2016, before being controversially overlooked for selection for the Tokyo Games three years ago. The 31-year-old went into the men's event as a heavy favourite, with three world titles to his name, but was caught up in traffic early on. "It was bittersweet in some ways," said Clarke. "I came for gold but got silver which I am very proud of. "It was a bit of redemption after missing Tokyo and I think I have put that one to bed."

