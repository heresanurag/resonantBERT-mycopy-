  US superstar Biles had already won three gold medals at these Games - in the team, all-around and vault events - and was hoping to add two more on day 10. However, the 27-year-old slipped off the beam to miss out on a medal for the first time in Paris. The American lost her balance at the end of an aerial series and placed fifth as Italy's Alice d'Amato won gold, with China's Zhou Yaqin - who had been the top qualifier - taking silver. Biles looked unhappy with the crowd after her routine, speaking animatedly to her coach and team-mate Sunisa Lee, but was all smiles as she re-emerged shortly afterwards for the floor final. She had been the top qualifier, but Brazil's Rebeca Andrade took an early lead and Biles' bid to usurp her fell just short as she paid the price for twice landing with both feet outside the floor area. She still secured her 11th Olympic medal with a silver, while team-mate Jordan Chiles took bronze with the final routine.

