  After Alex Yee won the men's triathlon and Beth Potter claimed bronze in the women's race, GB had high hopes for the mixed relay. They led narrowly for much of the first three legs - featuring Yee, Georgia Taylor-Brown and Sam Dickinson - with Potter having a five-second advantage as she began the anchor leg. She was caught on the bike by Germany's Laura Lindemann and the USA's Taylor Knibb, before battling to stay with them during the run, and was fractionally third as the trio turned into the home straight and sprinted for the line. Lindemann held on for gold and although Potter and Knibb had the same time, the USA were given silver after officials reviewed the finish-line photo.

