title: 'Sarah Everard: ''Increasing concern'' for Brixton woman - BBC News'
date: '2021-03-05'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-56281473
content: |-
  Sarah Everard has not been seen or heard from since Wednesday night, her best friend says.

  Sarah Everard has been described as "beautiful, thoughtful and incredibly kind"

  The disappearance of a woman who has not been heard from since Wednesday night is causing "increasing concern", police have said.

  Sarah Everard, 33, vanished as she walked home to Brixton, south London, from the Clapham Junction area.

  Ms Everard spoke to her partner en route but has not been heard from since that point, friend Rose Woollard said.

  She said her phone signal was picked up last near Clarence Avenue, between her home and where she left another friend.

  Friends, who last heard from the 33-year-old at about 21:30 GMT on the day she went missing, were unable to contact Ms Everard on Thursday and notified the police.

  She is 5ft 4in (162cm), has a slim build and blonde hair, and was wearing a green coat, dark trousers and trainers, her best friend Ms Woollard said.

