title: Military truck in Taunton rams through police road block - BBC News
date: '2023-09-11'
section: General
url: http://www.bbc.co.uk/news/uk-england-somerset-66775434
content: |-
  A privately owned military truck is driven into police cars, damaging a total of nine vehicles.

  A privately owned military truck has been driven through a police road block, damaging nine vehicles.

  Officers attended an address in Norton Fitzwarren, near Taunton, at 16:40 BST on Sunday.

  When they arrived, a man left the address in the military truck, damaging four police cars and five privately owned vehicles.

  No-one was injured in the incident.

  A 41-year-old man has been arrested on suspicion of attempted murder of police officers and multiple counts of suspicion of criminal damage, Avon and Somerset Police said.
