  'We are on one page' - Ten Hag believes he still has Man Utd backing

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Erik ten Hag feels Manchester United's hierarchy would have told him if his job was under threat. Co-owner Sir Jim Ratcliffe was at Villa Park for the 0-0 Premier League draw with Aston Villa, played against mounting pressure on Ten Hag for a run that now extends to five matches without a win, including the woeful three-goal home defeat by Tottenham a week ago. Ratcliffe was emotionless on the final whistle, with the only noticeable interaction from the travelling executives a conversation between chief executive Omar Berrada and sporting director Dan Ashworth following a game that leaves United 14th in the table. Ten Hag said he had not spoken to any of them between the end of the game and carrying out his media duties. Asked if he was confident United's hierarchy was solidly behind him, Ten Hag said: "I don't have any idea that is different because they should have told me. We communicate - very open, very transparent. "I would say every day we talk, so I expect I will speak with them." On the external noise around his future, the Dutchman added: "You said it very good - external noise. Internal, we are disappointed. We know we have to do better. Especially, we need to score more." Speaking to Sky Sports earlier, Ten Hag said everyone at the club was "on one page" and "all on board together". He added: "We know what we are working through, it's a long-term process. "We have come through two very tough away games. This is a team, we showed the belief and faith we have."

  Eight points from their opening seven games is United's worst return since the 1989-90 campaign when Sir Alex Ferguson - who was also present at Villa Park - came under huge pressure before eventually winning the FA Cup. Only once, in 1972-73, have United scored fewer than five goals in their first seven matches. They have failed to score in their last three matches and no United player has scored more than one league goal during the current campaign. The nearest they came against Aston Villa were a couple of Marcus Rashford efforts that were well saved by Emiliano Martinez and a late break where Alejandro Garnacho failed to find skipper Bruno Fernandes with a cross-field pass that would have provided a clear run on the home goal. "After this block of games, that is where we are really short," said Ten Hag. "Apart from today, we are creating chances, but in the opponents' box we have to be more ruthless, more clinical. We have to work on this." Ten Hag went to applaud the United fans at the final whistle. His assistant and former United striker Ruud van Nistelrooy is one of the prime candidates to replace Ten Hag should United decide a change needs to be made. The visiting supporters sang Van Nistelrooy's name when he went to acknowledge them. United have three Premier League home games during the next group of matches until the November international break. In addition, they have a Europa League tie in Istanbul on 24 October against a Fenerbahce side now managed by former United manager Jose Mourinho. Despite spending almost £110m on striking duo Rasmus Hojlund and Joshua Zirkzee, neither looks a particular threat. At Villa Park, Hojlund started his first Premier League game since recovering from a hamstring injury sustained during a pre-season game against Arsenal in July. Zirkzee was one of six Ten Hag signings on the bench that have cost the club a combined £330m. "We trust the players and one day it will click," he said. "There are reasons. I would say Rasmus Hojlund is our best goalscorer but he is just in the season and is not up to 100% match fitness. [Marcus] Rashford scored in Porto [on Thursday] and had a good assist. Today he created good chances. [Alejandro] Garnacho is a threat all season and Bruno [Fernandes] has the ability to score goals.
