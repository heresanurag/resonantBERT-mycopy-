  Bitter conditions created by an Arctic wind are expected to continue into next week.

  Your pictures of snow and frost across UK

  An aerial shot of Scotland's Bridge of Gaur shows it looking very wintery

  Parts of the UK have been met with wintry scenes heading into the weekend, as frosty weather and snow make an appearance early in the new year. Bitter conditions are expected to continue into next week thanks to an Arctic wind. Several weather warnings are in place for parts of England and Wales as heavy snow and freezing rain are expected.

