  The French prosecutor is giving an update on Alex Batty - who was found in France on Wednesday.

  It was so good to hear his voice again, grandmother says

  More now from the statement released a moment ago by Alex Batty's grandmother, who is his legal guardian. “I cannot begin to express my relief and happiness that Alex has been found safe and well," says Susan Caruana, who lives in Oldham in north west England. "I spoke with him last night and it was so good to hear his voice and see his face again. I can’t wait to see him when we’re reunited," she says. Caruana adds that the experience would have been overwhelming for anyone, not least a child. She issued a plea for privacy as Alex returns "so we can make this process as comforting as possible". "The main thing is that he's safe,” she says.
