title: FBI identifies suspect in fatal Palm Springs fertility clinic blast - BBC News
date: '2025-05-19'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c787j90wp6po
content: |-
  Investigators say they believe the man had "nihilistic ideations" and was killed in the explosion.

  To play this video you need to enable JavaScript in your browser. This video can not be played

  The man accused of setting off a car blast outside a fertility clinic in Palm Springs, California, is said to be a 25-year-old with "nihilistic ideations". Guy Edward Bartkus, who is thought to have died in the blast, left behind writings which suggest he disapproved of people being brought into the world against their will, law enforcement sources told CBS News. He detonated explosives outside the clinic on Saturday morning and tried to livestream the attack, said investigators. Four other people were injured in the explosion and have been released from hospital. None of the wounded are staff or patients at the clinic.

  "The subject had nihilistic ideations and this was a targeted attack," said Akil Davis, assistant director in charge of the FBI's Los Angeles field office. The FBI is reviewing a manifesto they believe is linked to Bartkus, who lived at Twentynine Palms, home to a large marine base. He loaded his 2010 silver Ford Fusion sedan with explosives before driving an hour from Twentynine Palms to Palm Springs, investigators said. His father told CBS News Los Angeles that he had not spoken to his son in more than 10 years and that he had "just changed" after moving to Twentynine Palms. Mr Davis said the FBI is still looking for the public's help to piece together the suspect's whereabouts before the blast, and will remain on scene for the next day or two to continue their investigation.

  The FBI identified the suspect in the Palm Springs blast as 25-year-old Guy Edward Bartkus

  The blast was felt more than a mile away. Mr Davis referred to it as "the largest bombing scene" the FBI had seen in southern California in recent memory, and said police are working to survey evidence that is scattered 100 feet away from the explosion "in every direction". Several buildings were damaged in the blast, including the ACR fertility clinic with images showing a portion of its wall destroyed. The fertility clinic said their lab, including all eggs and embryos, remained "fully secure and undamaged". But Dr Maher Abdallah, who runs the clinic, told the Associated Press that the clinic's office was damaged. "I really have no clue what happened," he said. "Thank God today happened to be a day that we have no patients." According to its website, the ARC clinic is the first full-service fertility centre and IVF lab in the Coachella Valley. It offers services including fertility evaluations, IVF, egg donation and freezing, reproductive support for same-sex couples and surrogacy.
