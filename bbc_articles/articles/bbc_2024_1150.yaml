title: Jason Leitch denies giving Humza Yousaf Covid rule 'workaround' - BBC News
date: '2024-01-23'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-68066907
content: |-
  Prof Jason Leitch told then-health secretary to keep a drink in his hand to remain exempt from mask rules.

  This video can not be played To play this video you need to enable JavaScript in your browser. Prof Leitch gave then Health Secretary Humza Yousaf mask rule advice for a social event in late 2021

  Scotland's national clinical director advised Humza Yousaf to keep a drink in his hands at all times to remain "exempt" from mask rules at a dinner, the UK Covid Inquiry has heard.

  The UK Covid Inquiry was shown a WhatsApp exchange between Prof Jason Leitch and the then health secretary.

  Prof Leitch told the now first minister "literally no-one" followed official guidance about wearing a mask when not seated at dinner.

  The national clinical adviser said it was "tricky" to comply with guidance at such occasions, and admitted breaking the same rule.

  He told the inquiry he had believed it was "legitimate" to stand without a mask after being approached for a photograph at a dinner.

  The first minister's spokesperson said Mr Yousaf had sought "clarity on what the rules meant". He denied Mr Yousaf was not on top of the rules as a government minister during the pandemic.

  Prof Leitch confirmed he used an auto-delete function on a Covid WhatsApp chat during the pandemic but insisted he followed Scottish government records management policy.

  But he said a WhatsApp comment he made, previously shown at the inquiry, about deleting messages as a "pre-bed ritual" was a "flippant exaggeration".

  Messages read out at the inquiry showed then health secretary Mr Yousaf, who served in the role between 2021 and 2023, asked the national clinical director for guidance before attending a dinner where he was due to give a speech.

  Mr Yousaf wrote: "I know sitting at the table, I don't need my mask. If I'm standing talking to folk, need my mask on? [sic]."

  Prof Leitch responded: "Officially yes. But literally no-one does. Have a drink in your hands at ALL times. Then you're exempt. So if someone comes over and you stand, lift your drink."

  The inquiry heard that at the time, in November 2021, the Delta and Omicron variants were driving a surge in infections, leading to a peak in cases eight times higher than during the initial Covid wave in 2020.

  Counsel to the inquiry, Jamie Dawson KC, asked: "If health secretary didn't understand the rules, what chance did anyone else have?"

  Prof Leitch told the inquiry there was "difficulty" and "nuance" with the rules about wearing a mask at hospitality functions and that he got the impression no-one followed the official guidance at the "few" such occasions he attended.

  He said it was a "tricky area that I found tricky as well".

  The national clinical director described an incident that was posted on social media when he was approached at a dinner and asked for a photo but was not wearing a mask.

  "Strictly speaking that was breaking the rules but it was during a dinner and during a social occasion and therefore I thought it was legitimate," he told the inquiry.

  Prof Leitch rejected a suggestion from Mr Dawson that he had offered the then health secretary a "workaround" to the rules.

  "I gave him advice to show him how to comply with the rules," the national clinical director said.

  He told the inquiry that except for direct Twitter messages, he had not retained any one-to-one informal communications related to managing the pandemic.

  Prof Leitch was asked about why he said in a WhatsApp group chat from May 2021: "WhatsApp deletion is a pre-bed ritual."

  He told the inquiry he did not delete messages every day.

  "This was a flippant exaggeration in an informal messaging group and it wasn't done every day before I went to bed," the national clinical director told the inquiry.

  In another WhatsApp chat, Prof Leitch advised colleagues in September 2020: "Just my usual reminder to delete your chat ... particularly after we reach a conclusion."

  The national clinical director told the inquiry that he was following Scottish government guidance that once a decision had been reached, and that had been submitted to the records management system, the chat should then be deleted.

  Prof Leitch said he also applied an auto-delete function to a group with chief medical officer Gregor Smith and Jim McMenamin, the chairman of the National Incident Management Team.

  Asked whose messages he thought that would remove, the national clinical director answered: "That's good question I think it deletes everybody's."

  He said he was "comfortable" doing so despite the risk it could delete messages before a submission had been made to the corporate record because "the decisions we were coming to were being dealt with very, very quickly".

  Meanwhile, at Holyrood, Scottish Labour health spokeswoman Jackie Baillie said Prof Leitch appeared to have advised Mr Yousaf "how to avoid the rules" and suggested he should be sacked if the government agreed his behaviour was "inappropriate".

  Jackie Baillie suggested the government should consider sacking its national clinical director

  She said: "It is clear that Jason Leitch wiped his messages completely and seem to find the period during the pandemic all quite funny, judging from the messages we have seen."

  Scottish Tory health spokesman Dr Sandesh Gulhane said that "behind the scenes it is clear the Scottish government was mocking us, believing none of this would ever come to light".

  Deputy First Minister Shona Robison Ms Robison said it was important the inquiry was allowed to scrutinise messages and decision-making.

  "It's for the inquiry, obviously, to determine if it has concerns about the application of mobile messaging policy or their content," she told MSPs.

  The finance secretary added that it was not "fair" to focus on any individual and Prof Leitch was not present to defend himself.

  Next to give evidence to the inquiry was Devi Sridhar, professor and chair of global public health at the University of Edinburgh, who gave advice to the Scottish government during the pandemic.

  Prof Devi Sridhar denied she was "too friendly" with Nicola Sturgeon

  She said she had received abuse and death threats after becoming a well-known figure during the crisis.

  She spoke about what she described as her "close working relationship" with former First Minister Nicola Sturgeon, who she said offered to become her first client after qualifying as a personal trainer in a "throwaway" comment.

  Prof Sridhar said they only met in person twice, both at official meetings.

  The inquiry was shown several exchanges between the pair via Twitter direct messages.

  In the exchange from June 2020, Prof Sridhar said she was worried about overstepping the mark by sending a draft policy paper to Ms Sturgeon.

  The then first minister replied: "Don't worry about protocol", adding that "tackling the virus more important than that".

  Ms Sturgeon also said she would "handle any issues on that front".

  She then gave the professor her personal SNP email address and mobile number.

  Prof Sridhar told the inquiry: "I think people emphasised a lot that they felt I was under pressure or I was too friendly with her and I thought that came out because we got on quite well."

  But the public health expert said she had "similar relationships" with many politicians, including chancellor, Jeremy Hunt, Labour MP Jonathan Ashworth and Liberal Democrat MP Layla Moran.
