  Admiral Sir Tony Radakin discussed "issues of common concern" with China's military leaders in a rare trip by the UK's most senior military officer.

  UK sends military chief to China for first visit in 10 years

  Admiral Sir Tony Radakin is the UK's most senior military officer

  The head of the British armed forces has visited China for the first time in a decade. Admiral Sir Tony Radakin discussed "issues of common concern" with China's military leaders in Beijing, its defence ministry said in a short statement. "We agreed that in an unstable world we must play our part as responsible nations with global interests," Sir Tony wrote on X, "and we reflected on the importance of military-to-military communications". The last time a Chief of the Defence Staff visited China was in 2015. Since becoming prime minister, Sir Keir Starmer has sought to strengthen ties with the country.

  The admiral's visit coincided with the escalation of an intense trade war between China and the US after President Trump's announcement of higher tariffs. Defence Secretary John Healey confirmed on Thursday that the trip had happened earlier this week. "It's always good to have military to military engagement and that is what he was establishing", Healey told reporters in Brussels. He said that the admiral's visit followed in the footsteps of one made recently by Foreign Secretary David Lammy, who became only the second foreign secretary to visit China in six years when he went in October last year. Healey said that in the discussions the admiral was "very firm in the arguments about peace and stability in the Indo-Pacific" region "and concerns about any use of military aggression or assertiveness to pursue political ends". Healey did not specifically mention Taiwan, where China has launched major military drills which have been seen as provocation towards the island and wider region. Beijing sees Taiwan as a breakaway province that will, eventually, be part of the country, and has not ruled out the use of force to achieve this. But many Taiwanese consider themselves to be part of a separate nation - although most are in favour of maintaining the status quo where Taiwan neither declares independence from China nor unites with it. Sir Tony has now joined the defence secretary in Brussels for meetings with allies on Ukraine.
