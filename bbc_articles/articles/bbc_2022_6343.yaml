  Palestinian President Mahmoud Abbas "condemned the killing of Israeli civilians" in Elad, but warned against "using" the incident to attack Palestinians, the official Palestinian news agency Wafa reported.

  Meanwhile the Palestinian militant group Hamas, which governs the Gaza Strip, praised what it called an "heroic operation". It said it was in response to Israeli action taken at the al-Aqsa mosque compound in Jerusalem, which has been the scene of frequent clashes between Palestinians and Israeli police.

  The killings came days after Hamas leader Yahya Sinwar called for continued attacks on Israelis including with "cleaver... axe or knife" in a message which was widely circulated on social media.

  Israel had already bolstered its forces on the boundary with the West Bank and stepped up operations against militants there, including in and around Jenin, where two Palestinians who carried out recent deadly attacks in Israel had come from.

  Seventeen Israelis, including an Israeli Arab policeman, and two Ukrainians have been killed in the attacks in Israel and the West Bank since 21 March. At least 26 Palestinians, including the attackers, have been killed in Israeli raids and confrontations since then.

  It has coincided with rising tensions over the flashpoint holy site in Jerusalem known to Muslims as the al-Aqsa mosque compound and Jews as the Temple Mount. The site has seen recurrent violence over the past month, with hundreds of Palestinians injured there in the clashes with police.
