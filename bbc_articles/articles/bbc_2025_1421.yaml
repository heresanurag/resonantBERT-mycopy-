title: Birmingham driver rammed cyclist to teach him wheelies lesson - BBC News
date: '2025-02-19'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cwyn5g0yze4o
content: |-
  Liam Jones was pursued by Abdirahman Ibrahim who deliberately drove into him twice, West Midlands Police say.

  This video can not be played To play this video you need to enable JavaScript in your browser. Driver Abdirahman Ibrahim pursued Liam Jones after seeing him pull a wheelie on his e-bike

  A driver murdered a cyclist by deliberately ramming him with his car to teach him a lesson for pulling a wheelie, police said. Victim Liam Jones, 22, died at the scene after Abdirahman Ibrahim drove into him twice as he rode his electric bike in Sheldon, Birmingham. Ibrahim, 21, of Bonham Grove, Birmingham, struck Mr Jones before driving off when the cyclist was fatally injured crashing into a bollard, West Midlands Police said. The defendant was convicted on Monday after a trial at Birmingham Crown Court, and is due to be sentenced on 26 March.

  Police said Liam Jones fell off his bike and crashed into a concrete bollard after being hit by the car

  Police said Ibrahim's brother, Abdullahi, was a passenger in his car when the crash happened. Abdullahi Ibrahim, 21, of Acacia Close in Lewisham, London, pleaded guilty to assisting an offender at a hearing last April and is also due to be sentenced at the same hearing.

  Abdirahman Ibrahim followed Liam Jones and deliberately rammed him twice with his car, West Midlands Police said

  Abdirahman Ibrahim first came across Mr Jones and a friend when they were riding their bikes late at night on Coventry Road on 1 August 2023, police said. He started to follow them in his Seat Leon and CCTV footage showed the car close behind Mr Jones, who was performing a "stand-up wheelie", the force said. The driver kept pursuing the riders and drove into Mr Jones twice on Moat Lane in Sheldon, shortly before midnight. Mr Jones was confirmed dead at the scene. He then drove away and parked his car in another neighbourhood, while his brother called for a taxi to take them home, police said. Det Insp Nick Barnes said Abdirahman Ibrahim was "intent on causing harm" to Mr Jones and "menacingly" pursued him. "We believe he was angered by Liam's showboating and wanted to teach him a lesson," he said. "Tragically, Liam lost his life and Ibrahim will now spend many years of his own young life in prison."

