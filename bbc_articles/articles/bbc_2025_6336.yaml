content: |-
  A procession of vintage cars, buses and lorries made its way through Glasgow to the Riverside Museum.

  A procession of vintage cars, buses and lorries made its way through Glasgow from Bridgeton Bus Garage to the Riverside Museum.

  The parade was organised by The Albion Club and the Glasgow Vintage Vehicle Trust, and marked 125 years of Albion engineering in the city.

  The Albion Motor Car Company Ltd was formed in 1899 and set up its original factory in Finnieston in 1900.

  Albion engineering finally came to an end with the closure of the works in Scotstoun last year.

  A 124-year-old 1901 Albion Dogcart car led the parade of vehicles from all ages of the company's production.
