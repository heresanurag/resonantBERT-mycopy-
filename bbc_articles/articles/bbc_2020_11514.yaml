title: Construction of second Trump golf course at Menie approved - BBC News
date: '2020-10-18'
section: NE Scotland, Orkney & Shetland
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-54589267
content: |-
  The 18-hole MacLeod course is to be built to the south and west of the controversial original course at Menie.

  The construction of a second golf course at President Donald Trump's Aberdeenshire resort has been approved.

  The 18-hole MacLeod course is to be built to the south and west of the controversial original course at Menie, built in 2012.

  It is named after his mother Mary Anne MacLeod, who was born on Lewis but emigrated to New York.

  Councillors gave construction the go-ahead on Friday, despite local objections.

  There were 15 conditions, mainly focused on environmental issues such as preventing pollution, protecting wet dunes and safeguarding bird habitats.

  Permission for the resort - including houses, holiday homes and a hotel - was granted in 2008 while plans for the second course were approved last year.

  The Menie resort has made losses in the last seven consecutive years.

  It was blamed for "destroying" the sand dune system, causing permanent habitat loss.

  The Trump Organisation previously reacted to the suggestion the area should lose its protected status by calling the move a "stitch-up".

  The construction of the second course was met with disapproval from locals who said it would "severely affect the natural habitat and landscape" and "restrict resident access" on the beach.

  One local claimed there had been "little meaningful public consultation" on the matter.

  The Scottish Environment Protection Agency (Sepa) also objected to the application, saying the water management plan was inadequate and the environmental management plan was not appropriate.

  Sarah Malone, executive vice president of Trump International Scotland, said: "We continue to remain focused on the long-term vision for our magnificent estate and are moving steadily forward with our infrastructure and development plans for the next phase of construction at our world-class resort.

  "Golf, more so now than ever, is the sport of choice for many people, including families, and we are delighted to have the support of Aberdeenshire Council to move forward with our second golf course.

  "The MacLeod Course, will be built to the highest specifications and standards to complement our award-winning championship links. The course will be constructed alongside our estate residencies, cottages and country homes that were approved at the end of last year. "
