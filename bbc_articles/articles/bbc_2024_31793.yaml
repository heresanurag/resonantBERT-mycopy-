title: Notorious drug lord Fabio Ochoa lands in Colombia after release - BBC News
date: '2024-12-24'
section: World
url: http://www.bbc.co.uk/news/articles/c4gwv4lez6go
content: |-
  Fabio Ochoa Vasquez completed his prison sentence in the US and returned home a free man.

  Drug lord back in Colombia after 20 years in US jail

  One of the founders of the Medellin drug cartel has returned to Colombia after serving more than 20 years in jail in the US for drug trafficking. Fabio Ochoa Vasquez, now 67 years old, was deported by the US government and landed in Bogota on Monday a free man. Ochoa was one of the founding members of the notorious cartel and had been a senior lieutenant to infamous drug lord Pablo Escobar. The Medellin cartel dominated the cocaine trade and waged a violent campaign against the Colombian state before Escobar was killed in 1993.

  On his arrival in Bogota, immigration officials ran Ochoa's fingerprints through their database, the country's immigration agency said. Confirming that he is not wanted by Colombian authorities, it said that Ochoa was freed "to be reunited with his family". Amid a sea of reporters in the airport terminal, Ochoa was greeted by his relatives and hugged his daughter. In 2001, Ochoa was flown to the US after being arrested in Colombia in 1999 along with about 30 other alleged traffickers. He had already served a jail sentence in Colombia in the early 90s for his role as one of bosses of the Medellin cartel. Along with his brothers, he was the first major trafficker to surrender under a programme that protected cartel members from extradition to the US if they pleaded guilty to minor offences in Colombia. Ochoa and his brothers were released from prison in 1996, but Ochoa was arrested once again during the so-called Millennium operation over his involvement in the cocaine smuggling business in the US in the late 1990s. In 2003, Ochoa was sentenced to more than 30 years in a US court for his involvement in the cartel that brought an average of 30 tonnes of cocaine into the US each month between 1997 and 1999.

  Photo dated 1999: Ochoa is escorted by police after his arrest under the US's Operation Millennium

  During the 1980s, he was one of the top operators in Escobar's Medellin ring, a supplier in its prime of 80% of the US cocaine market. The defunct Medellin cartel, along with the Cali cartel, was one of the most powerful and feared drug networks of the 1980s. Its violent campaigns of bombings and assassinations led to extraditions of drugs suspects between Colombia and the US to be suspended, before being resumed in 1997.
