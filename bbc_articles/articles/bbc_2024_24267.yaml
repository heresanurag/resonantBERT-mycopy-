title: Charity campaigner Claire Lomas dies after accident in Jordan - BBC News
date: '2024-09-08'
section: Leicester
url: http://www.bbc.co.uk/news/articles/c0rwjdwj7dvo
content: |-
  Claire Lomas became well known for completing distance challenges in her "bionic" suit.

  Claire Lomas has completed a number of challenges for charity

  A campaigner who raised nearly £1m for charity after being paralysed in a horse riding accident has died. Claire Lomas, 44, died following an accident in Jordan in the Middle East, her family said in a statement. According to the Melton Times, external, the incident took place on the morning of 22 August. In a statement given to the newspaper, her family said they were "absolutely devastated" following her death.

  Ms Lomas, from Melton Mowbray in Leicestershire, started raising money for charity after she broke her neck, back and ribs and punctured a lung when her horse threw her off as she took part in the Osberton Horse Trials in Nottinghamshire, in 2007. Since her injury, she has taken part in a number of fundraising charity challenges, including completing the 2012 London Marathon in a robotic suit for Spinal Research.

  Ms Lomas lit a cauldron as part of the torch relay for the Paralympic Games in 2012

  Ms Lomas was told she would never walk again after her riding accident in 2007. But a suit with mechanical legs, called ReWalk, helped her to take her first steps again at a rehabilitation centre in East Yorkshire, in 2012. The ReWalk suit is made up of braces to support the legs, motors to help rotate joints, weight and motion sensors and a battery pack. Feet sensors detect when weight is lifted, motion sensors detect hip movement and upper-body sensors allow users to control movement. Ms Lomas was the first person in the UK to use the ReWalk suit and went on to complete the 2012 London Marathon in 17 days using it. She then used it to complete the Great North Run in 2016 and became known as the "bionic woman" for her achievements in the suit.

  Tara Stewart, chair of the Spinal Research charity, said: "We are deeply shocked and saddened to hear of Claire's death. "She was a great supporter of ours, and other spinal injury charities, and a guiding light to the entire community. "This is a devastating loss and our thoughts are with her family." Ms Lomas was later chosen to light the Paralympic flame in 2012, and appointed an MBE in 2017 for her fundraising efforts. One of her beneficiaries, the Nicholls Spinal Injury Foundation, said Ms Lomas was "fantastic". "She was a real champion of paralysed people and an exceptional motivational speaker," a spokesperson said. "She had a way of using her own story to change people's thinking and focus on the positive. "We felt very fortunate and proud that Claire was one of our patrons and supporters."

  Ms Lomas completed races including the Great North Run and London Marathon in a robotic suit

  Ms Lomas was an early beneficiary of the Matt Hampson Foundation - founded by ex-England and Leicester Tigers rugby player Matt Hampson OBE, who was paralysed from the neck down after a training accident when he was 20. He launched the foundation to help others who had suffered serious sporting injuries and became a friend to Ms Lomas. He told the BBC it "really helped" to know someone with a "similar mind and outlook on life". "She was pretty outgoing, she was always fun, always had a smile on her face and she very much lived by the foundation's mantra which was 'get busy living'," Mr Hampson added. Councillor Tim Webster, who is the mayor of Melton, said Ms Lomas would be "sadly missed". "Claire was a very positive person and worked tirelessly to not let anything get in her way to raise the awareness of spinal injuries through her charitable work," he said. "Her drive and passion for this cause helped change the lives of many people who have suffered spinal injuries, and she will be sadly missed. Our thoughts and sincere condolences go out to her family and friends at this sad time."

  Ms Lomas was appointed an MBE by the Duke of Cambridge in 2017

  British Eventing, the Great Britain governing body for the sport, described Ms Lomas as "an absolute inspiration and champion for good", in a statement shared on social media. The organisation said: "Claire will be so greatly missed by the entire eventing family and the wider equestrian community." Burghley House, a venue in Stamford, Lincolnshire which is home to a major annual horse trials event, said Ms Lomas competed there in 2006 and they were "deeply saddened" by her death. "Claire was a remarkable woman and a great inspiration to many, and we are sure that her legacy will live on through her much-loved family," Burghley House said in a statement. The Melton Times said it had been asked by Ms Lomas's family to "advise other media outlets not to contact them until further notice". The Foreign Office added it had supported the family of a woman who died in Jordan. Follow BBC Leicester on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
