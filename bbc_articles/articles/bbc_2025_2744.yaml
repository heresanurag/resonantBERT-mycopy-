title: USAID staff will be put on leave starting on Friday - BBC News
date: '2025-02-05'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cx253xjnxrmo
content: |-
  The move is the latest in a concerted effort by the Trump administration to shut down the US international aid agency.

  USAID staff will be put on leave starting on Friday

  Thousands of employees at the US Agency for International Development (USAID) will be placed on leave from Friday night, the agency says. A USAID statement said the order would affect all "direct-hire personnel" except those on "mission-critical functions, core leadership and specially designated programs". It's unclear exactly which jobs are affected. The statement, posted on the agency's website, said employees would be notified by Thursday afternoon. The Trump administration has said USAID is wasting money and needs to align with the president's policy priorities. Agency staff, backed by Democratic lawmakers, have protested over the cuts, saying they will put lives in danger and hamper national security.

  President Donald Trump's earlier decision to freeze foreign assistance has upended the global aid system, with effects already felt in multiple countries. The agency, which provides humanitarian aid to more than 100 countries, employs 10,000 people worldwide. Two-thirds of those people work overseas, according to the Congressional Research Service. USAID, founded in 1961, has a budget of around $40bn (£32.25bn) per year, amounting to roughly 0.6% of federal spending, according to official figures. In a statement on its website on Tuesday, USAID said it would work with the US Department of State to arrange and pay for return travel for personnel posted outside the US within 30 days. Those employees who are part of the exceptions will be told by 15:00 EDT (20:00 GMT) on Thursday, it said. The statement concluded with the message: "Thank you for your service." Given that some USAID staff work in active conflict zones, it was not immediately clear how they would be withdrawn. The measures are part of a string of cuts that Trump has enacted since returning to office last month through co-ordination with Elon Musk's unofficial Department of Government Efficiency. Among the countries affected by the aid freeze is Haiti. The United Nations said Tuesday that it had been notified by the US that it was freezing $13.3m in aid destined for the country. But on Wednesday the US state department issued a waiver exempting $40.7m of foreign assistance for Haiti's national police and the UN-backed international security support mission.

