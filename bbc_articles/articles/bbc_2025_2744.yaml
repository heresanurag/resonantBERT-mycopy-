  USAID's activities range from providing prosthetic limbs to soldiers injured in Ukraine, to clearing landmines and containing the spread of Ebola in Africa. An HIV patient in Nigeria told the BBC that she and others are worried that free anti-retroviral drugs, funded by USAID, would be cut off. "I am really scared about what the future holds given all that is going on in America," she said. "I got my last set of HIV drugs in November and I am supposed to go back in April... but I don't know what would happen by then. "These free drugs are really important for me and most of us (HIV patients) would be in trouble if it is affected," she said. Democrats in Washington DC have been particularly critical of changes to the agency, calling them "illegal" and "unconstitutional". "[USAID is] a foreign policy tool with bipartisan origins that is critical in this dangerous global environment," New Jersey Democratic Senator Andy Kim, who previously worked at USAID, wrote on social media. "Gutting it means gutting our ability to compete and keep America safe."
