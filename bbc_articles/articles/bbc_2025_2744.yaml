  • None Turmoil as Trump and Musk take aim at top US aid agency On Tuesday, many USAID staffers received an email notifying them they had been placed on paid administrative leave. The email, obtained by BBC News, told employees they must remain "available" by telephone and email during business hours, but were not allowed to enter USAID buildings. Musk, the CEO of Tesla and Space X, has suggested USAID should be shut down entirely, as it is "beyond repair". Many have cautioned that closing the agency's doors would have devastating effects on vulnerable populations across the world.

