  Earlier this week, the White House put out a statement listing a number of projects that it called evidence of "waste and abuse", including a grant of $1.5m to an LGBTQ group in Serbia and $2.5m for electric vehicles in Vietnam. However critics have called the moves to close the agency an illegitimate power grab spearheaded by Musk, an unelected billionaire. Earlier this week, Trump's top diplomat, Marco Rubio, became the acting head of USAID as part of its reported merger into the state department. Closing USAID altogether would require an act of Congress.
