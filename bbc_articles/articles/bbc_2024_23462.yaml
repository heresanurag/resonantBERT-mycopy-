title: 'Port Talbot: Uncertainty remains over steel town''s future - BBC News'
date: '2024-09-28'
section: Wales
url: http://www.bbc.co.uk/news/articles/c756r6plw55o
content: |-
  With the closing of Port Talbot's blast furnaces, locals say the future is still unclear for their hometown.

  'The steelworks is our identity - we are the steel town'

  Former Miss Wales, Gabriella Jukes, from Port Talbot with her grandad, Kenneth Phillips; one of several men in her family to have worked in the steelworks.

  "We have the beach, we have the mountains, however the steelworks is our identity - we are the steel town." Gabriella Jukes' grandfather, uncles and cousins have all worked in Port Talbot's steel plant, which on Monday will see the second of its two blast furnaces shut down - ending traditional steelmaking in south Wales. The former Miss Wales said she was proud of the town's industrial history, but shares the community's concern about its future. "My cousin, he's still really young. He left school thinking he was going to have a job for life there. You don't know what the plans are for those who have got young families already, it's just so uncertain," she said. Her grandfather, Kenneth Phillips, said it had always been a comfort to see the blast furnaces because "you realise your children are working, they've got a job".

  The former electrical engineer said it was sad to see what was happening, but he admitted it was "not a surprise" after witnessing cutbacks many times during his 25 years at the plant. "It's just going to devastate Port Talbot. I don't care what anyone says, they all know it really," he said. Tata Steel said it has offered retraining opportunities to employees and its £1.25bn electric arc furnace will ensure a greener way of steelmaking in the town. "It's going to help in terms of the air quality... but at the end of the day people’s quality of life [is] going to be poorer because there will be less jobs, less money in the area and people might eventually have to move away," said Gabriella.

  A steward of the Tata Steel sports and social club, Claire Edwards, says she often hears different opinions on what's happening at the steelworks.

  At the Tata Steel sports and social club, views vary on the impact significant changes at the steelworks will have on the local community. Club steward, Claire Edwards, said she believed "without the steelworks there is no Port Talbot" but she hoped the works owners, stick to their promises. "It might be good for the environment but it's hard to see people losing their jobs. I just hope things come good in the end, really." The club has many different teams, including rugby, football, cricket and bowls. Many of the regulars either work at the steel plant or have done so at some point, but talk about what was happening at the steelworks is kept to a minimum at weekends, according to Claire. "When they're here it's an escape really. It's a release from them away from the pressure over there."

  Port Talbot's blast furnaces can be seen rising above terraced houses across Port Talbot, as depicted here by one of many local artists, Simon Gough.

  Though local artist Simon Gough has never worked in the steelworks, it features in his art which captures every day life in Port Talbot. "It's there whether you like it or not. It's produced and provided for the town for as long as I can remember," he said. "It's quite a dichotomy, really, because it's provided a lot for the town but it also takes a lot away if you want to go into the pollution element - but it's what Port Talbot was built on so when it gets decimated it affects everybody." He said he remained optimistic about the future because of the closeness of the town's community and other things it offers. "We're a town with strong legs and can walk up big hills, and this is just another big hill we've got to get over. There's inspiration everywhere you look really, whether it's people or places - the town is full of it."

  Gavin John owns a craft beer bar in Port Talbot town centre and believes the town has much more to offer despite the news from the steelworks.

  There are a growing number of local businesses which celebrate Port Talbot's identity. Gavin John, uses his craft ale bar in the town centre to showcase local creativity as well by putting on music and comedy nights as well as poetry sessions. He said he wanted to see more being done to promote and grow the creative sectors so the community can feel optimistic about the future. "I think what’s happening at the steelworks is disgusting. But we're a tight-knit community and the creative scene here is growing. With the right support it could be big," Gavin said.
