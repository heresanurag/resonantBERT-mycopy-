  In a statement, the BBC said it has "decided to rest the UK show", after a serious crash last December.

  The BBC's flagship motoring show Top Gear will not return "for the foreseeable future" after presenter Andrew "Freddie" Flintoff was seriously injured in a crash while filming last year.

  In a statement, the BBC said it had "decided to rest the UK show".

  Launched in 2002, Top Gear was a revival of the original series of the same name, which ran from 1977 until 2001 and was hosted by many household names.

  It went on to become one of the corporation's biggest earners, exported all around the word. But it also repeatedly caused controversy, and some of its presenters have been involved in serious crashes.

  Here are some of the key moments from the motoring show over the years.
