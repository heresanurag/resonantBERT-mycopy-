title: 'Edmonton stabbing: Man killed in street attack - BBC News'
date: '2019-09-15'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49705041
content: |-
  The 29-year-old victim was found injured in a street in north London and died shortly afterwards.

  The victim died at the scene of the stabbing in Houndsfield Road, Edmonton

  A man has been stabbed to death in an attack on a street in north London.

  The 29-year-old was found with serious injuries near a party at the Old Edmontonians FC clubhouse, Enfield, shortly after 20:10 BST on Saturday. He was pronounced dead at the scene.

  A 40-year-old man has been arrested. He is currently in hospital, police said.

  Police said the victim's family has yet to be informed and efforts are continuing to formally identify the dead man.

