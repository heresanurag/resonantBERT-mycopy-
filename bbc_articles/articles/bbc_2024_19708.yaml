  Ilkay Gundogan completes Manchester City return after 12 months at Barcelona.

  This video can not be played To play this video you need to enable JavaScript in your browser. Manchester City: He knows everything - Guardiola on Gundogan's City return

  Manchester City have completed the signing of former captain Ilkay Gundogan from Barcelona on an initial one-year deal with the option of a further 12 months. The German midfielder, who was Pep Guardiola's first signing at the club in 2016, spent seven years at City before joining Barcelona on a free transfer in 2023. The 33-year-old won 14 trophies in his first spell at the Etihad, scoring 60 goals in 304 appearances. "My seven years at Manchester City were a time of pure contentment for me, both on and off the pitch," said Gundogan, who was City's captain when they won the Treble in 2023. "Everyone knows the respect I have for Pep - he is the best manager in the world and working with him every day makes you a better player. "Honestly, I cannot wait to wear the City shirt again."
