title: Constance Marten and Mark Gordon retrial begins - BBC News
date: '2025-03-10'
section: UK
url: http://www.bbc.co.uk/news/articles/c78e1yq6d2eo
content: |-
  Prosecutors say the couple put their relationship above their baby's life.

  A young baby girl would still be alive today if it were not for the "reckless and ultimately grossly negligent conduct" of her parents, a jury has heard. Constance Marten, 37, and Mark Gordon, 50, deny manslaughter by gross negligence and causing or allowing the death of a child. They are facing a retrial at the Old Bailey. The couple's baby was found dead in a shopping bag covered in rubbish in 2023. Opening the case, prosecutor Tom Little KC said Gordon and Marten "put their relationship and their views of life before the life of a little baby girl".

  "Their desire to keep their baby girl led inexorably to the death of that very baby," he said. During the previous trial, Marten and Gordon were found guilty of concealing the birth of a child and perverting the course of justice. On Monday, jurors were told they spent weeks living in a tent to avoid detection by authorities. The retrial heard the couple, who have been in a relationship since 2016, have four other children who were all taken into care. Mr Little told jurors that the couple gave birth in "secret". The barrister said they then decided in the middle of winter and in "obviously dangerous weather conditions they would deprive the baby of what it needed – warmth, shelter, protection and food and ultimately safety". He added that anyone who has had a baby knows that they must be kept warm and their temperature should not fall below 16C. By the time the defendants were found they had been living in a thin tent for more than a month, and were "scavenging" for food by taking it from bins and breaking into properties, Mr Little told jurors. When they were found, both defendants smelled "very unpleasant" as if they had not washed for weeks, he added. Jurors were told the defendants were spotted on CCTV in Newhaven - around nine miles away from Brighton, where they were arrested - on 8 January 2023. In footage captured a short time later, it "absolutely chucks it down", the court was told, and prosecutors said the defendants and baby would have been left "sopping wet". The prosecutor also said Marten had been willing to lie to get what she wanted, claiming she was from the travelling community and had been brought up in a caravan when she went to hospital during her labour with an older child in 2017. He told the court that she had, in fact, been raised with "a silver spoon", describing her as a "trust fund child". Mr Little said the couple did not seek any medical assistance for their child before, during or after birth, adding that on some occasions the baby was transferred to a reinforced reusable Lidl bag. When the hunt by the authorities to find them intensified "so their desperation increased and so did the risks and the dangers to the baby", the prosecutor said. Mr Little told the court Marten had previously been warned by a social worker about the dangers of living in a tent with a baby, having done so when one of her older children was born. Marten appeared in the dock for the first day of her retrial. Gordon was not at court. Judge Mark Lucraft KC told the jury that it was hoped that Gordon would join them on video link, adding "the fact he is not here does not mean anything to you at all".

  Constance Marten appeared in court for the first day of her retrial, but her co-defendant Mark Gordon did not

  The jury heard that at the end of 2022, the couple had moved around various locations in South Yorkshire, Bolton, Essex, London and the South Coast of England, and they stayed in various properties including a holiday cottage in Northumberland, a hotel in Cheshire, and another hotel in Manchester. The court also heard that a car the defendants used had broken down, prompting them to switch to a new car, which later caught fire on the M61 between junctions three and four in Greater Manchester. "They didn't remain at the scene with their towering inferno vehicle," said Mr Little. Police found a number of "burner" phones in the car, Marten's passport, a placenta wrapped in the towel, and a large amount of baby items including newborn clothing, suggesting the baby was already born by then. After abandoning the burning vehicle, the couple then walked in the rain along the banked wooded area beside the motorway for about 200m and were given a lift by a member of the public to a Morrisons supermarket close to the Bolton Interchange Station, where they were caught on CCTV footage shown to the jury. The couple first came to public attention in January 2023 when police launched a very public manhunt after evidence of a recent birth was found in a burnt-out car near Bolton. The couple were eventually found in Brighton on 27 February but there was no sign of the baby. The jury was told the defendants refused to answer questions after their arrest, including about the whereabouts of the baby. The newborn - who they called Victoria - was found dead two days later in a shopping bag in an allotment in the Hollingbury area of Brighton.
