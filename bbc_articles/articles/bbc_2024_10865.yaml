title: 'Bradford house fire: Girl, 10, dies and four others treated - BBC News'
date: '2024-05-06'
section: England
url: http://www.bbc.co.uk/news/uk-england-68961742
content: |-
  A woman and three other children manage to escape from the property in the early hours of Sunday.

  A 10-year-old girl has died in a fire at a house in Bradford.

  A woman, aged 37, and three other children, aged 11, six and three, managed to flee the blaze on Kingsdale Drive just after 01:05 BST on Sunday.

  They were taken to hospital for treatment and West Yorkshire Police said their injuries were not believed to be life-threatening.

  The cause of the fire was not believed to be suspicious and an investigation was continuing, the force said.

  A police cordon remains in place at the scene.

  Det Ch Insp Zaheer Abbas, of Bradford District Police, said: "This is an absolutely tragic incident in which a young child has lost her life. Our thoughts are with her family at this time."

  "The family are being supported by specially trained officers, a file will now be prepared for the coroner in due course," he added.
