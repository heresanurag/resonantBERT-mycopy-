  • None City have won seven of their last 10 away matches against Manchester United (D1 L2) in all competitions, as many as in their previous 42 visits to Old Trafford.
  • None The past 15 teams to win away from home in the first leg of a League Cup semi-final have all progressed to the final, with Spurs the last side to fail to do so, against Arsenal in 1986-87.
  • None Bernardo Silva became the first Manchester City player since Sergio Aguero (three in a row between 2011 and 2015) to score in consecutive away games against United in all competitions.
  • None City have scored 44 goals in the first half of matches this season in all competitions - eight more than any other Premier League side, and only five fewer than United have scored in total (49).
  • None Only Raheem Sterling (20) has scored more goals among English players in all competitions than United's Rashford (17) this season.
  • None This was United's first home League Cup defeat against a fellow Premier League side since January 2005 against Chelsea, having won 16 consecutive games of this type before this 3-1 defeat.
  • None City are responsible for four of United's last 12 defeats at Old Trafford.

  Leicester host Aston Villa in the first leg of the second semi-final on Wednesday (20:00 GMT).

  United and City return to Premier League action this weekend. United host Norwich on Saturday (15:00), while City travel to Aston Villa on Sunday (16:30).
