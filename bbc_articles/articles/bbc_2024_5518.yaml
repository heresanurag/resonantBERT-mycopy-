title: Aryna Sabalenka wins at Miami Open after former partner's death - BBC Sport
date: '2024-03-23'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/68643412
content: |-
  Aryna Sabalenka starts her Miami Open campaign with an impressive win over close friend Paula Badosa only four days after her former partner's death.

  Aryna Sabalenka (right) was hugged by Paula Badosa at the net after their match

  World number two Aryna Sabalenka started her Miami Open campaign after an emotional week with a 6-4 6-3 win over close friend Paula Badosa. Two-time Australian Open champion Sabalenka, 25, played her second-round match four days after the death of former partner Konstantin Koltsov. Koltsov, an ex-ice hockey player, died in Miami aged 42 in what police described as an "apparent suicide". On Wednesday Sabalenka said her "heart is broken" after Koltsov's death and described it as "an unthinkable tragedy". Wearing an all-black kit and a cap pulled down low, she looked up to the sky before the pre-match coin toss. Sabalenka and Spaniard Badosa, who have described themselves as "best friends" on the WTA Tour, shared a long and warm hug at the net after the match. Their match was one of the first to be completed on Friday after heavy rain disrupted the schedule.

  With play not starting until after 17:00 local time in Florida, many matches were pushed back and later suspended because of the weather. British former world number one Andy Murray's second-round match against Argentine 30th seed Tomas Martin Etcheverry was paused at 3-3 in the first set. Australian Open champion Jannik Sinner was leading 3-2 in the first set against fellow Italian Andrea Vavassori when play was suspended, while Britons Cameron Norrie and Jack Draper did not make it on to court. The suspended ties and Norrie and Draper's matches - against Italy's Flavio Cobolli and Chilean 22nd seed Nicolas Jarry respectively - have been rescheduled for Saturday.
