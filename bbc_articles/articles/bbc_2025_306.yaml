  But the organisation that has really come under the spotlight is the Corruption Investigation Office for High-ranking Officials, to give it its full name, which is jointly leading the investigation with the police. There have been questions raised about how the CIO failed to arrest Yoon on its first try, with critics accusing it of being unprepared and lacking co-ordination. The agency was created four years ago by the previous administration, in response to public anger over former president Park Geun-hye who was impeached, removed from office and later jailed over a corruption scandal. This month's failed attempt was a "further black eye" for the CIO, which already "does not have a great reputation, for both political and capability reasons", says Mason Richey, an associate professor at Seoul's Hankuk University of Foreign Studies.

  The police and CIO deployed some 3,000 officers in the second attempt to arrest Yoon Suk Yeol

  The CIO may book today's successful arrest as a win, but it remains to be seen how they will handle the investigation going forward, says Prof Richey. "Many people do not trust their messaging about the investigation," he adds. "We've entered this mess after various organisations scrambled to spearhead the probe for their own gain," says lawyer Lee Chang-min, a member of the activist organisation Lawyers for a Democratic Society. "Even if the joint investigative body is retained, the case should be handed over to the police, which should assert its authority," he adds. The CIO has no power to bring charges and is expected to hand over the case to state prosecutors after its investigation. Despite its name, the CIO has a wider remit than corruption. Its duties extend to investigating high-level officials more generally - for abuse of power. The CIO has argued that Yoon abused his power to conduct an insurrection. But Yoon's lawyers argue the CIO is an anti-corruption agency and its powers do not extend to investigating insurrections. They are reported to be considering filing an appeal in the Supreme Court to test this, according to Yonhap news agency. South Korea is now in uncharted territory, with Yoon being the first sitting president to be arrested. And the investigations into him have also "mobilised the far-right, populist elements" within the conservative coalition, who may "exert an outsize influence over" the country's conservative politics going forward, Mr Lee says.
