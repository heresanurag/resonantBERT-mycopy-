title: Teenage footballer who lost his lower legs just happy to be alive - BBC News
date: '2024-10-11'
section: NE, Orkney & Shetland
url: http://www.bbc.co.uk/news/articles/c4gdzn310ddo
content: |-
  Goalkeeper Adam Golebiewski's life was changed a few weeks ago when a car he was in crashed.

  Teen footballer who lost legs happy to be alive

  This video can not be played To play this video you need to enable JavaScript in your browser. Teen footballer who lost both legs just happy to be alive

  A promising teenage footballer who lost both lower legs after a car crash has told how he is just thankful to be alive. Adam Golebiewski was only 17 when the crash happened in Macduff, Aberdeenshire, just a few weeks ago, and was told the double amputation was needed. He celebrated his 18th birthday during his ongoing rehabilitation in hospital in Aberdeen, and is due to be fitted for prosthetics in the coming days. The football-obsessed goalkeeper - described by his team manager as having great potential - told BBC Scotland News: "Everyone has down days, but I'll try to keep smiling. I am happy to be here."

  Adam Golebiewski is being helped by orthopaedic rehabilitation physiotherapist Owen Cairns

  Apprentice builder Adam, from Banff, was a passenger in a car alongside friends when it crashed in the early hours of Sunday 8 September. He was taken to hospital, where his legs were amputated below the knee. Police inquiries into the crash in Macduff's Union Road - which left Adam and three other teenagers injured - remain ongoing. Adam - one of four siblings - is now undergoing intensive rehabilitation at Woodend Hospital in Aberdeen. On his first weekend back home just a few days ago, he went in his wheelchair to watch teammates from his junior side Deveronside win a match. He also managed a visit to see his gran, as well as welcoming a houseful of well-wishing visitors.

  Adam went to watch his team in action after he was allowed home at the weekend

  Adam spoke about his road to recovery during a session with orthopaedic rehabilitation physiotherapist Owen Cairns. He does not remember the accident itself. "I remember waking up just before I was away to go into surgery," he recalled. "Somebody was beside my bed, she explained what happened, 'I am sorry to say you were in a really bad accident and you are going to lose your legs'." He said he phoned his mum and apologised for what was happening. Adam said he remembered waking up and seeing family, his football coach and his priest. "It's actually making me a bit emotional, I didn't know I had such great support," he said. "A lot worse could have happened. I am glad we are all still here, still speaking."

  Adam has been described as a promising goalkeeper

  He is now working on his upper body strength, and taking some painkillers when in discomfort. "I don't hate crying, but I just don't like being emotional," he said. "I have had a tear to my eye. It's been a long few weeks - very positive, but also frustrating." Adam said his hopes were "really positive" for the next stage of his life. "I am still a normal guy," he said. "I am just going with the flow I suppose." He said he realised it was a positive the amputation was below the knee, in terms of his future mobility, rather than above the knee. "I would say I am quite lucky but also at the same time not lucky if you know what I mean."

  Adam is now working on his strength

  He was devastated his new Deveronside club tracksuit was damaged beyond repair in the wake of the crash. "I was raging, I had just got it," he said. "That's what I'd been working for." However, he was presented with a surprise new one to keep his spirits up. "Thank goodness," he said. "My face just lit up."

  Adam was all smiles when he returned to watch Deveronside play

  Mum Joanne said Adam has been "amazing" in his response. "He's kept everyone else really upbeat," she explained of her son, whose siblings are Millie, 16, Sophia, 19, and 21-year-old Michael. "You can't help but smile along with him. He's a positive kid, taking a day at a time. I don't know where he gets it, as I probably would have fallen to pieces." Dad Adam Snr added: "He’s not let it get him down, and just wants to go forward."

  Deveronside manager Colin Legge described Adam as an "inspirational" young man who had great goalkeeping potential. He said: "The game he played on the day of the accident he was brilliant, we won 2-1, he was a big part of that with his saves. "He came to our match at the weekend in his wheelchair, when we scored the players all ran up to him for high fives." The manager said Adam's attitude to life helped to put things in perspective. "We lost a game and I was in a bad mood," he said. "And I said 'get a grip'. "The whole club is so proud of him, he's so positive, he's got some mentality. What an incredible lad."

  Adam is pictured with mum Joanne and one of his sisters, Sophia

  Adam is due to be fitted for prosthetics as early as next week. The optimistic teenager said he is ready for the next challenge of learning to walk again, and seeing what his future holds. "I am the same guy, but just a wee bitty different," he said. "It will hopefully get easier, I am just very thankful for everything. "It's like a young child at Christmas, just wanting to get going. "Everyone says no pain no gain - I'll be alright. "Football helped me stay positive, fighting for something, and it's the same here, I'm fighting to get back on my feet as soon as I can."
