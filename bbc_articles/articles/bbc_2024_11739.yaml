content: |-
  A cold case review leads to the arrest of a woman on suspicion of murder, say police.

  Woman arrested after death of baby girl in 1982

  The baby was buried in 1982 but did not get a headstone until 2019 after a campaign by a local priest

  A woman has been arrested on suspicion of murder after the death of a baby girl more than 40 years ago. Northamptonshire Police said the 57-year-old was questioned by detectives on Tuesday in relation to a body found in Northampton in May 1982. The discovery was investigated at the time but no-one was prosecuted. However, new evidence surfaced in 2023 following a cold case review. The woman was released on bail on Thursday and inquiries were continuing, police said.

  Det Ch Insp Johnny Campbell said: “This has been an extremely complex investigation into events that happened more than four decades ago and a great deal of work has gone in to getting us to this point."

  According to an article published in the Northampton Chronicle and Echo, external in December 2019, the girl's body was found in a carrier bag near Northampton railway station. It is understood the baby was found strangled and wrapped in cloth. The baby was buried in Towcester Road Cemetery in November 1982 but did not get a headstone until 2019 after a campaign by a former local vicar. Speaking about the arrest, Det Ch Insp Campbell added: “Dozens of officers from both Northamptonshire Police and our colleagues in the region have been involved in the operation over the past 48 hours or more and I would like to thank all of them for their work." He added there would be no further comment from police at this time.
