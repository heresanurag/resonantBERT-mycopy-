  Once on the scene, rescuers searched the water for victims or survivors and initiated "immediate life-saving measures", but the efforts were unsuccessful. Four victims were pronounced dead at the scene, while two others were declared dead at a nearby hospital, officials said. The part of the river where the helicopter crashed is near Manhattan's west side, an area known for its trendy shops and dining. It's also near the main campus of New York University. The Federal Aviation Administration (FAA) said the investigation into the crash of the Bell 206 - a two-bladed helicopter - will be led by the National Transportation Safety Board. The Bell 206 is commonly used by sightseeing companies, television news stations and police departments. US President Donald Trump said the crash was terrible and more details would soon be released about what happened. "God bless the families and friends of the victims," he wrote on his Truth Social platform.

  Rescue boats were launched shortly after the first calls about the crash, which occurred roughly 18 minutes after the helicopter took off

  Michael Roth, chief executive of New York Helicopter Charter Inc, told CNN he was "devastated". "I'm a father, a grandfather, and my wife hasn't stopped crying since this afternoon," he said. When asked about the maintenance of the helicopter, Mr Roth replied: "It's my director of maintenance who deals with that." Eyewitnesses who saw the crash told CBS News, the BBC's US news partner, that they saw parts of the helicopter fall from the sky. "I looked outside my window. I saw a few people running towards the water, and some people were acting pretty normal. So I was like oh, it might not be anything. Then I started to hear all the sirens come outside," Jersey City resident Jenn Lynk said. Another, Ipsitaa Banigrhi, told CBS the crash sounded like thunder. "I saw, like, black particles flying," she said. "Again, I thought maybe it's just like, dust, or birds, and then we heard all the emergency vehicles and sirens go by, and I think that's when it was like, OK, what's happening." This is not the first deadly tourist helicopter crash in New York City. In 2018, another tourist helicopter crashed into the East River. All five passengers drowned with only the pilot surviving. In 2009, a helicopter carrying Italian tourists collided with a private plane over the Hudson River, killing nine. Nearly 30,000 tourist trips take off from the Downtown Manhattan Heliport every year, according to the New York Comptroller's Office.

