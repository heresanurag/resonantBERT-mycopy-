title: Spanish family among six dead in Hudson River helicopter crash - BBC News
date: '2025-04-11'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cwy6j9peen4o
content: |-
  Five of the individuals on board were a family of tourists from Spain and the sixth person was the pilot, officials say.

  Six people, including three children, were killed after a helicopter carrying a family of tourists crashed into the Hudson River in New York, authorities have said. The family of five was from Spain and the sixth person was the pilot, New York City Mayor Eric Adams told reporters on Thursday. All were onboard the helicopter at the time of the crash, which is under investigation. "Our hearts go out to the families," Adams said. Authorities have yet to release the identities, but they have been widely named as Agustín Escobar and his wife Mercè Camprubí Montal, who were both executives at Siemens, and their children, aged four, five and 11.

  In a statement, a spokesperson for Siemens said: "We are deeply saddened by the tragic helicopter crash that claimed the lives of Agustin Escobar and his family. "Our deepest condolences go out to all of his relatives." Spanish Prime Minister Pedro Sánchez said the news was devastating and that he shared the grief of the victims' families. The Spanish family lived in Barcelona, and regional leader Salvador Illa sent "all my affection" to their family and friends. A photograph of the family briefly published by the tour company shows them posing in front of the helicopter before the fatal incident. Video footage shows the helicopter falling out of the sky upside down before splashing into the Hudson River. Officials said the helicopter lost control soon after turning at the George Washington Bridge to move along the New Jersey shoreline. The helicopter was operated by tour company New York Helicopters and took off from the Downtown Manhattan Heliport on the lower side of the island at 14:59 local time (19:59 BST).
  • None What we know about the Hudson helicopter crash The first calls about the crash came around 15:17 EDT (20:17 BST) and rescue boats were launched immediately, New York Fire Commissioner Robert Tucker said. "Swimmers were in the water shortly after the call," he said.

