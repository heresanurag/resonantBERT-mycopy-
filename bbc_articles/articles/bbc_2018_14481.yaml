  A day-by-day breakdown of the allegations made against the actor and the various responses to them.

  Allegations made against Kevin Spacey have seen the US actor's life, career and conduct come under intense scrutiny.

  Here is a summary of the main events so far:

  Born in New Jersey in 1959, Spacey studied at New York's prestigious Juilliard School and made his professional stage debut in 1981.

  He went on to appear with Jack Lemmon on Broadway in Long Day's Journey into Night and won a Tony in 1991 for his work in Neil Simon's Lost in Yonkers.

  The following year he appeared with Lemmon in the film version of Glengarry Glen Ross. More high-profile roles followed, one of which - in 1995's The Usual Suspects - won him an Academy Award.

  Spacey with the Oscar he won at the 2000 Academy Awards

  His performance in American Beauty brought him another Oscar in 2000, by which time he had made his first film as a director.

  In 2004 Spacey became artistic director of the Old Vic in London. During his 11-year tenure, he directed and acted in numerous productions there.

  In 2015 he received an honorary knighthood and a special Olivier award for his contributions to British theatre.

  Spacey earned further acclaim for playing Francis Underwood in House of Cards, Netflix's adaptation of Michael Dobbs's political novel.

  In 2017, he hosted the Tony awards in New York, during which he made comic capital about the rumours regarding his sexuality.

