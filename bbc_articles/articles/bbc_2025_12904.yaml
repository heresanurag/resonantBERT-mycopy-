content: |-
  The US bombing of Iran's nuclear sites has stirred strong feelings in the Iranian community of Los Angeles.

  Make Iran Great Again? 'Tehrangeles' community in LA reflects on US strikes

  Iranian Americans call for regime change in Iran at LA demonstration

  A woman in a "Make America Great Again" hat leads a chant for "regime change" in Iran. The crowds dance and wave Iranian, Israeli and American flags as Persian music blasts. Car horns beep in support but also some annoyance in LA's gridlocked traffic. Protests outside the West LA Federal Building are a common site, but even by LA standards this one is unusual, happening under the watchful eyes of armed US Marines, controversially ordered there by President Trump during protests against immigration raids. But these immigrants are proudly demonstrating in MAGA hats in support of President Trump and his decision to intervene in the Israel-Iran conflict by launching air strikes against Iranian nuclear sites. "We want regime change in Iran," says Bita Ashrafi, who left Iran 50 years ago and attended the protest wearing a "Trump Was Right About Everything" hat. "I fully support President Trump's decisions because this has been going on for 46 plus years - the tyranny, the dictatorship." West LA, often called Tehrangeles, is home to the largest population of Iranians outside of Iran, formerly known as Persia. There are Persian restaurants and bookstores and shops selling the saffron and rose ice cream popular in Iran. Many of Southern California's Iranian Americans are in full support of President Trump and Israeli Prime Minister Netanyahu.

