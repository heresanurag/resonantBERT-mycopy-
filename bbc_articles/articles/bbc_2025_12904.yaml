  But others say the involvement of the US, called the "Great Satan" by hardliner religious leaders in Iran, will only bolster Iran's leaders. Ms Ashrafi took to the streets with several hundred others to show her support for Trump and regime change in Iran a day after a "No War" protest broke out in the same spot in response to the US "bunker busting" bombing of nuclear sites in Iran. The US president said the action was necessary because Iran was close to developing a nuclear bomb. Tehran has always said its nuclear programme is for peaceful purposes.
  • None What leaked intel report tells us about damage to Iran sites Persian Americans are worried about friends and family in their homeland who they've struggled to reach with Iran's phones and internet shut off. They also have strong feelings about how their adopted country should respond to Iran. "Do not negotiate with them. They will go back to terrorising the world," said Farzan Seyed, who was dressed in a MIGA (Make Iran Great Again) hat - the acronym popularised by Trump on social media - and a tie showing the lion and sun emblem from Iran's pre-1979 flag. He says Trump should show support for regime change but not get too involved.

  Farzan Seyed says President Trump should show support for regime change but not get too involved.

  "The people have to choose," he says, though he hopes they choose exiled Crown Prince Reza Pahlavi who also lives in the United States. Iranian-American families in Southern California lost so much when they fled Iran, he says, adding that when they get together – whether Jewish, Christian, Muslim, Baháʼí or Zoroastrian – they "speak with one voice from West LA" against the Islamic Republic. Many Iranian Americans dispute that there is one voice. The cafes and restaurants in West LA are full of debates about what should and could happen next in Iran. And not everyone in the community wears MAGA hats and supports the US bombing.
  • None 'We're exhausted' - how Iranians feel after fragile ceasefire
  • None 'We thought it was the end' - Israeli town reels Roozbeh Farahanipour – once imprisoned in Iran for his activism - says he fears the US involvement will push Iran into a broken, uncertain future. "The job needs to be done by Iranian people," he says in one of the three restaurants he now owns in the heart of Tehrangeles. "If we look at the history, I don't think that's the result of the Iraq, Afghanistan, Libya, even Syria."

