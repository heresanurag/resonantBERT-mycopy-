title: 'Coronavirus: World celebrates Easter despite lockdown - BBC News'
date: '2020-04-11'
section: World
url: http://www.bbc.co.uk/news/world-52241453
content: |-
  Across the globe, people are finding innovative ways to celebrate the Christian festival.

  Christians around the world are experimenting with new ways to spend Easter, as many countries remain under lockdown to limit the spread of coronavirus.

  Many congregations have been attending remote services online, while their clergy preach to cameras in empty churches.

  In some places, traditions go on in defiance of the restrictions.

  In Burwood, a suburb of the Australian city of Sydney, an Anglican clergyman prepares for Easter services

  A Catholic priest bows before a cross at an empty cathedral in Los Angeles in the US

  Two men carry a statue of Jesus Christ after it was used at a church service in the Italian city of Taranto

  A woman holds a cloth with an image of Jesus Christ in Brasilia Cathedral, Brazil

  The Catholic archbishop of Brisbane, Australia, delivers a Good Friday service in a deserted St Stephen's cathedral...

  ... while a couple in Adelaide, South Australia, watches an Anglican service from home

  Elsewhere, long-held traditions continue. Here onlookers gather as a flagellant in the Philippines capital Manila whips his back as a penance, despite government orders for people to stay at home

  Meanwhile a pilgrim finds only locked doors at the Holy Sepulchre church in Jerusalem

  A woman looks out from her window in Cambados, north-western Spain, where religious processions have been cancelled

  One German church came up with a way round the restrictions - a service at a drive-in cinema in Düsseldorf

  Others listened to services from the outside of churches, like this one in the Albanian capital Tirana

  Virtual and real together - screens at a church in Tyniec, Poland, during a Maundy Thursday service
