title: Tunisia opposition leaders jailed on conspiracy and terror charges - BBC News
date: '2025-04-20'
section: Africa
url: http://www.bbc.co.uk/news/articles/c8x8de2qrgvo
content: |-
  The defendants get sentences of up to 66 years after a trial described by a defence lawyer as a farce.

  Ahmed Nejib Chebbi is head of the opposition National Salvation Front

  A court in Tunisia has sentenced a group of senior politicians, businessmen and lawyers to long prison sentences on conspiracy and terrorism charges. The defendants received sentences of up to 66 years. They include leaders of National Salvation Front, the main opposition coalition, who were arrested in 2023. Human rights groups described the trial as an attempt to stifle dissent. A defence lawyer said it was a "farce". President Kais Saied suspended parliament after being elected in 2019. Last year he won a second term by a landslide, after jailing dissidents and potential rivals.

  In the latest case, a total of 40 defendants were accused of "conspiracy against state security" and "belonging to a terrorist group". Most had left the country and were tried in absentia. Those in detention include National Salvation Front leaders Issam Chebbi and Jawhar Ben Mbarek. They were given 18-year sentences, a defence lawyer told AFP news agency following the ruling late on Friday. Kamel Eltaief, an activist and businessman, was jailed for 66 years, the lawyer added. Kamel Jendoubi, a former minister who was tried in absentia, told AFP news agency: "This is not a judiciary ruling, but a political decree executed by judges under orders." Defence lawyer Ahmed Souab is quoted by Reuters news agency as saying: "I have never witnessed a trial like this. It's a farce." Tunisia is the country where a wave of pro-democracy protests in the Arab world began in late 2010. The country's long-time strongman, Zine El Abidine Ben Ali, was ousted within weeks. Last year's election was Tunisia's third presidential vote since then. Rights group Amnesty International has denounced "a worrying decline in fundamental rights" under Saied's government as discontent rises over his authoritarian style of governance. Saied has rejected the criticism, saying he is fighting a "corrupt elite" and "traitors".
