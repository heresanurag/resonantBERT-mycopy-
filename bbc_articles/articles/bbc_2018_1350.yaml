title: Florida shooting survivor recalls being mistaken for suspect - BBC News
date: '2018-02-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43148811
content: |-
  Lorenzo Prado describes a harrowing experience when a SWAT team mistook him for the alleged gunman.

  Lorenzo Prado, a student at Stoneman Douglas, recalled being mistaken for the alleged gunman because he was wearing similar clothes.
