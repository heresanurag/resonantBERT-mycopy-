  Seven people are charged with grievous bodily harm following disorder outside the Iranian embassy.

  Seven charged with GBH after Iran embassy protest

  Conditions remain in place to prevent disorder outside the Iranian embassy

  Seven men have been charged with grievous bodily harm after two people were allegedly assaulted outside the Iranian embassy during a protest. Officers had responded to reports of an altercation in Princes Gate in Knightsbridge, west London, shortly after 09:50 BST on Friday, the Metropolitan Police said. The officers intervened and additional police were deployed to the scene. Two men, aged 37 and 39, were taken to hospital with serious but not life-threatening injuries, a Met spokesperson said.

  Eight people were arrested in connection with the incident, including the 39-year-old who had been taken to hospital. On Saturday, seven of those arrested were charged with causing grievous bodily harm and remanded into custody until they appear at Westminster Magistrates' Court on Monday. The men who have been charged come from different parts of the country, including London, Liverpool and Birmingham. The eighth person arrested remains in hospital and has been bailed. Conditions have been put in place to prevent serious disorder at the embassy, stopping protesters from gathering in the area until 13:00 BST on Sunday.
