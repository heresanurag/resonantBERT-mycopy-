title: Scarborough gymnast Joe Fishburn ready for Gladiators final - BBC News
date: '2025-04-12'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/cgengr1d7gno
content: |-
  Joe Fishburn says people have been messaging him after learning about his 'adverse' life story.

  'Being on Gladiators has changed my life'

  Joe Fishburn said his best moment was "bursting through that paper in the heats to give my grandma a hug"

  Gymnastics coach Joe Fishburn has told viewers to expect "fireworks and tears" ahead of tonight's final of Gladiators. The 24-year-old Team GB gymnast from Scarborough will take on Mus Dumbayah later for the chance to be crowned series two champion. Speaking ahead of the final he said "getting to this stage has been the best thing I've ever done". He also paid tribute to his grandmother, who brought him up following the death of his mother, and said he wanted to win for people from "adverse backgrounds".

  Joe Fishburn said he enjoyed the contact games most of all

  Mr Fishburn said that when he set out on his Gladiators journey he wanted "to inspire people and get more people involved in sport". He said he also hoped his life story would help give people "faith and hope when they face a challenge". "I never in a million years thought that I'd be going out there in the grand final," he said. "The way I approached this whole experience was out of all the thousands of people that applied, if I get the opportunity to even go through the training and maybe get on the show, that's a win for me." He said he approached the show with the intention of "giving everything my all", which he thought he had achieved. "I've got to the final somehow with one more chance to go for glory," he said.

  The gymnast said he lacked a male role model in his life, and lost his mother when he was just two years old. "Not everyone has the normal kind of stereotypical family, and those with adverse backgrounds are what make their families unique and their experiences unique." His former coach from Scarborough Gymnastics Academy, Nikki Walker, said she had been stunned by his achievements the show. "It's absolutely amazing to see how far he's gone, but he deserves it so much. "He's worked so hard for this and everybody at the club is so proud of him." Ms Walker said Mr Fishburn had always been "so determined, always had the fire in his belly to want to push that little bit further and never give up".

  Mr Fishburn remained tight-lipped about the outcome of the final, but said his family and friends would gather for a "watch party" with some of the gymnasts he coaches. He said pride of place would be given to grandmother Christine, who would sit next to him for the show and who he described as "the VIP of VIPs". Talking about how his life had changed since becoming a contestant, he said: "It's been incredible, it doesn't feel real. "Somebody asking for my autograph is just so crazy to me, you forget how much the show means to people and how much the younger audience aspire to be like the gladiators." He said he felt his background had resonated with people. "I've had so many messages of support and love, from people in similar positions to myself, which means the world, and that's exactly what we set out to do when we started, so I'm just so grateful for the whole thing." Looking to the future, Mr Fishburn said he wanted to continue "spreading the love and passion for the sport of gymnastics". "My story tells itself about how things can happen to you and how life can be short and that's how I live my life, enjoy every minute - and have lots of cups of tea with Christine."

