  Prince Harry and Ms Markle will be hoping for good behaviour from their bridesmaids and pageboys - all seven or under.

  At his brother Prince William's wedding in 2011, the young bridesmaids and pageboys patiently posed in the Throne Room at Buckingham Palace

  Prince Harry was on hand to accompany the youngest ones in a carriage to Buckingham Palace

  The day's highlight was a kiss on the balcony for all bar young bridesmaid Grace van Cutsem
