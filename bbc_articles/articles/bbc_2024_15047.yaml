title: Bear rescued from Ukraine dies in West Lothian zoo - BBC News
date: '2024-07-13'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c728zyw0x47o
content: |-
  The 12-year-old bear had been rehomed at the zoo in January after being rescued from a zoo that was shelled by the Russians.

  Staff at the zoo said they were "utterly devastated" that Yampil had died

  A bear rescued from the war in Ukraine and rehomed in a West Lothian zoo has died. Staff at Five Sisters Zoo in West Calder said they were "utterly devastated" that Yampil had died following an anaesthetic procedure. The 12-year-old Asiatic black bear had been rehomed at the zoo in January after being rescued from the village of Yampil in the Donetsk province of eastern Ukraine. Ukrainian soldiers had discovered an abandoned zoo in the village when they arrived there in July 2022, five months after the Russian invasion. They found Yampil injured and traumatised after Russian shelling of the zoo. Of nearly 200 animals at the zoo, he was one of seven survivors.

  Rescuers initially moved him to an animal sanctuary in Belgium before he was permanently rehomed in Scotland. Romain Pizzi, a specialist vet at Five Sisters Zoo, said Yampil had been "comfortable and happy" at the West Lothian zoo. However, he said animals that had been rescued from such "traumatic circumstances" could have "complicated health problems such as dental problems or post-traumatic stress disorder (PTSD)." He said: "Yampil was anaesthetised for further treatment for his health problems which were worrying the team. "Sadly, anaesthetising animals always carries risks, and Yampil did not recover from the procedure."

  The bear was being observed for signs of PTSD when he arrived at the zoo after being concussed by shellfire in the warzone. The vet said staff at the zoo were all "deeply affected by the loss of our beloved Yampil". He added: "We appreciate this will be a truly sad day for all the incredible people who helped make his rescue possible. "While the zoo will remain open as usual, we kindly request respect and privacy for our owners and staff during this difficult time." The Asiatic black bear - also known as moon bears because of crescent-shaped yellow fur on their chests - are classed as a vulnerable species by conservation groups, with estimates suggesting there are fewer than 60,000 of them left in the world. They are medium-sized bears averaging 4.5 - 5.4ft (137-165cm) in height, and weighing 90-115kg. The males are often heavier and can weigh up to 181kg.
