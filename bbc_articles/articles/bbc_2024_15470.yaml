title: 'Carrickfergus crash: Pensioner to stand trial over girl''s death - BBC News'
date: '2024-07-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cjm977jxye4o
content: |-
  The 91-year-old is accused of causing the death of a girl in Carrickfergus by dangerous driving.

  Scarlett Rossborough died after she was struck by a car last year

  A 91-year-old man is to stand trial accused of causing the death of a schoolgirl in County Antrim. Eight-year-old Scarlett Rossborough died after a car crashed into a group of children in Carrickfergus on 9 August. John Noble Lindsay of Prince Andrew Way in the town is charged with causing her death by dangerous driving. Scarlett was from Larne, where she attended Linn Primary School. Teachers at the school said she was a much-loved pupil who would "always be remembered for her infectious giggles and sense of fun".

  The eight-year-old was described as a "much-loved pupil"

  Mr Lindsay appeared at Belfast Magistrates' Court by videolink on Tuesday. Asked if he understood the charge, he replied: “I do, your worship.” Mr Lindsay declined to say anything in answer to the charge. He declined to call any evidence or tender any witnesses on his behalf. A prosecution lawyer told the court that based on the papers before him, he believed the defendant had a case to answer.

  A defence barrister told the court his client was appearing by video link as he was recovering from an operation. "I am aware that members of the deceased's family are present in court," the barrister said. "We are very eager for this case to proceed and I know the family wish the case to move as quickly as possible as well." District Judge Steven Keown said he was "satisfied there is a case to answer". He said the case would proceed to Belfast Crown Court. Mr Lindsay was released on his own bail of £500. Judge Keown refused a request for legal aid but said a fresh application could be made once the case was before the crown court.
