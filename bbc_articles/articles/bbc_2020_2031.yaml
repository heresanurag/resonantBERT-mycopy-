title: 'Brexit: UK no longer a member of EU - BBC News'
date: '2020-02-01'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-51324431
content: |-
  Crowds mark the historic moment, as 47 years of membership come to an end.

  The UK is out - so what next?

  First of all it’s a long, long period of hard bargaining between the UK and the EU. The UK government is determined to try to get a free-trade deal done by the end of this year but that will not be straight forward – not least because there are so many things that have to be sorted out. But also because the EU will drive a hard bargain. Yes, both sides say they still want to be friends and partners and respectful neighbours and people want to do lots of business with each other. But the UK government has already acknowledged that will mean some friction. And also, until it’s all done and dusted there’s still uncertainty for businesses and people around the country who want to know exactly what is next. But although there is legions of details to be worked out, many more political controversies along the way, be in no doubt – the fundamental question which has been hanging over the country for more than three years has been settled. And that’s already completely changed the political dynamic – and therefore the dynamic in the country too.
