  And the Lib Dems have called for the government to publish an unedited interim report from an OECD review of Scotland's education system before May's Holyrood election.

  The final report from the review is not expected to be published until June due to pandemic delays, but leader Willie Rennie said ministers had already had sight of early drafts - calling this "scandalous" and "jiggery pokery".

  The UK recorded another 9,765 new coronavirus infections on Monday, according to the latest government figures. It is the first time the daily cases figure has been under 10,000 since 2 October.

  A further 230 deaths within 28 days of a positive test were also recorded. Fewer deaths tend to be reported on Mondays due to a reporting lag over the weekend.
