title: 'Hale Barns stabbing: Yousef Makki, 17, ''said he''d be home for tea'' - BBC
  News'
date: '2019-03-04'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-47442382
content: |-
  Manchester Grammar School has observed two minutes of silence in remembrance of its former pupil.

  Officers said they were remaining "open minded" about why Yousef Makki was stabbed

  A teenager phoned home hours before he was fatally stabbed to say he would return for tea, his parents said.

  Yousef Makki, 17 and from Burnage, was stabbed in Gorse Bank Road, Hale Barns, near Altrincham, on Saturday.

  His "devastated" parents said: "The next knock at the door [was] officers with the tragic news... it is every parent's worst nightmare."

  Manchester Grammar School which he attended described Yousef as a "dearly loved, incredibly bright pupil".

