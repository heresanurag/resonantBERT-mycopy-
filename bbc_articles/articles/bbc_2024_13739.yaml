title: Grass fires burn thousands of acres in California - BBC News
date: '2024-06-03'
section: General
url: http://www.bbc.co.uk/news/videos/c8880006xygo
content: |-
  Grass wildfires have burned over 14,000 acres (57sq-km) near San Francisco in California. At least two firefighters were injured in the region's first major wildfire of the season.

  A significant portion of the fire has been contained. Officials say this is a "reality check" for the upcoming fire season.
