  The London-based choir, which features 30 singers, was formed in 1994 by award-winning conductor Karen Gibson, who had previously sung backing vocals for The Beautiful South.

  In 2000, they won BBC Radio 2's Minstrels in the Gallery, a competitive festival of religious music. Two years later, they were nominated for best UK Choir at the Oasis Awards.

  They have since performed alongside Sir Elton John, Luther Vandross, the Spice Girls and Michael Ball.

  The choir have also announced a headline show at London's Union Chapel on 28 November

  The group will go into the studio later this month to begin work on their debut album, which is set for release on 2 November and will include their arrangement of the Ben E King classic.

  In a statement announcing the release, Gibson said: "The Kingdom Choir are absolutely delighted with the journey of the past few months.

  "It's been a rollercoaster, but we wouldn't have it any other way - first, the honour of being able to sing at the royal wedding, and then the thrill of being signed to Sony."

  Sony Music boss Nicola Tuer said she had "jumped at the chance" to sign the group.

  "The choir believe in love, music and power and we are excited to capture this on record for their fans across the globe."

