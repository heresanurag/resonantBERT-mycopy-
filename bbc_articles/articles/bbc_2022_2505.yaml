title: Kell Brook beats Amir Khan in sixth round to settle bitter rivalry - BBC Sport
date: '2022-02-19'
section: General
url: http://www.bbc.co.uk/sport/boxing/60450017
content: |-
  Kell Brook settles bitter rivalry by defeating Amir Khan via sixth-round stoppage in their grudge match in Manchester.

  Last updated on .From the section Boxing

  Kell Brook (left) came out on top in his grudge match with Amir Khan Kell Brook sensationally beat Amir Khan in the sixth round, with the referee stopping the contest, to settle one of the most bitter and long-running feuds in British boxing. A packed-out Manchester Arena witnessed a demolition job from Sheffield's Brook, 35, who showcased timing and power to win in emphatic fashion. A fight which had been in the making for over 17 years - with the two former world champions having traded words but never punches - ended with Khan and Brook embracing. The thrilling encounter might mark the end of both men's fighting careers, with Brook admitting that, although he felt he was back in top form, retirement was on his mind. "I can live at peace with Amir Khan on my record," Brook said. "My mojo is back and I love this game. We will listen to loved ones and see, but I'm back, baby. "I can walk away but I could fight [Chris] Eubank [Jr]. I don't like Eubank. If the fight is right I will fight - I'm a prize fighter." Khan, also 35, admitted after the sixth defeat of his career that he had struggled to switch on during the fight. "Forty fights is a lot of fights. Winning two world titles, going to America... I need to sit down with my family, but it's more towards the end of my career," he said. "That love of the sport is not there any more. When I was in the ring [before] I had that excitement, but I didn't have it. I felt quite flat and maybe that's a sign I should be calling it a day."
  • None 'I'm an old man' - Khan considers retirement after loss Barnstormer from the first bell Brook dominated the contest from the first bell The bout may have taken place with both fighters in the twilight of their careers, but a raucous crowd of over 22,000 - which included former Oasis guitarist Noel Gallagher and Manchester City footballer Jack Grealish - showed just how big a draw Khan and Brook still are. Brook looked focused as he strutted to the ring to Kanye West's 'All of the Lights', his trademark entrance music almost drowned out by the boos of the crowd. Khan - in a white and gold robe - looked slightly more relaxed as he made his ring walk, accompanied by stablemate, former opponent and current world champion Terence Crawford. Khan and Brook locked eyes in the final seconds before the first bell and after all the wait, there was no caution from either fighter as fans were treated to a thrilling opening round. Khan demonstrated he still had hand speed in his arsenal with quick combinations in the opening half of the round. But Brook continued to stalk his opponent across the ring and caught Khan with a shot which wobbled the Bolton fighter. Khan was then on unsteady legs again towards the end of the round. The referee stepped in to stop the fight in the sixth Rounds two, three and four followed a similar pattern. Khan would start well, coming quickly out of the blocks, throwing feints and jabs, making his opponent miss and occasionally connecting with a single shot. But Brook's relentless, brutal attack continued in the fifth round. He was dragging a marked-up Khan - who seemed to have lost his defence and hand speed - around the ring like a rag doll. By now it was one-way traffic and in the sixth round, two right uppercuts followed by a left hook - all connecting - forced referee Victor Loughlin to intervene. Should Khan and Brook hang up their gloves? While a loss to his most bitter rival will be a tough pill for Khan to swallow, it should not define a career of which he, his loved ones and fans of British boxing can be proud. The manner of his defeats by Breidis Prescott, Danny Garcia and Saul 'Canelo' Alvarez - all vicious, stomach-churning knockouts - often made Khan, and the supposed fragility of his chin, the butt of jokes among boxing fans. Khan (right, 40 fights) and Brook (left, 43 fights) have both had long careers in the pro game But his talent, achievements and impact on the sport surpass that of most boxers. Khan is a fighter who single-handedly carried the torch for Team GB's boxing squad at the 2004 Olympics, winning silver in Athens. He is a fighter who paved the way for future Olympic stars such as Anthony Joshua, Nicola Adams and James DeGale. And he is a fighter who, after being thrust into the limelight of professional boxing aged just 17, went on to beat quality champions such as Marcos Maidana, Zab Judah and Devon Alexander and become a unified world champion. For Brook, retiring on a high could be a satisfying way to leave such a gruelling sport, but he has suggested he will take time before confirming his next move. Should he hang up the gloves, he too can leave the sport with his head held high. While Khan is often praised for never ducking a challenge, Brook too has dared to be great. In 2014 he travelled to the champion's home city when he beat American Shawn Porter on points in California to become IBF welterweight champion. Brook also moved up weight divisions when he lost to Kazakhstan's ferocious puncher Gennady Golovkin, and eight months later was defeated by pound-for-pound American star Errol Spence Jr. If Brook does continue, he will not be short of options, and leading the pack could be a blockbuster bout between Brook and Eubank Jr, one that is likely to capture the imagination of both boxing aficionados and casual fans.
