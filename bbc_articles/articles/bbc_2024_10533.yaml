title: 'General election 2024 poll tracker: How do the parties compare? - BBC News'
date: '2024-05-22'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68079726
content: |-
  How do people say they will vote in the UK general election? Our poll tracker measures the trends.

  We've now had quite a few polls published since Rishi Sunak called the election on 22 May, including some that were fully conducted after the announcement, writes BBC senior political analyst Peter Barnes.

  Overall they don't suggest there's been any significant change. Some of the pollsters have recorded a small movement in favour of the Conservatives but others have Labour up a little.

  All of the shifts fall within the margin of error. In other words they could just be down to random variation.

  As far as we can tell, nothing has changed. And that goes for Reform UK, the Lib Dems, Greens, SNP and Plaid Cymru as well.

  Perhaps the parties' policy announcements will have an impact - no doubt the Conservatives will be hoping their national service pledge will be attractive to voters - but we'll have to wait and see.
