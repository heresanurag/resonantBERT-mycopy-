  The driver was also captured on private CCTV wiping down the interior of the car, including the steering wheel and the dashboard. Willox's DNA was later found on a seat lever.

  The jury heard Willox did not join Emma's family and friends when they put up posters and distributed leaflets around Ayrshire after she was reported missing.

  Miriam said she thought that was "strange", adding: "Why would he not be trying to find her?"

  As the search for Emma intensified, experts began to plot Willox's movements using CCTV and cell site analysis of his mobile phones.

  They also examined his background and discovered he used to build wind farms near the Galloway Forest, in Dumfries and Galloway.

  Searches took place at remote locations in the Galloway Forest

  This became critical when cameras picked up two journeys to the area in the days following Emma's disappearance.

  The first, on 29 April, was made in his Mercedes SUV. The following day he made the trip in a Jaguar he bought for his wife, who was working abroad when Emma vanished.

  A police dog trained in the scent of dead bodies later gave a "positive indication" during the search of the car, by repeatedly barking at the boot area.

  CCTV footage was discovered showing Willox going into various shops in Ayr and buying bleach, rubber gloves and tins of outdoor disinfectant.

  Det Insp Crombie said: "When we put all those pieces of evidence together it painted a suspicious picture of Ross Willox's movements."

  Ross Willox was seen on CCTV buying bleach, rubber gloves and outdoor disinfectant

  Police drafted in search experts from the UK National Crime Agency, as well as an officer who had worked as a wind farm liaison and had intimate knowledge of the area.

  The Galloway Forest Park covers around 300 square miles and Det Insp Crombie said some parts look "like the surface of the moon".

  Digital forensic experts examined the cell site analysis from Willox's phones and overlaid it with the CCTV, which had been recovered from the routes he took in the 48 hours after Emma vanished.

  As a result, they were able to narrow the search area down to between 10 and 15 square miles.

  Willox was under surveillance when he was arrested at his mother's house on 8 May on suspicion of Emma's murder.

  The circumstantial case also featured internet searches he had made on his best friend's iPad. These included "can cars be traced by GPS?" and "can UK police trace your car without a warrant?"

  On 12 June, six weeks after Emma disappeared, her naked body was found in Glentrool Forest, east of Loch Moan.

  The discovery was made by Det Con Ben Pacholek and his dog Bear, who had walked more than 200 miles during the inquiry.

  Det Insp Crombie said the hairs on the back of his neck stood up when he got the call to say that Emma's body had been found.

  "It was quite an emotional moment," he added.

  A pathologist was unable to confirm how Emma died due to the "degree of decomposition".

  But the jury was told that soil found on boots owned by Willox was a 92% match for mud at the remote spot where the body was recovered.

  Prosecutor Paul Kearney told the jury Willox had made a "determined attempt to create a false narrative to conceal and destroy evidence".

  Det Insp Crombie described the killer as "a selfish, arrogant monster" and said he compounded the agony of Emma's loved ones by failing to admit his crime.

  He added: "They are still heartbroken and I know they miss her terribly every day. To put her family through that is unforgivable."

  In a statement released after the guilty verdict, Emma's family said: "We are absolutely devastated by Emma's death and her not being with us has left a tremendous void in all our lives.

  "We cannot believe she was taken from us in such a violent way and what makes it even worse is that Ross Willox was supposed to be her friend.

  "The court case has been arduous and hearing about what happened that night has been harrowing, but we are thankful that Willox has been found guilty and he will have to live forever with the consequences of his actions."

