title: 'Harshita Brella murder: Pankaj Lamba''s parents arrested - BBC News'
date: '2025-03-18'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/c8d48egdp3ro
content: |-
  Ms Brella's death has prompted an international manhunt for her husband, Pankaj Lamba.

  Harshita Brella's body was found 100 miles from her home in a car last year

  The parents of a man suspected of killing his wife and leaving her body in the boot of a car in London have been arrested, the BBC understands. Indian Police said Darshan Singh and Sunil Devi face charges for causing the death of Harshita Brella by subjecting her to cruelty under what is locally known as the "dowry death" law. The investigation is separate to one being led in the UK by Northamptonshire Police, who believe the accused parents' son, Pankaj Lamba, murdered Ms Brella, 24, who lived in Corby, before fleeing the country in November. Mr Lamba, 23, whose whereabouts are unknown, was known to officers before Ms Brella's death and was the subject of a domestic violence protection order.

  The arrest of Mr Singh and Ms Devi followed a complaint by Ms Brella's parents. Her father Satbir Singh told the BBC that after months of waiting, he felt some progress was being made in the case.

  Pankaj Lamba was named as the prime suspect in the case of his wife's death

  According to the Indian legal code, a dowry death is when "burns or bodily injury occurs" to a woman within seven years of marriage. It must also be shown, soon before her death, that she was "subjected to cruelty or harassment by her husband or any relative of her husband for, or in connection with, any demand for dowry". A person who is found guilty of dowry death will be imprisoned for at least seven years, but they could be imprisoned for life.

  Northamptonshire Police named Mr Lamba as the prime suspect following the discovery of his wife's body in Ilford, London, in November and believed he had fled the UK. It said it had submitted its findings to the Crown Prosecution Service and was waiting for a decision on charges.

  Ms Brella's family said she and Mr Lamba, 23, had entered into an arranged marriage, with a legal wedding held in August 2023. The couple had their traditional Indian ceremony on 22 March 2024, before they left for the UK around 30 April, settling in Corby.
