content: |-
  As Vladimir Putin orders troops into eastern Ukraine, here's a look at how things got to this point.

  On Monday, Russian President Vladimir Putin ordered troops into eastern Ukraine. Thousands have been deployed near the Ukrainian border in recent months.

  Ros Atkins looks at the key moments of Russia's military build-up in the crisis so far.
