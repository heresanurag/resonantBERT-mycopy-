title: 'Dickey Betts: The Allman Brothers Band guitarist and songwriter dies at 80
  - BBC News'
date: '2024-04-20'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-68853477
content: |-
  Dickey Betts helped create their band's Sothern rock style and wrote classic songs like Ramblin' Man.

  Dickey Betts, a lynchpin of The Allman Brothers Band, one of the most popular and influential US rock groups of the 1970s, has died at the age of 80.

  The guitarist and vocalist also wrote classic songs including their biggest hit, 1973's Ramblin' Man.

  His other compositions included Blue Sky and the instrumental Jessica, which won a Grammy Award and was used as the theme for BBC TV series Top Gear.

  The band announced "with deep sadness" that he died on Thursday.

  "His extraordinary guitar playing alongside guitarist Duane Allman created a unique dual guitar signature sound that became the signature sound of the genre known as Southern Rock," a statement said.

  "He was passionate in life, be it music, songwriting, fishing, hunting, boating, golf, karate or boxing. Dickey was all in on and excelled at anything that caught his attention."

  Betts (centre) on stage with The Allman Brothers Band in 1973

  He "passed away peacefully in his home" following "a period of declining health", the statement said.

  David Spero, Betts' manager of 20 years, told the Associated Press he had been suffering from cancer for more than a year and had chronic obstructive pulmonary disease.

  A statement on Betts' social media accounts said: "The legendary performer, songwriter, bandleader and family patriarch passed away earlier today at his home in Osprey, FL., surrounded by his family.

  "Dickey was larger than life, and his loss will be felt world-wide."

  Betts joined brothers Duane and Gregg Allman and others in the band, which fused rock with country, blues and jazz to create Southern rock.

  "You can hear the influence of his clean-toned modal soloing in every Southern rock group that's followed," wrote Rolling Stone magazine last year, naming Betts on its list of the greatest 250 guitar players of all time.

  The Allman Brothers Band became known for their electric live performances as well as achieving 11 gold and four platinum albums.

  But they were also beset by tragedy. Duane died in a motorcycle accident in 1971, and fellow founding member, bassist Berry Oakley, was also killed in a motorbike crash in 1972. Gregg Allman died in 2017.

  The group were inducted into the Rock 'n' Roll Hall of Fame in 1995, and received the Grammy lifetime achievement award in 2012.
