  Wharton is one of a number of young players to have been included in the squad by Southgate, alongside 18-year-old Manchester United midfielder Kobbie Mainoo and Chelsea's 22-year-old Cole Palmer. "There are still players that have been in the team for a long time and some top young players in the team... I think it's good to have that little mix. If you're good enough, you're old enough," Wharton said. The midfielder had a 100% pass completion on his England debut against Bosnia-Herzegovina but says there is room for improvement "on the little things" in his game. He added he has spoken to Arsenal midfielder Declan Rice to help him iron out details in his game on things like "body positioning and communication". In an interview with BBC Radio Lancashire, Wharton’s dad described him as a "loner" but the player says that description isn’t quite right. "I think loner is a bit harsh," he joked. "I don't have a million friends, I keep myself to myself and that's just how I have always been really. "It's part of being a footballer. You can't go out at weekends growing up - that's the sacrifice you have to make I guess."
