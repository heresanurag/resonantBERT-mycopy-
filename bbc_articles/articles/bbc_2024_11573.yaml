content: |-
  Crystal Palace midfielder Adam Wharton is included in England's squad for Euro 2024

  England midfielder Adam Wharton says being included in England’s 26-man squad for Euro 2024 is "surreal" and "a dream come true". The 20-year-old only made his professional debut in August 2022 and was still playing in the Championship in January of this year. He made an £18m move to Crystal Palace from boyhood club Blackburn Rovers and made his Premier League debut in February. Wharton played a key part in the Eagles securing a 10th-place finish in the Premier League and his form for his club side meant he was included in Gareth Southgate’s 33-man training squad, making his debut against Bosnia-Herzegovina last week. Wharton has impressed the players and staff in training and now has a chance of featuring in a major tournament. "It's a surreal feeling. Honestly I wasn't expecting it," he said. “Just a dream come true. Every kid who grows up playing football wants to play in the Premier League, play for their country. “I got to play for team I supported to begin with, really enjoyed that and then it has continued since - moving to the Premier League, now here, so it's all been very fast but I wouldn't want it any other way. “I have really enjoyed the last six months and I just want to keep playing, getting better." After having only just moved into the Premier League, he said it was "a bonus" to get into the national squad. "I am absolutely delighted," he added. "I get to do what I love on the top stage - you can't beat it."

