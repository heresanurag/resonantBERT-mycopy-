content: |-
  After a coal tip landslide narrowly missed their homes, residents worry about the risk of another.

  Landslide residents want to leave their homes

  Dianne Morgan's home backs on to a coal tip in Cwmtillery which caused a landslide following heavy rain during Storm Bert in November.

  Residents who saw a coal tip landslide narrowly miss their homes have said they do not want to live there if the risk of another one remains. Dianne Morgan, who lives directly below the tip in Cwmtillery, Blaenau Gwent, said she would prefer the council to compulsorily buy her home, while others said they wished to move. Torrential rain during Storm Bert last month forced some people in the former mining village to evacuate after a river of slurry and debris washed down the road. It comes as the Welsh government sets out new legislation to address safety concerns at hundreds of disused mining tips across the country.

  "People here don't feel safe and I don't think we'll be able to sell this home either at the moment. At some point we were going to move from here and downsize but that's not going to happen now," Ms Morgan said. Ms Morgan added she had sought assurances from the council that no further slips would occur once work has been carried out to make the tip safe. "Our feeling here as residents of the area is that they should just remove the tip," Ms Morgan said. Following the incident the council said it had started remedial works to address the immediate issues. Despite knowledge of the tip's existence, residents said they were never told it had been categorised as a tip with the potential to affect public safety.

