title: Europe's leaders hold Ukraine talks at 'turning point in history' - BBC News
date: '2025-03-06'
section: Europe
url: http://www.bbc.co.uk/news/articles/c3w14gw3wwlo
content: |-
  France's Emmanuel Macron calls for unity ahead of the defence summit after the US suspended aid to Kyiv.

  EU leaders gathered in Brussels on Thursday for a special council on defence, as France's President Emmanuel Macron warned that the continent was at a "turning point of history". As well as rearmament, leaders are expected to discuss how the body can further support Kyiv in the face of US President Donald Trump's announcement on Monday that he would suspend military aid to Ukraine. Ukrainian President Volodymyr Zelensky is invited to the summit. Nerves have grown increasingly frayed across Europe since Trump and Zelensky's showdown at the White House last week, and the rhetoric around Thursday's summit leaves no doubt about the importance EU officials are ascribing to it. Three years on since Russia's full-scale invasion of Ukraine, the Trump administration's overtures to Russian President Vladimir Putin have left many in Europe concerned the continent would not be able to rely on US support for its security. Washington's decision on Wednesday to pause intelligence sharing with Ukraine did nothing to allay those worries. In a sign of the depth of concern, President Macron said France was open to discussing extending the protection offered by its nuclear arsenal to its European partners, during an address to the nation on Wednesday. That followed a call from Friedrich Merz, likely to be Germany's next chancellor, to discuss increased nuclear sharing.

  Europe was facing a "clear and present danger on a scale that none of us have seen in our adult lifetime", European Commission chief Ursula von der Leyen said, while European Council President António Costa said this was a "defining moment for Ukraine and European security". In a letter to European leaders, von der Leyen also said the continent had to "meet the moment" and "unleash our industrial and productive power and direct it to the goal of security". On Monday, von der Leyen announced an unprecedented defence package - dubbed ReArm Europe - and said that Europe was ready to "massively" boost its defence spending "with the speed and the ambition that is needed". Von der Leyen said the three proposals outlined in the ReArm Europe plan would both support Ukraine and "address the long-term need to take much more responsibility" for European security - probably referring to the fact many Europeans feel the continent can no longer automatically rely on the US to come to its aid.
  • None Allowing countries to increase national deficit levels to give room for more defence spending
  • None €150bn (£125bn) in loans for defence investment in domains that could benefit the defence of the EU as a whole - for example, air and missile defence, anti-drone systems, and military mobility - helping pool demand, and reduce costs through joint procurement
  • None Allowing countries to redirect funds earmarked for cohesion policy programmes (policies aimed at levelling the differences between more and less advantaged regions) to defence spending The European Investment Bank would also be allowed to finance military projects.

  Support for Ukraine will be at the centre of Thursday's summit

  According to von der Leyen, the plan could free up a total of €800bn ($860bn; £670bn) in defence expenditure. Many European leaders have signalled their support for swift, decisive action in regards to the continent's security. Donald Tusk, Poland's prime minister, said the Commission's plan represented "a fundamental shift", while Lithuanian President Gitanas Nauseda said that the summit would give Europe the opportunity to show "whether it's just a debate club or whether we can make decisions". But dissent from certain European leaders sympathetic to Moscow is expected. Earlier this week, Slovakian Prime Minister Robert Fico said the EU's "peace through strength" approach was "unrealistic". And in a letter to Costa, Hungary's Viktor Orban demanded that Ukraine not be mentioned in any written conclusions following the summit. Orban - who has repeatedly attempted to block EU aid to Ukraine and has praised Trump for "standing bravely for peace" - said there was now a "strategic divide... between the majority of Europe and the USA". "One side insists on prolonging the war in Ukraine, while the other seeks an end to the conflict," he added. Yet Orban left the door open for a "greater probability for co-operation" with other leaders over issues of common security and defence. While Thursday's crisis summit is taking place in Brussels, UK Defence Secretary John Healey will be in Washington for discussions with his counterpart Pete Hegseth on the US decision to pause intelligence sharing with Ukraine. Their bilateral meeting will focus on a possible peace plan while efforts continue to bridge a transatlantic rift over Kyiv's future security. Perhaps in a final bid to try and achieve unity ahead of the summit, Macron - who has positioned himself at the centre of the EU's efforts to bridge the gap between Kyiv and Washington - invited Orban to have dinner in Paris on Wednesday evening. The two leaders met immediately after the French president gave a sombre address to the nation in which he said that France and Europe needed to be ready if the US was no longer by their side. "We have to be united and determined to protect ourselves," Macron said. He added that the future of Europe could not be tied to Washington or Moscow, and said that while he "wanted to believe that the US will stay by our side, we have to be ready for this not to be the case". The French president plans to hold a meeting of European army chiefs in Paris next week. Macron said that "decisive steps" would be taken in Brussels, leaving European countries "more ready to defend and protect themselves". "The moment calls for unprecedented decisions," he concluded.
