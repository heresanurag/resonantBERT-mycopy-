title: Kevin Spacey's House of Cards character is officially dead - BBC News
date: '2018-09-06'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-45432413
content: |-
  The actor was dropped from the show last year but now we know how he has been written out of the show.

  Spacey was also replaced by another actor in the film All the Money in the World

  Frank Underwood is officially dead, a trailer for the sixth and final series of House of Cards has revealed.

  The Netflix trailer shows Robin Wright, who plays Spacey's screen wife Claire, speaking at Frank's grave.

  "I'll tell you this though, Francis. When they bury me, it won't be in my backyard. When they pay their respects, they'll have to wait in line."

  Spacey was dropped from the show following sexual assault allegations, which he denies.

